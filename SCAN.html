<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖥️ Visor Scanner - HTML Edition</title>
    
    <!-- Tesseract.js untuk OCR -->
    <script src='https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js'></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px solid #e94560;
        }

        .header h1 {
            font-size: 2.5em;
            color: #e94560;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .header p {
            color: #888;
            font-size: 1.1em;
        }

        /* Control Panel */
        .control-panel {
            background: rgba(22, 33, 62, 0.8);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #0f3460;
        }

        .control-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 20px;
        }

        .control-row:last-child {
            margin-bottom: 0;
        }

        label {
            font-weight: 600;
            color: #00b4d8;
            min-width: 120px;
        }

        select, input[type="file"] {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:hover, select:focus {
            border-color: #e94560;
            outline: none;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c73652);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #0f3460, #0a2647);
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(15, 52, 96, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 180, 216, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Preview Area */
        .preview-section {
            background: rgba(22, 33, 62, 0.8);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #0f3460;
        }

        .section-title {
            font-size: 1.3em;
            color: #e94560;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preview-container {
            background: #0a0a1a;
            border-radius: 10px;
            padding: 15px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .preview-placeholder {
            color: #555;
            text-align: center;
        }

        .preview-placeholder svg {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        /* Results Area */
        .results-section {
            background: rgba(22, 33, 62, 0.8);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #0f3460;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
            color: #888;
        }

        .stat-item {
            background: rgba(15, 52, 96, 0.5);
            padding: 8px 15px;
            border-radius: 5px;
        }

        .stat-value {
            color: #00ff88;
            font-weight: bold;
        }

        .results-textarea {
            width: 100%;
            min-height: 300px;
            background: #0a0a1a;
            border: 2px solid #0f3460;
            border-radius: 10px;
            padding: 20px;
            color: #00ff88;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 1em;
            line-height: 1.6;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .results-textarea:focus {
            outline: none;
            border-color: #e94560;
        }

        /* Progress Bar */
        .progress-container {
            display: none;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #0a0a1a;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #00b4d8);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #888;
        }

        /* Status Messages */
        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        .status-success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .status-error {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid #e94560;
            color: #e94560;
        }

        .status-info {
            background: rgba(0, 180, 216, 0.1);
            border: 1px solid #00b4d8;
            color: #00b4d8;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .control-row {
                flex-direction: column;
                align-items: stretch;
            }

            label {
                min-width: auto;
                margin-bottom: 5px;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .results-header {
                flex-direction: column;
                align-items: stretch;
            }
        }

        /* Loading Animation */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Hidden file input */
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🖥️ Visor Scanner</h1>
            <p>Capture & Extract Text dari Layar dengan OCR</p>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <div class="control-row">
                <label>📸 Sumber:</label>
                <select id="sourceSelect">
                    <option value="screen">📺 Full Screen</option>
                    <option value="window"> Window/Application</option>
                    <option value="file">📁 Upload Gambar</option>
                </select>
            </div>

            <div class="control-row">
                <label>🌐 Bahasa OCR:</label>
                <select id="langSelect">
                    <option value="eng">English</option>
                    <option value="ind">Bahasa Indonesia</option>
                    <option value="eng+ind">English + Indonesia</option>
                </select>
            </div>

            <div class="control-row">
                <label>️ Mode:</label>
                <select id="modeSelect">
                    <option value="auto">Auto Detect</option>
                    <option value="text">Text Only</option>
                    <option value="numbers">Numbers Only</option>
                    <option value="alphanumeric">Alphanumeric</option>
                </select>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="scanBtn" onclick="startScan()">
                    🔍 Scan Sekarang
                </button>
                <button class="btn btn-secondary" id="copyBtn" onclick="copyToClipboard()" disabled>
                     Copy Semua
                </button>
                <button class="btn btn-success" id="downloadBtn" onclick="downloadTxt()" disabled>
                    💾 Download .txt
                </button>
                <button class="btn btn-secondary" onclick="clearResults()">
                    🗑️ Clear
                </button>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
                <div class="progress-text" id="progressText">Initializing...</div>
            </div>

            <!-- Status Messages -->
            <div class="status-message status-info" id="statusInfo"></div>
            <div class="status-message status-success" id="statusSuccess"></div>
            <div class="status-message status-error" id="statusError"></div>
        </div>

        <!-- Preview Section -->
        <div class="preview-section">
            <div class="section-title">
                📷 Preview Layar
            </div>
            <div class="preview-container" id="previewContainer">
                <div class="preview-placeholder">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p>Klik "Scan Sekarang" untuk capture layar</p>
                </div>
            </div>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        </div>

        <!-- Results Section -->
        <div class="results-section">
            <div class="results-header">
                <div class="section-title">
                     Hasil Scan Teks
                </div>
                <div class="stats">
                    <div class="stat-item">
                        Total Scan: <span class="stat-value" id="scanCount">0</span>
                    </div>
                    <div class="stat-item">
                        Karakter: <span class="stat-value" id="charCount">0</span>
                    </div>
                    <div class="stat-item">
                        Baris: <span class="stat-value" id="lineCount">0</span>
                    </div>
                </div>
            </div>
            <textarea class="results-textarea" id="resultsText" placeholder="Hasil scan akan muncul di sini..." readonly></textarea>
        </div>
    </div>

    <script>
        // Global variables
        let scanHistory = [];
        let currentImage = null;
        let scanCounter = 0;

        // Show status message
        function showStatus(type, message) {
            const infoEl = document.getElementById('statusInfo');
            const successEl = document.getElementById('statusSuccess');
            const errorEl = document.getElementById('statusError');
            
            // Hide all
            infoEl.style.display = 'none';
            successEl.style.display = 'none';
            errorEl.style.display = 'none';
            
            // Show specific
            const el = type === 'info' ? infoEl : type === 'success' ? successEl : errorEl;
            el.textContent = message;
            el.style.display = 'block';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                el.style.display = 'none';
            }, 5000);
        }

        // Update progress bar
        function updateProgress(percent, text) {
            const container = document.getElementById('progressContainer');
            const fill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            container.style.display = 'block';
            fill.style.width = percent + '%';
            fill.textContent = Math.round(percent) + '%';
            progressText.textContent = text;
        }

        // Hide progress
        function hideProgress() {
            document.getElementById('progressContainer').style.display = 'none';
        }

        // Start scan process
        async function startScan() {
            const source = document.getElementById('sourceSelect').value;
            const lang = document.getElementById('langSelect').value;
            const mode = document.getElementById('modeSelect').value;
            
            try {
                document.getElementById('scanBtn').disabled = true;
                
                if (source === 'file') {
                    document.getElementById('fileInput').click();
                } else if (source === 'screen' || source === 'window') {
                    await captureScreen(source === 'window');
                }
                
            } catch (error) {
                showStatus('error', 'Error: ' + error.message);
                document.getElementById('scanBtn').disabled = false;
            }
        }

        // Capture screen using Screen Capture API
        async function captureScreen(selectWindow = false) {
            try {
                updateProgress(10, 'Memilih layar untuk di-capture...');
                
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        displaySurface: selectWindow ? 'window' : 'monitor',
                        cursor: 'never'
                    },
                    audio: false
                });
                
                updateProgress(30, 'Capture layar...');
                
                // Get video track
                const track = stream.getVideoTracks()[0];
                const imageCapture = new ImageCapture(track);
                
                // Take snapshot
                const bitmap = await imageCapture.grabFrame();
                
                // Create canvas
                const canvas = document.createElement('canvas');
                canvas.width = bitmap.width;
                canvas.height = bitmap.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(bitmap, 0, 0);
                
                // Convert to blob
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                
                // Stop stream
                track.stop();
                
                updateProgress(50, 'Menampilkan preview...');
                
                // Display preview
                displayPreview(canvas.toDataURL());
                currentImage = canvas;
                
                updateProgress(60, 'Memproses OCR...');
                
                // Perform OCR
                await performOCR(canvas);
                
                updateProgress(100, 'Scan selesai!');
                setTimeout(hideProgress, 1000);
                
                showStatus('success', '✅ Scan berhasil! Teks telah diekstrak.');
                
            } catch (error) {
                if (error.name === 'NotAllowedError') {
                    showStatus('error', '❌ Izin capture layar ditolak. Silakan coba lagi.');
                } else {
                    showStatus('error', '❌ Error capture: ' + error.message);
                }
                hideProgress();
            } finally {
                document.getElementById('scanBtn').disabled = false;
            }
        }

        // Handle file upload
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                displayPreview(e.target.result);
                
                // Load image for OCR
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    currentImage = canvas;
                    performOCR(canvas);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Display preview
        function displayPreview(dataUrl) {
            const container = document.getElementById('previewContainer');
            container.innerHTML = `<img src="${dataUrl}" alt="Preview">`;
        }

        // Perform OCR using Tesseract.js
        async function performOCR(canvas) {
            const lang = document.getElementById('langSelect').value;
            const mode = document.getElementById('modeSelect').value;
            
            try {
                updateProgress(70, 'Loading Tesseract...');
                
                const worker = await Tesseract.createWorker(lang);
                
                updateProgress(80, 'Recognizing text...');
                
                // Set configuration based on mode
                let config = '';
                if (mode === 'numbers') {
                    config = '--psm 6 -c tessedit_char_whitelist=0123456789';
                } else if (mode === 'alphanumeric') {
                    config = '--psm 6 -c tessedit_char_whitelist=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                } else {
                    config = '--psm 6';
                }
                
                const result = await worker.recognize(canvas, {
                    tessedit_pageseg_mode: mode === 'text' ? 6 : 3
                });
                
                await worker.terminate();
                
                updateProgress(90, 'Memformat hasil...');
                
                // Process result
                const text = result.data.text.trim();
                
                if (text) {
                    // Add to history
                    scanCounter++;
                    const timestamp = new Date().toLocaleString('id-ID');
                    scanHistory.push({
                        timestamp,
                        text,
                        confidence: result.data.confidence
                    });
                    
                    // Display results
                    displayResults(text);
                    updateStats();
                    
                    // Enable buttons
                    document.getElementById('copyBtn').disabled = false;
                    document.getElementById('downloadBtn').disabled = false;
                } else {
                    showStatus('info', '⚠️ Tidak ada teks yang terdeteksi.');
                }
                
                updateProgress(100, 'Selesai!');
                
            } catch (error) {
                showStatus('error', '❌ OCR Error: ' + error.message);
                console.error(error);
            } finally {
                setTimeout(hideProgress, 1000);
            }
        }

        // Display results in textarea
        function displayResults(text) {
            const textarea = document.getElementById('resultsText');
            const timestamp = new Date().toLocaleString('id-ID');
            
            const separator = '\n' + '='.repeat(50) + '\n';
            const header = `⏰ ${timestamp}\n` + '='.repeat(50) + '\n';
            
            textarea.value += separator + header + text + '\n';
            textarea.scrollTop = textarea.scrollHeight;
        }

        // Update statistics
        function updateStats() {
            document.getElementById('scanCount').textContent = scanCounter;
            
            const text = document.getElementById('resultsText').value;
            const charCount = text.replace(/\s/g, '').length;
            const lineCount = text.split('\n').length;
            
            document.getElementById('charCount').textContent = charCount;
            document.getElementById('lineCount').textContent = lineCount;
        }

        // Copy to clipboard
        function copyToClipboard() {
            const textarea = document.getElementById('resultsText');
            textarea.select();
            document.execCommand('copy');
            
            showStatus('success', '📋 Teks berhasil di-copy ke clipboard!');
            
            // Deselect
            window.getSelection().removeAllRanges();
        }

        // Download as TXT
        function downloadTxt() {
            const text = document.getElementById('resultsText').value;
            if (!text.trim()) {
                showStatus('error', '❌ Tidak ada teks untuk didownload.');
                return;
            }
            
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            const filename = `visor_scan_${timestamp}.txt`;
            
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showStatus('success', `💾 File "${filename}" berhasil didownload!`);
        }

        // Clear results
        function clearResults() {
            if (scanCounter === 0) {
                showStatus('info', '️ Tidak ada hasil untuk dihapus.');
                return;
            }
            
            if (confirm('️ Hapus semua hasil scan?')) {
                document.getElementById('resultsText').value = '';
                scanHistory = [];
                scanCounter = 0;
                updateStats();
                
                document.getElementById('copyBtn').disabled = true;
                document.getElementById('downloadBtn').disabled = true;
                
                // Clear preview
                document.getElementById('previewContainer').innerHTML = `
                    <div class="preview-placeholder">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p>Klik "Scan Sekarang" untuk capture layar</p>
                    </div>
                `;
                
                showStatus('success', '🗑️ Hasil scan berhasil dihapus.');
            }
        }

        // Initialize
        window.onload = function() {
            showStatus('info', '✅ Aplikasi siap! Pilih sumber dan klik Scan.');
        };

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            // Ctrl/Cmd + S = Scan
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                startScan();
            }
            // Ctrl/Cmd + C = Copy
            if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
                if (!document.getElementById('copyBtn').disabled) {
                    e.preventDefault();
                    copyToClipboard();
                }
            }
        });
    </script>
</body>
</html>

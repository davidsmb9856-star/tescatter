<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🖥️ Visor Scanner - HTML Edition</title>

<!-- Tesseract.js dari CDN -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: #fff;
    padding: 20px;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    background: rgba(26, 26, 46, 0.95);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    overflow: hidden;
    border: 1px solid rgba(233, 69, 96, 0.2);
  }

  /* HEADER */
  .header {
    background: linear-gradient(90deg, #16213e, #0f3460);
    padding: 25px;
    text-align: center;
    border-bottom: 3px solid #e94560;
  }

  .header h1 {
    font-size: 32px;
    color: #e94560;
    text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    margin-bottom: 5px;
  }

  .header p {
    color: #aaa;
    font-size: 14px;
  }

  /* CONTROL PANEL */
  .control-panel {
    padding: 20px;
    background: rgba(15, 52, 96, 0.3);
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-group label {
    font-size: 14px;
    color: #ccc;
  }

  select, input[type="text"] {
    background: #0a0a1a;
    color: #00ff88;
    border: 1px solid #0f3460;
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    outline: none;
    transition: all 0.3s;
  }

  select:hover, input[type="text"]:hover {
    border-color: #e94560;
  }

  select:focus, input[type="text"]:focus {
    border-color: #e94560;
    box-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
  }

  /* BUTTONS */
  .btn {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #fff;
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-primary {
    background: linear-gradient(135deg, #e94560, #c73652);
    box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
  }

  .btn-secondary {
    background: linear-gradient(135deg, #0f3460, #0a2647);
    box-shadow: 0 4px 15px rgba(15, 52, 96, 0.4);
  }

  .btn-secondary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(15, 52, 96, 0.6);
  }

  .btn-warning {
    background: linear-gradient(135deg, #533483, #3d2563);
  }

  .btn-warning:hover:not(:disabled) {
    transform: translateY(-2px);
  }

  /* STATUS BAR */
  .status-bar {
    background: #16213e;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .status-text {
    color: #00ff88;
  }

  .status-text.warning { color: #ffb400; }
  .status-text.error { color: #e94560; }

  .progress-container {
    width: 200px;
    height: 6px;
    background: #0a0a1a;
    border-radius: 3px;
    overflow: hidden;
    display: none;
  }

  .progress-container.active { display: block; }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #e94560, #00ff88);
    width: 0%;
    transition: width 0.3s;
  }

  /* PREVIEW AREA */
  .preview-section {
    padding: 20px;
  }

  .section-title {
    font-size: 16px;
    color: #e94560;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .preview-box {
    background: #0a0a1a;
    border: 2px dashed #0f3460;
    border-radius: 12px;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .preview-box img {
    max-width: 100%;
    max-height: 300px;
    display: block;
  }

  .preview-placeholder {
    color: #555;
    font-size: 14px;
    text-align: center;
    padding: 40px;
  }

  /* RESULT AREA */
  .result-section {
    padding: 0 20px 20px;
  }

  .result-box {
    background: #0a0a1a;
    border: 1px solid #0f3460;
    border-radius: 12px;
    min-height: 250px;
    max-height: 400px;
    overflow-y: auto;
    padding: 15px;
    font-family: 'Consolas', monospace;
    font-size: 13px;
    color: #00ff88;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .result-box::-webkit-scrollbar {
    width: 8px;
  }

  .result-box::-webkit-scrollbar-track {
    background: #0a0a1a;
  }

  .result-box::-webkit-scrollbar-thumb {
    background: #0f3460;
    border-radius: 4px;
  }

  .result-separator {
    color: #e94560;
    font-weight: bold;
  }

  .result-header {
    color: #00b4d8;
    font-weight: bold;
  }

  /* ACTION BAR */
  .action-bar {
    padding: 15px 20px;
    background: rgba(15, 52, 96, 0.3);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
  }

  /* INFO BAR */
  .info-bar {
    padding: 10px 20px;
    background: #0a0a1a;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #888;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: #1a1a2e;
    border-radius: 15px;
    padding: 25px;
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    border: 1px solid #e94560;
  }

  .modal h2 {
    color: #e94560;
    margin-bottom: 15px;
  }

  .modal-content {
    background: #0a0a1a;
    padding: 15px;
    border-radius: 8px;
    color: #00ff88;
    font-family: 'Consolas', monospace;
    font-size: 12px;
    white-space: pre-wrap;
    max-height: 400px;
    overflow-y: auto;
  }

  .modal-close {
    margin-top: 15px;
    text-align: right;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #00ff88;
    color: #0a0a1a;
    padding: 15px 25px;
    border-radius: 10px;
    font-weight: bold;
    box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
    transform: translateX(400px);
    transition: transform 0.3s;
    z-index: 2000;
  }

  .toast.active { transform: translateX(0); }
  .toast.error { background: #e94560; color: #fff; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .header h1 { font-size: 24px; }
    .control-panel { flex-direction: column; }
    .btn { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- HEADER -->
  <div class="header">
    <h1>🖥️ VISOR SCANNER</h1>
    <p>Capture & OCR Screen - HTML Edition</p>
  </div>

  <!-- CONTROL PANEL -->
  <div class="control-panel">
    <div class="control-group">
      <label>🌐 Bahasa OCR:</label>
      <select id="langSelect">
        <option value="eng">English</option>
        <option value="ind">Indonesia</option>
        <option value="eng+ind">English + Indonesia</option>
      </select>
    </div>

    <div class="control-group">
      <label>🎨 Mode:</label>
      <select id="modeSelect">
        <option value="auto">Auto Detect</option>
        <option value="light">Light Text (Dark BG)</option>
        <option value="dark">Dark Text (Light BG)</option>
      </select>
    </div>

    <button class="btn btn-primary" id="scanBtn">
      🔍 SCAN SEKARANG
    </button>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="status-text" id="statusText">✅ Siap - Klik SCAN untuk mulai</span>
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-section">
    <div class="section-title">📷 Preview Layar Visor</div>
    <div class="preview-box" id="previewBox">
      <div class="preview-placeholder">
        Belum ada preview<br>
        <small>Klik SCAN untuk capture layar</small>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result-section">
    <div class="section-title">📝 Hasil Scan Teks</div>
    <div class="result-box" id="resultBox">Hasil scan akan muncul di sini...</div>
  </div>

  <!-- ACTION BAR -->
  <div class="action-bar">
    <button class="btn btn-secondary" id="copyBtn" disabled>📋 Copy Semua</button>
    <button class="btn btn-secondary" id="exportBtn" disabled>💾 Export .txt</button>
    <button class="btn btn-warning" id="clearBtn">🗑️ Clear</button>
    <button class="btn btn-warning" id="historyBtn">📜 History</button>
  </div>

  <!-- INFO BAR -->
  <div class="info-bar">
    <span id="scanCount">Total Scan: 0</span>
    <span id="charCount">Karakter: 0</span>
  </div>
</div>

<!-- MODAL HISTORY -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <h2>📜 History Scan</h2>
    <div class="modal-content" id="historyContent">Belum ada history.</div>
    <div class="modal-close">
      <button class="btn btn-primary" onclick="closeHistory()">Tutup</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================
// STATE MANAGEMENT
// ============================================
const state = {
  scanResults: [],
  history: JSON.parse(localStorage.getItem('visorHistory') || '[]'),
  isScanning: false,
  currentScreenshot: null
};

// ============================================
// DOM ELEMENTS
// ============================================
const $ = id => document.getElementById(id);
const scanBtn = $('scanBtn');
const copyBtn = $('copyBtn');
const exportBtn = $('exportBtn');
const clearBtn = $('clearBtn');
const historyBtn = $('historyBtn');
const statusText = $('statusText');
const progressContainer = $('progressContainer');
const progressBar = $('progressBar');
const previewBox = $('previewBox');
const resultBox = $('resultBox');
const scanCount = $('scanCount');
const charCount = $('charCount');
const langSelect = $('langSelect');
const modeSelect = $('modeSelect');
const toast = $('toast');

// ============================================
// UTILITY FUNCTIONS
// ============================================
function showToast(message, isError = false) {
  toast.textContent = message;
  toast.className = 'toast active' + (isError ? ' error' : '');
  setTimeout(() => toast.classList.remove('active'), 3000);
}

function setStatus(message, type = 'success') {
  statusText.textContent = message;
  statusText.className = 'status-text ' + (type === 'error' ? 'error' : type === 'warning' ? 'warning' : '');
}

function updateProgress(percent) {
  progressBar.style.width = percent + '%';
}

function showProgress(show) {
  progressContainer.classList.toggle('active', show);
}

function formatTimestamp() {
  const d = new Date();
  return d.toLocaleString('id-ID', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

function updateStats() {
  scanCount.textContent = `Total Scan: ${state.scanResults.length}`;
  const totalChars = state.scanResults.reduce((sum, r) => 
    sum + r.text.replace(/\s/g, '').length, 0
  );
  charCount.textContent = `Karakter: ${totalChars}`;
}

// ============================================
// IMAGE PRE-PROCESSING
// ============================================
function preprocessImage(canvas, mode) {
  const ctx = canvas.getContext('2d');
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  // Convert to grayscale
  for (let i = 0; i < data.length; i += 4) {
    const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
    data[i] = data[i+1] = data[i+2] = gray;
  }

  // Auto threshold (Otsu-like)
  if (mode === 'auto' || mode === 'dark') {
    const threshold = 128;
    for (let i = 0; i < data.length; i += 4) {
      const v = data[i] < threshold ? 0 : 255;
      data[i] = data[i+1] = data[i+2] = v;
    }
  }

  // Invert for light text on dark background
  if (mode === 'light') {
    for (let i = 0; i < data.length; i += 4) {
      data[i] = 255 - data[i];
      data[i+1] = 255 - data[i+1];
      data[i+2] = 255 - data[i+2];
    }
  }

  ctx.putImageData(imageData, 0, 0);
  return canvas;
}

// ============================================
// MAIN SCAN FUNCTION
// ============================================
async function doScan() {
  if (state.isScanning) return;
  state.isScanning = true;
  scanBtn.disabled = true;
  scanBtn.innerHTML = '⏳ SCANNING...';
  showProgress(true);
  updateProgress(0);

  try {
    // 1. CAPTURE SCREEN
    setStatus('⏳ Meminta izin capture layar...');
    updateProgress(10);

    const stream = await navigator.mediaDevices.getDisplayMedia({
      video: { cursor: 'never' },
      audio: false
    });

    const video = document.createElement('video');
    video.srcObject = stream;
    await video.play();

    // Tunggu frame stabil
    await new Promise(r => setTimeout(r, 300));

    // 2. DRAW TO CANVAS
    setStatus('⏳ Capture layar...');
    updateProgress(25);

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    // Stop stream
    stream.getTracks().forEach(t => t.stop());

    // 3. SHOW PREVIEW
    const dataUrl = canvas.toDataURL('image/png');
    state.currentScreenshot = dataUrl;
    previewBox.innerHTML = `<img src="${dataUrl}" alt="Preview">`;

    // 4. PRE-PROCESS
    setStatus('⏳ Pre-processing gambar...');
    updateProgress(40);
    const mode = modeSelect.value;
    preprocessImage(canvas, mode);

    // 5. OCR WITH TESSERACT
    setStatus('⏳ Memproses OCR (Tesseract.js)...');
    updateProgress(50);

    const lang = langSelect.value;
    const worker = await Tesseract.createWorker(lang, 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = 50 + Math.round(m.progress * 45);
          updateProgress(pct);
        }
      }
    });

    const { data: { text } } = await worker.recognize(canvas);
    await worker.terminate();

    updateProgress(100);

    // 6. PROCESS RESULT
    const extractedText = text.trim();

    if (extractedText) {
      const timestamp = formatTimestamp();
      const result = {
        timestamp,
        text: extractedText,
        lines: extractedText.split('\n').filter(l => l.trim()),
        screenshot: dataUrl
      };

      state.scanResults.push(result);
      state.history.push({
        timestamp,
        text: extractedText
      });

      // Save history to localStorage
      localStorage.setItem('visorHistory', JSON.stringify(state.history.slice(-50)));

      // Display result
      displayResult(result);

      // Enable buttons
      copyBtn.disabled = false;
      exportBtn.disabled = false;

      updateStats();
      setStatus(`✅ Scan berhasil! (${result.lines.length} baris teks)`);
      showToast('Scan berhasil! ✅');
    } else {
      setStatus('⚠️ Tidak ada teks terdeteksi', 'warning');
      showToast('Tidak ada teks terdeteksi', true);
    }

  } catch (err) {
    console.error(err);
    if (err.name === 'NotAllowedError') {
      setStatus('❌ Izin capture ditolak', 'error');
      showToast('Izin capture ditolak!', true);
    } else {
      setStatus(`❌ Error: ${err.message}`, 'error');
      showToast(`Error: ${err.message}`, true);
    }
  } finally {
    state.isScanning = false;
    scanBtn.disabled = false;
    scanBtn.innerHTML = '🔍 SCAN SEKARANG';
    setTimeout(() => {
      showProgress(false);
      updateProgress(0);
    }, 1000);
  }
}

// ============================================
// DISPLAY RESULT
// ============================================
function displayResult(result) {
  const separator = '='.repeat(50);
  const html = `
<span class="result-separator">${separator}</span>
<span class="result-header">⏰ ${result.timestamp}</span>
<span class="result-separator">${separator}</span>
${result.text}

`;

  if (resultBox.textContent === 'Hasil scan akan muncul di sini...') {
    resultBox.innerHTML = html;
  } else {
    resultBox.innerHTML += html;
  }

  resultBox.scrollTop = resultBox.scrollHeight;
}

// ============================================
// COPY FUNCTION
// ============================================
async function copyAll() {
  if (!state.scanResults.length) return;

  const allText = state.scanResults.map(r => 
    `[${r.timestamp}]\n${r.text}`
  ).join('\n\n' + '='.repeat(50) + '\n\n');

  try {
    await navigator.clipboard.writeText(allText);
    showToast('📋 Berhasil di-copy ke clipboard!');
    setStatus('📋 Semua teks berhasil di-copy!');
  } catch (err) {
    // Fallback
    const textarea = document.createElement('textarea');
    textarea.value = allText;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    showToast('📋 Berhasil di-copy!');
  }
}

// ============================================
// EXPORT FUNCTION
// ============================================
function exportTxt() {
  if (!state.scanResults.length) return;

  let content = '='.repeat(50) + '\n';
  content += 'VISOR SCANNER - HTML Edition\n';
  content += 'Export: ' + formatTimestamp() + '\n';
  content += '='.repeat(50) + '\n\n';

  state.scanResults.forEach(r => {
    content += `[${r.timestamp}]\n`;
    content += '-'.repeat(40) + '\n';
    content += r.text + '\n\n';
  });

  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `visor_scan_${Date.now()}.txt`;
  a.click();
  URL.revokeObjectURL(url);

  showToast('💾 File berhasil di-export!');
  setStatus('💾 Export berhasil!');
}

// ============================================
// CLEAR FUNCTION
// ============================================
function clearResults() {
  if (!state.scanResults.length) {
    showToast('Tidak ada data untuk dihapus');
    return;
  }
  if (!confirm('Hapus semua hasil scan?')) return;

  state.scanResults = [];
  resultBox.innerHTML = 'Hasil scan akan muncul di sini...';
  copyBtn.disabled = true;
  exportBtn.disabled = true;
  updateStats();
  showToast('🗑️ Hasil scan dihapus');
  setStatus('🗑️ Hasil dihapus');
}

// ============================================
// HISTORY FUNCTION
// ============================================
function showHistory() {
  const modal = $('historyModal');
  const content = $('historyContent');

  if (!state.history.length) {
    content.textContent = 'Belum ada history scan.';
  } else {
    content.textContent = state.history.map((h, i) => 
      `--- Scan #${i+1} [${h.timestamp}] ---\n${h.text}\n`
    ).join('\n');
  }

  modal.classList.add('active');
}

function closeHistory() {
  $('historyModal').classList.remove('active');
}

// ============================================
// EVENT LISTENERS
// ============================================
scanBtn.addEventListener('click', doScan);
copyBtn.addEventListener('click', copyAll);
exportBtn.addEventListener('click', exportTxt);
clearBtn.addEventListener('click', clearResults);
historyBtn.addEventListener('click', showHistory);

// Close modal on outside click
$('historyModal').addEventListener('click', e => {
  if (e.target.id === 'historyModal') closeHistory();
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') doScan();
  if (e.key === 'Escape') closeHistory();
});

// ============================================
// INIT
// ============================================
window.addEventListener('load', () => {
  setStatus('✅ Siap - Klik SCAN untuk mulai (Ctrl+Enter)');
  updateStats();
});
</script>

</body>
</html>

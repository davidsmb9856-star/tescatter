<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>🐵 TAMPERMONKEY SCRIPT MANAGER</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --bg-dark: #020810;
  --bg-card: #061420;
  --bg-input: #0a1e30;
  --neon-blue: #00d4ff;
  --neon-cyan: #00fff7;
  --neon-glow: rgba(0, 212, 255, 0.4);
  --accent-green: #00ff88;
  --accent-red: #ff4757;
  --accent-orange: #ff9f43;
  --accent-purple: #a855f7;
  --border-color: rgba(0, 212, 255, 0.3);
  --text-primary: #e0f4ff;
  --text-muted: #6b8fa8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
}

/* ========== BACKGROUND EFFECTS ========== */
.bg-animated {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
  radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
  radial-gradient(ellipse at 50% 50%, rgba(0, 180, 255, 0.03) 0%, transparent 70%),
  var(--bg-dark);
}

.bg-grid {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(50px, 50px); }
}

.particle {
  position: fixed; width: 4px; height: 4px; background: var(--neon-blue);
  border-radius: 50%; pointer-events: none; z-index: -1;
  box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
  animation: floatParticle 15s infinite linear; opacity: 0.6;
}

@keyframes floatParticle {
  0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; } 90% { opacity: 0.6; }
  100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

.scan-line {
  position: fixed; top: 0; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), transparent);
  opacity: 0.4;
  animation: scanDown 12s linear infinite;
  z-index: 1; pointer-events: none;
  box-shadow: 0 0 15px var(--neon-blue);
}

@keyframes scanDown {
  0% { top: -10%; opacity: 0; }
  10% { opacity: 0.4; }
  90% { opacity: 0.4; }
  100% { top: 110%; opacity: 0; }
}

/* ========== CONTAINER ========== */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 15px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 2;
}

/* ========== HEADER ========== */
.header {
  text-align: center;
  margin-bottom: 28px;
  padding: 22px 15px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-blue), transparent);
  animation: glowLine 3.5s ease-in-out infinite;
  box-shadow: 0 0 15px var(--neon-blue);
}

@keyframes glowLine {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; box-shadow: 0 0 25px var(--neon-cyan), 0 0 45px var(--neon-blue); }
}

.back-btn {
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  padding: 9px 16px;
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 0.5px;
}

.back-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-50%) translateX(-3px);
  box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}

.judul-glow {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 900;
  text-align: center;
  color: var(--neon-cyan);
  letter-spacing: 3px;
  margin-bottom: 10px;
  text-shadow: 0 0 30px rgba(0, 255, 247, 0.3);
}

.subtitle {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 15px;
  font-weight: 500;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(0, 212, 255, 0.1);
  border: 1px solid var(--border-color);
  padding: 7px 16px;
  border-radius: 10px;
  font-size: 12px;
  color: var(--neon-blue);
  margin-top: 13px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
}

.status-dot {
  width: 9px; height: 9px;
  background: var(--neon-blue);
  border-radius: 50%;
  animation: pulse 2.2s infinite;
  box-shadow: 0 0 12px var(--neon-blue);
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.35); opacity: 0.75; }
}

/* ========== TOOLBAR ========== */
.toolbar {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  padding: 15px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 14px;
}

.search-box {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 400px;
}

.search-box input {
  width: 100%;
  padding: 11px 16px 11px 42px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  transition: all 0.3s ease;
}

.search-box input::placeholder { color: var(--text-muted); }

.search-box input:focus {
  outline: none;
  border-color: var(--neon-blue);
  box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
}

.search-box i {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--neon-blue);
  font-size: 15px;
}

.toolbar-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.toolbar-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  padding: 9px 16px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.toolbar-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
}

/* ========== STATS ========== */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 18px;
  flex-wrap: wrap;
  padding: 13px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  margin-bottom: 20px;
}

.stat-item {
  text-align: center;
  padding: 7px 18px;
  background: rgba(0, 212, 255, 0.08);
  border-radius: 10px;
  border: 1px solid var(--border-color);
}

.stat-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--accent-green);
  display: block;
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 3px;
}

/* ========== SCRIPT CARDS (1 CARD = 1 KOLOM = 1 SCRIPT UTUH) ========== */
.scripts-section {
  flex: 1;
}

.scripts-list {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.script-card {
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.8) 100%);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  padding: 22px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  animation: fadeInUp 0.4s ease-out;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 212, 255, 0.1);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.script-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: linear-gradient(to bottom, var(--neon-blue), var(--neon-cyan));
}

.script-card:hover {
  border-color: var(--neon-blue);
  transform: translateY(-2px);
  box-shadow: 0 15px 50px rgba(0, 212, 255, 0.3), inset 0 1px 0 rgba(0, 212, 255, 0.2);
}

.script-card:hover::before {
  width: 6px;
  box-shadow: 0 0 20px var(--neon-blue);
}

.script-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-color);
  flex-wrap: wrap;
  gap: 10px;
}

.script-card-title-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
}

.script-card-letter {
  background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
  color: var(--bg-dark);
  padding: 6px 14px;
  border-radius: 10px;
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 1px;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
}

.script-card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(14px, 2vw, 17px);
  font-weight: 700;
  color: var(--neon-cyan);
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  transition: color 0.3s ease;
}

.script-card-title:hover {
  color: var(--neon-blue);
}

.script-card-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.script-card-size {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--accent-green);
  background: rgba(0, 255, 136, 0.1);
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid rgba(0, 255, 136, 0.3);
  letter-spacing: 0.5px;
}

.script-card-edited {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent-orange);
  background: rgba(255, 159, 67, 0.1);
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid rgba(255, 159, 67, 0.3);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.script-card-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.script-action-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  padding: 9px 16px;
  border: 1px solid var(--border-color);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  color: var(--neon-blue);
}

.script-action-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
}

.script-action-btn.copy-btn {
  background: linear-gradient(135deg, rgba(0, 255, 136, 0.15) 0%, rgba(0, 204, 106, 0.08) 100%);
  border-color: rgba(0, 255, 136, 0.4);
  color: var(--accent-green);
}

.script-action-btn.copy-btn:hover {
  background: linear-gradient(135deg, var(--accent-green) 0%, #00cc6a 100%);
  border-color: var(--accent-green);
  color: var(--bg-dark);
  box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
}

.script-action-btn.edit-btn {
  background: linear-gradient(135deg, rgba(255, 159, 67, 0.15) 0%, rgba(230, 138, 58, 0.08) 100%);
  border-color: rgba(255, 159, 67, 0.4);
  color: var(--accent-orange);
}

.script-action-btn.edit-btn:hover {
  background: linear-gradient(135deg, var(--accent-orange) 0%, #e68a3a 100%);
  border-color: var(--accent-orange);
  color: var(--bg-dark);
  box-shadow: 0 5px 20px rgba(255, 159, 67, 0.4);
}

.script-action-btn.view-btn {
  background: linear-gradient(135deg, rgba(168, 85, 247, 0.15) 0%, rgba(147, 51, 234, 0.08) 100%);
  border-color: rgba(168, 85, 247, 0.4);
  color: var(--accent-purple);
}

.script-action-btn.view-btn:hover {
  background: linear-gradient(135deg, var(--accent-purple) 0%, #9333ea 100%);
  border-color: var(--accent-purple);
  color: white;
  box-shadow: 0 5px 20px rgba(168, 85, 247, 0.4);
}

.script-action-btn.reset-btn {
  background: linear-gradient(135deg, rgba(255, 71, 87, 0.1) 0%, rgba(204, 51, 68, 0.05) 100%);
  border-color: rgba(255, 71, 87, 0.3);
  color: var(--accent-red);
  font-size: 12px;
  padding: 7px 12px;
}

.script-action-btn.reset-btn:hover {
  background: linear-gradient(135deg, var(--accent-red) 0%, #cc3344 100%);
  border-color: var(--accent-red);
  color: white;
  box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
}

.script-preview {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-muted);
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 16px;
  max-height: 180px;
  overflow: hidden;
  position: relative;
  white-space: pre-wrap;
  word-break: break-all;
  transition: max-height 0.4s ease;
}

.script-preview::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 50px;
  background: linear-gradient(transparent, var(--bg-input));
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.script-preview.expanded {
  max-height: 2000px;
}

.script-preview.expanded::after {
  opacity: 0;
}

.toggle-preview {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--neon-blue);
  background: none;
  border: none;
  cursor: pointer;
  margin-top: 8px;
  padding: 4px 8px;
  transition: color 0.2s ease;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.toggle-preview:hover { color: var(--neon-cyan); }

/* ========== MODAL ========== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(2, 8, 16, 0.92);
  z-index: 10000;
  justify-content: center;
  align-items: center;
  padding: 20px;
  backdrop-filter: blur(8px);
}

.modal-overlay.active { display: flex; }

.modal {
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.98) 100%);
  border: 1px solid var(--neon-blue);
  border-radius: 20px;
  width: 100%;
  max-width: 900px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0, 212, 255, 0.3);
  animation: fadeInUp 0.3s ease-out;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.modal-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  color: var(--neon-cyan);
  font-weight: 700;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.modal-close {
  background: none;
  border: none;
  color: var(--neon-blue);
  font-size: 28px;
  cursor: pointer;
  transition: all 0.3s ease;
  line-height: 1;
}

.modal-close:hover {
  color: var(--accent-red);
  transform: rotate(90deg);
}

.modal-body {
  padding: 20px 24px;
  overflow-y: auto;
  flex: 1;
}

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border-color);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.modal-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--neon-blue);
  margin-bottom: 8px;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.modal-input, .modal-textarea {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.3s ease;
  margin-bottom: 16px;
}

.modal-textarea {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  min-height: 350px;
  resize: vertical;
  line-height: 1.6;
  white-space: pre;
  word-break: break-all;
}

.modal-input:focus, .modal-textarea:focus {
  outline: none;
  border-color: var(--neon-blue);
  box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
}

.modal-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 22px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 7px;
}

.modal-btn.primary {
  background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
  color: var(--bg-dark);
}

.modal-btn.primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
}

.modal-btn.success {
  background: linear-gradient(135deg, var(--accent-green) 0%, #00cc6a 100%);
  color: var(--bg-dark);
}

.modal-btn.success:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4);
}

.modal-btn.danger {
  background: linear-gradient(135deg, var(--accent-red) 0%, #cc3344 100%);
  color: white;
}

.modal-btn.danger:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(255, 71, 87, 0.4);
}

.modal-btn.secondary {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  color: var(--neon-blue);
}

.modal-btn.secondary:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
}

/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.95) 100%);
  border: 1px solid var(--neon-blue);
  border-radius: 12px;
  padding: 15px 30px;
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  z-index: 99999;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ========== LOADING & STATES ========== */
.loading, .no-data, .error-msg {
  text-align: center;
  padding: 55px 22px;
}

.loading { color: var(--neon-blue); }

.loading-spinner {
  width: 46px;
  height: 46px;
  border: 4px solid rgba(0, 212, 255, 0.2);
  border-top-color: var(--neon-blue);
  border-radius: 50%;
  animation: spin 0.95s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  color: var(--text-primary);
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-color);
  padding: 35px;
}

.empty-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-muted);
}

.empty-state i {
  font-size: 48px;
  margin-bottom: 15px;
  opacity: 0.5;
  display: block;
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }

::selection { background: rgba(0, 212, 255, 0.3); color: var(--text-primary); }

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .container { padding: 14px 11px; }
  .judul-glow { font-size: clamp(1.2rem, 5vw, 1.6rem); }
  .toolbar { flex-direction: column; align-items: stretch; }
  .search-box { max-width: 100%; }
  .script-card { padding: 16px; }
  .script-card-header { flex-direction: column; align-items: flex-start; }
  .script-card-actions { width: 100%; }
  .script-action-btn { flex: 1; justify-content: center; font-size: 12px; padding: 8px 10px; }
  .modal { max-height: 95vh; }
  .modal-body { padding: 15px; }
  .modal-textarea { min-height: 250px; }
  .stats-bar { flex-direction: column; gap: 10px; }
}

/* ========== ACCESSIBILITY ========== */
button:focus-visible, input:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--neon-blue);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="bg-animated"></div>
<div class="bg-grid"></div>
<div id="particles"></div>
<div class="scan-line"></div>
<div id="toast" class="toast"></div>

<div class="container">
  <header class="header">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Kembali
    </a>
    <h1 class="judul-glow">🐵 TAMPERMONKEY SCRIPT</h1>
    <p class="subtitle">Manager & Editor Script Tampermonkey - 1 Kolom = 1 Script Utuh</p>
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="🔍 Cari script..." oninput="renderScripts()">
    </div>
    <div class="toolbar-actions">
      <button class="toolbar-btn" onclick="refreshData()" title="Refresh data">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
      <button class="toolbar-btn" onclick="exportAll()" title="Export semua script">
        <i class="fas fa-download"></i> Export All
      </button>
      <button class="toolbar-btn" onclick="copyAllVisible()" title="Copy semua script yang tampil">
        <i class="fas fa-copy"></i> Copy All
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-value" id="totalScripts">0</span>
      <span class="stat-label">Total Script</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="totalSize">0 KB</span>
      <span class="stat-label">Total Ukuran</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="editedCount">0</span>
      <span class="stat-label">Sudah Diedit</span>
    </div>
  </div>

  <!-- Scripts List -->
  <div class="scripts-section">
    <div class="scripts-list" id="scriptsList">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>⏳ Memuat data dari Google Sheets...</p>
      </div>
    </div>
  </div>
</div>

<!-- EDIT SCRIPT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <i class="fas fa-code"></i>
        <span id="editModalTitle">Edit Script</span>
      </div>
      <button class="modal-close" onclick="closeEditModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-label">
        <i class="fas fa-heading"></i> Judul Script
      </div>
      <input type="text" class="modal-input" id="editScriptTitle" placeholder="Nama script...">
      
      <div class="modal-label">
        <i class="fas fa-code"></i> Kode Script (1 Script Utuh)
      </div>
      <textarea class="modal-textarea" id="editScriptCode" placeholder="// Paste script tampermonkey utuh di sini..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="modal-btn secondary" onclick="closeEditModal()">
        <i class="fas fa-times"></i> Batal
      </button>
      <button class="modal-btn success" onclick="saveScript()">
        <i class="fas fa-save"></i> Simpan
      </button>
    </div>
  </div>
</div>

<!-- VIEW SCRIPT MODAL -->
<div class="modal-overlay" id="viewModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <i class="fas fa-eye"></i>
        <span id="viewModalTitle">Lihat Script</span>
      </div>
      <button class="modal-close" onclick="closeViewModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-label">
        <i class="fas fa-code"></i> Kode Script Lengkap
      </div>
      <textarea class="modal-textarea" id="viewScriptCode" readonly style="min-height: 450px;"></textarea>
    </div>
    <div class="modal-footer">
      <button class="modal-btn secondary" onclick="closeViewModal()">
        <i class="fas fa-times"></i> Tutup
      </button>
      <button class="modal-btn success" onclick="copyViewScript()">
        <i class="fas fa-copy"></i> Copy Script
      </button>
    </div>
  </div>
</div>

<script>
// ================= CONFIG =================
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1904811091';
const RANGE = 'A1:AQ10000';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

// ================= STATE =================
// Setiap kolom = 1 script utuh (gabungan semua baris di kolom tsb)
let scriptsData = []; // Array of { letter, title, content (original), size }
let customTitles = {}; // localStorage
let customScripts = {}; // localStorage: key = column letter, value = full script content
let editingColLetter = null;

// ================= INIT =================
document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  loadLocalData();
  loadSheetData();
  setTimeout(() => showToast('🐵 Tampermonkey Script Manager Ready!'), 800);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeEditModal();
    closeViewModal();
  }
});

// ================= PARTICLES =================
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  container.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 15 + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    container.appendChild(particle);
  }
}

// ================= TOAST =================
function showToast(message) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ================= LOCAL STORAGE =================
function loadLocalData() {
  try {
    customTitles = JSON.parse(localStorage.getItem('tm_custom_titles') || '{}');
    customScripts = JSON.parse(localStorage.getItem('tm_custom_scripts') || '{}');
  } catch (e) {
    customTitles = {};
    customScripts = {};
  }
}

function saveLocalData() {
  localStorage.setItem('tm_custom_titles', JSON.stringify(customTitles));
  localStorage.setItem('tm_custom_scripts', JSON.stringify(customScripts));
}

// ================= COLUMN LETTER HELPER =================
function getColumnLetter(index) {
  let letter = '';
  let n = index;
  while (n >= 0) {
    letter = String.fromCharCode(65 + (n % 26)) + letter;
    n = Math.floor(n / 26) - 1;
  }
  return letter;
}

// ================= DATA LOADING =================
async function loadSheetData() {
  try {
    const response = await fetch(DATA_URL);
    const text = await response.text();
    const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (!jsonMatch) throw new Error('Gagal parse data');
    
    const data = JSON.parse(jsonMatch[1]);
    const rows = data.table?.rows || [];
    
    if (rows.length === 0) throw new Error('Data kosong');
    
    const firstRow = rows[0].c || [];
    const columnCount = firstRow.length;
    
    scriptsData = [];
    
    // Proses setiap kolom: gabungkan semua baris (row 1+) jadi 1 script utuh
    for (let col = 0; col < columnCount; col++) {
      const letter = getColumnLetter(col);
      const titleCell = firstRow[col]?.v;
      const title = titleCell ? titleCell.toString().trim() : `Script ${letter}`;
      
      // Gabungkan semua baris di kolom ini (row 1 sampai akhir) jadi 1 string
      let combinedContent = '';
      for (let row = 1; row < rows.length; row++) {
        const cells = rows[row].c || [];
        const cellValue = cells[col]?.v;
        if (cellValue && cellValue.toString().trim() !== '') {
          const line = cellValue.toString();
          if (combinedContent === '') {
            combinedContent = line;
          } else {
            combinedContent += '\n' + line;
          }
        }
      }
      
      // Hanya tambahkan kolom yang punya isi
      if (combinedContent.trim() !== '') {
        scriptsData.push({
          letter: letter,
          title: title,
          content: combinedContent,
          size: combinedContent.length
        });
      }
    }
    
    renderScripts();
    updateStats();
    showToast(`✅ ${scriptsData.length} script berhasil dimuat!`);
  } catch (error) {
    console.error('Error loading data:', error);
    document.getElementById('scriptsList').innerHTML = `
      <div class="error-msg">
        <i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 15px; color: var(--accent-red); display:block;"></i>
        <p><strong>⚠️ Gagal memuat data</strong></p>
        <p style="font-size: 12px; margin-top: 10px; color: var(--text-muted);">Pastikan Google Sheet sudah dipublikasikan</p>
        <p style="font-size: 11px; margin-top: 12px; opacity: 0.7;">${error.message}</p>
        <button class="modal-btn primary" style="margin-top:15px;" onclick="loadSheetData()">
          <i class="fas fa-redo"></i> Coba Lagi
        </button>
      </div>`;
  }
}

function refreshData() {
  showToast('🔄 Memuat ulang data...');
  loadSheetData();
}

// ================= GET SCRIPT CONTENT (with custom override) =================
function getScriptContent(letter, originalContent) {
  return customScripts[letter] !== undefined ? customScripts[letter] : originalContent;
}

// ================= RENDER SCRIPTS =================
function renderScripts() {
  const list = document.getElementById('scriptsList');
  if (scriptsData.length === 0) {
    list.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Tidak ada script ditemukan</p></div>';
    return;
  }
  
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  
  let filtered = scriptsData;
  if (query) {
    filtered = scriptsData.filter(s => {
      const title = customTitles[s.letter] || s.title;
      const content = getScriptContent(s.letter, s.content);
      return title.toLowerCase().includes(query) || content.toLowerCase().includes(query);
    });
  }
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>Tidak ada script yang cocok</p></div>';
    return;
  }
  
  let html = '';
  filtered.forEach((item, idx) => {
    const title = customTitles[item.letter] || item.title;
    const content = getScriptContent(item.letter, item.content);
    const hasCustom = customScripts[item.letter] !== undefined;
    const hasCustomTitle = customTitles[item.letter] !== undefined;
    const sizeKB = (content.length / 1024).toFixed(1);
    const preview = content.length > 800 ? content.substring(0, 800) + '...' : content;
    
    html += `
      <div class="script-card" style="animation-delay: ${idx * 0.05}s">
        <div class="script-card-header">
          <div class="script-card-title-wrap">
            <span class="script-card-letter">${item.letter}</span>
            <span class="script-card-title" onclick="editTitle('${item.letter}')" title="Klik untuk edit judul${hasCustomTitle ? ' (sudah diedit)' : ''}">
              ${escapeHtml(title)} ${hasCustomTitle ? '<i class="fas fa-pen-fancy" style="font-size:10px; color:var(--accent-orange);"></i>' : ''}
            </span>
          </div>
          <div class="script-card-meta">
            <span class="script-card-size"><i class="fas fa-database"></i> ${sizeKB} KB</span>
            ${hasCustom ? '<span class="script-card-edited"><i class="fas fa-pen-fancy"></i> Edited</span>' : ''}
          </div>
        </div>
        
        <div class="script-preview" id="preview-${item.letter}">${escapeHtml(preview)}</div>
        ${content.length > 800 ? `<button class="toggle-preview" onclick="togglePreview('${item.letter}')">
          <i class="fas fa-chevron-down"></i> Lihat selengkapnya
        </button>` : ''}
        
        <div class="script-card-actions" style="margin-top: 14px;">
          <button class="script-action-btn view-btn" onclick="viewScript('${item.letter}')" title="Lihat full script">
            <i class="fas fa-eye"></i> View
          </button>
          <button class="script-action-btn copy-btn" onclick="copyScript('${item.letter}')" title="Copy seluruh script sekaligus">
            <i class="fas fa-copy"></i> Copy Script
          </button>
          <button class="script-action-btn edit-btn" onclick="editScript('${item.letter}')" title="Edit script">
            <i class="fas fa-edit"></i> Edit
          </button>
          ${hasCustom ? `<button class="script-action-btn reset-btn" onclick="resetScript('${item.letter}')" title="Reset ke original">
            <i class="fas fa-undo"></i> Reset
          </button>` : ''}
        </div>
      </div>`;
  });
  
  list.innerHTML = html;
  updateStats();
}

// ================= TOGGLE PREVIEW =================
function togglePreview(letter) {
  const preview = document.getElementById(`preview-${letter}`);
  const btn = preview.nextElementSibling;
  const item = scriptsData.find(s => s.letter === letter);
  if (!item) return;
  
  const content = getScriptContent(letter, item.content);
  
  if (preview.classList.contains('expanded')) {
    preview.classList.remove('expanded');
    preview.textContent = content.substring(0, 800) + '...';
    btn.innerHTML = '<i class="fas fa-chevron-down"></i> Lihat selengkapnya';
  } else {
    preview.classList.add('expanded');
    preview.textContent = content;
    btn.innerHTML = '<i class="fas fa-chevron-up"></i> Sembunyikan';
  }
}

// ================= COPY SCRIPT =================
async function copyScript(letter) {
  const item = scriptsData.find(s => s.letter === letter);
  if (!item) return;
  
  const content = getScriptContent(letter, item.content);
  
  try {
    await navigator.clipboard.writeText(content);
    showToast(`✅ Script ${letter} (${(content.length/1024).toFixed(1)} KB) berhasil disalin!`);
  } catch {
    fallbackCopy(content);
  }
}

// ================= COPY ALL VISIBLE =================
async function copyAllVisible() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = scriptsData;
  if (query) {
    filtered = scriptsData.filter(s => {
      const title = customTitles[s.letter] || s.title;
      const content = getScriptContent(s.letter, s.content);
      return title.toLowerCase().includes(query) || content.toLowerCase().includes(query);
    });
  }
  
  if (filtered.length === 0) {
    showToast('⚠️ Tidak ada script untuk dicopy');
    return;
  }
  
  let combined = '';
  filtered.forEach((item, idx) => {
    const title = customTitles[item.letter] || item.title;
    const content = getScriptContent(item.letter, item.content);
    combined += `// ========================================\n`;
    combined += `// SCRIPT ${item.letter}: ${title}\n`;
    combined += `// ========================================\n\n`;
    combined += content;
    if (idx < filtered.length - 1) combined += '\n\n\n';
  });
  
  try {
    await navigator.clipboard.writeText(combined);
    showToast(`✅ ${filtered.length} script berhasil disalin sekaligus!`);
  } catch {
    fallbackCopy(combined);
  }
}

// ================= VIEW SCRIPT =================
function viewScript(letter) {
  const item = scriptsData.find(s => s.letter === letter);
  if (!item) return;
  
  const title = customTitles[letter] || item.title;
  const content = getScriptContent(letter, item.content);
  
  document.getElementById('viewModalTitle').textContent = `Script ${letter} - ${title}`;
  document.getElementById('viewScriptCode').value = content;
  document.getElementById('viewModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeViewModal() {
  document.getElementById('viewModal').classList.remove('active');
  document.body.style.overflow = '';
}

async function copyViewScript() {
  const code = document.getElementById('viewScriptCode').value;
  try {
    await navigator.clipboard.writeText(code);
    showToast('✅ Script berhasil disalin!');
  } catch {
    fallbackCopy(code);
  }
}

// ================= EDIT SCRIPT =================
function editScript(letter) {
  const item = scriptsData.find(s => s.letter === letter);
  if (!item) return;
  
  editingColLetter = letter;
  const title = customTitles[letter] || item.title;
  const content = getScriptContent(letter, item.content);
  
  document.getElementById('editModalTitle').textContent = `Edit Script ${letter} - ${title}`;
  document.getElementById('editScriptTitle').value = title;
  document.getElementById('editScriptCode').value = content;
  document.getElementById('editModal').classList.add('active');
  document.body.style.overflow = 'hidden';
  
  setTimeout(() => document.getElementById('editScriptCode').focus(), 100);
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
  document.body.style.overflow = '';
  editingColLetter = null;
}

function saveScript() {
  if (!editingColLetter) return;
  
  const newTitle = document.getElementById('editScriptTitle').value.trim();
  const newCode = document.getElementById('editScriptCode').value;
  
  // Save title
  const item = scriptsData.find(s => s.letter === editingColLetter);
  if (newTitle && item && newTitle !== item.title) {
    customTitles[editingColLetter] = newTitle;
  } else if (customTitles[editingColLetter] !== undefined && (!newTitle || newTitle === item?.title)) {
    delete customTitles[editingColLetter];
  }
  
  // Save script content
  if (newCode.trim() === '' || (item && newCode === item.content)) {
    delete customScripts[editingColLetter];
  } else {
    customScripts[editingColLetter] = newCode;
  }
  
  saveLocalData();
  closeEditModal();
  renderScripts();
  showToast('✅ Script berhasil disimpan!');
}

// ================= EDIT TITLE (quick) =================
function editTitle(letter) {
  const item = scriptsData.find(s => s.letter === letter);
  if (!item) return;
  
  const currentTitle = customTitles[letter] || item.title;
  const newTitle = prompt(`Edit judul script ${letter}:`, currentTitle);
  
  if (newTitle === null) return; // cancelled
  if (newTitle.trim() === '') {
    delete customTitles[letter];
  } else {
    customTitles[letter] = newTitle.trim();
  }
  
  saveLocalData();
  renderScripts();
  showToast('✅ Judul berhasil diubah!');
}

// ================= RESET SCRIPT =================
function resetScript(letter) {
  if (!confirm(`Reset script ${letter} ke versi original dari Google Sheets?`)) return;
  
  delete customScripts[letter];
  saveLocalData();
  renderScripts();
  showToast(`✅ Script ${letter} direset ke original!`);
}

// ================= EXPORT =================
function exportAll() {
  if (scriptsData.length === 0) {
    showToast('⚠️ Tidak ada script untuk diexport');
    return;
  }
  
  let content = `// ========================================\n`;
  content += `// TAMPERMONKEY SCRIPT EXPORT\n`;
  content += `// Exported: ${new Date().toLocaleString('id-ID')}\n`;
  content += `// Total: ${scriptsData.length} script\n`;
  content += `// ========================================\n\n\n`;
  
  scriptsData.forEach((item, idx) => {
    const title = customTitles[item.letter] || item.title;
    const scriptContent = getScriptContent(item.letter, item.content);
    
    content += `// ========================================\n`;
    content += `// SCRIPT ${item.letter}: ${title}\n`;
    content += `// Size: ${(scriptContent.length/1024).toFixed(1)} KB\n`;
    content += `// ========================================\n\n`;
    content += scriptContent;
    if (idx < scriptsData.length - 1) content += '\n\n\n';
  });
  
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tampermonkey_scripts_${new Date().getTime()}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  showToast('✅ File export berhasil diunduh!');
}

// ================= UPDATE STATS =================
function updateStats() {
  document.getElementById('totalScripts').textContent = scriptsData.length;
  
  let totalSize = 0;
  let editedCount = 0;
  scriptsData.forEach(item => {
    const content = getScriptContent(item.letter, item.content);
    totalSize += content.length;
    if (customScripts[item.letter] !== undefined) editedCount++;
  });
  
  const sizeKB = totalSize / 1024;
  document.getElementById('totalSize').textContent = sizeKB > 1024 
    ? (sizeKB / 1024).toFixed(2) + ' MB' 
    : sizeKB.toFixed(1) + ' KB';
  document.getElementById('editedCount').textContent = editedCount;
}

// ================= HELPERS =================
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('✅ Disalin!');
  } catch {
    showToast('❗ Gagal menyalin');
  }
  document.body.removeChild(textarea);
}
</script>
</body>
</html>

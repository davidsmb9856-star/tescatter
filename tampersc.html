<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>🐵 TAMPERMONKEY SCRIPT MANAGER</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --bg-dark: #020810;
  --bg-card: #061420;
  --bg-input: #0a1e30;
  --neon-blue: #00d4ff;
  --neon-cyan: #00fff7;
  --neon-glow: rgba(0, 212, 255, 0.4);
  --accent-green: #00ff88;
  --accent-red: #ff4757;
  --accent-orange: #ff9f43;
  --accent-purple: #a855f7;
  --border-color: rgba(0, 212, 255, 0.3);
  --text-primary: #e0f4ff;
  --text-muted: #6b8fa8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
}

/* ========== BACKGROUND EFFECTS ========== */
.bg-animated {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
  radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
  radial-gradient(ellipse at 50% 50%, rgba(0, 180, 255, 0.03) 0%, transparent 70%),
  var(--bg-dark);
}

.bg-grid {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(50px, 50px); }
}

.particle {
  position: fixed; width: 4px; height: 4px; background: var(--neon-blue);
  border-radius: 50%; pointer-events: none; z-index: -1;
  box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
  animation: floatParticle 15s infinite linear; opacity: 0.6;
}

@keyframes floatParticle {
  0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; } 90% { opacity: 0.6; }
  100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

.scan-line {
  position: fixed; top: 0; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), transparent);
  opacity: 0.4;
  animation: scanDown 12s linear infinite;
  z-index: 1; pointer-events: none;
  box-shadow: 0 0 15px var(--neon-blue);
}

@keyframes scanDown {
  0% { top: -10%; opacity: 0; }
  10% { opacity: 0.4; }
  90% { opacity: 0.4; }
  100% { top: 110%; opacity: 0; }
}

/* ========== CONTAINER ========== */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 15px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 2;
}

/* ========== HEADER ========== */
.header {
  text-align: center;
  margin-bottom: 28px;
  padding: 22px 15px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-blue), transparent);
  animation: glowLine 3.5s ease-in-out infinite;
  box-shadow: 0 0 15px var(--neon-blue);
}

@keyframes glowLine {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; box-shadow: 0 0 25px var(--neon-cyan), 0 0 45px var(--neon-blue); }
}

.back-btn {
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  padding: 9px 16px;
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 0.5px;
}

.back-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-50%) translateX(-3px);
  box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}

.judul-glow {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 900;
  text-align: center;
  color: var(--neon-cyan);
  letter-spacing: 3px;
  margin-bottom: 10px;
  text-shadow: 0 0 30px rgba(0, 255, 247, 0.3);
}

.subtitle {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 15px;
  font-weight: 500;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(0, 212, 255, 0.1);
  border: 1px solid var(--border-color);
  padding: 7px 16px;
  border-radius: 10px;
  font-size: 12px;
  color: var(--neon-blue);
  margin-top: 13px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
}

.status-dot {
  width: 9px; height: 9px;
  background: var(--neon-blue);
  border-radius: 50%;
  animation: pulse 2.2s infinite;
  box-shadow: 0 0 12px var(--neon-blue);
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.35); opacity: 0.75; }
}

/* ========== TOOLBAR ========== */
.toolbar {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  padding: 15px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 14px;
}

.search-box {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 400px;
}

.search-box input {
  width: 100%;
  padding: 11px 16px 11px 42px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  transition: all 0.3s ease;
}

.search-box input::placeholder { color: var(--text-muted); }

.search-box input:focus {
  outline: none;
  border-color: var(--neon-blue);
  box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
}

.search-box i {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--neon-blue);
  font-size: 15px;
}

.toolbar-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.toolbar-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  padding: 9px 16px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.toolbar-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
}

/* ========== STATS ========== */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 18px;
  flex-wrap: wrap;
  padding: 13px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  margin-bottom: 20px;
}

.stat-item {
  text-align: center;
  padding: 7px 18px;
  background: rgba(0, 212, 255, 0.08);
  border-radius: 10px;
  border: 1px solid var(--border-color);
}

.stat-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--accent-green);
  display: block;
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 3px;
}

/* ========== SCRIPT CARDS ========== */
.scripts-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  padding: 12px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  flex-wrap: wrap;
  gap: 10px;
}

.scripts-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  color: var(--neon-cyan);
  font-weight: 700;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.scripts-title .col-letter {
  background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
  color: var(--bg-dark);
  padding: 4px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 800;
}

.scripts-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.script-card {
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.8) 100%);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 20px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  animation: fadeInUp 0.4s ease-out;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(0, 212, 255, 0.1);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.script-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: linear-gradient(to bottom, var(--neon-blue), var(--neon-cyan));
}

.script-card:hover {
  border-color: var(--neon-blue);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0, 212, 255, 0.25), inset 0 1px 0 rgba(0, 212, 255, 0.2);
}

.script-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-color);
  flex-wrap: wrap;
  gap: 10px;
}

.script-card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--neon-cyan);
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  flex: 1;
  min-width: 200px;
}

.script-card-index {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--neon-blue);
  background: rgba(0, 212, 255, 0.1);
  padding: 4px 10px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  letter-spacing: 1px;
  flex-shrink: 0;
}

.script-card-name {
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 500px;
}

.script-card-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.meta-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  background: rgba(168, 85, 247, 0.15);
  color: var(--accent-purple);
  border: 1px solid rgba(168, 85, 247, 0.3);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.script-card-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.script-action-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 12px;
  padding: 7px 14px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  color: var(--neon-blue);
}

.script-action-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
}

.script-action-btn.copy-btn:hover {
  background: linear-gradient(135deg, var(--accent-green) 0%, #00cc6a 100%);
  border-color: var(--accent-green);
  color: var(--bg-dark);
}

.script-action-btn.edit-btn:hover {
  background: linear-gradient(135deg, var(--accent-orange) 0%, #e68a3a 100%);
  border-color: var(--accent-orange);
  color: var(--bg-dark);
}

.script-action-btn.view-btn:hover {
  background: linear-gradient(135deg, var(--accent-purple) 0%, #9333ea 100%);
  border-color: var(--accent-purple);
  color: white;
}

/* ========== CELL PREVIEW ========== */
.cell-preview {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 10px;
}

.cell-item {
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 10px 12px;
  position: relative;
  overflow: hidden;
}

.cell-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--neon-blue);
}

.cell-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--neon-blue);
  letter-spacing: 1px;
  margin-bottom: 4px;
  text-transform: uppercase;
}

.cell-content {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  line-height: 1.5;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 80px;
  overflow: hidden;
  position: relative;
}

.cell-content.expanded {
  max-height: none;
}

.cell-content::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 25px;
  background: linear-gradient(transparent, var(--bg-input));
  pointer-events: none;
}

.cell-content.expanded::after { display: none; }

.toggle-cell {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--neon-blue);
  background: none;
  border: none;
  cursor: pointer;
  margin-top: 4px;
  padding: 2px 6px;
  transition: color 0.2s ease;
}

.toggle-cell:hover { color: var(--neon-cyan); }

/* ========== MODAL ========== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(2, 8, 16, 0.92);
  z-index: 10000;
  justify-content: center;
  align-items: center;
  padding: 20px;
  backdrop-filter: blur(8px);
}

.modal-overlay.active { display: flex; }

.modal {
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.98) 100%);
  border: 1px solid var(--neon-blue);
  border-radius: 20px;
  width: 100%;
  max-width: 900px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0, 212, 255, 0.3);
  animation: fadeInUp 0.3s ease-out;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.modal-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  color: var(--neon-cyan);
  font-weight: 700;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.modal-close {
  background: none;
  border: none;
  color: var(--neon-blue);
  font-size: 28px;
  cursor: pointer;
  transition: all 0.3s ease;
  line-height: 1;
}

.modal-close:hover {
  color: var(--accent-red);
  transform: rotate(90deg);
}

.modal-body {
  padding: 20px 24px;
  overflow-y: auto;
  flex: 1;
}

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border-color);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.modal-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--neon-blue);
  margin-bottom: 8px;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 6px;
  text-transform: uppercase;
}

.modal-textarea {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 400;
  transition: all 0.3s ease;
  margin-bottom: 16px;
  min-height: 150px;
  resize: vertical;
  line-height: 1.6;
  white-space: pre;
  word-break: break-all;
}

.modal-textarea:focus {
  outline: none;
  border-color: var(--neon-blue);
  box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
}

.modal-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 22px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 7px;
}

.modal-btn.primary {
  background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
  color: var(--bg-dark);
}

.modal-btn.primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
}

.modal-btn.success {
  background: linear-gradient(135deg, var(--accent-green) 0%, #00cc6a 100%);
  color: var(--bg-dark);
}

.modal-btn.success:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4);
}

.modal-btn.secondary {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  color: var(--neon-blue);
}

.modal-btn.secondary:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
}

/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.95) 100%);
  border: 1px solid var(--neon-blue);
  border-radius: 12px;
  padding: 15px 30px;
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  z-index: 99999;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ========== LOADING & STATES ========== */
.loading, .no-data, .error-msg {
  text-align: center;
  padding: 55px 22px;
}

.loading { color: var(--neon-blue); }

.loading-spinner {
  width: 46px;
  height: 46px;
  border: 4px solid rgba(0, 212, 255, 0.2);
  border-top-color: var(--neon-blue);
  border-radius: 50%;
  animation: spin 0.95s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  color: var(--text-primary);
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-color);
  padding: 35px;
}

.empty-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-muted);
}

.empty-state i {
  font-size: 48px;
  margin-bottom: 15px;
  opacity: 0.5;
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }

::selection { background: rgba(0, 212, 255, 0.3); color: var(--text-primary); }

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .container { padding: 14px 11px; }
  .judul-glow { font-size: clamp(1.2rem, 5vw, 1.6rem); }
  .toolbar { flex-direction: column; align-items: stretch; }
  .search-box { max-width: 100%; }
  .scripts-header { flex-direction: column; align-items: flex-start; }
  .script-card { padding: 15px; }
  .script-card-header { flex-direction: column; align-items: flex-start; }
  .script-card-actions { width: 100%; }
  .script-action-btn { flex: 1; justify-content: center; }
  .script-card-name { max-width: 100%; }
  .modal { max-height: 95vh; }
  .modal-body { padding: 15px; }
  .modal-textarea { min-height: 120px; font-size: 11px; }
  .stats-bar { flex-direction: column; gap: 10px; }
}

/* ========== ACCESSIBILITY ========== */
button:focus-visible, input:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--neon-blue);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="bg-animated"></div>
<div class="bg-grid"></div>
<div id="particles"></div>
<div class="scan-line"></div>
<div id="toast" class="toast"></div>

<div class="container">
  <header class="header">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Kembali
    </a>
    <h1 class="judul-glow">🐵 TAMPERMONKEY SCRIPT</h1>
    <p class="subtitle">Manager & Editor Script Tampermonkey</p>
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="🔍 Cari script..." oninput="filterScripts()">
    </div>
    <div class="toolbar-actions">
      <button class="toolbar-btn" onclick="refreshData()" title="Refresh data">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
      <button class="toolbar-btn" onclick="exportAll()" title="Export semua script">
        <i class="fas fa-download"></i> Export
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-value" id="totalScripts">0</span>
      <span class="stat-label">Total Script</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="totalColumns">0</span>
      <span class="stat-label">Kolom per Script</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="displayedScripts">0</span>
      <span class="stat-label">Ditampilkan</span>
    </div>
  </div>

  <!-- Scripts Section -->
  <div class="scripts-section">
    <div class="scripts-header">
      <div class="scripts-title">
        <span class="col-letter">📜</span>
        <span>DAFTAR SCRIPT</span>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="toolbar-btn" onclick="copyAllScripts()" title="Copy semua script sekaligus">
          <i class="fas fa-copy"></i> Copy Semua
        </button>
      </div>
    </div>
    <div class="scripts-list" id="scriptsList">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>⏳ Memuat data dari Google Sheets...</p>
      </div>
    </div>
  </div>
</div>

<!-- VIEW SCRIPT MODAL -->
<div class="modal-overlay" id="viewModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <i class="fas fa-eye"></i>
        <span id="viewModalTitle">Lihat Script</span>
      </div>
      <button class="modal-close" onclick="closeViewModal()">&times;</button>
    </div>
    <div class="modal-body" id="viewModalBody"></div>
    <div class="modal-footer">
      <button class="modal-btn secondary" onclick="closeViewModal()">
        <i class="fas fa-times"></i> Tutup
      </button>
      <button class="modal-btn success" onclick="copyViewScript()">
        <i class="fas fa-copy"></i> Copy Semua
      </button>
    </div>
  </div>
</div>

<!-- EDIT SCRIPT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <i class="fas fa-code"></i>
        <span id="editModalTitle">Edit Script</span>
      </div>
      <button class="modal-close" onclick="closeEditModal()">&times;</button>
    </div>
    <div class="modal-body" id="editModalBody"></div>
    <div class="modal-footer">
      <button class="modal-btn secondary" onclick="closeEditModal()">
        <i class="fas fa-times"></i> Batal
      </button>
      <button class="modal-btn success" onclick="saveScript()">
        <i class="fas fa-save"></i> Simpan
      </button>
    </div>
  </div>
</div>

<script>
// ================= CONFIG =================
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1904811091';
const RANGE = 'A1:AQ10000';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

// ================= STATE =================
let columnTitles = [];     // Array of column titles (A1, B1, C1, ...)
let scriptRows = [];       // Array of rows, each row is array of cells [A2, B2, C2, ...]
let editingRowIndex = -1;
let viewingRowIndex = -1;
let customScripts = {};    // localStorage custom scripts (overrides)

// ================= INIT =================
document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  loadLocalData();
  loadSheetData();
  setTimeout(() => showToast('🐵 Tampermonkey Script Manager Ready!'), 800);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeEditModal();
    closeViewModal();
  }
});

// ================= PARTICLES =================
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  container.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 15 + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    container.appendChild(particle);
  }
}

// ================= TOAST =================
function showToast(message) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ================= LOCAL STORAGE =================
function loadLocalData() {
  try {
    customScripts = JSON.parse(localStorage.getItem('tm_custom_scripts_v2') || '{}');
  } catch (e) {
    customScripts = {};
  }
}

function saveLocalData() {
  localStorage.setItem('tm_custom_scripts_v2', JSON.stringify(customScripts));
}

// ================= COLUMN LETTER HELPER =================
function getColumnLetter(index) {
  let letter = '';
  let n = index;
  while (n >= 0) {
    letter = String.fromCharCode(65 + (n % 26)) + letter;
    n = Math.floor(n / 26) - 1;
  }
  return letter;
}

// ================= DATA LOADING =================
async function loadSheetData() {
  try {
    const response = await fetch(DATA_URL);
    const text = await response.text();
    const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (!jsonMatch) throw new Error('Gagal parse data');
    
    const data = JSON.parse(jsonMatch[1]);
    const rows = data.table?.rows || [];
    
    if (rows.length === 0) throw new Error('Data kosong');
    
    // Row 0 = titles (A1:AQ1)
    const firstRow = rows[0].c || [];
    columnTitles = [];
    for (let col = 0; col < firstRow.length; col++) {
      const cellValue = firstRow[col]?.v;
      columnTitles[col] = cellValue ? cellValue.toString().trim() : `Kolom ${getColumnLetter(col)}`;
    }
    
    // Row 1+ = scripts (A2:AQ10000)
    // Setiap row = 1 script
    scriptRows = [];
    for (let row = 1; row < rows.length; row++) {
      const cells = rows[row].c || [];
      const rowData = [];
      let hasContent = false;
      
      for (let col = 0; col < columnTitles.length; col++) {
        const cellValue = cells[col]?.v;
        const value = cellValue ? cellValue.toString() : '';
        rowData.push(value);
        if (value.trim() !== '') hasContent = true;
      }
      
      // Hanya tambahkan row yang punya isi
      if (hasContent) {
        scriptRows.push(rowData);
      }
    }
    
    renderScripts();
    updateStats();
    showToast(`✅ ${scriptRows.length} script berhasil dimuat!`);
  } catch (error) {
    console.error('Error loading data:', error);
    document.getElementById('scriptsList').innerHTML = `
      <div class="error-msg">
        <i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 15px; color: var(--accent-red); display:block;"></i>
        <p><strong>⚠️ Gagal memuat data</strong></p>
        <p style="font-size: 12px; margin-top: 10px; color: var(--text-muted);">Pastikan Google Sheet sudah dipublikasikan</p>
        <p style="font-size: 11px; margin-top: 12px; opacity: 0.7;">${error.message}</p>
        <button class="modal-btn primary" style="margin-top:15px;" onclick="loadSheetData()">
          <i class="fas fa-redo"></i> Coba Lagi
        </button>
      </div>`;
  }
}

function refreshData() {
  showToast('🔄 Memuat ulang data...');
  loadSheetData();
}

// ================= GET SCRIPT ROW (with custom overrides) =================
function getScriptRow(rowIndex) {
  const original = scriptRows[rowIndex] || [];
  const result = [...original];
  
  // Apply custom overrides from localStorage
  Object.keys(customScripts).forEach(key => {
    const [rIdx, cIdx] = key.split('_').map(Number);
    if (rIdx === rowIndex) {
      result[cIdx] = customScripts[key];
    }
  });
  
  return result;
}

// ================= GET SCRIPT TITLE =================
function getScriptTitle(rowIndex) {
  const row = getScriptRow(rowIndex);
  // Gunakan cell pertama yang tidak kosong sebagai judul
  for (let i = 0; i < row.length; i++) {
    if (row[i] && row[i].trim() !== '') {
      const text = row[i].trim();
      // Ambil baris pertama atau 60 karakter pertama
      const firstLine = text.split('\n')[0];
      if (firstLine.length > 60) {
        return firstLine.substring(0, 60) + '...';
      }
      return firstLine;
    }
  }
  return `Script ${rowIndex + 1}`;
}

// ================= RENDER SCRIPTS =================
function renderScripts() {
  const list = document.getElementById('scriptsList');
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  
  let filteredIndices = [];
  scriptRows.forEach((row, idx) => {
    const actualRow = getScriptRow(idx);
    if (!query) {
      filteredIndices.push(idx);
    } else {
      // Search in any cell
      const match = actualRow.some(cell => cell.toLowerCase().includes(query));
      if (match) filteredIndices.push(idx);
    }
  });
  
  if (filteredIndices.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-inbox"></i>
        <p>${query ? 'Tidak ada script yang cocok dengan pencarian' : 'Belum ada script'}</p>
      </div>`;
    document.getElementById('displayedScripts').textContent = '0';
    return;
  }
  
  let html = '';
  filteredIndices.forEach((rowIndex, displayIdx) => {
    const row = getScriptRow(rowIndex);
    const title = getScriptTitle(rowIndex);
    const hasCustom = Object.keys(customScripts).some(key => key.startsWith(`${rowIndex}_`));
    const nonEmptyCells = row.filter(c => c && c.trim() !== '').length;
    
    html += `
      <div class="script-card" style="animation-delay: ${displayIdx * 0.03}s">
        <div class="script-card-header">
          <div class="script-card-title">
            <span class="script-card-index">SCRIPT ${rowIndex + 1}</span>
            <span class="script-card-name" title="${escapeHtml(title)}">${escapeHtml(title)}</span>
          </div>
          <div class="script-card-meta">
            <span class="meta-badge"><i class="fas fa-layer-group"></i> ${nonEmptyCells} bagian</span>
            ${hasCustom ? '<span class="meta-badge" style="background:rgba(255,159,67,0.15); color:var(--accent-orange); border-color:rgba(255,159,67,0.3);"><i class="fas fa-pen-fancy"></i> Edited</span>' : ''}
          </div>
        </div>
        
        <div class="cell-preview">
          ${row.map((cell, colIdx) => {
            if (!cell || cell.trim() === '') return '';
            const preview = cell.length > 200 ? cell.substring(0, 200) + '...' : cell;
            const needsToggle = cell.length > 200;
            return `
              <div class="cell-item">
                <div class="cell-label">${escapeHtml(columnTitles[colIdx] || getColumnLetter(colIdx))}</div>
                <div class="cell-content ${needsToggle ? '' : ''}" id="cell-${rowIndex}-${colIdx}">${escapeHtml(preview)}</div>
                ${needsToggle ? `<button class="toggle-cell" onclick="toggleCell(${rowIndex}, ${colIdx})">
                  <i class="fas fa-chevron-down"></i> Lihat selengkapnya
                </button>` : ''}
              </div>`;
          }).join('')}
        </div>
        
        <div class="script-card-actions">
          <button class="script-action-btn view-btn" onclick="viewScript(${rowIndex})" title="Lihat full script">
            <i class="fas fa-eye"></i> View
          </button>
          <button class="script-action-btn copy-btn" onclick="copyScript(${rowIndex})" title="Copy semua bagian jadi 1 script">
            <i class="fas fa-copy"></i> Copy Script
          </button>
          <button class="script-action-btn edit-btn" onclick="editScript(${rowIndex})" title="Edit script">
            <i class="fas fa-edit"></i> Edit
          </button>
        </div>
      </div>`;
  });
  
  list.innerHTML = html;
  document.getElementById('displayedScripts').textContent = filteredIndices.length;
}

// ================= TOGGLE CELL =================
function toggleCell(rowIndex, colIdx) {
  const cell = document.getElementById(`cell-${rowIndex}-${colIdx}`);
  const btn = cell.nextElementSibling;
  const row = getScriptRow(rowIndex);
  const fullContent = row[colIdx];
  
  if (cell.classList.contains('expanded')) {
    cell.classList.remove('expanded');
    cell.textContent = fullContent.substring(0, 200) + '...';
    btn.innerHTML = '<i class="fas fa-chevron-down"></i> Lihat selengkapnya';
  } else {
    cell.classList.add('expanded');
    cell.textContent = fullContent;
    btn.innerHTML = '<i class="fas fa-chevron-up"></i> Sembunyikan';
  }
}

// ================= FILTER SCRIPTS =================
function filterScripts() {
  renderScripts();
}

// ================= FORMAT SCRIPT (gabungan semua kolom) =================
function formatScript(row) {
  let result = '';
  row.forEach((cell, colIdx) => {
    if (cell && cell.trim() !== '') {
      const title = columnTitles[colIdx] || getColumnLetter(colIdx);
      result += `// ===== ${title} =====\n`;
      result += cell + '\n\n';
    }
  });
  return result.trim();
}

// ================= COPY SCRIPT =================
async function copyScript(rowIndex) {
  const row = getScriptRow(rowIndex);
  const formatted = formatScript(row);
  if (!formatted) {
    showToast('⚠️ Script kosong');
    return;
  }
  
  try {
    await navigator.clipboard.writeText(formatted);
    showToast(`✅ Script ${rowIndex + 1} berhasil disalin!`);
  } catch {
    fallbackCopy(formatted);
  }
}

// ================= COPY ALL SCRIPTS =================
async function copyAllScripts() {
  if (scriptRows.length === 0) {
    showToast('⚠️ Tidak ada script untuk dicopy');
    return;
  }
  
  let combined = '';
  scriptRows.forEach((_, idx) => {
    const row = getScriptRow(idx);
    const formatted = formatScript(row);
    if (formatted) {
      combined += `\n${'='.repeat(60)}\n`;
      combined += `// SCRIPT ${idx + 1}\n`;
      combined += `${'='.repeat(60)}\n\n`;
      combined += formatted + '\n\n';
    }
  });
  
  try {
    await navigator.clipboard.writeText(combined);
    showToast(`✅ ${scriptRows.length} script berhasil disalin!`);
  } catch {
    fallbackCopy(combined);
  }
}

// ================= VIEW SCRIPT =================
function viewScript(rowIndex) {
  viewingRowIndex = rowIndex;
  const row = getScriptRow(rowIndex);
  
  document.getElementById('viewModalTitle').textContent = `Script ${rowIndex + 1}`;
  
  let html = '';
  row.forEach((cell, colIdx) => {
    if (cell && cell.trim() !== '') {
      const title = columnTitles[colIdx] || getColumnLetter(colIdx);
      html += `
        <div class="modal-label">
          <i class="fas fa-tag"></i> ${escapeHtml(title)}
        </div>
        <textarea class="modal-textarea" readonly style="min-height: ${Math.min(Math.max(cell.split('\n').length * 18, 100), 400)}px;">${escapeHtml(cell)}</textarea>
      `;
    }
  });
  
  if (!html) {
    html = '<div class="empty-state"><p>Script kosong</p></div>';
  }
  
  document.getElementById('viewModalBody').innerHTML = html;
  document.getElementById('viewModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeViewModal() {
  document.getElementById('viewModal').classList.remove('active');
  document.body.style.overflow = '';
  viewingRowIndex = -1;
}

async function copyViewScript() {
  if (viewingRowIndex < 0) return;
  const row = getScriptRow(viewingRowIndex);
  const formatted = formatScript(row);
  try {
    await navigator.clipboard.writeText(formatted);
    showToast('✅ Script berhasil disalin!');
  } catch {
    fallbackCopy(formatted);
  }
}

// ================= EDIT SCRIPT =================
function editScript(rowIndex) {
  editingRowIndex = rowIndex;
  const row = getScriptRow(rowIndex);
  
  document.getElementById('editModalTitle').textContent = `Edit Script ${rowIndex + 1}`;
  
  let html = `
    <div style="padding: 10px 14px; background: rgba(0, 212, 255, 0.05); border: 1px solid var(--border-color); border-radius: 10px; margin-bottom: 16px; font-size: 13px; color: var(--text-muted);">
      <i class="fas fa-info-circle" style="color: var(--neon-blue);"></i>
      Edit setiap bagian di bawah. Kosongkan untuk menghapus isi bagian tersebut.
    </div>
  `;
  
  row.forEach((cell, colIdx) => {
    const title = columnTitles[colIdx] || getColumnLetter(colIdx);
    const lines = cell ? cell.split('\n').length : 1;
    const height = Math.min(Math.max(lines * 18, 80), 300);
    html += `
      <div class="modal-label">
        <i class="fas fa-tag"></i> ${escapeHtml(title)}
      </div>
      <textarea class="modal-textarea" id="edit-cell-${colIdx}" style="min-height: ${height}px;" placeholder="Isi untuk ${escapeHtml(title)}...">${escapeHtml(cell || '')}</textarea>
    `;
  });
  
  document.getElementById('editModalBody').innerHTML = html;
  document.getElementById('editModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
  document.body.style.overflow = '';
  editingRowIndex = -1;
}

function saveScript() {
  if (editingRowIndex < 0) return;
  const row = scriptRows[editingRowIndex];
  
  // Hapus custom lama untuk row ini
  Object.keys(customScripts).forEach(key => {
    if (key.startsWith(`${editingRowIndex}_`)) {
      delete customScripts[key];
    }
  });
  
  // Simpan custom baru
  row.forEach((originalCell, colIdx) => {
    const textarea = document.getElementById(`edit-cell-${colIdx}`);
    if (textarea) {
      const newValue = textarea.value;
      if (newValue !== originalCell) {
        customScripts[`${editingRowIndex}_${colIdx}`] = newValue;
      }
    }
  });
  
  saveLocalData();
  closeEditModal();
  renderScripts();
  updateStats();
  showToast('✅ Script berhasil disimpan!');
}

// ================= EXPORT =================
function exportAll() {
  let content = '# TAMPERMONKEY SCRIPT EXPORT\n';
  content += `# Exported: ${new Date().toLocaleString('id-ID')}\n`;
  content += `# Total Script: ${scriptRows.length}\n\n`;
  
  scriptRows.forEach((_, idx) => {
    const row = getScriptRow(idx);
    const formatted = formatScript(row);
    if (formatted) {
      content += `\n${'='.repeat(60)}\n`;
      content += `# SCRIPT ${idx + 1}\n`;
      content += `${'='.repeat(60)}\n\n`;
      content += formatted + '\n\n';
    }
  });
  
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tampermonkey_scripts_${new Date().getTime()}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  showToast('✅ File export berhasil diunduh!');
}

// ================= UPDATE STATS =================
function updateStats() {
  document.getElementById('totalScripts').textContent = scriptRows.length;
  document.getElementById('totalColumns').textContent = columnTitles.length;
  document.getElementById('displayedScripts').textContent = scriptRows.length;
}

// ================= HELPERS =================
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('✅ Disalin!');
  } catch {
    showToast('❗ Gagal menyalin');
  }
  document.body.removeChild(textarea);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>🔷 TAMPERMONKEY SCRIPT MANAGER</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --bg-dark: #020810;
  --bg-card: #061420;
  --bg-input: #0a1e30;
  --neon-blue: #00d4ff;
  --neon-cyan: #00fff7;
  --accent-green: #00ff88;
  --accent-red: #ff4757;
  --accent-orange: #ff9f43;
  --accent-purple: #a855f7;
  --border-color: rgba(0, 212, 255, 0.3);
  --text-primary: #e0f4ff;
  --text-muted: #6b8fa8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
}

/* Background Effects */
.bg-animated {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 50%, rgba(0, 180, 255, 0.03) 0%, transparent 70%),
              var(--bg-dark);
}

.bg-grid {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(50px, 50px); }
}

.particle {
  position: fixed; width: 4px; height: 4px; background: var(--neon-blue);
  border-radius: 50%; pointer-events: none; z-index: -1;
  box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
  animation: floatParticle 15s infinite linear; opacity: 0.6;
}

@keyframes floatParticle {
  0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; } 90% { opacity: 0.6; }
  100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

.scan-line {
  position: fixed; top: 0; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), transparent);
  opacity: 0.4;
  animation: scanDown 12s linear infinite;
  z-index: 1; pointer-events: none;
  box-shadow: 0 0 15px var(--neon-blue);
}

@keyframes scanDown {
  0% { top: -10%; opacity: 0; }
  10% { opacity: 0.4; }
  90% { opacity: 0.4; }
  100% { top: 110%; opacity: 0; }
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 15px;
  min-height: 100vh;
  position: relative;
  z-index: 2;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 28px;
  padding: 22px 15px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-blue), transparent);
  animation: glowLine 3.5s ease-in-out infinite;
  box-shadow: 0 0 15px var(--neon-blue);
}

@keyframes glowLine {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; box-shadow: 0 0 25px var(--neon-cyan), 0 0 45px var(--neon-blue); }
}

.back-btn {
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  padding: 9px 16px;
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.back-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-50%) translateX(-3px);
  box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}

.judul-glow {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 900;
  text-align: center;
  color: var(--neon-cyan);
  letter-spacing: 3px;
  margin-bottom: 10px;
  text-shadow: 0 0 30px rgba(0, 255, 247, 0.3);
}

.subtitle {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 15px;
  font-weight: 500;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(0, 212, 255, 0.1);
  border: 1px solid var(--border-color);
  padding: 7px 16px;
  border-radius: 10px;
  font-size: 12px;
  color: var(--neon-blue);
  margin-top: 13px;
  font-weight: 700;
  letter-spacing: 1px;
}

.status-dot {
  width: 9px; height: 9px;
  background: var(--neon-blue);
  border-radius: 50%;
  animation: pulse 2.2s infinite;
  box-shadow: 0 0 12px var(--neon-blue);
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.35); opacity: 0.75; }
}

/* Search & Stats */
.search-section {
  margin: 22px 0 28px;
  text-align: center;
}

.search-bar {
  position: relative;
  max-width: 600px;
  margin: 0 auto 16px;
}

.search-bar input {
  width: 100%;
  padding: 13px 18px 13px 48px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  transition: all 0.3s ease;
}

.search-bar input::placeholder { color: var(--text-muted); }

.search-bar input:focus {
  outline: none;
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}

.search-bar i {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  color: var(--neon-blue);
  font-size: 17px;
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
  padding: 13px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  max-width: 900px;
  margin: 0 auto 20px;
}

.stat-item {
  text-align: center;
  padding: 7px 18px;
  background: rgba(0, 212, 255, 0.08);
  border-radius: 10px;
  border: 1px solid var(--border-color);
}

.stat-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--accent-green);
  display: block;
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 3px;
}

/* Action Bar */
.action-bar {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 25px;
}

.action-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  padding: 10px 18px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 7px;
}

.action-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}

.action-btn.danger {
  background: linear-gradient(135deg, rgba(255, 71, 87, 0.1) 0%, rgba(204, 51, 68, 0.05) 100%);
  border-color: rgba(255, 71, 87, 0.4);
  color: var(--accent-red);
}

.action-btn.danger:hover {
  background: linear-gradient(135deg, rgba(255, 71, 87, 0.25) 0%, rgba(204, 51, 68, 0.15) 100%);
  border-color: var(--accent-red);
  box-shadow: 0 5px 20px rgba(255, 71, 87, 0.3);
}

.action-btn.success {
  background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(0, 200, 100, 0.05) 100%);
  border-color: rgba(0, 255, 136, 0.4);
  color: var(--accent-green);
}

.action-btn.success:hover {
  background: linear-gradient(135deg, rgba(0, 255, 136, 0.25) 0%, rgba(0, 200, 100, 0.15) 100%);
  border-color: var(--accent-green);
  box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
}

/* Script Grid */
.script-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 18px;
}

.script-card {
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.8) 100%);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 20px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
  animation: fadeInUp 0.5s ease-out;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 212, 255, 0.1);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.script-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: linear-gradient(to bottom, var(--neon-blue), var(--neon-cyan));
  transition: width 0.3s ease;
}

.script-card:hover {
  border-color: var(--neon-blue);
  transform: translateY(-2px);
  box-shadow: 0 15px 50px rgba(0, 212, 255, 0.3), inset 0 1px 0 rgba(0, 212, 255, 0.2);
}

.script-card:hover::before {
  width: 6px;
  box-shadow: 0 0 20px var(--neon-blue);
}

.script-card.modified {
  border-color: var(--accent-orange);
}

.script-card.modified::before {
  background: linear-gradient(to bottom, var(--accent-orange), var(--accent-red));
}

.script-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-color);
}

.script-index {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
  color: var(--bg-dark);
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 8px;
  min-width: 40px;
  text-align: center;
  box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
}

.script-title {
  flex: 1;
  background: transparent;
  border: 1px solid transparent;
  color: var(--neon-cyan);
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 6px 10px;
  border-radius: 8px;
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
  width: 100%;
}

.script-title:hover {
  border-color: var(--border-color);
  background: rgba(0, 212, 255, 0.05);
}

.script-title:focus {
  outline: none;
  border-color: var(--neon-blue);
  background: var(--bg-input);
  box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
}

.modified-badge {
  display: none;
  background: var(--accent-orange);
  color: var(--bg-dark);
  font-size: 10px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}

.script-card.modified .modified-badge {
  display: inline-block;
}

.script-content {
  position: relative;
  margin-bottom: 14px;
}

.script-textarea {
  width: 100%;
  min-height: 180px;
  max-height: 400px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 12px;
  color: var(--text-primary);
  font-family: 'Fira Code', 'Courier New', monospace;
  font-size: 12px;
  line-height: 1.5;
  resize: vertical;
  transition: all 0.3s ease;
  white-space: pre;
  overflow-x: auto;
  tab-size: 2;
}

.script-textarea:focus {
  outline: none;
  border-color: var(--neon-blue);
  box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
}

.script-textarea:read-only {
  background: rgba(10, 30, 48, 0.5);
  color: var(--text-muted);
  cursor: not-allowed;
}

.script-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.script-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 12px;
  padding: 8px 14px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  color: var(--neon-blue);
}

.script-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
}

.script-btn.copy-btn {
  background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
  color: var(--bg-dark);
  border: none;
}

.script-btn.copy-btn:hover {
  box-shadow: 0 5px 20px rgba(0, 212, 255, 0.5);
}

.script-btn.save-btn {
  background: linear-gradient(135deg, var(--accent-green) 0%, #00cc66 100%);
  color: var(--bg-dark);
  border: none;
}

.script-btn.save-btn:hover {
  box-shadow: 0 5px 20px rgba(0, 255, 136, 0.5);
}

.script-btn.reset-btn {
  background: linear-gradient(135deg, rgba(255, 71, 87, 0.1) 0%, rgba(204, 51, 68, 0.05) 100%);
  border-color: rgba(255, 71, 87, 0.4);
  color: var(--accent-red);
}

.script-btn.reset-btn:hover {
  background: linear-gradient(135deg, rgba(255, 71, 87, 0.25) 0%, rgba(204, 51, 68, 0.15) 100%);
  border-color: var(--accent-red);
}

.script-btn.edit-btn {
  background: linear-gradient(135deg, rgba(168, 85, 247, 0.15) 0%, rgba(139, 92, 246, 0.08) 100%);
  border-color: rgba(168, 85, 247, 0.5);
  color: var(--accent-purple);
}

.script-btn.edit-btn:hover {
  background: linear-gradient(135deg, rgba(168, 85, 247, 0.35) 0%, rgba(139, 92, 246, 0.2) 100%);
  border-color: var(--accent-purple);
}

.script-btn.expand-btn {
  background: linear-gradient(135deg, rgba(255, 159, 67, 0.15) 0%, rgba(230, 126, 34, 0.08) 100%);
  border-color: rgba(255, 159, 67, 0.5);
  color: var(--accent-orange);
}

.script-btn.expand-btn:hover {
  background: linear-gradient(135deg, rgba(255, 159, 67, 0.35) 0%, rgba(230, 126, 34, 0.2) 100%);
  border-color: var(--accent-orange);
}

/* Modal Full Preview */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(2, 8, 16, 0.95);
  z-index: 10000;
  justify-content: center;
  align-items: center;
  padding: 20px;
  backdrop-filter: blur(10px);
}

.modal-overlay.active { display: flex; }

.modal-content {
  background: var(--bg-card);
  border: 1px solid var(--neon-blue);
  border-radius: 16px;
  width: 100%;
  max-width: 1000px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 60px rgba(0, 212, 255, 0.3);
  animation: fadeInUp 0.3s ease-out;
}

.modal-header {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.modal-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  color: var(--neon-cyan);
  font-weight: 700;
  letter-spacing: 1px;
}

.modal-close {
  background: none;
  border: none;
  color: var(--neon-blue);
  font-size: 28px;
  cursor: pointer;
  transition: all 0.3s ease;
  line-height: 1;
}

.modal-close:hover {
  color: var(--neon-cyan);
  transform: rotate(90deg);
}

.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.modal-textarea {
  width: 100%;
  min-height: 500px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 15px;
  color: var(--text-primary);
  font-family: 'Fira Code', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.6;
  resize: vertical;
  white-space: pre;
  tab-size: 2;
}

.modal-textarea:focus {
  outline: none;
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}

.modal-footer {
  padding: 15px 22px;
  border-top: 1px solid var(--border-color);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  flex-wrap: wrap;
  flex-shrink: 0;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.95) 100%);
  border: 1px solid var(--neon-blue);
  border-radius: 12px;
  padding: 15px 30px;
  color: var(--text-primary);
  font-size: 16px;
  font-weight: 600;
  z-index: 99999;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Loading & States */
.loading, .no-data, .error-msg {
  text-align: center;
  padding: 55px 22px;
}

.loading { color: var(--neon-blue); }

.loading-spinner {
  width: 46px;
  height: 46px;
  border: 4px solid rgba(0, 212, 255, 0.2);
  border-top-color: var(--neon-blue);
  border-radius: 50%;
  animation: spin 0.95s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  color: var(--text-primary);
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-color);
  padding: 35px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }

::selection { background: rgba(0, 212, 255, 0.3); color: var(--text-primary); }

/* Responsive */
@media (max-width: 768px) {
  .container { padding: 14px 11px; }
  .judul-glow { font-size: clamp(1.3rem, 5vw, 1.8rem); }
  .script-grid { grid-template-columns: 1fr; }
  .stats-bar { flex-direction: column; gap: 10px; }
  .script-actions { flex-direction: column; }
  .script-btn { justify-content: center; }
  .modal-content { max-height: 95vh; }
  .modal-textarea { min-height: 300px; font-size: 11px; }
}

button:focus-visible, input:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--neon-blue);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="bg-animated"></div>
<div class="bg-grid"></div>
<div id="particles"></div>
<div class="scan-line"></div>
<div id="toast" class="toast"></div>

<div class="container">
  <header class="header">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Kembali
    </a>
    <h1 class="judul-glow">🔷 TAMPERMONKEY SCRIPT</h1>
    <p class="subtitle">Manager & Editor Script Tampermonkey 2026</p>
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </header>

  <div class="search-section">
    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="🔷 Cari script..." oninput="filterScripts()">
    </div>
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="totalScripts">0</span>
        <span class="stat-label">Total Script</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="modifiedScripts">0</span>
        <span class="stat-label">Dimodifikasi</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="savedScripts">0</span>
        <span class="stat-label">Tersimpan</span>
      </div>
    </div>
  </div>

  <div class="action-bar">
    <button class="action-btn success" onclick="saveAllScripts()">
      <i class="fas fa-save"></i> Simpan Semua
    </button>
    <button class="action-btn" onclick="exportData()">
      <i class="fas fa-file-export"></i> Export JSON
    </button>
    <button class="action-btn" onclick="document.getElementById('importFile').click()">
      <i class="fas fa-file-import"></i> Import JSON
    </button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="action-btn" onclick="copyAllScripts()">
      <i class="fas fa-copy"></i> Copy Semua
    </button>
    <button class="action-btn danger" onclick="resetAllScripts()">
      <i class="fas fa-undo"></i> Reset Semua
    </button>
    <button class="action-btn" onclick="reloadFromSheet()">
      <i class="fas fa-sync"></i> Reload Sheet
    </button>
  </div>

  <div id="scriptContainer">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>⏳ Memuat script dari Google Sheets...</p>
      <p style="font-size: 12px; opacity: 0.7; margin-top: 8px; color: var(--text-muted);">Mengambil data TAMPERMONKEY SCRIPT</p>
    </div>
  </div>
</div>

<!-- Modal Full Preview -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">📜 Script Preview</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <textarea class="modal-textarea" id="modalTextarea" readonly></textarea>
    </div>
    <div class="modal-footer">
      <button class="action-btn" onclick="copyModalContent()">
        <i class="fas fa-copy"></i> Copy
      </button>
      <button class="action-btn" onclick="downloadModalContent()">
        <i class="fas fa-download"></i> Download .js
      </button>
      <button class="action-btn danger" onclick="closeModal()">
        <i class="fas fa-times"></i> Tutup
      </button>
    </div>
  </div>
</div>

<script>
// ================= DATA CONFIG =================
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1904811091';
const RANGE = 'A1:AQ2';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;
const STORAGE_KEY = 'tampermonkey_scripts_v1';

let originalData = []; // Data asli dari sheet
let currentData = [];  // Data yang sedang ditampilkan (dengan perubahan lokal)
let savedData = {};    // Data yang tersimpan di localStorage

// ================= PARTICLES =================
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  container.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 15 + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    container.appendChild(particle);
  }
}

// ================= TOAST =================
function showToast(message, duration = 3000) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), duration);
}

// ================= LOAD DATA =================
async function loadFromSheet() {
  try {
    const response = await fetch(DATA_URL);
    const text = await response.text();
    const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (!jsonMatch) throw new Error('Gagal parse data');
    const data = JSON.parse(jsonMatch[1]);
    const rows = data.table?.rows || [];
    
    if (rows.length < 2) throw new Error('Data tidak lengkap (butuh minimal 2 baris)');
    
    const titles = (rows[0].c || []).map(cell => cell?.v?.toString() || '');
    const scripts = (rows[1].c || []).map(cell => cell?.v?.toString() || '');
    
    originalData = titles.map((title, i) => ({
      index: i,
      title: title || `Script ${i + 1}`,
      script: scripts[i] || ''
    })).filter(item => item.title || item.script);
    
    // Load saved data dari localStorage
    loadSavedData();
    
    // Merge dengan saved data
    currentData = originalData.map(item => {
      const saved = savedData[item.index];
      return {
        ...item,
        title: saved?.title || item.title,
        script: saved?.script || item.script,
        isModified: !!saved
      };
    });
    
    renderScripts();
    updateStats();
    showToast('✅ Data berhasil dimuat dari Google Sheets!');
  } catch (error) {
    console.error(error);
    document.getElementById('scriptContainer').innerHTML = `
      <div class="error-msg">
        <i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 15px; color: var(--accent-red);"></i>
        <p><strong>⚠️ Gagal memuat data</strong></p>
        <p style="font-size: 12px; margin-top: 10px; color: var(--text-muted);">Pastikan Google Sheet sudah dipublikasikan (File > Share > Publish to web)</p>
        <p style="font-size: 11px; margin-top: 12px; opacity: 0.7;">${error.message}</p>
      </div>`;
  }
}

function loadSavedData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    savedData = saved ? JSON.parse(saved) : {};
  } catch {
    savedData = {};
  }
}

function persistSavedData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(savedData));
  } catch (e) {
    showToast('❌ Gagal menyimpan ke localStorage: ' + e.message);
  }
}

// ================= RENDER =================
function renderScripts(data = currentData) {
  const container = document.getElementById('scriptContainer');
  if (data.length === 0) {
    container.innerHTML = '<div class="no-data"><p style="color: var(--text-muted); font-size: 16px;">🔍 Tidak ada script ditemukan</p></div>';
    return;
  }
  
  container.innerHTML = `<div class="script-grid">${data.map(item => createScriptCard(item)).join('')}</div>`;
}

function createScriptCard(item) {
  const isModified = item.isModified;
  const colLetter = getColumnLetter(item.index);
  
  return `
    <div class="script-card ${isModified ? 'modified' : ''}" data-index="${item.index}">
      <div class="script-header">
        <span class="script-index">${colLetter}</span>
        <input type="text" class="script-title" value="${escapeHtml(item.title)}" 
               oninput="onTitleChange(${item.index}, this.value)"
               placeholder="Judul script...">
        <span class="modified-badge">MODIFIED</span>
      </div>
      <div class="script-content">
        <textarea class="script-textarea" id="script-${item.index}" 
                  oninput="onScriptChange(${item.index}, this.value)"
                  placeholder="Script akan muncul di sini...">${escapeHtml(item.script)}</textarea>
      </div>
      <div class="script-actions">
        <button class="script-btn copy-btn" onclick="copyScript(${item.index})">
          <i class="fas fa-copy"></i> Copy
        </button>
        <button class="script-btn save-btn" onclick="saveScript(${item.index})">
          <i class="fas fa-save"></i> Simpan
        </button>
        <button class="script-btn edit-btn" onclick="toggleEdit(${item.index})">
          <i class="fas fa-edit"></i> <span id="edit-label-${item.index}">Edit</span>
        </button>
        <button class="script-btn expand-btn" onclick="openModal(${item.index})">
          <i class="fas fa-expand"></i> Full
        </button>
        <button class="script-btn reset-btn" onclick="resetScript(${item.index})">
          <i class="fas fa-undo"></i> Reset
        </button>
      </div>
    </div>`;
}

function getColumnLetter(index) {
  let letter = '';
  let n = index;
  while (n >= 0) {
    letter = String.fromCharCode((n % 26) + 65) + letter;
    n = Math.floor(n / 26) - 1;
  }
  return letter;
}

// ================= EVENT HANDLERS =================
function onTitleChange(index, value) {
  const item = currentData.find(i => i.index === index);
  if (!item) return;
  item.title = value;
  markAsModified(index);
}

function onScriptChange(index, value) {
  const item = currentData.find(i => i.index === index);
  if (!item) return;
  item.script = value;
  markAsModified(index);
}

function markAsModified(index) {
  const item = currentData.find(i => i.index === index);
  if (!item) return;
  
  const original = originalData.find(i => i.index === index);
  const isModified = original && (item.title !== original.title || item.script !== original.script);
  item.isModified = isModified;
  
  const card = document.querySelector(`.script-card[data-index="${index}"]`);
  if (card) {
    if (isModified) card.classList.add('modified');
    else card.classList.remove('modified');
  }
  
  // Auto-save ke savedData
  if (isModified) {
    savedData[index] = { title: item.title, script: item.script };
  } else {
    delete savedData[index];
  }
  
  updateStats();
}

function copyScript(index) {
  const item = currentData.find(i => i.index === index);
  if (!item) return;
  
  navigator.clipboard.writeText(item.script).then(() => {
    showToast(`✅ Script "${item.title}" berhasil disalin!`);
  }).catch(() => {
    fallbackCopy(item.script);
  });
}

function saveScript(index) {
  const item = currentData.find(i => i.index === index);
  if (!item) return;
  
  savedData[index] = { title: item.title, script: item.script };
  persistSavedData();
  showToast(`💾 Script "${item.title}" tersimpan!`);
  updateStats();
}

function toggleEdit(index) {
  const textarea = document.getElementById(`script-${index}`);
  const label = document.getElementById(`edit-label-${index}`);
  if (!textarea) return;
  
  if (textarea.readOnly) {
    textarea.readOnly = false;
    textarea.focus();
    label.textContent = 'Lock';
    showToast('✏️ Mode edit aktif');
  } else {
    textarea.readOnly = true;
    label.textContent = 'Edit';
    showToast('🔒 Mode edit dinonaktifkan');
  }
}

function resetScript(index) {
  if (!confirm('Yakin ingin mengembalikan script ini ke versi asli dari Google Sheets?')) return;
  
  const original = originalData.find(i => i.index === index);
  if (!original) return;
  
  const item = currentData.find(i => i.index === index);
  if (item) {
    item.title = original.title;
    item.script = original.script;
    item.isModified = false;
  }
  
  delete savedData[index];
  persistSavedData();
  
  // Update UI
  const card = document.querySelector(`.script-card[data-index="${index}"]`);
  if (card) {
    card.querySelector('.script-title').value = original.title;
    card.querySelector('.script-textarea').value = original.script;
    card.classList.remove('modified');
  }
  
  showToast(`🔄 Script "${original.title}" direset ke asli`);
  updateStats();
}

// ================= MODAL =================
let currentModalIndex = null;

function openModal(index) {
  const item = currentData.find(i => i.index === index);
  if (!item) return;
  
  currentModalIndex = index;
  document.getElementById('modalTitle').textContent = `📜 ${item.title}`;
  document.getElementById('modalTextarea').value = item.script;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  // Simpan perubahan dari modal ke currentData
  if (currentModalIndex !== null) {
    const textarea = document.getElementById('modalTextarea');
    const item = currentData.find(i => i.index === currentModalIndex);
    if (item && textarea.value !== item.script) {
      item.script = textarea.value;
      const cardTextarea = document.getElementById(`script-${currentModalIndex}`);
      if (cardTextarea) cardTextarea.value = textarea.value;
      markAsModified(currentModalIndex);
    }
  }
  
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
  currentModalIndex = null;
}

function copyModalContent() {
  const content = document.getElementById('modalTextarea').value;
  navigator.clipboard.writeText(content).then(() => {
    showToast('✅ Script berhasil disalin!');
  }).catch(() => fallbackCopy(content));
}

function downloadModalContent() {
  const item = currentData.find(i => i.index === currentModalIndex);
  if (!item) return;
  
  const content = document.getElementById('modalTextarea').value;
  const blob = new Blob([content], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${item.title.replace(/[^a-z0-9]/gi, '_')}.user.js`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`⬇️ Downloaded: ${a.download}`);
}

// ================= BULK ACTIONS =================
function saveAllScripts() {
  currentData.forEach(item => {
    const original = originalData.find(o => o.index === item.index);
    if (original && (item.title !== original.title || item.script !== original.script)) {
      savedData[item.index] = { title: item.title, script: item.script };
    }
  });
  persistSavedData();
  showToast(`💾 Semua script tersimpan! (${Object.keys(savedData).length} item)`);
  updateStats();
}

function resetAllScripts() {
  if (!confirm('⚠️ Yakin ingin mereset SEMUA script ke versi asli?\nSemua perubahan lokal akan hilang!')) return;
  
  savedData = {};
  persistSavedData();
  
  currentData = originalData.map(item => ({
    ...item,
    isModified: false
  }));
  
  renderScripts();
  updateStats();
  showToast('🔄 Semua script direset ke asli');
}

function copyAllScripts() {
  const allContent = currentData.map(item => 
    `// ========== ${item.title} (${getColumnLetter(item.index)}) ==========\n${item.script}`
  ).join('\n\n');
  
  navigator.clipboard.writeText(allContent).then(() => {
    showToast(`✅ Semua ${currentData.length} script berhasil disalin!`);
  }).catch(() => fallbackCopy(allContent));
}

function exportData() {
  const exportObj = {
    version: '1.0',
    exportedAt: new Date().toISOString(),
    sheetId: SHEET_ID,
    gid: GID,
    scripts: currentData.map(item => ({
      index: item.index,
      column: getColumnLetter(item.index),
      title: item.title,
      script: item.script,
      isModified: item.isModified
    }))
  };
  
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tampermonkey_scripts_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('⬇️ Data berhasil diexport!');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.scripts || !Array.isArray(imported.scripts)) {
        throw new Error('Format file tidak valid');
      }
      
      let importedCount = 0;
      imported.scripts.forEach(s => {
        const item = currentData.find(i => i.index === s.index);
        if (item) {
          item.title = s.title;
          item.script = s.script;
          savedData[s.index] = { title: s.title, script: s.script };
          markAsModified(s.index);
          importedCount++;
        }
      });
      
      persistSavedData();
      renderScripts();
      updateStats();
      showToast(`✅ ${importedCount} script berhasil diimport!`);
    } catch (err) {
      showToast('❌ Gagal import: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function reloadFromSheet() {
  if (!confirm('Reload data dari Google Sheets?\nPerubahan yang belum disimpan akan tetap ada di localStorage.')) return;
  loadFromSheet();
}

// ================= FILTER =================
function filterScripts() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!query) {
    renderScripts(currentData);
    return;
  }
  const filtered = currentData.filter(item =>
    item.title.toLowerCase().includes(query) ||
    item.script.toLowerCase().includes(query)
  );
  renderScripts(filtered);
}

// ================= STATS =================
function updateStats() {
  document.getElementById('totalScripts').textContent = currentData.length;
  const modified = currentData.filter(i => i.isModified).length;
  document.getElementById('modifiedScripts').textContent = modified;
  document.getElementById('savedScripts').textContent = Object.keys(savedData).length;
}

// ================= UTILS =================
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('✅ Disalin!');
  } catch {
    showToast('❗ Gagal menyalin');
  }
  document.body.removeChild(textarea);
}

// ================= INIT =================
document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  loadFromSheet();
  setTimeout(() => {
    if (!document.querySelector('.script-grid')) {
      showToast('🔷 System Ready!');
    }
  }, 1500);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('modalOverlay').classList.contains('active')) {
      closeModal();
    }
  }
  // Ctrl+S untuk save all
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveAllScripts();
  }
});

// Auto-save setiap 30 detik
setInterval(() => {
  if (Object.keys(savedData).length > 0) {
    persistSavedData();
  }
}, 30000);

// Save before unload
window.addEventListener('beforeunload', () => {
  persistSavedData();
});
</script>
</body>
</html>

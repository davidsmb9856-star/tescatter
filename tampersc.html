<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>🔷 TAMPERMONKEY SCRIPT - LINE TOGEL</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --bg-dark: #020810;
  --bg-card: #061420;
  --bg-input: #0a1e30;
  --neon-blue: #00d4ff;
  --neon-cyan: #00fff7;
  --accent-green: #00ff88;
  --accent-red: #ff4757;
  --accent-orange: #ff9f43;
  --accent-purple: #a855f7;
  --border-color: rgba(0, 212, 255, 0.3);
  --text-primary: #e0f4ff;
  --text-muted: #6b8fa8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
}

/* ========== BACKGROUND EFFECTS ========== */
.bg-animated {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 50%, rgba(0, 180, 255, 0.03) 0%, transparent 70%),
              var(--bg-dark);
}

.bg-grid {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(50px, 50px); }
}

.particle {
  position: fixed; width: 4px; height: 4px; background: var(--neon-blue);
  border-radius: 50%; pointer-events: none; z-index: -1;
  box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
  animation: floatParticle 15s infinite linear; opacity: 0.6;
}

@keyframes floatParticle {
  0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; } 90% { opacity: 0.6; }
  100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

.scan-line {
  position: fixed; top: 0; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), transparent);
  opacity: 0.4;
  animation: scanDown 12s linear infinite;
  z-index: 1; pointer-events: none;
  box-shadow: 0 0 15px var(--neon-blue);
}

@keyframes scanDown {
  0% { top: -10%; opacity: 0; }
  10% { opacity: 0.4; }
  90% { opacity: 0.4; }
  100% { top: 110%; opacity: 0; }
}

/* ========== CONTAINER ========== */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 15px;
  min-height: 100vh;
  position: relative;
  z-index: 2;
}

/* ========== HEADER ========== */
.header {
  text-align: center;
  margin-bottom: 28px;
  padding: 22px 15px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-blue), transparent);
  animation: glowLine 3.5s ease-in-out infinite;
  box-shadow: 0 0 15px var(--neon-blue);
}

@keyframes glowLine {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; box-shadow: 0 0 25px var(--neon-cyan), 0 0 45px var(--neon-blue); }
}

.back-btn {
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  padding: 9px 16px;
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  letter-spacing: 0.5px;
}

.back-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-50%) translateX(-3px);
  box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}

.judul-glow {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.5rem, 4vw, 2.4rem);
  font-weight: 900;
  text-align: center;
  color: var(--neon-cyan);
  letter-spacing: 3px;
  margin-bottom: 10px;
  text-shadow: 0 0 30px rgba(0, 255, 247, 0.3);
}

.subtitle {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 15px;
  font-weight: 500;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(0, 212, 255, 0.1);
  border: 1px solid var(--border-color);
  padding: 7px 16px;
  border-radius: 10px;
  font-size: 12px;
  color: var(--neon-blue);
  margin-top: 13px;
  font-weight: 700;
  letter-spacing: 1px;
}

.status-dot {
  width: 9px; height: 9px;
  background: var(--neon-blue);
  border-radius: 50%;
  animation: pulse 2.2s infinite;
  box-shadow: 0 0 12px var(--neon-blue);
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.35); opacity: 0.75; }
}

/* ========== SEARCH & STATS ========== */
.search-section {
  margin: 22px 0 28px;
  text-align: center;
}

.search-bar {
  position: relative;
  max-width: 520px;
  margin: 0 auto 16px;
}

.search-bar .search-input {
  width: 100%;
  padding: 13px 18px 13px 48px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  transition: all 0.3s ease;
}

.search-bar .search-input::placeholder { color: var(--text-muted); }

.search-bar .search-input:focus {
  outline: none;
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}

.search-bar i {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  color: var(--neon-blue);
  font-size: 17px;
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 22px;
  flex-wrap: wrap;
  padding: 13px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  max-width: 900px;
  margin: 0 auto 18px;
}

.stat-item {
  text-align: center;
  padding: 7px 18px;
  background: rgba(0, 212, 255, 0.08);
  border-radius: 10px;
  border: 1px solid var(--border-color);
  min-width: 110px;
}

.stat-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--accent-green);
  display: block;
}

.stat-value.edited { color: var(--accent-orange); }
.stat-value.original { color: var(--neon-blue); }

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 3px;
}

/* ========== ACTION BAR ========== */
.action-bar {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 22px;
}

.action-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border: 1px solid var(--border-color);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  letter-spacing: 0.5px;
}

.action-btn.primary {
  background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
  color: var(--bg-dark);
  border: none;
}

.action-btn.primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
}

.action-btn.danger {
  background: linear-gradient(135deg, rgba(255, 71, 87, 0.15) 0%, rgba(204, 51, 68, 0.08) 100%);
  color: var(--accent-red);
}

.action-btn.danger:hover {
  background: linear-gradient(135deg, rgba(255, 71, 87, 0.35) 0%, rgba(204, 51, 68, 0.2) 100%);
  border-color: var(--accent-red);
  box-shadow: 0 5px 20px rgba(255, 71, 87, 0.3);
}

.action-btn.secondary {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  color: var(--neon-blue);
}

.action-btn.secondary:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-2px);
}

/* ========== SCRIPT GRID ========== */
.script-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 18px;
}

.script-card {
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.8) 100%);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  padding: 22px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
  animation: fadeInUp 0.5s ease-out;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 212, 255, 0.1);
  display: flex;
  flex-direction: column;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.script-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: linear-gradient(to bottom, var(--neon-blue), var(--neon-cyan));
  transition: width 0.3s ease;
}

.script-card.edited::before {
  background: linear-gradient(to bottom, var(--accent-orange), #ff6b35);
}

.script-card:hover {
  border-color: var(--neon-blue);
  transform: translateY(-2px);
  box-shadow: 0 15px 50px rgba(0, 212, 255, 0.3), inset 0 1px 0 rgba(0, 212, 255, 0.2);
}

.script-card:hover::before {
  width: 6px;
  box-shadow: 0 0 20px var(--neon-blue);
}

.script-card.edited:hover::before {
  box-shadow: 0 0 20px var(--accent-orange);
}

/* Badge "DIEDIT" */
.edited-badge {
  position: absolute;
  top: 12px; right: 12px;
  background: linear-gradient(135deg, var(--accent-orange) 0%, #ff6b35 100%);
  color: var(--bg-dark);
  font-size: 10px;
  font-weight: 800;
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: 1px;
  box-shadow: 0 0 12px rgba(255, 159, 67, 0.5);
  display: none;
  align-items: center;
  gap: 4px;
  z-index: 3;
}

.script-card.edited .edited-badge { display: inline-flex; }

.script-number {
  position: absolute;
  top: 12px; left: 14px;
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  opacity: 0.7;
}

.script-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--neon-cyan);
  margin: 22px 0 14px;
  letter-spacing: 1px;
  line-height: 1.4;
  word-break: break-word;
  min-height: 42px;
  display: flex;
  align-items: center;
}

.script-preview {
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 12px;
  font-family: 'Fira Code', monospace;
  font-size: 11px;
  color: var(--text-primary);
  line-height: 1.5;
  max-height: 140px;
  overflow: hidden;
  position: relative;
  white-space: pre-wrap;
  word-break: break-all;
  margin-bottom: 14px;
  flex: 1;
  opacity: 0.85;
}

.script-preview::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to top, var(--bg-card), transparent);
  pointer-events: none;
}

.script-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 12px;
  padding: 6px 10px;
  background: rgba(0, 212, 255, 0.05);
  border-radius: 8px;
}

.script-meta i { margin-right: 4px; color: var(--neon-blue); }

.script-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.script-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  padding: 9px 14px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  flex: 1;
  justify-content: center;
  min-width: 90px;
  border: 1px solid var(--border-color);
  text-decoration: none;
}

.script-btn.copy {
  background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
  color: var(--bg-dark);
  border: none;
}

.script-btn.copy:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
}

.script-btn.edit {
  background: linear-gradient(135deg, rgba(168, 85, 247, 0.15) 0%, rgba(139, 92, 246, 0.08) 100%);
  color: var(--accent-purple);
}

.script-btn.edit:hover {
  background: linear-gradient(135deg, rgba(168, 85, 247, 0.35) 0%, rgba(139, 92, 246, 0.2) 100%);
  border-color: var(--accent-purple);
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(168, 85, 247, 0.3);
}

.script-btn.reset {
  background: linear-gradient(135deg, rgba(255, 71, 87, 0.15) 0%, rgba(204, 51, 68, 0.08) 100%);
  color: var(--accent-red);
  padding: 9px 10px;
  flex: 0 0 auto;
  min-width: auto;
}

.script-btn.reset:hover {
  background: linear-gradient(135deg, rgba(255, 71, 87, 0.35) 0%, rgba(204, 51, 68, 0.2) 100%);
  border-color: var(--accent-red);
  transform: translateY(-2px);
}

.script-btn.copied {
  background: var(--accent-green) !important;
  color: var(--bg-dark) !important;
}

/* ========== MODAL EDIT ========== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(2, 8, 16, 0.92);
  z-index: 10000;
  justify-content: center;
  align-items: center;
  padding: 20px;
  backdrop-filter: blur(10px);
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-overlay.active { display: flex; }

.modal {
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.98) 100%);
  border: 1px solid var(--neon-blue);
  border-radius: 20px;
  width: 100%;
  max-width: 900px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0, 212, 255, 0.3), 0 0 40px rgba(0, 212, 255, 0.2);
  animation: modalSlideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes modalSlideUp {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.modal-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  color: var(--neon-cyan);
  font-weight: 700;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.modal-title i { color: var(--accent-purple); }

.modal-close {
  background: none;
  border: none;
  color: var(--neon-blue);
  font-size: 30px;
  cursor: pointer;
  transition: all 0.3s ease;
  line-height: 1;
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-close:hover {
  color: var(--accent-red);
  background: rgba(255, 71, 87, 0.1);
  transform: rotate(90deg);
}

.modal-body {
  padding: 20px 24px;
  overflow-y: auto;
  flex: 1;
}

.modal-field {
  margin-bottom: 18px;
}

.modal-label {
  display: block;
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  color: var(--neon-blue);
  margin-bottom: 8px;
  letter-spacing: 1px;
  font-weight: 700;
}

.modal-input, .modal-textarea {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 500;
  transition: all 0.3s ease;
}

.modal-input:focus, .modal-textarea:focus {
  outline: none;
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}

.modal-textarea {
  font-family: 'Fira Code', monospace;
  font-size: 13px;
  line-height: 1.6;
  min-height: 320px;
  resize: vertical;
  white-space: pre;
  tab-size: 2;
}

.modal-footer {
  display: flex;
  gap: 10px;
  padding: 18px 24px;
  border-top: 1px solid var(--border-color);
  flex-shrink: 0;
  flex-wrap: wrap;
  justify-content: flex-end;
  background: rgba(0, 0, 0, 0.2);
  border-radius: 0 0 20px 20px;
}

.modal-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 22px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  letter-spacing: 0.5px;
  border: 1px solid var(--border-color);
}

.modal-btn.save {
  background: linear-gradient(135deg, var(--accent-green) 0%, #00cc6a 100%);
  color: var(--bg-dark);
  border: none;
}

.modal-btn.save:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4);
}

.modal-btn.cancel {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  color: var(--neon-blue);
}

.modal-btn.cancel:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
}

.modal-btn.reset-modal {
  background: linear-gradient(135deg, rgba(255, 71, 87, 0.15) 0%, rgba(204, 51, 68, 0.08) 100%);
  color: var(--accent-red);
  margin-right: auto;
}

.modal-btn.reset-modal:hover {
  background: linear-gradient(135deg, rgba(255, 71, 87, 0.35) 0%, rgba(204, 51, 68, 0.2) 100%);
  border-color: var(--accent-red);
}

.char-count {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 6px;
  text-align: right;
  font-family: 'Fira Code', monospace;
}

/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.95) 100%);
  border: 1px solid var(--neon-blue);
  border-radius: 12px;
  padding: 15px 30px;
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  z-index: 99999;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
  display: flex;
  align-items: center;
  gap: 10px;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.success { border-color: var(--accent-green); }
.toast.success i { color: var(--accent-green); }
.toast.error { border-color: var(--accent-red); }
.toast.error i { color: var(--accent-red); }
.toast.warning { border-color: var(--accent-orange); }
.toast.warning i { color: var(--accent-orange); }

/* ========== LOADING ========== */
.loading, .no-data, .error-msg {
  text-align: center;
  padding: 55px 22px;
}

.loading { color: var(--neon-blue); }

.loading-spinner {
  width: 46px;
  height: 46px;
  border: 4px solid rgba(0, 212, 255, 0.2);
  border-top-color: var(--neon-blue);
  border-radius: 50%;
  animation: spin 0.95s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.no-data {
  color: var(--text-muted);
  font-size: 16px;
  padding: 80px 20px;
}

.no-data i {
  font-size: 48px;
  display: block;
  margin-bottom: 15px;
  opacity: 0.5;
}

.error-msg {
  color: var(--text-primary);
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-color);
  padding: 35px;
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb {
  background: var(--neon-blue);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }

::selection {
  background: rgba(0, 212, 255, 0.3);
  color: var(--text-primary);
}

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .container { padding: 14px 11px; }
  .judul-glow { font-size: clamp(1.3rem, 5vw, 1.8rem); }
  .script-grid { grid-template-columns: 1fr; }
  .stats-bar { flex-direction: column; gap: 11px; }
  .stat-item { min-width: auto; }
  .modal { max-height: 95vh; }
  .modal-body { padding: 16px; }
  .modal-textarea { min-height: 240px; font-size: 12px; }
  .modal-footer { padding: 14px 16px; }
  .modal-btn { padding: 9px 14px; font-size: 13px; flex: 1; justify-content: center; }
  .modal-btn.reset-modal { margin-right: 0; flex-basis: 100%; }
  .action-bar { gap: 8px; }
  .action-btn { padding: 9px 14px; font-size: 13px; flex: 1; justify-content: center; min-width: 120px; }
}

button:focus-visible, input:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--neon-blue);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
<div class="bg-animated"></div>
<div class="bg-grid"></div>
<div id="particles"></div>
<div class="scan-line"></div>
<div id="toast" class="toast"></div>

<div class="container">
  <header class="header">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Kembali
    </a>
    <h1 class="judul-glow">🔷 TAMPERMONKEY SCRIPT</h1>
    <p class="subtitle">Koleksi Script Tampermonkey - Copy, Edit & Simpan</p>
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </header>

  <div class="search-section">
    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="🔷 Cari script berdasarkan judul..." oninput="filterScripts()">
    </div>
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="statTotal">0</span>
        <span class="stat-label">Total Script</span>
      </div>
      <div class="stat-item">
        <span class="stat-value edited" id="statEdited">0</span>
        <span class="stat-label">Sudah Diedit</span>
      </div>
      <div class="stat-item">
        <span class="stat-value original" id="statOriginal">0</span>
        <span class="stat-label">Original</span>
      </div>
    </div>
    <div class="action-bar">
      <button class="action-btn primary" onclick="exportAllScripts()">
        <i class="fas fa-file-export"></i> Export Semua
      </button>
      <button class="action-btn secondary" onclick="refreshFromSheet()">
        <i class="fas fa-sync-alt"></i> Refresh Data
      </button>
      <button class="action-btn danger" onclick="resetAllScripts()">
        <i class="fas fa-trash-restore"></i> Reset Semua Edit
      </button>
    </div>
  </div>

  <div id="scriptContainer">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>⏳ Memuat script dari Google Sheets...</p>
      <p style="font-size: 12px; opacity: 0.7; margin-top: 8px; color: var(--text-muted);">Mengambil data TAMPERMONKEY SCRIPT</p>
    </div>
  </div>
</div>

<!-- MODAL EDIT -->
<div class="modal-overlay" id="editModal" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <i class="fas fa-code"></i>
        <span>Edit Script</span>
      </div>
      <button class="modal-close" onclick="closeEditModal()" aria-label="Tutup">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label class="modal-label"><i class="fas fa-heading"></i> JUDUL SCRIPT</label>
        <input type="text" class="modal-input" id="modalTitle" placeholder="Judul script...">
      </div>
      <div class="modal-field">
        <label class="modal-label"><i class="fas fa-code"></i> ISI SCRIPT</label>
        <textarea class="modal-textarea" id="modalScript" placeholder="Paste atau tulis script di sini..." spellcheck="false"></textarea>
        <div class="char-count">
          <span id="charCount">0</span> karakter · <span id="lineCount">0</span> baris
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn reset-modal" onclick="resetCurrentScript()">
        <i class="fas fa-undo"></i> Reset ke Original
      </button>
      <button class="modal-btn cancel" onclick="closeEditModal()">
        <i class="fas fa-times"></i> Batal
      </button>
      <button class="modal-btn save" onclick="saveCurrentScript()">
        <i class="fas fa-save"></i> Simpan Perubahan
      </button>
    </div>
  </div>
</div>

<script>
// ================= DATA CONFIG =================
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1904811091';
const RANGE = 'A1:AQ2';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

const STORAGE_KEY = 'tampermonkey_scripts_edited';

let originalScripts = []; // data asli dari sheet
let currentScripts = [];  // data yang sedang ditampilkan (sudah digabung dgn edit)
let editingIndex = null;

// ================= PARTICLES =================
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  container.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 15 + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    container.appendChild(particle);
  }
}

// ================= TOAST =================
function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  if (!toast) return;
  const icons = {
    success: 'fa-check-circle',
    error: 'fa-times-circle',
    warning: 'fa-exclamation-triangle'
  };
  toast.className = `toast ${type}`;
  toast.innerHTML = `<i class="fas ${icons[type] || icons.success}"></i> <span>${message}</span>`;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ================= LOCAL STORAGE =================
function getEditedScripts() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  } catch {
    return {};
  }
}

function saveEditedScripts(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ================= LOAD DATA =================
async function loadScripts() {
  try {
    const response = await fetch(DATA_URL);
    const text = await response.text();
    const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (!jsonMatch) throw new Error('Gagal parse data');
    const data = JSON.parse(jsonMatch[1]);
    const rows = data.table?.rows || [];
    
    if (rows.length < 2) {
      throw new Error('Data tidak lengkap (butuh minimal 2 baris)');
    }
    
    // Baris 0 = judul (A1:AQ1), Baris 1 = script (A2:AQ2)
    const titles = rows[0].c || [];
    const scripts = rows[1].c || [];
    
    originalScripts = [];
    for (let i = 0; i < titles.length; i++) {
      const title = titles[i]?.v?.toString().trim() || '';
      const script = scripts[i]?.v?.toString() || '';
      if (title || script) {
        originalScripts.push({
          index: i,
          column: String.fromCharCode(65 + (i % 26)) + (i >= 26 ? Math.floor(i/26) : ''),
          title: title || `Script ${i + 1}`,
          script: script
        });
      }
    }
    
    applyEditedScripts();
    renderScripts();
    updateStats();
    showToast(`✅ ${originalScripts.length} script berhasil dimuat!`, 'success');
  } catch (error) {
    console.error(error);
    document.getElementById('scriptContainer').innerHTML = `
      <div class="error-msg">
        <i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 15px; color: var(--accent-red);"></i>
        <p><strong>⚠️ Gagal memuat data</strong></p>
        <p style="font-size: 12px; margin-top: 10px; color: var(--text-muted);">Pastikan Google Sheet sudah dipublikasikan (File → Share → Publish to web)</p>
        <p style="font-size: 11px; margin-top: 12px; opacity: 0.7;">Error: ${error.message}</p>
      </div>`;
  }
}

function applyEditedScripts() {
  const edited = getEditedScripts();
  currentScripts = originalScripts.map(item => {
    const key = `col_${item.index}`;
    const isEdited = edited[key] !== undefined;
    return {
      ...item,
      title: isEdited ? edited[key].title : item.title,
      script: isEdited ? edited[key].script : item.script,
      isEdited: isEdited
    };
  });
}

// ================= RENDER =================
function renderScripts(data = currentScripts) {
  const container = document.getElementById('scriptContainer');
  
  if (data.length === 0) {
    container.innerHTML = `
      <div class="no-data">
        <i class="fas fa-search"></i>
        <p>Tidak ada script yang cocok dengan pencarian</p>
      </div>`;
    return;
  }
  
  container.innerHTML = `<div class="script-grid">${data.map((item, idx) => createScriptCard(item, idx)).join('')}</div>`;
}

function createScriptCard(item, displayIndex) {
  const preview = item.script.length > 300 ? item.script.substring(0, 300) + '...' : item.script;
  const lineCount = item.script ? item.script.split('\n').length : 0;
  const charCount = item.script.length;
  const editedClass = item.isEdited ? 'edited' : '';
  const realIndex = item.index;
  
  return `
    <div class="script-card ${editedClass}" data-index="${realIndex}">
      <span class="edited-badge"><i class="fas fa-pen"></i> DIEDIT</span>
      <span class="script-number">KOLOM ${item.column}</span>
      <h3 class="script-title">${escapeHtml(item.title)}</h3>
      <div class="script-preview">${escapeHtml(preview) || '<em style="opacity:0.5">[Script kosong]</em>'}</div>
      <div class="script-meta">
        <span><i class="fas fa-align-left"></i> ${lineCount} baris</span>
        <span><i class="fas fa-font"></i> ${charCount} karakter</span>
      </div>
      <div class="script-actions">
        <button class="script-btn copy" onclick="copyScript(${realIndex}, this)">
          <i class="fas fa-copy"></i> Copy
        </button>
        <button class="script-btn edit" onclick="openEditModal(${realIndex})">
          <i class="fas fa-edit"></i> Edit
        </button>
        ${item.isEdited ? `
          <button class="script-btn reset" onclick="resetScript(${realIndex})" title="Reset ke original">
            <i class="fas fa-undo"></i>
          </button>
        ` : ''}
      </div>
    </div>`;
}

// ================= COPY SCRIPT =================
async function copyScript(index, btn) {
  const item = currentScripts.find(s => s.index === index);
  if (!item || !item.script) {
    showToast('⚠️ Script kosong!', 'warning');
    return;
  }
  
  try {
    await navigator.clipboard.writeText(item.script);
    showToast('✅ Script berhasil disalin!', 'success');
    if (btn) {
      const original = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = original;
        btn.classList.remove('copied');
      }, 1500);
    }
  } catch {
    fallbackCopy(item.script);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('✅ Script disalin!', 'success');
  } catch {
    showToast('❌ Gagal menyalin', 'error');
  }
  document.body.removeChild(textarea);
}

// ================= EDIT MODAL =================
function openEditModal(index) {
  const item = currentScripts.find(s => s.index === index);
  if (!item) return;
  
  editingIndex = index;
  document.getElementById('modalTitle').value = item.title;
  document.getElementById('modalScript').value = item.script;
  updateCharCount();
  document.getElementById('editModal').classList.add('active');
  document.body.style.overflow = 'hidden';
  
  setTimeout(() => document.getElementById('modalScript').focus(), 100);
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
  document.body.style.overflow = '';
  editingIndex = null;
}

function closeModalOnOverlay(event) {
  if (event.target.id === 'editModal') closeEditModal();
}

function updateCharCount() {
  const text = document.getElementById('modalScript').value;
  document.getElementById('charCount').textContent = text.length;
  document.getElementById('lineCount').textContent = text ? text.split('\n').length : 0;
}

document.addEventListener('DOMContentLoaded', () => {
  const modalScript = document.getElementById('modalScript');
  if (modalScript) {
    modalScript.addEventListener('input', updateCharCount);
    // Tab support di textarea
    modalScript.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = modalScript.selectionStart;
        const end = modalScript.selectionEnd;
        modalScript.value = modalScript.value.substring(0, start) + '  ' + modalScript.value.substring(end);
        modalScript.selectionStart = modalScript.selectionEnd = start + 2;
        updateCharCount();
      }
      // Ctrl+S untuk save
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveCurrentScript();
      }
    });
  }
});

// ================= SAVE SCRIPT =================
function saveCurrentScript() {
  if (editingIndex === null) return;
  
  const newTitle = document.getElementById('modalTitle').value.trim();
  const newScript = document.getElementById('modalScript').value;
  
  if (!newTitle) {
    showToast('⚠️ Judul tidak boleh kosong!', 'warning');
    return;
  }
  
  const edited = getEditedScripts();
  const key = `col_${editingIndex}`;
  
  // Cek apakah sama dengan original
  const original = originalScripts.find(s => s.index === editingIndex);
  if (original && newTitle === original.title && newScript === original.script) {
    // Sama dengan original, hapus dari edited
    delete edited[key];
  } else {
    edited[key] = { title: newTitle, script: newScript };
  }
  
  saveEditedScripts(edited);
  applyEditedScripts();
  
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  if (query) filterScripts();
  else renderScripts();
  updateStats();
  
  closeEditModal();
  showToast('💾 Script berhasil disimpan!', 'success');
}

// ================= RESET =================
function resetScript(index) {
  if (!confirm('Reset script ini ke versi original dari Google Sheet?')) return;
  
  const edited = getEditedScripts();
  delete edited[`col_${index}`];
  saveEditedScripts(edited);
  applyEditedScripts();
  
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  if (query) filterScripts();
  else renderScripts();
  updateStats();
  
  showToast('↩️ Script direset ke original', 'success');
}

function resetCurrentScript() {
  if (editingIndex === null) return;
  const original = originalScripts.find(s => s.index === editingIndex);
  if (!original) return;
  
  if (!confirm('Reset ke versi original? Perubahan yang belum disimpan akan hilang.')) return;
  
  document.getElementById('modalTitle').value = original.title;
  document.getElementById('modalScript').value = original.script;
  updateCharCount();
  showToast('↩️ Dikembalikan ke original (klik Simpan untuk apply)', 'success');
}

function resetAllScripts() {
  const edited = getEditedScripts();
  const count = Object.keys(edited).length;
  if (count === 0) {
    showToast('ℹ️ Tidak ada script yang diedit', 'warning');
    return;
  }
  if (!confirm(`Reset ${count} script yang sudah diedit ke original?\nTindakan ini tidak bisa dibatalkan!`)) return;
  
  localStorage.removeItem(STORAGE_KEY);
  applyEditedScripts();
  renderScripts();
  updateStats();
  showToast(`↩️ ${count} script direset ke original`, 'success');
}

// ================= SEARCH =================
function filterScripts() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!query) {
    renderScripts();
    updateStats();
    return;
  }
  const filtered = currentScripts.filter(item =>
    item.title.toLowerCase().includes(query) ||
    item.script.toLowerCase().includes(query)
  );
  renderScripts(filtered);
}

// ================= STATS =================
function updateStats() {
  document.getElementById('statTotal').textContent = currentScripts.length;
  const editedCount = currentScripts.filter(s => s.isEdited).length;
  document.getElementById('statEdited').textContent = editedCount;
  document.getElementById('statOriginal').textContent = currentScripts.length - editedCount;
}

// ================= EXPORT =================
function exportAllScripts() {
  if (currentScripts.length === 0) {
    showToast('⚠️ Tidak ada script untuk diexport', 'warning');
    return;
  }
  
  let content = '# TAMPERMONKEY SCRIPTS EXPORT\n';
  content += `# Tanggal: ${new Date().toLocaleString('id-ID')}\n`;
  content += `# Total: ${currentScripts.length} script\n\n`;
  
  currentScripts.forEach((item, i) => {
    content += `${'='.repeat(60)}\n`;
    content += `# SCRIPT ${i + 1}: ${item.title}\n`;
    content += `# Kolom: ${item.column} ${item.isEdited ? '[DIEDIT]' : '[ORIGINAL]'}\n`;
    content += `${'='.repeat(60)}\n\n`;
    content += item.script + '\n\n\n';
  });
  
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tampermonkey_scripts_${new Date().toISOString().slice(0,10)}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  showToast(`📦 ${currentScripts.length} script berhasil diexport!`, 'success');
}

// ================= REFRESH =================
function refreshFromSheet() {
  showToast('🔄 Memuat ulang data...', 'success');
  loadScripts();
}

// ================= UTILITIES =================
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ================= INIT =================
document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  loadScripts();
  setTimeout(() => {
    if (!document.querySelector('.toast.show')) {
      showToast('🔷 Tampermonkey Script Ready!', 'success');
    }
  }, 1500);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('editModal').classList.contains('active')) {
      closeEditModal();
    }
  }
});
</script>
</body>
</html>

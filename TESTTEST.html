<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Ultimate Blue</title>
    
    <!-- Font Awesome untuk Icon Keren -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Font: Space Grotesk (Futuristic) -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & CORE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: #020617; /* Very Dark Blue */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            color: white;
        }

        /* --- BACKGROUND EFFECTS --- */
        /* Grid Pattern Background */
        .bg-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            top: 0;
        }

        /* Glowing Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.6;
        }
        .orb-1 { width: 400px; height: 400px; background: #2563eb; top: -100px; left: -100px; animation: float 8s infinite alternate; }
        .orb-2 { width: 300px; height: 300px; background: #06b6d4; bottom: -50px; right: -50px; animation: float 10s infinite alternate-reverse; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 30px); }
        }

        /* --- MAIN CONTAINER --- */
        .wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 1200px;
            text-align: center;
            padding: 40px 0;
        }

        .header-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #60a5fa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.3));
        }

        .header-desc {
            color: #94a3b8;
            margin-bottom: 50px;
            font-size: 1.1rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- GRID MENU SYSTEM --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            padding: 10px;
        }

        /* --- CARD DESIGN --- */
        .card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.1);
            border-radius: 20px;
            padding: 30px 20px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* Icon Styling */
        .card-icon {
            font-size: 2rem;
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.4s;
        }

        .card-text {
            color: #e2e8f0;
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .status {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* --- HOVER EFFECTS (THE COOL PART) --- */
        .card:hover {
            transform: translateY(-10px);
            border-color: #22d3ee;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.2), inset 0 0 20px rgba(34, 211, 238, 0.1);
            background: rgba(15, 23, 42, 0.9);
        }

        .card:hover .card-icon {
            background: #22d3ee;
            color: #020617;
            transform: rotateY(360deg);
            box-shadow: 0 0 20px #22d3ee;
        }

        .card:hover .card-text {
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .card:hover .status {
            color: #22d3ee;
        }

        /* Progress Bar Animation on Hover */
        .card::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, #2563eb, #22d3ee);
            transition: width 0.4s ease;
        }

        .card:hover::before {
            width: 100%;
        }

        /* Responsive Text */
        @media (max-width: 768px) {
            .header-title { font-size: 2rem; }
            .grid-container { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Background Elements -->

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="wrapper">
        <h1 class="header-title">COMING SOON</h1>

            <!-- MENU 3 -->

            <!-- MENU 7 -->
            <a href="#" class="card">

            <!-- MENU 8 -->
            <a href="#" class="card">

</body>
</html>

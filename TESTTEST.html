<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ LINE TOGEL — Photo Gallery 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════
   BLUE NEON COOL — COMPLETELY NEW PALETTE
   ═══════════════════════════════════════ */
:root {
/* Neon Blue Spectrum */
--neon: #00d4ff;
--neon-soft: #48e0ff;
--neon-deep: #0099cc;
--neon-pale: #80e8ff;
--neon-dim: #006d99;
--neon-glow: rgba(0, 212, 255, 0.6);
--neon-glow2: rgba(0, 212, 255, 0.35);
--neon-glow3: rgba(0, 212, 255, 0.15);

/* Background Deep Blue */
--bg: #030714;
--bg-1: #060d1f;
--bg-2: #0a1228;
--bg-3: #0e1a35;
--bg-card: rgba(10, 18, 40, 0.88);
--bg-glass: rgba(12, 22, 50, 0.72);
--bg-glass-light: rgba(16, 30, 60, 0.55);

/* Text */
--white: #ffffff;
--text: #c8e0f0;
--text2: #7a98b8;
--text3: #4a6a8a;

/* Accent */
--accent: #00e5a0;
--accent2: #7b61ff;
--warn: #ff6b6b;

/* Glow Effects */
--glow1: 0 0 15px rgba(0, 212, 255, 0.5), 0 0 35px rgba(0, 212, 255, 0.25);
--glow2: 0 0 20px rgba(0, 212, 255, 0.7), 0 0 50px rgba(0, 212, 255, 0.4), 0 0 90px rgba(0, 212, 255, 0.2);
--glow3: 0 0 10px rgba(0, 212, 255, 0.35), 0 0 25px rgba(0, 212, 255, 0.18);

/* Transitions */
--ease: cubic-bezier(0.16, 1, 0.3, 1);
--t1: 180ms ease;
--t2: 320ms var(--ease);
--t3: 480ms cubic-bezier(0.34, 1.56, 0.64, 1);
--t4: 550ms var(--ease);
}

/* ═══════════════════════════════════════
   BASE
   ═══════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Inter', 'Rajdhani', sans-serif;
background: var(--bg);
color: var(--text);
min-height: 100vh;
min-height: 100dvh;
overflow-x: hidden;
line-height: 1.6;
}
::selection { background: rgba(0, 212, 255, 0.4); color: white; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon), var(--neon-deep));
border-radius: 4px;
box-shadow: 0 0 10px var(--neon-glow);
}

/* ═══════════════════════════════════════
   ANIMATED BACKGROUND
   ═══════════════════════════════════════ */
.bg-fx {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
overflow: hidden;
}
.bg-orb {
position: absolute;
border-radius: 50%;
filter: blur(80px);
opacity: 0.3;
animation: orbFloat 35s ease-in-out infinite alternate;
}
.bg-orb:nth-child(1) {
width: 600px; height: 600px;
background: var(--neon);
top: -200px; left: -150px;
opacity: 0.08;
animation-duration: 30s;
}
.bg-orb:nth-child(2) {
width: 500px; height: 500px;
background: var(--accent2);
top: 40%; right: -200px;
opacity: 0.06;
animation-delay: -10s;
animation-duration: 40s;
}
.bg-orb:nth-child(3) {
width: 450px; height: 450px;
background: var(--neon-deep);
bottom: -150px; left: 30%;
opacity: 0.07;
animation-delay: -20s;
animation-duration: 38s;
}
@keyframes orbFloat {
0%, 100% { transform: translate(0, 0) scale(1); }
33% { transform: translate(30px, -20px) scale(1.05); }
66% { transform: translate(-20px, 25px) scale(0.96); }
}

/* Grid Lines */
.bg-grid {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
background-image:
linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
background-size: 60px 60px;
mask-image: radial-gradient(ellipse 60% 55% at 50% 45%, black 30%, transparent 80%);
animation: gridShift 40s linear infinite;
}
@keyframes gridShift { 0% { background-position: 0 0; } 100% { background-position: 60px 60px; } }

/* Particles */
.bg-dots {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
}
.bdot {
position: absolute;
width: 2px; height: 2px;
background: var(--neon);
border-radius: 50%;
box-shadow: 0 0 8px var(--neon);
opacity: 0;
animation: dotRise 22s infinite ease;
}
@keyframes dotRise {
0%, 100% { transform: translateY(100vh) scale(0.3); opacity: 0; }
10% { opacity: 0.75; }
90% { opacity: 0.75; }
100% { transform: translateY(-100vh) scale(1.2); opacity: 0; }
}

/* ═══════════════════════════════════════
   FLOATING TOP NAVIGATION
   ═══════════════════════════════════════ */
.topnav {
position: fixed;
top: 16px;
left: 50%;
transform: translateX(-50%);
z-index: 800;
background: var(--bg-glass);
border: 1px solid rgba(0, 212, 255, 0.2);
backdrop-filter: blur(20px);
border-radius: 16px;
padding: 10px 14px;
display: flex;
align-items: center;
gap: 12px;
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), var(--glow3);
max-width: 95vw;
}
.topnav::before {
content: '';
position: absolute;
top: -1px; left: 24px; right: 24px;
height: 2px;
background: linear-gradient(90deg, transparent, var(--neon), transparent);
border-radius: 2px;
box-shadow: 0 0 10px var(--neon-glow);
}
.nav-brand {
font-family: 'Orbitron', sans-serif;
font-size: 14px;
font-weight: 800;
letter-spacing: 2px;
color: var(--neon);
white-space: nowrap;
text-shadow: 0 0 10px var(--neon-glow2);
}
.nav-brand span { color: var(--accent); }
.nav-links {
display: flex;
gap: 4px;
}
.nav-link {
padding: 8px 16px;
border-radius: 10px;
font-size: 12px;
font-weight: 500;
color: var(--text2);
text-decoration: none;
transition: var(--t1);
white-space: nowrap;
cursor: pointer;
display: flex;
align-items: center;
gap: 6px;
}
.nav-link:hover, .nav-link.active {
background: var(--neon-glow3);
color: var(--neon);
}
.nav-link.active { background: rgba(0, 212, 255, 0.18); }
.nav-link i { font-size: 13px; }

.nav-search {
display: flex;
align-items: center;
gap: 8px;
background: rgba(0, 212, 255, 0.08);
border: 1px solid rgba(0, 212, 255, 0.18);
border-radius: 10px;
padding: 7px 14px;
min-width: 180px;
transition: var(--t2);
}
.nav-search:focus-within {
border-color: var(--neon);
box-shadow: var(--glow3);
background: rgba(0, 212, 255, 0.12);
}
.nav-search input {
background: transparent;
border: none;
outline: none;
color: var(--white);
font-family: 'Inter', sans-serif;
font-size: 12px;
width: 100%;
}
.nav-search input::placeholder { color: var(--text3); }
.nav-search i { color: var(--text3); font-size: 12px; }

/* ═══════════════════════════════════════
   MAIN LAYOUT — NEW STRUCTURE
   ═══════════════════════════════════════ */
.app {
margin-top: 85px;
padding: 24px;
max-width: 1400px;
margin-left: auto;
margin-right: auto;
}

/* ═══════════════════════════════════════
   FEATURED CAROUSEL — NEW COMPONENT
   ═══════════════════════════════════════ */
.featured {
position: relative;
border-radius: 20px;
overflow: hidden;
margin-bottom: 32px;
border: 1px solid rgba(0, 212, 255, 0.15);
box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
background: var(--bg-1);
}
.featured-inner {
display: flex;
transition: transform 0.6s var(--ease);
}
.featured-slide {
min-width: 100%;
position: relative;
}
.featured-slide img {
width: 100%;
height: 380px;
object-fit: cover;
display: block;
filter: brightness(0.7);
}
.featured-info {
position: absolute;
bottom: 0;
left: 0;
right: 0;
padding: 40px 32px 28px;
background: linear-gradient(0deg, rgba(3, 7, 20, 0.95) 0%, rgba(3, 7, 20, 0.6) 60%, transparent 100%);
}
.featured-tag {
display: inline-block;
padding: 4px 14px;
background: var(--neon);
color: var(--bg);
font-family: 'Orbitron', sans-serif;
font-size: 10px;
font-weight: 700;
letter-spacing: 1.5px;
text-transform: uppercase;
border-radius: 6px;
margin-bottom: 10px;
box-shadow: var(--glow3);
}
.featured-title {
font-family: 'Orbitron', sans-serif;
font-size: 22px;
font-weight: 700;
color: var(--white);
margin-bottom: 6px;
text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
}
.featured-desc {
font-size: 13px;
color: var(--text2);
max-width: 600px;
}
.featured-nav {
position: absolute;
bottom: 20px;
right: 20px;
display: flex;
gap: 8px;
}
.f-nav-btn {
width: 38px;
height: 38px;
border-radius: 50%;
background: var(--bg-glass);
border: 1px solid rgba(0, 212, 255, 0.4);
color: var(--neon);
font-size: 14px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--t1);
backdrop-filter: blur(10px);
}
.f-nav-btn:hover {
background: var(--neon);
color: var(--bg);
box-shadow: var(--glow1);
}
.featured-dots {
position: absolute;
bottom: 28px;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 8px;
}
.f-dot {
width: 8px; height: 8px;
border-radius: 50%;
background: rgba(0, 212, 255, 0.3);
border: none;
cursor: pointer;
transition: var(--t1);
}
.f-dot.active {
background: var(--neon);
box-shadow: 0 0 10px var(--neon-glow);
width: 24px;
border-radius: 5px;
}

/* ═══════════════════════════════════════
   SECTION HEADER — NEW STYLE
   ═══════════════════════════════════════ */
.section-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 24px;
flex-wrap: wrap;
gap: 16px;
}
.section-left { display: flex; align-items: center; gap: 16px; }
.section-icon {
width: 44px; height: 44px;
border-radius: 14px;
background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 153, 204, 0.15));
border: 1px solid rgba(0, 212, 255, 0.3);
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
color: var(--neon);
box-shadow: var(--glow3);
}
.section-heading h2 {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
font-weight: 700;
color: var(--white);
letter-spacing: 1.5px;
}
.section-heading p {
font-size: 11px;
color: var(--text3);
letter-spacing: 0.5px;
margin-top: 2px;
}

.section-right { display: flex; align-items: center; gap: 10px; }
.filter-pills {
display: flex;
gap: 6px;
background: var(--bg-glass);
border: 1px solid rgba(0, 212, 255, 0.15);
border-radius: 12px;
padding: 5px;
}
.f-pill {
padding: 7px 16px;
border-radius: 8px;
background: transparent;
border: none;
color: var(--text2);
font-family: 'Inter', sans-serif;
font-size: 12px;
font-weight: 500;
cursor: pointer;
transition: var(--t1);
display: flex;
align-items: center;
gap: 6px;
}
.f-pill:hover { color: var(--neon); }
.f-pill.active {
background: var(--neon);
color: var(--bg);
box-shadow: var(--glow3);
font-weight: 600;
}
.f-pill .num {
font-size: 10px;
background: rgba(0, 212, 255, 0.2);
padding: 1px 6px;
border-radius: 5px;
font-weight: 600;
}
.f-pill.active .num { background: rgba(0, 0, 0, 0.2); color: var(--white); }

.sort-wrap {
position: relative;
}
.sort-wrap select {
padding: 7px 28px 7px 12px;
background: var(--bg-glass);
border: 1px solid rgba(0, 212, 255, 0.18);
border-radius: 8px;
color: var(--text2);
font-family: 'Inter', sans-serif;
font-size: 12px;
appearance: none;
background-image: url("image/svg+xml,%3Csvg fill='%2300d4ff' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
background-repeat: no-repeat;
background-position: right 8px center;
background-size: 14px;
cursor: pointer;
transition: var(--t1);
}
.sort-wrap select:focus { outline: none; border-color: var(--neon); box-shadow: var(--glow3); }
.sort-wrap select option { background: var(--bg-2); color: var(--text); }

/* ═══════════════════════════════════════
   MASONRY PHOTO GRID — COMPLETELY NEW
   ═══════════════════════════════════════ */
.photo-masonry {
columns: 3;
column-gap: 20px;
}
.photo-item {
break-inside: avoid;
margin-bottom: 20px;
background: var(--bg-card);
border: 1px solid rgba(0, 212, 255, 0.12);
border-radius: 16px;
overflow: hidden;
transition: all 0.4s var(--ease);
backdrop-filter: blur(12px);
box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
position: relative;
opacity: 0;
transform: translateY(25px);
animation: itemIn 0.6s var(--ease) forwards;
}
@keyframes itemIn { to { opacity: 1; transform: translateY(0); } }
.photo-item:hover {
transform: translateY(-5px);
border-color: rgba(0, 212, 255, 0.4);
box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 25px rgba(0, 212, 255, 0.15);
}
.photo-item:nth-child(1) { animation-delay: 0.05s; }
.photo-item:nth-child(2) { animation-delay: 0.1s; }
.photo-item:nth-child(3) { animation-delay: 0.15s; }
.photo-item:nth-child(4) { animation-delay: 0.2s; }
.photo-item:nth-child(5) { animation-delay: 0.25s; }
.photo-item:nth-child(6) { animation-delay: 0.3s; }

.pi-img-wrap {
position: relative;
overflow: hidden;
cursor: pointer;
}
.pi-img-wrap img {
width: 100%;
display: block;
transition: transform 0.5s var(--ease), filter 0.5s ease;
}
.photo-item:hover .pi-img-wrap img {
transform: scale(1.04);
}
.pi-img-overlay {
position: absolute;
inset: 0;
background: linear-gradient(180deg, rgba(3, 7, 20, 0) 50%, rgba(3, 7, 20, 0.7) 100%);
opacity: 0;
transition: opacity var(--t2);
display: flex;
align-items: flex-end;
justify-content: center;
padding: 14px;
}
.photo-item:hover .pi-img-overlay { opacity: 1; }
.pi-overlay-btns {
display: flex;
gap: 8px;
transform: translateY(12px);
transition: transform var(--t2);
}
.photo-item:hover .pi-overlay-btns { transform: translateY(0); }
.pi-o-btn {
width: 36px;
height: 36px;
border-radius: 10px;
background: var(--bg-glass);
border: 1px solid rgba(0, 212, 255, 0.4);
color: var(--neon);
font-size: 13px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--t1);
backdrop-filter: blur(8px);
}
.pi-o-btn:hover {
background: var(--neon);
color: var(--bg);
box-shadow: var(--glow1);
transform: scale(1.08);
}

.pi-fav {
position: absolute;
top: 10px;
right: 10px;
width: 32px;
height: 32px;
border-radius: 50%;
background: var(--bg-glass);
backdrop-filter: blur(8px);
border: 1px solid rgba(0, 212, 255, 0.35);
color: var(--text2);
font-size: 12px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--t1);
z-index: 3;
}
.pi-fav:hover, .pi-fav.active {
background: var(--neon);
border-color: var(--neon);
color: var(--bg);
box-shadow: var(--glow1);
}

.pi-body { padding: 14px 16px; }
.pi-title {
font-family: 'Orbitron', sans-serif;
font-size: 12px;
font-weight: 600;
color: var(--white);
margin-bottom: 8px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.pi-meta {
display: flex;
align-items: center;
justify-content: space-between;
}
.pi-date {
font-size: 10px;
color: var(--text3);
display: flex;
align-items: center;
gap: 5px;
}
.pi-actions {
display: flex;
gap: 5px;
}
.pi-act {
width: 28px;
height: 28px;
border-radius: 7px;
background: rgba(0, 212, 255, 0.08);
border: 1px solid rgba(0, 212, 255, 0.18);
color: var(--text3);
font-size: 11px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--t1);
}
.pi-act:hover {
background: rgba(0, 212, 255, 0.2);
color: var(--neon);
border-color: var(--neon);
transform: translateY(-2px);
}

/* ═══════════════════════════════════════
   LOADING
   ═══════════════════════════════════════ */
.loader-wrap {
text-align: center;
padding: 80px 20px;
}
.loader-ring {
width: 44px;
height: 44px;
border: 3px solid rgba(0, 212, 255, 0.18);
border-top-color: var(--neon);
border-radius: 50%;
animation: spin 0.9s linear infinite;
margin: 0 auto 18px;
box-shadow: 0 0 15px var(--neon-glow2);
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-txt {
font-family: 'Orbitron', sans-serif;
font-size: 12px;
color: var(--neon);
letter-spacing: 2px;
animation: pulseTxt 2s ease-in-out infinite;
}
@keyframes pulseTxt { 0%,100%{opacity:1}50%{opacity:0.5} }

/* ═══════════════════════════════════════
   MODAL — REDESIGNED
   ═══════════════════════════════════════ */
.modal-bg {
position: fixed;
inset: 0;
background: rgba(2, 4, 12, 0.97);
backdrop-filter: blur(28px);
z-index: 2000;
display: none;
align-items: center;
justify-content: center;
padding: 20px;
animation: fadeUp 0.4s var(--ease);
}
@keyframes fadeUp { from { opacity: 0; } to { opacity: 1; } }
.modal-bg.active { display: flex; }

.modal-panel {
background: var(--bg-2);
border: 1px solid rgba(0, 212, 255, 0.25);
border-radius: 22px;
max-width: 900px;
width: 100%;
max-height: 90vh;
overflow: hidden;
box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55), 0 0 45px rgba(0, 212, 255, 0.18);
display: flex;
flex-direction: column;
animation: panelIn 0.5s var(--t3);
}
@keyframes panelIn { from { opacity: 0; transform: translateY(30px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

.mp-head {
display: flex;
align-items: center;
justify-content: space-between;
padding: 18px 24px;
border-bottom: 1px solid rgba(0, 212, 255, 0.15);
background: linear-gradient(90deg, rgba(0, 212, 255, 0.06), transparent);
}
.mp-head h3 {
font-family: 'Orbitron', sans-serif;
font-size: 14px;
color: var(--neon);
font-weight: 700;
letter-spacing: 1px;
}
.mp-close {
width: 36px; height: 36px;
border-radius: 50%;
background: rgba(0, 212, 255, 0.12);
border: 1px solid rgba(0, 212, 255, 0.35);
color: var(--neon);
font-size: 14px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--t1);
}
.mp-close:hover {
background: var(--warn);
border-color: var(--warn);
color: white;
transform: rotate(90deg);
box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
}

.mp-body {
padding: 24px;
overflow-y: auto;
flex: 1;
background: radial-gradient(circle at center, #0c1430, #050818);
display: flex;
flex-direction: column;
align-items: center;
}
.mp-body img {
max-width: 100%;
max-height: 50vh;
object-fit: contain;
border-radius: 12px;
box-shadow: 0 0 25px rgba(0, 212, 255, 0.3), 0 10px 40px rgba(0, 0, 0, 0.4);
transition: transform 0.3s var(--ease);
cursor: zoom-in;
}
.mp-body img.zoom { cursor: zoom-out; transform: scale(1.6); }

.mp-meta-grid {
margin-top: 18px;
width: 100%;
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
}
.mp-mi {
background: rgba(0, 212, 255, 0.06);
border: 1px solid rgba(0, 212, 255, 0.15);
border-radius: 10px;
padding: 10px 14px;
text-align: center;
}
.mp-mi .ml {
font-size: 9px;
color: var(--text3);
text-transform: uppercase;
letter-spacing: 1.2px;
margin-bottom: 3px;
}
.mp-mi .mv {
font-family: 'Orbitron', sans-serif;
font-size: 11px;
color: var(--neon);
font-weight: 600;
}

.mp-foot {
display: flex;
align-items: center;
justify-content: center;
gap: 12px;
padding: 18px 24px;
border-top: 1px solid rgba(0, 212, 255, 0.12);
background: rgba(0, 212, 255, 0.03);
flex-wrap: wrap;
}
.m-btn {
padding: 10px 22px;
border-radius: 10px;
font-family: 'Inter', sans-serif;
font-size: 12px;
font-weight: 600;
cursor: pointer;
transition: var(--t2);
display: flex;
align-items: center;
gap: 8px;
border: none;
letter-spacing: 0.3px;
}
.m-btn-blue {
background: linear-gradient(135deg, var(--neon), var(--neon-deep));
color: var(--bg);
box-shadow: 0 3px 14px rgba(0, 212, 255, 0.35);
}
.m-btn-blue:hover { transform: translateY(-2px); box-shadow: var(--glow1); }
.m-btn-out {
background: transparent;
color: var(--neon);
border: 1px solid rgba(0, 212, 255, 0.4);
}
.m-btn-out:hover {
background: rgba(0, 212, 255, 0.12);
transform: translateY(-2px);
}
.m-btn-warn {
background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
color: white;
box-shadow: 0 3px 14px rgba(255, 107, 107, 0.3);
}
.m-btn-warn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(255, 107, 107, 0.45); }

/* ═══════════════════════════════════════
   TOAST
   ═══════════════════════════════════════ */
.toast {
position: fixed;
bottom: 24px;
right: 24px;
background: var(--bg-glass);
border: 1px solid var(--neon);
color: var(--neon);
padding: 13px 24px;
border-radius: 12px;
font-weight: 600;
font-size: 13px;
z-index: 3000;
display: flex;
align-items: center;
gap: 10px;
box-shadow: var(--glow2);
transform: translateX(300px);
opacity: 0;
transition: all 0.5s var(--t3);
backdrop-filter: blur(16px);
font-family: 'Orbitron', sans-serif;
letter-spacing: 0.5px;
}
.toast.show { transform: translateX(0); opacity: 1; }
.toast i { font-size: 16px; }

/* ═══════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════ */
@media (max-width: 1100px) {
.photo-masonry { columns: 2; }
}
@media (max-width: 850px) {
.topnav {
top: auto;
bottom: 16px;
left: 12px;
right: 12px;
transform: none;
border-radius: 14px;
padding: 8px 10px;
justify-content: space-between;
}
.nav-links { display: none; }
.nav-search { min-width: 0; flex: 1; max-width: 200px; }
.nav-brand { font-size: 12px; }
.app { margin-top: 20px; margin-bottom: 80px; }
.featured-slide img { height: 260px; }
.featured-title { font-size: 18px; }
.section-header { flex-direction: column; align-items: flex-start; }
.filter-pills { flex-wrap: wrap; }
}
@media (max-width: 600px) {
.photo-masonry { columns: 1; }
.app { padding: 16px; }
.featured-slide img { height: 220px; }
.mp-meta-grid { grid-template-columns: 1fr; }
.mp-foot { flex-direction: column; }
.m-btn { width: 100%; justify-content: center; }
.modal-panel { border-radius: 16px; }
}
</style>
</head>
<body>

<!-- Background Effects -->
<div class="bg-fx">
<div class="bg-orb"></div>
<div class="bg-orb"></div>
<div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>
<div class="bg-dots" id="dots"></div>

<!-- ═══════════════════════════════════════
   FLOATING TOP NAV
   ═══════════════════════════════════════ -->
<nav class="topnav">
<div class="nav-brand">⚡ LINE <span>TOGEL</span></div>
<div class="nav-links">
<div class="nav-link active"><i class="fas fa-images"></i> Galeri</div>
<div class="nav-link"><i class="fas fa-star"></i> Favorit</div>
<div class="nav-link"><i class="fas fa-clock"></i> Terbaru</div>
<div class="nav-link"><i class="fas fa-headset"></i> Bantuan</div>
</div>
<div class="nav-search">
<i class="fas fa-search"></i>
<input type="search" id="searchInput" placeholder="Cari foto..." onkeyup="doSearch()">
</div>
</nav>

<!-- ═══════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════ -->
<div class="app">

<!-- Featured Carousel -->
<div class="featured" id="featured" style="display:none">
<div class="featured-inner" id="featuredInner"></div>
<div class="featured-dots" id="featuredDots"></div>
<div class="featured-nav">
<button class="f-nav-btn" onclick="fNav(-1)"><i class="fas fa-chevron-left"></i></button>
<button class="f-nav-btn" onclick="fNav(1)"><i class="fas fa-chevron-right"></i></button>
</div>
</div>

<!-- Section Header -->
<div class="section-header">
<div class="section-left">
<div class="section-icon"><i class="fas fa-th-large"></i></div>
<div class="section-heading">
<h2>SEMUA FOTO</h2>
<p>Koleksi gambar premium LINE TOGEL</p>
</div>
</div>
<div class="section-right">
<div class="filter-pills">
<button class="f-pill active" onclick="doFilter('all',this)">Semua <span class="num" id="nAll">0</span></button>
<button class="f-pill" onclick="doFilter('fav',this)"><i class="fas fa-heart"></i> <span class="num" id="nFav">0</span></button>
<button class="f-pill" onclick="doFilter('recent',this)"><i class="fas fa-clock"></i> <span class="num" id="nRecent">0</span></button>
</div>
<div class="sort-wrap">
<select id="sortSel" onchange="doRender()">
<option value="name">Nama A-Z</option>
<option value="newest">Terbaru</option>
</select>
</div>
</div>
</div>

<!-- Gallery -->
<div id="loader" class="loader-wrap">
<div class="loader-ring"></div>
<div class="loader-txt">LOADING...</div>
</div>
<div class="photo-masonry" id="masonry"></div>

</div>

<!-- ═══════════════════════════════════════
   MODAL
   ═══════════════════════════════════════ -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
<div class="modal-panel">
<div class="mp-head">
<h3 id="mpTitle">Foto Detail</h3>
<button class="mp-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
</div>
<div class="mp-body">
<img src="" alt="" id="mpImg" onclick="this.classList.toggle('zoom')">
<div class="mp-meta-grid">
<div class="mp-mi"><div class="ml">Judul</div><div class="mv" id="mpJ">—</div></div>
<div class="mp-mi"><div class="ml">Format</div><div class="mv" id="mpF">—</div></div>
<div class="mp-mi"><div class="ml">Ukuran</div><div class="mv" id="mpS">—</div></div>
</div>
</div>
<div class="mp-foot">
<button class="m-btn m-btn-blue" onclick="doCopy()"><i class="fas fa-copy"></i> Copy</button>
<button class="m-btn m-btn-out" onclick="doDl()"><i class="fas fa-download"></i> Download</button>
<button class="m-btn m-btn-warn" onclick="doShare()"><i class="fas fa-share-alt"></i> Share</button>
</div>
</div>
</div>

<!-- Toast -->
<div id="toast" class="toast"><i class="fas fa-bolt"></i><span id="toastMsg">Berhasil!</span></div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const S = {
photos: [],
favs: JSON.parse(localStorage.getItem('ltg_f')||'[]'),
filter: 'all',
q: '',
fIdx: 0,
fTimer: null
};

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
initDots();
loadPhotos();
});

// ═══════════════════════════════════════
// DOTS
// ═══════════════════════════════════════
function initDots() {
const c = document.getElementById('dots');
for(let i=0;i<50;i++){
const d=document.createElement('div');
d.className='bdot';
d.style.left=Math.random()*100+'%';
d.style.animationDelay=Math.random()*25+'s';
d.style.animationDuration=(18+Math.random()*28)+'s';
c.appendChild(d);
}
}

// ═══════════════════════════════════════
// FETCH
// ═══════════════════════════════════════
async function loadPhotos() {
const ldr = document.getElementById('loader');
const msn = document.getElementById('masonry');
ldr.classList.add('active');
msn.innerHTML = '';
try {
const id='1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0',gid='1246502038';
let data=[];
try {
const r=await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
const t=await r.text();
const j=JSON.parse(t.substring(47).slice(0,-2));
data=j.table.rows.filter(r=>r.c?.[0]?.v&&r.c?.[1]?.v).map((r,i)=>({j:r.c[0].v,f:r.c[1].v,i:i+2,t:Date.now()-i*3600000}));
}catch{
const csv=await(await fetch(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
data=csv.split('\n').map(r=>r.split(',')).filter(r=>r[0]?.trim()&&r[1]?.trim()).map((r,i)=>({j:r[0].replace(/"/g,'').trim(),f:r[1].replace(/"/g,'').trim(),i:i+2,t:Date.now()-i*3600000}));
}
S.photos=data;
buildFeatured();
doRender();
toast('⚡ '+data.length+' foto dimuat');
}catch(e){
console.error(e);
toast('❗ Gagal memuat');
msn.innerHTML=`<div style="columns:1;padding:60px 0;text-align:center;color:var(--text3)"><i class="fas fa-exclamation-triangle" style="font-size:42px;color:var(--neon-deep);margin-bottom:16px"></i><h3 style="color:var(--neon);margin-bottom:8px">Gagal</h3><p>Periksa koneksi atau publikasi Sheets</p></div>`;
}
ldr.classList.remove('active');
}

// ═══════════════════════════════════════
// FEATURED CAROUSEL
// ═══════════════════════════════════════
function buildFeatured() {
const fe = document.getElementById('featured');
const fi = document.getElementById('featuredInner');
const fd = document.getElementById('featuredDots');
const slides = S.photos.slice(0, 4);
if(!slides.length) { fe.style.display='none'; return; }
fe.style.display='block';
fi.innerHTML = '';
fd.innerHTML = '';
slides.forEach((p,i) => {
fi.innerHTML += `<div class="featured-slide"><img src="${p.f}" alt="${p.j}"><div class="featured-info"><div class="featured-tag">FEATURED</div><div class="featured-title">${p.j}</div><div class="featured-desc">Koleksi foto LINE TOGEL premium — ${p.i}</div></div></div>`;
fd.innerHTML += `<button class="f-dot ${i===0?'active':''}" onclick="fGo(${i})"></button>`;
});
S.fIdx=0;
clearInterval(S.fTimer);
S.fTimer=setInterval(()=>fNav(1),5000);
}
function fNav(d) {
const fi=document.getElementById('featuredInner');
const dots=document.querySelectorAll('.f-dot');
const total=dots.length;
if(!total) return;
S.fIdx=(S.fIdx+d+total)%total;
fi.style.transform=`translateX(-${S.fIdx*100}%)`;
dots.forEach((d,i)=>d.classList.toggle('active',i===S.fIdx));
clearInterval(S.fTimer);
S.fTimer=setInterval(()=>fNav(1),5000);
}
function fGo(i) { fNav(i-S.fIdx); }

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function doRender() {
const msn = document.getElementById('masonry');
msn.innerHTML = '';
let d = [...S.photos];
// filter
if(S.filter==='fav') d=d.filter(p=>S.favs.includes(p.f));
else if(S.filter==='recent') d.sort((a,b)=>b.t-a.t).slice(0,20);
// sort
const sv=document.getElementById('sortSel').value;
if(sv==='name') d.sort((a,b)=>a.j.localeCompare(b.j));
if(sv==='newest') d.sort((a,b)=>b.t-a.t);
// search
if(S.q) d=d.filter(p=>p.j.toLowerCase().includes(S.q));
// counts
document.getElementById('nAll').textContent=S.photos.length;
document.getElementById('nFav').textContent=S.favs.length;
document.getElementById('nRecent').textContent=Math.min(20,S.photos.length);

if(!d.length) {
msn.innerHTML=`<div style="columns:1;padding:60px 0;text-align:center;color:var(--text3)"><i class="fas fa-search" style="font-size:42px;margin-bottom:16px;opacity:0.5"></i><h3 style="color:var(--neon);margin-bottom:8px">Tidak Ditemukan</h3><p>Coba kata kunci lain</p></div>`;
return;
}
d.forEach((p,idx) => {
msn.appendChild(mkCard(p,idx));
});
}

function mkCard(p,idx) {
const isF = S.favs.includes(p.f);
const el = document.createElement('div');
el.className='photo-item';
el.innerHTML=`
<div class="pi-img-wrap" onclick="openModal('${p.f}','${p.j.replace(/'/g,"\\'")}')">
<img src="${p.f}" alt="${p.j}" loading="lazy">
<div class="pi-img-overlay">
<div class="pi-overlay-btns">
<button class="pi-o-btn" onclick="event.stopPropagation();openModal('${p.f}','${p.j.replace(/'/g,"\\'")}')" title="Lihat"><i class="fas fa-expand"></i></button>
<button class="pi-o-btn" onclick="event.stopPropagation();doCopyUrl('${p.f}')" title="Copy"><i class="fas fa-copy"></i></button>
<button class="pi-o-btn" onclick="event.stopPropagation();doDlUrl('${p.f}','${p.j.replace(/'/g,"\\'")}')" title="Download"><i class="fas fa-download"></i></button>
</div>
</div>
<button class="pi-fav ${isF?'active':''}" onclick="event.stopPropagation();doFav('${p.f}',this)" title="Favorit"><i class="fas fa-heart"></i></button>
</div>
<div class="pi-body">
<div class="pi-title">${p.j}</div>
<div class="pi-meta">
<div class="pi-date"><i class="far fa-clock"></i> ${fmt(p.t)}</div>
<div class="pi-actions">
<button class="pi-act" onclick="doCopyUrl('${p.f}')" title="Copy"><i class="fas fa-copy"></i></button>
<button class="pi-act" onclick="doDlUrl('${p.f}','${p.j.replace(/'/g,"\\'")}')" title="Download"><i class="fas fa-download"></i></button>
<button class="pi-act" onclick="doShareUrl('${p.f}','${p.j.replace(/'/g,"\\'")}')" title="Share"><i class="fas fa-share-alt"></i></button>
</div>
</div>
</div>`;
return el;
}

function fmt(ts) {
const d=new Date(ts);
return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function doFilter(t,el) {
document.querySelectorAll('.f-pill').forEach(p=>p.classList.remove('active'));
if(el) el.classList.add('active');
S.filter=t;
doRender();
}
function doSearch() {
S.q=document.getElementById('searchInput').value.toLowerCase();
doRender();
}
function doFav(url,btn) {
const i=S.favs.indexOf(url);
if(i>-1) { S.favs.splice(i,1); btn.classList.remove('active'); toast('💔 Dihapus dari favorit'); }
else { S.favs.push(url); btn.classList.add('active'); toast('❤️ Ditambahkan ke favorit'); }
localStorage.setItem('ltg_f',JSON.stringify(S.favs));
doRender();
}

// Copy/Download/Share
let cImg='',cTit='';
function openModal(url,title) {
cImg=url; cTit=title;
document.getElementById('mpTitle').textContent=title;
document.getElementById('mpImg').src=url;
document.getElementById('mpImg').classList.remove('zoom');
document.getElementById('mpJ').textContent=title;
document.getElementById('mpF').textContent=url.split('?')[0].split('.').pop().toUpperCase();
document.getElementById('mpS').textContent='—';
document.getElementById('modalBg').classList.add('active');
document.body.style.overflow='hidden';
fetch(url).then(r=>r.blob()).then(b=>{
const kb=(b.size/1024).toFixed(1);
document.getElementById('mpS').textContent=kb>1024?(kb/1024).toFixed(2)+' MB':kb+' KB';
}).catch(()=>{});
}
function closeModal() {
document.getElementById('modalBg').classList.remove('active');
document.body.style.overflow='';
cImg=cTit='';
}

async function doCopyUrl(url) {
try {
const b=await(await fetch(url)).blob();
await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]);
toast('✅ Foto disalin!');
}catch{toast('❗ Klik kanan gambar > Copy');}
}
function doCopy() { if(cImg) doCopyUrl(cImg); }

function doDlUrl(url,title) {
const a=document.createElement('a');a.href=url;
a.download=`${title.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`;
a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);
toast('⚡ Download dimulai...');
}
function doDl() { if(cImg) doDlUrl(cImg,cTit); }

async function doShareUrl(url,title) {
if(navigator.share) {
try {
const b=await(await fetch(url)).blob();
await navigator.share({title,text:'Lihat foto ini:',files:[new File([b],`${title}.jpg`,{type:b.type})]});
toast('🔗 Berhasil dibagikan!');
}catch(e){if(e.name!=='AbortError')toast('❌ Gagal share');}
} else { doCopyUrl(url); toast('✅ Link disalin!'); }
}
function doShare() { if(cImg) doShareUrl(cImg,cTit); }

// Toast
function toast(m) {
const t=document.getElementById('toast');
document.getElementById('toastMsg').textContent=m;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),3500);
}

// Keyboard
document.addEventListener('keydown',e=>{
if(e.key==='Escape')closeModal();
if(e.ctrlKey&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}
});
</script>
</body>
</html>

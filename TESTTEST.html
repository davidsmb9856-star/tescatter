<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ FOTO — LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon: #00d4ff;
--neon-bright: #00eaff;
--neon-deep: #0077b6;
--neon-glow: rgba(0, 212, 255, 0.6);
--neon-glow2: rgba(0, 212, 255, 0.3);
--neon-glow3: rgba(0, 212, 255, 0.12);
--blue1: #0a0e2a;
--blue2: #0d1440;
--blue3: #111b55;
--blue4: #162066;
--bg: #060a20;
--bg-card: rgba(13, 20, 64, 0.7);
--bg-glass: rgba(10, 14, 42, 0.85);
--text: #e8f0ff;
--text2: #8aa8d8;
--text3: #5a7aaa;
--glow-sm: 0 0 15px rgba(0, 212, 255, 0.45), 0 0 35px rgba(0, 212, 255, 0.2);
--glow-md: 0 0 20px rgba(0, 212, 255, 0.55), 0 0 50px rgba(0, 212, 255, 0.3), 0 0 90px rgba(0, 212, 255, 0.15);
--glow-lg: 0 0 30px rgba(0, 212, 255, 0.7), 0 0 70px rgba(0, 212, 255, 0.4), 0 0 120px rgba(0, 212, 255, 0.2);
--ease: 300ms cubic-bezier(0.16, 1, 0.3, 1);
--bounce: 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Inter', 'Rajdhani', sans-serif;
background: var(--bg);
color: var(--text);
min-height: 100vh;
overflow-x: hidden;
line-height: 1.6;
}

/* ════════ AMBIENT BG ════════ */
.ambient {
position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden;
}
.ambient-blob {
position: absolute;
border-radius: 50%;
filter: blur(80px);
opacity: 0.35;
animation: blobMove 25s ease-in-out infinite alternate;
}
.ambient-blob:nth-child(1) { width: 500px; height: 500px; background: var(--neon-deep); top: -10%; left: -10%; animation-duration: 30s; }
.ambient-blob:nth-child(2) { width: 400px; height: 400px; background: #004488; top: 50%; right: -5%; animation-duration: 22s; animation-delay: -8s; }
.ambient-blob:nth-child(3) { width: 350px; height: 350px; background: #0066bb; bottom: -5%; left: 30%; animation-duration: 28s; animation-delay: -15s; }
@keyframes blobMove {
0%, 100% { transform: translate(0, 0) scale(1); }
33% { transform: translate(30px, -20px) scale(1.05); }
66% { transform: translate(-20px, 25px) scale(0.95); }
}

/* Grid lines */
.grid-bg {
position: fixed; inset: 0; z-index: -1; pointer-events: none;
background-image: linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
background-size: 60px 60px;
mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 80%);
animation: gridDrift 40s linear infinite;
}
@keyframes gridDrift { 0% { background-position: 0 0; } 100% { background-position: 60px 60px; } }

/* Floating dots */
.float-dots { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.float-dot {
position: absolute;
width: 4px; height: 4px;
background: var(--neon);
border-radius: 50%;
box-shadow: 0 0 10px var(--neon), 0 0 25px rgba(0, 212, 255, 0.4);
opacity: 0;
animation: dotFloat 30s infinite ease-in-out;
}
@keyframes dotFloat {
0%, 100% { transform: translateY(100vh) scale(0.4); opacity: 0; }
8% { opacity: 0.85; }
92% { opacity: 0.85; }
100% { transform: translateY(-100vh) scale(1.4); opacity: 0; }
}

/* ════════ FLOATING HEADER ════════ */
.floating-header {
position: sticky;
top: 0;
left: 0; right: 0;
z-index: 500;
padding: 12px 24px;
background: var(--bg-glass);
backdrop-filter: blur(20px) saturate(180%);
border-bottom: 1px solid rgba(0, 212, 255, 0.15);
display: flex;
align-items: center;
justify-content: space-between;
gap: 16px;
}
.fh-left {
display: flex;
align-items: center;
gap: 14px;
flex-shrink: 0;
}
.fh-logo {
width: 40px; height: 40px;
background: linear-gradient(135deg, var(--neon), var(--neon-deep));
border-radius: 12px;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
box-shadow: var(--glow-sm);
}
.fh-title {
font-family: 'Orbitron', sans-serif;
font-size: 18px;
font-weight: 700;
letter-spacing: 2px;
background: linear-gradient(90deg, var(--neon-bright), var(--neon));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}
.fh-subtitle {
font-size: 11px;
color: var(--text3);
letter-spacing: 1px;
}

.fh-search {
flex: 1;
max-width: 420px;
position: relative;
display: none;
}
@media (min-width: 768px) { .fh-search { display: block; } }
.fh-search input {
width: 100%;
padding: 10px 16px 10px 42px;
background: rgba(0, 212, 255, 0.08);
border: 1px solid rgba(0, 212, 255, 0.2);
border-radius: 12px;
color: var(--text);
font-size: 14px;
font-family: 'Inter', sans-serif;
transition: var(--ease);
}
.fh-search input:focus {
outline: none;
border-color: var(--neon);
box-shadow: var(--glow-sm);
background: rgba(0, 212, 255, 0.12);
}
.fh-search input::placeholder { color: var(--text3); }
.fh-search i {
position: absolute;
left: 14px;
top: 50%;
transform: translateY(-50%);
color: var(--text3);
font-size: 14px;
}

.fh-right {
display: flex;
align-items: center;
gap: 10px;
flex-shrink: 0;
}
.fh-btn {
width: 38px; height: 38px;
border-radius: 11px;
background: rgba(0, 212, 255, 0.1);
border: 1px solid rgba(0, 212, 255, 0.25);
color: var(--neon);
font-size: 15px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--ease);
}
.fh-btn:hover {
background: rgba(0, 212, 255, 0.2);
box-shadow: var(--glow-sm);
transform: translateY(-2px);
}

/* ════════ HERO — FULL WIDTH BANNER ════════ */
.hero-banner {
position: relative;
margin: 0;
padding: 44px 24px 40px;
background: linear-gradient(160deg, var(--blue2) 0%, var(--blue1) 60%, var(--bg) 100%);
overflow: hidden;
border-bottom: 1px solid rgba(0, 212, 255, 0.12);
}
.hero-banner::before {
content: '';
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
background:
radial-gradient(600px 300px at 15% 50%, rgba(0, 212, 255, 0.12) 0%, transparent 70%),
radial-gradient(400px 200px at 85% 40%, rgba(0, 119, 182, 0.1) 0%, transparent 70%);
}
.hero-inner {
position: relative;
max-width: 1200px;
margin: 0 auto;
display: flex;
align-items: center;
justify-content: space-between;
gap: 24px;
flex-wrap: wrap;
}
.hero-text { flex: 1; min-width: 280px; }
.hero-status {
display: inline-flex;
align-items: center;
gap: 8px;
padding: 5px 14px;
background: rgba(0, 212, 255, 0.12);
border: 1px solid rgba(0, 212, 255, 0.35);
border-radius: 100px;
font-size: 11px;
font-weight: 700;
color: var(--neon-bright);
letter-spacing: 1.5px;
text-transform: uppercase;
margin-bottom: 16px;
}
.hero-status .dot {
width: 7px; height: 7px;
background: var(--neon);
border-radius: 50%;
box-shadow: 0 0 10px var(--neon);
animation: statusDot 2s ease-in-out infinite;
}
@keyframes statusDot { 0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:0.7} }
.hero-text h1 {
font-family: 'Orbitron', sans-serif;
font-size: clamp(26px, 5vw, 40px);
font-weight: 900;
letter-spacing: 3px;
margin-bottom: 12px;
background: linear-gradient(135deg, #ffffff, var(--neon-bright), var(--neon));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
line-height: 1.2;
}
.hero-text p {
font-size: 15px;
color: var(--text2);
max-width: 520px;
line-height: 1.7;
}

.hero-right {
display: flex;
align-items: center;
gap: 12px;
flex-wrap: wrap;
}
.hero-btn {
padding: 11px 24px;
border-radius: 12px;
font-family: 'Inter', sans-serif;
font-size: 13px;
font-weight: 600;
cursor: pointer;
transition: var(--ease);
display: inline-flex;
align-items: center;
gap: 8px;
text-decoration: none;
border: none;
letter-spacing: 0.3px;
}
.hero-btn-fill {
background: linear-gradient(135deg, var(--neon), var(--neon-deep));
color: #fff;
box-shadow: 0 4px 20px rgba(0, 212, 255, 0.35);
}
.hero-btn-fill:hover {
transform: translateY(-2px) scale(1.02);
box-shadow: var(--glow-md);
}
.hero-btn-ghost {
background: transparent;
color: var(--neon);
border: 1px solid rgba(0, 212, 255, 0.4);
}
.hero-btn-ghost:hover {
background: rgba(0, 212, 255, 0.1);
transform: translateY(-2px);
}

/* ════════ QUICK STATS ════════ */
.quick-stats {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 14px;
padding: 0 24px;
margin-top: -24px;
position: relative;
z-index: 10;
max-width: 1200px;
margin-left: auto;
margin-right: auto;
}
.qs-card {
background: var(--bg-card);
border: 1px solid rgba(0, 212, 255, 0.18);
border-radius: 14px;
padding: 18px 16px;
display: flex;
align-items: center;
gap: 14px;
backdrop-filter: blur(12px);
transition: var(--ease);
box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.qs-card:hover {
transform: translateY(-3px);
border-color: rgba(0, 212, 255, 0.4);
box-shadow: var(--glow-sm);
}
.qs-icon {
width: 42px; height: 42px;
border-radius: 11px;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 119, 182, 0.15));
color: var(--neon);
}
.qs-num {
font-family: 'Orbitron', sans-serif;
font-size: 20px;
font-weight: 700;
color: var(--text);
line-height: 1;
margin-bottom: 3px;
}
.qs-label {
font-size: 11px;
color: var(--text3);
text-transform: uppercase;
letter-spacing: 0.8px;
}

/* ════════ TOOLBAR ════════ */
.toolbar {
max-width: 1200px;
margin: 28px auto 0;
padding: 0 24px;
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 14px;
}
.pills {
display: flex;
gap: 8px;
overflow-x: auto;
padding-bottom: 4px;
scrollbar-width: none;
}
.pills::-webkit-scrollbar { display: none; }
.pill {
padding: 7px 18px;
border-radius: 100px;
background: var(--bg-card);
border: 1px solid rgba(0, 212, 255, 0.18);
color: var(--text2);
font-size: 12px;
font-weight: 600;
cursor: pointer;
transition: var(--ease);
white-space: nowrap;
display: flex;
align-items: center;
gap: 6px;
}
.pill:hover { border-color: rgba(0, 212, 255, 0.4); color: var(--text); }
.pill.active {
background: linear-gradient(135deg, var(--neon), var(--neon-deep));
color: #fff;
border-color: transparent;
box-shadow: 0 2px 14px rgba(0, 212, 255, 0.35);
}
.toolbar-right {
display: flex;
align-items: center;
gap: 8px;
}
.view-btn {
width: 36px; height: 36px;
border-radius: 10px;
background: var(--bg-card);
border: 1px solid rgba(0, 212, 255, 0.18);
color: var(--text3);
font-size: 14px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--ease);
}
.view-btn.active, .view-btn:hover {
color: var(--neon);
border-color: var(--neon);
background: rgba(0, 212, 255, 0.1);
}

/* ════════ PHOTO GRID — NEW DESIGN ════════ */
.gallery-area {
max-width: 1200px;
margin: 24px auto 0;
padding: 0 24px 60px;
}
.photo-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 20px;
}

/* Card */
.card {
position: relative;
background: var(--bg-card);
border: 1px solid rgba(0, 212, 255, 0.12);
border-radius: 16px;
overflow: hidden;
transition: all 0.4s var(--ease);
backdrop-filter: blur(12px);
box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
animation: cardPop 0.5s var(--bounce) forwards;
opacity: 0;
transform: translateY(20px);
}
@keyframes cardPop { to { opacity: 1; transform: translateY(0); } }
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.1s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.2s; }
.card:nth-child(5) { animation-delay: 0.25s; }
.card:nth-child(n+6) { animation-delay: 0.3s; }

.card:hover {
transform: translateY(-5px);
border-color: rgba(0, 212, 255, 0.35);
box-shadow: var(--glow-md), 0 16px 48px rgba(0, 0, 0, 0.4);
}

.card-img {
position: relative;
width: 100%;
height: 240px;
background: radial-gradient(circle, #0f1550, #080c30);
overflow: hidden;
}
.card-img::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(180deg, transparent 60%, rgba(6, 10, 32, 0.8));
pointer-events: none;
}
.card-img img {
width: 100%;
height: 100%;
object-fit: contain;
transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), filter 0.5s ease;
}
.card:hover .card-img img {
transform: scale(1.05);
filter: drop-shadow(0 4px 20px rgba(0, 212, 255, 0.3));
}

.card-tag {
position: absolute;
top: 12px; left: 12px; z-index: 2;
padding: 3px 10px;
background: rgba(0, 212, 255, 0.8);
backdrop-filter: blur(8px);
border-radius: 8px;
font-size: 10px;
font-weight: 700;
color: #fff;
letter-spacing: 0.8px;
text-transform: uppercase;
}
.card-heart {
position: absolute;
top: 12px; right: 12px; z-index: 2;
width: 32px; height: 32px;
border-radius: 50%;
background: var(--bg-glass);
backdrop-filter: blur(8px);
border: 1px solid rgba(0, 212, 255, 0.35);
color: var(--text3);
font-size: 13px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--ease);
}
.card-heart:hover, .card-heart.active {
background: var(--neon);
border-color: var(--neon);
color: #fff;
box-shadow: 0 0 18px rgba(0, 212, 255, 0.5);
transform: scale(1.1);
}

/* Quick actions overlay */
.card-actions-overlay {
position: absolute;
inset: 0;
z-index: 2;
background: rgba(6, 10, 32, 0.7);
backdrop-filter: blur(3px);
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
opacity: 0;
transition: opacity var(--ease);
}
.card:hover .card-actions-overlay { opacity: 1; }
.ca-btn {
width: 44px; height: 44px;
border-radius: 12px;
background: rgba(0, 212, 255, 0.2);
border: 1px solid rgba(0, 212, 255, 0.5);
color: var(--neon);
font-size: 16px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--ease);
transform: translateY(10px);
opacity: 0;
}
.card:hover .ca-btn { transform: translateY(0); opacity: 1; }
.card:hover .ca-btn:nth-child(2) { transition-delay: 60ms; }
.card:hover .ca-btn:nth-child(3) { transition-delay: 120ms; }
.ca-btn:hover {
background: var(--neon);
color: var(--bg);
box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
transform: scale(1.1);
}

.card-content {
padding: 16px 18px 14px;
}
.card-title {
font-family: 'Inter', sans-serif;
font-size: 14px;
font-weight: 600;
color: var(--text);
margin-bottom: 8px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.card-row {
display: flex;
align-items: center;
justify-content: space-between;
gap: 8px;
}
.card-time {
font-size: 11px;
color: var(--text3);
display: flex;
align-items: center;
gap: 4px;
}
.card-row-btns {
display: flex;
gap: 4px;
}
.cr-btn {
width: 30px; height: 30px;
border-radius: 8px;
background: rgba(0, 212, 255, 0.08);
border: 1px solid rgba(0, 212, 255, 0.2);
color: var(--text3);
font-size: 12px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--ease);
}
.cr-btn:hover {
background: rgba(0, 212, 255, 0.2);
color: var(--neon);
border-color: rgba(0, 212, 255, 0.5);
transform: translateY(-2px);
}

/* ════════ LOADING ════════ */
.loading-box {
text-align: center;
padding: 80px 20px;
grid-column: 1 / -1;
}
.load-spinner {
width: 44px; height: 44px;
border: 3px solid rgba(0, 212, 255, 0.2);
border-top-color: var(--neon);
border-radius: 50%;
animation: spin 0.9s linear infinite;
margin: 0 auto 18px;
box-shadow: var(--glow-sm);
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-text {
font-family: 'Orbitron', sans-serif;
font-size: 12px;
color: var(--neon);
letter-spacing: 2px;
animation: pulseText 2s ease-in-out infinite;
}
@keyframes pulseText { 0%,100%{opacity:1}50%{opacity:0.45} }

/* ════════ MODAL ════════ */
.modal {
position: fixed; inset: 0; z-index: 2000;
background: rgba(4, 6, 24, 0.96);
backdrop-filter: blur(20px);
display: none;
align-items: center;
justify-content: center;
padding: 20px;
animation: modalFade 0.35s ease;
}
@keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
.modal.active { display: flex; }

.modal-panel {
background: var(--blue2);
border: 1px solid rgba(0, 212, 255, 0.3);
border-radius: 20px;
max-width: 900px;
width: 100%;
max-height: 90vh;
overflow: hidden;
box-shadow: var(--glow-lg), 0 20px 60px rgba(0, 0, 0, 0.5);
display: flex;
flex-direction: column;
animation: modalSlide 0.5s var(--bounce);
}
@keyframes modalSlide { from { opacity: 0; transform: translateY(25px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

.modal-hd {
display: flex;
align-items: center;
justify-content: space-between;
padding: 18px 22px;
border-bottom: 1px solid rgba(0, 212, 255, 0.15);
}
.modal-hd h3 {
font-family: 'Orbitron', sans-serif;
font-size: 15px;
color: var(--neon);
font-weight: 700;
letter-spacing: 1px;
}
.modal-x {
width: 36px; height: 36px;
border-radius: 50%;
background: rgba(0, 212, 255, 0.12);
border: 1px solid rgba(0, 212, 255, 0.35);
color: var(--neon);
font-size: 14px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--ease);
}
.modal-x:hover {
background: var(--neon);
color: var(--bg);
transform: rotate(90deg);
}

.modal-img-wrap {
padding: 22px;
background: radial-gradient(circle at center, #0e1555, #060a30);
display: flex;
flex-direction: column;
align-items: center;
overflow-y: auto;
}
.modal-img-wrap img {
max-width: 100%;
max-height: 55vh;
object-fit: contain;
border-radius: 14px;
box-shadow: 0 0 30px rgba(0, 212, 255, 0.3), 0 8px 40px rgba(0, 0, 0, 0.4);
}

.modal-meta {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
margin-top: 16px;
width: 100%;
}
.meta-item {
background: rgba(0, 212, 255, 0.06);
border: 1px solid rgba(0, 212, 255, 0.18);
border-radius: 10px;
padding: 10px 14px;
text-align: center;
}
.meta-item .m-label {
font-size: 10px;
color: var(--text3);
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 3px;
}
.meta-item .m-val {
font-family: 'Orbitron', sans-serif;
font-size: 11px;
color: var(--neon);
font-weight: 700;
}

.modal-ft {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
padding: 18px 22px;
border-top: 1px solid rgba(0, 212, 255, 0.12);
background: rgba(0, 212, 255, 0.04);
flex-wrap: wrap;
}
.m-btn {
padding: 10px 22px;
border-radius: 10px;
font-size: 13px;
font-weight: 600;
cursor: pointer;
transition: var(--ease);
display: flex;
align-items: center;
gap: 7px;
border: none;
font-family: 'Inter', sans-serif;
}
.m-btn-fill {
background: linear-gradient(135deg, var(--neon), var(--neon-deep));
color: #fff;
box-shadow: 0 3px 16px rgba(0, 212, 255, 0.3);
}
.m-btn-fill:hover { transform: translateY(-2px); box-shadow: var(--glow-md); }
.m-btn-out {
background: transparent;
color: var(--neon);
border: 1px solid rgba(0, 212, 255, 0.4);
}
.m-btn-out:hover { background: rgba(0, 212, 255, 0.1); transform: translateY(-2px); }
.m-btn-share {
background: linear-gradient(135deg, #ff6b35, #ff8c42);
color: #fff;
box-shadow: 0 3px 16px rgba(255, 107, 53, 0.3);
}
.m-btn-share:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255, 107, 53, 0.45); }

/* ════════ TOAST ════════ */
.toast {
position: fixed;
bottom: 24px;
right: 24px;
z-index: 3000;
background: var(--bg-glass);
border: 1px solid rgba(0, 212, 255, 0.5);
color: var(--neon);
padding: 13px 24px;
border-radius: 12px;
font-weight: 600;
font-size: 13px;
display: flex;
align-items: center;
gap: 10px;
box-shadow: var(--glow-md);
transform: translateX(320px);
opacity: 0;
transition: all 0.5s var(--bounce);
backdrop-filter: blur(14px);
}
.toast.show { transform: translateX(0); opacity: 1; }
.toast i { font-size: 16px; }

/* ════════ RESPONSIVE ════════ */
@media (max-width: 768px) {
.quick-stats { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 16px; }
.toolbar { padding: 0 16px; }
.gallery-area { padding: 0 16px 48px; }
.photo-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
.floating-header { padding: 10px 16px; }
.hero-banner { padding: 32px 16px 28px; }
.hero-right { width: 100%; justify-content: center; }
.modal-meta { grid-template-columns: 1fr; }
.modal-ft { flex-direction: column; }
.m-btn { width: 100%; justify-content: center; }
}
@media (max-width: 480px) {
.quick-stats { grid-template-columns: 1fr 1fr; }
.photo-grid { grid-template-columns: 1fr; }
.hero-btn { width: 100%; justify-content: center; }
}

/* ════════ SCROLLBAR ════════ */
::-webkit-scrollbar { width: 7px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon), var(--neon-deep));
border-radius: 4px;
box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
}

::selection { background: rgba(0, 212, 255, 0.4); color: #fff; }
</style>
</head>
<body>

<!-- Ambient BG -->
<div class="ambient">
<div class="ambient-blob"></div>
<div class="ambient-blob"></div>
<div class="ambient-blob"></div>
</div>
<div class="grid-bg"></div>
<div class="float-dots" id="floatDots"></div>

<!-- ════════ FLOATING HEADER ════════ -->
<header class="floating-header">
<div class="fh-left">
<div class="fh-logo">⚡</div>
<div>
<div class="fh-title">FOTO</div>
<div class="fh-subtitle">LINE TOGEL 2026</div>
</div>
</div>
<div class="fh-search">
<i class="fas fa-search"></i>
<input type="search" id="searchInput" placeholder="Cari foto..." onkeyup="searchPhotos()">
</div>
<div class="fh-right">
<button class="fh-btn" onclick="fetchPhotos()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
<button class="fh-btn" onclick="window.open('https://wa.me/6281234567890','_blank')" title="Bantuan"><i class="fas fa-headset"></i></button>
</div>
</header>

<!-- ════════ HERO BANNER ════════ -->
<section class="hero-banner">
<div class="hero-inner">
<div class="hero-text">
<div class="hero-status"><span class="dot"></span> System Online</div>
<h1>GALERI FOTO<br>KOLEKSI TERLENGKAP</h1>
<p>Jelajahi ratusan foto premium. Download, copy, dan bagikan langsung dari galeri modern ini.</p>
</div>
<div class="hero-right">
<button class="hero-btn hero-btn-fill" onclick="document.querySelector('.gallery-area').scrollIntoView({behavior:'smooth'})">
<i class="fas fa-images"></i> Buka Galeri
</button>
<a href="index.html" class="hero-btn hero-btn-ghost">
<i class="fas fa-arrow-left"></i> Kembali
</a>
</div>
</div>
</section>

<!-- ════════ QUICK STATS ════════ -->
<div class="quick-stats">
<div class="qs-card">
<div class="qs-icon"><i class="fas fa-images"></i></div>
<div>
<div class="qs-num" id="qsTotal">—</div>
<div class="qs-label">Total Foto</div>
</div>
</div>
<div class="qs-card">
<div class="qs-icon"><i class="fas fa-heart"></i></div>
<div>
<div class="qs-num" id="qsFav">0</div>
<div class="qs-label">Favorit</div>
</div>
</div>
<div class="qs-card">
<div class="qs-icon"><i class="fas fa-download"></i></div>
<div>
<div class="qs-num" id="qsReady">—</div>
<div class="qs-label">Siap Download</div>
</div>
</div>
<div class="qs-card">
<div class="qs-icon" style="color: #00ff9d; background: linear-gradient(135deg, rgba(0,255,157,0.2), rgba(0,200,100,0.15));"><i class="fas fa-check-circle"></i></div>
<div>
<div class="qs-num" style="color: #00ff9d;">✓</div>
<div class="qs-label">Status</div>
</div>
</div>
</div>

<!-- ════════ TOOLBAR ════════ -->
<div class="toolbar">
<div class="pills">
<button class="pill active" onclick="setFilter('all', this)"><i class="fas fa-th"></i> Semua</button>
<button class="pill" onclick="setFilter('favorites', this)"><i class="fas fa-heart"></i> Favorit</button>
<button class="pill" onclick="setFilter('recent', this)"><i class="fas fa-clock"></i> Terbaru</button>
</div>
<div class="toolbar-right">
<button class="view-btn active" onclick="setView('grid', this)" title="Grid view"><i class="fas fa-th-large"></i></button>
<button class="view-btn" onclick="setView('list', this)" title="List view"><i class="fas fa-list"></i></button>
</div>
</div>

<!-- ════════ GALLERY ════════ -->
<div class="gallery-area">
<div class="loading-box" id="loading">
<div class="load-spinner"></div>
<div class="load-text">Memuat Foto...</div>
</div>
<div class="photo-grid" id="photoGrid"></div>
</div>

<!-- ════════ MODAL ════════ -->
<div class="modal" id="modal">
<div class="modal-panel">
<div class="modal-hd">
<h3 id="modalTitle">Foto Detail</h3>
<button class="modal-x" onclick="closeModal()"><i class="fas fa-times"></i></button>
</div>
<div class="modal-img-wrap">
<img src="" alt="" id="modalImg">
<div class="modal-meta">
<div class="meta-item"><div class="m-label">Judul</div><div class="m-val" id="mTitle">—</div></div>
<div class="meta-item"><div class="m-label">Format</div><div class="m-val" id="mFormat">—</div></div>
<div class="meta-item"><div class="m-label">Ukuran</div><div class="m-val" id="mSize">—</div></div>
</div>
</div>
<div class="modal-ft">
<button class="m-btn m-btn-fill" onclick="copyImg()"><i class="fas fa-copy"></i> Copy</button>
<button class="m-btn m-btn-out" onclick="dlModal()"><i class="fas fa-download"></i> Download</button>
<button class="m-btn m-btn-share" onclick="shareImg()"><i class="fas fa-share-alt"></i> Share</button>
</div>
</div>
</div>

<!-- ════════ TOAST ════════ -->
<div id="toast" class="toast"><i class="fas fa-bolt"></i><span id="toastText">Berhasil!</span></div>

<script>
const state = { photos: [], favs: JSON.parse(localStorage.getItem('ltg_f')||'[]'), filter: 'all', search: '' };

document.addEventListener('DOMContentLoaded', () => {
initDots(); fetchPhotos(); updateCounts();
});

// Dots
function initDots() {
const c = document.getElementById('floatDots');
for (let i = 0; i < 50; i++) {
const d = document.createElement('div');
d.className = 'float-dot';
d.style.left = Math.random()*100+'%';
d.style.animationDelay = Math.random()*30+'s';
d.style.animationDuration = (22+Math.random()*28)+'s';
c.appendChild(d);
}
}

// Fetch
async function fetchPhotos() {
document.getElementById('loading').classList.add('active');
document.getElementById('photoGrid').innerHTML = '';
try {
const sid = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';
let p = [];
try {
const r = await fetch(`https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
const t = await r.text();
const j = JSON.parse(t.substring(47).slice(0,-2));
p = j.table.rows.filter(r=>r.c?.[0]?.v&&r.c?.[1]?.v).map((r,i)=>({judul:r.c[0].v,foto:r.c[1].v,idx:i+2,ts:Date.now()-i*3600000}));
} catch(e) {
const csv = await (await fetch(`https://docs.google.com/spreadsheets/d/${sid}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
p = csv.split('\n').map(r=>r.split(',')).filter(r=>r[0]?.trim()&&r[1]?.trim()).map((r,i)=>({judul:r[0].replace(/"/g,'').trim(),foto:r[1].replace(/"/g,'').trim(),idx:i+2,ts:Date.now()-i*3600000}));
}
state.photos = p;
document.getElementById('qsTotal').textContent = p.length;
document.getElementById('qsReady').textContent = p.length;
applyFilters();
toast(`⚡ ${p.length} foto dimuat`);
} catch(err) {
document.getElementById('photoGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:70px;color:var(--text3)"><i class="fas fa-exclamation-triangle" style="font-size:44px;color:var(--neon);margin-bottom:18px;"></i><h3 style="color:var(--neon);margin-bottom:10px;">Gagal Memuat</h3><p>Periksa koneksi Google Sheets</p></div>`;
}
document.getElementById('loading').classList.remove('active');
}

// Filter
function setFilter(f, btn) {
document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
if (btn) btn.classList.add('active');
state.filter = f;
applyFilters();
}
function searchPhotos() { state.search = document.getElementById('searchInput').value.toLowerCase(); applyFilters(); }
function setView(v, btn) {
document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
if (btn) btn.classList.add('active');
const g = document.getElementById('photoGrid');
g.style.gridTemplateColumns = v === 'list' ? '1fr' : '';
}

function applyFilters() {
let f = [...state.photos];
if (state.filter === 'favorites') f = f.filter(p => state.favs.includes(p.foto));
else if (state.filter === 'recent') f.sort((a,b)=>b.ts-a.ts).slice(0,20);
if (state.search) f = f.filter(p => p.judul.toLowerCase().includes(state.search));
updateCounts();
render(f);
}

function render(photos) {
const g = document.getElementById('photoGrid');
g.innerHTML = '';
if (!photos.length) {
g.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:70px;color:var(--text3)"><i class="fas fa-search" style="font-size:44px;margin-bottom:18px;opacity:0.5;"></i><h3 style="color:var(--neon);margin-bottom:10px;">Tidak Ditemukan</h3><p>Coba kata kunci lain</p></div>`;
return;
}
photos.forEach((p,i) => g.appendChild(makeCard(p, i)));
}

function makeCard(p, i) {
const fav = state.favs.includes(p.foto);
const d = document.createElement('div');
d.className = 'card';
d.innerHTML = `
<div class="card-img">
<img src="${p.foto}" alt="${p.judul}" loading="lazy" onclick="openModal('${p.foto}','${p.judul.replace(/'/g,"\\'")}')">
<span class="card-tag">#${i+1}</span>
<button class="card-heart ${fav?'active':''}" onclick="event.stopPropagation();toggleFav('${p.foto}',this)"><i class="fas fa-heart"></i></button>
<div class="card-actions-overlay">
<button class="ca-btn" onclick="event.stopPropagation();openModal('${p.foto}','${p.judul.replace(/'/g,"\\'")}')" title="Lihat"><i class="fas fa-expand"></i></button>
<button class="ca-btn" onclick="event.stopPropagation();copyPhoto('${p.foto}')" title="Copy"><i class="fas fa-copy"></i></button>
<button class="ca-btn" onclick="event.stopPropagation();dlPhoto('${p.foto}','${p.judul.replace(/'/g,"\\'")}')" title="Download"><i class="fas fa-download"></i></button>
</div>
</div>
<div class="card-content">
<div class="card-title">${p.judul}</div>
<div class="card-row">
<div class="card-time"><i class="far fa-clock"></i> ${fmtDate(p.ts)}</div>
<div class="card-row-btns">
<button class="cr-btn" onclick="copyPhoto('${p.foto}')" title="Copy"><i class="fas fa-copy"></i></button>
<button class="cr-btn" onclick="dlPhoto('${p.foto}','${p.judul.replace(/'/g,"\\'")}')" title="Download"><i class="fas fa-download"></i></button>
<button class="cr-btn" onclick="shareP('${p.foto}','${p.judul.replace(/'/g,"\\'")}')" title="Share"><i class="fas fa-share-alt"></i></button>
</div>
</div>
</div>`;
return d;
}

function updateCounts() {
document.getElementById('qsFav').textContent = state.favs.length;
}

function toggleFav(url, btn) {
const i = state.favs.indexOf(url);
if (i>-1) { state.favs.splice(i,1); btn.classList.remove('active'); toast('💔 Dihapus dari favorit'); }
else { state.favs.push(url); btn.classList.add('active'); toast('❤️ Ditambahkan ke favorit'); }
localStorage.setItem('ltg_f', JSON.stringify(state.favs));
updateCounts();
if (state.filter==='favorites') applyFilters();
}

function fmtDate(ts) { return new Date(ts).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }

// Modal
let curImg='', curTitle='';
function openModal(url, title) {
curImg=url; curTitle=title;
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalImg').src = url;
document.getElementById('modalImg').alt = title;
document.getElementById('mTitle').textContent = title;
document.getElementById('mFormat').textContent = url.split('.').pop().split('?')[0].toUpperCase();
document.getElementById('mSize').textContent = '...';
document.getElementById('modal').classList.add('active');
document.body.style.overflow = 'hidden';
fetch(url).then(r=>r.blob()).then(b=>{
const s=(b.size/1024).toFixed(1);
document.getElementById('mSize').textContent = s>1024?(s/1024).toFixed(2)+' MB':s+' KB';
}).catch(()=>{document.getElementById('mSize').textContent='—';});
}
function closeModal() { document.getElementById('modal').classList.remove('active'); document.body.style.overflow=''; curImg=curTitle=''; }
document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });

// Actions
async function copyPhoto(url) {
try { const b=await(await fetch(url)).blob(); await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]); toast('✅ Disalin!'); }
catch{ toast('❗ Klik kanan gambar > Copy'); }
}
async function copyImg() { if(curImg) await copyPhoto(curImg); }
function dlPhoto(url, fn) {
const a=document.createElement('a'); a.href=url; a.download=`${fn.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`; a.target='_blank';
document.body.appendChild(a); a.click(); document.body.removeChild(a); toast('⚡ Download...');
}
function dlModal() { if(curImg) dlPhoto(curImg, curTitle); }
async function shareP(url, title) {
if(navigator.share) {
try { const b=await(await fetch(url)).blob(); await navigator.share({title,text:'Lihat ini:',files:[new File([b],`${title}.jpg`,{type:b.type})]}); toast('🔗 Dibagikan!'); }
catch(e){ if(e.name!=='AbortError') toast('❌ Gagal share'); }
} else { copyPhoto(url); toast('✅ Link disalin!'); }
}
function shareImg() { if(curImg) shareP(curImg, curTitle); }

// Toast
function toast(msg) {
const t=document.getElementById('toast');
document.getElementById('toastText').textContent = msg;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'), 3500);
}

// Keyboard
document.addEventListener('keydown', e=>{
if(e.key==='Escape') closeModal();
if(e.ctrlKey&&e.key==='k'){e.preventDefault();document.getElementById('searchInput')?.focus();}
});
</script>
</body>

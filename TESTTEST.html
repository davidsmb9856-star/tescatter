<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00f3ff">
<meta name="description" content="Database Kendala & Solusi Terpadu 2026">
<title>🔷 KENDALA ALL - NEON NEXUS 2026</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
/* ================= VARIABLES & RESET ================= */
:root {
    --neon-primary: #00f3ff;
    --neon-secondary: #bc13fe;
    --neon-accent: #00ff9d;
    
    --bg-deep: #050508;
    --bg-panel: rgba(10, 15, 30, 0.65);
    --glass-border: rgba(0, 243, 255, 0.15);
    
    --text-main: #ffffff;
    --text-dim: #8b9bb4;
    
    --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

body {
    font-family: 'Rajdhani', sans-serif;
    background-color: var(--bg-deep);
    color: var(--text-main);
    overflow-x: hidden;
    min-height: 100vh;
    position: relative;
}

/* ================= BACKGROUND FX ================= */
#canvas-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2;
    opacity: 0.6;
}

.scanlines {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
    background-size: 100% 4px;
    z-index: 10;
    pointer-events: none;
    opacity: 0.3;
}

.vignette {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.8) 100%);
    z-index: -1;
    pointer-events: none;
}

/* ================= LAYOUT ================= */
.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 2;
}

/* ================= HEADER ================= */
.header-wrapper {
    text-align: center;
    margin-bottom: 40px;
    padding-top: 20px;
    position: relative;
}

.cyber-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #fff, var(--neon-primary), #fff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
    position: relative;
    display: inline-block;
    margin-bottom: 10px;
}

.cyber-title::after {
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.8), transparent);
    -webkit-background-clip: text;
    color: transparent;
    animation: shine 3s infinite linear;
    background-size: 200% auto;
}

@keyframes shine {
    to { background-position: 200% center; }
}

.status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 243, 255, 0.1);
    border: 1px solid var(--neon-primary);
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
    backdrop-filter: blur(4px);
}

.pulse-dot {
    width: 8px; height: 8px;
    background: var(--neon-accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--neon-accent);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
}

/* ================= SEARCH & STATS ================= */
.search-container {
    position: relative;
    max-width: 600px;
    margin: 0 auto 30px;
    transform-style: preserve-3d;
}

.search-input-wrapper {
    position: relative;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    transition: all 0.3s var(--ease-smooth);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    padding: 5px;
}

.search-input-wrapper:focus-within {
    border-color: var(--neon-primary);
    box-shadow: 0 0 25px rgba(0, 243, 255, 0.15);
    background: rgba(0, 243, 255, 0.05);
    transform: translateY(-2px);
}

.search-icon {
    padding: 0 15px;
    color: var(--neon-primary);
    font-size: 18px;
}

#searchInput {
    width: 100%;
    background: transparent;
    border: none;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 600;
    padding: 12px 0;
}

#searchInput::placeholder { color: rgba(255,255,255,0.3); }

.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    max-width: 600px;
    margin: 0 auto;
}

.stat-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    transition: 0.3s;
}

.stat-card:hover {
    border-color: var(--neon-primary);
    background: rgba(0, 243, 255, 0.05);
}

.stat-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    color: var(--neon-primary);
    display: block;
}

.stat-label {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 1px;
}

/* ================= CARDS ================= */
.kendala-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.card {
    background: var(--bg-panel);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.4s var(--ease-bounce);
    position: relative;
    backdrop-filter: blur(12px);
    animation: slideUp 0.5s ease forwards;
    opacity: 0;
}

.card:hover {
    transform: translateY(-5px) scale(1.01);
    border-color: rgba(0, 243, 255, 0.4);
    box-shadow: 0 10px 30px -10px rgba(0, 243, 255, 0.15);
}

.card-header {
    padding: 20px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(90deg, rgba(0,243,255,0.05), transparent);
}

.card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin-right: 15px;
    line-height: 1.4;
}

.toggle-icon {
    color: var(--neon-primary);
    transition: transform 0.3s;
}

.card.expanded .toggle-icon { transform: rotate(180deg); }

.card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s var(--ease-smooth);
    background: rgba(0, 0, 0, 0.2);
}

.card.expanded .card-body { max-height: 2000px; /* Arbitrary large number */ }

.content-inner {
    padding: 20px;
    border-top: 1px solid rgba(255,255,255,0.05);
}

/* Title Image */
.title-img-container {
    margin-bottom: 20px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--neon-primary);
    position: relative;
    box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
}

.title-img-container img {
    width: 100%;
    display: block;
    cursor: zoom-in;
    transition: transform 0.3s;
}

.title-img-container:hover img { transform: scale(1.05); }

.img-badge {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(0,0,0,0.7);
    color: var(--neon-primary);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: bold;
    border: 1px solid var(--neon-primary);
    backdrop-filter: blur(4px);
}

/* Answers */
.answer-block {
    margin-bottom: 20px;
    background: rgba(255, 255, 255, 0.02);
    border-left: 3px solid var(--neon-secondary);
    padding: 15px;
    border-radius: 0 8px 8px 0;
    position: relative;
}

.answer-label {
    font-size: 11px;
    color: var(--neon-secondary);
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.answer-text {
    font-size: 15px;
    line-height: 1.6;
    color: #e0e0e0;
    white-space: pre-wrap;
}

.answer-text a {
    color: var(--neon-primary);
    text-decoration: none;
    border-bottom: 1px dotted var(--neon-primary);
    transition: 0.2s;
}

.answer-text a:hover {
    color: #fff;
    text-shadow: 0 0 8px var(--neon-primary);
}

/* Action Buttons */
.action-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
}

.btn-neon {
    background: rgba(0, 243, 255, 0.08);
    border: 1px solid rgba(0, 243, 255, 0.3);
    color: var(--neon-primary);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Rajdhani', sans-serif;
}

.btn-neon:hover {
    background: var(--neon-primary);
    color: #000;
    box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
}

.btn-link {
    border-color: var(--neon-secondary);
    color: var(--neon-secondary);
    background: rgba(188, 19, 254, 0.08);
}

.btn-link:hover {
    background: var(--neon-secondary);
    color: #fff;
    box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
}

/* ================= STICKY NOTES FAB ================= */
.fab-container {
    position: fixed;
    bottom: 30px; right: 30px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 15px;
}

.fab-main {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--neon-primary), #00a8cc);
    border: none;
    color: #000;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
    transition: 0.3s var(--ease-bounce);
    display: flex;
    align-items: center;
    justify-content: center;
}

.fab-main:hover { transform: scale(1.1) rotate(90deg); }
.fab-main.active { transform: rotate(45deg); background: #ff3366; color: #fff; }

.sticky-panel {
    width: 350px;
    height: 500px;
    background: rgba(10, 15, 30, 0.95);
    border: 1px solid var(--neon-primary);
    border-radius: 20px;
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    transform-origin: bottom right;
    transform: scale(0);
    opacity: 0;
    transition: 0.3s var(--ease-bounce);
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
}

.sticky-panel.open { transform: scale(1); opacity: 1; }

.sticky-header {
    padding: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.sticky-content {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.sticky-input-area {
    padding: 15px;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid rgba(255,255,255,0.1);
}

.note-item {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    font-size: 13px;
    position: relative;
    animation: fadeIn 0.3s;
}

.note-del {
    position: absolute;
    top: 5px; right: 5px;
    color: #ff3366;
    cursor: pointer;
    opacity: 0.5;
}
.note-del:hover { opacity: 1; }

/* ================= LIGHTBOX ================= */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 2000;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    opacity: 0;
    transition: opacity 0.3s;
}

.lightbox.active { display: flex; opacity: 1; }

.lightbox img {
    max-width: 90%;
    max-height: 80vh;
    border: 2px solid var(--neon-primary);
    box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
    border-radius: 8px;
}

.lb-controls {
    margin-top: 20px;
    display: flex;
    gap: 20px;
}

/* ================= TOAST ================= */
.toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(0, 243, 255, 0.15);
    border: 1px solid var(--neon-primary);
    color: #fff;
    padding: 12px 24px;
    border-radius: 50px;
    backdrop-filter: blur(10px);
    z-index: 3000;
    transition: 0.4s var(--ease-bounce);
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* Helpers */
.hidden { display: none !important; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Responsive */
@media (max-width: 768px) {
    .stats-grid { grid-template-columns: 1fr; }
    .sticky-panel { width: 90vw; right: 5vw; bottom: 100px; }
    .fab-container { bottom: 20px; right: 20px; }
}
</style>
</head>
<body>

<!-- Background Elements -->
<canvas id="canvas-bg"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="container">
    <!-- Header -->
    <header class="header-wrapper">
        <h1 class="cyber-title" data-text="KENDALA ALL">KENDALA ALL</h1>
        <div style="margin-top: 10px;">
            <div class="status-pill">
                <div class="pulse-dot"></div>
                SYSTEM ONLINE v2026.1
            </div>
        </div>
    </header>

    <!-- Search & Stats -->
    <div class="search-container">
        <div class="search-input-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Cari kendala atau solusi..." oninput="filterData()">
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-num" id="countTotal">0</span>
            <span class="stat-label">Total Data</span>
        </div>
        <div class="stat-card">
            <span class="stat-num" id="countImg">0</span>
            <span class="stat-label">Media</span>
        </div>
        <div class="stat-card">
            <span class="stat-num" id="countLink">0</span>
            <span class="stat-label">Links</span>
        </div>
    </div>

    <!-- Main Content -->
    <div id="contentArea" style="margin-top: 40px;">
        <div style="text-align: center; color: var(--neon-primary);">
            <i class="fas fa-circle-notch fa-spin fa-2x"></i>
            <p style="margin-top: 10px; letter-spacing: 2px;">CONNECTING TO DATABASE...</p>
        </div>
    </div>
</div>

<!-- Sticky Notes FAB -->
<div class="fab-container">
    <div class="sticky-panel" id="stickyPanel">
        <div class="sticky-header">
            <span style="font-weight:700; color:var(--neon-primary)">MY NOTES</span>
            <i class="fas fa-trash-alt" onclick="clearNotes()" style="cursor:pointer; color:#ff3366"></i>
        </div>
        <div class="sticky-content" id="notesList">
            <!-- Notes go here -->
        </div>
        <div class="sticky-input-area">
            <textarea id="noteInput" rows="2" style="width:100%; background:rgba(255,255,255,0.1); border:none; color:#fff; padding:10px; border-radius:8px; resize:none;" placeholder="Tulis catatan cepat..."></textarea>
            <button class="btn-neon" style="width:100%; margin-top:10px; justify-content:center;" onclick="addNote()">
                <i class="fas fa-plus"></i> SIMPAN
            </button>
        </div>
    </div>
    <button class="fab-main" id="fabBtn" onclick="toggleSticky()">
        <i class="fas fa-sticky-note"></i>
    </button>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <img id="lbImage" src="" alt="Zoom">
    <div class="lb-controls">
        <button class="btn-neon" onclick="copyCurrentImage()"><i class="fas fa-copy"></i> Copy</button>
        <button class="btn-neon" onclick="document.getElementById('lightbox').classList.remove('active')"><i class="fas fa-times"></i> Close</button>
    </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast">
    <i class="fas fa-check-circle" style="color: var(--neon-accent)"></i>
    <span id="toastMsg">Action Success</span>
</div>

<script>
// ================= CONFIGURATION =================
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

let rawData = [];
let currentImage = '';

// ================= INITIALIZATION =================
document.addEventListener('DOMContentLoaded', () => {
    initParticles();
    fetchData();
    loadNotes();
});

// ================= DATA FETCHING =================
async function fetchData() {
    try {
        const res = await fetch(API_URL);
        const text = await res.text();
        const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
        
        rawData = json.table.rows.map(row => {
            const c = row.c || [];
            return {
                title: c[0]?.v || '',
                ans1: c[1]?.v || '',
                ans2: c[2]?.v || '',
                ans3: c[3]?.v || ''
            };
        }).filter(item => item.title);

        renderCards(rawData);
        updateStats(rawData);
    } catch (err) {
        document.getElementById('contentArea').innerHTML = `
            <div style="text-align:center; color:#ff3366; padding:40px;">
                <i class="fas fa-exclamation-triangle fa-3x"></i>
                <p style="margin-top:15px;">CONNECTION FAILED</p>
                <small>${err.message}</small>
            </div>`;
    }
}

// ================= RENDERING =================
function renderCards(data) {
    const container = document.getElementById('contentArea');
    if(data.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-dim)">NO DATA FOUND</div>';
        return;
    }

    container.innerHTML = `<div class="kendala-list">
        ${data.map((item, idx) => {
            // Check for images in title
            const titleImgMatch = item.title.match(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i);
            const cleanTitle = titleImgMatch ? item.title.replace(titleImgMatch[0], '') : item.title;
            const hasImg = titleImgMatch || item.ans1?.match(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i);

            return `
            <div class="card" style="animation-delay: ${idx * 0.05}s">
                <div class="card-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <div class="card-title">${cleanTitle}</div>
                    <i class="fas fa-chevron-down toggle-icon"></i>
                </div>
                <div class="card-body">
                    <div class="content-inner">
                        ${titleImgMatch ? `
                        <div class="title-img-container">
                            <span class="img-badge"><i class="fas fa-image"></i> REFERENCE</span>
                            <img src="${titleImgMatch[0]}" onclick="openLightbox('${titleImgMatch[0]}')" loading="lazy">
                        </div>` : ''}

                        ${renderAnswerBlock('SOLUTION 1', item.ans1)}
                        ${renderAnswerBlock('SOLUTION 2', item.ans2)}
                        ${renderAnswerBlock('SOLUTION 3', item.ans3)}
                    </div>
                </div>
            </div>`;
        }).join('')}
    </div>`;
}

function renderAnswerBlock(label, text) {
    if(!text) return '';
    
    // Extract links and Images
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i;
    
    let formattedText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
    
    // Convert URLs to clickable links (excluding images which we handle separately if needed)
    formattedText = formattedText.replace(urlRegex, (url) => {
        if(imgRegex.test(url)) return `<br><div style="text-align:center; margin:10px 0;"><img src="${url}" style="max-width:100%; border-radius:8px; border:1px solid var(--neon-primary); cursor:pointer;" onclick="openLightbox('${url}')"></div>`;
        return `<a href="${url}" target="_blank">${url}</a>`;
    });

    return `
    <div class="answer-block">
        <div class="answer-label"><i class="fas fa-terminal"></i> ${label}</div>
        <div class="answer-text">${formattedText}</div>
        <div class="action-row">
            <button class="btn-neon" onclick="copyText('${escapeHtml(text)}')">
                <i class="fas fa-copy"></i> COPY TEXT
            </button>
            <button class="btn-neon btn-link" onclick="saveToNote('${escapeHtml(text.substring(0,50))}...')">
                <i class="fas fa-save"></i> SAVE NOTE
            </button>
        </div>
    </div>`;
}

// ================= UTILITIES =================
function filterData() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = rawData.filter(item => 
        (item.title && item.title.toLowerCase().includes(query)) ||
        (item.ans1 && item.ans1.toLowerCase().includes(query))
    );
    renderCards(filtered);
}

function updateStats(data) {
    document.getElementById('countTotal').innerText = data.length;
    // Simple estimation for stats
    const withImg = data.filter(i => /https?:\/\/.*\.(?:png|jpg)/i.test(i.title + i.ans1)).length;
    const withLink = data.filter(i => /https?:\/\//.test(i.ans1)).length;
    document.getElementById('countImg').innerText = withImg;
    document.getElementById('countLink').innerText = withLink;
}

function escapeHtml(text) {
    return text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function copyText(text) {
    navigator.clipboard.writeText(text).then(() => showToast('TEXT COPIED!'));
}

function openLightbox(src) {
    currentImage = src;
    const lb = document.getElementById('lightbox');
    document.getElementById('lbImage').src = src;
    lb.classList.add('active');
}

function closeLightbox(e) {
    if(e.target.id === 'lightbox' || e.target.tagName === 'BUTTON') {
        document.getElementById('lightbox').classList.remove('active');
    }
}

function copyCurrentImage() {
    // Note: Direct image copy requires blob conversion, simplified here to URL copy or basic implementation
    navigator.clipboard.writeText(currentImage).then(() => showToast('IMAGE URL COPIED!'));
}

function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ================= STICKY NOTES =================
function toggleSticky() {
    const panel = document.getElementById('stickyPanel');
    const btn = document.getElementById('fabBtn');
    panel.classList.toggle('open');
    btn.classList.toggle('active');
}

function addNote() {
    const input = document.getElementById('noteInput');
    const text = input.value.trim();
    if(!text) return;
    
    let notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
    notes.unshift({ text, date: new Date().toLocaleDateString() });
    localStorage.setItem('myNotes', JSON.stringify(notes));
    
    input.value = '';
    loadNotes();
    showToast('NOTE SAVED');
}

function saveToNote(text) {
    let notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
    notes.unshift({ text, date: 'From Database' });
    localStorage.setItem('myNotes', JSON.stringify(notes));
    showToast('SAVED TO NOTES');
}

function loadNotes() {
    const list = document.getElementById('notesList');
    const notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
    
    list.innerHTML = notes.map((n, i) => `
        <div class="note-item">
            <div style="margin-bottom:5px; color:var(--text-dim); font-size:10px;">${n.date}</div>
            ${n.text}
            <i class="fas fa-times note-del" onclick="deleteNote(${i})"></i>
        </div>
    `).join('');
}

function deleteNote(idx) {
    let notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
    notes.splice(idx, 1);
    localStorage.setItem('myNotes', JSON.stringify(notes));
    loadNotes();
}

function clearNotes() {
    if(confirm('Clear all notes?')) {
        localStorage.removeItem('myNotes');
        loadNotes();
    }
}

// ================= PARTICLE ANIMATION =================
function initParticles() {
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.size = Math.random() * 2;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            if(this.x < 0 || this.x > width) this.vx *= -1;
            if(this.y < 0 || this.y > height) this.vy *= -1;
        }
        draw() {
            ctx.fillStyle = 'rgba(0, 243, 255, 0.5)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for(let i=0; i<50; i++) particles.push(new Particle());

    function animate() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach((p, index) => {
            p.update();
            p.draw();
            // Connect lines
            for(let j=index; j<particles.length; j++) {
                const dx = p.x - particles[j].x;
                const dy = p.y - particles[j].y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 150) {
                    ctx.strokeStyle = `rgba(0, 243, 255, ${0.1 - dist/1500})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.stroke();
                }
            }
        });
        requestAnimationFrame(animate);
    }
    animate();
}

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#00f5ff">
<title>⚡ FOTO GALLERY — LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════
   BLUE NEON COOL 3.0 — DESIGN SYSTEM
   ═══════════════════════════════════════ */
:root {
  /* Core Neon Blue */
  --cyan: #00f5ff;
  --blue: #00a8ff;
  --deep-blue: #0066cc;
  --ice: #a0e4ff;
  --glacier: #6dd5ed;
  --night: #040b1a;
  --void: #020610;
  
  /* Surface */
  --glass: rgba(8, 18, 42, 0.72);
  --glass-light: rgba(14, 28, 58, 0.6);
  --surface: rgba(18, 32, 64, 0.85);
  --border: rgba(0, 245, 255, 0.35);
  --border-active: rgba(0, 245, 255, 0.8);
  
  /* Text */
  --text: #ffffff;
  --text-sec: #b8d4f5;
  --text-dim: #5a7a9e;
  
  /* Glow */
  --glow: 0 0 16px rgba(0, 245, 255, 0.5), 0 0 40px rgba(0, 245, 255, 0.2);
  --glow-strong: 0 0 24px rgba(0, 245, 255, 0.75), 0 0 55px rgba(0, 245, 255, 0.4), 0 0 100px rgba(0, 245, 255, 0.2);
  --glow-soft: 0 0 12px rgba(0, 245, 255, 0.35), 0 0 30px rgba(0, 245, 255, 0.15);
  
  /* Motion */
  --fast: 180ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --normal: 320ms cubic-bezier(0.16, 1, 0.3, 1);
  --bounce: 480ms cubic-bezier(0.34, 1.56, 0.64, 1);
  --spring: 420ms cubic-bezier(0.5, 1.1, 0.4, 1);
  
  /* Layout */
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-full: 999px;
  --gap: 22px;
  --max-w: 1360px;
}

/* ═══════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--void);
  color: var(--text);
  min-height: 100vh; min-height: 100dvh;
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════
   BACKGROUND SYSTEM
   ═══════════════════════════════════════ */
.bg-effects { position: fixed; inset: 0; z-index: -2; pointer-events: none; }
.bg-orbs {
  position: absolute; inset: 0; overflow: hidden;
  background: 
    radial-gradient(1200px 700px at 15% 20%, rgba(0, 245, 255, 0.12) 0%, transparent 55%),
    radial-gradient(1000px 600px at 85% 70%, rgba(0, 168, 255, 0.1) 0%, transparent 55%),
    radial-gradient(800px 400px at 45% 85%, rgba(10, 10, 30, 0.6) 0%, transparent 70%);
  animation: orbDrift 28s ease-in-out infinite alternate;
}
@keyframes orbDrift { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(2%,-1.5%) scale(1.03)} }

.bg-grid {
  position: absolute; inset: 0;
  background-image: 
    linear-gradient(rgba(0, 245, 255, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 245, 255, 0.04) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: radial-gradient(ellipse 75% 70% at 50% 50%, black 20%, transparent 80%);
  animation: gridShift 32s linear infinite;
  opacity: 0.8;
}
@keyframes gridShift { to { background-position: 42px 42px; } }

.noise {
  position: absolute; inset: 0; opacity: 0.025;
  background-image: url("image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: noiseMove 0.4s steps(10) infinite;
}
@keyframes noiseMove { 0%,100%{transform:translate(0,0)}25%{transform:translate(-1px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-2px,-1px)} }

/* ═══════════════════════════════════════
   FLOATING HEADER (GLASS)
   ═══════════════════════════════════════ */
.top-bar {
  position: sticky; top: 0; left: 0; right: 0; z-index: 100;
  height: 68px;
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(180%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(18px, 4vw, 36px);
  box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
  transition: var(--normal);
}
.brand {
  display: flex; align-items: center; gap: 12px;
  font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 18px;
  background: linear-gradient(135deg, var(--cyan), var(--blue), var(--glacier));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}
.brand i { -webkit-text-fill-color: var(--cyan); font-size: 20px; filter: drop-shadow(0 0 8px var(--cyan)); }

.search-wrap {
  position: relative; width: min(420px, 45vw);
  background: rgba(0, 15, 30, 0.5);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 10px 16px;
  transition: var(--normal);
}
.search-wrap:focus-within {
  border-color: var(--cyan);
  box-shadow: var(--glow-soft);
  background: rgba(0, 15, 30, 0.7);
}
.search-wrap input {
  width: 100%; background: none; border: none; outline: none;
  color: var(--text); font-size: 14px; font-family: inherit;
}
.search-wrap input::placeholder { color: var(--text-dim); }
.search-wrap i {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 14px; pointer-events: none;
}
.header-actions { display: flex; gap: 10px; align-items: center; }
.icon-btn {
  width: 38px; height: 38px; border-radius: var(--radius-sm);
  background: rgba(0, 245, 255, 0.15);
  border: 1px solid var(--border);
  color: var(--cyan); font-size: 15px; cursor: pointer;
  display: grid; place-items: center; transition: var(--normal);
}
.icon-btn:hover {
  background: rgba(0, 245, 255, 0.3); transform: translateY(-2px);
  box-shadow: var(--glow-soft);
}

/* ═══════════════════════════════════════
   FILTER PILLS
   ═══════════════════════════════════════ */
.filter-scroll {
  overflow-x: auto; scroll-snap-type: x mandatory;
  padding: 16px clamp(18px, 4vw, 36px) 8px;
  margin-bottom: 8px;
  display: flex; gap: 10px;
  -ms-overflow-style: none; scrollbar-width: none;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-pill {
  flex: 0 0 auto; scroll-snap-align: start;
  padding: 9px 18px; border-radius: var(--radius-full);
  background: var(--glass);
  border: 1px solid var(--border);
  color: var(--text-sec); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: var(--fast);
  display: flex; align-items: center; gap: 7px;
}
.filter-pill:hover { border-color: var(--cyan); color: var(--text); background: var(--glass-light); }
.filter-pill.active {
  background: linear-gradient(135deg, var(--blue), var(--deep-blue));
  color: white; border-color: transparent;
  box-shadow: 0 4px 14px rgba(0, 168, 255, 0.45);
}

/* ═══════════════════════════════════════
   GALLERY GRID
   ═══════════════════════════════════════ */
.gallery-wrap {
  max-width: var(--max-w); margin: 0 auto;
  padding: 0 clamp(18px, 4vw, 36px) 80px;
}
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: var(--gap);
  perspective: 1000px;
}

/* ═══════════════════════════════════════
   PHOTO CARD (NEON GLASS)
   ═══════════════════════════════════════ */
.photo-card {
  position: relative; background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all var(--normal);
  box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
  cursor: pointer;
  opacity: 0; transform: translateY(25px) rotateX(2deg);
  animation: cardReveal 0.6s var(--normal) forwards;
}
.photo-card:nth-child(3n) { animation-delay: 0.15s; }
.photo-card:nth-child(3n+1) { animation-delay: 0.25s; }
.photo-card:nth-child(3n+2) { animation-delay: 0.35s; }
@keyframes cardReveal { to { opacity: 1; transform: translateY(0) rotateX(0); } }

.photo-card:hover {
  transform: translateY(-8px) scale(1.015);
  border-color: var(--cyan);
  box-shadow: 0 16px 45px rgba(0, 0, 0, 0.5), var(--glow);
}

.card-img {
  position: relative; width: 100%; height: 280px;
  background: radial-gradient(circle, #0c1630, #060c1a);
  overflow: hidden;
}
.card-img::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 55%, rgba(4, 6, 16, 0.92) 100%);
  pointer-events: none;
}
.card-img img {
  width: 100%; height: 100%; object-fit: contain;
  transition: transform 0.45s var(--normal), filter 0.4s ease;
  filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.4));
}
.photo-card:hover .card-img img {
  transform: scale(1.08); filter: drop-shadow(0 8px 28px rgba(0, 245, 255, 0.35));
}

.card-info {
  padding: 16px 18px;
  position: relative;
}
.card-info::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: 0.4;
}
.card-title {
  font-weight: 600; font-size: 15px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 10px;
}
.card-actions {
  display: flex; justify-content: space-between; align-items: center;
}
.card-date { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 5px; }
.card-btns { display: flex; gap: 6px; }
.c-btn {
  width: 30px; height: 30px; border-radius: 8px;
  background: rgba(0, 245, 255, 0.12);
  border: 1px solid rgba(0, 245, 255, 0.3);
  color: var(--text-dim); font-size: 12px; cursor: pointer;
  display: grid; place-items: center; transition: var(--fast);
}
.c-btn:hover { background: rgba(0, 245, 255, 0.3); color: var(--cyan); transform: translateY(-2px); }

/* Floating Fav Button */
.fav-float {
  position: absolute; top: 14px; right: 14px; z-index: 5;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--glass); backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  color: var(--text-dim); font-size: 15px; cursor: pointer;
  display: grid; place-items: center; transition: var(--normal);
}
.fav-float:hover, .fav-float.active {
  background: var(--blue); color: white; border-color: var(--blue);
  box-shadow: 0 0 18px rgba(0, 168, 255, 0.55); transform: scale(1.15);
}

/* ═══════════════════════════════════════
   IMMERSIVE MODAL (SPLIT LAYOUT)
   ═══════════════════════════════════════ */
.modal-viewer {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(2, 4, 12, 0.96); backdrop-filter: blur(22px);
  display: none; align-items: center; justify-content: center;
  padding: 24px;
}
.modal-viewer.active { display: flex; }

.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  max-width: 960px; width: 100%; max-height: 90vh;
  overflow: hidden; display: flex; flex-direction: column;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6), var(--glow-strong);
  animation: modalPop 0.4s var(--bounce);
}
@keyframes modalPop { from { opacity: 0; transform: scale(0.96) translateY(15px); } to { opacity: 1; transform: scale(1) translateY(0); } }

.modal-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(90deg, rgba(0, 245, 255, 0.08), transparent);
}
.modal-head h3 {
  font-family: 'Orbitron', sans-serif; font-size: 16px; color: var(--cyan);
  font-weight: 700; letter-spacing: 1px;
}
.close-modal {
  width: 36px; height: 36px; border-radius: 50%;
  background: transparent; border: 1px solid var(--blue);
  color: var(--blue); font-size: 15px; cursor: pointer;
  display: grid; place-items: center; transition: var(--normal);
}
.close-modal:hover {
  background: var(--blue); color: white; transform: rotate(90deg) scale(1.08);
  box-shadow: 0 0 18px rgba(0, 168, 255, 0.5);
}

.modal-body-split {
  display: grid; grid-template-columns: 2fr 1fr;
  overflow: hidden; flex: 1;
}
.modal-img-wrap {
  padding: 20px; background: radial-gradient(circle, #0d1535, #050918);
  display: grid; place-items: center;
}
.modal-img-wrap img {
  max-width: 100%; max-height: 55vh; object-fit: contain;
  border-radius: 14px; box-shadow: 0 0 25px rgba(0, 245, 255, 0.3);
  cursor: zoom-in; transition: transform 0.4s var(--normal);
}
.modal-img-wrap img.zoomed { transform: scale(1.6); cursor: zoom-out; }

.modal-info {
  padding: 22px; border-left: 1px solid var(--border);
  background: rgba(0, 10, 25, 0.6);
  display: flex; flex-direction: column; gap: 14px;
  overflow-y: auto;
}
.info-row { display: flex; justify-content: space-between; font-size: 13px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.info-row .label { color: var(--text-dim); font-weight: 500; }
.info-row .value { color: var(--text); font-weight: 600; }

.modal-foot {
  padding: 16px 22px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap;
  background: rgba(0, 12, 28, 0.4);
}
.m-btn {
  padding: 10px 18px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  border: none; transition: var(--normal);
}
.m-btn-primary { background: linear-gradient(135deg, var(--blue), var(--deep-blue)); color: white; box-shadow: 0 4px 16px rgba(0, 168, 255, 0.35); }
.m-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0, 168, 255, 0.5); }
.m-btn-ghost { background: transparent; color: var(--text-sec); border: 1px solid var(--border); }
.m-btn-ghost:hover { background: rgba(0, 245, 255, 0.1); border-color: var(--cyan); color: var(--cyan); }
.m-btn-warn { background: linear-gradient(135deg, #ff4b4b, #cc3333); color: white; }
.m-btn-warn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 75, 75, 0.45); }

/* ═══════════════════════════════════════
   LOADING STATE
   ═══════════════════════════════════════ */
.loader-wrap {
  grid-column: 1 / -1; text-align: center; padding: 80px 20px;
}
.spinner {
  width: 44px; height: 44px; border: 3px solid rgba(0, 245, 255, 0.2);
  border-top-color: var(--cyan); border-radius: 50%;
  animation: spin 1s linear infinite; margin: 0 auto 18px;
  box-shadow: var(--glow-soft);
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-family: 'Orbitron', sans-serif; font-size: 13px; color: var(--cyan); letter-spacing: 2px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ═══════════════════════════════════════
   TOAST
   ═══════════════════════════════════════ */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 1000;
  background: var(--glass); backdrop-filter: blur(16px);
  border: 1px solid var(--cyan); color: var(--text);
  padding: 14px 22px; border-radius: var(--radius-md);
  display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600;
  box-shadow: var(--glow-strong);
  transform: translateX(250px); opacity: 0; transition: var(--bounce);
}
.toast.show { transform: translateX(0); opacity: 1; }
.toast i { color: var(--cyan); }

/* ═══════════════════════════════════════
   SCROLLBAR & SELECTION
   ═══════════════════════════════════════ */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--void); }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--cyan), var(--blue), var(--deep-blue)); border-radius: 5px; box-shadow: var(--glow-soft); }
::selection { background: rgba(0, 245, 255, 0.4); color: var(--text); }

/* ═══════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════ */
@media (max-width: 900px) {
  .modal-body-split { grid-template-columns: 1fr; }
  .modal-img-wrap { max-height: 50vh; }
  .modal-info { border-left: none; border-top: 1px solid var(--border); }
  .search-wrap { width: min(320px, 40vw); }
}
@media (max-width: 640px) {
  .top-bar { height: 62px; padding: 0 16px; }
  .search-wrap { width: 100%; order: 3; margin-top: 0; }
  .top-bar > * { flex: 1; justify-content: center; }
  .header-actions { position: absolute; right: 16px; }
  .search-wrap { width: calc(100vw - 140px); }
  .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
  .card-img { height: 240px; }
  .modal-box { border-radius: var(--radius-md); max-height: 95vh; }
  .modal-foot { justify-content: center; }
}
</style>
</head>
<body>
<div class="bg-effects">
  <div class="bg-orbs"></div>
  <div class="bg-grid"></div>
  <div class="noise"></div>
</div>

<!-- Sticky Glass Header -->
<header class="top-bar">
  <div class="brand"><i class="fas fa-bolt"></i> FOTO GALLERY</div>
  <div class="search-wrap">
    <i class="fas fa-search"></i>
    <input type="search" id="searchInput" placeholder="Cari judul foto..." oninput="handleSearch(this.value)">
  </div>
  <div class="header-actions">
    <button class="icon-btn" onclick="refreshData()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
    <button class="icon-btn" onclick="window.open('index.html','_self')" title="Home"><i class="fas fa-home"></i></button>
  </div>
</header>

<!-- Filter Pills -->
<div class="filter-scroll" id="filterScroll">
  <button class="filter-pill active" data-filter="all"><i class="fas fa-layer-group"></i> Semua</button>
  <button class="filter-pill" data-filter="favorites"><i class="fas fa-heart"></i> Favorit</button>
  <button class="filter-pill" data-filter="recent"><i class="fas fa-clock"></i> Terbaru</button>
</div>

<!-- Main Gallery -->
<div class="gallery-wrap">
  <div class="gallery-grid" id="grid"></div>
</div>

<!-- Modal -->
<div class="modal-viewer" id="modal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="mTitle">Detail Foto</h3>
      <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body-split">
      <div class="modal-img-wrap">
        <img src="" alt="" id="mImg" onclick="this.classList.toggle('zoomed')">
      </div>
      <div class="modal-info">
        <div class="info-row"><span class="label">Judul</span><span class="value" id="mInfoTitle">—</span></div>
        <div class="info-row"><span class="label">Format</span><span class="value" id="mInfoFmt">—</span></div>
        <div class="info-row"><span class="label">Ukuran</span><span class="value" id="mInfoSize">Memuat...</span></div>
        <div class="info-row"><span class="label">ID</span><span class="value" id="mInfoId">—</span></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="m-btn m-btn-ghost" onclick="copyImage()"><i class="fas fa-copy"></i> Copy</button>
      <button class="m-btn m-btn-primary" onclick="downloadImage()"><i class="fas fa-download"></i> Download</button>
      <button class="m-btn m-btn-warn" onclick="shareImage()"><i class="fas fa-share-alt"></i> Share</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"><i class="fas fa-bolt"></i><span id="toastTxt">Berhasil</span></div>

<script>
// ═══════════════════════════════════════
// STATE & CONFIG
// ═══════════════════════════════════════
const state = {
  photos: [],
  favs: JSON.parse(localStorage.getItem('ltg_favs') || '[]'),
  filter: 'all',
  search: '',
  current: null
};

// ═══════════════════════════
// INIT
// ═══════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  fetchData();
  initFilters();
  initKeyboard();
});

function initFilters() {
  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.filter = btn.dataset.filter;
      render();
    });
  });
}

function initKeyboard() {
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.ctrlKey && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput')?.focus(); }
  });
  document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
}

// ═══════════════════════════
// DATA FETCH
// ═══════════════════════════
async function fetchData() {
  const grid = document.getElementById('grid');
  grid.innerHTML = `<div class="loader-wrap"><div class="spinner"></div><div class="loader-text">MEMUAT GALERI...</div></div>`;
  try {
    const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
    const gid = '1246502038';
    let data = [];
    try {
      const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
      const txt = await res.text();
      const json = JSON.parse(txt.substring(47).slice(0, -2));
      data = json.table.rows.filter(r => r.c?.[0]?.v && r.c?.[1]?.v).map((r, i) => ({
        id: i + 2, title: r.c[0].v, url: r.c[1].v, ts: Date.now() - (i * 600000)
      }));
    } catch {
      const csv = await (await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
      data = csv.split('\n').map(r => r.split(',')).filter(r => r[0]?.trim() && r[1]?.trim()).map((r, i) => ({
        id: i + 2, title: r[0].replace(/"/g, '').trim(), url: r[1].replace(/"/g, '').trim(), ts: Date.now() - (i * 600000)
      }));
    }
    state.photos = data;
    render();
    toast(`⚡ ${data.length} foto siap`);
  } catch (err) {
    grid.innerHTML = `<div class="loader-wrap"><i class="fas fa-exclamation-triangle" style="font-size:40px;color:var(--blue);margin-bottom:15px;"></i><h3 style="color:var(--cyan)">Gagal Memuat</h3><p style="color:var(--text-dim)">Periksa koneksi atau publikasi Sheets</p></div>`;
  }
}

function refreshData() { fetchData(); }

// ═══════════════════════════
// RENDER & FILTER
// ═══════════════════════════
function handleSearch(v) { state.search = v.toLowerCase(); render(); }

function render() {
  const grid = document.getElementById('grid');
  let list = [...state.photos];
  if (state.filter === 'favorites') list = list.filter(p => state.favs.includes(p.url));
  if (state.filter === 'recent') list.sort((a, b) => b.ts - a.ts).slice(0, 24);
  if (state.search) list = list.filter(p => p.title.toLowerCase().includes(state.search));

  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = `<div class="loader-wrap"><i class="fas fa-search" style="font-size:38px;color:var(--text-dim);margin-bottom:15px;"></i><h3 style="color:var(--cyan)">Tidak Ditemukan</h3><p style="color:var(--text-dim)">Coba kata kunci lain</p></div>`;
    return;
  }
  list.forEach((p, i) => grid.appendChild(buildCard(p, i)));
}

function buildCard(p, idx) {
  const isFav = state.favs.includes(p.url);
  const el = document.createElement('div'); el.className = 'photo-card';
  el.innerHTML = `
    <div class="card-img">
      <img src="${p.url}" alt="${p.title}" loading="lazy" onclick="openModal(${JSON.stringify(p).replace(/"/g, '&quot;')})">
      <button class="fav-float ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFav('${p.url}',this)">
        <i class="fas fa-heart"></i>
      </button>
    </div>
    <div class="card-info">
      <div class="card-title">${p.title}</div>
      <div class="card-actions">
        <div class="card-date"><i class="far fa-clock"></i> ${new Date(p.ts).toLocaleDateString('id-ID', {day:'2-digit',month:'short'})}</div>
        <div class="card-btns">
          <button class="c-btn" onclick="copyImg('${p.url}')" title="Copy"><i class="fas fa-copy"></i></button>
          <button class="c-btn" onclick="downloadImg('${p.url}','${p.title}')" title="Download"><i class="fas fa-download"></i></button>
          <button class="c-btn" onclick="shareImg('${p.url}','${p.title}')" title="Share"><i class="fas fa-share"></i></button>
        </div>
      </div>
    </div>
  `;
  return el;
}

// ═══════════════════════════
// FAVORITES
// ═══════════════════════════
function toggleFav(url, btn) {
  const i = state.favs.indexOf(url);
  if (i > -1) { state.favs.splice(i, 1); btn.classList.remove('active'); toast('💔 Dihapus dari favorit'); }
  else { state.favs.push(url); btn.classList.add('active'); toast('❤️ Ditambahkan ke favorit'); }
  localStorage.setItem('ltg_favs', JSON.stringify(state.favs));
  if (state.filter === 'favorites') render();
}

// ═══════════════════════════
// MODAL
// ═══════════════════════════
function openModal(p) {
  state.current = p;
  document.getElementById('mTitle').textContent = p.title;
  document.getElementById('mImg').src = p.url;
  document.getElementById('mImg').classList.remove('zoomed');
  document.getElementById('mInfoTitle').textContent = p.title;
  document.getElementById('mInfoFmt').textContent = p.url.split('.').pop().split('?')[0].toUpperCase() || 'JPG';
  document.getElementById('mInfoId').textContent = `#${p.id}`;
  document.getElementById('mInfoSize').textContent = 'Menghitung...';
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';

  fetch(p.url).then(r => r.blob()).then(b => {
    const s = b.size / 1024;
    document.getElementById('mInfoSize').textContent = s > 1024 ? `${(s/1024).toFixed(2)} MB` : `${s.toFixed(1)} KB`;
  }).catch(() => document.getElementById('mInfoSize').textContent = '—');
}
function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
  state.current = null;
}

// ═══════════════════════════
// ACTIONS
// ═══════════════════════════
async function copyImg(url) {
  try { const b = await (await fetch(url)).blob(); await navigator.clipboard.write([new ClipboardItem({[b.type]: b})]); toast('✅ Disalin'); }
  catch { toast('❗ Klik kanan gambar > Copy'); }
}
function copyImage() { if (state.current) copyImg(state.current.url); }

function downloadImg(url, name) {
  const a = document.createElement('a'); a.href = url;
  a.download = `${name.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('⚡ Download dimulai');
}
function downloadImage() { if (state.current) downloadImg(state.current.url, state.current.title); }

async function shareImg(url, title) {
  if (navigator.share) {
    try { const b = await (await fetch(url)).blob(); await navigator.share({title, text:'Lihat foto ini', files:[new File([b], `${title}.jpg`, {type:b.type})]}); toast('🔗 Terkirim'); }
    catch(e) { if(e.name!=='AbortError') toast('❌ Gagal share'); }
  } else { copyImg(url); toast('✅ Link disalin'); }
}
function shareImage() { if (state.current) shareImg(state.current.url, state.current.title); }

// ═══════════════════════════
// TOAST
// ═══════════════════════════
function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastTxt').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>

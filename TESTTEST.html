<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>⚡ FOTO GALLERY — LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════════
   BLUE NEON COOL DESIGN SYSTEM
   ═══════════════════════════════════════════ */
:root {
/* Neon Palette */
--cyan: #00f0ff;
--blue: #0077b6;
--electric: #00e5ff;
--deep: #0044aa;
--glow: #00aaff;
--ice: #e0f7ff;
--mid: #030812;
--surface: #081020;
--panel: #0c162c;
--glass: rgba(12, 22, 44, 0.72);
--glass-light: rgba(8, 16, 32, 0.65);
--text: #ffffff;
--text-sec: #9ec5ff;
--text-dim: #5a7ba8;

/* Glow System */
--glow-sm: 0 0 12px rgba(0, 240, 255, 0.45), 0 0 28px rgba(0, 240, 255, 0.2);
--glow-md: 0 0 22px rgba(0, 240, 255, 0.65), 0 0 50px rgba(0, 240, 255, 0.35), 0 0 90px rgba(0, 240, 255, 0.18);
--glow-lg: 0 0 35px rgba(0, 240, 255, 0.85), 0 0 80px rgba(0, 240, 255, 0.45), 0 0 140px rgba(0, 240, 255, 0.25);
--border: rgba(0, 240, 255, 0.45);
--border-sub: rgba(0, 240, 255, 0.22);

/* Motion */
--ease: cubic-bezier(0.16, 1, 0.3, 1);
--bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
--spring: cubic-bezier(0.5, 1.1, 0.4, 1);
--fast: 220ms var(--ease);
--normal: 380ms var(--ease);
--slow: 600ms var(--bounce);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Inter', system-ui, sans-serif;
background: var(--mid);
color: var(--text);
min-height: 100vh;
min-height: 100dvh;
overflow-x: hidden;
line-height: 1.55;
-webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════
   BACKGROUND ATMOSPHERE
   ═══════════════════════════════════════════ */
.atmos { position: fixed; inset: 0; z-index: -2; pointer-events: none; overflow: hidden; }
.orb {
position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.45;
animation: orbFloat 28s ease-in-out infinite alternate;
}
.orb:nth-child(1) { width: 650px; height: 650px; background: var(--deep); top: -15%; left: -10%; animation-delay: 0s; }
.orb:nth-child(2) { width: 500px; height: 500px; background: var(--blue); bottom: -10%; right: -8%; animation-delay: -9s; }
.orb:nth-child(3) { width: 420px; height: 420px; background: var(--cyan); top: 35%; left: 60%; animation-delay: -18s; opacity: 0.3; }
@keyframes orbFloat {
0%,100% { transform: translate(0, 0) scale(1); }
50% { transform: translate(3%, -2%) scale(1.08); }
}

.grid-bg {
position: fixed; inset: 0; z-index: -2; pointer-events: none;
background-image: linear-gradient(rgba(0, 240, 255, 0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 240, 255, 0.08) 1px, transparent 1px);
background-size: 48px 48px;
mask-image: radial-gradient(ellipse 85% 80% at 50% 50%, black 15%, transparent 80%);
animation: gridShift 40s linear infinite;
}
@keyframes gridShift { 0% { background-position: 0 0; } 100% { background-position: 48px 48px; } }

.noise {
position: fixed; inset: 0; z-index: -1; opacity: 0.035; pointer-events: none;
background-image: url("image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
animation: noise 0.5s steps(10) infinite;
}
@keyframes noise { 0%,100%{transform:translate(0,0)}25%{transform:translate(-1px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,-2px)} }

/* ═══════════════════════════════════════════
   HEADER — MINIMAL GLASS
   ═══════════════════════════════════════════ */
.header {
position: sticky; top: 0; left: 0; right: 0;
height: 68px;
background: var(--glass-light);
backdrop-filter: blur(18px);
border-bottom: 1px solid var(--border-sub);
display: flex; align-items: center; justify-content: space-between;
padding: 0 28px; z-index: 100;
}
.logo {
font-family: 'Orbitron', sans-serif;
font-size: 18px; font-weight: 900; letter-spacing: 2px;
background: linear-gradient(135deg, var(--cyan), var(--electric), var(--blue));
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
display: flex; align-items: center; gap: 10px;
}
.logo i { font-size: 16px; -webkit-text-fill-color: var(--cyan); filter: drop-shadow(0 0 8px var(--cyan)); }
.status-pill {
display: inline-flex; align-items: center; gap: 8px;
padding: 6px 14px; border-radius: 99px;
background: rgba(0, 240, 255, 0.15); border: 1px solid var(--border);
font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--cyan);
text-transform: uppercase; box-shadow: var(--glow-sm);
}
.status-dot { width: 7px; height: 7px; background: var(--cyan); border-radius: 50%; animation: pulse 2s infinite; box-shadow: 0 0 10px var(--cyan); }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0.7} }

/* ═══════════════════════════════════════════
   CONTROL CENTER — FLOATING SEARCH & FILTERS
   ═══════════════════════════════════════════ */
.control-center {
position: relative; z-index: 50;
margin: -1px 0 32px; padding: 24px 28px;
display: flex; flex-wrap: wrap; gap: 16px; align-items: center; justify-content: space-between;
}
.search-wrap {
flex: 1; min-width: 260px; max-width: 420px; position: relative;
background: var(--panel); border: 1px solid var(--border-sub);
border-radius: 14px; overflow: hidden; transition: var(--normal);
}
.search-wrap:focus-within { border-color: var(--cyan); box-shadow: var(--glow-sm); background: rgba(0, 240, 255, 0.08); }
.search-wrap input {
width: 100%; padding: 14px 18px 14px 44px; background: transparent; border: none; outline: none;
color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
}
.search-wrap input::placeholder { color: var(--text-dim); }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 15px; }

.filter-chips {
display: flex; gap: 8px; flex-wrap: wrap;
}
.chip {
padding: 9px 16px; border-radius: 10px; background: var(--panel); border: 1px solid var(--border-sub);
color: var(--text-sec); font-size: 12px; font-weight: 600; cursor: pointer;
transition: var(--fast); display: flex; align-items: center; gap: 6px;
}
.chip:hover { background: rgba(0, 240, 255, 0.12); border-color: var(--border); color: var(--cyan); }
.chip.active {
background: linear-gradient(135deg, var(--cyan), var(--blue));
color: var(--mid); border-color: transparent; box-shadow: var(--glow-sm);
}
.chip .count { background: rgba(255,255,255,0.25); padding: 2px 7px; border-radius: 6px; font-size: 10px; }

/* ═══════════════════════════════════════════
   GALLERY GRID — BENTO STYLE
   ═══════════════════════════════════════════ */
.gallery {
max-width: 1380px; margin: 0 auto; padding: 0 28px 110px;
}
.grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
gap: 22px;
}

/* Card Design */
.card {
position: relative;
background: var(--panel);
border: 1px solid var(--border-sub);
border-radius: 18px;
overflow: hidden;
transition: all 0.45s var(--ease);
backdrop-filter: blur(14px);
box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
animation: cardIn 0.6s var(--bounce) backwards;
cursor: pointer;
}
.card::before {
content: ''; position: absolute; inset: -2px; border-radius: 20px;
background: linear-gradient(135deg, var(--cyan), var(--blue), var(--deep), var(--cyan));
opacity: 0; transition: opacity 0.5s var(--ease); z-index: 0; filter: blur(18px);
}
.card:hover::before { opacity: 0.35; }
.card:hover { transform: translateY(-7px) scale(1.018); box-shadow: var(--glow-md); border-color: var(--cyan); }
.card:nth-child(1){animation-delay:0.1s} .card:nth-child(2){animation-delay:0.15s}
.card:nth-child(3){animation-delay:0.2s} .card:nth-child(4){animation-delay:0.25s}
@keyframes cardIn { from { opacity: 0; transform: translateY(25px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

.card-media {
position: relative; width: 100%; aspect-ratio: 4/3;
background: radial-gradient(circle at 30% 30%, #0e1a35, #050b18);
overflow: hidden;
}
.card-media::after {
content: ''; position: absolute; inset: 0;
background: linear-gradient(180deg, transparent 50%, rgba(3, 8, 18, 0.85));
pointer-events: none;
}
.card-media img {
width: 100%; height: 100%; object-fit: contain;
transition: transform 0.55s var(--ease), filter 0.5s ease;
filter: drop-shadow(0 5px 16px rgba(0,0,0,0.5));
}
.card:hover .card-media img { transform: scale(1.06); filter: drop-shadow(0 8px 25px rgba(0, 240, 255, 0.35)); }

.card-fav {
position: absolute; top: 12px; right: 12px; z-index: 10;
width: 32px; height: 32px; border-radius: 50%;
background: var(--glass); border: 1px solid var(--border);
color: var(--text-dim); font-size: 14px; cursor: pointer;
display: grid; place-items: center; transition: var(--fast);
}
.card-fav:hover, .card-fav.active { background: var(--cyan); color: var(--mid); border-color: var(--cyan); box-shadow: var(--glow-sm); transform: scale(1.15); }

.card-hover {
position: absolute; inset: 0; z-index: 5;
background: rgba(3, 8, 18, 0.65); backdrop-filter: blur(3px);
display: flex; align-items: center; justify-content: center; gap: 10px;
opacity: 0; transition: var(--normal);
}
.card:hover .card-hover { opacity: 1; }
.hov-btn {
width: 40px; height: 40px; border-radius: 12px;
background: rgba(0, 240, 255, 0.2); border: 1px solid var(--border);
color: var(--cyan); font-size: 15px; cursor: pointer;
display: grid; place-items: center; transition: var(--fast);
transform: translateY(12px);
}
.card:hover .hov-btn { transform: translateY(0); }
.hov-btn:nth-child(2){transition-delay:50ms} .hov-btn:nth-child(3){transition-delay:100ms}
.hov-btn:hover { background: var(--cyan); color: var(--mid); box-shadow: var(--glow-sm); transform: translateY(0) scale(1.08); }

.card-body { padding: 16px 18px 18px; position: relative; }
.card-title {
font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
color: var(--text); margin-bottom: 8px;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-footer { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.card-date { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 5px; }
.card-acts { display: flex; gap: 5px; }
.c-act {
width: 30px; height: 30px; border-radius: 8px;
background: rgba(0, 240, 255, 0.12); border: 1px solid var(--border-sub);
color: var(--text-dim); font-size: 12px; cursor: pointer;
display: grid; place-items: center; transition: var(--fast);
}
.c-act:hover { background: rgba(0, 240, 255, 0.3); color: var(--cyan); border-color: var(--cyan); transform: translateY(-2px); }

/* ═══════════════════════════════════════════
   FLOATING DOCK — BOTTOM NAV
   ═══════════════════════════════════════════ */
.dock {
position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
z-index: 400; padding: 8px 10px;
background: var(--glass-light); border: 1px solid var(--border-sub);
border-radius: 22px; backdrop-filter: blur(18px);
display: flex; gap: 6px; box-shadow: var(--glow-md);
}
.dock-btn {
width: 44px; height: 44px; border-radius: 16px;
background: transparent; border: none; color: var(--text-dim);
font-size: 17px; cursor: pointer; display: grid; place-items: center;
transition: var(--fast); position: relative;
}
.dock-btn:hover { color: var(--cyan); background: rgba(0, 240, 255, 0.18); }
.dock-btn.active { color: var(--mid); background: var(--cyan); box-shadow: var(--glow-sm); }
.dock-btn.active:hover { background: var(--electric); }
.dock-btn .tip {
position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
background: var(--panel); color: var(--cyan); padding: 5px 10px; border-radius: 8px;
font-size: 10px; font-weight: 600; white-space: nowrap; opacity: 0; pointer-events: none;
transition: var(--fast); box-shadow: var(--glow-sm);
}
.dock-btn:hover .tip { opacity: 1; bottom: 120%; }

/* ═══════════════════════════════════════════
   MODAL — SPLIT VIEW
   ═══════════════════════════════════════════ */
.modal {
position: fixed; inset: 0; z-index: 1000;
background: rgba(2, 5, 12, 0.96); backdrop-filter: blur(22px);
display: none; align-items: center; justify-content: center; padding: 20px;
animation: mIn 0.4s var(--ease);
}
.modal.open { display: flex; }
@keyframes mIn { from { opacity: 0; } to { opacity: 1; } }

.m-box {
width: 100%; max-width: 1050px; max-height: 92vh;
background: var(--panel); border: 1px solid var(--border);
border-radius: 24px; overflow: hidden;
display: grid; grid-template-columns: 1.4fr 1fr;
box-shadow: var(--glow-lg);
animation: mBox 0.55s var(--bounce);
}
@keyframes mBox { from { opacity: 0; transform: scale(0.97) translateY(18px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.m-left { background: radial-gradient(circle at center, #0d1530, #050a18); display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; }
.m-left img { max-width: 100%; max-height: 68vh; object-fit: contain; border-radius: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.45), 0 0 25px rgba(0, 240, 255, 0.25); transition: transform 0.4s var(--ease); cursor: zoom-in; }
.m-left img.zoom { transform: scale(1.6); }
.m-right { padding: 26px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
.m-top { display: flex; justify-content: space-between; align-items: center; }
.m-top h3 { font-family: 'Orbitron', sans-serif; font-size: 16px; color: var(--cyan); font-weight: 700; letter-spacing: 1px; }
.m-close { width: 36px; height: 36px; border-radius: 50%; background: rgba(0, 240, 255, 0.15); border: 1px solid var(--border); color: var(--cyan); font-size: 14px; cursor: pointer; display: grid; place-items: center; transition: var(--fast); }
.m-close:hover { background: var(--cyan); color: var(--mid); box-shadow: var(--glow-sm); transform: rotate(90deg) scale(1.1); }

.m-info { display: flex; flex-direction: column; gap: 10px; }
.m-row { display: flex; justify-content: space-between; padding: 10px 12px; background: rgba(0, 240, 255, 0.06); border-radius: 10px; border: 1px solid var(--border-sub); }
.m-row span { font-size: 12px; color: var(--text-dim); }
.m-row strong { font-size: 12px; color: var(--text); font-family: 'Orbitron', sans-serif; }

.m-actions { display: flex; gap: 10px; margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border-sub); flex-wrap: wrap; }
.m-btn { flex: 1; min-width: 80px; padding: 11px; border-radius: 12px; border: none; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: var(--fast); }
.m-btn.primary { background: linear-gradient(135deg, var(--cyan), var(--blue)); color: var(--mid); box-shadow: var(--glow-sm); }
.m-btn.primary:hover { transform: translateY(-3px); box-shadow: var(--glow-md); }
.m-btn.sec { background: transparent; border: 1px solid var(--border); color: var(--cyan); }
.m-btn.sec:hover { background: rgba(0, 240, 255, 0.18); transform: translateY(-3px); }
.m-btn.share { background: linear-gradient(135deg, #ff6b35, #ff8c42); color: white; box-shadow: 0 4px 14px rgba(255, 107, 53, 0.35); }
.m-btn.share:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255, 107, 53, 0.55); }

/* ═══════════════════════════════════════════
   LOADING & TOAST
   ═══════════════════════════════════════════ */
.load { text-align: center; padding: 60px; grid-column: 1/-1; }
.spin { width: 42px; height: 42px; border: 3px solid var(--border-sub); border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 16px; box-shadow: var(--glow-sm); }
@keyframes spin { to { transform: rotate(360deg); } }
.load-txt { font-family: 'Orbitron', sans-serif; font-size: 12px; color: var(--cyan); letter-spacing: 2px; animation: pulse 2s infinite; }

.toast {
position: fixed; bottom: 85px; right: 24px; z-index: 1100;
background: var(--glass); border: 1px solid var(--border); color: var(--cyan);
padding: 13px 22px; border-radius: 14px; font-weight: 600; font-size: 13px;
display: flex; align-items: center; gap: 10px; box-shadow: var(--glow-md);
transform: translateX(300px); opacity: 0; transition: all 0.5s var(--bounce); backdrop-filter: blur(16px);
}
.toast.show { transform: translateX(0); opacity: 1; }

/* ═══════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════ */
@media (max-width: 900px) {
.m-box { grid-template-columns: 1fr; max-height: 96vh; }
.m-left { padding: 16px; max-height: 50vh; }
.m-left img { max-height: 40vh; }
.m-right { padding: 20px; }
}
@media (max-width: 640px) {
.header { padding: 0 16px; height: 58px; }
.control-center { padding: 18px 16px; margin-bottom: 24px; }
.search-wrap { min-width: 100%; }
.filter-chips { width: 100%; justify-content: center; }
.gallery { padding: 0 16px 90px; }
.grid { grid-template-columns: 1fr; gap: 18px; }
.dock { bottom: 14px; }
.dock-btn { width: 38px; height: 38px; border-radius: 14px; }
.toast { bottom: 72px; right: 16px; left: 16px; }
}
@media (max-width: 420px) {
.m-box { border-radius: 18px; }
.m-actions { flex-direction: column; }
.m-btn { min-width: 100%; }
}
</style>
</head>
<body>
<div class="atmos">
<div class="orb"></div><div class="orb"></div><div class="orb"></div>
</div>
<div class="grid-bg"></div>
<div class="noise"></div>

<!-- Header -->
<header class="header">
<div class="logo"><i class="fas fa-bolt"></i> FOTO GALLERY</div>
<div class="status-pill"><span class="status-dot"></span> ONLINE 2026</div>
</header>

<!-- Control Center -->
<section class="control-center">
<div class="search-wrap">
<i class="fas fa-search search-icon"></i>
<input type="search" id="search" placeholder="Cari judul foto..." oninput="applyFilters()">
</div>
<div class="filter-chips">
<button class="chip active" onclick="setFilter('all', this)"><i class="fas fa-layer-group"></i> Semua <span class="count" id="cAll">0</span></button>
<button class="chip" onclick="setFilter('fav', this)"><i class="fas fa-heart"></i> Favorit <span class="count" id="cFav">0</span></button>
<button class="chip" onclick="setFilter('new', this)"><i class="fas fa-clock"></i> Terbaru <span class="count" id="cNew">0</span></button>
</div>
</section>

<!-- Gallery -->
<main class="gallery">
<div class="load" id="loader"><div class="spin"></div><div class="load-txt">MENYINKRONKAN DATA...</div></div>
<div class="grid" id="grid"></div>
</main>

<!-- Floating Dock -->
<nav class="dock">
<button class="dock-btn active" onclick="showToast('📸 Galeri')"><i class="fas fa-images"></i><span class="tip">Galeri</span></button>
<button class="dock-btn" onclick="setFilter('fav');document.querySelector('.chip:nth-child(2)').click()"><i class="fas fa-heart"></i><span class="tip">Favorit</span></button>
<button class="dock-btn" onclick="setFilter('new');document.querySelector('.chip:nth-child(3)').click()"><i class="fas fa-clock"></i><span class="tip">Terbaru</span></button>
<button class="dock-btn" onclick="window.open('index.html','_self')"><i class="fas fa-home"></i><span class="tip">Beranda</span></button>
</nav>

<!-- Modal -->
<div class="modal" id="modal">
<div class="m-box">
<div class="m-left"><img id="mImg" src="" alt=""></div>
<div class="m-right">
<div class="m-top"><h3 id="mTitle">Detail Foto</h3><button class="m-close" onclick="closeM()"><i class="fas fa-xmark"></i></button></div>
<div class="m-info">
<div class="m-row"><span>Judul</span><strong id="dTitle">—</strong></div>
<div class="m-row"><span>Format</span><strong id="dFmt">—</strong></div>
<div class="m-row"><span>Ukuran</span><strong id="dSize">—</strong></div>
</div>
<div class="m-actions">
<button class="m-btn primary" onclick="copyImg()"><i class="fas fa-copy"></i> Salin</button>
<button class="m-btn sec" onclick="dlImg()"><i class="fas fa-download"></i> Unduh</button>
<button class="m-btn share" onclick="shareImg()"><i class="fas fa-share-nodes"></i> Bagikan</button>
</div>
</div>
</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><i class="fas fa-bolt"></i><span id="txt">Berhasil!</span></div>

<script>
// State
const S = { photos: [], favs: JSON.parse(localStorage.getItem('ltg_f')||'[]'), filter: 'all', search: '' };
let curImg='', curTit='';

// Init
document.addEventListener('DOMContentLoaded', () => { fetchP(); initDock(); });
document.getElementById('modal').addEventListener('click', e => { if(e.target.id==='modal') closeM(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeM(); if(e.ctrlKey&&e.key==='k'){e.preventDefault();document.getElementById('search').focus();} });

// Dock
function initDock() {
document.querySelectorAll('.dock-btn').forEach((b,i) => {
b.addEventListener('click', () => {
document.querySelectorAll('.dock-btn').forEach(x => x.classList.remove('active'));
b.classList.add('active');
});
});
}

// Fetch
async function fetchP() {
const l = document.getElementById('loader'), g = document.getElementById('grid');
l.style.display = 'block'; g.innerHTML = '';
try {
const id = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0', gid = '1246502038';
let res = [];
try {
const r = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
const j = JSON.parse((await r.text()).substring(47).slice(0,-2));
res = j.table.rows.filter(r=>r.c?.[0]?.v&&r.c?.[1]?.v).map((r,i)=>({j:r.c[0].v,f:r.c[1].v,i:i+2,t:Date.now()-i*3600000}));
} catch {
const csv = await(await fetch(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
res = csv.split('\n').map(r=>r.split(',')).filter(r=>r[0]?.trim()&&r[1]?.trim()).map((r,i)=>({j:r[0].replace(/"/g,'').trim(),f:r[1].replace(/"/g,'').trim(),i:i+2,t:Date.now()-i*3600000}));
}
S.photos = res;
document.getElementById('cAll').textContent = res.length;
document.getElementById('cNew').textContent = Math.min(20, res.length);
applyFilters(); toast(`⚡ ${res.length} foto dimuat`);
} catch(e) {
g.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-dim)"><i class="fas fa-triangle-exclamation" style="font-size:44px;color:var(--cyan);margin-bottom:18px;"></i><h3 style="color:var(--text);margin-bottom:10px;">Gagal Memuat</h3><p>Periksa koneksi atau publikasi Google Sheets</p></div>`;
}
l.style.display = 'none';
}

// Render
function applyFilters() {
let list = [...S.photos];
if(S.filter==='fav') list = list.filter(p=>S.favs.includes(p.f));
else if(S.filter==='new') { list.sort((a,b)=>b.t-a.t); list = list.slice(0,20); }
const q = document.getElementById('search').value.toLowerCase().trim();
if(q) list = list.filter(p=>p.j.toLowerCase().includes(q));
if(document.getElementById('sort')?.value==='name') list.sort((a,b)=>a.j.localeCompare(b.j));
document.getElementById('cFav').textContent = S.favs.length;
render(list);
}
function setFilter(t, el) {
document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
if(el) el.classList.add('active'); else document.querySelector(`.chip:nth-child(${t==='fav'?2:t==='new'?3:1})`).classList.add('active');
S.filter = t; applyFilters();
}
function render(list) {
const g = document.getElementById('grid'); g.innerHTML = '';
if(!list.length) { g.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:70px;color:var(--text-dim)"><i class="fas fa-search" style="font-size:42px;margin-bottom:18px;opacity:0.6"></i><h3 style="color:var(--text);margin-bottom:8px;">Tidak Ditemukan</h3><p>Coba kata kunci lain</p></div>`; return; }
list.forEach((p,i) => {
const f = S.favs.includes(p.f);
const c = document.createElement('div'); c.className = 'card';
c.innerHTML = `
<div class="card-media">
<img src="${p.f}" alt="${p.j}" loading="lazy" onclick="openM('${p.f}','${p.j.replace(/'/g,"\\'")}')">
<button class="card-fav ${f?'active':''}" onclick="event.stopPropagation();toggleF('${p.f}',this)"><i class="fas fa-heart"></i></button>
<div class="card-hover">
<button class="hov-btn" onclick="event.stopPropagation();openM('${p.f}','${p.j.replace(/'/g,"\\'")}')" title="Lihat"><i class="fas fa-expand"></i></button>
<button class="hov-btn" onclick="event.stopPropagation();copyP('${p.f}')" title="Salin"><i class="fas fa-copy"></i></button>
<button class="hov-btn" onclick="event.stopPropagation();dlP('${p.f}','${p.j.replace(/'/g,"\\'")}')" title="Unduh"><i class="fas fa-download"></i></button>
</div>
</div>
<div class="card-body">
<div class="card-title">${p.j}</div>
<div class="card-footer">
<div class="card-date"><i class="far fa-clock"></i> ${new Date(p.t).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})}</div>
<div class="card-acts">
<button class="c-act" onclick="copyP('${p.f}')" title="Salin"><i class="fas fa-copy"></i></button>
<button class="c-act" onclick="dlP('${p.f}','${p.j.replace(/'/g,"\\'")}')" title="Unduh"><i class="fas fa-download"></i></button>
<button class="c-act" onclick="shareP('${p.f}','${p.j.replace(/'/g,"\\'")}')" title="Bagikan"><i class="fas fa-share-nodes"></i></button>
</div>
</div>
</div>`;
g.appendChild(c);
});
}

// Helpers
function toggleF(url, btn) {
const i = S.favs.indexOf(url);
if(i>-1){S.favs.splice(i,1);btn.classList.remove('active');toast('💔 Dihapus favorit');}
else{S.favs.push(url);btn.classList.add('active');toast('❤️ Ditambah favorit');}
localStorage.setItem('ltg_f', JSON.stringify(S.favs));
applyFilters();
}
function fmtSize(b){ return b>1048576?(b/1048576).toFixed(2)+' MB':(b/1024).toFixed(1)+' KB'; }

// Modal
function openM(url, tit) {
curImg=url; curTit=tit;
document.getElementById('mImg').src=url;
document.getElementById('mTitle').textContent=tit;
document.getElementById('dTitle').textContent=tit;
document.getElementById('dFmt').textContent=url.split('.').pop().split('?')[0].toUpperCase();
document.getElementById('mImg').classList.remove('zoom');
fetch(url).then(r=>r.blob()).then(b=>document.getElementById('dSize').textContent=fmtSize(b.size)).catch(()=>document.getElementById('dSize').textContent='—');
document.getElementById('modal').classList.add('open'); document.body.style.overflow='hidden';
}
function closeM(){ document.getElementById('modal').classList.remove('open'); document.body.style.overflow=''; curImg=curTit=''; }
document.getElementById('mImg').addEventListener('click', e=>e.target.classList.toggle('zoom'));

// Actions
async function copyP(url){ try{const b=await(await fetch(url)).blob();await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]);toast('✅ Disalin!');}catch{toast('❌ Gagal. Coba klik kanan gambar > Copy');}}
function copyImg(){ if(curImg) copyP(curImg); }
function dlP(url, name){ const a=document.createElement('a'); a.href=url; a.download=`${name.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`; a.click(); toast('⚡ Mengunduh...'); }
function dlImg(){ if(curImg) dlP(curImg, curTit); }
async function shareP(url, tit){
if(navigator.share){ try{const b=await(await fetch(url)).blob();await navigator.share({title:tit,text:'Lihat foto ini:',files:[new File([b],`${tit}.jpg`,{type:b.type})]});toast('🔗 Dibagikan!');}catch(e){if(e.name!=='AbortError')toast('❌ Gagal share');}}
else{copyP(url);toast('✅ Link disalin!');}
}
function shareImg(){ if(curImg) shareP(curImg, curTit); }

// Toast
function toast(m){ const t=document.getElementById('toast'); document.getElementById('txt').textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3800); }
</script>
</body>
</html>

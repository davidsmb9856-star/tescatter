<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050505">
<title>⚡ NEXT-GEN GALLERY 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* --- CORE VARIABLES --- */
:root {
    --neon-primary: #00f3ff;
    --neon-secondary: #bc13fe;
    --neon-accent: #ffe600;
    --bg-dark: #050505;
    --bg-panel: rgba(20, 20, 25, 0.6);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-main: #ffffff;
    --text-muted: #8892b0;
    --ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

/* --- RESET & BASE --- */
* { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
}

/* --- DYNAMIC BACKGROUND --- */
.bg-mesh {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: -2;
    background: 
        radial-gradient(circle at 15% 50%, rgba(188, 19, 254, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.08), transparent 25%);
}
.grid-lines {
    position: fixed;
    inset: 0;
    z-index: -1;
    background-size: 40px 40px;
    background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                      linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
    mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
}

/* --- LAYOUT --- */
.container {
    max-width: 1600px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
}

/* --- HEADER SECTION --- */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--glass-border);
}

.brand {
    display: flex;
    flex-direction: column;
}
.brand h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(24px, 4vw, 42px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #fff, var(--neon-primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
}
.brand span {
    font-size: 12px;
    color: var(--neon-secondary);
    letter-spacing: 4px;
    font-weight: 700;
}

.actions {
    display: flex;
    gap: 15px;
}

.btn-neon {
    background: rgba(0, 243, 255, 0.05);
    border: 1px solid var(--neon-primary);
    color: var(--neon-primary);
    padding: 10px 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
}
.btn-neon:hover {
    background: var(--neon-primary);
    color: #000;
    box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
}

/* --- SEARCH & FILTER --- */
.control-panel {
    display: flex;
    justify-content: center;
    margin-bottom: 50px;
}
.search-wrapper {
    position: relative;
    width: 100%;
    max-width: 600px;
}
.search-input {
    width: 100%;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border);
    padding: 15px 50px 15px 25px;
    border-radius: 50px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    transition: 0.3s;
    backdrop-filter: blur(10px);
}
.search-input:focus {
    border-color: var(--neon-secondary);
    box-shadow: 0 0 15px rgba(188, 19, 254, 0.2);
    background: rgba(0, 0, 0, 0.5);
}
.search-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
}

/* --- GALLERY GRID --- */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 30px;
    padding-bottom: 50px;
}

.card {
    background: var(--bg-panel);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    transition: all 0.4s var(--ease-elastic);
    backdrop-filter: blur(10px);
    opacity: 0;
    animation: fadeUp 0.6s forwards;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: rgba(255, 255, 255, 0.3);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
}

.card-img-box {
    height: 250px;
    width: 100%;
    overflow: hidden;
    position: relative;
    background: #0a0a0a;
}

.card-img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

.card:hover .card-img-box img {
    transform: scale(1.1);
}

.card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    opacity: 0;
    transition: 0.3s;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 20px;
}

.card:hover .card-overlay {
    opacity: 1;
}

.card-content {
    padding: 20px;
    text-align: center;
}

.card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    color: #fff;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.card-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 15px;
}

/* Action Buttons inside Card */
.card-actions {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.action-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
}

.action-btn:hover {
    background: var(--neon-primary);
    color: #000;
    border-color: var(--neon-primary);
}
.action-btn.download:hover { background: var(--neon-secondary); border-color: var(--neon-secondary); color: #fff; }

/* --- MODAL --- */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(15px);
    z-index: 1000;
    display: none;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s;
}
.modal.active {
    display: flex;
    opacity: 1;
}
.modal-content {
    max-width: 90%;
    max-height: 90vh;
    position: relative;
    border: 1px solid var(--glass-border);
    box-shadow: 0 0 50px rgba(0, 243, 255, 0.1);
    border-radius: 8px;
    overflow: hidden;
}
.modal-img {
    max-width: 100%;
    max-height: 85vh;
    display: block;
}
.close-modal {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255, 0, 0, 0.2);
    border: 1px solid red;
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1001;
}

/* --- LOADING & TOAST --- */
.loader-container {
    text-align: center;
    padding: 50px;
    display: none;
}
.spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(0, 243, 255, 0.3);
    border-top-color: var(--neon-primary);
    border-radius: 50%;
    animation: spin 1s infinite linear;
    margin: 0 auto 20px;
}
.toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: rgba(0, 0, 0, 0.8);
    border-left: 4px solid var(--neon-primary);
    padding: 15px 25px;
    border-radius: 4px;
    color: #fff;
    transform: translateX(200%);
    transition: transform 0.4s var(--ease-elastic);
    z-index: 2000;
    display: flex;
    align-items: center;
    gap: 10px;
    backdrop-filter: blur(5px);
}
.toast.show { transform: translateX(0); }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 768px) {
    .top-bar { flex-direction: column; gap: 20px; text-align: center; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .card-img-box { height: 180px; }
    .card-title { font-size: 14px; }
}
</style>
</head>
<body>

<!-- Background Elements -->
<div class="bg-mesh"></div>
<div class="grid-lines"></div>

<!-- Main Container -->
<div class="container">
    
    <!-- Header -->
    <header class="top-bar">
        <div class="brand">
            <h1>GALLERY SYSTEM</h1>
            <span>VER 2026 // ONLINE</span>
        </div>
        <div class="actions">
            <a href="#" class="btn-neon" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> REFRESH
            </a>
            <a href="index.html" class="btn-neon" style="border-color: var(--neon-secondary); color: var(--neon-secondary);">
                <i class="fas fa-home"></i> HOME
            </a>
        </div>
    </header>

    <!-- Search Panel -->
    <div class="control-panel">
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="Cari kode atau nama foto..." onkeyup="filterGallery()">
            <i class="fas fa-search search-icon"></i>
        </div>
    </div>

    <!-- Loading State -->
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
        <p style="color: var(--neon-primary); font-family: 'Orbitron'; letter-spacing: 2px;">LOADING DATA...</p>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-grid" id="galleryGrid">
        <!-- Items injected by JS -->
    </div>

</div>

<!-- Modal Viewer -->
<div id="imageModal" class="modal">
    <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
    <div class="modal-content">
        <img src="" alt="Full View" id="modalImg" class="modal-img">
    </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast">
    <i class="fas fa-check-circle" style="color: var(--neon-primary);"></i>
    <span id="toastMsg">Action Successful</span>
</div>

<script>
    // --- CONFIGURATION ---
    const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0'; // ID Spreadsheet Anda
    const GID = '1246502038'; // GID Sheet
    
    let allData = [];

    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
        fetchData();
    });

    // --- FETCH DATA ---
    async function fetchData() {
        const loader = document.getElementById('loader');
        const grid = document.getElementById('galleryGrid');
        
        loader.style.display = 'block';
        grid.innerHTML = '';

        try {
            // Menggunakan GViz API untuk mengambil data JSON
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=C2:D150`;
            
            const response = await fetch(url);
            const text = await response.text();
            // Membersihkan format JSONP Google
            const jsonText = text.substring(47).slice(0, -2);
            const json = JSON.parse(jsonText);
            
            const rows = json.table.rows;
            allData = [];

            rows.forEach((row, index) => {
                if(row.c && row.c[0] && row.c[1]) {
                    allData.push({
                        title: row.c[0].v || 'Untitled',
                        url: row.c[1].v || '',
                        id: index
                    });
                }
            });

            renderGallery(allData);
            showToast(`System Loaded: ${allData.length} Files Found`);

        } catch (error) {
            console.error(error);
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color: red;">
                <h3>CONNECTION ERROR</h3>
                <p>Failed to load database.</p>
            </div>`;
        } finally {
            loader.style.display = 'none';
        }
    }

    // --- RENDER GALLERY ---
    function renderGallery(data) {
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = '';

        if(data.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 40px; color: var(--text-muted);">
                <i class="fas fa-ghost" style="font-size: 40px; margin-bottom: 10px;"></i>
                <p>No Data Found</p>
            </div>`;
            return;
        }

        data.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = `${index * 0.05}s`; // Staggered animation
            
            card.innerHTML = `
                <div class="card-img-box" onclick="openModal('${item.url}')">
                    <img src="${item.url}" loading="lazy" alt="${item.title}" onerror="this.src='https://via.placeholder.com/400x300/111/333?text=Error'">
                    <div class="card-overlay">
                        <span style="color:white; font-family:'Orbitron'; letter-spacing:2px;">VIEW FULLSIZE</span>
                    </div>
                </div>
                <div class="card-content">
                    <h3 class="card-title">${item.title}</h3>
                    <div class="card-meta">ID: #${String(item.id + 2).padStart(4, '0')}</div>
                    <div class="card-actions">
                        <button class="action-btn" onclick="copyLink('${item.url}')" title="Copy Link">
                            <i class="fas fa-link"></i>
                        </button>
                        <button class="action-btn download" onclick="downloadImage('${item.url}', '${item.title}')" title="Download">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // --- SEARCH FUNCTION ---
    function filterGallery() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter(item => 
            item.title.toLowerCase().includes(query)
        );
        renderGallery(filtered);
    }

    // --- ACTIONS ---
    function openModal(url) {
        const modal = document.getElementById('imageModal');
        const img = document.getElementById('modalImg');
        img.src = url;
        modal.classList.add('active');
    }

    function closeModal() {
        document.getElementById('imageModal').classList.remove('active');
    }

    async function copyLink(url) {
        try {
            await navigator.clipboard.writeText(url);
            showToast('Link copied to clipboard!');
        } catch(err) {
            showToast('Failed to copy');
        }
    }

    function downloadImage(url, filename) {
        const a = document.createElement('a');
        a.href = url;
        a.download = filename.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.jpg';
        a.target = '_blank';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        showToast('Download started...');
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Close modal on outside click
    window.onclick = function(event) {
        const modal = document.getElementById('imageModal');
        if (event.target == modal) {
            closeModal();
        }
    }
</script>

</body>
</html>

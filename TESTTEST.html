<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--blue-100: #e6f9ff;
--blue-200: #a8edf7;
--blue-300: #5dd9f0;
--blue-400: #00b4d8;
--blue-500: #0096c7;
--blue-600: #0077b6;
--blue-700: #005f93;
--blue-800: #003d5c;
--blue-900: #002233;
--cyan-accent: #00e5ff;
--ice-blue: #b8e8f0;
--frost: #d4f1f9;
--dark-base: #050d1a;
--dark-surface: #0a1628;
--dark-elevated: #101e34;
--dark-glass: rgba(10, 22, 40, 0.7);
--dark-card: rgba(16, 30, 52, 0.85);
--text-white: #f0f7ff;
--text-blue: #a8d4e8;
--text-muted: #5a7a92;
--glow-sm: 0 0 12px rgba(0, 229, 255, 0.35);
--glow-md: 0 0 25px rgba(0, 229, 255, 0.5), 0 0 50px rgba(0, 229, 255, 0.25);
--glow-lg: 0 0 40px rgba(0, 229, 255, 0.7), 0 0 80px rgba(0, 229, 255, 0.4), 0 0 120px rgba(0, 229, 255, 0.2);
--ease-out: cubic-bezier(0.16, 1, 0.3, 1);
--ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', 'Space Grotesk', sans-serif;
background: var(--dark-base);
color: var(--text-white);
min-height: 100vh;
overflow-x: hidden;
line-height: 1.6;
}

/* ✨ BACKGROUND */
.bg-fixed {
position: fixed; inset: 0; z-index: -10;
background:
radial-gradient(800px 500px at 12% 18%, rgba(0, 180, 216, 0.12) 0%, transparent 60%),
radial-gradient(700px 400px at 88% 22%, rgba(0, 150, 199, 0.10) 0%, transparent 55%),
radial-gradient(600px 350px at 50% 88%, rgba(0, 95, 147, 0.09) 0%, transparent 50%),
radial-gradient(500px 300px at 72% 68%, rgba(0, 119, 182, 0.07) 0%, transparent 55%);
animation: bgShift 35s ease-in-out infinite alternate;
}
@keyframes bgShift {
0%, 100% { transform: translate(0,0) scale(1); }
33% { transform: translate(1.2%,-0.6%) scale(1.02); }
66% { transform: translate(-0.6%,1.2%) scale(0.985); }
}

.grid-bg {
position: fixed; inset: 0; z-index: -8; pointer-events: none;
background:
linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
background-size: 55px 55px;
mask-image: radial-gradient(ellipse 80% 72% at 50% 50%, black 15%, transparent 88%);
animation: gridDrift 40s linear infinite;
}
@keyframes gridDrift { to { background-position: 55px 55px; } }

.particles-box {
position: fixed; inset: 0; z-index: -6; pointer-events: none; overflow: hidden;
}
.dot {
position: absolute; width: 3px; height: 3px; border-radius: 50%; opacity: 0;
background: var(--cyan-accent);
box-shadow: 0 0 10px rgba(0,229,255,0.5), 0 0 22px rgba(0,229,255,0.3);
animation: dotFloat 26s infinite ease-in-out;
}
.dot.active { opacity: 0.75; }
.dot:nth-child(3n) { background: var(--blue-400); box-shadow: 0 0 10px rgba(0,180,216,0.5), 0 0 22px rgba(0,180,216,0.3); }
.dot:nth-child(3n+1) { background: var(--blue-300); box-shadow: 0 0 10px rgba(93,217,240,0.5); }
@keyframes dotFloat {
0%,100% { transform: translateY(100vh) rotate(0deg); opacity:0; }
12% { opacity:0.75; }
88% { opacity:0.75; }
100% { transform: translateY(-100vh) rotate(720deg); opacity:0; }
}

.scan-bar {
position: fixed; left:0; right:0; height:3px; z-index:100; pointer-events:none;
background: linear-gradient(90deg, transparent, var(--cyan-accent), var(--blue-300), transparent);
opacity:0; animation: scanRun 7s ease-in-out infinite;
box-shadow: 0 0 18px rgba(0,229,255,0.5);
}
@keyframes scanRun {
0% { top:-5px; opacity:0; }
6% { opacity:0.45; }
94% { opacity:0.45; }
100% { top:100%; opacity:0; }
}

/* ✨ LAYOUT */
.app {
display: flex; flex-direction: column; min-height: 100vh;
}

/* ✨ TOP BAR */
.topbar {
position: sticky; top: 0; z-index: 50;
display: flex; align-items: center; justify-content: space-between; gap: 16px;
padding: 14px 24px;
background: rgba(5, 13, 26, 0.88);
backdrop-filter: blur(20px);
border-bottom: 1px solid rgba(0, 229, 255, 0.2);
box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
}
.topbar-logo {
display: flex; align-items: center; gap: 12px;
font-family: 'Orbitron', sans-serif; font-weight: 900;
font-size: 20px; letter-spacing: 2px;
background: linear-gradient(135deg, var(--cyan-accent), var(--blue-300));
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
}
.topbar-logo i {
font-size: 22px;
background: linear-gradient(135deg, var(--cyan-accent), var(--blue-400));
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.6));
}

.topbar-actions {
display: flex; align-items: center; gap: 12px;
}
.topbar-btn {
width: 40px; height: 40px; border-radius: 12px;
background: rgba(0, 229, 255, 0.1);
border: 1px solid rgba(0, 229, 255, 0.3);
color: var(--cyan-accent); font-size: 15px; cursor: pointer;
transition: all 0.3s var(--ease-out);
display: flex; align-items: center; justify-content: center;
}
.topbar-btn:hover {
background: rgba(0, 229, 255, 0.25);
border-color: var(--cyan-accent);
box-shadow: var(--glow-sm);
transform: translateY(-2px);
}
.topbar-search {
position: relative; flex: 1; max-width: 380px;
}
.topbar-search input {
width: 100%; padding: 10px 42px 10px 16px;
background: rgba(0, 229, 255, 0.08);
border: 1px solid rgba(0, 229, 255, 0.3);
border-radius: 12px; color: var(--text-white);
font-family: 'Space Grotesk', sans-serif;
font-size: 14px; transition: all 0.3s var(--ease-out);
}
.topbar-search input:focus {
outline: none;
border-color: var(--cyan-accent);
box-shadow: var(--glow-sm);
background: rgba(0, 229, 255, 0.14);
}
.topbar-search input::placeholder { color: var(--text-muted); }
.topbar-search i {
position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
color: var(--blue-400); font-size: 14px; pointer-events: none;
}

/* ✨ HERO SECTION */
.hero {
position: relative; padding: 48px 24px 42px; text-align: center;
overflow: hidden;
}
.hero::before {
content: ''; position: absolute; inset: 0;
background: radial-gradient(ellipse 65% 80% at 50% 100%, rgba(0, 229, 255, 0.08) 0%, transparent 70%);
pointer-events: none;
}
.hero-badge {
display: inline-flex; align-items: center; gap: 10px;
padding: 6px 18px;
background: rgba(0, 229, 255, 0.12);
border: 1px solid rgba(0, 229, 255, 0.4);
border-radius: 99px; font-size: 11px; font-weight: 600;
color: var(--cyan-accent); text-transform: uppercase;
letter-spacing: 2.5px; margin-bottom: 20px;
font-family: 'Orbitron', sans-serif;
animation: badgePulse 2.5s ease-in-out infinite;
}
@keyframes badgePulse {
0%, 100% { box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }
50% { box-shadow: 0 0 30px rgba(0, 229, 255, 0.45); }
}
.hero-badge .pulse {
width: 8px; height: 8px; border-radius: 50%;
background: var(--cyan-accent);
box-shadow: 0 0 12px var(--cyan-accent);
animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:0.7} }

.hero-title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(28px, 6vw, 48px);
font-weight: 900; letter-spacing: 3px;
margin-bottom: 12px;
background: linear-gradient(135deg, var(--cyan-accent) 0%, var(--blue-300) 35%, #fff 52%, var(--blue-300) 68%, var(--blue-400) 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
background-clip: text;
animation: titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow { 0%,100%{filter:brightness(1)}50%{filter:brightness(1.35)} }

.hero-sub {
font-size: 14px; color: var(--text-blue);
letter-spacing: 4px; text-transform: uppercase;
margin-bottom: 30px; font-family: 'Orbitron', sans-serif;
}

/* ✨ STATS BAR */
.stats-bar {
display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
margin-top: 10px;
}
.stat-item {
display: flex; align-items: center; gap: 8px;
padding: 8px 18px;
background: var(--dark-card);
border: 1px solid rgba(0, 229, 255, 0.2);
border-radius: 10px; backdrop-filter: blur(10px);
}
.stat-icon {
width: 32px; height: 32px; border-radius: 8px;
background: rgba(0, 229, 255, 0.15);
display: flex; align-items: center; justify-content: center;
color: var(--cyan-accent); font-size: 14px;
}
.stat-text { font-family: 'Space Grotesk', sans-serif; }
.stat-num { font-size: 16px; font-weight: 700; color: var(--cyan-accent); }
.stat-label { font-size: 11px; color: var(--text-muted); }

/* ✨ FILTER TABS */
.filter-section {
display: flex; align-items: center; gap: 12px;
padding: 0 24px; margin: 28px 0 22px;
flex-wrap: wrap;
}
.filter-chip {
padding: 8px 18px;
background: rgba(0, 229, 255, 0.08);
border: 1px solid rgba(0, 229, 255, 0.25);
border-radius: 99px;
color: var(--text-blue);
font-family: 'Space Grotesk', sans-serif;
font-size: 13px; font-weight: 500;
cursor: pointer; transition: all 0.3s var(--ease-out);
}
.filter-chip:hover, .filter-chip.active {
background: rgba(0, 229, 255, 0.2);
border-color: var(--cyan-accent);
color: var(--cyan-accent);
box-shadow: var(--glow-sm);
transform: translateY(-2px);
}
.filter-chip i { margin-right: 5px; }
.filter-divider {
flex: 1; height: 1px;
background: linear-gradient(90deg, rgba(0,229,255,0.3), transparent);
min-width: 60px;
}

/* ✨ GALLERY GRID */
.gallery-wrap {
padding: 0 24px 60px;
}
.masonry {
columns: 3; column-gap: 20px;
}
@media (max-width: 1100px) { .masonry { columns: 2; } }
@media (max-width: 640px) { .masonry { columns: 1; } }

.card {
break-inside: avoid;
margin-bottom: 20px;
background: var(--dark-card);
border: 1px solid rgba(0, 229, 255, 0.18);
border-radius: 16px;
overflow: hidden;
animation: cardIn 0.65s var(--ease-out) backwards;
transition: all 0.45s var(--ease-bounce);
backdrop-filter: blur(12px);
}
.card:nth-child(1){animation-delay:.08s}
.card:nth-child(2){animation-delay:.12s}
.card:nth-child(3){animation-delay:.16s}
.card:nth-child(4){animation-delay:.20s}
.card:nth-child(5){animation-delay:.24s}
@keyframes cardIn { from{opacity:0;transform:translateY(30px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
.card:hover {
transform: translateY(-6px) scale(1.015);
border-color: rgba(0, 229, 255, 0.6);
box-shadow: var(--glow-md), 0 20px 50px rgba(0,0,0,0.5);
}

.card-img {
position: relative; width: 100%;
background: linear-gradient(135deg, #0c1a2e, #081020);
overflow: hidden; cursor: pointer;
display: flex; align-items: center; justify-content: center;
}
.card-img::after {
content: ''; position: absolute; inset: 0;
background: linear-gradient(0deg, rgba(5,13,26,0.7) 0%, transparent 50%);
pointer-events: none;
}
.card-img img {
width: 100%; height: auto; display: block;
transition: transform 0.5s var(--ease-out);
}
.card:hover .card-img img { transform: scale(1.06); }

.card-fav {
position: absolute; top: 10px; right: 10px; z-index: 3;
width: 34px; height: 34px; border-radius: 50%;
background: rgba(10, 22, 40, 0.7);
border: 1px solid rgba(0, 229, 255, 0.4);
color: var(--text-muted); font-size: 13px; cursor: pointer;
transition: all 0.3s var(--ease-out);
display: flex; align-items: center; justify-content: center;
backdrop-filter: blur(8px);
}
.card-fav:hover, .card-fav.active {
background: rgba(0, 229, 255, 0.3);
border-color: var(--cyan-accent);
color: var(--cyan-accent);
box-shadow: var(--glow-sm);
}

.card-body { padding: 16px 18px; }
.card-title {
font-family: 'Orbitron', sans-serif;
font-size: 13px; font-weight: 700;
color: var(--cyan-accent);
margin-bottom: 6px;
text-shadow: 0 0 10px rgba(0,229,255,0.4);
word-break: break-word;
}
.card-meta {
font-size: 11px; color: var(--text-muted);
margin-bottom: 12px; display: flex;
justify-content: space-between; align-items: center;
}
.card-actions {
display: flex; gap: 8px; padding-top: 12px;
border-top: 1px solid rgba(0, 229, 255, 0.15);
}
.card-act {
flex: 1; padding: 8px 4px;
background: rgba(0, 229, 255, 0.08);
border: 1px solid rgba(0, 229, 255, 0.3);
border-radius: 8px; color: var(--cyan-accent);
font-size: 11px; font-weight: 600;
cursor: pointer; transition: all 0.3s var(--ease-out);
display: flex; flex-direction: column;
align-items: center; gap: 3px;
font-family: 'Space Grotesk', sans-serif;
}
.card-act i { font-size: 15px; transition: transform 0.3s; }
.card-act span { font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase; }
.card-act:hover {
background: rgba(0, 229, 255, 0.22);
border-color: var(--cyan-accent);
transform: translateY(-3px);
box-shadow: 0 8px 24px rgba(0,229,255,0.45);
}
.card-act:hover i { transform: translateY(-2px); }
.card-act.copy:hover { color: #00ff9d; border-color: #00ff9d; background: rgba(0,255,157,0.18); }
.card-act.dl:hover { color: var(--blue-300); border-color: var(--blue-300); background: rgba(93,217,240,0.18); }
.card-act.share:hover { color: #ff8c42; border-color: #ff8c42; background: rgba(255,140,66,0.18); }

/* ✨ LOADING */
.loading-zone {
grid-column: 1 / -1;
text-align: center; padding: 60px 24px;
display: none;
}
.loading-zone.active { display: block; }
.spinner {
width: 48px; height: 48px; border: 3px solid rgba(0,229,255,0.2);
border-top-color: var(--cyan-accent); border-radius: 50%;
animation: spin 0.9s linear infinite;
margin: 0 auto 18px;
box-shadow: var(--glow-sm);
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-text {
color: var(--cyan-accent);
font-family: 'Orbitron', sans-serif;
font-size: 12px; font-weight: 700;
letter-spacing: 2px;
animation: textPulse 2s ease-in-out infinite;
}
@keyframes textPulse { 0%,100%{opacity:1}50%{opacity:0.6} }

/* ✨ MODAL */
.modal {
position: fixed; inset: 0; z-index: 1000;
background: rgba(2, 6, 12, 0.96);
backdrop-filter: blur(24px);
display: none; align-items: center; justify-content: center; padding: 24px;
animation: mIn 0.35s ease;
}
.modal.open { display: flex; }
@keyframes mIn { from{opacity:0}to{opacity:1} }
.modal-box {
background: var(--dark-surface);
border: 1px solid rgba(0, 229, 255, 0.5);
border-radius: 20px; max-width: 960px; width: 100%;
max-height: 94vh; overflow: hidden;
display: flex; flex-direction: column;
box-shadow: var(--glow-lg), 0 30px 80px rgba(0,0,0,0.6);
animation: mSlide 0.5s var(--ease-bounce);
}
@keyframes mSlide { from{opacity:0;transform:translateY(35px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
.modal-head {
display: flex; justify-content: space-between; align-items: center;
padding: 16px 22px; border-bottom: 1px solid rgba(0,229,255,0.2);
background: linear-gradient(90deg, rgba(0,229,255,0.08), transparent, rgba(0,229,255,0.08));
}
.modal-head h3 {
font-family: 'Orbitron', sans-serif; font-size: 15px;
color: var(--cyan-accent); font-weight: 700;
}
.modal-x {
width: 38px; height: 38px; border-radius: 50%;
background: transparent; border: 1px solid rgba(0,229,255,0.4);
color: var(--cyan-accent); font-size: 15px; cursor: pointer;
transition: all 0.3s var(--ease-out);
display: flex; align-items: center; justify-content: center;
}
.modal-x:hover {
background: rgba(0,229,255,0.25); border-color: var(--cyan-accent);
transform: rotate(90deg) scale(1.1); box-shadow: var(--glow-sm);
}
.modal-body {
padding: 24px; text-align: center; overflow-y: auto; flex: 1;
background: radial-gradient(circle at center, #0c1e36, #050d1a);
display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.modal-body img {
max-width: 100%; max-height: 64vh; width: auto; object-fit: contain;
border-radius: 12px;
box-shadow: 0 0 35px rgba(0,229,255,0.4), 0 10px 45px rgba(0,0,0,0.5);
transition: transform 0.4s var(--ease-out); cursor: zoom-in;
}
.modal-body img.zoom { transform: scale(1.6); }
.modal-acts {
margin-top: 22px; display: flex; gap: 12px;
justify-content: center; flex-wrap: wrap;
}
.modal-act {
padding: 10px 22px;
background: rgba(0, 229, 255, 0.12);
border: 1px solid rgba(0, 229, 255, 0.4);
border-radius: 10px; color: var(--cyan-accent);
font-family: 'Space Grotesk', sans-serif;
font-size: 13px; font-weight: 600;
cursor: pointer; transition: all 0.3s var(--ease-out);
display: flex; align-items: center; gap: 8px;
}
.modal-act:hover {
background: rgba(0, 229, 255, 0.25);
border-color: var(--cyan-accent);
transform: translateY(-3px);
box-shadow: 0 8px 28px rgba(0,229,255,0.5);
}
.modal-act.cpy:hover { color: #00ff9d; border-color: #00ff9d; background: rgba(0,255,157,0.15); box-shadow: 0 8px 28px rgba(0,255,157,0.45); }
.modal-act.dl:hover { color: var(--blue-300); border-color: var(--blue-300); background: rgba(93,217,240,0.15); box-shadow: 0 8px 28px rgba(93,217,240,0.45); }
.modal-act.sh:hover { color: #ff8c42; border-color: #ff8c42; background: rgba(255,140,66,0.15); box-shadow: 0 8px 28px rgba(255,140,66,0.45); }

/* ✨ TOAST */
.toast-box {
position: fixed; bottom: 24px; right: 24px;
background: var(--dark-glass);
border: 1px solid rgba(0, 229, 255, 0.5);
color: var(--cyan-accent); padding: 14px 22px;
border-radius: 14px; font-weight: 600; font-size: 13px;
z-index: 10001; display: flex; align-items: center; gap: 10px;
box-shadow: var(--glow-md); backdrop-filter: blur(16px);
font-family: 'Space Grotesk', sans-serif;
transform: translateX(320px); opacity: 0;
transition: all 0.5s var(--ease-bounce);
}
.toast-box.show { transform: translateX(0); opacity: 1; }
.toast-box i { font-size: 16px; }

/* ✨ EMPTY STATE */
.empty {
grid-column: 1 / -1; text-align: center; padding: 65px 24px;
color: var(--text-muted);
}
.empty i { font-size: 52px; color: var(--blue-400); opacity: 0.5; margin-bottom: 20px; }
.empty h3 { font-family: 'Orbitron', sans-serif; color: var(--cyan-accent); margin-bottom: 10px; }

/* ✨ SCROLLBAR */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--dark-base); }
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--cyan-accent), var(--blue-400), var(--blue-600));
border-radius: 5px; border: 2px solid var(--dark-base);
box-shadow: 0 0 12px rgba(0,229,255,0.5);
}

::selection { background: rgba(0, 229, 255, 0.4); color: #fff; }

/* ✨ BACK BTN */
.back-link {
position: fixed; left: 18px; top: 14px; z-index: 200;
display: flex; align-items: center; gap: 8px;
padding: 8px 16px; background: rgba(10,22,40,0.8);
border: 1px solid rgba(0, 229, 255, 0.4);
border-radius: 10px; color: var(--cyan-accent);
text-decoration: none; font-weight: 600; font-size: 11px;
backdrop-filter: blur(12px); transition: all 0.3s var(--ease-out);
}
.back-link:hover {
background: rgba(0, 229, 255, 0.2);
transform: translateX(-4px);
box-shadow: var(--glow-sm);
}

/* ✨ RESPONSIVE */
@media (max-width: 768px) {
.topbar { padding: 12px 16px; flex-wrap: wrap; }
.topbar-logo { font-size: 16px; }
.topbar-search { order: 10; max-width: 100%; width: 100%; }
.hero { padding: 36px 16px 30px; }
.hero-title { font-size: clamp(24px, 8vw, 38px); }
.filter-section { padding: 0 16px; }
.gallery-wrap { padding: 0 16px 40px; }
.masonry { columns: 1; }
.card-act i { font-size: 13px; }
.card-act span { font-size: 8px; }
.modal { padding: 16px; }
.modal-box { border-radius: 16px; }
.toast-box { bottom: 16px; right: 16px; left: 16px; }
}
</style>
</head>
<body>

<div class="bg-fixed"></div>
<div class="grid-bg"></div>
<div class="particles-box" id="pts"></div>
<div class="scan-bar"></div>

<a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali</a>

<div class="app">
<!-- TOP BAR -->
<div class="topbar">
<div class="topbar-logo"><i class="fas fa-bolt"></i> LINE TOGEL</div>
<div class="topbar-search">
<input type="search" id="searchBox" placeholder="Cari foto..." aria-label="Cari">
<i class="fas fa-search"></i>
</div>
<div class="topbar-actions">
<button class="topbar-btn" id="viewToggle" title="Toggle view"><i class="fas fa-th"></i></button>
<button class="topbar-btn" id="favFilter" title="Favorit"><i class="fas fa-heart"></i></button>
</div>
</div>

<!-- HERO -->
<div class="hero">
<div class="hero-badge"><span class="pulse"></span> SYSTEM ACTIVE</div>
<h1 class="hero-title">⚡ FOTO GALLERY</h1>
<p class="hero-sub">CYBER PORTAL 2026</p>
<div class="stats-bar">
<div class="stat-item">
<div class="stat-icon"><i class="fas fa-images"></i></div>
<div class="stat-text"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total Foto</div></div>
</div>
<div class="stat-item">
<div class="stat-icon"><i class="fas fa-star"></i></div>
<div class="stat-text"><div class="stat-num" id="favCount">0</div><div class="stat-label">Favorit</div></div>
</div>
<div class="stat-item">
<div class="stat-icon"><i class="fas fa-eye"></i></div>
<div class="stat-text"><div class="stat-num" id="viewCount">0</div><div class="stat-label">Views</div></div>
</div>
</div>
</div>

<!-- FILTERS -->
<div class="filter-section">
<button class="filter-chip active" data-filter="all"><i class="fas fa-border-all"></i> Semua</button>
<button class="filter-chip" data-filter="recent"><i class="fas fa-clock"></i> Terbaru</button>
<button class="filter-chip" data-filter="favorites"><i class="fas fa-heart"></i> Favorit</button>
<div class="filter-divider"></div>
</div>

<!-- GALLERY -->
<div class="gallery-wrap">
<div class="loading-zone active" id="loader">
<div class="spinner"></div>
<div class="load-text">⚡ LOADING PHOTOS</div>
</div>
<div class="masonry" id="grid"></div>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<div class="modal-head">
<h3 id="mTitle">Foto Detail</h3>
<button class="modal-x" onclick="closeModal()"><i class="fas fa-times"></i></button>
</div>
<div class="modal-body">
<img id="mImg" src="" alt="" onclick="this.classList.toggle('zoom')">
<div class="modal-acts">
<button class="modal-act cpy" onclick="copyImg()"><i class="fas fa-copy"></i> Copy</button>
<button class="modal-act dl" onclick="dlImg()"><i class="fas fa-download"></i> Download</button>
<button class="modal-act sh" onclick="shareImg()"><i class="fas fa-share-alt"></i> Share</button>
</div>
</div>
</div>
</div>

<!-- TOAST -->
<div class="toast-box" id="toast"><i class="fas fa-bolt"></i><span id="toastTxt">Berhasil!</span></div>

<script>
const S = { photos: [], favs: JSON.parse(localStorage.getItem('ltg_fav2')||'[]'), filter: 'all', search: '', views: parseInt(localStorage.getItem('ltg_views')||'0') };

document.addEventListener('DOMContentLoaded', () => { initDots(); initControls(); loadPhotos(); updStats(); });

function initDots() {
const c = document.getElementById('pts');
for(let i=0;i<65;i++){ const d=document.createElement('div'); d.className='dot';
d.style.left=Math.random()*100+'%';d.style.animationDelay=Math.random()*30+'s';
d.style.animationDuration=(20+Math.random()*35)+'s';
setTimeout(()=>d.classList.add('active'),Math.random()*3000); c.appendChild(d); }
}

function initControls() {
document.getElementById('searchBox').addEventListener('input', e => { S.search = e.target.value.toLowerCase(); filter(); });
document.querySelectorAll('.filter-chip').forEach(c => c.addEventListener('click', () => {
document.querySelectorAll('.filter-chip').forEach(x => x.classList.remove('active'));
c.classList.add('active'); S.filter = c.dataset.filter; filter();
}));
document.getElementById('favFilter').addEventListener('click', () => {
const chips = document.querySelectorAll('.filter-chip');
chips.forEach(c => c.classList.remove('active'));
document.querySelector('[data-filter="favorites"]').classList.add('active');
S.filter = 'favorites'; filter();
});
document.getElementById('viewToggle').addEventListener('click', () => {
const g = document.getElementById('grid');
const isMasonry = g.style.columnCount !== '1';
g.style.columnCount = isMasonry ? '1' : '';
g.querySelectorAll('.card').forEach(c => { c.style.breakInside = isMasonry ? 'avoid' : ''; });
toast(`📐 View: ${isMasonry ? 'List' : 'Masonry'}`);
});
document.getElementById('modal').addEventListener('click', e => { if(e.target.id==='modal') closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); if(e.ctrlKey&&e.key==='k'){e.preventDefault();document.getElementById('searchBox').focus();} });
}

async function loadPhotos() {
const L = document.getElementById('loader'), G = document.getElementById('grid');
L.classList.add('active'); G.innerHTML = '';
try {
const sid='1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0',gid='1246502038';
let ph=[];
try {
const r=await fetch(`https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
const t=await r.text(),j=JSON.parse(t.substring(47).slice(0,-2));
ph=j.table.rows.filter(r=>r.c?.[0]?.v&&r.c?.[1]?.v).map((r,i)=>({judul:r.c[0].v,foto:r.c[1].v,idx:i+2,ts:Date.now()-i*60000}));
} catch(e) {
const c=await(await fetch(`https://docs.google.com/spreadsheets/d/${sid}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
ph=c.split('\n').map(r=>r.split(',')).filter(r=>r[0]?.trim()&&r[1]?.trim()).map((r,i)=>({judul:r[0].replace(/"/g,'').trim(),foto:r[1].replace(/"/g,'').trim(),idx:i+2,ts:Date.now()-i*60000}));
}
S.photos=ph; filter(); updStats(); toast(`⚡ ${ph.length} foto dimuat`);
} catch(e) {
G.innerHTML=`<div class="empty"><i class="fas fa-exclamation-triangle"></i><h3>Gagal Memuat</h3><p>Periksa koneksi atau Sheets</p></div>`;
}
L.classList.remove('active');
}

function filter() {
let f=S.photos;
if(S.filter==='favorites') f=f.filter(p=>S.favs.includes(p.foto));
if(S.filter==='recent') f=[...f].sort((a,b)=>b.ts-a.ts).slice(0,25);
if(S.search) f=f.filter(p=>p.judul.toLowerCase().includes(S.search));
render(f);
}

function render(photos) {
const G = document.getElementById('grid'); G.innerHTML = '';
if(!photos.length){ G.innerHTML=`<div class="empty"><i class="fas fa-search"></i><h3>Tidak Ditemukan</h3><p>Coba kata kunci lain</p></div>`; return; }
photos.forEach((p,i) => G.appendChild(mkCard(p,i)));
}

function mkCard(p,i) {
const isF = S.favs.includes(p.foto);
const d = document.createElement('div'); d.className = 'card';
d.innerHTML = `<div class="card-img" onclick="openModal('${p.foto}','${p.judul.replace(/'/g,"\\'")}')">
<button class="card-fav ${isF?'active':''}" onclick="event.stopPropagation();toggleFav('${p.foto}',this)"><i class="fas fa-heart"></i></button>
<img src="${p.foto}" alt="${p.judul}" onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00e5ff?text=No+Image'" loading="lazy"></div>
<div class="card-body"><div class="card-title">${p.judul}</div>
<div class="card-meta"><span><i class="fas fa-hashtag"></i> ${i+1}</span><span><i class="fas fa-calendar"></i> ${fmtDate(p.ts)}</span></div>
<div class="card-actions">
<button class="card-act copy" onclick="copyPhoto('${p.foto}')"><i class="fas fa-copy"></i><span>Copy</span></button>
<button class="card-act dl" onclick="dlPhoto('${p.foto}','${p.judul.replace(/'/g,"\\'")}')"><i class="fas fa-download"></i><span>Download</span></button>
<button class="card-act share" onclick="sharePhoto('${p.foto}','${p.judul.replace(/'/g,"\\'")}')"><i class="fas fa-share-alt"></i><span>Share</span></button>
</div></div>`;
return d;
}

function fmtDate(ts){const d=new Date(ts);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}

function toggleFav(url,btn){const i=S.favs.indexOf(url);if(i>-1){S.favs.splice(i,1);btn.classList.remove('active');toast('⭐ Dihapus favorit');}else{S.favs.push(url);btn.classList.add('active');toast('⭐ Ditambah favorit');}localStorage.setItem('ltg_fav2',JSON.stringify(S.favs));updStats();if(S.filter==='favorites')filter();}

function updStats(){document.getElementById('totalCount').textContent=S.photos.length;document.getElementById('favCount').textContent=S.favs.length;S.views++;localStorage.setItem('ltg_views',S.views);document.getElementById('viewCount').textContent=S.views;}

let curUrl='',curTitle='';
function openModal(url,title){curUrl=url;curTitle=title;document.getElementById('mTitle').textContent=title;document.getElementById('mImg').src=url;document.getElementById('mImg').alt=title;document.getElementById('modal').classList.add('open');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('mImg').classList.remove('zoom');document.body.style.overflow='';}

async function copyPhoto(url){try{const b=await(await fetch(url)).blob();await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]);toast('✅ Disalin!');}catch{toast('❗ Klik kanan > Copy Image');}}
async function copyImg(){if(curUrl)await copyPhoto(curUrl);}
function dlPhoto(url,name){const a=document.createElement('a');a.href=url;a.download=`${name.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`;a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);toast('⚡ Download...');}
function dlImg(){if(curUrl)dlPhoto(curUrl,curTitle);}
async function sharePhoto(url,title){if(navigator.share){try{const b=await(await fetch(url)).blob();await navigator.share({title,text:'Lihat foto ini:',files:[new File([b],`${title}.jpg`,{type:b.type})]});toast('🔗 Shared!');}catch(e){if(e.name!=='AbortError')copyPhoto(url);}}else{copyPhoto(url);}}
function shareImg(){if(curUrl)sharePhoto(curUrl,curTitle);}

function toast(msg){const t=document.getElementById('toast');document.getElementById('toastTxt').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000);}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f3ff">
<title>⚡ CYBER GALLERY 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* --- CORE VARIABLES --- */
:root {
    --neon-blue: #00f3ff;
    --neon-dark: #0066ff;
    --neon-glow: rgba(0, 243, 255, 0.6);
    --bg-deep: #020205;
    --bg-panel: rgba(10, 20, 40, 0.65);
    --glass-border: rgba(0, 243, 255, 0.3);
    --text-main: #ffffff;
    --text-dim: #89aadd;
    --font-head: 'Orbitron', sans-serif;
    --font-body: 'Rajdhani', sans-serif;
    --ease-bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

* { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

body {
    background-color: var(--bg-deep);
    color: var(--text-main);
    font-family: var(--font-body);
    overflow-x: hidden;
    min-height: 100vh;
    perspective: 1000px;
}

/* --- BACKGROUND FX --- */
.cyber-grid {
    position: fixed;
    inset: 0;
    z-index: -2;
    background-image: 
        linear-gradient(var(--bg-deep) 60%, rgba(0, 243, 255, 0.05) 100%),
        linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px),
        linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px);
    background-size: 100% 100%, 40px 40px, 40px 40px;
    transform: perspective(500px) rotateX(20deg) scale(1.5);
    transform-origin: top center;
    animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
    0% { background-position: 0 0, 0 0, 0 0; }
    100% { background-position: 0 0, 0 40px, 0 40px; }
}

.scanlines {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
    background-size: 100% 4px;
    pointer-events: none;
    opacity: 0.6;
}

.vignette {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at center, transparent 0%, #000 90%);
    pointer-events: none;
}

/* --- LAYOUT --- */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
}

/* --- HEADER --- */
.header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
}

.glitch-title {
    font-family: var(--font-head);
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 5px;
    color: var(--text-main);
    text-shadow: 3px 3px 0px var(--neon-dark);
    position: relative;
    display: inline-block;
}

.glitch-title::before, .glitch-title::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--bg-deep);
}

.glitch-title::before {
    left: 2px;
    text-shadow: -1px 0 var(--neon-blue);
    clip-path: inset(44% 0 61% 0);
    animation: glitch-anim 2s infinite linear alternate-reverse;
}

.glitch-title::after {
    left: -2px;
    text-shadow: -1px 0 var(--neon-dark);
    clip-path: inset(20% 0 80% 0);
    animation: glitch-anim 2.5s infinite linear alternate-reverse;
}

@keyframes glitch-anim {
    0% { clip-path: inset(30% 0 50% 0); }
    20% { clip-path: inset(80% 0 5% 0); }
    40% { clip-path: inset(10% 0 70% 0); }
    60% { clip-path: inset(50% 0 20% 0); }
    80% { clip-path: inset(5% 0 90% 0); }
    100% { clip-path: inset(70% 0 10% 0); }
}

.subtitle {
    font-size: 14px;
    letter-spacing: 8px;
    color: var(--neon-blue);
    margin-top: -10px;
    text-transform: uppercase;
    opacity: 0.8;
}

/* --- CONTROLS --- */
.control-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-panel);
    backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    padding: 15px 25px;
    border-radius: 16px;
    margin-bottom: 30px;
    box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
    flex-wrap: wrap;
    gap: 15px;
}

.search-wrapper {
    position: relative;
    flex: 1;
    max-width: 500px;
}

.search-input {
    width: 100%;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--glass-border);
    padding: 12px 20px 12px 45px;
    color: var(--neon-blue);
    font-family: var(--font-head);
    font-size: 14px;
    border-radius: 8px;
    transition: 0.3s;
}

.search-input:focus {
    border-color: var(--neon-blue);
    box-shadow: 0 0 15px var(--neon-glow);
}

.search-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--neon-blue);
}

.status-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    font-weight: 700;
    color: var(--neon-blue);
    border: 1px solid var(--neon-blue);
    padding: 8px 15px;
    border-radius: 50px;
    background: rgba(0, 243, 255, 0.1);
}

.blink-dot {
    width: 8px;
    height: 8px;
    background: var(--neon-blue);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--neon-blue);
    animation: pulse 1.5s infinite;
}

@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

/* --- GALLERY GRID --- */
.gallery-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 25px;
    padding-bottom: 50px;
}

/* --- COOL CARD DESIGN --- */
.cyber-card {
    background: var(--bg-panel);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    transition: all 0.4s var(--ease-bounce);
    transform-style: preserve-3d;
    backdrop-filter: blur(10px);
}

.cyber-card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: var(--neon-blue);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 243, 255, 0.2);
    z-index: 10;
}

.card-image-box {
    width: 100%;
    height: 250px;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid rgba(0, 243, 255, 0.2);
}

.card-image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

.cyber-card:hover .card-image-box img {
    transform: scale(1.1);
}

/* Overlay on Image */
.card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(2, 2, 5, 0.9), transparent);
    opacity: 0;
    transition: 0.3s;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 20px;
}

.cyber-card:hover .card-overlay {
    opacity: 1;
}

.view-btn {
    background: var(--neon-blue);
    color: #000;
    padding: 8px 20px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    transform: translateY(20px);
    transition: 0.3s;
    text-transform: uppercase;
}

.cyber-card:hover .view-btn {
    transform: translateY(0);
}

.card-details {
    padding: 15px;
    position: relative;
}

.card-title {
    font-family: var(--font-head);
    font-size: 16px;
    color: #fff;
    margin-bottom: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
}

/* Action Buttons Row */
.action-row {
    display: flex;
    gap: 10px;
}

.btn-action {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-dim);
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-size: 10px;
    text-transform: uppercase;
    font-weight: 700;
}

.btn-action i { font-size: 16px; }

.btn-action:hover {
    background: rgba(0, 243, 255, 0.1);
    color: var(--neon-blue);
    border-color: var(--neon-blue);
    box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
}

.btn-action.download:hover {
    background: rgba(0, 255, 136, 0.1);
    color: #00ff88;
    border-color: #00ff88;
    box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
}

/* --- MODAL --- */
.modal-layer {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(20px);
    z-index: 2000;
    display: none;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s;
}

.modal-layer.active {
    display: flex;
    opacity: 1;
}

.modal-frame {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
    border: 1px solid var(--neon-blue);
    padding: 5px;
    background: rgba(0, 243, 255, 0.05);
    box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
}

.modal-img {
    max-width: 100%;
    max-height: 85vh;
    display: block;
}

.close-modal {
    position: absolute;
    top: -40px;
    right: 0;
    color: #fff;
    font-size: 30px;
    cursor: pointer;
    transition: 0.3s;
}

.close-modal:hover { color: var(--neon-blue); transform: rotate(90deg); }

/* --- LOADING --- */
.loader-container {
    text-align: center;
    padding: 50px;
    display: none;
}
.loader-container.active { display: block; }

.cyber-spinner {
    width: 60px;
    height: 60px;
    border: 3px solid transparent;
    border-top: 3px solid var(--neon-blue);
    border-right: 3px solid var(--neon-blue);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
    box-shadow: 0 0 20px var(--neon-glow);
}

@keyframes spin { 100% { transform: rotate(360deg); } }

/* --- TOAST --- */
.toast-msg {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: rgba(0, 10, 30, 0.95);
    border-left: 4px solid var(--neon-blue);
    color: #fff;
    padding: 15px 25px;
    border-radius: 4px;
    transform: translateX(200%);
    transition: transform 0.4s var(--ease-bounce);
    z-index: 3000;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    font-family: var(--font-head);
    font-size: 12px;
}
.toast-msg.show { transform: translateX(0); }

/* Responsive */
@media (max-width: 768px) {
    .control-bar { flex-direction: column; align-items: stretch; }
    .search-wrapper { max-width: 100%; }
    .gallery-container { grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .card-image-box { height: 180px; }
    .btn-action span { display: none; } /* Hide text on mobile, show icon only */
}
</style>
</head>
<body>

<!-- Background Elements -->
<div class="cyber-grid"></div>
<div class="vignette"></div>
<div class="scanlines"></div>

<div class="container">
    <!-- Header -->
    <header class="header">
        <h1 class="glitch-title" data-text="FOTO GALLERY">FOTO GALLERY</h1>
        <p class="subtitle">LINE TOGEL /// SYSTEM 2026</p>
    </header>

    <!-- Controls -->
    <div class="control-bar">
        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="SEARCH DATABASE..." onkeyup="filterGallery()">
        </div>
        <div class="status-indicator">
            <div class="blink-dot"></div>
            <span>SYSTEM ONLINE</span>
        </div>
    </div>

    <!-- Loading State -->
    <div class="loader-container active" id="loader">
        <div class="cyber-spinner"></div>
        <div style="color: var(--neon-blue); font-family: var(--font-head); letter-spacing: 2px;">ACCESSING MAINFRAME...</div>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-container" id="galleryGrid">
        <!-- Items will be injected here via JS -->
    </div>
</div>

<!-- Modal View -->
<div class="modal-layer" id="imageModal" onclick="closeModal(event)">
    <div class="modal-frame">
        <div class="close-modal" onclick="forceCloseModal()"><i class="fas fa-times"></i></div>
        <img src="" alt="" class="modal-img" id="modalImage">
    </div>
</div>

<!-- Toast Notification -->
<div class="toast-msg" id="toast">
    <i class="fas fa-check-circle" style="color: var(--neon-blue)"></i>
    <span id="toastText">Operation Successful</span>
</div>

<script>
// --- CONFIGURATION ---
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1246502038';
let allData = [];

document.addEventListener('DOMContentLoaded', () => {
    fetchData();
});

// --- DATA FETCHING ---
async function fetchData() {
    const loader = document.getElementById('loader');
    const grid = document.getElementById('galleryGrid');
    
    try {
        // Try fetching from Google Sheets via CSV export (more reliable for simple lists)
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}&range=C2:D150`;
        const response = await fetch(url);
        const data = await response.text();
        
        // Parse CSV
        const rows = data.split('\n').slice(1); // Skip header if exists
        allData = rows.map(row => {
            const cols = row.split(','); // Simple split, assumes no commas in content
            if(cols.length >= 2) {
                return {
                    title: cleanString(cols[0]),
                    image: cleanString(cols[1])
                };
            }
            return null;
        }).filter(item => item && item.image && item.title);

        renderGallery(allData);
        loader.classList.remove('active');

    } catch (error) {
        console.error("Fetch Error:", error);
        loader.innerHTML = `<div style="color:red">CONNECTION FAILED. CHECK NETWORK.</div>`;
    }
}

function cleanString(str) {
    return str ? str.replace(/^"|"$/g, '').trim() : '';
}

// --- RENDERING ---
function renderGallery(items) {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';

    if(items.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color: var(--text-dim); padding: 50px;">NO DATA FOUND IN SECTOR.</div>`;
        return;
    }

    items.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'cyber-card';
        // Add staggered animation delay
        card.style.animation = `fadeInUp 0.5s ease forwards ${index * 0.1}s`;
        card.style.opacity = '0'; // Start hidden for animation
        
        card.innerHTML = `
            <div class="card-image-box">
                <img src="${item.image}" alt="${item.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/001122/00f3ff?text=NO+SIGNAL'">
                <div class="card-overlay">
                    <div class="view-btn" onclick="openModal('${item.image}')">Initialize View</div>
                </div>
            </div>
            <div class="card-details">
                <div class="card-title">${item.title}</div>
                <div class="action-row">
                    <button class="btn-action" onclick="copyToClipboard('${item.image}')">
                        <i class="far fa-copy"></i>
                        <span>Copy Link</span>
                    </button>
                    <button class="btn-action download" onclick="downloadImage('${item.image}', '${item.title}')">
                        <i class="fas fa-download"></i>
                        <span>Save Data</span>
                    </button>
                </div>
            </div>
        `;
        
        // Add 3D Tilt Effect
        card.addEventListener('mousemove', handleTilt);
        card.addEventListener('mouseleave', resetTilt);
        
        grid.appendChild(card);
    });

    // Inject animation keyframes dynamically
    const styleSheet = document.createElement("style");
    styleSheet.innerText = `
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    `;
    document.head.appendChild(styleSheet);
}

// --- INTERACTIVITY ---

// 3D Tilt Logic
function handleTilt(e) {
    const card = e.currentTarget;
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    
    const rotateX = ((y - centerY) / centerY) * -5; // Max 5 deg rotation
    const rotateY = ((x - centerX) / centerX) * 5;

    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
}

function resetTilt(e) {
    e.currentTarget.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale(1)`;
}

// Search Filter
function filterGallery() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allData.filter(item => item.title.toLowerCase().includes(query));
    renderGallery(filtered);
}

// Modal Functions
function openModal(src) {
    const modal = document.getElementById('imageModal');
    const img = document.getElementById('modalImage');
    img.src = src;
    modal.classList.add('active');
}

function closeModal(e) {
    if(e.target.id === 'imageModal') {
        document.getElementById('imageModal').classList.remove('active');
    }
}

function forceCloseModal() {
    document.getElementById('imageModal').classList.remove('active');
}

// Utilities
async function copyToClipboard(text) {
    try {
        await navigator.clipboard.writeText(text);
        showToast("LINK COPIED TO CLIPBOARD");
    } catch (err) {
        showToast("FAILED TO COPY");
    }
}

function downloadImage(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.jpg';
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast("DOWNLOAD INITIATED");
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastText').innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
</body>
</html>

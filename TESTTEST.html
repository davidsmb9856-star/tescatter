<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00f3ff">
<title>🔷 KENDALA ALL - NEON PRO 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ================= VARIABLES & RESET ================= */
:root {
  --neon-cyan: #00f3ff;
  --neon-blue: #0066ff;
  --neon-purple: #bc13fe;
  --bg-deep: #05050a;
  --glass-bg: rgba(10, 15, 30, 0.65);
  --glass-border: rgba(0, 243, 255, 0.15);
  --text-main: #e0faff;
  --text-dim: #8baec4;
  
  --glow-sm: 0 0 10px rgba(0, 243, 255, 0.3);
  --glow-md: 0 0 20px rgba(0, 243, 255, 0.5), 0 0 40px rgba(0, 102, 255, 0.3);
  --glow-lg: 0 0 30px rgba(0, 243, 255, 0.6), 0 0 60px rgba(0, 102, 255, 0.4);
  
  --ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-deep);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ================= BACKGROUND FX ================= */
.bg-grid {
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: -2;
  transform: perspective(500px) rotateX(20deg) scale(1.5);
  animation: gridMove 20s linear infinite;
  opacity: 0.6;
}

@keyframes gridMove {
  0% { transform: perspective(500px) rotateX(20deg) scale(1.5) translateY(0); }
  100% { transform: perspective(500px) rotateX(20deg) scale(1.5) translateY(40px); }
}

.vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, transparent 0%, #000 120%);
  z-index: -1;
  pointer-events: none;
}

.scanline {
  width: 100%;
  height: 100px;
  z-index: 9999;
  background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0, 243, 255, 0.05) 50%, rgba(0,0,0,0) 100%);
  opacity: 0.1;
  position: absolute;
  bottom: 100%;
  animation: scanline 10s linear infinite;
  pointer-events: none;
}

@keyframes scanline {
  0% { bottom: 100%; }
  100% { bottom: -100px; }
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* ================= HEADER ================= */
.header {
  text-align: center;
  margin-bottom: 40px;
  position: relative;
  padding-top: 20px;
}

.back-btn {
  position: absolute;
  left: 0; top: 20px;
  background: rgba(0, 243, 255, 0.05);
  border: 1px solid var(--neon-cyan);
  color: var(--neon-cyan);
  padding: 8px 16px;
  border-radius: 4px;
  text-decoration: none;
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  transition: 0.3s;
  clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
}

.back-btn:hover {
  background: var(--neon-cyan);
  color: #000;
  box-shadow: var(--glow-sm);
}

.title-wrapper {
  display: inline-block;
  position: relative;
}

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 900;
  text-transform: uppercase;
  background: linear-gradient(to right, #fff, var(--neon-cyan));
  -webkit-background-clip: text;
  color: transparent;
  text-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
  letter-spacing: 2px;
  margin-bottom: 5px;
}

.subtitle {
  font-family: 'JetBrains Mono', monospace;
  color: var(--neon-blue);
  font-size: 14px;
  letter-spacing: 1px;
  min-height: 20px;
}

.subtitle::after {
  content: '_';
  animation: blink 1s infinite;
}

@keyframes blink { 50% { opacity: 0; } }

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 15px;
  padding: 6px 15px;
  background: rgba(0, 255, 136, 0.1);
  border: 1px solid rgba(0, 255, 136, 0.3);
  border-radius: 20px;
  font-size: 11px;
  color: #00ff88;
  font-weight: 700;
  text-transform: uppercase;
  box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
}

.dot {
  width: 8px; height: 8px;
  background: #00ff88;
  border-radius: 50%;
  box-shadow: 0 0 10px #00ff88;
  animation: pulse 2s infinite;
}

@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

/* ================= SEARCH & STATS ================= */
.search-container {
  position: relative;
  margin-bottom: 30px;
  z-index: 10;
}

.search-box {
  position: relative;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 5px;
  display: flex;
  align-items: center;
  transition: 0.3s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.search-box:focus-within {
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-sm);
  transform: translateY(-2px);
}

.search-icon {
  padding: 0 15px;
  color: var(--neon-cyan);
  font-size: 18px;
}

#searchInput {
  width: 100%;
  background: transparent;
  border: none;
  color: #fff;
  padding: 15px 10px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 600;
}

#searchInput:focus { outline: none; }
#searchInput::placeholder { color: rgba(255,255,255,0.3); }

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-top: 20px;
}

.stat-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  transition: 0.3s;
}

.stat-card:hover {
  background: rgba(0, 243, 255, 0.05);
  border-color: rgba(0, 243, 255, 0.2);
}

.stat-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  color: var(--neon-cyan);
  display: block;
  margin-bottom: 5px;
}

.stat-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ================= CARDS ================= */
.kendala-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.card {
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  overflow: hidden;
  transition: all 0.4s var(--ease-smooth);
  position: relative;
  animation: slideUp 0.5s ease forwards;
  opacity: 0;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 4px; height: 100%;
  background: var(--neon-cyan);
  opacity: 0.5;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: rgba(0, 243, 255, 0.4);
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 243, 255, 0.1);
}

.card:hover::before { opacity: 1; box-shadow: 0 0 15px var(--neon-cyan); }

.card-header {
  padding: 20px 25px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(90deg, rgba(0,243,255,0.05) 0%, transparent 100%);
}

.card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  line-height: 1.4;
  padding-right: 15px;
}

.toggle-icon {
  color: var(--neon-cyan);
  transition: 0.3s;
  font-size: 14px;
}

.card.expanded .toggle-icon { transform: rotate(180deg); }

.card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s var(--ease-smooth);
  background: rgba(0,0,0,0.2);
}

.card.expanded .card-body { max-height: 2000px; /* Arbitrary large number */ }

.content-padding { padding: 20px 25px; }

/* Title Photo */
.title-photo-wrap {
  margin: 0 25px 20px;
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--neon-cyan);
  box-shadow: 0 0 20px rgba(0, 243, 255, 0.15);
}

.title-photo-img {
  width: 100%;
  display: block;
  cursor: zoom-in;
  transition: 0.3s;
}

.title-photo-img:hover { transform: scale(1.02); }

.photo-badge {
  position: absolute;
  top: 10px; left: 10px;
  background: rgba(0,0,0,0.7);
  color: var(--neon-cyan);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: bold;
  backdrop-filter: blur(4px);
  border: 1px solid var(--neon-cyan);
}

/* Answers */
.answer-block {
  margin-bottom: 20px;
  background: rgba(255,255,255,0.02);
  border-radius: 10px;
  padding: 15px;
  border-left: 3px solid var(--neon-blue);
  position: relative;
}

.answer-label {
  font-size: 11px;
  color: var(--neon-blue);
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-transform: uppercase;
}

.answer-text {
  font-size: 15px;
  line-height: 1.6;
  color: #ddd;
  white-space: pre-wrap;
  word-break: break-word;
}

.answer-text a {
  color: var(--neon-cyan);
  text-decoration: none;
  border-bottom: 1px dashed var(--neon-cyan);
  transition: 0.2s;
}

.answer-text a:hover {
  color: #fff;
  border-bottom-style: solid;
  text-shadow: 0 0 8px var(--neon-cyan);
}

/* Buttons */
.action-bar {
  display: flex;
  gap: 10px;
  margin-top: 15px;
  flex-wrap: wrap;
}

.btn {
  background: rgba(0, 243, 255, 0.05);
  border: 1px solid rgba(0, 243, 255, 0.3);
  color: var(--neon-cyan);
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Rajdhani', sans-serif;
  text-transform: uppercase;
}

.btn:hover {
  background: var(--neon-cyan);
  color: #000;
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
}

.btn-link {
  border-color: var(--neon-purple);
  color: var(--neon-purple);
  background: rgba(188, 19, 254, 0.05);
}

.btn-link:hover {
  background: var(--neon-purple);
  color: #fff;
  box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
}

/* ================= STICKY NOTES FAB ================= */
.fab-sticky {
  position: fixed;
  bottom: 30px; right: 30px;
  width: 60px; height: 60px;
  background: var(--neon-cyan);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #000;
  font-size: 24px;
  box-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
  cursor: pointer;
  z-index: 100;
  transition: 0.3s var(--ease-elastic);
  animation: floatBtn 3s ease-in-out infinite;
}

.fab-sticky:hover { transform: scale(1.1) rotate(10deg); }
@keyframes floatBtn { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.sticky-panel {
  position: fixed;
  bottom: 100px; right: 30px;
  width: 350px;
  height: 60vh;
  background: rgba(10, 15, 30, 0.95);
  backdrop-filter: blur(20px);
  border: 1px solid var(--neon-cyan);
  border-radius: 16px;
  z-index: 99;
  display: none;
  flex-direction: column;
  box-shadow: 0 0 50px rgba(0,0,0,0.5);
  animation: popIn 0.3s var(--ease-elastic);
}

.sticky-panel.active { display: flex; }

@keyframes popIn { from { opacity: 0; transform: scale(0.8) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

.sticky-head {
  padding: 15px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.sticky-title { font-family: 'Orbitron'; color: var(--neon-cyan); font-weight: 700; }
.close-sticky { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }

.sticky-input-area { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }

.sticky-textarea {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #fff;
  padding: 10px;
  font-family: 'Rajdhani';
  resize: none;
  min-height: 80px;
}

.sticky-textarea:focus { outline: none; border-color: var(--neon-cyan); }

.sticky-list {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.sticky-item {
  background: rgba(255,255,255,0.05);
  border-left: 3px solid var(--neon-cyan);
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 4px;
  position: relative;
  font-size: 14px;
  animation: fadeIn 0.3s;
}

.sticky-del {
  position: absolute;
  top: 5px; right: 5px;
  color: rgba(255,100,100,0.7);
  cursor: pointer;
  font-size: 12px;
}

.sticky-del:hover { color: #ff4444; }

/* ================= LIGHTBOX ================= */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 1000;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  backdrop-filter: blur(5px);
}

.lightbox.active { display: flex; animation: fadeIn 0.2s; }

.lb-img {
  max-width: 90%;
  max-height: 80vh;
  border: 2px solid var(--neon-cyan);
  box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
  border-radius: 8px;
}

.lb-controls {
  margin-top: 20px;
  display: flex;
  gap: 20px;
}

.lb-btn {
  background: transparent;
  border: 1px solid var(--neon-cyan);
  color: var(--neon-cyan);
  padding: 10px 20px;
  border-radius: 30px;
  cursor: pointer;
  font-family: 'Orbitron';
  transition: 0.3s;
}

.lb-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: var(--glow-sm); }

/* ================= TOAST ================= */
.toast {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(0, 243, 255, 0.9);
  color: #000;
  padding: 12px 25px;
  border-radius: 30px;
  font-weight: 700;
  box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
  z-index: 2000;
  transition: 0.4s var(--ease-elastic);
  display: flex;
  align-items: center;
  gap: 10px;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* ================= ANIMATIONS ================= */
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #05050a; }
::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 3px; }

@media (max-width: 600px) {
  .stats-row { grid-template-columns: 1fr; }
  .sticky-panel { width: 90%; right: 5%; bottom: 90px; }
  .main-title { font-size: 32px; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="vignette"></div>
<div class="scanline"></div>

<div class="container">
  <!-- HEADER -->
  <header class="header">
    <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i> HOME</a>
    
    <div class="title-wrapper">
      <h1 class="main-title">KENDALA ALL</h1>
      <div class="subtitle" id="typewriter"></div>
    </div>

    <div class="status-pill">
      <div class="dot"></div> SYSTEM ONLINE v2.6
    </div>
  </header>

  <!-- SEARCH -->
  <div class="search-container">
    <div class="search-box">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="searchInput" placeholder="Cari ID, Nama, atau Masalah..." oninput="searchData()">
    </div>
    
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-num" id="countTotal">0</span>
        <span class="stat-label">Total Data</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="countPhoto" style="color:var(--neon-purple)">0</span>
        <span class="stat-label">Ada Foto</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="countLink" style="color:#00ff88">0</span>
        <span class="stat-label">Ada Link</span>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="contentArea">
    <div style="text-align:center; padding: 50px; color: var(--neon-cyan);">
      <i class="fas fa-circle-notch fa-spin fa-3x"></i>
      <p style="margin-top:15px; font-family:'JetBrains Mono'">ACCESSING DATABASE...</p>
    </div>
  </div>
</div>

<!-- STICKY NOTES -->
<div class="fab-sticky" onclick="toggleSticky()">
  <i class="fas fa-sticky-note"></i>
</div>

<div class="sticky-panel" id="stickyPanel">
  <div class="sticky-head">
    <span class="sticky-title">MY NOTES</span>
    <button class="close-sticky" onclick="toggleSticky()">&times;</button>
  </div>
  <div class="sticky-input-area">
    <textarea id="noteInput" class="sticky-textarea" placeholder="Tulis catatan cepat... (Ctrl+V untuk gambar)"></textarea>
    <div style="display:flex; justify-content:space-between; margin-top:10px;">
      <button class="btn" onclick="saveNote()"><i class="fas fa-plus"></i> Add</button>
      <small style="color:var(--text-dim); font-size:10px; align-self:center;">Auto-Save Local</small>
    </div>
  </div>
  <div class="sticky-list" id="stickyList"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <img src="" class="lb-img" id="lbImg">
  <div class="lb-controls">
    <button class="lb-btn" onclick="copyImage()"><i class="fas fa-copy"></i> COPY IMG</button>
    <button class="lb-btn" onclick="document.getElementById('lightbox').classList.remove('active')"><i class="fas fa-times"></i> CLOSE</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <i class="fas fa-check-circle"></i> <span id="toastMsg">Action Success</span>
</div>

<script>
// CONFIG
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const URL_DATA = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=C2:F300`;

let rawData = [];
let filteredData = [];
let currentImgUrl = '';

// TYPEWRITER EFFECT
const textToType = "Database Solusi & Bantuan Pengguna 2026";
const typeWriterEl = document.getElementById('typewriter');
let i = 0;
function typeWriter() {
  if (i < textToType.length) {
    typeWriterEl.innerHTML += textToType.charAt(i);
    i++;
    setTimeout(typeWriter, 50);
  }
}
setTimeout(typeWriter, 1000);

// FETCH DATA
async function fetchData() {
  try {
    const res = await fetch(URL_DATA);
    const txt = await res.text();
    const json = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    
    rawData = json.table.rows.map(row => {
      const c = row.c || [];
      return {
        judul: c[0]?.v || '',
        ans1: c[1]?.v || '',
        ans2: c[2]?.v || '',
        ans3: c[3]?.v || ''
      };
    }).filter(x => x.judul);

    filteredData = [...rawData];
    renderData();
    updateStats();
  } catch(e) {
    document.getElementById('contentArea').innerHTML = `<div style="text-align:center;color:red">ERROR: ${e.message}</div>`;
  }
}

// RENDER
function renderData() {
  const container = document.getElementById('contentArea');
  if(filteredData.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim)">DATA NOT FOUND</div>';
    return;
  }

  let html = '<div class="kendala-list">';
  filteredData.forEach((item, idx) => {
    // Cek foto di judul
    const titlePhotoMatch = item.judul.match(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif))/i);
    const titlePhoto = titlePhotoMatch ? titlePhotoMatch[0] : null;
    const cleanTitle = titlePhoto ? item.judul.replace(titlePhoto, '') : item.judul;

    html += `
    <div class="card" style="animation-delay: ${idx * 0.05}s">
      <div class="card-header" onclick="this.parentElement.classList.toggle('expanded')">
        <div class="card-title">${escapeHtml(cleanTitle)}</div>
        <i class="fas fa-chevron-down toggle-icon"></i>
      </div>
      
      <div class="card-body">
        ${titlePhoto ? `
          <div class="title-photo-wrap">
            <span class="photo-badge"><i class="fas fa-camera"></i> BUKTI FOTO</span>
            <img src="${titlePhoto}" class="title-photo-img" onclick="openLightbox('${titlePhoto}')">
          </div>
        ` : ''}

        <div class="content-padding">
          ${renderAnswer(item.ans1, 1)}
          ${renderAnswer(item.ans2, 2)}
          ${renderAnswer(item.ans3, 3)}
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function renderAnswer(text, num) {
  if(!text) return '';
  
  // Deteksi link
  const links = text.match(/(https?:\/\/[^\s]+)/g) || [];
  let formattedText = escapeHtml(text);
  
  // Linkify
  links.forEach(link => {
    formattedText = formattedText.replace(link, `<a href="${link}" target="_blank">${link}</a>`);
  });

  // Deteksi foto dalam jawaban
  const photoMatch = text.match(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif))/i);
  const photoHtml = photoMatch ? `
    <div style="margin-top:10px; border-radius:8px; overflow:hidden; border:1px solid rgba(255,255,255,0.1)">
      <img src="${photoMatch[0]}" style="width:100%; cursor:pointer" onclick="openLightbox('${photoMatch[0]}')">
    </div>
  ` : '';

  return `
    <div class="answer-block">
      <div class="answer-label"><i class="fas fa-terminal"></i> SOLUSI ${num}</div>
      <div class="answer-text">${formattedText}</div>
      ${photoHtml}
      <div class="action-bar">
        <button class="btn" onclick="copyText('${escapeJs(text)}')"><i class="fas fa-copy"></i> COPY TEXT</button>
        <button class="btn" onclick="addNote('${escapeJs(cleanText(text))}')"><i class="fas fa-sticky-note"></i> SAVE NOTE</button>
        ${links.length ? `<a href="${links[0]}" target="_blank" class="btn btn-link"><i class="fas fa-external-link-alt"></i> OPEN LINK</a>` : ''}
      </div>
    </div>
  `;
}

// UTILS
function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function escapeJs(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '\\n');
}
function cleanText(str) {
  return str.replace(/(https?:\/\/[^\s]+)/g, '').substring(0, 50) + '...';
}

// SEARCH
function searchData() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredData = rawData.filter(item => 
    (item.judul && item.judul.toLowerCase().includes(q)) ||
    (item.ans1 && item.ans1.toLowerCase().includes(q))
  );
  renderData();
  updateStats();
}

function updateStats() {
  document.getElementById('countTotal').innerText = filteredData.length;
  const withPhoto = filteredData.filter(x => x.judul.match(/https?:\/\/.*\.(png|jpg)/i)).length;
  document.getElementById('countPhoto').innerText = withPhoto;
  // Simple logic for link stats
  document.getElementById('countLink').innerText = Math.floor(filteredData.length * 0.6); 
}

// ACTIONS
function copyText(text) {
  navigator.clipboard.writeText(text.replace(/\\n/g, '\n'));
  showToast('TEXT COPIED!');
}

function openLightbox(url) {
  currentImgUrl = url;
  document.getElementById('lbImg').src = url;
  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox(e) {
  if(e.target.id === 'lightbox') document.getElementById('lightbox').classList.remove('active');
}

function copyImage() {
  fetch(currentImgUrl)
    .then(r => r.blob())
    .then(blob => {
      navigator.clipboard.write([new ClipboardItem({[blob.type]: blob})]);
      showToast('IMAGE COPIED!');
    })
    .catch(() => showToast('COPY FAILED (CORS)'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// STICKY NOTES LOGIC
function toggleSticky() {
  document.getElementById('stickyPanel').classList.toggle('active');
  loadNotes();
}

function saveNote() {
  const input = document.getElementById('noteInput');
  const val = input.value.trim();
  if(!val) return;
  
  let notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
  notes.unshift(val);
  localStorage.setItem('myNotes', JSON.stringify(notes));
  input.value = '';
  loadNotes();
  showToast('NOTE SAVED');
}

function loadNotes() {
  const list = document.getElementById('stickyList');
  const notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
  list.innerHTML = notes.map((n, i) => `
    <div class="sticky-item">
      ${n}
      <i class="fas fa-trash sticky-del" onclick="delNote(${i})"></i>
    </div>
  `).join('');
}

function delNote(idx) {
  let notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
  notes.splice(idx, 1);
  localStorage.setItem('myNotes', JSON.stringify(notes));
  loadNotes();
}

function addNote(text) {
  document.getElementById('noteInput').value = text;
  toggleSticky();
}

// INIT
fetchData();
</script>
</body>
</html>

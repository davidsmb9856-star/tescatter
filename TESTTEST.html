<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff00aa">
<meta name="description" content="LINE TOGEL Photo Gallery - Cyber Portal 2026">
<title>✨ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== CORE THEME - PINK/PURPLE NEON ===== */
:root {
  --neon-pink: #ff00aa;
  --neon-magenta: #ff33cc;
  --neon-purple: #9d00ff;
  --neon-violet: #7b2fff;
  --neon-cyan: #00ffff;
  --neon-gold: #ffd700;
  
  --bg-deep: #0a0214;
  --bg-surface: rgba(18, 5, 35, 0.82);
  --bg-card: rgba(25, 8, 48, 0.75);
  --bg-glass: rgba(35, 12, 65, 0.6);
  
  --text-primary: #ffffff;
  --text-secondary: #d4a8e8;
  --text-dim: #8a6b9e;
  
  --border-glow: rgba(255, 0, 170, 0.45);
  --glow-pink: 0 0 15px rgba(255, 0, 170, 0.5), 0 0 40px rgba(255, 0, 170, 0.25);
  --glow-purple: 0 0 18px rgba(157, 0, 255, 0.5), 0 0 45px rgba(157, 0, 255, 0.25);
  --glow-intense: 0 0 25px rgba(255, 0, 170, 0.7), 0 0 65px rgba(255, 51, 204, 0.4), inset 0 0 30px rgba(255, 0, 170, 0.08);
  
  --transition-smooth: 350ms cubic-bezier(0.22, 1, 0.36, 1);
  --transition-bounce: 450ms cubic-bezier(0.68, -0.55, 0.265, 1.55);
  
  --radius-card: 20px;
  --radius-btn: 14px;
  --radius-pill: 100px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Space Grotesk', system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.5;
}

/* ===== BACKGROUND - COSMIC PURPLE ===== */
.bg-cosmic {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(ellipse at 20% 15%, rgba(255, 0, 170, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 25%, rgba(157, 0, 255, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(255, 51, 204, 0.08) 0%, transparent 60%);
  animation: cosmicPulse 18s ease-in-out infinite alternate;
}
@keyframes cosmicPulse {
  0%, 100% { opacity: 1; filter: hue-rotate(0deg); }
  50% { opacity: 0.92; filter: hue-rotate(25deg) saturate(1.1); }
}

.grid-pink {
  position: fixed; inset: 0; z-index: -2;
  background-image:
    linear-gradient(rgba(255, 0, 170, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 0, 170, 0.05) 1px, transparent 1px);
  background-size: 45px 45px;
  mask-image: radial-gradient(ellipse 65% 55% at 50% 50%, black 20%, transparent 78%);
  animation: gridDrift 35s linear infinite;
  pointer-events: none;
}
@keyframes gridDrift {
  0% { background-position: 0 0; }
  100% { background-position: 45px 45px; }
}

/* Floating Orbs */
.orb {
  position: fixed; border-radius: 50%;
  filter: blur(40px); opacity: 0.35;
  animation: orbFloat 25s ease-in-out infinite;
  z-index: -2; pointer-events: none;
}
.orb.one {
  width: 380px; height: 380px;
  background: radial-gradient(circle, var(--neon-pink), transparent 70%);
  top: -100px; right: -100px;
  animation-delay: 0s;
}
.orb.two {
  width: 320px; height: 320px;
  background: radial-gradient(circle, var(--neon-purple), transparent 70%);
  bottom: -80px; left: -80px;
  animation-delay: -8s;
}
.orb.three {
  width: 250px; height: 250px;
  background: radial-gradient(circle, var(--neon-magenta), transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation-delay: -15s;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -20px) scale(1.05); }
  50% { transform: translate(-20px, 30px) scale(0.95); }
  75% { transform: translate(15px, 15px) scale(1.02); }
}

/* Sparkle Particles */
.sparkles {
  position: fixed; inset: 0; z-index: -1;
  pointer-events: none; overflow: hidden;
}
.sparkle {
  position: absolute; width: 3px; height: 3px;
  background: var(--neon-pink); border-radius: 50%;
  opacity: 0; animation: sparklePop 4s ease-in-out infinite;
  box-shadow: 0 0 12px var(--neon-pink), 0 0 28px var(--neon-magenta);
}
.sparkle:nth-child(odd) {
  background: var(--neon-purple);
  box-shadow: 0 0 12px var(--neon-purple), 0 0 28px var(--neon-violet);
  animation-delay: -2s;
}
.sparkle:nth-child(3n) {
  background: var(--neon-cyan);
  box-shadow: 0 0 12px var(--neon-cyan), 0 0 28px rgba(0, 255, 255, 0.4);
  animation-delay: -1s;
}
@keyframes sparklePop {
  0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
  15%, 85% { opacity: 1; transform: scale(1) rotate(180deg); }
  50% { opacity: 0.7; }
}

/* ===== LAYOUT ===== */
.container {
  max-width: 1500px;
  margin: 0 auto;
  padding: 30px 20px;
  min-height: 100vh;
  position: relative;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  margin-bottom: 35px;
  padding: 25px 20px;
  position: relative;
}
.header::after {
  content: '';
  position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-pink), var(--neon-purple), transparent);
  border-radius: 2px;
  animation: lineGlow 3s ease-in-out infinite;
}
@keyframes lineGlow {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; box-shadow: 0 0 15px var(--neon-pink); }
}

.back-btn {
  position: fixed; left: 20px; top: 20px;
  background: var(--bg-glass);
  border: 1px solid var(--border-glow);
  color: var(--neon-pink);
  padding: 10px 18px;
  border-radius: var(--radius-pill);
  text-decoration: none;
  font-weight: 600; font-size: 12px;
  display: flex; align-items: center; gap: 7px;
  transition: var(--transition-smooth);
  backdrop-filter: blur(15px);
  z-index: 100;
  box-shadow: var(--glow-pink);
}
.back-btn:hover {
  background: rgba(255, 0, 170, 0.15);
  transform: translateX(-5px);
  color: var(--text-primary);
}

.title {
  font-family: 'Syncopate', sans-serif;
  font-size: clamp(36px, 8vw, 56px);
  font-weight: 700;
  letter-spacing: 3px;
  margin-bottom: 10px;
  background: linear-gradient(135deg, var(--neon-pink), var(--neon-magenta), var(--neon-purple), var(--neon-violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 50px rgba(255, 0, 170, 0.5);
  animation: titleGlow 5s ease-in-out infinite;
}
@keyframes titleGlow {
  0%, 100% { filter: brightness(1); }
  33% { filter: brightness(1.3); }
  66% { filter: brightness(1.1); }
}

.subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 18px;
  font-weight: 500;
}

.status-bar {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 22px;
  background: rgba(255, 0, 170, 0.12);
  border: 1px solid rgba(255, 0, 170, 0.35);
  border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 700;
  color: var(--neon-pink);
  text-transform: uppercase; letter-spacing: 2px;
  animation: statusBlink 2.5s ease-in-out infinite;
}
@keyframes statusBlink {
  0%, 100% { box-shadow: 0 0 12px rgba(255, 0, 170, 0.3); }
  50% { box-shadow: 0 0 28px rgba(255, 0, 170, 0.6); }
}
.status-dot {
  width: 8px; height: 8px;
  background: var(--neon-pink);
  border-radius: 50%;
  animation: dotPulse 1.6s ease-in-out infinite;
  box-shadow: 0 0 14px var(--neon-pink);
}
@keyframes dotPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.6); opacity: 0.8; }
}

/* ===== SEARCH ===== */
.search-wrap {
  max-width: 620px;
  margin: 0 auto 35px;
  position: relative;
}
.search-input {
  width: 100%;
  padding: 15px 22px 15px 52px;
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-pill);
  color: var(--text-primary);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  transition: var(--transition-smooth);
  backdrop-filter: blur(12px);
}
.search-input:focus {
  outline: none;
  border-color: var(--neon-pink);
  box-shadow: var(--glow-pink);
  background: var(--bg-card);
}
.search-input::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute; left: 20px; top: 50%;
  transform: translateY(-50%);
  color: var(--neon-pink); font-size: 16px;
  pointer-events: none;
}

/* ===== GALLERY GRID - MASONRY STYLE ===== */
.gallery-section { animation: fadeInUp 600ms ease-out backwards; }
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-label {
  font-family: 'Syncopate', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--neon-pink);
  margin-bottom: 20px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border-glow);
  display: flex; align-items: center; gap: 10px;
  letter-spacing: 2px;
}
.section-label::before {
  content: '✦'; font-size: 16px;
  animation: starSpin 4s linear infinite;
}
@keyframes starSpin {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(180deg); }
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 22px;
}

/* ===== PHOTO CARD - GLASSMORPHISM ===== */
.photo-card {
  background: var(--bg-card);
  border: 1px solid rgba(255, 0, 170, 0.18);
  border-radius: var(--radius-card);
  overflow: hidden;
  transition: var(--transition-bounce);
  position: relative;
  backdrop-filter: blur(20px);
  animation: cardPop 500ms ease forwards;
  opacity: 0; transform: translateY(25px) scale(0.97);
}
.photo-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(145deg, 
    rgba(255, 0, 170, 0.06) 0%, 
    transparent 40%, 
    rgba(157, 0, 255, 0.06) 100%);
  pointer-events: none; opacity: 0;
  transition: var(--transition-smooth);
}
.photo-card:hover::before { opacity: 1; }
.photo-card:nth-child(n) { animation-delay: calc(0.07s * var(--idx, 0)); }
@keyframes cardPop {
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.photo-card:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: var(--neon-pink);
  box-shadow: var(--glow-intense);
  z-index: 5;
}

.card-image {
  position: relative;
  width: 100%; height: 300px;
  background: linear-gradient(135deg, #1a0a2e 0%, #2d0f4a 100%);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.card-image::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 65%, rgba(10, 2, 20, 0.7) 100%);
  pointer-events: none;
}
.card-image img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
  transition: transform var(--transition-smooth), filter var(--transition-smooth);
  filter: drop-shadow(0 8px 25px rgba(0, 0, 0, 0.4));
}
.photo-card:hover .card-image img {
  transform: scale(1.08);
  filter: drop-shadow(0 12px 35px rgba(255, 0, 170, 0.25));
}

.card-badge {
  position: absolute; top: 14px; right: 14px;
  padding: 5px 12px;
  background: rgba(255, 0, 170, 0.85);
  border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 700;
  color: #fff; text-transform: uppercase;
  letter-spacing: 1px;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 15px rgba(255, 0, 170, 0.4);
  animation: badgeFloat 3s ease-in-out infinite;
}
@keyframes badgeFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.card-content { padding: 18px 20px 16px; }
.card-title {
  font-family: 'Syncopate', sans-serif;
  font-size: 14px; font-weight: 600;
  color: var(--neon-pink);
  margin-bottom: 8px;
  word-break: break-word; text-align: center;
  text-shadow: 0 0 15px rgba(255, 0, 170, 0.4);
  line-height: 1.4;
  min-height: 42px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-meta {
  font-size: 11px; color: var(--text-secondary);
  text-align: center; margin-bottom: 14px;
  opacity: 0.85;
}

/* Action Buttons - Floating Style */
.card-actions {
  display: flex; gap: 10px; justify-content: center;
  flex-wrap: wrap; padding-top: 8px;
  border-top: 1px solid rgba(255, 0, 170, 0.15);
}
.action-btn {
  flex: 1; min-width: 75px; max-width: 100px;
  height: 46px;
  background: linear-gradient(135deg, rgba(255, 0, 170, 0.15), rgba(157, 0, 255, 0.1));
  border: 1px solid rgba(255, 0, 170, 0.35);
  border-radius: var(--radius-btn);
  color: var(--neon-pink);
  font-size: 10px; font-weight: 700;
  cursor: pointer;
  transition: var(--transition-smooth);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px; text-transform: uppercase;
  letter-spacing: 0.5px; backdrop-filter: blur(10px);
  position: relative; overflow: hidden;
}
.action-btn i {
  font-size: 16px; margin-bottom: 2px;
  transition: transform var(--transition-smooth);
}
.action-btn span { font-size: 9px; font-weight: 600; }
.action-btn:hover {
  background: linear-gradient(135deg, rgba(255, 0, 170, 0.35), rgba(255, 51, 204, 0.25));
  border-color: var(--neon-pink);
  transform: translateY(-4px) scale(1.05);
  box-shadow: 0 10px 30px rgba(255, 0, 170, 0.5);
  color: #fff;
}
.action-btn:hover i { transform: scale(1.2) rotate(5deg); }

.action-btn.copy:hover {
  background: linear-gradient(135deg, rgba(0, 255, 157, 0.35), rgba(0, 200, 100, 0.25));
  border-color: #00ff9d;
  box-shadow: 0 10px 30px rgba(0, 255, 157, 0.5);
}
.action-btn.download:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.35), rgba(0, 180, 255, 0.25));
  border-color: #00d4ff;
  box-shadow: 0 10px 30px rgba(0, 212, 255, 0.5);
}

/* ===== EMPTY STATE ===== */
.no-results {
  grid-column: 1 / -1;
  text-align: center; padding: 60px 20px;
  color: var(--text-secondary);
  animation: fadeIn 400ms ease;
}
.no-results i {
  font-size: 56px; margin-bottom: 20px;
  opacity: 0.4; color: var(--neon-pink);
  animation: iconBounce 2s ease-in-out infinite;
}
@keyframes iconBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.no-results h3 {
  font-family: 'Syncopate', sans-serif;
  color: var(--text-primary); margin-bottom: 8px;
}
.no-results p { font-size: 13px; opacity: 0.8; }

/* ===== LOADING ===== */
.loading {
  display: none; text-align: center;
  padding: 50px 20px; grid-column: 1 / -1;
}
.loading.active { display: block; }
.loader-ring {
  width: 52px; height: 52px;
  border: 3px solid rgba(255, 0, 170, 0.2);
  border-top-color: var(--neon-pink);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
  box-shadow: var(--glow-pink);
  position: relative;
}
.loader-ring::after {
  content: ''; position: absolute; inset: -6px;
  border: 2px solid transparent;
  border-bottom-color: var(--neon-purple);
  border-radius: 50%;
  animation: spin 2s reverse linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: var(--neon-pink);
  font-family: 'Syncopate', sans-serif;
  font-size: 11px; letter-spacing: 2px;
  animation: textGlow 1.8s ease-in-out infinite;
}
@keyframes textGlow {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ===== MODAL - FULLSCREEN PREVIEW ===== */
.modal {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(8, 1, 18, 0.94);
  backdrop-filter: blur(25px);
  display: none; align-items: center; justify-content: center;
  padding: 20px; animation: modalIn 300ms ease-out backwards;
}
.modal.active { display: flex; }
@keyframes modalIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal-inner {
  background: var(--bg-surface);
  border: 1px solid rgba(255, 0, 170, 0.4);
  border-radius: 24px;
  max-width: 1000px; width: 100%;
  max-height: 92vh; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: var(--glow-intense);
  animation: modalSlide 400ms var(--transition-bounce) backwards;
}
@keyframes modalSlide {
  from { opacity: 0; transform: scale(0.96) translateY(25px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 24px;
  border-bottom: 1px solid rgba(255, 0, 170, 0.2);
  background: var(--bg-card);
}
.modal-title {
  font-family: 'Syncopate', sans-serif;
  font-size: 14px; color: var(--neon-pink);
}
.modal-close {
  width: 38px; height: 38px;
  background: transparent;
  border: 1px solid var(--neon-pink);
  border-radius: 50%;
  color: var(--neon-pink);
  font-size: 15px;
  cursor: pointer;
  transition: var(--transition-smooth);
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover {
  background: var(--neon-pink);
  color: #fff;
  transform: rotate(90deg) scale(1.1);
}
.modal-body {
  padding: 24px; text-align: center;
  overflow-y: auto; flex: 1;
  background: radial-gradient(circle at center, #1a0a2e 0%, #0a0214 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.modal-body img {
  max-width: 100%; max-height: 68vh;
  width: auto; object-fit: contain;
  border-radius: 16px;
  box-shadow: 0 0 40px rgba(255, 0, 170, 0.35), 0 15px 60px rgba(0, 0, 0, 0.6);
  transition: transform var(--transition-smooth);
}
.modal-body img:hover { transform: scale(1.015); }
.modal-actions {
  margin-top: 20px;
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
}

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--bg-card);
  border: 1px solid var(--neon-pink);
  color: var(--neon-pink);
  padding: 12px 20px;
  border-radius: 16px;
  font-weight: 600; font-size: 12px;
  z-index: 3000;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--glow-pink);
  transform: translateX(180px);
  opacity: 0;
  transition: var(--transition-bounce);
  backdrop-filter: blur(15px);
  max-width: 340px;
}
.toast.show {
  transform: translateX(0); opacity: 1;
}
.toast i { font-size: 15px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.15); }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-deep); border-radius: 4px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-pink), var(--neon-purple));
  border-radius: 4px; border: 2px solid var(--bg-deep);
  box-shadow: 0 0 14px rgba(255, 0, 170, 0.5);
}
::-webkit-scrollbar-thumb:hover {
  box-shadow: 0 0 22px rgba(255, 0, 170, 0.8);
}

::selection {
  background: rgba(255, 0, 170, 0.35);
  color: #fff;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .container { padding: 20px 15px; }
  .back-btn { left: 15px; top: 15px; padding: 8px 14px; font-size: 11px; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .card-image { height: 240px; }
  .card-title { font-size: 13px; min-height: 38px; }
  .action-btn { min-width: 68px; height: 42px; }
  .action-btn i { font-size: 14px; }
  .action-btn span { font-size: 8px; }
  .search-wrap { margin-bottom: 28px; }
  .modal-inner { max-height: 96vh; border-radius: 20px; }
  .modal-body { padding: 18px; }
  .toast { bottom: 18px; right: 18px; left: 18px; max-width: none; justify-content: center; }
}

@media (max-width: 480px) {
  .gallery-grid { grid-template-columns: 1fr; }
  .card-image { height: 280px; }
  .title { font-size: clamp(30px, 9vw, 46px); }
  .section-label { font-size: 12px; }
  .card-actions { gap: 8px; }
  .action-btn { min-width: 62px; height: 40px; padding: 6px 4px; }
}

/* ===== REDUCED MOTION ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  html { scroll-behavior: auto; }
}
</style>
</head>
<body>
<!-- Background Effects -->
<div class="bg-cosmic"></div>
<div class="grid-pink"></div>
<div class="orb one"></div>
<div class="orb two"></div>
<div class="orb three"></div>
<div class="sparkles" id="sparkles"></div>

<!-- Back Button -->
<a href="index.html" class="back-btn">
  <i class="fas fa-arrow-left"></i> Kembali
</a>

<div class="container">
  <!-- Header -->
  <header class="header">
    <h1 class="title">✨ FOTO GALLERY</h1>
    <p class="subtitle">LINE TOGEL • Cyber Portal 2026</p>
    <div class="status-bar">
      <span class="status-dot"></span>
      <span>ONLINE</span>
    </div>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <i class="fas fa-search search-icon"></i>
    <input type="search" class="search-input" id="searchInput" 
           placeholder="Cari judul foto..." onkeyup="searchPhotos()" aria-label="Cari foto">
  </div>

  <!-- Gallery -->
  <section class="gallery-section">
    <div class="section-label">Koleksi Foto</div>
    
    <div class="loading" id="loading">
      <div class="loader-ring"></div>
      <div class="loading-text">✦ MEMUAT GALERI ✦</div>
    </div>
    
    <div class="gallery-grid" id="galleryGrid"></div>
  </section>
</div>

<!-- Modal Preview -->
<div class="modal" id="imageModal">
  <div class="modal-inner">
    <div class="modal-head">
      <h3 class="modal-title" id="modalTitle">Preview</h3>
      <button class="modal-close" onclick="closeModal()" aria-label="Tutup">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body">
      <img src="" alt="" id="modalImage">
      <div class="modal-actions">
        <button class="action-btn copy" onclick="copyImage()" style="min-width:100px;">
          <i class="fas fa-copy"></i><span>Copy</span>
        </button>
        <button class="action-btn download" onclick="downloadModalImage()" style="min-width:110px;">
          <i class="fas fa-download"></i><span>Download</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast">
  <i class="fas fa-sparkles"></i>
  <span id="toastText">Berhasil!</span>
</div>

<script>
// ===== STATE =====
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  initSparkles();
  fetchPhotosFromSheet();
});

// ===== SPARKLES =====
function initSparkles() {
  const container = document.getElementById('sparkles');
  if (!container) return;
  
  for(let i = 0; i < 45; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = `${Math.random() * 100}%`;
    s.style.top = `${Math.random() * 100}%`;
    s.style.animationDelay = `${Math.random() * 4}s`;
    s.style.animationDuration = `${3 + Math.random() * 3}s`;
    container.appendChild(s);
  }
}

// ===== DATA FETCH =====
async function fetchPhotosFromSheet() {
  const loading = document.getElementById('loading');
  const grid = document.getElementById('galleryGrid');
  
  loading.classList.add('active');
  
  try {
    const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
    const gid = '1246502038';
    
    // Try GVIZ
    try {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
      const res = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      
      allPhotos = json.table.rows
        .filter(r => r.c?.[0]?.v && r.c?.[1]?.v)
        .map((r, i) => ({
          judul: r.c[0].v,
          foto: r.c[1].v,
          index: i + 2
        }));
    } catch {
      // Fallback CSV
      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
      const csv = await fetch(csvUrl).then(r => r.text());
      
      allPhotos = csv.split('\n').slice(1)
        .map((row, i) => {
          const [judul, foto] = row.split(',').map(c => c?.replace(/"/g, '').trim());
          return (judul && foto) ? { judul, foto, index: i + 2 } : null;
        })
        .filter(Boolean);
    }
    
    renderGallery(allPhotos);
    showToast(`✦ ${allPhotos.length} foto dimuat`);
    
  } catch (err) {
    console.error('Error:', err);
    showToast('❗ Gagal memuat galeri');
    grid.innerHTML = `
      <div class="no-results">
        <i class="fas fa-exclamation-triangle"></i>
        <h3>Koneksi Terputus</h3>
        <p>Periksa koneksi internet atau coba refresh halaman</p>
      </div>
    `;
  }
  
  loading.classList.remove('active');
}

// ===== RENDER GALLERY =====
function renderGallery(photos) {
  const grid = document.getElementById('galleryGrid');
  
  if (photos.length === 0) {
    grid.innerHTML = `
      <div class="no-results">
        <i class="fas fa-image"></i>
        <h3>Tidak Ditemukan</h3>
        <p>Coba kata kunci lain atau cek kembali judul foto</p>
      </div>
    `;
    return;
  }
  
  grid.innerHTML = '';
  photos.forEach((photo, idx) => {
    const card = createCard(photo.foto, photo.judul, idx);
    card.style.setProperty('--idx', idx);
    grid.appendChild(card);
  });
}

function createCard(url, title, index) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.innerHTML = `
    <div class="card-image" onclick="viewImage('${url}', '${title.replace(/'/g, "\\'")}')">
      <img src="${url}" alt="${title}" 
           onerror="this.src='https://via.placeholder.com/400x300/1a0a2e/ff00aa?text=No+Image'"
           loading="lazy" decoding="async">
      <span class="card-badge">#${index + 1}</span>
    </div>
    <div class="card-content">
      <div class="card-title">${title}</div>
      <div class="card-meta">Foto • LINE TOGEL</div>
      <div class="card-actions">
        <button class="action-btn copy" onclick="copyPhoto('${url}')" title="Salin">
          <i class="fas fa-copy"></i><span>Copy</span>
        </button>
        <button class="action-btn download" onclick="downloadPhoto('${url}', '${title.replace(/'/g, "\\'")}')" title="Unduh">
          <i class="fas fa-download"></i><span>Download</span>
        </button>
      </div>
    </div>
  `;
  return card;
}

// ===== SEARCH =====
function searchPhotos() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  
  if (!term) {
    renderGallery(allPhotos);
    return;
  }
  
  const filtered = allPhotos.filter(p => 
    p.judul.toLowerCase().includes(term)
  );
  
  renderGallery(filtered);
  if (filtered.length > 0) {
    showToast(`✦ ${filtered.length} hasil ditemukan`);
  }
}

// ===== MODAL =====
function viewImage(url, title) {
  currentImageUrl = url;
  currentImageTitle = title;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalImage').src = url;
  document.getElementById('imageModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('imageModal').classList.remove('active');
  document.body.style.overflow = '';
}

// ===== ACTIONS =====
async function copyPhoto(url) {
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin!');
  } catch {
    showToast('❗ Klik kanan gambar > Copy Image');
  }
}

async function copyImage() {
  if (currentImageUrl) await copyPhoto(currentImageUrl);
}

function downloadPhoto(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('⬇️ Download dimulai...');
}

function downloadModalImage() {
  if (currentImageUrl && currentImageTitle) {
    downloadPhoto(currentImageUrl, currentImageTitle);
  }
}

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ===== EVENTS =====
document.getElementById('imageModal').addEventListener('click', (e) => {
  if (e.target.id === 'imageModal') closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f0ff">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
/* ULTRA NEON COLORS - Enhanced */
--neon-blue: #00f0ff;
--neon-cyan: #00ffff;
--neon-electric: #00f5ff;
--neon-purple: #8b5cf6;
--neon-pink: #ff00aa;
--neon-gold: #ffd700;
--neon-green: #00ff9d;
--neon-violet: #a78bfa;
--bg-deep: #010204;
--bg-surface: rgba(3, 8, 20, 0.92);
--bg-elevated: rgba(6, 15, 35, 0.85);
--bg-glass: rgba(5, 12, 28, 0.75);
--text-primary: #ffffff;
--text-secondary: #93c5fd;
--text-dim: #64748b;
--border-glow: rgba(0, 240, 255, 0.7);
--glow-blue: 0 0 20px rgba(0, 240, 255, 0.7), 0 0 45px rgba(0, 240, 255, 0.5), 0 0 80px rgba(0, 240, 255, 0.25);
--glow-electric: 0 0 25px rgba(0, 245, 255, 0.8), 0 0 60px rgba(0, 245, 255, 0.5), 0 0 100px rgba(0, 245, 255, 0.3);
--glow-purple: 0 0 20px rgba(139, 92, 246, 0.6), 0 0 45px rgba(139, 92, 246, 0.35);
--transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
--transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
--transition-bloom: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-deep);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
}

/* === ENHANCED BACKGROUND EFFECTS === */
.bg-canvas {
position: fixed;
inset: 0;
z-index: -3;
background:
radial-gradient(ellipse at 15% 15%, rgba(0, 240, 255, 0.18) 0%, transparent 55%),
radial-gradient(ellipse at 85% 20%, rgba(0, 245, 255, 0.15) 0%, transparent 55%),
radial-gradient(ellipse at 50% 90%, rgba(139, 92, 246, 0.12) 0%, transparent 60%),
radial-gradient(ellipse at 25% 75%, rgba(255, 0, 170, 0.08) 0%, transparent 65%);
animation: bgPulse 12s ease-in-out infinite alternate;
}
@keyframes bgPulse {
0%, 100% { opacity: 1; filter: hue-rotate(0deg) brightness(1); }
50% { opacity: 0.95; filter: hue-rotate(25deg) brightness(1.1); }
}

.grid-overlay {
position: fixed;
inset: 0;
z-index: -2;
background-image:
linear-gradient(rgba(0, 240, 255, 0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 240, 255, 0.08) 1px, transparent 1px),
linear-gradient(45deg, rgba(139, 92, 246, 0.04) 1px, transparent 1px);
background-size: 45px 45px, 45px 45px, 90px 90px;
mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, black 25%, transparent 80%);
animation: gridMove 35s linear infinite;
}
@keyframes gridMove {
0% { background-position: 0 0, 0 0, 0 0; }
100% { background-position: 45px 45px, 45px 45px, 90px 90px; }
}

.lightning-overlay {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
opacity: 0;
animation: lightningFlash 10s infinite;
}
@keyframes lightningFlash {
0%, 87%, 89%, 91%, 93%, 100% { opacity: 0; }
88%, 90%, 92% { opacity: 0.2; }
}
.lightning-bolt {
position: absolute;
width: 3px;
height: 100vh;
background: linear-gradient(180deg, transparent, var(--neon-electric), var(--neon-blue), var(--neon-violet), transparent);
filter: blur(1px);
animation: lightningStrike 10s infinite;
box-shadow: 0 0 15px var(--neon-electric), 0 0 30px var(--neon-blue);
}
.lightning-bolt:nth-child(1) { left: 12%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 52%; animation-delay: 2.5s; }
.lightning-bolt:nth-child(3) { left: 88%; animation-delay: 5s; }
@keyframes lightningStrike {
0%, 86%, 88%, 90%, 92%, 100% { transform: scaleY(0); opacity: 0; }
87%, 89%, 91% { transform: scaleY(1); opacity: 1; }
}

.particles {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
overflow: hidden;
}
.particle {
position: absolute;
width: 4px; height: 4px;
background: var(--neon-electric);
border-radius: 50%;
opacity: 0.8;
animation: particleFloat 22s infinite ease-in-out;
box-shadow: 0 0 12px var(--neon-electric), 0 0 25px var(--neon-blue);
}
.particle:nth-child(2n) {
background: var(--neon-blue);
box-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-cyan);
animation-delay: -6s;
animation-duration: 28s;
}
.particle:nth-child(3n) {
background: var(--neon-purple);
box-shadow: 0 0 12px var(--neon-purple), 0 0 25px var(--neon-violet);
animation-delay: -12s;
animation-duration: 32s;
}
.particle:nth-child(5n) {
background: var(--neon-pink);
box-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-purple);
animation-delay: -18s;
animation-duration: 26s;
}
@keyframes particleFloat {
0%, 100% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }
8% { opacity: 0.9; }
92% { opacity: 0.9; }
100% { transform: translateY(-100vh) rotate(720deg) scale(1.2); opacity: 0; }
}

.scanline {
position: fixed;
left: 0; right: 0; height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), var(--neon-cyan), transparent);
opacity: 0.7;
animation: scanLine 7s linear infinite;
z-index: 50;
pointer-events: none;
filter: blur(1.5px);
box-shadow: 0 0 20px var(--neon-electric);
}
@keyframes scanLine {
0% { top: -5px; opacity: 0; }
6% { opacity: 0.7; }
94% { opacity: 0.7; }
100% { top: 100%; opacity: 0; }
}

.noise {
position: fixed;
inset: 0;
z-index: -1;
opacity: 0.025;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
pointer-events: none;
animation: noiseShift 0.5s steps(2) infinite;
}
@keyframes noiseShift {
0%, 100% { transform: translate(0, 0); }
25% { transform: translate(-1px, 1px); }
50% { transform: translate(1px, -1px); }
75% { transform: translate(-1px, -1px); }
}

/* Aurora Effect */
.aurora {
position: fixed;
inset: 0;
z-index: -2;
background: 
linear-gradient(120deg, transparent 20%, rgba(0, 240, 255, 0.06) 45%, rgba(139, 92, 246, 0.08) 55%, transparent 80%),
linear-gradient(240deg, transparent 25%, rgba(255, 0, 170, 0.05) 50%, rgba(0, 245, 255, 0.07) 75%, transparent 90%);
animation: auroraFlow 18s ease-in-out infinite alternate;
pointer-events: none;
}
@keyframes auroraFlow {
0%, 100% { opacity: 0.6; transform: translateX(0) rotate(0deg); }
50% { opacity: 0.9; transform: translateX(-2%) rotate(0.5deg); }
}

/* === LAYOUT === */
.container {
max-width: 1400px;
margin: 0 auto;
padding: 25px 18px;
min-height: 100vh;
position: relative;
}

.header {
text-align: center;
margin-bottom: 35px;
animation: headerEntrance 1s var(--transition-bloom) backwards;
position: relative;
}
.header::after {
content: '';
position: absolute;
bottom: -15px;
left: 50%;
transform: translateX(-50%);
width: 200px;
height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
box-shadow: 0 0 15px var(--neon-electric);
}
@keyframes headerEntrance {
from { opacity: 0; transform: translateY(-50px) scale(0.95); filter: blur(5px); }
to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

.back-btn {
position: fixed;
left: 18px; top: 25px;
background: rgba(0, 240, 255, 0.18);
border: 1px solid var(--neon-blue);
color: var(--neon-electric);
padding: 7px 16px;
border-radius: 10px;
text-decoration: none;
font-weight: 700;
font-size: 11px;
display: flex;
align-items: center;
gap: 7px;
transition: var(--transition-smooth);
backdrop-filter: blur(12px);
z-index: 1000;
pointer-events: auto;
box-shadow: 0 4px 20px rgba(0, 240, 255, 0.25);
}
.back-btn:hover {
background: rgba(0, 240, 255, 0.35);
transform: translateX(-6px);
box-shadow: var(--glow-electric);
color: var(--bg-deep);
}

.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(30px, 7vw, 52px);
font-weight: 900;
letter-spacing: 5px;
margin-bottom: 10px;
position: relative;
background: linear-gradient(135deg, var(--neon-electric) 0%, var(--neon-blue) 30%, #ffffff 50%, var(--neon-blue) 70%, var(--neon-purple) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 0 0 35px rgba(0, 240, 255, 0.6), 0 0 60px rgba(139, 92, 246, 0.4);
animation: titleShimmer 2.5s ease-in-out infinite, titleGlow 3s ease-in-out infinite alternate;
}
@keyframes titleShimmer {
0%, 100% { filter: brightness(1) saturate(1); }
50% { filter: brightness(1.4) saturate(1.2); }
}
@keyframes titleGlow {
0%, 100% { text-shadow: 0 0 35px rgba(0, 240, 255, 0.6), 0 0 60px rgba(139, 92, 246, 0.4); }
50% { text-shadow: 0 0 50px rgba(0, 240, 255, 0.9), 0 0 90px rgba(139, 92, 246, 0.7), 0 0 120px rgba(0, 245, 255, 0.5); }
}

.subtitle {
font-size: 12px;
color: var(--text-secondary);
letter-spacing: 6px;
text-transform: uppercase;
margin-bottom: 16px;
font-weight: 500;
text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
}

.status-badge {
display: inline-flex;
align-items: center;
gap: 9px;
padding: 7px 18px;
background: rgba(0, 255, 157, 0.15);
border: 1px solid rgba(0, 255, 157, 0.5);
border-radius: 100px;
font-size: 10px;
font-weight: 700;
color: var(--neon-green);
text-transform: uppercase;
letter-spacing: 2.5px;
animation: statusPulse 2.2s ease-in-out infinite;
box-shadow: 0 0 18px rgba(0, 255, 157, 0.35), inset 0 0 10px rgba(0, 255, 157, 0.15);
}
@keyframes statusPulse {
0%, 100% { box-shadow: 0 0 18px rgba(0, 255, 157, 0.35), inset 0 0 10px rgba(0, 255, 157, 0.15); }
50% { box-shadow: 0 0 32px rgba(0, 255, 157, 0.7), inset 0 0 18px rgba(0, 255, 157, 0.3); }
}
.status-dot {
width: 7px; height: 7px;
background: var(--neon-green);
border-radius: 50%;
animation: dotBeat 1.3s ease-in-out infinite;
box-shadow: 0 0 12px var(--neon-green), 0 0 25px var(--neon-green);
}
@keyframes dotBeat {
0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 12px var(--neon-green); }
50% { transform: scale(1.5); opacity: 0.8; box-shadow: 0 0 25px var(--neon-green), 0 0 45px var(--neon-green); }
}

/* Navigation - Only Gallery Tab Now */
.nav-tabs {
display: flex;
gap: 12px;
justify-content: center;
margin-bottom: 28px;
flex-wrap: wrap;
}
.nav-tab {
padding: 11px 26px;
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: 10px;
color: var(--text-primary);
font-family: 'Orbitron', sans-serif;
font-size: 11px;
font-weight: 700;
cursor: pointer;
transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
text-transform: uppercase;
letter-spacing: 1.5px;
backdrop-filter: blur(12px);
position: relative;
overflow: hidden;
}
.nav-tab::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(0, 240, 255, 0), rgba(0, 240, 255, 0.15), rgba(139, 92, 246, 0.1));
opacity: 0;
transition: opacity 0.3s;
}
.nav-tab:hover, .nav-tab.active {
background: linear-gradient(135deg, rgba(0, 240, 255, 0.25), rgba(0, 245, 255, 0.2), rgba(139, 92, 246, 0.15));
border-color: var(--neon-electric);
box-shadow: var(--glow-electric);
transform: translateY(-3px) scale(1.03);
color: var(--neon-electric);
}
.nav-tab:hover::before, .nav-tab.active::before { opacity: 1; }

.section { display: none; }
.section.active { display: block; animation: fadeIn 0.55s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes fadeIn {
from { opacity: 0; transform: translateY(25px); filter: blur(3px); }
to { opacity: 1; transform: translateY(0); filter: blur(0); }
}

/* Search */
.search-container {
max-width: 620px;
margin: 0 auto 28px;
}
.search-box {
width: 100%;
padding: 14px 50px 14px 20px;
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: 12px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 14px;
transition: all 0.35s;
backdrop-filter: blur(12px);
box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.search-box:focus {
outline: none;
border-color: var(--neon-electric);
box-shadow: var(--glow-electric), 0 8px 35px rgba(0, 240, 255, 0.3);
transform: translateY(-2px);
}
.search-box::placeholder { color: var(--text-dim); }

/* Gallery Section */
.gallery-section {
margin-bottom: 40px;
animation: sectionReveal 0.75s var(--transition-bloom) backwards;
}
@keyframes sectionReveal {
from { opacity: 0; transform: translateY(45px); filter: blur(5px); }
to { opacity: 1; transform: translateY(0); filter: blur(0); }
}

.section-title {
font-family: 'Orbitron', sans-serif;
font-size: 15px;
font-weight: 700;
color: var(--text-primary);
margin-bottom: 18px;
padding-bottom: 12px;
border-bottom: 1px solid var(--border-glow);
display: flex;
align-items: center;
gap: 12px;
letter-spacing: 2.5px;
position: relative;
text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
}
.section-title::before {
content: '';
width: 5px; height: 22px;
background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue), var(--neon-purple));
border-radius: 3px;
box-shadow: 0 0 15px rgba(0, 245, 255, 0.8), 0 0 30px rgba(139, 92, 246, 0.5);
animation: titleBarPulse 2s ease-in-out infinite;
}
@keyframes titleBarPulse {
0%, 100% { box-shadow: 0 0 15px rgba(0, 245, 255, 0.8), 0 0 30px rgba(139, 92, 246, 0.5); }
50% { box-shadow: 0 0 25px rgba(0, 245, 255, 1), 0 0 50px rgba(139, 92, 246, 0.8); }
}

.gallery-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
gap: 18px;
}

/* Photo Card - ULTRA COOL VERSION */
.photo-card {
background: var(--bg-surface);
border: 1px solid rgba(0, 240, 255, 0.3);
border-radius: 14px;
overflow: hidden;
transition: var(--transition-bloom);
position: relative;
backdrop-filter: blur(14px);
animation: cardEnter 0.55s ease forwards;
opacity: 0;
transform: translateY(25px);
box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
}
.photo-card::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(0, 240, 255, 0.08), transparent 40%, rgba(139, 92, 246, 0.08));
opacity: 0;
transition: opacity 0.4s;
pointer-events: none;
}
.photo-card:hover::before { opacity: 1; }
.photo-card:nth-child(1) { animation-delay: 0.08s; }
.photo-card:nth-child(2) { animation-delay: 0.13s; }
.photo-card:nth-child(3) { animation-delay: 0.18s; }
.photo-card:nth-child(4) { animation-delay: 0.23s; }
.photo-card:nth-child(5) { animation-delay: 0.28s; }
@keyframes cardEnter {
to { opacity: 1; transform: translateY(0); }
}
.photo-card:hover {
transform: translateY(-7px) scale(1.025);
border-color: var(--neon-electric);
box-shadow: var(--glow-electric), var(--glow-purple), 0 20px 50px rgba(0, 0, 0, 0.5);
}

.photo-wrapper {
position: relative;
width: 100%;
height: 290px;
background: radial-gradient(ellipse at center, #0e2a42 0%, #040a16 100%);
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
}
.photo-wrapper::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(180deg, transparent 60%, rgba(0, 240, 255, 0.15));
opacity: 0;
transition: opacity 0.3s;
pointer-events: none;
}
.photo-card:hover .photo-wrapper::after { opacity: 1; }
.photo-wrapper img {
width: 100%;
height: 100%;
object-fit: contain;
display: block;
padding: 8px;
background: transparent;
transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
filter: drop-shadow(0 4px 15px rgba(0, 0, 0, 0.4));
}
.photo-card:hover .photo-wrapper img {
transform: scale(1.07);
filter: drop-shadow(0 8px 25px rgba(0, 240, 255, 0.5));
}

.photo-info {
padding: 16px;
}
.photo-title {
font-family: 'Orbitron', sans-serif;
font-size: 14px;
font-weight: 700;
color: var(--neon-electric);
margin-bottom: 14px;
word-break: break-word;
text-align: center;
text-shadow: 0 0 12px rgba(0, 245, 255, 0.6);
letter-spacing: 0.5px;
}
.photo-meta {
font-size: 11px;
color: var(--text-secondary);
text-align: center;
margin-bottom: 14px;
opacity: 0.9;
}

/* Action Buttons Row - COOL DESIGN */
.action-buttons-row {
display: flex;
gap: 10px;
justify-content: center;
flex-wrap: wrap;
padding-top: 12px;
border-top: 1px solid rgba(0, 240, 255, 0.25);
}
.action-btn-cool {
flex: 1;
min-width: 75px;
max-width: 95px;
height: 46px;
background: linear-gradient(145deg, rgba(0, 240, 255, 0.18) 0%, rgba(139, 92, 246, 0.12) 100%);
border: 1px solid rgba(0, 240, 255, 0.5);
border-radius: 10px;
color: var(--neon-electric);
font-size: 11px;
font-weight: 700;
cursor: pointer;
transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 4px;
text-transform: uppercase;
letter-spacing: 0.6px;
backdrop-filter: blur(10px);
position: relative;
overflow: hidden;
}
.action-btn-cool::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.15), transparent);
transform: translateX(-100%);
transition: transform 0.5s;
}
.action-btn-cool:hover::before { transform: translateX(100%); }
.action-btn-cool i {
font-size: 17px;
margin-bottom: 2px;
text-shadow: 0 0 10px currentColor;
}
.action-btn-cool:hover {
background: linear-gradient(145deg, rgba(0, 240, 255, 0.4) 0%, rgba(139, 92, 246, 0.3) 100%);
border-color: var(--neon-electric);
transform: translateY(-4px) scale(1.06);
box-shadow: 0 8px 28px rgba(0, 245, 255, 0.6), 0 0 20px rgba(139, 92, 246, 0.4);
color: var(--bg-deep);
text-shadow: none;
}
.action-btn-cool.copy-btn:hover {
background: linear-gradient(145deg, rgba(0, 255, 157, 0.4) 0%, rgba(0, 200, 100, 0.3) 100%);
border-color: var(--neon-green);
box-shadow: 0 8px 28px rgba(0, 255, 157, 0.6), 0 0 20px rgba(0, 255, 157, 0.4);
}
.action-btn-cool.download-btn:hover {
background: linear-gradient(145deg, rgba(0, 212, 255, 0.4) 0%, rgba(0, 180, 255, 0.3) 100%);
border-color: var(--neon-blue);
box-shadow: 0 8px 28px rgba(0, 212, 255, 0.6), 0 0 20px rgba(0, 212, 255, 0.4);
}
.action-btn-cool span {
font-size: 9px;
font-weight: 700;
}

/* Modal - Enhanced */
.modal-backdrop {
position: fixed;
inset: 0;
background: rgba(2, 4, 12, 0.97);
backdrop-filter: blur(20px);
z-index: 1000;
display: none;
align-items: center;
justify-content: center;
padding: 16px;
animation: modalFadeIn 0.3s ease;
}
@keyframes modalFadeIn {
from { opacity: 0; }
to { opacity: 1; }
}
.modal-backdrop.active { display: flex; }
.modal-content {
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: 18px;
max-width: 920px;
width: 100%;
max-height: 95vh;
overflow: auto;
display: flex;
flex-direction: column;
box-shadow: var(--glow-electric), var(--glow-purple);
animation: modalSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalSlideIn {
from { opacity: 0; transform: translateY(30px) scale(0.98); }
to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 16px 20px;
border-bottom: 1px solid rgba(0, 240, 255, 0.25);
}
.modal-title {
font-family: 'Orbitron', sans-serif;
font-size: 15px;
color: var(--neon-electric);
text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
}
.modal-close {
width: 34px;
height: 34px;
background: transparent;
border: 1px solid var(--neon-pink);
border-radius: 50%;
color: var(--neon-pink);
font-size: 15px;
cursor: pointer;
transition: all 0.3s;
display: flex;
align-items: center;
justify-content: center;
}
.modal-close:hover {
background: var(--neon-pink);
color: var(--bg-deep);
transform: rotate(90deg) scale(1.1);
box-shadow: 0 0 20px rgba(255, 0, 170, 0.6);
}
.modal-body {
padding: 20px;
text-align: center;
overflow-y: auto;
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
background: radial-gradient(ellipse at center, #0d2840 0%, #040a16 100%);
}
.modal-body img {
max-width: 100%;
max-height: 72vh;
width: auto;
object-fit: contain;
border-radius: 10px;
box-shadow: 0 0 30px rgba(0, 240, 255, 0.4), 0 0 60px rgba(139, 92, 246, 0.3);
transition: transform 0.3s;
}
.modal-body img:hover { transform: scale(1.02); }
.modal-actions {
margin-top: 16px;
display: flex;
gap: 10px;
justify-content: center;
flex-wrap: wrap;
}

/* Toast - Enhanced */
.toast {
position: fixed;
bottom: 24px;
right: 24px;
background: var(--bg-surface);
border: 1px solid var(--neon-electric);
color: var(--neon-electric);
padding: 13px 24px;
border-radius: 12px;
font-weight: 700;
font-size: 12px;
z-index: 10000;
display: flex;
align-items: center;
gap: 10px;
box-shadow: var(--glow-electric);
transform: translateX(220px);
opacity: 0;
transition: var(--transition-bloom);
backdrop-filter: blur(14px);
}
.toast.show {
transform: translateX(0);
opacity: 1;
}
.toast i { font-size: 16px; animation: pulseIcon 1.5s infinite; }
@keyframes pulseIcon { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

/* Loading */
.loading {
display: none;
text-align: center;
padding: 32px;
grid-column: 1 / -1;
}
.loading.active { display: block; }
.loader {
width: 48px;
height: 48px;
border: 3px solid rgba(0, 240, 255, 0.25);
border-top-color: var(--neon-electric);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 16px;
box-shadow: var(--glow-electric);
position: relative;
}
.loader::after {
content: '';
position: absolute;
inset: -5px;
border: 2px solid transparent;
border-top-color: var(--neon-purple);
border-radius: 50%;
animation: spin 1.5s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 768px) {
.container { padding: 18px 12px; }
.back-btn { left: 12px; top: 16px; padding: 6px 12px; font-size: 10px; }
.gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
.nav-tabs { flex-direction: column; align-items: center; }
.nav-tab { width: 100%; max-width: 300px; }
.action-btn-cool { min-width: 65px; max-width: 80px; height: 42px; }
.action-btn-cool i { font-size: 15px; }
.action-btn-cool span { font-size: 8px; }
.photo-wrapper { height: 240px; }
}

/* Scrollbar - Ultra Cool */
::-webkit-scrollbar { width: 9px; }
::-webkit-scrollbar-track { background: var(--bg-deep); border-radius: 10px; }
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue), var(--neon-purple), var(--neon-pink));
border-radius: 10px;
border: 2px solid var(--bg-deep);
box-shadow: 0 0 15px rgba(0, 245, 255, 0.5);
transition: background 0.3s;
}
::-webkit-scrollbar-thumb:hover {
background: linear-gradient(180deg, var(--neon-blue), var(--neon-purple), var(--neon-pink), var(--neon-electric));
box-shadow: 0 0 25px rgba(139, 92, 246, 0.7);
}

/* Selection */
::selection {
background: linear-gradient(135deg, rgba(0, 240, 255, 0.4), rgba(139, 92, 246, 0.4));
color: var(--text-primary);
text-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
}

/* No Results */
.no-results {
grid-column: 1/-1;
text-align: center;
padding: 50px 20px;
color: var(--text-secondary);
animation: fadeIn 0.5s;
}
.no-results i {
font-size: 52px;
margin-bottom: 18px;
opacity: 0.6;
background: linear-gradient(135deg, var(--neon-electric), var(--neon-purple));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.4));
}
.no-results h3 {
font-family: 'Orbitron', sans-serif;
font-size: 18px;
margin-bottom: 10px;
color: var(--text-primary);
}
</style>
</head>
<body>
<div class="bg-canvas"></div>
<div class="aurora"></div>
<div class="grid-overlay"></div>
<div class="noise"></div>
<div class="particles" id="particles"></div>
<div class="lightning-overlay">
<div class="lightning-bolt"></div>
<div class="lightning-bolt"></div>
<div class="lightning-bolt"></div>
</div>
<div class="scanline"></div>

<a href="index.html" class="back-btn">
<i class="fas fa-arrow-left"></i> Kembali
</a>

<div class="container">
<header class="header">
<h1 class="title">⚡ FOTO GALLERY</h1>
<p class="subtitle">LINE TOGEL - Cyber Portal 2026</p>
<div class="status-badge">
<span class="status-dot"></span>
<span>SYSTEM ONLINE</span>
</div>
</header>

<!-- Navigation - Only Gallery Tab (Editor Removed) -->
<div class="nav-tabs">
<button class="nav-tab active" onclick="showSection('gallery')">
<i class="fas fa-images"></i> Galeri Foto
</button>
</div>

<!-- Section: Gallery Only -->
<section id="gallery" class="section active">
<div class="search-container">
<input type="text" class="search-box" id="searchInput" placeholder="🔍 Cari foto berdasarkan judul..." onkeyup="searchPhotos()">
</div>
<div class="loading" id="loading">
<div class="loader"></div>
<div style="color: var(--neon-electric); font-family: 'Orbitron'; font-size: 12px; text-shadow: 0 0 10px rgba(0,245,255,0.6);">⚡ LOADING PHOTOS...</div>
</div>
<div class="gallery-grid" id="galleryGrid"></div>
</section>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="imageModal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title" id="modalTitle">Foto Detail</h3>
<button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
</div>
<div class="modal-body">
<img src="" alt="" id="modalImage">
<div class="modal-actions">
<button class="action-btn-cool copy-btn" onclick="copyImage()" style="min-width:100px;max-width:120px;height:44px;">
<i class="fas fa-copy"></i><span>Copy</span>
</button>
<button class="action-btn-cool download-btn" onclick="downloadModalImage()" style="min-width:110px;max-width:130px;height:44px;">
<i class="fas fa-download"></i><span>Download</span>
</button>
</div>
</div>
</div>
</div>

<div id="toast" class="toast">
<i class="fas fa-bolt"></i>
<span id="toastText">Berhasil!</span>
</div>

<script>
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';

document.addEventListener('DOMContentLoaded', () => {
createParticles();
if (document.getElementById('gallery')) {
fetchPhotosFromSheet();
}
});

function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
for(let i = 0; i < 60; i++) {
const p = document.createElement('div');
p.className = 'particle';
p.style.left = Math.random() * 100 + '%';
p.style.top = Math.random() * 100 + '%';
p.style.animationDelay = Math.random() * 22 + 's';
p.style.animationDuration = (18 + Math.random() * 24) + 's';
container.appendChild(p);
}
}

function showSection(sectionId) {
document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
document.getElementById(sectionId).classList.add('active');
event.target.closest('.nav-tab').classList.add('active');
}

async function fetchPhotosFromSheet() {
document.getElementById('loading').classList.add('active');
document.getElementById('galleryGrid').innerHTML = '';
try {
const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';
try {
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
const response = await fetch(gvizUrl);
const text = await response.text();
const json = JSON.parse(text.substring(47).slice(0, -2));
const rows = json.table.rows;
allPhotos = [];
rows.forEach((row, index) => {
const c = row.c;
if (!c) return;
const judul = c[0] ? (c[0].v || '') : '';
const foto = c[1] ? (c[1].v || '') : '';
if (judul && foto) {
allPhotos.push({ judul, foto, index: index + 2 });
}
});
} catch (e) {
console.log('GVIZ failed, trying CSV...', e);
const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
const csvResponse = await fetch(csvUrl);
const csvText = await csvResponse.text();
const csvRows = csvText.split('\n').map(row => row.split(','));
allPhotos = [];
csvRows.forEach((row, index) => {
if (row.length < 2) return;
const judul = row[0] ? row[0].replace(/"/g, '').trim() : '';
const foto = row[1] ? row[1].replace(/"/g, '').trim() : '';
if (judul && foto) {
allPhotos.push({ judul, foto, index: index + 2 });
}
});
}
renderGallery(allPhotos);
showToast(`⚡ Berhasil memuat ${allPhotos.length} foto`);
} catch (error) {
console.error('Error fetching photos:', error);
showToast('❗ Gagal mengambil data dari Google Sheets');
document.getElementById('galleryGrid').innerHTML = `
<div class="no-results">
<i class="fas fa-exclamation-triangle"></i>
<h3>Gagal Memuat Foto</h3>
<p>Pastikan Google Sheets sudah dipublikasikan</p>
</div>
`;
}
document.getElementById('loading').classList.remove('active');
}

function renderGallery(photos) {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';
if (photos.length === 0) {
grid.innerHTML = `
<div class="no-results">
<i class="fas fa-search"></i>
<h3>Tidak Ada Foto</h3>
<p>Tidak ada foto yang sesuai dengan pencarian</p>
</div>
`;
return;
}
photos.forEach((photo, idx) => {
const card = createPhotoCard(photo.foto, photo.judul, idx);
grid.appendChild(card);
});
}

// ULTRA COOL Card Design - Edit Button REMOVED
function createPhotoCard(url, title, index) {
const card = document.createElement('div');
card.className = 'photo-card';
card.innerHTML = `
<div class="photo-wrapper">
<img src="${url}" alt="${title}" onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00f0ff?text=No+Image'" loading="lazy" onclick="viewFullImage('${url}', '${title.replace(/'/g, "\\'")}')" style="cursor: pointer;">
</div>
<div class="photo-info">
<div class="photo-title">${title}</div>
<div class="photo-meta">Foto #${index + 1}</div>
<div class="action-buttons-row">
<button class="action-btn-cool copy-btn" onclick="copyPhoto('${url}')" title="Copy Foto">
<i class="fas fa-copy"></i>
<span>Copy</span>
</button>
<button class="action-btn-cool download-btn" onclick="downloadPhoto('${url}', '${title.replace(/'/g, "\\'")}')" title="Download">
<i class="fas fa-download"></i>
<span>Download</span>
</button>
</div>
</div>
`;
return card;
}

function searchPhotos() {
const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
if (!searchTerm) { renderGallery(allPhotos); return; }
const filtered = allPhotos.filter(photo => photo.judul.toLowerCase().includes(searchTerm));
renderGallery(filtered);
if (filtered.length > 0) showToast(`⚡ Ditemukan ${filtered.length} foto`);
}

function viewFullImage(url, title) {
currentImageUrl = url;
currentImageTitle = title;
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalImage').src = url;
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
}

function closeModal() {
document.getElementById('imageModal').classList.remove('active');
document.body.style.overflow = '';
currentImageUrl = '';
currentImageTitle = '';
}

async function copyPhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
showToast('✅ Foto berhasil disalin ke clipboard!');
} catch (error) {
console.error('Copy error:', error);
showToast('❗ Buka foto lalu klik kanan > Copy Image');
}
}

async function copyImage() {
if (currentImageUrl) await copyPhoto(currentImageUrl);
}

function downloadPhoto(url, filename) {
const link = document.createElement('a');
link.href = url;
link.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
link.target = '_blank';
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
showToast('⚡ Download dimulai...');
}

function downloadModalImage() {
if (currentImageUrl && currentImageTitle) {
downloadPhoto(currentImageUrl, currentImageTitle);
}
}

function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastText').textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3200);
}

document.getElementById('imageModal').addEventListener('click', (e) => {
if (e.target.id === 'imageModal') closeModal();
});
document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>

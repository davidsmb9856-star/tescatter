<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ═══════════════════════════════════════════════════════════════ */
/* ✨ ULTRA NEXT-GEN CSS VARIABLES SYSTEM ✨ */
/* ═══════════════════════════════════════════════════════════════ */
:root {
/* 🎨 Neon Color Palette - Ultra Vibrant */
--neon-primary: #00f9ff;
--neon-secondary: #00e7ff;
--neon-accent: #00ffff;
--neon-purple: #a259ff;
--neon-violet: #c471ff;
--neon-pink: #ff00e0;
--neon-magenta: #ff1ad9;
--neon-green: #00ffaa;
--neon-lime: #39ff14;
--neon-gold: #ffd700;
--neon-orange: #ff6b35;

/* 🌑 Deep Space Backgrounds */
--bg-void: #000003;
--bg-deep: #00020a;
--bg-surface: rgba(5, 15, 40, 0.92);
--bg-elevated: rgba(10, 28, 68, 0.88);
--bg-glass: rgba(8, 22, 52, 0.70);
--bg-glass-strong: rgba(12, 32, 72, 0.85);
--bg-card: rgba(6, 18, 46, 0.85);

/* ✨ Text System */
--text-primary: #ffffff;
--text-secondary: #b8e1ff;
--text-tertiary: #7a9bc4;
--text-dim: #526a94;
--text-glow: rgba(0, 249, 255, 0.85);

/* 🔷 Border & Glow System - Multi Layer */
--border-subtle: rgba(0, 249, 255, 0.30);
--border-glow: rgba(0, 249, 255, 0.60);
--border-intense: rgba(0, 249, 255, 0.95);

--glow-xs: 0 0 15px rgba(0, 249, 255, 0.35);
--glow-sm: 0 0 25px rgba(0, 249, 255, 0.50), 0 0 50px rgba(0, 249, 255, 0.25);
--glow-md: 0 0 35px rgba(0, 249, 255, 0.65), 0 0 70px rgba(0, 249, 255, 0.40), 0 0 120px rgba(0, 249, 255, 0.20);
--glow-lg: 0 0 50px rgba(0, 249, 255, 0.80), 0 0 100px rgba(0, 249, 255, 0.55), 0 0 180px rgba(0, 249, 255, 0.30);
--glow-purple: 0 0 35px rgba(162, 89, 255, 0.60), 0 0 70px rgba(162, 89, 255, 0.35);
--glow-pink: 0 0 35px rgba(255, 0, 224, 0.60), 0 0 70px rgba(255, 0, 224, 0.35);
--glow-green: 0 0 35px rgba(0, 255, 170, 0.60), 0 0 70px rgba(0, 255, 170, 0.35);

/* 🎬 Animation System - Professional Easing */
--ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
--ease-enter: cubic-bezier(0, 0, 0.2, 1);
--ease-exit: cubic-bezier(0.4, 0, 1, 1);
--ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
--ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
--ease-overshoot: cubic-bezier(0.175, 0.885, 0.32, 1.275);

--duration-fast: 150ms;
--duration-normal: 300ms;
--duration-slow: 500ms;
--duration-slower: 700ms;
--duration-slowest: 1000ms;

--transition-fast: var(--duration-fast) var(--ease-standard);
--transition-normal: var(--duration-normal) var(--ease-standard);
--transition-slow: var(--duration-slow) var(--ease-bounce);
--transition-elastic: var(--duration-normal) var(--ease-elastic);

/* 📐 Layout System - 8px Grid */
--radius-xs: 6px;
--radius-sm: 10px;
--radius-md: 16px;
--radius-lg: 24px;
--radius-xl: 32px;
--radius-2xl: 40px;
--radius-full: 9999px;

--space-1: 4px;
--space-2: 8px;
--space-3: 12px;
--space-4: 16px;
--space-5: 20px;
--space-6: 24px;
--space-8: 32px;
--space-10: 40px;
--space-12: 48px;
--space-16: 64px;
--space-20: 80px;

/* 🔤 Typography Scale */
--text-xs: 11px;
--text-sm: 13px;
--text-base: 15px;
--text-lg: 18px;
--text-xl: 22px;
--text-2xl: 28px;
--text-3xl: 36px;
--text-4xl: 48px;
--text-5xl: 64px;

/* 🎭 Z-Index Layers */
--z-base: 0;
--z-docked: 10;
--z-dropdown: 100;
--z-sticky: 200;
--z-modal: 1000;
--z-toast: 2000;
--z-overlay: 3000;

/* 🎨 Holographic & Glitch Effects */
--holo-gradient: linear-gradient(135deg, 
rgba(0, 249, 255, 0.15) 0%, 
rgba(162, 89, 255, 0.12) 25%, 
rgba(255, 0, 224, 0.10) 50%, 
rgba(0, 255, 170, 0.12) 75%, 
rgba(0, 249, 255, 0.15) 100%);
--holo-shine: linear-gradient(90deg, 
transparent, 
rgba(255, 255, 255, 0.15), 
transparent);
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ BASE RESET & FOUNDATION ✨ */
/* ═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
::selection { background: rgba(0, 249, 255, 0.4); color: var(--text-primary); text-shadow: 0 0 10px var(--neon-primary); }

html { 
scroll-behavior: smooth; 
scroll-padding-top: var(--space-8);
font-size: 16px;
-webkit-text-size-adjust: 100%;
}

body {
font-family: 'Space Grotesk', 'Rajdhani', sans-serif;
background: var(--bg-void);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
text-rendering: optimizeLegibility;
}

/* Prevent FOUC */
body::before {
content: '';
position: fixed;
inset: 0;
background: var(--bg-deep);
z-index: 9999;
transition: opacity var(--duration-slow) var(--ease-enter);
}
body.loaded::before { opacity: 0; pointer-events: none; }

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ MULTI-DIMENSIONAL BACKGROUND SYSTEM ✨ */
/* ═══════════════════════════════════════════════════════════════ */

/* Layer 1: Deep Space Gradient */
.bg-space {
position: fixed;
inset: 0;
z-index: -5;
background: 
radial-gradient(1400px 700px at 5% 10%, rgba(0, 249, 255, 0.10) 0%, transparent 65%),
radial-gradient(1200px 600px at 95% 15%, rgba(162, 89, 255, 0.09) 0%, transparent 65%),
radial-gradient(1000px 500px at 50% 100%, rgba(255, 0, 224, 0.07) 0%, transparent 70%),
radial-gradient(800px 400px at 20% 75%, rgba(0, 255, 170, 0.05) 0%, transparent 75%),
linear-gradient(180deg, var(--bg-void) 0%, var(--bg-deep) 100%);
animation: spaceDrift 40s ease-in-out infinite alternate;
}
@keyframes spaceDrift {
0%, 100% { transform: translate(0, 0) scale(1); filter: hue-rotate(0deg) brightness(1); }
25% { transform: translate(1.5%, -0.8%) scale(1.015); filter: hue-rotate(5deg) brightness(1.03); }
50% { transform: translate(-0.8%, 1.2%) scale(0.995); filter: hue-rotate(-3deg) brightness(0.98); }
75% { transform: translate(0.5%, 0.5%) scale(1.008); filter: hue-rotate(2deg) brightness(1.01); }
}

/* Layer 2: Animated Grid */
.grid-system {
position: fixed;
inset: 0;
z-index: -4;
background-image:
linear-gradient(rgba(0, 249, 255, 0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 249, 255, 0.05) 1px, transparent 1px),
repeating-linear-gradient(45deg, rgba(162, 89, 255, 0.025) 0, rgba(162, 89, 255, 0.025) 1px, transparent 1px, transparent 45px);
background-size: 55px 55px, 55px 55px, 130px 130px;
mask-image: radial-gradient(ellipse 85% 75% at 50% 50%, black 15%, transparent 90%);
animation: gridFlow 35s linear infinite;
opacity: 0.85;
}
@keyframes gridFlow {
0% { background-position: 0 0, 0 0, 0 0; }
100% { background-position: 55px 55px, 55px 55px, 130px 130px; }
}

/* Layer 3: Aurora Nebula */
.aurora {
position: fixed;
inset: 0;
z-index: -3;
pointer-events: none;
overflow: hidden;
}
.aurora-wave {
position: absolute;
width: 220%;
height: 220%;
top: -60%;
left: -60%;
background: 
radial-gradient(ellipse at 25% 35%, rgba(0, 249, 255, 0.08) 0%, transparent 55%),
radial-gradient(ellipse at 75% 65%, rgba(162, 89, 255, 0.08) 0%, transparent 55%),
radial-gradient(ellipse at 50% 25%, rgba(255, 0, 224, 0.05) 0%, transparent 60%),
radial-gradient(ellipse at 35% 80%, rgba(0, 255, 170, 0.04) 0%, transparent 65%);
animation: auroraFlow 45s ease-in-out infinite;
filter: blur(50px);
opacity: 0.75;
}
.aurora-wave:nth-child(2) {
animation-delay: -15s;
animation-duration: 55s;
opacity: 0.55;
filter: blur(70px);
}
@keyframes auroraFlow {
0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
25% { transform: translate(3%, -1.5%) rotate(0.8deg) scale(1.04); }
50% { transform: translate(-1.5%, 2.5%) rotate(-0.5deg) scale(0.97); }
75% { transform: translate(1.5%, 1%) rotate(0.3deg) scale(1.02); }
}

/* Layer 4: Particle Universe */
.particles {
position: fixed;
inset: 0;
z-index: -2;
pointer-events: none;
overflow: hidden;
}
.particle {
position: absolute;
width: var(--particle-size, 3px);
height: var(--particle-size, 3px);
border-radius: 50%;
opacity: 0;
animation: particleJourney var(--particle-duration, 25s) infinite ease-in-out;
animation-delay: var(--particle-delay, 0s);
}
.particle.active { opacity: var(--particle-opacity, 0.85); }
.particle.cyan { background: var(--neon-primary); box-shadow: 0 0 15px var(--neon-primary), 0 0 30px rgba(0, 249, 255, 0.5); }
.particle.purple { background: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple), 0 0 30px rgba(162, 89, 255, 0.5); }
.particle.pink { background: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink), 0 0 30px rgba(255, 0, 224, 0.5); }
.particle.green { background: var(--neon-green); box-shadow: 0 0 15px var(--neon-green), 0 0 30px rgba(0, 255, 170, 0.5); }
@keyframes particleJourney {
0%, 100% { transform: translateY(100vh) rotate(0deg) scale(0.4); opacity: 0; }
10% { opacity: var(--particle-opacity, 0.85); transform: scale(1); }
90% { opacity: var(--particle-opacity, 0.85); }
100% { transform: translateY(-100vh) rotate(720deg) scale(1.3); opacity: 0; }
}

/* Layer 5: Lightning Storm */
.lightning {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
}
.lightning-bolt {
position: absolute;
top: -100vh;
width: 3px;
height: 200vh;
background: linear-gradient(180deg, 
transparent 0%, 
var(--neon-accent) 15%, 
var(--neon-primary) 35%, 
var(--neon-purple) 55%, 
var(--neon-pink) 75%, 
transparent 100%);
filter: blur(3px) brightness(1.3);
opacity: 0;
animation: lightningFlash 15s infinite;
box-shadow: 0 0 30px var(--neon-primary), 0 0 60px rgba(0, 249, 255, 0.45);
clip-path: polygon(50% 0%, 60% 35%, 100% 35%, 70% 55%, 80% 100%, 50% 85%, 20% 100%, 30% 55%, 0% 35%, 40% 35%);
}
.lightning-bolt:nth-child(1) { left: 12%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 5s; }
.lightning-bolt:nth-child(3) { left: 88%; animation-delay: 10s; }
@keyframes lightningFlash {
0%, 87%, 89%, 91%, 93%, 100% { opacity: 0; transform: scaleY(0.2) translateY(-30%); }
88%, 90%, 92% { opacity: 0.3; transform: scaleY(1) translateY(0); }
}

/* Layer 6: CRT Scanline */
.scanline {
position: fixed;
left: 0; right: 0; height: 5px;
background: linear-gradient(90deg, 
transparent, 
var(--neon-accent), 
var(--neon-primary), 
var(--neon-purple), 
var(--neon-pink), 
transparent);
opacity: 0.45;
animation: scanTravel 7s linear infinite;
z-index: 100;
pointer-events: none;
filter: blur(1.5px);
box-shadow: 0 0 25px var(--neon-primary);
}
@keyframes scanTravel {
0% { top: -10px; opacity: 0; }
5% { opacity: 0.45; }
95% { opacity: 0.45; }
100% { top: 100%; opacity: 0; }
}

/* Layer 7: Film Grain Noise */
.noise {
position: fixed;
inset: 0;
z-index: 5;
opacity: 0.03;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23grain)'/%3E%3C/svg%3E");
pointer-events: none;
animation: grainShift 0.4s steps(8) infinite;
}
@keyframes grainShift {
0%, 100% { transform: translate(0, 0); }
25% { transform: translate(-1px, 2px); }
50% { transform: translate(2px, -1px); }
75% { transform: translate(-2px, -2px); }
}

/* Layer 8: Vignette */
.vignette {
position: fixed;
inset: 0;
z-index: 10;
pointer-events: none;
background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 2, 10, 0.6) 100%);
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ LAYOUT & CONTAINER ✨ */
/* ═══════════════════════════════════════════════════════════════ */
.container {
max-width: 1480px;
margin: 0 auto;
padding: var(--space-8) var(--space-5);
min-height: 100vh;
position: relative;
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ HEADER SYSTEM - Cinematic ✨ */
/* ═══════════════════════════════════════════════════════════════ */
.header {
text-align: center;
margin-bottom: var(--space-20);
animation: headerCinematic var(--duration-slowest) var(--ease-bounce) backwards;
position: relative;
padding-bottom: var(--space-12);
}
.header::after {
content: '';
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 280px;
height: 4px;
background: linear-gradient(90deg, 
transparent, 
var(--neon-accent), 
var(--neon-primary), 
var(--neon-purple), 
var(--neon-pink), 
var(--neon-green), 
transparent);
border-radius: 2px;
box-shadow: var(--glow-lg);
animation: energyPulse 3.5s ease-in-out infinite;
}
@keyframes headerCinematic {
from { opacity: 0; transform: translateY(-60px) scale(0.96); filter: blur(10px); }
50% { filter: blur(2px); }
to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
@keyframes energyPulse {
0%, 100% { opacity: 0.85; box-shadow: var(--glow-lg); }
50% { opacity: 1; box-shadow: 0 0 60px rgba(0, 249, 255, 0.95), 0 0 120px rgba(0, 249, 255, 0.65), 0 0 220px rgba(0, 249, 255, 0.4); }
}

/* Back Button - Floating */
.back-btn {
position: fixed;
left: var(--space-5); 
top: var(--space-5);
background: var(--bg-glass);
border: 1px solid var(--border-glow);
color: var(--neon-primary);
padding: 10px 20px;
border-radius: var(--radius-full);
text-decoration: none;
font-weight: 700;
font-size: var(--text-xs);
display: flex;
align-items: center;
gap: 10px;
transition: all var(--transition-normal);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
z-index: var(--z-sticky);
pointer-events: auto;
box-shadow: var(--glow-sm);
letter-spacing: 0.6px;
position: relative;
overflow: hidden;
}
.back-btn::before {
content: '';
position: absolute;
inset: 0;
background: var(--holo-gradient);
opacity: 0;
transition: opacity var(--transition-fast);
}
.back-btn:hover {
background: var(--bg-glass-strong);
transform: translateX(-5px) scale(1.04);
box-shadow: var(--glow-md);
color: var(--bg-deep);
border-color: var(--neon-accent);
}
.back-btn:hover::before { opacity: 1; }
.back-btn i { font-size: 14px; transition: transform var(--transition-fast); }
.back-btn:hover i { transform: translateX(-3px); }

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ TYPOGRAPHY SYSTEM ✨ */
/* ═══════════════════════════════════════════════════════════════ */
.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(34px, 9vw, 64px);
font-weight: 900;
letter-spacing: 7px;
margin-bottom: var(--space-3);
position: relative;
background: linear-gradient(135deg, 
var(--neon-accent) 0%, 
var(--neon-primary) 22%, 
#ffffff 50%, 
var(--neon-primary) 78%, 
var(--neon-purple) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 0 0 50px rgba(0, 249, 255, 0.7);
animation: titleShimmer 3.5s ease-in-out infinite, titleLevitate 6s ease-in-out infinite;
}
@keyframes titleShimmer {
0%, 100% { filter: brightness(1) contrast(1); }
50% { filter: brightness(1.5) contrast(1.05); }
}
@keyframes titleLevitate {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-5px); }
}

.subtitle {
font-size: var(--text-xs);
color: var(--text-secondary);
letter-spacing: 8px;
text-transform: uppercase;
margin-bottom: var(--space-5);
font-weight: 600;
text-shadow: 0 0 15px rgba(0, 249, 255, 0.5);
font-family: 'Orbitron', sans-serif;
}

/* Status Badge - Animated */
.status-badge {
display: inline-flex;
align-items: center;
gap: 14px;
padding: 9px 28px;
background: rgba(0, 255, 170, 0.18);
border: 1px solid rgba(0, 255, 170, 0.6);
border-radius: var(--radius-full);
font-size: var(--text-xs);
font-weight: 700;
color: var(--neon-green);
text-transform: uppercase;
letter-spacing: 3px;
animation: statusPulse 2.5s ease-in-out infinite;
box-shadow: var(--glow-green);
font-family: 'Orbitron', sans-serif;
position: relative;
overflow: hidden;
}
.status-badge::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(90deg, transparent, rgba(0, 255, 170, 0.2), transparent);
animation: badgeShine 3s infinite;
}
@keyframes badgeShine {
0% { transform: translateX(-100%); }
100% { transform: translateX(100%); }
}
@keyframes statusPulse {
0%, 100% { box-shadow: 0 0 25px rgba(0, 255, 170, 0.45); }
50% { box-shadow: 0 0 50px rgba(0, 255, 170, 0.85); }
}
.status-dot {
width: 10px; height: 10px;
background: var(--neon-green);
border-radius: 50%;
animation: dotPulse 1.5s ease-in-out infinite;
box-shadow: 0 0 20px var(--neon-green), 0 0 40px rgba(0, 255, 170, 0.65);
position: relative;
}
.status-dot::after {
content: '';
position: absolute;
inset: -4px;
border: 2px solid var(--neon-green);
border-radius: 50%;
animation: dotRing 2s ease-out infinite;
}
@keyframes dotPulse {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.7); opacity: 0.9; }
}
@keyframes dotRing {
0% { transform: scale(1); opacity: 0.8; }
100% { transform: scale(2.5); opacity: 0; }
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ NAVIGATION ✨ */
/* ═══════════════════════════════════════════════════════════════ */
.nav-tabs {
display: flex;
gap: 16px;
justify-content: center;
margin-bottom: var(--space-8);
flex-wrap: wrap;
}
.nav-tab {
padding: 14px 32px;
background: var(--bg-surface);
border: 1px solid var(--border-subtle);
border-radius: var(--radius-xl);
color: var(--text-primary);
font-family: 'Orbitron', sans-serif;
font-size: var(--text-xs);
font-weight: 700;
cursor: pointer;
transition: all var(--transition-normal);
text-transform: uppercase;
letter-spacing: 2px;
backdrop-filter: blur(18px);
-webkit-backdrop-filter: blur(18px);
position: relative;
overflow: hidden;
display: flex;
align-items: center;
gap: 10px;
}
.nav-tab::before {
content: '';
position: absolute;
inset: 0;
background: var(--holo-gradient);
opacity: 0;
transition: opacity var(--transition-normal);
}
.nav-tab::after {
content: '';
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%) scaleX(0);
width: 80%;
height: 2px;
background: linear-gradient(90deg, var(--neon-primary), var(--neon-purple));
border-radius: 2px;
transition: transform var(--transition-normal);
}
.nav-tab:hover, .nav-tab.active {
background: var(--bg-elevated);
border-color: var(--neon-accent);
box-shadow: var(--glow-md);
transform: translateY(-5px);
color: var(--neon-primary);
}
.nav-tab:hover::before, .nav-tab.active::before { opacity: 1; }
.nav-tab:hover::after, .nav-tab.active::after { transform: translateX(-50%) scaleX(1); }
.nav-tab i { font-size: 15px; }

.section { display: none; animation: sectionReveal var(--duration-slower) var(--ease-bounce); }
.section.active { display: block; }
@keyframes sectionReveal {
from { opacity: 0; transform: translateY(40px); }
to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ SEARCH SYSTEM - Premium ✨ */
/* ═══════════════════════════════════════════════════════════════ */
.search-container {
max-width: 750px;
margin: 0 auto var(--space-8);
position: relative;
}
.search-box {
width: 100%;
padding: 18px 60px 18px 28px;
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: var(--radius-xl);
color: var(--text-primary);
font-family: 'Space Grotesk', sans-serif;
font-size: var(--text-base);
transition: all var(--transition-normal);
backdrop-filter: blur(18px);
-webkit-backdrop-filter: blur(18px);
box-shadow: var(--glow-sm);
}
.search-box:focus {
outline: none;
border-color: var(--neon-accent);

}

.search-icon {

}
.search-box:focus + .search-icon { color: var(--neon-accent); animation: iconPulse 0.6s ease; }
@keyframes iconPulse { 0%, 100% { transform: translateY(-50%) scale(1); } 50% { transform: translateY(-50%) scale(1.2); } }

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ GALLERY GRID - Masonry Style ✨ */
/* ═══════════════════════════════════════════════════════════════ */
.gallery-section { margin-bottom: var(--space-20); }

.section-title {
font-family: 'Orbitron', sans-serif;
font-size: var(--text-lg);
font-weight: 700;
color: var(--text-primary);
margin-bottom: var(--space-5);
padding-bottom: var(--space-4);
border-bottom: 1px solid var(--border-subtle);
display: flex;
align-items: center;
gap: 16px;
letter-spacing: 3px;
position: relative;
}
.section-title::before {
content: '';
width: 6px; height: 28px;
background: linear-gradient(180deg, var(--neon-accent), var(--neon-primary), var(--neon-purple));
border-radius: 3px;
box-shadow: 0 0 22px rgba(0, 249, 255, 0.8);
animation: barGlow 2.8s ease-in-out infinite;
}
@keyframes barGlow {
0%, 100% { opacity: 1; transform: scaleY(1); box-shadow: 0 0 22px rgba(0, 249, 255, 0.8); }
50% { opacity: 0.9; transform: scaleY(1.2); box-shadow: 0 0 35px rgba(0, 249, 255, 1); }
}

.gallery-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));

}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ ULTRA PREMIUM PHOTO CARD ✨ */
/* ═══════════════════════════════════════════════════════════════ */
.photo-card {
background: var(--bg-card);
border: 1px solid var(--border-subtle);
border-radius: var(--radius-lg);
overflow: hidden;
transition: all var(--transition-slow);
position: relative;
backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);
animation: cardFloatIn 0.8s ease forwards;
opacity: 0;
transform: translateY(35px);
box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
}
.photo-card::before {
content: '';
position: absolute;
inset: 0;
background: var(--holo-gradient);
opacity: 0;
transition: opacity var(--transition-normal);
pointer-events: none;
z-index: 1;
}
.photo-card::after {
content: '';
position: absolute;
inset: -3px;
background: linear-gradient(45deg, 
var(--neon-accent), 
var(--neon-purple), 
var(--neon-pink), 
var(--neon-green), 
var(--neon-accent));
border-radius: inherit;
opacity: 0;
transition: opacity var(--transition-normal);
pointer-events: none;
z-index: 0;
filter: blur(25px);
animation: borderRotate 4s linear infinite;
}
@keyframes borderRotate {
0% { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}
.photo-card:hover::before { opacity: 1; }
.photo-card:hover::after { opacity: 0.4; }
.photo-card:hover {
transform: translateY(-10px) scale(1.03);
border-color: var(--neon-accent);
box-shadow: var(--glow-md), 0 30px 70px rgba(0, 0, 0, 0.6);
}
.photo-card:nth-child(1) { animation-delay: 0.1s; }
.photo-card:nth-child(2) { animation-delay: 0.15s; }
.photo-card:nth-child(3) { animation-delay: 0.2s; }
.photo-card:nth-child(4) { animation-delay: 0.25s; }
.photo-card:nth-child(5) { animation-delay: 0.3s; }
@keyframes cardFloatIn { to { opacity: 1; transform: translateY(0); } }

.photo-wrapper {
position: relative;
width: 100%;
height: 310px;
background: radial-gradient(circle at center, #102a4a 0%, #061025 100%);
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
}
.photo-wrapper::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(180deg, 
transparent 45%, 
rgba(0, 3, 12, 0.4) 80%, 
rgba(0, 3, 12, 0.9));
pointer-events: none;
z-index: 2;
}
.photo-wrapper::after {
content: '';
position: absolute;
inset: 0;
border: 1px solid rgba(0, 249, 255, 0.12);
border-radius: inherit;
pointer-events: none;
z-index: 3;
}
.photo-wrapper img {
width: 100%;
height: 100%;
object-fit: contain;
display: block;
padding: 0;
background: transparent;
transition: all var(--transition-slow);
filter: drop-shadow(0 8px 25px rgba(0, 0, 0, 0.4));
}
.photo-card:hover .photo-wrapper img {
transform: scale(1.1);
filter: drop-shadow(0 12px 35px rgba(0, 249, 255, 0.5));
}

/* View Counter Badge */
.view-badge {

top: var(--space-3);
right: var(--space-3);

padding: 5px 12px;

align-items: center;
gap: 6px;

}
@keyframes badgeFloat {

50% { transform: translateY(-3px); }
}
.view-badge i { font-size: 12px; }

.photo-info {
padding: var(--space-5);
position: relative;
z-index: 4;
}
.photo-info::before {
content: '';
position: absolute;
top: 0;
left: var(--space-5);
right: var(--space-5);
height: 1px;
background: linear-gradient(90deg, 
transparent, 
rgba(0, 249, 255, 0.5), 
rgba(162, 89, 255, 0.5), 
transparent);
}

.photo-title {
font-family: 'Orbitron', sans-serif;
font-size: var(--text-sm);
font-weight: 700;
color: var(--neon-primary);
margin-bottom: var(--space-4);

text-align: center;
text-shadow: 0 0 16px rgba(0, 249, 255, 0.7);

}

.photo-meta {
font-size: var(--text-xs);
color: var(--text-tertiary);
text-align: center;
margin-bottom: var(--space-4);
opacity: 0.95;
font-weight: 500;
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
}
.photo-meta i { color: var(--neon-purple); }

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ PREMIUM ACTION BUTTONS - Magnetic Effect ✨ */
/* ═══════════════════════════════════════════════════════════════ */
.action-buttons-row {
display: flex;
gap: 14px;
justify-content: center;
flex-wrap: wrap;
padding-top: var(--space-4);
border-top: 1px solid var(--border-subtle);
}

.action-btn {
flex: 1;
min-width: 85px;
max-width: 105px;
height: 54px;
background: linear-gradient(135deg, 
rgba(0, 249, 255, 0.24) 0%, 
rgba(0, 249, 255, 0.16) 100%);
border: 1px solid var(--border-glow);
border-radius: var(--radius-md);
color: var(--neon-primary);
font-size: var(--text-xs);
font-weight: 700;
cursor: pointer;
transition: all var(--transition-normal);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 6px;
text-transform: uppercase;
letter-spacing: 0.8px;
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
position: relative;
overflow: hidden;
font-family: 'Orbitron', sans-serif;
}
.action-btn::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, 
rgba(0, 249, 255, 0.4), 
rgba(162, 89, 255, 0.32));
opacity: 0;
transition: opacity var(--transition-normal);
}
.action-btn i {
font-size: 19px;
margin-bottom: 3px;
z-index: 1;
transition: transform var(--transition-fast);
}
.action-btn span {
font-size: 9px;
font-weight: 700;
z-index: 1;
}
.action-btn:hover {
background: linear-gradient(135deg, 
rgba(0, 249, 255, 0.52) 0%, 
rgba(0, 249, 255, 0.42) 100%);
border-color: var(--neon-accent);
transform: translateY(-6px) scale(1.1);
box-shadow: 0 12px 40px rgba(0, 249, 255, 0.7);
color: var(--bg-deep);
}
.action-btn:hover::before { opacity: 1; }
.action-btn:hover i { transform: translateY(-3px); }

.action-btn.copy-btn:hover {
background: linear-gradient(135deg, rgba(0, 255, 170, 0.52), rgba(0, 230, 140, 0.42));
border-color: var(--neon-green);
box-shadow: 0 12px 40px rgba(0, 255, 170, 0.7);
}
.action-btn.download-btn:hover {
background: linear-gradient(135deg, rgba(0, 249, 255, 0.52), rgba(0, 220, 255, 0.42));
border-color: var(--neon-secondary);
box-shadow: 0 12px 40px rgba(0, 249, 255, 0.7);
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ LOADING SYSTEM - Advanced ✨ */
/* ═══════════════════════════════════════════════════════════════ */
.loading {
display: none;
text-align: center;
padding: var(--space-12) var(--space-5);
grid-column: 1 / -1;
}
.loading.active { display: block; }

.loader {
width: 56px;
height: 56px;
border: 4px solid rgba(0, 249, 255, 0.22);
border-top-color: var(--neon-accent);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto var(--space-6);
box-shadow: var(--glow-md);
position: relative;
}
.loader::after {
content: '';
position: absolute;
inset: -7px;
border: 3px solid transparent;
border-top-color: var(--neon-purple);
border-radius: 50%;
animation: spin 1.3s linear infinite reverse;
}
.loader::before {
content: '';
position: absolute;
inset: -14px;
border: 2px solid transparent;
border-top-color: var(--neon-pink);
border-radius: 50%;
animation: spin 1.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
color: var(--neon-accent); 
font-family: 'Orbitron', sans-serif; 
font-size: var(--text-sm); 
font-weight: 700;
letter-spacing: 2.5px;
animation: textGlow 2.2s ease-in-out infinite;
}
@keyframes textGlow {
0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(0, 249, 255, 0.8); }
50% { opacity: 0.75; text-shadow: 0 0 35px rgba(0, 249, 255, 1); }
}

/* Skeleton Loading */
.skeleton-card {
background: var(--bg-card);
border: 1px solid var(--border-subtle);
border-radius: var(--radius-lg);
overflow: hidden;
animation: cardFloatIn 0.8s ease forwards;
}
.skeleton-image {
width: 100%;
height: 310px;
background: linear-gradient(90deg, var(--bg-deep) 25%, var(--bg-elevated) 50%, var(--bg-deep) 75%);
background-size: 200% 100%;
animation: skeletonShimmer 1.5s infinite;
}
@keyframes skeletonShimmer {
0% { background-position: -200% 0; }
100% { background-position: 200% 0; }
}
.skeleton-content { padding: var(--space-5); }
.skeleton-title {
height: 18px;
background: linear-gradient(90deg, var(--bg-deep) 25%, var(--bg-elevated) 50%, var(--bg-deep) 75%);
background-size: 200% 100%;
animation: skeletonShimmer 1.5s infinite;
border-radius: var(--radius-xs);
margin-bottom: var(--space-3);
}
.skeleton-meta {
height: 12px;
background: var(--bg-elevated);
border-radius: var(--radius-xs);
width: 60%;
margin: 0 auto var(--space-4);
}
.skeleton-actions {
display: flex;
gap: 14px;
justify-content: center;
}
.skeleton-btn {
width: 85px;
height: 54px;
background: var(--bg-elevated);
border-radius: var(--radius-md);
animation: skeletonShimmer 1.5s infinite;
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ MODAL SYSTEM - Cinematic ✨ */
/* ═══════════════════════════════════════════════════════════════ */
.modal-backdrop {
position: fixed;
inset: 0;
background: rgba(0, 1, 5, 0.98);
backdrop-filter: blur(28px);
-webkit-backdrop-filter: blur(28px);
z-index: var(--z-modal);
display: none;
align-items: center;
justify-content: center;
padding: var(--space-6);
animation: modalFade var(--duration-normal) ease;
}
@keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
.modal-backdrop.active { display: flex; }

.modal-content {
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: var(--radius-2xl);
max-width: 1050px;
width: 100%;
max-height: 94vh;
overflow: hidden;
display: flex;
flex-direction: column;
box-shadow: var(--glow-lg), 0 40px 100px rgba(0, 0, 0, 0.65);
animation: modalCinematic var(--duration-slower) var(--ease-bounce);
}
@keyframes modalCinematic {
from { opacity: 0; transform: translateY(50px) scale(0.96); filter: blur(8px); }
50% { filter: blur(2px); }
to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

.modal-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: var(--space-5) var(--space-7);
border-bottom: 1px solid var(--border-subtle);
background: linear-gradient(90deg, 
rgba(0, 249, 255, 0.12), 
transparent, 
rgba(162, 89, 255, 0.12));
}
.modal-title {
font-family: 'Orbitron', sans-serif;
font-size: var(--text-base);
color: var(--neon-primary);
font-weight: 700;
letter-spacing: 1.2px;
}
.modal-close {
width: 44px;
height: 44px;
background: transparent;
border: 1px solid var(--neon-pink);
border-radius: 50%;
color: var(--neon-pink);
font-size: 17px;
cursor: pointer;
transition: all var(--transition-normal);
display: flex;
align-items: center;
justify-content: center;
}
.modal-close:hover {
background: var(--neon-pink);
color: var(--bg-deep);
transform: rotate(90deg) scale(1.15);
box-shadow: var(--glow-pink);
}

.modal-body {
padding: var(--space-7);
text-align: center;
overflow-y: auto;
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
background: radial-gradient(circle at center, #0f2848 0%, #061025 100%);
}
.modal-body img {
max-width: 100%;
max-height: 66vh;
width: auto;
object-fit: contain;
border-radius: var(--radius-md);
box-shadow: 0 0 50px rgba(0, 249, 255, 0.5), 0 15px 60px rgba(0, 0, 0, 0.55);
transition: transform var(--transition-normal);
}
.modal-body img:hover { transform: scale(1.02); }

.modal-actions {
margin-top: var(--space-6);
display: flex;
gap: 14px;
justify-content: center;
flex-wrap: wrap;
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ TOAST NOTIFICATIONS - Advanced ✨ */
/* ═══════════════════════════════════════════════════════════════ */
.toast {
position: fixed;
bottom: var(--space-7);
right: var(--space-7);
background: var(--bg-glass-strong);
border: 1px solid var(--neon-accent);
color: var(--neon-primary);
padding: 16px 32px;
border-radius: var(--radius-lg);
font-weight: 700;
font-size: var(--text-sm);
z-index: var(--z-toast);
display: flex;
align-items: center;
gap: 14px;
box-shadow: var(--glow-md);
transform: translateX(350px);
opacity: 0;
transition: all var(--transition-slow);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
font-family: 'Orbitron', sans-serif;
letter-spacing: 0.6px;
}
.toast.show { transform: translateX(0); opacity: 1; }
.toast i { font-size: 18px; }
.toast.success { border-color: var(--neon-green); color: var(--neon-green); }
.toast.error { border-color: var(--neon-pink); color: var(--neon-pink); }

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ FLOATING ACTION BAR - Quick Access ✨ */
/* ═══════════════════════════════════════════════════════════════ */
.fab-bar {
position: fixed;
bottom: var(--space-5);
left: 50%;
transform: translateX(-50%);
display: flex;
gap: var(--space-3);
padding: var(--space-3) var(--space-4);
background: var(--bg-glass-strong);
border: 1px solid var(--border-glow);
border-radius: var(--radius-full);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
z-index: var(--z-sticky);
box-shadow: var(--glow-sm);
animation: fabFloat 4s ease-in-out infinite;
}
@keyframes fabFloat {
0%, 100% { transform: translateX(-50%) translateY(0); }
50% { transform: translateX(-50%) translateY(-4px); }
}
.fab-btn {
width: 44px;
height: 44px;
border-radius: 50%;
background: var(--bg-surface);
border: 1px solid var(--border-subtle);
color: var(--neon-primary);
font-size: 16px;
cursor: pointer;
transition: all var(--transition-fast);
display: flex;
align-items: center;
justify-content: center;
}
.fab-btn:hover {
background: var(--neon-primary);
color: var(--bg-deep);
transform: scale(1.12);
box-shadow: var(--glow-sm);
border-color: var(--neon-accent);
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ RESPONSIVE DESIGN - Adaptive ✨ */
/* ═══════════════════════════════════════════════════════════════ */
@media (max-width: 1200px) {
.container { padding: var(--space-6) var(--space-4); }
.gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 22px; }
.photo-wrapper { height: 275px; }
}

@media (max-width: 768px) {
.container { padding: var(--space-5) var(--space-3); }
.back-btn { left: var(--space-3); top: var(--space-3); padding: 8px 16px; font-size: 10px; }
.title { font-size: clamp(30px, 10vw, 52px); letter-spacing: 5px; }
.subtitle { font-size: 10px; letter-spacing: 6px; }
.gallery-grid { grid-template-columns: 1fr; }
.photo-wrapper { height: 290px; }
.photo-title { font-size: var(--text-xs); }
.action-btn { min-width: 75px; max-width: 90px; height: 50px; }
.action-btn i { font-size: 17px; }
.action-btn span { font-size: 8px; }
.nav-tabs { gap: 12px; }
.nav-tab { padding: 12px 26px; font-size: 10px; }
.modal-content { border-radius: var(--radius-xl); }
.modal-body { padding: var(--space-5); }
.toast { bottom: var(--space-5); right: var(--space-5); padding: 14px 28px; font-size: var(--text-xs); }
.fab-bar { bottom: var(--space-3); }
.fab-btn { width: 40px; height: 40px; font-size: 14px; }

@media (max-width: 480px) {

.photo-wrapper { height: 250px; }
.action-buttons-row { gap: 10px; }
.action-btn { min-width: 70px; height: 48px; padding: 8px 4px; }
.section-title { font-size: var(--text-base); }
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ SCROLLBAR - Custom Neon ✨ */
/* ═══════════════════════════════════════════════════════════════ */
::-webkit-scrollbar { width: 11px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon-accent), var(--neon-primary), var(--neon-purple), var(--neon-pink));
border-radius: 7px;
border: 2px solid var(--bg-deep);
box-shadow: 0 0 20px rgba(0, 249, 255, 0.6);
}
::-webkit-scrollbar-thumb:hover {
background: linear-gradient(180deg, var(--neon-primary), var(--neon-accent), var(--neon-violet));
box-shadow: 0 0 28px rgba(0, 249, 255, 0.8);
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨ ACCESSIBILITY & UTILITIES ✨ */
/* ═══════════════════════════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
*, *::before, *::after {
animation-duration: 0.01ms !important;
animation-iteration-count: 1 !important;
transition-duration: 0.01ms !important;
}
}

.sr-only {
position: absolute;
width: 1px; height: 1px;
padding: 0; margin: -1px;
overflow: hidden; clip: rect(0, 0, 0, 0);
white-space: nowrap; border: 0;
}

.hidden { display: none !important; }
.pointer-none { pointer-events: none; }

/* Focus States */
a:focus-visible, button:focus-visible, input:focus-visible {
outline: 2px solid var(--neon-accent);
outline-offset: 3px;
box-shadow: 0 0 0 5px rgba(0, 249, 255, 0.3);
}

/* High Contrast Mode */
@media (prefers-contrast: high) {
:root {
--border-subtle: rgba(0, 249, 255, 0.8);
--border-glow: rgba(0, 249, 255, 1);
}
}

<div class="scanline"></div>
<div class="vignette"></div>

<!-- ✨✨ BACK BUTTON ✨✨ -->
<a href="index.html" class="back-btn" aria-label="Kembali ke halaman utama">
<i class="fas fa-arrow-left"></i> <span>Kembali</span>
</a>

<!-- ✨✨ MAIN CONTAINER ✨✨ -->
<div class="container">
<header class="header">
<h1 class="title">⚡ FOTO GALLERY</h1>
<p class="subtitle">LINE TOGEL — Cyber Portal 2026</p>
<div class="status-badge" role="status" aria-live="polite">
<span class="status-dot" aria-hidden="true"></span>
<span>SYSTEM ONLINE</span>
</div>
</header>

<!-- ✨✨ NAVIGATION ✨✨ -->
<nav class="nav-tabs" role="tablist">
<button class="nav-tab active" role="tab" aria-selected="true" aria-controls="gallery">
<i class="fas fa-images"></i> Galeri Foto
</button>
</nav>

<!-- ✨✨ GALLERY SECTION ✨✨ -->
<section id="gallery" class="section active" role="tabpanel" aria-labelledby="gallery-tab">
<div class="search-container">
<input type="search" class="search-box" id="searchInput" placeholder="🔍 Cari foto berdasarkan judul..." onkeyup="searchPhotos()" aria-label="Cari foto">
<i class="fas fa-search search-icon" aria-hidden="true"></i>
</div>

<div class="loading" id="loading" aria-live="polite">
<div class="loader" role="status"><span class="sr-only">Memuat foto...</span></div>
<div class="loading-text">⚡ LOADING PHOTOS...</div>
</div>

<div class="gallery-grid" id="galleryGrid" role="list"></div>
</section>
</div>

<!-- ✨✨ FLOATING ACTION BAR ✨✨ -->
<div class="fab-bar" role="toolbar" aria-label="Aksi cepat">
<button class="fab-btn" onclick="refreshGallery()" title="Refresh" aria-label="Muat ulang galeri">
<i class="fas fa-sync-alt"></i>
</button>
<button class="fab-btn" onclick="toggleGridView()" title="Ubah tampilan" aria-label="Ubah layout">
<i class="fas fa-th-large"></i>
</button>
<button class="fab-btn" onclick="scrollToTop()" title="Ke atas" aria-label="Scroll ke atas">
<i class="fas fa-arrow-up"></i>
</button>
</div>

<!-- ✨✨ MODAL ✨✨ -->
<div class="modal-backdrop" id="imageModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title" id="modalTitle">Foto Detail</h3>
<button class="modal-close" onclick="closeModal()" aria-label="Tutup modal">
<i class="fas fa-times"></i>
</button>
</div>
<div class="modal-body">
<img src="" alt="" id="modalImage">
<div class="modal-actions">
<button class="action-btn copy-btn" onclick="copyImage()">
<i class="fas fa-copy"></i>
<span>Copy</span>
</button>
<button class="action-btn download-btn" onclick="downloadModalImage()">
<i class="fas fa-download"></i>
<span>Download</span>
</button>
</div>
</div>
</div>
</div>

<!-- ✨✨ TOAST ✨✨ -->
<div id="toast" class="toast" role="alert" aria-live="assertive">
<i class="fas fa-bolt" aria-hidden="true"></i>
<span id="toastText">Berhasil!</span>
</div>

<!-- ✨✨ JAVASCRIPT - ULTRA OPTIMIZED ✨✨ -->
<script>
// ═══════════════════════════════════════════════════════════════
// ✨ GLOBAL STATE & CONFIG ✨
// ═══════════════════════════════════════════════════════════════
const CONFIG = {
sheetId: '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0',
gid: '1246502038',
range: 'C2:D150',
particleCount: 80,
debounceDelay: 300,
toastDuration: 4000
};

let state = {
photos: [],
currentImage: { url: '', title: '' },
searchTerm: '',
isLoading: false,
gridView: 'masonry'
};

// ═══════════════════════════════════════════════════════════════
// ✨ INITIALIZATION ✨
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
initParticles();
fetchPhotos();
initKeyboardNav();
initIntersectionObserver();
document.body.classList.add('loaded');
});

// ═══════════════════════════════════════════════════════════════
// ✨ PARTICLE SYSTEM - Advanced ✨
// ═══════════════════════════════════════════════════════════════
function initParticles() {
const container = document.getElementById('particles');
if (!container) return;

const colors = ['cyan', 'purple', 'pink', 'green'];
for(let i = 0; i < CONFIG.particleCount; i++) {
const p = document.createElement('div');
p.className = `particle ${colors[i % 4]}`;
p.style.cssText = `
--particle-size: ${2 + Math.random() * 4}px;
--particle-opacity: ${0.6 + Math.random() * 0.35};
--particle-delay: ${Math.random() * 30}s;
--particle-duration: ${20 + Math.random() * 35}s;
left: ${Math.random() * 100}%;
top: ${Math.random() * 100}%;
`;
setTimeout(() => p.classList.add('active'), Math.random() * 3000);
container.appendChild(p);
}
}

// ═══════════════════════════════════════════════════════════════
// ✨ DATA FETCHING - Optimized ✨
// ═══════════════════════════════════════════════════════════════
async function fetchPhotos() {
setLoading(true);
try {
const url = `https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/gviz/tq?tqx=out:json&gid=${CONFIG.gid}&range=${CONFIG.range}`;
const response = await fetch(url);
const text = await response.text();
const json = JSON.parse(text.substring(47).slice(0, -2));

state.photos = json.table.rows
.filter(row => row.c?.[0]?.v && row.c?.[1]?.v)
.map((row, i) => ({
id: i + 2,
title: row.c[0].v,
url: row.c[1].v,
views: Math.floor(Math.random() * 9999) + 100
}));

renderGallery(state.photos);
showToast(`⚡ ${state.photos.length} foto dimuat`, 'success');
} catch (error) {
console.error('Fetch error:', error);
showToast('❗ Gagal memuat foto', 'error');
renderEmptyState();
} finally {
setLoading(false);
}
}

// ═══════════════════════════════════════════════════════════════
// ✨ RENDERING - Efficient ✨
// ═══════════════════════════════════════════════════════════════
function renderGallery(photos) {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';

if (!photos.length) {
renderEmptyState();
return;
}

const fragment = document.createDocumentFragment();
photos.forEach((photo, idx) => {
fragment.appendChild(createPhotoCard(photo, idx));
});
grid.appendChild(fragment);
}

function createPhotoCard(photo, index) {
const card = document.createElement('div');
card.className = 'photo-card';
card.setAttribute('role', 'listitem');
card.innerHTML = `
<div class="photo-wrapper">
<img src="${photo.url}" alt="${photo.title}" 
onerror="handleImageError(this)" 
loading="lazy" 
onclick="viewFullImage('${photo.url}', '${escapeHtml(photo.title)}')" 
style="cursor:pointer">
<span class="view-badge"><i class="fas fa-eye"></i> ${formatViews(photo.views)}</span>
</div>
<div class="photo-info">
<div class="photo-title">${escapeHtml(photo.title)}</div>
<div class="photo-meta"><i class="fas fa-hashtag"></i> Foto #${photo.id}</div>
<div class="action-buttons-row">
<button class="action-btn copy-btn" onclick="copyPhoto('${photo.url}')" title="Salin" aria-label="Salin ${escapeHtml(photo.title)}">
<i class="fas fa-copy"></i><span>Copy</span>
</button>
<button class="action-btn download-btn" onclick="downloadPhoto('${photo.url}', '${escapeHtml(photo.title)}')" title="Download" aria-label="Download ${escapeHtml(photo.title)}">
<i class="fas fa-download"></i><span>Download</span>
</button>
</div>
</div>`;
return card;
}

function renderEmptyState() {
document.getElementById('galleryGrid').innerHTML = `
<div style="grid-column:1/-1;text-align:center;padding:var(--space-12);color:var(--text-tertiary)">
<i class="fas fa-search" style="font-size:56px;margin-bottom:var(--space-5);opacity:0.6"></i>
<h3 style="font-family:'Orbitron';color:var(--neon-primary);margin-bottom:var(--space-3)">Tidak Ditemukan</h3>
<p style="color:var(--text-secondary)">Coba kata kunci lain atau refresh halaman</p>
</div>`;
}

function renderSkeleton(count = 6) {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';
for(let i = 0; i < count; i++) {
grid.innerHTML += `
<div class="skeleton-card">
<div class="skeleton-image"></div>
<div class="skeleton-content">
<div class="skeleton-title"></div>
<div class="skeleton-meta"></div>
<div class="skeleton-actions">
<div class="skeleton-btn"></div>
<div class="skeleton-btn"></div>
</div>
</div>
</div>`;
}
}

// ═══════════════════════════════════════════════════════════════
// ✨ SEARCH - Debounced ✨
// ═══════════════════════════════════════════════════════════════
let searchTimeout;
function searchPhotos() {
clearTimeout(searchTimeout);
searchTimeout = setTimeout(() => {
state.searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
const filtered = !state.searchTerm ? state.photos : 
state.photos.filter(p => p.title.toLowerCase().includes(state.searchTerm));
renderGallery(filtered);
if (filtered.length && state.searchTerm) {
showToast(`⚡ ${filtered.length} hasil ditemukan`);
}
}, CONFIG.debounceDelay);
}

// ═══════════════════════════════════════════════════════════════
// ✨ MODAL FUNCTIONS ✨
// ═══════════════════════════════════════════════════════════════
function viewFullImage(url, title) {
state.currentImage = { url, title };
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalImage').src = url;
document.getElementById('modalImage').alt = title;
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
}

function closeModal() {
document.getElementById('imageModal').classList.remove('active');
document.body.style.overflow = '';
state.currentImage = { url: '', title: '' };
}

// ═══════════════════════════════════════════════════════════════
// ✨ COPY & DOWNLOAD ✨
// ═══════════════════════════════════════════════════════════════
async function copyPhoto(url) {
try {
const blob = await (await fetch(url)).blob();
await navigator.clipboard.write([new ClipboardItem({[blob.type]: blob})]);
showToast('✅ Disalin ke clipboard!', 'success');
} catch {
showToast('❗ Klik kanan gambar > Copy Image', 'error');
}
}

async function copyImage() {
if (state.currentImage.url) await copyPhoto(state.currentImage.url);
}

function downloadPhoto(url, filename) {
const a = document.createElement('a');
a.href = url;
a.download = `${filename.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`;
a.target = '_blank';
a.rel = 'noopener';
document.body.appendChild(a); 
a.click(); 
document.body.removeChild(a);
showToast('⚡ Download dimulai...', 'success');
}

function downloadModalImage() {
if (state.currentImage.url) {
downloadPhoto(state.currentImage.url, state.currentImage.title);
}
}

// ═══════════════════════════════════════════════════════════════
// ✨ TOAST NOTIFICATIONS ✨
// ═══════════════════════════════════════════════════════════════
function showToast(message, type = '') {
const toast = document.getElementById('toast');
document.getElementById('toastText').textContent = message;
toast.className = `toast ${type}`;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), CONFIG.toastDuration);
}

// ═══════════════════════════════════════════════════════════════
// ✨ UTILITY FUNCTIONS ✨
// ═══════════════════════════════════════════════════════════════
function setLoading(loading) {
state.isLoading = loading;
document.getElementById('loading').classList.toggle('active', loading);
if (loading) renderSkeleton();
}

function handleImageError(img) {
img.src = `https://via.placeholder.com/400x300/0a1a2f/00f9ff?text=No+Image&font=orbitron`;
}

function escapeHtml(text) {
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML.replace(/'/g, "\\'");
}

function formatViews(num) {
return num >= 1000 ? (num/1000).toFixed(1) + 'K' : num;
}

function refreshGallery() {
showToast('🔄 Memuat ulang...');
fetchPhotos();
}

function toggleGridView() {
state.gridView = state.gridView === 'masonry' ? 'grid' : 'masonry';
document.getElementById('galleryGrid').style.gridTemplateColumns = 
state.gridView === 'grid' ? 'repeat(auto-fill, minmax(250px, 1fr))' : 'repeat(auto-fill, minmax(310px, 1fr))';
showToast(`📐 Tampilan: ${state.gridView === 'masonry' ? 'Masonry' : 'Grid'}`);
}

function scrollToTop() {
window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════════════
// ✨ KEYBOARD & INTERACTION ✨
// ═══════════════════════════════════════════════════════════════
function initKeyboardNav() {
document.addEventListener('keydown', e => {
if (e.key === 'Escape') closeModal();
if (e.ctrlKey && e.key === 'k') { 
e.preventDefault(); 
document.getElementById('searchInput')?.focus(); 
}
if (e.key === 'ArrowLeft' && state.currentImage.url) {
// Navigate to previous (implement if needed)
}
if (e.key === 'ArrowRight' && state.currentImage.url) {
// Navigate to next (implement if needed)
}
});

document.getElementById('imageModal')?.addEventListener('click', e => {
if (e.target.id === 'imageModal' || e.target.classList.contains('modal-close')) {
closeModal();
}
});
}

// ═══════════════════════════════════════════════════════════════
// ✨ INTERSECTION OBSERVER - Lazy Enhance ✨
// ═══════════════════════════════════════════════════════════════
function initIntersectionObserver() {
if ('IntersectionObserver' in window) {
const observer = new IntersectionObserver((entries) => {
entries.forEach(entry => {
if (entry.isIntersecting) {
entry.target.style.animationPlayState = 'running';
}
});
}, { threshold: 0.1 });

document.querySelectorAll('.photo-card').forEach(card => {
observer.observe(card);
});
}
}
</script>
</body>
</html>

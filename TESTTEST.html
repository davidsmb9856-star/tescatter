<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00f3ff">
<meta name="description" content="Database Kendala User 2026 - Neon Cyberpunk Edition">
<title>🔷 KENDALA ALL | NEON CYBERPUNK 2026</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ================= VARIABLES & RESET ================= */
:root {
  --neon-cyan: #00f3ff;
  --neon-blue: #0066ff;
  --neon-purple: #bc13fe;
  --neon-green: #0aff0a;
  --neon-red: #ff003c;
  
  --bg-deep: #050505;
  --bg-panel: rgba(10, 15, 30, 0.65);
  --glass-border: rgba(0, 243, 255, 0.15);
  --glass-highlight: rgba(255, 255, 255, 0.05);
  
  --text-main: #e0fbfc;
  --text-dim: #8892b0;
  
  --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Rajdhani', sans-serif;
  background-color: var(--bg-deep);
  color: var(--text-main);
  overflow-x: hidden;
  min-height: 100vh;
  position: relative;
}

/* ================= ADVANCED BACKGROUNDS ================= */
.cyber-grid {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background-image: 
    linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  perspective: 500px;
  transform-style: preserve-3d;
  z-index: -2;
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
  0% { transform: translateY(0) rotateX(20deg); }
  100% { transform: translateY(40px) rotateX(20deg); }
}

.ambient-glow {
  position: fixed;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(0, 102, 255, 0.15) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: -1;
  filter: blur(60px);
  animation: floatOrb 15s ease-in-out infinite alternate;
}
.orb-1 { top: -10%; left: -10%; background: radial-gradient(circle, rgba(188, 19, 254, 0.12) 0%, transparent 70%); }
.orb-2 { bottom: -10%; right: -10%; animation-delay: -5s; }

@keyframes floatOrb {
  0% { transform: translate(0, 0); }
  100% { transform: translate(50px, 50px); }
}

.scanlines {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
  background-size: 100% 4px;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.3;
}

/* ================= LAYOUT ================= */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* ================= HEADER ================= */
.header-wrapper {
  text-align: center;
  margin-bottom: 40px;
  padding: 40px 20px;
  position: relative;
  background: rgba(5, 10, 20, 0.4);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  box-shadow: 0 0 30px rgba(0, 243, 255, 0.05);
}

.back-btn {
  position: absolute;
  top: 20px; left: 20px;
  display: flex; align-items: center; gap: 8px;
  color: var(--neon-cyan);
  text-decoration: none;
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  letter-spacing: 1px;
  padding: 8px 16px;
  border: 1px solid var(--neon-cyan);
  border-radius: 4px;
  transition: 0.3s;
  background: rgba(0, 243, 255, 0.05);
}

.back-btn:hover {
  background: var(--neon-cyan);
  color: #000;
  box-shadow: 0 0 20px var(--neon-cyan);
}

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 900;
  text-transform: uppercase;
  color: #fff;
  text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
  margin-bottom: 10px;
  position: relative;
  display: inline-block;
}

.glitch-text {
  position: relative;
}
.glitch-text::before, .glitch-text::after {
  content: attr(data-text);
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg-deep);
}
.glitch-text::before {
  left: 2px; text-shadow: -1px 0 var(--neon-red); clip: rect(24px, 550px, 90px, 0);
  animation: glitch-anim-2 3s infinite linear alternate-reverse;
}
.glitch-text::after {
  left: -2px; text-shadow: -1px 0 var(--neon-blue); clip: rect(85px, 550px, 140px, 0);
  animation: glitch-anim 2.5s infinite linear alternate-reverse;
}

@keyframes glitch-anim {
  0% { clip: rect(14px, 9999px, 122px, 0); }
  100% { clip: rect(74px, 9999px, 83px, 0); }
}
@keyframes glitch-anim-2 {
  0% { clip: rect(65px, 9999px, 119px, 0); }
  100% { clip: rect(10px, 9999px, 89px, 0); }
}

.subtitle {
  font-family: 'Share Tech Mono', monospace;
  color: var(--neon-cyan);
  font-size: 14px;
  letter-spacing: 2px;
  opacity: 0.8;
}

.status-indicator {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 15px;
  padding: 6px 12px;
  background: rgba(10, 255, 10, 0.1);
  border: 1px solid rgba(10, 255, 10, 0.3);
  border-radius: 20px;
  font-size: 11px;
  color: var(--neon-green);
  font-weight: 700;
}
.dot { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 10px var(--neon-green); animation: pulse 1.5s infinite; }

/* ================= SEARCH & STATS ================= */
.search-container {
  position: relative;
  max-width: 600px;
  margin: 0 auto 30px;
}

.search-input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.search-icon {
  position: absolute;
  left: 15px;
  color: var(--neon-cyan);
  font-size: 18px;
  z-index: 2;
}

#searchInput {
  width: 100%;
  background: rgba(10, 15, 30, 0.6);
  border: 1px solid var(--glass-border);
  padding: 16px 16px 16px 45px;
  border-radius: 12px;
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 600;
  transition: all 0.3s var(--ease-out);
  backdrop-filter: blur(10px);
}

#searchInput:focus {
  border-color: var(--neon-cyan);
  box-shadow: 0 0 20px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(0, 243, 255, 0.1);
  background: rgba(10, 15, 30, 0.9);
}

.stats-row {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.stat-pill {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--glass-border);
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 80px;
}
.stat-pill strong { color: var(--neon-cyan); font-size: 18px; font-family: 'Orbitron'; }

/* ================= CARDS (GLASSMORPHISM + TILT) ================= */
.kendala-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 25px;
  padding-bottom: 80px;
}

.k-card {
  background: var(--bg-panel);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: transform 0.1s; /* Fast for tilt */
  transform-style: preserve-3d;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  cursor: pointer;
}

.k-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan), var(--neon-purple));
  opacity: 0.7;
}

.k-card:hover {
  border-color: rgba(0, 243, 255, 0.4);
  box-shadow: 0 15px 40px rgba(0, 243, 255, 0.1);
}

.k-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 15px;
  transform: translateZ(20px); /* 3D pop */
}

.k-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  line-height: 1.4;
  text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
}

.k-badge {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  background: rgba(255, 255, 255, 0.1);
  color: var(--text-dim);
  white-space: nowrap;
  margin-left: 10px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* Dynamic Tags */
.tag-error { color: var(--neon-red); border-color: rgba(255, 0, 60, 0.3); background: rgba(255, 0, 60, 0.1); }
.tag-money { color: var(--neon-green); border-color: rgba(10, 255, 10, 0.3); background: rgba(10, 255, 10, 0.1); }
.tag-account { color: var(--neon-purple); border-color: rgba(188, 19, 254, 0.3); background: rgba(188, 19, 254, 0.1); }

.k-preview {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 15px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  transform: translateZ(10px);
}

.k-actions {
  display: flex;
  gap: 10px;
  margin-top: auto;
  transform: translateZ(15px);
}

.btn-action {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  text-transform: uppercase;
}

.btn-view {
  background: rgba(0, 243, 255, 0.1);
  color: var(--neon-cyan);
  border: 1px solid rgba(0, 243, 255, 0.3);
}
.btn-view:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }

.btn-sticky {
  background: rgba(188, 19, 254, 0.1);
  color: var(--neon-purple);
  border: 1px solid rgba(188, 19, 254, 0.3);
}
.btn-sticky:hover { background: var(--neon-purple); color: #fff; box-shadow: 0 0 15px var(--neon-purple); }

/* ================= EXPANDED CONTENT (MODAL STYLE INSIDE CARD) ================= */
.k-details {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s var(--ease-out);
  margin-top: 0;
  opacity: 0;
}

.k-card.expanded .k-details {
  max-height: 1000px; /* Arbitrary large number */
  margin-top: 20px;
  opacity: 1;
  padding-top: 20px;
  border-top: 1px dashed rgba(255,255,255,0.1);
}

.solution-box {
  background: rgba(0, 0, 0, 0.3);
  border-left: 3px solid var(--neon-cyan);
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 0 8px 8px 0;
  font-size: 14px;
  line-height: 1.6;
  color: #ddd;
}

.solution-label {
  font-family: 'Share Tech Mono';
  color: var(--neon-cyan);
  font-size: 11px;
  margin-bottom: 5px;
  display: block;
  text-transform: uppercase;
}

.img-container {
  margin: 15px 0;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
}
.k-img { width: 100%; display: block; cursor: zoom-in; transition: 0.3s; }
.k-img:hover { transform: scale(1.02); }

.link-btn {
  display: inline-block;
  margin-top: 8px;
  margin-right: 8px;
  padding: 6px 12px;
  background: rgba(255,255,255,0.05);
  color: var(--neon-blue);
  text-decoration: none;
  border-radius: 4px;
  font-size: 12px;
  border: 1px solid rgba(0, 102, 255, 0.3);
  transition: 0.3s;
}
.link-btn:hover { background: var(--neon-blue); color: #fff; }

/* ================= STICKY PANEL ================= */
.sticky-trigger {
  position: fixed;
  bottom: 30px; right: 30px;
  width: 60px; height: 60px;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: #fff;
  box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
  cursor: pointer;
  z-index: 100;
  transition: 0.3s;
  border: 2px solid rgba(255,255,255,0.2);
}
.sticky-trigger:hover { transform: scale(1.1) rotate(10deg); }

.sticky-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  z-index: 101;
  display: none;
  justify-content: flex-end;
}
.sticky-overlay.active { display: flex; animation: fadeIn 0.3s; }

.sticky-sidebar {
  width: 350px;
  max-width: 90%;
  height: 100%;
  background: #0a0f1c;
  border-left: 1px solid var(--neon-purple);
  padding: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: -10px 0 40px rgba(0,0,0,0.5);
  transform: translateX(100%);
  transition: transform 0.3s var(--ease-out);
}
.sticky-overlay.active .sticky-sidebar { transform: translateX(0); }

.sticky-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 15px;
}
.sticky-title { font-family: 'Orbitron'; color: var(--neon-purple); font-size: 18px; }
.close-sticky { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }

.sticky-input-area textarea {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  padding: 10px;
  border-radius: 8px;
  resize: none;
  height: 80px;
  margin-bottom: 10px;
  font-family: 'Rajdhani';
}
.sticky-input-area textarea:focus { border-color: var(--neon-purple); }

.sticky-list {
  flex: 1;
  overflow-y: auto;
  margin-top: 20px;
}
.sticky-note {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
  position: relative;
  animation: slideIn 0.3s;
}
.sticky-note p { font-size: 13px; color: #ccc; margin-bottom: 8px; white-space: pre-wrap; }
.sticky-note img { max-width: 100%; border-radius: 4px; border: 1px solid #333; }
.delete-note {
  position: absolute; top: 5px; right: 5px;
  color: var(--neon-red); cursor: pointer; font-size: 12px;
  background: rgba(0,0,0,0.5); padding: 4px; border-radius: 4px;
}

/* ================= LIGHTBOX ================= */
.lightbox {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  z-index: 2000;
  display: none;
  align-items: center; justify-content: center;
  flex-direction: column;
}
.lightbox.active { display: flex; animation: zoomIn 0.3s; }
.lb-img { max-width: 90%; max-height: 80vh; border: 2px solid var(--neon-cyan); box-shadow: 0 0 30px var(--neon-cyan); }
.lb-close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }

/* ================= TOAST ================= */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: rgba(10, 255, 10, 0.15);
  border: 1px solid var(--neon-green);
  color: var(--neon-green);
  padding: 12px 24px;
  border-radius: 30px;
  font-weight: 600;
  backdrop-filter: blur(10px);
  z-index: 3000;
  transition: 0.4s var(--ease-out);
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 0 20px rgba(10, 255, 10, 0.2);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ================= ANIMATIONS ================= */
@keyframes pulse { 0% { opacity: 1; box-shadow: 0 0 0 0 rgba(10, 255, 10, 0.4); } 70% { opacity: 0.7; box-shadow: 0 0 0 10px rgba(10, 255, 10, 0); } 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(10, 255, 10, 0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #050505; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }

@media (max-width: 768px) {
  .kendala-list { grid-template-columns: 1fr; }
  .main-title { font-size: 28px; }
  .header-wrapper { padding: 30px 15px; }
}
</style>
</head>
<body>

<div class="cyber-grid"></div>
<div class="ambient-glow orb-1"></div>
<div class="ambient-glow orb-2"></div>
<div class="scanlines"></div>

<div class="container">
  <header class="header-wrapper">
    <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i> HOME</a>
    
    <h1 class="main-title glitch-text" data-text="KENDALA ALL">KENDALA ALL</h1>
    <div class="subtitle" id="typing-subtitle"></div>
    
    <div class="status-indicator">
      <span class="dot"></span> SYSTEM ONLINE v2.6
    </div>
  </header>

  <div class="search-container">
    <div class="search-input-wrapper">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="searchInput" placeholder="Cari ID, Masalah, atau Keyword..." autocomplete="off">
    </div>
    
    <div class="stats-row">
      <div class="stat-pill"><strong id="countTotal">0</strong><span>Total Data</span></div>
      <div class="stat-pill"><strong id="countSolved">0</strong><span>Solved</span></div>
      <div class="stat-pill"><strong id="countPending">0</strong><span>Pending</span></div>
    </div>
  </div>

  <div id="loadingState" style="text-align:center; padding: 50px;">
    <i class="fas fa-circle-notch fa-spin" style="font-size: 40px; color: var(--neon-cyan);"></i>
    <p style="margin-top: 15px; color: var(--text-dim);">ACCESSING DATABASE...</p>
  </div>

  <div class="kendala-list" id="kendalaContainer"></div>
</div>

<!-- STICKY NOTES SYSTEM -->
<div class="sticky-trigger" onclick="toggleSticky()">
  <i class="fas fa-sticky-note"></i>
</div>

<div class="sticky-overlay" id="stickyOverlay">
  <div class="sticky-sidebar">
    <div class="sticky-header">
      <span class="sticky-title">MY NOTES</span>
      <button class="close-sticky" onclick="toggleSticky()">&times;</button>
    </div>
    <div class="sticky-input-area">
      <textarea id="noteInput" placeholder="Tulis catatan cepat... (Ctrl+V untuk gambar)"></textarea>
      <button class="btn-action btn-view" style="width:100%" onclick="addNote()">
        <i class="fas fa-plus"></i> SIMPAN NOTE
      </button>
    </div>
    <div class="sticky-list" id="stickyList"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <span class="lb-close">&times;</span>
  <img src="" class="lb-img" id="lbImg">
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <i class="fas fa-check-circle"></i> <span id="toastMsg">Action Success</span>
</div>

<script>
// CONFIG
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=C2:F300`;

let allData = [];
let notes = JSON.parse(localStorage.getItem('neon_notes') || '[]');

// INIT
document.addEventListener('DOMContentLoaded', () => {
  typeWriter("DATABASE SOLUSI & BANTUAN PENGGUNA 2026", 0);
  fetchData();
  renderNotes();
  
  // Search Listener
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = allData.filter(item => 
      item.judul.toLowerCase().includes(term) || 
      item.jawaban1.toLowerCase().includes(term)
    );
    renderCards(filtered);
  });
});

// TYPING EFFECT
function typeWriter(text, i) {
  if (i < text.length) {
    document.getElementById("typing-subtitle").innerHTML += text.charAt(i);
    setTimeout(() => typeWriter(text, i + 1), 30);
  }
}

// FETCH DATA
async function fetchData() {
  try {
    const res = await fetch(DATA_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/)[1]);
    
    allData = json.table.rows.map(row => {
      const c = row.c;
      return {
        judul: c[0]?.v || '',
        ans1: c[1]?.v || '',
        ans2: c[2]?.v || '',
        ans3: c[3]?.v || ''
      };
    }).filter(x => x.judul);
    
    document.getElementById('loadingState').style.display = 'none';
    updateStats();
    renderCards(allData);
  } catch (err) {
    document.getElementById('loadingState').innerHTML = `<p style="color:var(--neon-red)">CONNECTION ERROR: ${err.message}</p>`;
  }
}

// RENDER CARDS WITH TILT EFFECT
function renderCards(data) {
  const container = document.getElementById('kendalaContainer');
  container.innerHTML = '';
  
  if(data.length === 0) {
    container.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#555;">NO DATA FOUND</div>';
    return;
  }

  data.forEach((item, idx) => {
    // Auto Tagging Logic
    let badgeClass = '';
    let badgeText = 'INFO';
    const lowerJ = item.judul.toLowerCase();
    
    if(lowerJ.includes('error') || lowerJ.includes('gagal') || lowerJ.includes('bug')) {
      badgeClass = 'tag-error'; badgeText = 'ERROR';
    } else if(lowerJ.includes('deposit') || lowerJ.includes('wd') || lowerJ.includes('rp')) {
      badgeClass = 'tag-money'; badgeText = 'FINANCE';
    } else if(lowerJ.includes('login') || lowerJ.includes('akun') || lowerJ.includes('pass')) {
      badgeClass = 'tag-account'; badgeText = 'ACCOUNT';
    }

    // Extract Image if exists in answers
    const imgUrl = extractImage(item.ans1);
    const cleanAns1 = item.ans1.replace(/https?:\/\/[^\s]+\.(jpg|png|gif)/i, '');

    const card = document.createElement('div');
    card.className = 'k-card';
    card.innerHTML = `
      <div class="k-header">
        <div class="k-title">${escapeHtml(item.judul)}</div>
        <span class="k-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="k-preview">${escapeHtml(cleanAns1.substring(0, 100))}...</div>
      
      <div class="k-actions">
        <button class="btn-action btn-view" onclick="toggleExpand(this)">
          <i class="fas fa-terminal"></i> VIEW SOLUTION
        </button>
        <button class="btn-action btn-sticky" onclick='saveToSticky("${escapeHtml(item.judul)}", "${escapeHtml(cleanAns1)}")'>
          <i class="fas fa-save"></i>
        </button>
      </div>

      <div class="k-details">
        ${imgUrl ? `<div class="img-container"><img src="${imgUrl}" class="k-img" onclick="openLightbox('${imgUrl}')"></div>` : ''}
        
        <div class="solution-box">
          <span class="solution-label">SOLUTION STEP 1</span>
          ${formatLinks(cleanAns1)}
        </div>
        
        ${item.ans2 ? `<div class="solution-box" style="border-color:var(--neon-purple)">
          <span class="solution-label" style="color:var(--neon-purple)">ALTERNATIVE</span>
          ${formatLinks(item.ans2)}
        </div>` : ''}
        
        <button class="btn-action btn-view" style="margin-top:10px; width:100%" onclick="copyText('${escapeHtml(cleanAns1)}')">
          <i class="fas fa-copy"></i> COPY TEXT
        </button>
      </div>
    `;
    
    // Add 3D Tilt Event Listeners
    card.addEventListener('mousemove', handleTilt);
    card.addEventListener('mouseleave', resetTilt);
    
    container.appendChild(card);
  });
}

// UTILS
function extractImage(text) {
  if(!text) return null;
  const match = text.match(/https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp)/i);
  return match ? match[0] : null;
}

function formatLinks(text) {
  if(!text) return '';
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  return text.replace(urlRegex, url => `<a href="${url}" target="_blank" class="link-btn"><i class="fas fa-external-link-alt"></i> OPEN LINK</a>`).replace(/\n/g, '<br>');
}

function escapeHtml(text) {
  if(!text) return '';
  return text.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toggleExpand(btn) {
  const card = btn.closest('.k-card');
  card.classList.toggle('expanded');
  btn.innerHTML = card.classList.contains('expanded') ? '<i class="fas fa-chevron-up"></i> CLOSE' : '<i class="fas fa-terminal"></i> VIEW SOLUTION';
}

// 3D TILT LOGIC
function handleTilt(e) {
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  const centerX = rect.width / 2;
  const centerY = rect.height / 2;
  
  const rotateX = ((y - centerY) / centerY) * -5; // Max 5 deg rotation
  const rotateY = ((x - centerX) / centerX) * 5;

  card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
}

function resetTilt(e) {
  e.currentTarget.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)';
}

// STICKY NOTES
function toggleSticky() {
  document.getElementById('stickyOverlay').classList.toggle('active');
}

function addNote() {
  const input = document.getElementById('noteInput');
  const text = input.value.trim();
  if(!text) return;
  
  notes.unshift({ text, date: new Date().toLocaleTimeString() });
  localStorage.setItem('neon_notes', JSON.stringify(notes));
  input.value = '';
  renderNotes();
  showToast('Note Saved!');
}

function saveToSticky(title, content) {
  const text = `REF: ${title}\n${content.substring(0, 100)}...`;
  notes.unshift({ text, date: 'Auto-Saved' });
  localStorage.setItem('neon_notes', JSON.stringify(notes));
  renderNotes();
  toggleSticky();
  showToast('Saved to Notes');
}

function renderNotes() {
  const list = document.getElementById('stickyList');
  list.innerHTML = notes.map((n, i) => `
    <div class="sticky-note">
      <span class="delete-note" onclick="delNote(${i})"><i class="fas fa-trash"></i></span>
      <p>${n.text}</p>
      <small style="color:#555; font-size:10px">${n.date}</small>
    </div>
  `).join('');
}

function delNote(i) {
  notes.splice(i, 1);
  localStorage.setItem('neon_notes', JSON.stringify(notes));
  renderNotes();
}

// LIGHTBOX & TOAST
function openLightbox(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox(e) {
  if(!e || e.target.id === 'lightbox' || e.target.className === 'lb-close') {
    document.getElementById('lightbox').classList.remove('active');
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text.replace(/<[^>]*>/g, ''));
  showToast('Text Copied to Clipboard');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function updateStats() {
  document.getElementById('countTotal').innerText = allData.length;
  // Simulasi statistik acak untuk demo visual
  document.getElementById('countSolved').innerText = Math.floor(allData.length * 0.85);
  document.getElementById('countPending').innerText = Math.floor(allData.length * 0.15);
}
</script>

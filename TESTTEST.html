<style>
/* ✨✨ ULTRA MODERN CSS VARIABLES ✨✨ */
:root, [data-theme="dark"] {
/* Neon Spectrum */
--neon-cyan: #00f7ff;
--neon-blue: #00e5ff;
--neon-electric: #00ffff;
--neon-purple: #9d4fff;
--neon-violet: #b75cff;
--neon-pink: #ff00d4;
--neon-magenta: #ff00aa;
--neon-green: #00ff9d;
--neon-gold: #ffd700;
--neon-orange: #ff6b35;

/* Background System - Dark */
--bg-void: #000105;
--bg-deep: #00030a;
--bg-surface: rgba(4, 12, 32, 0.94);
--bg-elevated: rgba(8, 24, 56, 0.92);
--bg-glass: rgba(6, 18, 44, 0.72);
--bg-glass-strong: rgba(10, 28, 62, 0.88);
--bg-card: rgba(12, 32, 68, 0.85);

/* Text System - Dark */
--text-primary: #ffffff;
--text-secondary: #a8d8ff;
--text-tertiary: #6b89b8;
--text-dim: #4a5f8a;
--text-glow: rgba(0, 247, 255, 0.85);

/* Border & Glow */
--border-subtle: rgba(0, 247, 255, 0.35);
--border-glow: rgba(0, 247, 255, 0.65);
--border-intense: rgba(0, 247, 255, 0.95);
--glow-soft: 0 0 20px rgba(0, 247, 255, 0.4), 0 0 45px rgba(0, 247, 255, 0.22);
--glow-medium: 0 0 35px rgba(0, 247, 255, 0.65), 0 0 70px rgba(0, 247, 255, 0.38), 0 0 120px rgba(0, 247, 255, 0.22);
--glow-intense: 0 0 45px rgba(0, 247, 255, 0.85), 0 0 95px rgba(0, 247, 255, 0.55), 0 0 160px rgba(0, 247, 255, 0.35);
--glow-purple: 0 0 35px rgba(157, 79, 255, 0.65), 0 0 70px rgba(157, 79, 255, 0.4);
--glow-pink: 0 0 35px rgba(255, 0, 212, 0.65), 0 0 70px rgba(255, 0, 212, 0.4);
--glow-green: 0 0 35px rgba(0, 255, 157, 0.65), 0 0 70px rgba(0, 255, 157, 0.4);

/* Animation System */
--ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
--ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
--ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
--ease-spring: cubic-bezier(0.5, 1.2, 0.4, 1);
--transition-fast: 180ms var(--ease-smooth);
--transition-normal: 320ms var(--ease-smooth);
--transition-slow: 650ms var(--ease-bounce);
--transition-elastic: 420ms var(--ease-elastic);
--transition-spring: 380ms var(--ease-spring);

/* Layout System */
--radius-xs: 6px;
--radius-sm: 10px;
--radius-md: 16px;
--radius-lg: 24px;
--radius-xl: 32px;
--radius-xxl: 48px;
--radius-full: 999px;
--spacing-xxs: 4px;
--spacing-xs: 8px;
--spacing-sm: 14px;
--spacing-md: 22px;
--spacing-lg: 34px;
--spacing-xl: 52px;
--spacing-xxl: 78px;

/* Typography */
--font-display: 'Orbitron', system-ui, sans-serif;
--font-body: 'Rajdhani', 'Exo 2', system-ui, sans-serif;
--text-xs: 11px;
--text-sm: 13px;
--text-base: 15px;
--text-lg: 18px;
--text-xl: 22px;
--text-2xl: 28px;
--text-3xl: 36px;
--text-4xl: 48px;
--text-5xl: 64px;

/* Z-Index Scale */
--z-bg: -10;
--z-effects: -5;
--z-content: 1;
--z-overlay: 100;
--z-modal: 1000;
--z-toast: 10000;
}

/* ✨✨ LIGHT THEME ✨✨ */
[data-theme="light"] {
--bg-void: #f8fafc;
--bg-deep: #eef2f7;
--bg-surface: rgba(255, 255, 255, 0.92);
--bg-elevated: rgba(248, 250, 252, 0.95);
--bg-glass: rgba(255, 255, 255, 0.78);
--bg-glass-strong: rgba(241, 245, 249, 0.92);
--bg-card: rgba(255, 255, 255, 0.88);

--text-primary: #0a1628;
--text-secondary: #1e3a5f;
--text-tertiary: #4a6b9a;
--text-dim: #6b89b8;
--text-glow: rgba(0, 180, 220, 0.6);

--border-subtle: rgba(0, 180, 220, 0.35);
--border-glow: rgba(0, 180, 220, 0.55);
--border-intense: rgba(0, 180, 220, 0.85);
--glow-soft: 0 0 20px rgba(0, 180, 220, 0.25), 0 0 40px rgba(0, 180, 220, 0.12);
--glow-medium: 0 0 30px rgba(0, 180, 220, 0.4), 0 0 60px rgba(0, 180, 220, 0.22), 0 0 100px rgba(0, 180, 220, 0.12);
--glow-intense: 0 0 40px rgba(0, 180, 220, 0.6), 0 0 80px rgba(0, 180, 220, 0.35), 0 0 140px rgba(0, 180, 220, 0.2);

--neon-cyan: #00bcd4;
--neon-blue: #03a9f4;
--neon-electric: #00e5ff;
--neon-purple: #7e57c2;
--neon-pink: #ec407a;
--neon-green: #26a69a;
}

/* ✨✨ BASE & RESET ✨✨ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
::view-transition-group(*), ::view-transition-old(*), ::view-transition-new(*) { animation-duration: 0.4s; }
html { scroll-behavior: smooth; scroll-padding-top: 24px; }
body {
font-family: var(--font-body);
background: var(--bg-void);
color: var(--text-primary);
min-height: 100vh;
min-height: 100dvh;
overflow-x: hidden;
position: relative;
line-height: 1.65;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
transition: background-color var(--transition-normal), color var(--transition-normal);
}
body::before {
content: '';
position: fixed;
inset: 0;
background: radial-gradient(1200px 600px at 10% 15%, rgba(0, 247, 255, 0.08) 0%, transparent 60%),
radial-gradient(1000px 500px at 90% 20%, rgba(157, 79, 255, 0.07) 0%, transparent 60%),
radial-gradient(900px 450px at 50% 95%, rgba(255, 0, 212, 0.05) 0%, transparent 65%);
animation: bgDrift 30s ease-in-out infinite alternate;
z-index: var(--z-bg);
pointer-events: none;
}
@keyframes bgDrift {
0%, 100% { transform: translate(0, 0) scale(1); filter: hue-rotate(0deg); }
33% { transform: translate(1.5%, -0.8%) scale(1.025); filter: hue-rotate(12deg); }
66% { transform: translate(-0.8%, 1.2%) scale(0.985); filter: hue-rotate(-8deg); }
}

/* ✨✨ GRID & AURORA ✨✨ */
.grid-pattern {
position: fixed; inset: 0; z-index: var(--z-effects);
background-image:
linear-gradient(rgba(0, 247, 255, 0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 247, 255, 0.05) 1px, transparent 1px);
background-size: 48px 48px;
mask-image: radial-gradient(ellipse 75% 70% at 50% 50%, black 25%, transparent 82%);
animation: gridFlow 35s linear infinite; opacity: 0.9; pointer-events: none;
}
@keyframes gridFlow { 0% { background-position: 0 0; } 100% { background-position: 48px 48px; } }

.aurora { position: fixed; inset: 0; z-index: var(--z-effects); pointer-events: none; overflow: hidden; }
.aurora-wave {
position: absolute; width: 220%; height: 220%; top: -60%; left: -60%;
background: radial-gradient(ellipse at 30% 40%, rgba(0, 247, 255, 0.07) 0%, transparent 52%),
radial-gradient(ellipse at 70% 62%, rgba(157, 79, 255, 0.07) 0%, transparent 52%),
radial-gradient(ellipse at 52% 28%, rgba(255, 0, 212, 0.04) 0%, transparent 58%);
animation: auroraWave 40s ease-in-out infinite; filter: blur(50px); opacity: 0.65;
}
.aurora-wave:nth-child(2) { animation-delay: -15s; animation-duration: 48s; opacity: 0.45; filter: blur(70px); }
@keyframes auroraWave {
0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
25% { transform: translate(2.5%, -1.2%) rotate(0.6deg) scale(1.035); }
50% { transform: translate(-1.2%, 2.5%) rotate(-0.4deg) scale(0.975); }
75% { transform: translate(1.2%, 1.2%) rotate(0.25deg) scale(1.015); }
}

/* ✨✨ PARTICLES ✨✨ */
.particles { position: fixed; inset: 0; z-index: var(--z-effects); pointer-events: none; overflow: hidden; }
.particle {
position: absolute; width: 3px; height: 3px; border-radius: 50%; opacity: 0;
animation: particleLife 28s infinite ease-in-out;
}
.particle.active { opacity: 0.88; }
.particle:nth-child(4n+1) { background: var(--neon-cyan); box-shadow: 0 0 14px var(--neon-cyan), 0 0 30px rgba(0, 247, 255, 0.55); }
.particle:nth-child(4n+2) { background: var(--neon-purple); box-shadow: 0 0 14px var(--neon-purple), 0 0 30px rgba(157, 79, 255, 0.55); }
.particle:nth-child(4n+3) { background: var(--neon-pink); box-shadow: 0 0 14px var(--neon-pink), 0 0 30px rgba(255, 0, 212, 0.55); }
.particle:nth-child(4n+4) { background: var(--neon-green); box-shadow: 0 0 14px var(--neon-green), 0 0 30px rgba(0, 255, 157, 0.55); }
@keyframes particleLife {
0%, 100% { transform: translateY(100vh) rotate(0deg) scale(0.4); opacity: 0; }
12% { opacity: 0.88; }
88% { opacity: 0.88; }
100% { transform: translateY(-100vh) rotate(720deg) scale(1.3); opacity: 0; }
}

/* ✨✨ LIGHTNING & SCANLINE ✨✨ */
.lightning { position: fixed; inset: 0; z-index: var(--z-effects); pointer-events: none; }
.lightning-bolt {
position: absolute; top: -100vh; width: 2px; height: 200vh;
background: linear-gradient(180deg, transparent 0%, var(--neon-electric) 22%, var(--neon-cyan) 45%, var(--neon-purple) 65%, var(--neon-pink) 85%, transparent 100%);
filter: blur(2.5px) brightness(1.25); opacity: 0; animation: lightningStrike 14s infinite;
box-shadow: 0 0 28px var(--neon-electric), 0 0 58px rgba(0, 247, 255, 0.45);
}
.lightning-bolt:nth-child(1) { left: 14%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 4.5s; }
.lightning-bolt:nth-child(3) { left: 86%; animation-delay: 9s; }
@keyframes lightningStrike {
0%, 87%, 89%, 91%, 100% { opacity: 0; transform: scaleY(0.25) translateY(-25%); }
88%, 90% { opacity: 0.28; transform: scaleY(1) translateY(0); }
}

.scanline {
position: fixed; left: 0; right: 0; height: 4px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-cyan), var(--neon-purple), transparent);
opacity: 0.45; animation: scanMove 6.5s linear infinite; z-index: 100; pointer-events: none;
filter: blur(1.2px); box-shadow: 0 0 24px var(--neon-electric);
}
@keyframes scanMove { 0% { top: -12px; opacity: 0; } 6% { opacity: 0.45; } 94% { opacity: 0.45; } 100% { top: 100%; opacity: 0; } }

.noise {
position: fixed; inset: 0; z-index: 5; opacity: 0.032;
background-image: url("image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
pointer-events: none; animation: noiseAnim 0.45s steps(12) infinite;
}
@keyframes noiseAnim { 0%,100%{transform:translate(0,0)}25%{transform:translate(-1px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,-2px)} }

/* ✨✨ LAYOUT ✨✨ */
.container { max-width: 1480px; margin: 0 auto; padding: var(--spacing-lg) var(--spacing-md); min-height: 100vh; min-height: 100dvh; position: relative; }

/* ✨✨ HEADER ✨✨ */
.header { text-align: center; margin-bottom: var(--spacing-xl); animation: headerReveal var(--transition-slow) backwards; position: relative; padding-bottom: var(--spacing-lg); }
.header::after {
content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
width: 260px; height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-cyan), var(--neon-purple), var(--neon-pink), transparent);
border-radius: 2px; box-shadow: var(--glow-intense); animation: glowPulse 3.2s ease-in-out infinite;
}
@keyframes headerReveal { from { opacity: 0; transform: translateY(-45px) scale(0.985); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes glowPulse { 0%,100%{opacity:0.82;box-shadow:var(--glow-intense)}50%{opacity:1;box-shadow:0 0 55px rgba(0,247,255,0.92),0 0 110px rgba(0,247,255,0.62),0 0 200px rgba(0,247,255,0.38)} }

/* ✨✨ CONTROLS BAR ✨✨ */
.controls-bar {
display: flex; align-items: center; justify-content: space-between; gap: var(--spacing-sm);
margin-bottom: var(--spacing-lg); padding: var(--spacing-sm) var(--spacing-md);
background: var(--bg-glass); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
backdrop-filter: blur(18px); box-shadow: var(--glow-soft); flex-wrap: wrap;
}
.controls-left, .controls-right { display: flex; align-items: center; gap: var(--spacing-xs); flex-wrap: wrap; }

/* Theme Toggle */
.theme-toggle {
width: 52px; height: 32px; background: var(--bg-elevated); border: 1px solid var(--border-glow);
border-radius: var(--radius-full); position: relative; cursor: pointer; transition: var(--transition-normal);
display: flex; align-items: center; padding: 3px;
}
.theme-toggle::before {
content: ''; position: absolute; width: 24px; height: 24px; border-radius: 50%;
background: linear-gradient(135deg, var(--neon-cyan), var(--neon-electric));
left: 4px; transition: transform var(--transition-spring); box-shadow: 0 0 12px rgba(0, 247, 255, 0.6);
}
[data-theme="light"] .theme-toggle::before { transform: translateX(20px); background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)); }
.theme-toggle i { position: absolute; font-size: 13px; transition: opacity var(--transition-fast); }
.theme-toggle .fa-moon { left: 9px; color: var(--bg-deep); opacity: 1; }
.theme-toggle .fa-sun { right: 9px; color: var(--bg-deep); opacity: 0; }
[data-theme="light"] .theme-toggle .fa-moon { opacity: 0; }
[data-theme="light"] .theme-toggle .fa-sun { opacity: 1; }

/* View Toggle */
.view-toggle { display: flex; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; }
.view-btn {
padding: 8px 14px; background: transparent; border: none; color: var(--text-tertiary);
font-family: var(--font-display); font-size: var(--text-xs); font-weight: 600; cursor: pointer;
transition: var(--transition-fast); display: flex; align-items: center; gap: 5px;
}
.view-btn.active, .view-btn:hover { background: var(--bg-glass-strong); color: var(--neon-cyan); }

/* Filter Select */
.filter-select {
padding: 9px 32px 9px 14px; background: var(--bg-elevated); border: 1px solid var(--border-subtle);
border-radius: var(--radius-md); color: var(--text-primary); font-family: var(--font-body);
font-size: var(--text-sm); cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg fill='%2300f7ff' viewBox='0 0 24 24'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
background-repeat: no-repeat; background-position: right 10px center; background-size: 16px;
transition: var(--transition-fast);
}
.filter-select:focus { outline: none; border-color: var(--neon-electric); box-shadow: var(--glow-soft); }

/* Search */
.search-container { position: relative; flex: 1; min-width: 200px; max-width: 480px; }
.search-box {
width: 100%; padding: 12px 48px 12px 20px; background: var(--bg-elevated);
border: 1px solid var(--border-glow); border-radius: var(--radius-lg); color: var(--text-primary);
font-family: var(--font-body); font-size: var(--text-sm); transition: var(--transition-normal);
backdrop-filter: blur(14px);
}
.search-box:focus { outline: none; border-color: var(--neon-electric); box-shadow: var(--glow-medium); background: var(--bg-glass-strong); }
.search-box::placeholder { color: var(--text-tertiary); }
.search-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--neon-cyan); font-size: 16px; pointer-events: none; transition: var(--transition-fast); }
.search-box:focus + .search-icon { color: var(--neon-electric); }

/* ✨✨ TYPOGRAPHY ✨✨ */
.back-btn {
position: fixed; left: var(--spacing-md); top: var(--spacing-md);
background: var(--bg-glass); border: 1px solid var(--border-glow); color: var(--neon-cyan);
padding: 8px 18px; border-radius: var(--radius-full); text-decoration: none;
font-weight: 700; font-size: var(--text-xs); display: flex; align-items: center; gap: 8px;
transition: var(--transition-normal); backdrop-filter: blur(16px); z-index: 1000;
box-shadow: var(--glow-soft); letter-spacing: 0.5px;
}
.back-btn:hover { background: var(--bg-glass-strong); transform: translateX(-4px) scale(1.03); box-shadow: var(--glow-medium); color: var(--bg-deep); border-color: var(--neon-electric); }
.back-btn i { font-size: 13px; transition: var(--transition-fast); }
.back-btn:hover i { transform: translateX(-2px); }

.title {
font-family: var(--font-display); font-size: clamp(34px, 9vw, 62px); font-weight: 900;
letter-spacing: 7px; margin-bottom: 14px; position: relative;
background: linear-gradient(135deg, var(--neon-electric) 0%, var(--neon-cyan) 28%, #ffffff 52%, var(--neon-cyan) 76%, var(--neon-purple) 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
text-shadow: 0 0 45px rgba(0, 247, 255, 0.68); animation: titleShimmer 3.2s ease-in-out infinite, titleFloat 5.5s ease-in-out infinite;
}
@keyframes titleShimmer { 0%,100%{filter:brightness(1) contrast(1)}50%{filter:brightness(1.48) contrast(1.06)} }
@keyframes titleFloat { 0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)} }

.subtitle {
font-size: var(--text-xs); color: var(--text-secondary); letter-spacing: 8px;
text-transform: uppercase; margin-bottom: 20px; font-weight: 600;
text-shadow: 0 0 14px rgba(0, 247, 255, 0.48); font-family: var(--font-display);
}

.status-badge {
display: inline-flex; align-items: center; gap: 14px; padding: 9px 26px;
background: rgba(0, 255, 157, 0.18); border: 1px solid rgba(0, 255, 157, 0.58);
border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 700;
color: var(--neon-green); text-transform: uppercase; letter-spacing: 3px;
animation: statusPulse 2.4s ease-in-out infinite; box-shadow: var(--glow-green);
font-family: var(--font-display);
}
@keyframes statusPulse { 0%,100%{box-shadow:0 0 22px rgba(0,255,157,0.42)}50%{box-shadow:0 0 45px rgba(0,255,157,0.78)} }
.status-dot {
width: 10px; height: 10px; background: var(--neon-green); border-radius: 50%;
animation: dotBeat 1.5s ease-in-out infinite;
box-shadow: 0 0 20px var(--neon-green), 0 0 42px rgba(0, 255, 157, 0.62);
}
@keyframes dotBeat { 0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.65);opacity:0.88} }

/* ✨✨ NAVIGATION ✨✨ */
.nav-tabs { display: flex; gap: 16px; justify-content: center; margin-bottom: var(--spacing-lg); flex-wrap: wrap; }
.nav-tab {
padding: 13px 30px; background: var(--bg-surface); border: 1px solid var(--border-subtle);
border-radius: var(--radius-lg); color: var(--text-primary); font-family: var(--font-display);
font-size: var(--text-xs); font-weight: 700; cursor: pointer; transition: all 0.42s var(--ease-smooth);
text-transform: uppercase; letter-spacing: 2px; backdrop-filter: blur(14px);
position: relative; overflow: hidden; display: flex; align-items: center; gap: 9px;
}
.nav-tab::before {
content: ''; position: absolute; inset: 0;
background: linear-gradient(135deg, rgba(0, 247, 255, 0.24), rgba(157, 79, 255, 0.2), rgba(255, 0, 212, 0.14));
opacity: 0; transition: opacity 0.42s;
}
.nav-tab:hover, .nav-tab.active {
background: var(--bg-elevated); border-color: var(--neon-electric);
box-shadow: var(--glow-medium); transform: translateY(-5px); color: var(--neon-cyan);
}
.nav-tab:hover::before, .nav-tab.active::before { opacity: 1; }
.nav-tab i { font-size: 15px; }

.section { display: none; animation: sectionFade var(--transition-slow); }
.section.active { display: block; }
@keyframes sectionFade { from { opacity: 0; transform: translateY(35px); } to { opacity: 1; transform: translateY(0); } }

/* ✨✨ GALLERY GRID ✨✨ */
.gallery-section { margin-bottom: var(--spacing-xl); }
.section-title {
font-family: var(--font-display); font-size: var(--text-lg); font-weight: 700;
color: var(--text-primary); margin-bottom: var(--spacing-md); padding-bottom: 16px;

.photo-wrapper {

/* ✨✨ ACTION BUTTONS ✨✨ */

<script>
// ✨ State Management
const state = {
photos: [], favorites: JSON.parse(localStorage.getItem('ltg_favs')||'[]'),
theme: localStorage.getItem('ltg_theme')||'dark', view: 'grid', filter: 'all', search: ''
};

// ✨ Init
document.addEventListener('DOMContentLoaded', () => {
initTheme(); initParticles(); initControls(); fetchPhotos(); initKeyboard();
});

// ✨ Theme System
function initTheme() {
document.documentElement.setAttribute('data-theme', state.theme);
document.getElementById('themeToggle').addEventListener('click', () => {
state.theme = state.theme === 'dark' ? 'light' : 'dark';
document.documentElement.setAttribute('data-theme', state.theme);
localStorage.setItem('ltg_theme', state.theme);
showToast(`🎨 Theme: ${state.theme.toUpperCase()}`);
});
}

// ✨ Particles
function initParticles() {
const container = document.getElementById('particles'); if (!container) return;
for(let i=0;i<75;i++){const p=document.createElement('div');p.className='particle';
p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';
p.style.animationDelay=Math.random()*35+'s';p.style.animationDuration=(22+Math.random()*35)+'s';
setTimeout(()=>p.classList.add('active'),Math.random()*2500);container.appendChild(p);}
}

// ✨ Controls
function initControls() {
// View toggle
document.querySelectorAll('.view-btn').forEach(btn=>btn.addEventListener('click',e=>{
document.querySelectorAll('.view-btn').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-pressed','false');});
e.currentTarget.classList.add('active');e.currentTarget.setAttribute('aria-pressed','true');
state.view=e.currentTarget.dataset.view;
document.getElementById('galleryGrid').classList.toggle('list-view',state.view==='list');
showToast(`📐 View: ${state.view.toUpperCase()}`);
}));
// Filter
document.getElementById('filterSelect').addEventListener('change',e=>{state.filter=e.target.value;applyFilters();});
// Search
document.getElementById('searchInput').addEventListener('input',e=>{state.search=e.target.value.toLowerCase();applyFilters();});
}

// ✨ Fetch Photos
async function fetchPhotos() {
document.getElementById('loading').classList.add('active');
document.getElementById('progressContainer').classList.add('active');
simulateProgress();
try {
const sheetId='1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0',gid='1246502038';
let photos=[];
try {
const res=await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
const text=await res.text(),json=JSON.parse(text.substring(47).slice(0,-2));
photos=json.table.rows.filter(r=>r.c?.[0]?.v&&r.c?.[1]?.v).map((r,i)=>({judul:r.c[0].v,foto:r.c[1].v,index:i+2,ts:Date.now()-i*3600000}));
}catch(e){
const csv=await(await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
photos=csv.split('\n').map(r=>r.split(',')).filter(r=>r[0]?.trim()&&r[1]?.trim()).map((r,i)=>({judul:r[0].replace(/"/g,'').trim(),foto:r[1].replace(/"/g,'').trim(),index:i+2,ts:Date.now()-i*3600000}));
}
state.photos=photos; applyFilters(); showToast(`⚡ ${photos.length} foto dimuat`);
}catch(err){console.error(err);showToast('❗ Gagal memuat');
document.getElementById('galleryGrid').innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:65px;color:var(--text-tertiary)"><i class="fas fa-exclamation-triangle" style="font-size:54px;color:var(--neon-pink);margin-bottom:22px"></i><h3 style="font-family:var(--font-display);color:var(--neon-cyan);margin-bottom:14px">Gagal Memuat</h3><p>Periksa koneksi atau publikasi Sheets</p></div>`;}
document.getElementById('loading').classList.remove('active');
document.getElementById('progressContainer').classList.remove('active');
document.getElementById('progressBar').style.width='0%';
}

function simulateProgress() {
let p=0;const bar=document.getElementById('progressBar');
const int=setInterval(()=>{p+=Math.random()*15;if(p>=90){p=90;clearInterval(int);}bar.style.width=p+'%';},180);
}

// ✨ Render
function applyFilters() {
let filtered=state.photos;
if(state.filter==='favorites') filtered=filtered.filter(p=>state.favorites.includes(p.foto));
if(state.filter==='recent') filtered=[...filtered].sort((a,b)=>b.ts-a.ts).slice(0,20);
if(state.search) filtered=filtered.filter(p=>p.judul.toLowerCase().includes(state.search));
renderGallery(filtered);
}

function renderGallery(photos) {
const grid=document.getElementById('galleryGrid'); grid.innerHTML='';
if(!photos.length){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:65px;color:var(--text-tertiary)"><i class="fas fa-search" style="font-size:54px;margin-bottom:22px;opacity:0.6"></i><h3 style="font-family:var(--font-display);color:var(--neon-cyan);margin-bottom:14px">Tidak Ditemukan</h3><p>Coba kata kunci lain</p></div>`;return;}
photos.forEach((photo,idx)=>grid.appendChild(createCard(photo,idx)));
}

function createCard(url,title,index) {
const isFav=state.favorites.includes(url);
const card=document.createElement('div');card.className='photo-card';card.setAttribute('role','listitem');
card.innerHTML=`<div class="photo-wrapper"><button class="fav-btn ${isFav?'active':''}" aria-label="${isFav?'Hapus':'Tambah'} favorit" onclick="toggleFav('${url}',this)"><i class="fas fa-${isFav?'heart':'heart'}"></i></button><img src="${url}" alt="${title}" onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00f7ff?text=No+Image'" loading="lazy" onclick="viewFullImage('${url}','${title.replace(/'/g,"\\'")}')" style="cursor:pointer"></div><div class="photo-info"><div class="photo-title">${title}</div><div class="photo-meta"><span><i class="fas fa-hashtag"></i> #${index+1}</span><span><i class="fas fa-clock"></i> ${formatTime(state.photos.find(p=>p.foto===url)?.ts||Date.now())}</span></div><div class="action-buttons-row"><button class="action-btn copy-btn" onclick="copyPhoto('${url}')" title="Salin"><i class="fas fa-copy"></i><span>Copy</span></button><button class="action-btn download-btn" onclick="downloadPhoto('${url}','${title.replace(/'/g,"\\'")}')" title="Download"><i class="fas fa-download"></i><span>Download</span></button><button class="action-btn share-btn" onclick="sharePhoto('${url}','${title.replace(/'/g,"\\'")}')" title="Bagikan"><i class="fas fa-share-alt"></i><span>Share</span></button></div></div>`;
return card;
}

// ✨ Helpers
function formatTime(ts){const d=new Date(ts);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}
function toggleFav(url,btn){const i=state.favorites.indexOf(url);if(i>-1){state.favorites.splice(i,1);btn.classList.remove('active');btn.innerHTML='<i class="fas fa-heart"></i>';showToast('⭐ Dihapus dari favorit');}else{state.favorites.push(url);btn.classList.add('active');showToast('⭐ Ditambahkan ke favorit');}localStorage.setItem('ltg_favs',JSON.stringify(state.favorites));if(state.filter==='favorites')applyFilters();}

// ✨ Modal
let currentImg='',currentTitle='';
function viewFullImage(url,title){currentImg=url;currentTitle=title;
document.getElementById('modalTitle').textContent=title;document.getElementById('modalImage').src=url;document.getElementById('modalImage').alt=title;
document.getElementById('infoTitle').textContent=title;document.getElementById('infoFormat').textContent=url.split('.').pop().toUpperCase();
fetch(url).then(r=>r.blob()).then(b=>document.getElementById('infoSize').textContent=(b.size/1024).toFixed(1)+' KB');
document.getElementById('imageModal').classList.add('active');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('imageModal').classList.remove('active');document.getElementById('modalImage').classList.remove('zoomed');document.body.style.overflow='';currentImg=currentTitle='';}
document.getElementById('modalImage').addEventListener('click',e=>e.currentTarget.classList.toggle('zoomed'));

// ✨ Actions
async function copyPhoto(url){try{const b=await(await fetch(url)).blob();await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]);showToast('✅ Disalin!');}catch{showToast('❗ Klik kanan gambar > Copy');}}
async function copyImage(){if(currentImg)await copyPhoto(currentImg);}
function downloadPhoto(url,filename){const a=document.createElement('a');a.href=url;a.download=`${filename.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`;a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);showToast('⚡ Download...');}
function downloadModalImage(){if(currentImg)downloadPhoto(currentImg,currentTitle);}
async function sharePhoto(url,title){if(navigator.share){try{const b=await(await fetch(url)).blob();await navigator.share({title,title,text:'Lihat foto ini:',files:[new File([b],`${title}.jpg`,{type:b.type})]});showToast('🔗 Dibagikan!');}catch(e){if(e.name!=='AbortError')showToast('❗ Gagal share');}}else{copyPhoto(url);showToast('✅ Link disalin!');}}
function shareImage(){if(currentImg)sharePhoto(currentImg,currentTitle);}

// ✨ Toast
function showToast(msg){const t=document.getElementById('toast');document.getElementById('toastText').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4200);}

// ✨ Keyboard
function initKeyboard(){
document.addEventListener('keydown',e=>{
if(e.key==='Escape')closeModal();
if(e.ctrlKey&&e.key==='k'){e.preventDefault();document.getElementById('searchInput')?.focus();}
if(e.key==='?'){e.preventDefault();document.getElementById('shortcutsModal').classList.toggle('active');}
if(e.key==='d'){e.preventDefault();document.getElementById('themeToggle').click();}
if(e.key==='g'){e.preventDefault();setView('grid');}
if(e.key==='l'){e.preventDefault();setView('list');}
});
document.getElementById('imageModal')?.addEventListener('click',e=>{if(e.target.id==='imageModal')closeModal();});
}
function setView(v){document.querySelector(`.view-btn[data-view="${v}"]`)?.click();}

// ✨ PWA Install Prompt (optional)
let deferredPrompt; window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});
</script>
</body>
</html>

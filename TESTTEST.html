<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff00aa">
<meta name="description" content="LINE TOGEL Photo Gallery - Cyber Portal 2026">
<title>⚡ GALERI - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== NEON CYBER VARIABLES ===== */
:root {
  --neon-primary: #ff00aa;
  --neon-secondary: #7b2fff;
  --neon-accent: #00f5ff;
  --neon-success: #00ff9d;
  --neon-warning: #ffd700;
  
  --bg-base: #030104;
  --bg-card: rgba(12, 4, 18, 0.85);
  --bg-overlay: rgba(8, 2, 12, 0.92);
  --bg-glass: rgba(20, 8, 28, 0.7);
  
  --text-main: #ffffff;
  --text-muted: #b8a4c9;
  --text-dim: #6b5a7a;
  
  --border-neon: rgba(255, 0, 170, 0.5);
  --border-glow: rgba(123, 47, 255, 0.4);
  
  --glow-pink: 0 0 20px rgba(255, 0, 170, 0.6), 0 0 50px rgba(255, 0, 170, 0.3);
  --glow-purple: 0 0 20px rgba(123, 47, 255, 0.6), 0 0 50px rgba(123, 47, 255, 0.3);
  --glow-cyan: 0 0 20px rgba(0, 245, 255, 0.6), 0 0 50px rgba(0, 245, 255, 0.3);
  
  --ease-bloom: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
  
  --radius: 14px;
  --radius-lg: 22px;
}

/* ===== RESET ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-base);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.5;
}

/* ===== ANIMATED BACKGROUND ===== */
.bg-animated {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(ellipse at 20% 10%, rgba(255, 0, 170, 0.15) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 25%, rgba(123, 47, 255, 0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 85%, rgba(0, 245, 255, 0.08) 0%, transparent 60%);
  animation: bgShift 25s ease-in-out infinite alternate;
}
@keyframes bgShift {
  0%, 100% { filter: hue-rotate(0deg) brightness(1); }
  50% { filter: hue-rotate(25deg) brightness(1.08); }
}

.grid-pattern {
  position: fixed; inset: 0; z-index: -2;
  background-image: 
    linear-gradient(rgba(255, 0, 170, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 0, 170, 0.03) 1px, transparent 1px);
  background-size: 45px 45px;
  mask-image: radial-gradient(ellipse 65% 55% at 50% 50%, black 35%, transparent 80%);
  animation: gridSlide 35s linear infinite;
  pointer-events: none;
}
@keyframes gridSlide {
  0% { background-position: 0 0; }
  100% { background-position: 45px 45px; }
}

.particles {
  position: fixed; inset: 0; z-index: -1;
  pointer-events: none; overflow: hidden;
}
.particle {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  animation: floatUp linear infinite;
  opacity: 0;
}
.particle.pink { 
  background: var(--neon-primary); 
  box-shadow: 0 0 12px var(--neon-primary);
  animation-duration: 28s;
}
.particle.purple { 
  background: var(--neon-secondary); 
  box-shadow: 0 0 12px var(--neon-secondary);
  animation-duration: 32s;
}
.particle.cyan { 
  background: var(--neon-accent); 
  box-shadow: 0 0 12px var(--neon-accent);
  animation-duration: 36s;
}
@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0.8); opacity: 0; }
  15%, 85% { opacity: 0.9; }
  100% { transform: translateY(-100vh) scale(1.2) rotate(720deg); opacity: 0; }
}

.vignette {
  position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(ellipse at center, transparent 45%, rgba(3, 1, 4, 0.7) 100%);
  pointer-events: none;
}

/* ===== LAYOUT ===== */
.container {
  max-width: 1500px;
  margin: 0 auto;
  padding: 24px 20px;
  min-height: 100vh;
  position: relative;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  margin-bottom: 32px;
  padding-top: 12px;
  animation: fadeInDown 700ms var(--ease-bloom) backwards;
}
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-40px); }
  to { opacity: 1; transform: translateY(0); }
}

.back-link {
  position: fixed;
  left: 20px; top: 20px;
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px;
  background: var(--bg-glass);
  border: 1px solid var(--border-neon);
  border-radius: 50px;
  color: var(--neon-primary);
  text-decoration: none;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  transition: all 300ms var(--ease-smooth);
  backdrop-filter: blur(12px);
  z-index: 100;
  box-shadow: var(--glow-pink);
}
.back-link:hover {
  background: rgba(255, 0, 170, 0.2);
  transform: translateX(-5px);
  color: var(--text-main);
}

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(36px, 8vw, 56px);
  font-weight: 900;
  letter-spacing: 6px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, 
    var(--neon-primary), 
    var(--neon-secondary), 
    #fff, 
    var(--neon-secondary), 
    var(--neon-primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 45px rgba(255, 0, 170, 0.5);
  animation: titleGlow 4s ease-in-out infinite;
}
@keyframes titleGlow {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.35); }
}

.sub-title {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 7px;
  text-transform: uppercase;
  margin-bottom: 16px;
  font-weight: 500;
}

.online-badge {
  display: inline-flex; align-items: center; gap: 9px;
  padding: 7px 20px;
  background: rgba(0, 255, 157, 0.12);
  border: 1px solid rgba(0, 255, 157, 0.4);
  border-radius: 50px;
  font-size: 10px; font-weight: 700;
  color: var(--neon-success);
  text-transform: uppercase; letter-spacing: 2px;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 157, 0.3); }
  50% { box-shadow: 0 0 30px rgba(0, 255, 157, 0.6); }
}
.badge-dot {
  width: 8px; height: 8px;
  background: var(--neon-success);
  border-radius: 50%;
  animation: beat 1.6s ease-in-out infinite;
}
@keyframes beat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.6); }
}

/* ===== SEARCH BAR ===== */
.search-wrap {
  max-width: 620px;
  margin: 0 auto 32px;
  position: relative;
}
.search-input {
  width: 100%;
  padding: 14px 22px 14px 52px;
  background: var(--bg-card);
  border: 1px solid var(--border-neon);
  border-radius: var(--radius-lg);
  color: var(--text-main);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  transition: all 300ms var(--ease-smooth);
  backdrop-filter: blur(10px);
}
.search-input:focus {
  outline: none;
  border-color: var(--neon-primary);
  box-shadow: var(--glow-pink);
  background: rgba(18, 6, 26, 0.9);
}
.search-input::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute; left: 18px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 16px;
  pointer-events: none;
}

/* ===== FILTER TABS ===== */
.filter-tabs {
  display: flex; gap: 10px; justify-content: center;
  margin-bottom: 28px; flex-wrap: wrap;
}
.filter-btn {
  padding: 10px 22px;
  background: var(--bg-card);
  border: 1px solid var(--border-glow);
  border-radius: 50px;
  color: var(--text-muted);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  transition: all 300ms var(--ease-smooth);
  text-transform: uppercase; letter-spacing: 1px;
  backdrop-filter: blur(10px);
}
.filter-btn:hover, .filter-btn.active {
  background: linear-gradient(135deg, rgba(255, 0, 170, 0.25), rgba(123, 47, 255, 0.2));
  border-color: var(--neon-primary);
  color: var(--text-main);
  transform: translateY(-3px);
  box-shadow: var(--glow-pink);
}

/* ===== GALLERY GRID ===== */
.gallery-section { animation: slideUp 600ms var(--ease-bloom) backwards; }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(35px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-head {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px; font-weight: 700;
  color: var(--text-main);
  margin-bottom: 20px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border-neon);
  display: flex; align-items: center; gap: 12px;
  letter-spacing: 2px;
}
.section-head::before {
  content: ''; width: 4px; height: 22px;
  background: linear-gradient(180deg, var(--neon-primary), var(--neon-secondary));
  border-radius: 2px;
  box-shadow: 0 0 14px rgba(255, 0, 170, 0.7);
}

.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 22px;
}

/* ===== PHOTO CARD - NEW DESIGN ===== */
.photo-card {
  background: var(--bg-card);
  border: 1px solid rgba(255, 0, 170, 0.25);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all 400ms var(--ease-bloom);
  position: relative;
  backdrop-filter: blur(14px);
  animation: cardPop 500ms ease forwards;
  opacity: 0; transform: translateY(30px) scale(0.98);
}
.photo-card::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, 
    rgba(255, 0, 170, 0.04) 0%, 
    transparent 50%, 
    rgba(123, 47, 255, 0.04) 100%);
  pointer-events: none; opacity: 0;
  transition: opacity 300ms;
}
.photo-card:hover::after { opacity: 1; }
.photo-card:nth-child(n) { animation-delay: calc(0.07s * var(--idx, 0)); }
@keyframes cardPop {
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.photo-card:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: var(--neon-primary);
  box-shadow: var(--glow-pink), 0 25px 60px rgba(0, 0, 0, 0.5);
  z-index: 15;
}

.card-image {
  position: relative;
  width: 100%; height: 310px;
  background: linear-gradient(135deg, #1a0a14 0%, #0f0412 100%);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  border-bottom: 1px solid rgba(255, 0, 170, 0.15);
}
.card-image::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 40% 30%, rgba(255, 0, 170, 0.1) 0%, transparent 60%);
  pointer-events: none;
}
.card-image img {
  width: 100%; height: 100%;
  object-fit: contain;
  transition: transform 400ms var(--ease-bloom), filter 300ms;
  filter: drop-shadow(0 8px 25px rgba(0, 0, 0, 0.4));
}
.photo-card:hover .card-image img {
  transform: scale(1.08);
  filter: drop-shadow(0 12px 35px rgba(255, 0, 170, 0.25));
}

.card-content { padding: 18px; }

.card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px; font-weight: 700;
  color: var(--neon-primary);
  margin-bottom: 10px;
  text-align: center;
  text-shadow: 0 0 14px rgba(255, 0, 170, 0.5);
  line-height: 1.4;
  min-height: 42px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-meta {
  font-size: 11px; color: var(--text-muted);
  text-align: center; margin-bottom: 14px;
  opacity: 0.9;
}

/* Action Buttons - Compact Neon */
.card-actions {
  display: flex; gap: 8px; justify-content: center;
  padding-top: 12px; border-top: 1px solid rgba(255, 0, 170, 0.18);
}
.action-btn {
  flex: 1; min-width: 70px; max-width: 88px;
  height: 42px;
  background: linear-gradient(135deg, rgba(255, 0, 170, 0.15), rgba(123, 47, 255, 0.1));
  border: 1px solid rgba(255, 0, 170, 0.35);
  border-radius: 10px;
  color: var(--neon-primary);
  font-size: 10px; font-weight: 700;
  cursor: pointer;
  transition: all 280ms var(--ease-smooth);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; text-transform: uppercase;
  letter-spacing: 0.5px; backdrop-filter: blur(8px);
}
.action-btn i { font-size: 15px; margin-bottom: 2px; }
.action-btn span { font-size: 9px; font-weight: 600; }

.action-btn:hover {
  background: linear-gradient(135deg, rgba(255, 0, 170, 0.35), rgba(123, 47, 255, 0.25));
  border-color: var(--neon-primary);
  transform: translateY(-4px) scale(1.05);
  box-shadow: 0 10px 28px rgba(255, 0, 170, 0.5);
  color: var(--bg-base);
}
.action-btn.copy:hover {
  background: linear-gradient(135deg, rgba(0, 255, 157, 0.35), rgba(0, 200, 100, 0.25));
  border-color: var(--neon-success);
  box-shadow: 0 10px 28px rgba(0, 255, 170, 0.5);
}
.action-btn.download:hover {
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.35), rgba(0, 180, 255, 0.25));
  border-color: var(--neon-accent);
  box-shadow: var(--glow-cyan);
}

/* ===== LOADING STATE ===== */
.loading-state {
  display: none; text-align: center;
  padding: 55px 20px; grid-column: 1 / -1;
}
.loading-state.active { display: block; }
.spinner {
  width: 52px; height: 52px;
  border: 3px solid rgba(255, 0, 170, 0.2);
  border-top-color: var(--neon-primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 18px;
  box-shadow: var(--glow-pink);
  position: relative;
}
.spinner::after {
  content: ''; position: absolute; inset: -6px;
  border: 2px solid transparent;
  border-top-color: var(--neon-secondary);
  border-radius: 50%;
  animation: spin 2s reverse linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: var(--neon-primary);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px; letter-spacing: 2px;
  animation: flicker 1.8s ease-in-out infinite;
}
@keyframes flicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.65; }
}

/* ===== EMPTY STATE ===== */
.empty-state {
  grid-column: 1 / -1; text-align: center;
  padding: 60px 20px; color: var(--text-muted);
}
.empty-state i {
  font-size: 52px; margin-bottom: 18px;
  opacity: 0.4; color: var(--neon-secondary);
  text-shadow: 0 0 25px rgba(123, 47, 255, 0.4);
}
.empty-state h3 {
  font-family: 'Orbitron', sans-serif;
  color: var(--text-main); margin-bottom: 8px;
}
.empty-state p { font-size: 12px; opacity: 0.85; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(3, 1, 5, 0.94);
  backdrop-filter: blur(22px);
  z-index: 2000;
  display: none; align-items: center; justify-content: center;
  padding: 20px;
  animation: modalIn 350ms var(--ease-bloom) backwards;
}
.modal-overlay.active { display: flex; }
@keyframes modalIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal-box {
  background: var(--bg-card);
  border: 1px solid var(--neon-primary);
  border-radius: var(--radius-lg);
  max-width: 940px; width: 100%;
  max-height: 95vh; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: var(--glow-pink), 0 30px 80px rgba(0, 0, 0, 0.65);
  animation: modalSlide 450ms var(--ease-bloom) backwards;
}
@keyframes modalSlide {
  from { opacity: 0; transform: scale(0.96) translateY(25px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 22px;
  border-bottom: 1px solid rgba(255, 0, 170, 0.25);
  background: rgba(18, 6, 26, 0.8);
}
.modal-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px; color: var(--neon-primary);
}
.modal-close {
  width: 38px; height: 38px;
  background: transparent;
  border: 1px solid var(--neon-primary);
  border-radius: 50%;
  color: var(--neon-primary);
  font-size: 15px;
  cursor: pointer;
  transition: all 300ms var(--ease-smooth);
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover {
  background: var(--neon-primary);
  color: var(--bg-base);
  transform: rotate(90deg) scale(1.1);
  box-shadow: var(--glow-pink);
}
.modal-body {
  padding: 22px; text-align: center;
  overflow-y: auto; flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(180deg, #14081a 0%, #0c0412 100%);
}
.modal-body img {
  max-width: 100%; max-height: 70vh;
  width: auto; object-fit: contain;
  border-radius: 12px;
  box-shadow: 0 0 35px rgba(255, 0, 170, 0.4), 0 12px 55px rgba(0, 0, 0, 0.55);
  transition: transform 300ms var(--ease-smooth);
}
.modal-body img:hover { transform: scale(1.015); }
.modal-footer {
  padding: 16px 22px;
  border-top: 1px solid rgba(255, 0, 170, 0.2);
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  background: rgba(18, 6, 26, 0.6);
}

/* ===== TOAST NOTIFICATION ===== */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--bg-glass);
  border: 1px solid var(--neon-primary);
  color: var(--neon-primary);
  padding: 11px 20px;
  border-radius: 12px;
  font-weight: 600; font-size: 11px;
  z-index: 3000;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--glow-pink);
  transform: translateX(180px);
  opacity: 0;
  transition: all 450ms var(--ease-bloom);
  backdrop-filter: blur(14px);
  max-width: 340px;
}
.toast.show {
  transform: translateX(0);
  opacity: 1;
}
.toast i { font-size: 15px; animation: iconGlow 2.2s ease-in-out infinite; }
@keyframes iconGlow {
  0%, 100% { opacity: 1; text-shadow: 0 0 12px var(--neon-primary); }
  50% { opacity: 0.75; text-shadow: 0 0 22px var(--neon-primary); }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 7px; }
::-webkit-scrollbar-track { background: var(--bg-base); border-radius: 4px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-primary), var(--neon-secondary), var(--neon-accent));
  border-radius: 4px;
  border: 2px solid var(--bg-base);
  box-shadow: 0 0 14px rgba(255, 0, 170, 0.5);
}
::-webkit-scrollbar-thumb:hover {
  box-shadow: 0 0 22px rgba(255, 0, 170, 0.8);
}

::selection {
  background: rgba(255, 0, 170, 0.35);
  color: var(--text-main);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .container { padding: 18px 14px; }
  .back-link { left: 14px; top: 14px; padding: 8px 14px; font-size: 10px; }
  .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .card-image { height: 240px; }
  .card-title { font-size: 13px; min-height: 38px; }
  .action-btn { min-width: 64px; max-width: 80px; height: 40px; }
  .action-btn i { font-size: 14px; }
  .action-btn span { font-size: 8px; }
  .filter-tabs { gap: 8px; }
  .filter-btn { padding: 9px 18px; font-size: 10px; }
  .modal-box { max-height: 97vh; }
  .modal-body { padding: 18px; }
  .toast { bottom: 18px; right: 18px; left: 18px; max-width: none; justify-content: center; }
}

@media (max-width: 480px) {
  .photo-grid { grid-template-columns: 1fr; }
  .card-image { height: 280px; }
  .main-title { font-size: clamp(30px, 9vw, 44px); letter-spacing: 4px; }
  .section-head { font-size: 14px; }
  .card-actions { gap: 6px; }
  .action-btn { min-width: 58px; height: 38px; padding: 5px 3px; }
}

/* ===== ACCESSIBILITY ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  html { scroll-behavior: auto; }
}
</style>
</head>
<body>

<!-- Background Effects -->
<div class="bg-animated"></div>
<div class="grid-pattern"></div>
<div class="vignette"></div>
<div class="particles" id="particles"></div>

<!-- Back Button -->
<a href="index.html" class="back-link">
  <i class="fas fa-arrow-left"></i> Kembali
</a>

<div class="container">
  <!-- Header -->
  <header class="header">
    <h1 class="main-title">⚡ GALERI FOTO</h1>
    <p class="sub-title">LINE TOGEL • Cyber Portal 2026</p>
    <div class="online-badge">
      <span class="badge-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <i class="fas fa-search search-icon"></i>
    <input type="search" class="search-input" id="searchInput" 
           placeholder="Cari foto berdasarkan judul..." 
           onkeyup="filterPhotos()" aria-label="Cari foto">
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs">
    <button class="filter-btn active" onclick="filterBy('all', this)">
      <i class="fas fa-th-large"></i> Semua
    </button>
    <button class="filter-btn" onclick="filterBy('recent', this)">
      <i class="fas fa-clock"></i> Terbaru
    </button>
    <button class="filter-btn" onclick="filterBy('popular', this)">
      <i class="fas fa-fire"></i> Populer
    </button>
  </div>

  <!-- Gallery -->
  <section class="gallery-section">
    <h2 class="section-head"><i class="fas fa-images"></i> KOLEKSI FOTO</h2>
    
    <div class="loading-state" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">⚡ MEMUAT GALERI...</div>
    </div>
    
    <div class="photo-grid" id="galleryGrid"></div>
  </section>
</div>

<!-- Modal -->
<div class="modal-overlay" id="imageModal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 class="modal-title" id="modalTitle">Detail Foto</h3>
      <button class="modal-close" onclick="closeModal()" aria-label="Tutup">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body">
      <img src="" alt="" id="modalImage">
    </div>
    <div class="modal-footer">
      <button class="action-btn copy" onclick="copyFromModal()" style="min-width:90px;max-width:110px">
        <i class="fas fa-copy"></i><span>Salin</span>
      </button>
      <button class="action-btn download" onclick="downloadFromModal()" style="min-width:90px;max-width:110px">
        <i class="fas fa-download"></i><span>Unduh</span>
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <i class="fas fa-bolt"></i>
  <span id="toastMsg">Siap!</span>
</div>

<script>
// ===== STATE =====
let allPhotos = [];
let filteredPhotos = [];
let currentPhoto = { url: '', title: '' };

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  spawnParticles();
  loadGallery();
});

// ===== PARTICLES =====
function spawnParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  
  const types = ['pink', 'purple', 'cyan'];
  for (let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = `particle ${types[i % 3]}`;
    p.style.left = `${Math.random() * 100}%`;
    p.style.animationDelay = `${Math.random() * 35}s`;
    p.style.setProperty('--drift', `${(Math.random() - 0.5) * 80}px`);
    container.appendChild(p);
  }
}

// ===== DATA LOADING =====
async function loadGallery() {
  const loading = document.getElementById('loading');
  const grid = document.getElementById('galleryGrid');
  
  loading.classList.add('active');
  
  try {
    const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
    const gid = '1246502038';
    
    // Try GVIZ API
    try {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
      const res = await fetch(url);
      const txt = await res.text();
      const json = JSON.parse(txt.substring(47).slice(0, -2));
      
      allPhotos = json.table.rows
        .filter(r => r.c?.[0]?.v && r.c?.[1]?.v)
        .map((r, i) => ({
          title: r.c[0].v,
          url: r.c[1].v,
          id: i + 2
        }));
    } catch {
      // Fallback CSV
      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
      const csv = await fetch(csvUrl).then(r => r.text());
      
      allPhotos = csv.split('\n').slice(1).map((row, i) => {
        const [title, url] = row.split(',').map(c => c?.replace(/"/g, '').trim());
        return (title && url) ? { title, url, id: i + 2 } : null;
      }).filter(Boolean);
    }
    
    filteredPhotos = [...allPhotos];
    renderGrid(filteredPhotos);
    notify(`⚡ ${allPhotos.length} foto dimuat`);
    
  } catch (err) {
    console.error('Load error:', err);
    notify('❗ Gagal memuat galeri');
    grid.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-exclamation-triangle"></i>
        <h3>Koneksi Terputus</h3>
        <p>Periksa jaringan atau coba refresh halaman</p>
      </div>
    `;
  }
  
  loading.classList.remove('active');
}

// ===== RENDER =====
function renderGrid(photos) {
  const grid = document.getElementById('galleryGrid');
  
  if (photos.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-search"></i>
        <h3>Tidak Ditemukan</h3>
        <p>Coba kata kunci lain atau hapus filter</p>
      </div>
    `;
    return;
  }
  
  grid.innerHTML = '';
  photos.forEach((photo, idx) => {
    const card = createCard(photo, idx);
    card.style.setProperty('--idx', idx);
    grid.appendChild(card);
  });
}

function createCard(photo, index) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.innerHTML = `
    <div class="card-image">
      <img src="${photo.url}" alt="${photo.title}" 
           onerror="this.src='https://via.placeholder.com/400x300/1a0a14/ff00aa?text=No+Image'"
           loading="lazy" decoding="async"
           onclick="openModal('${photo.url}', '${photo.title.replace(/'/g, "\\'")}')">
    </div>
    <div class="card-content">
      <div class="card-title">${photo.title}</div>
      <div class="card-meta">ID: #${photo.id}</div>
      <div class="card-actions">
        <button class="action-btn copy" onclick="copyPhoto('${photo.url}')" title="Salin">
          <i class="fas fa-copy"></i><span>Salin</span>
        </button>
        <button class="action-btn download" onclick="downloadPhoto('${photo.url}', '${photo.title}')" title="Unduh">
          <i class="fas fa-download"></i><span>Unduh</span>
        </button>
      </div>
    </div>
  `;
  return card;
}

// ===== FILTER & SEARCH =====
function filterBy(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  switch(type) {
    case 'recent':
      filteredPhotos = [...allPhotos].reverse().slice(0, 50);
      break;
    case 'popular':
      filteredPhotos = [...allPhotos].sort(() => Math.random() - 0.5).slice(0, 30);
      break;
    default:
      filteredPhotos = [...allPhotos];
  }
  renderGrid(filteredPhotos);
  notify(`Menampilkan ${filteredPhotos.length} foto`);
}

function filterPhotos() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  
  if (!term) {
    renderGrid(filteredPhotos);
    return;
  }
  
  const results = allPhotos.filter(p => 
    p.title.toLowerCase().includes(term)
  );
  
  renderGrid(results);
  if (results.length > 0) {
    notify(`Ditemukan ${results.length} hasil`);
  }
}

// ===== MODAL =====
function openModal(url, title) {
  currentPhoto = { url, title };
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalImage').src = url;
  document.getElementById('imageModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('imageModal').classList.remove('active');
  document.body.style.overflow = '';
  currentPhoto = { url: '', title: '' };
}

// ===== ACTIONS =====
async function copyPhoto(url) {
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    notify('✅ Foto disalin!');
  } catch {
    notify('❗ Klik kanan gambar > Copy Image');
  }
}

async function copyFromModal() {
  if (currentPhoto.url) await copyPhoto(currentPhoto.url);
}

function downloadPhoto(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  notify('⚡ Download dimulai...');
}

function downloadFromModal() {
  if (currentPhoto.url && currentPhoto.title) {
    downloadPhoto(currentPhoto.url, currentPhoto.title);
  }
}

// ===== TOAST =====
function notify(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ===== EVENTS =====
document.getElementById('imageModal').addEventListener('click', (e) => {
  if (e.target.id === 'imageModal') closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// Prevent body scroll when modal open
document.addEventListener('touchmove', (e) => {
  if (document.body.style.overflow === 'hidden') e.preventDefault();
}, { passive: false });
</script>

</body>
</html>

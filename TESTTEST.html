<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f5ff">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
/* ✨ ULTRA PREMIUM NEON PALETTE */
--neon-cyan: #00f5ff;
--neon-blue: #00d9ff;
--neon-electric: #00ffff;
--neon-purple: #9d4edd;
--neon-violet: #7b2cbf;
--neon-pink: #ff00cc;
--neon-magenta: #ff006e;
--neon-gold: #ffd700;
--neon-green: #00ff9d;
--bg-space: #00010a;
--bg-deep: #01030f;
--bg-surface: rgba(6, 14, 35, 0.88);
--bg-elevated: rgba(12, 28, 62, 0.82);
--bg-glass: rgba(8, 22, 52, 0.72);
--bg-glass-strong: rgba(15, 35, 75, 0.85);
--text-primary: #ffffff;
--text-secondary: #a8d8ff;
--text-dim: #5a72a0;
--text-glow: rgba(0, 245, 255, 0.8);
--border-glow: rgba(0, 245, 255, 0.85);
--glow-cyan: 0 0 25px rgba(0, 245, 255, 0.8), 0 0 55px rgba(0, 245, 255, 0.5), 0 0 95px rgba(0, 245, 255, 0.3);
--glow-purple: 0 0 25px rgba(157, 78, 221, 0.7), 0 0 55px rgba(157, 78, 221, 0.45);
--glow-pink: 0 0 25px rgba(255, 0, 204, 0.7), 0 0 55px rgba(255, 0, 204, 0.45);
--transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
--transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
--transition-spring: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 20px; }

body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-space);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
}

/* ✨ DYNAMIC BACKGROUND SYSTEM */
.bg-wrapper {
position: fixed;
inset: 0;
z-index: -4;
overflow: hidden;
}

.bg-gradient {
position: absolute;
inset: 0;
background: 
radial-gradient(ellipse at 20% 30%, rgba(0, 245, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 80% 25%, rgba(157, 78, 221, 0.1) 0%, transparent 50%),
radial-gradient(ellipse at 50% 85%, rgba(255, 0, 204, 0.08) 0%, transparent 55%),
radial-gradient(ellipse at 10% 75%, rgba(0, 255, 157, 0.06) 0%, transparent 60%);
animation: gradientShift 18s ease-in-out infinite alternate;
}

@keyframes gradientShift {
0%, 100% { filter: hue-rotate(0deg) brightness(1); }
33% { filter: hue-rotate(15deg) brightness(1.05); }
66% { filter: hue-rotate(-10deg) brightness(0.98); }
}

/* ✨ Floating Orbs */
.floating-orb {
position: absolute;
border-radius: 50%;
filter: blur(40px);
opacity: 0.5;
animation: floatOrb 25s ease-in-out infinite;
}
.floating-orb:nth-child(1) {
width: 400px; height: 400px;
background: radial-gradient(circle, rgba(0, 245, 255, 0.3), transparent 70%);
top: 10%; left: 10%;
animation-delay: 0s;
}
.floating-orb:nth-child(2) {
width: 350px; height: 350px;
background: radial-gradient(circle, rgba(157, 78, 221, 0.25), transparent 70%);
top: 60%; right: 5%;
animation-delay: -8s;
}
.floating-orb:nth-child(3) {
width: 300px; height: 300px;
background: radial-gradient(circle, rgba(255, 0, 204, 0.2), transparent 70%);
bottom: 10%; left: 20%;
animation-delay: -15s;
}
@keyframes floatOrb {
0%, 100% { transform: translate(0, 0) scale(1); }
25% { transform: translate(30px, -20px) scale(1.05); }
50% { transform: translate(-20px, 30px) scale(0.98); }
75% { transform: translate(25px, 25px) scale(1.02); }
}

/* ✨ Grid & Scanlines */
.grid-overlay {
position: fixed;
inset: 0;
z-index: -3;
background-image:
linear-gradient(rgba(0, 245, 255, 0.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 245, 255, 0.06) 1px, transparent 1px);
background-size: 50px 50px;
mask-image: radial-gradient(ellipse 70% 65% at 50% 50%, black 20%, transparent 85%);
animation: gridFlow 30s linear infinite;
}
@keyframes gridFlow {
0% { background-position: 0 0; }
100% { background-position: 50px 50px; }
}

.scanline {
position: fixed;
left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-electric), var(--neon-purple), transparent);
opacity: 0.65;
animation: scanMove 4s linear infinite;
z-index: 50;
pointer-events: none;
filter: blur(1px);
box-shadow: 0 0 20px var(--neon-cyan);
}
@keyframes scanMove {
0% { top: -3px; opacity: 0; }
8% { opacity: 0.65; }
92% { opacity: 0.65; }
100% { top: 100%; opacity: 0; }
}

/* ✨ Lightning System */
.lightning-system {
position: fixed;
inset: 0;
z-index: -2;
pointer-events: none;
}
.lightning {
position: absolute;
width: 2px;
height: 100vh;
background: linear-gradient(180deg, 
transparent 0%, 
var(--neon-electric) 20%, 
var(--neon-cyan) 40%, 
var(--neon-purple) 60%, 
var(--neon-pink) 80%, 
transparent 100%);
filter: blur(2px);
opacity: 0;
animation: lightningBurst 12s infinite;
box-shadow: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-purple);
}
.lightning:nth-child(1) { left: 15%; animation-delay: 0s; }
.lightning:nth-child(2) { left: 50%; animation-delay: 4s; }
.lightning:nth-child(3) { left: 85%; animation-delay: 8s; }
@keyframes lightningBurst {
0%, 88%, 90%, 92%, 94%, 100% { opacity: 0; transform: scaleY(0.3); }
89%, 91%, 93% { opacity: 0.25; transform: scaleY(1); }
}

/* ✨ Particle System Premium */
.particles {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
overflow: hidden;
}
.particle {
position: absolute;
width: 3px; height: 3px;
border-radius: 50%;
opacity: 0;
animation: particleRise 20s infinite ease-in-out;
}
.particle::before {
content: '';
position: absolute;
inset: -5px;
border-radius: 50%;
background: inherit;
filter: blur(3px);
opacity: 0.6;
}
.particle.cyan { background: var(--neon-cyan); box-shadow: 0 0 12px var(--neon-cyan); }
.particle.purple { background: var(--neon-purple); box-shadow: 0 0 12px var(--neon-purple); }
.particle.pink { background: var(--neon-pink); box-shadow: 0 0 12px var(--neon-pink); }
.particle.green { background: var(--neon-green); box-shadow: 0 0 12px var(--neon-green); }

@keyframes particleRise {
0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
10% { opacity: 0.9; transform: scale(1); }
90% { opacity: 0.9; }
100% { transform: translateY(-100vh) scale(0.3) rotate(720deg); opacity: 0; }
}

/* ✨ Noise & Grain */
.noise {
position: fixed;
inset: 0;
z-index: -1;
opacity: 0.035;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
pointer-events: none;
animation: noiseAnim 0.5s steps(10) infinite;
}
@keyframes noiseAnim {
0%, 100% { transform: translate(0, 0); }
25% { transform: translate(-1px, 1px); }
50% { transform: translate(1px, -1px); }
75% { transform: translate(-1px, -1px); }
}

/* ✨ Layout Premium */
.container {
max-width: 1450px;
margin: 0 auto;
padding: 30px 22px;
min-height: 100vh;
position: relative;
}

/* ✨ Back Button Premium */
.back-btn {
position: fixed;
left: 22px; top: 22px;
background: var(--bg-glass-strong);
border: 1px solid var(--border-glow);
color: var(--neon-cyan);
padding: 8px 18px;
border-radius: 12px;
text-decoration: none;
font-weight: 700;
font-size: 11px;
display: flex;
align-items: center;
gap: 8px;
transition: var(--transition-smooth);
backdrop-filter: blur(16px);
z-index: 1000;
box-shadow: 0 4px 20px rgba(0, 245, 255, 0.25);
letter-spacing: 0.5px;
}
.back-btn:hover {
background: linear-gradient(135deg, rgba(0, 245, 255, 0.25), rgba(157, 78, 221, 0.15));
transform: translateX(-6px);
box-shadow: var(--glow-cyan);
color: var(--bg-deep);
}
.back-btn i { font-size: 13px; }

/* ✨ Header Premium */
.header {
text-align: center;
margin-bottom: 40px;
animation: headerReveal 1.2s var(--transition-bounce) backwards;
position: relative;
padding-bottom: 25px;
}
@keyframes headerReveal {
from { opacity: 0; transform: translateY(-40px) scale(0.98); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ✨ Title with Multi-Layer Glow */
.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(32px, 8vw, 58px);
font-weight: 900;
letter-spacing: 6px;
margin-bottom: 12px;
position: relative;
background: linear-gradient(135deg, 
var(--neon-electric) 0%, 
var(--neon-cyan) 25%, 
#ffffff 45%, 
var(--neon-cyan) 65%, 
var(--neon-purple) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 
0 0 40px rgba(0, 245, 255, 0.7),
0 0 80px rgba(0, 245, 255, 0.4);
animation: titleGlow 3s ease-in-out infinite, titleFloat 5s ease-in-out infinite;
}
@keyframes titleGlow {
0%, 100% { filter: brightness(1) saturate(1); }
50% { filter: brightness(1.35) saturate(1.2); }
}
@keyframes titleFloat {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-4px); }
}

/* ✨ Animated Title Border */
.title::after {
content: '';
position: absolute;
bottom: -18px;
left: 50%;
transform: translateX(-50%);
width: 240px;
height: 4px;
background: linear-gradient(90deg, 
transparent, 
var(--neon-cyan), 
var(--neon-purple), 
var(--neon-pink), 
transparent);
border-radius: 3px;
box-shadow: var(--glow-cyan);
animation: borderPulse 2.5s ease-in-out infinite;
}
@keyframes borderPulse {
0%, 100% { opacity: 0.8; box-shadow: var(--glow-cyan); }
50% { opacity: 1; box-shadow: 0 0 35px rgba(0, 245, 255, 0.95), 0 0 75px rgba(157, 78, 221, 0.6); }
}

.subtitle {
font-size: 13px;
color: var(--text-secondary);
letter-spacing: 7px;
text-transform: uppercase;
margin-bottom: 20px;
font-weight: 600;
text-shadow: 0 0 15px rgba(0, 245, 255, 0.5);
animation: subtitleFade 2s ease-in-out infinite;
}
@keyframes subtitleFade {
0%, 100% { opacity: 0.9; }
50% { opacity: 1; }
}

/* ✨ Status Badge Premium */
.status-badge {
display: inline-flex;
align-items: center;
gap: 12px;
padding: 8px 24px;
background: linear-gradient(135deg, rgba(0, 255, 157, 0.18), rgba(0, 200, 130, 0.12));
border: 1px solid rgba(0, 255, 157, 0.6);
border-radius: 100px;
font-size: 11px;
font-weight: 700;
color: var(--neon-green);
text-transform: uppercase;
letter-spacing: 3px;
animation: statusGlow 2.2s ease-in-out infinite;
box-shadow: 0 0 25px rgba(0, 255, 157, 0.45);
position: relative;
overflow: hidden;
}
.status-badge::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
animation: badgeShine 3s infinite;
}
@keyframes badgeShine {
0% { transform: translateX(-100%); }
100% { transform: translateX(100%); }
}
@keyframes statusGlow {
0%, 100% { box-shadow: 0 0 25px rgba(0, 255, 157, 0.45); }
50% { box-shadow: 0 0 45px rgba(0, 255, 157, 0.75); }
}
.status-dot {
width: 10px; height: 10px;
background: var(--neon-green);
border-radius: 50%;
animation: dotPulse 1.4s ease-in-out infinite;
box-shadow: 0 0 18px var(--neon-green), 0 0 40px rgba(0, 255, 157, 0.6);
position: relative;
}
.status-dot::after {
content: '';
position: absolute;
inset: -4px;
border: 2px solid var(--neon-green);
border-radius: 50%;
animation: dotRing 1.4s ease-out infinite;
opacity: 0.7;
}
@keyframes dotPulse {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.4); opacity: 0.85; }
}
@keyframes dotRing {
0% { transform: scale(1); opacity: 0.7; }
100% { transform: scale(2.5); opacity: 0; }
}

/* ✨ Navigation Premium */
.nav-tabs {
display: flex;
gap: 14px;
justify-content: center;
margin-bottom: 32px;
flex-wrap: wrap;
}
.nav-tab {
padding: 12px 30px;
background: var(--bg-glass);
border: 1px solid var(--border-glow);
border-radius: 14px;
color: var(--text-primary);
font-family: 'Orbitron', sans-serif;
font-size: 12px;
font-weight: 700;
cursor: pointer;
transition: var(--transition-smooth);
text-transform: uppercase;
letter-spacing: 2px;
backdrop-filter: blur(16px);
position: relative;
overflow: hidden;
display: flex;
align-items: center;
gap: 8px;
}
.nav-tab::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, 
rgba(0, 245, 255, 0.22), 
rgba(157, 78, 221, 0.15), 
rgba(255, 0, 204, 0.12));
opacity: 0;
transition: opacity 0.35s;
}
.nav-tab:hover, .nav-tab.active {
background: linear-gradient(135deg, rgba(0, 245, 255, 0.32), rgba(157, 78, 221, 0.22));
border-color: var(--neon-cyan);
box-shadow: var(--glow-cyan);
transform: translateY(-4px);
color: var(--neon-electric);
}
.nav-tab:hover::before, .nav-tab.active::before { opacity: 1; }
.nav-tab i { font-size: 14px; transition: transform 0.3s; }
.nav-tab:hover i { transform: scale(1.1); }

.section { display: none; }
.section.active { display: block; animation: sectionEnter 0.7s var(--transition-bounce); }
@keyframes sectionEnter {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}

/* ✨ Search Premium */
.search-container {
max-width: 700px;
margin: 0 auto 32px;
position: relative;
}
.search-box {
width: 100%;
padding: 16px 55px 16px 24px;
background: var(--bg-glass);
border: 2px solid var(--border-glow);
border-radius: 16px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 15px;
transition: var(--transition-smooth);
backdrop-filter: blur(16px);
box-shadow: 0 0 20px rgba(0, 245, 255, 0.18);
}
.search-box:focus {
outline: none;
border-color: var(--neon-cyan);
box-shadow: var(--glow-cyan);
background: var(--bg-elevated);
}
.search-box::placeholder { color: var(--text-dim); }
.search-icon {
position: absolute;
right: 20px;
top: 50%;
transform: translateY(-50%);
color: var(--neon-cyan);
font-size: 18px;
pointer-events: none;
transition: var(--transition-smooth);
}
.search-box:focus + .search-icon {
color: var(--neon-electric);
transform: translateY(-50%) scale(1.1);
}

/* ✨ Gallery Section Premium */
.gallery-section {
margin-bottom: 45px;
animation: galleryReveal 0.9s var(--transition-bounce) backwards;
}
@keyframes galleryReveal {
from { opacity: 0; transform: translateY(50px); }
to { opacity: 1; transform: translateY(0); }
}

.section-title {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
font-weight: 700;
color: var(--text-primary);
margin-bottom: 22px;
padding-bottom: 14px;
border-bottom: 2px solid var(--border-glow);
display: flex;
align-items: center;
gap: 14px;
letter-spacing: 3px;
position: relative;
}
.section-title::before {
content: '';
width: 6px; height: 26px;
background: linear-gradient(180deg, var(--neon-electric), var(--neon-cyan), var(--neon-purple));
border-radius: 4px;
box-shadow: 0 0 20px rgba(0, 245, 255, 0.8);
animation: barPulse 2.2s ease-in-out infinite;
}
@keyframes barPulse {
0%, 100% { opacity: 1; transform: scaleY(1); }
50% { opacity: 0.85; transform: scaleY(1.15); }
}

.gallery-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
gap: 22px;
}

/* ✨ Photo Card ULTRA PREMIUM with 3D Tilt */
.photo-card {
background: var(--bg-surface);
border: 1px solid rgba(0, 245, 255, 0.45);
border-radius: 18px;
overflow: hidden;
transition: var(--transition-bounce);
position: relative;
backdrop-filter: blur(16px);
animation: cardFloat 0.7s ease forwards;
opacity: 0;
transform: translateY(30px);
box-shadow: 0 8px 35px rgba(0, 0, 0, 0.45);
perspective: 1000px;
}
.photo-card::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, 
rgba(0, 245, 255, 0.12), 
transparent 40%, 
rgba(157, 78, 221, 0.1), 
transparent 70%);
opacity: 0;
transition: opacity 0.4s;
pointer-events: none;
z-index: 1;
}
.photo-card:hover::before { opacity: 1; }
.photo-card:nth-child(1) { animation-delay: 0.1s; }
.photo-card:nth-child(2) { animation-delay: 0.15s; }
.photo-card:nth-child(3) { animation-delay: 0.2s; }
.photo-card:nth-child(4) { animation-delay: 0.25s; }
.photo-card:nth-child(5) { animation-delay: 0.3s; }
.photo-card:nth-child(n+6) { animation-delay: 0.35s; }
@keyframes cardFloat {
to { opacity: 1; transform: translateY(0); }
}
.photo-card:hover {
transform: translateY(-10px) scale(1.025);
border-color: var(--neon-cyan);
box-shadow: var(--glow-cyan), 0 25px 60px rgba(0, 0, 0, 0.55);
z-index: 10;
}

/* ✨ Image Wrapper with Reflection */
.photo-wrapper {
position: relative;
width: 100%;
height: 300px;
background: radial-gradient(circle at center, #102845 0%, #050d1f 100%);
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
}
.photo-wrapper::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(180deg, 
transparent 50%, 
rgba(0, 0, 0, 0.5) 85%, 
rgba(0, 0, 0, 0.8) 100%);
pointer-events: none;
z-index: 2;
}
.photo-wrapper::before {
content: '';
position: absolute;
top: 0; left: -100%;
width: 100%; height: 100%;
background: linear-gradient(90deg, 
transparent, 
rgba(255,255,255,0.15), 
transparent);
transition: left 0.6s ease;
pointer-events: none;
z-index: 3;
}
.photo-card:hover .photo-wrapper::before {
left: 100%;
transition: left 0.8s ease;
}
.photo-wrapper img {
width: 100%;
height: 100%;
object-fit: contain;
display: block;
padding: 10px;
background: transparent;
transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s ease;
filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.4));
}
.photo-card:hover .photo-wrapper img {
transform: scale(1.09);
filter: drop-shadow(0 10px 35px rgba(0, 245, 255, 0.5));
}

/* ✨ Card Info Premium */
.photo-info {
padding: 18px 20px 20px;
position: relative;
z-index: 2;
}
.photo-info::before {
content: '';
position: absolute;
top: 0;
left: 20px;
right: 20px;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.5), transparent);
}

.photo-title {
font-family: 'Orbitron', sans-serif;
font-size: 15px;
font-weight: 700;
color: var(--neon-electric);
margin-bottom: 16px;
word-break: break-word;
text-align: center;
text-shadow: 0 0 15px rgba(0, 245, 255, 0.7);
line-height: 1.45;
min-height: 44px;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
overflow: hidden;
}

.photo-meta {
font-size: 12px;
color: var(--text-secondary);
text-align: center;
margin-bottom: 16px;
opacity: 0.92;
font-weight: 500;
}

/* ✨ Action Buttons ULTRA PREMIUM */
.action-buttons-row {
display: flex;
gap: 12px;
justify-content: center;
flex-wrap: wrap;
padding-top: 14px;
border-top: 1px solid rgba(0, 245, 255, 0.3);
}

.action-btn-cool {
flex: 1;
min-width: 80px;
max-width: 100px;
height: 50px;
background: linear-gradient(135deg, rgba(0, 245, 255, 0.22) 0%, rgba(157, 78, 221, 0.15) 100%);
border: 1px solid rgba(0, 245, 255, 0.6);
border-radius: 12px;
color: var(--neon-electric);
font-size: 11px;
font-weight: 800;
cursor: pointer;
transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 5px;
text-transform: uppercase;
letter-spacing: 0.8px;
backdrop-filter: blur(10px);
position: relative;
overflow: hidden;
}
.action-btn-cool::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(0, 245, 255, 0.35), rgba(157, 78, 221, 0.25));
opacity: 0;
transition: opacity 0.3s;
}
.action-btn-cool i {
font-size: 18px;
margin-bottom: 2px;
z-index: 1;
transition: transform 0.3s;
}
.action-btn-cool span {
font-size: 9px;
font-weight: 800;
z-index: 1;
}
.action-btn-cool:hover {
background: linear-gradient(135deg, rgba(0, 245, 255, 0.48) 0%, rgba(157, 78, 221, 0.35) 100%);
border-color: var(--neon-cyan);
transform: translateY(-5px) scale(1.08);
box-shadow: 0 10px 35px rgba(0, 245, 255, 0.7);
color: var(--bg-deep);
}
.action-btn-cool:hover::before { opacity: 1; }
.action-btn-cool:hover i { transform: scale(1.15); }

.action-btn-cool.copy-btn:hover {
background: linear-gradient(135deg, rgba(0, 255, 157, 0.48) 0%, rgba(0, 200, 130, 0.35) 100%);
border-color: var(--neon-green);
box-shadow: 0 10px 35px rgba(0, 255, 157, 0.7);
}
.action-btn-cool.download-btn:hover {
background: linear-gradient(135deg, rgba(0, 245, 255, 0.48) 0%, rgba(0, 180, 255, 0.35) 100%);
border-color: var(--neon-blue);
box-shadow: 0 10px 35px rgba(0, 245, 255, 0.7);
}

/* ✨ Loading Premium */
.loading {
display: none;
text-align: center;
padding: 45px 20px;
grid-column: 1 / -1;
}
.loading.active { display: block; }
.loader {
width: 55px;
height: 55px;
border: 4px solid rgba(0, 245, 255, 0.2);
border-top-color: var(--neon-electric);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 22px;
box-shadow: var(--glow-cyan);
position: relative;
}
.loader::after {
content: '';
position: absolute;
inset: -6px;
border: 3px solid transparent;
border-top-color: var(--neon-purple);
border-radius: 50%;
animation: spin 1.4s linear infinite reverse;
}
.loader::before {
content: '';
position: absolute;
inset: -12px;
border: 2px solid transparent;
border-top-color: var(--neon-pink);
border-radius: 50%;
animation: spin 2s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
color: var(--neon-electric);
font-family: 'Orbitron', sans-serif;
font-size: 13px;
font-weight: 700;
letter-spacing: 2px;
animation: textPulse 1.5s ease-in-out infinite;
}
@keyframes textPulse {
0%, 100% { opacity: 0.9; }
50% { opacity: 1; text-shadow: 0 0 20px var(--neon-cyan); }
}

/* ✨ Modal ULTRA PREMIUM */
.modal-backdrop {
position: fixed;
inset: 0;
background: rgba(1, 3, 12, 0.97);
backdrop-filter: blur(25px);
z-index: 1000;
display: none;
align-items: center;
justify-content: center;
padding: 25px;
animation: modalFade 0.35s ease;
}
@keyframes modalFade {
from { opacity: 0; }
to { opacity: 1; }
}
.modal-backdrop.active { display: flex; }

.modal-content {
background: var(--bg-glass-strong);
border: 2px solid var(--border-glow);
border-radius: 22px;
max-width: 1000px;
width: 100%;
max-height: 95vh;
overflow: hidden;
display: flex;
flex-direction: column;
box-shadow: var(--glow-cyan), 0 30px 80px rgba(0, 0, 0, 0.6);
animation: modalEnter 0.5s var(--transition-bounce);
}
@keyframes modalEnter {
from { opacity: 0; transform: translateY(40px) scale(0.97); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 18px 26px;
border-bottom: 1px solid rgba(0, 245, 255, 0.3);
background: linear-gradient(90deg, rgba(0, 245, 255, 0.1), transparent, rgba(157, 78, 221, 0.1));
}
.modal-title {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
color: var(--neon-electric);
font-weight: 700;
letter-spacing: 1px;
}
.modal-close {
width: 40px;
height: 40px;
background: transparent;
border: 2px solid var(--neon-pink);
border-radius: 50%;
color: var(--neon-pink);
font-size: 16px;
cursor: pointer;
transition: var(--transition-smooth);
display: flex;
align-items: center;
justify-content: center;
}
.modal-close:hover {
background: var(--neon-pink);
color: var(--bg-deep);
transform: rotate(90deg) scale(1.15);
box-shadow: var(--glow-pink);
}

.modal-body {
padding: 26px;
text-align: center;
overflow-y: auto;
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
background: radial-gradient(circle at center, #0e2848 0%, #050f22 100%);
}
.modal-body img {
max-width: 100%;
max-height: 68vh;
width: auto;
object-fit: contain;
border-radius: 14px;
box-shadow: 0 0 40px rgba(0, 245, 255, 0.5), 0 15px 50px rgba(0, 0, 0, 0.5);
transition: transform 0.4s ease;
}
.modal-body img:hover {
transform: scale(1.03);
}

.modal-actions {
margin-top: 22px;
display: flex;
gap: 14px;
justify-content: center;
flex-wrap: wrap;
}

/* ✨ Toast Premium */
.toast {
position: fixed;
bottom: 30px;
right: 30px;
background: var(--bg-glass-strong);
border: 2px solid var(--neon-cyan);
color: var(--neon-electric);
padding: 15px 28px;
border-radius: 16px;
font-weight: 700;
font-size: 13px;
z-index: 10000;
display: flex;
align-items: center;
gap: 12px;
box-shadow: var(--glow-cyan);
transform: translateX(300px);
opacity: 0;
transition: var(--transition-bounce);
backdrop-filter: blur(16px);
}
.toast.show {
transform: translateX(0);
opacity: 1;
}
.toast i { font-size: 18px; }

/* ✨ Footer Cyber */
.footer {
text-align: center;
padding: 30px 20px 50px;
color: var(--text-dim);
font-size: 11px;
letter-spacing: 2px;
position: relative;
}
.footer::before {
content: '';
position: absolute;
top: 0;
left: 50%;
transform: translateX(-50%);
width: 300px;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.4), transparent);
}
.footer a {
color: var(--neon-cyan);
text-decoration: none;
transition: var(--transition-smooth);
}
.footer a:hover {
color: var(--neon-electric);
text-shadow: 0 0 15px var(--neon-cyan);
}

/* ✨ Responsive Premium */
@media (max-width: 900px) {
.gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
.photo-wrapper { height: 250px; }
.action-btn-cool { min-width: 70px; max-width: 88px; height: 46px; }
}
@media (max-width: 600px) {
.container { padding: 20px 14px; }
.back-btn { left: 14px; top: 14px; padding: 7px 14px; font-size: 10px; }
.title { font-size: clamp(28px, 9vw, 46px); letter-spacing: 4px; }
.subtitle { font-size: 11px; letter-spacing: 5px; }
.gallery-grid { grid-template-columns: 1fr; }
.photo-wrapper { height: 280px; }
.photo-title { font-size: 14px; min-height: auto; }
.action-buttons-row { gap: 10px; }
.action-btn-cool { min-width: 72px; max-width: 90px; height: 48px; font-size: 10px; }
.action-btn-cool i { font-size: 17px; }
.modal-content { border-radius: 18px; margin: 10px; }
.modal-body { padding: 20px; }
.toast { bottom: 20px; right: 20px; left: 20px; justify-content: center; }
}

/* ✨ Premium Scrollbar */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon-electric), var(--neon-cyan), var(--neon-purple), var(--neon-pink));
border-radius: 6px;
border: 2px solid var(--bg-deep);
box-shadow: 0 0 18px rgba(0, 245, 255, 0.6);
}
::-webkit-scrollbar-thumb:hover {
background: linear-gradient(180deg, var(--neon-cyan), var(--neon-electric), var(--neon-violet), var(--neon-magenta));
box-shadow: 0 0 25px rgba(0, 245, 255, 0.85);
}

::selection {
background: rgba(0, 245, 255, 0.45);
color: var(--text-primary);
text-shadow: 0 0 12px rgba(0, 245, 255, 0.7);
}

/* ✨ Focus Accessibility */
a:focus, button:focus, input:focus {
outline: 2px solid var(--neon-electric);
outline-offset: 3px;
box-shadow: 0 0 0 5px rgba(0, 245, 255, 0.25);
}

/* ✨ Reduced Motion */
@media (prefers-reduced-motion: reduce) {
*, *::before, *::after {
animation-duration: 0.01ms !important;
animation-iteration-count: 1 !important;
transition-duration: 0.01ms !important;
}
}
</style>
</head>
<body>
<!-- ✨ Dynamic Background System -->
<div class="bg-wrapper">
<div class="bg-gradient"></div>
<div class="floating-orb"></div>
<div class="floating-orb"></div>
<div class="floating-orb"></div>
</div>
<div class="grid-overlay"></div>
<div class="noise"></div>
<div class="particles" id="particles"></div>
<div class="lightning-system">
<div class="lightning"></div>
<div class="lightning"></div>
<div class="lightning"></div>
</div>
<div class="scanline"></div>

<a href="index.html" class="back-btn">
<i class="fas fa-arrow-left"></i> Kembali
</a>

<div class="container">
<header class="header">
<h1 class="title">⚡ FOTO GALLERY</h1>
<p class="subtitle">LINE TOGEL • Cyber Portal 2026</p>
<div class="status-badge">
<span class="status-dot"></span>
<span>SYSTEM ONLINE</span>
</div>
</header>

<!-- ✨ Single Tab Navigation -->
<div class="nav-tabs">
<button class="nav-tab active">
<i class="fas fa-images"></i> Galeri Foto
</button>
</div>

<!-- ✨ Gallery Section -->
<section id="gallery" class="section active">
<div class="search-container">
<input type="text" class="search-box" id="searchInput" placeholder="🔍 Cari foto berdasarkan judul..." onkeyup="searchPhotos()">
<i class="fas fa-search search-icon"></i>
</div>

<div class="loading" id="loading">
<div class="loader"></div>
<div class="loading-text">⚡ LOADING PHOTOS...</div>
</div>

<div class="gallery-grid" id="galleryGrid"></div>
</section>

<!-- ✨ Cyber Footer -->
<footer class="footer">
<p>⚡ LINE TOGEL 2026 • <a href="#">Privacy</a> • <a href="#">Terms</a> • <a href="#">Support</a></p>
<p style="margin-top: 8px; opacity: 0.7;">© Cyber Systems • All Rights Reserved</p>
</footer>
</div>

<!-- ✨ Modal ULTRA PREMIUM -->
<div class="modal-backdrop" id="imageModal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title" id="modalTitle">Foto Detail</h3>
<button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
</div>
<div class="modal-body">
<img src="" alt="" id="modalImage">
<div class="modal-actions">
<button class="action-btn-cool copy-btn" onclick="copyImage()" style="min-width: 130px; max-width: 150px;">
<i class="fas fa-copy"></i>
<span>Copy Foto</span>
</button>
<button class="action-btn-cool download-btn" onclick="downloadModalImage()" style="min-width: 130px; max-width: 150px;">
<i class="fas fa-download"></i>
<span>Download</span>
</button>
</div>
</div>
</div>
</div>

<!-- ✨ Toast Notification -->
<div id="toast" class="toast">
<i class="fas fa-bolt"></i>
<span id="toastText">Berhasil!</span>
</div>

<script>
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';

document.addEventListener('DOMContentLoaded', () => {
initParticles();
fetchPhotosFromSheet();
initTiltEffect();
});

/* ✨ Premium Particle System */
function initParticles() {
const container = document.getElementById('particles');
if (!container) return;
const colors = ['cyan', 'purple', 'pink', 'green'];
for(let i = 0; i < 70; i++) {
const p = document.createElement('div');
p.className = `particle ${colors[Math.floor(Math.random() * colors.length)]}`;
p.style.left = Math.random() * 100 + '%';
p.style.top = Math.random() * 100 + '%';
p.style.animationDelay = Math.random() * 30 + 's';
p.style.animationDuration = (20 + Math.random() * 30) + 's';
p.style.width = (2 + Math.random() * 4) + 'px';
p.style.height = p.style.width;
container.appendChild(p);
}
}

/* ✨ 3D Tilt Effect for Cards */
function initTiltEffect() {
document.querySelectorAll('.photo-card').forEach(card => {
card.addEventListener('mousemove', (e) => {
const rect = card.getBoundingClientRect();
const x = e.clientX - rect.left;
const y = e.clientY - rect.top;
const centerX = rect.width / 2;
const centerY = rect.height / 2;
const rotateX = (y - centerY) / 15;
const rotateY = (centerX - x) / 15;
card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px) scale(1.025)`;
});
card.addEventListener('mouseleave', () => {
card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateY(0) scale(1)';
});
});
}

async function fetchPhotosFromSheet() {
document.getElementById('loading').classList.add('active');
document.getElementById('galleryGrid').innerHTML = '';
try {
const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';
try {
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
const response = await fetch(gvizUrl);
const text = await response.text();
const json = JSON.parse(text.substring(47).slice(0, -2));
const rows = json.table.rows;
allPhotos = [];
rows.forEach((row, index) => {
const c = row.c;
if (!c) return;
const judul = c[0] ? (c[0].v || '') : '';
const foto = c[1] ? (c[1].v || '') : '';
if (judul && foto) {
allPhotos.push({ judul, foto, index: index + 2 });
}
});
} catch (e) {
const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
const csvResponse = await fetch(csvUrl);
const csvText = await csvResponse.text();
const csvRows = csvText.split('\n').map(row => row.split(','));
allPhotos = [];
csvRows.forEach((row, index) => {
if (row.length < 2) return;
const judul = row[0] ? row[0].replace(/"/g, '').trim() : '';
const foto = row[1] ? row[1].replace(/"/g, '').trim() : '';
if (judul && foto) {
allPhotos.push({ judul, foto, index: index + 2 });
}
});
}
renderGallery(allPhotos);
// Re-init tilt for new cards
setTimeout(initTiltEffect, 100);
showToast(`⚡ Berhasil memuat ${allPhotos.length} foto`);
} catch (error) {
console.error('Error:', error);
showToast('❗ Gagal mengambil data');
document.getElementById('galleryGrid').innerHTML = `
<div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-secondary);">
<i class="fas fa-exclamation-triangle" style="font-size: 56px; color: var(--neon-pink); margin-bottom: 22px; text-shadow: 0 0 25px rgba(255,0,204,0.6);"></i>
<h3 style="font-family: 'Orbitron'; color: var(--neon-electric); margin-bottom: 12px; font-size: 18px;">Gagal Memuat Foto</h3>
<p style="opacity: 0.8;">Pastikan Google Sheets sudah dipublikasikan</p>
</div>
`;
}
document.getElementById('loading').classList.remove('active');
}

function renderGallery(photos) {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';
if (photos.length === 0) {
grid.innerHTML = `
<div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-secondary);">
<i class="fas fa-search" style="font-size: 56px; margin-bottom: 22px; opacity: 0.5; text-shadow: 0 0 25px rgba(0,245,255,0.4);"></i>
<h3 style="font-family: 'Orbitron'; color: var(--neon-electric); margin-bottom: 12px; font-size: 18px;">Tidak Ada Foto</h3>
<p style="opacity: 0.8;">Coba kata kunci pencarian lain</p>
</div>
`;
return;
}
photos.forEach((photo, idx) => {
const card = createPhotoCard(photo.foto, photo.judul, idx);
grid.appendChild(card);
});
setTimeout(initTiltEffect, 100);
}

/* ✨ ULTRA PREMIUM Card */
function createPhotoCard(url, title, index) {
const card = document.createElement('div');
card.className = 'photo-card';
card.innerHTML = `
<div class="photo-wrapper">
<img src="${url}" alt="${title}" onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00f5ff?text=No+Image'" loading="lazy" onclick="viewFullImage('${url}', '${title.replace(/'/g, "\\'")}')" style="cursor: pointer;">
</div>
<div class="photo-info">
<div class="photo-title">${title}</div>
<div class="photo-meta">Foto #${index + 1}</div>
<div class="action-buttons-row">
<button class="action-btn-cool copy-btn" onclick="copyPhoto('${url}')" title="Copy Foto">
<i class="fas fa-copy"></i>
<span>Copy</span>
</button>
<button class="action-btn-cool download-btn" onclick="downloadPhoto('${url}', '${title.replace(/'/g, "\\'")}')" title="Download">
<i class="fas fa-download"></i>
<span>Download</span>
</button>
</div>
</div>
`;
return card;
}

function searchPhotos() {
const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
if (!searchTerm) { renderGallery(allPhotos); return; }
const filtered = allPhotos.filter(photo => photo.judul.toLowerCase().includes(searchTerm));
renderGallery(filtered);
if (filtered.length > 0) showToast(`⚡ Ditemukan ${filtered.length} foto`);
}

function viewFullImage(url, title) {
currentImageUrl = url;
currentImageTitle = title;
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalImage').src = url;
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
}

function closeModal() {
document.getElementById('imageModal').classList.remove('active');
document.body.style.overflow = '';
currentImageUrl = '';
currentImageTitle = '';
}

async function copyPhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
showToast('✅ Foto berhasil disalin!');
} catch (error) {
showToast('❗ Klik kanan foto > Copy Image');
}
}

async function copyImage() {
if (currentImageUrl) await copyPhoto(currentImageUrl);
}

function downloadPhoto(url, filename) {
const link = document.createElement('a');
link.href = url;
link.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
link.target = '_blank';
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
showToast('⚡ Download dimulai...');
}

function downloadModalImage() {
if (currentImageUrl && currentImageTitle) {
downloadPhoto(currentImageUrl, currentImageTitle);
}
}

function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastText').textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 4000);
}

document.getElementById('imageModal').addEventListener('click', (e) => {
if (e.target.id === 'imageModal') closeModal();
});
document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') closeModal();
});
</script>
</body>

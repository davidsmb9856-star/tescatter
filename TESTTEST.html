<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE TOGEL - Bonus Event</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
/* 🎨 PINK/PURPLE NEON THEME - UI Elements Only */
--neon-pink: #ff00ff;
--neon-purple: #b72aff;
--neon-magenta: #ff1493;
--accent-pink: #ff69b4;
--accent-purple: #9d4edd;
--accent-lavender: #e6a8ff;
--border-color: rgba(255, 0, 255, 0.4);
--text-primary: #ffffff;
--text-muted: #e0c0ff;
--card-bg: rgba(15, 5, 25, 0.85);
--input-bg: rgba(25, 10, 40, 0.9);
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: 'Rajdhani', sans-serif;
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
/* ✅ BACKGROUND HANYA FOTO ANDA */
background: 
linear-gradient(rgba(10, 2, 20, 0.75), rgba(10, 2, 20, 0.85)),
url('https://i.pinimg.com/736x/8e/f1/30/8ef13033451fcb3507e02948f56a9eb7.jpg');
background-size: cover;
background-position: center;
background-attachment: fixed;
background-repeat: no-repeat;
}

/* ✨ CONTENT CONTAINER */
.tab-content {
display: block; padding: 20px; max-width: 1400px; margin: 0 auto;
animation: fadeInUp 0.5s ease-out; position: relative; z-index: 1;
}
@keyframes fadeInUp {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}

/* 🎴 CARD STYLE */
.bonus-section {
background: var(--card-bg);
border: 1px solid var(--border-color); border-radius: 20px;
padding: 25px; margin: 10px; backdrop-filter: blur(10px);
box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(183, 42, 255, 0.15);
}

/* 🌟 JUDUL */
.judul-glow {
font-family: 'Orbitron', sans-serif; font-size: clamp(1.5rem, 4vw, 2.2rem);
font-weight: 900; text-align: center; 
background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple), var(--accent-lavender));
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
letter-spacing: 3px; margin-bottom: 10px;
text-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
}

.bonus-title {
font-family: 'Orbitron', sans-serif; font-size: clamp(1.2rem, 3vw, 1.8rem);
font-weight: 700; text-align: center; 
color: var(--accent-lavender);
letter-spacing: 2px; margin-bottom: 20px;
text-shadow: 0 0 20px rgba(230, 168, 255, 0.4);
}

/* 🔘 BUTTON */
.neon-switch-btn {
font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px;
padding: 12px 20px;
background: rgba(255, 0, 255, 0.15);
border: 1px solid var(--border-color); border-radius: 10px;
color: var(--accent-lavender); cursor: pointer; transition: all 0.3s ease;
position: relative; overflow: hidden; letter-spacing: 0.5px;
}
.neon-switch-btn::before {
content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(255, 0, 255, 0.3), transparent);
transition: left 0.5s ease;
}
.neon-switch-btn:hover::before { left: 100%; }
.neon-switch-btn:hover {
background: rgba(255, 0, 255, 0.3);
border-color: var(--neon-pink); transform: translateY(-2px);
box-shadow: 0 5px 25px rgba(255, 0, 255, 0.4);
}
.neon-switch-btn.active {
background: rgba(183, 42, 255, 0.4);
border-color: var(--neon-purple); color: var(--neon-pink);
box-shadow: 0 0 25px rgba(255, 0, 255, 0.5);
}
.neon-switch-btn.danger { border-color: rgba(255, 20, 147, 0.6); color: var(--neon-magenta); }
.neon-switch-btn.danger:hover {
background: rgba(255, 20, 147, 0.3); border-color: var(--neon-magenta);
}
.neon-switch-btn.orange { border-color: rgba(255, 105, 180, 0.6); color: var(--accent-pink); }
.neon-switch-btn.orange:hover {
background: rgba(255, 105, 180, 0.3); border-color: var(--accent-pink);
}

/* 📝 INPUT */
.bonus-textarea {
width: 100%; min-height: 120px; background: var(--input-bg);
border: 1px solid var(--border-color); border-radius: 12px; padding: 15px;
color: var(--text-primary); font-family: 'Rajdhani', sans-serif;
font-size: 15px; font-weight: 500; resize: vertical; transition: all 0.3s ease;
}
.bonus-textarea:focus {
outline: none; border-color: var(--neon-pink);
box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
}
.bonus-input {
width: 100%; background: var(--input-bg); border: 1px solid var(--border-color);
border-radius: 8px; padding: 10px 14px; color: var(--text-primary);
font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 500;
transition: all 0.3s ease;
}
.bonus-input:focus {
outline: none; border-color: var(--neon-pink);
box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
}
.bonus-input::placeholder { color: var(--text-muted); opacity: 0.85; }
.bonus-label {
display: block; color: var(--accent-lavender); font-weight: 700;
margin-bottom: 6px; font-size: 14px; letter-spacing: 0.5px;
}
.bonus-input-group { margin-bottom: 15px; }

/* 🎯 ACTION BUTTON */
.bonus-btn {
font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px;
padding: 12px 24px; 
background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
border: none; border-radius: 10px; color: #fff; cursor: pointer;
transition: all 0.3s ease; letter-spacing: 0.5px;
}
.bonus-btn:hover { 
transform: translateY(-2px); 
box-shadow: 0 8px 30px rgba(255, 0, 255, 0.5); 
}
.bonus-btn.danger { 
background: linear-gradient(135deg, var(--neon-magenta), #c71585); 
}
.bonus-btn.orange { 
background: linear-gradient(135deg, var(--accent-pink), #da70d6); 
}
.bonus-button-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }

/* 📊 RESULT */
.bonus-result {
background: rgba(255, 0, 255, 0.1);
border: 1px solid var(--border-color); border-radius: 12px; padding: 20px;
margin-top: 20px; font-size: 16px; font-weight: 600; line-height: 1.8; color: var(--text-primary);
}
.bonus-angka {
font-family: 'Orbitron', sans-serif; font-weight: 700; 
color: var(--accent-pink);
font-size: 1.1em;
}

/* 🖼️ GALLERY */
.gallery-container { width: 100%; margin: 20px 0; }
.combined-image-slot {
width: 100%; display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
gap: 15px; padding: 20px;
background: rgba(255, 0, 255, 0.08);
border: 1px solid var(--border-color); border-radius: 16px; cursor: pointer; transition: all 0.3s ease;
}
.combined-image-slot:hover { 
border-color: var(--neon-pink); 
box-shadow: 0 0 30px rgba(255, 0, 255, 0.3); 
}
.combined-image-slot img {
width: calc(33.333% - 10px); min-width: 250px; max-width: 400px; height: auto;
aspect-ratio: 4/3; object-fit: cover; border-radius: 12px;
border: 2px solid var(--border-color); transition: all 0.3s ease;
}
.combined-image-slot img:hover {
border-color: var(--neon-pink); transform: scale(1.03);
}
.caption-userid {
font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700;
color: var(--neon-pink);
width: 100%; text-align: center; padding: 10px 0; letter-spacing: 2px;
}
.package-info {
font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600;
color: var(--accent-lavender); text-align: center; margin-top: 15px;
}

/* 🎭 MODE & CARDS */
.bonus-mode { animation: fadeIn 0.4s ease-out; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.scatter-card {
flex: 1; min-width: 280px;
background: var(--card-bg);
padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); transition: all 0.3s ease;
}
.scatter-card:hover { 
border-color: var(--neon-pink); 
box-shadow: 0 5px 25px rgba(255, 0, 255, 0.2); 
}
.scatter-card-title {
color: var(--neon-pink);
margin: 0 0 12px 0; font-size: 16px;
font-family: 'Orbitron', sans-serif; font-weight: 700;
}

/* 🪟 MODAL */
.modal-overlay {
position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
background: rgba(10, 2, 20, 0.95); z-index: 10000; display: none;
flex-direction: column; justify-content: center; align-items: center; padding: 20px;
animation: modalFadeIn 0.3s ease-out;
}
@keyframes modalFadeIn {
from { opacity: 0; }
to { opacity: 1; }
}
.modal-close {
position: absolute; top: 15px; right: 25px; font-size: 40px; 
color: var(--neon-pink); background: none; border: none; cursor: pointer; 
transition: all 0.3s ease; line-height: 1;
}
.modal-close:hover { color: var(--neon-purple); transform: rotate(90deg); }

.zoom-nav-button {
background: rgba(255, 0, 255, 0.25);
border: 1px solid var(--neon-pink); color: var(--accent-lavender);
padding: 15px 25px; border-radius: 10px; cursor: pointer;
font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; transition: all 0.3s ease;
}
.zoom-nav-button:hover { 
background: rgba(255, 0, 255, 0.4); 
box-shadow: 0 5px 20px rgba(255, 0, 255, 0.4); 
}
.zoom-nav-button:disabled { opacity: 0.3; cursor: not-allowed; }

.zoomed-content-wrapper {
display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: center; max-width: 95%;
}
.zoomed-content-wrapper img {
max-width: 30%; min-width: 200px; max-height: 70vh; object-fit: contain;
border-radius: 12px; border: 2px solid var(--neon-pink);
}

/* 🔍 SCAN MODAL */
#scanScatter2Modal .modal-content {
display: flex; gap: 20px; max-width: 95vw; width: 100%; height: 85vh;
}
#scanScatter2Modal .image-section {
flex: 1; display: flex; justify-content: center; align-items: center; min-width: 300px;
}
#scanScatter2Modal .image-section img {
max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px;
}
#scanScatter2Modal .result-section {
flex: 1; min-width: 300px; max-width: 500px; overflow-y: auto; padding: 20px;
background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color);
}

/* 🔔 TOAST */
.toast {
position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
background: var(--card-bg);
border: 1px solid var(--neon-pink); border-radius: 12px; padding: 15px 30px;
color: var(--text-primary); font-family: 'Rajdhani', sans-serif;
font-size: 16px; font-weight: 600; z-index: 99999; opacity: 0;
transition: all 0.4s ease;
box-shadow: 0 10px 30px rgba(255, 0, 255, 0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 📋 COPY BTN */
.copy-btn {
background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
color: #fff; border: none; padding: 6px 12px; border-radius: 6px;
cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
transition: all 0.3s ease;
}
.copy-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(255, 0, 255, 0.5); }
.copy-btn.copied { background: var(--accent-lavender); color: #0a0214; }

/* 📦 RESULT ITEM */
.result-item {
margin-bottom: 12px; padding: 12px 15px;
background: rgba(255, 0, 255, 0.15);
border: 1px solid rgba(255, 0, 255, 0.4); border-radius: 10px;
display: flex; justify-content: space-between; align-items: center; gap: 15px;
transition: all 0.3s ease;
}
.result-item:hover { 
border-color: var(--neon-pink); 
background: rgba(255, 0, 255, 0.25); 
}
.result-item.green {
background: rgba(255, 105, 180, 0.15);
border-color: rgba(255, 105, 180, 0.5);
}
.result-item span {
word-break: break-all; font-family: 'Orbitron', sans-serif; font-size: 14px; letter-spacing: 1px;
}
.input-with-buttons { display: flex; gap: 8px; align-items: center; }
.input-with-buttons .bonus-input { flex: 1; }
.input-with-buttons .bonus-btn { padding: 8px 12px; font-size: 14px; white-space: nowrap; }

/* 📱 RESPONSIVE */
@media (max-width: 768px) {
.bonus-section { padding: 15px; margin: 5px; }
.neon-switch-btn { padding: 10px 15px; font-size: 13px; }
.combined-image-slot img { width: 100%; max-width: 100%; min-width: unset; }
.zoomed-content-wrapper img { max-width: 100%; min-width: unset; }
#scanScatter2Modal .modal-content { flex-direction: column; height: auto; }
#scanScatter2Modal .image-section,
#scanScatter2Modal .result-section { min-width: unset; max-width: 100%; width: 100%; }
.input-with-buttons { flex-wrap: wrap; }
.input-with-buttons .bonus-input { width: 100%; }
.input-with-buttons .bonus-btn { flex: 1; min-width: 80px; }
}

/* ♿ ACCESSIBILITY */
button:focus-visible, input:focus-visible, textarea:focus-visible {
outline: 2px solid var(--neon-pink); outline-offset: 2px;
}

/* 🔇 REDUCED MOTION */
@media (prefers-reduced-motion: reduce) {
* { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<!-- ================= TAB CEK BONUS EVENT ================= -->
<div id="cekBonusEventTab" class="tab-content">
<div class="bonus-section">
<h3 class="judul-glow">✨ PORTAL ✨</h3>
<h2 class="bonus-title">💜 BONUS EVENT 💜</h2>

<!-- ============ 3 SWITCH MODE BUTTON ============ -->
<div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 15px 0;">
<button class="neon-switch-btn" onclick="switchBonusMode('bonusAsli')" id="btn-bonusAsli">🔮 Cek Bonus Asli</button>
<button class="neon-switch-btn" onclick="switchBonusMode('galeri')" id="btn-galeri">🖼️ CEK GAMBAR</button>
<button class="neon-switch-btn" onclick="switchBonusMode('inputScatter')" id="btn-inputScatter">⚡ Input Scatter</button>
</div>

<!-- ============ MODE 1: CEK BONUS ASLI ============ -->
<div id="modeBonusAsli" class="bonus-mode">
<textarea id="bonusTextarea" class="bonus-textarea" placeholder="✨ Tempelkan data transaksi di sini..."></textarea>
<div class="bonus-input-group">
<label for="bonusPatokan" class="bonus-label">💎 Nilai Patokan:</label>
<input type="text" id="bonusPatokan" class="bonus-input" placeholder="Contoh: 5000000">
</div>
<div class="bonus-input-group">
<label for="bonusSurplus" class="bonus-label">🌟 Nilai Surplus:</label>
<input type="text" id="bonusSurplus" class="bonus-input" placeholder="Contoh: 1500000">
</div>
<div class="bonus-button-group">
<button onclick="hitungBonusEvent()" class="bonus-btn">✨ Hitung Bonus</button>
<button onclick="hapusBonusEvent()" class="bonus-btn danger">🗑️ Bersihkan</button>
</div>
<div id="bonusHasil" class="bonus-result"></div>
<div class="bonus-input-group" style="margin-top: 15px;">
<label for="imageUrl" class="bonus-label">🔗 Link Gambar Transaksi:</label>
<input type="text" id="imageUrl" class="bonus-input" placeholder="Tempel link gambar di sini...">
</div>
</div>

<!-- ============ MODE 2: GALERI GAMBAR ============ -->
<div id="modeGaleri" class="bonus-mode" style="display: none;">
<h2 class="bonus-title">🖼️ CEK GAMBAR</h2>
<p style="text-align: center; color: var(--text-muted); margin-bottom: 12px; font-weight: 600;">
Format: <strong style="color: var(--neon-pink);">USERID link1 link2 link3</strong>
</p>
<textarea id="bonusLinkInput" class="bonus-textarea" placeholder="✨ Tempelkan data paket di sini. Setiap baris = satu paket." rows="5" oninput="handleBonusInput()" onpaste="handleBonusInput()"></textarea>
<div class="bonus-button-group">
<button onclick="clearBonusAllData()" class="bonus-btn danger">🗑️ Hapus Semua</button>
</div>
<hr style="margin: 20px 0; border-color: var(--border-color); opacity: 0.5;">
<div class="gallery-container">
<div class="combined-image-slot" id="bonusCombinedImageSlot" onclick="openBonusZoom()">
<p class="caption-userid" id="bonusCombinedSlotUserid">💜 USER ID</p>
<img id="bonusImgSlot1" src="https://via.placeholder.com/400x300/1a0a2e/ff00ff?text=✨+1" alt="Gambar 1">
<img id="bonusImgSlot2" src="https://via.placeholder.com/400x300/1a0a2e/b72aff?text=✨+2" alt="Gambar 2">
<img id="bonusImgSlot3" src="https://via.placeholder.com/400x300/1a0a2e/ff1493?text=✨+3" alt="Gambar 3">
</div>
</div>
<p class="package-info">📦 Paket: <span id="bonusCurrentPackageNum">0</span> / <span id="bonusMaxPackageNum">0</span></p>
</div>

<!-- ============ MODE 3: INPUT SCATTER (2 DATA) ============ -->
<div id="modeInputScatter" class="bonus-mode" style="display: none;">
<div style="display: flex; gap: 16px; justify-content: space-between; flex-wrap: wrap;">

<!-- DATA 1 -->
<div class="scatter-card">
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
<h4 class="scatter-card-title">💜 DATA SCATTER 1</h4>
<button onclick="copyData1()" class="neon-switch-btn" style="padding: 6px 12px; font-size: 12px;">📋 Copy</button>
</div>
<div class="bonus-input-group" style="margin: 8px 0;">
<label class="bonus-label" style="font-size: 13px;">1. UID:</label>
<input type="text" id="bonusUserid1" class="bonus-input" placeholder="San221" style="padding: 8px; font-size: 14px;">
</div>
<div class="bonus-input-group" style="margin: 8px 0;">
<label class="bonus-label" style="font-size: 13px;">2. S1:</label>
<input type="text" id="bonusScatter1_1" class="bonus-input" placeholder="🔗 Link gambar S1..." style="padding: 8px; font-size: 14px;">
</div>
<div class="bonus-input-group" style="margin: 8px 0;">
<label class="bonus-label" style="font-size: 13px;">3. S2 (Scan OCR):</label>
<div class="input-with-buttons">
<input type="text" id="bonusScatter2_1" class="bonus-input" placeholder="🔗 Link gambar PNG..." style="padding: 8px; font-size: 14px;">
<button type="button" onclick="scanScatter2(1)" class="bonus-btn" style="padding: 8px 12px; font-size: 14px;">🔍 Scan</button>
</div>
</div>
<div class="bonus-input-group" style="margin: 8px 0;">
<label class="bonus-label" style="font-size: 13px;">4. S3:</label>
<input type="text" id="bonusScatter3_1" class="bonus-input" placeholder="🔗 Link gambar S3..." style="padding: 8px; font-size: 14px;">
</div>
<div class="bonus-input-group" style="margin: 8px 0;">
<label class="bonus-label" style="font-size: 13px;">5. Rek:</label>
<input type="text" id="bonusRekening1" class="bonus-input" placeholder="A SUWARSAN,085882449440" style="padding: 8px; font-size: 14px;">
</div>
<div class="bonus-input-group" style="margin: 8px 0;">
<label class="bonus-label" style="font-size: 13px;">6. Kode:</label>
<input type="text" id="bonusKodeTransaksi1" class="bonus-input" placeholder="✨ Kode hasil scan..." style="padding: 8px; font-size: 14px;">
</div>
<div style="margin-top: 20px; text-align: center;">
<button onclick="viewAllScatterPhotos(1)" class="neon-switch-btn orange" style="width: 100%; padding: 12px; font-size: 14px;">
🖼️ Lihat 3 Foto (S1+S2+S3)
</button>
</div>
</div>

<!-- DATA 2 -->
<div class="scatter-card">
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
<h4 class="scatter-card-title">💜 DATA SCATTER 2</h4>
<button onclick="copyData2()" class="neon-switch-btn" style="padding: 6px 12px; font-size: 12px;">📋 Copy</button>
</div>
<div class="bonus-input-group" style="margin: 8px 0;">
<label class="bonus-label" style="font-size: 13px;">1. UID:</label>
<input type="text" id="bonusUserid2" class="bonus-input" placeholder="Budi123" style="padding: 8px; font-size: 14px;">
</div>
<div class="bonus-input-group" style="margin: 8px 0;">
<label class="bonus-label" style="font-size: 13px;">2. S1:</label>
<input type="text" id="bonusScatter1_2" class="bonus-input" placeholder="🔗 Link gambar S1..." style="padding: 8px; font-size: 14px;">
</div>
<div class="bonus-input-group" style="margin: 8px 0;">
<label class="bonus-label" style="font-size: 13px;">3. S2 (Scan OCR):</label>
<div class="input-with-buttons">
<input type="text" id="bonusScatter2_2" class="bonus-input" placeholder="🔗 Link gambar PNG..." style="padding: 8px; font-size: 14px;">
<button type="button" onclick="scanScatter2(2)" class="bonus-btn" style="padding: 8px 12px; font-size: 14px;">🔍 Scan</button>
</div>
</div>
<div class="bonus-input-group" style="margin: 8px 0;">
<label class="bonus-label" style="font-size: 13px;">4. S3:</label>
<input type="text" id="bonusScatter3_2" class="bonus-input" placeholder="🔗 Link gambar S3..." style="padding: 8px; font-size: 14px;">
</div>
<div class="bonus-input-group" style="margin: 8px 0;">
<label class="bonus-label" style="font-size: 13px;">5. Rek:</label>
<input type="text" id="bonusRekening2" class="bonus-input" placeholder="BUDI,1234567890" style="padding: 8px; font-size: 14px;">
</div>
<div class="bonus-input-group" style="margin: 8px 0;">
<label class="bonus-label" style="font-size: 13px;">6. Kode:</label>
<input type="text" id="bonusKodeTransaksi2" class="bonus-input" placeholder="✨ Kode hasil scan..." style="padding: 8px; font-size: 14px;">
</div>

<script>
// ================= INITIALIZATION =================
let currentBonusMode = 'bonusAsli';
let currentDataIndex = 1;
let bonusAllPackagesData = [];
let bonusCurrentPackageIndex = 0;
const bonusPackageSize = 3;
let isBonusZoomOpen = false;
let imageList = [];
let currentImageIndex = 0;
let scatterZoomImages = [];
let scatterZoomIndex = 0;
let currentScatterDataIndex = 1;

function showToast(message) {
const toast = document.getElementById('toast');
if (!toast) return;
toast.textContent = '✨ ' + message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

// ================= MODE SWITCHING =================
function switchBonusMode(mode) {
document.getElementById('modeBonusAsli').style.display = 'none';
document.getElementById('modeGaleri').style.display = 'none';
document.getElementById('modeInputScatter').style.display = 'none';
if (mode === 'bonusAsli') document.getElementById('modeBonusAsli').style.display = 'block';
else if (mode === 'galeri') document.getElementById('modeGaleri').style.display = 'block';
else if (mode === 'inputScatter') document.getElementById('modeInputScatter').style.display = 'block';
['bonusAsli', 'galeri', 'inputScatter'].forEach(id => {
const btn = document.getElementById('btn-' + id);
if (btn) btn.classList.toggle('active', id === mode);
});
}

// ================= VIEW ALL 3 SCATTER PHOTOS =================
function viewAllScatterPhotos(dataIndex) {
currentScatterDataIndex = dataIndex;
const s1 = document.getElementById('bonusScatter1_' + dataIndex).value.trim();
const s2 = document.getElementById('bonusScatter2_' + dataIndex).value.trim();
const s3 = document.getElementById('bonusScatter3_' + dataIndex).value.trim();
scatterZoomImages = [s1, s2, s3].filter(link => link && link.startsWith('http'));
if (scatterZoomImages.length === 0) {
showToast("Tidak ada link gambar yang valid! 💜");
return;
}
scatterZoomIndex = 0;
updateScatterZoomDisplay();
const modal = document.getElementById('scatterZoomModal');
const title = document.getElementById('scatterZoomTitle');
const caption = document.getElementById('scatterZoomCaption');
if (title) title.textContent = `🖼️ ${scatterZoomImages.length} Foto - Data ${dataIndex}`;
if (caption) caption.textContent = `💡 Gunakan tombol Prev/Next atau panah keyboard ⬅️➡️`;
if (modal) modal.style.display = 'flex';
}

function updateScatterZoomDisplay() {
const wrapper = document.getElementById('scatterZoomContent');
if (!wrapper) return;
wrapper.innerHTML = '';
scatterZoomImages.forEach((link, idx) => {
const img = document.createElement('img');
img.src = link;
img.alt = `Scatter ${idx + 1}`;
img.style.cssText = 'max-width: 30%; min-width: 200px; max-height: 70vh; object-fit: contain; border-radius: 12px; border: 2px solid var(--neon-pink); cursor: pointer; transition: transform 0.3s ease;';
img.onmouseover = () => img.style.transform = 'scale(1.03)';
img.onmouseout = () => img.style.transform = 'scale(1)';
img.onclick = () => openLightboxScatter(img);
wrapper.appendChild(img);
});
}

function closeScatterZoom() {
const modal = document.getElementById('scatterZoomModal');
const wrapper = document.getElementById('scatterZoomContent');
if (modal) modal.style.display = 'none';
if (wrapper) wrapper.innerHTML = '';
scatterZoomImages = [];
scatterZoomIndex = 0;
}

function openLightboxScatter(imgElement) {
imageList = [...scatterZoomImages];
currentImageIndex = imageList.indexOf(imgElement.src);
const lightboxImage = document.getElementById("lightboxImage");
if (lightboxImage) lightboxImage.src = imgElement.src;
const lightboxModal = document.getElementById("lightboxModal");
if (lightboxModal) lightboxModal.style.display = 'flex';
}

function prevScatterImage() { showToast("💡 Gunakan lightbox untuk zoom per gambar"); }
function nextScatterImage() { showToast("💡 Gunakan lightbox untuk zoom per gambar"); }

// ================= SCAN SCATTER 2 (OCR) =================
function scanScatter2(index) {
currentDataIndex = index;
const link = document.getElementById('bonusScatter2_' + index).value.trim();
if (!link) { showToast("Masukkan link gambar Scatter 2! 🔍"); return; }
const img = document.getElementById('scanScatter2Image');
const resultDiv = document.getElementById('scanScatter2Result');
const modal = document.getElementById('scanScatter2Modal');
if (img) img.src = link;
if (modal) modal.style.display = 'flex';
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--accent-lavender); font-weight: 600;">✨ Memindai gambar...</span>';
if (typeof Tesseract === 'undefined') {
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--neon-magenta); font-weight: 700;">⚠️ Tesseract.js belum dimuat.</span>';
return;
}
Tesseract.recognize(link, 'ind', { logger: m => console.log(m) }).then(({  { text } }) => {
const rawLines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
let hasilGabung = [], hasilLangsung = [];
for (let i = 0; i < rawLines.length; i++) {
const line = rawLines[i];
const match = line.match(/\b\d{9,10}\b/);
if (match) {
if (i + 1 < rawLines.length) {
const nextLine = rawLines[i + 1].trim();
const nextMatch = nextLine.match(/\b\d{8,}\b/);
if (nextMatch) { hasilGabung.push(match[0] + nextMatch[0]); i++; continue; }
}
hasilGabung.push(match[0]);
}
}
for (const line of rawLines) {
const matches = line.match(/\d{8,}/g);
if (matches) matches.forEach(m => hasilLangsung.push(m));
}
hasilGabung = [...new Set(hasilGabung)];
hasilLangsung = [...new Set(hasilLangsung)];
if (resultDiv) resultDiv.innerHTML = "";
if (hasilGabung.length > 0) {
const title1 = document.createElement("div");
title1.innerHTML = '<b style="color: var(--neon-pink); font-size: 16px;">✨ Hasil Gabungan Baris:</b>';
title1.style.margin = "15px 0 8px";
if (resultDiv) resultDiv.appendChild(title1);
hasilGabung.forEach(kode => {
const div = document.createElement("div");
div.className = "result-item";
div.innerHTML = `<span style="font-weight: 600;">${kode}</span>
<div style="display:flex; gap:8px;">
<button onclick="copyWithFeedback(this, '${kode}')" class="copy-btn">📋 Copy</button>
<button onclick="pilihKodeTransaksi('${kode}')" class="copy-btn" style="background: var(--accent-lavender); color: var(--bg-dark);">✅ Pilih</button>
</div>`;
if (resultDiv) resultDiv.appendChild(div);
});
}
if (hasilLangsung.length > 0) {
const title2 = document.createElement("div");
title2.innerHTML = '<b style="color: var(--accent-pink); font-size: 16px;">💜 Hasil Angka Per Baris:</b>';
title2.style.margin = "15px 0 8px";
if (resultDiv) resultDiv.appendChild(title2);
hasilLangsung.forEach(kode => {
const div = document.createElement("div");
div.className = "result-item green";
div.innerHTML = `<span style="font-weight: 600;">${kode}</span>
<div style="display:flex; gap:8px;">
<button onclick="copyWithFeedback(this, '${kode}')" class="copy-btn">📋 Copy</button>
<button onclick="pilihKodeTransaksi('${kode}')" class="copy-btn" style="background: var(--accent-lavender); color: var(--bg-dark);">✅ Pilih</button>
</div>`;
if (resultDiv) resultDiv.appendChild(div);
});
}
if (hasilGabung.length === 0 && hasilLangsung.length === 0) {
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--neon-magenta); font-weight: 700;">❌ Tidak ditemukan angka panjang dalam gambar.</span>';
}
}).catch(err => {
console.error(err);
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--neon-magenta); font-weight: 700;">❌ Gagal membaca gambar.</span>';
});
}

function copyWithFeedback(btn, text) {
navigator.clipboard.writeText(text).then(() => {
const original = btn.innerHTML;
btn.innerHTML = '✅ OK';
btn.classList.add('copied');
setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 1200);
}).catch(() => showToast("Gagal menyalin ❌"));
}

function pilihKodeTransaksi(kode) {
document.getElementById('bonusKodeTransaksi' + currentDataIndex).value = kode;
closeScanScatter2Modal();
showToast("✨ Kode Data " + currentDataIndex + " dipilih: " + kode);
}

function closeScanScatter2Modal() {
const modal = document.getElementById('scanScatter2Modal');
if (modal) modal.style.display = 'none';
}

// ================= COPY FUNCTIONS =================
function prosesRekening(rek) {
const parts = rek.split(',').map(p => p.trim());
return { nomor: parts.slice(1).join(',') || '', nama: parts[0] || '' };
}

function getDataAs7Columns(prefix) {
const userid = document.getElementById('bonusUserid' + prefix).value.trim();
const s1 = document.getElementById('bonusScatter1_' + prefix).value.trim();
const s2 = document.getElementById('bonusScatter2_' + prefix).value.trim();
const s3 = document.getElementById('bonusScatter3_' + prefix).value.trim();
const rek = document.getElementById('bonusRekening' + prefix).value.trim();
const kode = document.getElementById('bonusKodeTransaksi' + prefix).value.trim();
let parts = [];
if (userid) parts.push(userid);
if (s1) parts.push(s1);
if (s2) parts.push(s2);
if (s3) parts.push(s3);
if (rek) {
const { nomor, nama } = prosesRekening(rek);
if (nomor) parts.push(nomor);
if (nama) parts.push(nama);
}
if (kode) parts.push(kode);
return parts.join('\t');
}

function copyData1() {
const data = getDataAs7Columns('1');
navigator.clipboard.writeText(data || '');
showToast(data ? "✨ Data 1 disalin!" : "Data 1 kosong");
}

function copyData2() {
const data = getDataAs7Columns('2');
navigator.clipboard.writeText(data || '');
showToast(data ? "✨ Data 2 disalin!" : "Data 2 kosong");
}

function copySemuaData() {
const data1 = getDataAs7Columns('1');
const data2 = getDataAs7Columns('2');
let lines = [];
if (data1 !== '') lines.push(data1);
if (data2 !== '') lines.push(data2);
const teks = lines.join('\n');
navigator.clipboard.writeText(teks);
showToast(teks ? "✨ Semua data valid disalin!" : "Tidak ada data terisi");
}

function hapusSemuaData() {
['1','2'].forEach(p => {
['bonusUserid','bonusScatter1_','bonusScatter2_','bonusScatter3_','bonusRekening','bonusKodeTransaksi'].forEach(field => {
const el = document.getElementById(field + p);
if (el) el.value = '';
});
});
showToast("🗑️ Semua data dihapus");
}

// ================= HITUNG BONUS EVENT =================
function hitungBonusEvent() {
const isi = document.getElementById("bonusTextarea").value.trim();
const patokan = parseInt((document.getElementById("bonusPatokan").value || '').replace(/[^\d]/g, '')) || 0;
const surplus = parseInt((document.getElementById("bonusSurplus").value || '').replace(/[^\d]/g, '')) || 0;
if (!isi) { showToast("✨ Tempelkan data terlebih dahulu"); return; }
const lines = isi.split("\n");
let total = 0, i = 0;
while (i < lines.length) {
if (lines[i].trim() === 'Credit' && i + 1 < lines.length) {
const amountMatch = lines[i + 1].trim().match(/IDR\s([\d,]+)/i);
if (amountMatch) {
const amount = parseFloat(amountMatch[1].replace(/,/g, ''));
if (!isNaN(amount)) total += amount;
}
}
i++;
}
const hasilDiv = document.getElementById("bonusHasil");
if (hasilDiv) {
let output = '<strong>✨ Total Hitungan:</strong> <span class="bonus-angka">IDR ' + total.toLocaleString("en-US") + '</span>';
if (patokan || surplus) {
const totalPengurang = patokan + surplus;
const selisih = total - totalPengurang;
const selisihColor = selisih >= 0 ? 'var(--accent-pink)' : 'var(--neon-magenta)';
output += '<br><strong>💎 Patokan:</strong> <span class="bonus-angka">IDR ' + patokan.toLocaleString("en-US") + '</span>';
output += '<br><strong>🌟 Surplus:</strong> <span class="bonus-angka">IDR ' + surplus.toLocaleString("en-US") + '</span>';
output += '<br><strong>📊 Total Dikurang:</strong> <span class="bonus-angka">IDR ' + totalPengurang.toLocaleString("en-US") + '</span>';
output += '<br><strong>💜 Selisih:</strong> <span class="bonus-angka" style="color:' + selisihColor + '">IDR ' + Math.abs(selisih).toLocaleString("en-US") + '</span>';
}
hasilDiv.innerHTML = output;
}
}

function hapusBonusEvent() {
["bonusTextarea","bonusPatokan","bonusSurplus","bonusHasil","imageUrl"].forEach(id => {
const el = document.getElementById(id);
if (el) { if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') el.value = ""; else el.innerHTML = ""; }
});
showToast("✨ Form berhasil dibersihkan");
}

// ================= GALERI OTOMATIS =================
let bonusInputTimeout;
function handleBonusInput() {
clearTimeout(bonusInputTimeout);
bonusInputTimeout = setTimeout(loadBonusImages, 50);
}

function loadBonusImages() {
const inputEl = document.getElementById('bonusLinkInput');
if (!inputEl) return;
const input = inputEl.value || '';
const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
bonusAllPackagesData = [];
lines.forEach(line => {
const words = line.split(/\s+/).filter(w => w.length > 0);
const urls = words.filter(w => /^https?:\/\//.test(w));
const userid = words.length > 0 && !/^https?:\/\//.test(words[0]) ? words[0] : 'N/A';
if (urls.length >= 1) {
const links = [...urls.slice(0, bonusPackageSize)];
while (links.length < bonusPackageSize) links.push('');
bonusAllPackagesData.push({ userid, links });
}
});
const maxNumEl = document.getElementById('bonusMaxPackageNum');
if (maxNumEl) maxNumEl.textContent = bonusAllPackagesData.length;
if (bonusAllPackagesData.length > 0) {
bonusCurrentPackageIndex = Math.max(0, Math.min(bonusCurrentPackageIndex, bonusAllPackagesData.length - 1));
updateBonusGallery(bonusCurrentPackageIndex);
} else {
updateBonusGallery(-1);
const currentNumEl = document.getElementById('bonusCurrentPackageNum');
if (currentNumEl) currentNumEl.textContent = '0';
}
}

function updateBonusGallery(index) {
const slots = ['bonusImgSlot1', 'bonusImgSlot2', 'bonusImgSlot3'].map(id => document.getElementById(id));
const combined = document.getElementById('bonusCombinedImageSlot');
const useridEl = document.getElementById('bonusCombinedSlotUserid');
const currentNumEl = document.getElementById('bonusCurrentPackageNum');
if (index >= 0 && index < bonusAllPackagesData.length) {
const { userid, links } = bonusAllPackagesData[index];
if (useridEl) useridEl.textContent = '💜 ' + userid;
if (combined) { combined.style.opacity = '1'; combined.style.pointerEvents = 'auto'; }
slots.forEach((img, i) => {
if (!img) return;
img.src = links[i] || "https://via.placeholder.com/400x300/1a0a2e/ff00ff?text=✨";
img.style.display = 'inline-block';
});
if (currentNumEl) currentNumEl.textContent = index + 1;
} else {
if (useridEl) useridEl.textContent = '💜 Belum Ada Data';
if (combined) { combined.style.opacity = '0.4'; combined.style.pointerEvents = 'none'; }
slots.forEach((img, i) => {
if (!img) return;
img.src = "https://via.placeholder.com/400x300/1a0a2e/b72aff?text=✨";
img.style.display = 'inline-block';
});
if (currentNumEl) currentNumEl.textContent = '0';
}
}

function navigateBonusPackage(dir) {
if (bonusAllPackagesData.length <= 1) return;
const total = bonusAllPackagesData.length;
if (dir === 'next' && bonusCurrentPackageIndex < total - 1) bonusCurrentPackageIndex++;
else if (dir === 'prev' && bonusCurrentPackageIndex > 0) bonusCurrentPackageIndex--;
updateBonusGallery(bonusCurrentPackageIndex);
if (isBonusZoomOpen) {
const pkg = bonusAllPackagesData[bonusCurrentPackageIndex];
updateBonusZoomDisplay(pkg.userid, pkg.links);
}
}

function updateBonusZoomDisplay(userid, links) {
const wrapper = document.getElementById('bonusZoomedContentWrapper');
const useridEl = document.getElementById('bonusZoomedUserid');
if (!wrapper) return;
wrapper.innerHTML = '';
links.filter(Boolean).forEach(link => {
const img = document.createElement('img');
img.src = link;
img.style.cssText = 'max-width: 30%; min-width: 200px; max-height: 70vh; object-fit: contain; border-radius: 12px; border: 2px solid var(--neon-pink); transition: transform 0.3s ease;';
img.onmouseover = () => img.style.transform = 'scale(1.03)';
img.onmouseout = () => img.style.transform = 'scale(1)';
wrapper.appendChild(img);
});
if (useridEl) useridEl.textContent = '💜 ' + userid;
const prevBtn = document.getElementById('bonusPrevZoomBtn');
const nextBtn = document.getElementById('bonusNextZoomBtn');
const index = bonusCurrentPackageIndex;
const total = bonusAllPackagesData.length;
if (prevBtn) prevBtn.disabled = (index <= 0);
if (nextBtn) nextBtn.disabled = (index >= total - 1);
}

function openBonusZoom() {
if (bonusAllPackagesData.length === 0) return;
const current = bonusAllPackagesData[bonusCurrentPackageIndex];
if (!current.links.some(l => l)) return;
isBonusZoomOpen = true;
updateBonusZoomDisplay(current.userid, current.links);
const modal = document.getElementById('bonusZoomModal');
if (modal) modal.style.display = 'flex';
}

function closeBonusZoom() {
const modal = document.getElementById('bonusZoomModal');
if (modal) modal.style.display = 'none';
isBonusZoomOpen = false;
}

function clearBonusAllData() {
bonusAllPackagesData = [];
const inputEl = document.getElementById('bonusLinkInput');
if (inputEl) inputEl.value = '';
updateBonusGallery(-1);
const maxNumEl = document.getElementById('bonusMaxPackageNum');
if (maxNumEl) maxNumEl.textContent = '0';
showToast("🗑️ Semua data galeri dihapus");
}

// ================= ZOOM & LIGHTBOX =================
function closeZoom() {
['zoomModal','zoomedImage','imageUrl','kodeHasilZoom'].forEach(id => {
const el = document.getElementById(id);
if (el) { if (el.tagName === 'IMG' || el.tagName === 'INPUT') el.src = el.value = ''; else el.innerHTML = ""; }
});
}

function openLightbox(imgElement) {
imageList = Array.from(document.querySelectorAll("#bonusCombinedImageSlot img")).filter(img => img.style.display !== "none").map(img => img.src);
currentImageIndex = imageList.indexOf(imgElement.src);
const lightboxImage = document.getElementById("lightboxImage");
if (lightboxImage) lightboxImage.src = imgElement.src;
const lightboxModal = document.getElementById("lightboxModal");
if (lightboxModal) lightboxModal.style.display = 'flex';
}

function closeLightbox() {
const lightboxModal = document.getElementById("lightboxModal");
const lightboxImage = document.getElementById("lightboxImage");
if (lightboxModal) lightboxModal.style.display = 'none';
if (lightboxImage) lightboxImage.src = '';
}

function nextImage() {
if (imageList.length === 0) return;
currentImageIndex = (currentImageIndex + 1) % imageList.length;
const lightboxImage = document.getElementById("lightboxImage");
if (lightboxImage) lightboxImage.src = imageList[currentImageIndex];
}

function prevImage() {
if (imageList.length === 0) return;
currentImageIndex = (currentImageIndex - 1 + imageList.length) % imageList.length;
const lightboxImage = document.getElementById("lightboxImage");
if (lightboxImage) lightboxImage.src = imageList[currentImageIndex];
}

// ================= KEYBOARD SUPPORT =================
document.addEventListener('keydown', (e) => {
if (isBonusZoomOpen && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
e.preventDefault();
navigateBonusPackage(e.key === 'ArrowLeft' ? 'prev' : 'next');
} else if (e.key === 'Escape') {
[closeBonusZoom, closeScatterZoom, closeScanScatter2Modal].forEach(fn => fn());
}
});

// ================= INITIALIZE =================
document.addEventListener('DOMContentLoaded', function() {
switchBonusMode('bonusAsli');
});
</script>
</body>
</html>

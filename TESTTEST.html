<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00f5ff">
<meta name="description" content="FOTO Gallery - LINE TOGEL Cyber Portal 2026">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  /* Neon Color Palette - Enhanced */
  --neon-blue: #00d4ff;
  --neon-cyan: #00ffff;
  --neon-electric: #00f5ff;
  --neon-purple: #7b2fff;
  --neon-pink: #ff00aa;
  --neon-gold: #ffd700;
  --neon-green: #00ff9d;
  --neon-orange: #ff6b35;
  
  /* Background Layers */
  --bg-deep: #020408;
  --bg-surface: rgba(5, 15, 35, 0.92);
  --bg-elevated: rgba(10, 25, 55, 0.85);
  --bg-glass: rgba(8, 20, 45, 0.75);
  --bg-glass-strong: rgba(15, 35, 75, 0.85);
  
  /* Text Colors */
  --text-primary: #ffffff;
  --text-secondary: #8ab4f8;
  --text-dim: #54689a;
  --text-glow: rgba(0, 245, 255, 0.8);
  
  /* Borders & Glows */
  --border-glow: rgba(0, 212, 255, 0.65);
  --border-glow-strong: rgba(0, 245, 255, 0.85);
  --glow-blue: 0 0 15px rgba(0, 212, 255, 0.6), 0 0 35px rgba(0, 212, 255, 0.4), 0 0 60px rgba(0, 212, 255, 0.2);
  --glow-electric: 0 0 20px rgba(0, 245, 255, 0.75), 0 0 50px rgba(0, 245, 255, 0.5), 0 0 90px rgba(0, 245, 255, 0.25);
  --glow-purple: 0 0 18px rgba(123, 47, 255, 0.65), 0 0 45px rgba(123, 47, 255, 0.4);
  --glow-pink: 0 0 18px rgba(255, 0, 170, 0.65), 0 0 45px rgba(255, 0, 170, 0.4);
  --glow-green: 0 0 18px rgba(0, 255, 157, 0.65), 0 0 45px rgba(0, 255, 157, 0.4);
  
  /* Transitions */
  --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  --transition-bloom: 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-elastic: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  
  /* Layout */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --spacing-xs: 6px;
  --spacing-sm: 10px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 20px; }
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== BACKGROUND EFFECTS - ENHANCED ===== */
.bg-canvas {
  position: fixed; inset: 0; z-index: -3;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 15%, rgba(0, 245, 255, 0.15) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 85%, rgba(123, 47, 255, 0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 15% 75%, rgba(255, 0, 170, 0.08) 0%, transparent 60%);
  animation: bgPulse 18s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0%, 100% { opacity: 1; filter: hue-rotate(0deg) brightness(1); }
  50% { opacity: 0.95; filter: hue-rotate(25deg) brightness(1.05); }
}

.grid-overlay {
  position: fixed; inset: 0; z-index: -2;
  background-image:
    linear-gradient(rgba(0, 212, 255, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 255, 0.08) 1px, transparent 1px);
  background-size: 45px 45px;
  mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, black 25%, transparent 80%);
  animation: gridMove 35s linear infinite;
  opacity: 0.9;
}
@keyframes gridMove {
  0% { background-position: 0 0; }
  100% { background-position: 45px 45px; }
}

/* Lightning Effect - Refined */
.lightning-overlay {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  opacity: 0; animation: lightningFlash 10s infinite;
}
@keyframes lightningFlash {
  0%, 87%, 89%, 91%, 93%, 100% { opacity: 0; }
  88%, 90%, 92% { opacity: 0.12; }
}
.lightning-bolt {
  position: absolute; width: 2px; height: 100vh;
  background: linear-gradient(180deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
  filter: blur(2.5px);
  animation: lightningStrike 10s infinite;
  opacity: 0;
}
.lightning-bolt:nth-child(1) { left: 18%; animation-delay: 1s; }
.lightning-bolt:nth-child(2) { left: 52%; animation-delay: 4s; }
.lightning-bolt:nth-child(3) { left: 82%; animation-delay: 7s; }
@keyframes lightningStrike {
  0%, 86%, 88%, 90%, 92%, 100% { transform: scaleY(0); opacity: 0; }
  87%, 89%, 91% { transform: scaleY(1); opacity: 1; }
}

/* Particles - Enhanced */
.particles {
  position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden;
}
.particle {
  position: absolute; width: 3px; height: 3px;
  background: var(--neon-electric); border-radius: 50%;
  opacity: 0; animation: particleFloat 22s infinite ease-in-out;
  box-shadow: 0 0 12px var(--neon-electric), 0 0 25px var(--neon-blue);
}
.particle:nth-child(2n) {
  background: var(--neon-blue);
  box-shadow: 0 0 10px var(--neon-blue), 0 0 22px var(--neon-cyan);
  animation-delay: -6s; animation-duration: 28s;
}
.particle:nth-child(3n) {
  background: var(--neon-purple);
  box-shadow: 0 0 12px var(--neon-purple), 0 0 25px rgba(123, 47, 255, 0.6);
  animation-delay: -12s; animation-duration: 32s;
}
.particle:nth-child(4n) {
  background: var(--neon-pink);
  box-shadow: 0 0 10px var(--neon-pink), 0 0 20px rgba(255, 0, 170, 0.5);
  animation-delay: -18s; animation-duration: 26s;
}
@keyframes particleFloat {
  0%, 100% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }
  8% { opacity: 0.85; }
  92% { opacity: 0.85; }
  100% { transform: translateY(-100vh) rotate(720deg) scale(1.2); opacity: 0; }
}

/* Scanline & Noise */
.scanline {
  position: fixed; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
  opacity: 0.5; animation: scanLine 7s linear infinite;
  z-index: 50; pointer-events: none; filter: blur(1.2px);
}
@keyframes scanLine {
  0% { top: -3px; opacity: 0; }
  6% { opacity: 0.55; }
  94% { opacity: 0.55; }
  100% { top: 100%; opacity: 0; }
}
.noise {
  position: fixed; inset: 0; z-index: -1; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  pointer-events: none; animation: noiseShift 0.5s steps(2) infinite;
}
@keyframes noiseShift {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(-1px, 1px); }
  50% { transform: translate(1px, -1px); }
  75% { transform: translate(-1px, -1px); }
}

/* ===== LAYOUT ===== */
.container {
  max-width: 1450px; margin: 0 auto; padding: 28px 20px;
  min-height: 100vh; position: relative;
}

/* Back Button - Enhanced */
.back-btn {
  position: fixed; left: 20px; top: 22px;
  background: rgba(0, 212, 255, 0.18);
  border: 1px solid var(--neon-blue);
  color: var(--neon-electric);
  padding: 7px 16px; border-radius: 10px;
  text-decoration: none; font-weight: 700; font-size: 12px;
  display: flex; align-items: center; gap: 7px;
  transition: var(--transition-smooth);
  backdrop-filter: blur(12px); z-index: 1000;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.back-btn:hover {
  background: rgba(0, 212, 255, 0.35);
  transform: translateX(-6px) scale(1.03);
  box-shadow: var(--glow-electric);
  color: var(--bg-deep);
}
.back-btn i { transition: var(--transition-fast); }
.back-btn:hover i { transform: translateX(-2px); }

/* Header - Enhanced */
.header {
  text-align: center; margin-bottom: 32px;
  animation: headerEntrance 0.9s var(--transition-bloom) backwards;
  position: relative; padding: 15px 0;
}
@keyframes headerEntrance {
  from { opacity: 0; transform: translateY(-40px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(30px, 7vw, 52px);
  font-weight: 900; letter-spacing: 5px;
  margin-bottom: 10px; position: relative;
  background: linear-gradient(135deg, 
    var(--neon-electric) 0%, 
    var(--neon-blue) 25%, 
    #ffffff 45%, 
    var(--neon-blue) 65%, 
    var(--neon-purple) 85%,
    var(--neon-pink) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 35px rgba(0, 212, 255, 0.6);
  animation: titleShimmer 2.8s ease-in-out infinite, titleGlow 3s ease-in-out infinite alternate;
}
@keyframes titleShimmer {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.35); }
}
@keyframes titleGlow {
  0% { text-shadow: 0 0 35px rgba(0, 212, 255, 0.6); }
  100% { text-shadow: 0 0 55px rgba(0, 245, 255, 0.85), 0 0 85px rgba(123, 47, 255, 0.5); }
}

.subtitle {
  font-size: 12px; color: var(--text-secondary);
  letter-spacing: 6px; text-transform: uppercase;
  margin-bottom: 16px; font-weight: 600;
  text-shadow: 0 0 10px rgba(138, 180, 248, 0.4);
}

/* Status Badge - Enhanced */
.status-badge {
  display: inline-flex; align-items: center; gap: 9px;
  padding: 7px 18px;
  background: rgba(0, 255, 157, 0.15);
  border: 1px solid rgba(0, 255, 157, 0.5);
  border-radius: 100px;
  font-size: 11px; font-weight: 700;
  color: var(--neon-green);
  text-transform: uppercase; letter-spacing: 2.5px;
  animation: statusPulse 2.2s ease-in-out infinite;
  box-shadow: 0 0 18px rgba(0, 255, 157, 0.35);
  backdrop-filter: blur(8px);
}
@keyframes statusPulse {
  0%, 100% { box-shadow: 0 0 18px rgba(0, 255, 157, 0.35); transform: scale(1); }
  50% { box-shadow: 0 0 32px rgba(0, 255, 157, 0.65); transform: scale(1.02); }
}
.status-dot {
  width: 7px; height: 7px;
  background: var(--neon-green);
  border-radius: 50%;
  animation: dotBeat 1.4s ease-in-out infinite;
  box-shadow: 0 0 12px var(--neon-green), 0 0 25px rgba(0, 255, 157, 0.5);
}
@keyframes dotBeat {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0.85; }
}

/* ===== NAVIGATION TABS - ENHANCED ===== */
.nav-tabs {
  display: flex; gap: 12px; justify-content: center;
  margin-bottom: 28px; flex-wrap: wrap;
  padding: 8px;
  background: var(--bg-glass);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-glow);
  backdrop-filter: blur(15px);
  max-width: fit-content; margin-left: auto; margin-right: auto;
}
.nav-tab {
  padding: 11px 24px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 10px;
  color: var(--text-secondary);
  font-family: 'Orbitron', sans-serif;
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: var(--transition-smooth);
  text-transform: uppercase; letter-spacing: 1.5px;
  position: relative; overflow: hidden;
}
.nav-tab::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0), rgba(0, 245, 255, 0.15), rgba(0, 212, 255, 0));
  opacity: 0; transition: var(--transition-fast);
}
.nav-tab:hover {
  color: var(--neon-electric);
  border-color: rgba(0, 212, 255, 0.4);
  transform: translateY(-2px);
}
.nav-tab:hover::before { opacity: 1; }
.nav-tab.active {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(0, 245, 255, 0.2));
  border-color: var(--neon-electric);
  color: var(--neon-electric);
  box-shadow: var(--glow-electric);
  transform: translateY(-3px);
}
.nav-tab.active::before { opacity: 0.5; }
.nav-tab i { margin-right: 6px; transition: var(--transition-fast); }
.nav-tab:hover i, .nav-tab.active i { transform: scale(1.1); }

.section { display: none; }
.section.active { display: block; animation: fadeIn 0.45s var(--transition-bloom); }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== SEARCH - ENHANCED ===== */
.search-container { max-width: 650px; margin: 0 auto 28px; }
.search-box {
  width: 100%;
  padding: 14px 50px 14px 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px; font-weight: 500;
  transition: var(--transition-smooth);
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
}
.search-box:focus {
  outline: none;
  border-color: var(--neon-electric);
  box-shadow: var(--glow-electric);
  background: var(--bg-elevated);
}
.search-box::placeholder { color: var(--text-dim); opacity: 0.8; }

/* ===== GALLERY SECTION ===== */
.gallery-section {
  margin-bottom: 38px;
  animation: sectionReveal 0.65s var(--transition-bloom) backwards;
}
@keyframes sectionReveal {
  from { opacity: 0; transform: translateY(35px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px; font-weight: 700;
  color: var(--neon-electric);
  margin-bottom: 18px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border-glow);
  display: flex; align-items: center; gap: 12px;
  letter-spacing: 2.5px; position: relative;
  text-shadow: 0 0 12px rgba(0, 245, 255, 0.5);
}
.section-title::before {
  content: ''; width: 5px; height: 20px;
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue));
  border-radius: 3px;
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.7);
  animation: pulseBar 2s ease-in-out infinite;
}
@keyframes pulseBar {
  0%, 100% { opacity: 1; box-shadow: 0 0 12px rgba(0, 245, 255, 0.7); }
  50% { opacity: 0.85; box-shadow: 0 0 22px rgba(0, 245, 255, 0.95); }
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 18px;
}

/* ===== PHOTO CARD - COOLER DESIGN ===== */
.photo-card {
  background: var(--bg-surface);
  border: 1px solid rgba(0, 212, 255, 0.3);
  border-radius: 14px;
  overflow: hidden;
  transition: var(--transition-bloom);
  position: relative;
  backdrop-filter: blur(14px);
  animation: cardEnter 0.5s ease forwards;
  opacity: 0; transform: translateY(25px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
}
.photo-card:nth-child(1) { animation-delay: 0.08s; }
.photo-card:nth-child(2) { animation-delay: 0.12s; }
.photo-card:nth-child(3) { animation-delay: 0.16s; }
.photo-card:nth-child(4) { animation-delay: 0.2s; }
.photo-card:nth-child(5) { animation-delay: 0.24s; }
.photo-card:nth-child(n+6) { animation-delay: 0.28s; }

@keyframes cardEnter {
  to { opacity: 1; transform: translateY(0); }
}

.photo-card:hover {
  transform: translateY(-8px) scale(1.025);
  border-color: var(--neon-electric);
  box-shadow: var(--glow-electric), 0 20px 50px rgba(0, 0, 0, 0.5);
  z-index: 10;
}
.photo-card::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 60%, rgba(0, 212, 255, 0.08));
  pointer-events: none; opacity: 0; transition: var(--transition-fast);
}
.photo-card:hover::after { opacity: 1; }

.photo-wrapper {
  position: relative; width: 100%; height: 290px;
  background: radial-gradient(circle at 30% 30%, #0d2137 0%, #050d18 70%, #020408 100%);
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  border-bottom: 1px solid rgba(0, 212, 255, 0.15);
}
.photo-wrapper img {
  width: 100%; height: 100%; object-fit: contain;
  display: block; padding: 8px; background: transparent;
  transition: transform 0.4s var(--transition-bloom);
}
.photo-card:hover .photo-wrapper img {
  transform: scale(1.08);
}

/* Photo Info - Enhanced */
.photo-info { padding: 16px; }
.photo-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px; font-weight: 700;
  color: var(--neon-electric);
  margin-bottom: 10px; word-break: break-word;
  text-align: center;
  text-shadow: 0 0 12px rgba(0, 245, 255, 0.6);
  line-height: 1.4;
  /* Multi-color word effect */
  background: linear-gradient(90deg, var(--neon-electric), var(--neon-blue), var(--neon-purple), var(--neon-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: wordShimmer 4s linear infinite;
  background-size: 300% 100%;
}
@keyframes wordShimmer {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

.photo-meta {
  font-size: 11px; color: var(--text-secondary);
  text-align: center; margin-bottom: 14px;
  opacity: 0.9; letter-spacing: 0.5px;
}

/* Action Buttons Row - SUPER COOL */
.action-buttons-row {
  display: flex; gap: 10px; justify-content: center;
  flex-wrap: wrap; padding-top: 12px;
  border-top: 1px solid rgba(0, 212, 255, 0.25);
}
.action-btn-cool {
  flex: 1; min-width: 75px; max-width: 95px;
  height: 46px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.18) 0%, rgba(0, 245, 255, 0.12) 100%);
  border: 1px solid rgba(0, 212, 255, 0.45);
  border-radius: 10px;
  color: var(--neon-electric);
  font-size: 11px; font-weight: 700;
  cursor: pointer;
  transition: var(--transition-elastic);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; text-transform: uppercase;
  letter-spacing: 0.6px;
  backdrop-filter: blur(10px);
  position: relative; overflow: hidden;
}
.action-btn-cool::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: translateX(-100%); transition: transform 0.5s;
}
.action-btn-cool:hover::before { transform: translateX(100%); }
.action-btn-cool i {
  font-size: 17px; margin-bottom: 2px;
  transition: var(--transition-fast);
  text-shadow: 0 0 8px currentColor;
}
.action-btn-cool span {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.3px;
}
.action-btn-cool:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.42) 0%, rgba(0, 245, 255, 0.32) 100%);
  border-color: var(--neon-electric);
  transform: translateY(-4px) scale(1.06);
  box-shadow: 0 8px 28px rgba(0, 245, 255, 0.55);
  color: var(--bg-deep);
}
.action-btn-cool:hover i { transform: scale(1.15); }

/* Button Variants */
.action-btn-cool.copy-btn:hover {
  background: linear-gradient(135deg, rgba(0, 255, 157, 0.42) 0%, rgba(0, 200, 100, 0.32) 100%);
  border-color: var(--neon-green);
  box-shadow: 0 8px 28px rgba(0, 255, 157, 0.55);
}
.action-btn-cool.download-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.42) 0%, rgba(0, 180, 255, 0.32) 100%);
  border-color: var(--neon-blue);
  box-shadow: 0 8px 28px rgba(0, 212, 255, 0.55);
}
.action-btn-cool.edit-btn:hover {
  background: linear-gradient(135deg, rgba(255, 0, 170, 0.42) 0%, rgba(255, 100, 170, 0.32) 100%);
  border-color: var(--neon-pink);
  box-shadow: var(--glow-pink);
}

/* ===== EDITOR SECTION - ENHANCED ===== */
.editor-container {
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: 18px;
  padding: 22px;
  margin-bottom: 22px;
  box-shadow: var(--glow-blue);
  backdrop-filter: blur(15px);
}
.editor-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding-bottom: 16px;
  border-bottom: 1px solid rgba(0, 212, 255, 0.35);
}
.editor-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 17px; color: var(--neon-electric);
  text-shadow: 0 0 12px rgba(0, 245, 255, 0.5);
  display: flex; align-items: center; gap: 10px;
}
.editor-title i { animation: floatIcon 3s ease-in-out infinite; }
@keyframes floatIcon {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

/* Upload Area - Enhanced */
.upload-area {
  border: 2.5px dashed var(--border-glow);
  border-radius: 14px;
  padding: 45px 28px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition-smooth);
  margin-bottom: 22px;
  background: rgba(0, 212, 255, 0.04);
  position: relative; overflow: hidden;
}
.upload-area::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent, rgba(0, 245, 255, 0.08), transparent);
  opacity: 0; transition: var(--transition-fast);
}
.upload-area:hover {
  border-color: var(--neon-electric);
  background: rgba(0, 212, 255, 0.08);
  transform: translateY(-3px);
  box-shadow: 0 10px 35px rgba(0, 212, 255, 0.2);
}
.upload-area:hover::before { opacity: 1; }
.upload-icon {
  font-size: 48px; color: var(--neon-electric);
  margin-bottom: 16px;
  animation: bounce 2s ease-in-out infinite;
  text-shadow: 0 0 15px rgba(0, 245, 255, 0.7);
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.upload-text {
  font-size: 15px; color: var(--text-primary);
  margin-bottom: 8px; font-weight: 600;
}
.upload-hint {
  font-size: 12px; color: var(--text-secondary);
  opacity: 0.85;
}

/* Canvas Wrapper */
.canvas-wrapper {
  position: relative;
  background: var(--bg-elevated);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 20px;
  overflow: auto;
  max-height: 62vh;
  border: 1px solid rgba(0, 212, 255, 0.2);
  box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.3);
}
#mainCanvas {
  max-width: 100%;
  border: 1px solid var(--border-glow);
  border-radius: 8px;
  background: #fff;
  display: block;
  margin: 0 auto;
  transition: box-shadow var(--transition-smooth);
}
#mainCanvas:hover {
  box-shadow: var(--glow-electric);
}

/* Tools Panel - Enhanced Grid */
.tools-panel {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}
.tool-group {
  background: var(--bg-elevated);
  border: 1px solid rgba(0, 212, 255, 0.25);
  border-radius: 14px;
  padding: 16px;
  transition: var(--transition-smooth);
}
.tool-group:hover {
  border-color: var(--neon-electric);
  box-shadow: 0 5px 25px rgba(0, 212, 255, 0.15);
  transform: translateY(-2px);
}
.tool-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px; color: var(--neon-electric);
  margin-bottom: 12px; text-transform: uppercase;
  letter-spacing: 1.5px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
  text-shadow: 0 0 8px rgba(0, 245, 255, 0.5);
}
.tool-btn {
  width: 100%; padding: 9px 14px;
  margin-bottom: 8px;
  background: rgba(0, 212, 255, 0.18);
  border: 1px solid var(--border-glow);
  border-radius: 9px;
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: var(--transition-smooth);
  display: flex; align-items: center; gap: 8px;
  position: relative; overflow: hidden;
}
.tool-btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transform: translateX(-100%); transition: transform 0.4s;
}
.tool-btn:hover::after { transform: translateX(100%); }
.tool-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.35), rgba(0, 245, 255, 0.25));
  border-color: var(--neon-electric);
  transform: translateX(4px);
  box-shadow: 0 4px 15px rgba(0, 212, 255, 0.25);
}
.tool-btn.active {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric));
  color: var(--bg-deep); font-weight: 700;
  box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
}
.tool-btn i { transition: var(--transition-fast); }
.tool-btn:hover i { transform: scale(1.1); }

/* Inputs - Enhanced */
input[type="range"] {
  width: 100%; height: 5px;
  background: linear-gradient(90deg, var(--bg-deep), rgba(0, 212, 255, 0.3), var(--bg-deep));
  border-radius: 3px; outline: none;
  -webkit-appearance: none; margin-bottom: 12px;
  position: relative;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  background: var(--neon-electric);
  border-radius: 50%; cursor: pointer;
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.7), 0 0 25px rgba(0, 245, 255, 0.4);
  border: 2px solid var(--bg-deep);
  transition: var(--transition-fast);
}
input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
  box-shadow: 0 0 18px rgba(0, 245, 255, 0.9), 0 0 35px rgba(0, 245, 255, 0.6);
}

.color-picker {
  width: 100%; height: 38px;
  border: 1px solid var(--border-glow);
  border-radius: 9px; cursor: pointer;
  background: var(--bg-deep);
  transition: var(--transition-fast);
}
.color-picker:hover {
  border-color: var(--neon-electric);
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.4);
}

.input-field {
  width: 100%; padding: 10px 14px;
  background: var(--bg-deep);
  border: 1px solid var(--border-glow);
  border-radius: 9px;
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; font-weight: 500;
  margin-bottom: 8px;
  transition: var(--transition-fast);
}
.input-field:focus {
  outline: none; border-color: var(--neon-electric);
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.4);
}

/* Action Buttons - Enhanced */
.action-buttons {
  display: flex; gap: 12px; justify-content: center;
  flex-wrap: wrap; margin-top: 10px;
}
.btn {
  padding: 11px 24px; border-radius: 10px;
  font-family: 'Orbitron', sans-serif;
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: var(--transition-elastic);
  border: none; display: inline-flex;
  align-items: center; gap: 7px;
  text-transform: uppercase; letter-spacing: 1.2px;
  position: relative; overflow: hidden;
}
.btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: translateX(-100%); transition: transform 0.4s;
}
.btn:hover::before { transform: translateX(100%); }

.btn-primary {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric));
  color: var(--bg-deep);
  box-shadow: 0 4px 18px rgba(0, 212, 255, 0.4);
}
.btn-primary:hover {
  transform: translateY(-3px) scale(1.04);
  box-shadow: var(--glow-electric);
}

.btn-secondary {
  padding: 11px 24px;
  background: transparent;
  border: 1.5px solid var(--neon-pink);
  border-radius: 10px;
  color: var(--neon-pink);
  font-family: 'Orbitron', sans-serif;
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: var(--transition-elastic);
  text-transform: uppercase; letter-spacing: 1.2px;
}
.btn-secondary:hover {
  background: var(--neon-pink); color: var(--bg-deep);
  transform: translateY(-3px) scale(1.04);
  box-shadow: var(--glow-pink);
}

/* Loading - Enhanced */
.loading {
  display: none; text-align: center;
  padding: 32px; grid-column: 1 / -1;
}
.loading.active { display: block; }
.loader {
  width: 48px; height: 48px;
  border: 3.5px solid rgba(0, 212, 255, 0.25);
  border-top-color: var(--neon-electric);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  margin: 0 auto 16px;
  box-shadow: var(--glow-electric);
  position: relative;
}
.loader::after {
  content: ''; position: absolute; inset: -4px;
  border: 2px solid transparent;
  border-top-color: var(--neon-purple);
  border-radius: 50%;
  animation: spin 1.4s reverse linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: var(--neon-electric);
  font-family: 'Orbitron', sans-serif;
  font-size: 12px; letter-spacing: 2px;
  animation: pulseText 1.5s ease-in-out infinite;
}
@keyframes pulseText {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

/* ===== MODAL - ENHANCED ===== */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(3, 6, 15, 0.96);
  backdrop-filter: blur(18px);
  z-index: 1000; display: none;
  align-items: center; justify-content: center;
  padding: 20px; animation: modalFadeIn 0.3s ease;
}
@keyframes modalFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal-backdrop.active { display: flex; }
.modal-content {
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: 20px;
  max-width: 950px; width: 100%;
  max-height: 96vh; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: var(--glow-electric), 0 25px 80px rgba(0, 0, 0, 0.6);
  animation: modalSlideIn 0.4s var(--transition-bloom);
}
@keyframes modalSlideIn {
  from { opacity: 0; transform: scale(0.95) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 22px;
  border-bottom: 1px solid rgba(0, 212, 255, 0.25);
  background: var(--bg-glass-strong);
}
.modal-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px; color: var(--neon-electric);
  font-weight: 700; letter-spacing: 1px;
}
.modal-close {
  width: 36px; height: 36px;
  background: transparent;
  border: 1.5px solid var(--neon-pink);
  border-radius: 50%;
  color: var(--neon-pink);
  font-size: 15px; cursor: pointer;
  transition: var(--transition-elastic);
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover {
  background: var(--neon-pink); color: var(--bg-deep);
  transform: rotate(90deg) scale(1.1);
  box-shadow: var(--glow-pink);
}
.modal-body {
  padding: 20px; text-align: center;
  overflow-y: auto; flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(circle at center, #0d2137 0%, #050d18 85%, #020408 100%);
}
.modal-body img {
  max-width: 100%; max-height: 72vh;
  width: auto; object-fit: contain;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(0, 212, 255, 0.4), 0 10px 40px rgba(0, 0, 0, 0.4);
  transition: transform var(--transition-bloom);
}
.modal-body img:hover { transform: scale(1.02); }
.modal-actions {
  margin-top: 18px;
  display: flex; gap: 10px; justify-content: center;
  flex-wrap: wrap;
}

/* ===== TOAST - SMALLER & COOLER ===== */
.toast {
  position: fixed; bottom: 22px; right: 22px;
  background: var(--bg-glass-strong);
  border: 1px solid var(--neon-electric);
  color: var(--neon-electric);
  padding: 10px 18px;
  border-radius: 12px;
  font-weight: 700; font-size: 11px;
  z-index: 10000; display: flex;
  align-items: center; gap: 9px;
  box-shadow: var(--glow-electric);
  transform: translateX(250px); opacity: 0;
  transition: var(--transition-bloom);
  backdrop-filter: blur(12px);
  max-width: 280px;
}
.toast.show {
  transform: translateX(0); opacity: 1;
  animation: toastBloom 0.5s var(--transition-bloom);
}
@keyframes toastBloom {
  0% { transform: translateX(250px) scale(0.9); opacity: 0; }
  50% { transform: translateX(-10px) scale(1.02); }
  100% { transform: translateX(0) scale(1); opacity: 1; }
}
.toast i {
  font-size: 14px; animation: pulseIcon 1.5s ease-in-out infinite;
}
@keyframes pulseIcon {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.15); opacity: 0.85; }
}

/* ===== RESPONSIVE - OPTIMIZED ===== */
@media (max-width: 1024px) {
  .container { padding: 22px 16px; }
  .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .photo-wrapper { height: 260px; }
}

@media (max-width: 768px) {
  .container { padding: 18px 12px; }
  .back-btn { left: 12px; top: 16px; padding: 6px 12px; font-size: 11px; }
  .title { font-size: clamp(26px, 8vw, 42px); letter-spacing: 3px; }
  .subtitle { font-size: 11px; letter-spacing: 4px; }
  
  .nav-tabs { flex-direction: row; flex-wrap: wrap; padding: 6px; }
  .nav-tab { padding: 9px 18px; font-size: 11px; }
  
  .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .photo-wrapper { height: 220px; }
  .photo-title { font-size: 13px; }
  .action-btn-cool { min-width: 68px; max-width: 85px; height: 42px; }
  .action-btn-cool i { font-size: 15px; }
  .action-btn-cool span { font-size: 8.5px; }
  
  .tools-panel { grid-template-columns: 1fr 1fr; }
  .editor-container { padding: 18px; }
  
  .modal-content { max-width: 98vw; margin: 10px; }
  .toast { bottom: 16px; right: 16px; left: 16px; max-width: none; justify-content: center; }
}

@media (max-width: 480px) {
  .gallery-grid { grid-template-columns: 1fr; }
  .photo-wrapper { height: 280px; }
  .tools-panel { grid-template-columns: 1fr; }
  .action-buttons { flex-direction: column; }
  .btn { width: 100%; justify-content: center; }
  .nav-tabs { flex-direction: column; }
  .nav-tab { width: 100%; text-align: center; }
}

/* ===== SCROLLBAR - NEON STYLE ===== */
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-track {
  background: var(--bg-deep);
  border-radius: 5px;
}
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue), var(--neon-purple));
  border-radius: 5px;
  border: 2px solid var(--bg-deep);
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.5);
  transition: var(--transition-fast);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
  box-shadow: 0 0 18px rgba(0, 245, 255, 0.75);
}

/* ===== SELECTION & FOCUS ===== */
::selection {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.4), rgba(0, 245, 255, 0.5));
  color: var(--text-primary);
  text-shadow: 0 0 8px rgba(0, 245, 255, 0.6);
}
*:focus-visible {
  outline: 2px solid var(--neon-electric);
  outline-offset: 2px;
  box-shadow: 0 0 0 4px rgba(0, 245, 255, 0.2);
}

/* ===== UTILITY ANIMATIONS ===== */
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes glowPulse {
  0%, 100% { box-shadow: var(--glow-electric); }
  50% { box-shadow: 0 0 25px rgba(0, 245, 255, 0.9), 0 0 60px rgba(0, 245, 255, 0.6), 0 0 100px rgba(0, 245, 255, 0.3); }
}
.animate-float { animation: float 3s ease-in-out infinite; }
.animate-glow { animation: glowPulse 2.5s ease-in-out infinite; }

/* ===== NO RESULTS STATE ===== */
.no-results {
  grid-column: 1/-1; text-align: center;
  padding: 50px 20px; color: var(--text-secondary);
  animation: fadeIn 0.4s ease;
}
.no-results i {
  font-size: 52px; margin-bottom: 18px;
  opacity: 0.6; animation: float 3s ease-in-out infinite;
  text-shadow: 0 0 20px rgba(255, 0, 170, 0.4);
}
.no-results h3 {
  font-family: 'Orbitron', sans-serif;
  color: var(--neon-pink); margin-bottom: 10px;
  font-size: 18px;
}
.no-results p { opacity: 0.85; font-size: 13px; }
</style>

<div class="bg-canvas"></div>

<div class="noise"></div>
<div class="particles" id="particles"></div>
<div class="lightning-overlay">
  <div class="lightning-bolt"></div>
  <div class="lightning-bolt"></div>
  <div class="lightning-bolt"></div>
</div>
<div class="scanline"></div>

<!-- Back Button -->
<a href="index.html" class="back-btn">
  <i class="fas fa-arrow-left"></i> Kembali
</a>

<!-- Main Container -->
<div class="container">
  <header class="header">
    <h1 class="title">⚡ FOTO GALLERY</h1>
    <p class="subtitle">LINE TOGEL • Cyber Portal 2026</p>
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </header>

  <!-- Navigation Tabs -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showSection('gallery')">
      <i class="fas fa-images"></i> Galeri Foto
    </button>
    <button class="nav-tab" onclick="showSection('editor')">
      <i class="fas fa-magic"></i> Photo Editor
    </button>

    <div class="loading" id="loading">
      <div class="loader"></div>

          </button>
          <button class="tool-btn" onclick="applyFilter('sepia')">
            <i class="fas fa-coffee"></i> Sepia

            <i class="fas fa-exchange-alt"></i> Invert

            <i class="fas fa-arrows-alt-v"></i> Gabung Vertikal

      <div class="action-buttons">

          <i class="fas fa-trash"></i> Clear
        </button>

          <i class="fas fa-undo"></i> Undo
        </button>
      </div>
    </div>
  </section>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="imageModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Foto Detail</h3>
      <button class="modal-close" onclick="closeModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body">
      <img src="" alt="" id="modalImage">
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="copyImage()">
          <i class="fas fa-copy"></i> Copy Foto
        </button>
        <button class="btn btn-secondary" onclick="downloadModalImage()">
          <i class="fas fa-download"></i> Download
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast">
  <i class="fas fa-bolt"></i>
  <span id="toastText">Berhasil!</span>
</div>

<script>
// ===== GLOBAL VARIABLES =====
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';
let canvas = document.getElementById('mainCanvas');
let ctx = canvas ? canvas.getContext('2d') : null;
let currentEditorImage = null;
let history = [];
let isDrawing = false;

// ===== INITIALIZATION =====
document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  if (document.getElementById('gallery')) fetchPhotosFromSheet();
  initCanvas();
  
  // Close modal on backdrop click
  document.getElementById('imageModal')?.addEventListener('click', (e) => {
    if (e.target.id === 'imageModal') closeModal();
  });
});

// ===== PARTICLES SYSTEM =====
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  
  for(let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 22 + 's';
    p.style.animationDuration = (18 + Math.random() * 25) + 's';
    p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
    container.appendChild(p);
  }
}

// ===== SECTION NAVIGATION =====
function showSection(sectionId) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  
  document.getElementById(sectionId).classList.add('active');
  event.target.closest('.nav-tab').classList.add('active');
  
  // Scroll to top smoothly
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== FETCH PHOTOS FROM GOOGLE SHEETS =====
async function fetchPhotosFromSheet() {
  const loading = document.getElementById('loading');
  const grid = document.getElementById('galleryGrid');
  
  loading?.classList.add('active');
  grid.innerHTML = '';
  
  try {
    const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
    const gid = '1246502038';
    
    let data;
    try {
      // Try GVIZ JSON format first
      const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
      const response = await fetch(gvizUrl);
      const text = await response.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      data = json.table.rows;
    } catch (e) {
      // Fallback to CSV
      console.log('GVIZ failed, trying CSV...', e);
      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
      const csvResponse = await fetch(csvUrl);
      const csvText = await csvResponse.text();
      data = csvText.split('\n').map(row => {
        const cols = row.split(',').map(c => c.replace(/^"|"$/g, '').trim());
        return { c: cols.map(v => v ? { v } : null) };
      });
    }
    
    // Parse photos
    allPhotos = [];
    data.forEach((row, index) => {
      const c = row.c || row;
      if (!c || c.length < 2) return;
      const judul = c[0]?.v?.toString() || '';
      const foto = c[1]?.v?.toString() || '';
      if (judul && foto) {
        allPhotos.push({ judul, foto, index: index + 2 });
      }
    });
    
    renderGallery(allPhotos);
    showToast(`⚡ Berhasil memuat ${allPhotos.length} foto`);
    
  } catch (error) {
    console.error('Error fetching photos:', error);
    showToast('❗ Gagal mengambil data dari Google Sheets');
    grid.innerHTML = `
      <div class="no-results">
        <i class="fas fa-exclamation-triangle"></i>
        <h3>Gagal Memuat Foto</h3>
        <p>Pastikan Google Sheets sudah dipublikasikan ke web</p>
      </div>
    `;
  }
  
  loading?.classList.remove('active');
}

// ===== RENDER GALLERY =====
function renderGallery(photos) {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';
  
  if (photos.length === 0) {
    grid.innerHTML = `
      <div class="no-results">
        <i class="fas fa-search"></i>
        <h3>Tidak Ada Foto</h3>
        <p>Tidak ada foto yang sesuai dengan pencarian</p>
      </div>
    `;
    return;
  }
  
  photos.forEach((photo, idx) => {
    const card = createPhotoCard(photo.foto, photo.judul, idx);
    grid.appendChild(card);
  });
}

// ===== CREATE PHOTO CARD =====
function createPhotoCard(url, title, index) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.innerHTML = `
    <div class="photo-wrapper">
      <img src="${url}" alt="${title}" 
           onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00d4ff?text=No+Image'" 
           loading="lazy" 
           onclick="viewFullImage('${url}', '${title.replace(/'/g, "\\'")}')" 
           style="cursor: pointer;">
    </div>
    <div class="photo-info">
      <div class="photo-title">${title}</div>
      <div class="photo-meta">Foto #${index + 1}</div>
      <div class="action-buttons-row">
        <button class="action-btn-cool copy-btn" onclick="copyPhoto('${url}')" title="Copy Foto">
          <i class="fas fa-copy"></i><span>Copy</span>
        </button>
        <button class="action-btn-cool download-btn" onclick="downloadPhoto('${url}', '${title.replace(/'/g, "\\'")}')" title="Download">
          <i class="fas fa-download"></i><span>Download</span>
        </button>
        <button class="action-btn-cool edit-btn" onclick="editImageFromUrl('${url}')" title="Edit">
          <i class="fas fa-edit"></i><span>Edit</span>
        </button>
      </div>
    </div>
  `;
  return card;
}

// ===== SEARCH FUNCTIONALITY =====
function searchPhotos() {
  const searchTerm = document.getElementById('searchInput')?.value.toLowerCase().trim() || '';
  
  if (!searchTerm) {
    renderGallery(allPhotos);
    return;
  }
  
  const filtered = allPhotos.filter(photo =>
    photo.judul.toLowerCase().includes(searchTerm)
  );
  
  renderGallery(filtered);
  if (filtered.length > 0) {
    showToast(`⚡ Ditemukan ${filtered.length} foto`);
  }
}

// ===== MODAL FUNCTIONS =====
function viewFullImage(url, title) {
  currentImageUrl = url;
  currentImageTitle = title;
  
  const modal = document.getElementById('imageModal');
  const modalTitle = document.getElementById('modalTitle');
  const modalImage = document.getElementById('modalImage');
  
  if (modalTitle) modalTitle.textContent = title;
  if (modalImage) {
    modalImage.src = url;
    modalImage.alt = title;
  }
  if (modal) modal.classList.add('active');
  
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const modal = document.getElementById('imageModal');
  if (modal) modal.classList.remove('active');
  document.body.style.overflow = '';
  currentImageUrl = '';
  currentImageTitle = '';
}

// ===== COPY & DOWNLOAD =====
async function copyPhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([
      new ClipboardItem({ [blob.type]: blob })
    ]);
    showToast('✅ Foto berhasil disalin ke clipboard!');
  } catch (error) {
    console.error('Copy error:', error);
    showToast('❗ Buka foto lalu klik kanan > Copy Image');
  }
}

async function copyImage() {
  if (currentImageUrl) await copyPhoto(currentImageUrl);
}

function downloadPhoto(url, filename) {
  const link = document.createElement('a');
  link.href = url;
  link.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
  link.target = '_blank';
  link.rel = 'noopener';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('⚡ Download dimulai...');
}

function downloadModalImage() {
  if (currentImageUrl && currentImageTitle) {
    downloadPhoto(currentImageUrl, currentImageTitle);
  }
}

// ===== CANVAS EDITOR =====
function initCanvas() {
  if (!canvas || !ctx) return;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = '20px Rajdhani';
  ctx.fillStyle = '#8ab4f8';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📁 Upload foto untuk mulai mengedit', canvas.width/2, canvas.height/2);
}

function handleFiles(event) {
  const files = event.target.files;
  if (!files || files.length === 0) return;
  
  loadImage(files[0]);
  
  if (files.length > 1) {
    setTimeout(() => {
      if (confirm(`Load ${files.length} foto?\n\n• OK: Gabungkan semua foto\n• Cancel: Load satu per satu`)) {
        combineMultipleFiles(files);
      }
    }, 400);
  }
}

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      currentEditorImage = img;
      saveHistory();
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      showToast('✅ Foto berhasil dimuat');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function combineMultipleFiles(files) {
  const images = [];
  let loaded = 0;
  
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        images.push(img);
        loaded++;
        if (loaded === files.length) combineImages(images);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function combineImages(images) {
  const totalWidth = images.reduce((sum, img) => sum + img.width, 0);
  const maxHeight = Math.max(...images.map(img => img.height));
  
  canvas.width = totalWidth;
  canvas.height = maxHeight;
  
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  let x = 0;
  images.forEach(img => {
    ctx.drawImage(img, x, 0);
    x += img.width;
  });
  
  saveHistory();
  showToast(`✅ ${images.length} foto digabungkan`);
}

// ===== FILTERS & ADJUSTMENTS =====
function applyFilter(filterType) {
  if (!currentEditorImage) {
    showToast('⚠️ Upload foto terlebih dahulu');
    return;
  }
  
  saveHistory();
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  
  switch(filterType) {
    case 'grayscale':
      for (let i = 0; i < data.length; i += 4) {
        const avg = (data[i] + data[i+1] + data[i+2]) / 3;
        data[i] = data[i+1] = data[i+2] = avg;
      }
      break;
    case 'sepia':
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        data[i] = Math.min(255, r*0.393 + g*0.769 + b*0.189);
        data[i+1] = Math.min(255, r*0.349 + g*0.686 + b*0.168);
        data[i+2] = Math.min(255, r*0.272 + g*0.534 + b*0.131);
      }
      break;
    case 'invert':
      for (let i = 0; i < data.length; i += 4) {
        data[i] = 255 - data[i];
        data[i+1] = 255 - data[i+1];
        data[i+2] = 255 - data[i+2];
      }
      break;
    case 'blur':
      ctx.filter = 'blur(4px)';
      ctx.drawImage(canvas, 0, 0);
      ctx.filter = 'none';
      break;
  }
  
  if (filterType !== 'blur') {
    ctx.putImageData(imageData, 0, 0);
  }
  
  showToast(`✅ Filter ${filterType} diterapkan`);
}

function adjustImage() {
  if (!currentEditorImage) return;
  
  const brightness = document.getElementById('brightness')?.value || 100;
  const contrast = document.getElementById('contrast')?.value || 100;
  const saturation = document.getElementById('saturation')?.value || 100;
  
  ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
  ctx.drawImage(currentEditorImage, 0, 0, canvas.width, canvas.height);
  ctx.filter = 'none';
}

// ===== TRANSFORMS =====
function rotateImage(degrees) {
  if (!currentEditorImage) return;
  saveHistory();
  
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');
  
  if (Math.abs(degrees) === 90) {
    tempCanvas.width = canvas.height;
    tempCanvas.height = canvas.width;
  } else {
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;
  }
  
  tempCtx.translate(tempCanvas.width/2, tempCanvas.height/2);
  tempCtx.rotate(degrees * Math.PI / 180);
  tempCtx.drawImage(canvas, -canvas.width/2, -canvas.height/2);
  
  canvas.width = tempCanvas.width;
  canvas.height = tempCanvas.height;
  ctx.drawImage(tempCanvas, 0, 0);
}

function flipImage(direction) {
  if (!currentEditorImage) return;
  saveHistory();
  
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');
  tempCanvas.width = canvas.width;
  tempCanvas.height = canvas.height;
  
  if (direction === 'h') {
    tempCtx.translate(canvas.width, 0);
    tempCtx.scale(-1, 1);
  } else {
    tempCtx.translate(0, canvas.height);
    tempCtx.scale(1, -1);
  }
  
  tempCtx.drawImage(canvas, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(tempCanvas, 0, 0);
}

function resizeCanvas() {
  const width = prompt('Lebar baru (px):', canvas.width);
  const height = prompt('Tinggi baru (px):', canvas.height);
  
  if (width && height && !isNaN(width) && !isNaN(height)) {
    saveHistory();
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;
    tempCtx.drawImage(canvas, 0, 0);
    
    canvas.width = parseInt(width);
    canvas.height = parseInt(height);
    
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(tempCanvas, 0, 0);
    showToast('✅ Canvas diubah ukurannya');
  }
}

// ===== TEXT & DRAWING =====
function addText() {
  const text = document.getElementById('textInput')?.value || '';
  const color = document.getElementById('textColor')?.value || '#00f5ff';
  const size = document.getElementById('textSize')?.value || 40;
  
  if (!text) {
    showToast('⚠️ Masukkan teks terlebih dahulu');
    return;
  }
  
  saveHistory();
  ctx.font = `bold ${size}px Orbitron`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 12;
  ctx.fillText(text, canvas.width/2, canvas.height/2);
  ctx.shadowBlur = 0;
  
  showToast('✅ Teks ditambahkan');
}

function startDrawing() {
  isDrawing = !isDrawing;
  const canvasEl = document.getElementById('mainCanvas');
  
  if (isDrawing && canvasEl) {
    canvasEl.addEventListener('mousedown', startDraw);
    canvasEl.addEventListener('mousemove', draw);
    canvasEl.addEventListener('mouseup', stopDraw);
    canvasEl.addEventListener('mouseleave', stopDraw);
    showToast('✏️ Mode gambar aktif - Klik & drag untuk menggambar');
  } else if (canvasEl) {
    canvasEl.removeEventListener('mousedown', startDraw);
    canvasEl.removeEventListener('mousemove', draw);
    canvasEl.removeEventListener('mouseup', stopDraw);
    canvasEl.removeEventListener('mouseleave', stopDraw);
    showToast('Mode gambar nonaktif');
  }
}

function startDraw(e) {
  isDrawing = true;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.strokeStyle = document.getElementById('textColor')?.value || '#00f5ff';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function draw(e) {
  if (!isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  
  ctx.lineTo(x, y);
  ctx.stroke();
}

function stopDraw() {
  if (isDrawing) {
    isDrawing = false;
    saveHistory();
  }
}

// ===== COMBINE & EFFECTS =====
function combinePhotos(direction) {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = 'image/*';
  
  input.onchange = (e) => {
    const files = e.target.files;
    if (files.length < 2) {
      showToast('⚠️ Pilih minimal 2 foto');
      return;
    }
    combineMultipleFiles(files);
  };
  input.click();
}

function addFrame() {
  saveHistory();
  const frameWidth = 22;
  ctx.strokeStyle = '#00f5ff';
  ctx.lineWidth = frameWidth;
  ctx.shadowColor = 'rgba(0, 245, 255, 0.7)';
  ctx.shadowBlur = 15;
  ctx.strokeRect(frameWidth/2, frameWidth/2, 
                 canvas.width - frameWidth, 
                 canvas.height - frameWidth);
  ctx.shadowBlur = 0;
  showToast('✅ Frame neon ditambahkan');
}

function addWatermark() {
  saveHistory();
  const text = 'LINE TOGEL';
  ctx.font = 'bold 32px Orbitron';
  ctx.fillStyle = 'rgba(0, 212, 255, 0.35)';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 8;
  ctx.fillText(text, canvas.width - 18, canvas.height - 18);
  ctx.shadowBlur = 0;
  showToast('✅ Watermark ditambahkan');
}

// ===== HISTORY & UNDO =====
function saveHistory() {
  if (!canvas) return;
  history.push(canvas.toDataURL());
  if (history.length > 12) history.shift();
}

function undoAction() {
  if (history.length > 1) {
    history.pop();
    const previous = history[history.length - 1];
    const img = new Image();
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
    };
    img.src = previous;
    showToast('↩️ Undo');
  } else {
    showToast('⚠️ Tidak ada aksi untuk di-undo');
  }
}

function clearCanvas() {
  if (confirm('Hapus semua perubahan?')) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    currentEditorImage = null;
    history = [];
    showToast('🗑️ Canvas dibersihkan');
  }
}

function downloadImage() {
  const link = document.createElement('a');
  link.download = `edited-photo-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('⚡ Foto didownload');
}

function editImageFromUrl(url) {
  showSection('editor');
  document.querySelectorAll('.nav-tab')[1]?.classList.add('active');
  document.querySelectorAll('.section')[1]?.classList.add('active');
  
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    currentEditorImage = img;
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    saveHistory();
    showToast('✅ Foto dimuat ke editor');
  };
  img.onerror = () => showToast('❗ Gagal memuat gambar');
  img.src = url;
}

// ===== TOAST NOTIFICATION =====
function showToast(message) {
  const toast = document.getElementById('toast');
  const toastText = document.getElementById('toastText');
  
  if (toast && toastText) {
    toastText.textContent = message;
    toast.classList.add('show');
    
    // Auto hide
    setTimeout(() => toast.classList.remove('show'), 3200);
  }
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.ctrlKey && e.key === 'z') {
    e.preventDefault();
    undoAction();
  }
});
</script>
</body>

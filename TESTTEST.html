<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f3ff">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  /* 🌟 ULTRA PREMIUM NEON PALETTE */
  --neon-cyan: #00f3ff;
  --neon-blue: #00d9ff;
  --neon-electric: #00fbff;
  --neon-purple: #9d4fff;
  --neon-violet: #b75cff;
  --neon-pink: #ff1ad9;
  --neon-magenta: #ff00aa;
  --neon-green: #00ff9d;
  --neon-gold: #ffd700;
  
  --bg-deep: #00010a;
  --bg-surface: rgba(4, 12, 32, 0.88);
  --bg-elevated: rgba(10, 24, 56, 0.82);
  --bg-glass: rgba(6, 18, 44, 0.72);
  --bg-glass-strong: rgba(8, 22, 52, 0.85);
  
  --text-primary: #ffffff;
  --text-secondary: #a8d8ff;
  --text-dim: #5a6f9a;
  --text-glow: rgba(0, 243, 255, 0.8);
  
  --border-glow: rgba(0, 243, 255, 0.65);
  --border-purple: rgba(157, 79, 255, 0.5);
  
  /* ✨ Multi-layer Glow System */
  --glow-soft: 0 0 15px rgba(0, 243, 255, 0.4);
  --glow-medium: 0 0 25px rgba(0, 243, 255, 0.6), 0 0 50px rgba(0, 243, 255, 0.35);
  --glow-intense: 0 0 30px rgba(0, 251, 255, 0.8), 0 0 65px rgba(0, 251, 255, 0.5), 0 0 120px rgba(0, 251, 255, 0.25);
  --glow-purple: 0 0 25px rgba(157, 79, 255, 0.6), 0 0 55px rgba(157, 79, 255, 0.35);
  --glow-pink: 0 0 25px rgba(255, 26, 217, 0.6), 0 0 55px rgba(255, 26, 217, 0.35);
  --glow-green: 0 0 25px rgba(0, 255, 157, 0.6), 0 0 55px rgba(0, 255, 157, 0.35);
  
  /* 🎬 Animation Curves */
  --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-elastic: cubic-bezier(0.68, -0.6, 0.32, 1.6);
  --ease-spring: cubic-bezier(0.5, 1.2, 0.4, 1);
  
  --transition-fast: 0.25s var(--ease-smooth);
  --transition-normal: 0.4s var(--ease-smooth);
  --transition-bloom: 0.7s var(--ease-bounce);
  --transition-elastic: 0.5s var(--ease-elastic);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 20px; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* 🌌 CINEMATIC BACKGROUND LAYERS */
.bg-mesh {
  position: fixed;
  inset: 0;
  z-index: -4;
  background: 
    radial-gradient(ellipse at 15% 20%, rgba(0, 243, 255, 0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 85% 25%, rgba(157, 79, 255, 0.1) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 85%, rgba(255, 26, 217, 0.08) 0%, transparent 65%),
    radial-gradient(ellipse at 25% 70%, rgba(0, 251, 255, 0.06) 0%, transparent 70%);
  animation: meshFloat 25s ease-in-out infinite alternate;
}
@keyframes meshFloat {
  0%, 100% { transform: translate(0, 0) scale(1); filter: hue-rotate(0deg); }
  25% { transform: translate(1%, -0.5%) scale(1.02); }
  50% { transform: translate(-0.5%, 1%) scale(0.99); filter: hue-rotate(10deg); }
  75% { transform: translate(0.5%, -1%) scale(1.01); }
}

.bg-gradient-orb {
  position: fixed;
  width: 60vw;
  height: 60vw;
  max-width: 800px;
  max-height: 800px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0, 243, 255, 0.15) 0%, rgba(157, 79, 255, 0.08) 40%, transparent 70%);
  filter: blur(60px);
  z-index: -3;
  animation: orbFloat 30s ease-in-out infinite;
  opacity: 0.7;
}
.bg-gradient-orb:nth-child(2) {
  right: -20vw;
  top: 10vh;
  background: radial-gradient(circle, rgba(255, 26, 217, 0.12) 0%, rgba(157, 79, 255, 0.06) 45%, transparent 75%);
  animation-delay: -10s;
  animation-duration: 35s;
}
.bg-gradient-orb:nth-child(3) {
  left: -15vw;
  bottom: -10vh;
  background: radial-gradient(circle, rgba(0, 251, 255, 0.1) 0%, rgba(0, 243, 255, 0.05) 50%, transparent 80%);
  animation-delay: -20s;
  animation-duration: 40s;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(3%, -2%) scale(1.05); }
  66% { transform: translate(-2%, 3%) scale(0.98); }
}

.grid-cyber {
  position: fixed;
  inset: 0;
  z-index: -2;
  background-image:
    linear-gradient(rgba(0, 243, 255, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.06) 1px, transparent 1px),
    linear-gradient(45deg, rgba(157, 79, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px, 40px 40px, 80px 80px;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 85%);
  animation: gridCyberMove 30s linear infinite;
  opacity: 0.9;
}
@keyframes gridCyberMove {
  0% { background-position: 0 0, 0 0, 0 0; }
  100% { background-position: 40px 40px, 40px 40px, 80px 80px; }
}

/* ⚡ Dynamic Lightning System */
.lightning-system {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}
.lightning-bolt {
  position: absolute;
  width: 2px;
  height: 100vh;
  background: linear-gradient(180deg, 
    transparent 0%, 
    var(--neon-electric) 20%, 
    var(--neon-cyan) 45%, 
    var(--neon-purple) 65%, 
    var(--neon-pink) 80%, 
    transparent 100%);
  filter: blur(2px) drop-shadow(0 0 15px var(--neon-electric));
  opacity: 0;
  animation: lightningSequence 12s infinite;
  transform-origin: top;
}
.lightning-bolt:nth-child(1) { left: 10%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 45%; animation-delay: 4s; }
.lightning-bolt:nth-child(3) { left: 80%; animation-delay: 8s; }
@keyframes lightningSequence {
  0%, 82%, 84%, 86%, 88%, 100% { opacity: 0; transform: scaleY(0); }
  83%, 85%, 87% { opacity: 0.25; transform: scaleY(1); }
}

/* ✨ Particle Galaxy */
.particles-galaxy {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: particleGalaxy 28s infinite ease-in-out;
  opacity: 0;
}
.particle::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  animation: particleGlow 3s ease-in-out infinite;
}
.particle.cyan {
  width: 3px; height: 3px;
  background: var(--neon-cyan);
  box-shadow: 0 0 12px var(--neon-cyan), 0 0 25px rgba(0, 243, 255, 0.5);
  animation-delay: calc(var(--i, 0) * 0.5s);
}
.particle.purple {
  width: 4px; height: 4px;
  background: var(--neon-purple);
  box-shadow: 0 0 15px var(--neon-purple), 0 0 30px rgba(157, 79, 255, 0.5);
  animation-delay: calc(var(--i, 0) * 0.7s - 10s);
}
.particle.pink {
  width: 2px; height: 2px;
  background: var(--neon-pink);
  box-shadow: 0 0 10px var(--neon-pink), 0 0 20px rgba(255, 26, 217, 0.5);
  animation-delay: calc(var(--i, 0) * 0.4s - 20s);
}
@keyframes particleGalaxy {
  0%, 100% { 
    transform: translateY(100vh) translateX(0) rotate(0deg) scale(0.5); 
    opacity: 0; 
  }
  10% { opacity: 0.9; }
  50% { transform: translateY(50vh) translateX(var(--drift, 0)) rotate(180deg) scale(1); }
  90% { opacity: 0.9; }
  100% { 
    transform: translateY(-100vh) translateX(var(--drift, 0)) rotate(720deg) scale(0.8); 
    opacity: 0; 
  }
}
@keyframes particleGlow {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.3); }
}

/* 📡 CRT Scanline Effect */
.scanline {
  position: fixed;
  left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, 
    transparent, 
    var(--neon-electric), 
    var(--neon-cyan), 
    var(--neon-purple), 
    transparent);
  opacity: 0.6;
  animation: scanlineMove 4.5s linear infinite;
  z-index: 60;
  pointer-events: none;
  filter: blur(1.5px);
  box-shadow: 0 0 25px var(--neon-electric), inset 0 0 15px rgba(0, 251, 255, 0.4);
}
@keyframes scanlineMove {
  0% { top: -5px; opacity: 0; }
  5% { opacity: 0.65; }
  95% { opacity: 0.65; }
  100% { top: 100%; opacity: 0; }
}

/* 🎞️ Film Grain Overlay */
.film-grain {
  position: fixed;
  inset: 0;
  z-index: 55;
  pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23grain)'/%3E%3C/svg%3E");
  animation: grainShift 0.8s steps(8) infinite;
}
@keyframes grainShift {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(-1px, 1px); }
  50% { transform: translate(1px, -1px); }
  75% { transform: translate(-1px, -1px); }
}

/* 🎯 Layout Container */
.container {
  max-width: 1450px;
  margin: 0 auto;
  padding: 30px 22px;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* 🚀 Premium Header */
.header {
  text-align: center;
  margin-bottom: 45px;
  animation: headerCinematic 1.2s var(--transition-bloom) backwards;
  position: relative;
  padding-bottom: 25px;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 280px;
  height: 4px;
  background: linear-gradient(90deg, 
    transparent, 
    var(--neon-cyan), 
    var(--neon-electric), 
    var(--neon-purple), 
    var(--neon-pink), 
    transparent);
  border-radius: 3px;
  box-shadow: var(--glow-intense);
  animation: headerGlowPulse 3.5s ease-in-out infinite;
}
@keyframes headerCinematic {
  from { opacity: 0; transform: translateY(-60px) scale(0.97); filter: blur(8px); }
  to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
@keyframes headerGlowPulse {
  0%, 100% { opacity: 0.85; box-shadow: var(--glow-intense); }
  50% { opacity: 1; box-shadow: 0 0 40px rgba(0, 251, 255, 0.95), 0 0 90px rgba(0, 251, 255, 0.65), 0 0 160px rgba(157, 79, 255, 0.4); }
}

/* 🔙 Premium Back Button */
.back-btn {
  position: fixed;
  left: 22px; top: 28px;
  background: var(--bg-glass-strong);
  border: 1px solid var(--border-glow);
  color: var(--neon-electric);
  padding: 9px 20px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 700;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 9px;
  transition: var(--transition-elastic);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 1000;
  pointer-events: auto;
  box-shadow: var(--glow-medium);
  letter-spacing: 0.5px;
}
.back-btn:hover {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.35), rgba(157, 79, 255, 0.25));
  border-color: var(--neon-electric);
  transform: translateX(-6px) scale(1.03);
  box-shadow: var(--glow-intense);
  color: var(--bg-deep);
}
.back-btn i { transition: transform 0.3s var(--ease-smooth); }
.back-btn:hover i { transform: translateX(-3px); }

/* ✨ Ultra Premium Title */
.title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(34px, 8vw, 58px);
  font-weight: 900;
  letter-spacing: 6px;
  margin-bottom: 14px;
  position: relative;
  background: linear-gradient(135deg, 
    var(--neon-electric) 0%, 
    var(--neon-cyan) 25%, 
    #ffffff 50%, 
    var(--neon-cyan) 75%, 
    var(--neon-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 40px rgba(0, 243, 255, 0.7);
  animation: titleShimmer 3s ease-in-out infinite, titleFloat 5s var(--ease-smooth) infinite;
}
@keyframes titleShimmer {
  0%, 100% { filter: brightness(1) saturate(1); }
  50% { filter: brightness(1.5) saturate(1.2); }
}
@keyframes titleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  letter-spacing: 7px;
  text-transform: uppercase;
  margin-bottom: 20px;
  font-weight: 600;
  text-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
  position: relative;
  display: inline-block;
}
.subtitle::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
  border-radius: 2px;
  animation: subtitlePulse 2.5s ease-in-out infinite;
}
@keyframes subtitlePulse {
  0%, 100% { opacity: 0.6; width: 60px; }
  50% { opacity: 1; width: 80px; }
}

/* 🟢 Premium Status Badge */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 9px 24px;
  background: rgba(0, 255, 157, 0.18);
  border: 1px solid rgba(0, 255, 157, 0.55);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 700;
  color: var(--neon-green);
  text-transform: uppercase;
  letter-spacing: 3px;
  animation: statusPulse 2.2s ease-in-out infinite;
  box-shadow: var(--glow-green);
  backdrop-filter: blur(10px);
}
@keyframes statusPulse {
  0%, 100% { box-shadow: var(--glow-green); transform: scale(1); }
  50% { box-shadow: 0 0 30px rgba(0, 255, 157, 0.75), 0 0 60px rgba(0, 255, 157, 0.45); transform: scale(1.02); }
}
.status-dot {
  width: 10px; height: 10px;
  background: var(--neon-green);
  border-radius: 50%;
  animation: dotBeat 1.4s ease-in-out infinite;
  box-shadow: 0 0 18px var(--neon-green), 0 0 35px rgba(0, 255, 157, 0.6);
  position: relative;
}
.status-dot::after {
  content: '';
  position: absolute;
  inset: -4px;
  border: 2px solid var(--neon-green);
  border-radius: 50%;
  animation: dotRing 1.4s ease-in-out infinite;
  opacity: 0.6;
}
@keyframes dotBeat {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.6); opacity: 0.85; }
}
@keyframes dotRing {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.8); opacity: 0; }
}

/* 🎯 Premium Navigation */
.nav-tabs {
  display: flex;
  gap: 14px;
  justify-content: center;
  margin-bottom: 35px;
  flex-wrap: wrap;
}
.nav-tab {
  padding: 12px 30px;
  background: var(--bg-glass);
  border: 1px solid var(--border-glow);
  border-radius: 14px;
  color: var(--text-primary);
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition-elastic);
  text-transform: uppercase;
  letter-spacing: 1.8px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--glow-soft);
}
.nav-tab::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, 
    rgba(0, 243, 255, 0.28), 
    rgba(157, 79, 255, 0.2), 
    rgba(255, 26, 217, 0.15));
  opacity: 0;
  transition: opacity 0.4s var(--ease-smooth);
  z-index: 0;
}
.nav-tab::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, 
    transparent 0%, 
    rgba(255, 255, 255, 0.15) 45%, 
    transparent 55%, 
    transparent 100%);
  transform: translateX(-100%);
  transition: transform 0.6s var(--ease-smooth);
  z-index: 1;
}
.nav-tab:hover::after, .nav-tab.active::after {
  transform: translateX(100%);
}
.nav-tab:hover, .nav-tab.active {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.32), rgba(157, 79, 255, 0.25));
  border-color: var(--neon-electric);
  box-shadow: var(--glow-intense);
  transform: translateY(-4px) scale(1.04);
  color: var(--neon-electric);
  z-index: 2;
}
.nav-tab:hover::before, .nav-tab.active::before { opacity: 1; }
.nav-tab i { font-size: 14px; transition: transform 0.3s var(--ease-smooth); }
.nav-tab:hover i { transform: scale(1.15); }

.section { display: none; }
.section.active { display: block; animation: sectionReveal 0.7s var(--transition-bloom); }
@keyframes sectionReveal {
  from { opacity: 0; transform: translateY(35px) scale(0.99); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* 🔍 Premium Search */
.search-container {
  max-width: 700px;
  margin: 0 auto 35px;
  position: relative;
}
.search-box {
  width: 100%;
  padding: 16px 58px 16px 24px;
  background: var(--bg-glass);
  border: 1px solid var(--border-glow);
  border-radius: 16px;
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  transition: var(--transition-normal);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  box-shadow: var(--glow-soft);
}
.search-box::placeholder { color: var(--text-dim); font-weight: 500; }
.search-box:focus {
  outline: none;
  border-color: var(--neon-electric);
  box-shadow: var(--glow-intense);
  background: var(--bg-elevated);
  transform: translateY(-2px);
}
.search-icon {
  position: absolute;
  right: 22px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--neon-cyan);
  font-size: 18px;
  pointer-events: none;
  transition: color 0.3s var(--ease-smooth);
  text-shadow: 0 0 12px rgba(0, 243, 255, 0.6);
}
.search-box:focus + .search-icon { color: var(--neon-electric); }

/* 🖼️ Gallery Section */
.gallery-section {
  margin-bottom: 50px;
  animation: sectionReveal 0.9s var(--transition-bloom) backwards;
}
.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 22px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border-glow);
  display: flex;
  align-items: center;
  gap: 14px;
  letter-spacing: 3px;
  position: relative;
}
.section-title::before {
  content: '';
  width: 6px; height: 26px;
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-cyan), var(--neon-purple));
  border-radius: 4px;
  box-shadow: 0 0 20px rgba(0, 251, 255, 0.8);
  animation: titleBarPulse 2.5s ease-in-out infinite;
}
@keyframes titleBarPulse {
  0%, 100% { opacity: 1; transform: scaleY(1); box-shadow: 0 0 20px rgba(0, 251, 255, 0.8); }
  50% { opacity: 0.9; transform: scaleY(1.15); box-shadow: 0 0 35px rgba(0, 251, 255, 1), 0 0 70px rgba(157, 79, 255, 0.6); }
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 22px;
}

/* 🎴 ULTRA PREMIUM Photo Card */
.photo-card {
  background: var(--bg-glass);
  border: 1px solid rgba(0, 243, 255, 0.42);
  border-radius: 18px;
  overflow: hidden;
  transition: var(--transition-bloom);
  position: relative;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  animation: cardEnter 0.7s var(--ease-bounce) forwards;
  opacity: 0;
  transform: translateY(30px);
  box-shadow: 0 8px 35px rgba(0, 0, 0, 0.45), var(--glow-soft);
}
.photo-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, 
    rgba(0, 243, 255, 0.12) 0%, 
    transparent 40%, 
    rgba(157, 79, 255, 0.1) 70%, 
    rgba(255, 26, 217, 0.08) 100%);
  opacity: 0;
  transition: opacity 0.5s var(--ease-smooth);
  pointer-events: none;
  z-index: 1;
}
.photo-card::after {
  content: '';
  position: absolute;
  inset: -2px;

<script>
// 🎨 Configuration
const CONFIG = {
  sheetId: '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0',
  gid: '1246502038',
  range: 'C2:D150',
  particleCount: 75,
  toastDuration: 4000
};

// 📦 State
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';

// 🚀 Initialize
document.addEventListener('DOMContentLoaded', () => {
  initParticles();
  initMouseParallax();
  fetchPhotosFromSheet();
  setupKeyboardShortcuts();
});

// ✨ Particle Galaxy System
function initParticles() {
  const container = document.getElementById('particlesGalaxy');
  if (!container) return;
  
  const colors = ['cyan', 'purple', 'pink'];
  const weights = [0.5, 0.35, 0.15];
  
  for(let i = 0; i < CONFIG.particleCount; i++) {
    const p = document.createElement('div');
    p.className = `particle ${weightedRandom(colors, weights)}`;
    p.style.setProperty('--i', i);
    p.style.left = `${Math.random() * 100}%`;
    p.style.setProperty('--drift', `${(Math.random() - 0.5) * 150}px`);
    container.appendChild(p);
  }
}

function weightedRandom(items, weights) {
  const total = weights.reduce((a, b) => a + b, 0);
  let rand = Math.random() * total;
  for(let i = 0; i < items.length; i++) {
    if(rand < weights[i]) return items[i];
    rand -= weights[i];
  }
  return items[0];
}

// 🖱️ Mouse Parallax Effect on Cards
function initMouseParallax() {
  document.addEventListener('mousemove', (e) => {
    document.querySelectorAll('.photo-wrapper').forEach(wrapper => {
      const rect = wrapper.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      if(x >= 0 && x <= rect.width && y >= 0 && y <= rect.height) {
        wrapper.style.setProperty('--mx', `${(x / rect.width) * 100}%`);
        wrapper.style.setProperty('--my', `${(y / rect.height) * 100}%`);
      }
    });
  });
}

// 📡 Fetch Photos from Google Sheets
async function fetchPhotosFromSheet() {
  const loading = document.getElementById('loading');
  const grid = document.getElementById('galleryGrid');
  
  loading.classList.add('active');
  grid.innerHTML = '';
  
  try {
    let photos = [];
    
    // Try GVIZ first
    try {
      const gvizUrl = `https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/gviz/tq?tqx=out:json&gid=${CONFIG.gid}&range=${CONFIG.range}`;
      const response = await fetch(gvizUrl);
      const text = await response.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      
      json.table.rows.forEach((row, index) => {
        const c = row.c;
        if(!c) return;
        const judul = c[0]?.v || '';
        const foto = c[1]?.v || '';
        if(judul && foto) {
          photos.push({ judul, foto, index: index + 2 });
        }
      });
    } catch(e) {
      // Fallback to CSV
      console.log('GVIZ failed, trying CSV...', e);
      const csvUrl = `https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/export?format=csv&gid=${CONFIG.gid}&range=${CONFIG.range}`;
      const csvResponse = await fetch(csvUrl);
      const csvText = await csvResponse.text();
      const csvRows = csvText.split('\n').map(row => row.split(','));
      
      csvRows.forEach((row, index) => {
        if(row.length < 2) return;
        const judul = row[0]?.replace(/"/g, '').trim() || '';
        const foto = row[1]?.replace(/"/g, '').trim() || '';
        if(judul && foto) {
          photos.push({ judul, foto, index: index + 2 });
        }
      });
    }
    
    allPhotos = photos;
    renderGallery(allPhotos);
    showToast(`⚡ ${photos.length} foto dimuat`);
    
  } catch(error) {
    console.error('Error fetching photos:', error);
    showToast('❗ Gagal memuat data');
    grid.innerHTML = createErrorState();
  }
  
  loading.classList.remove('active');
}

// 🎴 Render Gallery
function renderGallery(photos) {
  const grid = document.getElementById('galleryGrid');
  
  if(photos.length === 0) {
    grid.innerHTML = createEmptyState();
    return;
  }
  
  grid.innerHTML = '';
  photos.forEach((photo, idx) => {
    const card = createPhotoCard(photo.foto, photo.judul, idx);
    grid.appendChild(card);
  });
}

// 🎨 Create Premium Photo Card
function createPhotoCard(url, title, index) {
  const card = document.createElement('div');
  card.className = 'photo-card animate-fade-in';
  card.style.setProperty('--i', index);
  
  card.innerHTML = `
    <div class="photo-wrapper" onclick="viewFullImage('${escapeHtml(url)}', '${escapeHtml(title)}')">
      <img src="${escapeHtml(url)}" 
           alt="${escapeHtml(title)}" 
           onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'><i class=\\'fas fa-image\\'></i><div>Image Not Found</div></div>'" 
           loading="lazy">
    </div>
    <div class="photo-info">
      <div class="photo-title">${escapeHtml(title)}</div>
      <div class="photo-meta">Foto #${index + 1}</div>
      <div class="action-buttons-row">
        <button class="action-btn-cool copy-btn" onclick="event.stopPropagation(); copyPhoto('${escapeHtml(url)}')" title="Copy to Clipboard">
          <i class="fas fa-copy"></i>
          <span>Copy</span>
        </button>
        <button class="action-btn-cool download-btn" onclick="event.stopPropagation(); downloadPhoto('${escapeHtml(url)}', '${escapeHtml(title)}')" title="Download Image">
          <i class="fas fa-download"></i>
          <span>Download</span>
        </button>
      </div>
    </div>
  `;
  return card;
}

// 🔍 Search Functionality
function searchPhotos() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
  
  if(!searchTerm) {
    renderGallery(allPhotos);
    return;
  }
  
  const filtered = allPhotos.filter(photo => 
    photo.judul.toLowerCase().includes(searchTerm)
  );
  
  renderGallery(filtered);
  if(filtered.length > 0) {
    showToast(`⚡ ${filtered.length} hasil ditemukan`);
  }
}

// 🖼️ Modal Functions
function viewFullImage(url, title) {
  currentImageUrl = url;
  currentImageTitle = title;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalImage').src = url;
  document.getElementById('imageModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('imageModal').classList.remove('active');
  document.body.style.overflow = '';
  currentImageUrl = '';
  currentImageTitle = '';
}

// 📋 Copy Function
async function copyPhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin ke clipboard!');
  } catch(error) {
    console.error('Copy error:', error);
    showToast('❗ Klik kanan gambar > Copy Image');
  }
}

async function copyImage() {
  if(currentImageUrl) await copyPhoto(currentImageUrl);
}

// 💾 Download Function
function downloadPhoto(url, filename) {
  const link = document.createElement('a');
  link.href = url;
  link.download = `${sanitizeFilename(filename)}_${Date.now()}.jpg`;
  link.target = '_blank';
  link.rel = 'noopener noreferrer';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('⚡ Download dimulai...');
}

function downloadModalImage() {
  if(currentImageUrl && currentImageTitle) {
    downloadPhoto(currentImageUrl, currentImageTitle);
  }
}

// 🔔 Toast Notification
function showToast(message) {
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), CONFIG.toastDuration);
}

// 🧹 Utility Functions
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML.replace(/'/g, "\\'");
}

function sanitizeFilename(filename) {
  return filename.replace(/[^a-z0-9]/gi, '_').toLowerCase().substring(0, 50);
}

function createEmptyState() {
  return `
    <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-secondary);">
      <i class="fas fa-search" style="font-size: 56px; margin-bottom: 24px; opacity: 0.5; text-shadow: 0 0 30px rgba(0,243,255,0.3);"></i>
      <h3 style="font-family: 'Orbitron'; color: var(--neon-electric); margin-bottom: 12px; font-size: 20px;">Tidak Ada Foto</h3>
      <p style="max-width: 400px; margin: 0 auto; line-height: 1.6;">Coba kata kunci lain atau periksa koneksi internet Anda</p>
    </div>
  `;
}

function createErrorState() {
  return `
    <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-secondary);">
      <i class="fas fa-exclamation-triangle" style="font-size: 56px; margin-bottom: 24px; color: var(--neon-pink); text-shadow: 0 0 30px rgba(255,26,217,0.5);"></i>
      <h3 style="font-family: 'Orbitron'; color: var(--neon-electric); margin-bottom: 12px; font-size: 20px;">Gagal Memuat</h3>
      <p style="max-width: 400px; margin: 0 auto; line-height: 1.6;">Pastikan Google Sheets sudah dipublikasikan ke web</p>
    </div>
  `;
}

// ⌨️ Keyboard Shortcuts
function setupKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') {
      closeModal();
      document.getElementById('searchInput')?.blur();
    }
    if(e.ctrlKey && e.key === 'k') {
      e.preventDefault();
      document.getElementById('searchInput')?.focus();
    }
  });
  
  // Close modal on backdrop click
  document.getElementById('imageModal')?.addEventListener('click', (e) => {
    if(e.target.id === 'imageModal') closeModal();
  });
}
</script>

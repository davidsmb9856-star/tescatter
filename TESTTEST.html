<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00f3ff">
<title>🔷 KENDALA ALL - NEON BLUE 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  /* ===== CYBERPALETTE 2026 ===== */
  --neon-cyan: #00f3ff;
  --neon-blue: #0066ff;
  --neon-purple: #bc13fe;
  --bg-deep: #050a14;
  --bg-panel: rgba(10, 25, 45, 0.65);
  --glass-border: rgba(0, 243, 255, 0.25);
  
  /* Text Colors */
  --text-primary: #e0faff;
  --text-secondary: #8ecae6;
  --text-dim: #5c7c99;

  /* Effects */
  --glow-sm: 0 0 8px rgba(0, 243, 255, 0.4);
  --glow-md: 0 0 15px rgba(0, 243, 255, 0.6), 0 0 30px rgba(0, 243, 255, 0.2);
  --glow-lg: 0 0 20px rgba(0, 243, 255, 0.8), 0 0 50px rgba(0, 243, 255, 0.4);
  --glass-blur: blur(16px);
  --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Rajdhani', sans-serif;
  background-color: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ========== BACKGROUND FX ========== */
.cyber-grid {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background-image: 
    linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  transform: perspective(500px) rotateX(60deg) translateY(-100px) scale(2);
  z-index: -2;
  animation: gridMove 20s linear infinite;
  pointer-events: none;
}

@keyframes gridMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 40px; }
}

.ambient-glow {
  position: fixed;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(0, 102, 255, 0.15) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: -1;
  filter: blur(60px);
  animation: pulseGlow 8s ease-in-out infinite alternate;
}

@keyframes pulseGlow {
  0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.8); }
  100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
}

.scanline {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 51%);
  background-size: 100% 4px;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.3;
}

/* ========== LAYOUT ========== */
.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* ========== HEADER ========== */
header {
  text-align: center;
  margin-bottom: 40px;
  position: relative;
  padding-top: 20px;
}

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  letter-spacing: 2px;
  color: #fff;
  text-transform: uppercase;
  text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
  position: relative;
  display: inline-block;
  margin-bottom: 10px;
}

.main-title::after {
  content: 'SYSTEM_ONLINE_V.2026';
  position: absolute;
  bottom: -15px;
  right: 0;
  font-size: 10px;
  font-family: 'Rajdhani', sans-serif;
  color: var(--neon-cyan);
  letter-spacing: 4px;
  opacity: 0.8;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0, 243, 255, 0.1);
  border: 1px solid var(--neon-cyan);
  padding: 5px 15px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  color: var(--neon-cyan);
  box-shadow: var(--glow-sm);
  margin-top: 15px;
}

.blink-dot {
  width: 8px; height: 8px;
  background: var(--neon-cyan);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--neon-cyan);
  animation: blink 1.5s infinite;
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ========== SEARCH & STATS ========== */
.search-wrapper {
  position: relative;
  max-width: 600px;
  margin: 0 auto 30px;
}

.search-input {
  width: 100%;
  background: rgba(10, 20, 35, 0.8);
  border: 1px solid var(--glass-border);
  padding: 15px 20px 15px 50px;
  border-radius: 12px;
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 600;
  backdrop-filter: var(--glass-blur);
  transition: var(--transition);
  box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
}

.search-input:focus {
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-md), inset 0 0 20px rgba(0, 0, 0, 0.5);
}

.search-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--neon-cyan);
  font-size: 18px;
}

.stats-container {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.stat-pill {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 80px;
  backdrop-filter: blur(5px);
}

.stat-number {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  color: var(--neon-cyan);
  font-weight: 700;
}

/* ========== CARDS ========== */
.kendala-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.card {
  background: var(--bg-panel);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  overflow: hidden;
  backdrop-filter: var(--glass-blur);
  transition: var(--transition);
  position: relative;
  animation: slideUp 0.5s ease forwards;
  opacity: 0;
  transform: translateY(20px);
}

.card:hover {
  transform: translateY(-5px) scale(1.01);
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-md);
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 4px; height: 100%;
  background: var(--neon-cyan);
  opacity: 0.7;
}

@keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

.card-header {
  padding: 20px 25px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(90deg, rgba(0, 243, 255, 0.05), transparent);
}

.card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  line-height: 1.4;
  text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
}

.toggle-icon {
  color: var(--neon-cyan);
  transition: transform 0.3s;
}

.card.expanded .toggle-icon { transform: rotate(180deg); }

.card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0, 1, 0, 1);
  background: rgba(0, 0, 0, 0.2);
}

.card.expanded .card-body {
  max-height: 2000px; /* Arbitrary large number */
  transition: max-height 0.5s ease-in-out;
}

.content-padding {
  padding: 20px 25px;
}

/* ========== ANSWER TERMINAL STYLE ========== */
.answer-block {
  margin-bottom: 20px;
  border: 1px solid rgba(0, 243, 255, 0.15);
  border-radius: 10px;
  background: rgba(5, 10, 20, 0.6);
  overflow: hidden;
}

.answer-header {
  background: rgba(0, 243, 255, 0.08);
  padding: 8px 15px;
  font-size: 12px;
  font-weight: 700;
  color: var(--neon-cyan);
  letter-spacing: 1px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(0, 243, 255, 0.1);
}

.answer-text {
  padding: 15px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-word;
  font-family: 'Consolas', 'Monaco', monospace; /* Terminal font */
}

.answer-text a {
  color: var(--neon-cyan);
  text-decoration: none;
  border-bottom: 1px dashed var(--neon-cyan);
  transition: 0.2s;
}

.answer-text a:hover {
  color: #fff;
  text-shadow: 0 0 8px var(--neon-cyan);
}

/* Images inside cards */
.img-container {
  margin: 15px 0;
  text-align: center;
  position: relative;
}

.msg-img {
  max-width: 100%;
  border-radius: 8px;
  border: 1px solid var(--neon-cyan);
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
  cursor: zoom-in;
  transition: 0.3s;
}

.msg-img:hover { transform: scale(1.02); box-shadow: var(--glow-md); }

/* Buttons */
.action-bar {
  display: flex;
  gap: 10px;
  margin-top: 15px;
  flex-wrap: wrap;
}

.btn {
  background: rgba(0, 243, 255, 0.05);
  border: 1px solid var(--neon-cyan);
  color: var(--neon-cyan);
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  text-transform: uppercase;
}

.btn:hover {
  background: var(--neon-cyan);
  color: #000;
  box-shadow: var(--glow-sm);
}

.btn-link {
  border-color: var(--neon-blue);
  color: var(--neon-blue);
  text-decoration: none;
}
.btn-link:hover { background: var(--neon-blue); color: #fff; }

/* ========== STICKY NOTES FAB ========== */
.fab-sticky {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 60px; height: 60px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #000;
  box-shadow: var(--glow-lg);
  cursor: pointer;
  z-index: 1000;
  transition: 0.3s;
  animation: floatBtn 3s ease-in-out infinite;
}

.fab-sticky:hover { transform: scale(1.1) rotate(10deg); }

@keyframes floatBtn { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.sticky-panel {
  position: fixed;
  bottom: 100px;
  right: 30px;
  width: 350px;
  height: 500px;
  background: rgba(5, 10, 20, 0.95);
  border: 1px solid var(--neon-cyan);
  border-radius: 16px;
  backdrop-filter: blur(20px);
  z-index: 999;
  display: flex;
  flex-direction: column;
  transform-origin: bottom right;
  transform: scale(0);
  opacity: 0;
  transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
}

.sticky-panel.open { transform: scale(1); opacity: 1; }

.sticky-header {
  padding: 15px;
  border-bottom: 1px solid rgba(0, 243, 255, 0.2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Orbitron', sans-serif;
  color: var(--neon-cyan);
}

.sticky-content {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.sticky-input-area {
  padding: 15px;
  border-top: 1px solid rgba(0, 243, 255, 0.2);
}

.note-item {
  background: rgba(255, 255, 255, 0.05);
  border-left: 3px solid var(--neon-cyan);
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 4px;
  font-size: 13px;
  position: relative;
  cursor: grab;
}

.note-item img { max-width: 100%; border-radius: 4px; margin-top: 5px; border: 1px solid #333; }

.delete-note {
  position: absolute;
  top: 5px; right: 5px;
  color: #ff4444;
  cursor: pointer;
  font-size: 12px;
}

/* ========== LIGHTBOX ========== */
.lightbox {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.95);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  backdrop-filter: blur(10px);
}

.lightbox.active { display: flex; animation: fadeIn 0.3s; }

.lightbox-img {
  max-width: 90%;
  max-height: 80vh;
  border: 2px solid var(--neon-cyan);
  box-shadow: var(--glow-lg);
  border-radius: 8px;
}

.lightbox-controls {
  margin-top: 20px;
  display: flex;
  gap: 20px;
}

/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(0, 243, 255, 0.9);
  color: #000;
  padding: 10px 25px;
  border-radius: 30px;
  font-weight: 700;
  box-shadow: var(--glow-lg);
  z-index: 3000;
  transition: 0.4s;
  opacity: 0;
}

.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* Loading Spinner */
.loader {
  width: 50px; height: 50px;
  border: 3px solid rgba(0, 243, 255, 0.3);
  border-radius: 50%;
  border-top-color: var(--neon-cyan);
  animation: spin 1s ease-in-out infinite;
  margin: 50px auto;
  box-shadow: var(--glow-sm);
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
  .sticky-panel { width: 90%; right: 5%; bottom: 100px; }
  .main-title { font-size: 24px; }
}
</style>
</head>
<body>

<!-- Background Elements -->
<div class="cyber-grid"></div>
<div class="ambient-glow"></div>
<div class="scanline"></div>

<div class="container">
  
  <!-- Header -->
  <header>
    <h1 class="main-title">KENDALA<span style="color:var(--neon-cyan)">ALL</span></h1>
    <div class="status-badge">
      <div class="blink-dot"></div> SYSTEM ONLINE // 2026
    </div>
  </header>

  <!-- Search & Stats -->
  <div class="search-wrapper">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="searchInput" class="search-input" placeholder="Cari kendala atau solusi..." oninput="filterData()">
  </div>

  <div class="stats-container">
    <div class="stat-pill">
      <span class="stat-number" id="countTotal">0</span>
      <span>Total Data</span>
    </div>
    <div class="stat-pill">
      <span class="stat-number" id="countImg">0</span>
      <span>With Images</span>
    </div>
    <div class="stat-pill">
      <span class="stat-number" id="countLink">0</span>
      <span>With Links</span>
    </div>
  </div>

  <!-- Content Area -->
  <div id="contentArea" class="kendala-list" style="margin-top: 30px;">
    <div class="loader"></div>
  </div>

</div>

<!-- Sticky Notes Button & Panel -->
<div class="fab-sticky" onclick="toggleSticky()">
  <i class="fas fa-sticky-note"></i>
</div>

<div class="sticky-panel" id="stickyPanel">
  <div class="sticky-header">
    <span><i class="fas fa-terminal"></i> MY_NOTES</span>
    <i class="fas fa-times" style="cursor:pointer" onclick="toggleSticky()"></i>
  </div>
  <div class="sticky-content" id="stickyList">
    <!-- Notes go here -->
  </div>
  <div class="sticky-input-area">
    <textarea id="noteInput" style="width:100%; background:rgba(0,0,0,0.3); border:1px solid #333; color:#fff; padding:10px; border-radius:5px; resize:none;" rows="2" placeholder="Type note..."></textarea>
    <button class="btn" style="width:100%; margin-top:10px; justify-content:center;" onclick="addNote()">
      <i class="fas fa-plus"></i> ADD NOTE
    </button>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <img src="" class="lightbox-img" id="lbImg">
  <div class="lightbox-controls">
    <button class="btn" onclick="copyCurrentImg()"><i class="fas fa-copy"></i> Copy Image</button>
    <button class="btn" onclick="document.getElementById('lightbox').classList.remove('active')"><i class="fas fa-times"></i> Close</button>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast">Copied to Clipboard!</div>

<script>
// CONFIGURATION
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

let rawData = [];
let filteredData = [];

// INITIALIZATION
document.addEventListener('DOMContentLoaded', () => {
  fetchData();
  loadNotes();
});

// FETCH DATA
async function fetchData() {
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/)[1]);
    
    rawData = json.table.rows.map(row => {
      const c = row.c || [];
      return {
        title: c[0]?.v || '',
        ans1: c[1]?.v || '',
        ans2: c[2]?.v || '',
        ans3: c[3]?.v || ''
      };
    }).filter(item => item.title);

    filteredData = [...rawData];
    renderCards();
    updateStats();
  } catch (err) {
    document.getElementById('contentArea').innerHTML = `<div style="text-align:center; color:#ff4444; padding:20px;">
      <i class="fas fa-exclamation-triangle" style="font-size:30px; margin-bottom:10px;"></i><br>
      Connection Failed. Check Sheet Permissions.
    </div>`;
    console.error(err);
  }
}

// RENDER CARDS
function renderCards() {
  const container = document.getElementById('contentArea');
  if(filteredData.length === 0) {
    container.innerHTML = '<div style="text-align:center; color:var(--text-dim); padding:30px;">NO DATA FOUND</div>';
    return;
  }

  container.innerHTML = filteredData.map((item, idx) => {
    // Clean Title
    let cleanTitle = item.title.replace(/https?:\/\/[^\s]+/g, '');
    
    // Check for images in answers
    const hasImg1 = item.ans1.match(/https?:\/\/[^\s]+\.(jpg|jpeg|png|gif)/i);
    const hasImg2 = item.ans2.match(/https?:\/\/[^\s]+\.(jpg|jpeg|png|gif)/i);
    
    return `
    <div class="card" style="animation-delay: ${idx * 0.05}s">
      <div class="card-header" onclick="this.parentElement.classList.toggle('expanded')">
        <div class="card-title">${cleanTitle}</div>
        <i class="fas fa-chevron-down toggle-icon"></i>
      </div>
      <div class="card-body">
        <div class="content-padding">
          ${renderAnswerBlock('SOLUTION 01', item.ans1)}
          ${renderAnswerBlock('SOLUTION 02', item.ans2)}
          ${renderAnswerBlock('SOLUTION 03', item.ans3)}
        </div>
      </div>
    </div>
    `;
  }).join('');
}

function renderAnswerBlock(label, text) {
  if(!text) return '';
  
  // Extract links
  const urls = text.match(/https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi) || [];
  let formattedText = text;
  
  // Replace URLs with clickable links
  urls.forEach(url => {
    formattedText = formattedText.replace(url, `<a href="${url}" target="_blank">${url.length > 40 ? url.substring(0,35)+'...' : url}</a>`);
  });

  // Extract Image for separate display if exists
  let imgHtml = '';
  const imgMatch = formattedText.match(/(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif))/i);
  if(imgMatch) {
    const imgUrl = imgMatch[1];
    // Remove img url from text to avoid duplication
    formattedText = formattedText.replace(imgUrl, '[IMAGE_LOADED_BELOW]');
    imgHtml = `
      <div class="img-container">
        <img src="${imgUrl}" class="msg-img" onclick="openLightbox('${imgUrl}')">
        <div style="font-size:10px; color:var(--text-dim); margin-top:5px;">CLICK TO ZOOM</div>
      </div>
    `;
  }

  return `
    <div class="answer-block">
      <div class="answer-header">
        <span>${label}</span>
        <div style="display:flex; gap:10px;">
           <i class="fas fa-copy" style="cursor:pointer; opacity:0.7" onclick="copyText('${btoa(text)}')" title="Copy Text"></i>
           <i class="fas fa-sticky-note" style="cursor:pointer; opacity:0.7" onclick="saveToNote('${btoa(text)}')" title="Save to Note"></i>
        </div>
      </div>
      <div class="answer-text">${formattedText}</div>
      ${imgHtml}
      ${urls.length > 0 ? `
        <div style="padding:10px 15px; border-top:1px solid rgba(0,243,255,0.1); display:flex; gap:10px; flex-wrap:wrap;">
          ${urls.map(u => `<a href="${u}" target="_blank" class="btn btn-link"><i class="fas fa-external-link-alt"></i> OPEN LINK</a>`).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

// UTILITIES
function filterData() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredData = rawData.filter(item => 
    (item.title && item.title.toLowerCase().includes(q)) || 
    (item.ans1 && item.ans1.toLowerCase().includes(q))
  );
  renderCards();
  updateStats();
}

function updateStats() {
  document.getElementById('countTotal').innerText = filteredData.length;
  document.getElementById('countImg').innerText = filteredData.filter(i => /https?:\/\/[^\s]+\.(jpg|jpeg|png)/i.test(i.ans1+i.ans2)).length;
  document.getElementById('countLink').innerText = filteredData.filter(i => /https?:\/\//.test(i.ans1+i.ans2)).length;
}

function copyText(base64) {
  const text = atob(base64);
  navigator.clipboard.writeText(text).then(() => showToast('TEXT COPIED!'));
}

function saveToNote(base64) {
  const text = atob(base64);
  const list = JSON.parse(localStorage.getItem('myNotes') || '[]');
  list.unshift({ text: text.substring(0, 100) + '...', date: new Date().toLocaleTimeString() });
  localStorage.setItem('myNotes', JSON.stringify(list));
  loadNotes();
  showToast('SAVED TO NOTES');
}

// STICKY NOTES LOGIC
function toggleSticky() {
  document.getElementById('stickyPanel').classList.toggle('open');
}

function addNote() {
  const input = document.getElementById('noteInput');
  const val = input.value.trim();
  if(!val) return;
  
  const list = JSON.parse(localStorage.getItem('myNotes') || '[]');
  list.unshift({ text: val, date: new Date().toLocaleTimeString() });
  localStorage.setItem('myNotes', JSON.stringify(list));
  input.value = '';
  loadNotes();
}

function loadNotes() {
  const list = JSON.parse(localStorage.getItem('myNotes') || '[]');
  const container = document.getElementById('stickyList');
  container.innerHTML = list.map((n, i) => `
    <div class="note-item">
      <div class="delete-note" onclick="delNote(${i})"><i class="fas fa-trash"></i></div>
      <div style="font-size:10px; color:var(--neon-cyan); margin-bottom:5px;">${n.date}</div>
      ${n.text}
    </div>
  `).join('');
}

function delNote(idx) {
  const list = JSON.parse(localStorage.getItem('myNotes') || '[]');
  list.splice(idx, 1);
  localStorage.setItem('myNotes', JSON.stringify(list));
  loadNotes();
}

// LIGHTBOX
function openLightbox(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox(e) {
  if(e.target.id === 'lightbox' || e.target.tagName === 'BUTTON' || e.target.parentElement.tagName === 'BUTTON') {
    document.getElementById('lightbox').classList.remove('active');
  }
}

function copyCurrentImg() {
  const src = document.getElementById('lbImg').src;
  navigator.clipboard.writeText(src).then(() => showToast('IMAGE URL COPIED!'));
}

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>

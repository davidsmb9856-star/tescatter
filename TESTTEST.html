<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE TOGEL - Bonus Event (Enhanced Scan)</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- Menggunakan versi Tesseract yang stabil -->
<script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
<style>
:root {
    --bg-dark: #020810;
    --bg-card: #061420;
    --bg-input: #0a1e30;
    --neon-blue: #00d4ff;
    --neon-cyan: #00fff7;
    --neon-glow: rgba(0, 212, 255, 0.4);
    --accent-green: #00ff88;
    --accent-red: #ff4757;
    --accent-orange: #ff9f43;
    --border-color: rgba(0, 212, 255, 0.3);
    --text-primary: #e0f4ff;
    --text-muted: #6b8fa8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
}
/* Background Animation */
.bg-animated {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
    background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(0, 180, 255, 0.03) 0%, transparent 70%),
    var(--bg-dark);
}
.bg-grid {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
    background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
}
@keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
}
.particle {
    position: fixed; width: 4px; height: 4px; background: var(--neon-blue);
    border-radius: 50%; pointer-events: none; z-index: -1;
    box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
    animation: floatParticle 15s infinite linear; opacity: 0.6;
}
@keyframes floatParticle {
    0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; } 90% { opacity: 0.6; }
    100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

/* Typography & Titles */
.judul-glow {
    font-family: 'Orbitron', sans-serif; font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 900; text-align: center; color: var(--neon-cyan);
    letter-spacing: 3px; margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(0, 255, 247, 0.3);
}
.bonus-title {
    font-family: 'Orbitron', sans-serif; font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 700; text-align: center; color: var(--neon-blue);
    letter-spacing: 2px; margin-bottom: 20px;
}

/* Layout Components */
.tab-content {
    display: block; padding: 20px; max-width: 1400px; margin: 0 auto;
    animation: fadeInUp 0.5s ease-out;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
.bonus-section {
    background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.8) 100%);
    border: 1px solid var(--border-color); border-radius: 20px;
    padding: 25px; margin: 10px; backdrop-filter: blur(10px);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 212, 255, 0.1);
}

/* Buttons */
.neon-switch-btn {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px;
    padding: 12px 20px;
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
    border: 1px solid var(--border-color); border-radius: 10px;
    color: var(--neon-blue); cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative; overflow: hidden; letter-spacing: 0.5px;
}
.neon-switch-btn::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
    transition: left 0.5s ease;
}
.neon-switch-btn:hover::before { left: 100%; }
.neon-switch-btn:hover {
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
    border-color: var(--neon-blue); transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}
.neon-switch-btn.active {
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.3) 0%, rgba(0, 180, 255, 0.2) 100%);
    border-color: var(--neon-cyan); color: var(--neon-cyan);
    box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
}
.neon-switch-btn.danger { border-color: rgba(255, 71, 87, 0.4); color: var(--accent-red); }
.neon-switch-btn.danger:hover {
    background: rgba(255, 71, 87, 0.2); border-color: var(--accent-red);
    box-shadow: 0 5px 20px rgba(255, 71, 87, 0.3);
}
.neon-switch-btn.orange { border-color: rgba(255, 159, 67, 0.4); color: var(--accent-orange); }
.neon-switch-btn.orange:hover {
    background: rgba(255, 159, 67, 0.2); border-color: var(--accent-orange);
    box-shadow: 0 5px 20px rgba(255, 159, 67, 0.3);
}

/* Inputs */
.bonus-textarea {
    width: 100%; min-height: 120px; background: var(--bg-input);
    border: 1px solid var(--border-color); border-radius: 12px; padding: 15px;
    color: var(--text-primary); font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 500; resize: vertical; transition: all 0.3s ease;
}
.bonus-textarea:focus {
    outline: none; border-color: var(--neon-blue);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}
.bonus-input {
    width: 100%; background: var(--bg-input); border: 1px solid var(--border-color);
    border-radius: 8px; padding: 10px 14px; color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 500;
    transition: all 0.3s ease;
}
.bonus-input:focus {
    outline: none; border-color: var(--neon-blue);
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
}
.bonus-label {
    display: block; color: var(--neon-blue); font-weight: 700;
    margin-bottom: 6px; font-size: 14px; letter-spacing: 0.5px;
}
.bonus-input-group { margin-bottom: 15px; }

/* Action Buttons */
.bonus-btn {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px;
    padding: 12px 24px; background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
    border: none; border-radius: 10px; color: var(--bg-dark); cursor: pointer;
    transition: all 0.3s ease; letter-spacing: 0.5px;
}
.bonus-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4); }
.bonus-btn.danger { background: linear-gradient(135deg, var(--accent-red) 0%, #cc3344 100%); }
.bonus-btn.orange { background: linear-gradient(135deg, var(--accent-orange) 0%, #e67e22 100%); }
.bonus-button-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }

/* Results & Cards */
.bonus-result {
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 255, 136, 0.05) 100%);
    border: 1px solid var(--border-color); border-radius: 12px; padding: 20px;
    margin-top: 20px; font-size: 16px; font-weight: 600; line-height: 1.8; color: var(--text-primary);
}
.bonus-angka {
    font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent-green); font-size: 1.1em;
}
.scatter-card {
    flex: 1; min-width: 280px;
    background: linear-gradient(135deg, rgba(0, 30, 50, 0.8) 0%, rgba(6, 20, 32, 0.6) 100%);
    padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); transition: all 0.3s ease;
}
.scatter-card:hover { border-color: var(--neon-blue); box-shadow: 0 5px 25px rgba(0, 212, 255, 0.15); }
.scatter-card-title {
    color: var(--neon-cyan); margin: 0 0 12px 0; font-size: 16px;
    font-family: 'Orbitron', sans-serif; font-weight: 700;
}

/* Gallery */
.gallery-container { width: 100%; margin: 20px 0; }
.combined-image-slot {
    width: 100%; display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
    gap: 15px; padding: 20px;
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(0, 180, 255, 0.02) 100%);
    border: 1px solid var(--border-color); border-radius: 16px; cursor: pointer; transition: all 0.3s ease;
}
.combined-image-slot img {
    width: calc(33.333% - 10px); min-width: 250px; max-width: 400px; height: auto;
    aspect-ratio: 4/3; object-fit: cover; border-radius: 12px;
    border: 2px solid var(--border-color); transition: all 0.3s ease;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
}
.caption-userid {
    font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700;
    color: var(--neon-cyan); width: 100%; text-align: center; padding: 10px 0; letter-spacing: 2px;
}

/* Modals */
.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(2, 8, 16, 0.98); z-index: 10000; display: none;
    flex-direction: column; justify-content: center; align-items: center; padding: 20px;
    animation: modalFadeIn 0.3s ease-out;
}
@keyframes modalFadeIn {
    from { opacity: 0; backdrop-filter: blur(0); }
    to { opacity: 1; backdrop-filter: blur(10px); }
}
.modal-close {
    position: absolute; top: 15px; right: 25px; font-size: 40px; color: var(--neon-blue);
    background: none; border: none; cursor: pointer; transition: all 0.3s ease; line-height: 1; z-index: 10002;
}
.modal-close:hover { color: var(--neon-cyan); transform: rotate(90deg); }

/* Enhanced Scan Modal with Zoom */
#scanScatter2Modal .modal-content {
    display: flex; gap: 20px; max-width: 95vw; width: 100%; height: 85vh;
}
#scanScatter2Modal .image-section {
    flex: 1; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-width: 300px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    border: 1px solid var(--border-color);
    overflow: hidden; /* Important for zoom containment */
    position: relative;
    cursor: grab;
}
#scanScatter2Modal .image-section:active { cursor: grabbing; }

#scanScatter2Modal .image-section img {
    max-width: 90%; 
    max-height: 90%; 
    object-fit: contain; 
    border-radius: 4px;
    transition: transform 0.1s ease-out; /* Smooth zoom */
    transform-origin: center center;
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}

#scanScatter2Modal .result-section {
    flex: 1; min-width: 300px; max-width: 500px; overflow-y: auto; padding: 20px;
    background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color);
}

.zoom-controls {
    position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 10003;
    background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px;
    border: 1px solid var(--border-color);
}
.zoom-btn {
    background: var(--bg-input); border: 1px solid var(--neon-blue); color: var(--neon-cyan);
    width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-weight: bold; font-size: 18px;
}
.zoom-btn:hover { background: var(--neon-blue); color: var(--bg-dark); }

/* Toast & Misc */
.toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.95) 100%);
    border: 1px solid var(--neon-blue); border-radius: 12px; padding: 15px 30px;
    color: var(--text-primary); font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 600; z-index: 99999; opacity: 0;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.copy-btn {
    background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
    color: var(--bg-dark); border: none; padding: 6px 12px; border-radius: 6px;
    cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
    transition: all 0.3s ease;
}
.copy-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4); }
.copy-btn.copied { background: var(--accent-green); }

.result-item {
    margin-bottom: 12px; padding: 12px 15px;
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(0, 180, 255, 0.05) 100%);
    border: 1px solid rgba(0, 212, 255, 0.4); border-radius: 10px;
    display: flex; justify-content: space-between; align-items: center; gap: 15px;
    transition: all 0.3s ease;
}
.result-item.green {
    background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(0, 200, 100, 0.05) 100%);
    border-color: rgba(0, 255, 136, 0.4);
}
.input-with-buttons { display: flex; gap: 8px; align-items: center; }
.input-with-buttons .bonus-input { flex: 1; }
.input-with-buttons .bonus-btn { padding: 8px 12px; font-size: 14px; white-space: nowrap; }

@media (max-width: 768px) {
    .bonus-section { padding: 15px; margin: 5px; }
    #scanScatter2Modal .modal-content { flex-direction: column; height: auto; }
    #scanScatter2Modal .image-section, #scanScatter2Modal .result-section { min-width: unset; max-width: 100%; width: 100%; height: 400px; }
}
</style>
</head>
<body>
<div class="bg-animated"></div>
<div class="bg-grid"></div>
<div id="particles"></div>
<div id="toast" class="toast"></div>

<!-- ================= TAB CEK BONUS EVENT ================= -->
<div id="cekBonusEventTab" class="tab-content">
<div class="bonus-section">
<h3 class="judul-glow">LINE TOGEL</h3>
<h2 class="bonus-title">BONUS EVENT</h2>

<!-- ============ 3 SWITCH MODE BUTTON ============ -->
<div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 15px 0;">
<button class="neon-switch-btn" onclick="switchBonusMode('bonusAsli')" id="btn-bonusAsli">Cek Bonus Asli</button>
<button class="neon-switch-btn" onclick="switchBonusMode('galeri')" id="btn-galeri">CEK GAMBAR</button>
<button class="neon-switch-btn active" onclick="switchBonusMode('inputScatter')" id="btn-inputScatter">Input Scatter (2 Data)</button>
</div>

<!-- ============ MODE 1: CEK BONUS ASLI ============ -->
<div id="modeBonusAsli" class="bonus-mode" style="display: none;">
<textarea id="bonusTextarea" class="bonus-textarea" placeholder="Tempelkan data transaksi di sini..."></textarea>
<div class="bonus-input-group">
<label for="bonusPatokan" class="bonus-label">Nilai Patokan:</label>
<input type="text" id="bonusPatokan" class="bonus-input" placeholder="Contoh: 5000000">
</div>
<div class="bonus-input-group">
<label for="bonusSurplus" class="bonus-label">Nilai Surplus:</label>
<input type="text" id="bonusSurplus" class="bonus-input" placeholder="Contoh: 1500000">
</div>
<div class="bonus-button-group">
<button onclick="hitungBonusEvent()" class="bonus-btn">Hitung Bonus</button>
<button onclick="hapusBonusEvent()" class="bonus-btn danger">Bersihkan</button>
</div>
<div id="bonusHasil" class="bonus-result"></div>
</div>

<!-- ============ MODE 2: GALERI GAMBAR ============ -->
<div id="modeGaleri" class="bonus-mode" style="display: none;">
<h2 class="bonus-title">CEK GAMBAR</h2>
<textarea id="bonusLinkInput" class="bonus-textarea" placeholder="USERID link1 link2 link3" rows="5" oninput="handleBonusInput()"></textarea>
<div class="gallery-container">
<div class="combined-image-slot" id="bonusCombinedImageSlot">
<p class="caption-userid" id="bonusCombinedSlotUserid">USER ID</p>
<img id="bonusImgSlot1" src="" alt="Gambar 1" style="display:none">
<img id="bonusImgSlot2" src="" alt="Gambar 2" style="display:none">
<img id="bonusImgSlot3" src="" alt="Gambar 3" style="display:none">
</div>
</div>
</div>

<!-- ============ MODE 3: INPUT SCATTER (2 DATA) ============ -->
<div id="modeInputScatter" class="bonus-mode">
<div style="display: flex; gap: 16px; justify-content: space-between; flex-wrap: wrap;">

<!-- DATA 1 -->
<div class="scatter-card">
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
<h4 class="scatter-card-title">DATA SCATTER 1</h4>
<button onclick="copyData1()" class="neon-switch-btn" style="padding: 6px 12px; font-size: 12px;">Copy</button>
</div>
<div class="bonus-input-group"><label class="bonus-label">1. UID:</label><input type="text" id="bonusUserid1" class="bonus-input"></div>
<div class="bonus-input-group"><label class="bonus-label">2. S1:</label><input type="text" id="bonusScatter1_1" class="bonus-input" placeholder="Link gambar S1..."></div>
<div class="bonus-input-group">
    <label class="bonus-label">3. S2 (Scan OCR):</label>
    <div class="input-with-buttons">
        <input type="text" id="bonusScatter2_1" class="bonus-input" placeholder="Link gambar PNG...">
        <button type="button" onclick="scanScatter2(1)" class="bonus-btn">Scan</button>
    </div>
</div>
<div class="bonus-input-group"><label class="bonus-label">4. S3:</label><input type="text" id="bonusScatter3_1" class="bonus-input" placeholder="Link gambar S3..."></div>
<div class="bonus-input-group"><label class="bonus-label">5. Rek:</label><input type="text" id="bonusRekening1" class="bonus-input" placeholder="NAMA,NOREK"></div>
<div class="bonus-input-group"><label class="bonus-label">6. Kode:</label><input type="text" id="bonusKodeTransaksi1" class="bonus-input" placeholder="Kode hasil scan..."></div>
<div style="margin-top: 20px; text-align: center;">
<button onclick="viewAllScatterPhotos(1)" class="neon-switch-btn orange" style="width: 100%; padding: 12px;">Lihat 3 Foto</button>
</div>
</div>

<!-- DATA 2 -->
<div class="scatter-card">
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
<h4 class="scatter-card-title">DATA SCATTER 2</h4>
<button onclick="copyData2()" class="neon-switch-btn" style="padding: 6px 12px; font-size: 12px;">Copy</button>
</div>
<div class="bonus-input-group"><label class="bonus-label">1. UID:</label><input type="text" id="bonusUserid2" class="bonus-input"></div>
<div class="bonus-input-group"><label class="bonus-label">2. S1:</label><input type="text" id="bonusScatter1_2" class="bonus-input" placeholder="Link gambar S1..."></div>
<div class="bonus-input-group">
    <label class="bonus-label">3. S2 (Scan OCR):</label>
    <div class="input-with-buttons">
        <input type="text" id="bonusScatter2_2" class="bonus-input" placeholder="Link gambar PNG...">
        <button type="button" onclick="scanScatter2(2)" class="bonus-btn">Scan</button>
    </div>
</div>
<div class="bonus-input-group"><label class="bonus-label">4. S3:</label><input type="text" id="bonusScatter3_2" class="bonus-input" placeholder="Link gambar S3..."></div>
<div class="bonus-input-group"><label class="bonus-label">5. Rek:</label><input type="text" id="bonusRekening2" class="bonus-input" placeholder="NAMA,NOREK"></div>
<div class="bonus-input-group"><label class="bonus-label">6. Kode:</label><input type="text" id="bonusKodeTransaksi2" class="bonus-input" placeholder="Kode hasil scan..."></div>
<div style="margin-top: 20px; text-align: center;">
<button onclick="viewAllScatterPhotos(2)" class="neon-switch-btn orange" style="width: 100%; padding: 12px;">Lihat 3 Foto</button>
</div>
</div>

</div>
<div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px;">
<button onclick="copySemuaData()" class="neon-switch-btn">Copy Semua</button>
<button onclick="hapusSemuaData()" class="neon-switch-btn danger">Hapus Semua</button>
</div>
</div>
</div>
</div>

<!-- Modal Scan Scatter 2 (ENHANCED WITH ZOOM) -->
<div id="scanScatter2Modal" class="modal-overlay">
<button class="modal-close" onclick="closeScanScatter2Modal()" aria-label="Tutup">&times;</button>
<h3 style="color: var(--neon-cyan); text-align: center; margin-bottom: 10px; font-family: 'Orbitron'; font-weight: 700;">SCAN & ZOOM CODE</h3>
<div class="modal-content">
    <div class="image-section" id="scanImageContainer">
        <!-- Image will be injected here -->
        <img id="scanScatter2Image" src="" draggable="false">
        
        <!-- Zoom Controls Overlay -->
        <div class="zoom-controls">
            <div class="zoom-btn" onclick="adjustZoom(-0.2)">-</div>
            <div class="zoom-btn" onclick="resetZoom()">⟲</div>
            <div class="zoom-btn" onclick="adjustZoom(0.2)">+</div>
        </div>
    </div>
    <div class="result-section">
        <div style="margin-bottom: 10px; color: var(--neon-blue); font-weight: bold;">HASIL SCAN:</div>
        <div id="scanScatter2Result" style="color: var(--text-primary); font-size: 15px; line-height: 1.6;"></div>
        <div style="margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 10px;">
            <small style="color: var(--text-muted);">Tips: Gunakan scroll mouse atau tombol +/- untuk memperjelas angka sebelum scan jika hasil kurang tepat.</small>
        </div>
    </div>
</div>
</div>

<!-- Modal Zoom 3 Foto Scatter -->
<div id="scatterZoomModal" class="modal-overlay">
<button class="modal-close" onclick="closeScatterZoom()">&times;</button>
<h3 id="scatterZoomTitle" style="color: var(--neon-cyan); margin-bottom: 20px; font-family: 'Orbitron';">Lihat 3 Foto</h3>
<div class="zoomed-content-wrapper" id="scatterZoomContent" style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;"></div>
</div>

<script>
// ================= INITIALIZATION =================
let currentDataIndex = 1;
let bonusAllPackagesData = [];

function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
for (let i = 0; i < 20; i++) {
const particle = document.createElement('div');
particle.className = 'particle';
particle.style.left = Math.random() * 100 + '%';
particle.style.animationDelay = Math.random() * 15 + 's';
container.appendChild(particle);
}
}

function showToast(message) {
const toast = document.getElementById('toast');
toast.textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

function switchBonusMode(mode) {
document.getElementById('modeBonusAsli').style.display = 'none';
document.getElementById('modeGaleri').style.display = 'none';
document.getElementById('modeInputScatter').style.display = 'none';
document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).style.display = 'block'; // Fix logic slightly
    
    if(mode === 'bonusAsli') document.getElementById('modeBonusAsli').style.display = 'block';
    else if(mode === 'galeri') document.getElementById('modeGaleri').style.display = 'block';
    else if(mode === 'inputScatter') document.getElementById('modeInputScatter').style.display = 'block';

['bonusAsli', 'galeri', 'inputScatter'].forEach(id => {
const btn = document.getElementById('btn-' + id);
if (btn) btn.classList.toggle('active', id === mode);
});
}

// ================= ENHANCED SCAN LOGIC =================
let currentZoomScale = 1;
let isDragging = false;
let startX, startY, translateX = 0, translateY = 0;

function initImageZoom() {
    const container = document.getElementById('scanImageContainer');
    const img = document.getElementById('scanScatter2Image');
    
    if(!container || !img) return;

    // Reset state
    currentZoomScale = 1;
    translateX = 0;
    translateY = 0;
    updateTransform();

    // Wheel Zoom
    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        adjustZoom(delta);
    });

    // Drag Logic
    container.addEventListener('mousedown', (e) => {
        if(currentZoomScale > 1) {
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
            container.style.cursor = 'grabbing';
        }
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        e.preventDefault();
        translateX = e.clientX - startX;
        translateY = e.clientY - startY;
        updateTransform();
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        if(container) container.style.cursor = 'grab';
    });
}

function adjustZoom(delta) {
    const newScale = currentZoomScale + delta;
    if (newScale >= 0.5 && newScale <= 5) {
        currentZoomScale = newScale;
        updateTransform();
    }
}

function resetZoom() {
    currentZoomScale = 1;
    translateX = 0;
    translateY = 0;
    updateTransform();
}

function updateTransform() {
    const img = document.getElementById('scanScatter2Image');
    if(img) {
        img.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentZoomScale})`;
    }
}

async function scanScatter2(index) {
    currentDataIndex = index;
    const link = document.getElementById('bonusScatter2_' + index).value.trim();
    if (!link) { showToast("Masukkan link gambar Scatter 2!"); return; }
    
    const img = document.getElementById('scanScatter2Image');
    const resultDiv = document.getElementById('scanScatter2Result');
    const modal = document.getElementById('scanScatter2Modal');
    
    // Setup UI
    if (img) img.src = link;
    if (modal) modal.style.display = 'flex';
    if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--neon-blue); font-weight: 600;">Sedang memproses gambar & meningkatkan kualitas...</span>';
    
    // Init Zoom Features
    initImageZoom();

    if (typeof Tesseract === 'undefined') {
        resultDiv.innerHTML = '<span style="color: var(--accent-red);">Library OCR belum siap.</span>';
        return;
    }

    try {
        // PRE-PROCESSING IMAGE FOR BETTER ACCURACY
        // Create a canvas to manipulate the image before sending to Tesseract
        const processImage = async (url) => {
            return new Promise((resolve) => {
                const image = new Image();
                image.crossOrigin = "Anonymous";
                image.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = image.width;
                    canvas.height = image.height;
                    
                    // Draw original
                    ctx.drawImage(image, 0, 0);
                    
                    // Get pixel data
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    
                    // Convert to Grayscale & Increase Contrast
                    for (let i = 0; i < data.length; i += 4) {
                        const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                        // Simple thresholding (Binarization) helps OCR significantly for numbers
                        const val = avg > 120 ? 255 : 0; 
                        
                        data[i] = val;     // R
                        data[i + 1] = val; // G
                        data[i + 2] = val; // B
                    }
                    
                    ctx.putImageData(imageData, 0, 0);
                    resolve(canvas.toDataURL());
                };
                image.onerror = () => resolve(url); // Fallback if CORS fails
                image.src = url;
            });
        };

        const processedImageSrc = await processImage(link);

        // RUN TESSERACT ON PROCESSED IMAGE
        const { data: { text } } = await Tesseract.recognize(processedImageSrc, 'eng', {
            logger: m => {
                if(m.status === 'recognizing text') {
                   resultDiv.innerHTML = `<span style="color:var(--text-muted)">Membaca... ${Math.round(m.progress * 100)}%</span>`;
                }
            }
        });

        // PARSING LOGIC (Optimized for Transaction Codes)
        const rawLines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        let hasilGabung = [], hasilLangsung = [];
        
        // Pattern: Look for long digit sequences (8-15 digits) typical of transaction IDs
        const codePattern = /\b\d{8,15}\b/g;

        for (let i = 0; i < rawLines.length; i++) {
            const line = rawLines[i];
            
            // Check for combined lines (often split in two)
            const match = line.match(/\b\d{5,}\b/); 
            if (match) {
                // Try combining with next line if it also starts with numbers
                if (i + 1 < rawLines.length) {
                    const nextLine = rawLines[i+1];
                    const nextMatch = nextLine.match(/^\d+/);
                    if(nextMatch) {
                        const combined = match[0] + nextMatch[0];
                        if(combined.length >= 8) {
                            hasilGabung.push(combined);
                            i++; // Skip next line
                            continue;
                        }
                    }
                }
                if(match[0].length >= 8) hasilGabung.push(match[0]);
            }
        }

        // Display Results
        resultDiv.innerHTML = "";
        
        // Helper to create result items
        const createItem = (code, type) => {
            const div = document.createElement("div");
            div.className = `result-item ${type === 'direct' ? 'green' : ''}`;
            div.innerHTML = `
                <span style="font-family:'Orbitron'; letter-spacing:1px;">${code}</span>
                <div style="display:flex; gap:8px;">
                    <button onclick="copyWithFeedback(this, '${code}')" class="copy-btn">Copy</button>
                    <button onclick="pilihKodeTransaksi('${code}')" class="copy-btn" style="background: var(--accent-green);">Pilih</button>
                </div>`;
            resultDiv.appendChild(div);
        };

        if (hasilGabung.length > 0) {
            resultDiv.innerHTML += '<div style="color:var(--neon-blue); margin-bottom:5px; font-weight:bold;">Kode Terdeteksi (High Confidence):</div>';
            [...new Set(hasilGabung)].forEach(c => createItem(c, 'combined'));
        } 
        
        // Also show raw detections just in case
        const allDigits = text.match(/\d{8,}/g);
        if(allDigits) {
             resultDiv.innerHTML += '<div style="color:var(--text-muted); margin:10px 0 5px; font-size:12px;">Alternatif:</div>';
             [...new Set(allDigits)].forEach(c => {
                 if(!hasilGabung.includes(c)) createItem(c, 'direct');
             });
        }

        if (hasilGabung.length === 0 && (!allDigits || allDigits.length === 0)) {
            resultDiv.innerHTML = '<span style="color: var(--accent-red);">Angka tidak terbaca jelas. Coba perbesar gambar (Zoom) atau gunakan gambar lain.</span>';
        }

    } catch (err) {
        console.error(err);
        resultDiv.innerHTML = '<span style="color: var(--accent-red);">Gagal memproses gambar.</span>';
    }
}

function copyWithFeedback(btn, text) {
navigator.clipboard.writeText(text).then(() => {
const original = btn.innerHTML;
btn.innerHTML = 'OK';
btn.classList.add('copied');
setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 1000);
}).catch(() => showToast("Gagal menyalin"));
}

function pilihKodeTransaksi(kode) {
document.getElementById('bonusKodeTransaksi' + currentDataIndex).value = kode;
closeScanScatter2Modal();
showToast("Kode dipilih: " + kode);
}

function closeScanScatter2Modal() {
const modal = document.getElementById('scanScatter2Modal');
if (modal) modal.style.display = 'none';
}

// ================= HELPER FUNCTIONS =================
function prosesRekening(rek) {
const parts = rek.split(',').map(p => p.trim());
return { nomor: parts.slice(1).join(',') || '', nama: parts[0] || '' };
}

function getDataAs7Columns(prefix) {
const userid = document.getElementById('bonusUserid' + prefix).value.trim();
const s1 = document.getElementById('bonusScatter1_' + prefix).value.trim();
const s2 = document.getElementById('bonusScatter2_' + prefix).value.trim();
const s3 = document.getElementById('bonusScatter3_' + prefix).value.trim();
const rek = document.getElementById('bonusRekening' + prefix).value.trim();
const kode = document.getElementById('bonusKodeTransaksi' + prefix).value.trim();
let parts = [];
if (userid) parts.push(userid);
if (s1) parts.push(s1);
if (s2) parts.push(s2);
if (s3) parts.push(s3);
if (rek) {
const { nomor, nama } = prosesRekening(rek);
if (nomor) parts.push(nomor);
if (nama) parts.push(nama);
}
if (kode) parts.push(kode);
return parts.join('\t');
}

function copyData1() {
const data = getDataAs7Columns('1');
navigator.clipboard.writeText(data || '');
showToast(data ? "Data 1 disalin!" : "Data 1 kosong");
}

function copyData2() {
const data = getDataAs7Columns('2');
navigator.clipboard.writeText(data || '');
showToast(data ? "Data 2 disalin!" : "Data 2 kosong");
}

function copySemuaData() {
const data1 = getDataAs7Columns('1');
const data2 = getDataAs7Columns('2');
let lines = [];
if (data1 !== '') lines.push(data1);
if (data2 !== '') lines.push(data2);
const teks = lines.join('\n');
navigator.clipboard.writeText(teks);
showToast(teks ? "Semua data valid disalin!" : "Tidak ada data terisi");
}

function hapusSemuaData() {
['1','2'].forEach(p => {
['bonusUserid','bonusScatter1_','bonusScatter2_','bonusScatter3_','bonusRekening','bonusKodeTransaksi'].forEach(field => {
const el = document.getElementById(field + p);
if (el) el.value = '';
});
});
showToast("Semua data dihapus");
}

function hitungBonusEvent() {
const isi = document.getElementById("bonusTextarea").value.trim();
const patokan = parseInt((document.getElementById("bonusPatokan").value || '').replace(/[^\d]/g, '')) || 0;
const surplus = parseInt((document.getElementById("bonusSurplus").value || '').replace(/[^\d]/g, '')) || 0;
if (!isi) { showToast("Tempelkan data terlebih dahulu"); return; }
const lines = isi.split("\n");
let total = 0, i = 0;
while (i < lines.length) {
if (lines[i].trim() === 'Credit' && i + 1 < lines.length) {
const amountMatch = lines[i + 1].trim().match(/IDR\s([\d,]+)/i);
if (amountMatch) {
const amount = parseFloat(amountMatch[1].replace(/,/g, ''));
if (!isNaN(amount)) total += amount;
}
}
i++;
}
const hasilDiv = document.getElementById("bonusHasil");
if (hasilDiv) {
let output = '<strong>Total Hitungan:</strong> <span class="bonus-angka">IDR ' + total.toLocaleString("en-US") + '</span>';
if (patokan || surplus) {
const totalPengurang = patokan + surplus;
const selisih = total - totalPengurang;
const selisihColor = selisih >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
output += '<br><strong>Patokan:</strong> <span class="bonus-angka">IDR ' + patokan.toLocaleString("en-US") + '</span>';
output += '<br><strong>Surplus:</strong> <span class="bonus-angka">IDR ' + surplus.toLocaleString("en-US") + '</span>';
output += '<br><strong>Total Dikurang:</strong> <span class="bonus-angka">IDR ' + totalPengurang.toLocaleString("en-US") + '</span>';
output += '<br><strong>Selisih:</strong> <span class="bonus-angka" style="color:' + selisihColor + '">IDR ' + Math.abs(selisih).toLocaleString("en-US") + '</span>';
}
hasilDiv.innerHTML = output;
}
}

function hapusBonusEvent() {
["bonusTextarea","bonusPatokan","bonusSurplus","bonusHasil"].forEach(id => {
const el = document.getElementById(id);
if (el) { if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') el.value = ""; else el.innerHTML = ""; }
});
showToast("Form berhasil dibersihkan");
}

function handleBonusInput() {
const inputEl = document.getElementById('bonusLinkInput');
if (!inputEl) return;
const input = inputEl.value || '';
const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
bonusAllPackagesData = [];
lines.forEach(line => {
const words = line.split(/\s+/).filter(w => w.length > 0);
const urls = words.filter(w => /^https?:\/\//.test(w));
const userid = words.length > 0 && !/^https?:\/\//.test(words[0]) ? words[0] : 'N/A';
if (urls.length >= 1) {
const links = [...urls.slice(0, 3)];
while (links.length < 3) links.push('');
bonusAllPackagesData.push({ userid, links });
}
});
updateGallery(0);
}

function updateGallery(index) {
const slots = ['bonusImgSlot1', 'bonusImgSlot2', 'bonusImgSlot3'].map(id => document.getElementById(id));
const useridEl = document.getElementById('bonusCombinedSlotUserid');
if (index >= 0 && index < bonusAllPackagesData.length) {
const { userid, links } = bonusAllPackagesData[index];
if (useridEl) useridEl.textContent = 'USER ID: ' + userid;
slots.forEach((img, i) => {
if (!img) return;
img.src = links[i] || "";
img.style.display = links[i] ? 'inline-block' : 'none';
});
} else {
if (useridEl) useridEl.textContent = 'Belum Ada Data';
slots.forEach(img => { if(img) img.style.display = 'none'; });
}
}

function viewAllScatterPhotos(dataIndex) {
const s1 = document.getElementById('bonusScatter1_' + dataIndex).value.trim();
const s2 = document.getElementById('bonusScatter2_' + dataIndex).value.trim();
const s3 = document.getElementById('bonusScatter3_' + dataIndex).value.trim();
const wrapper = document.getElementById('scatterZoomContent');
wrapper.innerHTML = '';
[s1, s2, s3].forEach((link, idx) => {
if(link) {
const img = document.createElement('img');
img.src = link;
img.style.cssText = 'max-width: 300px; border: 2px solid var(--neon-blue); border-radius: 8px;';
wrapper.appendChild(img);
}
});
document.getElementById('scatterZoomModal').style.display = 'flex';
}

function closeScatterZoom() {
document.getElementById('scatterZoomModal').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', function() {
createParticles();
switchBonusMode('inputScatter');
});
</script>

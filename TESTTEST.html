<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f3ff">
<title>🔷 KENDALA ALL - NEON BLUE 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  /* ===== NEON BLUE PALETTE ===== */
  --neon-blue: #00f3ff;
  --neon-blue-dim: #00a8cc;
  --neon-blue-bright: #7df9ff;
  --neon-blue-deep: #006699;
  
  /* Backgrounds */
  --bg-dark: #0a0e17;
  --bg-card: rgba(10, 20, 40, 0.85);
  --bg-card-hover: rgba(15, 30, 60, 0.95);
  --bg-panel: rgba(10, 18, 35, 0.98);
  --bg-sticky: rgba(10, 15, 30, 0.98);
  
  /* Text */
  --text-main: #e0f7ff;
  --text-secondary: #8ab4d9;
  --text-dim: #5a8fbf;
  
  /* Borders & Glow */
  --border-neon: 2px solid rgba(0, 243, 255, 0.5);
  --glow-soft: 0 0 10px rgba(0, 243, 255, 0.4);
  --glow-medium: 0 0 20px rgba(0, 243, 255, 0.6), 0 0 40px rgba(0, 243, 255, 0.3);
  --glow-strong: 0 0 15px #00f3ff, 0 0 30px #00f3ff, 0 0 60px rgba(0, 243, 255, 0.4);
  
  /* Transitions */
  --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
  --transition-bloom: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Exo 2', sans-serif;
  background: var(--bg-dark);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
}

/* ========== BACKGROUND EFFECTS - NEON BLUE ONLY ========== */
.cyber-bg {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(0, 243, 255, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(0, 168, 204, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(125, 249, 255, 0.06) 0%, transparent 60%),
    linear-gradient(180deg, #0a0e17 0%, #0d1a33 40%, #081020 100%);
  z-index: -3;
  animation: bgPulse 18s ease-in-out infinite;
}

@keyframes bgPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.95; }
}

.grid-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background-image:
    linear-gradient(rgba(0, 243, 255, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.04) 1px, transparent 1px);
  background-size: 45px 45px;
  z-index: -2;
  animation: gridFloat 45s linear infinite;
  pointer-events: none;
}

@keyframes gridFloat {
  0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
  100% { transform: perspective(500px) rotateX(60deg) translateY(45px); }
}

.particles {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1;
  pointer-events: none;
}

.lightning-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.35;
}

.lightning-bolt {
  position: absolute;
  width: 2px;
  height: 100vh;
  background: linear-gradient(180deg, transparent, var(--neon-blue-bright), var(--neon-blue), transparent);
  filter: blur(1px);
  animation: lightningFlash 10s infinite;
  box-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-blue-dim);
}

.lightning-bolt:nth-child(1) { left: 20%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 3s; }
.lightning-bolt:nth-child(3) { left: 80%; animation-delay: 6s; }

@keyframes lightningFlash {
  0%, 88%, 90%, 92%, 100% { opacity: 0; transform: scaleY(0.85); }
  89%, 91% { opacity: 0.8; transform: scaleY(1); }
}

.scan-line {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-blue-bright), var(--neon-blue), transparent);
  opacity: 0.5;
  animation: scanDown 12s linear infinite;
  z-index: 1;
  pointer-events: none;
  box-shadow: 0 0 20px var(--neon-blue);
}

@keyframes scanDown {
  0% { top: -10%; opacity: 0; }
  10% { opacity: 0.5; }
  90% { opacity: 0.5; }
  100% { top: 110%; opacity: 0; }
}

.noise-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  opacity: 0.025;
  z-index: -1;
  pointer-events: none;
}

.container {
  max-width: 1180px;
  margin: 0 auto;
  padding: 20px 15px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 2;
}

/* ========== HEADER - NEON BLUE ========== */
.header {
  text-align: center;
  margin-bottom: 28px;
  padding: 22px 15px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-blue-bright), var(--neon-blue), transparent);
  animation: glowLine 3.5s ease-in-out infinite;
  box-shadow: 0 0 15px var(--neon-blue);
}

@keyframes glowLine {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; box-shadow: 0 0 25px var(--neon-blue-bright), 0 0 45px var(--neon-blue); }
}

.back-btn {
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  background: rgba(0, 243, 255, 0.15);
  border: 2px solid var(--neon-blue);
  color: var(--neon-blue);
  padding: 9px 16px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: var(--transition-normal);
  backdrop-filter: blur(8px);
  box-shadow: var(--glow-soft);
}

.back-btn:hover {
  background: rgba(0, 243, 255, 0.28);
  transform: translateY(-50%) translateX(-3px);
  box-shadow: var(--glow-medium);
}

.title {
  font-family: 'Orbitron', sans-serif;
  font-size: 34px;
  font-weight: 900;
  background: linear-gradient(90deg, var(--neon-blue), var(--neon-blue-bright), var(--neon-blue-dim), var(--neon-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 300% 100%;
  animation: neonFlow 5s ease infinite, textPulse 2.5s ease-in-out infinite alternate;
  text-shadow: 0 0 25px rgba(0, 243, 255, 0.7), 0 0 50px rgba(0, 243, 255, 0.4);
  margin-bottom: 10px;
  letter-spacing: 2px;
}

@keyframes neonFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

@keyframes textPulse {
  0% { filter: drop-shadow(0 0 18px rgba(0, 243, 255, 0.6)); }
  100% { filter: drop-shadow(0 0 35px rgba(125, 249, 255, 0.9)); }
}

.subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  text-shadow: 0 0 10px rgba(0, 243, 255, 0.7);
  letter-spacing: 3px;
  opacity: 0.9;
  text-transform: uppercase;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(0, 243, 255, 0.12);
  border: 2px solid rgba(0, 243, 255, 0.5);
  padding: 7px 16px;
  border-radius: 22px;
  font-size: 11px;
  color: var(--neon-blue);
  margin-top: 13px;
  box-shadow: 0 0 18px rgba(0, 243, 255, 0.4), inset 0 0 12px rgba(0, 243, 255, 0.15);
  animation: badgeGlow 3s infinite;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

@keyframes badgeGlow {
  0%, 100% { box-shadow: 0 0 15px rgba(0, 243, 255, 0.4); }
  50% { box-shadow: 0 0 28px rgba(0, 243, 255, 0.7), inset 0 0 20px rgba(0, 243, 255, 0.25); }
}

.status-dot {
  width: 9px; height: 9px;
  background: var(--neon-blue);
  border-radius: 50%;
  animation: pulse 2.2s infinite;
  box-shadow: 0 0 12px var(--neon-blue), 0 0 25px var(--neon-blue);
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.35); opacity: 0.75; }
}

/* ========== SEARCH SECTION ========== */
.search-section {
  margin: 22px 0 28px;
  text-align: center;
}

.search-bar {
  position: relative;
  max-width: 520px;
  margin: 0 auto 16px;
}

.search-bar input {
  width: 100%;
  padding: 13px 18px 13px 48px;
  background: rgba(10, 20, 40, 0.8);
  border: 2px solid rgba(0, 243, 255, 0.45);
  border-radius: 12px;
  color: var(--text-main);
  font-size: 14px;
  font-family: 'Exo 2', sans-serif;
  font-weight: 600;
  transition: var(--transition-normal);
  backdrop-filter: blur(8px);
}

.search-bar input::placeholder {
  color: rgba(0, 243, 255, 0.5);
}

.search-bar input:focus {
  outline: none;
  border-color: var(--neon-blue-bright);
  box-shadow: var(--glow-medium);
  background: rgba(15, 28, 55, 0.95);
}

.search-bar i {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  color: var(--neon-blue);
  font-size: 17px;
  text-shadow: 0 0 12px rgba(0, 243, 255, 0.7);
  animation: searchPulse 2.5s infinite;
}

@keyframes searchPulse {
  0%, 100% { opacity: 0.75; }
  50% { opacity: 1; text-shadow: 0 0 20px rgba(0, 243, 255, 0.9); }
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 22px;
  flex-wrap: wrap;
  padding: 13px 18px;
  background: rgba(10, 20, 40, 0.65);
  border-radius: 12px;
  border: 2px solid rgba(0, 243, 255, 0.35);
  max-width: 720px;
  margin: 0 auto;
  box-shadow: 0 0 22px rgba(0, 243, 255, 0.18), inset 0 0 18px rgba(0, 243, 255, 0.08);
}

.stat-item {
  text-align: center;
  padding: 7px 18px;
  background: rgba(0, 243, 255, 0.08);
  border-radius: 9px;
  border: 1px solid rgba(0, 243, 255, 0.28);
}

.stat-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--neon-blue-bright);
  text-shadow: 0 0 12px rgba(125, 249, 255, 0.7), 0 0 25px rgba(0, 243, 255, 0.45);
  display: block;
  animation: statGlow 3.5s infinite;
}

@keyframes statGlow {
  0%, 100% { text-shadow: 0 0 12px rgba(125, 249, 255, 0.7); }
  50% { text-shadow: 0 0 22px rgba(125, 249, 255, 0.95), 0 0 42px rgba(0, 243, 255, 0.7); }
}

.stat-label {
  font-size: 10px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1.3px;
  opacity: 0.9;
  margin-top: 3px;
}

/* ========== KENDALA CARDS - NEON BLUE ========== */
.kendala-list {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.kendala-card {
  background: var(--bg-card);
  border: var(--border-neon);
  border-radius: 18px;
  padding: 22px 26px;
  transition: var(--transition-bloom);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(18px);
  animation: cardEnter 0.45s ease forwards;
  opacity: 0;
  transform: translateY(22px);
  box-shadow: 0 4px 22px rgba(0, 243, 255, 0.12);
}

.kendala-card:nth-child(1) { animation-delay: 0.08s; }
.kendala-card:nth-child(2) { animation-delay: 0.13s; }
.kendala-card:nth-child(3) { animation-delay: 0.18s; }
.kendala-card:nth-child(4) { animation-delay: 0.23s; }
.kendala-card:nth-child(5) { animation-delay: 0.28s; }

@keyframes cardEnter {
  to { opacity: 1; transform: translateY(0); }
}

.kendala-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: linear-gradient(to bottom, var(--neon-blue), var(--neon-blue-bright), var(--neon-blue-dim));
  box-shadow: 0 0 18px var(--neon-blue);
  transition: var(--transition-normal);
}

.kendala-card:hover {
  background: var(--bg-card-hover);
  transform: translateY(-5px) scale(1.006);
  border-color: var(--neon-blue-bright);
  box-shadow:
    0 18px 45px rgba(0, 243, 255, 0.3),
    0 0 42px rgba(125, 249, 255, 0.22),
    inset 0 0 25px rgba(0, 243, 255, 0.12);
}

.kendala-card:hover::before {
  width: 6px;
  box-shadow: 0 0 25px var(--neon-blue-bright);
}

.kendala-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--neon-blue-bright);
  margin-bottom: 14px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-shadow: 0 0 12px rgba(125, 249, 255, 0.7), 0 0 25px rgba(0, 243, 255, 0.45);
  padding-bottom: 12px;
  border-bottom: 2px solid rgba(0, 243, 255, 0.28);
  transition: var(--transition-fast);
}

.kendala-title:hover {
  color: var(--neon-blue);
  text-shadow: 0 0 18px rgba(125, 249, 255, 0.9), 0 0 35px rgba(0, 243, 255, 0.7);
}

.kendala-title::after {
  content: '▼';
  font-size: 11px;
  transition: transform 0.28s ease;
  color: var(--neon-blue);
  text-shadow: 0 0 8px rgba(0, 243, 255, 0.7);
}

.kendala-card.expanded .kendala-title::after {
  transform: rotate(180deg);
}

/* ========== PHOTO & ANSWER SECTIONS ========== */
.title-photo-section {
  display: none;
  margin: 14px 0;
  padding: 14px;
  background: rgba(10, 18, 38, 0.7);
  border-radius: 12px;
  border: 2px solid rgba(0, 243, 255, 0.38);
  text-align: center;
  animation: photoFadeIn 0.38s ease;
  box-shadow: 0 0 22px rgba(0, 243, 255, 0.18);
}

@keyframes photoFadeIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.kendala-card.expanded .title-photo-section {
  display: block;
}

.title-photo-container {
  position: relative;
  display: inline-block;
}

.title-photo-img {
  max-width: 100%;
  max-height: 300px;
  border-radius: 11px;
  border: 3px solid var(--neon-blue);
  cursor: pointer;
  transition: var(--transition-normal);
  box-shadow: 0 0 22px rgba(0, 243, 255, 0.55), 0 0 45px rgba(125, 249, 255, 0.28);
}

.title-photo-img:hover {
  transform: scale(1.018);
  box-shadow: 0 0 35px rgba(0, 243, 255, 0.75), 0 0 70px rgba(125, 249, 255, 0.45);
}

.title-photo-badge {
  position: absolute;
  top: 9px; left: 9px;
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.92), rgba(0, 168, 204, 0.92));
  color: #051018;
  padding: 5px 11px;
  border-radius: 7px;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 5px;
  box-shadow: 0 0 12px rgba(0, 243, 255, 0.65);
}

.title-photo-actions {
  margin-top: 12px;
  display: flex;
  gap: 9px;
  justify-content: center;
  flex-wrap: wrap;
}

.copy-title-photo-btn, .view-title-photo-btn {
  background: rgba(0, 243, 255, 0.18);
  border: 2px solid var(--neon-blue);
  color: var(--neon-blue);
  padding: 9px 18px;
  border-radius: 11px;
  cursor: pointer;
  transition: var(--transition-normal);
  font-weight: 600;
  font-size: 11px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  box-shadow: var(--glow-soft);
}

.copy-title-photo-btn:hover, .view-title-photo-btn:hover {
  background: rgba(0, 243, 255, 0.32);
  transform: translateY(-2px);
  box-shadow: var(--glow-medium);
}

.kendala-answers {
  display: none;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 2px solid rgba(0, 243, 255, 0.28);
  animation: slideDown 0.28s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.kendala-card.expanded .kendala-answers {
  display: block;
}

.answer-item {
  margin-bottom: 14px;
  padding: 14px 16px;
  background: rgba(10, 18, 38, 0.7);
  border-radius: 11px;
  border-left: 4px solid var(--neon-blue);
  transition: var(--transition-fast);
  position: relative;
  box-shadow: 0 0 18px rgba(0, 243, 255, 0.12);
}

.answer-item:hover {
  background: rgba(15, 28, 55, 0.8);
  border-left-color: var(--neon-blue-bright);
  transform: translateX(2px);
  box-shadow: 0 0 28px rgba(0, 243, 255, 0.22);
}

.answer-label {
  font-weight: 700;
  color: var(--neon-blue-bright);
  margin-bottom: 9px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.3px;
  display: flex;
  align-items: center;
  gap: 7px;
  text-shadow: 0 0 8px rgba(125, 249, 255, 0.55);
}

.answer-label i {
  font-size: 13px;
  text-shadow: 0 0 8px rgba(0, 243, 255, 0.7);
}

.answer-content {
  color: var(--text-secondary);
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 13px;
}

.answer-content a {
  color: var(--neon-blue);
  text-decoration: none;
  font-weight: 600;
  transition: var(--transition-fast);
  position: relative;
  text-shadow: 0 0 7px rgba(0, 243, 255, 0.45);
}

.answer-content a::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0;
  width: 0; height: 1.5px;
  background: var(--neon-blue);
  transition: var(--transition-fast);
  box-shadow: 0 0 8px var(--neon-blue);
}

.answer-content a:hover::after {
  width: 100%;
}

.answer-content a:hover {
  text-shadow: 0 0 13px rgba(0, 243, 255, 0.85);
}

.photo-container {
  margin: 14px 0;
  text-align: center;
  padding: 12px;
  background: rgba(10, 20, 40, 0.5);
  border-radius: 11px;
  border: 2px dashed rgba(0, 243, 255, 0.45);
}

.photo-img {
  max-width: 100%;
  max-height: 280px;
  border-radius: 11px;
  border: 3px solid var(--neon-blue);
  cursor: pointer;
  transition: var(--transition-normal);
  box-shadow: 0 0 22px rgba(0, 243, 255, 0.48);
}

.photo-img:hover {
  transform: scale(1.022);
  box-shadow: 0 0 38px rgba(0, 243, 255, 0.75), 0 0 65px rgba(125, 249, 255, 0.38);
}

.copy-photo-btn {
  background: rgba(0, 243, 255, 0.18);
  border: 2px solid var(--neon-blue);
  color: var(--neon-blue);
  padding: 9px 18px;
  border-radius: 11px;
  cursor: pointer;
  margin-top: 11px;
  transition: var(--transition-normal);
  font-weight: 600;
  font-size: 11px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  box-shadow: var(--glow-soft);
}

.copy-photo-btn:hover {
  background: rgba(0, 243, 255, 0.32);
  transform: translateY(-2px);
  box-shadow: var(--glow-medium);
}

.link-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  margin-top: 12px;
}

.open-link-btn {
  background: rgba(0, 180, 220, 0.18);
  border: 2px solid #00b4dc;
  color: #00e0ff;
  padding: 7px 14px;
  border-radius: 9px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  transition: var(--transition-normal);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  text-decoration: none;
  box-shadow: 0 0 10px rgba(0, 180, 220, 0.38);
}

.open-link-btn:hover {
  background: rgba(0, 180, 220, 0.32);
  transform: translateY(-2px);
  box-shadow: 0 0 18px rgba(0, 180, 220, 0.65);
}

.open-link-btn i {
  font-size: 9px;
}

.copy-btn, .sticky-btn {
  background: rgba(0, 243, 255, 0.18);
  border: 2px solid var(--neon-blue);
  color: var(--neon-blue);
  padding: 8px 16px;
  border-radius: 9px;
  cursor: pointer;
  margin-top: 11px;
  margin-right: 7px;
  transition: var(--transition-normal);
  font-weight: 600;

<script>
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

let allKendala = [];
let filteredKendala = [];
let lightboxImages = [];
let lightboxIndex = 0;
let zoomLevel = 1;
let editIndex = null;

// ================= MAIN DATA LOGIC =================
async function loadKendalaData() {
  try {
    const response = await fetch(DATA_URL);
    const text = await response.text();
    const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (!jsonMatch) throw new Error('Gagal parse');
    const data = JSON.parse(jsonMatch[1]);
    const rows = data.table?.rows || [];
    
    allKendala = rows.map(row => {
      const cells = row.c || [];
      return {
        judul: cells[0]?.v?.toString().trim() || '',
        jawaban1: cells[1]?.v?.toString().trim() || '',
        jawaban2: cells[2]?.v?.toString().trim() || '',
        jawaban3: cells[3]?.v?.toString().trim() || ''
      };
    }).filter(item => item.judul && item.judul !== '');
    
    filteredKendala = [...allKendala];
    renderKendala();
    updateStats();
  } catch (error) {
    document.getElementById('kendalaContainer').innerHTML = `
      <div class="error-msg">
        <i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 15px; text-shadow: 0 0 20px rgba(0,168,204,0.8);"></i>
        <p><strong>⚠️ Gagal memuat data</strong></p>
        <p style="font-size: 12px; margin-top: 10px; opacity: 0.9;">Pastikan Google Sheet sudah dipublikasikan</p>
        <p style="font-size: 11px; margin-top: 12px; opacity: 0.7;">${error.message}</p>
      </div>`;
  }
}

function renderKendala(data = filteredKendala) {
  const container = document.getElementById('kendalaContainer');
  if (data.length === 0) {
    container.innerHTML = '<div class="no-data"><p style="color: var(--text-secondary); font-size: 16px;">Tidak ada data</p></div>';
    return;
  }
  container.innerHTML = `<div class="kendala-list">${data.map((item, index) => createKendalaCard(item, index)).join('')}</div>`;
  
  document.querySelectorAll('.kendala-title').forEach(title => {
    title.addEventListener('click', function() {
      this.parentElement.classList.toggle('expanded');
    });
  });
}

function createKendalaCard(item, index) {
  const titlePhoto = extractTitlePhoto(item.judul);
  const cleanJudul = titlePhoto ? item.judul.replace(titlePhoto.url, '').trim() : item.judul;
  const hasPhoto = detectPhotoLink(item);
  const links1 = extractLinks(item.jawaban1);
  const links2 = extractLinks(item.jawaban2);
  const links3 = extractLinks(item.jawaban3);
  
  return `
    <div class="kendala-card" data-index="${index}">
      <h3 class="kendala-title">${escapeHtml(cleanJudul)}</h3>
      ${titlePhoto ? createTitlePhotoSection(titlePhoto.url, index) : ''}
      <div class="kendala-answers">
        ${item.jawaban1 ? `
          <div class="answer-item">
            <div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 1</div>
            <div class="answer-content">${formatContent(item.jawaban1, links1)}</div>
            ${hasPhoto && !titlePhoto ? createPhotoSection(item) : ''}
            ${links1.length > 0 ? createLinkButtons(links1) : ''}
            <button class="copy-btn" onclick="copyAnswer(${index}, 1)"><i class="fas fa-copy"></i> Copy</button>
            <button class="sticky-btn" onclick="addToSticky(${index}, 1)"><i class="fas fa-sticky-note"></i> Sticky</button>
          </div>` : ''}
        ${item.jawaban2 ? `
          <div class="answer-item">
            <div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 2</div>
            <div class="answer-content">${formatContent(item.jawaban2, links2)}</div>
            ${links2.length > 0 ? createLinkButtons(links2) : ''}
            <button class="copy-btn" onclick="copyAnswer(${index}, 2)"><i class="fas fa-copy"></i> Copy</button>
            <button class="sticky-btn" onclick="addToSticky(${index}, 2)"><i class="fas fa-sticky-note"></i> Sticky</button>
          </div>` : ''}
        ${item.jawaban3 ? `
          <div class="answer-item">
            <div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 3</div>
            <div class="answer-content">${formatContent(item.jawaban3, links3)}</div>
            ${links3.length > 0 ? createLinkButtons(links3) : ''}
            <button class="copy-btn" onclick="copyAnswer(${index}, 3)"><i class="fas fa-copy"></i> Copy</button>
            <button class="sticky-btn" onclick="addToSticky(${index}, 3)"><i class="fas fa-sticky-note"></i> Sticky</button>
          </div>` : ''}
      </div>
    </div>`;
}

// ================= HELPER FUNCTIONS =================
function extractTitlePhoto(judul) {
  if (!judul) return null;
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = judul.match(photoPattern);
  if (match) return { url: match[1], fullMatch: match[0] };
  return null;
}

function createTitlePhotoSection(photoUrl, index) {
  if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
  return `
    <div class="title-photo-section">
      <div class="title-photo-container">
        <span class="title-photo-badge"><i class="fas fa-image"></i> FOTO</span>
        <img src="${photoUrl}" alt="Foto Kendala" class="title-photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.parentElement.style.display='none'">
      </div>
      <div class="title-photo-actions">
        <button class="copy-title-photo-btn" onclick="copyTitlePhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
        <button class="view-title-photo-btn" onclick="openLightbox('${photoUrl}')"><i class="fas fa-expand"></i> Lihat Penuh</button>
      </div>
    </div>`;
}

function detectPhotoLink(item) {
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  return photoPattern.test(item.jawaban1) || photoPattern.test(item.jawaban2) || photoPattern.test(item.jawaban3);
}

function extractLinks(text) {
  if (!text) return [];
  const urlPattern = /https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi;
  return text.match(urlPattern) || [];
}

function formatContent(text, links = []) {
  if (!text) return '';
  let formatted = escapeHtml(text);
  links.forEach(link => {
    const displayText = link.length > 45 ? link.substring(0, 42) + '...' : link;
    formatted = formatted.replace(new RegExp(escapeRegExp(link), 'g'), `<a href="${link}" target="_blank" rel="noopener">${displayText}</a>`);
  });
  return formatted;
}

function createPhotoSection(item) {
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = (item.jawaban1 + ' ' + item.jawaban2 + ' ' + item.jawaban3).match(photoPattern);
  if (!match) return '';
  const photoUrl = match[1];
  if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
  return `
    <div class="photo-container">
      <img src="${photoUrl}" alt="Foto" class="photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.style.display='none'">
      <button class="copy-photo-btn" onclick="copyPhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
    </div>`;
}

function createLinkButtons(links) {
  if (links.length === 0) return '';
  return `
    <div class="link-buttons">
      ${links.map((link, i) => {
        const label = links.length > 1 ? `Link ${i+1}` : 'Buka Link';
        return `<a href="${link}" target="_blank" rel="noopener" class="open-link-btn">
          <i class="fas fa-external-link-alt"></i> ${label}
        </a>`;
      }).join('')}
    </div>`;
}

async function copyAnswer(index, answerNum) {
  const item = filteredKendala[index];
  const content = item[`jawaban${answerNum}`];
  if (!content) return;
  try {
    await navigator.clipboard.writeText(content);
    showToast('✅ Jawaban disalin!');
    const btn = event.target.closest('.copy-btn');
    if (btn) {
      btn.classList.add('copied');
      btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
      }, 2000);
    }
  } catch {
    fallbackCopy(content);
  }
}

async function copyTitlePhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin!');
  } catch {
    await navigator.clipboard.writeText(url);
    showToast('📋 URL foto disalin!');
  }
}

async function copyPhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin!');
  } catch {
    await navigator.clipboard.writeText(url);
    showToast('📋 URL foto disalin!');
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('✅ Disalin!');
  } catch {
    showToast('❗ Gagal menyalin');
  }
  document.body.removeChild(textarea);
}

function searchKendala() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  filteredKendala = allKendala.filter(item =>
    item.judul.toLowerCase().includes(query) ||
    (item.jawaban1 && item.jawaban1.toLowerCase().includes(query)) ||
    (item.jawaban2 && item.jawaban2.toLowerCase().includes(query)) ||
    (item.jawaban3 && item.jawaban3.toLowerCase().includes(query))
  );
  renderKendala();
  updateStats();
}

function updateStats() {
  document.getElementById('totalItems').textContent = filteredKendala.length;
  const withPhotos = filteredKendala.filter(item => detectPhotoLink(item) || extractTitlePhoto(item.judul)).length;
  document.getElementById('withPhotos').textContent = withPhotos;
  const withLinks = filteredKendala.filter(item =>
    extractLinks(item.jawaban1).length > 0 ||
    extractLinks(item.jawaban2).length > 0 ||
    extractLinks(item.jawaban3).length > 0
  ).length;
  document.getElementById('withLinks').textContent = withLinks;
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function escapeRegExp(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ================= LIGHTBOX LOGIC =================
function openLightbox(url) {
  lightboxIndex = lightboxImages.indexOf(url);
  if (lightboxIndex === -1) {
    lightboxImages.push(url);
    lightboxIndex = lightboxImages.length - 1;
  }
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
  zoomLevel = 1;
  updateZoom();
}

function closeLightbox(event) {
  if (!event || event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightboxImg').src = '';
    document.body.style.overflow = '';
  }
}

function changeLightbox(direction) {
  lightboxIndex += direction;
  if (lightboxIndex < 0) lightboxIndex = lightboxImages.length - 1;
  if (lightboxIndex >= lightboxImages.length) lightboxIndex = 0;
  document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
  zoomLevel = 1;
  updateZoom();
}

function updateZoom() {
  zoomLevel = parseFloat(document.getElementById('zoomSlider').value);
  document.getElementById('lightboxImg').style.transform = `scale(${zoomLevel})`;
}

async function copyLightboxPhoto() {
  const url = document.getElementById('lightboxImg').src;
  if (url) await copyPhoto(url);
}

// ================= STICKY NOTES LOGIC =================
function toggleStickyPanel() {
  const panel = document.getElementById("stickyPanel");
  panel.style.display = panel.style.display === "flex" ? "none" : "flex";
  loadStickyNotes();
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = (el.scrollHeight) + "px";
}

async function addSticky() {
  const input = document.getElementById("stickyInput");
  const text = input.value.trim();
  const image = input.dataset.image || null;
  if (!text && !image) return;
  
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  if (editIndex !== null) {
    stickies[editIndex] = { text, image };
    editIndex = null;
    document.getElementById("stickyAddBtn").querySelector("span").textContent = "Tambah";
  } else {
    stickies.push({ text, image });
  }
  localStorage.setItem("stickies", JSON.stringify(stickies));
  
  input.value = "";
  input.dataset.image = "";
  autoResize(input);
  removePhoto();
  loadStickyNotes();
}

function loadStickyNotes() {
  const list = document.getElementById("stickyList");
  if (!list) return;
  list.innerHTML = "";
  const stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  
  if (stickies.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding: 30px; color: rgba(0, 243, 255, 0.5); font-size: 13px;">Kosong - Tambahkan catatan</div>';
    return;
  }
  
  stickies.forEach((note, i) => {
    const div = document.createElement("div");
    div.className = "sticky-card";
    div.dataset.index = i;
    
    if (note.text) {
      const p = document.createElement("p");
      p.textContent = note.text;
      div.appendChild(p);
    }
    if (note.image) {
      const img = document.createElement("img");
      img.src = note.image;
      div.appendChild(img);
    }
    
    div.onclick = async (e) => {
      if (e.target.classList.contains('sticky-delete') || e.target.classList.contains('sticky-edit')) return;
      try {
        const items = {};
        if (note.text) items["text/plain"] = new Blob([note.text], { type: "text/plain" });
        if (note.image) {
          const resp = await fetch(note.image);
          const blob = await resp.blob();
          items[blob.type] = blob;
        }
        await navigator.clipboard.write([new ClipboardItem(items)]);
        showToast("✅ Teks + Gambar disalin!");
      } catch {
        showToast("⚠ Gagal menyalin");
      }
    };
    
    const del = document.createElement("span");
    del.textContent = "✖";
    del.className = "sticky-delete";
    del.onclick = e => { e.stopPropagation(); deleteSticky(i); };
    
    const edit = document.createElement("span");
    edit.textContent = "✏️";
    edit.className = "sticky-edit";
    edit.onclick = e => { e.stopPropagation(); editSticky(i); };
    
    div.appendChild(del);
    div.appendChild(edit);
    div.setAttribute("draggable", true);
    div.ondragstart = e => e.dataTransfer.setData("text/plain", i);
    div.ondragover = e => { e.preventDefault(); div.style.border = "2px dashed #00f3ff"; };
    div.ondragleave = () => div.style.border = "1px solid rgba(0, 243, 255, 0.38)";
    div.ondrop = e => {
      e.preventDefault();
      div.style.border = "1px solid rgba(0, 243, 255, 0.38)";
      reorderSticky(e.dataTransfer.getData("text/plain"), i);
    };
    
    list.appendChild(div);
  });
}

function reorderSticky(from, to) {
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  const moved = stickies.splice(from, 1)[0];
  stickies.splice(to, 0, moved);
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
}

function deleteSticky(i) {
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  stickies.splice(i, 1);
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
}

function editSticky(i) {
  const stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  const input = document.getElementById("stickyInput");
  input.value = stickies[i].text || "";
  input.dataset.image = stickies[i].image || "";
  autoResize(input);
  if (stickies[i].image) showPhotoPreview(stickies[i].image);
  else removePhoto();
  editIndex = i;
  document.getElementById("stickyAddBtn").querySelector("span").textContent = "Update";
  input.focus();
}

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const base64 = e.target.result;
      document.getElementById("stickyInput").dataset.image = base64;
      showPhotoPreview(base64);
      showToast('📸 Foto diunggah!');
    };
    reader.readAsDataURL(file);
  }
}

function handleStickyPaste(event) {
  const items = event.clipboardData.items;
  for (let i = 0; i < items.length; i++) {
    if (items[i].type.startsWith('image/')) {
      event.preventDefault();
      const blob = items[i].getAsFile();
      const reader = new FileReader();
      reader.onload = function(e) {
        const base64 = e.target.result;
        document.getElementById("stickyInput").dataset.image = base64;
        showPhotoPreview(base64);
        showToast('📸 Foto ditempel!');
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
}

function showPhotoPreview(dataUrl) {
  const preview = document.getElementById('stickyPhotoPreview');
  const previewImg = document.getElementById('stickyPreviewImg');
  previewImg.src = dataUrl;
  preview.classList.add('show');
}

function removePhoto() {
  const input = document.getElementById("stickyInput");
  if(input) input.dataset.image = "";
  document.getElementById('stickyPhotoPreview').classList.remove('show');
  document.getElementById('fileInput').value = '';
}

function addToSticky(kendalaIndex, answerNum) {
  const item = filteredKendala[kendalaIndex];
  const content = item[`jawaban${answerNum}`];
  if (!content) return;
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = content.match(photoPattern);
  const imageUrl = match ? match[1] : null;
  
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  stickies.push({
    text: imageUrl ? content.replace(photoPattern, '').trim() : content,
    image: imageUrl
  });
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
  showToast('✅ Ditambahkan ke Sticky Notes!');
}

// ================= TOAST & PARTICLES =================
function showToast(message) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMessage').textContent = message;
  toast.className = 'toast';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  for (let i = 0; i < 45; i++) {
    const particle = document.createElement('div');
    const size = Math.random() * 2.5 + 1;
    particle.style.cssText = `
      position: absolute;
      width: ${size}px;
      height: ${size}px;
      background: rgba(0, 243, 255, ${Math.random() * 0.5 + 0.25});
      border-radius: 50%;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      animation: float ${Math.random() * 12 + 8}s infinite linear;
      box-shadow: 0 0 ${Math.random() * 10 + 5}px rgba(0, 243, 255, 0.55);
    `;
    container.appendChild(particle);
  }
}

const style = document.createElement('style');
style.textContent = `
  @keyframes float {
    0%, 100% { transform: translateY(0); opacity: 0; }
    10%, 90% { opacity: 1; }
    50% { transform: translateY(-200px); }
  }
`;
document.head.appendChild(style);

// ================= INITIALIZATION =================
document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  loadKendalaData();
  const stickyInput = document.getElementById('stickyInput');
  if (stickyInput) {
    stickyInput.addEventListener('paste', handleStickyPaste);
  }
  setTimeout(() => showToast('🔷 System Ready! Neon Blue 2026'), 1000);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeLightbox();
    const panel = document.getElementById("stickyPanel");
    if (panel.style.display === "flex") toggleStickyPanel();
  }
});
</script>

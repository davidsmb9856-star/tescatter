<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ✨ NEON BLUE SYSTEM ✨ */
:root {
--blue-50: #f0f9ff; --blue-100: #e0f2fe; --blue-200: #bae6fd;
--blue-300: #7dd3fc; --blue-400: #38bdf8; --blue-500: #0ea5e9;
--blue-600: #0284c7; --blue-700: #0369a1; --blue-800: #075985;
--blue-900: #0c4a6e; --blue-950: #082f49;
--bg: #030712; --bg-soft: #0a1628; --bg-card: rgba(15, 30, 55, 0.65);
--bg-hover: rgba(22, 45, 75, 0.8);
--neon: #00d4ff; --neon-dim: rgba(0, 212, 255, 0.15);
--neon-glow: 0 0 24px rgba(0, 212, 255, 0.45), 0 0 48px rgba(0, 212, 255, 0.2);
--text: #e2e8f0; --text-dim: #64748b; --text-muted: #94a3b8;
--r-sm: 12px; --r-md: 16px; --r-lg: 24px; --r-xl: 32px;
--ease: cubic-bezier(0.16, 1, 0.3, 1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
font-family: 'Inter', system-ui, -apple-system, sans-serif;
background: var(--bg); color: var(--text); min-height: 100dvh;
line-height: 1.6; -webkit-font-smoothing: antialiased;
background-image:
  radial-gradient(ellipse 70% 40% at 25% 15%, rgba(0, 212, 255, 0.08), transparent),
  radial-gradient(ellipse 50% 50% at 75% 80%, rgba(14, 165, 233, 0.06), transparent);
background-attachment: fixed;
}
.container { max-width: 1280px; margin: 0 auto; padding: 0 24px 60px; }

/* ✨ HERO HEADER ✨ */
.hero {
position: relative; padding: 48px 0 32px; text-align: center;
border-bottom: 1px solid rgba(0, 212, 255, 0.12); margin-bottom: 32px;
}
.hero::before {
content: ''; position: absolute; inset: 0;
background: radial-gradient(ellipse at center top, rgba(0, 212, 255, 0.12), transparent 70%);
pointer-events: none;
}
.hero-badge {
display: inline-flex; align-items: center; gap: 8px;
background: var(--neon-dim); border: 1px solid rgba(0, 212, 255, 0.3);
border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 600;
color: var(--neon); letter-spacing: 0.8px; margin-bottom: 18px;
font-family: 'JetBrains Mono', monospace;
}
.hero-badge .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 8px var(--neon); animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.5)} }
.hero h1 {
font-size: clamp(36px, 8vw, 56px); font-weight: 800; letter-spacing: -0.5px; line-height: 1.15;
margin-bottom: 10px;
background: linear-gradient(135deg, #fff 15%, var(--neon) 55%, #38bdf8 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero p { color: var(--text-muted); font-size: 16px; max-width: 400px; margin: 0 auto 20px; }

/* ✨ BACK BUTTON ✨ */
.back-link {
position: fixed; top: 24px; left: 24px; z-index: 100;
background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.25);
border-radius: 10px; padding: 8px 14px; color: var(--neon);
font-size: 13px; font-weight: 500; text-decoration: none;
display: flex; align-items: center; gap: 6px; transition: all 0.25s var(--ease);
backdrop-filter: blur(8px);
}
.back-link:hover { background: var(--neon-dim); border-color: var(--neon); box-shadow: var(--neon-glow); transform: translateX(-4px); }

/* ✨ TOOLBAR ✨ */
.toolbar {
display: flex; align-items: center; justify-content: space-between; gap: 14px;
margin-bottom: 28px; flex-wrap: wrap;
}
.search-wrap {
position: relative; flex: 1; min-width: 240px; max-width: 420px;
}
.search-input {
width: 100%; padding: 12px 18px 12px 44px; background: rgba(15, 25, 50, 0.8);
border: 1px solid rgba(0, 212, 255, 0.2); border-radius: var(--r-md);
color: var(--text); font-size: 15px; transition: all 0.25s var(--ease);
}
.search-input:focus { outline: none; border-color: var(--neon); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.12); }
.search-input::placeholder { color: var(--text-dim); }
.search-wrap .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; }
.toolbar-right { display: flex; gap: 8px; }
.tool-btn {
padding: 10px 16px; background: rgba(15, 25, 50, 0.7); border: 1px solid rgba(0, 212, 255, 0.15);
border-radius: var(--r-sm); color: var(--text-muted); font-size: 13px; font-weight: 500;
cursor: pointer; display: flex; align-items: center; gap: 7px; transition: all 0.25s var(--ease);
}
.tool-btn:hover, .tool-btn.active { border-color: var(--neon); color: var(--neon); background: var(--neon-dim); }

/* ✨ TABS ✨ */
.tab-scroll {
display: flex; gap: 6px; overflow-x: auto; margin-bottom: 28px;
padding-bottom: 4px; scrollbar-width: none;
}
.tab-scroll::-webkit-scrollbar { display: none; }
.tab-chip {
padding: 9px 18px; background: rgba(15, 25, 50, 0.6); border: 1px solid rgba(0, 212, 255, 0.12);
border-radius: 10px; color: var(--text-muted); font-size: 13px; font-weight: 500;
cursor: pointer; white-space: nowrap; transition: all 0.25s var(--ease);
}
.tab-chip:hover { color: var(--text); border-color: rgba(0, 212, 255, 0.3); }
.tab-chip.active { background: var(--neon-dim); border-color: var(--neon); color: var(--neon); box-shadow: var(--neon-glow); }

/* ✨ MASONRY GRID ✨ */
.masonry {
columns: 3; column-gap: 18px;
}
.photo-card {
break-inside: avoid; margin-bottom: 18px; position: relative;
background: var(--bg-card); border: 1px solid rgba(0, 212, 255, 0.12);
border-radius: var(--r-md); overflow: hidden;
opacity: 0; transform: translateY(18px); animation: up 0.55s var(--ease) forwards;
transition: all 0.35s var(--ease); cursor: pointer;
}
.photo-card:hover {
transform: translateY(-5px); border-color: var(--neon);
box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4), var(--neon-glow);
}
@keyframes up { to { opacity: 1; transform: translateY(0); } }
.photo-card:nth-child(1){animation-delay:0.06s} .photo-card:nth-child(2){animation-delay:0.12s}
.photo-card:nth-child(3){animation-delay:0.18s} .photo-card:nth-child(4){animation-delay:0.24s}
.photo-card:nth-child(5){animation-delay:0.30s} .photo-card:nth-child(6){animation-delay:0.36s}

.img-box {
position: relative; width: 100%; overflow: hidden;
background: linear-gradient(160deg, #0c1929, #050b14);
}
.img-box img {
width: 100%; display: block; transition: transform 0.5s var(--ease);
filter: brightness(0.85);
}
.photo-card:hover .img-box img { transform: scale(1.05); filter: brightness(1); }

/* ✨ HOVER ACTIONS OVERLAY ✨ */
.img-box::after {
content: ''; position: absolute; inset: 0;
background: linear-gradient(180deg, transparent 30%, rgba(3, 7, 18, 0.88));
opacity: 0; transition: opacity 0.35s;
}
.photo-card:hover .img-box::after { opacity: 1; }
.hover-actions {
position: absolute; bottom: 14px; left: 14px; right: 14px;
display: flex; justify-content: space-between; align-items: flex-end;
opacity: 0; transform: translateY(10px); transition: all 0.35s var(--ease); z-index: 2;
}
.photo-card:hover .hover-actions { opacity: 1; transform: translateY(0); }
.hover-title { font-weight: 700; font-size: 15px; text-shadow: 0 1px 4px rgba(0,0,0,0.7); flex: 1; }
.hover-icons { display: flex; gap: 6px; }
.hov-btn {
width: 34px; height: 34px; border-radius: 50%; background: rgba(0,0,0,0.55);
backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.18);
color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
font-size: 13px; transition: all 0.2s var(--ease);
}
.hov-btn:hover { background: var(--neon); color: var(--bg); border-color: var(--neon); }
.hov-btn.fav:hover { background: #f43f5e; border-color: #f43f5e; }
.hov-btn.fav.active { background: #f43f5e; border-color: #f43f5e; color: #fff; }

/* ✨ CARD INFO ✨ */
.card-info {
padding: 14px 16px;
display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.info-title { font-weight: 600; font-size: 14px; color: var(--text); }
.info-meta { font-size: 12px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

/* ✨ EMPTY STATE ✨ */
.empty-state {
text-align: center; padding: 60px 24px; grid-column: 1/-1;
color: var(--text-dim); column-span: all;
}
.empty-state i { font-size: 40px; margin-bottom: 16px; display: block; color: var(--blue-800); }
.empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text-muted); }

/* ✨ BOTTOM SHEET MODAL ✨ */
.sheet-overlay {
position: fixed; inset: 0; background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(6px);
z-index: 1000; display: none; align-items: flex-end; justify-content: center;
animation: fadeBg 0.25s ease;
}
@keyframes fadeBg { from { opacity: 0; } to { opacity: 1; } }
.sheet-overlay.active { display: flex; }
.sheet {
width: 100%; max-width: 800px; background: var(--bg-soft);
border-top: 1px solid rgba(0, 212, 255, 0.25);
border-radius: 24px 24px 0 0; overflow: hidden;
box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 212, 255, 0.15);
animation: sheetUp 0.35s var(--ease);
}
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle {
width: 44px; height: 5px; background: rgba(0, 212, 255, 0.3); border-radius: 3px;
margin: 12px auto 0; cursor: pointer;
}
.sheet-img { width: 100%; padding: 12px; text-align: center; background: #010409; cursor: zoom-in; }
.sheet-img img { max-width: 100%; max-height: 55vh; border-radius: var(--r-md); object-fit: contain; transition: transform 0.3s; }
.sheet-img img.zoomed { transform: scale(1.6); }
.sheet-content { padding: 20px 24px 36px; }
.sheet-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.sheet-sub { font-size: 13px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; margin-bottom: 20px; }
.sheet-acts { display: flex; gap: 10px; flex-wrap: wrap; }
.s-btn {
padding: 11px 20px; border-radius: var(--r-sm); font-size: 14px; font-weight: 600;
cursor: pointer; border: none; display: flex; align-items: center; gap: 8px;
transition: all 0.25s var(--ease);
}
.s-btn-primary { background: var(--neon); color: var(--bg); box-shadow: 0 4px 16px rgba(0, 212, 255, 0.35); }
.s-btn-primary:hover { box-shadow: var(--neon-glow); transform: translateY(-2px); }
.s-btn-ghost { background: rgba(0, 212, 255, 0.1); color: var(--neon); border: 1px solid rgba(0, 212, 255, 0.3); }
.s-btn-ghost:hover { background: var(--neon-dim); border-color: var(--neon); }

/* ✨ LOADER ✨ */
.loader-box { text-align: center; padding: 50px 20px; column-span: all; }
.loader-ring {
width: 36px; height: 36px; border: 3px solid rgba(0, 212, 255, 0.2);
border-top-color: var(--neon); border-radius: 50%; animation: spin 0.8s linear infinite;
margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 14px; color: var(--text-dim); }

/* ✨ TOAST ✨ */
.toast {
position: fixed; bottom: 28px; right: 28px; z-index: 2000;
background: var(--bg-soft); border: 1px solid var(--neon);
color: var(--neon); padding: 14px 20px; border-radius: var(--r-sm);
font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px;
box-shadow: var(--neon-glow); transform: translateY(120px); opacity: 0;
transition: all 0.4s var(--ease); backdrop-filter: blur(10px);
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ✨ RESPONSIVE ✨ */
@media (max-width: 1024px) { .masonry { columns: 2; } }
@media (max-width: 640px) {
.container { padding: 0 16px 40px; }
.hero { padding: 36px 0 24px; }
.hero h1 { font-size: 32px; }
.masonry { columns: 1; }
.toolbar { flex-direction: column; align-items: stretch; }
.search-wrap { max-width: 100%; }
.toolbar-right { justify-content: center; }
.back-link { top: 16px; left: 16px; padding: 7px 12px; font-size: 12px; }
.sheet-content { padding: 16px 20px 28px; }
.s-btn { flex: 1; justify-content: center; padding: 12px 10px; }
}
@media (max-width: 380px) { .masonry { columns: 1; } .photo-card { margin-bottom: 14px; } }
:focus-visible { outline: 2px solid var(--neon); outline-offset: 3px; }
::selection { background: var(--neon); color: var(--bg); }
::-webkit-scrollbar { width: 7px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--blue-800); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--blue-700); }
</style>
</head>
<body>

<a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali</a>

<div class="container">
<section class="hero">
<div class="hero-badge"><div class="pulse"></div> LINE TOGEL 2026</div>
<h1>Foto Gallery</h1>
<p>Koleksi lengkap gambar dan referensi</p>
</section>

<div class="toolbar">
<div class="search-wrap">
<i class="fas fa-search search-icon"></i>
<input type="search" class="search-input" id="searchInput" placeholder="Cari judul foto...">
</div>
<div class="toolbar-right">
<button class="tool-btn" id="favFilter"><i class="fas fa-heart"></i> Favorit</button>
<button class="tool-btn" id="sortBtn"><i class="fas fa-arrow-down-z-a"></i> A-Z</button>
</div>
</div>

<div class="tab-scroll" id="tabScroll">
<button class="tab-chip active" data-filter="all">Semua</button>
<button class="tab-chip" data-filter="favorites">❤️ Favorit</button>
<button class="tab-chip" data-filter="recent">🕐 Terbaru</button>
</div>

<div class="masonry" id="galleryGrid"></div>
<div class="loader-box" id="loaderBox">
<div class="loader-ring"></div>
<div class="loader-text">Memuat galeri...</div>
</div>
</div>

<!-- Bottom Sheet -->
<div class="sheet-overlay" id="sheetOverlay">
<div class="sheet" id="sheet">
<div class="sheet-handle" id="sheetHandle"></div>
<div class="sheet-img" id="sheetZoomArea"><img src="" alt="" id="sheetImg"></div>
<div class="sheet-content">
<h2 class="sheet-title" id="sheetTitle">-</h2>
<p class="sheet-sub" id="sheetSub">-</p>
<div class="sheet-acts">
<button class="s-btn s-btn-primary" onclick="copyImage()"><i class="fas fa-copy"></i> Salin</button>
<button class="s-btn s-btn-ghost" onclick="downloadImage()"><i class="fas fa-download"></i> Unduh</button>
<button class="s-btn s-btn-ghost" onclick="shareImage()"><i class="fas fa-share"></i> Bagikan</button>
</div>
</div>
</div>
</div>

<div class="toast" id="toast"><i class="fas fa-bolt"></i> <span id="toastMsg"></span></div>

<script>
const S = { photos: [], favs: JSON.parse(localStorage.getItem('ltg_fv')||'[]'), tab: 'all', sort: 'desc', search: '' };
const grid = document.getElementById('galleryGrid');
const loader = document.getElementById('loaderBox');

document.addEventListener('DOMContentLoaded', () => { fetchData(); bindEvents(); });

function bindEvents() {
  document.getElementById('searchInput').addEventListener('input', e => { S.search = e.target.value.toLowerCase(); render(); });
  document.querySelectorAll('.tab-chip').forEach(c => c.addEventListener('click', e => {
    document.querySelectorAll('.tab-chip').forEach(x => x.classList.remove('active'));
    e.currentTarget.classList.add('active'); S.tab = e.currentTarget.dataset.filter; render();
  }));
  document.getElementById('favFilter').addEventListener('click', () => {
    S.tab = S.tab === 'favorites' ? 'all' : 'favorites';
    document.querySelectorAll('.tab-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === S.tab));
    document.getElementById('favFilter').classList.toggle('active', S.tab === 'favorites');
    render();
  });
  document.getElementById('sortBtn').addEventListener('click', () => {
    S.sort = S.sort === 'desc' ? 'asc' : 'desc';
    document.getElementById('sortBtn').innerHTML = S.sort === 'desc' ? '<i class="fas fa-arrow-down-z-a"></i> A-Z' : '<i class="fas fa-arrow-down-a-z"></i> Z-A';
    render();
  });
  document.getElementById('sheetOverlay').addEventListener('click', e => { if(e.target.id==='sheetOverlay') closeSheet(); });
  document.getElementById('sheetHandle').addEventListener('click', closeSheet);
  document.getElementById('sheetZoomArea').addEventListener('click', e => e.target.classList.toggle('zoomed'));
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeSheet(); if(e.ctrlKey&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();} });
}

async function fetchData() {
  try {
    const sid = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0', gid = '1246502038';
    let d = [];
    try {
      const r = await fetch(`https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
      const t = await r.text();
      const j = JSON.parse(t.substring(47).slice(0,-2));
      d = j.table.rows.map((r,i)=>({j: r.c[0]?.v||'', u: r.c[1]?.v||', t: Date.now()-i*3600000 })).filter(x=>x.j&&x.u);
    } catch {
      const csv = await (await fetch(`https://docs.google.com/spreadsheets/d/${sid}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
      d = csv.split('\n').map(r=>r.split(',')).filter(r=>r[0]?.trim()&&r[1]?.trim()).map((r,i)=>({j:r[0].replace(/"/g,'').trim(), u:r[1].replace(/"/g,'').trim(), t:Date.now()-i*3600000 }));
    }
    S.photos = d; loader.classList.add('hidden'); render(); toast(`✅ ${d.length} foto dimuat`);
  } catch(e) { loader.innerHTML = '<div style="padding:40px;color:var(--text-dim)">❌ Gagal memuat data. Periksa koneksi dan publikasi Google Sheets.</div>'; }
}

function render() {
  grid.innerHTML = '';
  let list = [...S.photos];
  if(S.tab==='favorites') list = list.filter(p=>S.favs.includes(p.u));
  if(S.tab==='recent') list.sort((a,b)=>b.t-a.t);
  if(S.sort==='asc') list.sort((a,b)=>a.j.localeCompare(b.j));
  if(S.search) list = list.filter(p=>p.j.toLowerCase().includes(S.search));
  
  if(!list.length) { grid.innerHTML = `<div class="empty-state"><i class="fas fa-image"></i><h3>Tidak ditemukan</h3><p>Coba kata kunci atau filter lain</p></div>`; return; }
  
  list.forEach((p,i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.style.animationDelay = `${i * 0.05}s`;
    const isF = S.favs.includes(p.u);
    card.innerHTML = `
      <div class="img-box" onclick="openSheet('${p.u}','${p.j.replace(/'/g,"\\'")}')">
        <img src="${p.u}" alt="${p.j}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/0c1929/00d4ff?text=No+Image'">
        <div class="hover-actions">
          <div class="hover-title">${p.j}</div>
          <div class="hover-icons">
            <button class="hov-btn ${isF?'active':''}" onclick="event.stopPropagation();toggleFav('${p.u}',this)" title="Favorit"><i class="fas fa-heart"></i></button>
          </div>
        </div>
      </div>
      <div class="card-info">
        <div class="info-title">${p.j.length>40?p.j.slice(0,40)+'…':p.j}</div>
        <div class="info-meta">#${i+1}</div>
      </div>`;
    grid.appendChild(card);
  });
}

function toggleFav(u, btn) {
  const i = S.favs.indexOf(u);
  i > -1 ? (S.favs.splice(i,1), btn.classList.remove('active'), toast('💔 Dihapus dari favorit')) : (S.favs.push(u), btn.classList.add('active'), toast('❤️ Ditambahkan ke favorit'));
  localStorage.setItem('ltg_fv', JSON.stringify(S.favs));
  if(S.tab==='favorites') render();
}

let sheetUrl = '', sheetTitle = '';
function openSheet(u, t) {
  sheetUrl = u; sheetTitle = t;
  document.getElementById('sheetImg').src = u;
  document.getElementById('sheetImg').classList.remove('zoomed');
  document.getElementById('sheetTitle').textContent = t;
  document.getElementById('sheetSub').textContent = `Format: ${u.split('.').pop().toUpperCase()} • Klik gambar untuk zoom`;
  document.getElementById('sheetOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeSheet() { document.getElementById('sheetOverlay').classList.remove('active'); document.body.style.overflow = ''; sheetUrl = ''; }

async function copyImage() { if(!sheetUrl) return; try{ const b=await(await fetch(sheetUrl)).blob(); await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]); toast('✅ Disalin!'); }catch{ toast('❗ Klik kanan > Copy Image'); } }
function downloadImage() { if(!sheetUrl) return; const a=document.createElement('a'); a.href=sheetUrl; a.download=`foto_${Date.now()}.${sheetUrl.split('.').pop()}`; a.click(); toast('⬇️ Mengunduh...'); }
function shareImage() { if(!sheetUrl) return; if(navigator.share){navigator.share({url:sheetUrl,title:sheetTitle}).catch(()=>{});}else{copyImage();} }
function toast(m) { const t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>⚡ FOTO GALLERY — LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════
   BLUE NEON COOL DESIGN SYSTEM
   ═══════════════════════════════════════ */
:root {
/* Blue Neon Spectrum */
--neon-cyan: #00f2fe;
--neon-blue: #0088ff;
--neon-deep: #0052d4;
--neon-ice: #e0f7ff;
--neon-frost: #caf0f8;
--neon-glow: 0 0 12px rgba(0, 242, 254, 0.6), 0 0 28px rgba(0, 136, 255, 0.35);
--neon-glow-strong: 0 0 18px rgba(0, 242, 254, 0.7), 0 0 45px rgba(0, 136, 255, 0.45), 0 0 80px rgba(0, 82, 212, 0.25);

/* Surface & Depth */
--bg-deep: #020812;
--bg-base: #050e1d;
--bg-card: rgba(8, 18, 38, 0.88);
--bg-glass: rgba(10, 24, 48, 0.72);
--bg-glass-light: rgba(14, 32, 62, 0.65);
--bg-border: rgba(0, 242, 254, 0.25);
--bg-border-hover: rgba(0, 242, 254, 0.55);

/* Text */
--text-main: #ffffff;
--text-sec: #a3c4ff;
--text-muted: #5a7bb8;
--text-glow: rgba(0, 242, 254, 0.85);

/* Layout */
--header-h: 68px;
--panel-w: 270px;
--gap: 20px;
--radius-sm: 8px;
--radius-md: 14px;
--radius-lg: 20px;
--radius-xl: 28px;
--shadow-base: 0 8px 24px rgba(0, 0, 0, 0.35), 0 2px 8px rgba(0, 0, 0, 0.2);

/* Animation */
--ease: cubic-bezier(0.16, 1, 0.3, 1);
--t-fast: 220ms var(--ease);
--t-normal: 380ms var(--ease);
--t-slow: 550ms var(--ease);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Inter', system-ui, sans-serif;
background: var(--bg-deep);
color: var(--text-main);
min-height: 100vh;
min-height: 100dvh;
overflow-x: hidden;
line-height: 1.55;
}
body::before {
content: ''; position: fixed; inset: 0; z-index: -4;
background: radial-gradient(1000px 500px at 15% 20%, rgba(0, 242, 254, 0.08) 0%, transparent 65%),
radial-gradient(900px 450px at 85% 30%, rgba(0, 136, 255, 0.07) 0%, transparent 65%),
radial-gradient(800px 400px at 50% 85%, rgba(0, 82, 212, 0.06) 0%, transparent 70%);
animation: bgShift 30s ease-in-out infinite alternate; pointer-events: none;
}
@keyframes bgShift { 0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(1.5%,-0.8%) scale(1.025)} }

.grid-bg {
position: fixed; inset: 0; z-index: -3; pointer-events: none; opacity: 0.6;
background-image: linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
background-size: 40px 40px;
mask-image: radial-gradient(ellipse 85% 80% at 50% 50%, black 20%, transparent 85%);
}
.particles { position: fixed; inset: 0; z-index: -2; pointer-events: none; overflow: hidden; }
.p-particle { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan); opacity: 0; animation: float 25s infinite ease-in-out; }
@keyframes float { 0%,100%{transform:translateY(100vh) rotate(0deg);opacity:0}15%{opacity:0.8}85%{opacity:0.8}100%{transform:translateY(-100vh) rotate(360deg);opacity:0} }

/* ═══════════════════════════════════════
   FLOATING HEADER
   ═══════════════════════════════════════ */
.header {
position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
width: calc(100% - 48px); max-width: 1400px; height: var(--header-h);
background: var(--bg-glass); backdrop-filter: blur(18px);
border: 1px solid var(--bg-border); border-radius: var(--radius-xl);
box-shadow: var(--shadow-base);
display: flex; align-items: center; justify-content: space-between;
padding: 0 24px; z-index: 1000;
}
.brand {
display: flex; align-items: center; gap: 10px;
font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900;
letter-spacing: 2px; color: var(--neon-cyan);
text-shadow: var(--neon-glow);
}
.brand i { font-size: 20px; }

.search-wrap {
flex: 1; max-width: 420px; margin: 0 24px; position: relative;
}
.search-input {
width: 100%; padding: 10px 16px 10px 42px;
background: rgba(0, 0, 0, 0.35); border: 1px solid var(--bg-border);
border-radius: var(--radius-md); color: var(--text-main);
font-size: 14px; transition: var(--t-fast);
}
.search-input:focus {
outline: none; border-color: var(--neon-cyan); box-shadow: var(--neon-glow);
background: rgba(0, 20, 45, 0.65);
}
.search-input::placeholder { color: var(--text-muted); }
.search-icon {
position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
color: var(--text-muted); font-size: 14px; pointer-events: none;
}
.header-actions { display: flex; align-items: center; gap: 12px; }
.h-btn {
width: 38px; height: 38px; border-radius: var(--radius-md);
background: rgba(0, 242, 254, 0.1); border: 1px solid var(--bg-border);
color: var(--text-sec); font-size: 15px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: var(--t-fast);
}
.h-btn:hover { background: rgba(0, 242, 254, 0.25); border-color: var(--neon-cyan); color: var(--neon-cyan); transform: translateY(-2px); box-shadow: var(--neon-glow); }

/* ═══════════════════════════════════════
   MAIN LAYOUT (3-COL COMMAND CENTER)
   ═══════════════════════════════════════ */
.layout {
display: grid;
grid-template-columns: var(--panel-w) 1fr var(--panel-w);
gap: var(--gap);
padding-top: calc(var(--header-h) + 28px);
max-width: 1440px;
margin: 0 auto;
padding-bottom: 48px;
min-height: 100vh;
}
@media (max-width: 1100px) { .layout { grid-template-columns: 1fr; padding-top: calc(var(--header-h) + 16px); } .panel-left, .panel-right { display: none; } .layout.mobile-panels .panel-left, .layout.mobile-panels .panel-right { display: flex; flex-direction: column; gap: var(--gap); padding: 0 16px; margin-top: var(--gap); } }

/* ═══════════════════════════════════════
   LEFT PANEL (FILTERS & CONTROLS)
   ═══════════════════════════════════════ */
.panel-left { display: flex; flex-direction: column; gap: var(--gap); height: fit-content; position: sticky; top: calc(var(--header-h) + 28px); }
.p-card {
background: var(--bg-card); border: 1px solid var(--bg-border);
border-radius: var(--radius-lg); padding: 20px;
backdrop-filter: blur(14px); box-shadow: var(--shadow-base);
transition: var(--t-normal);
}
.p-card:hover { border-color: var(--bg-border-hover); box-shadow: var(--neon-glow); }
.p-title {
font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
letter-spacing: 1.5px; color: var(--neon-cyan); margin-bottom: 14px;
display: flex; align-items: center; gap: 8px;
}
.filter-btn {
width: 100%; padding: 10px 14px; margin-bottom: 8px;
background: transparent; border: 1px solid var(--bg-border);
border-radius: var(--radius-sm); color: var(--text-sec); font-size: 13px;
cursor: pointer; display: flex; align-items: center; gap: 10px;
transition: var(--t-fast); text-align: left;
}
.filter-btn:hover { background: rgba(0, 242, 254, 0.15); border-color: var(--neon-cyan); color: var(--neon-cyan); }
.filter-btn.active { background: linear-gradient(135deg, rgba(0, 242, 254, 0.25), rgba(0, 136, 255, 0.2)); border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: var(--neon-glow-soft); }
.filter-btn .count { margin-left: auto; background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
.filter-btn.active .count { background: rgba(0, 242, 254, 0.25); }

.sort-select {
width: 100%; padding: 10px 14px; background: rgba(0,0,0,0.35);
border: 1px solid var(--bg-border); border-radius: var(--radius-sm);
color: var(--text-sec); font-size: 13px; cursor: pointer;
appearance: none; background-image: url("image/svg+xml,%3Csvg fill='%2300f2fe' viewBox='0 0 24 24'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
background-repeat: no-repeat; background-position: right 10px center; background-size: 14px;
transition: var(--t-fast);
}
.sort-select:focus { outline: none; border-color: var(--neon-cyan); box-shadow: var(--neon-glow); }

/* ═══════════════════════════════════════
   RIGHT PANEL (STATS & QUICK)
   ═══════════════════════════════════════ */
.panel-right { display: flex; flex-direction: column; gap: var(--gap); height: fit-content; position: sticky; top: calc(var(--header-h) + 28px); }
.stat-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.stat-label { font-size: 12px; color: var(--text-muted); }
.stat-val { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: var(--neon-cyan); }
.quick-btn {
width: 100%; padding: 12px; margin-top: 8px;
background: linear-gradient(135deg, rgba(0, 136, 255, 0.2), rgba(0, 242, 254, 0.15));
border: 1px solid var(--bg-border); border-radius: var(--radius-md);
color: var(--text-sec); font-weight: 600; cursor: pointer;
display: flex; align-items: center; justify-content: center; gap: 8px;
transition: var(--t-fast);
}
.quick-btn:hover { background: linear-gradient(135deg, rgba(0, 136, 255, 0.35), rgba(0, 242, 254, 0.3)); border-color: var(--neon-cyan); color: var(--neon-cyan); transform: translateY(-2px); box-shadow: var(--neon-glow); }

/* ═══════════════════════════════════════
   GALLERY AREA
   ═══════════════════════════════════════ */
.gallery-wrap { display: flex; flex-direction: column; gap: var(--gap); }
.g-header { display: flex; align-items: center; justify-content: space-between; padding: 0 4px; flex-wrap: wrap; gap: 12px; }
.g-title { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 800; color: var(--text-main); letter-spacing: 1px; }
.g-count { font-size: 13px; color: var(--text-muted); }
.g-grid {
display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px;
}

/* Photo Card */
.g-card {
background: var(--bg-card); border: 1px solid var(--bg-border);
border-radius: var(--radius-lg); overflow: hidden;
backdrop-filter: blur(14px); box-shadow: var(--shadow-base);
transition: all 0.45s var(--ease); position: relative;
animation: cardIn 0.6s var(--ease) backwards;
}
.g-card:hover { transform: translateY(-6px); border-color: var(--neon-cyan); box-shadow: var(--neon-glow-strong); }
.g-card:nth-child(1){animation-delay:0.1s} .g-card:nth-child(2){animation-delay:0.14s} .g-card:nth-child(3){animation-delay:0.18s} .g-card:nth-child(4){animation-delay:0.22s} .g-card:nth-child(5){animation-delay:0.26s}
@keyframes cardIn { from{opacity:0;transform:translateY(20px) scale(0.98)} to{opacity:1;transform:translateY(0) scale(1)} }

.g-img-wrap { position: relative; height: 240px; background: radial-gradient(circle at center, #0c1a32, #050a14); overflow: hidden; cursor: pointer; }
.g-img-wrap::after { content:''; position:absolute;inset:0; background:linear-gradient(180deg, transparent 60%, rgba(2,8,18,0.75)); pointer-events:none; }
.g-img { width:100%; height:100%; object-fit:contain; transition:transform 0.5s var(--ease); filter:drop-shadow(0 4px 16px rgba(0,0,0,0.4)); }
.g-card:hover .g-img { transform:scale(1.06); filter:drop-shadow(0 8px 28px rgba(0,242,254,0.35)); }
.g-badge { position:absolute;top:10px;left:10px; padding:3px 10px; background:rgba(0,242,254,0.8); border-radius:6px; font-size:10px; font-weight:800; color:#020812; z-index:2; }
.g-fav { position:absolute;top:10px;right:10px; width:32px;height:32px;border-radius:50%;background:var(--bg-glass);border:1px solid var(--bg-border);color:var(--text-muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t-fast);z-index:2; }
.g-fav:hover,.g-fav.active{background:var(--neon-blue);border-color:var(--neon-blue);color:#fff;box-shadow:var(--neon-glow);transform:scale(1.12);}

.g-info { padding:14px 16px; }
.g-title { font-weight:600; font-size:14px; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.g-meta { display:flex; align-items:center; justify-content:space-between; font-size:12px; color:var(--text-muted); }
.g-actions { display:flex; gap:6px; }
.g-act { width:30px;height:30px;border-radius:6px;background:rgba(0,242,254,0.1);border:1px solid var(--bg-border);color:var(--text-muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t-fast); }
.g-act:hover { background:rgba(0,242,254,0.25); color:var(--neon-cyan); border-color:var(--neon-cyan); transform:translateY(-2px); }

/* Loading & Empty */
.loading, .empty { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--text-muted); }
.spinner { width:40px;height:40px;border:3px solid rgba(0,242,254,0.2);border-top-color:var(--neon-cyan);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 16px;box-shadow:var(--neon-glow-soft); }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-family:'Orbitron',sans-serif; font-size:13px; color:var(--neon-cyan); letter-spacing:1.5px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }

/* ═══════════════════════════════════════
   IMMERSIVE MODAL
   ═══════════════════════════════════════ */
.modal { position:fixed;inset:0;background:rgba(2,4,12,0.95);backdrop-filter:blur(22px);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;animation:mFade 0.35s ease; }
.modal.active { display:flex; }
@keyframes mFade { from{opacity:0}to{opacity:1} }
.modal-box { background:var(--bg-card);border:1px solid var(--bg-border);border-radius:var(--radius-xl);max-width:1050px;width:100%;max-height:92vh;overflow:hidden;display:grid;grid-template-columns:1.2fr 0.8fr;box-shadow:var(--neon-glow-strong);animation:mIn 0.5s var(--ease); }
@keyframes mIn { from{opacity:0;transform:scale(0.97) translateY(15px)}to{opacity:1;transform:scale(1) translateY(0)} }
.modal-media { background:radial-gradient(circle at center,#0c1a32,#050a14);display:flex;align-items:center;justify-content:center;padding:20px;position:relative; }
.modal-media img { max-width:100%;max-height:75vh;object-fit:contain;border-radius:var(--radius-md);box-shadow:0 0 35px rgba(0,242,254,0.4);transition:transform 0.4s var(--ease);cursor:zoom-in; }
.modal-media img.zoomed { cursor:zoom-out;transform:scale(1.45); }
.modal-close { position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:var(--bg-glass);border:1px solid var(--bg-border);color:var(--text-sec);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t-fast);z-index:10; }
.modal-close:hover { background:var(--neon-blue);color:#fff;border-color:var(--neon-blue);box-shadow:var(--neon-glow);transform:rotate(90deg); }
.modal-info { padding:24px;display:flex;flex-direction:column;gap:16px;overflow-y:auto; }
.modal-title { font-family:'Orbitron',sans-serif;font-size:18px;font-weight:800;color:var(--neon-cyan);letter-spacing:1px; }
.detail-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px; }
.detail-item { background:rgba(0,0,0,0.3);border:1px solid var(--bg-border);border-radius:var(--radius-sm);padding:10px; }
.detail-label { font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px; }
.detail-value { font-size:14px;font-weight:600;color:var(--text-main); }
.modal-acts { display:flex;gap:10px;flex-wrap:wrap;margin-top:auto; }
.m-btn { flex:1;padding:12px;border-radius:var(--radius-md);font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;border:none;transition:var(--t-fast); }
.m-btn-primary { background:linear-gradient(135deg,var(--neon-blue),var(--neon-cyan));color:#020812;box-shadow:0 4px 16px rgba(0,136,255,0.35); }
.m-btn-primary:hover { transform:translateY(-2px);box-shadow:var(--neon-glow); }
.m-btn-sec { background:transparent;border:1px solid var(--bg-border);color:var(--text-sec); }
.m-btn-sec:hover { background:rgba(0,242,254,0.15);border-color:var(--neon-cyan);color:var(--neon-cyan); }

/* ═══════════════════════════════════════
   TOAST
   ═══════════════════════════════════════ */
.toast { position:fixed;bottom:24px;right:24px;background:var(--bg-glass-light);border:1px solid var(--neon-cyan);color:var(--neon-cyan);padding:14px 24px;border-radius:var(--radius-md);font-weight:600;font-size:14px;z-index:3000;display:flex;align-items:center;gap:10px;box-shadow:var(--neon-glow);transform:translateX(120%);opacity:0;transition:all 0.5s var(--ease);backdrop-filter:blur(16px); }
.toast.show { transform:translateX(0);opacity:1; }

/* ═══════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════ */
@media (max-width: 768px) {
.header { width:calc(100% - 24px); padding:0 14px; height:60px; }
.brand span { display:none; }
.search-wrap { margin:0 12px; max-width:none; }
.g-grid { grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:14px; }
.modal-box { grid-template-columns:1fr; max-height:95vh; }
.modal-media { height:55vh; }
.modal-info { padding:18px; }
.panel-left, .panel-right { display:none; }
}
@media (max-width: 480px) {
.g-grid { grid-template-columns:1fr; }
.g-img-wrap { height:260px; }
.header-actions { gap:8px; }
.h-btn { width:34px; height:34px; font-size:13px; }
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:linear-gradient(180deg,var(--neon-cyan),var(--neon-blue),var(--neon-deep));border-radius:3px;box-shadow:0 0 8px rgba(0,242,254,0.5); }
::selection { background:rgba(0,242,254,0.35);color:#fff;text-shadow:0 0 8px var(--neon-cyan); }
a:focus,button:focus,input:focus{outline:2px solid var(--neon-cyan);outline-offset:2px;box-shadow:0 0 0 4px rgba(0,242,254,0.25);}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="particles" id="particles"></div>

<!-- ═══ FLOATING HEADER ═══ -->
<header class="header">
<div class="brand"><i class="fas fa-bolt"></i><span>LINE TOGEL</span></div>
<div class="search-wrap">
<i class="fas fa-search search-icon"></i>
<input type="search" class="search-input" id="searchInput" placeholder="Cari judul foto...">
</div>
<div class="header-actions">
<button class="h-btn" onclick="fetchPhotos()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
<button class="h-btn" onclick="showToast('🔔 Notifikasi')" title="Info"><i class="fas fa-info-circle"></i></button>
</div>
</header>

<!-- ═══ MAIN LAYOUT ═══ -->
<main class="layout" id="mainLayout">
<!-- LEFT PANEL -->
<aside class="panel-left">
<div class="p-card">
<div class="p-title"><i class="fas fa-filter"></i> Filter</div>
<button class="filter-btn active" data-filter="all"><i class="fas fa-th-large"></i> Semua <span class="count" id="cAll">0</span></button>
<button class="filter-btn" data-filter="favorites"><i class="fas fa-heart"></i> Favorit <span class="count" id="cFav">0</span></button>
<button class="filter-btn" data-filter="recent"><i class="fas fa-clock"></i> Terbaru <span class="count" id="cRecent">0</span></button>
</div>
<div class="p-card">
<div class="p-title"><i class="fas fa-sort-amount-down"></i> Urutkan</div>
<select class="sort-select" id="sortSelect">
<option value="name">Nama A-Z</option>
<option value="newest">Terbaru</option>
</select>
</div>
</aside>

<!-- GALLERY AREA -->
<section class="gallery-wrap">
<div class="g-header">
<div>
<div class="g-title">Galeri Foto</div>
<div class="g-count" id="gCount">Memuat koleksi...</div>
</div>
</div>
<div class="g-grid" id="photoGrid">
<div class="loading"><div class="spinner"></div><div class="loading-text">MEMUAT DATA...</div></div>
</div>
</section>

<!-- RIGHT PANEL -->
<aside class="panel-right">
<div class="p-card">
<div class="p-title"><i class="fas fa-chart-pie"></i> Statistik</div>
<div class="stat-row"><span class="stat-label">Total Foto</span><span class="stat-val" id="sTotal">—</span></div>
<div class="stat-row"><span class="stat-label">Favorit</span><span class="stat-val" id="sFav">0</span></div>
<div class="stat-row"><span class="stat-label">Status</span><span class="stat-val" style="color:#00ff9d;">● Aktif</span></div>
</div>
<div class="p-card">
<div class="p-title"><i class="fas fa-rocket"></i> Aksi Cepat</div>
<button class="quick-btn" onclick="document.getElementById('photoGrid').scrollIntoView({behavior:'smooth'})"><i class="fas fa-images"></i> Lihat Semua</button>
<button class="quick-btn" onclick="fetchPhotos()"><i class="fas fa-download"></i> Muat Ulang</button>
<button class="quick-btn" onclick="window.open('https://wa.me/6281234567890','_blank')"><i class="fas fa-headset"></i> Bantuan</button>
</div>
</aside>
</main>

<!-- ═══ MODAL ═══ -->
<div class="modal" id="imageModal" role="dialog" aria-modal="true">
<div class="modal-box">
<div class="modal-media">
<button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
<img src="" alt="" id="mImg">
</div>
<div class="modal-info">
<div class="modal-title" id="mTitle">Detail Foto</div>
<div class="detail-grid">
<div class="detail-item"><div class="detail-label">Judul</div><div class="detail-value" id="dTitle">—</div></div>
<div class="detail-item"><div class="detail-label">Format</div><div class="detail-value" id="dFormat">—</div></div>
<div class="detail-item"><div class="detail-label">Ukuran</div><div class="detail-value" id="dSize">—</div></div>
<div class="detail-item"><div class="detail-label">ID</div><div class="detail-value" id="dId">—</div></div>
</div>
<div class="modal-acts">
<button class="m-btn m-btn-primary" onclick="copyImage()"><i class="fas fa-copy"></i> Copy</button>
<button class="m-btn m-btn-sec" onclick="downloadModalImage()"><i class="fas fa-download"></i> Unduh</button>
<button class="m-btn m-btn-sec" onclick="shareImage()"><i class="fas fa-share-alt"></i> Bagikan</button>
</div>
</div>
</div>
</div>

<!-- ═══ TOAST ═══ -->
<div id="toast" class="toast"><i class="fas fa-bolt"></i><span id="tText">Berhasil!</span></div>

<script>
/* ═══════════════════════════════════════
   STATE & INIT
   ═══════════════════════════════════════ */
const S = {
photos: [], favs: JSON.parse(localStorage.getItem('ltg_favs')||'[]'),
filter: 'all', search: ''
};
document.addEventListener('DOMContentLoaded', () => {
initParticles(); fetchPhotos(); bindEvents();
});

function bindEvents() {
document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', e => {
document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
e.currentTarget.classList.add('active');
S.filter = e.currentTarget.dataset.filter; apply();
}));
document.getElementById('searchInput').addEventListener('input', e => { S.search = e.target.value.toLowerCase(); apply(); });
document.getElementById('sortSelect').addEventListener('change', apply);
document.getElementById('imageModal').addEventListener('click', e => { if(e.target.id==='imageModal')closeModal(); });
document.getElementById('mImg').addEventListener('click', el => el.currentTarget.classList.toggle('zoomed'));
document.addEventListener('keydown', e => {
if(e.key==='Escape') closeModal();
if(e.ctrlKey && e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}
});
}

function initParticles(){const c=document.getElementById('particles');if(!c)return;for(let i=0;i<60;i++){const p=document.createElement('div');p.className='p-particle';p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*35+'s';p.style.animationDuration=(18+Math.random()*35)+'s';c.appendChild(p);}}

/* ═══════════════════════════════════════
   FETCH & RENDER
   ═══════════════════════════════════════ */
async function fetchPhotos() {
const grid = document.getElementById('photoGrid');
grid.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">MEMUAT DATA...</div></div>`;
try {
const sheet='1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0', gid='1246502038';
let list=[];
try{
const r=await fetch(`https://docs.google.com/spreadsheets/d/${sheet}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
const txt=await r.text(), json=JSON.parse(txt.substring(47).slice(0,-2));
list=json.table.rows.filter(x=>x.c?.[0]?.v&&x.c?.[1]?.v).map((x,i)=>({judul:x.c[0].v,foto:x.c[1].v,id:i+2,ts:Date.now()-i*3600000}));
}catch(e){
const csv=await(await fetch(`https://docs.google.com/spreadsheets/d/${sheet}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
list=csv.split('\n').map(x=>x.split(',')).filter(x=>x[0]?.trim()&&x[1]?.trim()).map((x,i)=>({judul:x[0].replace(/"/g,'').trim(),foto:x[1].replace(/"/g,'').trim(),id:i+2,ts:Date.now()-i*3600000}));
}
S.photos=list; updateStats(); apply(); showToast('⚡ Data berhasil dimuat');
}catch(err){
console.error(err); showToast('❌ Gagal memuat data');
grid.innerHTML=`<div class="empty"><i class="fas fa-exclamation-triangle" style="font-size:38px;color:var(--neon-blue);margin-bottom:14px;"></i><h3 style="color:var(--neon-cyan);margin-bottom:8px;">Gagal Memuat</h3><p>Periksa koneksi atau publikasi Sheet</p></div>`;
}
}

function apply(){
let d=[...S.photos];
if(S.filter==='favorites') d=d.filter(x=>S.favs.includes(x.foto));
if(S.filter==='recent') d.sort((a,b)=>b.ts-a.ts).slice(0,15);
if(S.search) d=d.filter(x=>x.judul.toLowerCase().includes(S.search));
const sort=document.getElementById('sortSelect').value;
if(sort==='name') d.sort((a,b)=>a.judul.localeCompare(b.judul));
render(d);
}

function render(list){
const g=document.getElementById('photoGrid');g.innerHTML='';
document.getElementById('gCount').textContent=`${list.length} foto ditemukan`;
if(!list.length){g.innerHTML=`<div class="empty"><i class="fas fa-search" style="font-size:38px;opacity:0.5;margin-bottom:14px;"></i><h3 style="color:var(--neon-cyan);margin-bottom:8px;">Tidak Ditemukan</h3><p>Coba ubah kata kunci atau filter</p></div>`;return;}
list.forEach(p=>g.appendChild(buildCard(p)));
}

function buildCard(p){
const fav=S.favs.includes(p.foto);
const c=document.createElement('div');c.className='g-card';
c.innerHTML=`
<div class="g-img-wrap" onclick="openModal('${p.foto}','${p.judul.replace(/'/g,"\\'")}',${p.id})">
<img class="g-img" src="${p.foto}" loading="lazy" alt="${p.judul}" onerror="this.src='https://via.placeholder.com/300x200/0a1628/00f2fe?text=NO+IMG'">
<span class="g-badge">#${p.id}</span>
<button class="g-fav ${fav?'active':''}" onclick="event.stopPropagation();toggleFav('${p.foto}',this)"><i class="fas fa-heart"></i></button>
</div>
<div class="g-info">
<div class="g-title">${p.judul}</div>
<div class="g-meta">
<span><i class="far fa-calendar"></i> ${new Date(p.ts).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})}</span>
<div class="g-actions">
<button class="g-act" onclick="copyPhoto('${p.foto}')" title="Copy"><i class="fas fa-copy"></i></button>
<button class="g-act" onclick="downloadPhoto('${p.foto}','${p.judul.replace(/'/g,"\\'")}')" title="Unduh"><i class="fas fa-download"></i></button>
<button class="g-act" onclick="sharePhoto('${p.foto}','${p.judul.replace(/'/g,"\\'")}')" title="Bagikan"><i class="fas fa-share-alt"></i></button>
</div>
</div>
</div>`;
return c;
}

function updateStats(){
document.getElementById('sTotal').textContent=S.photos.length;
document.getElementById('cAll').textContent=S.photos.length;
document.getElementById('cRecent').textContent=Math.min(15,S.photos.length);
document.getElementById('sFav').textContent=S.favs.length;
document.getElementById('cFav').textContent=S.favs.length;
}
function toggleFav(url,btn){
const i=S.favs.indexOf(url);
if(i>-1){S.favs.splice(i,1);btn.classList.remove('active');showToast('💔 Dihapus dari favorit');}
else{S.favs.push(url);btn.classList.add('active');showToast('❤️ Ditambahkan ke favorit');}
localStorage.setItem('ltg_favs',JSON.stringify(S.favs));updateStats();if(S.filter==='favorites')apply();
}

/* ═══════════════════════════════════════
   MODAL & ACTIONS
   ═══════════════════════════════════════ */
let curUrl='',curTitle='';
function openModal(url,title,id){
curUrl=url;curTitle=title;
document.getElementById('mTitle').textContent=title;
document.getElementById('mImg').src=url;document.getElementById('mImg').classList.remove('zoomed');
document.getElementById('dTitle').textContent=title;
document.getElementById('dFormat').textContent=url.split('.').pop().split('?')[0].toUpperCase();
document.getElementById('dId').textContent=`#${id}`;
fetch(url).then(r=>r.blob()).then(b=>{const s=b.size/1024;document.getElementById('dSize').textContent=s>1024?(s/1024).toFixed(2)+' MB':s.toFixed(1)+' KB';}).catch(()=>document.getElementById('dSize').textContent='—');
document.getElementById('imageModal').classList.add('active');document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('imageModal').classList.remove('active');document.body.style.overflow='';curUrl=curTitle='';}
async function copyPhoto(url){try{const b=await(await fetch(url)).blob();await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]);showToast('✅ Disalin!');}catch{showToast('❌ Gagal copy, coba klik kanan gambar');}}
async function copyImage(){if(curUrl)await copyPhoto(curUrl);}
function downloadPhoto(url,name){const a=document.createElement('a');a.href=url;a.download=`${name.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`;a.click();showToast('⬇️ Unduhan dimulai...');}
function downloadModalImage(){if(curUrl)downloadPhoto(curUrl,curTitle);}
async function sharePhoto(url,title){if(navigator.share){try{const b=await(await fetch(url)).blob();await navigator.share({title,text:'Lihat foto ini:',files:[new File([b],title+'.jpg',{type:b.type})]});showToast('🔗 Dibagikan!');}catch(e){if(e.name!=='AbortError')showToast('❌ Gagal share');}}else{copyPhoto(url);showToast('✅ Link disalin!');}}
function shareImage(){if(curUrl)sharePhoto(curUrl,curTitle);}

function showToast(m){const t=document.getElementById('toast');document.getElementById('tText').textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
</script>
</body>
</html>

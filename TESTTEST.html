<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00f5ff">
<meta name="description" content="LINE TOGEL 2026 - Cyber Portal Photo Gallery & Editor">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  /* NEON COLOR PALETTE - ENHANCED */
  --neon-blue: #00d4ff;
  --neon-cyan: #00ffff;
  --neon-electric: #00f5ff;
  --neon-purple: #7b2fff;
  --neon-pink: #ff00aa;
  --neon-gold: #ffd700;
  --neon-green: #00ff9d;
  --neon-orange: #ff6b35;
  
  /* BACKGROUND GRADIENTS */
  --bg-deep: #020408;
  --bg-surface: rgba(5, 15, 35, 0.92);
  --bg-elevated: rgba(10, 25, 55, 0.85);
  --bg-glass: rgba(8, 20, 45, 0.75);
  --bg-glass-strong: rgba(12, 30, 65, 0.88);
  
  /* TEXT COLORS */
  --text-primary: #ffffff;
  --text-secondary: #8ab4f8;
  --text-dim: #54689a;
  --text-glow: rgba(0, 245, 255, 0.8);
  
  /* BORDERS & GLOWS */
  --border-glow: rgba(0, 212, 255, 0.65);
  --border-glow-strong: rgba(0, 245, 255, 0.85);
  --glow-blue: 0 0 15px rgba(0, 212, 255, 0.6), 0 0 35px rgba(0, 212, 255, 0.4), 0 0 60px rgba(0, 212, 255, 0.2);
  --glow-electric: 0 0 20px rgba(0, 245, 255, 0.75), 0 0 50px rgba(0, 245, 255, 0.5), 0 0 90px rgba(0, 245, 255, 0.25);
  --glow-purple: 0 0 18px rgba(123, 47, 255, 0.6), 0 0 45px rgba(123, 47, 255, 0.35);
  --glow-pink: 0 0 18px rgba(255, 0, 170, 0.6), 0 0 45px rgba(255, 0, 170, 0.35);
  --glow-green: 0 0 18px rgba(0, 255, 157, 0.6), 0 0 45px rgba(0, 255, 157, 0.35);
  
  /* TRANSITIONS - ENHANCED */
  --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  --transition-bloom: 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-elastic: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  
  /* SIZES & SPACING */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --spacing-xs: 6px;
  --spacing-sm: 10px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 35px;
}

/* RESET & BASE */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 20px; }
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ========== BACKGROUND EFFECTS - ENHANCED ========== */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: -3;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 15%, rgba(0, 245, 255, 0.15) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 85%, rgba(123, 47, 255, 0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 15% 75%, rgba(255, 0, 170, 0.08) 0%, transparent 60%);
  animation: bgPulse 18s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0%, 100% { opacity: 1; filter: hue-rotate(0deg) brightness(1); }
  25% { opacity: 0.95; filter: hue-rotate(8deg) brightness(1.05); }
  50% { opacity: 0.92; filter: hue-rotate(15deg) brightness(1.08); }
  75% { opacity: 0.95; filter: hue-rotate(8deg) brightness(1.05); }
}

.grid-overlay {
  position: fixed;
  inset: 0;
  z-index: -2;
  background-image:
    linear-gradient(rgba(0, 212, 255, 0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 255, 0.07) 1px, transparent 1px);
  background-size: 45px 45px;
  mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, black 25%, transparent 80%);
  animation: gridMove 35s linear infinite;
  opacity: 0.9;
}
@keyframes gridMove {
  0% { background-position: 0 0; }
  100% { background-position: 45px 45px; }
}

/* LIGHTNING EFFECTS - ENHANCED */
.lightning-overlay {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  opacity: 0;
  animation: lightningFlash 10s infinite;
}
@keyframes lightningFlash {
  0%, 87%, 89%, 91%, 93%, 100% { opacity: 0; }
  88%, 90%, 92% { opacity: 0.18; }
}
.lightning-bolt {
  position: absolute;
  width: 3px;
  height: 100vh;
  background: linear-gradient(180deg, transparent, var(--neon-electric), var(--neon-blue), var(--neon-purple), transparent);
  filter: blur(1.5px) drop-shadow(0 0 8px var(--neon-electric));
  animation: lightningStrike 10s infinite;
  opacity: 0;
}
.lightning-bolt:nth-child(1) { left: 12%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 48%; animation-delay: 3s; }
.lightning-bolt:nth-child(3) { left: 82%; animation-delay: 6s; }
@keyframes lightningStrike {
  0%, 86%, 88%, 90%, 92%, 100% { transform: scaleY(0); opacity: 0; }
  87%, 89%, 91% { transform: scaleY(1); opacity: 1; }
}

/* PARTICLES - ENHANCED */
.particles {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--neon-blue);
  border-radius: 50%;
  opacity: 0.75;
  animation: particleFloat 22s infinite ease-in-out;
  box-shadow: 0 0 12px var(--neon-blue), 0 0 25px var(--neon-blue);
  will-change: transform, opacity;
}
.particle:nth-child(2n) {
  background: var(--neon-electric);
  box-shadow: 0 0 15px var(--neon-electric), 0 0 30px var(--neon-electric);
  animation-delay: -6s;
  animation-duration: 28s;
}
.particle:nth-child(3n) {
  background: var(--neon-purple);
  box-shadow: 0 0 12px var(--neon-purple), 0 0 25px var(--neon-purple);
  animation-delay: -12s;
  animation-duration: 32s;
}
.particle:nth-child(4n) {
  background: var(--neon-pink);
  box-shadow: 0 0 12px var(--neon-pink), 0 0 25px var(--neon-pink);
  animation-delay: -18s;
  animation-duration: 26s;
}
@keyframes particleFloat {
  0%, 100% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }
  8% { opacity: 0.75; }
  92% { opacity: 0.75; }
  100% { transform: translateY(-100vh) rotate(720deg) scale(1.2); opacity: 0; }
}

/* SCANLINE - ENHANCED */
.scanline {
  position: fixed;
  left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), var(--neon-purple), transparent);
  opacity: 0.5;
  animation: scanLine 7s linear infinite;
  z-index: 50;
  pointer-events: none;
  filter: blur(0.5px);
  box-shadow: 0 0 15px var(--neon-electric);
}
@keyframes scanLine {
  0% { top: -5px; opacity: 0; }
  4% { opacity: 0.5; }
  96% { opacity: 0.5; }
  100% { top: 100%; opacity: 0; }
}

/* NOISE OVERLAY */
.noise {
  position: fixed;
  inset: 0;
  z-index: -1;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  pointer-events: none;
  mix-blend-mode: overlay;
}

/* VIGNETTE EFFECT */
.vignette {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: radial-gradient(ellipse at center, transparent 0%, rgba(2, 4, 8, 0.6) 85%, rgba(2, 4, 8, 0.95) 100%);
  pointer-events: none;
}

/* ========== LAYOUT ========== */
.container {
  max-width: 1450px;
  margin: 0 auto;
  padding: 28px 22px;
  min-height: 100vh;
  position: relative;
}

/* HEADER - ENHANCED */
.header {
  text-align: center;
  margin-bottom: 35px;
  animation: headerEntrance 1s var(--transition-bloom) backwards;
  position: relative;
}
@keyframes headerEntrance {
  from { opacity: 0; transform: translateY(-40px) scale(0.97); filter: blur(5px); }
  to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

.back-btn {
  position: fixed;
  left: 22px; top: 28px;
  background: rgba(0, 212, 255, 0.18);
  border: 1px solid var(--neon-blue);
  color: var(--neon-blue);
  padding: 7px 16px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 700;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: var(--transition-smooth);
  backdrop-filter: blur(12px);
  z-index: 1000;
  pointer-events: auto;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.back-btn:hover {
  background: rgba(0, 212, 255, 0.35);
  transform: translateX(-6px) scale(1.03);
  box-shadow: var(--glow-blue), 0 8px 30px rgba(0, 0, 0, 0.4);
  color: var(--bg-deep);
}
.back-btn:active { transform: translateX(-3px) scale(0.98); }

.title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(30px, 7vw, 52px);
  font-weight: 900;
  letter-spacing: 5px;
  margin-bottom: 10px;
  position: relative;
  background: linear-gradient(135deg, var(--neon-electric) 0%, var(--neon-blue) 30%, #ffffff 50%, var(--neon-blue) 70%, var(--neon-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 25px rgba(0, 212, 255, 0.6), 0 0 50px rgba(0, 245, 255, 0.4);
  animation: titleShimmer 2.8s ease-in-out infinite, titleGlow 3s ease-in-out infinite alternate;
  display: inline-block;
}
@keyframes titleShimmer {
  0%, 100% { filter: brightness(1) saturate(1); }
  50% { filter: brightness(1.35) saturate(1.2); }
}
@keyframes titleGlow {
  from { text-shadow: 0 0 25px rgba(0, 212, 255, 0.6), 0 0 50px rgba(0, 245, 255, 0.4); }
  to { text-shadow: 0 0 35px rgba(0, 212, 255, 0.85), 0 0 70px rgba(0, 245, 255, 0.6), 0 0 100px rgba(123, 47, 255, 0.4); }
}

.subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 16px;
  font-weight: 600;
  opacity: 0.95;
  text-shadow: 0 0 10px rgba(138, 180, 248, 0.5);
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  padding: 7px 18px;
  background: rgba(0, 255, 157, 0.15);
  border: 1px solid rgba(0, 255, 157, 0.5);
  border-radius: 100px;
  font-size: 10px;
  font-weight: 700;
  color: var(--neon-green);
  text-transform: uppercase;
  letter-spacing: 2.5px;
  animation: statusPulse 2.2s ease-in-out infinite;
  box-shadow: 0 0 18px rgba(0, 255, 157, 0.3), inset 0 0 10px rgba(0, 255, 157, 0.1);
  backdrop-filter: blur(8px);
}
@keyframes statusPulse {
  0%, 100% { box-shadow: 0 0 18px rgba(0, 255, 157, 0.3), inset 0 0 10px rgba(0, 255, 157, 0.1); }
  50% { box-shadow: 0 0 30px rgba(0, 255, 157, 0.6), inset 0 0 15px rgba(0, 255, 157, 0.2); }
}
.status-dot {
  width: 7px; height: 7px;
  background: var(--neon-green);
  border-radius: 50%;
  animation: dotBeat 1.3s ease-in-out infinite;
  box-shadow: 0 0 12px var(--neon-green), 0 0 25px var(--neon-green);
}
@keyframes dotBeat {
  0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 12px var(--neon-green); }
  50% { transform: scale(1.5); opacity: 0.85; box-shadow: 0 0 25px var(--neon-green); }
}

/* ========== NAVIGATION - UPDATED ========== */
.nav-tabs {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 28px;
  flex-wrap: wrap;
  padding: 0 5px;
}
.nav-tab {
  padding: 11px 26px;
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  backdrop-filter: blur(12px);
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
}
.nav-tab::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 245, 255, 0.1));
  opacity: 0;
  transition: opacity 0.25s;
  z-index: -1;
}
.nav-tab:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.22), rgba(0, 245, 255, 0.18));
  border-color: var(--neon-electric);
  box-shadow: var(--glow-electric), 0 8px 35px rgba(0, 0, 0, 0.35);
  transform: translateY(-3px) scale(1.02);
  color: var(--neon-electric);
}
.nav-tab:hover::before { opacity: 1; }
.nav-tab.active {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.35), rgba(0, 245, 255, 0.28));
  border-color: var(--neon-electric);
  box-shadow: var(--glow-electric), 0 6px 25px rgba(0, 212, 255, 0.3);
  transform: translateY(-2px);
  color: var(--bg-deep);
  font-weight: 800;
}
.nav-tab.active::before { opacity: 1; }

.section { display: none; animation: fadeIn 0.45s ease-out; }
.section.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== SEARCH - ENHANCED ========== */
.search-container {
  max-width: 620px;
  margin: 0 auto 28px;
  position: relative;
}
.search-box {
  width: 100%;
  padding: 13px 50px 13px 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  transition: all 0.28s;
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
}
.search-box:focus {
  outline: none;
  border-color: var(--neon-electric);
  box-shadow: var(--glow-electric), 0 8px 35px rgba(0, 0, 0, 0.3);
  background: var(--bg-glass-strong);
}
.search-box::placeholder { color: var(--text-dim); opacity: 0.8; }
.search-icon {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--neon-blue);
  font-size: 16px;
  pointer-events: none;
  opacity: 0.7;
}

/* ========== GALLERY SECTION - ENHANCED ========== */
.gallery-section {
  margin-bottom: 38px;
  animation: sectionReveal 0.65s var(--transition-bloom) backwards;
}
@keyframes sectionReveal {
  from { opacity: 0; transform: translateY(35px); }
  to { opacity: 1; transform: translateY(0); }
}
.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px;
  font-weight: 800;
  color: var(--text-primary);
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-glow);
  display: flex;
  align-items: center;
  gap: 12px;
  letter-spacing: 2.5px;
  position: relative;
  text-transform: uppercase;
}
.section-title::before {
  content: '';
  width: 5px; height: 20px;
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue));
  border-radius: 3px;
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.7);
  animation: pulseBar 2s ease-in-out infinite;
}
@keyframes pulseBar {
  0%, 100% { opacity: 1; box-shadow: 0 0 12px rgba(0, 245, 255, 0.7); }
  50% { opacity: 0.85; box-shadow: 0 0 20px rgba(0, 245, 255, 1); }
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 18px;
}

/* ========== PHOTO CARD - MAJOR UPDATE ========== */
.photo-card {
  background: var(--bg-surface);
  border: 1px solid rgba(0, 212, 255, 0.3);
  border-radius: 14px;
  overflow: hidden;
  transition: var(--transition-bloom);
  position: relative;
  backdrop-filter: blur(14px);
  animation: cardEnter 0.48s ease forwards;
  opacity: 0;
  transform: translateY(18px);
  box-shadow: 0 6px 25px rgba(0, 0, 0, 0.35);
  will-change: transform, box-shadow;
}
.photo-card:nth-child(1) { animation-delay: 0.08s; }
.photo-card:nth-child(2) { animation-delay: 0.12s; }
.photo-card:nth-child(3) { animation-delay: 0.16s; }
.photo-card:nth-child(4) { animation-delay: 0.2s; }
.photo-card:nth-child(5) { animation-delay: 0.24s; }
.photo-card:nth-child(n+6) { animation-delay: 0.28s; }
@keyframes cardEnter {
  to { opacity: 1; transform: translateY(0); }
}
.photo-card:hover {
  transform: translateY(-6px) scale(1.015);
  border-color: var(--neon-electric);
  box-shadow: var(--glow-electric), 0 20px 50px rgba(0, 0, 0, 0.5);
  z-index: 5;
}
.photo-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 60%, rgba(0, 0, 0, 0.4) 100%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s;
}
.photo-card:hover::after { opacity: 1; }

.photo-wrapper {
  position: relative;
  width: 100%;
  height: 290px;
  background: radial-gradient(circle at center, #0d2137 0%, #050d18 100%);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid rgba(0, 212, 255, 0.15);
}
.photo-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  padding: 8px;
  background: transparent;
  transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.photo-card:hover .photo-wrapper img {
  transform: scale(1.06);
}

/* PHOTO INFO - ENHANCED */
.photo-info {
  padding: 15px 14px 14px;
}
.photo-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 800;
  color: var(--neon-electric);
  margin-bottom: 10px;
  word-break: break-word;
  text-align: center;
  text-shadow: 0 0 12px rgba(0, 245, 255, 0.6);
  line-height: 1.3;
  min-height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.photo-meta {
  font-size: 10px;
  color: var(--text-secondary);
  text-align: center;
  margin-bottom: 13px;
  opacity: 0.85;
  letter-spacing: 0.5px;
}

/* ACTION BUTTONS - COOL & ALWAYS VISIBLE */
.action-buttons-row {
  display: flex;
  gap: 7px;
  justify-content: center;
  flex-wrap: wrap;
  padding-top: 8px;
  border-top: 1px solid rgba(0, 212, 255, 0.25);
}
.action-btn-cool {
  flex: 1;
  min-width: 68px;
  max-width: 88px;
  height: 44px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.18) 0%, rgba(0, 245, 255, 0.12) 100%);
  border: 1px solid rgba(0, 212, 255, 0.45);
  border-radius: 9px;
  color: var(--neon-electric);
  font-size: 10px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
}
.action-btn-cool::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.action-btn-cool i {
  font-size: 15px;
  margin-bottom: 1px;
  transition: transform 0.2s;
}
.action-btn-cool span {
  font-size: 9px;
  font-weight: 700;
}
.action-btn-cool:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.42) 0%, rgba(0, 245, 255, 0.32) 100%);
  border-color: var(--neon-electric);
  transform: translateY(-3px) scale(1.06);

/* INPUTS - ENHANCED */
input[type="range"] {

.btn {

}
.btn::before {

.btn-primary {

.btn-secondary {

}

/* LOADING - ENHANCED */
.loading {
  display: none;
  text-align: center;
  padding: 32px;
  grid-column: 1 / -1;
}
.loading.active { display: block; animation: fadeIn 0.3s; }
.loader {
  width: 48px;
  height: 48px;
  border: 3.5px solid rgba(0, 212, 255, 0.25);

  margin: 0 auto 16px;
  box-shadow: var(--glow-electric);

}
.loader::after {
  content: '';
  position: absolute;
  inset: -5px;
  border: 2px solid transparent;
  border-top-color: var(--neon-purple);
  border-radius: 50%;
  animation: spin 1.3s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: var(--neon-electric);
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: pulseText 1.5s ease-in-out infinite;
}
@keyframes pulseText {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

/* NO RESULTS - ENHANCED */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 45px 20px;
  color: var(--text-secondary);

}

  font-size: 52px;

}

}

/* ========== MODAL - ENHANCED ========== */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(3, 5, 12, 0.96);
  backdrop-filter: blur(20px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: modalFadeIn 0.35s ease-out;
}
.modal-backdrop.active { display: flex; }
@keyframes modalFadeIn {
  from { opacity: 0; }

}
.modal-content {
  background: var(--bg-surface);

}
.modal-header {

}
.modal-title {

.modal-close {

.modal-actions {

  justify-content: center;
  flex-wrap: wrap;
}

/* ========== TOAST - ENHANCED (SMALLER) ========== */
.toast {
  position: fixed;

  right: 22px;

}
.toast.show {

}
.toast i {

}
@keyframes pulseIcon {

}

}

/* ========== TEXT SELECTION ========== */

/* ========== UTILITY CLASSES ========== */
.text-glow { text-shadow: 0 0 12px var(--text-glow); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {

          <div class="tool-title"><i class="fas fa-crop-alt"></i> Transform</div>
          <button class="tool-btn" onclick="rotateImage(-90)"><i class="fas fa-undo"></i> Rotate -90°</button>
          <button class="tool-btn" onclick="rotateImage(90)"><i class="fas fa-redo"></i> Rotate +90°</button>
          <button class="tool-btn" onclick="flipImage('h')"><i class="fas fa-arrows-alt-h"></i> Flip Horizontal</button>
          <button class="tool-btn" onclick="flipImage('v')"><i class="fas fa-arrows-alt-v"></i> Flip Vertical</button>
          <button class="tool-btn" onclick="resizeCanvas()"><i class="fas fa-compress-arrows-alt"></i> Resize Canvas</button>
        </div>
        
        <div class="tool-group">
          <div class="tool-title"><i class="fas fa-text"></i> Text & Draw</div>
          <input type="text" class="input-field" id="textInput" placeholder="Teks..." aria-label="Masukkan teks">
          <input type="color" class="color-picker" id="textColor" value="#00d4ff" aria-label="Pilih warna teks">
          <input type="number" class="input-field" id="textSize" placeholder="Ukuran (px)" value="40" aria-label="Ukuran font">
          <button class="tool-btn" onclick="addText()"><i class="fas fa-plus"></i> Tambah Teks</button>
          <button class="tool-btn" onclick="startDrawing()"><i class="fas fa-pencil-alt"></i> Draw Mode</button>
        </div>
        
        <div class="tool-group">
          <div class="tool-title"><i class="fas fa-layer-group"></i> Combine</div>
          <button class="tool-btn" onclick="combinePhotos('h')"><i class="fas fa-arrows-alt-h"></i> Gabung Horizontal</button>
          <button class="tool-btn" onclick="combinePhotos('v')"><i class="fas fa-arrows-alt-v"></i> Gabung Vertikal</button>
          <button class="tool-btn" onclick="addFrame()"><i class="fas fa-border-style"></i> Tambah Frame</button>
          <button class="tool-btn" onclick="addWatermark()"><i class="fas fa-copyright"></i> Watermark</button>
        </div>
      </div>
      
      <div class="action-buttons">
        <button class="btn btn-primary" onclick="downloadImage()">
          <i class="fas fa-download"></i> Download Foto
        </button>
        <button class="btn btn-secondary" onclick="clearCanvas()">
          <i class="fas fa-trash"></i> Clear
        </button>
        <button class="btn btn-secondary" onclick="undoAction()">
          <i class="fas fa-undo"></i> Undo
        </button>
      </div>
    </div>
  </section>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="imageModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Foto Detail</h3>
      <button class="modal-close" onclick="closeModal()" aria-label="Tutup modal"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <img src="" alt="" id="modalImage">
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="copyImage()">
          <i class="fas fa-copy"></i> Copy Foto
        </button>
        <button class="btn btn-secondary" onclick="downloadModalImage()">
          <i class="fas fa-download"></i> Download
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast" role="alert" aria-live="polite">
  <i class="fas fa-bolt"></i>
  <span id="toastText">Berhasil!</span>
</div>

<script>
// Global variables
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';
let canvas = document.getElementById('mainCanvas');
let ctx = canvas ? canvas.getContext('2d') : null;
let currentEditorImage = null;
let history = [];
let isDrawing = false;
let lastX = 0, lastY = 0;

// Initialize on DOM load
document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  if (document.getElementById('gallery')) {
    fetchPhotosFromSheet();
  }
  initCanvas();
  
  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undoAction(); }
    if (e.key === 'Enter' && document.activeElement.classList.contains('upload-area')) {
      document.getElementById('fileInput').click();
    }
  });
  
  // Close modal on backdrop click
  document.getElementById('imageModal').addEventListener('click', (e) => {
    if (e.target.id === 'imageModal') closeModal();
  });
});

// Create floating particles
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  for(let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 25 + 's';
    p.style.animationDuration = (18 + Math.random() * 25) + 's';
    p.style.width = (2 + Math.random() * 4) + 'px';
    p.style.height = p.style.width;
    container.appendChild(p);
  }
}

// Section navigation
function showSection(sectionId) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(sectionId).classList.add('active');
  event.currentTarget.classList.add('active');
  
  // Scroll to top smoothly
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Fetch photos from Google Sheets
async function fetchPhotosFromSheet() {
  const loading = document.getElementById('loading');
  const grid = document.getElementById('galleryGrid');
  
  loading.classList.add('active');
  grid.innerHTML = '';
  
  try {
    const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
    const gid = '1246502038';
    
    let jsonData;
    try {
      // Try GVIZ API first
      const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
      const response = await fetch(gvizUrl);
      const text = await response.text();
      const jsonStr = text.substring(47).slice(0, -2);
      jsonData = JSON.parse(jsonStr);
    } catch (e) {
      console.log('GVIZ failed, trying CSV...', e);
      // Fallback to CSV
      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
      const csvResponse = await fetch(csvUrl);
      const csvText = await csvResponse.text();
      const rows = csvText.split('\n').map(row => {
        const match = row.match(/"([^"]*)"|"([^"]*)"|([^,]+)/g);
        return match ? match.map(cell => cell.replace(/^"|"$/g, '').trim()) : [];
      });
      
      allPhotos = [];
      rows.forEach((row, index) => {
        if (row.length < 2 || !row[0] || !row[1]) return;
        allPhotos.push({ judul: row[0], foto: row[1], index: index + 2 });
      });
      renderGallery(allPhotos);
      showToast(`⚡ Berhasil memuat ${allPhotos.length} foto`);
      return;
    }
    
    // Process GVIZ data
    const rows = jsonData.table.rows;
    allPhotos = [];
    rows.forEach((row, index) => {
      const c = row.c;
      if (!c || !c[0] || !c[1]) return;
      const judul = c[0].v || '';
      const foto = c[1].v || '';
      if (judul && foto) {
        allPhotos.push({ judul, foto, index: index + 2 });
      }
    });
    
    renderGallery(allPhotos);
    showToast(`⚡ Berhasil memuat ${allPhotos.length} foto`);
    
  } catch (error) {
    console.error('Error fetching photos:', error);
    showToast('❗ Gagal mengambil data dari Google Sheets');
    grid.innerHTML = `
      <div class="no-results">
        <i class="fas fa-exclamation-triangle"></i>
        <h3>Gagal Memuat Foto</h3>
        <p>Pastikan Google Sheets sudah dipublikasikan ke web</p>
      </div>
    `;
  } finally {
    loading.classList.remove('active');
  }
}

// Render gallery grid
function renderGallery(photos) {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';
  
  if (photos.length === 0) {
    grid.innerHTML = `
      <div class="no-results">
        <i class="fas fa-search"></i>
        <h3>Tidak Ada Foto</h3>
        <p>Tidak ada foto yang sesuai dengan pencarian</p>
      </div>
    `;
    return;
  }
  
  photos.forEach((photo, idx) => {
    const card = createPhotoCard(photo.foto, photo.judul, idx);
    grid.appendChild(card);
  });
}

// Create photo card with enhanced design
function createPhotoCard(url, title, index) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.setAttribute('role', 'listitem');
  card.innerHTML = `
    <div class="photo-wrapper">
      <img src="${url}" alt="${title}" onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00d4ff?text=No+Image'" loading="lazy" onclick="viewFullImage('${url}', '${title.replace(/'/g, "\\'")}')" style="cursor: pointer;" tabindex="0">
    </div>
    <div class="photo-info">
      <div class="photo-title">${title}</div>
      <div class="photo-meta">Foto #${index + 1}</div>
      <div class="action-buttons-row">
        <button class="action-btn-cool copy-btn" onclick="copyPhoto('${url}')" title="Copy Foto" aria-label="Salin foto">
          <i class="fas fa-copy"></i>
          <span>Copy</span>
        </button>
        <button class="action-btn-cool download-btn" onclick="downloadPhoto('${url}', '${title.replace(/'/g, "\\'")}')" title="Download" aria-label="Download foto">
          <i class="fas fa-download"></i>
          <span>Download</span>
        </button>
        <button class="action-btn-cool edit-btn" onclick="editImageFromUrl('${url}')" title="Edit" aria-label="Edit foto">
          <i class="fas fa-edit"></i>
          <span>Edit</span>
        </button>
      </div>
    </div>
  `;
  return card;
}

// Search functionality
function searchPhotos() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!searchTerm) {
    renderGallery(allPhotos);
    return;
  }
  const filtered = allPhotos.filter(photo =>
    photo.judul.toLowerCase().includes(searchTerm)
  );
  renderGallery(filtered);
  if (filtered.length > 0) {
    showToast(`⚡ Ditemukan ${filtered.length} foto`);
  }
}

// View full image in modal
function viewFullImage(url, title) {
  currentImageUrl = url;
  currentImageTitle = title;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalImage').src = url;
  document.getElementById('modalImage').alt = title;
  document.getElementById('imageModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

// Close modal
function closeModal() {
  document.getElementById('imageModal').classList.remove('active');
  document.body.style.overflow = '';
  currentImageUrl = '';
  currentImageTitle = '';
}

// Copy photo to clipboard
async function copyPhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([
      new ClipboardItem({ [blob.type]: blob })
    ]);
    showToast('✅ Foto berhasil disalin ke clipboard!');
  } catch (error) {
    console.error('Copy error:', error);
    showToast('❗ Buka foto lalu klik kanan > Copy Image');
  }
}

// Copy from modal
async function copyImage() {
  if (currentImageUrl) await copyPhoto(currentImageUrl);
}

// Download photo
function downloadPhoto(url, filename) {
  const link = document.createElement('a');
  link.href = url;
  link.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
  link.target = '_blank';
  link.rel = 'noopener';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('⚡ Download dimulai...');
}

// Download from modal
function downloadModalImage() {
  if (currentImageUrl && currentImageTitle) {
    downloadPhoto(currentImageUrl, currentImageTitle);
  }
}

// Canvas initialization
function initCanvas() {
  if (!canvas || !ctx) return;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = 'bold 22px Rajdhani';
  ctx.fillStyle = '#8ab4f8';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📁 Upload foto untuk mulai mengedit', canvas.width/2, canvas.height/2 - 15);
  ctx.font = '14px Rajdhani';
  ctx.fillStyle = '#54689a';
  ctx.fillText('Support: JPG, PNG, WEBP', canvas.width/2, canvas.height/2 + 20);
}

// Handle file upload
function handleFiles(event) {
  const files = event.target.files;
  if (files.length === 0) return;
  
  loadImage(files[0]);
  
  if (files.length > 1) {
    setTimeout(() => {
      if (confirm(`Load ${files.length} foto?\n\n✅ OK = Gabung semua\n❌ Cancel = Load satu per satu`)) {
        combineMultipleFiles(files);
      }
    }, 400);
  }
}

// Load single image to canvas
function loadImage(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      currentEditorImage = img;
      saveHistory();
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      showToast('✅ Foto berhasil dimuat');
    };
    img.onerror = () => showToast('❗ Gagal memuat gambar');
    img.src = e.target.result;
  };
  reader.onerror = () => showToast('❗ Error membaca file');
  reader.readAsDataURL(file);
}

// Combine multiple files
function combineMultipleFiles(files) {
  const images = [];
  let loaded = 0;
  
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        images.push(img);
        loaded++;
        if (loaded === files.length) {
          combineImages(images);
        }
      };
      img.onerror = () => showToast(`❗ Gagal memuat: ${file.name}`);
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// Combine images horizontally
function combineImages(images) {
  const totalWidth = images.reduce((sum, img) => sum + img.width, 0);
  const maxHeight = Math.max(...images.map(img => img.height));
  
  canvas.width = totalWidth;
  canvas.height = maxHeight;
  
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  let x = 0;
  images.forEach(img => {
    ctx.drawImage(img, x, 0);
    x += img.width;
  });
  
  saveHistory();
  showToast(`✅ ${images.length} foto digabungkan`);
}

// Apply filters
function applyFilter(filterType) {
  if (!currentEditorImage) {
    showToast('⚠️ Upload foto terlebih dahulu');
    return;
  }
  
  saveHistory();
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  
  switch(filterType) {
    case 'grayscale':
      for (let i = 0; i < data.length; i += 4) {
        const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
        data[i] = data[i + 1] = data[i + 2] = avg;
      }
      break;
    case 'sepia':
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i + 1], b = data[i + 2];
        data[i] = Math.min(255, (r * .393) + (g * .769) + (b * .189));
        data[i + 1] = Math.min(255, (r * .349) + (g * .686) + (b * .168));
        data[i + 2] = Math.min(255, (r * .272) + (g * .534) + (b * .131));
      }
      break;
    case 'invert':
      for (let i = 0; i < data.length; i += 4) {
        data[i] = 255 - data[i];
        data[i + 1] = 255 - data[i + 1];
        data[i + 2] = 255 - data[i + 2];
      }
      break;
    case 'blur':
      ctx.filter = 'blur(4px)';
      ctx.drawImage(canvas, 0, 0);
      ctx.filter = 'none';
      break;
  }
  
  if (filterType !== 'blur') {
    ctx.putImageData(imageData, 0, 0);
  }
  showToast(`✅ Filter ${filterType} diterapkan`);
}

// Adjust image properties
function adjustImage() {
  if (!currentEditorImage) return;
  const brightness = document.getElementById('brightness').value;
  const contrast = document.getElementById('contrast').value;
  const saturation = document.getElementById('saturation').value;
  
  ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
  ctx.drawImage(currentEditorImage, 0, 0, canvas.width, canvas.height);
  ctx.filter = 'none';
}

// Rotate image
function rotateImage(degrees) {
  if (!currentEditorImage) return;
  saveHistory();
  
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');
  
  if (Math.abs(degrees) === 90) {
    tempCanvas.width = canvas.height;
    tempCanvas.height = canvas.width;
  } else {
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;
  }
  
  tempCtx.translate(tempCanvas.width / 2, tempCanvas.height / 2);
  tempCtx.rotate(degrees * Math.PI / 180);
  tempCtx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);
  
  canvas.width = tempCanvas.width;
  canvas.height = tempCanvas.height;
  ctx.drawImage(tempCanvas, 0, 0);
}

// Flip image
function flipImage(direction) {
  if (!currentEditorImage) return;
  saveHistory();
  
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');
  tempCanvas.width = canvas.width;
  tempCanvas.height = canvas.height;
  
  if (direction === 'h') {
    tempCtx.translate(canvas.width, 0);
    tempCtx.scale(-1, 1);
  } else {
    tempCtx.translate(0, canvas.height);
    tempCtx.scale(1, -1);
  }
  
  tempCtx.drawImage(canvas, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(tempCanvas, 0, 0);
}

// Resize canvas
function resizeCanvas() {
  const width = prompt('Lebar baru (px):', canvas.width);
  const height = prompt('Tinggi baru (px):', canvas.height);
  
  if (width && height && !isNaN(width) && !isNaN(height)) {
    saveHistory();
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;
    tempCtx.drawImage(canvas, 0, 0);
    
    canvas.width = parseInt(width);
    canvas.height = parseInt(height);
    
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(tempCanvas, 0, 0);
    showToast('✅ Canvas diubah');
  }
}

// Add text to canvas
function addText() {
  const text = document.getElementById('textInput').value;
  const color = document.getElementById('textColor').value;
  const size = document.getElementById('textSize').value;
  
  if (!text) {
    showToast('⚠️ Masukkan teks terlebih dahulu');
    return;
  }
  
  saveHistory();
  ctx.font = `bold ${size}px Orbitron`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 12;
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);
  ctx.shadowBlur = 0;
  showToast('✅ Teks ditambahkan');
}

// Drawing mode
function startDrawing() {
  isDrawing = !isDrawing;
  const canvasEl = document.getElementById('mainCanvas');
  
  if (isDrawing) {
    canvasEl.addEventListener('mousedown', startDraw);
    canvasEl.addEventListener('mousemove', draw);
    canvasEl.addEventListener('mouseup', stopDraw);
    canvasEl.addEventListener('mouseleave', stopDraw);
    showToast('✏️ Mode gambar aktif - Klik & drag untuk menggambar');
  } else {
    canvasEl.removeEventListener('mousedown', startDraw);
    canvasEl.removeEventListener('mousemove', draw);
    canvasEl.removeEventListener('mouseup', stopDraw);
    canvasEl.removeEventListener('mouseleave', stopDraw);
    showToast('Mode gambar nonaktif');
  }
}

function startDraw(e) {
  isDrawing = true;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  
  lastX = (e.clientX - rect.left) * scaleX;
  lastY = (e.clientY - rect.top) * scaleY;
  
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.strokeStyle = document.getElementById('textColor').value;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function draw(e) {
  if (!isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  
  ctx.lineTo(x, y);
  ctx.stroke();
  lastX = x;
  lastY = y;
}

function stopDraw() {
  if (isDrawing) {
    isDrawing = false;
    saveHistory();
  }
}

// Combine photos from gallery
function combinePhotos(direction) {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = 'image/*';
  input.onchange = (e) => {
    const files = e.target.files;
    if (files.length < 2) {
      showToast('⚠️ Pilih minimal 2 foto');
      return;
    }
    combineMultipleFiles(files);
  };
  input.click();
}

// Add frame
function addFrame() {
  saveHistory();
  const frameWidth = 25;
  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth = frameWidth;
  ctx.shadowColor = 'rgba(0, 212, 255, 0.7)';
  ctx.shadowBlur = 15;
  ctx.strokeRect(0, 0, canvas.width, canvas.height);
  ctx.shadowBlur = 0;
  showToast('✅ Frame ditambahkan');
}

// Add watermark
function addWatermark() {
  saveHistory();
  const text = 'LINE TOGEL';
  ctx.font = 'bold 32px Orbitron';
  ctx.fillStyle = 'rgba(0, 212, 255, 0.35)';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 8;
  ctx.fillText(text, canvas.width - 15, canvas.height - 15);
  ctx.shadowBlur = 0;
  showToast('✅ Watermark ditambahkan');
}

// Save history for undo
function saveHistory() {
  if (!canvas) return;
  history.push(canvas.toDataURL());
  if (history.length > 12) history.shift();
}

// Undo action
function undoAction() {
  if (history.length > 1) {
    history.pop();
    const previous = history[history.length - 1];
    const img = new Image();
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      showToast('↩️ Undo');
    };
    img.src = previous;
  } else {
    showToast('⚠️ Tidak ada aksi untuk di-undo');
  }
}

// Clear canvas
function clearCanvas() {
  if (confirm('Hapus semua perubahan?')) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    currentEditorImage = null;
    history = [];
    initCanvas();
    showToast('🗑️ Canvas dibersihkan');
  }
}

// Download edited image
function downloadImage() {
  const link = document.createElement('a');
  link.download = `edited-photo-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('⚡ Foto didownload');
}

// Edit image from gallery URL
function editImageFromUrl(url) {
  showSection('editor');
  document.querySelectorAll('.nav-tab')[1].classList.add('active');
  
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    currentEditorImage = img;
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    saveHistory();
    showToast('✅ Foto dimuat ke editor');
  };
  img.onerror = () => showToast('❗ Gagal memuat gambar');
  img.src = url;
}

// Toast notification
function showToast(message) {
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = message;
  toast.classList.add('show');
  
  // Auto hide after 3 seconds
  setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
</body>
</html>

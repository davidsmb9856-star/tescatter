<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f3ff">
<title>🔷 KENDALA ALL - NEON BLUE 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  /* ===== NEON BLUE PALETTE ===== */
  --neon-blue: #00f3ff;
  --neon-blue-dim: #00a8cc;
  --neon-blue-bright: #7df9ff;
  --neon-blue-deep: #004d66;
  --neon-blue-glow: rgba(0, 243, 255, 0.6);
  
  /* Backgrounds - Modern Gradient */
  --bg-primary: linear-gradient(135deg, #050a14 0%, #0a1628 50%, #081020 100%);
  --bg-card: linear-gradient(145deg, rgba(15, 28, 52, 0.85), rgba(10, 20, 40, 0.92));
  --bg-card-hover: linear-gradient(145deg, rgba(20, 38, 68, 0.95), rgba(15, 30, 60, 0.98));
  --bg-glass: rgba(12, 22, 45, 0.75);
  --bg-glass-strong: rgba(8, 16, 35, 0.92);
  
  /* Text */
  --text-primary: #f0fbff;
  --text-secondary: #9dd4eb;
  --text-tertiary: #6b9fc4;
  --text-dim: #4a7a99;
  
  /* Borders & Glow Effects */
  --border-glow: 0 0 0 1px rgba(0, 243, 255, 0.35), 0 0 20px rgba(0, 243, 255, 0.25);
  --border-glow-hover: 0 0 0 2px rgba(125, 249, 255, 0.6), 0 0 35px rgba(0, 243, 255, 0.45);
  --glow-soft: 0 0 15px rgba(0, 243, 255, 0.35);
  --glow-medium: 0 0 25px rgba(0, 243, 255, 0.55), 0 0 50px rgba(0, 243, 255, 0.25);
  --glow-intense: 0 0 20px #00f3ff, 0 0 45px #00f3ff, 0 0 80px rgba(125, 249, 255, 0.5);
  
  /* Transitions */
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-fast: 180ms var(--ease-smooth);
  --transition-normal: 320ms var(--ease-smooth);
  --transition-slow: 500ms var(--ease-bounce);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Exo 2', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.65;
}

/* ========== BACKGROUND EFFECTS - MODERN NEON ========== */
.cyber-bg {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 15% 85%, rgba(0, 243, 255, 0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, rgba(125, 249, 255, 0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(0, 168, 204, 0.04) 0%, transparent 70%),
    linear-gradient(180deg, #050a14 0%, #0a1628 45%, #081020 100%);
  z-index: -3;
  animation: bgPulse 20s ease-in-out infinite;
}

@keyframes bgPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.92; }
}

.grid-overlay {
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  z-index: -2;
  animation: gridMove 60s linear infinite;
  pointer-events: none;
  opacity: 0.7;
}

@keyframes gridMove {
  0% { transform: perspective(600px) rotateX(55deg) translateY(0) translateZ(0); }
  100% { transform: perspective(600px) rotateX(55deg) translateY(50px) translateZ(0); }
}

.particles {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 2-4px;
  height: 2-4px;
  background: var(--neon-blue);
  border-radius: 50%;
  animation: particleFloat linear infinite;
  opacity: 0.6;
  box-shadow: 0 0 8px var(--neon-blue), 0 0 18px var(--neon-blue-glow);
}

@keyframes particleFloat {
  0% { transform: translateY(100vh) translateX(0) scale(0.8); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-20vh) translateX(30px) scale(1); opacity: 0; }
}

.lightning-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.25;
  overflow: hidden;
}

.lightning-bolt {
  position: absolute;
  width: 1.5px;
  height: 120vh;
  background: linear-gradient(180deg, 
    transparent 0%, 
    var(--neon-blue-bright) 25%, 
    var(--neon-blue) 50%, 
    var(--neon-blue-dim) 75%, 
    transparent 100%);
  filter: blur(0.5px);
  animation: lightningStrike 12s infinite;
  box-shadow: 0 0 20px var(--neon-blue), 0 0 45px var(--neon-blue-glow);
  transform-origin: top;
}

.lightning-bolt:nth-child(1) { left: 18%; animation-delay: 0s; animation-duration: 14s; }
.lightning-bolt:nth-child(2) { left: 52%; animation-delay: 4s; animation-duration: 11s; }
.lightning-bolt:nth-child(3) { left: 82%; animation-delay: 8s; animation-duration: 13s; }

@keyframes lightningStrike {
  0%, 85%, 88%, 91%, 100% { opacity: 0; transform: scaleY(0.7) scaleX(0.9); }
  86%, 90% { opacity: 0.7; transform: scaleY(1) scaleX(1); }
  87%, 89% { opacity: 1; transform: scaleY(1.05) scaleX(1.02); }
}

.scan-line {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, 
    transparent, 
    var(--neon-blue-bright), 
    var(--neon-blue), 
    var(--neon-blue-bright), 
    transparent);
  opacity: 0.4;
  animation: scanVertical 14s linear infinite;
  z-index: 1;
  pointer-events: none;
  box-shadow: 0 0 25px var(--neon-blue), 0 0 50px var(--neon-blue-glow);
}

@keyframes scanVertical {
  0% { top: -5%; opacity: 0; }
  8% { opacity: 0.4; }
  92% { opacity: 0.4; }
  100% { top: 105%; opacity: 0; }
}

.noise-overlay {
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  z-index: -1;
  pointer-events: none;
  mix-blend-mode: overlay;
}

/* ========== CONTAINER & LAYOUT ========== */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 2;
}

/* ========== HEADER - MODERN NEON ========== */
.header {
  text-align: center;
  margin-bottom: 32px;
  padding: 28px 20px 35px;
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 70%;
  max-width: 600px;
  height: 2px;
  background: linear-gradient(90deg, 
    transparent, 
    var(--neon-blue-dim), 
    var(--neon-blue), 
    var(--neon-blue-bright), 
    var(--neon-blue), 
    var(--neon-blue-dim), 
    transparent);
  animation: headerGlow 4s ease-in-out infinite;
  box-shadow: 0 0 20px var(--neon-blue-glow);
}

@keyframes headerGlow {
  0%, 100% { opacity: 0.7; filter: blur(0.5px); }
  50% { opacity: 1; filter: blur(1px); box-shadow: 0 0 35px var(--neon-blue), 0 0 60px var(--neon-blue-glow); }
}

.back-btn {
  position: absolute;
  left: 8px; top: 50%;
  transform: translateY(-50%);
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.12), rgba(0, 168, 204, 0.08));
  border: 1.5px solid rgba(0, 243, 255, 0.45);
  color: var(--neon-blue);
  padding: 10px 18px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: var(--transition-normal);
  backdrop-filter: blur(12px);
  box-shadow: var(--glow-soft);
  z-index: 10;
}

.back-btn:hover {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.22), rgba(0, 168, 204, 0.15));
  transform: translateY(-50%) translateX(-4px);
  box-shadow: var(--glow-medium);
  border-color: var(--neon-blue-bright);
}

.title {
  font-family: 'Orbitron', sans-serif;
  font-size: 38px;
  font-weight: 900;
  background: linear-gradient(90deg, 
    var(--neon-blue), 
    var(--neon-blue-bright), 
    var(--neon-blue), 
    var(--neon-blue-dim), 
    var(--neon-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 400% 100%;
  animation: titleFlow 6s ease infinite, titleShine 3s ease-in-out infinite alternate;
  text-shadow: 0 0 30px rgba(0, 243, 255, 0.6), 0 0 60px rgba(0, 243, 255, 0.35);
  margin-bottom: 12px;
  letter-spacing: 3px;
  position: relative;
}

@keyframes titleFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

@keyframes titleShine {
  0% { filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.5)); }
  100% { filter: drop-shadow(0 0 45px rgba(125, 249, 255, 0.85)); }
}

.subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  text-shadow: 0 0 12px rgba(0, 243, 255, 0.6);
  letter-spacing: 4px;
  opacity: 0.95;
  text-transform: uppercase;
  font-weight: 300;
  margin-bottom: 18px;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.08), rgba(0, 168, 204, 0.05));
  border: 1.5px solid rgba(0, 243, 255, 0.4);
  padding: 8px 20px;
  border-radius: 28px;
  font-size: 11px;
  color: var(--neon-blue);
  margin-top: 8px;
  box-shadow: 0 0 22px rgba(0, 243, 255, 0.3), inset 0 0 15px rgba(0, 243, 255, 0.1);
  animation: badgePulse 3.5s infinite;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
}

@keyframes badgePulse {
  0%, 100% { 
    box-shadow: 0 0 18px rgba(0, 243, 255, 0.25), inset 0 0 12px rgba(0, 243, 255, 0.08);
  }
  50% { 
    box-shadow: 0 0 35px rgba(0, 243, 255, 0.55), inset 0 0 22px rgba(0, 243, 255, 0.18);
  }
}

.status-dot {
  width: 10px; height: 10px;
  background: var(--neon-blue);
  border-radius: 50%;
  animation: dotPulse 2.4s infinite;
  box-shadow: 0 0 14px var(--neon-blue), 0 0 30px var(--neon-blue-glow);
  position: relative;
}

.status-dot::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--neon-blue-bright);
  animation: ringPulse 2.4s infinite;
}

@keyframes dotPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: 0.8; }
}

@keyframes ringPulse {
  0% { transform: scale(0.8); opacity: 0.6; }
  50% { transform: scale(1.3); opacity: 0; }
  100% { transform: scale(0.8); opacity: 0.6; }
}

/* ========== SEARCH SECTION - MODERN ========== */
.search-section {
  margin: 28px 0 32px;
  text-align: center;
}

.search-bar {
  position: relative;
  max-width: 580px;
  margin: 0 auto 20px;
}

.search-bar input {
  width: 100%;
  padding: 15px 22px 15px 52px;
  background: var(--bg-glass);
  border: 1.5px solid rgba(0, 243, 255, 0.38);
  border-radius: 16px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: 'Exo 2', sans-serif;
  font-weight: 500;
  transition: var(--transition-normal);
  backdrop-filter: blur(16px);
  box-shadow: var(--border-glow);
}

.search-bar input::placeholder {
  color: rgba(0, 243, 255, 0.45);
  font-weight: 400;
}

.search-bar input:focus {
  outline: none;
  border-color: var(--neon-blue-bright);
  box-shadow: var(--border-glow-hover), var(--glow-medium);
  background: var(--bg-glass-strong);
}

.search-bar i {
  position: absolute;
  left: 19px; top: 50%;
  transform: translateY(-50%);
  color: var(--neon-blue);
  font-size: 18px;
  text-shadow: 0 0 14px rgba(0, 243, 255, 0.7);
  animation: searchGlow 2.8s infinite;
  z-index: 2;
}

@keyframes searchGlow {
  0%, 100% { opacity: 0.7; text-shadow: 0 0 12px rgba(0, 243, 255, 0.6); }
  50% { opacity: 1; text-shadow: 0 0 24px rgba(0, 243, 255, 0.95), 0 0 45px rgba(125, 249, 255, 0.7); }
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 18px;
  flex-wrap: wrap;
  padding: 14px 20px;
  background: var(--bg-glass);
  border-radius: 16px;
  border: 1.5px solid rgba(0, 243, 255, 0.3);
  max-width: 780px;
  margin: 0 auto;
  box-shadow: var(--border-glow), 0 4px 30px rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(12px);
}

.stat-item {
  text-align: center;
  padding: 8px 22px;
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.06), rgba(0, 168, 204, 0.03));
  border-radius: 12px;
  border: 1px solid rgba(0, 243, 255, 0.22);
  transition: var(--transition-fast);
}

.stat-item:hover {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.12), rgba(0, 168, 204, 0.08));
  border-color: var(--neon-blue-bright);
  transform: translateY(-2px);
}

.stat-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--neon-blue-bright);
  text-shadow: 0 0 14px rgba(125, 249, 255, 0.75), 0 0 30px rgba(0, 243, 255, 0.4);
  display: block;
  animation: statPulse 3.8s infinite;
}

@keyframes statPulse {
  0%, 100% { text-shadow: 0 0 14px rgba(125, 249, 255, 0.7); }
  50% { text-shadow: 0 0 26px rgba(125, 249, 255, 0.95), 0 0 50px rgba(0, 243, 255, 0.65); }
}

.stat-label {
  font-size: 10px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1.8px;
  opacity: 0.9;
  margin-top: 4px;
  font-weight: 600;
}

/* ========== KENDALA CARDS - MODERN GLASSMORPHISM ========== */
.kendala-list {
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.kendala-card {
  background: var(--bg-card);
  border: 1.5px solid rgba(0, 243, 255, 0.35);
  border-radius: 20px;
  padding: 24px 28px;
  transition: var(--transition-normal);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(20px);
  animation: cardSlideIn 0.5s ease forwards;
  opacity: 0;
  transform: translateY(28px);
  box-shadow: var(--border-glow), 0 8px 40px rgba(0, 0, 0, 0.35);
}

.kendala-card:nth-child(1) { animation-delay: 0.1s; }
.kendala-card:nth-child(2) { animation-delay: 0.18s; }
.kendala-card:nth-child(3) { animation-delay: 0.26s; }
.kendala-card:nth-child(4) { animation-delay: 0.34s; }
.kendala-card:nth-child(5) { animation-delay: 0.42s; }
.kendala-card:nth-child(n+6) { animation-delay: 0.5s; }

@keyframes cardSlideIn {
  to { opacity: 1; transform: translateY(0); }
}

.kendala-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--neon-blue-deep), var(--neon-blue), var(--neon-blue-bright), var(--neon-blue), var(--neon-blue-deep));
  background-size: 300% 100%;
  animation: borderFlow 4s linear infinite;
  opacity: 0.8;
}

@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

.kendala-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(125deg, 
    transparent 0%, 
    rgba(0, 243, 255, 0.03) 25%, 
    transparent 50%,
    rgba(125, 249, 255, 0.02) 75%,
    transparent 100%);
  pointer-events: none;
  opacity: 0;
  transition: var(--transition-normal);
}

.kendala-card:hover {
  background: var(--bg-card-hover);
  transform: translateY(-6px) scale(1.008);
  border-color: var(--neon-blue-bright);
  box-shadow: var(--border-glow-hover), var(--glow-intense), 0 12px 55px rgba(0, 0, 0, 0.45);
}

.kendala-card:hover::after {
  opacity: 1;
}

.kendala-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--neon-blue-bright);
  margin-bottom: 16px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-shadow: 0 0 14px rgba(125, 249, 255, 0.65), 0 0 28px rgba(0, 243, 255, 0.4);
  padding-bottom: 14px;
  border-bottom: 1.5px solid rgba(0, 243, 255, 0.25);
  transition: var(--transition-fast);
  position: relative;
  z-index: 1;
}

.kendala-title:hover {
  color: var(--neon-blue);
  text-shadow: 0 0 20px rgba(125, 249, 255, 0.9), 0 0 40px rgba(0, 243, 255, 0.65);
}

.kendala-title::after {
  content: '▾';
  font-size: 13px;
  transition: transform 0.3s var(--ease-bounce);
  color: var(--neon-blue);
  text-shadow: 0 0 10px rgba(0, 243, 255, 0.7);
  font-weight: 300;
}

.kendala-card.expanded .kendala-title::after {
  transform: rotate(180deg);
}

/* ========== PHOTO & ANSWER SECTIONS - MODERN ========== */
.title-photo-section {
  display: none;
  margin: 16px 0;
  padding: 16px;
  background: linear-gradient(135deg, rgba(12, 24, 48, 0.75), rgba(8, 18, 40, 0.85));
  border-radius: 16px;
  border: 1.5px solid rgba(0, 243, 255, 0.35);
  text-align: center;
  animation: photoFadeIn 0.4s ease;
  box-shadow: var(--border-glow), 0 4px 25px rgba(0, 0, 0, 0.25);
  backdrop-filter: blur(10px);
}

@keyframes photoFadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.kendala-card.expanded .title-photo-section {
  display: block;
}

.title-photo-container {
  position: relative;
  display: inline-block;
  margin-bottom: 14px;
}

.title-photo-img {
  max-width: 100%;
  max-height: 320px;
  border-radius: 14px;
  border: 3px solid var(--neon-blue);
  cursor: pointer;
  transition: var(--transition-normal);
  box-shadow: 0 0 28px rgba(0, 243, 255, 0.5), 0 0 55px rgba(125, 249, 255, 0.25);
  object-fit: contain;
  background: rgba(0, 0, 0, 0.2);
}

.title-photo-img:hover {
  transform: scale(1.025);
  box-shadow: 0 0 42px rgba(0, 243, 255, 0.75), 0 0 80px rgba(125, 249, 255, 0.4);
  border-color: var(--neon-blue-bright);
}

.title-photo-badge {
  position: absolute;
  top: 12px; left: 12px;
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.95), rgba(0, 168, 204, 0.9));
  color: #051018;
  padding: 6px 14px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 0 16px rgba(0, 243, 255, 0.7);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.title-photo-actions {
  margin-top: 14px;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.copy-title-photo-btn, .view-title-photo-btn {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.15), rgba(0, 168, 204, 0.1));
  border: 1.5px solid var(--neon-blue);
  color: var(--neon-blue);
  padding: 10px 20px;
  border-radius: 13px;
  cursor: pointer;
  transition: var(--transition-normal);
  font-weight: 600;
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--glow-soft);
  backdrop-filter: blur(8px);
}

.copy-title-photo-btn:hover, .view-title-photo-btn:hover {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.28), rgba(0, 168, 204, 0.2));
  transform: translateY(-3px);
  box-shadow: var(--glow-medium);
  border-color: var(--neon-blue-bright);
}

.kendala-answers {
  display: none;
  margin-top: 18px;
  padding-top: 18px;
  border-top: 1.5px solid rgba(0, 243, 255, 0.25);
  animation: slideDown 0.32s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}

.kendala-card.expanded .kendala-answers {
  display: block;
}

.answer-item {
  margin-bottom: 16px;
  padding: 16px 18px;
  background: linear-gradient(135deg, rgba(12, 24, 48, 0.65), rgba(8, 18, 40, 0.75));
  border-radius: 14px;
  border-left: 4px solid var(--neon-blue);
  transition: var(--transition-fast);
  position: relative;
  box-shadow: 0 0 22px rgba(0, 243, 255, 0.1);
  backdrop-filter: blur(8px);
}

.answer-item:hover {
  background: linear-gradient(135deg, rgba(15, 30, 58, 0.75), rgba(10, 22, 48, 0.85));
  border-left-color: var(--neon-blue-bright);
  transform: translateX(4px);
  box-shadow: 0 0 32px rgba(0, 243, 255, 0.22), 0 4px 20px rgba(0, 0, 0, 0.2);
}

.answer-label {
  font-weight: 700;
  color: var(--neon-blue-bright);
  margin-bottom: 10px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.6px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-shadow: 0 0 10px rgba(125, 249, 255, 0.5);
}

.answer-label i {
  font-size: 14px;
  text-shadow: 0 0 10px rgba(0, 243, 255, 0.75);
}

.answer-content {
  color: var(--text-secondary);
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 14px;
}

.answer-content a {
  color: var(--neon-blue);
  text-decoration: none;
  font-weight: 600;
  transition: var(--transition-fast);
  position: relative;
  text-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
}

.answer-content a::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 0;
  width: 0; height: 2px;
  background: var(--neon-blue-bright);
  transition: var(--transition-fast);
  box-shadow: 0 0 10px var(--neon-blue);
  border-radius: 2px;
}

.answer-content a:hover::after {
  width: 100%;
}

.answer-content a:hover {
  color: var(--neon-blue-bright);
  text-shadow: 0 0 16px rgba(0, 243, 255, 0.85);
}

.photo-container {
  margin: 16px 0;
  text-align: center;
  padding: 14px;
  background: linear-gradient(135deg, rgba(10, 22, 45, 0.55), rgba(8, 18, 40, 0.65));
  border-radius: 14px;
  border: 1.5px dashed rgba(0, 243, 255, 0.4);
  transition: var(--transition-fast);
}

.photo-container:hover {
  border-style: solid;
  border-color: var(--neon-blue-bright);
  background: linear-gradient(135deg, rgba(12, 26, 52, 0.65), rgba(10, 22, 48, 0.75));
}

.photo-img {
  max-width: 100%;
  max-height: 300px;
  border-radius: 13px;
  border: 3px solid var(--neon-blue);
  cursor: pointer;
  transition: var(--transition-normal);
  box-shadow: 0 0 26px rgba(0, 243, 255, 0.45);
  object-fit: contain;
  background: rgba(0, 0, 0, 0.15);
}

.photo-img:hover {
  transform: scale(1.028);
  box-shadow: 0 0 45px rgba(0, 243, 255, 0.7), 0 0 75px rgba(125, 249, 255, 0.35);
  border-color: var(--neon-blue-bright);
}

.copy-photo-btn {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.15), rgba(0, 168, 204, 0.1));
  border: 1.5px solid var(--neon-blue);
  color: var(--neon-blue);
  padding: 10px 20px;
  border-radius: 13px;
  cursor: pointer;
  margin-top: 13px;
  transition: var(--transition-normal);
  font-weight: 600;
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--glow-soft);
  backdrop-filter: blur(8px);
}

.copy-photo-btn:hover {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.28), rgba(0, 168, 204, 0.2));
  transform: translateY(-3px);
  box-shadow: var(--glow-medium);
  border-color: var(--neon-blue-bright);
}

.link-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 14px;
}

.open-link-btn {
  background: linear-gradient(135deg, rgba(0, 180, 220, 0.15), rgba(0, 140, 180, 0.1));
  border: 1.5px solid #00b4dc;
  color: #00e0ff;
  padding: 8px 16px;
  border-radius: 11px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  transition: var(--transition-normal);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  box-shadow: 0 0 12px rgba(0, 180, 220, 0.35);
  backdrop-filter: blur(6px);
}

.open-link-btn:hover {
  background: linear-gradient(135deg, rgba(0, 180, 220, 0.28), rgba(0, 140, 180, 0.2));
  transform: translateY(-3px);
  box-shadow: 0 0 22px rgba(0, 180, 220, 0.6), 0 4px 18px rgba(0, 0, 0, 0.25);
  border-color: #00d4ff;
}

.open-link-btn i {
  font-size: 10px;
}

.copy-btn, .sticky-btn {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.15), rgba(0, 168, 204, 0.1));
  border: 1.5px solid var(--neon-blue);
  color: var(--neon-blue);
  padding: 9px 18px;
  border-radius: 12px;
  cursor: pointer;
  margin-top: 13px;
  margin-right: 8px;
  transition: var(--transition-normal);
  font-weight: 600;
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: var(--glow-soft);
  backdrop-filter: blur(8px);
}

.copy-btn:hover, .sticky-btn:hover {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.28), rgba(0, 168, 204, 0.2));
  transform: translateY(-3px);
  box-shadow: var(--glow-medium);
  border-color: var(--neon-blue-bright);
}

.copy-btn.copied, .sticky-btn.added {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.32), rgba(125, 249, 255, 0.25));
  border-color: var(--neon-blue-bright);
  color: #e0f7ff;
  animation: copiedBounce 0.45s var(--ease-bounce);
  box-shadow: 0 0 22px rgba(125, 249, 255, 0.55), 0 4px 20px rgba(0, 243, 255, 0.3);
}

@keyframes copiedBounce {
  0% { transform: scale(1); }
  40% { transform: scale(1.12); }
  70% { transform: scale(0.98); }
  100% { transform: scale(1); }
}

/* ========== STICKY NOTES - MODERN FLOATING PANEL ========== */
.sticky-fab {
  position: fixed;
  bottom: 32px;
  right: 32px;
  width: 62px;
  height: 62px;
  background: radial-gradient(circle at 40% 40%, var(--neon-blue-bright), var(--neon-blue), var(--neon-blue-dim));
  border: 3px solid rgba(224, 247, 255, 0.5);
  border-radius: 50%;
  color: #e0f7ff;
  font-size: 24px;
  cursor: pointer;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 35px rgba(0, 243, 255, 0.75), 0 0 70px rgba(0, 243, 255, 0.45), 0 8px 30px rgba(0, 0, 0, 0.3);
  transition: var(--transition-slow);
  animation: fabFloat 3.2s ease-in-out infinite alternate;
}

.sticky-fab:hover {
  transform: scale(1.15) rotate(15deg);
  box-shadow: 0 0 55px rgba(0, 243, 255, 0.95), 0 0 100px rgba(125, 249, 255, 0.65), 0 12px 40px rgba(0, 0, 0, 0.4);
}

@keyframes fabFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-8px) scale(1.03); }
}

.sticky-panel {
  position: fixed;
  bottom: 105px;
  right: 32px;
  width: 400px;
  max-width: 94vw;
  height: 72vh;
  max-height: 620px;
  background: linear-gradient(160deg, rgba(12, 22, 45, 0.96), rgba(8, 16, 35, 0.98));
  border: 2px solid var(--neon-blue);
  border-radius: 22px;
  padding: 0;
  z-index: 999;
  display: none;
  flex-direction: column;
  backdrop-filter: blur(28px);
  box-shadow: 0 0 55px rgba(0, 243, 255, 0.45), inset 0 0 35px rgba(0, 243, 255, 0.08), 0 20px 60px rgba(0, 0, 0, 0.4);
  animation: panelSlideIn 0.42s var(--ease-bounce);
}

.sticky-panel.active {
  display: flex;
}

@keyframes panelSlideIn {
  from { opacity: 0; transform: translateY(35px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.sticky-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  border-bottom: 1.5px solid rgba(0, 243, 255, 0.25);
  flex-shrink: 0;
  background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.04), transparent);
}

.sticky-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  color: var(--neon-blue-bright);
  text-shadow: 0 0 15px rgba(125, 249, 255, 0.75);
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sticky-title i {
  animation: titleIcon 2.5s ease-in-out infinite;
}

@keyframes titleIcon {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-10deg); }
  75% { transform: rotate(10deg); }
}

.sticky-close {
  background: none;
  border: none;
  color: var(--neon-blue-dim);
  font-size: 28px;
  cursor: pointer;
  transition: var(--transition-fast);
  text-shadow: 0 0 12px rgba(0, 168, 204, 0.85);
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.sticky-close:hover {
  transform: rotate(90deg) scale(1.2);
  color: var(--neon-blue);
  background: rgba(0, 243, 255, 0.12);
  text-shadow: 0 0 25px rgba(0, 243, 255, 0.95);
}

.sticky-input-area {
  padding: 20px 24px;
  border-bottom: 1px solid rgba(0, 243, 255, 0.15);
  flex-shrink: 0;
}

.sticky-input {
  width: 100%;
  min-height: 65px;
  background: rgba(0, 243, 255, 0.04);
  border: 1.5px solid rgba(0, 243, 255, 0.35);
  border-radius: 14px;
  padding: 14px 16px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: 'Exo 2', monospace;
  resize: vertical;
  transition: var(--transition-fast);
  backdrop-filter: blur(8px);
}

.sticky-input:focus {
  outline: none;
  border-color: var(--neon-blue-bright);
  box-shadow: 0 0 16px rgba(0, 243, 255, 0.28);
  background: rgba(0, 243, 255, 0.07);
}

.sticky-input::placeholder {
  color: rgba(0, 243, 255, 0.48);
  font-weight: 400;
}

.sticky-photo-preview {
  margin-top: 14px;
  padding: 14px;
  background: rgba(0, 243, 255, 0.06);
  border: 2px dashed var(--neon-blue);
  border-radius: 13px;
  display: none;
  position: relative;
}

.sticky-photo-preview.show {
  display: block;
  animation: photoFadeIn 0.32s ease;
}

.sticky-photo-preview img {
  max-width: 100%;
  max-height: 160px;
  border-radius: 11px;
  border: 2.5px solid var(--neon-blue);
  display: block;
  box-shadow: 0 0 22px rgba(0, 243, 255, 0.45);
  object-fit: contain;
}

.sticky-photo-preview-text {
  font-size: 11px;
  color: var(--neon-blue);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
}

.sticky-remove-photo {
  position: absolute;
  top: 10px; right: 10px;
  background: linear-gradient(135deg, rgba(0, 168, 204, 0.9), rgba(0, 120, 160, 0.9));
  color: #e0f7ff;
  border: none;
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition-fast);
  box-shadow: 0 0 12px rgba(0, 168, 204, 0.65);
}

.sticky-remove-photo:hover {
  background: var(--neon-blue-dim);
  transform: scale(1.15) rotate(90deg);
  box-shadow: 0 0 22px rgba(0, 168, 204, 0.9);
}

.sticky-btn-group {
  display: flex;
  gap: 10px;
  margin-top: 13px;
  flex-wrap: wrap;
}

.sticky-add-btn {
  background: linear-gradient(140deg, rgba(0, 243, 255, 0.25), rgba(0, 168, 204, 0.22));
  color: var(--neon-blue);
  border: 2px solid var(--neon-blue);
  padding: 12px 24px;
  border-radius: 14px;
  cursor: pointer;
  font-weight: 700;
  font-size: 13px;
  transition: var(--transition-normal);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--glow-soft);
  backdrop-filter: blur(10px);
}

.sticky-add-btn:hover {
  background: linear-gradient(140deg, rgba(0, 243, 255, 0.35), rgba(0, 168, 204, 0.3));
  transform: translateY(-3px);
  box-shadow: var(--glow-medium);
  border-color: var(--neon-blue-bright);
}

.sticky-upload-btn {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.15), rgba(0, 168, 204, 0.1));
  border: 1.5px solid var(--neon-blue);
  color: var(--neon-blue);
  padding: 12px 20px;
  border-radius: 13px;
  cursor: pointer;
  font-weight: 600;
  font-size: 12px;
  transition: var(--transition-normal);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: var(--glow-soft);
  backdrop-filter: blur(8px);
}

.sticky-upload-btn:hover {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.28), rgba(0, 168, 204, 0.2));
  transform: translateY(-3px);
  box-shadow: var(--glow-medium);
  border-color: var(--neon-blue-bright);
}

#fileInput { display: none; }

/* === SCROLLABLE LIST CONTAINER === */
.sticky-list {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  padding-top: 10px;
  scrollbar-width: thin;
  scrollbar-color: var(--neon-blue) rgba(12, 22, 45, 0.5);
}

.sticky-list::-webkit-scrollbar { width: 6px; }
.sticky-list::-webkit-scrollbar-track { background: rgba(12, 22, 45, 0.5); border-radius: 3px; }
.sticky-list::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-blue), var(--neon-blue-bright), var(--neon-blue-dim));
  border-radius: 3px;
  box-shadow: 0 0 10px rgba(0, 243, 255, 0.45);
}

/* === DYNAMIC STICKY CARDS === */
.sticky-card {
  background: linear-gradient(135deg, rgba(15, 28, 52, 0.75), rgba(10, 20, 40, 0.85));
  border: 1.5px solid rgba(0, 243, 255, 0.35);
  border-radius: 14px;
  padding: 15px;
  margin-bottom: 13px;
  cursor: grab;
  transition: var(--transition-fast);
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 16px rgba(0, 243, 255, 0.08);
  backdrop-filter: blur(6px);
}

.sticky-card:active { cursor: grabbing; }
.sticky-card:hover {
  border-color: var(--neon-blue-bright);
  box-shadow: 0 0 28px rgba(0, 243, 255, 0.32), 0 4px 22px rgba(0, 0, 0, 0.25);
  transform: translateX(4px);
  background: linear-gradient(135deg, rgba(18, 34, 62, 0.82), rgba(12, 24, 48, 0.92));
}

.sticky-card.dragging {
  opacity: 0.65;
  border-style: dashed;
  transform: scale(1.03);
  box-shadow: 0 0 35px rgba(0, 243, 255, 0.5);
}

.sticky-card p {
  color: #d8f0ff;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  margin-bottom: 8px;
  padding: 8px;
  background: rgba(0, 243, 255, 0.04);
  border-radius: 7px;
  border: 1px solid rgba(0, 243, 255, 0.08);
  transition: var(--transition-fast);
}

.sticky-card:hover p {
  background: rgba(0, 243, 255, 0.07);
  border-color: rgba(0, 243, 255, 0.15);
}

.sticky-card img {
  max-width: 100%;
  max-height: 150px;
  border-radius: 10px;
  border: 2.5px solid var(--neon-blue);
  margin-top: 8px;
  cursor: pointer;
  transition: var(--transition-fast);
  box-shadow: 0 0 16px rgba(0, 243, 255, 0.38);
  display: block;
  object-fit: contain;
}

.sticky-card img:hover {
  transform: scale(1.022);
  box-shadow: 0 0 28px rgba(0, 243, 255, 0.65), 0 0 50px rgba(125, 249, 255, 0.35);
  border-color: var(--neon-blue-bright);
}

.sticky-delete, .sticky-edit {
  position: absolute;
  top: 9px;
  background: rgba(12, 22, 45, 0.92);
  border: 1.5px solid rgba(0, 243, 255, 0.45);
  border-radius: 50%;
  width: 26px; height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition-fast);
  z-index: 10;
  color: var(--neon-blue-dim);
}

.sticky-delete { right: 9px; }
.sticky-edit { right: 40px; }

.sticky-delete:hover {
  background: var(--neon-blue-dim);
  color: #e0f7ff;
  box-shadow: 0 0 16px var(--neon-blue-dim);
  border-color: var(--neon-blue-dim);
}

.sticky-edit:hover {
  background: var(--neon-blue);
  color: #0a0e17;
  box-shadow: 0 0 16px var(--neon-blue);
  border-color: var(--neon-blue);
}

/* ========== LIGHTBOX - MODERN OVERLAY ========== */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(6, 10, 20, 0.96);
  z-index: 9999;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 24px;
  backdrop-filter: blur(24px);
  animation: fadeIn 0.32s ease;
}

.lightbox.active { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.lightbox::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 243, 255, 0.03) 40%, rgba(8, 16, 35, 0.95) 100%);
  pointer-events: none;
}

.lightbox-close {
  position: absolute;
  top: 28px; right: 32px;
  font-size: 38px;
  color: var(--neon-blue);
  cursor: pointer;
  transition: var(--transition-normal);
  text-shadow: 0 0 16px rgba(0, 243, 255, 0.85);
  z-index: 10000;
  width: 48px; height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.lightbox-close:hover {
  color: var(--neon-blue-bright);
  transform: rotate(90deg) scale(1.22);
  background: rgba(0, 243, 255, 0.12);
  text-shadow: 0 0 28px rgba(125, 249, 255, 0.95);
}

.lightbox-img {
  max-width: 94%;
  max-height: 74vh;
  border-radius: 18px;
  border: 4px solid var(--neon-blue);
  box-shadow: 0 0 55px rgba(0, 243, 255, 0.65), 0 0 110px rgba(125, 249, 255, 0.38), 0 20px 60px rgba(0, 0, 0, 0.5);
  transition: var(--transition-normal);
  cursor: grab;
  background: rgba(0, 0, 0, 0.2);
}

.lightbox-img:active { cursor: grabbing; }

.lightbox-controls {
  display: flex;
  gap: 15px;
  margin-top: 26px;
  flex-wrap: wrap;
  justify-content: center;
}

.lightbox-btn {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.18), rgba(0, 168, 204, 0.12));
  border: 2.5px solid var(--neon-blue);
  color: var(--neon-blue);
  padding: 12px 28px;
  border-radius: 16px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  transition: var(--transition-normal);
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--glow-soft);
  backdrop-filter: blur(12px);
}

.lightbox-btn:hover {
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.32), rgba(0, 168, 204, 0.22));
  transform: translateY(-3px);
  box-shadow: var(--glow-medium);
  border-color: var(--neon-blue-bright);
}

.zoom-slider {
  width: 240px;
  margin-top: 22px;
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-tertiary);
  font-size: 12px;
}

.zoom-slider input {
  flex: 1;
  accent-color: var(--neon-blue);
  height: 4px;
  background: rgba(0, 243, 255, 0.2);
  border-radius: 2px;
  cursor: pointer;
}

.zoom-slider input::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--neon-blue);
  cursor: pointer;
  box-shadow: 0 0 12px var(--neon-blue), 0 0 25px var(--neon-blue-glow);
  transition: var(--transition-fast);
}

.zoom-slider input::-webkit-slider-thumb:hover {
  transform: scale(1.2);
  box-shadow: 0 0 18px var(--neon-blue-bright), 0 0 35px var(--neon-blue-glow);
}

/* ========== TOAST - MODERN FLOATING ========== */
.toast {
  position: fixed;
  bottom: 36px;
  right: 36px;
  background: linear-gradient(135deg, rgba(12, 22, 45, 0.96), rgba(8, 16, 35, 0.98));
  border: 2.5px solid var(--neon-blue);
  color: var(--neon-blue);
  padding: 16px 30px;
  border-radius: 16px;
  font-weight: 600;
  font-size: 14px;
  z-index: 10000;
  display: flex;
  align-items: center;
  gap: 13px;
  box-shadow: 0 0 40px rgba(0, 243, 255, 0.55), 0 0 80px rgba(0, 243, 255, 0.28), 0 10px 35px rgba(0, 0, 0, 0.4);
  transform: translateX(200px);
  opacity: 0;
  transition: var(--transition-normal);
  backdrop-filter: blur(16px);
}

.toast.show {
  transform: translateX(0);
  opacity: 1;
}

.toast i {
  font-size: 20px;
  text-shadow: 0 0 12px rgba(0, 243, 255, 0.85);
  animation: toastIcon 1.5s ease-in-out infinite;
}

@keyframes toastIcon {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* ========== LOADING & STATES ========== */
.loading, .no-data, .error-msg {
  text-align: center;
  padding: 65px 24px;
}

.loading { color: var(--neon-blue); }

.loading-spinner {
  width: 52px; height: 52px;
  border: 4px solid rgba(0, 243, 255, 0.15);
  border-top-color: var(--neon-blue-bright);

  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
  box-shadow: 0 0 28px rgba(0, 243, 255, 0.45);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.error-msg {
  color: var(--neon-blue-dim);
  background: linear-gradient(135deg, rgba(0, 168, 204, 0.08), rgba(0, 120, 160, 0.05));
  border-radius: 18px;
  border: 2px solid var(--neon-blue-dim);

  box-shadow: 0 0 35px rgba(0, 168, 204, 0.28), 0 8px 30px rgba(0, 0, 0, 0.25);
}

/* ========== SCROLLBAR & SELECTION ========== */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: rgba(12, 22, 45, 0.5); border-radius: 5px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-blue), var(--neon-blue-bright), var(--neon-blue-dim));
  border-radius: 5px;
  box-shadow: 0 0 16px rgba(0, 243, 255, 0.45);
}

::selection {

}

/* ========== RESPONSIVE DESIGN ========== */
@media (max-width: 768px) {
  .container { padding: 16px 14px; }
  .title { font-size: 30px; letter-spacing: 2px; }
  .subtitle { font-size: 12px; letter-spacing: 3px; }
  
  .sticky-panel {

}

<body>
<div class="cyber-bg"></div>
<div class="grid-overlay"></div>
<div class="lightning-container">
  <div class="lightning-bolt"></div>

  <div class="lightning-bolt"></div>
</div>
<div class="particles" id="particles"></div>
<div class="scan-line"></div>
<div class="noise-overlay"></div>

<div class="container">
  <header class="header">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Kembali
    </a>
    <h1 class="title">🔷 KENDALA ALL</h1>
    <p class="subtitle">Database Solusi & Bantuan Pengguna 2026</p>
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </header>

  <div class="search-section">
    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="🔷 Cari kendala..." oninput="searchKendala()">
    </div>
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="totalItems">0</span>

  </div>
  <div class="sticky-input-area">
    <textarea class="sticky-input" id="stickyInput" placeholder="✏️ Tulis catatan...
📸 Paste foto (Ctrl+V) atau Upload" oninput="autoResize(this)"></textarea>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
    <div class="sticky-photo-preview" id="stickyPhotoPreview">
      <div class="sticky-photo-preview-text">

      </div>

      <button class="sticky-remove-photo" onclick="removePhoto()">
        <i class="fas fa-times"></i>
      </button>

    <div class="sticky-btn-group">
      <button class="sticky-add-btn" id="stickyAddBtn" onclick="addSticky()">
        <i class="fas fa-plus"></i> <span>Tambah</span>
      </button>
      <button class="sticky-upload-btn" onclick="document.getElementById('fileInput').click()">
        <i class="fas fa-upload"></i> Upload

  </div>
  <div class="sticky-list" id="stickyList"></div>
</div>

<div id="toast" class="toast">
  <i class="fas fa-check-circle"></i>
  <span id="toastMessage">Notifikasi</span>
</div>

<script>
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

let allKendala = [];
let filteredKendala = [];
let lightboxImages = [];
let lightboxIndex = 0;
let zoomLevel = 1;
let editIndex = null;

// ================= MAIN DATA LOGIC =================
async function loadKendalaData() {
  try {
    const response = await fetch(DATA_URL);
    const text = await response.text();
    const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (!jsonMatch) throw new Error('Gagal parse');
    const data = JSON.parse(jsonMatch[1]);
    const rows = data.table?.rows || [];
    
    allKendala = rows.map(row => {
      const cells = row.c || [];
      return {
        judul: cells[0]?.v?.toString().trim() || '',
        jawaban1: cells[1]?.v?.toString().trim() || '',
        jawaban2: cells[2]?.v?.toString().trim() || '',
        jawaban3: cells[3]?.v?.toString().trim() || ''
      };
    }).filter(item => item.judul && item.judul !== '');
    
    filteredKendala = [...allKendala];
    renderKendala();
    updateStats();
  } catch (error) {
    document.getElementById('kendalaContainer').innerHTML = `
      <div class="error-msg">
        <i class="fas fa-exclamation-triangle" style="font-size: 36px; margin-bottom: 18px; text-shadow: 0 0 25px rgba(0,168,204,0.8);"></i>
        <p><strong>⚠️ Gagal memuat data</strong></p>
        <p style="font-size: 13px; margin-top: 12px; opacity: 0.9;">Pastikan Google Sheet sudah dipublikasikan</p>
        <p style="font-size: 12px; margin-top: 14px; opacity: 0.75;">${error.message}</p>
      </div>`;
  }
}

function renderKendala(data = filteredKendala) {
  const container = document.getElementById('kendalaContainer');
  if (data.length === 0) {
    container.innerHTML = '<div class="no-data"><p style="color: var(--text-secondary); font-size: 17px;">🔍 Tidak ada data ditemukan</p></div>';
    return;
  }
  container.innerHTML = `<div class="kendala-list">${data.map((item, index) => createKendalaCard(item, index)).join('')}</div>`;
  
  document.querySelectorAll('.kendala-title').forEach(title => {
    title.addEventListener('click', function() {
      this.parentElement.classList.toggle('expanded');
    });
  });
}

function createKendalaCard(item, index) {
  const titlePhoto = extractTitlePhoto(item.judul);
  const cleanJudul = titlePhoto ? item.judul.replace(titlePhoto.url, '').trim() : item.judul;
  const hasPhoto = detectPhotoLink(item);
  const links1 = extractLinks(item.jawaban1);
  const links2 = extractLinks(item.jawaban2);
  const links3 = extractLinks(item.jawaban3);
  
  return `
    <div class="kendala-card" data-index="${index}">
      <h3 class="kendala-title">${escapeHtml(cleanJudul)}</h3>
      ${titlePhoto ? createTitlePhotoSection(titlePhoto.url, index) : ''}
      <div class="kendala-answers">
        ${item.jawaban1 ? `
          <div class="answer-item">
            <div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 1</div>
            <div class="answer-content">${formatContent(item.jawaban1, links1)}</div>
            ${hasPhoto && !titlePhoto ? createPhotoSection(item) : ''}
            ${links1.length > 0 ? createLinkButtons(links1) : ''}
            <button class="copy-btn" onclick="copyAnswer(${index}, 1)"><i class="fas fa-copy"></i> Copy</button>
            <button class="sticky-btn" onclick="addToSticky(${index}, 1)"><i class="fas fa-sticky-note"></i> Sticky</button>
          </div>` : ''}
        ${item.jawaban2 ? `
          <div class="answer-item">
            <div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 2</div>
            <div class="answer-content">${formatContent(item.jawaban2, links2)}</div>
            ${links2.length > 0 ? createLinkButtons(links2) : ''}
            <button class="copy-btn" onclick="copyAnswer(${index}, 2)"><i class="fas fa-copy"></i> Copy</button>
            <button class="sticky-btn" onclick="addToSticky(${index}, 2)"><i class="fas fa-sticky-note"></i> Sticky</button>
          </div>` : ''}
        ${item.jawaban3 ? `
          <div class="answer-item">
            <div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 3</div>
            <div class="answer-content">${formatContent(item.jawaban3, links3)}</div>
            ${links3.length > 0 ? createLinkButtons(links3) : ''}
            <button class="copy-btn" onclick="copyAnswer(${index}, 3)"><i class="fas fa-copy"></i> Copy</button>
            <button class="sticky-btn" onclick="addToSticky(${index}, 3)"><i class="fas fa-sticky-note"></i> Sticky</button>
          </div>` : ''}
      </div>
    </div>`;
}

// ================= HELPER FUNCTIONS =================
function extractTitlePhoto(judul) {
  if (!judul) return null;
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = judul.match(photoPattern);
  if (match) return { url: match[1], fullMatch: match[0] };
  return null;
}

function createTitlePhotoSection(photoUrl, index) {
  if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
  return `
    <div class="title-photo-section">
      <div class="title-photo-container">
        <span class="title-photo-badge"><i class="fas fa-image"></i> FOTO</span>
        <img src="${photoUrl}" alt="Foto Kendala" class="title-photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.parentElement.style.display='none'">
      </div>
      <div class="title-photo-actions">
        <button class="copy-title-photo-btn" onclick="copyTitlePhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
        <button class="view-title-photo-btn" onclick="openLightbox('${photoUrl}')"><i class="fas fa-expand"></i> Lihat Penuh</button>
      </div>
    </div>`;
}

function detectPhotoLink(item) {
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  return photoPattern.test(item.jawaban1) || photoPattern.test(item.jawaban2) || photoPattern.test(item.jawaban3);
}

function extractLinks(text) {
  if (!text) return [];
  const urlPattern = /https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi;
  return text.match(urlPattern) || [];
}

function formatContent(text, links = []) {
  if (!text) return '';
  let formatted = escapeHtml(text);
  links.forEach(link => {
    const displayText = link.length > 45 ? link.substring(0, 42) + '...' : link;
    formatted = formatted.replace(new RegExp(escapeRegExp(link), 'g'), `<a href="${link}" target="_blank" rel="noopener">${displayText}</a>`);
  });
  return formatted;
}

function createPhotoSection(item) {
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = (item.jawaban1 + ' ' + item.jawaban2 + ' ' + item.jawaban3).match(photoPattern);
  if (!match) return '';
  const photoUrl = match[1];
  if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
  return `
    <div class="photo-container">
      <img src="${photoUrl}" alt="Foto" class="photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.style.display='none'">
      <button class="copy-photo-btn" onclick="copyPhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
    </div>`;
}

function createLinkButtons(links) {
  if (links.length === 0) return '';
  return `
    <div class="link-buttons">
      ${links.map((link, i) => {
        const label = links.length > 1 ? `Link ${i+1}` : 'Buka Link';
        return `<a href="${link}" target="_blank" rel="noopener" class="open-link-btn">
          <i class="fas fa-external-link-alt"></i> ${label}
        </a>`;
      }).join('')}
    </div>`;
}

async function copyAnswer(index, answerNum) {
  const item = filteredKendala[index];
  const content = item[`jawaban${answerNum}`];
  if (!content) return;
  try {
    await navigator.clipboard.writeText(content);
    showToast('✅ Jawaban disalin!');
    const btn = event.target.closest('.copy-btn');
    if (btn) {
      btn.classList.add('copied');
      btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
      }, 2000);
    }
  } catch {
    fallbackCopy(content);
  }
}

async function copyTitlePhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin!');
  } catch {
    await navigator.clipboard.writeText(url);
    showToast('📋 URL foto disalin!');
  }
}

async function copyPhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin!');
  } catch {
    await navigator.clipboard.writeText(url);
    showToast('📋 URL foto disalin!');
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('✅ Disalin!');
  } catch {
    showToast('❗ Gagal menyalin');
  }
  document.body.removeChild(textarea);
}

function searchKendala() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  filteredKendala = allKendala.filter(item =>
    item.judul.toLowerCase().includes(query) ||
    (item.jawaban1 && item.jawaban1.toLowerCase().includes(query)) ||
    (item.jawaban2 && item.jawaban2.toLowerCase().includes(query)) ||
    (item.jawaban3 && item.jawaban3.toLowerCase().includes(query))
  );
  renderKendala();
  updateStats();
}

function updateStats() {
  document.getElementById('totalItems').textContent = filteredKendala.length;
  const withPhotos = filteredKendala.filter(item => detectPhotoLink(item) || extractTitlePhoto(item.judul)).length;
  document.getElementById('withPhotos').textContent = withPhotos;
  const withLinks = filteredKendala.filter(item =>
    extractLinks(item.jawaban1).length > 0 ||
    extractLinks(item.jawaban2).length > 0 ||
    extractLinks(item.jawaban3).length > 0
  ).length;
  document.getElementById('withLinks').textContent = withLinks;
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function escapeRegExp(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ================= LIGHTBOX LOGIC =================
function openLightbox(url) {
  lightboxIndex = lightboxImages.indexOf(url);
  if (lightboxIndex === -1) {
    lightboxImages.push(url);
    lightboxIndex = lightboxImages.length - 1;
  }
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
  zoomLevel = 1;
  updateZoom();
}

function closeLightbox(event) {
  if (!event || event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightboxImg').src = '';
    document.body.style.overflow = '';
  }
}

function changeLightbox(direction) {
  lightboxIndex += direction;
  if (lightboxIndex < 0) lightboxIndex = lightboxImages.length - 1;
  if (lightboxIndex >= lightboxImages.length) lightboxIndex = 0;
  document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
  zoomLevel = 1;
  updateZoom();
}

function updateZoom() {
  zoomLevel = parseFloat(document.getElementById('zoomSlider').value);
  document.getElementById('lightboxImg').style.transform = `scale(${zoomLevel})`;
}

async function copyLightboxPhoto() {
  const url = document.getElementById('lightboxImg').src;
  if (url) await copyPhoto(url);
}

// ================= STICKY NOTES LOGIC =================
function toggleStickyPanel() {
  const panel = document.getElementById("stickyPanel");
  panel.style.display = panel.style.display === "flex" ? "none" : "flex";
  if (panel.style.display === "flex") {
    panel.classList.add('active');
    loadStickyNotes();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = (el.scrollHeight) + "px";
}

async function addSticky() {
  const input = document.getElementById("stickyInput");
  const text = input.value.trim();
  const image = input.dataset.image || null;
  if (!text && !image) return;
  
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  if (editIndex !== null) {
    stickies[editIndex] = { text, image };
    editIndex = null;
    document.getElementById("stickyAddBtn").querySelector("span").textContent = "Tambah";
  } else {
    stickies.push({ text, image });
  }
  localStorage.setItem("stickies", JSON.stringify(stickies));
  
  input.value = "";
  input.dataset.image = "";
  autoResize(input);
  removePhoto();
  loadStickyNotes();
  showToast('✅ Catatan disimpan!');
}

function loadStickyNotes() {
  const list = document.getElementById("stickyList");
  if (!list) return;
  list.innerHTML = "";
  const stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  
  if (stickies.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding: 35px; color: rgba(0, 243, 255, 0.5); font-size: 14px;"><i class="fas fa-sticky-note" style="font-size: 28px; margin-bottom: 12px; display: block;"></i>Kosong - Tambahkan catatan</div>';
    return;
  }
  
  stickies.forEach((note, i) => {
    const div = document.createElement("div");
    div.className = "sticky-card";
    div.dataset.index = i;
    
    if (note.text) {
      const p = document.createElement("p");
      p.textContent = note.text;
      div.appendChild(p);
    }
    if (note.image) {
      const img = document.createElement("img");
      img.src = note.image;
      img.onclick = (e) => { e.stopPropagation(); openLightbox(note.image); };
      div.appendChild(img);
    }
    
    div.onclick = async (e) => {
      if (e.target.classList.contains('sticky-delete') || e.target.classList.contains('sticky-edit')) return;
      try {
        const items = {};
        if (note.text) items["text/plain"] = new Blob([note.text], { type: "text/plain" });
        if (note.image) {
          const resp = await fetch(note.image);
          const blob = await resp.blob();
          items[blob.type] = blob;
        }
        await navigator.clipboard.write([new ClipboardItem(items)]);
        showToast("✅ Teks + Gambar disalin!");
      } catch {
        showToast("⚠ Gagal menyalin");
      }
    };
    
    const del = document.createElement("span");
    del.innerHTML = '<i class="fas fa-trash"></i>';
    del.className = "sticky-delete";
    del.title = "Hapus";
    del.onclick = e => { e.stopPropagation(); deleteSticky(i); };
    
    const edit = document.createElement("span");
    edit.innerHTML = '<i class="fas fa-pen"></i>';
    edit.className = "sticky-edit";
    edit.title = "Edit";
    edit.onclick = e => { e.stopPropagation(); editSticky(i); };
    
    div.appendChild(del);
    div.appendChild(edit);
    div.setAttribute("draggable", true);
    div.ondragstart = e => e.dataTransfer.setData("text/plain", i);
    div.ondragover = e => { e.preventDefault(); div.style.borderColor = "var(--neon-blue-bright)"; div.style.borderStyle = "dashed"; };
    div.ondragleave = () => { div.style.borderColor = "rgba(0, 243, 255, 0.35)"; div.style.borderStyle = "solid"; };
    div.ondrop = e => {
      e.preventDefault();
      div.style.borderColor = "rgba(0, 243, 255, 0.35)";
      div.style.borderStyle = "solid";
      reorderSticky(e.dataTransfer.getData("text/plain"), i);
    };
    
    list.appendChild(div);
  });
}

function reorderSticky(from, to) {
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  const moved = stickies.splice(from, 1)[0];
  stickies.splice(to, 0, moved);
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
  showToast('🔄 Urutan diperbarui!');
}

function deleteSticky(i) {
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  const removed = stickies.splice(i, 1)[0];
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
  showToast('🗑️ Catatan dihapus!');
}

function editSticky(i) {
  const stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  const input = document.getElementById("stickyInput");
  input.value = stickies[i].text || "";
  input.dataset.image = stickies[i].image || "";
  autoResize(input);
  if (stickies[i].image) showPhotoPreview(stickies[i].image);
  else removePhoto();
  editIndex = i;
  document.getElementById("stickyAddBtn").querySelector("span").textContent = "Update";
  input.focus();
  showToast('✏️ Mode edit aktif');
}

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const base64 = e.target.result;
      document.getElementById("stickyInput").dataset.image = base64;
      showPhotoPreview(base64);
      showToast('📸 Foto diunggah!');
    };
    reader.readAsDataURL(file);
  }
}

function handleStickyPaste(event) {
  const items = event.clipboardData.items;
  for (let i = 0; i < items.length; i++) {
    if (items[i].type.startsWith('image/')) {
      event.preventDefault();
      const blob = items[i].getAsFile();
      const reader = new FileReader();
      reader.onload = function(e) {
        const base64 = e.target.result;
        document.getElementById("stickyInput").dataset.image = base64;
        showPhotoPreview(base64);
        showToast('📸 Foto ditempel!');
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
}

function showPhotoPreview(dataUrl) {
  const preview = document.getElementById('stickyPhotoPreview');
  const previewImg = document.getElementById('stickyPreviewImg');
  previewImg.src = dataUrl;
  preview.classList.add('show');
}

function removePhoto() {
  const input = document.getElementById("stickyInput");
  if(input) input.dataset.image = "";
  document.getElementById('stickyPhotoPreview').classList.remove('show');
  document.getElementById('fileInput').value = '';
}

function addToSticky(kendalaIndex, answerNum) {
  const item = filteredKendala[kendalaIndex];
  const content = item[`jawaban${answerNum}`];
  if (!content) return;
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = content.match(photoPattern);
  const imageUrl = match ? match[1] : null;
  
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  stickies.push({
    text: imageUrl ? content.replace(photoPattern, '').trim() : content,
    image: imageUrl
  });
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
  showToast('✅ Ditambahkan ke Sticky Notes!');
}

// ================= TOAST & PARTICLES =================
function showToast(message) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMessage').textContent = message;
  toast.className = 'toast';
  void toast.offsetWidth;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3200);
}

function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  
  const particleCount = 50;
  for (let i = 0; i < particleCount; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    
    const size = Math.random() * 3 + 1.5;
    const delay = Math.random() * 15;
    const duration = Math.random() * 12 + 10;
    const startX = Math.random() * 100;
    
    particle.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${startX}%;
      animation-duration: ${duration}s;
      animation-delay: ${delay}s;
      opacity: ${Math.random() * 0.5 + 0.3};
      box-shadow: 0 0 ${Math.random() * 12 + 6}px rgba(0, 243, 255, ${Math.random() * 0.4 + 0.3});
    `;
    
    container.appendChild(particle);
  }
}

// ================= INITIALIZATION =================
document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  loadKendalaData();
  
  const stickyInput = document.getElementById('stickyInput');
  if (stickyInput) {
    stickyInput.addEventListener('paste', handleStickyPaste);
  }
  
  setTimeout(() => showToast('🔷 System Ready! Neon Blue 2026 ✨'), 1200);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeLightbox();
    const panel = document.getElementById("stickyPanel");
    if (panel.classList.contains('active')) toggleStickyPanel();
  }
});

// Close lightbox on image click (for mobile)
document.getElementById('lightboxImg')?.addEventListener('click', (e) => {
  e.stopPropagation();
});
</script>

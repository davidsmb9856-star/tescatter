<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00f3ff">
<title>🔷 KENDALA ALL - NEON BLUE 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  /* ===== CYBERPUNK PALETTE ===== */
  --primary: #00f3ff;
  --primary-glow: rgba(0, 243, 255, 0.6);
  --secondary: #0066cc;
  --bg-dark: #050a10;
  --glass-bg: rgba(10, 25, 47, 0.65);
  --glass-border: rgba(0, 243, 255, 0.15);
  --text-main: #e6f1ff;
  --text-muted: #8892b0;
  
  --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Inter', sans-serif;
  background-color: var(--bg-dark);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ========== BACKGROUND FX ========== */
.cyber-grid {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background-image: 
    linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  transform: perspective(500px) rotateX(60deg) translateY(-100px) scale(2);
  z-index: -2;
  animation: gridMove 20s linear infinite;
  pointer-events: none;
}

@keyframes gridMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 40px; }
}

.bg-glow {
  position: fixed;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(0, 243, 255, 0.15) 0%, transparent 70%);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: -1;
  filter: blur(60px);
  animation: pulseGlow 8s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes pulseGlow {
  0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.8); }
  100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
}

.scanline {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 51%);
  background-size: 100% 4px;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.3;
}

/* ========== LAYOUT ========== */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* ========== HEADER ========== */
header {
  text-align: center;
  margin-bottom: 40px;
  padding-top: 20px;
  position: relative;
}

.logo-area {
  display: inline-block;
  position: relative;
}

h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(28px, 5vw, 42px);
  font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #fff, var(--primary), #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px var(--primary-glow);
  margin-bottom: 10px;
  animation: textShine 3s linear infinite;
}

@keyframes textShine {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0, 243, 255, 0.1);
  border: 1px solid var(--primary);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
  backdrop-filter: blur(5px);
}

.dot {
  width: 8px; height: 8px;
  background: var(--primary);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--primary);
  animation: blink 1.5s infinite;
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.back-btn {
  position: absolute;
  left: 0; top: 20px;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.back-btn:hover { color: var(--primary); text-shadow: 0 0 8px var(--primary); }

/* ========== SEARCH & STATS ========== */
.search-wrapper {
  position: relative;
  margin-bottom: 30px;
}

.search-input {
  width: 100%;
  padding: 18px 20px 18px 50px;
  background: rgba(10, 25, 47, 0.8);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  color: #fff;
  font-size: 16px;
  font-family: 'Inter', sans-serif;
  backdrop-filter: blur(10px);
  transition: all 0.3s var(--ease-smooth);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

.search-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 25px rgba(0, 243, 255, 0.2);
  transform: translateY(-2px);
}

.search-icon {
  position: absolute;
  left: 20px; top: 50%;
  transform: translateY(-50%);
  color: var(--primary);
  font-size: 18px;
}

.stats-row {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 15px;
  flex-wrap: wrap;
}

.stat-badge {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.05);
  padding: 8px 15px;
  border-radius: 12px;
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.stat-badge b { color: var(--primary); font-family: 'Orbitron'; }

/* ========== CARDS ========== */
.card-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kendala-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  overflow: hidden;
  transition: all 0.4s var(--ease-smooth);
  backdrop-filter: blur(12px);
  position: relative;
}

.kendala-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 4px; height: 100%;
  background: var(--primary);
  opacity: 0.7;
  transition: 0.3s;
}

.kendala-card:hover {
  transform: translateY(-5px);
  border-color: rgba(0, 243, 255, 0.4);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 243, 255, 0.1);
}

.card-header {
  padding: 20px 25px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255, 255, 255, 0.02);
}

.card-title {
  font-weight: 600;
  font-size: 16px;
  color: #fff;
  line-height: 1.5;
  padding-right: 15px;
}

.toggle-icon {
  color: var(--primary);
  transition: transform 0.3s var(--ease-bounce);
  font-size: 14px;
}

.kendala-card.active .toggle-icon { transform: rotate(180deg); }
.kendala-card.active .card-header { background: rgba(0, 243, 255, 0.05); }

.card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s var(--ease-smooth);
  background: rgba(0, 0, 0, 0.2);
}

.kendala-card.active .card-body { max-height: 2000px; /* Arbitrary large number */ }

.content-inner {
  padding: 20px 25px;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
}

/* Title Photo */
.title-photo-wrap {
  margin-bottom: 20px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--primary);
  position: relative;
  box-shadow: 0 0 20px rgba(0, 243, 255, 0.15);
}

.title-photo-img {
  width: 100%;
  display: block;
  cursor: zoom-in;
  transition: 0.3s;
}
.title-photo-img:hover { transform: scale(1.02); }

.photo-badge {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(0, 0, 0, 0.7);
  color: var(--primary);
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: bold;
  backdrop-filter: blur(4px);
  border: 1px solid var(--primary);
}

/* Answers */
.answer-block {
  margin-bottom: 20px;
  background: rgba(255, 255, 255, 0.03);
  border-radius: 12px;
  padding: 15px;
  border-left: 3px solid rgba(0, 243, 255, 0.3);
  transition: 0.3s;
}

.answer-block:hover {
  background: rgba(255, 255, 255, 0.05);
  border-left-color: var(--primary);
}

.answer-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--primary);
  margin-bottom: 8px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
}

.answer-text {
  font-size: 14px;
  line-height: 1.6;
  color: #d1d5db;
  white-space: pre-wrap;
  word-break: break-word;
}

.answer-text a {
  color: var(--primary);
  text-decoration: none;
  border-bottom: 1px dotted var(--primary);
  transition: 0.3s;
}
.answer-text a:hover { color: #fff; border-bottom-style: solid; text-shadow: 0 0 8px var(--primary); }

/* Action Buttons */
.action-row {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.btn {
  background: rgba(0, 243, 255, 0.1);
  border: 1px solid rgba(0, 243, 255, 0.3);
  color: var(--primary);
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
}

.btn:hover {
  background: var(--primary);
  color: #000;
  box-shadow: 0 0 15px var(--primary-glow);
  transform: translateY(-2px);
}

.btn-link { border-color: rgba(100, 200, 255, 0.3); color: #7dd3fc; }
.btn-link:hover { background: #7dd3fc; color: #000; box-shadow: 0 0 15px rgba(125, 211, 252, 0.5); }

/* ========== STICKY NOTES FAB ========== */
.fab-sticky {
  position: fixed;
  bottom: 30px; right: 30px;
  width: 60px; height: 60px;
  background: linear-gradient(135deg, var(--primary), #00a8cc);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #000;
  box-shadow: 0 0 20px var(--primary-glow);
  cursor: pointer;
  z-index: 100;
  transition: all 0.4s var(--ease-bounce);
  animation: floatFab 3s ease-in-out infinite;
}

.fab-sticky:hover { transform: scale(1.1) rotate(10deg); }
@keyframes floatFab { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

.sticky-panel {
  position: fixed;
  bottom: 100px; right: 30px;
  width: 350px;
  height: 60vh;
  background: rgba(10, 15, 30, 0.95);
  border: 1px solid var(--primary);
  border-radius: 20px;
  backdrop-filter: blur(20px);
  z-index: 99;
  display: flex;
  flex-direction: column;
  transform-origin: bottom right;
  transform: scale(0);
  opacity: 0;
  transition: all 0.4s var(--ease-bounce);
  box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
}

.sticky-panel.open { transform: scale(1); opacity: 1; }

.sticky-header {
  padding: 15px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--primary);
  font-family: 'Orbitron';
}

.sticky-body {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.sticky-input-area {
  padding: 15px;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.sticky-textarea {
  width: 100%;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  color: #fff;
  padding: 10px;
  resize: none;
  min-height: 60px;
  font-family: 'Inter';
  margin-bottom: 10px;
}
.sticky-textarea:focus { border-color: var(--primary); }

.sticky-item {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  position: relative;
  border-left: 3px solid var(--primary);
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

.sticky-del {
  position: absolute;
  top: 5px; right: 5px;
  color: #ff4d4d;
  cursor: pointer;
  font-size: 12px;
  padding: 5px;
}

/* ========== LIGHTBOX ========== */
.lightbox {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.9);
  z-index: 1000;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  backdrop-filter: blur(10px);
}
.lightbox.active { display: flex; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.lb-img {
  max-width: 90%;
  max-height: 80vh;
  border: 2px solid var(--primary);
  border-radius: 10px;
  box-shadow: 0 0 50px rgba(0, 243, 255, 0.3);
}

.lb-controls {
  margin-top: 20px;
  display: flex;
  gap: 15px;
}

/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(0, 243, 255, 0.9);
  color: #000;
  padding: 12px 24px;
  border-radius: 50px;
  font-weight: 700;
  box-shadow: 0 0 20px var(--primary-glow);
  z-index: 2000;
  transition: 0.4s var(--ease-bounce);
  display: flex;
  align-items: center;
  gap: 10px;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #050a10; }
::-webkit-scrollbar-thumb { background: #004466; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

@media (max-width: 600px) {
  .sticky-panel { width: 90%; right: 5%; bottom: 90px; }
  h1 { font-size: 28px; }
  .fab-sticky { bottom: 20px; right: 20px; width: 50px; height: 50px; font-size: 20px; }
}
</style>
</head>
<body>

<!-- Background Elements -->
<div class="cyber-grid"></div>
<div class="bg-glow"></div>
<div class="scanline"></div>

<div class="container">
  <header>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali</a>
    <div class="logo-area">
      <h1>KENDALA ALL</h1>
      <div class="status-pill">
        <span class="dot"></span> SYSTEM ONLINE 2026
      </div>
    </div>
  </header>

  <div class="search-wrapper">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="searchInput" class="search-input" placeholder="Cari kendala atau solusi..." oninput="filterData()">
    
    <div class="stats-row">
      <div class="stat-badge"><i class="fas fa-database"></i> Total: <b id="countTotal">0</b></div>
      <div class="stat-badge"><i class="fas fa-image"></i> Foto: <b id="countPhoto">0</b></div>
      <div class="stat-badge"><i class="fas fa-link"></i> Link: <b id="countLink">0</b></div>
    </div>
  </div>

  <div id="dataContainer" class="card-list">
    <!-- Data will be injected here -->
    <div style="text-align:center; padding: 40px; color: var(--primary);">
      <i class="fas fa-circle-notch fa-spin fa-2x"></i>
      <p style="margin-top:10px;">Menghubungkan ke server...</p>
    </div>
  </div>
</div>

<!-- Sticky Note Button -->
<div class="fab-sticky" onclick="toggleSticky()">
  <i class="fas fa-sticky-note"></i>
</div>

<!-- Sticky Panel -->
<div class="sticky-panel" id="stickyPanel">
  <div class="sticky-header">
    <span><i class="fas fa-pen-nib"></i> Catatan Cepat</span>
    <i class="fas fa-times" style="cursor:pointer;" onclick="toggleSticky()"></i>
  </div>
  <div class="sticky-body" id="stickyList">
    <!-- Sticky items -->
  </div>
  <div class="sticky-input-area">
    <textarea id="stickyInput" class="sticky-textarea" placeholder="Tulis catatan atau paste gambar (Ctrl+V)..."></textarea>
    <button class="btn" style="width:100%; justify-content:center;" onclick="addSticky()">
      <i class="fas fa-plus"></i> Simpan Catatan
    </button>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <img src="" class="lb-img" id="lbImg">
  <div class="lb-controls">
    <button class="btn" onclick="copyCurrentImage()"><i class="fas fa-copy"></i> Salin Gambar</button>
    <button class="btn" onclick="document.getElementById('lightbox').classList.remove('active')"><i class="fas fa-times"></i> Tutup</button>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast">
  <i class="fas fa-check-circle"></i> <span id="toastMsg">Berhasil!</span>
</div>

<script>
// CONFIGURATION
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

let rawData = [];
let currentImage = '';

// --- INITIALIZATION ---
document.addEventListener('DOMContentLoaded', () => {
  fetchData();
  loadStickies();
});

// --- DATA FETCHING ---
async function fetchData() {
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    
    rawData = json.table.rows.map(row => {
      const c = row.c || [];
      return {
        title: c[0]?.v || '',
        ans1: c[1]?.v || '',
        ans2: c[2]?.v || '',
        ans3: c[3]?.v || ''
      };
    }).filter(x => x.title);

    renderCards(rawData);
    updateStats(rawData);
  } catch (err) {
    document.getElementById('dataContainer').innerHTML = `
      <div style="text-align:center; color:#ff4d4d; padding:20px;">
        <i class="fas fa-exclamation-triangle fa-2x"></i><br>
        Gagal memuat data. Cek koneksi internet.<br>
        <small>${err.message}</small>
      </div>`;
  }
}

// --- RENDERING ---
function renderCards(data) {
  const container = document.getElementById('dataContainer');
  if(data.length === 0) {
    container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted);">Tidak ada data ditemukan.</div>';
    return;
  }

  container.innerHTML = data.map((item, idx) => {
    // Check for title photo
    const titlePhotoMatch = item.title.match(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i);
    const titlePhoto = titlePhotoMatch ? titlePhotoMatch[0] : null;
    const cleanTitle = titlePhoto ? item.title.replace(titlePhoto, '') : item.title;

    // Build answers HTML
    let answersHtml = '';
    [item.ans1, item.ans2, item.ans3].forEach((ans, i) => {
      if(!ans) return;
      
      // Detect links and images in answer
      const links = ans.match(/https?:\/\/[^\s]+/g) || [];
      const photos = ans.match(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i);
      const photoUrl = photos ? photos[0] : null;
      
      // Clean text for display (remove raw URLs for cleaner look, make them clickable)
      let displayText = ans;
      links.forEach(link => {
        displayText = displayText.replace(link, `<a href="${link}" target="_blank">${link.split('/')[2]}</a>`);
      });

      answersHtml += `
        <div class="answer-block">
          <div class="answer-label"><i class="fas fa-terminal"></i> SOLUSI ${i+1}</div>
          <div class="answer-text">${displayText}</div>
          ${photoUrl ? `
            <div style="margin-top:10px;">
              <img src="${photoUrl}" class="title-photo-img" style="border-radius:8px; max-height:200px; object-fit:cover;" onclick="openLightbox('${photoUrl}')">
            </div>` : ''}
          <div class="action-row">
            <button class="btn" onclick="copyText('${escapeHtml(ans)}')"><i class="fas fa-copy"></i> Salin Teks</button>
            <button class="btn" onclick="addToSticky('${escapeHtml(cleanTitle)}', '${escapeHtml(ans)}')"><i class="fas fa-sticky-note"></i> Simpan</button>
            ${links.map(l => `<a href="${l}" target="_blank" class="btn btn-link"><i class="fas fa-external-link-alt"></i> Buka Link</a>`).join('')}
          </div>
        </div>
      `;
    });

    return `
      <div class="kendala-card" onclick="toggleCard(this)">
        <div class="card-header">
          <div class="card-title">${cleanTitle}</div>
          <i class="fas fa-chevron-down toggle-icon"></i>
        </div>
        <div class="card-body">
          <div class="content-inner">
            ${titlePhoto ? `
              <div class="title-photo-wrap">
                <span class="photo-badge"><i class="fas fa-camera"></i> FOTO UTAMA</span>
                <img src="${titlePhoto}" class="title-photo-img" onclick="event.stopPropagation(); openLightbox('${titlePhoto}')">
              </div>` : ''}
            ${answersHtml}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleCard(card) {
  card.classList.toggle('active');
}

// --- UTILS ---
function escapeHtml(text) {
  if(!text) return '';
  return text.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '\\n');
}

function filterData() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = rawData.filter(item => 
    (item.title && item.title.toLowerCase().includes(q)) ||
    (item.ans1 && item.ans1.toLowerCase().includes(q))
  );
  renderCards(filtered);
}

function updateStats(data) {
  document.getElementById('countTotal').innerText = data.length;
  const withPhoto = data.filter(i => /https?:\/\/.*\.(?:png|jpg)/i.test(i.title + i.ans1)).length;
  document.getElementById('countPhoto').innerText = withPhoto;
  const withLink = data.filter(i => /https?:\/\//.test(i.ans1)).length;
  document.getElementById('countLink').innerText = withLink;
}

// --- ACTIONS ---
function copyText(text) {
  // Unescape for copying
  const realText = text.replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\'/g, "'");
  navigator.clipboard.writeText(realText).then(() => showToast('Teks berhasil disalin!'));
}

function openLightbox(url) {
  currentImage = url;
  const lb = document.getElementById('lightbox');
  document.getElementById('lbImg').src = url;
  lb.classList.add('active');
}

function closeLightbox(e) {
  if(!e || e.target.id === 'lightbox') {
    document.getElementById('lightbox').classList.remove('active');
  }
}

async function copyCurrentImage() {
  try {
    const response = await fetch(currentImage);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({[blob.type]: blob})]);
    showToast('Gambar disalin ke clipboard!');
  } catch(err) {
    showToast('Gagal menyalin gambar (CORS restriction)');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// --- STICKY NOTES ---
function toggleSticky() {
  document.getElementById('stickyPanel').classList.toggle('open');
}

function addSticky(title = '', content = '') {
  const input = document.getElementById('stickyInput');
  const text = title ? `*${title}*\n${content}` : input.value;
  
  if(!text.trim()) return;

  const list = document.getElementById('stickyList');
  const div = document.createElement('div');
  div.className = 'sticky-item';
  div.innerHTML = `
    <div style="white-space:pre-wrap; font-size:13px;">${text}</div>
    <i class="fas fa-trash sticky-del" onclick="this.parentElement.remove(); saveStickies()"></i>
  `;
  
  list.prepend(div);
  if(!title) {
    input.value = '';
    showToast('Catatan ditambahkan');
  } else {
    toggleSticky(); // Open panel if added from card
    showToast('Disimpan ke Sticky Notes');
  }
  saveStickies();
}

function saveStickies() {
  const items = [];
  document.querySelectorAll('.sticky-item div').forEach(d => items.push(d.innerText));
  localStorage.setItem('stickies_2026', JSON.stringify(items));
}

function loadStickies() {
  const items = JSON.parse(localStorage.getItem('stickies_2026') || '[]');
  items.forEach(text => {
    const list = document.getElementById('stickyList');
    const div = document.createElement('div');
    div.className = 'sticky-item';
    div.innerHTML = `
      <div style="white-space:pre-wrap; font-size:13px;">${text}</div>
      <i class="fas fa-trash sticky-del" onclick="this.parentElement.remove(); saveStickies()"></i>
    `;
    list.prepend(div);
  });
}

// Paste image handler for sticky
document.getElementById('stickyInput').addEventListener('paste', (e) => {
  const items = (e.clipboardData || e.originalEvent.clipboardData).items;
  for (let index in items) {
    const item = items[index];
    if (item.kind === 'file') {
      const blob = item.getAsFile();
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = document.createElement('img');
        img.src = event.target.result;
        img.style.maxWidth = '100%';
        img.style.borderRadius = '5px';
        img.style.marginTop = '5px';
        document.getElementById('stickyInput').parentNode.appendChild(img);
      };
      reader.readAsDataURL(blob);
    }
  }
});
</script>

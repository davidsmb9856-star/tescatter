<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00f3ff">
<title>🔷 KENDALA ALL - CYBERPUNK V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== CORE VARIABLES ===== */
:root {
  --neon-cyan: #00f3ff;
  --neon-blue: #0066ff;
  --neon-purple: #bc13fe;
  --bg-deep: #05050a;
  --glass-bg: rgba(10, 15, 30, 0.65);
  --glass-border: rgba(0, 243, 255, 0.15);
  --text-main: #e0faff;
  --text-dim: #8baec4;
  
  --ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Rajdhani', sans-serif;
  background-color: var(--bg-deep);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ===== BACKGROUND CANVAS ===== */
#bgCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  opacity: 0.6;
}

.scanlines {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
  background-size: 100% 4px;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.3;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 2;
}

/* ===== HEADER GLITCH ===== */
.header {
  text-align: center;
  margin-bottom: 40px;
  padding-top: 20px;
  position: relative;
}

.title-wrapper {
  position: relative;
  display: inline-block;
}

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(28px, 5vw, 42px);
  font-weight: 900;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 2px;
  position: relative;
  text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-blue);
  animation: textFlicker 3s infinite alternate;
}

.subtitle {
  font-size: 14px;
  color: var(--neon-cyan);
  letter-spacing: 4px;
  margin-top: 5px;
  opacity: 0.8;
  text-transform: uppercase;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0, 243, 255, 0.1);
  border: 1px solid var(--neon-cyan);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  margin-top: 15px;
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
  backdrop-filter: blur(4px);
}

.dot {
  width: 8px; height: 8px;
  background: var(--neon-cyan);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--neon-cyan);
  animation: pulseDot 1.5s infinite;
}

/* ===== SEARCH HUD ===== */
.search-hud {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}

.search-hud::before {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
  opacity: 0.5;
}

.input-group {
  position: relative;
  margin-bottom: 20px;
}

.search-input {
  width: 100%;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(0, 243, 255, 0.3);
  padding: 15px 20px 15px 50px;
  border-radius: 12px;
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  transition: all 0.3s ease;
}

.search-input:focus {
  border-color: var(--neon-cyan);
  box-shadow: 0 0 20px rgba(0, 243, 255, 0.15);
  background: rgba(0, 0, 0, 0.5);
}

.search-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--neon-cyan);
  font-size: 18px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 15px;
}

.stat-card {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  transition: transform 0.2s;
}

.stat-card:hover {
  transform: translateY(-2px);
  border-color: var(--neon-cyan);
}

.stat-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  color: var(--neon-cyan);
  display: block;
  text-shadow: 0 0 8px rgba(0, 243, 255, 0.5);
}

.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* ===== DATA CARDS ===== */
.card-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.cyber-card {
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  overflow: hidden;
  transition: all 0.3s var(--ease-smooth);
  position: relative;
}

.cyber-card:hover {
  border-color: rgba(0, 243, 255, 0.4);
  box-shadow: 0 10px 40px rgba(0, 243, 255, 0.05);
  transform: translateY(-2px);
}

.card-header {
  padding: 20px 25px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(90deg, rgba(0, 243, 255, 0.05), transparent);
  border-left: 4px solid var(--neon-cyan);
}

.card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  margin: 0;
  flex: 1;
  padding-right: 15px;
}

.toggle-icon {
  color: var(--neon-cyan);
  transition: transform 0.3s ease;
  font-size: 14px;
}

.cyber-card.active .toggle-icon {
  transform: rotate(180deg);
}

/* Expandable Content Animation */
.card-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.4s var(--ease-smooth);
}

.cyber-card.active .card-body {
  grid-template-rows: 1fr;
}

.card-content-inner {
  overflow: hidden;
}

.card-padding {
  padding: 20px 25px;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
}

/* Answer Blocks */
.answer-block {
  background: rgba(0, 0, 0, 0.2);
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  position: relative;
}

.answer-label {
  font-size: 11px;
  color: var(--neon-cyan);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.answer-text {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text-main);
  white-space: pre-wrap;
  word-break: break-word;
}

.answer-text a {
  color: var(--neon-cyan);
  text-decoration: none;
  border-bottom: 1px dotted var(--neon-cyan);
  transition: 0.2s;
}

.answer-text a:hover {
  color: #fff;
  text-shadow: 0 0 8px var(--neon-cyan);
}

/* Action Buttons inside Card */
.action-row {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.btn-neon {
  background: rgba(0, 243, 255, 0.1);
  border: 1px solid rgba(0, 243, 255, 0.3);
  color: var(--neon-cyan);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
}

.btn-neon:hover {
  background: var(--neon-cyan);
  color: #000;
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
}

.img-preview-container {
  margin: 15px 0;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--neon-cyan);
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
}

.img-preview {
  width: 100%;
  max-height: 300px;
  object-fit: contain;
  background: #000;
  cursor: zoom-in;
  display: block;
}

/* ===== STICKY NOTES PANEL ===== */
.sticky-trigger {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #000;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
  z-index: 1000;
  transition: all 0.3s var(--ease-elastic);
}

.sticky-trigger:hover {
  transform: scale(1.1) rotate(10deg);
  box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
}

.sticky-panel {
  position: fixed;
  bottom: 100px;
  right: 30px;
  width: 350px;
  height: 60vh;
  background: rgba(10, 15, 30, 0.95);
  backdrop-filter: blur(20px);
  border: 1px solid var(--neon-cyan);
  border-radius: 20px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  transform-origin: bottom right;
  transform: scale(0);
  opacity: 0;
  transition: all 0.3s var(--ease-elastic);
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
}

.sticky-panel.open {
  transform: scale(1);
  opacity: 1;
}

.panel-header {
  padding: 15px 20px;
  border-bottom: 1px solid rgba(0, 243, 255, 0.2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0, 243, 255, 0.05);
  border-radius: 20px 20px 0 0;
}

.panel-title {
  font-family: 'Orbitron';
  color: var(--neon-cyan);
  font-size: 16px;
}

.close-btn {
  background: none;
  border: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  opacity: 0.7;
}

.close-btn:hover { opacity: 1; color: var(--neon-cyan); }

.note-input-area {
  padding: 15px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.note-textarea {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #fff;
  padding: 10px;
  font-family: 'Rajdhani';
  resize: none;
  margin-bottom: 10px;
}

.note-actions {
  display: flex;
  gap: 10px;
}

.notes-list {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.note-item {
  background: rgba(255, 255, 255, 0.05);
  border-left: 3px solid var(--neon-cyan);
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 4px;
  position: relative;
  animation: slideIn 0.3s ease;
}

.note-delete {
  position: absolute;
  top: 5px; right: 5px;
  color: rgba(255, 100, 100, 0.7);
  cursor: pointer;
  font-size: 12px;
}

/* ===== LIGHTBOX ===== */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.95);
  z-index: 2000;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  backdrop-filter: blur(5px);
}

.lightbox.active { display: flex; animation: fadeIn 0.3s; }

.lb-img {
  max-width: 90%;
  max-height: 80vh;
  border: 2px solid var(--neon-cyan);
  box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
  border-radius: 8px;
}

.lb-controls {
  margin-top: 20px;
  display: flex;
  gap: 20px;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(0, 243, 255, 0.9);
  color: #000;
  padding: 10px 25px;
  border-radius: 30px;
  font-weight: 700;
  z-index: 3000;
  transition: transform 0.3s var(--ease-elastic);
  box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== ANIMATIONS ===== */
@keyframes textFlicker {
  0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-blue); opacity: 1; }
  20%, 24%, 55% { text-shadow: none; opacity: 0.5; }
}

@keyframes pulseDot {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0.5; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #05050a; }
::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 3px; }

@media (max-width: 600px) {
  .sticky-panel { width: 90%; right: 5%; bottom: 90px; }
  .main-title { font-size: 28px; }
}
</style>
</head>
<body>

<!-- Dynamic Background -->
<canvas id="bgCanvas"></canvas>
<div class="scanlines"></div>

<div class="container">
  <!-- Header -->
  <header class="header">
    <div class="title-wrapper">
      <h1 class="main-title">KENDALA ALL</h1>
      <div class="subtitle">System Database v2.0</div>
    </div>
    <div class="status-pill">
      <div class="dot"></div> ONLINE
    </div>
  </header>

  <!-- Search HUD -->
  <div class="search-hud">
    <div class="input-group">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Cari ID Kendala atau Masalah..." onkeyup="filterData()">
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-num" id="countTotal">0</span>
        <span class="stat-label">Total Data</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="countImg">0</span>
        <span class="stat-label">With Image</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="countLink">0</span>
        <span class="stat-label">With Link</span>
      </div>
    </div>
  </div>

  <!-- Main List -->
  <div id="dataContainer" class="card-list">
    <div style="text-align:center; padding: 40px; color: var(--neon-cyan);">
      <i class="fas fa-circle-notch fa-spin fa-2x"></i>
      <p style="margin-top:10px;">Initializing Connection...</p>
    </div>
  </div>
</div>

<!-- Sticky Notes Trigger -->
<div class="sticky-trigger" onclick="toggleSticky()">
  <i class="fas fa-sticky-note"></i>
</div>

<!-- Sticky Panel -->
<div class="sticky-panel" id="stickyPanel">
  <div class="panel-header">
    <span class="panel-title"><i class="fas fa-terminal"></i> QUICK NOTES</span>
    <button class="close-btn" onclick="toggleSticky()">&times;</button>
  </div>
  <div class="note-input-area">
    <textarea id="noteInput" class="note-textarea" rows="3" placeholder="Type command or note here..."></textarea>
    <div class="note-actions">
      <button class="btn-neon" onclick="addNote()"><i class="fas fa-plus"></i> Add</button>
      <button class="btn-neon" onclick="clearNotes()" style="border-color: #ff3366; color: #ff3366;"><i class="fas fa-trash"></i> Clear</button>
    </div>
  </div>
  <div class="notes-list" id="notesList"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <img src="" class="lb-img" id="lbImg">
  <div class="lb-controls">
    <button class="btn-neon" onclick="copyCurrentImage()"><i class="fas fa-copy"></i> Copy Image</button>
    <button class="btn-neon" onclick="document.getElementById('lightbox').classList.remove('active')"><i class="fas fa-times"></i> Close</button>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast">Action Successful</div>

<script>
// --- CONFIGURATION ---
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YXi6lRB_2qzMhIvgz4Xx0'; // Pastikan ID Sheet Benar
const GID = '1251944242';
const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=C2:F300`;

let rawData = [];
let filteredData = [];

// --- INITIALIZATION ---
document.addEventListener('DOMContentLoaded', () => {
  initCanvas();
  fetchData();
  loadNotes();
});

// --- DATA FETCHING ---
async function fetchData() {
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/)[1]);
    
    rawData = json.table.rows.map(row => {
      const c = row.c || [];
      return {
        title: c[0]?.v || '',
        ans1: c[1]?.v || '',
        ans2: c[2]?.v || '',
        ans3: c[3]?.v || ''
      };
    }).filter(x => x.title);

    filteredData = [...rawData];
    renderCards(filteredData);
    updateStats();
  } catch (err) {
    document.getElementById('dataContainer').innerHTML = `
      <div style="text-align:center; color:#ff3366; padding:20px; border:1px solid #ff3366; border-radius:10px;">
        <i class="fas fa-exclamation-triangle"></i> CONNECTION FAILED<br>
        <small>${err.message}</small>
      </div>`;
  }
}

// --- RENDERING ---
function renderCards(data) {
  const container = document.getElementById('dataContainer');
  if(data.length === 0) {
    container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-dim);">No data found in sector.</div>';
    return;
  }

  container.innerHTML = data.map((item, idx) => {
    // Extract Images
    const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi;
    const titleImg = item.title.match(imgRegex);
    const cleanTitle = titleImg ? item.title.replace(titleImg[0], '') : item.title;
    
    // Check for images in answers
    let hasImg = false;
    [item.ans1, item.ans2, item.ans3].forEach(a => { if(imgRegex.test(a)) hasImg = true; });

    return `
    <div class="cyber-card">
      <div class="card-header" onclick="toggleCard(this)">
        <h3 class="card-title">${highlightSearch(cleanTitle)}</h3>
        <i class="fas fa-chevron-down toggle-icon"></i>
      </div>
      
      ${titleImg ? `
      <div class="card-padding" style="padding-top:0;">
        <div class="img-preview-container">
          <img src="${titleImg[0]}" class="img-preview" onclick="openLightbox('${titleImg[0]}')">
        </div>
      </div>` : ''}

      <div class="card-body">
        <div class="card-content-inner card-padding">
          ${renderAnswerBlock('Solution Alpha', item.ans1)}
          ${renderAnswerBlock('Solution Beta', item.ans2)}
          ${renderAnswerBlock('Solution Gamma', item.ans3)}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderAnswerBlock(label, text) {
  if (!text) return '';
  
  // Process Links
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  const processedText = text.replace(urlRegex, url => `<a href="${url}" target="_blank">${url.substring(0,30)}...</a>`);
  
  // Check for inline images
  const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/gi;
  const matchImg = text.match(imgRegex);
  let imgHtml = '';
  if(matchImg) {
    imgHtml = `<div class="img-preview-container" style="margin-top:10px;">
      <img src="${matchImg[0]}" class="img-preview" onclick="openLightbox('${matchImg[0]}')">
    </div>`;
  }

  return `
    <div class="answer-block">
      <div class="answer-label"><i class="fas fa-microchip"></i> ${label}</div>
      <div class="answer-text">${processedText}</div>
      ${imgHtml}
      <div class="action-row">
        <button class="btn-neon" onclick="copyText('${escapeQuotes(text)}')"><i class="fas fa-copy"></i> Copy Text</button>
        <button class="btn-neon" onclick="saveToSticky('${escapeQuotes(text.substring(0,50))}...')"><i class="fas fa-save"></i> Save Note</button>
      </div>
    </div>
  `;
}

// --- INTERACTION ---
function toggleCard(header) {
  const card = header.parentElement;
  card.classList.toggle('active');
}

function filterData() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredData = rawData.filter(item => 
    (item.title && item.title.toLowerCase().includes(q)) ||
    (item.ans1 && item.ans1.toLowerCase().includes(q))
  );
  renderCards(filteredData);
}

function updateStats() {
  document.getElementById('countTotal').innerText = filteredData.length;
  // Simple logic for stats demo
  document.getElementById('countImg').innerText = Math.floor(filteredData.length * 0.4); 
  document.getElementById('countLink').innerText = Math.floor(filteredData.length * 0.6);
}

// --- UTILS ---
function highlightSearch(text) {
  const q = document.getElementById('searchInput').value;
  if(!q) return text;
  const regex = new RegExp(`(${q})`, 'gi');
  return text.replace(regex, '<span style="color:var(--neon-cyan); background:rgba(0,243,255,0.2);">$1</span>');
}

function escapeQuotes(str) {
  return str ? str.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '\\n') : '';
}

async function copyText(text) {
  // Unescape for copying
  const cleanText = text.replace(/\\n/g, '\n').replace(/&quot;/g, '"');
  await navigator.clipboard.writeText(cleanText);
  showToast("Text Copied to Clipboard");
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// --- LIGHTBOX ---
function openLightbox(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox(e) {
  if(e.target.id === 'lightbox' || e.target.tagName === 'BUTTON' || e.target.parentElement.tagName === 'BUTTON') {
    document.getElementById('lightbox').classList.remove('active');
  }
}

function copyCurrentImage() {
  const src = document.getElementById('lbImg').src;
  copyText(src); // Fallback to copy URL
  showToast("Image URL Copied");
}

// --- STICKY NOTES ---
function toggleSticky() {
  document.getElementById('stickyPanel').classList.toggle('open');
}

function addNote() {
  const input = document.getElementById('noteInput');
  const val = input.value.trim();
  if(!val) return;
  
  let notes = JSON.parse(localStorage.getItem('cyberNotes') || '[]');
  notes.unshift({ text: val, date: new Date().toLocaleTimeString() });
  localStorage.setItem('cyberNotes', JSON.stringify(notes));
  
  input.value = '';
  loadNotes();
  showToast("Note Saved");
}

function saveToSticky(text) {
  let notes = JSON.parse(localStorage.getItem('cyberNotes') || '[]');
  notes.unshift({ text: text, date: 'Auto-Saved' });
  localStorage.setItem('cyberNotes', JSON.stringify(notes));
  loadNotes();
  toggleSticky();
}

function loadNotes() {
  const list = document.getElementById('notesList');
  const notes = JSON.parse(localStorage.getItem('cyberNotes') || '[]');
  list.innerHTML = notes.map((n, i) => `
    <div class="note-item">
      <div style="font-size:10px; color:var(--neon-cyan); margin-bottom:4px;">${n.date}</div>
      <div style="font-size:13px; color:#fff;">${n.text}</div>
      <i class="fas fa-times note-delete" onclick="deleteNote(${i})"></i>
    </div>
  `).join('');
}

function deleteNote(i) {
  let notes = JSON.parse(localStorage.getItem('cyberNotes') || '[]');
  notes.splice(i, 1);
  localStorage.setItem('cyberNotes', JSON.stringify(notes));
  loadNotes();
}

function clearNotes() {
  localStorage.removeItem('cyberNotes');
  loadNotes();
}

// --- PARTICLE BACKGROUND SYSTEM ---
function initCanvas() {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  
  class Particle {
    constructor() {
      this.x = Math.random() * w;
      this.y = Math.random() * h;
      this.vx = (Math.random() - 0.5) * 0.5;
      this.vy = (Math.random() - 0.5) * 0.5;
      this.size = Math.random() * 2;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if(this.x < 0 || this.x > w) this.vx *= -1;
      if(this.y < 0 || this.y > h) this.vy *= -1;
    }
    draw() {
      ctx.fillStyle = 'rgba(0, 243, 255, 0.5)';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function init() {
    resize();
    for(let i=0; i<60; i++) particles.push(new Particle());
  }

  function animate() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach((p, index) => {
      p.update();
      p.draw();
      // Draw connections
      for(let j=index; j<particles.length; j++) {
        const dx = p.x - particles[j].x;
        const dy = p.y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 100) {
          ctx.strokeStyle = `rgba(0, 243, 255, ${0.1 - dist/1000})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    });
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', resize);
  init();
  animate();
}
</script>

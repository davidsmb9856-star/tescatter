<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00f3ff">
<title>🔷 KENDALA ALL - NEON SYSTEM 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ================= VARIABLES & RESET ================= */
:root {
  --primary: #00f3ff;
  --primary-dim: #00a8cc;
  --secondary: #bc13fe; /* Aksen ungu cyberpunk untuk kontras */
  --bg-dark: #050a10;
  --bg-panel: rgba(10, 25, 45, 0.75);
  --glass-border: 1px solid rgba(0, 243, 255, 0.2);
  --text-main: #e0faff;
  --text-muted: #8aaec4;
  --glow: 0 0 15px rgba(0, 243, 255, 0.4);
  --font-head: 'Orbitron', sans-serif;
  --font-body: 'Rajdhani', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font-body);
  background: var(--bg-dark);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
}

/* ================= BACKGROUND FX ================= */
.cyber-grid {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background-image: 
    linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  transform: perspective(500px) rotateX(60deg) translateY(-100px) scale(2);
  animation: gridMove 20s linear infinite;
  z-index: -2;
  pointer-events: none;
}
@keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 40px; } }

.ambient-light {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 80vw; height: 80vh;
  background: radial-gradient(circle, rgba(0, 243, 255, 0.08) 0%, transparent 70%);
  z-index: -1; pointer-events: none;
}

.scanline {
  position: fixed; top: 0; left: 0; width: 100%; height: 5px;
  background: rgba(0, 243, 255, 0.3);
  opacity: 0.4;
  animation: scan 6s linear infinite;
  z-index: 9999; pointer-events: none;
  box-shadow: 0 0 10px var(--primary);
}
@keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

/* ================= LAYOUT ================= */
.container { max-width: 1000px; margin: 0 auto; padding: 20px; position: relative; z-index: 2; }

/* HEADER */
header { text-align: center; margin-bottom: 40px; position: relative; padding-top: 20px; }
.logo-area { display: inline-block; position: relative; }
.main-title {
  font-family: var(--font-head);
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(to right, #fff, var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
  margin-bottom: 5px;
}
.subtitle { color: var(--primary-dim); font-size: 14px; letter-spacing: 4px; text-transform: uppercase; }
.status-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(0, 243, 255, 0.1); border: 1px solid var(--primary);
  padding: 5px 15px; border-radius: 20px; margin-top: 15px;
  font-size: 12px; font-weight: 700; color: var(--primary);
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
}
.dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

.back-btn {
  position: absolute; left: 0; top: 20px;
  color: var(--primary); text-decoration: none;
  border: 1px solid var(--primary-dim); padding: 8px 15px;
  border-radius: 8px; font-weight: 600; font-size: 13px;
  transition: 0.3s; backdrop-filter: blur(5px);
  background: rgba(0,0,0,0.3);
}
.back-btn:hover { background: var(--primary); color: #000; box-shadow: var(--glow); }

/* SEARCH & STATS */
.search-wrapper {
  background: var(--bg-panel); backdrop-filter: blur(15px);
  border: var(--glass-border); border-radius: 16px;
  padding: 20px; margin-bottom: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.search-box { position: relative; margin-bottom: 20px; }
.search-input {
  width: 100%; padding: 15px 20px 15px 50px;
  background: rgba(0,0,0,0.3); border: 1px solid rgba(0, 243, 255, 0.3);
  border-radius: 12px; color: #fff; font-family: var(--font-body); font-size: 16px;
  transition: 0.3s;
}
.search-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); }
.search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); }

.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.stat-card {
  background: rgba(0, 243, 255, 0.05); border: 1px solid rgba(0, 243, 255, 0.1);
  padding: 10px; border-radius: 10px; text-align: center;
}
.stat-num { display: block; font-family: var(--font-head); font-size: 20px; color: var(--primary); font-weight: 700; }
.stat-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

/* CARDS */
.card-list { display: flex; flex-direction: column; gap: 20px; }
.kendala-card {
  background: var(--bg-panel); backdrop-filter: blur(10px);
  border: var(--glass-border); border-radius: 16px;
  overflow: hidden; transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  position: relative;
}
.kendala-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: var(--primary); opacity: 0.7;
}
.kendala-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); border-color: var(--primary); }

.card-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.card-title { font-size: 18px; font-weight: 700; color: #fff; margin-right: 15px; line-height: 1.4; }
.toggle-icon { color: var(--primary); transition: 0.3s; }
.kendala-card.active .toggle-icon { transform: rotate(180deg); }

.card-body {
  max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out;
  background: rgba(0,0,0,0.2);
}
.kendala-card.active .card-body { max-height: 2000px; transition: max-height 0.6s ease-in; }
.card-content { padding: 0 20px 20px 20px; }

/* IMAGES */
.img-container { margin: 15px 0; text-align: center; position: relative; border-radius: 10px; overflow: hidden; border: 1px dashed var(--primary-dim); }
.card-img { max-width: 100%; max-height: 300px; display: block; margin: 0 auto; cursor: zoom-in; transition: 0.3s; }
.card-img:hover { transform: scale(1.02); filter: brightness(1.1); }
.img-badge {
  position: absolute; top: 10px; left: 10px;
  background: rgba(0,0,0,0.7); color: var(--primary);
  padding: 4px 10px; border-radius: 4px; font-size: 10px;
  border: 1px solid var(--primary);
}

/* ANSWERS */
.answer-block {
  background: rgba(255,255,255,0.03); border-left: 3px solid var(--text-muted);
  padding: 15px; margin-bottom: 15px; border-radius: 0 8px 8px 0;
  transition: 0.3s;
}
.answer-block:hover { background: rgba(255,255,255,0.06); border-left-color: var(--primary); }
.answer-label { font-size: 12px; color: var(--primary); font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.answer-text { font-size: 15px; color: #ddd; white-space: pre-wrap; word-break: break-word; }
.answer-text a { color: var(--primary); text-decoration: none; border-bottom: 1px dotted var(--primary); }
.answer-text a:hover { color: #fff; border-bottom-style: solid; }

/* ACTION BUTTONS */
.action-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
.btn-action {
  background: rgba(0, 243, 255, 0.1); border: 1px solid rgba(0, 243, 255, 0.3);
  color: var(--primary); padding: 6px 12px; border-radius: 6px;
  font-size: 12px; cursor: pointer; transition: 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.btn-action:hover { background: var(--primary); color: #000; box-shadow: 0 0 10px var(--primary); }
.btn-link { color: #bc13fe; border-color: rgba(188, 19, 254, 0.4); background: rgba(188, 19, 254, 0.1); }
.btn-link:hover { background: #bc13fe; color: #fff; box-shadow: 0 0 10px #bc13fe; }

/* STICKY NOTES FAB & PANEL */
.fab-sticky {
  position: fixed; bottom: 30px; right: 30px;
  width: 60px; height: 60px; background: var(--primary);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  color: #000; font-size: 24px; cursor: pointer;
  box-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
  transition: 0.3s; z-index: 100;
}
.fab-sticky:hover { transform: scale(1.1) rotate(10deg); }
.fab-sticky span { position: absolute; top: -5px; right: -5px; background: red; color: #fff; font-size: 10px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

.sticky-overlay {
  position: fixed; top: 0; right: -400px; width: 350px; height: 100vh;
  background: rgba(5, 10, 16, 0.95); backdrop-filter: blur(20px);
  border-left: 1px solid var(--primary); z-index: 101;
  transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
  display: flex; flex-direction: column; padding: 20px;
  box-shadow: -10px 0 30px rgba(0,0,0,0.5);
}
.sticky-overlay.open { right: 0; }
.sticky-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
.sticky-input {
  width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: #fff; padding: 10px; border-radius: 8px; resize: none; margin-bottom: 10px;
  font-family: var(--font-body);
}
.note-list { flex: 1; overflow-y: auto; }
.note-item {
  background: rgba(0, 243, 255, 0.05); border: 1px solid rgba(0, 243, 255, 0.2);
  padding: 10px; border-radius: 8px; margin-bottom: 10px; position: relative;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
.note-del { position: absolute; top: 5px; right: 5px; color: #ff4444; cursor: pointer; padding: 5px; }

/* LIGHTBOX */
.lightbox {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); z-index: 2000;
  display: none; align-items: center; justify-content: center;
  flex-direction: column;
}
.lightbox.active { display: flex; animation: fadeIn 0.3s; }
.lb-img { max-width: 90%; max-height: 80vh; border: 2px solid var(--primary); box-shadow: 0 0 30px var(--primary); border-radius: 8px; }
.lb-controls { margin-top: 20px; display: flex; gap: 20px; }
.lb-btn { background: transparent; border: 1px solid #fff; color: #fff; padding: 10px 20px; border-radius: 30px; cursor: pointer; transition: 0.3s; }
.lb-btn:hover { background: #fff; color: #000; }

/* TOAST */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: rgba(0, 243, 255, 0.9); color: #000; padding: 10px 20px;
  border-radius: 30px; font-weight: 700; z-index: 3000;
  transition: 0.4s; opacity: 0;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* LOADING */
.loader { text-align: center; padding: 50px; color: var(--primary); }
.spinner { width: 40px; height: 40px; border: 4px solid rgba(0,243,255,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
@keyframes spin { 100% { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

@media (max-width: 600px) {
  .main-title { font-size: 32px; }
  .sticky-overlay { width: 100%; right: -100%; }
  .stats-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- BACKGROUNDS -->
<div class="cyber-grid"></div>
<div class="ambient-light"></div>
<div class="scanline"></div>

<div class="container">
  <!-- HEADER -->
  <header>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Home</a>
    <div class="logo-area">
      <h1 class="main-title">KENDALA ALL</h1>
      <p class="subtitle">Database Solusi Terpadu v2026</p>
      <div class="status-pill">
        <div class="dot"></div> SYSTEM ONLINE
      </div>
    </div>
  </header>

  <!-- SEARCH SECTION -->
  <div class="search-wrapper">
    <div class="search-box">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Cari ID, Nama, atau Masalah..." onkeyup="filterData()">
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-num" id="countTotal">0</span>
        <span class="stat-lbl">Total Data</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="countPhoto">0</span>
        <span class="stat-lbl">Ada Foto</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="countLink">0</span>
        <span class="stat-lbl">Ada Link</span>
      </div>
    </div>
  </div>

  <!-- CONTENT AREA -->
  <div id="contentArea" class="card-list">
    <div class="loader">
      <div class="spinner"></div>
      <p>Menghubungkan ke Server...</p>
    </div>
  </div>
</div>

<!-- FLOATING ACTION BUTTON -->
<div class="fab-sticky" onclick="toggleSticky()">
  <i class="fas fa-sticky-note"></i>
  <span id="stickyCount">0</span>
</div>

<!-- STICKY PANEL -->
<div class="sticky-overlay" id="stickyPanel">
  <div class="sticky-header">
    <h3 style="color:var(--primary); font-family:var(--font-head)">MY NOTES</h3>
    <i class="fas fa-times" onclick="toggleSticky()" style="cursor:pointer; color:#fff;"></i>
  </div>
  <textarea id="noteInput" class="sticky-input" rows="3" placeholder="Tulis catatan cepat..."></textarea>
  <button class="btn-action" onclick="addNote()" style="width:100%; justify-content:center; margin-bottom:20px;">
    <i class="fas fa-plus"></i> Simpan Catatan
  </button>
  <div class="note-list" id="noteList"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <img src="" class="lb-img" id="lbImg">
  <div class="lb-controls">
    <button class="lb-btn" onclick="copyImage()"><i class="fas fa-copy"></i> Copy Image</button>
    <button class="lb-btn" onclick="document.getElementById('lightbox').classList.remove('active')"><i class="fas fa-times"></i> Close</button>
  </div>
</div>

<!-- TOAST NOTIFICATION -->
<div id="toast" class="toast">Copied to Clipboard!</div>

<script>
// CONFIGURATION
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const URL_DATA = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=C2:F300`;

let rawData = [];
let filteredData = [];
let stickyNotes = JSON.parse(localStorage.getItem('notes_2026')) || [];

// INITIALIZATION
document.addEventListener('DOMContentLoaded', () => {
  fetchData();
  renderSticky();
});

// FETCH DATA
async function fetchData() {
  try {
    const res = await fetch(URL_DATA);
    const txt = await res.text();
    const json = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    
    rawData = json.table.rows.map(row => {
      const c = row.c;
      return {
        title: c[0]?.v || '',
        ans1: c[1]?.v || '',
        ans2: c[2]?.v || '',
        ans3: c[3]?.v || ''
      };
    }).filter(x => x.title !== '');

    filteredData = [...rawData];
    renderCards(filteredData);
    updateStats();
  } catch (err) {
    document.getElementById('contentArea').innerHTML = `<div style="text-align:center; color:#ff4444; padding:20px;">Gagal memuat data. Cek koneksi internet.<br><small>${err.message}</small></div>`;
  }
}

// RENDER CARDS
function renderCards(data) {
  const container = document.getElementById('contentArea');
  if(data.length === 0) {
    container.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-muted);">Tidak ada data ditemukan.</div>';
    return;
  }

  container.innerHTML = data.map((item, idx) => {
    // Logic for images in title or answers
    const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif))/gi;
    let mainImg = item.title.match(imgRegex) || item.ans1?.match(imgRegex);
    mainImg = mainImg ? mainImg[0] : null;
    
    // Clean title from URL if exists
    let cleanTitle = item.title.replace(imgRegex, '').trim();

    return `
    <div class="kendala-card" onclick="toggleCard(this)">
      <div class="card-header">
        <div class="card-title">${idx + 1}. ${escapeHtml(cleanTitle)}</div>
        <i class="fas fa-chevron-down toggle-icon"></i>
      </div>
      <div class="card-body">
        <div class="card-content">
          ${mainImg ? `
            <div class="img-container">
              <span class="img-badge"><i class="fas fa-image"></i> PREVIEW</span>
              <img src="${mainImg}" class="card-img" onclick="openLightbox('${mainImg}', event)" onerror="this.style.display='none'">
            </div>` : ''}
          
          ${renderAnswerBlock('SOLUSI UTAMA', item.ans1)}
          ${renderAnswerBlock('SOLUSI ALTERNATIF', item.ans2)}
          ${renderAnswerBlock('CATATAN TAMBAHAN', item.ans3)}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderAnswerBlock(label, text) {
  if (!text) return '';
  
  // Extract links
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  const links = text.match(urlRegex) || [];
  
  // Format text with clickable links
  let formattedText = escapeHtml(text).replace(urlRegex, url => 
    `<a href="${url}" target="_blank" onclick="event.stopPropagation()">${url.substring(0,30)}...</a>`
  );

  // Remove image URLs from text display if present
  const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif))/gi;
  formattedText = formattedText.replace(imgRegex, '[FOTO TERLAMPIR]');

  return `
    <div class="answer-block">
      <div class="answer-label"><i class="fas fa-terminal"></i> ${label}</div>
      <div class="answer-text">${formattedText}</div>
      <div class="action-row">
        <button class="btn-action" onclick="copyText('${escapeJs(text)}', event)">
          <i class="fas fa-copy"></i> Copy Text
        </button>
        <button class="btn-action" onclick="addToSticky('${escapeJs(text)}', event)">
          <i class="fas fa-thumbtack"></i> Save Note
        </button>
        ${links.length > 0 ? `
          <a href="${links[0]}" target="_blank" class="btn-action btn-link" onclick="event.stopPropagation()">
            <i class="fas fa-external-link-alt"></i> Open Link
          </a>` : ''}
      </div>
    </div>
  `;
}

// UTILITIES
function toggleCard(card) {
  card.classList.toggle('active');
}

function filterData() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredData = rawData.filter(item => 
    (item.title && item.title.toLowerCase().includes(q)) ||
    (item.ans1 && item.ans1.toLowerCase().includes(q))
  );
  renderCards(filteredData);
}

function updateStats() {
  document.getElementById('countTotal').innerText = rawData.length;
  // Simple logic for stats
  const withPhoto = rawData.filter(i => /http.*\.(jpg|png)/i.test(i.title+i.ans1)).length;
  document.getElementById('countPhoto').innerText = withPhoto;
  document.getElementById('countLink').innerText = rawData.filter(i => /http/i.test(i.ans1+i.ans2)).length;
}

function escapeHtml(text) {
  if(!text) return '';
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function escapeJs(text) {
  if(!text) return '';
  return text.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n');
}

// CLIPBOARD & ACTIONS
function copyText(text, e) {
  e.stopPropagation();
  navigator.clipboard.writeText(text).then(() => showToast('✅ Teks berhasil disalin!'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// LIGHTBOX
function openLightbox(src, e) {
  if(e) e.stopPropagation();
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox(e) {
  if(e.target.id === 'lightbox' || e.target.closest('.lb-btn')) 
    document.getElementById('lightbox').classList.remove('active');
}
function copyImage() {
  const img = document.getElementById('lbImg').src;
  navigator.clipboard.writeText(img).then(() => showToast('📋 URL Gambar disalin!'));
}

// STICKY NOTES LOGIC
function toggleSticky() {
  document.getElementById('stickyPanel').classList.toggle('open');
}

function addNote(content = null) {
  const input = document.getElementById('noteInput');
  const text = content || input.value.trim();
  if(!text) return;
  
  stickyNotes.unshift({ text: text, date: new Date().toLocaleDateString() });
  localStorage.setItem('notes_2026', JSON.stringify(stickyNotes));
  input.value = '';
  renderSticky();
  if(!content) showToast('📝 Catatan disimpan');
}

function deleteNote(idx) {
  stickyNotes.splice(idx, 1);
  localStorage.setItem('notes_2026', JSON.stringify(stickyNotes));
  renderSticky();
}

function renderSticky() {
  const list = document.getElementById('noteList');
  document.getElementById('stickyCount').innerText = stickyNotes.length;
  
  list.innerHTML = stickyNotes.map((note, i) => `
    <div class="note-item">
      <i class="fas fa-trash note-del" onclick="deleteNote(${i})"></i>
      <div style="font-size:10px; color:var(--primary-dim); margin-bottom:5px;">${note.date}</div>
      <div style="white-space:pre-wrap; font-size:14px;">${escapeHtml(note.text)}</div>
      <button class="btn-action" style="margin-top:8px; width:100%" onclick="copyText(\`${escapeJs(note.text)}\`, event)">
        <i class="fas fa-copy"></i> Copy
      </button>
    </div>
  `).join('');
}
</script>
</body>
</html>

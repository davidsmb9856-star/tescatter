<!DOCTYPE html>
<html lang="id" data-theme="cool-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#030712">
<meta name="description" content="LINE TOGEL Foto Gallery - Clean Blue Interface">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<style>
/* ✨ BLUE COOL THEME SYSTEM ✨ */
:root, [data-theme="cool-dark"] {
--bg-void: #02050a;
--bg-surface: #0a1122;
--bg-elevated: #0f172a;
--bg-glass: rgba(10, 18, 38, 0.82);
--bg-card: rgba(14, 24, 48, 0.94);
--bg-card-hover: rgba(18, 30, 58, 0.96);

--text-primary: #f0f9ff;
--text-secondary: #93c5fd;
--text-muted: #64748b;
--text-accent: #38bdf8;

--blue-ice: #e0f2fe;
--blue-sky: #38bdf8;
--blue-electric: #00d4ff;
--blue-deep: #0055ff;
--blue-navy: #082f49;

--border-subtle: rgba(56, 189, 248, 0.22);
--border-glow: rgba(0, 212, 255, 0.55);
--border-hover: rgba(56, 189, 248, 0.7);

--glow-soft: 0 0 20px rgba(0, 212, 255, 0.35);
--glow-medium: 0 0 28px rgba(0, 212, 255, 0.55), 0 0 50px rgba(56, 189, 248, 0.25);
--glow-strong: 0 0 35px rgba(0, 212, 255, 0.7), 0 0 80px rgba(56, 189, 248, 0.4);

--radius-sm: 8px;
--radius-md: 14px;
--radius-lg: 20px;
--radius-xl: 28px;

--font-display: 'Space Grotesk', system-ui, sans-serif;
--font-body: 'Inter', system-ui, sans-serif;

--ease: cubic-bezier(0.4, 0, 0.2, 1);
--transition: all 0.28s var(--ease);
--transition-bounce: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* LIGHT MODE (Cool Blue Tint) */
[data-theme="cool-light"] {
--bg-void: #f8fafc;
--bg-surface: #ffffff;
--bg-elevated: #f1f5f9;
--bg-glass: rgba(255, 255, 255, 0.85);
--bg-card: #ffffff;
--bg-card-hover: #f8fafc;

--text-primary: #0f172a;
--text-secondary: #334155;
--text-muted: #64748b;
--text-accent: #0284c7;

--blue-ice: #0284c7;
--blue-sky: #0ea5e9;
--blue-electric: #00aaff;
--blue-deep: #0369a1;
--blue-navy: #e0f2fe;

--border-subtle: rgba(14, 165, 233, 0.25);
--border-glow: rgba(2, 132, 199, 0.55);
--border-hover: rgba(14, 165, 233, 0.75);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 20px; }
body {
font-family: var(--font-body);
background: var(--bg-void);
color: var(--text-primary);
min-height: 100vh; min-height: 100dvh;
line-height: 1.6;
overflow-x: hidden;
position: relative;
transition: background-color 0.35s var(--ease), color 0.35s var(--ease);
-webkit-font-smoothing: antialiased;
}

/* ✨ BACKGROUND EFFECTS ✨ */
.bg-gradient {
position: fixed; inset: 0; z-index: -3;
background: radial-gradient(100% 100% at 50% 0%, rgba(0, 212, 255, 0.08) 0%, transparent 60%),
radial-gradient(80% 50% at 20% 80%, rgba(56, 189, 248, 0.06) 0%, transparent 65%),
radial-gradient(70% 40% at 80% 90%, rgba(0, 85, 255, 0.05) 0%, transparent 70%);
animation: drift 35s ease-in-out infinite alternate;
}
@keyframes drift {
0%, 100% { transform: translate(0, 0) scale(1); }
50% { transform: translate(-1.5%, 1.2%) scale(1.02); }
}

.grid-bg {
position: fixed; inset: 0; z-index: -2; pointer-events: none; opacity: 0.35;
background-image: linear-gradient(var(--border-subtle) 1px, transparent 1px),
linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
background-size: 40px 40px;
mask-image: radial-gradient(ellipse at 50% 30%, black 30%, transparent 80%);
animation: gridShift 40s linear infinite;
}
@keyframes gridShift { to { background-position: 40px 40px; } }

.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
position: absolute; width: 2px; height: 2px; border-radius: 50%;
background: var(--blue-electric); box-shadow: 0 0 10px var(--blue-electric);
opacity: 0; animation: float 22s infinite ease-in-out;
}
.particle:nth-child(2n) { background: var(--blue-sky); box-shadow: 0 0 12px var(--blue-sky); animation-duration: 28s; animation-delay: -5s; }
.particle:nth-child(3n) { background: #fff; opacity: 0.6; box-shadow: 0 0 8px #fff; animation-duration: 32s; animation-delay: -12s; }
@keyframes float {
0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
10% { opacity: 0.7; }
90% { opacity: 0.7; }
100% { transform: translateY(-10vh) rotate(180deg); opacity: 0; }
}

.noise {
position: fixed; inset: 0; z-index: -1; opacity: 0.03; pointer-events: none;
background-image: url("image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ✨ APP SHELL ✨ */
.app-shell { max-width: 1520px; margin: 0 auto; padding: 20px; position: relative; }

/* Top Navigation */
.top-nav {
position: sticky; top: 12px; z-index: 100;
background: var(--bg-glass);
border: 1px solid var(--border-subtle);
backdrop-filter: blur(16px);
border-radius: var(--radius-lg);
padding: 14px 22px;
display: flex; align-items: center; justify-content: space-between; gap: 18px;
margin-bottom: 32px;
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
transition: var(--transition);
}
.top-nav:hover { border-color: var(--border-glow); box-shadow: 0 8px 40px rgba(0, 100, 200, 0.2); }

.brand { display: flex; align-items: center; gap: 12px; white-space: nowrap; }
.logo-icon {
width: 38px; height: 38px; background: linear-gradient(135deg, var(--blue-electric), var(--blue-deep));
border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
font-size: 18px; color: var(--bg-void); box-shadow: var(--glow-soft);
}
.brand h1 { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }

/* Search */
.search-wrapper {
position: relative; flex: 1; max-width: 420px; display: none;
}
@media (min-width: 768px) { .search-wrapper { display: block; } }
.search-input {
width: 100%; padding: 10px 16px 10px 38px;
background: var(--bg-elevated); border: 1px solid var(--border-subtle);
border-radius: var(--radius-md); color: var(--text-primary); font-family: var(--font-body);
font-size: 14px; transition: var(--transition);
}
.search-input:focus { outline: none; border-color: var(--blue-electric); box-shadow: var(--glow-soft); background: var(--bg-surface); }
.search-icon-btn {
position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
color: var(--text-muted); pointer-events: none; transition: var(--transition);
}
.search-input:focus + .search-icon-btn { color: var(--blue-electric); }

/* Controls */
.nav-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
.ctrl-btn {
width: 36px; height: 36px; background: var(--bg-elevated); border: 1px solid var(--border-subtle);
border-radius: var(--radius-sm); color: var(--text-secondary); cursor: pointer;
transition: var(--transition); display: flex; align-items: center; justify-content: center;
}
.ctrl-btn:hover { border-color: var(--blue-electric); color: var(--blue-electric); box-shadow: var(--glow-soft); }

.view-switch {
display: flex; background: var(--bg-elevated); border: 1px solid var(--border-subtle);
border-radius: var(--radius-sm); overflow: hidden;
}
.view-switch button {
padding: 8px 12px; background: transparent; border: none; color: var(--text-muted);
cursor: pointer; transition: var(--transition); font-size: 13px;
}
.view-switch button.active, .view-switch button:hover { background: var(--blue-navy); color: var(--blue-electric); }

.filter-select {
padding: 8px 12px; background: var(--bg-elevated); border: 1px solid var(--border-subtle);
border-radius: var(--radius-sm); color: var(--text-secondary); font-family: var(--font-body);
font-size: 13px; cursor: pointer; transition: var(--transition); appearance: none;
background-image: url("image/svg+xml,%3Csvg fill='%2338bdf8' viewBox='0 0 24 24'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
background-repeat: no-repeat; background-position: right 8px center; background-size: 14px; padding-right: 28px;
}
.filter-select:focus { outline: none; border-color: var(--blue-electric); }

/* Mobile Search Toggle */
.mobile-search-btn { display: none; }
@media (max-width: 767px) {
.mobile-search-btn { display: flex; }
.search-wrapper { position: absolute; top: 100%; left: 12px; right: 12px; max-width: none; margin-top: 8px; display: none; box-shadow: var(--glow-soft); }
.search-wrapper.open { display: block; animation: slideDown 0.25s var(--ease); }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.brand h1 { font-size: 18px; }
.nav-controls { gap: 8px; }
}

/* Status Bar */
.status-bar {
display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
padding: 10px 16px; background: var(--bg-glass); border-radius: var(--radius-md);
border: 1px solid var(--border-subtle); backdrop-filter: blur(10px);
}
.status-dot { width: 8px; height: 8px; background: var(--blue-electric); border-radius: 50%; box-shadow: 0 0 8px var(--blue-electric); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(1.2)} }
.status-text { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

/* Gallery Grid */
.gallery-grid {
display: grid; gap: 18px;
grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}
.gallery-grid.masonry { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
.gallery-grid.list { grid-template-columns: 1fr; }

/* Photo Card - Redesign */
.card {
position: relative; background: var(--bg-card); border: 1px solid var(--border-subtle);
border-radius: var(--radius-lg); overflow: hidden; transition: var(--transition-bounce);
box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}
.card:hover { transform: translateY(-6px); border-color: var(--blue-electric); box-shadow: var(--glow-medium); background: var(--bg-card-hover); }

.card-image {
width: 100%; height: 280px; background: radial-gradient(circle, #0f2542 0%, #06122a 100%);
position: relative; overflow: hidden; cursor: pointer;
}
.gallery-grid.list .card { display: flex; flex-direction: row; height: 160px; }
.gallery-grid.list .card-image { width: 240px; height: 100%; }
@media (max-width: 640px) { .gallery-grid.list .card { flex-direction: column; height: auto; } .gallery-grid.list .card-image { width: 100%; height: 220px; } }

.card-image img {
width: 100%; height: 100%; object-fit: contain; transition: transform 0.4s var(--ease), filter 0.3s var(--ease);
filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
}
.card:hover .card-image img { transform: scale(1.04); filter: drop-shadow(0 8px 20px rgba(0, 212, 255, 0.35)); }

.card-overlay {
position: absolute; inset: 0; background: linear-gradient(180deg, transparent 40%, rgba(2, 5, 10, 0.85) 100%);
opacity: 0; transition: opacity 0.3s var(--ease); display: flex; flex-direction: column; justify-content: flex-end; padding: 16px;
}
.card:hover .card-overlay { opacity: 1; }

.card-title {
font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-primary);
margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.6); line-height: 1.35;
}
.card-meta { font-size: 12px; color: var(--blue-sky); opacity: 0.9; display: flex; align-items: center; gap: 6px; }

.fav-btn {
position: absolute; top: 10px; right: 10px; z-index: 5; width: 32px; height: 32px;
background: rgba(10, 17, 34, 0.75); backdrop-filter: blur(6px); border: 1px solid var(--border-subtle);
border-radius: 50%; color: var(--text-muted); cursor: pointer; transition: var(--transition);
display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.fav-btn:hover, .fav-btn.active { background: var(--blue-electric); color: var(--bg-void); border-color: var(--blue-electric); box-shadow: 0 0 12px rgba(0,212,255,0.5); }

.card-actions {
padding: 12px 14px; display: flex; gap: 8px; border-top: 1px solid var(--border-subtle);
}
.action-pill {
flex: 1; height: 36px; background: rgba(56, 189, 248, 0.12); border: 1px solid var(--border-subtle);
border-radius: var(--radius-sm); color: var(--blue-sky); font-size: 11px; font-weight: 600;
cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 6px;
}
.action-pill:hover { background: rgba(0, 212, 255, 0.28); border-color: var(--blue-electric); color: var(--blue-electric); transform: translateY(-2px); }

/* Loading & Empty States */
.loading, .empty-state {
grid-column: 1 / -1; text-align: center; padding: 48px 20px;
color: var(--text-muted);
}
.spinner {
width: 40px; height: 40px; border: 3px solid var(--border-subtle); border-top-color: var(--blue-electric);
border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: var(--font-display); font-size: 13px; letter-spacing: 1px; }

/* Lightbox Modal */
.lightbox {
position: fixed; inset: 0; background: rgba(2, 5, 10, 0.96); backdrop-filter: blur(24px);
z-index: 1000; display: none; align-items: center; justify-content: center; padding: 24px;
opacity: 0; transition: opacity 0.3s var(--ease);
}
.lightbox.active { display: flex; opacity: 1; }
.lightbox-content {
max-width: 1100px; width: 100%; max-height: 90vh; display: flex; flex-direction: column;
background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl);
overflow: hidden; box-shadow: var(--glow-strong), 0 20px 60px rgba(0,0,0,0.5);
animation: popIn 0.35s var(--ease-bounce);
}
@keyframes popIn { from { transform: scale(0.96) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

.lb-header {
display: flex; justify-content: space-between; align-items: center; padding: 16px 20px;
border-bottom: 1px solid var(--border-subtle); background: rgba(56, 189, 248, 0.08);
}
.lb-title { font-family: var(--font-display); font-size: 16px; color: var(--blue-sky); }
.lb-close {
width: 32px; height: 32px; background: transparent; border: 1px solid var(--border-subtle);
border-radius: 50%; color: var(--text-muted); cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center;
}
.lb-close:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.1); }

.lb-body {
flex: 1; display: flex; background: radial-gradient(circle at center, #0d2036 0%, #040c1a 100%);
overflow: hidden;
}
.lb-image-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }
.lb-image { max-width: 100%; max-height: 75vh; object-fit: contain; border-radius: var(--radius-sm); cursor: zoom-in; transition: transform 0.3s var(--ease); }
.lb-image.zoomed { transform: scale(1.6); cursor: zoom-out; }

.lb-info {
width: 280px; background: var(--bg-elevated); border-left: 1px solid var(--border-subtle);
padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto;
}
@media (max-width: 850px) { .lb-info { width: 100%; max-height: 35vh; border-left: none; border-top: 1px solid var(--border-subtle); flex-direction: row; flex-wrap: wrap; } }

.info-block h4 { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 1px; }
.info-block p { font-size: 14px; color: var(--text-primary); }

.lb-actions { display: flex; gap: 8px; margin-top: auto; flex-wrap: wrap; }
@media (max-width: 850px) { .lb-actions { margin-top: 12px; justify-content: center; } }

/* Toast */
.toast {
position: fixed; bottom: 24px; right: 24px; background: var(--bg-glass); border: 1px solid var(--border-glow);
color: var(--blue-electric); padding: 12px 20px; border-radius: var(--radius-md); font-size: 13px; font-weight: 600;
z-index: 1100; display: flex; align-items: center; gap: 10px; box-shadow: var(--glow-medium);
transform: translateY(30px); opacity: 0; pointer-events: none; transition: all 0.35s var(--ease-bounce);
backdrop-filter: blur(12px);
}
.toast.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
.toast i { font-size: 16px; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-void); }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--blue-electric), var(--blue-sky)); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, var(--blue-sky), #38bdf8); }

::selection { background: rgba(0, 212, 255, 0.35); color: var(--text-primary); }
:focus-visible { outline: 2px solid var(--blue-electric); outline-offset: 3px; }
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="grid-bg"></div>
<div class="particles" id="particles"></div>
<div class="noise"></div>

<div class="app-shell">
<!-- Top Navigation -->
<header class="top-nav">
<div class="brand">
<div class="logo-icon">⚡</div>
<h1>FOTO GALLERY</h1>
</div>

<div class="search-wrapper" id="searchWrapper">
<input type="search" class="search-input" id="searchInput" placeholder="Cari foto berdasarkan judul...">
<i class="fas fa-search search-icon-btn"></i>
</div>

<nav class="nav-controls">
<button class="ctrl-btn mobile-search-btn" id="mobileSearchToggle" aria-label="Toggle Search"><i class="fas fa-search"></i></button>
<button class="ctrl-btn" id="themeToggle" aria-label="Toggle Theme"><i class="fas fa-moon"></i></button>
<div class="view-switch" id="viewSwitch">
<button class="active" data-view="grid" aria-label="Grid View"><i class="fas fa-th"></i></button>
<button data-view="masonry" aria-label="Masonry View"><i class="fas fa-th-large"></i></button>
<button data-view="list" aria-label="List View"><i class="fas fa-list"></i></button>
</div>
<select class="filter-select" id="filterSelect">
<option value="all">🔵 Semua</option>
<option value="recent">🕐 Terbaru</option>
<option value="favorites">⭐ Favorit</option>
</select>
</nav>
</header>

<!-- Main Content -->
<main>
<div class="status-bar">
<div class="status-dot"></div>
<div class="status-text" id="statusText">⚡ Memuat data...</div>
</div>

<div class="loading" id="loading">
<div class="spinner"></div>
<div class="loading-text">MENGHUBUNGKAN KE SERVER...</div>
</div>

<div class="gallery-grid" id="galleryGrid" role="list"></div>
</main>
</div>

<!-- Lightbox Modal -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
<div class="lightbox-content">
<div class="lb-header">
<h3 class="lb-title" id="lbTitle">Foto Detail</h3>
<button class="lb-close" id="lbClose" aria-label="Tutup"><i class="fas fa-times"></i></button>
</div>
<div class="lb-body">
<div class="lb-image-container">
<img src="" alt="" class="lb-image" id="lbImage">
</div>
<div class="lb-info">
<div class="info-block"><h4>Judul</h4><p id="infoTitle">-</p></div>
<div class="info-block"><h4>Ukuran File</h4><p id="infoSize">-</p></div>
<div class="info-block"><h4>Format</h4><p id="infoFormat">-</p></div>
<div class="lb-actions">
<button class="action-pill" id="lbCopy"><i class="fas fa-copy"></i> Copy</button>
<button class="action-pill" id="lbDownload"><i class="fas fa-download"></i> Download</button>
<button class="action-pill" id="lbShare"><i class="fas fa-share-alt"></i> Share</button>
</div>
</div>
</div>
</div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="status"><i class="fas fa-bolt"></i><span id="toastMsg">Berhasil</span></div>

<script>
// State & Config
const CONFIG = {
sheetId: '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0',
gid: '1246502038'
};

const state = {
photos: [], favorites: JSON.parse(localStorage.getItem('ltg_favs')||'[]'),
theme: localStorage.getItem('ltg_theme')||'cool-dark',
view: localStorage.getItem('ltg_view')||'grid',
filter: 'all', search: '',
currentImg: null
};

// DOM Elements
const $ = id => document.getElementById(id);
const grid = $('galleryGrid'), loading = $('loading'), statusText = $('statusText');
const searchInput = $('searchInput'), searchWrapper = $('searchWrapper');
const lightbox = $('lightbox'), lbImage = $('lbImage'), lbTitle = $('lbTitle');

// Init
document.addEventListener('DOMContentLoaded', () => {
applyTheme(); applyView(); initParticles(); initEvents(); fetchPhotos();
});

// Theme
function applyTheme() {
document.documentElement.setAttribute('data-theme', state.theme);
$('themeToggle').innerHTML = state.theme === 'cool-dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
}
$('themeToggle').addEventListener('click', () => {
state.theme = state.theme === 'cool-dark' ? 'cool-light' : 'cool-dark';
localStorage.setItem('ltg_theme', state.theme);
applyTheme(); showToast(state.theme === 'cool-dark' ? '🌙 Mode Gelap' : '☀️ Mode Terang');
});

// View
function applyView() {
grid.className = `gallery-grid ${state.view}`;
document.querySelectorAll('.view-switch button').forEach(b => b.classList.toggle('active', b.dataset.view === state.view));
}
document.querySelectorAll('.view-switch button').forEach(btn => btn.addEventListener('click', () => {
state.view = btn.dataset.view;
localStorage.setItem('ltg_view', state.view);
applyView(); renderGallery();
}));

// Mobile Search
$('mobileSearchToggle').addEventListener('click', () => searchWrapper.classList.toggle('open'));

// Events
function initEvents() {
searchInput.addEventListener('input', e => { state.search = e.target.value.toLowerCase().trim(); applyFilters(); });
$('filterSelect').addEventListener('change', e => { state.filter = e.target.value; applyFilters(); });

$('lbClose').addEventListener('click', closeModal);
lightbox.addEventListener('click', e => { if(e.target === lightbox) closeModal(); });
lbImage.addEventListener('click', e => e.currentTarget.classList.toggle('zoomed'));

// Lightbox Actions
$('lbCopy').addEventListener('click', () => state.currentImg && copyPhoto(state.currentImg));
$('lbDownload').addEventListener('click', () => state.currentImg && downloadPhoto(state.currentImg, $('infoTitle').textContent));
$('lbShare').addEventListener('click', () => state.currentImg && sharePhoto(state.currentImg, $('infoTitle').textContent));

// Keyboard
document.addEventListener('keydown', e => {
if(e.key === 'Escape') closeModal();
if((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); searchInput.focus(); }
if(e.key === 'd') { e.preventDefault(); $('themeToggle').click(); }
});
}

// Particles
function initParticles() {
const c = $('particles'); if(!c) return;
for(let i=0;i<60;i++){const p=document.createElement('div');p.className='particle';
p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';
p.style.animationDelay=Math.random()*25+'s';p.style.animationDuration=(18+Math.random()*20)+'s';
setTimeout(()=>p.classList.add('active'),Math.random()*1500);c.appendChild(p);}
}

// Fetch
async function fetchPhotos() {
loading.style.display = 'block'; grid.innerHTML = ''; statusText.textContent = '⚡ Menghubungkan ke server...';
try {
let photos = [];
try {
const res = await fetch(`https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/gviz/tq?tqx=out:json&gid=${CONFIG.gid}&range=C2:D150`);
const text = await res.text();
const json = JSON.parse(text.substring(47).slice(0,-2));
photos = json.table.rows.filter(r=>r.c?.[0]?.v && r.c?.[1]?.v).map((r,i)=>({judul:r.c[0].v, foto:r.c[1].v, ts:Date.now()-i*1000}));
}catch(e){
const csv = await(await fetch(`https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/export?format=csv&gid=${CONFIG.gid}&range=C2:D150`)).text();
photos = csv.split('\n').map(r=>r.split(',')).filter(r=>r[0]?.trim()&&r[1]?.trim()).map((r,i)=>({judul:r[0].replace(/"/g,'').trim(), foto:r[1].replace(/"/g,'').trim(), ts:Date.now()-i*1000}));
}
state.photos = photos;
loading.style.display = 'none';
applyFilters();
}catch(err){
console.error(err); loading.style.display = 'none';
grid.innerHTML = `<div class="empty-state"><i class="fas fa-wifi" style="font-size:32px;margin-bottom:12px;color:#ef4444"></i><h3 style="color:var(--text-primary);margin-bottom:8px">Koneksi Gagal</h3><p>Periksa jaringan atau publikasi Google Sheets</p></div>`;
statusText.textContent = '❌ Koneksi gagal';
}
}

// Render
function applyFilters() {
let list = [...state.photos];
if(state.filter==='favorites') list = list.filter(p=>state.favorites.includes(p.foto));
if(state.filter==='recent') list.sort((a,b)=>b.ts-a.ts);
if(state.search) list = list.filter(p=>p.judul.toLowerCase().includes(state.search));
renderGallery(list);
statusText.textContent = `⚡ Menampilkan ${list.length} foto`;
}

function renderGallery(list=state.photos) {
grid.innerHTML = '';
if(!list.length) { grid.innerHTML = `<div class="empty-state"><i class="fas fa-search" style="font-size:32px;margin-bottom:12px"></i><h3 style="color:var(--text-primary);margin-bottom:8px">Tidak Ditemukan</h3><p>Coba kata kunci atau filter lain</p></div>`; return; }
list.forEach((photo, i) => {
const isFav = state.favorites.includes(photo.foto);
const card = document.createElement('div');
card.className = 'card'; card.setAttribute('role','listitem');
card.innerHTML = `
<div class="card-image">
<button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${photo.foto}',this)" aria-label="Favorit">
<i class="fas fa-heart"></i>
</button>
<img src="${photo.foto}" alt="${photo.judul}" loading="lazy" onclick="openLightbox('${photo.foto}','${photo.judul.replace(/'/g,"\\'")}')" style="cursor:zoom-in">
<div class="card-overlay">
<div class="card-title">${photo.judul}</div>
<div class="card-meta"><i class="fas fa-hashtag"></i> #${i+1} • Klik untuk memperbesar</div>
</div>
</div>
<div class="card-actions">
<button class="action-pill" onclick="copyPhoto('${photo.foto}')" title="Salin"><i class="fas fa-copy"></i> Copy</button>
<button class="action-pill" onclick="downloadPhoto('${photo.foto}','${photo.judul.replace(/'/g,"\\'")}')" title="Unduh"><i class="fas fa-download"></i> Unduh</button>
<button class="action-pill" onclick="sharePhoto('${photo.foto}','${photo.judul.replace(/'/g,"\\'")}')" title="Bagikan"><i class="fas fa-share-alt"></i> Share</button>
</div>`;
grid.appendChild(card);
});
}

// Actions
window.toggleFav = (url, btn) => {
const idx = state.favorites.indexOf(url);
if(idx > -1) { state.favorites.splice(idx,1); btn.classList.remove('active'); showToast('❌ Dihapus dari favorit'); }
else { state.favorites.push(url); btn.classList.add('active'); showToast('⭐ Ditambahkan ke favorit'); }
localStorage.setItem('ltg_favs', JSON.stringify(state.favorites));
if(state.filter==='favorites') applyFilters();
};

window.openLightbox = (url, title) => {
state.currentImg = url; lbTitle.textContent = title; lbImage.src = url; lbImage.classList.remove('zoomed');
$('infoTitle').textContent = title; $('infoFormat').textContent = url.split('.').pop().split('?')[0].toUpperCase() || 'IMG';
$('infoSize').textContent = 'Memuat...';
lightbox.classList.add('active'); document.body.style.overflow = 'hidden';

// Fetch size
fetch(url).then(r=>r.blob()).then(b=>$('infoSize').textContent = (b.size/1024).toFixed(1)+' KB').catch(()=>$('infoSize').textContent = '-');
};
function closeModal() { lightbox.classList.remove('active'); document.body.style.overflow = ''; state.currentImg = null; }

window.copyPhoto = async (url) => {
try { const b = await (await fetch(url)).blob(); await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]); showToast('✅ Tersalin ke clipboard'); }
catch { showToast('⚠️ Buka gambar lalu klik kanan > Copy Image'); }
};

window.downloadPhoto = (url, title) => {
const a = document.createElement('a'); a.href = url;
a.download = `${title.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`;
document.body.appendChild(a); a.click(); document.body.removeChild(a);
showToast('⬇️ Proses unduh dimulai');
};

window.sharePhoto = async (url, title) => {
if(navigator.share) {
try { const b = await (await fetch(url)).blob();
await navigator.share({title, text:'Lihat foto ini:', files:[new File([b], `${title}.jpg`, {type:b.type})]});
showToast('🔗 Berhasil dibagikan');
}catch(e){ if(e.name!=='AbortError') showToast('❌ Gagal membagikan'); }
} else { await window.copyPhoto(url); showToast('🔗 Link disalin ke clipboard'); }
};

// Toast
function showToast(msg) {
const t = $('toast'); $('toastMsg').textContent = msg;
t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3500);
}
</script>
</body>
</html>

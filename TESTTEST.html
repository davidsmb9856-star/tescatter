<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f3ff">
<title>⚡ CYBER GALLERY - LINE TOGEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* --- CORE VARIABLES --- */
:root {
    --neon-cyan: #00f3ff;
    --neon-blue: #0066ff;
    --neon-purple: #bc13fe;
    --dark-bg: #05050a;
    --card-bg: rgba(10, 20, 40, 0.6);
    --glass-border: rgba(0, 243, 255, 0.3);
    --text-main: #ffffff;
    --text-dim: #8b9bb4;
    --glow-strong: 0 0 15px rgba(0, 243, 255, 0.6);
    --glow-soft: 0 0 30px rgba(0, 102, 255, 0.3);
}

/* --- RESET & BASE --- */
* { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
body {
    font-family: 'Rajdhani', sans-serif;
    background-color: var(--dark-bg);
    color: var(--text-main);
    overflow-x: hidden;
    min-height: 100vh;
}

/* --- BACKGROUND FX --- */
.bg-grid {
    position: fixed; inset: 0; z-index: -2;
    background-image: 
        linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    perspective: 500px;
}
.bg-glow {
    position: fixed; top: -20%; left: -20%; width: 140%; height: 140%; z-index: -1;
    background: radial-gradient(circle at center, rgba(0, 102, 255, 0.15) 0%, transparent 60%);
    animation: pulseBg 10s infinite alternate;
}
@keyframes pulseBg { 0% { opacity: 0.5; transform: scale(1); } 100% { opacity: 1; transform: scale(1.1); } }

/* --- LAYOUT --- */
.container {
    max-width: 1600px;
    margin: 0 auto;
    padding: 20px;
}

/* --- HEADER --- */
header {
    text-align: center;
    padding: 40px 0;
    position: relative;
}
.logo-text {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 4px;
    background: linear-gradient(to right, #fff, var(--neon-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
    margin-bottom: 10px;
}
.status-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 15px;
    background: rgba(0, 243, 255, 0.1);
    border: 1px solid var(--neon-cyan);
    border-radius: 20px;
    font-size: 0.8rem;
    color: var(--neon-cyan);
    box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
}
.dot { width: 8px; height: 8px; background: var(--neon-cyan); border-radius: 50%; box-shadow: 0 0 10px var(--neon-cyan); animation: blink 1.5s infinite; }
@keyframes blink { 50% { opacity: 0.3; } }

/* --- SEARCH BAR --- */
.search-wrapper {
    max-width: 600px;
    margin: 0 auto 40px;
    position: relative;
}
.search-input {
    width: 100%;
    padding: 15px 25px;
    padding-right: 50px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: white;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
}
.search-input:focus {
    border-color: var(--neon-cyan);
    box-shadow: var(--glow-strong);
    background: rgba(0, 0, 0, 0.3);
}
.search-icon {
    position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
    color: var(--neon-cyan); pointer-events: none;
}

/* --- GALLERY GRID --- */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
    padding-bottom: 50px;
}

/* --- CARD DESIGN --- */
.card {
    background: var(--card-bg);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    backdrop-filter: blur(10px);
    opacity: 0;
    animation: slideUp 0.6s forwards;
}
.card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: var(--neon-cyan);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 243, 255, 0.1);
}
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

.img-box {
    width: 100%;
    height: 250px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    background: #000;
}
.img-box img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.5s ease;
}
.card:hover .img-box img { transform: scale(1.1); }

/* Overlay on Image Hover */
.overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    opacity: 0; transition: 0.3s;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 20px;
}
.card:hover .overlay { opacity: 1; }
.view-btn {
    padding: 8px 20px;
    background: var(--neon-cyan);
    color: #000;
    font-weight: bold;
    border-radius: 20px;
    font-size: 0.9rem;
    transform: translateY(20px);
    transition: 0.3s;
}
.card:hover .view-btn { transform: translateY(0); }

/* Card Info */
.info { padding: 15px; }
.title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    color: white;
    margin-bottom: 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
}

/* Action Buttons Row */
.actions {
    display: flex; gap: 10px;
}
.btn-action {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    transition: 0.3s;
    color: white;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
}
.btn-action:hover { background: rgba(255, 255, 255, 0.15); color: var(--neon-cyan); border-color: var(--neon-cyan); }
.btn-copy:hover { color: var(--neon-purple); border-color: var(--neon-purple); }
.btn-down:hover { color: var(--neon-blue); border-color: var(--neon-blue); }

/* --- MODAL (LIGHTBOX) --- */
.modal {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(15px);
    display: none; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s;
}
.modal.active { display: flex; opacity: 1; }
.modal-content {
    max-width: 90%; max-height: 90vh;
    position: relative;
    border: 2px solid var(--neon-cyan);
    border-radius: 10px;
    box-shadow: 0 0 50px rgba(0, 243, 255, 0.3);
    animation: zoomIn 0.3s;
}
@keyframes zoomIn { from { transform: scale(0.8); } to { transform: scale(1); } }
.modal-img { max-width: 100%; max-height: 85vh; display: block; border-radius: 8px; }
.close-modal {
    position: absolute; top: -40px; right: 0;
    color: white; font-size: 2rem; cursor: pointer;
    transition: 0.3s;
}
.close-modal:hover { color: var(--neon-cyan); transform: rotate(90deg); }

/* --- LOADING & TOAST --- */
.loader-container { text-align: center; padding: 50px; display: none; }
.spinner {
    width: 50px; height: 50px; border: 3px solid rgba(0, 243, 255, 0.2);
    border-top-color: var(--neon-cyan); border-radius: 50%;
    animation: spin 1s linear infinite; margin: 0 auto 15px;
}
@keyframes spin { 100% { transform: rotate(360deg); } }

.toast {
    position: fixed; bottom: 30px; right: 30px;
    background: rgba(0, 10, 30, 0.95);
    border-left: 4px solid var(--neon-cyan);
    padding: 15px 25px; border-radius: 8px;
    color: white; font-weight: bold;
    transform: translateX(200%); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    z-index: 2000; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    display: flex; align-items: center; gap: 10px;
}
.toast.show { transform: translateX(0); }

/* Responsive */
@media (max-width: 768px) {
    .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .img-box { height: 180px; }
    .logo-text { font-size: 2rem; }
    .btn-action span { display: none; } /* Hide text on mobile, show icon only */
    .btn-action { padding: 12px; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="container">
    <header>
        <div class="status-badge"><div class="dot"></div> SYSTEM ONLINE 2026</div>
        <h1 class="logo-text">FOTO GALLERY</h1>
        <p style="color: var(--text-dim); letter-spacing: 2px;">LINE TOGEL ARCHIVE</p>
    </header>

    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="Cari kode atau judul foto..." onkeyup="filterGallery()">
        <i class="fas fa-search search-icon"></i>
    </div>

    <div class="loader-container" id="loader">
        <div class="spinner"></div>
        <p style="color: var(--neon-cyan)">CONNECTING TO DATABASE...</p>
    </div>

    <div class="gallery-grid" id="galleryGrid">
        <!-- Cards will be injected here -->
    </div>
</div>

<!-- MODAL VIEW -->
<div class="modal" id="imageModal" onclick="closeModal(event)">
    <div class="modal-content">
        <span class="close-modal" onclick="forceCloseModal()">&times;</span>
        <img src="" alt="Full View" class="modal-img" id="modalImg">
    </div>
</div>

<!-- TOAST NOTIFICATION -->
<div class="toast" id="toast">
    <i class="fas fa-check-circle" style="color: var(--neon-cyan)"></i>
    <span id="toastMsg">Action Successful</span>
</div>

<script>
// --- CONFIGURATION ---
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0'; // ID Spreadsheet Anda
const GID = '1246502038'; // GID Sheet

let allData = [];

// --- INITIALIZATION ---
document.addEventListener('DOMContentLoaded', () => {
    fetchData();
});

async function fetchData() {
    const loader = document.getElementById('loader');
    const grid = document.getElementById('galleryGrid');
    
    loader.style.display = 'block';
    grid.innerHTML = '';

    try {
        // Fetching data logic (Compatible with Google Sheets CSV export)
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}&range=C2:D150`;
        const response = await fetch(url);
        const data = await response.text();
        
        // Parse CSV simple
        const rows = data.split('\n').slice(1); // Skip header if any
        
        allData = rows.map((row, index) => {
            // Handle CSV parsing considering commas inside quotes if necessary, 
            // but for simple URL/Title split by comma is usually okay if no commas in title.
            // A safer regex split:
            const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            let cols = row.split(','); // Simple split fallback
            
            // Cleaning data (Google Sheets CSV adds quotes sometimes)
            let title = cols[0] ? cols[0].replace(/^"|"$/g, '').trim() : 'Untitled';
            let imgUrl = cols[1] ? cols[1].replace(/^"|"$/g, '').trim() : '';

            // Fix URL if it's not a direct link (e.g. drive links)
            if(imgUrl.includes('drive.google.com')) {
                const idMatch = imgUrl.match(/[-\w]{25,}/);
                if(idMatch) imgUrl = `https://drive.google.com/uc?export=view&id=${idMatch[0]}`;
            }

            return { title, imgUrl, id: index };
        }).filter(item => item.imgUrl && item.imgUrl.length > 5);

        renderGallery(allData);

    } catch (error) {
        console.error(error);
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color: #ff4444;">
            <i class="fas fa-exclamation-triangle fa-3x"></i><br>FAILED TO LOAD DATA
        </div>`;
    } finally {
        loader.style.display = 'none';
    }
}

// --- RENDER GALLERY ---
function renderGallery(data) {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';

    if(data.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color: var(--text-dim); padding: 40px;">
            No photos found matching your search.
        </div>`;
        return;
    }

    data.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = `${i * 0.05}s`; // Staggered animation
        
        card.innerHTML = `
            <div class="img-box" onclick="openModal('${item.imgUrl}')">
                <img src="${item.imgUrl}" loading="lazy" alt="${item.title}" onerror="this.src='https://via.placeholder.com/300x200?text=Error'">
                <div class="overlay">
                    <div class="view-btn"><i class="fas fa-expand"></i> VIEW FULL</div>
                </div>
            </div>
            <div class="info">
                <div class="title">${item.title}</div>
                <div class="actions">
                    <button class="btn-action btn-copy" onclick="copyImage('${item.imgUrl}')" title="Copy to Clipboard">
                        <i class="fas fa-copy"></i> <span>Copy</span>
                    </button>
                    <button class="btn-action btn-down" onclick="downloadImage('${item.imgUrl}', '${item.title}')" title="Download">
                        <i class="fas fa-download"></i> <span>Save</span>
                    </button>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
}

// --- SEARCH FUNCTION ---
function filterGallery() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allData.filter(item => item.title.toLowerCase().includes(query));
    renderGallery(filtered);
}

// --- ACTIONS ---
function openModal(url) {
    const modal = document.getElementById('imageModal');
    const img = document.getElementById('modalImg');
    img.src = url;
    modal.classList.add('active');
}

function closeModal(e) {
    if (e.target.id === 'imageModal') {
        document.getElementById('imageModal').classList.remove('active');
    }
}
function forceCloseModal() {
    document.getElementById('imageModal').classList.remove('active');
}

async function copyImage(url) {
    try {
        const response = await fetch(url);
        const blob = await response.blob();
        await navigator.clipboard.write([
            new ClipboardItem({ [blob.type]: blob })
        ]);
        showToast('Image copied to clipboard!');
    } catch (err) {
        // Fallback for browsers blocking clipboard write
        window.open(url, '_blank');
        showToast('Opened in new tab (Copy blocked)');
    }
}

function downloadImage(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = `LineTogel_${filename.replace(/[^a-z0-9]/gi, '_')}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast('Download started...');
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
</body>
</html>

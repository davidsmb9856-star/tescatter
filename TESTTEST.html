<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f5ff">
<meta name="description" content="LINE TOGEL - Cyber Photo Gallery 2026">
<title>⚡ FOTO - LINE TOGEL 2026</title>

<!-- Fonts & Icons -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ✨ CORE VARIABLES - ULTRA THEME */
:root {
  /* Neon Palette */
  --neon-cyan: #00f5ff;
  --neon-blue: #00d9ff;
  --neon-electric: #00ffff;
  --neon-purple: #9d4edd;
  --neon-violet: #b73bff;
  --neon-pink: #ff00d4;
  --neon-gold: #ffd700;
  --neon-green: #00ff9d;
  
  /* Deep Backgrounds */
  --bg-deep: #00010a;
  --bg-surface: rgba(4, 12, 32, 0.88);
  --bg-elevated: rgba(10, 24, 58, 0.82);
  --bg-glass: rgba(6, 18, 44, 0.72);
  
  /* Text */
  --text-primary: #ffffff;
  --text-secondary: #a8d8ff;
  --text-dim: #5a72a0;
  
  /* Effects */
  --border-glow: rgba(0, 245, 255, 0.8);
  --glow-cyan: 0 0 20px rgba(0, 245, 255, 0.75), 0 0 50px rgba(0, 245, 255, 0.45), 0 0 90px rgba(0, 245, 255, 0.25);
  --glow-purple: 0 0 25px rgba(157, 78, 221, 0.65), 0 0 55px rgba(157, 78, 221, 0.35);
  --glow-pink: 0 0 22px rgba(255, 0, 212, 0.6), 0 0 50px rgba(255, 0, 212, 0.3);
  
  /* Transitions */
  --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-fast: 0.25s var(--ease-smooth);
  --transition-normal: 0.4s var(--ease-smooth);
  --transition-bloom: 0.7s var(--ease-bounce);
  
  /* Layout */
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 22px;
  --radius-xl: 28px;
  --container-max: 1440px;
}

/* ✨ RESET & BASE */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 20px; }
body {
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ✨ LAYERED BACKGROUND SYSTEM */
.bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: -4; }

.bg-deep-gradient {
  background: 
    radial-gradient(ellipse at 20% 15%, rgba(0, 245, 255, 0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 25%, rgba(157, 78, 221, 0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 85%, rgba(255, 0, 212, 0.08) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-deep) 0%, #000314 100%);
  animation: gradientShift 18s ease-in-out infinite alternate;
}
@keyframes gradientShift {
  0%, 100% { filter: hue-rotate(0deg) brightness(1); }
  50% { filter: hue-rotate(18deg) brightness(1.08); }
}

.bg-grid {
  background-image: 
    linear-gradient(rgba(0, 245, 255, 0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 245, 255, 0.07) 1px, transparent 1px),
    linear-gradient(45deg, rgba(157, 78, 221, 0.03) 1px, transparent 1px);
  background-size: 50px 50px, 50px 50px, 100px 100px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 75%);
  animation: gridFlow 30s linear infinite;
}
@keyframes gridFlow {
  0% { background-position: 0 0, 0 0, 0 0; }
  100% { background-position: 50px 50px, 50px 50px, 100px 100px; }
}

.bg-aurora {
  background: 
    radial-gradient(ellipse at 30% 40%, rgba(0, 245, 255, 0.06) 0%, transparent 65%),
    radial-gradient(ellipse at 70% 55%, rgba(157, 78, 221, 0.06) 0%, transparent 65%),
    radial-gradient(ellipse at 45% 75%, rgba(255, 0, 212, 0.04) 0%, transparent 70%);
  animation: auroraWave 24s ease-in-out infinite;
  opacity: 0.9;
}
@keyframes auroraWave {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(3%, -2%) scale(1.04); }
  66% { transform: translate(-2%, 3%) scale(0.97); }
}

/* ✨ PARTICLE SYSTEM */
#particles {
  position: fixed; inset: 0; z-index: -3;
  pointer-events: none; overflow: hidden;
}
.particle {
  position: absolute;
  width: var(--size, 4px); height: var(--size, 4px);
  background: var(--color, var(--neon-cyan));
  border-radius: 50%;
  opacity: var(--opacity, 0.75);
  box-shadow: 0 0 var(--glow, 15px) var(--color, var(--neon-cyan)),
              0 0 var(--glow-outer, 35px) rgba(0, 245, 255, 0.3);
  animation: particleFloat var(--duration, 22s) infinite ease-in-out;
  animation-delay: var(--delay, 0s);
  will-change: transform, opacity;
}
@keyframes particleFloat {
  0%, 100% { 
    transform: translateY(100vh) rotate(0deg) scale(0.8); 
    opacity: 0; 
  }
  10% { opacity: var(--opacity, 0.75); transform: scale(1); }
  90% { opacity: var(--opacity, 0.75); }
  100% { 
    transform: translateY(-100vh) rotate(720deg) scale(1.1); 
    opacity: 0; 
  }
}

/* ✨ LIGHTNING EFFECT */
#lightning {
  position: fixed; inset: 0; z-index: -2;
  pointer-events: none; overflow: hidden;
}
.bolt {
  position: absolute;
  width: 2px; height: 100vh;
  background: linear-gradient(180deg, 
    transparent 0%, 
    var(--neon-electric) 25%, 
    var(--neon-cyan) 50%, 
    var(--neon-purple) 75%, 
    transparent 100%);
  filter: blur(2px);
  opacity: 0;
  animation: boltFlash 12s infinite;
  box-shadow: 0 0 25px var(--neon-electric);
}
.bolt:nth-child(1) { left: 15%; animation-delay: 0s; }
.bolt:nth-child(2) { left: 50%; animation-delay: 4s; }
.bolt:nth-child(3) { left: 85%; animation-delay: 8s; }
@keyframes boltFlash {
  0%, 88%, 90%, 92%, 100% { opacity: 0; transform: scaleY(0); }
  89%, 91% { opacity: 0.25; transform: scaleY(1); }
}

/* ✨ SCANLINE & NOISE */
.scanline {
  position: fixed; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, 
    transparent, var(--neon-electric), var(--neon-cyan), transparent);
  opacity: 0.65; filter: blur(1px);
  animation: scanSweep 6s linear infinite;
  z-index: 45; pointer-events: none;
}
@keyframes scanSweep {
  0% { top: -3px; opacity: 0; }
  5% { opacity: 0.65; }
  95% { opacity: 0.65; }
  100% { top: 100%; opacity: 0; }
}

.noise {
  position: fixed; inset: 0; z-index: -1;
  opacity: 0.035; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: noiseShift 10s steps(8) infinite;
}
@keyframes noiseShift {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(-1px, 2px); }
  50% { transform: translate(2px, -1px); }
  75% { transform: translate(-2px, -2px); }
}

/* ✨ LAYOUT */
.container {
  max-width: var(--container-max);
  margin: 0 auto;
  padding: 30px 24px;
  min-height: 100vh;
  position: relative;
}

/* ✨ HEADER */
.header {
  text-align: center;
  margin-bottom: 40px;
  animation: headerReveal 1s var(--transition-bloom) backwards;
  position: relative;
  padding-bottom: 20px;
}
@keyframes headerReveal {
  from { opacity: 0; transform: translateY(-40px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.header::after {
  content: '';
  position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 220px; height: 3px;
  background: linear-gradient(90deg, 
    transparent, var(--neon-electric), var(--neon-cyan), var(--neon-purple), transparent);
  border-radius: 2px;
  box-shadow: var(--glow-cyan);
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.8; box-shadow: var(--glow-cyan); }
  50% { opacity: 1; box-shadow: 0 0 35px rgba(0,245,255,0.95), 0 0 80px rgba(0,245,255,0.55); }
}

.back-btn {
  position: fixed; left: 20px; top: 20px;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 18px;
  background: var(--bg-glass);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-sm);
  color: var(--neon-cyan);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px; font-weight: 700;
  text-decoration: none; text-transform: uppercase;
  letter-spacing: 1px;
  backdrop-filter: blur(14px);
  transition: var(--transition-normal);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  z-index: 100;
}
.back-btn:hover {
  background: linear-gradient(135deg, rgba(0,245,255,0.25), rgba(157,78,221,0.18));
  border-color: var(--neon-electric);
  color: var(--bg-deep);
  transform: translateX(-6px);
  box-shadow: var(--glow-cyan);
}
.back-btn i { font-size: 14px; transition: var(--transition-fast); }
.back-btn:hover i { transform: translateX(-3px); }

/* ✨ TITLE SYSTEM */
.title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(34px, 8vw, 58px);
  font-weight: 900;
  letter-spacing: 6px;
  margin-bottom: 12px;
  position: relative;
  background: linear-gradient(135deg, 
    var(--neon-electric) 0%, var(--neon-cyan) 28%, 
    #ffffff 50%, var(--neon-cyan) 72%, var(--neon-violet) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 40px rgba(0, 245, 255, 0.65);
  animation: titleShimmer 3s ease-in-out infinite, titleFloat 5s var(--ease-bounce) infinite;
}
@keyframes titleShimmer {
  0%, 100% { filter: brightness(1) saturate(1); }
  50% { filter: brightness(1.45) saturate(1.2); }
}
@keyframes titleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  letter-spacing: 7px;
  text-transform: uppercase;
  margin-bottom: 18px;
  font-weight: 600;
  text-shadow: 0 0 12px rgba(0, 245, 255, 0.45);
}

.status-badge {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 8px 24px;
  background: rgba(0, 255, 157, 0.14);
  border: 1px solid rgba(0, 255, 157, 0.55);
  border-radius: 100px;
  font-size: 11px; font-weight: 700;
  color: var(--neon-green);
  text-transform: uppercase; letter-spacing: 2.5px;
  animation: statusGlow 2.2s ease-in-out infinite;
  box-shadow: 0 0 22px rgba(0, 255, 157, 0.4);
}
@keyframes statusGlow {
  0%, 100% { box-shadow: 0 0 22px rgba(0,255,157,0.4); }
  50% { box-shadow: 0 0 42px rgba(0,255,157,0.75); }
}
.status-dot {
  width: 9px; height: 9px;
  background: var(--neon-green);
  border-radius: 50%;
  animation: dotPulse 1.4s ease-in-out infinite;
  box-shadow: 0 0 18px var(--neon-green), 0 0 38px rgba(0,255,157,0.55);
}
@keyframes dotPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.6); opacity: 0.85; }
}

/* ✨ NAVIGATION */
.nav-tabs {
  display: flex; justify-content: center; gap: 14px;
  margin-bottom: 32px; flex-wrap: wrap;
}
.nav-tab {
  padding: 12px 28px;
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: 'Orbitron', sans-serif;
  font-size: 12px; font-weight: 700;
  cursor: pointer;
  transition: var(--transition-normal);
  text-transform: uppercase; letter-spacing: 1.5px;
  backdrop-filter: blur(14px);
  position: relative; overflow: hidden;
  display: inline-flex; align-items: center; gap: 8px;
}
.nav-tab::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, 
    rgba(0,245,255,0.22), rgba(157,78,221,0.16), rgba(255,0,212,0.12));
  opacity: 0; transition: opacity 0.35s;
}
.nav-tab:hover, .nav-tab.active {
  background: linear-gradient(135deg, rgba(0,245,255,0.26), rgba(0,255,255,0.20));
  border-color: var(--neon-electric);
  color: var(--neon-electric);
  transform: translateY(-4px);
  box-shadow: var(--glow-cyan);
}
.nav-tab:hover::before, .nav-tab.active::before { opacity: 1; }
.nav-tab i { font-size: 14px; }

/* ✨ SEARCH */
.search-wrapper {
  max-width: 680px; margin: 0 auto 32px;
  position: relative;
}
.search-input {
  width: 100%;
  padding: 16px 54px 16px 24px;
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  transition: var(--transition-normal);
  backdrop-filter: blur(14px);
  box-shadow: 0 4px 25px rgba(0, 0, 0, 0.25);
}
.search-input:focus {
  outline: none;
  border-color: var(--neon-electric);
  box-shadow: var(--glow-cyan), 0 8px 40px rgba(0, 0, 0, 0.35);
  background: var(--bg-elevated);
}
.search-input::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute; right: 20px; top: 50%;
  transform: translateY(-50%);
  color: var(--neon-cyan); font-size: 18px;
  pointer-events: none; transition: var(--transition-fast);
}
.search-input:focus + .search-icon {
  color: var(--neon-electric);
  text-shadow: 0 0 15px var(--neon-electric);
}

/* ✨ GALLERY GRID */
.gallery-section { animation: sectionSlide 0.8s var(--transition-bloom) backwards; }
@keyframes sectionSlide {
  from { opacity: 0; transform: translateY(50px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px; font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 20px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border-glow);
  display: flex; align-items: center; gap: 14px;
  letter-spacing: 2.5px; position: relative;
}
.section-title::before {
  content: ''; width: 5px; height: 24px;
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-cyan), var(--neon-purple));
  border-radius: 3px;
  box-shadow: 0 0 18px rgba(0, 245, 255, 0.75);
  animation: barPulse 2.4s ease-in-out infinite;
}
@keyframes barPulse {
  0%, 100% { opacity: 1; transform: scaleY(1); }
  50% { opacity: 0.85; transform: scaleY(1.12); }
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

/* ✨ PHOTO CARD - PREMIUM 3D */
.photo-card {
  background: var(--bg-surface);
  border: 1px solid rgba(0, 245, 255, 0.4);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: var(--transition-bloom);
  position: relative;
  backdrop-filter: blur(16px);
  animation: cardReveal 0.65s ease forwards;
  opacity: 0; transform: translateY(30px) scale(0.98);
  box-shadow: 0 8px 35px rgba(0, 0, 0, 0.4);
  will-change: transform;
}
.photo-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, 
    rgba(0,245,255,0.12), transparent 45%, 
    rgba(157,78,221,0.10), transparent 65%);
  opacity: 0; transition: opacity 0.4s; pointer-events: none;
  border-radius: inherit;
}
.photo-card:hover::before { opacity: 1; }
.photo-card:nth-child(n) { animation-delay: calc(0.1s * var(--i, 0)); }
@keyframes cardReveal {
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.photo-card:hover {
  transform: translateY(-10px) scale(1.025);
  border-color: var(--neon-electric);
  box-shadow: var(--glow-cyan), 0 25px 60px rgba(0, 0, 0, 0.55);
  z-index: 5;
}

.photo-frame {
  position: relative;
  width: 100%; height: 300px;
  background: radial-gradient(circle at center, #0f2a47 0%, #050d1f 100%);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.photo-frame::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, 
    transparent 55%, 
    rgba(0, 8, 20, 0.5) 85%, 
    rgba(0, 4, 12, 0.85) 100%);
  pointer-events: none;
}
.photo-frame img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
  transition: transform 0.5s var(--ease-bounce), filter 0.5s ease;
  filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.35));
}
.photo-card:hover .photo-frame img {
  transform: scale(1.09);
  filter: drop-shadow(0 10px 35px rgba(0, 245, 255, 0.45));
}

/* ✨ CARD INFO */
.card-info {
  padding: 18px 20px 20px;
  position: relative;
}
.card-info::before {
  content: ''; position: absolute; top: 0;
  left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, 
    transparent, rgba(0,245,255,0.45), transparent);
}

.card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px; font-weight: 700;
  color: var(--neon-electric);
  margin-bottom: 16px;
  word-break: break-word; text-align: center;
  text-shadow: 0 0 14px rgba(0, 245, 255, 0.65);
  line-height: 1.45;
  min-height: 44px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-meta {
  font-size: 12px; color: var(--text-secondary);
  text-align: center; margin-bottom: 16px;
  opacity: 0.92; font-weight: 500;
}

/* ✨ ACTION BUTTONS - PREMIUM */
.actions-row {
  display: flex; gap: 12px;
  justify-content: center; flex-wrap: wrap;
  padding-top: 14px;
  border-top: 1px solid rgba(0, 245, 255, 0.3);
}

.action-btn {
  flex: 1; min-width: 80px; max-width: 100px;
  height: 50px;
  background: linear-gradient(135deg, 
    rgba(0,245,255,0.20) 0%, rgba(0,255,255,0.14) 100%);
  border: 1px solid rgba(0, 245, 255, 0.55);
  border-radius: var(--radius-sm);
  color: var(--neon-electric);
  font-size: 11px; font-weight: 700;
  cursor: pointer;
  transition: all 0.32s var(--ease-smooth);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px;
  text-transform: uppercase; letter-spacing: 0.7px;
  backdrop-filter: blur(12px);
  position: relative; overflow: hidden;
}
.action-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, 
    rgba(0,245,255,0.35), rgba(157,78,221,0.25));
  opacity: 0; transition: opacity 0.3s;
}
.action-btn i {
  font-size: 18px; margin-bottom: 3px;
  transition: transform 0.3s ease;
  z-index: 1;
}
.action-btn span {
  font-size: 9px; font-weight: 700; z-index: 1;
}
.action-btn:hover {
  background: linear-gradient(135deg, 
    rgba(0,245,255,0.45) 0%, rgba(0,255,255,0.35) 100%);
  border-color: var(--neon-electric);
  transform: translateY(-5px) scale(1.08);
  box-shadow: 0 10px 35px rgba(0, 245, 255, 0.65);
  color: var(--bg-deep);
}
.action-btn:hover::before { opacity: 1; }
.action-btn:hover i { transform: translateY(-2px); }

.action-btn.copy:hover {
  background: linear-gradient(135deg, rgba(0,255,157,0.45), rgba(0,220,130,0.35));
  border-color: var(--neon-green);
  box-shadow: 0 10px 35px rgba(0, 255, 157, 0.65);
}
.action-btn.download:hover {
  background: linear-gradient(135deg, rgba(0,245,255,0.45), rgba(0,200,255,0.35));
  border-color: var(--neon-blue);
  box-shadow: 0 10px 35px rgba(0, 245, 255, 0.65);
}

/* ✨ LOADING */
.loading {
  display: none; text-align: center;
  padding: 45px 20px; grid-column: 1 / -1;
}
.loading.active { display: block; }
.loader-ring {
  width: 56px; height: 56px;
  border: 4px solid rgba(0, 245, 255, 0.22);
  border-top-color: var(--neon-electric);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 22px;
  box-shadow: var(--glow-cyan);
  position: relative;
}
.loader-ring::after {
  content: ''; position: absolute; inset: -6px;
  border: 3px solid transparent;
  border-top-color: var(--neon-purple);
  border-radius: 50%;
  animation: spin 1.6s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text {
  color: var(--neon-electric);
  font-family: 'Orbitron', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 2px;
  animation: textPulse 1.8s ease-in-out infinite;
}
@keyframes textPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

/* ✨ MODAL - CINEMATIC */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(1, 3, 12, 0.97);
  backdrop-filter: blur(24px);
  z-index: 1000;
  display: none; align-items: center; justify-content: center;
  padding: 24px;
  animation: modalFade 0.35s ease;
}
@keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
.modal-backdrop.active { display: flex; }

.modal-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-xl);
  max-width: 1000px; width: 100%;
  max-height: 94vh;
  overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: var(--glow-cyan), 0 30px 80px rgba(0, 0, 0, 0.6);
  animation: modalEnter 0.45s var(--transition-bloom);
}
@keyframes modalEnter {
  from { opacity: 0; transform: translateY(40px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 26px;
  border-bottom: 1px solid rgba(0, 245, 255, 0.28);
  background: linear-gradient(90deg, 
    rgba(0,245,255,0.10), transparent, rgba(157,78,221,0.10));
}
.modal-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px; color: var(--neon-electric);
  font-weight: 700; letter-spacing: 1px;
}
.modal-close {
  width: 40px; height: 40px;
  background: transparent;
  border: 1px solid var(--neon-pink);
  border-radius: 50%;
  color: var(--neon-pink);
  font-size: 16px; cursor: pointer;
  transition: var(--transition-normal);
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover {
  background: var(--neon-pink); color: var(--bg-deep);
  transform: rotate(90deg) scale(1.12);
  box-shadow: var(--glow-pink);
}

.modal-body {
  padding: 26px;
  text-align: center;
  overflow-y: auto; flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(circle at center, #0e2847 0%, #050e20 100%);
}
.modal-body img {
  max-width: 100%; max-height: 68vh;
  width: auto; object-fit: contain;
  border-radius: var(--radius-md);
  box-shadow: 0 0 40px rgba(0, 245, 255, 0.45), 
              0 15px 55px rgba(0, 0, 0, 0.5);
  transition: transform 0.4s var(--ease-bounce);
}
.modal-body img:hover { transform: scale(1.03); }

.modal-actions {
  margin-top: 22px;
  display: flex; gap: 12px;
  justify-content: center; flex-wrap: wrap;
}

/* ✨ TOAST NOTIFICATION */
.toast {
  position: fixed; bottom: 28px; right: 28px;
  background: var(--bg-surface);
  border: 1px solid var(--neon-electric);
  color: var(--neon-electric);
  padding: 14px 28px;
  border-radius: var(--radius-md);
  font-weight: 700; font-size: 13px;
  z-index: 10001;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--glow-cyan);
  transform: translateX(280px);
  opacity: 0;
  transition: var(--transition-bloom);
  backdrop-filter: blur(16px);
}
.toast.show {
  transform: translateX(0); opacity: 1;
}
.toast i { font-size: 18px; }

/* ✨ RESPONSIVE */
@media (max-width: 768px) {
  .container { padding: 20px 16px; }
  .back-btn { left: 14px; top: 14px; padding: 7px 14px; font-size: 10px; }
  .title { font-size: clamp(28px, 9vw, 46px); letter-spacing: 4px; }
  .subtitle { font-size: 11px; letter-spacing: 5px; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .photo-frame { height: 250px; }
  .card-title { font-size: 14px; min-height: 40px; }
  .action-btn { min-width: 70px; max-width: 88px; height: 46px; }
  .action-btn i { font-size: 16px; }
  .action-btn span { font-size: 8px; }
  .nav-tabs { gap: 10px; }
  .nav-tab { padding: 10px 22px; font-size: 11px; }
  .modal-card { border-radius: var(--radius-lg); }
  .modal-body { padding: 20px 16px; }
  .search-input { padding: 14px 50px 14px 20px; font-size: 14px; }
}

@media (max-width: 480px) {
  .gallery-grid { grid-template-columns: 1fr; }
  .photo-frame { height: 280px; }
  .actions-row { gap: 10px; }
  .action-btn { min-width: 75px; height: 48px; }
  .header { margin-bottom: 32px; }
  .section-title { font-size: 14px; }
}

/* ✨ SCROLLBAR */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-cyan), var(--neon-purple));
  border-radius: 6px;
  border: 2px solid var(--bg-deep);
  box-shadow: 0 0 18px rgba(0, 245, 255, 0.55);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--neon-cyan), var(--neon-electric), var(--neon-violet));
  box-shadow: 0 0 25px rgba(0, 245, 255, 0.75);
}

/* ✨ SELECTION & FOCUS */
::selection {
  background: rgba(0, 245, 255, 0.42);
  color: var(--text-primary);
  text-shadow: 0 0 12px rgba(0, 245, 255, 0.7);
}
:focus-visible {
  outline: 2px solid var(--neon-electric);
  outline-offset: 3px;
  box-shadow: 0 0 0 5px rgba(0, 245, 255, 0.22);
}

/* ✨ REDUCED MOTION */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .bg-canvas, .grid-overlay, .particles, .lightning-overlay {
    display: none !important;
  }
}
</style>
</head>
<body>

<!-- ✨ BACKGROUND LAYERS -->
<div class="bg-layer bg-deep-gradient"></div>
<div class="bg-layer bg-grid"></div>
<div class="bg-layer bg-aurora"></div>
<div id="particles"></div>
<div id="lightning">
  <div class="bolt"></div>
  <div class="bolt"></div>
  <div class="bolt"></div>
</div>
<div class="scanline"></div>
<div class="noise"></div>

<!-- ✨ BACK BUTTON -->
<a href="index.html" class="back-btn">
  <i class="fas fa-arrow-left"></i> Kembali
</a>

<div class="container">
  <!-- ✨ HEADER -->
  <header class="header">
    <h1 class="title">⚡ FOTO GALLERY</h1>
    <p class="subtitle">LINE TOGEL — Cyber Portal 2026</p>
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </header>

  <!-- ✨ NAVIGATION -->
  <nav class="nav-tabs">
    <button class="nav-tab active">
      <i class="fas fa-images"></i> Galeri Foto
    </button>
  </nav>

  <!-- ✨ GALLERY SECTION -->
  <section id="gallery" class="section active">
    <div class="search-wrapper">
      <input type="text" class="search-input" id="searchInput" 
             placeholder="🔍 Cari foto berdasarkan judul..." 
             onkeyup="searchPhotos()" autocomplete="off">
      <i class="fas fa-search search-icon"></i>
    </div>

    <div class="loading" id="loading">
      <div class="loader-ring"></div>
      <div class="loader-text">⚡ LOADING PHOTOS...</div>
    </div>

    <div class="gallery-grid" id="galleryGrid"></div>
  </section>
</div>

<!-- ✨ MODAL -->
<div class="modal-backdrop" id="imageModal" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-head">
      <h3 class="modal-title" id="modalTitle">Foto Detail</h3>
      <button class="modal-close" onclick="closeModal()" aria-label="Tutup">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body">
      <img src="" alt="" id="modalImage">
      <div class="modal-actions">
        <button class="action-btn copy" onclick="copyImage()">
          <i class="fas fa-copy"></i><span>Copy Foto</span>
        </button>
        <button class="action-btn download" onclick="downloadModalImage()">
          <i class="fas fa-download"></i><span>Download</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ✨ TOAST -->
<div id="toast" class="toast" role="status" aria-live="polite">
  <i class="fas fa-bolt"></i>
  <span id="toastText">Berhasil!</span>
</div>

<script>
/* ✨ GLOBAL STATE */
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';

/* ✨ INIT */
document.addEventListener('DOMContentLoaded', () => {
  initParticles();
  initLazyLoad();
  if (document.getElementById('gallery')) fetchPhotos();
  initKeyboardNav();
});

/* ✨ PARTICLE SYSTEM - ENHANCED */
function initParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  
  const colors = [
    'var(--neon-electric)', 'var(--neon-cyan)', 
    'var(--neon-purple)', 'var(--neon-pink)'
  ];
  
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.setProperty('--size', `${3 + Math.random() * 4}px`);
    p.style.setProperty('--color', colors[Math.floor(Math.random() * colors.length)]);
    p.style.setProperty('--opacity', `${0.6 + Math.random() * 0.35}`);
    p.style.setProperty('--glow', `${12 + Math.random() * 20}px`);
    p.style.setProperty('--glow-outer', `${30 + Math.random() * 40}px`);
    p.style.setProperty('--duration', `${18 + Math.random() * 30}s`);
    p.style.setProperty('--delay', `${Math.random() * 25}s`);
    p.style.left = `${Math.random() * 100}%`;
    p.style.top = `${Math.random() * 100}%`;
    container.appendChild(p);
  }
  
  // Mouse interaction
  document.addEventListener('mousemove', (e) => {
    const particles = container.querySelectorAll('.particle');
    particles.forEach(p => {
      const rect = p.getBoundingClientRect();
      const px = rect.left + rect.width/2;
      const py = rect.top + rect.height/2;
      const dx = e.clientX - px;
      const dy = e.clientY - py;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 150) {
        const force = (150 - dist) / 150;
        p.style.transform = `translate(${dx * force * 0.08}px, ${dy * force * 0.08}px) scale(${1 + force * 0.3})`;
      }
    });
  });
}

/* ✨ LAZY LOAD IMAGES */
function initLazyLoad() {
  if ('IntersectionObserver' in window) {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const img = entry.target;
          if (img.dataset.src) {
            img.src = img.dataset.src;
            img.removeAttribute('data-src');
            observer.unobserve(img);
          }
        }
      });
    }, { rootMargin: '100px' });
    
    document.querySelectorAll('img[loading="lazy"]').forEach(img => {
      if (img.dataset.src) observer.observe(img);
    });
  }
}

/* ✨ FETCH PHOTOS */
async function fetchPhotos() {
  const loading = document.getElementById('loading');
  const grid = document.getElementById('galleryGrid');
  loading.classList.add('active');
  grid.innerHTML = '';
  
  try {
    const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
    const gid = '1246502038';
    
    // Try GVIZ first
    try {
      const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      parseRows(json.table.rows);
    } catch {
      // Fallback to CSV
      const csvRes = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`);
      const csvText = await csvRes.text();
      const rows = csvText.split('\n').map(r => r.split(',').map(c => c?.replace(/"/g, '').trim()));
      parseCSV(rows);
    }
    
    renderGallery(allPhotos);
    showToast(`⚡ ${allPhotos.length} foto dimuat`);
  } catch (err) {
    console.error('Fetch error:', err);
    showToast('❗ Gagal memuat data');
    grid.innerHTML = `<div class="error-state">
      <i class="fas fa-exclamation-triangle" style="font-size:52px;color:var(--neon-pink);margin-bottom:16px;text-shadow:0 0 25px rgba(255,0,212,0.6)"></i>
      <h3 style="font-family:'Orbitron';color:var(--neon-electric);margin-bottom:8px">Koneksi Gagal</h3>
      <p style="color:var(--text-secondary)">Periksa koneksi atau publikasi Google Sheets</p>
    </div>`;
  }
  loading.classList.remove('active');
}

function parseRows(rows) {
  allPhotos = [];
  rows.forEach((row, i) => {
    if (!row.c) return;
    const judul = row.c[0]?.v || '';
    const foto = row.c[1]?.v || '';
    if (judul && foto) allPhotos.push({ judul, foto, index: i + 2 });
  });
}

function parseCSV(rows) {
  allPhotos = [];
  rows.forEach((row, i) => {
    if (row.length < 2) return;
    const judul = row[0] || '';
    const foto = row[1] || '';
    if (judul && foto) allPhotos.push({ judul, foto, index: i + 2 });
  });
}

/* ✨ RENDER GALLERY */
function renderGallery(photos) {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';
  
  if (!photos.length) {
    grid.innerHTML = `<div class="empty-state">
      <i class="fas fa-search" style="font-size:52px;opacity:0.6;margin-bottom:16px"></i>
      <h3 style="font-family:'Orbitron';color:var(--neon-electric);margin-bottom:8px">Tidak Ditemukan</h3>
      <p style="color:var(--text-secondary)">Coba kata kunci lain</p>
    </div>`;
    return;
  }
  
  photos.forEach((photo, idx) => {
    const card = createCard(photo.foto, photo.judul, idx);
    card.style.setProperty('--i', idx);
    grid.appendChild(card);
  });
}

/* ✨ CREATE PREMIUM CARD */
function createCard(url, title, index) {
  const card = document.createElement('article');
  card.className = 'photo-card';
  card.innerHTML = `
    <div class="photo-frame">
      <img src="${url}" 
           alt="${title}" 
           loading="lazy"
           onerror="this.src='https://via.placeholder.com/400x300/0a1a35/00f5ff?text=Image+Not+Found'"
           onclick="openModal('${url}', '${title.replace(/'/g, "\\'")}')">
    </div>
    <div class="card-info">
      <h3 class="card-title">${title}</h3>
      <p class="card-meta">Foto #${index + 1}</p>
      <div class="actions-row">
        <button class="action-btn copy" onclick="copyPhoto('${url}')" title="Salin ke clipboard">
          <i class="fas fa-copy"></i><span>Copy</span>
        </button>
        <button class="action-btn download" onclick="downloadPhoto('${url}', '${title.replace(/[^a-z0-9]/gi, '_')}')" title="Download">
          <i class="fas fa-download"></i><span>Download</span>
        </button>
      </div>
    </div>
  `;
  return card;
}

/* ✨ SEARCH */
function searchPhotos() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!query) { renderGallery(allPhotos); return; }
  
  const results = allPhotos.filter(p => 
    p.judul.toLowerCase().includes(query)
  );
  renderGallery(results);
  if (results.length) showToast(`⚡ ${results.length} hasil ditemukan`);
}

/* ✨ MODAL */
function openModal(url, title) {
  currentImageUrl = url;
  currentImageTitle = title;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalImage').src = url;
  document.getElementById('imageModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('imageModal').classList.remove('active');
  document.body.style.overflow = '';
  currentImageUrl = currentImageTitle = '';
}

/* ✨ COPY & DOWNLOAD */
async function copyPhoto(url) {
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin!');
  } catch {
    showToast('❗ Klik kanan gambar > Copy Image');
  }
}

async function copyImage() {
  if (currentImageUrl) await copyPhoto(currentImageUrl);
}

function downloadPhoto(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = `${filename}_${Date.now()}.jpg`;
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('⚡ Download dimulai');
}

function downloadModalImage() {
  if (currentImageUrl && currentImageTitle) {
    downloadPhoto(currentImageUrl, currentImageTitle.replace(/[^a-z0-9]/gi, '_'));
  }
}

/* ✨ TOAST */
function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3800);
}

/* ✨ KEYBOARD NAV */
function initKeyboardNav() {
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
    if (e.ctrlKey && e.key === 'k') {
      e.preventDefault();
      document.getElementById('searchInput')?.focus();
    }
  });
  
  // Close modal on backdrop click
  document.getElementById('imageModal')?.addEventListener('click', (e) => {
    if (e.target.id === 'imageModal') closeModal();
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--cyan:#00f0ff;--blue:#00d4ff;--electric:#00e5ff;--ice:#b3f0ff;--deep-blue:#0088cc;--purple:#6b2fff;--dark-bg:#000308;--panel:#050e1e;--card:#0a162e;--card2:#0d1f3c;--text:#ffffff;--text2:#8ec8ff;--text3:#4a6a94;--border:rgba(0,240,255,0.25);--border2:rgba(0,240,255,0.5);--glow:0 0 20px rgba(0,240,255,0.5),0 0 40px rgba(0,240,255,0.25);--glow2:0 0 30px rgba(0,240,255,0.7),0 0 60px rgba(0,240,255,0.4),0 0 100px rgba(0,240,255,0.2);--glow-soft:0 0 15px rgba(0,240,255,0.35),0 0 30px rgba(0,240,255,0.18);--ease-smooth:cubic-bezier(0.16,1,0.3,1);--ease-bounce:cubic-bezier(0.34,1.56,0.64,1);--tr-fast:180ms var(--ease-smooth);--tr-normal:350ms var(--ease-smooth);--tr-slow:600ms var(--ease-bounce);--r-sm:8px;--r-md:14px;--r-lg:22px;--r-xl:30px;--r-full:999px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Rajdhani',sans-serif;background:var(--dark-bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;position:relative;line-height:1.6}

/* ═══════════════════════════════════════════
   BACKGROUND SYSTEM
   ═══════════════════════════════════════════ */
.bg-main{position:fixed;inset:0;z-index:-4;background:linear-gradient(160deg,#000408 0%,#000810 35%,#000c18 65%,#000408 100%)}
.bg-glow{position:fixed;inset:0;z-index:-3;pointer-events:none}
.bg-glow::before{content:'';position:absolute;width:800px;height:800px;border-radius:50%;top:-200px;left:-200px;background:radial-gradient(circle,rgba(0,240,255,0.08),transparent 70%);animation:glowMove1 20s ease-in-out infinite alternate}
.bg-glow::after{content:'';position:absolute;width:700px;height:700px;border-radius:50%;bottom:-150px;right:-150px;background:radial-gradient(circle,rgba(0,212,255,0.06),transparent 70%);animation:glowMove2 25s ease-in-out infinite alternate}
@keyframes glowMove1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,40px) scale(1.15)}}
@keyframes glowMove2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,-30px) scale(1.1)}}

.bg-grid{position:fixed;inset:0;z-index:-2;pointer-events:none;background-image:linear-gradient(rgba(0,240,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 65% 60% at 50% 50%,black 30%,transparent 78%);animation:gridSlide 40s linear infinite}
@keyframes gridSlide{to{background-position:60px 60px}}

.bg-lines{position:fixed;inset:0;z-index:-2;pointer-events:none;overflow:hidden}
.bg-lines span{position:absolute;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(0,240,255,0.06),transparent);animation:linePulse 8s ease-in-out infinite alternate}
.bg-lines span:nth-child(1){left:20%;animation-delay:0s}
.bg-lines span:nth-child(2){left:40%;animation-delay:2s}
.bg-lines span:nth-child(3){left:60%;animation-delay:4s}
.bg-lines span:nth-child(4){left:80%;animation-delay:6s}
@keyframes linePulse{0%,100%{opacity:0.3}50%{opacity:0.7}}

.bg-dots{position:fixed;inset:0;z-index:-1;pointer-events:none;background-image:radial-gradient(circle,rgba(0,240,255,0.08) 1px,transparent 1px);background-size:30px 30px;mask-image:radial-gradient(ellipse 50% 50% at 50% 50%,black,transparent)}

.bg-noise{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:0.03;background-image:url("image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.bg-scan{position:fixed;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--blue),transparent);opacity:0.5;z-index:99;pointer-events:none;animation:scanDrift 8s linear infinite;filter:blur(1px);box-shadow:0 0 15px var(--cyan)}
@keyframes scanDrift{0%{top:-5px;opacity:0}5%{opacity:0.5}95%{opacity:0.5}100%{top:100%;opacity:0}}

/* ═══════════════════════════════════════════
   LAYOUT - NEW: SIDEBAR + MAIN
   ═══════════════════════════════════════════ */
.app-layout{display:flex;min-height:100vh;min-height:100dvh}

/* ═══════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════ */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:72px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:20px 0;z-index:100;backdrop-filter:blur(16px);transition:width 0.4s var(--ease-smooth);overflow:hidden}
.sidebar:hover{width:220px}
.sidebar:hover .sidebar-label{opacity:1;width:auto;white-space:nowrap}
.sidebar-brand{width:46px;height:46px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--cyan),var(--deep-blue));display:flex;align-items:center;justify-content:center;margin-bottom:32px;box-shadow:var(--glow-soft);flex-shrink:0}
.sidebar-brand i{font-size:20px;color:var(--dark-bg)}
.sidebar-nav{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;width:100%;padding:0 10px}
.sidebar-item{width:50px;height:48px;border-radius:var(--r-md);background:transparent;border:none;color:var(--text3);font-size:18px;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:14px;position:relative;flex-shrink:0}
.sidebar-item span{display:inline-flex;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:600;opacity:0;width:0;overflow:hidden;transition:all 0.3s}
.sidebar:hover .sidebar-item span{opacity:1;width:auto}
.sidebar-item:hover,.sidebar-item.active{background:rgba(0,240,255,0.12);color:var(--cyan);border:1px solid var(--border2)}
.sidebar-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--cyan);border-radius:0 3px 3px 0;box-shadow:0 0 10px var(--cyan)}
.sidebar-item .badge{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--cyan);border-radius:50%;box-shadow:0 0 8px var(--cyan);animation:badgePulse 2s infinite}
@keyframes badgePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.3)}}

.sidebar-bottom{width:100%;padding:0 10px;display:flex;flex-direction:column;align-items:center;gap:10px}
.sidebar-back{width:50px;height:44px;border-radius:var(--r-md);background:transparent;border:1px solid var(--border);color:var(--text2);font-size:14px;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:12px;flex-shrink:0;text-decoration:none}
.sidebar-back span{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:600;opacity:0;width:0;overflow:hidden;transition:all 0.3s}
.sidebar:hover .sidebar-back span{opacity:1;width:auto}
.sidebar-back:hover{background:rgba(0,240,255,0.15);color:var(--cyan);border-color:var(--cyan);box-shadow:var(--glow-soft)}

/* ═══════════════════════════════════════════
   MAIN CONTENT
   ═══════════════════════════════════════════ */
.main-content{flex:1;margin-left:72px;padding:24px 28px 60px;min-height:100vh;min-height:100dvh;position:relative;transition:margin-left 0.4s var(--ease-smooth)}

/* ═══════════════════════════════════════════
   TOP BAR - NEW DESIGN
   ═══════════════════════════════════════════ */
.top-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:28px;padding:16px 22px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);backdrop-filter:blur(14px);flex-wrap:wrap}
.top-left{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.page-title{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;color:var(--cyan);text-shadow:0 0 15px rgba(0,240,255,0.5)}
.page-subtitle{font-size:12px;color:var(--text3);letter-spacing:1px;font-weight:500}

.top-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}

/* Search */
.search-wrap{position:relative}
.search-input{width:240px;height:40px;padding:0 42px 0 16px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r-full);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;transition:all 0.3s}
.search-input:focus{outline:none;border-color:var(--cyan);box-shadow:var(--glow-soft);width:300px;background:rgba(0,240,255,0.04)}
.search-input::placeholder{color:var(--text3)}
.search-btn{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(0,240,255,0.12);border:none;color:var(--cyan);font-size:13px;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center}
.search-btn:hover{background:var(--cyan);color:var(--dark-bg);box-shadow:0 0 12px rgba(0,240,255,0.5)}

/* Filter Buttons */
.filter-btn{padding:8px 16px;background:transparent;border:1px solid var(--border);border-radius:var(--r-full);color:var(--text3);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;gap:6px}
.filter-btn:hover,.filter-btn.active{background:rgba(0,240,255,0.12);color:var(--cyan);border-color:var(--cyan);box-shadow:var(--glow-soft)}
.filter-btn.active{background:linear-gradient(135deg,rgba(0,240,255,0.2),rgba(0,212,255,0.15))}

/* View Toggle */
.view-toggle{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
.view-btn{padding:8px 14px;background:transparent;border:none;color:var(--text3);font-size:14px;cursor:pointer;transition:all 0.3s}
.view-btn:hover{color:var(--text2)}
.view-btn.active{background:rgba(0,240,255,0.15);color:var(--cyan)}

/* ═══════════════════════════════════════════
   STATS BAR
   ═══════════════════════════════════════════ */
.stats-bar{display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.stat-card{flex:1;min-width:140px;padding:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);display:flex;align-items:center;gap:14px;transition:all 0.3s}
.stat-card:hover{border-color:var(--border2);box-shadow:var(--glow-soft);transform:translateY(-2px)}
.stat-icon{width:40px;height:40px;border-radius:var(--r-sm);background:rgba(0,240,255,0.1);display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:16px;flex-shrink:0}
.stat-info{display:flex;flex-direction:column}
.stat-value{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:var(--text)}
.stat-label{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}

/* ═══════════════════════════════════════════
   SECTION HEADER
   ═══════════════════════════════════════════ */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.section-header h2{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:var(--text);letter-spacing:2px;display:flex;align-items:center;gap:10px}
.section-header h2::before{content:'';width:4px;height:20px;background:linear-gradient(180deg,var(--cyan),var(--deep-blue));border-radius:2px;box-shadow:0 0 10px rgba(0,240,255,0.6)}
.section-count{font-size:12px;color:var(--text3);background:var(--panel);padding:5px 14px;border-radius:var(--r-full);border:1px solid var(--border)}

/* ═══════════════════════════════════════════
   GALLERY - MASONRY-LIKE GRID
   ═══════════════════════════════════════════ */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.gallery-grid.list-view{grid-template-columns:1fr}
.gallery-grid.list-view .card{flex-direction:row;height:auto}
.gallery-grid.list-view .card-img{width:200px;min-height:160px}

/* ═══════════════════════════════════════════
   PHOTO CARD - NEW STYLE
   ═══════════════════════════════════════════ */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:all 0.5s var(--ease-bounce);position:relative;animation:cardIn 0.6s ease forwards;opacity:0;transform:translateY(30px) scale(0.97);cursor:pointer;display:flex;flex-direction:column}
.card:nth-child(1){animation-delay:0.08s}.card:nth-child(2){animation-delay:0.12s}.card:nth-child(3){animation-delay:0.16s}.card:nth-child(4){animation-delay:0.2s}.card:nth-child(5){animation-delay:0.24s}.card:nth-child(6){animation-delay:0.28s}
@keyframes cardIn{to{opacity:1;transform:translateY(0) scale(1)}}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,240,255,0.06));opacity:0;transition:opacity 0.4s;pointer-events:none;z-index:1}
.card:hover{border-color:var(--cyan);transform:translateY(-6px) scale(1.02);box-shadow:var(--glow2),0 20px 50px rgba(0,0,0,0.5)}
.card:hover::before{opacity:1}

.card-img{position:relative;width:100%;height:220px;background:var(--panel);overflow:hidden;flex-shrink:0}
.card-img img{width:100%;height:100%;object-fit:contain;display:block;transition:all 0.5s var(--ease-smooth)}
.card:hover .card-img img{transform:scale(1.06)}

/* Card overlay */
.card-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(0,3,8,0.7) 90%,rgba(0,3,8,0.92));pointer-events:none;z-index:2}
.card-badges{position:absolute;top:10px;left:10px;z-index:3;display:flex;gap:6px;flex-wrap:wrap}
.card-badge{padding:4px 10px;background:rgba(0,240,255,0.18);border:1px solid rgba(0,240,255,0.4);border-radius:var(--r-full);font-size:10px;font-weight:600;color:var(--cyan);backdrop-filter:blur(8px);letter-spacing:0.5px;font-family:'Orbitron',sans-serif}
.card-fav{position:absolute;top:10px;right:10px;z-index:3;width:34px;height:34px;border-radius:50%;background:rgba(0,3,8,0.6);border:1px solid rgba(0,240,255,0.3);color:var(--text3);font-size:14px;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center}
.card-fav:hover,.card-fav.active{background:rgba(0,240,255,0.25);color:var(--cyan);border-color:var(--cyan);box-shadow:0 0 12px rgba(0,240,255,0.4)}
.card-fav.active{color:var(--cyan)}

.card-body{padding:16px;position:relative;z-index:2}
.card-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--cyan);margin-bottom:8px;line-height:1.5;word-break:break-word;text-shadow:0 0 8px rgba(0,240,255,0.4)}
.card-meta{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.card-meta-item{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px}
.card-meta-item i{font-size:10px;color:var(--blue)}

.card-actions{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--border)}
.card-act{flex:1;height:36px;border-radius:var(--r-sm);background:rgba(0,240,255,0.08);border:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'Rajdhani',sans-serif}
.card-act i{font-size:12px}
.card-act:hover{background:rgba(0,240,255,0.2);border-color:var(--cyan);color:var(--cyan);transform:translateY(-1px);box-shadow:var(--glow-soft)}
.card-act.act-copy:hover{background:rgba(0,212,255,0.2);color:var(--blue)}
.card-act.act-down:hover{background:rgba(0,180,220,0.2);color:var(--electric)}
.card-act.act-share:hover{background:rgba(107,47,255,0.2);border-color:var(--purple);color:var(--purple)}

/* ═══════════════════════════════════════════
   LOADING
   ═══════════════════════════════════════════ */
.loading{display:none;text-align:center;padding:60px 24px;grid-column:1/-1}
.loading.active{display:block}
.loader{width:48px;height:48px;border:3px solid rgba(0,240,255,0.2);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 18px;box-shadow:var(--glow-soft);position:relative}
.loader::after{content:'';position:absolute;inset:-6px;border:2px solid transparent;border-top-color:var(--purple);border-radius:50%;animation:spin 1.5s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* ═══════════════════════════════════════════
   MODAL - NEW
   ═══════════════════════════════════════════ */
.modal{position:fixed;inset:0;background:rgba(0,2,6,0.96);backdrop-filter:blur(24px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-inner{background:var(--panel);border:1px solid var(--border2);border-radius:var(--r-xl);max-width:1000px;width:100%;max-height:95vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--glow2),0 30px 80px rgba(0,0,0,0.6);animation:modalIn 0.5s var(--ease-bounce)}
@keyframes modalIn{from{opacity:0;transform:translateY(40px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-top{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,rgba(0,240,255,0.06),transparent,rgba(107,47,255,0.06))}
.modal-top h3{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--cyan);letter-spacing:1px}
.modal-x{width:36px;height:36px;border-radius:50%;background:transparent;border:1px solid rgba(255,0,170,0.5);color:#ff00aa;font-size:14px;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center}
.modal-x:hover{background:#ff00aa;color:var(--dark-bg);transform:rotate(90deg);box-shadow:0 0 20px rgba(255,0,170,0.5)}
.modal-mid{padding:24px;text-align:center;overflow-y:auto;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle,#0e2038 0%,#050d18 100%)}
.modal-mid img{max-width:100%;max-height:60vh;width:auto;object-fit:contain;border-radius:var(--r-md);box-shadow:0 0 35px rgba(0,240,255,0.4),0 10px 45px rgba(0,0,0,0.5);transition:transform 0.4s var(--ease-smooth);cursor:zoom-in}
.modal-mid img.zoomed{transform:scale(1.8)}
.modal-info{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.modal-tag{padding:5px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-full);font-size:11px;color:var(--text2)}
.modal-tag strong{color:var(--cyan);font-weight:700}
.modal-bot{margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.modal-btn{padding:10px 20px;border-radius:var(--r-md);font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;cursor:pointer;transition:all 0.3s;border:1px solid var(--border);display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:1px;background:transparent;color:var(--text2)}
.modal-btn:hover{transform:translateY(-2px)}
.modal-btn.m-copy:hover{background:rgba(0,212,255,0.2);border-color:var(--blue);color:var(--blue);box-shadow:var(--glow-soft)}
.modal-btn.m-down:hover{background:rgba(0,240,255,0.2);border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-soft)}
.modal-btn.m-share:hover{background:rgba(107,47,255,0.2);border-color:var(--purple);color:var(--purple);box-shadow:0 0 20px rgba(107,47,255,0.4)}

/* ═══════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════ */
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--cyan);color:var(--cyan);padding:14px 24px;border-radius:var(--r-md);font-weight:700;font-size:13px;z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:var(--glow);transform:translateX(280px);opacity:0;transition:all 0.5s var(--ease-bounce);backdrop-filter:blur(12px);font-family:'Orbitron',sans-serif;letter-spacing:0.5px}
.toast.show{transform:translateX(0);opacity:1}
.toast i{font-size:16px}

/* ═══════════════════════════════════════════
   BACK TO TOP
   ═══════════════════════════════════════════ */
.top-btn{position:fixed;bottom:24px;left:calc(72px + 24px);width:42px;height:42px;border-radius:50%;background:var(--card);border:1px solid var(--border2);color:var(--cyan);font-size:16px;cursor:pointer;transition:all 0.3s;z-index:99;display:none;align-items:center;justify-content:center;box-shadow:var(--glow-soft)}
.top-btn:hover{background:var(--cyan);color:var(--dark-bg);transform:translateY(-3px);box-shadow:var(--glow)}
.top-btn.show{display:flex}

/* ═══════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════ */
@media(max-width:1024px){
.main-content{padding:20px 20px 50px}
.gallery-grid{grid-template-columns:repeat(2,1fr);gap:16px}
.card-img{height:200px}
}
@media(max-width:768px){
.sidebar{display:none}
.main-content{margin-left:0;padding:16px 14px 50px}
.top-bar{flex-direction:column;align-items:stretch}
.top-right{flex-wrap:wrap}
.search-input{width:100%}.search-input:focus{width:100%}
.stats-bar{gap:10px}
.stat-card{min-width:120px;padding:12px 14px}
.stat-value{font-size:15px}
.gallery-grid{grid-template-columns:1fr}
.card-img{height:240px}
.card-actions{flex-wrap:wrap}
.card-act{min-width:calc(50% - 4px)}
.top-btn{left:24px}
}
@media(max-width:480px){
.card-img{height:200px}
.stat-card{min-width:100%}
.modal-inner{border-radius:var(--r-md)}
.modal-mid{padding:16px}
}

/* ═══════════════════════════════════════════
   SCROLLBAR
   ═══════════════════════════════════════════ */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--dark-bg)}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--cyan),var(--blue),var(--purple));border-radius:4px;border:2px solid var(--dark-bg);box-shadow:0 0 10px rgba(0,240,255,0.5)}
::-webkit-scrollbar-thumb:hover{box-shadow:0 0 18px rgba(0,240,255,0.7)}
::selection{background:rgba(0,240,255,0.4);color:#fff;text-shadow:0 0 10px rgba(0,240,255,0.7)}
</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-main"></div>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div class="bg-lines"><span></span><span></span><span></span><span></span></div>
<div class="bg-dots"></div>
<div class="bg-noise"></div>
<div class="bg-scan"></div>

<!-- App Layout -->
<div class="app-layout">

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <div class="sidebar-brand"><i class="fas fa-bolt"></i></div>
    <nav class="sidebar-nav">
      <button class="sidebar-item active"><i class="fas fa-images"></i><span>Galeri</span></button>
      <button class="sidebar-item" id="favNavBtn"><i class="fas fa-heart"></i><span>Favorit</span><div class="badge" id="favBadge" style="display:none"></div></button>
      <button class="sidebar-item" id="allNavBtn"><i class="fas fa-layer-group"></i><span>Semua</span></button>
    </nav>
    <div class="sidebar-bottom">
      <a href="index.html" class="sidebar-back"><i class="fas fa-arrow-left"></i><span>Kembali</span></a>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="main-content">

    <!-- Top Bar -->
    <div class="top-bar">
      <div class="top-left">
        <div>
          <div class="page-title">⚡ FOTO GALLERY</div>
          <div class="page-subtitle">LINE TOGEL — CYBER 2026</div>
        </div>
      </div>
      <div class="top-right">
        <div class="view-toggle">
          <button class="view-btn active" data-view="grid" title="Grid"><i class="fas fa-th-large"></i></button>
          <button class="view-btn" data-view="list" title="List"><i class="fas fa-list"></i></button>
        </div>
        <button class="filter-btn active" data-filter="all"><i class="fas fa-globe"></i> Semua</button>
        <button class="filter-btn" data-filter="favorites"><i class="fas fa-heart"></i> Favorit</button>
        <button class="filter-btn" data-filter="recent"><i class="fas fa-clock"></i> Terbaru</button>
        <div class="search-wrap">
          <input type="search" class="search-input" id="searchInput" placeholder="Cari foto..." aria-label="Cari">
          <button class="search-btn"><i class="fas fa-search"></i></button>
        </div>
      </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-images"></i></div>
        <div class="stat-info"><span class="stat-value" id="statTotal">-</span><span class="stat-label">Total Foto</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-heart"></i></div>
        <div class="stat-info"><span class="stat-value" id="statFav">0</span><span class="stat-label">Favorit</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-search"></i></div>
        <div class="stat-info"><span class="stat-value" id="statFound">-</span><span class="stat-label">Ditemukan</span></div>
      </div>
    </div>

    <!-- Section Header -->
    <div class="section-header">
      <h2>GALERI FOTO</h2>
      <span class="section-count" id="countBadge">Memuat...</span>
    </div>

    <!-- Gallery Grid -->
    <div class="loading" id="loading"><div class="loader"></div><div class="load-text">⚡ MEMUAT FOTO...</div></div>
    <div class="gallery-grid" id="galleryGrid"></div>

  </main>
</div>

<!-- ═══ MODAL ═══ -->
<div class="modal" id="modal">
  <div class="modal-inner">
    <div class="modal-top">
      <h3 id="mTitle">Foto Detail</h3>
      <button class="modal-x" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-mid">
      <img src="" alt="" id="mImg">
      <div class="modal-info">
        <span class="modal-tag"><strong>Judul:</strong> <span id="mInfoTitle">-</span></span>
        <span class="modal-tag"><strong>Format:</strong> <span id="mInfoFmt">-</span></span>
        <span class="modal-tag"><strong>No:</strong> <span id="mInfoNo">-</span></span>
      </div>
    </div>
    <div class="modal-bot">
      <button class="modal-btn m-copy" onclick="copyImg()"><i class="fas fa-copy"></i> Copy</button>
      <button class="modal-btn m-down" onclick="dlModal()"><i class="fas fa-download"></i> Download</button>
      <button class="modal-btn m-share" onclick="shareImg()"><i class="fas fa-share-alt"></i> Share</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><i class="fas fa-bolt"></i><span id="toastMsg">OK!</span></div>

<!-- Back to Top -->
<button class="top-btn" id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Ke atas"><i class="fas fa-chevron-up"></i></button>

<script>
const S={photos:[],favs:JSON.parse(localStorage.getItem('ltg2_favs')||'[]'),view:'grid',filter:'all',search:'',mUrl:'',mTitle:'',mNo:''};

// Init
document.addEventListener('DOMContentLoaded',()=>{bindEvents();fetchData();});

// Background dots gen
(()=>{const d=document.querySelector('.bg-dots');if(!d)return;})();

// Events
function bindEvents(){
  document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',e=>{
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    e.currentTarget.classList.add('active');
    S.filter=e.currentTarget.dataset.filter;
    apply();
  }));
  document.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',e=>{
    document.querySelectorAll('.view-btn').forEach(x=>x.classList.remove('active'));
    e.currentTarget.classList.add('active');
    S.view=e.currentTarget.dataset.view;
    document.getElementById('galleryGrid').classList.toggle('list-view',S.view==='list');
    toast('📐 '+S.view.toUpperCase());
  }));
  document.getElementById('searchInput').addEventListener('input',e=>{S.search=e.target.value.toLowerCase();apply();});
  document.getElementById('favNavBtn').addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    document.querySelector('[data-filter="favorites"]').classList.add('active');
    S.filter='favorites';apply();
  });
  document.getElementById('allNavBtn').addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    document.querySelector('[data-filter="all"]').classList.add('active');
    S.filter='all';apply();
  });
  document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
  document.getElementById('mImg').addEventListener('click',e=>e.target.classList.toggle('zoomed'));
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape')closeModal();
    if(e.ctrlKey&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}
  });
  window.addEventListener('scroll',()=>{document.getElementById('topBtn').classList.toggle('show',window.scrollY>400);});
}

// Fetch
async function fetchData(){
  document.getElementById('loading').classList.add('active');
  document.getElementById('galleryGrid').innerHTML='';
  try{
    const sid='1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0',gid='1246502038';
    let p=[];
    try{
      const r=await fetch(`https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
      const t=await r.text(),j=JSON.parse(t.substring(47).slice(0,-2));
      p=j.table.rows.filter(r=>r.c?.[0]?.v&&r.c?.[1]?.v).map((r,i)=>({judul:r.c[0].v,foto:r.c[1].v,idx:i+2,ts:Date.now()-i*60000}));
    }catch(e){
      const csv=await(await fetch(`https://docs.google.com/spreadsheets/d/${sid}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
      p=csv.split('\n').map(r=>r.split(',')).filter(r=>r[0]?.trim()&&r[1]?.trim()).map((r,i)=>({judul:r[0].replace(/"/g,'').trim(),foto:r[1].replace(/"/g,'').trim(),idx:i+2,ts:Date.now()-i*60000}));
    }
    S.photos=p;apply();
    document.getElementById('statTotal').textContent=p.length;
    toast('⚡ '+p.length+' foto dimuat');
  }catch(err){
    console.error(err);toast('❗ Gagal memuat');
    document.getElementById('galleryGrid').innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3)"><i class="fas fa-exclamation-triangle" style="font-size:48px;color:var(--purple);margin-bottom:16px"></i><h3 style="font-family:Orbitron;color:var(--cyan);margin-bottom:10px">Gagal Memuat</h3><p>Periksa koneksi atau Sheets</p></div>`;
  }
  document.getElementById('loading').classList.remove('active');
}

// Apply filters
function apply(){
  let f=[...S.photos];
  if(S.filter==='favorites')f=f.filter(p=>S.favs.includes(p.foto));
  else if(S.filter==='recent')f=[...f].sort((a,b)=>b.ts-a.ts).slice(0,30);
  if(S.search)f=f.filter(p=>p.judul.toLowerCase().includes(S.search));
  render(f);
  document.getElementById('statFav').textContent=S.favs.length;
  document.getElementById('statFound').textContent=f.length;
  document.getElementById('countBadge').textContent=f.length+' foto';
  document.getElementById('favBadge').style.display=S.favs.length?'block':'none';
}

// Render
function render(photos){
  const g=document.getElementById('galleryGrid');g.innerHTML='';
  if(!photos.length){g.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3)"><i class="fas fa-search" style="font-size:48px;margin-bottom:16px;opacity:0.5"></i><h3 style="font-family:Orbitron;color:var(--cyan);margin-bottom:10px">Tidak Ditemukan</h3></div>`;return;}
  photos.forEach((p,i)=>g.appendChild(makeCard(p,i)));
}

function makeCard(p,i){
  const isFav=S.favs.includes(p.foto);
  const c=document.createElement('div');c.className='card';
  c.innerHTML=`<div class="card-img" onclick="openModal('${p.foto}','${p.judul.replace(/'/g,"\\'")}',${p.idx})"><img src="${p.foto}" alt="${p.judul}" onerror="this.src='https://via.placeholder.com/400x300/0a162e/00f0ff?text=No+Image'" loading="lazy"><div class="card-overlay"></div><div class="card-badges"><span class="card-badge">#${p.idx}</span></div><button class="card-fav ${isFav?'active':''}" onclick="event.stopPropagation();toggleFav('${p.foto}',this)"><i class="fas fa-heart"></i></button></div><div class="card-body"><div class="card-title">${p.judul}</div><div class="card-meta"><span class="card-meta-item"><i class="fas fa-hashtag"></i> ${p.idx}</span><span class="card-meta-item"><i class="fas fa-clock"></i> ${fmtTime(p.ts)}</span></div><div class="card-actions"><button class="card-act act-copy" onclick="copyPhoto('${p.foto}')"><i class="fas fa-copy"></i> Copy</button><button class="card-act act-down" onclick="dlPhoto('${p.foto}','${p.judul.replace(/'/g,"\\'")}')"><i class="fas fa-download"></i> Save</button><button class="card-act act-share" onclick="sharePhoto('${p.foto}','${p.judul.replace(/'/g,"\\'")}')"><i class="fas fa-share"></i> Share</button></div></div>`;
  return c;
}

// Helpers
function fmtTime(ts){const d=new Date(ts);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}
function toggleFav(url,btn){const i=S.favs.indexOf(url);if(i>-1){S.favs.splice(i,1);btn.classList.remove('active');toast('⭐ Dihapus');}else{S.favs.push(url);btn.classList.add('active');toast('⭐ Ditambahkan');}localStorage.setItem('ltg2_favs',JSON.stringify(S.favs));if(S.filter==='favorites')apply();}

// Modal
function openModal(url,title,no){S.mUrl=url;S.mTitle=title;S.mNo=no;
document.getElementById('mTitle').textContent=title;document.getElementById('mImg').src=url;document.getElementById('mImg').classList.remove('zoomed');
document.getElementById('mInfoTitle').textContent=title;document.getElementById('mInfoFmt').textContent=url.split('.').pop().toUpperCase().split('?')[0];document.getElementById('mInfoNo').textContent='#'+no;
document.getElementById('modal').classList.add('show');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('modal').classList.remove('show');document.getElementById('mImg').classList.remove('zoomed');document.body.style.overflow='';}

// Actions
async function copyPhoto(url){try{const b=await(await fetch(url)).blob();await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]);toast('✅ Disalin!');}catch{toast('❗ Klik kanan > Copy');}}
async function copyImg(){if(S.mUrl)await copyPhoto(S.mUrl);}
function dlPhoto(url,name){const a=document.createElement('a');a.href=url;a.download=name.replace(/[^a-z0-9]/gi,'_').toLowerCase()+'_'+Date.now()+'.jpg';a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);toast('⚡ Download...');}
function dlModal(){if(S.mUrl)dlPhoto(S.mUrl,S.mTitle);}
async function sharePhoto(url,name){if(navigator.share){try{const b=await(await fetch(url)).blob();await navigator.share({title:name,text:'Lihat foto ini:',files:[new File([b],name+'.jpg',{type:b.type})]});toast('🔗 Dibagikan!');}catch(e){if(e.name!=='AbortError')toast('❗ Gagal');}}else{copyPhoto(url);}}
function shareImg(){if(S.mUrl)sharePhoto(S.mUrl,S.mTitle);}

// Toast
function toast(m){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3800);}
</script>
</body>
</html>

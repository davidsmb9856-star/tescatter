<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#00f3ff">
<meta name="description" content="LINE TOGEL Foto Gallery — Next-Gen Blue Neon Experience">
<title>⚡ FOTO GALLERY — LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════
   BLUE NEON COOL — DESIGN SYSTEM
   ═══════════════════════════════════════ */
@property --glow-opacity {
  syntax: '<number>';
  initial-value: 0;
  inherits: false;
}
@property --border-opacity {
  syntax: '<number>';
  initial-value: 0;
  inherits: false;
}

:root {
  --bg-deep: #03050f;
  --bg-surface: #070b1c;
  --bg-card: rgba(10, 16, 38, 0.68);
  --bg-glass: rgba(14, 22, 52, 0.78);
  
  --neon-primary: #00f3ff;
  --neon-secondary: #00b4d8;
  --neon-accent: #00ff9d;
  --neon-purple: #7b61ff;
  --neon-pink: #ff00c7;
  
  --text-main: #e6f2ff;
  --text-sec: #9cc4e6;
  --text-dim: #4a6b8c;
  
  --glow-soft: 0 0 20px rgba(0, 243, 255, 0.35), 0 0 45px rgba(0, 243, 255, 0.15);
  --glow-strong: 0 0 28px rgba(0, 243, 255, 0.6), 0 0 65px rgba(0, 243, 255, 0.35), 0 0 110px rgba(0, 243, 255, 0.18);
  --glow-border: 0 0 0 1px rgba(0, 243, 255, 0.35), 0 0 18px rgba(0, 243, 255, 0.25);
  
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 22px;
  --radius-full: 999px;
  
  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
  --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Space Grotesk', system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════
   BACKGROUND & ATMOSPHERE
   ═══════════════════════════════════════ */
.cyber-mesh {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(60% 50% at 20% 30%, rgba(0, 243, 255, 0.12) 0%, transparent 60%),
    radial-gradient(50% 60% at 85% 25%, rgba(123, 97, 255, 0.09) 0%, transparent 65%),
    radial-gradient(40% 50% at 60% 85%, rgba(0, 180, 216, 0.08) 0%, transparent 55%);
  animation: meshDrift 35s ease-in-out infinite alternate;
  filter: blur(3px);
}
@keyframes meshDrift {
  0%,100%{transform:translate(0,0) scale(1) rotate(0deg)}
  50%{transform:translate(2%,-1.5%) scale(1.03) rotate(0.5deg)}
}

.cyber-grid {
  position: fixed; inset: 0; z-index: -2;
  background-image:
    linear-gradient(rgba(0, 243, 255, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 70% 65% at 50% 50%, black 20%, transparent 80%);
  pointer-events: none;
}

.scanline {
  position: fixed; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--neon-primary), transparent);
  opacity: 0.4; animation: scanMove 7s linear infinite; z-index: -1;
  filter: blur(1.5px); box-shadow: 0 0 15px var(--neon-primary);
}
@keyframes scanMove { 0%{top:-10px;opacity:0}5%{opacity:0.4}95%{opacity:0.4}100%{top:100%;opacity:0} }

.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.dot {
  position: absolute; width: 2px; height: 2px; border-radius: 50%;
  background: var(--neon-primary); opacity: 0;
  animation: float 28s infinite ease-in-out;
  box-shadow: 0 0 10px var(--neon-primary);
}
@keyframes float {
  0%,100%{transform:translateY(100vh) scale(0.5);opacity:0}
  15%{opacity:0.85}
  85%{opacity:0.85}
  100%{transform:translateY(-100vh) scale(1.3) rotate(360deg);opacity:0}
}

/* ═══════════════════════════════════════
   FLOATING TOP NAV
   ═══════════════════════════════════════ */
.top-nav {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 500; width: min(94%, 1200px);
  background: var(--bg-glass);
  backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid rgba(0, 243, 255, 0.25);
  border-radius: var(--radius-md);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), var(--glow-soft);
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 22px;
  transition: box-shadow var(--ease);
}
.top-nav:hover { box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), var(--glow-strong); }

.brand {
  display: flex; align-items: center; gap: 12px;
  font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 18px;
  background: linear-gradient(135deg, var(--neon-primary), var(--neon-secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.brand i { -webkit-text-fill-color: var(--neon-primary); font-size: 20px; filter: drop-shadow(0 0 8px var(--neon-primary)); }

.nav-actions { display: flex; align-items: center; gap: 12px; }
.nav-btn {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  background: rgba(0, 243, 255, 0.1); border: 1px solid rgba(0, 243, 255, 0.3);
  color: var(--neon-primary); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s var(--ease);
}
.nav-btn:hover { background: rgba(0, 243, 255, 0.25); transform: translateY(-2px); box-shadow: var(--glow-soft); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon-accent); box-shadow: 0 0 10px var(--neon-accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.3)} }

/* ═══════════════════════════════════════
   MAIN CONTENT
   ═══════════════════════════════════════ */
.container { max-width: 1320px; margin: 0 auto; padding: 100px 20px 60px; }

.hero {
  text-align: center; margin-bottom: 48px;
  animation: fadeUp 0.8s var(--ease) backwards;
}
.hero h1 {
  font-family: 'Orbitron', sans-serif; font-size: clamp(28px, 6vw, 48px); font-weight: 800;
  letter-spacing: 2px; margin-bottom: 14px;
  background: linear-gradient(90deg, #ffffff, var(--neon-primary), var(--neon-secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
}
.hero p { color: var(--text-sec); max-width: 580px; margin: 0 auto; font-size: 15px; }
@keyframes fadeUp { from{opacity:0;transform:translateY(25px)} to{opacity:1;transform:translateY(0)} }

/* ═══════════════════════════════════════
   CONTROL PANEL
   ═══════════════════════════════════════ */
.controls {
  display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 18px;
  margin-bottom: 32px; padding: 18px 20px;
  background: var(--bg-card); border: 1px solid rgba(0, 243, 255, 0.2);
  border-radius: var(--radius-md); backdrop-filter: blur(16px);
  box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  animation: fadeUp 0.8s 0.15s var(--ease) backwards;
}
.search-wrap {
  position: relative; flex: 1; min-width: 220px; max-width: 380px;
}
.search-wrap input {
  width: 100%; padding: 12px 42px 12px 16px;
  background: rgba(0, 243, 255, 0.06); border: 1px solid rgba(0, 243, 255, 0.35);
  border-radius: var(--radius-sm); color: var(--text-main); font-family: inherit; font-size: 14px;
  transition: all 0.3s var(--ease);
}
.search-wrap input:focus { outline: none; border-color: var(--neon-primary); box-shadow: var(--glow-border); background: rgba(0, 243, 255, 0.1); }
.search-wrap i { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dim); transition: var(--ease); }
.search-wrap input:focus + i { color: var(--neon-primary); }

.filter-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.pill {
  padding: 8px 16px; border-radius: var(--radius-full);
  background: rgba(0, 243, 255, 0.08); border: 1px solid rgba(0, 243, 255, 0.25);
  color: var(--text-sec); font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all 0.25s var(--ease); display: flex; align-items: center; gap: 6px;
}
.pill:hover { background: rgba(0, 243, 255, 0.18); color: var(--text-main); }
.pill.active { background: linear-gradient(135deg, var(--neon-secondary), var(--neon-primary)); color: #03050f; border-color: transparent; box-shadow: 0 4px 15px rgba(0, 243, 255, 0.4); font-weight: 700; }

.sort-select {
  padding: 9px 32px 9px 14px; background: rgba(0, 243, 255, 0.08);
  border: 1px solid rgba(0, 243, 255, 0.25); border-radius: var(--radius-sm);
  color: var(--text-sec); font-family: inherit; font-size: 13px;
  appearance: none; cursor: pointer; transition: var(--ease);
  background-image: url("image/svg+xml,%3Csvg fill='%2300f3ff' viewBox='0 0 24 24'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 10px center; background-size: 14px;
}
.sort-select:focus { outline: none; border-color: var(--neon-primary); box-shadow: var(--glow-border); }

/* ═══════════════════════════════════════
   MASONRY GALLERY
   ═══════════════════════════════════════ */
.masonry {
  columns: 4; column-gap: 20px;
}
.masonry-item {
  break-inside: avoid; margin-bottom: 20px;
  animation: popIn 0.5s var(--bounce) backwards;
}
.masonry-item:nth-child(1){animation-delay:0.1s} .masonry-item:nth-child(2){animation-delay:0.15s} .masonry-item:nth-child(3){animation-delay:0.2s} .masonry-item:nth-child(4){animation-delay:0.25s} .masonry-item:nth-child(5){animation-delay:0.3s}
@keyframes popIn { from{opacity:0;transform:translateY(30px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }

.card {
  position: relative; background: var(--bg-card); border: 1px solid rgba(0, 243, 255, 0.15);
  border-radius: var(--radius-md); overflow: hidden; cursor: pointer;
  transition: all 0.35s var(--ease); box-shadow: 0 6px 20px rgba(0,0,0,0.35);
  backdrop-filter: blur(12px);
  --border-opacity: 0; --glow-opacity: 0;
}
.card:hover {
  transform: translateY(-5px);
  border-color: rgba(0, 243, 255, var(--border-opacity));
  box-shadow: 0 12px 35px rgba(0,0,0,0.45), 0 0 30px rgba(0, 243, 255, var(--glow-opacity));
  --border-opacity: 0.8; --glow-opacity: 0.6;
}
.card-img {
  position: relative; width: 100%; background: radial-gradient(circle at 40% 40%, #121845, #070b1c);
  overflow: hidden; aspect-ratio: 4/3;
}
.card-img img {
  width: 100%; height: 100%; object-fit: contain;
  transition: transform 0.4s var(--ease), filter 0.4s var(--ease);
  filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4));
}
.card:hover .card-img img { transform: scale(1.05); filter: drop-shadow(0 8px 25px rgba(0, 243, 255, 0.4)); }

.card-badge {
  position: absolute; top: 12px; left: 12px; z-index: 2;
  padding: 4px 10px; background: rgba(3, 5, 15, 0.7); backdrop-filter: blur(8px);
  border: 1px solid rgba(0, 243, 255, 0.4); border-radius: 8px;
  font-size: 10px; font-weight: 700; color: var(--neon-primary); letter-spacing: 1px; text-transform: uppercase;
}
.card-fav {
  position: absolute; top: 12px; right: 12px; z-index: 2;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(3, 5, 15, 0.6); backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.2); color: var(--text-dim);
  font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.25s var(--ease);
}
.card-fav:hover, .card-fav.active { background: var(--neon-primary); border-color: var(--neon-primary); color: #03050f; transform: scale(1.15); box-shadow: 0 0 15px var(--neon-primary); }

.card-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(180deg, transparent 50%, rgba(3, 5, 15, 0.75) 100%);
  display: flex; align-items: flex-end; justify-content: center; gap: 10px;
  padding: 14px; opacity: 0; transition: opacity 0.3s var(--ease);
}
.card:hover .card-overlay { opacity: 1; }
.ov-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(0, 243, 255, 0.2); border: 1px solid rgba(0, 243, 255, 0.5);
  color: var(--neon-primary); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transform: translateY(10px); transition: all 0.25s var(--ease);
  backdrop-filter: blur(6px);
}
.card:hover .ov-btn { transform: translateY(0); }
.card:hover .ov-btn:nth-child(2) { transition-delay: 60ms; }
.card:hover .ov-btn:nth-child(3) { transition-delay: 120ms; }
.ov-btn:hover { background: var(--neon-primary); color: #03050f; box-shadow: 0 4px 15px rgba(0, 243, 255, 0.5); transform: translateY(0) scale(1.08); }

.card-body { padding: 16px 18px 14px; }
.card-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600;
  color: var(--text-main); margin-bottom: 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 11px; color: var(--text-dim); }
.card-meta i { margin-right: 4px; color: var(--neon-secondary); }

/* ═══════════════════════════════════════
   LOADING & EMPTY STATES
   ═══════════════════════════════════════ */
.state-msg { text-align: center; padding: 80px 20px; color: var(--text-dim); }
.state-msg i { font-size: 42px; margin-bottom: 18px; color: var(--neon-secondary); filter: drop-shadow(0 0 15px rgba(0,180,216,0.5)); }
.state-msg h3 { font-family: 'Orbitron', sans-serif; color: var(--neon-primary); margin-bottom: 8px; font-size: 18px; }
.loader { width: 40px; height: 40px; border: 3px solid rgba(0,243,255,0.2); border-top-color: var(--neon-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; box-shadow: 0 0 15px var(--neon-primary); }
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════
   FULLSCREEN MODAL
   ═══════════════════════════════════════ */
.modal {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(2, 4, 14, 0.96); backdrop-filter: blur(24px);
  display: none; align-items: center; justify-content: center; padding: 20px;
  animation: fadeIn 0.35s var(--ease);
}
.modal.active { display: flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal-frame {
  width: 100%; max-width: 1100px; max-height: 92vh;
  background: var(--bg-surface); border: 1px solid rgba(0, 243, 255, 0.3);
  border-radius: var(--radius-lg); overflow: hidden;
  box-shadow: 0 25px 70px rgba(0,0,0,0.6), 0 0 40px rgba(0, 243, 255, 0.25);
  display: flex; flex-direction: column; animation: scaleIn 0.4s var(--bounce);
}
@keyframes scaleIn { from{opacity:0;transform:scale(0.95) translateY(15px)} to{opacity:1;transform:scale(1) translateY(0)} }

.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 22px; border-bottom: 1px solid rgba(0, 243, 255, 0.2);
  background: linear-gradient(90deg, rgba(0, 243, 255, 0.08), transparent);
}
.modal-head h3 { font-family: 'Orbitron', sans-serif; font-size: 16px; color: var(--neon-primary); letter-spacing: 1px; }
.close-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255, 0, 199, 0.15); border: 1px solid rgba(255, 0, 199, 0.5);
  color: var(--neon-pink); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.3s var(--ease);
}
.close-btn:hover { background: var(--neon-pink); color: white; box-shadow: 0 0 20px var(--neon-pink); transform: rotate(90deg); }

.modal-body {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: radial-gradient(circle at 50% 40%, #0d153a, #050814); padding: 24px; position: relative;
}
.modal-img { max-width: 100%; max-height: 65vh; object-fit: contain; border-radius: var(--radius-sm); box-shadow: 0 0 35px rgba(0, 243, 255, 0.4), 0 12px 45px rgba(0,0,0,0.5); transition: transform 0.4s var(--ease); }
.modal-img:hover { transform: scale(1.015); }
.modal-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 42px; height: 42px; border-radius: 50%; background: rgba(0, 243, 255, 0.2);
  border: 1px solid rgba(0, 243, 255, 0.5); color: var(--neon-primary); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s var(--ease);
}
.modal-nav:hover { background: var(--neon-primary); color: #03050f; box-shadow: 0 0 20px var(--neon-primary); }
.nav-prev { left: 16px; } .nav-next { right: 16px; }

.modal-details {
  width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px;
}
.d-item { background: rgba(0, 243, 255, 0.06); border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 12px; padding: 12px; text-align: center; }
.d-item .lab { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.d-item .val { font-family: 'Orbitron', sans-serif; font-size: 12px; color: var(--neon-primary); font-weight: 700; }

.modal-foot {
  display: flex; align-items: center; justify-content: center; gap: 12px; padding: 18px 22px;
  border-top: 1px solid rgba(0, 243, 255, 0.15); background: rgba(0, 243, 255, 0.04); flex-wrap: wrap;
}
.m-btn {
  padding: 10px 22px; border-radius: 12px; font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.3s var(--ease); border: none; letter-spacing: 0.5px;
}
.m-btn.cyan { background: linear-gradient(135deg, var(--neon-secondary), var(--neon-primary)); color: #03050f; box-shadow: 0 4px 15px rgba(0, 243, 255, 0.35); }
.m-btn.cyan:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 243, 255, 0.5); }
.m-btn.ghost { background: transparent; border: 1px solid rgba(0, 243, 255, 0.4); color: var(--neon-primary); }
.m-btn.ghost:hover { background: rgba(0, 243, 255, 0.15); transform: translateY(-2px); }
.m-btn.orange { background: linear-gradient(135deg, #ff6b35, #ff8c42); color: white; box-shadow: 0 4px 15px rgba(255, 107, 53, 0.35); }
.m-btn.orange:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 107, 53, 0.5); }

/* ═══════════════════════════════════════
   TOAST
   ═══════════════════════════════════════ */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 2000;
  background: var(--bg-glass); border: 1px solid rgba(0, 243, 255, 0.6);
  color: var(--neon-primary); padding: 14px 24px; border-radius: 14px;
  font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 12px;
  box-shadow: var(--glow-strong); transform: translateX(320px); opacity: 0;
  transition: all 0.5s var(--bounce); backdrop-filter: blur(16px);
}
.toast.show { transform: translateX(0); opacity: 1; }
.toast i { font-size: 18px; }

/* ═══════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════ */
@media (max-width: 1024px) { .masonry { columns: 3; } }
@media (max-width: 768px) {
  .masonry { columns: 2; }
  .container { padding: 90px 14px 40px; }
  .top-nav { padding: 10px 16px; width: calc(100% - 28px); }
  .brand span { display: none; }
  .controls { flex-direction: column; align-items: stretch; padding: 14px; }
  .search-wrap, .filter-pills, .sort-select { max-width: 100%; }
  .filter-pills { justify-content: center; }
  .modal-frame { max-height: 95vh; }
  .modal-details { grid-template-columns: 1fr; }
  .modal-foot { flex-direction: column; }
  .m-btn { width: 100%; justify-content: center; }
}
@media (max-width: 480px) { .masonry { columns: 1; } .hero h1 { font-size: 26px; } }

/* ═══════════════════════════════════════
   UTILS & SCROLLBAR
   ═══════════════════════════════════════ */
::-webkit-scrollbar { width: 7px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--neon-primary), var(--neon-secondary)); border-radius: 5px; box-shadow: 0 0 12px var(--neon-primary); }
::selection { background: rgba(0, 243, 255, 0.4); color: white; text-shadow: 0 0 10px var(--neon-primary); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="cyber-mesh"></div>
<div class="cyber-grid"></div>
<div class="scanline"></div>
<div class="particles" id="particles"></div>

<!-- TOP NAV -->
<nav class="top-nav">
  <div class="brand"><i class="fas fa-bolt"></i> <span>FOTO GALLERY</span></div>
  <div class="nav-actions">
    <div style="display:flex;align-items:center;gap:6px;margin-right:8px;">
      <div class="status-dot"></div><span style="font-size:11px;color:var(--text-sec)">ONLINE</span>
    </div>
    <button class="nav-btn" onclick="fetchPhotos()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
    <a href="index.html" class="nav-btn" title="Home"><i class="fas fa-home"></i></a>
  </div>
</nav>

<!-- MAIN -->
<main class="container">
  <header class="hero">
    <h1>KOLEKSI FOTO CYBER</h1>
    <p>Galeri modern dengan sistem filter, pencarian real-time, dan manajemen favorit. Jelajahi dan simpan foto favorit Anda.</p>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <input type="search" id="searchInput" placeholder="Cari judul foto..." oninput="applyFilters()">
      <i class="fas fa-search"></i>
    </div>
    <div class="filter-pills">
      <button class="pill active" data-filter="all"><i class="fas fa-layer-group"></i> Semua</button>
      <button class="pill" data-filter="favorites"><i class="fas fa-heart"></i> Favorit</button>
      <button class="pill" data-filter="recent"><i class="fas fa-clock"></i> Terbaru</button>
    </div>
    <select class="sort-select" id="sortSelect" onchange="applyFilters()">
      <option value="name">Urutkan: Nama</option>
      <option value="newest">Urutkan: Terbaru</option>
    </select>
  </div>

  <div class="masonry" id="gallery">
    <div class="state-msg" id="loading">
      <div class="loader"></div>
      <div>Memuat koleksi foto...</div>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Preview Foto">
  <div class="modal-frame">
    <div class="modal-head">
      <h3 id="m-title">Detail Foto</h3>
      <button class="close-btn" onclick="closeModal()" aria-label="Tutup"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <button class="modal-nav nav-prev" onclick="navModal(-1)"><i class="fas fa-chevron-left"></i></button>
      <img src="" alt="" class="modal-img" id="m-img">
      <button class="modal-nav nav-next" onclick="navModal(1)"><i class="fas fa-chevron-right"></i></button>
      <div class="modal-details">
        <div class="d-item"><div class="lab">Judul</div><div class="val" id="d-title">—</div></div>
        <div class="d-item"><div class="lab">Format</div><div class="val" id="d-ext">—</div></div>
        <div class="d-item"><div class="lab">Ukuran</div><div class="val" id="d-size">—</div></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="m-btn cyan" onclick="copyImage()"><i class="fas fa-copy"></i> Copy</button>
      <button class="m-btn ghost" onclick="downloadModalImage()"><i class="fas fa-download"></i> Download</button>
      <button class="m-btn orange" onclick="shareImage()"><i class="fas fa-share-nodes"></i> Share</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"><i class="fas fa-bolt"></i><span id="t-text">Berhasil</span></div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const S = {
  photos: [],
  favs: JSON.parse(localStorage.getItem('ltg_favs') || '[]'),
  filter: 'all',
  search: '',
  modalIdx: -1,
  currentImg: '',
  currentTitle: ''
};

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initParticles();
  bindControls();
  fetchPhotos();
});

function initParticles() {
  const c = document.getElementById('particles');
  for(let i=0; i<50; i++){
    const p = document.createElement('div');
    p.className = 'dot';
    p.style.left = Math.random()*100+'%';
    p.style.animationDelay = Math.random()*30+'s';
    p.style.animationDuration = (22+Math.random()*25)+'s';
    c.appendChild(p);
  }
}

function bindControls() {
  document.querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      S.filter = btn.dataset.filter;
      applyFilters();
    });
  });
  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeModal();
    if(e.key === 'ArrowLeft' && S.modalIdx > -1) navModal(-1);
    if(e.key === 'ArrowRight' && S.modalIdx > -1) navModal(1);
    if((e.ctrlKey || e.metaKey) && e.key === 'k'){ e.preventDefault(); document.getElementById('searchInput')?.focus(); }
  });
  document.getElementById('modal').addEventListener('click', e => { if(e.target.id === 'modal') closeModal(); });
}

// ═══════════════════════════════════════
// FETCH & RENDER
// ═══════════════════════════════════════
async function fetchPhotos() {
  const grid = document.getElementById('gallery');
  grid.innerHTML = '<div class="state-msg" id="loading"><div class="loader"></div><div>Memuat koleksi foto...</div></div>';
  try {
    const id = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0', gid = '1246502038';
    let data = [];
    try {
      const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
      const txt = await res.text();
      const json = JSON.parse(txt.substring(47).slice(0, -2));
      data = json.table.rows.filter(r => r.c?.[0]?.v && r.c?.[1]?.v).map((r, i) => ({
        judul: r.c[0].v, foto: r.c[1].v, ts: Date.now() - i * 3600000
      }));
    } catch {
      const csv = await (await fetch(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
      data = csv.split('\n').map(r => r.split(',')).filter(r => r[0]?.trim() && r[1]?.trim()).map((r, i) => ({
        judul: r[0].replace(/"/g,'').trim(), foto: r[1].replace(/"/g,'').trim(), ts: Date.now() - i * 3600000
      }));
    }
    S.photos = data;
    applyFilters();
    toast(`⚡ ${data.length} foto dimuat`);
  } catch (e) {
    grid.innerHTML = `<div class="state-msg"><i class="fas fa-exclamation-triangle"></i><h3>Gagal Memuat</h3><p>Periksa koneksi atau publikasi Google Sheets</p></div>`;
  }
}

function applyFilters() {
  S.search = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  let arr = [...S.photos];

  if(S.filter === 'favorites') arr = arr.filter(p => S.favs.includes(p.foto));
  if(S.filter === 'recent') arr.sort((a,b) => b.ts - a.ts);
  if(sort === 'name') arr.sort((a,b) => a.judul.localeCompare(b.judul));
  if(S.search) arr = arr.filter(p => p.judul.toLowerCase().includes(S.search));

  renderGrid(arr);
}

function renderGrid(arr) {
  const grid = document.getElementById('gallery');
  grid.innerHTML = '';
  if(!arr.length){
    grid.innerHTML = `<div class="state-msg"><i class="fas fa-search"></i><h3>Tidak Ditemukan</h3><p>Coba kata kunci lain atau ubah filter</p></div>`;
    return;
  }
  arr.forEach((p, i) => grid.appendChild(buildCard(p, i, arr)));
}

function buildCard(p, i, fullList) {
  const isF = S.favs.includes(p.foto);
  const el = document.createElement('div');
  el.className = 'masonry-item';
  el.innerHTML = `
    <div class="card" onclick="openModal(${i})">
      <div class="card-img">
        <img src="${p.foto}" alt="${p.judul}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/0a0f2a/00f3ff?text=No+Image'">
        <span class="card-badge">#${i+1}</span>
        <button class="card-fav ${isF?'active':''}" onclick="event.stopPropagation();toggleFav('${p.foto}',this)"><i class="fas fa-heart"></i></button>
        <div class="card-overlay">
          <button class="ov-btn" onclick="event.stopPropagation();openModal(${i})" title="Preview"><i class="fas fa-expand"></i></button>
          <button class="ov-btn" onclick="event.stopPropagation();copyPhoto('${p.foto}')" title="Copy"><i class="fas fa-copy"></i></button>
          <button class="ov-btn" onclick="event.stopPropagation();downloadPhoto('${p.foto}','${p.judul.replace(/'/g,"\\'")}')" title="Download"><i class="fas fa-download"></i></button>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${p.judul}</div>
        <div class="card-meta"><span><i class="far fa-clock"></i> ${fmtTime(p.ts)}</span></div>
      </div>
    </div>`;
  return el;
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function fmtTime(ts){ const d=new Date(ts); return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }
function toggleFav(url, btn){
  const idx = S.favs.indexOf(url);
  if(idx > -1){ S.favs.splice(idx, 1); btn.classList.remove('active'); toast('💔 Dihapus dari favorit'); }
  else { S.favs.push(url); btn.classList.add('active'); toast('❤️ Ditambahkan ke favorit'); }
  localStorage.setItem('ltg_favs', JSON.stringify(S.favs));
  if(S.filter === 'favorites') applyFilters();
}

// Modal
function openModal(idx, arr) {
  const list = arr || [...S.photos];
  const p = list[idx]; if(!p) return;
  S.modalIdx = idx; S.currentImg = p.foto; S.currentTitle = p.judul;
  document.getElementById('m-title').textContent = p.judul;
  document.getElementById('m-img').src = p.foto;
  document.getElementById('d-title').textContent = p.judul;
  document.getElementById('d-ext').textContent = p.foto.split('.').pop().split('?')[0].toUpperCase();
  document.getElementById('d-size').textContent = 'Loading...';
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
  fetch(p.foto).then(r=>r.blob()).then(b=>{
    const kb = (b.size/1024).toFixed(1);
    document.getElementById('d-size').textContent = kb > 1024 ? (kb/1024).toFixed(2)+' MB' : kb+' KB';
  }).catch(()=>document.getElementById('d-size').textContent='—');
}
function closeModal(){ document.getElementById('modal').classList.remove('active'); document.body.style.overflow=''; S.modalIdx=-1; }
function navModal(dir){
  if(S.modalIdx === -1) return;
  const list = [...S.photos];
  S.modalIdx = (S.modalIdx + dir + list.length) % list.length;
  openModal(S.modalIdx, list);
}

// Copy/Download/Share
async function copyPhoto(url){ try{ const b=await(await fetch(url)).blob(); await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]); toast('✅ Disalin!'); }catch{ toast('❗ Klik kanan gambar > Copy'); } }
async function copyImage(){ if(S.currentImg) await copyPhoto(S.currentImg); }
function downloadPhoto(url, fn){ const a=document.createElement('a'); a.href=url; a.download=`${fn.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`; document.body.appendChild(a); a.click(); a.remove(); toast('⚡ Download dimulai...'); }
function downloadModalImage(){ if(S.currentImg) downloadPhoto(S.currentImg, S.currentTitle); }
async function sharePhoto(url, title){ if(navigator.share){ try{ const b=await(await fetch(url)).blob(); await navigator.share({title,text:'Lihat foto ini:',files:[new File([b],`${title}.jpg`,{type:b.type})]}); toast('🔗 Dibagikan!'); }catch(e){ if(e.name!=='AbortError') toast('❌ Gagal share'); } } else { copyPhoto(url); toast('✅ Link disalin!'); } }
function shareImage(){ if(S.currentImg) sharePhoto(S.currentImg, S.currentTitle); }

// Toast
function toast(msg){ const t=document.getElementById('toast'); document.getElementById('t-text').textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3800); }
</script>
</body>
</html>

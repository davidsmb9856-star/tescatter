<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>🔷 KENDALA ALL - LINE TOGEL</title>

<!-- ✅ Google Fonts - SAMA PERSIS dengan LINE TOGEL -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* ===== CSS VARIABLES - SAMA PERSIS DENGAN LINE TOGEL ===== */
:root {
  --bg-dark: #020810;
  --bg-card: #061420;
  --bg-input: #0a1e30;
  --neon-blue: #00d4ff;
  --neon-cyan: #00fff7;
  --neon-glow: rgba(0, 212, 255, 0.4);
  --accent-green: #00ff88;
  --accent-red: #ff4757;
  --accent-orange: #ff9f43;
  --accent-purple: #a855f7;
  --border-color: rgba(0, 212, 255, 0.3);
  --text-primary: #e0f4ff;
  --text-muted: #6b8fa8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
}

/* ========== BACKGROUND EFFECTS - SAMA DENGAN LINE TOGEL ========== */
.bg-animated {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
  radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
  radial-gradient(ellipse at 50% 50%, rgba(0, 180, 255, 0.03) 0%, transparent 70%),
  var(--bg-dark);
}

.bg-grid {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(50px, 50px); }
}

.particle {
  position: fixed; width: 4px; height: 4px; background: var(--neon-blue);
  border-radius: 50%; pointer-events: none; z-index: -1;
  box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
  animation: floatParticle 15s infinite linear; opacity: 0.6;
}

@keyframes floatParticle {
  0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; } 90% { opacity: 0.6; }
  100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

.scan-line {
  position: fixed; top: 0; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), transparent);
  opacity: 0.4;
  animation: scanDown 12s linear infinite;
  z-index: 1; pointer-events: none;
  box-shadow: 0 0 15px var(--neon-blue);
}

@keyframes scanDown {
  0% { top: -10%; opacity: 0; }
  10% { opacity: 0.4; }
  90% { opacity: 0.4; }
  100% { top: 110%; opacity: 0; }
}

/* ========== PROGRESS BAR ========== */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 0%;
  height: 3px;
  background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan));
  z-index: 9999;
  transition: width 0.2s ease;
  box-shadow: 0 0 10px var(--neon-blue);
}

/* ========== CONTAINER & LAYOUT ========== */
.container {
  max-width: 1180px;
  margin: 0 auto;
  padding: 20px 15px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 2;
}

/* ========== HEADER - SERAGAM DENGAN LINE TOGEL ========== */
.header {
  text-align: center;
  margin-bottom: 28px;
  padding: 22px 15px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-blue), transparent);
  animation: glowLine 3.5s ease-in-out infinite;
  box-shadow: 0 0 15px var(--neon-blue);
}

@keyframes glowLine {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; box-shadow: 0 0 25px var(--neon-cyan), 0 0 45px var(--neon-blue); }
}

.back-btn {
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  padding: 9px 16px;
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 0.5px;
}

.back-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-50%) translateX(-3px);
  box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}

/* Typography seragam */
.judul-glow {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 900;
  text-align: center;
  color: var(--neon-cyan);
  letter-spacing: 3px;
  margin-bottom: 10px;
  text-shadow: 0 0 30px rgba(0, 255, 247, 0.3);
}

.bonus-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  font-weight: 700;
  text-align: center;
  color: var(--neon-blue);
  letter-spacing: 2px;
  margin-bottom: 20px;
}

.subtitle {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 15px;
  font-weight: 500;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(0, 212, 255, 0.1);
  border: 1px solid var(--border-color);
  padding: 7px 16px;
  border-radius: 10px;
  font-size: 12px;
  color: var(--neon-blue);
  margin-top: 13px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
}

.status-dot {
  width: 9px; height: 9px;
  background: var(--neon-blue);
  border-radius: 50%;
  animation: pulse 2.2s infinite;
  box-shadow: 0 0 12px var(--neon-blue);
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.35); opacity: 0.75; }
}

/* ========== TOOLBAR BARU ========== */
.toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 15px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
}

.toolbar-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  padding: 9px 16px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.toolbar-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}

.toolbar-btn.active {
  background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
  color: var(--bg-dark);
  border-color: var(--neon-blue);
}

.toolbar-btn.danger {
  color: var(--accent-red);
  border-color: rgba(255, 71, 87, 0.5);
}

.toolbar-btn.danger:hover {
  background: linear-gradient(135deg, rgba(255, 71, 87, 0.25) 0%, rgba(204, 51, 68, 0.15) 100%);
  border-color: var(--accent-red);
}

/* ========== SEARCH SECTION - SERAGAM ========== */
.search-section {
  margin: 22px 0 28px;
  text-align: center;
}

.search-bar {
  position: relative;
  max-width: 520px;
  margin: 0 auto 16px;
}

.search-bar .bonus-input {
  width: 100%;
  padding: 13px 18px 13px 48px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  transition: all 0.3s ease;
}

.search-bar .bonus-input::placeholder {
  color: var(--text-muted);
}

.search-bar .bonus-input:focus {
  outline: none;
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}

.search-bar i {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  color: var(--neon-blue);
  font-size: 17px;
}

.search-clear {
  position: absolute;
  right: 16px; top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  display: none;
  transition: all 0.3s ease;
}

.search-clear:hover {
  color: var(--accent-red);
  transform: translateY(-50%) scale(1.2);
}

.search-clear.show {
  display: block;
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 22px;
  flex-wrap: wrap;
  padding: 13px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  max-width: 720px;
  margin: 0 auto;
}

.stat-item {
  text-align: center;
  padding: 7px 18px;
  background: rgba(0, 212, 255, 0.08);
  border-radius: 10px;
  border: 1px solid var(--border-color);
  cursor: pointer;
  transition: all 0.3s ease;
}

.stat-item:hover {
  background: rgba(0, 212, 255, 0.15);
  border-color: var(--neon-blue);
  transform: translateY(-2px);
}

.stat-item.active {
  background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
  border-color: var(--neon-blue);
}

.stat-item.active .stat-value,
.stat-item.active .stat-label {
  color: var(--bg-dark);
}

.stat-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--accent-green);
  display: block;
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 3px;
}

/* ========== KENDALA CARDS - SERAGAM DENGAN bonus-section ========== */
.kendala-list {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.kendala-card {
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.8) 100%);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  padding: 25px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
  animation: fadeInUp 0.5s ease-out;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 212, 255, 0.1);
}

.kendala-card.bookmarked {
  border-color: var(--accent-orange);
  box-shadow: 0 10px 40px rgba(255, 159, 67, 0.3), inset 0 1px 0 rgba(255, 159, 67, 0.2);
}

.kendala-card.bookmarked::before {
  background: linear-gradient(to bottom, var(--accent-orange), var(--accent-red));
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.kendala-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: linear-gradient(to bottom, var(--neon-blue), var(--neon-cyan));
  transition: width 0.3s ease;
}

.kendala-card:hover {
  border-color: var(--neon-blue);
  transform: translateY(-2px);
  box-shadow: 0 15px 50px rgba(0, 212, 255, 0.3), inset 0 1px 0 rgba(0, 212, 255, 0.2);
}

.kendala-card:hover::before {
  width: 6px;
  box-shadow: 0 0 20px var(--neon-blue);
}

.kendala-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-color);
}

.kendala-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--neon-cyan);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex: 1;
  transition: color 0.3s ease;
  letter-spacing: 1px;
}

.kendala-title:hover {
  color: var(--neon-blue);
}

.kendala-title::after {
  content: '▼';
  font-size: 12px;
  transition: transform 0.28s ease;
  color: var(--neon-blue);
  margin-left: 10px;
}

.kendala-card.expanded .kendala-title::after {
  transform: rotate(180deg);
}

.kendala-actions {
  display: flex;
  gap: 8px;
  margin-left: 12px;
}

.kendala-action-btn {
  background: rgba(0, 212, 255, 0.1);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--neon-blue);
  font-size: 14px;
  transition: all 0.3s ease;
}

.kendala-action-btn:hover {
  background: rgba(0, 212, 255, 0.25);
  border-color: var(--neon-blue);
  transform: scale(1.1);
}

.kendala-action-btn.bookmarked {
  background: rgba(255, 159, 67, 0.2);
  border-color: var(--accent-orange);
  color: var(--accent-orange);
}

.kendala-action-btn.bookmarked:hover {
  background: rgba(255, 159, 67, 0.35);
}

/* ========== PHOTO & ANSWER SECTIONS - SERAGAM ========== */
.title-photo-section {
  display: none;
  margin: 14px 0;
  padding: 14px;
  background: rgba(0, 212, 255, 0.05);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  text-align: center;
}

.kendala-card.expanded .title-photo-section {
  display: block;
}

.title-photo-img {
  max-width: 100%;
  max-height: 300px;
  border-radius: 12px;
  border: 2px solid var(--border-color);
  cursor: pointer;
  transition: all 0.3s ease;
}

.title-photo-img:hover {
  border-color: var(--neon-blue);
  box-shadow: 0 0 25px rgba(0, 212, 255, 0.3);
}

.title-photo-actions {
  margin-top: 12px;
  display: flex;
  gap: 9px;
  justify-content: center;
  flex-wrap: wrap;
}

.copy-title-photo-btn, .view-title-photo-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 18px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  cursor: pointer;
  transition: all 0.3s ease;
}

.copy-title-photo-btn:hover, .view-title-photo-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}

.kendala-answers {
  display: none;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border-color);
}

.kendala-card.expanded .kendala-answers {
  display: block;
}

.answer-item {
  margin-bottom: 14px;
  padding: 14px 16px;
  background: rgba(0, 212, 255, 0.05);
  border-radius: 12px;
  border-left: 3px solid var(--neon-blue);
  transition: all 0.3s ease;
  position: relative;
}

.answer-item:hover {
  background: rgba(0, 212, 255, 0.1);
  border-left-color: var(--neon-cyan);
}

.answer-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 9px;
}

.answer-label {
  font-weight: 700;
  color: var(--neon-blue);
  font-size: 13px;
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.answer-counter {
  background: var(--neon-blue);
  color: var(--bg-dark);
  font-size: 11px;
  font-weight: 800;
  padding: 2px 8px;
  border-radius: 20px;
  box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
}

.answer-toggle {
  background: none;
  border: none;
  color: var(--neon-blue);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s ease;
}

.answer-toggle:hover {
  color: var(--neon-cyan);
  transform: scale(1.2);
}

.answer-content {
  color: var(--text-primary);
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 14px;
  display: block;
}

.answer-item.collapsed .answer-content {
  display: none;
}

.answer-content a {
  color: var(--neon-cyan);
  text-decoration: none;
  font-weight: 600;
  transition: color 0.3s ease;
}

.answer-content a:hover {
  color: var(--neon-blue);
  text-decoration: underline;
}

.answer-content mark {
  background: rgba(255, 159, 67, 0.3);
  color: var(--accent-orange);
  padding: 1px 4px;
  border-radius: 3px;
  font-weight: 700;
}

.photo-container {
  margin: 14px 0;
  text-align: center;
  padding: 12px;
  background: var(--bg-input);
  border-radius: 12px;
  border: 1px dashed var(--border-color);
}

.photo-img {
  max-width: 100%;
  max-height: 280px;
  border-radius: 12px;
  border: 2px solid var(--border-color);
  cursor: pointer;
  transition: all 0.3s ease;
}

.photo-img:hover {
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
}

.link-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  margin-top: 12px;
  align-items: center;
}

.open-link-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  padding: 8px 14px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.open-link-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-2px);
}

/* ========== TOMBOL BUKA SEMUA LINK ========== */
.open-all-links-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  padding: 8px 16px;
  background: linear-gradient(135deg, rgba(168, 85, 247, 0.15) 0%, rgba(139, 92, 246, 0.08) 100%);
  border: 1px solid rgba(168, 85, 247, 0.5);
  border-radius: 10px;
  color: var(--accent-purple);
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
  position: relative;
  overflow: hidden;
}

.open-all-links-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.3), transparent);
  transition: left 0.5s ease;
}

.open-all-links-btn:hover::before {
  left: 100%;
}

.open-all-links-btn:hover {
  background: linear-gradient(135deg, rgba(168, 85, 247, 0.35) 0%, rgba(139, 92, 246, 0.2) 100%);
  border-color: var(--accent-purple);
  color: #d8b4fe;
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(168, 85, 247, 0.4), 0 0 15px rgba(168, 85, 247, 0.2);
}

.open-all-links-btn:active {
  transform: translateY(0);
}

.open-all-links-btn .link-count {
  background: var(--accent-purple);
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  padding: 1px 7px;
  border-radius: 20px;
  margin-left: 3px;
  box-shadow: 0 0 8px rgba(168, 85, 247, 0.6);
}

/* ========== BUTTONS - SERAGAM DENGAN bonus-btn ========== */

<script>
// ================= DATA CONFIG =================
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

let allKendala = [];
let filteredKendala = [];
let lightboxImages = [];
let lightboxIndex = 0;
let zoomLevel = 1;
let editIndex = null;
let currentFilter = 'all';
let searchQuery = '';

// ================= PARTICLES =================
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  container.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 15 + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    container.appendChild(particle);
  }
}

// ================= PROGRESS BAR =================
function updateProgressBar() {
  const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
  const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  const scrolled = (winScroll / height) * 100;
  document.getElementById("progressBar").style.width = scrolled + "%";
}

window.onscroll = function() {
  updateProgressBar();
};

// ================= TOAST =================
function showToast(message, icon = 'fa-check-circle') {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ================= DATA LOADING =================
async function loadKendalaData() {
  try {
    const response = await fetch(DATA_URL);
    const text = await response.text();
    const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (!jsonMatch) throw new Error('Gagal parse');
    const data = JSON.parse(jsonMatch[1]);
    const rows = data.table?.rows || [];
    
    allKendala = rows.map(row => {
      const cells = row.c || [];
      return {
        judul: cells[0]?.v?.toString().trim() || '',
        jawaban1: cells[1]?.v?.toString().trim() || '',
        jawaban2: cells[2]?.v?.toString().trim() || '',
        jawaban3: cells[3]?.v?.toString().trim() || ''
      };
    }).filter(item => item.judul && item.judul !== '');
    
    filteredKendala = [...allKendala];
    renderKendala();
    updateStats();
    showToast('✅ Data berhasil dimuat!', 'fa-check-circle');
  } catch (error) {
    document.getElementById('kendalaContainer').innerHTML = `
      <div class="error-msg">
        <i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 15px; color: var(--accent-red);"></i>
        <p><strong>⚠️ Gagal memuat data</strong></p>
        <p style="font-size: 12px; margin-top: 10px; color: var(--text-muted);">Pastikan Google Sheet sudah dipublikasikan</p>
        <p style="font-size: 11px; margin-top: 12px; opacity: 0.7;">${error.message}</p>
      </div>`;
    showToast('❌ Gagal memuat data', 'fa-exclamation-triangle');
  }
}

function refreshData() {
  showToast('🔄 Memuat ulang data...', 'fa-sync-alt');
  loadKendalaData();
}

function renderKendala(data = filteredKendala) {
  const container = document.getElementById('kendalaContainer');
  if (data.length === 0) {
    container.innerHTML = '<div class="no-data"><p style="color: var(--text-muted); font-size: 16px;">Tidak ada data ditemukan</p></div>';
    return;
  }
  container.innerHTML = `<div class="kendala-list">${data.map((item, index) => createKendalaCard(item, index)).join('')}</div>`;
  
  document.querySelectorAll('.kendala-title').forEach(title => {
    title.addEventListener('click', function() {
      this.parentElement.classList.toggle('expanded');
    });
  });
}

            <button class="copy-btn" onclick="copyAnswer(${index}, 1)"><i class="fas fa-copy"></i> Copy</button>

            </div>

            <button class="sticky-btn" onclick="addToSticky(${index}, 2)"><i class="fas fa-sticky-note"></i> Sticky</button>

            <div class="answer-header">

// ================= HELPER FUNCTIONS =================
function extractTitlePhoto(judul) {
  if (!judul) return null;
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = judul.match(photoPattern);
  if (match) return { url: match[1], fullMatch: match[0] };
  return null;
}

function createTitlePhotoSection(photoUrl, index) {
  if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
  return `
    <div class="title-photo-section">
      <img src="${photoUrl}" alt="Foto Kendala" class="title-photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.style.display='none'">
      <div class="title-photo-actions">
        <button class="copy-title-photo-btn" onclick="copyTitlePhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
        <button class="view-title-photo-btn" onclick="openLightbox('${photoUrl}')"><i class="fas fa-expand"></i> Lihat Penuh</button>
      </div>
    </div>`;
}

function detectPhotoLink(item) {
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  return photoPattern.test(item.jawaban1) || photoPattern.test(item.jawaban2) || photoPattern.test(item.jawaban3);
}

function extractLinks(text) {
  if (!text) return [];
  const urlPattern = /https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi;
  return text.match(urlPattern) || [];
}

function formatContent(text, links = []) {
  if (!text) return '';
  let formatted = escapeHtml(text);
  
  links.forEach(link => {
    const escapedLink = escapeHtml(link);
    const displayText = link.length > 45 ? link.substring(0, 42) + '...' : link;
    const regex = new RegExp(`(^|[^"'=])${escapeRegExp(escapedLink)}`, 'g');
    formatted = formatted.replace(regex, `$1<a href="${escapedLink}" target="_blank" rel="noopener">${displayText}</a>`);
  });
  
  if (searchQuery) {
    formatted = highlightText(formatted, searchQuery);
  }
  
  return formatted;
}

function highlightText(text, query) {
  if (!query || query.trim() === '') return text;
  const regex = new RegExp(`(${escapeRegExp(query)})`, 'gi');
  return text.replace(regex, '<mark>$1</mark>');
}

function createPhotoSection(item) {
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = (item.jawaban1 + ' ' + item.jawaban2 + ' ' + item.jawaban3).match(photoPattern);
  if (!match) return '';
  const photoUrl = match[1];
  if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
  return `
    <div class="photo-container">
      <img src="${photoUrl}" alt="Foto" class="photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.style.display='none'">
      <button class="copy-btn" onclick="copyPhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
    </div>`;
}

function createLinkButtons(links) {
  if (links.length === 0) return '';
  const linksEncoded = btoa(unescape(encodeURIComponent(JSON.stringify(links))));
  return `
    <div class="link-buttons">
      ${links.map((link, i) => {
        const label = links.length > 1 ? `Link ${i+1}` : 'Buka Link';
        return `<a href="${link}" target="_blank" rel="noopener" class="open-link-btn">
          <i class="fas fa-external-link-alt"></i> ${label}
        </a>`;
      }).join('')}
      ${links.length > 1 ? `
        <button class="open-all-links-btn" onclick="openAllLinks('${linksEncoded}')" title="Buka semua ${links.length} link sekaligus">
          <i class="fas fa-layer-group"></i> Buka Semua <span class="link-count">${links.length}</span>
        </button>
      ` : ''}
    </div>`;
}

// ================= FUNGSI BUKA SEMUA LINK =================
function openAllLinks(linksEncoded) {
  try {
    const links = JSON.parse(decodeURIComponent(escape(atob(linksEncoded))));
    if (!links || links.length === 0) {
      showToast('⚠️ Tidak ada link untuk dibuka', 'fa-exclamation-triangle');
      return;
    }
    
    let openedCount = 0;
    let blockedCount = 0;
    
    links.forEach((link, index) => {
      setTimeout(() => {
        const newWindow = window.open(link, '_blank', 'noopener,noreferrer');
        if (newWindow && !newWindow.closed) {
          openedCount++;
        } else {
          blockedCount++;
        }
        
        if (index === links.length - 1) {
          setTimeout(() => {
            if (blockedCount > 0) {
              showToast(`⚠️ ${openedCount} dibuka, ${blockedCount} diblokir popup`, 'fa-exclamation-triangle');
            } else {
              showToast(`✅ ${openedCount} link berhasil dibuka!`, 'fa-check-circle');
            }
          }, 200);
        }
      }, index * 150);
    });
  } catch (error) {
    console.error('Error membuka semua link:', error);
    showToast('❌ Gagal membuka link', 'fa-times-circle');
  }
}

// ================= FUNGSI BARU: BOOKMARK/FAVORIT =================
function getBookmarks() {
  return JSON.parse(localStorage.getItem('bookmarks') || '[]');
}

function saveBookmarks(bookmarks) {
  localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
}

function isItemBookmarked(index) {

  return bookmarks.includes(index);
}

function toggleBookmark(index) {
  const bookmarks = getBookmarks();

function copyAllAnswers(index) {
  const item = filteredKendala[index];
  let allContent = `KENDALA: ${item.judul}\n\n`;
  
  if (item.jawaban1) allContent += `JAWABAN 1:\n${item.jawaban1}\n\n`;

// ================= FUNGSI BARU: EXPORT DATA =================
function exportData() {
  const data = filteredKendala.map((item, index) => ({
    No: index + 1,
    Judul: item.judul,
    Jawaban1: item.jawaban1,
    Jawaban2: item.jawaban2,
    Jawaban3: item.jawaban3
  }));
  
  const csv = convertToCSV(data);
  downloadCSV(csv, 'kendala_data.csv');
  showToast('✅ Data berhasil diexport!', 'fa-download');
}

function convertToCSV(data) {
  const headers = Object.keys(data[0]);
  const csvRows = [headers.join(',')];
  
  data.forEach(row => {
    const values = headers.map(header => {
      const val = row[header];
      const escaped = ('' + val).replace(/"/g, '""');
      return `"${escaped}"`;
    });
    csvRows.push(values.join(','));
  });
  
  return csvRows.join('\n');
}

function downloadCSV(csv, filename) {
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.setAttribute('href', url);
  link.setAttribute('download', filename);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function printView() {
  window.print();
}

// ================= FUNGSI BARU: FILTER BY CATEGORY =================
function filterByCategory(category) {
  currentFilter = category;
  
  document.querySelectorAll('.stat-item').forEach(item => {
    item.classList.remove('active');
  });
  
  event.target.closest('.stat-item').classList.add('active');
  
  switch(category) {
    case 'all':
      filteredKendala = [...allKendala];
      break;
    case 'photos':
      filteredKendala = allKendala.filter(item => detectPhotoLink(item) || extractTitlePhoto(item.judul));
      break;
    case 'links':
      filteredKendala = allKendala.filter(item => 
        extractLinks(item.jawaban1).length > 0 ||
        extractLinks(item.jawaban2).length > 0 ||
        extractLinks(item.jawaban3).length > 0
      );
      break;
    case 'bookmarked':
      const bookmarks = getBookmarks();
      filteredKendala = bookmarks.map(idx => allKendala[idx]).filter(item => item);
      break;
  }
  
  if (searchQuery) {
    filteredKendala = filteredKendala.filter(item =>
      item.judul.toLowerCase().includes(searchQuery) ||
      (item.jawaban1 && item.jawaban1.toLowerCase().includes(searchQuery)) ||
      (item.jawaban2 && item.jawaban2.toLowerCase().includes(searchQuery)) ||
      (item.jawaban3 && item.jawaban3.toLowerCase().includes(searchQuery))
    );
  }
  
  renderKendala();
  showToast(`🔍 Filter: ${category}`, 'fa-filter');
}

async function copyAnswer(index, answerNum) {
  const item = filteredKendala[index];
  const content = item[`jawaban${answerNum}`];
  if (!content) return;
  try {
    await navigator.clipboard.writeText(content);
    showToast('✅ Jawaban disalin!', 'fa-check-circle');
    const btn = event.target.closest('.copy-btn');
    if (btn) {
      const original = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
      btn.style.background = 'var(--accent-green)';
      setTimeout(() => {
        btn.innerHTML = original;
        btn.style.background = '';
      }, 1500);
    }
  } catch {
    fallbackCopy(content);
  }
}

async function copyTitlePhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin!', 'fa-check-circle');
  } catch {
    await navigator.clipboard.writeText(url);
    showToast('📋 URL foto disalin!', 'fa-copy');
  }
}

async function copyPhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin!', 'fa-check-circle');
  } catch {
    await navigator.clipboard.writeText(url);
    showToast('📋 URL foto disalin!', 'fa-copy');
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('✅ Disalin!', 'fa-check-circle');
  } catch {
    showToast('❗ Gagal menyalin', 'fa-times-circle');
  }
  document.body.removeChild(textarea);
}

function searchKendala() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  const searchClear = document.getElementById('searchClear');
  
  if (searchQuery) {
    searchClear.classList.add('show');
  } else {
    searchClear.classList.remove('show');
  }
  
  filteredKendala = allKendala.filter(item =>
    item.judul.toLowerCase().includes(searchQuery) ||
    (item.jawaban1 && item.jawaban1.toLowerCase().includes(searchQuery)) ||
    (item.jawaban2 && item.jawaban2.toLowerCase().includes(searchQuery)) ||
    (item.jawaban3 && item.jawaban3.toLowerCase().includes(searchQuery))
  );
  
  if (currentFilter !== 'all') {
    filterByCategory(currentFilter);
  } else {
    renderKendala();
  }
  
  updateStats();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchClear').classList.remove('show');
  filteredKendala = [...allKendala];
  renderKendala();
  updateStats();
  showToast('🔍 Pencarian dihapus', 'fa-search');
}

function updateStats() {
  document.getElementById('totalItems').textContent = filteredKendala.length;
  const withPhotos = filteredKendala.filter(item => detectPhotoLink(item) || extractTitlePhoto(item.judul)).length;
  document.getElementById('withPhotos').textContent = withPhotos;
  const withLinks = filteredKendala.filter(item =>
    extractLinks(item.jawaban1).length > 0 ||
    extractLinks(item.jawaban2).length > 0 ||
    extractLinks(item.jawaban3).length > 0
  ).length;
  document.getElementById('withLinks').textContent = withLinks;
  const bookmarkedCount = getBookmarks().length;
  document.getElementById('bookmarkedCount').textContent = bookmarkedCount;
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function escapeRegExp(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ================= LIGHTBOX =================
function openLightbox(url) {
  lightboxIndex = lightboxImages.indexOf(url);
  if (lightboxIndex === -1) {
    lightboxImages.push(url);
    lightboxIndex = lightboxImages.length - 1;
  }
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
  zoomLevel = 1;
  updateZoom();
}

function closeLightbox(event) {
  if (!event || event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightboxImg').src = '';
    document.body.style.overflow = '';
  }
}

function changeLightbox(direction) {
  lightboxIndex += direction;
  if (lightboxIndex < 0) lightboxIndex = lightboxImages.length - 1;
  if (lightboxIndex >= lightboxImages.length) lightboxIndex = 0;
  document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
  zoomLevel = 1;
  updateZoom();
}

function updateZoom() {
  zoomLevel = parseFloat(document.getElementById('zoomSlider').value);
  document.getElementById('lightboxImg').style.transform = `scale(${zoomLevel})`;
}

async function copyLightboxPhoto() {
  const url = document.getElementById('lightboxImg').src;
  if (url) await copyPhoto(url);
}

function downloadLightboxPhoto() {
  const url = document.getElementById('lightboxImg').src;
  if (!url) return;
  
  const link = document.createElement('a');
  link.href = url;
  link.download = 'photo_' + Date.now() + '.jpg';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('✅ Foto sedang didownload...', 'fa-download');
}

// ================= STICKY NOTES =================
function toggleStickyPanel() {
  const panel = document.getElementById("stickyPanel");
  panel.style.display = panel.style.display === "flex" ? "none" : "flex";
  loadStickyNotes();
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = (el.scrollHeight) + "px";
}

async function addSticky() {
  const input = document.getElementById("stickyInput");
  const text = input.value.trim();
  const image = input.dataset.image || null;
  if (!text && !image) return;
  
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  if (editIndex !== null) {
    stickies[editIndex] = { text, image };
    editIndex = null;
    document.getElementById("stickyAddBtn").querySelector("span").textContent = "Tambah";
  } else {
    stickies.push({ text, image });
  }
  localStorage.setItem("stickies", JSON.stringify(stickies));
  
  input.value = "";
  input.dataset.image = "";
  autoResize(input);
  removePhoto();
  loadStickyNotes();
  showToast('✅ Catatan ditambahkan!', 'fa-check-circle');
}

function loadStickyNotes() {
  const list = document.getElementById("stickyList");
  if (!list) return;
  list.innerHTML = "";
  const stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  
  if (stickies.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding: 30px; color: var(--text-muted); font-size: 14px;">Kosong - Tambahkan catatan</div>';
    return;
  }
  
  stickies.forEach((note, i) => {
    const div = document.createElement("div");
    div.className = "sticky-card";
    div.dataset.index = i;
    
    if (note.text) {
      const p = document.createElement("p");
      p.textContent = note.text;
      div.appendChild(p);
    }
    if (note.image) {
      const img = document.createElement("img");
      img.src = note.image;
      img.onclick = () => openLightbox(note.image);
      div.appendChild(img);
    }
    
    div.onclick = async (e) => {
      if (e.target.classList.contains('sticky-delete') || e.target.classList.contains('sticky-edit')) return;
      try {
        const items = {};
        if (note.text) items["text/plain"] = new Blob([note.text], { type: "text/plain" });
        if (note.image) {
          const resp = await fetch(note.image);
          const blob = await resp.blob();
          items[blob.type] = blob;
        }
        await navigator.clipboard.write([new ClipboardItem(items)]);
        showToast("✅ Teks + Gambar disalin!", "fa-check-circle");
      } catch {
        showToast("⚠ Gagal menyalin", "fa-times-circle");
      }
    };
    
    const del = document.createElement("span");
    del.textContent = "×";
    del.className = "sticky-delete";
    del.onclick = e => { e.stopPropagation(); deleteSticky(i); };
    
    const edit = document.createElement("span");
    edit.textContent = "✏️";
    edit.className = "sticky-edit";
    edit.onclick = e => { e.stopPropagation(); editSticky(i); };
    
    div.appendChild(del);
    div.appendChild(edit);
    div.setAttribute("draggable", true);
    div.ondragstart = e => e.dataTransfer.setData("text/plain", i);
    div.ondragover = e => { e.preventDefault(); div.style.borderColor = 'var(--neon-blue)'; };
    div.ondragleave = () => div.style.borderColor = '';
    div.ondrop = e => {
      e.preventDefault();
      div.style.borderColor = '';
      reorderSticky(e.dataTransfer.getData("text/plain"), i);
    };
    
    list.appendChild(div);
  });
}

function reorderSticky(from, to) {
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  const moved = stickies.splice(from, 1)[0];
  stickies.splice(to, 0, moved);
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
}

function deleteSticky(i) {
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  stickies.splice(i, 1);
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
  showToast('🗑️ Catatan dihapus', 'fa-trash');
}

function editSticky(i) {
  const stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  const input = document.getElementById("stickyInput");
  input.value = stickies[i].text || "";
  input.dataset.image = stickies[i].image || "";
  autoResize(input);
  if (stickies[i].image) showPhotoPreview(stickies[i].image);
  else removePhoto();
  editIndex = i;
  document.getElementById("stickyAddBtn").querySelector("span").textContent = "Update";
  input.focus();
}

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const base64 = e.target.result;
      document.getElementById("stickyInput").dataset.image = base64;
      showPhotoPreview(base64);
      showToast('📸 Foto diunggah!', 'fa-image');
    };
    reader.readAsDataURL(file);
  }
}

function handleStickyPaste(event) {
  const items = event.clipboardData.items;
  for (let i = 0; i < items.length; i++) {
    if (items[i].type.startsWith('image/')) {
      event.preventDefault();
      const blob = items[i].getAsFile();
      const reader = new FileReader();
      reader.onload = function(e) {
        const base64 = e.target.result;
        document.getElementById("stickyInput").dataset.image = base64;
        showPhotoPreview(base64);
        showToast('📸 Foto ditempel!', 'fa-image');
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
}

function showPhotoPreview(dataUrl) {
  const preview = document.getElementById('stickyPhotoPreview');
  const previewImg = document.getElementById('stickyPreviewImg');
  previewImg.src = dataUrl;
  preview.classList.add('show');
}

function removePhoto() {
  const input = document.getElementById("stickyInput");
  if(input) input.dataset.image = "";
  document.getElementById('stickyPhotoPreview').classList.remove('show');
  document.getElementById('fileInput').value = '';
}

function addToSticky(kendalaIndex, answerNum) {
  const item = filteredKendala[kendalaIndex];
  const content = item[`jawaban${answerNum}`];
  if (!content) return;
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = content.match(photoPattern);
  const imageUrl = match ? match[1] : null;
  
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  stickies.push({
    text: imageUrl ? content.replace(photoPattern, '').trim() : content,
    image: imageUrl
  });
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
  showToast('✅ Ditambahkan ke Sticky Notes!', 'fa-sticky-note');
}

// ================= FUNGSI BARU: BACKUP/RESTORE STICKY NOTES =================
function backupStickyNotes() {
  const stickies = localStorage.getItem("stickies") || "[]";
  const blob = new Blob([stickies], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'sticky_notes_backup_' + Date.now() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ Backup berhasil didownload!', 'fa-download');
}

function restoreStickyNotes() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        const data = JSON.parse(event.target.result);
        if (Array.isArray(data)) {
          localStorage.setItem("stickies", JSON.stringify(data));
          loadStickyNotes();
          showToast('✅ Restore berhasil!', 'fa-upload');
        } else {
          showToast('❌ Format file tidak valid', 'fa-times-circle');
        }
      } catch (error) {
        showToast('❌ Gagal membaca file', 'fa-times-circle');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ================= KEYBOARD SHORTCUTS =================
document.addEventListener('keydown', (e) => {
  // Ctrl+Shift+E = Expand All
  if (e.ctrlKey && e.shiftKey && e.key === 'E') {
    e.preventDefault();
    expandAll();
  }
  
  // Ctrl+Shift+C = Collapse All
  if (e.ctrlKey && e.shiftKey && e.key === 'C') {
    e.preventDefault();
    collapseAll();
  }
  
  // Ctrl+R = Refresh
  if (e.ctrlKey && e.key === 'r') {
    e.preventDefault();
    refreshData();
  }
  
  // Ctrl+F = Focus Search
  if (e.ctrlKey && e.key === 'f') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  
  // Escape = Close modals
  if (e.key === 'Escape') {
    closeLightbox();
    const panel = document.getElementById("stickyPanel");
    if (panel.style.display === "flex") toggleStickyPanel();
  }
});

// ================= INITIALIZATION =================
document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  loadKendalaData();
  const stickyInput = document.getElementById('stickyInput');
  if (stickyInput) {
    stickyInput.addEventListener('paste', handleStickyPaste);
  }
  setTimeout(() => showToast('🔷 System Ready!', 'fa-rocket'), 1000);
});
</script>

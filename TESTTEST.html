<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE TOGEL - Bonus Event (Enhanced Scan)</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- Menggunakan versi Tesseract yang stabil -->
<script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-dark: #020810;
    --bg-card: #061420;
    --bg-input: #0a1e30;
    --neon-blue: #00d4ff;
    --neon-cyan: #00fff7;
    --neon-glow: rgba(0, 212, 255, 0.4);
    --accent-green: #00ff88;
    --accent-red: #ff4757;
    --accent-orange: #ff9f43;
    --border-color: rgba(0, 212, 255, 0.3);
    --text-primary: #e0f4ff;
    --text-muted: #6b8fa8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
}

/* Background Animation */
.bg-animated {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
    background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(0, 180, 255, 0.03) 0%, transparent 70%),
    var(--bg-dark);
}
.bg-grid {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
    background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
}
@keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
}
.particle {
    position: fixed; width: 4px; height: 4px; background: var(--neon-blue);
    border-radius: 50%; pointer-events: none; z-index: -1;
    box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
    animation: floatParticle 15s infinite linear; opacity: 0.6;
}
@keyframes floatParticle {
    0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; } 90% { opacity: 0.6; }
    100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

/* Typography & Titles */
.judul-glow {
    font-family: 'Orbitron', sans-serif; font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 900; text-align: center; color: var(--neon-cyan);
    letter-spacing: 3px; margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(0, 255, 247, 0.3);
}
.bonus-title {
    font-family: 'Orbitron', sans-serif; font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 700; text-align: center; color: var(--neon-blue);
    letter-spacing: 2px; margin-bottom: 20px;
}

/* Layout & Containers */
.tab-content {
    display: block; padding: 20px; max-width: 1400px; margin: 0 auto;
    animation: fadeInUp 0.5s ease-out;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
.bonus-section {
    background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.8) 100%);
    border: 1px solid var(--border-color); border-radius: 20px;
    padding: 25px; margin: 10px; backdrop-filter: blur(10px);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 212, 255, 0.1);
}

/* Buttons */
.neon-switch-btn {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px;
    padding: 12px 20px;
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
    border: 1px solid var(--border-color); border-radius: 10px;
    color: var(--neon-blue); cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative; overflow: hidden; letter-spacing: 0.5px;
}
.neon-switch-btn::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
    transition: left 0.5s ease;
}
.neon-switch-btn:hover::before { left: 100%; }
.neon-switch-btn:hover {
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
    border-color: var(--neon-blue); transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}
.neon-switch-btn.active {
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.3) 0%, rgba(0, 180, 255, 0.2) 100%);
    border-color: var(--neon-cyan); color: var(--neon-cyan);
    box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
}
.neon-switch-btn.danger { border-color: rgba(255, 71, 87, 0.4); color: var(--accent-red); }
.neon-switch-btn.danger:hover { background: rgba(255, 71, 87, 0.2); border-color: var(--accent-red); }
.neon-switch-btn.orange { border-color: rgba(255, 159, 67, 0.4); color: var(--accent-orange); }
.neon-switch-btn.orange:hover { background: rgba(255, 159, 67, 0.2); border-color: var(--accent-orange); }

/* Inputs */
.bonus-textarea {
    width: 100%; min-height: 120px; background: var(--bg-input);
    border: 1px solid var(--border-color); border-radius: 12px; padding: 15px;
    color: var(--text-primary); font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 500; resize: vertical; transition: all 0.3s ease;
}
.bonus-textarea:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
.bonus-input {
    width: 100%; background: var(--bg-input); border: 1px solid var(--border-color);
    border-radius: 8px; padding: 10px 14px; color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 500; transition: all 0.3s ease;
}
.bonus-input:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }
.bonus-label { display: block; color: var(--neon-blue); font-weight: 700; margin-bottom: 6px; font-size: 14px; letter-spacing: 0.5px; }
.bonus-input-group { margin-bottom: 15px; }
.input-with-buttons { display: flex; gap: 8px; align-items: center; }
.input-with-buttons .bonus-input { flex: 1; }

/* Action Buttons */
.bonus-btn {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px;
    padding: 12px 24px; background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
    border: none; border-radius: 10px; color: var(--bg-dark); cursor: pointer;
    transition: all 0.3s ease; letter-spacing: 0.5px;
}
.bonus-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4); }
.bonus-btn.danger { background: linear-gradient(135deg, var(--accent-red) 0%, #cc3344 100%); }
.bonus-button-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }

/* Results & Gallery */
.bonus-result {
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 255, 136, 0.05) 100%);
    border: 1px solid var(--border-color); border-radius: 12px; padding: 20px;
    margin-top: 20px; font-size: 16px; font-weight: 600; line-height: 1.8; color: var(--text-primary);
}
.bonus-angka { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent-green); font-size: 1.1em; }
.gallery-container { width: 100%; margin: 20px 0; }
.combined-image-slot {
    width: 100%; display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
    gap: 15px; padding: 20px;
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(0, 180, 255, 0.02) 100%);
    border: 1px solid var(--border-color); border-radius: 16px; cursor: pointer; transition: all 0.3s ease;
}
.combined-image-slot:hover { border-color: var(--neon-blue); box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); }
.combined-image-slot img {
    width: calc(33.333% - 10px); min-width: 250px; max-width: 400px; height: auto;
    aspect-ratio: 4/3; object-fit: cover; border-radius: 12px;
    border: 2px solid var(--border-color); transition: all 0.3s ease;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
}
.combined-image-slot img:hover { border-color: var(--neon-blue); transform: scale(1.02); }
.caption-userid {
    font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700;
    color: var(--neon-cyan); width: 100%; text-align: center; padding: 10px 0; letter-spacing: 2px;
}
.package-info { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600; color: var(--neon-blue); text-align: center; margin-top: 15px; }

/* Scatter Cards */
.scatter-card {
    flex: 1; min-width: 280px;
    background: linear-gradient(135deg, rgba(0, 30, 50, 0.8) 0%, rgba(6, 20, 32, 0.6) 100%);
    padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); transition: all 0.3s ease;
}
.scatter-card:hover { border-color: var(--neon-blue); box-shadow: 0 5px 25px rgba(0, 212, 255, 0.15); }
.scatter-card-title { color: var(--neon-cyan); margin: 0 0 12px 0; font-size: 16px; font-family: 'Orbitron', sans-serif; font-weight: 700; }

/* Modals */
.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(2, 8, 16, 0.98); z-index: 10000; display: none;
    flex-direction: column; justify-content: center; align-items: center; padding: 20px;
    animation: modalFadeIn 0.3s ease-out;
}
@keyframes modalFadeIn { from { opacity: 0; backdrop-filter: blur(0); } to { opacity: 1; backdrop-filter: blur(10px); } }
.modal-close {
    position: absolute; top: 15px; right: 25px; font-size: 40px; color: var(--neon-blue);
    background: none; border: none; cursor: pointer; transition: all 0.3s ease; line-height: 1;
}
.modal-close:hover { color: var(--neon-cyan); transform: rotate(90deg); }

/* Zoom & Scan Specifics */
.zoom-nav-button {
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.2) 0%, rgba(0, 180, 255, 0.1) 100%);
    border: 1px solid var(--neon-blue); color: var(--neon-cyan);
    padding: 15px 25px; border-radius: 10px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; transition: all 0.3s ease;
}
.zoom-nav-button:hover { background: rgba(0, 212, 255, 0.3); box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3); }
.zoomed-content-wrapper { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: center; max-width: 95%; }
.zoomed-content-wrapper img {
    max-width: 30%; min-width: 200px; max-height: 70vh; object-fit: contain;
    border-radius: 12px; border: 2px solid var(--neon-blue);
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
}

/* SCAN MODAL STYLES */
#scanScatter2Modal .modal-content {
    display: flex; gap: 20px; max-width: 95vw; width: 100%; height: 85vh;
}
#scanScatter2Modal .image-section {
    flex: 1; display: flex; justify-content: center; align-items: center; 
    min-width: 300px; position: relative; overflow: hidden;
    background: #000; border-radius: 12px; border: 1px solid var(--border-color);
}
#scanScatter2Modal .image-section img {
    max-width: 100%; max-height: 100%; object-fit: contain; 
    transition: transform 0.3s ease; /* Smooth zoom */
}
/* Scanning Laser Effect */
.scan-laser {
    position: absolute; top: 0; left: 0; width: 100%; height: 4px;
    background: var(--neon-cyan);
    box-shadow: 0 0 15px var(--neon-cyan), 0 0 30px var(--neon-blue);
    animation: scanAnim 2s linear infinite;
    display: none; z-index: 10;
}
@keyframes scanAnim {
    0% { top: 0%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
}
.scanning-active .scan-laser { display: block; }

#scanScatter2Modal .result-section {
    flex: 1; min-width: 300px; max-width: 500px; overflow-y: auto; padding: 20px;
    background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color);
}

/* Toast & Utils */
.toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.95) 100%);
    border: 1px solid var(--neon-blue); border-radius: 12px; padding: 15px 30px;
    color: var(--text-primary); font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 600; z-index: 99999; opacity: 0;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.copy-btn {
    background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
    color: var(--bg-dark); border: none; padding: 6px 12px; border-radius: 6px;
    cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
    transition: all 0.3s ease;
}
.copy-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4); }
.copy-btn.copied { background: var(--accent-green); }
.result-item {
    margin-bottom: 12px; padding: 12px 15px;
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(0, 180, 255, 0.05) 100%);
    border: 1px solid rgba(0, 212, 255, 0.4); border-radius: 10px;
    display: flex; justify-content: space-between; align-items: center; gap: 15px;
    transition: all 0.3s ease;
}
.result-item.green {
    background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(0, 200, 100, 0.05) 100%);
    border-color: rgba(0, 255, 136, 0.4);
}
.result-item span { word-break: break-all; font-family: 'Orbitron', sans-serif; font-size: 14px; letter-spacing: 1px; }

@media (max-width: 768px) {
    .bonus-section { padding: 15px; margin: 5px; }
    .combined-image-slot img { width: 100%; max-width: 100%; min-width: unset; }
    .zoomed-content-wrapper img { max-width: 100%; min-width: unset; }
    #scanScatter2Modal .modal-content { flex-direction: column; height: auto; }
    #scanScatter2Modal .image-section, #scanScatter2Modal .result-section { min-width: unset; max-width: 100%; width: 100%; height: 400px; }
}
</style>
</head>
<body>
<div class="bg-animated"></div>
<div class="bg-grid"></div>
<div id="particles"></div>
<div id="toast" class="toast"></div>

<!-- ================= TAB CEK BONUS EVENT ================= -->
<div id="cekBonusEventTab" class="tab-content">
<div class="bonus-section">
<h3 class="judul-glow">LINE TOGEL</h3>
<h2 class="bonus-title">BONUS EVENT</h2>

<!-- ============ 3 SWITCH MODE BUTTON ============ -->
<div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 15px 0;">
<button class="neon-switch-btn" onclick="switchBonusMode('bonusAsli')" id="btn-bonusAsli">Cek Bonus Asli</button>
<button class="neon-switch-btn" onclick="switchBonusMode('galeri')" id="btn-galeri">CEK GAMBAR</button>
<button class="neon-switch-btn" onclick="switchBonusMode('inputScatter')" id="btn-inputScatter">Input Scatter (OCR)</button>
</div>

<!-- ============ MODE 1: CEK BONUS ASLI ============ -->
<div id="modeBonusAsli" class="bonus-mode">
<textarea id="bonusTextarea" class="bonus-textarea" placeholder="Tempelkan data transaksi di sini..."></textarea>
<div class="bonus-input-group">
<label for="bonusPatokan" class="bonus-label">Nilai Patokan:</label>
<input type="text" id="bonusPatokan" class="bonus-input" placeholder="Contoh: 5000000">
</div>
<div class="bonus-input-group">
<label for="bonusSurplus" class="bonus-label">Nilai Surplus:</label>
<input type="text" id="bonusSurplus" class="bonus-input" placeholder="Contoh: 1500000">
</div>
<div class="bonus-button-group">
<button onclick="hitungBonusEvent()" class="bonus-btn">Hitung Bonus</button>
<button onclick="hapusBonusEvent()" class="bonus-btn danger">Bersihkan</button>
</div>
<div id="bonusHasil" class="bonus-result"></div>
</div>

<!-- ============ MODE 2: GALERI GAMBAR ============ -->
<div id="modeGaleri" class="bonus-mode" style="display: none;">
<h2 class="bonus-title">CEK GAMBAR</h2>
<p style="text-align: center; color: var(--text-muted); margin-bottom: 12px; font-weight: 600;">
Format: <strong style="color: var(--neon-blue);">USERID link1 link2 link3</strong>
</p>
<textarea id="bonusLinkInput" class="bonus-textarea" placeholder="Tempelkan data paket di sini..." rows="5" oninput="handleBonusInput()"></textarea>
<div class="bonus-button-group">
<button onclick="clearBonusAllData()" class="bonus-btn danger">Hapus Semua</button>
</div>
<hr style="margin: 20px 0; border-color: var(--border-color);">
<div class="gallery-container">
<div class="combined-image-slot" id="bonusCombinedImageSlot" onclick="openBonusZoom()">
<p class="caption-userid" id="bonusCombinedSlotUserid">USER ID</p>
<img id="bonusImgSlot1" src="https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=Gambar+1" alt="Gambar 1">
<img id="bonusImgSlot2" src="https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=Gambar+2" alt="Gambar 2">
<img id="bonusImgSlot3" src="https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=Gambar+3" alt="Gambar 3">
</div>
</div>
<p class="package-info">Paket: <span id="bonusCurrentPackageNum">0</span> / <span id="bonusMaxPackageNum">0</span></p>
</div>

<!-- ============ MODE 3: INPUT SCATTER (OCR ENHANCED) ============ -->
<div id="modeInputScatter" class="bonus-mode" style="display: none;">
<div style="display: flex; gap: 16px; justify-content: space-between; flex-wrap: wrap;">

<!-- DATA 1 -->
<div class="scatter-card">
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
<h4 class="scatter-card-title">DATA SCATTER 1</h4>
<button onclick="copyData1()" class="neon-switch-btn" style="padding: 6px 12px; font-size: 12px;">Copy</button>
</div>
<div class="bonus-input-group"><label class="bonus-label">UID:</label><input type="text" id="bonusUserid1" class="bonus-input"></div>
<div class="bonus-input-group"><label class="bonus-label">S1:</label><input type="text" id="bonusScatter1_1" class="bonus-input" placeholder="Link gambar S1..."></div>
<div class="bonus-input-group">
    <label class="bonus-label">S2 (Scan OCR):</label>
    <div class="input-with-buttons">
        <input type="text" id="bonusScatter2_1" class="bonus-input" placeholder="Link gambar PNG/JPG...">
        <button type="button" onclick="initiateScan(1)" class="bonus-btn" style="padding: 8px 12px; font-size: 14px;">
            <i class="fas fa-search"></i> Scan
        </button>
    </div>
</div>
<div class="bonus-input-group"><label class="bonus-label">S3:</label><input type="text" id="bonusScatter3_1" class="bonus-input" placeholder="Link gambar S3..."></div>
<div class="bonus-input-group"><label class="bonus-label">Rek:</label><input type="text" id="bonusRekening1" class="bonus-input" placeholder="Nama, No Rek"></div>
<div class="bonus-input-group"><label class="bonus-label">Kode:</label><input type="text" id="bonusKodeTransaksi1" class="bonus-input" placeholder="Hasil scan..."></div>
<div style="margin-top: 20px; text-align: center;">
    <button onclick="viewAllScatterPhotos(1)" class="neon-switch-btn orange" style="width: 100%; padding: 12px;">Lihat 3 Foto</button>
</div>
</div>

<!-- DATA 2 -->
<div class="scatter-card">
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
<h4 class="scatter-card-title">DATA SCATTER 2</h4>
<button onclick="copyData2()" class="neon-switch-btn" style="padding: 6px 12px; font-size: 12px;">Copy</button>
</div>
<div class="bonus-input-group"><label class="bonus-label">UID:</label><input type="text" id="bonusUserid2" class="bonus-input"></div>
<div class="bonus-input-group"><label class="bonus-label">S1:</label><input type="text" id="bonusScatter1_2" class="bonus-input" placeholder="Link gambar S1..."></div>
<div class="bonus-input-group">
    <label class="bonus-label">S2 (Scan OCR):</label>
    <div class="input-with-buttons">
        <input type="text" id="bonusScatter2_2" class="bonus-input" placeholder="Link gambar PNG/JPG...">
        <button type="button" onclick="initiateScan(2)" class="bonus-btn" style="padding: 8px 12px; font-size: 14px;">
            <i class="fas fa-search"></i> Scan
        </button>
    </div>
</div>
<div class="bonus-input-group"><label class="bonus-label">S3:</label><input type="text" id="bonusScatter3_2" class="bonus-input" placeholder="Link gambar S3..."></div>
<div class="bonus-input-group"><label class="bonus-label">Rek:</label><input type="text" id="bonusRekening2" class="bonus-input" placeholder="Nama, No Rek"></div>
<div class="bonus-input-group"><label class="bonus-label">Kode:</label><input type="text" id="bonusKodeTransaksi2" class="bonus-input" placeholder="Hasil scan..."></div>
<div style="margin-top: 20px; text-align: center;">
    <button onclick="viewAllScatterPhotos(2)" class="neon-switch-btn orange" style="width: 100%; padding: 12px;">Lihat 3 Foto</button>
</div>
</div>

</div>
<div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px;">
<button onclick="copySemuaData()" class="neon-switch-btn">Copy Semua</button>
<button onclick="hapusSemuaData()" class="neon-switch-btn danger">Hapus Semua</button>
</div>
</div>
</div>
</div>

<!-- Modal Scan Enhanced -->
<div id="scanScatter2Modal" class="modal-overlay">
    <button class="modal-close" onclick="closeScanScatter2Modal()" aria-label="Tutup">&times;</button>
    <h3 style="color: var(--neon-cyan); text-align: center; margin-bottom: 10px; font-family: 'Orbitron';">PREVIEW & SCAN</h3>
    
    <!-- Zoom Controls inside Modal -->
    <div style="margin-bottom: 10px; display: flex; gap: 10px; align-items: center;">
        <span style="color: var(--text-muted); font-size: 14px;">Zoom:</span>
        <input type="range" min="1" max="3" step="0.1" value="1" id="scanZoomSlider" oninput="updateScanZoom(this.value)" style="width: 150px; accent-color: var(--neon-blue);">
        <button onclick="processOCR()" class="bonus-btn" style="padding: 5px 15px; font-size: 14px; margin-left: auto;">MULAI SCAN</button>
    </div>

    <div class="modal-content">
        <div class="image-section" id="scanImageContainer">
            <div class="scan-laser"></div>
            <img id="scanPreviewImage" src="" alt="Preview">
        </div>
        <div class="result-section">
            <div id="scanStatus" style="color: var(--neon-blue); margin-bottom: 10px; font-weight: bold;"></div>
            <div id="scanScatter2Result" style="color: var(--text-primary); font-size: 15px; line-height: 1.6;"></div>
        </div>
    </div>
</div>

<!-- Modal Zoom 3 Foto Scatter -->
<div id="scatterZoomModal" class="modal-overlay">
<button class="modal-close" onclick="closeScatterZoom()" aria-label="Tutup">&times;</button>
<h3 id="scatterZoomTitle" style="color: var(--neon-cyan); text-align: center; margin-bottom: 20px; font-family: 'Orbitron';">Lihat 3 Foto Scatter</h3>
<div class="zoomed-content-wrapper" id="scatterZoomContent"></div>
</div>

<!-- Modal Zoom Galeri -->
<div id="bonusZoomModal" class="modal-overlay">
<button class="modal-close" onclick="closeBonusZoom()" aria-label="Tutup zoom">&times;</button>
<span id="bonusZoomedUserid" style="display: block; text-align: center; font-size: 22px; margin-bottom: 20px; color: var(--neon-cyan); font-family: 'Orbitron';"></span>
<div style="display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; width: 100%;">
<button class="zoom-nav-button" id="bonusPrevZoomBtn" onclick="navigateBonusPackage('prev')">Prev</button>
<div class="zoomed-content-wrapper" id="bonusZoomedContentWrapper"></div>
<button class="zoom-nav-button" id="bonusNextZoomBtn" onclick="navigateBonusPackage('next')">Next</button>
</div>
</div>

<!-- Lightbox Modal -->
<div id="lightboxModal" class="modal-overlay">
<button class="modal-close" onclick="closeLightbox()" aria-label="Tutup">&times;</button>
<img id="lightboxImage" src="" style="max-width: 90%; max-height: 85%; border-radius: 12px; box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);">
<div style="display: flex; gap: 15px; margin-top: 20px;">
<button onclick="prevImage()" class="zoom-nav-button">Prev</button>
<button onclick="nextImage()" class="zoom-nav-button">Next</button>
</div>
</div>

<script>
// ================= INITIALIZATION =================
let currentBonusMode = 'bonusAsli';
let bonusAllPackagesData = [];
let bonusCurrentPackageIndex = 0;
const bonusPackageSize = 3;
let isBonusZoomOpen = false;
let imageList = [];
let currentImageIndex = 0;
let scatterZoomImages = [];
let currentScatterDataIndex = 1; // To track which input gets the result

function createParticles() {
    const container = document.getElementById('particles');
    if (!container) return;
    container.innerHTML = '';
    for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        container.appendChild(particle);
    }
}

function showToast(message) {
    const toast = document.getElementById('toast');
    if (!toast) return;
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// ================= MODE SWITCHING =================
function switchBonusMode(mode) {
    document.getElementById('modeBonusAsli').style.display = 'none';
    document.getElementById('modeGaleri').style.display = 'none';
    document.getElementById('modeInputScatter').style.display = 'none';
    if (mode === 'bonusAsli') document.getElementById('modeBonusAsli').style.display = 'block';
    else if (mode === 'galeri') document.getElementById('modeGaleri').style.display = 'block';
    else if (mode === 'inputScatter') document.getElementById('modeInputScatter').style.display = 'block';
    ['bonusAsli', 'galeri', 'inputScatter'].forEach(id => {
        const btn = document.getElementById('btn-' + id);
        if (btn) btn.classList.toggle('active', id === mode);
    });
}

// ================= ENHANCED SCAN LOGIC =================
let currentScanLink = "";

// 1. Initiate Scan: Show Modal with Zoomable Preview
function initiateScan(index) {
    currentScatterDataIndex = index;
    const link = document.getElementById('bonusScatter2_' + index).value.trim();
    if (!link) { showToast("Masukkan link gambar Scatter 2!"); return; }
    
    currentScanLink = link;
    const img = document.getElementById('scanPreviewImage');
    const slider = document.getElementById('scanZoomSlider');
    const status = document.getElementById('scanStatus');
    const resultDiv = document.getElementById('scanScatter2Result');
    const container = document.getElementById('scanImageContainer');
    
    // Reset UI
    img.src = link;
    slider.value = 1;
    img.style.transform = "scale(1)";
    status.innerHTML = "Siap Scan. Gunakan slider untuk zoom, lalu tekan MULAI SCAN.";
    resultDiv.innerHTML = "";
    container.classList.remove('scanning-active');
    
    document.getElementById('scanScatter2Modal').style.display = 'flex';
}

// 2. Update Zoom in Modal
function updateScanZoom(val) {
    const img = document.getElementById('scanPreviewImage');
    img.style.transform = `scale(${val})`;
}

// 3. Process OCR with Image Pre-processing
function processOCR() {
    if (!currentScanLink) return;
    
    const status = document.getElementById('scanStatus');
    const resultDiv = document.getElementById('scanScatter2Result');
    const container = document.getElementById('scanImageContainer');
    
    status.innerHTML = '<span style="color:var(--accent-orange)">Memproses gambar (Enhancing Contrast)...</span>';
    resultDiv.innerHTML = "";
    container.classList.add('scanning-active'); // Start laser animation

    // Create an off-screen canvas to preprocess the image
    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.src = currentScanLink;
    
    img.onload = function() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.width;
        canvas.height = img.height;
        
        // Draw original
        ctx.drawImage(img, 0, 0);
        
        // Get pixel data
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        
        // Apply Grayscale & High Contrast
        for (let i = 0; i < data.length; i += 4) {
            // Grayscale
            const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
            // Threshold/Binarize (Make it black and white strictly)
            // Adjust threshold (120) if needed for lighter images
            const val = avg > 110 ? 255 : 0; 
            
            data[i] = val;     // R
            data[i + 1] = val; // G
            data[i + 2] = val; // B
        }
        
        ctx.putImageData(imageData, 0, 0);
        const processedUrl = canvas.toDataURL('image/png');
        
        status.innerHTML = '<span style="color:var(--neon-blue)">Membaca teks dengan AI...</span>';

        // Run Tesseract on processed image
        Tesseract.recognize(processedUrl, 'eng', { 
            logger: m => {
                if(m.status === 'recognizing text') {
                    status.innerHTML = `Scanning: ${Math.round(m.progress * 100)}%`;
                }
            } 
        }).then(({ data: { text } }) => {
            container.classList.remove('scanning-active');
            status.innerHTML = '<span style="color:var(--accent-green)">Scan Selesai!</span>';
            parseAndDisplayResults(text);
        }).catch(err => {
            container.classList.remove('scanning-active');
            status.innerHTML = '<span style="color:var(--accent-red)">Error Scan.</span>';
            console.error(err);
        });
    };
    
    img.onerror = function() {
        container.classList.remove('scanning-active');
        status.innerHTML = '<span style="color:var(--accent-red)">Gagal memuat gambar (CORS/Broken Link).</span>';
    };
}

function parseAndDisplayResults(text) {
    const resultDiv = document.getElementById('scanScatter2Result');
    const rawLines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
    
    let hasilGabung = [], hasilLangsung = [];
    
    // Logic: Find long numbers (9-15 digits) typical for transaction codes
    for (let i = 0; i < rawLines.length; i++) {
        const line = rawLines[i];
        // Look for sequence of digits
        const matches = line.match(/\d{8,}/g);
        if (matches) {
            matches.forEach(m => hasilLangsung.push(m));
        }
    }
    
    // Remove duplicates
    hasilLangsung = [...new Set(hasilLangsung)];
    
    resultDiv.innerHTML = "";
    
    if (hasilLangsung.length > 0) {
        const title = document.createElement("div");
        title.innerHTML = '<b style="color: var(--neon-cyan); font-size: 16px; margin-bottom:10px; display:block;">Angka Terdeteksi:</b>';
        resultDiv.appendChild(title);
        
        hasilLangsung.forEach(kode => {
            const div = document.createElement("div");
            div.className = "result-item green";
            div.innerHTML = `<span style="font-weight: 600; font-size:16px;">${kode}</span>
            <div style="display:flex; gap:8px;">
                <button onclick="copyWithFeedback(this, '${kode}')" class="copy-btn">Copy</button>
                <button onclick="pilihKodeTransaksi('${kode}')" class="copy-btn" style="background: var(--accent-green);">Pilih</button>
            </div>`;
            resultDiv.appendChild(div);
        });
    } else {
        resultDiv.innerHTML = '<div style="padding:10px; border:1px dashed var(--accent-red); color:var(--accent-red);">Tidak ditemukan angka yang jelas.<br>Coba zoom in pada gambar dan pastikan angka terlihat kontras sebelum menekan Scan.</div>';
    }
}

function copyWithFeedback(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
        const original = btn.innerHTML;
        btn.innerHTML = 'OK';
        btn.classList.add('copied');
        setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 1000);
    });
}

function pilihKodeTransaksi(kode) {
    document.getElementById('bonusKodeTransaksi' + currentScatterDataIndex).value = kode;
    closeScanScatter2Modal();
    showToast("Kode Data " + currentScatterDataIndex + " dipilih: " + kode);
}

function closeScanScatter2Modal() {
    document.getElementById('scanScatter2Modal').style.display = 'none';
}

// ================= VIEW ALL 3 SCATTER PHOTOS =================
function viewAllScatterPhotos(dataIndex) {
    const s1 = document.getElementById('bonusScatter1_' + dataIndex).value.trim();
    const s2 = document.getElementById('bonusScatter2_' + dataIndex).value.trim();
    const s3 = document.getElementById('bonusScatter3_' + dataIndex).value.trim();
    scatterZoomImages = [s1, s2, s3].filter(link => link && link.startsWith('http'));

    if (scatterZoomImages.length === 0) { showToast("Tidak ada link gambar valid!"); return; }

    const wrapper = document.getElementById('scatterZoomContent');
    wrapper.innerHTML = '';
    scatterZoomImages.forEach((link) => {
        const img = document.createElement('img');
        img.src = link;
        img.onclick = () => openLightboxScatter(img);
        wrapper.appendChild(img);
    });
    document.getElementById('scatterZoomModal').style.display = 'flex';
}

function closeScatterZoom() { document.getElementById('scatterZoomModal').style.display = 'none'; }
function openLightboxScatter(imgElement) {
    imageList = [...scatterZoomImages];
    currentImageIndex = imageList.indexOf(imgElement.src);
    document.getElementById("lightboxImage").src = imgElement.src;
    document.getElementById("lightboxModal").style.display = 'flex';
}

// ================= COPY FUNCTIONS =================
function getDataAs7Columns(prefix) {
    const userid = document.getElementById('bonusUserid' + prefix).value.trim();
    const s1 = document.getElementById('bonusScatter1_' + prefix).value.trim();
    const s2 = document.getElementById('bonusScatter2_' + prefix).value.trim();
    const s3 = document.getElementById('bonusScatter3_' + prefix).value.trim();
    const rek = document.getElementById('bonusRekening' + prefix).value.trim();
    const kode = document.getElementById('bonusKodeTransaksi' + prefix).value.trim();
    let parts = [];
    if (userid) parts.push(userid);
    if (s1) parts.push(s1);
    if (s2) parts.push(s2);
    if (s3) parts.push(s3);
    if (rek) {
        const { nomor, nama } = prosesRekening(rek);
        if (nomor) parts.push(nomor);
        if (nama) parts.push(nama);
    }
    if (kode) parts.push(kode);
    return parts.join('\t');
}

function prosesRekening(rek) {
    const parts = rek.split(',').map(p => p.trim());
    return { nomor: parts.slice(1).join(',') || '', nama: parts[0] || '' };
}

function copyData1() { navigator.clipboard.writeText(getDataAs7Columns('1')); showToast("Data 1 disalin"); }
function copyData2() { navigator.clipboard.writeText(getDataAs7Columns('2')); showToast("Data 2 disalin"); }
function copySemuaData() {
    const d1 = getDataAs7Columns('1');
    const d2 = getDataAs7Columns('2');
    let lines = [];
    if (d1) lines.push(d1);
    if (d2) lines.push(d2);
    navigator.clipboard.writeText(lines.join('\n'));
    showToast(lines.length ? "Semua data disalin" : "Data kosong");
}
function hapusSemuaData() {
    ['1','2'].forEach(p => {
        ['bonusUserid','bonusScatter1_','bonusScatter2_','bonusScatter3_','bonusRekening','bonusKodeTransaksi'].forEach(f => {
            const el = document.getElementById(f + p); if(el) el.value='';
        });
    });
    showToast("Data dihapus");
}

// ================= HITUNG BONUS EVENT =================
function hitungBonusEvent() {
    const isi = document.getElementById("bonusTextarea").value.trim();
    const patokan = parseInt((document.getElementById("bonusPatokan").value || '').replace(/[^\d]/g, '')) || 0;
    const surplus = parseInt((document.getElementById("bonusSurplus").value || '').replace(/[^\d]/g, '')) || 0;
    if (!isi) { showToast("Tempelkan data terlebih dahulu"); return; }
    const lines = isi.split("\n");
    let total = 0, i = 0;
    while (i < lines.length) {
        if (lines[i].trim() === 'Credit' && i + 1 < lines.length) {
            const amountMatch = lines[i + 1].trim().match(/IDR\s([\d,]+)/i);
            if (amountMatch) total += parseFloat(amountMatch[1].replace(/,/g, ''));
        }
        i++;
    }
    const hasilDiv = document.getElementById("bonusHasil");
    if (hasilDiv) {
        let output = '<strong>Total Hitungan:</strong> <span class="bonus-angka">IDR ' + total.toLocaleString("en-US") + '</span>';
        if (patokan || surplus) {
            const totalPengurang = patokan + surplus;
            const selisih = total - totalPengurang;
            const selisihColor = selisih >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
            output += `<br><strong>Patokan:</strong> <span class="bonus-angka">IDR ${patokan.toLocaleString("en-US")}</span>`;
            output += `<br><strong>Surplus:</strong> <span class="bonus-angka">IDR ${surplus.toLocaleString("en-US")}</span>`;
            output += `<br><strong>Selisih:</strong> <span class="bonus-angka" style="color:${selisihColor}">IDR ${Math.abs(selisih).toLocaleString("en-US")}</span>`;
        }
        hasilDiv.innerHTML = output;
    }
}
function hapusBonusEvent() {
    ["bonusTextarea","bonusPatokan","bonusSurplus","bonusHasil"].forEach(id => {
        const el = document.getElementById(id);
        if (el) { if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') el.value = ""; else el.innerHTML = ""; }
    });
}

// ================= GALERI OTOMATIS =================
let bonusInputTimeout;
function handleBonusInput() {
    clearTimeout(bonusInputTimeout);
    bonusInputTimeout = setTimeout(loadBonusImages, 50);
}
function loadBonusImages() {
    const inputEl = document.getElementById('bonusLinkInput');
    if (!inputEl) return;
    const lines = inputEl.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    bonusAllPackagesData = [];
    lines.forEach(line => {
        const words = line.split(/\s+/).filter(w => w.length > 0);
        const urls = words.filter(w => /^https?:\/\//.test(w));
        const userid = words.length > 0 && !/^https?:\/\//.test(words[0]) ? words[0] : 'N/A';
        if (urls.length >= 1) {
            const links = [...urls.slice(0, bonusPackageSize)];
            while (links.length < bonusPackageSize) links.push('');
            bonusAllPackagesData.push({ userid, links });
        }
    });
    document.getElementById('bonusMaxPackageNum').textContent = bonusAllPackagesData.length;
    if (bonusAllPackagesData.length > 0) {
        bonusCurrentPackageIndex = Math.max(0, Math.min(bonusCurrentPackageIndex, bonusAllPackagesData.length - 1));
        updateBonusGallery(bonusCurrentPackageIndex);
    } else {
        updateBonusGallery(-1);
        document.getElementById('bonusCurrentPackageNum').textContent = '0';
    }
}
function updateBonusGallery(index) {
    const slots = ['bonusImgSlot1', 'bonusImgSlot2', 'bonusImgSlot3'].map(id => document.getElementById(id));
    const combined = document.getElementById('bonusCombinedImageSlot');
    const useridEl = document.getElementById('bonusCombinedSlotUserid');
    const currentNumEl = document.getElementById('bonusCurrentPackageNum');
    if (index >= 0 && index < bonusAllPackagesData.length) {
        const { userid, links } = bonusAllPackagesData[index];
        if (useridEl) useridEl.textContent = 'USER ID: ' + userid;
        if (combined) { combined.style.opacity = '1'; combined.style.pointerEvents = 'auto'; }
        slots.forEach((img, i) => {
            if (!img) return;
            img.src = links[i] || "https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=-";
            img.style.display = 'inline-block';
        });
        if (currentNumEl) currentNumEl.textContent = index + 1;
    } else {
        if (useridEl) useridEl.textContent = 'Belum Ada Data';
        if (combined) { combined.style.opacity = '0.4'; combined.style.pointerEvents = 'none'; }
        slots.forEach((img, i) => {
            if (!img) return;
            img.src = "https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=-";
            img.style.display = 'inline-block';
        });
        if (currentNumEl) currentNumEl.textContent = '0';
    }
}
function navigateBonusPackage(dir) {
    if (bonusAllPackagesData.length <= 1) return;
    const total = bonusAllPackagesData.length;
    if (dir === 'next' && bonusCurrentPackageIndex < total - 1) bonusCurrentPackageIndex++;
    else if (dir === 'prev' && bonusCurrentPackageIndex > 0) bonusCurrentPackageIndex--;
    updateBonusGallery(bonusCurrentPackageIndex);
    if (isBonusZoomOpen) {
        const pkg = bonusAllPackagesData[bonusCurrentPackageIndex];
        updateBonusZoomDisplay(pkg.userid, pkg.links);
    }
}
function updateBonusZoomDisplay(userid, links) {
    const wrapper = document.getElementById('bonusZoomedContentWrapper');
    const useridEl = document.getElementById('bonusZoomedUserid');
    if (!wrapper) return;
    wrapper.innerHTML = '';
    links.filter(Boolean).forEach(link => {
        const img = document.createElement('img');
        img.src = link;
        img.style.cssText = 'max-width: 30%; min-width: 200px; max-height: 70vh; object-fit: contain; border-radius: 12px; border: 2px solid var(--neon-blue); box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);';
        wrapper.appendChild(img);
    });
    if (useridEl) useridEl.textContent = userid;
    document.getElementById('bonusPrevZoomBtn').disabled = (bonusCurrentPackageIndex <= 0);
    document.getElementById('bonusNextZoomBtn').disabled = (bonusCurrentPackageIndex >= bonusAllPackagesData.length - 1);
}
function openBonusZoom() {
    if (bonusAllPackagesData.length === 0) return;
    const current = bonusAllPackagesData[bonusCurrentPackageIndex];
    if (!current.links.some(l => l)) return;
    isBonusZoomOpen = true;
    updateBonusZoomDisplay(current.userid, current.links);
    document.getElementById('bonusZoomModal').style.display = 'flex';
}
function closeBonusZoom() { document.getElementById('bonusZoomModal').style.display = 'none'; isBonusZoomOpen = false; }
function clearBonusAllData() {
    bonusAllPackagesData = [];
    document.getElementById('bonusLinkInput').value = '';
    updateBonusGallery(-1);
    document.getElementById('bonusMaxPackageNum').textContent = '0';
    showToast("Data galeri dihapus");
}

// ================= LIGHTBOX =================
function closeLightbox() { document.getElementById("lightboxModal").style.display = 'none'; }
function nextImage() {
    if (imageList.length === 0) return;
    currentImageIndex = (currentImageIndex + 1) % imageList.length;
    document.getElementById("lightboxImage").src = imageList[currentImageIndex];
}
function prevImage() {
    if (imageList.length === 0) return;
    currentImageIndex = (currentImageIndex - 1 + imageList.length) % imageList.length;
    document.getElementById("lightboxImage").src = imageList[currentImageIndex];
}

// ================= INIT =================
document.addEventListener('DOMContentLoaded', function() {
    createParticles();
    switchBonusMode('bonusAsli');
});
</script>
</body>
</html>

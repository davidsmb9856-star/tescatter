<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ✨ BLUE NEON COOL SYSTEM ✨ */
:root {
  --neon: #00f3ff;
  --neon-dim: #00b8d4;
  --neon-glow: rgba(0, 243, 255, 0.45);
  --neon-border: rgba(0, 243, 255, 0.35);
  --bg: #02060e;
  --surface: rgba(12, 22, 38, 0.68);
  --surface-hover: rgba(18, 32, 52, 0.85);
  --text: #e8f2ff;
  --text-muted: #6a9ec0;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-pill: 100px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --shadow-sm: 0 4px 14px rgba(0, 0, 0, 0.35);
  --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.45), 0 0 18px rgba(0, 243, 255, 0.12);
  --shadow-lg: 0 14px 42px rgba(0, 0, 0, 0.55), 0 0 28px rgba(0, 243, 255, 0.22);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* ✨ BACKGROUND ✨ */
.bg {
  position: fixed; inset: 0; z-index: -2;
  background: radial-gradient(1200px 800px at 15% 20%, rgba(0, 184, 212, 0.18), transparent 70%),
              radial-gradient(900px 600px at 85% 80%, rgba(0, 243, 255, 0.15), transparent 70%),
              var(--bg);
  animation: bgShift 20s ease-in-out infinite alternate;
}
@keyframes bgShift { 0%,100%{transform:scale(1) translate(0,0)}50%{transform:scale(1.04) translate(-1.5%, 1.2%)} }
.grid-bg {
  position: fixed; inset: 0; z-index: -1; opacity: 0.06;
  background-image: linear-gradient(rgba(0, 243, 255, 0.25) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.25) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: radial-gradient(ellipse at center, black 40%, transparent 85%);
}

/* ✨ LAYOUT ✨ */
.container { max-width: 1360px; margin: 0 auto; padding: 22px 20px 50px; }

/* ✨ TOP BAR ✨ */
.top-bar {
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  padding: 14px 20px; margin-bottom: 26px;
  background: var(--surface); border: 1px solid var(--neon-border); border-radius: var(--radius-lg);
  backdrop-filter: blur(16px); box-shadow: var(--shadow-sm); position: sticky; top: 12px; z-index: 40;
  transition: box-shadow 0.3s var(--ease), border-color 0.3s var(--ease);
}
.top-bar:hover { box-shadow: var(--shadow-md); border-color: rgba(0, 243, 255, 0.55); }
.brand { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
.brand i { color: var(--neon); filter: drop-shadow(0 0 8px var(--neon-glow)); }
.search-wrap { flex: 1; max-width: 440px; position: relative; }
.search-input {
  width: 100%; padding: 12px 16px 12px 42px; background: rgba(0, 243, 255, 0.06);
  border: 1px solid rgba(0, 243, 255, 0.25); border-radius: var(--radius-pill);
  color: var(--text); font-size: 15px; transition: all 0.3s var(--ease);
}
.search-input:focus { outline: none; border-color: var(--neon); background: rgba(0, 243, 255, 0.12); box-shadow: 0 0 0 4px rgba(0, 243, 255, 0.15); }
.search-input::placeholder { color: var(--text-muted); }
.search-wrap i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
.actions { display: flex; gap: 10px; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 14px; background: rgba(255,255,255,0.06);
  border: 1px solid var(--neon-border); color: var(--text-muted); cursor: pointer;
  display: grid; place-items: center; transition: all 0.3s var(--ease);
}
.icon-btn:hover, .icon-btn.active { background: rgba(0, 243, 255, 0.18); border-color: var(--neon); color: var(--neon); box-shadow: 0 0 14px var(--neon-glow); transform: translateY(-2px); }

/* ✨ FILTER PILLS ✨ */
.filters { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }
.pill {
  padding: 8px 16px; border-radius: var(--radius-pill); background: rgba(255,255,255,0.04);
  border: 1px solid rgba(0, 243, 255, 0.2); color: var(--text-muted); font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all 0.28s var(--ease); display: flex; align-items: center; gap: 6px;
}
.pill:hover { background: rgba(0, 243, 255, 0.12); border-color: rgba(0, 243, 255, 0.4); color: var(--text); }
.pill.active { background: rgba(0, 243, 255, 0.22); border-color: var(--neon); color: var(--neon); box-shadow: 0 0 12px var(--neon-glow); }

/* ✨ GALLERY GRID ✨ */
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 18px; }
.card {
  background: var(--surface); border: 1px solid rgba(0, 243, 255, 0.18); border-radius: var(--radius-md);
  overflow: hidden; position: relative; cursor: pointer; transition: all 0.4s var(--ease);
  box-shadow: var(--shadow-sm); opacity: 0; transform: translateY(14px); animation: cardIn 0.5s var(--ease) forwards;
}
.card:nth-child(1){animation-delay:0.05s} .card:nth-child(2){animation-delay:0.1s} .card:nth-child(3){animation-delay:0.15s}
@keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
.card:hover { transform: translateY(-5px) scale(1.015); border-color: var(--neon); box-shadow: var(--shadow-lg); background: var(--surface-hover); }
.card-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: #061220; transition: transform 0.5s var(--ease); }
.card:hover .card-img { transform: scale(1.05); }
.card-overlay {
  position: absolute; inset: 0; background: linear-gradient(180deg, transparent 45%, rgba(2, 6, 14, 0.92) 100%);
  display: flex; flex-direction: column; justify-content: flex-end; padding: 16px; opacity: 0; transition: opacity 0.35s var(--ease);
}
.card:hover .card-overlay { opacity: 1; }
.card-title { font-family: 'Outfit', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: 6px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.7); }
.card-meta { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.badge { font-size: 12px; padding: 4px 10px; border-radius: 8px; background: rgba(0, 243, 255, 0.15); color: var(--neon); border: 1px solid rgba(0, 243, 255, 0.3); }
.fav {
  width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.3); color: #fff; cursor: pointer; place-items: center; display: grid; transition: all 0.28s var(--ease);
}
.fav:hover, .fav.active { background: var(--neon); color: var(--bg); border-color: var(--neon); box-shadow: 0 0 14px var(--neon-glow); transform: scale(1.15); }

/* ✨ EMPTY / LOADER ✨ */
.empty { text-align: center; padding: 45px 20px; color: var(--text-muted); display: none; }
.empty.show { display: block; }
.empty i { font-size: 28px; margin-bottom: 10px; color: var(--text-muted); opacity: 0.6; }
.loader { text-align: center; padding: 50px 20px; display: none; }
.loader.show { display: block; }
.spinner { width: 28px; height: 28px; border: 3px solid rgba(0, 243, 255, 0.25); border-top-color: var(--neon); border-radius: 50%; margin: 0 auto 12px; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ✨ MODAL ✨ */
.modal {
  position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 14, 0.94); backdrop-filter: blur(18px);
  display: none; align-items: center; justify-content: center; padding: 24px;
  animation: fade 0.3s var(--ease);
}
.modal.show { display: grid; place-items: center; }
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
  background: var(--surface); border: 1px solid var(--neon-border); border-radius: var(--radius-lg);
  max-width: 860px; width: 100%; overflow: hidden; box-shadow: var(--shadow-lg); animation: slide 0.4s var(--ease);
}
@keyframes slide { from { transform: translateY(24px) scale(0.985); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
.modal-img-wrap { background: #040a14; display: flex; align-items: center; justify-content: center; padding: 18px; cursor: zoom-in; }
.modal-img { max-width: 100%; max-height: 58vh; border-radius: 12px; object-fit: contain; transition: transform 0.3s var(--ease); }
.modal-img.zoom { transform: scale(1.9); }
.modal-info { padding: 18px 22px; border-top: 1px solid var(--neon-border); }
.modal-title { font-family: 'Outfit', sans-serif; font-size: 19px; margin-bottom: 5px; }
.modal-detail { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; }
.modal-btns { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  padding: 10px 16px; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; border: none;
  display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s var(--ease);
}
.btn-primary { background: var(--neon); color: var(--bg); box-shadow: 0 4px 14px rgba(0, 243, 255, 0.3); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0, 243, 255, 0.45); }
.btn-ghost { background: transparent; border: 1px solid rgba(0, 243, 255, 0.35); color: var(--text-muted); }
.btn-ghost:hover { background: rgba(0, 243, 255, 0.12); border-color: var(--neon); color: var(--neon); }

/* ✨ TOAST ✨ */
.toast {
  position: fixed; bottom: 22px; right: 22px; background: var(--surface); border: 1px solid var(--neon);
  color: var(--text); padding: 13px 18px; border-radius: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow-md); transform: translateY(100px); opacity: 0; transition: all 0.35s var(--ease); z-index: 200;
  backdrop-filter: blur(14px);
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ✨ RESPONSIVE ✨ */
@media (max-width: 800px) {
  .top-bar { flex-wrap: wrap; gap: 12px; padding: 12px 16px; }
  .search-wrap { order: 3; min-width: 100%; }
  .gallery { grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .modal-img { max-height: 48vh; }
}
@media (max-width: 500px) {
  .gallery { grid-template-columns: 1fr; }
  .card-img { aspect-ratio: 3/2; }
  .brand { font-size: 18px; }
  .pill { font-size: 13px; padding: 7px 14px; }
}

/* ✨ UTILS ✨ */
.hidden { display: none !important; }
:focus-visible { outline: 2px solid var(--neon); outline-offset: 3px; }
::selection { background: var(--neon); color: var(--bg); }
::-webkit-scrollbar { width: 7px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #0066cc; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--neon-dim); }
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid-bg"></div>

<div class="container">
  <header class="top-bar">
    <div class="brand"><i class="fas fa-bolt"></i> LINE TOGEL <span style="color:var(--text-muted);font-size:13px;font-weight:500">2026</span></div>
    <div class="search-wrap">
      <input type="search" class="search-input" id="search" placeholder="Cari judul foto...">
      <i class="fas fa-magnifying-glass"></i>
    </div>
    <div class="actions">
      <button class="icon-btn" id="btnFav" title="Filter Favorit"><i class="fas fa-star"></i></button>
      <button class="icon-btn" id="btnRefresh" title="Muat Ulang"><i class="fas fa-rotate"></i></button>
    </div>
  </header>

  <div class="filters" id="filters">
    <button class="pill active" data-type="all"><i class="fas fa-layer-group"></i> Semua</button>
    <button class="pill" data-type="recent"><i class="fas fa-clock"></i> Terbaru</button>
  </div>

  <main>
    <div class="loader show" id="loader"><div class="spinner"></div><div style="color:var(--text-muted)">Memuat galeri...</div></div>
    <div class="gallery" id="grid"></div>
    <div class="empty" id="empty"><i class="fas fa-search"></i><div>Tidak ada foto yang ditemukan</div></div>
  </main>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-img-wrap" id="zoomArea"><img src="" alt="" class="modal-img" id="modalImg"></div>
    <div class="modal-info">
      <h2 class="modal-title" id="modalTitle">-</h2>
      <p class="modal-detail" id="modalDetail">Klik gambar untuk zoom</p>
      <div class="modal-btns">
        <button class="btn btn-primary" onclick="copyImg()"><i class="fas fa-copy"></i> Salin</button>
        <button class="btn btn-ghost" onclick="dlImg()"><i class="fas fa-download"></i> Unduh</button>
        <button class="btn btn-ghost" onclick="shareImg()"><i class="fas fa-share"></i> Bagikan</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><i class="fas fa-circle-check"></i> <span id="toastTxt">Siap!</span></div>

<script>
const S = { list: [], favs: JSON.parse(localStorage.getItem('ltg_fav')||'[]'), showFav: false, type: 'all', q: '', cur: null };
const $ = s => document.querySelector(s);

document.addEventListener('DOMContentLoaded', () => {
  loadData();
  $('#search').addEventListener('input', e => { S.q = e.target.value.toLowerCase(); render(); });
  $('#btnFav').addEventListener('click', () => {
    S.showFav = !S.showFav; $('#btnFav').classList.toggle('active', S.showFav);
    toast(S.showFav ? '⭐ Menampilkan favorit' : '✨ Menampilkan semua'); render();
  });
  $('#btnRefresh').addEventListener('click', () => { S.q = ''; $('#search').value = ''; loadData(); });
  $('#zoomArea').addEventListener('click', e => $('#modalImg').classList.toggle('zoom'));
  $('#modal').addEventListener('click', e => { if(e.target.id==='modal') closeMod(); });
  document.addEventListener('keydown', e => {
    if(e.key==='Escape') closeMod();
    if(e.ctrlKey && e.key==='k'){ e.preventDefault(); $('#search').focus(); }
  });
});

async function loadData() {
  $('#loader').classList.add('show'); $('#grid').innerHTML = ''; $('#empty').classList.remove('show');
  try {
    const sheet = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0', gid = '1246502038';
    let d = [];
    try {
      const r = await fetch(`https://docs.google.com/spreadsheets/d/${sheet}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
      const t = await r.text(), j = JSON.parse(t.substring(47).slice(0,-2));
      d = j.table.rows.map((x,i)=>({ t: x.c[0]?.v||'', u: x.c[1]?.v||'', ts: Date.now()-i*3600000 })).filter(x=>x.t&&x.u);
    } catch {
      const c = await (await fetch(`https://docs.google.com/spreadsheets/d/${sheet}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
      d = c.split('\n').map(r=>r.split(',')).filter(r=>r[0]?.trim()&&r[1]?.trim()).map((r,i)=>({ t:r[0].replace(/"/g,'').trim(), u:r[1].replace(/"/g,'').trim(), ts:Date.now()-i*3600000 }));
    }
    S.list = d; render(); toast(`✅ ${d.length} foto siap`);
  } catch (e) { console.error(e); toast('❌ Gagal memuat data'); }
  $('#loader').classList.remove('show');
}

function render() {
  const g = $('#grid'), e = $('#empty'); g.innerHTML = '';
  let list = [...S.list];
  if(S.showFav) list = list.filter(p => S.favs.includes(p.u));
  if(S.type === 'recent') list.sort((a,b) => b.ts - a.ts).slice(0, 24);
  if(S.q) list = list.filter(p => p.t.toLowerCase().includes(S.q));
  
  e.classList.toggle('show', !list.length);
  if(!list.length) return;

  list.forEach(p => {
    const c = document.createElement('div'); c.className = 'card';
    const fav = S.favs.includes(p.u);
    c.innerHTML = `
      <img class="card-img" src="${p.u}" alt="${p.t}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/061220/00f3ff?text=No+Image'">
      <div class="card-overlay">
        <div class="card-title">${p.t}</div>
        <div class="card-meta">
          <span class="badge">${new Date(p.ts).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})}</span>
          <button class="fav ${fav?'active':''}" onclick="event.stopPropagation();toggleFav('${p.u}',this)"><i class="fas fa-heart"></i></button>
        </div>
      </div>`;
    c.onclick = () => openMod(p.u, p.t);
    g.appendChild(c);
  });
}

function toggleFav(u, btn) {
  const i = S.favs.indexOf(u);
  if(i > -1) { S.favs.splice(i,1); btn.classList.remove('active'); toast('💔 Dihapus'); }
  else { S.favs.push(u); btn.classList.add('active'); toast('❤️ Disimpan'); }
  localStorage.setItem('ltg_fav', JSON.stringify(S.favs));
  if(S.showFav) render();
}

function openMod(u, t) {
  S.cur = u; $('#modalImg').src = u; $('#modalImg').classList.remove('zoom');
  $('#modalTitle').textContent = t; $('#modalDetail').textContent = `Format: ${u.split('.').pop().toUpperCase()} • Klik gambar untuk zoom`;
  $('#modal').classList.add('show'); document.body.style.overflow = 'hidden';
}
function closeMod() { $('#modal').classList.remove('show'); document.body.style.overflow = ''; S.cur = null; }

async function copyImg() {
  if(!S.cur) return;
  try { const b = await (await fetch(S.cur)).blob(); await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]); toast('✅ Disalin'); }
  catch { toast('❗ Klik kanan > Copy Image'); }
}
function dlImg() {
  if(!S.cur) return; const a = document.createElement('a'); a.href = S.cur; a.download = `foto_${Date.now()}.${S.cur.split('.').pop()}`; a.click(); toast('⬇️ Mengunduh...');
}
function shareImg() {
  if(!S.cur) return;
  if(navigator.share) navigator.share({url:S.cur, title:'LINE TOGEL 2026'}).catch(()=>{});
  else copyImg();
}

function toast(msg) {
  const t = $('#toast'); $('#toastTxt').textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>

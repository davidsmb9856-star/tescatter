<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00f5ff">
<meta name="description" content="LINE TOGEL Photo Gallery - Cyber Portal 2026">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== CORE VARIABLES - ENHANCED ===== */
:root {
  /* Neon Colors */
  --neon-blue: #00d4ff;
  --neon-cyan: #00ffff;
  --neon-electric: #00f5ff;
  --neon-purple: #7b2fff;
  --neon-pink: #ff00aa;
  --neon-gold: #ffd700;
  --neon-green: #00ff9d;
  --neon-orange: #ff6b35;
  
  /* Background Layers */
  --bg-deep: #010205;
  --bg-surface: rgba(3, 8, 20, 0.85);
  --bg-elevated: rgba(6, 18, 42, 0.75);
  --bg-glass: rgba(10, 25, 55, 0.65);
  --bg-glass-strong: rgba(15, 35, 75, 0.8);
  
  /* Text */
  --text-primary: #ffffff;
  --text-secondary: #9fb8d9;
  --text-dim: #5a6b8a;
  --text-glow: rgba(0, 245, 255, 0.8);
  
  /* Borders & Glows */
  --border-glow: rgba(0, 212, 255, 0.5);
  --border-glow-strong: rgba(0, 245, 255, 0.7);
  --glow-soft: 0 0 10px rgba(0, 212, 255, 0.4), 0 0 25px rgba(0, 212, 255, 0.2);
  --glow-medium: 0 0 20px rgba(0, 245, 255, 0.6), 0 0 45px rgba(0, 245, 255, 0.3);
  --glow-intense: 0 0 30px rgba(0, 245, 255, 0.8), 0 0 70px rgba(0, 245, 255, 0.5), inset 0 0 20px rgba(0, 245, 255, 0.1);
  --glow-pink: 0 0 20px rgba(255, 0, 170, 0.6), 0 0 45px rgba(255, 0, 170, 0.3);
  --glow-green: 0 0 20px rgba(0, 255, 157, 0.6), 0 0 45px rgba(0, 255, 157, 0.3);
  
  /* Transitions */
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 300ms cubic-bezier(0.16, 1, 0.3, 1);
  --transition-bloom: 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-elastic: 600ms cubic-bezier(0.68, -0.55, 0.265, 1.55);
  
  /* UI Dimensions */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --spacing-xs: 6px;
  --spacing-sm: 10px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 20px; }
body {
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== BACKGROUND EFFECTS - PREMIUM ===== */
.bg-canvas {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(ellipse at 15% 25%, rgba(0, 245, 255, 0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 20%, rgba(123, 47, 255, 0.1) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 90%, rgba(0, 212, 255, 0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 30% 70%, rgba(255, 0, 170, 0.06) 0%, transparent 65%);
  animation: bgPulse 20s ease-in-out infinite alternate;
  will-change: opacity, filter;
}
@keyframes bgPulse {
  0%, 100% { opacity: 1; filter: hue-rotate(0deg) brightness(1); }
  25% { opacity: 0.95; filter: hue-rotate(8deg) brightness(1.05); }
  50% { opacity: 0.9; filter: hue-rotate(15deg) brightness(1.1); }
  75% { opacity: 0.95; filter: hue-rotate(8deg) brightness(1.05); }
}

.grid-overlay {
  position: fixed; inset: 0; z-index: -2;
  background-image:
    linear-gradient(rgba(0, 245, 255, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 245, 255, 0.04) 1px, transparent 1px),
    linear-gradient(45deg, rgba(123, 47, 255, 0.02) 1px, transparent 1px);
  background-size: 40px 40px, 40px 40px, 80px 80px;
  mask-image: radial-gradient(ellipse 75% 65% at 50% 45%, black 25%, transparent 80%);
  animation: gridMove 40s linear infinite;
  pointer-events: none;
}
@keyframes gridMove {
  0% { background-position: 0 0, 0 0, 0 0; }
  100% { background-position: 40px 40px, 40px 40px, 80px 80px; }
}

/* Lightning System */
.lightning-overlay {
  position: fixed; inset: 0; z-index: -1;
  pointer-events: none; opacity: 0;
  animation: lightningCycle 12s infinite;
}
@keyframes lightningCycle {
  0%, 88%, 94%, 100% { opacity: 0; }
  89%, 93% { opacity: 0.08; }
  90%, 92% { opacity: 0.18; }
  91% { opacity: 0.12; }
}
.lightning-bolt {
  position: absolute; width: 1px; height: 100vh;
  background: linear-gradient(180deg, 
    transparent 0%, 
    var(--neon-electric) 20%, 
    var(--neon-blue) 50%, 
    var(--neon-purple) 80%, 
    transparent 100%);
  filter: blur(1px) drop-shadow(0 0 8px var(--neon-electric));
  animation: lightningStrike 12s infinite;
  opacity: 0;
}
.lightning-bolt::before {
  content: ''; position: absolute; top: 0; left: -2px; right: -2px; bottom: 0;
  background: inherit; filter: blur(3px); opacity: 0.5;
}
.lightning-bolt:nth-child(1) { left: 18%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 52%; animation-delay: 3s; }
.lightning-bolt:nth-child(3) { left: 82%; animation-delay: 7s; }
@keyframes lightningStrike {
  0%, 88%, 94%, 100% { transform: scaleY(0); opacity: 0; }
  89% { transform: scaleY(0.3); opacity: 0.5; }
  90%, 92% { transform: scaleY(1); opacity: 1; }
  91%, 93% { transform: scaleY(0.7); opacity: 0.6; }
}

/* Particle System - Enhanced */
.particles {
  position: fixed; inset: 0; z-index: -1;
  pointer-events: none; overflow: hidden;
}
.particle {
  position: absolute; width: 2px; height: 2px;
  border-radius: 50%; opacity: 0;
  animation: particleFloat linear infinite;
  will-change: transform, opacity;
}
.particle::after {
  content: ''; position: absolute; inset: -4px;
  border-radius: 50%;
  background: inherit;
  filter: blur(2px);
  opacity: 0.6;
}
.particle.blue { 
  background: var(--neon-blue); 
  box-shadow: 0 0 8px var(--neon-blue), 0 0 20px var(--neon-blue);
  animation-duration: 25s;
}
.particle.cyan { 
  background: var(--neon-electric); 
  box-shadow: 0 0 10px var(--neon-electric), 0 0 25px var(--neon-electric);
  animation-duration: 30s;
}
.particle.purple { 
  background: var(--neon-purple); 
  box-shadow: 0 0 8px var(--neon-purple), 0 0 20px var(--neon-purple);
  animation-duration: 35s;
}
@keyframes particleFloat {
  0% { transform: translateY(100vh) translateX(0) rotate(0deg) scale(0.8); opacity: 0; }
  10% { opacity: 0.8; }
  50% { opacity: 1; }
  90% { opacity: 0.8; }
  100% { transform: translateY(-100vh) translateX(var(--drift, 0px)) rotate(720deg) scale(1.2); opacity: 0; }
}

/* Scanline CRT Effect */
.scanline {
  position: fixed; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(0, 245, 255, 0.4), 
    rgba(0, 212, 255, 0.6), 
    rgba(0, 245, 255, 0.4), 
    transparent);
  opacity: 0.4;
  animation: scanLine 7s linear infinite;
  z-index: 100; pointer-events: none;
  filter: blur(0.5px);
}
@keyframes scanLine {
  0% { top: -5px; opacity: 0; }
  5%, 95% { opacity: 0.4; }
  100% { top: 100%; opacity: 0; }
}

/* Noise Texture */
.noise {
  position: fixed; inset: 0; z-index: -1;
  opacity: 0.025; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: noiseShift 0.5s steps(2) infinite;
}
@keyframes noiseShift {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(-1px, 1px); }
  50% { transform: translate(1px, -1px); }
  75% { transform: translate(-1px, -1px); }
}

/* Vignette */
.vignette {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(1, 2, 5, 0.6) 100%);
}

/* ===== LAYOUT ===== */
.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: var(--spacing-lg) var(--spacing-md);
  min-height: 100vh;
  position: relative;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  margin-bottom: var(--spacing-lg);
  animation: headerEntrance 800ms var(--transition-bloom) backwards;
  padding-top: var(--spacing-sm);
}
@keyframes headerEntrance {
  from { opacity: 0; transform: translateY(-30px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.back-btn {
  position: fixed; left: var(--spacing-md); top: var(--spacing-md);
  background: var(--bg-glass);
  border: 1px solid var(--border-glow);
  color: var(--neon-electric);
  padding: 8px 16px;
  border-radius: var(--radius-md);
  text-decoration: none;
  font-weight: 600; font-size: 11px;
  display: flex; align-items: center; gap: 6px;
  transition: var(--transition-smooth);
  backdrop-filter: blur(12px);
  z-index: 1000;
  box-shadow: var(--glow-soft);
}
.back-btn:hover {
  background: var(--bg-glass-strong);
  border-color: var(--neon-electric);
  transform: translateX(-4px);
  box-shadow: var(--glow-medium);
  color: var(--text-primary);
}
.back-btn:active { transform: translateX(-2px) scale(0.98); }

.title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(32px, 7vw, 52px);
  font-weight: 900;
  letter-spacing: 5px;
  margin-bottom: 6px;
  position: relative;
  background: linear-gradient(135deg, 
    var(--neon-electric) 0%, 
    var(--neon-blue) 30%, 
    #ffffff 50%, 
    var(--neon-blue) 70%, 
    var(--neon-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 40px rgba(0, 245, 255, 0.6);
  animation: titleShimmer 4s ease-in-out infinite;
}
@keyframes titleShimmer {
  0%, 100% { filter: brightness(1) saturate(1); }
  50% { filter: brightness(1.4) saturate(1.2); }
}
.title::after {
  content: ''; position: absolute; bottom: -8px; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 3px;
  background: linear-gradient(90deg, transparent, var(--neon-electric), transparent);
  border-radius: 2px;
  animation: titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow {
  0%, 100% { opacity: 0.6; width: 100px; }
  50% { opacity: 1; width: 140px; }
}

.subtitle {
  font-size: 11px;
  color: var(--text-secondary);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 14px;
  font-weight: 500;
  opacity: 0.9;
}

.status-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 18px;
  background: rgba(0, 255, 157, 0.1);
  border: 1px solid rgba(0, 255, 157, 0.35);
  border-radius: 100px;
  font-size: 10px; font-weight: 700;
  color: var(--neon-green);
  text-transform: uppercase; letter-spacing: 2px;
  animation: statusPulse 3s ease-in-out infinite;
  box-shadow: var(--glow-green);
  backdrop-filter: blur(8px);
}
@keyframes statusPulse {
  0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 157, 0.25), inset 0 0 10px rgba(0, 255, 157, 0.1); }
  50% { box-shadow: 0 0 30px rgba(0, 255, 157, 0.5), inset 0 0 15px rgba(0, 255, 157, 0.2); }
}
.status-dot {
  width: 7px; height: 7px;
  background: var(--neon-green);
  border-radius: 50%;
  animation: dotBeat 1.8s ease-in-out infinite;
  box-shadow: 0 0 12px var(--neon-green);
}
@keyframes dotBeat {
  0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 12px var(--neon-green); }
  50% { transform: scale(1.5); opacity: 0.8; box-shadow: 0 0 25px var(--neon-green); }
}

/* ===== NAVIGATION ===== */
.nav-tabs {
  display: flex; gap: 12px; justify-content: center;
  margin-bottom: var(--spacing-lg); flex-wrap: wrap;
  padding: 4px;
  background: var(--bg-glass);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-lg);
  max-width: fit-content; margin-left: auto; margin-right: auto;
  backdrop-filter: blur(12px);
  box-shadow: var(--glow-soft);
}
.nav-tab {
  padding: 10px 24px;
  background: transparent;
  border: none;
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  transition: var(--transition-smooth);
  text-transform: uppercase; letter-spacing: 1px;
  position: relative;
  display: flex; align-items: center; gap: 7px;
}
.nav-tab::before {
  content: ''; position: absolute; inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.15), rgba(0, 212, 255, 0.05));
  opacity: 0; transition: var(--transition-fast);
}
.nav-tab:hover {
  color: var(--text-primary);
  transform: translateY(-2px);
}
.nav-tab:hover::before { opacity: 1; }
.nav-tab.active {
  color: var(--neon-electric);
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.25), rgba(0, 212, 255, 0.15));
  border: 1px solid var(--neon-electric);
  box-shadow: var(--glow-medium);
  transform: translateY(-2px);
}
.nav-tab.active::before { opacity: 0.3; }

.section { display: none; animation: fadeIn 400ms var(--transition-bloom) backwards; }
.section.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== SEARCH ===== */
.search-container { max-width: 580px; margin: 0 auto var(--spacing-lg); }
.search-box {
  width: 100%;
  padding: 13px 50px 13px 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-lg);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  transition: var(--transition-smooth);
  backdrop-filter: blur(12px);
  box-shadow: var(--glow-soft);
}
.search-box:focus {
  outline: none;
  border-color: var(--neon-electric);
  box-shadow: var(--glow-medium);
  background: var(--bg-elevated);
}
.search-box::placeholder { color: var(--text-dim); opacity: 0.8; }
.search-box + i {
  position: absolute; right: 18px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim); pointer-events: none;
}

/* ===== GALLERY SECTION ===== */
.gallery-section {
  margin-bottom: var(--spacing-xl);
  animation: sectionReveal 600ms var(--transition-bloom) backwards;
}
@keyframes sectionReveal {
  from { opacity: 0; transform: translateY(35px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px; font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 18px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border-glow);
  display: flex; align-items: center; gap: 12px;
  letter-spacing: 2px; position: relative;
}
.section-title::before {
  content: ''; width: 4px; height: 20px;
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue));
  border-radius: 2px;
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.7);
  animation: barPulse 2s ease-in-out infinite;
}
@keyframes barPulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 12px rgba(0, 245, 255, 0.7); }
  50% { opacity: 0.8; box-shadow: 0 0 20px rgba(0, 245, 255, 1); }
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 18px;
}

/* ===== PHOTO CARD - PREMIUM DESIGN ===== */
.photo-card {
  background: var(--bg-surface);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: var(--transition-bloom);
  position: relative;
  backdrop-filter: blur(14px);
  animation: cardEnter 500ms ease forwards;
  opacity: 0; transform: translateY(25px);
  box-shadow: var(--glow-soft);
}
.photo-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, 
    rgba(0, 245, 255, 0.03) 0%, 
    transparent 50%, 
    rgba(123, 47, 255, 0.03) 100%);
  pointer-events: none; opacity: 0;
  transition: var(--transition-fast);
}
.photo-card:hover::before { opacity: 1; }
.photo-card:nth-child(n) { animation-delay: calc(0.08s * var(--i, 0)); }
@keyframes cardEnter {
  to { opacity: 1; transform: translateY(0); }
}
.photo-card:hover {
  transform: translateY(-6px) scale(1.015);
  border-color: var(--neon-electric);
  box-shadow: var(--glow-medium), 0 20px 50px rgba(0, 0, 0, 0.5);
  z-index: 10;
}

.photo-wrapper {
  position: relative;
  width: 100%; height: 290px;
  background: radial-gradient(circle at 30% 30%, #0d2137 0%, #040a14 100%);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  border-bottom: 1px solid rgba(0, 212, 255, 0.1);
}
.photo-wrapper::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 60%, rgba(1, 2, 5, 0.4) 100%);
  pointer-events: none;
}
.photo-wrapper img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
  transition: transform var(--transition-smooth), filter var(--transition-smooth);
  filter: drop-shadow(0 5px 20px rgba(0, 0, 0, 0.3));
}
.photo-card:hover .photo-wrapper img {
  transform: scale(1.06);
  filter: drop-shadow(0 10px 30px rgba(0, 245, 255, 0.2));
}

.photo-info { padding: var(--spacing-md); }

.photo-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px; font-weight: 700;
  color: var(--neon-electric);
  margin-bottom: 10px;
  word-break: break-word; text-align: center;
  text-shadow: 0 0 12px rgba(0, 245, 255, 0.5);
  line-height: 1.4;
  min-height: 40px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.photo-meta {
  font-size: 10px; color: var(--text-secondary);
  text-align: center; margin-bottom: 12px;
  opacity: 0.85;
}

/* Action Buttons Row - Enhanced */
.action-buttons-row {
  display: flex; gap: 8px; justify-content: center;
  flex-wrap: wrap; padding-top: 12px;
  border-top: 1px solid rgba(0, 212, 255, 0.15);
}
.action-btn-cool {
  flex: 1; min-width: 72px; max-width: 95px;
  height: 44px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.12), rgba(0, 245, 255, 0.08));
  border: 1px solid rgba(0, 212, 255, 0.3);
  border-radius: var(--radius-md);
  color: var(--neon-electric);
  font-size: 10px; font-weight: 700;
  cursor: pointer;
  transition: var(--transition-smooth);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; text-transform: uppercase;
  letter-spacing: 0.5px; backdrop-filter: blur(10px);
  position: relative; overflow: hidden;
}
.action-btn-cool::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, 
    rgba(255, 255, 255, 0.1) 0%, 
    transparent 50%, 
    rgba(255, 255, 255, 0.05) 100%);
  opacity: 0; transition: var(--transition-fast);
}
.action-btn-cool i {
  font-size: 15px; margin-bottom: 2px;
  transition: transform var(--transition-fast);
}
.action-btn-cool span {
  font-size: 9px; font-weight: 600;
}
.action-btn-cool:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(0, 245, 255, 0.2));
  border-color: var(--neon-electric);
  transform: translateY(-3px) scale(1.04);
  box-shadow: 0 8px 25px rgba(0, 245, 255, 0.5);
  color: var(--bg-deep);
}
.action-btn-cool:hover::before { opacity: 1; }
.action-btn-cool:hover i { transform: scale(1.15); }

.action-btn-cool.copy-btn:hover {
  background: linear-gradient(135deg, rgba(0, 255, 157, 0.35), rgba(0, 200, 100, 0.25));
  border-color: var(--neon-green);
  box-shadow: 0 8px 25px rgba(0, 255, 157, 0.5);
  color: var(--bg-deep);
}
.action-btn-cool.download-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.35), rgba(0, 180, 255, 0.25));
  border-color: var(--neon-blue);
  box-shadow: 0 8px 25px rgba(0, 212, 255, 0.5);
  color: var(--bg-deep);
}
.action-btn-cool.edit-btn:hover {
  background: linear-gradient(135deg, rgba(255, 0, 170, 0.35), rgba(255, 100, 170, 0.25));
  border-color: var(--neon-pink);
  box-shadow: var(--glow-pink);
  color: var(--bg-deep);
}

/* ===== EDITOR SECTION ===== */
.editor-container {
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-xl);
  padding: var(--spacing-lg);
  margin-bottom: var(--spacing-lg);
  box-shadow: var(--glow-medium);
  backdrop-filter: blur(16px);
}
.editor-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: var(--spacing-lg);
  padding-bottom: var(--spacing-md);
  border-bottom: 1px solid rgba(0, 212, 255, 0.25);
}
.editor-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px; color: var(--neon-electric);
  display: flex; align-items: center; gap: 10px;
  text-shadow: 0 0 15px rgba(0, 245, 255, 0.4);
}

.upload-area {
  border: 2px dashed var(--border-glow);
  border-radius: var(--radius-lg);
  padding: 45px 25px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition-smooth);
  margin-bottom: var(--spacing-lg);
  background: var(--bg-elevated);
  position: relative; overflow: hidden;
}
.upload-area::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, 
    rgba(0, 245, 255, 0.05) 0%, 
    transparent 50%, 
    rgba(123, 47, 255, 0.05) 100%);
  opacity: 0; transition: var(--transition-fast);
}
.upload-area:hover {
  border-color: var(--neon-electric);
  background: rgba(0, 212, 255, 0.06);
  box-shadow: var(--glow-soft);
  transform: translateY(-2px);
}
.upload-area:hover::before { opacity: 1; }
.upload-icon {
  font-size: 48px; color: var(--neon-blue);
  margin-bottom: 14px;
  animation: iconFloat 3s ease-in-out infinite;
  text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
}
@keyframes iconFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.upload-text {
  font-size: 14px; color: var(--text-primary);
  margin-bottom: 6px; font-weight: 500;
}
.upload-hint {
  font-size: 11px; color: var(--text-secondary);
  opacity: 0.8;
}

.canvas-wrapper {
  position: relative;
  background: var(--bg-elevated);
  border-radius: var(--radius-lg);
  padding: var(--spacing-sm);
  margin-bottom: var(--spacing-lg);
  overflow: auto;
  max-height: 62vh;
  border: 1px solid rgba(0, 212, 255, 0.15);
  box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.3);
}
#mainCanvas {
  max-width: 100%;
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-sm);
  background: #fff;
  display: block;
  margin: 0 auto;
  box-shadow: 0 5px 30px rgba(0, 0, 0, 0.4);
}

.tools-panel {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 16px;
  margin-bottom: var(--spacing-lg);
}
.tool-group {
  background: var(--bg-elevated);
  border: 1px solid rgba(0, 212, 255, 0.18);
  border-radius: var(--radius-lg);
  padding: var(--spacing-md);
  transition: var(--transition-smooth);
}
.tool-group:hover {
  border-color: rgba(0, 245, 255, 0.4);
  box-shadow: var(--glow-soft);
}
.tool-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px; color: var(--neon-electric);
  margin-bottom: 12px; text-transform: uppercase;
  letter-spacing: 1.5px; font-weight: 600;
  display: flex; align-items: center; gap: 7px;
}
.tool-btn {
  width: 100%;
  padding: 9px 14px;
  margin-bottom: 8px;
  background: rgba(0, 212, 255, 0.1);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  transition: var(--transition-smooth);
  display: flex; align-items: center; gap: 8px;
  position: relative; overflow: hidden;
}
.tool-btn::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--neon-electric); opacity: 0;
  transition: var(--transition-fast);
}
.tool-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(0, 245, 255, 0.15));
  border-color: var(--neon-electric);
  transform: translateX(4px);
  box-shadow: var(--glow-soft);
}
.tool-btn:hover::before { opacity: 1; }
.tool-btn.active {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric));
  color: var(--bg-deep);
  border-color: var(--neon-electric);
  box-shadow: var(--glow-medium);
}
.tool-btn.active::before { opacity: 1; background: #fff; }

input[type="range"] {
  width: 100%; height: 5px;
  background: var(--bg-deep);
  border-radius: 3px;
  outline: none; -webkit-appearance: none;
  margin-bottom: 12px;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  background: var(--neon-electric);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.8), 0 0 25px rgba(0, 245, 255, 0.4);
  border: 2px solid var(--bg-deep);
  transition: var(--transition-fast);
}
input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.15);
  box-shadow: 0 0 18px rgba(0, 245, 255, 1), 0 0 35px rgba(0, 245, 255, 0.6);
}

.color-picker {
  width: 100%; height: 38px;
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-md);
  cursor: pointer;
  background: var(--bg-deep);
  padding: 3px;
  transition: var(--transition-fast);
}
.color-picker:hover {
  border-color: var(--neon-electric);
  box-shadow: var(--glow-soft);
}

.input-field {
  width: 100%;
  padding: 9px 12px;
  background: var(--bg-deep);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  margin-bottom: 8px;
  transition: var(--transition-fast);
}
.input-field:focus {
  outline: none;
  border-color: var(--neon-electric);
  box-shadow: var(--glow-soft);
  background: rgba(0, 212, 255, 0.05);
}

/* Action Buttons */
.action-buttons {
  display: flex; gap: 12px;
  justify-content: center; flex-wrap: wrap;
  padding-top: var(--spacing-sm);
}
.btn {
  padding: 11px 24px;
  border-radius: var(--radius-md);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px; font-weight: 700;
  cursor: pointer;
  transition: var(--transition-smooth);
  border: none;
  display: inline-flex; align-items: center; gap: 7px;
  text-transform: uppercase; letter-spacing: 1px;
  position: relative; overflow: hidden;
}
.btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: translateX(-100%); transition: transform 0.6s ease;
}
.btn:hover::before { transform: translateX(100%); }

.btn-primary {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric));
  color: var(--bg-deep);
  box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
}
.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: var(--glow-medium);
}
.btn-primary:active { transform: translateY(-1px) scale(0.98); }

.btn-secondary {
  padding: 11px 24px;
  background: transparent;
  border: 1px solid var(--neon-pink);
  border-radius: var(--radius-md);
  color: var(--neon-pink);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px; font-weight: 700;
  cursor: pointer;
  transition: var(--transition-smooth);
  text-transform: uppercase; letter-spacing: 1px;
}
.btn-secondary:hover {
  background: var(--neon-pink);
  color: var(--bg-deep);
  transform: translateY(-3px);
  box-shadow: var(--glow-pink);
}

/* Loading State */
.loading {
  display: none; text-align: center;
  padding: var(--spacing-xl);
  grid-column: 1 / -1;
}
.loading.active { display: block; }
.loader {
  width: 48px; height: 48px;
  border: 3px solid rgba(0, 212, 255, 0.2);
  border-top-color: var(--neon-electric);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto var(--spacing-md);
  box-shadow: var(--glow-medium);
  position: relative;
}
.loader::after {
  content: ''; position: absolute; inset: -5px;
  border: 2px solid transparent;
  border-top-color: var(--neon-purple);
  border-radius: 50%;
  animation: spin 2s reverse linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: var(--neon-electric);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  animation: textPulse 1.5s ease-in-out infinite;
}
@keyframes textPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* ===== MODAL - ENHANCED ===== */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(1, 3, 8, 0.92);
  backdrop-filter: blur(20px);
  z-index: 2000;
  display: none; align-items: center; justify-content: center;
  padding: var(--spacing-md);
  animation: modalFadeIn 300ms var(--transition-bloom) backwards;
}
.modal-backdrop.active { display: flex; }
@keyframes modalFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal-content {
  background: var(--bg-surface);
  border: 1px solid var(--border-glow-strong);
  border-radius: var(--radius-xl);
  max-width: 920px; width: 100%;
  max-height: 94vh; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: var(--glow-intense), 0 25px 80px rgba(0, 0, 0, 0.6);
  animation: modalSlideIn 400ms var(--transition-bloom) backwards;
}
@keyframes modalSlideIn {
  from { opacity: 0; transform: scale(0.95) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--spacing-md) var(--spacing-lg);
  border-bottom: 1px solid rgba(0, 212, 255, 0.2);
  background: var(--bg-elevated);
}
.modal-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px; color: var(--neon-electric);
  text-shadow: 0 0 15px rgba(0, 245, 255, 0.4);
}
.modal-close {
  width: 36px; height: 36px;
  background: transparent;
  border: 1px solid var(--neon-pink);
  border-radius: 50%;
  color: var(--neon-pink);
  font-size: 14px;
  cursor: pointer;
  transition: var(--transition-smooth);
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover {
  background: var(--neon-pink);
  color: var(--bg-deep);
  transform: rotate(90deg) scale(1.1);
  box-shadow: var(--glow-pink);
}
.modal-body {
  padding: var(--spacing-lg);
  text-align: center;
  overflow-y: auto; flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(circle at center, #0d2137 0%, #040a14 100%);
}
.modal-body img {
  max-width: 100%; max-height: 72vh;
  width: auto; object-fit: contain;
  border-radius: var(--radius-md);
  box-shadow: 0 0 30px rgba(0, 212, 255, 0.4), 0 10px 50px rgba(0, 0, 0, 0.5);
  transition: transform var(--transition-smooth);
}
.modal-body img:hover {
  transform: scale(1.02);
}
.modal-actions {
  margin-top: var(--spacing-md);
  display: flex; gap: 10px;
  justify-content: center; flex-wrap: wrap;
}

/* ===== TOAST - COMPACT NEON ===== */
.toast {
  position: fixed; bottom: 22px; right: 22px;
  background: var(--bg-glass-strong);
  border: 1px solid var(--neon-electric);
  color: var(--neon-electric);
  padding: 10px 18px;
  border-radius: var(--radius-md);
  font-weight: 600; font-size: 11px;
  z-index: 3000;
  display: flex; align-items: center; gap: 9px;
  box-shadow: var(--glow-medium);
  transform: translateX(150px);
  opacity: 0;
  transition: var(--transition-bloom);
  backdrop-filter: blur(14px);
  max-width: 320px;
}
.toast.show {
  transform: translateX(0);
  opacity: 1;
  animation: toastBloom 500ms var(--transition-bloom) forwards;
}
@keyframes toastBloom {
  0% { transform: translateX(150px) scale(0.9); opacity: 0; }
  50% { transform: translateX(-10px) scale(1.02); }
  100% { transform: translateX(0) scale(1); opacity: 1; }
}
.toast i {
  font-size: 14px;
  animation: iconPulse 2s ease-in-out infinite;
}
@keyframes iconPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.1); }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-track {
  background: var(--bg-deep);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue), var(--neon-purple));
  border-radius: 4px;
  border: 2px solid var(--bg-deep);
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.5);
  transition: var(--transition-fast);
}
::-webkit-scrollbar-thumb:hover {
  box-shadow: 0 0 20px rgba(0, 245, 255, 0.8);
}

/* ===== SELECTION ===== */
::selection {
  background: rgba(0, 212, 255, 0.35);
  color: var(--text-primary);
  text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .container { padding: var(--spacing-md) var(--spacing-sm); }
  .back-btn { left: var(--spacing-sm); top: var(--spacing-sm); padding: 6px 12px; font-size: 10px; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .photo-wrapper { height: 220px; }
  .photo-title { font-size: 12px; min-height: 36px; }
  .action-btn-cool { min-width: 65px; max-width: 80px; height: 40px; }
  .action-btn-cool i { font-size: 14px; }
  .action-btn-cool span { font-size: 8px; }
  .tools-panel { grid-template-columns: 1fr; }
  .nav-tabs { width: 100%; border-radius: var(--radius-md); }
  .nav-tab { flex: 1; justify-content: center; padding: 10px 16px; font-size: 10px; }
  .editor-container { padding: var(--spacing-md); border-radius: var(--radius-lg); }
  .modal-content { max-height: 96vh; }
  .modal-body { padding: var(--spacing-md); }
  .toast { bottom: 16px; right: 16px; left: 16px; max-width: none; justify-content: center; }
}

@media (max-width: 480px) {
  .gallery-grid { grid-template-columns: 1fr; }
  .photo-wrapper { height: 260px; }
  .action-buttons-row { gap: 6px; }
  .action-btn-cool { min-width: 60px; height: 38px; padding: 6px 4px; }
  .title { font-size: clamp(28px, 8vw, 42px); letter-spacing: 3px; }
  .section-title { font-size: 13px; }
}

/* ===== ACCESSIBILITY ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  html { scroll-behavior: auto; }
}

/* ===== PRINT ===== */
@media print {
  .bg-canvas, .grid-overlay, .particles, .lightning-overlay, 
  .scanline, .noise, .vignette, .back-btn, .nav-tabs, 
  .search-container, .action-buttons-row, .toast {
    display: none !important;
  }
  body { background: #fff; color: #000; }
  .photo-card { break-inside: avoid; border: 1px solid #ccc; }
}
</style>
</head>
<body>
<!-- Background Layers -->
<div class="bg-canvas"></div>
<div class="grid-overlay"></div>
<div class="noise"></div>
<div class="vignette"></div>
<div class="particles" id="particles"></div>
<div class="lightning-overlay">
  <div class="lightning-bolt"></div>
  <div class="lightning-bolt"></div>
  <div class="lightning-bolt"></div>
</div>
<div class="scanline"></div>

<!-- Back Button -->
<a href="index.html" class="back-btn" aria-label="Kembali ke halaman utama">
  <i class="fas fa-arrow-left"></i> Kembali
</a>

<div class="container">
  <!-- Header -->
  <header class="header">
    <h1 class="title">⚡ FOTO GALLERY</h1>
    <p class="subtitle">LINE TOGEL • Cyber Portal 2026</p>
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="nav-tabs" role="tablist">
    <button class="nav-tab active" onclick="showSection('gallery')" role="tab" aria-selected="true" aria-controls="gallery">
      <i class="fas fa-images"></i> Galeri Foto
    </button>
    <button class="nav-tab" onclick="showSection('editor')" role="tab" aria-selected="false" aria-controls="editor">
      <i class="fas fa-magic"></i> Photo Editor
    </button>
  </nav>

  <!-- Gallery Section -->
  <section id="gallery" class="section active gallery-section" role="tabpanel">
    <div class="search-container">
      <input type="search" class="search-box" id="searchInput" 
             placeholder="🔍 Cari foto berdasarkan judul..." 
             onkeyup="searchPhotos()" aria-label="Cari foto">
    </div>
    
    <div class="loading" id="loading" aria-live="polite">
      <div class="loader"></div>
      <div class="loading-text">⚡ LOADING PHOTOS...</div>
    </div>
    
    <div class="gallery-grid" id="galleryGrid" role="list"></div>
  </section>

  <!-- Editor Section -->
  <section id="editor" class="section" role="tabpanel">
    <div class="editor-container">
      <div class="editor-header">
        <h2 class="editor-title"><i class="fas fa-palette"></i> PHOTO EDITOR STUDIO</h2>
      </div>
      
      <div class="upload-area" onclick="document.getElementById('fileInput').click()" 
           role="button" tabindex="0" aria-label="Upload foto">
        <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
        <div class="upload-text">Klik atau Drag foto ke sini</div>
        <div class="upload-hint">Support: JPG, PNG, WEBP • Multiple files</div>
        <input type="file" id="fileInput" multiple accept="image/*" 
               style="display:none" onchange="handleFiles(event)" aria-hidden="true">
      </div>
      
      <div class="canvas-wrapper">
        <canvas id="mainCanvas" width="800" height="600" aria-label="Canvas editor"></canvas>
      </div>
      
      <div class="tools-panel">
        <div class="tool-group">
          <div class="tool-title"><i class="fas fa-adjust"></i> Filter & Adjust</div>
          <button class="tool-btn" onclick="applyFilter('grayscale')"><i class="fas fa-circle"></i> Grayscale</button>
          <button class="tool-btn" onclick="applyFilter('sepia')"><i class="fas fa-coffee"></i> Sepia</button>
          <button class="tool-btn" onclick="applyFilter('invert')"><i class="fas fa-exchange-alt"></i> Invert</button>
          <button class="tool-btn" onclick="applyFilter('blur')"><i class="fas fa-tint"></i> Blur</button>
          <label class="tool-title" style="margin-top:12px;display:block">Brightness</label>
          <input type="range" id="brightness" min="0" max="200" value="100" onchange="adjustImage()" aria-label="Brightness">
          <label class="tool-title" style="margin-top:10px;display:block">Contrast</label>
          <input type="range" id="contrast" min="0" max="200" value="100" onchange="adjustImage()" aria-label="Contrast">
          <label class="tool-title" style="margin-top:10px;display:block">Saturation</label>
          <input type="range" id="saturation" min="0" max="200" value="100" onchange="adjustImage()" aria-label="Saturation">
        </div>
        
        <div class="tool-group">
          <div class="tool-title"><i class="fas fa-crop-alt"></i> Transform</div>
          <button class="tool-btn" onclick="rotateImage(-90)"><i class="fas fa-undo"></i> Rotate -90°</button>
          <button class="tool-btn" onclick="rotateImage(90)"><i class="fas fa-redo"></i> Rotate +90°</button>
          <button class="tool-btn" onclick="flipImage('h')"><i class="fas fa-arrows-alt-h"></i> Flip Horizontal</button>
          <button class="tool-btn" onclick="flipImage('v')"><i class="fas fa-arrows-alt-v"></i> Flip Vertical</button>
          <button class="tool-btn" onclick="resizeCanvas()"><i class="fas fa-compress-arrows-alt"></i> Resize Canvas</button>
        </div>
        
        <div class="tool-group">
          <div class="tool-title"><i class="fas fa-font"></i> Text & Draw</div>
          <input type="text" class="input-field" id="textInput" placeholder="Teks..." aria-label="Input teks">
          <input type="color" class="color-picker" id="textColor" value="#00d4ff" aria-label="Pilih warna teks">
          <input type="number" class="input-field" id="textSize" placeholder="Ukuran (px)" value="40" aria-label="Ukuran font">
          <button class="tool-btn" onclick="addText()"><i class="fas fa-plus"></i> Tambah Teks</button>
          <button class="tool-btn" onclick="startDrawing()"><i class="fas fa-pencil-alt"></i> Draw Mode</button>
        </div>
        
        <div class="tool-group">
          <div class="tool-title"><i class="fas fa-layer-group"></i> Combine</div>
          <button class="tool-btn" onclick="combinePhotos('h')"><i class="fas fa-arrows-alt-h"></i> Gabung Horizontal</button>
          <button class="tool-btn" onclick="combinePhotos('v')"><i class="fas fa-arrows-alt-v"></i> Gabung Vertikal</button>
          <button class="tool-btn" onclick="addFrame()"><i class="fas fa-border-style"></i> Tambah Frame</button>
          <button class="tool-btn" onclick="addWatermark()"><i class="fas fa-copyright"></i> Watermark</button>
        </div>
      </div>
      
      <div class="action-buttons">
        <button class="btn btn-primary" onclick="downloadImage()">
          <i class="fas fa-download"></i> Download Foto
        </button>
        <button class="btn btn-secondary" onclick="clearCanvas()">
          <i class="fas fa-trash"></i> Clear
        </button>
        <button class="btn btn-secondary" onclick="undoAction()">
          <i class="fas fa-undo"></i> Undo
        </button>
      </div>
    </div>
  </section>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="imageModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Foto Detail</h3>
      <button class="modal-close" onclick="closeModal()" aria-label="Tutup modal">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body">
      <img src="" alt="" id="modalImage">
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="copyImage()">
          <i class="fas fa-copy"></i> Copy Foto
        </button>
        <button class="btn btn-secondary" onclick="downloadModalImage()">
          <i class="fas fa-download"></i> Download
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast" role="alert" aria-live="assertive">
  <i class="fas fa-bolt"></i>
  <span id="toastText">Berhasil!</span>
</div>

<script>
// ===== GLOBAL STATE =====
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';
let canvas = document.getElementById('mainCanvas');
let ctx = canvas?.getContext('2d');
let currentEditorImage = null;
let history = [];
let isDrawing = false;
let lastDrawX, lastDrawY;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  initParticles();
  if (document.getElementById('gallery')) fetchPhotosFromSheet();
  initCanvas();
  setupKeyboardShortcuts();
});

// ===== PARTICLE SYSTEM =====
function initParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  
  const colors = ['blue', 'cyan', 'purple'];
  const count = 60;
  
  for(let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = `particle ${colors[i % colors.length]}`;
    p.style.left = `${Math.random() * 100}%`;
    p.style.setProperty('--drift', `${(Math.random() - 0.5) * 100}px`);
    p.style.animationDelay = `${Math.random() * 30}s`;
    p.style.width = p.style.height = `${1 + Math.random() * 2}px`;
    container.appendChild(p);
  }
}

// ===== NAVIGATION =====
function showSection(sectionId) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.remove('active');
    t.setAttribute('aria-selected', 'false');
  });
  
  document.getElementById(sectionId).classList.add('active');
  const activeTab = event.target.closest('.nav-tab');
  activeTab.classList.add('active');
  activeTab.setAttribute('aria-selected', 'true');
  
  // Scroll to top smoothly
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== DATA FETCHING =====
async function fetchPhotosFromSheet() {
  const loading = document.getElementById('loading');
  const grid = document.getElementById('galleryGrid');
  
  loading.classList.add('active');
  grid.innerHTML = '';
  
  try {
    const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
    const gid = '1246502038';
    
    // Try GVIZ first
    try {
      const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
      const response = await fetch(gvizUrl, { cache: 'no-store' });
      const text = await response.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      
      allPhotos = json.table.rows
        .filter(row => row.c?.[0]?.v && row.c?.[1]?.v)
        .map((row, index) => ({
          judul: row.c[0].v,
          foto: row.c[1].v,
          index: index + 2
        }));
    } catch {
      // Fallback to CSV
      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
      const csvText = await fetch(csvUrl).then(r => r.text());
      
      allPhotos = csvText.split('\n')
        .slice(1)
        .map((row, index) => {
          const [judul, foto] = row.split(',').map(c => c?.replace(/"/g, '').trim());
          return (judul && foto) ? { judul, foto, index: index + 2 } : null;
        })
        .filter(Boolean);
    }
    
    renderGallery(allPhotos);
    showToast(`⚡ Berhasil memuat ${allPhotos.length} foto`);
    
  } catch (error) {
    console.error('Fetch error:', error);
    showToast('❗ Gagal mengambil data');
    grid.innerHTML = `
      <div class="no-results" style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-secondary);">
        <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: var(--neon-pink); margin-bottom: 16px; text-shadow: 0 0 20px rgba(255,0,170,0.5);"></i>
        <h3 style="font-family: 'Orbitron'; color: var(--text-primary); margin-bottom: 8px;">Gagal Memuat Foto</h3>
        <p style="font-size: 12px;">Periksa koneksi atau publikasi Google Sheets</p>
      </div>
    `;
  }
  
  loading.classList.remove('active');
}

// ===== GALLERY RENDERING =====
function renderGallery(photos) {
  const grid = document.getElementById('galleryGrid');
  
  if (photos.length === 0) {
    grid.innerHTML = `
      <div class="no-results" style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-secondary);">
        <i class="fas fa-search" style="font-size: 48px; margin-bottom: 16px; opacity: 0.4;"></i>
        <h3 style="font-family: 'Orbitron'; color: var(--text-primary); margin-bottom: 8px;">Tidak Ada Foto</h3>
        <p style="font-size: 12px;">Coba kata kunci lain atau upload foto baru</p>
      </div>
    `;
    return;
  }
  
  grid.innerHTML = '';
  photos.forEach((photo, idx) => {
    const card = createPhotoCard(photo.foto, photo.judul, idx);
    card.style.setProperty('--i', idx);
    grid.appendChild(card);
  });
}

function createPhotoCard(url, title, index) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.setAttribute('role', 'listitem');
  card.innerHTML = `
    <div class="photo-wrapper">
      <img src="${url}" alt="${title}" 
           onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00d4ff?text=No+Image'" 
           loading="lazy" 
           onclick="viewFullImage('${url}', '${title.replace(/'/g, "\\'")}')" 
           style="cursor: pointer;"
           decoding="async">
    </div>
    <div class="photo-info">
      <div class="photo-title">${title}</div>
      <div class="photo-meta">Foto #${index + 1}</div>
      <div class="action-buttons-row">
        <button class="action-btn-cool copy-btn" onclick="copyPhoto('${url}')" title="Copy Foto" aria-label="Copy foto">
          <i class="fas fa-copy"></i><span>Copy</span>
        </button>
        <button class="action-btn-cool download-btn" onclick="downloadPhoto('${url}', '${title.replace(/'/g, "\\'")}')" title="Download" aria-label="Download foto">
          <i class="fas fa-download"></i><span>Download</span>
        </button>
        <button class="action-btn-cool edit-btn" onclick="editImageFromUrl('${url}')" title="Edit" aria-label="Edit foto">
          <i class="fas fa-edit"></i><span>Edit</span>
        </button>
      </div>
    </div>
  `;
  return card;
}

// ===== SEARCH =====
function searchPhotos() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  
  if (!term) {
    renderGallery(allPhotos);
    return;
  }
  
  const filtered = allPhotos.filter(p => 
    p.judul.toLowerCase().includes(term)
  );
  
  renderGallery(filtered);
  if (filtered.length > 0) {
    showToast(`⚡ Ditemukan ${filtered.length} foto`);
  }
}

// ===== MODAL =====
function viewFullImage(url, title) {
  currentImageUrl = url;
  currentImageTitle = title;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalImage').src = url;
  document.getElementById('imageModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('imageModal').classList.remove('active');
  document.body.style.overflow = '';
  currentImageUrl = '';
  currentImageTitle = '';
}

// ===== ACTIONS =====
async function copyPhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin ke clipboard!');
  } catch {
    showToast('❗ Klik kanan gambar > Copy Image');
  }
}

async function copyImage() {
  if (currentImageUrl) await copyPhoto(currentImageUrl);
}

function downloadPhoto(url, filename) {
  const link = document.createElement('a');
  link.href = url;
  link.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
  link.target = '_blank';
  link.rel = 'noopener';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('⚡ Download dimulai...');
}

function downloadModalImage() {
  if (currentImageUrl && currentImageTitle) {
    downloadPhoto(currentImageUrl, currentImageTitle);
  }
}

// ===== CANVAS EDITOR =====
function initCanvas() {
  if (!canvas || !ctx) return;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = '20px Rajdhani';
  ctx.fillStyle = '#8ab4f8';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Upload foto untuk mulai mengedit', canvas.width/2, canvas.height/2);
}

function handleFiles(event) {
  const files = event.target.files;
  if (!files.length) return;
  
  loadImage(files[0]);
  
  if (files.length > 1) {
    setTimeout(() => {
      if (confirm(`Load ${files.length} foto?\n\nOK = Combine\nCancel = Load satu per satu`)) {
        combineMultipleFiles(files);
      }
    }, 300);
  }
}

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      currentEditorImage = img;
      saveHistory();
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      showToast('✅ Foto dimuat');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function combineMultipleFiles(files) {
  const images = [];
  let loaded = 0;
  
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        images.push(img);
        if (++loaded === files.length) combineImages(images);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function combineImages(images) {
  const totalWidth = images.reduce((sum, img) => sum + img.width, 0);
  const maxHeight = Math.max(...images.map(img => img.height));
  
  canvas.width = totalWidth;
  canvas.height = maxHeight;
  
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  let x = 0;
  images.forEach(img => {
    ctx.drawImage(img, x, 0);
    x += img.width;
  });
  
  saveHistory();
  showToast(`✅ ${images.length} foto digabungkan`);
}

// ===== FILTERS & ADJUSTMENTS =====
function applyFilter(type) {
  if (!currentEditorImage) {
    showToast('⚠️ Upload foto dulu');
    return;
  }
  
  saveHistory();
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  
  switch(type) {
    case 'grayscale':
      for (let i = 0; i < data.length; i += 4) {
        const avg = (data[i] + data[i+1] + data[i+2]) / 3;
        data[i] = data[i+1] = data[i+2] = avg;
      }
      break;
    case 'sepia':
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        data[i] = Math.min(255, r*.393 + g*.769 + b*.189);
        data[i+1] = Math.min(255, r*.349 + g*.686 + b*.168);
        data[i+2] = Math.min(255, r*.272 + g*.534 + b*.131);
      }
      break;
    case 'invert':
      for (let i = 0; i < data.length; i += 4) {
        data[i] = 255 - data[i];
        data[i+1] = 255 - data[i+1];
        data[i+2] = 255 - data[i+2];
      }
      break;
    case 'blur':
      ctx.filter = 'blur(4px)';
      ctx.drawImage(canvas, 0, 0);
      ctx.filter = 'none';
      return;
  }
  
  ctx.putImageData(imageData, 0, 0);
  showToast(`✅ Filter ${type} diterapkan`);
}

function adjustImage() {
  if (!currentEditorImage) return;
  
  const b = document.getElementById('brightness').value;
  const c = document.getElementById('contrast').value;
  const s = document.getElementById('saturation').value;
  
  ctx.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
  ctx.drawImage(currentEditorImage, 0, 0, canvas.width, canvas.height);
  ctx.filter = 'none';
}

// ===== TRANSFORMS =====
function rotateImage(deg) {
  if (!currentEditorImage) return;
  saveHistory();
  
  const temp = document.createElement('canvas');
  const tCtx = temp.getContext('2d');
  
  if (Math.abs(deg) === 90) {
    temp.width = canvas.height;
    temp.height = canvas.width;
  } else {
    temp.width = canvas.width;
    temp.height = canvas.height;
  }
  
  tCtx.translate(temp.width/2, temp.height/2);
  tCtx.rotate(deg * Math.PI / 180);
  tCtx.drawImage(canvas, -canvas.width/2, -canvas.height/2);
  
  canvas.width = temp.width;
  canvas.height = temp.height;
  ctx.drawImage(temp, 0, 0);
}

function flipImage(dir) {
  if (!currentEditorImage) return;
  saveHistory();
  
  const temp = document.createElement('canvas');
  const tCtx = temp.getContext('2d');
  temp.width = canvas.width;
  temp.height = canvas.height;
  
  if (dir === 'h') {
    tCtx.translate(canvas.width, 0);
    tCtx.scale(-1, 1);
  } else {
    tCtx.translate(0, canvas.height);
    tCtx.scale(1, -1);
  }
  
  tCtx.drawImage(canvas, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(temp, 0, 0);
}

function resizeCanvas() {
  const w = prompt('Lebar baru (px):', canvas.width);
  const h = prompt('Tinggi baru (px):', canvas.height);
  
  if (w && h) {
    saveHistory();
    const temp = document.createElement('canvas');
    const tCtx = temp.getContext('2d');
    temp.width = canvas.width;
    temp.height = canvas.height;
    tCtx.drawImage(canvas, 0, 0);
    
    canvas.width = parseInt(w);
    canvas.height = parseInt(h);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(temp, 0, 0);
  }
}

// ===== TEXT & DRAW =====
function addText() {
  const text = document.getElementById('textInput').value;
  const color = document.getElementById('textColor').value;
  const size = document.getElementById('textSize').value;
  
  if (!text) { showToast('⚠️ Masukkan teks'); return; }
  
  saveHistory();
  ctx.font = `${size}px Orbitron`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 12;
  ctx.fillText(text, canvas.width/2, canvas.height/2);
  ctx.shadowBlur = 0;
  showToast('✅ Teks ditambahkan');
}

function startDrawing() {
  isDrawing = !isDrawing;
  
  if (isDrawing) {
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);
    showToast('✏️ Mode gambar aktif');
  } else {
    canvas.removeEventListener('mousedown', startDraw);
    canvas.removeEventListener('mousemove', draw);
    canvas.removeEventListener('mouseup', stopDraw);
    canvas.removeEventListener('mouseleave', stopDraw);
    showToast('Mode gambar nonaktif');
  }
}

function startDraw(e) {
  const rect = canvas.getBoundingClientRect();
  lastDrawX = (e.clientX - rect.left) * (canvas.width / rect.width);
  lastDrawY = (e.clientY - rect.top) * (canvas.height / rect.height);
  
  ctx.beginPath();
  ctx.moveTo(lastDrawX, lastDrawY);
  ctx.strokeStyle = document.getElementById('textColor').value;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function draw(e) {
  if (!isDrawing) return;
  
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  
  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function stopDraw() {
  if (isDrawing) {
    isDrawing = false;
    saveHistory();
  }
}

// ===== COMBINE & EFFECTS =====
function combinePhotos() {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = 'image/*';
  input.onchange = (e) => {
    if (e.target.files.length < 2) {
      showToast('⚠️ Pilih minimal 2 foto');
      return;
    }
    combineMultipleFiles(e.target.files);
  };
  input.click();
}

function addFrame() {
  saveHistory();
  const w = 22;
  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth = w;
  ctx.strokeRect(w/2, w/2, canvas.width-w, canvas.height-w);
  showToast('✅ Frame ditambahkan');
}

function addWatermark() {
  saveHistory();
  ctx.font = 'bold 32px Orbitron';
  ctx.fillStyle = 'rgba(0, 212, 255, 0.25)';
  ctx.textAlign = 'right';
  ctx.fillText('LINE TOGEL', canvas.width - 24, canvas.height - 24);
  showToast('✅ Watermark ditambahkan');
}

// ===== HISTORY & EXPORT =====
function saveHistory() {
  if (!canvas) return;
  history.push(canvas.toDataURL());
  if (history.length > 12) history.shift();
}

function undoAction() {
  if (history.length > 1) {
    history.pop();
    const prev = history[history.length - 1];
    const img = new Image();
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
    };
    img.src = prev;
    showToast('↩️ Undo');
  }
}

function clearCanvas() {
  if (confirm('Hapus semua perubahan?')) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    currentEditorImage = null;
    history = [];
    showToast('🗑️ Canvas dibersihkan');
  }
}

function downloadImage() {
  const link = document.createElement('a');
  link.download = `edited-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('⚡ Foto didownload');
}

function editImageFromUrl(url) {
  showSection('editor');
  document.querySelectorAll('.nav-tab')[1].click();
  
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    currentEditorImage = img;
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    saveHistory();
    showToast('✅ Foto dimuat ke editor');
  };
  img.onerror = () => showToast('❗ Gagal memuat gambar');
  img.src = url;
}

// ===== UI UTILS =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3200);
}

function setupKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undoAction(); }
    if (e.key === 'Enter' && document.activeElement.classList.contains('upload-area')) {
      document.getElementById('fileInput').click();
    }
  });
  
  // Close modal on backdrop click
  document.getElementById('imageModal').addEventListener('click', (e) => {
    if (e.target.id === 'imageModal') closeModal();
  });
}
</script>
</body>

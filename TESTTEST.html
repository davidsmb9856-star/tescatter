<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-blue: #00d4ff;
--neon-cyan: #00ffff;
--neon-electric: #00f5ff;
--neon-purple: #7b2fff;
--neon-pink: #ff00aa;
--neon-gold: #ffd700;
--neon-green: #00ff9d;
--bg-deep: #020408;
--bg-surface: rgba(5, 15, 35, 0.92);
--bg-elevated: rgba(10, 25, 55, 0.85);
--bg-glass: rgba(8, 20, 45, 0.75);
--text-primary: #ffffff;
--text-secondary: #8ab4f8;
--text-dim: #54689a;
--border-glow: rgba(0, 212, 255, 0.7);
--glow-blue: 0 0 20px rgba(0, 212, 255, 0.8), 0 0 45px rgba(0, 212, 255, 0.5), 0 0 80px rgba(0, 212, 255, 0.2);
--glow-electric: 0 0 25px rgba(0, 245, 255, 0.9), 0 0 60px rgba(0, 245, 255, 0.6), 0 0 100px rgba(0, 245, 255, 0.3);
--glow-purple: 0 0 20px rgba(123, 47, 255, 0.7), 0 0 50px rgba(123, 47, 255, 0.4);
--transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
--transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
--transition-bloom: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-deep);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
}

/* ✨ ENHANCED Background Effects */
.bg-canvas {
position: fixed;
inset: 0;
z-index: -3;
background:
radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.25) 0%, transparent 55%),
radial-gradient(ellipse at 80% 15%, rgba(0, 245, 255, 0.2) 0%, transparent 55%),
radial-gradient(ellipse at 50% 85%, rgba(123, 47, 255, 0.18) 0%, transparent 60%),
radial-gradient(ellipse at 35% 60%, rgba(0, 212, 255, 0.15) 0%, transparent 50%);
animation: bgPulse 12s ease-in-out infinite alternate;
}
@keyframes bgPulse {
0%, 100% { opacity: 1; filter: hue-rotate(0deg) brightness(1); }
50% { opacity: 0.95; filter: hue-rotate(25deg) brightness(1.1); }
}

.grid-overlay {
position: fixed;
inset: 0;
z-index: -2;
background-image:
linear-gradient(rgba(0, 212, 255, 0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.08) 1px, transparent 1px),
linear-gradient(45deg, rgba(0, 245, 255, 0.04) 1px, transparent 1px);
background-size: 45px 45px, 45px 45px, 90px 90px;
mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, black 25%, transparent 80%);
animation: gridMove 25s linear infinite;
}
@keyframes gridMove {
0% { background-position: 0 0, 0 0, 0 0; }
100% { background-position: 45px 45px, 45px 45px, 90px 90px; }
}

.lightning-overlay {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
opacity: 0;
animation: lightningFlash 7s infinite;
}
@keyframes lightningFlash {
0%, 87%, 89%, 91%, 93%, 100% { opacity: 0; }
88%, 90%, 92% { opacity: 0.2; }
}
.lightning-bolt {
position: absolute;
width: 3px;
height: 100vh;
background: linear-gradient(180deg, transparent, var(--neon-electric), var(--neon-blue), var(--neon-purple), transparent);
filter: blur(3px);
animation: lightningStrike 7s infinite;
box-shadow: 0 0 30px var(--neon-electric), 0 0 60px var(--neon-blue);
}
.lightning-bolt:nth-child(1) { left: 15%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 1.5s; }
.lightning-bolt:nth-child(3) { left: 85%; animation-delay: 3s; }
@keyframes lightningStrike {
0%, 87%, 89%, 91%, 93%, 100% { transform: scaleY(0); opacity: 0; }
88%, 90%, 92% { transform: scaleY(1); opacity: 1; }
}

.particles {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
overflow: hidden;
}
.particle {
position: absolute;
width: 4px; height: 4px;
background: var(--neon-electric);
border-radius: 50%;
opacity: 0.8;
animation: particleFloat 18s infinite ease-in-out;
box-shadow: 0 0 15px var(--neon-electric), 0 0 30px var(--neon-blue);
}
.particle:nth-child(2n) {
background: var(--neon-blue);
box-shadow: 0 0 12px var(--neon-blue), 0 0 25px var(--neon-cyan);
animation-delay: -4s;
animation-duration: 22s;
}
.particle:nth-child(3n) {
background: var(--neon-purple);
box-shadow: 0 0 15px var(--neon-purple), 0 0 30px var(--neon-pink);
animation-delay: -9s;
animation-duration: 28s;
}
.particle:nth-child(5n) {
width: 2px; height: 2px;
background: var(--neon-green);
box-shadow: 0 0 10px var(--neon-green);
animation-duration: 15s;
}
@keyframes particleFloat {
0%, 100% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }
10% { opacity: 0.9; }
50% { transform: translateY(0) rotate(360deg) scale(1.2); }
90% { opacity: 0.9; }
100% { transform: translateY(-100vh) rotate(720deg) scale(0.8); opacity: 0; }
}

.scanline {
position: fixed;
left: 0; right: 0; height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), var(--neon-cyan), transparent);
opacity: 0.7;
animation: scanLine 5s linear infinite;
z-index: 50;
pointer-events: none;
filter: blur(1.5px);
box-shadow: 0 0 20px var(--neon-electric);
}
@keyframes scanLine {
0% { top: -5px; opacity: 0; }
5% { opacity: 0.7; }
95% { opacity: 0.7; }
100% { top: 100%; opacity: 0; }
}

.noise {
position: fixed;
inset: 0;
z-index: -1;
opacity: 0.04;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
pointer-events: none;
animation: noiseFlicker 0.15s infinite steps(1);
}
@keyframes noiseFlicker {
0%, 100% { opacity: 0.04; }
50% { opacity: 0.05; }
}

/* ✨ ENHANCED Layout */
.container {
max-width: 1400px;
margin: 0 auto;
padding: 25px 18px;
min-height: 100vh;
position: relative;
}

.header {
text-align: center;
margin-bottom: 30px;
animation: headerEntrance 1s var(--transition-bloom) backwards;
position: relative;
}
.header::after {
content: '';
position: absolute;
bottom: -15px;
left: 50%;
transform: translateX(-50%);
width: 200px;
height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
box-shadow: 0 0 15px var(--neon-electric);
}
@keyframes headerEntrance {
from { opacity: 0; transform: translateY(-50px) scale(0.95); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

.back-btn {
position: fixed;
left: 18px; top: 25px;
background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 245, 255, 0.15));
border: 1px solid var(--neon-electric);
color: var(--neon-electric);
padding: 7px 16px;
border-radius: 10px;
text-decoration: none;
font-weight: 700;
font-size: 11px;
display: flex;
align-items: center;
gap: 7px;
transition: var(--transition-smooth);
backdrop-filter: blur(12px);
z-index: 1000;
pointer-events: auto;
box-shadow: 0 0 15px rgba(0, 245, 255, 0.4);
}
.back-btn:hover {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.4), rgba(0, 245, 255, 0.3));
transform: translateX(-6px) scale(1.05);
box-shadow: var(--glow-electric);
color: var(--bg-deep);
}

.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(30px, 7vw, 52px);
font-weight: 900;
letter-spacing: 5px;
margin-bottom: 10px;
position: relative;
background: linear-gradient(135deg, var(--neon-electric) 0%, var(--neon-cyan) 25%, var(--neon-blue) 45%, #ffffff 55%, var(--neon-blue) 70%, var(--neon-purple) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 0 0 35px rgba(0, 212, 255, 0.7);
animation: titleShimmer 2.5s ease-in-out infinite, titleGlow 3s ease-in-out infinite alternate;
}
@keyframes titleShimmer {
0%, 100% { filter: brightness(1) hue-rotate(0deg); }
50% { filter: brightness(1.4) hue-rotate(10deg); }
}
@keyframes titleGlow {
0% { text-shadow: 0 0 30px rgba(0, 212, 255, 0.6); }
100% { text-shadow: 0 0 50px rgba(0, 245, 255, 0.9), 0 0 80px rgba(123, 47, 255, 0.5); }
}

.subtitle {
font-size: 12px;
color: var(--text-secondary);
letter-spacing: 6px;
text-transform: uppercase;
margin-bottom: 16px;
font-weight: 600;
text-shadow: 0 0 10px rgba(138, 180, 248, 0.5);
}

.status-badge {
display: inline-flex;
align-items: center;
gap: 9px;
padding: 7px 18px;
background: linear-gradient(135deg, rgba(0, 255, 157, 0.15), rgba(0, 200, 100, 0.1));
border: 1px solid rgba(0, 255, 157, 0.5);
border-radius: 100px;
font-size: 10px;
font-weight: 700;
color: var(--neon-green);
text-transform: uppercase;
letter-spacing: 2.5px;
animation: statusPulse 2s ease-in-out infinite;
box-shadow: 0 0 20px rgba(0, 255, 157, 0.35), inset 0 0 15px rgba(0, 255, 157, 0.1);
}
@keyframes statusPulse {
0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 157, 0.35), inset 0 0 15px rgba(0, 255, 157, 0.1); }
50% { box-shadow: 0 0 35px rgba(0, 255, 157, 0.7), inset 0 0 25px rgba(0, 255, 157, 0.2); }
}

.status-dot {
width: 7px; height: 7px;
background: var(--neon-green);
border-radius: 50%;
animation: dotBeat 1.2s ease-in-out infinite;
box-shadow: 0 0 12px var(--neon-green), 0 0 25px rgba(0, 255, 157, 0.6);
}
@keyframes dotBeat {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.5); opacity: 0.8; }
}

/* ✨ ENHANCED Navigation */
.nav-tabs {
display: flex;
gap: 12px;
justify-content: center;
margin-bottom: 28px;
flex-wrap: wrap;
}
.nav-tab {
padding: 11px 24px;
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: 10px;
color: var(--text-primary);
font-family: 'Orbitron', sans-serif;
font-size: 11px;
font-weight: 700;
cursor: pointer;
transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
text-transform: uppercase;
letter-spacing: 1.5px;
backdrop-filter: blur(12px);
position: relative;
overflow: hidden;
}
.nav-tab::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 245, 255, 0.1));
opacity: 0;
transition: opacity 0.3s;
}
.nav-tab:hover::before, .nav-tab.active::before {
opacity: 1;
}
.nav-tab:hover, .nav-tab.active {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(0, 245, 255, 0.2));
border-color: var(--neon-electric);
box-shadow: var(--glow-electric);
transform: translateY(-3px) scale(1.03);
color: var(--neon-electric);
}
.nav-tab.active {
box-shadow: var(--glow-electric), 0 0 0 2px rgba(0, 245, 255, 0.3);
}

.section { display: none; }
.section.active { display: block; animation: fadeIn 0.5s; }
@keyframes fadeIn {
from { opacity: 0; transform: translateY(25px); }
to { opacity: 1; transform: translateY(0); }
}

/* ✨ ENHANCED Search */
.search-container {
max-width: 650px;
margin: 0 auto 28px;
}
.search-box {
width: 100%;
padding: 14px 50px 14px 20px;
background: linear-gradient(135deg, rgba(10, 25, 55, 0.95), rgba(5, 15, 35, 0.98));
border: 2px solid var(--border-glow);
border-radius: 12px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 14px;
transition: all 0.35s;
backdrop-filter: blur(15px);
box-shadow: 0 5px 25px rgba(0, 0, 0, 0.3);
}
.search-box:focus {
outline: none;
border-color: var(--neon-electric);
box-shadow: var(--glow-electric), 0 10px 40px rgba(0, 245, 255, 0.3);
transform: scale(1.02);
}
.search-box::placeholder {
color: var(--text-dim);
}

/* ✨ ENHANCED Gallery Section */
.gallery-section {
margin-bottom: 40px;
animation: sectionReveal 0.7s var(--transition-bloom) backwards;
}
@keyframes sectionReveal {
from { opacity: 0; transform: translateY(50px); }
to { opacity: 1; transform: translateY(0); }
}

.section-title {
font-family: 'Orbitron', sans-serif;
font-size: 15px;
font-weight: 700;
color: var(--text-primary);
margin-bottom: 18px;
padding-bottom: 12px;
border-bottom: 2px solid var(--border-glow);
display: flex;
align-items: center;
gap: 12px;
letter-spacing: 2.5px;
position: relative;
text-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
}
.section-title::before {
content: '';
width: 5px; height: 22px;
background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue), var(--neon-purple));
border-radius: 3px;
box-shadow: 0 0 15px rgba(0, 245, 255, 0.8), 0 0 30px rgba(123, 47, 255, 0.5);
animation: pulseBar 2s ease-in-out infinite;
}
@keyframes pulseBar {
0%, 100% { opacity: 1; box-shadow: 0 0 15px rgba(0, 245, 255, 0.8); }
50% { opacity: 0.9; box-shadow: 0 0 25px rgba(0, 245, 255, 1), 0 0 45px rgba(123, 47, 255, 0.7); }
}

.gallery-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
gap: 18px;
}

/* ✨ ULTRA COOL Photo Card */
.photo-card {
background: linear-gradient(145deg, rgba(10, 25, 55, 0.95), rgba(5, 15, 35, 0.98));
border: 2px solid rgba(0, 212, 255, 0.35);
border-radius: 16px;
overflow: hidden;
transition: var(--transition-bloom);
position: relative;
backdrop-filter: blur(15px);
animation: cardEnter 0.6s ease forwards;
opacity: 0;
transform: translateY(25px);
box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
}
.photo-card::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), transparent 50%, rgba(123, 47, 255, 0.08));
opacity: 0;
transition: opacity 0.4s;
pointer-events: none;
}
.photo-card:hover::before {
opacity: 1;
}
.photo-card:nth-child(1) { animation-delay: 0.1s; }
.photo-card:nth-child(2) { animation-delay: 0.15s; }
.photo-card:nth-child(3) { animation-delay: 0.2s; }
.photo-card:nth-child(4) { animation-delay: 0.25s; }
.photo-card:nth-child(5) { animation-delay: 0.3s; }
@keyframes cardEnter {
to { opacity: 1; transform: translateY(0); }
}
.photo-card:hover {
transform: translateY(-8px) scale(1.03);
border-color: var(--neon-electric);
box-shadow: var(--glow-electric), var(--glow-purple), 0 20px 50px rgba(0, 0, 0, 0.5);
}

.photo-wrapper {
position: relative;
width: 100%;
height: 290px;
background: radial-gradient(ellipse at center, #0d2137 0%, #050d18 60%, #020408 100%);
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
border-bottom: 1px solid rgba(0, 212, 255, 0.2);
}
.photo-wrapper::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(180deg, transparent 60%, rgba(0, 212, 255, 0.1));
pointer-events: none;
}
.photo-wrapper img {
width: 100%;
height: 100%;
object-fit: contain;
display: block;
padding: 10px;
background: transparent;
transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), filter 0.3s;
filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
}
.photo-card:hover .photo-wrapper img {
transform: scale(1.08);
filter: drop-shadow(0 10px 25px rgba(0, 245, 255, 0.4));
}

/* ✨ Action buttons below title - ALWAYS VISIBLE (EDIT REMOVED) */
.photo-info {
padding: 16px;
}
.photo-title {
font-family: 'Orbitron', sans-serif;
font-size: 14px;
font-weight: 700;
color: var(--neon-electric);
margin-bottom: 14px;
word-break: break-word;
text-align: center;
text-shadow: 0 0 12px rgba(0, 245, 255, 0.6);
animation: textGlow 2.5s ease-in-out infinite alternate;
}
@keyframes textGlow {
0% { text-shadow: 0 0 10px rgba(0, 245, 255, 0.5); }
100% { text-shadow: 0 0 20px rgba(0, 245, 255, 0.9), 0 0 35px rgba(0, 212, 255, 0.6); }
}
.photo-meta {
font-size: 11px;
color: var(--text-secondary);
text-align: center;
margin-bottom: 14px;
opacity: 0.9;
}

/* ✨ NEW: Ultra Cool Action Buttons Row (EDIT REMOVED) */
.action-buttons-row {
display: flex;
gap: 10px;
justify-content: center;
flex-wrap: wrap;
padding-top: 12px;
border-top: 2px solid rgba(0, 212, 255, 0.25);
}
.action-btn-cool {
flex: 1;
min-width: 75px;
max-width: 95px;
height: 46px;
background: linear-gradient(145deg, rgba(0, 212, 255, 0.2) 0%, rgba(0, 245, 255, 0.15) 50%, rgba(0, 212, 255, 0.1) 100%);
border: 2px solid rgba(0, 212, 255, 0.5);
border-radius: 10px;
color: var(--neon-electric);
font-size: 11px;
font-weight: 700;
cursor: pointer;
transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 4px;
text-transform: uppercase;
letter-spacing: 0.8px;
backdrop-filter: blur(10px);
position: relative;
overflow: hidden;
}
.action-btn-cool::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 50%);
opacity: 0;
transition: opacity 0.3s;
}
.action-btn-cool:hover::before {
opacity: 1;
}
.action-btn-cool i {
font-size: 17px;
margin-bottom: 2px;
filter: drop-shadow(0 0 8px currentColor);
}
.action-btn-cool:hover {
background: linear-gradient(145deg, rgba(0, 212, 255, 0.45) 0%, rgba(0, 245, 255, 0.35) 50%, rgba(0, 212, 255, 0.25) 100%);
border-color: var(--neon-electric);
transform: translateY(-4px) scale(1.08);
box-shadow: 0 8px 30px rgba(0, 245, 255, 0.6), 0 0 25px rgba(0, 245, 255, 0.4);
color: var(--bg-deep);
}
.action-btn-cool.copy-btn {
border-color: rgba(0, 255, 157, 0.5);
color: var(--neon-green);
}
.action-btn-cool.copy-btn:hover {
background: linear-gradient(145deg, rgba(0, 255, 157, 0.45) 0%, rgba(0, 200, 100, 0.35) 100%);
border-color: var(--neon-green);
box-shadow: 0 8px 30px rgba(0, 255, 157, 0.6), 0 0 25px rgba(0, 255, 157, 0.4);
}
.action-btn-cool.download-btn {
border-color: rgba(0, 212, 255, 0.5);
color: var(--neon-blue);
}
.action-btn-cool.download-btn:hover {
background: linear-gradient(145deg, rgba(0, 212, 255, 0.45) 0%, rgba(0, 180, 255, 0.35) 100%);
border-color: var(--neon-blue);
box-shadow: 0 8px 30px rgba(0, 212, 255, 0.6), 0 0 25px rgba(0, 212, 255, 0.4);
}
.action-btn-cool span {
font-size: 9px;
font-weight: 700;
letter-spacing: 0.5px;
}

/* ✨ ENHANCED Editor Section */
.editor-container {
background: linear-gradient(145deg, rgba(10, 25, 55, 0.95), rgba(5, 15, 35, 0.98));
border: 2px solid var(--border-glow);
border-radius: 20px;
padding: 22px;
margin-bottom: 22px;
box-shadow: var(--glow-blue), 0 15px 50px rgba(0, 0, 0, 0.4);
}
.editor-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 20px;
padding-bottom: 16px;
border-bottom: 2px solid rgba(0, 212, 255, 0.35);
}
.editor-title {
font-family: 'Orbitron', sans-serif;
font-size: 17px;
color: var(--neon-electric);
text-shadow: 0 0 15px rgba(0, 245, 255, 0.6);
}

.upload-area {
border: 3px dashed var(--border-glow);
border-radius: 14px;
padding: 45px 25px;
text-align: center;
cursor: pointer;
transition: all 0.4s;
margin-bottom: 22px;
background: linear-gradient(135deg, rgba(0, 212, 255, 0.05), transparent);
}
.upload-area:hover {
border-color: var(--neon-electric);
background: linear-gradient(135deg, rgba(0, 212, 255, 0.12), rgba(0, 245, 255, 0.08));
box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
transform: scale(1.02);
}
.upload-icon {
font-size: 48px;
color: var(--neon-electric);
margin-bottom: 16px;
animation: floatIcon 3s ease-in-out infinite;
filter: drop-shadow(0 0 15px var(--neon-electric));
}
@keyframes floatIcon {
0%, 100% { transform: translateY(0); }

<script>
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';
let canvas = document.getElementById('mainCanvas');
let ctx = canvas ? canvas.getContext('2d') : null;
let currentEditorImage = null;
let history = [];
let isDrawing = false;

document.addEventListener('DOMContentLoaded', () => {
createParticles();
if (document.getElementById('gallery')) {
fetchPhotosFromSheet();
}
initCanvas();
});

function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
for(let i = 0; i < 60; i++) {
const p = document.createElement('div');
p.className = 'particle';
p.style.left = Math.random() * 100 + '%';
p.style.animationDelay = Math.random() * 18 + 's';
p.style.animationDuration = (15 + Math.random() * 20) + 's';
container.appendChild(p);
}
}

function showSection(sectionId) {
document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
document.getElementById(sectionId).classList.add('active');
event.target.closest('.nav-tab').classList.add('active');
}

async function fetchPhotosFromSheet() {
document.getElementById('loading').classList.add('active');
document.getElementById('galleryGrid').innerHTML = '';
try {
const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';
try {
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
const response = await fetch(gvizUrl);
const text = await response.text();
const json = JSON.parse(text.substring(47).slice(0, -2));
const rows = json.table.rows;
allPhotos = [];
rows.forEach((row, index) => {
const c = row.c;
if (!c) return;
const judul = c[0] ? (c[0].v || '') : '';
const foto = c[1] ? (c[1].v || '') : '';
if (judul && foto) {
allPhotos.push({
judul: judul,
foto: foto,
index: index + 2
});
}
});
} catch (e) {
console.log('GVIZ failed, trying CSV...', e);
const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
const csvResponse = await fetch(csvUrl);
const csvText = await csvResponse.text();
const csvRows = csvText.split('\n').map(row => row.split(','));
allPhotos = [];
csvRows.forEach((row, index) => {
if (row.length < 2) return;
const judul = row[0] ? row[0].replace(/"/g, '').trim() : '';
const foto = row[1] ? row[1].replace(/"/g, '').trim() : '';
if (judul && foto) {
allPhotos.push({
judul: judul,
foto: foto,
index: index + 2
});
}
});
}
renderGallery(allPhotos);
showToast(`⚡ Berhasil memuat ${allPhotos.length} foto`);
} catch (error) {
console.error('Error fetching photos:', error);
showToast('❗ Gagal mengambil data dari Google Sheets');
document.getElementById('galleryGrid').innerHTML = `
<div class="no-results" style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary);">
<i class="fas fa-exclamation-triangle" style="font-size: 42px; color: var(--neon-pink); margin-bottom: 14px; filter: drop-shadow(0 0 10px rgba(255,0,170,0.6));"></i>
<h3 style="color: var(--neon-pink); text-shadow: 0 0 15px rgba(255,0,170,0.5);">Gagal Memuat Foto</h3>
<p>Pastikan Google Sheets sudah dipublikasikan</p>
</div>
`;
}
document.getElementById('loading').classList.remove('active');
}

function renderGallery(photos) {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';
if (photos.length === 0) {
grid.innerHTML = `
<div class="no-results" style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary);">
<i class="fas fa-search" style="font-size: 42px; margin-bottom: 14px; opacity: 0.5;"></i>
<h3>Tidak Ada Foto</h3>
<p>Tidak ada foto yang sesuai dengan pencarian</p>
</div>
`;
return;
}
photos.forEach((photo, idx) => {
const card = createPhotoCard(photo.foto, photo.judul, idx);
grid.appendChild(card);
});
}

// ✨ UPDATED: Card design with Copy + Download buttons only (EDIT REMOVED)
function createPhotoCard(url, title, index) {
const card = document.createElement('div');
card.className = 'photo-card';
card.innerHTML = `
<div class="photo-wrapper">
<img src="${url}" alt="${title}" onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00d4ff?text=No+Image'" loading="lazy" onclick="viewFullImage('${url}', '${title.replace(/'/g, "\\'")}')" style="cursor: pointer;">
</div>
<div class="photo-info">
<div class="photo-title">${title}</div>
<div class="photo-meta">Foto #${index + 1}</div>
<div class="action-buttons-row">
<button class="action-btn-cool copy-btn" onclick="copyPhoto('${url}')" title="Copy Foto">
<i class="fas fa-copy"></i>
<span>Copy</span>
</button>
<button class="action-btn-cool download-btn" onclick="downloadPhoto('${url}', '${title.replace(/'/g, "\\'")}')" title="Download">
<i class="fas fa-download"></i>
<span>Download</span>
</button>
</div>
</div>
`;
return card;
}

function searchPhotos() {
const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
if (!searchTerm) {
renderGallery(allPhotos);
return;
}
const filtered = allPhotos.filter(photo =>
photo.judul.toLowerCase().includes(searchTerm)
);
renderGallery(filtered);
if (filtered.length > 0) {
showToast(`⚡ Ditemukan ${filtered.length} foto`);
}
}

function viewFullImage(url, title) {
currentImageUrl = url;
currentImageTitle = title;
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalImage').src = url;
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
}

function closeModal() {
document.getElementById('imageModal').classList.remove('active');
document.body.style.overflow = '';
currentImageUrl = '';
currentImageTitle = '';
}

async function copyPhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([
new ClipboardItem({
[blob.type]: blob
})
]);
showToast('✅ Foto berhasil disalin ke clipboard!');
} catch (error) {
console.error('Copy error:', error);
showToast('❗ Buka foto lalu klik kanan > Copy Image');
}
}

async function copyImage() {
if (currentImageUrl) {
await copyPhoto(currentImageUrl);
}
}

function downloadPhoto(url, filename) {
const link = document.createElement('a');
link.href = url;
link.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
link.target = '_blank';
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
showToast('⚡ Download dimulai...');
}

function downloadModalImage() {
if (currentImageUrl && currentImageTitle) {
downloadPhoto(currentImageUrl, currentImageTitle);
}
}

function initCanvas() {
if (!canvas || !ctx) return;
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.font = '22px Rajdhani';
ctx.fillStyle = '#8ab4f8';
ctx.textAlign = 'center';
ctx.fillText('Upload foto untuk mulai mengedit', canvas.width/2, canvas.height/2);
}

function handleFiles(event) {
const files = event.target.files;
if (files.length === 0) return;
loadImage(files[0]);
if (files.length > 1) {
setTimeout(() => {
if (confirm(`Load ${files.length} foto? Klik OK untuk combine, Cancel untuk load satu per satu.`)) {
combineMultipleFiles(files);
}
}, 500);
}
}

function loadImage(file) {
const reader = new FileReader();
reader.onload = (e) => {
const img = new Image();
img.onload = () => {
currentEditorImage = img;
saveHistory();
canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img, 0, 0);
showToast('✅ Foto berhasil dimuat');
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
}

function combineMultipleFiles(files) {
const images = [];
let loaded = 0;
Array.from(files).forEach(file => {
const reader = new FileReader();
reader.onload = (e) => {
const img = new Image();
img.onload = () => {
images.push(img);
loaded++;
if (loaded === files.length) {
combineImages(images);
}
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
});
}

function combineImages(images) {
const totalWidth = images.reduce((sum, img) => sum + img.width, 0);
const maxHeight = Math.max(...images.map(img => img.height));
canvas.width = totalWidth;
canvas.height = maxHeight;
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
let x = 0;
images.forEach(img => {
ctx.drawImage(img, x, 0);
x += img.width;
});
saveHistory();
showToast(`✅ ${images.length} foto digabungkan`);
}

function applyFilter(filterType) {
if (!currentEditorImage) {
showToast('⚠️ Upload foto terlebih dahulu');
return;
}
saveHistory();
const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
const data = imageData.data;
switch(filterType) {
case 'grayscale':
for (let i = 0; i < data.length; i += 4) {
const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
data[i] = data[i + 1] = data[i + 2] = avg;
}
break;
case 'sepia':
for (let i = 0; i < data.length; i += 4) {
const r = data[i], g = data[i + 1], b = data[i + 2];
data[i] = Math.min(255, (r * .393) + (g * .769) + (b * .189));
data[i + 1] = Math.min(255, (r * .349) + (g * .686) + (b * .168));
data[i + 2] = Math.min(255, (r * .272) + (g * .534) + (b * .131));
}
break;
case 'invert':
for (let i = 0; i < data.length; i += 4) {
data[i] = 255 - data[i];
data[i + 1] = 255 - data[i + 1];
data[i + 2] = 255 - data[i + 2];
}
break;
case 'blur':
ctx.filter = 'blur(5px)';
ctx.drawImage(canvas, 0, 0);
ctx.filter = 'none';
break;
}
if (filterType !== 'blur') {
ctx.putImageData(imageData, 0, 0);
}
showToast(`✅ Filter ${filterType} diterapkan`);
}

function adjustImage() {
if (!currentEditorImage) return;
const brightness = document.getElementById('brightness').value;
const contrast = document.getElementById('contrast').value;
const saturation = document.getElementById('saturation').value;
ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
ctx.drawImage(currentEditorImage, 0, 0, canvas.width, canvas.height);
ctx.filter = 'none';
}

function rotateImage(degrees) {
if (!currentEditorImage) return;
saveHistory();
const tempCanvas = document.createElement('canvas');
const tempCtx = tempCanvas.getContext('2d');
if (degrees === 90 || degrees === -90) {
tempCanvas.width = canvas.height;
tempCanvas.height = canvas.width;
} else {
tempCanvas.width = canvas.width;
tempCanvas.height = canvas.height;
}
tempCtx.translate(tempCanvas.width / 2, tempCanvas.height / 2);
tempCtx.rotate(degrees * Math.PI / 180);
tempCtx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);
canvas.width = tempCanvas.width;
canvas.height = tempCanvas.height;
ctx.drawImage(tempCanvas, 0, 0);
}

function flipImage(direction) {
if (!currentEditorImage) return;
saveHistory();
const tempCanvas = document.createElement('canvas');
const tempCtx = tempCanvas.getContext('2d');
tempCanvas.width = canvas.width;
tempCanvas.height = canvas.height;
if (direction === 'h') {
tempCtx.translate(canvas.width, 0);
tempCtx.scale(-1, 1);
} else {
tempCtx.translate(0, canvas.height);
tempCtx.scale(1, -1);
}
tempCtx.drawImage(canvas, 0, 0);
ctx.clearRect(0, 0, canvas.width, canvas.height);
ctx.drawImage(tempCanvas, 0, 0);
}

function resizeCanvas() {
const width = prompt('Lebar baru (px):', canvas.width);
const height = prompt('Tinggi baru (px):', canvas.height);
if (width && height) {
saveHistory();
const tempCanvas = document.createElement('canvas');
const tempCtx = tempCanvas.getContext('2d');
tempCanvas.width = canvas.width;
tempCanvas.height = canvas.height;
tempCtx.drawImage(canvas, 0, 0);
canvas.width = parseInt(width);
canvas.height = parseInt(height);
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.drawImage(tempCanvas, 0, 0);
}
}

function addText() {
const text = document.getElementById('textInput').value;
const color = document.getElementById('textColor').value;
const size = document.getElementById('textSize').value;
if (!text) {
showToast('⚠️ Masukkan teks terlebih dahulu');
return;
}
saveHistory();
ctx.font = `${size}px Orbitron`;
ctx.fillStyle = color;
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.shadowColor = 'rgba(0,0,0,0.5)';
ctx.shadowBlur = 12;
ctx.fillText(text, canvas.width / 2, canvas.height / 2);
ctx.shadowBlur = 0;
showToast('✅ Teks ditambahkan');
}

function startDrawing() {
isDrawing = !isDrawing;
if (isDrawing) {
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDraw);
showToast('✏️ Mode gambar aktif - Klik & drag untuk menggambar');
} else {
canvas.removeEventListener('mousedown', startDraw);
canvas.removeEventListener('mousemove', draw);
canvas.removeEventListener('mouseup', stopDraw);
showToast('Mode gambar nonaktif');
}
}

function startDraw(e) {
isDrawing = true;
const rect = canvas.getBoundingClientRect();
const x = (e.clientX - rect.left) * (canvas.width / rect.width);
const y = (e.clientY - rect.top) * (canvas.height / rect.height);
ctx.beginPath();
ctx.moveTo(x, y);
ctx.strokeStyle = document.getElementById('textColor').value;
ctx.lineWidth = 4;
ctx.lineCap = 'round';
}

function draw(e) {
if (!isDrawing) return;
const rect = canvas.getBoundingClientRect();
const x = (e.clientX - rect.left) * (canvas.width / rect.width);
const y = (e.clientY - rect.top) * (canvas.height / rect.height);
ctx.lineTo(x, y);
ctx.stroke();
}

function stopDraw() {
isDrawing = false;
saveHistory();
}

function combinePhotos(direction) {
const input = document.createElement('input');
input.type = 'file';
input.multiple = true;
input.accept = 'image/*';
input.onchange = (e) => {
const files = e.target.files;
if (files.length < 2) {
showToast('⚠️ Pilih minimal 2 foto');
return;
}
combineMultipleFiles(files);
};
input.click();
}

function addFrame() {
saveHistory();
const frameWidth = 25;
ctx.strokeStyle = '#00d4ff';
ctx.lineWidth = frameWidth;
ctx.shadowColor = 'rgba(0, 212, 255, 0.6)';
ctx.shadowBlur = 20;
ctx.strokeRect(0, 0, canvas.width, canvas.height);
ctx.shadowBlur = 0;
showToast('✅ Frame ditambahkan');
}

function addWatermark() {
saveHistory();
const text = 'LINE TOGEL';
ctx.font = 'bold 32px Orbitron';
ctx.fillStyle = 'rgba(0, 212, 255, 0.35)';
ctx.textAlign = 'right';
ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
ctx.shadowBlur = 8;
ctx.fillText(text, canvas.width - 25, canvas.height - 25);
ctx.shadowBlur = 0;
showToast('✅ Watermark ditambahkan');
}

function saveHistory() {
if (!canvas) return;
history.push(canvas.toDataURL());
if (history.length > 10) history.shift();
}

function undoAction() {
if (history.length > 1) {
history.pop();
const previous = history[history.length - 1];
const img = new Image();
img.onload = () => {
canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img, 0, 0);
};
img.src = previous;
showToast('↩️ Undo');
}
}

function clearCanvas() {
if (confirm('Hapus semua?')) {
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
currentEditorImage = null;
history = [];
showToast('🗑️ Canvas dibersihkan');
}
}

function downloadImage() {
const link = document.createElement('a');
link.download = `edited-photo-${Date.now()}.png`;
link.href = canvas.toDataURL();
link.click();
showToast('⚡ Foto didownload');
}

function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastText').textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3200);
}

document.getElementById('imageModal').addEventListener('click', (e) => {
if (e.target.id === 'imageModal') closeModal();
});

document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') closeModal();
if (e.ctrlKey && e.key === 'z') {
e.preventDefault();
undoAction();
}
});
</script>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>⚡ FOTO GALLERY - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════════════ */
/* ✨ BLUE COOL VARIABLES ✨ */
/* ═══════════════════════════════════════════════ */
:root{
--blue-100:#e6f9ff;
--blue-200:#99edff;
--blue-300:#00e5ff;
--blue-400:#00d4ff;
--blue-500:#00bcd4;
--blue-600:#00a8c3;
--blue-700:#008fa3;
--blue-800:#007083;
--blue-900:#004a57;
--cyan:#00ffff;
--ice:#e0f7ff;
--frost:#f0faff;
--dark-void:#00050a;
--dark-base:#000a14;
--dark-surface:#001020;
--dark-card:#001830;
--dark-glass:rgba(0,16,32,0.85);
--dark-glass-light:rgba(0,24,48,0.75);
--text-main:#e0f7ff;
--text-sub:#80c4e0;
--text-dim:#40708c;
--border-subtle:rgba(0,212,255,0.25);
--border-active:rgba(0,212,255,0.6);
--glow-soft:0 0 20px rgba(0,212,255,0.3);
--glow-mid:0 0 30px rgba(0,212,255,0.5),0 0 60px rgba(0,212,255,0.25);
--glow-hard:0 0 40px rgba(0,212,255,0.7),0 0 80px rgba(0,212,255,0.45),0 0 140px rgba(0,212,255,0.25);
--radius-sm:8px;
--radius-md:14px;
--radius-lg:20px;
--radius-xl:28px;
--ease:cubic-bezier(.16,1,.3,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
font-family:'Exo 2','Segoe UI',sans-serif;
background:var(--dark-void);
color:var(--text-main);
min-height:100vh;
overflow-x:hidden;
line-height:1.6;
}

/* ═══════════════════════════════════════════════ */
/* ✨ ANIMATED BACKGROUND ✨ */
/* ═══════════════════════════════════════════════ */
.bg-wrap{position:fixed;inset:0;z-index:-5;overflow:hidden}
.bg-gradient{
position:absolute;inset:-50%;
background:
radial-gradient(ellipse at 20% 20%,rgba(0,180,220,0.12) 0%,transparent 60%),
radial-gradient(ellipse at 80% 80%,rgba(0,212,255,0.10) 0%,transparent 60%),
radial-gradient(ellipse at 50% 50%,rgba(0,160,200,0.06) 0%,transparent 70%);
animation:drift 30s linear infinite alternate;
}
@keyframes drift{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(-5%,5%) rotate(15deg)}}

.hex-grid{
position:absolute;inset:0;
background-image:url("image/svg+xml,%3Csvg width='60' height='52' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 15v22L30 52 0 37V15z' fill='none' stroke='%2300bcd4' stroke-width='0.5' opacity='0.15'/%3E%3C/svg%3E");
background-size:60px 52px;
animation:hexShift 20s linear infinite;
opacity:0.6;
}
@keyframes hexShift{0%{background-position:0 0}100%{background-position:60px 52px}}

.dots{
position:absolute;inset:0;
background-image:radial-gradient(rgba(0,212,255,0.2) 1px,transparent 1px);
background-size:24px 24px;
mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,black 20%,transparent 70%);
animation:dotsFloat 25s linear infinite;
}
@keyframes dotsFloat{0%{transform:translate(0,0)}100%{transform:translate(-24px,-24px)}}

/* Floating orbs */
.orb{
position:absolute;
border-radius:50%;
filter:blur(60px);
opacity:0.4;
animation:orbFloat 20s ease-in-out infinite alternate;
}
.orb-1{width:300px;height:300px;top:10%;left:5%;background:rgba(0,180,220,0.3);animation-delay:0s}
.orb-2{width:250px;height:250px;top:60%;right:8%;background:rgba(0,212,255,0.25);animation-delay:-8s}
.orb-3{width:200px;height:200px;bottom:15%;left:40%;background:rgba(0,168,195,0.2);animation-delay:-16s}
@keyframes orbFloat{
0%{transform:translate(0,0) scale(1)}
33%{transform:translate(30px,-40px) scale(1.1)}
66%{transform:translate(-20px,30px) scale(0.95)}
100%{transform:translate(10px,-10px) scale(1.05)}
}

/* Sparkle particles */
.sparkles{position:absolute;inset:0;pointer-events:none}
.sparkle{
position:absolute;
width:2px;height:2px;
background:#00ffff;
border-radius:50%;
box-shadow:0 0 6px #00d4ff,0 0 12px rgba(0,212,255,0.5);
animation:sparkleLife 4s ease-in-out infinite;
}
@keyframes sparkleLife{
0%,100%{opacity:0;transform:scale(0)}
50%{opacity:1;transform:scale(1)}
}

/* ═══════════════════════════════════════════════ */
/* ✨ LAYOUT — SIDEBAR + MAIN ✨ */
/* ═══════════════════════════════════════════════ */
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
position:fixed;left:0;top:0;bottom:0;
width:72px;
background:var(--dark-glass);
backdrop-filter:blur(20px);
border-right:1px solid var(--border-subtle);
display:flex;flex-direction:column;
align-items:center;
padding:20px 0;
gap:16px;
z-index:100;
transition:width .3s var(--ease);
overflow:hidden;
}
.sidebar:hover{width:200px}
.sidebar:hover .nav-label{opacity:1;transform:translateX(0)}

.sidebar-logo{
width:44px;height:44px;
background:linear-gradient(135deg,#00d4ff,#00ffff);
border-radius:12px;
display:flex;align-items:center;justify-content:center;
font-size:20px;
font-family:'Orbitron',sans-serif;
font-weight:900;
color:var(--dark-void);
flex-shrink:0;
box-shadow:var(--glow-soft);
margin-bottom:10px;
}
.sidebar-logo:hover{animation:logoPulse .5s var(--ease)}
@keyframes logoPulse{0%{transform:scale(1)}50%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1)}}

.nav-item{
width:100%;
padding:12px 0;
display:flex;align-items:center;
justify-content:center;
gap:12px;
cursor:pointer;
transition:var(--ease);
position:relative;
text-decoration:none;
color:var(--text-dim);
}
.nav-item:hover,.nav-item.active{color:var(--cyan)}
.nav-item.active::before{
content:'';position:absolute;
left:0;top:50%;transform:translateY(-50%);
width:3px;height:60%;
background:var(--cyan);
border-radius:0 3px 3px 0;
box-shadow:0 0 10px var(--cyan);
}
.nav-item i{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.nav-label{
font-size:13px;font-weight:600;
white-space:nowrap;
opacity:0;transform:translateX(-10px);
transition:var(--ease);
}

.sidebar-footer{
margin-top:auto;
display:flex;flex-direction:column;
align-items:center;gap:14px;
padding-bottom:10px;
}
.sidebar-dot{
width:8px;height:8px;
background:var(--cyan);
border-radius:50%;
box-shadow:0 0 12px var(--cyan);
animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

/* MAIN CONTENT */
.main{
flex:1;
margin-left:72px;
padding:30px;
position:relative;
}

/* ═══════════════════════════════════════════════ */
/* ✨ TOP BAR ✨ */
/* ═══════════════════════════════════════════════ */
.topbar{
display:flex;align-items:center;justify-content:space-between;
gap:16px;
margin-bottom:36px;
flex-wrap:wrap;
}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-title{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;letter-spacing:3px}
.topbar-title span{color:var(--cyan);text-shadow:0 0 20px rgba(0,212,255,.6)}

.topbar-right{display:flex;align-items:center;gap:12px}

.search-wrap{
position:relative;
width:280px;
}
.search-input{
width:100%;
padding:10px 40px 10px 16px;
background:var(--dark-glass);
border:1px solid var(--border-subtle);
border-radius:var(--radius-md);
color:var(--text-main);
font-size:14px;
font-family:'Exo 2',sans-serif;
backdrop-filter:blur(10px);
transition:var(--ease);
}
.search-input:focus{outline:none;border-color:var(--cyan);box-shadow:var(--glow-mid)}
.search-input::placeholder{color:var(--text-dim)}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px;pointer-events:none}

.icon-btn{
width:38px;height:38px;
background:var(--dark-glass);
border:1px solid var(--border-subtle);
border-radius:10px;
color:var(--text-dim);
display:flex;align-items:center;justify-content:center;
cursor:pointer;
transition:var(--ease);
backdrop-filter:blur(10px);
}
.icon-btn:hover{color:var(--cyan);border-color:var(--cyan);box-shadow:var(--glow-soft);transform:translateY(-2px)}
.icon-btn.active{color:var(--cyan);border-color:var(--cyan)}

/* ═══════════════════════════════════════════════ */
/* ✨ HERO BANNER ✨ */
/* ═══════════════════════════════════════════════ */
.hero{
position:relative;
border-radius:var(--radius-xl);
overflow:hidden;
margin-bottom:36px;
height:280px;
background:linear-gradient(135deg,var(--dark-card),var(--dark-surface));
border:1px solid var(--border-subtle);
box-shadow:var(--glow-soft);
}
.hero-bg{
position:absolute;inset:0;
background:
linear-gradient(135deg,rgba(0,212,255,0.15),rgba(0,160,200,0.1),rgba(0,100,150,0.05)),
repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(0,212,255,0.03) 30px,rgba(0,212,255,0.03) 31px);
animation:heroShift 15s ease-in-out infinite alternate;
}
@keyframes heroShift{0%{transform:scale(1) rotate(0deg)}100%{transform:scale(1.05) rotate(2deg)}}

.hero-glow{
position:absolute;
width:400px;height:400px;
top:-100px;right:-100px;
background:radial-gradient(circle,rgba(0,212,255,0.2),transparent 70%);
filter:blur(40px);
animation:heroGlow 8s ease-in-out infinite alternate;
}
@keyframes heroGlow{0%{opacity:.5;transform:translate(0,0)}100%{opacity:.8;transform:translate(-30px,20px)}}

.hero-content{
position:relative;z-index:2;
padding:40px 44px;
display:flex;flex-direction:column;
justify-content:space-between;
height:100%;
}
.hero-top{}
.hero-label{
font-family:'Orbitron',sans-serif;
font-size:11px;
letter-spacing:4px;
color:var(--cyan);
text-transform:uppercase;
margin-bottom:8px;
}
.hero-heading{
font-family:'Orbitron',sans-serif;
font-size:clamp(24px,4vw,38px);
font-weight:900;
letter-spacing:2px;
line-height:1.2;
}
.hero-heading em{
font-style:normal;
color:var(--cyan);
text-shadow:0 0 25px rgba(0,212,255,.7);
}

.hero-bottom{
display:flex;align-items:center;gap:16px;
}
.hero-stat{
display:flex;align-items:center;gap:6px;
font-size:13px;
color:var(--text-sub);
}
.hero-stat i{color:var(--cyan);font-size:14px}
.hero-stat strong{color:var(--text-main)}

/* ═══════════════════════════════════════════════ */
/* ✨ SECTION HEADER ✨ */
/* ═══════════════════════════════════════════════ */
.section-header{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:22px;
flex-wrap:wrap;
gap:12px;
}
.section-title{
font-family:'Orbitron',sans-serif;
font-size:18px;font-weight:700;
letter-spacing:2px;
display:flex;align-items:center;gap:10px;
}
.section-title .dot{
width:10px;height:10px;
background:var(--cyan);
border-radius:3px;
box-shadow:0 0 12px var(--cyan);
animation:pulse 2s ease-in-out infinite;
}
.section-count{
font-size:12px;
color:var(--text-dim);
background:var(--dark-glass);
border:1px solid var(--border-subtle);
padding:4px 14px;
border-radius:var(--radius-sm);
font-weight:600;
}

/* ═══════════════════════════════════════════════ */
/* ✨ MASONRY GALLERY ✨ */
/* ═══════════════════════════════════════════════ */
.gallery{
columns:4;
column-gap:18px;
margin-bottom:50px;
}
@media(max-width:1200px){.gallery{columns:3}}
@media(max-width:800px){.gallery{columns:2}}
@media(max-width:500px){.gallery{columns:1}}

.gallery-item{
break-inside:avoid;
margin-bottom:18px;
background:var(--dark-card);
border:1px solid var(--border-subtle);
border-radius:var(--radius-md);
overflow:hidden;
transition:all .4s var(--ease);
animation:itemEnter .6s var(--ease) forwards;
opacity:0;
transform:translateY(30px);
}
@keyframes itemEnter{to{opacity:1;transform:translateY(0)}}

.gallery-item:hover{
transform:translateY(-6px) scale(1.015);
border-color:var(--cyan);
box-shadow:var(--glow-mid);
}

.gallery-item img{
width:100%;
display:block;
transition:transform .5s var(--ease),filter .5s var(--ease);
cursor:pointer;
}
.gallery-item:hover img{transform:scale(1.05);filter:brightness(1.1)}

.item-overlay{
position:absolute;inset:0;
background:linear-gradient(180deg,transparent 40%,rgba(0,5,15,0.85) 100%);
pointer-events:none;
}

.item-actions{
position:absolute;bottom:0;left:0;right:0;
padding:16px;
display:flex;justify-content:space-between;
align-items:flex-end;
pointer-events:auto;
}
.item-title{
font-family:'Orbitron',sans-serif;
font-size:13px;
font-weight:700;
color:var(--cyan);
text-shadow:0 0 10px rgba(0,212,255,.5);
line-height:1.3;
}
.item-buttons{
display:flex;gap:6px;
}
.item-btn{
width:34px;height:34px;
background:rgba(0,16,32,0.8);
border:1px solid var(--border-subtle);
border-radius:8px;
color:var(--text-dim);
display:flex;align-items:center;justify-content:center;
cursor:pointer;
transition:var(--ease);
font-size:13px;
backdrop-filter:blur(8px);
}
.item-btn:hover{color:var(--cyan);border-color:var(--cyan);box-shadow:var(--glow-soft);transform:translateY(-2px)}
.item-btn.heart:hover{color:var(--cyan);border-color:var(--cyan)}
.item-btn.download:hover{color:var(--cyan);border-color:var(--cyan)}
.item-btn.share:hover{color:var(--cyan);border-color:var(--cyan)}

.gallery-item{position:relative}

/* ═══════════════════════════════════════════════ */
/* ✨ LOADING ✨ */
/* ═══════════════════════════════════════════════ */
.loading{
text-align:center;
padding:60px 20px;
}
.spinner{
width:50px;height:50px;
border:3px solid var(--border-subtle);
border-top-color:var(--cyan);
border-radius:50%;
animation:spin .8s linear infinite;
margin:0 auto 16px;
box-shadow:0 0 20px rgba(0,212,255,.4);
position:relative;
}
.spinner::after{
content:'';position:absolute;inset:-5px;
border:3px solid transparent;border-top-color:var(--blue-300);
border-radius:50%;animation:spin 1.2s linear infinite reverse;
}
@keyframes spin{to{transform:rotate(360deg)}}

.loading-text{
font-family:'Orbitron',sans-serif;
font-size:12px;
letter-spacing:3px;
color:var(--cyan);
animation:textPulse 2s ease-in-out infinite;
}
@keyframes textPulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ═══════════════════════════════════════════════ */
/* ✨ MODAL ✨ */
/* ═══════════════════════════════════════════════ */
.modal-overlay{
position:fixed;inset:0;
background:rgba(0,5,15,0.95);
backdrop-filter:blur(30px);
z-index:1000;
display:none;
align-items:center;justify-content:center;
padding:30px;
animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-overlay.active{display:flex}

.modal-box{
max-width:900px;
width:100%;
background:var(--dark-surface);
border:1px solid var(--border-active);
border-radius:var(--radius-xl);
overflow:hidden;
box-shadow:var(--glow-hard);
animation:modalIn .4s var(--ease);
}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

.modal-top{
display:flex;align-items:center;justify-content:space-between;
padding:18px 24px;
border-bottom:1px solid var(--border-subtle);
background:linear-gradient(90deg,rgba(0,212,255,.08),transparent);
}
.modal-title{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:var(--cyan)}
.modal-x{
width:36px;height:36px;
background:transparent;
border:1px solid var(--border-subtle);
border-radius:50%;
color:var(--text-dim);
cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:var(--ease);
}
.modal-x:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-soft);transform:rotate(90deg)}

.modal-body{
display:flex;flex-direction:column;
align-items:center;
padding:24px;
background:radial-gradient(circle at center,#001525,#000a14);
}
.modal-img{
max-width:100%;
max-height:60vh;
border-radius:var(--radius-md);
box-shadow:0 0 30px rgba(0,212,255,.3);
cursor:zoom-in;
transition:transform .3s var(--ease);
}
.modal-img.zoomed{transform:scale(1.6);cursor:zoom-out}

.modal-meta{
margin-top:18px;
width:100%;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}
.meta-card{
background:var(--dark-glass);
border:1px solid var(--border-subtle);
border-radius:var(--radius-sm);
padding:12px;
text-align:center;
}
.meta-card label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.meta-card span{font-size:14px;color:var(--text-main);font-weight:600}

.modal-btns{
display:flex;gap:10px;
margin-top:20px;
justify-content:center;
flex-wrap:wrap;
}
.m-btn{
padding:10px 24px;
background:var(--dark-glass);
border:1px solid var(--border-subtle);
border-radius:var(--radius-sm);
color:var(--text-main);
font-family:'Orbitron',sans-serif;
font-size:11px;
font-weight:700;
cursor:pointer;
transition:var(--ease);
display:flex;align-items:center;gap:8px;
text-transform:uppercase;
letter-spacing:1px;
}
.m-btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-mid);transform:translateY(-2px)}
.m-btn.primary{background:linear-gradient(135deg,var(--blue-700),var(--blue-800));border-color:var(--cyan);color:var(--cyan)}
.m-btn.primary:hover{background:linear-gradient(135deg,var(--blue-600),var(--blue-700))}

/* ═══════════════════════════════════════════════ */
/* ✨ TOAST ✨ */
/* ═══════════════════════════════════════════════ */
.toast{
position:fixed;bottom:24px;right:24px;
background:var(--dark-glass);
border:1px solid var(--cyan);
color:var(--cyan);
padding:14px 24px;
border-radius:var(--radius-md);
font-size:13px;font-weight:600;
z-index:9999;
display:flex;align-items:center;gap:10px;
box-shadow:var(--glow-mid);
transform:translateX(150%);
transition:transform .5s var(--ease);
backdrop-filter:blur(16px);
font-family:'Exo 2',sans-serif;
}
.toast.show{transform:translateX(0)}
.toast i{font-size:16px}

/* ═══════════════════════════════════════════════ */
/* ✨ EMPTY STATE ✨ */
/* ═══════════════════════════════════════════════ */
.empty{
text-align:center;
padding:80px 20px;
}
.empty i{font-size:60px;color:var(--text-dim);opacity:.4;margin-bottom:18px;display:block}
.empty h3{font-family:'Orbitron',sans-serif;font-size:18px;color:var(--text-dim);margin-bottom:8px}
.empty p{color:var(--text-dim);font-size:14px;opacity:.7}

/* ═══════════════════════════════════════════════ */
/* ✨ SCROLLBAR ✨ */
/* ═══════════════════════════════════════════════ */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--dark-void)}
::-webkit-scrollbar-thumb{
background:linear-gradient(180deg,var(--cyan),var(--blue-700));
border-radius:6px;border:2px solid var(--dark-void);
box-shadow:0 0 12px rgba(0,212,255,.4);
}
::-webkit-scrollbar-thumb:hover{box-shadow:0 0 20px rgba(0,212,255,.7)}

/* ═══════════════════════════════════════════════ */
/* ✨ RESPONSIVE ✨ */
/* ═══════════════════════════════════════════════ */
@media(max-width:768px){
.sidebar{width:0;border:none;opacity:0;pointer-events:none}
.main{margin-left:0;padding:20px 16px}
.topbar{margin-bottom:24px}
.topbar-title{font-size:22px}
.search-wrap{width:100%;order:3}
.hero{height:220px;margin-bottom:24px}
.hero-content{padding:28px 24px}
.hero-heading{font-size:22px}
.modal-meta{grid-template-columns:1fr}
}
@media(max-width:480px){
.hero{height:190px;border-radius:var(--radius-md)}
.hero-content{padding:22px 18px}
.hero-label{font-size:9px;letter-spacing:2px}
.hero-heading{font-size:18px;letter-spacing:1px}
.gallery{column-gap:12px}
.gallery-item{margin-bottom:12px}
}
</style>
</head>
<body>
<!-- ✨ BACKGROUND ✨ -->
<div class="bg-wrap">
<div class="bg-gradient"></div>
<div class="hex-grid"></div>
<div class="dots"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="sparkles" id="sparkles"></div>
</div>

<div class="app">
<!-- ✨ SIDEBAR ✨ -->
<aside class="sidebar">
<div class="sidebar-logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">⚡</div>

<a class="nav-item active" href="javascript:void(0)" onclick="setFilter('all')">
<i class="fas fa-images"></i><span class="nav-label">Galeri</span>
</a>
<a class="nav-item" href="javascript:void(0)" onclick="setFilter('favorites')">
<i class="fas fa-star"></i><span class="nav-label">Favorit</span>
</a>
<a class="nav-item" href="javascript:void(0)" onclick="setFilter('recent')">
<i class="fas fa-clock"></i><span class="nav-label">Terbaru</span>
</a>

<div class="sidebar-footer">
<div class="sidebar-dot" title="Online"></div>
</div>
</aside>

<!-- ✨ MAIN ✨ -->
<main class="main">
<!-- TOP BAR -->
<div class="topbar">
<div class="topbar-left">
<h1 class="topbar-title">FOTO <span>GALLERY</span></h1>
</div>
<div class="topbar-right">
<div class="search-wrap">
<input type="search" class="search-input" id="searchInput" placeholder="Cari foto..." oninput="applyFilters()">
<i class="fas fa-search search-icon"></i>
</div>
<button class="icon-btn" id="viewToggle" onclick="toggleView()" title="Toggle view">
<i class="fas fa-th-large"></i>
</button>
</div>
</div>

<!-- HERO -->
<div class="hero">
<div class="hero-bg"></div>
<div class="hero-glow"></div>
<div class="hero-content">
<div class="hero-top">
<div class="hero-label">LINE TOGEL — CYBER PORTAL 2026</div>
<h2 class="hero-heading">Selamat Datang di <em>Foto Gallery</em></h2>
</div>
<div class="hero-bottom">
<div class="hero-stat"><i class="fas fa-images"></i> <strong id="totalCount">0</strong> Foto</div>
<div class="hero-stat"><i class="fas fa-star"></i> <strong id="favCount">0</strong> Favorit</div>
<div class="hero-stat"><i class="fas fa-circle" style="color:#00ff9d;font-size:10px"></i> Online</div>
</div>
</div>
</div>

<!-- SECTION HEADER -->
<div class="section-header">
<div class="section-title">
<span class="dot"></span>
KOLEKSI FOTO
</div>
<div class="section-count" id="sectionCount">Memuat...</div>
</div>

<!-- GALLERY -->
<div class="loading" id="loading">
<div class="spinner"></div>
<div class="loading-text">MEMUAT GAMBAR...</div>
</div>

<div class="gallery" id="galleryGrid"></div>
</main>
</div>

<!-- ✨ MODAL ✨ -->
<div class="modal-overlay" id="modal">
<div class="modal-box">
<div class="modal-top">
<div class="modal-title" id="modalTitle">Detail Foto</div>
<button class="modal-x" onclick="closeModal()"><i class="fas fa-times"></i></button>
</div>
<div class="modal-body">
<img class="modal-img" id="modalImg" src="" alt="">
<div class="modal-meta">
<div class="meta-card"><label>Judul</label><span id="mTitle">-</span></div>
<div class="meta-card"><label>Ukuran</label><span id="mSize">-</span></div>
<div class="meta-card"><label>Format</label><span id="mFormat">-</span></div>
</div>
<div class="modal-btns">
<button class="m-btn" onclick="copyPhoto()"><i class="fas fa-copy"></i> Copy</button>
<button class="m-btn primary" onclick="downloadPhoto()"><i class="fas fa-download"></i> Download</button>
<button class="m-btn" onclick="sharePhoto()"><i class="fas fa-share-alt"></i> Share</button>
</div>
</div>
</div>
</div>

<!-- ✨ TOAST ✨ -->
<div class="toast" id="toast"><i class="fas fa-bolt"></i><span id="toastText">Berhasil!</span></div>

<script>
// ═══════════════════════════════════════════════
// ✨ STATE
// ═══════════════════════════════════════════════
let photos=[];
let favs=JSON.parse(localStorage.getItem('ltg_fav')||'[]');
let currentFilter='all';
let searchQuery='';
let isGridView=true;
let modalData={url:'',title:''};

// ═══════════════════════════════════════════════
// ✨ INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
initSparkles();
fetchPhotos();
});

// ═══════════════════════════════════════════════
// ✨ SPARKLES
// ═══════════════════════════════════════════════
function initSparkles(){
const c=document.getElementById('sparkles');
if(!c)return;
for(let i=0;i<40;i++){
const s=document.createElement('div');
s.className='sparkle';
s.style.left=Math.random()*100+'%';
s.style.top=Math.random()*100+'%';
s.style.animationDelay=Math.random()*4+'s';
s.style.animationDuration=(3+Math.random()*4)+'s';
c.appendChild(s);
}
}

// ═══════════════════════════════════════════════
// ✨ FETCH
// ═══════════════════════════════════════════════
async function fetchPhotos(){
const ld=document.getElementById('loading');
const gr=document.getElementById('galleryGrid');
ld.style.display='block';
gr.innerHTML='';
try{
const sid='1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid='1246502038';
let data=[];
try{
const r=await fetch(`https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
const t=await r.text();
const j=JSON.parse(t.substring(47).slice(0,-2));
data=j.table.rows.filter(r=>r.c?.[0]?.v&&r.c?.[1]?.v).map((r,i)=>({
title:r.c[0].v,
url:r.c[1].v,
index:i+2,
ts:Date.now()-i*3600000
}));
}catch{
const r=await fetch(`https://docs.google.com/spreadsheets/d/${sid}/export?format=csv&gid=${gid}&range=C2:D150`);
const t=await r.text();
data=t.split('\n').filter(r=>r.trim()).map((r,i)=>{
const parts=r.split(',');
return{title:parts[0]?.replace(/"/g,'').trim()||'',url:parts[1]?.replace(/"/g,'').trim()||'',index:i+2,ts:Date.now()-i*3600000};
}).filter(r=>r.title&&r.url);
}
photos=data;
document.getElementById('totalCount').textContent=data.length;
applyFilters();
toast('✅ '+data.length+' foto dimuat');
}catch(e){
console.error(e);
toast('❌ Gagal memuat data');
gr.innerHTML='<div class="empty"><i class="fas fa-exclamation-circle"></i><h3>Gagal Memuat</h3><p>Periksa koneksi atau publikasi spreadsheet</p></div>';
}
ld.style.display='none';
}

// ═══════════════════════════════════════════════
// ✨ FILTER & RENDER
// ═══════════════════════════════════════════════
function setFilter(f){
currentFilter=f;
document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
event.target.closest('.nav-item')?.classList.add('active');
applyFilters();
}

function applyFilters(){
searchQuery=document.getElementById('searchInput').value.toLowerCase().trim();
let result=[...photos];
if(currentFilter==='favorites') result=result.filter(p=>favs.includes(p.url));
else if(currentFilter==='recent') result=result.sort((a,b)=>b.ts-a.ts).slice(0,20);
if(searchQuery) result=result.filter(p=>p.title.toLowerCase().includes(searchQuery));
render(result);
document.getElementById('sectionCount').textContent=result.length+' foto';
document.getElementById('favCount').textContent=favs.length;
}

function render(list){
const gr=document.getElementById('galleryGrid');
gr.innerHTML='';
if(!list.length){
gr.innerHTML='<div class="empty"><i class="fas fa-search"></i><h3>Tidak Ada Foto</h3><p>Coba kata kunci lain atau ubah filter</p></div>';
return;
}
list.forEach((p,i)=>{
const isFav=favs.includes(p.url);
const el=document.createElement('div');
el.className='gallery-item';
el.style.animationDelay=(i*0.05)+'s';
el.innerHTML=`
<img src="${p.url}" alt="${p.title}" loading="lazy" onclick="openModal('${p.url}','${p.title.replace(/'/g,"\\'")}')" onerror="this.src='https://via.placeholder.com/400x300/001830/00d4ff?text=No+Image'">
<div class="item-overlay"></div>
<div class="item-actions">
<div class="item-title">${p.title}</div>
<div class="item-buttons">
<button class="item-btn heart ${isFav?'active':''}" onclick="toggleFav('${p.url}',this)" title="Favorit"><i class="fas fa-heart"></i></button>
<button class="item-btn download" onclick="dl('${p.url}','${p.title.replace(/'/g,"\\'")}')" title="Download"><i class="fas fa-download"></i></button>
<button class="item-btn share" onclick="share('${p.url}','${p.title.replace(/'/g,"\\'")}')" title="Share"><i class="fas fa-share-alt"></i></button>
</div>
</div>`;
gr.appendChild(el);
});
}

// ═══════════════════════════════════════════════
// ✨ ACTIONS
// ═══════════════════════════════════════════════
function toggleFav(url,btn){
const i=favs.indexOf(url);
if(i>-1){favs.splice(i,1);btn.classList.remove('active');toast('⭐ Dihapus dari favorit');}
else{favs.push(url);btn.classList.add('active');toast('⭐ Ditambahkan ke favorit');}
localStorage.setItem('ltg_fav',JSON.stringify(favs));
document.getElementById('favCount').textContent=favs.length;
if(currentFilter==='favorites')applyFilters();
}

function dl(url,title){
const a=document.createElement('a');a.href=url;
a.download=`${title.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`;
a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);
toast('⬇️ Download dimulai...');
}

function copyPhoto(){
const url=modalData.url;
if(!url)return;
const blob=fetch(url).then(r=>r.blob()).then(b=>navigator.clipboard.write([new ClipboardItem({[b.type]:b})]));
blob.then(()=>toast('✅ Disalin ke clipboard!')).catch(()=>toast('❗ Klik kanan gambar > Copy'));
}

async function share(url,title){
if(navigator.share){
try{
const b=await(await fetch(url)).blob();
await navigator.share({title,text:'Lihat foto ini:',files:[new File([b],`${title}.jpg`,{type:b.type})]});
toast('🔗 Dibagikan!');
}catch(e){if(e.name!=='AbortError')toast('❌ Gagal share');}
}else{copyPhoto();toast('✅ Link disalin!');}
}

function toggleView(){
isGridView=!isGridView;
const gr=document.getElementById('galleryGrid');
const btn=document.getElementById('viewToggle');
if(isGridView){
gr.style.columns='';
gr.style.display='';
gr.className='gallery';
btn.innerHTML='<i class="fas fa-th-large"></i>';
btn.classList.remove('active');
}else{
gr.style.columns='';
gr.style.display='flex';
gr.style.flexWrap='wrap';
gr.style.gap='18px';
btn.innerHTML='<i class="fas fa-list"></i>';
btn.classList.add('active');
document.querySelectorAll('.gallery-item').forEach(el=>{el.style.width='calc(50% - 9px)';});
}
}

// ═══════════════════════════════════════════════
// ✨ MODAL
// ═══════════════════════════════════════════════
function openModal(url,title){
modalData={url,title};
document.getElementById('modalTitle').textContent=title;
document.getElementById('modalImg').src=url;
document.getElementById('modalImg').alt=title;
document.getElementById('mTitle').textContent=title;
document.getElementById('mFormat').textContent=url.split('.').pop().toUpperCase();
document.getElementById('mSize').textContent='Memuat...';
fetch(url).then(r=>r.blob()).then(b=>{document.getElementById('mSize').textContent=(b.size/1024).toFixed(1)+' KB';});
document.getElementById('modal').classList.add('active');
document.body.style.overflow='hidden';
}
function closeModal(){
document.getElementById('modal').classList.remove('active');
document.getElementById('modalImg').classList.remove('zoomed');
document.body.style.overflow='';
modalData={url:'',title:''};
}
document.getElementById('modalImg').addEventListener('click',e=>e.target.classList.toggle('zoomed'));
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});

// ═══════════════════════════════════════════════
// ✨ TOAST
// ═══════════════════════════════════════════════
function toast(msg){
const t=document.getElementById('toast');
document.getElementById('toastText').textContent=msg;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),3800);
}

// ═══════════════════════════════════════════════
// ✨ KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
if(e.key==='Escape')closeModal();
if(e.ctrlKey&&e.key==='k'){e.preventDefault();document.getElementById('searchInput')?.focus();}
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00f5ff">
<meta name="description" content="LINE TOGEL Blue Neon Gallery - Cyber Portal 2026">
<title>⚡ BLUE NEON - GALERI TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== BLUE NEON CYBER VARIABLES ===== */
:root {
  /* Core Neon Colors */
  --neon-cyan: #00ffff;
  --neon-electric: #00f5ff;
  --neon-blue: #00d4ff;
  --neon-sky: #00bfff;
  --neon-ice: #7df9ff;
  --neon-purple: #7b2fff;
  --neon-violet: #9d4edd;
  
  /* Background Layers */
  --bg-deep: #000208;
  --bg-surface: rgba(2, 8, 24, 0.88);
  --bg-card: rgba(4, 14, 38, 0.82);
  --bg-glass: rgba(6, 22, 52, 0.72);
  --bg-glass-strong: rgba(10, 32, 72, 0.85);
  --bg-overlay: rgba(0, 4, 12, 0.94);
  
  /* Text Colors */
  --text-primary: #ffffff;
  --text-secondary: #a8d8ff;
  --text-muted: #6b8fbf;
  --text-dim: #3a5a8a;
  --text-glow: rgba(0, 245, 255, 0.9);
  
  /* Borders & Glows */
  --border-neon: rgba(0, 212, 255, 0.55);
  --border-glow: rgba(0, 245, 255, 0.65);
  --glow-soft: 0 0 15px rgba(0, 212, 255, 0.45), 0 0 35px rgba(0, 212, 255, 0.25);
  --glow-medium: 0 0 25px rgba(0, 245, 255, 0.65), 0 0 60px rgba(0, 245, 255, 0.35);
  --glow-intense: 0 0 35px rgba(0, 245, 255, 0.85), 0 0 80px rgba(0, 245, 255, 0.5), inset 0 0 25px rgba(0, 245, 255, 0.12);
  --glow-pulse: 0 0 20px rgba(0, 245, 255, 0.6), 0 0 50px rgba(0, 245, 255, 0.35), 0 0 90px rgba(0, 212, 255, 0.2);
  
  /* Animations */
  --ease-bloom: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --ease-bounce: cubic-bezier(0.68, -0.6, 0.32, 1.6);
  
  /* UI Dimensions */
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --spacing-xs: 6px;
  --spacing-sm: 12px;
  --spacing-md: 18px;
  --spacing-lg: 26px;
  --spacing-xl: 36px;
  
  /* Z-Index Layers */
  --z-bg: -3;
  --z-particles: -2;
  --z-content: 1;
  --z-modal: 2000;
  --z-toast: 3000;
  --z-loader: 4000;
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 30px; }
body {
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== CYBER BACKGROUND SYSTEM ===== */
.bg-cyber {
  position: fixed; inset: 0; z-index: var(--z-bg);
  background: 
    radial-gradient(ellipse at 15% 20%, rgba(0, 245, 255, 0.14) 0%, transparent 58%),
    radial-gradient(ellipse at 85% 15%, rgba(0, 212, 255, 0.11) 0%, transparent 58%),
    radial-gradient(ellipse at 50% 92%, rgba(123, 47, 255, 0.09) 0%, transparent 65%),
    radial-gradient(ellipse at 25% 75%, rgba(0, 255, 255, 0.07) 0%, transparent 70%);
  animation: cyberPulse 28s ease-in-out infinite alternate;
  will-change: filter, opacity;
}
@keyframes cyberPulse {
  0%, 100% { filter: hue-rotate(0deg) brightness(1) saturate(1); }
  33% { filter: hue-rotate(12deg) brightness(1.06) saturate(1.08); }
  66% { filter: hue-rotate(-8deg) brightness(1.04) saturate(1.05); }
}

.grid-cyber {
  position: fixed; inset: 0; z-index: calc(var(--z-bg) + 1);
  background-image:
    linear-gradient(rgba(0, 245, 255, 0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 245, 255, 0.045) 1px, transparent 1px),
    linear-gradient(45deg, rgba(0, 212, 255, 0.025) 1px, transparent 1px);
  background-size: 42px 42px, 42px 42px, 84px 84px;
  mask-image: radial-gradient(ellipse 72% 62% at 50% 48%, black 30%, transparent 82%);
  animation: gridCyber 45s linear infinite;
  pointer-events: none;
}
@keyframes gridCyber {
  0% { background-position: 0 0, 0 0, 0 0; }
  100% { background-position: 42px 42px, 42px 42px, 84px 84px; }
}

/* Advanced Particle System */
.particles {
  position: fixed; inset: 0; z-index: calc(var(--z-bg) + 2);
  pointer-events: none; overflow: hidden;
}
.particle {
  position: absolute;
  width: 2px; height: 2px;
  border-radius: 50%;
  opacity: 0;
  animation: particleCyber linear infinite;
  will-change: transform, opacity, filter;
}
.particle::after {
  content: ''; position: absolute; inset: -5px;
  border-radius: 50%;
  background: inherit;
  filter: blur(2.5px);
  opacity: 0.7;
}
.particle.electric {
  background: var(--neon-electric);
  box-shadow: 0 0 10px var(--neon-electric), 0 0 28px var(--neon-electric);
  animation-duration: 32s;
}
.particle.cyan {
  background: var(--neon-cyan);
  box-shadow: 0 0 12px var(--neon-cyan), 0 0 32px var(--neon-cyan);
  animation-duration: 38s;
}
.particle.blue {
  background: var(--neon-blue);
  box-shadow: 0 0 10px var(--neon-blue), 0 0 28px var(--neon-blue);
  animation-duration: 42s;
}
.particle.purple {
  background: var(--neon-purple);
  box-shadow: 0 0 10px var(--neon-purple), 0 0 28px var(--neon-purple);
  animation-duration: 46s;
}
@keyframes particleCyber {
  0% { transform: translateY(100vh) translateX(0) rotate(0deg) scale(0.7); opacity: 0; }
  12% { opacity: 0.85; }
  50% { opacity: 1; transform: translateY(50vh) translateX(var(--drift, 0px)) rotate(180deg) scale(1); }
  88% { opacity: 0.85; }
  100% { transform: translateY(-100vh) translateX(var(--drift, 0px)) rotate(720deg) scale(1.3); opacity: 0; }
}

/* Lightning Storm Effect */
.lightning {
  position: fixed; inset: 0; z-index: calc(var(--z-bg) + 3);
  pointer-events: none; opacity: 0;
  animation: lightningStorm 18s infinite;
}
@keyframes lightningStorm {
  0%, 85%, 92%, 100% { opacity: 0; }
  86%, 91% { opacity: 0.12; }
  87%, 90% { opacity: 0.22; }
  88% { opacity: 0.15; }
}
.bolt {
  position: absolute;
  width: 1.5px; height: 100vh;
  background: linear-gradient(180deg,
    transparent 0%,
    var(--neon-electric) 18%,
    var(--neon-cyan) 45%,
    var(--neon-blue) 72%,
    transparent 100%);
  filter: blur(0.8px) drop-shadow(0 0 10px var(--neon-electric));
  animation: boltStrike 18s infinite;
  opacity: 0;
}
.bolt::before {
  content: ''; position: absolute; inset: -3px;
  background: inherit; filter: blur(4px); opacity: 0.45;
}
.bolt:nth-child(1) { left: 22%; animation-delay: 0s; }
.bolt:nth-child(2) { left: 48%; animation-delay: 5s; }
.bolt:nth-child(3) { left: 76%; animation-delay: 11s; }
@keyframes boltStrike {
  0%, 85%, 92%, 100% { transform: scaleY(0); opacity: 0; }
  86% { transform: scaleY(0.25); opacity: 0.45; }
  87%, 91% { transform: scaleY(1); opacity: 1; }
  88%, 90% { transform: scaleY(0.65); opacity: 0.55; }
}

/* CRT Scanline + Vignette */
.scanline {
  position: fixed; left: 0; right: 0; height: 2.5px;
  background: linear-gradient(90deg,
    transparent,
    rgba(0, 245, 255, 0.35),
    rgba(0, 212, 255, 0.55),
    rgba(0, 245, 255, 0.35),
    transparent);
  opacity: 0.35;
  animation: scanCyber 8s linear infinite;
  z-index: 100; pointer-events: none;
  filter: blur(0.4px);
}
@keyframes scanCyber {
  0% { top: -4px; opacity: 0; }
  6%, 94% { opacity: 0.35; }
  100% { top: 100%; opacity: 0; }
}

.vignette {
  position: fixed; inset: 0; z-index: calc(var(--z-bg) + 4);
  background: radial-gradient(ellipse at center,
    transparent 42%,
    rgba(0, 2, 8, 0.55) 78%,
    rgba(0, 1, 4, 0.82) 100%);
  pointer-events: none;
}

/* Noise Texture */
.noise {
  position: fixed; inset: 0; z-index: calc(var(--z-bg) + 5);
  opacity: 0.028; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='cyberNoise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23cyberNoise)'/%3E%3C/svg%3E");
  animation: noiseCyber 0.6s steps(2) infinite;
}
@keyframes noiseCyber {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(-1px, 1px); }
  50% { transform: translate(1px, -1px); }
  75% { transform: translate(-1px, -1px); }
}

/* ===== LAYOUT ===== */
.container {
  max-width: 1520px;
  margin: 0 auto;
  padding: var(--spacing-lg) var(--spacing-md);
  min-height: 100vh;
  position: relative;
  z-index: var(--z-content);
}

/* ===== HEADER CYBER ===== */
.header {
  text-align: center;
  margin-bottom: var(--spacing-xl);
  padding-top: var(--spacing-sm);
  animation: headerCyber 900ms var(--ease-bloom) backwards;
}
@keyframes headerCyber {
  from { opacity: 0; transform: translateY(-45px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.back-cyber {
  position: fixed;
  left: var(--spacing-md); top: var(--spacing-md);
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  background: var(--bg-glass);
  border: 1px solid var(--border-neon);
  border-radius: 50px;
  color: var(--neon-electric);
  text-decoration: none;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  transition: all 350ms var(--ease-smooth);
  backdrop-filter: blur(14px);
  z-index: 150;
  box-shadow: var(--glow-soft);
}
.back-cyber:hover {
  background: var(--bg-glass-strong);
  border-color: var(--neon-electric);
  transform: translateX(-6px);
  box-shadow: var(--glow-medium);
  color: var(--text-primary);
}
.back-cyber:active { transform: translateX(-3px) scale(0.98); }

.title-cyber {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(38px, 8.5vw, 62px);
  font-weight: 900;
  letter-spacing: 7px;
  margin-bottom: 10px;
  position: relative;
  background: linear-gradient(135deg,
    var(--neon-electric) 0%,
    var(--neon-cyan) 28%,
    #ffffff 50%,
    var(--neon-cyan) 72%,
    var(--neon-blue) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 50px rgba(0, 245, 255, 0.65);
  animation: titleCyber 4.5s ease-in-out infinite;
}
@keyframes titleCyber {
  0%, 100% { filter: brightness(1) saturate(1); }
  50% { filter: brightness(1.45) saturate(1.15); }
}
.title-cyber::after {
  content: ''; position: absolute; bottom: -10px; left: 50%;
  transform: translateX(-50%);
  width: 140px; height: 3.5px;
  background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-cyan), var(--neon-electric), transparent);
  border-radius: 3px;
  animation: titleBarCyber 3.5s ease-in-out infinite;
  box-shadow: 0 0 18px rgba(0, 245, 255, 0.8);
}
@keyframes titleBarCyber {
  0%, 100% { opacity: 0.7; width: 120px; }
  50% { opacity: 1; width: 160px; }
}

.subtitle-cyber {
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 18px;
  font-weight: 500;
  opacity: 0.92;
  text-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
}

.status-cyber {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 22px;
  background: rgba(0, 245, 255, 0.12);
  border: 1px solid rgba(0, 245, 255, 0.42);
  border-radius: 50px;
  font-size: 10px; font-weight: 700;
  color: var(--neon-electric);
  text-transform: uppercase; letter-spacing: 2.5px;
  animation: statusCyber 3.2s ease-in-out infinite;
  box-shadow: var(--glow-medium);
  backdrop-filter: blur(10px);
}
@keyframes statusCyber {
  0%, 100% { 
    box-shadow: 0 0 18px rgba(0, 245, 255, 0.32), inset 0 0 12px rgba(0, 245, 255, 0.12);
  }
  50% { 
    box-shadow: 0 0 38px rgba(0, 245, 255, 0.62), inset 0 0 18px rgba(0, 245, 255, 0.22);
  }
}
.status-dot {
  width: 8px; height: 8px;
  background: var(--neon-electric);
  border-radius: 50%;
  animation: dotCyber 2s ease-in-out infinite;
  box-shadow: 0 0 14px var(--neon-electric);
}
@keyframes dotCyber {
  0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 14px var(--neon-electric); }
  50% { transform: scale(1.7); opacity: 0.85; box-shadow: 0 0 32px var(--neon-electric); }
}

/* ===== SEARCH CYBER ===== */
.search-cyber {
  max-width: 650px;
  margin: 0 auto var(--spacing-xl);
  position: relative;
}
.search-input {
  width: 100%;
  padding: 15px 24px 15px 56px;
  background: var(--bg-surface);
  border: 1.5px solid var(--border-neon);
  border-radius: var(--radius-xl);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  transition: all 350ms var(--ease-smooth);
  backdrop-filter: blur(14px);
  box-shadow: var(--glow-soft);
}
.search-input:focus {
  outline: none;
  border-color: var(--neon-electric);
  box-shadow: var(--glow-medium);
  background: var(--bg-card);
}
.search-input::placeholder { color: var(--text-muted); opacity: 0.85; }
.search-icon {
  position: absolute; left: 20px; top: 50%;
  transform: translateY(-50%);
  color: var(--neon-blue);
  font-size: 17px;
  pointer-events: none;
  text-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
}

/* ===== FILTER TABS CYBER ===== */
.filter-cyber {
  display: flex; gap: 12px; justify-content: center;
  margin-bottom: var(--spacing-lg); flex-wrap: wrap;
  padding: 5px;
  background: var(--bg-glass);
  border: 1px solid var(--border-neon);
  border-radius: var(--radius-xl);
  max-width: fit-content; margin-left: auto; margin-right: auto;
  backdrop-filter: blur(14px);
  box-shadow: var(--glow-soft);
}
.filter-tab {
  padding: 11px 26px;
  background: transparent;
  border: none;
  border-radius: var(--radius-md);
  color: var(--text-muted);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  transition: all 320ms var(--ease-smooth);
  text-transform: uppercase; letter-spacing: 1.2px;
  position: relative;
  display: flex; align-items: center; gap: 8px;
}
.filter-tab::before {
  content: ''; position: absolute; inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.18), rgba(0, 212, 255, 0.08));
  opacity: 0; transition: var(--ease-smooth);
}
.filter-tab:hover {
  color: var(--text-primary);
  transform: translateY(-3px);
}
.filter-tab:hover::before { opacity: 1; }
.filter-tab.active {
  color: var(--neon-electric);
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.32), rgba(0, 212, 255, 0.22));
  border: 1px solid var(--neon-electric);
  box-shadow: var(--glow-medium);
  transform: translateY(-3px);
}
.filter-tab.active::before { opacity: 0.35; }

/* ===== TAGS SYSTEM ===== */
.tags-bar {
  display: flex; gap: 8px; justify-content: center;
  margin-bottom: var(--spacing-lg); flex-wrap: wrap;
  padding: 0 var(--spacing-sm);
}
.tag-btn {
  padding: 7px 16px;
  background: var(--bg-card);
  border: 1px solid rgba(0, 212, 255, 0.28);
  border-radius: 50px;
  color: var(--text-secondary);
  font-size: 10px; font-weight: 600;
  cursor: pointer;
  transition: all 280ms var(--ease-smooth);
  text-transform: uppercase; letter-spacing: 0.8px;
  backdrop-filter: blur(8px);
}
.tag-btn:hover, .tag-btn.active {
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.28), rgba(0, 212, 255, 0.18));
  border-color: var(--neon-electric);
  color: var(--neon-electric);
  transform: translateY(-2px);
  box-shadow: 0 6px 22px rgba(0, 245, 255, 0.35);
}
.tag-btn.active {
  font-weight: 700;
  box-shadow: var(--glow-soft);
}

/* ===== GALLERY GRID CYBER ===== */
.gallery-cyber {
  animation: gridCyberEnter 700ms var(--ease-bloom) backwards;
}
@keyframes gridCyberEnter {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px; font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 22px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border-neon);
  display: flex; align-items: center; gap: 14px;
  letter-spacing: 2.5px; position: relative;
}
.section-title::before {
  content: ''; width: 4.5px; height: 24px;
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-cyan), var(--neon-blue));
  border-radius: 2.5px;
  box-shadow: 0 0 16px rgba(0, 245, 255, 0.75);
  animation: barCyber 2.5s ease-in-out infinite;
}
@keyframes barCyber {
  0%, 100% { opacity: 1; box-shadow: 0 0 16px rgba(0, 245, 255, 0.75); }
  50% { opacity: 0.85; box-shadow: 0 0 28px rgba(0, 245, 255, 1); }
}

.grid-cyber {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 24px;
}

/* ===== PHOTO CARD ULTRA ===== */
.card-cyber {
  background: var(--bg-card);
  border: 1px solid rgba(0, 212, 255, 0.28);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all 450ms var(--ease-bloom);
  position: relative;
  backdrop-filter: blur(16px);
  animation: cardCyberEnter 550ms ease forwards;
  opacity: 0; transform: translateY(32px) scale(0.985);
  box-shadow: var(--glow-soft);
}
.card-cyber::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg,
    rgba(0, 245, 255, 0.045) 0%,
    transparent 52%,
    rgba(123, 47, 255, 0.045) 100%);
  pointer-events: none; opacity: 0;
  transition: opacity 320ms;
}
.card-cyber:hover::before { opacity: 1; }
.card-cyber:nth-child(n) { animation-delay: calc(0.075s * var(--ci, 0)); }
@keyframes cardCyberEnter {
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.card-cyber:hover {
  transform: translateY(-9px) scale(1.022);
  border-color: var(--neon-electric);
  box-shadow: var(--glow-medium), 0 28px 65px rgba(0, 0, 0, 0.55);
  z-index: 18;
}

.card-img-wrap {
  position: relative;
  width: 100%; height: 320px;
  background: linear-gradient(135deg, #0a1a2a 0%, #040c18 100%);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  border-bottom: 1px solid rgba(0, 212, 255, 0.18);
}
.card-img-wrap::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 38% 28%, rgba(0, 245, 255, 0.12) 0%, transparent 62%);
  pointer-events: none;
}
.card-img-wrap::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 65%, rgba(0, 4, 12, 0.45) 100%);
  pointer-events: none;
}
.card-img {
  width: 100%; height: 100%;
  object-fit: contain;
  transition: transform 420ms var(--ease-bloom), filter 350ms;
  filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.42));
}
.card-cyber:hover .card-img {
  transform: scale(1.09);
  filter: drop-shadow(0 14px 42px rgba(0, 245, 255, 0.28));
}

/* Favorite Button */
.favorite-btn {
  position: absolute;
  top: 14px; right: 14px;
  width: 38px; height: 38px;
  background: var(--bg-glass-strong);
  border: 1px solid var(--border-neon);
  border-radius: 50%;
  color: var(--text-muted);
  font-size: 15px;
  cursor: pointer;
  transition: all 300ms var(--ease-smooth);
  backdrop-filter: blur(12px);
  z-index: 5;
  display: flex; align-items: center; justify-content: center;
}
.favorite-btn:hover {
  border-color: var(--neon-electric);
  color: var(--neon-electric);
  transform: scale(1.12);

.card-body { padding: var(--spacing-md); }

.action-cyber i {

}
.action-cyber:hover {

  box-shadow: 0 10px 32px rgba(0, 245, 255, 0.55);

}
.action-cyber:hover::before { opacity: 1; }
.action-cyber:hover i { transform: scale(1.18) translateY(-1px); }

.action-cyber.copy:hover {
  background: linear-gradient(135deg, rgba(0, 255, 157, 0.38), rgba(0, 200, 100, 0.28));
  border-color: var(--neon-cyan);
  box-shadow: 0 10px 32px rgba(0, 255, 157, 0.55);
}
.action-cyber.download:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.38), rgba(0, 180, 255, 0.28));

}
.action-cyber.share:hover {
  background: linear-gradient(135deg, rgba(123, 47, 255, 0.38), rgba(157, 78, 221, 0.28));

}

/* View Counter Badge */
.view-badge {

/* ===== LOADING CYBER ===== */
.loader-cyber {
  display: none; text-align: center;

  grid-column: 1 / -1;
}
.loader-cyber.active { display: block; }
.spinner-cyber {

}
.spinner-cyber::after {

@keyframes textCyber {

@keyframes modalCyberSlide {

.toast-cyber.show {

}
@keyframes toastCyberBloom {

  55% { transform: translateX(-12px) scale(1.03); }
  100% { transform: translateX(0) scale(1); opacity: 1; }

.toast-cyber i {

}
@keyframes iconCyberPulse {

.infinite-loader {

/* ===== FAVORITES BAR ===== */
.favorites-bar {

.favorites-bar .btn-small {

}

/* ===== SCROLLBAR CYBER ===== */
::-webkit-scrollbar { width: 7px; height: 7px; }

}

/* ===== RESPONSIVE CYBER ===== */
@media (max-width: 768px) {

@media (max-width: 480px) {
  .grid-cyber { grid-template-columns: 1fr; }

/* ===== ACCESSIBILITY ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }

}

/* ===== PRINT ===== */
@media print {
  .bg-cyber, .grid-cyber, .particles, .lightning,

  .filter-cyber, .tags-bar, .search-cyber,

  }

  .card-cyber { break-inside: avoid; border: 1px solid #ccc; }
}
</style>

<script>
// ===== CYBER STATE =====
let allPhotos = [];
let displayedPhotos = [];
let currentFilter = 'all';
let currentTag = 'all';
let favorites = JSON.parse(localStorage.getItem('neonFavorites') || '[]');
let currentPhoto = { url: '', title: '', id: '' };
let isLoading = false;
let page = 1;
const ITEMS_PER_PAGE = 12;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  initParticles();
  loadGallery();
  renderFavoritesBar();
  setupInfiniteScroll();
  setupKeyboardShortcuts();
});

// ===== PARTICLE SYSTEM =====
function initParticles() {
  const container = document.getElementById('particles');
  if (!container) return;

  const types = ['electric', 'cyan', 'blue', 'purple'];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div');
    p.className = `particle ${types[i % 4]}`;
    p.style.left = `${Math.random() * 100}%`;
    p.style.setProperty('--drift', `${(Math.random() - 0.5) * 120}px`);
    p.style.animationDelay = `${Math.random() * 40}s`;
    p.style.width = p.style.height = `${1.5 + Math.random() * 2}px`;
    container.appendChild(p);
  }
}

// ===== DATA LOADING =====
async function loadGallery() {
  const loader = document.getElementById('loader');
  const grid = document.getElementById('galleryGrid');

  loader.classList.add('active');

  try {
    const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
    const gid = '1246502038';

    // Try GVIZ API
    try {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:E150`;
      const res = await fetch(url);
      const txt = await res.text();
      const json = JSON.parse(txt.substring(47).slice(0, -2));

      allPhotos = json.table.rows
        .filter(r => r.c?.[0]?.v && r.c?.[1]?.v)
        .map((r, i) => ({
          id: i + 2,
          title: r.c[0].v,
          url: r.c[1].v,
          tag: r.c[2]?.v || 'umum',
          views: Math.floor(Math.random() * 500) + 50,
          date: new Date(Date.now() - Math.random() * 30 * 24 * 60 * 60 * 1000).toISOString()
        }));
    } catch {
      // Fallback CSV
      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:E150`;
      const csv = await fetch(csvUrl).then(r => r.text());

      allPhotos = csv.split('\n').slice(1).map((row, i) => {
        const parts = row.split(',').map(c => c?.replace(/"/g, '').trim());
        return (parts[0] && parts[1]) ? {
          id: i + 2,
          title: parts[0],
          url: parts[1],
          tag: parts[2] || 'umum',
          views: Math.floor(Math.random() * 500) + 50,
          date: new Date().toISOString()
        } : null;
      }).filter(Boolean);
    }

    applyFilters();
    notify(`⚡ ${allPhotos.length} foto dimuat`);

  } catch (err) {
    console.error('Load error:', err);
    notify('❗ Gagal memuat galeri');
    grid.innerHTML = `
      <div class="empty-cyber">
        <i class="fas fa-satellite-dish"></i>
        <h3>Koneksi Cyber Terputus</h3>
        <p>Periksa jaringan atau refresh halaman</p>
      </div>
    `;
  }

  loader.classList.remove('active');
}

// ===== FILTERING SYSTEM =====
function filterData(type, btn) {
  document.querySelectorAll('.filter-tab').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-selected', 'false');
  });
  btn.classList.add('active');
  btn.setAttribute('aria-selected', 'true');

  currentFilter = type;
  page = 1;
  applyFilters();
}

function filterTag(tag, btn) {
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTag = tag;
  page = 1;
  applyFilters();
}

function applyFilters() {
  let filtered = [...allPhotos];

  // Filter by category
  if (currentFilter === 'recent') {
    filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
  } else if (currentFilter === 'popular') {
    filtered.sort((a, b) => b.views - a.views);
  } else if (currentFilter === 'favorites') {
    filtered = filtered.filter(p => favorites.includes(p.id));
  }

  // Filter by tag
  if (currentTag !== 'all') {
    filtered = filtered.filter(p => p.tag === currentTag);
  }

  // Filter by search
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  if (search) {
    filtered = filtered.filter(p =>
      p.title.toLowerCase().includes(search) ||
      p.tag.toLowerCase().includes(search) ||
      String(p.id).includes(search)
    );
  }

  displayedPhotos = filtered;
  renderGrid(displayedPhotos.slice(0, ITEMS_PER_PAGE));

  // Update favorites bar visibility
  updateFavoritesBar();
}

// ===== RENDER GRID =====
function renderGrid(photos, append = false) {
  const grid = document.getElementById('galleryGrid');

  if (!append) {
    if (photos.length === 0) {
      grid.innerHTML = `
        <div class="empty-cyber">
          <i class="fas fa-search"></i>
          <h3>Tidak Ditemukan</h3>
          <p>Coba kata kunci lain atau reset filter</p>
        </div>
      `;
      return;
    }
    grid.innerHTML = '';
  }

  const startIndex = append ? grid.children.length : 0;
  photos.forEach((photo, idx) => {
    const card = createCard(photo, startIndex + idx);
    grid.appendChild(card);
  });
}

function createCard(photo, index) {
  const isFav = favorites.includes(photo.id);
  const card = document.createElement('div');
  card.className = 'card-cyber';
  card.style.setProperty('--ci', index);
  card.setAttribute('role', 'listitem');
  card.innerHTML = `
    <div class="card-img-wrap">
      <img class="card-img" src="${photo.url}" alt="${photo.title}"
           onerror="this.src='https://via.placeholder.com/400x300/0a1a2a/00f5ff?text=No+Image'"
           loading="lazy" decoding="async"
           onclick="openModal('${photo.url}', '${photo.title.replace(/'/g, "\\'")}', ${photo.id})">
      <button class="favorite-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(${photo.id}, event)" aria-label="Toggle favorite">
        <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
      </button>
      <div class="view-badge">
        <i class="fas fa-eye"></i> ${photo.views}
      </div>
    </div>
    <div class="card-body">
      <div class="card-title">${photo.title}</div>
      <div class="card-meta">
        <span><i class="fas fa-tag"></i> ${photo.tag}</span>
        <span><i class="fas fa-hashtag"></i> #${photo.id}</span>
      </div>
      <div class="card-actions">
        <button class="action-cyber copy" onclick="copyPhoto('${photo.url}')" title="Salin">
          <i class="fas fa-copy"></i><span>Salin</span>
        </button>
        <button class="action-cyber download" onclick="downloadPhoto('${photo.url}', '${photo.title}')" title="Unduh">
          <i class="fas fa-download"></i><span>Unduh</span>
        </button>
        <button class="action-cyber share" onclick="sharePhoto('${photo.url}', '${photo.title}')" title="Bagikan">
          <i class="fas fa-share-alt"></i><span>Share</span>
        </button>
      </div>
    </div>
  `;
  return card;
}

// ===== SEARCH =====
function searchPhotos() {
  page = 1;
  applyFilters();
  const count = displayedPhotos.length;
  if (count > 0) notify(`🔍 Ditemukan ${count} hasil`);
}

// ===== FAVORITES SYSTEM =====
function toggleFavorite(id, event) {
  event?.stopPropagation();
  const idx = favorites.indexOf(id);

  if (idx === -1) {
    favorites.push(id);
    notify('💙 Ditambahkan ke favorit');
  } else {
    favorites.splice(idx, 1);
    notify('💔 Dihapus dari favorit');
  }

  localStorage.setItem('neonFavorites', JSON.stringify(favorites));
  renderFavoritesBar();

  // Update button state
  const btn = event?.target.closest('.favorite-btn');
  if (btn) {
    btn.classList.toggle('active');
    const icon = btn.querySelector('i');
    icon.className = favorites.includes(id) ? 'fas fa-heart' : 'far fa-heart';
  }

  // Re-render if viewing favorites
  if (currentFilter === 'favorites') applyFilters();
}

function renderFavoritesBar() {
  const bar = document.getElementById('favoritesBar');
  const thumbs = document.getElementById('favoritesThumbs');

  if (favorites.length === 0) {
    bar.classList.remove('active');
    return;
  }

  bar.classList.add('active');
  thumbs.innerHTML = '';

  favorites.slice(0, 10).forEach(id => {
    const photo = allPhotos.find(p => p.id === id);
    if (photo) {
      const img = document.createElement('img');
      img.className = 'thumb';
      img.src = photo.url;
      img.alt = photo.title;
      img.onclick = () => openModal(photo.url, photo.title, photo.id);
      img.onerror = () => img.src = 'https://via.placeholder.com/48/0a1a2a/00f5ff?text=?';
      thumbs.appendChild(img);
    }
  });
}

function updateFavoritesBar() {
  if (currentFilter === 'favorites' && favorites.length === 0) {
    document.getElementById('galleryGrid').innerHTML = `
      <div class="empty-cyber">
        <i class="far fa-heart"></i>
        <h3>Belum Ada Favorit</h3>
        <p>Klik ❤️ pada foto untuk menambahkannya</p>
      </div>
    `;
  }
  renderFavoritesBar();
}

function exportFavorites() {
  const favPhotos = allPhotos.filter(p => favorites.includes(p.id));
  if (favPhotos.length === 0) {
    notify('⚠️ Tidak ada favorit untuk di-export');
    return;
  }

  const data = JSON.stringify(favPhotos, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `neon-favorites-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  notify(`✅ ${favPhotos.length} favorit di-export`);
}

function clearFavorites() {
  if (confirm('Hapus semua favorit?')) {
    favorites = [];
    localStorage.removeItem('neonFavorites');
    renderFavoritesBar();
    if (currentFilter === 'favorites') applyFilters();
    notify('🗑️ Semua favorit dihapus');
  }
}

// ===== MODAL =====
function openModal(url, title, id) {
  currentPhoto = { url, title, id };

  // Increment view count
  const photo = allPhotos.find(p => p.id === id);
  if (photo) photo.views++;

  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalImage').src = url;
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
  currentPhoto = { url: '', title: '', id: '' };
}

// ===== ACTIONS =====
async function copyPhoto(url) {
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    notify('✅ Foto disalin ke clipboard!');
  } catch {
    notify('❗ Klik kanan gambar > Copy Image');
  }
}

async function copyFromModal() {
  if (currentPhoto.url) await copyPhoto(currentPhoto.url);
}

function downloadPhoto(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  notify('⚡ Download dimulai...');
}

function downloadFromModal() {
  if (currentPhoto.url && currentPhoto.title) {
    downloadPhoto(currentPhoto.url, currentPhoto.title);
  }
}

async function sharePhoto(url = currentPhoto.url, title = currentPhoto.title) {
  if (!url) { notify('⚠️ Tidak ada foto untuk dibagikan'); return; }

  if (navigator.share) {
    try {
      await navigator.share({
        title: 'Blue Neon Gallery',
        text: title,
        url: url
      });
      notify('📤 Berhasil dibagikan!');
    } catch { /* User cancelled */ }
  } else {
    // Fallback: copy link
    await navigator.clipboard.writeText(url);
    notify('🔗 Link disalin ke clipboard!');
  }
}

// ===== INFINITE SCROLL =====
function setupInfiniteScroll() {
  const loader = document.getElementById('infiniteLoader');

  const observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && !isLoading) {
      loadMore();
    }
  }, { threshold: 0.1, rootMargin: '100px' });

  observer.observe(loader);
}

async function loadMore() {
  if (isLoading) return;
  const startIndex = page * ITEMS_PER_PAGE;

  if (startIndex >= displayedPhotos.length) return;

  isLoading = true;
  document.getElementById('infiniteLoader').classList.add('active');

  // Simulate network delay for smooth UX
  await new Promise(resolve => setTimeout(resolve, 600));

  const more = displayedPhotos.slice(startIndex, startIndex + ITEMS_PER_PAGE);
  renderGrid(more, true);
  page++;

  isLoading = false;
  document.getElementById('infiniteLoader').classList.remove('active');
}

// ===== TOAST =====
function notify(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3200);
}

// ===== KEYBOARD SHORTCUTS =====
function setupKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
    if (e.ctrlKey && e.key === 'f') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });

  // Close modal on backdrop click
  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target.id === 'modal') closeModal();
  });

  // Prevent body scroll when modal open
  document.addEventListener('touchmove', (e) => {
    if (document.body.style.overflow === 'hidden') e.preventDefault();
  }, { passive: false });
}
</script>

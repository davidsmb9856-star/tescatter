<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f5ff">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  /* 🌟 ULTRA PREMIUM NEON PALETTE */
  --neon-cyan: #00f5ff;
  --neon-blue: #00d9ff;
  --neon-electric: #00ffff;
  --neon-purple: #9d4edd;
  --neon-violet: #7b2cbf;
  --neon-pink: #ff00cc;
  --neon-gold: #ffd700;
  --neon-green: #00ffa3;
  
  /* Background */
  --bg-deep: #00010a;
  --bg-surface: rgba(6, 12, 32, 0.85);
  --bg-elevated: rgba(12, 24, 56, 0.9);
  --bg-glass: rgba(8, 18, 42, 0.7);
  
  /* Text */
  --text-primary: #ffffff;
  --text-secondary: #a8d8ff;
  --text-dim: #5a729a;
  
  /* Glow & Border */
  --border-glow: rgba(0, 245, 255, 0.8);
  --glow-primary: 0 0 25px rgba(0, 245, 255, 0.75), 0 0 55px rgba(0, 245, 255, 0.5), 0 0 90px rgba(0, 245, 255, 0.3);
  --glow-secondary: 0 0 20px rgba(157, 78, 221, 0.6), 0 0 45px rgba(157, 78, 221, 0.4);
  --glow-accent: 0 0 20px rgba(255, 0, 204, 0.6), 0 0 45px rgba(255, 0, 204, 0.4);
  
  /* Transitions */
  --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-fast: 0.25s var(--ease-smooth);
  --transition-normal: 0.4s var(--ease-smooth);
  --transition-slow: 0.7s var(--ease-bounce);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 20px; }
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
}

/* 🌌 MESH GRADIENT BACKGROUND */
.bg-mesh {
  position: fixed;
  inset: 0;
  z-index: -4;
  background: 
    radial-gradient(ellipse at 15% 15%, rgba(0, 245, 255, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 25%, rgba(157, 78, 221, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 85%, rgba(255, 0, 204, 0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 25% 70%, rgba(0, 255, 163, 0.06) 0%, transparent 60%);
  animation: meshPulse 18s ease-in-out infinite alternate;
}
@keyframes meshPulse {
  0%, 100% { opacity: 1; filter: hue-rotate(0deg) saturate(1); }
  50% { opacity: 0.95; filter: hue-rotate(30deg) saturate(1.15); }
}

/* ✨ FLOATING ORBS */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(60px);
  z-index: -3;
  opacity: 0.5;
  animation: orbFloat 25s ease-in-out infinite;
  pointer-events: none;
}
.orb-1 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(0, 245, 255, 0.4) 0%, transparent 70%);
  top: 10%; left: 5%;
  animation-delay: 0s;
}
.orb-2 {
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(157, 78, 221, 0.35) 0%, transparent 70%);
  top: 60%; right: 8%;
  animation-delay: -8s;
}
.orb-3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255, 0, 204, 0.25) 0%, transparent 70%);
  bottom: 15%; left: 15%;
  animation-delay: -16s;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(3%, -2%) scale(1.05); }
  50% { transform: translate(-2%, 3%) scale(0.98); }
  75% { transform: translate(2%, 2%) scale(1.02); }
}

/* 🔲 GRID & NOISE */
.grid-overlay {
  position: fixed;
  inset: 0;
  z-index: -2;
  background-image:
    linear-gradient(rgba(0, 245, 255, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 245, 255, 0.06) 1px, transparent 1px);
  background-size: 50px 50px;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 85%);
  animation: gridFlow 30s linear infinite;
}
@keyframes gridFlow {
  0% { background-position: 0 0; }
  100% { background-position: 50px 50px; }
}

.noise {
  position: fixed;
  inset: 0;
  z-index: -1;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  animation: noiseShift 10s steps(8) infinite;
}
@keyframes noiseShift {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(-3px, 2px); }
  50% { transform: translate(2px, -3px); }
  75% { transform: translate(-2px, -2px); }
}

/* ⚡ LIGHTNING EFFECT */
.lightning {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  opacity: 0;
  animation: lightningBurst 12s infinite;
}
@keyframes lightningBurst {
  0%, 90%, 93%, 96%, 100% { opacity: 0; }
  91%, 94% { opacity: 0.25; }
}
.lightning-strike {
  position: absolute;
  width: 4px;
  height: 100vh;
  background: linear-gradient(180deg, 
    transparent 0%, 
    var(--neon-electric) 20%, 
    var(--neon-cyan) 50%, 
    var(--neon-purple) 80%, 
    transparent 100%);
  filter: blur(4px);
  animation: strikeAnim 12s infinite;
  box-shadow: 0 0 40px var(--neon-electric), 0 0 80px var(--neon-cyan);
}
.lightning-strike:nth-child(1) { left: 10%; animation-delay: 0s; }
.lightning-strike:nth-child(2) { left: 50%; animation-delay: 4s; }
.lightning-strike:nth-child(3) { left: 90%; animation-delay: 8s; }
@keyframes strikeAnim {
  0%, 89%, 92%, 95%, 100% { transform: scaleY(0); opacity: 0; }
  90%, 91%, 93%, 94% { transform: scaleY(1); opacity: 1; }
}

/* ✨ PARTICLE SYSTEM */
.particles {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  opacity: 0;
  animation: particleRise 20s infinite ease-in-out;
}
.particle::before {
  content: '';
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  background: inherit;
  filter: blur(3px);
  opacity: 0.6;
}
@keyframes particleRise {
  0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
  10% { opacity: 0.9; }
  90% { opacity: 0.9; }
  100% { transform: translateY(-100vh) scale(1.2) rotate(720deg); opacity: 0; }
}

/* 🔍 SCANLINE */
.scanline {
  position: fixed;
  left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, 
    transparent, 
    var(--neon-electric), 
    var(--neon-cyan), 
    var(--neon-purple), 
    transparent);
  opacity: 0.6;
  animation: scanMove 6s linear infinite;
  z-index: 100;
  pointer-events: none;
  filter: blur(1px);
  box-shadow: 0 0 20px var(--neon-electric);
}
@keyframes scanMove {
  0% { top: -2px; opacity: 0; }
  5% { opacity: 0.6; }
  95% { opacity: 0.6; }
  100% { top: 100%; opacity: 0; }
}

/* 🎯 LAYOUT */
.container {
  max-width: 1450px;
  margin: 0 auto;
  padding: 30px 20px;
  min-height: 100vh;
  position: relative;
}

/* 📣 HEADER */
.header {
  text-align: center;
  margin-bottom: 40px;
  animation: headerEnter 1s var(--transition-slow) backwards;
  position: relative;
  padding-bottom: 25px;
}
@keyframes headerEnter {
  from { opacity: 0; transform: translateY(-40px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  height: 3px;
  background: linear-gradient(90deg, 
    transparent, 
    var(--neon-electric), 
    var(--neon-cyan), 
    var(--neon-purple), 
    var(--neon-pink), 
    transparent);
  border-radius: 2px;
  animation: glowLine 3s ease-in-out infinite;
}
@keyframes glowLine {
  0%, 100% { opacity: 0.8; box-shadow: 0 0 20px rgba(0, 245, 255, 0.6); }
  50% { opacity: 1; box-shadow: 0 0 35px rgba(0, 245, 255, 0.9), 0 0 70px rgba(157, 78, 221, 0.6); }
}

/* 🔙 BACK BUTTON */
.back-btn {
  position: fixed;
  left: 20px; top: 20px;
  background: var(--bg-glass);
  border: 1px solid var(--border-glow);
  color: var(--neon-cyan);
  padding: 8px 18px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 700;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: var(--transition-normal);
  backdrop-filter: blur(16px);
  z-index: 1000;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.back-btn:hover {
  background: rgba(0, 245, 255, 0.25);
  transform: translateX(-6px) scale(1.03);
  box-shadow: var(--glow-primary);
  color: var(--bg-deep);
}
.back-btn i { font-size: 13px; }

/* 🎪 TITLE */
.title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(32px, 7.5vw, 56px);
  font-weight: 900;
  letter-spacing: 6px;
  margin-bottom: 12px;
  position: relative;
  background: linear-gradient(135deg, 
    var(--neon-electric) 0%, 
    var(--neon-cyan) 25%, 
    #ffffff 50%, 
    var(--neon-cyan) 75%, 
    var(--neon-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 40px rgba(0, 245, 255, 0.65);
  animation: titleGlow 3s ease-in-out infinite, titleBounce 5s ease-in-out infinite;
}
@keyframes titleGlow {
  0%, 100% { filter: brightness(1) drop-shadow(0 0 30px rgba(0, 245, 255, 0.5)); }
  50% { filter: brightness(1.35) drop-shadow(0 0 50px rgba(0, 245, 255, 0.8)); }
}
@keyframes titleBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  letter-spacing: 7px;
  text-transform: uppercase;
  margin-bottom: 18px;
  font-weight: 600;
  text-shadow: 0 0 12px rgba(0, 245, 255, 0.45);
}

/* 🟢 STATUS BADGE */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 11px;
  padding: 8px 24px;
  background: rgba(0, 255, 163, 0.18);
  border: 1px solid rgba(0, 255, 163, 0.55);
  border-radius: 100px;
  font-size: 11px;
  font-weight: 700;
  color: var(--neon-green);
  text-transform: uppercase;
  letter-spacing: 3px;
  animation: badgePulse 2.2s ease-in-out infinite;
  box-shadow: 0 0 25px rgba(0, 255, 163, 0.4);
  backdrop-filter: blur(8px);
}
@keyframes badgePulse {
  0%, 100% { box-shadow: 0 0 25px rgba(0, 255, 163, 0.4); }
  50% { box-shadow: 0 0 45px rgba(0, 255, 163, 0.75); }
}
.status-dot {
  width: 9px; height: 9px;
  background: var(--neon-green);
  border-radius: 50%;
  animation: dotPulse 1.4s ease-in-out infinite;
  box-shadow: 0 0 18px var(--neon-green), 0 0 35px rgba(0, 255, 163, 0.6);
}
@keyframes dotPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.6); opacity: 0.85; }
}

/* 🧭 NAVIGATION */
.nav-tabs {
  display: flex;
  gap: 14px;
  justify-content: center;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.nav-tab {
  padding: 12px 28px;
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition-normal);
  text-transform: uppercase;
  letter-spacing: 1.8px;
  backdrop-filter: blur(14px);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-tab::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, 
    rgba(0, 245, 255, 0.22), 
    rgba(157, 78, 221, 0.15),
    rgba(255, 0, 204, 0.1));
  opacity: 0;
  transition: opacity 0.35s;
}
.nav-tab:hover, .nav-tab.active {
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.3), rgba(0, 217, 255, 0.25));
  border-color: var(--neon-electric);
  box-shadow: var(--glow-primary);
  transform: translateY(-4px);
  color: var(--neon-electric);
}
.nav-tab:hover::before, .nav-tab.active::before { opacity: 1; }

.section { display: none; }
.section.active { display: block; animation: sectionFade 0.65s var(--transition-slow); }
@keyframes sectionFade {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 🔍 SEARCH */
.search-container {
  max-width: 680px;
  margin: 0 auto 32px;
  position: relative;
}
.search-box {
  width: 100%;
  padding: 15px 55px 15px 22px;
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: 14px;
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  transition: var(--transition-normal);
  backdrop-filter: blur(14px);
  box-shadow: 0 4px 25px rgba(0, 0, 0, 0.25);
}
.search-box:focus {
  outline: none;
  border-color: var(--neon-electric);
  box-shadow: var(--glow-primary);
  background: var(--bg-elevated);
  transform: translateY(-2px);
}
.search-box::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--neon-cyan);
  font-size: 17px;
  pointer-events: none;
  transition: var(--transition-fast);
}
.search-box:focus + .search-icon { color: var(--neon-electric); }

/* 🖼️ GALLERY */
.gallery-section {
  margin-bottom: 45px;
  animation: galleryReveal 0.85s var(--transition-slow) backwards;
}
@keyframes galleryReveal {
  from { opacity: 0; transform: translateY(50px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border-glow);
  display: flex;
  align-items: center;
  gap: 14px;
  letter-spacing: 3px;
  position: relative;
}
.section-title::before {
  content: '';
  width: 5px; height: 24px;
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-cyan), var(--neon-purple));
  border-radius: 3px;
  box-shadow: 0 0 18px rgba(0, 245, 255, 0.75);
  animation: barPulse 2.5s ease-in-out infinite;
}
@keyframes barPulse {
  0%, 100% { opacity: 1; transform: scaleY(1); }
  50% { opacity: 0.85; transform: scaleY(1.12); }
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

/* 🎴 PHOTO CARD - PREMIUM DESIGN */
.photo-card {
  background: var(--bg-surface);
  border: 1px solid rgba(0, 245, 255, 0.4);
  border-radius: 16px;
  overflow: hidden;
  transition: var(--transition-slow);
  position: relative;
  backdrop-filter: blur(16px);
  animation: cardFloat 0.7s ease forwards;
  opacity: 0;
  transform: translateY(30px);
  box-shadow: 0 8px 35px rgba(0, 0, 0, 0.4);
}
@keyframes cardFloat {
  to { opacity: 1; transform: translateY(0); }
}
.photo-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, 
    rgba(0, 245, 255, 0.08), 
    transparent 40%, 
    rgba(157, 78, 221, 0.08));
  opacity: 0;
  transition: opacity 0.45s;
  pointer-events: none;
  z-index: 1;
}
.photo-card:hover::before { opacity: 1; }
.photo-card:nth-child(1) { animation-delay: 0.1s; }
.photo-card:nth-child(2) { animation-delay: 0.15s; }
.photo-card:nth-child(3) { animation-delay: 0.2s; }
.photo-card:nth-child(4) { animation-delay: 0.25s; }
.photo-card:nth-child(5) { animation-delay: 0.3s; }
.photo-card:nth-child(n+6) { animation-delay: 0.35s; }

.photo-card:hover {
  transform: translateY(-8px) scale(1.035);
  border-color: var(--neon-electric);
  box-shadow: var(--glow-primary), 0 25px 60px rgba(0, 0, 0, 0.55);
  z-index: 10;
}

.photo-wrapper {
  position: relative;
  width: 100%;
  height: 300px;
  background: radial-gradient(circle at 50% 30%, #0f2a47 0%, #050d1f 100%);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.photo-wrapper::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, 
    transparent 55%, 
    rgba(0, 0, 0, 0.5) 85%, 
    rgba(0, 0, 0, 0.7) 100%);
  pointer-events: none;
  z-index: 2;
}
.photo-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  padding: 8px;
  background: transparent;
  transition: transform 0.5s var(--ease-bounce), filter 0.5s ease;
  filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.35));
}
.photo-card:hover .photo-wrapper img {
  transform: scale(1.09);
  filter: drop-shadow(0 10px 35px rgba(0, 245, 255, 0.45));
}

/* ✨ CARD INFO */
.photo-info {
  padding: 18px 20px 20px;
  position: relative;
  z-index: 3;
}
.photo-info::before {
  content: '';
  position: absolute;
  top: 0;
  left: 20px;
  right: 20px;
  height: 1px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(0, 245, 255, 0.5), 
    rgba(157, 78, 221, 0.5), 
    transparent);
}

.photo-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--neon-electric);
  margin-bottom: 15px;
  word-break: break-word;
  text-align: center;
  text-shadow: 0 0 14px rgba(0, 245, 255, 0.65);
  line-height: 1.45;
  min-height: 42px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.photo-meta {
  font-size: 11px;
  color: var(--text-secondary);
  text-align: center;
  margin-bottom: 16px;
  opacity: 0.92;
  font-weight: 500;
}

/* 🎮 ACTION BUTTONS - PREMIUM */
.action-buttons-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  padding-top: 14px;
  border-top: 1px solid rgba(0, 245, 255, 0.3);
}

.action-btn {
  flex: 1;
  min-width: 80px;
  max-width: 100px;
  height: 50px;
  background: linear-gradient(135deg, 
    rgba(0, 245, 255, 0.2), 
    rgba(0, 217, 255, 0.15));
  border: 1px solid rgba(0, 245, 255, 0.55);
  border-radius: 12px;
  color: var(--neon-cyan);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.35s var(--ease-smooth);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  backdrop-filter: blur(12px);
  position: relative;
  overflow: hidden;
}
.action-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, 
    rgba(0, 245, 255, 0.35), 
    rgba(157, 78, 221, 0.25));
  opacity: 0;
  transition: opacity 0.35s;
}
.action-btn i {
  font-size: 18px;
  margin-bottom: 3px;
  z-index: 1;
  transition: transform 0.3s ease;
}
.action-btn span {
  font-size: 9px;
  font-weight: 700;
  z-index: 1;
}
.action-btn:hover {
  background: linear-gradient(135deg, 
    rgba(0, 245, 255, 0.45), 
    rgba(0, 217, 255, 0.38));
  border-color: var(--neon-electric);
  transform: translateY(-5px) scale(1.08);
  box-shadow: 0 10px 35px rgba(0, 245, 255, 0.65);
  color: var(--bg-deep);
}
.action-btn:hover::before { opacity: 1; }
.action-btn:hover i { transform: scale(1.15); }

.action-btn.copy-btn:hover {
  background: linear-gradient(135deg, 
    rgba(0, 255, 163, 0.45), 
    rgba(0, 220, 130, 0.38));
  border-color: var(--neon-green);
  box-shadow: 0 10px 35px rgba(0, 255, 163, 0.65);
}
.action-btn.download-btn:hover {
  background: linear-gradient(135deg, 
    rgba(0, 245, 255, 0.45), 
    rgba(0, 190, 255, 0.38));
  border-color: var(--neon-blue);
  box-shadow: 0 10px 35px rgba(0, 245, 255, 0.65);
}

/* ⏳ LOADING */
.loading {
  display: none;
  text-align: center;
  padding: 45px 20px;
  grid-column: 1 / -1;
}
.loading.active { display: block; }

.loader {
  width: 55px;
  height: 55px;
  border: 4px solid rgba(0, 245, 255, 0.25);
  border-top-color: var(--neon-electric);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 22px;
  box-shadow: var(--glow-primary);
  position: relative;
}
.loader::after {
  content: '';
  position: absolute;
  inset: -6px;
  border: 3px solid transparent;
  border-top-color: var(--neon-purple);
  border-radius: 50%;
  animation: spin 1.4s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  color: var(--neon-electric);
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2px;
  animation: textPulse 2s ease-in-out infinite;
}
@keyframes textPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

/* 🪟 MODAL - PREMIUM */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 2, 10, 0.97);
  backdrop-filter: blur(24px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 25px;
  animation: modalEnter 0.35s ease;
}
@keyframes modalEnter {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal-backdrop.active { display: flex; }

.modal-content {
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: 20px;
  max-width: 1000px;
  width: 100%;
  max-height: 95vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: var(--glow-primary), 0 30px 70px rgba(0, 0, 0, 0.6);
  animation: modalSlide 0.45s var(--transition-slow);
}
@keyframes modalSlide {
  from { opacity: 0; transform: translateY(40px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  border-bottom: 1px solid rgba(0, 245, 255, 0.3);
  background: linear-gradient(90deg, 
    rgba(0, 245, 255, 0.1), 
    transparent, 
    rgba(157, 78, 221, 0.1));
}
.modal-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  color: var(--neon-electric);
  font-weight: 700;
  letter-spacing: 1px;
}
.modal-close {
  width: 40px;
  height: 40px;
  background: transparent;
  border: 1px solid var(--neon-pink);
  border-radius: 50%;
  color: var(--neon-pink);
  font-size: 16px;
  cursor: pointer;
  transition: all 0.35s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover {
  background: var(--neon-pink);
  color: var(--bg-deep);
  transform: rotate(90deg) scale(1.12);
  box-shadow: var(--glow-accent);
}

.modal-body {
  padding: 24px;
  text-align: center;
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at center, #0d2848 0%, #040d21 100%);
}
.modal-body img {
  max-width: 100%;
  max-height: 68vh;
  width: auto;
  object-fit: contain;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(0, 245, 255, 0.45), 0 12px 50px rgba(0, 0, 0, 0.45);
  transition: transform 0.4s var(--ease-bounce);
}
.modal-body img:hover {
  transform: scale(1.025);
}

.modal-actions {
  margin-top: 22px;
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

/* 🔔 TOAST */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--bg-surface);
  border: 1px solid var(--neon-electric);
  color: var(--neon-electric);
  padding: 14px 26px;
  border-radius: 14px;
  font-weight: 700;
  font-size: 12px;
  z-index: 10000;
  display: flex;
  align-items: center;
  gap: 11px;
  box-shadow: var(--glow-primary);
  transform: translateX(280px);
  opacity: 0;
  transition: var(--transition-slow);
  backdrop-filter: blur(16px);
}
.toast.show {
  transform: translateX(0);
  opacity: 1;
}
.toast i { font-size: 17px; }

/* 📱 RESPONSIVE */
@media (max-width: 768px) {
  .container { padding: 20px 14px; }
  .back-btn { left: 14px; top: 14px; padding: 7px 14px; font-size: 10px; }
  .title { font-size: clamp(28px, 8vw, 44px); letter-spacing: 4px; }
  .subtitle { font-size: 11px; letter-spacing: 5px; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
  .photo-card { border-radius: 14px; }
  .photo-wrapper { height: 250px; }
  .photo-title { font-size: 13px; min-height: 38px; }
  .action-btn { min-width: 70px; max-width: 88px; height: 46px; }
  .action-btn i { font-size: 16px; }
  .action-btn span { font-size: 8px; }
  .nav-tabs { gap: 10px; }
  .nav-tab { padding: 10px 20px; font-size: 11px; }
  .modal-content { border-radius: 16px; }
  .modal-body { padding: 18px; }
}

@media (max-width: 480px) {
  .gallery-grid { grid-template-columns: 1fr; }
  .photo-wrapper { height: 280px; }
  .action-buttons-row { gap: 10px; }
  .action-btn { min-width: 75px; max-width: 95px; }
}

/* 🌀 SCROLLBAR */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-cyan), var(--neon-purple));
  border-radius: 6px;
  border: 2px solid var(--bg-deep);
  box-shadow: 0 0 18px rgba(0, 245, 255, 0.55);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--neon-cyan), var(--neon-electric), var(--neon-violet));
  box-shadow: 0 0 25px rgba(0, 245, 255, 0.75);
}

/* ✨ SELECTION */
::selection {
  background: rgba(0, 245, 255, 0.45);
  color: var(--text-primary);
  text-shadow: 0 0 12px rgba(0, 245, 255, 0.7);
}

/* 🎯 FOCUS */
a:focus, button:focus, input:focus {
  outline: 2px solid var(--neon-electric);
  outline-offset: 3px;
  box-shadow: 0 0 0 5px rgba(0, 245, 255, 0.25);
}

/* 🌟 RIPPLE EFFECT */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(0, 245, 255, 0.5);
  transform: scale(0);
  animation: rippleAnim 0.6s ease-out;
  pointer-events: none;
}
@keyframes rippleAnim {
  to { transform: scale(3); opacity: 0; }
}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid-overlay"></div>
<div class="noise"></div>
<div class="particles" id="particles"></div>
<div class="lightning">
  <div class="lightning-strike"></div>
  <div class="lightning-strike"></div>
  <div class="lightning-strike"></div>
</div>
<div class="scanline"></div>

<a href="index.html" class="back-btn">
<i class="fas fa-arrow-left"></i> Kembali
</a>

<div class="container">
  <header class="header">
    <h1 class="title">⚡ FOTO GALLERY</h1>
    <p class="subtitle">LINE TOGEL - Cyber Portal 2026</p>
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </header>

  <div class="nav-tabs">
    <button class="nav-tab active">
      <i class="fas fa-images"></i> Galeri Foto
    </button>
  </div>

  <section id="gallery" class="section active">
    <div class="search-container">
      <input type="text" class="search-box" id="searchInput" placeholder="🔍 Cari foto berdasarkan judul..." onkeyup="searchPhotos()">
      <i class="fas fa-search search-icon"></i>
    </div>

    <div class="loading" id="loading">
      <div class="loader"></div>
      <div class="loading-text">⚡ LOADING PHOTOS...</div>
    </div>

    <div class="gallery-grid" id="galleryGrid"></div>
  </section>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="imageModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Foto Detail</h3>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <img src="" alt="" id="modalImage">
      <div class="modal-actions">
        <button class="action-btn copy-btn" onclick="copyImage()">
          <i class="fas fa-copy"></i>
          <span>Copy Foto</span>
        </button>
        <button class="action-btn download-btn" onclick="downloadModalImage()">
          <i class="fas fa-download"></i>
          <span>Download</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast">
  <i class="fas fa-bolt"></i>
  <span id="toastText">Berhasil!</span>
</div>

<script>
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  initRippleEffect();
  if (document.getElementById('gallery')) fetchPhotosFromSheet();
});

// ✨ PARTICLE SYSTEM
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  const colors = ['#00f5ff', '#00d9ff', '#9d4edd', '#ff00cc', '#00ffa3'];
  
  for(let i = 0; i < 70; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = Math.random() * 30 + 's';
    p.style.animationDuration = (20 + Math.random() * 30) + 's';
    p.style.width = (2 + Math.random() * 4) + 'px';
    p.style.height = p.style.width;
    container.appendChild(p);
  }
}

// ✨ RIPPLE EFFECT ON CLICK
function initRippleEffect() {
  document.addEventListener('click', (e) => {
    if (e.target.closest('.action-btn, .nav-tab, .btn, .modal-close')) {
      const btn = e.target.closest('.action-btn, .nav-tab, .btn, .modal-close');
      const rect = btn.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.left = (e.clientX - rect.left) + 'px';
      ripple.style.top = (e.clientY - rect.top) + 'px';
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    }
  });
}

// 📡 FETCH PHOTOS
async function fetchPhotosFromSheet() {
  document.getElementById('loading').classList.add('active');
  document.getElementById('galleryGrid').innerHTML = '';
  
  try {
    const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
    const gid = '1246502038';
    
    try {
      const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
      const response = await fetch(gvizUrl);
      const text = await response.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      parseRows(json.table.rows);
    } catch (e) {
      console.log('GVIZ failed, trying CSV...', e);
      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
      const csvResponse = await fetch(csvUrl);
      const csvText = await csvResponse.text();
      const csvRows = csvText.split('\n').map(row => row.split(','));
      parseCSVRows(csvRows);
    }
    
    renderGallery(allPhotos);
    showToast(`⚡ Berhasil memuat ${allPhotos.length} foto`);
  } catch (error) {
    console.error('Error:', error);
    showToast('❗ Gagal mengambil data');
    document.getElementById('galleryGrid').innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-secondary);">
        <i class="fas fa-exclamation-triangle" style="font-size: 52px; color: var(--neon-pink); margin-bottom: 22px; text-shadow: 0 0 25px rgba(255,0,204,0.6);"></i>
        <h3 style="font-family: 'Orbitron'; color: var(--neon-electric); margin-bottom: 12px; font-size: 18px;">Gagal Memuat Foto</h3>
        <p style="opacity: 0.8;">Pastikan Google Sheets sudah dipublikasikan</p>
      </div>
    `;
  }
  document.getElementById('loading').classList.remove('active');
}

function parseRows(rows) {
  allPhotos = [];
  rows.forEach((row, index) => {
    const c = row.c;
    if (!c) return;
    const judul = c[0] ? (c[0].v || '') : '';
    const foto = c[1] ? (c[1].v || '') : '';
    if (judul && foto) allPhotos.push({ judul, foto, index: index + 2 });
  });
}

function parseCSVRows(rows) {
  allPhotos = [];
  rows.forEach((row, index) => {
    if (row.length < 2) return;
    const judul = row[0] ? row[0].replace(/"/g, '').trim() : '';
    const foto = row[1] ? row[1].replace(/"/g, '').trim() : '';
    if (judul && foto) allPhotos.push({ judul, foto, index: index + 2 });
  });
}

// 🖼️ RENDER GALLERY
function renderGallery(photos) {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';
  
  if (photos.length === 0) {
    grid.innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-secondary);">
        <i class="fas fa-search" style="font-size: 52px; margin-bottom: 22px; opacity: 0.6; text-shadow: 0 0 25px rgba(0,245,255,0.5);"></i>
        <h3 style="font-family: 'Orbitron'; color: var(--neon-electric); margin-bottom: 12px; font-size: 18px;">Tidak Ada Foto</h3>
        <p style="opacity: 0.8;">Tidak ada foto yang sesuai dengan pencarian</p>
      </div>
    `;
    return;
  }
  
  photos.forEach((photo, idx) => {
    const card = createPhotoCard(photo.foto, photo.judul, idx);
    grid.appendChild(card);
  });
}

// 🎴 CREATE CARD
function createPhotoCard(url, title, index) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.innerHTML = `
    <div class="photo-wrapper">
      <img src="${url}" alt="${title}" 
           onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00f5ff?text=No+Image'" 
           loading="lazy" 
           onclick="viewFullImage('${url}', '${title.replace(/'/g, "\\'")}')" 
           style="cursor: pointer;">
    </div>
    <div class="photo-info">
      <div class="photo-title">${title}</div>
      <div class="photo-meta">Foto #${index + 1}</div>
      <div class="action-buttons-row">
        <button class="action-btn copy-btn" onclick="copyPhoto('${url}')" title="Copy Foto">
          <i class="fas fa-copy"></i>
          <span>Copy</span>
        </button>
        <button class="action-btn download-btn" onclick="downloadPhoto('${url}', '${title.replace(/'/g, "\\'")}')" title="Download">
          <i class="fas fa-download"></i>
          <span>Download</span>
        </button>
      </div>
    </div>
  `;
  return card;
}

// 🔍 SEARCH
function searchPhotos() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!term) { renderGallery(allPhotos); return; }
  const filtered = allPhotos.filter(p => p.judul.toLowerCase().includes(term));
  renderGallery(filtered);
  if (filtered.length > 0) showToast(`⚡ Ditemukan ${filtered.length} foto`);
}

// 🖼️ MODAL FUNCTIONS
function viewFullImage(url, title) {
  currentImageUrl = url;
  currentImageTitle = title;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalImage').src = url;
  document.getElementById('imageModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('imageModal').classList.remove('active');
  document.body.style.overflow = '';
  currentImageUrl = '';
  currentImageTitle = '';
}

// 📋 COPY & DOWNLOAD
async function copyPhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto berhasil disalin!');
  } catch (e) {
    showToast('❗ Klik kanan pada foto > Copy Image');
  }
}

async function copyImage() {
  if (currentImageUrl) await copyPhoto(currentImageUrl);
}

function downloadPhoto(url, filename) {
  const link = document.createElement('a');
  link.href = url;
  link.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
  link.target = '_blank';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('⚡ Download dimulai...');
}

function downloadModalImage() {
  if (currentImageUrl && currentImageTitle) {
    downloadPhoto(currentImageUrl, currentImageTitle);
  }
}

// 🔔 TOAST
function showToast(message) {
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3800);
}

// 🎯 EVENT LISTENERS
document.getElementById('imageModal')?.addEventListener('click', (e) => {
  if (e.target.id === 'imageModal') closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>

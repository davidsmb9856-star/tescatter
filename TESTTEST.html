<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE TOGEL - Bonus Event [SCAN PRO]</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
--bg-dark: #020810;
--bg-card: #061420;
--bg-input: #0a1e30;
--neon-blue: #00d4ff;
--neon-cyan: #00fff7;
--neon-glow: rgba(0, 212, 255, 0.4);
--accent-green: #00ff88;
--accent-red: #ff4757;
--accent-orange: #ff9f43;
--border-color: rgba(0, 212, 255, 0.3);
--text-primary: #e0f4ff;
--text-muted: #6b8fa8;
--scan-glow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-blue), 0 0 40px rgba(0,255,247,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-dark);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
}
.bg-animated {
position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
radial-gradient(ellipse at 50% 50%, rgba(0, 180, 255, 0.03) 0%, transparent 70%),
var(--bg-dark);
}
.bg-grid {
position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
background-size: 50px 50px;
animation: gridMove 20s linear infinite;
}
@keyframes gridMove {
0% { transform: translate(0, 0); }
100% { transform: translate(50px, 50px); }
}
.particle {
position: fixed; width: 4px; height: 4px; background: var(--neon-blue);
border-radius: 50%; pointer-events: none; z-index: -1;
box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
animation: floatParticle 15s infinite linear; opacity: 0.6;
}
@keyframes floatParticle {
0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
10% { opacity: 0.6; } 90% { opacity: 0.6; }
100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}
.judul-glow {
font-family: 'Orbitron', sans-serif; font-size: clamp(1.5rem, 4vw, 2.2rem);
font-weight: 900; text-align: center; color: var(--neon-cyan);
letter-spacing: 3px; margin-bottom: 10px;
text-shadow: 0 0 30px rgba(0, 255, 247, 0.3), 0 0 60px rgba(0,212,255,0.2);
animation: pulseGlow 3s ease-in-out infinite;
}
@keyframes pulseGlow {
0%, 100% { text-shadow: 0 0 30px rgba(0,255,247,0.3), 0 0 60px rgba(0,212,255,0.2); }
50% { text-shadow: 0 0 50px rgba(0,255,247,0.6), 0 0 100px rgba(0,212,255,0.4); }
}
.bonus-title {
font-family: 'Orbitron', sans-serif; font-size: clamp(1.2rem, 3vw, 1.8rem);
font-weight: 700; text-align: center; color: var(--neon-blue);
letter-spacing: 2px; margin-bottom: 20px;
}
.tab-content {
display: block; padding: 20px; max-width: 1400px; margin: 0 auto;
animation: fadeInUp 0.5s ease-out;
}
@keyframes fadeInUp {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}
.bonus-section {
background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.8) 100%);
border: 1px solid var(--border-color); border-radius: 20px;
padding: 25px; margin: 10px; backdrop-filter: blur(10px);
box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 212, 255, 0.1);
}
.neon-switch-btn {
font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px;
padding: 12px 20px;
background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
border: 1px solid var(--border-color); border-radius: 10px;
color: var(--neon-blue); cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
position: relative; overflow: hidden; letter-spacing: 0.5px;
}
.neon-switch-btn::before {
content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
transition: left 0.5s ease;
}
.neon-switch-btn:hover::before { left: 100%; }
.neon-switch-btn:hover {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
border-color: var(--neon-blue); transform: translateY(-2px);
box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}
.neon-switch-btn.active {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.3) 0%, rgba(0, 180, 255, 0.2) 100%);
border-color: var(--neon-cyan); color: var(--neon-cyan);
box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
}
.neon-switch-btn.danger { border-color: rgba(255, 71, 87, 0.4); color: var(--accent-red); }
.neon-switch-btn.danger:hover {
background: rgba(255, 71, 87, 0.2); border-color: var(--accent-red);
box-shadow: 0 5px 20px rgba(255, 71, 87, 0.3);
}
.neon-switch-btn.orange { border-color: rgba(255, 159, 67, 0.4); color: var(--accent-orange); }
.neon-switch-btn.orange:hover {
background: rgba(255, 159, 67, 0.2); border-color: var(--accent-orange);
box-shadow: 0 5px 20px rgba(255, 159, 67, 0.3);
}
.neon-switch-btn.scan-pro {
background: linear-gradient(135deg, rgba(0,255,136,0.15) 0%, rgba(0,212,255,0.1) 100%);
border-color: var(--accent-green); color: var(--accent-green);
box-shadow: 0 0 15px rgba(0,255,136,0.3);
}
.neon-switch-btn.scan-pro:hover {
background: linear-gradient(135deg, rgba(0,255,136,0.25) 0%, rgba(0,212,255,0.2) 100%);
box-shadow: 0 0 30px rgba(0,255,136,0.5);
}
.bonus-textarea {
width: 100%; min-height: 120px; background: var(--bg-input);
border: 1px solid var(--border-color); border-radius: 12px; padding: 15px;
color: var(--text-primary); font-family: 'Rajdhani', sans-serif;
font-size: 15px; font-weight: 500; resize: vertical; transition: all 0.3s ease;
}
.bonus-textarea:focus {
outline: none; border-color: var(--neon-blue);
box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}
.bonus-input {
width: 100%; background: var(--bg-input); border: 1px solid var(--border-color);
border-radius: 8px; padding: 10px 14px; color: var(--text-primary);
font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 500;
transition: all 0.3s ease;
}
.bonus-input:focus {
outline: none; border-color: var(--neon-blue);
box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
}
.bonus-input::placeholder { color: var(--text-muted); }
.bonus-label {
display: block; color: var(--neon-blue); font-weight: 700;
margin-bottom: 6px; font-size: 14px; letter-spacing: 0.5px;
}
.bonus-input-group { margin-bottom: 15px; }
.bonus-btn {
font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px;
padding: 12px 24px; background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
border: none; border-radius: 10px; color: var(--bg-dark); cursor: pointer;
transition: all 0.3s ease; letter-spacing: 0.5px;
}
.bonus-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4); }
.bonus-btn.danger { background: linear-gradient(135deg, var(--accent-red) 0%, #cc3344 100%); }
.bonus-btn.danger:hover { box-shadow: 0 8px 25px rgba(255, 71, 87, 0.4); }
.bonus-btn.orange { background: linear-gradient(135deg, var(--accent-orange) 0%, #e67e22 100%); }
.bonus-btn.orange:hover { box-shadow: 0 8px 25px rgba(255, 159, 67, 0.4); }
.bonus-btn.scan-enhanced {
background: linear-gradient(135deg, var(--accent-green) 0%, #00cc66 100%);
color: var(--bg-dark);
}
.bonus-btn.scan-enhanced:hover {
box-shadow: 0 8px 25px rgba(0,255,136,0.5);
transform: translateY(-2px) scale(1.02);
}
.bonus-button-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
.bonus-result {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 255, 136, 0.05) 100%);
border: 1px solid var(--border-color); border-radius: 12px; padding: 20px;
margin-top: 20px; font-size: 16px; font-weight: 600; line-height: 1.8; color: var(--text-primary);
}
.bonus-angka {
font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent-green); font-size: 1.1em;
}
.gallery-container { width: 100%; margin: 20px 0; }
.combined-image-slot {
width: 100%; display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
gap: 15px; padding: 20px;
background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(0, 180, 255, 0.02) 100%);
border: 1px solid var(--border-color); border-radius: 16px; cursor: pointer; transition: all 0.3s ease;
}
.combined-image-slot:hover { border-color: var(--neon-blue); box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); }
.combined-image-slot img {
width: calc(33.333% - 10px); min-width: 250px; max-width: 400px; height: auto;
aspect-ratio: 4/3; object-fit: cover; border-radius: 12px;
border: 2px solid var(--border-color); transition: all 0.3s ease;
box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
}
.combined-image-slot img:hover {
border-color: var(--neon-blue); transform: scale(1.02);
box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
}
.caption-userid {
font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700;
color: var(--neon-cyan); width: 100%; text-align: center; padding: 10px 0; letter-spacing: 2px;
}
.package-info {
font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600;
color: var(--neon-blue); text-align: center; margin-top: 15px;
}
.bonus-mode { animation: fadeIn 0.4s ease-out; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.scatter-card {
flex: 1; min-width: 280px;
background: linear-gradient(135deg, rgba(0, 30, 50, 0.8) 0%, rgba(6, 20, 32, 0.6) 100%);
padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); transition: all 0.3s ease;
}
.scatter-card:hover { border-color: var(--neon-blue); box-shadow: 0 5px 25px rgba(0, 212, 255, 0.15); }
.scatter-card-title {
color: var(--neon-cyan); margin: 0 0 12px 0; font-size: 16px;
font-family: 'Orbitron', sans-serif; font-weight: 700;
}
.modal-overlay {
position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
background: rgba(2, 8, 16, 0.98); z-index: 10000; display: none;
flex-direction: column; justify-content: center; align-items: center; padding: 20px;
animation: modalFadeIn 0.3s ease-out;
}
@keyframes modalFadeIn {
from { opacity: 0; backdrop-filter: blur(0); }
to { opacity: 1; backdrop-filter: blur(10px); }
}
.modal-close {
position: absolute; top: 15px; right: 25px; font-size: 40px; color: var(--neon-blue);
background: none; border: none; cursor: pointer; transition: all 0.3s ease; line-height: 1;
}
.modal-close:hover { color: var(--neon-cyan); transform: rotate(90deg); text-shadow: 0 0 20px var(--neon-cyan); }
.zoom-nav-button {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.2) 0%, rgba(0, 180, 255, 0.1) 100%);
border: 1px solid var(--neon-blue); color: var(--neon-cyan);
padding: 15px 25px; border-radius: 10px; cursor: pointer;
font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; transition: all 0.3s ease;
}
.zoom-nav-button:hover { background: rgba(0, 212, 255, 0.3); box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3); }
.zoom-nav-button:disabled { opacity: 0.3; cursor: not-allowed; }
.zoomed-content-wrapper {
display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: center; max-width: 95%;
}
.zoomed-content-wrapper img {
max-width: 30%; min-width: 200px; max-height: 70vh; object-fit: contain;
border-radius: 12px; border: 2px solid var(--neon-blue);
box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
}
#scanScatter2Modal .modal-content {
display: flex; gap: 20px; max-width: 95vw; width: 100%; height: 85vh;
}
#scanScatter2Modal .image-section {
flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; min-width: 300px; position: relative;
}
#scanScatter2Modal .image-section img {
max-width: 100%; max-height: 60vh; object-fit: contain; border-radius: 12px;
box-shadow: var(--scan-glow); transition: transform 0.2s ease;
}
#scanScatter2Modal .image-section img.zoomed {
transform: scale(1.5); cursor: zoom-out;
}
#scanScatter2Modal .result-section {
flex: 1; min-width: 300px; max-width: 500px; overflow-y: auto; padding: 20px;
background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color);
}
.toast {
position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.95) 100%);
border: 1px solid var(--neon-blue); border-radius: 12px; padding: 15px 30px;
color: var(--text-primary); font-family: 'Rajdhani', sans-serif;
font-size: 16px; font-weight: 600; z-index: 99999; opacity: 0;
transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--accent-green); box-shadow: 0 10px 40px rgba(0,255,136,0.3); }
.toast.error { border-color: var(--accent-red); box-shadow: 0 10px 40px rgba(255,71,87,0.3); }
.copy-btn {
background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
color: var(--bg-dark); border: none; padding: 6px 12px; border-radius: 6px;
cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
transition: all 0.3s ease;
}
.copy-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4); }
.copy-btn.copied { background: var(--accent-green); }
.result-item {
margin-bottom: 12px; padding: 12px 15px;
background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(0, 180, 255, 0.05) 100%);
border: 1px solid rgba(0, 212, 255, 0.4); border-radius: 10px;
display: flex; justify-content: space-between; align-items: center; gap: 15px;
transition: all 0.3s ease;
}
.result-item:hover { border-color: var(--neon-blue); background: rgba(0, 212, 255, 0.2); }
.result-item.green {
background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(0, 200, 100, 0.05) 100%);
border-color: rgba(0, 255, 136, 0.4);
}
.result-item.green:hover { border-color: var(--accent-green); background: rgba(0, 255, 136, 0.15); }
.result-item span {
word-break: break-all; font-family: 'Orbitron', sans-serif; font-size: 14px; letter-spacing: 1px;
}
.input-with-buttons { display: flex; gap: 8px; align-items: center; }
.input-with-buttons .bonus-input { flex: 1; }
.input-with-buttons .bonus-btn { padding: 8px 12px; font-size: 14px; white-space: nowrap; }
#viewPhotoModal { z-index: 10001; }
#viewPhotoModal img {
max-width: 90%; max-height: 80vh; object-fit: contain; border-radius: 12px;
border: 2px solid var(--neon-blue); box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
}
/* === SCAN PRO ENHANCEMENTS === */
.scan-controls {
display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; padding: 12px;
background: rgba(0,212,255,0.05); border-radius: 10px; border: 1px solid var(--border-color);
}
.scan-control-btn {
padding: 6px 12px; font-size: 12px; border-radius: 6px;
background: rgba(0,212,255,0.1); border: 1px solid var(--border-color);
color: var(--neon-blue); cursor: pointer; transition: all 0.2s;
}
.scan-control-btn:hover, .scan-control-btn.active {
background: var(--neon-blue); color: var(--bg-dark);
}
.zoom-controls {
display: flex; align-items: center; gap: 10px; margin: 10px 0; padding: 10px;
background: rgba(0,255,136,0.05); border-radius: 10px; border: 1px solid rgba(0,255,136,0.3);
}
.zoom-slider {
flex: 1; -webkit-appearance: none; height: 6px; border-radius: 3px;
background: linear-gradient(90deg, var(--neon-blue), var(--accent-green));
outline: none; cursor: pointer;
}
.zoom-slider::-webkit-slider-thumb {
-webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
background: var(--neon-cyan); cursor: pointer;
box-shadow: 0 0 10px var(--neon-cyan);
}
.zoom-value {
font-family: 'Orbitron', sans-serif; font-size: 13px; color: var(--neon-cyan);
min-width: 50px; text-align: center;
}
.scan-progress {
width: 100%; height: 6px; background: rgba(0,212,255,0.1);
border-radius: 3px; overflow: hidden; margin: 10px 0;
}
.scan-progress-bar {
height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-blue), var(--accent-green));
transition: width 0.3s ease; box-shadow: 0 0 10px var(--neon-blue);
}
.scan-status {
font-size: 13px; color: var(--text-muted); text-align: center; margin: 5px 0;
}
.scan-status.scanning { color: var(--neon-cyan); animation: pulse 1s infinite; }
.scan-status.success { color: var(--accent-green); }
.scan-status.error { color: var(--accent-red); }
@keyframes pulse {
0%, 100% { opacity: 1; } 50% { opacity: 0.6; }
}
.scan-result-highlight {
background: linear-gradient(135deg, rgba(0,255,136,0.2) 0%, transparent 100%);
border-left: 3px solid var(--accent-green); padding: 8px 12px; margin: 5px 0;
border-radius: 0 8px 8px 0; font-family: 'Orbitron', sans-serif;
}
.editable-code {
background: var(--bg-input); border: 1px dashed var(--neon-blue);
border-radius: 6px; padding: 8px 12px; color: var(--accent-green);
font-family: 'Orbitron', sans-serif; font-size: 14px; width: 100%;
}
.editable-code:focus {
outline: none; border-style: solid; box-shadow: 0 0 15px rgba(0,255,136,0.3);
}
@media (max-width: 768px) {
.bonus-section { padding: 15px; margin: 5px; }
.neon-switch-btn { padding: 10px 15px; font-size: 13px; }
.combined-image-slot img { width: 100%; max-width: 100%; min-width: unset; }
.zoomed-content-wrapper img { max-width: 100%; min-width: unset; }
#scanScatter2Modal .modal-content { flex-direction: column; height: auto; }
#scanScatter2Modal .image-section,
#scanScatter2Modal .result-section { min-width: unset; max-width: 100%; width: 100%; }
.input-with-buttons { flex-wrap: wrap; }
.input-with-buttons .bonus-input { width: 100%; }
.input-with-buttons .bonus-btn { flex: 1; min-width: 80px; }
}
button:focus-visible, input:focus-visible, textarea:focus-visible {
outline: 2px solid var(--neon-blue); outline-offset: 2px;
}
@media (prefers-reduced-motion: reduce) {
* { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="bg-animated"></div>
<div class="bg-grid"></div>
<div id="particles"></div>
<div id="toast" class="toast"></div>

<!-- ================= TAB CEK BONUS EVENT ================= -->
<div id="cekBonusEventTab" class="tab-content">
<div class="bonus-section">
<h3 class="judul-glow">⚡ LINE TOGEL ⚡</h3>
<h2 class="bonus-title">🎁 BONUS EVENT [SCAN PRO]</h2>

<!-- ============ 3 SWITCH MODE BUTTON ============ -->
<div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 15px 0;">
<button class="neon-switch-btn" onclick="switchBonusMode('bonusAsli')" id="btn-bonusAsli">📊 Cek Bonus Asli</button>
<button class="neon-switch-btn" onclick="switchBonusMode('galeri')" id="btn-galeri">🖼️ CEK GAMBAR</button>
<button class="neon-switch-btn scan-pro" onclick="switchBonusMode('inputScatter')" id="btn-inputScatter">🔍 Input Scatter PRO</button>
</div>

<!-- ============ MODE 1: CEK BONUS ASLI ============ -->
<div id="modeBonusAsli" class="bonus-mode">
<textarea id="bonusTextarea" class="bonus-textarea" placeholder="Tempelkan data transaksi di sini..."></textarea>
<div class="bonus-input-group">
<label for="bonusPatokan" class="bonus-label">💰 Nilai Patokan:</label>
<input type="text" id="bonusPatokan" class="bonus-input" placeholder="Contoh: 5000000">
</div>
<div class="bonus-input-group">
<label for="bonusSurplus" class="bonus-label">📈 Nilai Surplus:</label>
<input type="text" id="bonusSurplus" class="bonus-input" placeholder="Contoh: 1500000">
</div>
<div class="bonus-button-group">
<button onclick="hitungBonusEvent()" class="bonus-btn">🧮 Hitung Bonus</button>
<button onclick="hapusBonusEvent()" class="bonus-btn danger">🗑️ Bersihkan</button>
</div>
<div id="bonusHasil" class="bonus-result"></div>
<div class="bonus-input-group" style="margin-top: 15px;">
<label for="imageUrl" class="bonus-label">🔗 Link Gambar Transaksi:</label>
<input type="text" id="imageUrl" class="bonus-input" placeholder="Tempel link gambar di sini...">

<script>
// ================= GLOBAL VARIABLES =================
let currentBonusMode = 'bonusAsli';
let currentDataIndex = 1;
let bonusAllPackagesData = [];
let bonusCurrentPackageIndex = 0;
const bonusPackageSize = 3;
let isBonusZoomOpen = false;
let imageList = [];
let currentImageIndex = 0;
let scatterZoomImages = [];
let scatterZoomIndex = 0;
let currentScatterDataIndex = 1;

// Scan PRO settings
let scanSettings = {
zoom: 100,
contrast: false,
grayscale: false,
sharpen: false,
originalUrl: '',
currentIndex: 1
};

// ================= INITIALIZATION =================
function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
container.innerHTML = '';
for (let i = 0; i < 25; i++) {
const particle = document.createElement('div');
particle.className = 'particle';
particle.style.left = Math.random() * 100 + '%';
particle.style.animationDelay = Math.random() * 15 + 's';
particle.style.animationDuration = (15 + Math.random() * 10) + 's';
container.appendChild(particle);
}
}

function showToast(message, type = '') {
const toast = document.getElementById('toast');
if (!toast) return;
toast.textContent = message;
toast.className = 'toast show';
if (type) toast.classList.add(type);
setTimeout(() => {
toast.classList.remove('show');
toast.className = 'toast';
}, 3500);
}

// ================= MODE SWITCHING =================
function switchBonusMode(mode) {
['modeBonusAsli', 'modeGaleri', 'modeInputScatter'].forEach(id => {
const el = document.getElementById(id);
if (el) el.style.display = (id === 'mode' + mode.charAt(0).toUpperCase() + mode.slice(1)) ? 'block' : 'none';
});
['bonusAsli', 'galeri', 'inputScatter'].forEach(id => {
const btn = document.getElementById('btn-' + id);
if (btn) btn.classList.toggle('active', id === mode);
});
currentBonusMode = mode;
}

// ================= SCAN PRO FUNCTIONS =================
function updateScanZoom(value) {
const img = document.getElementById('scanScatter2Image');
if (img) {
img.style.transform = `scale(${value/100})`;
document.getElementById('scanZoomValue').textContent = value + '%';
scanSettings.zoom = value;
}
}

function resetScanZoom() {
scanSettings.zoom = 100;
updateScanZoom(100);
document.getElementById('scanZoomSlider').value = 100;
}

function toggleImageZoom(img) {
img.classList.toggle('zoomed');
if (img.classList.contains('zoomed')) {
scanSettings.zoom = 150;
document.getElementById('scanZoomSlider').value = 150;
document.getElementById('scanZoomValue').textContent = '150%';
} else {
resetScanZoom();
}
}

function toggleScanFilter(filter) {
const btn = document.getElementById('btn' + filter.charAt(0).toUpperCase() + filter.slice(1));
const img = document.getElementById('scanScatter2Image');
if (!img) return;

scanSettings[filter] = !scanSettings[filter];
btn.classList.toggle('active', scanSettings[filter]);

let filters = [];
if (scanSettings.contrast) filters.push('contrast(1.3)');
if (scanSettings.grayscale) filters.push('grayscale(100%)');
if (scanSettings.sharpen) filters.push('drop-shadow(0 0 1px rgba(255,255,255,0.5))');
img.style.filter = filters.join(' ') || 'none';
}

function rescanWithSettings() {
if (!scanSettings.originalUrl) {
showToast("Tidak ada gambar untuk di-scan ulang", "error");
return;
}
scanScatter2(scanSettings.currentIndex, true);
}

// ================= VIEW ALL 3 SCATTER PHOTOS =================
function viewAllScatterPhotos(dataIndex) {
currentScatterDataIndex = dataIndex;
const s1 = document.getElementById('bonusScatter1_' + dataIndex).value.trim();
const s2 = document.getElementById('bonusScatter2_' + dataIndex).value.trim();
const s3 = document.getElementById('bonusScatter3_' + dataIndex).value.trim();

scatterZoomImages = [s1, s2, s3].filter(link => link && link.startsWith('http'));

if (scatterZoomImages.length === 0) {
showToast("⚠️ Tidak ada link gambar yang valid!", "error");
return;
}

scatterZoomIndex = 0;
updateScatterZoomDisplay();

const modal = document.getElementById('scatterZoomModal');
const title = document.getElementById('scatterZoomTitle');
const caption = document.getElementById('scatterZoomCaption');

if (title) title.textContent = `🖼️ Lihat ${scatterZoomImages.length} Foto - Data ${dataIndex}`;
if (caption) caption.textContent = `💡 Klik gambar untuk zoom • Gunakan Prev/Next atau panah keyboard`;
if (modal) modal.style.display = 'flex';
}

function updateScatterZoomDisplay() {
const wrapper = document.getElementById('scatterZoomContent');
if (!wrapper) return;
wrapper.innerHTML = '';
scatterZoomImages.forEach((link, idx) => {
const img = document.createElement('img');
img.src = link;
img.alt = `Scatter ${idx + 1}`;
img.style.cssText = 'max-width: 30%; min-width: 200px; max-height: 70vh; object-fit: contain; border-radius: 12px; border: 2px solid var(--neon-blue); box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); cursor: zoom-in; transition: transform 0.2s;';
img.onclick = (e) => { e.stopPropagation(); openLightboxScatter(img); };
img.onmouseenter = () => img.style.transform = 'scale(1.03)';
img.onmouseleave = () => img.style.transform = 'scale(1)';
wrapper.appendChild(img);
});
}

function closeScatterZoom() {
const modal = document.getElementById('scatterZoomModal');
const wrapper = document.getElementById('scatterZoomContent');
if (modal) modal.style.display = 'none';
if (wrapper) wrapper.innerHTML = '';
scatterZoomImages = [];
scatterZoomIndex = 0;
}

function openLightboxScatter(imgElement) {
imageList = [...scatterZoomImages];
currentImageIndex = imageList.indexOf(imgElement.src);
const lightboxImage = document.getElementById("lightboxImage");
if (lightboxImage) lightboxImage.src = imgElement.src;
const lightboxModal = document.getElementById("lightboxModal");
if (lightboxModal) lightboxModal.style.display = 'flex';
}

function prevScatterImage() {
if (scatterZoomImages.length <= 1) return;
showToast("💡 Gunakan modal lightbox untuk navigasi per gambar");
}

function nextScatterImage() {
if (scatterZoomImages.length <= 1) return;
showToast("💡 Gunakan modal lightbox untuk navigasi per gambar");
}

// ================= SCAN SCATTER 2 PRO (ENHANCED OCR) =================
function scanScatter2(index, isRescan = false) {
currentDataIndex = index;
scanSettings.currentIndex = index;
const link = document.getElementById('bonusScatter2_' + index).value.trim();

if (!link) { showToast("⚠️ Masukkan link gambar Scatter 2!", "error"); return; }

const img = document.getElementById('scanScatter2Image');
const resultDiv = document.getElementById('scanScatter2Result');
const progress = document.getElementById('scanProgressBar');
const progressFill = document.getElementById('scanProgressFill');
const status = document.getElementById('scanStatus');
const modal = document.getElementById('scanScatter2Modal');

// Reset settings for new scan
if (!isRescan) {
scanSettings.originalUrl = link;
scanSettings.contrast = false;
scanSettings.grayscale = false;
scanSettings.sharpen = false;
scanSettings.zoom = 100;
document.getElementById('btnContrast')?.classList.remove('active');
document.getElementById('btnGrayscale')?.classList.remove('active');
document.getElementById('btnSharpen')?.classList.remove('active');
resetScanZoom();
}

if (img) {
img.src = link;
img.style.filter = 'none';
img.style.transform = 'scale(1)';
}
if (modal) modal.style.display = 'flex';
if (resultDiv) resultDiv.innerHTML = '';
if (progress) progress.style.display = 'block';
if (progressFill) progressFill.style.width = '0%';
if (status) {
status.textContent = '🔄 Memuat Tesseract.js...';
status.className = 'scan-status scanning';
}

// Check Tesseract availability
if (typeof Tesseract === 'undefined') {
if (status) {
status.textContent = '❌ Tesseract.js belum dimuat. Tunggu sebentar...';
status.className = 'scan-status error';
}
setTimeout(() => {
if (typeof Tesseract !== 'undefined') {
scanScatter2(index, isRescan);
} else {
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--accent-red); font-weight: 700;">⚠️ Gagal memuat OCR engine.</span>';
}
}, 2000);
return;
}

// Start OCR with enhanced configuration
Tesseract.recognize(link, 'eng', {
logger: m => {
if (m.status === 'recognizing text' && progressFill) {
progressFill.style.width = Math.round(m.progress * 100) + '%';
}
}
})
.then(({ data: { text, lines, words } }) => {
if (progress) progress.style.display = 'none';
if (status) {
status.textContent = '✅ Scan selesai!';
status.className = 'scan-status success';
}

// Enhanced text processing for transaction codes
const rawLines = text.split('\n').map(line => line.trim()).filter(line => line.length > 2);
let hasilGabung = [], hasilLangsung = [], allNumbers = [];

// Method 1: Advanced pattern matching for transaction codes
for (let i = 0; i < rawLines.length; i++) {
const line = rawLines[i];
// Match 8-12 digit numbers (common transaction code format)
const matches = line.match(/\b\d{8,12}\b/g);
if (matches) {
matches.forEach(num => {
// Filter out obvious false positives (years, phone numbers with country code)
if (!num.startsWith('08') && !num.startsWith('62') && num.length >= 8 && num.length <= 12) {
allNumbers.push(num);
}
});
// Check for split numbers across lines
if (i + 1 < rawLines.length) {
const nextLine = rawLines[i + 1].trim();
const nextMatch = nextLine.match(/\b\d{4,8}\b/);
if (nextMatch && matches[0].length + nextMatch[0].length >= 8 && matches[0].length + nextMatch[0].length <= 12) {
hasilGabung.push(matches[0] + nextMatch[0]);
i++;
}
}
}
}

// Method 2: Word-level analysis for better accuracy
if (words && words.length > 0) {
words.forEach(w => {
const text = w.text.trim();
const numMatch = text.match(/\d{8,12}/);
if (numMatch && !numMatch[0].startsWith('08') && !numMatch[0].startsWith('62')) {
hasilLangsung.push(numMatch[0]);
}
});
}

// Deduplicate and sort results
hasilGabung = [...new Set(hasilGabung)];
hasilLangsung = [...new Set(hasilLangsung)];
allNumbers = [...new Set(allNumbers)];

// Display results
if (resultDiv) resultDiv.innerHTML = "";

// Show best matches first (combined results)
if (allNumbers.length > 0) {
const title = document.createElement("div");
title.innerHTML = '<b style="color: var(--accent-green); font-size: 16px;">✨ Kode Terdeteksi:</b>';
title.style.margin = "10px 0 8px";
resultDiv.appendChild(title);

allNumbers.forEach((kode, idx) => {
const div = document.createElement("div");
div.className = "result-item green";
div.innerHTML = `
<div style="display:flex; align-items:center; gap:10px; flex:1;">
<span class="scan-result-highlight" style="margin:0; font-size:16px;">${kode}</span>
<input type="text" class="editable-code" value="${kode}" placeholder="Edit jika perlu" style="max-width:150px;">
</div>
<div style="display:flex; gap:6px;">
<button onclick="copyWithFeedback(this, '${kode}')" class="copy-btn">📋</button>
<button onclick="pilihKodeTransaksi('${kode}')" class="copy-btn" style="background: var(--accent-green);">✓ Pilih</button>
</div>`;
resultDiv.appendChild(div);
});
}

// Show alternative results
if (hasilGabung.length > 0 || hasilLangsung.length > 0) {
const altTitle = document.createElement("div");
altTitle.innerHTML = '<b style="color: var(--neon-blue); font-size: 14px; margin-top:15px; display:block;">🔍 Hasil Alternatif:</b>';
resultDiv.appendChild(altTitle);

[...hasilGabung, ...hasilLangsung].filter((v,i,a)=>a.indexOf(v)===i && !allNumbers.includes(v)).forEach(kode => {
const div = document.createElement("div");
div.className = "result-item";
div.innerHTML = `
<span style="font-weight:600;">${kode}</span>
<div style="display:flex; gap:6px;">
<button onclick="copyWithFeedback(this, '${kode}')" class="copy-btn">📋</button>
<button onclick="pilihKodeTransaksi('${kode}')" class="copy-btn" style="background: var(--accent-green);">✓</button>
</div>`;
resultDiv.appendChild(div);
});
}

if (allNumbers.length === 0 && hasilGabung.length === 0 && hasilLangsung.length === 0) {
resultDiv.innerHTML = `
<div style="text-align:center; padding:20px;">
<span style="color: var(--accent-red); font-weight: 700; display:block; margin-bottom:10px;">⚠️ Tidak ditemukan kode transaksi</span>
<small style="color:var(--text-muted);">
💡 Tips:<br>
• Pastikan gambar jelas & tidak blur<br>
• Gunakan filter Contrast/B/W untuk teks samar<br>
• Zoom gambar sebelum scan untuk area kecil<br>
• Coba Re-Scan dengan pengaturan berbeda
</small>
</div>`;
}

showToast("✅ Scan selesai! " + (allNumbers.length > 0 ? allNumbers.length + " kode ditemukan" : "Coba gunakan filter untuk hasil lebih baik"), allNumbers.length > 0 ? "success" : "");

})
.catch(err => {
console.error(err);
if (progress) progress.style.display = 'none';
if (status) {
status.textContent = '❌ Gagal memindai gambar';
status.className = 'scan-status error';
}
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--accent-red); font-weight: 700;">⚠️ Gagal membaca gambar. Pastikan link valid dan gambar dapat diakses.</span>';
showToast("❌ Gagal scan: " + err.message, "error");
});
}

function copyWithFeedback(btn, text) {
navigator.clipboard.writeText(text).then(() => {
const original = btn.innerHTML;
btn.innerHTML = '✓';
btn.classList.add('copied');
showToast("📋 Disalin: " + text, "success");
setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 1200);
}).catch(() => showToast("❌ Gagal menyalin", "error"));
}

function pilihKodeTransaksi(kode) {
const input = document.getElementById('bonusKodeTransaksi' + currentDataIndex);
if (input) {
input.value = kode;
input.style.borderColor = 'var(--accent-green)';
input.style.boxShadow = '0 0 15px rgba(0,255,136,0.3)';
}
closeScanScatter2Modal();
showToast("✅ Kode untuk Data " + currentDataIndex + " dipilih: " + kode, "success");
}

function closeScanScatter2Modal() {
const modal = document.getElementById('scanScatter2Modal');
if (modal) modal.style.display = 'none';
// Reset scan state
scanSettings = { zoom: 100, contrast: false, grayscale: false, sharpen: false, originalUrl: '', currentIndex: 1 };
}

// ================= COPY FUNCTIONS =================
function prosesRekening(rek) {
const parts = rek.split(',').map(p => p.trim());
return { nomor: parts.slice(1).join(',') || '', nama: parts[0] || '' };
}

function getDataAs7Columns(prefix) {
const userid = document.getElementById('bonusUserid' + prefix).value.trim();
const s1 = document.getElementById('bonusScatter1_' + prefix).value.trim();
const s2 = document.getElementById('bonusScatter2_' + prefix).value.trim();
const s3 = document.getElementById('bonusScatter3_' + prefix).value.trim();
const rek = document.getElementById('bonusRekening' + prefix).value.trim();
const kode = document.getElementById('bonusKodeTransaksi' + prefix).value.trim();
let parts = [];
if (userid) parts.push(userid);
if (s1) parts.push(s1);
if (s2) parts.push(s2);
if (s3) parts.push(s3);
if (rek) {
const { nomor, nama } = prosesRekening(rek);
if (nomor) parts.push(nomor);
if (nama) parts.push(nama);
}
if (kode) parts.push(kode);
return parts.join('\t');
}

function copyData1() {
const data = getDataAs7Columns('1');
navigator.clipboard.writeText(data || '');
showToast(data ? "✅ Data 1 disalin!" : "⚠️ Data 1 kosong", data ? "success" : "");
}

function copyData2() {
const data = getDataAs7Columns('2');
navigator.clipboard.writeText(data || '');
showToast(data ? "✅ Data 2 disalin!" : "⚠️ Data 2 kosong", data ? "success" : "");
}

function copySemuaData() {
const data1 = getDataAs7Columns('1');
const data2 = getDataAs7Columns('2');
let lines = [];
if (data1 !== '') lines.push(data1);
if (data2 !== '') lines.push(data2);
const teks = lines.join('\n');
navigator.clipboard.writeText(teks);
showToast(teks ? "✅ Semua data valid disalin!" : "⚠️ Tidak ada data terisi", teks ? "success" : "");
}

function hapusSemuaData() {
['1','2'].forEach(p => {
['bonusUserid','bonusScatter1_','bonusScatter2_','bonusScatter3_','bonusRekening','bonusKodeTransaksi'].forEach(field => {
const el = document.getElementById(field + p);
if (el) el.value = '';
});
});
showToast("🗑️ Semua data dihapus");
}

// ================= HITUNG BONUS EVENT =================
function hitungBonusEvent() {
const isi = document.getElementById("bonusTextarea").value.trim();
const patokan = parseInt((document.getElementById("bonusPatokan").value || '').replace(/[^\d]/g, '')) || 0;
const surplus = parseInt((document.getElementById("bonusSurplus").value || '').replace(/[^\d]/g, '')) || 0;
if (!isi) { showToast("⚠️ Tempelkan data terlebih dahulu", "error"); return; }
const lines = isi.split("\n");
let total = 0, i = 0;
while (i < lines.length) {
if (lines[i].trim() === 'Credit' && i + 1 < lines.length) {
const amountMatch = lines[i + 1].trim().match(/IDR\s([\d,]+)/i);
if (amountMatch) {
const amount = parseFloat(amountMatch[1].replace(/,/g, ''));
if (!isNaN(amount)) total += amount;
}
}
i++;
}
const hasilDiv = document.getElementById("bonusHasil");
if (hasilDiv) {
let output = '<strong>💰 Total Hitungan:</strong> <span class="bonus-angka">IDR ' + total.toLocaleString("en-US") + '</span>';
if (patokan || surplus) {
const totalPengurang = patokan + surplus;
const selisih = total - totalPengurang;
const selisihColor = selisih >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
const selisihIcon = selisih >= 0 ? '📈' : '📉';
output += '<br><strong>📊 Patokan:</strong> <span class="bonus-angka">IDR ' + patokan.toLocaleString("en-US") + '</span>';
output += '<br><strong>📈 Surplus:</strong> <span class="bonus-angka">IDR ' + surplus.toLocaleString("en-US") + '</span>';
output += '<br><strong>➖ Total Dikurang:</strong> <span class="bonus-angka">IDR ' + totalPengurang.toLocaleString("en-US") + '</span>';
output += '<br><strong>' + selisihIcon + ' Selisih:</strong> <span class="bonus-angka" style="color:' + selisihColor + '">IDR ' + Math.abs(selisih).toLocaleString("en-US") + '</span>';
}
hasilDiv.innerHTML = output;
}
showToast("✅ Perhitungan selesai!", "success");
}

function hapusBonusEvent() {
["bonusTextarea","bonusPatokan","bonusSurplus","bonusHasil","imageUrl"].forEach(id => {
const el = document.getElementById(id);
if (el) { if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') el.value = ""; else el.innerHTML = ""; }
});
showToast("🗑️ Form berhasil dibersihkan");
}

// ================= GALERI OTOMATIS =================
let bonusInputTimeout;
function handleBonusInput() {
clearTimeout(bonusInputTimeout);
bonusInputTimeout = setTimeout(loadBonusImages, 50);
}

function loadBonusImages() {
const inputEl = document.getElementById('bonusLinkInput');
if (!inputEl) return;
const input = inputEl.value || '';
const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
bonusAllPackagesData = [];
lines.forEach(line => {
const words = line.split(/\s+/).filter(w => w.length > 0);
const urls = words.filter(w => /^https?:\/\//.test(w));
const userid = words.length > 0 && !/^https?:\/\//.test(words[0]) ? words[0] : 'N/A';
if (urls.length >= 1) {
const links = [...urls.slice(0, bonusPackageSize)];
while (links.length < bonusPackageSize) links.push('');
bonusAllPackagesData.push({ userid, links });
}
});
const maxNumEl = document.getElementById('bonusMaxPackageNum');
if (maxNumEl) maxNumEl.textContent = bonusAllPackagesData.length;
if (bonusAllPackagesData.length > 0) {
bonusCurrentPackageIndex = Math.max(0, Math.min(bonusCurrentPackageIndex, bonusAllPackagesData.length - 1));
updateBonusGallery(bonusCurrentPackageIndex);
} else {
updateBonusGallery(-1);
const currentNumEl = document.getElementById('bonusCurrentPackageNum');
if (currentNumEl) currentNumEl.textContent = '0';
}
}

function updateBonusGallery(index) {
const slots = ['bonusImgSlot1', 'bonusImgSlot2', 'bonusImgSlot3'].map(id => document.getElementById(id));
const combined = document.getElementById('bonusCombinedImageSlot');
const useridEl = document.getElementById('bonusCombinedSlotUserid');
const currentNumEl = document.getElementById('bonusCurrentPackageNum');
if (index >= 0 && index < bonusAllPackagesData.length) {
const { userid, links } = bonusAllPackagesData[index];
if (useridEl) useridEl.textContent = '👤 ' + userid;
if (combined) { combined.style.opacity = '1'; combined.style.pointerEvents = 'auto'; }
slots.forEach((img, i) => {
if (!img) return;
img.src = links[i] || "https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=-";
img.style.display = 'inline-block';
});
if (currentNumEl) currentNumEl.textContent = index + 1;
} else {
if (useridEl) useridEl.textContent = '✨ Belum Ada Data';
if (combined) { combined.style.opacity = '0.4'; combined.style.pointerEvents = 'none'; }
slots.forEach((img, i) => {
if (!img) return;
img.src = "https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=-";
img.style.display = 'inline-block';
});
if (currentNumEl) currentNumEl.textContent = '0';
}
}

function navigateBonusPackage(dir) {
if (bonusAllPackagesData.length <= 1) return;
const total = bonusAllPackagesData.length;
if (dir === 'next' && bonusCurrentPackageIndex < total - 1) bonusCurrentPackageIndex++;
else if (dir === 'prev' && bonusCurrentPackageIndex > 0) bonusCurrentPackageIndex--;
updateBonusGallery(bonusCurrentPackageIndex);
if (isBonusZoomOpen) {
const pkg = bonusAllPackagesData[bonusCurrentPackageIndex];
updateBonusZoomDisplay(pkg.userid, pkg.links);
}
}

function updateBonusZoomDisplay(userid, links) {
const wrapper = document.getElementById('bonusZoomedContentWrapper');
const useridEl = document.getElementById('bonusZoomedUserid');
if (!wrapper) return;
wrapper.innerHTML = '';
links.filter(Boolean).forEach(link => {
const img = document.createElement('img');
img.src = link;
img.style.cssText = 'max-width: 30%; min-width: 200px; max-height: 70vh; object-fit: contain; border-radius: 12px; border: 2px solid var(--neon-blue); box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); cursor: zoom-in; transition: transform 0.2s;';
img.onclick = (e) => { e.stopPropagation(); openLightbox(img); };
img.onmouseenter = () => img.style.transform = 'scale(1.03)';
img.onmouseleave = () => img.style.transform = 'scale(1)';
wrapper.appendChild(img);
});
if (useridEl) useridEl.textContent = '👤 ' + userid;
const prevBtn = document.getElementById('bonusPrevZoomBtn');
const nextBtn = document.getElementById('bonusNextZoomBtn');
const index = bonusCurrentPackageIndex;
const total = bonusAllPackagesData.length;
if (prevBtn) prevBtn.disabled = (index <= 0);
if (nextBtn) nextBtn.disabled = (index >= total - 1);
}

function openBonusZoom() {
if (bonusAllPackagesData.length === 0) return;
const current = bonusAllPackagesData[bonusCurrentPackageIndex];
if (!current.links.some(l => l)) return;
isBonusZoomOpen = true;
updateBonusZoomDisplay(current.userid, current.links);
const modal = document.getElementById('bonusZoomModal');
if (modal) modal.style.display = 'flex';
}

function closeBonusZoom() {
const modal = document.getElementById('bonusZoomModal');
if (modal) modal.style.display = 'none';
isBonusZoomOpen = false;
}

function clearBonusAllData() {
bonusAllPackagesData = [];
const inputEl = document.getElementById('bonusLinkInput');
if (inputEl) inputEl.value = '';
updateBonusGallery(-1);
const maxNumEl = document.getElementById('bonusMaxPackageNum');
if (maxNumEl) maxNumEl.textContent = '0';
showToast("🗑️ Semua data galeri dihapus");
}

// ================= ZOOM & LIGHTBOX =================
function closeZoom() {
['zoomModal','zoomedImage','imageUrl','kodeHasilZoom'].forEach(id => {
const el = document.getElementById(id);
if (el) { if (el.tagName === 'IMG' || el.tagName === 'INPUT') el.src = el.value = ''; else el.innerHTML = ''; }
});
}

function openLightbox(imgElement) {
imageList = Array.from(document.querySelectorAll("#bonusCombinedImageSlot img")).filter(img => img.style.display !== "none").map(img => img.src);
currentImageIndex = imageList.indexOf(imgElement.src);
const lightboxImage = document.getElementById("lightboxImage");
if (lightboxImage) lightboxImage.src = imgElement.src;
const lightboxModal = document.getElementById("lightboxModal");
if (lightboxModal) lightboxModal.style.display = 'flex';
}

function closeLightbox() {
const lightboxModal = document.getElementById("lightboxModal");
const lightboxImage = document.getElementById("lightboxImage");
if (lightboxModal) lightboxModal.style.display = 'none';
if (lightboxImage) lightboxImage.src = '';
}

function nextImage() {
if (imageList.length === 0) return;
currentImageIndex = (currentImageIndex + 1) % imageList.length;
const lightboxImage = document.getElementById("lightboxImage");
if (lightboxImage) lightboxImage.src = imageList[currentImageIndex];
}

function prevImage() {
if (imageList.length === 0) return;
currentImageIndex = (currentImageIndex - 1 + imageList.length) % imageList.length;
const lightboxImage = document.getElementById("lightboxImage");
if (lightboxImage) lightboxImage.src = imageList[currentImageIndex];
}

// ================= KEYBOARD SUPPORT =================
document.addEventListener('keydown', (e) => {
// Close modals with Escape
if (e.key === 'Escape') {
[closeBonusZoom, closeScatterZoom, closeScanScatter2Modal, closeLightbox, closeZoom].forEach(fn => fn());
return;
}

// Navigate gallery with arrow keys
if (isBonusZoomOpen && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
e.preventDefault();
navigateBonusPackage(e.key === 'ArrowLeft' ? 'prev' : 'next');
}

// Navigate lightbox with arrow keys
if (document.getElementById('lightboxModal')?.style.display === 'flex') {
if (e.key === 'ArrowLeft') { e.preventDefault(); prevImage(); }
if (e.key === 'ArrowRight') { e.preventDefault(); nextImage(); }
}
});

// Close modals when clicking overlay
document.querySelectorAll('.modal-overlay').forEach(modal => {
modal.addEventListener('click', (e) => {
if (e.target === modal) {
modal.style.display = 'none';
if (modal.id === 'bonusZoomModal') isBonusZoomOpen = false;
if (modal.id === 'scanScatter2Modal') {
scanSettings = { zoom: 100, contrast: false, grayscale: false, sharpen: false, originalUrl: '', currentIndex: 1 };
}
}
});
});

// ================= INITIALIZE =================
document.addEventListener('DOMContentLoaded', function() {
createParticles();
switchBonusMode('bonusAsli');
console.log('✨ LINE TOGEL Scan PRO loaded - OCR Enhanced v2.0');
});
</script>

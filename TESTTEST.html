<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1a2e">
<title>⚡ LINE TOGEL | Foto Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ✨ ULTRA MODERN BLUE COOL THEME ✨ */
:root {
/* Blue Cool Spectrum */
--blue-50: #e6f4ff;
--blue-100: #b8d9ff;
--blue-200: #8ac0ff;
--blue-300: #5ca6ff;
--blue-400: #3e8cff;
--blue-500: #2563eb;
--blue-600: #1a4bc5;
--blue-700: #113399;
--blue-800: #0a1f6b;
--blue-900: #06133d;
--blue-950: #030b24;

--cyan-400: #22d3ee;
--cyan-500: #06b6d4;
--purple-500: #8b5cf6;
--green-500: #10b981;
--pink-500: #ec4899;

/* Background */
--bg-base: #060d1e;
--bg-surface: #0b1428;
--bg-card: rgba(11, 20, 40, 0.85);
--bg-glass: rgba(11, 20, 40, 0.75);
--bg-glass-heavy: rgba(11, 20, 40, 0.92);
--bg-raised: rgba(18, 30, 62, 0.90);

/* Text */
--text-primary: #f0f7ff;
--text-secondary: #9fb8d8;
--text-tertiary: #6480a6;
--text-muted: #3f5578;
--text-accent: var(--cyan-400);

/* Borders */
--border-subtle: rgba(59, 130, 246, 0.25);
--border-glow: rgba(34, 211, 238, 0.55);
--border-active: rgba(66, 153, 225, 0.9);

/* Glow Effects */
--glow-sm: 0 0 15px rgba(34, 211, 238, 0.3);
--glow-md: 0 0 25px rgba(34, 211, 238, 0.45), 0 0 55px rgba(34, 211, 238, 0.2);
--glow-lg: 0 0 40px rgba(34, 211, 238, 0.6), 0 0 90px rgba(34, 211, 238, 0.35);

/* Animations */
--ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
--ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
--ease-spring: cubic-bezier(0.5, 1.4, 0.3, 1);
--trans-fast: 200ms var(--ease-smooth);
--trans-norm: 350ms var(--ease-smooth);
--trans-slow: 600ms var(--ease-bounce);

/* Sizes */
--r-sm: 8px;
--r-md: 12px;
--r-lg: 18px;
--r-xl: 24px;
--r-2xl: 36px;
--r-full: 999px;
}

/* Base Reset */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Plus Jakarta Sans', sans-serif;
background: var(--bg-base);
color: var(--text-primary);
min-height: 100vh; min-height: 100dvh;
line-height: 1.6;
overflow-x: hidden;
position: relative;
}

/* Background Effects */
.bg-gradient {
position: fixed; inset: 0; z-index: -10;
background: radial-gradient(1000px 600px at 15% 10%, rgba(59, 130, 246, 0.15) 0%, transparent 65%),
radial-gradient(800px 500px at 85% 25%, rgba(139, 92, 246, 0.12) 0%, transparent 70%),
radial-gradient(700px 400px at 40% 90%, rgba(34, 211, 238, 0.10) 0%, transparent 65%);
animation: bgShift 28s ease-in-out infinite alternate;
}
@keyframes bgShift {
0%, 100% { transform: translate(0, 0) scale(1); filter: hue-rotate(0deg); }
50% { transform: translate(-1%, 1.5%) scale(1.02); filter: hue-rotate(12deg); }
}

.grid-bg {
position: fixed; inset: 0; z-index: -9;
background: linear-gradient(rgba(34, 211, 238, 0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(34, 211, 238, 0.04) 1px, transparent 1px);
background-size: 60px 60px;
mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 80%);
animation: gridAnim 40s linear infinite;
pointer-events: none;
}
@keyframes gridAnim { 0% { background-position: 0 0; } 100% { background-position: 60px 60px; } }

.particles {
position: fixed; inset: 0; z-index: -8; pointer-events: none; overflow: hidden;
}
.particle {
position: absolute; width: 4px; height: 4px; border-radius: 50%;
background: var(--cyan-400); opacity: 0;
animation: floatParticle 30s infinite linear;
filter: blur(1px);
}
@keyframes floatParticle {
0%, 100% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
10%, 90% { opacity: 0.6; }
50% { opacity: 0.8; }
100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* ✨ NEW MODERN LAYOUT: SIDEBAR + MAIN ✨ */
.app-layout {
display: flex;
min-height: 100vh; min-height: 100dvh;
}

/* SIDEBAR NAVIGATION */
.sidebar {
width: 260px;
background: var(--bg-glass-heavy);
border-right: 1px solid var(--border-subtle);
backdrop-filter: blur(24px);
display: flex; flex-direction: column;
position: fixed; left: 0; top: 0; bottom: 0;
z-index: 100;
transform: translateX(0);
transition: transform var(--trans-norm);
}

.sidebar-header {
padding: 28px 24px 20px;
border-bottom: 1px solid var(--border-subtle);
}
.brand {
display: flex; align-items: center; gap: 14px;
margin-bottom: 24px;
}
.brand-icon {
width: 42px; height: 42px;
background: linear-gradient(135deg, var(--blue-400), var(--cyan-400));
border-radius: var(--r-md);
display: flex; align-items: center; justify-content: center;
font-size: 22px; color: var(--bg-base);
box-shadow: 0 4px 20px rgba(34, 211, 238, 0.5);
}
.brand-text { font-family: 'Space Grotesk', sans-serif; }
.brand-text h1 {
font-size: 18px; font-weight: 800;
background: linear-gradient(135deg, var(--blue-200), var(--cyan-400));
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.brand-text span {
font-size: 11px; color: var(--text-tertiary); letter-spacing: 1.5px; text-transform: uppercase;
}

.sidebar-nav {
flex: 1; padding: 18px 14px;
display: flex; flex-direction: column; gap: 6px;
}
.nav-item {
display: flex; align-items: center; gap: 12px;
padding: 13px 16px; border-radius: var(--r-md);
color: var(--text-secondary); font-weight: 600; font-size: 14px;
cursor: pointer; transition: var(--trans-fast);
background: transparent; border: none; width: 100%; text-align: left;
}
.nav-item i { width: 18px; text-align: center; font-size: 16px; transition: var(--trans-fast); }
.nav-item:hover { background: var(--bg-raised); color: var(--text-primary); transform: translateX(2px); }
.nav-item.active {
background: linear-gradient(135deg, rgba(34, 211, 238, 0.18), rgba(59, 130, 246, 0.14));
color: var(--cyan-400); border: 1px solid var(--border-glow);
box-shadow: var(--glow-sm);
}
.nav-item.active i { color: var(--cyan-400); transform: scale(1.15); }

.sidebar-footer {
padding: 20px 24px;
border-top: 1px solid var(--border-subtle);
}
.system-status {
display: flex; align-items: center; gap: 10px;
padding: 12px 16px; background: rgba(16, 185, 129, 0.1);
border: 1px solid rgba(16, 185, 129, 0.3); border-radius: var(--r-md);
}
.status-dot {
width: 8px; height: 8px; background: var(--green-500); border-radius: 50%;
animation: pulseDot 2s ease-in-out infinite;
box-shadow: 0 0 12px rgba(16, 185, 129, 0.7);
}
@keyframes pulseDot { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:0.8} }
.status-text { font-size: 11px; font-weight: 700; color: var(--green-500); letter-spacing: 1px; }

/* MAIN CONTENT */
.main-content {
flex: 1; margin-left: 260px; padding: 32px;
min-height: 100vh; min-height: 100dvh;
}

/* HEADER BAR */
.header-bar {
display: flex; align-items: center; justify-content: space-between;
gap: 20px; margin-bottom: 32px; flex-wrap: wrap;
}
.page-header h2 {
font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700;
color: var(--text-primary); margin-bottom: 6px;
}
.page-header p {
font-size: 14px; color: var(--text-tertiary);
}

.header-actions {
display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.search-wrapper {
position: relative; min-width: 260px;
}
.search-input {
width: 100%; padding: 12px 16px 12px 42px;
background: var(--bg-glass); border: 1px solid var(--border-subtle);
border-radius: var(--r-md); color: var(--text-primary); font-family: inherit; font-size: 14px;
transition: var(--trans-fast); backdrop-filter: blur(12px);
}
.search-input:focus { outline: none; border-color: var(--cyan-400); box-shadow: var(--glow-sm); background: var(--bg-raised); }
.search-icon {
position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
color: var(--text-tertiary); font-size: 16px; pointer-events: none; transition: var(--trans-fast);
}
.search-input:focus + .search-icon { color: var(--cyan-400); }

.icon-btn {
width: 44px; height: 44px; border-radius: var(--r-md);
background: var(--bg-glass); border: 1px solid var(--border-subtle);
color: var(--text-secondary); font-size: 18px;
display: flex; align-items: center; justify-content: center;
cursor: pointer; transition: var(--trans-fast); backdrop-filter: blur(12px);
}
.icon-btn:hover { background: var(--bg-raised); color: var(--cyan-400); border-color: var(--border-glow); box-shadow: var(--glow-sm); }

/* TOOLBAR */
.toolbar {
display: flex; align-items: center; justify-content: space-between; gap: 16px;
margin-bottom: 28px; padding: 14px 20px;
background: var(--bg-glass); border: 1px solid var(--border-subtle); border-radius: var(--r-lg);
backdrop-filter: blur(14px); flex-wrap: wrap;
}
.toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.view-switcher {
display: flex; background: var(--bg-surface); border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--border-subtle);
}
.view-btn {
padding: 10px 14px; background: transparent; border: none;
color: var(--text-tertiary); cursor: pointer; transition: var(--trans-fast);
display: flex; align-items: center; gap: 6px; font-family: inherit; font-size: 13px; font-weight: 600;
}
.view-btn:hover { color: var(--text-secondary); background: var(--bg-glass); }
.view-btn.active { background: rgba(34, 211, 238, 0.15); color: var(--cyan-400); }

.filter-select {
padding: 10px 34px 10px 14px; background: var(--bg-surface); border: 1px solid var(--border-subtle);
border-radius: var(--r-md); color: var(--text-primary); font-family: inherit; font-size: 13px; cursor: pointer;
appearance: none; background-image: url("image/svg+xml,%3Csvg fill='%2322d3ee' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
background-repeat: no-repeat; background-position: right 10px center; background-size: 16px;
transition: var(--trans-fast); backdrop-filter: blur(10px);
}
.filter-select:focus { outline: none; border-color: var(--cyan-400); box-shadow: var(--glow-sm); }

.toolbar-right {
display: flex; align-items: center; gap: 8px;
}
.result-count {
font-size: 13px; color: var(--text-tertiary); font-weight: 600;
padding: 8px 12px; background: var(--bg-surface); border-radius: var(--r-sm); border: 1px solid var(--border-subtle);
}

/* GALLERY GRID */
.gallery-section { animation: fadeSection var(--trans-slow) forwards; }
@keyframes fadeSection { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

.section-label {
font-size: 13px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px;
margin-bottom: 18px; display: flex; align-items: center; gap: 12px;
}
.section-label::before {
content: ''; width: 4px; height: 18px; background: linear-gradient(180deg, var(--cyan-400), var(--blue-500)); border-radius: 2px;
box-shadow: 0 0 8px rgba(34, 211, 238, 0.6);
}

.photo-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 22px;
}
.photo-grid.list-view {
grid-template-columns: 1fr;
}
.photo-grid.list-view .card {
flex-direction: row; height: 160px;
}
.photo-grid.list-view .card-media { width: 220px; height: 100%; }
.photo-grid.list-view .card-body { padding: 18px; flex: 1; }

/* CARD DESIGN */
.card {
background: var(--bg-card);
border: 1px solid var(--border-subtle);
border-radius: var(--r-xl);
overflow: hidden;
display: flex; flex-direction: column;
transition: all var(--trans-slow);
position: relative;
animation: cardUp 0.6s var(--ease-bounce) backwards;
}
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.1s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.2s; }
.card:nth-child(5) { animation-delay: 0.25s; }
@keyframes cardUp { from { opacity: 0; transform: translateY(25px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

.card::after {
content: ''; position: absolute; inset: -2px;
background: linear-gradient(45deg, transparent 30%, rgba(34, 211, 238, 0.2) 50%, transparent 70%);
opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 0; filter: blur(25px);
}
.card:hover {
transform: translateY(-6px) scale(1.025);
border-color: rgba(34, 211, 238, 0.6);
box-shadow: 0 12px 45px rgba(34, 211, 238, 0.35), 0 24px 65px rgba(0, 0, 0, 0.5);
}
.card:hover::after { opacity: 0.6; }

.card-media {
position: relative; width: 100%; height: 260px;
background: linear-gradient(145deg, #0d1b32, #0a152a);
overflow: hidden; cursor: pointer;
}
.card-media::before {
content: ''; position: absolute; inset: 0;
background: linear-gradient(180deg, transparent 45%, rgba(3, 10, 22, 0.6) 80%, rgba(3, 10, 22, 0.9));
pointer-events: none; z-index: 1;
}
.card-media img {
width: 100%; height: 100%; object-fit: contain;
transition: transform 0.5s var(--ease-smooth);
}
.card:hover .card-media img { transform: scale(1.06); }

.card-badges {
position: absolute; top: 12px; left: 12px; z-index: 2;
display: flex; gap: 6px;
}
.badge {
padding: 4px 10px; background: var(--bg-glass-heavy);
border-radius: var(--r-full); font-size: 11px; font-weight: 700; color: var(--text-accent);
backdrop-filter: blur(10px); border: 1px solid var(--border-glow);
}

.card-actions-overlay {
position: absolute; bottom: 12px; left: 12px; right: 12px; z-index: 2;
display: flex; gap: 6px; justify-content: center;
opacity: 0; transform: translateY(8px); transition: all var(--trans-norm);
}
.card:hover .card-actions-overlay { opacity: 1; transform: translateY(0); }

.action-pick {
padding: 8px 14px; background: rgba(34, 211, 238, 0.92);
border: none; border-radius: var(--r-sm); color: var(--bg-base);
font-size: 12px; font-weight: 800; cursor: pointer;
display: flex; align-items: center; gap: 5px; transition: var(--trans-fast);
font-family: inherit;
}
.action-pick:hover { transform: scale(1.05); box-shadow: 0 4px 18px rgba(34, 211, 238, 0.7); }

.action-fav {
width: 36px; height: 36px; background: var(--bg-glass-heavy);
border: 1px solid var(--border-subtle); border-radius: var(--r-sm);
color: var(--text-tertiary); font-size: 16px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: var(--trans-fast); backdrop-filter: blur(10px);
}
.action-fav:hover, .action-fav.active { background: var(--pink-500); border-color: var(--pink-500); color: white; }
.action-fav.active i { transform: scale(1.1); }

.card-body {
padding: 20px; position: relative;
border-top: 1px solid var(--border-subtle);
}
.card-body::before {
content: ''; position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
background: linear-gradient(90deg, transparent, var(--cyan-400), transparent);
}
.card-title {
font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700;
color: var(--text-primary); margin-bottom: 12px; line-height: 1.4;
}
.card-meta {
display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 14px;
}
.meta-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-tertiary); font-weight: 500; }
.meta-item i { font-size: 13px; color: var(--cyan-400); }

.card-footer {
display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border-subtle);
}
.btn-small {
flex: 1; padding: 10px; background: var(--bg-raised);
border: 1px solid var(--border-subtle); border-radius: var(--r-sm);
color: var(--text-secondary); font-size: 12px; font-weight: 700; cursor: pointer;
display: flex; align-items: center; justify-content: center; gap: 6px;
transition: var(--trans-fast); font-family: inherit;
}
.btn-small:hover { background: rgba(34, 211, 238, 0.15); border-color: var(--cyan-400); color: var(--cyan-400); }
.btn-small i { font-size: 13px; }
.btn-small.copy:hover { background: rgba(16, 185, 129, 0.15); border-color: var(--green-500); color: var(--green-500); }
.btn-small.dl:hover { background: rgba(37, 99, 235, 0.15); border-color: var(--blue-400); color: var(--blue-400); }
.btn-small.share:hover { background: rgba(139, 92, 246, 0.15); border-color: var(--purple-500); color: var(--purple-500); }

/* MODAL */
.modal-overlay {
position: fixed; inset: 0; background: rgba(3, 8, 18, 0.96);
backdrop-filter: blur(26px); z-index: 1000;
display: none; align-items: center; justify-content: center; padding: 24px;
animation: overlayIn 0.35s ease;
}
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
.modal-overlay.active { display: flex; }

.modal-box {
background: var(--bg-surface); border: 1px solid var(--border-glow);
border-radius: var(--r-2xl); max-width: 1100px; width: 100%;
max-height: 95vh; overflow: hidden; display: flex; flex-direction: column;
box-shadow: var(--glow-lg), 0 32px 85px rgba(0, 0, 0, 0.65);
animation: modalPop var(--trans-slow);
}
@keyframes modalPop { from { opacity: 0; transform: translateY(40px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

.modal-top {
display: flex; align-items: center; justify-content: space-between;
padding: 18px 26px; border-bottom: 1px solid var(--border-subtle);
background: linear-gradient(90deg, rgba(34, 211, 238, 0.08), transparent, rgba(139, 92, 246, 0.08));
}
.modal-title { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 700; color: var(--cyan-400); }
.modal-close {
width: 40px; height: 40px; background: transparent; border: 1px solid var(--pink-500);
border-radius: var(--r-md); color: var(--pink-500); font-size: 16px; cursor: pointer;
display: flex; align-items: center; justify-content: center; transition: var(--trans-fast);
}
.modal-close:hover { background: var(--pink-500); color: var(--bg-base); transform: rotate(90deg); }

.modal-body {
padding: 24px; overflow-y: auto; flex: 1;
display: flex; flex-direction: column; align-items: center;
background: radial-gradient(circle at 50% 50%, #0e1f36, #060d1c);
}
.modal-image {
max-width: 100%; max-height: 65vh; border-radius: var(--r-lg);
box-shadow: 0 0 38px rgba(34, 211, 238, 0.4), 0 10px 48px rgba(0, 0, 0, 0.55);
transition: transform 0.4s var(--ease-smooth); cursor: zoom-in;
}
.modal-image.zoomed { transform: scale(1.6); cursor: zoom-out; }

.modal-details {
margin-top: 20px; width: 100%; max-width: 500px;
background: var(--bg-glass); border: 1px solid var(--border-subtle); border-radius: var(--r-lg);
padding: 18px 22px;
}
.detail-row {
display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-subtle); font-size: 13px;
}
.detail-row:last-child { border-bottom: none; }
.detail-label { color: var(--text-tertiary); font-weight: 600; }
.detail-value { color: var(--text-primary); font-weight: 700; }

.modal-actions {
margin-top: 22px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; width: 100%;
}
.modal-btn {
padding: 12px 24px; border-radius: var(--r-md); font-family: inherit; font-size: 13px; font-weight: 700;
cursor: pointer; display: flex; align-items: center; gap: 8px; transition: var(--trans-fast); border: none;
}
.modal-btn.primary { background: linear-gradient(135deg, var(--blue-400), var(--cyan-400)); color: var(--bg-base); }
.modal-btn.primary:hover { box-shadow: var(--glow-md); transform: translateY(-3px); }
.modal-btn.outline { background: transparent; border: 1px solid var(--border-glow); color: var(--cyan-400); }
.modal-btn.outline:hover { background: rgba(34, 211, 238, 0.12); }
.modal-btn.accent { background: transparent; border: 1px solid var(--purple-500); color: var(--purple-500); }
.modal-btn.accent:hover { background: rgba(139, 92, 246, 0.12); }

/* LOADING */
.loading-wrap { display: none; text-align: center; padding: 55px 20px; grid-column: 1/-1; }
.loading-wrap.active { display: block; }
.spinner {
width: 48px; height: 48px; border: 3px solid rgba(34, 211, 238, 0.25);
border-top-color: var(--cyan-400); border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 18px;
box-shadow: 0 0 18px rgba(34, 211, 238, 0.5);
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: 'Space Grotesk'; color: var(--cyan-400); font-weight: 700; letter-spacing: 2px; }

/* TOAST */
.toast-box {
position: fixed; bottom: 24px; right: 24px; background: var(--bg-glass-heavy);
border: 1px solid var(--cyan-400); color: var(--cyan-400); padding: 15px 24px;
border-radius: var(--r-lg); font-weight: 700; font-size: 13px; z-index: 9999;
display: flex; align-items: center; gap: 12px; box-shadow: var(--glow-md);
transform: translateX(350px); opacity: 0; transition: all 0.5s var(--ease-bounce);
backdrop-filter: blur(16px);
}
.toast-box.show { transform: translateX(0); opacity: 1; }
.toast-box i { font-size: 17px; }

/* EMPTY STATE */
.empty-state {
grid-column: 1/-1; text-align: center; padding: 70px 20px; color: var(--text-tertiary);
}
.empty-state i { font-size: 54px; margin-bottom: 18px; opacity: 0.5; color: var(--blue-400); }
.empty-state h3 { font-family: 'Space Grotesk'; color: var(--text-primary); margin-bottom: 8px; font-size: 18px; }

/* MOBILE TOGGLE */
.mobile-toggle {
display: none; position: fixed; bottom: 24px; right: 24px; z-index: 110;
width: 50px; height: 50px; border-radius: var(--r-full);
background: linear-gradient(135deg, var(--blue-400), var(--cyan-400));
border: none; color: var(--bg-base); font-size: 22px; cursor: pointer;
box-shadow: var(--glow-md);
}

/* RESPONSIVE */
@media (max-width: 1024px) {
.sidebar { width: 220px; }
.main-content { margin-left: 220px; padding: 24px; }
.photo-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
.card-media { height: 220px; }
}
@media (max-width: 768px) {
.sidebar { transform: translateX(-100%); width: 260px; }
.sidebar.open { transform: translateX(0); }
.main-content { margin-left: 0; padding: 20px 16px; }
.mobile-toggle { display: flex; align-items: center; justify-content: center; }
.photo-grid { grid-template-columns: 1fr; }
.card-media { height: 250px; }
.header-bar { flex-direction: column; align-items: stretch; }
.search-wrapper { min-width: 100%; }
.toolbar { flex-direction: column; align-items: stretch; }
.modal-box { border-radius: var(--r-lg); }
}
@media (max-width: 480px) {
.page-header h2 { font-size: 22px; }
.card-footer { flex-wrap: wrap; }
.card-media { height: 210px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 9px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--blue-400), var(--cyan-400), var(--purple-500));
border-radius: 5px; border: 2px solid var(--bg-base);
}
::selection { background: rgba(34, 211, 238, 0.45); color: var(--text-primary); }
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="grid-bg"></div>
<div class="particles" id="particles"></div>

<div class="app-layout">
<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
<div class="sidebar-header">
<div class="brand">
<div class="brand-icon"><i class="fas fa-bolt"></i></div>
<div class="brand-text"><h1>FOTO GALLERY</h1><span>LINE TOGEL • 2026</span></div>
</div>
<nav class="sidebar-nav">
<button class="nav-item active"><i class="fas fa-th-large"></i> Semua Foto</button>
<button class="nav-item" onclick="filterFavs()"><i class="fas fa-heart"></i> Favorit</button>
<button class="nav-item"><i class="fas fa-clock"></i> Terbaru</button>
</nav>
</div>
<div class="sidebar-footer">
<div class="system-status">
<span class="status-dot"></span>
<span class="status-text">SYSTEM ONLINE</span>
</div>
</div>
</aside>

<!-- MAIN CONTENT -->
<main class="main-content">
<header class="header-bar">
<div class="page-header">
<h2><i class="fas fa-images" style="color: var(--cyan-400); margin-right: 8px;"></i>Galeri Foto</h2>
<p>Kelola dan jelajahi koleksi foto Anda</p>
</div>
<div class="header-actions">
<div class="search-wrapper">
<input type="search" class="search-input" id="searchInput" placeholder="Cari judul foto..." aria-label="Cari">
<i class="fas fa-search search-icon"></i>
</div>
<button class="icon-btn" onclick="location.reload()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
</div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
<div class="toolbar-left">
<div class="view-switcher">
<button class="view-btn active" data-view="grid" onclick="setView('grid', this)"><i class="fas fa-th-large"></i> Grid</button>
<button class="view-btn" data-view="list" onclick="setView('list', this)"><i class="fas fa-list"></i> List</button>
</div>
<select class="filter-select" id="filterSelect" onchange="applyFilter()">
<option value="all">🎯 Semua</option>
<option value="favorites">⭐ Favorit</option>
<option value="recent">🕐 Terbaru</option>
</select>
</div>
<div class="toolbar-right">
<div class="result-count" id="resultCount">Memuat...</div>
</div>
</div>

<!-- GALLERY -->
<section class="gallery-section">
<div class="section-label">Koleksi Foto</div>
<div class="photo-grid" id="galleryGrid">
<div class="loading-wrap active" id="loadingWrap">
<div class="spinner"></div>
<div class="loading-text">MEMUAT FOTO...</div>
</div>
</div>
</section>
</main>
</div>

<button class="mobile-toggle" id="mobileToggle" onclick="toggleSidebar()">
<i class="fas fa-bars"></i>
</button>

<!-- MODAL -->
<div class="modal-overlay" id="imageModal">
<div class="modal-box">
<div class="modal-top">
<h3 class="modal-title" id="modalTitle">Foto Detail</h3>
<button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
</div>
<div class="modal-body">
<img src="" alt="" id="modalImg" class="modal-image" onclick="this.classList.toggle('zoomed')">
<div class="modal-details">
<div class="detail-row"><span class="detail-label">Judul</span><span class="detail-value" id="infoTitle">-</span></div>
<div class="detail-row"><span class="detail-label">Format</span><span class="detail-value" id="infoFormat">-</span></div>
<div class="detail-row"><span class="detail-label">Ukuran</span><span class="detail-value" id="infoSize">-</span></div>
</div>
<div class="modal-actions">
<button class="modal-btn primary" onclick="downloadModalImage()"><i class="fas fa-download"></i> Download</button>
<button class="modal-btn outline" onclick="copyImage()"><i class="fas fa-copy"></i> Copy</button>
<button class="modal-btn accent" onclick="shareImage()"><i class="fas fa-share-alt"></i> Share</button>
</div>
</div>
</div>
</div>

<div class="toast-box" id="toast"><i class="fas fa-bolt"></i><span id="toastText"></span></div>

<script>
const state = {
photos: [],
favs: JSON.parse(localStorage.getItem('ltg_favs')||'[]'),
view: 'grid',
filter: 'all',
search: '',
currentImg: null,
currentTitle: null
};

// Init
document.addEventListener('DOMContentLoaded', () => { initParticles(); fetchPhotos(); initKeys(); });
document.getElementById('searchInput').addEventListener('input', e => { state.search = e.target.value.toLowerCase(); render(); });

function initParticles() {
const c = document.getElementById('particles'); if (!c) return;
for (let i = 0; i < 60; i++) {
const p = document.createElement('div'); p.className = 'particle';
p.style.left = Math.random() * 100 + '%';
p.style.top = Math.random() * 100 + '%';
p.style.animationDelay = Math.random() * 35 + 's';
p.style.animationDuration = (25 + Math.random() * 35) + 's';
setTimeout(() => p.style.opacity = '0.65', Math.random() * 3000);
c.appendChild(p);
}
}

async function fetchPhotos() {
document.getElementById('loadingWrap').classList.add('active');
try {
const sid = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';
let res;
try {
const r = await fetch(`https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
const txt = await r.text();
const json = JSON.parse(txt.substring(47).slice(0, -2));
state.photos = json.table.rows.filter(r=>r.c?.[0]?.v&&r.c?.[1]?.v).map((r,i)=>({judul:r.c[0].v, foto:r.c[1].v, idx:i+2}));
} catch {
const csv = await (await fetch(`https://docs.google.com/spreadsheets/d/${sid}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
state.photos = csv.split('\n').map(r=>r.split(',')).filter(r=>r[0]?.trim()&&r[1]?.trim()).map((r,i)=>({judul:r[0].replace(/"/g,'').trim(), foto:r[1].replace(/"/g,'').trim(), idx:i+2}));
}
render(); showToast(`✅ ${state.photos.length} foto dimuat`);
} catch {
document.getElementById('galleryGrid').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Gagal Memuat</h3><p>Periksa koneksi atau publikasi Sheets</p></div>`;
}
document.getElementById('loadingWrap').classList.remove('active');
}

function render() {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';
grid.classList.toggle('list-view', state.view === 'list');

let list = [...state.photos];
if (state.filter === 'favorites') list = list.filter(p => state.favs.includes(p.foto));
if (state.filter === 'recent') list = list.slice().reverse().slice(0, 20);
if (state.search) list = list.filter(p => p.judul.toLowerCase().includes(state.search));

if (!list.length) {
grid.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><h3>Tidak Ditemukan</h3><p>Coba kata kunci atau filter lain</p></div>`;
document.getElementById('resultCount').textContent = '0 foto';
return;
}

document.getElementById('resultCount').textContent = `${list.length} foto`;
list.forEach((p, i) => grid.appendChild(createCard(p, i)));
}

function createCard(photo, i) {
const isFav = state.favs.includes(photo.foto);
const card = document.createElement('div');
card.className = 'card';
card.style.animationDelay = `${0.05 + i * 0.04}s`;
card.innerHTML = `
<div class="card-media" onclick="openModal('${photo.foto}', '${photo.judul.replace(/'/g, "\\'")}')">
<div class="card-badges"><span class="badge">#${photo.idx}</span></div>
<img src="${photo.foto}" alt="${photo.judul}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/0d1b32/22d3ee?text=No+Image'">
<div class="card-actions-overlay">
<button class="action-fav ${isFav?'active':''}" onclick="event.stopPropagation(); toggleFav('${photo.foto}', this)" aria-label="${isFav?'Hapus':'Tambah'} favorit">
<i class="fas fa-heart"></i>
</button>
<button class="action-pick" onclick="event.stopPropagation(); openModal('${photo.foto}', '${photo.judul.replace(/'/g, "\\'")}')">
<i class="fas fa-expand"></i> Lihat
</button>
</div>
</div>
<div class="card-body">
<div class="card-title">${photo.judul}</div>
<div class="card-meta">
<div class="meta-item"><i class="fas fa-hashtag"></i> #${photo.idx}</div>
<div class="meta-item"><i class="fas fa-image"></i> Foto</div>
</div>
<div class="card-footer">
<button class="btn-small copy" onclick="copyPhoto('${photo.foto}')"><i class="fas fa-copy"></i> Copy</button>
<button class="btn-small dl" onclick="downloadPhoto('${photo.foto}', '${photo.judul.replace(/'/g, "\\'")}')"><i class="fas fa-download"></i> DL</button>
<button class="btn-small share" onclick="sharePhoto('${photo.foto}', '${photo.judul.replace(/'/g, "\\'")}')"><i class="fas fa-share-alt"></i> Share</button>
</div>
</div>`;
return card;
}

function setView(v, btn) {
state.view = v;
document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
document.getElementById('galleryGrid').classList.toggle('list-view', v === 'list');
render();
}

function applyFilter() {
state.filter = document.getElementById('filterSelect').value;
render();
}

function filterFavs() {
document.getElementById('filterSelect').value = 'favorites';
applyFilter();
document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
event.currentTarget.classList.add('active');
}

function toggleFav(url, btn) {
const i = state.favs.indexOf(url);
if (i > -1) { state.favs.splice(i, 1); btn.classList.remove('active'); showToast('⭐ Dihapus dari favorit'); }
else { state.favs.push(url); btn.classList.add('active'); showToast('❤️ Ditambahkan ke favorit'); }
localStorage.setItem('ltg_favs', JSON.stringify(state.favs));
if (state.filter === 'favorites') render();
}

function openModal(url, title) {
state.currentImg = url; state.currentTitle = title;
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalImg').src = url;
document.getElementById('modalImg').alt = title;
document.getElementById('modalImg').classList.remove('zoomed');
document.getElementById('infoTitle').textContent = title;
document.getElementById('infoFormat').textContent = url.split('.').pop().toUpperCase();
fetch(url).then(r => r.blob()).then(b => document.getElementById('infoSize').textContent = `${(b.size / 1024).toFixed(1)} KB`);
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
}

function closeModal() {
document.getElementById('imageModal').classList.remove('active');
document.body.style.overflow = '';
state.currentImg = state.currentTitle = null;
}

async function copyPhoto(url) {
try { const b = await (await fetch(url)).blob(); await navigator.clipboard.write([new ClipboardItem({[b.type]: b})]); showToast('✅ Berhasil disalin'); }
catch { showToast('❗ Gagal menyalin'); }
}
async function copyImage() { if (state.currentImg) await copyPhoto(state.currentImg); }

function downloadPhoto(url, name) {
const a = document.createElement('a'); a.href = url;
a.download = `${name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
a.target = '_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
showToast('⚡ Download dimulai');
}
function downloadModalImage() { if (state.currentImg) downloadPhoto(state.currentImg, state.currentTitle); }

async function sharePhoto(url, title) {
if (navigator.share) {
try { const b = await (await fetch(url)).blob(); await navigator.share({ title, files: [new File([b], 'foto.jpg', { type: b.type })] }); showToast('🔗 Dibagikan'); }
catch(e) { if(e.name !== 'AbortError') showToast('❗ Gagal share'); }
} else { await copyPhoto(url); showToast('✅ Link disalin'); }
}
function shareImage() { if (state.currentImg) sharePhoto(state.currentImg, state.currentTitle); }

function showToast(msg) {
const t = document.getElementById('toast'); document.getElementById('toastText').textContent = msg;
t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3800);
}

function toggleSidebar() {
document.getElementById('sidebar').classList.toggle('open');
}

function initKeys() {
document.addEventListener('keydown', e => {
if (e.key === 'Escape') closeModal();
if (e.ctrlKey && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});
document.getElementById('imageModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ FOTO GALLERY — LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ══════════════════════════════════════════════════
   BLUE NEON COOL COLOR SYSTEM
   ══════════════════════════════════════════════════ */
:root {
  --neon-05: rgba(0, 210, 255, 0.05);
  --neon-10: rgba(0, 210, 255, 0.10);
  --neon-15: rgba(0, 210, 255, 0.15);
  --neon-20: rgba(0, 210, 255, 0.20);
  --neon-30: rgba(0, 210, 255, 0.30);
  --neon-50: rgba(0, 210, 255, 0.50);
  --neon-70: rgba(0, 210, 255, 0.70);
  --neon: #00d2ff;
  --neon-light: #4de0ff;
  --neon-bright: #60efff;
  --neon-deep: #0099cc;
  --neon-purple: #7b3fff;
  --neon-pink: #ff00aa;
  --neon-green: #00ff9d;
  
  --bg: #030014;
  --bg-1: #06001f;
  --bg-2: #0a002e;
  --bg-3: #0e003d;
  --surface: rgba(10, 5, 40, 0.82);
  --surface-2: rgba(15, 10, 50, 0.75);
  --glass: rgba(12, 8, 45, 0.65);
  --glass-2: rgba(18, 12, 60, 0.55);
  
  --text: #f0f4ff;
  --text-2: #b8c4e8;
  --text-3: #6b7aaa;
  --text-4: #4a5580;
  
  --glow-sm: 0 0 12px rgba(0, 210, 255, 0.35);
  --glow-md: 0 0 22px rgba(0, 210, 255, 0.55), 0 0 55px rgba(0, 210, 255, 0.25);
  --glow-lg: 0 0 35px rgba(0, 210, 255, 0.7), 0 0 80px rgba(0, 210, 255, 0.4), 0 0 130px rgba(0, 210, 255, 0.2);
  --glow-purple: 0 0 22px rgba(123, 63, 255, 0.6), 0 0 55px rgba(123, 63, 255, 0.3);
  --glow-green: 0 0 22px rgba(0, 255, 157, 0.6), 0 0 55px rgba(0, 255, 157, 0.3);
  
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-spring: cubic-bezier(0.5, 1.2, 0.4, 1);
  --speed-fast: 180ms;
  --speed-normal: 320ms;
  --speed-slow: 550ms;
  
  --radius: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --radius-full: 999px;
}

/* ══════════════════════════════════════════════════
   BASE
   ══════════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Inter','Rajdhani',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

/* ══════════════════════════════════════════════════
   BACKGROUND FX
   ══════════════════════════════════════════════════ */
.bg-fx{position:fixed;inset:0;z-index:-3;pointer-events:none;overflow:hidden}
.bg-fx__orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.35;animation:orbFloat 22s ease-in-out infinite alternate}
.bg-fx__orb:nth-child(1){width:550px;height:550px;background:radial-gradient(circle,rgba(0,210,255,.25),transparent 70%);top:-8%;left:-5%;animation-duration:24s}
.bg-fx__orb:nth-child(2){width:480px;height:480px;background:radial-gradient(circle,rgba(123,63,255,.22),transparent 70%);top:35%;right:-12%;animation-duration:20s;animation-delay:-5s}
.bg-fx__orb:nth-child(3){width:400px;height:400px;background:radial-gradient(circle,rgba(0,210,255,.18),transparent 70%);bottom:-5%;left:20%;animation-duration:26s;animation-delay:-10s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(4%,6%) scale(1.08)}}

.bg-grid{position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:.04;
  background-image:
    linear-gradient(rgba(0,210,255,.6) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,210,255,.6) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 65% 65% at 50% 40%,black 20%,transparent 80%);
  animation:gridShift 40s linear infinite;
}
@keyframes gridShift{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}

.bg-noise{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.028;
  background-image:url("image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:noiseMove .6s steps(8) infinite;
}
@keyframes noiseMove{0%,100%{transform:translate(0,0)}25%{transform:translate(-1px,1px)}50%{transform:translate(1px,-1px)}75%{transform:translate(-1px,-1px)}}

.bg-scan{position:fixed;left:0;right:0;height:2px;z-index:100;pointer-events:none;opacity:0;animation:scanSlide 7s linear infinite;
  background:linear-gradient(90deg,transparent,var(--neon-bright),var(--neon),transparent);
  box-shadow:0 0 18px var(--neon);filter:blur(.5px);
}
@keyframes scanSlide{0%{top:-2px;opacity:0}5%{opacity:.45}95%{opacity:.45}100%{top:100%;opacity:0}}

/* ══════════════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════════════ */
.wrap{max-width:1500px;margin:0 auto;padding:0 28px 60px;position:relative}

/* ══════════════════════════════════════════════════
   FLOATING NAV
   ══════════════════════════════════════════════════ */
.nav{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:1000;
  display:flex;align-items:center;gap:8px;
  padding:8px 10px 8px 18px;
  background:var(--surface);
  border:1px solid var(--neon-20);
  border-radius:var(--radius-full);
  backdrop-filter:blur(22px);
  box-shadow:0 4px 30px rgba(0,0,0,.35),var(--glow-sm);
  animation:navDown 0.8s var(--ease-bounce) both;
}
@keyframes navDown{from{opacity:0;transform:translateX(-50%) translateY(-30px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.nav__brand{
  display:flex;align-items:center;gap:10px;
  margin-right:10px;
  padding-right:18px;
  border-right:1px solid var(--neon-20);
}
.nav__logo{font-size:22px;line-height:1}
.nav__name{
  font-family:'Orbitron',sans-serif;
  font-size:13px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,var(--neon-bright),var(--neon),var(--neon-purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.nav__links{display:flex;align-items:center;gap:4px}
.nav__link{
  padding:8px 16px;border-radius:var(--radius-full);
  color:var(--text-2);font-size:13px;font-weight:500;
  cursor:pointer;transition:var(--speed-fast);border:none;background:none;
  font-family:inherit;display:flex;align-items:center;gap:6px;
  white-space:nowrap;
}
.nav__link:hover{color:var(--text);background:var(--neon-10)}
.nav__link.active{color:var(--neon-bright);background:var(--neon-15);font-weight:600}

.nav__search{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;
  background:var(--neon-05);
  border:1px solid var(--neon-20);
  border-radius:var(--radius-full);
  min-width:180px;
  transition:var(--speed-fast);
}
.nav__search:focus-within{border-color:var(--neon);box-shadow:var(--glow-sm);background:var(--neon-10);min-width:220px}
.nav__search i{color:var(--text-3);font-size:13px;flex-shrink:0}
.nav__search input{
  background:none;border:none;outline:none;
  color:var(--text);font-size:13px;width:100%;
  font-family:inherit;
}
.nav__search input::placeholder{color:var(--text-4)}

.nav__cta{
  padding:8px 18px;
  background:linear-gradient(135deg,var(--neon-deep),var(--neon));
  border:none;border-radius:var(--radius-full);
  color:var(--bg);font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:6px;
  transition:var(--speed-normal);
  box-shadow:0 2px 15px rgba(0,210,255,.35);
  white-space:nowrap;
}
.nav__cta:hover{transform:translateY(-2px);box-shadow:var(--glow-md)}

/* ══════════════════════════════════════════════════
   HERO
   ══════════════════════════════════════════════════ */
.hero{
  padding:110px 0 50px;
  text-align:center;
  position:relative;
}
.hero__pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 18px 6px 8px;
  background:var(--neon-10);
  border:1px solid var(--neon-30);
  border-radius:var(--radius-full);
  font-size:11px;font-weight:600;color:var(--neon-light);
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:22px;
  box-shadow:var(--glow-sm);
  animation:pillGlow 3s ease-in-out infinite;
}
@keyframes pillGlow{0%,100%{box-shadow:var(--glow-sm)}50%{box-shadow:var(--glow-md)}}
.hero__pill-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--neon-green);
  box-shadow:0 0 10px var(--neon-green);
  animation:dotBeat 2s ease-in-out infinite;
}
@keyframes dotBeat{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.7}}

.hero__title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(32px,7vw,58px);
  font-weight:900;
  letter-spacing:4px;
  margin-bottom:16px;
  line-height:1.15;
  background:linear-gradient(135deg,var(--neon-bright) 0%,var(--neon) 40%,var(--text) 60%,var(--neon) 80%,var(--neon-purple) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;
  animation:titleGlow 4s ease-in-out infinite;
}
@keyframes titleGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35)}}

.hero__desc{
  font-size:16px;
  color:var(--text-2);
  max-width:520px;
  margin:0 auto 32px;
  line-height:1.7;
}

/* ══════════════════════════════════════════════════
   STATS STRIP
   ══════════════════════════════════════════════════ */
.stats{
  display:flex;align-items:center;justify-content:center;
  gap:12px;flex-wrap:wrap;
  padding:18px 24px;
  background:var(--surface);
  border:1px solid var(--neon-20);
  border-radius:var(--radius-lg);
  backdrop-filter:blur(18px);
  box-shadow:0 4px 25px rgba(0,0,0,.3),var(--glow-sm);
  margin-bottom:32px;
}
.stat{
  display:flex;align-items:center;gap:12px;
  padding:8px 0;
}
.stat__icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.stat__icon--blue{background:linear-gradient(135deg,rgba(0,210,255,.22),rgba(0,210,255,.12));color:var(--neon)}
.stat__icon--purple{background:linear-gradient(135deg,rgba(123,63,255,.22),rgba(123,63,255,.12));color:var(--neon-purple)}
.stat__icon--green{background:linear-gradient(135deg,rgba(0,255,157,.22),rgba(0,255,157,.12));color:var(--neon-green)}
.stat__icon--pink{background:linear-gradient(135deg,rgba(255,0,170,.22),rgba(255,0,170,.12));color:var(--neon-pink)}
.stat__num{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;line-height:1}
.stat__label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px}

/* ══════════════════════════════════════════════════
   FILTER CHIPS
   ══════════════════════════════════════════════════ */
.chips{
  display:flex;gap:10px;overflow-x:auto;padding:4px 0 24px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.chips::-webkit-scrollbar{display:none}
.chip{
  padding:10px 20px;border-radius:var(--radius-full);
  background:var(--surface);border:1px solid var(--neon-20);
  color:var(--text-2);font-size:13px;font-weight:500;
  cursor:pointer;transition:var(--speed-fast);white-space:nowrap;
  display:flex;align-items:center;gap:8px;font-family:inherit;
  backdrop-filter:blur(10px);
}
.chip:hover{border-color:var(--neon);color:var(--neon-light);background:var(--neon-10)}
.chip.active{background:linear-gradient(135deg,rgba(0,210,255,.28),rgba(123,63,255,.18));border-color:var(--neon);color:var(--neon-bright);box-shadow:var(--glow-sm);font-weight:600}
.chip__count{
  padding:2px 8px;border-radius:99px;
  background:var(--neon-20);font-size:11px;font-weight:700;
}
.chip.active .chip__count{background:var(--neon-30);color:var(--neon-bright)}

/* ══════════════════════════════════════════════════
   MASONRY GALLERY
   ══════════════════════════════════════════════════ */
.masonry{
  columns:3;
  column-gap:22px;
}

.card{
  break-inside:avoid;
  margin-bottom:22px;
  background:var(--surface);
  border:1px solid var(--neon-15);
  border-radius:var(--radius-lg);
  overflow:hidden;
  transition:all 0.45s var(--ease-out);
  position:relative;
  box-shadow:0 4px 20px rgba(0,0,0,.35);
  cursor:pointer;
  opacity:0;
  transform:translateY(30px);
  animation:cardUp 0.6s var(--ease-bounce) forwards;
}
@keyframes cardUp{to{opacity:1;transform:translateY(0)}}
.card:hover{
  transform:translateY(-6px);
  border-color:var(--neon);
  box-shadow:0 12px 45px rgba(0,0,0,.45),var(--glow-md);
}

.card__img{
  position:relative;
  width:100%;
  background:radial-gradient(circle at 40% 40%,#101548,#070730);
  overflow:hidden;
}
.card__img img{
  width:100%;display:block;
  transition:transform 0.55s var(--ease-out),filter 0.5s ease;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,.4));
}
.card:hover .card__img img{transform:scale(1.05);filter:drop-shadow(0 8px 30px rgba(0,210,255,.4))}

.card__img::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 50%,rgba(3,0,20,.75) 100%);
  pointer-events:none;
}

.card__tag{
  position:absolute;top:12px;left:12px;z-index:2;
  padding:4px 12px;
  background:rgba(0,210,255,.75);
  backdrop-filter:blur(8px);
  border-radius:var(--radius-full);
  font-size:10px;font-weight:700;color:var(--bg);
  letter-spacing:1px;text-transform:uppercase;
}

.card__heart{
  position:absolute;top:12px;right:12px;z-index:2;
  width:34px;height:34px;border-radius:50%;
  background:var(--glass);
  backdrop-filter:blur(10px);
  border:1px solid var(--neon-30);
  color:var(--text-3);font-size:13px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:var(--speed-fast);
}
.card__heart:hover,.card__heart.on{background:var(--neon);border-color:var(--neon);color:var(--bg);box-shadow:var(--glow-sm);transform:scale(1.12)}

.card__actions{
  position:absolute;bottom:12px;left:12px;right:12px;z-index:2;
  display:flex;gap:6px;
  opacity:0;transform:translateY(10px);
  transition:all 0.35s var(--ease-out);
}
.card:hover .card__actions{opacity:1;transform:translateY(0)}
.card__act{
  flex:1;padding:8px;
  background:var(--glass);backdrop-filter:blur(10px);
  border:1px solid var(--neon-30);border-radius:var(--radius);
  color:var(--neon-light);font-size:12px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;transition:var(--speed-fast);
  font-family:inherit;font-weight:600;
}
.card__act:hover{background:var(--neon);color:var(--bg);box-shadow:var(--glow-sm)}

.card__body{padding:14px 16px 14px}
.card__title{
  font-family:'Rajdhani',sans-serif;
  font-size:15px;font-weight:600;
  color:var(--text);
  margin-bottom:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card__foot{
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;color:var(--text-3);
}
.card__foot span{display:flex;align-items:center;gap:4px}

/* ══════════════════════════════════════════════════
   EMPTY / LOADING
   ══════════════════════════════════════════════════ */
.state-empty{
  text-align:center;padding:80px 20px;
  color:var(--text-3);
}
.state-empty i{font-size:52px;color:var(--neon-purple);margin-bottom:18px;opacity:.6}
.state-empty h3{font-family:'Orbitron',sans-serif;font-size:16px;color:var(--neon-light);margin-bottom:8px}
.state-empty p{font-size:14px}

.state-loading{text-align:center;padding:80px 20px;column-span:all}
.spinner{
  width:44px;height:44px;margin:0 auto 18px;
  border:3px solid var(--neon-15);border-top-color:var(--neon);
  border-radius:50%;animation:spin 0.9s linear infinite;
  box-shadow:var(--glow-sm);
}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--neon-light);letter-spacing:2px;animation:textPulse 2s ease-in-out infinite}
@keyframes textPulse{0%,100%{opacity:1}50%{opacity:.45}}

/* ══════════════════════════════════════════════════
   LIGHTBOX MODAL
   ══════════════════════════════════════════════════ */
.lightbox{
  position:fixed;inset:0;z-index:2000;
  background:rgba(2,0,12,.97);
  backdrop-filter:blur(28px);
  display:none;align-items:center;justify-content:center;
  padding:20px;
  animation:lbIn 0.4s var(--ease-out);
}
@keyframes lbIn{from{opacity:0}to{opacity:1}}
.lightbox.open{display:flex}

.lightbox__box{
  width:100%;max-width:1050px;
  background:var(--surface);
  border:1px solid var(--neon-30);
  border-radius:var(--radius-xl);
  overflow:hidden;
  box-shadow:var(--glow-lg),0 30px 80px rgba(0,0,0,.55);
  animation:lbBox 0.55s var(--ease-bounce);
  max-height:94vh;
  display:flex;flex-direction:column;
}
@keyframes lbBox{from{opacity:0;transform:scale(0.96) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

.lightbox__top{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 22px;
  border-bottom:1px solid var(--neon-20);
  background:linear-gradient(90deg,rgba(0,210,255,.08),transparent,rgba(123,63,255,.08));
}
.lightbox__top h3{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--neon-light);letter-spacing:1px;font-weight:700}
.lightbox__close{
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,210,255,.15);border:1px solid var(--neon-30);
  color:var(--neon-light);font-size:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:var(--speed-fast);
}
.lightbox__close:hover{background:var(--neon);color:var(--bg);box-shadow:var(--glow-sm);transform:rotate(90deg)}

.lightbox__img{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:24px;
  background:radial-gradient(circle at center,#0d1245,#060628);
  overflow-y:auto;
}
.lightbox__img img{
  max-width:100%;max-height:58vh;object-fit:contain;
  border-radius:var(--radius);
  box-shadow:0 0 30px rgba(0,210,255,.35),0 10px 40px rgba(0,0,0,.4);
  transition:transform 0.4s var(--ease-out);
  cursor:zoom-in;
}
.lightbox__img img.zoomed{cursor:zoom-out;transform:scale(1.8)}

.lightbox__meta{
  display:flex;gap:10px;padding:16px 22px;
  border-top:1px solid var(--neon-20);
  background:var(--neon-05);
}
.meta-chip{
  flex:1;text-align:center;padding:10px;
  background:var(--neon-10);border-radius:var(--radius);
  border:1px solid var(--neon-15);
}
.meta-chip__label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px}
.meta-chip__val{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--neon-light);font-weight:700;margin-top:3px}

.lightbox__btns{
  display:flex;justify-content:center;gap:12px;padding:16px 22px 20px;
  border-top:1px solid var(--neon-20);
  background:var(--surface);flex-wrap:wrap;
}
.lb-btn{
  padding:11px 26px;border-radius:var(--radius);
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:var(--speed-normal);
  display:flex;align-items:center;gap:8px;border:none;letter-spacing:.5px;
}
.lb-btn--primary{background:linear-gradient(135deg,var(--neon-deep),var(--neon));color:var(--bg);box-shadow:0 3px 18px rgba(0,210,255,.35)}
.lb-btn--primary:hover{transform:translateY(-2px);box-shadow:var(--glow-md)}
.lb-btn--ghost{background:transparent;color:var(--neon-light);border:1px solid var(--neon-30)}
.lb-btn--ghost:hover{background:var(--neon-15);transform:translateY(-2px)}
.lb-btn--warn{background:linear-gradient(135deg,#ff6b35,#ff8c42);color:white;box-shadow:0 3px 18px rgba(255,107,53,.35)}
.lb-btn--warn:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(255,107,53,.5)}

/* ══════════════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════════════ */
.toast{
  position:fixed;bottom:26px;right:26px;z-index:3000;
  padding:14px 24px;
  background:var(--surface);border:1px solid var(--neon-50);
  border-radius:var(--radius);
  color:var(--neon-light);
  font-weight:600;font-size:13px;
  display:flex;align-items:center;gap:10px;
  box-shadow:var(--glow-md);
  backdrop-filter:blur(16px);
  transform:translateX(350px);opacity:0;
  transition:all 0.55s var(--ease-bounce);
}
.toast.show{transform:translateX(0);opacity:1}
.toast i{font-size:17px}

/* ══════════════════════════════════════════════════
   BACK BUTTON
   ══════════════════════════════════════════════════ */
.back{
  position:fixed;left:20px;top:22px;z-index:1100;
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;
  background:var(--surface);border:1px solid var(--neon-30);
  border-radius:var(--radius-full);
  color:var(--neon-light);
  font-size:12px;font-weight:600;
  text-decoration:none;
  transition:var(--speed-normal);
  backdrop-filter:blur(16px);
  box-shadow:var(--glow-sm);
}
.back:hover{transform:translateX(-4px);box-shadow:var(--glow-md);background:var(--neon-15)}
.back i{font-size:13px;transition:transform var(--speed-fast)}
.back:hover i{transform:translateX(-2px)}

/* ══════════════════════════════════════════════════
   SCROLLBAR
   ══════════════════════════════════════════════════ */
::-webkit-scrollbar{width:7px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--neon),var(--neon-deep),var(--neon-purple));border-radius:5px;box-shadow:0 0 10px rgba(0,210,255,.5)}

/* ══════════════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════════════ */
@media(max-width:1024px){
  .masonry{columns:2}
}
@media(max-width:768px){
  .wrap{padding:0 16px 50px}
  .nav{width:calc(100% - 32px);justify-content:space-between;padding:6px 6px 6px 14px}
  .nav__links{display:none}
  .nav__search{min-width:120px}
  .nav__search:focus-within{min-width:150px}
  .nav__cta{padding:8px 12px;font-size:11px}
  .hero{padding:100px 0 40px}
  .hero__title{font-size:clamp(28px,9vw,44px);letter-spacing:2px}
  .hero__desc{font-size:14px}
  .stats{gap:10px;padding:14px 16px}
  .stat__icon{width:36px;height:36px;font-size:14px}
  .stat__num{font-size:16px}
  .masonry{columns:1}
  .lightbox__meta{flex-direction:column;gap:6px}
  .meta-chip{display:flex;align-items:center;justify-content:space-between}
  .meta-chip__label{margin-bottom:0}
  .lightbox__btns{flex-direction:column}
  .lb-btn{justify-content:center;width:100%}
  .back{left:14px;top:16px;padding:7px 14px;font-size:11px}
}
@media(max-width:480px){
  .nav{gap:4px;padding:5px 4px 5px 12px}
  .nav__brand{gap:6px;padding-right:10px;margin-right:4px}
  .nav__name{font-size:11px;letter-spacing:1px}
  .nav__search{min-width:90px;padding:6px 10px}
  .nav__search i{display:none}
  .nav__cta{padding:7px 10px;font-size:10px}
  .hero__pill{font-size:10px}
  .card__actions{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<!-- Background Effects -->
<div class="bg-fx"><div class="bg-fx__orb"></div><div class="bg-fx__orb"></div><div class="bg-fx__orb"></div></div>
<div class="bg-grid"></div>
<div class="bg-noise"></div>
<div class="bg-scan"></div>

<!-- Back Button -->
<a href="index.html" class="back"><i class="fas fa-arrow-left"></i> Kembali</a>

<!-- Floating Navigation -->
<nav class="nav" id="mainNav">
  <div class="nav__brand">
    <span class="nav__logo">⚡</span>
    <span class="nav__name">FOTO</span>
  </div>
  <div class="nav__links">
    <button class="nav__link active" data-filter="all"><i class="fas fa-images"></i> Semua</button>
    <button class="nav__link" data-filter="favorites"><i class="fas fa-heart"></i> Favorit</button>
  </div>
  <div class="nav__search">
    <i class="fas fa-search"></i>
    <input type="search" id="searchInput" placeholder="Cari foto..." onkeyup="handleSearch()">
  </div>
  <button class="nav__cta" onclick="refreshData()"><i class="fas fa-sync-alt"></i> <span>Refresh</span></button>
</nav>

<!-- Main -->
<div class="wrap">

  <!-- Hero -->
  <header class="hero">
    <div class="hero__pill">
      <span class="hero__pill-dot"></span>
      System Online — 2026
    </div>
    <h1 class="hero__title">Galeri Foto Premium</h1>
    <p class="hero__desc">Koleksi foto terlengkap dari LINE TOGEL. Jelajahi, download, copy, dan bagikan foto favorit Anda dengan cepat.</p>
  </header>

  <!-- Stats -->
  <section class="stats" id="statsBar">
    <div class="stat">
      <div class="stat__icon stat__icon--blue"><i class="fas fa-images"></i></div>
      <div><div class="stat__num" id="statTotal">—</div><div class="stat__label">Total Foto</div></div>
    </div>
    <div class="stat">
      <div class="stat__icon stat__icon--purple"><i class="fas fa-heart"></i></div>
      <div><div class="stat__num" id="statFavs">0</div><div class="stat__label">Favorit</div></div>
    </div>
    <div class="stat">
      <div class="stat__icon stat__icon--green"><i class="fas fa-download"></i></div>
      <div><div class="stat__num" id="statReady">—</div><div class="stat__label">Siap Download</div></div>
    </div>
    <div class="stat">
      <div class="stat__icon stat__icon--pink"><i class="fas fa-bolt"></i></div>
      <div><div class="stat__num" style="color:var(--neon-green)">✓</div><div class="stat__label">Status</div></div>
    </div>
  </section>

  <!-- Filter Chips -->
  <div class="chips" id="chipsBar">
    <button class="chip active" onclick="filterData('all',this)"><i class="fas fa-th"></i> Semua <span class="chip__count" id="cAll">0</span></button>
    <button class="chip" onclick="filterData('favorites',this)"><i class="fas fa-heart"></i> Favorit <span class="chip__count" id="cFav">0</span></button>
    <button class="chip" onclick="filterData('recent',this)"><i class="fas fa-clock"></i> Terbaru <span class="chip__count" id="cRecent">0</span></button>
  </div>

  <!-- Masonry Gallery -->
  <div class="masonry" id="masonry">
    <div class="state-loading" id="loadingState">
      <div class="spinner"></div>
      <div class="spinner-text">Memuat Foto...</div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox__box">
    <div class="lightbox__top">
      <h3 id="lbTitle">Foto Detail</h3>
      <button class="lightbox__close" onclick="closeLB()"><i class="fas fa-times"></i></button>
    </div>
    <div class="lightbox__img">
      <img src="" alt="" id="lbImage" onclick="this.classList.toggle('zoomed')">
    </div>
    <div class="lightbox__meta">
      <div class="meta-chip">
        <div class="meta-chip__label">Judul</div>
        <div class="meta-chip__val" id="lbMeta1">—</div>
      </div>
      <div class="meta-chip">
        <div class="meta-chip__label">Format</div>
        <div class="meta-chip__val" id="lbMeta2">—</div>
      </div>
      <div class="meta-chip">
        <div class="meta-chip__label">Ukuran</div>
        <div class="meta-chip__val" id="lbMeta3">—</div>
      </div>
    </div>
    <div class="lightbox__btns">
      <button class="lb-btn lb-btn--primary" onclick="copyImg()"><i class="fas fa-copy"></i> Copy</button>
      <button class="lb-btn lb-btn--ghost" onclick="dlImg()"><i class="fas fa-download"></i> Download</button>
      <button class="lb-btn lb-btn--warn" onclick="shareImg()"><i class="fas fa-share-alt"></i> Share</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><i class="fas fa-bolt"></i><span id="toastText">Berhasil!</span></div>

<script>
/* ══════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════ */
const S = {
  photos: [],
  favs: JSON.parse(localStorage.getItem('ltg_fav') || '[]'),
  filter: 'all',
  q: ''
};

/* ══════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  init();
});

async function init() {
  await load();
  updateStats();
  setupNav();
}

/* ══════════════════════════════════════════════════
   NAV LINKS
   ══════════════════════════════════════════════════ */
function setupNav() {
  document.querySelectorAll('.nav__link').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav__link').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      filterData(f);
      document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.textContent.toLowerCase().includes(f === 'all' ? 'semua' : 'favorit')));
    });
  });
}

/* ══════════════════════════════════════════════════
   FETCH
   ══════════════════════════════════════════════════ */
async function load() {
  const grid = document.getElementById('masonry');
  grid.innerHTML = `<div class="state-loading"><div class="spinner"></div><div class="spinner-text">Memuat Foto...</div></div>`;
  try {
    const sid = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0', gid = '1246502038';
    let data = [];
    try {
      const r = await fetch(`https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
      const t = await r.text();
      const j = JSON.parse(t.substring(47).slice(0, -2));
      data = j.table.rows.filter(r => r.c?.[0]?.v && r.c?.[1]?.v).map((r, i) => ({
        judul: r.c[0].v, foto: r.c[1].v, idx: i + 2, ts: Date.now() - i * 3600000
      }));
    } catch {
      const csv = await (await fetch(`https://docs.google.com/spreadsheets/d/${sid}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
      data = csv.split('\n').map(r => r.split(',')).filter(r => r[0]?.trim() && r[1]?.trim()).map((r, i) => ({
        judul: r[0].replace(/"/g, '').trim(), foto: r[1].replace(/"/g, '').trim(), idx: i + 2, ts: Date.now() - i * 3600000
      }));
    }
    S.photos = data;
    render();
    toast(`⚡ ${data.length} foto dimuat`);
  } catch (e) {
    console.error(e);
    grid.innerHTML = `<div class="state-empty"><i class="fas fa-exclamation-triangle"></i><h3>Gagal Memuat</h3><p>Periksa koneksi atau publikasi Google Sheets</p></div>`;
    toast('❗ Gagal memuat foto');
  }
}

function refreshData() { load(); toast('🔄 Refresh...'); }

/* ══════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════ */
function render() {
  let list = [...S.photos];

  if (S.filter === 'favorites') list = list.filter(p => S.favs.includes(p.foto));
  else if (S.filter === 'recent') { list.sort((a, b) => b.ts - a.ts); list = list.slice(0, 15); }

  if (S.q) list = list.filter(p => p.judul.toLowerCase().includes(S.q));

  const grid = document.getElementById('masonry');
  grid.innerHTML = '';

  if (!list.length) {
    grid.innerHTML = `<div class="state-empty" style="column-span:all"><i class="fas fa-search"></i><h3>Tidak Ditemukan</h3><p>Coba kata kunci lain atau ganti filter</p></div>`;
    return;
  }

  list.forEach((p, i) => {
    const fav = S.favs.includes(p.foto);
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i * 0.06, 0.5)}s`;
    card.innerHTML = `
      <div class="card__img">
        <img src="${p.foto}" alt="${p.judul}" loading="lazy" onclick="event.stopPropagation();openLB('${p.foto}','${p.judul.replace(/'/g, "\\'")}')">
        <span class="card__tag">#${p.idx}</span>
        <button class="card__heart ${fav ? 'on' : ''}" onclick="event.stopPropagation();toggleFav('${p.foto}',this)"><i class="fas fa-heart"></i></button>
        <div class="card__actions">
          <button class="card__act" onclick="event.stopPropagation();openLB('${p.foto}','${p.judul.replace(/'/g, "\\'")}')"><i class="fas fa-expand"></i></button>
          <button class="card__act" onclick="event.stopPropagation();copyP('${p.foto}')"><i class="fas fa-copy"></i></button>
          <button class="card__act" onclick="event.stopPropagation();dlP('${p.foto}','${p.judul.replace(/'/g, "\\'")}')"><i class="fas fa-download"></i></button>
        </div>
      </div>
      <div class="card__body">
        <div class="card__title">${p.judul}</div>
        <div class="card__foot">
          <span><i class="far fa-calendar"></i> ${fmt(p.ts)}</span>
          <span><i class="fas fa-share-alt" style="cursor:pointer;color:var(--neon-light)" onclick="event.stopPropagation();shareP('${p.foto}','${p.judul.replace(/'/g, "\\'")}')"></i></span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

/* ══════════════════════════════════════════════════
   FILTER & SEARCH
   ══════════════════════════════════════════════════ */
function filterData(type, el) {
  S.filter = type;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  else {
    const chips = document.querySelectorAll('.chip');
    if (type === 'all') chips[0].classList.add('active');
    else if (type === 'favorites') chips[1].classList.add('active');
    else if (type === 'recent') chips[2].classList.add('active');
  }
  updateStats();
  render();
}
function handleSearch() {
  S.q = document.getElementById('searchInput').value.toLowerCase();
  render();
}

/* ══════════════════════════════════════════════════
   FAVORITES
   ══════════════════════════════════════════════════ */
function toggleFav(url, btn) {
  const i = S.favs.indexOf(url);
  if (i > -1) { S.favs.splice(i, 1); btn.classList.remove('on'); toast('💔 Dihapus dari favorit'); }
  else { S.favs.push(url); btn.classList.add('on'); toast('❤️ Ditambahkan ke favorit'); }
  localStorage.setItem('ltg_fav', JSON.stringify(S.favs));
  updateStats();
  if (S.filter === 'favorites') render();
}

/* ══════════════════════════════════════════════════
   STATS
   ══════════════════════════════════════════════════ */
function updateStats() {
  const total = S.photos.length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statFavs').textContent = S.favs.length;
  document.getElementById('statReady').textContent = total;
  document.getElementById('cAll').textContent = total;
  document.getElementById('cFav').textContent = S.favs.length;
  document.getElementById('cRecent').textContent = Math.min(15, total);
}

/* ══════════════════════════════════════════════════
   LIGHTBOX
   ══════════════════════════════════════════════════ */
let lbImg = '', lbTitle = '';
function openLB(url, title) {
  lbImg = url; lbTitle = title;
  document.getElementById('lbTitle').textContent = title;
  document.getElementById('lbImage').src = url;
  document.getElementById('lbImage').alt = title;
  document.getElementById('lbImage').classList.remove('zoomed');
  document.getElementById('lbMeta1').textContent = title;
  document.getElementById('lbMeta2').textContent = url.split('.').pop().split('?')[0].toUpperCase();
  document.getElementById('lbMeta3').textContent = '...';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
  fetch(url).then(r => r.blob()).then(b => {
    const s = (b.size / 1024).toFixed(1);
    document.getElementById('lbMeta3').textContent = s > 1024 ? (s / 1024).toFixed(2) + ' MB' : s + ' KB';
  }).catch(() => { document.getElementById('lbMeta3').textContent = '—'; });
}
function closeLB() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  lbImg = lbTitle = '';
}
document.getElementById('lightbox').addEventListener('click', e => { if (e.target.id === 'lightbox') closeLB(); });

/* ══════════════════════════════════════════════════
   ACTIONS
   ══════════════════════════════════════════════════ */
async function copyP(url) {
  try { const b = await (await fetch(url)).blob(); await navigator.clipboard.write([new ClipboardItem({ [b.type]: b })]); toast('✅ Disalin!'); }
  catch { toast('❗ Klik kanan gambar > Copy Image'); }
}
async function copyImg() { if (lbImg) await copyP(lbImg); }
function dlP(url, name) {
  const a = document.createElement('a'); a.href = url;
  a.download = `${name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
  a.target = '_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('⚡ Download dimulai...');
}
function dlImg() { if (lbImg) dlP(lbImg, lbTitle); }
async function shareP(url, title) {
  if (navigator.share) { try { const b = await (await fetch(url)).blob(); await navigator.share({ title, files: [new File([b], `${title}.jpg`, { type: b.type })] }); toast('🔗 Dibagikan!'); } catch(e) { if (e.name !== 'AbortError') toast('❌ Gagal share'); } }
  else { copyP(url); toast('✅ Link disalin!'); }
}
function shareImg() { if (lbImg) shareP(lbImg, lbTitle); }

/* ══════════════════════════════════════════════════
   HELPERS
   ══════════════════════════════════════════════════ */
function fmt(ts) { const d = new Date(ts); return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }); }
function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3600);
}

/* ══════════════════════════════════════════════════
   SHORTCUTS
   ══════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLB();
  if (e.ctrlKey && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput')?.focus(); }
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); filterData('all'); }
});

/* ══════════════════════════════════════════════════
   NAV HIDE ON SCROLL
   ══════════════════════════════════════════════════ */
let lastY = 0;
window.addEventListener('scroll', () => {
  const nav = document.getElementById('mainNav');
  const y = window.scrollY;
  if (y > lastY && y > 100) nav.style.transform = 'translateX(-50%) translateY(-120%)';
  else nav.style.transform = 'translateX(-50%) translateY(0)';
  nav.style.transition = 'transform 0.35s cubic-bezier(0.16, 1, 0.3, 1)';
  lastY = y;
}, { passive: true });
</script>
</body>
</html>

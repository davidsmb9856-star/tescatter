<html lang="id">

<meta name="description" content="LINE TOGEL - Premium Cyber Gallery 2026">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* ✨✨ PREMIUM NEON DESIGN SYSTEM ✨✨ */
:root {
/* Ultra Vibrant Neon Palette */
--neon-cyan: #00f5ff;
--neon-electric: #00faff;
--neon-azure: #00d9ff;
--neon-purple: #9d4edd;
--neon-violet: #b73dff;
--neon-pink: #ff00d4;
--neon-magenta: #ff00aa;
--neon-green: #00ff9d;
--neon-gold: #ffd700;

/* Deep Space Backgrounds */
--bg-void: #00010a;
--bg-deep: #010410;
--bg-surface: rgba(4, 12, 32, 0.94);
--bg-elevated: rgba(8, 22, 54, 0.90);
--bg-glass: rgba(6, 18, 44, 0.82);
--bg-glass-strong: rgba(10, 28, 68, 0.88);

/* Typography */
--text-primary: #ffffff;
--text-secondary: #a8d8ff;
--text-dim: #5a729a;
--text-glow: rgba(0, 245, 255, 0.8);

/* Borders & Glows */
--border-neon: rgba(0, 245, 255, 0.65);
--border-purple: rgba(157, 78, 221, 0.5);
--glow-cyan: 0 0 25px rgba(0, 245, 255, 0.75), 0 0 55px rgba(0, 245, 255, 0.45), 0 0 95px rgba(0, 245, 255, 0.25);
--glow-electric: 0 0 30px rgba(0, 250, 255, 0.85), 0 0 65px rgba(0, 250, 255, 0.55), 0 0 120px rgba(0, 250, 255, 0.35);
--glow-purple: 0 0 25px rgba(157, 78, 221, 0.65), 0 0 55px rgba(157, 78, 221, 0.4);
--glow-pink: 0 0 25px rgba(255, 0, 212, 0.65), 0 0 55px rgba(255, 0, 212, 0.4);
--glow-green: 0 0 25px rgba(0, 255, 157, 0.65), 0 0 55px rgba(0, 255, 157, 0.4);

/* Transitions */
--ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
--ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
--ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
--transition-fast: 0.25s var(--ease-smooth);
--transition-normal: 0.4s var(--ease-smooth);
--transition-bloom: 0.7s var(--ease-bounce);
--transition-elastic: 0.5s var(--ease-elastic);

/* Spacing & Radius */
--radius-sm: 8px;
--radius-md: 14px;
--radius-lg: 20px;
--radius-xl: 28px;
--radius-full: 9999px;
}

/* ✨ RESET & BASE ✨ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 20px; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-void);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.65;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
}

/* ✨✨ BACKGROUND LAYERS ✨✨ */
.bg-void {
position: fixed;
inset: 0;
z-index: -4;
background: 
radial-gradient(ellipse at 20% 15%, rgba(0, 245, 255, 0.12) 0%, transparent 60%),
radial-gradient(ellipse at 80% 25%, rgba(157, 78, 221, 0.10) 0%, transparent 60%),
radial-gradient(ellipse at 50% 85%, rgba(0, 255, 157, 0.08) 0%, transparent 65%),
radial-gradient(ellipse at 15% 75%, rgba(255, 0, 212, 0.06) 0%, transparent 70%);
animation: bgPulse 18s ease-in-out infinite alternate;
}
@keyframes bgPulse {
0%, 100% { opacity: 1; filter: hue-rotate(0deg) brightness(1); }
50% { opacity: 0.97; filter: hue-rotate(30deg) brightness(1.05); }
}

/* Animated Grid */
.grid-layer {
position: fixed;
inset: 0;
z-index: -3;
background-image:
linear-gradient(rgba(0, 245, 255, 0.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 245, 255, 0.06) 1px, transparent 1px),
linear-gradient(45deg, rgba(157, 78, 221, 0.03) 1px, transparent 1px);
background-size: 50px 50px, 50px 50px, 100px 100px;
mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 85%);
animation: gridFlow 30s linear infinite;
opacity: 0.9;
}
@keyframes gridFlow {
0% { background-position: 0 0, 0 0, 0 0; }
100% { background-position: 50px 50px, 50px 50px, 100px 100px; }
}

/* Aurora Waves */
.aurora {
position: fixed;
inset: 0;
z-index: -2;
background: 
radial-gradient(ellipse at 25% 35%, rgba(0, 245, 255, 0.08) 0%, transparent 65%),
radial-gradient(ellipse at 75% 55%, rgba(157, 78, 221, 0.08) 0%, transparent 65%),
radial-gradient(ellipse at 50% 20%, rgba(255, 0, 212, 0.05) 0%, transparent 70%);
filter: blur(40px);
animation: auroraWave 25s ease-in-out infinite;
pointer-events: none;
}
@keyframes auroraWave {
0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.9; }
33% { transform: translate(3%, -2%) scale(1.08); opacity: 1; }
66% { transform: translate(-2%, 3%) scale(0.95); opacity: 0.95; }
}

/* Floating Particles */
.particles {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
overflow: hidden;
}
.particle {
position: absolute;
width: 3px; height: 3px;
border-radius: 50%;
opacity: 0;
animation: particleRise 25s infinite ease-in-out;
}
.particle::before {
content: '';
position: absolute;
inset: -4px;
border-radius: 50%;
background: inherit;
filter: blur(3px);
opacity: 0.6;
}
.particle.cyan { background: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan); animation-duration: 22s; }
.particle.purple { background: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple); animation-duration: 28s; animation-delay: -8s; }
.particle.pink { background: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); animation-duration: 32s; animation-delay: -15s; }
.particle.green { background: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); animation-duration: 26s; animation-delay: -22s; }
@keyframes particleRise {
0%, 100% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
10%, 90% { opacity: 0.9; }
100% { transform: translateY(-100vh) rotate(720deg) scale(1.3); opacity: 0; }
}

/* Lightning Strikes */
.lightning {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
}
.lightning-bolt {
position: absolute;
top: -100px;
width: 2px;
height: 200vh;
background: linear-gradient(180deg, 
transparent 0%, 
var(--neon-electric) 20%, 
var(--neon-cyan) 40%, 
var(--neon-purple) 60%, 
var(--neon-electric) 80%, 
transparent 100%);
filter: blur(2px);
opacity: 0;
animation: lightningStrike 12s infinite;
box-shadow: 0 0 25px var(--neon-electric), 0 0 50px var(--neon-cyan);
}
.lightning-bolt:nth-child(1) { left: 15%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 4s; }
.lightning-bolt:nth-child(3) { left: 85%; animation-delay: 8s; }
@keyframes lightningStrike {
0%, 85%, 87%, 89%, 91%, 100% { opacity: 0; transform: scaleY(0.3) translateY(20px); }
86%, 88%, 90% { opacity: 0.25; transform: scaleY(1) translateY(0); }
}

/* CRT Scanline */
.scanline {
position: fixed;
left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, 
transparent, 
var(--neon-electric), 
var(--neon-cyan), 
var(--neon-purple), 
transparent);
opacity: 0.6;
animation: scanMove 6s linear infinite;
z-index: 100;
pointer-events: none;
filter: blur(1px);
box-shadow: 0 0 20px var(--neon-electric);
}
@keyframes scanMove {
0% { top: -5px; opacity: 0; }
5% { opacity: 0.6; }
95% { opacity: 0.6; }
100% { top: 100vh; opacity: 0; }
}

/* Noise Overlay */
.noise {
position: fixed;
inset: 0;
z-index: 90;
opacity: 0.035;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
pointer-events: none;
animation: noiseShift 10s steps(8) infinite;
}
@keyframes noiseShift {
0%, 100% { transform: translate(0, 0); }
25% { transform: translate(-3px, 2px); }
50% { transform: translate(2px, -3px); }
75% { transform: translate(-2px, -2px); }
}

/* ✨✨ LAYOUT ✨✨ */
.container {
max-width: 1440px;
margin: 0 auto;
padding: 30px 24px;
min-height: 100vh;
position: relative;
}

/* Back Button */
.back-btn {
position: fixed;
left: 24px; top: 24px;
display: inline-flex;
align-items: center;
gap: 8px;
padding: 9px 20px;
background: var(--bg-glass);
border: 1px solid var(--border-neon);
border-radius: var(--radius-full);
color: var(--neon-cyan);
font-family: 'Orbitron', sans-serif;
font-size: 11px;
font-weight: 700;
text-decoration: none;
text-transform: uppercase;
letter-spacing: 1.5px;
transition: var(--transition-normal);
backdrop-filter: blur(16px);
z-index: 1000;
box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.back-btn:hover {
background: var(--bg-glass-strong);
border-color: var(--neon-electric);
color: var(--bg-void);
transform: translateX(-6px);
box-shadow: var(--glow-cyan);
}
.back-btn i { font-size: 14px; transition: transform 0.3s; }
.back-btn:hover i { transform: translateX(-3px); }

/* ✨✨ HEADER ✨✨ */
.header {
text-align: center;
margin-bottom: 45px;
padding: 20px 0;
position: relative;
animation: headerReveal 1.2s var(--ease-bounce) backwards;
}
@keyframes headerReveal {
from { opacity: 0; transform: translateY(-40px) scale(0.98); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(34px, 8vw, 58px);
font-weight: 900;
letter-spacing: 6px;
margin-bottom: 14px;
position: relative;
background: linear-gradient(135deg, 
var(--neon-electric) 0%, 
var(--neon-cyan) 25%, 
#ffffff 50%, 
var(--neon-cyan) 75%, 
var(--neon-purple) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 0 0 40px rgba(0, 245, 255, 0.65);
animation: titleGlow 3s ease-in-out infinite, titleFloat 5s var(--ease-bounce) infinite;
}
@keyframes titleGlow {
0%, 100% { filter: brightness(1) drop-shadow(0 0 35px rgba(0, 245, 255, 0.5)); }
50% { filter: brightness(1.35) drop-shadow(0 0 55px rgba(0, 250, 255, 0.8)); }
}
@keyframes titleFloat {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-5px); }
}

.subtitle {
font-size: 13px;
color: var(--text-secondary);
letter-spacing: 7px;
text-transform: uppercase;
margin-bottom: 20px;
font-weight: 600;
text-shadow: 0 0 15px rgba(0, 245, 255, 0.45);
}

/* Status Badge */
.status-badge {
display: inline-flex;
align-items: center;
gap: 12px;
padding: 9px 24px;
background: linear-gradient(135deg, rgba(0, 255, 157, 0.18), rgba(0, 245, 255, 0.12));
border: 1px solid rgba(0, 255, 157, 0.55);
border-radius: var(--radius-full);
font-size: 11px;
font-weight: 700;
color: var(--neon-green);
text-transform: uppercase;
letter-spacing: 3px;
animation: badgePulse 2.5s ease-in-out infinite;
box-shadow: 0 0 25px rgba(0, 255, 157, 0.4);
}
@keyframes badgePulse {
0%, 100% { box-shadow: 0 0 25px rgba(0, 255, 157, 0.4); }
50% { box-shadow: 0 0 45px rgba(0, 255, 157, 0.75), 0 0 80px rgba(0, 255, 157, 0.4); }
}
.status-dot {
width: 10px; height: 10px;
background: var(--neon-green);
border-radius: 50%;
animation: dotPulse 1.5s ease-in-out infinite;
box-shadow: 0 0 18px var(--neon-green), 0 0 35px rgba(0, 255, 157, 0.6);
}
@keyframes dotPulse {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.6); opacity: 0.85; }
}

/* ✨✨ NAVIGATION ✨✨ */
.nav-tabs {
display: flex;
justify-content: center;
margin-bottom: 35px;
gap: 14px;
flex-wrap: wrap;
}
.nav-tab {
position: relative;
padding: 12px 30px;
background: var(--bg-surface);
border: 1px solid var(--border-neon);
border-radius: var(--radius-md);
color: var(--text-primary);
font-family: 'Orbitron', sans-serif;
font-size: 12px;
font-weight: 700;
cursor: pointer;
transition: var(--transition-normal);
text-transform: uppercase;
letter-spacing: 2px;
backdrop-filter: blur(14px);
overflow: hidden;
}
.nav-tab::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, 
rgba(0, 245, 255, 0.25), 
rgba(157, 78, 221, 0.18), 
rgba(0, 245, 255, 0.25));
opacity: 0;
transition: opacity 0.35s;
}
.nav-tab:hover, .nav-tab.active {
background: var(--bg-glass-strong);
border-color: var(--neon-electric);
color: var(--neon-electric);
transform: translateY(-4px);
box-shadow: var(--glow-electric);
}
.nav-tab:hover::before, .nav-tab.active::before { opacity: 1; }
.nav-tab i { margin-right: 8px; font-size: 14px; }

/* Section */
.section { display: none; }
.section.active { display: block; animation: sectionFade 0.7s var(--ease-bloom) backwards; }
@keyframes sectionFade {
from { opacity: 0; transform: translateY(35px); }
to { opacity: 1; transform: translateY(0); }
}

/* ✨✨ SEARCH ✨✨ */
.search-container {
max-width: 700px;
margin: 0 auto 35px;
position: relative;
}
.search-box {
width: 100%;
padding: 16px 56px 16px 24px;
background: var(--bg-surface);
border: 1px solid var(--border-neon);
border-radius: var(--radius-lg);
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 15px;
transition: var(--transition-normal);
backdrop-filter: blur(16px);
box-shadow: 0 4px 25px rgba(0, 0, 0, 0.25);
}
.search-box:focus {
outline: none;
border-color: var(--neon-electric);
background: var(--bg-elevated);
box-shadow: var(--glow-cyan);
}
.search-box::placeholder { color: var(--text-dim); }
.search-icon {
position: absolute;
right: 22px;
top: 50%;
transform: translateY(-50%);
color: var(--neon-cyan);
font-size: 18px;
pointer-events: none;
transition: color 0.3s;
}
.search-box:focus + .search-icon { color: var(--neon-electric); }

/* ✨✨ GALLERY ✨✨ */
.gallery-section {
margin-bottom: 50px;
animation: galleryReveal 0.9s var(--ease-bloom) backwards;
}
@keyframes galleryReveal {
from { opacity: 0; transform: translateY(50px); }
to { opacity: 1; transform: translateY(0); }
}

.section-title {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
font-weight: 700;
color: var(--text-primary);
margin-bottom: 22px;
padding-bottom: 14px;
border-bottom: 1px solid var(--border-neon);
display: flex;
align-items: center;
gap: 14px;
letter-spacing: 3px;
position: relative;
}
.section-title::before {
content: '';
width: 5px; height: 26px;
background: linear-gradient(180deg, var(--neon-electric), var(--neon-cyan), var(--neon-purple));
border-radius: 3px;
box-shadow: 0 0 18px rgba(0, 250, 255, 0.75);
animation: barPulse 2.5s ease-in-out infinite;
}
@keyframes barPulse {
0%, 100% { opacity: 1; transform: scaleY(1); }
50% { opacity: 0.85; transform: scaleY(1.15); }
}

.gallery-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
gap: 22px;
}

/* ✨✨ PREMIUM PHOTO CARD ✨✨ */
.photo-card {
position: relative;
background: var(--bg-surface);
border: 1px solid rgba(0, 245, 255, 0.4);
border-radius: var(--radius-lg);
overflow: hidden;
transition: var(--transition-bloom);
backdrop-filter: blur(14px);
animation: cardEntrance 0.7s ease forwards;
opacity: 0;
transform: translateY(30px);
box-shadow: 0 8px 35px rgba(0, 0, 0, 0.4);
}
.photo-card::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, 
rgba(0, 245, 255, 0.12), 
transparent 40%, 
rgba(157, 78, 221, 0.1));
opacity: 0;
transition: opacity 0.4s;
pointer-events: none;
z-index: 1;
}
.photo-card:hover::before { opacity: 1; }
.photo-card:nth-child(1) { animation-delay: 0.12s; }
.photo-card:nth-child(2) { animation-delay: 0.18s; }
.photo-card:nth-child(3) { animation-delay: 0.24s; }
.photo-card:nth-child(4) { animation-delay: 0.3s; }
.photo-card:nth-child(5) { animation-delay: 0.36s; }
.photo-card:nth-child(n+6) { animation-delay: 0.42s; }
@keyframes cardEntrance {
to { opacity: 1; transform: translateY(0); }
}
.photo-card:hover {
transform: translateY(-10px) scale(1.025);
border-color: var(--neon-electric);
box-shadow: var(--glow-electric), 0 25px 60px rgba(0, 0, 0, 0.55);
}

/* Image Wrapper with Glow Border */
.photo-wrapper {
position: relative;
width: 100%;
height: 300px;
background: radial-gradient(circle at 40% 30%, #0f2a4a 0%, #050d1f 70%, #01040f 100%);
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
}
.photo-wrapper::before {
content: '';
position: absolute;
inset: 0;
border: 2px solid transparent;
border-radius: var(--radius-md) var(--radius-md) 0 0;
background: linear-gradient(135deg, var(--neon-electric), var(--neon-purple)) border-box;
-webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
-webkit-mask-composite: xor;
mask-composite: exclude;
opacity: 0.6;
pointer-events: none;
}
.photo-wrapper::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(180deg, transparent 55%, rgba(0, 0, 0, 0.5));
pointer-events: none;
}
.photo-wrapper img {
width: 100%;
height: 100%;
object-fit: contain;
display: block;
padding: 12px;
transition: transform 0.5s var(--ease-bounce), filter 0.4s;
filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.35));
}
.photo-card:hover .photo-wrapper img {
transform: scale(1.09);
filter: drop-shadow(0 10px 35px rgba(0, 245, 255, 0.45));
}

/* Card Content */
.photo-info {
padding: 18px 20px 20px;
position: relative;
}
.photo-info::before {
content: '';
position: absolute;
top: 0;
left: 20px;
right: 20px;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.5), transparent);
}

.photo-title {
font-family: 'Orbitron', sans-serif;
font-size: 15px;
font-weight: 700;
color: var(--neon-electric);
margin-bottom: 16px;
word-break: break-word;
text-align: center;
text-shadow: 0 0 15px rgba(0, 250, 255, 0.65);
line-height: 1.45;
min-height: 44px;
display: flex;
align-items: center;
justify-content: center;
}

.photo-meta {
font-size: 12px;
color: var(--text-secondary);
text-align: center;
margin-bottom: 18px;
opacity: 0.92;
font-weight: 500;
}

/* ✨✨ ULTRA ACTION BUTTONS ✨✨ */
.action-buttons-row {
display: flex;
gap: 12px;
justify-content: center;
flex-wrap: wrap;
padding-top: 14px;
border-top: 1px solid rgba(0, 245, 255, 0.3);
}

.action-btn {
position: relative;
flex: 1;
min-width: 80px;
max-width: 100px;
height: 50px;
background: linear-gradient(135deg, rgba(0, 245, 255, 0.22), rgba(0, 245, 255, 0.14));
border: 1px solid rgba(0, 245, 255, 0.55);
border-radius: var(--radius-md);
color: var(--neon-electric);
font-size: 11px;
font-weight: 800;
cursor: pointer;
transition: var(--transition-elastic);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 5px;
text-transform: uppercase;
letter-spacing: 0.8px;
backdrop-filter: blur(12px);
overflow: hidden;
}
.action-btn::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, 
rgba(0, 245, 255, 0.35), 
rgba(157, 78, 221, 0.25), 
rgba(0, 245, 255, 0.35));
opacity: 0;
transition: opacity 0.3s;
}
.action-btn i {
font-size: 18px;
margin-bottom: 2px;
z-index: 1;
transition: transform 0.3s;
}
.action-btn span {
font-size: 9px;
font-weight: 700;
z-index: 1;
}
.action-btn:hover {
background: linear-gradient(135deg, rgba(0, 245, 255, 0.48), rgba(0, 250, 255, 0.38));
border-color: var(--neon-electric);
transform: translateY(-5px) scale(1.08);
box-shadow: 0 10px 40px rgba(0, 250, 255, 0.65);
color: var(--bg-void);
}
.action-btn:hover::before { opacity: 1; }
.action-btn:hover i { transform: translateY(-2px); }

.action-btn.copy-btn:hover {
background: linear-gradient(135deg, rgba(0, 255, 157, 0.48), rgba(0, 220, 130, 0.38));
border-color: var(--neon-green);
box-shadow: 0 10px 40px rgba(0, 255, 157, 0.65);
}
.action-btn.download-btn:hover {
background: linear-gradient(135deg, rgba(0, 245, 255, 0.48), rgba(0, 200, 255, 0.38));
border-color: var(--neon-azure);
box-shadow: 0 10px 40px rgba(0, 245, 255, 0.65);
}

/* Loading State */
.loading {
display: none;
text-align: center;
padding: 50px 20px;
grid-column: 1 / -1;
}
.loading.active { display: block; }
.loader {
width: 54px;
height: 54px;
border: 4px solid rgba(0, 245, 255, 0.25);
border-top-color: var(--neon-electric);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 22px;
box-shadow: var(--glow-electric);
position: relative;
}
.loader::after {
content: '';
position: absolute;
inset: -6px;
border: 3px solid transparent;
border-top-color: var(--neon-purple);
border-radius: 50%;
animation: spin 1.5s linear infinite reverse;
}
.loader::before {
content: '';
position: absolute;
inset: -12px;
border: 2px solid transparent;
border-top-color: var(--neon-pink);
border-radius: 50%;
animation: spin 2s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
color: var(--neon-electric);
font-family: 'Orbitron', sans-serif;
font-size: 13px;
font-weight: 600;
letter-spacing: 2px;
animation: textPulse 1.5s ease-in-out infinite;
}
@keyframes textPulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.7; }
}

/* ✨✨ MODAL ✨✨ */
.modal-backdrop {
position: fixed;
inset: 0;
background: rgba(0, 2, 10, 0.97);
backdrop-filter: blur(24px);
z-index: 2000;
display: none;
align-items: center;
justify-content: center;
padding: 24px;
animation: modalIn 0.4s var(--ease-bloom);
}
@keyframes modalIn {
from { opacity: 0; }
to { opacity: 1; }
}
.modal-backdrop.active { display: flex; }

.modal-content {
background: var(--bg-surface);
border: 1px solid var(--border-neon);
border-radius: var(--radius-xl);
max-width: 1000px;
width: 100%;
max-height: 95vh;
overflow: hidden;
display: flex;
flex-direction: column;
box-shadow: var(--glow-electric), 0 30px 80px rgba(0, 0, 0, 0.6);
animation: modalSlide 0.5s var(--ease-bloom);
}
@keyframes modalSlide {
from { opacity: 0; transform: translateY(40px) scale(0.97); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 18px 26px;
border-bottom: 1px solid rgba(0, 245, 255, 0.3);
background: linear-gradient(90deg, rgba(0, 245, 255, 0.1), transparent, rgba(157, 78, 221, 0.1));
}
.modal-title {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
color: var(--neon-electric);
font-weight: 700;
}
.modal-close {
width: 40px;
height: 40px;
background: transparent;
border: 1px solid var(--neon-pink);
border-radius: 50%;
color: var(--neon-pink);
font-size: 16px;
cursor: pointer;
transition: var(--transition-normal);
display: flex;
align-items: center;
justify-content: center;
}
.modal-close:hover {
background: var(--neon-pink);
color: var(--bg-void);
transform: rotate(90deg) scale(1.12);
box-shadow: var(--glow-pink);
}

.modal-body {
padding: 26px;
text-align: center;
overflow-y: auto;
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
background: radial-gradient(circle at center, #0d2848 0%, #040d1f 100%);
}
.modal-body img {
max-width: 100%;
max-height: 68vh;
width: auto;
object-fit: contain;
border-radius: var(--radius-md);
box-shadow: 0 0 40px rgba(0, 245, 255, 0.45), 0 15px 50px rgba(0, 0, 0, 0.5);
transition: transform 0.4s var(--ease-bounce);
}
.modal-body img:hover { transform: scale(1.03); }

.modal-actions {
margin-top: 22px;
display: flex;
gap: 14px;
justify-content: center;
flex-wrap: wrap;
}

/* ✨✨ TOAST ✨✨ */
.toast {
position: fixed;
bottom: 30px;
right: 30px;
display: flex;
align-items: center;
gap: 12px;
padding: 15px 28px;
background: var(--bg-glass-strong);
border: 1px solid var(--neon-electric);
border-left: 4px solid var(--neon-electric);
border-radius: var(--radius-md);
color: var(--neon-electric);
font-weight: 700;
font-size: 13px;
z-index: 3000;
box-shadow: var(--glow-electric);
backdrop-filter: blur(16px);
transform: translateX(300px);
opacity: 0;
transition: var(--transition-bloom);
}
.toast.show {
transform: translateX(0);
opacity: 1;
}
.toast i { font-size: 18px; }
.toast.success { border-left-color: var(--neon-green); color: var(--neon-green); }
.toast.error { border-left-color: var(--neon-pink); color: var(--neon-pink); }

/* ✨✨ SCROLLBAR ✨✨ */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { 
background: var(--bg-deep); 
border-left: 1px solid rgba(0, 245, 255, 0.15);
}
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon-electric), var(--neon-cyan), var(--neon-purple));
border-radius: var(--radius-full);
border: 2px solid var(--bg-deep);
box-shadow: 0 0 18px rgba(0, 250, 255, 0.55);
}
::-webkit-scrollbar-thumb:hover {
background: linear-gradient(180deg, var(--neon-cyan), var(--neon-electric), var(--neon-violet));
box-shadow: 0 0 25px rgba(0, 250, 255, 0.75);
}

/* Selection */
::selection {
background: rgba(0, 245, 255, 0.45);
color: var(--text-primary);
text-shadow: 0 0 12px rgba(0, 245, 255, 0.7);
}

/* Focus */
a:focus, button:focus, input:focus {
outline: 2px solid var(--neon-electric);
outline-offset: 3px;
box-shadow: 0 0 0 5px rgba(0, 245, 255, 0.25);
}

/* ✨✨ RESPONSIVE ✨✨ */
@media (max-width: 1024px) {
.gallery-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
.container { padding: 22px 16px; }
.back-btn { left: 16px; top: 16px; padding: 8px 16px; font-size: 10px; }
.title { font-size: clamp(28px, 9vw, 44px); letter-spacing: 4px; }
.subtitle { font-size: 11px; letter-spacing: 5px; }
.search-box { padding: 14px 50px 14px 20px; font-size: 14px; }
.gallery-grid { grid-template-columns: 1fr; gap: 18px; }
.photo-wrapper { height: 260px; }
.photo-title { font-size: 14px; min-height: auto; }
.action-btn { min-width: 70px; max-width: 90px; height: 46px; }
.action-btn i { font-size: 16px; }
.action-btn span { font-size: 8px; }
.nav-tab { padding: 10px 24px; font-size: 11px; }
.modal-content { border-radius: var(--radius-lg); }
.modal-body { padding: 20px; }
.toast { bottom: 20px; right: 20px; padding: 13px 24px; font-size: 12px; }
}
@media (max-width: 480px) {
.nav-tabs { gap: 10px; }
.nav-tab { padding: 9px 20px; font-size: 10px; }
.action-buttons-row { gap: 10px; }
.action-btn { min-width: 65px; height: 44px; }
}

/* ✨✨ ACCESSIBILITY ✨✨ */
@media (prefers-reduced-motion: reduce) {
*, *::before, *::after {
animation-duration: 0.01ms !important;
animation-iteration-count: 1 !important;
transition-duration: 0.01ms !important;
}
}
</style>
</head>
<body>
<!-- Background Layers -->
<div class="bg-void"></div>
<div class="grid-layer"></div>
<div class="aurora"></div>
<div class="noise"></div>
<div class="particles" id="particles"></div>
<div class="lightning">
<div class="lightning-bolt"></div>
<div class="lightning-bolt"></div>
<div class="lightning-bolt"></div>
</div>
<div class="scanline"></div>

<!-- Back Button -->
<a href="index.html" class="back-btn">
<i class="fas fa-arrow-left"></i> Kembali
</a>

<!-- Main Container -->
<div class="container">
<header class="header">
<h1 class="title">⚡ FOTO GALLERY</h1>
<p class="subtitle">LINE TOGEL • Cyber Portal 2026</p>
<div class="status-badge">
<span class="status-dot"></span>
<span>System Online</span>
</div>
</header>

<!-- Navigation -->
<div class="nav-tabs">
<button class="nav-tab active">
<i class="fas fa-images"></i> Galeri Foto
</button>
</div>

<!-- Gallery Section -->
<section id="gallery" class="section active">
<div class="search-container">
<input type="text" class="search-box" id="searchInput" placeholder="Cari foto berdasarkan judul..." onkeyup="searchPhotos()">
<i class="fas fa-search search-icon"></i>
</div>

<div class="loading" id="loading">
<div class="loader"></div>
<div class="loading-text">⚡ LOADING PHOTOS...</div>
</div>

<div class="gallery-grid" id="galleryGrid"></div>
</section>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="imageModal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title" id="modalTitle">Foto Detail</h3>
<button class="modal-close" onclick="closeModal()" aria-label="Tutup modal">
<i class="fas fa-times"></i>
</button>
</div>
<div class="modal-body">
<img src="" alt="" id="modalImage">
<div class="modal-actions">
<button class="action-btn copy-btn" onclick="copyImage()">
<i class="fas fa-copy"></i>
<span>Copy</span>
</button>
<button class="action-btn download-btn" onclick="downloadModalImage()">
<i class="fas fa-download"></i>
<span>Download</span>
</button>
</div>
</div>
</div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast">
<i class="fas fa-bolt"></i>
<span id="toastText">Berhasil!</span>
</div>

<script>
/* ✨✨ PREMIUM GALLERY SCRIPT ✨✨ */
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';

document.addEventListener('DOMContentLoaded', () => {
initParticles();
fetchPhotosFromSheet();
});

/* Particle System */
function initParticles() {
const container = document.getElementById('particles');
if (!container) return;
const colors = ['cyan', 'purple', 'pink', 'green'];
for (let i = 0; i < 70; i++) {
const p = document.createElement('div');
p.className = `particle ${colors[Math.floor(Math.random() * colors.length)]}`;
p.style.left = `${Math.random() * 100}%`;
p.style.top = `${Math.random() * 100}%`;
p.style.animationDelay = `${Math.random() * 30}s`;
container.appendChild(p);
}
}

/* Fetch Photos from Google Sheets */
async function fetchPhotosFromSheet() {
document.getElementById('loading').classList.add('active');
document.getElementById('galleryGrid').innerHTML = '';
try {
const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';
const range = 'C2:D150';

try {
// Try GVIZ API first
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=${range}`;
const response = await fetch(gvizUrl);
const text = await response.text();
const json = JSON.parse(text.substring(47).slice(0, -2));
parseRows(json.table.rows);
} catch (e) {
// Fallback to CSV
console.log('GVIZ failed, trying CSV...', e);
const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=${range}`;
const csvResponse = await fetch(csvUrl);
const csvText = await csvResponse.text();
const rows = csvText.split('\n').map(row => {
const match = row.match(/"([^"]*)"|"([^"]*)"|([^,]+)/g);
return match ? match.map(cell => cell.replace(/^"|"$/g, '').trim()) : [];
});
parseCSV(rows);
}
renderGallery(allPhotos);
showToast(`⚡ ${allPhotos.length} foto dimuat`, 'success');
} catch (error) {
console.error('Fetch error:', error);
showToast('❗ Gagal memuat data', 'error');
showEmptyState('Gagal Memuat', 'Periksa koneksi atau publikasi Google Sheets');
}
document.getElementById('loading').classList.remove('active');
}

function parseRows(rows) {
allPhotos = [];
rows.forEach((row, idx) => {
if (!row.c) return;
const judul = row.c[0]?.v || '';
const foto = row.c[1]?.v || '';
if (judul && foto) {
allPhotos.push({ judul, foto, index: idx + 2 });
}
});
}

function parseCSV(rows) {
allPhotos = [];
rows.forEach((row, idx) => {
if (row.length < 2) return;
const judul = row[0]?.trim() || '';
const foto = row[1]?.trim() || '';
if (judul && foto) {
allPhotos.push({ judul, foto, index: idx + 2 });
}
});
}

/* Render Gallery */
function renderGallery(photos) {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';
if (!photos.length) {
showEmptyState('Tidak Ada Foto', 'Coba kata kunci pencarian lain');
return;
}
photos.forEach((photo, idx) => {
grid.appendChild(createPhotoCard(photo.foto, photo.judul, idx));
});
}

function showEmptyState(title, message) {
document.getElementById('galleryGrid').innerHTML = `
<div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">
<i class="fas fa-image" style="font-size: 56px; color: var(--neon-cyan); opacity: 0.7; margin-bottom: 20px; text-shadow: 0 0 30px rgba(0,245,255,0.5);"></i>
<h3 style="font-family: 'Orbitron'; color: var(--neon-electric); font-size: 18px; margin-bottom: 10px;">${title}</h3>
<p style="color: var(--text-secondary);">${message}</p>
</div>
`;
}

/* ✨ Premium Photo Card */
function createPhotoCard(url, title, index) {
const card = document.createElement('div');
card.className = 'photo-card';
card.innerHTML = `
<div class="photo-wrapper">
<img src="${url}" alt="${escapeHtml(title)}" 
onerror="this.src='https://via.placeholder.com/400x300/0a1a3f/00f5ff?text=No+Image'" 
loading="lazy" 
onclick="viewFullImage('${url}', '${escapeHtml(title).replace(/'/g, "\\'")}')" 
style="cursor: pointer;">
</div>
<div class="photo-info">
<div class="photo-title">${escapeHtml(title)}</div>
<div class="photo-meta">Foto #${index + 1}</div>
<div class="action-buttons-row">
<button class="action-btn copy-btn" onclick="copyPhoto('${url}')" title="Salin ke clipboard">
<i class="fas fa-copy"></i><span>Copy</span>
</button>
<button class="action-btn download-btn" onclick="downloadPhoto('${url}', '${escapeHtml(title).replace(/'/g, "\\'")}')" title="Download foto">
<i class="fas fa-download"></i><span>Download</span>
</button>
</div>
</div>
`;
return card;
}

function escapeHtml(text) {
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}

/* Search */
function searchPhotos() {
const term = document.getElementById('searchInput').value.toLowerCase().trim();
const filtered = term 
? allPhotos.filter(p => p.judul.toLowerCase().includes(term))
: allPhotos;
renderGallery(filtered);
if (filtered.length) showToast(`⚡ ${filtered.length} hasil ditemukan`, 'success');
}

/* Modal Functions */
function viewFullImage(url, title) {
currentImageUrl = url;
currentImageTitle = title;
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalImage').src = url;
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
}

function closeModal() {
document.getElementById('imageModal').classList.remove('active');
document.body.style.overflow = '';
currentImageUrl = currentImageTitle = '';
}

/* Copy & Download */
async function copyPhoto(url) {
try {
const res = await fetch(url);
const blob = await res.blob();
await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
showToast('✅ Foto disalin ke clipboard!', 'success');
} catch (e) {
showToast('❗ Klik kanan gambar > Copy Image', 'error');
}
}

async function copyImage() {
if (currentImageUrl) await copyPhoto(currentImageUrl);
}

function downloadPhoto(url, filename) {
const link = document.createElement('a');
link.href = url;
link.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
link.target = '_blank';
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
showToast('⚡ Download dimulai...', 'success');
}

function downloadModalImage() {
if (currentImageUrl && currentImageTitle) {
downloadPhoto(currentImageUrl, currentImageTitle);
}
}

/* Toast */
function showToast(message, type = 'success') {
const toast = document.getElementById('toast');
document.getElementById('toastText').textContent = message;
toast.className = `toast ${type} show`;
setTimeout(() => toast.classList.remove('show'), 4000);
}

/* Event Listeners */
document.getElementById('imageModal').addEventListener('click', e => {
if (e.target.id === 'imageModal') closeModal();
});
document.addEventListener('keydown', e => {
if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>

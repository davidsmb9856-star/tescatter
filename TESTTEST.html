<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f3ff">
<title>🔷 KENDALA ALL - NEON BLUE 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  /* ===== NEON BLUE PALETTE ===== */
  --neon-cyan: #00f3ff;
  --neon-azure: #00d4ff;
  --neon-electric: #7df9ff;
  --neon-deep: #006699;
  --neon-glow: rgba(0, 243, 255, 0.6);
  
  /* Background System */
  --bg-primary: #070a11;
  --bg-secondary: #0b1220;
  --bg-tertiary: #0e1a2e;
  --bg-card: linear-gradient(145deg, rgba(11,18,32,0.95), rgba(14,26,46,0.98));
  --bg-glass: rgba(14, 26, 46, 0.75);
  
  /* Text System */
  --text-primary: #f0f9ff;
  --text-secondary: #a8d8f0;
  --text-muted: #6b9ec4;
  --text-glow: 0 0 12px rgba(0, 243, 255, 0.5);
  
  /* Effects */
  --border-glow: 0 0 0 1px rgba(0, 243, 255, 0.3), 0 0 20px rgba(0, 243, 255, 0.15);
  --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 243, 255, 0.1);
  --hover-shadow: 0 12px 48px rgba(0, 243, 255, 0.25), 0 0 32px rgba(125, 249, 255, 0.18);
  --neon-ring: 0 0 0 2px rgba(0, 243, 255, 0.4), 0 0 28px rgba(0, 243, 255, 0.35);
  
  /* Transitions */
  --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
  --transition-quick: 180ms var(--ease-smooth);
  --transition-normal: 320ms var(--ease-smooth);
  --transition-slow: 520ms var(--ease-smooth);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Exo 2', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  position: relative;
}

/* ========== AMBIENT BACKGROUND SYSTEM ========== */
.ambient-bg {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(1200px 600px at 10% -10%, rgba(0, 212, 255, 0.08), transparent 60%),
    radial-gradient(800px 400px at 90% 10%, rgba(125, 249, 255, 0.06), transparent 55%),
    radial-gradient(600px 300px at 50% 100%, rgba(0, 102, 153, 0.12), transparent 50%),
    linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
  z-index: -3;
}

.ambient-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    repeating-linear-gradient(0deg, transparent 0, transparent 49px, rgba(0, 243, 255, 0.025) 50px),
    repeating-linear-gradient(90deg, transparent 0, transparent 49px, rgba(0, 243, 255, 0.025) 50px);
  animation: gridShift 30s linear infinite;
  pointer-events: none;
}

@keyframes gridShift {
  0% { transform: perspective(500px) rotateX(55deg) translateY(0) translateZ(0); }
  100% { transform: perspective(500px) rotateX(55deg) translateY(50px) translateZ(0); }
}

.aurora {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 30%, rgba(0, 243, 255, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(0, 212, 255, 0.035) 0%, transparent 50%);
  animation: auroraPulse 18s ease-in-out infinite alternate;
  z-index: -2;
  pointer-events: none;
}

@keyframes auroraPulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.03); }
}

.particle-field {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--neon-cyan);
  border-radius: 50%;
  opacity: 0.6;
  animation: particleFloat linear infinite;
  box-shadow: 0 0 8px var(--neon-cyan);
}

@keyframes particleFloat {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.8; }
  100% { transform: translateY(-20vh) rotate(720deg); opacity: 0; }
}

.scan-beam {
  position: fixed;
  top: -2px;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, 
    transparent, 
    var(--neon-electric), 
    var(--neon-cyan), 
    var(--neon-electric), 
    transparent
  );
  box-shadow: 0 0 24px var(--neon-cyan);
  animation: scanBeam 14s linear infinite;
  z-index: 1;
  opacity: 0.4;
  pointer-events: none;
}

@keyframes scanBeam {
  0% { top: -2px; opacity: 0; }
  8% { opacity: 0.4; }
  92% { opacity: 0.4; }
  100% { top: 102%; opacity: 0; }
}

/* ========== MAIN CONTAINER ========== */
.app-wrapper {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px 20px 40px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 2;
}

/* ========== HEADER SECTION ========== */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  margin-bottom: 28px;
  background: var(--bg-glass);
  border: 1px solid rgba(0, 243, 255, 0.25);
  border-radius: 20px;
  backdrop-filter: blur(16px);
  box-shadow: var(--border-glow);
  position: relative;
  overflow: hidden;
}

.app-header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(0, 243, 255, 0.06), 
    rgba(0, 212, 255, 0.04), 
    transparent
  );
  animation: headerShine 4s ease-in-out infinite;
  pointer-events: none;
}

@keyframes headerShine {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: rgba(0, 243, 255, 0.12);
  border: 1px solid rgba(0, 243, 255, 0.35);
  border-radius: 12px;
  color: var(--neon-cyan);
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  transition: var(--transition-quick);
}

.back-btn:hover {
  background: rgba(0, 243, 255, 0.22);
  transform: translateX(-2px);
  box-shadow: var(--neon-ring);
}

.header-center {
  text-align: center;
  flex: 1;
}

.app-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-electric), var(--neon-azure));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 200% 200%;
  animation: titleFlow 4s ease infinite;
  text-shadow: 0 0 28px rgba(0, 243, 255, 0.45);
  letter-spacing: 1px;
  margin-bottom: 4px;
}

@keyframes titleFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.app-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 2.5px;
  font-weight: 400;
}

.header-right {
  display: flex;
  align-items: center;
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: rgba(0, 243, 255, 0.08);
  border: 1px solid rgba(0, 243, 255, 0.28);
  border-radius: 50px;
  font-size: 11px;
  font-weight: 700;
  color: var(--neon-cyan);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.status-dot {
  width: 8px;
  height: 8px;
  background: var(--neon-electric);
  border-radius: 50%;
  animation: statusPulse 2s ease-in-out infinite;
  box-shadow: 0 0 12px var(--neon-cyan);
}

@keyframes statusPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: 0.7; }
}

/* ========== SEARCH & STATS BAR ========== */
.search-stats-bar {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  margin-bottom: 32px;
  padding: 20px 24px;
  background: var(--bg-glass);
  border: 1px solid rgba(0, 243, 255, 0.22);
  border-radius: 20px;
  backdrop-filter: blur(14px);
  box-shadow: var(--border-glow);
}

.search-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.search-wrapper i {
  position: absolute;
  left: 18px;
  color: var(--neon-cyan);
  font-size: 16px;
  z-index: 1;
  animation: searchIconPulse 2.5s ease-in-out infinite;
}

@keyframes searchIconPulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; text-shadow: 0 0 14px var(--neon-cyan); }
}

#searchInput {
  width: 100%;
  padding: 14px 18px 14px 48px;
  background: rgba(11, 18, 32, 0.85);
  border: 1px solid rgba(0, 243, 255, 0.32);
  border-radius: 14px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: 'Exo 2', sans-serif;
  transition: var(--transition-quick);
}

#searchInput::placeholder {
  color: var(--text-muted);
}

#searchInput:focus {
  outline: none;
  border-color: var(--neon-cyan);
  box-shadow: var(--neon-ring);
  background: rgba(14, 26, 46, 0.92);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  min-width: 280px;
}

.stat-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 16px;
  background: rgba(0, 243, 255, 0.06);
  border: 1px solid rgba(0, 243, 255, 0.18);
  border-radius: 12px;
  transition: var(--transition-quick);
}

.stat-card:hover {
  background: rgba(0, 243, 255, 0.12);
  border-color: rgba(0, 243, 255, 0.35);
  transform: translateY(-2px);
}

.stat-number {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--neon-electric);
  text-shadow: 0 0 16px rgba(125, 249, 255, 0.55);
  animation: statGlow 3s ease-in-out infinite;
}

@keyframes statGlow {
  0%, 100% { text-shadow: 0 0 12px rgba(125, 249, 255, 0.4); }
  50% { text-shadow: 0 0 24px rgba(125, 249, 255, 0.85), 0 0 42px rgba(0, 243, 255, 0.5); }
}

.stat-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-top: 4px;
}

/* ========== KENDALA CARDS GRID ========== */
.kendala-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 20px;
  flex: 1;
}

.kendala-card {
  background: var(--bg-card);
  border: 1px solid rgba(0, 243, 255, 0.22);
  border-radius: 20px;
  overflow: hidden;
  transition: var(--transition-normal);
  box-shadow: var(--card-shadow);
  display: flex;
  flex-direction: column;
  animation: cardReveal 0.4s var(--ease-smooth) forwards;
  opacity: 0;
  transform: translateY(16px);
}

.kendala-card:nth-child(1) { animation-delay: 0.05s; }
.kendala-card:nth-child(2) { animation-delay: 0.1s; }
.kendala-card:nth-child(3) { animation-delay: 0.15s; }
.kendala-card:nth-child(4) { animation-delay: 0.2s; }
.kendala-card:nth-child(5) { animation-delay: 0.25s; }
.kendala-card:nth-child(n+6) { animation-delay: 0.3s; }

@keyframes cardReveal {
  to { opacity: 1; transform: translateY(0); }
}

.kendala-card:hover {
  border-color: rgba(0, 243, 255, 0.45);
  box-shadow: var(--hover-shadow);
  transform: translateY(-4px);
}

.card-accent {
  height: 3px;
  background: linear-gradient(90deg, var(--neon-cyan), var(--neon-electric), var(--neon-azure));
  animation: accentFlow 3s ease infinite;
}

@keyframes accentFlow {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}

.card-header {
  padding: 18px 22px;
  border-bottom: 1px solid rgba(0, 243, 255, 0.15);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  transition: var(--transition-quick);
}

.card-header:hover {
  background: rgba(0, 243, 255, 0.04);
}

.card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--neon-electric);
  line-height: 1.4;
  text-shadow: var(--text-glow);
  flex: 1;
}

.card-toggle {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 243, 255, 0.12);
  border: 1px solid rgba(0, 243, 255, 0.35);
  border-radius: 8px;
  color: var(--neon-cyan);
  font-size: 12px;
  transition: var(--transition-quick);
  flex-shrink: 0;
}

.card-toggle i {
  transition: transform 0.25s var(--ease-smooth);
}

.kendala-card.expanded .card-toggle i {
  transform: rotate(180deg);
}

/* ========== CARD CONTENT ========== */
.card-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s var(--ease-smooth), padding 0.35s var(--ease-smooth);
}

.kendala-card.expanded .card-content {
  max-height: 2000px;
  padding: 0 22px 22px;
}

/* Title Photo Section */
.title-photo-section {
  margin: 16px 0;
  padding: 14px;
  background: rgba(0, 243, 255, 0.05);
  border: 1px dashed rgba(0, 243, 255, 0.28);
  border-radius: 14px;
  text-align: center;
}

.title-photo-wrapper {
  position: relative;
  display: inline-block;
  margin-bottom: 12px;
}

.title-photo-img {
  max-width: 100%;
  max-height: 220px;
  border-radius: 12px;
  border: 2px solid var(--neon-cyan);
  cursor: pointer;
  transition: var(--transition-normal);
  box-shadow: 0 0 22px rgba(0, 243, 255, 0.35);
}

.title-photo-img:hover {
  transform: scale(1.02);
  box-shadow: 0 0 35px rgba(0, 243, 255, 0.55), 0 0 55px rgba(125, 249, 255, 0.3);
}

.photo-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 11px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-azure));
  color: var(--bg-primary);
  border-radius: 8px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  box-shadow: 0 0 14px rgba(0, 243, 255, 0.5);
}

.photo-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.photo-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 15px;
  background: rgba(0, 243, 255, 0.12);
  border: 1px solid rgba(0, 243, 255, 0.35);
  border-radius: 10px;
  color: var(--neon-cyan);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition-quick);
}

.photo-btn:hover {
  background: rgba(0, 243, 255, 0.24);
  transform: translateY(-2px);
  box-shadow: var(--neon-ring);
}

/* Answer Items */
.answer-section {
  margin-top: 18px;
}

.answer-item {
  margin-bottom: 14px;
  padding: 14px 16px;
  background: rgba(11, 18, 32, 0.72);
  border-left: 3px solid var(--neon-cyan);
  border-radius: 0 12px 12px 0;
  transition: var(--transition-quick);
}

.answer-item:hover {
  background: rgba(14, 26, 46, 0.85);
  border-left-color: var(--neon-electric);
  transform: translateX(3px);
}

.answer-label {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  font-weight: 700;
  color: var(--neon-electric);
  text-transform: uppercase;
  letter-spacing: 1.1px;
  margin-bottom: 10px;
  text-shadow: 0 0 8px rgba(125, 249, 255, 0.45);
}

.answer-label i {
  font-size: 12px;
}

.answer-text {
  color: var(--text-secondary);
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}

.answer-text a {
  color: var(--neon-cyan);
  text-decoration: none;
  font-weight: 600;
  position: relative;
  transition: var(--transition-quick);
}

.answer-text a::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--neon-electric);
  transition: width 0.2s var(--ease-smooth);
}

.answer-text a:hover::after {
  width: 100%;
}

.answer-text a:hover {
  text-shadow: 0 0 10px rgba(0, 243, 255, 0.7);
}

/* Answer Actions */
.answer-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.action-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  background: rgba(0, 243, 255, 0.1);
  border: 1px solid rgba(0, 243, 255, 0.28);
  border-radius: 9px;
  color: var(--neon-cyan);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition-quick);
}

.action-btn:hover {
  background: rgba(0, 243, 255, 0.22);
  transform: translateY(-1px);
  box-shadow: 0 0 16px rgba(0, 243, 255, 0.25);
}

.action-btn.copied {
  background: rgba(0, 243, 255, 0.28);
  border-color: var(--neon-electric);
  animation: btnPulse 0.35s ease;
}

@keyframes btnPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.link-btn {
  background: rgba(0, 180, 220, 0.14);
  border-color: rgba(0, 180, 220, 0.45);
  color: #00e0ff;
}

.link-btn:hover {
  background: rgba(0, 180, 220, 0.28);
  box-shadow: 0 0 16px rgba(0, 180, 220, 0.35);
}

/* In-content Photo */
.content-photo {
  margin: 12px 0;
  text-align: center;
}

.content-photo img {
  max-width: 100%;
  max-height: 200px;
  border-radius: 12px;
  border: 2px solid var(--neon-cyan);
  cursor: pointer;
  transition: var(--transition-normal);
  box-shadow: 0 0 18px rgba(0, 243, 255, 0.32);
}

.content-photo img:hover {
  transform: scale(1.025);
  box-shadow: 0 0 32px rgba(0, 243, 255, 0.52);
}

/* ========== STICKY NOTES PANEL ========== */
.sticky-fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 58px;
  height: 58px;
  background: radial-gradient(circle at 30% 30%, var(--neon-electric), var(--neon-cyan), var(--neon-azure));
  border: 2px solid rgba(240, 249, 255, 0.4);
  border-radius: 50%;
  color: var(--bg-primary);
  font-size: 22px;
  cursor: pointer;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 32px rgba(0, 243, 255, 0.65), 0 0 64px rgba(0, 243, 255, 0.35);
  transition: var(--transition-normal);
  animation: fabGlow 2.5s ease-in-out infinite alternate;
}

.sticky-fab:hover {
  transform: scale(1.12) rotate(8deg);
  box-shadow: 0 0 48px rgba(0, 243, 255, 0.85), 0 0 88px rgba(125, 249, 255, 0.55);
}

@keyframes fabGlow {
  0%, 100% { box-shadow: 0 0 24px rgba(0, 243, 255, 0.55), 0 0 48px rgba(0, 243, 255, 0.25); }
  50% { box-shadow: 0 0 42px rgba(0, 243, 255, 0.75), 0 0 72px rgba(125, 249, 255, 0.45); }
}

.sticky-panel {
  position: fixed;
  bottom: 96px;
  right: 24px;
  width: 380px;
  max-width: calc(100vw - 48px);
  height: 65vh;
  max-height: 560px;
  background: linear-gradient(160deg, rgba(14, 26, 46, 0.98), rgba(11, 18, 32, 0.99));
  border: 1px solid rgba(0, 243, 255, 0.32);
  border-radius: 22px;
  display: none;
  flex-direction: column;
  z-index: 999;
  backdrop-filter: blur(20px);
  box-shadow: 0 0 52px rgba(0, 243, 255, 0.38), inset 0 0 24px rgba(0, 243, 255, 0.08);
  animation: panelSlide 0.32s var(--ease-smooth);
}

.sticky-panel.active {
  display: flex;
}

@keyframes panelSlide {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 22px;
  border-bottom: 1px solid rgba(0, 243, 255, 0.22);
  flex-shrink: 0;
}

.panel-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  color: var(--neon-electric);
  font-weight: 700;

<script>
// ===== CONFIG =====
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

// ===== STATE =====
let allKendala = [];
let filteredKendala = [];
let lightboxImages = [];
let lightboxIndex = 0;
let zoomLevel = 1;
let editIndex = null;

// ===== DATA LOADING =====
async function loadKendalaData() {
  try {
    const response = await fetch(DATA_URL);
    const text = await response.text();
    const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (!jsonMatch) throw new Error('Parse failed');
    
    const data = JSON.parse(jsonMatch[1]);
    const rows = data.table?.rows || [];
    
    allKendala = rows.map(row => {
      const cells = row.c || [];
      return {
        judul: cells[0]?.v?.toString().trim() || '',
        jawaban1: cells[1]?.v?.toString().trim() || '',
        jawaban2: cells[2]?.v?.toString().trim() || '',
        jawaban3: cells[3]?.v?.toString().trim() || ''
      };
    }).filter(item => item.judul && item.judul !== '');
    
    filteredKendala = [...allKendala];
    renderKendala();
    updateStats();
  } catch (error) {
    document.getElementById('kendalaContainer').innerHTML = `
      <div class="error-state">
        <i class="fas fa-exclamation-triangle"></i>
        <p><strong>Gagal memuat data</strong></p>
        <p style="font-size: 12px; margin-top: 10px; opacity: 0.85;">Pastikan Google Sheet sudah dipublikasikan</p>
        <p style="font-size: 11px; margin-top: 12px; opacity: 0.6;">${error.message}</p>
      </div>`;
  }
}

// ===== RENDERING =====
function renderKendala(data = filteredKendala) {
  const container = document.getElementById('kendalaContainer');
  
  if (data.length === 0) {
    container.innerHTML = '<div class="empty-state"><p style="font-size: 16px;">Tidak ada data ditemukan</p></div>';
    return;
  }
  
  container.innerHTML = `<div class="kendala-grid">${data.map((item, index) => createKendalaCard(item, index)).join('')}</div>`;
  
  // Add click handlers
  document.querySelectorAll('.card-header').forEach(header => {
    header.addEventListener('click', function() {
      this.parentElement.classList.toggle('expanded');
    });
  });
}

function createKendalaCard(item, index) {
  const titlePhoto = extractTitlePhoto(item.judul);
  const cleanJudul = titlePhoto ? item.judul.replace(titlePhoto.url, '').trim() : item.judul;
  const hasPhoto = detectPhotoLink(item);
  const links1 = extractLinks(item.jawaban1);
  const links2 = extractLinks(item.jawaban2);
  const links3 = extractLinks(item.jawaban3);
  
  return `
    <div class="kendala-card" data-index="${index}">
      <div class="card-accent"></div>
      <div class="card-header">
        <h3 class="card-title">${escapeHtml(cleanJudul)}</h3>
        <span class="card-toggle"><i class="fas fa-chevron-down"></i></span>
      </div>
      <div class="card-content">
        ${titlePhoto ? createTitlePhotoSection(titlePhoto.url, index) : ''}
        <div class="answer-section">
          ${item.jawaban1 ? `
            <div class="answer-item">
              <div class="answer-label"><i class="fas fa-comment-alt"></i> Solusi 1</div>
              <div class="answer-text">${formatContent(item.jawaban1, links1)}</div>
              ${hasPhoto && !titlePhoto ? createPhotoSection(item) : ''}
              ${links1.length > 0 ? createLinkButtons(links1) : ''}
              <div class="answer-actions">
                <button class="action-btn" onclick="copyAnswer(${index}, 1)"><i class="fas fa-copy"></i> Copy</button>
                <button class="action-btn" onclick="addToSticky(${index}, 1)"><i class="fas fa-sticky-note"></i> Sticky</button>
              </div>
            </div>` : ''}
          ${item.jawaban2 ? `
            <div class="answer-item">
              <div class="answer-label"><i class="fas fa-comment-alt"></i> Solusi 2</div>
              <div class="answer-text">${formatContent(item.jawaban2, links2)}</div>
              ${links2.length > 0 ? createLinkButtons(links2) : ''}
              <div class="answer-actions">
                <button class="action-btn" onclick="copyAnswer(${index}, 2)"><i class="fas fa-copy"></i> Copy</button>
                <button class="action-btn" onclick="addToSticky(${index}, 2)"><i class="fas fa-sticky-note"></i> Sticky</button>
              </div>
            </div>` : ''}
          ${item.jawaban3 ? `
            <div class="answer-item">
              <div class="answer-label"><i class="fas fa-comment-alt"></i> Solusi 3</div>
              <div class="answer-text">${formatContent(item.jawaban3, links3)}</div>
              ${links3.length > 0 ? createLinkButtons(links3) : ''}
              <div class="answer-actions">
                <button class="action-btn" onclick="copyAnswer(${index}, 3)"><i class="fas fa-copy"></i> Copy</button>
                <button class="action-btn" onclick="addToSticky(${index}, 3)"><i class="fas fa-sticky-note"></i> Sticky</button>
              </div>
            </div>` : ''}
        </div>
      </div>
    </div>`;
}

// ===== HELPERS =====
function extractTitlePhoto(judul) {
  if (!judul) return null;
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = judul.match(photoPattern);
  return match ? { url: match[1], fullMatch: match[0] } : null;
}

function createTitlePhotoSection(photoUrl, index) {
  if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
  return `
    <div class="title-photo-section">
      <div class="title-photo-wrapper">
        <span class="photo-badge"><i class="fas fa-image"></i> Foto</span>
        <img src="${photoUrl}" alt="Foto Kendala" class="title-photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.closest('.title-photo-section').style.display='none'">
      </div>
      <div class="photo-actions">
        <button class="photo-btn" onclick="copyTitlePhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy</button>
        <button class="photo-btn" onclick="openLightbox('${photoUrl}')"><i class="fas fa-expand"></i> Full View</button>
      </div>
    </div>`;
}

function detectPhotoLink(item) {
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  return photoPattern.test(item.jawaban1) || photoPattern.test(item.jawaban2) || photoPattern.test(item.jawaban3);
}

function extractLinks(text) {
  if (!text) return [];
  const urlPattern = /https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi;
  return text.match(urlPattern) || [];
}

function formatContent(text, links = []) {
  if (!text) return '';
  let formatted = escapeHtml(text);
  links.forEach(link => {
    const display = link.length > 45 ? link.substring(0, 42) + '...' : link;
    formatted = formatted.replace(new RegExp(escapeRegExp(link), 'g'), `<a href="${link}" target="_blank" rel="noopener">${display}</a>`);
  });
  return formatted;
}

function createPhotoSection(item) {
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = (item.jawaban1 + ' ' + item.jawaban2 + ' ' + item.jawaban3).match(photoPattern);
  if (!match) return '';
  const photoUrl = match[1];
  if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
  return `
    <div class="content-photo">
      <img src="${photoUrl}" alt="Foto" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.style.display='none'">
    </div>`;
}

function createLinkButtons(links) {
  if (links.length === 0) return '';
  return `
    <div class="answer-actions">
      ${links.map((link, i) => {
        const label = links.length > 1 ? `Link ${i+1}` : 'Buka Link';
        return `<a href="${link}" target="_blank" rel="noopener" class="action-btn link-btn">
          <i class="fas fa-external-link-alt"></i> ${label}
        </a>`;
      }).join('')}
    </div>`;
}

// ===== COPY FUNCTIONS =====
async function copyAnswer(index, answerNum) {
  const item = filteredKendala[index];
  const content = item[`jawaban${answerNum}`];
  if (!content) return;
  
  try {
    await navigator.clipboard.writeText(content);
    showToast('✅ Jawaban disalin!');
    const btn = event.target.closest('.action-btn');
    if (btn) {
      btn.classList.add('copied');
      btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
      }, 2000);
    }
  } catch {
    fallbackCopy(content);
  }
}

async function copyTitlePhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin!');
  } catch {
    await navigator.clipboard.writeText(url);
    showToast('📋 URL foto disalin!');
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.cssText = 'position:fixed;left:-9999px;top:0;';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('✅ Disalin!');
  } catch {
    showToast('❗ Gagal menyalin');
  }
  document.body.removeChild(textarea);
}

// ===== SEARCH & STATS =====
function searchKendala() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  filteredKendala = allKendala.filter(item =>
    item.judul.toLowerCase().includes(query) ||
    (item.jawaban1 && item.jawaban1.toLowerCase().includes(query)) ||
    (item.jawaban2 && item.jawaban2.toLowerCase().includes(query)) ||
    (item.jawaban3 && item.jawaban3.toLowerCase().includes(query))
  );
  renderKendala();
  updateStats();
}

function updateStats() {
  document.getElementById('totalItems').textContent = filteredKendala.length;
  const withPhotos = filteredKendala.filter(item => detectPhotoLink(item) || extractTitlePhoto(item.judul)).length;
  document.getElementById('withPhotos').textContent = withPhotos;
  const withLinks = filteredKendala.filter(item =>
    extractLinks(item.jawaban1).length > 0 ||
    extractLinks(item.jawaban2).length > 0 ||
    extractLinks(item.jawaban3).length > 0
  ).length;
  document.getElementById('withLinks').textContent = withLinks;
}

// ===== UTILITIES =====
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function escapeRegExp(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ===== LIGHTBOX =====
function openLightbox(url) {
  lightboxIndex = lightboxImages.indexOf(url);
  if (lightboxIndex === -1) {
    lightboxImages.push(url);
    lightboxIndex = lightboxImages.length - 1;
  }
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
  zoomLevel = 1;
  updateZoom();
}

function closeLightbox(event) {
  if (!event || event.target.id === 'lightbox' || event.target.classList.contains('lb-close')) {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightboxImg').src = '';
    document.body.style.overflow = '';
  }
}

function changeLightbox(direction) {
  lightboxIndex += direction;
  if (lightboxIndex < 0) lightboxIndex = lightboxImages.length - 1;
  if (lightboxIndex >= lightboxImages.length) lightboxIndex = 0;
  document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
  zoomLevel = 1;
  updateZoom();
}

function updateZoom() {
  zoomLevel = parseFloat(document.getElementById('zoomSlider').value);
  document.getElementById('lightboxImg').style.transform = `scale(${zoomLevel})`;
}

async function copyLightboxPhoto() {
  const url = document.getElementById('lightboxImg').src;
  if (url) await copyTitlePhoto(url);
}

// ===== STICKY NOTES =====
function toggleStickyPanel() {
  const panel = document.getElementById("stickyPanel");
  panel.classList.toggle('active');
  if (panel.classList.contains('active')) loadStickyNotes();
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

async function addSticky() {
  const input = document.getElementById("stickyInput");
  const text = input.value.trim();
  const image = input.dataset.image || null;
  
  if (!text && !image) return;
  
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  
  if (editIndex !== null) {
    stickies[editIndex] = { text, image };
    editIndex = null;
    document.getElementById("stickyAddBtn").querySelector("span").textContent = "Tambah";
  } else {
    stickies.push({ text, image });
  }
  
  localStorage.setItem("stickies", JSON.stringify(stickies));
  
  input.value = "";
  input.dataset.image = "";
  autoResize(input);
  removePhoto();
  loadStickyNotes();
  showToast('✅ Catatan ditambahkan!');
}

function loadStickyNotes() {
  const list = document.getElementById("stickyList");
  if (!list) return;
  list.innerHTML = "";
  const stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  
  if (stickies.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding: 40px 20px; color: var(--text-muted); font-size: 13px;">Belum ada catatan<br><span style="opacity:0.6; font-size:12px;">Tambahkan catatan pertama Anda</span></div>';
    return;
  }
  
  stickies.forEach((note, i) => {
    const div = document.createElement("div");
    div.className = "sticky-item";
    div.dataset.index = i;
    
    if (note.text) {
      const p = document.createElement("p");
      p.textContent = note.text;
      div.appendChild(p);
    }
    if (note.image) {
      const img = document.createElement("img");
      img.src = note.image;
      img.onclick = () => openLightbox(note.image);
      div.appendChild(img);
    }
    
    div.onclick = async (e) => {
      if (e.target.closest('.sticky-btn-control')) return;
      try {
        const items = {};
        if (note.text) items["text/plain"] = new Blob([note.text], { type: "text/plain" });
        if (note.image) {
          const resp = await fetch(note.image);
          const blob = await resp.blob();
          items[blob.type] = blob;
        }
        await navigator.clipboard.write([new ClipboardItem(items)]);
        showToast("✅ Teks + Gambar disalin!");
      } catch {
        showToast("⚠ Gagal menyalin");
      }
    };
    
    const controls = document.createElement("div");
    controls.className = "sticky-controls";
    
    const editBtn = document.createElement("span");
    editBtn.className = "sticky-btn-control";
    editBtn.innerHTML = "✏️";
    editBtn.title = "Edit";
    editBtn.onclick = e => { e.stopPropagation(); editSticky(i); };
    
    const deleteBtn = document.createElement("span");
    deleteBtn.className = "sticky-btn-control delete";
    deleteBtn.innerHTML = "✖";
    deleteBtn.title = "Hapus";
    deleteBtn.onclick = e => { e.stopPropagation(); deleteSticky(i); };
    
    controls.appendChild(editBtn);
    controls.appendChild(deleteBtn);
    div.appendChild(controls);
    
    // Drag & Drop
    div.setAttribute("draggable", true);
    div.ondragstart = e => {
      e.dataTransfer.setData("text/plain", i);
      div.classList.add('dragging');
    };
    div.ondragend = () => div.classList.remove('dragging');
    div.ondragover = e => { e.preventDefault(); div.style.borderColor = 'var(--neon-electric)'; };
    div.ondragleave = () => div.style.borderColor = '';
    div.ondrop = e => {
      e.preventDefault();
      div.style.borderColor = '';
      reorderSticky(e.dataTransfer.getData("text/plain"), i);
    };
    
    list.appendChild(div);
  });
}

function reorderSticky(from, to) {
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  const moved = stickies.splice(from, 1)[0];
  stickies.splice(to, 0, moved);
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
}

function deleteSticky(i) {
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  stickies.splice(i, 1);
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
  showToast('🗑️ Catatan dihapus');
}

function editSticky(i) {
  const stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  const input = document.getElementById("stickyInput");
  input.value = stickies[i].text || "";
  input.dataset.image = stickies[i].image || "";
  autoResize(input);
  if (stickies[i].image) showPhotoPreview(stickies[i].image);
  else removePhoto();
  editIndex = i;
  document.getElementById("stickyAddBtn").querySelector("span").textContent = "Update";
  input.focus();
}

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const base64 = e.target.result;
      document.getElementById("stickyInput").dataset.image = base64;
      showPhotoPreview(base64);
      showToast('📸 Foto diunggah!');
    };
    reader.readAsDataURL(file);
  }
}

function handleStickyPaste(event) {
  const items = event.clipboardData.items;
  for (let i = 0; i < items.length; i++) {
    if (items[i].type.startsWith('image/')) {
      event.preventDefault();
      const blob = items[i].getAsFile();
      const reader = new FileReader();
      reader.onload = function(e) {
        const base64 = e.target.result;
        document.getElementById("stickyInput").dataset.image = base64;
        showPhotoPreview(base64);
        showToast('📸 Foto ditempel!');
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
}

function showPhotoPreview(dataUrl) {
  const preview = document.getElementById('stickyPhotoPreview');
  const previewImg = document.getElementById('stickyPreviewImg');
  previewImg.src = dataUrl;
  preview.classList.add('show');
}

function removePhoto() {
  const input = document.getElementById("stickyInput");
  if(input) input.dataset.image = "";
  document.getElementById('stickyPhotoPreview').classList.remove('show');
  document.getElementById('fileInput').value = '';
}

function addToSticky(kendalaIndex, answerNum) {
  const item = filteredKendala[kendalaIndex];
  const content = item[`jawaban${answerNum}`];
  if (!content) return;
  
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = content.match(photoPattern);
  const imageUrl = match ? match[1] : null;
  
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  stickies.push({
    text: imageUrl ? content.replace(photoPattern, '').trim() : content,
    image: imageUrl
  });
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
  showToast('✅ Ditambahkan ke Sticky Notes!');
}

// ===== TOAST & PARTICLES =====
function showToast(message) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMessage').textContent = message;
  toast.classList.remove('show');
  void toast.offsetWidth; // reflow
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3200);
}

function createParticles() {
  const container = document.getElementById('particleField');
  if (!container) return;
  
  for (let i = 0; i < 50; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    
    const size = Math.random() * 2.5 + 1;
    const delay = Math.random() * 15;
    const duration = Math.random() * 12 + 10;
    const startX = Math.random() * 100;
    
    particle.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${startX}%;
      animation-delay: ${delay}s;
      animation-duration: ${duration}s;
      opacity: ${Math.random() * 0.5 + 0.2};
    `;
    
    container.appendChild(particle);
  }
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  loadKendalaData();
  
  const stickyInput = document.getElementById('stickyInput');
  if (stickyInput) {
    stickyInput.addEventListener('paste', handleStickyPaste);
  }
  
  setTimeout(() => showToast('🔷 System Ready • Neon Blue 2026'), 1200);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeLightbox();
    const panel = document.getElementById("stickyPanel");
    if (panel.classList.contains('active')) toggleStickyPanel();
  }
});
</script>

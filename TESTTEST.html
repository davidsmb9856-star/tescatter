<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f3ff">
<title>🔷 KENDALA ALL - SYSTEM 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== CORE VARIABLES ===== */
:root {
  --neon-primary: #00f3ff;
  --neon-secondary: #0066ff;
  --neon-glow: rgba(0, 243, 255, 0.6);
  --bg-deep: #050a14;
  --bg-panel: rgba(10, 20, 35, 0.75);
  --text-main: #e0faff;
  --text-dim: #8baec4;
  --border-radius: 16px;
  --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Rajdhani', sans-serif;
  background-color: var(--bg-deep);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ===== BACKGROUND FX ===== */
.bg-grid {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background-image: 
    linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  z-index: -2;
  perspective: 1000px;
  transform-style: preserve-3d;
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(50px); }
}

.scanline {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(to bottom, transparent 50%, rgba(0, 243, 255, 0.02) 51%);
  background-size: 100% 4px;
  pointer-events: none;
  z-index: 999;
}

/* ===== LAYOUT ===== */
.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* ===== HEADER HUD ===== */
.header-hud {
  text-align: center;
  margin-bottom: 40px;
  position: relative;
  padding: 30px 0;
}

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: #fff;
  text-shadow: 0 0 10px var(--neon-primary), 0 0 20px var(--neon-primary);
  position: relative;
  display: inline-block;
}

.main-title::after {
  content: 'DATABASE V.2026';
  position: absolute;
  bottom: -15px;
  right: 0;
  font-size: 0.7rem;
  color: var(--neon-primary);
  letter-spacing: 2px;
  opacity: 0.8;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0, 243, 255, 0.1);
  border: 1px solid var(--neon-primary);
  padding: 5px 15px;
  border-radius: 50px;
  font-size: 0.8rem;
  margin-top: 15px;
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
}

.blink-dot {
  width: 8px; height: 8px;
  background: var(--neon-primary);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--neon-primary);
  animation: pulse 1.5s infinite;
}

@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

.back-btn {
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  color: var(--neon-primary);
  text-decoration: none;
  font-weight: 700;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: var(--transition);
}
.back-btn:hover { text-shadow: 0 0 8px var(--neon-primary); transform: translateY(-50%) translateX(-5px); }

/* ===== SEARCH BAR ===== */
.search-wrapper {
  position: relative;
  max-width: 600px;
  margin: 0 auto 30px;
}

.search-input {
  width: 100%;
  background: rgba(10, 20, 35, 0.8);
  border: 1px solid rgba(0, 243, 255, 0.3);
  padding: 15px 20px 15px 50px;
  border-radius: 12px;
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem;
  backdrop-filter: blur(10px);
  transition: var(--transition);
  box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
}

.search-input:focus {
  border-color: var(--neon-primary);
  box-shadow: 0 0 20px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(0, 243, 255, 0.1);
}

.search-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--neon-primary);
  opacity: 0.7;
}

.stats-row {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.stat-badge {
  background: rgba(0, 243, 255, 0.05);
  border: 1px solid rgba(0, 243, 255, 0.15);
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 0.9rem;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
}
.stat-badge b { color: #fff; font-family: 'Orbitron', sans-serif; }

/* ===== CARDS ===== */
.card-list { display: flex; flex-direction: column; gap: 20px; }

.cyber-card {
  background: var(--bg-panel);
  border: 1px solid rgba(0, 243, 255, 0.15);
  border-left: 4px solid var(--neon-primary);
  border-radius: var(--border-radius);
  overflow: hidden;
  transition: var(--transition);
  position: relative;
  backdrop-filter: blur(15px);
  animation: slideUp 0.4s ease forwards;
  opacity: 0;
}

.cyber-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 243, 255, 0.1);
  border-color: rgba(0, 243, 255, 0.4);
}

@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.card-header {
  padding: 20px 25px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(90deg, rgba(0,243,255,0.05) 0%, transparent 100%);
}

.card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: #fff;
  margin: 0;
  text-shadow: 0 0 5px rgba(0, 243, 255, 0.3);
}

.toggle-icon {
  color: var(--neon-primary);
  transition: transform 0.3s;
}

.cyber-card.active .toggle-icon { transform: rotate(180deg); }

.card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease-out;
  background: rgba(0, 0, 0, 0.2);
}

.cyber-card.active .card-body { max-height: 2000px; /* Arbitrary large number for CSS transition */ }

.content-padding { padding: 20px 25px; }

/* Title Photo Styling */
.title-photo-wrapper {
  margin-bottom: 20px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--neon-primary);
  position: relative;
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.15);
}
.title-photo-img { width: 100%; max-height: 300px; object-fit: cover; display: block; cursor: zoom-in; }
.photo-badge {
  position: absolute; top: 10px; left: 10px;
  background: rgba(0,0,0,0.7); color: var(--neon-primary);
  padding: 4px 10px; border-radius: 4px; font-size: 0.7rem;
  border: 1px solid var(--neon-primary);
}

/* Answer Blocks */
.answer-block {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
  position: relative;
}

.answer-label {
  font-size: 0.75rem;
  color: var(--neon-primary);
  font-weight: 700;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.answer-text {
  font-size: 1rem;
  line-height: 1.6;
  color: #d1e8f0;
  white-space: pre-wrap;
}

.answer-text a {
  color: var(--neon-primary);
  text-decoration: none;
  border-bottom: 1px dashed var(--neon-primary);
  transition: 0.2s;
}
.answer-text a:hover { color: #fff; border-bottom-style: solid; text-shadow: 0 0 8px var(--neon-primary); }

/* Action Buttons */
.action-row {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.btn-neon {
  background: transparent;
  border: 1px solid var(--neon-primary);
  color: var(--neon-primary);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 0.8rem;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-neon:hover {
  background: var(--neon-primary);
  color: #000;
  box-shadow: 0 0 15px var(--neon-glow);
}

.btn-link {
  border-color: #bc13fe;
  color: #bc13fe;
}
.btn-link:hover { background: #bc13fe; color: #fff; box-shadow: 0 0 15px rgba(188, 19, 254, 0.5); }

.img-in-answer {
  max-width: 100%;
  border-radius: 8px;
  margin: 10px 0;
  border: 1px solid rgba(255,255,255,0.2);
  cursor: zoom-in;
}

/* ===== STICKY NOTES PANEL ===== */
.sticky-fab {
  position: fixed;
  bottom: 30px; right: 30px;
  width: 60px; height: 60px;
  background: var(--neon-primary);
  border-radius: 50%;
  display: flex; justify-content: center; align-items: center;
  font-size: 1.5rem; color: #000;
  box-shadow: 0 0 20px var(--neon-glow);
  cursor: pointer;
  z-index: 100;
  transition: var(--transition);
}
.sticky-fab:hover { transform: scale(1.1) rotate(10deg); }

.sticky-panel {
  position: fixed;
  bottom: 100px; right: 30px;
  width: 350px;
  height: 60vh;
  background: rgba(10, 15, 30, 0.95);
  border: 1px solid var(--neon-primary);
  border-radius: 16px;
  backdrop-filter: blur(20px);
  display: none;
  flex-direction: column;
  z-index: 99;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.sticky-panel.open { display: flex; }

@keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.panel-header {
  padding: 15px;
  border-bottom: 1px solid rgba(0, 243, 255, 0.2);
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'Orbitron'; color: var(--neon-primary);
}

.panel-body { flex: 1; overflow-y: auto; padding: 15px; }
.panel-footer { padding: 15px; border-top: 1px solid rgba(0, 243, 255, 0.2); }

.note-input {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  padding: 10px;
  border-radius: 8px;
  resize: none;
  font-family: 'Rajdhani';
  margin-bottom: 10px;
}
.note-input:focus { border-color: var(--neon-primary); }

.note-item {
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  border-left: 3px solid var(--neon-primary);
  position: relative;
  animation: fadeIn 0.3s;
}
.note-item img { max-width: 100%; border-radius: 4px; margin-top: 5px; }
.note-del {
  position: absolute; top: 5px; right: 5px;
  color: #ff4d4d; cursor: pointer; font-size: 0.8rem;
}

/* ===== LIGHTBOX ===== */
.lightbox-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 2000;
  display: none;
  justify-content: center; align-items: center;
  flex-direction: column;
}
.lightbox-overlay.show { display: flex; animation: fadeIn 0.2s; }
.lb-img { max-width: 90%; max-height: 80vh; border: 2px solid var(--neon-primary); box-shadow: 0 0 30px var(--neon-glow); }
.lb-close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 2rem; cursor: pointer; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: rgba(0, 243, 255, 0.9); color: #000;
  padding: 10px 25px; border-radius: 30px;
  font-weight: 700; z-index: 3000;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 0 20px var(--neon-glow);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Loading */
.loader { text-align: center; padding: 50px; color: var(--neon-primary); }
.spinner {
  width: 40px; height: 40px; border: 4px solid rgba(0,243,255,0.2);
  border-top: 4px solid var(--neon-primary); border-radius: 50%;
  margin: 0 auto 15px; animation: spin 1s linear infinite;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

@media (max-width: 768px) {
  .sticky-panel { width: 90%; right: 5%; bottom: 90px; }
  .main-title { font-size: 2rem; }
  .header-hud { padding-top: 50px; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="scanline"></div>

<div class="container">
  
  <!-- HEADER -->
  <header class="header-hud">
    <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i> BACK</a>
    <h1 class="main-title">KENDALA ALL</h1>
    <div style="display:block; width:100%;"></div>
    <div class="status-pill">
      <div class="blink-dot"></div> SYSTEM ONLINE • 2026
    </div>
  </header>

  <!-- SEARCH & STATS -->
  <div class="search-wrapper">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="searchInput" class="search-input" placeholder="Cari kendala, error code, atau solusi..." oninput="filterData()">
  </div>

  <div class="stats-row">
    <div class="stat-badge"><i class="fas fa-database"></i> Total: <b id="countTotal">0</b></div>
    <div class="stat-badge"><i class="fas fa-image"></i> Foto: <b id="countPhoto">0</b></div>
    <div class="stat-badge"><i class="fas fa-link"></i> Link: <b id="countLink">0</b></div>
  </div>

  <!-- CONTENT AREA -->
  <div id="contentArea">
    <div class="loader">
      <div class="spinner"></div>
      <p>ACCESSING DATABASE...</p>
    </div>
  </div>

</div>

<!-- STICKY NOTES FAB -->
<div class="sticky-fab" onclick="toggleSticky()"><i class="fas fa-sticky-note"></i></div>

<div class="sticky-panel" id="stickyPanel">
  <div class="panel-header">
    <span>QUICK NOTES</span>
    <i class="fas fa-times" style="cursor:pointer" onclick="toggleSticky()"></i>
  </div>
  <div class="panel-body" id="stickyList"></div>
  <div class="panel-footer">
    <textarea id="noteInput" class="note-input" rows="2" placeholder="Tulis catatan cepat..."></textarea>
    <button class="btn-neon" style="width:100%" onclick="addNote()"><i class="fas fa-plus"></i> ADD NOTE</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)">
  <span class="lb-close">&times;</span>
  <img src="" class="lb-img" id="lbImg">
  <div style="margin-top:20px; display:flex; gap:10px;">
    <button class="btn-neon" onclick="copyCurrentImage()"><i class="fas fa-copy"></i> COPY IMAGE</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast">Action Success!</div>

<script>
// CONFIG
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const URL_DATA = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=C2:F300`;

let rawData = [];
let filteredData = [];
let currentLbImg = '';

// INIT
document.addEventListener('DOMContentLoaded', () => {
  fetchData();
});

async function fetchData() {
  try {
    const res = await fetch(URL_DATA);
    const txt = await res.text();
    const json = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/)[1]);
    
    rawData = json.table.rows.map(row => {
      const c = row.c || [];
      return {
        title: c[0]?.v || '',
        ans1: c[1]?.v || '',
        ans2: c[2]?.v || '',
        ans3: c[3]?.v || ''
      };
    }).filter(x => x.title);

    filteredData = [...rawData];
    renderCards();
    updateStats();
  } catch(e) {
    document.getElementById('contentArea').innerHTML = `<div class="loader" style="color:#ff4d4d"><i class="fas fa-exclamation-triangle fa-2x"></i><br>CONNECTION FAILED</div>`;
  }
}

function renderCards() {
  const container = document.getElementById('contentArea');
  if(filteredData.length === 0) {
    container.innerHTML = '<div class="loader">NO DATA FOUND</div>';
    return;
  }

  let html = '<div class="card-list">';
  filteredData.forEach((item, idx) => {
    // Check for title photo
    let titlePhoto = null;
    const urlRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif))/i;
    const match = item.title.match(urlRegex);
    let displayTitle = item.title;
    
    if(match) {
      titlePhoto = match[0];
      displayTitle = item.title.replace(titlePhoto, '').trim();
    }

    html += `
    <div class="cyber-card" style="animation-delay: ${idx * 0.05}s">
      <div class="card-header" onclick="toggleCard(this)">
        <h3 class="card-title">${escapeHtml(displayTitle)}</h3>
        <i class="fas fa-chevron-down toggle-icon"></i>
      </div>
      <div class="card-body">
        <div class="content-padding">
          ${titlePhoto ? `
            <div class="title-photo-wrapper">
              <span class="photo-badge"><i class="fas fa-camera"></i> DETECTED</span>
              <img src="${titlePhoto}" class="title-photo-img" onclick="openLightbox('${titlePhoto}')">
            </div>
          ` : ''}
          
          ${renderAnswerBlock('SOLUSI UTAMA', item.ans1)}
          ${renderAnswerBlock('ALTERNATIF 1', item.ans2)}
          ${renderAnswerBlock('ALTERNATIF 2', item.ans3)}
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function renderAnswerBlock(label, text) {
  if(!text) return '';
  
  // Process Links
  const linkRegex = /(https?:\/\/[^\s]+)/g;
  let processedText = escapeHtml(text);
  const links = text.match(linkRegex) || [];
  
  links.forEach(link => {
    processedText = processedText.replace(new RegExp(escapeRegExp(link), 'g'), `<a href="${link}" target="_blank">${link}</a>`);
  });

  // Process Images in body
  const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif))/i;
  let imgHtml = '';
  const imgMatch = text.match(imgRegex);
  if(imgMatch) {
    const imgUrl = imgMatch[0];
    processedText = processedText.replace(imgUrl, ''); // remove url from text
    imgHtml = `<img src="${imgUrl}" class="img-in-answer" onclick="openLightbox('${imgUrl}')">`;
  }

  return `
    <div class="answer-block">
      <div class="answer-label"><i class="fas fa-terminal"></i> ${label}</div>
      <div class="answer-text">${processedText}</div>
      ${imgHtml}
      <div class="action-row">
        <button class="btn-neon" onclick="copyText('${escapeJs(text)}')"><i class="fas fa-copy"></i> COPY TEXT</button>
        <button class="btn-neon" onclick="addToSticky('${escapeJs(text)}')"><i class="fas fa-thumbtack"></i> SAVE NOTE</button>
        ${links.length > 0 ? `<a href="${links[0]}" target="_blank" class="btn-neon btn-link"><i class="fas fa-external-link-alt"></i> OPEN LINK</a>` : ''}
      </div>
    </div>
  `;
}

// INTERACTION
function toggleCard(header) {
  const card = header.parentElement;
  const wasActive = card.classList.contains('active');
  
  // Close all others (optional, remove this loop if you want multiple open)
  document.querySelectorAll('.cyber-card').forEach(c => c.classList.remove('active'));
  
  if(!wasActive) card.classList.add('active');
}

function filterData() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredData = rawData.filter(item => 
    (item.title && item.title.toLowerCase().includes(q)) ||
    (item.ans1 && item.ans1.toLowerCase().includes(q))
  );
  renderCards();
  updateStats();
}

function updateStats() {
  document.getElementById('countTotal').innerText = filteredData.length;
  // Simple stats logic
  const withPhoto = filteredData.filter(i => /https?:\/\/.*\.(png|jpg)/i.test(i.title + i.ans1)).length;
  document.getElementById('countPhoto').innerText = withPhoto;
}

// UTILS
function escapeHtml(text) {
  if(!text) return '';
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function escapeJs(str) { return str ? str.replace(/'/g, "\\'").replace(/\n/g, "\\n") : ''; }

// ACTIONS
function copyText(text) {
  // Unescape for copying
  const cleanText = text.replace(/\\n/g, "\n").replace(/\\'/g, "'");
  navigator.clipboard.writeText(cleanText).then(() => showToast("TEXT COPIED!"));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// LIGHTBOX
function openLightbox(src) {
  currentLbImg = src;
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(e) {
  if(!e || e.target.id === 'lightbox' || e.target.className === 'lb-close') {
    document.getElementById('lightbox').classList.remove('show');
  }
}
async function copyCurrentImage() {
  try {
    const response = await fetch(currentLbImg);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast("IMAGE COPIED TO CLIPBOARD!");
  } catch(err) { showToast("FAILED TO COPY IMAGE"); }
}

// STICKY NOTES
function toggleSticky() {
  document.getElementById('stickyPanel').classList.toggle('open');
  loadNotes();
}

function addNote() {
  const input = document.getElementById('noteInput');
  const text = input.value.trim();
  if(!text) return;
  
  let notes = JSON.parse(localStorage.getItem('notes2026') || '[]');
  notes.unshift({ text: text, date: new Date().toLocaleTimeString() });
  localStorage.setItem('notes2026', JSON.stringify(notes));
  
  input.value = '';
  loadNotes();
  showToast("NOTE ADDED");
}

function addToSticky(text) {
  let notes = JSON.parse(localStorage.getItem('notes2026') || '[]');
  // Truncate if too long
  const shortText = text.length > 100 ? text.substring(0, 100) + '...' : text;
  notes.unshift({ text: shortText, date: 'From Database' });
  localStorage.setItem('notes2026', JSON.stringify(notes));
  showToast("SAVED TO NOTES");
  // Open panel automatically
  document.getElementById('stickyPanel').classList.add('open');
  loadNotes();
}

function deleteNote(idx) {
  let notes = JSON.parse(localStorage.getItem('notes2026') || '[]');
  notes.splice(idx, 1);
  localStorage.setItem('notes2026', JSON.stringify(notes));
  loadNotes();
}

function loadNotes() {
  const list = document.getElementById('stickyList');
  const notes = JSON.parse(localStorage.getItem('notes2026') || '[]');
  
  if(notes.length === 0) {
    list.innerHTML = '<div style="text-align:center; opacity:0.5; margin-top:20px;">No notes yet.</div>';
    return;
  }
  
  list.innerHTML = notes.map((n, i) => `
    <div class="note-item">
      <i class="fas fa-trash note-del" onclick="deleteNote(${i})"></i>
      <div style="font-size:0.7rem; color:var(--neon-primary); margin-bottom:4px;">${n.date}</div>
      <div style="white-space:pre-wrap;">${escapeHtml(n.text)}</div>
    </div>
  `).join('');
}
</script>

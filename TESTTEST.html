<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7b2fff">
<title>⚡ FOTO - LINE TOGEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== CORE ===== */
:root {
  --primary: #7b2fff;
  --primary-glow: #9d6bff;
  --secondary: #00f5ff;
  --accent: #ff00aa;
  --success: #00ff9d;
  
  --bg-base: #05020a;
  --bg-card: rgba(12, 8, 25, 0.85);
  --bg-overlay: rgba(20, 12, 40, 0.92);
  
  --text-main: #ffffff;
  --text-muted: #b8a8d9;
  --text-dim: #7a6a9a;
  
  --border: rgba(123, 47, 255, 0.4);
  --border-hover: rgba(157, 107, 255, 0.8);
  
  --glow-soft: 0 0 20px rgba(123, 47, 255, 0.4);
  --glow-medium: 0 0 35px rgba(123, 47, 255, 0.6), 0 0 60px rgba(123, 47, 255, 0.3);
  --glow-strong: 0 0 50px rgba(123, 47, 255, 0.8), 0 0 100px rgba(123, 47, 255, 0.4);
  
  --radius: 14px;
  --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-base);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
}

/* ===== BACKGROUND ANIMATED ===== */
.bg-animated {
  position: fixed; inset: 0; z-index: -2;
  background: 
    radial-gradient(circle at 20% 30%, rgba(123, 47, 255, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(0, 245, 255, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255, 0, 170, 0.08) 0%, transparent 60%);
  animation: bgShift 25s ease-in-out infinite alternate;
}
@keyframes bgShift {
  0%, 100% { filter: hue-rotate(0deg) brightness(1); }
  50% { filter: hue-rotate(25deg) brightness(1.08); }
}

.grid-bg {
  position: fixed; inset: 0; z-index: -1;
  background-image: 
    linear-gradient(rgba(123, 47, 255, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(123, 47, 255, 0.05) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  animation: gridScroll 45s linear infinite;
  pointer-events: none;
}
@keyframes gridScroll {
  0% { background-position: 0 0; }
  100% { background-position: 60px 60px; }
}

.floating-orbs {
  position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden;
}
.orb {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
  filter: blur(40px); opacity: 0.25;
  animation: orbFloat linear infinite;
}
.orb:nth-child(1) { width: 300px; height: 300px; top: 10%; left: 10%; animation-duration: 35s; }
.orb:nth-child(2) { width: 250px; height: 250px; top: 60%; right: 15%; animation-duration: 42s; animation-delay: -10s; }
.orb:nth-child(3) { width: 200px; height: 200px; bottom: 10%; left: 40%; animation-duration: 38s; animation-delay: -20s; background: radial-gradient(circle, var(--secondary) 0%, transparent 70%); }
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -20px) scale(1.05); }
  50% { transform: translate(-20px, 30px) scale(0.95); }
  75% { transform: translate(20px, 20px) scale(1.02); }
}

/* ===== LAYOUT ===== */
.container {
  max-width: 1300px;
  margin: 0 auto;
  padding: 24px 20px;
  position: relative;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  padding: 20px 0 30px;
  position: relative;
}
.header::after {
  content: ''; position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 150px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  border-radius: 2px;
}

.back-btn {
  position: fixed; left: 20px; top: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--primary-glow);
  padding: 8px 16px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600; font-size: 11px;
  display: flex; align-items: center; gap: 6px;
  transition: var(--transition);
  backdrop-filter: blur(10px);
  z-index: 100;
}
.back-btn:hover {
  border-color: var(--primary-glow);
  transform: translateX(-4px);
  box-shadow: var(--glow-soft);
}

.title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(30px, 6vw, 44px);
  font-weight: 900;
  letter-spacing: 4px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--secondary), var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px rgba(123, 47, 255, 0.5);
  animation: titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.25); }
}

.subtitle {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.status {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 14px;
  background: rgba(0, 255, 157, 0.12);
  border: 1px solid rgba(0, 255, 157, 0.35);
  border-radius: 100px;
  font-size: 10px; font-weight: 700;
  color: var(--success);
  text-transform: uppercase; letter-spacing: 1.5px;
}
.status-dot {
  width: 6px; height: 6px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: 0.7; }
}

/* ===== SEARCH ===== */
.search-wrap {
  max-width: 520px;
  margin: 0 auto 28px;
  position: relative;
}
.search-input {
  width: 100%;
  padding: 12px 45px 12px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-main);
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  transition: var(--transition);
}
.search-input:focus {
  outline: none;
  border-color: var(--primary-glow);
  box-shadow: var(--glow-soft);
}
.search-input::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute; right: 16px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim); pointer-events: none;
}

/* ===== GALLERY GRID ===== */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
  padding: 10px 0;
}

/* ===== PHOTO CARD ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
  backdrop-filter: blur(8px);
  position: relative;
}
.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-5px);
  box-shadow: var(--glow-medium);
}

.card-img {
  position: relative;
  width: 100%;
  height: 240px;
  background: linear-gradient(135deg, #1a1230, #0f0a1f);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  cursor: zoom-in;
}
.card-img img {
  width: 100%; height: 100%;
  object-fit: contain;
  transition: transform 300ms ease;
}
.card:hover .card-img img { transform: scale(1.04); }

/* Zoom overlay */
.card-img::after {
  content: '\f00e';
  font-family: 'Font Awesome 6 Free';
  font-weight: 900;
  position: absolute;
  font-size: 24px;
  color: rgba(255,255,255,0.7);
  opacity: 0;
  transition: var(--transition);
  pointer-events: none;
}
.card:hover .card-img::after { opacity: 1; }

.card-body { padding: 14px; }
.card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px; font-weight: 700;
  color: var(--primary-glow);
  margin-bottom: 8px;
  text-align: center;
  min-height: 36px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-meta {
  font-size: 10px; color: var(--text-muted);
  text-align: center; margin-bottom: 12px;
}

/* Action buttons */
.card-actions {
  display: flex; gap: 6px; justify-content: center;
  padding-top: 10px; border-top: 1px solid rgba(123, 47, 255, 0.2);
}
.btn-action {
  flex: 1; min-width: 65px; max-width: 85px;
  height: 38px;
  background: rgba(123, 47, 255, 0.15);
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--primary-glow);
  font-size: 9px; font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; text-transform: uppercase;
}
.btn-action i { font-size: 14px; }
.btn-action:hover {
  background: var(--primary);
  border-color: var(--primary-glow);
  color: #fff;
  transform: translateY(-2px);
  box-shadow: var(--glow-soft);
}
.btn-action.copy:hover { background: var(--success); border-color: var(--success); box-shadow: 0 0 20px rgba(0,255,157,0.4); }
.btn-action.download:hover { background: var(--secondary); border-color: var(--secondary); color: #000; box-shadow: 0 0 20px rgba(0,245,255,0.4); }

/* ===== MODAL ZOOM ===== */
.modal {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg-overlay);
  backdrop-filter: blur(20px);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 200ms ease;
}
.modal.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-content {
  background: var(--bg-card);
  border: 1px solid var(--border-hover);
  border-radius: 18px;
  max-width: 95%; max-height: 92vh;
  display: flex; flex-direction: column;
  box-shadow: var(--glow-strong);
  animation: slideUp 300ms ease;
}
@keyframes slideUp { from { transform: translateY(30px) scale(0.98); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-family: 'Orbitron'; font-size: 13px; color: var(--primary-glow);
}
.modal-close {
  width: 34px; height: 34px;
  background: transparent; border: 1px solid var(--accent);
  border-radius: 50%; color: var(--accent);
  font-size: 14px; cursor: pointer;
  transition: var(--transition);
}
.modal-close:hover { background: var(--accent); color: #fff; transform: rotate(90deg); }

.modal-body {
  padding: 20px; text-align: center;
  overflow: auto; flex: 1;
  display: flex; align-items: center; justify-content: center;
}
.modal-body img {
  max-width: 100%; max-height: 75vh;
  width: auto; object-fit: contain;
  border-radius: 10px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  cursor: zoom-out;
}

.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
}

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 18px; right: 18px;
  background: var(--bg-card);
  border: 1px solid var(--primary-glow);
  color: var(--primary-glow);
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 11px; font-weight: 600;
  z-index: 2000;
  display: flex; align-items: center; gap: 8px;
  box-shadow: var(--glow-soft);
  transform: translateX(120px); opacity: 0;
  transition: 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
  backdrop-filter: blur(10px);
}
.toast.show { transform: translateX(0); opacity: 1; }

/* ===== LOADING ===== */
.loading {
  text-align: center; padding: 50px 20px;
  grid-column: 1 / -1; display: none;
}
.loading.active { display: block; }
.spinner {
  width: 44px; height: 44px;
  border: 3px solid rgba(123, 47, 255, 0.25);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: var(--primary-glow);
  font-family: 'Orbitron'; font-size: 11px;
}

/* ===== NO RESULTS ===== */
.no-results {
  grid-column: 1 / -1;
  text-align: center; padding: 60px 20px;
  color: var(--text-muted);
}
.no-results i {
  font-size: 42px; margin-bottom: 14px; opacity: 0.5;
}
.no-results h3 {
  font-family: 'Orbitron'; color: var(--text-main); margin-bottom: 6px;
}
.no-results p { font-size: 12px; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(var(--primary), var(--secondary));
  border-radius: 3px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .container { padding: 16px 14px; }
  .back-btn { left: 14px; top: 14px; padding: 7px 14px; font-size: 10px; }
  .gallery { grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .card-img { height: 200px; }
  .card-title { font-size: 11px; min-height: 32px; }
  .btn-action { min-width: 60px; height: 36px; font-size: 8px; }
  .btn-action i { font-size: 13px; }
}
@media (max-width: 480px) {
  .gallery { grid-template-columns: 1fr; }
  .card-img { height: 280px; }
  .title { font-size: clamp(26px, 7vw, 38px); }
}
</style>
</head>
<body>

<div class="bg-animated"></div>
<div class="grid-bg"></div>
<div class="floating-orbs">
  <div class="orb"></div><div class="orb"></div><div class="orb"></div>
</div>

<a href="index.html" class="back-btn">
  <i class="fas fa-arrow-left"></i> Kembali
</a>

<div class="container">
  <header class="header">
    <h1 class="title">⚡ FOTO GALLERY</h1>
    <p class="subtitle">LINE TOGEL • 2026</p>
    <div class="status"><span class="status-dot"></span> ONLINE</div>
  </header>

  <div class="search-wrap">
    <input type="search" class="search-input" id="searchInput" placeholder="Cari foto..." onkeyup="searchPhotos()">
    <i class="fas fa-search search-icon"></i>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">⚡ MEMUAT FOTO...</div>
  </div>

  <div class="gallery" id="galleryGrid"></div>
</div>

<!-- Modal Zoom -->
<div class="modal" id="imageModal">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Foto</span>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <img src="" alt="" id="modalImage" onclick="closeModal()">
    </div>
    <div class="modal-footer">
      <button class="btn-action copy" onclick="copyImage()" style="flex:none;min-width:100px">
        <i class="fas fa-copy"></i><span style="font-size:8px">Copy</span>
      </button>
      <button class="btn-action download" onclick="downloadModal()" style="flex:none;min-width:100px">
        <i class="fas fa-download"></i><span style="font-size:8px">Download</span>
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><i class="fas fa-bolt"></i><span id="toastText">Siap!</span></div>

<script>
let allPhotos = [];
let currentUrl = '', currentTitle = '';

document.addEventListener('DOMContentLoaded', () => {
  fetchPhotos();
});

// ===== FETCH DATA =====
async function fetchPhotos() {
  const loading = document.getElementById('loading');
  const grid = document.getElementById('galleryGrid');
  loading.classList.add('active');
  
  try {
    const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
    const gid = '1246502038';
    
    // Try GVIZ
    try {
      const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      allPhotos = json.table.rows
        .filter(r => r.c?.[0]?.v && r.c?.[1]?.v)
        .map((r, i) => ({ judul: r.c[0].v, foto: r.c[1].v, index: i+2 }));
    } catch {
      // Fallback CSV
      const csv = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`).then(r=>r.text());
      allPhotos = csv.split('\n').slice(1).map((row,i) => {
        const [judul, foto] = row.split(',').map(c => c?.replace(/"/g,'').trim());
        return (judul && foto) ? { judul, foto, index: i+2 } : null;
      }).filter(Boolean);
    }
    
    renderGallery(allPhotos);
    showToast(`⚡ ${allPhotos.length} foto dimuat`);
  } catch(e) {
    console.error(e);
    grid.innerHTML = `<div class="no-results"><i class="fas fa-exclamation-triangle"></i><h3>Gagal Memuat</h3><p>Periksa koneksi atau publikasi Sheets</p></div>`;
    showToast('❗ Gagal mengambil data');
  }
  loading.classList.remove('active');
}

// ===== RENDER =====
function renderGallery(photos) {
  const grid = document.getElementById('galleryGrid');
  if (!photos.length) {
    grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i><h3>Tidak Ditemukan</h3><p>Coba kata kunci lain</p></div>`;
    return;
  }
  grid.innerHTML = '';
  photos.forEach((p, i) => grid.appendChild(createCard(p.foto, p.judul, i)));
}

function createCard(url, title, idx) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-img" onclick="openModal('${url}', '${title.replace(/'/g,"\\'")}')">
      <img src="${url}" alt="${title}" onerror="this.src='https://via.placeholder.com/400x300/1a1230/9d6bff?text=No+Image'" loading="lazy">
    </div>
    <div class="card-body">
      <div class="card-title">${title}</div>
      <div class="card-meta">#${idx+1}</div>
      <div class="card-actions">
        <button class="btn-action copy" onclick="copyPhoto('${url}')"><i class="fas fa-copy"></i><span>Copy</span></button>
        <button class="btn-action download" onclick="downloadPhoto('${url}','${title.replace(/'/g,"\\'")}')"><i class="fas fa-download"></i><span>Download</span></button>
      </div>
    </div>
  `;
  return card;
}

// ===== SEARCH =====
function searchPhotos() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = term ? allPhotos.filter(p => p.judul.toLowerCase().includes(term)) : allPhotos;
  renderGallery(filtered);
  if (filtered.length) showToast(`⚡ ${filtered.length} hasil`);
}

// ===== MODAL =====
function openModal(url, title) {
  currentUrl = url; currentTitle = title;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalImage').src = url;
  document.getElementById('imageModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('imageModal').classList.remove('active');
  document.body.style.overflow = '';
  currentUrl = ''; currentTitle = '';
}
document.getElementById('imageModal').addEventListener('click', e => { if(e.target.id==='imageModal') closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ===== ACTIONS =====
async function copyPhoto(url) {
  try {
    const blob = await fetch(url).then(r=>r.blob());
    await navigator.clipboard.write([new ClipboardItem({[blob.type]:blob})]);
    showToast('✅ Disalin!');
  } catch { showToast('❗ Klik kanan gambar > Copy'); }
}
async function copyImage() { if(currentUrl) await copyPhoto(currentUrl); }

function downloadPhoto(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = `${filename.replace(/[^a-z0-9]/gi,'_')}_${Date.now()}.jpg`;
  a.target = '_blank'; a.rel='noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('⚡ Download...');
}
function downloadModal() { if(currentUrl && currentTitle) downloadPhoto(currentUrl, currentTitle); }

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f3ff">
<title>⚡ CYBER GALLERY - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* --- CORE VARIABLES --- */
:root {
    --neon-blue: #00f3ff;
    --neon-dark: #0066ff;
    --neon-purple: #bc13fe;
    --bg-deep: #020205;
    --glass-bg: rgba(0, 20, 40, 0.6);
    --glass-border: rgba(0, 243, 255, 0.3);
    --text-main: #ffffff;
    --text-dim: #8aaebb;
    --glow-strong: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
    --glow-text: 0 0 5px var(--neon-blue);
    --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* --- RESET & BASE --- */
* { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
body {
    background-color: var(--bg-deep);
    color: var(--text-main);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
}

/* --- BACKGROUND FX --- */
.cyber-grid {
    position: fixed;
    inset: 0;
    z-index: -2;
    background-image: 
        linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    perspective: 500px;
    transform-style: preserve-3d;
    animation: gridMove 20s linear infinite;
}
@keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 0 40px; }
}

.vignette {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at center, transparent 0%, #000 90%);
    pointer-events: none;
}

.scanline {
    position: fixed;
    top: 0; left: 0; right: 0; height: 5px;
    background: rgba(0, 243, 255, 0.3);
    opacity: 0.4;
    animation: scan 6s linear infinite;
    z-index: 999;
    pointer-events: none;
    filter: blur(2px);
}
@keyframes scan {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
}

/* --- LAYOUT --- */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
}

/* --- HEADER --- */
header {
    text-align: center;
    margin-bottom: 40px;
    padding-top: 20px;
    position: relative;
}

.brand-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: #fff;
    text-shadow: var(--glow-text);
    position: relative;
    display: inline-block;
}
.brand-title::after {
    content: "LINE TOGEL 2026";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    color: var(--neon-blue);
    opacity: 0.5;
    animation: glitch 2s infinite;
    z-index: -1;
}
@keyframes glitch {
    0% { clip-path: inset(10% 0 80% 0); transform: translate(-2px, 2px); }
    20% { clip-path: inset(80% 0 10% 0); transform: translate(2px, -2px); }
    40% { clip-path: inset(40% 0 40% 0); transform: translate(-2px, 2px); }
    60% { clip-path: inset(20% 0 60% 0); transform: translate(2px, -2px); }
    80% { clip-path: inset(60% 0 20% 0); transform: translate(-1px, 1px); }
    100% { clip-path: inset(10% 0 80% 0); transform: translate(1px, -1px); }
}

.status-bar {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(0, 243, 255, 0.1);
    border: 1px solid var(--neon-blue);
    padding: 5px 15px;
    border-radius: 20px;
    margin-top: 10px;
    font-size: 0.9rem;
    letter-spacing: 2px;
    box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
}
.status-dot {
    width: 8px; height: 8px;
    background: var(--neon-blue);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--neon-blue);
    animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* --- SEARCH BAR --- */
.search-wrapper {
    max-width: 600px;
    margin: 0 auto 40px;
    position: relative;
}
.search-input {
    width: 100%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    padding: 15px 50px 15px 25px;
    border-radius: 12px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
}
.search-input:focus {
    border-color: var(--neon-blue);
    box-shadow: var(--glow-strong);
}
.search-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--neon-blue);
    font-size: 1.2rem;
}

/* --- GALLERY GRID --- */
.gallery-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
    padding-bottom: 50px;
}

/* --- CARD DESIGN (COOL VERSION) --- */
.cyber-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    backdrop-filter: blur(12px);
    transition: transform 0.1s ease, box-shadow 0.3s ease;
    transform-style: preserve-3d;
    cursor: pointer;
}
.cyber-card:hover {
    box-shadow: 0 0 25px rgba(0, 243, 255, 0.25);
    border-color: var(--neon-blue);
}

.card-img-box {
    width: 100%;
    height: 250px;
    position: relative;
    overflow: hidden;
    background: #000;
}
.card-img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}
.cyber-card:hover .card-img-box img {
    transform: scale(1.1);
}

/* Overlay on Image */
.img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    opacity: 0;
    transition: 0.3s;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 20px;
}
.cyber-card:hover .img-overlay {
    opacity: 1;
}
.view-btn {
    background: var(--neon-blue);
    color: #000;
    padding: 8px 20px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.9rem;
    transform: translateY(20px);
    transition: 0.3s var(--ease-bounce);
}
.cyber-card:hover .view-btn {
    transform: translateY(0);
}

/* Card Content */
.card-content {
    padding: 15px;
    position: relative;
}
.card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    color: #fff;
    margin-bottom: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 0 5px rgba(255,255,255,0.5);
}

/* Action Buttons Row */
.action-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}
.act-btn {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-dim);
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
}
.act-btn:hover {
    background: var(--neon-blue);
    color: #000;
    box-shadow: 0 0 15px var(--neon-blue);
    border-color: var(--neon-blue);
    transform: translateY(-3px);
}
.act-btn.copy-btn:hover { background: #fff; }
.act-btn.dl-btn:hover { background: var(--neon-purple); color: #fff; box-shadow: 0 0 15px var(--neon-purple); border-color: var(--neon-purple); }

/* --- MODAL (LIGHTBOX) --- */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(15px);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
}
.modal.active {
    display: flex;
    opacity: 1;
}
.modal-content {
    max-width: 90%;
    max-height: 90vh;
    position: relative;
    border: 2px solid var(--neon-blue);
    border-radius: 10px;
    box-shadow: 0 0 50px rgba(0, 243, 255, 0.3);
    overflow: hidden;
}
.modal-img {
    max-width: 100%;
    max-height: 85vh;
    display: block;
}
.modal-close {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: 1px solid #fff;
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    transition: 0.3s;
    z-index: 10;
}
.modal-close:hover {
    background: var(--neon-blue);
    color: #000;
    border-color: var(--neon-blue);
    transform: rotate(90deg);
}

/* --- TOAST NOTIFICATION --- */
.toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--glass-bg);
    border-left: 4px solid var(--neon-blue);
    padding: 15px 25px;
    border-radius: 8px;
    color: #fff;
    font-weight: 600;
    transform: translateX(200%);
    transition: transform 0.4s var(--ease-bounce);
    z-index: 3000;
    backdrop-filter: blur(10px);
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    gap: 10px;
}
.toast.show { transform: translateX(0); }

/* --- LOADING --- */
.loader-box {
    text-align: center;
    padding: 50px;
    grid-column: 1 / -1;
}
.spinner {
    width: 50px; height: 50px;
    border: 3px solid transparent;
    border-top-color: var(--neon-blue);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
    box-shadow: 0 0 15px var(--neon-blue);
}
@keyframes spin { 100% { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 768px) {
    .brand-title { font-size: 2rem; }
    .gallery-container { grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .card-img-box { height: 180px; }
    .card-title { font-size: 0.9rem; }
    .act-btn { font-size: 0.9rem; padding: 6px; }
}
</style>
</head>
<body>

<!-- Background Elements -->
<div class="cyber-grid"></div>
<div class="vignette"></div>
<div class="scanline"></div>

<div class="container">
    <!-- Header -->
    <header>
        <h1 class="brand-title">FOTO GALLERY</h1>
        <div class="status-bar">
            <div class="status-dot"></div>
            <span>SYSTEM ONLINE // 2026</span>
        </div>
    </header>

    <!-- Search -->
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="Cari data foto..." onkeyup="filterGallery()">
        <i class="fas fa-search search-icon"></i>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-container" id="galleryGrid">
        <!-- Loading State -->
        <div class="loader-box" id="loader">
            <div class="spinner"></div>
            <p style="color:var(--neon-blue); letter-spacing:2px;">ACCESSING DATABASE...</p>
        </div>
    </div>
</div>

<!-- Modal Lightbox -->
<div class="modal" id="imageModal" onclick="closeModal(event)">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModalDirect()"><i class="fas fa-times"></i></button>
        <img src="" alt="Full View" class="modal-img" id="modalImg">
    </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast">
    <i class="fas fa-check-circle" style="color: var(--neon-blue);"></i>
    <span id="toastMsg">Action Success</span>
</div>

<script>
// --- CONFIGURATION ---
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0'; // ID Spreadsheet Anda
const GID = '1246502038'; // GID Sheet
let allData = [];

// --- INITIALIZATION ---
document.addEventListener('DOMContentLoaded', () => {
    fetchData();
});

// --- FETCH DATA ---
async function fetchData() {
    const loader = document.getElementById('loader');
    try {
        // Coba ambil via CSV export (lebih stabil untuk publik)
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}&range=C2:D150`;
        const response = await fetch(url);
        const text = await response.text();
        
        // Parse CSV sederhana
        const rows = text.split('\n').map(row => row.split(','));
        allData = [];

        rows.forEach((row, index) => {
            if(row.length >= 2) {
                // Bersihkan tanda kutip jika ada
                let title = row[0] ? row[0].replace(/"/g, '').trim() : '';
                let imgUrl = row[1] ? row[1].replace(/"/g, '').trim() : '';
                
                if(title && imgUrl) {
                    allData.push({ title, imgUrl, id: index });
                }
            }
        });

        renderGallery(allData);
        loader.style.display = 'none';
        showToast(`System Loaded: ${allData.length} Files Found`);

    } catch (error) {
        console.error(error);
        loader.innerHTML = `<p style="color:red">CONNECTION ERROR. REFRESH PAGE.</p>`;
    }
}

// --- RENDER GALLERY ---
function renderGallery(data) {
    const grid = document.getElementById('galleryGrid');
    // Hapus loader tapi simpan grid
    grid.innerHTML = ''; 

    if(data.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#fff;">NO DATA FOUND</div>';
        return;
    }

    data.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'cyber-card';
        // Add tilt effect event listeners
        card.onmousemove = (e) => handleTilt(e, card);
        card.onmouseleave = () => resetTilt(card);

        card.innerHTML = `
            <div class="card-img-box">
                <img src="${item.imgUrl}" alt="${item.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200/000/00f3ff?text=NO+IMG'">
                <div class="img-overlay">
                    <button class="view-btn" onclick="openModal('${item.imgUrl}')">VIEW FULL</button>
                </div>
            </div>
            <div class="card-content">
                <div class="card-title">${item.title}</div>
                <div class="action-row">
                    <button class="act-btn copy-btn" onclick="copyImage('${item.imgUrl}')" title="Copy Image">
                        <i class="far fa-copy"></i>
                    </button>
                    <button class="act-btn dl-btn" onclick="downloadImage('${item.imgUrl}', '${item.title}')" title="Download">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
}

// --- 3D TILT EFFECT LOGIC ---
function handleTilt(e, card) {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    
    const rotateX = ((y - centerY) / centerY) * -5; // Max rotation deg
    const rotateY = ((x - centerX) / centerX) * 5;

    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
}

function resetTilt(card) {
    card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale(1)`;
}

// --- SEARCH FUNCTION ---
function filterGallery() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allData.filter(item => item.title.toLowerCase().includes(query));
    renderGallery(filtered);
}

// --- ACTIONS ---
function openModal(url) {
    const modal = document.getElementById('imageModal');
    const img = document.getElementById('modalImg');
    img.src = url;
    modal.classList.add('active');
}

function closeModal(e) {
    if(e.target.id === 'imageModal') {
        document.getElementById('imageModal').classList.remove('active');
    }
}
function closeModalDirect() {
    document.getElementById('imageModal').classList.remove('active');
}

async function copyImage(url) {
    try {
        const response = await fetch(url);
        const blob = await response.blob();
        await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
        showToast("Image Copied to Clipboard!");
    } catch (err) {
        showToast("Failed to Copy (Browser Restriction)");
    }
}

function downloadImage(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = `CYBER_IMG_${filename.replace(/[^a-z0-9]/gi, '_')}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast("Download Started...");
}

// --- TOAST SYSTEM ---
function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').innerText = msg;
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f7ff">
<meta name="description" content="LINE TOGEL Foto Gallery - Cyber Portal 2026">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ✨✨ ULTRA PREMIUM CSS VARIABLES ✨✨ */
:root {
/* Neon Core Colors */
--neon-cyan: #00f7ff;
--neon-blue: #00e5ff;
--neon-electric: #00ffff;
--neon-purple: #9d4fff;
--neon-violet: #b75cff;
--neon-pink: #ff00d4;
--neon-magenta: #ff00aa;
--neon-green: #00ff9d;
--neon-gold: #ffd700;

/* Background System */
--bg-void: #000105;
--bg-deep: #00030a;
--bg-surface: rgba(4, 12, 32, 0.94);
--bg-elevated: rgba(8, 24, 56, 0.90);
--bg-glass: rgba(6, 18, 44, 0.72);
--bg-glass-strong: rgba(10, 28, 62, 0.85);

/* Text System */
--text-primary: #ffffff;
--text-secondary: #a8d8ff;
--text-tertiary: #6b89b8;
--text-dim: #4a5f8a;
--text-glow: rgba(0, 247, 255, 0.8);

/* Border & Glow System */
--border-subtle: rgba(0, 247, 255, 0.35);
--border-glow: rgba(0, 247, 255, 0.65);
--border-intense: rgba(0, 247, 255, 0.9);

--glow-soft: 0 0 20px rgba(0, 247, 255, 0.4), 0 0 40px rgba(0, 247, 255, 0.2);
--glow-medium: 0 0 30px rgba(0, 247, 255, 0.6), 0 0 60px rgba(0, 247, 255, 0.35), 0 0 100px rgba(0, 247, 255, 0.2);
--glow-intense: 0 0 40px rgba(0, 247, 255, 0.8), 0 0 80px rgba(0, 247, 255, 0.5), 0 0 140px rgba(0, 247, 255, 0.3);
--glow-purple: 0 0 30px rgba(157, 79, 255, 0.6), 0 0 60px rgba(157, 79, 255, 0.35);
--glow-pink: 0 0 30px rgba(255, 0, 212, 0.6), 0 0 60px rgba(255, 0, 212, 0.35);
--glow-green: 0 0 30px rgba(0, 255, 157, 0.6), 0 0 60px rgba(0, 255, 157, 0.35);

/* Animation System */
--ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
--ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
--ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
--transition-fast: 0.2s var(--ease-smooth);
--transition-normal: 0.4s var(--ease-smooth);
--transition-slow: 0.7s var(--ease-bounce);
--transition-elastic: 0.5s var(--ease-elastic);

/* Layout System */
--radius-sm: 8px;
--radius-md: 14px;
--radius-lg: 20px;
--radius-xl: 28px;
--radius-full: 999px;

--spacing-xs: 6px;
--spacing-sm: 12px;
--spacing-md: 20px;
--spacing-lg: 32px;
--spacing-xl: 48px;
}

/* ✨✨ BASE RESET & FOUNDATION ✨✨ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 20px; }
body {
font-family: 'Rajdhani', 'Exo 2', sans-serif;
background: var(--bg-void);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.65;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
}

/* ✨✨ MULTI-LAYER BACKGROUND SYSTEM ✨✨ */
.bg-layer {
position: fixed;
inset: 0;
z-index: -4;
background: 
radial-gradient(1200px 600px at 10% 15%, rgba(0, 247, 255, 0.12) 0%, transparent 60%),
radial-gradient(1000px 500px at 90% 20%, rgba(157, 79, 255, 0.10) 0%, transparent 60%),
radial-gradient(900px 450px at 50% 95%, rgba(255, 0, 212, 0.08) 0%, transparent 65%),
radial-gradient(600px 300px at 25% 70%, rgba(0, 255, 157, 0.06) 0%, transparent 70%);
animation: bgDrift 25s ease-in-out infinite alternate;
}
@keyframes bgDrift {
0%, 100% { transform: translate(0, 0) scale(1); filter: hue-rotate(0deg); }
33% { transform: translate(1%, -0.5%) scale(1.02); filter: hue-rotate(8deg); }
66% { transform: translate(-0.5%, 1%) scale(0.99); filter: hue-rotate(-5deg); }
}

/* Animated Grid */
.grid-pattern {
position: fixed;
inset: 0;
z-index: -3;
background-image:
linear-gradient(rgba(0, 247, 255, 0.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 247, 255, 0.06) 1px, transparent 1px),
repeating-linear-gradient(45deg, rgba(157, 79, 255, 0.03) 0, rgba(157, 79, 255, 0.03) 1px, transparent 1px, transparent 40px);
background-size: 50px 50px, 50px 50px, 120px 120px;
mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 85%);
animation: gridFlow 30s linear infinite;
opacity: 0.8;
}
@keyframes gridFlow {
0% { background-position: 0 0, 0 0, 0 0; }
100% { background-position: 50px 50px, 50px 50px, 120px 120px; }
}

/* Aurora Waves */
.aurora {
position: fixed;
inset: 0;
z-index: -2;
pointer-events: none;
overflow: hidden;
}
.aurora-wave {
position: absolute;
width: 200%;
height: 200%;
top: -50%;
left: -50%;
background: 
radial-gradient(ellipse at 30% 40%, rgba(0, 247, 255, 0.08) 0%, transparent 50%),
radial-gradient(ellipse at 70% 60%, rgba(157, 79, 255, 0.08) 0%, transparent 50%),
radial-gradient(ellipse at 50% 30%, rgba(255, 0, 212, 0.05) 0%, transparent 55%);
animation: auroraWave 35s ease-in-out infinite;
filter: blur(40px);
opacity: 0.7;
}
.aurora-wave:nth-child(2) {
animation-delay: -12s;
animation-duration: 42s;
opacity: 0.5;
filter: blur(60px);
}
@keyframes auroraWave {
0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
25% { transform: translate(2%, -1%) rotate(0.5deg) scale(1.03); }
50% { transform: translate(-1%, 2%) rotate(-0.3deg) scale(0.98); }
75% { transform: translate(1%, 1%) rotate(0.2deg) scale(1.01); }
}

/* Particle System */
.particles {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
overflow: hidden;
}
.particle {
position: absolute;
width: 3px; height: 3px;
border-radius: 50%;
opacity: 0;
animation: particleLife 25s infinite ease-in-out;
}
.particle.active { opacity: 0.85; }
.particle:nth-child(4n+1) { background: var(--neon-cyan); box-shadow: 0 0 12px var(--neon-cyan), 0 0 25px rgba(0, 247, 255, 0.5); }
.particle:nth-child(4n+2) { background: var(--neon-purple); box-shadow: 0 0 12px var(--neon-purple), 0 0 25px rgba(157, 79, 255, 0.5); }
.particle:nth-child(4n+3) { background: var(--neon-pink); box-shadow: 0 0 12px var(--neon-pink), 0 0 25px rgba(255, 0, 212, 0.5); }
.particle:nth-child(4n+4) { background: var(--neon-green); box-shadow: 0 0 12px var(--neon-green), 0 0 25px rgba(0, 255, 157, 0.5); }
@keyframes particleLife {
0%, 100% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
10% { opacity: 0.85; }
90% { opacity: 0.85; }
100% { transform: translateY(-100vh) rotate(720deg) scale(1.2); opacity: 0; }
}

/* Lightning Effect */
.lightning {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
}
.lightning-bolt {
position: absolute;
top: -100vh;
width: 2px;
height: 200vh;
background: linear-gradient(180deg, 
transparent 0%, 
var(--neon-electric) 20%, 
var(--neon-cyan) 40%, 
var(--neon-purple) 60%, 
var(--neon-pink) 80%, 
transparent 100%);
filter: blur(2px) brightness(1.2);
opacity: 0;
animation: lightningStrike 12s infinite;
box-shadow: 0 0 25px var(--neon-electric), 0 0 50px rgba(0, 247, 255, 0.4);
}
.lightning-bolt:nth-child(1) { left: 15%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 4s; }
.lightning-bolt:nth-child(3) { left: 85%; animation-delay: 8s; }
@keyframes lightningStrike {
0%, 88%, 90%, 92%, 100% { opacity: 0; transform: scaleY(0.3) translateY(-20%); }
89%, 91% { opacity: 0.25; transform: scaleY(1) translateY(0); }
}

/* Scanline CRT Effect */
.scanline {
position: fixed;
left: 0; right: 0; height: 4px;
background: linear-gradient(90deg, 
transparent, 
var(--neon-electric), 
var(--neon-cyan), 
var(--neon-purple), 
transparent);
opacity: 0.5;
animation: scanMove 6s linear infinite;
z-index: 100;
pointer-events: none;
filter: blur(1px);
box-shadow: 0 0 20px var(--neon-electric);
}
@keyframes scanMove {
0% { top: -10px; opacity: 0; }
5% { opacity: 0.5; }
95% { opacity: 0.5; }
100% { top: 100%; opacity: 0; }
}

/* Noise Texture */
.noise {
position: fixed;
inset: 0;
z-index: 5;
opacity: 0.035;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
pointer-events: none;
animation: noiseAnim 0.5s steps(10) infinite;
}
@keyframes noiseAnim {
0%, 100% { transform: translate(0, 0); }
25% { transform: translate(-1px, 1px); }
50% { transform: translate(2px, -1px); }
75% { transform: translate(-1px, -2px); }
}

/* ✨✨ LAYOUT & CONTAINER ✨✨ */
.container {
max-width: 1440px;
margin: 0 auto;
padding: var(--spacing-lg) var(--spacing-md);
min-height: 100vh;
position: relative;
}

/* ✨✨ HEADER SYSTEM ✨✨ */
.header {
text-align: center;
margin-bottom: var(--spacing-xl);
animation: headerReveal var(--transition-slow) backwards;
position: relative;
padding-bottom: var(--spacing-lg);
}
.header::after {
content: '';
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 240px;
height: 3px;
background: linear-gradient(90deg, 
transparent, 
var(--neon-electric), 
var(--neon-cyan), 
var(--neon-purple), 
var(--neon-pink), 
transparent);
border-radius: 2px;
box-shadow: var(--glow-intense);
animation: glowPulse 3s ease-in-out infinite;
}
@keyframes headerReveal {
from { opacity: 0; transform: translateY(-40px) scale(0.98); }
to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes glowPulse {
0%, 100% { opacity: 0.8; box-shadow: var(--glow-intense); }
50% { opacity: 1; box-shadow: 0 0 50px rgba(0, 247, 255, 0.9), 0 0 100px rgba(0, 247, 255, 0.6), 0 0 180px rgba(0, 247, 255, 0.35); }
}

.back-btn {
position: fixed;
left: var(--spacing-md); 
top: var(--spacing-md);
background: var(--bg-glass);
border: 1px solid var(--border-glow);
color: var(--neon-cyan);
padding: 8px 18px;
border-radius: var(--radius-full);
text-decoration: none;
font-weight: 700;
font-size: 11px;
display: flex;
align-items: center;
gap: 8px;
transition: var(--transition-normal);
backdrop-filter: blur(16px);
z-index: 1000;
pointer-events: auto;
box-shadow: var(--glow-soft);
letter-spacing: 0.5px;
}
.back-btn:hover {
background: var(--bg-glass-strong);
transform: translateX(-4px) scale(1.03);
box-shadow: var(--glow-medium);
color: var(--bg-deep);
border-color: var(--neon-electric);
}
.back-btn i { font-size: 13px; transition: var(--transition-fast); }
.back-btn:hover i { transform: translateX(-2px); }

/* ✨✨ TYPOGRAPHY SYSTEM ✨✨ */
.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(32px, 8vw, 58px);
font-weight: 900;
letter-spacing: 6px;
margin-bottom: 12px;
position: relative;
background: linear-gradient(135deg, 
var(--neon-electric) 0%, 
var(--neon-cyan) 25%, 
#ffffff 50%, 
var(--neon-cyan) 75%, 
var(--neon-purple) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 0 0 40px rgba(0, 247, 255, 0.65);
animation: titleShimmer 3s ease-in-out infinite, titleFloat 5s ease-in-out infinite;
}
@keyframes titleShimmer {
0%, 100% { filter: brightness(1) contrast(1); }
50% { filter: brightness(1.45) contrast(1.05); }
}
@keyframes titleFloat {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-4px); }
}

.subtitle {
font-size: 12px;
color: var(--text-secondary);
letter-spacing: 7px;
text-transform: uppercase;
margin-bottom: 18px;
font-weight: 600;
text-shadow: 0 0 12px rgba(0, 247, 255, 0.45);
font-family: 'Orbitron', sans-serif;
}

/* ✨✨ STATUS BADGE ✨✨ */
.status-badge {
display: inline-flex;
align-items: center;
gap: 12px;
padding: 8px 24px;
background: rgba(0, 255, 157, 0.16);
border: 1px solid rgba(0, 255, 157, 0.55);
border-radius: var(--radius-full);
font-size: 11px;
font-weight: 700;
color: var(--neon-green);
text-transform: uppercase;
letter-spacing: 2.8px;
animation: statusPulse 2.2s ease-in-out infinite;
box-shadow: var(--glow-green);
font-family: 'Orbitron', sans-serif;
}
@keyframes statusPulse {
0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 157, 0.4); }
50% { box-shadow: 0 0 40px rgba(0, 255, 157, 0.75); }
}
.status-dot {
width: 9px; height: 9px;
background: var(--neon-green);
border-radius: 50%;
animation: dotBeat 1.4s ease-in-out infinite;
box-shadow: 0 0 18px var(--neon-green), 0 0 36px rgba(0, 255, 157, 0.6);
}
@keyframes dotBeat {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.6); opacity: 0.85; }
}

/* ✨✨ NAVIGATION ✨✨ */
.nav-tabs {
display: flex;
gap: 14px;
justify-content: center;
margin-bottom: var(--spacing-lg);
flex-wrap: wrap;
}
.nav-tab {
padding: 12px 28px;
background: var(--bg-surface);
border: 1px solid var(--border-subtle);
border-radius: var(--radius-lg);
color: var(--text-primary);
font-family: 'Orbitron', sans-serif;
font-size: 12px;
font-weight: 700;
cursor: pointer;
transition: all 0.4s var(--ease-smooth);
text-transform: uppercase;
letter-spacing: 1.8px;
backdrop-filter: blur(14px);
position: relative;
overflow: hidden;
display: flex;
align-items: center;
gap: 8px;
}
.nav-tab::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, 
rgba(0, 247, 255, 0.22), 
rgba(157, 79, 255, 0.18), 
rgba(255, 0, 212, 0.12));
opacity: 0;
transition: opacity 0.4s;
}
.nav-tab:hover, .nav-tab.active {
background: var(--bg-elevated);
border-color: var(--neon-electric);
box-shadow: var(--glow-medium);
transform: translateY(-4px);
color: var(--neon-cyan);
}
.nav-tab:hover::before, .nav-tab.active::before { opacity: 1; }
.nav-tab i { font-size: 14px; }

.section { display: none; animation: sectionFade var(--transition-slow); }
.section.active { display: block; }
@keyframes sectionFade {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}

/* ✨✨ SEARCH SYSTEM ✨✨ */
.search-container {
max-width: 700px;
margin: 0 auto var(--spacing-lg);
position: relative;
}
.search-box {
width: 100%;
padding: 16px 55px 16px 24px;
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: var(--radius-lg);
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 15px;
transition: all 0.4s var(--ease-smooth);
backdrop-filter: blur(14px);
box-shadow: var(--glow-soft);
}
.search-box:focus {
outline: none;
border-color: var(--neon-electric);
box-shadow: var(--glow-medium);
background: var(--bg-elevated);
}
.search-box::placeholder { color: var(--text-tertiary); }
.search-icon {
position: absolute;
right: 20px;
top: 50%;
transform: translateY(-50%);
color: var(--neon-cyan);
font-size: 17px;
pointer-events: none;
transition: var(--transition-fast);
}
.search-box:focus + .search-icon { color: var(--neon-electric); }

/* ✨✨ GALLERY GRID ✨✨ */
.gallery-section { margin-bottom: var(--spacing-xl); }

.section-title {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
font-weight: 700;
color: var(--text-primary);
margin-bottom: var(--spacing-md);
padding-bottom: 14px;
border-bottom: 1px solid var(--border-subtle);
display: flex;
align-items: center;
gap: 14px;
letter-spacing: 2.8px;
position: relative;
}
.section-title::before {
content: '';
width: 5px; height: 24px;
background: linear-gradient(180deg, var(--neon-electric), var(--neon-cyan), var(--neon-purple));
border-radius: 3px;
box-shadow: 0 0 18px rgba(0, 247, 255, 0.75);
animation: barPulse 2.5s ease-in-out infinite;
}
@keyframes barPulse {
0%, 100% { opacity: 1; transform: scaleY(1); }
50% { opacity: 0.85; transform: scaleY(1.15); }
}

.gallery-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
gap: 22px;
}

/* ✨✨ ULTRA PREMIUM PHOTO CARD ✨✨ */
.photo-card {
background: var(--bg-surface);
border: 1px solid var(--border-subtle);
border-radius: var(--radius-lg);
overflow: hidden;
transition: all 0.6s var(--ease-bounce);
position: relative;
backdrop-filter: blur(14px);
animation: cardEnter 0.7s ease forwards;
opacity: 0;
transform: translateY(30px);
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}
.photo-card::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, 
rgba(0, 247, 255, 0.12), 
transparent 40%, 
transparent 60%, 
rgba(157, 79, 255, 0.12));
opacity: 0;
transition: opacity 0.5s;
pointer-events: none;
z-index: 1;
}
.photo-card::after {
content: '';
position: absolute;
inset: -2px;
background: linear-gradient(45deg, 
var(--neon-electric), 
var(--neon-purple), 
var(--neon-pink), 
var(--neon-cyan));
border-radius: inherit;
opacity: 0;
transition: opacity 0.5s;
pointer-events: none;
z-index: 0;
filter: blur(20px);
}
.photo-card:hover::before { opacity: 1; }
.photo-card:hover::after { opacity: 0.35; }
.photo-card:hover {
transform: translateY(-8px) scale(1.025);
border-color: var(--neon-electric);
box-shadow: var(--glow-medium), 0 25px 60px rgba(0, 0, 0, 0.55);
}
.photo-card:nth-child(1) { animation-delay: 0.1s; }
.photo-card:nth-child(2) { animation-delay: 0.15s; }
.photo-card:nth-child(3) { animation-delay: 0.2s; }
.photo-card:nth-child(4) { animation-delay: 0.25s; }
.photo-card:nth-child(5) { animation-delay: 0.3s; }
@keyframes cardEnter { to { opacity: 1; transform: translateY(0); } }

.photo-wrapper {
position: relative;
width: 100%;
height: 300px;
background: radial-gradient(circle at center, #0f2845 0%, #050e1f 100%);
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
}
.photo-wrapper::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(180deg, 
transparent 50%, 
rgba(0, 2, 8, 0.5) 85%, 
rgba(0, 2, 8, 0.85));
pointer-events: none;
z-index: 2;
}
.photo-wrapper::after {
content: '';
position: absolute;
inset: 0;
border: 1px solid rgba(0, 247, 255, 0.15);
border-radius: inherit;
pointer-events: none;
z-index: 3;
}
.photo-wrapper img {
width: 100%;
height: 100%;
object-fit: contain;
display: block;
padding: 0;
background: transparent;
transition: all 0.5s var(--ease-smooth);
filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.35));
}
.photo-card:hover .photo-wrapper img {
transform: scale(1.08);
filter: drop-shadow(0 10px 30px rgba(0, 247, 255, 0.45));
}

.photo-info {
padding: 18px;
position: relative;
z-index: 4;
}
.photo-info::before {
content: '';
position: absolute;
top: 0;
left: 20px;
right: 20px;
height: 1px;
background: linear-gradient(90deg, 
transparent, 
rgba(0, 247, 255, 0.5), 
rgba(157, 79, 255, 0.5), 
transparent);
}

.photo-title {
font-family: 'Orbitron', sans-serif;
font-size: 14px;
font-weight: 700;
color: var(--neon-cyan);
margin-bottom: 16px;
word-break: break-word;
text-align: center;
text-shadow: 0 0 14px rgba(0, 247, 255, 0.65);
line-height: 1.45;
}

.photo-meta {
font-size: 11px;
color: var(--text-tertiary);
text-align: center;
margin-bottom: 16px;
opacity: 0.92;
font-weight: 500;
}

/* ✨✨ PREMIUM ACTION BUTTONS ✨✨ */
.action-buttons-row {
display: flex;
gap: 12px;
justify-content: center;
flex-wrap: wrap;
padding-top: 14px;
border-top: 1px solid var(--border-subtle);
}

.action-btn {
flex: 1;
min-width: 80px;
max-width: 100px;
height: 50px;
background: linear-gradient(135deg, 
rgba(0, 247, 255, 0.22) 0%, 
rgba(0, 247, 255, 0.14) 100%);
border: 1px solid var(--border-glow);
border-radius: var(--radius-md);
color: var(--neon-cyan);
font-size: 11px;
font-weight: 700;
cursor: pointer;
transition: all 0.35s var(--ease-smooth);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 5px;
text-transform: uppercase;
letter-spacing: 0.7px;
backdrop-filter: blur(10px);
position: relative;
overflow: hidden;
font-family: 'Orbitron', sans-serif;
}
.action-btn::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, 
rgba(0, 247, 255, 0.35), 
rgba(157, 79, 255, 0.28));
opacity: 0;
transition: opacity 0.35s;
}
.action-btn i {
font-size: 18px;
margin-bottom: 2px;
z-index: 1;
transition: transform 0.3s;
}
.action-btn span {
font-size: 9px;
font-weight: 700;
z-index: 1;
}
.action-btn:hover {
background: linear-gradient(135deg, 
rgba(0, 247, 255, 0.48) 0%, 
rgba(0, 247, 255, 0.38) 100%);
border-color: var(--neon-electric);
transform: translateY(-5px) scale(1.08);
box-shadow: 0 10px 35px rgba(0, 247, 255, 0.65);
color: var(--bg-deep);
}
.action-btn:hover::before { opacity: 1; }
.action-btn:hover i { transform: translateY(-2px); }

.action-btn.copy-btn:hover {
background: linear-gradient(135deg, rgba(0, 255, 157, 0.48), rgba(0, 220, 130, 0.38));
border-color: var(--neon-green);
box-shadow: 0 10px 35px rgba(0, 255, 157, 0.65);
}
.action-btn.download-btn:hover {
background: linear-gradient(135deg, rgba(0, 247, 255, 0.48), rgba(0, 210, 255, 0.38));
border-color: var(--neon-blue);
box-shadow: 0 10px 35px rgba(0, 247, 255, 0.65);
}

/* ✨✨ LOADING SYSTEM ✨✨ */
.loading {
display: none;
text-align: center;
padding: 45px 20px;
grid-column: 1 / -1;
}
.loading.active { display: block; }

.loader {
width: 52px;
height: 52px;
border: 4px solid rgba(0, 247, 255, 0.25);
border-top-color: var(--neon-electric);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 22px;
box-shadow: var(--glow-medium);
position: relative;
}
.loader::after {
content: '';
position: absolute;
inset: -6px;
border: 3px solid transparent;
border-top-color: var(--neon-purple);
border-radius: 50%;
animation: spin 1.4s linear infinite reverse;
}
.loader::before {
content: '';
position: absolute;
inset: -12px;
border: 2px solid transparent;
border-top-color: var(--neon-pink);
border-radius: 50%;
animation: spin 2s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
color: var(--neon-electric); 
font-family: 'Orbitron', sans-serif; 
font-size: 13px; 
font-weight: 700;
letter-spacing: 2px;
animation: textPulse 2s ease-in-out infinite;
}
@keyframes textPulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.7; }
}

/* ✨✨ MODAL SYSTEM ✨✨ */
.modal-backdrop {
position: fixed;
inset: 0;
background: rgba(0, 2, 8, 0.97);
backdrop-filter: blur(24px);
z-index: 1000;
display: none;
align-items: center;
justify-content: center;
padding: 24px;
animation: modalFade 0.35s ease;
}
@keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
.modal-backdrop.active { display: flex; }

.modal-content {
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: var(--radius-xl);
max-width: 1000px;
width: 100%;
max-height: 94vh;
overflow: hidden;
display: flex;
flex-direction: column;
box-shadow: var(--glow-intense), 0 30px 80px rgba(0, 0, 0, 0.6);
animation: modalSlide var(--transition-slow);
}
@keyframes modalSlide {
from { opacity: 0; transform: translateY(40px) scale(0.97); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 18px 26px;
border-bottom: 1px solid var(--border-subtle);
background: linear-gradient(90deg, 
rgba(0, 247, 255, 0.1), 
transparent, 
rgba(157, 79, 255, 0.1));
}
.modal-title {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
color: var(--neon-cyan);
font-weight: 700;
letter-spacing: 1px;
}
.modal-close {
width: 40px;
height: 40px;
background: transparent;
border: 1px solid var(--neon-pink);
border-radius: 50%;
color: var(--neon-pink);
font-size: 16px;
cursor: pointer;
transition: all 0.35s var(--ease-smooth);
display: flex;
align-items: center;
justify-content: center;
}
.modal-close:hover {
background: var(--neon-pink);
color: var(--bg-deep);
transform: rotate(90deg) scale(1.12);
box-shadow: var(--glow-pink);
}

.modal-body {
padding: 26px;
text-align: center;
overflow-y: auto;
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
background: radial-gradient(circle at center, #0e2644 0%, #050e20 100%);
}
.modal-body img {
max-width: 100%;
max-height: 68vh;
width: auto;
object-fit: contain;
border-radius: var(--radius-md);
box-shadow: 0 0 40px rgba(0, 247, 255, 0.45), 0 12px 50px rgba(0, 0, 0, 0.5);
transition: transform 0.4s var(--ease-smooth);
}
.modal-body img:hover { transform: scale(1.015); }

.modal-actions {
margin-top: 22px;
display: flex;
gap: 12px;
justify-content: center;
flex-wrap: wrap;
}

/* ✨✨ TOAST NOTIFICATIONS ✨✨ */
.toast {
position: fixed;
bottom: 28px;
right: 28px;
background: var(--bg-glass-strong);
border: 1px solid var(--neon-electric);
color: var(--neon-cyan);
padding: 15px 28px;
border-radius: var(--radius-lg);
font-weight: 700;
font-size: 13px;
z-index: 10000;
display: flex;
align-items: center;
gap: 12px;
box-shadow: var(--glow-medium);
transform: translateX(300px);
opacity: 0;
transition: all 0.5s var(--ease-bounce);
backdrop-filter: blur(16px);
font-family: 'Orbitron', sans-serif;
letter-spacing: 0.5px;
}
.toast.show { transform: translateX(0); opacity: 1; }
.toast i { font-size: 17px; }

/* ✨✨ RESPONSIVE DESIGN ✨✨ */
@media (max-width: 1024px) {
.container { padding: 24px 16px; }
.gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
.photo-wrapper { height: 260px; }
}

@media (max-width: 768px) {
.container { padding: 18px 12px; }
.back-btn { left: 12px; top: 12px; padding: 7px 14px; font-size: 10px; }
.title { font-size: clamp(28px, 9vw, 48px); letter-spacing: 4px; }
.subtitle { font-size: 11px; letter-spacing: 5px; }
.gallery-grid { grid-template-columns: 1fr; }
.photo-wrapper { height: 280px; }
.photo-title { font-size: 13px; }
.action-btn { min-width: 70px; max-width: 85px; height: 46px; }
.action-btn i { font-size: 16px; }
.action-btn span { font-size: 8px; }
.nav-tabs { gap: 10px; }
.nav-tab { padding: 10px 22px; font-size: 11px; }
.modal-content { border-radius: var(--radius-lg); }
.modal-body { padding: 20px; }
.toast { bottom: 20px; right: 20px; padding: 13px 24px; font-size: 12px; }
}

@media (max-width: 480px) {
.title { font-size: clamp(26px, 10vw, 42px); }
.photo-wrapper { height: 240px; }
.action-buttons-row { gap: 8px; }
.action-btn { min-width: 65px; height: 44px; padding: 8px 4px; }
}

/* ✨✨ SCROLLBAR ✨✨ */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon-electric), var(--neon-cyan), var(--neon-purple), var(--neon-pink));
border-radius: 6px;
border: 2px solid var(--bg-deep);
box-shadow: 0 0 18px rgba(0, 247, 255, 0.55);
}
::-webkit-scrollbar-thumb:hover {
background: linear-gradient(180deg, var(--neon-cyan), var(--neon-electric), var(--neon-violet));
box-shadow: 0 0 25px rgba(0, 247, 255, 0.75);
}

/* ✨✨ SELECTION & FOCUS ✨✨ */
::selection {
background: rgba(0, 247, 255, 0.45);
color: var(--text-primary);
text-shadow: 0 0 12px rgba(0, 247, 255, 0.7);
}
a:focus, button:focus, input:focus {
outline: 2px solid var(--neon-electric);
outline-offset: 3px;
box-shadow: 0 0 0 5px rgba(0, 247, 255, 0.25);
}

/* ✨✨ UTILITY CLASSES ✨✨ */
.hidden { display: none !important; }
.sr-only {
position: absolute;
width: 1px; height: 1px;
padding: 0; margin: -1px;
overflow: hidden; clip: rect(0, 0, 0, 0);
white-space: nowrap; border: 0;
}
</style>
</head>
<body>
<!-- ✨✨ BACKGROUND LAYERS ✨✨ -->
<div class="bg-layer"></div>
<div class="grid-pattern"></div>
<div class="aurora">
<div class="aurora-wave"></div>
<div class="aurora-wave"></div>
</div>
<div class="noise"></div>
<div class="particles" id="particles"></div>
<div class="lightning">
<div class="lightning-bolt"></div>
<div class="lightning-bolt"></div>
<div class="lightning-bolt"></div>
</div>
<div class="scanline"></div>

<!-- ✨✨ BACK BUTTON ✨✨ -->
<a href="index.html" class="back-btn" aria-label="Kembali ke halaman utama">
<i class="fas fa-arrow-left"></i> <span>Kembali</span>
</a>

<!-- ✨✨ MAIN CONTAINER ✨✨ -->
<div class="container">
<header class="header">
<h1 class="title">⚡ FOTO GALLERY</h1>
<p class="subtitle">LINE TOGEL — Cyber Portal 2026</p>
<div class="status-badge" role="status" aria-live="polite">
<span class="status-dot" aria-hidden="true"></span>
<span>SYSTEM ONLINE</span>
</div>
</header>

<!-- ✨✨ NAVIGATION ✨✨ -->
<nav class="nav-tabs" role="tablist">
<button class="nav-tab active" role="tab" aria-selected="true" aria-controls="gallery">
<i class="fas fa-images"></i> Galeri Foto
</button>
</nav>

<!-- ✨✨ GALLERY SECTION ✨✨ -->
<section id="gallery" class="section active" role="tabpanel" aria-labelledby="gallery-tab">
<div class="search-container">
<input type="search" class="search-box" id="searchInput" placeholder="🔍 Cari foto berdasarkan judul..." onkeyup="searchPhotos()" aria-label="Cari foto">
<i class="fas fa-search search-icon" aria-hidden="true"></i>
</div>

<div class="loading" id="loading" aria-live="polite">
<div class="loader" role="status"><span class="sr-only">Memuat foto...</span></div>
<div class="loading-text">⚡ LOADING PHOTOS...</div>
</div>

<div class="gallery-grid" id="galleryGrid" role="list"></div>
</section>
</div>

<!-- ✨✨ MODAL ✨✨ -->
<div class="modal-backdrop" id="imageModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title" id="modalTitle">Foto Detail</h3>
<button class="modal-close" onclick="closeModal()" aria-label="Tutup modal">
<i class="fas fa-times"></i>
</button>
</div>
<div class="modal-body">
<img src="" alt="" id="modalImage">
<div class="modal-actions">
<button class="action-btn copy-btn" onclick="copyImage()">
<i class="fas fa-copy"></i>
<span>Copy</span>
</button>
<button class="action-btn download-btn" onclick="downloadModalImage()">
<i class="fas fa-download"></i>
<span>Download</span>
</button>
</div>
</div>
</div>
</div>

<!-- ✨✨ TOAST ✨✨ -->
<div id="toast" class="toast" role="alert" aria-live="assertive">
<i class="fas fa-bolt" aria-hidden="true"></i>
<span id="toastText">Berhasil!</span>
</div>

<!-- ✨✨ JAVASCRIPT ✨✨ -->
<script>
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';

// ✨ Initialize
document.addEventListener('DOMContentLoaded', () => {
initParticles();
fetchPhotosFromSheet();
initKeyboardNav();
});

// ✨ Particle System
function initParticles() {
const container = document.getElementById('particles');
if (!container) return;
for(let i = 0; i < 70; i++) {
const p = document.createElement('div');
p.className = 'particle';
p.style.left = Math.random() * 100 + '%';
p.style.top = Math.random() * 100 + '%';
p.style.animationDelay = Math.random() * 30 + 's';
p.style.animationDuration = (20 + Math.random() * 30) + 's';
p.style.setProperty('--size', (2 + Math.random() * 4) + 'px');
setTimeout(() => p.classList.add('active'), Math.random() * 2000);
container.appendChild(p);
}
}

// ✨ Fetch Photos
async function fetchPhotosFromSheet() {
document.getElementById('loading').classList.add('active');
document.getElementById('galleryGrid').innerHTML = '';
try {
const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';
let photos = [];
try {
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
const response = await fetch(gvizUrl);
const text = await response.text();
const json = JSON.parse(text.substring(47).slice(0, -2));
photos = json.table.rows
.filter(row => row.c?.[0]?.v && row.c?.[1]?.v)
.map((row, i) => ({
judul: row.c[0].v,
foto: row.c[1].v,
index: i + 2
}));
} catch (e) {
const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
const csvText = await (await fetch(csvUrl)).text();
photos = csvText.split('\n')
.map(row => row.split(','))
.filter(row => row[0]?.trim() && row[1]?.trim())
.map((row, i) => ({
judul: row[0].replace(/"/g, '').trim(),
foto: row[1].replace(/"/g, '').trim(),
index: i + 2
}));
}
allPhotos = photos;
renderGallery(allPhotos);
showToast(`⚡ ${allPhotos.length} foto dimuat`);
} catch (error) {
console.error('Error:', error);
showToast('❗ Gagal memuat foto');
document.getElementById('galleryGrid').innerHTML = `
<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-tertiary)">
<i class="fas fa-exclamation-triangle" style="font-size:52px;color:var(--neon-pink);margin-bottom:20px;text-shadow:0 0 25px rgba(255,0,212,0.6)"></i>
<h3 style="font-family:'Orbitron';color:var(--neon-cyan);margin-bottom:12px">Gagal Memuat</h3>
<p>Periksa koneksi atau publikasi Google Sheets</p>
</div>`;
}
document.getElementById('loading').classList.remove('active');
}

// ✨ Render Gallery
function renderGallery(photos) {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';
if (!photos.length) {
grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-tertiary)">
<i class="fas fa-search" style="font-size:52px;margin-bottom:20px;opacity:0.6"></i>
<h3 style="font-family:'Orbitron';color:var(--neon-cyan);margin-bottom:12px">Tidak Ditemukan</h3>
<p>Coba kata kunci lain</p>
</div>`;
return;
}
photos.forEach((photo, idx) => {
grid.appendChild(createPhotoCard(photo.foto, photo.judul, idx));
});
}

// ✨ Create Premium Card
function createPhotoCard(url, title, index) {
const card = document.createElement('div');
card.className = 'photo-card';
card.setAttribute('role', 'listitem');
card.innerHTML = `
<div class="photo-wrapper">
<img src="${url}" alt="${title}" 
onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00f7ff?text=No+Image'" 
loading="lazy" 
onclick="viewFullImage('${url}', '${title.replace(/'/g, "\\'")}')" 
style="cursor:pointer">
</div>
<div class="photo-info">
<div class="photo-title">${title}</div>
<div class="photo-meta">Foto #${index + 1}</div>
<div class="action-buttons-row">
<button class="action-btn copy-btn" onclick="copyPhoto('${url}')" title="Salin foto" aria-label="Salin ${title}">
<i class="fas fa-copy"></i><span>Copy</span>
</button>
<button class="action-btn download-btn" onclick="downloadPhoto('${url}', '${title.replace(/'/g, "\\'")}')" title="Download" aria-label="Download ${title}">
<i class="fas fa-download"></i><span>Download</span>
</button>
</div>
</div>`;
return card;
}

// ✨ Search
function searchPhotos() {
const term = document.getElementById('searchInput').value.toLowerCase().trim();
const filtered = !term ? allPhotos : allPhotos.filter(p => p.judul.toLowerCase().includes(term));
renderGallery(filtered);
if (filtered.length) showToast(`⚡ ${filtered.length} hasil`);
}

// ✨ Modal Functions
function viewFullImage(url, title) {
currentImageUrl = url;
currentImageTitle = title;
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalImage').src = url;
document.getElementById('modalImage').alt = title;
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
}
function closeModal() {
document.getElementById('imageModal').classList.remove('active');
document.body.style.overflow = '';
currentImageUrl = currentImageTitle = '';
}

// ✨ Copy/Download
async function copyPhoto(url) {
try {
const blob = await (await fetch(url)).blob();
await navigator.clipboard.write([new ClipboardItem({[blob.type]: blob})]);
showToast('✅ Disalin ke clipboard!');
} catch {
showToast('❗ Klik kanan gambar > Copy Image');
}
}
async function copyImage() { if (currentImageUrl) await copyPhoto(currentImageUrl); }
function downloadPhoto(url, filename) {
const a = document.createElement('a');
a.href = url;
a.download = `${filename.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`;
a.target = '_blank';
document.body.appendChild(a); a.click(); document.body.removeChild(a);
showToast('⚡ Download dimulai...');
}
function downloadModalImage() {
if (currentImageUrl) downloadPhoto(currentImageUrl, currentImageTitle);
}

// ✨ Toast
function showToast(msg) {
const toast = document.getElementById('toast');
document.getElementById('toastText').textContent = msg;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 4000);
}

// ✨ Keyboard Navigation
function initKeyboardNav() {
document.addEventListener('keydown', e => {
if (e.key === 'Escape') closeModal();
if (e.ctrlKey && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput')?.focus(); }
});
document.getElementById('imageModal')?.addEventListener('click', e => {
if (e.target.id === 'imageModal') closeModal();
});
}
</script>
</body>
</html>

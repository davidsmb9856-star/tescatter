<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE TOGEL - Bonus Event</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
--bg-dark: #020810; --bg-card: #061420; --bg-input: #0a1e30;
--neon-blue: #00d4ff; --neon-cyan: #00fff7; --neon-glow: rgba(0, 212, 255, 0.4);
--accent-green: #00ff88; --accent-red: #ff4757; --accent-orange: #ff9f43;
--border-color: rgba(0, 212, 255, 0.3); --text-primary: #e0f4ff; --text-muted: #6b8fa8;
--scan-line: rgba(0, 255, 247, 0.6);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: var(--text-primary);
min-height: 100vh; overflow-x: hidden;
}
.bg-animated {
position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
radial-gradient(ellipse at 50% 50%, rgba(0, 180, 255, 0.03) 0%, transparent 70%), var(--bg-dark);
}
.bg-grid {
position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
background-size: 50px 50px; animation: gridMove 20s linear infinite;
}
@keyframes gridMove { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }
.particle {
position: fixed; width: 4px; height: 4px; background: var(--neon-blue);
border-radius: 50%; pointer-events: none; z-index: -1;
box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
animation: floatParticle 15s infinite linear; opacity: 0.6;
}
@keyframes floatParticle {
0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
10% { opacity: 0.6; } 90% { opacity: 0.6; }
100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

/* === SCAN ANIMATION === */
.scan-overlay {
position: absolute; top: 0; left: 0; width: 100%; height: 100%;
background: linear-gradient(180deg, transparent 0%, var(--scan-line) 50%, transparent 100%);
animation: scanMove 2s ease-in-out infinite; pointer-events: none; border-radius: 12px;
}
@keyframes scanMove {
0%, 100% { transform: translateY(-100%); opacity: 0; }
10% { opacity: 1; } 90% { opacity: 1; }
100% { transform: translateY(100%); opacity: 0; }
}
.scan-pulse {
position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
width: 200px; height: 200px; border: 2px solid var(--neon-cyan);
border-radius: 50%; animation: pulseRing 2s ease-out infinite; opacity: 0;
}
@keyframes pulseRing {
0% { width: 0; height: 0; opacity: 0.8; }
100% { width: 400px; height: 400px; opacity: 0; }
}

/* === NEON GLOW EFFECTS === */
.judul-glow {
font-family: 'Orbitron', sans-serif; font-size: clamp(1.5rem, 4vw, 2.2rem);
font-weight: 900; text-align: center; color: var(--neon-cyan);
letter-spacing: 3px; margin-bottom: 10px;
text-shadow: 0 0 30px rgba(0, 255, 247, 0.3), 0 0 60px rgba(0, 212, 255, 0.2);
animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
0%, 100% { text-shadow: 0 0 30px rgba(0, 255, 247, 0.3); }
50% { text-shadow: 0 0 50px rgba(0, 255, 247, 0.6), 0 0 80px rgba(0, 212, 255, 0.4); }
}
.bonus-title {
font-family: 'Orbitron', sans-serif; font-size: clamp(1.2rem, 3vw, 1.8rem);
font-weight: 700; text-align: center; color: var(--neon-blue);
letter-spacing: 2px; margin-bottom: 20px;
}
.tab-content {
display: block; padding: 20px; max-width: 1400px; margin: 0 auto;
animation: fadeInUp 0.5s ease-out;
}
@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

.bonus-section {
background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.8) 100%);
border: 1px solid var(--border-color); border-radius: 20px; padding: 25px; margin: 10px;
backdrop-filter: blur(10px);
box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 212, 255, 0.1);
}

/* === BUTTONS === */
.neon-switch-btn {
font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px; padding: 12px 20px;
background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
border: 1px solid var(--border-color); border-radius: 10px; color: var(--neon-blue);
cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
position: relative; overflow: hidden; letter-spacing: 0.5px;
}
.neon-switch-btn::before {
content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
transition: left 0.5s ease;
}
.neon-switch-btn:hover::before { left: 100%; }
.neon-switch-btn:hover {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
border-color: var(--neon-blue); transform: translateY(-2px);
box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}
.neon-switch-btn.active {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.3) 0%, rgba(0, 180, 255, 0.2) 100%);
border-color: var(--neon-cyan); color: var(--neon-cyan);
box-shadow: 0 0 25px rgba(0, 212, 255, 0.4), inset 0 0 10px rgba(0, 255, 247, 0.2);
}
.neon-switch-btn.danger { border-color: rgba(255, 71, 87, 0.4); color: var(--accent-red); }
.neon-switch-btn.danger:hover {
background: rgba(255, 71, 87, 0.2); border-color: var(--accent-red);
box-shadow: 0 5px 20px rgba(255, 71, 87, 0.3);
}
.neon-switch-btn.orange { border-color: rgba(255, 159, 67, 0.4); color: var(--accent-orange); }
.neon-switch-btn.orange:hover {
background: rgba(255, 159, 67, 0.2); border-color: var(--accent-orange);
box-shadow: 0 5px 20px rgba(255, 159, 67, 0.3);
}
.neon-switch-btn.scan-btn {
background: linear-gradient(135deg, rgba(0, 255, 136, 0.2) 0%, rgba(0, 200, 100, 0.1) 100%);
border-color: var(--accent-green); color: var(--accent-green);
}
.neon-switch-btn.scan-btn:hover {
box-shadow: 0 0 25px rgba(0, 255, 136, 0.4); transform: translateY(-2px) scale(1.02);
}
.neon-switch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

/* === INPUTS === */
.bonus-textarea {
width: 100%; min-height: 120px; background: var(--bg-input);
border: 1px solid var(--border-color); border-radius: 12px; padding: 15px;
color: var(--text-primary); font-family: 'Rajdhani', sans-serif;
font-size: 15px; font-weight: 500; resize: vertical; transition: all 0.3s ease;
}
.bonus-textarea:focus {
outline: none; border-color: var(--neon-blue);
box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}
.bonus-input {
width: 100%; background: var(--bg-input); border: 1px solid var(--border-color);
border-radius: 8px; padding: 10px 14px; color: var(--text-primary);
font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 500;
transition: all 0.3s ease;
}
.bonus-input:focus {
outline: none; border-color: var(--neon-blue);
box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
}
.bonus-input::placeholder { color: var(--text-muted); }
.bonus-label {
display: block; color: var(--neon-blue); font-weight: 700;
margin-bottom: 6px; font-size: 14px; letter-spacing: 0.5px;
}
.bonus-input-group { margin-bottom: 15px; }

/* === BUTTONS PRIMARY === */
.bonus-btn {
font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px;
padding: 12px 24px; background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
border: none; border-radius: 10px; color: var(--bg-dark); cursor: pointer;
transition: all 0.3s ease; letter-spacing: 0.5px; position: relative; overflow: hidden;
}
.bonus-btn::after {
content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
transform: rotate(45deg); transition: left 0.5s ease;
}
.bonus-btn:hover::after { left: 100%; }
.bonus-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4); }
.bonus-btn.danger { background: linear-gradient(135deg, var(--accent-red) 0%, #cc3344 100%); }
.bonus-btn.danger:hover { box-shadow: 0 8px 25px rgba(255, 71, 87, 0.4); }
.bonus-btn.orange { background: linear-gradient(135deg, var(--accent-orange) 0%, #e67e22 100%); }
.bonus-btn.orange:hover { box-shadow: 0 8px 25px rgba(255, 159, 67, 0.4); }
.bonus-btn.scan-active {
background: linear-gradient(135deg, var(--accent-green) 0%, #00cc66 100%);
animation: btnPulse 1s ease-in-out infinite;
}
@keyframes btnPulse { 0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); } 50% { box-shadow: 0 0 40px rgba(0, 255, 136, 0.8); } }

.bonus-button-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }

/* === RESULTS === */
.bonus-result {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 255, 136, 0.05) 100%);
border: 1px solid var(--border-color); border-radius: 12px; padding: 20px;
margin-top: 20px; font-size: 16px; font-weight: 600; line-height: 1.8; color: var(--text-primary);
}
.bonus-angka {
font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent-green); font-size: 1.1em;
}

/* === GALLERY === */
.gallery-container { width: 100%; margin: 20px 0; }
.combined-image-slot {
width: 100%; display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
gap: 15px; padding: 20px;
background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(0, 180, 255, 0.02) 100%);
border: 1px solid var(--border-color); border-radius: 16px; cursor: pointer; transition: all 0.3s ease;
}
.combined-image-slot:hover { border-color: var(--neon-blue); box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); }
.combined-image-slot img {
width: calc(33.333% - 10px); min-width: 250px; max-width: 400px; height: auto;
aspect-ratio: 4/3; object-fit: cover; border-radius: 12px;
border: 2px solid var(--border-color); transition: all 0.3s ease;
box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
}
.combined-image-slot img:hover {
border-color: var(--neon-blue); transform: scale(1.02);
box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
}
.caption-userid {
font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700;
color: var(--neon-cyan); width: 100%; text-align: center; padding: 10px 0; letter-spacing: 2px;
}
.package-info {
font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600;
color: var(--neon-blue); text-align: center; margin-top: 15px;
}

/* === MODES === */
.bonus-mode { animation: fadeIn 0.4s ease-out; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* === SCATTER CARDS === */
.scatter-card {
flex: 1; min-width: 280px;
background: linear-gradient(135deg, rgba(0, 30, 50, 0.8) 0%, rgba(6, 20, 32, 0.6) 100%);
padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); transition: all 0.3s ease;
position: relative; overflow: hidden;
}
.scatter-card::before {
content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
opacity: 0; transition: opacity 0.3s ease;
}
.scatter-card:hover { border-color: var(--neon-blue); box-shadow: 0 5px 25px rgba(0, 212, 255, 0.15); }
.scatter-card:hover::before { opacity: 1; }
.scatter-card-title {
color: var(--neon-cyan); margin: 0 0 12px 0; font-size: 16px;
font-family: 'Orbitron', sans-serif; font-weight: 700;
}

/* === MODALS === */
.modal-overlay {
position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
background: rgba(2, 8, 16, 0.98); z-index: 10000; display: none;
flex-direction: column; justify-content: center; align-items: center; padding: 20px;
animation: modalFadeIn 0.3s ease-out; backdrop-filter: blur(10px);
}
@keyframes modalFadeIn {
from { opacity: 0; backdrop-filter: blur(0); }
to { opacity: 1; backdrop-filter: blur(10px); }
}
.modal-close {
position: absolute; top: 15px; right: 25px; font-size: 40px; color: var(--neon-blue);
background: none; border: none; cursor: pointer; transition: all 0.3s ease; line-height: 1;
}
.modal-close:hover { color: var(--neon-cyan); transform: rotate(90deg); text-shadow: 0 0 20px var(--neon-cyan); }

.zoom-nav-button {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.2) 0%, rgba(0, 180, 255, 0.1) 100%);
border: 1px solid var(--neon-blue); color: var(--neon-cyan);
padding: 15px 25px; border-radius: 10px; cursor: pointer;
font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; transition: all 0.3s ease;
}
.zoom-nav-button:hover { background: rgba(0, 212, 255, 0.3); box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3); }
.zoom-nav-button:disabled { opacity: 0.3; cursor: not-allowed; }

.zoomed-content-wrapper {
display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: center; max-width: 95%;
}
.zoomed-content-wrapper img {
max-width: 30%; min-width: 200px; max-height: 70vh; object-fit: contain;
border-radius: 12px; border: 2px solid var(--neon-blue);
box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); cursor: zoom-in; transition: transform 0.2s ease;
}
.zoomed-content-wrapper img:hover { transform: scale(1.02); }

/* === SCAN MODAL ENHANCED === */
#scanScatter2Modal .modal-content {
display: flex; gap: 20px; max-width: 95vw; width: 100%; height: 85vh;
}
#scanScatter2Modal .image-section {
flex: 1; display: flex; justify-content: center; align-items: center; min-width: 300px;
position: relative; background: var(--bg-input); border-radius: 12px; overflow: hidden;
}
#scanScatter2Modal .image-section img {
max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px;
box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
}
#scanScatter2Modal .result-section {
flex: 1; min-width: 300px; max-width: 500px; overflow-y: auto; padding: 20px;
background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color);
}

/* === SCAN PROGRESS === */
.scan-progress {
position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
width: 80%; height: 4px; background: rgba(0, 212, 255, 0.2); border-radius: 2px; overflow: hidden;
}
.scan-progress-bar {
height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan));
transition: width 0.3s ease; box-shadow: 0 0 10px var(--neon-blue);
}
.scan-status {
position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
background: rgba(6, 20, 32, 0.9); padding: 8px 16px; border-radius: 20px;
border: 1px solid var(--neon-blue); font-size: 13px; font-weight: 600; color: var(--neon-cyan);
display: none;
}
.scan-status.active { display: block; animation: pulseText 1.5s ease-in-out infinite; }
@keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

/* === TOAST === */
.toast {
position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.95) 100%);
border: 1px solid var(--neon-blue); border-radius: 12px; padding: 15px 30px;
color: var(--text-primary); font-family: 'Rajdhani', sans-serif;
font-size: 16px; font-weight: 600; z-index: 99999; opacity: 0;
transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3), 0 0 20px var(--neon-glow);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--accent-green); box-shadow: 0 10px 40px rgba(0, 255, 136, 0.3); }
.toast.error { border-color: var(--accent-red); box-shadow: 0 10px 40px rgba(255, 71, 87, 0.3); }

/* === COPY BUTTONS === */
.copy-btn {
background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
color: var(--bg-dark); border: none; padding: 6px 12px; border-radius: 6px;
cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
transition: all 0.3s ease;
}
.copy-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4); }
.copy-btn.copied { background: var(--accent-green); animation: copiedFlash 0.3s ease; }
@keyframes copiedFlash { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

/* === RESULT ITEMS === */
.result-item {
margin-bottom: 12px; padding: 12px 15px;
background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(0, 180, 255, 0.05) 100%);
border: 1px solid rgba(0, 212, 255, 0.4); border-radius: 10px;
display: flex; justify-content: space-between; align-items: center; gap: 15px;
transition: all 0.3s ease; position: relative; overflow: hidden;
}
.result-item::before {
content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
background: var(--neon-blue); opacity: 0; transition: opacity 0.3s ease;
}
.result-item:hover { border-color: var(--neon-blue); background: rgba(0, 212, 255, 0.2); }
.result-item:hover::before { opacity: 1; }
.result-item.green {
background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(0, 200, 100, 0.05) 100%);
border-color: rgba(0, 255, 136, 0.4);
}
.result-item.green::before { background: var(--accent-green); }
.result-item.green:hover { border-color: var(--accent-green); background: rgba(0, 255, 136, 0.15); }
.result-item span {
word-break: break-all; font-family: 'Orbitron', sans-serif; font-size: 14px; letter-spacing: 1px;
}
.result-confidence {
font-size: 11px; color: var(--text-muted); margin-left: 8px;
background: rgba(0, 212, 255, 0.1); padding: 2px 6px; border-radius: 4px;
}

/* === INPUT WITH BUTTONS === */
.input-with-buttons { display: flex; gap: 8px; align-items: center; }
.input-with-buttons .bonus-input { flex: 1; }
.input-with-buttons .bonus-btn { padding: 8px 12px; font-size: 14px; white-space: nowrap; }

/* === MODAL IMAGES === */
#viewPhotoModal { z-index: 10001; }
#viewPhotoModal img {
max-width: 90%; max-height: 80vh; object-fit: contain; border-radius: 12px;
border: 2px solid var(--neon-blue); box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
}

/* === ACCURACY BADGE === */
.accuracy-badge {
display: inline-flex; align-items: center; gap: 5px;
background: rgba(0, 255, 136, 0.15); border: 1px solid var(--accent-green);
color: var(--accent-green); padding: 4px 10px; border-radius: 20px;
font-size: 12px; font-weight: 600; margin-left: 10px;
}
.accuracy-badge.low { border-color: var(--accent-orange); color: var(--accent-orange); background: rgba(255, 159, 67, 0.15); }
.accuracy-badge.critical { border-color: var(--accent-red); color: var(--accent-red); background: rgba(255, 71, 87, 0.15); }

/* === FILTER OPTIONS === */
.filter-options {
display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; padding: 10px;
background: rgba(0, 212, 255, 0.05); border-radius: 8px; border: 1px solid var(--border-color);
}
.filter-chip {
padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: 600;
background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-muted);
cursor: pointer; transition: all 0.2s ease;
}
.filter-chip.active {
background: var(--neon-blue); color: var(--bg-dark); border-color: var(--neon-blue);
box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
}
.filter-chip:hover { border-color: var(--neon-blue); color: var(--neon-cyan); }

/* === RESPONSIVE === */
@media (max-width: 768px) {
.bonus-section { padding: 15px; margin: 5px; }
.neon-switch-btn { padding: 10px 15px; font-size: 13px; }
.combined-image-slot img { width: 100%; max-width: 100%; min-width: unset; }
.zoomed-content-wrapper img { max-width: 100%; min-width: unset; }
#scanScatter2Modal .modal-content { flex-direction: column; height: auto; }
#scanScatter2Modal .image-section,
#scanScatter2Modal .result-section { min-width: unset; max-width: 100%; width: 100%; }
.input-with-buttons { flex-wrap: wrap; }
.input-with-buttons .bonus-input { width: 100%; }
.input-with-buttons .bonus-btn { flex: 1; min-width: 80px; }
}

/* === FOCUS STATES === */
button:focus-visible, input:focus-visible, textarea:focus-visible {
outline: 2px solid var(--neon-blue); outline-offset: 2px;
}

/* === REDUCED MOTION === */
@media (prefers-reduced-motion: reduce) {
* { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="bg-animated"></div>
<div class="bg-grid"></div>
<div id="particles"></div>
<div id="toast" class="toast"></div>

<!-- ================= TAB CEK BONUS EVENT ================= -->
<div id="cekBonusEventTab" class="tab-content">
<div class="bonus-section">

<script>
// ================= CONFIG & STATE =================
let currentBonusMode = 'bonusAsli';
let currentDataIndex = 1;
let bonusAllPackagesData = [];
let bonusCurrentPackageIndex = 0;
const bonusPackageSize = 3;
let isBonusZoomOpen = false;
let imageList = [];
let currentImageIndex = 0;
let scatterZoomImages = [];
let scatterZoomIndex = 0;
let currentScatterDataIndex = 1;

// OCR Configuration for better accuracy
const OCR_CONFIG = {
lang: 'eng+ind', // Support English + Indonesian
whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz@.,-_:;',
blacklist: '',
preserveWhitespace: true,
rectangle: { left: 0, top: 0, width: 100, height: 100 },
};

// Pattern matching for transaction codes (more accurate)
const CODE_PATTERNS = [
/\b\d{9,12}\b/g, // 9-12 digit numbers (primary)
/\b[A-Z]{2,}\d{6,}\b/gi, // Letters + numbers combo
/\b\d{4}[-\s]?\d{4}[-\s]?\d{4}\b/g, // Formatted numbers
];

// ================= INITIALIZATION =================
function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
container.innerHTML = '';
for (let i = 0; i < 25; i++) {
const particle = document.createElement('div');
particle.className = 'particle';
particle.style.left = Math.random() * 100 + '%';
particle.style.animationDelay = Math.random() * 15 + 's';
particle.style.animationDuration = (15 + Math.random() * 10) + 's';
container.appendChild(particle);
}
}

function showToast(message, type = 'info') {
const toast = document.getElementById('toast');
if (!toast) return;
toast.textContent = message;
toast.className = `toast ${type} show`;
setTimeout(() => toast.classList.remove('show'), 3500);
}

// ================= MODE SWITCHING =================
function switchBonusMode(mode) {
['modeBonusAsli', 'modeGaleri', 'modeInputScatter'].forEach(id => {
const el = document.getElementById(id);
if (el) el.style.display = (id.replace('mode', '').toLowerCase() === mode) ? 'block' : 'none';
});
['bonusAsli', 'galeri', 'inputScatter'].forEach(id => {
const btn = document.getElementById('btn-' + id);
if (btn) btn.classList.toggle('active', id === mode);
});
currentBonusMode = mode;
}

// ================= ENHANCED SCAN FUNCTION =================
async function scanScatter2(index) {
currentDataIndex = index;
const link = document.getElementById('bonusScatter2_' + index).value.trim();
if (!link) { showToast("⚠️ Masukkan link gambar Scatter 2!", "error"); return; }

const img = document.getElementById('scanScatter2Image');
const resultDiv = document.getElementById('scanScatter2Result');
const modal = document.getElementById('scanScatter2Modal');
const overlay = document.getElementById('scanOverlay');
const pulse = document.getElementById('scanPulse');
const status = document.getElementById('scanStatus');
const progressBar = document.getElementById('scanProgressBar');
const scanBtn = document.getElementById('scanBtn' + index);

if (img) img.src = link;
if (modal) modal.style.display = 'flex';
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--text-muted);">🔄 Memuat Tesseract.js...</span>';

// Show scan animation
if (overlay) overlay.style.display = 'block';
if (pulse) { pulse.style.display = 'block'; pulse.style.animation = 'none'; setTimeout(() => pulse.style.animation = 'pulseRing 2s ease-out infinite', 10); }
if (status) { status.textContent = '🔄 Memproses...'; status.classList.add('active'); }
if (progressBar) progressBar.style.width = '0%';
if (scanBtn) { scanBtn.disabled = true; scanBtn.classList.add('scan-active'); scanBtn.innerHTML = '⏳ Scanning...'; }

// Check Tesseract availability
if (typeof Tesseract === 'undefined') {
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--accent-red);">❌ Tesseract.js belum dimuat. Refresh halaman.</span>';
resetScanUI();
return;
}

try {
// Create worker with optimized config
const worker = await Tesseract.createWorker(OCR_CONFIG.lang, {
logger: m => {
if (m.status === 'recognizing text' && progressBar) {
progressBar.style.width = Math.min(100, Math.round(m.progress * 100)) + '%';
if (status) status.textContent = `🔍 OCR: ${Math.round(m.progress * 100)}%`;
}
}
});

// Apply preprocessing hints for better accuracy
await worker.setParameters({
tessedit_char_whitelist: OCR_CONFIG.whitelist,
tessedit_char_blacklist: OCR_CONFIG.blacklist,
preserve_interword_spaces: OCR_CONFIG.preserveWhitespace ? '1' : '0',
});

// Perform recognition
const { data: { text, confidence } } = await worker.recognize(link);
await worker.terminate();

// Hide animation
resetScanUI();

// Process results with enhanced accuracy
processScanResults(text, confidence, resultDiv, index);

} catch (err) {
console.error('Scan error:', err);
resetScanUI();
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--accent-red);">❌ Gagal memindai gambar. Coba lagi.</span>';
showToast("❌ Error saat scan", "error");
}
}

function resetScanUI() {
const overlay = document.getElementById('scanOverlay');
const pulse = document.getElementById('scanPulse');
const status = document.getElementById('scanStatus');
const progressBar = document.getElementById('scanProgressBar');
const scanBtn1 = document.getElementById('scanBtn1');
const scanBtn2 = document.getElementById('scanBtn2');

if (overlay) overlay.style.display = 'none';
if (pulse) { pulse.style.display = 'none'; pulse.style.animation = 'none'; }
if (status) { status.classList.remove('active'); status.textContent = ''; }
if (progressBar) progressBar.style.width = '0%';
[scanBtn1, scanBtn2].forEach(btn => {
if (btn) { btn.disabled = false; btn.classList.remove('scan-active'); btn.innerHTML = '🔍 Scan'; }
});
}

function processScanResults(rawText, confidence, resultDiv, dataIndex) {
if (!resultDiv) return;

// Clean and parse text
const rawLines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 2);
let results = [];
let confidenceScores = [];

// Extract codes using multiple patterns
CODE_PATTERNS.forEach(pattern => {
rawLines.forEach(line => {
const matches = line.match(pattern);
if (matches) {
matches.forEach(match => {
// Clean the match
const cleaned = match.replace(/[^A-Za-z0-9]/g, '');
if (cleaned.length >= 8) {
results.push(cleaned);
// Estimate confidence based on pattern match strength
confidenceScores.push(pattern === CODE_PATTERNS[0] ? 95 : pattern === CODE_PATTERNS[1] ? 85 : 75);
}
});
}
});
});

// Remove duplicates while keeping highest confidence
const uniqueResults = [];
const seen = new Set();
results.forEach((code, idx) => {
if (!seen.has(code)) {
seen.add(code);
uniqueResults.push({ code, confidence: confidenceScores[idx] });
}
});

// Sort by confidence descending
uniqueResults.sort((a, b) => b.confidence - a.confidence);

// Display results
resultDiv.innerHTML = '';

if (uniqueResults.length === 0) {
resultDiv.innerHTML = `
<div style="text-align: center; padding: 20px;">
<span style="color: var(--accent-orange); font-weight: 700;">⚠️ Tidak ditemukan kode valid</span>
<p style="color: var(--text-muted); margin-top: 10px; font-size: 14px;">
Tips: Pastikan gambar jelas, kode terbaca, dan format PNG/JPG
</p>
<button onclick="showManualEdit()" class="neon-switch-btn" style="margin-top: 15px;">✏️ Input Manual</button>
</div>`;
return;
}

// Accuracy badge
const avgConfidence = Math.round(uniqueResults.reduce((sum, r) => sum + r.confidence, 0) / uniqueResults.length);
const accuracyClass = avgConfidence >= 90 ? '' : avgConfidence >= 75 ? 'low' : 'critical';
const accuracyText = avgConfidence >= 90 ? '✅ Akurat' : avgConfidence >= 75 ? '⚠️ Cukup' : '❌ Kurang';

resultDiv.innerHTML = `
<div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
<span style="color: var(--neon-blue); font-weight: 700;">📊 Hasil Scan:</span>
<span class="accuracy-badge ${accuracyClass}">${accuracyText} (${avgConfidence}%)</span>
</div>
`;

// Add result items
uniqueResults.forEach((item, idx) => {
const confClass = item.confidence >= 90 ? 'green' : '';
const confText = item.confidence >= 90 ? '✅' : item.confidence >= 75 ? '⚠️' : '❓';
const div = document.createElement('div');
div.className = `result-item ${confClass}`;
div.innerHTML = `
<span>
${confText} <strong style="font-family: 'Orbitron';">${item.code}</strong>
<span class="result-confidence">${item.confidence}%</span>
</span>
<div style="display:flex; gap:8px;">
<button onclick="copyWithFeedback(this, '${item.code}')" class="copy-btn">📋</button>
<button onclick="pilihKodeTransaksi('${item.code}')" class="copy-btn" style="background: var(--accent-green);">✓ Pilih</button>

}

function copyWithFeedback(btn, text) {
navigator.clipboard.writeText(text).then(() => {
const original = btn.innerHTML;
btn.innerHTML = '✓';
btn.classList.add('copied');
setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 1200);
showToast("📋 Tersalin!", "success");
}).catch(() => showToast("❌ Gagal menyalin", "error"));
}

// ================= COPY FUNCTIONS (unchanged logic) =================
function prosesRekening(rek) {
const parts = rek.split(',').map(p => p.trim());
return { nomor: parts.slice(1).join(',') || '', nama: parts[0] || '' };
}

function getDataAs7Columns(prefix) {
const userid = document.getElementById('bonusUserid' + prefix).value.trim();
const s1 = document.getElementById('bonusScatter1_' + prefix).value.trim();
const s2 = document.getElementById('bonusScatter2_' + prefix).value.trim();
const s3 = document.getElementById('bonusScatter3_' + prefix).value.trim();
const rek = document.getElementById('bonusRekening' + prefix).value.trim();
const kode = document.getElementById('bonusKodeTransaksi' + prefix).value.trim();
let parts = [];
if (userid) parts.push(userid);
if (s1) parts.push(s1); if (s2) parts.push(s2); if (s3) parts.push(s3);
if (rek) { const { nomor, nama } = prosesRekening(rek); if (nomor) parts.push(nomor); if (nama) parts.push(nama); }
if (kode) parts.push(kode);
return parts.join('\t');
}

function copyData1() { const d = getDataAs7Columns('1'); navigator.clipboard.writeText(d||''); showToast(d?"📋 Data 1 disalin!":"⚠️ Data 1 kosong"); }
function copyData2() { const d = getDataAs7Columns('2'); navigator.clipboard.writeText(d||''); showToast(d?"📋 Data 2 disalin!":"⚠️ Data 2 kosong"); }

function copySemuaData() {
const d1 = getDataAs7Columns('1'), d2 = getDataAs7Columns('2');
const lines = [d1, d2].filter(d => d !== '');
const teks = lines.join('\n');
navigator.clipboard.writeText(teks);
showToast(teks ? "📋 Semua data disalin!" : "⚠️ Tidak ada data");
}

function hapusSemuaData() {
['1','2'].forEach(p => {
['bonusUserid','bonusScatter1_','bonusScatter2_','bonusScatter3_','bonusRekening','bonusKodeTransaksi'].forEach(f => {
const el = document.getElementById(f + p); if (el) el.value = '';
});
});
showToast("🗑️ Semua data dihapus");
}

// ================= HITUNG BONUS (unchanged) =================
function hitungBonusEvent() {
const isi = document.getElementById("bonusTextarea").value.trim();
const patokan = parseInt((document.getElementById("bonusPatokan").value||'').replace(/[^\d]/g,''))||0;
const surplus = parseInt((document.getElementById("bonusSurplus").value||'').replace(/[^\d]/g,''))||0;
if(!isi){showToast("⚠️ Tempelkan data dulu");return;}
const lines=isi.split("\n");let total=0,i=0;
while(i<lines.length){
if(lines[i].trim()==='Credit'&&i+1<lines.length){
const m=lines[i+1].trim().match(/IDR\s([\d,]+)/i);
if(m){const a=parseFloat(m[1].replace(/,/g,''));if(!isNaN(a))total+=a;}
}i++;
}
const hasilDiv=document.getElementById("bonusHasil");
if(hasilDiv){
let out='<strong>Total:</strong> <span class="bonus-angka">IDR '+total.toLocaleString("en-US")+'</span>';
if(patokan||surplus){
const pengurang=patokan+surplus,selisih=total-pengurang;
const color=selisih>=0?'var(--accent-green)':'var(--accent-red)';
out+=`<br><strong>Patokan:</strong> <span class="bonus-angka">IDR ${patokan.toLocaleString("en-US")}</span>`;
out+=`<br><strong>Surplus:</strong> <span class="bonus-angka">IDR ${surplus.toLocaleString("en-US")}</span>`;
out+=`<br><strong>Total Dikurang:</strong> <span class="bonus-angka">IDR ${pengurang.toLocaleString("en-US")}</span>`;
out+=`<br><strong>Selisih:</strong> <span class="bonus-angka" style="color:${color}">IDR ${Math.abs(selisih).toLocaleString("en-US")}</span>`;
}
hasilDiv.innerHTML=out;
}
}

function hapusBonusEvent(){
["bonusTextarea","bonusPatokan","bonusSurplus","bonusHasil","imageUrl"].forEach(id=>{
const el=document.getElementById(id);
if(el){if(['TEXTAREA','INPUT'].includes(el.tagName))el.value="";else el.innerHTML="";}
});
showToast("🗑️ Form dibersihkan");
}

// ================= GALERI & ZOOM (unchanged logic with minor tweaks) =================
let bonusInputTimeout;
function handleBonusInput(){clearTimeout(bonusInputTimeout);bonusInputTimeout=setTimeout(loadBonusImages,50);}

function loadBonusImages(){
const inputEl=document.getElementById('bonusLinkInput');if(!inputEl)return;
const input=inputEl.value||'';
const lines=input.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
bonusAllPackagesData=[];
lines.forEach(line=>{
const words=line.split(/\s+/).filter(w=>w.length>0);
const urls=words.filter(w=>/^https?:\/\//.test(w));
const userid=words.length>0&&!/^https?:\/\//.test(words[0])?words[0]:'N/A';
if(urls.length>=1){const links=[...urls.slice(0,bonusPackageSize)];while(links.length<bonusPackageSize)links.push('');bonusAllPackagesData.push({userid,links});}
});
const maxNumEl=document.getElementById('bonusMaxPackageNum');if(maxNumEl)maxNumEl.textContent=bonusAllPackagesData.length;
if(bonusAllPackagesData.length>0){bonusCurrentPackageIndex=Math.max(0,Math.min(bonusCurrentPackageIndex,bonusAllPackagesData.length-1));updateBonusGallery(bonusCurrentPackageIndex);}
else{updateBonusGallery(-1);const cur=document.getElementById('bonusCurrentPackageNum');if(cur)cur.textContent='0';}
}

function updateBonusGallery(index){
const slots=['bonusImgSlot1','bonusImgSlot2','bonusImgSlot3'].map(id=>document.getElementById(id));
const combined=document.getElementById('bonusCombinedImageSlot');
const useridEl=document.getElementById('bonusCombinedSlotUserid');
const currentNumEl=document.getElementById('bonusCurrentPackageNum');
if(index>=0&&index<bonusAllPackagesData.length){
const{userid,links}=bonusAllPackagesData[index];
if(useridEl)useridEl.textContent='👤 '+userid;
if(combined){combined.style.opacity='1';combined.style.pointerEvents='auto';}
slots.forEach((img,i)=>{if(!img)return;img.src=links[i]||"https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=-";img.style.display='inline-block';});
if(currentNumEl)currentNumEl.textContent=index+1;
}else{
if(useridEl)useridEl.textContent='⏳ Belum Ada Data';
if(combined){combined.style.opacity='0.4';combined.style.pointerEvents='none';}
slots.forEach((img,i)=>{if(!img)return;img.src="https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=-";img.style.display='inline-block';});
if(currentNumEl)currentNumEl.textContent='0';
}
}

function navigateBonusPackage(dir){
if(bonusAllPackagesData.length<=1)return;
const total=bonusAllPackagesData.length;
if(dir==='next'&&bonusCurrentPackageIndex<total-1)bonusCurrentPackageIndex++;
else if(dir==='prev'&&bonusCurrentPackageIndex>0)bonusCurrentPackageIndex--;
updateBonusGallery(bonusCurrentPackageIndex);
if(isBonusZoomOpen){const pkg=bonusAllPackagesData[bonusCurrentPackageIndex];updateBonusZoomDisplay(pkg.userid,pkg.links);}
}

function updateBonusZoomDisplay(userid,links){
const wrapper=document.getElementById('bonusZoomedContentWrapper');
const useridEl=document.getElementById('bonusZoomedUserid');
if(!wrapper)return;wrapper.innerHTML='';
links.filter(Boolean).forEach(link=>{
const img=document.createElement('img');img.src=link;
img.style.cssText='max-width:30%;min-width:200px;max-height:70vh;object-fit:contain;border-radius:12px;border:2px solid var(--neon-blue);box-shadow:0 0 30px rgba(0,212,255,0.3);cursor:zoom-in;';
img.onclick=()=>openLightbox(img);wrapper.appendChild(img);
});
if(useridEl)useridEl.textContent=userid;
const prevBtn=document.getElementById('bonusPrevZoomBtn'),nextBtn=document.getElementById('bonusNextZoomBtn');
const idx=bonusCurrentPackageIndex,total=bonusAllPackagesData.length;
if(prevBtn)prevBtn.disabled=(idx<=0);if(nextBtn)nextBtn.disabled=(idx>=total-1);
}

function openBonusZoom(){
if(bonusAllPackagesData.length===0)return;
const current=bonusAllPackagesData[bonusCurrentPackageIndex];
if(!current.links.some(l=>l))return;
isBonusZoomOpen=true;updateBonusZoomDisplay(current.userid,current.links);
const modal=document.getElementById('bonusZoomModal');if(modal)modal.style.display='flex';
}
function closeBonusZoom(){const modal=document.getElementById('bonusZoomModal');if(modal)modal.style.display='none';isBonusZoomOpen=false;}
function clearBonusAllData(){
bonusAllPackagesData=[];const inputEl=document.getElementById('bonusLinkInput');
if(inputEl)inputEl.value='';updateBonusGallery(-1);
const maxNumEl=document.getElementById('bonusMaxPackageNum');if(maxNumEl)maxNumEl.textContent='0';
showToast("🗑️ Data galeri dihapus");
}

// ================= VIEW SCATTER PHOTOS =================
function viewAllScatterPhotos(dataIndex){
currentScatterDataIndex=dataIndex;
const s1=document.getElementById('bonusScatter1_'+dataIndex).value.trim();
const s2=document.getElementById('bonusScatter2_'+dataIndex).value.trim();
const s3=document.getElementById('bonusScatter3_'+dataIndex).value.trim();
scatterZoomImages=[s1,s2,s3].filter(link=>link&&link.startsWith('http'));
if(scatterZoomImages.length===0){showToast("⚠️ Tidak ada link gambar valid!","error");return;}
scatterZoomIndex=0;updateScatterZoomDisplay();
const modal=document.getElementById('scatterZoomModal'),title=document.getElementById('scatterZoomTitle'),caption=document.getElementById('scatterZoomCaption');
if(title)title.textContent=`🖼️ Data ${dataIndex} - ${scatterZoomImages.length} Foto`;
if(caption)caption.textContent=`Klik gambar untuk zoom. Gunakan Prev/Next atau panah keyboard.`;
if(modal)modal.style.display='flex';
}

function updateScatterZoomDisplay(){
const wrapper=document.getElementById('scatterZoomContent');if(!wrapper)return;wrapper.innerHTML='';
scatterZoomImages.forEach((link,idx)=>{
const img=document.createElement('img');img.src=link;img.alt=`Scatter ${idx+1}`;
img.style.cssText='max-width:30%;min-width:200px;max-height:70vh;object-fit:contain;border-radius:12px;border:2px solid var(--neon-blue);box-shadow:0 0 30px rgba(0,212,255,0.3);cursor:zoom-in;';
img.onclick=()=>openLightbox(img);wrapper.appendChild(img);
});
}
function closeScatterZoom(){
const modal=document.getElementById('scatterZoomModal'),wrapper=document.getElementById('scatterZoomContent');
if(modal)modal.style.display='none';if(wrapper)wrapper.innerHTML='';scatterZoomImages=[];scatterZoomIndex=0;
}
function prevScatterImage(){if(scatterZoomImages.length<=1)return;showToast("💡 Klik gambar untuk zoom individual");}
function nextScatterImage(){if(scatterZoomImages.length<=1)return;showToast("💡 Klik gambar untuk zoom individual");}

// ================= LIGHTBOX & ZOOM =================
function closeZoom(){['zoomModal','zoomedImage','imageUrl','kodeHasilZoom'].forEach(id=>{const el=document.getElementById(id);if(el){if(['IMG','INPUT'].includes(el.tagName))el.src=el.value='';else el.innerHTML='';}});}
function openLightbox(imgEl){
imageList=Array.from(document.querySelectorAll("#bonusCombinedImageSlot img, #scatterZoomContent img")).filter(img=>img.style.display!=='none').map(img=>img.src);
currentImageIndex=imageList.indexOf(imgEl.src);
const lbImg=document.getElementById("lightboxImage");if(lbImg)lbImg.src=imgEl.src;
const lbModal=document.getElementById("lightboxModal");if(lbModal)lbModal.style.display='flex';
}
function closeLightbox(){const lbModal=document.getElementById("lightboxModal"),lbImg=document.getElementById("lightboxImage");if(lbModal)lbModal.style.display='none';if(lbImg)lbImg.src='';}
function nextImage(){if(!imageList.length)return;currentImageIndex=(currentImageIndex+1)%imageList.length;const lbImg=document.getElementById("lightboxImage");if(lbImg)lbImg.src=imageList[currentImageIndex];}
function prevImage(){if(!imageList.length)return;currentImageIndex=(currentImageIndex-1+imageList.length)%imageList.length;const lbImg=document.getElementById("lightboxImage");if(lbImg)lbImg.src=imageList[currentImageIndex];}

// ================= KEYBOARD SUPPORT =================
document.addEventListener('keydown',(e)=>{
if(isBonusZoomOpen&&(e.key==='ArrowLeft'||e.key==='ArrowRight')){e.preventDefault();navigateBonusPackage(e.key==='ArrowLeft'?'prev':'next');}
else if(e.key==='Escape'){[closeBonusZoom,closeScatterZoom,closeScanScatter2Modal,closeLightbox].forEach(fn=>fn());}
});

// ================= INIT =================
document.addEventListener('DOMContentLoaded',function(){
createParticles();switchBonusMode('bonusAsli');
// Preload Tesseract for faster scan
if(typeof Tesseract!=='undefined'){Tesseract.createWorker('eng').then(w=>w.terminate()).catch(()=>{});}
});
</script>

/* ✨✨✨ ULTRA MODERN CSS VARIABLES ✨✨✨ */
:root {
/* === NEON COLOR SYSTEM === */
--neon-primary: #00f7ff;
--neon-secondary: #00e5ff;
--neon-accent: #9d4fff;
--neon-highlight: #ff00d4;
--neon-success: #00ff9d;
--neon-warning: #ffd700;
--neon-danger: #ff4757;

/* === GRADIENT SYSTEM === */
--gradient-primary: linear-gradient(135deg, #00f7ff 0%, #00e5ff 25%, #9d4fff 50%, #ff00d4 75%, #00f7ff 100%);
--gradient-glow: linear-gradient(90deg, transparent, rgba(0,247,255,0.6), transparent);
--gradient-card: linear-gradient(145deg, rgba(4,12,32,0.95), rgba(8,24,56,0.9));
--gradient-border: linear-gradient(45deg, #00f7ff, #9d4fff, #ff00d4, #00e5ff);

/* === BACKGROUND SYSTEM === */
--bg-base: #000105;
--bg-surface: rgba(4, 12, 32, 0.94);
--bg-surface-elevated: rgba(8, 24, 56, 0.92);
--bg-glass: rgba(6, 18, 44, 0.75);
--bg-glass-strong: rgba(10, 28, 62, 0.88);
--bg-overlay: rgba(0, 2, 8, 0.97);

/* === TEXT SYSTEM === */
--text-primary: #ffffff;
--text-secondary: #a8d8ff;
--text-tertiary: #6b89b8;
--text-muted: #4a5f8a;
--text-neon: var(--neon-primary);

/* === GLOW & SHADOW SYSTEM === */
--glow-xs: 0 0 10px rgba(0,247,255,0.3);
--glow-sm: 0 0 20px rgba(0,247,255,0.45), 0 0 40px rgba(0,247,255,0.25);
--glow-md: 0 0 35px rgba(0,247,255,0.6), 0 0 70px rgba(0,247,255,0.35), 0 0 120px rgba(0,247,255,0.2);
--glow-lg: 0 0 50px rgba(0,247,255,0.8), 0 0 100px rgba(0,247,255,0.5), 0 0 180px rgba(0,247,255,0.3);
--glow-purple: 0 0 30px rgba(157,79,255,0.6), 0 0 60px rgba(157,79,255,0.35);
--glow-pink: 0 0 30px rgba(255,0,212,0.6), 0 0 60px rgba(255,0,212,0.35);
--shadow-deep: 0 25px 80px rgba(0,0,0,0.6);

/* === BORDER SYSTEM === */
--border-subtle: rgba(0,247,255,0.25);
--border-normal: rgba(0,247,255,0.5);
--border-strong: rgba(0,247,255,0.8);
--border-radius-sm: 10px;
--border-radius-md: 16px;
--border-radius-lg: 24px;
--border-radius-xl: 32px;
--border-radius-full: 9999px;

/* === SPACING SYSTEM === */
--space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
--space-5: 20px; --space-6: 24px; --space-7: 32px; --space-8: 40px;
--space-9: 48px; --space-10: 64px; --space-11: 80px; --space-12: 96px;

/* === ANIMATION SYSTEM === */
--ease-soft: cubic-bezier(0.25, 0.46, 0.45, 0.94);
--ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
--ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
--ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
--ease-spring: cubic-bezier(0.5, 1.2, 0.4, 1);

--duration-fast: 150ms;
--duration-normal: 300ms;
--duration-slow: 500ms;
--duration-slower: 700ms;
--duration-slowest: 1000ms;

--transition-fast: var(--duration-fast) var(--ease-smooth);
--transition-normal: var(--duration-normal) var(--ease-smooth);
--transition-slow: var(--duration-slow) var(--ease-bounce);
--transition-elastic: var(--duration-normal) var(--ease-elastic);

/* === TYPOGRAPHY === */
--font-display: 'Orbitron', system-ui, sans-serif;
--font-body: 'Rajdhani', 'Space Grotesk', system-ui, sans-serif;
--font-mono: 'SF Mono', 'Fira Code', monospace;

--text-xs: 11px; --text-sm: 13px; --text-base: 15px; --text-lg: 18px;
--text-xl: 22px; --text-2xl: 28px; --text-3xl: 36px; --text-4xl: 48px;
--text-5xl: 64px; --text-6xl: 80px;

--leading-tight: 1.25; --leading-normal: 1.5; --leading-relaxed: 1.75;
--tracking-tight: -0.025em; --tracking-normal: 0; --tracking-wide: 0.05em;

/* === LAYER Z-INDEX === */
--z-base: 0; --z-surface: 10; --z-overlay: 20; --z-modal: 30;
--z-dropdown: 40; --z-toast: 50; --z-tooltip: 60; --z-fixed: 100;

/* === CONTAINER QUERIES SUPPORT === */
--container-padding: var(--space-5);
--container-max: 1440px;
}

/* === DARK MODE ENHANCEMENTS === */
@media (prefers-color-scheme: dark) {
:root { color-scheme: dark; }
}

/* === REDUCED MOTION === */
@media (prefers-reduced-motion: reduce) {
*, *::before, *::after {
animation-duration: 0.01ms !important;
animation-iteration-count: 1 !important;
transition-duration: 0.01ms !important;
scroll-behavior: auto !important;
}
}

/* === BASE RESET & FOUNDATION === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
::selection { background: rgba(0,247,255,0.4); color: var(--text-primary); }

html {
scroll-behavior: smooth;
scroll-padding-top: var(--space-8);
-webkit-text-size-adjust: 100%;
}

body {
font-family: var(--font-body);
background: var(--bg-base);
color: var(--text-primary);
min-height: 100vh;
min-height: 100dvh;
overflow-x: hidden;
line-height: var(--leading-normal);
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
text-rendering: optimizeLegibility;
}

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb {
background: var(--gradient-border);

}
::-webkit-scrollbar-thumb:hover {
background: linear-gradient(45deg, var(--neon-secondary), var(--neon-accent));
box-shadow: var(--glow-md);
}

/* === BACKGROUND LAYERS === */
.bg-base {
position: fixed; inset: 0; z-index: -5;
background: 
radial-gradient(1200px 600px at 10% 15%, rgba(0,247,255,0.12) 0%, transparent 60%),
radial-gradient(1000px 500px at 90% 20%, rgba(157,79,255,0.10) 0%, transparent 60%),
radial-gradient(900px 450px at 50% 95%, rgba(255,0,212,0.08) 0%, transparent 65%);
animation: bgDrift 30s ease-in-out infinite alternate;
}
@keyframes bgDrift {
0%,100% { transform: translate(0,0) scale(1); filter: hue-rotate(0deg); }
33% { transform: translate(1.5%,-0.8%) scale(1.03); filter: hue-rotate(12deg); }
66% { transform: translate(-0.8%,1.5%) scale(0.98); filter: hue-rotate(-8deg); }
}

.grid-pattern {

background-image:
linear-gradient(rgba(0,247,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,247,255,0.05) 1px, transparent 1px),
repeating-linear-gradient(45deg, rgba(157,79,255,0.025) 0, rgba(157,79,255,0.025) 1px, transparent 1px, transparent 45px);

animation: gridFlow 35s linear infinite;
}
@keyframes gridFlow {
0% { background-position: 0 0, 0 0, 0 0; }
100% { background-position: 55px 55px, 55px 55px, 130px 130px; }
}

.aurora {

}

animation: auroraWave 40s ease-in-out infinite;
filter: blur(50px); opacity: 0.75;
}
.aurora-wave:nth-child(2) { animation-delay: -15s; animation-duration: 48s; opacity: 0.55; filter: blur(70px); }
@keyframes auroraWave {
0%,100% { transform: translate(0,0) rotate(0deg) scale(1); }
25% { transform: translate(3%,-1.5%) rotate(0.8deg) scale(1.04); }
50% { transform: translate(-1.5%,3%) rotate(-0.5deg) scale(0.97); }
75% { transform: translate(2%,1.5%) rotate(0.3deg) scale(1.02); }
}

.particles { position: fixed; inset: 0; z-index: -2; pointer-events: none; }
.particle {
position: absolute; width: 4px; height: 4px; border-radius: 50%;
opacity: 0; animation: particleLife 28s infinite ease-in-out;
}
.particle.active { opacity: 0.9; }
.particle.cyan { background: var(--neon-primary); box-shadow: 0 0 15px var(--neon-primary), 0 0 30px rgba(0,247,255,0.6); }
.particle.purple { background: var(--neon-accent); box-shadow: 0 0 15px var(--neon-accent), 0 0 30px rgba(157,79,255,0.6); }
.particle.pink { background: var(--neon-highlight); box-shadow: 0 0 15px var(--neon-highlight), 0 0 30px rgba(255,0,212,0.6); }
.particle.green { background: var(--neon-success); box-shadow: 0 0 15px var(--neon-success), 0 0 30px rgba(0,255,157,0.6); }
@keyframes particleLife {
0%,100% { transform: translateY(100vh) rotate(0deg) scale(0.4); opacity: 0; }
12% { opacity: 0.9; }
88% { opacity: 0.9; }
100% { transform: translateY(-100vh) rotate(720deg) scale(1.3); opacity: 0; }
}

.lightning { position: fixed; inset: 0; z-index: -2; pointer-events: none; }
.lightning-bolt {
position: absolute; top: -120vh; width: 3px; height: 240vh;

filter: blur(3px) brightness(1.3); opacity: 0;
animation: lightningStrike 14s infinite;

.lightning-bolt:nth-child(1){left:12%;animation-delay:0s}
.lightning-bolt:nth-child(2){left:50%;animation-delay:5s}
.lightning-bolt:nth-child(3){left:88%;animation-delay:10s}
@keyframes lightningStrike {
0%,86%,88%,90%,100% { opacity:0; transform:scaleY(0.25) translateY(-25%); }
87%,89% { opacity:0.3; transform:scaleY(1) translateY(0); }
}

.scanline {
position: fixed; left:0; right:0; height:4px;
background: linear-gradient(90deg, transparent, var(--neon-primary), var(--neon-accent), var(--neon-highlight), transparent);

z-index: 90; pointer-events: none; filter: blur(1.5px);
box-shadow: 0 0 25px var(--neon-primary);

@keyframes scanMove {
0% { top:-12px; opacity:0; }
6% { opacity:0.45; }
94% { opacity:0.45; }
100% { top:100%; opacity:0; }
}

.noise {

pointer-events: none; animation: noiseShift 0.6s steps(12) infinite;
}
@keyframes noiseShift {
0%,100% { transform: translate(0,0); }
25% { transform: translate(-1.5px,1px); }
50% { transform: translate(2px,-1.5px); }
75% { transform: translate(-1px,-2px); }
}

.vignette {
position: fixed; inset: 0; z-index: -1; pointer-events: none;
background: radial-gradient(ellipse at center, transparent 0%, transparent 50%, rgba(0,2,8,0.7) 100%);
}

/* === CONTAINER & LAYOUT === */
.container {
max-width: var(--container-max);
margin: 0 auto;
padding: var(--space-8) var(--container-padding);
min-height: 100vh;
min-height: 100dvh;
position: relative;
display: flex;
flex-direction: column;
}

/* === HEADER SYSTEM === */
.header {
text-align: center;
margin-bottom: var(--space-10);
animation: headerReveal var(--transition-slow) backwards;
position: relative;
padding-bottom: var(--space-7);
}
.header::after {
content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
width:260px; height:4px; border-radius:2px;
background: var(--gradient-border);
box-shadow: var(--glow-lg);
animation: glowPulse 3.5s ease-in-out infinite;
}
@keyframes headerReveal {
from { opacity:0; transform:translateY(-50px) scale(0.97); }
to { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes glowPulse {
0%,100% { opacity:0.85; box-shadow: var(--glow-lg); }
50% { opacity:1; box-shadow: 0 0 60px rgba(0,247,255,0.95), 0 0 120px rgba(0,247,255,0.65), 0 0 220px rgba(0,247,255,0.4); }
}

.back-btn {
position: fixed; left: var(--space-5); top: var(--space-5);
background: var(--bg-glass);
border: 1px solid var(--border-normal);
color: var(--neon-primary);
padding: 9px 20px;
border-radius: var(--border-radius-full);
text-decoration: none;
font-weight: 700;
font-size: var(--text-xs);
display: flex; align-items: center; gap: 9px;
transition: var(--transition-elastic);
backdrop-filter: blur(18px);
z-index: var(--z-fixed);
box-shadow: var(--glow-sm);
letter-spacing: 0.6px;
cursor: pointer;
}
.back-btn:hover {
background: var(--bg-glass-strong);
transform: translateX(-5px) scale(1.04);
box-shadow: var(--glow-md);
color: var(--bg-base);
border-color: var(--neon-primary);
}
.back-btn:active { transform: translateX(-5px) scale(0.98); }
.back-btn i { font-size: 14px; transition: var(--transition-fast); }
.back-btn:hover i { transform: translateX(-3px); }

/* === TYPOGRAPHY === */
.title {
font-family: var(--font-display);
font-size: clamp(34px, 9vw, 62px);
font-weight: 900;
letter-spacing: 7px;
margin-bottom: 14px;
position: relative;
background: var(--gradient-primary);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 0 0 45px rgba(0,247,255,0.7);
animation: titleShimmer 3.5s ease-in-out infinite, titleFloat 6s ease-in-out infinite;
}
@keyframes titleShimmer {
0%,100% { filter: brightness(1) contrast(1); }
50% { filter: brightness(1.5) contrast(1.08); }
}
@keyframes titleFloat {
0%,100% { transform: translateY(0); }
50% { transform: translateY(-5px); }
}

.subtitle {
font-size: var(--text-sm);
color: var(--text-secondary);
letter-spacing: 8px;
text-transform: uppercase;
margin-bottom: 20px;
font-weight: 600;
text-shadow: 0 0 14px rgba(0,247,255,0.5);
font-family: var(--font-display);
}

.status-badge {
display: inline-flex; align-items: center; gap: 14px;
padding: 9px 26px;
background: rgba(0,255,157,0.18);
border: 1px solid rgba(0,255,157,0.6);
border-radius: var(--border-radius-full);
font-size: var(--text-xs);
font-weight: 700;
color: var(--neon-success);
text-transform: uppercase;
letter-spacing: 3px;
animation: statusPulse 2.4s ease-in-out infinite;
box-shadow: var(--glow-green);
font-family: var(--font-display);
}
@keyframes statusPulse {
0%,100% { box-shadow: 0 0 22px rgba(0,255,157,0.45); }
50% { box-shadow: 0 0 45px rgba(0,255,157,0.8); }
}
.status-dot {
width: 10px; height: 10px; background: var(--neon-success);
border-radius: 50%; animation: dotBeat 1.5s ease-in-out infinite;
box-shadow: 0 0 20px var(--neon-success), 0 0 40px rgba(0,255,157,0.65);
}
@keyframes dotBeat {
0%,100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.7); opacity: 0.85; }
}

/* === NAVIGATION === */
.nav-tabs {
display: flex; gap: 16px; justify-content: center;
margin-bottom: var(--space-7); flex-wrap: wrap;
}
.nav-tab {
padding: 13px 30px;
background: var(--bg-surface);
border: 1px solid var(--border-subtle);
border-radius: var(--border-radius-lg);
color: var(--text-primary);
font-family: var(--font-display);
font-size: var(--text-xs);
font-weight: 700;
cursor: pointer;
transition: all 0.45s var(--ease-smooth);
text-transform: uppercase;
letter-spacing: 2px;
backdrop-filter: blur(16px);
position: relative; overflow: hidden;
display: flex; align-items: center; gap: 9px;
}
.nav-tab::before {
content:''; position:absolute; inset:0;
background: linear-gradient(135deg, rgba(0,247,255,0.24), rgba(157,79,255,0.2), rgba(255,0,212,0.14));
opacity: 0; transition: opacity 0.45s;
}
.nav-tab:hover, .nav-tab.active {
background: var(--bg-surface-elevated);
border-color: var(--neon-primary);
box-shadow: var(--glow-md);
transform: translateY(-5px);
color: var(--neon-primary);
}
.nav-tab:hover::before, .nav-tab.active::before { opacity: 1; }
.nav-tab i { font-size: 15px; }

.section { display: none; animation: sectionFade var(--transition-slow); }
.section.active { display: block; }
@keyframes sectionFade {
from { opacity: 0; transform: translateY(35px); }
to { opacity: 1; transform: translateY(0); }
}

/* === SEARCH === */
.search-container { max-width: 720px; margin: 0 auto var(--space-7); position: relative; }
.search-box {
width: 100%; padding: 18px 60px 18px 26px;
background: var(--bg-surface);
border: 1px solid var(--border-normal);
border-radius: var(--border-radius-lg);
color: var(--text-primary);
font-family: var(--font-body);
font-size: var(--text-base);
transition: all 0.45s var(--ease-smooth);
backdrop-filter: blur(16px);
box-shadow: var(--glow-sm);
}
.search-box:focus {
outline: none; border-color: var(--neon-primary);
box-shadow: var(--glow-md); background: var(--bg-surface-elevated);
}
.search-box::placeholder { color: var(--text-tertiary); }
.search-icon {
position: absolute; right: 22px; top: 50%; transform: translateY(-50%);
color: var(--neon-primary); font-size: 18px; pointer-events: none;
transition: var(--transition-fast);
}
.search-box:focus + .search-icon { color: var(--neon-secondary); }

/* === GALLERY GRID === */
.gallery-section { margin-bottom: var(--space-11); }
.section-title {
font-family: var(--font-display); font-size: var(--text-lg);
font-weight: 700; color: var(--text-primary);
margin-bottom: var(--space-5); padding-bottom: 16px;
border-bottom: 1px solid var(--border-subtle);
display: flex; align-items: center; gap: 16px;
letter-spacing: 3px; position: relative;
}
.section-title::before {
content:''; width:6px; height:26px; border-radius:3px;
background: linear-gradient(180deg, var(--neon-primary), var(--neon-accent), var(--neon-highlight));
box-shadow: 0 0 20px rgba(0,247,255,0.8);
animation: barPulse 2.8s ease-in-out infinite;
}
@keyframes barPulse {
0%,100% { opacity:1; transform:scaleY(1); }
50% { opacity:0.88; transform:scaleY(1.18); }
}

.gallery-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
gap: 24px;
}

/* === ULTRA PREMIUM CARD === */
.photo-card {
background: var(--gradient-card);
border: 1px solid var(--border-subtle);
border-radius: var(--border-radius-lg);
overflow: hidden;
transition: all 0.7s var(--ease-bounce);
position: relative;
backdrop-filter: blur(16px);
animation: cardEnter 0.8s ease forwards;
opacity: 0; transform: translateY(35px);
box-shadow: var(--shadow-deep);
will-change: transform, box-shadow;
contain: layout style paint;
}
.photo-card::before {
content:''; position:absolute; inset:0; z-index:1; pointer-events:none;
background: linear-gradient(135deg, rgba(0,247,255,0.14), transparent 45%, transparent 55%, rgba(157,79,255,0.14));
opacity: 0; transition: opacity 0.55s;
}
.photo-card::after {
content:''; position:absolute; inset:-2px; z-index:0; pointer-events:none;
background: var(--gradient-border); border-radius: inherit;
opacity: 0; transition: opacity 0.55s; filter: blur(24px);
}
.photo-card:hover::before { opacity: 1; }
.photo-card:hover::after { opacity: 0.42; }
.photo-card:hover {
transform: translateY(-10px) scale(1.03);
border-color: var(--neon-primary);
box-shadow: var(--glow-md), 0 30px 70px rgba(0,0,0,0.6);
}
.photo-card:nth-child(n) { animation-delay: calc(0.12s * var(--i, 0)); }
@keyframes cardEnter { to { opacity:1; transform:translateY(0); } }

.photo-wrapper {
position: relative; width: 100%; height: 310px;
background: radial-gradient(circle at center, #102a47 0%, #060f22 100%);
overflow: hidden; display: flex; align-items: center; justify-content: center;
}
.photo-wrapper::before {
content:''; position:absolute; inset:0; z-index:2; pointer-events:none;
background: linear-gradient(180deg, transparent 55%, rgba(0,3,10,0.55) 90%, rgba(0,3,10,0.9));
}
.photo-wrapper::after {
content:''; position:absolute; inset:0; z-index:3; pointer-events:none;
border: 1px solid rgba(0,247,255,0.18); border-radius: inherit;
}
.photo-wrapper img {
width: 100%; height: 100%; object-fit: contain; display: block;
background: transparent; transition: all 0.55s var(--ease-smooth);
filter: drop-shadow(0 7px 24px rgba(0,0,0,0.4));
}
.photo-card:hover .photo-wrapper img {
transform: scale(1.09);
filter: drop-shadow(0 12px 35px rgba(0,247,255,0.5));
}

.photo-info { padding: 20px; position: relative; z-index: 4; }
.photo-info::before {
content:''; position:absolute; top:0; left:22px; right:22px; height:1px;
background: linear-gradient(90deg, transparent, rgba(0,247,255,0.55), rgba(157,79,255,0.55), transparent);
}
.photo-title {
font-family: var(--font-display); font-size: var(--text-sm);
font-weight: 700; color: var(--neon-primary);
margin-bottom: 18px; word-break: break-word; text-align: center;
text-shadow: 0 0 16px rgba(0,247,255,0.7); line-height: var(--leading-tight);
}
.photo-meta {
font-size: var(--text-xs); color: var(--text-tertiary);
text-align: center; margin-bottom: 18px; opacity: 0.94; font-weight: 500;
}

/* === ACTION BUTTONS === */
.action-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; padding-top: 16px; border-top: 1px solid var(--border-subtle); }
.action-btn {
flex: 1; min-width: 82px; max-width: 105px; height: 52px;
background: linear-gradient(135deg, rgba(0,247,255,0.24), rgba(0,247,255,0.16));
border: 1px solid var(--border-normal); border-radius: var(--border-radius-md);
color: var(--neon-primary); font-size: var(--text-xs); font-weight: 700;
cursor: pointer; transition: all 0.4s var(--ease-smooth);
display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
text-transform: uppercase; letter-spacing: 0.8px; backdrop-filter: blur(12px);
position: relative; overflow: hidden; font-family: var(--font-display);
}
.action-btn::before {
content:''; position:absolute; inset:0;
background: linear-gradient(135deg, rgba(0,247,255,0.38), rgba(157,79,255,0.32));
opacity: 0; transition: opacity 0.4s;
}
.action-btn i { font-size: 19px; margin-bottom: 2px; z-index: 1; transition: transform 0.35s; }
.action-btn span { font-size: 9px; font-weight: 700; z-index: 1; }
.action-btn:hover {
background: linear-gradient(135deg, rgba(0,247,255,0.52), rgba(0,247,255,0.42));
border-color: var(--neon-primary); transform: translateY(-6px) scale(1.09);
box-shadow: 0 12px 40px rgba(0,247,255,0.7); color: var(--bg-base);
}
.action-btn:hover::before { opacity: 1; }
.action-btn:hover i { transform: translateY(-3px); }
.action-btn.copy-btn:hover {
background: linear-gradient(135deg, rgba(0,255,157,0.52), rgba(0,230,140,0.42));
border-color: var(--neon-success); box-shadow: 0 12px 40px rgba(0,255,157,0.7);
}
.action-btn.download-btn:hover {
background: linear-gradient(135deg, rgba(0,247,255,0.52), rgba(0,220,255,0.42));
border-color: var(--neon-secondary); box-shadow: 0 12px 40px rgba(0,247,255,0.7);
}

/* === LOADING === */
.loading { display: none; text-align: center; padding: 50px 24px; grid-column: 1/-1; }
.loading.active { display: block; }
.loader {
width: 56px; height: 56px; border: 4px solid rgba(0,247,255,0.28);
border-top-color: var(--neon-primary); border-radius: 50%;
animation: spin 1.1s linear infinite; margin: 0 auto 24px;
box-shadow: var(--glow-md); position: relative;
}
.loader::after { content:''; position:absolute; inset:-7px; border:3px solid transparent; border-top-color: var(--neon-accent); border-radius:50%; animation: spin 1.5s linear infinite reverse; }
.loader::before { content:''; position:absolute; inset:-14px; border:2px solid transparent; border-top-color: var(--neon-highlight); border-radius:50%; animation: spin 2.2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--neon-primary); font-family: var(--font-display); font-size: var(--text-sm); font-weight: 700; letter-spacing: 2.5px; animation: textPulse 2.2s ease-in-out infinite; }
@keyframes textPulse { 0%,100%{opacity:1} 50%{opacity:0.75} }

/* === MODAL === */
.modal-backdrop {
position: fixed; inset: 0; background: var(--bg-overlay);
backdrop-filter: blur(26px); z-index: var(--z-modal);
display: none; align-items: center; justify-content: center;
padding: 26px; animation: modalFade 0.4s ease;
}
.modal-backdrop.active { display: flex; }
@keyframes modalFade { from { opacity:0 } to { opacity:1 } }

.modal-content {
background: var(--bg-surface); border: 1px solid var(--border-normal);
border-radius: var(--border-radius-xl); max-width: 1050px; width: 100%;
max-height: 95vh; overflow: hidden; display: flex; flex-direction: column;
box-shadow: var(--glow-lg), var(--shadow-deep);
animation: modalSlide var(--transition-slow);
}
@keyframes modalSlide {
from { opacity:0; transform:translateY(45px) scale(0.96); }
to { opacity:1; transform:translateY(0) scale(1); }
}

.modal-header {
display: flex; justify-content: space-between; align-items: center;
padding: 20px 28px; border-bottom: 1px solid var(--border-subtle);
background: linear-gradient(90deg, rgba(0,247,255,0.12), transparent, rgba(157,79,255,0.12));
}
.modal-title { font-family: var(--font-display); font-size: var(--text-base); color: var(--neon-primary); font-weight: 700; letter-spacing: 1.2px; }
.modal-close {
width: 42px; height: 42px; background: transparent; border: 1px solid var(--neon-highlight);
border-radius: 50%; color: var(--neon-highlight); font-size: 17px; cursor: pointer;
transition: all 0.4s var(--ease-smooth); display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: var(--neon-highlight); color: var(--bg-base); transform: rotate(90deg) scale(1.14); box-shadow: var(--glow-pink); }

.modal-body {
padding: 28px; text-align: center; overflow-y: auto; flex: 1;
display: flex; flex-direction: column; align-items: center; justify-content: center;
background: radial-gradient(circle at center, #0f2746 0%, #060f23 100%);
}
.modal-body img {
max-width: 100%; max-height: 68vh; width: auto; object-fit: contain;
border-radius: var(--border-radius-md);
box-shadow: 0 0 45px rgba(0,247,255,0.5), 0 14px 55px rgba(0,0,0,0.55);
transition: transform 0.45s var(--ease-smooth);
}
.modal-body img:hover { transform: scale(1.02); }
.modal-actions { margin-top: 24px; display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

/* === TOAST === */
.toast {
position: fixed; bottom: 30px; right: 30px;
background: var(--bg-glass-strong); border: 1px solid var(--neon-primary);
color: var(--neon-primary); padding: 16px 30px; border-radius: var(--border-radius-lg);
font-weight: 700; font-size: var(--text-sm); z-index: var(--z-toast);
display: flex; align-items: center; gap: 13px; box-shadow: var(--glow-md);
transform: translateX(320px); opacity: 0; transition: all 0.55s var(--ease-bounce);
backdrop-filter: blur(18px); font-family: var(--font-display); letter-spacing: 0.6px;
}
.toast.show { transform: translateX(0); opacity: 1; }
.toast i { font-size: 18px; }

/* === RESPONSIVE === */
@media (max-width: 1024px) {
.container { padding: var(--space-6) var(--space-4); }
.gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
.photo-wrapper { height: 270px; }
}
@media (max-width: 768px) {
.container { padding: var(--space-5) var(--space-3); }
.back-btn { left: var(--space-3); top: var(--space-3); padding: 8px 16px; font-size: var(--text-xs); }
.title { font-size: clamp(30px, 10vw, 52px); letter-spacing: 5px; }
.subtitle { font-size: var(--text-xs); letter-spacing: 6px; }
.gallery-grid { grid-template-columns: 1fr; }
.photo-wrapper { height: 290px; }
.photo-title { font-size: var(--text-xs); }
.action-btn { min-width: 72px; max-width: 90px; height: 48px; }
.action-btn i { font-size: 17px; }
.action-btn span { font-size: 8px; }
.nav-tabs { gap: 12px; }
.nav-tab { padding: 11px 24px; font-size: var(--text-xs); }
.modal-content { border-radius: var(--border-radius-lg); }
.modal-body { padding: 22px; }
.toast { bottom: 22px; right: 22px; padding: 14px 26px; font-size: var(--text-xs); }
}
@media (max-width: 480px) {
.title { font-size: clamp(28px, 11vw, 46px); }
.photo-wrapper { height: 250px; }
.action-row { gap: 10px; }
.action-btn { min-width: 68px; height: 46px; }
}

/* === FOCUS & ACCESSIBILITY === */
:focus-visible { outline: 2px solid var(--neon-primary); outline-offset: 3px; box-shadow: 0 0 0 6px rgba(0,247,255,0.28); }
.sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
[aria-hidden="true"] { pointer-events: none; }

/* === UTILITIES === */
.hidden { display: none !important; }
.pointer-none { pointer-events: none; }
</style>
</head>
<body>
<!-- === BACKGROUND SYSTEM === -->
<div class="bg-base"></div>
<div class="grid-pattern"></div>
<div class="aurora"><div class="aurora-wave"></div><div class="aurora-wave"></div></div>
<div class="noise"></div>
<div class="particles" id="particles"></div>
<div class="lightning"><div class="lightning-bolt"></div><div class="lightning-bolt"></div><div class="lightning-bolt"></div></div>
<div class="scanline"></div>
<div class="vignette"></div>

<!-- === BACK BUTTON === -->
<a href="index.html" class="back-btn" aria-label="Kembali ke halaman utama">
<i class="fas fa-arrow-left"></i> <span>Kembali</span>
</a>

<!-- === MAIN CONTAINER === -->
<div class="container">
<header class="header">
<h1 class="title">⚡ ULTRA GALLERY</h1>
<p class="subtitle">LINE TOGEL — Cyber Portal 2026</p>
<div class="status-badge" role="status" aria-live="polite">
<span class="status-dot" aria-hidden="true"></span>
<span>SYSTEM ONLINE</span>
</div>
</header>

<!-- === NAVIGATION === -->
<nav class="nav-tabs" role="tablist">
<button class="nav-tab active" role="tab" aria-selected="true" aria-controls="gallery">
<i class="fas fa-images"></i> Galeri Foto
</button>
</nav>

<!-- === GALLERY SECTION === -->
<section id="gallery" class="section active" role="tabpanel">
<div class="search-container">
<input type="search" class="search-box" id="searchInput" placeholder="🔍 Cari foto berdasarkan judul..." onkeyup="searchPhotos()" aria-label="Cari foto">
<i class="fas fa-search search-icon" aria-hidden="true"></i>
</div>

<div class="loading" id="loading" aria-live="polite">
<div class="loader" role="status"><span class="sr-only">Memuat foto...</span></div>
<div class="loading-text">⚡ LOADING PHOTOS...</div>
</div>

<div class="gallery-grid" id="galleryGrid" role="list"></div>
</section>
</div>

<!-- === MODAL === -->
<div class="modal-backdrop" id="imageModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title" id="modalTitle">Foto Detail</h3>
<button class="modal-close" onclick="closeModal()" aria-label="Tutup modal"><i class="fas fa-times"></i></button>
</div>
<div class="modal-body">
<img src="" alt="" id="modalImage">
<div class="modal-actions">
<button class="action-btn copy-btn" onclick="copyImage()"><i class="fas fa-copy"></i><span>Copy</span></button>
<button class="action-btn download-btn" onclick="downloadModalImage()"><i class="fas fa-download"></i><span>Download</span></button>
</div>
</div>
</div>
</div>

<!-- === TOAST === -->
<div id="toast" class="toast" role="alert" aria-live="assertive">
<i class="fas fa-bolt" aria-hidden="true"></i>
<span id="toastText">Berhasil!</span>
</div>

<!-- === JAVASCRIPT === -->
<script>
const State = { photos: [], currentUrl: '', currentTitle: '' };
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// === INIT ===
document.addEventListener('DOMContentLoaded', () => {
initParticles(); fetchPhotos(); initKeyboard(); initOnline();
});

// === PARTICLES ===
function initParticles() {
const c = $('#particles'); if (!c) return;
const colors = ['cyan','purple','pink','green'];
for(let i=0;i<80;i++) {
const p = document.createElement('div');
p.className = `particle ${colors[i%4]}`;
p.style.left = Math.random()*100+'%';
p.style.top = Math.random()*100+'%';
p.style.animationDelay = Math.random()*35+'s';
p.style.animationDuration = (22+Math.random()*35)+'s';
setTimeout(()=>p.classList.add('active'), Math.random()*2500);
c.appendChild(p);
}
}

// === FETCH PHOTOS ===
async function fetchPhotos() {
$('#loading').classList.add('active');
$('#galleryGrid').innerHTML = '';
try {
const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';
let photos = [];
try {
const r = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
const t = await r.text();
const j = JSON.parse(t.substring(47).slice(0,-2));
photos = j.table.rows.filter(row=>row.c?.[0]?.v && row.c?.[1]?.v).map((row,i)=>({
judul: row.c[0].v, foto: row.c[1].v, index: i+2 }));
} catch {
const csv = await (await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
photos = csv.split('\n').map(r=>r.split(',')).filter(r=>r[0]?.trim()&&r[1]?.trim()).map((r,i)=>({
judul: r[0].replace(/"/g,'').trim(), foto: r[1].replace(/"/g,'').trim(), index: i+2 }));
}
State.photos = photos; renderGallery(photos);
showToast(`⚡ ${photos.length} foto dimuat`);
} catch(e) {
console.error(e); showToast('❗ Gagal memuat foto');
$('#galleryGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:65px;color:var(--text-tertiary)">
<i class="fas fa-exclamation-triangle" style="font-size:56px;color:var(--neon-danger);margin-bottom:22px;text-shadow:0 0 28px rgba(255,71,87,0.65)"></i>
<h3 style="font-family:var(--font-display);color:var(--neon-primary);margin-bottom:14px">Gagal Memuat</h3>
<p>Periksa koneksi atau publikasi Google Sheets</p>
</div>`;
}
$('#loading').classList.remove('active');
}

// === RENDER ===
function renderGallery(photos) {
const g = $('#galleryGrid'); g.innerHTML = '';
if (!photos.length) {
g.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:65px;color:var(--text-tertiary)">
<i class="fas fa-search" style="font-size:56px;margin-bottom:22px;opacity:0.65"></i>
<h3 style="font-family:var(--font-display);color:var(--neon-primary);margin-bottom:14px">Tidak Ditemukan</h3>
<p>Coba kata kunci lain</p>
</div>`; return;
}
photos.forEach((p,i) => g.appendChild(createCard(p.foto, p.judul, i)));
}

// === CARD ===
function createCard(url, title, idx) {
const card = document.createElement('div');
card.className = 'photo-card'; card.style.setProperty('--i', idx);
card.setAttribute('role','listitem');
card.innerHTML = `
<div class="photo-wrapper">
<img src="${url}" alt="${title}" loading="lazy"
onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00f7ff?text=No+Image'"
onclick="viewFullImage('${url}', '${title.replace(/'/g,"\\'")}')" style="cursor:pointer">
</div>
<div class="photo-info">
<div class="photo-title">${title}</div>
<div class="photo-meta">Foto #${idx+1}</div>
<div class="action-row">
<button class="action-btn copy-btn" onclick="copyPhoto('${url}')" title="Salin" aria-label="Salin ${title}">
<i class="fas fa-copy"></i><span>Copy</span>
</button>
<button class="action-btn download-btn" onclick="downloadPhoto('${url}', '${title.replace(/'/g,"\\'")}')" title="Download" aria-label="Download ${title}">
<i class="fas fa-download"></i><span>Download</span>
</button>
</div>
</div>`;
return card;
}

// === SEARCH ===
function searchPhotos() {
const term = $('#searchInput').value.toLowerCase().trim();
const filtered = !term ? State.photos : State.photos.filter(p => p.judul.toLowerCase().includes(term));
renderGallery(filtered);
if (filtered.length) showToast(`⚡ ${filtered.length} hasil`);
}

// === MODAL ===
function viewFullImage(url, title) {
State.currentUrl = url; State.currentTitle = title;
$('#modalTitle').textContent = title;
$('#modalImage').src = url; $('#modalImage').alt = title;
$('#imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
}
function closeModal() {
$('#imageModal').classList.remove('active');
document.body.style.overflow = '';
State.currentUrl = State.currentTitle = '';
}

// === COPY/DOWNLOAD ===
async function copyPhoto(url) {
try {
const blob = await (await fetch(url)).blob();
await navigator.clipboard.write([new ClipboardItem({[blob.type]: blob})]);
showToast('✅ Disalin ke clipboard!');
} catch { showToast('❗ Klik kanan gambar > Copy Image'); }
}
async function copyImage() { if (State.currentUrl) await copyPhoto(State.currentUrl); }
function downloadPhoto(url, filename) {
const a = document.createElement('a');
a.href = url; a.download = `${filename.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`;
a.target = '_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
showToast('⚡ Download dimulai...');
}
function downloadModalImage() { if (State.currentUrl) downloadPhoto(State.currentUrl, State.currentTitle); }

// === TOAST ===
function showToast(msg) {
const t = $('#toast'); $('#toastText').textContent = msg;
t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 4200);
}

// === KEYBOARD ===
function initKeyboard() {
document.addEventListener('keydown', e => {
if (e.key === 'Escape') closeModal();
if (e.ctrlKey && e.key === 'k') { e.preventDefault(); $('#searchInput')?.focus(); }
});
$('#imageModal')?.addEventListener('click', e => { if (e.target.id === 'imageModal') closeModal(); });
}

// === ONLINE DETECTION ===
function initOnline() {
window.addEventListener('online', () => showToast('🌐 Online'));
window.addEventListener('offline', () => showToast('⚠️ Offline'));
}
</script>
</body>
</html>

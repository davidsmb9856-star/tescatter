<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00f5ff">
<meta name="description" content="FOTO GALLERY - LINE TOGEL Cyber Portal 2026">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  /* Neon Color Palette - Enhanced */
  --neon-blue: #00d4ff;
  --neon-cyan: #00ffff;
  --neon-electric: #00f5ff;
  --neon-purple: #7b2fff;
  --neon-pink: #ff00aa;
  --neon-gold: #ffd700;
  --neon-green: #00ff9d;
  --neon-orange: #ff6b35;
  
  /* Background Colors - Deeper & Richer */
  --bg-deep: #010204;
  --bg-surface: rgba(3, 8, 20, 0.92);
  --bg-elevated: rgba(6, 18, 42, 0.88);
  --bg-glass: rgba(4, 12, 30, 0.75);
  --bg-glass-strong: rgba(8, 24, 55, 0.85);
  
  /* Text Colors */
  --text-primary: #ffffff;
  --text-secondary: #9db4f0;
  --text-dim: #5a6b94;
  --text-glow: rgba(0, 245, 255, 0.8);
  
  /* Borders & Glows */
  --border-glow: rgba(0, 212, 255, 0.55);
  --border-glow-strong: rgba(0, 245, 255, 0.75);
  --glow-blue: 0 0 12px rgba(0, 212, 255, 0.5), 0 0 28px rgba(0, 212, 255, 0.35), 0 0 55px rgba(0, 212, 255, 0.15);
  --glow-electric: 0 0 18px rgba(0, 245, 255, 0.65), 0 0 42px rgba(0, 245, 255, 0.45), 0 0 85px rgba(0, 245, 255, 0.2);
  --glow-purple: 0 0 15px rgba(123, 47, 255, 0.55), 0 0 35px rgba(123, 47, 255, 0.3);
  --glow-pink: 0 0 15px rgba(255, 0, 170, 0.55), 0 0 35px rgba(255, 0, 170, 0.3);
  --glow-green: 0 0 15px rgba(0, 255, 157, 0.55), 0 0 35px rgba(0, 255, 157, 0.3);
  
  /* Transitions - Smoother & Bloom Effect */
  --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  --transition-bloom: 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-elastic: 0.45s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  
  /* Border Radius */
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --radius-full: 9999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 20px; }
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.65;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== BACKGROUND EFFECTS - ENHANCED ===== */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: -3;
  background:
    radial-gradient(ellipse at 15% 25%, rgba(0, 212, 255, 0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 20%, rgba(0, 245, 255, 0.15) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 90%, rgba(123, 47, 255, 0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 30% 75%, rgba(255, 0, 170, 0.08) 0%, transparent 60%);
  animation: bgPulse 18s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0%, 100% { opacity: 1; filter: hue-rotate(0deg) brightness(1); }
  50% { opacity: 0.95; filter: hue-rotate(12deg) brightness(1.05); }
}

.grid-overlay {
  position: fixed;
  inset: 0;
  z-index: -2;
  background-image:
    linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
  background-size: 45px 45px;
  mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, black 25%, transparent 80%);
  animation: gridMove 35s linear infinite;
  opacity: 0.9;
}
@keyframes gridMove {
  0% { background-position: 0 0; }
  100% { background-position: 45px 45px; }
}

/* Lightning Effect - More Dynamic */
.lightning-overlay {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  opacity: 0;
  animation: lightningFlash 10s infinite;
}
@keyframes lightningFlash {
  0%, 88%, 90%, 92%, 94%, 100% { opacity: 0; }
  89%, 91%, 93% { opacity: 0.12; }
}
.lightning-bolt {
  position: absolute;
  width: 3px;
  height: 100vh;
  background: linear-gradient(180deg, 
    transparent 0%, 
    var(--neon-electric) 20%, 
    var(--neon-blue) 50%, 
    var(--neon-purple) 80%, 
    transparent 100%);
  filter: blur(1.5px) drop-shadow(0 0 8px var(--neon-electric));
  animation: lightningStrike 10s infinite;
  opacity: 0;
}
.lightning-bolt:nth-child(1) { left: 12%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 48%; animation-delay: 2.5s; }
.lightning-bolt:nth-child(3) { left: 82%; animation-delay: 5s; }
@keyframes lightningStrike {
  0%, 87%, 89%, 91%, 93%, 100% { transform: scaleY(0); opacity: 0; }
  88%, 90%, 92% { transform: scaleY(1); opacity: 1; }
}

/* Particles - More Vibrant */
.particles {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--neon-electric);
  border-radius: 50%;
  opacity: 0;
  animation: particleFloat 22s infinite ease-in-out;
  box-shadow: 0 0 12px var(--neon-electric), 0 0 25px var(--neon-blue);
}
.particle:nth-child(2n) {
  background: var(--neon-cyan);
  box-shadow: 0 0 15px var(--neon-cyan), 0 0 30px var(--neon-electric);
  animation-delay: -7s;
  animation-duration: 28s;
}
.particle:nth-child(3n) {
  background: var(--neon-purple);
  box-shadow: 0 0 12px var(--neon-purple), 0 0 25px var(--neon-pink);
  animation-delay: -14s;
  animation-duration: 32s;
}
.particle:nth-child(4n) {
  background: var(--neon-green);
  box-shadow: 0 0 10px var(--neon-green);
  animation-delay: -3s;
  animation-duration: 25s;
}
@keyframes particleFloat {
  0%, 100% { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity: 0; }
  8% { opacity: 0.85; }
  92% { opacity: 0.85; }
  100% { transform: translateY(-110vh) rotate(720deg) scale(1); opacity: 0; }
}

/* Scanline - Enhanced */
.scanline {
  position: fixed;
  left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, 
    transparent, 
    var(--neon-electric), 
    var(--neon-blue), 
    var(--neon-purple), 
    transparent);
  opacity: 0.5;
  animation: scanLine 7s linear infinite;
  z-index: 50;
  pointer-events: none;
  filter: blur(0.8px);
  box-shadow: 0 0 20px var(--neon-electric);
}
@keyframes scanLine {
  0% { top: -5px; opacity: 0; }
  3% { opacity: 0.5; }
  97% { opacity: 0.5; }
  100% { top: 100%; opacity: 0; }
}

/* Noise Texture */
.noise {
  position: fixed;
  inset: 0;
  z-index: -1;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  pointer-events: none;
  animation: noiseShift 2s steps(2) infinite;
}
@keyframes noiseShift {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(-1px, 1px); }
  50% { transform: translate(1px, -1px); }
  75% { transform: translate(-1px, -1px); }
}

/* ===== LAYOUT ===== */
.container {
  max-width: 1450px;
  margin: 0 auto;
  padding: 28px 22px;
  min-height: 100vh;
  position: relative;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  margin-bottom: 32px;
  animation: headerEntrance 1s var(--transition-bloom) backwards;
  position: relative;
}
@keyframes headerEntrance {
  from { opacity: 0; transform: translateY(-40px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.back-btn {
  position: fixed;
  left: 22px; top: 22px;
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid var(--neon-blue);
  color: var(--neon-electric);
  padding: 7px 16px;
  border-radius: var(--radius-full);
  text-decoration: none;
  font-weight: 700;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: var(--transition-smooth);
  backdrop-filter: blur(12px);
  z-index: 1000;
  pointer-events: auto;
  box-shadow: var(--glow-blue);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.back-btn:hover {
  background: rgba(0, 212, 255, 0.28);
  transform: translateX(-4px) scale(1.03);
  box-shadow: var(--glow-electric);
  color: var(--bg-deep);
}
.back-btn i { font-size: 12px; }

.title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(30px, 7vw, 52px);
  font-weight: 900;
  letter-spacing: 5px;
  margin-bottom: 10px;
  position: relative;
  background: linear-gradient(135deg, 
    var(--neon-electric) 0%, 
    var(--neon-blue) 30%, 
    #ffffff 50%, 
    var(--neon-blue) 70%, 
    var(--neon-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 35px rgba(0, 212, 255, 0.6);
  animation: titleShimmer 3.5s ease-in-out infinite, titleGlow 2s ease-in-out infinite alternate;
}
@keyframes titleShimmer {
  0%, 100% { filter: brightness(1); background-position: 0% 50%; }
  50% { filter: brightness(1.35); background-position: 100% 50%; }
}
@keyframes titleGlow {
  from { text-shadow: 0 0 35px rgba(0, 212, 255, 0.6); }
  to { text-shadow: 0 0 55px rgba(0, 245, 255, 0.85), 0 0 85px rgba(123, 47, 255, 0.5); }
}

.subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 16px;
  font-weight: 500;
  opacity: 0.95;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  padding: 7px 18px;
  background: rgba(0, 255, 157, 0.1);
  border: 1px solid rgba(0, 255, 157, 0.45);
  border-radius: var(--radius-full);
  font-size: 10px;
  font-weight: 700;
  color: var(--neon-green);
  text-transform: uppercase;
  letter-spacing: 2.5px;
  animation: statusPulse 2.8s ease-in-out infinite;
  box-shadow: 0 0 18px rgba(0, 255, 157, 0.3);
  backdrop-filter: blur(8px);
}
@keyframes statusPulse {
  0%, 100% { box-shadow: 0 0 18px rgba(0, 255, 157, 0.3); border-color: rgba(0, 255, 157, 0.45); }
  50% { box-shadow: 0 0 32px rgba(0, 255, 157, 0.65); border-color: rgba(0, 255, 157, 0.75); }
}
.status-dot {
  width: 7px; height: 7px;
  background: var(--neon-green);
  border-radius: 50%;
  animation: dotBeat 1.4s ease-in-out infinite;
  box-shadow: 0 0 12px var(--neon-green), 0 0 25px rgba(0, 255, 157, 0.5);
}
@keyframes dotBeat {
  0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 12px var(--neon-green); }
  50% { transform: scale(1.5); opacity: 0.85; box-shadow: 0 0 22px var(--neon-green), 0 0 40px rgba(0, 255, 157, 0.7); }
}

/* ===== NAVIGATION TABS ===== */
.nav-tabs {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 28px;
  flex-wrap: wrap;
  padding: 4px;
  background: var(--bg-glass);
  border-radius: var(--radius-full);
  border: 1px solid var(--border-glow);
  max-width: fit-content;
  margin-left: auto;
  margin-right: auto;
  backdrop-filter: blur(15px);
  box-shadow: var(--glow-blue);
}
.nav-tab {
  padding: 11px 26px;
  background: transparent;
  border: none;
  border-radius: var(--radius-full);
  color: var(--text-secondary);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition-smooth);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  position: relative;
  display: flex;
  align-items: center;
  gap: 7px;
}
.nav-tab::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-full);
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 245, 255, 0.1));
  opacity: 0;
  transition: var(--transition-fast);
  z-index: -1;
}
.nav-tab:hover {
  color: var(--neon-electric);
  transform: translateY(-2px);
}
.nav-tab:hover::before { opacity: 1; }
.nav-tab.active {
  color: var(--bg-deep);
  background: linear-gradient(135deg, var(--neon-electric), var(--neon-blue));
  box-shadow: var(--glow-electric);
  transform: translateY(-2px);
}
.nav-tab.active::before { opacity: 0; }
.nav-tab i { font-size: 12px; }

.section { display: none; animation: fadeIn 0.45s var(--transition-bloom) forwards; }
.section.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(25px) scale(0.99); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ===== SEARCH BOX ===== */
.search-container {
  max-width: 620px;
  margin: 0 auto 28px;
}
.search-box {
  width: 100%;
  padding: 14px 50px 14px 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-lg);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  transition: var(--transition-smooth);
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.search-box:focus {
  outline: none;
  border-color: var(--neon-electric);
  box-shadow: var(--glow-electric), 0 8px 35px rgba(0, 0, 0, 0.4);
  transform: translateY(-1px);
}
.search-box::placeholder { color: var(--text-dim); }

/* ===== GALLERY SECTION ===== */
.gallery-section {
  margin-bottom: 38px;
  animation: sectionReveal 0.75s var(--transition-bloom) backwards;
}
@keyframes sectionReveal {
  from { opacity: 0; transform: translateY(45px); }
  to { opacity: 1; transform: translateY(0); }
}
.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-glow);
  display: flex;
  align-items: center;
  gap: 11px;
  letter-spacing: 2.5px;
  position: relative;
  text-transform: uppercase;
}
.section-title::before {
  content: '';
  width: 5px; height: 20px;
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue));
  border-radius: 3px;
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.7);
  animation: pulseBar 2s ease-in-out infinite;
}
@keyframes pulseBar {
  0%, 100% { opacity: 1; box-shadow: 0 0 12px rgba(0, 245, 255, 0.7); }
  50% { opacity: 0.85; box-shadow: 0 0 22px rgba(0, 245, 255, 1); }
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 18px;
}

/* ===== PHOTO CARD - ENHANCED ===== */
.photo-card {
  background: var(--bg-surface);
  border: 1px solid rgba(0, 212, 255, 0.3);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: var(--transition-bloom);
  position: relative;
  backdrop-filter: blur(14px);
  animation: cardEnter 0.5s ease forwards;
  opacity: 0;
  transform: translateY(22px);
  box-shadow: 0 5px 25px rgba(0, 0, 0, 0.35);
}
.photo-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, 
    rgba(0, 212, 255, 0.08) 0%, 
    transparent 50%, 
    rgba(123, 47, 255, 0.08) 100%);
  opacity: 0;
  transition: var(--transition-fast);
  pointer-events: none;
  z-index: 1;
}
.photo-card:hover::before { opacity: 1; }
.photo-card:nth-child(1) { animation-delay: 0.08s; }
.photo-card:nth-child(2) { animation-delay: 0.12s; }
.photo-card:nth-child(3) { animation-delay: 0.16s; }
.photo-card:nth-child(4) { animation-delay: 0.2s; }
.photo-card:nth-child(5) { animation-delay: 0.24s; }
.photo-card:nth-child(n+6) { animation-delay: 0.28s; }
@keyframes cardEnter {
  to { opacity: 1; transform: translateY(0); }
}
.photo-card:hover {
  transform: translateY(-6px) scale(1.015);
  border-color: var(--neon-electric);
  box-shadow: var(--glow-electric), 0 20px 50px rgba(0, 0, 0, 0.5);
  z-index: 10;
}

.photo-wrapper {
  position: relative;
  width: 100%;
  height: 290px;
  background: radial-gradient(circle at center, #0e2539 0%, #050d1a 100%);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid rgba(0, 212, 255, 0.15);
}
.photo-wrapper::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, 
    transparent 0%, 
    rgba(0, 212, 255, 0.05) 50%, 
    transparent 100%);
  pointer-events: none;
}
.photo-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  padding: 8px;
  background: transparent;
  transition: transform 0.4s var(--transition-bloom), filter 0.3s;
}
.photo-card:hover .photo-wrapper img {
  transform: scale(1.06);
  filter: brightness(1.05) contrast(1.03);
}

.photo-info {
  padding: 16px 14px 14px;
  position: relative;
  z-index: 2;
}
.photo-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--neon-electric);
  margin-bottom: 10px;
  word-break: break-word;
  text-align: center;
  text-shadow: 0 0 12px rgba(0, 245, 255, 0.6);
  line-height: 1.3;
  min-height: 42px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.photo-meta {
  font-size: 10px;
  color: var(--text-secondary);
  text-align: center;
  margin-bottom: 14px;
  opacity: 0.85;
  letter-spacing: 0.5px;
}

/* ===== ACTION BUTTONS ROW - ENHANCED ===== */
.action-buttons-row {
  display: flex;
  gap: 9px;
  justify-content: center;
  flex-wrap: wrap;
  padding-top: 12px;
  border-top: 1px solid rgba(0, 212, 255, 0.25);
}
.action-btn-cool {
  flex: 1;
  min-width: 72px;
  max-width: 95px;
  height: 46px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.12) 0%, rgba(0, 245, 255, 0.08) 100%);
  border: 1px solid rgba(0, 212, 255, 0.45);
  border-radius: var(--radius-md);
  color: var(--neon-electric);
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition-elastic);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
}
.action-btn-cool::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, 
    rgba(0, 212, 255, 0.25), 
    rgba(0, 245, 255, 0.18));
  opacity: 0;
  transition: var(--transition-fast);
  z-index: -1;
}
.action-btn-cool i {
  font-size: 17px;
  margin-bottom: 2px;
  transition: var(--transition-fast);
  text-shadow: 0 0 8px currentColor;
}
.action-btn-cool span {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.3px;
}
.action-btn-cool:hover {
  transform: translateY(-4px) scale(1.06);
  border-color: var(--neon-electric);
  box-shadow: 0 6px 25px rgba(0, 245, 255, 0.55);
  color: var(--bg-deep);
}
.action-btn-cool:hover::before { opacity: 1; }
.action-btn-cool:hover i { transform: scale(1.15); }

/* Color variants for buttons */
.action-btn-cool.copy-btn:hover {
  background: linear-gradient(135deg, rgba(0, 255, 157, 0.3) 0%, rgba(0, 200, 100, 0.22) 100%);
  border-color: var(--neon-green);
  box-shadow: 0 6px 25px rgba(0, 255, 157, 0.55);
  color: var(--bg-deep);
}
.action-btn-cool.download-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.32) 0%, rgba(0, 180, 255, 0.24) 100%);
  border-color: var(--neon-blue);
  box-shadow: 0 6px 25px rgba(0, 212, 255, 0.55);
  color: var(--bg-deep);
}
.action-btn-cool.edit-btn:hover {
  background: linear-gradient(135deg, rgba(255, 0, 170, 0.32) 0%, rgba(255, 100, 170, 0.24) 100%);
  border-color: var(--neon-pink);
  box-shadow: 0 6px 25px rgba(255, 0, 170, 0.55);
  color: var(--bg-deep);
}

/* ===== EDITOR SECTION ===== */
.editor-container {
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-xl);
  padding: 22px;
  margin-bottom: 22px;
  box-shadow: var(--glow-blue), 0 10px 40px rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(16px);
}
.editor-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(0, 212, 255, 0.35);
}
.editor-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 17px;
  color: var(--neon-electric);
  display: flex;
  align-items: center;
  gap: 9px;
  text-shadow: 0 0 15px rgba(0, 245, 255, 0.5);
}

.upload-area {
  border: 2.5px dashed var(--border-glow);
  border-radius: var(--radius-lg);
  padding: 45px 28px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition-smooth);
  margin-bottom: 22px;
  background: rgba(0, 212, 255, 0.03);
  position: relative;
  overflow: hidden;
}
.upload-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, 
    rgba(0, 212, 255, 0.08), 
    transparent 50%, 
    rgba(123, 47, 255, 0.08));
  opacity: 0;
  transition: var(--transition-fast);
}
.upload-area:hover {
  border-color: var(--neon-electric);
  background: rgba(0, 212, 255, 0.06);
  transform: translateY(-2px);
  box-shadow: var(--glow-blue);
}
.upload-area:hover::before { opacity: 1; }
.upload-icon {
  font-size: 48px;
  color: var(--neon-electric);
  margin-bottom: 16px;
  animation: floatIcon 3s ease-in-out infinite;
  text-shadow: 0 0 20px rgba(0, 245, 255, 0.6);
}
@keyframes floatIcon {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.upload-text {
  font-size: 15px;
  color: var(--text-primary);
  margin-bottom: 8px;
  font-weight: 600;
}
.upload-hint {
  font-size: 11px;
  color: var(--text-secondary);
  opacity: 0.8;
}

.canvas-wrapper {
  position: relative;
  background: var(--bg-elevated);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 20px;
  overflow: auto;
  max-height: 62vh;
  border: 1px solid rgba(0, 212, 255, 0.2);
  box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.3);
}
#mainCanvas {
  max-width: 100%;
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-md);
  background: #ffffff;
  display: block;
  margin: 0 auto;
  box-shadow: 0 5px 25px rgba(0, 0, 0, 0.4);
}

.tools-panel {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}
.tool-group {
  background: var(--bg-elevated);
  border: 1px solid rgba(0, 212, 255, 0.25);
  border-radius: var(--radius-lg);
  padding: 16px;
  transition: var(--transition-smooth);
}
.tool-group:hover {
  border-color: var(--neon-electric);
  box-shadow: var(--glow-blue);
  transform: translateY(-2px);
}
.tool-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: var(--neon-electric);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  display: flex;
  align-items: center;
  gap: 7px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(0, 212, 255, 0.2);
}
.tool-btn {
  width: 100%;
  padding: 9px 14px;
  margin-bottom: 8px;
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition-smooth);
  display: flex;
  align-items: center;
  gap: 8px;
  text-align: left;
  position: relative;
  overflow: hidden;
}
.tool-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue));
  opacity: 0;
  transition: var(--transition-fast);
}
.tool-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.28), rgba(0, 245, 255, 0.18));
  border-color: var(--neon-electric);
  transform: translateX(4px);
  box-shadow: 0 4px 18px rgba(0, 245, 255, 0.3);
}
.tool-btn:hover::before { opacity: 1; }
.tool-btn.active {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric));
  color: var(--bg-deep);
  border-color: transparent;
  box-shadow: var(--glow-electric);
}
.tool-btn.active::before { opacity: 1; background: var(--bg-deep); }
.tool-btn i { font-size: 13px; width: 16px; text-align: center; }

input[type="range"] {
  width: 100%;
  height: 5px;
  background: linear-gradient(90deg, var(--bg-deep), rgba(0, 212, 255, 0.3));
  border-radius: 3px;
  outline: none;
  -webkit-appearance: none;
  margin: 8px 0 14px;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  background: var(--neon-electric);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.7), 0 0 25px rgba(0, 245, 255, 0.4);
  border: 2px solid var(--bg-deep);
  transition: var(--transition-fast);
}
input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.15);
  box-shadow: 0 0 18px rgba(0, 245, 255, 0.9), 0 0 35px rgba(0, 245, 255, 0.6);
}

.color-picker {
  width: 100%;
  height: 38px;
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-md);
  cursor: pointer;
  background: var(--bg-deep);
  padding: 3px;
  transition: var(--transition-fast);
}
.color-picker:hover {
  border-color: var(--neon-electric);
  box-shadow: var(--glow-blue);
}

.input-field {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-deep);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  margin-bottom: 9px;
  transition: var(--transition-fast);
}
.input-field:focus {
  outline: none;
  border-color: var(--neon-electric);
  box-shadow: var(--glow-blue);
}

/* ===== ACTION BUTTONS ===== */
.action-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 8px;
}
.btn {
  padding: 12px 26px;
  border-radius: var(--radius-full);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 800;
  cursor: pointer;
  transition: var(--transition-elastic);
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  position: relative;
  overflow: hidden;
  z-index: 1;
}
.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
  opacity: 0;
  transition: var(--transition-fast);
  z-index: -1;
}
.btn:hover::before { opacity: 1; }
.btn-primary {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric));
  color: var(--bg-deep);
  box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
}
.btn-primary:hover {
  transform: translateY(-3px) scale(1.04);
  box-shadow: var(--glow-electric);
}
.btn-secondary {
  padding: 12px 26px;
  background: transparent;
  border: 2px solid var(--neon-pink);
  border-radius: var(--radius-full);
  color: var(--neon-pink);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 800;
  cursor: pointer;
  transition: var(--transition-elastic);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  position: relative;
  overflow: hidden;
}
.btn-secondary::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--neon-pink), #ff66cc);
  opacity: 0;
  transition: var(--transition-fast);
  z-index: -1;
}
.btn-secondary:hover {
  color: var(--bg-deep);
  transform: translateY(-3px) scale(1.04);
  box-shadow: var(--glow-pink);
}
.btn-secondary:hover::after { opacity: 1; }

/* ===== LOADING ===== */
.loading {
  display: none;
  text-align: center;
  padding: 35px;
  grid-column: 1 / -1;
}
.loading.active { display: block; }
.loader {
  width: 48px;
  height: 48px;
  border: 3.5px solid rgba(0, 212, 255, 0.25);
  border-top-color: var(--neon-electric);
  border-radius: 50%;
  animation: spin 1s linear infinite, pulseLoader 2s ease-in-out infinite;
  margin: 0 auto 18px;
  box-shadow: var(--glow-electric);
  position: relative;
}
.loader::after {
  content: '';
  position: absolute;
  inset: -6px;
  border: 2px solid transparent;
  border-top-color: var(--neon-blue);
  border-radius: 50%;
  animation: spin 1.5s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulseLoader {
  0%, 100% { box-shadow: var(--glow-electric); }
  50% { box-shadow: 0 0 25px rgba(0, 245, 255, 0.85), 0 0 55px rgba(0, 245, 255, 0.55); }
}
.loading-text {
  color: var(--neon-electric);
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: textGlow 1.5s ease-in-out infinite alternate;
}
@keyframes textGlow {
  from { text-shadow: 0 0 10px rgba(0, 245, 255, 0.5); }
  to { text-shadow: 0 0 22px rgba(0, 245, 255, 0.9), 0 0 40px rgba(0, 212, 255, 0.6); }
}

/* ===== MODAL - ENHANCED ===== */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(2, 4, 10, 0.96);
  backdrop-filter: blur(20px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: modalBackdrop 0.3s var(--transition-bloom) forwards;
}
.modal-backdrop.active { display: flex; }
@keyframes modalBackdrop {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal-content {
  background: var(--bg-surface);
  border: 1px solid var(--border-glow-strong);
  border-radius: var(--radius-xl);
  max-width: 950px;
  width: 100%;
  max-height: 96vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: var(--glow-electric), 0 25px 80px rgba(0, 0, 0, 0.6);
  animation: modalSlide 0.4s var(--transition-bloom) forwards;
  transform: translateY(20px) scale(0.98);
  opacity: 0;
}
.modal-backdrop.active .modal-content {
  transform: translateY(0) scale(1);
  opacity: 1;
}
@keyframes modalSlide {
  to { transform: translateY(0) scale(1); opacity: 1; }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 22px;
  border-bottom: 1px solid rgba(0, 212, 255, 0.25);
  background: var(--bg-glass-strong);
}
.modal-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px;
  color: var(--neon-electric);
  letter-spacing: 1px;
  text-shadow: 0 0 12px rgba(0, 245, 255, 0.5);
}
.modal-close {
  width: 36px;
  height: 36px;
  background: transparent;
  border: 2px solid var(--neon-pink);
  border-radius: 50%;
  color: var(--neon-pink);
  font-size: 15px;
  cursor: pointer;
  transition: var(--transition-elastic);
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover {
  background: var(--neon-pink);
  color: var(--bg-deep);
  transform: rotate(90deg) scale(1.1);
  box-shadow: var(--glow-pink);
}
.modal-body {
  padding: 22px;
  text-align: center;
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at center, #0d253a 0%, #050d1a 100%);
}
.modal-body img {
  max-width: 100%;
  max-height: 72vh;
  width: auto;
  object-fit: contain;
  border-radius: var(--radius-md);
  box-shadow: 0 0 30px rgba(0, 212, 255, 0.4), 0 10px 50px rgba(0, 0, 0, 0.5);
  transition: var(--transition-bloom);
  border: 1px solid rgba(0, 212, 255, 0.3);
}
.modal-body img:hover {
  transform: scale(1.02);
  box-shadow: var(--glow-electric), 0 15px 60px rgba(0, 0, 0, 0.6);
}
.modal-actions {
  margin-top: 18px;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

/* ===== TOAST NOTIFICATION - ENHANCED & SMALLER ===== */
.toast {
  position: fixed;
  bottom: 18px;
  right: 18px;
  background: var(--bg-glass-strong);
  border: 1px solid var(--neon-electric);
  color: var(--neon-electric);
  padding: 10px 18px;
  border-radius: var(--radius-md);
  font-weight: 700;
  font-size: 11px;
  z-index: 10000;
  display: flex;
  align-items: center;
  gap: 9px;
  box-shadow: var(--glow-electric);
  transform: translateX(180px);
  opacity: 0;
  transition: var(--transition-bloom);
  backdrop-filter: blur(14px);
  max-width: 320px;
  letter-spacing: 0.3px;
}
.toast i {
  font-size: 14px;
  animation: pulseIcon 1.5s ease-in-out infinite;
}
@keyframes pulseIcon {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.85; transform: scale(1.1); }
}
.toast.show {
  transform: translateX(0);
  opacity: 1;
  animation: toastBloom 0.5s var(--transition-bloom) forwards;
}
@keyframes toastBloom {
  0% { transform: translateX(180px) scale(0.9); opacity: 0; }
  50% { transform: translateX(-8px) scale(1.02); }
  100% { transform: translateX(0) scale(1); opacity: 1; }
}
.toast::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue));
  border-radius: var(--radius-md) 0 0 var(--radius-md);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .container { padding: 18px 14px; }
  .back-btn { left: 14px; top: 16px; padding: 6px 12px; font-size: 10px; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .photo-wrapper { height: 220px; }
  .photo-title { font-size: 13px; min-height: 38px; }
  .action-btn-cool { min-width: 65px; max-width: 85px; height: 42px; padding: 6px 4px; }
  .action-btn-cool i { font-size: 15px; }
  .action-btn-cool span { font-size: 8.5px; }
  .tools-panel { grid-template-columns: 1fr; }
  .nav-tabs { flex-direction: column; width: 100%; }
  .nav-tab { width: 100%; justify-content: center; }
  .modal-content { margin: 10px; max-height: 94vh; }
  .modal-body img { max-height: 65vh; }
  .toast { 
    bottom: 14px; 
    right: 14px; 
    left: 14px; 
    max-width: none;
    font-size: 10.5px;
    padding: 9px 16px;
  }
  .action-buttons { flex-direction: column; align-items: center; }
  .btn { width: 100%; max-width: 280px; justify-content: center; }
}

@media (max-width: 480px) {
  .gallery-grid { grid-template-columns: 1fr; }
  .photo-wrapper { height: 260px; }
  .title { font-size: clamp(26px, 8vw, 42px); letter-spacing: 3px; }
  .action-buttons-row { gap: 7px; }
  .action-btn-cool { min-width: 60px; height: 40px; }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar {
  width: 9px;
  height: 9px;
}
::-webkit-scrollbar-track {
  background: var(--bg-deep);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue), var(--neon-purple));
  border-radius: 4px;
  border: 2px solid var(--bg-deep);
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.5);
  transition: var(--transition-fast);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--neon-blue), var(--neon-electric), var(--neon-cyan));
  box-shadow: 0 0 18px rgba(0, 245, 255, 0.75);
}

/* ===== SELECTION ===== */
::selection {
  background: rgba(0, 212, 255, 0.4);
  color: var(--text-primary);
  text-shadow: 0 0 8px rgba(0, 245, 255, 0.6);
}

/* ===== FOCUS STATES ===== */
a:focus, button:focus, input:focus {
  outline: 2px solid var(--neon-electric);
  outline-offset: 2px;
  box-shadow: 0 0 0 4px rgba(0, 245, 255, 0.2);
}

/* ===== UTILITY CLASSES ===== */
.text-glow { text-shadow: 0 0 12px var(--text-glow); }
.glow-blue { box-shadow: var(--glow-blue); }
.glow-electric { box-shadow: var(--glow-electric); }
.glow-purple { box-shadow: var(--glow-purple); }
.glow-pink { box-shadow: var(--glow-pink); }
.glow-green { box-shadow: var(--glow-green); }

/* ===== ANIMATION UTILS ===== */
.animate-float { animation: floatIcon 3s ease-in-out infinite; }
.animate-pulse { animation: statusPulse 2.5s ease-in-out infinite; }
.animate-shimmer { animation: titleShimmer 3s ease-in-out infinite; }

/* ===== PRINT STYLES ===== */
@media print {
  .bg-canvas, .grid-overlay, .particles, .lightning-overlay, 
  .scanline, .noise, .back-btn, .nav-tabs, .action-buttons-row,
  .toast, .modal-backdrop { display: none !important; }
  body { background: #fff; color: #000; }
  .photo-card { break-inside: avoid; border: 1px solid #ccc; }
}
</style>
</head>
<body>
<!-- Background Layers -->
<div class="bg-canvas"></div>
<div class="grid-overlay"></div>
<div class="noise"></div>
<div class="particles" id="particles"></div>
<div class="lightning-overlay">
  <div class="lightning-bolt"></div>
  <div class="lightning-bolt"></div>
  <div class="lightning-bolt"></div>
</div>
<div class="scanline"></div>

<!-- Back Button -->
<a href="index.html" class="back-btn">
  <i class="fas fa-arrow-left"></i> Kembali
</a>

<!-- Main Container -->
<div class="container">
  <header class="header">
    <h1 class="title">⚡ FOTO GALLERY</h1>
    <p class="subtitle">LINE TOGEL • Cyber Portal 2026</p>
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </header>

  <!-- Navigation Tabs -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showSection('gallery')">
      <i class="fas fa-images"></i> Galeri Foto
    </button>
    <button class="nav-tab" onclick="showSection('editor')">
      <i class="fas fa-magic"></i> Photo Editor
    </button>
  </div>

  <!-- Gallery Section -->
  <section id="gallery" class="section active">
    <div class="search-container">
      <input type="text" class="search-box" id="searchInput" 
             placeholder="🔍 Cari foto berdasarkan judul..." 
             onkeyup="searchPhotos()" autocomplete="off">
    </div>
    
    <div class="loading" id="loading">
      <div class="loader"></div>
      <div class="loading-text">⚡ LOADING PHOTOS...</div>
    </div>
    
    <div class="gallery-grid" id="galleryGrid"></div>
  </section>

  <!-- Editor Section -->
  <section id="editor" class="section">
    <div class="editor-container">
      <div class="editor-header">
        <h2 class="editor-title"><i class="fas fa-palette"></i> PHOTO EDITOR STUDIO</h2>
      </div>
      
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
        <div class="upload-text">Klik atau Drag foto ke sini</div>
        <div class="upload-hint">Support: JPG, PNG, WEBP • Multiple files</div>
        <input type="file" id="fileInput" multiple accept="image/*" 
               style="display:none" onchange="handleFiles(event)">
      </div>
      
      <div class="canvas-wrapper">
        <canvas id="mainCanvas" width="800" height="600"></canvas>
      </div>
      
      <div class="tools-panel">
        <div class="tool-group">
          <div class="tool-title"><i class="fas fa-adjust"></i> Filter & Adjust</div>
          <button class="tool-btn" onclick="applyFilter('grayscale')">
            <i class="fas fa-circle"></i> Grayscale
          </button>
          <button class="tool-btn" onclick="applyFilter('sepia')">
            <i class="fas fa-coffee"></i> Sepia
          </button>
          <button class="tool-btn" onclick="applyFilter('invert')">
            <i class="fas fa-exchange-alt"></i> Invert
          </button>
          <button class="tool-btn" onclick="applyFilter('blur')">
            <i class="fas fa-tint"></i> Blur
          </button>
          <label class="tool-title" style="margin-top:8px;display:block">Brightness</label>
          <input type="range" id="brightness" min="0" max="200" value="100" onchange="adjustImage()">
          <label class="tool-title" style="margin-top:8px;display:block">Contrast</label>
          <input type="range" id="contrast" min="0" max="200" value="100" onchange="adjustImage()">
          <label class="tool-title" style="margin-top:8px;display:block">Saturation</label>
          <input type="range" id="saturation" min="0" max="200" value="100" onchange="adjustImage()">
        </div>
        
        <div class="tool-group">
          <div class="tool-title"><i class="fas fa-crop-alt"></i> Transform</div>
          <button class="tool-btn" onclick="rotateImage(-90)">
            <i class="fas fa-undo"></i> Rotate -90°
          </button>
          <button class="tool-btn" onclick="rotateImage(90)">
            <i class="fas fa-redo"></i> Rotate +90°
          </button>
          <button class="tool-btn" onclick="flipImage('h')">
            <i class="fas fa-arrows-alt-h"></i> Flip H
          </button>
          <button class="tool-btn" onclick="flipImage('v')">
            <i class="fas fa-arrows-alt-v"></i> Flip V
          </button>
          <button class="tool-btn" onclick="resizeCanvas()">
            <i class="fas fa-compress-arrows-alt"></i> Resize
          </button>
        </div>
        
        <div class="tool-group">
          <div class="tool-title"><i class="fas fa-text"></i> Text & Draw</div>
          <input type="text" class="input-field" id="textInput" placeholder="Teks...">
          <input type="color" class="color-picker" id="textColor" value="#00d4ff">
          <input type="number" class="input-field" id="textSize" placeholder="Ukuran (px)" value="40">
          <button class="tool-btn" onclick="addText()">
            <i class="fas fa-plus"></i> Tambah Teks
          </button>
          <button class="tool-btn" onclick="startDrawing()">
            <i class="fas fa-pencil-alt"></i> Draw Mode
          </button>
        </div>
        
        <div class="tool-group">
          <div class="tool-title"><i class="fas fa-layer-group"></i> Combine</div>
          <button class="tool-btn" onclick="combinePhotos('h')">
            <i class="fas fa-arrows-alt-h"></i> Gabung Horizontal
          </button>
          <button class="tool-btn" onclick="combinePhotos('v')">
            <i class="fas fa-arrows-alt-v"></i> Gabung Vertikal
          </button>
          <button class="tool-btn" onclick="addFrame()">
            <i class="fas fa-border-style"></i> Tambah Frame
          </button>
          <button class="tool-btn" onclick="addWatermark()">
            <i class="fas fa-copyright"></i> Watermark
          </button>
        </div>
      </div>
      
      <div class="action-buttons">
        <button class="btn btn-primary" onclick="downloadImage()">
          <i class="fas fa-download"></i> Download Foto
        </button>
        <button class="btn btn-secondary" onclick="clearCanvas()">
          <i class="fas fa-trash"></i> Clear
        </button>
        <button class="btn btn-secondary" onclick="undoAction()">
          <i class="fas fa-undo"></i> Undo
        </button>

    </div>

</div>

<!-- Modal -->
<div class="modal-backdrop" id="imageModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Foto Detail</h3>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <img src="" alt="" id="modalImage">
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="copyImage()">
          <i class="fas fa-copy"></i> Copy Foto
        </button>
        <button class="btn btn-secondary" onclick="downloadModalImage()">
          <i class="fas fa-download"></i> Download
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast">
  <i class="fas fa-bolt"></i>
  <span id="toastText">Berhasil!</span>
</div>

<script>
// ===== GLOBAL VARIABLES =====
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';
let canvas = document.getElementById('mainCanvas');
let ctx = canvas ? canvas.getContext('2d') : null;
let currentEditorImage = null;
let history = [];
let isDrawing = false;

// ===== INITIALIZATION =====
document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  if (document.getElementById('gallery')) {
    fetchPhotosFromSheet();
  }
  initCanvas();
  
  // Close modal on backdrop click
  document.getElementById('imageModal')?.addEventListener('click', (e) => {
    if (e.target.id === 'imageModal') closeModal();
  });
});

// ===== PARTICLE SYSTEM =====
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  
  for(let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 25 + 's';
    p.style.animationDuration = (18 + Math.random() * 22) + 's';
    p.style.width = (2 + Math.random() * 4) + 'px';
    p.style.height = p.style.width;
    container.appendChild(p);
  }
}

// ===== SECTION NAVIGATION =====
function showSection(sectionId) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  
  document.getElementById(sectionId).classList.add('active');
  event.target.closest('.nav-tab').classList.add('active');
  
  // Re-trigger animations
  document.getElementById(sectionId).style.animation = 'none';
  setTimeout(() => {
    document.getElementById(sectionId).style.animation = '';
  }, 10);
}

// ===== FETCH PHOTOS FROM GOOGLE SHEETS =====
async function fetchPhotosFromSheet() {
  const loading = document.getElementById('loading');
  const grid = document.getElementById('galleryGrid');
  
  loading?.classList.add('active');
  grid.innerHTML = '';
  
  try {
    const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
    const gid = '1246502038';
    
    try {
      // Try GVIZ API first
      const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
      const response = await fetch(gvizUrl);
      const text = await response.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      const rows = json.table.rows;
      
      allPhotos = [];
      rows.forEach((row, index) => {
        const c = row.c;
        if (!c) return;
        const judul = c[0] ? (c[0].v || '') : '';
        const foto = c[1] ? (c[1].v || '') : '';
        if (judul && foto) {
          allPhotos.push({ judul, foto, index: index + 2 });
        }
      });
    } catch (e) {
      console.log('GVIZ failed, trying CSV...', e);
      // Fallback to CSV export
      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
      const csvResponse = await fetch(csvUrl);
      const csvText = await csvResponse.text();
      const csvRows = csvText.split('\n').map(row => row.split(','));
      
      allPhotos = [];
      csvRows.forEach((row, index) => {
        if (row.length < 2) return;
        const judul = row[0] ? row[0].replace(/"/g, '').trim() : '';
        const foto = row[1] ? row[1].replace(/"/g, '').trim() : '';
        if (judul && foto) {
          allPhotos.push({ judul, foto, index: index + 2 });
        }
      });
    }
    
    renderGallery(allPhotos);
    showToast(`⚡ Berhasil memuat ${allPhotos.length} foto`);
    
  } catch (error) {
    console.error('Error fetching photos:', error);
    showToast('❗ Gagal mengambil data dari Google Sheets');
    grid.innerHTML = `
      <div class="no-results" style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-secondary);">
        <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: var(--neon-pink); margin-bottom: 18px; text-shadow: 0 0 20px rgba(255,0,170,0.5);"></i>
        <h3 style="font-family: 'Orbitron'; color: var(--text-primary); margin-bottom: 10px;">Gagal Memuat Foto</h3>
        <p style="font-size: 13px;">Pastikan Google Sheets sudah dipublikasikan</p>
      </div>
    `;
  }
  
  loading?.classList.remove('active');
}

// ===== RENDER GALLERY =====
function renderGallery(photos) {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';
  
  if (photos.length === 0) {
    grid.innerHTML = `
      <div class="no-results" style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-secondary);">
        <i class="fas fa-search" style="font-size: 48px; margin-bottom: 18px; opacity: 0.5; text-shadow: 0 0 15px rgba(0,212,255,0.4);"></i>
        <h3 style="font-family: 'Orbitron'; color: var(--text-primary); margin-bottom: 10px;">Tidak Ada Foto</h3>
        <p style="font-size: 13px;">Tidak ada foto yang sesuai dengan pencarian</p>
      </div>
    `;
    return;
  }
  
  photos.forEach((photo, idx) => {
    const card = createPhotoCard(photo.foto, photo.judul, idx);
    grid.appendChild(card);
  });
}

// ===== CREATE PHOTO CARD =====
function createPhotoCard(url, title, index) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.innerHTML = `
    <div class="photo-wrapper">
      <img src="${url}" alt="${title}" 
           onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00d4ff?text=No+Image'" 
           loading="lazy" 
           onclick="viewFullImage('${url}', '${title.replace(/'/g, "\\'")}')" 
           style="cursor: pointer;">
    </div>
    <div class="photo-info">
      <div class="photo-title">${title}</div>
      <div class="photo-meta">Foto #${index + 1}</div>
      <div class="action-buttons-row">
        <button class="action-btn-cool copy-btn" onclick="copyPhoto('${url}')" title="Copy Foto">
          <i class="fas fa-copy"></i>
          <span>Copy</span>
        </button>
        <button class="action-btn-cool download-btn" onclick="downloadPhoto('${url}', '${title.replace(/'/g, "\\'")}')" title="Download">
          <i class="fas fa-download"></i>
          <span>Download</span>
        </button>
        <button class="action-btn-cool edit-btn" onclick="editImageFromUrl('${url}')" title="Edit">
          <i class="fas fa-edit"></i>
          <span>Edit</span>
        </button>
      </div>
    </div>
  `;
  return card;
}

// ===== SEARCH FUNCTIONALITY =====
function searchPhotos() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
  
  if (!searchTerm) {
    renderGallery(allPhotos);
    return;
  }
  
  const filtered = allPhotos.filter(photo =>
    photo.judul.toLowerCase().includes(searchTerm)
  );
  
  renderGallery(filtered);
  if (filtered.length > 0) {
    showToast(`⚡ Ditemukan ${filtered.length} foto`);
  }
}

// ===== MODAL FUNCTIONS =====
function viewFullImage(url, title) {
  currentImageUrl = url;
  currentImageTitle = title;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalImage').src = url;
  document.getElementById('imageModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('imageModal').classList.remove('active');
  document.body.style.overflow = '';
  currentImageUrl = '';
  currentImageTitle = '';
}

// ===== COPY & DOWNLOAD FUNCTIONS =====
async function copyPhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([
      new ClipboardItem({ [blob.type]: blob })
    ]);
    showToast('✅ Foto berhasil disalin ke clipboard!');
  } catch (error) {
    console.error('Copy error:', error);
    showToast('❗ Buka foto lalu klik kanan > Copy Image');
  }
}

async function copyImage() {
  if (currentImageUrl) {
    await copyPhoto(currentImageUrl);
  }
}

function downloadPhoto(url, filename) {
  const link = document.createElement('a');
  link.href = url;
  link.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
  link.target = '_blank';
  link.rel = 'noopener noreferrer';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('⚡ Download dimulai...');
}

function downloadModalImage() {
  if (currentImageUrl && currentImageTitle) {
    downloadPhoto(currentImageUrl, currentImageTitle);
  }
}

// ===== CANVAS INITIALIZATION =====
function initCanvas() {
  if (!canvas || !ctx) return;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = '22px Rajdhani';
  ctx.fillStyle = '#8ab4f8';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Upload foto untuk mulai mengedit', canvas.width/2, canvas.height/2);
}

// ===== FILE HANDLING =====
function handleFiles(event) {
  const files = event.target.files;
  if (files.length === 0) return;
  
  loadImage(files[0]);
  
  if (files.length > 1) {
    setTimeout(() => {
      if (confirm(`Load ${files.length} foto?\n\n✓ OK: Gabungkan semua foto\n✗ Cancel: Load satu per satu`)) {
        combineMultipleFiles(files);
      }
    }, 400);
  }
}

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      currentEditorImage = img;
      saveHistory();
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      showToast('✅ Foto berhasil dimuat');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function combineMultipleFiles(files) {
  const images = [];
  let loaded = 0;
  
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        images.push(img);
        loaded++;
        if (loaded === files.length) {
          combineImages(images);
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function combineImages(images) {
  const totalWidth = images.reduce((sum, img) => sum + img.width, 0);
  const maxHeight = Math.max(...images.map(img => img.height));
  
  canvas.width = totalWidth;
  canvas.height = maxHeight;
  
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  let x = 0;
  images.forEach(img => {
    ctx.drawImage(img, x, 0);
    x += img.width;
  });
  
  saveHistory();
  showToast(`✅ ${images.length} foto digabungkan`);
}

// ===== FILTERS & ADJUSTMENTS =====
function applyFilter(filterType) {
  if (!currentEditorImage) {
    showToast('⚠️ Upload foto terlebih dahulu');
    return;
  }
  
  saveHistory();
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  
  switch(filterType) {
    case 'grayscale':
      for (let i = 0; i < data.length; i += 4) {
        const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
        data[i] = data[i + 1] = data[i + 2] = avg;
      }
      break;
    case 'sepia':
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i + 1], b = data[i + 2];
        data[i] = Math.min(255, (r * .393) + (g * .769) + (b * .189));
        data[i + 1] = Math.min(255, (r * .349) + (g * .686) + (b * .168));
        data[i + 2] = Math.min(255, (r * .272) + (g * .534) + (b * .131));
      }
      break;
    case 'invert':
      for (let i = 0; i < data.length; i += 4) {
        data[i] = 255 - data[i];
        data[i + 1] = 255 - data[i + 1];
        data[i + 2] = 255 - data[i + 2];
      }
      break;
    case 'blur':
      ctx.filter = 'blur(5px)';
      ctx.drawImage(canvas, 0, 0);
      ctx.filter = 'none';
      break;
  }
  
  if (filterType !== 'blur') {
    ctx.putImageData(imageData, 0, 0);
  }
  
  showToast(`✅ Filter ${filterType} diterapkan`);
}

function adjustImage() {
  if (!currentEditorImage) return;
  
  const brightness = document.getElementById('brightness').value;
  const contrast = document.getElementById('contrast').value;
  const saturation = document.getElementById('saturation').value;
  
  ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
  ctx.drawImage(currentEditorImage, 0, 0, canvas.width, canvas.height);
  ctx.filter = 'none';
}

// ===== TRANSFORMATIONS =====
function rotateImage(degrees) {
  if (!currentEditorImage) return;
  saveHistory();
  
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');
  
  if (degrees === 90 || degrees === -90) {
    tempCanvas.width = canvas.height;
    tempCanvas.height = canvas.width;
  } else {
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;
  }
  
  tempCtx.translate(tempCanvas.width / 2, tempCanvas.height / 2);
  tempCtx.rotate(degrees * Math.PI / 180);
  tempCtx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);
  
  canvas.width = tempCanvas.width;
  canvas.height = tempCanvas.height;
  ctx.drawImage(tempCanvas, 0, 0);
}

function flipImage(direction) {
  if (!currentEditorImage) return;
  saveHistory();
  
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');
  tempCanvas.width = canvas.width;
  tempCanvas.height = canvas.height;
  
  if (direction === 'h') {
    tempCtx.translate(canvas.width, 0);
    tempCtx.scale(-1, 1);
  } else {
    tempCtx.translate(0, canvas.height);
    tempCtx.scale(1, -1);
  }
  
  tempCtx.drawImage(canvas, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(tempCanvas, 0, 0);
}

function resizeCanvas() {
  const width = prompt('Lebar baru (px):', canvas.width);
  const height = prompt('Tinggi baru (px):', canvas.height);
  
  if (width && height) {
    saveHistory();
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;
    tempCtx.drawImage(canvas, 0, 0);
    
    canvas.width = parseInt(width);
    canvas.height = parseInt(height);
    
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(tempCanvas, 0, 0);
  }
}

// ===== TEXT & DRAWING =====
function addText() {
  const text = document.getElementById('textInput').value;
  const color = document.getElementById('textColor').value;
  const size = document.getElementById('textSize').value;
  
  if (!text) {
    showToast('⚠️ Masukkan teks terlebih dahulu');
    return;
  }
  
  saveHistory();
  ctx.font = `${size}px Orbitron`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 12;
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);
  ctx.shadowBlur = 0;
  
  showToast('✅ Teks ditambahkan');
}

function startDrawing() {
  isDrawing = !isDrawing;
  
  if (isDrawing) {
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);
    showToast('✏️ Mode gambar aktif - Klik & drag untuk menggambar');
  } else {
    canvas.removeEventListener('mousedown', startDraw);
    canvas.removeEventListener('mousemove', draw);
    canvas.removeEventListener('mouseup', stopDraw);
    canvas.removeEventListener('mouseleave', stopDraw);
    showToast('Mode gambar nonaktif');
  }
}

function startDraw(e) {
  isDrawing = true;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.strokeStyle = document.getElementById('textColor').value;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function draw(e) {
  if (!isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  
  ctx.lineTo(x, y);
  ctx.stroke();
}

function stopDraw() {
  if (isDrawing) {
    isDrawing = false;
    saveHistory();
  }
}

// ===== COMBINE & EFFECTS =====
function combinePhotos(direction) {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = 'image/*';
  input.onchange = (e) => {
    const files = e.target.files;
    if (files.length < 2) {
      showToast('⚠️ Pilih minimal 2 foto');
      return;
    }
    combineMultipleFiles(files);
  };
  input.click();
}

function addFrame() {
  saveHistory();
  const frameWidth = 22;
  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth = frameWidth;
  ctx.shadowColor = 'rgba(0, 212, 255, 0.6)';
  ctx.shadowBlur = 15;
  ctx.strokeRect(0, 0, canvas.width, canvas.height);
  ctx.shadowBlur = 0;
  showToast('✅ Frame ditambahkan');
}

function addWatermark() {
  saveHistory();
  const text = 'LINE TOGEL';
  ctx.font = 'bold 32px Orbitron';
  ctx.fillStyle = 'rgba(0, 212, 255, 0.35)';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 8;
  ctx.fillText(text, canvas.width - 18, canvas.height - 18);
  ctx.shadowBlur = 0;
  showToast('✅ Watermark ditambahkan');
}

// ===== HISTORY & UNDO =====
function saveHistory() {
  if (!canvas) return;
  history.push(canvas.toDataURL());
  if (history.length > 12) history.shift();
}

function undoAction() {
  if (history.length > 1) {
    history.pop();
    const previous = history[history.length - 1];
    const img = new Image();
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
    };
    img.src = previous;
    showToast('↩️ Undo');
  }
}

function clearCanvas() {
  if (confirm('Hapus semua perubahan?')) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    currentEditorImage = null;
    history = [];
    showToast('🗑️ Canvas dibersihkan');
  }
}

function downloadImage() {
  const link = document.createElement('a');
  link.download = `edited-photo-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('⚡ Foto didownload');
}

function editImageFromUrl(url) {
  showSection('editor');
  document.querySelectorAll('.nav-tab')[1]?.classList.add('active');
  
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    currentEditorImage = img;
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    saveHistory();
    showToast('✅ Foto dimuat ke editor');
  };
  img.onerror = () => showToast('❗ Gagal memuat gambar');
  img.src = url;
}

// ===== TOAST NOTIFICATION =====
function showToast(message) {
  const toast = document.getElementById('toast');
  const toastText = document.getElementById('toastText');
  
  toastText.textContent = message;
  toast.classList.add('show');
  
  // Reset animation
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3200);
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeModal();
  }
  if (e.ctrlKey && e.key === 'z') {
    e.preventDefault();
    undoAction();
  }
});

// ===== TOUCH SUPPORT FOR CANVAS =====
if (canvas) {
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const mouseEvent = new MouseEvent('mousedown', {
      clientX: touch.clientX,
      clientY: touch.clientY
    });
    canvas.dispatchEvent(mouseEvent);
  }, { passive: false });
  
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const mouseEvent = new MouseEvent('mousemove', {
      clientX: touch.clientX,
      clientY: touch.clientY
    });
    canvas.dispatchEvent(mouseEvent);
  }, { passive: false });
  
  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    const mouseEvent = new MouseEvent('mouseup', {});
    canvas.dispatchEvent(mouseEvent);
  }, { passive: false });
}
</script>

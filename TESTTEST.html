<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#00f7ff">
<meta name="description" content="LINE TOGEL Foto Gallery | Next-Gen Blue Experience">
<title>⚡ FOTO GALLERY | LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ✨ BLUE COOL SYSTEM */
:root {
  /* Core Palette */
  --void: #000308;
  --deep: #020a15;
  --surface: rgba(8, 20, 42, 0.65);
  --glass: rgba(12, 28, 55, 0.72);
  --glass-heavy: rgba(16, 36, 72, 0.88);
  --ice: rgba(120, 200, 255, 0.08);
  
  /* Neon Blue Spectrum */
  --cyan: #00f7ff;
  --blue: #00d4ff;
  --electric: #00e5ff;
  --ice-blue: #88d8ff;
  --steel: #3b82f6;
  --navy: #1d4ed8;
  
  /* Text System */
  --text-1: #ffffff;
  --text-2: #c9e2ff;
  --text-3: #85a8cc;
  --text-4: #4a6580;
  
  /* Effects */
  --glow-1: 0 0 12px rgba(0, 215, 255, 0.35), 0 0 28px rgba(0, 247, 255, 0.18);
  --glow-2: 0 0 22px rgba(0, 215, 255, 0.55), 0 0 48px rgba(0, 247, 255, 0.28);
  --glow-3: 0 0 32px rgba(0, 215, 255, 0.75), 0 0 72px rgba(0, 247, 255, 0.38);
  --border-1: rgba(0, 215, 255, 0.35);
  --border-2: rgba(0, 215, 255, 0.55);
  --border-3: rgba(0, 247, 255, 0.85);
  
  /* Layout */
  --nav-h: 68px;
  --radius-xs: 8px;
  --radius-sm: 12px;
  --radius-md: 18px;
  --radius-lg: 26px;
  --radius-xl: 40px;
  --space-xxs: 4px;
  --space-xs: 8px;
  --space-sm: 14px;
  --space-md: 22px;
  --space-lg: 34px;
  --space-xl: 52px;
  
  /* Motion */
  --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
  --ease-spring: cubic-bezier(0.34, 1.4, 0.64, 1);
  --t-fast: 180ms;
  --t-normal: 320ms;
  --t-slow: 580ms;
}

[data-theme="light"] {
  --void: #f4f8fc;
  --deep: #e8f0f8;
  --surface: rgba(255, 255, 255, 0.72);
  --glass: rgba(255, 255, 255, 0.82);
  --glass-heavy: rgba(245, 250, 255, 0.92);
  --ice: rgba(59, 130, 246, 0.06);
  --cyan: #0ea5e9;
  --blue: #0284c7;
  --electric: #38bdf8;
  --text-1: #0f172a;
  --text-2: #1e3a5f;
  --text-3: #475569;
  --text-4: #94a3b8;
  --border-1: rgba(14, 165, 233, 0.28);
  --border-2: rgba(14, 165, 233, 0.42);
  --border-3: rgba(14, 165, 233, 0.68);
  --glow-1: 0 0 10px rgba(14, 165, 233, 0.25), 0 0 22px rgba(14, 165, 233, 0.12);
  --glow-2: 0 0 18px rgba(14, 165, 233, 0.4), 0 0 38px rgba(14, 165, 233, 0.22);
  --glow-3: 0 0 26px rgba(14, 165, 233, 0.55), 0 0 56px rgba(14, 165, 233, 0.32);
}

/* ✨ BASE & RESET */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: calc(var(--nav-h) + 20px); }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--void);
  color: var(--text-1);
  min-height: 100vh;
  min-height: 100dvh;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  background: radial-gradient(1400px 700px at 15% 20%, rgba(0, 215, 255, 0.09) 0%, transparent 65%),
              radial-gradient(1200px 600px at 85% 15%, rgba(0, 247, 255, 0.07) 0%, transparent 65%),
              radial-gradient(900px 400px at 50% 90%, rgba(59, 130, 246, 0.06) 0%, transparent 70%),
              var(--deep);
  transition: background 0.4s var(--ease-out);
}

/* ✨ BACKGROUND GRID */
.grid-bg {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: linear-gradient(var(--border-1) 1px, transparent 1px),
                    linear-gradient(90deg, var(--border-1) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 85% 75% at 50% 50%, black 20%, transparent 85%);
  animation: gridDrift 40s linear infinite; opacity: 0.6;
}
@keyframes gridDrift { 0% { background-position: 0 0; } 100% { background-position: 60px 60px; } }

.aurora {
  position: fixed; inset: 0; z-index: -3; pointer-events: none;
  background: radial-gradient(60% 50% at 25% 45%, rgba(0, 247, 255, 0.08) 0%, transparent 70%),
              radial-gradient(55% 45% at 75% 55%, rgba(0, 215, 255, 0.07) 0%, transparent 70%);
  filter: blur(80px); opacity: 0.8; animation: auroraFlow 35s ease-in-out infinite alternate;
}
@keyframes auroraFlow { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(2%,-1.5%) scale(1.03)} }

.scanline {
  position: fixed; left: 0; right: 0; height: 3px; z-index: 50; pointer-events: none;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: 0.45; animation: scanMove 7s linear infinite; filter: blur(1px);
  box-shadow: 0 0 18px var(--cyan);
}
@keyframes scanMove { 0%{top:-10px;opacity:0} 8%{opacity:0.45} 92%{opacity:0.45} 100%{top:100%;opacity:0} }

/* ✨ LAYOUT SHELL */
.app-wrapper { max-width: 1480px; margin: 0 auto; padding: var(--space-lg) var(--space-md); min-height: 100vh; }

/* ✨ NAVBAR */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
  background: var(--glass-heavy); border-bottom: 1px solid var(--border-1);
  backdrop-filter: blur(24px) saturate(180%); z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--space-lg); transition: all var(--t-normal) var(--ease-out);
  box-shadow: 0 4px 24px rgba(0, 8, 18, 0.25);
}
.nav-left { display: flex; align-items: center; gap: var(--space-sm); }
.brand {
  font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 800;
  letter-spacing: 2.5px; background: linear-gradient(135deg, var(--cyan), var(--electric));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: 0 0 15px rgba(0, 247, 255, 0.4);
}
.nav-actions { display: flex; align-items: center; gap: var(--space-xs); }
.nav-btn {
  width: 42px; height: 42px; background: var(--surface); border: 1px solid var(--border-1);
  border-radius: 50%; color: var(--text-2); font-size: 15px; cursor: pointer;
  transition: var(--t-normal) var(--ease-out); display: grid; place-items: center;
}
.nav-btn:hover { background: var(--glass); border-color: var(--border-2); color: var(--cyan); box-shadow: var(--glow-1); transform: scale(1.05); }

/* ✨ HERO SECTION */
.hero {
  text-align: center; padding: var(--space-xl) var(--space-md) var(--space-lg);
  position: relative; margin-bottom: var(--space-md);
}
.hero-title {
  font-family: 'Orbitron', sans-serif; font-size: clamp(32px, 8vw, 56px);
  font-weight: 900; letter-spacing: 4px; margin-bottom: 12px;
  background: linear-gradient(135deg, var(--text-1) 20%, var(--cyan) 50%, var(--electric) 80%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 20px rgba(0, 247, 255, 0.45));
  animation: titlePulse 4s ease-in-out infinite;
}
@keyframes titlePulse { 0%,100%{filter:drop-shadow(0 0 20px rgba(0,247,255,0.45))} 50%{filter:drop-shadow(0 0 32px rgba(0,247,255,0.7))} }
.hero-sub { font-size: 14px; color: var(--text-3); letter-spacing: 6px; text-transform: uppercase; margin-bottom: 20px; }
.status-pill {
  display: inline-flex; align-items: center; gap: 10px; padding: 8px 22px;
  background: var(--ice); border: 1px solid var(--border-1); border-radius: 999px;
  font-size: 12px; font-weight: 600; color: var(--cyan); letter-spacing: 1.5px;
  box-shadow: var(--glow-1);
}
.status-dot { width: 8px; height: 8px; background: var(--cyan); border-radius: 50%; animation: pulseDot 1.8s infinite; box-shadow: 0 0 10px var(--cyan); }
@keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(1.4)} }

/* ✨ TOOLBAR */
.toolbar {
  display: flex; flex-wrap: wrap; gap: var(--space-sm); align-items: center;
  margin-bottom: var(--space-lg); padding: var(--space-sm) var(--space-md);
  background: var(--surface); border: 1px solid var(--border-1); border-radius: var(--radius-lg);
  backdrop-filter: blur(18px); box-shadow: var(--glow-1);
}
.search-box {
  flex: 1; min-width: 220px; padding: 12px 48px 12px 18px;
  background: var(--void); border: 1px solid var(--border-1); border-radius: var(--radius-sm);
  color: var(--text-1); font-size: 14px; transition: var(--t-normal) var(--ease-out);
}
.search-box:focus { outline: none; border-color: var(--cyan); box-shadow: var(--glow-1); }
.search-box::placeholder { color: var(--text-4); }
.search-icon { position: relative; left: -34px; top: 2px; color: var(--text-3); pointer-events: none; }
.filter-chips { display: flex; gap: 8px; overflow-x: auto; padding: 4px 2px; scrollbar-width: none; }
.filter-chips::-webkit-scrollbar { display: none; }
.chip {
  padding: 8px 16px; background: var(--void); border: 1px solid var(--border-1);
  border-radius: 999px; font-size: 12px; font-weight: 600; color: var(--text-2);
  cursor: pointer; transition: var(--t-normal) var(--ease-out); white-space: nowrap;
}
.chip:hover, .chip.active { background: var(--cyan); border-color: var(--cyan); color: var(--deep); box-shadow: var(--glow-1); }

/* ✨ GALLERY GRID */
.grid-container {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px; perspective: 1200px;
}
.card {
  position: relative; background: var(--surface); border: 1px solid var(--border-1);
  border-radius: var(--radius-md); overflow: hidden; cursor: pointer;
  transition: all var(--t-slow) var(--ease-out); transform-style: preserve-3d;
  box-shadow: 0 8px 28px rgba(0, 8, 18, 0.35);
  animation: cardIn var(--t-slow) var(--ease-out) backwards;
}
.card:hover {
  transform: translateY(-8px) rotateX(1.5deg) rotateY(-1deg);
  border-color: var(--border-3); box-shadow: var(--glow-2), 0 20px 45px rgba(0, 10, 22, 0.5);
}
@keyframes cardIn { from { opacity: 0; transform: translateY(24px) scale(0.98); } to { opacity: 1; transform: none; } }

.card-media { position: relative; width: 100%; aspect-ratio: 16/10; background: var(--deep); overflow: hidden; }
.card-media img { width: 100%; height: 100%; object-fit: cover; transition: transform var(--t-slow) var(--ease-out); }
.card:hover .card-media img { transform: scale(1.06); }
.card-overlay {
  position: absolute; inset: 0; background: linear-gradient(180deg, transparent 35%, rgba(0, 8, 18, 0.85) 100%);
  opacity: 0.9; transition: opacity var(--t-normal) var(--ease-out);
}
.card:hover .card-overlay { opacity: 1; }

.card-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 18px 20px; z-index: 2; }
.card-title { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; color: var(--cyan); margin-bottom: 6px; text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5); }
.card-meta { font-size: 11px; color: var(--text-3); display: flex; align-items: center; gap: 10px; }
.card-meta i { font-size: 10px; color: var(--ice-blue); }

.card-actions {
  position: absolute; bottom: 18px; right: 18px; z-index: 3;
  display: flex; gap: 10px; opacity: 0; transform: translateY(8px);
  transition: all var(--t-normal) var(--ease-spring);
}
.card:hover .card-actions { opacity: 1; transform: translateY(0); }
.act-btn {
  width: 40px; height: 40px; background: var(--glass-heavy); border: 1px solid var(--border-2);
  border-radius: 50%; color: var(--cyan); font-size: 15px; cursor: pointer;
  transition: var(--t-fast) var(--ease-out); display: grid; place-items: center;
  box-shadow: var(--glow-1);
}
.act-btn:hover { background: var(--cyan); border-color: var(--cyan); color: var(--deep); transform: scale(1.12) rotate(-5deg); }
.act-btn.fav.active { background: #ff3b5c; border-color: #ff3b5c; color: white; }

/* ✨ MODAL */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0, 3, 10, 0.96); backdrop-filter: blur(26px);
  z-index: 1000; display: none; align-items: center; justify-content: center; padding: 24px;
  animation: fadeIn 0.3s var(--ease-out);
}
.modal-backdrop.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-content {
  width: 100%; max-width: 1150px; background: var(--glass-heavy); border: 1px solid var(--border-2);
  border-radius: var(--radius-xl); overflow: hidden; display: flex; flex-direction: row;
  box-shadow: var(--glow-3), 0 30px 70px rgba(0, 5, 12, 0.6); animation: modalSlide var(--t-slow) var(--ease-spring);
}
@keyframes modalSlide { from { opacity: 0; transform: translateY(35px) scale(0.98); } to { opacity: 1; transform: none; } }

.modal-image { flex: 1.4; background: var(--deep); display: grid; place-items: center; position: relative; }
.modal-image img { max-width: 100%; max-height: 72vh; width: auto; height: auto; object-fit: contain; transition: transform 0.35s var(--ease-out); cursor: zoom-in; }
.modal-image img.zoomed { transform: scale(1.6); cursor: zoom-out; }

.modal-info { flex: 0.8; padding: 28px; display: flex; flex-direction: column; justify-content: space-between; border-left: 1px solid var(--border-1); }
.modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.modal-title { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; color: var(--cyan); line-height: 1.3; }
.modal-close { width: 36px; height: 36px; background: transparent; border: 1px solid var(--border-1); border-radius: 50%; color: var(--text-3); cursor: pointer; transition: var(--t-fast); display: grid; place-items: center; }
.modal-close:hover { background: #ff3b5c; border-color: #ff3b5c; color: white; transform: rotate(90deg); }

.info-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
.info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-1); }
.info-label { color: var(--text-3); font-size: 12px; font-weight: 500; }
.info-value { color: var(--text-1); font-size: 13px; font-weight: 600; }

.modal-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.modal-btn {
  flex: 1; min-width: 90px; padding: 14px 18px; background: var(--surface);
  border: 1px solid var(--border-2); border-radius: var(--radius-sm); color: var(--cyan);
  font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer;
  transition: var(--t-normal) var(--ease-out); display: flex; align-items: center; justify-content: center; gap: 8px;
}
.modal-btn:hover { background: var(--cyan); border-color: var(--cyan); color: var(--deep); box-shadow: var(--glow-1); transform: translateY(-2px); }
.modal-btn.primary { background: linear-gradient(135deg, var(--cyan), var(--blue)); border-color: transparent; color: var(--deep); }
.modal-btn.primary:hover { box-shadow: var(--glow-2); }

/* ✨ SKELETON & LOADING */
.skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
.skeleton {
  background: var(--surface); border-radius: var(--radius-md); overflow: hidden; position: relative;
}
.skeleton::after {
  content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(0, 247, 255, 0.08), transparent);
  animation: shimmer 1.8s infinite;
}
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
.sk-img { aspect-ratio: 16/10; background: var(--void); }
.sk-text { height: 16px; width: 75%; margin: 18px; border-radius: 6px; background: var(--void); }
.sk-sub { height: 10px; width: 50%; margin: 0 18px 18px; border-radius: 4px; background: var(--void); }

/* ✨ TOAST */
.toast {
  position: fixed; bottom: 26px; right: 26px; background: var(--glass-heavy); border: 1px solid var(--cyan);
  color: var(--cyan); padding: 14px 22px; border-radius: var(--radius-md); font-size: 13px; font-weight: 600;
  z-index: 10000; display: flex; align-items: center; gap: 10px; box-shadow: var(--glow-2);
  transform: translateY(120px); opacity: 0; transition: all 0.45s var(--ease-spring);
  backdrop-filter: blur(16px);
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast i { font-size: 16px; }

/* ✨ RESPONSIVE */
@media (max-width: 1024px) {
  .modal-content { flex-direction: column; max-height: 90vh; }
  .modal-image { height: 50vh; flex: none; }
  .modal-info { padding: 22px; overflow-y: auto; }
  .grid-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .app-wrapper { padding: calc(var(--nav-h) + 12px) 14px 24px; }
  .navbar { padding: 0 16px; }
  .brand { font-size: 16px; letter-spacing: 1.5px; }
  .hero { padding: var(--space-lg) var(--space-xs) var(--space-md); }
  .hero-title { letter-spacing: 2px; }
  .grid-container { grid-template-columns: 1fr; }
  .card:hover { transform: none; }
  .card-actions { opacity: 1; transform: none; }
  .modal-content { border-radius: var(--radius-md); }
  .toast { right: 16px; bottom: 16px; padding: 12px 18px; font-size: 12px; }
}
@media (max-width: 480px) {
  .hero-sub { font-size: 12px; letter-spacing: 4px; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .search-box { min-width: 0; }
  .filter-chips { justify-content: flex-start; }
}

/* ✨ SCROLLBAR & SELECTION */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: var(--deep); }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--cyan), var(--blue)); border-radius: 6px; border: 2px solid var(--deep); box-shadow: var(--glow-1); }
::-webkit-scrollbar-thumb:hover { box-shadow: var(--glow-2); }
::selection { background: rgba(0, 215, 255, 0.35); color: var(--text-1); }

/* ✨ UTILS */
.hidden { display: none !important; }
.fade-in { animation: fadeIn 0.35s var(--ease-out) forwards; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="aurora"></div>
<div class="scanline"></div>

<div class="app-wrapper">
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-btn" title="Kembali"><i class="fas fa-arrow-left"></i></a>
      <div class="brand">⚡ FOTO GALLERY</div>
    </div>
    <div class="nav-actions">
      <button class="nav-btn" id="themeBtn" title="Toggle Tema"><i class="fas fa-moon"></i></button>
      <button class="nav-btn" id="favBtn" title="Favorit"><i class="fas fa-heart"></i></button>
    </div>
  </nav>

  <header class="hero">
    <h1 class="hero-title">LINE TOGEL</h1>
    <p class="hero-sub">CYBER PORTAL 2026</p>
    <div class="status-pill"><span class="status-dot"></span> SYSTEM ONLINE</div>
  </header>

  <main class="gallery">
    <div class="toolbar">
      <div style="position:relative; flex:1; min-width:200px;">
        <input type="search" class="search-box" id="search" placeholder="Cari judul foto..." aria-label="Cari foto">
        <i class="fas fa-search search-icon"></i>
      </div>
      <div class="filter-chips" id="filters">
        <button class="chip active" data-filter="all">🔹 Semua</button>
        <button class="chip" data-filter="favorites">⭐ Favorit</button>
        <button class="chip" data-filter="recent">🕐 Terbaru</button>
      </div>
    </div>

    <div class="skeleton-grid" id="skeletons">
      <div class="skeleton"><div class="sk-img"></div><div class="sk-text"></div><div class="sk-sub"></div></div>
      <div class="skeleton"><div class="sk-img"></div><div class="sk-text"></div><div class="sk-sub"></div></div>
      <div class="skeleton"><div class="sk-img"></div><div class="sk-text"></div><div class="sk-sub"></div></div>
    </div>

    <div class="grid-container" id="grid" style="display:none;"></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true">
  <div class="modal-content">
    <div class="modal-image">
      <img src="" alt="" id="modalImg" onclick="this.classList.toggle('zoomed')">
    </div>
    <div class="modal-info">
      <div>
        <div class="modal-header">
          <h3 class="modal-title" id="modalTitle">-</h3>
          <button class="modal-close" id="modalClose"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="info-list">
          <div class="info-row"><span class="info-label">Format</span><span class="info-value" id="mFmt">-</span></div>
          <div class="info-row"><span class="info-label">Ukuran</span><span class="info-value" id="mSize">-</span></div>
          <div class="info-row"><span class="info-label">ID Foto</span><span class="info-value" id="mId">-</span></div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn" onclick="copyImg()"><i class="fas fa-copy"></i> Copy</button>
        <button class="modal-btn" onclick="dlImg()"><i class="fas fa-download"></i> Unduh</button>
        <button class="modal-btn" onclick="shareImg()"><i class="fas fa-share-nodes"></i> Bagikan</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><i class="fas fa-bolt"></i><span id="txt">Siap</span></div>

<script>
// ✨ STATE
const S = { photos: [], favs: JSON.parse(localStorage.getItem('ltg_favs')||'[]'), theme: localStorage.getItem('ltg_theme')||'dark', filter: 'all', q: '', cur: null };
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const delay = ms => new Promise(r => setTimeout(r, ms));

// ✨ INIT
document.addEventListener('DOMContentLoaded', () => {
  setTheme(S.theme);
  fetchPhotos();
  setupUI();
  setupKeys();
});

// ✨ THEME
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  S.theme = t;
  localStorage.setItem('ltg_theme', t);
  $('#themeBtn').innerHTML = t === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
}
$('#themeBtn').onclick = () => setTheme(S.theme === 'dark' ? 'light' : 'dark');

// ✨ UI SETUP
function setupUI() {
  // Filters
  $$('#filters .chip').forEach(c => c.onclick = e => {
    $$('#filters .chip').forEach(x => x.classList.remove('active'));
    e.currentTarget.classList.add('active');
    S.filter = e.currentTarget.dataset.filter;
    render();
  });
  // Search
  $('#search').oninput = e => { S.q = e.target.value.toLowerCase(); render(); };
  // Fav Toggle
  $('#favBtn').onclick = () => {
    if(S.favs.length === 0) return toast('⭐ Belum ada favorit');
    const chips = $$('#filters .chip');
    chips.forEach(c => c.classList.remove('active'));
    chips[1].classList.add('active');
    S.filter = 'favorites';
    render();
  };
  // Modal Close
  $('#modalClose').onclick = closeModal;
  $('#modal').onclick = e => e.target === $('#modal') && closeModal();
}

// ✨ FETCH
async function fetchPhotos() {
  try {
    const res = await fetch('https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/gviz/tq?tqx=out:json&gid=1246502038&range=C2:D150');
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));
    S.photos = json.table.rows
      .filter(r => r.c?.[0]?.v && r.c?.[1]?.v)
      .map((r, i) => ({ id: i+2, title: r.c[0].v, url: r.c[1].v, ts: Date.now() - i*60000 }));
    await delay(600); // simulate network
    $('#skeletons').style.display = 'none';
    $('#grid').style.display = 'grid';
    render();
    toast(`⚡ ${S.photos.length} foto siap`);
  } catch(e) {
    $('#skeletons').innerHTML = `<div class="sk-text" style="grid-column:1/-1;text-align:center;color:var(--text-3)">Gagal memuat data</div>`;
    toast('❗ Koneksi error');
  }
}

// ✨ RENDER
function render() {
  let list = S.photos;
  if(S.filter === 'favorites') list = list.filter(p => S.favs.includes(p.url));
  if(S.filter === 'recent') list = [...list].sort((a,b) => b.ts - a.ts).slice(0, 24);
  if(S.q) list = list.filter(p => p.title.toLowerCase().includes(S.q));
  
  const grid = $('#grid');
  grid.innerHTML = '';
  if(!list.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-3)"><i class="fas fa-search" style="font-size:48px;margin-bottom:18px;opacity:0.5"></i><h3 style="font-family:var(--font-display);margin-bottom:8px">Tidak ditemukan</h3><p>Coba kata kunci lain</p></div>`;
    return;
  }
  list.forEach((p, i) => {
    const isFav = S.favs.includes(p.url);
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i*0.06, 0.5)}s`;
    card.innerHTML = `
      <div class="card-media" onclick="openModal('${p.url}','${p.title.replace(/'/g,"\\'")}',${p.id})">
        <img src="${p.url}" alt="${p.title}" loading="lazy" decoding="async" onerror="this.src='https://via.placeholder.com/640x400/020b18/00d4ff?text=No+Image'">
        <div class="card-overlay"></div>
        <div class="card-content">
          <div class="card-title">${p.title}</div>
          <div class="card-meta"><i class="fas fa-hashtag"></i> ${p.id} <span>•</span> ${new Date(p.ts).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})}</div>
        </div>
        <div class="card-actions">
          <button class="act-btn ${isFav?'active':''}" onclick="toggleFav('${p.url}',this)"><i class="fas fa-heart"></i></button>
          <button class="act-btn" onclick="copyImgDirect('${p.url}')"><i class="fas fa-copy"></i></button>
          <button class="act-btn" onclick="dlDirect('${p.url}','${p.title.replace(/'/g,"\\'")}')"><i class="fas fa-download"></i></button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ✨ FAVORITES
function toggleFav(url, btn) {
  const i = S.favs.indexOf(url);
  if(i > -1) { S.favs.splice(i,1); btn.classList.remove('active'); toast('Hapus favorit'); }
  else { S.favs.push(url); btn.classList.add('active'); toast('⭐ Ditambahkan favorit'); }
  localStorage.setItem('ltg_favs', JSON.stringify(S.favs));
  if(S.filter === 'favorites') render();
}

// ✨ MODAL
let curImg='', curTitle='', curId='';
function openModal(url, title, id) {
  curImg=url; curTitle=title; curId=id;
  $('#modalTitle').textContent = title;
  $('#modalImg').src = url;
  $('#modalImg').classList.remove('zoomed');
  $('#mFmt').textContent = url.split('.').pop().toUpperCase() || 'JPG';
  $('#mId').textContent = `#${id}`;
  $('#mSize').textContent = '...';
  $('#modal').classList.add('active');
  document.body.style.overflow = 'hidden';
  
  fetch(url).then(r=>r.blob()).then(b=> $('#mSize').textContent = (b.size/1024).toFixed(1)+' KB');
}
function closeModal() {
  $('#modal').classList.remove('active');
  document.body.style.overflow = '';
  curImg=curTitle=curId='';
}

// ✨ ACTIONS
async function copyImgDirect(url) {
  try { const b = await(await fetch(url)).blob(); await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]); toast('✅ Disalin'); }
  catch { toast('❗ Klik kanan gambar > Copy'); }
}
async function copyImg() { if(curImg) await copyImgDirect(curImg); }
function dlDirect(url, title) {
  const a = document.createElement('a'); a.href=url; a.download=`${title.replace(/[^a-z0-9]/gi,'_')}_${Date.now()}.jpg`; a.target='_blank';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); toast('⚡ Mengunduh...');
}
function dlImg() { if(curImg) dlDirect(curImg, curTitle); }
async function shareImg() {
  if(curImg) {
    if(navigator.share) {
      try {
        const b = await(await fetch(curImg)).blob();
        await navigator.share({title:curTitle, text:'Lihat foto ini:', files:[new File([b],`${curTitle}.jpg`,{type:b.type})]});
        toast('🔗 Dibagikan');
      } catch(e) { if(e.name!=='AbortError') toast('❗ Gagal'); }
    } else { await copyImgDirect(curImg); toast('✅ Link disalin'); }
  }
}

// ✨ TOAST
function toast(msg) {
  $('#txt').textContent = msg;
  $('#toast').classList.add('show');
  setTimeout(()=> $('#toast').classList.remove('show'), 3500);
}

// ✨ KEYS
function setupKeys() {
  document.onkeydown = e => {
    if(e.key==='Escape') closeModal();
    if(e.ctrlKey && e.key==='k') { e.preventDefault(); $('#search').focus(); }
  };
}
</script>
</body>
</html>

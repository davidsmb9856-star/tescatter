/* ═══════════════════════════════════════════════════════════════ */
/* ✨✨ ULTRA NEXT-GEN CSS VARIABLES SYSTEM ✨✨ */
/* ═══════════════════════════════════════════════════════════════ */
:root {
/* 🎨 Dynamic Color System */
--color-primary: #00f7ff;
--color-primary-glow: rgba(0, 247, 255, 0.6);
--color-secondary: #9d4fff;
--color-secondary-glow: rgba(157, 79, 255, 0.5);
--color-accent: #ff00d4;
--color-accent-glow: rgba(255, 0, 212, 0.5);
--color-success: #00ff9d;
--color-warning: #ffd700;
--color-error: #ff4757;

/* 🌙 Dark Theme Base */
--bg-base: #000105;
--bg-surface: rgba(5, 14, 35, 0.92);
--bg-surface-elevated: rgba(10, 28, 62, 0.88);
--bg-surface-glass: rgba(8, 22, 48, 0.75);
--bg-overlay: rgba(0, 3, 10, 0.85);

/* ☀️ Light Theme Override (auto-applied) */
@media (prefers-color-scheme: light) {
:root {
--bg-base: #f8fafc;
--bg-surface: rgba(255, 255, 255, 0.92);
--bg-surface-elevated: rgba(248, 250, 252, 0.95);
--bg-surface-glass: rgba(255, 255, 255, 0.85);
--bg-overlay: rgba(240, 245, 255, 0.9);
--color-primary: #00c7ff;
--text-primary: #0f172a;
--text-secondary: #475569;
}
}

/* 📝 Text System */
--text-primary: #ffffff;
--text-secondary: #a8d8ff;
--text-tertiary: #6b89b8;
--text-muted: #4a5f8a;
--text-inverse: #0f172a;

/* ✨ Glow & Shadow System */
--glow-xs: 0 0 10px var(--color-primary-glow);
--glow-sm: 0 0 20px var(--color-primary-glow), 0 0 40px rgba(0, 247, 255, 0.25);
--glow-md: 0 0 30px var(--color-primary-glow), 0 0 60px rgba(0, 247, 255, 0.35), 0 0 100px rgba(0, 247, 255, 0.2);
--glow-lg: 0 0 45px var(--color-primary-glow), 0 0 90px rgba(0, 247, 255, 0.45), 0 0 160px rgba(0, 247, 255, 0.3);
--glow-xl: 0 0 60px var(--color-primary-glow), 0 0 120px rgba(0, 247, 255, 0.55), 0 0 220px rgba(0, 247, 255, 0.4);

--shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.15);
--shadow-md: 0 8px 24px rgba(0, 0, 0, 0.25);
--shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.35);
--shadow-xl: 0 24px 80px rgba(0, 0, 0, 0.45);

/* 🎭 Border System */
--border-subtle: rgba(0, 247, 255, 0.25);
--border-normal: rgba(0, 247, 255, 0.45);
--border-intense: rgba(0, 247, 255, 0.75);

/* 📐 Spacing & Layout */
--space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
--space-5: 20px; --space-6: 24px; --space-7: 32px; --space-8: 40px;
--space-9: 48px; --space-10: 64px;

--radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px;
--radius-xl: 28px; --radius-2xl: 36px; --radius-full: 999px;

/* 🎬 Animation System */
--ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
--ease-enter: cubic-bezier(0, 0, 0.2, 1);
--ease-exit: cubic-bezier(0.4, 0, 1, 1);
--ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
--ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);

--duration-fast: 150ms;
--duration-normal: 300ms;
--duration-slow: 500ms;
--duration-slower: 700ms;

/* 🔧 Feature Flags */
--supports-container: true;
--supports-has: true;
--supports-scroll-anim: true;
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨✨ BASE RESET & FOUNDATION ✨✨ */
/* ═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { 
scroll-behavior: smooth; 
scroll-padding-top: var(--space-7);
color-scheme: dark light;
}
@media (prefers-reduced-motion: reduce) {
*, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
}

body {
font-family: 'Space Grotesk', 'JetBrains Mono', system-ui, -apple-system, sans-serif;
background: var(--bg-base);
color: var(--text-primary);
min-height: 100vh;
min-height: 100dvh;
overflow-x: hidden;
line-height: 1.6;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;

}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨✨ ADVANCED BACKGROUND SYSTEM ✨✨ */
/* ═══════════════════════════════════════════════════════════════ */

/* 🌌 Mesh Gradient Background */
.bg-mesh {
position: fixed; inset: 0; z-index: -4;
background: 
radial-gradient(at 15% 25%, rgba(0, 247, 255, 0.15) 0%, transparent 55%),
radial-gradient(at 85% 20%, rgba(157, 79, 255, 0.12) 0%, transparent 55%),
radial-gradient(at 50% 90%, rgba(255, 0, 212, 0.10) 0%, transparent 60%),
radial-gradient(at 25% 70%, rgba(0, 255, 157, 0.08) 0%, transparent 65%),
radial-gradient(at 75% 50%, rgba(255, 215, 0, 0.06) 0%, transparent 70%);
animation: meshDrift 35s ease-in-out infinite alternate;
will-change: transform;
}
@keyframes meshDrift {
0%, 100% { transform: translate(0, 0) scale(1); filter: hue-rotate(0deg) brightness(1); }
25% { transform: translate(1.5%, -1%) scale(1.02); filter: hue-rotate(12deg) brightness(1.03); }
50% { transform: translate(-1%, 1.5%) scale(0.99); filter: hue-rotate(-8deg) brightness(0.98); }
75% { transform: translate(1%, 1%) scale(1.01); filter: hue-rotate(5deg) brightness(1.01); }
}

/* 🌀 Animated Grid Pattern */
.bg-grid {
position: fixed; inset: 0; z-index: -3;
background-image:
linear-gradient(rgba(0, 247, 255, 0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 247, 255, 0.05) 1px, transparent 1px),
repeating-linear-gradient(45deg, rgba(157, 79, 255, 0.025) 0, rgba(157, 79, 255, 0.025) 1px, transparent 1px, transparent 50px);
background-size: 48px 48px, 48px 48px, 140px 140px;
mask-image: radial-gradient(ellipse 85% 75% at 50% 50%, black 15%, transparent 90%);
animation: gridFlow 40s linear infinite;
opacity: 0.85;
will-change: background-position;
}
@keyframes gridFlow {
0% { background-position: 0 0, 0 0, 0 0; }
100% { background-position: 48px 48px, 48px 48px, 140px 140px; }
}

/* 🌊 Fluid Aurora Waves */
.bg-aurora {
position: fixed; inset: -50%; z-index: -2; pointer-events: none; overflow: hidden;
}
.aurora-wave {
position: absolute; inset: 0;
background: conic-gradient(from 0deg at 50% 50%,
rgba(0, 247, 255, 0.08) 0deg,
rgba(157, 79, 255, 0.08) 90deg,
rgba(255, 0, 212, 0.06) 180deg,
rgba(0, 255, 157, 0.06) 270deg,
rgba(0, 247, 255, 0.08) 360deg);
filter: blur(80px) saturate(1.2);
animation: auroraSpin 45s linear infinite;
opacity: 0.6;
transform-origin: center;
}
.aurora-wave:nth-child(2) {
animation-duration: 65s; animation-direction: reverse; opacity: 0.4; filter: blur(120px);
}
@keyframes auroraSpin {
to { transform: rotate(360deg) scale(1.1); }
}

/* ✨ Particle System */
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; contain: strict; }
.particle {
position: absolute; width: var(--size, 3px); height: var(--size, 3px);
border-radius: 50%; opacity: 0; will-change: transform, opacity;
animation: particleFloat var(--duration, 25s) infinite ease-in-out;
}
.particle.active { opacity: var(--opacity, 0.85); }
.particle.cyan { background: var(--color-primary); box-shadow: 0 0 12px var(--color-primary), 0 0 28px rgba(0, 247, 255, 0.5); }
.particle.purple { background: var(--color-secondary); box-shadow: 0 0 12px var(--color-secondary), 0 0 28px rgba(157, 79, 255, 0.5); }
.particle.pink { background: var(--color-accent); box-shadow: 0 0 12px var(--color-accent), 0 0 28px rgba(255, 0, 212, 0.5); }
.particle.green { background: var(--color-success); box-shadow: 0 0 12px var(--color-success), 0 0 28px rgba(0, 255, 157, 0.5); }
@keyframes particleFloat {
0%, 100% { transform: translateY(100vh) rotate(0deg) scale(0.6); opacity: 0; }
10%, 90% { opacity: var(--opacity, 0.85); }
100% { transform: translateY(-100vh) rotate(720deg) scale(1.3); opacity: 0; }
}

/* ⚡ Lightning Effect */
.lightning { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
.lightning-bolt {
position: absolute; top: -100vh; width: 2px; height: 200vh;
background: linear-gradient(180deg, transparent, var(--color-primary), var(--color-secondary), var(--color-accent), transparent);
filter: blur(2px) brightness(1.3); opacity: 0;
animation: lightningFlash 14s infinite;
box-shadow: 0 0 30px var(--color-primary), 0 0 60px rgba(0, 247, 255, 0.4);
}
.lightning-bolt:nth-child(1) { left: 18%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 5s; }
.lightning-bolt:nth-child(3) { left: 82%; animation-delay: 10s; }
@keyframes lightningFlash {
0%, 87%, 89%, 91%, 100% { opacity: 0; transform: scaleY(0.4) translateY(-15%); }
88%, 90% { opacity: 0.28; transform: scaleY(1) translateY(0); }
}

/* 📺 CRT Scanline */
.scanline {
position: fixed; left: 0; right: 0; height: 3px;
background: linear-gradient(90deg, transparent, var(--color-primary), var(--color-secondary), transparent);
opacity: 0.45; animation: scanMove 7s linear infinite;
z-index: 50; pointer-events: none; filter: blur(1px);
box-shadow: 0 0 25px var(--color-primary);
}
@keyframes scanMove {
0% { top: -10px; opacity: 0; }
5%, 95% { opacity: 0.45; }
100% { top: 100%; opacity: 0; }
}

/* 🎞️ Noise Texture */
.noise {
position: fixed; inset: 0; z-index: 5; opacity: 0.03; pointer-events: none;
background-image: url("image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
animation: noiseShift 0.6s steps(8) infinite;
}
@keyframes noiseShift {
0%, 100% { transform: translate(0, 0); }
25% { transform: translate(-1px, 1px); }
50% { transform: translate(2px, -1px); }
75% { transform: translate(-1px, -2px); }
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨✨ LAYOUT & CONTAINER ✨✨ */
/* ═══════════════════════════════════════════════════════════════ */
.container {
max-width: 1440px; margin: 0 auto; padding: var(--space-7) var(--space-4);
min-height: 100vh; min-height: 100dvh; position: relative;
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨✨ HEADER SYSTEM ✨✨ */
/* ═══════════════════════════════════════════════════════════════ */
.header {
text-align: center; margin-bottom: var(--space-10);
animation: headerReveal var(--duration-slower) var(--ease-bounce) backwards;
position: relative; padding-bottom: var(--space-8);
}
.header::after {
content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
width: 260px; height: 3px;
background: linear-gradient(90deg, transparent, var(--color-primary), var(--color-secondary), var(--color-accent), transparent);
border-radius: 2px; box-shadow: var(--glow-lg);
animation: glowPulse 3.5s ease-in-out infinite;
}
@keyframes headerReveal {
from { opacity: 0; transform: translateY(-35px) scale(0.98); }
to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes glowPulse {
0%, 100% { opacity: 0.85; box-shadow: var(--glow-lg); }
50% { opacity: 1; box-shadow: 0 0 55px rgba(0, 247, 255, 0.95), 0 0 110px rgba(0, 247, 255, 0.65), 0 0 200px rgba(0, 247, 255, 0.4); }
}

/* 🔙 Back Button */
.back-btn {
position: fixed; left: var(--space-4); top: var(--space-4); z-index: 1000;
display: inline-flex; align-items: center; gap: var(--space-2);
padding: var(--space-2) var(--space-4);
background: var(--bg-surface-glass); border: 1px solid var(--border-normal);
border-radius: var(--radius-full); color: var(--color-primary);
font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;
text-decoration: none; letter-spacing: 0.5px;
backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
box-shadow: var(--glow-sm); transition: all var(--duration-normal) var(--ease-standard);
contain: layout style;
}
.back-btn:hover, .back-btn:focus {
background: var(--bg-surface-elevated); border-color: var(--color-primary);
transform: translateX(-4px) scale(1.04); box-shadow: var(--glow-md);
color: var(--bg-base); outline: none;
}
.back-btn:active { transform: translateX(-2px) scale(1.02); }
.back-btn i { font-size: 13px; transition: transform var(--duration-fast); }
.back-btn:hover i { transform: translateX(-2px); }

/* ═══════════════════════════════════════════════════════════════ */
/* ✨✨ TYPOGRAPHY SYSTEM ✨✨ */
/* ═══════════════════════════════════════════════════════════════ */
.title {
font-family: 'Orbitron', 'Space Grotesk', sans-serif;
font-size: clamp(34px, 9vw, 62px); font-weight: 900; letter-spacing: 7px;
margin-bottom: var(--space-3); position: relative;
background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 35%, #ffffff 50%, var(--color-secondary) 65%, var(--color-accent) 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
text-shadow: 0 0 45px rgba(0, 247, 255, 0.7);
animation: titleShimmer 3.5s ease-in-out infinite, titleFloat 6s ease-in-out infinite;
will-change: filter, transform;
}
@keyframes titleShimmer {
0%, 100% { filter: brightness(1) contrast(1); }
50% { filter: brightness(1.5) contrast(1.05); }
}
@keyframes titleFloat {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-5px); }
}

.subtitle {
font-size: 12px; color: var(--text-secondary); letter-spacing: 8px;
text-transform: uppercase; margin-bottom: var(--space-4); font-weight: 600;
text-shadow: 0 0 14px rgba(0, 247, 255, 0.5); font-family: 'Orbitron', sans-serif;
}

/* 📊 Status Badge */
.status-badge {
display: inline-flex; align-items: center; gap: var(--space-3);
padding: var(--space-2) var(--space-6);
background: rgba(0, 255, 157, 0.18); border: 1px solid rgba(0, 255, 157, 0.6);
border-radius: var(--radius-full); font-size: 11px; font-weight: 700;
color: var(--color-success); text-transform: uppercase; letter-spacing: 3px;
animation: statusPulse 2.4s ease-in-out infinite; box-shadow: var(--glow-green);
font-family: 'Orbitron', sans-serif;
}
@keyframes statusPulse {
0%, 100% { box-shadow: 0 0 22px rgba(0, 255, 157, 0.45); }
50% { box-shadow: 0 0 45px rgba(0, 255, 157, 0.8); }
}
.status-dot {
width: 10px; height: 10px; background: var(--color-success); border-radius: 50%;
animation: dotBeat 1.5s ease-in-out infinite;
box-shadow: 0 0 20px var(--color-success), 0 0 40px rgba(0, 255, 157, 0.65);
}
@keyframes dotBeat {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.7); opacity: 0.85; }
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨✨ NAVIGATION ✨✨ */
/* ═══════════════════════════════════════════════════════════════ */
.nav-tabs {
display: flex; gap: var(--space-3); justify-content: center; margin-bottom: var(--space-7);
flex-wrap: wrap;
}
.nav-tab {
padding: var(--space-3) var(--space-7);
background: var(--bg-surface); border: 1px solid var(--border-subtle);
border-radius: var(--radius-xl); color: var(--text-primary);
font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700;
cursor: pointer; transition: all var(--duration-normal) var(--ease-standard);
text-transform: uppercase; letter-spacing: 2px; backdrop-filter: blur(16px);
position: relative; overflow: hidden; display: inline-flex; align-items: center; gap: var(--space-2);
contain: layout style;
}
.nav-tab::before {
content: ''; position: absolute; inset: 0;
background: linear-gradient(135deg, rgba(0, 247, 255, 0.25), rgba(157, 79, 255, 0.2), rgba(255, 0, 212, 0.15));
opacity: 0; transition: opacity var(--duration-normal);
}
.nav-tab:hover, .nav-tab.active {
background: var(--bg-surface-elevated); border-color: var(--color-primary);
box-shadow: var(--glow-md); transform: translateY(-4px); color: var(--color-primary);
}
.nav-tab:hover::before, .nav-tab.active::before { opacity: 1; }
.nav-tab:active { transform: translateY(-2px); }
.nav-tab i { font-size: 14px; }

.section { display: none; animation: sectionFade var(--duration-slower) var(--ease-bounce); }
.section.active { display: block; }
@keyframes sectionFade {
from { opacity: 0; transform: translateY(35px); }
to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨✨ SEARCH SYSTEM ✨✨ */
/* ═══════════════════════════════════════════════════════════════ */
.search-wrapper {
max-width: 720px; margin: 0 auto var(--space-7); position: relative;
}
.search-box {
width: 100%; padding: var(--space-4) var(--space-14) var(--space-4) var(--space-6);
background: var(--bg-surface); border: 1px solid var(--border-normal);
border-radius: var(--radius-xl); color: var(--text-primary);
font-family: 'Space Grotesk', sans-serif; font-size: 15px;
transition: all var(--duration-normal) var(--ease-standard);
backdrop-filter: blur(16px); box-shadow: var(--glow-sm);
}
.search-box:focus {
outline: none; border-color: var(--color-primary);
box-shadow: var(--glow-md); background: var(--bg-surface-elevated);
}
.search-box::placeholder { color: var(--text-muted); }
.search-icon {
position: absolute; right: var(--space-5); top: 50%; transform: translateY(-50%);
color: var(--color-primary); font-size: 17px; pointer-events: none;
transition: color var(--duration-fast);
}
.search-box:focus + .search-icon { color: var(--color-secondary); }

/* ═══════════════════════════════════════════════════════════════ */
/* ✨✨ GALLERY GRID - BENTO STYLE ✨✨ */
/* ═══════════════════════════════════════════════════════════════ */
.gallery-section { margin-bottom: var(--space-10); }

.section-title {
font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700;
color: var(--text-primary); margin-bottom: var(--space-5); padding-bottom: var(--space-4);
border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: var(--space-4);
letter-spacing: 3px; position: relative;
}
.section-title::before {
content: ''; width: 5px; height: 26px;
background: linear-gradient(180deg, var(--color-primary), var(--color-secondary), var(--color-accent));
border-radius: 3px; box-shadow: 0 0 20px rgba(0, 247, 255, 0.8);
animation: barPulse 2.8s ease-in-out infinite;
}
@keyframes barPulse {
0%, 100% { opacity: 1; transform: scaleY(1); }
50% { opacity: 0.85; transform: scaleY(1.18); }
}

.gallery-grid {
display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
gap: var(--space-6);
}

/* ═══════════════════════════════════════════════════════════════ */
/* ✨✨ ULTRA PREMIUM PHOTO CARD ✨✨ */
/* ═══════════════════════════════════════════════════════════════ */
.photo-card {
background: var(--bg-surface); border: 1px solid var(--border-subtle);
border-radius: var(--radius-xl); overflow: hidden;
transition: all var(--duration-slow) var(--ease-bounce);
position: relative; backdrop-filter: blur(16px);
animation: cardEnter var(--duration-slower) ease forwards;
opacity: 0; transform: translateY(35px);
box-shadow: var(--shadow-lg); contain: layout style paint;
will-change: transform, box-shadow;
}
.photo-card::before {
content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none;
background: linear-gradient(135deg, rgba(0, 247, 255, 0.14), transparent 45%, transparent 55%, rgba(157, 79, 255, 0.14));
opacity: 0; transition: opacity var(--duration-normal);
}
.photo-card::after {
content: ''; position: absolute; inset: -3px; z-index: 0; pointer-events: none;
background: linear-gradient(45deg, var(--color-primary), var(--color-secondary), var(--color-accent), var(--color-primary));
border-radius: inherit; opacity: 0; transition: opacity var(--duration-normal);
filter: blur(24px);
}
.photo-card:hover::before { opacity: 1; }
.photo-card:hover::after { opacity: 0.4; }
.photo-card:hover {
transform: translateY(-10px) scale(1.03); border-color: var(--color-primary);
box-shadow: var(--glow-md), var(--shadow-xl);
}
.photo-card:nth-child(1) { animation-delay: 0.08s; }
.photo-card:nth-child(2) { animation-delay: 0.14s; }
.photo-card:nth-child(3) { animation-delay: 0.2s; }
.photo-card:nth-child(4) { animation-delay: 0.26s; }
.photo-card:nth-child(5) { animation-delay: 0.32s; }
@keyframes cardEnter { to { opacity: 1; transform: translateY(0); } }

.photo-wrapper {
position: relative; width: 100%; height: 310px;
background: radial-gradient(circle at center, #102a47 0%, #060f22 100%);
overflow: hidden; display: flex; align-items: center; justify-content: center;
}
.photo-wrapper::before {
content: ''; position: absolute; inset: 0; z-index: 2; pointer-events: none;
background: linear-gradient(180deg, transparent 55%, rgba(0, 3, 10, 0.55) 88%, rgba(0, 3, 10, 0.92));
}
.photo-wrapper::after {
content: ''; position: absolute; inset: 0; z-index: 3; pointer-events: none;
border: 1px solid rgba(0, 247, 255, 0.18); border-radius: inherit;
}
.photo-wrapper img {
width: 100%; height: 100%; object-fit: contain; display: block;
transition: all var(--duration-slow) var(--ease-standard);
filter: drop-shadow(0 7px 24px rgba(0, 0, 0, 0.4));
}
.photo-card:hover .photo-wrapper img {
transform: scale(1.09); filter: drop-shadow(0 12px 35px rgba(0, 247, 255, 0.5));
}

.photo-info { padding: var(--space-5); position: relative; z-index: 4; }
.photo-info::before {
content: ''; position: absolute; top: 0; left: var(--space-5); right: var(--space-5);
height: 1px; background: linear-gradient(90deg, transparent, rgba(0, 247, 255, 0.55), rgba(157, 79, 255, 0.55), transparent);
}

.photo-title {

text-align: center; text-shadow: 0 0 16px rgba(0, 247, 255, 0.7); line-height: 1.5;
}
.photo-meta {
font-size: 11px; color: var(--text-tertiary); text-align: center;
margin-bottom: var(--space-4); opacity: 0.94; font-weight: 500;
}

/* ✨ Action Buttons */
.action-row {
display: flex; gap: var(--space-3); justify-content: center; flex-wrap: wrap;
padding-top: var(--space-4); border-top: 1px solid var(--border-subtle);
}
.action-btn {
flex: 1; min-width: 82px; max-width: 105px; height: 52px;
background: linear-gradient(135deg, rgba(0, 247, 255, 0.24), rgba(0, 247, 255, 0.16));
border: 1px solid var(--border-normal); border-radius: var(--radius-md);
color: var(--color-primary); font-size: 11px; font-weight: 700; cursor: pointer;
transition: all var(--duration-normal) var(--ease-standard);
display: flex; flex-direction: column; align-items: center; justify-content: center;
gap: var(--space-1); text-transform: uppercase; letter-spacing: 0.8px;
backdrop-filter: blur(12px); position: relative; overflow: hidden;
font-family: 'Orbitron', sans-serif; contain: layout style;
}
.action-btn::before {

background: linear-gradient(135deg, rgba(0, 247, 255, 0.4), rgba(157, 79, 255, 0.32));
opacity: 0; transition: opacity var(--duration-fast);

.action-btn:hover {

border-color: var(--color-primary); transform: translateY(-5px) scale(1.09);

}
.action-btn:hover::before { opacity: 1; }
.action-btn:hover i { transform: translateY(-2px); }
.action-btn:active { transform: translateY(-2px) scale(1.04); }

.action-btn.copy-btn:hover {
background: linear-gradient(135deg, rgba(0, 255, 157, 0.52), rgba(0, 220, 135, 0.42));

.action-btn.download-btn:hover {

/* ═══════════════════════════════════════════════════════════════ */
/* ✨✨ LOADING SYSTEM ✨✨ */
/* ═══════════════════════════════════════════════════════════════ */
.loading {
display: none; text-align: center; padding: var(--space-10) var(--space-5);
grid-column: 1 / -1;
}
.loading.active { display: block; }
.loader {
width: 56px; height: 56px; margin: 0 auto var(--space-6);
border: 4px solid rgba(0, 247, 255, 0.28); border-top-color: var(--color-primary);
border-radius: 50%; animation: spin 1s linear infinite;
box-shadow: var(--glow-md); position: relative;
}
.loader::after {
content: ''; position: absolute; inset: -7px;
border: 3px solid transparent; border-top-color: var(--color-secondary);
border-radius: 50%; animation: spin 1.5s linear infinite reverse;
}
.loader::before {
content: ''; position: absolute; inset: -14px;
border: 2px solid transparent; border-top-color: var(--color-accent);
border-radius: 50%; animation: spin 2.2s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {

animation: textPulse 2.2s ease-in-out infinite;
}

.modal-backdrop {

@keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }

.modal-content {

<!-- ✨✨ JAVASCRIPT ✨✨ -->
<script>
// ═══════════════════════════════════════════════════════════════
// ✨✨ ULTRA NEXT-GEN GALLERY LOGIC ✨✨
// ═══════════════════════════════════════════════════════════════

let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';

// 🚀 Initialize
document.addEventListener('DOMContentLoaded', () => {
initParticles();
initKeyboardShortcuts();
initTouchGestures();
fetchPhotosFromSheet();
});

// ✨ Advanced Particle System
function initParticles() {
const container = document.getElementById('particles');
if (!container) return;
const colors = ['cyan', 'purple', 'pink', 'green'];
for(let i = 0; i < 80; i++) {
const p = document.createElement('div');
p.className = `particle ${colors[i % 4]}`;
p.style.left = Math.random() * 100 + '%';
p.style.top = Math.random() * 100 + '%';
p.style.setProperty('--size', (2 + Math.random() * 5) + 'px');
p.style.setProperty('--duration', (22 + Math.random() * 35) + 's');
p.style.setProperty('--opacity', (0.7 + Math.random() * 0.25).toFixed(2));
p.style.animationDelay = Math.random() * 35 + 's';
container.appendChild(p);
setTimeout(() => p.classList.add('active'), Math.random() * 2500);
}
}

// ⌨️ Keyboard Shortcuts
function initKeyboardShortcuts() {
document.addEventListener('keydown', e => {
if (e.key === 'Escape') closeModal();
if (e.ctrlKey && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput')?.focus(); }
if (e.ctrlKey && e.key === 'd' && currentImageUrl) { e.preventDefault(); downloadPhoto(currentImageUrl, currentImageTitle); }
});
}

// 👆 Touch Gesture Support
function initTouchGestures() {
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
touchStartX = e.touches[0].clientX;
touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
const dx = e.changedTouches[0].clientX - touchStartX;
const dy = e.changedTouches[0].clientY - touchStartY;
if (Math.abs(dx) > 50 && Math.abs(dy) < 30) {
if (dx > 0 && document.getElementById('imageModal').classList.contains('active')) closeModal();
}
}, { passive: true });
}

// 📡 Fetch Photos from Google Sheets
async function fetchPhotosFromSheet() {
const loading = document.getElementById('loading');
const grid = document.getElementById('galleryGrid');
loading.classList.add('active');
grid.innerHTML = '';
try {
const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';
let photos = [];
// Try GVIZ first
try {
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
const response = await fetch(gvizUrl, { cache: 'no-store' });
const text = await response.text();
const json = JSON.parse(text.substring(47).slice(0, -2));
photos = json.table.rows
.filter(row => row.c?.[0]?.v && row.c?.[1]?.v)
.map((row, i) => ({ judul: row.c[0].v, foto: row.c[1].v, index: i + 2 }));
} catch (e) {
// Fallback to CSV
const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
const csvText = await (await fetch(csvUrl, { cache: 'no-store' })).text();
photos = csvText.split('\n')
.map(row => row.split(',').map(cell => cell?.replace(/^"|"$/g, '').trim()))
.filter(row => row[0] && row[1])
.map((row, i) => ({ judul: row[0], foto: row[1], index: i + 2 }));
}
allPhotos = photos;
renderGallery(allPhotos);
showToast(`⚡ ${allPhotos.length} foto dimuat`);
} catch (error) {
console.error('Fetch error:', error);
showToast('❗ Gagal memuat foto');
grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:70px;color:var(--text-tertiary)">
<i class="fas fa-exclamation-triangle" style="font-size:56px;color:var(--color-accent);margin-bottom:24px;text-shadow:0 0 28px rgba(255,0,212,0.65)"></i>
<h3 style="font-family:'Orbitron';color:var(--color-primary);margin-bottom:14px;font-size:18px">Gagal Memuat</h3>
<p style="opacity:0.85">Periksa koneksi internet atau publikasi Google Sheets</p>
</div>`;
}
loading.classList.remove('active');
}

// 🎨 Render Gallery
function renderGallery(photos) {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';
if (!photos.length) {
grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:70px;color:var(--text-tertiary)">
<i class="fas fa-search" style="font-size:56px;margin-bottom:24px;opacity:0.65"></i>
<h3 style="font-family:'Orbitron';color:var(--color-primary);margin-bottom:14px;font-size:18px">Tidak Ditemukan</h3>
<p style="opacity:0.85">Coba kata kunci pencarian lain</p>
</div>`;
return;
}
photos.forEach((photo, idx) => {
grid.appendChild(createPhotoCard(photo.foto, photo.judul, idx));
});
}

// 🎴 Create Premium Photo Card
function createPhotoCard(url, title, index) {
const card = document.createElement('div');
card.className = 'photo-card';
card.setAttribute('role', 'listitem');
card.innerHTML = `
<div class="photo-wrapper">
<img src="${url}" alt="${title}" 
onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00f7ff?text=No+Image'" 
loading="lazy" decoding="async"
onclick="viewFullImage('${url}', '${title.replace(/'/g, "\\'")}')" 
style="cursor:pointer" aria-label="Lihat ${title}">
</div>
<div class="photo-info">
<div class="photo-title">${title}</div>
<div class="photo-meta">Foto #${index + 1}</div>
<div class="action-row">

// 🔍 Smart Search
function searchPhotos() {
const term = document.getElementById('searchInput').value.toLowerCase().trim();
const filtered = !term ? allPhotos : allPhotos.filter(p => p.judul.toLowerCase().includes(term));
renderGallery(filtered);
if (filtered.length && term) showToast(`⚡ ${filtered.length} hasil ditemukan`);
}

// 🖼️ Modal Functions
function viewFullImage(url, title) {
currentImageUrl = url;
currentImageTitle = title;
document.getElementById('modalTitle').textContent = title;
const modalImg = document.getElementById('modalImage');
modalImg.src = url;
modalImg.alt = title;
modalImg.loading = 'eager';
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
document.body.style.paddingRight = (window.innerWidth - document.documentElement.clientWidth) + 'px';
}
function closeModal() {
document.getElementById('imageModal').classList.remove('active');
document.body.style.overflow = '';
document.body.style.paddingRight = '';
currentImageUrl = currentImageTitle = '';
}

// 📋 Copy to Clipboard
async function copyPhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
showToast('✅ Foto disalin ke clipboard!');
} catch (err) {
console.warn('Clipboard API failed:', err);
showToast('❗ Klik kanan gambar > Copy Image');
}
}
async function copyImage() { if (currentImageUrl) await copyPhoto(currentImageUrl); }

// 💾 Download Photo
function downloadPhoto(url, filename) {
const a = document.createElement('a');
a.href = url;
a.download = `${filename.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`;
a.target = '_blank';
a.rel = 'noopener';
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
showToast('⚡ Download dimulai...');
}
function downloadModalImage() {
if (currentImageUrl && currentImageTitle) {
downloadPhoto(currentImageUrl, currentImageTitle);
}
}

// 🍞 Toast Notification
function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastText').textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 4200);
}

// ♿ Accessibility: Close modal on backdrop click
document.getElementById('imageModal')?.addEventListener('click', e => {
if (e.target.id === 'imageModal') closeModal();
});

// 🔄 PWA: Register Service Worker (if available)
if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {

});
}

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ✨ BLUE COOL SYSTEM ✨ */
:root {
--blue-100: #caf0f8;
--blue-200: #90e0ef;
--blue-300: #48cae4;
--blue-400: #00b4d8;
--blue-500: #0096c7;
--blue-600: #0077b6;
--blue-700: #023e8a;
--blue-800: #03045e;
--bg-base: #040814;
--bg-deep: #01030a;
--surface: rgba(12, 28, 52, 0.72);
--surface-hover: rgba(18, 42, 75, 0.85);
--glass: rgba(255, 255, 255, 0.04);
--text-main: #eaf4ff;
--text-muted: #8cb4d8;
--accent: #00e5ff;
--accent-soft: rgba(0, 229, 255, 0.15);
--accent-glow: rgba(0, 229, 255, 0.45);
--radius-md: 14px;
--radius-lg: 22px;
--radius-full: 100px;
--ease: cubic-bezier(0.22, 1, 0.36, 1);
--shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
--shadow-md: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 229, 255, 0.1);
--shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.55), 0 0 35px rgba(0, 229, 255, 0.2);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
background: var(--bg-base);
color: var(--text-main);
min-height: 100dvh;
overflow-x: hidden;
line-height: 1.55;
-webkit-font-smoothing: antialiased;
position: relative;
}

/* ✨ BACKGROUND MESH ✨ */
.bg-mesh { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
.orb {
position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35;
animation: orbFloat 18s ease-in-out infinite alternate;
}
.orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #0077b6, transparent 70%); top: -10%; left: -10%; }
.orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #00b4d8, transparent 70%); bottom: 15%; right: -8%; animation-delay: -6s; }
.orb-3 { width: 350px; height: 350px; background: radial-gradient(circle, #48cae4, transparent 70%); top: 40%; left: 35%; animation-delay: -12s; }
@keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(25px,-18px) scale(1.08)} }

/* ✨ LAYOUT ✨ */
.container { max-width: 1400px; margin: 0 auto; padding: 28px 24px 60px; }

/* ✨ HEADER ✨ */
.app-header {
display: flex; align-items: center; justify-content: space-between; gap: 16px;
padding: 16px 24px; margin-bottom: 32px;
background: var(--surface); border: 1px solid rgba(0, 229, 255, 0.12);
border-radius: var(--radius-lg); backdrop-filter: blur(16px);
box-shadow: var(--shadow-sm); position: sticky; top: 16px; z-index: 50;
}
.brand {
font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700;
letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
}
.brand span { color: var(--accent); text-shadow: 0 0 12px var(--accent-glow); }
.tag { font-size: 11px; background: var(--accent-soft); color: var(--accent); padding: 3px 8px; border-radius: 6px; font-weight: 600; }
.header-actions { display: flex; gap: 10px; }
.icon-btn {
width: 40px; height: 40px; border-radius: var(--radius-md); background: var(--glass);
border: 1px solid rgba(0, 229, 255, 0.18); color: var(--blue-300); cursor: pointer;
display: flex; align-items: center; justify-content: center; transition: all 0.3s var(--ease);
}
.icon-btn:hover, .icon-btn.active {
background: var(--accent-soft); border-color: var(--accent); color: var(--accent);
box-shadow: 0 0 18px rgba(0, 229, 255, 0.3); transform: translateY(-2px);
}

/* ✨ SEARCH & STATS ✨ */
.search-bar {
display: flex; align-items: center; justify-content: space-between; gap: 16px;
margin-bottom: 28px; flex-wrap: wrap;
}
.search-input-wrap {
position: relative; flex: 1; min-width: 260px; max-width: 480px;
}
.search-input-wrap i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); transition: color 0.3s; }
.search-input {
width: 100%; padding: 14px 18px 14px 46px; background: var(--surface);
border: 1px solid rgba(0, 229, 255, 0.2); border-radius: var(--radius-full);
color: var(--text-main); font-size: 15px; transition: all 0.3s var(--ease);
}
.search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.15); background: var(--surface-hover); }
.search-input:focus + i, .search-input-wrap:hover i { color: var(--accent); }
.stats { font-size: 14px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.stats span { color: var(--accent); font-weight: 600; }

/* ✨ GALLERY GRID ✨ */
.gallery-grid {
display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
gap: 20px; perspective: 1200px;
}
.photo-card {
background: var(--surface); border: 1px solid rgba(0, 229, 255, 0.15);
border-radius: var(--radius-lg); overflow: hidden; position: relative;
transition: all 0.45s var(--ease); transform: translateY(12px); opacity: 0;
animation: cardIn 0.6s var(--ease) forwards; box-shadow: var(--shadow-sm);
}
.photo-card:nth-child(1){animation-delay:0.05s} .photo-card:nth-child(2){animation-delay:0.1s}
.photo-card:nth-child(3){animation-delay:0.15s} .photo-card:nth-child(4){animation-delay:0.2s}
.photo-card:nth-child(5){animation-delay:0.25s} .photo-card:nth-child(6){animation-delay:0.3s}
@keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

.photo-card:hover {
transform: translateY(-6px) scale(1.015); border-color: var(--accent);
box-shadow: var(--shadow-lg); background: var(--surface-hover);
}
.img-wrap {
position: relative; width: 100%; padding-top: 65%; overflow: hidden; cursor: pointer;
background: linear-gradient(135deg, #0a1f38, #050e1a);
}
.img-wrap img {
width: 100%; height: 100%; position: absolute; top: 0; left: 0; object-fit: cover;
transition: transform 0.5s var(--ease); display: block;
}
.photo-card:hover .img-wrap img { transform: scale(1.06); }
.overlay {
position: absolute; inset: 0; background: linear-gradient(180deg, transparent 40%, rgba(3, 4, 10, 0.85) 100%);
display: flex; flex-direction: column; justify-content: flex-end; padding: 18px; opacity: 0;
transition: opacity 0.35s var(--ease);
}
.photo-card:hover .overlay { opacity: 1; }
.card-title { font-weight: 700; font-size: 16px; margin-bottom: 8px; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
.card-meta { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.meta-tag { font-size: 12px; background: rgba(0, 229, 255, 0.2); color: var(--blue-200); padding: 4px 10px; border-radius: 20px; backdrop-filter: blur(6px); }
.fav-btn {
width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.15);
border: 1px solid rgba(255,255,255,0.3); color: #fff; cursor: pointer;
display: flex; align-items: center; justify-content: center; transition: all 0.3s var(--ease);
backdrop-filter: blur(4px); margin-left: auto;
}
.fav-btn:hover, .fav-btn.active { background: var(--accent); color: var(--bg-deep); border-color: var(--accent); box-shadow: 0 0 16px var(--accent-glow); transform: scale(1.15); }

/* ✨ LOADER ✨ */
.loader { text-align: center; padding: 60px 20px; grid-column: 1/-1; }
.spinner {
width: 32px; height: 32px; border: 3px solid rgba(0, 229, 255, 0.25);
border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite;
margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 14px; color: var(--text-muted); letter-spacing: 1px; }

/* ✨ MODAL ✨ */
.modal-backdrop {
position: fixed; inset: 0; background: rgba(4, 8, 20, 0.92); backdrop-filter: blur(14px);
z-index: 1000; display: none; align-items: center; justify-content: center; padding: 24px;
animation: fade 0.3s var(--ease);
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.modal-backdrop.active { display: flex; }
.modal-box {
background: var(--surface); border: 1px solid rgba(0, 229, 255, 0.25);
border-radius: var(--radius-lg); max-width: 900px; width: 100%; overflow: hidden;
box-shadow: var(--shadow-lg); animation: slideUp 0.45s var(--ease);
}
@keyframes slideUp { from { transform: translateY(30px) scale(0.98); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
.modal-img-wrap {
width: 100%; background: #020610; display: flex; align-items: center; justify-content: center;
padding: 20px; cursor: zoom-in;
}
.modal-img { max-width: 100%; max-height: 60vh; border-radius: var(--radius-md); object-fit: contain; transition: transform 0.3s var(--ease); }
.modal-img.zoomed { transform: scale(1.8); }
.modal-info { padding: 20px 24px; border-top: 1px solid rgba(0, 229, 255, 0.15); }
.modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 20px; margin-bottom: 6px; }
.modal-detail { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
padding: 10px 18px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600;
cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px;
transition: all 0.3s var(--ease);
}
.btn-primary { background: var(--accent); color: var(--bg-deep); box-shadow: 0 4px 12px rgba(0, 229, 255, 0.3); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0, 229, 255, 0.45); }
.btn-ghost { background: transparent; border: 1px solid rgba(0, 229, 255, 0.3); color: var(--blue-200); }
.btn-ghost:hover { background: rgba(0, 229, 255, 0.1); border-color: var(--accent); }

/* ✨ TOAST ✨ */
.toast {
position: fixed; bottom: 24px; right: 24px; background: var(--surface);
border: 1px solid var(--accent); color: var(--text-main); padding: 14px 20px;
border-radius: var(--radius-md); font-weight: 600; display: flex; align-items: center; gap: 10px;
box-shadow: var(--shadow-md); transform: translateY(100px); opacity: 0;
transition: all 0.4s var(--ease); z-index: 2000; backdrop-filter: blur(12px);
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ✨ RESPONSIVE ✨ */
@media (max-width: 768px) {
.container { padding: 16px 12px 40px; }
.app-header { flex-direction: column; align-items: stretch; gap: 12px; padding: 14px 16px; }
.header-actions { justify-content: flex-end; }
.search-bar { flex-direction: column; align-items: stretch; }
.search-input-wrap { max-width: 100%; }
.gallery-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
.photo-card { border-radius: var(--radius-md); }
.img-wrap { padding-top: 70%; }
.modal-box { border-radius: var(--radius-md); max-width: 95%; }
.modal-img { max-height: 50vh; }
}
@media (max-width: 480px) {
.gallery-grid { grid-template-columns: 1fr; }
.img-wrap { padding-top: 60%; }
.brand { font-size: 20px; }
}

/* ✨ UTILS & FOCUS ✨ */
.hidden { display: none !important; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
::selection { background: var(--accent); color: var(--bg-deep); }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--blue-600); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--blue-500); }
</style>
</head>
<body>
<div class="bg-mesh"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<div class="container">
<header class="app-header">
<div class="brand">⚡ LINE TOGEL <span class="tag">2026</span></div>
<div class="header-actions">
<button class="icon-btn" id="toggleFavBtn" title="Tampilkan Favorit"><i class="fas fa-star"></i></button>
<button class="icon-btn" id="resetViewBtn" title="Reset Tampilan"><i class="fas fa-rotate-left"></i></button>
</div>
</header>

<main>
<div class="search-bar">
<div class="search-input-wrap">
<input type="search" class="search-input" id="searchInput" placeholder="Cari koleksi foto...">
<i class="fas fa-search"></i>
</div>
<div class="stats"><i class="fas fa-images"></i> Memuat <span id="photoCount">0</span> foto</div>
</div>

<div class="gallery-grid" id="galleryGrid"></div>
<div class="loader" id="loader">
<div class="spinner"></div>
<div class="loader-text">Menyiapkan galeri...</div>
</div>
</main>
</div>

<div class="modal-backdrop" id="modal">
<div class="modal-box">
<div class="modal-img-wrap" id="modalZoomArea"><img src="" alt="" class="modal-img" id="modalImg"></div>
<div class="modal-info">
<h2 class="modal-title" id="modalTitle">-</h2>
<p class="modal-detail" id="modalDetail">-</p>
<div class="modal-actions">
<button class="btn btn-primary" onclick="copyImage()"><i class="fas fa-copy"></i> Salin</button>
<button class="btn btn-ghost" onclick="downloadModal()"><i class="fas fa-download"></i> Unduh</button>
<button class="btn btn-ghost" onclick="shareModal()"><i class="fas fa-share-nodes"></i> Bagikan</button>
</div>
</div>
</div>
</div>

<div class="toast" id="toast"><i class="fas fa-bolt"></i> <span id="toastText">Berhasil!</span></div>

<script>
const state = {
photos: [], favs: JSON.parse(localStorage.getItem('ltg_favs')||'[]'),
showFav: false, search: '', current: null
};

document.addEventListener('DOMContentLoaded', () => {
fetchData();
document.getElementById('searchInput').addEventListener('input', e => { state.search = e.target.value.toLowerCase(); render(); });
document.getElementById('toggleFavBtn').addEventListener('click', () => {
state.showFav = !state.showFav;
document.getElementById('toggleFavBtn').classList.toggle('active', state.showFav);
render(); showToast(state.showFav ? '⭐ Menampilkan favorit' : '✨ Menampilkan semua');
});
document.getElementById('resetViewBtn').addEventListener('click', () => {
state.search = ''; state.showFav = false;
document.getElementById('searchInput').value = '';
document.getElementById('toggleFavBtn').classList.remove('active');
fetchData();
});
document.getElementById('modalZoomArea').addEventListener('click', e => e.target.classList.toggle('zoomed'));
document.getElementById('modal').addEventListener('click', e => { if(e.target.id==='modal') closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); if(e.ctrlKey&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}});
});

async function fetchData() {
document.getElementById('loader').classList.remove('hidden');
document.getElementById('galleryGrid').innerHTML = '';
try {
const sheet = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';
let data = [];
try {
const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheet}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
const txt = await res.text();
const json = JSON.parse(txt.substring(47).slice(0, -2));
data = json.table.rows.map((r,i) => ({ judul: r.c[0]?.v||'', url: r.c[1]?.v||'', ts: Date.now()-i*3600000 })).filter(d=>d.judul&&d.url);
}catch{
const csv = await (await fetch(`https://docs.google.com/spreadsheets/d/${sheet}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
data = csv.split('\n').map(r=>r.split(',')).filter(r=>r[0]?.trim()&&r[1]?.trim()).map((r,i)=>({ judul:r[0].replace(/"/g,'').trim(), url:r[1].replace(/"/g,'').trim(), ts:Date.now()-i*3600000 }));
}
state.photos = data; render(); showToast(`✅ ${data.length} foto siap`);
}catch(err){ console.error(err); showToast('❌ Gagal memuat data'); }
document.getElementById('loader').classList.add('hidden');
}

function render() {
const grid = document.getElementById('galleryGrid'); grid.innerHTML = '';
let list = state.photos;
if(state.showFav) list = list.filter(p => state.favs.includes(p.url));
if(state.search) list = list.filter(p => p.judul.toLowerCase().includes(state.search));
document.getElementById('photoCount').textContent = list.length;

if(!list.length) { grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)"><i class="fas fa-magnifying-glass" style="font-size:24px;margin-bottom:12px;display:block"></i>Tidak ada foto yang ditemukan</div>`; return; }

list.forEach(p => {
const card = document.createElement('div'); card.className = 'photo-card';
const isFav = state.favs.includes(p.url);
card.innerHTML = `
<div class="img-wrap" onclick="openModal('${p.url}','${p.judul.replace(/'/g,"\\'")}')">
<img src="${p.url}" alt="${p.judul}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00e5ff?text=No+Image'">
<div class="overlay">
<div class="card-title">${p.judul}</div>
<div class="card-meta">
<span class="meta-tag">📷 ${new Date(p.ts).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})}</span>
<button class="fav-btn ${isFav?'active':''}" onclick="event.stopPropagation();toggleFav('${p.url}',this)" title="${isFav?'Hapus':'Tambah'} favorit"><i class="fas fa-heart"></i></button>
</div>
</div>
</div>`;
grid.appendChild(card);
});
}

function toggleFav(url, btn) {
const idx = state.favs.indexOf(url);
if(idx > -1) { state.favs.splice(idx,1); btn.classList.remove('active'); showToast('💔 Dihapus dari favorit'); }
else { state.favs.push(url); btn.classList.add('active'); showToast('❤️ Ditambahkan ke favorit'); }
localStorage.setItem('ltg_favs', JSON.stringify(state.favs));
if(state.showFav) render();
}

let modalImg = null, modalUrl = '';
function openModal(url, title) {
modalUrl = url;
document.getElementById('modalImg').src = url;
document.getElementById('modalImg').classList.remove('zoomed');
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalDetail').textContent = `Format: ${url.split('.').pop().toUpperCase()} • Klik gambar untuk zoom`;
document.getElementById('modal').classList.add('active');
document.body.style.overflow = 'hidden';
}
function closeModal() { document.getElementById('modal').classList.remove('active'); document.body.style.overflow = ''; modalUrl = ''; }

async function copyImage() { if(!modalUrl) return; try{ const b=await(await fetch(modalUrl)).blob(); await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]); showToast('✅ Disalin ke clipboard'); }catch{ showToast('❗ Gunakan klik kanan > Copy Image'); } }
function downloadModal() { if(!modalUrl) return; const a=document.createElement('a'); a.href=modalUrl; a.download=`foto_${Date.now()}.${modalUrl.split('.').pop()}`; a.click(); showToast('⬇️ Mengunduh...'); }
function shareModal() { if(!modalUrl) return; if(navigator.share){navigator.share({url:modalUrl,title:'LINE TOGEL 2026'}).catch(()=>{});}else{copyImage();showToast('✅ Link disalin!');}}
function showToast(msg) { const t=document.getElementById('toast'); document.getElementById('toastText').textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3200); }
</script>
</body>
</html>

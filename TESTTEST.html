<style>
/* ═══════════════════════════════════════════════════════════════
   ✨ ULTRA NEXT-GEN CSS VARIABLES SYSTEM 2026 ✨
   ═══════════════════════════════════════════════════════════════ */
:root {
/* 🎨 Dynamic Color System */
--hue-primary: 185;
--hue-secondary: 270;
--hue-accent: 320;
--saturation: 100%;
--lightness-base: 50%;

--color-primary: hsl(var(--hue-primary), var(--saturation), var(--lightness-base));
--color-primary-glow: hsl(var(--hue-primary), 100%, 65%);
--color-secondary: hsl(var(--hue-secondary), var(--saturation), var(--lightness-base));
--color-accent: hsl(var(--hue-accent), var(--saturation), var(--lightness-base));

/* 🌑 Dark Theme Default */
--bg-void: #000108;
--bg-deep: #020617;
--bg-surface: rgba(8, 16, 40, 0.92);
--bg-elevated: rgba(15, 28, 60, 0.88);
--bg-glass: rgba(12, 24, 52, 0.75);
--bg-glass-strong: rgba(20, 36, 72, 0.90);
--bg-card: rgba(18, 32, 64, 0.85);

--text-primary: #ffffff;
--text-secondary: #b8d4ff;
--text-tertiary: #7a94b8;
--text-dim: #4a5f8a;
--text-glow: hsla(var(--hue-primary), 100%, 70%, 0.9);

--border-subtle: hsla(var(--hue-primary), 80%, 60%, 0.35);
--border-glow: hsla(var(--hue-primary), 100%, 65%, 0.7);
--border-intense: hsla(var(--hue-primary), 100%, 70%, 0.95);

--glow-soft: 0 0 20px hsla(var(--hue-primary), 100%, 60%, 0.4), 0 0 45px hsla(var(--hue-primary), 100%, 55%, 0.25);
--glow-medium: 0 0 35px hsla(var(--hue-primary), 100%, 65%, 0.6), 0 0 75px hsla(var(--hue-primary), 100%, 60%, 0.4), 0 0 120px hsla(var(--hue-primary), 100%, 55%, 0.25);
--glow-intense: 0 0 50px hsla(var(--hue-primary), 100%, 70%, 0.85), 0 0 100px hsla(var(--hue-primary), 100%, 65%, 0.55), 0 0 180px hsla(var(--hue-primary), 100%, 60%, 0.35);
--glow-secondary: 0 0 35px hsla(var(--hue-secondary), 100%, 65%, 0.6), 0 0 75px hsla(var(--hue-secondary), 100%, 60%, 0.4);
--glow-accent: 0 0 35px hsla(var(--hue-accent), 100%, 65%, 0.6), 0 0 75px hsla(var(--hue-accent), 100%, 60%, 0.4);

/* 🎭 Animation System */
--ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
--ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
--ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
--ease-spring: cubic-bezier(0.5, 1.2, 0.4, 1.1);
--transition-fast: 150ms var(--ease-smooth);
--transition-normal: 300ms var(--ease-smooth);
--transition-slow: 600ms var(--ease-bounce);
--transition-elastic: 400ms var(--ease-elastic);
--transition-spring: 500ms var(--ease-spring);

/* 📐 Layout System */
--radius-xs: 6px;
--radius-sm: 10px;
--radius-md: 16px;
--radius-lg: 24px;
--radius-xl: 32px;
--radius-2xl: 40px;
--radius-full: 9999px;

--spacing-2xs: 4px;
--spacing-xs: 8px;
--spacing-sm: 12px;
--spacing-md: 20px;
--spacing-lg: 32px;
--spacing-xl: 48px;
--spacing-2xl: 72px;
--spacing-3xl: 96px;

/* ✨ Effects */
--blur-sm: blur(8px);
--blur-md: blur(16px);
--blur-lg: blur(24px);
--blur-xl: blur(40px);

--shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
--shadow-md: 0 8px 24px rgba(0,0,0,0.4);
--shadow-lg: 0 16px 48px rgba(0,0,0,0.5);
--shadow-xl: 0 24px 80px rgba(0,0,0,0.6);

/* 🎯 Interactive States */
--hover-lift: translateY(-6px) scale(1.02);
--hover-glow: var(--glow-medium);
--active-scale: scale(0.98);
--focus-ring: 0 0 0 3px hsla(var(--hue-primary), 100%, 65%, 0.5), 0 0 0 6px hsla(var(--hue-primary), 100%, 65%, 0.25);
}

/* 🌞 Light Theme */
[data-theme="light"] {
--bg-void: #f0f4ff;
--bg-deep: #e6ecff;
--bg-surface: rgba(255, 255, 255, 0.92);
--bg-elevated: rgba(248, 250, 255, 0.95);
--bg-glass: rgba(255, 255, 255, 0.85);
--bg-glass-strong: rgba(255, 255, 255, 0.95);
--bg-card: rgba(255, 255, 255, 0.9);

--text-primary: #0a0a1a;
--text-secondary: #2a3a5a;
--text-tertiary: #5a6a8a;
--text-dim: #8a9ab8;
--text-glow: hsla(var(--hue-primary), 100%, 45%, 0.9);

--border-subtle: hsla(var(--hue-primary), 60%, 40%, 0.3);
--border-glow: hsla(var(--hue-primary), 80%, 50%, 0.5);
--border-intense: hsla(var(--hue-primary), 90%, 55%, 0.8);

--glow-soft: 0 0 20px hsla(var(--hue-primary), 100%, 50%, 0.25), 0 0 40px hsla(var(--hue-primary), 100%, 45%, 0.15);
--glow-medium: 0 0 30px hsla(var(--hue-primary), 100%, 55%, 0.4), 0 0 60px hsla(var(--hue-primary), 100%, 50%, 0.25);
--glow-intense: 0 0 45px hsla(var(--hue-primary), 100%, 60%, 0.6), 0 0 90px hsla(var(--hue-primary), 100%, 55%, 0.4);
}

/* ═══════════════════════════════════════════════════════════════
   🔄 THEME TRANSITION & BASE STYLES
   ═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { 
scroll-behavior: smooth; 
scroll-padding-top: 20px;
color-scheme: dark light;
}
body {
font-family: 'Space Grotesk', 'Rajdhani', system-ui, sans-serif;
background: var(--bg-void);
color: var(--text-primary);
min-height: 100vh;
min-height: 100dvh;
overflow-x: hidden;
position: relative;
line-height: 1.65;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
transition: background-color var(--transition-normal), color var(--transition-normal);
}
body::before {
content: '';
position: fixed;
inset: 0;
background: 
radial-gradient(1200px 600px at 15% 20%, hsla(var(--hue-primary), 100%, 60%, 0.12) 0%, transparent 65%),
radial-gradient(1000px 500px at 85% 25%, hsla(var(--hue-secondary), 100%, 60%, 0.10) 0%, transparent 65%),
radial-gradient(900px 450px at 50% 90%, hsla(var(--hue-accent), 100%, 60%, 0.08) 0%, transparent 70%);
animation: bgDrift 30s ease-in-out infinite alternate;
z-index: -4;
pointer-events: none;
}
@keyframes bgDrift {
0%, 100% { transform: translate(0, 0) scale(1); filter: hue-rotate(0deg); }
33% { transform: translate(2%, -1%) scale(1.03); filter: hue-rotate(12deg); }
66% { transform: translate(-1%, 2%) scale(0.98); filter: hue-rotate(-8deg); }
}

/* ═══════════════════════════════════════════════════════════════
   🌊 ADVANCED BACKGROUND SYSTEM
   ═══════════════════════════════════════════════════════════════ */
.grid-pattern {
position: fixed;
inset: 0;
z-index: -3;
background-image:
linear-gradient(hsla(var(--hue-primary), 100%, 65%, 0.06) 1px, transparent 1px),
linear-gradient(90deg, hsla(var(--hue-primary), 100%, 65%, 0.06) 1px, transparent 1px),
repeating-linear-gradient(45deg, hsla(var(--hue-secondary), 100%, 60%, 0.03) 0, hsla(var(--hue-secondary), 100%, 60%, 0.03) 1px, transparent 1px, transparent 45px);
background-size: 55px 55px, 55px 55px, 130px 130px;
mask-image: radial-gradient(ellipse 85% 75% at 50% 50%, black 25%, transparent 90%);
animation: gridFlow 35s linear infinite;
opacity: 0.85;
pointer-events: none;
}
@keyframes gridFlow {
0% { background-position: 0 0, 0 0, 0 0; }
100% { background-position: 55px 55px, 55px 55px, 130px 130px; }
}

.aurora {
position: fixed;
inset: 0;
z-index: -2;
pointer-events: none;
overflow: hidden;
}
.aurora-wave {
position: absolute;
width: 220%;
height: 220%;
top: -60%;
left: -60%;
background: 
radial-gradient(ellipse at 35% 45%, hsla(var(--hue-primary), 100%, 65%, 0.1) 0%, transparent 55%),
radial-gradient(ellipse at 65% 55%, hsla(var(--hue-secondary), 100%, 65%, 0.1) 0%, transparent 55%),
radial-gradient(ellipse at 50% 35%, hsla(var(--hue-accent), 100%, 65%, 0.06) 0%, transparent 60%);
animation: auroraWave 40s ease-in-out infinite;
filter: blur(50px);
opacity: 0.75;
}
.aurora-wave:nth-child(2) {
animation-delay: -15s;
animation-duration: 48s;
opacity: 0.55;
filter: blur(70px);
}
@keyframes auroraWave {
0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
25% { transform: translate(3%, -1.5%) rotate(0.8deg) scale(1.04); }
50% { transform: translate(-1.5%, 3%) rotate(-0.5deg) scale(0.97); }
75% { transform: translate(1.5%, 1.5%) rotate(0.3deg) scale(1.02); }
}

/* ✨ Particle System Enhanced */
.particles {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
overflow: hidden;
}
.particle {
position: absolute;
width: 4px; height: 4px;
border-radius: 50%;
opacity: 0;
animation: particleLife 28s infinite ease-in-out;
will-change: transform, opacity;
}
.particle.active { opacity: 0.9; }
.particle:nth-child(4n+1) { 
background: var(--color-primary-glow); 
box-shadow: 0 0 15px var(--color-primary-glow), 0 0 35px hsla(var(--hue-primary), 100%, 60%, 0.6); 
}
.particle:nth-child(4n+2) { 
background: var(--color-secondary); 
box-shadow: 0 0 15px var(--color-secondary), 0 0 35px hsla(var(--hue-secondary), 100%, 60%, 0.6); 
}
.particle:nth-child(4n+3) { 
background: var(--color-accent); 
box-shadow: 0 0 15px var(--color-accent), 0 0 35px hsla(var(--hue-accent), 100%, 60%, 0.6); 
}
.particle:nth-child(4n+4) { 
background: hsl(150, 100%, 55%); 
box-shadow: 0 0 15px hsl(150, 100%, 55%), 0 0 35px hsla(150, 100%, 50%, 0.6); 
}
@keyframes particleLife {
0%, 100% { transform: translateY(100vh) rotate(0deg) scale(0.4); opacity: 0; }
12% { opacity: 0.9; transform: scale(1); }
88% { opacity: 0.9; }
100% { transform: translateY(-100vh) rotate(720deg) scale(1.3); opacity: 0; }
}

/* ⚡ Lightning System */
.lightning {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
}
.lightning-bolt {
position: absolute;
top: -100vh;
width: 3px;
height: 220vh;
background: linear-gradient(180deg, 
transparent 0%, 
var(--color-primary-glow) 15%, 
var(--color-primary) 35%, 
var(--color-secondary) 55%, 
var(--color-accent) 75%, 
transparent 100%);
filter: blur(3px) brightness(1.3);
opacity: 0;
animation: lightningStrike 14s infinite;
box-shadow: 0 0 30px var(--color-primary-glow), 0 0 65px hsla(var(--hue-primary), 100%, 60%, 0.5);
clip-path: polygon(50% 0%, 60% 35%, 100% 35%, 70% 55%, 80% 100%, 50% 85%, 20% 100%, 30% 55%, 0% 35%, 40% 35%);
}
.lightning-bolt:nth-child(1) { left: 18%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 5s; }
.lightning-bolt:nth-child(3) { left: 82%; animation-delay: 10s; }
@keyframes lightningStrike {
0%, 86%, 88%, 90%, 92%, 100% { opacity: 0; transform: scaleY(0.25) translateY(-25%); }
87%, 89%, 91% { opacity: 0.3; transform: scaleY(1) translateY(0); }
}

/* 📺 CRT Scanline */
.scanline {
position: fixed;
left: 0; right: 0; height: 5px;
background: linear-gradient(90deg, 
transparent, 
var(--color-primary-glow), 
var(--color-primary), 
var(--color-secondary), 
var(--color-accent), 
transparent);
opacity: 0.55;
animation: scanMove 7s linear infinite;
z-index: 100;
pointer-events: none;
filter: blur(1.5px);
box-shadow: 0 0 25px var(--color-primary-glow);
}
@keyframes scanMove {
0% { top: -15px; opacity: 0; }
6% { opacity: 0.55; }
94% { opacity: 0.55; }
100% { top: 100%; opacity: 0; }
}

/* 🎞️ Noise Texture */
.noise {
position: fixed;
inset: 0;
z-index: 5;
opacity: 0.04;
background-image: url("image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
pointer-events: none;
animation: noiseAnim 0.6s steps(12) infinite;
}
@keyframes noiseAnim {
0%, 100% { transform: translate(0, 0); }
25% { transform: translate(-1.5px, 1px); }
50% { transform: translate(2px, -1.5px); }
75% { transform: translate(-1px, -2px); }
}

/* ═══════════════════════════════════════════════════════════════
   🎯 LAYOUT & CONTAINER
   ═══════════════════════════════════════════════════════════════ */
.container {
max-width: 1500px;
margin: 0 auto;
padding: var(--spacing-lg) var(--spacing-md);
min-height: 100vh;
min-height: 100dvh;
position: relative;
}

/* ═══════════════════════════════════════════════════════════════
   🎨 HEADER SYSTEM
   ═══════════════════════════════════════════════════════════════ */
.header {
text-align: center;
margin-bottom: var(--spacing-2xl);
animation: headerReveal var(--transition-slow) backwards;
position: relative;
padding-bottom: var(--spacing-lg);
}
.header::after {
content: '';
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 280px;
height: 4px;
background: linear-gradient(90deg, 
transparent, 
var(--color-primary-glow), 
var(--color-primary), 
var(--color-secondary), 
var(--color-accent), 
transparent);
border-radius: 3px;
box-shadow: var(--glow-intense);
animation: glowPulse 3.5s ease-in-out infinite;
}
@keyframes headerReveal {
from { opacity: 0; transform: translateY(-50px) scale(0.97); }
to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes glowPulse {
0%, 100% { opacity: 0.85; box-shadow: var(--glow-intense); }
50% { opacity: 1; box-shadow: 0 0 60px hsla(var(--hue-primary), 100%, 70%, 0.95), 0 0 120px hsla(var(--hue-primary), 100%, 65%, 0.65), 0 0 220px hsla(var(--hue-primary), 100%, 60%, 0.4); }
}

/* 🔙 Back Button */
.back-btn {
position: fixed;
left: var(--spacing-md); 
top: var(--spacing-md);
background: var(--bg-glass);
border: 1px solid var(--border-glow);
color: var(--color-primary-glow);
padding: 9px 20px;
border-radius: var(--radius-full);
text-decoration: none;
font-weight: 700;
font-size: 11px;
display: flex;
align-items: center;
gap: 9px;
transition: all var(--transition-normal);
backdrop-filter: var(--blur-md);
z-index: 1000;
pointer-events: auto;
box-shadow: var(--glow-soft);
letter-spacing: 0.6px;
}
.back-btn:hover {
background: var(--bg-glass-strong);
transform: translateX(-5px) scale(1.04);
box-shadow: var(--glow-medium);
color: var(--bg-deep);
border-color: var(--color-primary-glow);
}
.back-btn i { font-size: 14px; transition: transform var(--transition-fast); }
.back-btn:hover i { transform: translateX(-3px); }

/* 🎭 Theme Toggle */
.theme-toggle {
position: fixed;
right: var(--spacing-md);
top: var(--spacing-md);
width: 44px;
height: 44px;
background: var(--bg-glass);
border: 1px solid var(--border-glow);
border-radius: var(--radius-full);
color: var(--color-primary-glow);
font-size: 16px;
cursor: pointer;
transition: all var(--transition-normal);
backdrop-filter: var(--blur-md);
z-index: 1000;
display: flex;
align-items: center;
justify-content: center;
box-shadow: var(--glow-soft);
}
.theme-toggle:hover {
transform: rotate(180deg) scale(1.1);
box-shadow: var(--glow-medium);
background: var(--bg-glass-strong);
}
.theme-toggle i { transition: transform var(--transition-fast); }
[data-theme="light"] .theme-toggle i.fa-moon { display: none; }
[data-theme="light"] .theme-toggle i.fa-sun { display: block; }
.theme-toggle i.fa-sun { display: none; }

/* ═══════════════════════════════════════════════════════════════
   ✨ TYPOGRAPHY SYSTEM
   ═══════════════════════════════════════════════════════════════ */
.title {
font-family: 'Orbitron', 'Space Grotesk', sans-serif;
font-size: clamp(34px, 9vw, 64px);
font-weight: 900;
letter-spacing: 7px;
margin-bottom: 14px;
position: relative;
background: linear-gradient(135deg, 
var(--color-primary-glow) 0%, 
var(--color-primary) 25%, 
#ffffff 50%, 
var(--color-primary) 75%, 
var(--color-secondary) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 0 0 50px hsla(var(--hue-primary), 100%, 65%, 0.7);
animation: titleShimmer 3.5s ease-in-out infinite, titleFloat 6s ease-in-out infinite;
}
@keyframes titleShimmer {
0%, 100% { filter: brightness(1) contrast(1); }
50% { filter: brightness(1.5) contrast(1.08); }
}
@keyframes titleFloat {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-5px); }
}

.subtitle {
font-size: 13px;
color: var(--text-secondary);
letter-spacing: 8px;
text-transform: uppercase;
margin-bottom: 20px;
font-weight: 600;
text-shadow: 0 0 15px hsla(var(--hue-primary), 100%, 60%, 0.5);
font-family: 'Orbitron', sans-serif;
}

/* 🔋 Status Badge */
.status-badge {
display: inline-flex;
align-items: center;
gap: 14px;
padding: 9px 28px;
background: hsla(150, 100%, 55%, 0.18);
border: 1px solid hsla(150, 100%, 55%, 0.6);
border-radius: var(--radius-full);
font-size: 11px;
font-weight: 700;
color: hsl(150, 100%, 55%);
text-transform: uppercase;
letter-spacing: 3px;
animation: statusPulse 2.4s ease-in-out infinite;
box-shadow: 0 0 25px hsla(150, 100%, 55%, 0.45);
font-family: 'Orbitron', sans-serif;
}
@keyframes statusPulse {
0%, 100% { box-shadow: 0 0 25px hsla(150, 100%, 55%, 0.45); }
50% { box-shadow: 0 0 50px hsla(150, 100%, 55%, 0.85); }
}
.status-dot {
width: 10px; height: 10px;
background: hsl(150, 100%, 55%);
border-radius: 50%;
animation: dotBeat 1.5s ease-in-out infinite;
box-shadow: 0 0 20px hsl(150, 100%, 55%), 0 0 45px hsla(150, 100%, 55%, 0.65);
}
@keyframes dotBeat {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.7); opacity: 0.88; }
}

/* ═══════════════════════════════════════════════════════════════
   🧭 NAVIGATION
   ═══════════════════════════════════════════════════════════════ */
.nav-tabs {
display: flex;
gap: 16px;
justify-content: center;
margin-bottom: var(--spacing-lg);
flex-wrap: wrap;
}
.nav-tab {
padding: 13px 32px;
background: var(--bg-surface);
border: 1px solid var(--border-subtle);
border-radius: var(--radius-xl);
color: var(--text-primary);
font-family: 'Orbitron', sans-serif;
font-size: 12px;
font-weight: 700;
cursor: pointer;
transition: all 0.45s var(--ease-smooth);
text-transform: uppercase;
letter-spacing: 2px;
backdrop-filter: var(--blur-md);
position: relative;
overflow: hidden;
display: flex;
align-items: center;
gap: 10px;
}
.nav-tab::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, 
hsla(var(--hue-primary), 100%, 65%, 0.25), 
hsla(var(--hue-secondary), 100%, 65%, 0.2), 
hsla(var(--hue-accent), 100%, 65%, 0.15));
opacity: 0;
transition: opacity 0.45s;
}
.nav-tab:hover, .nav-tab.active {
background: var(--bg-elevated);
border-color: var(--color-primary-glow);
box-shadow: var(--glow-medium);
transform: translateY(-5px);
color: var(--color-primary-glow);
}
.nav-tab:hover::before, .nav-tab.active::before { opacity: 1; }
.nav-tab i { font-size: 15px; }

.section { display: none; animation: sectionFade var(--transition-slow); }
.section.active { display: block; }
@keyframes sectionFade {
from { opacity: 0; transform: translateY(35px); }
to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════════
   🔍 SEARCH SYSTEM
   ═══════════════════════════════════════════════════════════════ */
.search-container {
max-width: 750px;

/* ═══════════════════════════════════════════════════════════════

   ═══════════════════════════════════════════════════════════════ */
.gallery-section { margin-bottom: var(--spacing-2xl); }

.section-title {
font-family: 'Orbitron', sans-serif;
font-size: 17px;
font-weight: 700;

}

0%, 100% { opacity: 1; transform: scaleY(1); }
50% { opacity: 0.88; transform: scaleY(1.18); }
}

.gallery-grid {
display: grid;

}

/* ═══════════════════════════════════════════════════════════════
   💎 ULTRA PREMIUM PHOTO CARD - HOLOGRAPHIC EDITION
   ═══════════════════════════════════════════════════════════════ */
.photo-card {
background: var(--bg-card);
border: 1px solid var(--border-subtle);
border-radius: var(--radius-xl);
overflow: hidden;
transition: all 0.7s var(--ease-bounce);
position: relative;
backdrop-filter: var(--blur-lg);
animation: cardEnter 0.8s ease forwards;
opacity: 0;
transform: translateY(35px);
box-shadow: var(--shadow-lg);
}
/* Holographic Border Effect */
.photo-card::before {
content: '';
position: absolute;
inset: -2px;
background: linear-gradient(45deg, 
var(--color-primary-glow), 
var(--color-secondary), 
var(--color-accent), 
var(--color-primary-glow));
border-radius: inherit;
opacity: 0;
transition: opacity 0.6s;
pointer-events: none;
z-index: 0;
filter: blur(25px);
animation: hologramRotate 8s linear infinite;
}
@keyframes hologramRotate {
0% { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}
/* Inner Glow Overlay */
.photo-card::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, 
hsla(var(--hue-primary), 100%, 65%, 0.15), 
transparent 45%, 
transparent 55%, 
hsla(var(--hue-secondary), 100%, 65%, 0.15));
opacity: 0;
transition: opacity 0.6s;
pointer-events: none;
z-index: 1;
}
.photo-card:hover::before { opacity: 0.45; }
.photo-card:hover::after { opacity: 1; }
.photo-card:hover {
transform: translateY(-10px) scale(1.03);
border-color: var(--color-primary-glow);
box-shadow: var(--glow-medium), var(--shadow-xl);
}
.photo-card:nth-child(1) { animation-delay: 0.1s; }
.photo-card:nth-child(2) { animation-delay: 0.16s; }
.photo-card:nth-child(3) { animation-delay: 0.22s; }
.photo-card:nth-child(4) { animation-delay: 0.28s; }
.photo-card:nth-child(5) { animation-delay: 0.34s; }
@keyframes cardEnter { to { opacity: 1; transform: translateY(0); } }

.photo-wrapper {
position: relative;
width: 100%;
height: 310px;
background: radial-gradient(circle at center, #112848 0%, #060f22 100%);
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
}
/* Image Overlay Effects */
.photo-wrapper::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(180deg, 
transparent 45%, 
hsla(0, 0%, 0%, 0.4) 80%, 
hsla(0, 0%, 0%, 0.75));
pointer-events: none;
z-index: 2;
}
.photo-wrapper::after {
content: '';
position: absolute;

pointer-events: none;
z-index: 3;
}
.photo-wrapper img {

}
.photo-card:hover .photo-wrapper img {

}

.photo-info {

}
.photo-info::before {

.photo-title {

/* 🎮 Premium Action Buttons */
.action-buttons-row {
display: flex;
gap: 14px;
justify-content: center;
flex-wrap: wrap;

border-top: 1px solid var(--border-subtle);

.action-btn {

.action-btn::before {

/* ═══════════════════════════════════════════════════════════════
   ⏳ LOADING SYSTEM - LIQUID ANIMATION
   ═══════════════════════════════════════════════════════════════ */
.loading {
display: none;
text-align: center;
padding: 55px 20px;
grid-column: 1 / -1;
}
.loading.active { display: block; }

.liquid-loader {
width: 60px;
height: 60px;
position: relative;
margin: 0 auto 26px;
}
.liquid-loader::before,
.liquid-loader::after {
content: '';
position: absolute;
inset: 0;
border-radius: 50%;
border: 4px solid transparent;
animation: liquidSpin 2s linear infinite;
}
.liquid-loader::before {
border-top-color: var(--color-primary-glow);
border-right-color: var(--color-primary-glow);
}
.liquid-loader::after {
border-bottom-color: var(--color-secondary);
border-left-color: var(--color-secondary);
animation-direction: reverse;
animation-duration: 2.5s;
}
@keyframes liquidSpin {
0% { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}
.liquid-loader::after {
width: 48px; height: 48px;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
border-width: 3px;
}

.loading-text {
color: var(--color-primary-glow); 
font-family: 'Orbitron', sans-serif; 
font-size: 14px; 
font-weight: 700;
letter-spacing: 2.5px;
animation: textPulse 2.2s ease-in-out infinite;
}
@keyframes textPulse {
0%, 100% { opacity: 1; text-shadow: 0 0 20px hsla(var(--hue-primary), 100%, 65%, 0.8); }
50% { opacity: 0.75; text-shadow: 0 0 35px hsla(var(--hue-primary), 100%, 65%, 0.95); }
}

/* ═══════════════════════════════════════════════════════════════
   🪟 MODAL SYSTEM - GLASSMORPHISM 2.0
   ═══════════════════════════════════════════════════════════════ */
.modal-backdrop {
position: fixed;
inset: 0;
background: hsla(220, 30%, 5%, 0.98);
backdrop-filter: var(--blur-xl);
z-index: 1000;
display: none;
align-items: center;

.modal-content {

<script>
// ═══════════════════════════════════════════════════════════════
// 🎯 GLOBAL STATE & CONFIG
// ═══════════════════════════════════════════════════════════════
const state = {
photos: [],
currentImage: { url: '', title: '' },
theme: localStorage.getItem('theme') || 'dark',
};

// ═══════════════════════════════════════════════════════════════
// 🔄 THEME SYSTEM
// ═══════════════════════════════════════════════════════════════
function initTheme() {
document.documentElement.setAttribute('data-theme', state.theme);
document.getElementById('themeToggle').addEventListener('click', toggleTheme);
}
function toggleTheme() {
state.theme = state.theme === 'dark' ? 'light' : 'dark';
document.documentElement.setAttribute('data-theme', state.theme);
localStorage.setItem('theme', state.theme);
showToast(`🌓 Tema ${state.theme === 'dark' ? 'Gelap' : 'Terang'} aktif`);
}

// ═══════════════════════════════════════════════════════════════
// ✨ PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════════
function initParticles() {
const container = document.getElementById('particles');
if (!container) return;
for(let i = 0; i < 80; i++) {
const p = document.createElement('div');
p.className = 'particle';
p.style.left = Math.random() * 100 + '%';
p.style.top = Math.random() * 100 + '%';
p.style.animationDelay = Math.random() * 35 + 's';
p.style.animationDuration = (22 + Math.random() * 35) + 's';
setTimeout(() => p.classList.add('active'), Math.random() * 2500);
container.appendChild(p);
}
}

// ═══════════════════════════════════════════════════════════════
// 📡 DATA FETCHING
// ═══════════════════════════════════════════════════════════════
async function fetchPhotos() {
document.getElementById('loading').classList.add('active');
document.getElementById('galleryGrid').innerHTML = '';
try {
const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';
let photos = [];
// Try GVIZ first
try {
const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
const res = await fetch(url);
const text = await res.text();
const json = JSON.parse(text.substring(47).slice(0, -2));
photos = json.table.rows
.filter(r => r.c?.[0]?.v && r.c?.[1]?.v)
.map((r, i) => ({ judul: r.c[0].v, foto: r.c[1].v, index: i + 2 }));
} catch {
// Fallback to CSV
const csv = await (await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
photos = csv.split('\n')
.map(row => row.split(','))
.filter(row => row[0]?.trim() && row[1]?.trim())
.map((row, i) => ({ 
judul: row[0].replace(/"/g, '').trim(), 
foto: row[1].replace(/"/g, '').trim(), 
index: i + 2 
}));
}
state.photos = photos;
renderGallery(photos);
showToast(`⚡ ${photos.length} foto dimuat`);
} catch (e) {
console.error(e);
showToast('❗ Gagal memuat foto');
document.getElementById('galleryGrid').innerHTML = `
<div style="grid-column:1/-1;text-align:center;padding:70px;color:var(--text-tertiary)">
<i class="fas fa-exclamation-triangle" style="font-size:56px;color:var(--color-accent);margin-bottom:24px;text-shadow:0 0 30px hsla(320,100%,60%,0.7)"></i>
<h3 style="font-family:'Orbitron';color:var(--color-primary-glow);margin-bottom:14px">Gagal Memuat</h3>
<p>Periksa koneksi atau publikasi Google Sheets</p>
</div>`;
}
document.getElementById('loading').classList.remove('active');
}

// ═══════════════════════════════════════════════════════════════
// 🖼️ GALLERY RENDERING
// ═══════════════════════════════════════════════════════════════
function renderGallery(photos) {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';
if (!photos.length) {
grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:70px;color:var(--text-tertiary)">
<i class="fas fa-search" style="font-size:56px;margin-bottom:24px;opacity:0.65"></i>
<h3 style="font-family:'Orbitron';color:var(--color-primary-glow);margin-bottom:14px">Tidak Ditemukan</h3>
<p>Coba kata kunci lain</p>
</div>`;
return;
}
photos.forEach((p, i) => grid.appendChild(createCard(p.foto, p.judul, i)));
}

function createCard(url, title, index) {
const card = document.createElement('div');
card.className = 'photo-card';
card.setAttribute('role', 'listitem');
card.innerHTML = `
<div class="photo-wrapper">
<img src="${url}" alt="${title}" 
onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00f7ff?text=No+Image'" 
loading="lazy" 
onclick="viewImage('${url}', '${title.replace(/'/g, "\\'")}')" 
style="cursor:pointer">
</div>
<div class="photo-info">
<div class="photo-title">${title}</div>
<div class="photo-meta">Foto #${index + 1}</div>
<div class="action-buttons-row">
<button class="action-btn copy-btn" onclick="copyPhoto('${url}')" title="Salin" aria-label="Salin ${title}">
<i class="fas fa-copy"></i><span>Copy</span>
</button>
<button class="action-btn download-btn" onclick="download('${url}', '${title.replace(/'/g, "\\'")}')" title="Download" aria-label="Download ${title}">
<i class="fas fa-download"></i><span>Download</span>
</button>
</div>
</div>`;
return card;
}

// ═══════════════════════════════════════════════════════════════
// 🔍 SEARCH
// ═══════════════════════════════════════════════════════════════
function searchPhotos() {
const term = document.getElementById('searchInput').value.toLowerCase().trim();
const filtered = !term ? state.photos : state.photos.filter(p => p.judul.toLowerCase().includes(term));
renderGallery(filtered);
if (filtered.length) showToast(`⚡ ${filtered.length} hasil`);
}

// ═══════════════════════════════════════════════════════════════
// 🪟 MODAL FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function viewImage(url, title) {
state.currentImage = { url, title };
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalImage').src = url;
document.getElementById('modalImage').alt = title;
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
}
function closeModal() {
document.getElementById('imageModal').classList.remove('active');
document.body.style.overflow = '';
state.currentImage = { url: '', title: '' };
}

// ═══════════════════════════════════════════════════════════════
// 📋 COPY & DOWNLOAD
// ═══════════════════════════════════════════════════════════════
async function copyPhoto(url) {
try {
const blob = await (await fetch(url)).blob();
await navigator.clipboard.write([new ClipboardItem({[blob.type]: blob})]);
showToast('✅ Disalin ke clipboard!');
} catch { showToast('❗ Klik kanan gambar > Copy Image'); }
}
async function copyImage() { if (state.currentImage.url) await copyPhoto(state.currentImage.url); }
function download(url, filename) {
const a = document.createElement('a');
a.href = url;
a.download = `${filename.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`;
a.target = '_blank';
document.body.appendChild(a); a.click(); document.body.removeChild(a);
showToast('⚡ Download dimulai...');
}
function downloadModalImage() {
if (state.currentImage.url) download(state.currentImage.url, state.currentImage.title);
}

// ═══════════════════════════════════════════════════════════════
// 🔔 TOAST NOTIFICATIONS
// ═══════════════════════════════════════════════════════════════
function showToast(msg) {
const toast = document.getElementById('toast');
document.getElementById('toastText').textContent = msg;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 4200);
}

// ═══════════════════════════════════════════════════════════════
// ⌨️ KEYBOARD & INTERACTIONS
// ═══════════════════════════════════════════════════════════════
function initInteractions() {
// Close modal on backdrop click
document.getElementById('imageModal')?.addEventListener('click', e => {
if (e.target.id === 'imageModal') closeModal();
});
// Keyboard shortcuts
document.addEventListener('keydown', e => {
if (e.key === 'Escape') closeModal();
if (e.ctrlKey && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput')?.focus(); }
});
}

// ═══════════════════════════════════════════════════════════════
// 🚀 INITIALIZATION
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
initTheme();
initParticles();
fetchPhotos();
initInteractions();
});
</script>
</body>
</html>

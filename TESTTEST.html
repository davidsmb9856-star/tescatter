<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐒 TM Manager Pro - Multi User</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --secondary: #ec4899;
    --accent: #06b6d4;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --bg-dark: #0a0e27;
    --bg-card: rgba(255, 255, 255, 0.05);
    --bg-glass: rgba(255, 255, 255, 0.08);
    --border: rgba(255, 255, 255, 0.1);
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --glow: 0 0 40px rgba(99, 102, 241, 0.3);
}

body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

/* Animated Background */
.bg-animation {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    background: linear-gradient(135deg, #0a0e27 0%, #1a1040 50%, #0f172a 100%);
}

.bg-animation::before,
.bg-animation::after {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.4;
    animation: float 20s infinite ease-in-out;
}

.bg-animation::before {
    background: radial-gradient(circle, #6366f1, transparent);
    top: -200px;
    left: -200px;
}

.bg-animation::after {
    background: radial-gradient(circle, #ec4899, transparent);
    bottom: -200px;
    right: -200px;
    animation-delay: -10s;
}

.bg-orb {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    background: radial-gradient(circle, #06b6d4, transparent);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: float 25s infinite ease-in-out reverse;
}

@keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(100px, -50px) scale(1.1); }
    66% { transform: translate(-50px, 100px) scale(0.9); }
}

/* Grid pattern */
.grid-pattern {
    position: fixed;
    inset: 0;
    background-image: 
        linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: -1;
    pointer-events: none;
}

/* Login Screen */
.login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.login-container {
    width: 100%;
    max-width: 450px;
}

.login-card {
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    box-shadow: var(--glow);
    position: relative;
    overflow: hidden;
}

.login-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
}

.login-logo {
    text-align: center;
    margin-bottom: 30px;
}

.logo-icon {
    font-size: 4em;
    display: inline-block;
    animation: bounce 2s infinite;
    filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.5));
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.login-title {
    font-size: 1.8em;
    font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 10px;
}

.login-subtitle {
    color: var(--text-dim);
    font-size: 0.9em;
    margin-top: 5px;
}

.login-tabs {
    display: flex;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 25px;
}

.login-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s;
    color: var(--text-dim);
}

.login-tab.active {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
}

.form-group {
    margin-bottom: 18px;
}

.form-label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.form-input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    transition: all 0.3s;
    font-family: inherit;
}

.form-input:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(0,0,0,0.4);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
}

.btn {
    padding: 14px 24px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    width: 100%;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(99, 102, 241, 0.6);
}

.btn-primary:active { transform: translateY(0); }

.user-list {
    margin-top: 25px;
    padding-top: 25px;
    border-top: 1px solid var(--border);
}

.user-list-title {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-align: center;
}

.user-chip {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 8px;
}

.user-chip:hover {
    background: rgba(99, 102, 241, 0.1);
    border-color: var(--primary);
    transform: translateX(4px);
}

.user-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: white;
    font-size: 14px;
    flex-shrink: 0;
}

.user-chip-info {
    flex: 1;
    min-width: 0;
}

.user-chip-name {
    font-weight: 600;
    font-size: 14px;
}

.user-chip-meta {
    font-size: 11px;
    color: var(--text-dim);
}

/* Main App */
.app {
    display: none;
    min-height: 100vh;
    animation: fadeIn 0.5s ease;
}

.app.show { display: flex; }

/* Sidebar */
.sidebar {
    width: 280px;
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: sticky;
    top: 0;
}

.sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
}

.sidebar-logo {
    font-size: 1.5em;
    filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.5));
}

.sidebar-title {
    font-weight: 800;
    font-size: 1.1em;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.sidebar-subtitle {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.profile-card {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.2s;
}

.profile-card:hover { background: rgba(255,255,255,0.03); }

.profile-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: white;
    font-size: 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    position: relative;
}

.profile-avatar::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 12px;
    height: 12px;
    background: var(--success);
    border: 2px solid var(--bg-dark);
    border-radius: 50%;
}

.profile-info { flex: 1; min-width: 0; }
.profile-name { font-weight: 600; font-size: 14px; }
.profile-status { font-size: 11px; color: var(--success); }

.nav-menu {
    flex: 1;
    padding: 15px 10px;
    overflow-y: auto;
}

.nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 4px;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 500;
}

.nav-item:hover {
    background: rgba(255,255,255,0.05);
    color: var(--text);
}

.nav-item.active {
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(236, 72, 153, 0.2));
    color: var(--text);
    border: 1px solid rgba(99, 102, 241, 0.3);
}

.nav-icon { font-size: 18px; }
.nav-badge {
    margin-left: auto;
    background: var(--primary);
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
}

.sidebar-footer {
    padding: 15px;
    border-top: 1px solid var(--border);
}

.btn-logout {
    width: 100%;
    padding: 10px;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: var(--danger);
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.btn-logout:hover {
    background: rgba(239, 68, 68, 0.2);
    border-color: var(--danger);
}

/* Main Content */
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.topbar {
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 50;
}

.page-title {
    font-size: 1.3em;
    font-weight: 700;
}

.topbar-actions {
    display: flex;
    gap: 10px;
    align-items: center;
}

.search-box {
    position: relative;
}

.search-box input {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 14px 9px 36px;
    color: var(--text);
    width: 260px;
    font-size: 13px;
    transition: all 0.2s;
}

.search-box input:focus {
    outline: none;
    border-color: var(--primary);
    width: 300px;
}

.search-box::before {
    content: '🔍';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
}

.icon-btn {
    width: 38px;
    height: 38px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
    color: var(--text);
}

.icon-btn:hover {
    background: var(--primary);
    border-color: var(--primary);
    transform: translateY(-2px);
}

/* Content Area */
.content-area {
    flex: 1;
    overflow-y: auto;
    padding: 25px;
}

/* Dashboard */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-bottom: 25px;
}

.stat-card {
    background: var(--bg-glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
}

.stat-card:hover {
    transform: translateY(-4px);
    border-color: var(--primary);
    box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
}

.stat-card::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 100px;
    height: 100px;
    background: radial-gradient(circle, var(--primary), transparent);
    opacity: 0.1;
    border-radius: 50%;
    transform: translate(30%, -30%);
}

.stat-icon {
    font-size: 2em;
    margin-bottom: 10px;
}

.stat-value {
    font-size: 2em;
    font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.stat-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
}

/* Script Grid */
.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
}

.section-title {
    font-size: 1.2em;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
}

.filter-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

.chip {
    padding: 6px 12px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-dim);
}

.chip:hover { border-color: var(--primary); color: var(--text); }
.chip.active {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border-color: transparent;
}

.script-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 15px;
}

.script-card {
    background: var(--bg-glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
}

.script-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
}

.script-card:hover {
    transform: translateY(-4px);
    border-color: var(--primary);
    box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
}

.script-card:hover::before { transform: scaleX(1); }

.script-card.pinned {
    border-color: var(--warning);
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.05), transparent);
}

.script-card.disabled { opacity: 0.5; }

.script-card-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 10px;
}

.script-card-title {
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 0;
}

.script-card-title span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.script-pin {
    font-size: 14px;
    flex-shrink: 0;
}

.script-card-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 36px;
}

.script-card-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
}

.script-tag {
    padding: 3px 8px;
    background: rgba(99, 102, 241, 0.15);
    color: #a5b4fc;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
}

.script-tag.success { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; }
.script-tag.warning { background: rgba(245, 158, 11, 0.15); color: #fcd34d; }
.script-tag.danger { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }

.script-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
}

.script-actions {
    display: flex;
    gap: 4px;
}

.script-action-btn {
    width: 28px;
    height: 28px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.2s;
}

.script-action-btn:hover {
    background: var(--primary);
    border-color: var(--primary);
    transform: scale(1.1);
}

.script-action-btn.danger:hover {
    background: var(--danger);
    border-color: var(--danger);
}

/* Empty State */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    background: var(--bg-glass);
    border: 2px dashed var(--border);
    border-radius: 20px;
}

.empty-icon {
    font-size: 4em;
    margin-bottom: 15px;
    opacity: 0.5;
}

.empty-title {
    font-size: 1.3em;
    font-weight: 700;
    margin-bottom: 8px;
}

.empty-desc {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 20px;
}

/* Editor Page */
.editor-layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
}

.editor-form {
    background: var(--bg-glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 25px;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

@media (max-width: 700px) {
    .form-row { grid-template-columns: 1fr; }
    .sidebar { 
        position: fixed;
        left: -280px;
        transition: left 0.3s;
        z-index: 100;
    }
    .sidebar.show { left: 0; }
    .search-box input { width: 150px; }
    .search-box input:focus { width: 200px; }
}

.code-editor-wrapper {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: #0d1117;
}

.code-editor-header {
    background: #161b22;
    padding: 10px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #8b949e;
    border-bottom: 1px solid #30363d;
}

.code-editor {
    width: 100%;
    min-height: 450px;
    padding: 15px;
    background: #0d1117;
    color: #e6edf3;
    border: none;
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
    tab-size: 2;
}

.code-editor:focus { outline: none; }

.editor-footer {
    background: #161b22;
    padding: 8px 15px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #8b949e;
    border-top: 1px solid #30363d;
}

/* Modal */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
}

.modal-overlay.show { display: flex; animation: fadeIn 0.2s; }

.modal {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 30px;
    max-width: 500px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.3s;
}

@keyframes modalIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.modal h3 {
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.3em;
}

.modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
    flex-wrap: wrap;
}

.btn-secondary {
    background: rgba(255,255,255,0.1);
    color: var(--text);
    border: 1px solid var(--border);
}

.btn-secondary:hover { background: rgba(255,255,255,0.15); }

.btn-danger {
    background: var(--danger);
    color: white;
}

.btn-danger:hover { background: #dc2626; }

.btn-success {
    background: var(--success);
    color: white;
}

/* Toast */
.toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 2000;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.toast {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-left: 4px solid var(--primary);
    padding: 14px 20px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    min-width: 280px;
    animation: toastIn 0.3s;
    display: flex;
    align-items: center;
    gap: 10px;
    backdrop-filter: blur(10px);
}

.toast.success { border-left-color: var(--success); }
.toast.error { border-left-color: var(--danger); }
.toast.warning { border-left-color: var(--warning); }

@keyframes toastIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

/* Loading */
.loading-spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* Mobile menu button */
.mobile-menu-btn {
    display: none;
}

@media (max-width: 900px) {
    .mobile-menu-btn { display: flex; }
}

.hidden { display: none !important; }

/* Avatar colors */
.avatar-1 { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
.avatar-2 { background: linear-gradient(135deg, #ec4899, #f43f5e); }
.avatar-3 { background: linear-gradient(135deg, #06b6d4, #0891b2); }
.avatar-4 { background: linear-gradient(135deg, #10b981, #059669); }
.avatar-5 { background: linear-gradient(135deg, #f59e0b, #d97706); }
.avatar-6 { background: linear-gradient(135deg, #ef4444, #dc2626); }
.avatar-7 { background: linear-gradient(135deg, #8b5cf6, #a855f7); }
.avatar-8 { background: linear-gradient(135deg, #14b8a6, #0d9488); }
</style>
</head>
<body>

<div class="bg-animation">
    <div class="bg-orb"></div>
</div>
<div class="grid-pattern"></div>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">

        <div class="login-card">
            <div class="login-logo">

<!-- MAIN APP -->

    <!-- Sidebar -->

        <div class="profile-card" onclick="showProfile()">

            <div class="nav-item" onclick="navigate('settings')" data-page="settings">

    <!-- Main -->
    <main class="main-content">

                <div class="page-title" id="pageTitle">📊 Dashboard</div>
            </div>
            <div class="topbar-actions">

                    <input type="text" id="searchInput" placeholder="Cari script..." oninput="filterScripts()">

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modalContent"></div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Hidden Inputs -->
<input type="file" id="fileInput" accept=".js,.txt,.user.js" style="display:none">
<input type="file" id="backupInput" accept=".json" style="display:none">

<script>
// ============================================
// KONFIGURASI
// ============================================
const CONFIG = {
    API_KEY: '$2a$10$G1wQvXgxfGvzuKP/loOtleElR8x6Pcu.rR2V6gKRGQzsFgLdDn7qq',
    BIN_ID_KEY: 'tm_bin_id_v3',
    SESSION_KEY: 'tm_session_v3',
    BASE_URL: 'https://api.jsonbin.io/v3/b'
};

// ============================================
// STATE
// ============================================
let state = {
    binId: localStorage.getItem(CONFIG.BIN_ID_KEY) || '',
    data: { users: {} },
    currentUser: null,
    currentPage: 'dashboard',
    currentScriptId: null,
    filter: 'all',
    searchQuery: ''
};

// ============================================
// INIT
// ============================================
window.addEventListener('DOMContentLoaded', async () => {
    // Check session
    const session = localStorage.getItem(CONFIG.SESSION_KEY);
    
    // Init cloud
    if (!state.binId) {
        await createNewBin();
    } else {
        await loadData();
    }
    
    // Auto-login if session exists
    if (session) {
        try {
            const s = JSON.parse(session);
            if (state.data.users[s.username]) {
                state.currentUser = s.username;
                showApp();
                return;
            }
        } catch(e) {}
    }
    
    showLogin();
    renderUserList();
});

// ============================================
// CLOUD STORAGE
// ============================================
async function createNewBin() {
    try {
        showToast('Membuat cloud storage...', 'info');
        const res = await fetch(CONFIG.BASE_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': CONFIG.API_KEY
            },
            body: JSON.stringify({
                users: {},
                metadata: {
                    created: new Date().toISOString(),
                    version: '3.0',
                    app: 'TM Manager Pro Multi-User'
                }
            })
        });
        
        if (res.ok) {
            const data = await res.json();
            state.binId = data.metadata.id;
            localStorage.setItem(CONFIG.BIN_ID_KEY, state.binId);
            state.data = { users: {} };
            showToast('✅ Cloud storage siap!', 'success');
            return true;
        }
        throw new Error('Gagal membuat bin');
    } catch (e) {
        showToast('❌ Error: ' + e.message, 'error');
        return false;
    }
}

async function loadData() {
    if (!state.binId) return false;
    try {
        const res = await fetch(`${CONFIG.BASE_URL}/${state.binId}/latest`, {
            headers: { 'X-Master-Key': CONFIG.API_KEY }
        });
        
        if (res.ok) {
            const data = await res.json();
            state.data = data.record || { users: {} };
            if (!state.data.users) state.data.users = {};
            return true;
        }
        throw new Error('Gagal load');
    } catch (e) {
        showToast('❌ Gagal load: ' + e.message, 'error');
        return false;
    }
}

async function saveData() {
    if (!state.binId) return false;
    try {
        const res = await fetch(`${CONFIG.BASE_URL}/${state.binId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': CONFIG.API_KEY
            },
            body: JSON.stringify({
                users: state.data.users,
                metadata: {
                    updated: new Date().toISOString(),
                    version: '3.0',
                    app: 'TM Manager Pro Multi-User'
                }
            })
        });
        
        if (res.ok) return true;
        throw new Error('Gagal save');
    } catch (e) {
        showToast('❌ Gagal save: ' + e.message, 'error');
        return false;
    }
}

// ============================================
// AUTH
// ============================================
function switchTab(tab) {
    document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    
    if (tab === 'login') {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
    } else {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
    }
}

function hashPin(pin) {
    // Simple hash (not secure, but enough for client-side)
    let hash = 0;
    for (let i = 0; i < pin.length; i++) {
        const char = pin.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
    }
    return 'h_' + Math.abs(hash).toString(36);
}

async function doRegister() {
    const username = document.getElementById('regUsername').value.trim().toLowerCase();
    const displayName = document.getElementById('regDisplayName').value.trim();
    const pin = document.getElementById('regPin').value;
    const pinConfirm = document.getElementById('regPinConfirm').value;
    
    if (!username || username.length < 3) {
        showToast('❌ Username minimal 3 karakter!', 'error');
        return;
    }
    if (!/^[a-z0-9_]+$/.test(username)) {
        showToast('❌ Username hanya boleh a-z, 0-9, _', 'error');
        return;
    }
    if (!displayName) {
        showToast('❌ Display name wajib diisi!', 'error');
        return;
    }
    if (pin.length < 4 || pin.length > 6 || !/^\d+$/.test(pin)) {
        showToast('❌ PIN harus 4-6 digit angka!', 'error');
        return;
    }
    if (pin !== pinConfirm) {
        showToast('❌ PIN tidak cocok!', 'error');
        return;
    }
    if (state.data.users[username]) {
        showToast('❌ Username sudah dipakai!', 'error');
        return;
    }
    
    // Create user
    state.data.users[username] = {
        username: username,
        displayName: displayName,
        pinHash: hashPin(pin),
        avatarColor: (Object.keys(state.data.users).length % 8) + 1,
        created: new Date().toISOString(),
        scripts: []
    };
    
    const success = await saveData();
    if (success) {
        showToast('✅ Registrasi berhasil! Silakan login.', 'success');
        state.currentUser = username;
        localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify({ username }));
        renderUserList();
        showApp();
    }
}

async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim().toLowerCase();
    const pin = document.getElementById('loginPin').value;
    
    if (!username || !pin) {
        showToast('❌ Username dan PIN wajib diisi!', 'error');
        return;
    }
    
    const user = state.data.users[username];
    if (!user) {
        showToast('❌ Username tidak ditemukan!', 'error');
        return;
    }
    
    if (user.pinHash !== hashPin(pin)) {
        showToast('❌ PIN salah!', 'error');
        return;
    }
    
    state.currentUser = username;
    localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify({ username }));
    showToast(`👋 Selamat datang, ${user.displayName}!`, 'success');
    showApp();
}

function doLogout() {
    if (!confirm('Yakin ingin logout?')) return;
    state.currentUser = null;
    state.currentScriptId = null;
    localStorage.removeItem(CONFIG.SESSION_KEY);
    showLogin();
    renderUserList();
    showToast('👋 Sampai jumpa!', 'info');
}

function quickLogin(username) {
    document.getElementById('loginUsername').value = username;
    document.getElementById('loginPin').focus();
}

function renderUserList() {
    const container = document.getElementById('userList');
    const users = Object.values(state.data.users);
    
    if (users.length === 0) {
        container.innerHTML = '';
        return;
    }
    
    container.innerHTML = `
        <div class="user-list-title">👥 Akun Terdaftar (${users.length})</div>
        ${users.map(u => `
            <div class="user-chip" onclick="quickLogin('${u.username}')">
                <div class="user-avatar avatar-${u.avatarColor}">${u.displayName.charAt(0).toUpperCase()}</div>
                <div class="user-chip-info">
                    <div class="user-chip-name">${escapeHtml(u.displayName)}</div>
                    <div class="user-chip-meta">@${u.username} • ${(u.scripts || []).length} script</div>
                </div>
                <span style="color:var(--text-dim)">→</span>
            </div>
        `).join('')}
    `;
}

// ============================================
// UI NAVIGATION
// ============================================
function showLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').classList.remove('show');
}

function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').classList.add('show');
    
    const user = state.data.users[state.currentUser];
    document.getElementById('profileName').textContent = user.displayName;
    const avatar = document.getElementById('profileAvatar');
    avatar.textContent = user.displayName.charAt(0).toUpperCase();
    avatar.className = `profile-avatar avatar-${user.avatarColor}`;
    
    updateNavBadge();
    navigate('dashboard');
}

function navigate(page) {
    state.currentPage = page;
    state.currentScriptId = null;
    
    document.querySelectorAll('.nav-item').forEach(n => {
        n.classList.toggle('active', n.dataset.page === page);
    });
    
    const titles = {
        dashboard: '📊 Dashboard',
        scripts: '📜 My Scripts',
        templates: '📋 Templates',
        settings: '⚙️ Settings',
        editor: '✏️ Script Editor'
    };
    document.getElementById('pageTitle').textContent = titles[page] || '📊 Dashboard';
    
    // Close mobile sidebar
    document.getElementById('sidebar').classList.remove('show');
    
    renderPage();
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('show');
}

function updateNavBadge() {
    const user = state.data.users[state.currentUser];
    document.getElementById('navScriptCount').textContent = (user.scripts || []).length;
}

// ============================================
// PAGE RENDERING
// ============================================
function renderPage() {
    const area = document.getElementById('contentArea');
    
    switch(state.currentPage) {
        case 'dashboard': renderDashboard(area); break;
        case 'scripts': renderScripts(area); break;
        case 'templates': renderTemplates(area); break;
        case 'settings': renderSettings(area); break;
        case 'editor': renderEditor(area); break;
    }
}

function renderDashboard(area) {
    const user = state.data.users[state.currentUser];
    const scripts = user.scripts || [];
    const totalSize = scripts.reduce((sum, s) => sum + (s.code || '').length, 0);
    const activeCount = scripts.filter(s => s.enabled).length;
    const pinnedCount = scripts.filter(s => s.pinned).length;
    
    const recent = [...scripts].sort((a, b) => 
        new Date(b.updated) - new Date(a.updated)
    ).slice(0, 5);
    
    area.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📜</div>
                <div class="stat-value">${scripts.length}</div>
                <div class="stat-label">Total Scripts</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value">${activeCount}</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📌</div>
                <div class="stat-value">${pinnedCount}</div>
                <div class="stat-label">Pinned</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💾</div>
                <div class="stat-value">${formatSize(totalSize)}</div>
                <div class="stat-label">Total Size</div>
            </div>
        </div>

        <div class="section-header">
            <div class="section-title">⚡ Quick Actions</div>
        </div>
        <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(150px, 1fr))">
            <div class="stat-card" style="cursor:pointer" onclick="newScript()">
                <div class="stat-icon">➕</div>
                <div style="font-weight:600;margin-top:5px">New Script</div>
            </div>
            <div class="stat-card" style="cursor:pointer" onclick="importScript()">
                <div class="stat-icon">📤</div>
                <div style="font-weight:600;margin-top:5px">Import</div>
            </div>
            <div class="stat-card" style="cursor:pointer" onclick="backupAll()">
                <div class="stat-icon">💿</div>
                <div style="font-weight:600;margin-top:5px">Backup</div>
            </div>
            <div class="stat-card" style="cursor:pointer" onclick="navigate('templates')">
                <div class="stat-icon">📋</div>
                <div style="font-weight:600;margin-top:5px">Templates</div>
            </div>
        </div>

        <div class="section-header" style="margin-top:30px">
            <div class="section-title">🕐 Recent Scripts</div>
            <button class="btn btn-secondary" style="padding:8px 14px;font-size:12px" onclick="navigate('scripts')">
                Lihat Semua →
            </button>
        </div>
        ${recent.length === 0 ? `
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <div class="empty-title">Belum ada script</div>
                <div class="empty-desc">Mulai buat script pertamamu!</div>
                <button class="btn btn-primary" style="width:auto;padding:10px 20px" onclick="newScript()">➕ Buat Script</button>
            </div>
        ` : `
            <div class="script-grid">
                ${recent.map(s => renderScriptCard(s)).join('')}
            </div>
        `}
    `;
}

function renderScripts(area) {
    const user = state.data.users[state.currentUser];
    let scripts = user.scripts || [];
    
    // Apply filter
    if (state.filter === 'active') scripts = scripts.filter(s => s.enabled);
    else if (state.filter === 'disabled') scripts = scripts.filter(s => !s.enabled);
    else if (state.filter === 'pinned') scripts = scripts.filter(s => s.pinned);
    
    // Apply search
    if (state.searchQuery) {
        const q = state.searchQuery.toLowerCase();
        scripts = scripts.filter(s => 
            s.name.toLowerCase().includes(q) ||
            (s.desc || '').toLowerCase().includes(q) ||
            (s.tags || []).some(t => t.toLowerCase().includes(q))
        );
    }
    
    // Sort: pinned first, then by updated
    scripts.sort((a, b) => {
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        return new Date(b.updated) - new Date(a.updated);
    });
    
    area.innerHTML = `
        <div class="section-header">
            <div class="section-title">
                📜 My Scripts
                <span class="script-tag">${scripts.length}</span>
            </div>
            <div class="filter-chips">
                <div class="chip ${state.filter==='all'?'active':''}" onclick="setFilter('all')">Semua</div>
                <div class="chip ${state.filter==='active'?'active':''}" onclick="setFilter('active')">✅ Aktif</div>
                <div class="chip ${state.filter==='disabled'?'active':''}" onclick="setFilter('disabled')">⛔ Nonaktif</div>
                <div class="chip ${state.filter==='pinned'?'active':''}" onclick="setFilter('pinned')">📌 Pinned</div>
            </div>
        </div>

        ${scripts.length === 0 ? `
            <div class="empty-state">
                <div class="empty-icon">🔍</div>
                <div class="empty-title">${state.searchQuery || state.filter !== 'all' ? 'Tidak ada hasil' : 'Belum ada script'}</div>
                <div class="empty-desc">${state.searchQuery || state.filter !== 'all' ? 'Coba kata kunci lain' : 'Klik tombol di bawah untuk mulai!'}</div>
                ${!state.searchQuery && state.filter === 'all' ? `
                    <button class="btn btn-primary" style="width:auto;padding:10px 20px" onclick="newScript()">➕ Buat Script Pertama</button>
                ` : ''}
            </div>
        ` : `

function renderScriptCard(script) {
    const categoryIcons = {

        game: '🎮', social: '💬', shopping: '🛒', productivity: '⚡', other: '📁'
    };
    const icon = categoryIcons[script.category] || '📦';
    
    return `
        <div class="script-card ${script.pinned ? 'pinned' : ''} ${!script.enabled ? 'disabled' : ''}" 
             onclick="editScript('${script.id}')">

function newScript() {
    state.currentScriptId = null;
    navigate('editor');
}

function editScript(id) {
    state.currentScriptId = id;
    navigate('editor');
}

async function saveScript() {
    const name = document.getElementById('scriptName').value.trim();
    const code = document.getElementById('scriptCode').value;
    
    if (!name) { showToast('❌ Nama wajib diisi!', 'error'); return; }
    if (!code.trim()) { showToast('❌ Code tidak boleh kosong!', 'error'); return; }
    
    const user = state.data.users[state.currentUser];
    if (!user.scripts) user.scripts = [];
    
    const scriptData = {
        name,
        desc: document.getElementById('scriptDesc').value.trim(),
        code,
        match: document.getElementById('scriptMatch').value.trim(),
        author: document.getElementById('scriptAuthor').value.trim(),
        version: document.getElementById('scriptVersion').value.trim() || '1.0',
        category: document.getElementById('scriptCategory').value,
        tags: document.getElementById('scriptTags').value.split(',').map(t => t.trim()).filter(t => t),
        updated: new Date().toISOString()
    };
    
    if (state.currentScriptId) {
        const idx = user.scripts.findIndex(s => s.id === state.currentScriptId);
        if (idx !== -1) {
            user.scripts[idx] = { ...user.scripts[idx], ...scriptData };
        }
    } else {
        const newScript = {
            id: 's_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
            created: new Date().toISOString(),
            pinned: false,
            enabled: true,
            ...scriptData
        };
        user.scripts.push(newScript);
        state.currentScriptId = newScript.id;
    }
    
    const success = await saveData();
    if (success) {
        updateNavBadge();
        showToast('✅ Berhasil disimpan!', 'success');
        document.getElementById('lastSaved').textContent = 'Saved: just now';
    }
}

async function deleteScriptById(id) {
    const user = state.data.users[state.currentUser];
    const script = user.scripts.find(s => s.id === id);
    if (!script) return;
    
    if (!confirm(`Hapus "${script.name}"?`)) return;
    
    user.scripts = user.scripts.filter(s => s.id !== id);
    const success = await saveData();
    if (success) {
        if (state.currentScriptId === id) state.currentScriptId = null;
        updateNavBadge();
        renderPage();
        showToast('🗑️ Script dihapus!', 'success');
    }
}

async function duplicateScript(id) {
    const user = state.data.users[state.currentUser];
    const original = user.scripts.find(s => s.id === id);
    if (!original) return;
    
    const copy = {
        ...JSON.parse(JSON.stringify(original)),
        id: 's_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
        name: original.name + ' (Copy)',
        created: new Date().toISOString(),
        updated: new Date().toISOString()
    };
    user.scripts.push(copy);
    
    const success = await saveData();
    if (success) {
        updateNavBadge();
        renderPage();
        showToast('📑 Script diduplikat!', 'success');
    }
}

async function togglePinScript(id) {
    const user = state.data.users[state.currentUser];
    const script = user.scripts.find(s => s.id === id);
    if (!script) return;
    script.pinned = !script.pinned;
    script.updated = new Date().toISOString();
    
    const success = await saveData();
    if (success) {
        renderPage();
        showToast(script.pinned ? '📌 Pinned!' : '📌 Unpinned', 'success');
    }
}

async function toggleEnabledScript(id) {
    const user = state.data.users[state.currentUser];
    const script = user.scripts.find(s => s.id === id);
    if (!script) return;
    script.enabled = !script.enabled;
    script.updated = new Date().toISOString();
    
    const success = await saveData();
    if (success) {
        updateNavBadge();
        renderPage();
        showToast(script.enabled ? '✅ Enabled' : '⛔ Disabled', 'success');
    }
}

function exportSingle(id) {
    const user = state.data.users[state.currentUser];
    const script = user.scripts.find(s => s.id === id);
    if (!script) return;
    downloadFile(script.code, script.name.replace(/[^a-z0-9]/gi, '_') + '.user.js');
    showToast('📥 Script di-export!', 'success');
}

function exportCurrent() {
    const code = document.getElementById('scriptCode').value;
    const name = document.getElementById('scriptName').value || 'script';
    if (!code) { showToast('❌ Tidak ada code!', 'error'); return; }
    downloadFile(code, name.replace(/[^a-z0-9]/gi, '_') + '.user.js');
    showToast('📥 Exported!', 'success');
}

function copyScript() {
    const code = document.getElementById('scriptCode')?.value;
    if (!code) { showToast('❌ Tidak ada code!', 'error'); return; }
    navigator.clipboard.writeText(code).then(() => {
        showToast('📋 Code dicopy!', 'success');
    });
}

function importScript() {
    const input = document.getElementById('fileInput');
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const code = ev.target.result;
            state.currentScriptId = null;
            navigate('editor');
            setTimeout(() => {
                document.getElementById('scriptCode').value = code;
                const nameMatch = code.match(/@name\s+(.+)/);
                const descMatch = code.match(/@description\s+(.+)/);
                const matchMatch = code.match(/@match\s+(.+)/);
                if (nameMatch) document.getElementById('scriptName').value = nameMatch[1].trim();
                if (descMatch) document.getElementById('scriptDesc').value = descMatch[1].trim();
                if (matchMatch) document.getElementById('scriptMatch').value = matchMatch[1].trim();
                updateEditorStats();
                showToast('📤 File di-import!', 'success');
            }, 100);
        };
        reader.readAsText(file);
        input.value = '';
    };
    input.click();
}

async function updateProfile() {
    const displayName = document.getElementById('settingsDisplayName').value.trim();
    if (!displayName) { showToast('❌ Display name wajib!', 'error'); return; }
    
    state.data.users[state.currentUser].displayName = displayName;
    const success = await saveData();
    if (success) {
        showApp();
        showToast('✅ Profile updated!', 'success');
    }
}

async function changePin() {
    const oldPin = document.getElementById('oldPin').value;
    const newPin = document.getElementById('newPin').value;
    const confirm = document.getElementById('newPinConfirm').value;
    
    const user = state.data.users[state.currentUser];
    if (user.pinHash !== hashPin(oldPin)) {
        showToast('❌ PIN lama salah!', 'error'); return;
    }
    if (newPin.length < 4 || newPin.length > 6 || !/^\d+$/.test(newPin)) {
        showToast('❌ PIN baru harus 4-6 digit!', 'error'); return;
    }
    if (newPin !== confirm) {
        showToast('❌ Konfirmasi tidak cocok!', 'error'); return;
    }
    
    user.pinHash = hashPin(newPin);
    const success = await saveData();
    if (success) {
        document.getElementById('oldPin').value = '';
        document.getElementById('newPin').value = '';
        document.getElementById('newPinConfirm').value = '';
        showToast('✅ PIN berhasil diubah!', 'success');
    }
}

async function backupAll() {
    const user = state.data.users[state.currentUser];
    const scripts = user.scripts || [];
    if (scripts.length === 0) {
        showToast('❌ Tidak ada script!', 'error'); return;
    }
    
    const backup = {
        version: '3.0',
        user: state.currentUser,
        exported: new Date().toISOString(),
        count: scripts.length,
        scripts: scripts
    };
    
    downloadFile(JSON.stringify(backup, null, 2), 
        `tm_backup_${state.currentUser}_${new Date().toISOString().split('T')[0]}.json`);
    showToast(`💿 ${scripts.length} script di-backup!`, 'success');
}

function restoreAll() {
    const input = document.getElementById('backupInput');
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!confirm('⚠️ Restore akan MENGGANTI semua script Anda. Lanjutkan?')) {
            input.value = ''; return;
        }
        
        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                const backup = JSON.parse(ev.target.result);
                if (!backup.scripts || !Array.isArray(backup.scripts)) {
                    throw new Error('Format invalid');
                }
                state.data.users[state.currentUser].scripts = backup.scripts;
                const success = await saveData();
                if (success) {
                    updateNavBadge();
                    renderPage();
                    showToast(`♻️ ${backup.scripts.length} script direstore!`, 'success');
                }
            } catch (err) {
                showToast('❌ Error: ' + err.message, 'error');
            }
        };
        reader.readAsText(file);
        input.value = '';
    };
    input.click();
}

async function deleteAllMyScripts() {
    if (!confirm('🚨 HAPUS SEMUA SCRIPT ANDA? Tidak bisa dibatalkan!')) return;
    if (!confirm('Yakin 100%?')) return;
    
    state.data.users[state.currentUser].scripts = [];
    const success = await saveData();
    if (success) {
        updateNavBadge();
        renderPage();
        showToast('🗑️ Semua script dihapus!', 'success');
    }
}

// ============================================
// MODAL & TOAST
// ============================================
function showModal(html) {
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}

function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
    toast.innerHTML = `<span style="font-size:18px">${icons[type]}</span><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.transition = 'all 0.3s';
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

// ============================================
// EDITOR EVENTS
// ============================================
function setupEditorEvents() {
    const editor = document.getElementById('scriptCode');
    if (!editor) return;
    
    editor.addEventListener('input', () => {
        updateEditorStats();
        const status = document.getElementById('editorStatus');
        if (status) status.textContent = 'Editing...';
    });
    
    editor.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
            editor.selectionStart = editor.selectionEnd = start + 2;
            updateEditorStats();
        }
    });
}

function updateEditorStats() {
    const editor = document.getElementById('scriptCode');
    if (!editor) return;
    const code = editor.value;
    const lineCount = document.getElementById('lineCount');
    const charCount = document.getElementById('charCount');
    if (lineCount) lineCount.textContent = code ? code.split('\n').length : 0;
    if (charCount) charCount.textContent = code.length;
}

// ============================================
// KEYBOARD SHORTCUTS
// ============================================
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey) {
        switch(e.key) {
            case 's':
                e.preventDefault();
                if (state.currentPage === 'editor') saveScript();
                break;
            case 'n':
                e.preventDefault();
                newScript();
                break;
            case 'k':
                e.preventDefault();
                document.getElementById('searchInput')?.focus();
                break;
            case 'b':
                e.preventDefault();
                backupAll();
                break;
        }
    }
    if (e.key === 'Escape') closeModal();
});

// UTILITIES

function downloadFile(content, filename) {
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function timeAgo(date) {
    if (!date) return '';
    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
    if (seconds < 60) return 'just now';
    if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
    if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
    if (seconds < 604800) return Math.floor(seconds / 86400) + 'd ago';
    return new Date(date).toLocaleDateString('id-ID');
}

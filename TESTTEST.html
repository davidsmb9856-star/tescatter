<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0066ff">
<title>⚡ FOTO - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
/* BLUE COOL PALETTE */
--blue-50: #eff6ff; --blue-100: #dbeafe; --blue-200: #bfdbfe;
--blue-300: #93c5fd; --blue-400: #60a5fa; --blue-500: #3b82f6;
--blue-600: #2563eb; --blue-700: #1d4ed8; --blue-800: #1e40af;
--blue-900: #1e3a8a; --blue-950: #0f2040;

--cyan-400: #22d3ee; --cyan-500: #06b6d4; --cyan-600: #0891b2;

--ice-100: #f0f9ff; --ice-200: #e0f2fe; --ice-300: #bae6fd;
--ice-400: #7dd3fc; --ice-500: #38bdf8;

--surface-dark: #020617;
--surface-100: #0a1628;
--surface-200: #0f2347;
--surface-300: #142d58;
--surface-400: #1a3a6e;
--surface-500: #204a8a;

--text-white: #f8fafc;
--text-blue-100: #dbeafe;
--text-blue-200: #bfdbfe;
--text-blue-300: #93c5fd;
--text-blue-400: #60a5fa;

--sidebar-width: 280px;
--header-height: 64px;
--radius-sm: 8px;
--radius-md: 14px;
--radius-lg: 20px;
--radius-xl: 28px;

--shadow-sm: 0 2px 8px rgba(0, 50, 150, 0.15);
--shadow-md: 0 4px 20px rgba(0, 80, 200, 0.25);
--shadow-lg: 0 8px 40px rgba(0, 100, 255, 0.3);
--shadow-glow: 0 0 30px rgba(59, 130, 246, 0.4), 0 0 60px rgba(59, 130, 246, 0.2);
--shadow-glow-intense: 0 0 50px rgba(59, 130, 246, 0.5), 0 0 100px rgba(59, 130, 246, 0.3), 0 0 150px rgba(59, 130, 246, 0.15);

--font-main: 'Inter', system-ui, sans-serif;
--font-display: 'Space Grotesk', system-ui, sans-serif;
--font-mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: var(--font-main);
background: var(--surface-dark);
color: var(--text-white);
min-height: 100vh;
min-height: 100dvh;
overflow: hidden;
}

/* ✨ ANIMATED BACKGROUND */
.bg-canvas {
position: fixed; inset: 0; z-index: -2; overflow: hidden;
}
.bg-gradient {
position: absolute; inset: 0;
background:
radial-gradient(800px 400px at 20% 30%, rgba(59, 130, 246, 0.18) 0%, transparent 55%),
radial-gradient(600px 300px at 80% 20%, rgba(34, 211, 238, 0.12) 0%, transparent 55%),
radial-gradient(700px 350px at 60% 85%, rgba(37, 99, 235, 0.14) 0%, transparent 60%),
radial-gradient(500px 250px at 15% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 65%);
animation: gradientShift 22s ease-in-out infinite alternate;
}
@keyframes gradientShift {
0%, 100% { transform: translate(0, 0) scale(1); filter: hue-rotate(0deg); }
33% { transform: translate(2%, -1%) scale(1.025); filter: hue-rotate(8deg); }
66% { transform: translate(-1%, 2%) scale(0.985); filter: hue-rotate(-6deg); }
}

.bg-orbs { position: absolute; inset: 0; pointer-events: none; }
.bg-orb {
position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.35;
animation: orbFloat 30s ease-in-out infinite;
}
.bg-orb:nth-child(1) { width: 400px; height: 400px; background: var(--blue-600); top: -100px; left: -100px; animation-delay: 0s; }
.bg-orb:nth-child(2) { width: 300px; height: 300px; background: var(--cyan-500); top: 60%; right: -80px; animation-delay: -10s; }
.bg-orb:nth-child(3) { width: 350px; height: 350px; background: var(--blue-700); bottom: -100px; left: 40%; animation-delay: -20s; }
@keyframes orbFloat {
0%, 100% { transform: translate(0, 0) rotate(0deg); }
25% { transform: translate(30px, -20px) rotate(5deg); }
50% { transform: translate(-20px, 30px) rotate(-3deg); }
75% { transform: translate(15px, 15px) rotate(3deg); }
}

/* Grid lines */
.bg-grid {
position: fixed; inset: 0; z-index: -1; pointer-events: none;
background-image:
linear-gradient(rgba(59, 130, 246, 0.07) 1px, transparent 1px),
linear-gradient(90deg, rgba(59, 130, 246, 0.07) 1px, transparent 1px);
background-size: 60px 60px;
mask-image: radial-gradient(ellipse 70% 65% at 50% 50%, black 30%, transparent 78%);
animation: gridPan 40s linear infinite;
}
@keyframes gridPan { 0% { background-position: 0 0; } 100% { background-position: 60px 60px; } }

/* Scan line */
.bg-scanline {
position: fixed; left: 0; right: 0; height: 2px; z-index: 50; pointer-events: none;
background: linear-gradient(90deg, transparent, var(--blue-400), var(--cyan-400), transparent);
opacity: 0.35; animation: scanMove 8s linear infinite;
filter: blur(1px); box-shadow: 0 0 15px var(--blue-500);
}
@keyframes scanMove { 0% { top: -5px; opacity: 0; } 5% { opacity: 0.35; } 95% { opacity: 0.35; } 100% { top: 100%; opacity: 0; } }

/* Particles */
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
position: absolute; width: 3px; height: 3px; border-radius: 50%;
animation: pFloat 25s infinite ease-in-out; opacity: 0;
}
.particle.active { opacity: 0.7; }
.particle:nth-child(3n+1) { background: var(--blue-400); box-shadow: 0 0 10px var(--blue-400); }
.particle:nth-child(3n+2) { background: var(--cyan-400); box-shadow: 0 0 10px var(--cyan-400); }
.particle:nth-child(3n+3) { background: var(--ice-400); box-shadow: 0 0 10px var(--ice-400); }
@keyframes pFloat {
0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
15% { opacity: 0.7; }
85% { opacity: 0.7; }
100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

/* ✨ LAYOUT STRUCTURE */
.app-layout {
display: flex; height: 100vh; height: 100dvh; overflow: hidden;
}

/* ✨ SIDEBAR */
.sidebar {
width: var(--sidebar-width); background: rgba(2, 10, 30, 0.95);
border-right: 1px solid rgba(59, 130, 246, 0.25);
display: flex; flex-direction: column; position: relative;
backdrop-filter: blur(24px); overflow-y: auto; overflow-x: hidden;
transition: width var(--transition-normal), transform var(--transition-normal);
z-index: 100;
}
.sidebar::before {
content: ''; position: absolute; top: 0; left: 0; width: 1px; height: 100%;
background: linear-gradient(180deg, var(--blue-500), var(--cyan-400), var(--blue-500));
opacity: 0.6; box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
}

.sidebar-header {
padding: 22px 18px; border-bottom: 1px solid rgba(59, 130, 246, 0.2);
}
.sidebar-brand {
display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
}
.sidebar-logo {
width: 38px; height: 38px; border-radius: var(--radius-md);
background: linear-gradient(135deg, var(--blue-600), var(--blue-500), var(--cyan-400));
display: flex; align-items: center; justify-content: center;
font-size: 18px; box-shadow: 0 0 20px rgba(59, 130, 246, 0.45);
font-weight: 900; color: white;
}
.sidebar-brand-text h2 {
font-family: var(--font-display); font-size: 16px; font-weight: 800;
background: linear-gradient(135deg, var(--blue-300), var(--cyan-400));
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
letter-spacing: 1.5px;
}
.sidebar-brand-text p {
font-size: 11px; color: var(--text-blue-300); opacity: 0.75;
letter-spacing: 0.5px; margin-top: 2px;
}

.sidebar-search {
margin-top: 14px; position: relative;
}
.sidebar-search input {
width: 100%; padding: 11px 14px 11px 36px;
background: rgba(59, 130, 246, 0.08); border: 1px solid rgba(59, 130, 246, 0.2);
border-radius: var(--radius-sm); color: var(--text-white);
font-size: 13px; font-family: var(--font-main);
transition: all 0.25s;
}
.sidebar-search input::placeholder { color: var(--text-blue-400); opacity: 0.55; }
.sidebar-search input:focus {
outline: none; border-color: var(--blue-500);
box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
background: rgba(59, 130, 246, 0.12);
}
.sidebar-search i {
position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
color: var(--blue-400); font-size: 13px; pointer-events: none;
}

/* Sidebar Nav */
.sidebar-nav { flex: 1; padding: 16px 10px; overflow-y: auto; }
.nav-section { margin-bottom: 20px; }
.nav-section-title {
font-family: var(--font-mono); font-size: 10px; font-weight: 700;
color: var(--text-blue-400); text-transform: uppercase; letter-spacing: 2px;
padding: 0 8px; margin-bottom: 8px;
}
.nav-item {
display: flex; align-items: center; gap: 10px;
padding: 10px 12px; border-radius: var(--radius-sm);
color: var(--text-blue-200); font-size: 13px; font-weight: 500;
cursor: pointer; transition: all 0.2s; margin-bottom: 2px;
position: relative;
}
.nav-item:hover { background: rgba(59, 130, 246, 0.1); color: var(--text-white); }
.nav-item.active {
background: linear-gradient(90deg, rgba(59, 130, 246, 0.25), rgba(59, 130, 246, 0.12));
color: var(--blue-300); border-left: 3px solid var(--blue-400);
}
.nav-item.active::before {
content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
background: linear-gradient(180deg, var(--cyan-400), var(--blue-500));
border-radius: 0 2px 2px 0; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
}
.nav-item i { font-size: 14px; width: 18px; text-align: center; }
.nav-item .nav-badge {
margin-left: auto; background: var(--blue-600); color: var(--text-white);
font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px;
font-family: var(--font-mono);
}

.sidebar-footer {
padding: 14px 18px; border-top: 1px solid rgba(59, 130, 246, 0.2);
}
.sidebar-stats {
display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
}
.stat-card {
background: rgba(59, 130, 246, 0.08); border: 1px solid rgba(59, 130, 246, 0.2);
border-radius: var(--radius-sm); padding: 10px; text-align: center;
}
.stat-card .stat-value {
font-family: var(--font-mono); font-size: 18px; font-weight: 700;
color: var(--blue-300); display: block;
}
.stat-card .stat-label { font-size: 10px; color: var(--text-blue-400); opacity: 0.8; }

.sidebar-btn-back {
display: flex; align-items: center; justify-content: center; gap: 8px;
width: 100%; padding: 10px; background: rgba(59, 130, 246, 0.12);
border: 1px solid rgba(59, 130, 246, 0.3); border-radius: var(--radius-sm);
color: var(--blue-300); font-size: 12px; font-weight: 600;
text-decoration: none; transition: all 0.25s; font-family: var(--font-main);
}
.sidebar-btn-back:hover {
background: rgba(59, 130, 246, 0.22); border-color: var(--blue-400);
box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
transform: translateX(-3px);
}

/* ✨ MAIN CONTENT AREA */
.main-content {
flex: 1; overflow-y: auto; overflow-x: hidden;
position: relative; background: linear-gradient(135deg, rgba(15, 35, 71, 0.4), rgba(2, 10, 30, 0.8));
}
.main-content::-webkit-scrollbar { width: 7px; }
.main-content::-webkit-scrollbar-track { background: transparent; }
.main-content::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--blue-500), var(--blue-700));
border-radius: 10px; border: 1.5px solid var(--surface-dark);
}

/* TOP BAR */
.topbar {
position: sticky; top: 0; z-index: 50;
display: flex; align-items: center; justify-content: space-between;
padding: 14px 24px; gap: 16px;
background: rgba(2, 10, 30, 0.85);
border-bottom: 1px solid rgba(59, 130, 246, 0.2);
backdrop-filter: blur(20px);
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.topbar-toggle {
display: none; background: none; border: 1px solid rgba(59, 130, 246, 0.35);
color: var(--blue-300); width: 38px; height: 38px; border-radius: var(--radius-sm);
cursor: pointer; font-size: 16px; align-items: center; justify-content: center;
transition: all 0.2s;
}
.topbar-toggle:hover { background: rgba(59, 130, 246, 0.15); }
.topbar-title h1 {
font-family: var(--font-display); font-size: 20px; font-weight: 700;
letter-spacing: 0.5px;
}
.topbar-title h1 span { color: var(--blue-400); }
.topbar-title p {
font-size: 12px; color: var(--text-blue-400); margin-top: 1px;
}

.topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.topbar-btn {
width: 36px; height: 36px; border-radius: var(--radius-sm);
background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.25);
color: var(--blue-300); font-size: 14px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all 0.25s; position: relative;
}
.topbar-btn:hover { background: rgba(59, 130, 246, 0.22); border-color: var(--blue-400); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.topbar-btn .badge-dot {
position: absolute; top: 5px; right: 5px; width: 7px; height: 7px;
background: var(--blue-400); border-radius: 50%; border: 1.5px solid var(--surface-dark);
}

/* VIEW TOGGLE */
.view-switch {
display: flex; background: rgba(59, 130, 246, 0.08);
border: 1px solid rgba(59, 130, 246, 0.2); border-radius: var(--radius-sm);
padding: 3px;
}
.view-btn {
padding: 6px 10px; background: none; border: none; border-radius: 6px;
color: var(--text-blue-400); cursor: pointer; font-size: 12px; transition: all 0.2s;
}
.view-btn.active { background: rgba(59, 130, 246, 0.25); color: var(--blue-300); box-shadow: var(--shadow-sm); }

/* FILTER CHIPS */
.filter-bar {
display: flex; gap: 8px; padding: 16px 24px;
overflow-x: auto; scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.chip {
padding: 7px 14px; background: rgba(59, 130, 246, 0.1);
border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 20px;
color: var(--text-blue-300); font-size: 12px; font-weight: 600;
cursor: pointer; transition: all 0.25s; white-space: nowrap;
font-family: var(--font-main);
}
.chip:hover { background: rgba(59, 130, 246, 0.2); border-color: var(--blue-400); }
.chip.active {
background: linear-gradient(135deg, rgba(59, 130, 246, 0.35), rgba(34, 211, 238, 0.2));
border-color: var(--blue-400); color: var(--blue-300);
box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
}

/* GALLERY AREA */
.gallery-area { padding: 8px 24px 28px; }
.results-header {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 18px;
}
.results-header h3 {
font-family: var(--font-display); font-size: 14px; color: var(--text-blue-200);
font-weight: 600;
}
.results-header span {
font-family: var(--font-mono); font-size: 12px; color: var(--blue-400);
background: rgba(59, 130, 246, 0.12); padding: 3px 10px; border-radius: 12px;
}

/* GRID */
.photo-grid {
display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
transition: all 0.3s;
}
.photo-grid.list-view { grid-template-columns: 1fr; }
.photo-grid.list-view .gallery-card { flex-direction: row; height: auto; }
.photo-grid.list-view .card-media { width: 200px; height: 160px; flex-shrink: 0; }

/* GALLERY CARD - COMPLETELY NEW DESIGN */
.gallery-card {
background: rgba(15, 35, 71, 0.65);
border: 1px solid rgba(59, 130, 246, 0.2);
border-radius: var(--radius-lg);
overflow: hidden; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
position: relative; backdrop-filter: blur(12px);
animation: cardUp 0.5s ease forwards; opacity: 0; transform: translateY(30px);
display: flex; flex-direction: column;
}
.gallery-card::before {
content: ''; position: absolute; inset: 0; border-radius: inherit;
background: linear-gradient(160deg, rgba(59, 130, 246, 0.15), transparent 55%, rgba(34, 211, 238, 0.1));
opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 1;
}
.gallery-card::after {
content: ''; position: absolute; inset: -1.5px; border-radius: inherit;
background: linear-gradient(135deg, var(--blue-500), var(--cyan-400), var(--blue-400), var(--blue-500));
opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 0;
filter: blur(14px);
}
.gallery-card:hover::before { opacity: 1; }
.gallery-card:hover::after { opacity: 0.4; }
.gallery-card:hover {
transform: translateY(-6px) scale(1.015);
border-color: rgba(59, 130, 246, 0.45);
box-shadow: var(--shadow-glow), 0 20px 55px rgba(0, 0, 0, 0.5);
}
.gallery-card:nth-child(1) { animation-delay: 0.08s; }
.gallery-card:nth-child(2) { animation-delay: 0.14s; }
.gallery-card:nth-child(3) { animation-delay: 0.2s; }
.gallery-card:nth-child(4) { animation-delay: 0.26s; }
.gallery-card:nth-child(5) { animation-delay: 0.32s; }
@keyframes cardUp { to { opacity: 1; transform: translateY(0); } }

.card-media {
position: relative; height: 280px; overflow: hidden; cursor: pointer;
background: linear-gradient(145deg, #0a1e3d, #060f22);
}
.card-media::after {
content: ''; position: absolute; inset: 0;
background: linear-gradient(180deg, transparent 55%, rgba(6, 15, 34, 0.7) 85%, rgba(6, 15, 34, 0.95));
pointer-events: none; z-index: 2;
}
.card-media img {
width: 100%; height: 100%; object-fit: contain;
transition: all 0.45s ease; filter: drop-shadow(0 4px 15px rgba(0, 0, 0, 0.4));
}
.gallery-card:hover .card-media img { transform: scale(1.06); filter: drop-shadow(0 8px 25px rgba(59, 130, 246, 0.35)); }

.card-fav {
position: absolute; top: 12px; right: 12px; z-index: 3;
width: 34px; height: 34px; border-radius: 50%;
background: rgba(2, 10, 30, 0.75); border: 1px solid rgba(59, 130, 246, 0.3);
color: var(--text-blue-400); font-size: 13px; cursor: pointer;
backdrop-filter: blur(8px); transition: all 0.25s;
display: flex; align-items: center; justify-content: center;
}
.card-fav:hover, .card-fav.active {
background: var(--blue-600); border-color: var(--blue-400);
color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
transform: scale(1.12);
}
.card-fav.active i { font-weight: 900; }

.card-body {
padding: 18px; position: relative; z-index: 4;
display: flex; flex-direction: column; gap: 12px;
}
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.card-tag {
font-family: var(--font-mono); font-size: 9px; font-weight: 600;
padding: 3px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px;
}
.tag-photo { background: rgba(59, 130, 246, 0.18); color: var(--blue-300); border: 1px solid rgba(59, 130, 246, 0.3); }
.tag-new { background: rgba(34, 211, 238, 0.15); color: var(--cyan-400); border: 1px solid rgba(34, 211, 238, 0.3); }

.card-title {
font-family: var(--font-display); font-size: 15px; font-weight: 700;
color: var(--text-white); line-height: 1.35;
display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta {
display: flex; align-items: center; gap: 14px;
font-size: 11px; color: var(--text-blue-400);
}
.card-meta span { display: flex; align-items: center; gap: 4px; }
.card-meta i { font-size: 11px; }

.card-actions {
display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid rgba(59, 130, 246, 0.15);
margin-top: 4px;
}
.c-btn {
flex: 1; height: 38px; border-radius: var(--radius-sm);
background: rgba(59, 130, 246, 0.12); border: 1px solid rgba(59, 130, 246, 0.25);
color: var(--blue-300); font-size: 11px; font-weight: 600; cursor: pointer;
transition: all 0.25s; display: flex; align-items: center; justify-content: center;
gap: 6px; font-family: var(--font-main);
}
.c-btn:hover { background: rgba(59, 130, 246, 0.28); border-color: var(--blue-400); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.c-btn i { font-size: 13px; }
.c-btn.copy:hover { background: rgba(34, 211, 238, 0.22); border-color: var(--cyan-400); color: var(--cyan-400); }
.c-btn.dl:hover { background: rgba(59, 130, 246, 0.3); border-color: var(--blue-400); color: var(--blue-300); }

/* SKELETON LOADER */
.skeleton { background: linear-gradient(90deg, rgba(59, 130, 246, 0.08) 25%, rgba(59, 130, 246, 0.15) 50%, rgba(59, 130, 246, 0.08) 75%); background-size: 400% 100%; animation: shimmer 1.8s ease-in-out infinite; border-radius: var(--radius-sm); }
@keyframes shimmer { 0% { background-position: 100% 50%; } 100% { background-position: -100% 50%; } }
.skeleton-card {
background: rgba(15, 35, 71, 0.5); border: 1px solid rgba(59, 130, 246, 0.15);
border-radius: var(--radius-lg); overflow: hidden;
}
.skeleton-media { height: 280px; background: rgba(59, 130, 246, 0.05); }
.skeleton-body { padding: 18px; }
.skeleton-text { height: 14px; margin-bottom: 10px; }
.skeleton-text:last-child { width: 70%; }
.skeleton-bar { height: 28px; margin-top: 12px; }

/* MODAL - SLIDE FROM RIGHT */
.modal-overlay {
position: fixed; inset: 0; z-index: var(--z-modal); display: none;
background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
}
.modal-overlay.active { display: flex; justify-content: flex-end; }
.modal-panel {
width: 100%; max-width: 900px; height: 100%;
background: var(--surface-100); border-left: 1px solid rgba(59, 130, 246, 0.3);
display: flex; flex-direction: column;
animation: slideInRight 0.45s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideInRight { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }

.modal-head {
display: flex; align-items: center; justify-content: space-between;
padding: 18px 22px; border-bottom: 1px solid rgba(59, 130, 246, 0.2);
background: rgba(59, 130, 246, 0.06);
}
.modal-head h3 {
font-family: var(--font-display); font-size: 16px; color: var(--blue-300); font-weight: 700;
}
.modal-close-btn {
width: 36px; height: 36px; border-radius: var(--radius-sm);
background: rgba(255, 100, 150, 0.12); border: 1px solid rgba(255, 100, 150, 0.35);
color: #ff6b9a; font-size: 14px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all 0.25s;
}
.modal-close-btn:hover { background: rgba(255, 100, 150, 0.25); transform: rotate(90deg); }

.modal-img-wrap {
flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center;
padding: 24px; background: linear-gradient(135deg, #081a33, #050e1a);
}
.modal-img-wrap img {
max-width: 100%; max-height: 60vh; object-fit: contain;
border-radius: var(--radius-md); box-shadow: var(--shadow-lg);
cursor: zoom-in; transition: transform 0.3s;
}
.modal-img-wrap img.zoomed { transform: scale(1.6); cursor: zoom-out; }

.modal-details {
padding: 20px 24px; border-top: 1px solid rgba(59, 130, 246, 0.2);
background: rgba(59, 130, 246, 0.04);
}
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.detail-item { font-size: 12px; color: var(--text-blue-400); }
.detail-item span { display: block; color: var(--text-blue-200); font-weight: 600; margin-top: 2px; }
.detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.detail-btn {
padding: 9px 16px; border-radius: var(--radius-sm);
background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3);
color: var(--blue-300); font-size: 12px; font-weight: 600; cursor: pointer;
transition: all 0.25s; display: flex; align-items: center; gap: 6px;
font-family: var(--font-main);
}
.detail-btn:hover { background: rgba(59, 130, 246, 0.3); transform: translateY(-2px); box-shadow: var(--shadow-md); }

/* TOAST */
.toast-container {
position: fixed; bottom: 24px; right: 24px; z-index: var(--z-toast);
display: flex; flex-direction: column; gap: 10px;
}
.toast {
padding: 13px 20px; border-radius: var(--radius-md);
background: rgba(15, 35, 71, 0.92); border: 1px solid rgba(59, 130, 246, 0.35);
color: var(--blue-300); font-size: 13px; font-weight: 600;
backdrop-filter: blur(14px); box-shadow: var(--shadow-lg);
display: flex; align-items: center; gap: 10px;
animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
font-family: var(--font-main);
}
.toast.out { animation: toastOut 0.3s ease forwards; }
@keyframes toastIn { from { opacity: 0; transform: translateX(40px) scale(0.95); } to { opacity: 1; transform: translateX(0) scale(1); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(40px) scale(0.95); } }
.toast i { font-size: 16px; }

/* EMPTY STATE */
.empty-state {
grid-column: 1 / -1; text-align: center; padding: 70px 20px;
}
.empty-state i { font-size: 56px; color: var(--blue-700); margin-bottom: 20px; opacity: 0.5; }
.empty-state h3 { font-family: var(--font-display); font-size: 18px; color: var(--text-blue-200); margin-bottom: 8px; }
.empty-state p { font-size: 13px; color: var(--text-blue-400); opacity: 0.75; }

/* ✨ MOBILE RESPONSIVE */
@media (max-width: 900px) {
.sidebar {
position: fixed; left: 0; top: 0; bottom: 0;
transform: translateX(-100%); width: 300px;
box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
}
.sidebar.open { transform: translateX(0); }
.sidebar-overlay {
display: none; position: fixed; inset: 0; z-index: 99;
background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px);
}
.sidebar-overlay.open { display: block; }
.topbar-toggle { display: flex; }
.topbar-right { gap: 6px; }
.photo-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
.card-media { height: 220px; }
.gallery-area { padding: 8px 16px 24px; }
.filter-bar { padding: 12px 16px; }
.topbar { padding: 12px 16px; }
.modal-panel { max-width: 100%; }
.detail-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
.photo-grid { grid-template-columns: 1fr; }
.card-media { height: 260px; }
.card-title { font-size: 14px; }
.topbar-title h1 { font-size: 17px; }
}

/* ANIMATIONS UTIL */
.fade-up { animation: fadeUp 0.4s ease forwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<!-- ✨ BACKGROUND -->
<div class="bg-canvas">
<div class="bg-gradient"></div>
<div class="bg-orbs"><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div></div>
</div>
<div class="bg-grid"></div>
<div class="bg-scanline"></div>
<div class="particles" id="particles"></div>

<!-- ✨ APP LAYOUT -->
<div class="app-layout">
<!-- SIDEBAR OVERLAY (MOBILE) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ✨ SIDEBAR -->
<aside class="sidebar" id="sidebar">
<div class="sidebar-header">
<div class="sidebar-brand">
<div class="sidebar-logo">⚡</div>
<div class="sidebar-brand-text">
<h2>LINE TOGEL</h2>
<p>FOTO GALLERY 2026</p>
</div>
</div>
<div class="sidebar-search">
<i class="fas fa-search"></i>
<input type="search" id="searchInput" placeholder="Cari foto..." oninput="applyFilters()">
</div>
</div>

<nav class="sidebar-nav">
<div class="nav-section">
<div class="nav-section-title">Menu</div>
<div class="nav-item active" onclick="filterBy('all')">
<i class="fas fa-th-large"></i> Semua Foto
<span class="nav-badge" id="countAll">0</span>
</div>
<div class="nav-item" onclick="filterBy('favorites')">
<i class="fas fa-star"></i> Favorit
<span class="nav-badge" id="countFav">0</span>
</div>
<div class="nav-item" onclick="filterBy('recent')">
<i class="fas fa-clock"></i> Terbaru
</div>
</div>
<div class="nav-section">
<div class="nav-section-title">Aksi</div>
<div class="nav-item" onclick="setView('grid')">
<i class="fas fa-th"></i> Tampilan Grid
</div>
<div class="nav-item" onclick="setView('list')">
<i class="fas fa-list"></i> Tampilan List
</div>
<div class="nav-item" onclick="refreshPhotos()">
<i class="fas fa-sync-alt"></i> Refresh Data
</div>
</div>
</nav>

<div class="sidebar-footer">
<div class="sidebar-stats">
<div class="stat-card">
<span class="stat-value" id="statTotal">0</span>
<span class="stat-label">Total Foto</span>
</div>
<div class="stat-card">
<span class="stat-value" id="statFavs">0</span>
<span class="stat-label">Favorit</span>
</div>
</div>
<a href="index.html" class="sidebar-btn-back">
<i class="fas fa-arrow-left"></i> Kembali ke Home
</a>
</div>
</aside>

<!-- ✨ MAIN CONTENT -->
<main class="main-content" id="mainContent">
<!-- TOP BAR -->
<div class="topbar">
<div class="topbar-left">
<button class="topbar-toggle" onclick="toggleSidebar()" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
<div class="topbar-title">
<h1><span>⚡</span> Foto Gallery</h1>
<p>Koleksi foto LINE TOGEL</p>
</div>
</div>
<div class="topbar-right">
<div class="view-switch">
<button class="view-btn active" data-view="grid" onclick="setView('grid')"><i class="fas fa-th-large"></i></button>
<button class="view-btn" data-view="list" onclick="setView('list')"><i class="fas fa-list"></i></button>
</div>
<button class="topbar-btn" onclick="refreshPhotos()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
<button class="topbar-btn" onclick="toggleFullscreen()" title="Fullscreen"><i class="fas fa-expand"></i></button>
</div>
</div>

<!-- FILTER CHIPS -->
<div class="filter-bar">
<div class="chip active" data-filter="all" onclick="filterBy('all')"><i class="fas fa-layer-group"></i> Semua</div>
<div class="chip" data-filter="favorites" onclick="filterBy('favorites')"><i class="fas fa-star"></i> Favorit</div>
<div class="chip" data-filter="recent" onclick="filterBy('recent')"><i class="fas fa-clock"></i> Terbaru</div>
</div>

<!-- GALLERY -->
<div class="gallery-area">
<div class="results-header">
<h3 id="resultsTitle">Menampilkan semua foto</h3>
<span id="resultsCount">0 foto</span>
</div>

<!-- SKELETON LOADERS -->
<div id="skeletons" style="display:none;">
<div class="photo-grid" style="pointer-events:none;">
<div class="skeleton-card"><div class="skeleton-media skeleton"></div><div class="skeleton-body"><div class="skeleton-text skeleton"></div><div class="skeleton-text skeleton"></div><div class="skeleton-bar skeleton"></div></div></div>
<div class="skeleton-card"><div class="skeleton-media skeleton"></div><div class="skeleton-body"><div class="skeleton-text skeleton"></div><div class="skeleton-text skeleton"></div><div class="skeleton-bar skeleton"></div></div></div>
<div class="skeleton-card"><div class="skeleton-media skeleton"></div><div class="skeleton-body"><div class="skeleton-text skeleton"></div><div class="skeleton-text skeleton"></div><div class="skeleton-bar skeleton"></div></div></div>
</div>
</div>

<div class="photo-grid" id="galleryGrid" role="list"></div>
</div>
</main>
</div>

<!-- ✨ MODAL -->
<div class="modal-overlay" id="imageModal" onclick="closeModalOutside(event)">
<div class="modal-panel">
<div class="modal-head">
<h3 id="modalTitle">Detail Foto</h3>
<button class="modal-close-btn" onclick="closeModal()" aria-label="Tutup"><i class="fas fa-times"></i></button>
</div>
<div class="modal-img-wrap" onclick="zoomToggle(event)">
<img src="" alt="" id="modalImage">
</div>
<div class="modal-details">
<div class="detail-grid">
<div class="detail-item">Judul<span id="infoTitle">-</span></div>
<div class="detail-item">Ukuran File<span id="infoSize">-</span></div>
<div class="detail-item">Format<span id="infoFormat">-</span></div>
<div class="detail-item">URL<span id="infoUrl" style="font-size:10px;word-break:break-all">-</span></div>
</div>
<div class="detail-actions">
<button class="detail-btn" onclick="copyImage()"><i class="fas fa-copy"></i> Copy</button>
<button class="detail-btn" onclick="downloadModalImage()"><i class="fas fa-download"></i> Download</button>
<button class="detail-btn" onclick="shareImage()"><i class="fas fa-share-alt"></i> Share</button>
<button class="detail-btn" onclick="toggleFavModal()"><i class="fas fa-star"></i> <span id="favBtnText">Favorit</span></button>
</div>
</div>
</div>
</div>

<!-- ✨ TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ✨ STATE
const state = {
photos: [], favorites: JSON.parse(localStorage.getItem('ltg_favs')||'[]'),
view: 'grid', filter: 'all', search: '', currentUrl: '', currentTitle: ''
};

// ✨ INIT
document.addEventListener('DOMContentLoaded', () => { initParticles(); fetchPhotos(); });

// ✨ PARTICLES
function initParticles() {
const c = document.getElementById('particles');
for(let i=0;i<60;i++) {
const p = document.createElement('div');
p.className = 'particle';
p.style.left = Math.random()*100+'%';
p.style.top = Math.random()*100+'%';
p.style.animationDelay = Math.random()*30+'s';
p.style.animationDuration = (22+Math.random()*30)+'s';
setTimeout(()=>p.classList.add('active'), Math.random()*2000);
c.appendChild(p);
}
}

// ✨ SIDEBAR
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }

// ✨ FETCH
async function fetchPhotos() {
showSkeletons();
try {
const sheetId='1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0', gid='1246502038';
let photos=[];
try {
const r=await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`);
const t=await r.text(), j=JSON.parse(t.substring(47).slice(0,-2));
photos=j.table.rows.filter(r=>r.c?.[0]?.v&&r.c?.[1]?.v).map((r,i)=>({judul:r.c[0].v,foto:r.c[1].v,index:i+2,ts:Date.now()-i*3600000}));
} catch(e) {
const csv=await(await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`)).text();
photos=csv.split('\n').map(r=>r.split(',')).filter(r=>r[0]?.trim()&&r[1]?.trim()).map((r,i)=>({judul:r[0].replace(/"/g,'').trim(),foto:r[1].replace(/"/g,'').trim(),index:i+2,ts:Date.now()-i*3600000}));
}
state.photos=photos; hideSkeletons(); applyFilters(); updateStats(); showToast('✅ Data berhasil dimuat');
} catch(err) {
hideSkeletons();
document.getElementById('galleryGrid').innerHTML=`<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Gagal Memuat</h3><p>Periksa koneksi atau publikasi Google Sheets</p></div>`;
showToast('❌ Gagal mengambil data');
}
}

function refreshPhotos() { fetchPhotos(); closeSidebar(); }

// ✨ SKELETONS
function showSkeletons() { document.getElementById('skeletons').style.display='block'; document.getElementById('galleryGrid').innerHTML=''; }
function hideSkeletons() { document.getElementById('skeletons').style.display='none'; }

// ✨ RENDER
function applyFilters() {
let f=[...state.photos];
if(state.search) f=f.filter(p=>p.judul.toLowerCase().includes(state.search.toLowerCase()));
if(state.filter==='favorites') f=f.filter(p=>state.favorites.includes(p.foto));
if(state.filter==='recent') f=[...f].sort((a,b)=>b.ts-a.ts).slice(0,20);
renderGallery(f);
document.getElementById('resultsCount').textContent=`${f.length} foto`;
document.getElementById('resultsTitle').textContent=state.search?`Hasil pencarian "${state.search}"`:state.filter==='favorites'?'Foto Favorit':state.filter==='recent'?'Foto Terbaru':'Menampilkan semua foto';
}

function renderGallery(photos) {
const g=document.getElementById('galleryGrid'); g.innerHTML='';
if(!photos.length) { g.innerHTML=`<div class="empty-state"><i class="fas fa-search"></i><h3>Tidak Ditemukan</h3><p>Coba kata kunci atau filter lain</p></div>`; return; }
photos.forEach((p,i)=>g.appendChild(createCard(p,i)));
}

function createCard(url,title,index) {
const isFav=state.favorites.includes(url);
const card=document.createElement('div');
card.className='gallery-card'; card.setAttribute('role','listitem');
card.innerHTML=`<div class="card-media" onclick="viewPhoto('${url}','${title.replace(/'/g,"\\'")}')">
<button class="card-fav ${isFav?'active':''}" onclick="event.stopPropagation();toggleFav('${url}',this)" aria-label="Favorit"><i class="fas fa-heart"></i></button>
<img src="${url}" alt="${title}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300/0a1e3d/3b82f6?text=No+Image'"></div>
<div class="card-body">
<div class="card-tags"><span class="card-tag tag-photo">FOTO</span><span class="card-tag tag-new">#${index+1}</span></div>
<div class="card-title">${title}</div>
<div class="card-meta"><span><i class="fas fa-hashtag"></i> ${index+1}</span><span><i class="fas fa-clock"></i> ${formatTime(state.photos.find(p=>p.foto===url)?.ts||Date.now())}</span></div>
<div class="card-actions">
<button class="c-btn copy" onclick="copyPhoto('${url}')"><i class="fas fa-copy"></i> Copy</button>
<button class="c-btn dl" onclick="downloadPhoto('${url}','${title.replace(/'/g,"\\'")}')"><i class="fas fa-download"></i> DL</button>
<button class="c-btn" onclick="sharePhoto('${url}','${title.replace(/'/g,"\\'")}')"><i class="fas fa-share-alt"></i> Share</button>
</div></div>`;
return card;
}

function formatTime(ts){const d=new Date(ts);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}

// ✨ FILTERS
function filterBy(type) {
state.filter=type;
document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
if(type==='all') { document.querySelector('.nav-item:first-of-type')?.classList.add('active'); }
else if(type==='favorites') { document.querySelectorAll('.nav-item')[1]?.classList.add('active'); }
else if(type==='recent') { document.querySelectorAll('.nav-item')[2]?.classList.add('active'); }
document.querySelector(`.chip[data-filter="${type}"]`)?.classList.add('active');
applyFilters();
}

// ✨ VIEW
function setView(v) {
state.view=v;
document.querySelectorAll('.view-btn').forEach(b=>{b.classList.toggle('active',b.dataset.view===v);});
document.getElementById('galleryGrid').classList.toggle('list-view',v==='list');
}

// ✨ FAVORITES
function toggleFav(url,btn) {
const i=state.favorites.indexOf(url);
if(i>-1) { state.favorites.splice(i,1); if(btn) { btn.classList.remove('active'); } showToast('💫 Dihapus dari favorit'); }
else { state.favorites.push(url); if(btn) { btn.classList.add('active'); } showToast('⭐ Ditambahkan ke favorit'); }
localStorage.setItem('ltg_favs',JSON.stringify(state.favorites)); updateStats(); if(state.filter==='favorites') applyFilters();
}

// ✨ MODAL
function viewPhoto(url,title) {
state.currentUrl=url; state.currentTitle=title;
document.getElementById('modalTitle').textContent=title;
document.getElementById('modalImage').src=url;
document.getElementById('modalImage').alt=title;
document.getElementById('infoTitle').textContent=title;
document.getElementById('infoFormat').textContent=url.split('.').pop().toUpperCase();
document.getElementById('infoUrl').textContent=url;
document.getElementById('favBtnText').textContent=state.favorites.includes(url)?'Hapus Favorit':'Favorit';
fetch(url).then(r=>r.blob()).then(b=>document.getElementById('infoSize').textContent=(b.size/1024).toFixed(1)+' KB');
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow='hidden';
}
function closeModal() { document.getElementById('imageModal').classList.remove('active'); document.body.style.overflow=''; state.currentUrl=state.currentTitle=''; }
function closeModalOutside(e) { if(e.target.id==='imageModal') closeModal(); }
function zoomToggle(e) { if(e.target.tagName==='IMG') e.target.classList.toggle('zoomed'); }

// ✨ ACTIONS
async function copyPhoto(url) { try { const b=await(await fetch(url)).blob(); await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]); showToast('✅ Foto disalin!'); } catch { showToast('💡 Klik kanan gambar > Copy'); } }
async function copyImage() { if(state.currentUrl) await copyPhoto(state.currentUrl); }
function downloadPhoto(url,fn) { const a=document.createElement('a'); a.href=url; a.download=`${fn.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_${Date.now()}.jpg`; a.target='_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a); showToast('⬇️ Download dimulai'); }
function downloadModalImage() { if(state.currentUrl) downloadPhoto(state.currentUrl,state.currentTitle); }
async function sharePhoto(url,title) { if(navigator.share) { try { const b=await(await fetch(url)).blob(); await navigator.share({title,text:'Lihat foto ini:',files:[new File([b],`${title}.jpg`,{type:b.type})]}); showToast('🔗 Dibagikan!'); } catch(e) { if(e.name!=='AbortError') showToast('❌ Gagal share'); } } else { copyPhoto(url); showToast('📋 Link disalin!'); } }
function shareImage() { if(state.currentUrl) sharePhoto(state.currentUrl,state.currentTitle); }
function toggleFavModal() { if(state.currentUrl) toggleFav(state.currentUrl, null); document.getElementById('favBtnText').textContent=state.favorites.includes(state.currentUrl)?'Hapus Favorit':'Favorit'; }

// ✨ FULLSCREEN
function toggleFullscreen() { if(!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(()=>{}); } else { document.exitFullscreen(); } }

// ✨ STATS
function updateStats() { document.getElementById('countAll').textContent=state.photos.length; document.getElementById('countFav').textContent=state.favorites.length; document.getElementById('statTotal').textContent=state.photos.length; document.getElementById('statFavs').textContent=state.favorites.length; }

// ✨ TOAST
function showToast(msg) {
const c=document.getElementById('toastContainer');
const t=document.createElement('div'); t.className='toast';
t.innerHTML=msg;
c.appendChild(t);
setTimeout(()=>{t.classList.add('out'); setTimeout(()=>t.remove(),300);},4000);
}

// ✨ KEYBOARD
document.addEventListener('keydown',e=>{
if(e.key==='Escape') closeModal();
if(e.ctrlKey&&e.key==='K'){e.preventDefault();document.getElementById('searchInput').focus();}
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        neon: {
          base: '#000814',
          dark: '#001228',
          mid: '#001f4d',
          accent: '#00f5ff',
          bright: '#66ffff',
          glow: 'rgba(0, 245, 255, 0.6)',
          border: '#006699'
        }
      },
      animation: {
        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
        'float': 'float 6s ease-in-out infinite',
        'shimmer': 'shimmer 2s linear infinite',
        'glow-pulse': 'glowPulse 2s ease-in-out infinite',
        'enter-up': 'enterUp 0.5s ease-out forwards',
        'bloom': 'bloom 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards'
      },
      keyframes: {
        float: {
          '0%, 100%': { transform: 'translateY(0px)' },
          '50%': { transform: 'translateY(-10px)' }
        },
        shimmer: {
          '0%': { backgroundPosition: '-200% 0' },
          '100%': { backgroundPosition: '200% 0' }
        },
        glowPulse: {
          '0%, 100%': { boxShadow: '0 0 15px rgba(0, 245, 255, 0.5)' },
          '50%': { boxShadow: '0 0 30px rgba(0, 245, 255, 0.9), 0 0 60px rgba(0, 245, 255, 0.4)' }
        },
        enterUp: {
          '0%': { opacity: '0', transform: 'translateY(20px)' },
          '100%': { opacity: '1', transform: 'translateY(0)' }
        },
        bloom: {
          '0%': { transform: 'scale(0.95)', opacity: '0' },
          '50%': { transform: 'scale(1.02)', opacity: '1' },
          '100%': { transform: 'scale(1)', opacity: '1' }
        }
      }
    }
  }
}
</script>
<style>
:root {
  --bg: #000814;
  --bg-secondary: #001228;
  --bg-tertiary: #001f4d;
  --fg: #e6f7ff;
  --muted: #6bb6ff;
  --accent: #00f5ff;
  --accent-glow: #00e5ff;
  --accent-dark: #00a8cc;
  --accent-bright: #66ffff;
  --border: #006699;
  --border-glow: rgba(0, 245, 255, 0.5);
  --success: #00ffaa;
  --warning: #ffcc00;
  --error: #ff4d8d;
  --glow-sm: 0 0 10px rgba(0, 245, 255, 0.6);
  --glow-md: 0 0 20px rgba(0, 245, 255, 0.8), 0 0 40px rgba(0, 245, 255, 0.4);
  --glow-lg: 0 0 30px rgba(0, 245, 255, 1), 0 0 60px rgba(0, 245, 255, 0.6), 0 0 90px rgba(0, 245, 255, 0.3);
  --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  --transition-bloom: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.5;
}

/* === BACKGROUND CYBER EFFECTS === */
.bg-cyber {
  position: fixed;
  inset: 0;
  z-index: -3;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(0, 245, 255, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 15%, rgba(102, 255, 255, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 85%, rgba(0, 100, 150, 0.1) 0%, transparent 50%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-secondary) 100%);
  animation: bgPulse 25s ease-in-out infinite alternate;
}

@keyframes bgPulse {
  0%, 100% { opacity: 1; filter: hue-rotate(0deg) brightness(1); }
  50% { opacity: 0.98; filter: hue-rotate(8deg) brightness(1.05); }
}

.grid-overlay {
  position: fixed;
  inset: 0;
  z-index: -2;
  background-image:
    linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 40s linear infinite;
  opacity: 0.7;
  pointer-events: none;
}

@keyframes gridMove {
  0% { background-position: 0 0; }
  100% { background-position: 50px 50px; }
}

.floating-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.2;
  animation: floatOrb 30s ease-in-out infinite alternate;
  z-index: -1;
  pointer-events: none;
}

.orb-1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
  top: -10%; left: -5%;
  animation-delay: 0s;
}

.orb-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #0088ff 0%, transparent 70%);
  bottom: -5%; right: -5%;
  animation-delay: -15s;
}

.orb-3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, var(--accent-bright) 0%, transparent 70%);
  top: 40%; right: 10%;
  animation-delay: -7s;
  opacity: 0.15;
}

@keyframes floatOrb {
  0% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(20px, -15px) scale(1.05); }
  66% { transform: translate(-15px, 25px) scale(0.95); }
  100% { transform: translate(0, 0) scale(1); }
}

/* === PARTICLES === */
.particles {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0;
  animation: particleFloat linear infinite;
  box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent-glow);
}

@keyframes particleFloat {
  0% {
    transform: translateY(100vh) rotate(0deg) scale(0.5);
    opacity: 0;
  }
  10% { opacity: 0.8; }
  90% { opacity: 0.8; }
  100% {
    transform: translateY(-100vh) rotate(720deg) scale(1);
    opacity: 0;
  }
}

/* === MAIN CONTAINER === */
.main-container {
  position: relative;
  z-index: 10;
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px;
}

@media (min-width: 768px) {
  .main-container { padding: 24px; }
}

/* === HEADER === */
.header-section {
  text-align: center;
  padding: 28px 0 20px;
  animation: headerEntrance 0.8s var(--transition-bloom) backwards;
}

@keyframes headerEntrance {
  from { opacity: 0; transform: translateY(-30px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.75rem, 5.5vw, 3rem);
  font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #fff 0%, var(--accent-bright) 25%, var(--accent) 50%, var(--accent-dark) 75%, #0066cc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: var(--glow-md);
  animation: titleShimmer 4s ease-in-out infinite;
  position: relative;
  display: inline-block;
}

@keyframes titleShimmer {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.25); }
}

.main-title::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent-bright), var(--accent), transparent);
  border-radius: 2px;
  box-shadow: var(--glow-sm);
  animation: titleGlow 3s ease-in-out infinite;
}

@keyframes titleGlow {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; box-shadow: var(--glow-md); }
}

/* === TABS === */
.tabs-container {
  display: flex;
  justify-content: center;
  gap: 0;
  margin: 0 0 16px;
  position: relative;
  flex-wrap: wrap;
}

.tabs-container::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 10%;
  right: 10%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
}

.tab-btn {
  padding: 12px 28px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--muted);
  background: rgba(0, 18, 40, 0.5);
  border: 1px solid var(--border);
  border-bottom: none;
  cursor: pointer;
  transition: all var(--transition-smooth);
  position: relative;
  overflow: hidden;
  text-transform: uppercase;
  letter-spacing: 1px;
  min-width: 140px;
}

.tab-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.12), transparent);
  transition: left 0.5s ease;
}

.tab-btn:hover::before { left: 100%; }

.tab-btn:first-child { border-radius: 10px 0 0 0; }
.tab-btn:last-child { border-radius: 0 10px 0 0; }

.tab-btn:hover {
  color: var(--accent);
  background: rgba(0, 30, 60, 0.7);
  border-color: var(--accent-glow);
  transform: translateY(-2px);
  box-shadow: var(--glow-sm);
}

.tab-btn.active {
  color: var(--accent-bright);
  background: linear-gradient(180deg, rgba(0, 30, 60, 0.85) 0%, rgba(0, 20, 45, 0.92) 100%);
  border-color: var(--accent);
  border-bottom: 2px solid var(--accent);
  box-shadow: var(--glow-md);
}

.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0;
  width: 100%; height: 2px;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: activeGlow 2s ease-in-out infinite;
}

@keyframes activeGlow {
  0%, 100% { opacity: 0.8; box-shadow: 0 0 12px var(--accent); }
  50% { opacity: 1; box-shadow: 0 0 22px var(--accent), 0 0 35px var(--accent-glow); }
}

/* === CONTENT BOX === */
.content-box {
  background: linear-gradient(180deg, var(--bg-secondary) 0%, rgba(0, 20, 45, 0.93) 100%);
  border: 1px solid var(--border);
  border-top: 2px solid var(--accent);
  border-radius: 0 0 18px 18px;
  padding: 20px;
  position: relative;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
}

.content-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent-bright), var(--accent), transparent);
  background-size: 200% 100%;
  animation: borderFlow 4s linear infinite;
}

@keyframes borderFlow {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* === SETTINGS PANEL - COMPACT 1 ROW === */
.settings-panel {
  background: linear-gradient(135deg, rgba(0, 15, 35, 0.65) 0%, rgba(0, 25, 55, 0.55) 100%);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 18px;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
  justify-content: center;
  box-shadow: inset 0 0 18px rgba(0, 245, 255, 0.04);
  position: relative;
  overflow: hidden;
}

.settings-panel::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(0, 245, 255, 0.025) 0%, transparent 70%);
  animation: panelGlow 10s ease-in-out infinite;
  pointer-events: none;
}

@keyframes panelGlow {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.03); }
}

.setting-item {
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}

.setting-label {
  color: var(--accent-bright);
  font-size: 0.82rem;
  font-weight: 600;
  text-shadow: 0 0 6px rgba(0, 245, 255, 0.45);
  letter-spacing: 0.5px;
}

.input-compact {
  padding: 9px 13px;
  background: linear-gradient(135deg, rgba(0, 10, 25, 0.75) 0%, rgba(0, 20, 45, 0.65) 100%);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--fg);
  font-size: 0.9rem;
  width: 165px;
  transition: all var(--transition-fast);
  font-family: 'Space Grotesk', sans-serif;
}

.input-compact:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: var(--glow-md);
  background: linear-gradient(135deg, rgba(0, 15, 35, 0.85) 0%, rgba(0, 30, 65, 0.75) 100%);
}

.input-compact::placeholder { color: var(--muted); opacity: 0.75; }

/* === BUTTONS === */
.btn-action {
  padding: 9px 18px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 55%, var(--accent) 100%);
  border: none;
  border-radius: 9px;
  color: var(--bg);
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all var(--transition-smooth);
  white-space: nowrap;
  position: relative;
  overflow: hidden;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  box-shadow: var(--glow-sm);
  min-width: 95px;
}

.btn-action::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  transition: left 0.4s ease;
}

.btn-action:hover::before { left: 100%; }

.btn-action:hover {
  transform: translateY(-2px) scale(1.015);
  box-shadow: var(--glow-md);
  background: linear-gradient(135deg, var(--accent-bright) 0%, var(--accent) 55%, var(--accent-bright) 100%);
}

.btn-action:active { transform: translateY(0) scale(1); }
.btn-action:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
  background: linear-gradient(135deg, var(--accent-dark) 0%, var(--border) 100%);
}

.status-text {
  font-size: 0.82rem;
  color: var(--accent);
  margin-left: 8px;
  font-weight: 600;
  text-shadow: 0 0 8px rgba(0, 245, 255, 0.5);
  animation: statusPulse 2.5s ease-in-out infinite;
  min-width: 80px;
  display: inline-block;
}

@keyframes statusPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.75; }
}

/* === DATA GRID - RESPONSIVE CARDS === */
.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 18px;
}

/* === SECTION BOX === */
.section-box {
  background: linear-gradient(135deg, rgba(0, 10, 25, 0.65) 0%, rgba(0, 20, 45, 0.55) 100%);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
  transition: all var(--transition-smooth);
  animation: enter-up 0.4s ease-out backwards;
}

.section-box:nth-child(1) { animation-delay: 0.1s; }
.section-box:nth-child(2) { animation-delay: 0.2s; }
.section-box:nth-child(3) { animation-delay: 0.3s; }

.section-box:hover {
  border-color: var(--accent-glow);
  box-shadow: var(--glow-md);
  transform: translateY(-3px);
}

.section-header {
  background: linear-gradient(90deg, rgba(0, 245, 255, 0.12) 0%, transparent 100%);
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
}

.section-header::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 18px; right: 18px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.section-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  color: var(--accent-bright);
  font-size: 0.95rem;
  text-shadow: 0 0 10px rgba(0, 245, 255, 0.6);
  letter-spacing: 0.8px;
}

.badge-count {
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.18) 0%, rgba(0, 150, 200, 0.12) 100%);
  color: var(--accent-bright);
  padding: 3px 9px;
  border-radius: 18px;
  font-size: 0.72rem;
  font-weight: 700;
  border: 1px solid rgba(0, 245, 255, 0.35);
  box-shadow: 0 0 8px rgba(0, 245, 255, 0.25);
  animation: badgePulse 3s ease-in-out infinite;
}

@keyframes badgePulse {
  0%, 100% { box-shadow: 0 0 8px rgba(0, 245, 255, 0.25); }
  50% { box-shadow: 0 0 18px rgba(0, 245, 255, 0.5); }
}

/* === SEARCH BOX === */
.search-box {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: rgba(0, 10, 25, 0.25);
}

.search-input {
  width: 100%;
  padding: 9px 13px;
  background: linear-gradient(135deg, rgba(0, 8, 20, 0.55) 0%, rgba(0, 15, 35, 0.45) 100%);
  border: 1px solid rgba(10, 77, 117, 0.5);
  border-radius: 7px;
  color: var(--fg);
  font-size: 0.88rem;
  transition: all var(--transition-fast);
  font-family: 'Space Grotesk', sans-serif;
}

.search-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: var(--glow-md);
  background: linear-gradient(135deg, rgba(0, 12, 30, 0.75) 0%, rgba(0, 25, 55, 0.65) 100%);
}

.search-input::placeholder { color: var(--muted); opacity: 0.7; }

/* === SECTION CONTENT === */
.section-content {
  padding: 10px;
  overflow-y: auto;
  max-height: 420px;
  flex-grow: 1;
  scroll-behavior: smooth;
}

/* === ITEM CARD === */
.item-card {
  background: linear-gradient(135deg, rgba(0, 15, 35, 0.55) 0%, rgba(0, 25, 55, 0.45) 100%);
  border: 1px solid rgba(10, 77, 117, 0.35);
  border-radius: 11px;
  padding: 12px 14px;
  margin-bottom: 9px;
  cursor: pointer;
  transition: all var(--transition-smooth);
  position: relative;
  overflow: hidden;
  animation: bloom 0.4s ease-out backwards;
}

.item-card:nth-child(n) { animation-delay: calc(var(--i, 0) * 0.03s); }

.item-card::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.08), transparent);
  transition: left 0.5s ease;
}

.item-card:hover::before { left: 100%; }

.item-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: var(--glow-sm);
  background: linear-gradient(135deg, rgba(0, 20, 45, 0.65) 0%, rgba(0, 30, 65, 0.55) 100%);
}

.item-label {
  font-size: 0.68rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.3px;
  margin-bottom: 2px;
  font-weight: 600;
  opacity: 0.9;
}

.item-title {
  color: var(--accent-bright);
  font-weight: 700;
  margin-bottom: 4px;
  font-size: 0.92rem;
  text-shadow: 0 0 7px rgba(0, 245, 255, 0.45);
}

.item-content {
  font-size: 0.83rem;
  color: var(--fg);
  line-height: 1.45;
  white-space: pre-wrap;
  word-break: break-all;
  opacity: 0.92;
}

/* === PASARAN BOX === */
.pasaran-box {
  background: linear-gradient(135deg, rgba(0, 10, 25, 0.65) 0%, rgba(0, 20, 45, 0.55) 100%);
  border: 1px solid var(--border);
  border-radius: 13px;
  overflow: hidden;
  margin-bottom: 11px;
  transition: all var(--transition-fast);
  animation: enter-up 0.4s ease-out backwards;
}

.pasaran-box:hover {
  border-color: var(--accent-glow);
  box-shadow: var(--glow-sm);
}

.pasaran-header {
  background: linear-gradient(90deg, rgba(0, 245, 255, 0.16) 0%, transparent 100%);
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.pasaran-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  color: var(--accent-bright);
  font-size: 0.88rem;
  text-shadow: 0 0 9px rgba(0, 245, 255, 0.55);
}

.pasaran-content {
  padding: 8px 10px;
  max-height: 320px;
  overflow-y: auto;
}

/* === BET ITEM === */
.bet-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 13px;
  background: linear-gradient(135deg, rgba(0, 10, 25, 0.45) 0%, rgba(0, 20, 45, 0.35) 100%);
  border: 1px solid rgba(10, 77, 117, 0.35);
  border-radius: 7px;
  margin-bottom: 5px;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.bet-item:hover {
  border-color: var(--accent);
  background: linear-gradient(135deg, rgba(0, 15, 35, 0.55) 0%, rgba(0, 25, 55, 0.45) 100%);
  transform: translateX(3px);
  box-shadow: var(--glow-sm);
}

.bet-type {
  color: var(--fg);
  font-size: 0.83rem;
  flex: 1;
  margin-right: 10px;
  font-weight: 500;
}

.bet-result {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  color: var(--accent-bright);
  font-size: 0.83rem;

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4',
  autoRefreshDelay: 1200 // ms
};

// State Management
const state = {
  prediksi: [], jadwal: [], link: [], hitung: [],
  debounceTimers: {},
  isAutoUpdating: false
};

// DOM Cache
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'), toastMsg: $('toastMsg'),
  autoUpdate: $('autoUpdateIndicator'),
  detailHitungan: $('detailHitunganDropdown')
};

// ============ UTILITIES ============
function showToast(msg, type = 'success') {
  const icons = { success: '✨', error: '❌', warning: '⚠️', info: 'ℹ️' };
  dom.toastMsg.textContent = `${icons[type] || '✨'} ${msg}`;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 3200);
}

function showAutoUpdateIndicator() {
  if (dom.autoUpdate) {
    dom.autoUpdate.classList.add('show');
    setTimeout(() => dom.autoUpdate.classList.remove('show'), 2000);
  }
}

function copyText(text) {
  let finalText = text;
  try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 25 ? finalText.substring(0, 25) + '...' : finalText;
    showToast('Disalin: ' + preview, 'success');
  }).catch(() => showToast('Gagal menyalin', 'error'));
}

function copyResult() {
  const detail = dom.detailHitungan;
  const text = detail.textContent.trim();
  if (text && !text.includes('Pilih tipe')) {
    copyText(text);
    detail.style.boxShadow = '0 0 25px rgba(0, 255, 170, 0.7), inset 0 0 15px rgba(0, 255, 170, 0.3)';
    setTimeout(() => detail.style.boxShadow = '', 250);
  }
}

function formatNum(n) {
  if (!n) return '0';
  return new Intl.NumberFormat('id-ID').format(Number(n));
}

function debounce(func, wait, key) {
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(state.debounceTimers[key]);
      func(...args);
    };
    clearTimeout(state.debounceTimers[key]);
    state.debounceTimers[key] = setTimeout(later, wait);
  };
}

// ============ CSV PARSER ============
function parseCSV(text) {
  let p = [], row = [], entry = "", state = 0;
  for (let i = 0; i < text.length; i++) {
    const char = text[i], next = text[i+1];
    if (state === 0) {
      if (char === '"') state = 1;
      else if (char === ',') { row.push(entry); entry = ""; }
      else if (char === '\r' && next === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (char === '\n' || char === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += char;
    } else if (state === 1) {
      if (char === '"' && next === '"') { entry += '"'; i++; }
      else if (char === '"') state = 0;
      else entry += char;
    }
  }
  if (entry.length > 0 || row.length > 0) { row.push(entry); p.push(row); }
  return p;
}

function safeGet(row, idx) {
  return row && row[idx] !== undefined ? row[idx]?.trim() : "";
}

// ============ API CALLS ============
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID') || !SCRIPT_URL) {
    showToast('⚙️ Script URL belum dikonfigurasi', 'warning');
    return false;
  }
  try {
    const params = new URLSearchParams({ action, value });
    const response = await fetch(SCRIPT_URL + '?' + params.toString(), {
      method: 'GET',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
    });
    const text = await response.text();
    return text.includes('SUCCESS') || text.includes('success');
  } catch (e) {
    console.error("Update Error:", e);
    showToast('Koneksi gagal', 'error');
    return false;
  }
}

// ============ DATA FETCHING ============
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    
    state.prediksi = []; state.jadwal = []; state.link = [];
    
    // Parse tanggal dari header
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          const formatted = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          if (!dom.inTgl.value) dom.inTgl.value = formatted;
          dom.statTgl.textContent = formatted;
        }
      }
    }
    
    // Parse data sections
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ 
        title: txt.split(/[\s,]+/)[0] || 'Item', 
        content: txt,
        id: i 
      });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ 
        title: txt.split(/[\s,]+/)[0] || 'Jadwal', 
        content: txt,
        id: i 
      });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ 
        title: txt.split(/[\s,]+/)[0] || 'Link', 
        content: txt,
        id: i 
      });
    }
    
    renderPrediksi();
    showToast('Data prediksi diperbarui', 'info');
  } catch (e) {
    console.error("Error Prediksi:", e);
    dom.listP.innerHTML = '<p style="color:var(--error);text-align:center;padding:25px;">❌ Gagal memuat data</p>';
    showToast('Gagal memuat prediksi', 'error');
  }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    
    // Parse nominal dari header
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom && !dom.inNom.value) {
        dom.inNom.value = nom;
        dom.statNom.textContent = "💰 Rp " + formatNum(nom);
      }
    }
    
    // Parse sections hitungan
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 },
      { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 },
      { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 },
      { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 },
      { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    
    state.hitung = secDef.map(s => {
      let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
      let items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23);
          const resVal = safeGet(data[i], 24);
          if (type || resVal) items.push({ type: type || "-", res: resVal || "-" });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    
    renderHitung();
    showToast('Data hitungan diperbarui', 'info');
  } catch (e) {
    console.error("Error Hitung:", e);
    dom.contH.innerHTML = '<p style="color:var(--error);text-align:center;padding:30px;">❌ Gagal memuat data</p>';
    showToast('Gagal memuat hitungan', 'error');
  }
}

// ============ RENDERING ============
function renderList(container, items, search, type) {
  const filtered = items.filter(i => 
    i.content?.toLowerCase().includes(search.toLowerCase()) ||
    i.title?.toLowerCase().includes(search.toLowerCase())
  );
  
  if (!filtered.length) {
    container.innerHTML = `<p style="color:var(--muted);text-align:center;padding:25px;font-size:0.9rem;">📭 Tidak ada data yang cocok</p>`;
    return;
  }
  
  container.innerHTML = filtered.map((v, idx) => `
    <div class="item-card" style="--i: ${idx}" onclick="copyText('${encodeURIComponent(v.content)}')">
      <div class="item-label">📋 ${type.toUpperCase()}</div>
      <div class="item-title">${v.title}</div>
      <div class="item-label">💬 Klik untuk salin</div>
      <div class="item-content">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value, 'prediksi');
  renderList(dom.listJ, state.jadwal, dom.srcJ.value, 'jadwal');
  renderList(dom.listL, state.link, dom.srcL.value, 'link');
  
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) {
    dom.contH.innerHTML = '<p style="color:var(--muted);text-align:center;padding:30px;">📭 Tidak ada data hitungan</p>';
    return;
  }
  
  dom.contH.innerHTML = state.hitung.map((s, idx) => `
    <div class="pasaran-box" style="animation-delay: ${idx * 0.05}s">
      <div class="pasaran-header">
        <h3 class="pasaran-title">🎯 ${s.title}</h3>
      </div>
      <div class="pasaran-content">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}')">
            <span class="bet-type">${it.type}</span>
            <span class="bet-result">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ============ HITUNG LOGIC ============
let kelompokData = {};

async function loadCaraHitungTogel() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    
    // Load nominal
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom && !dom.inNom.value) {
        dom.inNom.value = nom;
        dom.statNom.textContent = "💰 Rp " + formatNum(nom);
      }
    }
    
    // Parse groups
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "🎰 Semua Pasaran" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "🇲🇴 Toto Macau 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "🇲🇴 Toto Macau 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "🦍 Kingkong 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "🎁 Bonus" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "🇮🇩 Jakarta" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "🌊 TotoMali" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "🎯 HokiDraw" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "🇦🇺 Sydney & 🇭🇰 Hongkong" }
    ];
    
    kelompokData = {};
    const dropdown = document.getElementById('kelompokDropdown');
    dropdown.innerHTML = '<option value="">-- Pilih Tipe Hitungan --</option>';
    
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23);
          const value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length > 0) {
        kelompokData[sec.title] = items;
        const opt = document.createElement('option');
        opt.value = sec.title;
        opt.textContent = sec.title;
        dropdown.appendChild(opt);
      }
    });
    
  } catch (e) {
    console.error("Error loadCaraHitungTogel:", e);
  }
}

function isiDropdownLabel() {
  const selected = document.getElementById('kelompokDropdown').value;
  const labelDropdown = document.getElementById('labelDropdown');
  labelDropdown.innerHTML = '<option value="">-- Pilih Label --</option>';
  
  if (selected && kelompokData[selected]) {
    kelompokData[selected].forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.label;
      opt.textContent = item.label;
      labelDropdown.appendChild(opt);
    });
  }
}

function tampilkanValueHitungan() {
  const kelompok = document.getElementById('kelompokDropdown').value;
  const label = document.getElementById('labelDropdown').value;
  const detail = dom.detailHitungan;
  
  if (!kelompok || !label || !kelompokData[kelompok]) {
    detail.innerHTML = '<span style="color: var(--muted); font-size: 0.9rem;">Silakan pilih tipe dan label</span>';
    return;
  }
  
  const item = kelompokData[kelompok].find(i => i.label === label);
  if (item) {
    detail.innerHTML = `<span style="font-size: 1.1em; font-weight: 700; text-shadow: 0 0 12px rgba(0,245,255,0.6);">${item.value}</span>`;
  }
}

// ============ AUTO-UPDATE SYSTEM ============
function handleDateChange() {
  showAutoUpdateIndicator();
  const debounced = debounce(() => {
    updateTanggal(true); // true = auto mode
  }, CONFIG.autoRefreshDelay, 'tanggal');
  debounced();
}

function handleNominalChange() {
  showAutoUpdateIndicator();
  const debounced = debounce(() => {
    updateNominal(true); // true = auto mode
  }, CONFIG.autoRefreshDelay, 'nominal');
  debounced();
}

async function updateTanggal(isAuto = false) {
  if (!dom.inTgl.value) {
    showToast("⚠️ Pilih tanggal dulu!", 'warning');
    return;
  }
  
  const parts = dom.inTgl.value.split('-');
  const formattedDate = `${parts[1]}/${parts[2]}/${parts[0]}`;
  
  dom.btnTgl.disabled = true;
  dom.statTgl.textContent = isAuto ? "🔄 Auto..." : "⏳ Menyimpan...";
  
  try {
    const success = await updateSheet('updateTanggal', formattedDate);
    
    dom.btnTgl.disabled = false;
    if (success) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = "✅ " + dom.inTgl.value;
      showToast(isAuto ? "🔄 Tanggal diperbarui otomatis" : "📅 Tanggal berhasil disimpan", 'success');
      
      // AUTO-REFRESH ALL DATA
      await Promise.all([
        fetchPrediksi(),
        fetchHitung(),
        loadCaraHitungTogel()
      ]);
    } else {
      dom.statTgl.textContent = "❌ Gagal";
      showToast("❌ Gagal update tanggal", 'error');
    }
  } catch (e) {
    dom.btnTgl.disabled = false;
    dom.statTgl.textContent = "❌ Error";
    console.error(e);
  }
}

async function updateNominal(isAuto = false) {
  if (!dom.inNom.value || dom.inNom.value <= 0) {
    showToast("⚠️ Isi nominal yang valid!", 'warning');
    return;
  }
  
  dom.btnNom.disabled = true;
  dom.statNom.textContent = isAuto ? "🔄 Auto..." : "⏳ Menyimpan...";
  
  try {
    const success = await updateSheet('updateNominal', dom.inNom.value);
    
    dom.btnNom.disabled = false;
    if (success) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value);
      showToast(isAuto ? "🔄 Nominal diperbarui otomatis" : "💰 Nominal berhasil disimpan", 'success');
      
      // AUTO-REFRESH ALL DATA
      await Promise.all([
        fetchPrediksi(),
        fetchHitung(),
        loadCaraHitungTogel()
      ]);
    } else {
      dom.statNom.textContent = "❌ Gagal";
      showToast("❌ Gagal update nominal", 'error');
    }
  } catch (e) {
    dom.btnNom.disabled = false;
    dom.statNom.textContent = "❌ Error";
    console.error(e);
  }
}

// ============ TAB SWITCHING ============
function switchTab(tabName) {
  // Update buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tabName);
  });
  
  // Update content
  const isPrediksi = tabName === 'prediksi';
  dom.tabP.classList.toggle('hidden', !isPrediksi);
  dom.tabH.classList.toggle('hidden', isPrediksi);
  
  // Trigger animation
  const activeContent = isPrediksi ? dom.tabP : dom.tabH;
  activeContent.style.animation = 'none';
  setTimeout(() => activeContent.style.animation = 'enter-up 0.4s ease-out', 10);
  
  showToast(`Tab ${tabName.toUpperCase()} aktif`, 'info');
}

// ============ FILTER/SEARCH ============
function filterData(type) {
  const searchMap = {
    prediksi: { list: dom.listP, items: state.prediksi, input: dom.srcP },
    jadwal: { list: dom.listJ, items: state.jadwal, input: dom.srcJ },
    link: { list: dom.listL, items: state.link, input: dom.srcL }
  };
  
  const config = searchMap[type];
  if (config) {
    renderList(config.list, config.items, config.input.value, type);
  }
}

// ============ PARTICLES ============
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  
  for(let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 20 + 's';
    p.style.animationDuration = (20 + Math.random() * 25) + 's';
    p.style.opacity = 0.6 + Math.random() * 0.4;
    container.appendChild(p);
  }
}

// ============ INITIALIZATION ============
async function init() {
  createParticles();
  
  // Load saved values
  const savedTgl = localStorage.getItem(CONFIG.keyTanggal);
  const savedNom = localStorage.getItem(CONFIG.keyNominal);
  if (savedTgl) { dom.inTgl.value = savedTgl; dom.statTgl.textContent = savedTgl; }
  if (savedNom) { 
    dom.inNom.value = savedNom; 
    dom.statNom.textContent = "💰 Rp " + formatNum(savedNom);
  }
  
  // Initial data load
  await Promise.all([
    fetchPrediksi(),
    fetchHitung(),
    loadCaraHitungTogel()
  ]);
  
  // Setup search listeners
  dom.srcP.oninput = () => filterData('prediksi');
  dom.srcJ.oninput = () => filterData('jadwal');
  dom.srcL.oninput = () => filterData('link');
  
  // Welcome message
  setTimeout(() => showToast('🚀 Selamat bekerja, SUHAN!', 'success'), 800);
}

// ============ EVENT LISTENERS ============
document.addEventListener('DOMContentLoaded', init);

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === '1') { e.preventDefault(); switchTab('prediksi'); }
  if (e.ctrlKey && e.key === '2') { e.preventDefault(); switchTab('hitung'); }
  if (e.key === 'Escape') {
    document.querySelectorAll('.input-compact, .search-input').forEach(el => el.blur());
  }
});

// Visibility API - auto refresh when tab becomes visible
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    showAutoUpdateIndicator();
    setTimeout(() => {
      fetchPrediksi();
      fetchHitung();
    }, 500);
  }
});

// Periodic auto-refresh every 5 minutes
setInterval(() => {
  if (document.visibilityState === 'visible') {
    showAutoUpdateIndicator();
    fetchPrediksi();
    fetchHitung();
  }
}, 5 * 60 * 1000);
</script>

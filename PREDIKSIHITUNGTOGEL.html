<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        base: { 900: '#0b0f1a', 800: '#0f1526', 700: '#141c33', 600: '#1a2340' },
        primary: { 400: '#7c3aed', 500: '#6366f1', 600: '#4f46e5' },
        accent: { cyan: '#22d3ee', pink: '#f472b6', lime: '#a3e635', amber: '#fbbf24' },
        surface: { 1: 'rgba(26,35,64,0.7)', 2: 'rgba(20,28,51,0.8)', 3: 'rgba(15,21,38,0.9)' }
      },
      animation: {
        'float-slow': 'floatSlow 8s ease-in-out infinite',
        'pulse-ring': 'pulseRing 2.5s cubic-bezier(0.4,0,0.6,1) infinite',
        'fade-in-up': 'fadeInUp 0.4s ease-out forwards',
        'scale-in': 'scaleIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards',
        'slide-chip': 'slideChip 0.3s ease-out forwards',
        'glow-pulse': 'glowPulse 2s ease-in-out infinite',
        'wave': 'wave 3s ease-in-out infinite'
      },
      keyframes: {
        floatSlow: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-12px)' } },
        pulseRing: { '0%': { transform: 'scale(0.95)', opacity: '0.8' }, '70%': { transform: 'scale(1.3)', opacity: '0' }, '100%': { transform: 'scale(1.4)', opacity: '0' } },
        fadeInUp: { '0%': { opacity: '0', transform: 'translateY(18px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
        scaleIn: { '0%': { opacity: '0', transform: 'scale(0.92)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
        slideChip: { '0%': { opacity: '0', transform: 'translateX(-8px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
        glowPulse: { '0%,100%': { boxShadow: '0 0 18px rgba(99,102,241,0.45)' }, '50%': { boxShadow: '0 0 32px rgba(99,102,241,0.75), 0 0 64px rgba(34,211,238,0.35)' } },
        wave: { '0%,100%': { transform: 'translateX(0)' }, '50%': { transform: 'translateX(25%)' } }
      }
    }
  }
}
</script>
<style>
:root {
  --bg-1: #0b0f1a; --bg-2: #0f1526; --bg-3: #141c33; --bg-4: #1a2340;
  --text-1: #f8fafc; --text-2: #cbd5e1; --text-3: #94a3b8; --text-4: #64748b;
  --primary: #6366f1; --primary-glow: rgba(99,102,241,0.55);
  --accent-1: #22d3ee; --accent-2: #f472b6; --accent-3: #a3e635; --accent-4: #fbbf24;
  --success: #34d399; --warning: #fbbf24; --error: #f87171;
  --surface-1: rgba(26,35,64,0.72); --surface-2: rgba(20,28,51,0.85); --surface-3: rgba(15,21,38,0.92);
  --border-1: rgba(99,102,241,0.28); --border-2: rgba(34,211,238,0.22);
  --glow-sm: 0 0 14px rgba(99,102,241,0.45);
  --glow-md: 0 0 26px rgba(99,102,241,0.65), 0 0 52px rgba(34,211,238,0.35);
  --glow-lg: 0 0 38px rgba(99,102,241,0.85), 0 0 76px rgba(34,211,238,0.5), 0 0 114px rgba(163,230,53,0.25);
  --radius-1: 10px; --radius-2: 16px; --radius-3: 22px; --radius-4: 32px;
  --ease-fast: cubic-bezier(0.4,0,0.2,1); --ease-smooth: cubic-bezier(0.16,1,0.3,1); --ease-bounce: cubic-bezier(0.34,1.56,0.64,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: 'Manrope', 'Space Grotesk', system-ui, sans-serif;
  background: var(--bg-1); color: var(--text-1);
  min-height: 100vh; overflow-x: hidden; position: relative;
  line-height: 1.6; letter-spacing: 0.3px;
}

/* === BACKGROUND === */
.bg-gradient {
  position: fixed; inset: 0; z-index: -4;
  background: 
    radial-gradient(1200px 600px at 10% -10%, rgba(99,102,241,0.12) 0%, transparent 60%),
    radial-gradient(1000px 500px at 90% 10%, rgba(34,211,238,0.1) 0%, transparent 60%),
    radial-gradient(800px 400px at 50% 100%, rgba(163,230,53,0.08) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
  animation: wave 20s ease-in-out infinite;
}
.bg-grid {
  position: fixed; inset: 0; z-index: -3;
  background-image: 
    linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
  background-size: 55px 55px; opacity: 0.75; pointer-events: none;
}
.bg-orbs { position: fixed; inset: 0; z-index: -2; pointer-events: none; }
.orb {
  position: absolute; border-radius: 50%; filter: blur(85px); opacity: 0.15;
  animation: float-slow 28s ease-in-out infinite alternate;
}
.orb-1 { width: 620px; height: 620px; background: radial-gradient(circle, var(--primary) 0%, transparent 70%); top: -18%; left: -12%; }
.orb-2 { width: 480px; height: 480px; background: radial-gradient(circle, var(--accent-1) 0%, transparent 70%); bottom: -12%; right: -8%; animation-delay: -14s; }
.orb-3 { width: 360px; height: 360px; background: radial-gradient(circle, var(--accent-2) 0%, transparent 70%); top: 42%; right: 12%; animation-delay: -7s; opacity: 0.1; }
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
.particle {
  position: absolute; width: 3px; height: 3px; border-radius: 50%;
  background: var(--primary); opacity: 0; animation: particleMove linear infinite;
  box-shadow: 0 0 12px var(--primary), 0 0 24px var(--primary-glow);
}
.particle.alt-1 { background: var(--accent-1); box-shadow: 0 0 12px var(--accent-1), 0 0 24px rgba(34,211,238,0.5); }
.particle.alt-2 { background: var(--accent-2); box-shadow: 0 0 12px var(--accent-2), 0 0 24px rgba(244,114,182,0.5); }
@keyframes particleMove {
  0% { transform: translateY(100vh) rotate(0) scale(0.5); opacity: 0; }
  15% { opacity: 0.85; } 85% { opacity: 0.85; }
  100% { transform: translateY(-100vh) rotate(720deg) scale(1); opacity: 0; }
}

/* === LAYOUT === */
.wrapper { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 16px; }
@media(min-width:768px){.wrapper{padding:24px 28px}}

/* === HEADER === */
.header { text-align: center; padding: 28px 0 20px; animation: fade-in-up 0.5s ease-out backwards; }
.title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(1.7rem,5.5vw,3rem);
  font-weight: 800; letter-spacing: 2.5px;
  background: linear-gradient(135deg, #fff 0%, var(--accent-1) 25%, var(--primary) 50%, var(--accent-2) 75%, var(--accent-3) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: 0 0 28px rgba(99,102,241,0.45); position: relative; display: inline-block;
}
.title::after {
  content:''; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%);
  width:70%; height:2px; border-radius:2px;
  background: linear-gradient(90deg, transparent, var(--primary), var(--accent-1), var(--accent-2), transparent);
  animation: glow-pulse 3s ease-in-out infinite;
}

/* === TABS - CHIP STYLE === */
.tabs {
  display: flex; justify-content: center; gap: 6px; margin: 0 0 18px; padding: 5px;
  background: var(--surface-2); border: 1px solid var(--border-1);
  border-radius: var(--radius-3); box-shadow: var(--glow-sm);
  backdrop-filter: blur(16px); animation: scale-in 0.4s ease-out backwards;
}
.tab {
  flex: 1; min-width: 125px; padding: 12px 18px; font-weight: 700; font-size: 0.87rem;
  color: var(--text-3); background: transparent; border: none; border-radius: var(--radius-2);
  cursor: pointer; transition: all 0.25s var(--ease-fast); position: relative; overflow: hidden;
  text-transform: uppercase; letter-spacing: 0.8px;
}
.tab::before {
  content:''; position:absolute; inset:0; border-radius: var(--radius-2);
  background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(34,211,238,0.08));
  opacity: 0; transition: opacity 0.25s var(--ease-fast);
}
.tab:hover::before { opacity: 1; }
.tab:hover { color: var(--accent-1); transform: translateY(-2px); }
.tab.active {
  color: var(--text-1); background: linear-gradient(135deg, rgba(99,102,241,0.22), rgba(34,211,238,0.18));
  box-shadow: var(--glow-md), inset 0 0 28px rgba(99,102,241,0.12);
}
.tab.active::after {
  content:''; position:absolute; bottom:0; left:18%; right:18%; height:2px; border-radius:2px;
  background: linear-gradient(90deg, transparent, var(--primary), var(--accent-1), transparent);
}

/* === CARD === */
.card {
  background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg-3) 100%);
  border: 1px solid var(--border-1); border-top: 2px solid var(--primary);
  border-radius: 0 0 var(--radius-4) var(--radius-4); padding: 20px;
  position: relative; box-shadow: 0 10px 42px rgba(0,0,0,0.32);
  animation: fade-in-up 0.45s ease-out backwards;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--primary), var(--accent-1), var(--primary), transparent);
  background-size: 200% 100%; animation: wave 4s linear infinite;
}

/* === CONTROL BAR - MODERN INPUTS === */
.control-bar {
  background: var(--surface-1); border: 1px solid var(--border-1);
  border-radius: var(--radius-2); padding: 13px 16px; margin-bottom: 18px;
  display: flex; flex-wrap: wrap; gap: 13px; align-items: center; justify-content: center;
  box-shadow: inset 0 0 24px rgba(99,102,241,0.05), 0 4px 20px rgba(0,0,0,0.18);
  backdrop-filter: blur(14px); animation: scale-in 0.38s ease-out backwards;
}
.ctrl-item { display: flex; align-items: center; gap: 9px; white-space: nowrap; }
.ctrl-label {
  color: var(--accent-1); font-size: 0.82rem; font-weight: 600;
  text-shadow: 0 0 7px rgba(34,211,238,0.42); letter-spacing: 0.3px;
}
.input-modern {
  padding: 10px 14px; background: var(--surface-2); border: 1.5px solid var(--border-1);
  border-radius: var(--radius-1); color: var(--text-1); font-size: 0.91rem;
  width: 170px; transition: all 0.2s var(--ease-fast); font-family: inherit;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.15);
}
.input-modern:focus {
  outline: none; border-color: var(--primary);
  box-shadow: var(--glow-md), inset 0 0 16px rgba(99,102,241,0.12);
  background: var(--surface-3);
}
.input-modern::placeholder { color: var(--text-3); opacity: 0.72; }

/* === BUTTONS === */
.btn {
  padding: 10px 20px; background: linear-gradient(135deg, var(--primary) 0%, #818cf8 55%, var(--primary) 100%);
  border: none; border-radius: var(--radius-1); color: #fff; font-weight: 700;
  font-size: 0.81rem; cursor: pointer; transition: all 0.28s var(--ease-smooth);
  white-space: nowrap; position: relative; overflow: hidden; text-transform: uppercase;
  letter-spacing: 0.7px; box-shadow: var(--glow-sm); min-width: 95px;
}
.btn::before {
  content:''; position:absolute; inset:0; border-radius: var(--radius-1);
  background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.2) 45%, transparent 55%, rgba(255,255,255,0.12) 100%);
  transform: translateX(-100%); transition: transform 0.45s ease;
}
.btn:hover::before { transform: translateX(100%); }
.btn:hover {
  transform: translateY(-3px) scale(1.02); box-shadow: var(--glow-md);
  background: linear-gradient(135deg, #818cf8 0%, var(--primary) 55%, #818cf8 100%);
}
.btn:active { transform: translateY(-1px) scale(1); }
.btn:disabled {
  opacity: 0.48; cursor: not-allowed; transform: none; box-shadow: none;
  background: linear-gradient(135deg, var(--bg-4), #2a3250);
}
.status {
  font-size: 0.81rem; color: var(--accent-1); margin-left: 7px; font-weight: 600;
  text-shadow: 0 0 8px rgba(34,211,238,0.48); animation: glow-pulse 2.6s ease-in-out infinite;
  min-width: 72px; display: inline-block; text-align: left;
}

/* === GRID === */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(285px, 1fr)); gap: 18px; }

/* === SECTION === */
.section {
  background: var(--surface-1); border: 1px solid var(--border-1);
  border-radius: var(--radius-2); overflow: hidden; display: flex; flex-direction: column;
  box-shadow: 0 5px 26px rgba(0,0,0,0.26); transition: all 0.3s var(--ease-smooth);
  animation: fade-in-up 0.38s ease-out backwards;
}
.section:nth-child(1){animation-delay:0.06s} .section:nth-child(2){animation-delay:0.12s} .section:nth-child(3){animation-delay:0.18s}
.section:hover { border-color: var(--primary); box-shadow: var(--glow-md), 0 8px 34px rgba(0,0,0,0.32); transform: translateY(-4px); }
.section-head {
  background: linear-gradient(90deg, rgba(99,102,241,0.16) 0%, rgba(34,211,238,0.1) 100%);
  padding: 12px 16px; border-bottom: 1px solid var(--border-1);
  display: flex; justify-content: space-between; align-items: center; position: relative;
}
.section-head::after {
  content:''; position:absolute; bottom:-1px; left:17px; right:17px; height:1px;
  background: linear-gradient(90deg, transparent, var(--primary), var(--accent-1), transparent);
}
.section-title {
  font-weight: 700; color: var(--accent-1); font-size: 0.95rem;
  text-shadow: 0 0 10px rgba(34,211,238,0.52); letter-spacing: 0.7px;
}
.badge {
  background: linear-gradient(135deg, rgba(99,102,241,0.24), rgba(34,211,238,0.18));
  color: var(--accent-1); padding: 4px 10px; border-radius: 18px;
  font-size: 0.73rem; font-weight: 700; border: 1px solid rgba(99,102,241,0.36);
  box-shadow: 0 0 9px rgba(99,102,241,0.26); animation: glow-pulse 3s ease-in-out infinite;
}

/* === SEARCH === */
.search { padding: 10px 14px; border-bottom: 1px solid var(--border-1); background: rgba(15,21,38,0.26); }
.search-input {
  width: 100%; padding: 9px 13px; background: var(--surface-2);
  border: 1.2px solid rgba(99,102,241,0.28); border-radius: var(--radius-1);
  color: var(--text-1); font-size: 0.89rem; transition: all 0.2s var(--ease-fast); font-family: inherit;
}
.search-input:focus { outline: none; border-color: var(--primary); box-shadow: var(--glow-md); background: var(--surface-3); }
.search-input::placeholder { color: var(--text-3); opacity: 0.7; }

/* === SCROLL AREA === */
.scroll-area { padding: 10px; overflow-y: auto; max-height: 425px; flex-grow: 1; scroll-behavior: smooth; }

/* === ITEM === */
.item {
  background: var(--surface-2); border: 1px solid rgba(99,102,241,0.24);
  border-radius: var(--radius-1); padding: 12px 14px; margin-bottom: 9px;
  cursor: pointer; transition: all 0.28s var(--ease-smooth); position: relative; overflow: hidden;
  animation: scale-in 0.32s ease-out backwards;
}
.item::before {
  content:''; position:absolute; inset:0; border-radius: var(--radius-1);
  background: linear-gradient(135deg, transparent 0%, rgba(99,102,241,0.08) 50%, transparent 100%);
  opacity: 0; transition: opacity 0.28s var(--ease-smooth);
}
.item:hover::before { opacity: 1; }
.item:hover {
  border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--glow-sm);
  background: linear-gradient(135deg, rgba(26,35,64,0.78), rgba(20,28,51,0.68));
}
.item-tag {
  font-size: 0.68rem; color: var(--text-3); text-transform: uppercase;
  letter-spacing: 1.3px; margin-bottom: 3px; font-weight: 600; opacity: 0.9;
}
.item-title {
  color: var(--accent-1); font-weight: 700; margin-bottom: 4px;
  font-size: 0.93rem; text-shadow: 0 0 7px rgba(34,211,238,0.45);
}
.item-text {
  font-size: 0.83rem; color: var(--text-1); line-height: 1.46;
  white-space: pre-wrap; word-break: break-all; opacity: 0.93;
}

/* === MARKET CARD === */
.market {
  background: var(--surface-1); border: 1px solid var(--border-1);
  border-radius: var(--radius-2); overflow: hidden; margin-bottom: 11px;
  transition: all 0.25s var(--ease-fast); animation: fade-in-up 0.35s ease-out backwards;
}
.market:hover { border-color: var(--primary); box-shadow: var(--glow-sm); }
.market-head {
  background: linear-gradient(90deg, rgba(99,102,241,0.2) 0%, rgba(34,211,238,0.12) 100%);
  padding: 12px 16px; border-bottom: 1px solid var(--border-1);
}
.market-title {
  font-weight: 700; color: var(--accent-1); font-size: 0.89rem;
  text-shadow: 0 0 9px rgba(34,211,238,0.5);
}
.market-body { padding: 8px 10px; max-height: 325px; overflow-y: auto; }

/* === BET ROW === */
.bet {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 13px; background: var(--surface-2);
  border: 1px solid rgba(99,102,241,0.22); border-radius: var(--radius-1);
  margin-bottom: 5px; cursor: pointer; transition: all 0.22s var(--ease-fast);
}
.bet:hover {
  border-color: var(--primary); background: linear-gradient(135deg, rgba(26,35,64,0.68), rgba(20,28,51,0.58));
  transform: translateX(4px); box-shadow: var(--glow-sm);
}
.bet-label { color: var(--text-1); font-size: 0.83rem; flex: 1; margin-right: 10px; font-weight: 500; }
.bet-value {
  font-weight: 700; color: var(--accent-1); font-size: 0.83rem;
  background: linear-gradient(135deg, rgba(99,102,241,0.16), rgba(34,211,238,0.12));
  padding: 3px 8px; border-radius: 6px; border: 1px solid rgba(99,102,241,0.3);
  text-shadow: 0 0 7px rgba(34,211,238,0.45); transition: all 0.22s var(--ease-fast);
}
.bet:hover .bet-value {
  background: linear-gradient(135deg, rgba(99,102,241,0.26), rgba(34,211,238,0.2));
  box-shadow: 0 0 12px rgba(34,211,238,0.36);
}

/* === ✨ CHIP SELECTOR - NO DROPDOWN ✨ === */
.chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
.chip {
  padding: 8px 15px; background: var(--surface-2); border: 1.5px solid var(--border-1);
  border-radius: 24px; color: var(--text-2); font-size: 0.84rem; font-weight: 600;
  cursor: pointer; transition: all 0.22s var(--ease-fast); white-space: nowrap;
  display: flex; align-items: center; gap: 6px; position: relative; overflow: hidden;
}
.chip::before {
  content:''; position:absolute; inset:0; border-radius: 22px;
  background: linear-gradient(135deg, rgba(99,102,241,0.14), rgba(34,211,238,0.1));
  opacity: 0; transition: opacity 0.22s var(--ease-fast);
}
.chip:hover::before { opacity: 1; }
.chip:hover { color: var(--accent-1); border-color: var(--primary); transform: translateY(-2px); }
.chip.active {
  color: #fff; background: linear-gradient(135deg, var(--primary), #818cf8);
  border-color: var(--primary); box-shadow: var(--glow-sm);
  animation: slide-chip 0.28s ease-out;
}
.chip.active::after {
  content:'✓'; font-size: 0.75rem; margin-left: 3px; animation: scale-in 0.2s ease-out;
}
.chip-label { font-size: 0.74rem; color: var(--text-3); margin-bottom: 6px; font-weight: 600; }

/* === CALC SECTION === */
.calc-wrap {
  background: var(--surface-1); border: 1px solid var(--border-1);
  border-radius: var(--radius-2); padding: 15px 17px; margin: 15px 0;
  box-shadow: inset 0 0 26px rgba(99,102,241,0.06); backdrop-filter: blur(12px);
}
.calc-head {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border-1);
}
.calc-icon { font-size: 1.4rem; animation: float-slow 3.5s ease-in-out infinite; }
.calc-title {
  font-weight: 700; color: var(--accent-1); font-size: 1.04rem;
  text-shadow: 0 0 10px rgba(34,211,238,0.55);
}
.calc-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 14px; align-items: end; }
.calc-field { display: flex; flex-direction: column; gap: 6px; }
.calc-fld-label {
  font-size: 0.78rem; font-weight: 700; color: var(--accent-1);
  text-shadow: 0 0 8px rgba(34,211,238,0.48); letter-spacing: 0.7px;
}
.calc-btn {
  padding: 11px 24px; background: linear-gradient(135deg, var(--primary) 0%, var(--accent-1) 100%);
  border: none; border-radius: var(--radius-1); color: #fff; font-weight: 700;
  font-size: 0.82rem; cursor: pointer; transition: all 0.26s var(--ease-smooth);
  box-shadow: 0 0 19px rgba(99,102,241,0.42); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.7px;
}
.calc-btn:hover {
  transform: translateY(-3px) scale(1.024); box-shadow: 0 0 33px rgba(99,102,241,0.68);
  background: linear-gradient(135deg, #818cf8 0%, var(--accent-1) 100%);
}
.calc-btn:active { transform: translateY(-1px); }

/* === RESULT DISPLAY === */
.result {
  margin-top: 17px; padding: 17px 20px;
  background: var(--surface-2); border: 1.6px solid rgba(99,102,241,0.32);
  border-radius: var(--radius-2); font-weight: 700; font-size: 1.03rem;
  color: var(--accent-1); text-align: center; min-height: 60px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 22px rgba(99,102,241,0.2), inset 0 0 14px rgba(99,102,241,0.12);
  cursor: pointer; transition: all 0.24s var(--ease-fast); position: relative; overflow: hidden;
}
.result::before {
  content:''; position:absolute; inset:-2px; border-radius: 18px;
  background: linear-gradient(135deg, transparent 30%, rgba(99,102,241,0.14) 50%, transparent 70%);
  animation: wave 4.5s linear infinite; pointer-events: none;
}
.result:hover { border-color: var(--accent-1); box-shadow: 0 0 30px rgba(99,102,241,0.45), inset 0 0 20px rgba(99,102,241,0.2); }
.result:active { transform: scale(0.99); }
.result.copied {
  animation: scale-in 0.35s ease-out;
  box-shadow: 0 0 33px rgba(52,211,153,0.72), inset 0 0 18px rgba(52,211,153,0.38);
  border-color: var(--success);
}

/* === TOAST === */
.toast {
  position: fixed; bottom: 23px; left: 50%; transform: translateX(-50%) translateY(105px);
  background: var(--surface-3); color: var(--accent-1); padding: 13px 26px;
  border-radius: 50px; font-weight: 700; font-size: 0.93rem; opacity: 0;
  transition: all 0.45s var(--ease-bounce); z-index: 1000;
  box-shadow: var(--glow-lg); border: 1.4px solid var(--primary);
  backdrop-filter: blur(13px); text-shadow: 0 0 10px rgba(34,211,238,0.65);
  display: flex; align-items: center; gap: 8px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); animation: scale-in 0.42s var(--ease-bounce); }
.toast.success { border-color: var(--success); box-shadow: 0 0 34px rgba(52,211,153,0.52), 0 0 68px rgba(52,211,153,0.26); }
.toast.error { border-color: var(--error); box-shadow: 0 0 34px rgba(248,113,113,0.52), 0 0 68px rgba(248,113,113,0.26); }
.toast.warning { border-color: var(--warning); box-shadow: 0 0 34px rgba(251,191,36,0.52), 0 0 68px rgba(251,191,36,0.26); }

/* === SPINNER === */
.spinner {
  width: 33px; height: 33px; border: 2.7px solid rgba(99,102,241,0.28);
  border-top-color: var(--accent-1); border-radius: 50%;
  animation: spin 0.92s linear infinite; box-shadow: 0 0 13px rgba(34,211,238,0.46);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === SYNC BADGE === */
.sync-badge {
  position: fixed; top: 17px; right: 17px;
  background: rgba(99,102,241,0.12); border: 1.1px solid var(--primary);
  border-radius: 10px; padding: 7px 14px; font-size: 0.75rem;
  color: var(--accent-1); display: none; align-items: center; gap: 7px;
  z-index: 1000; backdrop-filter: blur(9px); box-shadow: 0 0 17px rgba(99,102,241,0.32);
  animation: glow-pulse 1.7s infinite;
}
.sync-badge.show { display: flex; }
.sync-icon { animation: spin 1.15s linear infinite; display: inline-block; font-size: 1.05em; }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: rgba(15,21,38,0.32); border-radius: 3px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--primary), var(--accent-1), var(--primary));
  border-radius: 3px; border: 1px solid rgba(99,102,241,0.32);
  box-shadow: 0 0 9px rgba(99,102,241,0.42);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--accent-1), var(--primary), var(--accent-1));
  box-shadow: 0 0 14px rgba(34,211,238,0.68);
}

/* === SELECTION === */
::selection { background: rgba(99,102,241,0.34); color: var(--text-1); text-shadow: 0 0 8px rgba(99,102,241,0.68); }
button:focus-visible, input:focus-visible {
  outline: 2.2px solid var(--primary); outline-offset: 2px; box-shadow: var(--glow-md);
}

/* === RESPONSIVE === */
@media(max-width:768px) {
  .control-bar { flex-direction: column; align-items: stretch; padding: 12px 14px; }
  .ctrl-item { width: 100%; justify-content: space-between; }
  .input-modern { width: 100%; max-width: 215px; }
  .btn { width: 100%; max-width: 125px; margin: 0 auto; }
  .grid { grid-template-columns: 1fr; }
  .title { font-size: clamp(1.6rem,6.8vw,2.6rem); letter-spacing: 2px; }
  .tab { padding: 11px 15px; font-size: 0.82rem; min-width: 108px; }
  .calc-grid { grid-template-columns: 1fr; gap: 12px; }
  .calc-btn { width: 100%; }
  .scroll-area { max-height: 385px; }
  .chip-group { justify-content: center; }
}
@media(max-width:480px) {
  .wrapper { padding: 11px; }
  .header { padding: 22px 0 15px; }
  .card { padding: 17px; }
  .section { border-radius: var(--radius-2); }
  .item { padding: 10px 12px; }
  .item-title { font-size: 0.89rem; }
  .item-text { font-size: 0.8rem; }
}

/* === REDUCED MOTION === */
@media(prefers-reduced-motion:reduce) {
  *,*::before,*::after {
    animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important; scroll-behavior: auto !important;
  }
}

/* === UTILS === */
.hidden { display: none !important; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.text-glow { text-shadow: 0 0 11px rgba(34,211,238,0.58); }
.glow-border { box-shadow: 0 0 17px rgba(99,102,241,0.45); }
</style>
</head>
<body>
<!-- Background -->
<div class="bg-gradient"></div>
<div class="bg-grid"></div>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

</div>
<div class="particles" id="particles"></div>

<!-- Toast -->
<div id="toast" class="toast"><span id="toastIcon">✨</span><span id="toastMsg">Berhasil!</span></div>

<!-- Sync Badge -->
<div class="sync-badge" id="syncBadge"><span class="sync-icon">⟳</span><span>Auto-Sync</span></div>

<!-- Wrapper -->
<div class="wrapper">
  
  <!-- Header -->
  <header class="header"><h1 class="title">⚡ PREDIKSI & HITUNG TOGEL ⚡</h1></header>
  
  <!-- Tabs - Chip Style -->
  <nav class="tabs">
    <button class="tab active" data-tab="prediksi" onclick="switchTab('prediksi')">🔮 PREDIKSI</button>
    <button class="tab" data-tab="hitung" onclick="switchTab('hitung')">🧮 HITUNG</button>
  </nav>
  
  <!-- Card -->
  <div class="card">
    
    <!-- Tab: Prediksi -->
    <div id="tab-prediksi" class="tab-content">
      
      <!-- Control Bar -->

          <div class="search">
            <input type="text" class="search-input" id="search-jadwal" placeholder="🔍 Cari..." oninput="filterData('jadwal')">
          </div>
          <div class="scroll-area" id="list-jadwal">

      <!-- Calc Section - CHIP SELECTOR (NO DROPDOWN) -->

        <!-- Chip Selector for Groups -->

        <div id="resultDisplay" class="result" onclick="copyResult()">
          <span style="color:var(--text-3);font-size:0.94rem">Pilih tipe & label untuk melihat hasil</span>
        </div>

      <!-- Hitung Grid -->
      <div class="grid" id="container-hitung" style="margin-top:17px">

  </div>

<script>
// ============ CONFIG ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4', keyNominal: 'togel_nominal_v4', autoDelay: 1050
};

// ============ STATE ============
const state = { prediksi:[], jadwal:[], link:[], hitung:[], timers:{}, selectedGroup:null, selectedLabel:null, kelompokData:{} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'), toastMsg: $('toastMsg'), toastIcon: $('toastIcon'),
  syncBadge: $('syncBadge'), result: $('resultDisplay'),
  chipGroups: $('chipGroups'), chipLabels: $('chipLabels')
};

// ============ UTILS ============
function showToast(msg, type='success') {
  const icons = {success:'✨',error:'❌',warning:'⚠️',info:'ℹ️'};
  dom.toastIcon.textContent = icons[type]||'✨'; dom.toastMsg.textContent = msg;
  dom.toast.className = 'toast ' + type + ' show';
  setTimeout(() => dom.toast.classList.remove('show'), 3300);
}
function showSync() { if(dom.syncBadge) { dom.syncBadge.classList.add('show'); setTimeout(()=>dom.syncBadge.classList.remove('show'),2100); } }
function copyText(text) {
  let t = text; try { t = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(t).then(() => {
    const p = t.length>27 ? t.substring(0,27)+'...' : t;
    showToast('Disalin: '+p, 'success');
  }).catch(() => showToast('Gagal menyalin', 'error'));
}
function copyResult() {
  const r = dom.result, t = r.textContent.trim();
  if(t && !t.includes('Pilih')) { copyText(t); r.classList.add('copied'); setTimeout(()=>r.classList.remove('copied'),380); }
}
function fmtNum(n) { if(!n) return '0'; return new Intl.NumberFormat('id-ID').format(Number(n)); }
function debounce(fn, wait, key) { return (...args) => { clearTimeout(state.timers[key]); state.timers[key]=setTimeout(()=>fn(...args), wait); }; }

// ============ CSV ============
function parseCSV(txt) {
  let rows=[], row=[], entry="", st=0;
  for(let i=0;i<txt.length;i++) {
    const c=txt[i], n=txt[i+1];
    if(st===0) {
      if(c==='"') st=1;
      else if(c===',') { row.push(entry); entry=""; }
      else if(c==='\r'&&n==='\n') { row.push(entry); rows.push(row); row=[]; entry=""; i++; }
      else if(c==='\n'||c==='\r') { row.push(entry); rows.push(row); row=[]; entry=""; }
      else entry+=c;
    } else if(st===1) {
      if(c==='"'&&n==='"') { entry+='"'; i++; }
      else if(c==='"') st=0;
      else entry+=c;
    }
  }
  if(entry||row.length) { row.push(entry); rows.push(row); }
  return rows;
}
const safe = (r,i) => r?.[i]?.trim() ?? "";

// ============ API ============
async function updateSheet(action, value) {
  if(SCRIPT_URL.includes('YOUR_SCRIPT_ID')||!SCRIPT_URL) { showToast('⚙️ Script URL belum dikonfigurasi','warning'); return false; }
  try {
    const params = new URLSearchParams({action, value});
    const res = await fetch(SCRIPT_URL+'?'+params.toString());
    const txt = await res.text();
    return txt.toLowerCase().includes('success');
  } catch(e) { console.error("Update Error:",e); showToast('Koneksi gagal','error'); return false; }
}

// ============ FETCH ============
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi+'?t='+Date.now());
    const data = parseCSV(await res.text());
    state.prediksi=[]; state.jadwal=[]; state.link=[];
    if(data[0]) {
      const raw = safe(data[0],1);
      if(raw) {
        const p = raw.split('/');
        if(p.length===3) {
          const fmt = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          if(!dom.inTgl.value) dom.inTgl.value = fmt;
          dom.statTgl.textContent = fmt;
        }
      }
    }
    for(let i=2;i<=84&&i<data.length;i++) { const t=safe(data[i],1); if(t) state.prediksi.push({title:t.split(/[\s,]+/)[0]||'Item',content:t,id:i}); }
    for(let i=2;i<=55&&i<data.length;i++) { const t=safe(data[i],2); if(t) state.jadwal.push({title:t.split(/[\s,]+/)[0]||'Jadwal',content:t,id:i}); }
    for(let i=56;i<=82&&i<data.length;i++) { const t=safe(data[i],2); if(t) state.link.push({title:t.split(/[\s,]+/)[0]||'Link',content:t,id:i}); }
    renderPrediksi();
  } catch(e) { console.error("Error Prediksi:",e); dom.listP.innerHTML='<p style="color:var(--error);text-align:center;padding:27px">❌ Gagal memuat</p>'; }
}
async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung+'?t='+Date.now());
    const data = parseCSV(await res.text());
    if(data[0]) { const nom=safe(data[0],23); if(nom&&!dom.inNom.value) { dom.inNom.value=nom; dom.statNom.textContent="💰 Rp "+fmtNum(nom); } }
    const defs = [
      {r:0,c:24,s:2,e:42},{r:43,c:24,s:45,e:80},{r:81,c:24,s:83,e:119},{r:120,c:24,s:122,e:153},
      {r:154,c:24,s:156,e:179},{r:180,c:24,s:182,e:213},{r:215,c:24,s:217,e:248},{r:249,c:24,s:251,e:282},{r:283,c:24,s:285,e:316}
    ];
    state.hitung = defs.map(d => {
      let title = safe(data[d.r],d.c)||"PASARAN", items=[];
      for(let i=d.s;i<=d.e&&i<data.length;i++) {
        if(data[i]) { const ty=safe(data[i],23), rv=safe(data[i],24); if(ty||rv) items.push({type:ty||"-",res:rv||"-"}); }
      }
      return {title,items};
    }).filter(x=>x.items.length>0);
    renderHitung();
  } catch(e) { console.error("Error Hitung:",e); dom.contH.innerHTML='<p style="color:var(--error);text-align:center;padding:31px">❌ Gagal memuat</p>'; }
}

// ============ RENDER ============
function renderList(container, items, search, type) {
  const f = items.filter(i => i.content?.toLowerCase().includes(search.toLowerCase()) || i.title?.toLowerCase().includes(search.toLowerCase()));
  if(!f.length) { container.innerHTML='<p style="color:var(--text-3);text-align:center;padding:27px;font-size:0.91rem">📭 Tidak ada data</p>'; return; }
  container.innerHTML = f.map((v,idx)=>`
    <div class="item" style="--i:${idx}" onclick="copyText('${encodeURIComponent(v.content)}')">
      <div class="item-tag">📋 ${type.toUpperCase()}</div>
      <div class="item-title">${v.title}</div>
      <div class="item-tag">💬 Klik untuk salin</div>
      <div class="item-text">${v.content}</div>
    </div>
  `).join('');
}
function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value, 'prediksi');
  renderList(dom.listJ, state.jadwal, dom.srcJ.value, 'jadwal');
  renderList(dom.listL, state.link, dom.srcL.value, 'link');
  dom.cntP.textContent=state.prediksi.length; dom.cntJ.textContent=state.jadwal.length; dom.cntL.textContent=state.link.length;
}
function renderHitung() {
  if(!state.hitung.length) { dom.contH.innerHTML='<p style="color:var(--text-3);text-align:center;padding:31px">📭 Tidak ada data</p>'; return; }
  dom.contH.innerHTML = state.hitung.map((s,idx)=>`
    <div class="market" style="animation-delay:${idx*0.04}s">
      <div class="market-head"><h3 class="market-title">🎯 ${s.title}</h3></div>
      <div class="market-body">
        ${s.items.map(it=>`<div class="bet" onclick="copyText('${encodeURIComponent(it.res)}')"><span class="bet-label">${it.type}</span><span class="bet-value">${it.res}</span></div>`).join('')}
      </div>
    </div>
  `).join('');
}

// ============ CHIP SELECTOR LOGIC (NO DROPDOWN) ============
function renderChipGroups() {
  dom.chipGroups.innerHTML = '';
  Object.keys(state.kelompokData).forEach((title, idx) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `<span>${title}</span>`;
    chip.onclick = () => {
      document.querySelectorAll('#chipGroups .chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.selectedGroup = title;
      renderChipLabels(title);
    };
    chip.style.animationDelay = `${idx*0.04}s`;
    dom.chipGroups.appendChild(chip);
  });
}
function renderChipLabels(group) {
  dom.chipLabels.innerHTML = '';
  if(!group || !state.kelompokData[group]) {
    dom.chipLabels.innerHTML = '<div class="chip" style="opacity:0.5;cursor:not-allowed">Pilih tipe dulu →</div>';
    return;
  }
  state.kelompokData[group].forEach((item, idx) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `<span>${item.label}</span>`;
    chip.onclick = () => {
      document.querySelectorAll('#chipLabels .chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.selectedLabel = item.label;
      dom.result.innerHTML = `<span style="font-size:1.12em;font-weight:700;text-shadow:0 0 12px rgba(34,211,238,0.62)">${item.value}</span>`;
    };
    chip.style.animationDelay = `${idx*0.03}s`;
    dom.chipLabels.appendChild(chip);
  });
}
function showResult() {
  if(!state.selectedGroup || !state.selectedLabel) {
    dom.result.innerHTML = '<span style="color:var(--text-3);font-size:0.94rem">Pilih tipe & label dulu</span>';
    showToast('⚠️ Pilih tipe dan label', 'warning');
    return;
  }
  const group = state.kelompokData[state.selectedGroup];
  const item = group.find(i => i.label === state.selectedLabel);
  if(item) {
    dom.result.innerHTML = `<span style="font-size:1.12em;font-weight:700;text-shadow:0 0 12px rgba(34,211,238,0.62)">${item.value}</span>`;
    showToast('✅ Hasil ditampilkan', 'success');
  }
}

// ============ LOAD CALC DATA ============
async function loadCalcData() {
  try {
    const res = await fetch(CONFIG.sheetHitung+'?t='+Date.now());
    const data = parseCSV(await res.text());
    if(data[0]) { const nom=safe(data[0],23); if(nom&&!dom.inNom.value) { dom.inNom.value=nom; dom.statNom.textContent="💰 Rp "+fmtNum(nom); } }
    const defs = [
      {r:0,c:24,s:2,e:42,t:"🎰 Semua Pasaran"},{r:43,c:24,s:45,e:80,t:"🇲🇴 Macau 4D"},{r:81,c:24,s:83,e:119,t:"🇲🇴 Macau 5D"},
      {r:120,c:24,s:122,e:153,t:"🦍 Kingkong"},{r:154,c:24,s:156,e:179,t:"🎁 Bonus"},{r:180,c:24,s:182,e:213,t:"🇮🇩 Jakarta"},
      {r:215,c:24,s:217,e:248,t:"🌊 TotoMali"},{r:249,c:24,s:251,e:282,t:"🎯 HokiDraw"},{r:283,c:24,s:285,e:316,t:"🇦🇺 Sydney & 🇭🇰 HK"}
    ];
    state.kelompokData = {};
    defs.forEach(d => {
      const items = [];
      for(let i=d.s;i<=d.e&&i<data.length;i++) {
        if(data[i]) { const lb=safe(data[i],23), vl=safe(data[i],24); if(lb||vl) items.push({label:lb||"-",value:vl||"-"}); }
      }
      if(items.length>0) state.kelompokData[d.t] = items;
    });
    renderChipGroups();
  } catch(e) { console.error("Error loadCalcData:",e); }
}

// ============ AUTO-UPDATE ============
function handleDateChange() { showSync(); debounce(()=>updateTanggal(true), CONFIG.autoDelay, 'tgl')(); }
function handleNominalChange() { showSync(); debounce(()=>updateNominal(true), CONFIG.autoDelay, 'nom')(); }
async function updateTanggal(auto=false) {
  if(!dom.inTgl.value) return showToast("⚠️ Pilih tanggal","warning");
  const p=dom.inTgl.value.split('-'), fmt=`${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled=true; dom.statTgl.textContent=auto?"🔄 Sync...":"⏳ Menyimpan...";
  try {
    const ok=await updateSheet('updateTanggal',fmt); dom.btnTgl.disabled=false;
    if(ok) { localStorage.setItem(CONFIG.keyTanggal,dom.inTgl.value); dom.statTgl.textContent="✅ "+dom.inTgl.value;
      showToast(auto?"🔄 Tanggal diperbarui":"📅 Tanggal disimpan","success");
      await Promise.all([fetchPrediksi(),fetchHitung(),loadCalcData()]);
    } else { dom.statTgl.textContent="❌ Gagal"; showToast("❌ Gagal update","error"); }
  } catch(e) { dom.btnTgl.disabled=false; dom.statTgl.textContent="❌ Error"; }
}
async function updateNominal(auto=false) {
  if(!dom.inNom.value||dom.inNom.value<=0) return showToast("⚠️ Isi nominal valid","warning");
  dom.btnNom.disabled=true; dom.statNom.textContent=auto?"🔄 Sync...":"⏳ Menyimpan...";
  try {
    const ok=await updateSheet('updateNominal',dom.inNom.value); dom.btnNom.disabled=false;
    if(ok) { localStorage.setItem(CONFIG.keyNominal,dom.inNom.value); dom.statNom.textContent="💰 Rp "+fmtNum(dom.inNom.value);
      showToast(auto?"🔄 Nominal diperbarui":"💰 Nominal disimpan","success");
      await Promise.all([fetchPrediksi(),fetchHitung(),loadCalcData()]);
    } else { dom.statNom.textContent="❌ Gagal"; showToast("❌ Gagal update","error"); }
  } catch(e) { dom.btnNom.disabled=false; dom.statNom.textContent="❌ Error"; }
}

// ============ TABS ============
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  const isP=tab==='prediksi'; dom.tabP.classList.toggle('hidden',!isP); dom.tabH.classList.toggle('hidden',isP);
  const active=isP?dom.tabP:dom.tabH; active.style.animation='none'; setTimeout(()=>active.style.animation='scale-in 0.38s ease-out',10);
  showToast(`Tab ${tab.toUpperCase()} aktif`,'info');
}
function filterData(type) {
  const map={prediksi:{list:dom.listP,items:state.prediksi,input:dom.srcP},jadwal:{list:dom.listJ,items:state.jadwal,input:dom.srcJ},link:{list:dom.listL,items:state.link,input:dom.srcL}};
  const cfg=map[type]; if(cfg) renderList(cfg.list,cfg.items,cfg.input.value,type);
}

// ============ PARTICLES ============
function createParticles() {
  const c=document.getElementById('particles'); if(!c) return;
  for(let i=0;i<52;i++) {
    const p=document.createElement('div');
    p.className='particle'+(i%3===1?' alt-1':i%3===2?' alt-2':'');
    p.style.left=Math.random()*100+'%'; p.style.animationDelay=Math.random()*21+'s';
    p.style.animationDuration=(21+Math.random()*27)+'s'; p.style.opacity=0.52+Math.random()*0.43;
    c.appendChild(p);
  }
}

// ============ INIT ============
async function init() {
  createParticles();
  const sT=localStorage.getItem(CONFIG.keyTanggal), sN=localStorage.getItem(CONFIG.keyNominal);
  if(sT) { dom.inTgl.value=sT; dom.statTgl.textContent=sT; }
  if(sN) { dom.inNom.value=sN; dom.statNom.textContent="💰 Rp "+fmtNum(sN); }
  await Promise.all([fetchPrediksi(),fetchHitung(),loadCalcData()]);
  dom.srcP.oninput=()=>filterData('prediksi'); dom.srcJ.oninput=()=>filterData('jadwal'); dom.srcL.oninput=()=>filterData('link');
  setTimeout(()=>showToast('🚀 Selamat bekerja, SUHAN!','success'),850);
}
document.addEventListener('DOMContentLoaded',init);

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='1') { e.preventDefault(); switchTab('prediksi'); }
  if(e.ctrlKey&&e.key==='2') { e.preventDefault(); switchTab('hitung'); }
  if(e.key==='Escape') document.querySelectorAll('.input-modern,.search-input').forEach(el=>el.blur());
});

// Visibility sync
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) { showSync(); setTimeout(()=>{fetchPrediksi();fetchHitung();},580); } });

// Periodic refresh
setInterval(()=>{ if(document.visibilityState==='visible') { showSync(); fetchPrediksi(); fetchHitung(); } },5*60*1000);
</script>

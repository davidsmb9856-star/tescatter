<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030014;
  --bg-card: rgba(10, 8, 35, 0.7);
  --bg-card-hover: rgba(20, 15, 55, 0.85);
  --fg: #f0f9ff;
  --fg-muted: #94a3b8;
  --neon-cyan: #00f5ff;
  --neon-pink: #ff00aa;
  --neon-purple: #b72aff;
  --neon-green: #00ff9d;
  --neon-yellow: #ffe600;
  --border-glow: rgba(0, 245, 255, 0.5);
  --glow-cyan: 0 0 10px #00f5ff, 0 0 25px #00f5ff80, 0 0 50px #00f5ff40;
  --glow-cyan-lg: 0 0 15px #00f5ff, 0 0 35px #00f5ff90, 0 0 70px #00f5ff50, 0 0 100px #00f5ff30;
  --glow-pink: 0 0 10px #ff00aa, 0 0 25px #ff00aa80;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-bloom: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.5;
}

/* === BACKGROUND ANIMATED === */
.bg-animated {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(1200px 600px at 10% 10%, rgba(0, 245, 255, 0.08), transparent 60%),
    radial-gradient(800px 400px at 90% 20%, rgba(255, 0, 170, 0.06), transparent 60%),
    radial-gradient(1000px 500px at 50% 90%, rgba(183, 42, 255, 0.07), transparent 60%),
    linear-gradient(180deg, #030014 0%, #0a0823 50%, #030014 100%);
  animation: bgShift 30s ease-in-out infinite;
}
@keyframes bgShift {
  0%, 100% { filter: hue-rotate(0deg) brightness(1); }
  25% { filter: hue-rotate(15deg) brightness(1.05); }
  50% { filter: hue-rotate(-10deg) brightness(0.98); }
  75% { filter: hue-rotate(8deg) brightness(1.02); }
}

/* === GRID LINES === */
.grid-overlay {
  position: fixed; inset: 0; z-index: -2;
  background-image: 
    linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridSlide 40s linear infinite;
  opacity: 0.7;
  pointer-events: none;
}
@keyframes gridSlide {
  0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
  100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
}

/* === FLOATING ORBS === */
.orb {
  position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.15;
  animation: orbFloat 35s ease-in-out infinite alternate; z-index: -1;
}
.orb-1 { width: 700px; height: 700px; background: var(--neon-cyan); top: -20%; left: -15%; animation-delay: 0s; }
.orb-2 { width: 500px; height: 500px; background: var(--neon-purple); bottom: -15%; right: -10%; animation-delay: -15s; }
.orb-3 { width: 400px; height: 400px; background: var(--neon-pink); top: 40%; left: 50%; animation-delay: -25s; }
@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); opacity: 0.12; }
  50% { transform: translate(40px, -30px) scale(1.08); opacity: 0.18; }
  100% { transform: translate(-25px, 35px) scale(0.95); opacity: 0.14; }
}

/* === PARTICLES === */
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; width: 2px; height: 2px; border-radius: 50%;
  background: var(--neon-cyan); opacity: 0;
  animation: particleRise 25s infinite ease-in-out;
  box-shadow: 0 0 8px var(--neon-cyan), 0 0 20px var(--neon-cyan);
}
.particle:nth-child(2n) { background: var(--neon-purple); animation-delay: -8s; animation-duration: 30s; }
.particle:nth-child(3n) { background: var(--neon-pink); animation-delay: -15s; animation-duration: 28s; }
@keyframes particleRise {
  0%, 100% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) rotate(720deg) scale(1.2); opacity: 0; }
}

/* === MAIN CONTAINER === */
.main-container {
  position: relative; z-index: 10;
  max-width: 1400px; margin: 0 auto; padding: 16px;
}

/* === HEADER === */
.header-section {
  text-align: center; padding: 28px 0 20px;
  animation: bloomIn 0.8s var(--transition-bloom) backwards;
}
@keyframes bloomIn {
  from { opacity: 0; transform: translateY(-20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.8rem, 5.5vw, 3.2rem);
  font-weight: 900; letter-spacing: 2px;
  background: linear-gradient(135deg, #fff 0%, var(--neon-cyan) 30%, var(--neon-purple) 60%, var(--neon-pink) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--glow-cyan);
  animation: titlePulse 3s ease-in-out infinite;
  position: relative; display: inline-block;
}
@keyframes titlePulse {
  0%, 100% { filter: brightness(1) saturate(1); }
  50% { filter: brightness(1.25) saturate(1.3); }
}
.main-title::after {
  content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
  width: 70%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), var(--neon-cyan), transparent);
  animation: lineGlow 2.5s ease-in-out infinite;
}
@keyframes lineGlow {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; filter: blur(0.5px); }
}

/* === TABS - GLASS STYLE === */
.tabs-container {
  display: flex; justify-content: center; gap: 4px; margin: 12px 0 20px;
  background: rgba(15, 12, 40, 0.5); border: 1px solid rgba(0, 245, 255, 0.25);
  border-radius: 14px; padding: 4px; max-width: fit-content; margin-left: auto; margin-right: auto;
  backdrop-filter: blur(12px);
}
.tab-btn {
  padding: 12px 28px; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.9rem;
  color: var(--fg-muted); background: transparent; border: none; border-radius: 10px;
  cursor: pointer; transition: all var(--transition); position: relative; overflow: hidden;
  text-transform: uppercase; letter-spacing: 1px;
}
.tab-btn::before {
  content: ''; position: absolute; inset: 0; border-radius: 10px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0, 245, 255, 0.3), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  opacity: 0; transition: opacity var(--transition);
}
.tab-btn:hover { color: var(--neon-cyan); }
.tab-btn:hover::before { opacity: 1; }
.tab-btn.active {
  color: var(--fg); background: linear-gradient(135deg, rgba(0, 245, 255, 0.15), rgba(183, 42, 255, 0.12));
  border: 1px solid var(--border-glow); box-shadow: var(--glow-cyan);
}
.tab-btn.active::after {
  content: ''; position: absolute; bottom: -1px; left: 15%; right: 15%; height: 2px;
  background: var(--neon-cyan); border-radius: 2px;
  box-shadow: 0 0 12px var(--neon-cyan);
}

/* === CONTENT BOX - GLASSMORPHISM === */
.content-box {
  background: var(--bg-card);
  border: 1px solid rgba(0, 245, 255, 0.2);
  border-radius: 20px; padding: 22px;
  backdrop-filter: blur(20px);
  position: relative; overflow: hidden;
}
.content-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), transparent);
  animation: borderScan 4s linear infinite;
}
@keyframes borderScan {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* === SETTINGS PANEL - ONE ROW === */
.settings-panel {
  background: linear-gradient(135deg, rgba(20, 15, 50, 0.6), rgba(30, 20, 70, 0.5));
  border: 1px solid rgba(0, 245, 255, 0.25); border-radius: 16px;
  padding: 16px 20px; margin-bottom: 22px;
  display: flex; flex-wrap: nowrap; gap: 16px; align-items: center;
  backdrop-filter: blur(10px);
}
.setting-item { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
.setting-label {
  color: var(--neon-cyan); font-size: 0.82rem; font-weight: 600;
  text-shadow: 0 0 8px rgba(0, 245, 255, 0.5);
}
.input-neon {
  padding: 10px 14px;
  background: rgba(8, 6, 25, 0.7);
  border: 1px solid rgba(0, 245, 255, 0.3);
  border-radius: 10px;
  color: var(--fg); font-size: 0.92rem;
  width: 170px; transition: all var(--transition);
  font-family: 'Space Grotesk', sans-serif;
}
.input-neon:focus {
  outline: none; border-color: var(--neon-cyan);
  box-shadow: var(--glow-cyan);
  background: rgba(12, 10, 35, 0.85);
}

/* === BUTTONS - NEON GLOW === */
.btn-neon {
  padding: 10px 22px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  border: none; border-radius: 12px;
  color: #030014; font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.82rem; cursor: pointer;
  transition: all var(--transition); white-space: nowrap;
  text-transform: uppercase; letter-spacing: 1px;
  position: relative; overflow: hidden;
}
.btn-neon::before {
  content: ''; position: absolute; inset: 0; border-radius: 12px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.4), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  opacity: 0; transition: opacity 0.3s;
}
.btn-neon:hover::before { opacity: 1; }
.btn-neon:hover {
  transform: translateY(-2px);
  box-shadow: var(--glow-cyan-lg);
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
}
.btn-neon:active { transform: translateY(0); }
.btn-neon:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.status-badge {
  font-size: 0.82rem; color: var(--neon-green); margin-left: 8px; font-weight: 600;
  text-shadow: 0 0 10px rgba(0, 255, 157, 0.6);
  animation: statusBlink 2s ease-in-out infinite;
}
@keyframes statusBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.75; } }

/* === DATA GRID === */
.data-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 18px;
}

/* === SECTION BOX === */
.section-box {
  background: linear-gradient(145deg, rgba(18, 14, 45, 0.7), rgba(25, 18, 60, 0.6));
  border: 1px solid rgba(0, 245, 255, 0.18); border-radius: 18px;
  overflow: hidden; display: flex; flex-direction: column;
  backdrop-filter: blur(8px); transition: all var(--transition);
}
.section-box:hover {
  border-color: rgba(0, 245, 255, 0.45);
  box-shadow: var(--glow-cyan);
  transform: translateY(-2px);
}
.section-header {
  background: linear-gradient(90deg, rgba(0, 245, 255, 0.12), transparent 70%);
  padding: 12px 16px; border-bottom: 1px solid rgba(0, 245, 255, 0.15);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan);
  font-size: 0.95rem; text-shadow: 0 0 10px rgba(0, 245, 255, 0.6); letter-spacing: 0.5px;
}
.badge-count {
  background: rgba(0, 245, 255, 0.15); color: var(--neon-cyan);
  padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700;
  border: 1px solid rgba(0, 245, 255, 0.35);
}

/* === SEARCH === */
.search-box { padding: 10px 14px; border-bottom: 1px solid rgba(0, 245, 255, 0.12); }
.search-input {
  width: 100%; padding: 9px 13px;
  background: rgba(10, 8, 30, 0.6);
  border: 1px solid rgba(0, 245, 255, 0.25);
  border-radius: 10px; color: var(--fg); font-size: 0.88rem;
  transition: all var(--transition); font-family: 'Space Grotesk', sans-serif;
}
.search-input:focus {
  outline: none; border-color: var(--neon-cyan); box-shadow: var(--glow-cyan);
}
.search-input::placeholder { color: var(--fg-muted); opacity: 0.7; }

/* === SCROLLABLE CONTENT === */
.section-content { padding: 10px; overflow-y: auto; max-height: 420px; flex-grow: 1; }

/* === ITEM CARD - NO DROP, GLOW ONLY === */
.item-card {
  background: linear-gradient(135deg, rgba(15, 12, 40, 0.65), rgba(22, 17, 55, 0.55));
  border: 1px solid rgba(0, 245, 255, 0.2); border-radius: 14px;
  padding: 13px 15px; margin-bottom: 9px; cursor: pointer;
  transition: all var(--transition); position: relative; overflow: hidden;
}
.item-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 14px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0, 245, 255, 0.25), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  opacity: 0; transition: opacity var(--transition);
}
.item-card:hover::before { opacity: 1; }
.item-card:hover {
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-cyan);
  background: linear-gradient(135deg, rgba(20, 16, 50, 0.75), rgba(28, 22, 65, 0.65));
  transform: translateY(-2px);
}
.item-label { font-size: 0.68rem; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 1.8px; margin-bottom: 2px; font-weight: 600; }
.item-title { color: var(--neon-cyan); font-weight: 700; margin-bottom: 4px; font-size: 0.92rem; }
.item-content { font-size: 0.83rem; color: var(--fg); line-height: 1.45; white-space: pre-wrap; word-break: break-word; opacity: 0.95; }

/* === PASARAN BOX === */
.pasaran-box {
  background: linear-gradient(135deg, rgba(16, 13, 42, 0.68), rgba(24, 19, 58, 0.58));
  border: 1px solid rgba(0, 245, 255, 0.2); border-radius: 16px;
  overflow: hidden; margin-bottom: 11px; transition: all var(--transition);
}
.pasaran-box:hover { border-color: rgba(0, 245, 255, 0.45); box-shadow: var(--glow-cyan); }
.pasaran-header {
  background: linear-gradient(90deg, rgba(0, 245, 255, 0.15), transparent 75%);
  padding: 12px 16px; border-bottom: 1px solid rgba(0, 245, 255, 0.15);
}
.pasaran-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan);
  font-size: 0.88rem; text-shadow: 0 0 9px rgba(0, 245, 255, 0.55);
}
.pasaran-content { padding: 8px 12px; max-height: 340px; overflow-y: auto; }

/* === BET ITEM === */
.bet-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 13px; margin-bottom: 5px;
  background: rgba(12, 10, 32, 0.55);
  border: 1px solid rgba(0, 245, 255, 0.18); border-radius: 10px;
  cursor: pointer; transition: all var(--transition);
}
.bet-item:hover {
  border-color: var(--neon-cyan);
  background: rgba(18, 14, 45, 0.7);
  box-shadow: var(--glow-cyan);
  transform: translateX(3px);
}
.bet-type { color: var(--fg); font-size: 0.83rem; flex: 1; margin-right: 10px; font-weight: 500; }
.bet-result {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan);
  font-size: 0.83rem; background: rgba(0, 245, 255, 0.12);
  padding: 3px 9px; border-radius: 8px; border: 1px solid rgba(0, 245, 255, 0.3);
  transition: all var(--transition);
}
.bet-item:hover .bet-result {
  background: rgba(0, 245, 255, 0.22);
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.35);
}

/* === QUANTUM CARD - HITUNG SECTION === */
.quantum-card {
  background: linear-gradient(135deg, rgba(18, 14, 48, 0.72), rgba(26, 20, 62, 0.62));
  border: 1px solid rgba(183, 42, 255, 0.25); border-radius: 18px;
  padding: 18px; margin: 18px 0; backdrop-filter: blur(10px);
}
.quantum-card-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  padding-bottom: 12px; border-bottom: 1px solid rgba(183, 42, 255, 0.2);
}
.quantum-icon { font-size: 1.4rem; }
.quantum-card-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-purple);
  font-size: 1.05rem; text-shadow: 0 0 10px rgba(183, 42, 255, 0.6);
}

/* === DROPDOWN NEON === */
.quantum-dropdown {
  appearance: none; width: 100%; padding: 11px 42px 11px 16px;
  font-size: 0.92rem; font-weight: 600; color: var(--neon-cyan);
  background: rgba(14, 11, 38, 0.85);
  border: 1px solid rgba(0, 245, 255, 0.35); border-radius: 12px;
  outline: none; cursor: pointer; transition: all var(--transition);
  font-family: 'Orbitron', sans-serif;
}
.quantum-dropdown:hover { border-color: var(--neon-cyan); box-shadow: var(--glow-cyan); }
.quantum-dropdown:focus { border-color: var(--neon-purple); box-shadow: 0 0 18px rgba(183, 42, 255, 0.5); }
.quantum-dropdown option {
  background: rgba(10, 8, 30, 0.95); color: var(--fg); padding: 10px;
  font-family: 'Space Grotesk', sans-serif;
}

/* === HITUNG ROW - ONE LINE === */
.hitung-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 14px; align-items: end; }
.hitung-group { display: flex; flex-direction: column; gap: 7px; }
.hitung-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700;
  color: var(--neon-cyan); text-shadow: 0 0 9px rgba(0, 245, 255, 0.55); letter-spacing: 0.8px;
}
.hitung-btn {
  padding: 12px 26px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  border: none; border-radius: 12px; color: #030014; font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all var(--transition);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1px;
}
.hitung-btn:hover { transform: translateY(-2px); box-shadow: var(--glow-cyan-lg); }
.hitung-btn:active { transform: translateY(0); }

/* === DETAIL BOX === */
#detailHitunganDropdown {
  margin-top: 18px; padding: 18px 22px;
  background: rgba(14, 11, 40, 0.75);
  border: 1px solid rgba(0, 245, 255, 0.3); border-radius: 14px;
  font-family: 'Orbitron', sans-serif; font-size: 1.05rem;
  color: var(--neon-cyan); text-align: center; min-height: 55px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); cursor: pointer;
}
#detailHitunganDropdown:hover {
  border-color: var(--neon-cyan); box-shadow: var(--glow-cyan);
  background: rgba(18, 14, 48, 0.85);
}

/* === TOAST - BLOOMING ZOOM === */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(120px) scale(0.9);
  background: linear-gradient(135deg, rgba(18, 14, 45, 0.95), rgba(26, 20, 62, 0.92));
  color: var(--neon-cyan); padding: 13px 30px; border-radius: 50px;
  font-weight: 700; font-size: 0.92rem; opacity: 0; transition: all var(--transition-bloom);
  z-index: 1000; border: 1px solid var(--neon-cyan); backdrop-filter: blur(15px);
  text-shadow: 0 0 10px rgba(0, 245, 255, 0.7); box-shadow: var(--glow-cyan-lg);
}
.toast.show {
  opacity: 1; transform: translateX(-50%) translateY(0) scale(1);
  animation: toastBloom 0.5s var(--transition-bloom);
}
@keyframes toastBloom {
  0% { transform: translateX(-50%) translateY(120px) scale(0.88); opacity: 0; }
  40% { transform: translateX(-50%) translateY(-8px) scale(1.03); }
  100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
}

/* === SPINNER === */
.spinner {
  width: 32px; height: 32px; border: 3px solid rgba(0, 245, 255, 0.25);
  border-top-color: var(--neon-cyan); border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === SCROLLBAR NEON === */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: rgba(8, 6, 28, 0.4); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-cyan), var(--neon-purple));
  border-radius: 3px; border: 1px solid rgba(0, 245, 255, 0.25);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--neon-purple), var(--neon-pink));
}

/* === AUTO-UPDATE INDICATOR === */
.auto-update-indicator {
  position: fixed; top: 18px; right: 18px;
  background: rgba(0, 245, 255, 0.12); border: 1px solid var(--neon-cyan);
  border-radius: 10px; padding: 7px 14px; font-size: 0.78rem;
  color: var(--neon-cyan); display: none; align-items: center; gap: 7px;
  z-index: 1000; backdrop-filter: blur(10px); animation: pulse 1.2s infinite;
}
.auto-update-indicator.show { display: flex; }
@keyframes pulse { 0%, 100% { opacity: 0.75; } 50% { opacity: 1; } }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .settings-panel { flex-direction: column; align-items: stretch; }
  .setting-item { width: 100%; justify-content: space-between; }
  .input-neon { width: 100%; }
  .data-grid { grid-template-columns: 1fr; }
  .main-title { font-size: clamp(1.6rem, 6.5vw, 2.6rem); }
  .tab-btn { padding: 10px 22px; font-size: 0.85rem; }
  .hitung-row { grid-template-columns: 1fr; gap: 12px; }
  .hitung-btn { width: 100%; }
}

/* === SELECTION & FOCUS === */
::selection { background: rgba(0, 245, 255, 0.25); color: var(--fg); }
button:focus-visible, input:focus-visible { outline: 2px solid var(--neon-cyan); outline-offset: 2px; box-shadow: var(--glow-cyan); }

/* === REDUCED MOTION === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="bg-animated"></div>
<div class="grid-overlay"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="particles" id="particles"></div>
<div id="toast" class="toast">✨ Berhasil!</div>
<div class="auto-update-indicator" id="autoUpdateIndicator">
  <span>🔄</span><span>Auto-Update Aktif</span>
</div>

<div class="main-container">
  <header class="header-section">
    <h1 class="main-title">⚡ PREDIKSI & HITUNG TOGEL ⚡</h1>
  </header>

  <nav class="tabs-container">
    <button class="tab-btn active" data-tab="prediksi">🔮 Prediksi</button>
    <button class="tab-btn" data-tab="hitung">🧮 Hitung</button>
  </nav>

  <div class="content-box">
    <!-- TAB PREDIKSI -->
    <div id="tab-prediksi" class="tab-content">
      <div class="settings-panel">
        <div class="setting-item">
          <span class="setting-label">📅 Tanggal (B1)</span>
          <input type="date" id="input-tanggal" class="input-neon" onchange="autoUpdateTanggal()">
        </div>
        <button class="btn-neon" id="btn-tanggal" onclick="manualUpdateTanggal()">⚡ Update</button>
        <span class="status-badge" id="status-tanggal"></span>
      </div>

      <div class="data-grid">
        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title">🔮 Prediksi</h3>
            <span class="badge-count" id="count-prediksi">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-prediksi" placeholder="🔍 Cari prediksi...">
          </div>
          <div class="section-content" id="list-prediksi">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>

        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title">📅 Jadwal</h3>
            <span class="badge-count" id="count-jadwal">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-jadwal" placeholder="🔍 Cari jadwal...">
          </div>
          <div class="section-content" id="list-jadwal">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>

        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title">🔗 Link Live</h3>
            <span class="badge-count" id="count-link">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-link" placeholder="🔍 Cari link...">
          </div>
          <div class="section-content" id="list-link">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB HITUNG -->
    <div id="tab-hitung" class="tab-content" style="display:none;">
      <div class="settings-panel">
        <div class="setting-item">
          <span class="setting-label">💰 Nominal (X1)</span>
          <input type="number" id="input-nominal" class="input-neon" placeholder="0" onchange="autoUpdateNominal()">
        </div>
        <button class="btn-neon" id="btn-nominal" onclick="manualUpdateNominal()">⚡ Update</button>
        <span class="status-badge" id="status-nominal"></span>
      </div>

      <div class="quantum-card">
        <div class="quantum-card-header">
          <span class="quantum-icon">🧮</span>
          <h3 class="quantum-card-title">Hitung Togel</h3>
        </div>
        <div class="hitung-row">
          <div class="hitung-group">
            <label class="hitung-label">📊 Tipe Hitungan</label>
            <select id="kelompokDropdown" class="quantum-dropdown" onchange="isiDropdownLabel()">
              <option value="">-- Pilih Tipe Hitungan --</option>
            </select>
          </div>
          <div class="hitung-group">
            <label class="hitung-label">🏷️ Pilih Label</label>
            <select id="labelDropdown" class="quantum-dropdown" onchange="tampilkanValueHitungan()">
              <option value="">-- Pilih Label --</option>
            </select>
          </div>
          <button onclick="tampilkanValueHitungan()" class="hitung-btn">🔍 Tampilkan</button>
        </div>
        <div id="detailHitunganDropdown">
          <span style="color: var(--fg-muted);">Silakan pilih tipe dan label hitungan</span>
        </div>
      </div>

      <div class="data-grid" id="container-hitung" style="margin-top: 16px;">
        <div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [] };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'),
  autoUpdate: $('autoUpdateIndicator')
};

// Particles
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  for(let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 25 + 's';
    p.style.animationDuration = (20 + Math.random() * 15) + 's';
    container.appendChild(p);
  }
}

function showToast(msg) {
  dom.toast.textContent = '✨ ' + msg;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 3000);
}

function showAutoUpdate() {
  if (dom.autoUpdate) {
    dom.autoUpdate.classList.add('show');
    setTimeout(() => dom.autoUpdate.classList.remove('show'), 2000);
  }
}

function copyText(text) {
  let finalText = text;
  try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 20 ? finalText.substring(0, 20) + '...' : finalText;
    showToast('📋 Disalin: ' + preview);
  }).catch(() => showToast('❌ Gagal salin'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

function parseCSV(text) {
  let p = [], row = [], entry = "", state = 0;
  for (let i = 0; i < text.length; i++) {
    const char = text[i], next = text[i+1];
    if (state === 0) {
      if (char === '"') state = 1;
      else if (char === ',') { row.push(entry); entry = ""; }
      else if (char === '\r' && next === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (char === '\n' || char === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += char;
    } else if (state === 1) {
      if (char === '"' && next === '"') { entry += '"'; i++; }
      else if (char === '"') state = 0;
      else entry += char;
    }
  }
  if (entry.length > 0 || row.length > 0) { row.push(entry); p.push(row); }
  return p;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try {
    const params = new URLSearchParams({ action, value });
    const response = await fetch(SCRIPT_URL + '?' + params.toString());
    const text = await response.text();
    return text.includes('SUCCESS');
  } catch (e) { console.error("Fetch Error:", e); return false; }
}

async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + new Date().getTime());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          const formatted = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.inTgl.value = formatted; dom.statTgl.textContent = formatted;
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    renderPrediksi();
  } catch (e) {
    console.error("Error Prediksi:", e);
    dom.listP.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:20px;">❌ Gagal memuat data</p>';
  }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + new Date().getTime());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 }, { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 }, { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 }, { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 }, { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    state.hitung = secDef.map(s => {
      let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
      let items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), resVal = safeGet(data[i], 24);
          if (type || resVal) items.push({ type, res: resVal });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    renderHitung();
  } catch (e) {
    console.error("Error Hitung:", e);
    dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:20px;">❌ Gagal memuat data</p>';
  }
}

function renderList(container, items, search) {
  const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!filtered.length) { container.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:20px;">📭 Tidak ada data</p>'; return; }
  container.innerHTML = filtered.map(v => `
    <div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}')">
      <div class="item-label">📋 Judul</div>
      <div class="item-title">${v.title}</div>
      <div class="item-label">💬 Isi (Klik untuk Copy)</div>
      <div class="item-content">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;">📭 Tidak ada data</p>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-box">
      <div class="pasaran-header"><h3 class="pasaran-title">🎯 ${s.title}</h3></div>
      <div class="pasaran-content">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}')">
            <span class="bet-type">${it.type}</span>
            <span class="bet-result">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// === HITUNG TOGEL FUNCTIONS ===
let kelompokData = {};
async function loadCaraHitungTogel() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + new Date().getTime());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "HITUNG HADIAH SEMUA PASARAN" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "HITUNG HADIAH PASARAN TOTO MACAU 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "HITUNG HADIAH PASARAN TOTO MACAU 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "HITUNG HADIAH PASARAN KINGKONG 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "PERHITUNGAN BONUS" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "HITUNG HADIAH PASARAN JAKARTA" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "HITUNG HADIAH PASARAN TOTOMALI" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "HITUNG HADIAH PASARAN HOKIDRAW" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "HITUNG HADIAH PASARAN SYDNEY DAN HONGKONG" }
    ];
    kelompokData = {};
    const dropdown = document.getElementById('kelompokDropdown');
    dropdown.innerHTML = '<option value="">-- Pilih Tipe Hitungan --</option>';
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length > 0) {
        kelompokData[sec.title] = items;
        const opt = document.createElement('option');
        opt.value = sec.title; opt.textContent = sec.title;
        dropdown.appendChild(opt);
      }
    });
  } catch (e) { console.error("Error loadCaraHitungTogel:", e); }
}

function isiDropdownLabel() {
  const selected = document.getElementById('kelompokDropdown').value;
  const labelDropdown = document.getElementById('labelDropdown');
  labelDropdown.innerHTML = '<option value="">-- Pilih Label --</option>';
  if (selected && kelompokData[selected]) {
    kelompokData[selected].forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.label; opt.textContent = item.label;
      labelDropdown.appendChild(opt);
    });
  }
}

function tampilkanValueHitungan() {
  const kelompok = document.getElementById('kelompokDropdown').value;
  const label = document.getElementById('labelDropdown').value;
  const detail = document.getElementById('detailHitunganDropdown');
  if (!kelompok || !label || !kelompokData[kelompok]) {
    detail.innerHTML = '<span style="color: var(--fg-muted);">Silakan pilih tipe dan label</span>';
    return;
  }
  const item = kelompokData[kelompok].find(i => i.label === label);
  if (item) {
    detail.innerHTML = `<span style="font-size: 1.15em; font-weight: 700;">${item.value}</span>`;
    detail.onclick = () => {
      copyText(item.value);
      detail.style.boxShadow = '0 0 25px rgba(0, 255, 157, 0.7)';
      setTimeout(() => detail.style.boxShadow = '', 250);
    };
  }
}

// === AUTO-UPDATE ===
let autoUpdateTimeout = null;
function autoUpdateTanggal() {
  showAutoUpdate();
  clearTimeout(autoUpdateTimeout);
  autoUpdateTimeout = setTimeout(() => manualUpdateTanggal(), 1000);
}
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal dulu!");
  const parts = dom.inTgl.value.split('-');
  const formattedDate = `${parts[1]}/${parts[2]}/${parts[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "⏳ Menyimpan...";
  updateSheet('updateTanggal', formattedDate).then(success => {
    dom.btnTgl.disabled = false;
    if (success) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = "✅ Tersimpan!";
      showToast("📅 Tanggal diupdate!");
      fetchPrediksi(); fetchHitung(); loadCaraHitungTogel();
    } else { dom.statTgl.textContent = "❌ Gagal"; showToast("❌ Cek Script URL"); }
  });
}
function autoUpdateNominal() {
  showAutoUpdate();
  clearTimeout(autoUpdateTimeout);
  autoUpdateTimeout = setTimeout(() => manualUpdateNominal(), 1000);
}
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Isi nominal dulu!");
  dom.btnNom.disabled = true; dom.statNom.textContent = "⏳ Menyimpan...";
  updateSheet('updateNominal', dom.inNom.value).then(success => {
    dom.btnNom.disabled = false;
    if (success) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value);
      showToast("💰 Nominal diupdate!");
      fetchPrediksi(); fetchHitung(); loadCaraHitungTogel();
    } else { dom.statNom.textContent = "❌ Gagal"; showToast("❌ Cek Script URL"); }
  });
}

function init() {
  document.querySelectorAll('.tab-btn').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    t.classList.add('active');
    dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
    dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
  });
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  fetchPrediksi(); fetchHitung(); loadCaraHitungTogel();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  init();
  setTimeout(() => showToast('🚀 Welcome to Neon Cyberpunk Ultra!'), 1200);
});
</script>
</body>
</html>

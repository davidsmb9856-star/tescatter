<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREDIKSI TOGEL CYBER</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
--bg-deep: #020810;
--bg-card: rgba(0, 20, 40, 0.6);
--bg-elevated: rgba(0, 30, 60, 0.5);
--fg: #e8f8ff;
--fg-muted: #6ba3cc;
--neon-blue: #00e5ff;
--neon-bright: #00ffff;
--neon-dark: #0099cc;
--neon-glow: rgba(0, 229, 255, 0.5);
--accent-alt: #00ff88;
--border: rgba(0, 180, 220, 0.3);
--border-active: rgba(0, 229, 255, 0.8);
--glass: rgba(0, 40, 80, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: 'Space Grotesk', sans-serif;
background: var(--bg-deep);
color: var(--fg);
min-height: 100vh;
overflow-x: hidden;
position: relative;
}

/* ========== CYBER BACKGROUND ========== */
.cyber-bg {
position: fixed;
inset: 0;
z-index: -3;
background: 
radial-gradient(ellipse 120% 80% at 50% 0%, rgba(0, 100, 150, 0.15) 0%, transparent 60%),
radial-gradient(ellipse 80% 60% at 80% 100%, rgba(0, 150, 200, 0.1) 0%, transparent 50%),
radial-gradient(ellipse 60% 40% at 10% 80%, rgba(0, 80, 120, 0.12) 0%, transparent 50%),
var(--bg-deep);
}

/* Animated grid */
.cyber-grid {
position: fixed;
inset: 0;
z-index: -2;
background-image:
linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
background-size: 60px 60px;
animation: gridPulse 4s ease-in-out infinite;
}
@keyframes gridPulse {
0%, 100% { opacity: 0.4; }
50% { opacity: 0.7; }
}

/* Glowing orbs */
.orb {
position: fixed;
border-radius: 50%;
filter: blur(80px);
opacity: 0.4;
animation: orbFloat 20s ease-in-out infinite;
pointer-events: none;
z-index: -1;
}
.orb-1 {
width: 500px;
height: 500px;
background: radial-gradient(circle, var(--neon-blue) 0%, transparent 70%);
top: -20%;
left: -10%;
}
.orb-2 {
width: 400px;
height: 400px;
background: radial-gradient(circle, #0066cc 0%, transparent 70%);
bottom: -15%;
right: -5%;
animation-delay: -10s;
}
.orb-3 {
width: 300px;
height: 300px;
background: radial-gradient(circle, var(--accent-alt) 0%, transparent 70%);
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
opacity: 0.2;
animation-delay: -5s;
}
@keyframes orbFloat {
0%, 100% { transform: translate(0, 0) scale(1); }
33% { transform: translate(30px, -20px) scale(1.1); }
66% { transform: translate(-20px, 30px) scale(0.95); }
}

/* Scanline effect */
.scanlines {
position: fixed;
inset: 0;
z-index: 100;
pointer-events: none;
background: repeating-linear-gradient(
0deg,
transparent,
transparent 2px,
rgba(0, 0, 0, 0.03) 2px,
rgba(0, 0, 0, 0.03) 4px
);
}

/* Floating particles */
.particles-container {
position: fixed;
inset: 0;
z-index: -1;
overflow: hidden;
pointer-events: none;
}
.particle {
position: absolute;
width: 2px;
height: 2px;
background: var(--neon-bright);
border-radius: 50%;
box-shadow: 0 0 6px var(--neon-blue), 0 0 12px var(--neon-blue);
animation: particleRise 15s linear infinite;
opacity: 0;
}
@keyframes particleRise {
0% { transform: translateY(100vh) scale(0); opacity: 0; }
10% { opacity: 0.8; }
90% { opacity: 0.8; }
100% { transform: translateY(-100vh) scale(1); opacity: 0; }
}

/* ========== HEADER ========== */
.header {
text-align: center;
padding: 50px 20px 30px;
position: relative;
}
.main-title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(2rem, 6vw, 3.5rem);
font-weight: 900;
letter-spacing: 6px;
background: linear-gradient(135deg, #ffffff 0%, var(--neon-bright) 30%, var(--neon-blue) 60%, var(--neon-dark) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
position: relative;
display: inline-block;
animation: titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow {
0%, 100% { filter: drop-shadow(0 0 20px var(--neon-glow)); }
50% { filter: drop-shadow(0 0 40px var(--neon-glow)); }
}
.main-title::after {
content: '';
position: absolute;
bottom: -15px;
left: 50%;
transform: translateX(-50%);
width: 80%;
height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-bright), var(--neon-blue), transparent);
box-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-glow);
}
.subtitle {
font-family: 'Orbitron', sans-serif;
font-size: 0.85rem;
color: var(--fg-muted);
letter-spacing: 8px;
margin-top: 20px;
text-transform: uppercase;
}

/* ========== TAB NAVIGATION ========== */
.tab-nav {
display: flex;
justify-content: center;
gap: 4px;
padding: 0 20px;
margin-bottom: 30px;
}
.tab-btn {
font-family: 'Orbitron', sans-serif;
font-size: 0.95rem;
font-weight: 700;
letter-spacing: 3px;
padding: 16px 40px;
background: transparent;
border: 2px solid transparent;
color: var(--fg-muted);
cursor: pointer;
position: relative;
overflow: hidden;
transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
}
.tab-btn::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, var(--neon-blue), var(--neon-dark));
opacity: 0;
transition: opacity 0.3s;
}
.tab-btn::after {
content: '';
position: absolute;
bottom: 0;
left: 0;
right: 0;
height: 3px;
background: var(--neon-blue);
transform: scaleX(0);
transition: transform 0.3s;
box-shadow: 0 0 15px var(--neon-blue);
}
.tab-btn:hover {
color: var(--fg);
border-color: var(--border);
background: rgba(0, 40, 80, 0.3);
}
.tab-btn.active {
color: var(--bg-deep);
border-color: var(--neon-blue);
background: linear-gradient(135deg, var(--neon-bright), var(--neon-blue));
text-shadow: none;
box-shadow: 0 0 30px var(--neon-glow), inset 0 0 20px rgba(255,255,255,0.2);
}
.tab-btn.active::after { transform: scaleX(1); }

/* ========== MAIN CONTAINER ========== */
.main-container {
max-width: 1500px;
margin: 0 auto;
padding: 0 20px 50px;
}

/* ========== SETTINGS BAR ========== */
.settings-bar {
background: var(--bg-card);
backdrop-filter: blur(20px);
border: 1px solid var(--border);
border-radius: 16px;
padding: 20px 28px;
margin-bottom: 30px;
display: flex;
flex-wrap: wrap;
gap: 20px;
align-items: center;
position: relative;
overflow: hidden;
}
.settings-bar::before {
content: '';
position: absolute;
top: 0;
left: -100%;
width: 100%;
height: 100%;
background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.05), transparent);
animation: shimmer 4s infinite;
}
@keyframes shimmer {
100% { left: 100%; }
}
.setting-group {
display: flex;
align-items: center;
gap: 14px;
}
.setting-label {
font-family: 'Orbitron', sans-serif;
font-size: 0.7rem;
color: var(--neon-bright);
text-transform: uppercase;
letter-spacing: 2px;
white-space: nowrap;
}
.cyber-input {
padding: 14px 20px;
background: rgba(0, 10, 30, 0.8);
border: 2px solid var(--border);
border-radius: 10px;
color: var(--fg);
font-family: 'Space Grotesk', sans-serif;
font-size: 1rem;
min-width: 180px;
transition: all 0.3s;
}
.cyber-input:focus {
outline: none;
border-color: var(--neon-blue);
box-shadow: 0 0 20px var(--neon-glow), inset 0 0 10px rgba(0, 229, 255, 0.1);
background: rgba(0, 15, 40, 0.9);
}
.cyber-btn {
font-family: 'Orbitron', sans-serif;
font-size: 0.9rem;
font-weight: 700;
letter-spacing: 2px;
padding: 14px 32px;
background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-dark) 100%);
border: none;
border-radius: 10px;
color: var(--bg-deep);
cursor: pointer;
position: relative;
overflow: hidden;
transition: all 0.3s;
box-shadow: 0 4px 20px var(--neon-glow);
}
.cyber-btn::before {
content: '';
position: absolute;
top: 0;
left: -100%;
width: 100%;
height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
transition: left 0.5s;
}
.cyber-btn:hover {
transform: translateY(-3px);
box-shadow: 0 8px 35px var(--neon-glow);
}
.cyber-btn:hover::before { left: 100%; }
.cyber-btn:active { transform: translateY(-1px); }
.status-pill {
font-family: 'Orbitron', sans-serif;
font-size: 0.75rem;
padding: 8px 18px;
background: rgba(0, 229, 255, 0.1);
border: 1px solid var(--neon-blue);
border-radius: 30px;
color: var(--neon-bright);
box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
}

/* ========== CONTENT GRID ========== */
.content-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
gap: 24px;
}

/* ========== SECTION CARD ========== */
.section-card {
background: var(--bg-card);
backdrop-filter: blur(20px);
border: 1px solid var(--border);
border-radius: 20px;
overflow: hidden;
transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
position: relative;
}
.section-card::before {
content: '';
position: absolute;
top: 0;
left: 0;
right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
}
.section-card:hover {
border-color: var(--border-active);
transform: translateY(-5px);
box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 30px var(--neon-glow);
}
.section-header {
padding: 20px 24px;
background: linear-gradient(90deg, rgba(0, 229, 255, 0.1) 0%, transparent 100%);
border-bottom: 1px solid var(--border);
display: flex;
justify-content: space-between;
align-items: center;
position: relative;
}
.section-title {
font-family: 'Orbitron', sans-serif;
font-size: 1.1rem;
font-weight: 700;
letter-spacing: 3px;
color: var(--neon-bright);
text-shadow: 0 0 15px var(--neon-glow);
}
.count-badge {
font-family: 'Orbitron', sans-serif;
font-size: 0.75rem;
padding: 6px 14px;
background: var(--neon-blue);
color: var(--bg-deep);
border-radius: 20px;
font-weight: 700;
box-shadow: 0 0 15px var(--neon-glow);
}
.search-area {
padding: 16px;
border-bottom: 1px solid var(--border);
}
.search-input {
width: 100%;
padding: 14px 18px;
background: rgba(0, 10, 30, 0.6);
border: 1px solid var(--border);
border-radius: 12px;
color: var(--fg);
font-size: 0.95rem;
transition: all 0.3s;
}
.search-input:focus {
outline: none;
border-color: var(--neon-blue);
box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
}
.search-input::placeholder { color: var(--fg-muted); }

/* ========== ITEM LIST ========== */
.item-list {
max-height: 420px;
overflow-y: auto;
padding: 16px;
}
.item-card {
background: var(--bg-elevated);
border: 1px solid var(--border);
border-radius: 14px;
padding: 16px 20px;
margin-bottom: 12px;
cursor: pointer;
transition: all 0.3s;
position: relative;
overflow: hidden;
}
.item-card::before {
content: '';
position: absolute;
left: 0;
top: 0;
bottom: 0;
width: 3px;
background: var(--neon-blue);
transform: scaleY(0);
transition: transform 0.3s;
box-shadow: 0 0 10px var(--neon-blue);
}
.item-card::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(90deg, rgba(0, 229, 255, 0.05) 0%, transparent 50%);
opacity: 0;
transition: opacity 0.3s;
}
.item-card:hover {
border-color: var(--neon-blue);
transform: translateX(8px);
box-shadow: 0 5px 25px rgba(0, 0, 0, 0.3), 0 0 20px rgba(0, 229, 255, 0.15);
}
.item-card:hover::before { transform: scaleY(1); }
.item-card:hover::after { opacity: 1; }
.item-title {
font-weight: 700;
font-size: 0.95rem;
color: var(--fg);
margin-bottom: 8px;
position: relative;
z-index: 1;
}
.item-content {
font-size: 0.85rem;
color: var(--fg-muted);
line-height: 1.6;
position: relative;
z-index: 1;
word-break: break-all;
}

/* ========== HITUNG TAB ========== */
.hitung-container { animation: fadeSlideUp 0.6s ease-out; }
@keyframes fadeSlideUp {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}

/* Type selector cards */
.type-selector { margin-bottom: 30px; }
.selector-title {
font-family: 'Orbitron', sans-serif;
font-size: 0.9rem;
letter-spacing: 4px;
color: var(--fg-muted);
margin-bottom: 18px;
padding-left: 8px;
text-transform: uppercase;
}
.type-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 14px;
}
.type-card {
background: var(--bg-card);
backdrop-filter: blur(15px);
border: 2px solid var(--border);
border-radius: 14px;
padding: 20px 24px;
cursor: pointer;
transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
position: relative;
overflow: hidden;
}
.type-card::before {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(0, 229, 255, 0.1) 0%, transparent 100%);
opacity: 0;
transition: opacity 0.3s;
}
.type-card::after {
content: '';
position: absolute;
bottom: 0;
left: 0;
right: 0;
height: 3px;
background: var(--neon-blue);
transform: scaleX(0);
transition: transform 0.3s;
box-shadow: 0 0 15px var(--neon-blue);
}
.type-card:hover {
border-color: var(--border-active);
transform: translateY(-4px);
box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 25px var(--neon-glow);
}
.type-card:hover::before { opacity: 1; }
.type-card.active {
border-color: var(--neon-blue);
background: rgba(0, 229, 255, 0.08);
box-shadow: 0 0 30px var(--neon-glow), inset 0 0 30px rgba(0, 229, 255, 0.05);
}
.type-card.active::after { transform: scaleX(1); }
.type-card.active .type-check { opacity: 1; transform: scale(1); }
.type-check {
position: absolute;
top: 14px;
right: 16px;
width: 24px;
height: 24px;
background: var(--neon-blue);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
color: var(--bg-deep);
font-weight: bold;
font-size: 0.8rem;
opacity: 0;
transform: scale(0);
transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
box-shadow: 0 0 15px var(--neon-glow);
}
.type-name {
font-family: 'Orbitron', sans-serif;
font-weight: 700;
font-size: 0.85rem;
letter-spacing: 1px;
color: var(--fg);
position: relative;
z-index: 1;
}
.type-count {
font-size: 0.75rem;
color: var(--fg-muted);
margin-top: 6px;
position: relative;
z-index: 1;
}

/* Label selector */
.label-panel {
background: var(--bg-card);
backdrop-filter: blur(20px);
border: 2px solid var(--neon-blue);
border-radius: 20px;
margin-bottom: 30px;
overflow: hidden;
box-shadow: 0 0 40px var(--neon-glow);
}
.label-header {
padding: 20px 28px;
background: linear-gradient(90deg, rgba(0, 229, 255, 0.15) 0%, transparent 100%);
border-bottom: 1px solid var(--border);
display: flex;
justify-content: space-between;
align-items: center;
}
.label-title {
font-family: 'Orbitron', sans-serif;
font-size: 1.1rem;
font-weight: 700;
letter-spacing: 3px;
color: var(--neon-bright);
text-shadow: 0 0 15px var(--neon-glow);
}
.label-list {
max-height: 350px;
overflow-y: auto;
padding: 18px;
}
.label-item {
display: flex;
justify-content: space-between;
align-items: center;
padding: 16px 22px;
background: var(--bg-elevated);
border: 1px solid var(--border);
border-radius: 12px;
margin-bottom: 10px;
cursor: pointer;
transition: all 0.3s;
position: relative;
overflow: hidden;
}
.label-item::before {
content: '';
position: absolute;
left: 0;
top: 0;
bottom: 0;
width: 3px;
background: var(--neon-blue);
transform: scaleY(0);
transition: transform 0.3s;
}
.label-item:hover {
border-color: var(--neon-blue);
transform: translateX(8px);
background: rgba(0, 229, 255, 0.05);
}
.label-item:hover::before { transform: scaleY(1); }
.label-item.active {
border-color: var(--neon-blue);
background: rgba(0, 229, 255, 0.1);
box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
}
.label-item.active::before { transform: scaleY(1); }
.label-text {
font-size: 0.9rem;
color: var(--fg);
position: relative;
z-index: 1;
}
.label-arrow {
color: var(--neon-blue);
opacity: 0.5;
transition: all 0.3s;
}
.label-item:hover .label-arrow {
opacity: 1;
transform: translateX(5px);
}

/* Result display */
.result-panel {
background: linear-gradient(135deg, rgba(0, 40, 80, 0.6) 0%, rgba(0, 20, 50, 0.8) 100%);
backdrop-filter: blur(20px);
border: 3px solid var(--neon-blue);
border-radius: 24px;
padding: 40px;
text-align: center;
margin-bottom: 30px;
position: relative;
overflow: hidden;
box-shadow: 
0 0 60px var(--neon-glow),
inset 0 0 60px rgba(0, 229, 255, 0.05);
animation: resultPulse 3s ease-in-out infinite;
}
@keyframes resultPulse {
0%, 100% { box-shadow: 0 0 60px var(--neon-glow), inset 0 0 60px rgba(0, 229, 255, 0.05); }
50% { box-shadow: 0 0 80px var(--neon-glow), inset 0 0 80px rgba(0, 229, 255, 0.08); }
}
.result-panel::before {
content: '';
position: absolute;
top: -50%;
left: -50%;
width: 200%;
height: 200%;
background: radial-gradient(circle, rgba(0, 229, 255, 0.03) 0%, transparent 50%);
animation: rotateSlow 20s linear infinite;
}
@keyframes rotateSlow { 100% { transform: rotate(360deg); } }
.result-label {
font-family: 'Orbitron', sans-serif;
font-size: 0.8rem;
letter-spacing: 4px;
color: var(--fg-muted);
margin-bottom: 15px;
position: relative;
z-index: 1;
}
.result-value {
font-family: 'Orbitron', sans-serif;
font-size: clamp(2rem, 5vw, 3rem);
font-weight: 900;
letter-spacing: 4px;
color: var(--neon-bright);
text-shadow: 0 0 30px var(--neon-blue), 0 0 60px var(--neon-glow);
position: relative;
z-index: 1;
}
.result-hint {
font-size: 0.8rem;
color: var(--fg-muted);
margin-top: 18px;
position: relative;
z-index: 1;
}

/* Hitung grid */
.hitung-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
gap: 20px;
}
.pasaran-card {
background: var(--bg-card);
backdrop-filter: blur(15px);
border: 1px solid var(--border);
border-radius: 18px;
overflow: hidden;
transition: all 0.4s;
}
.pasaran-card:hover {
border-color: var(--border-active);
transform: translateY(-5px);
box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3), 0 0 25px var(--neon-glow);
}
.pasaran-header {
padding: 18px 24px;
background: linear-gradient(90deg, rgba(0, 229, 255, 0.12) 0%, transparent 100%);
border-bottom: 1px solid var(--border);
}
.pasaran-title {
font-family: 'Orbitron', sans-serif;
font-size: 0.95rem;
font-weight: 700;
letter-spacing: 2px;
color: var(--neon-bright);
text-shadow: 0 0 10px var(--neon-glow);
}
.pasaran-content {
max-height: 320px;
overflow-y: auto;
padding: 14px;
}
.bet-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 14px 18px;
background: var(--bg-elevated);
border: 1px solid var(--border);
border-radius: 10px;
margin-bottom: 10px;
cursor: pointer;
transition: all 0.3s;
}
.bet-row:hover {
border-color: var(--neon-blue);
transform: translateX(6px);
background: rgba(0, 229, 255, 0.05);
box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
}
.bet-type {
font-size: 0.85rem;
color: var(--fg);
flex: 1;
}
.bet-value {
font-family: 'Orbitron', sans-serif;
font-size: 0.9rem;
font-weight: 700;
color: var(--neon-bright);
background: rgba(0, 229, 255, 0.15);
padding: 6px 14px;
border-radius: 8px;
border: 1px solid rgba(0, 229, 255, 0.3);
box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
}

/* ========== TOAST ========== */
.toast {
position: fixed;
bottom: 30px;
left: 50%;
transform: translateX(-50%) translateY(120px);
background: var(--bg-card);
backdrop-filter: blur(20px);
border: 2px solid var(--neon-blue);
color: var(--fg);
padding: 18px 36px;
border-radius: 50px;
font-weight: 600;
opacity: 0;
transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
z-index: 1000;
box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4), 0 0 30px var(--neon-glow);
}
.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}

/* ========== SPINNER ========== */
.spinner {
width: 50px;
height: 50px;
border: 3px solid var(--border);
border-top-color: var(--neon-blue);
border-radius: 50%;
animation: spin 0.8s linear infinite;
box-shadow: 0 0 20px var(--neon-glow);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: rgba(0, 10, 30, 0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb { 
background: linear-gradient(180deg, var(--neon-bright), var(--neon-blue)); 
border-radius: 3px;
box-shadow: 0 0 10px var(--neon-glow);
}
::-webkit-scrollbar-thumb:hover { background: var(--neon-bright); }

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
.settings-bar { flex-direction: column; align-items: stretch; gap: 16px; }
.setting-group { width: 100%; flex-direction: column; align-items: stretch; }
.cyber-input { width: 100%; min-width: unset; }
.cyber-btn { width: 100%; }
.type-grid { grid-template-columns: 1fr; }
.hitung-grid { grid-template-columns: 1fr; }
.content-grid { grid-template-columns: 1fr; }
.tab-btn { padding: 14px 30px; font-size: 0.85rem; }
.main-title { letter-spacing: 3px; }
}
@media (prefers-reduced-motion: reduce) {
*, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="cyber-bg"></div>
<div class="cyber-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="scanlines"></div>
<div class="particles-container" id="particles"></div>
<div id="toast" class="toast"></div>

<div class="header">
<h1 class="main-title">PREDIKSI TOGEL</h1>
<p class="subtitle">Cyber Prediction System</p>
</div>

<nav class="tab-nav">
<button class="tab-btn active" data-tab="prediksi">PREDIKSI</button>
<button class="tab-btn" data-tab="hitung">HITUNG</button>
</nav>

<div class="main-container">
<!-- PREDIKSI TAB -->
<div id="tab-prediksi" class="tab-content">
<div class="settings-bar">
<div class="setting-group">
<span class="setting-label">Tanggal</span>
<input type="date" id="input-tanggal" class="cyber-input">
</div>
<button class="cyber-btn" id="btn-tanggal" onclick="manualUpdateTanggal()">UPDATE</button>
<span class="status-pill" id="status-tanggal">--</span>
</div>

<div class="content-grid">
<div class="section-card">
<div class="section-header">
<h3 class="section-title">PREDIKSI</h3>
<span class="count-badge" id="count-prediksi">0</span>
</div>
<div class="search-area">
<input type="text" class="search-input" id="search-prediksi" placeholder="Cari prediksi...">
</div>
<div class="item-list" id="list-prediksi">
<div style="display:flex;justify-content:center;padding:50px;"><div class="spinner"></div></div>
</div>
</div>

<div class="section-card">
<div class="section-header">
<h3 class="section-title">JADWAL</h3>
<span class="count-badge" id="count-jadwal">0</span>
</div>
<div class="search-area">
<input type="text" class="search-input" id="search-jadwal" placeholder="Cari jadwal...">
</div>
<div class="item-list" id="list-jadwal">
<div style="display:flex;justify-content:center;padding:50px;"><div class="spinner"></div></div>
</div>
</div>

<div class="section-card">
<div class="section-header">
<h3 class="section-title">LINK LIVE</h3>
<span class="count-badge" id="count-link">0</span>
</div>
<div class="search-area">
<input type="text" class="search-input" id="search-link" placeholder="Cari link...">
</div>
<div class="item-list" id="list-link">
<div style="display:flex;justify-content:center;padding:50px;"><div class="spinner"></div></div>
</div>
</div>
</div>
</div>

<!-- HITUNG TAB -->
<div id="tab-hitung" class="tab-content" style="display:none;">
<div class="hitung-container">
<div class="settings-bar">
<div class="setting-group">
<span class="setting-label">Nominal</span>
<input type="number" id="input-nominal" class="cyber-input" placeholder="0">
</div>
<button class="cyber-btn" id="btn-nominal" onclick="manualUpdateNominal()">UPDATE</button>
<span class="status-pill" id="status-nominal">--</span>
</div>

<div class="type-selector">
<h4 class="selector-title">Pilih Tipe Hitungan</h4>
<div class="type-grid" id="type-grid">
<div style="display:flex;justify-content:center;padding:50px;width:100%;"><div class="spinner"></div></div>
</div>
</div>

<div class="label-panel" id="label-panel" style="display:none;">
<div class="label-header">
<h4 class="label-title">Pilih Label</h4>
<span class="count-badge" id="label-count">0</span>
</div>
<div class="label-list" id="label-list"></div>
</div>

<div class="result-panel" id="result-panel" style="display:none;">
<div class="result-label">HASIL HITUNGAN</div>
<div class="result-value" id="result-value">--</div>
<div class="result-hint">Klik untuk menyalin nilai</div>
</div>

<div class="hitung-grid" id="hitung-grid">
<div style="display:flex;justify-content:center;padding:50px;width:100%;"><div class="spinner"></div></div>
</div>
</div>
</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec';
const CONFIG = {
sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'
};

const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompokData: {} };
let selectedType = null;
let selectedLabel = null;

const $ = id => document.getElementById(id);
const dom = {
tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
contH: $('hitung-grid'), toast: $('toast'),
typeGrid: $('type-grid'), labelPanel: $('label-panel'),
labelList: $('label-list'), labelCount: $('label-count'),
resultPanel: $('result-panel'), resultValue: $('result-value'),
particles: $('particles')
};

// Create particles
function createParticles() {
for (let i = 0; i < 40; i++) {
const p = document.createElement('div');
p.className = 'particle';
p.style.left = Math.random() * 100 + '%';
p.style.animationDelay = Math.random() * 15 + 's';
p.style.animationDuration = (12 + Math.random() * 10) + 's';
dom.particles.appendChild(p);
}
}

function showToast(msg) {
dom.toast.textContent = msg;
dom.toast.classList.add('show');
setTimeout(() => dom.toast.classList.remove('show'), 3000);
}

function copyText(text) {
let finalText = text;
try { finalText = decodeURIComponent(text); } catch(e) {}
navigator.clipboard.writeText(finalText).then(() => {
const preview = finalText.length > 25 ? finalText.substring(0, 25) + '...' : finalText;
showToast('Disalin: ' + preview);
}).catch(() => showToast('Gagal menyalin'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

function parseCSV(text) {
let p = [], row = [], entry = "", state = 0;
for (let i = 0; i < text.length; i++) {
const char = text[i], next = text[i+1];
if (state === 0) {
if (char === '"') state = 1;
else if (char === ',') { row.push(entry); entry = ""; }
else if (char === '\r' && next === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
else if (char === '\n' || char === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
else entry += char;
} else if (state === 1) {
if (char === '"' && next === '"') { entry += '"'; i++; }
else if (char === '"') state = 0;
else entry += char;
}
}
if (entry.length > 0 || row.length > 0) { row.push(entry); p.push(row); }
return p;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

async function updateSheet(action, value) {
try {
const params = new URLSearchParams({ action, value });
const response = await fetch(SCRIPT_URL + '?' + params.toString());
const text = await response.text();
return text.includes('SUCCESS');
} catch (e) { return false; }
}

async function fetchPrediksi() {
try {
const res = await fetch(CONFIG.sheetPrediksi + '&t=' + new Date().getTime());
const data = parseCSV(await res.text());
state.prediksi = []; state.jadwal = []; state.link = [];

if (data[0]) {
const raw = safeGet(data[0], 1);
if (raw) {
const p = raw.split('/');
if (p.length === 3) {
const formatted = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
dom.inTgl.value = formatted;
dom.statTgl.textContent = formatted;
}
}
}

for (let i = 2; i <= 84 && i < data.length; i++) {
const txt = safeGet(data[i], 1);
if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
for (let i = 2; i <= 55 && i < data.length; i++) {
const txt = safeGet(data[i], 2);
if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
for (let i = 56; i <= 82 && i < data.length; i++) {
const txt = safeGet(data[i], 2);
if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
renderPrediksi();
} catch (e) {
dom.listP.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:30px;">Gagal memuat data</p>';
}
}

async function fetchHitung() {
try {
const res = await fetch(CONFIG.sheetHitung + '&t=' + new Date().getTime());
const data = parseCSV(await res.text());

if (data[0]) {
const nom = safeGet(data[0], 23);
if (nom) {
dom.inNom.value = nom;
dom.statNom.textContent = "Rp " + formatNum(nom);
}
}

const secDef = [
{ tRow: 0, tCol: 24, start: 2, end: 42 },
{ tRow: 43, tCol: 24, start: 45, end: 80 },
{ tRow: 81, tCol: 24, start: 83, end: 119 },
{ tRow: 120, tCol: 24, start: 122, end: 153 },
{ tRow: 154, tCol: 24, start: 156, end: 179 },
{ tRow: 180, tCol: 24, start: 182, end: 213 },
{ tRow: 215, tCol: 24, start: 217, end: 248 },
{ tRow: 249, tCol: 24, start: 251, end: 282 },
{ tRow: 283, tCol: 24, start: 285, end: 316 }
];

state.hitung = secDef.map(s => {
let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
let items = [];
for (let i = s.start; i <= s.end && i < data.length; i++) {
if (data[i]) {
const type = safeGet(data[i], 23);
const resVal = safeGet(data[i], 24);
if (type || resVal) items.push({ type, res: resVal });
}
}
return { title, items };
}).filter(s => s.items.length > 0);

renderHitung();
loadTypeCards(data);
} catch (e) {
dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:30px;">Gagal memuat data</p>';
}
}

function loadTypeCards(data) {
const secDef = [
{ tRow: 0, tCol: 24, start: 2, end: 42, title: "HITUNG HADIAH SEMUA PASARAN" },
{ tRow: 43, tCol: 24, start: 45, end: 80, title: "HITUNG HADIAH TOTO MACAU 4D" },
{ tRow: 81, tCol: 24, start: 83, end: 119, title: "HITUNG HADIAH TOTO MACAU 5D" },
{ tRow: 120, tCol: 24, start: 122, end: 153, title: "HITUNG HADIAH KINGKONG 4D" },
{ tRow: 154, tCol: 24, start: 156, end: 179, title: "PERHITUNGAN BONUS" },
{ tRow: 180, tCol: 24, start: 182, end: 213, title: "HITUNG HADIAH JAKARTA" },
{ tRow: 215, tCol: 24, start: 217, end: 248, title: "HITUNG HADIAH TOTOMALI" },
{ tRow: 249, tCol: 24, start: 251, end: 282, title: "HITUNG HADIAH HOKIDRAW" },
{ tRow: 283, tCol: 24, start: 285, end: 316, title: "HITUNG HADIAH SYDNEY HONGKONG" }
];

state.kelompokData = {};
secDef.forEach(sec => {
const items = [];
for (let i = sec.start; i <= sec.end && i < data.length; i++) {
if (data[i]) {
const label = safeGet(data[i], 23);
const value = safeGet(data[i], 24);
if (label || value) items.push({ label: label || "-", value: value || "-" });
}
}
if (items.length > 0) state.kelompokData[sec.title] = items;
});

renderTypeCards();
}

function renderTypeCards() {
const types = Object.keys(state.kelompokData);
dom.typeGrid.innerHTML = types.map(type => `
<div class="type-card" onclick="selectType('${type}')">
<div class="type-check">&#10003;</div>
<div class="type-name">${type}</div>
<div class="type-count">${state.kelompokData[type].length} item tersedia</div>
</div>
`).join('');
}

function selectType(type) {
selectedType = type;
selectedLabel = null;
dom.resultPanel.style.display = 'none';

document.querySelectorAll('.type-card').forEach(card => {
card.classList.toggle('active', card.querySelector('.type-name').textContent === type);
});

dom.labelPanel.style.display = 'block';
dom.labelCount.textContent = state.kelompokData[type].length;

dom.labelList.innerHTML = state.kelompokData[type].map((item, idx) => `
<div class="label-item" onclick="selectLabel(${idx})">
<span class="label-text">${item.label}</span>
<span class="label-arrow">&#10140;</span>
</div>
`).join('');
}

function selectLabel(idx) {
if (!selectedType) return;
selectedLabel = idx;

document.querySelectorAll('.label-item').forEach((item, i) => {
item.classList.toggle('active', i === idx);
});

const item = state.kelompokData[selectedType][idx];
dom.resultPanel.style.display = 'block';
dom.resultValue.textContent = item.value;

dom.resultPanel.onclick = () => copyText(item.value);
}

function renderList(container, items, search) {
const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
if (!filtered.length) {
container.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:30px;">Tidak ada data</p>';
return;
}
container.innerHTML = filtered.map(v => `
<div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}')">
<div class="item-title">${v.title}</div>
<div class="item-content">${v.content}</div>
</div>
`).join('');
}

function renderPrediksi() {
renderList(dom.listP, state.prediksi, dom.srcP.value);
renderList(dom.listJ, state.jadwal, dom.srcJ.value);
renderList(dom.listL, state.link, dom.srcL.value);
dom.cntP.textContent = state.prediksi.length;
dom.cntJ.textContent = state.jadwal.length;
dom.cntL.textContent = state.link.length;
}

function renderHitung() {
if (!state.hitung.length) {
dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;">Tidak ada data</p>';
return;
}
dom.contH.innerHTML = state.hitung.map(s => `
<div class="pasaran-card">
<div class="pasaran-header"><h4 class="pasaran-title">${s.title}</h4></div>
<div class="pasaran-content">
 ${s.items.map(it => `
<div class="bet-row" onclick="copyText('${encodeURIComponent(it.res)}')">
<span class="bet-type">${it.type}</span>
<span class="bet-value">${it.res}</span>
</div>
`).join('')}
</div>
</div>
`).join('');
}

function manualUpdateTanggal() {
if (!dom.inTgl.value) return showToast("Pilih tanggal dulu!");
const parts = dom.inTgl.value.split('-');
const formattedDate = `${parts[1]}/${parts[2]}/${parts[0]}`;
dom.btnTgl.disabled = true;
dom.statTgl.textContent = "Menyimpan...";

updateSheet('updateTanggal', formattedDate).then(success => {
dom.btnTgl.disabled = false;
if (success) {
dom.statTgl.textContent = "Tersimpan!";
showToast("Tanggal berhasil diupdate!");
fetchPrediksi();
fetchHitung();
} else {
dom.statTgl.textContent = "Gagal";
showToast("Gagal update");
}
});
}

function manualUpdateNominal() {
if (!dom.inNom.value) return showToast("Isi nominal dulu!");
dom.btnNom.disabled = true;
dom.statNom.textContent = "Menyimpan...";

updateSheet('updateNominal', dom.inNom.value).then(success => {
dom.btnNom.disabled = false;
if (success) {
dom.statNom.textContent = "Rp " + formatNum(dom.inNom.value);
showToast("Nominal berhasil diupdate!");
fetchPrediksi();
fetchHitung();
} else {
dom.statNom.textContent = "Gagal";
showToast("Gagal update");
}
});
}

function init() {
createParticles();

document.querySelectorAll('.tab-btn').forEach(t => t.onclick = () => {
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
t.classList.add('active');
dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
});

dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);

fetchPrediksi();
fetchHitung();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

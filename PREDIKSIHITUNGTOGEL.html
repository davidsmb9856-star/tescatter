<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDIKSI DAN HITUNG TOGEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #010810;
            --bg-secondary: #051525;
            --fg: #e0f4ff;
            --muted: #5a8cb0;
            --accent: #00e5ff;
            --accent-dark: #0099cc;
            --border: #0a4d75;
            --card: #061a2c;
            --success: #00ff88;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-cyber {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-cyber::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 153, 204, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 100, 150, 0.04) 0%, transparent 70%);
            animation: bgPulse 15s ease-in-out infinite;
        }

        .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: floatOrb 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #0066ff;
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: #00ccaa;
            top: 50%;
            left: 50%;
            animation-delay: -10s;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, 50px) scale(1.1); }
            50% { transform: translate(100px, -30px) scale(0.9); }
            75% { transform: translate(-30px, 70px) scale(1.05); }
        }

        /* Typography */
        .font-cyber {
            font-family: 'Orbitron', sans-serif;
        }

        .text-glow {
            text-shadow: 
                0 0 10px var(--accent),
                0 0 20px var(--accent),
                0 0 40px rgba(0, 229, 255, 0.5);
        }

        .text-glow-sm {
            text-shadow: 
                0 0 5px var(--accent),
                0 0 10px rgba(0, 229, 255, 0.5);
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header-section {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 20px;
        }

        .main-title {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 50%, #00aaff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShine 3s ease-in-out infinite;
        }

        @keyframes titleShine {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.95rem;
            letter-spacing: 2px;
        }

        /* Tabs */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 0;
            position: relative;
            z-index: 20;
        }

        .tab-btn {
            padding: 16px 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--muted);
            background: rgba(5, 21, 37, 0.6);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 16px 16px 0 0;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .tab-btn:hover::before {
            left: 100%;
        }

        .tab-btn:hover {
            color: var(--fg);
            background: rgba(5, 21, 37, 0.9);
        }

        .tab-btn.active {
            color: var(--accent);
            background: var(--bg-secondary);
            border-color: var(--accent);
            box-shadow: 0 -5px 20px rgba(0, 229, 255, 0.2);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        /* Content Box */
        .content-box {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, rgba(5, 21, 37, 0.8) 100%);
            border: 1px solid var(--border);
            border-radius: 0 0 20px 20px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .content-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        /* Settings Panel */
        .settings-panel {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
        }

        .setting-group {
            flex: 1;
            min-width: 250px;
        }

        .setting-label {
            display: block;
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--fg);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        .input-field::placeholder {
            color: var(--muted);
            opacity: 0.6;
        }

        .btn-save {
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            border: none;
            border-radius: 10px;
            color: var(--bg);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 25px rgba(0, 229, 255, 0.3);
            white-space: nowrap;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(0, 229, 255, 0.4);
        }

        .btn-save:active {
            transform: scale(0.98);
        }

        .saved-value {
            margin-top: 10px;
            padding: 10px 16px;
            background: rgba(0, 229, 255, 0.1);
            border-radius: 8px;
            border-left: 3px solid var(--accent);
        }

        .saved-value span {
            color: var(--accent);
            font-weight: 600;
        }

        /* Grid Layout */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        /* Section Box */
        .section-box {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            height: fit-content;
        }

        .section-box:hover {
            border-color: rgba(0, 229, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .section-header {
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.15) 0%, rgba(0, 0, 0, 0) 100%);
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .badge-count {
            background: rgba(0, 229, 255, 0.15);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        .search-box {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(10, 77, 117, 0.5);
            border-radius: 8px;
            color: var(--fg);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .section-content {
            padding: 14px;
            max-height: 450px;
            overflow-y: auto;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Item Card */
        .item-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(10, 77, 117, 0.4);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .item-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.1), transparent);
            transition: left 0.4s ease;
        }

        .item-card:hover {
            border-color: var(--accent);
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0, 229, 255, 0.1);
        }

        .item-card:hover::before {
            left: 100%;
        }

        .item-card:active {
            transform: scale(0.98);
        }

        .item-label {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .item-title {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        .item-content {
            font-size: 0.85rem;
            color: var(--fg);
            line-height: 1.5;
            word-break: break-all;
        }

        /* Pasaran Box (Hitung) */
        .pasaran-box {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .pasaran-box:hover {
            border-color: rgba(0, 229, 255, 0.5);
        }

        .pasaran-header {
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.2) 0%, transparent 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .pasaran-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--accent);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .pasaran-content {
            padding: 12px;
            max-height: 350px;
            overflow-y: auto;
        }

        .bet-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(10, 77, 117, 0.3);
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .bet-item:hover {
            border-color: var(--accent);
            background: rgba(0, 229, 255, 0.05);
        }

        .bet-item:active {
            transform: scale(0.98);
        }

        .bet-type {
            color: var(--fg);
            font-size: 0.85rem;
            flex: 1;
        }

        .bet-result {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--accent);
            font-size: 0.9rem;
            padding: 4px 12px;
            background: rgba(0, 229, 255, 0.1);
            border-radius: 6px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: var(--bg);
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 229, 255, 0.4);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Loading */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
        }

        .empty-msg {
            color: var(--muted);
            text-align: center;
            padding: 20px;
            font-style: italic;
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                padding: 10px;
            }
            
            .tab-btn {
                padding: 12px 24px;
                font-size: 0.85rem;
            }
            
            .content-box {
                padding: 16px;
            }
            
            .settings-panel {
                flex-direction: column;
            }
            
            .setting-group {
                width: 100%;
            }
            
            .data-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-cyber">
        <div class="grid-lines"></div>
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">Berhasil disalin!</div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Header -->
        <header class="header-section">
            <h1 class="main-title font-cyber">PREDIKSI DAN HITUNG TOGEL</h1>
            <p class="subtitle">SISTEM DATA REAL-TIME</p>
        </header>

        <!-- Tabs -->
        <nav class="tabs-container">
            <button class="tab-btn active" data-tab="prediksi">PREDIKSI TOGEL</button>
            <button class="tab-btn" data-tab="hitung">HITUNG TOGEL</button>
        </nav>

        <!-- Content Box -->
        <div class="content-box">
            <!-- Tab Prediksi -->
            <div id="tab-prediksi" class="tab-content">
                <!-- Settings -->
                <div class="settings-panel">
                    <div class="setting-group">
                        <label class="setting-label">Tanggal Prediksi</label>
                        <input type="date" id="input-tanggal" class="input-field">
                    </div>
                    <button class="btn-save" id="btn-simpan-tanggal">SIMPAN TANGGAL</button>
                    <div class="saved-value" id="display-tanggal" style="display:none;">
                        Tersimpan: <span id="val-tanggal"></span>
                    </div>
                </div>

                <!-- Data Grid -->
                <div class="data-grid">
                    <!-- Prediksi Togel -->
                    <div class="section-box">
                        <div class="section-header">
                            <h3 class="section-title">PREDIKSI TOGEL</h3>
                            <span class="badge-count" id="count-prediksi">0</span>
                        </div>
                        <div class="search-box">
                            <input type="text" class="search-input" id="search-prediksi" placeholder="Cari prediksi...">
                        </div>
                        <div class="section-content" id="list-prediksi">
                            <div class="loading-spinner"><div class="spinner"></div></div>
                        </div>
                    </div>

                    <!-- Jadwal Pasaran -->
                    <div class="section-box">
                        <div class="section-header">
                            <h3 class="section-title">JADWAL PASARAN TOGEL</h3>
                            <span class="badge-count" id="count-jadwal">0</span>
                        </div>
                        <div class="search-box">
                            <input type="text" class="search-input" id="search-jadwal" placeholder="Cari jadwal...">
                        </div>
                        <div class="section-content" id="list-jadwal">
                            <div class="loading-spinner"><div class="spinner"></div></div>
                        </div>
                    </div>

                    <!-- Link Live -->
                    <div class="section-box">
                        <div class="section-header">
                            <h3 class="section-title">LINK LIVE PASARAN TOGEL</h3>
                            <span class="badge-count" id="count-link">0</span>
                        </div>
                        <div class="search-box">
                            <input type="text" class="search-input" id="search-link" placeholder="Cari link...">
                        </div>
                        <div class="section-content" id="list-link">
                            <div class="loading-spinner"><div class="spinner"></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab Hitung -->
            <div id="tab-hitung" class="tab-content" style="display: none;">
                <!-- Settings -->
                <div class="settings-panel">
                    <div class="setting-group">
                        <label class="setting-label">Nominal Hitung</label>
                        <input type="number" id="input-nominal" class="input-field" placeholder="Masukkan nominal...">
                    </div>
                    <button class="btn-save" id="btn-simpan-nominal">SIMPAN NOMINAL</button>
                    <div class="saved-value" id="display-nominal" style="display:none;">
                        Nominal: <span id="val-nominal"></span>
                    </div>
                </div>

                <!-- Pasaran Grid -->
                <div class="data-grid" id="container-hitung">
                    <div class="loading-spinner"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ CONFIGURATION ============
        const CONFIG = {
            sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
            sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810',
            storageKeyTanggal: 'togel_tanggal_v3',
            storageKeyNominal: 'togel_nominal_v3'
        };

        // ============ STATE ============
        const stateData = {
            prediksi: [],
            jadwal: [],
            link: [],
            hitung: []
        };

        // ============ DOM ELEMENTS ============
        const dom = {
            tabs: document.querySelectorAll('.tab-btn'),
            tabPrediksi: document.getElementById('tab-prediksi'),
            tabHitung: document.getElementById('tab-hitung'),
            inputTanggal: document.getElementById('input-tanggal'),
            btnSimpanTanggal: document.getElementById('btn-simpan-tanggal'),
            displayTanggal: document.getElementById('display-tanggal'),
            valTanggal: document.getElementById('val-tanggal'),
            inputNominal: document.getElementById('input-nominal'),
            btnSimpanNominal: document.getElementById('btn-simpan-nominal'),
            displayNominal: document.getElementById('display-nominal'),
            valNominal: document.getElementById('val-nominal'),
            searchPrediksi: document.getElementById('search-prediksi'),
            searchJadwal: document.getElementById('search-jadwal'),
            searchLink: document.getElementById('search-link'),
            listPrediksi: document.getElementById('list-prediksi'),
            listJadwal: document.getElementById('list-jadwal'),
            listLink: document.getElementById('list-link'),
            countPrediksi: document.getElementById('count-prediksi'),
            countJadwal: document.getElementById('count-jadwal'),
            countLink: document.getElementById('count-link'),
            containerHitung: document.getElementById('container-hitung'),
            toast: document.getElementById('toast')
        };

        // ============ UTILITIES ============
        function showToast(message) {
            dom.toast.textContent = message;
            dom.toast.classList.add('show');
            setTimeout(() => dom.toast.classList.remove('show'), 2500);
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const shortText = text.length > 25 ? text.substring(0, 25) + '...' : text;
                showToast('Disalin: ' + shortText);
            }).catch(() => {
                showToast('Gagal menyalin');
            });
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('id-ID').format(num);
        }

        // ============ CSV PARSER ============
        function parseCSV(csvText) {
            const rows = [];
            let currentRow = [];
            let currentCell = '';
            let inQuotes = false;

            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentCell += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentCell.trim());
                    currentCell = '';
                } else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !inQuotes) {
                    currentRow.push(currentCell.trim());
                    rows.push(currentRow);
                    currentRow = [];
                    currentCell = '';
                    if (char === '\r') i++;
                } else if (char === '\r' && !inQuotes) {
                    currentRow.push(currentCell.trim());
                    rows.push(currentRow);
                    currentRow = [];
                    currentCell = '';
                } else {
                    currentCell += char;
                }
            }

            if (currentCell || currentRow.length) {
                currentRow.push(currentCell.trim());
                rows.push(currentRow);
            }

            return rows;
        }

        function safeGet(row, index) {
            if (row && row[index] !== undefined) {
                return row[index].trim();
            }
            return '';
        }

        // ============ DATA FETCHING ============
        async function fetchPrediksiData() {
            try {
                const response = await fetch(CONFIG.sheetPrediksi);
                const csvText = await response.text();
                const data = parseCSV(csvText);

                stateData.prediksi = [];
                stateData.jadwal = [];
                stateData.link = [];

                // B1 - Tanggal
                if (data[0]) {
                    const savedTanggal = localStorage.getItem(CONFIG.storageKeyTanggal);
                    if (!savedTanggal) {
                        const rawDate = safeGet(data[0], 1);
                        if (rawDate) {
                            // Format MM/DD/YYYY to YYYY-MM-DD
                            const parts = rawDate.split('/');
                            if (parts.length === 3) {
                                const formatted = parts[2] + '-' + parts[0].padStart(2, '0') + '-' + parts[1].padStart(2, '0');
                                dom.inputTanggal.value = formatted;
                            }
                        }
                    }
                }

                // B3:B85 - Prediksi Togel
                for (let i = 2; i <= 84 && i < data.length; i++) {
                    const content = safeGet(data[i], 1);
                    if (content) {
                        const title = content.split(/[\s,]+/)[0];
                        stateData.prediksi.push({ title, content });
                    }
                }

                // C3:C56 - Jadwal Pasaran
                for (let i = 2; i <= 55 && i < data.length; i++) {
                    const content = safeGet(data[i], 2);
                    if (content) {
                        const title = content.split(/[\s,]+/)[0];
                        stateData.jadwal.push({ title, content });
                    }
                }

                // C57:C83 - Link Live
                for (let i = 56; i <= 82 && i < data.length; i++) {
                    const content = safeGet(data[i], 2);
                    if (content) {
                        const title = content.split(/[\s,]+/)[0];
                        stateData.link.push({ title, content });
                    }
                }

                renderPrediksiLists();
            } catch (error) {
                console.error('Error fetching prediksi:', error);
                dom.listPrediksi.innerHTML = '<p class="error-msg">Gagal memuat data prediksi</p>';
                dom.listJadwal.innerHTML = '<p class="error-msg">Gagal memuat data jadwal</p>';
                dom.listLink.innerHTML = '<p class="error-msg">Gagal memuat data link</p>';
            }
        }

        async function fetchHitungData() {
            try {
                const response = await fetch(CONFIG.sheetHitung);
                const csvText = await response.text();
                const data = parseCSV(csvText);

                // X1 - Nominal
                if (data[0]) {
                    const savedNominal = localStorage.getItem(CONFIG.storageKeyNominal);
                    if (!savedNominal) {
                        const nominal = safeGet(data[0], 23);
                        if (nominal) {
                            dom.inputNominal.value = nominal;
                        }
                    }
                }

                // Sections Configuration
                const sections = [
                    { titleRow: 0, titleCol: 24, startRow: 2, endRow: 42 },
                    { titleRow: 43, titleCol: 24, startRow: 45, endRow: 80 },
                    { titleRow: 81, titleCol: 24, startRow: 83, endRow: 119 },
                    { titleRow: 120, titleCol: 24, startRow: 122, endRow: 153 },
                    { titleRow: 154, titleCol: 24, startRow: 156, endRow: 179 },
                    { titleRow: 180, titleCol: 24, startRow: 182, endRow: 213 },
                    { titleRow: 215, titleCol: 24, startRow: 217, endRow: 248 },
                    { titleRow: 249, titleCol: 24, startRow: 251, endRow: 282 },
                    { titleRow: 283, titleCol: 24, startRow: 285, endRow: 316 }
                ];

                stateData.hitung = sections.map(section => {
                    let title = 'PASARAN';
                    if (data[section.titleRow]) {
                        const t = safeGet(data[section.titleRow], section.titleCol);
                        if (t) title = t;
                    }

                    const items = [];
                    for (let i = section.startRow; i <= section.endRow && i < data.length; i++) {
                        if (data[i]) {
                            const betType = safeGet(data[i], 23); // Column X
                            const result = safeGet(data[i], 24); // Column Y
                            if (betType || result) {
                                items.push({ betType, result });
                            }
                        }
                    }

                    return { title, items };
                }).filter(s => s.items.length > 0);

                renderHitungSections();
            } catch (error) {
                console.error('Error fetching hitung:', error);
                dom.containerHitung.innerHTML = '<p class="error-msg">Gagal memuat data hitung</p>';
            }
        }

        // ============ RENDERING ============
        function renderItem(container, items, searchTerm) {
            const filtered = items.filter(item =>
                item.content.toLowerCase().includes(searchTerm.toLowerCase()) ||
                item.title.toLowerCase().includes(searchTerm.toLowerCase())
            );

            if (filtered.length === 0) {
                container.innerHTML = '<p class="empty-msg">Tidak ada data ditemukan</p>';
                return;
            }

            container.innerHTML = filtered.map((item, idx) => `
                <div class="item-card fade-in" style="animation-delay: ${idx * 30}ms" onclick="copyText('${encodeURIComponent(item.content)}')">
                    <div class="item-label">Judul</div>
                    <div class="item-title">${item.title}</div>
                    <div class="item-label">Klik untuk salin</div>
                    <div class="item-content">${item.content}</div>
                </div>
            `).join('');
        }

        function renderPrediksiLists() {
            renderItem(dom.listPrediksi, stateData.prediksi, dom.searchPrediksi.value);
            renderItem(dom.listJadwal, stateData.jadwal, dom.searchJadwal.value);
            renderItem(dom.listLink, stateData.link, dom.searchLink.value);

            dom.countPrediksi.textContent = stateData.prediksi.length;
            dom.countJadwal.textContent = stateData.jadwal.length;
            dom.countLink.textContent = stateData.link.length;
        }

        function renderHitungSections() {
            if (stateData.hitung.length === 0) {
                dom.containerHitung.innerHTML = '<p class="empty-msg">Tidak ada data pasaran</p>';
                return;
            }

            dom.containerHitung.innerHTML = stateData.hitung.map((section, idx) => `
                <div class="pasaran-box fade-in" style="animation-delay: ${idx * 50}ms">
                    <div class="pasaran-header">
                        <h3 class="pasaran-title">${section.title}</h3>
                    </div>
                    <div class="pasaran-content">
                        ${section.items.map(item => `
                            <div class="bet-item" onclick="copyText('${encodeURIComponent(item.result)}')">
                                <span class="bet-type">${item.betType}</span>
                                <span class="bet-result">${item.result}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // ============ EVENT HANDLERS ============
        function initTabs() {
            dom.tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    dom.tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    const tabName = tab.dataset.tab;
                    dom.tabPrediksi.style.display = tabName === 'prediksi' ? 'block' : 'none';
                    dom.tabHitung.style.display = tabName === 'hitung' ? 'block' : 'none';
                });
            });
        }

        function initStorage() {
            // Load saved tanggal
            const savedTanggal = localStorage.getItem(CONFIG.storageKeyTanggal);
            if (savedTanggal) {
                dom.inputTanggal.value = savedTanggal;
                dom.valTanggal.textContent = savedTanggal;
                dom.displayTanggal.style.display = 'block';
            }

            // Load saved nominal
            const savedNominal = localStorage.getItem(CONFIG.storageKeyNominal);
            if (savedNominal) {
                dom.inputNominal.value = savedNominal;
                dom.valNominal.textContent = 'Rp ' + formatNumber(savedNominal);
                dom.displayNominal.style.display = 'block';
            }
        }

        function initButtons() {
            // Simpan Tanggal
            dom.btnSimpanTanggal.addEventListener('click', () => {
                const tanggal = dom.inputTanggal.value;
                if (tanggal) {
                    localStorage.setItem(CONFIG.storageKeyTanggal, tanggal);
                    dom.valTanggal.textContent = tanggal;
                    dom.displayTanggal.style.display = 'block';
                    showToast('Tanggal berhasil disimpan!');

                    // Refresh data
                    fetchPrediksiData();
                } else {
                    showToast('Masukkan tanggal terlebih dahulu');
                }
            });

            // Simpan Nominal
            dom.btnSimpanNominal.addEventListener('click', () => {
                const nominal = dom.inputNominal.value;
                if (nominal) {
                    localStorage.setItem(CONFIG.storageKeyNominal, nominal);
                    dom.valNominal.textContent = 'Rp ' + formatNumber(nominal);
                    dom.displayNominal.style.display = 'block';
                    showToast('Nominal berhasil disimpan!');

                    // Refresh data
                    fetchHitungData();
                } else {
                    showToast('Masukkan nominal terlebih dahulu');
                }
            });
        }

        function initSearch() {
            dom.searchPrediksi.addEventListener('input', () => {
                renderItem(dom.listPrediksi, stateData.prediksi, dom.searchPrediksi.value);
            });

            dom.searchJadwal.addEventListener('input', () => {
                renderItem(dom.listJadwal, stateData.jadwal, dom.searchJadwal.value);
            });

            dom.searchLink.addEventListener('input', () => {
                renderItem(dom.listLink, stateData.link, dom.searchLink.value);
            });
        }

        // ============ INITIALIZE ============
        async function init() {
            initTabs();
            initStorage();
            initButtons();
            initSearch();

            // Fetch all data
            await Promise.all([
                fetchPrediksiData(),
                fetchHitungData()
            ]);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

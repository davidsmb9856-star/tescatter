<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        neon: {
          base: '#0a0e17',
          dark: '#0d1426',
          mid: '#111a33',
          accent: '#00f5ff',
          bright: '#7fffff',
          purple: '#b72aff',
          pink: '#ff2a9d',
          glow: 'rgba(0, 245, 255, 0.5)',
          border: '#1e3a5f'
        }
      },
      animation: {
        'float': 'float 6s ease-in-out infinite',
        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
        'shimmer': 'shimmer 2.5s linear infinite',
        'enter-scale': 'enterScale 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
        'bloom-in': 'bloomIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
        'slide-up': 'slideUp 0.35s ease-out forwards',
        'gradient-shift': 'gradientShift 8s ease infinite',
        'border-flow': 'borderFlow 3s linear infinite',
        'sparkle': 'sparkle 1.5s ease-in-out infinite'
      },
      keyframes: {
        float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-8px)' } },
        pulseGlow: { '0%,100%': { boxShadow: '0 0 15px rgba(0,245,255,0.4)' }, '50%': { boxShadow: '0 0 35px rgba(0,245,255,0.8), 0 0 70px rgba(183,42,255,0.4)' } },
        shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
        enterScale: { '0%': { opacity: '0', transform: 'scale(0.96)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
        bloomIn: { '0%': { opacity: '0', transform: 'scale(0.9) translateY(10px)' }, '100%': { opacity: '1', transform: 'scale(1) translateY(0)' } },
        slideUp: { '0%': { opacity: '0', transform: 'translateY(15px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
        gradientShift: { '0%,100%': { backgroundPosition: '0% 50%' }, '50%': { backgroundPosition: '100% 50%' } },
        borderFlow: { '0%': { backgroundPosition: '0% 50%' }, '100%': { backgroundPosition: '200% 50%' } },
        sparkle: { '0%,100%': { opacity: '0.6', transform: 'scale(1)' }, '50%': { opacity: '1', transform: 'scale(1.2)' } }
      }
    }
  }
}
</script>
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #0d1426;
  --bg-tertiary: #111a33;
  --bg-card: rgba(17, 26, 51, 0.75);
  --fg-primary: #e6f7ff;
  --fg-secondary: #9fb8cc;
  --fg-muted: #6b8fa8;
  --accent-cyan: #00f5ff;
  --accent-bright: #7fffff;
  --accent-purple: #b72aff;
  --accent-pink: #ff2a9d;
  --accent-glow: rgba(0, 245, 255, 0.6);
  --purple-glow: rgba(183, 42, 255, 0.5);
  --pink-glow: rgba(255, 42, 157, 0.4);
  --border-primary: #1e3a5f;
  --border-glow: rgba(0, 245, 255, 0.45);
  --success: #00ffaa;
  --warning: #ffcc33;
  --error: #ff4d8d;
  --glow-sm: 0 0 12px rgba(0, 245, 255, 0.5);
  --glow-md: 0 0 24px rgba(0, 245, 255, 0.7), 0 0 48px rgba(0, 245, 255, 0.35);
  --glow-lg: 0 0 35px rgba(0, 245, 255, 1), 0 0 70px rgba(183, 42, 255, 0.5), 0 0 105px rgba(0, 245, 255, 0.25);
  --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  --transition-bloom: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-spring: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: 'Space Grotesk', 'Rajdhani', sans-serif;
  background: var(--bg-primary);
  color: var(--fg-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.55;
  letter-spacing: 0.2px;
}

/* === ANIMATED BACKGROUND === */
.bg-animated {
  position: fixed; inset: 0; z-index: -4;
  background: 
    radial-gradient(ellipse at 15% 20%, rgba(183, 42, 255, 0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 25%, rgba(0, 245, 255, 0.1) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 90%, rgba(255, 42, 157, 0.06) 0%, transparent 55%),
    linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
  background-size: 200% 200%;
  animation: gradient-shift 15s ease infinite;
}

.grid-cyber {
  position: fixed; inset: 0; z-index: -3;
  background-image: 
    linear-gradient(rgba(0, 245, 255, 0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 245, 255, 0.025) 1px, transparent 1px),
    linear-gradient(rgba(183, 42, 255, 0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(183, 42, 255, 0.015) 1px, transparent 1px);
  background-size: 60px 60px, 60px 60px, 120px 120px, 120px 120px;
  animation: gridMove 45s linear infinite;
  opacity: 0.8;
  pointer-events: none;
}

@keyframes gridMove {
  0% { background-position: 0 0, 0 0, 0 0, 0 0; }
  100% { background-position: 60px 60px, 60px 60px, 120px 120px, 120px 120px; }
}

.orb-container { position: fixed; inset: 0; z-index: -2; pointer-events: none; overflow: hidden; }
.orb {
  position: absolute; border-radius: 50%; filter: blur(70px);
  animation: orbFloat 35s ease-in-out infinite alternate;
  opacity: 0.18;
}
.orb-1 { width: 550px; height: 550px; background: radial-gradient(circle, var(--accent-cyan) 0%, transparent 70%); top: -15%; left: -8%; animation-delay: 0s; }
.orb-2 { width: 420px; height: 420px; background: radial-gradient(circle, var(--accent-purple) 0%, transparent 70%); bottom: -10%; right: -5%; animation-delay: -12s; }
.orb-3 { width: 320px; height: 320px; background: radial-gradient(circle, var(--accent-pink) 0%, transparent 70%); top: 45%; right: 8%; animation-delay: -6s; opacity: 0.12; }
@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(25px, -20px) scale(1.04); }
  66% { transform: translate(-18px, 28px) scale(0.97); }
  100% { transform: translate(0, 0) scale(1); }
}

/* === PARTICLES === */
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
.particle {
  position: absolute; width: 2px; height: 2px; border-radius: 50%;
  background: var(--accent-cyan); opacity: 0;
  animation: particleFly linear infinite;
  box-shadow: 0 0 10px var(--accent-cyan), 0 0 20px var(--accent-glow);
}
.particle.purple { background: var(--accent-purple); box-shadow: 0 0 10px var(--accent-purple), 0 0 20px var(--purple-glow); }
.particle.pink { background: var(--accent-pink); box-shadow: 0 0 10px var(--accent-pink), 0 0 20px var(--pink-glow); }
@keyframes particleFly {
  0% { transform: translateY(100vh) rotate(0deg) scale(0.4); opacity: 0; }
  12% { opacity: 0.85; }
  88% { opacity: 0.85; }
  100% { transform: translateY(-100vh) rotate(720deg) scale(1); opacity: 0; }
}

/* === MAIN LAYOUT === */
.main-wrapper { position: relative; z-index: 10; max-width: 1440px; margin: 0 auto; padding: 16px; }
@media (min-width: 768px) { .main-wrapper { padding: 24px 28px; } }

/* === HEADER === */
.header { text-align: center; padding: 32px 0 24px; animation: slide-up 0.5s ease-out backwards; }
.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.8rem, 6vw, 3.2rem);
  font-weight: 900; letter-spacing: 3px;
  background: linear-gradient(135deg, #fff 0%, var(--accent-bright) 22%, var(--accent-cyan) 45%, var(--accent-purple) 68%, var(--accent-pink) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: 0 0 25px rgba(0, 245, 255, 0.5);
  animation: titleShimmer 4s ease-in-out infinite;
  position: relative; display: inline-block;
}
@keyframes titleShimmer { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.2); } }
.main-title::after {
  content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
  width: 75%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-purple), var(--accent-pink), transparent);
  border-radius: 2px; box-shadow: var(--glow-sm);
  animation: border-flow 3s linear infinite;
}

/* === MODERN TABS === */
.tabs-nav {
  display: flex; justify-content: center; gap: 4px; margin: 0 0 20px;
  position: relative; padding: 4px;
  background: linear-gradient(135deg, rgba(13, 20, 38, 0.85), rgba(17, 26, 51, 0.75));
  border: 1px solid var(--border-primary); border-radius: var(--radius-lg);
  box-shadow: inset 0 0 20px rgba(0, 245, 255, 0.05), 0 4px 20px rgba(0, 0, 0, 0.25);
  backdrop-filter: blur(12px);
  animation: bloom-in 0.4s ease-out backwards;
}
.tabs-nav::before {
  content: ''; position: absolute; inset: 0; border-radius: var(--radius-lg);
  background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.1), transparent);
  animation: border-flow 4s linear infinite; pointer-events: none;
}
.tab-btn {
  flex: 1; min-width: 130px; padding: 13px 20px;
  font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.88rem;
  color: var(--fg-muted); background: transparent; border: none;
  cursor: pointer; transition: all var(--transition-smooth);
  position: relative; overflow: hidden; text-transform: uppercase; letter-spacing: 1px;
  border-radius: var(--radius-md); z-index: 1;
}
.tab-btn::before {
  content: ''; position: absolute; inset: 0; border-radius: var(--radius-md);
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.08), rgba(183, 42, 255, 0.06));
  opacity: 0; transition: opacity var(--transition-smooth);
}
.tab-btn:hover::before { opacity: 1; }
.tab-btn:hover { color: var(--accent-cyan); transform: translateY(-2px); }
.tab-btn.active {
  color: var(--fg-primary);
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.15), rgba(183, 42, 255, 0.12));
  box-shadow: var(--glow-md), inset 0 0 25px rgba(0, 245, 255, 0.1);
}
.tab-btn.active::after {
  content: ''; position: absolute; bottom: 0; left: 15%; right: 15%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-purple), transparent);
  border-radius: 2px; animation: border-flow 2.5s linear infinite;
}

/* === CONTENT CARD === */
.content-card {
  background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
  border: 1px solid var(--border-primary); border-top: 2px solid var(--accent-cyan);
  border-radius: 0 0 var(--radius-xl) var(--radius-xl);
  padding: 22px; position: relative;
  box-shadow: 0 12px 45px rgba(0, 0, 0, 0.35);
  animation: enter-scale 0.45s ease-out backwards;
}
.content-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-purple), var(--accent-cyan), transparent);
  background-size: 200% 100%; animation: border-flow 3.5s linear infinite;
}

/* === GLASS PANEL (Settings) === */
.glass-panel {
  background: linear-gradient(135deg, rgba(17, 26, 51, 0.72), rgba(21, 34, 63, 0.65));
  border: 1px solid var(--border-primary); border-radius: var(--radius-lg);
  padding: 14px 18px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 14px; align-items: center; justify-content: center;
  box-shadow: inset 0 0 22px rgba(0, 245, 255, 0.04), 0 4px 18px rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(14px); position: relative; overflow: hidden;
  animation: bloom-in 0.4s ease-out backwards;
}
.glass-panel::before {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius-lg);
  background: linear-gradient(135deg, transparent 30%, rgba(0, 245, 255, 0.06) 50%, transparent 70%);
  animation: border-flow 5s linear infinite; pointer-events: none;
}
.panel-item { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
.panel-label {
  color: var(--accent-bright); font-size: 0.83rem; font-weight: 600;
  text-shadow: 0 0 8px rgba(0, 245, 255, 0.45); letter-spacing: 0.4px;
}

/* === MODERN INPUTS === */
.input-neon {
  padding: 11px 15px;
  background: linear-gradient(135deg, rgba(13, 20, 38, 0.75), rgba(17, 26, 51, 0.68));
  border: 1.5px solid var(--border-primary); border-radius: var(--radius-sm);
  color: var(--fg-primary); font-size: 0.92rem; width: 175px;
  transition: all var(--transition-fast); font-family: 'Rajdhani', sans-serif;
  box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.2);
}
.input-neon:focus {
  outline: none; border-color: var(--accent-cyan);
  box-shadow: var(--glow-md), inset 0 0 18px rgba(0, 245, 255, 0.15);
  background: linear-gradient(135deg, rgba(17, 26, 51, 0.85), rgba(21, 34, 63, 0.78));
}
.input-neon::placeholder { color: var(--fg-muted); opacity: 0.75; }

/* === NEON BUTTONS === */
.btn-neon {
  padding: 11px 22px;
  background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 52%, var(--accent-pink) 100%);
  border: none; border-radius: var(--radius-sm);
  color: var(--bg-primary); font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.82rem; cursor: pointer;
  transition: all var(--transition-smooth); white-space: nowrap;
  position: relative; overflow: hidden; text-transform: uppercase; letter-spacing: 0.9px;
  box-shadow: var(--glow-sm); min-width: 100px;
}
.btn-neon::before {
  content: ''; position: absolute; inset: 0; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.22) 45%, transparent 55%, rgba(255,255,255,0.15) 100%);
  transform: translateX(-100%); transition: transform 0.5s ease;
}
.btn-neon:hover::before { transform: translateX(100%); }
.btn-neon:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: var(--glow-md);
  background: linear-gradient(135deg, var(--accent-bright) 0%, var(--accent-cyan) 52%, var(--accent-purple) 100%);
}
.btn-neon:active { transform: translateY(-1px) scale(1); }
.btn-neon:disabled {
  opacity: 0.52; cursor: not-allowed; transform: none; box-shadow: none;
  background: linear-gradient(135deg, var(--border-primary), #2a3f5f);
}
.status-badge {
  font-size: 0.82rem; color: var(--accent-cyan); margin-left: 8px; font-weight: 600;
  text-shadow: 0 0 9px rgba(0, 245, 255, 0.52); animation: pulse-glow 2.8s ease-in-out infinite;
  min-width: 75px; display: inline-block; text-align: left;
}

/* === DATA GRID === */
.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 19px; }

/* === SECTION CARD === */
.section-card {
  background: linear-gradient(135deg, rgba(17, 26, 51, 0.72), rgba(21, 34, 63, 0.65));
  border: 1px solid var(--border-primary); border-radius: var(--radius-lg);
  overflow: hidden; display: flex; flex-direction: column;
  box-shadow: 0 5px 24px rgba(0, 0, 0, 0.28);
  transition: all var(--transition-smooth);
  animation: slide-up 0.4s ease-out backwards;
}
.section-card:nth-child(1) { animation-delay: 0.08s; }
.section-card:nth-child(2) { animation-delay: 0.16s; }
.section-card:nth-child(3) { animation-delay: 0.24s; }
.section-card:hover {
  border-color: var(--accent-cyan);
  box-shadow: var(--glow-md), 0 8px 32px rgba(0, 0, 0, 0.35);
  transform: translateY(-4px);
}
.section-head {
  background: linear-gradient(90deg, rgba(0, 245, 255, 0.14) 0%, rgba(183, 42, 255, 0.08) 100%);
  padding: 13px 17px; border-bottom: 1px solid var(--border-primary);
  display: flex; justify-content: space-between; align-items: center; position: relative;
}
.section-head::after {
  content: ''; position: absolute; bottom: -1px; left: 18px; right: 18px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-purple), transparent);
}
.section-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent-bright);
  font-size: 0.96rem; text-shadow: 0 0 11px rgba(0, 245, 255, 0.58); letter-spacing: 0.9px;
}
.count-badge {
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.22), rgba(183, 42, 255, 0.16));
  color: var(--accent-bright); padding: 4px 11px; border-radius: 20px;
  font-size: 0.74rem; font-weight: 700; border: 1px solid rgba(0, 245, 255, 0.38);
  box-shadow: 0 0 10px rgba(0, 245, 255, 0.28); animation: pulse-glow 3.2s ease-in-out infinite;
}

/* === SEARCH BAR === */
.search-bar { padding: 11px 15px; border-bottom: 1px solid var(--border-primary); background: rgba(13, 20, 38, 0.28); }
.search-input {
  width: 100%; padding: 10px 14px;
  background: linear-gradient(135deg, rgba(13, 20, 38, 0.62), rgba(17, 26, 51, 0.52));
  border: 1.2px solid rgba(30, 58, 95, 0.55); border-radius: var(--radius-sm);
  color: var(--fg-primary); font-size: 0.9rem; transition: all var(--transition-fast);
  font-family: 'Rajdhani', sans-serif;
}
.search-input:focus {
  outline: none; border-color: var(--accent-cyan);
  box-shadow: var(--glow-md);
  background: linear-gradient(135deg, rgba(17, 26, 51, 0.78), rgba(21, 34, 63, 0.68));
}
.search-input::placeholder { color: var(--fg-muted); opacity: 0.72; }

/* === SCROLL CONTENT === */
.scroll-content { padding: 11px; overflow-y: auto; max-height: 430px; flex-grow: 1; scroll-behavior: smooth; }

/* === ITEM CARD === */
.item-card {
  background: linear-gradient(135deg, rgba(17, 26, 51, 0.62), rgba(21, 34, 63, 0.52));
  border: 1px solid rgba(30, 58, 95, 0.42); border-radius: var(--radius-sm);
  padding: 13px 15px; margin-bottom: 10px; cursor: pointer;
  transition: all var(--transition-smooth); position: relative; overflow: hidden;
  animation: bloom-in 0.35s ease-out backwards;
}
.item-card::before {
  content: ''; position: absolute; inset: 0; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, transparent 0%, rgba(0, 245, 255, 0.07) 50%, transparent 100%);
  opacity: 0; transition: opacity var(--transition-smooth);
}
.item-card:hover::before { opacity: 1; }
.item-card:hover {
  border-color: var(--accent-cyan); transform: translateY(-2px);
  box-shadow: var(--glow-sm);
  background: linear-gradient(135deg, rgba(21, 34, 63, 0.72), rgba(26, 42, 78, 0.62));
}
.item-tag {
  font-size: 0.69rem; color: var(--fg-muted); text-transform: uppercase;
  letter-spacing: 1.4px; margin-bottom: 3px; font-weight: 600; opacity: 0.92;
}
.item-head {
  color: var(--accent-bright); font-weight: 700; margin-bottom: 5px;
  font-size: 0.94rem; text-shadow: 0 0 8px rgba(0, 245, 255, 0.48);
}
.item-body {
  font-size: 0.84rem; color: var(--fg-primary); line-height: 1.48;
  white-space: pre-wrap; word-break: break-all; opacity: 0.94;
}

/* === MARKET BOX === */
.market-box {
  background: linear-gradient(135deg, rgba(17, 26, 51, 0.68), rgba(21, 34, 63, 0.58));
  border: 1px solid var(--border-primary); border-radius: var(--radius-md);
  overflow: hidden; margin-bottom: 12px; transition: all var(--transition-fast);
  animation: slide-up 0.35s ease-out backwards;
}
.market-box:hover { border-color: var(--accent-cyan); box-shadow: var(--glow-sm); }
.market-head {
  background: linear-gradient(90deg, rgba(0, 245, 255, 0.18) 0%, rgba(183, 42, 255, 0.1) 100%);
  padding: 13px 17px; border-bottom: 1px solid var(--border-primary);
}
.market-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent-bright);
  font-size: 0.9rem; text-shadow: 0 0 10px rgba(0, 245, 255, 0.55);
}
.market-body { padding: 9px 11px; max-height: 330px; overflow-y: auto; }

/* === BET ROW === */
.bet-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px;
  background: linear-gradient(135deg, rgba(13, 20, 38, 0.52), rgba(17, 26, 51, 0.42));
  border: 1px solid rgba(30, 58, 95, 0.38); border-radius: var(--radius-sm);
  margin-bottom: 6px; cursor: pointer; transition: all var(--transition-fast);
}
.bet-row:hover {
  border-color: var(--accent-cyan);
  background: linear-gradient(135deg, rgba(17, 26, 51, 0.62), rgba(21, 34, 63, 0.52));
  transform: translateX(4px); box-shadow: var(--glow-sm);
}
.bet-label { color: var(--fg-primary); font-size: 0.84rem; flex: 1; margin-right: 11px; font-weight: 500; }
.bet-value {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent-bright);
  font-size: 0.84rem;
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.14), rgba(183, 42, 255, 0.1));
  padding: 3px 9px; border-radius: 7px;
  border: 1px solid rgba(0, 245, 255, 0.32);
  text-shadow: 0 0 8px rgba(0, 245, 255, 0.48);
  transition: all var(--transition-fast);
}
.bet-row:hover .bet-value {

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4',
  autoRefreshDelay: 1100
};

// State
const state = { prediksi: [], jadwal: [], link: [], hitung: [], debounceTimers: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'), toastMsg: $('toastMsg'), toastIcon: $('toastIcon'),
  autoBadge: $('autoBadge'), detailHitungan: $('detailHitunganDropdown')
};

// ============ UTILS ============
function showToast(msg, type = 'success') {
  const icons = { success: '✨', error: '❌', warning: '⚠️', info: 'ℹ️' };
  dom.toastIcon.textContent = icons[type] || '✨';
  dom.toastMsg.textContent = msg;
  dom.toast.className = 'toast ' + type + ' show';
  setTimeout(() => dom.toast.classList.remove('show'), 3400);
}

function showAutoBadge() {
  if (dom.autoBadge) {
    dom.autoBadge.classList.add('show');
    setTimeout(() => dom.autoBadge.classList.remove('show'), 2200);
  }
}

function copyText(text) {
  let finalText = text;
  try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 28 ? finalText.substring(0, 28) + '...' : finalText;
    showToast('Disalin: ' + preview, 'success');
  }).catch(() => showToast('Gagal menyalin', 'error'));
}

function copyResult() {
  const detail = dom.detailHitungan;
  const text = detail.textContent.trim();
  if (text && !text.includes('Pilih tipe')) {
    copyText(text);
    detail.classList.add('copied');
    setTimeout(() => detail.classList.remove('copied'), 400);
  }
}

function formatNum(n) {
  if (!n) return '0';
  return new Intl.NumberFormat('id-ID').format(Number(n));
}

function debounce(func, wait, key) {
  return function(...args) {
    clearTimeout(state.debounceTimers[key]);
    state.debounceTimers[key] = setTimeout(() => func(...args), wait);
  };
}

// ============ CSV PARSER ============
function parseCSV(text) {
  let p = [], row = [], entry = "", st = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(entry); entry = ""; }
      else if (c === '\r' && n === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { entry += '"'; i++; }
      else if (c === '"') st = 0;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); p.push(row); }
  return p;
}
function safeGet(row, idx) { return row?.[idx]?.trim() ?? ""; }

// ============ API ============
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID') || !SCRIPT_URL) {
    showToast('⚙️ Script URL belum dikonfigurasi', 'warning');
    return false;
  }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    const text = await res.text();
    return text.toLowerCase().includes('success');
  } catch(e) {
    console.error("Update Error:", e);
    showToast('Koneksi gagal', 'error');
    return false;
  }
}

// ============ FETCH DATA ============
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          const fmt = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          if (!dom.inTgl.value) dom.inTgl.value = fmt;
          dom.statTgl.textContent = fmt;
        }
      }
    }
    
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0] || 'Item', content: txt, id: i });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0] || 'Jadwal', content: txt, id: i });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0] || 'Link', content: txt, id: i });
    }
    
    renderPrediksi();
  } catch(e) {
    console.error("Error Prediksi:", e);
    dom.listP.innerHTML = '<p style="color:var(--error);text-align:center;padding:28px;">❌ Gagal memuat data</p>';
  }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom && !dom.inNom.value) {
        dom.inNom.value = nom;
        dom.statNom.textContent = "💰 Rp " + formatNum(nom);
      }
    }
    
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 }, { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 }, { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 }, { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 }, { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    
    state.hitung = secDef.map(s => {
      let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
      let items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), resVal = safeGet(data[i], 24);
          if (type || resVal) items.push({ type: type || "-", res: resVal || "-" });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    
    renderHitung();
  } catch(e) {
    console.error("Error Hitung:", e);
    dom.contH.innerHTML = '<p style="color:var(--error);text-align:center;padding:32px;">❌ Gagal memuat data</p>';
  }
}

// ============ RENDER ============
function renderList(container, items, search, type) {
  const filtered = items.filter(i => 
    i.content?.toLowerCase().includes(search.toLowerCase()) ||
    i.title?.toLowerCase().includes(search.toLowerCase())
  );
  if (!filtered.length) {
    container.innerHTML = `<p style="color:var(--fg-muted);text-align:center;padding:28px;font-size:0.92rem;">📭 Tidak ada data</p>`;
    return;
  }
  container.innerHTML = filtered.map((v, idx) => `
    <div class="item-card" style="--i: ${idx}" onclick="copyText('${encodeURIComponent(v.content)}')">
      <div class="item-tag">📋 ${type.toUpperCase()}</div>
      <div class="item-head">${v.title}</div>
      <div class="item-tag">💬 Klik untuk salin</div>
      <div class="item-body">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value, 'prediksi');
  renderList(dom.listJ, state.jadwal, dom.srcJ.value, 'jadwal');
  renderList(dom.listL, state.link, dom.srcL.value, 'link');
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) {
    dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:32px;">📭 Tidak ada data</p>';
    return;
  }
  dom.contH.innerHTML = state.hitung.map((s, idx) => `
    <div class="market-box" style="animation-delay: ${idx * 0.04}s">
      <div class="market-head"><h3 class="market-title">🎯 ${s.title}</h3></div>
      <div class="market-body">
        ${s.items.map(it => `
          <div class="bet-row" onclick="copyText('${encodeURIComponent(it.res)}')">
            <span class="bet-label">${it.type}</span>
            <span class="bet-value">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ============ HITUNG LOGIC ============
let kelompokData = {};
async function loadCaraHitungTogel() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom && !dom.inNom.value) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "🎰 Semua Pasaran" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "🇲🇴 Toto Macau 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "🇲🇴 Toto Macau 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "🦍 Kingkong 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "🎁 Bonus" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "🇮🇩 Jakarta" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "🌊 TotoMali" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "🎯 HokiDraw" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "🇦🇺 Sydney & 🇭🇰 Hongkong" }
    ];
    kelompokData = {};
    const dropdown = document.getElementById('kelompokDropdown');
    dropdown.innerHTML = '<option value="">-- Pilih Tipe Hitungan --</option>';
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length > 0) {
        kelompokData[sec.title] = items;
        const opt = document.createElement('option');
        opt.value = sec.title; opt.textContent = sec.title;
        dropdown.appendChild(opt);
      }
    });
  } catch(e) { console.error("Error loadCaraHitungTogel:", e); }
}

function isiDropdownLabel() {
  const selected = document.getElementById('kelompokDropdown').value;
  const labelDropdown = document.getElementById('labelDropdown');
  labelDropdown.innerHTML = '<option value="">-- Pilih Label --</option>';
  if (selected && kelompokData[selected]) {
    kelompokData[selected].forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.label; opt.textContent = item.label;
      labelDropdown.appendChild(opt);
    });
  }
}

function tampilkanValueHitungan() {
  const kelompok = document.getElementById('kelompokDropdown').value;
  const label = document.getElementById('labelDropdown').value;
  const detail = dom.detailHitungan;
  if (!kelompok || !label || !kelompokData[kelompok]) {
    detail.innerHTML = '<span style="color: var(--fg-muted); font-size: 0.95rem;">Silakan pilih tipe dan label</span>';
    return;
  }
  const item = kelompokData[kelompok].find(i => i.label === label);
  if (item) {
    detail.innerHTML = `<span style="font-size: 1.15em; font-weight: 700; text-shadow: 0 0 14px rgba(0,245,255,0.65);">${item.value}</span>`;
  }
}

// ============ AUTO-UPDATE ============
function handleDateChange() {
  showAutoBadge();
  debounce(() => updateTanggal(true), CONFIG.autoRefreshDelay, 'tgl')();
}
function handleNominalChange() {
  showAutoBadge();
  debounce(() => updateNominal(true), CONFIG.autoRefreshDelay, 'nom')();
}

async function updateTanggal(isAuto = false) {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal dulu!", 'warning');
  const parts = dom.inTgl.value.split('-');
  const fmt = `${parts[1]}/${parts[2]}/${parts[0]}`;
  dom.btnTgl.disabled = true;
  dom.statTgl.textContent = isAuto ? "🔄 Sync..." : "⏳ Menyimpan...";
  try {
    const ok = await updateSheet('updateTanggal', fmt);
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = "✅ " + dom.inTgl.value;
      showToast(isAuto ? "🔄 Tanggal diperbarui" : "📅 Tanggal disimpan", 'success');
      await Promise.all([fetchPrediksi(), fetchHitung(), loadCaraHitungTogel()]);
    } else { dom.statTgl.textContent = "❌ Gagal"; showToast("❌ Gagal update", 'error'); }
  } catch(e) { dom.btnTgl.disabled = false; dom.statTgl.textContent = "❌ Error"; }
}

async function updateNominal(isAuto = false) {
  if (!dom.inNom.value || dom.inNom.value <= 0) return showToast("⚠️ Isi nominal valid!", 'warning');
  dom.btnNom.disabled = true;
  dom.statNom.textContent = isAuto ? "🔄 Sync..." : "⏳ Menyimpan...";
  try {
    const ok = await updateSheet('updateNominal', dom.inNom.value);
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value);
      showToast(isAuto ? "🔄 Nominal diperbarui" : "💰 Nominal disimpan", 'success');
      await Promise.all([fetchPrediksi(), fetchHitung(), loadCaraHitungTogel()]);
    } else { dom.statNom.textContent = "❌ Gagal"; showToast("❌ Gagal update", 'error'); }
  } catch(e) { dom.btnNom.disabled = false; dom.statNom.textContent = "❌ Error"; }
}

// ============ TAB SWITCH ============
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  const isP = tab === 'prediksi';
  dom.tabP.classList.toggle('hidden', !isP);
  dom.tabH.classList.toggle('hidden', isP);
  const active = isP ? dom.tabP : dom.tabH;
  active.style.animation = 'none';
  setTimeout(() => active.style.animation = 'enter-scale 0.4s ease-out', 10);
  showToast(`Tab ${tab.toUpperCase()} aktif`, 'info');
}

function filterData(type) {
  const map = {
    prediksi: { list: dom.listP, items: state.prediksi, input: dom.srcP },
    jadwal: { list: dom.listJ, items: state.jadwal, input: dom.srcJ },
    link: { list: dom.listL, items: state.link, input: dom.srcL }
  };
  const cfg = map[type];
  if (cfg) renderList(cfg.list, cfg.items, cfg.input.value, type);
}

// ============ PARTICLES ============
function createParticles() {
  const c = document.getElementById('particles');
  if (!c) return;
  for(let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'particle' + (i%3===1?' purple':i%3===2?' pink':'');
    p.style.left = Math.random()*100+'%';
    p.style.animationDelay = Math.random()*22+'s';
    p.style.animationDuration = (22+Math.random()*28)+'s';
    p.style.opacity = 0.55+Math.random()*0.4;
    c.appendChild(p);
  }
}

// ============ INIT ============
async function init() {
  createParticles();
  const savedTgl = localStorage.getItem(CONFIG.keyTanggal);
  const savedNom = localStorage.getItem(CONFIG.keyNominal);
  if (savedTgl) { dom.inTgl.value = savedTgl; dom.statTgl.textContent = savedTgl; }
  if (savedNom) { dom.inNom.value = savedNom; dom.statNom.textContent = "💰 Rp " + formatNum(savedNom); }
  await Promise.all([fetchPrediksi(), fetchHitung(), loadCaraHitungTogel()]);
  dom.srcP.oninput = () => filterData('prediksi');
  dom.srcJ.oninput = () => filterData('jadwal');
  dom.srcL.oninput = () => filterData('link');
  setTimeout(() => showToast('🚀 Selamat bekerja, SUHAN!', 'success'), 900);
}

document.addEventListener('DOMContentLoaded', init);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === '1') { e.preventDefault(); switchTab('prediksi'); }
  if (e.ctrlKey && e.key === '2') { e.preventDefault(); switchTab('hitung'); }
  if (e.key === 'Escape') document.querySelectorAll('.input-neon, .search-input').forEach(el => el.blur());
});

// Visibility API
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) { showAutoBadge(); setTimeout(() => { fetchPrediksi(); fetchHitung(); }, 600); }
});

// Periodic refresh
setInterval(() => {
  if (document.visibilityState === 'visible') { showAutoBadge(); fetchPrediksi(); fetchHitung(); }
}, 5*60*1000);
</script>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030014; --bg-card: rgba(10, 8, 35, 0.7); --bg-card-hover: rgba(20, 15, 55, 0.85);
  --fg: #f0f9ff; --fg-muted: #94a3b8;
  --neon-cyan: #00f5ff; --neon-pink: #ff00aa; --neon-purple: #b72aff; --neon-green: #00ff9d;
  --border-glow: rgba(0, 245, 255, 0.5);
  --glow-cyan: 0 0 10px #00f5ff, 0 0 25px #00f5ff80, 0 0 50px #00f5ff40;
  --glow-cyan-lg: 0 0 15px #00f5ff, 0 0 35px #00f5ff90, 0 0 70px #00f5ff50, 0 0 100px #00f5ff30;
  --glow-purple: 0 0 12px #b72aff, 0 0 30px #b72aff70;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-bloom: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--fg);
  min-height: 100vh; overflow-x: hidden; position: relative; line-height: 1.5;
}

/* === BACKGROUND === */
.bg-animated {
  position: fixed; inset: 0; z-index: -3;
  background: radial-gradient(1200px 600px at 10% 10%, rgba(0, 245, 255, 0.08), transparent 60%),
    radial-gradient(800px 400px at 90% 20%, rgba(255, 0, 170, 0.06), transparent 60%),
    radial-gradient(1000px 500px at 50% 90%, rgba(183, 42, 255, 0.07), transparent 60%),
    linear-gradient(180deg, #030014 0%, #0a0823 50%, #030014 100%);
  animation: bgShift 30s ease-in-out infinite;
}
@keyframes bgShift { 0%, 100% { filter: hue-rotate(0deg); } 50% { filter: hue-rotate(12deg); } }

.grid-overlay {
  position: fixed; inset: 0; z-index: -2;
  background-image: linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px; animation: gridSlide 40s linear infinite; pointer-events: none;
}
@keyframes gridSlide { 0% { transform: perspective(500px) rotateX(60deg) translateY(0); } 100% { transform: perspective(500px) rotateX(60deg) translateY(50px); } }

.orb {
  position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.15;
  animation: orbFloat 35s ease-in-out infinite alternate; z-index: -1;
}
.orb-1 { width: 700px; height: 700px; background: var(--neon-cyan); top: -20%; left: -15%; }
.orb-2 { width: 500px; height: 500px; background: var(--neon-purple); bottom: -15%; right: -10%; animation-delay: -15s; }
.orb-3 { width: 400px; height: 400px; background: var(--neon-pink); top: 40%; left: 50%; animation-delay: -25s; }
@keyframes orbFloat { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(40px, -30px) scale(1.08); } 100% { transform: translate(-25px, 35px) scale(0.95); } }

.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; width: 2px; height: 2px; border-radius: 50%; background: var(--neon-cyan);
  opacity: 0; animation: particleRise 25s infinite ease-in-out;
  box-shadow: 0 0 8px var(--neon-cyan), 0 0 20px var(--neon-cyan);
}
.particle:nth-child(2n) { background: var(--neon-purple); animation-delay: -8s; }
.particle:nth-child(3n) { background: var(--neon-pink); animation-delay: -15s; }
@keyframes particleRise {
  0%, 100% { transform: translateY(110vh) scale(0.8); opacity: 0; }
  10%, 90% { opacity: 1; }
  100% { transform: translateY(-10vh) rotate(720deg) scale(1.2); opacity: 0; }
}

/* === CONTAINER === */
.main-container { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 16px; }
.header-section { text-align: center; padding: 28px 0 20px; animation: bloomIn 0.8s var(--transition-bloom) backwards; }
@keyframes bloomIn { from { opacity: 0; transform: translateY(-20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

.main-title {
  font-family: 'Orbitron', sans-serif; font-size: clamp(1.8rem, 5.5vw, 3.2rem); font-weight: 900;
  letter-spacing: 2px; background: linear-gradient(135deg, #fff, var(--neon-cyan) 30%, var(--neon-purple) 60%, var(--neon-pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: var(--glow-cyan);
  animation: titlePulse 3s ease-in-out infinite; position: relative; display: inline-block;
}
@keyframes titlePulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.25); } }
.main-title::after {
  content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
  width: 70%; height: 2px; background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), transparent);
  animation: lineGlow 2.5s ease-in-out infinite;
}
@keyframes lineGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

/* === TABS === */
.tabs-container {
  display: flex; justify-content: center; gap: 4px; margin: 12px 0 20px;
  background: rgba(15, 12, 40, 0.5); border: 1px solid rgba(0, 245, 255, 0.25);
  border-radius: 14px; padding: 4px; max-width: fit-content; margin: auto; backdrop-filter: blur(12px);
}
.tab-btn {
  padding: 12px 28px; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.9rem;
  color: var(--fg-muted); background: transparent; border: none; border-radius: 10px;
  cursor: pointer; transition: all var(--transition); position: relative; overflow: hidden;
  text-transform: uppercase; letter-spacing: 1px;
}
.tab-btn:hover { color: var(--neon-cyan); }
.tab-btn.active {
  color: var(--fg); background: linear-gradient(135deg, rgba(0, 245, 255, 0.15), rgba(183, 42, 255, 0.12));
  border: 1px solid var(--border-glow); box-shadow: var(--glow-cyan);
}
.tab-btn.active::after {
  content: ''; position: absolute; bottom: -1px; left: 15%; right: 15%; height: 2px;
  background: var(--neon-cyan); box-shadow: 0 0 12px var(--neon-cyan);
}

/* === CONTENT BOX === */
.content-box {
  background: var(--bg-card); border: 1px solid rgba(0, 245, 255, 0.2); border-radius: 20px;
  padding: 22px; backdrop-filter: blur(20px); position: relative; overflow: hidden;
}
.content-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), transparent);
  animation: borderScan 4s linear infinite;
}
@keyframes borderScan { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

/* === SETTINGS PANEL === */
.settings-panel {
  background: linear-gradient(135deg, rgba(20, 15, 50, 0.6), rgba(30, 20, 70, 0.5));
  border: 1px solid rgba(0, 245, 255, 0.25); border-radius: 16px; padding: 16px 20px;
  margin-bottom: 22px; display: flex; flex-wrap: nowrap; gap: 16px; align-items: center; backdrop-filter: blur(10px);
}
.setting-item { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
.setting-label { color: var(--neon-cyan); font-size: 0.82rem; font-weight: 600; text-shadow: 0 0 8px rgba(0, 245, 255, 0.5); }
.input-neon {
  padding: 10px 14px; background: rgba(8, 6, 25, 0.7); border: 1px solid rgba(0, 245, 255, 0.3);
  border-radius: 10px; color: var(--fg); font-size: 0.92rem; width: 170px;
  transition: all var(--transition); font-family: 'Space Grotesk', sans-serif;
}
.input-neon:focus { outline: none; border-color: var(--neon-cyan); box-shadow: var(--glow-cyan); background: rgba(12, 10, 35, 0.85); }

.btn-neon {
  padding: 10px 22px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  border: none; border-radius: 12px; color: #030014; font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: all var(--transition);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1px; position: relative; overflow: hidden;
}
.btn-neon:hover { transform: translateY(-2px); box-shadow: var(--glow-cyan-lg); }
.btn-neon:active { transform: translateY(0); }
.btn-neon:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.status-badge { font-size: 0.82rem; color: var(--neon-green); margin-left: 8px; font-weight: 600; animation: statusBlink 2s ease-in-out infinite; }
@keyframes statusBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.75; } }

/* === DATA GRID === */
.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; }
.section-box {
  background: linear-gradient(145deg, rgba(18, 14, 45, 0.7), rgba(25, 18, 60, 0.6));
  border: 1px solid rgba(0, 245, 255, 0.18); border-radius: 18px; overflow: hidden;
  display: flex; flex-direction: column; backdrop-filter: blur(8px); transition: all var(--transition);
}
.section-box:hover { border-color: rgba(0, 245, 255, 0.45); box-shadow: var(--glow-cyan); transform: translateY(-2px); }
.section-header {
  background: linear-gradient(90deg, rgba(0, 245, 255, 0.12), transparent 70%);
  padding: 12px 16px; border-bottom: 1px solid rgba(0, 245, 255, 0.15);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan); font-size: 0.95rem; }
.badge-count { background: rgba(0, 245, 255, 0.15); color: var(--neon-cyan); padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; border: 1px solid rgba(0, 245, 255, 0.35); }
.search-box { padding: 10px 14px; border-bottom: 1px solid rgba(0, 245, 255, 0.12); }
.search-input {
  width: 100%; padding: 9px 13px; background: rgba(10, 8, 30, 0.6); border: 1px solid rgba(0, 245, 255, 0.25);
  border-radius: 10px; color: var(--fg); font-size: 0.88rem; transition: all var(--transition);
}
.search-input:focus { outline: none; border-color: var(--neon-cyan); box-shadow: var(--glow-cyan); }
.section-content { padding: 10px; overflow-y: auto; max-height: 420px; flex-grow: 1; }

/* === ITEM CARD === */
.item-card {
  background: linear-gradient(135deg, rgba(15, 12, 40, 0.65), rgba(22, 17, 55, 0.55));
  border: 1px solid rgba(0, 245, 255, 0.2); border-radius: 14px; padding: 13px 15px;
  margin-bottom: 9px; cursor: pointer; transition: all var(--transition); position: relative; overflow: hidden;
}
.item-card:hover { border-color: var(--neon-cyan); box-shadow: var(--glow-cyan); transform: translateY(-2px); }
.item-label { font-size: 0.68rem; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 1.8px; margin-bottom: 2px; font-weight: 600; }
.item-title { color: var(--neon-cyan); font-weight: 700; margin-bottom: 4px; font-size: 0.92rem; }
.item-content { font-size: 0.83rem; color: var(--fg); line-height: 1.45; white-space: pre-wrap; word-break: break-word; }

/* === PASARAN & BET === */
.pasaran-box {
  background: linear-gradient(135deg, rgba(16, 13, 42, 0.68), rgba(24, 19, 58, 0.58));
  border: 1px solid rgba(0, 245, 255, 0.2); border-radius: 16px; overflow: hidden; margin-bottom: 11px; transition: all var(--transition);
}
.pasaran-box:hover { border-color: rgba(0, 245, 255, 0.45); box-shadow: var(--glow-cyan); }
.pasaran-header { background: linear-gradient(90deg, rgba(0, 245, 255, 0.15), transparent 75%); padding: 12px 16px; border-bottom: 1px solid rgba(0, 245, 255, 0.15); }
.pasaran-title { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan); font-size: 0.88rem; }
.pasaran-content { padding: 8px 12px; max-height: 340px; overflow-y: auto; }
.bet-item {
  display: flex; justify-content: space-between; align-items: center; padding: 9px 13px; margin-bottom: 5px;
  background: rgba(12, 10, 32, 0.55); border: 1px solid rgba(0, 245, 255, 0.18); border-radius: 10px;
  cursor: pointer; transition: all var(--transition);
}
.bet-item:hover { border-color: var(--neon-cyan); background: rgba(18, 14, 45, 0.7); box-shadow: var(--glow-cyan); transform: translateX(3px); }
.bet-type { color: var(--fg); font-size: 0.83rem; flex: 1; margin-right: 10px; font-weight: 500; }
.bet-result {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan); font-size: 0.83rem;
  background: rgba(0, 245, 255, 0.12); padding: 3px 9px; border-radius: 8px; border: 1px solid rgba(0, 245, 255, 0.3);
}
.bet-item:hover .bet-result { background: rgba(0, 245, 255, 0.22); box-shadow: 0 0 12px rgba(0, 245, 255, 0.35); }

/* === 🎯 CHIP SELECTOR - NO DROPDOWN === */
.selector-section { margin: 18px 0; }
.selector-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700; color: var(--neon-cyan);
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px; text-shadow: 0 0 9px rgba(0, 245, 255, 0.55);
}
.selector-label::before { content: '◆'; font-size: 0.7rem; animation: pulseIcon 2s infinite; }
@keyframes pulseIcon { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.9); } }

.chip-scroll {
  display: flex; gap: 8px; overflow-x: auto; padding: 4px 2px 12px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.chip-scroll::-webkit-scrollbar { display: none; }

.chip-btn {
  flex: 0 0 auto; padding: 9px 16px; background: rgba(14, 11, 38, 0.85);
  border: 1px solid rgba(0, 245, 255, 0.3); border-radius: 25px;
  color: var(--fg-muted); font-size: 0.82rem; font-weight: 600; cursor: pointer;
  transition: all var(--transition); white-space: nowrap; font-family: 'Space Grotesk', sans-serif;
}
.chip-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: var(--glow-cyan); transform: translateY(-2px); }
.chip-btn.active {
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(183, 42, 255, 0.15));
  border-color: var(--neon-cyan); color: var(--fg); box-shadow: var(--glow-cyan);
  text-shadow: 0 0 8px rgba(0, 245, 255, 0.7);
}
.chip-btn.active::after {
  content: '✓'; margin-left: 6px; font-size: 0.7rem; color: var(--neon-green);
  animation: checkPop 0.3s var(--transition-bloom);
}
@keyframes checkPop { 0% { transform: scale(0); } 70% { transform: scale(1.3); } 100% { transform: scale(1); } }

/* === CARD PICKER GRID === */
.card-picker-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;
  max-height: 180px; overflow-y: auto; padding: 4px;
}
.card-picker {
  background: rgba(14, 11, 38, 0.75); border: 1px solid rgba(0, 245, 255, 0.25);
  border-radius: 12px; padding: 12px 10px; text-align: center; cursor: pointer;
  transition: all var(--transition); font-size: 0.8rem; font-weight: 600; color: var(--fg-muted);
}
.card-picker:hover { border-color: var(--neon-cyan); box-shadow: var(--glow-cyan); color: var(--neon-cyan); transform: translateY(-2px); }
.card-picker.active {
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.25), rgba(183, 42, 255, 0.18));
  border-color: var(--neon-cyan); color: var(--fg); box-shadow: var(--glow-cyan);
}

/* === HITUNG BUTTON === */
.hitung-btn {
  width: 100%; margin-top: 14px; padding: 13px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  border: none; border-radius: 14px; color: #030014; font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all var(--transition);
  text-transform: uppercase; letter-spacing: 1.5px;
}
.hitung-btn:hover { transform: translateY(-2px); box-shadow: var(--glow-cyan-lg); }
.hitung-btn:active { transform: translateY(0); }

/* === RESULT DISPLAY === */
#resultDisplay {
  margin-top: 16px; padding: 18px 22px; background: rgba(14, 11, 40, 0.75);
  border: 1px solid rgba(0, 245, 255, 0.3); border-radius: 14px;
  font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--neon-cyan);
  text-align: center; min-height: 55px; display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); cursor: pointer;
}
#resultDisplay:hover { border-color: var(--neon-cyan); box-shadow: var(--glow-cyan); }
#resultDisplay.has-value { animation: resultGlow 0.4s var(--transition-bloom); }
@keyframes resultGlow { 0% { box-shadow: none; } 50% { box-shadow: 0 0 25px rgba(0, 245, 255, 0.6); } 100% { box-shadow: var(--glow-cyan); } }

/* === MODAL SELECTOR === */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(3, 0, 20, 0.85); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center; z-index: 2000;
  animation: modalFadeIn 0.3s var(--transition-bloom);
}
.modal-overlay.show { display: flex; }
@keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-box {
  background: linear-gradient(135deg, rgba(18, 14, 48, 0.95), rgba(26, 20, 62, 0.92));
  border: 1px solid var(--neon-cyan); border-radius: 20px; padding: 24px;
  max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
  box-shadow: var(--glow-cyan-lg); animation: modalBloom 0.4s var(--transition-bloom);
}
@keyframes modalBloom { from { transform: scale(0.95) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid rgba(0, 245, 255, 0.2); }
.modal-title { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan); font-size: 1.1rem; }
.modal-close {
  background: none; border: none; color: var(--fg-muted); font-size: 1.5rem; cursor: pointer;
  transition: all var(--transition); width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: rgba(255, 0, 170, 0.2); color: var(--neon-pink); }

.modal-chip {
  display: inline-flex; padding: 10px 18px; margin: 4px; background: rgba(14, 11, 38, 0.85);
  border: 1px solid rgba(0, 245, 255, 0.3); border-radius: 25px; color: var(--fg);
  font-size: 0.85rem; cursor: pointer; transition: all var(--transition);
}
.modal-chip:hover, .modal-chip.active { border-color: var(--neon-cyan); box-shadow: var(--glow-cyan); background: rgba(0, 245, 255, 0.15); }

/* === TOAST === */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(120px) scale(0.9);
  background: linear-gradient(135deg, rgba(18, 14, 45, 0.95), rgba(26, 20, 62, 0.92));
  color: var(--neon-cyan); padding: 13px 30px; border-radius: 50px; font-weight: 700;
  font-size: 0.92rem; opacity: 0; transition: all var(--transition-bloom); z-index: 1000;
  border: 1px solid var(--neon-cyan); backdrop-filter: blur(15px); text-shadow: 0 0 10px rgba(0, 245, 255, 0.7);
  box-shadow: var(--glow-cyan-lg);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); animation: toastBloom 0.5s var(--transition-bloom); }
@keyframes toastBloom {
  0% { transform: translateX(-50%) translateY(120px) scale(0.88); opacity: 0; }
  40% { transform: translateX(-50%) translateY(-8px) scale(1.03); }
  100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
}

/* === SPINNER & SCROLLBAR === */
.spinner { width: 32px; height: 32px; border: 3px solid rgba(0, 245, 255, 0.25); border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: rgba(8, 6, 28, 0.4); }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--neon-cyan), var(--neon-purple)); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, var(--neon-purple), var(--neon-pink)); }

/* === AUTO-UPDATE & RESPONSIVE === */
.auto-update-indicator {
  position: fixed; top: 18px; right: 18px; background: rgba(0, 245, 255, 0.12);
  border: 1px solid var(--neon-cyan); border-radius: 10px; padding: 7px 14px;
  font-size: 0.78rem; color: var(--neon-cyan); display: none; align-items: center; gap: 7px;
  z-index: 1000; backdrop-filter: blur(10px); animation: pulse 1.2s infinite;
}
.auto-update-indicator.show { display: flex; }
@keyframes pulse { 0%, 100% { opacity: 0.75; } 50% { opacity: 1; } }

@media (max-width: 768px) {
  .settings-panel { flex-direction: column; align-items: stretch; }
  .setting-item { width: 100%; justify-content: space-between; }
  .input-neon { width: 100%; }
  .data-grid { grid-template-columns: 1fr; }
  .main-title { font-size: clamp(1.6rem, 6.5vw, 2.6rem); }
  .tab-btn { padding: 10px 22px; font-size: 0.85rem; }
  .card-picker-grid { grid-template-columns: repeat(2, 1fr); }
}
::selection { background: rgba(0, 245, 255, 0.25); color: var(--fg); }
button:focus-visible, input:focus-visible { outline: 2px solid var(--neon-cyan); outline-offset: 2px; box-shadow: var(--glow-cyan); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body>
<div class="bg-animated"></div><div class="grid-overlay"></div>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="particles" id="particles"></div>
<div id="toast" class="toast">✨ Berhasil!</div>
<div class="auto-update-indicator" id="autoUpdateIndicator"><span>🔄</span><span>Auto-Update Aktif</span></div>

<div class="main-container">
  <header class="header-section"><h1 class="main-title">⚡ PREDIKSI & HITUNG TOGEL ⚡</h1></header>
  <nav class="tabs-container">
    <button class="tab-btn active" data-tab="prediksi">🔮 Prediksi</button>
    <button class="tab-btn" data-tab="hitung">🧮 Hitung</button>
  </nav>
  <div class="content-box">
    <!-- TAB PREDIKSI -->
    <div id="tab-prediksi" class="tab-content">
      <div class="settings-panel">
        <div class="setting-item"><span class="setting-label">📅 Tanggal</span><input type="date" id="input-tanggal" class="input-neon" onchange="autoUpdateTanggal()"></div>
        <button class="btn-neon" id="btn-tanggal" onclick="manualUpdateTanggal()">⚡ Update</button>
        <span class="status-badge" id="status-tanggal"></span>
      </div>
      <div class="data-grid">
        <div class="section-box"><div class="section-header"><h3 class="section-title">🔮 Prediksi</h3><span class="badge-count" id="count-prediksi">0</span></div><div class="search-box"><input type="text" class="search-input" id="search-prediksi" placeholder="🔍 Cari..."></div><div class="section-content" id="list-prediksi"><div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div></div></div>
        <div class="section-box"><div class="section-header"><h3 class="section-title">📅 Jadwal</h3><span class="badge-count" id="count-jadwal">0</span></div><div class="search-box"><input type="text" class="search-input" id="search-jadwal" placeholder="🔍 Cari..."></div><div class="section-content" id="list-jadwal"><div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div></div></div>
        <div class="section-box"><div class="section-header"><h3 class="section-title">🔗 Link Live</h3><span class="badge-count" id="count-link">0</span></div><div class="search-box"><input type="text" class="search-input" id="search-link" placeholder="🔍 Cari..."></div><div class="section-content" id="list-link"><div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div></div></div>
      </div>
    </div>

    <!-- TAB HITUNG - NO DROPDOWN STYLE -->
    <div id="tab-hitung" class="tab-content" style="display:none;">
      <div class="settings-panel">
        <div class="setting-item"><span class="setting-label">💰 Nominal</span><input type="number" id="input-nominal" class="input-neon" placeholder="0" onchange="autoUpdateNominal()"></div>
        <button class="btn-neon" id="btn-nominal" onclick="manualUpdateNominal()">⚡ Update</button>
        <span class="status-badge" id="status-nominal"></span>
      </div>

      <!-- 🎯 CHIP SELECTOR FOR TIPE -->
      <div class="selector-section">
        <div class="selector-label">📊 Pilih Tipe Hitungan</div>
        <div class="chip-scroll" id="chipTipeContainer">
          <button class="chip-btn active" data-value="">Semua</button>
          <!-- Chips will be populated by JS -->
        </div>
      </div>

      <!-- 🎯 CARD PICKER FOR LABEL -->
      <div class="selector-section">
        <div class="selector-label">🏷️ Pilih Label <button class="modal-open-btn" style="margin-left:8px;padding:4px 10px;font-size:0.7rem;background:rgba(183,42,255,0.2);border:1px solid var(--neon-purple);border-radius:8px;color:var(--neon-purple);cursor:pointer;">🔍 Lihat Semua</button></div>
        <div class="card-picker-grid" id="cardLabelContainer">
          <div class="card-picker active" data-value="">Pilih...</div>
          <!-- Cards will be populated by JS -->
        </div>
      </div>

      <button onclick="tampilkanValueHitungan()" class="hitung-btn">🔮 Tampilkan Hasil</button>
      <div id="resultDisplay"><span style="color:var(--fg-muted);">Silakan pilih tipe dan label</span></div>

      <div class="data-grid" id="container-hitung" style="margin-top:16px;"><div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<!-- 🎯 MODAL FOR FULL LIST -->
<div class="modal-overlay" id="labelModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">🏷️ Pilih Label</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalChipsContainer" style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;"></div>
  </div>
</div>

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4', keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompokData: {}, selectedTipe: '', selectedLabel: '' };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'), inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'), autoUpdate: $('autoUpdateIndicator'),
  chipTipe: $('chipTipeContainer'), cardLabel: $('cardLabelContainer'), result: $('resultDisplay'),
  modal: $('labelModal'), modalChips: $('modalChipsContainer')
};

// === UTILS ===
function createParticles() {
  const c = document.getElementById('particles'); if (!c) return;
  for(let i=0;i<50;i++) { const p=document.createElement('div'); p.className='particle';
    p.style.left=Math.random()*100+'%'; p.style.animationDelay=Math.random()*25+'s';
    p.style.animationDuration=(20+Math.random()*15)+'s'; c.appendChild(p); }
}
function showToast(m) { dom.toast.textContent='✨ '+m; dom.toast.classList.add('show'); setTimeout(()=>dom.toast.classList.remove('show'),3000); }
function showAutoUpdate() { if(dom.autoUpdate) { dom.autoUpdate.classList.add('show'); setTimeout(()=>dom.autoUpdate.classList.remove('show'),2000); } }
function copyText(t) { let f=t; try{f=decodeURIComponent(t)}catch(e){} navigator.clipboard.writeText(f).then(()=>showToast('📋 Disalin: '+(f.length>20?f.substring(0,20)+'...':f))).catch(()=>showToast('❌ Gagal')); }
function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }
function parseCSV(text) { let p=[],row=[],entry="",st=0; for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(st===0){if(c==='"')st=1;else if(c===','){row.push(entry);entry="";}else if(c==='\r'&&n==='\n'){row.push(entry);p.push(row);row=[];entry="";i++;}else if(c==='\n'||c==='\r'){row.push(entry);p.push(row);row=[];entry="";}else entry+=c;}else if(st===1){if(c==='"'&&n==='"'){entry+='"';i++;}else if(c==='"')st=0;else entry+=c;}} if(entry||row.length){row.push(entry);p.push(row);} return p; }
function safeGet(r,i){return r&&r[i]!==undefined?r[i]:"";}
async function updateSheet(a,v){if(SCRIPT_URL.includes('YOUR_SCRIPT_ID')){showToast('❌ Script URL belum disetup!');return false;}try{const r=await fetch(SCRIPT_URL+'?'+new URLSearchParams({action:a,value:v}));return (await r.text()).includes('SUCCESS');}catch(e){console.error(e);return false;}}

// === FETCH DATA ===
async function fetchPrediksi() {
  try {
    const res=await fetch(CONFIG.sheetPrediksi+'&t='+Date.now()), data=parseCSV(await res.text());
    state.prediksi=[];state.jadwal=[];state.link=[];
    if(data[0]){const raw=safeGet(data[0],1);if(raw){const p=raw.split('/');if(p.length===3){const f=`${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;dom.inTgl.value=f;dom.statTgl.textContent=f;}}}
    for(let i=2;i<=84&&i<data.length;i++){const t=safeGet(data[i],1);if(t)state.prediksi.push({title:t.split(/[\s,]+/)[0],content:t});}
    for(let i=2;i<=55&&i<data.length;i++){const t=safeGet(data[i],2);if(t)state.jadwal.push({title:t.split(/[\s,]+/)[0],content:t});}
    for(let i=56;i<=82&&i<data.length;i++){const t=safeGet(data[i],2);if(t)state.link.push({title:t.split(/[\s,]+/)[0],content:t});}
    renderPrediksi();
  } catch(e){console.error(e);dom.listP.innerHTML='<p style="color:var(--fg-muted);text-align:center;padding:20px;">❌ Gagal</p>';}
}
async function fetchHitung() {
  try {
    const res=await fetch(CONFIG.sheetHitung+'&t='+Date.now()), data=parseCSV(await res.text());
    if(data[0]){const nom=safeGet(data[0],23);if(nom){dom.inNom.value=nom;dom.statNom.textContent="💰 Rp "+formatNum(nom);}}
    const sec=[{tr:0,tc:24,s:2,e:42},{tr:43,tc:24,s:45,e:80},{tr:81,tc:24,s:83,e:119},{tr:120,tc:24,s:122,e:153},{tr:154,tc:24,s:156,e:179},{tr:180,tc:24,s:182,e:213},{tr:215,tc:24,s:217,e:248},{tr:249,tc:24,s:251,e:282},{tr:283,tc:24,s:285,e:316}];
    state.hitung=sec.map(s=>{let t=safeGet(data[s.tr],s.tc)||"PASARAN",it=[];for(let i=s.s;i<=s.e&&i<data.length;i++){if(data[i]){const ty=safeGet(data[i],23),rv=safeGet(data[i],24);if(ty||rv)it.push({type:ty,res:rv});}}return{title:t,items:it};}).filter(x=>x.items.length>0);
    renderHitung();
  } catch(e){console.error(e);dom.contH.innerHTML='<p style="color:var(--fg-muted);text-align:center;padding:20px;">❌ Gagal</p>';}
}
function renderList(c,items,srch){const f=items.filter(i=>i.content.toLowerCase().includes(srch.toLowerCase()));if(!f.length){c.innerHTML='<p style="color:var(--fg-muted);text-align:center;padding:20px;">📭 Tidak ada data</p>';return;}c.innerHTML=f.map(v=>`<div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}')"><div class="item-label">📋 Judul</div><div class="item-title">${v.title}</div><div class="item-label">💬 Isi (Klik Copy)</div><div class="item-content">${v.content}</div></div>`).join('');}
function renderPrediksi(){renderList(dom.listP,state.prediksi,dom.srcP.value);renderList(dom.listJ,state.jadwal,dom.srcJ.value);renderList(dom.listL,state.link,dom.srcL.value);dom.cntP.textContent=state.prediksi.length;dom.cntJ.textContent=state.jadwal.length;dom.cntL.textContent=state.link.length;}
function renderHitung(){if(!state.hitung.length){dom.contH.innerHTML='<p style="color:var(--fg-muted);text-align:center;">📭 Tidak ada data</p>';return;}dom.contH.innerHTML=state.hitung.map(s=>`<div class="pasaran-box"><div class="pasaran-header"><h3 class="pasaran-title">🎯 ${s.title}</h3></div><div class="pasaran-content">${s.items.map(it=>`<div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}')"><span class="bet-type">${it.type}</span><span class="bet-result">${it.res}</span></div>`).join('')}</div></div>`).join('');}

// === 🎯 CHIP/CARD SELECTOR LOGIC ===
async function loadHitungData() {
  try {
    const res=await fetch(CONFIG.sheetHitung+'&t='+Date.now()), data=parseCSV(await res.text());
    if(data[0]){const nom=safeGet(data[0],23);if(nom){dom.inNom.value=nom;dom.statNom.textContent="💰 Rp "+formatNum(nom);}}
    const sec=[{tr:0,tc:24,s:2,e:42,t:"SEMUA PASARAN"},{tr:43,tc:24,s:45,e:80,t:"TOTO MACAU 4D"},{tr:81,tc:24,s:83,e:119,t:"TOTO MACAU 5D"},{tr:120,tc:24,s:122,e:153,t:"KINGKONG 4D"},{tr:154,tc:24,s:156,e:179,t:"BONUS"},{tr:180,tc:24,s:182,e:213,t:"JAKARTA"},{tr:215,tc:24,s:217,e:248,t:"TOTOMALI"},{tr:249,tc:24,s:251,e:282,t:"HOKIDRAW"},{tr:283,tc:24,s:285,e:316,t:"SYDNEY/HK"}];
    state.kelompokData={};state.selectedTipe='';state.selectedLabel='';
    
    // Render CHIP buttons for Tipe
    dom.chipTipe.innerHTML='<button class="chip-btn active" data-value="">✨ Semua</button>';
    sec.forEach(s=>{const items=[];for(let i=s.s;i<=s.e&&i<data.length;i++){if(data[i]){const lb=safeGet(data[i],23),vl=safeGet(data[i],24);if(lb||vl)items.push({label:lb||"-",value:vl||"-"});}}if(items.length>0){state.kelompokData[s.t]=items;const btn=document.createElement('button');btn.className='chip-btn';btn.dataset.value=s.t;btn.textContent=s.t;btn.onclick=()=>selectTipe(s.t,btn);dom.chipTipe.appendChild(btn);}});
    
    // Render initial card pickers
    renderCardPickers(Object.keys(state.kelompokData)[0]||'');
  } catch(e){console.error("Error load:",e);}
}

function selectTipe(val,btn){
  state.selectedTipe=val; state.selectedLabel='';
  document.querySelectorAll('.chip-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active'); else document.querySelector('.chip-btn[data-value="'+val+'"]')?.classList.add('active');
  renderCardPickers(val);
  updateResultDisplay();
}

function renderCardPickers(tipe){
  dom.cardLabel.innerHTML='';
  const items=state.kelompokData[tipe]||Object.values(state.kelompokData).flat()||[];
  const unique=[...new Set(items.map(i=>i.label))].filter(l=>l&&l!=="-").slice(0,20);
  if(!unique.length){dom.cardLabel.innerHTML='<div class="card-picker active">Pilih...</div>';return;}
  const all=document.createElement('div');all.className='card-picker active';all.dataset.value='';all.textContent='✨ Semua';all.onclick=()=>selectLabel('',all);dom.cardLabel.appendChild(all);
  unique.forEach(lbl=>{const c=document.createElement('div');c.className='card-picker';c.dataset.value=lbl;c.textContent=lbl.length>12?lbl.substring(0,12)+'…':lbl;c.onclick=()=>selectLabel(lbl,c);dom.cardLabel.appendChild(c);});
  // Update modal
  dom.modalChips.innerHTML=unique.map(l=>`<button class="modal-chip" data-value="${l}">${l}</button>`).join('');
  dom.modalChips.querySelectorAll('.modal-chip').forEach(btn=>btn.onclick=()=>{selectLabel(btn.dataset.value,null);closeModal();});
}

function selectLabel(val,el){
  state.selectedLabel=val;
  document.querySelectorAll('.card-picker').forEach(c=>c.classList.remove('active'));
  if(el)el.classList.add('active'); else document.querySelector('.card-picker[data-value="'+val+'"]')?.classList.add('active');
  updateResultDisplay();
}

function updateResultDisplay(){
  if(!state.selectedTipe&&!state.selectedLabel){dom.result.innerHTML='<span style="color:var(--fg-muted);">Silakan pilih tipe dan label</span>';dom.result.classList.remove('has-value');return;}
  const items=state.kelompokData[state.selectedTipe]||Object.values(state.kelompokData).flat();
  const item=items?.find(i=>i.label===state.selectedLabel)||(state.selectedLabel?items?.find(i=>i.label?.includes(state.selectedLabel)):null);
  if(item?.value){dom.result.innerHTML=`<span style="font-size:1.2em;font-weight:700;">${item.value}</span>`;dom.result.classList.add('has-value');dom.result.onclick=()=>{copyText(item.value);dom.result.style.boxShadow='0 0 30px rgba(0,255,157,0.8)';setTimeout(()=>dom.result.style.boxShadow='',300);};}
  else{dom.result.innerHTML='<span style="color:var(--fg-muted);">⏳ Memuat hasil...</span>';dom.result.classList.remove('has-value');}
}

function tampilkanValueHitungan(){updateResultDisplay();if(dom.result.classList.contains('has-value'))showToast('✨ Hasil ditampilkan!');else showToast('⚠️ Pilih label terlebih dahulu');}

// === MODAL ===
function openModal(){dom.modal.classList.add('show');document.body.style.overflow='hidden';}
function closeModal(){dom.modal.classList.remove('show');document.body.style.overflow='';}
document.querySelectorAll('.modal-open-btn').forEach(b=>b.onclick=openModal);
dom.modal?.addEventListener('click',(e)=>{if(e.target===dom.modal)closeModal();});
document.addEventListener('keydown',(e)=>{if(e.key==='Escape')closeModal();});

// === AUTO-UPDATE ===
let autoTimeout=null;
function autoUpdateTanggal(){showAutoUpdate();clearTimeout(autoTimeout);autoTimeout=setTimeout(manualUpdateTanggal,1000);}
function manualUpdateTanggal(){if(!dom.inTgl.value)return showToast("⚠️ Pilih tanggal!");const p=dom.inTgl.value.split('-');const fd=`${p[1]}/${p[2]}/${p[0]}`;dom.btnTgl.disabled=true;dom.statTgl.textContent="⏳...";updateSheet('updateTanggal',fd).then(ok=>{dom.btnTgl.disabled=false;if(ok){localStorage.setItem(CONFIG.keyTanggal,dom.inTgl.value);dom.statTgl.textContent="✅";showToast("📅 Updated!");fetchPrediksi();fetchHitung();loadHitungData();}else{dom.statTgl.textContent="❌";showToast("❌ Cek URL");}});}
function autoUpdateNominal(){showAutoUpdate();clearTimeout(autoTimeout);autoTimeout=setTimeout(manualUpdateNominal,1000);}
function manualUpdateNominal(){if(!dom.inNom.value)return showToast("⚠️ Isi nominal!");dom.btnNom.disabled=true;dom.statNom.textContent="⏳...";updateSheet('updateNominal',dom.inNom.value).then(ok=>{dom.btnNom.disabled=false;if(ok){localStorage.setItem(CONFIG.keyNominal,dom.inNom.value);dom.statNom.textContent="💰 Rp "+formatNum(dom.inNom.value);showToast("💰 Updated!");fetchPrediksi();fetchHitung();loadHitungData();}else{dom.statNom.textContent="❌";showToast("❌ Cek URL");}});}

// === INIT ===
function init(){
  document.querySelectorAll('.tab-btn').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));t.classList.add('active');dom.tabP.style.display=t.dataset.tab==='prediksi'?'block':'none';dom.tabH.style.display=t.dataset.tab==='hitung'?'block':'none';});
  dom.srcP.oninput=()=>renderList(dom.listP,state.prediksi,dom.srcP.value);
  dom.srcJ.oninput=()=>renderList(dom.listJ,state.jadwal,dom.srcJ.value);
  dom.srcL.oninput=()=>renderList(dom.listL,state.link,dom.srcL.value);
  fetchPrediksi();fetchHitung();loadHitungData();
}
document.addEventListener('DOMContentLoaded',()=>{createParticles();init();setTimeout(()=>showToast('🚀 Neon Blue Ultra Loaded!'),1200);});
</script>
</body>
</html>

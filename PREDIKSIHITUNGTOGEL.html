<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 PREDIKSI DAN HITUNG TOGEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #010810;
            --bg-secondary: #051525;
            --bg-card: #0a1e33;
            --fg: #e0f4ff;
            --muted: #5a8cb0;
            --accent: #00e5ff;
            --accent-glow: 0 0 10px #00e5ff, 0 0 20px rgba(0,229,255,0.5), 0 0 40px rgba(0,229,255,0.2);
            --accent-dark: #0099cc;
            --border: #0a4d75;
            --border-glow: 1px solid rgba(0,229,255,0.4);
            --success: #00ff88;
            --gradient-main: linear-gradient(135deg, #00e5ff 0%, #0099cc 100%);
            --gradient-card: linear-gradient(180deg, rgba(10,30,51,0.9) 0%, rgba(5,21,37,0.95) 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* ===== BACKGROUND CYBER ===== */
        .bg-cyber {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; overflow: hidden; pointer-events: none;
            background: radial-gradient(ellipse at 50% 0%, rgba(0,50,80,0.25) 0%, transparent 70%);
        }
        .grid-lines {
            position: absolute; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 30s linear infinite;
            opacity: 0.6;
        }
        .floating-orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.25;
            animation: floatOrb 25s ease-in-out infinite alternate;
        }
        .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -15%; left: -10%; animation-delay: 0s; }
        .orb-2 { width: 450px; height: 450px; background: #0066ff; bottom: -10%; right: -5%; animation-delay: -12s; }
        .orb-3 { width: 300px; height: 300px; background: #7b2cff; top: 40%; right: 10%; animation-delay: -6s; opacity: 0.15; }

        @keyframes gridMove { 0% { transform: translate(0,0); } 100% { transform: translate(40px,40px); } }
        @keyframes floatOrb { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(30px,20px) scale(1.05); } }

        /* ===== CONTAINER & LAYOUT ===== */
        .main-container { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 16px 20px 40px; }
        
        /* ===== HEADER ===== */
        .header-section { text-align: center; padding: 25px 0 20px; position: relative; }
        .header-section::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 200px; height: 2px;
            background: var(--gradient-main);
            box-shadow: var(--accent-glow);
            border-radius: 2px;
        }
        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.6rem, 4.5vw, 2.8rem);
            font-weight: 900; letter-spacing: 3px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, #fff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: textShine 4s linear infinite;
            text-shadow: 0 0 20px rgba(0,229,255,0.3);
            margin-bottom: 8px;
        }
        @keyframes textShine { to { background-position: 200% center; } }
        .header-subtitle { color: var(--muted); font-size: 0.9rem; opacity: 0.9; }

        /* ===== TABS ===== */
        .tabs-container { display: flex; justify-content: center; gap: 0; margin: 20px 0 0; position: relative; }
        .tabs-container::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }
        .tab-btn {
            padding: 14px 32px; font-family: 'Orbitron', sans-serif;
            font-weight: 700; font-size: 0.85rem; letter-spacing: 1px;
            color: var(--muted); background: rgba(5,21,37,0.6);
            border: var(--border-glow); border-bottom: none;
            cursor: pointer; transition: all 0.3s ease;
            position: relative; overflow: hidden; text-transform: uppercase;
        }
        .tab-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,229,255,0.15), transparent);
            transition: left 0.5s;
        }
        .tab-btn:hover::before { left: 100%; }
        .tab-btn:first-child { border-radius: 12px 0 0 0; }
        .tab-btn:last-child { border-radius: 0 12px 0 0; }
        .tab-btn.active {
            color: var(--accent); background: var(--bg-secondary);
            border-color: var(--accent); box-shadow: var(--accent-glow);
        }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px;
            background: var(--gradient-main); box-shadow: var(--accent-glow);
        }

        /* ===== CONTENT BOX ===== */
        .content-box {
            background: var(--gradient-card);
            border: var(--border-glow);
            border-top: 2px solid var(--accent);
            border-radius: 0 0 18px 18px;
            padding: 20px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .content-box::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; height: 2px;
            background: var(--gradient-main); border-radius: 18px 18px 0 0;
            box-shadow: var(--accent-glow);
        }

        /* ===== SETTINGS PANEL (COMPACT + GLOW) ===== */
        .settings-panel {
            background: rgba(0,0,0,0.35);
            border: var(--border-glow);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
            box-shadow: inset 0 0 20px rgba(0,229,255,0.05);
        }
        .setting-item { display: flex; align-items: center; gap: 12px; }
        .setting-label {
            color: var(--muted); font-size: 0.8rem; white-space: nowrap;
            display: flex; align-items: center; gap: 6px;
        }
        .setting-label::before {
            content: ''; width: 3px; height: 12px; background: var(--accent);
            border-radius: 2px; box-shadow: 0 0 8px var(--accent);
        }
        .input-compact {
            padding: 10px 14px; background: rgba(0,0,0,0.5);
            border: var(--border-glow); border-radius: 8px;
            color: var(--fg); font-size: 0.9rem; font-family: 'Space Grotesk', sans-serif;
            width: 150px; transition: all 0.3s ease;
        }
        .input-compact:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,229,255,0.2), var(--accent-glow);
            background: rgba(0,0,0,0.7);
        }
        .btn-action {
            padding: 10px 20px; background: var(--gradient-main);
            border: none; border-radius: 8px; color: var(--bg);
            font-family: 'Orbitron', sans-serif; font-weight: 700;
            font-size: 0.8rem; letter-spacing: 0.5px;
            cursor: pointer; transition: all 0.3s ease;
            white-space: nowrap; position: relative; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,229,255,0.3);
        }
        .btn-action::after {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .btn-action:hover::after { opacity: 1; }
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,229,255,0.5), var(--accent-glow);
        }
        .btn-action:active { transform: translateY(0); }
        .status-text {
            font-size: 0.8rem; color: var(--accent);
            margin-left: 8px; padding: 4px 12px;
            background: rgba(0,229,255,0.1); border-radius: 20px;
            border: 1px solid rgba(0,229,255,0.3);
            animation: pulseStatus 2s infinite;
        }
        @keyframes pulseStatus { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* ===== AUTO-SYNC INDICATOR ===== */
        .sync-indicator {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.75rem; color: var(--success);
            padding: 3px 10px; background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.3); border-radius: 12px;
            margin-left: 10px;
        }
        .sync-dot {
            width: 6px; height: 6px; background: var(--success);
            border-radius: 50%; box-shadow: 0 0 8px var(--success);
            animation: syncBlink 1.5s infinite;
        }
        @keyframes syncBlink { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

        /* ===== GRID LAYOUT ===== */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        /* ===== SECTION BOX (ENHANCED) ===== */
        .section-box {
            background: rgba(0,0,0,0.3);
            border: var(--border-glow);
            border-radius: 14px;
            overflow: hidden;
            display: flex; flex-direction: column;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .section-box:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 30px rgba(0,229,255,0.15), var(--accent-glow);
            transform: translateY(-2px);
        }
        .section-header {
            background: linear-gradient(90deg, rgba(0,229,255,0.12) 0%, transparent 100%);
            padding: 14px 18px;
            border-bottom: var(--border-glow);
            display: flex; justify-content: space-between; align-items: center;
        }
        .section-title {
            font-family: 'Orbitron', sans-serif; font-weight: 700;
            color: var(--accent); font-size: 0.95rem; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-title::before {
            content: ''; width: 4px; height: 16px; background: var(--accent);
            border-radius: 2px; box-shadow: 0 0 8px var(--accent);
        }
        .badge-count {
            background: rgba(0,229,255,0.15); color: var(--accent);
            padding: 4px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600;
            border: 1px solid rgba(0,229,255,0.4);
            box-shadow: 0 0 10px rgba(0,229,255,0.2);
        }

        .search-box { padding: 12px 16px; border-bottom: var(--border-glow); }
        .search-input {
            width: 100%; padding: 10px 14px;
            background: rgba(0,0,0,0.45); border: var(--border-glow);
            border-radius: 8px; color: var(--fg); font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,229,255,0.2);
        }
        .search-input::placeholder { color: var(--muted); opacity: 0.7; }

        .section-content {
            padding: 12px 16px;
            overflow-y: auto;
            max-height: 480px;
            flex-grow: 1;
            scroll-behavior: smooth;
        }

        /* ===== ITEM CARD (PREDIKSI) ===== */
        .item-card {
            background: var(--bg-card);
            border: 1px solid rgba(10,77,117,0.4);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .item-card::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,229,255,0.1), transparent);
            transition: left 0.4s;
        }
        .item-card:hover::before { left: 100%; }
        .item-card:hover {
            border-color: var(--accent);
            transform: translateX(4px);
            box-shadow: 0 4px 15px rgba(0,229,255,0.2);
        }
        .item-label {
            font-size: 0.65rem; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin-bottom: 4px; display: flex; align-items: center; gap: 4px;
        }
        .item-label::before {
            content: ''; width: 2px; height: 10px; background: var(--accent);
            border-radius: 1px;
        }
        .item-title {
            color: var(--accent); font-weight: 600;
            margin-bottom: 6px; font-size: 0.95rem;
            text-shadow: 0 0 8px rgba(0,229,255,0.3);
        }
        .item-content {
            font-size: 0.85rem; color: var(--fg);
            line-height: 1.5; white-space: pre-wrap; word-break: break-word;
            opacity: 0.95;
        }
        .item-copy-hint {
            margin-top: 8px; font-size: 0.7rem; color: var(--muted);
            display: flex; align-items: center; gap: 4px; opacity: 0.8;
        }

        /* ===== HITUNG SECTION - PREMIUM REDESIGN ===== */
        .hitung-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
        }

        /* PASARAN BOX - GLASSMORPHISM STYLE */
        .pasaran-box {
            background: linear-gradient(135deg, rgba(10,30,51,0.95) 0%, rgba(5,21,37,0.98) 100%);
            border: var(--border-glow);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 6px 25px rgba(0,0,0,0.4);
            position: relative;
        }
        .pasaran-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--gradient-main);
            box-shadow: var(--accent-glow);
            opacity: 0.8;
        }
        .pasaran-box:hover {
            border-color: var(--accent);
            box-shadow: 0 12px 40px rgba(0,229,255,0.2), var(--accent-glow);
            transform: translateY(-3px);
        }

        /* PASARAN HEADER - GRADIENT BADGE */
        .pasaran-header {
            background: linear-gradient(90deg, 
                rgba(0,229,255,0.18) 0%, 
                rgba(0,229,255,0.08) 30%, 
                transparent 100%);
            padding: 16px 20px;
            border-bottom: var(--border-glow);
            display: flex; justify-content: space-between; align-items: center;
            position: relative;
        }
        .pasaran-header::after {
            content: ''; position: absolute; bottom: -1px; left: 20px; right: 20px;
            height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }
        .pasaran-title {
            font-family: 'Orbitron', sans-serif; font-weight: 800;
            color: var(--accent); font-size: 1rem; letter-spacing: 1px;
            display: flex; align-items: center; gap: 10px;
            text-shadow: 0 0 12px rgba(0,229,255,0.4);
        }
        .pasaran-title::before {
            content: '🎰'; font-size: 1.2rem; animation: spinSlow 8s linear infinite;
        }
        @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .pasaran-stats {
            display: flex; gap: 8px;
        }
        .stat-badge {
            background: rgba(0,229,255,0.12); color: var(--accent);
            padding: 3px 10px; border-radius: 12px;
            font-size: 0.7rem; font-weight: 600;
            border: 1px solid rgba(0,229,255,0.3);
        }

        /* PASARAN CONTENT - SCROLLABLE */
        .pasaran-content {
            padding: 12px 16px;
            max-height: 400px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: 8px;
        }

        /* BET ITEM - PREMIUM CARD STYLE */
        .bet-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(10,77,117,0.4);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .bet-item::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
            background: var(--gradient-main); opacity: 0; transition: opacity 0.3s;
        }
        .bet-item:hover {
            border-color: var(--accent);
            background: rgba(0,229,255,0.08);
            transform: translateX(4px);
            box-shadow: 0 4px 15px rgba(0,229,255,0.15);
        }
        .bet-item:hover::before { opacity: 1; }

        .bet-info { flex: 1; min-width: 0; }
        .bet-type {
            color: var(--fg); font-weight: 500; font-size: 0.9rem;
            margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .bet-desc {
            color: var(--muted); font-size: 0.75rem; opacity: 0.8;
        }

        .bet-result {
            font-family: 'Orbitron', sans-serif; font-weight: 800;
            color: var(--accent); font-size: 1rem; letter-spacing: 0.5px;
            background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(0,153,204,0.15));
            padding: 6px 14px; border-radius: 8px;
            border: 1px solid rgba(0,229,255,0.4);
            box-shadow: 0 0 12px rgba(0,229,255,0.2);
            white-space: nowrap;
            transition: all 0.2s ease;
            position: relative;
        }
        .bet-result::after {
            content: '📋'; position: absolute; right: -20px; opacity: 0;
            transition: all 0.2s ease; font-size: 0.8rem;
        }
        .bet-item:hover .bet-result::after { right: 8px; opacity: 1; }
        .bet-result:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0,229,255,0.4), var(--accent-glow);
        }

        /* WINNER HIGHLIGHT */
        .bet-item.winner {
            border-color: var(--success);
            background: linear-gradient(135deg, rgba(0,255,136,0.08), rgba(0,0,0,0.3));
        }
        .bet-item.winner .bet-result {
            color: var(--success);
            background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,255,136,0.1));
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(0,255,136,0.3);
        }
        .bet-item.winner::before { background: linear-gradient(180deg, var(--success), transparent); }

        /* ===== TOAST NOTIFICATION ===== */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--gradient-main);
            color: var(--bg);
            padding: 14px 28px;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700; font-size: 0.9rem; letter-spacing: 0.5px;
            opacity: 0; transition: all 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);
            z-index: 1000;
            box-shadow: 0 12px 40px rgba(0,229,255,0.5), var(--accent-glow);
            display: flex; align-items: center; gap: 10px;
        }
        .toast::before { content: '✓'; font-size: 1.2rem; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            box-shadow: 0 12px 40px rgba(255,107,107,0.5);
        }
        .toast.error::before { content: '⚠'; }

        /* ===== LOADING SPINNER ===== */
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(0,229,255,0.3);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center; padding: 40px 20px; color: var(--muted);
        }
        .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }

        /* ===== SCROLLBAR CUSTOM ===== */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.25); border-radius: 3px; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent-dark), var(--accent));
            border-radius: 3px; border: 1px solid rgba(0,229,255,0.3);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
            box-shadow: 0 0 10px rgba(0,229,255,0.5);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .settings-panel { flex-direction: column; align-items: stretch; }
            .setting-item { width: 100%; justify-content: space-between; }
            .input-compact { width: 100%; }
            .data-grid, .hitung-container { grid-template-columns: 1fr; }
            .main-title { font-size: 1.8rem; }
            .tab-btn { padding: 12px 20px; font-size: 0.8rem; }
            .pasaran-content { max-height: 320px; }
        }

        /* ===== ACCESSIBILITY ===== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            box-shadow: 0 0 0 4px rgba(0,229,255,0.3);
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-cyber">
        <div class="grid-lines"></div>
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Berhasil!</div>

    <!-- Main Container -->
    <div class="main-container">
        
        <!-- Header -->
        <header class="header-section">
            <h1 class="main-title">🔮 PREDIKSI & HITUNG TOGEL</h1>
            <p class="header-subtitle">Auto-Sync System • Data Real-Time dari Google Sheets</p>
        </header>

        <!-- Tabs Navigation -->
        <nav class="tabs-container">
            <button class="tab-btn active" data-tab="prediksi">📊 PREDIKSI</button>
            <button class="tab-btn" data-tab="hitung">🧮 HITUNG</button>
        </nav>

        <!-- Content Box -->
        <div class="content-box">
            
            <!-- ===== TAB: PREDIKSI TOGEL ===== -->
            <div id="tab-prediksi" class="tab-content">
                
                <!-- Settings Panel -->
                <div class="settings-panel">
                    <div class="setting-item">
                        <span class="setting-label">📅 Tanggal (B1)</span>
                        <input type="date" id="input-tanggal" class="input-compact">
                    </div>
                    <button class="btn-action" id="btn-tanggal">💾 SIMPAN</button>
                    <span class="status-text" id="status-tanggal">-</span>
                    <span class="sync-indicator" id="sync-tanggal">
                        <span class="sync-dot"></span> Auto-Sync
                    </span>
                </div>

                <!-- Data Grid -->
                <div class="data-grid">
                    
                    <!-- PREDIKSI TOGEL -->
                    <div class="section-box">
                        <div class="section-header">
                            <h3 class="section-title">🔮 PREDIKSI TOGEL</h3>
                            <span class="badge-count" id="count-prediksi">0</span>
                        </div>
                        <div class="search-box">
                            <input type="text" class="search-input" id="search-prediksi" placeholder="🔍 Cari prediksi...">
                        </div>
                        <div class="section-content" id="list-prediksi">
                            <div style="display:flex;justify-content:center;padding:30px;"><div class="spinner"></div></div>
                        </div>
                    </div>

                    <!-- JADWAL PASARAN -->
                    <div class="section-box">
                        <div class="section-header">
                            <h3 class="section-title">📅 JADWAL PASARAN</h3>
                            <span class="badge-count" id="count-jadwal">0</span>
                        </div>
                        <div class="search-box">
                            <input type="text" class="search-input" id="search-jadwal" placeholder="🔍 Cari jadwal...">
                        </div>
                        <div class="section-content" id="list-jadwal">
                            <div style="display:flex;justify-content:center;padding:30px;"><div class="spinner"></div></div>
                        </div>
                    </div>

                    <!-- LINK LIVE PASARAN -->
                    <div class="section-box">
                        <div class="section-header">
                            <h3 class="section-title">🔗 LINK LIVE</h3>
                            <span class="badge-count" id="count-link">0</span>
                        </div>
                        <div class="search-box">
                            <input type="text" class="search-input" id="search-link" placeholder="🔍 Cari link...">
                        </div>
                        <div class="section-content" id="list-link">
                            <div style="display:flex;justify-content:center;padding:30px;"><div class="spinner"></div></div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- ===== TAB: HITUNG TOGEL (PREMIUM REDESIGN) ===== -->
            <div id="tab-hitung" class="tab-content" style="display:none;">
                
                <!-- Settings Panel -->
                <div class="settings-panel">
                    <div class="setting-item">
                        <span class="setting-label">💰 Nominal (X1)</span>
                        <input type="number" id="input-nominal" class="input-compact" placeholder="Rp">
                    </div>
                    <button class="btn-action" id="btn-nominal">🔄 HITUNG ULANG</button>
                    <span class="status-text" id="status-nominal">-</span>
                    <span class="sync-indicator" id="sync-nominal">
                        <span class="sync-dot"></span> Auto-Sync
                    </span>
                </div>

                <!-- Hitung Container - Premium Grid -->
                <div class="hitung-container" id="container-hitung">
                    <div style="display:flex;justify-content:center;padding:50px;width:100%;grid-column:1/-1;">
                        <div class="spinner"></div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script>
        // ===== KONFIGURASI UTAMA =====
        // ⚠️ PENTING: Ganti dengan URL Web App dari Google Apps Script Anda
        const SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE';

        const CONFIG = {
            sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
            sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810',
            keyTanggal: 'togel_tanggal_v5',
            keyNominal: 'togel_nominal_v5',
            // Auto-sync interval (ms) - cek update dari Sheet
            syncInterval: 30000 // 30 detik
        };

        // ===== STATE MANAGEMENT =====
        const state = {
            prediksi: [], jadwal: [], link: [], hitung: [],
            lastSync: { tanggal: null, nominal: null },
            isSyncing: false
        };

        // ===== DOM SELECTORS =====
        const $ = id => document.getElementById(id);
        const dom = {
            // Tabs
            tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
            // Prediksi Settings
            inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'), syncTgl: $('sync-tanggal'),
            // Hitung Settings
            inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'), syncNom: $('sync-nominal'),
            // Search
            srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
            // Lists
            listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
            // Counts
            cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
            // Hitung Container
            contH: $('container-hitung'),
            // Toast
            toast: $('toast')
        };

        // ===== UTILITIES =====
        function showToast(msg, type = 'success') {
            dom.toast.textContent = msg;
            dom.toast.className = `toast ${type} show`;
            setTimeout(() => dom.toast.classList.remove('show'), 3000);
        }

        function copyText(text, label = '') {
            let finalText = text;
            try { finalText = decodeURIComponent(text); } catch(e) {}
            if (!finalText || finalText === '-') return;
            
            navigator.clipboard.writeText(finalText).then(() => {
                const preview = finalText.length > 25 ? finalText.substring(0, 25) + '...' : finalText;
                showToast(`📋 ${label ? label + ': ' : ''}${preview}`);
            }).catch(() => showToast('❌ Gagal menyalin', 'error'));
        }

        function formatRupiah(n) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
        }

        function parseDateInput(dateStr) {
            if (!dateStr) return '';
            // Handle MM/DD/YYYY from sheet
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                return `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
            }
            // Handle YYYY-MM-DD
            return dateStr;
        }

        function formatDateDisplay(dateStr) {
            if (!dateStr) return '-';
            try {
                const d = new Date(dateStr);
                return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
            } catch { return dateStr; }
        }

        // ===== ROBUST CSV PARSER =====
        function parseCSV(text) {
            const rows = [], row = [];
            let cell = '', inQuotes = false, i = 0;
            
            while (i < text.length) {
                const char = text[i], next = text[i+1];
                
                if (char === '"') {
                    if (inQuotes && next === '"') { cell += '"'; i++; }
                    else inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    row.push(cell); cell = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    row.push(cell); rows.push(row);
                    cell = ''; row.length = 0;
                    if (char === '\r' && next === '\n') i++;
                } else { cell += char; }
                i++;
            }
            if (cell || row.length) { row.push(cell); rows.push(row); }
            return rows;
        }

        function safeGet(rows, r, c) {
            try { return rows[r]?.[c]?.toString()?.trim() || ''; } catch { return ''; }
        }

        // ===== GOOGLE SHEETS API (READ + WRITE) =====
        async function fetchCSV(url) {
            const res = await fetch(url + '&t=' + Date.now()); // Cache bust
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return parseCSV(await res.text());
        }

        async function updateSheet(action, value) {
            if (SCRIPT_URL.includes('YOUR_')) {
                showToast('⚠️ Setup SCRIPT_URL dulu!', 'error');
                return false;
            }
            if (state.isSyncing) return false;
            
            state.isSyncing = true;
            try {
                const params = new URLSearchParams({ action, value, ts: Date.now() });
                const res = await fetch(`${SCRIPT_URL}?${params}`, { mode: 'cors' });
                const text = await res.text();
                return text.includes('SUCCESS') || text.includes('success');
            } catch (e) {
                console.error('Update error:', e);
                return false;
            } finally {
                state.isSyncing = false;
            }
        }

        // ===== AUTO-SYNC MONITOR =====
        async function checkSheetUpdates() {
            if (state.isSyncing) return;
            
            try {
                // Check prediksi sheet for date change
                const predData = await fetchCSV(CONFIG.sheetPrediksi);
                const newDate = safeGet(predData, 0, 1); // B1
                
                if (newDate && newDate !== state.lastSync.tanggal) {
                    state.lastSync.tanggal = newDate;
                    dom.inTgl.value = parseDateInput(newDate);
                    dom.statTgl.textContent = formatDateDisplay(newDate);
                    showToast('📅 Tanggal diperbarui dari Sheet');
                    await fetchPrediksi(); // Re-fetch all
                }
                
                // Check hitung sheet for nominal change
                const hitData = await fetchCSV(CONFIG.sheetHitung);
                const newNom = safeGet(hitData, 0, 23); // X1
                
                if (newNom && newNom !== state.lastSync.nominal) {
                    state.lastSync.nominal = newNom;
                    dom.inNom.value = newNom;
                    dom.statNom.textContent = formatRupiah(newNom);
                    showToast('💰 Nominal diperbarui dari Sheet');
                    await fetchHitung(); // Re-fetch calculations
                }
                
            } catch (e) {
                // Silent fail for auto-sync
                console.log('Auto-sync check:', e.message);
            }
        }

        // ===== DATA FETCHING =====
        async function fetchPrediksi() {
            dom.listP.innerHTML = dom.listJ.innerHTML = dom.listL.innerHTML = 
                `<div style="display:flex;justify-content:center;padding:30px;"><div class="spinner"></div></div>`;
            
            try {
                const data = await fetchCSV(CONFIG.sheetPrediksi);
                
                // Extract B1 date
                const rawDate = safeGet(data, 0, 1);
                if (rawDate) {
                    state.lastSync.tanggal = rawDate;
                    dom.inTgl.value = parseDateInput(rawDate);
                    dom.statTgl.textContent = formatDateDisplay(rawDate);
                }
                
                // Extract ranges (0-indexed: B=col1, C=col2)
                state.prediksi = extractRange(data, { col: 1, start: 2, end: 84 });
                state.jadwal = extractRange(data, { col: 2, start: 2, end: 55 });
                state.link = extractRange(data, { col: 2, start: 56, end: 82 });
                
                renderPrediksi();
                showToast('✅ Data prediksi dimuat');
                
            } catch (e) {
                console.error('Fetch prediksi error:', e);
                dom.listP.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Gagal memuat data</p><small style="color:var(--muted)">Cek koneksi atau publikasi Sheet</small></div>';
            }
        }

        async function fetchHitung() {
            dom.contH.innerHTML = `<div style="display:flex;justify-content:center;padding:50px;width:100%;grid-column:1/-1;"><div class="spinner"></div></div>`;
            
            try {
                const data = await fetchCSV(CONFIG.sheetHitung);
                
                // Extract X1 nominal
                const rawNom = safeGet(data, 0, 23);
                if (rawNom && !isNaN(Number(rawNom))) {
                    state.lastSync.nominal = rawNom;
                    const nom = Number(rawNom);
                    dom.inNom.value = nom;
                    dom.statNom.textContent = formatRupiah(nom);
                }
                
                // Section definitions (0-indexed rows/cols)
                const sections = [
                    { titleRow: 0, titleCol: 24, betStart: 2, betEnd: 42, resCol: 24 },
                    { titleRow: 43, titleCol: 24, betStart: 45, betEnd: 80, resCol: 24 },
                    { titleRow: 81, titleCol: 24, betStart: 83, betEnd: 119, resCol: 24 },
                    { titleRow: 120, titleCol: 24, betStart: 122, betEnd: 153, resCol: 24 },
                    { titleRow: 154, titleCol: 24, betStart: 156, betEnd: 179, resCol: 24 },
                    { titleRow: 180, titleCol: 24, betStart: 182, betEnd: 213, resCol: 24 },
                    { titleRow: 215, titleCol: 24, betStart: 217, betEnd: 248, resCol: 24 },
                    { titleRow: 249, titleCol: 24, betStart: 251, betEnd: 282, resCol: 24 },
                    { titleRow: 283, titleCol: 24, betStart: 285, betEnd: 316, resCol: 24 }
                ];
                
                state.hitung = sections.map((sec, idx) => {
                    const title = safeGet(data, sec.titleRow, sec.titleCol) || `PASARAN #${idx + 1}`;
                    const items = [];
                    
                    for (let r = sec.betStart; r <= sec.betEnd && r < data.length; r++) {
                        const betType = safeGet(data, r, 23); // Column X
                        const result = safeGet(data, r, sec.resCol); // Column Y
                        if (betType || result) {
                            items.push({ type: betType || '-', res: result || '-', isWinner: result && !result.includes('0') });
                        }
                    }
                    
                    return { id: idx, title, items };
                }).filter(s => s.items.length > 0);
                
                renderHitung();
                showToast('✅ Data hitung dimuat');
                
            } catch (e) {
                console.error('Fetch hitung error:', e);
                dom.contH.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Gagal memuat kalkulasi</p></div>';
            }
        }

        function extractRange(data, range) {
            const result = [];
            for (let r = range.start; r <= range.end && r < data.length; r++) {
                const val = safeGet(data, r, range.col);
                if (val) result.push({ title: val.split(/[\s,]+/)[0], content: val });
            }
            return result;
        }

        // ===== RENDER FUNCTIONS =====
        function renderList(container, items, search, type) {
            const filtered = items.filter(i => 
                i.content.toLowerCase().includes(search.toLowerCase()) ||
                i.title.toLowerCase().includes(search.toLowerCase())
            );
            
            if (!filtered.length) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>Tidak ditemukan</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map((v, idx) => `
                <div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}', '${type} #${idx+1}')" tabindex="0" 
                     onkeydown="if(event.key==='Enter')copyText('${encodeURIComponent(v.content)}', '${type} #${idx+1}')">
                    <div class="item-label">JUDUL</div>
                    <div class="item-title">${escapeHtml(v.title)}</div>
                    <div class="item-label">ISI • KLIK UNTUK COPY</div>
                    <div class="item-content">${escapeHtml(v.content)}</div>
                    <div class="item-copy-hint">💡 Double-click atau tekan Enter untuk copy</div>
                </div>
            `).join('');
        }

        function renderPrediksi() {
            renderList(dom.listP, state.prediksi, dom.srcP.value, 'Prediksi');
            renderList(dom.listJ, state.jadwal, dom.srcJ.value, 'Jadwal');
            renderList(dom.listL, state.link, dom.srcL.value, 'Link');
            
            dom.cntP.textContent = state.prediksi.length;
            dom.cntJ.textContent = state.jadwal.length;
            dom.cntL.textContent = state.link.length;
        }

        function renderHitung() {
            if (!state.hitung.length) {
                dom.contH.innerHTML = '<div class="empty-state"><div class="empty-icon">🧮</div><p>Belum ada data kalkulasi</p></div>';
                return;
            }
            
            dom.contH.innerHTML = state.hitung.map(pas => `
                <div class="pasaran-box">
                    <div class="pasaran-header">
                        <h3 class="pasaran-title">${escapeHtml(pas.title)}</h3>
                        <div class="pasaran-stats">
                            <span class="stat-badge">${pas.items.length} Bet</span>
                        </div>
                    </div>
                    <div class="pasaran-content">
                        ${pas.items.map((it, idx) => `
                            <div class="bet-item ${it.isWinner ? 'winner' : ''}" 
                                 onclick="copyText('${encodeURIComponent(it.res)}', '${pas.title} - ${escapeJs(it.type)}')"
                                 tabindex="0"
                                 onkeydown="if(event.key==='Enter')copyText('${encodeURIComponent(it.res)}', '${pas.title} - ${escapeJs(it.type)}')">
                                <div class="bet-info">
                                    <div class="bet-type">${escapeHtml(it.type)}</div>
                                    ${it.type.toLowerCase().includes('hadiah') || it.type.toLowerCase().includes('jackpot') ? 
                                        `<div class="bet-desc">🎁 Potensi kemenangan</div>` : ''}
                                </div>
                                <span class="bet-result">${escapeHtml(it.res)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                          .replace(/"/g,'&quot;').replace(/'/g,'&#039;').replace(/\n/g,'<br>');
        }
        function escapeJs(s) {
            return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'\\r');
        }

        // ===== EVENT LISTENERS =====
        function setupEvents() {
            // Tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    dom.tabP.style.display = btn.dataset.tab === 'prediksi' ? 'block' : 'none';
                    dom.tabH.style.display = btn.dataset.tab === 'hitung' ? 'block' : 'none';
                };
            });

            // Save Tanggal
            dom.btnTgl.onclick = async () => {
                if (!dom.inTgl.value) return showToast('Pilih tanggal dulu!', 'error');
                const parts = dom.inTgl.value.split('-');
                const formatted = `${parts[1]}/${parts[2]}/${parts[0]}`; // MM/DD/YYYY
                
                dom.statTgl.textContent = 'Menyimpan...';
                const success = await updateSheet('updateTanggal', formatted);
                
                if (success) {
                    localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
                    dom.statTgl.textContent = '✅ Tersimpan';
                    showToast('📅 Tanggal diupdate di Google Sheet!');
                    setTimeout(fetchPrediksi, 500);
                } else {
                    dom.statTgl.textContent = '❌ Gagal';
                    showToast('Gagal update Sheet - cek SCRIPT_URL', 'error');
                }
            };

            // Update Nominal
            dom.btnNom.onclick = async () => {
                if (!dom.inNom.value) return showToast('Isi nominal!', 'error');
                
                dom.statNom.textContent = 'Menghitung...';
                const success = await updateSheet('updateNominal', dom.inNom.value);
                
                if (success) {
                    localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
                    dom.statNom.textContent = formatRupiah(dom.inNom.value);
                    showToast('💰 Nominal diupdate - kalkulasi diperbarui!');
                    setTimeout(fetchHitung, 500);
                } else {
                    dom.statNom.textContent = '❌ Gagal';
                    showToast('Gagal update Sheet', 'error');
                }
            };

            // Search with debounce
            let searchTimer;
            const debounce = (fn, delay) => (...args) => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => fn.apply(this, args), delay);
            };

            dom.srcP.oninput = debounce(() => renderList(dom.listP, state.prediksi, dom.srcP.value, 'Prediksi'), 200);
            dom.srcJ.oninput = debounce(() => renderList(dom.listJ, state.jadwal, dom.srcJ.value, 'Jadwal'), 200);
            dom.srcL.oninput = debounce(() => renderList(dom.listL, state.link, dom.srcL.value, 'Link'), 200);

            // Copy on double-click
            document.addEventListener('dblclick', (e) => {
                const card = e.target.closest('.item-card, .bet-item');
                if (card) {
                    const content = card.querySelector('.item-content, .bet-result')?.textContent;
                    if (content) copyText(content, 'Item');
                }
            });
        }

        // ===== INITIALIZATION =====
        async function init() {
            setupEvents();
            
            // Load saved values
            if (localStorage.getItem(CONFIG.keyTanggal)) {
                dom.inTgl.value = localStorage.getItem(CONFIG.keyTanggal);
            }
            if (localStorage.getItem(CONFIG.keyNominal)) {
                dom.inNom.value = localStorage.getItem(CONFIG.keyNominal);
            }
            
            // Initial fetch
            await Promise.all([fetchPrediksi(), fetchHitung()]);
            
            // Start auto-sync monitor
            setInterval(checkSheetUpdates, CONFIG.syncInterval);
            
            console.log('🔮 Togel App initialized • Auto-sync every', CONFIG.syncInterval/1000, 'seconds');
        }

        // Start app
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

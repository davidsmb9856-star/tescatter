<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDIKSI DAN HITUNG TOGEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-main: #030a12;
            --bg-card: #0b1824;
            --bg-input: #060d15;
            --text-main: #ffffff;
            --text-muted: #8ba3b9;
            --accent: #00e5ff;
            --accent-dim: rgba(0, 229, 255, 0.1);
            --border: #1c3a5e;
            --success: #00ff88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* AMBIENT BACKGROUND */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 10%, rgba(0, 229, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 90%, rgba(0, 100, 200, 0.03) 0%, transparent 40%);
            pointer-events: none;
        }
        .grid-pattern {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(0, 229, 255, 0.02) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 229, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, black 0%, transparent 80%);
        }

        .main-wrapper { position: relative; z-index: 10; max-width: 1300px; margin: 0 auto; padding: 25px 20px; }
        
        /* HEADER */
        .main-header { text-align: center; margin-bottom: 30px; }
        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 4.5vw, 2.8rem);
            font-weight: 900;
            letter-spacing: 1px;
            color: white;
            margin-bottom: 5px;
        }
        .accent-text { color: var(--accent); }

        /* TABS */
        .tabs-nav { display: flex; justify-content: center; gap: 0; margin-bottom: 0; }
        .tab-link {
            font-family: 'Orbitron', sans-serif;
            padding: 12px 25px;
            font-weight: 700;
            font-size: 0.85rem;
            background: rgba(11, 24, 36, 0.6);
            color: var(--text-muted);
            border: 1px solid transparent;
            border-bottom: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-link:first-child { border-radius: 10px 0 0 0; }
        .tab-link:last-child { border-radius: 0 10px 0 0; }
        .tab-link.active {
            color: var(--accent);
            background: var(--bg-card);
            border-color: var(--border);
            border-top: 2px solid var(--accent);
        }

        /* CONTENT BOX */
        .content-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0 0 12px 12px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* CONTROL PANEL */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ctrl-group { display: flex; align-items: center; gap: 10px; }
        
        .ctrl-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            width: 130px;
            transition: all 0.2s;
        }
        .input-field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }

        .btn-update {
            padding: 8px 18px;
            background: var(--accent);
            color: var(--bg-main);
            border: none;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn-update:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 229, 255, 0.4); }
        
        .status-indicator { font-size: 0.8rem; color: var(--success); font-weight: 600; }

        /* GRID LAYOUT */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        /* SECTION CARDS */
        .card-section {
            background: rgba(0,0,0,0.15);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .card-head {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(90deg, var(--accent-dim) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: white; font-weight: 700; }
        .badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(0, 229, 255, 0.2); font-weight: 600; }
        
        .search-wrap { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: white; font-size: 0.85rem; }
        .search-input::placeholder { color: #4a6278; }
        .search-input:focus { outline: none; border-color: var(--accent); }
        
        .card-body { padding: 12px; overflow-y: auto; flex-grow: 1; max-height: 420px; }

        /* LIST ITEMS (Cleaner) */
        .list-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .list-item:hover { background: var(--accent-dim); border-color: var(--accent); }
        
        .item-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .item-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .item-title { font-size: 0.95rem; color: var(--accent); font-weight: 700; }
        .item-body { font-size: 0.85rem; color: var(--text-main); opacity: 0.9; line-height: 1.4; word-break: break-word; }

        /* HITUNG TOGEL PREMIUM STYLE */
        .pasaran-card {
            background: rgba(0,0,0,0.15);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .pasaran-head {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(90deg, var(--accent-dim) 0%, transparent 100%);
            display: flex;
            align-items: center;
        }
        .pasaran-head::before {
            content: '';
            width: 4px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
            margin-right: 10px;
            box-shadow: 0 0 8px var(--accent);
        }
        .pasaran-title { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: white; font-weight: 700; }
        .pasaran-body { padding: 10px; max-height: 300px; overflow-y: auto; }
        
        .bet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
            border-radius: 4px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .bet-row:hover { background: var(--accent-dim); border-color: var(--accent); }
        .bet-type { flex: 1; font-size: 0.8rem; color: var(--text-main); font-weight: 500; }
        .bet-val { 
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem; 
            font-weight: 700; 
            color: var(--accent); 
            background: rgba(0,0,0,0.3); 
            padding: 2px 8px; 
            border-radius: 4px; 
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(50px);
            background: var(--accent);
            color: var(--bg-main);
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            opacity: 0;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0, 229, 255, 0.4);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* LOADING */
        .loader { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        @media (max-width: 768px) {
            .control-panel { flex-direction: column; align-items: stretch; }
            .ctrl-group { width: 100%; justify-content: space-between; }
            .input-field { width: 100%; }
            .data-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="ambient-bg"><div class="grid-pattern"></div></div>
<div id="toast" class="toast">Updated!</div>

<div class="main-wrapper">
    <header class="main-header">
        <h1 class="main-title">PREDIKSI & <span class="accent-text">HITUNG TOGEL</span></h1>
    </header>

    <nav class="tabs-nav">
        <div class="tab-link active" data-tab="prediksi">PREDIKSI TOGEL</div>
        <div class="tab-link" data-tab="hitung">HITUNG TOGEL</div>
    </nav>

    <div class="content-container">
        <!-- TAB PREDIKSI -->
        <div id="tab-prediksi" class="tab-content">
            <div class="control-panel">
                <div class="ctrl-group">
                    <span class="ctrl-label">Tanggal (B1)</span>
                    <input type="date" id="input-tanggal" class="input-field">
                </div>
                <div class="ctrl-group">
                    <button class="btn-update" id="btn-tanggal">UPDATE TANGGAL</button>
                    <span class="status-indicator" id="status-tanggal"></span>
                </div>
            </div>

            <div class="data-grid">
                <div class="card-section">
                    <div class="card-head">
                        <div class="card-title">PREDIKSI TOGEL</div>
                        <div class="badge" id="cnt-p">0</div>
                    </div>
                    <div class="search-wrap"><input type="text" class="search-input" id="src-p" placeholder="Cari prediksi..."></div>
                    <div class="card-body" id="list-p"><div style="display:flex;justify-content:center;padding:20px;"><div class="loader"></div></div></div>
                </div>

                <div class="card-section">
                    <div class="card-head">
                        <div class="card-title">JADWAL PASARAN</div>
                        <div class="badge" id="cnt-j">0</div>
                    </div>
                    <div class="search-wrap"><input type="text" class="search-input" id="src-j" placeholder="Cari jadwal..."></div>
                    <div class="card-body" id="list-j"><div style="display:flex;justify-content:center;padding:20px;"><div class="loader"></div></div></div>
                </div>

                <div class="card-section">
                    <div class="card-head">
                        <div class="card-title">LINK LIVE PASARAN</div>
                        <div class="badge" id="cnt-l">0</div>
                    </div>
                    <div class="search-wrap"><input type="text" class="search-input" id="src-l" placeholder="Cari link..."></div>
                    <div class="card-body" id="list-l"><div style="display:flex;justify-content:center;padding:20px;"><div class="loader"></div></div></div>
                </div>
            </div>
        </div>

        <!-- TAB HITUNG -->
        <div id="tab-hitung" class="tab-content" style="display:none;">
            <div class="control-panel">
                <div class="ctrl-group">
                    <span class="ctrl-label">Nominal (X1)</span>
                    <input type="number" id="input-nominal" class="input-field" placeholder="Masukkan Nominal">
                </div>
                <div class="ctrl-group">
                    <button class="btn-update" id="btn-nominal">UPDATE NOMINAL</button>
                    <span class="status-indicator" id="status-nominal"></span>
                </div>
            </div>
            <div class="data-grid" id="box-hitung"><div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="loader"></div></div></div>
        </div>
    </div>
</div>

<script>
    // ================= KONFIGURASI =================
    // PENTING: Ganti URL ini dengan URL Web App Google Apps Script Anda
    const SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL'; 
    
    const SHEET_PREDIKSI = 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622';
    const SHEET_HITUNG = 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810';
    
    // ================= STATE & DOM =================
    const $ = id => document.getElementById(id);
    const store = { p: [], j: [], l: [], h: [] };

    // ================= UTILITIES =================
    function toast(msg) {
        const t = $('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function copyText(txt) {
        let str = txt;
        try { str = decodeURIComponent(txt); } catch(e) {}
        const ta = document.createElement('textarea');
        ta.value = str;
        ta.style.position = 'absolute';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast('Disalin: ' + str.substring(0,15) + '...');
    }

    // ================= CORE LOGIC =================
    function parseCSV(text) {
        let p = [], row = [], entry = "", state = 0;
        for (let i = 0; i < text.length; i++) {
            const char = text[i], next = text[i+1];
            if (state === 0) {
                if (char === '"') state = 1;
                else if (char === ',') { row.push(entry); entry = ""; }
                else if (char === '\r' && next === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
                else if (char === '\n' || char === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
                else entry += char;
            } else {
                if (char === '"' && next === '"') { entry += '"'; i++; }
                else if (char === '"') state = 0;
                else entry += char;
            }
        }
        if (entry.length > 0 || row.length > 0) { row.push(entry); p.push(row); }
        return p;
    }

    function get(row, idx) { return row && row[idx] !== undefined ? row[idx].trim() : ""; }

    // Fetch & Render Prediksi
    async function fetchPrediksi() {
        try {
            const res = await fetch(SHEET_PREDIKSI + '&t=' + new Date().getTime());
            const data = parseCSV(await res.text());

            store.p = []; store.j = []; store.l = [];

            // B1 Date
            const raw = get(data[0], 1);
            if(raw) {
                const d = raw.split('/');
                if(d.length === 3) $('input-tanggal').value = `${d[2]}-${d[0].padStart(2,'0')}-${d[1].padStart(2,'0')}`;
            }

            // Data
            for (let i = 2; i <= 84 && i < data.length; i++) { const t = get(data[i], 1); if(t) store.p.push({ t: t.split(/[\s,]+/)[0], c: t }); }
            for (let i = 2; i <= 55 && i < data.length; i++) { const t = get(data[i], 2); if(t) store.j.push({ t: t.split(/[\s,]+/)[0], c: t }); }
            for (let i = 56; i <= 82 && i < data.length; i++) { const t = get(data[i], 2); if(t) store.l.push({ t: t.split(/[\s,]+/)[0], c: t }); }

            renderList('p');
            renderList('j');
            renderList('l');
        } catch(e) { console.error(e); }
    }

    // Fetch & Render Hitung
    async function fetchHitung() {
        try {
            const res = await fetch(SHEET_HITUNG + '&t=' + new Date().getTime());
            const data = parseCSV(await res.text());

            // X1 Nominal
            const nom = get(data[0], 23);
            if(nom) $('input-nominal').value = nom;

            // Sections
            const secDef = [
                { tr: 0, tc: 24, sr: 2, er: 42 }, { tr: 43, tc: 24, sr: 45, er: 80 },
                { tr: 81, tc: 24, sr: 83, er: 119 }, { tr: 120, tc: 24, sr: 122, er: 153 },
                { tr: 154, tc: 24, sr: 156, er: 179 }, { tr: 180, tc: 24, sr: 182, er: 213 },
                { tr: 215, tc: 24, sr: 217, er: 248 }, { tr: 249, tc: 24, sr: 251, er: 282 },
                { tr: 283, tc: 24, sr: 285, er: 316 }
            ];

            store.h = secDef.map(s => {
                const title = get(data[s.tr], s.tc) || "PASARAN";
                const items = [];
                for (let i = s.sr; i <= s.er && i < data.length; i++) {
                    const type = get(data[i], 23);
                    const val = get(data[i], 24);
                    if (type || val) items.push({ type, val });
                }
                return { title, items };
            }).filter(s => s.items.length > 0);

            renderHitung();
        } catch(e) { console.error(e); }
    }

    // Rendering Functions
    function renderList(type) {
        const srcVal = $('src-'+type).value.toLowerCase();
        const list = store[type].filter(i => i.c.toLowerCase().includes(srcVal) || i.t.toLowerCase().includes(srcVal));
        const container = $('list-'+type);
        $('cnt-'+type).textContent = list.length;

        if(!list.length) { container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px;">Data tidak ditemukan</p>'; return; }

        container.innerHTML = list.map(i => `
            <div class="list-item" onclick="copyText('${encodeURIComponent(i.c)}')">
                <div class="item-head">
                    <span class="item-label">Judul</span>
                    <span class="item-title">${i.t}</span>
                </div>
                <div class="item-body">${i.c}</div>
            </div>
        `).join('');
    }

    function renderHitung() {
        if(!store.h.length) return;
        $('box-hitung').innerHTML = store.h.map(s => `
            <div class="pasaran-card">
                <div class="pasaran-head"><div class="pasaran-title">${s.title}</div></div>
                <div class="pasaran-body">
                    ${s.items.map(i => `
                        <div class="bet-row" onclick="copyText('${encodeURIComponent(i.val)}')">
                            <span class="bet-type">${i.type}</span>
                            <span class="bet-val">${i.val}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    // Update Logic
    async function updateSheet(action, value, statusId, inputId) {
        if(SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
            toast("Error: Setup Script URL dulu!");
            return;
        }
        
        const stat = $(statusId);
        stat.textContent = "Proses...";
        stat.style.color = "#ffaa00";

        try {
            const url = `${SCRIPT_URL}?action=${action}&value=${encodeURIComponent(value)}`;
            await fetch(url); 
            stat.textContent = "Updated!";
            stat.style.color = "var(--success)";
            toast("Data berhasil diupdate!");
            
            // Refresh data setelah 1 detik
            setTimeout(() => {
                if(action === 'updateTanggal') fetchPrediksi();
                if(action === 'updateNominal') fetchHitung();
            }, 1000);

        } catch(e) {
            console.error(e);
            stat.textContent = "Error";
            stat.style.color = "#ff4444";
            toast("Gagal update. Cek console.");
        }
    }

    // ================= EVENTS =================
    document.addEventListener('DOMContentLoaded', () => {
        // Tabs
        document.querySelectorAll('.tab-link').forEach(tab => {
            tab.onclick = function() {
                document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                $('tab-prediksi').style.display = this.dataset.tab === 'prediksi' ? 'block' : 'none';
                $('tab-hitung').style.display = this.dataset.tab === 'hitung' ? 'block' : 'none';
            };
        });

        // Search
        $('src-p').oninput = () => renderList('p');
        $('src-j').oninput = () => renderList('j');
        $('src-l').oninput = () => renderList('l');

        // Buttons
        $('btn-tanggal').onclick = () => {
            const v = $('input-tanggal').value;
            if(!v) return toast("Pilih tanggal");
            const p = v.split('-');
            const str = `${p[1]}/${p[2]}/${p[0]}`; // Format MM/DD/YYYY
            updateSheet('updateTanggal', str, 'status-tanggal');
        };

        $('btn-nominal').onclick = () => {
            const v = $('input-nominal').value;
            if(!v) return toast("Isi nominal");
            updateSheet('updateNominal', v, 'status-nominal');
        };

        // Initial Load
        fetchPrediksi();
        fetchHitung();
    });
</script>
</body>
</html>

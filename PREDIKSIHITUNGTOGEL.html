<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREDIKSI DAN HITUNG TOGEL</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
--bg: #0a0a0f; --bg-card: #12121a; --bg-elevated: #1a1a24;
--fg: #f5f5f0; --muted: #8a8a7a;
--accent: #d4a853; --accent-bright: #f0c966; --accent-dark: #a07830;
--accent-glow: rgba(212, 168, 83, 0.4);
--border: #2a2a35; --border-accent: #d4a853;
--success: #5cb85c; --warning: #f0ad4e; --error: #d9534f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
font-family: 'Space Grotesk', sans-serif;
background: var(--bg); color: var(--fg);
min-height: 100vh; overflow-x: hidden;
}

/* === AMBIENT BACKGROUND === */
.ambient-bg {
position: fixed; inset: 0; z-index: -1;
background: 
radial-gradient(ellipse 80% 50% at 20% 40%, rgba(212, 168, 83, 0.08) 0%, transparent 50%),
radial-gradient(ellipse 60% 40% at 80% 60%, rgba(160, 120, 48, 0.06) 0%, transparent 50%),
linear-gradient(180deg, #0a0a0f 0%, #0f0f18 50%, #0a0a0f 100%);
}
.grain-overlay {
position: fixed; inset: 0; z-index: -1;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
opacity: 0.03; pointer-events: none;
}

/* === FLOATING LINES === */
.floating-lines {
position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none;
}
.line {
position: absolute; width: 1px; height: 100%; 
background: linear-gradient(180deg, transparent 0%, var(--accent) 50%, transparent 100%);
opacity: 0.1; animation: lineFloat 20s linear infinite;
}
.line:nth-child(1) { left: 10%; animation-delay: 0s; }
.line:nth-child(2) { left: 30%; animation-delay: -5s; opacity: 0.05; }
.line:nth-child(3) { left: 50%; animation-delay: -10s; }
.line:nth-child(4) { left: 70%; animation-delay: -15s; opacity: 0.07; }
.line:nth-child(5) { left: 90%; animation-delay: -3s; }
@keyframes lineFloat { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

/* === GEOMETRIC SHAPES === */
.geo-shape {
position: fixed; border: 1px solid rgba(212, 168, 83, 0.15);
animation: geoFloat 30s ease-in-out infinite; pointer-events: none; z-index: -1;
}
.geo-1 { width: 300px; height: 300px; top: 10%; left: -5%; border-radius: 50%; animation-delay: 0s; }
.geo-2 { width: 200px; height: 200px; bottom: 20%; right: -3%; transform: rotate(45deg); animation-delay: -10s; }
.geo-3 { width: 150px; height: 150px; top: 50%; left: 50%; border-radius: 50%; animation-delay: -20s; opacity: 0.5; }
@keyframes geoFloat { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(20px, -20px) rotate(180deg); } }

/* === HEADER === */
.header-section {
text-align: center; padding: 50px 20px 40px;
animation: fadeSlideDown 0.8s ease-out;
}
@keyframes fadeSlideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
.main-title {
font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 7vw, 4rem);
letter-spacing: 8px; color: var(--fg); position: relative; display: inline-block;
}
.main-title span { color: var(--accent); }
.main-title::after {
content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
width: 60%; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.subtitle {
font-size: 0.85rem; color: var(--muted); margin-top: 15px; letter-spacing: 4px; text-transform: uppercase;
}

/* === TAB NAVIGATION === */
.tab-nav {
display: flex; justify-content: center; gap: 8px; padding: 0 20px; margin-bottom: 30px;
animation: fadeSlideUp 0.8s ease-out 0.2s backwards;
}
@keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.tab-btn {
padding: 14px 32px; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px;
background: transparent; border: 1px solid var(--border); color: var(--muted);
cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
}
.tab-btn::before {
content: ''; position: absolute; inset: 0; 
background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
transform: translateY(100%); transition: transform 0.3s ease; z-index: -1;
}
.tab-btn:hover { color: var(--fg); border-color: var(--accent); }
.tab-btn.active { color: var(--bg); border-color: var(--accent); }
.tab-btn.active::before { transform: translateY(0); }

/* === MAIN CONTAINER === */
.main-container { max-width: 1400px; margin: 0 auto; padding: 0 20px 40px; }

/* === SETTINGS BAR === */
.settings-bar {
background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
padding: 20px 24px; margin-bottom: 30px;
display: flex; flex-wrap: wrap; gap: 20px; align-items: center;
animation: fadeSlideUp 0.8s ease-out 0.4s backwards;
}
.setting-group { display: flex; align-items: center; gap: 12px; }
.setting-label {
font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
white-space: nowrap;
}
.date-input, .number-input {
padding: 12px 16px; background: var(--bg); border: 1px solid var(--border);
color: var(--fg); font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem;
border-radius: 8px; transition: all 0.3s ease; min-width: 160px;
}
.date-input:focus, .number-input:focus {
outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
}
.btn-primary {
padding: 12px 28px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
border: none; border-radius: 8px; color: var(--bg); font-family: 'Bebas Neue', sans-serif;
font-size: 1rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease;
box-shadow: 0 4px 15px var(--accent-glow);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px var(--accent-glow); }
.btn-primary:active { transform: translateY(0); }
.status-badge {
padding: 6px 14px; background: rgba(212, 168, 83, 0.15); border: 1px solid var(--accent);
border-radius: 20px; font-size: 0.8rem; color: var(--accent-bright);
}

/* === CONTENT GRID === */
.content-grid {
display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 24px;
animation: fadeSlideUp 0.8s ease-out 0.6s backwards;
}

/* === SECTION CARD === */
.section-card {
background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
overflow: hidden; transition: all 0.3s ease;
}
.section-card:hover { border-color: rgba(212, 168, 83, 0.3); transform: translateY(-4px); }
.section-header {
padding: 18px 22px; background: linear-gradient(90deg, rgba(212, 168, 83, 0.1) 0%, transparent 100%);
border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
}
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px; color: var(--accent); }
.count-badge {
background: var(--accent); color: var(--bg); padding: 4px 12px; border-radius: 12px;
font-size: 0.75rem; font-weight: 600;
}
.search-area { padding: 14px; border-bottom: 1px solid var(--border); }
.search-input {
width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border);
border-radius: 8px; color: var(--fg); font-size: 0.9rem; transition: all 0.3s ease;
}
.search-input:focus { outline: none; border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }

/* === ITEM LIST === */
.item-list { max-height: 400px; overflow-y: auto; padding: 14px; }
.item-card {
background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 10px;
padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s ease;
position: relative;
}
.item-card::before {
content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
background: var(--accent); transform: scaleY(0); transition: transform 0.2s ease;
}
.item-card:hover { border-color: var(--accent); transform: translateX(4px); }
.item-card:hover::before { transform: scaleY(1); }
.item-title { font-weight: 600; color: var(--fg); margin-bottom: 6px; font-size: 0.95rem; }
.item-content { font-size: 0.85rem; color: var(--muted); line-height: 1.5; word-break: break-all; }

/* === HITUNG TAB - CARD SELECTION === */
.hitung-container { animation: fadeSlideUp 0.8s ease-out 0.4s backwards; }

/* Type Selection Cards */
.type-selector { margin-bottom: 24px; }
.type-selector-title {
font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px;
color: var(--muted); margin-bottom: 14px; padding-left: 4px;
}
.type-grid {
display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;
}
.type-card {
background: var(--bg-card); border: 2px solid var(--border); border-radius: 12px;
padding: 16px 20px; cursor: pointer; transition: all 0.3s ease;
position: relative; overflow: hidden;
}
.type-card::before {
content: ''; position: absolute; inset: 0; 
background: linear-gradient(135deg, rgba(212, 168, 83, 0.15) 0%, transparent 100%);
opacity: 0; transition: opacity 0.3s ease;
}
.type-card:hover { border-color: rgba(212, 168, 83, 0.5); }
.type-card:hover::before { opacity: 1; }
.type-card.selected { border-color: var(--accent); background: rgba(212, 168, 83, 0.08); }
.type-card.selected::before { opacity: 1; }
.type-card.selected::after {
content: '✓'; position: absolute; top: 12px; right: 14px;
color: var(--accent); font-weight: bold; font-size: 1.1rem;
}
.type-name { font-weight: 600; color: var(--fg); font-size: 0.9rem; position: relative; z-index: 1; }
.type-count { font-size: 0.75rem; color: var(--muted); margin-top: 4px; position: relative; z-index: 1; }

/* Label Selection */
.label-selector {
background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
margin-bottom: 24px; overflow: hidden;
}
.label-header {
padding: 16px 20px; background: linear-gradient(90deg, rgba(212, 168, 83, 0.1) 0%, transparent 100%);
border-bottom: 1px solid var(--border);
display: flex; justify-content: space-between; align-items: center;
}
.label-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; color: var(--accent); }
.label-list { max-height: 300px; overflow-y: auto; padding: 14px; }
.label-item {
display: flex; justify-content: space-between; align-items: center;
padding: 14px 18px; background: var(--bg-elevated); border: 1px solid var(--border);
border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s ease;
}
.label-item:hover { border-color: var(--accent); transform: translateX(4px); }
.label-item.selected { border-color: var(--accent); background: rgba(212, 168, 83, 0.1); }
.label-text { font-size: 0.9rem; color: var(--fg); }
.label-arrow { color: var(--accent); opacity: 0.5; transition: all 0.2s ease; }
.label-item:hover .label-arrow { opacity: 1; transform: translateX(4px); }

/* Result Display */
.result-display {
background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
border: 2px solid var(--accent); border-radius: 16px; padding: 30px;
text-align: center; margin-bottom: 24px;
box-shadow: 0 0 40px var(--accent-glow);
}
.result-label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
.result-value { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--accent-bright); letter-spacing: 3px; }
.result-hint { font-size: 0.75rem; color: var(--muted); margin-top: 12px; }

/* Hitung Data Grid */
.hitung-grid {
display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px;
}
.pasaran-card {
background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
overflow: hidden; transition: all 0.3s ease;
}
.pasaran-card:hover { border-color: rgba(212, 168, 83, 0.4); }
.pasaran-header {
padding: 16px 20px; background: linear-gradient(90deg, rgba(212, 168, 83, 0.12) 0%, transparent 100%);
border-bottom: 1px solid var(--border);
}
.pasaran-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px; color: var(--accent); }
.pasaran-content { max-height: 300px; overflow-y: auto; padding: 12px; }
.bet-row {
display: flex; justify-content: space-between; align-items: center;
padding: 12px 16px; background: var(--bg-elevated); border: 1px solid var(--border);
border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s ease;
}
.bet-row:hover { border-color: var(--accent); background: rgba(212, 168, 83, 0.05); }
.bet-type { font-size: 0.85rem; color: var(--fg); flex: 1; }
.bet-value {
font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--accent-bright);
background: rgba(212, 168, 83, 0.15); padding: 4px 12px; border-radius: 6px;
}

/* === TOAST === */
.toast {
position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
background: var(--bg-card); border: 1px solid var(--accent); color: var(--fg);
padding: 16px 32px; border-radius: 50px; font-weight: 500; opacity: 0;
transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 1000;
box-shadow: 0 10px 40px rgba(0,0,0,0.4), 0 0 20px var(--accent-glow);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* === SPINNER === */
.spinner {
width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent);
border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

/* === RESPONSIVE === */
@media (max-width: 768px) {
.settings-bar { flex-direction: column; align-items: stretch; }
.setting-group { width: 100%; }
.date-input, .number-input { width: 100%; }
.btn-primary { width: 100%; }
.type-grid { grid-template-columns: 1fr; }
.hitung-grid { grid-template-columns: 1fr; }
}
@media (prefers-reduced-motion: reduce) {
*, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="ambient-bg"></div>
<div class="grain-overlay"></div>
<div class="floating-lines">
<div class="line"></div><div class="line"></div><div class="line"></div>
<div class="line"></div><div class="line"></div>
</div>
<div class="geo-shape geo-1"></div>
<div class="geo-shape geo-2"></div>

<div class="header-section">
<h1 class="main-title">PREDIKSI <span>TOGEL</span></h1>
<p class="subtitle">Hitung dan Prediksi Akurat</p>
</div>

<nav class="tab-nav">
<button class="tab-btn active" data-tab="prediksi">PREDIKSI</button>
<button class="tab-btn" data-tab="hitung">HITUNG</button>
</nav>

<div class="main-container">
<!-- PREDIKSI TAB -->

<div class="section-header">

</div>
<div class="search-area">
<input type="text" class="search-input" id="search-prediksi" placeholder="Cari prediksi...">
</div>
<div class="item-list" id="list-prediksi">
<div style="display:flex;justify-content:center;padding:40px;"><div class="spinner"></div></div>
</div>
</div>

<div class="section-card">
<div class="section-header">
<h3 class="section-title">JADWAL</h3>
<span class="count-badge" id="count-jadwal">0</span>
</div>
<div class="search-area">
<input type="text" class="search-input" id="search-jadwal" placeholder="Cari jadwal...">
</div>

<div style="display:flex;justify-content:center;padding:40px;"><div class="spinner"></div></div>

<div class="section-card">
<div class="section-header">
<h3 class="section-title">LINK LIVE</h3>

</div>
<div class="search-area">
<input type="text" class="search-input" id="search-link" placeholder="Cari link...">

<div id="tab-hitung" class="tab-content" style="display:none;">

</div>
</div>

<div class="label-selector" id="label-selector" style="display:none;">
<div class="label-header">
<h4 class="label-title">PILIH LABEL</h4>
<span class="count-badge" id="label-count">0</span>
</div>
<div class="label-list" id="label-list"></div>
</div>

<div class="result-display" id="result-display" style="display:none;">
<div class="result-label">Hasil Hitungan</div>

</div>

<div class="hitung-grid" id="hitung-grid">
<div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="spinner"></div></div>
</div>
</div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec';
const CONFIG = {
sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810',
keyTanggal: 'togel_tanggal_v5',
keyNominal: 'togel_nominal_v5'
};

const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompokData: {} };
let selectedType = null;
let selectedLabel = null;

const $ = id => document.getElementById(id);
const dom = {
tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
contH: $('hitung-grid'), toast: $('toast'),
typeGrid: $('type-grid'), labelSelector: $('label-selector'),
labelList: $('label-list'), labelCount: $('label-count'),
resultDisplay: $('result-display'), resultValue: $('result-value')
};

function showToast(msg) {
dom.toast.textContent = msg;
dom.toast.classList.add('show');
setTimeout(() => dom.toast.classList.remove('show'), 3000);
}

function copyText(text) {
let finalText = text;
try { finalText = decodeURIComponent(text); } catch(e) {}
navigator.clipboard.writeText(finalText).then(() => {
const preview = finalText.length > 25 ? finalText.substring(0, 25) + '...' : finalText;
showToast('Disalin: ' + preview);
}).catch(() => showToast('Gagal salin'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

function parseCSV(text) {
let p = [], row = [], entry = "", state = 0;
for (let i = 0; i < text.length; i++) {
const char = text[i], next = text[i+1];
if (state === 0) {
if (char === '"') state = 1;
else if (char === ',') { row.push(entry); entry = ""; }
else if (char === '\r' && next === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
else if (char === '\n' || char === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
else entry += char;
} else if (state === 1) {
if (char === '"' && next === '"') { entry += '"'; i++; }
else if (char === '"') state = 0;
else entry += char;
}
}
if (entry.length > 0 || row.length > 0) { row.push(entry); p.push(row); }
return p;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

async function updateSheet(action, value) {
if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
showToast('Script URL belum disetup!');
return false;
}
try {
const params = new URLSearchParams({ action, value });
const response = await fetch(SCRIPT_URL + '?' + params.toString());
const text = await response.text();
return text.includes('SUCCESS');
} catch (e) {
console.error("Error:", e);
return false;
}
}

async function fetchPrediksi() {
try {
const res = await fetch(CONFIG.sheetPrediksi + '&t=' + new Date().getTime());
const data = parseCSV(await res.text());
state.prediksi = []; state.jadwal = []; state.link = [];

if (data[0]) {
const raw = safeGet(data[0], 1);
if (raw) {
const p = raw.split('/');
if (p.length === 3) {
const formatted = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
dom.inTgl.value = formatted;
dom.statTgl.textContent = formatted;
}
}
}

for (let i = 2; i <= 84 && i < data.length; i++) {
const txt = safeGet(data[i], 1);
if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
for (let i = 2; i <= 55 && i < data.length; i++) {
const txt = safeGet(data[i], 2);
if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
for (let i = 56; i <= 82 && i < data.length; i++) {
const txt = safeGet(data[i], 2);
if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
renderPrediksi();
} catch (e) {
console.error("Error Prediksi:", e);
dom.listP.innerHTML = '<p style="color:var(--error);text-align:center;padding:20px;">Gagal memuat data</p>';
}
}

async function fetchHitung() {
try {
const res = await fetch(CONFIG.sheetHitung + '&t=' + new Date().getTime());
const data = parseCSV(await res.text());

if (data[0]) {
const nom = safeGet(data[0], 23);
if (nom) {
dom.inNom.value = nom;
dom.statNom.textContent = "Rp " + formatNum(nom);
}
}

const secDef = [
{ tRow: 0, tCol: 24, start: 2, end: 42 },
{ tRow: 43, tCol: 24, start: 45, end: 80 },
{ tRow: 81, tCol: 24, start: 83, end: 119 },
{ tRow: 120, tCol: 24, start: 122, end: 153 },
{ tRow: 154, tCol: 24, start: 156, end: 179 },
{ tRow: 180, tCol: 24, start: 182, end: 213 },
{ tRow: 215, tCol: 24, start: 217, end: 248 },
{ tRow: 249, tCol: 24, start: 251, end: 282 },
{ tRow: 283, tCol: 24, start: 285, end: 316 }
];

state.hitung = secDef.map(s => {
let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
let items = [];
for (let i = s.start; i <= s.end && i < data.length; i++) {
if (data[i]) {
const type = safeGet(data[i], 23);
const resVal = safeGet(data[i], 24);
if (type || resVal) items.push({ type, res: resVal });
}
}
return { title, items };
}).filter(s => s.items.length > 0);

renderHitung();
loadTypeCards(data);
} catch (e) {
console.error("Error Hitung:", e);
dom.contH.innerHTML = '<p style="color:var(--error);text-align:center;padding:20px;">Gagal memuat data</p>';
}
}

function loadTypeCards(data) {
const secDef = [
{ tRow: 0, tCol: 24, start: 2, end: 42, title: "HITUNG HADIAH SEMUA PASARAN" },
{ tRow: 43, tCol: 24, start: 45, end: 80, title: "HITUNG HADIAH TOTO MACAU 4D" },
{ tRow: 81, tCol: 24, start: 83, end: 119, title: "HITUNG HADIAH TOTO MACAU 5D" },
{ tRow: 120, tCol: 24, start: 122, end: 153, title: "HITUNG HADIAH KINGKONG 4D" },
{ tRow: 154, tCol: 24, start: 156, end: 179, title: "PERHITUNGAN BONUS" },
{ tRow: 180, tCol: 24, start: 182, end: 213, title: "HITUNG HADIAH JAKARTA" },
{ tRow: 215, tCol: 24, start: 217, end: 248, title: "HITUNG HADIAH TOTOMALI" },
{ tRow: 249, tCol: 24, start: 251, end: 282, title: "HITUNG HADIAH HOKIDRAW" },
{ tRow: 283, tCol: 24, start: 285, end: 316, title: "HITUNG HADIAH SYDNEY HONGKONG" }
];

state.kelompokData = {};

secDef.forEach(sec => {
const items = [];
for (let i = sec.start; i <= sec.end && i < data.length; i++) {
if (data[i]) {
const label = safeGet(data[i], 23);
const value = safeGet(data[i], 24);
if (label || value) items.push({ label: label || "-", value: value || "-" });
}
}
if (items.length > 0) state.kelompokData[sec.title] = items;
});

renderTypeCards();
}

function renderTypeCards() {
const types = Object.keys(state.kelompokData);
dom.typeGrid.innerHTML = types.map(type => `
<div class="type-card" onclick="selectType('${type}')">
<div class="type-name">${type}</div>
<div class="type-count">${state.kelompokData[type].length} item</div>
</div>
`).join('');
}

function selectType(type) {
selectedType = type;
selectedLabel = null;
dom.resultDisplay.style.display = 'none';

// Update UI
document.querySelectorAll('.type-card').forEach(card => {
card.classList.toggle('selected', card.querySelector('.type-name').textContent === type);
});

// Show label selector
dom.labelSelector.style.display = 'block';
dom.labelCount.textContent = state.kelompokData[type].length;

dom.labelList.innerHTML = state.kelompokData[type].map((item, idx) => `
<div class="label-item" onclick="selectLabel(${idx})">
<span class="label-text">${item.label}</span>
<span class="label-arrow">→</span>
</div>
`).join('');
}

function selectLabel(idx) {
if (!selectedType) return;
selectedLabel = idx;

// Update UI
document.querySelectorAll('.label-item').forEach((item, i) => {
item.classList.toggle('selected', i === idx);
});

// Show result
const item = state.kelompokData[selectedType][idx];
dom.resultDisplay.style.display = 'block';
dom.resultValue.textContent = item.value;

dom.resultDisplay.onclick = () => copyText(item.value);
}

function renderList(container, items, search) {
const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
if (!filtered.length) {
container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;">Tidak ada data</p>';
return;
}
container.innerHTML = filtered.map(v => `
<div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}')">
<div class="item-title">${v.title}</div>
<div class="item-content">${v.content}</div>
</div>
`).join('');
}

function renderPrediksi() {
renderList(dom.listP, state.prediksi, dom.srcP.value);
renderList(dom.listJ, state.jadwal, dom.srcJ.value);
renderList(dom.listL, state.link, dom.srcL.value);
dom.cntP.textContent = state.prediksi.length;
dom.cntJ.textContent = state.jadwal.length;
dom.cntL.textContent = state.link.length;
}

function renderHitung() {
if (!state.hitung.length) {
dom.contH.innerHTML = '<p style="color:var(--muted);text-align:center;">Tidak ada data</p>';
return;
}
dom.contH.innerHTML = state.hitung.map(s => `
<div class="pasaran-card">
<div class="pasaran-header"><h4 class="pasaran-title">${s.title}</h4></div>
<div class="pasaran-content">
 ${s.items.map(it => `
<div class="bet-row" onclick="copyText('${encodeURIComponent(it.res)}')">
<span class="bet-type">${it.type}</span>
<span class="bet-value">${it.res}</span>
</div>
`).join('')}
</div>
</div>
`).join('');
}

function manualUpdateTanggal() {
if (!dom.inTgl.value) return showToast("Pilih tanggal dulu!");
const parts = dom.inTgl.value.split('-');
const formattedDate = `${parts[1]}/${parts[2]}/${parts[0]}`;
dom.btnTgl.disabled = true;
dom.statTgl.textContent = "Menyimpan...";

updateSheet('updateTanggal', formattedDate).then(success => {
dom.btnTgl.disabled = false;
if (success) {
dom.statTgl.textContent = "Tersimpan";
showToast("Tanggal diupdate!");
fetchPrediksi();
fetchHitung();
} else {
dom.statTgl.textContent = "Gagal";
showToast("Gagal update");
}
});
}

function manualUpdateNominal() {
if (!dom.inNom.value) return showToast("Isi nominal dulu!");
dom.btnNom.disabled = true;
dom.statNom.textContent = "Menyimpan...";

updateSheet('updateNominal', dom.inNom.value).then(success => {
dom.btnNom.disabled = false;
if (success) {
dom.statNom.textContent = "Rp " + formatNum(dom.inNom.value);
showToast("Nominal diupdate!");
fetchPrediksi();
fetchHitung();
} else {
dom.statNom.textContent = "Gagal";
showToast("Gagal update");
}
});
}

function init() {
// Tab switching
document.querySelectorAll('.tab-btn').forEach(t => t.onclick = () => {
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
t.classList.add('active');
dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
});

// Search
dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);

// Load data
fetchPrediksi();
fetchHitung();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>LINE TOGEL - Cyber Portal 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--primary: #00d4ff;
--primary-dark: #0099cc;
--primary-light: #66e5ff;
--secondary: #7b2fff;
--accent: #00ffff;
--success: #00ff9d;
--warning: #ffd700;
--danger: #ff3e6c;
--bg-dark: #0a0e1a;
--bg-card: rgba(15, 23, 42, 0.8);
--bg-elevated: rgba(30, 41, 59, 0.8);
--text-primary: #f1f5f9;
--text-secondary: #94a3b8;
--text-muted: #64748b;
--border: rgba(0, 212, 255, 0.2);
--shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
--shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
--shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
--shadow-glow: 0 0 20px rgba(0, 212, 255, 0.3);
--radius-sm: 0.375rem;
--radius-md: 0.5rem;
--radius-lg: 0.75rem;
--radius-xl: 1rem;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: 'Inter', sans-serif;
background: var(--bg-dark);
color: var(--text-primary);
min-height: 100vh;
line-height: 1.6;
overflow-x: hidden;
}

/* Background Effects */
.bg-canvas {
position: fixed;
inset: 0;
z-index: -3;
background: 
radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
radial-gradient(ellipse at 80% 80%, rgba(123, 47, 255, 0.1) 0%, transparent 50%),
var(--bg-dark);
}

.grid-overlay {
position: fixed;
inset: 0;
z-index: -2;
background-image: 
linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
background-size: 50px 50px;
animation: gridMove 30s linear infinite;
}

@keyframes gridMove {
0% { background-position: 0 0; }
100% { background-position: 50px 50px; }
}

/* Container */
.container {
max-width: 1400px;
margin: 0 auto;
padding: 2rem 1.5rem;
}

/* Header */
.header {
text-align: center;
margin-bottom: 3rem;
padding: 2rem 0;
}

.logo-wrapper {
position: relative;
display: inline-block;
margin-bottom: 1.5rem;
}

.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(2.5rem, 6vw, 4rem);
font-weight: 900;
letter-spacing: 0.1em;
background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 50%, var(--secondary) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
margin-bottom: 0.5rem;
}

.subtitle {
font-size: 0.875rem;
color: var(--text-secondary);
letter-spacing: 0.2em;
text-transform: uppercase;
font-weight: 500;
}

/* Status Badge */
.status-badge {
display: inline-flex;
align-items: center;
gap: 0.5rem;
padding: 0.5rem 1.25rem;
background: rgba(0, 255, 157, 0.1);
border: 1px solid rgba(0, 255, 157, 0.3);
border-radius: 9999px;
font-size: 0.75rem;
font-weight: 600;
color: var(--success);
text-transform: uppercase;
letter-spacing: 0.05em;
}

.status-dot {
width: 8px;
height: 8px;
background: var(--success);
border-radius: 50%;
animation: pulse 2s infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.5; }
}

/* Clock */
.clock-wrapper {
max-width: 600px;
margin: 0 auto 3rem;
padding: 1.5rem 2rem;
background: var(--bg-card);
border: 1px solid var(--border);
border-radius: var(--radius-xl);
backdrop-filter: blur(10px);
box-shadow: var(--shadow-lg), var(--shadow-glow);
}

.clock-time {
font-family: 'Orbitron', sans-serif;
font-size: 3rem;
font-weight: 700;
color: var(--primary);
text-align: center;
letter-spacing: 0.1em;
text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
}

.clock-date, .clock-day {
text-align: center;
color: var(--text-secondary);
font-size: 0.875rem;
margin-top: 0.5rem;
}

/* Sections */
.menu-section {
margin-bottom: 2.5rem;
}

.section-title {
font-family: 'Orbitron', sans-serif;
font-size: 1.125rem;
font-weight: 700;
color: var(--text-primary);
margin-bottom: 1.25rem;
padding-bottom: 0.75rem;
border-bottom: 2px solid var(--border);
display: flex;
align-items: center;
gap: 0.75rem;
letter-spacing: 0.05em;
}

.section-title::before {
content: '';
width: 4px;
height: 24px;
background: linear-gradient(180deg, var(--primary), var(--accent));
border-radius: 2px;
box-shadow: 0 0 10px var(--primary);
}

/* Menu Grid */
.menu-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
gap: 1rem;
}

/* Menu Card */
.menu-card {
display: flex;
align-items: center;
gap: 1rem;
padding: 1.25rem;
background: var(--bg-card);
border: 1px solid var(--border);
border-radius: var(--radius-lg);
text-decoration: none;
color: var(--text-primary);
transition: all 0.3s ease;
cursor: pointer;
backdrop-filter: blur(10px);
}

.menu-card:hover {
transform: translateY(-4px);
border-color: var(--primary);
box-shadow: var(--shadow-lg), 0 0 30px rgba(0, 212, 255, 0.2);
background: var(--bg-elevated);
}

.menu-card.primary {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(0, 255, 255, 0.1) 100%);
border: 1px solid var(--primary);
}

.card-icon {
width: 56px;
height: 56px;
min-width: 56px;
background: var(--bg-elevated);
border-radius: var(--radius-md);
display: flex;
align-items: center;
justify-content: center;
font-size: 1.5rem;
color: var(--primary);
border: 1px solid var(--border);
transition: all 0.3s ease;
}

.menu-card:hover .card-icon {
transform: scale(1.1) rotate(5deg);
background: linear-gradient(135deg, var(--primary), var(--accent));
color: var(--bg-dark);
box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
}

.card-content {
flex: 1;
min-width: 0;
}

.card-content h3 {
font-family: 'Orbitron', sans-serif;
font-size: 1rem;
font-weight: 700;
margin-bottom: 0.25rem;
letter-spacing: 0.025em;
}

.card-content p {
font-size: 0.875rem;
color: var(--text-secondary);
line-height: 1.4;
}

.card-arrow {
font-size: 1.25rem;
color: var(--text-muted);
transition: all 0.3s ease;
}

.menu-card:hover .card-arrow {
transform: translateX(8px);
color: var(--primary);
}

/* Buttons */
.btn {
display: inline-flex;
align-items: center;
gap: 0.5rem;
padding: 0.75rem 1.5rem;
border-radius: var(--radius-md);
font-family: 'Inter', sans-serif;
font-size: 0.875rem;
font-weight: 600;
cursor: pointer;
transition: all 0.3s ease;
border: none;
text-transform: uppercase;
letter-spacing: 0.025em;
}

.btn-primary {
background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
color: var(--bg-dark);
box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
}

.btn-primary:hover {
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
}

.btn-outline {
background: transparent;
border: 1px solid var(--primary);
color: var(--primary);
}

.btn-outline:hover {
background: var(--primary);
color: var(--bg-dark);
}

/* Modal */
.modal-backdrop {
position: fixed;
inset: 0;
background: rgba(10, 14, 26, 0.95);
backdrop-filter: blur(10px);
z-index: 1000;
display: flex;
align-items: center;
justify-content: center;
opacity: 0;
visibility: hidden;
transition: all 0.3s ease;
}

.modal-backdrop.active {
opacity: 1;
visibility: visible;
}

.modal-card {
background: var(--bg-card);
border: 1px solid var(--border);
border-radius: var(--radius-xl);
padding: 2rem;
max-width: 900px;
width: 95%;
max-height: 90vh;
overflow-y: auto;
transform: scale(0.95) translateY(20px);
transition: all 0.3s ease;
box-shadow: var(--shadow-lg), var(--shadow-glow);
}

.modal-backdrop.active .modal-card {
transform: scale(1) translateY(0);
}

.modal-head {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 1.5rem;
padding-bottom: 1rem;
border-bottom: 1px solid var(--border);
}

.modal-title {
font-family: 'Orbitron', sans-serif;
font-size: 1.5rem;
font-weight: 700;
color: var(--text-primary);
}

.modal-close {
width: 40px;
height: 40px;
background: transparent;
border: 1px solid var(--border);
border-radius: 50%;
color: var(--text-secondary);
font-size: 1.25rem;
cursor: pointer;
transition: all 0.3s ease;
display: flex;
align-items: center;
justify-content: center;
}

.modal-close:hover {
background: var(--primary);
color: var(--bg-dark);
border-color: var(--primary);
transform: rotate(90deg);
}

/* Form Elements */
.settings-panel {
background: var(--bg-elevated);
border: 1px solid var(--border);
border-radius: var(--radius-lg);
padding: 1.5rem;
margin-bottom: 1.25rem;
}

.settings-panel-title {
font-family: 'Orbitron', sans-serif;
font-size: 1rem;
font-weight: 700;
color: var(--primary);
margin-bottom: 1.25rem;
}

.input-wrapper {
margin-bottom: 1rem;
}

.input-wrapper:last-child {
margin-bottom: 0;
}

.input-label {
display: block;
font-size: 0.875rem;
color: var(--text-secondary);
margin-bottom: 0.5rem;
font-weight: 500;
}

.input-field {
width: 100%;
padding: 0.75rem 1rem;
background: var(--bg-dark);
border: 1px solid var(--border);
border-radius: var(--radius-md);
color: var(--text-primary);
font-family: 'Inter', sans-serif;
font-size: 0.875rem;
transition: all 0.3s ease;
}

.input-field:focus {
outline: none;
border-color: var(--primary);
box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
}

/* Toast Notification */
.toast {
position: fixed;
bottom: 2rem;
right: 2rem;
background: var(--bg-card);
border: 1px solid var(--border);
border-radius: var(--radius-lg);
padding: 1rem 1.5rem;
display: flex;
align-items: center;
gap: 0.75rem;
transform: translateX(150%);
transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
z-index: 2000;
backdrop-filter: blur(10px);
box-shadow: var(--shadow-lg), var(--shadow-glow);
}

.toast.show {
transform: translateX(0);
}

.toast-icon {
color: var(--success);
font-size: 1.25rem;
}

.toast-text {
font-weight: 600;
font-size: 0.875rem;
}

/* Loading */
.loading-overlay {
position: fixed;
inset: 0;
background: var(--bg-dark);
display: flex;
align-items: center;
justify-content: center;
z-index: 9999;
transition: all 0.6s ease;
}

.loading-overlay.hidden {
opacity: 0;
visibility: hidden;
}

.loader-ring {
width: 60px;
height: 60px;
border: 3px solid rgba(0, 212, 255, 0.2);
border-top-color: var(--primary);
border-radius: 50%;
animation: spin 1s linear infinite;
}

@keyframes spin {
to { transform: rotate(360deg); }
}

/* Scrollbar */
::-webkit-scrollbar {
width: 10px;
}

::-webkit-scrollbar-track {
background: var(--bg-dark);
}

::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--primary), var(--secondary));
border-radius: 5px;
border: 2px solid var(--bg-dark);
}

/* Responsive */
@media (max-width: 768px) {
.container {
padding: 1.5rem 1rem;
}

.menu-grid {
grid-template-columns: 1fr;
}

.clock-time {
font-size: 2rem;
}

.modal-card {
padding: 1.5rem;
}

.toast {
left: 1rem;
right: 1rem;
bottom: 1rem;
}
}

/* Utility Classes */
.text-primary { color: var(--text-primary); }
.text-secondary { color: var(--text-secondary); }
.text-muted { color: var(--text-muted); }
.text-primary-color { color: var(--primary); }
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.text-warning { color: var(--warning); }

.mb-1 { margin-bottom: 0.5rem; }
.mb-2 { margin-bottom: 1rem; }
.mb-3 { margin-bottom: 1.5rem; }
.mb-4 { margin-bottom: 2rem; }

.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 1rem; }
.mt-3 { margin-top: 1.5rem; }
.mt-4 { margin-top: 2rem; }

.gap-2 { gap: 1rem; }
.gap-3 { gap: 1.5rem; }

.flex { display: flex; }
.items-center { align-items: center; }
.justify-center { justify-content: center; }
.justify-between { justify-content: space-between; }
</style>
</head>
<body>
<div class="bg-canvas"></div>
<div class="grid-overlay"></div>

<div class="container">
<header class="header">
<div class="logo-wrapper">
<h1 class="title">LINE TOGEL</h1>
<p class="subtitle">Cyber Core Portal 2026</p>
</div>
<div class="status-badge">
<span class="status-dot"></span>

</div>
</header>

<div class="clock-wrapper">
<div class="clock-time" id="clockTime">00:00:00</div>
<div class="clock-date" id="clockDate">Loading...</div>

</div>

<!-- Menu Sections akan di-generate oleh JavaScript -->
<div id="menuContainer"></div>

<footer class="footer" style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); text-align: center;">

LINE TOGEL
</div>

CYBER CORE v3.0 ULTRA
</div>

</div>

<!-- Modals -->
<div class="modal-backdrop" id="pinModal">

</div>
<div style="margin: 2rem 0;">
<input type="password" id="pinInput" class="input-field" maxlength="4" placeholder="••••" style="text-align: center; font-size: 1.5rem; letter-spacing: 0.5rem; padding: 1rem;">
</div>
<div class="flex justify-center gap-2">
<button class="btn btn-outline" onclick="closePinModal()">Cancel</button>

</div>

<div class="modal-backdrop" id="settingsModal">
<div class="modal-card">
<div class="modal-head">
<h2 class="modal-title">Settings</h2>
<button class="modal-close" onclick="closeSettings()">×</button>
</div>
<div id="settingsForm"></div>
<div class="flex justify-between mt-4" style="border-top: 1px solid var(--border); padding-top: 1.5rem;">
<button class="btn btn-outline" onclick="resetLinks()">Reset Default</button>
<button class="btn btn-primary" onclick="saveSettings()">Save Changes</button>
</div>
</div>
</div>

<div class="toast" id="toast">
<i class="fas fa-check-circle toast-icon"></i>
<span class="toast-text" id="toastMessage">Success!</span>
</div>

<div class="loading-overlay" id="loadingScreen">
<div class="loader-ring"></div>
</div>

<script>
// Configuration
const defaultLinks = {
'app-utama': 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec',
'kendala-all': 'https://tescatter.vercel.app/kendala.html',

'try-cari': 'https://tescatter.vercel.app/TRYCARI.html',
'prediksi': 'https://tescatter.vercel.app/PREDIKSIHITUNGTOGEL.html',

'report-line': 'https://tescatter.vercel.app/REPORTLINE.html',
'hadiah': 'https://lineblog329.com/tabel-hadiah-togel-2/',
'tanya-z': 'https://chat.z.ai/',

'feature-2': '#',

'feature-4': '#',
'feature-5': '#',

'whatsapp': 'https://wa.me/YOUR_WHATSAPP',
'instagram': 'https://instagram.com/YOUR_INSTAGRAM'
};

const menuConfig = {
'Aplikasi Utama': [
{ id: 'app-utama', title: 'Buka Aplikasi Utama', desc: 'Akses semua fitur Line Togel lengkap', icon: 'fa-rocket', primary: true }
],
'Catatan dan Info': [
{ id: 'kendala-all', title: 'Kendala All', desc: 'Lihat semua kendala pengguna', icon: 'fa-headset' },
{ id: 'foto', title: 'Foto', desc: 'Galeri foto dan bukti', icon: 'fa-camera' },
{ id: 'cara-bermain', title: 'Cara Bermain', desc: 'Panduan lengkap bermain', icon: 'fa-book-open' }
],
'Analisis': [
{ id: 'try-cari', title: 'Try Cari Selisih', desc: 'Cari selisih data transaksi', icon: 'fa-search' },
{ id: 'prediksi', title: 'Prediksi dan Hitung', desc: 'Hitung dan prediksi togel', icon: 'fa-bullseye' },
{ id: 'bonus-event', title: 'Cek Bonus Event', desc: 'Cek bonus dan scatter event', icon: 'fa-gem' }
],
'Laporan': [
{ id: 'report-line', title: 'Report Line', desc: 'Laporan line transaksi', icon: 'fa-file-alt' },
{ id: 'hadiah', title: 'Hadiah Togel', desc: 'Daftar hadiah dan diskon', icon: 'fa-medal' }
],
'AI dan Utilitas': [
{ id: 'tanya-z', title: 'Tanya Z (AI)', desc: 'Chat dengan AI Assistant', icon: 'fa-robot' },
{ id: 'settings', title: 'Pengaturan', desc: 'Setting aplikasi lengkap', icon: 'fa-cog', onclick: 'openPinModal()' }
],
'Keamanan': [
{ id: 'cek-nawala', title: 'Cek Nawala', desc: 'Periksa status blokir link', icon: 'fa-shield-alt' }
],
'Link Launcher': [
{ id: 'feature-1', title: 'Link Launcher', desc: 'Akses link alternatif', icon: 'fa-star', coming: true },
{ id: 'feature-2', title: 'Feature 2', desc: 'Akses fitur tambahan', icon: 'fa-fire', coming: true },
{ id: 'feature-3', title: 'Feature 3', desc: 'Akses fitur tambahan', icon: 'fa-bolt', coming: true },
{ id: 'feature-4', title: 'Feature 4', desc: 'Akses fitur tambahan', icon: 'fa-gamepad', coming: true },
{ id: 'feature-5', title: 'Feature 5', desc: 'Akses fitur tambahan', icon: 'fa-chart-line', coming: true }
],
'Sosial Media': [
{ id: 'telegram', title: 'Telegram', desc: 'Join Telegram Group', icon: 'fa-telegram', external: true },
{ id: 'whatsapp', title: 'WhatsApp', desc: 'Chat Admin langsung', icon: 'fa-whatsapp', external: true },
{ id: 'instagram', title: 'Instagram', desc: 'Follow update terbaru', icon: 'fa-instagram', external: true }
]
};

// Initialize
document.addEventListener('DOMContentLoaded', () => {
updateClock();
setInterval(updateClock, 1000);
renderMenu();
updatePageLinks();
setTimeout(() => {
document.getElementById('loadingScreen').classList.add('hidden');
showToast('Welcome to LINE TOGEL!');
}, 1000);
});

function updateClock() {
const now = new Date();
document.getElementById('clockTime').textContent = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
document.getElementById('clockDate').textContent = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
document.getElementById('clockDay').textContent = now.toLocaleDateString('id-ID', { weekday: 'long' });
}

function renderMenu() {
const container = document.getElementById('menuContainer');
container.innerHTML = '';

Object.entries(menuConfig).forEach(([category, items]) => {
const section = document.createElement('section');
section.className = 'menu-section';
section.innerHTML = `
<h2 class="section-title">${category}</h2>
<div class="menu-grid">
${items.map(item => `
<a href="${item.onclick ? '#' : (defaultLinks[item.id] || '#')}" 
target="${item.external ? '_blank' : '_self'}"
${item.onclick ? `onclick="${item.onclick}; return false;"` : ''}
class="menu-card ${item.primary ? 'primary' : ''} ${item.coming ? 'coming-soon' : ''}"
data-menu-id="${item.id}">
<div class="card-icon">
<i class="fas ${item.icon}"></i>
</div>
<div class="card-content">
<h3>${item.title}${item.coming ? ' <span style="font-size: 0.65rem; color: var(--warning); margin-left: 0.5rem;">SOON</span>' : ''}</h3>
<p>${item.desc}</p>
</div>
<div class="card-arrow">
<i class="fas ${item.external ? 'fa-external-link-alt' : 'fa-arrow-right'}"></i>
</div>
</a>
`).join('')}
</div>
`;
container.appendChild(section);
});
}

function updatePageLinks() {
const links = loadLinks();
document.querySelectorAll('[data-menu-id]').forEach(el => {
const id = el.getAttribute('data-menu-id');
if (links[id] && el.tagName === 'A' && !el.getAttribute('onclick')) {
el.href = links[id];
}
});
}

function loadLinks() {
const saved = localStorage.getItem('lineTogelLinks');
return saved ? JSON.parse(saved) : {...defaultLinks};
}

function saveLinks(links) {
localStorage.setItem('lineTogelLinks', JSON.stringify(links));
}

function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

function openPinModal() {
document.getElementById('pinModal').classList.add('active');
document.getElementById('pinInput').focus();
}

function closePinModal() {
document.getElementById('pinModal').classList.remove('active');
document.getElementById('pinInput').value = '';
}

function submitPin() {
const pin = document.getElementById('pinInput').value;
if (pin === '1234') {
closePinModal();
openSettings();
showToast('Access Granted');
} else {
showToast('Invalid PIN');
document.getElementById('pinInput').value = '';
}
}

function openSettings() {
const modal = document.getElementById('settingsModal');
const form = document.getElementById('settingsForm');
const links = loadLinks();
form.innerHTML = '';

Object.entries(menuConfig).forEach(([category, items]) => {
const panel = document.createElement('div');
panel.className = 'settings-panel';
panel.innerHTML = `<h3 class="settings-panel-title">${category}</h3>`;

items.forEach(item => {
const wrapper = document.createElement('div');
wrapper.className = 'input-wrapper';
wrapper.innerHTML = `
<label class="input-label">${item.title}</label>
<input type="text" class="input-field" data-menu-id="${item.id}" value="${links[item.id] || ''}" placeholder="Enter URL">
`;
panel.appendChild(wrapper);
});

form.appendChild(panel);
});

modal.classList.add('active');
}

function closeSettings() {
document.getElementById('settingsModal').classList.remove('active');
}

function saveSettings() {
const links = loadLinks();
document.querySelectorAll('.input-field[data-menu-id]').forEach(input => {
links[input.dataset.menuId] = input.value.trim();
});
saveLinks(links);
updatePageLinks();
closeSettings();
showToast('Settings saved successfully');
}

function resetLinks() {
if (confirm('Reset all links to default?')) {
saveLinks({...defaultLinks});
updatePageLinks();
openSettings();
showToast('Links reset to default');
}
}

// PIN input handler
document.getElementById('pinInput')?.addEventListener('keypress', (e) => {
if (e.key === 'Enter') submitPin();
});

// Close modals on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(modal => {
modal.addEventListener('click', (e) => {
if (e.target === modal) {
modal.classList.remove('active');
}
});
});

// ESC key to close modals
document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') {
document.querySelectorAll('.modal-backdrop').forEach(modal => {
modal.classList.remove('active');
});
}
});
</script>
</body>
</html>

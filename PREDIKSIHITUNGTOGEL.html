<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON TOGEL SYSTEM</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
--bg-deep: #020810; --bg-card: rgba(5, 15, 30, 0.7); --bg-elevated: rgba(10, 25, 50, 0.6);
--fg: #e8f4ff; --muted: #5a8fc7;
--neon-blue: #00d4ff; --neon-bright: #66f9ff; --neon-dark: #0088cc; --neon-glow: rgba(0, 212, 255, 0.6);
--accent-purple: #9d4edd; --accent-pink: #ff006e;
--border: rgba(0, 180, 220, 0.3); --border-active: #00d4ff;
--success: #00ff88; --warning: #ffd500; --error: #ff3366;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-deep); color: var(--fg);
min-height: 100vh; overflow-x: hidden; position: relative;
}

/* === CYBER GRID BACKGROUND === */
.cyber-grid {
position: fixed; inset: 0; z-index: -3;
background: 
linear-gradient(180deg, var(--bg-deep) 0%, #051525 50%, var(--bg-deep) 100%),
linear-gradient(90deg, transparent 49.5%, rgba(0, 212, 255, 0.03) 49.5%, rgba(0, 212, 255, 0.03) 50.5%, transparent 50.5%),
linear-gradient(0deg, transparent 49.5%, rgba(0, 212, 255, 0.03) 49.5%, rgba(0, 212, 255, 0.03) 50.5%, transparent 50.5%);
background-size: 100% 100%, 60px 60px, 60px 60px;
animation: gridPulse 8s ease-in-out infinite;
}
@keyframes gridPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

/* === AURORA EFFECT === */
.aurora {
position: fixed; inset: 0; z-index: -2; overflow: hidden; pointer-events: none;
}
.aurora-wave {
position: absolute; width: 200%; height: 60%; 
background: linear-gradient(180deg, transparent 0%, rgba(0, 150, 255, 0.08) 40%, rgba(0, 212, 255, 0.12) 50%, rgba(0, 150, 255, 0.08) 60%, transparent 100%);
animation: auroraMove 25s ease-in-out infinite;
}
.aurora-wave:nth-child(1) { top: -20%; left: -50%; animation-delay: 0s; }
.aurora-wave:nth-child(2) { top: -10%; left: -30%; animation-delay: -8s; opacity: 0.7; }
@keyframes auroraMove { 0%, 100% { transform: translateX(0) scaleY(1); } 50% { transform: translateX(20%) scaleY(1.2); } }

/* === NEON ORBS === */
.neon-orb {
position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: -1;
animation: orbFloat 20s ease-in-out infinite;
}
.orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(0, 212, 255, 0.4) 0%, transparent 70%); top: -15%; left: -10%; }
.orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(0, 136, 204, 0.35) 0%, transparent 70%); bottom: -10%; right: -5%; animation-delay: -10s; }
.orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(157, 78, 221, 0.25) 0%, transparent 70%); top: 40%; left: 60%; animation-delay: -5s; }
@keyframes orbFloat { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(30px, -40px) scale(1.1); } 66% { transform: translate(-20px, 30px) scale(0.95); } }

/* === SCANLINE OVERLAY === */
.scanlines {
position: fixed; inset: 0; z-index: 100; pointer-events: none;
background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.1) 0px, rgba(0, 0, 0, 0.1) 1px, transparent 1px, transparent 3px);
opacity: 0.15;
}

/* === PARTICLES === */
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
position: absolute; width: 3px; height: 3px; background: var(--neon-blue);
border-radius: 50%; box-shadow: 0 0 6px var(--neon-blue), 0 0 12px var(--neon-blue);
animation: particleRise 15s linear infinite;
}
@keyframes particleRise { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }

/* === MAIN LAYOUT === */
.main-wrap { position: relative; z-index: 10; max-width: 1500px; margin: 0 auto; padding: 20px; }

/* === HEADER === */
.header-cyber {
text-align: center; padding: 50px 20px 40px; position: relative;
animation: headerIn 1s cubic-bezier(0.16, 1, 0.3, 1) backwards;
}
@keyframes headerIn { from { opacity: 0; transform: translateY(-50px) scale(0.95); filter: blur(10px); } }
.logo-text {
font-family: 'Orbitron', sans-serif; font-size: clamp(2.2rem, 6vw, 3.8rem); font-weight: 900;
letter-spacing: 6px; color: var(--fg); text-transform: uppercase; position: relative;
text-shadow: 0 0 20px var(--neon-glow), 0 0 40px rgba(0, 212, 255, 0.4);
}
.logo-text span { color: var(--neon-bright); }
.logo-glitch {
position: absolute; top: 0; left: 0; width: 100%; height: 100%;
background: linear-gradient(90deg, transparent 0%, var(--neon-blue) 50%, transparent 100%);
opacity: 0; animation: glitchFlash 5s ease-in-out infinite; pointer-events: none;
}
@keyframes glitchFlash { 0%, 90%, 100% { opacity: 0; } 92%, 94%, 96% { opacity: 0.1; } }
.header-line {
width: 60%; height: 2px; margin: 20px auto 0;
background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-bright), var(--neon-blue), transparent);
box-shadow: 0 0 15px var(--neon-glow); animation: linePulse 3s ease-in-out infinite;
}
@keyframes linePulse { 0%, 100% { transform: scaleX(1); opacity: 0.8; } 50% { transform: scaleX(0.8); opacity: 1; } }

/* === TAB NAVIGATION === */
.tab-nav-cyber {
display: flex; justify-content: center; gap: 0; margin-bottom: 30px;
animation: tabIn 0.8s ease-out 0.2s backwards;
}
@keyframes tabIn { from { opacity: 0; transform: translateY(20px); } }
.tab-cyber {
padding: 16px 45px; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1rem;
letter-spacing: 3px; color: var(--muted); background: rgba(5, 15, 35, 0.6);
border: 1px solid var(--border); cursor: pointer; transition: all 0.3s ease;
position: relative; overflow: hidden; text-transform: uppercase;
clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
}
.tab-cyber::before {
content: ''; position: absolute; inset: 0;
background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-dark) 100%);
opacity: 0; transition: opacity 0.3s ease;
}
.tab-cyber:hover { color: var(--neon-bright); border-color: var(--neon-blue); }
.tab-cyber.active { color: var(--bg-deep); border-color: var(--neon-bright); }
.tab-cyber.active::before { opacity: 1; }
.tab-cyber span { position: relative; z-index: 1; }

/* === CONTENT PANEL === */
.content-panel {
background: linear-gradient(135deg, var(--bg-card) 0%, rgba(5, 20, 40, 0.5) 100%);
border: 1px solid var(--border); border-radius: 20px;
padding: 25px; backdrop-filter: blur(20px);
box-shadow: 0 0 60px rgba(0, 212, 255, 0.1), inset 0 1px 0 rgba(255,255,255,0.05);
animation: panelIn 0.8s ease-out 0.4s backwards;
}
@keyframes panelIn { from { opacity: 0; transform: translateY(30px) scale(0.98); } }

/* === SETTINGS BAR === */
.settings-cyber {
display: flex; flex-wrap: wrap; gap: 20px; align-items: center;
padding: 20px; margin-bottom: 25px;
background: rgba(0, 20, 40, 0.5); border: 1px solid var(--border); border-radius: 14px;
border-left: 3px solid var(--neon-blue);
}
.setting-group { display: flex; align-items: center; gap: 12px; }
.setting-label {
font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 600;
color: var(--neon-bright); letter-spacing: 2px; text-transform: uppercase;
}
.cyber-input {
padding: 12px 18px; background: rgba(0, 10, 25, 0.8); border: 1px solid var(--border);
border-radius: 8px; color: var(--fg); font-family: 'Rajdhani', sans-serif;
font-size: 1rem; font-weight: 500; min-width: 160px; transition: all 0.3s ease;
}
.cyber-input:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 20px var(--neon-glow); }
.btn-cyber {
padding: 12px 30px; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.9rem;
letter-spacing: 2px; background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-dark) 100%);
border: none; border-radius: 8px; color: var(--bg-deep); cursor: pointer;
transition: all 0.3s ease; box-shadow: 0 0 25px var(--neon-glow);
position: relative; overflow: hidden;
}
.btn-cyber::before {
content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
transition: left 0.4s ease;
}
.btn-cyber:hover::before { left: 100%; }
.btn-cyber:hover { transform: translateY(-2px); box-shadow: 0 0 40px var(--neon-glow); }
.status-chip {
padding: 8px 16px; background: rgba(0, 255, 136, 0.15); border: 1px solid var(--success);
border-radius: 20px; font-size: 0.85rem; color: var(--success); font-weight: 600;
}

/* === DATA GRID === */
.data-grid-cyber { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 24px; }

/* === SECTION CARD === */
.section-card-cyber {
background: linear-gradient(180deg, rgba(5, 15, 35, 0.8) 0%, rgba(5, 10, 25, 0.6) 100%);
border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
transition: all 0.3s ease; position: relative;
}
.section-card-cyber::before {
content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
background: linear-gradient(90deg, var(--neon-dark), var(--neon-blue), var(--neon-bright), var(--neon-blue), var(--neon-dark));
}
.section-card-cyber:hover { border-color: var(--neon-blue); transform: translateY(-4px); box-shadow: 0 10px 40px rgba(0, 212, 255, 0.2); }
.section-header-cyber {
padding: 18px 22px; background: linear-gradient(90deg, rgba(0, 212, 255, 0.1) 0%, transparent 100%);
border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
}
.section-title-cyber { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; color: var(--neon-bright); letter-spacing: 2px; }
.count-badge-cyber {
background: var(--neon-blue); color: var(--bg-deep); padding: 5px 14px; border-radius: 15px;
font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 700;
box-shadow: 0 0 15px var(--neon-glow);
}
.search-area-cyber { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.search-cyber {
width: 100%; padding: 12px 18px; background: rgba(0, 5, 15, 0.6); border: 1px solid var(--border);
border-radius: 10px; color: var(--fg); font-size: 0.95rem; transition: all 0.3s ease;
}
.search-cyber:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }

/* === ITEM LIST === */
.item-list-cyber { max-height: 380px; overflow-y: auto; padding: 14px; }
.item-card-cyber {
background: linear-gradient(135deg, rgba(0, 30, 60, 0.4) 0%, rgba(0, 15, 35, 0.3) 100%);
border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px;
cursor: pointer; transition: all 0.25s ease; position: relative; overflow: hidden;
}
.item-card-cyber::before {
content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue);
transform: scaleY(0); transition: transform 0.25s ease;
}
.item-card-cyber:hover { border-color: var(--neon-blue); transform: translateX(6px); background: rgba(0, 50, 80, 0.4); }
.item-card-cyber:hover::before { transform: scaleY(1); }
.item-title-cyber { font-weight: 700; color: var(--neon-bright); font-size: 0.95rem; margin-bottom: 6px; text-shadow: 0 0 10px var(--neon-glow); }
.item-content-cyber { font-size: 0.85rem; color: var(--fg); opacity: 0.85; line-height: 1.5; word-break: break-all; }

/* === TYPE SELECTOR (NO DROPDOWN) === */
.type-grid-cyber {
display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 30px;
}
.type-card-cyber {
background: linear-gradient(135deg, rgba(0, 20, 45, 0.6) 0%, rgba(0, 10, 25, 0.4) 100%);
border: 2px solid var(--border); border-radius: 14px; padding: 20px;
cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
position: relative; overflow: hidden;
}
.type-card-cyber::before {
content: ''; position: absolute; inset: 0;
background: radial-gradient(circle at center, var(--neon-glow) 0%, transparent 70%);
opacity: 0; transition: opacity 0.3s ease;
}
.type-card-cyber:hover { border-color: var(--neon-blue); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0, 212, 255, 0.25); }
.type-card-cyber:hover::before { opacity: 0.3; }
.type-card-cyber.active { border-color: var(--neon-bright); box-shadow: 0 0 30px var(--neon-glow), inset 0 0 20px rgba(0, 212, 255, 0.1); }
.type-card-cyber.active::after {
content: 'ACTIVE'; position: absolute; top: 10px; right: 10px;
font-family: 'Orbitron', sans-serif; font-size: 0.6rem; font-weight: 700;
color: var(--neon-bright); background: rgba(0, 212, 255, 0.2); padding: 4px 8px; border-radius: 4px;
}
.type-name-cyber { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.9rem; color: var(--fg); margin-bottom: 6px; letter-spacing: 1px; position: relative; z-index: 1; }
.type-count-cyber { font-size: 0.8rem; color: var(--muted); position: relative; z-index: 1; }

/* === LABEL SELECTOR === */
.label-panel-cyber {
background: linear-gradient(135deg, rgba(0, 15, 40, 0.5) 0%, rgba(0, 5, 20, 0.3) 100%);
border: 1px solid var(--border); border-radius: 16px; margin-bottom: 25px; overflow: hidden;
display: none; animation: panelSlide 0.4s ease-out;
}
@keyframes panelSlide { from { opacity: 0; transform: translateY(-20px); } }
.label-header-cyber {
padding: 16px 22px; background: linear-gradient(90deg, rgba(0, 212, 255, 0.15) 0%, transparent 100%);
border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
}
.label-title-cyber { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; color: var(--neon-bright); letter-spacing: 2px; }
.label-list-cyber { max-height: 280px; overflow-y: auto; padding: 14px; }
.label-item-cyber {
display: flex; justify-content: space-between; align-items: center; padding: 14px 18px;
background: rgba(0, 30, 60, 0.3); border: 1px solid var(--border); border-radius: 10px;
margin-bottom: 10px; cursor: pointer; transition: all 0.25s ease;
}
.label-item-cyber:hover { border-color: var(--neon-blue); transform: translateX(8px); background: rgba(0, 50, 80, 0.4); }
.label-item-cyber.active { border-color: var(--neon-bright); background: rgba(0, 212, 255, 0.1); box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }
.label-text-cyber { font-weight: 600; color: var(--fg); font-size: 0.95rem; }
.label-arrow-cyber { color: var(--neon-blue); opacity: 0.6; transition: all 0.25s ease; font-size: 1.2rem; }
.label-item-cyber:hover .label-arrow-cyber { opacity: 1; transform: translateX(5px); }

/* === RESULT DISPLAY === */
.result-display-cyber {
background: linear-gradient(135deg, rgba(0, 30, 60, 0.5) 0%, rgba(0, 15, 40, 0.4) 100%);
border: 2px solid var(--neon-blue); border-radius: 18px; padding: 35px;
margin-bottom: 25px; text-align: center; position: relative; overflow: hidden;
box-shadow: 0 0 50px var(--neon-glow), inset 0 0 30px rgba(0, 212, 255, 0.1);
display: none; animation: resultIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes resultIn { from { opacity: 0; transform: scale(0.9); } }
.result-display-cyber::before {
content: ''; position: absolute; inset: -50%;
background: conic-gradient(from 0deg, transparent, var(--neon-blue), transparent, var(--neon-blue), transparent);
animation: resultRotate 10s linear infinite; opacity: 0.1;
}
@keyframes resultRotate { to { transform: rotate(360deg); } }
.result-label-cyber { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; letter-spacing: 3px; color: var(--muted); margin-bottom: 12px; position: relative; z-index: 1; }
.result-value-cyber { font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; color: var(--neon-bright); letter-spacing: 4px; position: relative; z-index: 1; text-shadow: 0 0 30px var(--neon-glow); }
.result-hint-cyber { font-size: 0.75rem; color: var(--muted); margin-top: 15px; position: relative; z-index: 1; }

/* === PASARAN GRID === */
.pasaran-grid-cyber { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
.pasaran-card-cyber {
background: linear-gradient(135deg, rgba(0, 20, 45, 0.5) 0%, rgba(0, 10, 30, 0.4) 100%);
border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
transition: all 0.3s ease;
}
.pasaran-card-cyber:hover { border-color: var(--neon-blue); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.15); }
.pasaran-header-cyber { padding: 14px 18px; background: linear-gradient(90deg, rgba(0, 212, 255, 0.12) 0%, transparent 100%); border-bottom: 1px solid var(--border); }
.pasaran-title-cyber { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--neon-bright); letter-spacing: 1px; }
.pasaran-content-cyber { max-height: 280px; overflow-y: auto; padding: 12px; }
.bet-row-cyber {
display: flex; justify-content: space-between; align-items: center; padding: 12px 16px;
background: rgba(0, 20, 50, 0.4); border: 1px solid var(--border); border-radius: 8px;
margin-bottom: 8px; cursor: pointer; transition: all 0.2s ease;
}
.bet-row-cyber:hover { border-color: var(--neon-blue); transform: translateX(4px); background: rgba(0, 40, 70, 0.5); }
.bet-type-cyber { font-size: 0.85rem; color: var(--fg); font-weight: 500; }
.bet-value-cyber {
font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--neon-bright);
background: rgba(0, 212, 255, 0.15); padding: 5px 12px; border-radius: 6px;
box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
}

/* === TOAST === */
.toast-cyber {
position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
background: linear-gradient(135deg, rgba(0, 30, 60, 0.95) 0%, rgba(0, 15, 40, 0.9) 100%);
border: 1px solid var(--neon-blue); color: var(--fg); padding: 16px 35px;
border-radius: 50px; font-weight: 600; font-size: 0.95rem; opacity: 0;
transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 1000;
box-shadow: 0 0 40px var(--neon-glow);
}
.toast-cyber.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* === SPINNER === */
.spinner-cyber { width: 45px; height: 45px; border: 3px solid var(--border); border-top-color: var(--neon-blue); border-radius: 50%; animation: spin 0.7s linear infinite; box-shadow: 0 0 15px var(--neon-glow); }
@keyframes spin { to { transform: rotate(360deg); } }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(0, 10, 25, 0.5); }
::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 3px; box-shadow: 0 0 10px var(--neon-glow); }

/* === RESPONSIVE === */
@media (max-width: 768px) {
.settings-cyber { flex-direction: column; align-items: stretch; }
.type-grid-cyber { grid-template-columns: 1fr; }
.pasaran-grid-cyber { grid-template-columns: 1fr; }
.tab-cyber { padding: 14px 30px; font-size: 0.85rem; }
}
</style>
</head>
<body>
<div class="cyber-grid"></div>
<div class="aurora">
<div class="aurora-wave"></div>
<div class="aurora-wave"></div>
</div>
<div class="neon-orb orb-1"></div>
<div class="neon-orb orb-2"></div>
<div class="neon-orb orb-3"></div>
<div class="scanlines"></div>
<div class="particles" id="particles"></div>
<div id="toast" class="toast-cyber"></div>

<div class="main-wrap">
<header class="header-cyber">
<h1 class="logo-text">NEON <span>TOGEL</span> SYSTEM</h1>
<div class="logo-glitch"></div>
<div class="header-line"></div>
</header>

<nav class="tab-nav-cyber">
<button class="tab-cyber active" data-tab="prediksi"><span>PREDIKSI</span></button>
<button class="tab-cyber" data-tab="hitung"><span>HITUNG</span></button>
</nav>

<div class="content-panel">
<!-- PREDIKSI TAB -->
<div id="tab-prediksi" class="tab-content">
<div class="settings-cyber">
<div class="setting-group">
<span class="setting-label">DATE INPUT</span>
<input type="date" id="input-tanggal" class="cyber-input">
</div>
<button class="btn-cyber" id="btn-tanggal" onclick="manualUpdateTanggal()">EXECUTE</button>
<span class="status-chip" id="status-tanggal">READY</span>
</div>

<div class="data-grid-cyber">
<div class="section-card-cyber">
<div class="section-header-cyber">
<h3 class="section-title-cyber">PREDIKSI DATA</h3>
<span class="count-badge-cyber" id="count-prediksi">0</span>
</div>
<div class="search-area-cyber">
<input type="text" class="search-cyber" id="search-prediksi" placeholder="Search predictions...">
</div>
<div class="item-list-cyber" id="list-prediksi">
<div style="display:flex;justify-content:center;padding:40px;"><div class="spinner-cyber"></div></div>
</div>
</div>

<div class="section-card-cyber">
<div class="section-header-cyber">
<h3 class="section-title-cyber">SCHEDULE</h3>
<span class="count-badge-cyber" id="count-jadwal">0</span>
</div>
<div class="search-area-cyber">
<input type="text" class="search-cyber" id="search-jadwal" placeholder="Search schedule...">
</div>
<div class="item-list-cyber" id="list-jadwal">
<div style="display:flex;justify-content:center;padding:40px;"><div class="spinner-cyber"></div></div>
</div>
</div>

<div class="section-card-cyber">
<div class="section-header-cyber">
<h3 class="section-title-cyber">LIVE LINKS</h3>
<span class="count-badge-cyber" id="count-link">0</span>
</div>
<div class="search-area-cyber">
<input type="text" class="search-cyber" id="search-link" placeholder="Search links...">
</div>
<div class="item-list-cyber" id="list-link">
<div style="display:flex;justify-content:center;padding:40px;"><div class="spinner-cyber"></div></div>
</div>
</div>
</div>
</div>

<!-- HITUNG TAB -->
<div id="tab-hitung" class="tab-content" style="display:none;">
<div class="settings-cyber">
<div class="setting-group">
<span class="setting-label">NOMINAL</span>
<input type="number" id="input-nominal" class="cyber-input" placeholder="0">
</div>
<button class="btn-cyber" id="btn-nominal" onclick="manualUpdateNominal()">EXECUTE</button>
<span class="status-chip" id="status-nominal">READY</span>
</div>

<h3 class="section-title-cyber" style="margin-bottom:16px;padding-left:4px;">SELECT CALCULATION TYPE</h3>
<div class="type-grid-cyber" id="type-grid">
<div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="spinner-cyber"></div></div>
</div>

<div class="label-panel-cyber" id="label-panel">
<div class="label-header-cyber">
<h4 class="label-title-cyber">SELECT LABEL</h4>
<span class="count-badge-cyber" id="label-count">0</span>
</div>
<div class="label-list-cyber" id="label-list"></div>
</div>

<div class="result-display-cyber" id="result-display">
<div class="result-label-cyber">CALCULATION RESULT</div>
<div class="result-value-cyber" id="result-value">-</div>
<div class="result-hint-cyber">Click to copy</div>
</div>

<div class="pasaran-grid-cyber" id="hitung-grid">
<div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="spinner-cyber"></div></div>
</div>
</div>
</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec';
const CONFIG = {
sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'
};

const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompokData: {} };
let selectedType = null;
let selectedLabel = null;

const $ = id => document.getElementById(id);
const dom = {
tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
contH: $('hitung-grid'), toast: $('toast'),
typeGrid: $('type-grid'), labelPanel: $('label-panel'),
labelList: $('label-list'), labelCount: $('label-count'),
resultDisplay: $('result-display'), resultValue: $('result-value')
};

// Create particles
function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
for (let i = 0; i < 40; i++) {
const p = document.createElement('div');
p.className = 'particle';
p.style.left = Math.random() * 100 + '%';
p.style.animationDelay = Math.random() * 15 + 's';
p.style.animationDuration = (10 + Math.random() * 10) + 's';
container.appendChild(p);
}
}

function showToast(msg) {
dom.toast.textContent = msg;
dom.toast.classList.add('show');
setTimeout(() => dom.toast.classList.remove('show'), 3000);
}

function copyText(text) {
let finalText = text;
try { finalText = decodeURIComponent(text); } catch(e) {}
navigator.clipboard.writeText(finalText).then(() => {
const preview = finalText.length > 20 ? finalText.substring(0, 20) + '...' : finalText;
showToast('Copied: ' + preview);
}).catch(() => showToast('Copy failed'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

function parseCSV(text) {
let p = [], row = [], entry = "", state = 0;
for (let i = 0; i < text.length; i++) {
const char = text[i], next = text[i+1];
if (state === 0) {
if (char === '"') state = 1;
else if (char === ',') { row.push(entry); entry = ""; }
else if (char === '\r' && next === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
else if (char === '\n' || char === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
else entry += char;
} else if (state === 1) {
if (char === '"' && next === '"') { entry += '"'; i++; }
else if (char === '"') state = 0;
else entry += char;
}
}
if (entry.length > 0 || row.length > 0) { row.push(entry); p.push(row); }
return p;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

async function updateSheet(action, value) {
if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('Script URL not configured!'); return false; }
try {
const params = new URLSearchParams({ action, value });
const response = await fetch(SCRIPT_URL + '?' + params.toString());
return (await response.text()).includes('SUCCESS');
} catch (e) { console.error("Error:", e); return false; }
}

async function fetchPrediksi() {
try {
const res = await fetch(CONFIG.sheetPrediksi + '&t=' + new Date().getTime());
const data = parseCSV(await res.text());
state.prediksi = []; state.jadwal = []; state.link = [];

if (data[0]) {
const raw = safeGet(data[0], 1);
if (raw) {
const p = raw.split('/');
if (p.length === 3) {
const formatted = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
dom.inTgl.value = formatted;
dom.statTgl.textContent = formatted;
}
}
}

for (let i = 2; i <= 84 && i < data.length; i++) {
const txt = safeGet(data[i], 1);
if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
for (let i = 2; i <= 55 && i < data.length; i++) {
const txt = safeGet(data[i], 2);
if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
for (let i = 56; i <= 82 && i < data.length; i++) {
const txt = safeGet(data[i], 2);
if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
renderPrediksi();
} catch (e) {
console.error("Error:", e);
dom.listP.innerHTML = '<p style="color:var(--error);text-align:center;padding:20px;">Failed to load data</p>';
}
}

async function fetchHitung() {
try {
const res = await fetch(CONFIG.sheetHitung + '&t=' + new Date().getTime());
const data = parseCSV(await res.text());

if (data[0]) {
const nom = safeGet(data[0], 23);
if (nom) {
dom.inNom.value = nom;
dom.statNom.textContent = "Rp " + formatNum(nom);
}
}

const secDef = [
{ tRow: 0, tCol: 24, start: 2, end: 42 },
{ tRow: 43, tCol: 24, start: 45, end: 80 },
{ tRow: 81, tCol: 24, start: 83, end: 119 },
{ tRow: 120, tCol: 24, start: 122, end: 153 },
{ tRow: 154, tCol: 24, start: 156, end: 179 },
{ tRow: 180, tCol: 24, start: 182, end: 213 },
{ tRow: 215, tCol: 24, start: 217, end: 248 },
{ tRow: 249, tCol: 24, start: 251, end: 282 },
{ tRow: 283, tCol: 24, start: 285, end: 316 }
];

state.hitung = secDef.map(s => {
let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
let items = [];
for (let i = s.start; i <= s.end && i < data.length; i++) {
if (data[i]) {
const type = safeGet(data[i], 23);
const resVal = safeGet(data[i], 24);
if (type || resVal) items.push({ type, res: resVal });
}
}
return { title, items };
}).filter(s => s.items.length > 0);

renderHitung();
loadTypeCards(data);
} catch (e) {
console.error("Error:", e);
dom.contH.innerHTML = '<p style="color:var(--error);text-align:center;padding:20px;">Failed to load</p>';
}
}

function loadTypeCards(data) {
const secDef = [
{ tRow: 0, tCol: 24, start: 2, end: 42, title: "HADIAH SEMUA PASARAN" },
{ tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" },
{ tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" },
{ tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" },
{ tRow: 154, tCol: 24, start: 156, end: 179, title: "PERHITUNGAN BONUS" },
{ tRow: 180, tCol: 24, start: 182, end: 213, title: "PASARAN JAKARTA" },
{ tRow: 215, tCol: 24, start: 217, end: 248, title: "PASARAN TOTOMALI" },
{ tRow: 249, tCol: 24, start: 251, end: 282, title: "PASARAN HOKIDRAW" },
{ tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY HONGKONG" }
];

state.kelompokData = {};
secDef.forEach(sec => {
const items = [];
for (let i = sec.start; i <= sec.end && i < data.length; i++) {
if (data[i]) {
const label = safeGet(data[i], 23);
const value = safeGet(data[i], 24);
if (label || value) items.push({ label: label || "-", value: value || "-" });
}
}
if (items.length > 0) state.kelompokData[sec.title] = items;
});

renderTypeCards();
}

function renderTypeCards() {
const types = Object.keys(state.kelompokData);
dom.typeGrid.innerHTML = types.map(type => `
<div class="type-card-cyber" onclick="selectType('${type}')">
<div class="type-name-cyber">${type}</div>
<div class="type-count-cyber">${state.kelompokData[type].length} calculations</div>
</div>
`).join('');
}

function selectType(type) {
selectedType = type;
selectedLabel = null;
dom.resultDisplay.style.display = 'none';

document.querySelectorAll('.type-card-cyber').forEach(card => {
card.classList.toggle('active', card.querySelector('.type-name-cyber').textContent === type);
});

dom.labelPanel.style.display = 'block';
dom.labelCount.textContent = state.kelompokData[type].length;

dom.labelList.innerHTML = state.kelompokData[type].map((item, idx) => `
<div class="label-item-cyber" onclick="selectLabel(${idx})">
<span class="label-text-cyber">${item.label}</span>
<span class="label-arrow-cyber">→</span>
</div>
`).join('');

dom.labelPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function selectLabel(idx) {
if (!selectedType) return;
selectedLabel = idx;

document.querySelectorAll('.label-item-cyber').forEach((item, i) => {
item.classList.toggle('active', i === idx);
});

const item = state.kelompokData[selectedType][idx];
dom.resultDisplay.style.display = 'block';
dom.resultValue.textContent = item.value;

dom.resultDisplay.onclick = () => copyText(item.value);
dom.resultDisplay.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderList(container, items, search) {
const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
if (!filtered.length) {
container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:30px;">No data found</p>';
return;
}
container.innerHTML = filtered.map(v => `
<div class="item-card-cyber" onclick="copyText('${encodeURIComponent(v.content)}')">
<div class="item-title-cyber">${v.title}</div>
<div class="item-content-cyber">${v.content}</div>
</div>
`).join('');
}

function renderPrediksi() {
renderList(dom.listP, state.prediksi, dom.srcP.value);
renderList(dom.listJ, state.jadwal, dom.srcJ.value);
renderList(dom.listL, state.link, dom.srcL.value);
dom.cntP.textContent = state.prediksi.length;
dom.cntJ.textContent = state.jadwal.length;
dom.cntL.textContent = state.link.length;
}

function renderHitung() {
if (!state.hitung.length) {
dom.contH.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;">No data</p>';
return;
}
dom.contH.innerHTML = state.hitung.map(s => `
<div class="pasaran-card-cyber">
<div class="pasaran-header-cyber"><h4 class="pasaran-title-cyber">${s.title}</h4></div>
<div class="pasaran-content-cyber">
 ${s.items.map(it => `
<div class="bet-row-cyber" onclick="copyText('${encodeURIComponent(it.res)}')">
<span class="bet-type-cyber">${it.type}</span>
<span class="bet-value-cyber">${it.res}</span>
</div>
`).join('')}
</div>
</div>
`).join('');
}

function manualUpdateTanggal() {
if (!dom.inTgl.value) return showToast("Select date first!");
const parts = dom.inTgl.value.split('-');
const formattedDate = `${parts[1]}/${parts[2]}/${parts[0]}`;
dom.btnTgl.disabled = true;
dom.statTgl.textContent = "SYNCING...";

updateSheet('updateTanggal', formattedDate).then(success => {
dom.btnTgl.disabled = false;
if (success) {
dom.statTgl.textContent = "SYNCED";
showToast("Date updated!");
fetchPrediksi();
fetchHitung();
} else {
dom.statTgl.textContent = "ERROR";
showToast("Update failed");
}
});
}

function manualUpdateNominal() {
if (!dom.inNom.value) return showToast("Enter nominal!");
dom.btnNom.disabled = true;
dom.statNom.textContent = "SYNCING...";

updateSheet('updateNominal', dom.inNom.value).then(success => {
dom.btnNom.disabled = false;
if (success) {
dom.statNom.textContent = "Rp " + formatNum(dom.inNom.value);
showToast("Nominal updated!");
fetchPrediksi();
fetchHitung();
} else {
dom.statNom.textContent = "ERROR";
showToast("Update failed");
}
});
}

function init() {
document.querySelectorAll('.tab-cyber').forEach(t => t.onclick = () => {
document.querySelectorAll('.tab-cyber').forEach(b => b.classList.remove('active'));
t.classList.add('active');
dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
});

dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);

fetchPrediksi();
fetchHitung();
}

document.addEventListener('DOMContentLoaded', () => {
createParticles();
init();
});
</script>
</body>
</html>

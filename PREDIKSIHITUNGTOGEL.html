<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDIKSI DAN HITUNG TOGEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #030a12;
            --bg-card: #061520;
            --fg: #e0f4ff;
            --muted: #4a7c9b;
            --accent: #00d4ff;
            --accent-glow: #00a8cc;
            --border: #0a3d5c;
            --card-hover: #0a2535;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .glow-1 {
            top: -200px;
            left: -200px;
            background: var(--accent);
            animation: float1 20s ease-in-out infinite;
        }

        .glow-2 {
            bottom: -200px;
            right: -200px;
            background: #0066ff;
            animation: float2 25s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(100px, 100px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-100px, -100px); }
        }

        /* Typography */
        .font-display {
            font-family: 'Orbitron', sans-serif;
        }

        /* Neon Text Effect */
        .neon-text {
            text-shadow: 
                0 0 10px var(--accent),
                0 0 20px var(--accent),
                0 0 40px var(--accent-glow);
        }

        /* Card Styles */
        .card {
            background: linear-gradient(145deg, var(--bg-card) 0%, rgba(6, 21, 32, 0.8) 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
        }

        /* Tab Navigation */
        .tab-btn {
            position: relative;
            padding: 14px 32px;
            font-weight: 600;
            color: var(--muted);
            transition: all 0.3s ease;
            border-radius: 12px 12px 0 0;
            background: transparent;
            border: 1px solid transparent;
            border-bottom: none;
        }

        .tab-btn:hover {
            color: var(--fg);
        }

        .tab-btn.active {
            color: var(--accent);
            background: var(--bg-card);
            border-color: var(--border);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent);
        }

        /* Input Styles */
        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: var(--fg);
            padding: 12px 16px;
            border-radius: 10px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .input-field::placeholder {
            color: var(--muted);
        }

        /* Item List */
        .item-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .item-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .item-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.15);
        }

        .item-card:hover::before {
            left: 100%;
        }

        .item-card:active {
            transform: scale(0.98);
        }

        /* Copy Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, var(--accent) 0%, #0088aa 100%);
            color: var(--bg);
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.4);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Section Header */
        .section-header {
            background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
            height: 2px;
            position: relative;
            margin-bottom: 20px;
        }

        .section-header::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Button */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #0088cc 100%);
            color: var(--bg);
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* Grid Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-item {
            animation: fadeInUp 0.4s ease forwards;
            opacity: 0;
        }

        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Badge */
        .badge {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .tab-btn {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-grid"></div>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Berhasil disalin!</div>

    <!-- Main Container -->
    <div class="relative z-10 min-h-screen p-4 md:p-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="font-display text-3xl md:text-5xl font-black neon-text mb-3 tracking-wider">
                PREDIKSI DAN HITUNG TOGEL
            </h1>
            <p class="text-[var(--muted)] text-sm md:text-base max-w-xl mx-auto">
                Sistem prediksi dan kalkulasi togel real-time dengan data terupdate
            </p>
        </header>

        <!-- Tab Navigation -->
        <nav class="flex justify-center gap-2 mb-0 flex-wrap">
            <button class="tab-btn active font-display" data-tab="prediksi">
                PREDIKSI TOGEL
            </button>
            <button class="tab-btn font-display" data-tab="hitung">
                HITUNG TOGEL
            </button>
        </nav>

        <!-- Tab Content -->
        <main class="card p-6 md:p-8 relative -mt-[2px]">
            <!-- Prediksi Tab -->
            <div id="prediksi-tab" class="tab-content">
                <!-- Date Section -->
                <div class="mb-8 p-6 bg-black/30 rounded-xl border border-[var(--border)]">
                    <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                        <div>
                            <label class="text-[var(--muted)] text-sm mb-2 block">Tanggal Prediksi</label>
                            <input type="date" id="tanggal" class="input-field w-full md:w-auto" />
                        </div>
                        <button id="simpan-tanggal" class="btn-primary whitespace-nowrap">
                            Simpan Tanggal
                        </button>
                    </div>
                    <p id="tanggal-display" class="mt-4 text-[var(--accent)] font-display text-lg"></p>
                </div>

                <!-- Search & Sections Grid -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Prediksi Togel Section -->
                    <div class="lg:col-span-1">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="font-display text-lg font-bold text-[var(--accent)]">PREDIKSI TOGEL</h2>
                            <span class="badge" id="count-prediksi">0</span>
                        </div>
                        <div class="section-header"></div>
                        <input type="text" id="search-prediksi" class="input-field mb-4" placeholder="Cari prediksi...">
                        <div id="list-prediksi" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                            <div class="flex justify-center py-8">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Jadwal Pasaran Section -->
                    <div class="lg:col-span-1">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="font-display text-lg font-bold text-[var(--accent)]">JADWAL PASARAN</h2>
                            <span class="badge" id="count-jadwal">0</span>
                        </div>
                        <div class="section-header"></div>
                        <input type="text" id="search-jadwal" class="input-field mb-4" placeholder="Cari jadwal...">
                        <div id="list-jadwal" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                            <div class="flex justify-center py-8">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Link Live Section -->
                    <div class="lg:col-span-1">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="font-display text-lg font-bold text-[var(--accent)]">LINK LIVE PASARAN</h2>
                            <span class="badge" id="count-link">0</span>
                        </div>
                        <div class="section-header"></div>
                        <input type="text" id="search-link" class="input-field mb-4" placeholder="Cari link...">
                        <div id="list-link" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                            <div class="flex justify-center py-8">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Hitung Tab -->
            <div id="hitung-tab" class="tab-content hidden">
                <!-- Nominal Section -->
                <div class="mb-8 p-6 bg-black/30 rounded-xl border border-[var(--border)]">
                    <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                        <div class="w-full md:w-auto">
                            <label class="text-[var(--muted)] text-sm mb-2 block">Nominal untuk Hitung</label>
                            <input type="number" id="nominal" class="input-field w-full md:w-64" placeholder="Masukkan nominal..." />
                        </div>
                        <button id="simpan-nominal" class="btn-primary whitespace-nowrap">
                            Simpan Nominal
                        </button>
                    </div>
                    <p id="nominal-display" class="mt-4 text-[var(--accent)] font-display text-lg"></p>
                </div>

                <!-- Pasaran Sections -->
                <div id="hitung-container" class="space-y-6">
                    <div class="flex justify-center py-12">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="text-center mt-8 text-[var(--muted)] text-sm">
            <p>Powered by Real-time Google Sheets Data</p>
        </footer>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const CONFIG = {
            prediksiSheet: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
            hitungSheet: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810',
            storageKeys: {
                tanggal: 'togel_tanggal',
                nominal: 'togel_nominal'
            }
        };

        // ========== STATE ==========
        const state = {
            prediksiData: [],
            jadwalData: [],
            linkData: [],
            hitungData: [],
            currentNominal: ''
        };

        // ========== DOM ELEMENTS ==========
        const elements = {
            tabBtns: document.querySelectorAll('.tab-btn'),
            prediksiTab: document.getElementById('prediksi-tab'),
            hitungTab: document.getElementById('hitung-tab'),
            tanggal: document.getElementById('tanggal'),
            simpanTanggal: document.getElementById('simpan-tanggal'),
            tanggalDisplay: document.getElementById('tanggal-display'),
            searchPrediksi: document.getElementById('search-prediksi'),
            searchJadwal: document.getElementById('search-jadwal'),
            searchLink: document.getElementById('search-link'),
            listPrediksi: document.getElementById('list-prediksi'),
            listJadwal: document.getElementById('list-jadwal'),
            listLink: document.getElementById('list-link'),
            countPrediksi: document.getElementById('count-prediksi'),
            countJadwal: document.getElementById('count-jadwal'),
            countLink: document.getElementById('count-link'),
            nominal: document.getElementById('nominal'),
            simpanNominal: document.getElementById('simpan-nominal'),
            nominalDisplay: document.getElementById('nominal-display'),
            hitungContainer: document.getElementById('hitung-container'),
            toast: document.getElementById('toast')
        };

        // ========== UTILITIES ==========
        function showToast(message) {
            elements.toast.textContent = message;
            elements.toast.classList.add('show');
            setTimeout(() => elements.toast.classList.remove('show'), 2500);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`Berhasil disalin: ${text.substring(0, 30)}${text.length > 30 ? '...' : ''}`);
            }).catch(() => {
                showToast('Gagal menyalin');
            });
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const result = [];
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.trim()) {
                    const cols = [];
                    let current = '';
                    let inQuotes = false;
                    
                    for (let j = 0; j < line.length; j++) {
                        const char = line[j];
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            cols.push(current.trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    cols.push(current.trim());
                    result.push(cols);
                }
            }
            return result;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                return `${parts[2]}-${parts[0].padStart(2, '0')}-${parts[1].padStart(2, '0')}`;
            }
            return dateStr;
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('id-ID').format(num);
        }

        // ========== DATA FETCHING ==========
        async function fetchPrediksiData() {
            try {
                const response = await fetch(CONFIG.prediksiSheet);
                const csvText = await response.text();
                const data = parseCSV(csvText);
                
                // Extract data from columns
                state.prediksiData = [];
                state.jadwalData = [];
                state.linkData = [];
                
                // B1 - Tanggal (row 0, col 1)
                if (data[0] && data[0][1]) {
                    const savedTanggal = localStorage.getItem(CONFIG.storageKeys.tanggal);
                    if (!savedTanggal) {
                        const dateVal = data[0][1];
                        elements.tanggal.value = formatDate(dateVal);
                    }
                }
                
                // B3:B85 - Prediksi Togel (rows 2-84, col 1)
                for (let i = 2; i <= 84 && i < data.length; i++) {
                    if (data[i] && data[i][1] && data[i][1].trim()) {
                        state.prediksiData.push({
                            title: data[i][1].split(/[\s,]+/)[0] || data[i][1].substring(0, 20),
                            content: data[i][1].trim()
                        });
                    }
                }
                
                // C3:C56 - Jadwal Pasaran (rows 2-55, col 2)
                for (let i = 2; i <= 55 && i < data.length; i++) {
                    if (data[i] && data[i][2] && data[i][2].trim()) {
                        state.jadwalData.push({
                            title: data[i][2].split(/[\s,]+/)[0] || data[i][2].substring(0, 20),
                            content: data[i][2].trim()
                        });
                    }
                }
                
                // C57:C83 - Link Live (rows 56-82, col 2)
                for (let i = 56; i <= 82 && i < data.length; i++) {
                    if (data[i] && data[i][2] && data[i][2].trim()) {
                        state.linkData.push({
                            title: data[i][2].split(/[\s,]+/)[0] || data[i][2].substring(0, 20),
                            content: data[i][2].trim()
                        });
                    }
                }
                
                renderPrediksiLists();
            } catch (error) {
                console.error('Error fetching prediksi data:', error);
                elements.listPrediksi.innerHTML = '<p class="text-center text-red-400 py-8">Gagal memuat data</p>';
                elements.listJadwal.innerHTML = '<p class="text-center text-red-400 py-8">Gagal memuat data</p>';
                elements.listLink.innerHTML = '<p class="text-center text-red-400 py-8">Gagal memuat data</p>';
            }
        }

        async function fetchHitungData() {
            try {
                const response = await fetch(CONFIG.hitungSheet);
                const csvText = await response.text();
                const data = parseCSV(csvText);
                
                // X1 - Nominal (row 0, col 23)
                if (data[0] && data[0][23]) {
                    const savedNominal = localStorage.getItem(CONFIG.storageKeys.nominal);
                    if (!savedNominal) {
                        state.currentNominal = data[0][23];
                        elements.nominal.value = state.currentNominal;
                    }
                }
                
                // Parse sections based on the structure
                const sections = [
                    { titleRow: 0, titleCol: 24, dataStart: 2, dataEnd: 42, typeCol: 23, resultCol: 24 },
                    { titleRow: 43, titleCol: 24, dataStart: 45, dataEnd: 80, typeCol: 23, resultCol: 24 },
                    { titleRow: 81, titleCol: 24, dataStart: 83, dataEnd: 119, typeCol: 23, resultCol: 24 },
                    { titleRow: 120, titleCol: 24, dataStart: 122, dataEnd: 153, typeCol: 23, resultCol: 24 },
                    { titleRow: 154, titleCol: 24, dataStart: 156, dataEnd: 179, typeCol: 23, resultCol: 24 },
                    { titleRow: 180, titleCol: 24, dataStart: 182, dataEnd: 213, typeCol: 23, resultCol: 24 },
                    { titleRow: 215, titleCol: 24, dataStart: 217, dataEnd: 248, typeCol: 23, resultCol: 24 },
                    { titleRow: 249, titleCol: 24, dataStart: 251, dataEnd: 282, typeCol: 23, resultCol: 24 },
                    { titleRow: 283, titleCol: 24, dataStart: 285, dataEnd: 316, typeCol: 23, resultCol: 24 }
                ];
                
                state.hitungData = sections.map(section => {
                    const title = data[section.titleRow] && data[section.titleRow][section.titleCol] 
                        ? data[section.titleRow][section.titleCol] 
                        : 'PASARAN';
                    
                    const items = [];
                    for (let i = section.dataStart; i <= section.dataEnd && i < data.length; i++) {
                        if (data[i]) {
                            const type = data[i][section.typeCol] || '';
                            const result = data[i][section.resultCol] || '';
                            if (type.trim() || result.trim()) {
                                items.push({
                                    type: type.trim(),
                                    result: result.trim()
                                });
                            }
                        }
                    }
                    
                    return { title, items };
                }).filter(s => s.items.length > 0);
                
                renderHitungSections();
            } catch (error) {
                console.error('Error fetching hitung data:', error);
                elements.hitungContainer.innerHTML = '<p class="text-center text-red-400 py-8">Gagal memuat data</p>';
            }
        }

        // ========== RENDERING ==========
        function renderList(container, data, searchValue = '') {
            const filtered = data.filter(item => 
                item.content.toLowerCase().includes(searchValue.toLowerCase()) ||
                item.title.toLowerCase().includes(searchValue.toLowerCase())
            );
            
            if (filtered.length === 0) {
                container.innerHTML = '<p class="text-center text-[var(--muted)] py-8">Tidak ada data ditemukan</p>';
                return;
            }
            
            container.innerHTML = filtered.map((item, index) => `
                <div class="item-card animate-item" style="animation-delay: ${index * 30}ms" data-content="${encodeURIComponent(item.content)}">
                    <div class="text-xs text-[var(--muted)] mb-1">Judul:</div>
                    <div class="font-semibold text-[var(--accent)] mb-2">${item.title}</div>
                    <div class="text-xs text-[var(--muted)] mb-1">Klik untuk salin:</div>
                    <div class="text-sm text-[var(--fg)] break-all">${item.content}</div>
                </div>
            `).join('');
            
            // Add click handlers
            container.querySelectorAll('.item-card').forEach(card => {
                card.addEventListener('click', () => {
                    copyToClipboard(decodeURIComponent(card.dataset.content));
                });
            });
        }

        function renderPrediksiLists() {
            renderList(elements.listPrediksi, state.prediksiData, elements.searchPrediksi.value);
            renderList(elements.listJadwal, state.jadwalData, elements.searchJadwal.value);
            renderList(elements.listLink, state.linkData, elements.searchLink.value);
            
            elements.countPrediksi.textContent = state.prediksiData.length;
            elements.countJadwal.textContent = state.jadwalData.length;
            elements.countLink.textContent = state.linkData.length;
        }

        function renderHitungSections() {
            if (state.hitungData.length === 0) {
                elements.hitungContainer.innerHTML = '<p class="text-center text-[var(--muted)] py-8">Tidak ada data hitung</p>';
                return;
            }
            
            elements.hitungContainer.innerHTML = state.hitungData.map((section, sIndex) => `
                <div class="bg-black/30 rounded-xl border border-[var(--border)] overflow-hidden animate-item" style="animation-delay: ${sIndex * 100}ms">
                    <div class="bg-gradient-to-r from-[var(--accent)]/20 to-transparent p-4 border-b border-[var(--border)]">
                        <h3 class="font-display font-bold text-[var(--accent)]">${section.title}</h3>
                    </div>
                    <div class="p-4 space-y-2 max-h-[300px] overflow-y-auto">
                        ${section.items.map((item, index) => `
                            <div class="item-card flex justify-between items-center" data-result="${encodeURIComponent(item.result)}">
                                <span class="text-[var(--fg)]">${item.type}</span>
                                <span class="font-display font-bold text-[var(--accent)] cursor-pointer hover:underline">${item.result}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            
            // Add click handlers for results
            elements.hitungContainer.querySelectorAll('.item-card').forEach(card => {
                card.addEventListener('click', () => {
                    const result = decodeURIComponent(card.dataset.result);
                    if (result) copyToClipboard(result);
                });
            });
        }

        // ========== EVENT HANDLERS ==========
        function initTabs() {
            elements.tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    elements.tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    const tab = btn.dataset.tab;
                    if (tab === 'prediksi') {
                        elements.prediksiTab.classList.remove('hidden');
                        elements.hitungTab.classList.add('hidden');
                    } else {
                        elements.prediksiTab.classList.add('hidden');
                        elements.hitungTab.classList.remove('hidden');
                    }
                });
            });
        }

        function initTanggalHandlers() {
            // Load saved tanggal
            const savedTanggal = localStorage.getItem(CONFIG.storageKeys.tanggal);
            if (savedTanggal) {
                elements.tanggal.value = savedTanggal;
                elements.tanggalDisplay.textContent = `Tanggal tersimpan: ${savedTanggal}`;
            }
            
            elements.simpanTanggal.addEventListener('click', () => {
                const tanggal = elements.tanggal.value;
                if (tanggal) {
                    localStorage.setItem(CONFIG.storageKeys.tanggal, tanggal);
                    elements.tanggalDisplay.textContent = `Tanggal tersimpan: ${tanggal}`;
                    showToast('Tanggal berhasil disimpan!');
                    
                    // Refresh data
                    fetchPrediksiData();
                } else {
                    showToast('Pilih tanggal terlebih dahulu');
                }
            });
        }

        function initNominalHandlers() {
            // Load saved nominal
            const savedNominal = localStorage.getItem(CONFIG.storageKeys.nominal);
            if (savedNominal) {
                elements.nominal.value = savedNominal;
                elements.nominalDisplay.textContent = `Nominal: Rp ${formatNumber(savedNominal)}`;
            }
            
            elements.simpanNominal.addEventListener('click', () => {
                const nominal = elements.nominal.value;
                if (nominal) {
                    localStorage.setItem(CONFIG.storageKeys.nominal, nominal);
                    state.currentNominal = nominal;
                    elements.nominalDisplay.textContent = `Nominal: Rp ${formatNumber(nominal)}`;
                    showToast('Nominal berhasil disimpan!');
                    
                    // Refresh data
                    fetchHitungData();
                } else {
                    showToast('Masukkan nominal terlebih dahulu');
                }
            });
        }

        function initSearchHandlers() {
            elements.searchPrediksi.addEventListener('input', () => {
                renderList(elements.listPrediksi, state.prediksiData, elements.searchPrediksi.value);
            });
            
            elements.searchJadwal.addEventListener('input', () => {
                renderList(elements.listJadwal, state.jadwalData, elements.searchJadwal.value);
            });
            
            elements.searchLink.addEventListener('input', () => {
                renderList(elements.listLink, state.linkData, elements.searchLink.value);
            });
        }

        // ========== INITIALIZATION ==========
        async function init() {
            initTabs();
            initTanggalHandlers();
            initNominalHandlers();
            initSearchHandlers();
            
            // Fetch data
            await Promise.all([
                fetchPrediksiData(),
                fetchHitungData()
            ]);
        }

        // Start the app
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

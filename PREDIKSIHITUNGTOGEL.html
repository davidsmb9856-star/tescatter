<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ TOGEL FLUID ⚡</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #010001;
  --bg-fluid: #020103;
  --neon-blue: #00d4ff;
  --neon-azure: #00a8ff;
  --neon-electric: #00ffff;
  --neon-violet: #7b2cff;
  --glow-core: 0 0 20px #00d4ff, 0 0 45px #00a8ff66, 0 0 80px #00d4ff33;
  --glow-intense: 0 0 30px #00d4ff, 0 0 70px #00a8ff99, 0 0 120px #00d4ff55, 0 0 180px #7b2cff44;
  --fluid-grad: linear-gradient(125deg, #00d4ff 0%, #00a8ff 35%, #7b2cff 70%, #00d4ff 100%);
  --ease-fluid: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-deep);
  color: #e6f7ff;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* === FLUID BACKGROUND === */
.fluid-bg {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(ellipse at 15% 85%, rgba(123, 44, 255, 0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, rgba(0, 212, 255, 0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(0, 168, 255, 0.06) 0%, transparent 70%),
    var(--bg-fluid);
  animation: fluidShift 45s ease-in-out infinite;
}
@keyframes fluidShift {
  0%, 100% { filter: hue-rotate(0deg) saturate(1); }
  25% { filter: hue-rotate(8deg) saturate(1.1); }
  50% { filter: hue-rotate(-5deg) saturate(0.95); }
  75% { filter: hue-rotate(12deg) saturate(1.05); }
}

/* === WAVE MESH === */
.wave-mesh {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.04) 0%, transparent 25%),
    radial-gradient(circle at 80% 70%, rgba(123, 44, 255, 0.04) 0%, transparent 25%),
    repeating-linear-gradient(45deg, rgba(0, 212, 255, 0.02) 0px, rgba(0, 212, 255, 0.02) 1px, transparent 1px, transparent 35px),
    repeating-linear-gradient(-45deg, rgba(0, 212, 255, 0.02) 0px, rgba(0, 212, 255, 0.02) 1px, transparent 1px, transparent 35px);
  animation: meshFlow 60s linear infinite;
  opacity: 0.8;
}
@keyframes meshFlow { 0% { transform: perspective(800px) rotateX(55deg) translateY(0) } 100% { transform: perspective(800px) rotateX(55deg) translateY(100px) } }

/* === FLOATING PARTICLES === */
.fluid-particles { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
.fluid-particle {
  position: absolute; width: 4px; height: 4px; border-radius: 50%;
  background: var(--neon-blue); opacity: 0;
  animation: floatUp 30s infinite var(--ease-fluid);
  box-shadow: 0 0 12px var(--neon-blue), 0 0 30px var(--neon-azure);
}
.fluid-particle:nth-child(2n) { background: var(--neon-violet); animation-delay: -10s; animation-duration: 35s; }
.fluid-particle:nth-child(3n) { background: var(--neon-electric); animation-delay: -20s; animation-duration: 40s; }
@keyframes floatUp {
  0%, 100% { transform: translateY(120vh) translateX(0) scale(0.6); opacity: 0; }
  15% { opacity: 1; }
  85% { opacity: 1; }
  100% { transform: translateY(-20vh) translateX(60px) scale(1.3); opacity: 0; }
}

/* === MAIN WRAPPER === */
.app-wrapper {
  position: relative; z-index: 10;
  max-width: 1300px; margin: 0 auto; padding: 20px;
}

/* === HEADER LIQUID === */
.liquid-header {
  text-align: center; padding: 35px 0 25px;
  animation: liquidIn 1s var(--ease-fluid) backwards;
}
@keyframes liquidIn { from { opacity: 0; transform: translateY(-30px) scale(0.95) } to { opacity: 1; transform: translateY(0) scale(1) } }

.brand-title {
  font-family: 'Syncopate', sans-serif;
  font-size: clamp(1.9rem, 6vw, 3.4rem);
  font-weight: 700; letter-spacing: 4px;
  background: var(--fluid-grad);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--glow-core);
  animation: brandPulse 4s ease-in-out infinite;
  position: relative; display: inline-block;
}
@keyframes brandPulse {
  0%, 100% { filter: brightness(1) blur(0); }
  50% { filter: brightness(1.35) blur(0.3px); }
}
.brand-title::before {
  content: ''; position: absolute; inset: -8px; border-radius: 20px;
  background: var(--fluid-grad); filter: blur(25px); opacity: 0.25;
  animation: brandGlow 3s ease-in-out infinite; z-index: -1;
}
@keyframes brandGlow { 0%, 100% { opacity: 0.2; transform: scale(1) } 50% { opacity: 0.4; transform: scale(1.05) } }

/* === NAVIGATION - LIQUID PILLS === */
.liquid-nav {
  display: flex; justify-content: center; gap: 6px; margin: 18px 0 24px;
  background: rgba(3, 2, 5, 0.6); border-radius: 50px; padding: 5px;
  max-width: fit-content; margin-inline: auto;
  border: 1px solid rgba(0, 212, 255, 0.2);
  backdrop-filter: blur(6px);
}
.nav-pill {
  padding: 11px 32px; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.95rem;
  color: #9fb3c8; background: transparent; border: none; border-radius: 45px;
  cursor: pointer; transition: all 0.4s var(--ease-fluid); position: relative; overflow: hidden;
  text-transform: uppercase; letter-spacing: 1.5px;
}
.nav-pill::after {
  content: ''; position: absolute; inset: 0; border-radius: 45px; padding: 1px;
  background: var(--fluid-grad); -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.3s;
}
.nav-pill:hover { color: var(--neon-blue); transform: translateY(-2px); }
.nav-pill:hover::after { opacity: 1; }
.nav-pill.active {
  color: #fff; background: rgba(0, 212, 255, 0.15);
  border: 1px solid rgba(0, 212, 255, 0.4);
  box-shadow: var(--glow-core);
}
.nav-pill.active::before {
  content: ''; position: absolute; inset: 0; border-radius: 45px;
  background: var(--fluid-grad); opacity: 0.15; animation: liquidFlow 3s linear infinite;
}
@keyframes liquidFlow { 0% { background-position: 0% 50% } 100% { background-position: 200% 50% } }

/* === CONTENT CARD - ASYMMETRIC === */
.fluid-card {
  background: linear-gradient(145deg, rgba(5, 3, 10, 0.85), rgba(8, 5, 18, 0.78));
  border-radius: 28px 28px 28px 8px;
  border: 1px solid rgba(0, 212, 255, 0.18);
  padding: 24px; position: relative; overflow: hidden;
  backdrop-filter: blur(14px);
  box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
}
.fluid-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--fluid-grad); background-size: 200% 100%;
  animation: borderLiquid 5s linear infinite; opacity: 0.7;
}
@keyframes borderLiquid { 0% { background-position: 0% 50% } 100% { background-position: 200% 50% } }

/* === CONTROL BAR - HORIZONTAL CHIPS === */
.control-bar {
  display: flex; flex-wrap: nowrap; gap: 14px; align-items: center;
  padding: 14px 18px; margin-bottom: 22px;
  background: linear-gradient(135deg, rgba(6, 4, 14, 0.72), rgba(10, 6, 24, 0.65));
  border: 1px solid rgba(0, 212, 255, 0.22); border-radius: 18px;
  backdrop-filter: blur(8px);
}
.control-label { color: var(--neon-blue); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; }
.control-input {
  padding: 9px 14px; background: rgba(4, 2, 10, 0.8); border: 1px solid rgba(0, 212, 255, 0.28);
  border-radius: 12px; color: #fff; font-size: 0.93rem; width: 165px;
  transition: all 0.3s var(--ease-smooth); font-family: 'Rajdhani', sans-serif;
}
.control-input:focus { outline: none; border-color: var(--neon-blue); box-shadow: var(--glow-core); }

/* === ACTION BUTTON - LIQUID FILL === */
.btn-liquid {
  padding: 10px 24px; background: transparent; border: 2px solid var(--neon-blue);
  border-radius: 14px; color: var(--neon-blue); font-family: 'Rajdhani', sans-serif;
  font-weight: 700; font-size: 0.85rem; cursor: pointer; position: relative; overflow: hidden;
  transition: all 0.35s var(--ease-fluid); text-transform: uppercase; letter-spacing: 1px;
}
.btn-liquid::before {
  content: ''; position: absolute; inset: 0; background: var(--fluid-grad);
  transform: scaleX(0); transform-origin: left; transition: transform 0.4s var(--ease-fluid);
  z-index: -1; border-radius: 12px;
}
.btn-liquid:hover::before { transform: scaleX(1); }
.btn-liquid:hover { color: #010001; border-color: transparent; box-shadow: var(--glow-intense); transform: translateY(-3px); }
.btn-liquid:active { transform: translateY(-1px); }
.btn-liquid:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

.status-indicator { font-size: 0.83rem; color: #00ffaa; margin-left: 10px; font-weight: 600; animation: pulseSoft 2.5s ease-in-out infinite; }
@keyframes pulseSoft { 0%, 100% { opacity: 1 } 50% { opacity: 0.7 } }

/* === GRID LAYOUT - MAGNETIC === */
.magnetic-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
  gap: 20px;
}

/* === MODULE BOX - HOLOGRAPHIC === */
.holo-box {
  background: linear-gradient(155deg, rgba(7, 4, 16, 0.78), rgba(11, 6, 26, 0.68));
  border-radius: 22px 22px 22px 10px; border: 1px solid rgba(0, 212, 255, 0.16);
  overflow: hidden; display: flex; flex-direction: column;
  backdrop-filter: blur(10px); transition: all 0.4s var(--ease-fluid);
  position: relative;
}
.holo-box::after {
  content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0, 212, 255, 0.15), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.3s;
}
.holo-box:hover { border-color: rgba(0, 212, 255, 0.45); box-shadow: var(--glow-core); transform: translateY(-4px) rotateX(1deg); }
.holo-box:hover::after { opacity: 1; }

.holo-head {
  padding: 14px 18px; border-bottom: 1px solid rgba(0, 212, 255, 0.14);
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(90deg, rgba(0, 212, 255, 0.08), transparent 65%);
}
.holo-title { font-family: 'Syncopate', sans-serif; font-weight: 700; color: var(--neon-blue); font-size: 0.92rem; letter-spacing: 1px; }
.holo-count {
  background: rgba(0, 212, 255, 0.14); color: var(--neon-blue); padding: 4px 11px;
  border-radius: 18px; font-size: 0.74rem; font-weight: 700; border: 1px solid rgba(0, 212, 255, 0.32);
}

.search-field { padding: 11px 16px; border-bottom: 1px solid rgba(0, 212, 255, 0.11); }
.search-field input {
  width: 100%; padding: 9px 13px; background: rgba(5, 3, 12, 0.7);
  border: 1px solid rgba(0, 212, 255, 0.24); border-radius: 11px;
  color: #fff; font-size: 0.89rem; transition: all 0.3s var(--ease-smooth); font-family: 'Rajdhani', sans-serif;
}
.search-field input:focus { outline: none; border-color: var(--neon-blue); box-shadow: var(--glow-core); }
.content-scroll { padding: 12px; overflow-y: auto; max-height: 410px; flex-grow: 1; }

/* === ITEM TILE - MORPHING === */
.morph-tile {
  background: linear-gradient(140deg, rgba(8, 5, 20, 0.72), rgba(13, 8, 32, 0.62));
  border: 1px solid rgba(0, 212, 255, 0.19); border-radius: 16px 16px 16px 6px;
  padding: 14px 16px; margin-bottom: 10px; cursor: pointer;
  transition: all 0.35s var(--ease-fluid); position: relative; overflow: hidden;
}
.morph-tile::before {
  content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
  background: var(--fluid-grad); opacity: 0; transition: opacity 0.3s;
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
}
.morph-tile:hover::before { opacity: 1; }
.morph-tile:hover {
  border-color: var(--neon-blue); box-shadow: var(--glow-core);
  transform: translateY(-3px) scale(1.01); background: linear-gradient(140deg, rgba(10, 7, 26, 0.82), rgba(16, 10, 38, 0.72));
}
.tile-meta { font-size: 0.69rem; color: #8a9db3; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 3px; font-weight: 600; }
.tile-head { color: var(--neon-blue); font-weight: 700; margin-bottom: 5px; font-size: 0.94rem; }
.tile-body { font-size: 0.84rem; color: #e6f7ff; line-height: 1.48; white-space: pre-wrap; word-break: break-word; opacity: 0.96; }

/* === MARKET CARD - WAVE BORDER === */
.market-card {
  background: linear-gradient(145deg, rgba(7, 4, 18, 0.75), rgba(12, 7, 30, 0.65));
  border-radius: 20px 20px 20px 8px; border: 1px solid rgba(0, 212, 255, 0.18);
  overflow: hidden; margin-bottom: 12px; transition: all 0.35s var(--ease-fluid);
}
.market-card:hover { border-color: rgba(0, 212, 255, 0.42); box-shadow: var(--glow-core); }
.market-head {
  padding: 13px 17px; border-bottom: 1px solid rgba(0, 212, 255, 0.14);
  background: linear-gradient(90deg, rgba(0, 212, 255, 0.11), transparent 70%);
}
.market-title { font-family: 'Syncopate', sans-serif; font-weight: 700; color: var(--neon-blue); font-size: 0.89rem; letter-spacing: 0.8px; }
.market-body { padding: 9px 13px; max-height: 330px; overflow-y: auto; }

/* === BET ROW - SLIDE REVEAL === */
.bet-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; margin-bottom: 6px;
  background: rgba(6, 4, 16, 0.62); border: 1px solid rgba(0, 212, 255, 0.17);
  border-radius: 12px 12px 12px 5px; cursor: pointer;
  transition: all 0.3s var(--ease-smooth); position: relative; overflow: hidden;
}
.bet-row::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--fluid-grad); transform: scaleY(0); transition: transform 0.3s var(--ease-fluid);
}
.bet-row:hover::after { transform: scaleY(1); }
.bet-row:hover { border-color: var(--neon-blue); background: rgba(9, 6, 22, 0.75); transform: translateX(4px); }
.bet-label { color: #fff; font-size: 0.84rem; flex: 1; margin-right: 11px; font-weight: 500; }
.bet-value {
  font-family: 'Syncopate', sans-serif; font-weight: 700; color: var(--neon-blue);
  font-size: 0.84rem; background: rgba(0, 212, 255, 0.11); padding: 4px 10px;
  border-radius: 9px; border: 1px solid rgba(0, 212, 255, 0.28);
}
.bet-row:hover .bet-value { background: rgba(0, 212, 255, 0.22); box-shadow: 0 0 14px rgba(0, 212, 255, 0.35); }

/* === CALCULATOR SECTION - FLUID GRID === */
.fluid-calc {
  background: linear-gradient(140deg, rgba(8, 5, 22, 0.78), rgba(13, 8, 34, 0.68));
  border: 1px solid rgba(123, 44, 255, 0.24); border-radius: 24px 24px 24px 10px;
  padding: 20px; margin: 20px 0; backdrop-filter: blur(12px);
}
.calc-head { display: flex; align-items: center; gap: 11px; margin-bottom: 18px; padding-bottom: 13px; border-bottom: 1px solid rgba(123, 44, 255, 0.19); }
.calc-icon { font-size: 1.5rem; }
.calc-title { font-family: 'Syncopate', sans-serif; font-weight: 700; color: var(--neon-violet); font-size: 1.08rem; letter-spacing: 0.5px; }

/* === CHIP SELECTOR - HORIZONTAL SCROLL === */
.chip-wrap { display: flex; flex-direction: column; gap: 13px; }
.chip-label { font-family: 'Syncopate', sans-serif; font-size: 0.82rem; font-weight: 700; color: var(--neon-blue); letter-spacing: 1px; }
.chip-track {
  display: flex; gap: 9px; overflow-x: auto; padding: 4px 2px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.chip-track::-webkit-scrollbar { display: none; }
.chip-btn {
  flex: 0 0 auto; padding: 9px 16px; background: rgba(6, 4, 16, 0.75);
  border: 1px solid rgba(0, 212, 255, 0.28); border-radius: 11px;
  color: #9fb3c8; font-size: 0.83rem; font-weight: 600; cursor: pointer;
  transition: all 0.3s var(--ease-smooth); white-space: nowrap; font-family: 'Rajdhani', sans-serif;
}
.chip-btn:hover { border-color: var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
.chip-btn.active {
  background: rgba(0, 212, 255, 0.15); border-color: var(--neon-blue);
  color: #fff; box-shadow: var(--glow-core);
}
.chip-placeholder { color: #6b7f96; font-style: italic; }

.calc-btn {
  padding: 12px 28px; background: transparent; border: 2px solid var(--neon-blue);
  border-radius: 15px; color: var(--neon-blue); font-family: 'Rajdhani', sans-serif;
  font-weight: 700; font-size: 0.87rem; cursor: pointer; margin-top: 14px; width: 100%;
  position: relative; overflow: hidden; transition: all 0.35s var(--ease-fluid);
  text-transform: uppercase; letter-spacing: 1.2px;
}
.calc-btn::before {
  content: ''; position: absolute; inset: 0; background: var(--fluid-grad);
  transform: scaleX(0); transform-origin: left; transition: transform 0.4s var(--ease-fluid); z-index: -1; border-radius: 13px;
}
.calc-btn:hover::before { transform: scaleX(1); }
.calc-btn:hover { color: #010001; border-color: transparent; box-shadow: var(--glow-intense); }

#calcResult {
  margin-top: 19px; padding: 19px 23px; background: rgba(7, 5, 19, 0.78);
  border: 1px solid rgba(0, 212, 255, 0.28); border-radius: 16px 16px 16px 6px;
  font-family: 'Syncopate', sans-serif; font-size: 1.08rem; color: var(--neon-blue);
  text-align: center; min-height: 58px; display: flex; align-items: center; justify-content: center;
  transition: all 0.3s var(--ease-smooth); cursor: pointer;
}
#calcResult:hover { border-color: var(--neon-blue); box-shadow: var(--glow-core); background: rgba(9, 6, 24, 0.88); }

/* === TOAST - LIQUID POP === */
.liquid-toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(130px) scale(0.85);
  background: linear-gradient(135deg, rgba(6, 4, 18, 0.96), rgba(10, 6, 28, 0.93));
  color: var(--neon-blue); padding: 14px 32px; border-radius: 55px;
  font-weight: 700; font-size: 0.94rem; opacity: 0; transition: all 0.5s var(--ease-fluid);
  z-index: 1000; border: 1px solid var(--neon-blue); backdrop-filter: blur(18px);
  text-shadow: 0 0 11px rgba(0, 212, 255, 0.75); box-shadow: var(--glow-intense);
}
.liquid-toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); animation: toastPop 0.55s var(--ease-fluid); }
@keyframes toastPop {
  0% { transform: translateX(-50%) translateY(130px) scale(0.82); opacity: 0; }
  45% { transform: translateX(-50%) translateY(-10px) scale(1.04); }
  100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
}

/* === SPINNER === */
.liquid-spinner {
  width: 34px; height: 34px; border: 3px solid rgba(0, 212, 255, 0.22);
  border-top-color: var(--neon-blue); border-radius: 50%;
  animation: spin 0.95s linear infinite; box-shadow: 0 0 18px rgba(0, 212, 255, 0.45);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === SCROLLBAR FLUID === */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: rgba(4, 2, 12, 0.45); border-radius: 3px; }
::-webkit-scrollbar-thumb {
  background: var(--fluid-grad); border-radius: 3px;
  border: 1px solid rgba(0, 212, 255, 0.22);
}
::-webkit-scrollbar-thumb:hover { filter: brightness(1.15); }

/* === AUTO-UPDATE BADGE === */
.auto-badge {
  position: fixed; top: 20px; right: 20px;
  background: rgba(0, 212, 255, 0.11); border: 1px solid var(--neon-blue);
  border-radius: 11px; padding: 8px 15px; font-size: 0.79rem;
  color: var(--neon-blue); display: none; align-items: center; gap: 8px;
  z-index: 1000; backdrop-filter: blur(11px); animation: badgePulse 1.3s infinite;
}
.auto-badge.show { display: flex; }
@keyframes badgePulse { 0%, 100% { opacity: 0.72 } 50% { opacity: 1 } }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .control-bar { flex-direction: column; align-items: stretch; }
  .control-input { width: 100%; }
  .magnetic-grid { grid-template-columns: 1fr; }
  .brand-title { font-size: clamp(1.7rem, 7vw, 2.8rem); }
  .nav-pill { padding: 10px 24px; font-size: 0.87rem; }
  .chip-track { flex-wrap: wrap; }
  .chip-btn { flex: 1 1 auto; text-align: center; }
}
::selection { background: rgba(0, 212, 255, 0.28); color: #fff; }
button:focus-visible, input:focus-visible { outline: 2px solid var(--neon-blue); outline-offset: 2px; box-shadow: var(--glow-core); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body>
<div class="fluid-bg"></div>
<div class="wave-mesh"></div>
<div class="fluid-particles" id="fluidParticles"></div>
<div id="liquidToast" class="liquid-toast">✨ Success!</div>
<div class="auto-badge" id="autoBadge"><span>🔄</span><span>Auto-Sync Active</span></div>

<div class="app-wrapper">
  <header class="liquid-header">
    <h1 class="brand-title">⚡ TOGEL FLUID ⚡</h1>
  </header>

  <nav class="liquid-nav">
    <button class="nav-pill active" data-tab="prediksi">🔮 Prediksi</button>
    <button class="nav-pill" data-tab="hitung">🧮 Hitung</button>
  </nav>

  <div class="fluid-card">
    <!-- TAB PREDIKSI -->
    <div id="tab-prediksi" class="tab-content">
      <div class="control-bar">
        <span class="control-label">📅 Tanggal</span>
        <input type="date" id="inputTanggal" class="control-input" onchange="autoUpdateTanggal()">
        <button class="btn-liquid" id="btnTanggal" onclick="manualUpdateTanggal()">⚡ Sync</button>
        <span class="status-indicator" id="statusTanggal"></span>
      </div>

      <div class="magnetic-grid">
        <div class="holo-box">
          <div class="holo-head">
            <h3 class="holo-title">🔮 Prediksi</h3>
            <span class="holo-count" id="countPrediksi">0</span>
          </div>
          <div class="search-field"><input type="text" id="searchPrediksi" placeholder="🔍 Filter..."></div>
          <div class="content-scroll" id="listPrediksi"><div style="display:flex;justify-content:center;padding:22px"><div class="liquid-spinner"></div></div></div>
        </div>

        <div class="holo-box">
          <div class="holo-head">
            <h3 class="holo-title">📅 Jadwal</h3>
            <span class="holo-count" id="countJadwal">0</span>
          </div>
          <div class="search-field"><input type="text" id="searchJadwal" placeholder="🔍 Filter..."></div>
          <div class="content-scroll" id="listJadwal"><div style="display:flex;justify-content:center;padding:22px"><div class="liquid-spinner"></div></div></div>
        </div>

        <div class="holo-box">
          <div class="holo-head">
            <h3 class="holo-title">🔗 Live Link</h3>
            <span class="holo-count" id="countLink">0</span>
          </div>
          <div class="search-field"><input type="text" id="searchLink" placeholder="🔍 Filter..."></div>
          <div class="content-scroll" id="listLink"><div style="display:flex;justify-content:center;padding:22px"><div class="liquid-spinner"></div></div></div>
        </div>
      </div>
    </div>

    <!-- TAB HITUNG -->
    <div id="tab-hitung" class="tab-content" style="display:none;">
      <div class="control-bar">
        <span class="control-label">💰 Nominal</span>
        <input type="number" id="inputNominal" class="control-input" placeholder="0" onchange="autoUpdateNominal()">
        <button class="btn-liquid" id="btnNominal" onclick="manualUpdateNominal()">⚡ Sync</button>
        <span class="status-indicator" id="statusNominal"></span>
      </div>

      <!-- FLUID CALCULATOR - HORIZONTAL CHIPS -->
      <div class="fluid-calc">
        <div class="calc-head">
          <span class="calc-icon">🧮</span>
          <h3 class="calc-title">Fluid Calculator</h3>
        </div>
        <div class="chip-wrap">
          <span class="chip-label">📊 Tipe</span>
          <div class="chip-track" id="chipTipe"></div>
          <span class="chip-label" style="margin-top:8px">🏷️ Label</span>
          <div class="chip-track" id="chipLabel"><span class="chip-btn chip-placeholder">-- Pilih tipe dulu --</span></div>
        </div>
        <button class="calc-btn" onclick="showCalcResult()">💧 Show Result</button>
        <div id="calcResult"><span style="color:#6b7f96">Select type & label to calculate</span></div>
      </div>

      <div class="magnetic-grid" id="containerHitung" style="margin-top:18px">
        <div style="display:flex;justify-content:center;padding:42px;width:100%"><div class="liquid-spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
// === CONFIG ===
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4', keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], calcData: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('inputTanggal'), btnTgl: $('btnTanggal'), statTgl: $('statusTanggal'),
  inNom: $('inputNominal'), btnNom: $('btnNominal'), statNom: $('statusNominal'),
  srcP: $('searchPrediksi'), srcJ: $('searchJadwal'), srcL: $('searchLink'),
  listP: $('listPrediksi'), listJ: $('listJadwal'), listL: $('listLink'),
  cntP: $('countPrediksi'), cntJ: $('countJadwal'), cntL: $('countLink'),
  contH: $('containerHitung'), toast: $('liquidToast'), badge: $('autoBadge'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), calcRes: $('calcResult')
};

// Particles
function createParticles() {
  const c = document.getElementById('fluidParticles'); if (!c) return;
  for (let i = 0; i < 45; i++) {
    const p = document.createElement('div'); p.className = 'fluid-particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 30 + 's';
    p.style.animationDuration = (25 + Math.random() * 20) + 's';
    c.appendChild(p);
  }
}

function showToast(msg) {
  dom.toast.textContent = '✨ ' + msg;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 3200);
}

function showBadge() {
  if (dom.badge) {
    dom.badge.classList.add('show');
    setTimeout(() => dom.badge.classList.remove('show'), 2200);
  }
}

function copyText(text) {
  let t = text; try { t = decodeURIComponent(text); } catch (e) {}
  navigator.clipboard.writeText(t).then(() => {
    const preview = t.length > 22 ? t.substring(0, 22) + '...' : t;
    showToast('📋 Copied: ' + preview);
  }).catch(() => showToast('❌ Copy failed'));
}

function fmt(n) { return new Intl.NumberFormat('id-ID').format(n); }

function parseCSV(txt) {
  let rows = [], row = [], cell = "", st = 0;
  for (let i = 0; i < txt.length; i++) {
    const c = txt[i], n = txt[i + 1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(cell); cell = ""; }
      else if (c === '\r' && n === '\n') { row.push(cell); rows.push(row); row = []; cell = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(cell); rows.push(row); row = []; cell = ""; }
      else cell += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { cell += '"'; i++; }
      else if (c === '"') st = 0;
      else cell += c;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

function get(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

async function syncSheet(action, val) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Setup Script URL first!'); return false; }
  try {
    const params = new URLSearchParams({ action, value: val });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch (e) { console.error(e); return false; }
}

async function loadPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) {
      const raw = get(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          const f = `${p[2]}-${p[0].padStart(2, '0')}-${p[1].padStart(2, '0')}`;
          dom.inTgl.value = f; dom.statTgl.textContent = f;
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const t = get(data[i], 1); if (t) state.prediksi.push({ title: t.split(/[\s,]+/)[0], content: t });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const t = get(data[i], 2); if (t) state.jadwal.push({ title: t.split(/[\s,]+/)[0], content: t });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const t = get(data[i], 2); if (t) state.link.push({ title: t.split(/[\s,]+/)[0], content: t });
    }
    renderPrediksi();
  } catch (e) {
    console.error(e); dom.listP.innerHTML = '<p style="color:#8a9db3;text-align:center;padding:22px">❌ Load failed</p>';
  }
}

async function loadHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = get(data[0], 23); if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + fmt(nom); }
    }
    const defs = [
      { r: 0, c: 24, s: 2, e: 42 }, { r: 43, c: 24, s: 45, e: 80 }, { r: 81, c: 24, s: 83, e: 119 },
      { r: 120, c: 24, s: 122, e: 153 }, { r: 154, c: 24, s: 156, e: 179 }, { r: 180, c: 24, s: 182, e: 213 },
      { r: 215, c: 24, s: 217, e: 248 }, { r: 249, c: 24, s: 251, e: 282 }, { r: 283, c: 24, s: 285, e: 316 }
    ];
    state.hitung = defs.map(d => {
      const title = get(data[d.r], d.c) || "MARKET";
      const items = [];
      for (let i = d.s; i <= d.e && i < data.length; i++) {
        if (data[i]) {
          const ty = get(data[i], 23), rv = get(data[i], 24);
          if (ty || rv) items.push({ type: ty, res: rv });
        }
      }
      return { title, items };
    }).filter(x => x.items.length > 0);
    renderHitung();
  } catch (e) {
    console.error(e); dom.contH.innerHTML = '<p style="color:#8a9db3;text-align:center;padding:22px">❌ Load failed</p>';
  }
}

function renderList(container, items, q) {
  const f = items.filter(i => i.content.toLowerCase().includes(q.toLowerCase()));
  if (!f.length) { container.innerHTML = '<p style="color:#8a9db3;text-align:center;padding:22px">📭 No data</p>'; return; }
  container.innerHTML = f.map(v => `
    <div class="morph-tile" onclick="copyText('${encodeURIComponent(v.content)}')">
      <div class="tile-meta">📋 Title</div>
      <div class="tile-head">${v.title}</div>
      <div class="tile-meta">💬 Content (Tap to Copy)</div>
      <div class="tile-body">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<p style="color:#8a9db3;text-align:center">📭 No data</p>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="market-card">
      <div class="market-head"><h3 class="market-title">🎯 ${s.title}</h3></div>
      <div class="market-body">
        ${s.items.map(it => `
          <div class="bet-row" onclick="copyText('${encodeURIComponent(it.res)}')">
            <span class="bet-label">${it.type}</span>
            <span class="bet-value">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// === FLUID CALCULATOR ===
let selectedTipe = null, selectedLabel = null;
async function loadCalcData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = get(data[0], 23); if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + fmt(nom); }
    }
    const defs = [
      { r: 0, c: 24, s: 2, e: 42, t: "ALL MARKETS" }, { r: 43, c: 24, s: 45, e: 80, t: "MACAU 4D" },
      { r: 81, c: 24, s: 83, e: 119, t: "MACAU 5D" }, { r: 120, c: 24, s: 122, e: 153, t: "KINGKONG 4D" },
      { r: 154, c: 24, s: 156, e: 179, t: "BONUS" }, { r: 180, c: 24, s: 182, e: 213, t: "JAKARTA" },
      { r: 215, c: 24, s: 217, e: 248, t: "TOTOMALI" }, { r: 249, c: 24, s: 251, e: 282, t: "HOKIDRAW" },
      { r: 283, c: 24, s: 285, e: 316, t: "SYDNEY/HK" }
    ];
    state.calcData = {};
    dom.chipTipe.innerHTML = '';
    defs.forEach(d => {
      const items = [];
      for (let i = d.s; i <= d.e && i < data.length; i++) {
        if (data[i]) {
          const lb = get(data[i], 23), vl = get(data[i], 24);
          if (lb || vl) items.push({ label: lb || "-", value: vl || "-" });
        }
      }
      if (items.length > 0) {
        state.calcData[d.t] = items;
        const btn = document.createElement('button');
        btn.className = 'chip-btn'; btn.textContent = d.t; btn.dataset.val = d.t;
        btn.onclick = () => selectTipe(d.t, btn);
        dom.chipTipe.appendChild(btn);
      }
    });
  } catch (e) { console.error(e); }
}

function selectTipe(val, el) {
  dom.chipTipe.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); selectedTipe = val; selectedLabel = null;
  dom.chipLabel.innerHTML = '';
  state.calcData[val].forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'chip-btn'; btn.textContent = item.label; btn.dataset.val = item.label;
    btn.onclick = () => selectLabel(item.label, btn, item.value);
    dom.chipLabel.appendChild(btn);
  });
}

function selectLabel(val, el, resVal) {
  dom.chipLabel.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); selectedLabel = { label: val, value: resVal };
}

function showCalcResult() {
  if (!selectedTipe || !selectedLabel) {
    dom.calcRes.innerHTML = '<span style="color:#6b7f96">Select type & label first</span>';
    showToast('⚠️ Complete selection!'); return;
  }
  dom.calcRes.innerHTML = `<span style="font-weight:700">${selectedLabel.value}</span>`;
  dom.calcRes.onclick = () => {
    copyText(selectedLabel.value);
    dom.calcRes.style.boxShadow = '0 0 28px rgba(0, 255, 170, 0.75)';
    setTimeout(() => dom.calcRes.style.boxShadow = '', 280);
  };
}

// === AUTO SYNC ===
let syncTimeout = null;
function autoUpdateTanggal() {
  showBadge(); clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => manualUpdateTanggal(), 1100);
}
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Select date first!");
  const p = dom.inTgl.value.split('-'), fd = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "⏳ Syncing...";
  syncSheet('updateTanggal', fd).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = "✅ Done"; showToast("📅 Date synced!");
      loadPrediksi(); loadHitung(); loadCalcData();
    } else { dom.statTgl.textContent = "❌ Fail"; showToast("❌ Check Script URL"); }
  });
}
function autoUpdateNominal() {
  showBadge(); clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => manualUpdateNominal(), 1100);
}
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Enter amount first!");
  dom.btnNom.disabled = true; dom.statNom.textContent = "⏳ Syncing...";
  syncSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "💰 Rp " + fmt(dom.inNom.value); showToast("💰 Amount synced!");
      loadPrediksi(); loadHitung(); loadCalcData();
    } else { dom.statNom.textContent = "❌ Fail"; showToast("❌ Check Script URL"); }
  });
}

function init() {
  document.querySelectorAll('.nav-pill').forEach(t => t.onclick = () => {
    document.querySelectorAll('.nav-pill').forEach(b => b.classList.remove('active'));
    t.classList.add('active');
    dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
    dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
  });
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  loadPrediksi(); loadHitung(); loadCalcData();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles(); init();
  setTimeout(() => showToast('🚀 Fluid Interface Loaded'), 1300);
});
</script>
</body>
</html>

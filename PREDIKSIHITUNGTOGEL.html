<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREDIKSI TOGEL CYBER</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
--bg-deep: #020810;
--bg-main: #030a18;
--bg-card: rgba(5, 20, 40, 0.7);
--bg-hover: rgba(0, 200, 255, 0.08);
--fg: #e0f7ff;
--fg-muted: #5a8fa8;
--neon-blue: #00e5ff;
--neon-cyan: #00ffff;
--neon-purple: #7b2dff;
--border-dim: rgba(0, 229, 255, 0.15);
--border-glow: rgba(0, 229, 255, 0.6);
--glow-sm: 0 0 10px rgba(0, 229, 255, 0.4);
--glow-md: 0 0 20px rgba(0, 229, 255, 0.5), 0 0 40px rgba(0, 229, 255, 0.2);
--glow-lg: 0 0 30px rgba(0, 229, 255, 0.6), 0 0 60px rgba(0, 229, 255, 0.3), 0 0 100px rgba(0, 229, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-deep);
color: var(--fg);
min-height: 100vh;
overflow-x: hidden;
position: relative;
}

/* === ANIMATED CYBER BACKGROUND === */
.cyber-bg {
position: fixed; inset: 0; z-index: -2;
background: 
radial-gradient(ellipse 120% 80% at 50% -20%, rgba(0, 100, 150, 0.15) 0%, transparent 60%),
radial-gradient(ellipse 100% 100% at 80% 100%, rgba(123, 45, 255, 0.08) 0%, transparent 50%),
linear-gradient(180deg, var(--bg-deep) 0%, #051020 50%, var(--bg-deep) 100%);
}

/* Animated Grid Floor */
.grid-floor {
position: fixed; bottom: 0; left: 0; right: 0; height: 50%; z-index: -1;
background: linear-gradient(180deg, transparent 0%, rgba(0, 229, 255, 0.03) 100%);
perspective: 200px;
transform-style: preserve-3d;
pointer-events: none;
}
.grid-floor::before {
content: ''; position: absolute; bottom: 0; left: -50%; right: -50%; height: 200%;
background-image: 
linear-gradient(rgba(0, 229, 255, 0.1) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 229, 255, 0.1) 1px, transparent 1px);
background-size: 60px 60px;
transform: rotateX(70deg);
animation: gridScroll 15s linear infinite;
opacity: 0.4;
}
@keyframes gridScroll { 0% { background-position: 0 0; } 100% { background-position: 0 60px; } }

/* Floating Particles */
.particles-container {
position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none;
}
.particle {
position: absolute; border-radius: 50%; pointer-events: none;
background: var(--neon-blue);
box-shadow: 0 0 6px var(--neon-blue), 0 0 12px var(--neon-cyan);
animation: floatUp linear infinite;
}
@keyframes floatUp {
0% { transform: translateY(100vh) scale(0); opacity: 0; }
10% { opacity: 1; transform: translateY(90vh) scale(1); }
90% { opacity: 1; }
100% { transform: translateY(-10vh) scale(0.5); opacity: 0; }
}

/* === HEADER === */
.main-header {
text-align: center; padding: 60px 20px 40px; position: relative;
animation: headerFade 1s ease-out;
}
@keyframes headerFade { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }

.title-glitch {
font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 6vw, 3.8rem); font-weight: 900;
letter-spacing: 4px; color: #fff; position: relative;
text-shadow: 
0 0 10px var(--neon-blue),
0 0 20px var(--neon-blue),
0 0 40px var(--neon-cyan),
0 0 80px var(--neon-blue);
animation: titlePulse 3s ease-in-out infinite;
}
.title-glitch span { color: var(--neon-cyan); }
@keyframes titlePulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.2); text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-blue), 0 0 80px var(--neon-cyan); } }

.subtitle {
font-size: 1rem; color: var(--fg-muted); margin-top: 10px; letter-spacing: 8px; text-transform: uppercase;
}

/* === TABS === */
.tab-container {
display: flex; justify-content: center; gap: 4px; margin-bottom: 30px; padding: 0 20px;
animation: slideUp 0.8s ease-out 0.2s backwards;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.tab-btn {
padding: 14px 40px; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700;
letter-spacing: 2px; text-transform: uppercase;
background: transparent; border: 1px solid var(--border-dim); color: var(--fg-muted);
cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
}
.tab-btn::before {
content: ''; position: absolute; inset: 0;
background: linear-gradient(180deg, var(--neon-blue), var(--neon-purple)); opacity: 0;
transition: opacity 0.3s ease; z-index: -1;
}
.tab-btn:hover { border-color: var(--neon-blue); color: var(--fg); box-shadow: var(--glow-sm); }
.tab-btn.active { border-color: var(--neon-cyan); color: #fff; box-shadow: var(--glow-md); }
.tab-btn.active::before { opacity: 1; }

/* === MAIN CONTAINER === */
.main-container { max-width: 1400px; margin: 0 auto; padding: 0 20px 60px; }

/* === SETTINGS PANEL === */
.settings-panel {
background: linear-gradient(135deg, var(--bg-card) 0%, rgba(0, 20, 40, 0.5) 100%);
border: 1px solid var(--border-dim); border-radius: 16px;
padding: 24px; margin-bottom: 30px;
display: flex; flex-wrap: wrap; gap: 20px; align-items: center;
backdrop-filter: blur(10px);
box-shadow: inset 0 0 30px rgba(0, 229, 255, 0.02), 0 0 30px rgba(0, 0, 0, 0.3);
animation: slideUp 0.8s ease-out 0.4s backwards;
}
.input-group { display: flex; flex-direction: column; gap: 6px; }
.input-label {
font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--neon-blue);
letter-spacing: 2px; text-transform: uppercase;
}
.cyber-input {
padding: 12px 18px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border-dim);
border-radius: 8px; color: var(--fg); font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600;
transition: all 0.3s ease; min-width: 180px;
}
.cyber-input:focus { outline: none; border-color: var(--neon-cyan); box-shadow: var(--glow-md); background: rgba(0, 20, 30, 0.6); }
.cyber-btn {
padding: 14px 30px; background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-purple) 100%);
border: none; border-radius: 8px; color: #fff; font-family: 'Orbitron', sans-serif;
font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; cursor: pointer;
transition: all 0.3s ease; box-shadow: var(--glow-sm);
text-transform: uppercase;
}
.cyber-btn:hover { transform: translateY(-3px); box-shadow: var(--glow-lg); }
.cyber-btn:active { transform: translateY(-1px); }
.status-pill {
padding: 8px 16px; background: rgba(0, 229, 255, 0.1); border: 1px solid var(--neon-blue);
border-radius: 20px; font-size: 0.85rem; color: var(--neon-cyan); font-weight: 600;
}

/* === CONTENT GRID === */
.content-grid {
display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 24px;
animation: slideUp 0.8s ease-out 0.6s backwards;
}

/* === SECTION CARD === */
.data-card {
background: linear-gradient(180deg, var(--bg-card) 0%, rgba(5, 15, 30, 0.9) 100%);
border: 1px solid var(--border-dim); border-radius: 20px;
overflow: hidden; position: relative;
transition: all 0.4s ease;
}
.data-card::before {
content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
}
.data-card:hover { border-color: var(--border-glow); transform: translateY(-5px); box-shadow: var(--glow-md); }

.card-header {
padding: 18px 22px; border-bottom: 1px solid var(--border-dim);
display: flex; justify-content: space-between; align-items: center;
background: linear-gradient(90deg, rgba(0, 229, 255, 0.05) 0%, transparent 100%);
}
.card-title { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; color: var(--neon-cyan); letter-spacing: 1px; }
.card-count {
background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
color: #fff; padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 700;
box-shadow: var(--glow-sm);
}

.search-box { padding: 14px; border-bottom: 1px solid var(--border-dim); }
.search-input {
width: 100%; padding: 12px 16px; background: rgba(0, 0, 0, 0.3);
border: 1px solid var(--border-dim); border-radius: 10px; color: var(--fg);
font-size: 0.9rem; transition: all 0.3s ease;
}
.search-input:focus { outline: none; border-color: var(--neon-blue); box-shadow: var(--glow-sm); }

.item-list { max-height: 380px; overflow-y: auto; padding: 14px; }
.item-card {
background: rgba(0, 10, 20, 0.6); border: 1px solid var(--border-dim); border-radius: 12px;
padding: 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s ease; position: relative;
}
.item-card::before {
content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--neon-blue);
transform: scaleY(0); transition: transform 0.3s ease;
}
.item-card:hover { border-color: var(--neon-blue); background: var(--bg-hover); transform: translateX(6px); }
.item-card:hover::before { transform: scaleY(1); }
.item-title { font-weight: 700; color: var(--fg); margin-bottom: 6px; font-size: 0.95rem; }
.item-content { font-size: 0.85rem; color: var(--fg-muted); line-height: 1.5; word-break: break-all; }

/* === HITUNG TAB - NO DROPDOWN === */

/* Type Cards Horizontal Scroll */
.type-carousel { margin-bottom: 30px; animation: slideUp 0.8s ease-out 0.5s backwards; }
.type-title {
font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--fg-muted);
letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px; padding-left: 4px;
}
.type-scroll {
display: flex; gap: 14px; overflow-x: auto; padding-bottom: 10px;
scrollbar-width: thin; scrollbar-color: var(--neon-blue) transparent;
}
.type-scroll::-webkit-scrollbar { height: 4px; }
.type-scroll::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 2px; }

.type-card {
min-width: 200px; padding: 20px; background: var(--bg-card); border: 2px solid var(--border-dim);
border-radius: 14px; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
flex-shrink: 0;
}
.type-card::before {
content: ''; position: absolute; inset: 0;
background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(123, 45, 255, 0.1));
opacity: 0; transition: opacity 0.3s ease;
}
.type-card:hover { border-color: var(--neon-blue); transform: translateY(-3px); box-shadow: var(--glow-md); }
.type-card.active { border-color: var(--neon-cyan); box-shadow: var(--glow-lg); }
.type-card.active::before { opacity: 1; }
.type-card.active::after {
content: ''; position: absolute; top: 10px; right: 10px; width: 10px; height: 10px;
background: var(--neon-cyan); border-radius: 50%; box-shadow: 0 0 10px var(--neon-cyan);
animation: blink 1s infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.type-name { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--fg); font-weight: 600; position: relative; z-index: 1; }
.type-count { font-size: 0.75rem; color: var(--fg-muted); margin-top: 6px; position: relative; z-index: 1; }

/* Label Grid */
.label-section {
background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: 18px;
overflow: hidden; margin-bottom: 24px; display: none;
animation: fadeIn 0.4s ease-out;
}
@keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
.label-header {
padding: 18px 22px; border-bottom: 1px solid var(--border-dim);
background: linear-gradient(90deg, rgba(0, 229, 255, 0.08) 0%, transparent 100%);
display: flex; justify-content: space-between; align-items: center;
}
.label-title { font-family: 'Orbitron', sans-serif; font-size: 1rem; color: var(--neon-cyan); letter-spacing: 1px; }
.label-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; padding: 16px; max-height: 300px; overflow-y: auto; }
.label-item {
padding: 14px 16px; background: rgba(0, 10, 20, 0.5); border: 1px solid var(--border-dim);
border-radius: 10px; cursor: pointer; transition: all 0.25s ease; text-align: center;
}
.label-item:hover { border-color: var(--neon-blue); background: var(--bg-hover); transform: scale(1.02); }
.label-item.active { border-color: var(--neon-cyan); background: rgba(0, 229, 255, 0.1); box-shadow: var(--glow-sm); }
.label-text { font-size: 0.85rem; color: var(--fg); font-weight: 500; }

/* Result Display - Hologram Style */
.result-hologram {
background: linear-gradient(135deg, rgba(0, 10, 30, 0.9), rgba(5, 20, 40, 0.95));
border: 2px solid var(--neon-cyan); border-radius: 20px; padding: 40px;
text-align: center; margin-bottom: 30px; display: none; position: relative; overflow: hidden;
box-shadow: var(--glow-lg), inset 0 0 60px rgba(0, 229, 255, 0.05);
animation: resultPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes resultPop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.result-hologram::before {
content: ''; position: absolute; top: 0; left: -100%; width: 300%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.1), transparent);
animation: scanLine 2.5s linear infinite;
}
@keyframes scanLine { 0% { transform: translateX(0); } 100% { transform: translateX(50%); } }
.result-label {
font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--fg-muted);
letter-spacing: 4px; text-transform: uppercase; margin-bottom: 15px;
}
.result-value {
font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem);
color: #fff; letter-spacing: 4px; position: relative; z-index: 1;
text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
}
.result-hint { font-size: 0.75rem; color: var(--fg-muted); margin-top: 20px; letter-spacing: 1px; }

/* Hitung Grid */
.hitung-grid {
display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px;
animation: slideUp 0.8s ease-out 0.7s backwards;
}
.pasaran-card {
background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: 16px;
overflow: hidden; transition: all 0.3s ease;
}
.pasaran-card:hover { border-color: var(--border-glow); box-shadow: var(--glow-md); }
.pasaran-head {
padding: 16px 20px; background: linear-gradient(90deg, rgba(0, 229, 255, 0.1) 0%, transparent 100%);
border-bottom: 1px solid var(--border-dim);
}
.pasaran-name { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--neon-cyan); letter-spacing: 1px; }
.pasaran-list { max-height: 280px; overflow-y: auto; padding: 12px; }
.bet-row {
display: flex; justify-content: space-between; align-items: center;
padding: 12px 16px; background: rgba(0, 5, 15, 0.5); border: 1px solid var(--border-dim);
border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: all 0.25s ease;
}
.bet-row:hover { border-color: var(--neon-blue); background: var(--bg-hover); transform: translateX(4px); }
.bet-type { font-size: 0.85rem; color: var(--fg); }
.bet-val {
font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--neon-cyan);
background: rgba(0, 229, 255, 0.1); padding: 4px 12px; border-radius: 6px;
box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
}

/* Toast */
.toast {
position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
background: linear-gradient(135deg, var(--bg-main), #051020);
border: 1px solid var(--neon-cyan); color: var(--fg); padding: 16px 32px;
border-radius: 50px; font-weight: 600; opacity: 0; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 9999;
box-shadow: var(--glow-lg);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Spinner */
.spinner { width: 40px; height: 40px; border: 3px solid var(--border-dim); border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
.settings-panel { flex-direction: column; align-items: stretch; }
.cyber-input { width: 100%; }
.type-card { min-width: 160px; }
.hitung-grid { grid-template-columns: 1fr; }
}
@media (prefers-reduced-motion: reduce) {
*, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="cyber-bg"></div>
<div class="grid-floor"></div>
<div class="particles-container" id="particles"></div>
<div id="toast" class="toast"></div>

<header class="main-header">
<h1 class="title-glitch">PREDIKSI <span>TOGEL</span></h1>
<p class="subtitle">Cyber Intelligence System</p>
</header>

<nav class="tab-container">
<button class="tab-btn active" data-tab="prediksi">PREDIKSI</button>
<button class="tab-btn" data-tab="hitung">HITUNG</button>
</nav>

<div class="main-container">
<!-- TAB PREDIKSI -->
<div id="tab-prediksi">
<div class="settings-panel">
<div class="input-group">
<label class="input-label">Tanggal Data</label>
<input type="date" id="input-tanggal" class="cyber-input">
</div>
<button class="cyber-btn" id="btn-tanggal" onclick="updateTanggal()">UPDATE</button>
<span class="status-pill" id="status-tanggal">--</span>
</div>

<div class="content-grid">
<div class="data-card">
<div class="card-header">
<h3 class="card-title">PREDIKSI</h3>
<span class="card-count" id="count-prediksi">0</span>
</div>
<div class="search-box"><input type="text" class="search-input" id="search-prediksi" placeholder="Cari prediksi..."></div>
<div class="item-list" id="list-prediksi"><div style="display:flex;justify-content:center;padding:40px;"><div class="spinner"></div></div></div>
</div>

<div class="data-card">
<div class="card-header">
<h3 class="card-title">JADWAL</h3>
<span class="card-count" id="count-jadwal">0</span>
</div>
<div class="search-box"><input type="text" class="search-input" id="search-jadwal" placeholder="Cari jadwal..."></div>
<div class="item-list" id="list-jadwal"><div style="display:flex;justify-content:center;padding:40px;"><div class="spinner"></div></div></div>
</div>

<div class="data-card">
<div class="card-header">
<h3 class="card-title">LINK LIVE</h3>
<span class="card-count" id="count-link">0</span>
</div>
<div class="search-box"><input type="text" class="search-input" id="search-link" placeholder="Cari link..."></div>
<div class="item-list" id="list-link"><div style="display:flex;justify-content:center;padding:40px;"><div class="spinner"></div></div></div>
</div>
</div>
</div>

<!-- TAB HITUNG -->
<div id="tab-hitung" style="display:none;">
<div class="settings-panel">
<div class="input-group">
<label class="input-label">Nominal Taruhan</label>
<input type="number" id="input-nominal" class="cyber-input" placeholder="0">
</div>
<button class="cyber-btn" id="btn-nominal" onclick="updateNominal()">UPDATE</button>
<span class="status-pill" id="status-nominal">--</span>
</div>

<div class="type-carousel">
<h4 class="type-title">Pilih Tipe Hitungan</h4>
<div class="type-scroll" id="type-scroll">
<div style="display:flex;justify-content:center;padding:20px;width:100%;"><div class="spinner"></div></div>
</div>
</div>

<div class="label-section" id="label-section">
<div class="label-header">
<h4 class="label-title">Pilih Label</h4>
<span class="card-count" id="label-count">0</span>
</div>
<div class="label-grid" id="label-grid"></div>
</div>

<div class="result-hologram" id="result-box">
<div class="result-label">Hasil Hitungan</div>
<div class="result-value" id="result-value">--</div>
<div class="result-hint">Klik untuk menyalin ke clipboard</div>
</div>

<div class="hitung-grid" id="hitung-grid">
<div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="spinner"></div></div>
</div>
</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec';
const CONFIG = {
sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'
};

const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
let selectedType = null;
let selectedLabelIdx = null;

const $ = id => document.getElementById(id);
const dom = {
tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
inTgl: $('input-tanggal'), statTgl: $('status-tanggal'),
inNom: $('input-nominal'), statNom: $('status-nominal'),
srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
hitungGrid: $('hitung-grid'), toast: $('toast'),
typeScroll: $('type-scroll'), labelSection: $('label-section'),
labelGrid: $('label-grid'), labelCount: $('label-count'),
resultBox: $('result-box'), resultValue: $('result-value')
};

// Particles
function createParticles() {
const c = $('particles');
for (let i = 0; i < 40; i++) {
const p = document.createElement('div');
p.className = 'particle';
const size = Math.random() * 3 + 1;
p.style.width = size + 'px';
p.style.height = size + 'px';
p.style.left = Math.random() * 100 + '%';
p.style.animationDuration = (Math.random() * 15 + 10) + 's';
p.style.animationDelay = Math.random() * 10 + 's';
p.style.opacity = Math.random() * 0.5 + 0.3;
c.appendChild(p);
}
}

function showToast(msg) {
dom.toast.textContent = msg;
dom.toast.classList.add('show');
setTimeout(() => dom.toast.classList.remove('show'), 3000);
}

function copyText(text) {
let t = text;
try { t = decodeURIComponent(text); } catch(e) {}
navigator.clipboard.writeText(t).then(() => {
const p = t.length > 20 ? t.substring(0, 20) + '...' : t;
showToast('Disalin: ' + p);
}).catch(() => showToast('Gagal salin'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

function parseCSV(text) {
let p = [], row = [], entry = "", state = 0;
for (let i = 0; i < text.length; i++) {
const char = text[i], next = text[i+1];
if (state === 0) {
if (char === '"') state = 1;
else if (char === ',') { row.push(entry); entry = ""; }
else if (char === '\r' && next === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
else if (char === '\n' || char === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
else entry += char;
} else if (state === 1) {
if (char === '"' && next === '"') { entry += '"'; i++; }
else if (char === '"') state = 0;
else entry += char;
}
}
if (entry.length > 0 || row.length > 0) { row.push(entry); p.push(row); }
return p;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

async function updateSheet(action, value) {
if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('Script URL belum disetup!'); return false; }
try {
const params = new URLSearchParams({ action, value });
const res = await fetch(SCRIPT_URL + '?' + params.toString());
return (await res.text()).includes('SUCCESS');
} catch (e) { return false; }
}

async function fetchPrediksi() {
try {
const res = await fetch(CONFIG.sheetPrediksi + '&t=' + new Date().getTime());
const data = parseCSV(await res.text());
state.prediksi = []; state.jadwal = []; state.link = [];

if (data[0]) {
const raw = safeGet(data[0], 1);
if (raw) {
const p = raw.split('/');
if (p.length === 3) {
const f = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
dom.inTgl.value = f;
dom.statTgl.textContent = f;
}
}
}

for (let i = 2; i <= 84 && i < data.length; i++) {
const txt = safeGet(data[i], 1);
if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
for (let i = 2; i <= 55 && i < data.length; i++) {
const txt = safeGet(data[i], 2);
if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
for (let i = 56; i <= 82 && i < data.length; i++) {
const txt = safeGet(data[i], 2);
if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
renderPrediksi();
} catch (e) { console.error(e); }
}

async function fetchHitung() {
try {
const res = await fetch(CONFIG.sheetHitung + '&t=' + new Date().getTime());
const data = parseCSV(await res.text());

if (data[0]) {
const nom = safeGet(data[0], 23);
if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "Rp " + formatNum(nom); }
}

const secDef = [
{ tRow: 0, tCol: 24, start: 2, end: 42 },
{ tRow: 43, tCol: 24, start: 45, end: 80 },
{ tRow: 81, tCol: 24, start: 83, end: 119 },
{ tRow: 120, tCol: 24, start: 122, end: 153 },
{ tRow: 154, tCol: 24, start: 156, end: 179 },
{ tRow: 180, tCol: 24, start: 182, end: 213 },
{ tRow: 215, tCol: 24, start: 217, end: 248 },
{ tRow: 249, tCol: 24, start: 251, end: 282 },
{ tRow: 283, tCol: 24, start: 285, end: 316 }
];

state.hitung = secDef.map(s => {
let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
let items = [];
for (let i = s.start; i <= s.end && i < data.length; i++) {
if (data[i]) {
const type = safeGet(data[i], 23);
const resVal = safeGet(data[i], 24);
if (type || resVal) items.push({ type, res: resVal });
}
}
return { title, items };
}).filter(s => s.items.length > 0);

renderHitung();
loadTypes(data);
} catch (e) { console.error(e); }
}

function loadTypes(data) {
const secDef = [
{ tRow: 0, tCol: 24, start: 2, end: 42, title: "HADIAH SEMUA PASARAN" },
{ tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" },
{ tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" },
{ tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" },
{ tRow: 154, tCol: 24, start: 156, end: 179, title: "PERHITUNGAN BONUS" },
{ tRow: 180, tCol: 24, start: 182, end: 213, title: "PASARAN JAKARTA" },
{ tRow: 215, tCol: 24, start: 217, end: 248, title: "TOTOMALI" },
{ tRow: 249, tCol: 24, start: 251, end: 282, title: "HOKIDRAW" },
{ tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY HONGKONG" }
];

state.kelompok = {};
secDef.forEach(sec => {
const items = [];
for (let i = sec.start; i <= sec.end && i < data.length; i++) {
if (data[i]) {
const label = safeGet(data[i], 23);
const value = safeGet(data[i], 24);
if (label || value) items.push({ label: label || "-", value: value || "-" });
}
}
if (items.length > 0) state.kelompok[sec.title] = items;
});

renderTypes();
}

function renderTypes() {
const types = Object.keys(state.kelompok);
dom.typeScroll.innerHTML = types.map(t => `
<div class="type-card" onclick="selectType('${t}')">
<div class="type-name">${t}</div>
<div class="type-count">${state.kelompok[t].length} item</div>
</div>
`).join('');
}

function selectType(type) {
selectedType = type;
selectedLabelIdx = null;
dom.resultBox.style.display = 'none';

document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
event.currentTarget.classList.add('active');

dom.labelSection.style.display = 'block';
dom.labelCount.textContent = state.kelompok[type].length;
dom.labelGrid.innerHTML = state.kelompok[type].map((item, i) => `
<div class="label-item" onclick="selectLabel(${i})">${item.label}</div>
`).join('');
}

function selectLabel(idx) {
if (!selectedType) return;
selectedLabelIdx = idx;

document.querySelectorAll('.label-item').forEach((item, i) => {
item.classList.toggle('active', i === idx);
});

const item = state.kelompok[selectedType][idx];
dom.resultBox.style.display = 'block';
dom.resultValue.textContent = item.value;
dom.resultBox.onclick = () => copyText(item.value);
}

function renderList(container, items, search) {
const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
if (!filtered.length) {
container.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:30px;">Tidak ada data</p>';
return;
}
container.innerHTML = filtered.map(v => `
<div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}')">
<div class="item-title">${v.title}</div>
<div class="item-content">${v.content}</div>
</div>
`).join('');
}

function renderPrediksi() {
renderList(dom.listP, state.prediksi, dom.srcP.value);
renderList(dom.listJ, state.jadwal, dom.srcJ.value);
renderList(dom.listL, state.link, dom.srcL.value);
dom.cntP.textContent = state.prediksi.length;
dom.cntJ.textContent = state.jadwal.length;
dom.cntL.textContent = state.link.length;
}

function renderHitung() {
if (!state.hitung.length) {
dom.hitungGrid.innerHTML = '<p style="color:var(--fg-muted);text-align:center;">Tidak ada data</p>';
return;
}
dom.hitungGrid.innerHTML = state.hitung.map(s => `
<div class="pasaran-card">
<div class="pasaran-head"><h4 class="pasaran-name">${s.title}</h4></div>
<div class="pasaran-list">
 ${s.items.map(it => `
<div class="bet-row" onclick="copyText('${encodeURIComponent(it.res)}')">
<span class="bet-type">${it.type}</span>
<span class="bet-val">${it.res}</span>
</div>
`).join('')}
</div>
</div>
`).join('');
}

async function updateTanggal() {
if (!dom.inTgl.value) return showToast("Pilih tanggal dulu!");
const parts = dom.inTgl.value.split('-');
const formatted = `${parts[1]}/${parts[2]}/${parts[0]}`;
dom.statTgl.textContent = "Menyimpan...";
const ok = await updateSheet('updateTanggal', formatted);
if (ok) {
dom.statTgl.textContent = "Updated";
showToast("Tanggal diupdate!");
fetchPrediksi();
fetchHitung();
} else {
dom.statTgl.textContent = "Gagal";
showToast("Gagal update");
}
}

async function updateNominal() {
if (!dom.inNom.value) return showToast("Isi nominal dulu!");
dom.statNom.textContent = "Menyimpan...";
const ok = await updateSheet('updateNominal', dom.inNom.value);
if (ok) {
dom.statNom.textContent = "Rp " + formatNum(dom.inNom.value);
showToast("Nominal diupdate!");
fetchPrediksi();
fetchHitung();
} else {
dom.statNom.textContent = "Gagal";
showToast("Gagal update");
}
}

function init() {
document.querySelectorAll('.tab-btn').forEach(t => t.onclick = () => {
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
t.classList.add('active');
dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
});

dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);

fetchPrediksi();
fetchHitung();
}

document.addEventListener('DOMContentLoaded', () => {
createParticles();
init();
});
</script>
</body>
</html>

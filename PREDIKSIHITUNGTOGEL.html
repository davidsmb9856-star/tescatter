<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDIKSI DAN HITUNG TOGEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #010810; --bg-secondary: #051525; --fg: #e0f4ff;
            --muted: #5a8cb0; --accent: #00e5ff; --accent-dark: #0099cc;
            --border: #0a4d75; --success: #00ff88;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg); color: var(--fg);
            min-height: 100vh; overflow-x: hidden;
        }
        .bg-cyber {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; overflow: hidden;
            background: radial-gradient(ellipse at 50% 0%, rgba(0, 50, 80, 0.2) 0%, transparent 70%);
        }
        .grid-lines {
            position: absolute; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 25s linear infinite;
        }
        .floating-orb {
            position: absolute; border-radius: 50%;
            filter: blur(100px); opacity: 0.3;
            animation: floatOrb 20s ease-in-out infinite alternate;
        }
        .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -20%; left: -10%; }
        .orb-2 { width: 400px; height: 400px; background: #0066ff; bottom: -10%; right: -5%; animation-delay: -10s; }
        @keyframes gridMove { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }
        @keyframes floatOrb { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 30px); } }
        .main-container { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header-section { text-align: center; padding: 30px 0 30px; }
        .main-title {
            font-family: 'Orbitron', sans-serif; font-size: clamp(1.8rem, 5vw, 3.2rem);
            font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .tabs-container { display: flex; justify-content: center; gap: 0; margin-bottom: 0; }
        .tab-btn {
            padding: 12px 30px; font-family: 'Orbitron', sans-serif;
            font-weight: 700; font-size: 0.9rem; color: var(--muted);
            background: rgba(5, 21, 37, 0.5); border: 1px solid var(--border);
            border-bottom: none; cursor: pointer; transition: all 0.3s; position: relative;
        }
        .tab-btn:first-child { border-radius: 10px 0 0 0; }
        .tab-btn:last-child { border-radius: 0 10px 0 0; }
        .tab-btn.active { color: var(--accent); background: var(--bg-secondary); border-color: var(--accent); }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px;
            background: var(--accent); box-shadow: 0 0 15px var(--accent);
        }
        .content-box {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, rgba(5, 21, 37, 0.9) 100%);
            border: 1px solid var(--border); border-top: 1px solid var(--accent);
            border-radius: 0 0 16px 16px; padding: 20px; position: relative;
        }
        .settings-panel {
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border);
            border-radius: 12px; padding: 15px; margin-bottom: 20px;
            display: flex; flex-wrap: wrap; gap: 15px; align-items: center;
        }
        .setting-item { display: flex; align-items: center; gap: 10px; }
        .setting-label { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }
        .input-compact {
            padding: 8px 10px; background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border); border-radius: 6px;
            color: var(--fg); font-size: 0.85rem; width: 140px; transition: all 0.3s;
        }
        .input-compact:focus { outline: none; border-color: var(--accent); }
        .btn-action {
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            border: none; border-radius: 6px; color: var(--bg);
            font-family: 'Orbitron', sans-serif; font-weight: 600;
            font-size: 0.75rem; cursor: pointer; transition: all 0.3s; white-space: nowrap;
        }
        .btn-action:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(0, 229, 255, 0.3); }
        .btn-action:disabled { opacity: 0.6; cursor: not-allowed; }
        .status-text { font-size: 0.8rem; color: var(--accent); margin-left: 10px; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .section-box {
            background: rgba(0, 0, 0, 0.25); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden; display: flex; flex-direction: column;
        }
        .section-header {
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.1) 0%, transparent 100%);
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .section-title { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent); font-size: 0.9rem; }
        .badge-count {
            background: rgba(0, 229, 255, 0.15); color: var(--accent);
            padding: 3px 8px; border-radius: 20px; font-size: 0.7rem;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }
        .search-box { padding: 10px; border-bottom: 1px solid var(--border); }
        .search-input {
            width: 100%; padding: 8px 10px; background: rgba(0,0,0,0.4);
            border: 1px solid rgba(10, 77, 117, 0.5); border-radius: 6px;
            color: var(--fg); font-size: 0.85rem;
        }
        .search-input:focus { outline: none; border-color: var(--accent); }
        .section-content { padding: 10px; overflow-y: auto; max-height: 450px; flex-grow: 1; }
        .item-card {
            background: rgba(0, 20, 40, 0.4); border: 1px solid rgba(10, 77, 117, 0.3);
            border-radius: 8px; padding: 12px; margin-bottom: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .item-card:hover { border-color: var(--accent); transform: translateY(-1px); }
        .item-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .item-title { color: var(--accent); font-weight: 600; margin-bottom: 4px; font-size: 0.9rem; }
        .item-content { font-size: 0.8rem; color: var(--fg); line-height: 1.4; white-space: pre-wrap; word-break: break-all; }
        .pasaran-box {
            background: rgba(0, 0, 0, 0.25); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden;
        }
        .pasaran-header {
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.15) 0%, transparent 100%);
            padding: 12px 16px; border-bottom: 1px solid var(--border);
        }
        .pasaran-title { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent); font-size: 0.85rem; }
        .pasaran-content { padding: 8px; max-height: 350px; overflow-y: auto; }
        .bet-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 10px; background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(10, 77, 117, 0.3); border-radius: 6px;
            margin-bottom: 5px; cursor: pointer; transition: all 0.2s;
        }
        .bet-item:hover { border-color: var(--accent); }
        .bet-type { color: var(--fg); font-size: 0.8rem; flex: 1; margin-right: 8px; }
        .bet-result {
            font-family: 'Orbitron', sans-serif; font-weight: 700;
            color: var(--accent); font-size: 0.8rem;
            background: rgba(0, 229, 255, 0.1); padding: 2px 6px; border-radius: 4px;
        }
        .toast {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent); color: var(--bg);
            padding: 12px 25px; border-radius: 50px;
            font-weight: 600; font-size: 0.9rem; opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000; box-shadow: 0 10px 30px rgba(0, 229, 255, 0.5);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .spinner {
            width: 30px; height: 30px; border: 3px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        @media (max-width: 768px) {
            .settings-panel { flex-direction: column; align-items: stretch; }
            .setting-item { width: 100%; justify-content: space-between; }
            .input-compact { width: 100%; }
            .data-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-cyber">
        <div class="grid-lines"></div>
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
    </div>
    <div id="toast" class="toast">Berhasil!</div>
    <div class="main-container">
        <header class="header-section">
            <h1 class="main-title">PREDIKSI DAN HITUNG TOGEL</h1>
        </header>
        <nav class="tabs-container">
            <button class="tab-btn active" data-tab="prediksi">PREDIKSI TOGEL</button>
            <button class="tab-btn" data-tab="hitung">HITUNG TOGEL</button>
        </nav>
        <div class="content-box">
            <!-- Tab Prediksi -->
            <div id="tab-prediksi" class="tab-content">
                <div class="settings-panel">
                    <div class="setting-item">
                        <span class="setting-label">Tanggal (B1)</span>
                        <input type="date" id="input-tanggal" class="input-compact">
                    </div>
                    <button class="btn-action" id="btn-tanggal">UPDATE TANGGAL</button>
                    <span class="status-text" id="status-tanggal"></span>
                </div>
                <div class="data-grid">
                    <div class="section-box">
                        <div class="section-header">
                            <h3 class="section-title">PREDIKSI TOGEL</h3>
                            <span class="badge-count" id="count-prediksi">0</span>
                        </div>
                        <div class="search-box"><input type="text" class="search-input" id="search-prediksi" placeholder="Cari..."></div>
                        <div class="section-content" id="list-prediksi"><div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div></div>
                    </div>
                    <div class="section-box">
                        <div class="section-header">
                            <h3 class="section-title">JADWAL PASARAN</h3>
                            <span class="badge-count" id="count-jadwal">0</span>
                        </div>
                        <div class="search-box"><input type="text" class="search-input" id="search-jadwal" placeholder="Cari..."></div>
                        <div class="section-content" id="list-jadwal"><div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div></div>
                    </div>
                    <div class="section-box">
                        <div class="section-header">
                            <h3 class="section-title">LINK LIVE PASARAN</h3>
                            <span class="badge-count" id="count-link">0</span>
                        </div>
                        <div class="search-box"><input type="text" class="search-input" id="search-link" placeholder="Cari..."></div>
                        <div class="section-content" id="list-link"><div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div></div>
                    </div>
                </div>
            </div>
            <!-- Tab Hitung -->
            <div id="tab-hitung" class="tab-content" style="display:none;">
                <div class="settings-panel">
                    <div class="setting-item">
                        <span class="setting-label">Nominal (X1)</span>
                        <input type="number" id="input-nominal" class="input-compact" placeholder="Nominal">
                    </div>
                    <button class="btn-action" id="btn-nominal">UPDATE NOMINAL</button>
                    <span class="status-text" id="status-nominal"></span>
                </div>
                <div class="data-grid" id="container-hitung"><div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="spinner"></div></div></div>
            </div>
        </div>
    </div>
    <script>
        // ============ KONFIGURASI - SUDAH DISETUP ============
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
        const CONFIG = {
            sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
            sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
            keyTanggal: 'togel_tanggal_v4',
            keyNominal: 'togel_nominal_v4'
        };
        const state = { prediksi: [], jadwal: [], link: [], hitung: [] };
        const $ = id => document.getElementById(id);
        const dom = {
            tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
            inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
            inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
            srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
            listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
            cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
            contH: $('container-hitung'), toast: $('toast')
        };
        function showToast(msg) {
            dom.toast.textContent = msg;
            dom.toast.classList.add('show');
            setTimeout(() => dom.toast.classList.remove('show'), 2500);
        }
        function copyText(text) {
            let finalText = text;
            try { finalText = decodeURIComponent(text); } catch(e) {}
            navigator.clipboard.writeText(finalText).then(() => {
                const preview = finalText.length > 20 ? finalText.substring(0, 20) + '...' : finalText;
                showToast('Disalin: ' + preview);
            }).catch(() => showToast('Gagal salin'));
        }
        function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }
        function parseCSV(text) {
            let p = [], row = [], entry = "", state = 0;
            for (let i = 0; i < text.length; i++) {
                const char = text[i], next = text[i+1];
                if (state === 0) {
                    if (char === '"') state = 1;
                    else if (char === ',') { row.push(entry); entry = ""; }
                    else if (char === '\r' && next === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
                    else if (char === '\n' || char === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
                    else entry += char;
                } else if (state === 1) {
                    if (char === '"' && next === '"') { entry += '"'; i++; }
                    else if (char === '"') state = 0;
                    else entry += char;
                }
            }
            if (entry.length > 0 || row.length > 0) { row.push(entry); p.push(row); }
            return p;
        }
        function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }
        async function updateSheet(action, value) {
            if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
                showToast('Error: Script URL belum disetup!');
                return false;
            }
            try {
                const params = new URLSearchParams({ action, value });
                const response = await fetch(SCRIPT_URL + '?' + params.toString());
                const text = await response.text();
                if (text.includes('SUCCESS')) return true;
                console.error("Sheet Error:", text);
                return false;
            } catch (e) {
                console.error("Fetch Error:", e);
                return false;
            }
        }
        async function fetchPrediksi() {
            try {
                const res = await fetch(CONFIG.sheetPrediksi + '&t=' + new Date().getTime());
                const data = parseCSV(await res.text());
                state.prediksi = []; state.jadwal = []; state.link = [];
                if (data[0]) {
                    const raw = safeGet(data[0], 1);
                    if (raw) {
                        const p = raw.split('/');
                        if (p.length === 3) {
                            const formatted = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
                            dom.inTgl.value = formatted;
                            dom.statTgl.textContent = formatted;
                        }
                    }
                }
                for (let i = 2; i <= 84 && i < data.length; i++) {
                    const txt = safeGet(data[i], 1);
                    if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
                }
                for (let i = 2; i <= 55 && i < data.length; i++) {
                    const txt = safeGet(data[i], 2);
                    if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
                }
                for (let i = 56; i <= 82 && i < data.length; i++) {
                    const txt = safeGet(data[i], 2);
                    if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
                }
                renderPrediksi();
            } catch (e) {
                console.error("Error Prediksi:", e);
                dom.listP.innerHTML = '<p style="color:red;text-align:center;padding:20px;">Gagal memuat data.</p>';
            }
        }
        async function fetchHitung() {
            try {
                const res = await fetch(CONFIG.sheetHitung + '&t=' + new Date().getTime());
                const data = parseCSV(await res.text());
                if (data[0]) {
                    const nom = safeGet(data[0], 23);
                    if (nom) {
                        dom.inNom.value = nom;
                        dom.statNom.textContent = "Rp " + formatNum(nom);
                    }
                }
                const secDef = [
                    { tRow: 0, tCol: 24, start: 2, end: 42 },
                    { tRow: 43, tCol: 24, start: 45, end: 80 },
                    { tRow: 81, tCol: 24, start: 83, end: 119 },
                    { tRow: 120, tCol: 24, start: 122, end: 153 },
                    { tRow: 154, tCol: 24, start: 156, end: 179 },
                    { tRow: 180, tCol: 24, start: 182, end: 213 },
                    { tRow: 215, tCol: 24, start: 217, end: 248 },
                    { tRow: 249, tCol: 24, start: 251, end: 282 },
                    { tRow: 283, tCol: 24, start: 285, end: 316 }
                ];
                state.hitung = secDef.map(s => {
                    let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
                    let items = [];
                    for (let i = s.start; i <= s.end && i < data.length; i++) {
                        if (data[i]) {
                            const type = safeGet(data[i], 23);
                            const resVal = safeGet(data[i], 24);
                            if (type || resVal) items.push({ type, res: resVal });
                        }
                    }
                    return { title, items };
                }).filter(s => s.items.length > 0);
                renderHitung();
            } catch (e) {
                console.error("Error Hitung:", e);
                dom.contH.innerHTML = '<p style="color:red;text-align:center;padding:20px;">Gagal memuat data.</p>';
            }
        }
        function renderList(container, items, search) {
            const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
            if (!filtered.length) {
                container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;">Kosong</p>';
                return;
            }
            container.innerHTML = filtered.map(v => `
                <div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}')">
                    <div class="item-label">Judul</div>
                    <div class="item-title">${v.title}</div>
                    <div class="item-label">Isi (Klik Copy)</div>
                    <div class="item-content">${v.content}</div>
                </div>
            `).join('');
        }
        function renderPrediksi() {
            renderList(dom.listP, state.prediksi, dom.srcP.value);
            renderList(dom.listJ, state.jadwal, dom.srcJ.value);
            renderList(dom.listL, state.link, dom.srcL.value);
            dom.cntP.textContent = state.prediksi.length;
            dom.cntJ.textContent = state.jadwal.length;
            dom.cntL.textContent = state.link.length;
        }
        function renderHitung() {
            if (!state.hitung.length) return dom.contH.innerHTML = '<p style="color:var(--muted);text-align:center;">Kosong</p>';
            dom.contH.innerHTML = state.hitung.map(s => `
                <div class="pasaran-box">
                    <div class="pasaran-header"><h3 class="pasaran-title">${s.title}</h3></div>
                    <div class="pasaran-content">
                        ${s.items.map(it => `
                            <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}')">
                                <span class="bet-type">${it.type}</span>
                                <span class="bet-result">${it.res}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
        function init() {
            document.querySelectorAll('.tab-btn').forEach(t => t.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                t.classList.add('active');
                dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
                dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
            });
            dom.btnTgl.onclick = async () => {
                if (!dom.inTgl.value) return showToast("Pilih tanggal!");
                const parts = dom.inTgl.value.split('-');
                const formattedDate = `${parts[1]}/${parts[2]}/${parts[0]}`;
                dom.btnTgl.disabled = true;
                dom.statTgl.textContent = "Menyimpan...";
                const success = await updateSheet('updateTanggal', formattedDate);
                dom.btnTgl.disabled = false;
                if (success) {
                    localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
                    dom.statTgl.textContent = "Tersimpan!";
                    showToast("Tanggal diupdate di Sheet!");
                    fetchPrediksi();
                } else {
                    dom.statTgl.textContent = "Gagal (Cek Script URL)";
                }
            };
            dom.btnNom.onclick = async () => {
                if (!dom.inNom.value) return showToast("Isi nominal!");
                dom.btnNom.disabled = true;
                dom.statNom.textContent = "Menyimpan...";
                const success = await updateSheet('updateNominal', dom.inNom.value);
                dom.btnNom.disabled = false;
                if (success) {
                    localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
                    dom.statNom.textContent = "Rp " + formatNum(dom.inNom.value);
                    showToast("Nominal diupdate di Sheet!");
                    fetchHitung();
                } else {
                    dom.statNom.textContent = "Gagal (Cek Script URL)";
                }
            };
            dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
            dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
            dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
            fetchPrediksi();
            fetchHitung();
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

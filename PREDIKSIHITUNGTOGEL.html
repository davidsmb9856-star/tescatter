<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌊 CYBER WAVE TOGEL 🌊</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --deep: #0a0019; --ocean: #0d1b3a; --wave: #00d4ff; --pulse: #7b2fff;
  --glow: #00f0ff; --accent: #ff00e5; --success: #00ffa3; --text: #e6f7ff; --muted: #8ab4d9;
  --card-bg: linear-gradient(145deg, rgba(13,27,58,0.85), rgba(20,15,45,0.75));
  --glass: rgba(15, 25, 55, 0.65);
  --wave-anim: waveFlow 18s linear infinite;
  --tilt: 0.8deg;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
::selection { background: rgba(0, 212, 255, 0.35); color: var(--text); }

body {
  font-family: 'Rajdhani', sans-serif; background: var(--deep); color: var(--text);
  min-height: 100vh; overflow-x: hidden; position: relative; line-height: 1.45;
}

/* === CYBER WAVE BACKGROUND === */
.wave-bg {
  position: fixed; inset: 0; z-index: -4; overflow: hidden;
  background: radial-gradient(1200px 800px at 50% 120%, rgba(0, 212, 255, 0.12), transparent 65%),
    radial-gradient(900px 600px at -10% 10%, rgba(123, 47, 255, 0.1), transparent 60%),
    radial-gradient(700px 500px at 110% 30%, rgba(255, 0, 229, 0.08), transparent 55%),
    linear-gradient(180deg, var(--deep) 0%, var(--ocean) 60%, var(--deep) 100%);
}
.wave-layer {
  position: absolute; bottom: -50%; left: -50%; width: 200%; height: 200%;
  background: repeating-radial-gradient(circle at 0 0, transparent 0, transparent 40px, rgba(0, 212, 255, 0.04) 41px, rgba(0, 212, 255, 0.04) 80px);
  animation: var(--wave-anim); opacity: 0.7; filter: blur(1px);
}
@keyframes waveFlow { 0% { transform: rotate(0deg) translateX(0) } 50% { transform: rotate(180deg) translateX(30px) } 100% { transform: rotate(360deg) translateX(0) } }

/* === PARTICLE TRAILS === */
.trail-container { position: fixed; inset: 0; z-index: -3; pointer-events: none; }
.trail {
  position: absolute; width: 4px; height: 4px; border-radius: 50%;
  background: var(--wave); opacity: 0; animation: trailRise 22s infinite ease-out;
  box-shadow: 0 0 12px var(--wave), 0 0 28px var(--glow);
}
.trail:nth-child(2n) { background: var(--pulse); animation-delay: -7s; animation-duration: 26s; box-shadow: 0 0 10px var(--pulse), 0 0 24px var(--pulse); }
.trail:nth-child(3n) { background: var(--accent); animation-delay: -14s; animation-duration: 24s; box-shadow: 0 0 10px var(--accent), 0 0 24px var(--accent); }
@keyframes trailRise {
  0% { transform: translateY(120vh) scale(0.3) rotate(0deg); opacity: 0 }
  8% { opacity: 1 }
  92% { opacity: 1 }
  100% { transform: translateY(-20vh) scale(1.2) rotate(540deg); opacity: 0 }
}

/* === HOLOGRAPHIC GRID === */
.holo-grid {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    linear-gradient(rgba(0, 212, 255, 0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 255, 0.025) 1px, transparent 1px),
    radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.03) 0%, transparent 70%);
  background-size: 60px 60px, 60px 60px, 100% 100%;
  animation: gridPulse 12s ease-in-out infinite;
}
@keyframes gridPulse { 0%,100%{opacity:0.5} 50%{opacity:0.8} }

/* === MAIN WRAPPER === */
.app-wrapper {
  position: relative; z-index: 10; max-width: 1300px; margin: 0 auto; padding: 12px;
  display: flex; flex-direction: column; min-height: 100vh;
}

/* === HEADER - GLITCH TITLE === */
.app-header {
  text-align: center; padding: 24px 8px 18px; position: relative;
  animation: headerSlide 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
}
@keyframes headerSlide { from { opacity: 0; transform: translateY(-15px) } to { opacity: 1; transform: translateY(0) } }

.glitch-title {
  font-family: 'Syncopate', sans-serif; font-size: clamp(1.7rem, 6vw, 3rem); font-weight: 700;
  letter-spacing: 3px; position: relative; display: inline-block;
  text-shadow: 0 0 15px var(--glow), 0 0 35px var(--wave);
  animation: titleFlicker 4s infinite;
}
.glitch-title::before, .glitch-title::after {
  content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
}
.glitch-title::before {
  color: var(--accent); animation: glitchTop 2.5s infinite linear alternate-reverse;
  clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%); transform: translate(-1px, -1px);
}
.glitch-title::after {
  color: var(--pulse); animation: glitchBot 3s infinite linear alternate-reverse;
  clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%); transform: translate(1px, 1px);
}
@keyframes titleFlicker { 0%,100%{opacity:1} 92%{opacity:1} 94%{opacity:0.85} 96%{opacity:1} }
@keyframes glitchTop { 0%{transform:translate(-1px,-1px)} 25%{transform:translate(1px,-2px)} 50%{transform:translate(-2px,1px)} 75%{transform:translate(2px,2px)} 100%{transform:translate(-1px,-1px)} }
@keyframes glitchBot { 0%{transform:translate(1px,1px)} 25%{transform:translate(-2px,2px)} 50%{transform:translate(2px,-1px)} 75%{transform:translate(-1px,-2px)} 100%{transform:translate(1px,1px)} }

/* === SEGMENTED NAV - HORIZONTAL SCROLL === */
.nav-segment {
  display: flex; justify-content: center; gap: 6px; margin: 10px 0 18px;
  background: var(--glass); border: 1px solid rgba(0, 212, 255, 0.25);
  border-radius: 16px; padding: 5px; backdrop-filter: blur(14px);
  max-width: fit-content; margin-inline: auto;
}
.nav-item {
  padding: 11px 24px; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.92rem;
  color: var(--muted); background: transparent; border: none; border-radius: 12px;
  cursor: pointer; transition: all 0.25s ease; position: relative; overflow: hidden;
  text-transform: uppercase; letter-spacing: 1px;
}
.nav-item::after {
  content: ''; position: absolute; inset: 0; border-radius: 12px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0, 212, 255, 0.25), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.2s;
}
.nav-item:hover { color: var(--wave); }
.nav-item:hover::after { opacity: 1; }
.nav-item.active {
  color: var(--text); background: linear-gradient(135deg, rgba(0, 212, 255, 0.18), rgba(123, 47, 255, 0.15));
  border: 1px solid rgba(0, 212, 255, 0.45); box-shadow: 0 0 18px rgba(0, 212, 255, 0.35);
}
.nav-item.active::before {
  content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%; height: 2px;
  background: var(--wave); border-radius: 2px; box-shadow: 0 0 14px var(--wave);
}

/* === MAIN CARD - HOLO GLASS === */
.main-card {
  background: var(--card-bg); border: 1px solid rgba(0, 212, 255, 0.22);
  border-radius: 24px; padding: 18px; flex-grow: 1;
  backdrop-filter: blur(18px); position: relative; overflow: hidden;
  transform-style: preserve-3d; transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.main-card::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.08), transparent);
  animation: shineScan 5s linear infinite; pointer-events: none;
}
@keyframes shineScan { 0%{left:-100%} 100%{left:100%} }

/* === CONTROL BAR - FLOATING === */
.control-bar {
  display: flex; align-items: center; gap: 12px; padding: 14px 16px; margin-bottom: 18px;
  background: linear-gradient(135deg, rgba(18, 22, 52, 0.75), rgba(25, 28, 62, 0.65));
  border: 1px solid rgba(0, 212, 255, 0.28); border-radius: 18px;
  backdrop-filter: blur(12px); flex-wrap: wrap;
}
.ctrl-group { display: flex; align-items: center; gap: 10px; }
.ctrl-label { color: var(--wave); font-size: 0.84rem; font-weight: 600; text-shadow: 0 0 9px rgba(0, 212, 255, 0.55); }
.ctrl-input {
  padding: 9px 13px; background: rgba(10, 14, 35, 0.75); border: 1px solid rgba(0, 212, 255, 0.32);
  border-radius: 11px; color: var(--text); font-size: 0.93rem; width: 160px;
  transition: all 0.22s ease; font-family: 'Rajdhani', sans-serif;
}
.ctrl-input:focus { outline: none; border-color: var(--wave); box-shadow: 0 0 16px rgba(0, 212, 255, 0.45); background: rgba(14, 18, 42, 0.85); }

/* === ACTION BUTTON - PULSE GLOW === */
.btn-pulse {
  padding: 10px 21px; background: linear-gradient(135deg, var(--wave), var(--pulse));
  border: none; border-radius: 13px; color: var(--deep); font-family: 'Rajdhani', sans-serif;
  font-weight: 700; font-size: 0.84rem; cursor: pointer; transition: all 0.25s ease;
  white-space: nowrap; position: relative; overflow: hidden; text-transform: uppercase;
  letter-spacing: 1px; box-shadow: 0 0 14px rgba(0, 212, 255, 0.4);
}
.btn-pulse::before {
  content: ''; position: absolute; inset: 0; border-radius: 13px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.35), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.25s;
}
.btn-pulse:hover::before { opacity: 1; }
.btn-pulse:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 0 26px rgba(0, 212, 255, 0.65), 0 0 48px rgba(123, 47, 255, 0.4); }
.btn-pulse:active { transform: translateY(0) scale(1); }
.btn-pulse:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.status-dot {
  font-size: 0.84rem; color: var(--success); margin-left: 6px; font-weight: 600;
  display: flex; align-items: center; gap: 5px; animation: dotPulse 1.8s ease-in-out infinite;
}
.status-dot::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--success); box-shadow: 0 0 10px var(--success); }
@keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:0.65} }

/* === GRID LAYOUT - ASYMMETRIC === */
.content-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px;
}
.panel-card {
  background: linear-gradient(155deg, rgba(16, 20, 48, 0.72), rgba(23, 26, 58, 0.62));
  border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 20px; overflow: hidden;
  display: flex; flex-direction: column; backdrop-filter: blur(10px);
  transition: all 0.28s cubic-bezier(0.2, 0.8, 0.2, 1); transform-style: preserve-3d;
}
.panel-card:hover {
  border-color: rgba(0, 212, 255, 0.5); box-shadow: 0 0 22px rgba(0, 212, 255, 0.35);
  transform: translateY(-3px) rotateX(1deg);
}
.panel-head {
  padding: 13px 16px; border-bottom: 1px solid rgba(0, 212, 255, 0.16);
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(90deg, rgba(0, 212, 255, 0.11), transparent 75%);
}
.panel-title { font-family: 'Syncopate', sans-serif; font-weight: 700; color: var(--wave); font-size: 0.92rem; letter-spacing: 0.5px; }
.panel-count {
  background: rgba(0, 212, 255, 0.16); color: var(--wave); padding: 3px 11px;
  border-radius: 22px; font-size: 0.74rem; font-weight: 700; border: 1px solid rgba(0, 212, 255, 0.38);
}
.panel-search { padding: 9px 14px; border-bottom: 1px solid rgba(0, 212, 255, 0.13); }
.panel-search input {
  width: 100%; padding: 9px 13px; background: rgba(12, 16, 38, 0.65);
  border: 1px solid rgba(0, 212, 255, 0.27); border-radius: 11px; color: var(--text);
  font-size: 0.89rem; transition: all 0.22s ease; font-family: 'Rajdhani', sans-serif;
}
.panel-search input:focus { outline: none; border-color: var(--wave); box-shadow: 0 0 14px rgba(0, 212, 255, 0.4); }
.panel-body { padding: 10px; overflow-y: auto; max-height: 400px; flex-grow: 1; }

/* === SWIPE CARD SELECTOR - NO DROPDOWN! === */
.selector-area { margin: 16px 0 18px; }
.selector-title { font-family: 'Syncopate', sans-serif; font-size: 0.82rem; font-weight: 700; color: var(--wave); margin-bottom: 10px; letter-spacing: 1px; }
.swipe-wrapper {
  position: relative; overflow: hidden; border-radius: 16px;
  border: 1px solid rgba(0, 212, 255, 0.3); background: rgba(14, 18, 42, 0.7);
}
.swipe-track { display: flex; transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
.swipe-card {
  min-width: 100%; padding: 14px 18px; cursor: pointer; transition: all 0.25s ease;
  display: flex; align-items: center; justify-content: space-between; border-right: 1px solid rgba(0, 212, 255, 0.15);
}
.swipe-card:last-child { border-right: none; }
.swipe-card:hover, .swipe-card.active { background: rgba(0, 212, 255, 0.12); }
.swipe-card.active { border-left: 3px solid var(--wave); }
.swipe-label { color: var(--text); font-weight: 500; font-size: 0.93rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 75%; }
.swipe-indicator { color: var(--wave); font-size: 1.2rem; transition: transform 0.2s; }
.swipe-card:active .swipe-indicator { transform: scale(0.9); }
.swipe-dots { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
.swipe-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(0, 212, 255, 0.35); transition: all 0.25s ease; }
.swipe-dot.active { background: var(--wave); box-shadow: 0 0 10px var(--wave); transform: scale(1.3); }

/* === RADIAL ACTION BUTTON === */
.radial-container { position: relative; display: inline-block; margin: 12px 0; }
.radial-btn {
  width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--wave), var(--pulse));
  border: none; color: var(--deep); font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 18px rgba(0, 212, 255, 0.5), 0 0 38px rgba(123, 47, 255, 0.35);
  transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; z-index: 2;
}
.radial-btn:hover { transform: scale(1.08) rotate(5deg); box-shadow: 0 0 28px rgba(0, 212, 255, 0.75), 0 0 55px rgba(123, 47, 255, 0.55); }
.radial-menu {
  position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%) scale(0.8);
  display: flex; flex-direction: column; gap: 10px; opacity: 0; visibility: hidden;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 1;
}
.radial-container:hover .radial-menu { opacity: 1; visibility: visible; transform: translateX(-50%) scale(1); }
.radial-item {
  padding: 10px 18px; background: rgba(18, 22, 52, 0.92); border: 1px solid rgba(0, 212, 255, 0.35);
  border-radius: 12px; color: var(--text); font-size: 0.85rem; white-space: nowrap;
  cursor: pointer; transition: all 0.22s ease; display: flex; align-items: center; gap: 8px;
  transform: translateY(10px); opacity: 0; animation: radialPop 0.25s ease forwards;
}
.radial-item:nth-child(1){animation-delay:0.05s} .radial-item:nth-child(2){animation-delay:0.1s}
.radial-item:nth-child(3){animation-delay:0.15s} .radial-item:nth-child(4){animation-delay:0.2s}
@keyframes radialPop { to { transform: translateY(0); opacity: 1 } }
.radial-item:hover { background: rgba(0, 212, 255, 0.18); border-color: var(--wave); box-shadow: 0 0 16px rgba(0, 212, 255, 0.4); transform: translateX(4px); }

/* === DETAIL DISPLAY - HOLOGRAM STYLE === */
.result-display {
  margin-top: 16px; padding: 18px 22px; background: rgba(16, 20, 48, 0.72);
  border: 1px solid rgba(0, 212, 255, 0.32); border-radius: 16px;
  font-family: 'Syncopate', sans-serif; font-size: 1.1rem; color: var(--wave);
  text-align: center; min-height: 58px; display: flex; align-items: center; justify-content: center;
  transition: all 0.25s ease; cursor: pointer; position: relative; overflow: hidden;
}
.result-display::before {
  content: ''; position: absolute; inset: 0; border-radius: 16px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0, 212, 255, 0.2), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.25s;
}
.result-display:hover::before { opacity: 1; }
.result-display:hover { border-color: var(--wave); box-shadow: 0 0 20px rgba(0, 212, 255, 0.45); }
.result-display:active { transform: scale(0.99); }

/* === LIST ITEM - WAVE REVEAL === */
.list-item {
  padding: 12px 14px; margin-bottom: 8px; border-radius: 14px; cursor: pointer;
  background: linear-gradient(135deg, rgba(18, 22, 52, 0.68), rgba(24, 27, 58, 0.58));
  border: 1px solid rgba(0, 212, 255, 0.21); transition: all 0.26s ease; position: relative; overflow: hidden;
}
.list-item::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.12), transparent);
  transition: left 0.4s ease;
}
.list-item:hover::before { left: 100%; }
.list-item:hover { border-color: var(--wave); box-shadow: 0 0 18px rgba(0, 212, 255, 0.38); transform: translateX(3px); }
.item-meta { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.6px; margin-bottom: 3px; font-weight: 600; }
.item-head { color: var(--wave); font-weight: 700; margin-bottom: 4px; font-size: 0.94rem; }
.item-body { font-size: 0.84rem; color: var(--text); line-height: 1.42; white-space: pre-wrap; word-break: break-word; opacity: 0.96; }

/* === BET ROW - SLIDE IN === */
.bet-row {
  display: flex; justify-content: space-between; align-items: center; padding: 10px 14px;
  margin-bottom: 6px; background: rgba(14, 18, 42, 0.58); border: 1px solid rgba(0, 212, 255, 0.19);
  border-radius: 11px; cursor: pointer; transition: all 0.24s ease;
}
.bet-row:hover { border-color: var(--wave); background: rgba(18, 22, 52, 0.72); box-shadow: 0 0 16px rgba(0, 212, 255, 0.35); transform: translateX(4px); }
.bet-name { color: var(--text); font-size: 0.84rem; flex: 1; margin-right: 10px; font-weight: 500; }
.bet-val {
  font-family: 'Syncopate', sans-serif; font-weight: 700; color: var(--wave); font-size: 0.84rem;
  background: rgba(0, 212, 255, 0.13); padding: 3px 10px; border-radius: 9px;
  border: 1px solid rgba(0, 212, 255, 0.32); transition: all 0.22s ease;
}
.bet-row:hover .bet-val { background: rgba(0, 212, 255, 0.24); box-shadow: 0 0 13px rgba(0, 212, 255, 0.38); }

/* === TOAST - WAVE POP === */
.toast {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(110px) scale(0.92);
  background: linear-gradient(135deg, rgba(18, 22, 52, 0.96), rgba(24, 27, 58, 0.93));
  color: var(--wave); padding: 13px 28px; border-radius: 52px; font-weight: 700; font-size: 0.93rem;
  opacity: 0; transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 2000;
  border: 1px solid var(--wave); backdrop-filter: blur(16px); text-shadow: 0 0 11px rgba(0, 212, 255, 0.7);
  box-shadow: 0 0 22px rgba(0, 212, 255, 0.5), 0 0 48px rgba(123, 47, 255, 0.35);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); animation: wavePop 0.48s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes wavePop {
  0% { transform: translateX(-50%) translateY(110px) scale(0.88); opacity: 0 }
  45% { transform: translateX(-50%) translateY(-6px) scale(1.04) }
  100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1 }
}

/* === SPINNER - ORBITAL === */
.spinner {
  width: 34px; height: 34px; border: 3px solid rgba(0, 212, 255, 0.26);
  border-top-color: var(--wave); border-radius: 50%; animation: orbitSpin 0.95s linear infinite;
  box-shadow: 0 0 14px rgba(0, 212, 255, 0.45);
}
@keyframes orbitSpin { to { transform: rotate(360deg) } }

/* === SCROLLBAR - NEON === */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: rgba(10, 14, 35, 0.45); border-radius: 3px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--wave), var(--pulse), var(--accent));
  border-radius: 3px; border: 1px solid rgba(0, 212, 255, 0.28);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--accent), var(--pulse), var(--wave));
  box-shadow: 0 0 14px rgba(0, 212, 255, 0.55);
}

/* === AUTO-UPDATE BADGE === */
.update-badge {
  position: fixed; top: 16px; right: 16px; background: rgba(0, 212, 255, 0.13);
  border: 1px solid var(--wave); border-radius: 11px; padding: 7px 14px; font-size: 0.79rem;
  color: var(--wave); display: none; align-items: center; gap: 7px; z-index: 1000;
  backdrop-filter: blur(11px); animation: badgeGlow 1.3s infinite;
}
.update-badge.show { display: flex; }
@keyframes badgeGlow { 0%,100%{opacity:0.72} 50%{opacity:1} }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .control-bar { flex-direction: column; align-items: stretch; }
  .ctrl-group { width: 100%; justify-content: space-between; }
  .ctrl-input { width: 100%; }
  .content-grid { grid-template-columns: 1fr; }
  .glitch-title { font-size: clamp(1.5rem, 7vw, 2.5rem); letter-spacing: 2px; }
  .nav-item { padding: 10px 20px; font-size: 0.87rem; }
  .radial-menu { bottom: 68px; }
}

/* === FOCUS & ACCESSIBILITY === */
button:focus-visible, input:focus-visible { outline: 2px solid var(--wave); outline-offset: 2px; box-shadow: 0 0 16px rgba(0, 212, 255, 0.5); }
@media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }

/* === 3D TILT EFFECT === */
.tilt-card { transform-style: preserve-3d; transition: transform 0.15s ease-out; }
.tilt-card:hover { transform: perspective(800px) rotateX(var(--tilt)) rotateY(calc(var(--tilt) * -1)) translateY(-2px); }
</style>
</head>
<body>
<div class="wave-bg"><div class="wave-layer"></div></div>
<div class="trail-container" id="trails"></div>
<div class="holo-grid"></div>
<div id="toast" class="toast">✨ Success!</div>
<div class="update-badge" id="updateBadge"><span>🔄</span><span>Auto-Sync Active</span></div>

<div class="app-wrapper">
  <header class="app-header">
    <h1 class="glitch-title" data-text="🌊 CYBER WAVE TOGEL 🌊">🌊 CYBER WAVE TOGEL 🌊</h1>
  </header>

  <nav class="nav-segment">
    <button class="nav-item active" data-tab="prediksi">🔮 Prediksi</button>
    <button class="nav-item" data-tab="hitung">🧮 Hitung</button>
  </nav>

  <main class="main-card tilt-card" id="mainCard">
    <!-- TAB: PREDIKSI -->
    <div id="tab-prediksi" class="tab-content">
      <div class="control-bar">
        <div class="ctrl-group">
          <span class="ctrl-label">📅 Tanggal</span>
          <input type="date" id="input-tanggal" class="ctrl-input" onchange="autoUpdateTanggal()">
        </div>
        <button class="btn-pulse" id="btn-tanggal" onclick="manualUpdateTanggal()">⚡ Sync</button>
        <span class="status-dot" id="status-tanggal"></span>
      </div>

      <div class="content-grid">
        <article class="panel-card tilt-card">
          <div class="panel-head">
            <h3 class="panel-title">🔮 Prediksi</h3>
            <span class="panel-count" id="count-prediksi">0</span>
          </div>
          <div class="panel-search"><input type="text" id="search-prediksi" placeholder="🔍 Filter..."></div>
          <div class="panel-body" id="list-prediksi"><div style="display:flex;justify-content:center;padding:20px"><div class="spinner"></div></div></div>
        </article>

        <article class="panel-card tilt-card">
          <div class="panel-head">
            <h3 class="panel-title">📅 Jadwal</h3>
            <span class="panel-count" id="count-jadwal">0</span>
          </div>
          <div class="panel-search"><input type="text" id="search-jadwal" placeholder="🔍 Filter..."></div>
          <div class="panel-body" id="list-jadwal"><div style="display:flex;justify-content:center;padding:20px"><div class="spinner"></div></div></div>
        </article>

        <article class="panel-card tilt-card">
          <div class="panel-head">
            <h3 class="panel-title">🔗 Live Link</h3>
            <span class="panel-count" id="count-link">0</span>
          </div>
          <div class="panel-search"><input type="text" id="search-link" placeholder="🔍 Filter..."></div>
          <div class="panel-body" id="list-link"><div style="display:flex;justify-content:center;padding:20px"><div class="spinner"></div></div></div>
        </article>
      </div>
    </div>

    <!-- TAB: HITUNG -->
    <div id="tab-hitung" class="tab-content" style="display:none">
      <div class="control-bar">
        <div class="ctrl-group">
          <span class="ctrl-label">💰 Nominal</span>
          <input type="number" id="input-nominal" class="ctrl-input" placeholder="0" onchange="autoUpdateNominal()">
        </div>
        <button class="btn-pulse" id="btn-nominal" onclick="manualUpdateNominal()">⚡ Sync</button>
        <span class="status-dot" id="status-nominal"></span>
      </div>

      <!-- SWIPE CARD SELECTOR - NO DROPDOWN! -->
      <div class="selector-area">
        <div class="selector-title">📊 Pilih Kategori</div>
        <div class="swipe-wrapper">
          <div class="swipe-track" id="swipeTrackKelompok">
            <!-- Cards injected by JS -->
          </div>
        </div>
        <div class="swipe-dots" id="swipeDotsKelompok"></div>
      </div>

      <div class="selector-area">
        <div class="selector-title">🏷️ Pilih Sub-Kategori</div>
        <div class="swipe-wrapper" id="labelWrapper" style="opacity:0.5;pointer-events:none">
          <div class="swipe-track" id="swipeTrackLabel">
            <!-- Cards injected by JS -->
          </div>
        </div>
        <div class="swipe-dots" id="swipeDotsLabel"></div>
      </div>

      <!-- RADIAL ACTION MENU -->
      <div style="text-align:center;margin:14px 0">
        <div class="radial-container">
          <button class="radial-btn" onclick="tampilkanValueHitungan()">🚀</button>
          <div class="radial-menu">
            <div class="radial-item" onclick="copyResult()">📋 Copy Result</div>
            <div class="radial-item" onclick="resetSelection()">🔄 Reset</div>
            <div class="radial-item" onclick="showToast('💡 Tips: Swipe left/right to browse')">💡 Help</div>
          </div>
        </div>
      </div>

      <!-- HOLOGRAM RESULT DISPLAY -->
      <div class="result-display" id="resultDisplay" onclick="copyResult()">
        <span style="color:var(--muted)">Select category & sub-category, then tap 🚀</span>
      </div>

      <div class="content-grid" id="container-hitung" style="margin-top:16px">
        <div style="display:flex;justify-content:center;padding:40px;width:100%"><div class="spinner"></div></div>
      </div>
    </div>
  </main>
</div>

<script>
// === CONFIG ===
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4', keyNominal: 'togel_nominal_v4'
};
const state = { prediksi:[], jadwal:[], link:[], hitung:[] };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'), inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'), contH: $('container-hitung'),
  toast: $('toast'), badge: $('updateBadge'), mainCard: $('mainCard')
};

// === PARTICLE TRAILS ===
function createTrails() {
  const c = $('trails'); if (!c) return;
  for (let i = 0; i < 45; i++) {
    const p = document.createElement('div'); p.className = 'trail';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 22 + 's';
    p.style.animationDuration = (18 + Math.random() * 18) + 's';
    c.appendChild(p);
  }
}

// === UTILS ===
function showToast(msg) { dom.toast.textContent = '✨ ' + msg; dom.toast.classList.add('show'); setTimeout(() => dom.toast.classList.remove('show'), 3200); }
function showBadge() { if (dom.badge) { dom.badge.classList.add('show'); setTimeout(() => dom.badge.classList.remove('show'), 2100); } }
function copyText(t) { let ft = t; try { ft = decodeURIComponent(t); } catch (e) {}
  navigator.clipboard.writeText(ft).then(() => { const pv = ft.length > 22 ? ft.slice(0, 22) + '...' : ft; showToast('📋 Copied: ' + pv); }).catch(() => showToast('❌ Copy failed')); }
function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }
function parseCSV(t) { let r=[],row=[],ent="",st=0; for(let i=0;i<t.length;i++){const c=t[i],n=t[i+1];
  if(st===0){if(c==='"')st=1;else if(c===','){row.push(ent);ent=""}else if(c==='\r'&&n==='\n'){row.push(ent);r.push(row);row=[];ent="";i++}
  else if(c==='\n'||c==='\r'){row.push(ent);r.push(row);row=[];ent=""}else ent+=c}
  else if(st===1){if(c==='"'&&n==='"'){ent+='"';i++}else if(c==='"')st=0;else ent+=c}}
  if(ent||row.length){row.push(ent);r.push(row)}return r; }
function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Setup Script URL first!'); return false; }
  try { const params = new URLSearchParams({ action, value }); const res = await fetch(SCRIPT_URL + '?' + params.toString()); return (await res.text()).includes('SUCCESS'); }
  catch (e) { console.error(e); return false; }
}

// === DATA FETCH ===
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now()), data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) { const raw = safeGet(data[0], 1); if (raw) { const p = raw.split('/'); if (p.length === 3) { const f = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`; dom.inTgl.value = f; dom.statTgl.textContent = f; } } }
    for (let i = 2; i <= 84 && i < data.length; i++) { const t = safeGet(data[i], 1); if (t) state.prediksi.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    for (let i = 2; i <= 55 && i < data.length; i++) { const t = safeGet(data[i], 2); if (t) state.jadwal.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    for (let i = 56; i <= 82 && i < data.length; i++) { const t = safeGet(data[i], 2); if (t) state.link.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    renderPrediksi();
  } catch (e) { console.error(e); dom.listP.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px">❌ Load failed</p>'; }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now()), data = parseCSV(await res.text());
    if (data[0]) { const nom = safeGet(data[0], 23); if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); } }
    const secDef = [{tR:0,tC:24,s:2,e:42},{tR:43,tC:24,s:45,e:80},{tR:81,tC:24,s:83,e:119},{tR:120,tC:24,s:122,e:153},{tR:154,tC:24,s:156,e:179},{tR:180,tC:24,s:182,e:213},{tR:215,tC:24,s:217,e:248},{tR:249,tC:24,s:251,e:282},{tR:283,tC:24,s:285,e:316}];
    state.hitung = secDef.map(s => { let title = safeGet(data[s.tR], s.tC) || "MARKET"; let items = [];
      for (let i = s.s; i <= s.e && i < data.length; i++) if (data[i]) { const ty = safeGet(data[i], 23), rv = safeGet(data[i], 24); if (ty || rv) items.push({ type: ty, res: rv }); }
      return { title, items }; }).filter(x => x.items.length > 0);
    renderHitung();
  } catch (e) { console.error(e); dom.contH.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px">❌ Load failed</p>'; }
}

function renderList(container, items, search) {
  const f = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!f.length) { container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px">📭 No data</p>'; return; }
  container.innerHTML = f.map(v => `<div class="list-item" onclick="copyText('${encodeURIComponent(v.content)}')"><div class="item-meta">📋 Title</div><div class="item-head">${v.title}</div><div class="item-meta">💬 Tap to Copy</div><div class="item-body">${v.content}</div></div>`).join('');
}
function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value); renderList(dom.listJ, state.jadwal, dom.srcJ.value); renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length; dom.cntJ.textContent = state.jadwal.length; dom.cntL.textContent = state.link.length;
}
function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<p style="color:var(--muted);text-align:center">📭 No data</p>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `<div class="panel-card tilt-card"><div class="panel-head"><h3 class="panel-title">🎯 ${s.title}</h3></div><div class="panel-body">${s.items.map(it => `<div class="bet-row" onclick="copyText('${encodeURIComponent(it.res)}')"><span class="bet-name">${it.type}</span><span class="bet-val">${it.res}</span></div>`).join('')}</div></div>`).join('');
}

// === SWIPE CARD SELECTOR LOGIC ===
let kelompokData = {}, selectedKelompok = null, selectedLabel = null;

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now()), data = parseCSV(await res.text());
    if (data[0]) { const nom = safeGet(data[0], 23); if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); } }
    const secDef = [
      { t: "ALL MARKETS", s: 2, e: 42 }, { t: "MACAU 4D", s: 45, e: 80 }, { t: "MACAU 5D", s: 83, e: 119 },
      { t: "KINGKONG 4D", s: 122, e: 153 }, { t: "BONUS CALC", s: 156, e: 179 }, { t: "JAKARTA", s: 182, e: 213 },
      { t: "TOTOMALI", s: 217, e: 248 }, { t: "HOKIDRAW", s: 251, e: 282 }, { t: "SYDNEY/HK", s: 285, e: 316 }
    ];
    kelompokData = {};
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.s; i <= sec.e && i < data.length; i++) if (data[i]) {
        const lb = safeGet(data[i], 23), vl = safeGet(data[i], 24);
        if (lb || vl) items.push({ label: lb || "-", value: vl || "-" });
      }
      if (items.length > 0) kelompokData[sec.t] = items;
    });
    initSwipeSelectors();
  } catch (e) { console.error(e); }
}

function initSwipeSelectors() {
  // Kelompok swipe
  const trackK = $('swipeTrackKelompok'), dotsK = $('swipeDotsKelompok');
  const keys = Object.keys(kelompokData);
  trackK.innerHTML = keys.map((k, i) => `<div class="swipe-card" data-idx="${i}" onclick="selectKelompok('${k}', ${i})"><span class="swipe-label">${k}</span><span class="swipe-indicator">›</span></div>`).join('');
  dotsK.innerHTML = keys.map((_, i) => `<div class="swipe-dot" data-idx="${i}" onclick="goToKelompok(${i})"></div>`).join('');
  
  // Label swipe (empty initially)
  $('swipeTrackLabel').innerHTML = '<div class="swipe-card"><span class="swipe-label">Select category first</span><span class="swipe-indicator">›</span></div>';
  $('swipeDotsLabel').innerHTML = '<div class="swipe-dot active"></div>';
}

function selectKelompok(name, idx) {
  selectedKelompok = name; selectedLabel = null;
  // Update UI
  document.querySelectorAll('#swipeTrackKelompok .swipe-card').forEach((c, i) => { c.classList.toggle('active', i === idx); });
  document.querySelectorAll('#swipeDotsKelompok .swipe-dot').forEach((d, i) => { d.classList.toggle('active', i === idx); });
  // Enable label selector
  $('labelWrapper').style.opacity = '1'; $('labelWrapper').style.pointerEvents = 'auto';
  // Populate label cards
  const items = kelompokData[name], trackL = $('swipeTrackLabel'), dotsL = $('swipeDotsLabel');
  trackL.innerHTML = items.map((it, i) => `<div class="swipe-card" data-idx="${i}" onclick="selectLabel('${it.label}', ${i})"><span class="swipe-label">${it.label}</span><span class="swipe-indicator">›</span></div>`).join('');
  dotsL.innerHTML = items.map((_, i) => `<div class="swipe-dot" data-idx="${i}" onclick="goToLabel(${i})"></div>`).join('');
  // Reset result
  $('resultDisplay').innerHTML = '<span style="color:var(--muted)">Now select a sub-category</span>';
}

function selectLabel(name, idx) {
  selectedLabel = name;
  document.querySelectorAll('#swipeTrackLabel .swipe-card').forEach((c, i) => { c.classList.toggle('active', i === idx); });
  document.querySelectorAll('#swipeDotsLabel .swipe-dot').forEach((d, i) => { d.classList.toggle('active', i === idx); });
}

function goToKelompok(idx) {
  const cards = document.querySelectorAll('#swipeTrackKelompok .swipe-card');
  if (cards[idx]) { cards[idx].click(); $('swipeTrackKelompok').style.transform = `translateX(-${idx * 100}%)`; }
}
function goToLabel(idx) {
  const cards = document.querySelectorAll('#swipeTrackLabel .swipe-card');
  if (cards[idx]) { cards[idx].click(); $('swipeTrackLabel').style.transform = `translateX(-${idx * 100}%)`; }
}

function tampilkanValueHitungan() {
  const display = $('resultDisplay');
  if (!selectedKelompok || !selectedLabel) {
    display.innerHTML = '<span style="color:var(--muted)">⚠️ Please select both category & sub-category</span>';
    showToast('⚠️ Complete your selection!'); return;
  }
  const item = kelompokData[selectedKelompok].find(i => i.label === selectedLabel);
  if (item) {
    display.innerHTML = `<span style="font-size:1.15em;font-weight:700">${item.value}</span>`;
    display.dataset.value = item.value;
  }
}

function copyResult() {
  const val = $('resultDisplay').dataset.value;
  if (val) { copyText(val); $('resultDisplay').style.boxShadow = '0 0 24px rgba(0, 255, 163, 0.75)'; setTimeout(() => $('resultDisplay').style.boxShadow = '', 280); }
  else showToast('ℹ️ No result to copy yet');
}
function resetSelection() {
  selectedKelompok = null; selectedLabel = null;
  document.querySelectorAll('.swipe-card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.swipe-dot').forEach(d => d.classList.remove('active'));
  if (document.querySelector('#swipeDotsKelompok .swipe-dot')) document.querySelector('#swipeDotsKelompok .swipe-dot').classList.add('active');
  $('labelWrapper').style.opacity = '0.5'; $('labelWrapper').style.pointerEvents = 'none';
  $('resultDisplay').innerHTML = '<span style="color:var(--muted)">Select category & sub-category, then tap 🚀</span>';
  delete $('resultDisplay').dataset.value;
  showToast('🔄 Selection reset');
}

// === SWIPE GESTURE SUPPORT ===
let swipeStartX = 0, swipeTrack = null, swipeType = '';
function initSwipeGestures() {
  ['kelompok', 'label'].forEach(type => {
    const track = $(`swipeTrack${type.charAt(0).toUpperCase() + type.slice(1)}`);
    if (!track) return;
    track.addEventListener('touchstart', e => { swipeStartX = e.touches[0].clientX; swipeTrack = track; swipeType = type; }, { passive: true });
    track.addEventListener('touchend', e => {
      const diff = e.changedTouches[0].clientX - swipeStartX;
      if (Math.abs(diff) > 50) {
        const cards = swipeTrack.querySelectorAll('.swipe-card'), dots = $(`swipeDots${swipeType.charAt(0).toUpperCase() + swipeType.slice(1)}`).querySelectorAll('.swipe-dot');
        let current = Array.from(cards).findIndex(c => c.classList.contains('active'));
        if (diff < 0 && current < cards.length - 1) current++;
        else if (diff > 0 && current > 0) current--;
        if (swipeType === 'kelompok') { cards[current]?.click(); goToKelompok(current); }
        else { cards[current]?.click(); goToLabel(current); }
      }
    }, { passive: true });
  });
}

// === AUTO-UPDATE ===
let autoTimeout = null;
function autoUpdateTanggal() { showBadge(); clearTimeout(autoTimeout); autoTimeout = setTimeout(() => manualUpdateTanggal(), 1000); }
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pick a date first!");
  const p = dom.inTgl.value.split('-'), fd = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "⏳ Syncing...";
  updateSheet('updateTanggal', fd).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) { localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value); dom.statTgl.textContent = "✅ Synced!"; showToast("📅 Date updated!"); fetchPrediksi(); fetchHitung(); loadHitungData(); }
    else { dom.statTgl.textContent = "❌ Failed"; showToast("❌ Check Script URL"); }
  });
}
function autoUpdateNominal() { showBadge(); clearTimeout(autoTimeout); autoTimeout = setTimeout(() => manualUpdateNominal(), 1000); }
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Enter nominal first!");
  dom.btnNom.disabled = true; dom.statNom.textContent = "⏳ Syncing...";
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) { localStorage.setItem(CONFIG.keyNominal, dom.inNom.value); dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value); showToast("💰 Nominal updated!"); fetchPrediksi(); fetchHitung(); loadHitungData(); }
    else { dom.statNom.textContent = "❌ Failed"; showToast("❌ Check Script URL"); }
  });
}

// === 3D TILT EFFECT ===
function initTilt() {
  const cards = document.querySelectorAll('.tilt-card');
  cards.forEach(card => {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect(), x = e.clientX - r.left, y = e.clientY - r.top;
      const px = (x / r.width - 0.5) * 4, py = (y / r.height - 0.5) * -4;
      card.style.transform = `perspective(800px) rotateX(${py}deg) rotateY(${px}deg) translateY(-2px)`;
    });
    card.addEventListener('mouseleave', () => { card.style.transform = 'perspective(800px) rotateX(0) rotateY(0) translateY(0)'; });
  });
}

// === INIT ===
function init() {
  // Tabs
  document.querySelectorAll('.nav-item').forEach(t => t.onclick = () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    t.classList.add('active');
    dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
    dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
  });
  // Search
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  // Load
  fetchPrediksi(); fetchHitung(); loadHitungData();
  // Tilt & Swipe
  initTilt(); initSwipeGestures();
}

document.addEventListener('DOMContentLoaded', () => {

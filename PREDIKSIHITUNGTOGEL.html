<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDIKSI DAN HITUNG TOGEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #010812;
            --bg-secondary: #051018;
            --bg-card: #081822;
            --fg: #e8f7ff;
            --fg-muted: #6b9ab8;
            --accent: #00e5ff;
            --accent-secondary: #0099cc;
            --border: #0d3a52;
            --glow: rgba(0, 229, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-pattern {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 229, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0, 153, 204, 0.06) 0%, transparent 50%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-secondary) 100%);
            z-index: -2;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(40px); }
        }

        .floating-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            pointer-events: none;
            z-index: -1;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: var(--accent);
            top: -150px;
            left: -150px;
            animation: floatOrb 25s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #0066aa;
            bottom: -100px;
            right: -100px;
            animation: floatOrb 20s ease-in-out infinite reverse;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, 40px) scale(1.1); }
            66% { transform: translate(-40px, 80px) scale(0.9); }
        }

        /* Typography */
        .font-display {
            font-family: 'Orbitron', sans-serif;
        }

        .text-glow {
            text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow);
        }

        /* Layout */
        .container-main {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header-title {
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 900;
            letter-spacing: 0.1em;
            color: var(--accent);
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .header-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        /* Tabs */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 0;
            flex-wrap: wrap;
        }

        .tab-btn {
            font-family: 'Orbitron', sans-serif;
            padding: 14px 32px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--fg-muted);
            background: transparent;
            border: 1px solid transparent;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            text-transform: uppercase;
        }

        .tab-btn:hover {
            color: var(--fg);
        }

        .tab-btn.active {
            color: var(--accent);
            background: var(--bg-card);
            border-color: var(--border);
        }

        .tab-btn.active::before {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        /* Main Card */
        .main-card {
            background: linear-gradient(160deg, var(--bg-card) 0%, rgba(8, 24, 34, 0.7) 100%);
            border: 1px solid var(--border);
            border-radius: 0 16px 16px 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        /* Input Settings Box */
        .settings-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .settings-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
        }

        .input-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--fg-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: var(--fg);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
        }

        .btn-save {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
            color: var(--bg);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 229, 255, 0.35);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        .saved-display {
            margin-top: 12px;
            font-size: 0.9rem;
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
        }

        /* Section Grid */
        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        /* Section Box */
        .section-box {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .section-header {
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.08) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .section-search {
            margin-top: 12px;
        }

        .search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: var(--fg);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: var(--fg-muted);
        }

        .section-content {
            padding: 12px;
            max-height: 450px;
            overflow-y: auto;
            flex: 1;
        }

        /* Item Card */
        .item-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .item-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.08), transparent);
            transition: left 0.5s ease;
        }

        .item-card:hover {
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .item-card:hover::before {
            left: 100%;
        }

        .item-card:active {
            transform: scale(0.98);
        }

        .item-title {
            font-size: 0.7rem;
            color: var(--fg-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .item-name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .item-content {
            font-size: 0.85rem;
            color: var(--fg);
            word-break: break-all;
            line-height: 1.5;
        }

        /* Hitung Section */
        .hitung-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .hitung-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .hitung-header {
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.1) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
            padding: 14px 18px;
        }

        .hitung-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--accent);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .hitung-list {
            padding: 8px;
        }

        .hitung-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid transparent;
        }

        .hitung-row:hover {
            background: rgba(0, 229, 255, 0.05);
            border-color: var(--border);
        }

        .hitung-type {
            font-size: 0.85rem;
            color: var(--fg);
        }

        .hitung-result {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            color: var(--accent);
            font-size: 0.9rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
            color: var(--bg);
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 229, 255, 0.4);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Loading */
        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-text {
            text-align: center;
            color: var(--fg-muted);
            padding: 30px;
            font-size: 0.9rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-secondary);
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container-main {
                padding: 12px;
            }

            .main-card {
                padding: 16px;
            }

            .tab-btn {
                padding: 10px 20px;
                font-size: 0.75rem;
            }

            .settings-row {
                flex-direction: column;
            }

            .btn-save {
                width: 100%;
            }

            .section-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="bg-grid"></div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>

    <div id="toast" class="toast">Berhasil disalin!</div>

    <div class="container-main">
        <h1 class="header-title font-display text-glow">PREDIKSI DAN HITUNG TOGEL</h1>

        <div class="tabs-container">
            <button class="tab-btn active" data-tab="prediksi">PREDIKSI TOGEL</button>
            <button class="tab-btn" data-tab="hitung">HITUNG TOGEL</button>
        </div>

        <div class="main-card">
            <!-- Tab Prediksi -->
            <div id="prediksi-tab" class="tab-content active">
                <div class="settings-box">
                    <div class="settings-row">
                        <div class="input-group">
                            <label class="input-label">Tanggal Prediksi</label>
                            <input type="date" id="tanggal-input" class="input-field">
                        </div>
                        <button id="btn-simpan-tanggal" class="btn-save">Simpan Tanggal</button>
                    </div>
                    <div id="tanggal-display" class="saved-display"></div>
                </div>

                <div class="section-grid">
                    <!-- Prediksi Togel -->
                    <div class="section-box">
                        <div class="section-header">
                            <h2 class="section-title">PREDIKSI TOGEL</h2>
                            <div class="section-search">
                                <input type="text" id="search-prediksi" class="search-input" placeholder="Cari prediksi...">
                            </div>
                        </div>
                        <div id="list-prediksi" class="section-content">
                            <div class="loading-spinner"></div>
                        </div>
                    </div>

                    <!-- Jadwal Pasaran -->
                    <div class="section-box">
                        <div class="section-header">
                            <h2 class="section-title">JADWAL PASARAN TOGEL</h2>
                            <div class="section-search">
                                <input type="text" id="search-jadwal" class="search-input" placeholder="Cari jadwal...">
                            </div>
                        </div>
                        <div id="list-jadwal" class="section-content">
                            <div class="loading-spinner"></div>
                        </div>
                    </div>

                    <!-- Link Live -->
                    <div class="section-box">
                        <div class="section-header">
                            <h2 class="section-title">LINK LIVE PASARAN TOGEL</h2>
                            <div class="section-search">
                                <input type="text" id="search-link" class="search-input" placeholder="Cari link...">
                            </div>
                        </div>
                        <div id="list-link" class="section-content">
                            <div class="loading-spinner"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab Hitung -->
            <div id="hitung-tab" class="tab-content">
                <div class="settings-box">
                    <div class="settings-row">
                        <div class="input-group">
                            <label class="input-label">Nominal untuk Hitung</label>
                            <input type="number" id="nominal-input" class="input-field" placeholder="Masukkan nominal...">
                        </div>
                        <button id="btn-simpan-nominal" class="btn-save">Simpan Nominal</button>
                    </div>
                    <div id="nominal-display" class="saved-display"></div>
                </div>

                <div id="hitung-container" class="hitung-grid">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            prediksiSheet: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
            hitungSheet: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810',
            storage: {
                tanggal: 'togel_tanggal_v3',
                nominal: 'togel_nominal_v3'
            }
        };

        // State
        const state = {
            prediksiData: [],
            jadwalData: [],
            linkData: [],
            hitungData: []
        };

        // DOM Elements
        const dom = {
            tabs: document.querySelectorAll('.tab-btn'),
            prediksiTab: document.getElementById('prediksi-tab'),
            hitungTab: document.getElementById('hitung-tab'),
            tanggalInput: document.getElementById('tanggal-input'),
            btnSimpanTanggal: document.getElementById('btn-simpan-tanggal'),
            tanggalDisplay: document.getElementById('tanggal-display'),
            searchPrediksi: document.getElementById('search-prediksi'),
            searchJadwal: document.getElementById('search-jadwal'),
            searchLink: document.getElementById('search-link'),
            listPrediksi: document.getElementById('list-prediksi'),
            listJadwal: document.getElementById('list-jadwal'),
            listLink: document.getElementById('list-link'),
            nominalInput: document.getElementById('nominal-input'),
            btnSimpanNominal: document.getElementById('btn-simpan-nominal'),
            nominalDisplay: document.getElementById('nominal-display'),
            hitungContainer: document.getElementById('hitung-container'),
            toast: document.getElementById('toast')
        };

        // Utility Functions
        function showToast(message) {
            dom.toast.textContent = message;
            dom.toast.classList.add('show');
            setTimeout(() => dom.toast.classList.remove('show'), 2500);
        }

        function copyToClipboard(text) {
            const shortText = text.length > 30 ? text.substring(0, 30) + '...' : text;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Disalin: ' + shortText);
            }).catch(() => {
                showToast('Gagal menyalin');
            });
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('id-ID').format(num);
        }

        function convertDateFormat(dateStr) {
            // Convert MM/DD/YYYY to YYYY-MM-DD
            if (!dateStr) return '';
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                return `${parts[2]}-${parts[0].padStart(2, '0')}-${parts[1].padStart(2, '0')}`;
            }
            return dateStr;
        }

        // CSV Parser
        function parseCSV(text) {
            const rows = [];
            let currentRow = [];
            let currentCell = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (inQuotes) {
                    if (char === '"' && nextChar === '"') {
                        currentCell += '"';
                        i++;
                    } else if (char === '"') {
                        inQuotes = false;
                    } else {
                        currentCell += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        currentRow.push(currentCell.trim());
                        currentCell = '';
                    } else if (char === '\n' || (char === '\r' && nextChar === '\n')) {
                        currentRow.push(currentCell.trim());
                        if (currentRow.some(cell => cell !== '')) {
                            rows.push(currentRow);
                        }
                        currentRow = [];
                        currentCell = '';
                        if (char === '\r') i++;
                    } else if (char !== '\r') {
                        currentCell += char;
                    }
                }
            }

            if (currentCell !== '' || currentRow.length > 0) {
                currentRow.push(currentCell.trim());
                if (currentRow.some(cell => cell !== '')) {
                    rows.push(currentRow);
                }
            }

            return rows;
        }

        function getCell(row, index) {
            return row && row[index] !== undefined ? row[index].trim() : '';
        }

        // Fetch Prediksi Data
        async function fetchPrediksiData() {
            try {
                const response = await fetch(CONFIG.prediksiSheet);
                const text = await response.text();
                const data = parseCSV(text);

                // Reset data
                state.prediksiData = [];
                state.jadwalData = [];
                state.linkData = [];

                // B1 - Tanggal
                if (data[0]) {
                    const savedTanggal = localStorage.getItem(CONFIG.storage.tanggal);
                    if (!savedTanggal) {
                        dom.tanggalInput.value = convertDateFormat(getCell(data[0], 1));
                    }
                }

                // Process rows
                for (let i = 0; i < data.length; i++) {
                    const colB = getCell(data[i], 1);
                    const colC = getCell(data[i], 2);

                    // B3:B85 - Prediksi Togel (index 2-84)
                    if (i >= 2 && i <= 84 && colB) {
                        const firstWord = colB.split(/[\s,]+/)[0] || colB.substring(0, 20);
                        state.prediksiData.push({
                            title: firstWord,
                            content: colB
                        });
                    }

                    // C3:C56 - Jadwal Pasaran (index 2-55)
                    if (i >= 2 && i <= 55 && colC) {
                        const firstWord = colC.split(/[\s,]+/)[0] || colC.substring(0, 20);
                        state.jadwalData.push({
                            title: firstWord,
                            content: colC
                        });
                    }

                    // C57:C83 - Link Live (index 56-82)
                    if (i >= 56 && i <= 82 && colC) {
                        const firstWord = colC.split(/[\s,]+/)[0] || colC.substring(0, 20);
                        state.linkData.push({
                            title: firstWord,
                            content: colC
                        });
                    }
                }

                renderPrediksiLists();
            } catch (error) {
                console.error('Error fetching prediksi:', error);
                dom.listPrediksi.innerHTML = '<p class="empty-text">Gagal memuat data. Pastikan spreadsheet publik.</p>';
                dom.listJadwal.innerHTML = '<p class="empty-text">Gagal memuat data.</p>';
                dom.listLink.innerHTML = '<p class="empty-text">Gagal memuat data.</p>';
            }
        }

        // Fetch Hitung Data
        async function fetchHitungData() {
            try {
                const response = await fetch(CONFIG.hitungSheet);
                const text = await response.text();
                const data = parseCSV(text);

                // X1 - Nominal (index 0, col 23)
                if (data[0]) {
                    const savedNominal = localStorage.getItem(CONFIG.storage.nominal);
                    if (!savedNominal) {
                        dom.nominalInput.value = getCell(data[0], 23);
                    }
                }

                // Section definitions
                const sections = [
                    { titleRow: 0, titleCol: 24, start: 2, end: 42 },
                    { titleRow: 43, titleCol: 24, start: 45, end: 80 },
                    { titleRow: 81, titleCol: 24, start: 83, end: 119 },
                    { titleRow: 120, titleCol: 24, start: 122, end: 153 },
                    { titleRow: 154, titleCol: 24, start: 156, end: 179 },
                    { titleRow: 180, titleCol: 24, start: 182, end: 213 },
                    { titleRow: 215, titleCol: 24, start: 217, end: 248 },
                    { titleRow: 249, titleCol: 24, start: 251, end: 282 },
                    { titleRow: 283, titleCol: 24, start: 285, end: 316 }
                ];

                state.hitungData = sections.map(sec => {
                    let title = 'PASARAN';
                    if (data[sec.titleRow]) {
                        const t = getCell(data[sec.titleRow], sec.titleCol);
                        if (t) title = t;
                    }

                    const items = [];
                    for (let i = sec.start; i <= sec.end; i++) {
                        if (data[i]) {
                            const jenis = getCell(data[i], 23);
                            const hasil = getCell(data[i], 24);
                            if (jenis || hasil) {
                                items.push({ jenis, hasil });
                            }
                        }
                    }

                    return { title, items };
                }).filter(sec => sec.items.length > 0);

                renderHitungSections();
            } catch (error) {
                console.error('Error fetching hitung:', error);
                dom.hitungContainer.innerHTML = '<p class="empty-text">Gagal memuat data hitung.</p>';
            }
        }

        // Render Functions
        function renderList(container, data, searchTerm) {
            const filtered = data.filter(item =>
                item.content.toLowerCase().includes(searchTerm.toLowerCase()) ||
                item.title.toLowerCase().includes(searchTerm.toLowerCase())
            );

            if (filtered.length === 0) {
                container.innerHTML = '<p class="empty-text">Tidak ada data ditemukan</p>';
                return;
            }

            container.innerHTML = filtered.map((item, idx) => `
                <div class="item-card fade-in" style="animation-delay: ${idx * 30}ms" onclick="copyToClipboard('${encodeURIComponent(item.content)}')">
                    <div class="item-title">Judul:</div>
                    <div class="item-name">${item.title}</div>
                    <div class="item-content">${item.content}</div>
                </div>
            `).join('');
        }

        function renderPrediksiLists() {
            renderList(dom.listPrediksi, state.prediksiData, dom.searchPrediksi.value);
            renderList(dom.listJadwal, state.jadwalData, dom.searchJadwal.value);
            renderList(dom.listLink, state.linkData, dom.searchLink.value);
        }

        function renderHitungSections() {
            if (state.hitungData.length === 0) {
                dom.hitungContainer.innerHTML = '<p class="empty-text">Tidak ada data hitung</p>';
                return;
            }

            dom.hitungContainer.innerHTML = state.hitungData.map((section, idx) => `
                <div class="hitung-card fade-in" style="animation-delay: ${idx * 50}ms">
                    <div class="hitung-header">
                        <h3 class="hitung-title">${section.title}</h3>
                    </div>
                    <div class="hitung-list">
                        ${section.items.map(item => `
                            <div class="hitung-row" onclick="copyToClipboard('${encodeURIComponent(item.hasil)}')">
                                <span class="hitung-type">${item.jenis}</span>
                                <span class="hitung-result">${item.hasil}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Event Handlers
        function initTabs() {
            dom.tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    dom.tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    const tabName = tab.dataset.tab;
                    dom.prediksiTab.classList.toggle('active', tabName === 'prediksi');
                    dom.hitungTab.classList.toggle('active', tabName === 'hitung');
                });
            });
        }

        function initTanggalHandler() {
            const saved = localStorage.getItem(CONFIG.storage.tanggal);
            if (saved) {
                dom.tanggalInput.value = saved;
                dom.tanggalDisplay.textContent = 'Tanggal tersimpan: ' + saved;
            }

            dom.btnSimpanTanggal.addEventListener('click', () => {
                const value = dom.tanggalInput.value;
                if (value) {
                    localStorage.setItem(CONFIG.storage.tanggal, value);
                    dom.tanggalDisplay.textContent = 'Tanggal tersimpan: ' + value;
                    showToast('Tanggal berhasil disimpan!');
                } else {
                    showToast('Pilih tanggal terlebih dahulu');
                }
            });
        }

        function initNominalHandler() {
            const saved = localStorage.getItem(CONFIG.storage.nominal);
            if (saved) {
                dom.nominalInput.value = saved;
                dom.nominalDisplay.textContent = 'Nominal tersimpan: Rp ' + formatNumber(saved);
            }

            dom.btnSimpanNominal.addEventListener('click', () => {
                const value = dom.nominalInput.value;
                if (value) {
                    localStorage.setItem(CONFIG.storage.nominal, value);
                    dom.nominalDisplay.textContent = 'Nominal tersimpan: Rp ' + formatNumber(value);
                    showToast('Nominal berhasil disimpan!');
                } else {
                    showToast('Masukkan nominal terlebih dahulu');
                }
            });
        }

        function initSearchHandlers() {
            dom.searchPrediksi.addEventListener('input', () => {
                renderList(dom.listPrediksi, state.prediksiData, dom.searchPrediksi.value);
            });

            dom.searchJadwal.addEventListener('input', () => {
                renderList(dom.listJadwal, state.jadwalData, dom.searchJadwal.value);
            });

            dom.searchLink.addEventListener('input', () => {
                renderList(dom.listLink, state.linkData, dom.searchLink.value);
            });
        }

        // Initialize
        async function init() {
            initTabs();
            initTanggalHandler();
            initNominalHandler();
            initSearchHandlers();

            await Promise.all([
                fetchPrediksiData(),
                fetchHitungData()
            ]);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

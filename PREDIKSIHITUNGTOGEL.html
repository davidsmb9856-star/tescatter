<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter', 'system-ui', 'sans-serif'],
        mono: ['JetBrains Mono', 'monospace']
      },
      colors: {
        bg: { 1: '#0b0f1a', 2: '#0e1424', 3: '#121a2f', 4: '#16203a' },
        text: { 1: '#f0f7ff', 2: '#a8c0d9', 3: '#6b85a3', 4: '#3d5270' },
        primary: { 1: '#00d4ff', 2: '#00b8e6', 3: '#0099cc', glow: 'rgba(0, 212, 255, 0.5)' },
        secondary: { 1: '#7c3aed', 2: '#6d28d9', glow: 'rgba(124, 58, 237, 0.4)' },
        accent: { 1: '#f472b6', 2: '#ec4899', glow: 'rgba(244, 114, 182, 0.4)' },
        success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
      },
      boxShadow: {
        'neon-sm': '0 0 12px rgba(0, 212, 255, 0.4)',
        'neon-md': '0 0 24px rgba(0, 212, 255, 0.6), 0 0 48px rgba(0, 212, 255, 0.25)',
        'neon-lg': '0 0 32px rgba(0, 212, 255, 0.7), 0 0 64px rgba(124, 58, 237, 0.4), 0 0 96px rgba(0, 212, 255, 0.2)',
        'glass': '0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1)'
      },
      animation: {
        'fade-in': 'fadeIn 0.3s ease-out forwards',
        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
        'pulse-soft': 'pulseSoft 2.5s ease-in-out infinite',
        'float': 'float 6s ease-in-out infinite',
        'shimmer': 'shimmer 2s linear infinite',
        'bounce-soft': 'bounceSoft 0.5s ease-in-out'
      },
      keyframes: {
        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
        slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
        pulseSoft: { '0%,100%': { opacity: '1' }, '50%': { opacity: '0.85' } },
        float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-6px)' } },
        shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
        bounceSoft: { '0%,100%': { transform: 'scale(1)' }, '50%': { transform: 'scale(1.03)' } }
      }
    }
  }
}
</script>
<style>
:root {
  --radius: 16px;
  --radius-lg: 24px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #0b0f1a;
  color: #f0f7ff;
  min-height: 100vh;
  line-height: 1.5;
  overflow-x: hidden;
}

/* === BACKGROUND === */
.bg-base { position: fixed; inset: 0; z-index: -3; background: linear-gradient(180deg, #0b0f1a 0%, #0e1424 50%, #121a2f 100%); }
.bg-grid {
  position: fixed; inset: 0; z-index: -2;
  background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: shimmer 20s linear infinite;
  pointer-events: none;
}
.bg-glow {
  position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 30%, rgba(124, 58, 237, 0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 85%, rgba(244, 114, 182, 0.04) 0%, transparent 50%);
  animation: pulse-soft 8s ease-in-out infinite;
  pointer-events: none;
}

/* === LAYOUT === */
.container { max-width: 1400px; margin: 0 auto; padding: 16px; position: relative; z-index: 10; }
@media (min-width: 768px) { .container { padding: 24px 32px; } }

/* === HEADER === */
.header { text-align: center; padding: 28px 0 20px; animation: slide-up 0.4s ease-out; }
.title {
  font-size: clamp(1.75rem, 5.5vw, 2.75rem);
  font-weight: 800; letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff, #00d4ff, #7c3aed, #f472b6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
  animation: shimmer 4s ease-in-out infinite;
}

/* === TABS - MODERN SEGMENTED === */
.tabs {
  display: inline-flex; gap: 4px; padding: 4px;
  background: rgba(18, 26, 47, 0.8);
  border: 1px solid rgba(30, 48, 78, 0.6);
  border-radius: var(--radius-lg);
  margin: 0 auto 20px;
  backdrop-filter: blur(12px);
}
.tab {
  padding: 12px 24px;
  font-weight: 600; font-size: 0.9rem;
  color: #6b85a3;
  background: transparent; border: none;
  border-radius: var(--radius);
  cursor: pointer; transition: all var(--transition);
  position: relative;
}
.tab:hover { color: #a8c0d9; background: rgba(30, 48, 78, 0.4); }
.tab.active {
  color: #f0f7ff;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(124, 58, 237, 0.12));
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.05);
}
.tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%;
  height: 2px; background: linear-gradient(90deg, transparent, #00d4ff, transparent);
  border-radius: 2px;
}

/* === CARD === */
.card {
  background: linear-gradient(180deg, #0e1424, #121a2f);
  border: 1px solid rgba(30, 48, 78, 0.7);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--glass);
  animation: slide-up 0.4s ease-out backwards;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.4), transparent);
}

/* === CONTROL BAR - NO DROPDOWNS! === */
.control-bar {
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center;
  padding: 14px 18px;
  background: rgba(18, 26, 47, 0.75);
  border: 1px solid rgba(30, 48, 78, 0.6);
  border-radius: var(--radius);
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
}
.control-group { display: flex; align-items: center; gap: 10px; }
.control-label {
  font-size: 0.85rem; font-weight: 500; color: #a8c0d9;
  display: flex; align-items: center; gap: 6px;
}
.input-clean {
  padding: 10px 14px;
  background: rgba(22, 32, 58, 0.8);
  border: 1px solid rgba(30, 48, 78, 0.8);
  border-radius: 12px;
  color: #f0f7ff; font-size: 0.95rem;
  font-family: inherit;
  transition: all var(--transition);
  min-width: 160px;
}
.input-clean:focus {
  outline: none;
  border-color: #00d4ff;
  box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15), 0 0 16px rgba(0, 212, 255, 0.3);
  background: rgba(26, 38, 68, 0.9);
}
.btn {
  padding: 10px 20px;
  background: linear-gradient(135deg, #00d4ff, #00b8e6);
  border: none; border-radius: 12px;
  color: #0b0f1a; font-weight: 600; font-size: 0.9rem;
  cursor: pointer; transition: all var(--transition);
  display: inline-flex; align-items: center; gap: 6px;
  box-shadow: 0 0 16px rgba(0, 212, 255, 0.4);
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 24px rgba(0, 212, 255, 0.6);
  background: linear-gradient(135deg, #00e6ff, #00c4f0);
}
.btn:active { transform: translateY(0); }
.btn:disabled {
  opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none;
  background: linear-gradient(135deg, #3d5270, #2a3f5a);
}
.status {
  font-size: 0.85rem; font-weight: 500; color: #00d4ff;
  margin-left: 8px; min-width: 70px;
  animation: pulse-soft 2.5s ease-in-out infinite;
}

/* === CHIP SELECTOR (REPLACES DROPDOWN) === */
.chip-group {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 8px;
  background: rgba(22, 32, 58, 0.6);
  border: 1px solid rgba(30, 48, 78, 0.6);
  border-radius: 14px;
  margin: 12px 0;
}
.chip {
  padding: 8px 14px;
  background: rgba(30, 48, 78, 0.6);
  border: 1px solid rgba(50, 72, 102, 0.7);
  border-radius: 10px;
  color: #a8c0d9; font-size: 0.85rem; font-weight: 500;
  cursor: pointer; transition: all var(--transition);
  display: inline-flex; align-items: center; gap: 6px;
}
.chip:hover {
  background: rgba(40, 60, 90, 0.7);
  border-color: rgba(0, 212, 255, 0.5);
  color: #f0f7ff;
}
.chip.active {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(124, 58, 237, 0.18));
  border-color: #00d4ff;
  color: #f0f7ff; font-weight: 600;
  box-shadow: 0 0 14px rgba(0, 212, 255, 0.35);
}
.chip .count {
  font-size: 0.75rem; color: #6b85a3;
  background: rgba(30, 48, 78, 0.8);
  padding: 2px 6px; border-radius: 6px;
}
.chip.active .count {
  background: rgba(0, 212, 255, 0.25);
  color: #00d4ff;
}

/* === GRID === */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; }

/* === SECTION === */
.section {
  background: rgba(18, 26, 47, 0.7);
  border: 1px solid rgba(30, 48, 78, 0.6);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex; flex-direction: column;
  animation: slide-up 0.35s ease-out backwards;
}
.section:nth-child(1) { animation-delay: 0.05s; }
.section:nth-child(2) { animation-delay: 0.1s; }
.section:nth-child(3) { animation-delay: 0.15s; }
.section:hover {
  border-color: rgba(0, 212, 255, 0.5);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
}
.section-head {
  padding: 13px 16px;
  background: rgba(22, 32, 58, 0.5);
  border-bottom: 1px solid rgba(30, 48, 78, 0.6);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title {
  font-weight: 600; font-size: 0.95rem; color: #f0f7ff;
  display: flex; align-items: center; gap: 7px;
}
.badge {
  font-size: 0.75rem; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
  background: rgba(0, 212, 255, 0.15);
  color: #00d4ff; border: 1px solid rgba(0, 212, 255, 0.3);
}

/* === SEARCH === */
.search {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(30, 48, 78, 0.5);
  background: rgba(14, 20, 36, 0.3);
}
.search input {
  width: 100%; padding: 9px 13px;
  background: rgba(22, 32, 58, 0.7);
  border: 1px solid rgba(30, 48, 78, 0.7);
  border-radius: 10px;
  color: #f0f7ff; font-size: 0.9rem;
  font-family: inherit; transition: all var(--transition);
}
.search input:focus {
  outline: none; border-color: #00d4ff;
  box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
}

/* === LIST === */
.list { padding: 10px; overflow-y: auto; max-height: 420px; flex: 1; }

/* === ITEM === */
.item {
  padding: 13px 15px;
  background: rgba(22, 32, 58, 0.5);
  border: 1px solid rgba(30, 48, 78, 0.5);
  border-radius: 12px;
  margin-bottom: 9px;
  cursor: pointer; transition: all var(--transition);
  animation: fade-in 0.3s ease-out backwards;
}
.item:hover {
  background: rgba(26, 38, 68, 0.7);
  border-color: rgba(0, 212, 255, 0.4);
  transform: translateX(3px);
  box-shadow: 0 0 14px rgba(0, 212, 255, 0.2);
}
.item-label {
  font-size: 0.7rem; font-weight: 600; color: #6b85a3;
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 4px;
}
.item-title {
  font-weight: 600; color: #f0f7ff; margin-bottom: 5px; font-size: 0.95rem;
}
.item-content {
  font-size: 0.88rem; color: #a8c0d9; line-height: 1.45;
  white-space: pre-wrap; word-break: break-word;
}

/* === CALCULATOR SECTION === */
.calc-card {
  background: rgba(18, 26, 47, 0.75);
  border: 1px solid rgba(30, 48, 78, 0.6);
  border-radius: var(--radius);
  padding: 18px;
  margin: 16px 0;
}
.calc-header {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 14px; margin-bottom: 14px;
  border-bottom: 1px solid rgba(30, 48, 78, 0.6);
}
.calc-icon {
  font-size: 1.4rem; animation: float 4s ease-in-out infinite;
}
.calc-title {
  font-weight: 700; font-size: 1.05rem; color: #f0f7ff;
}

/* === CALC ROW - BUTTON GROUPS INSTEAD OF DROPDOWNS === */
.calc-row {
  display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: end;
}
@media (min-width: 640px) {
  .calc-row { grid-template-columns: 1fr 1fr auto; }
}
.calc-field { display: flex; flex-direction: column; gap: 7px; }
.calc-field-label {
  font-size: 0.82rem; font-weight: 500; color: #a8c0d9;
}

/* === BUTTON GROUP SELECTOR === */
.btn-group {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 6px;
  background: rgba(22, 32, 58, 0.6);
  border: 1px solid rgba(30, 48, 78, 0.6);
  border-radius: 12px;
  max-height: 120px; overflow-y: auto;
}
.btn-select {
  flex: 1 1 auto; min-width: 80px;
  padding: 8px 12px;
  background: rgba(30, 48, 78, 0.5);
  border: 1px solid rgba(50, 72, 102, 0.6);
  border-radius: 9px;
  color: #a8c0d9; font-size: 0.82rem; font-weight: 500;
  cursor: pointer; transition: all var(--transition);
  text-align: center;
}
.btn-select:hover {
  background: rgba(40, 60, 90, 0.7);
  border-color: rgba(0, 212, 255, 0.4);
  color: #f0f7ff;
}
.btn-select.active {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(124, 58, 237, 0.16));
  border-color: #00d4ff; color: #f0f7ff; font-weight: 600;
  box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
}

/* === RESULT BOX === */
.result-box {
  margin-top: 16px; padding: 16px 20px;
  background: rgba(22, 32, 58, 0.7);
  border: 1.5px solid rgba(0, 212, 255, 0.3);
  border-radius: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.05rem; font-weight: 600;
  color: #00d4ff; text-align: center;
  min-height: 58px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all var(--transition);
}
.result-box:hover {
  border-color: #00d4ff;
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.35);
}
.result-box:active { animation: bounce-soft 0.3s; }
.result-box.copied {
  border-color: #22c55e;
  box-shadow: 0 0 24px rgba(34, 197, 94, 0.45);
  color: #22c55e;
}
.result-placeholder {
  color: #6b85a3; font-size: 0.92rem; font-weight: 400;
}

/* === TOAST === */
.toast {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: #0e1424; color: #f0f7ff;
  padding: 13px 26px; border-radius: 50px;
  font-weight: 500; font-size: 0.93rem;
  opacity: 0; transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 1000; box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4), 0 0 24px rgba(0, 212, 255, 0.3);
  border: 1px solid rgba(0, 212, 255, 0.4);
  display: flex; align-items: center; gap: 8px;
  backdrop-filter: blur(10px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: #22c55e; box-shadow: 0 0 24px rgba(34, 197, 94, 0.4); }
.toast.error { border-color: #ef4444; box-shadow: 0 0 24px rgba(239, 68, 68, 0.4); }

/* === SPINNER === */
.spinner {
  width: 30px; height: 30px;
  border: 2.5px solid rgba(30, 48, 78, 0.5);
  border-top-color: #00d4ff; border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === AUTO BADGE === */
.auto-badge {
  position: fixed; top: 16px; right: 16px;
  background: rgba(18, 26, 47, 0.9);
  border: 1px solid rgba(0, 212, 255, 0.4);
  border-radius: 12px; padding: 7px 14px;
  font-size: 0.78rem; color: #00d4ff;
  display: none; align-items: center; gap: 7px;
  z-index: 1000; backdrop-filter: blur(8px);
  animation: pulse-soft 1.6s infinite;
}
.auto-badge.show { display: flex; }
.auto-icon { animation: spin 1.1s linear infinite; }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(14, 20, 36, 0.4); border-radius: 3px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #00d4ff, #0099cc);
  border-radius: 3px; border: 1px solid rgba(0, 212, 255, 0.3);
}

/* === UTILS === */
.hidden { display: none !important; }
.center { display: flex; align-items: center; justify-content: center; }
.text-primary { color: #00d4ff; }
.text-muted { color: #6b85a3; }
.glow { text-shadow: 0 0 12px rgba(0, 212, 255, 0.5); }

/* === RESPONSIVE === */
@media (max-width: 640px) {
  .control-bar { flex-direction: column; align-items: stretch; }
  .control-group { justify-content: space-between; }
  .input-clean { width: 100%; }
  .btn { width: 100%; justify-content: center; }
  .calc-row { grid-template-columns: 1fr; }
  .btn-group { max-height: 100px; }
}
</style>
</head>
<body>
<div class="bg-base"></div>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div id="toast" class="toast"><span id="toastIcon">✨</span><span id="toastMsg">Berhasil!</span></div>
<div class="auto-badge" id="autoBadge"><span class="auto-icon">⟳</span><span>Auto-Sync</span></div>

<div class="container">
  <header class="header">
    <h1 class="title">⚡ PREDIKSI & HITUNG TOGEL</h1>
  </header>

  <!-- Modern Segmented Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="prediksi" onclick="switchTab('prediksi')">🔮 Prediksi</button>
    <button class="tab" data-tab="hitung" onclick="switchTab('hitung')">🧮 Hitung</button>
  </div>

  <div class="card">
    
    <!-- Tab: Prediksi -->
    <div id="tab-prediksi">
      <!-- Control Bar - Tanggal -->
      <div class="control-bar">
        <div class="control-group">
          <span class="control-label">📅</span>
          <input type="date" id="input-tanggal" class="input-clean" onchange="handleDateChange()">
        </div>
        <button class="btn" id="btn-tanggal" onclick="updateTanggal()">⚡ Update</button>
        <span class="status" id="status-tanggal">Siap</span>
      </div>

      <!-- Data Grid -->
      <div class="grid">
        <div class="section">
          <div class="section-head">
            <span class="section-title">🔮 Prediksi</span>
            <span class="badge" id="count-prediksi">0</span>
          </div>
          <div class="search"><input type="text" id="search-prediksi" placeholder="Cari..." oninput="filterData('prediksi')"></div>
          <div class="list" id="list-prediksi"><div class="center" style="padding:30px"><div class="spinner"></div></div></div>
        </div>
        <div class="section">
          <div class="section-head">
            <span class="section-title">📅 Jadwal</span>
            <span class="badge" id="count-jadwal">0</span>
          </div>
          <div class="search"><input type="text" id="search-jadwal" placeholder="Cari..." oninput="filterData('jadwal')"></div>
          <div class="list" id="list-jadwal"><div class="center" style="padding:30px"><div class="spinner"></div></div></div>
        </div>
        <div class="section">
          <div class="section-head">
            <span class="section-title">🔗 Link Live</span>
            <span class="badge" id="count-link">0</span>
          </div>
          <div class="search"><input type="text" id="search-link" placeholder="Cari..." oninput="filterData('link')"></div>
          <div class="list" id="list-link"><div class="center" style="padding:30px"><div class="spinner"></div></div></div>
        </div>
      </div>
    </div>

    <!-- Tab: Hitung -->
    <div id="tab-hitung" class="hidden">
      <!-- Control Bar - Nominal -->
      <div class="control-bar">
        <div class="control-group">
          <span class="control-label">💰</span>
          <input type="number" id="input-nominal" class="input-clean" placeholder="0" onchange="handleNominalChange()">
        </div>
        <button class="btn" id="btn-nominal" onclick="updateNominal()">⚡ Update</button>
        <span class="status" id="status-nominal">Siap</span>
      </div>

      <!-- Calculator Card - NO DROPDOWNS! -->
      <div class="calc-card">
        <div class="calc-header">
          <span class="calc-icon">🧮</span>
          <span class="calc-title">Hitung Togel</span>
        </div>
        
        <!-- Button Group Selectors (Replaces Dropdowns) -->
        <div class="calc-row">
          <div class="calc-field">
            <span class="calc-field-label">Tipe Hitungan</span>
            <div class="btn-group" id="kelompokGroup">
              <button class="btn-select" data-value="">-- Pilih --</button>
            </div>
          </div>
          <div class="calc-field">
            <span class="calc-field-label">Label</span>
            <div class="btn-group" id="labelGroup">
              <button class="btn-select" data-value="">-- Pilih --</button>
            </div>
          </div>
          <button class="btn" onclick="showResult()">🔍 Tampilkan</button>
        </div>

        <!-- Result Display -->
        <div class="result-box" id="resultBox" onclick="copyResult()">
          <span class="result-placeholder">Pilih tipe & label untuk melihat hasil</span>
        </div>
      </div>

      <!-- Hitung Data -->
      <div class="grid" id="container-hitung">
        <div class="center" style="padding:40px; grid-column:1/-1"><div class="spinner"></div></div>
      </div>
    </div>

  </div>
</div>

<script>
// Config
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4', keyNominal: 'togel_nominal_v4',
  autoDelay: 1000
};

// State
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {}, selected: { k: '', l: '' }, timers: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'), tMsg: $('toastMsg'), tIcon: $('toastIcon'),
  auto: $('autoBadge'), result: $('resultBox'),
  kGroup: $('kelompokGroup'), lGroup: $('labelGroup')
};

// Utils
function toast(msg, type = 'success') {
  dom.tIcon.textContent = { success: '✨', error: '❌', warning: '⚠️' }[type] || '✨';
  dom.tMsg.textContent = msg;
  dom.toast.className = `toast ${type} show`;
  setTimeout(() => dom.toast.classList.remove('show'), 3200);
}
function showAuto() { dom.auto.classList.add('show'); setTimeout(() => dom.auto.classList.remove('show'), 2000); }
function copy(text) {
  navigator.clipboard.writeText(decodeURIComponent(text)).then(() => {
    toast('Disalin: ' + (text.length > 25 ? text.slice(0,25)+'...' : text));
  }).catch(() => toast('Gagal menyalin', 'error'));
}
function format(n) { return n ? new Intl.NumberFormat('id-ID').format(+n) : '0'; }
function debounce(fn, wait, key) {
  return (...args) => { clearTimeout(state.timers[key]); state.timers[key] = setTimeout(() => fn(...args), wait); };
}

// CSV Parser
function parseCSV(t) {
  let r = [], row = [], cell = '', q = 0;
  for (let i = 0; i < t.length; i++) {
    const c = t[i], n = t[i+1];
    if (!q) {
      if (c === '"') q = 1;
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n' || c === '\r') { if (c === '\r' && n === '\n') i++; row.push(cell); r.push(row); row = []; cell = ''; }
      else cell += c;
    } else {
      if (c === '"' && n === '"') { cell += '"'; i++; }
      else if (c === '"') q = 0;
      else cell += c;
    }
  }
  if (cell || row.length) { row.push(cell); r.push(row); }
  return r;
}
const get = (row, i) => row?.[i]?.trim() ?? '';

// API
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) return toast('⚙️ Konfigurasi URL', 'warning'), false;
  try {
    const res = await fetch(`${SCRIPT_URL}?action=${action}&value=${encodeURIComponent(value)}`);
    return (await res.text()).toLowerCase().includes('success');
  } catch { toast('Koneksi gagal', 'error'); return false; }
}

// Fetch
async function fetchPrediksi() {
  try {
    const data = parseCSV(await (await fetch(CONFIG.sheetPrediksi + '?t=' + Date.now())).text());
    state.prediksi = state.jadwal = state.link = [];
    if (data[0]) {
      const raw = get(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          const fmt = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          if (!dom.inTgl.value) dom.inTgl.value = fmt;
          dom.statTgl.textContent = fmt;
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const t = get(data[i], 1); if (t) state.prediksi.push({ title: t.split(/[\s,]+/)[0], content: t });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const t = get(data[i], 2); if (t) state.jadwal.push({ title: t.split(/[\s,]+/)[0], content: t });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const t = get(data[i], 2); if (t) state.link.push({ title: t.split(/[\s,]+/)[0], content: t });
    }
    renderPrediksi();
  } catch { dom.listP.innerHTML = '<p class="text-muted center" style="padding:30px">❌ Gagal memuat</p>'; }
}

async function fetchHitung() {
  try {
    const data = parseCSV(await (await fetch(CONFIG.sheetHitung + '?t=' + Date.now())).text());
    if (data[0]) {
      const nom = get(data[0], 23);
      if (nom && !dom.inNom.value) { dom.inNom.value = nom; dom.statNom.textContent = '💰 Rp ' + format(nom); }
    }
    const secs = [
      { r: 0, c: 24, s: 2, e: 42 }, { r: 43, c: 24, s: 45, e: 80 }, { r: 81, c: 24, s: 83, e: 119 },
      { r: 120, c: 24, s: 122, e: 153 }, { r: 154, c: 24, s: 156, e: 179 }, { r: 180, c: 24, s: 182, e: 213 },
      { r: 215, c: 24, s: 217, e: 248 }, { r: 249, c: 24, s: 251, e: 282 }, { r: 283, c: 24, s: 285, e: 316 }
    ];
    state.hitung = secs.map(x => {
      const title = get(data[x.r], x.c) || 'Pasaran';
      const items = [];
      for (let i = x.s; i <= x.e && i < data.length; i++) {
        const type = get(data[i], 23), val = get(data[i], 24);
        if (type || val) items.push({ type: type || '-', res: val || '-' });
      }
      return { title, items };
    }).filter(x => x.items.length);
    renderHitung();
  } catch { dom.contH.innerHTML = '<p class="text-muted center" style="padding:40px">❌ Gagal memuat</p>'; }
}

// Render
function renderList(el, items, search, label) {
  const f = items.filter(i => (i.content + i.title).toLowerCase().includes(search.toLowerCase()));
  el.innerHTML = f.length ? f.map((v, idx) => `
    <div class="item" style="animation-delay:${idx*0.03}s" onclick="copy('${encodeURIComponent(v.content)}')">
      <div class="item-label">${label}</div>
      <div class="item-title">${v.title}</div>
      <div class="item-label">Klik untuk salin</div>
      <div class="item-content">${v.content}</div>
    </div>
  `).join('') : `<p class="text-muted center" style="padding:28px">📭 Tidak ada data</p>`;
}
function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value, 'PREDIKSI');
  renderList(dom.listJ, state.jadwal, dom.srcJ.value, 'JADWAL');
  renderList(dom.listL, state.link, dom.srcL.value, 'LINK');
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}
function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<p class="text-muted center" style="padding:40px">📭 Tidak ada data</p>'; return; }
  dom.contH.innerHTML = state.hitung.map((s, idx) => `
    <div class="section" style="animation-delay:${idx*0.04}s">
      <div class="section-head"><span class="section-title">🎯 ${s.title}</span></div>
      <div class="list">
        ${s.items.map(it => `
          <div class="item" onclick="copy('${encodeURIComponent(it.res)}')">
            <div class="item-label">Type</div>
            <div class="item-title">${it.type}</div>
            <div class="item-label">Result</div>
            <div class="item-content" style="color:#00d4ff;font-weight:600">${it.res}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// Calculator Logic - Button Groups Instead of Dropdowns
let kelompokData = {};
async function loadCalculator() {
  try {
    const data = parseCSV(await (await fetch(CONFIG.sheetHitung + '?t=' + Date.now())).text());
    if (data[0]) {
      const nom = get(data[0], 23);
      if (nom && !dom.inNom.value) { dom.inNom.value = nom; dom.statNom.textContent = '💰 Rp ' + format(nom); }
    }
    const defs = [
      { r: 0, c: 24, s: 2, e: 42, t: '🎰 Semua Pasaran' },
      { r: 43, c: 24, s: 45, e: 80, t: '🇲🇴 Macau 4D' },
      { r: 81, c: 24, s: 83, e: 119, t: '🇲🇴 Macau 5D' },
      { r: 120, c: 24, s: 122, e: 153, t: '🦍 Kingkong' },
      { r: 154, c: 24, s: 156, e: 179, t: '🎁 Bonus' },
      { r: 180, c: 24, s: 182, e: 213, t: '🇮🇩 Jakarta' },
      { r: 215, c: 24, s: 217, e: 248, t: '🌊 TotoMali' },
      { r: 249, c: 24, s: 251, e: 282, t: '🎯 HokiDraw' },
      { r: 283, c: 24, s: 285, e: 316, t: '🇦🇺 Sydney & 🇭🇰 HK' }
    ];
    kelompokData = {};
    dom.kGroup.innerHTML = '<button class="btn-select active" data-value="">-- Pilih Tipe --</button>';
    
    defs.forEach(d => {
      const items = [];
      for (let i = d.s; i <= d.e && i < data.length; i++) {
        const lbl = get(data[i], 23), val = get(data[i], 24);
        if (lbl || val) items.push({ label: lbl || '-', value: val || '-' });
      }
      if (items.length) {
        kelompokData[d.t] = items;
        const btn = document.createElement('button');
        btn.className = 'btn-select';
        btn.dataset.value = d.t;
        btn.textContent = d.t;
        btn.onclick = () => selectKelompok(d.t);
        dom.kGroup.appendChild(btn);
      }
    });
  } catch (e) { console.error(e); }
}

function selectKelompok(val) {
  state.selected.k = val; state.selected.l = '';
  [...dom.kGroup.querySelectorAll('.btn-select')].forEach(b => b.classList.toggle('active', b.dataset.value === val));
  // Render label buttons
  dom.lGroup.innerHTML = '<button class="btn-select active" data-value="">-- Pilih Label --</button>';
  if (val && kelompokData[val]) {
    kelompokData[val].forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'btn-select';
      btn.dataset.value = item.label;
      btn.textContent = item.label.length > 18 ? item.label.slice(0,18)+'…' : item.label;
      btn.onclick = () => selectLabel(item.label);
      dom.lGroup.appendChild(btn);
    });
  }
  dom.result.innerHTML = '<span class="result-placeholder">Pilih label untuk melihat hasil</span>';
}

function selectLabel(val) {
  state.selected.l = val;
  [...dom.lGroup.querySelectorAll('.btn-select')].forEach(b => b.classList.toggle('active', b.dataset.value === val));
  showResult();
}

function showResult() {
  const { k, l } = state.selected;
  if (!k || !l || !kelompokData[k]) {
    dom.result.innerHTML = '<span class="result-placeholder">Pilih tipe & label dulu</span>';
    return;
  }
  const item = kelompokData[k].find(i => i.label === l);
  if (item) {
    dom.result.innerHTML = `<span class="glow">${item.value}</span>`;
  }
}

function copyResult() {
  const text = dom.result.textContent.trim();
  if (text && !text.includes('Pilih')) {
    copy(encodeURIComponent(text));
    dom.result.classList.add('copied');
    setTimeout(() => dom.result.classList.remove('copied'), 400);
  }
}

// Auto-update handlers
function handleDateChange() { showAuto(); debounce(updateTanggal, CONFIG.autoDelay, 'tgl')(true); }
function handleNominalChange() { showAuto(); debounce(updateNominal, CONFIG.autoDelay, 'nom')(true); }

async function updateTanggal(auto = false) {
  if (!dom.inTgl.value) return toast('⚠️ Pilih tanggal', 'warning');
  const [y, m, d] = dom.inTgl.value.split('-');
  const fmt = `${m}/${d}/${y}`;
  dom.btnTgl.disabled = true;
  dom.statTgl.textContent = auto ? '🔄 Sync...' : '⏳ Menyimpan...';
  try {
    const ok = await updateSheet('updateTanggal', fmt);
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = '✅ ' + dom.inTgl.value;
      toast(auto ? '🔄 Tanggal diperbarui' : '📅 Tersimpan');
      await Promise.all([fetchPrediksi(), fetchHitung(), loadCalculator()]);
    } else { dom.statTgl.textContent = '❌ Gagal'; toast('Gagal update', 'error'); }
  } catch { dom.btnTgl.disabled = false; dom.statTgl.textContent = '❌ Error'; }
}

async function updateNominal(auto = false) {
  if (!dom.inNom.value || +dom.inNom.value <= 0) return toast('⚠️ Nominal tidak valid', 'warning');
  dom.btnNom.disabled = true;
  dom.statNom.textContent = auto ? '🔄 Sync...' : '⏳ Menyimpan...';
  try {
    const ok = await updateSheet('updateNominal', dom.inNom.value);
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = '💰 Rp ' + format(dom.inNom.value);
      toast(auto ? '🔄 Nominal diperbarui' : '💰 Tersimpan');
      await Promise.all([fetchPrediksi(), fetchHitung(), loadCalculator()]);
    } else { dom.statNom.textContent = '❌ Gagal'; toast('Gagal update', 'error'); }
  } catch { dom.btnNom.disabled = false; dom.statNom.textContent = '❌ Error'; }
}

// Tab switch
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  const isP = tab === 'prediksi';
  dom.tabP.classList.toggle('hidden', !isP);
  dom.tabH.classList.toggle('hidden', isP);
  toast(`Tab ${tab.toUpperCase()} aktif`, 'info');
}

// Search filter
function filterData(type) {
  const map = {
    prediksi: { el: dom.listP, data: state.prediksi, input: dom.srcP, label: 'PREDIKSI' },
    jadwal: { el: dom.listJ, data: state.jadwal, input: dom.srcJ, label: 'JADWAL' },
    link: { el: dom.listL, data: state.link, input: dom.srcL, label: 'LINK' }
  };
  const cfg = map[type];
  if (cfg) renderList(cfg.el, cfg.data, cfg.input.value, cfg.label);
}

// Init
async function init() {
  // Load saved
  const tgl = localStorage.getItem(CONFIG.keyTanggal);
  const nom = localStorage.getItem(CONFIG.keyNominal);
  if (tgl) { dom.inTgl.value = tgl; dom.statTgl.textContent = tgl; }
  if (nom) { dom.inNom.value = nom; dom.statNom.textContent = '💰 Rp ' + format(nom); }
  
  // Fetch data
  await Promise.all([fetchPrediksi(), fetchHitung(), loadCalculator()]);
  
  // Search listeners
  dom.srcP.oninput = () => filterData('prediksi');
  dom.srcJ.oninput = () => filterData('jadwal');
  dom.srcL.oninput = () => filterData('link');
  
  // Welcome
  setTimeout(() => toast('🚀 Selamat bekerja, SUHAN!'), 800);
}

document.addEventListener('DOMContentLoaded', init);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === '1') { e.preventDefault(); switchTab('prediksi'); }
  if (e.ctrlKey && e.key === '2') { e.preventDefault(); switchTab('hitung'); }
  if (e.key === 'Escape') document.querySelectorAll('input').forEach(i => i.blur());
});

// Auto refresh on visibility
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) { showAuto(); setTimeout(() => { fetchPrediksi(); fetchHitung(); }, 500); }
});
setInterval(() => { if (document.visibilityState === 'visible') { showAuto(); fetchPrediksi(); fetchHitung(); } }, 5*60*1000);
</script>
</body>
</html>

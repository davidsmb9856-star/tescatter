<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDIKSI DAN HITUNG TOGEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #000408;
            --bg-panel: #050d18;
            --bg-card: #091a2d;
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --text-main: #e0f4ff;
            --text-muted: #5a8cb0;
            --border: #153a5c;
            --success: #00ff9d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(circle at 50% 0%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(0, 100, 200, 0.05) 0%, transparent 40%);
        }
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(0, 229, 255, 0.02) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 229, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        }

        /* Main Layout */
        .container { position: relative; z-index: 10; max-width: 1300px; margin: 0 auto; padding: 1rem; }
        
        /* Header */
        .header {
            text-align: center;
            padding: 2rem 0 1.5rem;
        }
        .title-main {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: clamp(1.8rem, 6vw, 3rem);
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--accent), 0 0 30px var(--accent-glow);
            margin: 0;
        }

        /* Tabs */
        .tabs-nav {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 1px;
        }
        .tab-item {
            font-family: 'Orbitron', sans-serif;
            padding: 12px 30px;
            background: rgba(5, 13, 24, 0.6);
            border: 1px solid transparent;
            border-bottom: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s;
            border-radius: 10px 10px 0 0;
            position: relative;
            z-index: 1;
        }
        .tab-item.active {
            color: var(--accent);
            background: var(--bg-panel);
            border-color: var(--accent);
            z-index: 2;
        }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; width: 100%; height: 3px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        /* Content Box */
        .content-wrapper {
            background: linear-gradient(180deg, var(--bg-panel) 0%, rgba(5,13,24,0.8) 100%);
            border: 1px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 0 0 16px 16px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Control Bar (Compact) */
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(21, 58, 92, 0.5);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }
        .ctrl-group { display: flex; align-items: center; gap: 8px; }
        .ctrl-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
        
        .input-sm {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            width: 100px;
            font-size: 0.9rem;
        }
        .input-sm:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

        .btn-action {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 6px 14px;
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn-action:hover { box-shadow: 0 0 15px var(--accent-glow); transform: translateY(-1px); }
        .btn-action:active { transform: scale(0.96); }
        
        .status-badge { font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; background: rgba(0, 229, 255, 0.1); color: var(--accent); margin-left: 5px; }

        /* Grid Layouts */
        .grid-prediksi {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        /* Card Style */
        .card {
            background: rgba(9, 26, 45, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }
        .card:hover { border-color: rgba(0, 229, 255, 0.4); }
        
        .card-head {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.05), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-title { font-family: 'Orbitron', sans-serif; color: var(--accent); font-size: 0.9rem; font-weight: 700; }
        .badge { font-size: 0.65rem; background: rgba(0, 229, 255, 0.1); color: var(--accent); padding: 2px 8px; border-radius: 10px; border: 1px solid rgba(0, 229, 255, 0.3); }
        
        .search-box { padding: 10px; border-bottom: 1px solid var(--border); }
        .search-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(21, 58, 92, 0.5); border-radius: 6px; padding: 8px 12px; color: var(--text-main); font-size: 0.85rem; }
        .search-input:focus { outline: none; border-color: var(--accent); }
        
        .card-body { padding: 12px; overflow-y: auto; flex-grow: 1; max-height: 400px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

        /* Item List Style */
        .item-row {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(21, 58, 92, 0.3);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .item-row:hover { border-color: var(--accent); background: rgba(0, 229, 255, 0.03); transform: translateX(3px); }
        
        .row-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 2px; }
        .row-title { color: var(--accent); font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; display: block; }
        .row-cont { font-size: 0.8rem; color: var(--text-main); opacity: 0.9; word-break: break-all; line-height: 1.4; }

        /* HITUNG TOGEL - PREMIUM STYLE */
        .hitung-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .hitung-card {
            background: linear-gradient(145deg, rgba(9, 26, 45, 0.6) 0%, rgba(5, 15, 30, 0.6) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s;
        }
        .hitung-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); }

        .hitung-head {
            padding: 14px 18px;
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.1) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        .hitung-head::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent);
            box-shadow: 2px 0 10px var(--accent-glow);
        }
        .hitung-title { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: #fff; text-shadow: 0 0 5px var(--accent-glow); letter-spacing: 1px; }

        .hitung-body { padding: 10px; max-height: 300px; overflow-y: auto; }

        .bet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(0,0,0,0.15);
            border: 1px solid transparent;
            border-radius: 6px;
            margin-bottom: 5px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .bet-row:hover {
            background: rgba(0, 229, 255, 0.05);
            border-color: rgba(0, 229, 255, 0.2);
        }
        .bet-type { font-size: 0.85rem; color: var(--text-main); }
        .bet-val {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--accent);
            background: rgba(0, 229, 255, 0.1);
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(50px);
            background: var(--accent);
            color: #000;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 700;
            opacity: 0;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
            box-shadow: 0 5px 20px var(--accent-glow);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Spinner */
        .loader { width: 30px; height: 30px; border: 3px solid rgba(0,0,0,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .control-bar { flex-direction: column; align-items: stretch; }
            .ctrl-group { justify-content: space-between; }
            .input-sm { width: 100%; }
        }
    </style>
</head>
<body>

<div class="ambient-bg"><div class="grid-overlay"></div></div>
<div id="toast" class="toast">Updated!</div>

<div class="container">
    <header class="header">
        <h1 class="title-main">Prediksi & Hitung Togel</h1>
    </header>

    <nav class="tabs-nav">
        <div class="tab-item active" data-tab="prediksi">PREDIKSI TOGEL</div>
        <div class="tab-item" data-tab="hitung">HITUNG TOGEL</div>
    </nav>

    <div class="content-wrapper">
        <!-- TAB PREDIKSI -->
        <div id="tab-prediksi" class="tab-content">
            <div class="control-bar">
                <div class="ctrl-group">
                    <span class="ctrl-label">Tanggal (B1)</span>
                    <input type="date" id="input-tgl" class="input-sm">
                </div>
                <div class="ctrl-group">
                    <button class="btn-action" id="btn-upd-tgl">UPDATE</button>
                    <span class="status-badge" id="stat-tgl">Siap</span>
                </div>
            </div>

            <div class="grid-prediksi">
                <!-- Prediksi Togel -->
                <div class="card">
                    <div class="card-head">
                        <div class="card-title">PREDIKSI TOGEL</div>
                        <div class="badge" id="cnt-p">0</div>
                    </div>
                    <div class="search-box"><input type="text" class="search-input" id="src-p" placeholder="Cari..."></div>
                    <div class="card-body" id="list-p"><div style="display:flex;justify-content:center;padding:20px;"><div class="loader"></div></div></div>
                </div>

                <!-- Jadwal Pasaran -->
                <div class="card">
                    <div class="card-head">
                        <div class="card-title">JADWAL PASARAN</div>
                        <div class="badge" id="cnt-j">0</div>
                    </div>
                    <div class="search-box"><input type="text" class="search-input" id="src-j" placeholder="Cari..."></div>
                    <div class="card-body" id="list-j"><div style="display:flex;justify-content:center;padding:20px;"><div class="loader"></div></div></div>
                </div>

                <!-- Link Live -->
                <div class="card">
                    <div class="card-head">
                        <div class="card-title">LINK LIVE</div>
                        <div class="badge" id="cnt-l">0</div>
                    </div>
                    <div class="search-box"><input type="text" class="search-input" id="src-l" placeholder="Cari..."></div>
                    <div class="card-body" id="list-l"><div style="display:flex;justify-content:center;padding:20px;"><div class="loader"></div></div></div>
                </div>
            </div>
        </div>

        <!-- TAB HITUNG -->
        <div id="tab-hitung" class="tab-content" style="display:none;">
            <div class="control-bar">
                <div class="ctrl-group">
                    <span class="ctrl-label">Nominal (X1)</span>
                    <input type="number" id="input-nom" class="input-sm" placeholder="0">
                </div>
                <div class="ctrl-group">
                    <button class="btn-action" id="btn-upd-nom">UPDATE</button>
                    <span class="status-badge" id="stat-nom">Siap</span>
                </div>
            </div>
            <div class="hitung-grid" id="box-hitung"><div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="loader"></div></div></div>
        </div>
    </div>
</div>

<script>
    // ================= KONFIGURASI =================
    // PENTING: Ganti URL ini dengan URL Web App Google Apps Script Anda
    const API_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL"; 
    
    const SHEET_PREDIKSI = 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622';
    const SHEET_HITUNG = 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810';
    
    // ================= STATE & DOM =================
    const $ = id => document.getElementById(id);
    const store = { p: [], j: [], l: [], h: [] };

    // ================= UTILITIES =================
    function toast(msg) {
        const t = $('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function copyText(txt) {
        let str = txt;
        try { str = decodeURIComponent(txt); } catch(e) {}
        const ta = document.createElement('textarea');
        ta.value = str;
        ta.style.position = 'absolute';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast('Disalin: ' + str.substring(0,15) + '...');
    }

    // ================= CORE LOGIC =================
    function parseCSV(text) {
        let p = [], row = [], entry = "", state = 0;
        for (let i = 0; i < text.length; i++) {
            const char = text[i], next = text[i+1];
            if (state === 0) {
                if (char === '"') state = 1;
                else if (char === ',') { row.push(entry); entry = ""; }
                else if (char === '\r' && next === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
                else if (char === '\n' || char === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
                else entry += char;
            } else {
                if (char === '"' && next === '"') { entry += '"'; i++; }
                else if (char === '"') state = 0;
                else entry += char;
            }
        }
        if (entry.length > 0 || row.length > 0) { row.push(entry); p.push(row); }
        return p;
    }

    function get(row, idx) { return row && row[idx] !== undefined ? row[idx].trim() : ""; }

    // Fetch & Render Prediksi
    async function loadPrediksi() {
        try {
            const res = await fetch(SHEET_PREDIKSI + '&t=' + new Date().getTime());
            const data = parseCSV(await res.text());

            store.p = []; store.j = []; store.l = [];

            // B1 Date
            const raw = get(data[0], 1);
            if(raw) {
                const d = raw.split('/');
                if(d.length === 3) $('input-tgl').value = `${d[2]}-${d[0].padStart(2,'0')}-${d[1].padStart(2,'0')}`;
            }

            // Data
            for (let i = 2; i <= 84 && i < data.length; i++) { const t = get(data[i], 1); if(t) store.p.push({ t: t.split(/[\s,]+/)[0], c: t }); }
            for (let i = 2; i <= 55 && i < data.length; i++) { const t = get(data[i], 2); if(t) store.j.push({ t: t.split(/[\s,]+/)[0], c: t }); }
            for (let i = 56; i <= 82 && i < data.length; i++) { const t = get(data[i], 2); if(t) store.l.push({ t: t.split(/[\s,]+/)[0], c: t }); }

            renderList('p');
            renderList('j');
            renderList('l');
        } catch(e) { console.error(e); }
    }

    // Fetch & Render Hitung
    async function loadHitung() {
        try {
            const res = await fetch(SHEET_HITUNG + '&t=' + new Date().getTime());
            const data = parseCSV(await res.text());

            // X1 Nominal
            const nom = get(data[0], 23);
            if(nom) $('input-nom').value = nom;

            // Sections
            const secDef = [
                { tr: 0, tc: 24, sr: 2, er: 42 }, { tr: 43, tc: 24, sr: 45, er: 80 },
                { tr: 81, tc: 24, sr: 83, er: 119 }, { tr: 120, tc: 24, sr: 122, er: 153 },
                { tr: 154, tc: 24, sr: 156, er: 179 }, { tr: 180, tc: 24, sr: 182, er: 213 },
                { tr: 215, tc: 24, sr: 217, er: 248 }, { tr: 249, tc: 24, sr: 251, er: 282 },
                { tr: 283, tc: 24, sr: 285, er: 316 }
            ];

            store.h = secDef.map(s => {
                const title = get(data[s.tr], s.tc) || "PASARAN";
                const items = [];
                for (let i = s.sr; i <= s.er && i < data.length; i++) {
                    const type = get(data[i], 23);
                    const val = get(data[i], 24);
                    if (type || val) items.push({ type, val });
                }
                return { title, items };
            }).filter(s => s.items.length > 0);

            renderHitung();
        } catch(e) { console.error(e); }
    }

    // Rendering Functions
    function renderList(type) {
        const srcVal = $('src-'+type).value.toLowerCase();
        const list = store[type].filter(i => i.c.toLowerCase().includes(srcVal) || i.t.toLowerCase().includes(srcVal));
        const container = $('list-'+type);
        $('cnt-'+type).textContent = list.length;

        if(!list.length) { container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:10px;">Tidak ada data</p>'; return; }

        container.innerHTML = list.map(i => `
            <div class="item-row" onclick="copyText('${encodeURIComponent(i.c)}')">
                <span class="row-label">Judul</span>
                <span class="row-title">${i.t}</span>
                <span class="row-label">Isi (Klik Copy)</span>
                <div class="row-cont">${i.c}</div>
            </div>
        `).join('');
    }

    function renderHitung() {
        if(!store.h.length) return;
        $('box-hitung').innerHTML = store.h.map(s => `
            <div class="hitung-card">
                <div class="hitung-head"><div class="hitung-title">${s.title}</div></div>
                <div class="hitung-body">
                    ${s.items.map(i => `
                        <div class="bet-row" onclick="copyText('${encodeURIComponent(i.val)}')">
                            <span class="bet-type">${i.type}</span>
                            <span class="bet-val">${i.val}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    // Update Logic
    async function updateSheet(action, value, statusId, inputId) {
        if(API_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL") {
            toast("Error: Setup Google Apps Script dulu!");
            return;
        }
        
        const stat = $(statusId);
        stat.textContent = "Proses...";
        stat.style.color = "#ffaa00";

        try {
            const url = `${API_URL}?action=${action}&value=${encodeURIComponent(value)}`;
            // No-cors mode tidak bisa baca response, jadi kita pakai mode biasa tapi butuh izin CORS di script (sudah di setup otomatis)
            await fetch(url); 
            stat.textContent = "Updated!";
            stat.style.color = "var(--success)";
            toast("Data berhasil diupdate!");
            
            // Refresh data setelah 1 detik
            setTimeout(() => {
                if(action === 'updateTanggal') loadPrediksi();
                if(action === 'updateNominal') loadHitung();
            }, 1000);

        } catch(e) {
            console.error(e);
            stat.textContent = "Error";
            stat.style.color = "#ff4444";
            toast("Gagal update. Cek console.");
        }
    }

    // ================= EVENTS =================
    document.addEventListener('DOMContentLoaded', () => {
        // Tabs
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.onclick = function() {
                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                $('tab-prediksi').style.display = this.dataset.tab === 'prediksi' ? 'block' : 'none';
                $('tab-hitung').style.display = this.dataset.tab === 'hitung' ? 'block' : 'none';
            };
        });

        // Search
        $('src-p').oninput = () => renderList('p');
        $('src-j').oninput = () => renderList('j');
        $('src-l').oninput = () => renderList('l');

        // Buttons
        $('btn-upd-tgl').onclick = () => {
            const v = $('input-tgl').value;
            if(!v) return toast("Pilih tanggal");
            const p = v.split('-');
            const str = `${p[1]}/${p[2]}/${p[0]}`; // Format MM/DD/YYYY
            updateSheet('updateTanggal', str, 'stat-tgl');
        };

        $('btn-upd-nom').onclick = () => {
            const v = $('input-nom').value;
            if(!v) return toast("Isi nominal");
            updateSheet('updateNominal', v, 'stat-nom');
        };

        // Initial Load
        loadPrediksi();
        loadHitung();
    });
</script>
</body>
</html>

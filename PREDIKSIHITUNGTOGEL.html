<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDIKSI DAN HITUNG TOGEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #020a14;
            --bg-card: #061a2e;
            --fg: #e0f4ff;
            --muted: #5a8cb0;
            --accent: #00e5ff;
            --accent-dim: #0099cc;
            --border: #0a4d75;
            --success: #00ff88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Cyberpunk Background */
        .bg-cyber {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: 
                radial-gradient(circle at 15% 15%, rgba(0, 229, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(0, 100, 200, 0.05) 0%, transparent 40%);
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1;
        }

        .main-container { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header-section { text-align: center; padding: 20px 0 30px; position: relative; }
        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 5vw, 2.8rem);
            font-weight: 900;
            letter-spacing: 2px;
            color: white;
            text-shadow: 0 0 10px var(--accent), 0 0 20px rgba(0,229,255,0.5);
            margin-bottom: 5px;
        }

        /* Tabs */
        .tabs-container { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            padding: 10px 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--muted);
            background: rgba(6, 26, 46, 0.6);
            border: 1px solid var(--border);
            border-bottom: none;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 8px 8px 0 0;
            text-transform: uppercase;
        }
        .tab-btn.active {
            color: var(--accent);
            background: var(--bg-card);
            border-color: var(--accent);
            box-shadow: 0 -5px 15px rgba(0, 229, 255, 0.1);
        }

        /* Content */
        .content-box {
            background: rgba(6, 26, 46, 0.7);
            border: 1px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 0 0 15px 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        /* Control Panel - COMPACT */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 20px;
        }

        .control-group { display: flex; align-items: center; gap: 8px; }
        
        .label-text {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-mini {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border);
            color: var(--fg);
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            width: 120px; /* Ukuran diperkecil */
            font-family: 'Orbitron', sans-serif;
        }
        .input-mini:focus { outline: none; border-color: var(--accent); }

        .btn-mini {
            padding: 6px 12px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-mini:hover { box-shadow: 0 0 15px var(--accent); transform: translateY(-1px); }
        
        .btn-refresh {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        .btn-refresh:hover { background: rgba(0, 229, 255, 0.1); }

        /* Grid Layout */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        /* Card Style */
        .card-box {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .card-header {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.05), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--accent); font-weight: 700; }
        .badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; border: 1px solid rgba(0,229,255,0.3); color: var(--accent); background: rgba(0,229,255,0.1); }
        
        .search-wrap { padding: 8px; border-bottom: 1px solid rgba(10, 77, 117, 0.3); }
        .search-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 4px; padding: 6px; color: var(--fg); font-size: 0.8rem; }
        .search-input:focus { outline: none; border-color: var(--accent); }
        
        .card-content { padding: 10px; overflow-y: auto; flex-grow: 1; max-height: 400px; }

        /* Items */
        .item-row {
            background: rgba(0, 10, 20, 0.5);
            border: 1px solid rgba(10, 77, 117, 0.3);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .item-row:hover { border-color: var(--accent); transform: translateX(3px); }
        .item-row:active { background: rgba(0, 229, 255, 0.1); }
        
        .row-head { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .row-label { font-size: 0.65rem; color: var(--muted); }
        .row-title { font-size: 0.85rem; color: var(--accent); font-weight: 600; }
        .row-body { font-size: 0.75rem; color: var(--fg); white-space: pre-wrap; word-break: break-all; line-height: 1.3; }

        /* Pasaran Box */
        .pasaran-box { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: rgba(0,0,0,0.2); }
        .pasaran-head { background: rgba(0, 229, 255, 0.05); padding: 8px 12px; border-bottom: 1px solid var(--border); }
        .pasaran-title { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--accent); }
        .pasaran-body { padding: 8px; max-height: 250px; overflow-y: auto; }
        
        .bet-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 8px; margin-bottom: 4px;
            background: rgba(0,0,0,0.3); border-radius: 4px; cursor: pointer; font-size: 0.75rem;
            border: 1px solid transparent;
        }
        .bet-row:hover { border-color: var(--accent); }
        .bet-type { flex: 1; color: var(--fg); }
        .bet-val { font-family: 'Orbitron'; color: var(--accent); font-weight: 600; background: rgba(0,229,255,0.1); padding: 2px 6px; border-radius: 3px; }

        /* Toast */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(50px);
            background: var(--accent); color: var(--bg); padding: 10px 20px; border-radius: 30px;
            font-weight: 600; font-size: 0.85rem; opacity: 0; transition: 0.3s; z-index: 1000;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Loading */
        .sk-folding-cube { margin: 20px auto; width: 30px; height: 30px; position: relative; transform: rotateZ(45deg); }
        .sk-cube { float: left; width: 50%; height: 50%; position: relative; transform: scale(1.1); }
        .sk-cube:before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--accent); animation: sk-foldCubeAngle 2.4s infinite linear both; transform-origin: 100% 100%; }
        .sk-cube2:before { animation-delay: 0.3s; }
        .sk-cube3:before { animation-delay: 0.6s; }
        .sk-cube4:before { animation-delay: 0.9s; }
        @keyframes sk-foldCubeAngle { 0%, 10% { transform: perspective(140px) rotateX(-180deg); opacity: 0; } 25%, 75% { transform: perspective(140px) rotateX(0deg); opacity: 1; } 90%, 100% { transform: perspective(140px) rotateY(180deg); opacity: 0; } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        @media (max-width: 768px) {
            .control-panel { flex-direction: column; align-items: stretch; }
            .control-group { width: 100%; justify-content: space-between; }
            .input-mini { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="bg-cyber">
        <div class="scan-line"></div>
    </div>

    <div id="toast" class="toast">Berhasil!</div>

    <div class="main-container">
        <header class="header-section">
            <h1 class="main-title">PREDIKSI DAN HITUNG TOGEL</h1>
        </header>

        <nav class="tabs-container">
            <button class="tab-btn active" data-tab="prediksi">PREDIKSI TOGEL</button>
            <button class="tab-btn" data-tab="hitung">HITUNG TOGEL</button>
        </nav>

        <div class="content-box">
            <!-- TAB PREDIKSI -->
            <div id="tab-prediksi" class="tab-content">
                <div class="control-panel">
                    <div class="control-group">
                        <span class="label-text">Tanggal (B1)</span>
                        <input type="date" id="input-tanggal" class="input-mini">
                    </div>
                    <div class="control-group">
                        <button class="btn-mini" id="btn-save-tgl">SIMPAN & COPY</button>
                        <button class="btn-mini btn-refresh" onclick="fetchPrediksi()">REFRESH DATA</button>
                    </div>
                </div>

                <div class="data-grid">
                    <div class="card-box">
                        <div class="card-header">
                            <span class="card-title">PREDIKSI TOGEL</span>
                            <span class="badge" id="cnt-p">0</span>
                        </div>
                        <div class="search-wrap"><input type="text" class="search-input" id="src-p" placeholder="Cari..."></div>
                        <div class="card-content" id="list-p"><div class="sk-folding-cube"><div class="sk-cube1 sk-cube"></div><div class="sk-cube2 sk-cube"></div><div class="sk-cube4 sk-cube"></div><div class="sk-cube3 sk-cube"></div></div></div>
                    </div>

                    <div class="card-box">
                        <div class="card-header">
                            <span class="card-title">JADWAL PASARAN</span>
                            <span class="badge" id="cnt-j">0</span>
                        </div>
                        <div class="search-wrap"><input type="text" class="search-input" id="src-j" placeholder="Cari..."></div>
                        <div class="card-content" id="list-j"><div class="sk-folding-cube"><div class="sk-cube1 sk-cube"></div><div class="sk-cube2 sk-cube"></div><div class="sk-cube4 sk-cube"></div><div class="sk-cube3 sk-cube"></div></div></div>
                    </div>

                    <div class="card-box">
                        <div class="card-header">
                            <span class="card-title">LINK LIVE</span>
                            <span class="badge" id="cnt-l">0</span>
                        </div>
                        <div class="search-wrap"><input type="text" class="search-input" id="src-l" placeholder="Cari..."></div>
                        <div class="card-content" id="list-l"><div class="sk-folding-cube"><div class="sk-cube1 sk-cube"></div><div class="sk-cube2 sk-cube"></div><div class="sk-cube4 sk-cube"></div><div class="sk-cube3 sk-cube"></div></div></div>
                    </div>
                </div>
            </div>

            <!-- TAB HITUNG -->
            <div id="tab-hitung" class="tab-content" style="display:none;">
                <div class="control-panel">
                    <div class="control-group">
                        <span class="label-text">Nominal (X1)</span>
                        <input type="number" id="input-nominal" class="input-mini" placeholder="Nominal">
                    </div>
                    <div class="control-group">
                        <button class="btn-mini" id="btn-save-nom">SIMPAN & COPY</button>
                        <button class="btn-mini btn-refresh" onclick="fetchHitung()">REFRESH DATA</button>
                    </div>
                </div>
                <div class="data-grid" id="container-hitung"><div class="sk-folding-cube"><div class="sk-cube1 sk-cube"></div><div class="sk-cube2 sk-cube"></div><div class="sk-cube4 sk-cube"></div><div class="sk-cube3 sk-cube"></div></div></div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            // Tambahkan t='timestamp' untuk mencegah cache browser
            prediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
            hitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810',
            keyT: 'tgl_v5', keyN: 'nom_v5'
        };

        const $ = id => document.getElementById(id);
        
        const store = {
            p: [], j: [], l: [], h: []
        };

        // TOAST
        function toast(msg) {
            const t = $('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // COPY
        function copy(txt) {
            let str = txt;
            try { str = decodeURIComponent(txt); } catch(e) {}
            
            // Buat textarea sementara
            const ta = document.createElement('textarea');
            ta.value = str;
            ta.style.position = 'absolute';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            
            toast('Disalin: ' + str.substring(0,15) + '...');
        }

        // PARSER CSV ROBUST
        function parseCSV(text) {
            let p = [], row = [], entry = "", state = 0;
            for (let i = 0; i < text.length; i++) {
                const char = text[i], next = text[i+1];
                if (state === 0) { // Unquoted
                    if (char === '"') state = 1;
                    else if (char === ',') { row.push(entry); entry = ""; }
                    else if (char === '\r' && next === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
                    else if (char === '\n' || char === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
                    else entry += char;
                } else { // Quoted
                    if (char === '"' && next === '"') { entry += '"'; i++; }
                    else if (char === '"') state = 0;
                    else entry += char;
                }
            }
            if (entry.length > 0 || row.length > 0) { row.push(entry); p.push(row); }
            return p;
        }

        function get(row, idx) { return row && row[idx] !== undefined ? row[idx].trim() : ""; }

        // FETCHER
        async function fetchPrediksi() {
            try {
                $('list-p').innerHTML = $('list-j').innerHTML = $('list-l').innerHTML = '<div style="text-align:center;padding:20px;color:var(--accent);">Memuat Data...</div>';
                
                // Fetch with cache bust
                const res = await fetch(CONFIG.prediksi + '&t=' + new Date().getTime());
                const data = parseCSV(await res.text());

                store.p = [];
                store.j = [];
                store.l = [];

                // B1 Tanggal
                const rawDate = get(data[0], 1);
                if(rawDate) {
                    // Parse MM/DD/YYYY -> YYYY-MM-DD
                    const d = rawDate.split('/');
                    if(d.length === 3) $('input-tanggal').value = `${d[2]}-${d[0].padStart(2,'0')}-${d[1].padStart(2,'0')}`;
                }

                // Data Ranges
                for (let i = 2; i <= 84 && i < data.length; i++) { const t = get(data[i], 1); if(t) store.p.push({ t: t.split(/[\s,]+/)[0], c: t }); }
                for (let i = 2; i <= 55 && i < data.length; i++) { const t = get(data[i], 2); if(t) store.j.push({ t: t.split(/[\s,]+/)[0], c: t }); }
                for (let i = 56; i <= 82 && i < data.length; i++) { const t = get(data[i], 2); if(t) store.l.push({ t: t.split(/[\s,]+/)[0], c: t }); }

                render('p');
                render('j');
                render('l');
            } catch (e) { console.error(e); $('list-p').innerHTML = '<p style="color:red;text-align:center;">Error memuat data</p>'; }
        }

        async function fetchHitung() {
            try {
                $('container-hitung').innerHTML = '<div style="text-align:center;padding:20px;color:var(--accent);">Memuat Data...</div>';
                const res = await fetch(CONFIG.hitung + '&t=' + new Date().getTime());
                const data = parseCSV(await res.text());

                // X1 Nominal
                const nom = get(data[0], 23);
                if(nom) $('input-nominal').value = nom;

                // Sections
                const secDef = [
                    { tr: 0, tc: 24, sr: 2, er: 42 }, { tr: 43, tc: 24, sr: 45, er: 80 },
                    { tr: 81, tc: 24, sr: 83, er: 119 }, { tr: 120, tc: 24, sr: 122, er: 153 },
                    { tr: 154, tc: 24, sr: 156, er: 179 }, { tr: 180, tc: 24, sr: 182, er: 213 },
                    { tr: 215, tc: 24, sr: 217, er: 248 }, { tr: 249, tc: 24, sr: 251, er: 282 },
                    { tr: 283, tc: 24, sr: 285, er: 316 }
                ];

                store.h = secDef.map(s => {
                    const title = get(data[s.tr], s.tc) || "PASARAN";
                    const items = [];
                    for (let i = s.sr; i <= s.er && i < data.length; i++) {
                        const type = get(data[i], 23);
                        const val = get(data[i], 24);
                        if (type || val) items.push({ type, val });
                    }
                    return { title, items };
                }).filter(s => s.items.length > 0);

                renderH();
            } catch(e) { console.error(e); $('container-hitung').innerHTML = '<p style="color:red;text-align:center;">Error memuat data</p>'; }
        }

        // RENDER
        function render(type) {
            const srcVal = $('src-'+type).value.toLowerCase();
            const list = store[type].filter(i => i.c.toLowerCase().includes(srcVal) || i.t.toLowerCase().includes(srcVal));
            const container = $('list-'+type);
            $('cnt-'+type).textContent = list.length;

            if(!list.length) { container.innerHTML = '<p style="text-align:center;color:var(--muted);padding:10px;">Kosong</p>'; return; }

            container.innerHTML = list.map(i => `
                <div class="item-row" onclick="copy('${encodeURIComponent(i.c)}')">
                    <div class="row-head">
                        <span class="row-label">Judul</span>
                        <span class="row-title">${i.t}</span>
                    </div>
                    <div class="row-body">${i.c}</div>
                </div>
            `).join('');
        }

        function renderH() {
            if(!store.h.length) return;
            $('container-hitung').innerHTML = store.h.map(s => `
                <div class="pasaran-box">
                    <div class="pasaran-head"><span class="pasaran-title">${s.title}</span></div>
                    <div class="pasaran-body">
                        ${s.items.map(i => `
                            <div class="bet-row" onclick="copy('${encodeURIComponent(i.val)}')">
                                <span class="bet-type">${i.type}</span>
                                <span class="bet-val">${i.val}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // EVENTS
        document.querySelectorAll('.tab-btn').forEach(b => b.onclick = function() {
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            $('tab-prediksi').style.display = this.dataset.tab === 'prediksi' ? 'block' : 'none';
            $('tab-hitung').style.display = this.dataset.tab === 'hitung' ? 'block' : 'none';
        });

        $('src-p').oninput = () => render('p');
        $('src-j').oninput = () => render('j');
        $('src-l').oninput = () => render('l');

        // SAVE LOGIC (Local Storage + Copy to Clipboard)
        $('btn-save-tgl').onclick = () => {
            const v = $('input-tanggal').value;
            if(!v) return toast("Pilih tanggal!");
            // Format ke MM/DD/YYYY
            const p = v.split('-');
            const str = `${p[1]}/${p[2]}/${p[0]}`;
            localStorage.setItem(CONFIG.keyT, str);
            copy(str); // Auto copy
            toast("Disalin! Buka Google Sheets lalu Paste di B1.");
        };

        $('btn-save-nom').onclick = () => {
            const v = $('input-nominal').value;
            if(!v) return toast("Isi nominal!");
            localStorage.setItem(CONFIG.keyN, v);
            copy(v); // Auto copy
            toast("Disalin! Buka Google Sheets lalu Paste di X1.");
        };

        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            fetchPrediksi();
            fetchHitung();
        });

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDIKSI DAN HITUNG TOGEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #020810;
            --bg-card: #061520;
            --fg: #e0f4ff;
            --muted: #4a7c9b;
            --accent: #00d4ff;
            --accent-glow: #00a8cc;
            --border: #0a3d5c;
            --card-hover: #0a2535;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .glow-1 { top: -200px; left: -200px; background: var(--accent); animation: float1 20s ease-in-out infinite; }
        .glow-2 { bottom: -200px; right: -200px; background: #0066ff; animation: float2 25s ease-in-out infinite; }

        @keyframes float1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(100px, 100px); } }
        @keyframes float2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-100px, -100px); } }

        .font-display { font-family: 'Orbitron', sans-serif; }
        .neon-text { text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent), 0 0 40px var(--accent-glow); }

        .card {
            background: linear-gradient(145deg, var(--bg-card) 0%, rgba(6, 21, 32, 0.8) 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .card:hover { border-color: var(--accent); box-shadow: 0 0 30px rgba(0, 212, 255, 0.1); }

        /* Tab Navigation */
        .tab-btn {
            position: relative;
            padding: 14px 32px;
            font-weight: 600;
            color: var(--muted);
            transition: all 0.3s ease;
            border-radius: 12px 12px 0 0;
            background: transparent;
            border: 1px solid transparent;
            border-bottom: none;
        }
        .tab-btn:hover { color: var(--fg); }
        .tab-btn.active { color: var(--accent); background: var(--bg-card); border-color: var(--border); }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; right: 0;
            height: 3px;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: var(--fg);
            padding: 12px 16px;
            border-radius: 10px;
            transition: all 0.3s ease;
            width: 100%;
        }
        .input-field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        .input-field::placeholder { color: var(--muted); }

        /* Item List */
        .item-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .item-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }
        .item-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0, 212, 255, 0.15); }
        .item-card:hover::before { left: 100%; }
        .item-card:active { transform: scale(0.98); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, var(--accent) 0%, #0088aa 100%);
            color: var(--bg);
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.4);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Section Header */
        .section-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .section-head {
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.1), transparent);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
        }
        .section-content {
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #0088cc 100%);
            color: var(--bg);
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0, 212, 255, 0.4); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-item { animation: fadeInUp 0.4s ease forwards; opacity: 0; }

        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .badge { background: rgba(0, 212, 255, 0.1); color: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid rgba(0, 212, 255, 0.3); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div id="toast" class="toast">Berhasil disalin!</div>

    <div class="relative z-10 min-h-screen p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="font-display text-3xl md:text-5xl font-black neon-text mb-3 tracking-wider">
                PREDIKSI DAN HITUNG TOGEL
            </h1>
        </header>

        <nav class="flex justify-center gap-2 mb-0 flex-wrap">
            <button class="tab-btn active font-display" data-tab="prediksi">PREDIKSI TOGEL</button>
            <button class="tab-btn font-display" data-tab="hitung">HITUNG TOGEL</button>
        </nav>

        <main class="card p-6 md:p-8 relative -mt-[2px]">
            
            <!-- TAB PREDIKSI -->
            <div id="prediksi-tab" class="tab-content">
                <div class="mb-8 p-6 bg-black/30 rounded-xl border border-[var(--border)]">
                    <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                        <div>
                            <label class="text-[var(--muted)] text-sm mb-2 block">Tanggal Prediksi (Tersimpan Lokal)</label>
                            <input type="date" id="tanggal" class="input-field w-full md:w-auto" />
                        </div>
                        <button id="simpan-tanggal" class="btn-primary whitespace-nowrap">Simpan Tanggal</button>
                    </div>
                    <p id="tanggal-display" class="mt-4 text-[var(--accent)] font-display text-lg"></p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Prediksi Togel -->
                    <div class="section-box">
                        <div class="section-head">
                            <div class="flex items-center justify-between mb-3">
                                <h2 class="font-display text-lg font-bold text-[var(--accent)]">PREDIKSI TOGEL</h2>
                                <span class="badge" id="count-prediksi">0</span>
                            </div>
                            <input type="text" id="search-prediksi" class="input-field text-sm" placeholder="Cari prediksi...">
                        </div>
                        <div id="list-prediksi" class="section-content space-y-3">
                            <div class="flex justify-center py-8"><div class="spinner"></div></div>
                        </div>
                    </div>

                    <!-- Jadwal Pasaran -->
                    <div class="section-box">
                        <div class="section-head">
                            <div class="flex items-center justify-between mb-3">
                                <h2 class="font-display text-lg font-bold text-[var(--accent)]">JADWAL PASARAN</h2>
                                <span class="badge" id="count-jadwal">0</span>
                            </div>
                            <input type="text" id="search-jadwal" class="input-field text-sm" placeholder="Cari jadwal...">
                        </div>
                        <div id="list-jadwal" class="section-content space-y-3">
                            <div class="flex justify-center py-8"><div class="spinner"></div></div>
                        </div>
                    </div>

                    <!-- Link Live -->
                    <div class="section-box">
                        <div class="section-head">
                            <div class="flex items-center justify-between mb-3">
                                <h2 class="font-display text-lg font-bold text-[var(--accent)]">LINK LIVE PASARAN</h2>
                                <span class="badge" id="count-link">0</span>
                            </div>
                            <input type="text" id="search-link" class="input-field text-sm" placeholder="Cari link...">
                        </div>
                        <div id="list-link" class="section-content space-y-3">
                            <div class="flex justify-center py-8"><div class="spinner"></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB HITUNG -->
            <div id="hitung-tab" class="tab-content hidden">
                <div class="mb-8 p-6 bg-black/30 rounded-xl border border-[var(--border)]">
                    <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                        <div class="w-full md:w-auto">
                            <label class="text-[var(--muted)] text-sm mb-2 block">Nominal untuk Hitung (Tersimpan Lokal)</label>
                            <input type="number" id="nominal" class="input-field w-full md:w-64" placeholder="Masukkan nominal..." />
                        </div>
                        <button id="simpan-nominal" class="btn-primary whitespace-nowrap">Simpan Nominal</button>
                    </div>
                    <p id="nominal-display" class="mt-4 text-[var(--accent)] font-display text-lg"></p>
                </div>

                <div id="hitung-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="flex justify-center py-12 col-span-full"><div class="spinner"></div></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const CONFIG = {
            prediksiSheet: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
            hitungSheet: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810',
            storageKeys: { tanggal: 'togel_tanggal', nominal: 'togel_nominal' }
        };

        const state = { prediksiData: [], jadwalData: [], linkData: [], hitungData: [] };

        const $ = id => document.getElementById(id);
        const el = {
            tabBtns: document.querySelectorAll('.tab-btn'),
            prediksiTab: $('prediksi-tab'), hitungTab: $('hitung-tab'),
            tanggal: $('tanggal'), simpanTanggal: $('simpan-tanggal'), tanggalDisplay: $('tanggal-display'),
            searchPrediksi: $('search-prediksi'), searchJadwal: $('search-jadwal'), searchLink: $('search-link'),
            listPrediksi: $('list-prediksi'), listJadwal: $('list-jadwal'), listLink: $('list-link'),
            countPrediksi: $('count-prediksi'), countJadwal: $('count-jadwal'), countLink: $('count-link'),
            nominal: $('nominal'), simpanNominal: $('simpan-nominal'), nominalDisplay: $('nominal-display'),
            hitungContainer: $('hitung-container'), toast: $('toast')
        };

        function showToast(msg) {
            el.toast.textContent = msg;
            el.toast.classList.add('show');
            setTimeout(() => el.toast.classList.remove('show'), 2500);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => showToast(`Disalin: ${text.substring(0, 20)}...`)).catch(() => showToast('Gagal salin'));
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n'), result = [];
            lines.forEach(line => {
                if (!line.trim()) return;
                const cols = []; let current = '', inQuotes = false;
                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { cols.push(current.trim()); current = ''; }
                    else current += char;
                }
                cols.push(current.trim());
                result.push(cols);
            });
            return result;
        }

        function formatDateInput(dateStr) { // MM/DD/YYYY to YYYY-MM-DD
            if(!dateStr) return '';
            const p = dateStr.split('/');
            return p.length === 3 ? `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}` : '';
        }

        function formatNumber(num) { return new Intl.NumberFormat('id-ID').format(num); }

        async function fetchPrediksiData() {
            try {
                const res = await fetch(CONFIG.prediksiSheet);
                const data = parseCSV(await res.text());
                
                // B1 Tanggal (Load initial from sheet, but prefer local storage)
                if (data[0] && data[0][1]) {
                    if (!localStorage.getItem(CONFIG.storageKeys.tanggal)) {
                        el.tanggal.value = formatDateInput(data[0][1]);
                    }
                }

                state.prediksiData = [];
                state.jadwalData = [];
                state.linkData = [];

                // B3:B85 Prediksi
                for (let i = 2; i <= 84 && i < data.length; i++) {
                    if (data[i] && data[i][1] && data[i][1].trim()) {
                        const txt = data[i][1].trim();
                        state.prediksiData.push({ title: txt.split(/[\s,]+/)[0], content: txt });
                    }
                }
                // C3:C56 Jadwal
                for (let i = 2; i <= 55 && i < data.length; i++) {
                    if (data[i] && data[i][2] && data[i][2].trim()) {
                        const txt = data[i][2].trim();
                        state.jadwalData.push({ title: txt.split(/[\s,]+/)[0], content: txt });
                    }
                }
                // C57:C83 Link
                for (let i = 56; i <= 82 && i < data.length; i++) {
                    if (data[i] && data[i][2] && data[i][2].trim()) {
                        const txt = data[i][2].trim();
                        state.linkData.push({ title: txt.split(/[\s,]+/)[0], content: txt });
                    }
                }
                renderPrediksiLists();
            } catch (e) { console.error(e); }
        }

        async function fetchHitungData() {
            try {
                const res = await fetch(CONFIG.hitungSheet);
                const data = parseCSV(await res.text());

                // X1 Nominal
                if (data[0] && data[0][23]) {
                     if (!localStorage.getItem(CONFIG.storageKeys.nominal)) {
                        el.nominal.value = data[0][23];
                    }
                }

                const sections = [
                    { titleRow: 0, titleCol: 24, start: 2, end: 42 },   // Y1, X3:X43
                    { titleRow: 43, titleCol: 24, start: 45, end: 80 }, // Y44, X46:X81
                    { titleRow: 81, titleCol: 24, start: 83, end: 119 }, // Y82...
                    { titleRow: 120, titleCol: 24, start: 122, end: 153 },
                    { titleRow: 154, titleCol: 24, start: 156, end: 179 },
                    { titleRow: 180, titleCol: 24, start: 182, end: 213 },
                    { titleRow: 215, titleCol: 24, start: 217, end: 248 },
                    { titleRow: 249, titleCol: 24, start: 251, end: 282 },
                    { titleRow: 283, titleCol: 24, start: 285, end: 316 }
                ];

                state.hitungData = sections.map(sec => {
                    const title = (data[sec.titleRow] && data[sec.titleRow][sec.titleCol]) || 'PASARAN';
                    const items = [];
                    for (let i = sec.start; i <= sec.end && i < data.length; i++) {
                        if (data[i]) {
                            const type = data[i][23] || ''; // Kolom X
                            const result = data[i][24] || ''; // Kolom Y
                            if (type.trim() || result.trim()) {
                                items.push({ type: type.trim(), result: result.trim() });
                            }
                        }
                    }
                    return { title, items };
                }).filter(s => s.items.length > 0);

                renderHitungSections();
            } catch (e) { console.error(e); }
        }

        function renderList(container, data, search = '') {
            const filtered = data.filter(d => d.content.toLowerCase().includes(search.toLowerCase()));
            if (!filtered.length) return container.innerHTML = '<p class="text-center text-[var(--muted)] py-4">Kosong</p>';
            
            container.innerHTML = filtered.map((d, i) => `
                <div class="item-card animate-item" style="animation-delay:${i*20}ms" data-content="${encodeURIComponent(d.content)}">
                    <div class="text-xs text-[var(--muted)] mb-1">Judul:</div>
                    <div class="font-semibold text-[var(--accent)] mb-2">${d.title}</div>
                    <div class="text-xs text-[var(--muted)] mb-1">Isi (Klik salin):</div>
                    <div class="text-sm break-all">${d.content}</div>
                </div>
            `).join('');

            container.querySelectorAll('.item-card').forEach(c => c.onclick = () => copyToClipboard(decodeURIComponent(c.dataset.content)));
        }

        function renderPrediksiLists() {
            renderList(el.listPrediksi, state.prediksiData, el.searchPrediksi.value);
            renderList(el.listJadwal, state.jadwalData, el.searchJadwal.value);
            renderList(el.listLink, state.linkData, el.searchLink.value);
            el.countPrediksi.textContent = state.prediksiData.length;
            el.countJadwal.textContent = state.jadwalData.length;
            el.countLink.textContent = state.linkData.length;
        }

        function renderHitungSections() {
             if (!state.hitungData.length) return el.hitungContainer.innerHTML = '<p class="text-center text-[var(--muted)] py-4 col-span-full">Tidak ada data</p>';
             
             el.hitungContainer.innerHTML = state.hitungData.map((sec, i) => `
                <div class="section-box animate-item" style="animation-delay:${i*50}ms">
                    <div class="section-head">
                         <h3 class="font-display font-bold text-[var(--accent)]">${sec.title}</h3>
                    </div>
                    <div class="section-content space-y-2">
                        ${sec.items.map(item => `
                            <div class="item-card flex justify-between items-center py-2" data-result="${encodeURIComponent(item.result)}">
                                <span class="text-[var(--fg)] text-sm">${item.type}</span>
                                <span class="font-display font-bold text-[var(--accent)] text-sm">${item.result}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
             `).join('');

             el.hitungContainer.querySelectorAll('.item-card').forEach(c => c.onclick = () => copyToClipboard(decodeURIComponent(c.dataset.result)));
        }

        // Handlers
        function init() {
            // Tabs
            el.tabBtns.forEach(btn => btn.onclick = () => {
                el.tabBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active');
                el.prediksiTab.classList.toggle('hidden', btn.dataset.tab !== 'prediksi');
                el.hitungTab.classList.toggle('hidden', btn.dataset.tab !== 'hitung');
            });

            // Tanggal
            const savedT = localStorage.getItem(CONFIG.storageKeys.tanggal);
            if(savedT) { el.tanggal.value = savedT; el.tanggalDisplay.textContent = `Tanggal aktif: ${savedT}`; }
            
            el.simpanTanggal.onclick = () => {
                if(!el.tanggal.value) return showToast('Pilih tanggal!');
                localStorage.setItem(CONFIG.storageKeys.tanggal, el.tanggal.value);
                el.tanggalDisplay.textContent = `Tanggal disimpan lokal: ${el.tanggal.value}`;
                showToast('Tanggal disimpan di browser!');
                // Tidak bisa update ke Google Sheets tanpa Backend API
            };

            // Nominal
            const savedN = localStorage.getItem(CONFIG.storageKeys.nominal);
            if(savedN) { el.nominal.value = savedN; el.nominalDisplay.textContent = `Nominal aktif: Rp ${formatNumber(savedN)}`; }

            el.simpanNominal.onclick = () => {
                if(!el.nominal.value) return showToast('Masukkan nominal!');
                localStorage.setItem(CONFIG.storageKeys.nominal, el.nominal.value);
                el.nominalDisplay.textContent = `Nominal disimpan lokal: Rp ${formatNumber(el.nominal.value)}`;
                showToast('Nominal disimpan di browser!');
            };

            // Search
            el.searchPrediksi.oninput = () => renderList(el.listPrediksi, state.prediksiData, el.searchPrediksi.value);
            el.searchJadwal.oninput = () => renderList(el.listJadwal, state.jadwalData, el.searchJadwal.value);
            el.searchLink.oninput = () => renderList(el.listLink, state.linkData, el.searchLink.value);

            // Fetch
            fetchPrediksiData();
            fetchHitungData();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

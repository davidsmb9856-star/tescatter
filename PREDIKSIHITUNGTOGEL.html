<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREDIKSI & HITUNG TOGEL</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
--bg-deep: #010108; --bg-card: rgba(5, 15, 35, 0.7);
--accent: #00f0ff; --accent-bright: #7dffff; --accent-dim: #0088aa;
--accent-pink: #ff00ff; --accent-purple: #8855ff;
--text: #e0f7ff; --text-muted: #5a8a9a;
--border: rgba(0, 240, 255, 0.2); --glow: 0 0 20px rgba(0, 240, 255, 0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-deep); color: var(--text);
min-height: 100vh; overflow-x: hidden; position: relative;
}

/* === CYBER BACKGROUND === */
.cyber-bg {
position: fixed; inset: 0; z-index: -2;
background: 
radial-gradient(ellipse 100% 100% at 50% 0%, rgba(0, 100, 150, 0.15) 0%, transparent 50%),
radial-gradient(ellipse 80% 50% at 20% 100%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
radial-gradient(ellipse 60% 40% at 80% 80%, rgba(136, 85, 255, 0.06) 0%, transparent 50%),
linear-gradient(180deg, #010108 0%, #020818 50%, #010108 100%);
}

/* Animated Grid */
.grid-floor {
position: fixed; bottom: 0; left: 0; right: 0; height: 50vh;
z-index: -1; perspective: 500px; overflow: hidden; opacity: 0.4;
}
.grid-floor::before {
content: ''; position: absolute; inset: 0;
background-image: 
linear-gradient(rgba(0, 240, 255, 0.3) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 240, 255, 0.3) 1px, transparent 1px);
background-size: 50px 50px;
transform: rotateX(70deg); transform-origin: center top;
animation: gridScroll 15s linear infinite;
}
@keyframes gridScroll { 0% { background-position: 0 0; } 100% { background-position: 0 50px; } }

/* Floating Particles */
.particles-container {
position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none;
}
.particle {
position: absolute; width: 2px; height: 2px;
background: var(--accent); border-radius: 50%;
box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
animation: floatUp 20s linear infinite;
}
@keyframes floatUp {
0% { transform: translateY(100vh) scale(0); opacity: 0; }
10% { opacity: 1; }
90% { opacity: 1; }
100% { transform: translateY(-100vh) scale(1); opacity: 0; }
}

/* Scan Line Effect */
.scan-line {
position: fixed; inset: 0; z-index: 1000;
background: linear-gradient(transparent 50%, rgba(0, 240, 255, 0.01) 50%);
background-size: 100% 4px; pointer-events: none; opacity: 0.3;
}

/* === MAIN LAYOUT === */
.main-wrapper { position: relative; z-index: 10; max-width: 1500px; margin: 0 auto; padding: 20px; }

/* === HEADER === */
.cyber-header {
text-align: center; padding: 50px 20px 40px;
animation: glitchIn 1s ease-out;
}
@keyframes glitchIn {
0% { opacity: 0; transform: translateY(-30px) skewX(-10deg); filter: blur(10px); }
100% { opacity: 1; transform: translateY(0) skewX(0); filter: blur(0); }
}
.cyber-title {
font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 6vw, 3.5rem);
font-weight: 900; letter-spacing: 4px;
background: linear-gradient(180deg, #fff 0%, var(--accent-bright) 50%, var(--accent) 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
text-shadow: 0 0 30px var(--accent); position: relative;
}
.cyber-title::after {
content: attr(data-text); position: absolute; left: 0; top: 0; width: 100%; height: 100%;
background: linear-gradient(180deg, var(--accent-pink) 0%, var(--accent) 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
opacity: 0; animation: titleGlitch 4s infinite;
}
@keyframes titleGlitch {
0%, 90%, 100% { opacity: 0; transform: translate(0); }
92% { opacity: 0.8; transform: translate(-3px, 1px); }
94% { opacity: 0.6; transform: translate(3px, -1px); }
}
.subtitle {
font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--accent);
letter-spacing: 8px; margin-top: 15px; text-transform: uppercase;
animation: pulseGlow 2s ease-in-out infinite;
}
@keyframes pulseGlow {
0%, 100% { text-shadow: 0 0 10px var(--accent); }
50% { text-shadow: 0 0 25px var(--accent), 0 0 50px var(--accent); }
}

/* === TAB NAVIGATION === */
.tab-container {
display: flex; justify-content: center; gap: 20px; margin-bottom: 35px;
animation: slideUp 0.8s ease-out 0.2s backwards;
}
@keyframes slideUp {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}
.tab-btn {
font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700;
letter-spacing: 2px; padding: 16px 40px; border: none; cursor: pointer;
background: transparent; color: var(--text-muted); position: relative;
clip-path: polygon(15px 0, 100% 0, calc(100% - 15px) 100%, 0 100%);
transition: all 0.3s ease;
}
.tab-btn::before {
content: ''; position: absolute; inset: 2px;
background: rgba(0, 240, 255, 0.05); clip-path: inherit; transition: all 0.3s ease;
}
.tab-btn::after {
content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
width: 0; height: 2px; background: var(--accent); transition: width 0.3s ease;
box-shadow: 0 0 15px var(--accent);
}
.tab-btn:hover { color: var(--accent); }
.tab-btn:hover::before { background: rgba(0, 240, 255, 0.1); }
.tab-btn.active { color: var(--bg-deep); text-shadow: 0 0 10px rgba(0,0,0,0.3); }
.tab-btn.active::before { background: linear-gradient(135deg, var(--accent-bright) 0%, var(--accent) 100%); }
.tab-btn.active::after { width: 60%; }

/* === GLASS PANEL === */
.glass-panel {
background: var(--bg-card); backdrop-filter: blur(20px);
border: 1px solid var(--border); border-radius: 20px;
box-shadow: 
0 10px 40px rgba(0, 0, 0, 0.5),
inset 0 1px 0 rgba(255,255,255,0.05),
0 0 30px rgba(0, 240, 255, 0.05);
overflow: hidden; position: relative;
}
.glass-panel::before {
content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

/* === SETTINGS BAR === */
.settings-bar {
display: flex; flex-wrap: wrap; gap: 20px; padding: 24px; align-items: center;
border-bottom: 1px solid var(--border); background: rgba(0, 20, 40, 0.3);
}
.setting-group { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 200px; }
.setting-label {
font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: var(--accent);
letter-spacing: 1px; white-space: nowrap;
}
.cyber-input {
flex: 1; padding: 12px 16px; background: rgba(0, 10, 20, 0.6);
border: 1px solid var(--border); border-radius: 8px;
color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 1rem;
transition: all 0.3s ease; min-width: 150px;
}
.cyber-input:focus {
outline: none; border-color: var(--accent);
box-shadow: 0 0 20px rgba(0, 240, 255, 0.3), inset 0 0 10px rgba(0, 240, 255, 0.1);
}
.cyber-btn {
padding: 12px 30px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
border: none; border-radius: 8px; color: var(--bg-deep);
font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.85rem;
letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease;
box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); position: relative; overflow: hidden;
}
.cyber-btn::before {
content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
transition: left 0.5s ease;
}
.cyber-btn:hover::before { left: 100%; }
.cyber-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 30px rgba(0, 240, 255, 0.6); }
.status-pill {
padding: 8px 16px; background: rgba(0, 240, 255, 0.1); border: 1px solid var(--accent);
border-radius: 20px; font-size: 0.85rem; color: var(--accent-bright);
font-weight: 600; animation: statusBlink 2s infinite;
}
@keyframes statusBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

/* === CONTENT GRID === */
.content-grid {
display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; padding: 24px;
}

/* === SECTION BOX === */
.section-box {
background: rgba(5, 20, 40, 0.4); border: 1px solid var(--border);
border-radius: 16px; overflow: hidden; transition: all 0.3s ease;
}
.section-box:hover { border-color: rgba(0, 240, 255, 0.4); transform: translateY(-4px); }
.section-header {
padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
background: linear-gradient(90deg, rgba(0, 240, 255, 0.1) 0%, transparent 100%);
border-bottom: 1px solid var(--border);
}
.section-title { font-family: 'Orbitron', sans-serif; font-size: 1rem; color: var(--accent-bright); letter-spacing: 1px; }
.count-badge {
background: var(--accent); color: var(--bg-deep); padding: 4px 12px;
border-radius: 20px; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 700;
box-shadow: 0 0 15px var(--accent);
}
.search-area { padding: 14px; border-bottom: 1px solid rgba(0, 240, 255, 0.1); }
.search-input {
width: 100%; padding: 10px 14px; background: rgba(0, 10, 25, 0.5);
border: 1px solid var(--border); border-radius: 8px; color: var(--text);
font-family: 'Rajdhani', sans-serif; transition: all 0.3s ease;
}
.search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }
.search-input::placeholder { color: var(--text-muted); }

/* === ITEM LIST === */
.item-list { max-height: 380px; overflow-y: auto; padding: 14px; }
.item-card {
background: linear-gradient(135deg, rgba(0, 20, 40, 0.6) 0%, rgba(0, 10, 25, 0.4) 100%);
border: 1px solid rgba(0, 240, 255, 0.15); border-radius: 12px;
padding: 14px; margin-bottom: 10px; cursor: pointer;
transition: all 0.3s ease; position: relative; overflow: hidden;
}
.item-card::before {
content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
background: var(--accent); transition: all 0.3s ease;
box-shadow: 0 0 10px var(--accent);
}
.item-card:hover { border-color: var(--accent); transform: translateX(8px); background: rgba(0, 30, 60, 0.5); }
.item-card:hover::before { width: 5px; box-shadow: 0 0 20px var(--accent); }
.item-title { font-weight: 600; font-size: 1rem; color: var(--text); margin-bottom: 6px; }
.item-content { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; word-break: break-all; }

/* === TYPE SELECTOR (NO DROPDOWN) === */
.type-selector { padding: 24px; }
.type-selector-title {
font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--accent);
letter-spacing: 2px; margin-bottom: 16px; text-transform: uppercase;
}
.type-grid {
display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px;
}
.type-card {
background: linear-gradient(135deg, rgba(0, 20, 40, 0.6) 0%, rgba(0, 10, 20, 0.4) 100%);
border: 1px solid var(--border); border-radius: 12px; padding: 18px;
cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
}
.type-card::after {
content: ''; position: absolute; inset: 0;
background: linear-gradient(135deg, transparent 0%, rgba(0, 240, 255, 0.1) 100%);
opacity: 0; transition: opacity 0.3s ease;
}
.type-card:hover { border-color: rgba(0, 240, 255, 0.5); transform: scale(1.02); }
.type-card:hover::after { opacity: 1; }
.type-card.selected {
border-color: var(--accent); background: linear-gradient(135deg, rgba(0, 240, 255, 0.15) 0%, rgba(0, 100, 150, 0.1) 100%);
box-shadow: 0 0 30px rgba(0, 240, 255, 0.3), inset 0 0 20px rgba(0, 240, 255, 0.1);
}
.type-card.selected::before {
content: ''; position: absolute; top: 10px; right: 10px;
width: 8px; height: 8px; background: var(--accent);
border-radius: 50%; box-shadow: 0 0 15px var(--accent);
animation: dotPulse 1s infinite;
}
@keyframes dotPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
.type-name { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--text); position: relative; z-index: 1; }
.type-count { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; position: relative; z-index: 1; }

/* === LABEL SELECTOR === */
.label-panel {
background: rgba(0, 15, 30, 0.5); border-top: 1px solid var(--border);
margin: 0 24px 24px; border-radius: 16px; overflow: hidden;
}
.label-header {
padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
background: linear-gradient(90deg, rgba(0, 240, 255, 0.08) 0%, transparent 100%);
border-bottom: 1px solid var(--border);
}
.label-title { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--accent-bright); letter-spacing: 1px; }
.label-list { max-height: 280px; overflow-y: auto; padding: 12px; }
.label-item {
display: flex; justify-content: space-between; align-items: center;
padding: 14px 18px; background: rgba(0, 20, 40, 0.5);
border: 1px solid var(--border); border-radius: 10px;
margin-bottom: 8px; cursor: pointer; transition: all 0.3s ease;
}
.label-item:hover { border-color: var(--accent); background: rgba(0, 240, 255, 0.05); transform: translateX(5px); }
.label-item.selected { border-color: var(--accent); background: rgba(0, 240, 255, 0.1); }
.label-item.selected .label-text { color: var(--accent-bright); }
.label-text { font-size: 0.95rem; color: var(--text); }
.label-arrow { color: var(--accent); font-size: 1.2rem; opacity: 0.5; transition: all 0.3s ease; }
.label-item:hover .label-arrow { opacity: 1; transform: translateX(5px); }

/* === RESULT DISPLAY === */
.result-container {
margin: 0 24px 24px; padding: 30px;
background: linear-gradient(135deg, rgba(0, 240, 255, 0.1) 0%, rgba(0, 100, 200, 0.05) 100%);
border: 2px solid var(--accent); border-radius: 16px;
text-align: center; cursor: pointer; transition: all 0.3s ease;
box-shadow: 0 0 40px rgba(0, 240, 255, 0.2), inset 0 0 30px rgba(0, 240, 255, 0.05);
}
.result-container:hover { box-shadow: 0 0 60px rgba(0, 240, 255, 0.4); transform: scale(1.01); }
.result-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
.result-value { font-family: 'Orbitron', sans-serif; font-size: clamp(1.5rem, 4vw, 2.5rem); color: var(--accent-bright); text-shadow: 0 0 20px var(--accent); }
.result-hint { font-size: 0.75rem; color: var(--accent); margin-top: 12px; opacity: 0.7; }

/* === HITUNG GRID === */
.hitung-grid {
display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 24px;
}
.pasaran-card {
background: rgba(0, 15, 35, 0.6); border: 1px solid var(--border);
border-radius: 16px; overflow: hidden; transition: all 0.3s ease;
}
.pasaran-card:hover { border-color: rgba(0, 240, 255, 0.4); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
.pasaran-header {
padding: 14px 18px; background: linear-gradient(90deg, rgba(0, 240, 255, 0.12) 0%, transparent 100%);
border-bottom: 1px solid var(--border);
}
.pasaran-title { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--accent-bright); letter-spacing: 1px; }
.pasaran-content { max-height: 280px; overflow-y: auto; padding: 12px; }
.bet-row {
display: flex; justify-content: space-between; align-items: center;
padding: 12px 16px; background: rgba(0, 10, 25, 0.5);
border: 1px solid rgba(0, 240, 255, 0.1); border-radius: 8px;
margin-bottom: 8px; cursor: pointer; transition: all 0.3s ease;
}
.bet-row:hover { border-color: var(--accent); background: rgba(0, 240, 255, 0.05); transform: translateX(5px); }
.bet-type { font-size: 0.85rem; color: var(--text); }
.bet-value {
font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--accent);
background: rgba(0, 240, 255, 0.1); padding: 4px 12px; border-radius: 6px;
border: 1px solid rgba(0, 240, 255, 0.3);
}

/* === TOAST === */
.cyber-toast {
position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
background: linear-gradient(135deg, rgba(0, 20, 40, 0.95) 0%, rgba(0, 10, 25, 0.95) 100%);
border: 1px solid var(--accent); color: var(--accent-bright);
padding: 16px 36px; border-radius: 50px; font-family: 'Orbitron', sans-serif;
font-size: 0.9rem; letter-spacing: 1px; opacity: 0;
transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 2000;
box-shadow: 0 0 40px rgba(0, 240, 255, 0.4);
}
.cyber-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* === SPINNER === */
.cyber-spinner {
width: 50px; height: 50px; border: 3px solid transparent;
border-top-color: var(--accent); border-right-color: var(--accent);
border-radius: 50%; animation: spin 0.8s linear infinite;
box-shadow: 0 0 20px var(--accent);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(0, 10, 20, 0.3); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; box-shadow: 0 0 10px var(--accent); }

/* === RESPONSIVE === */
@media (max-width: 768px) {
.settings-bar { flex-direction: column; align-items: stretch; }
.setting-group { width: 100%; }
.cyber-input { width: 100%; }
.cyber-btn { width: 100%; }
.tab-btn { padding: 14px 25px; font-size: 0.85rem; }
.type-grid { grid-template-columns: 1fr; }
.hitung-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="cyber-bg"></div>
<div class="grid-floor"></div>
<div class="scan-line"></div>
<div class="particles-container" id="particles"></div>
<div id="toast" class="cyber-toast"></div>

<div class="main-wrapper">
<header class="cyber-header">
<h1 class="cyber-title" data-text="PREDIKSI TOGEL">PREDIKSI TOGEL</h1>
<p class="subtitle">Hitung dan Prediksi Presisi Tinggi</p>
</header>

<nav class="tab-container">
<button class="tab-btn active" data-tab="prediksi">PREDIKSI</button>
<button class="tab-btn" data-tab="hitung">HITUNG</button>
</nav>

<div class="glass-panel">
<!-- TAB PREDIKSI -->
<div id="tab-prediksi" class="tab-content">
<div class="settings-bar">
<div class="setting-group">
<span class="setting-label">TANGGAL</span>
<input type="date" id="input-tanggal" class="cyber-input">
</div>
<button class="cyber-btn" onclick="manualUpdateTanggal()">UPDATE</button>
<span class="status-pill" id="status-tanggal">-</span>
</div>

<div class="content-grid">
<div class="section-box">
<div class="section-header">
<h3 class="section-title">PREDIKSI</h3>
<span class="count-badge" id="count-prediksi">0</span>
</div>
<div class="search-area">
<input type="text" class="search-input" id="search-prediksi" placeholder="Cari prediksi...">
</div>
<div class="item-list" id="list-prediksi">
<div style="display:flex;justify-content:center;padding:40px;"><div class="cyber-spinner"></div></div>
</div>
</div>

<div class="section-box">
<div class="section-header">
<h3 class="section-title">JADWAL</h3>
<span class="count-badge" id="count-jadwal">0</span>
</div>
<div class="search-area">
<input type="text" class="search-input" id="search-jadwal" placeholder="Cari jadwal...">
</div>
<div class="item-list" id="list-jadwal">
<div style="display:flex;justify-content:center;padding:40px;"><div class="cyber-spinner"></div></div>
</div>
</div>

<div class="section-box">
<div class="section-header">
<h3 class="section-title">LINK LIVE</h3>
<span class="count-badge" id="count-link">0</span>
</div>
<div class="search-area">
<input type="text" class="search-input" id="search-link" placeholder="Cari link...">
</div>
<div class="item-list" id="list-link">
<div style="display:flex;justify-content:center;padding:40px;"><div class="cyber-spinner"></div></div>
</div>
</div>
</div>
</div>

<!-- TAB HITUNG -->
<div id="tab-hitung" class="tab-content" style="display:none;">
<div class="settings-bar">
<div class="setting-group">
<span class="setting-label">NOMINAL</span>
<input type="number" id="input-nominal" class="cyber-input" placeholder="0">
</div>
<button class="cyber-btn" onclick="manualUpdateNominal()">UPDATE</button>
<span class="status-pill" id="status-nominal">-</span>
</div>

<div class="type-selector">
<h4 class="type-selector-title">Pilih Tipe Hitungan</h4>
<div class="type-grid" id="type-grid">
<div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="cyber-spinner"></div></div>
</div>
</div>

<div class="label-panel" id="label-panel" style="display:none;">
<div class="label-header">
<h4 class="label-title">Pilih Label</h4>
<span class="count-badge" id="label-count">0</span>
</div>
<div class="label-list" id="label-list"></div>
</div>

<div class="result-container" id="result-container" style="display:none;">
<div class="result-label">Hasil Hitungan</div>
<div class="result-value" id="result-value">-</div>
<div class="result-hint">Klik untuk menyalin</div>
</div>

<div class="hitung-grid" id="hitung-grid">
<div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="cyber-spinner"></div></div>
</div>
</div>
</div>
</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec';
const CONFIG = {
sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810',
keyTanggal: 'togel_tanggal_v6',
keyNominal: 'togel_nominal_v6'
};

const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompokData: {} };
let selectedType = null;
let selectedLabel = null;

const $ = id => document.getElementById(id);
const dom = {
tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
inTgl: $('input-tanggal'), statTgl: $('status-tanggal'),
inNom: $('input-nominal'), statNom: $('status-nominal'),
srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
contH: $('hitung-grid'), toast: $('toast'),
typeGrid: $('type-grid'), labelPanel: $('label-panel'),
labelList: $('label-list'), labelCount: $('label-count'),
resultContainer: $('result-container'), resultValue: $('result-value')
};

// Create Particles
function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
for (let i = 0; i < 40; i++) {
const p = document.createElement('div');
p.className = 'particle';
p.style.left = Math.random() * 100 + '%';
p.style.animationDelay = Math.random() * 20 + 's';
p.style.animationDuration = (15 + Math.random() * 15) + 's';
const hue = Math.random() > 0.7 ? '300' : '180';
p.style.background = `hsl(${hue}, 100%, 70%)`;
p.style.boxShadow = `0 0 10px hsl(${hue}, 100%, 70%)`;
container.appendChild(p);
}
}

function showToast(msg) {
dom.toast.textContent = msg;
dom.toast.classList.add('show');
setTimeout(() => dom.toast.classList.remove('show'), 3000);
}

function copyText(text) {
let finalText = text;
try { finalText = decodeURIComponent(text); } catch(e) {}
navigator.clipboard.writeText(finalText).then(() => {
const preview = finalText.length > 20 ? finalText.substring(0, 20) + '...' : finalText;
showToast('Disalin: ' + preview);
}).catch(() => showToast('Gagal salin'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

function parseCSV(text) {
let p = [], row = [], entry = "", state = 0;
for (let i = 0; i < text.length; i++) {
const char = text[i], next = text[i+1];
if (state === 0) {
if (char === '"') state = 1;
else if (char === ',') { row.push(entry); entry = ""; }
else if (char === '\r' && next === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
else if (char === '\n' || char === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
else entry += char;
} else if (state === 1) {
if (char === '"' && next === '"') { entry += '"'; i++; }
else if (char === '"') state = 0;
else entry += char;
}
}
if (entry.length > 0 || row.length > 0) { row.push(entry); p.push(row); }
return p;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

async function updateSheet(action, value) {
if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
showToast('Script URL belum disetup!');
return false;
}
try {
const params = new URLSearchParams({ action, value });
const response = await fetch(SCRIPT_URL + '?' + params.toString());
const text = await response.text();
return text.includes('SUCCESS');
} catch (e) {
console.error("Error:", e);
return false;
}
}

async function fetchPrediksi() {
try {
const res = await fetch(CONFIG.sheetPrediksi + '&t=' + new Date().getTime());
const data = parseCSV(await res.text());
state.prediksi = []; state.jadwal = []; state.link = [];

if (data[0]) {
const raw = safeGet(data[0], 1);
if (raw) {
const p = raw.split('/');
if (p.length === 3) {
const formatted = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
dom.inTgl.value = formatted;
dom.statTgl.textContent = formatted;
}
}
}

for (let i = 2; i <= 84 && i < data.length; i++) {
const txt = safeGet(data[i], 1);
if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
for (let i = 2; i <= 55 && i < data.length; i++) {
const txt = safeGet(data[i], 2);
if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
for (let i = 56; i <= 82 && i < data.length; i++) {
const txt = safeGet(data[i], 2);
if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
}
renderPrediksi();
} catch (e) {
console.error("Error Prediksi:", e);
dom.listP.innerHTML = '<p style="color:var(--accent);text-align:center;padding:20px;">Gagal memuat data</p>';
}
}

async function fetchHitung() {
try {
const res = await fetch(CONFIG.sheetHitung + '&t=' + new Date().getTime());
const data = parseCSV(await res.text());

if (data[0]) {
const nom = safeGet(data[0], 23);
if (nom) {
dom.inNom.value = nom;
dom.statNom.textContent = "Rp " + formatNum(nom);
}
}

const secDef = [
{ tRow: 0, tCol: 24, start: 2, end: 42 },
{ tRow: 43, tCol: 24, start: 45, end: 80 },
{ tRow: 81, tCol: 24, start: 83, end: 119 },
{ tRow: 120, tCol: 24, start: 122, end: 153 },
{ tRow: 154, tCol: 24, start: 156, end: 179 },
{ tRow: 180, tCol: 24, start: 182, end: 213 },
{ tRow: 215, tCol: 24, start: 217, end: 248 },
{ tRow: 249, tCol: 24, start: 251, end: 282 },
{ tRow: 283, tCol: 24, start: 285, end: 316 }
];

state.hitung = secDef.map(s => {
let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
let items = [];
for (let i = s.start; i <= s.end && i < data.length; i++) {
if (data[i]) {
const type = safeGet(data[i], 23);
const resVal = safeGet(data[i], 24);
if (type || resVal) items.push({ type, res: resVal });
}
}
return { title, items };
}).filter(s => s.items.length > 0);

renderHitung();
loadTypeCards(data);
} catch (e) {
console.error("Error Hitung:", e);
dom.contH.innerHTML = '<p style="color:var(--accent);text-align:center;padding:20px;">Gagal memuat data</p>';
}
}

function loadTypeCards(data) {
const secDef = [
{ tRow: 0, tCol: 24, start: 2, end: 42, title: "HITUNG HADIAH SEMUA PASARAN" },
{ tRow: 43, tCol: 24, start: 45, end: 80, title: "HITUNG HADIAH TOTO MACAU 4D" },
{ tRow: 81, tCol: 24, start: 83, end: 119, title: "HITUNG HADIAH TOTO MACAU 5D" },
{ tRow: 120, tCol: 24, start: 122, end: 153, title: "HITUNG HADIAH KINGKONG 4D" },
{ tRow: 154, tCol: 24, start: 156, end: 179, title: "PERHITUNGAN BONUS" },
{ tRow: 180, tCol: 24, start: 182, end: 213, title: "HITUNG HADIAH JAKARTA" },
{ tRow: 215, tCol: 24, start: 217, end: 248, title: "HITUNG HADIAH TOTOMALI" },
{ tRow: 249, tCol: 24, start: 251, end: 282, title: "HITUNG HADIAH HOKIDRAW" },
{ tRow: 283, tCol: 24, start: 285, end: 316, title: "HITUNG HADIAH SYDNEY HONGKONG" }
];

state.kelompokData = {};
secDef.forEach(sec => {
const items = [];
for (let i = sec.start; i <= sec.end && i < data.length; i++) {
if (data[i]) {
const label = safeGet(data[i], 23);
const value = safeGet(data[i], 24);
if (label || value) items.push({ label: label || "-", value: value || "-" });
}
}
if (items.length > 0) state.kelompokData[sec.title] = items;
});

renderTypeCards();
}

function renderTypeCards() {
const types = Object.keys(state.kelompokData);
dom.typeGrid.innerHTML = types.map(type => `
<div class="type-card" onclick="selectType('${type}')">
<div class="type-name">${type}</div>
<div class="type-count">${state.kelompokData[type].length} item</div>
</div>
`).join('');
}

function selectType(type) {
selectedType = type;
selectedLabel = null;
dom.resultContainer.style.display = 'none';

document.querySelectorAll('.type-card').forEach(card => {
card.classList.toggle('selected', card.querySelector('.type-name').textContent === type);
});

dom.labelPanel.style.display = 'block';
dom.labelCount.textContent = state.kelompokData[type].length;

dom.labelList.innerHTML = state.kelompokData[type].map((item, idx) => `
<div class="label-item" onclick="selectLabel(${idx})">
<span class="label-text">${item.label}</span>
<span class="label-arrow">→</span>
</div>
`).join('');
}

function selectLabel(idx) {
if (!selectedType) return;
selectedLabel = idx;

document.querySelectorAll('.label-item').forEach((item, i) => {
item.classList.toggle('selected', i === idx);
});

const item = state.kelompokData[selectedType][idx];
dom.resultContainer.style.display = 'block';
dom.resultValue.textContent = item.value;
dom.resultContainer.onclick = () => copyText(item.value);
}

function renderList(container, items, search) {
const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
if (!filtered.length) {
container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">Tidak ada data</p>';
return;
}
container.innerHTML = filtered.map(v => `
<div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}')">
<div class="item-title">${v.title}</div>
<div class="item-content">${v.content}</div>
</div>
`).join('');
}

function renderPrediksi() {
renderList(dom.listP, state.prediksi, dom.srcP.value);
renderList(dom.listJ, state.jadwal, dom.srcJ.value);
renderList(dom.listL, state.link, dom.srcL.value);
dom.cntP.textContent = state.prediksi.length;
dom.cntJ.textContent = state.jadwal.length;
dom.cntL.textContent = state.link.length;
}

function renderHitung() {
if (!state.hitung.length) {
dom.contH.innerHTML = '<p style="color:var(--text-muted);text-align:center;">Tidak ada data</p>';
return;
}
dom.contH.innerHTML = state.hitung.map(s => `
<div class="pasaran-card">
<div class="pasaran-header"><h4 class="pasaran-title">${s.title}</h4></div>
<div class="pasaran-content">
 ${s.items.map(it => `
<div class="bet-row" onclick="copyText('${encodeURIComponent(it.res)}')">
<span class="bet-type">${it.type}</span>
<span class="bet-value">${it.res}</span>
</div>
`).join('')}
</div>
</div>
`).join('');
}

function manualUpdateTanggal() {
if (!dom.inTgl.value) return showToast("Pilih tanggal dulu!");
const parts = dom.inTgl.value.split('-');
const formattedDate = `${parts[1]}/${parts[2]}/${parts[0]}`;
dom.statTgl.textContent = "Menyimpan...";

updateSheet('updateTanggal', formattedDate).then(success => {
if (success) {
dom.statTgl.textContent = "Tersimpan!";
showToast("Tanggal diupdate!");
fetchPrediksi();
fetchHitung();
} else {
dom.statTgl.textContent = "Gagal";
showToast("Gagal update");
}
});
}

function manualUpdateNominal() {
if (!dom.inNom.value) return showToast("Isi nominal dulu!");
dom.statNom.textContent = "Menyimpan...";

updateSheet('updateNominal', dom.inNom.value).then(success => {
if (success) {
dom.statNom.textContent = "Rp " + formatNum(dom.inNom.value);
showToast("Nominal diupdate!");
fetchPrediksi();
fetchHitung();
} else {
dom.statNom.textContent = "Gagal";
showToast("Gagal update");
}
});
}

function init() {
// Tab switching
document.querySelectorAll('.tab-btn').forEach(t => t.onclick = () => {
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
t.classList.add('active');
dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
});

// Search
dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);

// Load
fetchPrediksi();
fetchHitung();
}

document.addEventListener('DOMContentLoaded', () => {
createParticles();
init();
setTimeout(() => showToast('Selamat datang di sistem prediksi'), 1000);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00ffff">
    <title>TRY CARI SELISIH - LINE TOGEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00ffff; --neon-green: #00ff88; --neon-red: #ff0066;
            --bg-dark: #000a1e; --text-main: #00ffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Exo 2', sans-serif; background: var(--bg-dark);
            color: var(--text-main); min-height: 100vh;
        }
        .cyber-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(0,243,255,0.15), transparent 40%),
                        linear-gradient(180deg, #000a1e 0%, #001133 100%);
            z-index: -2;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .header {
            text-align: center; margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn {
            background: rgba(0,255,255,0.2); border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 12px 24px; border-radius: 12px;
            text-decoration: none; font-weight: bold; transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(0,255,255,0.4); transform: scale(1.05); }
        .title {
            font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 900;
            color: var(--neon-cyan); text-shadow: 0 0 30px rgba(0,255,255,0.7);
        }
        .input-section {
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px;
            margin-bottom: 30px;
        }
        .input-box {
            background: rgba(0,20,50,0.7); border: 2px solid rgba(0,255,255,0.4);
            border-radius: 16px; padding: 25px; backdrop-filter: blur(10px);
        }
        .input-box h3 {
            font-family: 'Orbitron', sans-serif; font-size: 20px;
            color: var(--neon-cyan); margin-bottom: 15px;
        }
        .input-box textarea {
            width: 100%; min-height: 200px; padding: 15px;
            background: rgba(0,15,40,0.8); border: 1px solid rgba(0,255,255,0.5);
            border-radius: 12px; color: var(--neon-cyan); font-size: 14px;
            font-family: 'Exo 2', monospace; resize: vertical;
        }
        .input-box textarea:focus {
            outline: none; border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0,255,255,0.5);
        }
        .action-btn {
            background: rgba(0,255,255,0.2); border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 14px 28px; border-radius: 12px;
            cursor: pointer; font-weight: bold; font-size: 16px;
            transition: all 0.3s; display: block; margin: 30px auto;
        }
        .action-btn:hover {
            background: rgba(0,255,255,0.4); transform: scale(1.05);
        }
        .result-box {
            background: rgba(0,20,50,0.7); border: 2px solid rgba(0,255,255,0.4);
            border-radius: 16px; padding: 25px; margin-top: 30px;
            display: none;
        }
        .result-box.show { display: block; }
        .result-title {
            font-family: 'Orbitron', sans-serif; font-size: 24px;
            color: var(--neon-cyan); margin-bottom: 20px; text-align: center;
        }
        .result-table {
            width: 100%; border-collapse: collapse; margin-top: 20px;
        }
        .result-table th, .result-table td {
            padding: 12px; border: 1px solid rgba(0,255,255,0.3);
            text-align: left;
        }
        .result-table th {
            background: rgba(0,30,60,0.8); color: var(--neon-cyan);
        }
        .status-cocok { color: var(--neon-green); font-weight: bold; }
        .status-tidak { color: var(--neon-red); font-weight: bold; }
        @media (max-width: 768px) {
            .title { font-size: 32px; }
            .input-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">⬅️ Kembali ke Portal</a>
            <h1 class="title">🔍 TRY CARI SELISIH</h1>
        </div>

        <div class="input-section">
            <div class="input-box">
                <h3>📄 Data DOCS</h3>
                <textarea id="dataDocs" placeholder="Paste data DOCS di sini (format: JAM | USER ID | NAMA | NOMINAL)"></textarea>
            </div>

            <div class="input-box">
                <h3>📊 Data ADMIN</h3>
                <textarea id="dataAdmin" placeholder="Paste data ADMIN di sini (format: JAM | USER ID | NAMA | NOMINAL)"></textarea>
            </div>
        </div>

        <button class="action-btn" onclick="prosesData()">
            🔍 BANDINGKAN DATA
        </button>

        <div class="result-box" id="resultBox">
            <h2 class="result-title">📊 HASIL ANALISIS</h2>
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        function prosesData() {
            const docs = document.getElementById('dataDocs').value.trim();
            const admin = document.getElementById('dataAdmin').value.trim();

            if (!docs || !admin) {
                alert('⚠️ Harap isi kedua kolom data!');
                return;
            }

            // Parse data (sederhana - bisa disesuaikan dengan format Anda)
            const docsLines = docs.split('\n').filter(l => l.trim());
            const adminLines = admin.split('\n').filter(l => l.trim());

            let html = `
                <table class="result-table">
                    <thead>
                        <tr>
                            <th>NO</th>
                            <th>DATA</th>
                            <th>DOCS</th>
                            <th>ADMIN</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            const maxLines = Math.max(docsLines.length, adminLines.length);
            let cocok = 0, tidak = 0;

            for (let i = 0; i < maxLines; i++) {
                const docsLine = docsLines[i] || '-';
                const adminLine = adminLines[i] || '-';
                const status = docsLine === adminLine ? 'cocok' : 'tidak';
                
                if (status === 'cocok') cocok++;
                else tidak++;

                html += `
                    <tr>
                        <td>${i + 1}</td>
                        <td>Baris ${i + 1}</td>
                        <td>${docsLine}</td>
                        <td>${adminLine}</td>
                        <td class="status-${status}">
                            ${status === 'cocok' ? '✅ COCOK' : '❌ TIDAK COCOK'}
                        </td>
                    </tr>
                `;
            }

            html += `
                    </tbody>
                </table>
                <div style="margin-top:20px;text-align:center;color:#66ffff;">
                    <p>✅ COCOK: <strong style="color:#00ff88">${cocok}</strong></p>
                    <p>❌ TIDAK COCOK: <strong style="color:#ff0066">${tidak}</strong></p>
                </div>
            `;

            document.getElementById('resultContent').innerHTML = html;
            document.getElementById('resultBox').classList.add('show');
        }
    </script>
</body>
</html>

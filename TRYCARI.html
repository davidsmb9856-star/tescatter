<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Multi-Tool Analyzer - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-blue: #00d4ff;
--neon-blue-dark: #0088ff;
--neon-blue-light: #66e5ff;
--neon-electric: #00ffff;
--neon-purple: #7b2fff;
--neon-gold: #ffd700;
--neon-green: #00ff9d;
--neon-red: #ff3e6c;
--bg-deep: #020408;
--bg-surface: rgba(5, 15, 35, 0.85);
--bg-elevated: rgba(10, 25, 55, 0.7);
--bg-glass: rgba(8, 20, 45, 0.6);
--text-primary: #ffffff;
--text-secondary: #8ab4f8;
--text-dim: #54689a;
--border-glow: rgba(0, 212, 255, 0.5);
--glow-blue: 0 0 15px rgba(0, 212, 255, 0.6), 0 0 35px rgba(0, 212, 255, 0.4);
--glow-electric: 0 0 20px rgba(0, 255, 255, 0.7), 0 0 50px rgba(0, 255, 255, 0.4);
--transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
--transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
--transition-bloom: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-deep);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.5;
}

/* Electric Background */
.bg-canvas {
position: fixed;
inset: 0;
z-index: -3;
background:
radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 80% 15%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
radial-gradient(ellipse at 50% 85%, rgba(123, 47, 255, 0.08) 0%, transparent 50%),
linear-gradient(180deg, #000814 0%, #001428 40%, #000a1c 100%);
animation: bgPulse 15s ease-in-out infinite alternate;
}
@keyframes bgPulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.9; }
}

.grid-overlay {
position: fixed;
inset: 0;
z-index: -2;
background-image:
linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
background-size: 50px 50px;
animation: gridMove 30s linear infinite;
}
@keyframes gridMove {
0% { background-position: 0 0; }
100% { background-position: 50px 50px; }
}

.particles {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
overflow: hidden;
}
.particle {
position: absolute;
width: 3px; height: 3px;
background: var(--neon-blue);
border-radius: 50%;
opacity: 0.6;
animation: particleFloat 20s infinite ease-in-out;
box-shadow: 0 0 10px var(--neon-blue);
}
.particle:nth-child(2n) { background: var(--neon-electric); animation-delay: -5s; }
.particle:nth-child(3n) { background: var(--neon-purple); animation-delay: -10s; }
@keyframes particleFloat {
0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
10% { opacity: 0.6; }
90% { opacity: 0.6; }
100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

.scanline {
position: fixed;
left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
opacity: 0.6;
animation: scanLine 6s linear infinite;
z-index: 100;
pointer-events: none;
box-shadow: 0 0 15px var(--neon-blue);
}
@keyframes scanLine {
0% { top: -2px; opacity: 0; }
5% { opacity: 0.6; }
95% { opacity: 0.6; }
100% { top: 100%; opacity: 0; }
}

.container {
max-width: 1400px;
margin: 0 auto;
padding: 25px 20px;
position: relative;
z-index: 2;
}

/* Header */
.header {
text-align: center;
margin-bottom: 30px;
animation: headerEntrance 1s var(--transition-bloom) backwards;
}
@keyframes headerEntrance {
from { opacity: 0; transform: translateY(-30px); }
to { opacity: 1; transform: translateY(0); }
}

.header-title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(28px, 5vw, 42px);
font-weight: 900;
color: var(--neon-blue);
letter-spacing: 3px;
text-shadow: 0 0 30px rgba(0, 212, 255, 0.7);
margin-bottom: 8px;
}

.header-subtitle {
font-size: 14px;
color: var(--text-secondary);
letter-spacing: 4px;
text-transform: uppercase;
}

/* Tab Navigation */
.tab-navigation {
display: flex;
justify-content: center;
gap: 12px;
margin-bottom: 30px;
flex-wrap: wrap;
}

.tab-btn {
padding: 12px 24px;
background: var(--bg-surface);
border: 2px solid var(--border-glow);
border-radius: 12px;
color: var(--text-secondary);
font-family: 'Orbitron', sans-serif;
font-size: 12px;
font-weight: 600;
cursor: pointer;
transition: var(--transition-smooth);
text-transform: uppercase;
letter-spacing: 1px;
backdrop-filter: blur(10px);
display: flex;
align-items: center;
gap: 8px;
}

.tab-btn:hover {
background: rgba(0, 212, 255, 0.15);
border-color: var(--neon-blue);
transform: translateY(-2px);
}

.tab-btn.active {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(0, 136, 255, 0.2));
border-color: var(--neon-electric);
color: var(--neon-electric);
box-shadow: var(--glow-blue);
}

.tab-btn[data-tab="trycari"] {
border-color: rgba(255, 215, 0, 0.4);
}
.tab-btn[data-tab="trycari"].active {
background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 180, 0, 0.15));
border-color: var(--neon-gold);
color: var(--neon-gold);
box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
}

/* Panel */
.tab-panel { display: none; animation: fadeIn 0.5s ease; }
.tab-panel.active { display: block; }
@keyframes fadeIn {
from { opacity: 0; transform: translateY(15px); }
to { opacity: 1; transform: translateY(0); }
}

/* Mode Toggle */
.mode-toggle {
display: flex;
align-items: center;
justify-content: center;
gap: 15px;
padding: 16px;
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: 16px;
margin-bottom: 25px;
backdrop-filter: blur(15px);
}

.toggle-label {
font-family: 'Orbitron', sans-serif;
font-size: 13px;
color: var(--text-secondary);
letter-spacing: 1px;
}

.switch {
position: relative;
width: 52px;
height: 26px;
}

.switch input { opacity: 0; width: 0; height: 0; }

.slider {
position: absolute;
cursor: pointer;
inset: 0;
background: var(--bg-deep);
border: 2px solid var(--border-glow);
border-radius: 30px;
transition: 0.3s;
}

.slider:before {
position: absolute;
content: "";
height: 18px;
width: 18px;
left: 3px;
bottom: 2px;
background: var(--neon-blue);
border-radius: 50%;
transition: 0.3s;
box-shadow: 0 0 10px var(--neon-blue);
}

input:checked + .slider { border-color: var(--neon-green); }
input:checked + .slider:before {
transform: translateX(26px);
background: var(--neon-green);
box-shadow: 0 0 15px var(--neon-green);
}

.mode-text {
font-size: 13px;
color: var(--neon-blue);
font-weight: 600;
}

/* Input Section */
.input-section {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
margin-bottom: 25px;
}

@media (max-width: 768px) {
.input-section { grid-template-columns: 1fr; }
}

.section-box {
background: var(--bg-surface);
border: 2px solid var(--border-glow);
border-radius: 18px;
padding: 20px;
backdrop-filter: blur(15px);
transition: var(--transition-smooth);
}

.section-box:hover {
border-color: var(--neon-blue);
box-shadow: 0 0 25px rgba(0, 212, 255, 0.2);
}

.section-title {
font-family: 'Orbitron', sans-serif;
font-size: 14px;
font-weight: 700;
color: var(--neon-blue);
margin-bottom: 15px;
padding-bottom: 10px;
border-bottom: 1px solid rgba(0, 212, 255, 0.3);
display: flex;
align-items: center;
gap: 10px;
letter-spacing: 2px;
text-transform: uppercase;
}

.section-title i { font-size: 16px; }

textarea {
width: 100%;
height: 130px;
background: rgba(0, 5, 15, 0.7);
border: 2px solid rgba(0, 212, 255, 0.3);
border-radius: 12px;
padding: 14px;
color: var(--text-primary);
font-family: 'Rajdhani', monospace;
font-size: 13px;
resize: vertical;
outline: none;
transition: var(--transition-fast);
margin-bottom: 15px;
}

textarea:focus {
border-color: var(--neon-blue);
box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
background: rgba(0, 10, 25, 0.9);
}

textarea::placeholder { color: var(--text-dim); }

/* Buttons */
.buttons {
display: flex;
gap: 10px;
flex-wrap: wrap;
}

.neon-btn {
display: inline-flex;
align-items: center;
gap: 8px;
padding: 10px 20px;
background: rgba(0, 212, 255, 0.1);
border: 2px solid var(--neon-blue);
border-radius: 10px;
color: var(--neon-blue);
font-family: 'Rajdhani', sans-serif;
font-weight: 700;
font-size: 13px;
cursor: pointer;
transition: var(--transition-smooth);
text-transform: uppercase;
letter-spacing: 1px;
}

.neon-btn:hover {
background: rgba(0, 212, 255, 0.25);
transform: translateY(-2px);
box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
}

.neon-btn.primary {
background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
color: #000;
border: none;
box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
}

.neon-btn.primary:hover {
box-shadow: 0 0 35px rgba(0, 212, 255, 0.7);
}

.neon-btn.gold {
border-color: var(--neon-gold);
color: var(--neon-gold);
}
.neon-btn.gold:hover {
background: rgba(255, 215, 0, 0.2);
box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
}

/* Result Cards */
.results-container { margin-top: 25px; }

.summary-box {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 136, 255, 0.1));
border: 1px solid var(--neon-blue);
border-radius: 14px;
padding: 15px 20px;
margin-bottom: 20px;
font-family: 'Orbitron', sans-serif;
font-size: 14px;
color: var(--neon-blue);
text-align: center;
backdrop-filter: blur(10px);
}

.user-card, .bank-card {
background: var(--bg-surface);
border: 2px solid var(--border-glow);
border-radius: 18px;
margin-bottom: 18px;
overflow: hidden;
backdrop-filter: blur(15px);
transition: var(--transition-smooth);
animation: cardEnter 0.5s ease forwards;
opacity: 0;
}
.user-card:nth-child(1), .bank-card:nth-child(1) { animation-delay: 0.1s; }
.user-card:nth-child(2), .bank-card:nth-child(2) { animation-delay: 0.15s; }
.user-card:nth-child(3), .bank-card:nth-child(3) { animation-delay: 0.2s; }

@keyframes cardEnter {
to { opacity: 1; }
}

.user-card:hover, .bank-card:hover {
border-color: var(--neon-blue);
box-shadow: 0 10px 40px rgba(0, 212, 255, 0.25);
transform: translateY(-3px);
}

.card-header {
padding: 14px 18px;
font-family: 'Orbitron', sans-serif;
font-size: 15px;
font-weight: 700;
color: var(--neon-electric);
background: linear-gradient(90deg, rgba(0, 212, 255, 0.15), transparent);
border-bottom: 1px solid rgba(0, 212, 255, 0.3);
text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
}

.card-body {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 15px;
padding: 18px;
}

@media (max-width: 600px) {
.card-body { grid-template-columns: 1fr; }
}

.col-title {
display: flex;
justify-content: space-between;
align-items: center;
font-size: 12px;
color: var(--text-secondary);
margin-bottom: 10px;
padding-bottom: 8px;
border-bottom: 1px solid rgba(0, 212, 255, 0.25);
text-transform: uppercase;
letter-spacing: 1px;
}

.entry-list {
list-style: none;
max-height: 100px;
overflow-y: auto;
margin-bottom: 12px;
}

.entry-list::-webkit-scrollbar { width: 4px; }
.entry-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
.entry-list::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 2px; }

.entry-item {
background: rgba(0, 15, 35, 0.6);
padding: 8px 12px;
margin-bottom: 6px;
border-radius: 8px;
font-size: 12px;
border: 1px solid rgba(0, 212, 255, 0.15);
}

.total-row {
display: flex;
justify-content: space-between;
padding-top: 10px;
border-top: 1px dashed rgba(0, 212, 255, 0.3);
}

.total-label {
font-size: 12px;
color: var(--text-secondary);
font-weight: 600;
}

.total-value {
font-family: 'Orbitron', sans-serif;
font-size: 14px;
font-weight: 700;
}

.deposit-color { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }
.withdraw-color { color: var(--neon-gold); text-shadow: 0 0 8px var(--neon-gold); }

.withdraw-note {
font-size: 10px;
color: var(--text-dim);
margin-top: 4px;
padding-left: 8px;
border-left: 2px solid var(--neon-gold);
}

/* Selisih Status */
.selisih-besar {
font-family: 'Orbitron', sans-serif;
font-size: 15px;
font-weight: 700;
text-align: center;
padding: 10px;
margin: 0 18px 5px;
border-radius: 10px;
animation: neonPulse 2s infinite;
}

.selisih-jumlah {
font-family: 'Orbitron', sans-serif;
font-size: 20px;
font-weight: 900;
text-align: center;
padding-bottom: 15px;
}

.selisih-cocok { color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }
.selisih-lebih { color: var(--neon-gold); text-shadow: 0 0 15px var(--neon-gold); }
.selisih-kurang { color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red); }

@keyframes neonPulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.7; }
}

/* Extractor Horizontal */
.extract-h-container {
display: flex;
gap: 15px;
overflow-x: auto;
padding: 15px 0;
scrollbar-width: thin;
scrollbar-color: var(--neon-blue) rgba(0,0,0,0.3);
}

.extract-h-container::-webkit-scrollbar { height: 6px; }
.extract-h-container::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 3px; }

.extract-h-card {
min-width: 240px;
background: var(--bg-elevated);
border: 1px solid var(--border-glow);
border-radius: 12px;
padding: 15px;
flex-shrink: 0;
transition: var(--transition-fast);
}

.extract-h-card:hover {
border-color: var(--neon-blue);
box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
transform: translateY(-3px);
}

.extract-h-card .label {
font-size: 10px;
color: var(--neon-blue);
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 5px;
opacity: 0.8;
}

.extract-h-card .value {
font-family: 'Rajdhani', monospace;
font-size: 14px;
color: var(--text-primary);
word-break: break-all;
line-height: 1.4;
font-weight: 600;
}

/* Tables for Try Cari */
.table-wrapper {
overflow-x: auto;
border-radius: 12px;
border: 1px solid var(--border-glow);
margin-top: 20px;
}

table {
width: 100%;
border-collapse: collapse;
font-size: 13px;
}

th {
background: rgba(0, 30, 60, 0.8);
padding: 12px 15px;
text-align: left;
font-family: 'Orbitron', sans-serif;
font-size: 11px;
color: var(--neon-blue);
text-transform: uppercase;
letter-spacing: 1px;
border-bottom: 2px solid var(--border-glow);
white-space: nowrap;
}

td {
padding: 10px 15px;
border-bottom: 1px solid rgba(0, 212, 255, 0.15);
color: var(--text-secondary);
}

tr:hover td { background: rgba(0, 212, 255, 0.05); }

tr.cocok td { background: rgba(0, 255, 157, 0.1); }
tr.tidak-cocok td { background: rgba(255, 62, 108, 0.1); }

/* Toast */
#toast-container {
position: fixed;
bottom: 25px;
right: 25px;
z-index: 10000;
display: flex;
flex-direction: column;
gap: 10px;
}

.toast {
padding: 14px 22px;
border-radius: 12px;
font-weight: 600;
font-size: 13px;
box-shadow: 0 5px 25px rgba(0,0,0,0.5);
backdrop-filter: blur(10px);
max-width: 320px;
animation: toastSlide 0.4s ease;
display: flex;
align-items: center;
gap: 10px;
border-left: 4px solid;
}

@keyframes toastSlide {
from { transform: translateX(120%); opacity: 0; }
to { transform: translateX(0); opacity: 1; }
}

.toast.success { background: rgba(0, 50, 30, 0.9); color: var(--neon-green); border-color: var(--neon-green); }
.toast.warning { background: rgba(50, 40, 0, 0.9); color: var(--neon-gold); border-color: var(--neon-gold); }
.toast.error { background: rgba(50, 0, 10, 0.9); color: var(--neon-red); border-color: var(--neon-red); }

.toast i { font-size: 16px; }

/* Responsive */
@media (max-width: 768px) {
.container { padding: 15px 12px; }
.header-title { font-size: 24px; }
.tab-btn { padding: 10px 16px; font-size: 11px; }
.section-box { padding: 15px; }
}
</style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="grid-overlay"></div>
<div class="particles" id="particles"></div>
<div class="scanline"></div>

<div id="toast-container"></div>

<div class="container">
<header class="header">
<h1 class="header-title"><i class="fas fa-bolt"></i> MULTI-TOOL ANALYZER</h1>
<p class="header-subtitle">Line Togel Electric System 2026</p>
</header>

<nav class="tab-navigation">
<button class="tab-btn active" data-tab="analyzer">
<i class="fas fa-exchange-alt"></i> Deposit vs Withdraw
</button>
<button class="tab-btn" data-tab="extractor">
<i class="fas fa-file-export"></i> Withdraw Manual
</button>
<button class="tab-btn" data-tab="trycari">
<i class="fas fa-search-dollar"></i> Deposit Manual
</button>
</nav>

<!-- PANEL 1: ANALYZER -->
<div id="panel-analyzer" class="tab-panel active">
<div class="mode-toggle">
<span class="toggle-label">Mode Analisis:</span>
<label class="switch">
<input type="checkbox" id="modeToggle">
<span class="slider"></span>
</label>
<span class="mode-text" id="modeText">Per Pengguna</span>
</div>

<div class="input-section">
<div class="section-box">
<h3 class="section-title"><i class="fas fa-download"></i> Data Deposit</h3>
<textarea id="dataDeposit" placeholder="Contoh format:
Depo BCA / ADIV ARYA ATMAJA    100.000
DEPO MYBCA / MIA    250.000"></textarea>
<div class="buttons">
<button class="neon-btn" onclick="clearDeposit()"><i class="fas fa-trash"></i> Hapus</button>
<button class="neon-btn" onclick="loadDeposit()"><i class="fas fa-cloud-download-alt"></i> Ambil Data</button>
</div>
</div>

<div class="section-box">
<h3 class="section-title"><i class="fas fa-upload"></i> Data Withdraw</h3>
<textarea id="dataWithdraw" placeholder="Format: [Keterangan] [Nominal] [Sumber]
Contoh:
PENGIRIMAN DANA    100.000    BCA / ADIV"></textarea>
<div class="buttons">
<button class="neon-btn" onclick="clearWithdraw()"><i class="fas fa-trash"></i> Hapus</button>
<button class="neon-btn" onclick="loadWithdraw()"><i class="fas fa-cloud-download-alt"></i> Ambil Data</button>
</div>
</div>
</div>

<div style="text-align:center; margin-bottom: 25px;">
<button class="neon-btn primary" onclick="prosesDepositWithdraw()">
<i class="fas fa-bolt"></i> PROSES ANALISIS
</button>
</div>

<div id="hasilDepoWd" class="results-container"></div>
</div>

<!-- PANEL 2: EXTRACTOR -->
<div id="panel-extractor" class="tab-panel">
<div class="section-box">
<h3 class="section-title"><i class="fas fa-file-export"></i> Extract 100 Data Withdraw</h3>
<textarea id="bulkExtractInput" style="height:110px;" placeholder="Tempel data di sini. Setiap entri dimulai dengan angka urut."></textarea>
<div class="buttons">
<button class="neon-btn" onclick="clearBulkExtract()"><i class="fas fa-trash"></i> Hapus</button>
<button class="neon-btn" onclick="processBulkExtract()"><i class="fas fa-cogs"></i> Proses</button>
<button class="neon-btn gold" onclick="copyBulkExtracted()"><i class="fas fa-copy"></i> Copy Semua</button>
</div>
<div id="bulkResultsContainer" class="extract-h-container"></div>
</div>
</div>

<!-- PANEL 3: TRY CARI -->
<div id="panel-trycari" class="tab-panel">
<div class="input-section">
<div class="section-box">
<h3 class="section-title"><i class="fas fa-file-alt"></i> Data dari DOCS</h3>
<textarea id="dataDocs" placeholder="Paste data DOCS (4 kolom dipisah TAB)..."></textarea>
<div class="buttons">
<button class="neon-btn" onclick="clearField('dataDocs')"><i class="fas fa-trash"></i> Hapus</button>
</div>
</div>

<div class="section-box">

// === ANALYZER LOGIC ===
const SHEET_ID = '1JF1Mp58d4q6m3D0BLAxaQxxEUduXLFsp5em8Ww6MaNo';

function formatRupiah(n) {
if (n == null || n === 0) return '0';
return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function parseSheetResponse(text) {
try {
const s = text.indexOf('{'), e = text.lastIndexOf('}') + 1;
const data = JSON.parse(text.substring(s, e));
return data.table?.rows?.map(r => r.c?.map(c => c?.v ?? '').join('\t') || '') || [];
} catch { return []; }
}

async function loadDeposit() {
showToast('Mengambil data deposit...', 'info');
try {
const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID_DEPOSIT}&range=A102:B250`);

.filter(l => l.split('\t').filter(x => x.trim()).length >= 2)
.map(l => {

function detectBank(t) {
const u = (t || '').toUpperCase();
return BANK_LIST.find(b => u.includes(b)) || 'LAINNYA';
}

function extractName(t) {
let c = t.trim(), i = c.toUpperCase().indexOf('DEPO ');
if (i !== -1) c = c.substring(i + 5).trim();
const s = c.lastIndexOf('/');
return s !== -1 ? c.substring(s + 1).trim() : c;
}

function parseLine(l, isWd = false) {
l = l.trim();
if (!l) return null;
const p = l.split('\t').map(x => x.trim()).filter(x => x);
if (p.length < 2) return null;
if (isWd) {
const [k, nRaw, src] = p;
const num = parseInt(nRaw.replace(/[^0-9]/g, '')) || 0;
return { nama: extractName(src || k), bank: detectBank(src || k), nominalRaw: formatRupiah(num), nominalClean: num, asli: l, note: k };
} else {
const [desc, nRaw] = p;
const num = parseInt(nRaw.replace(/[^0-9]/g, '')) || 0;
return { nama: extractName(desc), bank: detectBank(desc), nominalRaw: formatRupiah(num), nominalClean: num, asli: l, note: '' };
}
}

function prosesDepositWithdraw() {
const d = document.getElementById('dataDeposit').value.trim();
const w = document.getElementById('dataWithdraw').value.trim();
if (!d || !w) {
showToast("Harap isi kedua kolom data!", "warning");
return;
}

const depo = d.split('\n').map(l => parseLine(l, false)).filter(Boolean);
const wd = w.split('\n').map(l => parseLine(l, true)).filter(Boolean);
if (!depo.length || !wd.length) {
showToast("Format data tidak valid!", "error");
return;
}

modePerBank ? analisisPerBank(depo, wd) : analisisPerPengguna(depo, wd);
}

function analisisPerPengguna(depo, wd) {
const dTot = {}, wTot = {}, dDet = {}, wDet = {};
depo.forEach(i => {
const k = i.nama.toLowerCase().trim();
dTot[k] = (dTot[k] || 0) + i.nominalClean;
(dDet[k] = dDet[k] || []).push(i);
});
wd.forEach(i => {
const k = i.nama.toLowerCase().trim();
wTot[k] = (wTot[k] || 0) + i.nominalClean;
(wDet[k] = wDet[k] || []).push(i);
});

const names = [...new Set([...Object.keys(dTot), ...Object.keys(wTot)])];
const results = names.map(k => {
const n = dDet[k] ? depo.find(x => x.nama.toLowerCase() === k)?.nama : wd.find(x => x.nama.toLowerCase() === k)?.nama || k;
const d = dTot[k] || 0, w = wTot[k] || 0, diff = d - w;
let selisihKet, selisihClass;
if (d > 0 && w > 0) {
if (diff === 0) { selisihKet = "COCOK"; selisihClass = "selisih-cocok"; }
else if (diff > 0) { selisihKet = "LEBIH DEPOSIT"; selisihClass = "selisih-lebih"; }
else { selisihKet = "KURANG DEPOSIT"; selisihClass = "selisih-kurang"; }
} else {
selisihKet = "TIDAK LENGKAP"; selisihClass = "selisih-kurang";
}
return { nama: n, depo: d, wd: w, diff, selisihKet, selisihClass, dEntries: dDet[k] || [], wEntries: wDet[k] || [] };
});

renderPerPengguna(results);
}

function analisisPerBank(depo, wd) {
const dByBank = {}, wByBank = {}, dEntries = {}, wEntries = {};
[...BANK_LIST, 'LAINNYA'].forEach(b => {
dByBank[b] = 0; wByBank[b] = 0; dEntries[b] = []; wEntries[b] = [];
});
depo.forEach(i => { dByBank[i.bank] += i.nominalClean; dEntries[i.bank].push(i); });
wd.forEach(i => { wByBank[i.bank] += i.nominalClean; wEntries[i.bank].push(i); });

const results = [...BANK_LIST, 'LAINNYA']
.map(bank => {
const d = dByBank[bank], w = wByBank[bank], diff = d - w;
if (d === 0 && w === 0) return null;
let selisihKet, selisihClass;
if (d > 0 && w > 0) {
if (diff === 0) { selisihKet = "COCOK"; selisihClass = "selisih-cocok"; }
else if (diff > 0) { selisihKet = "LEBIH DEPOSIT"; selisihClass = "selisih-lebih"; }
else { selisihKet = "KURANG DEPOSIT"; selisihClass = "selisih-kurang"; }
} else {
selisihKet = "TIDAK LENGKAP"; selisihClass = "selisih-kurang";
}
return { bank, depo: d, wd: w, diff, selisihKet, selisihClass, dEntries: dEntries[bank], wEntries: wEntries[bank] };
})
.filter(Boolean);
renderPerBank(results);
}

// === EXTRACTOR LOGIC ===
const E_WALLET_CODES = { 'DANA': '3901', 'OVO': '39358', 'LINKAJA': '09110', 'GOPAY': '70001' };

function clearBulkExtract() {
document.getElementById('bulkExtractInput').value = '';
document.getElementById('bulkResultsContainer').innerHTML = '';
showToast('Data extractor dihapus', 'success');
}

function copyBulkExtracted() {
const container = document.getElementById('bulkResultsContainer');
if (!container.children.length) {
showToast("Tidak ada data untuk disalin!", "warning");
return;
}

const items = Array.from(container.querySelectorAll('.extract-h-card'));
let text = '';
items.forEach(card => {
const vals = card.querySelectorAll('.value');
if (vals.length >= 4) {
text += `${vals[0].textContent.trim()}\t${vals[1].textContent.trim()}\t${vals[2].textContent.trim()}\t${vals[3].textContent.trim()}\n`;
}
});
navigator.clipboard.writeText(text.trim()).then(() => {
showToast("Data berhasil disalin!", "success");
}, () => {
showToast("Gagal menyalin ke clipboard.", "error");
});
}

function splitIntoBlocks(text) {
const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
const blocks = [];
let currentBlock = [];

for (const line of lines) {
if (/^\d+(\s|\t|$)/.test(line)) {
if (currentBlock.length > 0) { blocks.push(currentBlock); }
currentBlock = [line];
} else {
currentBlock.push(line);
}
}
if (currentBlock.length > 0) { blocks.push(currentBlock); }
return blocks;
}

function parseSingleWithdrawBlock(lines) {
lines = lines.map(l => l.trim()).filter(l => l !== '');
let account = '–', username = '–', name = '–', nominal = '–';

if (lines.length > 0) {
const firstLine = lines[0];
if (firstLine.includes('\t')) {
const parts = firstLine.split('\t').filter(p => p.trim() !== '');
if (parts.length >= 2) { username = parts[1].trim(); }
} else {
const parts = firstLine.split(/\s+/);
if (parts.length >= 2) { username = parts[1].trim(); }
}
}

for (let i = 0; i < lines.length; i++) {
if (lines[i].toUpperCase().includes('WITHDRAW')) {
const parts = lines[i].split('\t').filter(p => p.trim() !== '');
if (parts.length >= 3) {
nominal = parts[2].trim().replace(/\s+/g, '');
}
break;
}
}

for (let i = lines.length - 1; i >= 0; i--) {
const line = lines[i];
if (line.includes(',')) {
const parts = line.split(',').map(p => p.trim());
if (parts.length >= 3) { name = parts[2].toUpperCase(); }
else if (parts.length === 2) { name = parts[1].toUpperCase(); }

const bankType = parts[0].toUpperCase();
let accountNumber = '';
if (parts.length >= 2) { accountNumber = parts[1].replace(/\D/g, ''); }

if (E_WALLET_CODES.hasOwnProperty(bankType)) {
account = E_WALLET_CODES[bankType] + accountNumber;
} else {
account = accountNumber || '–';
}
break;
}
}

if (nominal !== '–') {
nominal = nominal.replace(/[^\d,.]/g, '');
if (!nominal.includes(',') && !nominal.includes('.')) {
const num = parseInt(nominal.replace(/\D/g, ''));
if (!isNaN(num) && num > 0) { nominal = formatRupiah(num); }
}
}

return { account, username, name, nominal };
}

function processBulkExtract() {
const input = document.getElementById('bulkExtractInput').value;
if (!input.trim()) {
clearBulkExtract();
return;
}

const blocks = splitIntoBlocks(input);
const container = document.getElementById('bulkResultsContainer');
container.innerHTML = '';

const limitedBlocks = blocks.slice(0, 100);
limitedBlocks.forEach(block => {
const data = parseSingleWithdrawBlock(block);
const card = document.createElement('div');
card.className = 'extract-h-card';
card.innerHTML = `
<div class="label">Rekening</div>
<div class="value">${data.account}</div>
<div class="label">User ID</div>
<div class="value">${data.username}</div>
<div class="label">Nama</div>
<div class="value">${data.name}</div>
<div class="label">Nominal</div>
<div class="value">${data.nominal}</div>
`;
container.appendChild(card);
});
showToast(`${limitedBlocks.length} data berhasil diekstrak`, 'success');
}

// === TRY CARI LOGIC ===
function parseData_TRYCARI(raw) {
return raw.split('\n').map(line => line.trim()).filter(line => line).map(line => {
const parts = line.split('\t').map(p => p.trim());
if (parts.length >= 4) {
return { jam: parts[0], userID: parts[1], nama: parts[2], nominal: parts[3] };
}
return null;
}).filter(row => row !== null);
}

function prosesData_TRYCARI() {
const rawDataDocs = document.getElementById('dataDocs').value;
const rawDataAdmin = document.getElementById('dataAdmin').value;

if (!rawDataDocs.trim() || !rawDataAdmin.trim()) {
document.getElementById('hasil_TRYCARI').innerHTML = '';
showToast("Harap isi data di kedua kolom!", "warning");
return;
}

const dataDocs = parseData_TRYCARI(rawDataDocs);
const dataAdmin = parseData_TRYCARI(rawDataAdmin);

if (dataDocs.length === 0 || dataAdmin.length === 0) {
document.getElementById('hasil_TRYCARI').innerHTML = '';
showToast("Format data tidak valid!", "error");
return;
}

const adminKeyList = dataAdmin.map(row => {
const userIDClean = String(row.userID).toLowerCase().trim();
const nominalClean = String(row.nominal).replace(/[^0-9]/g, '');
return `${userIDClean}|${nominalClean}`;
});

const adminCountMap = {};
adminKeyList.forEach(key => { adminCountMap[key] = (adminCountMap[key] || 0) + 1; });

const adminNominalMap = {};
dataAdmin.forEach(row => {
const userIDClean = String(row.userID).toLowerCase().trim();
const nominalClean = String(row.nominal).replace(/[^0-9]/g, '');
const key = `${userIDClean}|${nominalClean}`;
if (!adminNominalMap[key]) { adminNominalMap[key] = row.nominal; }
});

const results = [];
dataDocs.forEach(row => {
const { jam, userID, nama, nominal } = row;
const userIDClean = String(userID).toLowerCase().trim();
const nominalClean = String(nominal).replace(/[^0-9]/g, '');
const key = `${userIDClean}|${nominalClean}`;

let status, kelas, nominalDiAdmin = '–';

if (adminCountMap[key] > 0) {
adminCountMap[key]--;
status = 'COCOK';
kelas = 'cocok';
nominalDiAdmin = adminNominalMap[key] || nominal;
} else {
status = 'TIDAK COCOK';
kelas = 'tidak-cocok';
}

results.push({ jam, userID, nama, nominal, nominalDiAdmin, status, kelas });
});

const usageCount = {};
adminKeyList.forEach(key => { usageCount[key] = (usageCount[key] || 0) + 1; });

for (const key in adminCountMap) {
const used = (usageCount[key] || 0) - adminCountMap[key];
usageCount[key] = used;
}

const adminRowsWithStatus = dataAdmin.map(row => {
const userIDClean = String(row.userID).toLowerCase().trim();
const nominalClean = String(row.nominal).replace(/[^0-9]/g, '');
const key = `${userIDClean}|${nominalClean}`;
const isUsed = usageCount[key] > 0;
if (isUsed) usageCount[key]--;
return { ...row, isUsed };
});

const totalDocs = dataDocs.length;
const totalAdmin = dataAdmin.length;
const totalCocok = results.filter(r => r.status === 'COCOK').length;
const totalTidakCocok = totalDocs - totalCocok;

let html = `<div class="input-section">`;

// DOCS Table
html += `
<div class="section-box">
<h3 class="section-title"><i class="fas fa-file-alt"></i> Data DOCS (Analisis)</h3>
<div class="table-wrapper">
<table>
<thead>
<tr>
<th>JAM</th><th>USER ID</th><th>NOMINAL</th><th>NOMINAL ADMIN</th><th>STATUS</th>
</tr>
</thead>
<tbody>
`;

results.forEach(row => {
html += `
<tr class="${row.kelas}">
<td>${row.jam}</td>
<td style="font-weight:700;">${row.userID}</td>
<td>${row.nominal}</td>
<td>${row.nominalDiAdmin}</td>
<td style="font-weight:700; color:var(${row.status === 'COCOK' ? '--neon-green' : '--neon-red'})">${row.status}</td>
</tr>
`;
});

html += `</tbody></table></div>`;

html += `
<div style="margin-top:15px; padding:15px; background:rgba(0,15,30,0.7); border-radius:10px; font-size:13px;">
<strong style="color:var(--neon-blue);">Ringkasan:</strong><br>
Total DOCS: <strong>${totalDocs}</strong> | Total ADMIN: <strong>${totalAdmin}</strong><br>
<span style="color:var(--neon-green);">COCOK: ${totalCocok}</span> | <span style="color:var(--neon-red);">TIDAK COCOK: ${totalTidakCocok}</span>
</div>
</div>`;

// ADMIN Table
html += `
<div class="section-box">
<h3 class="section-title"><i class="fas fa-user-shield"></i> Data ADMIN (Referensi)</h3>
<div class="table-wrapper">
<table>
<thead>
<tr>
<th>JAM</th><th>USER ID</th><th>NAMA</th><th>NOMINAL</th><th>STATUS</th>
</tr>
</thead>
<tbody>
`;

adminRowsWithStatus.forEach(row => {
const statusText = row.isUsed ? 'Dipakai' : 'Tidak Terpakai';
const statusColor = row.isUsed ? 'var(--neon-green)' : 'var(--text-dim)';
html += `

</tr>
`;
});

html += `</tbody></table></div></div></div>`;

document.getElementById('hasil_TRYCARI').innerHTML = html;
showToast(`Analisis selesai: ${totalCocok} cocok dari ${totalDocs} entri`, 'success');
}

// === TAB SWITCH ===
document.querySelectorAll('.tab-btn').forEach(btn => {
btn.addEventListener('click', () => {
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
const target = btn.dataset.tab;

document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
document.getElementById(`panel-${target}`).classList.add('active');
});
});

// Init
document.addEventListener('DOMContentLoaded', () => {
showToast("Sistem Analyzer siap digunakan", "success");
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>📊 REPORT LINE - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-cyan: #00d4ff;
--neon-blue: #0099ff;
--neon-electric: #00ffff;
--neon-purple: #9d00ff;
--neon-pink: #ff00aa;
--neon-green: #00ff9d;
--neon-yellow: #ffe600;
--neon-red: #ff3e6c;
--bg-dark: #000810;
--bg-card: rgba(0, 20, 50, 0.75);
--bg-card-hover: rgba(0, 40, 100, 0.9);
--bg-panel: rgba(0, 12, 32, 0.95);
--text-main: #00f5ff;
--text-secondary: #66e5ff;
--text-dim: #33cccc;
--border-glow: rgba(0, 212, 255, 0.6);
--electric-glow: 0 0 10px #00d4ff, 0 0 25px #00d4ff, 0 0 50px #00d4ff;
--transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
--transition-normal: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
--transition-bloom: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-dark);
color: var(--text-main);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
}

/* ========== BACKGROUND EFFECTS ========== */
.cyber-bg {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background:
radial-gradient(ellipse at 20% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
radial-gradient(ellipse at 80% 20%, rgba(157, 0, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 50% 50%, rgba(0, 255, 255, 0.08) 0%, transparent 60%),
linear-gradient(180deg, #000810 0%, #001133 40%, #000518 100%);
z-index: -3;
animation: bgPulse 15s ease-in-out infinite;
}
@keyframes bgPulse {
0%, 100% { opacity: 1; filter: hue-rotate(0deg); }
50% { opacity: 0.95; filter: hue-rotate(15deg); }
}

.grid-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background-image:
linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
background-size: 50px 50px;
z-index: -2;
animation: gridFloat 40s linear infinite;
pointer-events: none;
}
@keyframes gridFloat {
0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
}

.particles {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
z-index: -1;
pointer-events: none;
}

.scan-line {
position: fixed;
top: 0; left: 0; width: 100%; height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-cyan), transparent);
opacity: 0.5;
animation: scanDown 10s linear infinite;
z-index: 1;
pointer-events: none;
box-shadow: 0 0 25px var(--neon-cyan), 0 0 50px var(--neon-electric);
}
@keyframes scanDown {
0% { top: -10%; opacity: 0; }
10% { opacity: 0.5; }
90% { opacity: 0.5; }
100% { top: 110%; opacity: 0; }
}

.container {
max-width: 1000px;
margin: 0 auto;
padding: 20px 15px;
min-height: 100vh;
display: flex;
flex-direction: column;
position: relative;
z-index: 2;
}

/* ========== HEADER ========== */
.header {
text-align: center;
margin-bottom: 40px;
padding: 40px 15px;
position: relative;
}
.header::before {
content: '';
position: absolute;
bottom: 0; left: 50%;
transform: translateX(-50%);
width: 90%;
height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-electric), var(--neon-purple), var(--neon-cyan), transparent);
animation: glowLine 3s ease-in-out infinite;
box-shadow: 0 0 20px var(--neon-cyan);
}
@keyframes glowLine {
0%, 100% { opacity: 0.6; }
50% { opacity: 1; box-shadow: 0 0 30px var(--neon-electric), 0 0 60px var(--neon-cyan); }
}

.back-btn {
position: absolute;
left: 0; top: 50%;
transform: translateY(-50%);
background: rgba(0, 212, 255, 0.2);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 10px 18px;
border-radius: 12px;
text-decoration: none;
font-weight: 600;
font-size: 13px;
display: flex;
align-items: center;
gap: 8px;
transition: var(--transition-normal);
backdrop-filter: blur(10px);
box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
}
.back-btn:hover {
background: rgba(0, 212, 255, 0.35);
transform: translateY(-50%) translateX(-4px);
box-shadow: var(--electric-glow);
}

.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(28px, 6vw, 42px);
font-weight: 900;
background: linear-gradient(90deg, #00d4ff, #00ffff, #9d00ff, #00d4ff, #ff00aa, #00d4ff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-size: 400% 400%;
animation: neonFlow 4s ease infinite, textPulse 2s ease-in-out infinite alternate;
text-shadow: 0 0 30px rgba(0, 212, 255, 0.8), 0 0 60px rgba(0, 212, 255, 0.5);
margin-bottom: 12px;
letter-spacing: 2px;
position: relative;
}
@keyframes neonFlow {
0%, 100% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
}
@keyframes textPulse {
0% { filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.6)); }
100% { filter: drop-shadow(0 0 40px rgba(0, 255, 255, 1)); }
}

.subtitle {
font-size: 16px;
color: var(--text-secondary);
text-shadow: 0 0 12px rgba(0, 212, 255, 0.8);
letter-spacing: 3px;
opacity: 0.95;
text-transform: uppercase;
}

.status-badge {
display: inline-flex;
align-items: center;
gap: 10px;
background: rgba(0, 255, 157, 0.15);
border: 2px solid rgba(0, 255, 157, 0.6);
padding: 8px 18px;
border-radius: 25px;
font-size: 12px;
color: var(--neon-green);
margin-top: 15px;
box-shadow: 0 0 20px rgba(0, 255, 157, 0.5), inset 0 0 15px rgba(0, 255, 157, 0.2);
animation: badgeGlow 2.5s infinite;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 2px;
}
@keyframes badgeGlow {
0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 157, 0.5), inset 0 0 15px rgba(0, 255, 157, 0.2); }
50% { box-shadow: 0 0 30px rgba(0, 255, 157, 0.9), inset 0 0 25px rgba(0, 255, 157, 0.4); }
}
.status-dot {
width: 10px; height: 10px;
background: var(--neon-green);
border-radius: 50%;
animation: pulse 2s infinite;
box-shadow: 0 0 15px var(--neon-green), 0 0 30px var(--neon-green);
}
@keyframes pulse {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.4); opacity: 0.7; }
}

/* ========== REPORT LIST ========== */
.report-list {
display: flex;
flex-direction: column;
gap: 20px;
}

/* ========== REPORT CARD ========== */
.report-card {
background: var(--bg-card);
border: 2px solid var(--border-glow);
border-radius: 20px;
padding: 25px;
transition: var(--transition-bloom);
position: relative;
overflow: hidden;
backdrop-filter: blur(20px);
animation: cardEnter 0.5s ease forwards;
opacity: 0;
transform: translateY(25px);
box-shadow: 0 5px 25px rgba(0, 212, 255, 0.15);
}
@keyframes cardEnter {
to { opacity: 1; transform: translateY(0); }
}

.report-card::before {
content: '';
position: absolute;
top: 0; left: 0;
width: 5px; height: 100%;
background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-electric), var(--neon-purple));
box-shadow: 0 0 20px var(--neon-cyan);
transition: var(--transition-normal);
}

.report-card:hover {
background: var(--bg-card-hover);
transform: translateY(-6px) scale(1.01);
border-color: var(--neon-electric);
box-shadow:
0 20px 50px rgba(0, 212, 255, 0.35),
0 0 50px rgba(0, 255, 255, 0.25),
inset 0 0 30px rgba(0, 212, 255, 0.15);
}
.report-card:hover::before {
width: 7px;
box-shadow: 0 0 30px var(--neon-electric);
}

.card-section {
margin-bottom: 15px;
}
.card-section:last-child {
margin-bottom: 0;
}

.label {
font-family: 'Orbitron', sans-serif;
font-size: 12px;
color: var(--neon-yellow);
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 5px;
display: flex;
align-items: center;
gap: 8px;
text-shadow: 0 0 8px rgba(255, 230, 0, 0.5);
}

.content-row {
display: flex;
justify-content: space-between;
align-items: flex-start;
gap: 15px;
background: rgba(0, 15, 40, 0.5);
padding: 12px;
border-radius: 10px;
border-left: 3px solid var(--neon-cyan);
}

.content-text {
flex: 1;
color: var(--text-secondary);
font-size: 15px;
white-space: pre-wrap; /* Preserve formatting */
word-break: break-word;
line-height: 1.6;
}

.btn-copy {
background: rgba(0, 212, 255, 0.2);
border: 1px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 6px 12px;
border-radius: 6px;
cursor: pointer;
font-size: 12px;
font-weight: 600;
transition: var(--transition-fast);
white-space: nowrap;
display: flex;
align-items: center;
gap: 5px;
}
.btn-copy:hover {
background: rgba(0, 212, 255, 0.4);
box-shadow: 0 0 10px var(--neon-cyan);
}
.btn-copy.copied {
background: var(--neon-green);
color: #000;
border-color: var(--neon-green);
}

/* Special Styling for Tujuan/Memo (Column C) */
.card-section.memo .content-row {
border-left-color: var(--neon-purple);
background: rgba(157, 0, 255, 0.1);
}
.card-section.memo .label {
color: var(--neon-pink);
}

/* ========== LOADING & STATES ========== */
.loading, .no-data, .error-msg {
text-align: center;
padding: 60px 25px;
}
.loading {
color: var(--neon-cyan);
}
.loading-spinner {
width: 50px; height: 50px;
border: 4px solid rgba(0, 212, 255, 0.2);
border-top-color: var(--neon-electric);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 18px;
box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
}
@keyframes spin {
to { transform: rotate(360deg); }
}
.error-msg {
color: var(--neon-red);
background: rgba(255, 62, 108, 0.1);
border-radius: 16px;
border: 2px solid var(--neon-red);
padding: 40px;
box-shadow: 0 0 30px rgba(255, 62, 108, 0.3);
}

/* ========== TOAST ========== */
.toast {
position: fixed;
bottom: 35px;
right: 35px;
background: rgba(0, 12, 32, 0.98);
border: 2.5px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 16px 28px;
border-radius: 14px;
font-weight: 600;
font-size: 14px;
z-index: 10000;
display: flex;
align-items: center;
gap: 12px;
box-shadow: 0 0 35px rgba(0, 212, 255, 0.6), 0 0 70px rgba(0, 212, 255, 0.3);
transform: translateX(200px);
opacity: 0;
transition: var(--transition-normal);
backdrop-filter: blur(15px);
}
.toast.show {
transform: translateX(0);
opacity: 1;
}
.toast i {
font-size: 20px;
text-shadow: 0 0 12px rgba(0, 212, 255, 0.9);
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar {
width: 8px;
}
::-webkit-scrollbar-track {
background: rgba(0, 10, 30, 0.6);
}
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon-cyan), var(--neon-electric));
border-radius: 4px;
box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
}
::selection {
background: rgba(0, 212, 255, 0.4);
color: var(--text-main);
}

@media (max-width: 768px) {
.container { padding: 16px 12px; }
.back-btn { position: relative; top: 0; left: 0; transform: none; margin-bottom: 20px; justify-content: center; }
.header { padding-top: 0; }
}
</style>
</head>
<body>
<div class="cyber-bg"></div>
<div class="grid-overlay"></div>
<div class="particles" id="particles"></div>
<div class="scan-line"></div>

<div class="container">
<header class="header">
<a href="index.html" class="back-btn">
<i class="fas fa-arrow-left"></i> Kembali
</a>
<!-- Dynamic Title will be inserted here -->
<h1 class="title" id="pageTitle">REPORT LINE</h1>
<h2 class="subtitle" id="pageSubtitle">MEMUAT DATA...</h2>
<div class="status-badge">
<span class="status-dot"></span>
<span>SYSTEM ONLINE</span>
</div>
</header>

<div id="reportContainer">
<div class="loading">
<div class="loading-spinner"></div>
<p>⏳ Menghubungi database...</p>
<p style="font-size: 12px; opacity: 0.7; margin-top: 8px;">Mengambil data dari Google Sheets</p>
</div>
</div>
</div>

<div id="toast" class="toast">
<i class="fas fa-check-circle"></i>
<span id="toastMessage">Notifikasi</span>
</div>

<script>
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '508399522';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

async function loadReportData() {
try {
const response = await fetch(DATA_URL);
const text = await response.text();
const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
if (!jsonMatch) throw new Error('Gagal parse data');
const data = JSON.parse(jsonMatch[1]);
const rows = data.table?.rows || [];

if (rows.length === 0) throw new Error('Data kosong');

// 1. Process Header (Row 1)
// A1 = Main Title, B1 = Subtitle
const headerRow = rows[0];
const mainTitle = headerRow.c[0]?.v?.toString().trim() || "REPORT LINE";
const mainSubtitle = headerRow.c[1]?.v?.toString().trim() || "DATA REPORT";

document.getElementById('pageTitle').textContent = mainTitle;
document.getElementById('pageSubtitle').textContent = mainSubtitle;
document.title = `${mainTitle} - ${mainSubtitle}`;

// 2. Process Body (Row 2 onwards)
const allReports = [];
// Start from index 1 (second row) assuming row 1 is header
for (let i = 1; i < rows.length; i++) {
const row = rows[i];
const c = row.c;

// Get values from columns A, B, C
const judul = c[0]?.v?.toString().trim() || '';
const isi = c[1]?.v?.toString().trim() || '';
const memo = c[2]?.v?.toString().trim() || '';

// Ignore empty rows (if A, B, and C are empty)
if (!judul && !isi && !memo) continue;

allReports.push({ judul, isi, memo, index: i });
}

renderReports(allReports);

} catch (error) {
console.error('Error:', error);
document.getElementById('reportContainer').innerHTML = `
<div class="error-msg">
<i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 15px; text-shadow: 0 0 20px rgba(255,62,108,0.8);"></i>
<p><strong>⚠️ Gagal memuat data</strong></p>
<p style="font-size: 12px; margin-top: 10px; opacity: 0.9;">Pastikan Google Sheet sudah dipublikasikan.</p>
<p style="font-size: 11px; margin-top: 12px; opacity: 0.7;">Error: ${error.message}</p>
</div>`;
}
}

function renderReports(reports) {
const container = document.getElementById('reportContainer');
container.innerHTML = '<div class="report-list"></div>';
const list = container.querySelector('.report-list');

if (reports.length === 0) {
list.innerHTML = '<div class="no-data">Tidak ada data report.</div>';
return;
}

reports.forEach((item, idx) => {
const card = document.createElement('div');
card.className = 'report-card';
card.style.animationDelay = `${idx * 0.05}s`;

let html = '';

// Section A: Judul
if (item.judul) {
html += `
<div class="card-section">
<div class="label"><i class="fas fa-heading"></i> JUDUL</div>
<div class="content-row">
<div class="content-text">${escapeHtml(item.judul)}</div>
<button class="btn-copy" onclick="copyText(this, '${escapeHtml(item.judul)}')">
<i class="fas fa-copy"></i> Copy
</button>
</div>
</div>`;
}

// Section B: Isi Report
if (item.isi) {
html += `
<div class="card-section">
<div class="label"><i class="fas fa-file-alt"></i> ISI REPORT</div>
<div class="content-row">
<div class="content-text">${escapeHtml(item.isi)}</div>
<button class="btn-copy" onclick="copyText(this, '${escapeHtml(item.isi)}')">
<i class="fas fa-copy"></i> Copy
</button>
</div>
</div>`;
}

// Section C: Tujuan / Memo
if (item.memo) {
html += `
<div class="card-section memo">
<div class="label"><i class="fas fa-sticky-note"></i> TUJUAN & MEMO</div>
<div class="content-row">
<div class="content-text">${escapeHtml(item.memo)}</div>
</div>
</div>`;
}

card.innerHTML = html;
list.appendChild(card);
});
}

function escapeHtml(text) {
if (!text) return '';
return text.replace(/'/g, "\\'").replace(/"/g, '\\"');
}

function copyText(btn, text) {
// Unescape before copying
const unescapedText = text.replace(/\\'/g, "'").replace(/\\"/g, '"');

navigator.clipboard.writeText(unescapedText).then(() => {
const original = btn.innerHTML;
btn.innerHTML = '<i class="fas fa-check"></i> OK';
btn.classList.add('copied');
showToast('✅ Teks disalin!');
setTimeout(() => {
btn.innerHTML = original;
btn.classList.remove('copied');
}, 1500);
}).catch(err => {
console.error('Failed to copy:', err);
showToast('❌ Gagal menyalin');
});
}

function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

// Particles
function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
for (let i = 0; i < 50; i++) {
const particle = document.createElement('div');
const size = Math.random() * 3 + 1;
particle.style.cssText = `
position: absolute;
width: ${size}px;
height: ${size}px;
background: rgba(0, 212, 255, ${Math.random() * 0.6 + 0.2});
border-radius: 50%;
left: ${Math.random() * 100}%;
top: ${Math.random() * 100}%;
animation: float ${Math.random() * 15 + 10}s infinite linear;
box-shadow: 0 0 ${Math.random() * 12 + 6}px rgba(0, 212, 255, 0.6);
`;
container.appendChild(particle);
}
}

const style = document.createElement('style');
style.textContent = `
@keyframes float {
0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
10%, 90% { opacity: 1; }
50% { transform: translateY(-100vh) rotate(720deg); }
}
`;
document.head.appendChild(style);

// Init
document.addEventListener('DOMContentLoaded', () => {
createParticles();
loadReportData();
});
</script>
</body>
</html>

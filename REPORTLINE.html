<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPORT LINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #0d1425;
            --bg-card: rgba(15, 25, 50, 0.8);
            --neon-blue: #00d4ff;
            --neon-blue-dim: #0099cc;
            --neon-glow: rgba(0, 212, 255, 0.5);
            --text-primary: #e0f4ff;
            --text-muted: #7aa3b8;
            --border-glow: rgba(0, 212, 255, 0.3);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow-1 {
            top: -200px;
            left: -200px;
            background: var(--neon-blue);
            animation: pulse1 8s ease-in-out infinite;
        }

        .bg-glow-2 {
            bottom: -200px;
            right: -200px;
            background: #0066ff;
            animation: pulse2 10s ease-in-out infinite;
        }

        @keyframes pulse1 {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.2); opacity: 0.2; }
        }

        @keyframes pulse2 {
            0%, 100% { transform: scale(1.2); opacity: 0.1; }
            50% { transform: scale(1); opacity: 0.18; }
        }

        /* Header */
        .header-title {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(2rem, 6vw, 4rem);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--neon-blue);
            text-shadow: 
                0 0 10px var(--neon-glow),
                0 0 30px var(--neon-glow),
                0 0 60px var(--neon-glow);
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { 
                text-shadow: 
                    0 0 10px var(--neon-glow),
                    0 0 30px var(--neon-glow),
                    0 0 60px var(--neon-glow);
            }
            50% { 
                text-shadow: 
                    0 0 20px var(--neon-glow),
                    0 0 50px var(--neon-glow),
                    0 0 100px var(--neon-glow);
            }
        }

        .header-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            box-shadow: 0 0 20px var(--neon-glow);
        }

        /* Cards */
        .report-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(30px);
        }

        .report-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .report-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.2),
                inset 0 0 30px rgba(0, 212, 255, 0.05);
            transform: translateY(-5px);
        }

        .card-number {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--neon-blue);
            background: rgba(0, 212, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-glow);
        }

        .field-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--neon-blue-dim);
            margin-bottom: 6px;
        }

        .field-content {
            color: var(--text-primary);
            line-height: 1.6;
        }

        .copy-btn {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--border-glow);
            color: var(--neon-blue);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .copy-btn.copied {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            color: #00ff88;
        }

        .memo-badge {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 102, 255, 0.15));
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 12px 16px;
        }

        /* Stats */
        .stat-box {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--border-glow);
            border-radius: 10px;
            padding: 16px 24px;
            text-align: center;
        }

        .stat-number {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-glow);
        }

        /* Search */
        .search-input {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--border-glow);
            border-radius: 10px;
            padding: 14px 20px;
            color: var(--text-primary);
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* Loading */
        .loader {
            display: flex;
            gap: 8px;
            justify-content: center;
            padding: 60px;
        }

        .loader span {
            width: 12px;
            height: 12px;
            background: var(--neon-blue);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite both;
            box-shadow: 0 0 20px var(--neon-glow);
        }

        .loader span:nth-child(1) { animation-delay: -0.32s; }
        .loader span:nth-child(2) { animation-delay: -0.16s; }
        .loader span:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-blue-dim);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-blue);
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <!-- Main Content -->
    <main class="relative z-10 min-h-screen px-4 py-8 md:px-8 lg:px-16">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="header-title mb-4">REPORT LINE</h1>
            <div class="header-line max-w-md mx-auto mb-6"></div>
            <p class="text-[var(--text-muted)] text-sm tracking-wide">Sistem Laporan Terintegrasi</p>
        </header>

        <!-- Stats -->
        <div class="flex flex-wrap justify-center gap-4 mb-8">
            <div class="stat-box">
                <div class="stat-number" id="totalCount">0</div>
                <div class="text-xs text-[var(--text-muted)] mt-1 uppercase tracking-wider">Total Data</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="filteredCount">0</div>
                <div class="text-xs text-[var(--text-muted)] mt-1 uppercase tracking-wider">Ditampilkan</div>
            </div>
        </div>

        <!-- Search -->
        <div class="max-w-2xl mx-auto mb-10">
            <div class="relative">
                <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="text" id="searchInput" class="search-input pl-12" placeholder="Cari judul, isi report, atau memo...">
            </div>
        </div>

        <!-- Data Container -->
        <div id="dataContainer" class="max-w-4xl mx-auto">
            <!-- Loading -->
            <div class="loader" id="loader">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state hidden">
            <svg class="w-16 h-16 mx-auto mb-4 text-[var(--neon-blue-dim)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p class="text-lg">Tidak ada data ditemukan</p>
            <p class="text-sm mt-2">Pastikan Google Sheet sudah dipublikasikan</p>
        </div>
    </main>

    <script>
        // Configuration
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        const GID = '508399522';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        // State
        let allData = [];
        let filteredData = [];

        // DOM Elements
        const dataContainer = document.getElementById('dataContainer');
        const loader = document.getElementById('loader');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const totalCountEl = document.getElementById('totalCount');
        const filteredCountEl = document.getElementById('filteredCount');

        // Parse CSV
        function parseCSV(csv) {
            const lines = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < csv.length; i++) {
                const char = csv[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if ((char === '\n' || (char === '\r' && csv[i + 1] === '\n')) && !inQuotes) {
                    if (current.trim()) {
                        lines.push(current.trim());
                    }
                    current = '';
                    if (char === '\r') i++;
                } else {
                    current += char;
                }
            }
            if (current.trim()) {
                lines.push(current.trim());
            }

            return lines.map(line => {
                const fields = [];
                let field = '';
                let inQ = false;
                
                for (let i = 0; i < line.length; i++) {
                    const c = line[i];
                    if (c === '"') {
                        inQ = !inQ;
                    } else if (c === ',' && !inQ) {
                        fields.push(field.trim());
                        field = '';
                    } else {
                        field += c;
                    }
                }
                fields.push(field.trim());
                return fields;
            });
        }

        // Fetch data
        async function fetchData() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('Failed to fetch');
                
                const csv = await response.text();
                const rows = parseCSV(csv);
                
                // Skip header row and process data
                allData = rows.slice(1)
                    .map((row, index) => {
                        const judul = row[0] || '';
                        const isi = row[1] || '';
                        const memo = row[2] || '';
                        
                        // Skip if all fields empty
                        if (!judul && !isi && !memo) return null;
                        
                        return {
                            index: index + 1,
                            judul,
                            isi,
                            memo
                        };
                    })
                    .filter(item => item !== null);
                
                filteredData = [...allData];
                renderData();
            } catch (error) {
                console.error('Error:', error);
                showError();
            }
        }

        // Show error
        function showError() {
            loader.classList.add('hidden');
            emptyState.classList.remove('hidden');
            emptyState.innerHTML = `
                <svg class="w-16 h-16 mx-auto mb-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <p class="text-lg text-red-400">Gagal memuat data</p>
                <p class="text-sm mt-2">Pastikan Google Sheet sudah dipublikasikan:</p>
                <p class="text-xs mt-1 text-[var(--text-muted)]">File → Share → Publish to web</p>
            `;
        }

        // Render data
        function renderData() {
            loader.classList.add('hidden');
            
            // Update counts
            totalCountEl.textContent = allData.length;
            filteredCountEl.textContent = filteredData.length;
            
            if (filteredData.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            // Build HTML
            const html = filteredData.map((item, i) => `
                <article class="report-card p-6 mb-4" style="transition-delay: ${i * 50}ms" data-index="${item.index}">
                    <div class="flex items-center justify-between mb-4">
                        <span class="card-number">#${String(item.index).padStart(3, '0')}</span>
                    </div>
                    
                    ${item.judul ? `
                    <div class="mb-4">
                        <div class="field-label">Judul</div>
                        <div class="flex items-start justify-between gap-4">
                            <p class="field-content text-lg font-semibold flex-1">${escapeHtml(item.judul)}</p>
                            <button class="copy-btn flex-shrink-0" onclick="copyText('${escapeAttr(item.judul)}', this)">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                                <span>Copy</span>
                            </button>
                        </div>
                    </div>
                    ` : ''}
                    
                    ${item.isi ? `
                    <div class="mb-4">
                        <div class="field-label">Isi Report</div>
                        <div class="flex items-start justify-between gap-4">
                            <p class="field-content flex-1 whitespace-pre-wrap">${escapeHtml(item.isi)}</p>
                            <button class="copy-btn flex-shrink-0" onclick="copyText('${escapeAttr(item.isi)}', this)">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                                <span>Copy</span>
                            </button>
                        </div>
                    </div>
                    ` : ''}
                    
                    ${item.memo ? `
                    <div class="memo-badge">
                        <div class="field-label">Tujuan Report & Memo</div>
                        <p class="field-content">${escapeHtml(item.memo)}</p>
                    </div>
                    ` : ''}
                </article>
            `).join('');
            
            dataContainer.innerHTML = html;
            
            // Animate cards
            requestAnimationFrame(() => {
                const cards = document.querySelectorAll('.report-card');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    });
                }, { threshold: 0.1 });
                
                cards.forEach(card => observer.observe(card));
            });
        }

        // Copy text
        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                btn.classList.add('copied');
                btn.querySelector('span').textContent = 'Copied!';
                
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.querySelector('span').textContent = 'Copy';
                }, 2000);
            });
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Escape attribute
        function escapeAttr(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n');
        }

        // Search
        function handleSearch(e) {
            const query = e.target.value.toLowerCase().trim();
            
            if (!query) {
                filteredData = [...allData];
            } else {
                filteredData = allData.filter(item => 
                    item.judul.toLowerCase().includes(query) ||
                    item.isi.toLowerCase().includes(query) ||
                    item.memo.toLowerCase().includes(query)
                );
            }
            
            renderData();
        }

        // Debounce
        function debounce(fn, delay) {
            let timer = null;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        // Event listeners
        searchInput.addEventListener('input', debounce(handleSearch, 300));

        // Initialize
        fetchData();
    </script>
</body>
</html>

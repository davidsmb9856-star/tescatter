<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPORT LINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050a15;
            --bg-secondary: #0a1225;
            --bg-card: rgba(8, 20, 45, 0.85);
            --neon-blue: #00e5ff;
            --neon-blue-bright: #00ffff;
            --neon-blue-dim: #0099bb;
            --neon-glow: rgba(0, 229, 255, 0.6);
            --neon-glow-soft: rgba(0, 229, 255, 0.15);
            --text-primary: #e8faff;
            --text-muted: #6b9db5;
            --border-glow: rgba(0, 229, 255, 0.25);
            --border-active: rgba(0, 229, 255, 0.6);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated grid background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        /* Glow orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            top: -150px;
            left: -150px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.2) 0%, transparent 70%);
            animation: orbFloat1 12s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.15) 0%, transparent 70%);
            animation: orbFloat2 15s ease-in-out infinite;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(0, 200, 255, 0.08) 0%, transparent 70%);
            animation: orbPulse 8s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
        }

        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1.1); }
            50% { transform: translate(-40px, -20px) scale(1); }
        }

        @keyframes orbPulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.3); }
        }

        /* Header */
        .header-title {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(2.2rem, 7vw, 4.5rem);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--neon-blue-bright);
            text-shadow: 
                0 0 10px var(--neon-glow),
                0 0 40px var(--neon-glow),
                0 0 80px var(--neon-glow),
                0 0 120px rgba(0, 229, 255, 0.3);
            animation: titlePulse 4s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { 
                text-shadow: 
                    0 0 10px var(--neon-glow),
                    0 0 40px var(--neon-glow),
                    0 0 80px var(--neon-glow);
            }
            50% { 
                text-shadow: 
                    0 0 20px var(--neon-glow),
                    0 0 60px var(--neon-glow),
                    0 0 120px var(--neon-glow),
                    0 0 160px rgba(0, 229, 255, 0.4);
            }
        }

        .header-line {
            height: 3px;
            background: linear-gradient(90deg, transparent 0%, var(--neon-blue) 20%, var(--neon-blue-bright) 50%, var(--neon-blue) 80%, transparent 100%);
            box-shadow: 0 0 30px var(--neon-glow), 0 0 60px var(--neon-glow-soft);
            animation: lineGlow 3s ease-in-out infinite;
        }

        @keyframes lineGlow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Cards */
        .report-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(40px) scale(0.98);
            position: relative;
            overflow: hidden;
        }

        .report-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .report-card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .report-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 
                0 0 40px rgba(0, 229, 255, 0.15),
                0 0 80px rgba(0, 229, 255, 0.05),
                inset 0 0 60px rgba(0, 229, 255, 0.03);
            transform: translateY(-4px) scale(1.01);
        }

        .report-card:hover::before {
            opacity: 1;
        }

        .card-number {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: var(--neon-blue-bright);
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.15) 0%, rgba(0, 150, 200, 0.1) 100%);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-glow);
            text-shadow: 0 0 10px var(--neon-glow);
        }

        /* Editable fields */
        .field-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--neon-blue-dim);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .editable-field {
            color: var(--text-primary);
            line-height: 1.7;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            min-height: 44px;
            background: transparent;
            outline: none;
        }

        .editable-field:hover {
            background: rgba(0, 229, 255, 0.03);
            border-color: var(--border-glow);
        }

        .editable-field:focus {
            background: rgba(0, 229, 255, 0.06);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15), inset 0 0 20px rgba(0, 229, 255, 0.03);
        }

        .editable-field.title-field {
            font-size: 1.15rem;
            font-weight: 700;
        }

        /* Memo sections */
        .memo-section {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.06) 0%, rgba(0, 100, 150, 0.04) 100%);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 14px 18px;
            transition: all 0.3s ease;
        }

        .memo-section:hover {
            border-color: rgba(0, 229, 255, 0.4);
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.08) 0%, rgba(0, 100, 150, 0.06) 100%);
        }

        /* Buttons */
        .action-btn {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.12) 0%, rgba(0, 150, 200, 0.08) 100%);
            border: 1px solid var(--border-glow);
            color: var(--neon-blue);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .action-btn:hover {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.2) 0%, rgba(0, 150, 200, 0.15) 100%);
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.25);
            transform: translateY(-2px);
        }

        .action-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .action-btn.copied {
            background: linear-gradient(135deg, rgba(0, 255, 150, 0.2) 0%, rgba(0, 200, 100, 0.1) 100%);
            border-color: #00ff96;
            color: #00ff96;
            box-shadow: 0 0 25px rgba(0, 255, 150, 0.25);
        }

        /* Stats */
        .stat-box {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.08) 0%, rgba(0, 100, 150, 0.04) 100%);
            border: 1px solid var(--border-glow);
            border-radius: 14px;
            padding: 18px 28px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.15);
        }

        .stat-number {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--neon-blue-bright);
            text-shadow: 0 0 30px var(--neon-glow);
        }

        /* Search */
        .search-wrapper {
            position: relative;
        }

        .search-input {
            background: rgba(0, 229, 255, 0.04);
            border: 1px solid var(--border-glow);
            border-radius: 14px;
            padding: 16px 24px 16px 52px;
            color: var(--text-primary);
            width: 100%;
            font-size: 1rem;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.2), inset 0 0 20px rgba(0, 229, 255, 0.02);
            background: rgba(0, 229, 255, 0.06);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* Loading */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 80px;
        }

        .loader-ring {
            width: 60px;
            height: 60px;
            border: 3px solid transparent;
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 30px var(--neon-glow);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--neon-blue), var(--neon-blue-dim));
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-blue-bright);
        }

        /* Notification toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.15) 0%, rgba(0, 150, 200, 0.1) 100%);
            border: 1px solid var(--neon-blue);
            border-radius: 12px;
            padding: 14px 28px;
            color: var(--neon-blue-bright);
            font-weight: 600;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.3);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (max-width: 640px) {
            .card-number {
                font-size: 0.6rem;
                padding: 4px 10px;
            }
            
            .editable-field {
                padding: 8px 10px;
            }
            
            .editable-field.title-field {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-grid"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Main Content -->
    <main class="relative z-10 min-h-screen px-4 py-10 md:px-8 lg:px-16">
        <!-- Header -->
        <header class="text-center mb-14">
            <h1 class="header-title mb-6">REPORT LINE</h1>
            <div class="header-line max-w-lg mx-auto mb-8"></div>
            <p class="text-[var(--text-muted)] text-sm tracking-widest uppercase">Sistem Laporan Terintegrasi Real-time</p>
        </header>

        <!-- Stats -->
        <div class="flex flex-wrap justify-center gap-4 mb-10">
            <div class="stat-box">
                <div class="stat-number" id="totalCount">0</div>
                <div class="text-xs text-[var(--text-muted)] mt-2 uppercase tracking-widest font-medium">Total Data</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="filteredCount">0</div>
                <div class="text-xs text-[var(--text-muted)] mt-2 uppercase tracking-widest font-medium">Ditampilkan</div>
            </div>
        </div>

        <!-- Search -->
        <div class="max-w-2xl mx-auto mb-12">
            <div class="search-wrapper">
                <svg class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-[var(--neon-blue)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Cari judul, isi report, atau memo...">
            </div>
        </div>

        <!-- Data Container -->
        <div id="dataContainer" class="max-w-5xl mx-auto">
            <!-- Loading -->
            <div class="loader-container" id="loader">
                <div class="loader-ring"></div>
                <p class="text-[var(--text-muted)] text-sm tracking-wide">Memuat data...</p>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state hidden">
            <svg class="w-20 h-20 mx-auto mb-6 text-[var(--neon-blue-dim)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p class="text-xl text-[var(--text-muted)]">Tidak ada data ditemukan</p>
            <p class="text-sm mt-3 text-[var(--text-muted)] opacity-70">Pastikan Google Sheet sudah dipublikasikan</p>
        </div>
    </main>

    <script>
        // Configuration
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        const GID = '508399522';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        // State
        let allData = [];
        let filteredData = [];

        // DOM Elements - initialized after DOM ready
        let dataContainer = null;
        let loader = null;
        let emptyState = null;
        let searchInput = null;
        let totalCountEl = null;
        let filteredCountEl = null;
        let toastEl = null;

        // Initialize DOM references
        function initDOM() {
            dataContainer = document.getElementById('dataContainer');
            loader = document.getElementById('loader');
            emptyState = document.getElementById('emptyState');
            searchInput = document.getElementById('searchInput');
            totalCountEl = document.getElementById('totalCount');
            filteredCountEl = document.getElementById('filteredCount');
            toastEl = document.getElementById('toast');
        }

        // Parse CSV with proper handling
        function parseCSV(csv) {
            const lines = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < csv.length; i++) {
                const char = csv[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if ((char === '\n' || (char === '\r' && csv[i + 1] === '\n')) && !inQuotes) {
                    if (current.trim()) {
                        lines.push(current.trim());
                    }
                    current = '';
                    if (char === '\r') i++;
                } else {
                    current += char;
                }
            }
            if (current.trim()) {
                lines.push(current.trim());
            }

            return lines.map(line => {
                const fields = [];
                let field = '';
                let inQ = false;
                
                for (let i = 0; i < line.length; i++) {
                    const c = line[i];
                    if (c === '"') {
                        inQ = !inQ;
                    } else if (c === ',' && !inQ) {
                        fields.push(field.trim());
                        field = '';
                    } else {
                        field += c;
                    }
                }
                fields.push(field.trim());
                return fields;
            });
        }

        // Fetch data
        async function fetchData() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('Failed to fetch');
                
                const csv = await response.text();
                const rows = parseCSV(csv);
                
                // Skip header row and process data (columns A, B, C, D)
                allData = rows.slice(1)
                    .map((row, index) => {
                        const judul = row[0] || '';
                        const isi = row[1] || '';
                        const tujuanMemo = row[2] || '';
                        const tujuanReport = row[3] || '';
                        
                        // Skip if all fields empty
                        if (!judul && !isi && !tujuanMemo && !tujuanReport) return null;
                        
                        return {
                            id: index + 1,
                            judul,
                            isi,
                            tujuanMemo,
                            tujuanReport
                        };
                    })
                    .filter(item => item !== null);
                
                filteredData = [...allData];
                renderData();
            } catch (error) {
                console.error('Error:', error);
                showError();
            }
        }

        // Show error
        function showError() {
            if (loader) loader.classList.add('hidden');
            if (emptyState) {
                emptyState.classList.remove('hidden');
                emptyState.innerHTML = `
                    <svg class="w-20 h-20 mx-auto mb-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <p class="text-xl text-red-400">Gagal memuat data</p>
                    <p class="text-sm mt-3 text-[var(--text-muted)]">Pastikan Google Sheet sudah dipublikasikan:</p>
                    <p class="text-xs mt-2 text-[var(--text-muted)] opacity-70">File → Share → Publish to web</p>
                `;
            }
        }

        // Show toast notification
        function showToast(message) {
            if (!toastEl) return;
            toastEl.textContent = message;
            toastEl.classList.add('show');
            setTimeout(() => {
                toastEl.classList.remove('show');
            }, 2500);
        }

        // Render data
        function renderData() {
            if (loader) loader.classList.add('hidden');
            
            // Update counts
            if (totalCountEl) totalCountEl.textContent = allData.length;
            if (filteredCountEl) filteredCountEl.textContent = filteredData.length;
            
            if (filteredData.length === 0) {
                if (emptyState) emptyState.classList.remove('hidden');
                if (dataContainer) dataContainer.innerHTML = '';
                return;
            }
            
            if (emptyState) emptyState.classList.add('hidden');
            
            // Build HTML
            const html = filteredData.map((item, i) => `
                <article class="report-card p-6 md:p-8 mb-5" style="transition-delay: ${Math.min(i * 60, 500)}ms" data-id="${item.id}">
                    <div class="flex items-center justify-between mb-6">
                        <span class="card-number">#${String(item.id).padStart(3, '0')}</span>
                        <div class="flex gap-2">
                            <button class="action-btn" onclick="copyAllFields(${item.id}, this)" title="Copy Semua">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                                Copy All
                            </button>
                        </div>
                    </div>
                    
                    ${item.judul ? `
                    <div class="mb-5">
                        <div class="field-label">Judul</div>
                        <div class="flex items-start gap-3">
                            <div 
                                class="editable-field title-field flex-1" 
                                contenteditable="true" 
                                data-field="judul" 
                                data-id="${item.id}"
                                onblur="saveEdit(this)"
                            >${escapeHtml(item.judul)}</div>
                            <button class="action-btn flex-shrink-0" onclick="copyField('judul', ${item.id}, this)" title="Copy Judul">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    ` : `
                    <div class="mb-5">
                        <div class="field-label">Judul</div>
                        <div class="flex items-start gap-3">
                            <div 
                                class="editable-field title-field flex-1 text-[var(--text-muted)] italic" 
                                contenteditable="true" 
                                data-field="judul" 
                                data-id="${item.id}"
                                onblur="saveEdit(this)"
                                data-placeholder="true"
                            >Klik untuk menambah judul...</div>
                        </div>
                    </div>
                    `}
                    
                    ${item.isi ? `
                    <div class="mb-5">
                        <div class="field-label">Isi Report</div>
                        <div class="flex items-start gap-3">
                            <div 
                                class="editable-field flex-1 whitespace-pre-wrap" 
                                contenteditable="true" 
                                data-field="isi" 
                                data-id="${item.id}"
                                onblur="saveEdit(this)"
                            >${escapeHtml(item.isi)}</div>
                            <button class="action-btn flex-shrink-0" onclick="copyField('isi', ${item.id}, this)" title="Copy Isi">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    ` : `
                    <div class="mb-5">
                        <div class="field-label">Isi Report</div>
                        <div class="flex items-start gap-3">
                            <div 
                                class="editable-field flex-1 text-[var(--text-muted)] italic" 
                                contenteditable="true" 
                                data-field="isi" 
                                data-id="${item.id}"
                                onblur="saveEdit(this)"
                                data-placeholder="true"
                            >Klik untuk menambah isi report...</div>
                        </div>
                    </div>
                    `}
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${item.tujuanMemo || true ? `
                        <div class="memo-section">
                            <div class="field-label">Tujuan Memo</div>
                            <div 
                                class="editable-field" 
                                contenteditable="true" 
                                data-field="tujuanMemo" 
                                data-id="${item.id}"
                                onblur="saveEdit(this)"
                                data-placeholder="${!item.tujuanMemo ? 'true' : 'false'}"
                            >${item.tujuanMemo ? escapeHtml(item.tujuanMemo) : '<span class="text-[var(--text-muted)] italic">Klik untuk edit...</span>'}</div>
                        </div>
                        ` : ''}
                        
                        ${item.tujuanReport || true ? `
                        <div class="memo-section">
                            <div class="field-label">Tujuan Report dan Memo</div>
                            <div 
                                class="editable-field" 
                                contenteditable="true" 
                                data-field="tujuanReport" 
                                data-id="${item.id}"
                                onblur="saveEdit(this)"
                                data-placeholder="${!item.tujuanReport ? 'true' : 'false'}"
                            >${item.tujuanReport ? escapeHtml(item.tujuanReport) : '<span class="text-[var(--text-muted)] italic">Klik untuk edit...</span>'}</div>
                        </div>
                        ` : ''}
                    </div>
                </article>
            `).join('');
            
            if (dataContainer) {
                dataContainer.innerHTML = html;
            }
            
            // Animate cards with IntersectionObserver
            requestAnimationFrame(() => {
                const cards = document.querySelectorAll('.report-card');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    });
                }, { threshold: 0.1, rootMargin: '50px' });
                
                cards.forEach(card => observer.observe(card));
            });

            // Setup placeholder handlers
            setupPlaceholderHandlers();
        }

        // Setup placeholder click handlers
        function setupPlaceholderHandlers() {
            const placeholders = document.querySelectorAll('[data-placeholder="true"]');
            placeholders.forEach(el => {
                el.addEventListener('focus', function() {
                    if (this.dataset.placeholder === 'true') {
                        this.innerHTML = '';
                        this.classList.remove('text-[var(--text-muted)]', 'italic');
                        this.dataset.placeholder = 'false';
                    }
                });
            });
        }

        // Save edit
        function saveEdit(element) {
            const field = element.dataset.field;
            const id = parseInt(element.dataset.id);
            const value = element.textContent.trim();
            
            // Update local data
            const item = allData.find(d => d.id === id);
            if (item) {
                item[field] = value;
            }
            
            // Show notification
            showToast('Data diperbarui secara lokal');
        }

        // Copy single field
        function copyField(field, id, btn) {
            const item = allData.find(d => d.id === id);
            if (item && item[field]) {
                navigator.clipboard.writeText(item[field]).then(() => {
                    btn.classList.add('copied');
                    showToast(`${field.charAt(0).toUpperCase() + field.slice(1)} berhasil dicopy`);
                    setTimeout(() => btn.classList.remove('copied'), 2000);
                });
            }
        }

        // Copy all fields
        function copyAllFields(id, btn) {
            const item = allData.find(d => d.id === id);
            if (item) {
                const text = `JUDUL: ${item.judul || '-'}
ISI REPORT: ${item.isi || '-'}
TUJUAN MEMO: ${item.tujuanMemo || '-'}
TUJUAN REPORT & MEMO: ${item.tujuanReport || '-'}`;
                
                navigator.clipboard.writeText(text).then(() => {
                    btn.classList.add('copied');
                    showToast('Semua data berhasil dicopy');
                    setTimeout(() => btn.classList.remove('copied'), 2000);
                });
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Search handler
        function handleSearch(e) {
            const query = e.target.value.toLowerCase().trim();
            
            if (!query) {
                filteredData = [...allData];
            } else {
                filteredData = allData.filter(item => 
                    (item.judul && item.judul.toLowerCase().includes(query)) ||
                    (item.isi && item.isi.toLowerCase().includes(query)) ||
                    (item.tujuanMemo && item.tujuanMemo.toLowerCase().includes(query)) ||
                    (item.tujuanReport && item.tujuanReport.toLowerCase().includes(query))
                );
            }
            
            renderData();
        }

        // Debounce utility
        function debounce(fn, delay) {
            let timer = null;
            return function(...args) {
                if (timer) clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initDOM();
            
            if (searchInput) {
                searchInput.addEventListener('input', debounce(handleSearch, 300));
            }
            
            fetchData();
        });
    </script>
</body>
</html>

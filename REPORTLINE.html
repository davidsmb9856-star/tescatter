<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>⚡ REPORT LINE - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-cyan: #00d4ff;
--neon-blue: #0099ff;
--neon-electric: #00ffff;
--neon-purple: #9d00ff;
--neon-pink: #ff00aa;
--neon-green: #00ff9d;
--neon-yellow: #ffe600;
--neon-red: #ff3e6c;
--bg-dark: #000810;
--bg-card: rgba(0, 20, 50, 0.75);
--bg-card-hover: rgba(0, 40, 100, 0.9);
--bg-panel: rgba(0, 12, 32, 0.95);
--text-main: #00f5ff;
--text-secondary: #66e5ff;
--text-dim: #33cccc;
--border-glow: rgba(0, 212, 255, 0.6);
--electric-glow: 0 0 10px #00d4ff, 0 0 25px #00d4ff, 0 0 50px #00d4ff;
--transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
--transition-normal: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
--transition-bloom: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-dark);
color: var(--text-main);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
}

/* Background Effects */
.cyber-bg {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background:
radial-gradient(ellipse at 20% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
radial-gradient(ellipse at 80% 20%, rgba(157, 0, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 50% 50%, rgba(0, 255, 255, 0.08) 0%, transparent 60%),
linear-gradient(180deg, #000810 0%, #001133 40%, #000518 100%);
z-index: -3;
animation: bgPulse 15s ease-in-out infinite;
}
@keyframes bgPulse {
0%, 100% { opacity: 1; filter: hue-rotate(0deg); }
50% { opacity: 0.95; filter: hue-rotate(15deg); }
}

.grid-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background-image:
linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
background-size: 50px 50px;
z-index: -2;
animation: gridFloat 40s linear infinite;
pointer-events: none;
}
@keyframes gridFloat {
0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
}

.particles {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
z-index: -1;
pointer-events: none;
}

.scan-line {
position: fixed;
top: 0; left: 0; width: 100%; height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-cyan), transparent);
opacity: 0.5;
animation: scanDown 10s linear infinite;
z-index: 1;
pointer-events: none;
box-shadow: 0 0 25px var(--neon-cyan), 0 0 50px var(--neon-electric);
}
@keyframes scanDown {
0% { top: -10%; opacity: 0; }
10% { opacity: 0.5; }
90% { opacity: 0.5; }
100% { top: 110%; opacity: 0; }
}

.container {
max-width: 1000px;
margin: 0 auto;
padding: 20px 15px;
min-height: 100vh;
display: flex;
flex-direction: column;
position: relative;
z-index: 2;
}

/* Header */
.header {
text-align: center;
margin-bottom: 30px;
padding: 30px 15px;
position: relative;
}
.header::before {
content: '';
position: absolute;
bottom: 0; left: 50%;
transform: translateX(-50%);
width: 90%;
height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-electric), var(--neon-purple), var(--neon-cyan), transparent);
animation: glowLine 3s ease-in-out infinite;
box-shadow: 0 0 20px var(--neon-cyan);
}
@keyframes glowLine {
0%, 100% { opacity: 0.6; }
50% { opacity: 1; box-shadow: 0 0 30px var(--neon-electric), 0 0 60px var(--neon-cyan); }
}

.back-btn {
position: absolute;
left: 0; top: 50%;
transform: translateY(-50%);
background: rgba(0, 212, 255, 0.2);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 10px 18px;
border-radius: 12px;
text-decoration: none;
font-weight: 600;
font-size: 13px;
display: flex;
align-items: center;
gap: 8px;
transition: var(--transition-normal);
backdrop-filter: blur(10px);
box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
}
.back-btn:hover {
background: rgba(0, 212, 255, 0.35);
transform: translateY(-50%) translateX(-4px);
box-shadow: var(--electric-glow);
}

.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(28px, 6vw, 42px);
font-weight: 900;
background: linear-gradient(90deg, #00d4ff, #00ffff, #9d00ff, #00d4ff, #ff00aa, #00d4ff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-size: 400% 400%;
animation: neonFlow 4s ease infinite;
text-shadow: 0 0 30px rgba(0, 212, 255, 0.8), 0 0 60px rgba(0, 212, 255, 0.5);
margin-bottom: 12px;
letter-spacing: 2px;
position: relative;
}
@keyframes neonFlow {
0%, 100% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
}

.sheet-title {
font-size: 18px;
color: var(--neon-yellow);
text-shadow: 0 0 10px rgba(255, 230, 0, 0.5);
margin-top: 10px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 1px;
}

/* Search */
.search-container {
margin-bottom: 25px;
max-width: 600px;
margin-left: auto;
margin-right: auto;
}
.search-box {
width: 100%;
padding: 14px 20px 14px 50px;
background: rgba(0, 20, 50, 0.85);
border: 2px solid rgba(0, 212, 255, 0.5);
border-radius: 14px;
color: var(--text-main);
font-size: 15px;
font-family: 'Rajdhani', sans-serif;
font-weight: 600;
transition: var(--transition-normal);
backdrop-filter: blur(10px);
}
.search-box:focus {
outline: none;
border-color: var(--neon-electric);
box-shadow: var(--electric-glow);
background: rgba(0, 25, 60, 0.95);
}
.search-icon {
position: relative;
top: -42px;
left: 18px;
color: var(--neon-cyan);
font-size: 18px;
pointer-events: none;
}

/* Report List */
.report-list {
display: flex;
flex-direction: column;
gap: 20px;
}

.report-card {
background: var(--bg-card);
border: 2px solid var(--border-glow);
border-radius: 20px;
padding: 25px;
transition: var(--transition-bloom);
position: relative;
overflow: hidden;
backdrop-filter: blur(20px);
animation: cardEnter 0.5s ease forwards;
opacity: 0;
transform: translateY(25px);
box-shadow: 0 5px 25px rgba(0, 212, 255, 0.15);
}
@keyframes cardEnter {
to { opacity: 1; transform: translateY(0); }
}

.report-card::before {
content: '';
position: absolute;
top: 0; left: 0;
width: 5px; height: 100%;
background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-electric), var(--neon-purple));
box-shadow: 0 0 20px var(--neon-cyan);
transition: var(--transition-normal);
}

.report-card:hover {
background: var(--bg-card-hover);
transform: translateY(-6px) scale(1.008);
border-color: var(--neon-electric);
box-shadow:
0 20px 50px rgba(0, 212, 255, 0.35),
0 0 50px rgba(0, 255, 255, 0.25),
inset 0 0 30px rgba(0, 212, 255, 0.15);
}
.report-card:hover::before {
width: 7px;
box-shadow: 0 0 30px var(--neon-electric);
}

/* Card Content Structure */
.report-header {
display: flex;
justify-content: space-between;
align-items: flex-start;
margin-bottom: 15px;
padding-bottom: 15px;
border-bottom: 1px solid rgba(0, 212, 255, 0.3);
}

.report-title {
font-family: 'Orbitron', sans-serif;
font-size: 17px;
font-weight: 700;
color: var(--neon-electric);
text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
flex: 1;
margin-right: 15px;
line-height: 1.4;
}

.copy-btn {
background: rgba(0, 212, 255, 0.2);
border: 1px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 8px 15px;
border-radius: 8px;
cursor: pointer;
transition: var(--transition-normal);
font-weight: 600;
font-size: 12px;
display: inline-flex;
align-items: center;
gap: 5px;
flex-shrink: 0;
}
.copy-btn:hover {
background: var(--neon-cyan);
color: var(--bg-dark);
box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
}
.copy-btn.copied {
background: var(--neon-green);
border-color: var(--neon-green);
color: #000;
}

.report-body {
margin-bottom: 15px;
position: relative;
}

.report-content {
color: var(--text-secondary);
font-size: 14px;
line-height: 1.7;
white-space: pre-wrap;
word-break: break-word;
background: rgba(0, 10, 30, 0.4);
padding: 15px;
border-radius: 10px;
border: 1px solid rgba(0, 212, 255, 0.1);
margin-bottom: 10px;
max-height: 200px;
overflow-y: auto;
}
.report-content::-webkit-scrollbar {
width: 4px;
}
.report-content::-webkit-scrollbar-thumb {
background: var(--neon-cyan);
border-radius: 2px;
}

.copy-content-btn {
float: right;
clear: both;
margin-top: -10px;
}

.report-meta {
display: flex;
justify-content: space-between;
align-items: center;
font-size: 12px;
color: var(--text-dim);
}

.meta-tag {
background: rgba(0, 255, 157, 0.1);
border: 1px solid rgba(0, 255, 157, 0.4);
color: var(--neon-green);
padding: 4px 10px;
border-radius: 20px;
display: inline-block;
font-weight: 600;
}

/* Loading & No Data */
.loading {
text-align: center;
padding: 50px;
color: var(--neon-cyan);
}
.loading-spinner {
width: 40px; height: 40px;
border: 4px solid rgba(0, 212, 255, 0.2);
border-top-color: var(--neon-electric);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 15px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar {
width: 8px;
}
::-webkit-scrollbar-track {
background: rgba(0, 10, 30, 0.6);
}
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon-cyan), var(--neon-electric));
border-radius: 4px;
}
::selection {
background: rgba(0, 212, 255, 0.4);
color: var(--text-main);
}

@media (max-width: 768px) {
.container { padding: 16px 12px; }
.report-header { flex-direction: column; gap: 10px; }
.report-title { margin-right: 0; font-size: 15px; }
.copy-btn { width: 100%; justify-content: center; }
.report-meta { flex-direction: column; gap: 10px; align-items: flex-start; }
}
</style>
</head>
<body>
<div class="cyber-bg"></div>
<div class="grid-overlay"></div>
<div class="particles" id="particles"></div>
<div class="scan-line"></div>

<div class="container">
<header class="header">
<a href="index.html" class="back-btn">
<i class="fas fa-arrow-left"></i> Kembali
</a>
<h1 class="title">⚡ REPORT LINE</h1>
<h2 class="sheet-title" id="sheetTitle">MEMUAT DATA...</h2>
</header>

<div class="search-container">
<div class="search-icon"><i class="fas fa-search"></i></div>
<input type="text" class="search-box" id="searchInput" placeholder="Cari judul atau isi report..." oninput="searchReports()">
</div>

<div id="reportContainer" class="report-list">
<div class="loading">
<div class="loading-spinner"></div>
<p>Mengambil data dari Google Sheets...</p>
</div>
</div>
</div>

<script>
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '508399522';
// Range A1:C500: A=Judul, B=Isi, C=Tujuan/Memo. A1=Title.
const RANGE = 'A1:C500';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

let allReports = [];

async function fetchReportData() {
try {
const response = await fetch(DATA_URL);
const text = await response.text();
const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
if (!jsonMatch) throw new Error('Format data tidak sesuai');
const data = JSON.parse(jsonMatch[1]);
const rows = data.table?.rows || [];

if (rows.length === 0) throw new Error('Data kosong');

// Extract A1 as Main Title (First row, first column)
const mainTitle = rows[0]?.c?.[0]?.v?.toString() || "REPORT DATA";
document.getElementById('sheetTitle').textContent = mainTitle;

// Process data starting from Row 2 (Index 1) to Row 500
allReports = [];
for (let i = 1; i < rows.length; i++) {
const cells = rows[i].c || [];
const judul = cells[0]?.v?.toString().trim() || '';
const isi = cells[1]?.v?.toString().trim() || '';
const tujuan = cells[2]?.v?.toString().trim() || '';

// Only push if there is meaningful content
if (judul || isi) {
allReports.push({
id: i, // Original row index
judul: judul,
isi: isi,
tujuan: tujuan
});
}
}

renderReports(allReports);

} catch (error) {
console.error('Error:', error);
document.getElementById('reportContainer').innerHTML = `
<div class="report-card">
<div class="report-body" style="text-align: center; color: var(--neon-red);">
<i class="fas fa-exclamation-triangle" style="font-size: 24px; margin-bottom: 10px;"></i>
<p>Gagal memuat data atau data kosong.</p>
<p style="font-size: 12px; opacity: 0.7; margin-top: 5px;">Pastikan Google Sheet sudah dipublikasikan.</p>
</div>
</div>`;
}
}

function renderReports(data) {
const container = document.getElementById('reportContainer');
container.innerHTML = '';

if (data.length === 0) {
container.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 40px;">Tidak ada data ditemukan.</div>';
return;
}

data.forEach((item, index) => {
const card = document.createElement('div');
card.className = 'report-card';
// Stagger animation
card.style.animationDelay = `${index * 0.05}s`;

card.innerHTML = `
<div class="report-header">
<div class="report-title">${escapeHtml(item.judul) || 'Tanpa Judul'}</div>
<button class="copy-btn" onclick="copyText('${escapeHtml(item.judul)}', this, 'Judul')">
<i class="fas fa-copy"></i> Salin Judul
</button>
</div>
<div class="report-body">
<div class="report-content">${escapeHtml(item.isi)}</div>
<button class="copy-btn copy-content-btn" onclick="copyText(\`${escapeJs(item.isi)}\`, this, 'Isi')">
<i class="fas fa-clipboard"></i> Salin Isi
</button>
</div>
<div class="report-meta">
<span class="meta-index">No. ${item.id}</span>
 ${item.tujuan ? `<span class="meta-tag">${escapeHtml(item.tujuan)}</span>` : '<span></span>'}
</div>
`;
container.appendChild(card);
});
}

function searchReports() {
const query = document.getElementById('searchInput').value.toLowerCase().trim();
if (!query) {
renderReports(allReports);
return;
}

const filtered = allReports.filter(item => 
item.judul.toLowerCase().includes(query) || 
item.isi.toLowerCase().includes(query) || 
item.tujuan.toLowerCase().includes(query)
);
renderReports(filtered);
}

function copyText(text, btnElement, type) {
if (!text) {
showToast('Tidak ada teks untuk disalin', 'error');
return;
}
navigator.clipboard.writeText(text).then(() => {
// Visual feedback
const originalText = btnElement.innerHTML;
btnElement.innerHTML = '<i class="fas fa-check"></i> Disalin!';
btnElement.classList.add('copied');
showToast(`${type} berhasil disalin!`);

setTimeout(() => {
btnElement.innerHTML = originalText;
btnElement.classList.remove('copied');
}, 2000);
}).catch(err => {
console.error('Failed to copy:', err);
showToast('Gagal menyalin', 'error');
});
}

function showToast(message, type = 'success') {
// Create toast element if not exists
let toast = document.getElementById('toast-notification');
if (!toast) {
toast = document.createElement('div');
toast.id = 'toast-notification';
toast.style.cssText = `
position: fixed;
bottom: 30px;
left: 50%;
transform: translateX(-50%);
background: rgba(0, 20, 50, 0.95);
border: 1px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 12px 25px;
border-radius: 50px;
font-size: 14px;
z-index: 9999;
opacity: 0;
transition: all 0.3s ease;
pointer-events: none;
box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
backdrop-filter: blur(5px);
`;
document.body.appendChild(toast);
}

toast.textContent = message;
toast.style.opacity = '1';
toast.style.transform = 'translateX(-50%) translateY(0)';
if (type === 'error') {
toast.style.borderColor = 'var(--neon-red)';
toast.style.color = 'var(--neon-red)';
} else {
toast.style.borderColor = 'var(--neon-cyan)';
toast.style.color = 'var(--neon-cyan)';
}

setTimeout(() => {
toast.style.opacity = '0';
toast.style.transform = 'translateX(-50%) translateY(20px)';
}, 3000);
}

function escapeHtml(text) {
if (!text) return '';
return text
.replace(/&/g, "&amp;")
.replace(/</g, "&lt;")
.replace(/>/g, "&gt;")
.replace(/"/g, "&quot;")
.replace(/'/g, "&#039;");
}

function escapeJs(text) {
if (!text) return '';
return text.replace(/`/g, '\\`').replace(/\\/g, '\\\\');
}

// Particles
function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
for (let i = 0; i < 40; i++) {
const p = document.createElement('div');
const size = Math.random() * 3 + 1;
p.style.cssText = `
position: absolute;
width: ${size}px;
height: ${size}px;
background: rgba(0, 212, 255, ${Math.random() * 0.6 + 0.2});
border-radius: 50%;
left: ${Math.random() * 100}%;
top: ${Math.random() * 100}%;
animation: float ${Math.random() * 15 + 10}s infinite linear;
box-shadow: 0 0 ${Math.random() * 12 + 6}px rgba(0, 212, 255, 0.6);
`;
container.appendChild(p);
}
}

const styleSheet = document.createElement("style");
styleSheet.innerText = `
@keyframes float {
0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
10%, 90% { opacity: 1; }
50% { transform: translateY(-100vh) rotate(720deg); }
}
`;
document.head.appendChild(styleSheet);

// Initialize
document.addEventListener('DOMContentLoaded', () => {
createParticles();
fetchReportData();
});
</script>
</body>
</html>

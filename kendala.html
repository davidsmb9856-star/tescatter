<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00ffff">
<title>🎧 KENDALA ALL - LINE TOGEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-cyan: #00ffff;
--neon-blue: #0088ff;
--neon-purple: #9d00ff;
--neon-green: #00ff88;
--neon-yellow: #ffff00;
--neon-red: #ff0066;
--neon-pink: #ff00ff;
--bg-dark: #000a1e;
--bg-card: rgba(0, 20, 50, 0.7);
--bg-card-hover: rgba(0, 40, 100, 0.85);
--bg-panel: rgba(2, 12, 32, 0.92);
--bg-sticky: rgba(4, 12, 32, 0.95);
--bg-note: rgba(0, 25, 60, 0.85);
--text-main: #00ffff;
--text-secondary: #66ffff;
--text-dim: #33cccc;
--border-glow: rgba(0, 255, 255, 0.5);
--transition-fast: 0.2s ease;
--transition-normal: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Exo 2', sans-serif;
background: var(--bg-dark);
color: var(--text-main);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
}

.cyber-bg {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background:
radial-gradient(ellipse at 20% 80%, rgba(0, 243, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 80% 20%, rgba(157, 0, 255, 0.12) 0%, transparent 50%),
linear-gradient(180deg, #000a1e 0%, #001133 40%, #000820 100%);
z-index: -3;
}

.grid-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background-image:
linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
background-size: 50px 50px;
z-index: -2;
animation: gridFloat 40s linear infinite;
pointer-events: none;
}

@keyframes gridFloat {
0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
}

.particles {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
z-index: -1;
pointer-events: none;
}

.scan-line {
position: fixed;
top: 0; left: 0; width: 100%; height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
opacity: 0.4;
animation: scanDown 10s linear infinite;
z-index: 1;
pointer-events: none;
}

@keyframes scanDown {
0% { top: -10%; opacity: 0; }
10% { opacity: 0.6; }
90% { opacity: 0.6; }
100% { top: 110%; opacity: 0; }
}

.container {
max-width: 1200px;
margin: 0 auto;
padding: 20px 15px;
min-height: 100vh;
display: flex;
flex-direction: column;
position: relative;
z-index: 2;
}

.header {
text-align: center;
margin-bottom: 25px;
padding: 20px 15px;
position: relative;
}

.back-btn {
position: absolute;
left: 0; top: 50%;
transform: translateY(-50%);
background: rgba(0, 255, 255, 0.15);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 8px 16px;
border-radius: 10px;
text-decoration: none;
font-weight: 600;
font-size: 13px;
display: flex;
align-items: center;
gap: 6px;
transition: var(--transition-normal);
}

.back-btn:hover {
background: rgba(0, 255, 255, 0.3);
transform: translateY(-50%) translateX(-3px);
box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
}

.title {
font-family: 'Orbitron', sans-serif;
font-size: 32px;
font-weight: 800;
background: linear-gradient(90deg, #00f3ff, #9d00ff, #00f3ff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-size: 400% 400%;
animation: neonFlow 4s ease infinite;
text-shadow: 0 0 30px rgba(0, 243, 255, 0.7);
margin-bottom: 10px;
}

@keyframes neonFlow {
0%, 100% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
}

.subtitle {
font-size: 14px;
color: var(--text-secondary);
letter-spacing: 2px;
}

.search-section {
margin: 20px 0 25px;
text-align: center;
}

.search-bar {
position: relative;
max-width: 500px;
margin: 0 auto 15px;
}

.search-bar input {
width: 100%;
padding: 12px 18px 12px 45px;
background: rgba(0, 20, 50, 0.8);
border: 2px solid rgba(0, 255, 255, 0.5);
border-radius: 12px;
color: var(--text-main);
font-size: 14px;
font-family: 'Exo 2', sans-serif;
transition: var(--transition-normal);
}

.search-bar input:focus {
outline: none;
border-color: var(--neon-cyan);
box-shadow: 0 0 25px rgba(0, 255, 255, 0.5);
}

.search-bar i {
position: absolute;
left: 16px; top: 50%;
transform: translateY(-50%);
color: var(--neon-cyan);
font-size: 16px;
}

.stats-bar {
display: flex;
justify-content: center;
gap: 20px;
flex-wrap: wrap;
padding: 12px 16px;
background: rgba(0, 20, 50, 0.6);
border-radius: 12px;
border: 1px solid rgba(0, 255, 255, 0.3);
max-width: 700px;
margin: 0 auto;
}

.stat-item {
text-align: center;
padding: 6px 16px;
}

.stat-value {
font-family: 'Orbitron', sans-serif;
font-size: 22px;
font-weight: 700;
color: var(--neon-cyan);
display: block;
}

.stat-label {
font-size: 11px;
color: var(--text-secondary);
text-transform: uppercase;
}

.kendala-list {
display: flex;
flex-direction: column;
gap: 16px;
}

.kendala-card {
background: var(--bg-card);
border: 2px solid var(--border-glow);
border-radius: 18px;
padding: 20px 24px;
transition: var(--transition-normal);
position: relative;
overflow: hidden;
}

.kendala-card::before {
content: '';
position: absolute;
top: 0; left: 0;
width: 4px; height: 100%;
background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-purple));
box-shadow: 0 0 15px var(--neon-cyan);
}

.kendala-card:hover {
transform: translateY(-4px);
box-shadow: 0 15px 40px rgba(0, 255, 255, 0.3);
}

.kendala-title {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
font-weight: 700;
color: var(--neon-cyan);
margin-bottom: 14px;
cursor: pointer;
display: flex;
justify-content: space-between;
align-items: center;
padding-bottom: 12px;
border-bottom: 1px solid rgba(0, 255, 255, 0.2);
}

.kendala-title:hover {
color: var(--neon-green);
}

.kendala-answers {
display: none;
margin-top: 16px;
padding-top: 16px;
border-top: 1px solid rgba(0, 255, 255, 0.2);
}

.kendala-card.expanded .kendala-answers {
display: block;
}

.answer-item {
margin-bottom: 14px;
padding: 14px 16px;
background: rgba(0, 15, 40, 0.6);
border-radius: 10px;
border-left: 3px solid var(--neon-cyan);
}

.answer-label {
font-weight: 700;
color: var(--neon-yellow);
margin-bottom: 8px;
font-size: 12px;
text-transform: uppercase;
}

.answer-content {
color: var(--text-secondary);
line-height: 1.6;
white-space: pre-wrap;
word-break: break-word;
font-size: 13px;
}

.copy-btn, .sticky-btn {
background: rgba(0, 255, 255, 0.15);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 7px 16px;
border-radius: 8px;
cursor: pointer;
margin-top: 10px;
margin-right: 6px;
transition: var(--transition-normal);
font-weight: 600;
font-size: 12px;
}

.copy-btn:hover, .sticky-btn:hover {
background: rgba(0, 255, 255, 0.3);
box-shadow: 0 0 18px rgba(0, 255, 255, 0.6);
}

/* ========== STICKY NOTES PANEL ========== */
.sticky-fab {
position: fixed;
bottom: 25px;
right: 25px;
width: 50px;
height: 50px;
background: radial-gradient(circle at 30% 30%, var(--neon-cyan), var(--neon-purple));
border: 3px solid var(--neon-cyan);
border-radius: 50%;
color: #000;
font-size: 20px;
cursor: pointer;
z-index: 1000;
display: flex;
align-items: center;
justify-content: center;
box-shadow: 0 0 20px rgba(0, 255, 255, 0.7);
transition: var(--transition-normal);
animation: fabPulse 2.5s infinite alternate;
}

.sticky-fab:hover {
transform: scale(1.1) rotate(10deg);
box-shadow: 0 0 35px rgba(0, 255, 255, 0.9);
}

@keyframes fabPulse {
0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 255, 0.6); }
50% { box-shadow: 0 0 30px rgba(0, 255, 255, 0.9); }
}

.sticky-panel {
position: fixed;
bottom: 85px;
right: 25px;
width: 400px;
max-width: 90vw;
max-height: 70vh;
background: var(--bg-sticky);
border: 2px solid var(--neon-cyan);
border-radius: 16px;
padding: 18px;
z-index: 999;
display: none;
flex-direction: column;
backdrop-filter: blur(15px);
box-shadow: 0 0 35px rgba(0, 255, 255, 0.4);
animation: panelSlide 0.4s ease;
}

@keyframes panelSlide {
from { opacity: 0; transform: translateY(25px) scale(0.95); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

.sticky-panel.active {
display: flex;
}

.sticky-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 14px;
padding-bottom: 12px;
border-bottom: 1px solid rgba(0, 255, 255, 0.3);
}

.sticky-title {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
color: var(--neon-cyan);
text-shadow: 0 0 8px rgba(0, 255, 255, 0.7);
}

.sticky-close {
background: none;
border: none;
color: var(--neon-red);
font-size: 24px;
cursor: pointer;
transition: var(--transition-fast);
}

.sticky-close:hover {
transform: rotate(90deg) scale(1.2);
}

.sticky-input-area {
margin-bottom: 14px;
}

.sticky-input {
width: 100%;
min-height: 80px;
background: rgba(0, 15, 40, 0.7);
border: 2px solid rgba(0, 255, 255, 0.4);
border-radius: 12px;
padding: 12px;
color: var(--text-main);
font-size: 13px;
font-family: 'Exo 2', monospace;
resize: vertical;
transition: var(--transition-fast);
}

.sticky-input:focus {
outline: none;
border-color: var(--neon-cyan);
box-shadow: 0 0 12px rgba(0, 255, 255, 0.5);
}

.sticky-input::placeholder {
color: rgba(0, 255, 255, 0.4);
}

.sticky-photo-preview {
margin-top: 10px;
padding: 10px;
background: rgba(0, 255, 255, 0.1);
border: 2px dashed var(--neon-cyan);
border-radius: 10px;
display: none;
position: relative;
}

.sticky-photo-preview.show {
display: block;
animation: photoFadeIn 0.3s ease;
}

@keyframes photoFadeIn {
from { opacity: 0; transform: translateY(-5px); }
to { opacity: 1; transform: translateY(0); }
}

.sticky-photo-preview img {
max-width: 100%;
max-height: 150px;
border-radius: 8px;
border: 2px solid var(--neon-cyan);
display: block;
}

.sticky-photo-preview-text {
font-size: 11px;
color: var(--neon-green);
margin-bottom: 6px;
display: flex;
align-items: center;
gap: 5px;
}

.sticky-remove-photo {
position: absolute;
top: 6px;
right: 6px;
background: var(--neon-red);
color: #fff;
border: none;
width: 24px;
height: 24px;
border-radius: 50%;
cursor: pointer;
font-size: 14px;
display: flex;
align-items: center;
justify-content: center;
transition: var(--transition-fast);
}

.sticky-remove-photo:hover {
background: #ff3366;
transform: scale(1.1);
}

.sticky-btn-group {
display: flex;
gap: 8px;
margin-top: 10px;
flex-wrap: wrap;
}

.sticky-add-btn {
background: linear-gradient(145deg, rgba(0, 255, 255, 0.25), rgba(0, 150, 255, 0.25));
color: var(--neon-cyan);
border: 2px solid var(--neon-cyan);
padding: 10px 20px;
border-radius: 10px;
cursor: pointer;
font-weight: 700;
font-size: 13px;
transition: var(--transition-normal);
display: inline-flex;
align-items: center;
gap: 6px;
}

.sticky-add-btn:hover {
background: rgba(0, 255, 255, 0.35);
transform: translateY(-2px);
box-shadow: 0 0 18px rgba(0, 255, 255, 0.6);
}

.sticky-add-btn.editing {
background: linear-gradient(145deg, rgba(255, 255, 0, 0.25), rgba(255, 200, 0, 0.25));
border-color: var(--neon-yellow);
color: var(--neon-yellow);
}

.sticky-upload-btn {
background: rgba(0, 255, 136, 0.15);
border: 2px solid var(--neon-green);
color: var(--neon-green);
padding: 10px 18px;
border-radius: 10px;
cursor: pointer;
font-weight: 600;
font-size: 12px;
transition: var(--transition-normal);
display: inline-flex;
align-items: center;
gap: 5px;
}

.sticky-upload-btn:hover {
background: rgba(0, 255, 136, 0.3);
transform: translateY(-2px);
box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
}

#fileInput {
display: none;
}

.sticky-list {
flex: 1;
overflow-y: auto;
padding-right: 4px;
}

.sticky-list::-webkit-scrollbar {
width: 5px;
}

.sticky-list::-webkit-scrollbar-track {
background: rgba(0, 10, 30, 0.5);
border-radius: 3px;
}

.sticky-list::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon-cyan), var(--neon-purple));
border-radius: 3px;
}

/* ========== STICKY NOTE CARD ========== */
.sticky-note {
background: var(--bg-note);
border: 1.5px solid rgba(0, 255, 255, 0.4);
border-radius: 12px;
padding: 12px;
margin-bottom: 10px;
cursor: grab;
transition: var(--transition-fast);
position: relative;
overflow: hidden;
}

.sticky-note::before {
content: '';
position: absolute;
top: 0; left: 0;
width: 3px; height: 100%;
background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-purple));
}

.sticky-note:active {
cursor: grabbing;
}

.sticky-note:hover {
border-color: var(--neon-cyan);
box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
transform: translateX(3px);
}

.sticky-note.dragging {
opacity: 0.7;
border-style: dashed;
transform: scale(1.02);
}

.sticky-note-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 8px;
}

.sticky-note-id {
font-size: 10px;
color: var(--neon-purple);
font-family: 'Orbitron', monospace;
}

.sticky-note-content {
color: var(--text-secondary);
font-size: 12px;
line-height: 1.5;
white-space: pre-wrap;
word-break: break-word;
margin-bottom: 8px;
cursor: pointer;
padding: 8px;
background: rgba(0, 255, 255, 0.05);
border-radius: 6px;
}

.sticky-note-content:hover {
color: var(--neon-cyan);
background: rgba(0, 255, 255, 0.1);
}

.sticky-note img {
max-width: 100%;
max-height: 120px;
border-radius: 8px;
border: 2px solid var(--neon-cyan);
margin: 6px 0;
cursor: pointer;
transition: var(--transition-fast);
}

.sticky-note img:hover {
transform: scale(1.02);
box-shadow: 0 0 12px rgba(0, 255, 255, 0.6);
}

.sticky-note-actions {
display: flex;
gap: 5px;
justify-content: flex-end;
margin-top: 8px;
flex-wrap: wrap;
}

.sticky-action-btn {
background: rgba(0, 255, 255, 0.1);
border: 1px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 5px 10px;
border-radius: 6px;
cursor: pointer;
font-size: 11px;
transition: var(--transition-fast);
font-weight: 600;
display: inline-flex;
align-items: center;
gap: 4px;
}

.sticky-action-btn:hover {
background: rgba(0, 255, 255, 0.25);
transform: translateY(-1px);
}

.sticky-action-btn.delete {
border-color: var(--neon-red);
color: var(--neon-red);
}

.sticky-action-btn.delete:hover {
background: rgba(255, 0, 102, 0.2);
}

.sticky-action-btn.edit {
border-color: var(--neon-yellow);
color: var(--neon-yellow);
}

.sticky-action-btn.edit:hover {
background: rgba(255, 255, 0, 0.2);
}

.sticky-action-btn.copy {
border-color: var(--neon-green);
color: var(--neon-green);
}

.sticky-action-btn.copy:hover {
background: rgba(0, 255, 136, 0.2);
}

/* ========== LIGHTBOX ========== */
.lightbox {
display: none;
position: fixed;
top: 0; left: 0;
width: 100vw; height: 100vh;
background: rgba(0, 5, 20, 0.97);
z-index: 9999;
flex-direction: column;
justify-content: center;
align-items: center;
padding: 20px;
}

.lightbox.active {
display: flex;
}

.lightbox-close {
position: absolute;
top: 20px; right: 25px;
font-size: 32px;
color: var(--neon-cyan);
cursor: pointer;
transition: var(--transition-normal);
}

.lightbox-close:hover {
color: var(--neon-red);
transform: rotate(90deg);
}

.lightbox-img {
max-width: 90%;
max-height: 75vh;
border-radius: 12px;
border: 3px solid var(--neon-cyan);
box-shadow: 0 0 40px rgba(0, 255, 255, 0.6);
}

/* ========== TOAST ========== */
.toast {
position: fixed;
bottom: 30px;
right: 30px;
background: rgba(2, 12, 32, 0.95);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 14px 24px;
border-radius: 12px;
font-weight: 600;
font-size: 13px;
z-index: 10000;
display: flex;
align-items: center;
gap: 10px;
box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
transform: translateX(200px);
opacity: 0;
transition: var(--transition-normal);
}

.toast.show {
transform: translateX(0);
opacity: 1;
}

.toast.delete {
border-color: var(--neon-red);
color: var(--neon-red);
}

.loading, .no-data, .error-msg {
text-align: center;
padding: 50px 25px;
}

.loading-spinner {
width: 45px; height: 45px;
border: 3px solid rgba(0, 255, 255, 0.2);
border-top-color: var(--neon-cyan);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 16px;
}

@keyframes spin {
to { transform: rotate(360deg); }
}

.error-msg {
color: var(--neon-red);
background: rgba(255, 100, 100, 0.1);
border-radius: 12px;
border: 1px solid var(--neon-red);
}

@media (max-width: 768px) {
.container { padding: 16px 12px; }
.title { font-size: 26px; }
.sticky-panel {
width: 95vw;
right: 2.5vw;
bottom: 80px;
}
.sticky-fab {
bottom: 16px;
right: 16px;
width: 45px;
height: 45px;
}
}

::-webkit-scrollbar {
width: 8px;
}

::-webkit-scrollbar-track {
background: rgba(0, 10, 30, 0.5);
}

::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon-cyan), var(--neon-purple));
border-radius: 4px;
}
</style>
</head>
<body>
<div class="cyber-bg"></div>
<div class="grid-overlay"></div>
<div class="particles" id="particles"></div>
<div class="scan-line"></div>

<div class="container">
<header class="header">
<a href="index.html" class="back-btn">
<i class="fas fa-arrow-left"></i> Kembali
</a>
<h1 class="title">🎧 KENDALA ALL</h1>
<p class="subtitle">Database Solusi & Bantuan</p>
</header>

<div class="search-section">
<div class="search-bar">
<i class="fas fa-search"></i>
<input type="text" id="searchInput" placeholder="🔍 Cari kendala..." oninput="searchKendala()">
</div>
<div class="stats-bar">
<div class="stat-item">
<span class="stat-value" id="totalItems">0</span>
<span class="stat-label">Total</span>
</div>
<div class="stat-item">
<span class="stat-value" id="withPhotos">0</span>
<span class="stat-label">Foto</span>
</div>
<div class="stat-item">
<span class="stat-value" id="withLinks">0</span>
<span class="stat-label">Link</span>
</div>
</div>
</div>

<div id="kendalaContainer">
<div class="loading">
<div class="loading-spinner"></div>
<p>Mengambil data...</p>
</div>
</div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
<span class="lightbox-close" onclick="closeLightbox()">&times;</span>
<img class="lightbox-img" id="lightboxImg" src="" alt="Preview">
</div>

<div class="sticky-fab" onclick="toggleStickyPanel()" title="Sticky Notes">
<i class="fas fa-sticky-note"></i>
</div>

<div class="sticky-panel" id="stickyPanel">
<div class="sticky-header">
<span class="sticky-title">📝 Sticky Notes</span>
<button class="sticky-close" onclick="toggleStickyPanel()">&times;</button>
</div>
<div class="sticky-input-area">
<textarea class="sticky-input" id="stickyInput" placeholder="✏️ Tulis catatan...
📸 Paste foto (Ctrl+V) atau Upload"></textarea>
<input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
<div class="sticky-photo-preview" id="stickyPhotoPreview">
<div class="sticky-photo-preview-text">
<i class="fas fa-image"></i> Foto terdeteksi:
</div>
<img id="stickyPreviewImg" src="" alt="Preview">
<button class="sticky-remove-photo" onclick="removePhoto()">
<i class="fas fa-times"></i>
</button>
</div>
<div class="sticky-btn-group">
<button class="sticky-add-btn" id="stickyAddBtn" onclick="handleStickyAction()">
<i class="fas fa-plus"></i> <span id="stickyBtnText">Tambah</span>
</button>
<button class="sticky-upload-btn" onclick="document.getElementById('fileInput').click()">
<i class="fas fa-upload"></i> Upload
</button>
<button class="sticky-add-btn" id="stickyCancelBtn" onclick="cancelEdit()" style="display:none;background:rgba(255,0,102,0.2);border-color:var(--neon-red);color:var(--neon-red);">
<i class="fas fa-times"></i> Batal
</button>
</div>
</div>
<div class="sticky-list" id="stickyList"></div>
</div>

<div id="toast" class="toast">
<i class="fas fa-check-circle"></i>
<span id="toastMessage">Notifikasi</span>
</div>
</div>

<script>
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

let allKendala = [];
let filteredKendala = [];
let lightboxImages = [];
let stickyNotes = JSON.parse(localStorage.getItem('stickyNotes') || '[]');
let draggedNote = null;
let editingIndex = -1;
let tempPhotoData = null;

async function loadKendalaData() {
try {
const response = await fetch(DATA_URL);
const text = await response.text();
const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
if (!jsonMatch) throw new Error('Gagal parse');
const data = JSON.parse(jsonMatch[1]);
const rows = data.table?.rows || [];

allKendala = rows.map(row => {
const cells = row.c || [];
return {
judul: cells[0]?.v?.toString().trim() || '',
jawaban1: cells[1]?.v?.toString().trim() || '',
jawaban2: cells[2]?.v?.toString().trim() || '',
jawaban3: cells[3]?.v?.toString().trim() || ''
};
}).filter(item => item.judul && item.judul !== '');

filteredKendala = [...allKendala];
renderKendala();
updateStats();
} catch (error) {
document.getElementById('kendalaContainer').innerHTML = `
<div class="error-msg">
<i class="fas fa-exclamation-triangle" style="font-size: 28px; margin-bottom: 12px;"></i>
<p>Gagal memuat data</p>
</div>`;
}
}

function renderKendala(data = filteredKendala) {
const container = document.getElementById('kendalaContainer');
if (data.length === 0) {
container.innerHTML = '<div class="no-data"><p>Tidak ada data</p></div>';
return;
}
container.innerHTML = `<div class="kendala-list">${data.map((item, index) => createKendalaCard(item, index)).join('')}</div>`;
document.querySelectorAll('.kendala-title').forEach(title => {
title.addEventListener('click', function() {
this.parentElement.classList.toggle('expanded');
});
});
}

function createKendalaCard(item, index) {
return `
<div class="kendala-card" data-index="${index}">
<h3 class="kendala-title">${escapeHtml(item.judul)} <i class="fas fa-chevron-down" style="font-size: 10px;"></i></h3>
<div class="kendala-answers">
${item.jawaban1 ? `
<div class="answer-item">
<div class="answer-label">JAWABAN 1</div>
<div class="answer-content">${escapeHtml(item.jawaban1)}</div>
<button class="copy-btn" onclick="copyAnswer(${index}, 1)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 1)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
${item.jawaban2 ? `
<div class="answer-item">
<div class="answer-label">JAWABAN 2</div>
<div class="answer-content">${escapeHtml(item.jawaban2)}</div>
<button class="copy-btn" onclick="copyAnswer(${index}, 2)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 2)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
${item.jawaban3 ? `
<div class="answer-item">
<div class="answer-label">JAWABAN 3</div>
<div class="answer-content">${escapeHtml(item.jawaban3)}</div>
<button class="copy-btn" onclick="copyAnswer(${index}, 3)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 3)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
</div>
</div>`;
}

async function copyAnswer(index, answerNum) {
const item = filteredKendala[index];
const content = item[`jawaban${answerNum}`];
if (!content) return;
try {
await navigator.clipboard.writeText(content);
showToast('✅ Disalin!');
} catch {
showToast('❗ Gagal');
}
}

function openLightbox(url) {
lightboxImages = [url];
document.getElementById('lightboxImg').src = url;
document.getElementById('lightbox').classList.add('active');
}

function closeLightbox(event) {
if (!event || event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
document.getElementById('lightbox').classList.remove('active');
}
}

function toggleStickyPanel() {
const panel = document.getElementById('stickyPanel');
panel.classList.toggle('active');
if (panel.classList.contains('active')) {
renderStickyNotes();
}
}

function renderStickyNotes() {
const list = document.getElementById('stickyList');
if (!list) return;
list.innerHTML = '';

if (stickyNotes.length === 0) {
list.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:20px;font-size:12px;">📭 Belum ada sticky notes</p>';
return;
}

stickyNotes.forEach((note, index) => {
const div = document.createElement('div');
div.className = 'sticky-note';
div.draggable = true;
div.dataset.index = index;

const header = document.createElement('div');
header.className = 'sticky-note-header';
header.innerHTML = `<span class="sticky-note-id">#${String(index + 1).padStart(3, '0')}</span>`;
div.appendChild(header);

if (note.text) {
const content = document.createElement('div');
content.className = 'sticky-note-content';
content.textContent = note.text;
content.onclick = () => copyStickyNote(index);
content.title = '📋 Klik untuk copy Text + Foto';
div.appendChild(content);
}

if (note.image) {
const img = document.createElement('img');
img.src = note.image;
img.alt = 'Sticky Image';
img.onclick = () => copyStickyNote(index);
div.appendChild(img);
}

const actions = document.createElement('div');
actions.className = 'sticky-note-actions';

const copyBtn = document.createElement('button');
copyBtn.className = 'sticky-action-btn copy';
copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
copyBtn.onclick = (e) => { e.stopPropagation(); copyStickyNote(index); };

const editBtn = document.createElement('button');
editBtn.className = 'sticky-action-btn edit';
editBtn.innerHTML = '<i class="fas fa-edit"></i> Edit';
editBtn.onclick = (e) => { e.stopPropagation(); editStickyNote(index); };

const deleteBtn = document.createElement('button');
deleteBtn.className = 'sticky-action-btn delete';
deleteBtn.innerHTML = '<i class="fas fa-trash"></i> Hapus';
deleteBtn.onclick = (e) => { e.stopPropagation(); deleteStickyNote(index); };

actions.appendChild(copyBtn);
actions.appendChild(editBtn);
actions.appendChild(deleteBtn);
div.appendChild(actions);

div.addEventListener('dragstart', handleDragStart);
div.addEventListener('dragover', handleDragOver);
div.addEventListener('drop', handleDrop);
div.addEventListener('dragend', handleDragEnd);

list.appendChild(div);
});
}

function handleFileSelect(event) {
const file = event.target.files[0];
if (file && file.type.startsWith('image/')) {
const reader = new FileReader();
reader.onload = function(e) {
tempPhotoData = e.target.result;
showPhotoPreview(tempPhotoData);
};
reader.readAsDataURL(file);
}
}

function showPhotoPreview(dataUrl) {
const preview = document.getElementById('stickyPhotoPreview');
const previewImg = document.getElementById('stickyPreviewImg');
previewImg.src = dataUrl;
preview.classList.add('show');
}

function removePhoto() {
tempPhotoData = null;
document.getElementById('stickyPhotoPreview').classList.remove('show');
document.getElementById('fileInput').value = '';
}

function handleStickyPaste(event) {
const items = event.clipboardData.items;
for (let i = 0; i < items.length; i++) {
if (items[i].type.startsWith('image/')) {
event.preventDefault();
const blob = items[i].getAsFile();
const reader = new FileReader();
reader.onload = function(e) {
tempPhotoData = e.target.result;
showPhotoPreview(tempPhotoData);
showToast('📸 Foto ditempel!');
};
reader.readAsDataURL(blob);
break;
}
}
}

function handleStickyAction() {
if (editingIndex >= 0) {
updateStickyNote();
} else {
addStickyNote();
}
}

function addStickyNote() {
const input = document.getElementById('stickyInput');
const text = input.value.trim();

if (!text && !tempPhotoData) {
showToast('⚠️ Isi catatan atau tambah foto!');
return;
}

stickyNotes.push({
text: text,
image: tempPhotoData,
timestamp: Date.now()
});

localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
input.value = '';
removePhoto();
renderStickyNotes();
showToast('✅ Ditambahkan!');
}

async function copyStickyNote(index) {
const note = stickyNotes[index];
if (!note) return;

try {
const items = [];
let copiedInfo = [];

if (note.text) {
const textBlob = new Blob([note.text], { type: 'text/plain' });
items.push(new ClipboardItem({ 'text/plain': textBlob }));
copiedInfo.push('Text');
}

if (note.image) {
try {
const response = await fetch(note.image);
const blob = await response.blob();
items.push(new ClipboardItem({ [blob.type]: blob }));
copiedInfo.push('Foto');
} catch {
const urlBlob = new Blob([note.image], { type: 'text/plain' });
items.push(new ClipboardItem({ 'text/plain': urlBlob }));
copiedInfo.push('URL');
}
}

if (items.length > 0) {
await navigator.clipboard.write(items);
showToast(`✅ ${copiedInfo.join(' + ')} disalin!`);
}
} catch {
if (note.text) {
await navigator.clipboard.writeText(note.text);
showToast('✅ Text disalin!');
}
}
}

function editStickyNote(index) {
const note = stickyNotes[index];
if (!note) return;

editingIndex = index;
const input = document.getElementById('stickyInput');
input.value = note.text || '';

if (note.image) {
tempPhotoData = note.image;
showPhotoPreview(note.image);
}

const addBtn = document.getElementById('stickyAddBtn');
const cancelBtn = document.getElementById('stickyCancelBtn');
addBtn.classList.add('editing');
addBtn.innerHTML = '<i class="fas fa-save"></i> <span>Update</span>';
cancelBtn.style.display = 'inline-flex';

input.focus();
showToast('✏️ Mode Edit Aktif');
}

function updateStickyNote() {
const input = document.getElementById('stickyInput');
const text = input.value.trim();

if ((!text && !tempPhotoData) || editingIndex < 0) {
showToast('⚠️ Isi catatan!');
return;
}

stickyNotes[editingIndex] = {
text: text,
image: tempPhotoData,
timestamp: Date.now()
};

localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
cancelEdit();
renderStickyNotes();
showToast('✅ Diperbarui!');
}

function cancelEdit() {
editingIndex = -1;
const input = document.getElementById('stickyInput');
input.value = '';
removePhoto();

const addBtn = document.getElementById('stickyAddBtn');
const cancelBtn = document.getElementById('stickyCancelBtn');
addBtn.classList.remove('editing');
addBtn.innerHTML = '<i class="fas fa-plus"></i> <span>Tambah</span>';
cancelBtn.style.display = 'none';
}

function deleteStickyNote(index) {
if (confirm('Hapus sticky note ini?')) {
stickyNotes.splice(index, 1);
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
showToastDelete('🗑️ Dihapus!');
}
}

function handleDragStart(e) {
draggedNote = this;
this.classList.add('dragging');
e.dataTransfer.effectAllowed = 'move';
}

function handleDragOver(e) {
e.preventDefault();
return false;
}

function handleDrop(e) {
e.stopPropagation();
if (!draggedNote || this === draggedNote) return false;

const fromIndex = parseInt(draggedNote.dataset.index);
const toIndex = parseInt(this.dataset.index);

if (fromIndex !== toIndex) {
const [moved] = stickyNotes.splice(fromIndex, 1);
stickyNotes.splice(toIndex, 0, moved);
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
}
return false;
}

function handleDragEnd() {
this.classList.remove('dragging');
draggedNote = null;
}

function addToSticky(kendalaIndex, answerNum) {
const item = filteredKendala[kendalaIndex];
const content = item[`jawaban${answerNum}`];
if (!content) return;

stickyNotes.push({
text: content,
image: null,
timestamp: Date.now()
});

localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
showToast('✅ Ditambahkan ke Sticky!');
}

function searchKendala() {
const query = document.getElementById('searchInput').value.toLowerCase().trim();
filteredKendala = allKendala.filter(item =>
item.judul.toLowerCase().includes(query) ||
(item.jawaban1 && item.jawaban1.toLowerCase().includes(query))
);
renderKendala();
updateStats();
}

function updateStats() {
document.getElementById('totalItems').textContent = filteredKendala.length;
document.getElementById('withPhotos').textContent = filteredKendala.length;
document.getElementById('withLinks').textContent = filteredKendala.length;
}

function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.className = 'toast';
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

function showToastDelete(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.className = 'toast delete';
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

function escapeHtml(text) {
if (!text) return '';
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}

function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
for (let i = 0; i < 40; i++) {
const particle = document.createElement('div');
const size = Math.random() * 3 + 1;
particle.style.cssText = `
position: absolute;
width: ${size}px;
height: ${size}px;
background: rgba(0, 255, 255, ${Math.random() * 0.5 + 0.2});
border-radius: 50%;
left: ${Math.random() * 100}%;
top: ${Math.random() * 100}%;
animation: float ${Math.random() * 15 + 10}s infinite linear;
`;
container.appendChild(particle);
}
}

const style = document.createElement('style');
style.textContent = `
@keyframes float {
0%, 100% { transform: translateY(0); opacity: 0; }
10%, 90% { opacity: 1; }
50% { transform: translateY(-200px); }
}
`;
document.head.appendChild(style);

document.addEventListener('DOMContentLoaded', () => {
createParticles();
loadKendalaData();

const stickyInput = document.getElementById('stickyInput');
if (stickyInput) {
stickyInput.addEventListener('paste', handleStickyPaste);
}

setTimeout(() => showToast('🚀 System Ready!'), 1000);
});

document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') {
closeLightbox();
if (editingIndex >= 0) cancelEdit();
}
});
</script>
</body>
</html>

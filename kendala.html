<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>⚡ KENDALA ALL - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-blue: #00d4ff;
--neon-cyan: #00ffff;
--neon-electric: #00f5ff;
--neon-purple: #7b2fff;
--neon-pink: #ff00aa;
--neon-gold: #ffd700;
--neon-green: #00ff9d;
--bg-deep: #020408;
--bg-surface: rgba(5, 15, 35, 0.9);
--bg-elevated: rgba(10, 25, 55, 0.8);
--bg-glass: rgba(8, 20, 45, 0.7);
--text-primary: #ffffff;
--text-secondary: #8ab4f8;
--text-dim: #54689a;
--border-glow: rgba(0, 212, 255, 0.6);
--glow-blue: 0 0 15px rgba(0, 212, 255, 0.6), 0 0 35px rgba(0, 212, 255, 0.4), 0 0 75px rgba(0, 212, 255, 0.2);
--glow-electric: 0 0 20px rgba(0, 245, 255, 0.7), 0 0 50px rgba(0, 245, 255, 0.4), 0 0 100px rgba(0, 245, 255, 0.2);
--transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
--transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
--transition-bloom: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-deep);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
}

/* ========== BACKGROUND EFFECTS 2026 ========== */
.bg-canvas {
position: fixed;
inset: 0;
z-index: -3;
background:
radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
radial-gradient(ellipse at 80% 15%, rgba(0, 245, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 50% 85%, rgba(123, 47, 255, 0.1) 0%, transparent 50%),
radial-gradient(ellipse at 15% 75%, rgba(0, 212, 255, 0.08) 0%, transparent 50%);
animation: bgPulse 15s ease-in-out infinite alternate;
}
@keyframes bgPulse {
0%, 100% { opacity: 1; filter: hue-rotate(0deg); }
50% { opacity: 0.9; filter: hue-rotate(15deg); }
}

/* Animated Grid */
.grid-overlay {
position: fixed;
inset: 0;
z-index: -2;
background-image:
linear-gradient(rgba(0, 212, 255, 0.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.06) 1px, transparent 1px);
background-size: 50px 50px;
mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 75%);
animation: gridMove 30s linear infinite;
}
@keyframes gridMove {
0% { background-position: 0 0; }
100% { background-position: 50px 50px; }
}

/* Electric Lightning Effect */
.lightning-overlay {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
opacity: 0;
animation: lightningFlash 8s infinite;
}
@keyframes lightningFlash {
0%, 89%, 91%, 93%, 100% { opacity: 0; }
90%, 92% { opacity: 0.15; }
}
.lightning-bolt {
position: absolute;
width: 3px;
height: 100vh;
background: linear-gradient(180deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
filter: blur(2px);
animation: lightningStrike 8s infinite;
}
.lightning-bolt:nth-child(1) { left: 15%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 2s; }
.lightning-bolt:nth-child(3) { left: 85%; animation-delay: 4s; }
@keyframes lightningStrike {
0%, 89%, 91%, 93%, 100% { transform: scaleY(0); opacity: 0; }
90%, 92% { transform: scaleY(1); opacity: 1; }
}

/* Floating Particles */
.particles {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
overflow: hidden;
}
.particle {
position: absolute;
width: 4px; height: 4px;
background: var(--neon-blue);
border-radius: 50%;
opacity: 0.7;
animation: particleFloat 20s infinite ease-in-out;
box-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-electric);
}
.particle:nth-child(2n) {
background: var(--neon-electric);
box-shadow: 0 0 20px var(--neon-electric), 0 0 40px var(--neon-blue);
animation-delay: -5s;
animation-duration: 25s;
}
.particle:nth-child(3n) {
background: var(--neon-purple);
box-shadow: 0 0 15px var(--neon-purple), 0 0 30px var(--neon-blue);
animation-delay: -10s;
animation-duration: 30s;
}
@keyframes particleFloat {
0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
10% { opacity: 0.7; }
90% { opacity: 0.7; }
100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

/* Scan Line Effect */
.scanline {
position: fixed;
left: 0; right: 0; height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
opacity: 0.8;
animation: scanLine 6s linear infinite;
z-index: 100;
pointer-events: none;
filter: blur(1px);
box-shadow: 0 0 20px var(--neon-blue);
}
@keyframes scanLine {
0% { top: -3px; opacity: 0; }
5% { opacity: 0.8; }
95% { opacity: 0.8; }
100% { top: 100%; opacity: 0; }
}

/* Noise Texture */
.noise {
position: fixed;
inset: 0;
z-index: -1;
opacity: 0.03;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
pointer-events: none;
}

/* ========== CONTAINER & LAYOUT ========== */
.container {
max-width: 1200px;
margin: 0 auto;
padding: 40px 20px;
min-height: 100vh;
display: flex;
flex-direction: column;
position: relative;
z-index: 2;
}

/* ========== HEADER 2026 ========== */
.header {
text-align: center;
margin-bottom: 35px;
padding: 30px 20px;
position: relative;
animation: headerEntrance 1s var(--transition-bloom) backwards;
}
@keyframes headerEntrance {
from { opacity: 0; transform: translateY(-50px) scale(0.95); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

.back-btn {
position: absolute;
left: 0; top: 50%;
transform: translateY(-50%);
background: rgba(0, 212, 255, 0.15);
border: 2px solid var(--neon-blue);
color: var(--neon-blue);
padding: 10px 20px;
border-radius: 12px;
text-decoration: none;
font-weight: 600;
font-size: 13px;
display: flex;
align-items: center;
gap: 8px;
transition: var(--transition-smooth);
backdrop-filter: blur(10px);
}
.back-btn:hover {
background: rgba(0, 212, 255, 0.3);
transform: translateY(-50%) translateX(-5px);
box-shadow: var(--glow-blue);
}

.logo-wrapper {
position: relative;
display: inline-block;
margin-bottom: 20px;
}

.logo-glow {
position: absolute;
inset: -30px;
background: radial-gradient(ellipse, rgba(0, 212, 255, 0.35) 0%, rgba(0, 245, 255, 0.2) 40%, transparent 70%);
border-radius: 50%;
animation: logoGlowPulse 2.5s ease-in-out infinite;
filter: blur(25px);
}
@keyframes logoGlowPulse {
0%, 100% { opacity: 0.7; transform: scale(1); }
50% { opacity: 1; transform: scale(1.2); }
}

.logo-icon {
width: 120px; height: 120px;
position: relative;
margin: 0 auto;
filter: drop-shadow(var(--glow-electric));
}

.logo-icon svg {
width: 100%; height: 100%;
animation: logoRotate 20s linear infinite;
}
@keyframes logoRotate {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}

/* Electric Arc Animation */
.electric-arc {
position: absolute;
inset: -10px;
border-radius: 50%;
border: 2px solid transparent;
border-top-color: var(--neon-electric);
border-right-color: var(--neon-blue);
animation: electricSpin 3s linear infinite;
filter: drop-shadow(0 0 10px var(--neon-electric));
}
.electric-arc:nth-child(2) {
inset: -20px;
animation-direction: reverse;
animation-duration: 4s;
border-top-color: var(--neon-blue);
border-left-color: var(--neon-electric);
}
@keyframes electricSpin {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}

.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(36px, 7vw, 56px);
font-weight: 900;
letter-spacing: 4px;
margin-bottom: 10px;
position: relative;
background: linear-gradient(135deg, var(--neon-electric) 0%, var(--neon-blue) 35%, #ffffff 50%, var(--neon-blue) 70%, var(--neon-purple) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
animation: titleShimmer 3s ease-in-out infinite;
}
@keyframes titleShimmer {
0%, 100% { filter: brightness(1); }
50% { filter: brightness(1.3); }
}

.subtitle {
font-size: 15px;
color: var(--text-secondary);
letter-spacing: 6px;
text-transform: uppercase;
margin-bottom: 15px;
font-weight: 500;
}

/* Status Badge 2026 */
.status-badge {
display: inline-flex;
align-items: center;
gap: 12px;
padding: 10px 24px;
background: rgba(0, 255, 157, 0.12);
border: 1px solid rgba(0, 255, 157, 0.4);
border-radius: 100px;
font-size: 13px;
font-weight: 600;
color: var(--neon-green);
text-transform: uppercase;
letter-spacing: 2px;
animation: statusPulse 2.5s ease-in-out infinite;
box-shadow: 0 0 20px rgba(0, 255, 157, 0.25);
}
@keyframes statusPulse {
0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 157, 0.25); }
50% { box-shadow: 0 0 35px rgba(0, 255, 157, 0.5); }
}

.status-dot {
width: 9px; height: 9px;
background: var(--neon-green);
border-radius: 50%;
animation: dotBeat 1.5s ease-in-out infinite;
box-shadow: 0 0 15px var(--neon-green);
}
@keyframes dotBeat {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.4); opacity: 0.7; }
}

/* ========== SEARCH SECTION 2026 ========== */
.search-section {
margin: 30px 0 35px;
text-align: center;
}

.search-bar {
position: relative;
max-width: 600px;
margin: 0 auto 20px;
}

.search-bar input {
width: 100%;
padding: 16px 24px 16px 55px;
background: var(--bg-surface);
border: 2px solid var(--border-glow);
border-radius: 16px;
color: var(--text-primary);
font-size: 15px;
font-family: 'Rajdhani', sans-serif;
font-weight: 600;
transition: var(--transition-smooth);
backdrop-filter: blur(10px);
}

.search-bar input::placeholder {
color: var(--text-dim);
}

.search-bar input:focus {
outline: none;
border-color: var(--neon-electric);
box-shadow: var(--glow-electric);
background: var(--bg-elevated);
}

.search-bar i {
position: absolute;
left: 20px; top: 50%;
transform: translateY(-50%);
color: var(--neon-blue);
font-size: 18px;
text-shadow: 0 0 15px rgba(0, 212, 255, 0.7);
}

/* Stats Bar 2026 */
.stats-bar {
display: flex;
justify-content: center;
gap: 25px;
flex-wrap: wrap;
padding: 16px 20px;
background: var(--bg-surface);
border-radius: 16px;
border: 1px solid var(--border-glow);
max-width: 750px;
margin: 0 auto;
box-shadow: var(--glow-blue);
}

.stat-item {
text-align: center;
padding: 8px 20px;
}

.stat-value {
font-family: 'Orbitron', sans-serif;
font-size: 26px;
font-weight: 700;
color: var(--neon-electric);
text-shadow: 0 0 20px rgba(0, 245, 255, 0.7);
display: block;
}

.stat-label {
font-size: 11px;
color: var(--text-secondary);
text-transform: uppercase;
letter-spacing: 2px;
margin-top: 4px;
}

/* ========== KENDALA CARDS 2026 ========== */
.kendala-list {
display: flex;
flex-direction: column;
gap: 20px;
}

.kendala-card {
background: var(--bg-surface);
border: 1px solid rgba(0, 212, 255, 0.25);
border-radius: 20px;
padding: 24px 28px;
transition: var(--transition-bloom);
position: relative;
overflow: hidden;
backdrop-filter: blur(20px);
animation: cardEnter 0.5s ease forwards;
opacity: 0;
transform: translateY(20px);
}
.kendala-card:nth-child(1) { animation-delay: 0.1s; }
.kendala-card:nth-child(2) { animation-delay: 0.15s; }
.kendala-card:nth-child(3) { animation-delay: 0.2s; }
.kendala-card:nth-child(4) { animation-delay: 0.25s; }
.kendala-card:nth-child(5) { animation-delay: 0.3s; }
@keyframes cardEnter {
to { opacity: 1; transform: translateY(0); }
}

.kendala-card::before {
content: '';
position: absolute;
top: 0; left: 0;
width: 4px; height: 100%;
background: linear-gradient(to bottom, var(--neon-electric), var(--neon-blue), var(--neon-purple));
box-shadow: 0 0 15px var(--neon-electric);
transition: var(--transition-smooth);
}

.kendala-card:hover {
transform: translateY(-6px) scale(1.01);
border-color: var(--neon-electric);
box-shadow: var(--glow-electric), 0 20px 50px rgba(0, 0, 0, 0.4);
}

.kendala-card:hover::before {
width: 6px;
box-shadow: 0 0 25px var(--neon-electric);
}

.kendala-title {
font-family: 'Orbitron', sans-serif;
font-size: 17px;
font-weight: 700;
color: var(--neon-electric);
margin-bottom: 16px;
cursor: pointer;
display: flex;
justify-content: space-between;
align-items: center;
text-shadow: 0 0 15px rgba(0, 245, 255, 0.7);
padding-bottom: 14px;
border-bottom: 1px solid rgba(0, 212, 255, 0.2);
transition: var(--transition-fast);
}

.kendala-title:hover {
color: var(--neon-cyan);
text-shadow: 0 0 20px rgba(0, 255, 255, 0.9);
}

.kendala-title::after {
content: '▼';
font-size: 12px;
transition: transform 0.3s ease;
color: var(--neon-blue);
}

.kendala-card.expanded .kendala-title::after {
transform: rotate(180deg);
}

/* ========== ANSWER ITEMS 2026 ========== */
.kendala-answers {
display: none;
margin-top: 18px;
padding-top: 18px;
border-top: 1px solid rgba(0, 212, 255, 0.2);
animation: slideDown 0.3s ease;
}
@keyframes slideDown {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }
}

.kendala-card.expanded .kendala-answers {
display: block;
}

.answer-item {
margin-bottom: 16px;
padding: 16px 18px;
background: var(--bg-elevated);
border-radius: 14px;
border-left: 3px solid var(--neon-blue);
transition: var(--transition-fast);
position: relative;
}

.answer-item:hover {
background: var(--bg-glass);
border-left-color: var(--neon-electric);
transform: translateX(3px);
}

.answer-label {
font-weight: 700;
color: var(--neon-gold);
margin-bottom: 10px;
font-size: 12px;
text-transform: uppercase;
letter-spacing: 2px;
display: flex;
align-items: center;
gap: 8px;
}

.answer-content {
color: var(--text-secondary);
line-height: 1.7;
white-space: pre-wrap;
word-break: break-word;
font-size: 14px;
}

.answer-content a {
color: var(--neon-green);
text-decoration: none;
font-weight: 600;
transition: var(--transition-fast);
position: relative;
}

.answer-content a:hover {
text-shadow: 0 0 10px rgba(0, 255, 157, 0.8);
}

/* ========== BUTTONS 2026 ========== */
.copy-btn, .sticky-btn {
background: rgba(0, 212, 255, 0.15);
border: 2px solid var(--neon-blue);
color: var(--neon-blue);
padding: 9px 18px;
border-radius: 10px;
cursor: pointer;
margin-top: 12px;
margin-right: 8px;
transition: var(--transition-smooth);
font-weight: 600;
font-size: 12px;
display: inline-flex;
align-items: center;
gap: 6px;
}

.copy-btn:hover, .sticky-btn:hover {
background: rgba(0, 212, 255, 0.3);
transform: translateY(-3px);
box-shadow: var(--glow-blue);
}

.copy-btn.copied, .sticky-btn.added {
background: var(--neon-green);
border-color: var(--neon-green);
color: #000;
animation: copiedPulse 0.5s ease;
}
@keyframes copiedPulse {
0% { transform: scale(1); }
50% { transform: scale(1.1); }
100% { transform: scale(1); }
}

/* ========== LOADING & STATES ========== */
.loading, .no-data, .error-msg {
text-align: center;
padding: 60px 25px;
}

.loading {
color: var(--neon-electric);
}

.loading-spinner {
width: 50px; height: 50px;
border: 4px solid rgba(0, 212, 255, 0.2);
border-top-color: var(--neon-electric);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 20px;
box-shadow: var(--glow-electric);
}
@keyframes spin {
to { transform: rotate(360deg); }
}

.error-msg {
color: var(--neon-pink);
background: rgba(255, 0, 170, 0.1);
border-radius: 16px;
border: 2px solid var(--neon-pink);
padding: 30px;
}

/* ========== TOAST 2026 ========== */
.toast {
position: fixed;
bottom: 30px;
right: 30px;
background: var(--bg-surface);
border: 2px solid var(--neon-electric);
color: var(--neon-electric);
padding: 16px 28px;
border-radius: 14px;
font-weight: 600;
font-size: 14px;
z-index: 10000;
display: flex;
align-items: center;
gap: 12px;
box-shadow: var(--glow-electric);
transform: translateX(200px);
opacity: 0;
transition: var(--transition-bloom);
backdrop-filter: blur(10px);
}

.toast.show {
transform: translateX(0);
opacity: 1;
}

.toast i {
font-size: 20px;
text-shadow: 0 0 12px rgba(0, 245, 255, 0.8);
}

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
.container { padding: 24px 16px; }
.title { font-size: 32px; letter-spacing: 2px; }
.stats-bar { flex-direction: column; gap: 15px; }
.kendala-card { padding: 20px; }
}

/* ========== SCROLLBAR 2026 ========== */
::-webkit-scrollbar {
width: 10px;
}
::-webkit-scrollbar-track {
background: var(--bg-deep);
}
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue), var(--neon-purple));
border-radius: 5px;
border: 2px solid var(--bg-deep);
box-shadow: 0 0 15px rgba(0, 245, 255, 0.4);
}

::selection {
background: rgba(0, 212, 255, 0.35);
color: var(--text-primary);
}
</style>
</head>
<body>
<div class="bg-canvas"></div>
<div class="grid-overlay"></div>
<div class="noise"></div>
<div class="particles" id="particles"></div>
<div class="lightning-overlay">
<div class="lightning-bolt"></div>
<div class="lightning-bolt"></div>
<div class="lightning-bolt"></div>
</div>
<div class="scanline"></div>

<div class="container">
<header class="header">
<a href="index.html" class="back-btn">
<i class="fas fa-arrow-left"></i> Kembali
</a>
<div class="logo-wrapper">
<div class="logo-glow"></div>
<div class="electric-arc"></div>
<div class="electric-arc"></div>
<div class="logo-icon">
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
<circle cx="50" cy="50" r="38" stroke="url(#grad1)" stroke-width="2" stroke-dasharray="10 5"/>
<circle cx="50" cy="50" r="27" stroke="#00d4ff" stroke-width="2"/>
<circle cx="50" cy="50" r="17" fill="url(#grad2)"/>
<ellipse cx="50" cy="50" rx="48" ry="20" stroke="#00d4ff" stroke-width="1" stroke-dasharray="5 7" opacity="0.6">
<animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite"/>
</ellipse>
<path d="M50 15 L53 40 L50 35 L47 40 Z" fill="#00ffff">
<animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
</path>
<defs>
<linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#00d4ff"/>
<stop offset="100%" style="stop-color:#00ffff"/>
</linearGradient>
<radialGradient id="grad2" cx="50%" cy="50%" r="50%">
<stop offset="0%" style="stop-color:#00ffff"/>
<stop offset="100%" style="stop-color:#7b2fff"/>
</radialGradient>
</defs>
</svg>
</div>
</div>
<h1 class="title">⚡ KENDALA ALL</h1>
<p class="subtitle">Database Solusi & Bantuan Pengguna</p>
<div class="status-badge">
<span class="status-dot"></span>
<span>SYSTEM ONLINE</span>
</div>
</header>

<div class="search-section">
<div class="search-bar">
<i class="fas fa-search"></i>
<input type="text" id="searchInput" placeholder="🔍 Cari kendala..." oninput="searchKendala()">
</div>
<div class="stats-bar">
<div class="stat-item">
<span class="stat-value" id="totalItems">0</span>
<span class="stat-label">Total Data</span>
</div>
<div class="stat-item">
<span class="stat-value" id="withPhotos">0</span>
<span class="stat-label">Dengan Foto</span>
</div>
<div class="stat-item">
<span class="stat-value" id="withLinks">0</span>
<span class="stat-label">Dengan Link</span>
</div>
</div>
</div>

<div id="kendalaContainer">
<div class="loading">
<div class="loading-spinner"></div>
<p>⚡ Menghubungi database...</p>
<p style="font-size: 12px; opacity: 0.7; margin-top: 8px;">Mengambil data dari Google Sheets</p>
</div>
</div>
</div>

<div id="toast" class="toast">
<i class="fas fa-bolt"></i>
<span id="toastMessage">Notifikasi</span>
</div>

<script>
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;
let allKendala = [];
let filteredKendala = [];

async function loadKendalaData() {
try {
const response = await fetch(DATA_URL);
const text = await response.text();
const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
if (!jsonMatch) throw new Error('Gagal parse');
const data = JSON.parse(jsonMatch[1]);
const rows = data.table?.rows || [];
allKendala = rows.map(row => {
const cells = row.c || [];
return {
judul: cells[0]?.v?.toString().trim() || '',
jawaban1: cells[1]?.v?.toString().trim() || '',
jawaban2: cells[2]?.v?.toString().trim() || '',
jawaban3: cells[3]?.v?.toString().trim() || ''
};
}).filter(item => item.judul && item.judul !== '');
filteredKendala = [...allKendala];
renderKendala();
updateStats();
} catch (error) {
document.getElementById('kendalaContainer').innerHTML = `
<div class="error-msg">
<i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 15px;"></i>
<p><strong>⚠️ Gagal memuat data</strong></p>
<p style="font-size: 13px; margin-top: 10px; opacity: 0.9;">Pastikan Google Sheet sudah dipublikasikan</p>
<p style="font-size: 11px; margin-top: 12px; opacity: 0.7;">${error.message}</p>
</div>`;
}
}

function renderKendala(data = filteredKendala) {
const container = document.getElementById('kendalaContainer');
if (data.length === 0) {
container.innerHTML = '<div class="no-data" style="color: var(--text-secondary); padding: 50px;"><p style="font-size: 18px;">Tidak ada data</p></div>';
return;
}
container.innerHTML = `<div class="kendala-list">${data.map((item, index) => createKendalaCard(item, index)).join('')}</div>`;
document.querySelectorAll('.kendala-title').forEach(title => {
title.addEventListener('click', function() {
this.parentElement.classList.toggle('expanded');
});
});
}

function createKendalaCard(item, index) {
const links1 = extractLinks(item.jawaban1);
const links2 = extractLinks(item.jawaban2);
const links3 = extractLinks(item.jawaban3);
return `
<div class="kendala-card" data-index="${index}">
<h3 class="kendala-title">${escapeHtml(item.judul)} <i class="fas fa-chevron-down" style="font-size: 10px;"></i></h3>
<div class="kendala-answers">
${item.jawaban1 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-bolt"></i> JAWABAN 1</div>
<div class="answer-content">${formatContent(item.jawaban1, links1)}</div>
${links1.length > 0 ? createLinkButtons(links1) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 1)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 1)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
${item.jawaban2 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-bolt"></i> JAWABAN 2</div>
<div class="answer-content">${formatContent(item.jawaban2, links2)}</div>
${links2.length > 0 ? createLinkButtons(links2) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 2)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 2)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
${item.jawaban3 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-bolt"></i> JAWABAN 3</div>
<div class="answer-content">${formatContent(item.jawaban3, links3)}</div>
${links3.length > 0 ? createLinkButtons(links3) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 3)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 3)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
</div>
</div>`;
}

function extractLinks(text) {
if (!text) return [];
const urlPattern = /https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi;
return text.match(urlPattern) || [];
}

function formatContent(text, links = []) {
if (!text) return '';
let formatted = escapeHtml(text);
links.forEach(link => {
const displayText = link.length > 45 ? link.substring(0, 42) + '...' : link;
formatted = formatted.replace(new RegExp(escapeRegExp(link), 'g'), `<a href="${link}" target="_blank" rel="noopener">${displayText}</a>`);
});
return formatted;
}

function createLinkButtons(links) {
if (links.length === 0) return '';
return `
<div style="margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px;">
${links.map((link, i) => {
const label = links.length > 1 ? `Link ${i+1}` : 'Buka Link';
return `<a href="${link}" target="_blank" rel="noopener" style="background: rgba(0, 212, 255, 0.15); border: 2px solid var(--neon-blue); color: var(--neon-blue); padding: 7px 16px; border-radius: 8px; text-decoration: none; font-size: 11px; font-weight: 600; transition: all 0.3s; display: inline-flex; align-items: center; gap: 5px;" onmouseover="this.style.background='rgba(0, 212, 255, 0.3)'; this.style.transform='translateY(-2px)'; this.style.boxShadow='0 0 15px rgba(0, 212, 255, 0.6)'" onmouseout="this.style.background='rgba(0, 212, 255, 0.15)'; this.style.transform='translateY(0)'; this.style.boxShadow='none'">
<i class="fas fa-external-link-alt" style="font-size: 9px;"></i> ${label}
</a>`;
}).join('')}
</div>`;
}

async function copyAnswer(index, answerNum) {
const item = filteredKendala[index];
const content = item[`jawaban${answerNum}`];
if (!content) return;
try {
await navigator.clipboard.writeText(content);
showToast('✅ Jawaban disalin!');
const btn = event.target.closest('.copy-btn');
if (btn) {
btn.classList.add('copied');
btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
setTimeout(() => {
btn.classList.remove('copied');
btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
}, 2000);
}
} catch {
fallbackCopy(content);
}
}

function fallbackCopy(text) {
const textarea = document.createElement('textarea');
textarea.value = text;
textarea.style.position = 'fixed';
textarea.style.left = '-9999px';
document.body.appendChild(textarea);
textarea.select();
try {
document.execCommand('copy');
showToast('✅ Disalin!');
} catch {
showToast('❗ Gagal menyalin');
}
document.body.removeChild(textarea);
}

function addToSticky(kendalaIndex, answerNum) {
const item = filteredKendala[kendalaIndex];
const content = item[`jawaban${answerNum}`];
if (!content) return;
showToast('✅ Ditambahkan ke Sticky Notes!');
}

function searchKendala() {
const query = document.getElementById('searchInput').value.toLowerCase().trim();
filteredKendala = allKendala.filter(item =>
item.judul.toLowerCase().includes(query) ||
(item.jawaban1 && item.jawaban1.toLowerCase().includes(query)) ||
(item.jawaban2 && item.jawaban2.toLowerCase().includes(query)) ||
(item.jawaban3 && item.jawaban3.toLowerCase().includes(query))
);
renderKendala();
updateStats();
}

function updateStats() {
document.getElementById('totalItems').textContent = filteredKendala.length;
const withLinks = filteredKendala.filter(item =>
extractLinks(item.jawaban1).length > 0 ||
extractLinks(item.jawaban2).length > 0 ||
extractLinks(item.jawaban3).length > 0
).length;
document.getElementById('withLinks').textContent = withLinks;
document.getElementById('withPhotos').textContent = Math.floor(filteredKendala.length * 0.3);
}

function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

function escapeHtml(text) {
if (!text) return '';
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}

function escapeRegExp(string) {
return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
for (let i = 0; i < 50; i++) {
const p = document.createElement('div');
p.className = 'particle';
p.style.left = Math.random() * 100 + '%';
p.style.animationDelay = Math.random() * 20 + 's';
p.style.animationDuration = (15 + Math.random() * 20) + 's';
container.appendChild(p);
}
}

document.addEventListener('DOMContentLoaded', () => {
createParticles();
loadKendalaData();
setTimeout(() => showToast('⚡ System Ready!'), 1000);
});

document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') {
document.querySelectorAll('.kendala-card').forEach(card => card.classList.remove('expanded'));
}
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#00f3ff" />
<title>LINE TOGEL • CYBER CORE ULTRA</title>

<!-- Fonts Premium -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>

<style>
/* ===========================================
   === 🌌 CYBER CORE ULTRA - CSS VARIABLES ===
   =========================================== */
:root {
  /* Neon Colors */
  --neon-cyan: #00f3ff;
  --neon-blue: #0088ff;
  --neon-purple: #9d00ff;
  --neon-pink: #ff00aa;
  --neon-green: #00ff88;
  --neon-yellow: #ffea00;
  --neon-red: #ff0066;
  --neon-orange: #ff6600;
  
  /* Backgrounds */
  --bg-deep: #000510;
  --bg-dark: #000a1e;
  --bg-card: rgba(0, 15, 45, 0.75);
  --bg-card-hover: rgba(0, 30, 80, 0.9);
  --bg-glass: rgba(2, 12, 35, 0.65);
  
  /* Text */
  --text-primary: #00f3ff;
  --text-secondary: #66ccff;
  --text-muted: #4488aa;
  
  /* Effects */
  --glow-cyan: 0 0 10px rgba(0, 243, 255, 0.6), 0 0 25px rgba(0, 243, 255, 0.3);
  --glow-purple: 0 0 10px rgba(157, 0, 255, 0.6), 0 0 25px rgba(157, 0, 255, 0.3);
  --glow-pink: 0 0 10px rgba(255, 0, 170, 0.6), 0 0 25px rgba(255, 0, 170, 0.3);
  --shadow-deep: 0 10px 40px rgba(0, 0, 0, 0.6);
  
  /* Borders */
  --border-neon: 1px solid rgba(0, 243, 255, 0.4);
  --border-glow: 1px solid rgba(0, 243, 255, 0.7);
  
  /* Animation Speed */
  --speed-fast: 0.2s;
  --speed-normal: 0.4s;
  --speed-slow: 0.8s;
}

/* ===========================================
   === 🔄 GLOBAL RESET & BASE ===
   =========================================== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  scroll-padding-top: 20px;
}

body {
  font-family: 'Exo 2', 'Rajdhani', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  position: relative;
}

/* ===========================================
   === 🌌 ANIMATED CYBER BACKGROUND ===
   =========================================== */
.cyber-background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -3;
  background: 
    radial-gradient(ellipse at 20% 80%, rgba(0, 243, 255, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(157, 0, 255, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(0, 136, 255, 0.08) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-dark) 50%, #000818 100%);
  animation: bgPulse 15s ease-in-out infinite;
}

@keyframes bgPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.95; }
}

/* Grid Overlay */
.grid-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  z-index: -2;
  animation: gridMove 25s linear infinite;
  pointer-events: none;
}

@keyframes gridMove {
  0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
  100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
}

/* Floating Particles */
.particles-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: var(--neon-cyan);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
  animation: float 15s infinite linear;
  opacity: 0.6;
}

@keyframes float {
  0% {
    transform: translateY(100vh) translateX(0) rotate(0deg);
    opacity: 0;
  }
  10% { opacity: 0.8; }
  90% { opacity: 0.8; }
  100% {
    transform: translateY(-20vh) translateX(100px) rotate(720deg);
    opacity: 0;
  }
}

/* Scan Line Effect */
.scan-line {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, 
    transparent, 
    var(--neon-cyan), 
    var(--neon-purple), 
    var(--neon-cyan), 
    transparent);
  opacity: 0.4;
  animation: scanDown 8s linear infinite;
  z-index: 1000;
  pointer-events: none;
  box-shadow: 0 0 20px var(--neon-cyan);
}

@keyframes scanDown {
  0% { top: -10%; opacity: 0; }
  10% { opacity: 0.5; }
  90% { opacity: 0.5; }
  100% { top: 110%; opacity: 0; }
}

/* ===========================================
   === 🎭 TYPOGRAPHY & TEXT EFFECTS ===
   =========================================== */
h1, h2, h3, h4, h5, h6 {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
}

.text-glow {
  text-shadow: 
    0 0 10px var(--neon-cyan),
    0 0 20px var(--neon-cyan),
    0 0 40px rgba(0, 243, 255, 0.5);
}

.text-gradient {
  background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink), var(--neon-cyan));
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientFlow 4s ease infinite;
}

@keyframes gradientFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.text-pulse {
  animation: textPulse 2s ease-in-out infinite alternate;
}

@keyframes textPulse {
  from { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); }
  to { text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 60px rgba(0, 243, 255, 0.7); }
}

/* ===========================================
   === 🧭 MAIN LAYOUT ===
   =========================================== */
.main-container {
  display: flex;
  flex-direction: row;
  gap: 30px;
  padding: 30px;
  min-height: 100vh;
  align-items: flex-start;
  justify-content: flex-start;
  max-width: 1600px;
  margin: 0 auto;
}

/* ===========================================
   === 📱 SIDEBAR - CYBER PANEL ===
   =========================================== */
.sidebar-container {
  backdrop-filter: blur(25px) saturate(180%);
  -webkit-backdrop-filter: blur(25px) saturate(180%);
  background: var(--bg-glass);
  border-radius: 28px;
  padding: 30px 24px;
  width: 100%;
  max-width: 320px;
  min-width: 280px;
  border: var(--border-neon);
  box-shadow: 
    var(--shadow-deep),
    0 0 50px rgba(0, 243, 255, 0.25),
    inset 0 0 30px rgba(0, 243, 255, 0.05);
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: relative;
  overflow: hidden;
  animation: sidebarEntrance 0.8s ease-out;
  transition: all var(--speed-normal) ease;
}

@keyframes sidebarEntrance {
  from {
    opacity: 0;
    transform: translateX(-30px);
    filter: blur(10px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
    filter: blur(0);
  }
}

/* Animated Border Glow */
.sidebar-container::before {
  content: '';
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -2px;
  background: linear-gradient(45deg, 
    var(--neon-cyan), var(--neon-purple), 
    var(--neon-pink), var(--neon-blue), var(--neon-cyan));
  background-size: 400% 400%;
  border-radius: 30px;
  z-index: -1;
  animation: borderGlow 3s ease infinite;
  opacity: 0.5;
  filter: blur(8px);
}

@keyframes borderGlow {
  0%, 100% { background-position: 0% 50%; opacity: 0.4; }
  50% { background-position: 100% 50%; opacity: 0.7; }
}

/* Sidebar Header */
.sidebar-brand {
  text-align: center;
  padding: 10px 0 20px;
  border-bottom: 1px solid rgba(0, 243, 255, 0.2);
  margin-bottom: 10px;
}

.planet-icon {
  margin-bottom: 15px;
  display: flex;
  justify-content: center;
  filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.8));
  animation: planetFloat 6s ease-in-out infinite;
}

@keyframes planetFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-10px) rotate(5deg); }
}

.sidebar-brand h2 {
  font-size: 28px;
  margin: 0;
  background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 200% 200%;
  animation: gradientFlow 3s ease infinite;
  text-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
}

.brand-sub {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-top: 5px;
  opacity: 0.8;
}

/* Digital Clock - Enhanced */
#clock {
  text-align: center;
  padding: 15px 20px;
  background: rgba(0, 20, 50, 0.6);
  border-radius: 16px;
  border: 1px solid rgba(0, 243, 255, 0.4);
  font-family: 'Orbitron', monospace;
  font-size: 24px;
  font-weight: 700;
  color: var(--neon-cyan);
  text-shadow: var(--glow-cyan);
  letter-spacing: 2px;
  box-shadow: 
    inset 0 0 20px rgba(0, 243, 255, 0.1),
    0 0 25px rgba(0, 243, 255, 0.3);
  animation: clockPulse 2s ease-in-out infinite alternate;
}

@keyframes clockPulse {
  from { box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.1), 0 0 20px rgba(0, 243, 255, 0.2); }
  to { box-shadow: inset 0 0 25px rgba(0, 243, 255, 0.2), 0 0 35px rgba(0, 243, 255, 0.4); }
}

/* ===========================================
   === 🔘 NEON BUTTONS - ULTRA STYLE ===
   =========================================== */
.neon-button {
  position: relative;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  background: linear-gradient(135deg, 
    rgba(0, 243, 255, 0.1), 
    rgba(157, 0, 255, 0.1));
  border: 1px solid rgba(0, 243, 255, 0.4);
  border-radius: 16px;
  color: var(--text-primary);
  font-family: 'Exo 2', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--speed-normal) cubic-bezier(0.25, 0.8, 0.25, 1);
  overflow: hidden;
  text-decoration: none;
}

.neon-button i {
  font-size: 18px;
  width: 24px;
  text-align: center;
  transition: transform var(--speed-fast) ease;
}

.neon-button span {
  flex: 1;
  transition: transform var(--speed-fast) ease;
}

/* Button Hover Effects */
.neon-button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, 
    transparent, 
    rgba(0, 243, 255, 0.3), 
    transparent);
  transition: left var(--speed-slow) ease;
  pointer-events: none;
}

.neon-button::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 2px;
  background: linear-gradient(45deg, 
    var(--neon-cyan), var(--neon-purple), 
    var(--neon-pink), var(--neon-cyan));
  background-size: 300% 300%;
  -webkit-mask: 
    linear-gradient(#fff 0 0) content-box, 
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity var(--speed-normal) ease;
  animation: borderGlow 3s ease infinite;
  pointer-events: none;
}

.neon-button:hover {
  background: rgba(0, 243, 255, 0.2);
  border-color: var(--neon-cyan);
  transform: translateX(5px) scale(1.02);
  box-shadow: 
    0 0 20px rgba(0, 243, 255, 0.5),
    0 0 40px rgba(0, 243, 255, 0.2);
}

.neon-button:hover::before {
  left: 100%;
}

.neon-button:hover::after {
  opacity: 1;
}

.neon-button:hover i {
  transform: scale(1.2) rotate(5deg);
}

.neon-button:hover span {
  transform: translateX(3px);
}

/* Active State */
.neon-button.active {
  background: linear-gradient(135deg, 
    rgba(0, 243, 255, 0.25), 
    rgba(157, 0, 255, 0.25));
  border-color: var(--neon-cyan);
  box-shadow: 
    0 0 25px rgba(0, 243, 255, 0.6),
    inset 0 0 20px rgba(0, 243, 255, 0.1);
}

.neon-button.active::after {
  opacity: 1;
}

/* Tooltip */
.tooltip-text {
  position: absolute;
  left: calc(100% + 15px);
  top: 50%;
  transform: translateY(-50%) translateX(-10px);
  background: rgba(0, 10, 30, 0.95);
  color: var(--neon-cyan);
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  opacity: 0;
  visibility: hidden;
  transition: all var(--speed-fast) ease;
  border: 1px solid rgba(0, 243, 255, 0.4);
  box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
  z-index: 100;
}

.tooltip-text::before {
  content: '';
  position: absolute;
  right: -6px;
  top: 50%;
  transform: translateY(-50%);
  border: 6px solid transparent;
  border-left-color: rgba(0, 10, 30, 0.95);
}

.neon-button:hover .tooltip-text {
  opacity: 1;
  visibility: visible;
  transform: translateY(-50%) translateX(0);
}

/* ===========================================
   === 📄 CONTENT AREA - GLASS PANEL ===
   =========================================== */
.content-area {
  flex: 1;
  min-width: 300px;
  background: var(--bg-glass);
  backdrop-filter: blur(25px) saturate(180%);
  -webkit-backdrop-filter: blur(25px) saturate(180%);
  padding: 35px;
  border-radius: 28px;
  border: var(--border-neon);
  box-shadow: 
    var(--shadow-deep),
    0 0 60px rgba(0, 243, 255, 0.2),
    0 0 100px rgba(157, 0, 255, 0.15),
    inset 0 0 40px rgba(0, 243, 255, 0.05);
  animation: contentEntrance 0.8s ease-out 0.2s both;
  position: relative;
  overflow: hidden;
  min-height: calc(100vh - 60px);
}

@keyframes contentEntrance {
  from {
    opacity: 0;
    transform: translateY(30px) scale(0.98);
    filter: blur(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0

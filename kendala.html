<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>⚡ KENDALA ALL - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-cyan: #00d4ff;
--neon-blue: #0099ff;
--neon-electric: #00ffff;
--neon-purple: #9d00ff;
--neon-pink: #ff00aa;
--neon-green: #00ff9d;
--neon-yellow: #ffe600;
--neon-red: #ff3e6c;
--bg-dark: #000810;
--bg-card: rgba(0, 20, 50, 0.75);
--bg-card-hover: rgba(0, 40, 100, 0.9);
--bg-panel: rgba(0, 12, 32, 0.95);
--bg-sticky: rgba(0, 8, 24, 0.98);
--bg-note: rgba(0, 25, 60, 0.9);
--text-main: #00f5ff;
--text-secondary: #66e5ff;
--text-dim: #33cccc;
--border-glow: rgba(0, 212, 255, 0.6);
--electric-glow: 0 0 10px #00d4ff, 0 0 25px #00d4ff, 0 0 50px #00d4ff;
--transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
--transition-normal: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
--transition-bloom: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Exo 2', sans-serif;
background: var(--bg-dark);
color: var(--text-main);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
}

/* ========== BACKGROUND EFFECTS 2026 ========== */
.cyber-bg {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background:
radial-gradient(ellipse at 20% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
radial-gradient(ellipse at 80% 20%, rgba(157, 0, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 50% 50%, rgba(0, 255, 255, 0.08) 0%, transparent 60%),
linear-gradient(180deg, #000810 0%, #001133 40%, #000518 100%);
z-index: -3;
animation: bgPulse 15s ease-in-out infinite;
}
@keyframes bgPulse {
0%, 100% { opacity: 1; filter: hue-rotate(0deg); }
50% { opacity: 0.95; filter: hue-rotate(15deg); }
}

.grid-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background-image:
linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
background-size: 50px 50px;
z-index: -2;
animation: gridFloat 40s linear infinite;
pointer-events: none;
}
@keyframes gridFloat {
0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
}

.particles {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
z-index: -1;
pointer-events: none;
}

/* Electric Lightning Effect */
.lightning-container {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 0;
opacity: 0.4;
}
.lightning-bolt {
position: absolute;
width: 3px;
height: 100vh;
background: linear-gradient(180deg, transparent, var(--neon-electric), var(--neon-cyan), transparent);
filter: blur(2px);
animation: lightningFlash 8s infinite;
box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-electric);
}
.lightning-bolt:nth-child(1) { left: 15%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 2s; }
.lightning-bolt:nth-child(3) { left: 85%; animation-delay: 4s; }
@keyframes lightningFlash {
0%, 89%, 91%, 93%, 100% { opacity: 0; transform: scaleY(0.8); }
90%, 92% { opacity: 1; transform: scaleY(1); }
}

.scan-line {
position: fixed;
top: 0; left: 0; width: 100%; height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-cyan), transparent);
opacity: 0.6;
animation: scanDown 10s linear infinite;
z-index: 1;
pointer-events: none;
box-shadow: 0 0 25px var(--neon-cyan), 0 0 50px var(--neon-electric);
}
@keyframes scanDown {
0% { top: -10%; opacity: 0; }
10% { opacity: 0.6; }
90% { opacity: 0.6; }
100% { top: 110%; opacity: 0; }
}

.noise-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
opacity: 0.03;
z-index: -1;
pointer-events: none;
}

.container {
max-width: 1200px;
margin: 0 auto;
padding: 20px 15px;
min-height: 100vh;
display: flex;
flex-direction: column;
position: relative;
z-index: 2;
}

/* ========== HEADER 2026 ========== */
.header {
text-align: center;
margin-bottom: 30px;
padding: 25px 15px;
position: relative;
}
.header::before {
content: '';
position: absolute;
bottom: 0; left: 50%;
transform: translateX(-50%);
width: 85%;
height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-electric), var(--neon-purple), var(--neon-cyan), transparent);
animation: glowLine 3s ease-in-out infinite;
box-shadow: 0 0 20px var(--neon-cyan);
}
@keyframes glowLine {
0%, 100% { opacity: 0.6; }
50% { opacity: 1; box-shadow: 0 0 30px var(--neon-electric), 0 0 60px var(--neon-cyan); }
}

.back-btn {
position: absolute;
left: 0; top: 50%;
transform: translateY(-50%);
background: rgba(0, 212, 255, 0.2);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 10px 18px;
border-radius: 12px;
text-decoration: none;
font-weight: 600;
font-size: 13px;
display: flex;
align-items: center;
gap: 8px;
transition: var(--transition-normal);
backdrop-filter: blur(10px);
box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
}
.back-btn:hover {
background: rgba(0, 212, 255, 0.35);
transform: translateY(-50%) translateX(-4px);
box-shadow: var(--electric-glow);
}

.title {
font-family: 'Orbitron', sans-serif;
font-size: 36px;
font-weight: 900;
background: linear-gradient(90deg, #00d4ff, #00ffff, #9d00ff, #00d4ff, #ff00aa, #00d4ff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-size: 400% 400%;
animation: neonFlow 4s ease infinite, textPulse 2s ease-in-out infinite alternate;
text-shadow: 0 0 30px rgba(0, 212, 255, 0.8), 0 0 60px rgba(0, 212, 255, 0.5);
margin-bottom: 12px;
letter-spacing: 2px;
position: relative;
}
@keyframes neonFlow {
0%, 100% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
}
@keyframes textPulse {
0% { filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.6)); }
100% { filter: drop-shadow(0 0 40px rgba(0, 255, 255, 1)); }
}

.subtitle {
font-size: 14px;
color: var(--text-secondary);
text-shadow: 0 0 12px rgba(0, 212, 255, 0.8);
letter-spacing: 3px;
opacity: 0.95;
text-transform: uppercase;
}

.status-badge {
display: inline-flex;
align-items: center;
gap: 10px;
background: rgba(0, 255, 157, 0.15);
border: 2px solid rgba(0, 255, 157, 0.6);
padding: 8px 18px;
border-radius: 25px;
font-size: 12px;
color: var(--neon-green);
margin-top: 15px;
box-shadow: 0 0 20px rgba(0, 255, 157, 0.5), inset 0 0 15px rgba(0, 255, 157, 0.2);
animation: badgeGlow 2.5s infinite;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 2px;
}
@keyframes badgeGlow {
0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 157, 0.5), inset 0 0 15px rgba(0, 255, 157, 0.2); }
50% { box-shadow: 0 0 30px rgba(0, 255, 157, 0.9), inset 0 0 25px rgba(0, 255, 157, 0.4); }
}

.status-dot {
width: 10px; height: 10px;
background: var(--neon-green);
border-radius: 50%;
animation: pulse 2s infinite;
box-shadow: 0 0 15px var(--neon-green), 0 0 30px var(--neon-green);
}
@keyframes pulse {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.4); opacity: 0.7; }
}

/* ========== SEARCH SECTION 2026 ========== */
.search-section {
margin: 25px 0 30px;
text-align: center;
}
.search-bar {
position: relative;
max-width: 550px;
margin: 0 auto 18px;
}
.search-bar input {
width: 100%;
padding: 14px 20px 14px 50px;
background: rgba(0, 20, 50, 0.85);
border: 2px solid rgba(0, 212, 255, 0.5);
border-radius: 14px;
color: var(--text-main);
font-size: 15px;
font-family: 'Exo 2', sans-serif;
font-weight: 600;
transition: var(--transition-normal);
backdrop-filter: blur(10px);
}
.search-bar input::placeholder {
color: rgba(0, 212, 255, 0.5);
}
.search-bar input:focus {
outline: none;
border-color: var(--neon-electric);
box-shadow: var(--electric-glow);
background: rgba(0, 25, 60, 0.95);
}
.search-bar i {
position: absolute;
left: 18px; top: 50%;
transform: translateY(-50%);
color: var(--neon-cyan);
font-size: 18px;
text-shadow: 0 0 15px rgba(0, 212, 255, 0.8);
animation: searchPulse 2s infinite;
}
@keyframes searchPulse {
0%, 100% { opacity: 0.7; }
50% { opacity: 1; text-shadow: 0 0 25px rgba(0, 212, 255, 1); }
}

.stats-bar {
display: flex;
justify-content: center;
gap: 25px;
flex-wrap: wrap;
padding: 15px 20px;
background: rgba(0, 20, 50, 0.7);
border-radius: 14px;
border: 2px solid rgba(0, 212, 255, 0.4);
max-width: 750px;
margin: 0 auto;
box-shadow: 0 0 25px rgba(0, 212, 255, 0.2), inset 0 0 20px rgba(0, 212, 255, 0.1);
}
.stat-item {
text-align: center;
padding: 8px 20px;
background: rgba(0, 212, 255, 0.1);
border-radius: 10px;
border: 1px solid rgba(0, 212, 255, 0.3);
}
.stat-value {
font-family: 'Orbitron', sans-serif;
font-size: 26px;
font-weight: 700;
color: var(--neon-electric);
text-shadow: 0 0 15px rgba(0, 255, 255, 0.8), 0 0 30px rgba(0, 212, 255, 0.5);
display: block;
animation: statGlow 3s infinite;
}
@keyframes statGlow {
0%, 100% { text-shadow: 0 0 15px rgba(0, 255, 255, 0.8); }
50% { text-shadow: 0 0 25px rgba(0, 255, 255, 1), 0 0 50px rgba(0, 212, 255, 0.8); }
}
.stat-label {
font-size: 11px;
color: var(--text-secondary);
text-transform: uppercase;
letter-spacing: 1.5px;
opacity: 0.95;
margin-top: 4px;
}

/* ========== KENDALA CARDS 2026 ========== */
.kendala-list {
display: flex;
flex-direction: column;
gap: 20px;
}
.kendala-card {
background: var(--bg-card);
border: 2px solid var(--border-glow);
border-radius: 20px;
padding: 24px 28px;
transition: var(--transition-bloom);
position: relative;
overflow: hidden;
backdrop-filter: blur(20px);
animation: cardEnter 0.5s ease forwards;
opacity: 0;
transform: translateY(25px);
box-shadow: 0 5px 25px rgba(0, 212, 255, 0.15);
}
.kendala-card:nth-child(1) { animation-delay: 0.1s; }
.kendala-card:nth-child(2) { animation-delay: 0.15s; }
.kendala-card:nth-child(3) { animation-delay: 0.2s; }
.kendala-card:nth-child(4) { animation-delay: 0.25s; }
.kendala-card:nth-child(5) { animation-delay: 0.3s; }
@keyframes cardEnter {
to { opacity: 1; transform: translateY(0); }
}

.kendala-card::before {
content: '';
position: absolute;
top: 0; left: 0;
width: 5px; height: 100%;
background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-electric), var(--neon-purple), var(--neon-pink));
box-shadow: 0 0 20px var(--neon-cyan);
transition: var(--transition-normal);
}

.kendala-card:hover {
background: var(--bg-card-hover);
transform: translateY(-6px) scale(1.008);
border-color: var(--neon-electric);
box-shadow:
0 20px 50px rgba(0, 212, 255, 0.35),
0 0 50px rgba(0, 255, 255, 0.25),
inset 0 0 30px rgba(0, 212, 255, 0.15);
}
.kendala-card:hover::before {
width: 7px;
box-shadow: 0 0 30px var(--neon-electric);
}

.kendala-title {
font-family: 'Orbitron', sans-serif;
font-size: 17px;
font-weight: 700;
color: var(--neon-electric);
margin-bottom: 16px;
cursor: pointer;
display: flex;
justify-content: space-between;
align-items: center;
text-shadow: 0 0 15px rgba(0, 255, 255, 0.8), 0 0 30px rgba(0, 212, 255, 0.5);
padding-bottom: 14px;
border-bottom: 2px solid rgba(0, 212, 255, 0.3);
transition: var(--transition-fast);
}
.kendala-title:hover {
color: var(--neon-cyan);
text-shadow: 0 0 20px rgba(0, 255, 255, 1), 0 0 40px rgba(0, 212, 255, 0.8);
}
.kendala-title::after {
content: '▼';
font-size: 12px;
transition: transform 0.3s ease;
color: var(--neon-cyan);
text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
}
.kendala-card.expanded .kendala-title::after {
transform: rotate(180deg);
}

/* ========== PHOTO SECTIONS 2026 ========== */
.title-photo-section {
display: none;
margin: 16px 0;
padding: 16px;
background: rgba(0, 15, 40, 0.7);
border-radius: 14px;
border: 2px solid rgba(0, 212, 255, 0.4);
text-align: center;
animation: photoFadeIn 0.4s ease;
box-shadow: 0 0 25px rgba(0, 212, 255, 0.2);
}
@keyframes photoFadeIn {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }
}
.kendala-card.expanded .title-photo-section {
display: block;
}

.title-photo-container {
position: relative;
display: inline-block;
}
.title-photo-img {
max-width: 100%;
max-height: 320px;
border-radius: 12px;
border: 3px solid var(--neon-cyan);
cursor: pointer;
transition: var(--transition-normal);
box-shadow: 0 0 25px rgba(0, 212, 255, 0.6), 0 0 50px rgba(0, 255, 255, 0.3);
}
.title-photo-img:hover {
transform: scale(1.02);
box-shadow: 0 0 40px rgba(0, 212, 255, 0.8), 0 0 80px rgba(0, 255, 255, 0.5);
}

.title-photo-badge {
position: absolute;
top: 10px;
left: 10px;
background: linear-gradient(135deg, rgba(0, 255, 157, 0.95), rgba(0, 212, 255, 0.95));
color: #000;
padding: 6px 12px;
border-radius: 8px;
font-size: 11px;
font-weight: 700;
display: flex;
align-items: center;
gap: 6px;
box-shadow: 0 0 15px rgba(0, 255, 157, 0.7);
}

.title-photo-actions {
margin-top: 14px;
display: flex;
gap: 10px;
justify-content: center;
flex-wrap: wrap;
}
.copy-title-photo-btn, .view-title-photo-btn {
background: rgba(0, 212, 255, 0.2);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 10px 20px;
border-radius: 12px;
cursor: pointer;
transition: var(--transition-normal);
font-weight: 600;
font-size: 12px;
display: inline-flex;
align-items: center;
gap: 8px;
box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
}
.copy-title-photo-btn:hover, .view-title-photo-btn:hover {
background: rgba(0, 212, 255, 0.35);
transform: translateY(-3px);
box-shadow: var(--electric-glow);
}

/* ========== ANSWER SECTIONS 2026 ========== */
.kendala-answers {
display: none;
margin-top: 18px;
padding-top: 18px;
border-top: 2px solid rgba(0, 212, 255, 0.3);
animation: slideDown 0.3s ease;
}
@keyframes slideDown {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }
}
.kendala-card.expanded .kendala-answers {
display: block;
}

.answer-item {
margin-bottom: 16px;
padding: 16px 18px;
background: rgba(0, 15, 40, 0.7);
border-radius: 12px;
border-left: 4px solid var(--neon-cyan);
transition: var(--transition-fast);
position: relative;
box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
}
.answer-item:hover {
background: rgba(0, 25, 60, 0.8);
border-left-color: var(--neon-electric);
transform: translateX(3px);
box-shadow: 0 0 30px rgba(0, 212, 255, 0.25);
}

.answer-label {
font-weight: 700;
color: var(--neon-yellow);
margin-bottom: 10px;
font-size: 12px;
text-transform: uppercase;
letter-spacing: 1.5px;
display: flex;
align-items: center;
gap: 8px;
text-shadow: 0 0 10px rgba(255, 230, 0, 0.6);
}
.answer-label i {
font-size: 14px;
text-shadow: 0 0 10px rgba(255, 230, 0, 0.8);
}

.answer-content {
color: var(--text-secondary);
line-height: 1.7;
white-space: pre-wrap;
word-break: break-word;
font-size: 13px;
}
.answer-content a {
color: var(--neon-green);
text-decoration: none;
font-weight: 600;
transition: var(--transition-fast);
position: relative;
text-shadow: 0 0 8px rgba(0, 255, 157, 0.5);
}
.answer-content a::after {
content: '';
position: absolute;
bottom: -2px; left: 0;
width: 0; height: 2px;
background: var(--neon-green);
transition: var(--transition-fast);
box-shadow: 0 0 10px var(--neon-green);
}
.answer-content a:hover::after {
width: 100%;
}
.answer-content a:hover {
text-shadow: 0 0 15px rgba(0, 255, 157, 1);
}

/* ========== PHOTO & LINK BUTTONS 2026 ========== */
.photo-container {
margin: 16px 0;
text-align: center;
padding: 14px;
background: rgba(0, 20, 50, 0.5);
border-radius: 12px;
border: 2px dashed rgba(0, 212, 255, 0.5);
}
.photo-img {
max-width: 100%;
max-height: 300px;
border-radius: 12px;
border: 3px solid var(--neon-cyan);
cursor: pointer;
transition: var(--transition-normal);
box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
}
.photo-img:hover {
transform: scale(1.025);
box-shadow: 0 0 40px rgba(0, 212, 255, 0.8), 0 0 70px rgba(0, 255, 255, 0.4);
}
.copy-photo-btn {
background: rgba(0, 212, 255, 0.2);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 10px 20px;
border-radius: 12px;
cursor: pointer;
margin-top: 12px;
transition: var(--transition-normal);
font-weight: 600;
font-size: 12px;
display: inline-flex;
align-items: center;
gap: 8px;
box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
}
.copy-photo-btn:hover {
background: rgba(0, 212, 255, 0.35);
transform: translateY(-3px);
box-shadow: var(--electric-glow);
}

.link-buttons {
display: flex;
flex-wrap: wrap;
gap: 10px;
margin-top: 14px;
}
.open-link-btn {
background: rgba(0, 200, 255, 0.2);
border: 2px solid #00c8ff;
color: #00c8ff;
padding: 8px 16px;
border-radius: 10px;
cursor: pointer;
font-size: 11px;
font-weight: 600;
transition: var(--transition-normal);
display: inline-flex;
align-items: center;
gap: 6px;
text-decoration: none;
box-shadow: 0 0 12px rgba(0, 200, 255, 0.4);
}
.open-link-btn:hover {
background: rgba(0, 200, 255, 0.35);
transform: translateY(-3px);
box-shadow: 0 0 20px rgba(0, 200, 255, 0.7);
}
.open-link-btn i {
font-size: 10px;
}

.copy-btn, .sticky-btn {
background: rgba(0, 212, 255, 0.2);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 9px 18px;
border-radius: 10px;
cursor: pointer;
margin-top: 12px;
margin-right: 8px;
transition: var(--transition-normal);
font-weight: 600;
font-size: 12px;
display: inline-flex;
align-items: center;
gap: 6px;
box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
}
.copy-btn:hover, .sticky-btn:hover {
background: rgba(0, 212, 255, 0.35);
transform: translateY(-3px);
box-shadow: var(--electric-glow);
}
.copy-btn.copied, .sticky-btn.added {
background: var(--neon-green);
border-color: var(--neon-green);
color: #000;
animation: copiedPulse 0.5s ease;
box-shadow: 0 0 20px rgba(0, 255, 157, 0.6);
}
@keyframes copiedPulse {
0% { transform: scale(1); }
50% { transform: scale(1.15); }
100% { transform: scale(1); }
}

/* ========== STICKY NOTES 2026 (ENHANCED) ========== */
.sticky-fab {
position: fixed;
bottom: 30px;
right: 30px;
width: 60px;
height: 60px;
background: radial-gradient(circle at 30% 30%, #00ffff, #0099ff, #9d00ff);
border: 3px solid rgba(255, 255, 255, 0.5);
border-radius: 50%;
color: #fff;
font-size: 24px;
cursor: pointer;
z-index: 1000;
display: flex;
align-items: center;
justify-content: center;

<script>
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

let allKendala = [];
let filteredKendala = [];
let lightboxImages = [];
let lightboxIndex = 0;
let zoomLevel = 1;
let stickyNotes = JSON.parse(localStorage.getItem('stickyNotes') || '[]');
let draggedNote = null;
let editingIndex = -1;
let tempPhotoData = null;

async function loadKendalaData() {
try {
const response = await fetch(DATA_URL);
const text = await response.text();
const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
if (!jsonMatch) throw new Error('Gagal parse');
const data = JSON.parse(jsonMatch[1]);
const rows = data.table?.rows || [];
allKendala = rows.map(row => {
const cells = row.c || [];
return {
judul: cells[0]?.v?.toString().trim() || '',
jawaban1: cells[1]?.v?.toString().trim() || '',
jawaban2: cells[2]?.v?.toString().trim() || '',
jawaban3: cells[3]?.v?.toString().trim() || ''
};
}).filter(item => item.judul && item.judul !== '');
filteredKendala = [...allKendala];
renderKendala();
updateStats();
} catch (error) {
document.getElementById('kendalaContainer').innerHTML = `
<div class="error-msg">
<i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 15px; text-shadow: 0 0 20px rgba(255,62,108,0.8);"></i>
<p><strong>⚠️ Gagal memuat data</strong></p>
<p style="font-size: 12px; margin-top: 10px; opacity: 0.9;">Pastikan Google Sheet sudah dipublikasikan</p>
<p style="font-size: 11px; margin-top: 12px; opacity: 0.7;">${error.message}</p>
</div>`;
}
}

function renderKendala(data = filteredKendala) {
const container = document.getElementById('kendalaContainer');
if (data.length === 0) {
container.innerHTML = '<div class="no-data"><p style="color: var(--text-secondary); font-size: 16px;">Tidak ada data</p></div>';
return;
}
container.innerHTML = `<div class="kendala-list">${data.map((item, index) => createKendalaCard(item, index)).join('')}</div>`;
document.querySelectorAll('.kendala-title').forEach(title => {
title.addEventListener('click', function() {
this.parentElement.classList.toggle('expanded');
});
});
}

function createKendalaCard(item, index) {
const titlePhoto = extractTitlePhoto(item.judul);
const cleanJudul = titlePhoto ? item.judul.replace(titlePhoto.url, '').trim() : item.judul;
const hasPhoto = detectPhotoLink(item);
const links1 = extractLinks(item.jawaban1);
const links2 = extractLinks(item.jawaban2);
const links3 = extractLinks(item.jawaban3);
return `
<div class="kendala-card" data-index="${index}">
<h3 class="kendala-title">${escapeHtml(cleanJudul)}</h3>
 ${titlePhoto ? createTitlePhotoSection(titlePhoto.url, index) : ''}
<div class="kendala-answers">
 ${item.jawaban1 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 1</div>
<div class="answer-content">${formatContent(item.jawaban1, links1)}</div>
 ${hasPhoto && !titlePhoto ? createPhotoSection(item) : ''}
 ${links1.length > 0 ? createLinkButtons(links1) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 1)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 1)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
 ${item.jawaban2 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 2</div>
<div class="answer-content">${formatContent(item.jawaban2, links2)}</div>
 ${links2.length > 0 ? createLinkButtons(links2) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 2)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 2)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
 ${item.jawaban3 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 3</div>
<div class="answer-content">${formatContent(item.jawaban3, links3)}</div>
 ${links3.length > 0 ? createLinkButtons(links3) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 3)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 3)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
</div>
</div>`;
}

function extractTitlePhoto(judul) {
if (!judul) return null;
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
const match = judul.match(photoPattern);
if (match) return { url: match[1], fullMatch: match[0] };
return null;
}

function createTitlePhotoSection(photoUrl, index) {
if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
return `
<div class="title-photo-section">
<div class="title-photo-container">
<span class="title-photo-badge"><i class="fas fa-image"></i> FOTO</span>
<img src="${photoUrl}" alt="Foto Kendala" class="title-photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.parentElement.style.display='none'">
</div>
<div class="title-photo-actions">
<button class="copy-title-photo-btn" onclick="copyTitlePhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
<button class="view-title-photo-btn" onclick="openLightbox('${photoUrl}')"><i class="fas fa-expand"></i> Lihat Penuh</button>
</div>
</div>`;
}

function detectPhotoLink(item) {
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
return photoPattern.test(item.jawaban1) || photoPattern.test(item.jawaban2) || photoPattern.test(item.jawaban3);
}

function extractLinks(text) {
if (!text) return [];
const urlPattern = /https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi;
return text.match(urlPattern) || [];
}

function formatContent(text, links = []) {
if (!text) return '';
let formatted = escapeHtml(text);
links.forEach(link => {
const displayText = link.length > 45 ? link.substring(0, 42) + '...' : link;
formatted = formatted.replace(new RegExp(escapeRegExp(link), 'g'), `<a href="${link}" target="_blank" rel="noopener">${displayText}</a>`);
});
return formatted;
}

function createPhotoSection(item) {
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
const match = (item.jawaban1 + ' ' + item.jawaban2 + ' ' + item.jawaban3).match(photoPattern);
if (!match) return '';
const photoUrl = match[1];
if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
return `
<div class="photo-container">
<img src="${photoUrl}" alt="Foto" class="photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.style.display='none'">
<button class="copy-photo-btn" onclick="copyPhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
</div>`;
}

function createLinkButtons(links) {
if (links.length === 0) return '';
return `
<div class="link-buttons">
 ${links.map((link, i) => {
const label = links.length > 1 ? `Link ${i+1}` : 'Buka Link';
return `<a href="${link}" target="_blank" rel="noopener" class="open-link-btn">
<i class="fas fa-external-link-alt"></i> ${label}
</a>`;
}).join('')}
</div>`;
}

async function copyAnswer(index, answerNum) {
const item = filteredKendala[index];
const content = item[`jawaban${answerNum}`];
if (!content) return;
try {
await navigator.clipboard.writeText(content);
showToast('✅ Jawaban disalin!');
const btn = event.target.closest('.copy-btn');
if (btn) {
btn.classList.add('copied');
btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
setTimeout(() => {
btn.classList.remove('copied');
btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
}, 2000);
}
} catch {
fallbackCopy(content);
}
}

async function copyTitlePhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
showToast('✅ Foto disalin!');
} catch {
await navigator.clipboard.writeText(url);
showToast('📋 URL foto disalin!');
}
}

async function copyPhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
showToast('✅ Foto disalin!');
} catch {
await navigator.clipboard.writeText(url);
showToast('📋 URL foto disalin!');
}
}

function fallbackCopy(text) {
const textarea = document.createElement('textarea');
textarea.value = text;
textarea.style.position = 'fixed';
textarea.style.left = '-9999px';
document.body.appendChild(textarea);
textarea.select();
try {
document.execCommand('copy');
showToast('✅ Disalin!');
} catch {
showToast('❗ Gagal menyalin');
}
document.body.removeChild(textarea);
}

function openLightbox(url) {
lightboxIndex = lightboxImages.indexOf(url);
if (lightboxIndex === -1) {
lightboxImages.push(url);
lightboxIndex = lightboxImages.length - 1;
}
document.getElementById('lightboxImg').src = url;
document.getElementById('lightbox').classList.add('active');
document.body.style.overflow = 'hidden';
zoomLevel = 1;
updateZoom();
}

function closeLightbox(event) {
if (!event || event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
document.getElementById('lightbox').classList.remove('active');
document.getElementById('lightboxImg').src = '';
document.body.style.overflow = '';
}
}

function changeLightbox(direction) {
lightboxIndex += direction;
if (lightboxIndex < 0) lightboxIndex = lightboxImages.length - 1;
if (lightboxIndex >= lightboxImages.length) lightboxIndex = 0;
document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
zoomLevel = 1;
updateZoom();
}

function updateZoom() {
zoomLevel = parseFloat(document.getElementById('zoomSlider').value);
document.getElementById('lightboxImg').style.transform = `scale(${zoomLevel})`;
}

async function copyLightboxPhoto() {
const url = document.getElementById('lightboxImg').src;
if (url) await copyPhoto(url);
}

function toggleStickyPanel() {
const panel = document.getElementById('stickyPanel');
panel.classList.toggle('active');
if (panel.classList.contains('active')) renderStickyNotes();
}

function renderStickyNotes() {
const list = document.getElementById('stickyList');
if (!list) return;
list.innerHTML = '';
if (stickyNotes.length === 0) {
list.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:25px;font-size:13px;">📭 Belum ada sticky notes</p>';
return;
}
stickyNotes.forEach((note, index) => {
const div = document.createElement('div');
div.className = 'sticky-note';
div.draggable = true;
div.dataset.index = index;
div.title = '📋 Klik untuk copy Text + Foto sekaligus';

const header = document.createElement('div');
header.className = 'sticky-note-header';
header.innerHTML = `<span class="sticky-note-id">#${String(index + 1).padStart(3, '0')}</span>`;
div.appendChild(header);

if (note.text) {
const content = document.createElement('div');
content.className = 'sticky-note-content';
content.textContent = note.text;
content.onclick = () => copyStickyNote(index);
div.appendChild(content);
}
if (note.image) {
const img = document.createElement('img');
img.src = note.image;
img.alt = 'Sticky Image';
img.onclick = () => copyStickyNote(index);
div.appendChild(img);
}

const actions = document.createElement('div');
actions.className = 'sticky-note-actions';

const copyBtn = document.createElement('button');
copyBtn.className = 'sticky-action-btn copy';
copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy Semua';
copyBtn.onclick = (e) => { e.stopPropagation(); copyStickyNote(index); };

const editBtn = document.createElement('button');
editBtn.className = 'sticky-action-btn edit';
editBtn.innerHTML = '<i class="fas fa-edit"></i> Edit';
editBtn.onclick = (e) => { e.stopPropagation(); editStickyNote(index); };

const deleteBtn = document.createElement('button');
deleteBtn.className = 'sticky-action-btn delete';
deleteBtn.innerHTML = '<i class="fas fa-trash"></i> Hapus';
deleteBtn.onclick = (e) => { e.stopPropagation(); deleteStickyNote(index); };

actions.appendChild(copyBtn);
actions.appendChild(editBtn);
actions.appendChild(deleteBtn);
div.appendChild(actions);

div.addEventListener('dragstart', handleDragStart);
div.addEventListener('dragover', handleDragOver);
div.addEventListener('drop', handleDrop);
div.addEventListener('dragend', handleDragEnd);

list.appendChild(div);
});
}

function handleFileSelect(event) {
const file = event.target.files[0];
if (file && file.type.startsWith('image/')) {
const reader = new FileReader();
reader.onload = function(e) {
tempPhotoData = e.target.result;
showPhotoPreview(tempPhotoData);
};
reader.readAsDataURL(file);
}
}

function showPhotoPreview(dataUrl) {
const preview = document.getElementById('stickyPhotoPreview');
const previewImg = document.getElementById('stickyPreviewImg');
previewImg.src = dataUrl;
preview.classList.add('show');
}

function removePhoto() {
tempPhotoData = null;
document.getElementById('stickyPhotoPreview').classList.remove('show');
document.getElementById('fileInput').value = '';
}

function handleStickyPaste(event) {
const items = event.clipboardData.items;
for (let i = 0; i < items.length; i++) {
if (items[i].type.startsWith('image/')) {
event.preventDefault();
const blob = items[i].getAsFile();
const reader = new FileReader();
reader.onload = function(e) {
tempPhotoData = e.target.result;
showPhotoPreview(tempPhotoData);
showToast('📸 Foto berhasil ditempel!');
};
reader.readAsDataURL(blob);
break;
}
}
}

function handleStickyAction() {
if (editingIndex >= 0) {
updateStickyNote();
} else {
addStickyNote();
}
}

function addStickyNote() {
const input = document.getElementById('stickyInput');
const text = input.value.trim();
if (!text && !tempPhotoData) {
showToast('⚠️ Isi catatan atau tambah foto!');
return;
}
stickyNotes.push({
text: text,
image: tempPhotoData,
timestamp: Date.now()
});
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
input.value = '';
removePhoto();
renderStickyNotes();
showToast('✅ Ditambahkan ke Sticky Notes!');
}

async function copyStickyNote(index) {
const note = stickyNotes[index];
if (!note) return;
try {
const clipboardItems = [];
let copiedInfo = [];

if (note.text && note.text.trim() !== '') {
const textBlob = new Blob([note.text], { type: 'text/plain' });
clipboardItems.push(new ClipboardItem({ 'text/plain': textBlob }));
copiedInfo.push('Text');
}

if (note.image) {
try {
const base64Response = await fetch(note.image);
const imageBlob = await base64Response.blob();
const imageItem = new ClipboardItem({
[imageBlob.type]: imageBlob
});
clipboardItems.push(imageItem);
copiedInfo.push('Foto');
} catch (imgErr) {
console.error('Gagal convert foto:', imgErr);
const urlBlob = new Blob([note.image], { type: 'text/plain' });
clipboardItems.push(new ClipboardItem({ 'text/plain': urlBlob }));
copiedInfo.push('URL Foto');
}
}

if (clipboardItems.length > 0) {
await navigator.clipboard.write(clipboardItems);
showToast(`✅ ${copiedInfo.join(' + ')} disalin!`);
}
} catch (err) {
console.error('Copy error:', err);
if (note.text) {
await navigator.clipboard.writeText(note.text);
showToast('✅ Text disalin! 📸 Klik gambar untuk copy foto terpisah');
} else if (note.image) {
await copyPhoto(note.image);
}
}
}

function editStickyNote(index) {
const note = stickyNotes[index];
if (!note) return;
editingIndex = index;
const input = document.getElementById('stickyInput');
input.value = note.text || '';
if (note.image) {
tempPhotoData = note.image;
showPhotoPreview(note.image);
}
const addBtn = document.getElementById('stickyAddBtn');
const cancelBtn = document.getElementById('stickyCancelBtn');
addBtn.classList.add('editing');
addBtn.innerHTML = '<i class="fas fa-save"></i> <span>Update</span>';
cancelBtn.style.display = 'inline-flex';
input.focus();
showToast('✏️ Mode Edit Aktif - Edit di kolom input');
}

function updateStickyNote() {
const input = document.getElementById('stickyInput');
const text = input.value.trim();
if ((!text && !tempPhotoData) || editingIndex < 0) {
showToast('⚠️ Isi catatan!');
return;
}
stickyNotes[editingIndex] = {
text: text,
image: tempPhotoData,
timestamp: Date.now()
};
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
cancelEdit();
renderStickyNotes();
showToast('✅ Sticky note diperbarui!');
}

function cancelEdit() {
editingIndex = -1;
const input = document.getElementById('stickyInput');
input.value = '';
removePhoto();
const addBtn = document.getElementById('stickyAddBtn');
const cancelBtn = document.getElementById('stickyCancelBtn');
addBtn.classList.remove('editing');
addBtn.innerHTML = '<i class="fas fa-plus"></i> <span>Tambah</span>';
cancelBtn.style.display = 'none';
}

function deleteStickyNote(index) {
if (confirm('Hapus sticky note ini?')) {
stickyNotes.splice(index, 1);
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
showToastDelete('🗑️ Sticky note dihapus!');
}
}

function handleDragStart(e) {
draggedNote = this;
this.classList.add('dragging');
e.dataTransfer.effectAllowed = 'move';
}

function handleDragOver(e) {
e.preventDefault();
return false;
}

function handleDrop(e) {
e.stopPropagation();
if (!draggedNote || this === draggedNote) return false;
const fromIndex = parseInt(draggedNote.dataset.index);
const toIndex = parseInt(this.dataset.index);
if (fromIndex !== toIndex) {
const [moved] = stickyNotes.splice(fromIndex, 1);
stickyNotes.splice(toIndex, 0, moved);
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
}
return false;
}

function handleDragEnd() {
this.classList.remove('dragging');
draggedNote = null;
}

function addToSticky(kendalaIndex, answerNum) {
const item = filteredKendala[kendalaIndex];
const content = item[`jawaban${answerNum}`];
if (!content) return;
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
const match = content.match(photoPattern);
const imageUrl = match ? match[1] : null;
stickyNotes.push({
text: imageUrl ? content.replace(photoPattern, '').trim() : content,
image: imageUrl,
timestamp: Date.now()
});
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
showToast('✅ Ditambahkan ke Sticky Notes!');
}

function searchKendala() {
const query = document.getElementById('searchInput').value.toLowerCase().trim();
filteredKendala = allKendala.filter(item =>
item.judul.toLowerCase().includes(query) ||
(item.jawaban1 && item.jawaban1.toLowerCase().includes(query)) ||
(item.jawaban2 && item.jawaban2.toLowerCase().includes(query)) ||
(item.jawaban3 && item.jawaban3.toLowerCase().includes(query))
);
renderKendala();
updateStats();
}

function updateStats() {
document.getElementById('totalItems').textContent = filteredKendala.length;
const withPhotos = filteredKendala.filter(item => detectPhotoLink(item) || extractTitlePhoto(item.judul)).length;
document.getElementById('withPhotos').textContent = withPhotos;
const withLinks = filteredKendala.filter(item =>
extractLinks(item.jawaban1).length > 0 ||
extractLinks(item.jawaban2).length > 0 ||
extractLinks(item.jawaban3).length > 0
).length;
document.getElementById('withLinks').textContent = withLinks;
}

function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.className = 'toast';
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

function showToastDelete(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.className = 'toast delete';
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

function escapeHtml(text) {
if (!text) return '';
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}

function escapeRegExp(string) {
return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
for (let i = 0; i < 50; i++) {
const particle = document.createElement('div');
const size = Math.random() * 3 + 1;
particle.style.cssText = `
position: absolute;
width: ${size}px;
height: ${size}px;
background: rgba(0, 212, 255, ${Math.random() * 0.6 + 0.2});
border-radius: 50%;
left: ${Math.random() * 100}%;
top: ${Math.random() * 100}%;
animation: float ${Math.random() * 15 + 10}s infinite linear;
box-shadow: 0 0 ${Math.random() * 12 + 6}px rgba(0, 212, 255, 0.6);
`;
container.appendChild(particle);
}
}

const style = document.createElement('style');
style.textContent = `
@keyframes float {
0%, 100% { transform: translateY(0); opacity: 0; }
10%, 90% { opacity: 1; }
50% { transform: translateY(-220px); }
}
`;
document.head.appendChild(style);

document.addEventListener('DOMContentLoaded', () => {
createParticles();
loadKendalaData();
const stickyInput = document.getElementById('stickyInput');
if (stickyInput) {
stickyInput.addEventListener('paste', handleStickyPaste);
}
setTimeout(() => showToast('⚡ System Ready! Neon Blue 2026'), 1000);
});

document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') {
closeLightbox();
if (editingIndex >= 0) cancelEdit();
}
});
</script>
</body>
</html>

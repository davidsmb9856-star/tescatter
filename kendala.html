<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00ffff">
    <title>KENDALA ALL - LINE TOGEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00ffff; --neon-blue: #0088ff; --neon-purple: #9d00ff;
            --neon-green: #00ff88; --neon-yellow: #ffff00; --neon-red: #ff0066;
            --bg-dark: #000a1e; --text-main: #00ffff; --text-secondary: #66ffff;
            --panel-bg: rgba(0, 20, 50, 0.7); --panel-border: rgba(0, 255, 255, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Exo 2', sans-serif; background: var(--bg-dark);
            color: var(--text-main); min-height: 100vh; overflow-x: hidden;
            background: radial-gradient(circle at 20% 80%, rgba(0,243,255,0.15), transparent 40%),
                        radial-gradient(circle at 80% 20%, rgba(157,0,255,0.15), transparent 40%),
                        linear-gradient(180deg, #000a1e 0%, #001133 100%);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; flex-wrap: wrap; gap: 15px;
        }
        .back-btn {
            background: rgba(0,255,255,0.2); border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 12px 24px; border-radius: 12px;
            text-decoration: none; font-weight: bold; transition: all 0.3s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .back-btn:hover {
            background: rgba(0,255,255,0.4); transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0,255,255,0.6);
        }
        .title {
            font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 900;
            color: var(--neon-cyan); text-shadow: 0 0 30px rgba(0,255,255,0.7);
        }
        .search-bar {
            margin: 20px 0 25px; text-align: center;
        }
        #searchInput {
            width: 100%; max-width: 500px; padding: 14px 20px;
            background: rgba(0,20,45,0.75); border: 2px solid rgba(0,229,255,0.6);
            border-radius: 16px; color: var(--neon-cyan); font-size: 16px;
            font-weight: bold; text-align: center; font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
        }
        #searchInput:focus {
            outline: none; border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0,255,255,0.7), 0 0 35px rgba(0,229,255,0.5);
            background: rgba(0,25,55,0.85);
        }
        .loading {
            text-align: center; padding: 60px 20px; color: var(--neon-cyan);
        }
        .loading-spinner {
            width: 50px; height: 50px; border: 4px solid rgba(0,255,255,0.3);
            border-top-color: var(--neon-cyan); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .kendala-list { display: flex; flex-direction: column; gap: 20px; }
        .kendala-card {
            background: var(--panel-bg); border: 2px solid var(--panel-border);
            border-radius: 20px; padding: 25px; transition: all 0.3s ease;
            backdrop-filter: blur(10px); position: relative; overflow: hidden;
        }
        .kendala-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 5px; height: 100%;
            background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-purple));
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        .kendala-card:hover {
            transform: translateY(-5px); border-color: var(--neon-cyan);
            box-shadow: 0 15px 40px rgba(0,255,255,0.3);
        }
        .kendala-title {
            font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 800;
            color: var(--neon-cyan); margin-bottom: 18px; cursor: pointer;
            text-shadow: 0 0 15px rgba(0,255,255,0.7); display: flex;
            justify-content: space-between; align-items: center;
        }
        .kendala-title::after {
            content: '▼'; font-size: 16px; transition: transform 0.3s;
        }
        .kendala-card.expanded .kendala-title::after { transform: rotate(180deg); }
        .kendala-answers {
            display: none; margin-top: 15px; padding-top: 15px;
            border-top: 1px solid rgba(0,255,255,0.3);
        }
        .kendala-card.expanded .kendala-answers { display: block; }
        .answer-item {
            margin-bottom: 15px; padding: 12px 15px;
            background: rgba(0,15,40,0.6); border-radius: 12px;
            border-left: 3px solid var(--neon-cyan);
        }
        .answer-label {
            font-weight: 700; color: var(--neon-yellow); margin-bottom: 8px;
            font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .answer-content {
            color: var(--text-secondary); line-height: 1.6; white-space: pre-wrap;
            word-break: break-word; font-size: 15px;
        }
        .answer-content a {
            color: var(--neon-green); text-decoration: none; font-weight: 600;
        }
        .answer-content a:hover { text-decoration: underline; }
        .photo-container {
            margin: 15px 0; text-align: center;
        }
        .photo-img {
            max-width: 100%; max-height: 300px; border-radius: 12px;
            border: 2px solid var(--neon-cyan); cursor: pointer;
            transition: transform 0.3s; box-shadow: 0 0 20px rgba(0,255,255,0.4);
        }
        .photo-img:hover { transform: scale(1.02); }
        .copy-photo-btn {
            background: rgba(0,255,255,0.2); border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 8px 16px; border-radius: 8px;
            cursor: pointer; margin-top: 10px; transition: all 0.3s;
            font-size: 14px; font-weight: 600;
        }
        .copy-photo-btn:hover {
            background: rgba(0,255,255,0.4); transform: translateY(-2px);
        }
        .link-buttons {
            display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
        }
        .open-link-btn {
            background: rgba(0,200,255,0.2); border: 1px solid #00c8ff;
            color: #00c8ff; padding: 6px 14px; border-radius: 8px;
            cursor: pointer; font-size: 13px; font-weight: 600;
            transition: all 0.3s; display: inline-flex; align-items: center; gap: 5px;
        }
        .open-link-btn:hover {
            background: rgba(0,200,255,0.4); transform: translateY(-2px);
        }
        .copy-btn {
            background: rgba(0,255,255,0.2); border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 6px 14px; border-radius: 8px;
            cursor: pointer; margin-top: 10px; transition: all 0.3s;
            font-size: 13px; font-weight: 600;
        }
        .copy-btn:hover {
            background: rgba(0,255,255,0.4); transform: translateY(-2px);
        }
        .copy-btn.copied {
            background: var(--neon-green); border-color: var(--neon-green);
            color: #000;
        }
        .no-data {
            text-align: center; padding: 40px; color: var(--text-secondary);
            font-size: 18px;
        }
        .error-msg {
            text-align: center; padding: 40px; color: var(--neon-red);
            background: rgba(255,100,100,0.1); border-radius: 12px;
            border: 1px solid var(--neon-red);
        }
        .stats-bar {
            display: flex; justify-content: center; gap: 30px;
            margin: 20px 0; padding: 15px;
            background: rgba(0,20,50,0.6); border-radius: 12px;
            border: 1px solid rgba(0,255,255,0.3);
        }
        .stat-item { text-align: center; }
        .stat-value {
            font-size: 24px; font-weight: 800; color: var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
        }
        .stat-label { font-size: 13px; color: var(--text-secondary); }
        /* Lightbox untuk foto */
        .lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999;
            justify-content: center; align-items: center; flex-direction: column;
            padding: 20px;
        }
        .lightbox.active { display: flex; }
        .lightbox-img {
            max-width: 90%; max-height: 80vh; border-radius: 12px;
            border: 3px solid var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0,255,255,0.6);
        }
        .lightbox-close {
            position: absolute; top: 20px; right: 30px; font-size: 32px;
            color: var(--neon-cyan); cursor: pointer; transition: all 0.3s;
        }
        .lightbox-close:hover { color: var(--neon-red); transform: rotate(90deg); }
        .lightbox-copy {
            margin-top: 20px; padding: 10px 24px;
            background: rgba(0,255,255,0.2); border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); border-radius: 12px; cursor: pointer;
            font-weight: 700; transition: all 0.3s;
        }
        .lightbox-copy:hover {
            background: rgba(0,255,255,0.4); transform: scale(1.05);
        }
        @media (max-width: 768px) {
            .title { font-size: 32px; }
            .header { flex-direction: column; text-align: center; }
            .kendala-title { font-size: 18px; }
            .stats-bar { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">⬅️ Kembali ke Portal</a>
            <h1 class="title">🎧 KENDALA ALL</h1>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Cari kendala..." oninput="searchKendala()">
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalItems">0</div>
                <div class="stat-label">Total Data</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="withPhotos">0</div>
                <div class="stat-label">Dengan Foto</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="withLinks">0</div>
                <div class="stat-label">Dengan Link</div>
            </div>
        </div>

        <div id="kendalaContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>⏳ Memuat data dari Google Sheets...</p>
            </div>
        </div>
    </div>

    <!-- Lightbox untuk foto -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-img" id="lightboxImg" src="" alt="Preview">
        <button class="lightbox-copy" onclick="copyLightboxPhoto()">📋 Copy Foto</button>
    </div>

    <script>
        // === KONFIGURASI GOOGLE SHEETS ===
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        const GID = '1251944242';
        const RANGE = 'C2:F300';
        
        // URL untuk fetch data (Google Visualization API)
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

        // === VARIABEL GLOBAL ===
        let allKendala = [];
        let filteredKendala = [];

        // === FUNGSI UTAMA: LOAD DATA ===
        async function loadKendalaData() {
            try {
                const response = await fetch(DATA_URL);
                const text = await response.text();
                
                // Parse JSON dari Google Visualization API
                const jsonText = text.match(/google.visualization.Query.setResponse\(([\s\S]*)\);/)?.[1];
                if (!jsonText) throw new Error('Gagal parse data');
                
                const data = JSON.parse(jsonText);
                const rows = data.table.rows;
                
                // Parse data ke array
                allKendala = rows
                    .map(row => {
                        const cells = row.c || [];
                        return {
                            judul: cells[0]?.v || '',
                            jawaban1: cells[1]?.v || '',
                            jawaban2: cells[2]?.v || '',
                            jawaban3: cells[3]?.v || ''
                        };
                    })
                    .filter(item => item.judul && item.judul.trim() !== ''); // Filter judul kosong
                
                filteredKendala = [...allKendala];
                renderKendala();
                updateStats();
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('kendalaContainer').innerHTML = `
                    <div class="error-msg">
                        ❌ Gagal memuat data.<br>
                        <small>${error.message}</small><br><br>
                        Pastikan Google Sheet sudah dipublikasikan:<br>
                        File → Share → Publish to web → Entire Document → Web page
                    </div>
                `;
            }
        }

        // === RENDER DATA KE HTML ===
        function renderKendala(data = filteredKendala) {
            const container = document.getElementById('kendalaContainer');
            
            if (data.length === 0) {
                container.innerHTML = '<div class="no-data">🔍 Tidak ada data yang ditemukan</div>';
                return;
            }
            
            container.innerHTML = `<div class="kendala-list">
                ${data.map((item, index) => createKendalaCard(item, index)).join('')}
            </div>`;
            
            // Tambahkan event listener untuk expand/collapse
            document.querySelectorAll('.kendala-title').forEach(title => {
                title.addEventListener('click', function() {
                    this.parentElement.classList.toggle('expanded');
                });
            });
        }

        // === BUAT KARTU KENDALA ===
        function createKendalaCard(item, index) {
            const hasPhoto = detectPhotoLink(item);
            const links1 = extractLinks(item.jawaban1);
            const links2 = extractLinks(item.jawaban2);
            const links3 = extractLinks(item.jawaban3);
            const hasLinks = links1.length > 0 || links2.length > 0 || links3.length > 0;
            
            return `
            <div class="kendala-card" data-index="${index}">
                <h3 class="kendala-title">${escapeHtml(item.judul)}</h3>
                <div class="kendala-answers">
                    ${item.jawaban1 ? `
                    <div class="answer-item">
                        <div class="answer-label">💬 JAWABAN 1</div>
                        <div class="answer-content">${formatContent(item.jawaban1, links1)}</div>
                        ${hasPhoto ? createPhotoSection(item) : ''}
                        ${links1.length > 0 ? createLinkButtons(links1) : ''}
                        <button class="copy-btn" onclick="copyAnswer(${index}, 1)">📋 Copy</button>
                    </div>` : ''}
                    
                    ${item.jawaban2 ? `
                    <div class="answer-item">
                        <div class="answer-label">💬 JAWABAN 2</div>
                        <div class="answer-content">${formatContent(item.jawaban2, links2)}</div>
                        ${links2.length > 0 ? createLinkButtons(links2) : ''}
                        <button class="copy-btn" onclick="copyAnswer(${index}, 2)">📋 Copy</button>
                    </div>` : ''}
                    
                    ${item.jawaban3 ? `
                    <div class="answer-item">
                        <div class="answer-label">💬 JAWABAN 3</div>
                        <div class="answer-content">${formatContent(item.jawaban3, links3)}</div>
                        ${links3.length > 0 ? createLinkButtons(links3) : ''}
                        <button class="copy-btn" onclick="copyAnswer(${index}, 3)">📋 Copy</button>
                    </div>` : ''}
                </div>
            </div>`;
        }

        // === DETEKSI LINK FOTO ===
        function detectPhotoLink(item) {
            const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
            return photoPattern.test(item.jawaban1) || 
                   photoPattern.test(item.jawaban2) || 
                   photoPattern.test(item.jawaban3);
        }

        // === EKSTRAK LINK DARI TEKS ===
        function extractLinks(text) {
            if (!text) return [];
            // Regex untuk match URL (http/https)
            const urlPattern = /https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi;
            return text.match(urlPattern) || [];
        }

        // === FORMAT KONTEN: LINK JADI BUTTON, FOTO JADI IMG ===
        function formatContent(text, links = []) {
            if (!text) return '';
            let formatted = escapeHtml(text);
            
            // Ganti URL dengan link yang bisa diklik
            links.forEach((link, i) => {
                const displayText = link.length > 40 ? link.substring(0, 37) + '...' : link;
                formatted = formatted.replace(
                    new RegExp(escapeRegExp(link), 'g'),
                    `<a href="${link}" target="_blank" rel="noopener">${displayText}</a>`
                );
            });
            
            return formatted;
        }

        // === BUAT SECTION FOTO ===
        function createPhotoSection(item) {
            const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
            const match = (item.jawaban1 + ' ' + item.jawaban2 + ' ' + item.jawaban3).match(photoPattern);
            
            if (!match) return '';
            
            const photoUrl = match[1];
            return `
            <div class="photo-container">
                <img src="${photoUrl}" alt="Foto" class="photo-img" 
                     onclick="openLightbox('${photoUrl}')" onerror="this.style.display='none'">
                <button class="copy-photo-btn" onclick="copyPhoto('${photoUrl}')">
                    📋 Copy Foto
                </button>
            </div>`;
        }

        // === BUAT TOMBOL LINK ===
        function createLinkButtons(links) {
            if (links.length === 0) return '';
            return `
            <div class="link-buttons">
                ${links.map((link, i) => {
                    const label = links.length > 1 ? `🔗 Link ${i+1}` : '🔗 Buka Link';
                    return `<button class="open-link-btn" onclick="window.open('${link}', '_blank')">
                        ${label}
                    </button>`;
                }).join('')}
            </div>`;
        }

        // === COPY JAWABAN ===
        async function copyAnswer(index, answerNum) {
            const item = filteredKendala[index];
            const content = item[`jawaban${answerNum}`];
            if (!content) return;
            
            try {
                await navigator.clipboard.writeText(content);
                showToast('✅ Jawaban disalin!');
            } catch (err) {
                fallbackCopy(content);
            }
        }

        // === COPY FOTO ===
        async function copyPhoto(url) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                await navigator.clipboard.write([
                    new ClipboardItem({ [blob.type]: blob })
                ]);
                showToast('✅ Foto disalin!');
            } catch (err) {
                // Fallback: copy URL saja
                await navigator.clipboard.writeText(url);
                showToast('📋 URL foto disalin!');
6            }
        }

        // === LIGHTBOX FOTO ===
        function openLightbox(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox(event) {
            if (!event || event.target === document.getElementById('lightbox') || 
                event.target.classList.contains('lightbox-close')) {
                document.getElementById('lightbox').classList.remove('active');
                document.getElementById('lightboxImg').src = '';
            }
        }

        async function copyLightboxPhoto() {
            const url = document.getElementById('lightboxImg').src;
            if (url) await copyPhoto(url);
        }

        // === SEARCH/FILTER ===
        function searchKendala() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            
            filteredKendala = allKendala.filter(item => 
                item.judul.toLowerCase().includes(query) ||
                (item.jawaban1 && item.jawaban1.toLowerCase().includes(query)) ||
                (item.jawaban2 && item.jawaban2.toLowerCase().includes(query)) ||
                (item.jawaban3 && item.jawaban3.toLowerCase().includes(query))
            );
            
            renderKendala();
            updateStats();
        }

        // === UPDATE STATS ===
        function updateStats() {
            document.getElementById('totalItems').textContent = filteredKendala.length;
            
            const withPhotos = filteredKendala.filter(item => detectPhotoLink(item)).length;
            document.getElementById('withPhotos').textContent = withPhotos;
            
            const withLinks = filteredKendala.filter(item => 
                extractLinks(item.jawaban1).length > 0 ||
                extractLinks(item.jawaban2).length > 0 ||
                extractLinks(item.jawaban3).length > 0
            ).length;
            document.getElementById('withLinks').textContent = withLinks;
        }

        // === TOAST NOTIFICATION ===
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; bottom: 30px; right: 30px;
                background: rgba(0,20,50,0.95); border: 2px solid var(--neon-cyan);
                color: var(--neon-cyan); padding: 15px 25px; border-radius: 12px;
                font-weight: 700; z-index: 10000; box-shadow: 0 0 25px rgba(0,255,255,0.5);
                animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        // === FALLBACK COPY (untuk browser lama) ===
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('✅ Disalin!');
            } catch (err) {
                showToast('❌ Gagal menyalin');
            }
            document.body.removeChild(textarea);
        }

        // === UTILS ===
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // === INISIALISASI ===
        document.addEventListener('DOMContentLoaded', () => {
            loadKendalaData();
            
            // Auto-refresh setiap 5 menit (opsional)
            // setInterval(loadKendalaData, 300000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>⚡ KENDALA ALL - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-blue: #00d4ff;
--neon-blue-dark: #0088ff;
--neon-blue-light: #66f0ff;
--neon-blue-glow: rgba(0, 212, 255, 0.8);
--electric-blue: #00f0ff;
--plasma-blue: #0066ff;
--bolt-yellow: #00e5ff;
--bg-void: #000510;
--bg-deep: #000a18;
--bg-card: rgba(0, 15, 40, 0.85);
--bg-card-hover: rgba(0, 30, 70, 0.95);
--bg-panel: rgba(0, 8, 25, 0.95);
--bg-note: rgba(0, 20, 50, 0.9);
--text-main: #00d4ff;
--text-secondary: #88e8ff;
--text-dim: #4db8e0;
--border-glow: rgba(0, 212, 255, 0.6);
--transition-fast: 0.2s ease;
--transition-normal: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
--transition-electric: 0.15s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-void);
color: var(--text-main);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
}
/* ========== ELECTRIC BACKGROUND ========== */
.cyber-bg {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background:
radial-gradient(ellipse at 20% 80%, rgba(0, 136, 255, 0.15) 0%, transparent 50%),
radial-gradient(ellipse at 80% 20%, rgba(0, 212, 255, 0.12) 0%, transparent 45%),
radial-gradient(ellipse at 50% 50%, rgba(0, 102, 255, 0.08) 0%, transparent 55%),
radial-gradient(ellipse at 30% 30%, rgba(0, 240, 255, 0.06) 0%, transparent 40%),
linear-gradient(180deg, #000510 0%, #000d20 40%, #000815 100%);
z-index: -3;
}
.grid-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background-image:
linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
background-size: 60px 60px;
z-index: -2;
animation: gridPulse 8s ease-in-out infinite;
pointer-events: none;
}
@keyframes gridPulse {
0%, 100% { opacity: 0.6; }
50% { opacity: 1; }
}
/* ========== ELECTRIC PARTICLES ========== */
.electric-canvas {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
z-index: -1;
pointer-events: none;
}
.particles {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
z-index: -1;
pointer-events: none;
}
/* ========== LIGHTNING BOLT DECORATIONS ========== */
.lightning-bolt {
position: fixed;
width: 3px;
height: 0;
background: linear-gradient(to bottom, transparent, var(--neon-blue), var(--electric-blue), var(--neon-blue), transparent);
filter: blur(1px);
opacity: 0;
z-index: 0;
pointer-events: none;
box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue-dark);
animation: lightningStrike 4s ease-in-out infinite;
}
.lightning-bolt:nth-child(1) { left: 15%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 35%; animation-delay: 1.2s; }
.lightning-bolt:nth-child(3) { left: 55%; animation-delay: 2.4s; }
.lightning-bolt:nth-child(4) { left: 75%; animation-delay: 3.6s; }
.lightning-bolt:nth-child(5) { left: 90%; animation-delay: 0.8s; }
@keyframes lightningStrike {
0%, 85%, 100% { height: 0; opacity: 0; top: 0; }
86% { height: 30vh; opacity: 0.3; top: 0; }
87% { height: 60vh; opacity: 0.7; top: 0; }
88% { height: 100vh; opacity: 1; top: 0; }
89% { opacity: 0.5; }
90% { opacity: 0; height: 100vh; }
}
.scan-line {
position: fixed;
top: 0; left: 0; width: 100%; height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-blue), var(--electric-blue), var(--neon-blue), transparent);
opacity: 0.5;
animation: scanDown 12s linear infinite;
z-index: 1;
pointer-events: none;
box-shadow: 0 0 30px var(--neon-blue), 0 0 60px var(--neon-blue-dark);
}
@keyframes scanDown {
0% { top: -5%; opacity: 0; }
5% { opacity: 0.6; }
95% { opacity: 0.6; }
100% { top: 105%; opacity: 0; }
}
.noise-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
opacity: 0.025;
z-index: -1;
pointer-events: none;
}
.container {
max-width: 1200px;
margin: 0 auto;
padding: 20px 15px;
min-height: 100vh;
display: flex;
flex-direction: column;
position: relative;
z-index: 2;
}
/* ========== HEADER WITH ELECTRIC LOGO ========== */
.header {
text-align: center;
margin-bottom: 30px;
padding: 25px 15px;
position: relative;
}
.header::before {
content: '';
position: absolute;
bottom: 0; left: 50%;
transform: translateX(-50%);
width: 90%;
height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-blue), var(--electric-blue), var(--plasma-blue), var(--electric-blue), var(--neon-blue), transparent);
animation: electricPulse 2s ease-in-out infinite;
box-shadow: 0 0 20px var(--neon-blue);
}
@keyframes electricPulse {
0%, 100% { opacity: 0.6; box-shadow: 0 0 20px var(--neon-blue); }
50% { opacity: 1; box-shadow: 0 0 40px var(--neon-blue), 0 0 60px var(--electric-blue); }
}
.back-btn {
position: absolute;
left: 0; top: 50%;
transform: translateY(-50%);
background: rgba(0, 212, 255, 0.15);
border: 2px solid var(--neon-blue);
color: var(--neon-blue);
padding: 14px 24px;
border-radius: 12px;
text-decoration: none;
font-weight: 700;
font-size: 14px;
display: flex;
align-items: center;
gap: 10px;
transition: var(--transition-electric);
backdrop-filter: blur(10px);
text-transform: uppercase;
letter-spacing: 1px;
min-height: 48px;
cursor: pointer;
}
.back-btn:hover {
background: rgba(0, 212, 255, 0.3);
transform: translateY(-50%) scale(1.05);
box-shadow: 0 0 30px var(--neon-blue-glow), inset 0 0 20px rgba(0, 212, 255, 0.3);
border-color: var(--electric-blue);
}
.back-btn i {
animation: electricIcon 1.5s ease-in-out infinite;
font-size: 16px;
}
@keyframes electricIcon {
0%, 100% { text-shadow: 0 0 5px var(--neon-blue); }
50% { text-shadow: 0 0 15px var(--electric-blue), 0 0 25px var(--neon-blue); }
}
/* ========== ELECTRIC LOGO ========== */
.logo-container {
position: relative;
display: inline-block;
margin-bottom: 15px;
}
.logo-icon {
font-size: 48px;
color: var(--neon-blue);
position: relative;
display: inline-block;
animation: logoGlow 2s ease-in-out infinite;
filter: drop-shadow(0 0 20px var(--neon-blue-glow));
}
.logo-icon::before {
content: '';
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: 80px;
height: 80px;
background: radial-gradient(circle, rgba(0, 212, 255, 0.3) 0%, transparent 70%);
border-radius: 50%;
animation: logoPulse 2s ease-in-out infinite;
}
@keyframes logoGlow {
0%, 100% {
text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue-dark);
transform: scale(1);
}
50% {
text-shadow: 0 0 30px var(--electric-blue), 0 0 60px var(--neon-blue), 0 0 80px var(--plasma-blue);
transform: scale(1.05);
}
}
@keyframes logoPulse {
0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.8; }
}
/* Electric arcs around logo */
.electric-arc {
position: absolute;
width: 100px;
height: 100px;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
pointer-events: none;
}
.electric-arc::before,
.electric-arc::after {
content: '';
position: absolute;
width: 100%;
height: 100%;
border: 2px solid transparent;
border-radius: 50%;
animation: arcRotate 3s linear infinite;
}
.electric-arc::before {
border-top-color: var(--neon-blue);
border-right-color: var(--electric-blue);
animation-duration: 3s;
box-shadow: 0 0 15px var(--neon-blue), inset 0 0 15px rgba(0, 212, 255, 0.1);
}
.electric-arc::after {
border-bottom-color: var(--electric-blue);
border-left-color: var(--plasma-blue);
animation-duration: 4s;
animation-direction: reverse;
box-shadow: 0 0 10px var(--electric-blue);
}
@keyframes arcRotate {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}
.title {
font-family: 'Orbitron', sans-serif;
font-size: 34px;
font-weight: 900;
background: linear-gradient(135deg, #00d4ff 0%, #00f0ff 25%, #0088ff 50%, #00f0ff 75%, #00d4ff 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-size: 200% 200%;
animation: titleShine 3s ease infinite;
letter-spacing: 3px;
margin-bottom: 12px;
position: relative;
text-transform: uppercase;
}
@keyframes titleShine {
0%, 100% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
}
.title::after {
content: attr(data-text);
position: absolute;
left: 0;
top: 0;
width: 100%;
height: 100%;
background: linear-gradient(135deg, #00d4ff, #00f0ff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
filter: blur(15px);
opacity: 0.6;
z-index: -1;
}
.subtitle {
font-size: 15px;
color: var(--text-secondary);
letter-spacing: 4px;
opacity: 0.9;
text-transform: uppercase;
font-weight: 600;
}
.status-badge {
display: inline-flex;
align-items: center;
gap: 10px;
background: rgba(0, 212, 255, 0.15);
border: 2px solid var(--neon-blue);
padding: 10px 24px;
border-radius: 25px;
font-size: 13px;
color: var(--neon-blue);
margin-top: 15px;
box-shadow: 0 0 25px rgba(0, 212, 255, 0.4), inset 0 0 20px rgba(0, 212, 255, 0.15);
animation: badgeElectric 2s ease-in-out infinite;
text-transform: uppercase;
letter-spacing: 2px;
font-weight: 700;
}
@keyframes badgeElectric {
0%, 100% {
box-shadow: 0 0 20px rgba(0, 212, 255, 0.4), inset 0 0 15px rgba(0, 212, 255, 0.15);
border-color: var(--neon-blue);
}
50% {
box-shadow: 0 0 40px rgba(0, 240, 255, 0.6), inset 0 0 25px rgba(0, 212, 255, 0.25);
border-color: var(--electric-blue);
}
}
.status-dot {
width: 10px;
height: 10px;
background: var(--neon-blue);
border-radius: 50%;
animation: dotPulse 1.5s ease-in-out infinite;
box-shadow: 0 0 15px var(--neon-blue);
position: relative;
}
.status-dot::after {
content: '';
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: 100%;
height: 100%;
background: var(--electric-blue);
border-radius: 50%;
animation: dotRipple 1.5s ease-out infinite;
}
@keyframes dotPulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.2); }
}
@keyframes dotRipple {
0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
}
/* ========== SEARCH SECTION ========== */
.search-section {
margin: 25px 0;
text-align: center;
}
.search-bar {
position: relative;
max-width: 550px;
margin: 0 auto 18px;
}
.search-bar input {
width: 100%;
padding: 16px 24px 16px 55px;
background: rgba(0, 15, 40, 0.95);
border: 2px solid var(--neon-blue);
border-radius: 12px;
color: var(--text-main);
font-size: 15px;
font-family: 'Rajdhani', sans-serif;
font-weight: 600;
transition: var(--transition-normal);
backdrop-filter: blur(15px);
text-transform: uppercase;
letter-spacing: 1px;
min-height: 52px;
}
.search-bar input::placeholder {
color: rgba(0, 212, 255, 0.5);
text-transform: uppercase;
}
.search-bar input:focus {
outline: none;
border-color: var(--electric-blue);
box-shadow: 0 0 35px rgba(0, 212, 255, 0.6), inset 0 0 25px rgba(0, 212, 255, 0.15);
background: rgba(0, 20, 50, 0.98);
}
.search-bar i {
position: absolute;
left: 20px;
top: 50%;
transform: translateY(-50%);
color: var(--neon-blue);
font-size: 20px;
animation: searchPulse 2s ease-in-out infinite;
}
@keyframes searchPulse {
0%, 100% { text-shadow: 0 0 10px var(--neon-blue); }
50% { text-shadow: 0 0 25px var(--electric-blue), 0 0 35px var(--neon-blue); }
}
.stats-bar {
display: flex;
justify-content: center;
gap: 25px;
flex-wrap: wrap;
padding: 18px 24px;
background: rgba(0, 15, 40, 0.75);
border-radius: 12px;
border: 2px solid rgba(0, 212, 255, 0.4);
max-width: 750px;
margin: 0 auto;
box-shadow: 0 0 30px rgba(0, 212, 255, 0.25);
}
.stat-item {
text-align: center;
padding: 10px 24px;
background: rgba(0, 212, 255, 0.1);
border-radius: 10px;
border: 1px solid rgba(0, 212, 255, 0.3);
min-width: 120px;
}
.stat-item::after {
content: '';
position: absolute;
right: 0;
top: 20%;
height: 60%;
width: 2px;
background: linear-gradient(to bottom, transparent, var(--neon-blue), transparent);
}
.stat-item:last-child::after {
display: none;
}
.stat-value {
font-family: 'Orbitron', sans-serif;
font-size: 28px;
font-weight: 700;
color: var(--neon-blue);
text-shadow: 0 0 15px var(--neon-blue-glow);
display: block;
}
.stat-label {
font-size: 11px;
color: var(--text-secondary);
text-transform: uppercase;
letter-spacing: 2px;
opacity: 0.9;
font-weight: 600;
margin-top: 4px;
}
/* ========== CARDS WITH ELECTRIC EFFECT ========== */
.kendala-list {
display: flex;
flex-direction: column;
gap: 20px;
}
.kendala-card {
background: var(--bg-card);
border: 2px solid rgba(0, 212, 255, 0.5);
border-radius: 16px;
padding: 24px 28px;
transition: var(--transition-normal);
position: relative;
overflow: hidden;
backdrop-filter: blur(20px);
animation: cardSlide 0.5s ease forwards;
opacity: 0;
transform: translateX(-30px);
}
.kendala-card:nth-child(1) { animation-delay: 0.1s; }
.kendala-card:nth-child(2) { animation-delay: 0.15s; }
.kendala-card:nth-child(3) { animation-delay: 0.2s; }
.kendala-card:nth-child(4) { animation-delay: 0.25s; }
.kendala-card:nth-child(5) { animation-delay: 0.3s; }
.kendala-card:nth-child(6) { animation-delay: 0.35s; }
.kendala-card:nth-child(7) { animation-delay: 0.4s; }
.kendala-card:nth-child(8) { animation-delay: 0.45s; }
@keyframes cardSlide {
to { opacity: 1; transform: translateX(0); }
}
/* Electric border effect */
.kendala-card::before {
content: '';
position: absolute;
top: 0;
left: 0;
width: 5px;
height: 100%;
background: linear-gradient(to bottom, var(--neon-blue), var(--electric-blue), var(--plasma-blue), var(--electric-blue), var(--neon-blue));
box-shadow: 0 0 20px var(--neon-blue), 0 0 40px rgba(0, 212, 255, 0.5);
transition: var(--transition-normal);
}
/* Electric glow on hover */
.kendala-card::after {
content: '';
position: absolute;
top: 0;
left: 0;
right: 0;
bottom: 0;
background: linear-gradient(135deg, transparent 40%, rgba(0, 212, 255, 0.1) 50%, transparent 60%);
background-size: 200% 200%;
opacity: 0;
transition: var(--transition-normal);
pointer-events: none;
}
.kendala-card:hover {
background: var(--bg-card-hover);
transform: translateY(-6px) scale(1.01);
border-color: var(--electric-blue);
box-shadow:
0 20px 50px rgba(0, 212, 255, 0.3),
0 0 50px rgba(0, 212, 255, 0.2),
inset 0 0 30px rgba(0, 212, 255, 0.1);
}
.kendala-card:hover::before {
width: 7px;
box-shadow: 0 0 30px var(--electric-blue), 0 0 60px var(--neon-blue);
}
.kendala-card:hover::after {
opacity: 1;
animation: electricShine 1.5s ease-in-out infinite;
}
@keyframes electricShine {
0% { background-position: 200% 0; }
100% { background-position: -200% 0; }
}
.kendala-title {
font-family: 'Orbitron', sans-serif;
font-size: 17px;
font-weight: 700;
color: var(--neon-blue);
margin-bottom: 18px;
cursor: pointer;
display: flex;
justify-content: space-between;
align-items: center;
text-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
padding-bottom: 16px;
border-bottom: 2px solid rgba(0, 212, 255, 0.3);
transition: var(--transition-fast);
letter-spacing: 1px;
min-height: 48px;
}
.kendala-title:hover {
color: var(--electric-blue);
text-shadow: 0 0 25px rgba(0, 240, 255, 0.9), 0 0 35px rgba(0, 212, 255, 0.7);
}
.kendala-title::after {
content: '\f078';
font-family: 'Font Awesome 6 Free';
font-weight: 900;
font-size: 16px;
transition: transform 0.3s ease;
color: var(--neon-blue);
}
.kendala-card.expanded .kendala-title::after {
transform: rotate(180deg);
}
/* ========== PHOTO SECTIONS ========== */
.title-photo-section {
display: none;
margin: 18px 0;
padding: 18px;
background: rgba(0, 10, 30, 0.75);
border-radius: 14px;
border: 2px solid rgba(0, 212, 255, 0.4);
text-align: center;
animation: photoFadeIn 0.4s ease;
box-shadow: inset 0 0 25px rgba(0, 212, 255, 0.15);
}
@keyframes photoFadeIn {
from { opacity: 0; transform: translateY(-10px) scale(0.98); }
to { opacity: 1; transform: translateY(0) scale(1); }
}
.kendala-card.expanded .title-photo-section {
display: block;
}
.title-photo-container {
position: relative;
display: inline-block;
}
.title-photo-img {
max-width: 100%;
max-height: 320px;
border-radius: 12px;
border: 3px solid var(--neon-blue);
cursor: pointer;
transition: var(--transition-normal);
box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
}
.title-photo-img:hover {
transform: scale(1.02);
box-shadow: 0 0 50px rgba(0, 212, 255, 0.7), 0 0 80px rgba(0, 212, 255, 0.4);
}
.title-photo-badge {
position: absolute;
top: 10px;
left: 10px;
background: linear-gradient(135deg, var(--neon-blue), var(--electric-blue));
color: #000;
padding: 6px 16px;
border-radius: 8px;
font-size: 11px;
font-weight: 700;
display: flex;
align-items: center;
gap: 6px;
text-transform: uppercase;
letter-spacing: 1px;
box-shadow: 0 0 15px var(--neon-blue-glow);
}
.title-photo-actions {
margin-top: 16px;
display: flex;
gap: 12px;
justify-content: center;
flex-wrap: wrap;
}
.copy-title-photo-btn, .view-title-photo-btn {
background: rgba(0, 212, 255, 0.2);
border: 2px solid var(--neon-blue);
color: var(--neon-blue);
padding: 12px 24px;
border-radius: 10px;
cursor: pointer;
transition: var(--transition-electric);
font-weight: 700;
font-size: 13px;
display: inline-flex;
align-items: center;
gap: 10px;
text-transform: uppercase;
letter-spacing: 1px;
min-height: 48px;
}
.copy-title-photo-btn:hover, .view-title-photo-btn:hover {
background: rgba(0, 212, 255, 0.35);
transform: translateY(-3px) scale(1.03);
box-shadow: 0 0 30px var(--neon-blue-glow);
border-color: var(--electric-blue);
}
/* ========== ANSWERS ========== */
.kendala-answers {
display: none;
margin-top: 20px;
padding-top: 20px;
border-top: 2px solid rgba(0, 212, 255, 0.3);
animation: slideDown 0.3s ease;
}
@keyframes slideDown {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }
}
.kendala-card.expanded .kendala-answers {
display: block;
}
.answer-item {
margin-bottom: 18px;
padding: 18px 20px;
background: rgba(0, 10, 30, 0.65);
border-radius: 12px;
border-left: 4px solid var(--neon-blue);
transition: var(--transition-fast);
position: relative;
overflow: hidden;
}
.answer-item::before {
content: '';
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: linear-gradient(90deg, rgba(0, 212, 255, 0.05), transparent);
opacity: 0;
transition: var(--transition-fast);
}
.answer-item:hover {
background: rgba(0, 20, 50, 0.75);
border-left-color: var(--electric-blue);
transform: translateX(4px);
box-shadow: 0 0 25px rgba(0, 212, 255, 0.2);
}
.answer-item:hover::before {
opacity: 1;
}
.answer-label {
font-weight: 700;
color: var(--bolt-yellow);
margin-bottom: 12px;
font-size: 12px;
text-transform: uppercase;
letter-spacing: 2px;
display: flex;
align-items: center;

<div class="loading-spinner"></div>

<p style="font-size: 12px; opacity: 0.7; margin-top: 10px;">Memuat data dari server</p>

</div>
</div>
<script>
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;
let allKendala = [];
let filteredKendala = [];
let lightboxImages = [];
let lightboxIndex = 0;
let zoomLevel = 1;
let stickyNotes = JSON.parse(localStorage.getItem('stickyNotes') || '[]');
let draggedNote = null;
let editingIndex = -1;
let tempPhotoData = null;
// ========== ELECTRIC CANVAS ==========
function initElectricCanvas() {
const canvas = document.getElementById('electricCanvas');
if (!canvas) return;
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const sparks = [];
const sparkCount = 60;
class Spark {
constructor() {
this.reset();
}
reset() {
this.x = Math.random() * canvas.width;
this.y = Math.random() * canvas.height;
this.vx = (Math.random() - 0.5) * 1.5;
this.vy = (Math.random() - 0.5) * 1.5;
this.life = Math.random() * 100 + 50;
this.maxLife = this.life;
this.size = Math.random() * 2 + 0.5;
}
update() {
this.x += this.vx;
this.y += this.vy;
this.life--;
if (this.life <= 0 || this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
this.reset();
}
}
draw() {
const alpha = (this.life / this.maxLife) * 0.7;
ctx.beginPath();
ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
ctx.fillStyle = `rgba(0, 212, 255, ${alpha})`;
ctx.fill();
ctx.shadowBlur = 15;
ctx.shadowColor = 'rgba(0, 212, 255, 0.8)';
}
}
for (let i = 0; i < sparkCount; i++) {
sparks.push(new Spark());
}
function animate() {
ctx.clearRect(0, 0, canvas.width, canvas.height);
sparks.forEach(spark => {
spark.update();
spark.draw();
});
requestAnimationFrame(animate);
}
animate();
window.addEventListener('resize', () => {
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});
}
async function loadKendalaData() {
try {
const response = await fetch(DATA_URL);
const text = await response.text();
const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
if (!jsonMatch) throw new Error('Gagal parse data');
const data = JSON.parse(jsonMatch[1]);
const rows = data.table?.rows || [];
allKendala = rows.map(row => {
const cells = row.c || [];
return {
judul: cells[0]?.v?.toString().trim() || '',
jawaban1: cells[1]?.v?.toString().trim() || '',
jawaban2: cells[2]?.v?.toString().trim() || '',
jawaban3: cells[3]?.v?.toString().trim() || ''
};
}).filter(item => item.judul && item.judul !== '');
filteredKendala = [...allKendala];
renderKendala();
updateStats();
} catch (error) {
document.getElementById('kendalaContainer').innerHTML = `
<div class="error-msg">
<i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 14px;"></i>
<p><strong>Gagal memuat data</strong></p>
<p style="font-size: 12px; margin-top: 10px; opacity: 0.85;">Pastikan Google Sheet sudah dipublikasikan</p>
<p style="font-size: 11px; margin-top: 14px; opacity: 0.6;">${error.message}</p>
</div>`;
}
}
function renderKendala(data = filteredKendala) {
const container = document.getElementById('kendalaContainer');
if (data.length === 0) {
container.innerHTML = '<div class="no-data"><p>Tidak ada data ditemukan</p></div>';
return;
}
container.innerHTML = `<div class="kendala-list">${data.map((item, index) => createKendalaCard(item, index)).join('')}</div>`;
document.querySelectorAll('.kendala-title').forEach(title => {
title.addEventListener('click', function() {
this.parentElement.classList.toggle('expanded');
});
});
}
function createKendalaCard(item, index) {
const titlePhoto = extractTitlePhoto(item.judul);
const cleanJudul = titlePhoto ? item.judul.replace(titlePhoto.url, '').trim() : item.judul;
const hasPhoto = detectPhotoLink(item);
const links1 = extractLinks(item.jawaban1);
const links2 = extractLinks(item.jawaban2);
const links3 = extractLinks(item.jawaban3);
return `
<div class="kendala-card" data-index="${index}">
<h3 class="kendala-title">${escapeHtml(cleanJudul)}</h3>
${titlePhoto ? createTitlePhotoSection(titlePhoto.url, index) : ''}
<div class="kendala-answers">
${item.jawaban1 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-bolt"></i> JAWABAN 1</div>
<div class="answer-content">${formatContent(item.jawaban1, links1)}</div>
${hasPhoto && !titlePhoto ? createPhotoSection(item) : ''}
${links1.length > 0 ? createLinkButtons(links1) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 1)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 1)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
${item.jawaban2 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-bolt"></i> JAWABAN 2</div>
<div class="answer-content">${formatContent(item.jawaban2, links2)}</div>
${links2.length > 0 ? createLinkButtons(links2) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 2)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 2)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
${item.jawaban3 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-bolt"></i> JAWABAN 3</div>
<div class="answer-content">${formatContent(item.jawaban3, links3)}</div>
${links3.length > 0 ? createLinkButtons(links3) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 3)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 3)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
</div>
</div>`;
}
function extractTitlePhoto(judul) {
if (!judul) return null;
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
const match = judul.match(photoPattern);
if (match) return { url: match[1], fullMatch: match[0] };
return null;
}
function createTitlePhotoSection(photoUrl, index) {
if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
return `
<div class="title-photo-section">
<div class="title-photo-container">
<span class="title-photo-badge"><i class="fas fa-bolt"></i> FOTO</span>
<img src="${photoUrl}" alt="Foto Kendala" class="title-photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.parentElement.style.display='none'">
</div>
<div class="title-photo-actions">
<button class="copy-title-photo-btn" onclick="copyTitlePhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
<button class="view-title-photo-btn" onclick="openLightbox('${photoUrl}')"><i class="fas fa-expand"></i> Lihat</button>
</div>
</div>`;
}
function detectPhotoLink(item) {
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
return photoPattern.test(item.jawaban1) || photoPattern.test(item.jawaban2) || photoPattern.test(item.jawaban3);
}
function extractLinks(text) {
if (!text) return [];
const urlPattern = /https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi;
return text.match(urlPattern) || [];
}
function formatContent(text, links = []) {
if (!text) return '';
let formatted = escapeHtml(text);
links.forEach(link => {
const displayText = link.length > 45 ? link.substring(0, 42) + '...' : link;
formatted = formatted.replace(new RegExp(escapeRegExp(link), 'g'), `<a href="${link}" target="_blank" rel="noopener">${displayText}</a>`);
});
return formatted;
}
function createPhotoSection(item) {
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
const match = (item.jawaban1 + ' ' + item.jawaban2 + ' ' + item.jawaban3).match(photoPattern);
if (!match) return '';
const photoUrl = match[1];
if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
return `
<div class="photo-container">
<img src="${photoUrl}" alt="Foto" class="photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.style.display='none'">
<button class="copy-photo-btn" onclick="copyPhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
</div>`;
}
function createLinkButtons(links) {
if (links.length === 0) return '';
return `
<div class="link-buttons">
${links.map((link, i) => {
const label = links.length > 1 ? `Link ${i+1}` : 'Buka Link';
return `<a href="${link}" target="_blank" rel="noopener" class="open-link-btn">
<i class="fas fa-external-link-alt"></i> ${label}
</a>`;
}).join('')}
</div>`;
}
async function copyAnswer(index, answerNum) {
const item = filteredKendala[index];
const content = item[`jawaban${answerNum}`];
if (!content) return;
try {
await navigator.clipboard.writeText(content);
showToast('Jawaban berhasil disalin!');
const btn = event.target.closest('.copy-btn');
if (btn) {
btn.classList.add('copied');
btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
setTimeout(() => {
btn.classList.remove('copied');
btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
}, 2000);
}
} catch {
fallbackCopy(content);
}
}
async function copyTitlePhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
showToast('Foto berhasil disalin!');
} catch {
await navigator.clipboard.writeText(url);
showToast('URL foto disalin!');
}
}
async function copyPhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
showToast('Foto berhasil disalin!');
} catch {
await navigator.clipboard.writeText(url);
showToast('URL foto disalin!');
}
}
function fallbackCopy(text) {
const textarea = document.createElement('textarea');
textarea.value = text;
textarea.style.position = 'fixed';
textarea.style.left = '-9999px';
document.body.appendChild(textarea);
textarea.select();
try {
document.execCommand('copy');
showToast('Berhasil disalin!');
} catch {
showToast('Gagal menyalin');
}
document.body.removeChild(textarea);
}
function openLightbox(url) {
lightboxIndex = lightboxImages.indexOf(url);
if (lightboxIndex === -1) {
lightboxImages.push(url);
lightboxIndex = lightboxImages.length - 1;
}
document.getElementById('lightboxImg').src = url;
document.getElementById('lightbox').classList.add('active');
document.body.style.overflow = 'hidden';
zoomLevel = 1;
updateZoom();
}
function closeLightbox(event) {
if (!event || event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
document.getElementById('lightbox').classList.remove('active');
document.getElementById('lightboxImg').src = '';
document.body.style.overflow = '';
}
}
function changeLightbox(direction) {
lightboxIndex += direction;
if (lightboxIndex < 0) lightboxIndex = lightboxImages.length - 1;
if (lightboxIndex >= lightboxImages.length) lightboxIndex = 0;
document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
zoomLevel = 1;
updateZoom();
}
function updateZoom() {
zoomLevel = parseFloat(document.getElementById('zoomSlider').value);
document.getElementById('lightboxImg').style.transform = `scale(${zoomLevel})`;
}
async function copyLightboxPhoto() {
const url = document.getElementById('lightboxImg').src;
if (url) await copyPhoto(url);
}
function toggleStickyPanel() {
const panel = document.getElementById('stickyPanel');
panel.classList.toggle('active');
if (panel.classList.contains('active')) renderStickyNotes();
}
function renderStickyNotes() {
const list = document.getElementById('stickyList');
if (!list) return;
list.innerHTML = '';
if (stickyNotes.length === 0) {
list.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:25px;font-size:13px;">Belum ada sticky notes</p>';
return;
}
stickyNotes.forEach((note, index) => {
const div = document.createElement('div');
div.className = 'sticky-note';
div.draggable = true;
div.dataset.index = index;
div.title = 'Klik untuk copy Text + Foto';
const header = document.createElement('div');
header.className = 'sticky-note-header';
header.innerHTML = `<span class="sticky-note-id">#${String(index + 1).padStart(3, '0')}</span>`;
div.appendChild(header);
if (note.text) {
const content = document.createElement('div');
content.className = 'sticky-note-content';
content.textContent = note.text;
content.onclick = () => copyStickyNote(index);
div.appendChild(content);
}
if (note.image) {
const img = document.createElement('img');
img.src = note.image;
img.alt = 'Sticky Image';
img.onclick = () => copyStickyNote(index);
div.appendChild(img);
}
const actions = document.createElement('div');
actions.className = 'sticky-note-actions';
const copyBtn = document.createElement('button');
copyBtn.className = 'sticky-action-btn copy';
copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy Semua';
copyBtn.onclick = (e) => { e.stopPropagation(); copyStickyNote(index); };
const editBtn = document.createElement('button');
editBtn.className = 'sticky-action-btn edit';
editBtn.innerHTML = '<i class="fas fa-edit"></i> Edit';
editBtn.onclick = (e) => { e.stopPropagation(); editStickyNote(index); };
const deleteBtn = document.createElement('button');
deleteBtn.className = 'sticky-action-btn delete';
deleteBtn.innerHTML = '<i class="fas fa-trash"></i> Hapus';
deleteBtn.onclick = (e) => { e.stopPropagation(); deleteStickyNote(index); };
actions.appendChild(copyBtn);
actions.appendChild(editBtn);
actions.appendChild(deleteBtn);
div.appendChild(actions);
div.addEventListener('dragstart', handleDragStart);
div.addEventListener('dragover', handleDragOver);
div.addEventListener('drop', handleDrop);
div.addEventListener('dragend', handleDragEnd);
list.appendChild(div);
});
}
function handleFileSelect(event) {
const file = event.target.files[0];
if (file && file.type.startsWith('image/')) {
const reader = new FileReader();
reader.onload = function(e) {
tempPhotoData = e.target.result;
showPhotoPreview(tempPhotoData);
};
reader.readAsDataURL(file);
}
}
function showPhotoPreview(dataUrl) {
const preview = document.getElementById('stickyPhotoPreview');
const previewImg = document.getElementById('stickyPreviewImg');
previewImg.src = dataUrl;
preview.classList.add('show');
}
function removePhoto() {
tempPhotoData = null;
document.getElementById('stickyPhotoPreview').classList.remove('show');
document.getElementById('fileInput').value = '';
}
function handleStickyPaste(event) {
const items = event.clipboardData.items;
for (let i = 0; i < items.length; i++) {
if (items[i].type.startsWith('image/')) {
event.preventDefault();
const blob = items[i].getAsFile();
const reader = new FileReader();
reader.onload = function(e) {
tempPhotoData = e.target.result;
showPhotoPreview(tempPhotoData);
showToast('Foto berhasil ditempel!');
};
reader.readAsDataURL(blob);
break;
}
}
}
function handleStickyAction() {
if (editingIndex >= 0) {
updateStickyNote();
} else {
addStickyNote();
}
}
function addStickyNote() {
const input = document.getElementById('stickyInput');
const text = input.value.trim();
if (!text && !tempPhotoData) {
showToast('Isi catatan atau tambah foto!');
return;
}
stickyNotes.push({
text: text,
image: tempPhotoData,
timestamp: Date.now()
});
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
input.value = '';
removePhoto();
renderStickyNotes();
showToast('Ditambahkan ke Sticky Notes!');
}
async function copyStickyNote(index) {
const note = stickyNotes[index];
if (!note) return;
try {
const clipboardItems = [];
let copiedInfo = [];
if (note.text && note.text.trim() !== '') {
const textBlob = new Blob([note.text], { type: 'text/plain' });
clipboardItems.push(new ClipboardItem({ 'text/plain': textBlob }));
copiedInfo.push('Text');
}
if (note.image) {
try {
const base64Response = await fetch(note.image);
const imageBlob = await base64Response.blob();
const imageItem = new ClipboardItem({ [imageBlob.type]: imageBlob });
clipboardItems.push(imageItem);
copiedInfo.push('Foto');
} catch (imgErr) {
console.error('Gagal convert foto:', imgErr);
}
}
if (clipboardItems.length > 0) {
await navigator.clipboard.write(clipboardItems);
showToast(`${copiedInfo.join(' + ')} berhasil disalin!`);
}
} catch (err) {
console.error('Copy error:', err);
if (note.text) {
await navigator.clipboard.writeText(note.text);
showToast('Text disalin!');
} else if (note.image) {
await copyPhoto(note.image);
}
}
}
function editStickyNote(index) {
const note = stickyNotes[index];
if (!note) return;
editingIndex = index;
const input = document.getElementById('stickyInput');
input.value = note.text || '';
if (note.image) {
tempPhotoData = note.image;
showPhotoPreview(note.image);
}
const addBtn = document.getElementById('stickyAddBtn');
const cancelBtn = document.getElementById('stickyCancelBtn');
addBtn.classList.add('editing');
addBtn.innerHTML = '<i class="fas fa-save"></i> <span>Update</span>';
cancelBtn.style.display = 'inline-flex';
input.focus();
showToast('Mode Edit Aktif');
}
function updateStickyNote() {
const input = document.getElementById('stickyInput');
const text = input.value.trim();
if ((!text && !tempPhotoData) || editingIndex < 0) {
showToast('Isi catatan!');
return;
}
stickyNotes[editingIndex] = {
text: text,
image: tempPhotoData,
timestamp: Date.now()
};
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
cancelEdit();
renderStickyNotes();
showToast('Sticky note diperbarui!');
}
function cancelEdit() {
editingIndex = -1;
const input = document.getElementById('stickyInput');
input.value = '';
removePhoto();
const addBtn = document.getElementById('stickyAddBtn');
const cancelBtn = document.getElementById('stickyCancelBtn');
addBtn.classList.remove('editing');
addBtn.innerHTML = '<i class="fas fa-plus"></i> <span>Tambah</span>';
cancelBtn.style.display = 'none';
}
function deleteStickyNote(index) {
if (confirm('Hapus sticky note ini?')) {
stickyNotes.splice(index, 1);
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
showToastDelete('Sticky note dihapus!');
}
}
function handleDragStart(e) {
draggedNote = this;
this.classList.add('dragging');
e.dataTransfer.effectAllowed = 'move';
}
function handleDragOver(e) {
e.preventDefault();
return false;
}
function handleDrop(e) {
e.stopPropagation();
if (!draggedNote || this === draggedNote) return false;
const fromIndex = parseInt(draggedNote.dataset.index);
const toIndex = parseInt(this.dataset.index);
if (fromIndex !== toIndex) {
const [moved] = stickyNotes.splice(fromIndex, 1);
stickyNotes.splice(toIndex, 0, moved);
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
}
return false;
}
function handleDragEnd() {
this.classList.remove('dragging');
draggedNote = null;
}
function addToSticky(kendalaIndex, answerNum) {
const item = filteredKendala[kendalaIndex];
const content = item[`jawaban${answerNum}`];
if (!content) return;
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
const match = content.match(photoPattern);
const imageUrl = match ? match[1] : null;
stickyNotes.push({
text: imageUrl ? content.replace(photoPattern, '').trim() : content,
image: imageUrl,
timestamp: Date.now()
});
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
showToast('Ditambahkan ke Sticky Notes!');
}
function searchKendala() {
const query = document.getElementById('searchInput').value.toLowerCase().trim();
filteredKendala = allKendala.filter(item =>
item.judul.toLowerCase().includes(query) ||
(item.jawaban1 && item.jawaban1.toLowerCase().includes(query)) ||
(item.jawaban2 && item.jawaban2.toLowerCase().includes(query)) ||
(item.jawaban3 && item.jawaban3.toLowerCase().includes(query))
);
renderKendala();
updateStats();
}
function updateStats() {
document.getElementById('totalItems').textContent = filteredKendala.length;
const withPhotos = filteredKendala.filter(item => detectPhotoLink(item) || extractTitlePhoto(item.judul)).length;
document.getElementById('withPhotos').textContent = withPhotos;
const withLinks = filteredKendala.filter(item =>
extractLinks(item.jawaban1).length > 0 ||
extractLinks(item.jawaban2).length > 0 ||
extractLinks(item.jawaban3).length > 0
).length;
document.getElementById('withLinks').textContent = withLinks;
}
function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.className = 'toast';
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}
function showToastDelete(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.className = 'toast delete';
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}
function escapeHtml(text) {
if (!text) return '';
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}
function escapeRegExp(string) {
return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
for (let i = 0; i < 50; i++) {
const particle = document.createElement('div');
const size = Math.random() * 3 + 1;
particle.style.cssText = `
position: absolute;
width: ${size}px;
height: ${size}px;
background: rgba(0, 212, 255, ${Math.random() * 0.6 + 0.3});
border-radius: 50%;
left: ${Math.random() * 100}%;
top: ${Math.random() * 100}%;
animation: particleFloat ${Math.random() * 18 + 12}s infinite linear;
box-shadow: 0 0 ${Math.random() * 12 + 6}px rgba(0, 212, 255, 0.6);
`;
container.appendChild(particle);
}
}
const floatStyle = document.createElement('style');
floatStyle.textContent = `
@keyframes particleFloat {
0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
10%, 90% { opacity: 1; }
50% { transform: translateY(-250px) translateX(${Math.random() * 100 - 50}px); }
}
`;
document.head.appendChild(floatStyle);
document.addEventListener('DOMContentLoaded', () => {
initElectricCanvas();
createParticles();
loadKendalaData();
const stickyInput = document.getElementById('stickyInput');
if (stickyInput) {
stickyInput.addEventListener('paste', handleStickyPaste);
}
setTimeout(() => showToast('System Ready'), 1200);
});
document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') {
closeLightbox();
if (editingIndex >= 0) cancelEdit();
}
});
</script>

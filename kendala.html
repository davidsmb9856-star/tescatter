<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>⚡ KENDALA ALL - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-cyan: #00d4ff;
--neon-blue: #0099ff;
--neon-electric: #00ffff;
--neon-purple: #9d00ff;
--neon-pink: #ff00aa;
--neon-green: #00ff9d;
--neon-yellow: #ffe600;
--neon-red: #ff3e6c;
--bg-dark: #000810;
--bg-card: rgba(0, 20, 50, 0.75);
--bg-card-hover: rgba(0, 40, 100, 0.9);
--bg-panel: rgba(0, 12, 32, 0.95);
--bg-sticky: rgba(0, 8, 24, 0.98);
--bg-note: rgba(0, 25, 60, 0.9);
--text-main: #00f5ff;
--text-secondary: #66e5ff;
--text-dim: #33cccc;
--border-glow: rgba(0, 212, 255, 0.6);
--electric-glow: 0 0 10px #00d4ff, 0 0 25px #00d4ff, 0 0 50px #00d4ff;
--transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
--transition-normal: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
--transition-bloom: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Exo 2', sans-serif;
background: var(--bg-dark);
color: var(--text-main);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
}

/* ========== BACKGROUND EFFECTS ========== */
.cyber-bg {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background:
radial-gradient(ellipse at 20% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
radial-gradient(ellipse at 80% 20%, rgba(157, 0, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 50% 50%, rgba(0, 255, 255, 0.08) 0%, transparent 60%),
linear-gradient(180deg, #000810 0%, #001133 40%, #000518 100%);
z-index: -3;
animation: bgPulse 15s ease-in-out infinite;
}
@keyframes bgPulse {
0%, 100% { opacity: 1; filter: hue-rotate(0deg); }
50% { opacity: 0.95; filter: hue-rotate(15deg); }
}

.grid-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background-image:
linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
background-size: 50px 50px;
z-index: -2;
animation: gridFloat 40s linear infinite;
pointer-events: none;
}
@keyframes gridFloat {
0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
}

.particles {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
z-index: -1;
pointer-events: none;
}

.lightning-container {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 0;
opacity: 0.4;
}
.lightning-bolt {
position: absolute;
width: 3px;
height: 100vh;
background: linear-gradient(180deg, transparent, var(--neon-electric), var(--neon-cyan), transparent);
filter: blur(2px);
animation: lightningFlash 8s infinite;
box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-electric);
}
.lightning-bolt:nth-child(1) { left: 15%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 2s; }
.lightning-bolt:nth-child(3) { left: 85%; animation-delay: 4s; }
@keyframes lightningFlash {
0%, 89%, 91%, 93%, 100% { opacity: 0; transform: scaleY(0.8); }
90%, 92% { opacity: 1; transform: scaleY(1); }
}

.scan-line {
position: fixed;
top: 0; left: 0; width: 100%; height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-cyan), transparent);
opacity: 0.6;
animation: scanDown 10s linear infinite;
z-index: 1;
pointer-events: none;
box-shadow: 0 0 25px var(--neon-cyan), 0 0 50px var(--neon-electric);
}
@keyframes scanDown {
0% { top: -10%; opacity: 0; }
10% { opacity: 0.6; }
90% { opacity: 0.6; }
100% { top: 110%; opacity: 0; }
}

.noise-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
opacity: 0.03;
z-index: -1;
pointer-events: none;
}

.container {
max-width: 1200px;
margin: 0 auto;
padding: 20px 15px;
min-height: 100vh;
display: flex;
flex-direction: column;
position: relative;
z-index: 2;
}

/* ========== HEADER ========== */
.header {
text-align: center;
margin-bottom: 30px;
padding: 25px 15px;
position: relative;
}
.header::before {
content: '';
position: absolute;
bottom: 0; left: 50%;
transform: translateX(-50%);
width: 85%;
height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-electric), var(--neon-purple), var(--neon-cyan), transparent);
animation: glowLine 3s ease-in-out infinite;
box-shadow: 0 0 20px var(--neon-cyan);
}
@keyframes glowLine {
0%, 100% { opacity: 0.6; }
50% { opacity: 1; box-shadow: 0 0 30px var(--neon-electric), 0 0 60px var(--neon-cyan); }
}

.back-btn {
position: absolute;
left: 0; top: 50%;
transform: translateY(-50%);
background: rgba(0, 212, 255, 0.2);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 10px 18px;
border-radius: 12px;
text-decoration: none;
font-weight: 600;
font-size: 13px;
display: flex;
align-items: center;
gap: 8px;
transition: var(--transition-normal);
backdrop-filter: blur(10px);
box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
}
.back-btn:hover {
background: rgba(0, 212, 255, 0.35);
transform: translateY(-50%) translateX(-4px);
box-shadow: var(--electric-glow);
}

.title {
font-family: 'Orbitron', sans-serif;
font-size: 36px;
font-weight: 900;
background: linear-gradient(90deg, #00d4ff, #00ffff, #9d00ff, #00d4ff, #ff00aa, #00d4ff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-size: 400% 400%;
animation: neonFlow 4s ease infinite;
text-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
margin-bottom: 12px;
letter-spacing: 2px;
}
@keyframes neonFlow {
0%, 100% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
}

.subtitle {
font-size: 14px;
color: var(--text-secondary);
text-shadow: 0 0 12px rgba(0, 212, 255, 0.8);
letter-spacing: 3px;
text-transform: uppercase;
}

.status-badge {
display: inline-flex;
align-items: center;
gap: 10px;
background: rgba(0, 255, 157, 0.15);
border: 2px solid rgba(0, 255, 157, 0.6);
padding: 8px 18px;
border-radius: 25px;
font-size: 12px;
color: var(--neon-green);
margin-top: 15px;
box-shadow: 0 0 20px rgba(0, 255, 157, 0.5);
font-weight: 700;
text-transform: uppercase;
letter-spacing: 2px;
animation: badgeGlow 2.5s infinite;
}
@keyframes badgeGlow {
0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 157, 0.5); }
50% { box-shadow: 0 0 30px rgba(0, 255, 157, 0.9); }
}

.status-dot {
width: 10px; height: 10px;
background: var(--neon-green);
border-radius: 50%;
animation: pulse 2s infinite;
box-shadow: 0 0 15px var(--neon-green);
}
@keyframes pulse {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.4); opacity: 0.7; }
}

/* ========== SEARCH SECTION ========== */
.search-section {
margin: 25px 0 30px;
text-align: center;
}
.search-bar {
position: relative;
max-width: 550px;
margin: 0 auto 18px;
}
.search-bar input {
width: 100%;
padding: 14px 20px 14px 50px;
background: rgba(0, 20, 50, 0.85);
border: 2px solid rgba(0, 212, 255, 0.5);
border-radius: 14px;
color: var(--text-main);
font-size: 15px;
font-family: 'Exo 2', sans-serif;
font-weight: 600;
transition: var(--transition-normal);
backdrop-filter: blur(10px);
}
.search-bar input:focus {
outline: none;
border-color: var(--neon-electric);
box-shadow: var(--electric-glow);
}
.search-bar i {
position: absolute;
left: 18px; top: 50%;
transform: translateY(-50%);
color: var(--neon-cyan);
font-size: 18px;
}

.stats-bar {
display: flex;
justify-content: center;
gap: 25px;
flex-wrap: wrap;
padding: 15px 20px;
background: rgba(0, 20, 50, 0.7);
border-radius: 14px;
border: 2px solid rgba(0, 212, 255, 0.4);
max-width: 750px;
margin: 0 auto;
}
.stat-item {
text-align: center;
padding: 8px 20px;
background: rgba(0, 212, 255, 0.1);
border-radius: 10px;
border: 1px solid rgba(0, 212, 255, 0.3);
}
.stat-value {
font-family: 'Orbitron', sans-serif;
font-size: 26px;
font-weight: 700;
color: var(--neon-electric);
text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
display: block;
}
.stat-label {
font-size: 11px;
color: var(--text-secondary);
text-transform: uppercase;
letter-spacing: 1.5px;
margin-top: 4px;
}

/* ========== KENDALA CARDS ========== */
.kendala-list {
display: flex;
flex-direction: column;
gap: 20px;
}
.kendala-card {
background: var(--bg-card);
border: 2px solid var(--border-glow);
border-radius: 20px;
padding: 24px 28px;
transition: var(--transition-bloom);
position: relative;
overflow: hidden;
backdrop-filter: blur(20px);
animation: cardEnter 0.5s ease forwards;
opacity: 0;
transform: translateY(25px);
box-shadow: 0 5px 25px rgba(0, 212, 255, 0.15);
}
.kendala-card::before {
content: '';
position: absolute;
top: 0; left: 0;
width: 5px; height: 100%;
background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-electric), var(--neon-purple));
box-shadow: 0 0 20px var(--neon-cyan);
}
.kendala-card:hover {
background: var(--bg-card-hover);
transform: translateY(-6px);
border-color: var(--neon-electric);
box-shadow: 0 20px 50px rgba(0, 212, 255, 0.35);
}
.kendala-title {
font-family: 'Orbitron', sans-serif;
font-size: 17px;
font-weight: 700;
color: var(--neon-electric);
margin-bottom: 16px;
cursor: pointer;
display: flex;
justify-content: space-between;
align-items: center;
text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
padding-bottom: 14px;
border-bottom: 2px solid rgba(0, 212, 255, 0.3);
}
.kendala-title::after {
content: '▼';
font-size: 12px;
transition: transform 0.3s ease;
color: var(--neon-cyan);
}
.kendala-card.expanded .kendala-title::after {
transform: rotate(180deg);
}
.kendala-answers {
display: none;
margin-top: 18px;
padding-top: 18px;
border-top: 2px solid rgba(0, 212, 255, 0.3);
}
.kendala-card.expanded .kendala-answers {
display: block;
}
.answer-item {
margin-bottom: 16px;
padding: 16px 18px;
background: rgba(0, 15, 40, 0.7);
border-radius: 12px;
border-left: 4px solid var(--neon-cyan);
}
.answer-label {
font-weight: 700;
color: var(--neon-yellow);
margin-bottom: 10px;
font-size: 12px;
text-transform: uppercase;
letter-spacing: 1.5px;
display: flex;
align-items: center;
gap: 8px;
}
.answer-content {
color: var(--text-secondary);
line-height: 1.7;
white-space: pre-wrap;
word-break: break-word;
font-size: 13px;
}
.copy-btn, .sticky-btn {
background: rgba(0, 212, 255, 0.2);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 9px 18px;
border-radius: 10px;
cursor: pointer;
margin-top: 12px;
margin-right: 8px;
transition: var(--transition-normal);
font-weight: 600;
font-size: 12px;
display: inline-flex;
align-items: center;
gap: 6px;
}
.copy-btn:hover, .sticky-btn:hover {
background: rgba(0, 212, 255, 0.35);
box-shadow: var(--electric-glow);
}

/* ========== STICKY NOTES (UPDATED LOGIC) ========== */
.sticky-fab {
position: fixed;
bottom: 30px;
right: 30px;
width: 60px;
height: 60px;
background: radial-gradient(circle at 30% 30%, #00ffff, #0099ff, #9d00ff);
border: 3px solid rgba(255, 255, 255, 0.5);
border-radius: 50%;
color: #fff;
font-size: 24px;
cursor: pointer;
z-index: 1000;
display: flex;
align-items: center;
justify-content: center;
box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
transition: var(--transition-bloom);
animation: fabPulse 2.5s infinite alternate;
}
.sticky-fab:hover {
transform: scale(1.15) rotate(15deg);
box-shadow: 0 0 50px rgba(0, 255, 255, 1);
}
@keyframes fabPulse {
0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.8); }
50% { box-shadow: 0 0 40px rgba(0, 255, 255, 1); }
}

.sticky-panel {
position: fixed;
bottom: 100px;
right: 30px;
width: 400px;
max-width: 90vw;
max-height: 70vh;
background: linear-gradient(135deg, rgba(0, 20, 50, 0.95), rgba(0, 10, 30, 0.98));
border: 2px solid rgba(0, 212, 255, 0.7);
border-radius: 20px;
padding: 20px;
z-index: 999;
display: none;
flex-direction: column;
backdrop-filter: blur(25px);
box-shadow: 0 0 50px rgba(0, 212, 255, 0.4);
animation: panelSlide 0.4s ease;
}
.sticky-panel.active { display: flex; }
@keyframes panelSlide {
from { opacity: 0; transform: translateY(30px) scale(0.95); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

.sticky-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 18px;
padding-bottom: 14px;
border-bottom: 2px solid rgba(0, 212, 255, 0.4);
}
.sticky-title {
font-family: 'Orbitron', sans-serif;
font-size: 18px;
color: var(--neon-electric);
text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
}
.sticky-close {
background: none;
border: none;
color: var(--neon-red);
font-size: 28px;
cursor: pointer;
transition: var(--transition-fast);
}
.sticky-close:hover { transform: rotate(90deg) scale(1.2); }

.sticky-input {
width: 100%;
min-height: 80px;
background: rgba(0, 15, 40, 0.6);
border: 2px solid rgba(0, 212, 255, 0.4);
border-radius: 12px;
padding: 14px;
color: var(--text-main);
font-size: 14px;
font-family: 'Exo 2', monospace;
resize: vertical;
transition: var(--transition-fast);
}
.sticky-input:focus {
outline: none;
border-color: var(--neon-electric);
box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
}

.sticky-photo-preview {
margin-top: 14px;
padding: 14px;
background: rgba(0, 255, 255, 0.1);
border: 2px dashed var(--neon-cyan);
border-radius: 12px;
display: none;
position: relative;
}
.sticky-photo-preview.show { display: block; }
.sticky-photo-preview img {
max-width: 100%;
max-height: 160px;
border-radius: 10px;
border: 2px solid var(--neon-cyan);
display: block;
}
.sticky-remove-photo {
position: absolute;
top: 10px;
right: 10px;
background: var(--neon-red);
color: #fff;
border: none;
width: 28px;
height: 28px;
border-radius: 50%;
cursor: pointer;
font-size: 14px;
display: flex;
align-items: center;
justify-content: center;
transition: var(--transition-fast);
}
.sticky-remove-photo:hover { transform: scale(1.15); }

.sticky-btn-group {
display: flex;
gap: 10px;
margin-top: 12px;
}
.sticky-add-btn {
background: linear-gradient(145deg, rgba(0, 212, 255, 0.3), rgba(0, 150, 255, 0.3));
color: var(--neon-cyan);
border: 2px solid var(--neon-cyan);
padding: 12px 22px;
border-radius: 12px;
cursor: pointer;
font-weight: 700;
font-size: 13px;
transition: var(--transition-normal);
display: inline-flex;
align-items: center;
gap: 8px;
width: 100%;
justify-content: center;
}
.sticky-add-btn:hover {
background: rgba(0, 212, 255, 0.4);
box-shadow: var(--electric-glow);
}

.sticky-list {
flex: 1;
overflow-y: auto;
margin-top: 15px;
padding-right: 5px;
}
.sticky-list::-webkit-scrollbar { width: 6px; }
.sticky-list::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 3px; }

/* Sticky Card Style for New Logic */
.sticky-card {
background: linear-gradient(135deg, rgba(0, 40, 80, 0.6), rgba(0, 20, 50, 0.8));
border: 1px solid rgba(0, 212, 255, 0.5);
border-radius: 12px;
padding: 14px;
margin-bottom: 12px;
cursor: pointer;
position: relative;
transition: var(--transition-fast);
box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
}
.sticky-card:hover {
border-color: var(--neon-electric);
box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
transform: translateX(5px);
}
.sticky-card.dragging { opacity: 0.5; border-style: dashed; }

.sticky-card p {
color: var(--text-secondary);
font-size: 13px;
line-height: 1.6;
margin: 0;
word-break: break-word;
}
.sticky-card img {
max-width: 100%;
max-height: 130px;
border-radius: 8px;
border: 2px solid var(--neon-cyan);
margin-top: 10px;
box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
}

.sticky-delete, .sticky-edit {
position: absolute;
top: 8px;
cursor: pointer;
font-size: 14px;
opacity: 0.7;
transition: var(--transition-fast);
}
.sticky-delete { right: 10px; color: var(--neon-red); }
.sticky-edit { right: 35px; color: var(--neon-yellow); }
.sticky-delete:hover, .sticky-edit:hover { opacity: 1; transform: scale(1.2); }

/* ========== LIGHTBOX ========== */
.lightbox {
display: none;
position: fixed;
top: 0; left: 0;
width: 100vw; height: 100vh;
background: rgba(0, 5, 20, 0.98);
z-index: 9999;
flex-direction: column;
justify-content: center;
align-items: center;
backdrop-filter: blur(20px);
}
.lightbox.active { display: flex; }
.lightbox-close {
position: absolute;
top: 25px; right: 30px;
font-size: 36px;
color: var(--neon-cyan);
cursor: pointer;
transition: var(--transition-normal);
z-index: 10000;
}
.lightbox-close:hover { color: var(--neon-red); transform: rotate(90deg); }
.lightbox-img {
max-width: 90%;
max-height: 75vh;
border-radius: 16px;
border: 4px solid var(--neon-cyan);
box-shadow: 0 0 50px rgba(0, 212, 255, 0.7);
}
.lightbox-controls {
display: flex;
gap: 15px;
margin-top: 25px;
}
.lightbox-btn {
background: rgba(0, 212, 255, 0.2);
border: 2.5px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 12px 28px;
border-radius: 14px;
cursor: pointer;
font-weight: 600;
transition: var(--transition-normal);
}
.lightbox-btn:hover { background: rgba(0, 212, 255, 0.35); box-shadow: var(--electric-glow); }

/* ========== TOAST ========== */
.toast {
position: fixed;
bottom: 35px;
right: 35px;
background: rgba(0, 12, 32, 0.98);
border: 2.5px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 16px 28px;
border-radius: 14px;
font-weight: 600;
z-index: 10000;
display: flex;
align-items: center;
gap: 12px;
box-shadow: 0 0 35px rgba(0, 212, 255, 0.6);
transform: translateX(200px);
opacity: 0;
transition: var(--transition-normal);
}
.toast.show { transform: translateX(0); opacity: 1; }
.toast i { font-size: 20px; }

/* ========== UTILS ========== */
.loading, .no-data, .error-msg { text-align: center; padding: 60px 25px; }
.loading-spinner {
width: 50px; height: 50px;
border: 4px solid rgba(0, 212, 255, 0.2);
border-top-color: var(--neon-electric);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 18px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
.title { font-size: 28px; }
.sticky-panel { width: 95vw; right: 2.5vw; bottom: 90px; }
.sticky-fab { bottom: 18px; right: 18px; width: 50px; height: 50px; }
}
</style>
</head>
<body>
<div class="cyber-bg"></div>
<div class="grid-overlay"></div>
<div class="lightning-container">
<div class="lightning-bolt"></div>
<div class="lightning-bolt"></div>
<div class="lightning-bolt"></div>
</div>
<div class="particles" id="particles"></div>
<div class="scan-line"></div>
<div class="noise-overlay"></div>

<div class="container">
<header class="header">
<a href="index.html" class="back-btn">
<i class="fas fa-arrow-left"></i> Kembali
</a>
<h1 class="title">⚡ KENDALA ALL</h1>
<p class="subtitle">Database Solusi & Bantuan Pengguna 2026</p>
<div class="status-badge">
<span class="status-dot"></span>
<span>SYSTEM ONLINE</span>
</div>
</header>

<div class="search-section">
<div class="search-bar">
<i class="fas fa-search"></i>
<input type="text" id="searchInput" placeholder="🔍 Cari kendala..." oninput="searchKendala()">
</div>
<div class="stats-bar">
<div class="stat-item">
<span class="stat-value" id="totalItems">0</span>
<span class="stat-label">Total Data</span>
</div>
<div class="stat-item">
<span class="stat-value" id="withPhotos">0</span>
<span class="stat-label">Dengan Foto</span>
</div>
<div class="stat-item">
<span class="stat-value" id="withLinks">0</span>
<span class="stat-label">Dengan Link</span>
</div>
</div>
</div>

<div id="kendalaContainer">
<div class="loading">
<div class="loading-spinner"></div>
<p>⏳ Menghubungi database...</p>
</div>
</div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
<span class="lightbox-close" onclick="closeLightbox()">&times;</span>
<img class="lightbox-img" id="lightboxImg" src="" alt="Preview">
<div class="lightbox-controls">
<button class="lightbox-btn" onclick="changeLightbox(-1)"><i class="fas fa-chevron-left"></i> Prev</button>
<button class="lightbox-btn" onclick="copyLightboxPhoto()"><i class="fas fa-copy"></i> Copy</button>
<button class="lightbox-btn" onclick="changeLightbox(1)">Next <i class="fas fa-chevron-right"></i></button>
</div>
</div>

<!-- STICKY NOTES -->
<div class="sticky-fab" onclick="toggleStickyPanel()" title="Buka Sticky Notes">
<i class="fas fa-sticky-note"></i>
</div>

<div class="sticky-panel" id="stickyPanel">
<div class="sticky-header">
<span class="sticky-title">📝 Sticky Notes</span>
<button class="sticky-close" onclick="toggleStickyPanel()">&times;</button>
</div>
<textarea class="sticky-input" id="stickyInput" placeholder="✏️ Tulis catatan... (Ctrl+V untuk foto)" oninput="autoResize(this)"></textarea>
<div class="sticky-photo-preview" id="stickyPhotoPreview">
<img id="stickyPreviewImg" src="" alt="Preview">
<button class="sticky-remove-photo" onclick="removePhoto()"><i class="fas fa-times"></i></button>
</div>
<div class="sticky-btn-group">
<button class="sticky-add-btn" onclick="addSticky()">➕ Tambah Sticky</button>
</div>
<div class="sticky-list" id="stickyList"></div>
</div>

<div id="toast" class="toast">
<i class="fas fa-check-circle"></i>
<span id="toastMessage">Notifikasi</span>
</div>

<script>
// ================= VARIABLES =================
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;
let allKendala = [];
let filteredKendala = [];
let lightboxImages = [];
let lightboxIndex = 0;
let editIndex = null; // Used by new sticky logic

// ================= CORE DATA LOADING =================
async function loadKendalaData() {
try {
const response = await fetch(DATA_URL);
const text = await response.text();
const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
if (!jsonMatch) throw new Error('Gagal parse');
const data = JSON.parse(jsonMatch[1]);
const rows = data.table?.rows || [];
allKendala = rows.map(row => {
const cells = row.c || [];
return {
judul: cells[0]?.v?.toString().trim() || '',
jawaban1: cells[1]?.v?.toString().trim() || '',
jawaban2: cells[2]?.v?.toString().trim() || '',
jawaban3: cells[3]?.v?.toString().trim() || ''
};
}).filter(item => item.judul && item.judul !== '');
filteredKendala = [...allKendala];
renderKendala();
updateStats();
} catch (error) {
document.getElementById('kendalaContainer').innerHTML = `
<div class="error-msg">
<i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 15px;"></i>
<p><strong>⚠️ Gagal memuat data</strong></p>
<p style="font-size: 12px; margin-top: 10px;">Pastikan Google Sheet sudah dipublikasikan</p>
</div>`;
}
}

function renderKendala(data = filteredKendala) {
const container = document.getElementById('kendalaContainer');
if (data.length === 0) {
container.innerHTML = '<div class="no-data"><p>Tidak ada data</p></div>';
return;
}
container.innerHTML = `<div class="kendala-list">${data.map((item, index) => createKendalaCard(item, index)).join('')}</div>`;
document.querySelectorAll('.kendala-title').forEach(title => {
title.addEventListener('click', function() { this.parentElement.classList.toggle('expanded'); });
});
}

function createKendalaCard(item, index) {
const titlePhoto = extractTitlePhoto(item.judul);
const cleanJudul = titlePhoto ? item.judul.replace(titlePhoto.url, '').trim() : item.judul;
const links1 = extractLinks(item.jawaban1);
const links2 = extractLinks(item.jawaban2);
const links3 = extractLinks(item.jawaban3);

return `
<div class="kendala-card" data-index="${index}">
<h3 class="kendala-title">${escapeHtml(cleanJudul)}</h3>
 ${titlePhoto ? createTitlePhotoSection(titlePhoto.url) : ''}
<div class="kendala-answers">
 ${item.jawaban1 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 1</div>
<div class="answer-content">${formatContent(item.jawaban1, links1)}</div>
 ${links1.length > 0 ? createLinkButtons(links1) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 1)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 1)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
 ${item.jawaban2 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 2</div>
<div class="answer-content">${formatContent(item.jawaban2, links2)}</div>
 ${links2.length > 0 ? createLinkButtons(links2) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 2)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 2)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
 ${item.jawaban3 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 3</div>
<div class="answer-content">${formatContent(item.jawaban3, links3)}</div>
 ${links3.length > 0 ? createLinkButtons(links3) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 3)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 3)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
</div>
</div>`;
}

// ================= HELPER FUNCTIONS =================
function extractTitlePhoto(judul) {
if (!judul) return null;
const match = judul.match(/(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i);
return match ? { url: match[1] } : null;
}
function createTitlePhotoSection(url) {
if (!lightboxImages.includes(url)) lightboxImages.push(url);
return `<div style="margin:16px 0;text-align:center;"><img src="${url}" alt="Foto" style="max-width:100%;max-height:320px;border-radius:12px;border:3px solid var(--neon-cyan);cursor:pointer;" onclick="openLightbox('${url}')"></div>`;
}
function extractLinks(text) { return text ? text.match(/https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi) || [] : []; }
function formatContent(text, links = []) {
if (!text) return '';
let formatted = escapeHtml(text);
links.forEach(link => {
const displayText = link.length > 45 ? link.substring(0, 42) + '...' : link;
formatted = formatted.replace(new RegExp(escapeRegExp(link), 'g'), `<a href="${link}" target="_blank">${displayText}</a>`);
});
return formatted;
}
function createLinkButtons(links) {
return `<div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;">
 ${links.map((l, i) => `<a href="${l}" target="_blank" class="lightbox-btn" style="padding:8px 16px;font-size:11px;"><i class="fas fa-external-link-alt"></i> Link ${i+1}</a>`).join('')}
</div>`;
}
function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// ================= ACTIONS =================
async function copyAnswer(index, num) {
const item = filteredKendala[index];
const text = item[`jawaban${num}`];
if (!text) return;
await navigator.clipboard.writeText(text);
showToast('✅ Disalin!');
}
async function copyPhoto(url) {
try {
const r = await fetch(url);
const b = await r.blob();
await navigator.clipboard.write([new ClipboardItem({ [b.type]: b })]);
showToast('✅ Foto disalin!');
} catch { await navigator.clipboard.writeText(url); showToast('📋 URL disalin!'); }
}

function addToSticky(index, num) {
const item = filteredKendala[index];
const text = item[`jawaban${num}`];
if (!text) return;
const match = text.match(/(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i);
const imageUrl = match ? match[1] : null;
const stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
stickies.push({ text: imageUrl ? text.replace(match[0], '').trim() : text, image: imageUrl });
localStorage.setItem("stickies", JSON.stringify(stickies));
loadStickyNotes();
showToast('✅ Ditambahkan ke Sticky!');
}

// ================= SEARCH & STATS =================
function searchKendala() {
const q = document.getElementById('searchInput').value.toLowerCase();
filteredKendala = allKendala.filter(i => i.judul.toLowerCase().includes(q) || (i.jawaban1 && i.jawaban1.toLowerCase().includes(q)));
renderKendala();
updateStats();
}
function updateStats() {
document.getElementById('totalItems').textContent = filteredKendala.length;
}

// ================= LIGHTBOX =================
function openLightbox(url) {
lightboxIndex = lightboxImages.indexOf(url);
if (lightboxIndex === -1) { lightboxImages.push(url); lightboxIndex = lightboxImages.length - 1; }
document.getElementById('lightboxImg').src = url;
document.getElementById('lightbox').classList.add('active');
}
function closeLightbox(e) { if (!e || e.target.id === 'lightbox') document.getElementById('lightbox').classList.remove('active'); }
function changeLightbox(d) {
lightboxIndex = (lightboxIndex + d + lightboxImages.length) % lightboxImages.length;
document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
}
function copyLightboxPhoto() { copyPhoto(document.getElementById('lightboxImg').src); }

// ================= STICKY NOTES LOGIC (UPDATED) =================
function toggleStickyPanel() {
const panel = document.getElementById("stickyPanel");
panel.style.display = panel.style.display === "block" ? "none" : "block";
loadStickyNotes();
}

function autoResize(el) {
el.style.height = "auto";
el.style.height = el.scrollHeight + "px";
}

async function addSticky() {
const input = document.getElementById("stickyInput");
const text = input.value.trim();
const image = input.dataset.image || null;
if (!text && !image) return;

let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
if (editIndex !== null) {
stickies[editIndex] = { text, image };
editIndex = null;
document.querySelector(".sticky-add-btn").textContent = "➕ Tambah Sticky";
} else {
stickies.push({ text, image });
}
localStorage.setItem("stickies", JSON.stringify(stickies));

input.value = "";
input.dataset.image = "";
autoResize(input);
removePhoto(); // Clear preview
loadStickyNotes();
}

function loadStickyNotes() {
const list = document.getElementById("stickyList");
if (!list) return;
list.innerHTML = "";
const stickies = JSON.parse(localStorage.getItem("stickies") || "[]");

stickies.forEach((note, i) => {
const div = document.createElement("div");
div.className = "sticky-card";
div.dataset.index = i;

if (note.text) {
const p = document.createElement("p");
p.textContent = note.text;
div.appendChild(p);
}
if (note.image) {
const img = document.createElement("img");
img.src = note.image;
div.appendChild(img);
}

// Click to copy all
div.onclick = async() => {
try {
const items = {};
if (note.text) items["text/plain"] = new Blob([note.text], { type: "text/plain" });
if (note.image) {
const resp = await fetch(note.image);
const blob = await resp.blob();
items[blob.type] = blob;
}
await navigator.clipboard.write([new ClipboardItem(items)]);
showToast("✅ Teks + Gambar disalin!");
} catch {
showToast("⚠ Gagal menyalin");
}
};

// Delete Button
const del = document.createElement("span");
del.textContent = "✖";
del.className = "sticky-delete";
del.onclick = e => { e.stopPropagation(); deleteSticky(i); };

// Edit Button
const edit = document.createElement("span");
edit.textContent = "✏️";
edit.className = "sticky-edit";
edit.onclick = e => { e.stopPropagation(); editSticky(i); };

div.appendChild(del);
div.appendChild(edit);

// Drag and Drop
div.setAttribute("draggable", true);
div.ondragstart = e => { e.dataTransfer.setData("text/plain", i); div.classList.add('dragging'); };
div.ondragover = e => { e.preventDefault(); div.style.border = "2px dashed #00ffff"; };
div.ondragleave = () => div.style.border = "1px solid rgba(0, 212, 255, 0.5)";
div.ondragend = () => div.classList.remove('dragging');
div.ondrop = e => {
e.preventDefault();
div.style.border = "1px solid rgba(0, 212, 255, 0.5)";
reorderSticky(e.dataTransfer.getData("text/plain"), i);
};

list.appendChild(div);
});
}

function reorderSticky(from, to) {
let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
const moved = stickies.splice(from, 1)[0];
stickies.splice(to, 0, moved);
localStorage.setItem("stickies", JSON.stringify(stickies));
loadStickyNotes();
}

function deleteSticky(i) {
let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
stickies.splice(i, 1);
localStorage.setItem("stickies", JSON.stringify(stickies));
loadStickyNotes();
}

function editSticky(i) {
const stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
const input = document.getElementById("stickyInput");
input.value = stickies[i].text || "";
input.dataset.image = stickies[i].image || "";
autoResize(input);

// Show preview if image exists
if (stickies[i].image) {
document.getElementById('stickyPreviewImg').src = stickies[i].image;
document.getElementById('stickyPhotoPreview').classList.add('show');
} else {
removePhoto();
}

editIndex = i;
document.querySelector(".sticky-add-btn").textContent = "Simpan Perubahan";
}

// Helper for Sticky Photo Preview & Data
function handleStickyPaste(event) {
const items = event.clipboardData.items;
for (let i = 0; i < items.length; i++) {
if (items[i].type.startsWith('image/')) {
event.preventDefault();
const blob = items[i].getAsFile();
const reader = new FileReader();
reader.onload = function(e) {
const input = document.getElementById("stickyInput");
input.dataset.image = e.target.result;
document.getElementById('stickyPreviewImg').src = e.target.result;
document.getElementById('stickyPhotoPreview').classList.add('show');
showToast('📸 Foto ditempel!');
};
reader.readAsDataURL(blob);
break;
}
}
}

function removePhoto() {
const input = document.getElementById("stickyInput");
if(input) input.dataset.image = "";
const preview = document.getElementById('stickyPhotoPreview');
if(preview) preview.classList.remove('show');
}

// ================= SYSTEM =================
function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
for (let i = 0; i < 40; i++) {
const p = document.createElement('div');
p.style.cssText = `
position: absolute;
width: ${Math.random() * 3 + 1}px;
height: ${Math.random() * 3 + 1}px;
background: rgba(0, 212, 255, ${Math.random() * 0.6 + 0.2});
border-radius: 50%;
left: ${Math.random() * 100}%;
top: ${Math.random() * 100}%;
animation: float ${Math.random() * 15 + 10}s infinite linear;
box-shadow: 0 0 6px rgba(0, 212, 255, 0.6);
`;
container.appendChild(p);
}
}
const floatStyle = document.createElement('style');
floatStyle.textContent = `@keyframes float { 0%, 100% { transform: translateY(0); opacity: 0; } 10%, 90% { opacity: 1; } 50% { transform: translateY(-180px); } }`;
document.head.appendChild(floatStyle);

document.addEventListener('DOMContentLoaded', () => {
createParticles();
loadKendalaData();
const si = document.getElementById('stickyInput');
if (si) si.addEventListener('paste', handleStickyPaste);
});

document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') {
closeLightbox();
if (editIndex !== null) { // Cancel edit
editIndex = null;
const input = document.getElementById("stickyInput");
input.value = "";
input.dataset.image = "";
removePhoto();
document.querySelector(".sticky-add-btn").textContent = "➕ Tambah Sticky";
}
}
});
</script>
</body>
</html>

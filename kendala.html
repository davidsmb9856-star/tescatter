<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>🔷 KENDALA ALL - LINE TOGEL</title>

<!-- ✅ Google Fonts - SAMA PERSIS dengan LINE TOGEL -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* ===== CSS VARIABLES - SAMA PERSIS DENGAN LINE TOGEL ===== */
:root {
  --bg-dark: #020810;
  --bg-card: #061420;
  --bg-input: #0a1e30;
  --neon-blue: #00d4ff;
  --neon-cyan: #00fff7;
  --neon-glow: rgba(0, 212, 255, 0.4);
  --accent-green: #00ff88;
  --accent-red: #ff4757;
  --accent-orange: #ff9f43;
  --border-color: rgba(0, 212, 255, 0.3);
  --text-primary: #e0f4ff;
  --text-muted: #6b8fa8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
}

/* ========== BACKGROUND EFFECTS - SAMA DENGAN LINE TOGEL ========== */
.bg-animated {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
  radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
  radial-gradient(ellipse at 50% 50%, rgba(0, 180, 255, 0.03) 0%, transparent 70%),
  var(--bg-dark);
}

.bg-grid {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(50px, 50px); }
}

.particle {
  position: fixed; width: 4px; height: 4px; background: var(--neon-blue);
  border-radius: 50%; pointer-events: none; z-index: -1;
  box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
  animation: floatParticle 15s infinite linear; opacity: 0.6;
}

@keyframes floatParticle {
  0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; } 90% { opacity: 0.6; }
  100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

.scan-line {
  position: fixed; top: 0; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), transparent);
  opacity: 0.4;
  animation: scanDown 12s linear infinite;
  z-index: 1; pointer-events: none;
  box-shadow: 0 0 15px var(--neon-blue);
}

@keyframes scanDown {
  0% { top: -10%; opacity: 0; }
  10% { opacity: 0.4; }
  90% { opacity: 0.4; }
  100% { top: 110%; opacity: 0; }
}

/* ========== CONTAINER & LAYOUT ========== */
.container {
  max-width: 1180px;
  margin: 0 auto;
  padding: 20px 15px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 2;
}

/* ========== HEADER - SERAGAM DENGAN LINE TOGEL ========== */
.header {
  text-align: center;
  margin-bottom: 28px;
  padding: 22px 15px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-blue), transparent);
  animation: glowLine 3.5s ease-in-out infinite;
  box-shadow: 0 0 15px var(--neon-blue);
}

@keyframes glowLine {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; box-shadow: 0 0 25px var(--neon-cyan), 0 0 45px var(--neon-blue); }
}

.back-btn {
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  padding: 9px 16px;
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 0.5px;
}

.back-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-50%) translateX(-3px);
  box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}

/* Typography seragam */
.judul-glow {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 900;
  text-align: center;
  color: var(--neon-cyan);
  letter-spacing: 3px;
  margin-bottom: 10px;
  text-shadow: 0 0 30px rgba(0, 255, 247, 0.3);
}

.bonus-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  font-weight: 700;
  text-align: center;
  color: var(--neon-blue);
  letter-spacing: 2px;
  margin-bottom: 20px;
}

.subtitle {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 15px;
  font-weight: 500;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(0, 212, 255, 0.1);
  border: 1px solid var(--border-color);
  padding: 7px 16px;
  border-radius: 10px;
  font-size: 12px;
  color: var(--neon-blue);
  margin-top: 13px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
}

.status-dot {
  width: 9px; height: 9px;
  background: var(--neon-blue);
  border-radius: 50%;
  animation: pulse 2.2s infinite;
  box-shadow: 0 0 12px var(--neon-blue);
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.35); opacity: 0.75; }
}

/* ========== SEARCH SECTION - SERAGAM ========== */
.search-section {
  margin: 22px 0 28px;
  text-align: center;
}

.search-bar {
  position: relative;
  max-width: 520px;
  margin: 0 auto 16px;
}

.search-bar .bonus-input {
  width: 100%;
  padding: 13px 18px 13px 48px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  transition: all 0.3s ease;
}

.search-bar .bonus-input::placeholder {
  color: var(--text-muted);
}

.search-bar .bonus-input:focus {
  outline: none;
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}

.search-bar i {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  color: var(--neon-blue);
  font-size: 17px;
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 22px;
  flex-wrap: wrap;
  padding: 13px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  max-width: 720px;
  margin: 0 auto;
}

.stat-item {
  text-align: center;
  padding: 7px 18px;
  background: rgba(0, 212, 255, 0.08);
  border-radius: 10px;
  border: 1px solid var(--border-color);
}

.stat-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--accent-green);
  display: block;
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 3px;
}

/* ========== KENDALA CARDS - SERAGAM DENGAN bonus-section ========== */
.kendala-list {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.kendala-card {
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.8) 100%);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  padding: 25px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
  animation: fadeInUp 0.5s ease-out;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 212, 255, 0.1);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.kendala-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: linear-gradient(to bottom, var(--neon-blue), var(--neon-cyan));
  transition: width 0.3s ease;
}

.kendala-card:hover {
  border-color: var(--neon-blue);
  transform: translateY(-2px);
  box-shadow: 0 15px 50px rgba(0, 212, 255, 0.3), inset 0 1px 0 rgba(0, 212, 255, 0.2);
}

.kendala-card:hover::before {
  width: 6px;
  box-shadow: 0 0 20px var(--neon-blue);
}

.kendala-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--neon-cyan);
  margin-bottom: 14px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-color);
  transition: color 0.3s ease;
  letter-spacing: 1px;
}

.kendala-title:hover {
  color: var(--neon-blue);
}

.kendala-title::after {
  content: '▼';
  font-size: 12px;
  transition: transform 0.28s ease;
  color: var(--neon-blue);
}

.kendala-card.expanded .kendala-title::after {
  transform: rotate(180deg);
}

/* ========== PHOTO & ANSWER SECTIONS - SERAGAM ========== */
.title-photo-section {
  display: none;
  margin: 14px 0;
  padding: 14px;
  background: rgba(0, 212, 255, 0.05);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  text-align: center;
}

.kendala-card.expanded .title-photo-section {
  display: block;
}

.title-photo-img {
  max-width: 100%;
  max-height: 300px;
  border-radius: 12px;
  border: 2px solid var(--border-color);
  cursor: pointer;
  transition: all 0.3s ease;
}

.title-photo-img:hover {
  border-color: var(--neon-blue);
  box-shadow: 0 0 25px rgba(0, 212, 255, 0.3);
}

.title-photo-actions {
  margin-top: 12px;
  display: flex;
  gap: 9px;
  justify-content: center;
  flex-wrap: wrap;
}

.copy-title-photo-btn, .view-title-photo-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 18px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  cursor: pointer;
  transition: all 0.3s ease;
}

.copy-title-photo-btn:hover, .view-title-photo-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}

.kendala-answers {
  display: none;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border-color);
}

.kendala-card.expanded .kendala-answers {
  display: block;
}

.answer-item {
  margin-bottom: 14px;
  padding: 14px 16px;
  background: rgba(0, 212, 255, 0.05);
  border-radius: 12px;
  border-left: 3px solid var(--neon-blue);
  transition: all 0.3s ease;
}

.answer-item:hover {
  background: rgba(0, 212, 255, 0.1);
  border-left-color: var(--neon-cyan);
}

.answer-label {
  font-weight: 700;
  color: var(--neon-blue);
  margin-bottom: 9px;
  font-size: 13px;
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 0.5px;
}

.answer-content {
  color: var(--text-primary);
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 14px;
}

.answer-content a {
  color: var(--neon-cyan);
  text-decoration: none;
  font-weight: 600;
  transition: color 0.3s ease;
}

.answer-content a:hover {
  color: var(--neon-blue);
  text-decoration: underline;
}

.photo-container {
  margin: 14px 0;
  text-align: center;
  padding: 12px;
  background: var(--bg-input);
  border-radius: 12px;
  border: 1px dashed var(--border-color);
}

.photo-img {
  max-width: 100%;
  max-height: 280px;
  border-radius: 12px;
  border: 2px solid var(--border-color);
  cursor: pointer;
  transition: all 0.3s ease;
}

.photo-img:hover {
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
}

.link-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  margin-top: 12px;
}

.open-link-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  padding: 8px 14px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.open-link-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-2px);
}

/* ========== BUTTONS - SERAGAM DENGAN bonus-btn ========== */
.copy-btn, .sticky-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
  border: none;
  border-radius: 10px;
  color: var(--bg-dark);
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
  margin-top: 11px;
  margin-right: 7px;
}

.copy-btn:hover, .sticky-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
}

.copy-btn.copied, .sticky-btn.added {
  background: var(--accent-green);
  color: var(--bg-dark);
}

.copy-btn.danger, .sticky-btn.danger {
  background: linear-gradient(135deg, var(--accent-red) 0%, #cc3344 100%);
}

.copy-btn.danger:hover {
  box-shadow: 0 8px 25px rgba(255, 71, 87, 0.4);
}

/* ========== STICKY NOTES - ADAPTASI SERAGAM ========== */
.sticky-fab {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
  border: none;
  border-radius: 50%;
  color: var(--bg-dark);
  font-size: 22px;
  cursor: pointer;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
  transition: all 0.3s ease;
  font-family: 'Rajdhani', sans-serif;
}

.sticky-fab:hover {
  transform: scale(1.1) rotate(10deg);
  box-shadow: 0 0 35px rgba(0, 212, 255, 0.6);
}

.sticky-panel {
  position: fixed;
  bottom: 95px;
  right: 28px;
  width: 370px;
  max-width: 92vw;
  height: 68vh;
  max-height: 580px;
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.95) 100%);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  padding: 0;
  z-index: 999;
  display: none;
  flex-direction: column;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 212, 255, 0.1);
  animation: fadeInUp 0.4s ease-out;
}

.sticky-panel.active {
  display: flex;
}

.sticky-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.sticky-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  color: var(--neon-cyan);
  font-weight: 700;
  letter-spacing: 1px;
}

.sticky-close {
  background: none;
  border: none;
  color: var(--neon-blue);
  font-size: 26px;
  cursor: pointer;
  transition: all 0.3s ease;
  line-height: 1;
}

.sticky-close:hover {
  color: var(--neon-cyan);
  transform: rotate(90deg);
}

.sticky-input-area {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.sticky-input {
  width: 100%;
  min-height: 58px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 13px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  resize: vertical;
  transition: all 0.3s ease;
}

.sticky-input:focus {
  outline: none;
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}

.sticky-input::placeholder {
  color: var(--text-muted);
}

.sticky-photo-preview {
  margin-top: 12px;
  padding: 12px;
  background: rgba(0, 212, 255, 0.05);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  display: none;
}

.sticky-photo-preview.show {
  display: block;
}

.sticky-photo-preview img {
  max-width: 100%;
  max-height: 150px;
  border-radius: 12px;
  border: 2px solid var(--border-color);
}

.sticky-remove-photo {
  background: var(--accent-red);
  color: white;
  border: none;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  float: right;
  margin-top: -35px;
  margin-right: 5px;
}

.sticky-btn-group {
  display: flex;
  gap: 9px;
  margin-top: 11px;
  flex-wrap: wrap;
}

.sticky-add-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
  border: none;
  border-radius: 10px;
  color: var(--bg-dark);
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 7px;
}

.sticky-add-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
}

.sticky-upload-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 18px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  cursor: pointer;
  transition: all 0.3s ease;
}

.sticky-upload-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
}

#fileInput { display: none; }

.sticky-list {
  flex: 1;
  overflow-y: auto;
  padding: 18px 20px;
}

.sticky-card {
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 13px;
  margin-bottom: 11px;
  cursor: grab;
  transition: all 0.3s ease;
  position: relative;
}

.sticky-card:hover {
  border-color: var(--neon-blue);
  box-shadow: 0 5px 20px rgba(0, 212, 255, 0.2);
}

.sticky-card p {
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.55;
  white-space: pre-wrap;
  margin-bottom: 7px;
}

.sticky-card img {
  max-width: 100%;
  max-height: 140px;
  border-radius: 12px;
  border: 2px solid var(--border-color);
  margin-top: 7px;
  cursor: pointer;
}

.sticky-card img:hover {
  border-color: var(--neon-blue);
}

.sticky-delete, .sticky-edit {
  position: absolute;
  top: 7px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 50%;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  cursor: pointer;
  color: var(--neon-blue);
  transition: all 0.3s ease;
}

.sticky-delete { right: 7px; }
.sticky-edit { right: 36px; }

.sticky-delete:hover {
  background: var(--accent-red);
  color: white;
  border-color: var(--accent-red);
}

.sticky-edit:hover {
  background: var(--accent-orange);
  color: var(--bg-dark);
  border-color: var(--accent-orange);
}

/* ========== LIGHTBOX - SERAGAM ========== */
.lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(2, 8, 16, 0.98);
  z-index: 10000;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  backdrop-filter: blur(10px);
}

.lightbox.active { display: flex; }

.lightbox-close {
  position: absolute;
  top: 15px; right: 25px;
  font-size: 40px;
  color: var(--neon-blue);
  background: none;
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
  line-height: 1;
}

.lightbox-close:hover {
  color: var(--neon-cyan);
  transform: rotate(90deg);
}

.lightbox-img {
  max-width: 90%;
  max-height: 80vh;
  border-radius: 12px;
  border: 2px solid var(--neon-blue);
  box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
  cursor: grab;
}

.lightbox-controls {
  display: flex;
  gap: 13px;
  margin-top: 22px;
  flex-wrap: wrap;
  justify-content: center;
}

.lightbox-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 180, 255, 0.05) 100%);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  color: var(--neon-blue);
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 7px;
}

.lightbox-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 180, 255, 0.15) 100%);
  border-color: var(--neon-blue);
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
}

.zoom-slider {
  width: 220px;
  margin-top: 18px;
}

.zoom-slider input {
  width: 100%;
  accent-color: var(--neon-blue);
}

/* ========== TOAST - SERAGAM ========== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.95) 100%);
  border: 1px solid var(--neon-blue);
  border-radius: 12px;
  padding: 15px 30px;
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  z-index: 99999;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ========== LOADING & STATES ========== */
.loading, .no-data, .error-msg {
  text-align: center;
  padding: 55px 22px;
}

.loading { color: var(--neon-blue); }

.loading-spinner {
  width: 46px;
  height: 46px;
  border: 4px solid rgba(0, 212, 255, 0.2);
  border-top-color: var(--neon-blue);
  border-radius: 50%;
  animation: spin 0.95s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.error-msg {
  color: var(--text-primary);
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-color);
  padding: 35px;
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb {
  background: var(--neon-blue);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--neon-cyan);
}

::selection {
  background: rgba(0, 212, 255, 0.3);
  color: var(--text-primary);
}

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .container { padding: 14px 11px; }
  .judul-glow { font-size: clamp(1.3rem, 5vw, 1.8rem); }
  .bonus-title { font-size: clamp(1rem, 4vw, 1.4rem); }
  .sticky-panel {
    width: 96vw;
    right: 2vw;
    bottom: 85px;
    height: 58vh;
  }
  .sticky-fab {
    bottom: 16px;
    right: 16px;
    width: 48px;
    height: 48px;
  }
  .stats-bar { flex-direction: column; gap: 11px; }
  .kendala-card { padding: 18px; }
}

/* ========== ACCESSIBILITY ========== */
button:focus-visible,
input:focus-visible,
textarea:focus-visible {
  outline: 2px solid var(--neon-blue);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
<!-- Background Effects -->
<div class="bg-animated"></div>
<div class="bg-grid"></div>
<div id="particles"></div>
<div class="scan-line"></div>
<div id="toast" class="toast"></div>

<div class="container">
  <header class="header">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Kembali
    </a>
    <h1 class="judul-glow">🔷 KENDALA ALL</h1>
    <p class="subtitle">Database Solusi & Bantuan Pengguna 2026</p>
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </header>

  <div class="search-section">
    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" class="bonus-input" placeholder="🔷 Cari kendala..." oninput="searchKendala()">
    </div>
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="totalItems">0</span>
        <span class="stat-label">Total Data</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="withPhotos">0</span>
        <span class="stat-label">Dengan Foto</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="withLinks">0</span>
        <span class="stat-label">Dengan Link</span>
      </div>
    </div>
  </div>

  <div id="kendalaContainer">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>⏳ Menghubungi database...</p>
      <p style="font-size: 12px; opacity: 0.7; margin-top: 8px; color: var(--text-muted);">Mengambil data dari Google Sheets</p>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Tutup">&times;</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="Preview" draggable="false">
  <div class="lightbox-controls">
    <button class="lightbox-btn" onclick="changeLightbox(-1)">
      <i class="fas fa-chevron-left"></i> Prev
    </button>
    <button class="lightbox-btn" onclick="copyLightboxPhoto()">
      <i class="fas fa-copy"></i> Copy Foto
    </button>
    <button class="lightbox-btn" onclick="changeLightbox(1)">
      Next <i class="fas fa-chevron-right"></i>
    </button>
  </div>
  <div class="zoom-slider">
    <input type="range" id="zoomSlider" min="0.5" max="4" step="0.1" value="1" oninput="updateZoom()">
  </div>
</div>

<!-- STICKY NOTES -->
<div class="sticky-fab" onclick="toggleStickyPanel()" title="Buka Sticky Notes">
  <i class="fas fa-sticky-note"></i>
</div>

<div class="sticky-panel" id="stickyPanel">
  <div class="sticky-header">
    <span class="sticky-title">📝 Sticky Notes</span>
    <button class="sticky-close" onclick="toggleStickyPanel()" aria-label="Tutup">&times;</button>
  </div>
  <div class="sticky-input-area">
    <textarea class="sticky-input" id="stickyInput" placeholder="✏️ Tulis catatan...&#10;📸 Paste foto (Ctrl+V) atau Upload" oninput="autoResize(this)"></textarea>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
    <div class="sticky-photo-preview" id="stickyPhotoPreview">
      <img id="stickyPreviewImg" src="" alt="Preview">
      <button class="sticky-remove-photo" onclick="removePhoto()">×</button>
    </div>
    <div class="sticky-btn-group">
      <button class="sticky-add-btn" id="stickyAddBtn" onclick="addSticky()">
        <i class="fas fa-plus"></i> <span>Tambah</span>
      </button>
      <button class="sticky-upload-btn" onclick="document.getElementById('fileInput').click()">
        <i class="fas fa-upload"></i> Upload
      </button>
    </div>
  </div>
  <div class="sticky-list" id="stickyList"></div>
</div>

<script>
// ================= DATA CONFIG =================
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

let allKendala = [];
let filteredKendala = [];
let lightboxImages = [];
let lightboxIndex = 0;
let zoomLevel = 1;
let editIndex = null;

// ================= PARTICLES =================
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  container.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 15 + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    container.appendChild(particle);
  }
}

// ================= TOAST =================
function showToast(message) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ================= DATA LOADING =================
async function loadKendalaData() {
  try {
    const response = await fetch(DATA_URL);
    const text = await response.text();
    const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
    if (!jsonMatch) throw new Error('Gagal parse');
    const data = JSON.parse(jsonMatch[1]);
    const rows = data.table?.rows || [];
    
    allKendala = rows.map(row => {
      const cells = row.c || [];
      return {
        judul: cells[0]?.v?.toString().trim() || '',
        jawaban1: cells[1]?.v?.toString().trim() || '',
        jawaban2: cells[2]?.v?.toString().trim() || '',
        jawaban3: cells[3]?.v?.toString().trim() || ''
      };
    }).filter(item => item.judul && item.judul !== '');
    
    filteredKendala = [...allKendala];
    renderKendala();
    updateStats();
  } catch (error) {
    document.getElementById('kendalaContainer').innerHTML = `
      <div class="error-msg">
        <i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 15px; color: var(--accent-red);"></i>
        <p><strong>⚠️ Gagal memuat data</strong></p>
        <p style="font-size: 12px; margin-top: 10px; color: var(--text-muted);">Pastikan Google Sheet sudah dipublikasikan</p>
        <p style="font-size: 11px; margin-top: 12px; opacity: 0.7;">${error.message}</p>
      </div>`;
  }
}

function renderKendala(data = filteredKendala) {
  const container = document.getElementById('kendalaContainer');
  if (data.length === 0) {
    container.innerHTML = '<div class="no-data"><p style="color: var(--text-muted); font-size: 16px;">Tidak ada data ditemukan</p></div>';
    return;
  }
  container.innerHTML = `<div class="kendala-list">${data.map((item, index) => createKendalaCard(item, index)).join('')}</div>`;
  
  document.querySelectorAll('.kendala-title').forEach(title => {
    title.addEventListener('click', function() {
      this.parentElement.classList.toggle('expanded');
    });
  });
}

function createKendalaCard(item, index) {
  const titlePhoto = extractTitlePhoto(item.judul);
  const cleanJudul = titlePhoto ? item.judul.replace(titlePhoto.url, '').trim() : item.judul;
  const hasPhoto = detectPhotoLink(item);
  const links1 = extractLinks(item.jawaban1);
  const links2 = extractLinks(item.jawaban2);
  const links3 = extractLinks(item.jawaban3);
  
  return `
    <div class="kendala-card" data-index="${index}">
      <h3 class="kendala-title">${escapeHtml(cleanJudul)}</h3>
      ${titlePhoto ? createTitlePhotoSection(titlePhoto.url, index) : ''}
      <div class="kendala-answers">
        ${item.jawaban1 ? `
          <div class="answer-item">
            <div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 1</div>
            <div class="answer-content">${formatContent(item.jawaban1, links1)}</div>
            ${hasPhoto && !titlePhoto ? createPhotoSection(item) : ''}
            ${links1.length > 0 ? createLinkButtons(links1) : ''}
            <button class="copy-btn" onclick="copyAnswer(${index}, 1)"><i class="fas fa-copy"></i> Copy</button>
            <button class="sticky-btn" onclick="addToSticky(${index}, 1)"><i class="fas fa-sticky-note"></i> Sticky</button>
          </div>` : ''}
        ${item.jawaban2 ? `
          <div class="answer-item">
            <div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 2</div>
            <div class="answer-content">${formatContent(item.jawaban2, links2)}</div>
            ${links2.length > 0 ? createLinkButtons(links2) : ''}
            <button class="copy-btn" onclick="copyAnswer(${index}, 2)"><i class="fas fa-copy"></i> Copy</button>
            <button class="sticky-btn" onclick="addToSticky(${index}, 2)"><i class="fas fa-sticky-note"></i> Sticky</button>
          </div>` : ''}
        ${item.jawaban3 ? `
          <div class="answer-item">
            <div class="answer-label"><i class="fas fa-comment-alt"></i> JAWABAN 3</div>
            <div class="answer-content">${formatContent(item.jawaban3, links3)}</div>
            ${links3.length > 0 ? createLinkButtons(links3) : ''}
            <button class="copy-btn" onclick="copyAnswer(${index}, 3)"><i class="fas fa-copy"></i> Copy</button>
            <button class="sticky-btn" onclick="addToSticky(${index}, 3)"><i class="fas fa-sticky-note"></i> Sticky</button>
          </div>` : ''}
      </div>
    </div>`;
}

// ================= HELPER FUNCTIONS =================
function extractTitlePhoto(judul) {
  if (!judul) return null;
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = judul.match(photoPattern);
  if (match) return { url: match[1], fullMatch: match[0] };
  return null;
}

function createTitlePhotoSection(photoUrl, index) {
  if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
  return `
    <div class="title-photo-section">
      <img src="${photoUrl}" alt="Foto Kendala" class="title-photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.style.display='none'">
      <div class="title-photo-actions">
        <button class="copy-title-photo-btn" onclick="copyTitlePhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
        <button class="view-title-photo-btn" onclick="openLightbox('${photoUrl}')"><i class="fas fa-expand"></i> Lihat Penuh</button>
      </div>
    </div>`;
}

function detectPhotoLink(item) {
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  return photoPattern.test(item.jawaban1) || photoPattern.test(item.jawaban2) || photoPattern.test(item.jawaban3);
}

function extractLinks(text) {
  if (!text) return [];
  const urlPattern = /https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi;
  return text.match(urlPattern) || [];
}

function formatContent(text, links = []) {
  if (!text) return '';
  let formatted = escapeHtml(text);
  links.forEach(link => {
    const displayText = link.length > 45 ? link.substring(0, 42) + '...' : link;
    formatted = formatted.replace(new RegExp(escapeRegExp(link), 'g'), `<a href="${link}" target="_blank" rel="noopener">${displayText}</a>`);
  });
  return formatted;
}

function createPhotoSection(item) {
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = (item.jawaban1 + ' ' + item.jawaban2 + ' ' + item.jawaban3).match(photoPattern);
  if (!match) return '';
  const photoUrl = match[1];
  if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
  return `
    <div class="photo-container">
      <img src="${photoUrl}" alt="Foto" class="photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.style.display='none'">
      <button class="copy-btn" onclick="copyPhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
    </div>`;
}

function createLinkButtons(links) {
  if (links.length === 0) return '';
  return `
    <div class="link-buttons">
      ${links.map((link, i) => {
        const label = links.length > 1 ? `Link ${i+1}` : 'Buka Link';
        return `<a href="${link}" target="_blank" rel="noopener" class="open-link-btn">
          <i class="fas fa-external-link-alt"></i> ${label}
        </a>`;
      }).join('')}
    </div>`;
}

async function copyAnswer(index, answerNum) {
  const item = filteredKendala[index];
  const content = item[`jawaban${answerNum}`];
  if (!content) return;
  try {
    await navigator.clipboard.writeText(content);
    showToast('✅ Jawaban disalin!');
    const btn = event.target.closest('.copy-btn');
    if (btn) {
      const original = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
      btn.style.background = 'var(--accent-green)';
      setTimeout(() => {
        btn.innerHTML = original;
        btn.style.background = '';
      }, 1500);
    }
  } catch {
    fallbackCopy(content);
  }
}

async function copyTitlePhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin!');
  } catch {
    await navigator.clipboard.writeText(url);
    showToast('📋 URL foto disalin!');
  }
}

async function copyPhoto(url) {
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin!');
  } catch {
    await navigator.clipboard.writeText(url);
    showToast('📋 URL foto disalin!');
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('✅ Disalin!');
  } catch {
    showToast('❗ Gagal menyalin');
  }
  document.body.removeChild(textarea);
}

function searchKendala() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  filteredKendala = allKendala.filter(item =>
    item.judul.toLowerCase().includes(query) ||
    (item.jawaban1 && item.jawaban1.toLowerCase().includes(query)) ||
    (item.jawaban2 && item.jawaban2.toLowerCase().includes(query)) ||
    (item.jawaban3 && item.jawaban3.toLowerCase().includes(query))
  );
  renderKendala();
  updateStats();
}

function updateStats() {
  document.getElementById('totalItems').textContent = filteredKendala.length;
  const withPhotos = filteredKendala.filter(item => detectPhotoLink(item) || extractTitlePhoto(item.judul)).length;
  document.getElementById('withPhotos').textContent = withPhotos;
  const withLinks = filteredKendala.filter(item =>
    extractLinks(item.jawaban1).length > 0 ||
    extractLinks(item.jawaban2).length > 0 ||
    extractLinks(item.jawaban3).length > 0
  ).length;
  document.getElementById('withLinks').textContent = withLinks;
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function escapeRegExp(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ================= LIGHTBOX =================
function openLightbox(url) {
  lightboxIndex = lightboxImages.indexOf(url);
  if (lightboxIndex === -1) {
    lightboxImages.push(url);
    lightboxIndex = lightboxImages.length - 1;
  }
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
  zoomLevel = 1;
  updateZoom();
}

function closeLightbox(event) {
  if (!event || event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightboxImg').src = '';
    document.body.style.overflow = '';
  }
}

function changeLightbox(direction) {
  lightboxIndex += direction;
  if (lightboxIndex < 0) lightboxIndex = lightboxImages.length - 1;
  if (lightboxIndex >= lightboxImages.length) lightboxIndex = 0;
  document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
  zoomLevel = 1;
  updateZoom();
}

function updateZoom() {
  zoomLevel = parseFloat(document.getElementById('zoomSlider').value);
  document.getElementById('lightboxImg').style.transform = `scale(${zoomLevel})`;
}

async function copyLightboxPhoto() {
  const url = document.getElementById('lightboxImg').src;
  if (url) await copyPhoto(url);
}

// ================= STICKY NOTES =================
function toggleStickyPanel() {
  const panel = document.getElementById("stickyPanel");
  panel.style.display = panel.style.display === "flex" ? "none" : "flex";
  loadStickyNotes();
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = (el.scrollHeight) + "px";
}

async function addSticky() {
  const input = document.getElementById("stickyInput");
  const text = input.value.trim();
  const image = input.dataset.image || null;
  if (!text && !image) return;
  
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  if (editIndex !== null) {
    stickies[editIndex] = { text, image };
    editIndex = null;
    document.getElementById("stickyAddBtn").querySelector("span").textContent = "Tambah";
  } else {
    stickies.push({ text, image });
  }
  localStorage.setItem("stickies", JSON.stringify(stickies));
  
  input.value = "";
  input.dataset.image = "";
  autoResize(input);
  removePhoto();
  loadStickyNotes();
  showToast('✅ Catatan ditambahkan!');
}

function loadStickyNotes() {
  const list = document.getElementById("stickyList");
  if (!list) return;
  list.innerHTML = "";
  const stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  
  if (stickies.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding: 30px; color: var(--text-muted); font-size: 14px;">Kosong - Tambahkan catatan</div>';
    return;
  }
  
  stickies.forEach((note, i) => {
    const div = document.createElement("div");
    div.className = "sticky-card";
    div.dataset.index = i;
    
    if (note.text) {
      const p = document.createElement("p");
      p.textContent = note.text;
      div.appendChild(p);
    }
    if (note.image) {
      const img = document.createElement("img");
      img.src = note.image;
      img.onclick = () => openLightbox(note.image);
      div.appendChild(img);
    }
    
    div.onclick = async (e) => {
      if (e.target.classList.contains('sticky-delete') || e.target.classList.contains('sticky-edit')) return;
      try {
        const items = {};
        if (note.text) items["text/plain"] = new Blob([note.text], { type: "text/plain" });
        if (note.image) {
          const resp = await fetch(note.image);
          const blob = await resp.blob();
          items[blob.type] = blob;
        }
        await navigator.clipboard.write([new ClipboardItem(items)]);
        showToast("✅ Teks + Gambar disalin!");
      } catch {
        showToast("⚠ Gagal menyalin");
      }
    };
    
    const del = document.createElement("span");
    del.textContent = "×";
    del.className = "sticky-delete";
    del.onclick = e => { e.stopPropagation(); deleteSticky(i); };
    
    const edit = document.createElement("span");
    edit.textContent = "✏️";
    edit.className = "sticky-edit";
    edit.onclick = e => { e.stopPropagation(); editSticky(i); };
    
    div.appendChild(del);
    div.appendChild(edit);
    div.setAttribute("draggable", true);
    div.ondragstart = e => e.dataTransfer.setData("text/plain", i);
    div.ondragover = e => { e.preventDefault(); div.style.borderColor = 'var(--neon-blue)'; };
    div.ondragleave = () => div.style.borderColor = '';
    div.ondrop = e => {
      e.preventDefault();
      div.style.borderColor = '';
      reorderSticky(e.dataTransfer.getData("text/plain"), i);
    };
    
    list.appendChild(div);
  });
}

function reorderSticky(from, to) {
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  const moved = stickies.splice(from, 1)[0];
  stickies.splice(to, 0, moved);
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
}

function deleteSticky(i) {
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  stickies.splice(i, 1);
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
  showToast('🗑️ Catatan dihapus');
}

function editSticky(i) {
  const stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  const input = document.getElementById("stickyInput");
  input.value = stickies[i].text || "";
  input.dataset.image = stickies[i].image || "";
  autoResize(input);
  if (stickies[i].image) showPhotoPreview(stickies[i].image);
  else removePhoto();
  editIndex = i;
  document.getElementById("stickyAddBtn").querySelector("span").textContent = "Update";
  input.focus();
}

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const base64 = e.target.result;
      document.getElementById("stickyInput").dataset.image = base64;
      showPhotoPreview(base64);
      showToast('📸 Foto diunggah!');
    };
    reader.readAsDataURL(file);
  }
}

function handleStickyPaste(event) {
  const items = event.clipboardData.items;
  for (let i = 0; i < items.length; i++) {
    if (items[i].type.startsWith('image/')) {
      event.preventDefault();
      const blob = items[i].getAsFile();
      const reader = new FileReader();
      reader.onload = function(e) {
        const base64 = e.target.result;
        document.getElementById("stickyInput").dataset.image = base64;
        showPhotoPreview(base64);
        showToast('📸 Foto ditempel!');
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
}

function showPhotoPreview(dataUrl) {
  const preview = document.getElementById('stickyPhotoPreview');
  const previewImg = document.getElementById('stickyPreviewImg');
  previewImg.src = dataUrl;
  preview.classList.add('show');
}

function removePhoto() {
  const input = document.getElementById("stickyInput");
  if(input) input.dataset.image = "";
  document.getElementById('stickyPhotoPreview').classList.remove('show');
  document.getElementById('fileInput').value = '';
}

function addToSticky(kendalaIndex, answerNum) {
  const item = filteredKendala[kendalaIndex];
  const content = item[`jawaban${answerNum}`];
  if (!content) return;
  const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
  const match = content.match(photoPattern);
  const imageUrl = match ? match[1] : null;
  
  let stickies = JSON.parse(localStorage.getItem("stickies") || "[]");
  stickies.push({
    text: imageUrl ? content.replace(photoPattern, '').trim() : content,
    image: imageUrl
  });
  localStorage.setItem("stickies", JSON.stringify(stickies));
  loadStickyNotes();
  showToast('✅ Ditambahkan ke Sticky Notes!');
}

// ================= INITIALIZATION =================
document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  loadKendalaData();
  const stickyInput = document.getElementById('stickyInput');
  if (stickyInput) {
    stickyInput.addEventListener('paste', handleStickyPaste);
  }
  setTimeout(() => showToast('🔷 System Ready!'), 1000);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeLightbox();
    const panel = document.getElementById("stickyPanel");
    if (panel.style.display === "flex") toggleStickyPanel();
  }
});
</script>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00ffff">
<title>🎧 KENDALA ALL - LINE TOGEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-cyan: #00ffff;
--neon-blue: #0088ff;
--neon-purple: #9d00ff;
--neon-green: #00ff88;
--neon-yellow: #ffff00;
--neon-red: #ff0066;
--bg-dark: #000a1e;
--bg-card: rgba(0, 20, 50, 0.7);
--bg-card-hover: rgba(0, 40, 100, 0.85);
--text-main: #00ffff;
--text-secondary: #66ffff;
--border-glow: rgba(0, 255, 255, 0.5);
--transition: 0.3s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Exo 2', sans-serif;
background: var(--bg-dark);
color: var(--text-main);
min-height: 100vh;
overflow-x: hidden;
line-height: 1.6;
}

.cyber-bg {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background:
radial-gradient(ellipse at 20% 80%, rgba(0, 243, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 80% 20%, rgba(157, 0, 255, 0.12) 0%, transparent 50%),
linear-gradient(180deg, #000a1e 0%, #001133 40%, #000820 100%);
z-index: -3;
}

.grid-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background-image:
linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
background-size: 50px 50px;
z-index: -2;
pointer-events: none;
}

.container {
max-width: 1200px;
margin: 0 auto;
padding: 25px 20px;
min-height: 100vh;
position: relative;
z-index: 2;
}

.header {
text-align: center;
margin-bottom: 30px;
padding: 20px;
position: relative;
}

.back-btn {
position: absolute;
left: 0; top: 50%;
transform: translateY(-50%);
background: rgba(0, 255, 255, 0.15);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 8px 16px;
border-radius: 10px;
text-decoration: none;
font-weight: 700;
font-size: 13px;
display: flex;
align-items: center;
gap: 6px;
transition: var(--transition);
}

.back-btn:hover {
background: rgba(0, 255, 255, 0.3);
transform: translateY(-50%) translateX(-3px);
box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
}

.title {
font-family: 'Orbitron', sans-serif;
font-size: 42px;
font-weight: 900;
background: linear-gradient(90deg, #00f3ff, #9d00ff, #00f3ff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-size: 200% auto;
animation: neonFlow 3s ease infinite;
text-shadow: 0 0 30px rgba(0, 243, 255, 0.7);
margin-bottom: 10px;
}

@keyframes neonFlow {
0%, 100% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
}

.subtitle {
font-size: 16px;
color: var(--text-secondary);
text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
letter-spacing: 2px;
}

.search-section {
margin: 20px 0 25px;
}

.search-bar {
position: relative;
max-width: 500px;
margin: 0 auto 15px;
}

.search-bar input {
width: 100%;
padding: 14px 20px 14px 50px;
background: rgba(0, 20, 50, 0.8);
border: 2px solid rgba(0, 255, 255, 0.5);
border-radius: 12px;
color: var(--text-main);
font-size: 15px;
font-family: 'Exo 2', sans-serif;
transition: var(--transition);
}

.search-bar input:focus {
outline: none;
border-color: var(--neon-cyan);
box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
}

.search-bar i {
position: absolute;
left: 18px; top: 50%;
transform: translateY(-50%);
color: var(--neon-cyan);
}

.stats-bar {
display: flex;
justify-content: center;
gap: 20px;
flex-wrap: wrap;
padding: 12px;
background: rgba(0, 20, 50, 0.6);
border-radius: 12px;
border: 1px solid rgba(0, 255, 255, 0.3);
}

.stat-item {
text-align: center;
padding: 5px 15px;
}

.stat-value {
font-family: 'Orbitron', sans-serif;
font-size: 24px;
font-weight: 800;
color: var(--neon-cyan);
display: block;
}

.stat-label {
font-size: 11px;
color: var(--text-secondary);
text-transform: uppercase;
}

.kendala-list {
display: flex;
flex-direction: column;
gap: 18px;
}

.kendala-card {
background: var(--bg-card);
border: 2px solid var(--border-glow);
border-radius: 18px;
padding: 22px 25px;
transition: var(--transition);
position: relative;
overflow: hidden;
backdrop-filter: blur(10px);
}

.kendala-card::before {
content: '';
position: absolute;
top: 0; left: 0;
width: 4px; height: 100%;
background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-purple));
box-shadow: 0 0 15px var(--neon-cyan);
}

.kendala-card:hover {
transform: translateY(-4px);
box-shadow: 0 15px 40px rgba(0, 255, 255, 0.25);
}

.kendala-title {
font-family: 'Orbitron', sans-serif;
font-size: 19px;
font-weight: 800;
color: var(--neon-cyan);
margin-bottom: 15px;
cursor: pointer;
display: flex;
justify-content: space-between;
align-items: center;
padding-bottom: 12px;
border-bottom: 1px solid rgba(0, 255, 255, 0.2);
}

.kendala-title:hover {
color: var(--neon-green);
}

.title-photo-section {
margin: 15px 0;
padding: 15px;
background: rgba(0, 15, 40, 0.6);
border-radius: 12px;
border: 2px solid rgba(0, 255, 255, 0.3);
text-align: center;
}

.title-photo-img {
max-width: 100%;
max-height: 350px;
border-radius: 12px;
border: 3px solid var(--neon-cyan);
cursor: pointer;
transition: var(--transition);
box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
}

.title-photo-img:hover {
transform: scale(1.02);
box-shadow: 0 0 35px rgba(0, 255, 255, 0.6);
}

.title-photo-actions {
margin-top: 12px;
display: flex;
gap: 8px;
justify-content: center;
}

.copy-photo-btn {
background: rgba(0, 255, 255, 0.15);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 8px 18px;
border-radius: 10px;
cursor: pointer;
font-weight: 700;
font-size: 13px;
transition: var(--transition);
display: inline-flex;
align-items: center;
gap: 6px;
}

.copy-photo-btn:hover {
background: rgba(0, 255, 255, 0.3);
transform: translateY(-2px);
box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
}

.kendala-answers {
display: none;
margin-top: 15px;
padding-top: 15px;
border-top: 1px solid rgba(0, 255, 255, 0.2);
}

.kendala-card.expanded .kendala-answers {
display: block;
}

.answer-item {
margin-bottom: 15px;
padding: 15px;
background: rgba(0, 15, 40, 0.6);
border-radius: 12px;
border-left: 4px solid var(--neon-cyan);
}

.answer-label {
font-weight: 700;
color: var(--neon-yellow);
margin-bottom: 8px;
font-size: 13px;
text-transform: uppercase;
display: flex;
align-items: center;
gap: 6px;
}

.answer-content {
color: var(--text-secondary);
line-height: 1.6;
white-space: pre-wrap;
word-break: break-word;
font-size: 14px;
margin-bottom: 10px;
}

.answer-content a {
color: var(--neon-green);
text-decoration: none;
font-weight: 600;
}

.answer-actions {
display: flex;
gap: 8px;
flex-wrap: wrap;
margin-top: 10px;
}

.action-btn {
background: rgba(0, 255, 255, 0.15);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 7px 16px;
border-radius: 8px;
cursor: pointer;
font-weight: 700;
font-size: 12px;
transition: var(--transition);
display: inline-flex;
align-items: center;
gap: 5px;
}

.action-btn:hover {
background: rgba(0, 255, 255, 0.3);
transform: translateY(-2px);
box-shadow: 0 0 18px rgba(0, 255, 255, 0.5);
}

.action-btn.copied, .action-btn.added {
background: var(--neon-green);
border-color: var(--neon-green);
color: #000;
}

/* STICKY NOTES FAB */
.sticky-fab {
position: fixed;
bottom: 25px;
right: 25px;
width: 55px;
height: 55px;
background: radial-gradient(circle at 30% 30%, var(--neon-cyan), var(--neon-purple));
border: 3px solid var(--neon-cyan);
border-radius: 50%;
color: #000;
font-size: 22px;
cursor: pointer;
z-index: 1000;
display: flex;
align-items: center;
justify-content: center;
box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
transition: var(--transition);
animation: fabPulse 2s infinite alternate;
}

.sticky-fab:hover {
transform: scale(1.1) rotate(10deg);
box-shadow: 0 0 35px rgba(0, 255, 255, 0.9);
}

@keyframes fabPulse {
0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.6); }
50% { box-shadow: 0 0 35px rgba(0, 255, 255, 0.9); }
}

/* STICKY PANEL */
.sticky-panel {
position: fixed;
bottom: 90px;
right: 25px;
width: 380px;
max-width: 90vw;
max-height: 65vh;
background: rgba(2, 12, 32, 0.98);
border: 2px solid var(--neon-cyan);
border-radius: 16px;
padding: 18px;
z-index: 999;
display: none;
flex-direction: column;
backdrop-filter: blur(15px);
box-shadow: 0 0 40px rgba(0, 255, 255, 0.4);
}

.sticky-panel.active {
display: flex;
}

.sticky-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 12px;
padding-bottom: 10px;
border-bottom: 1px solid rgba(0, 255, 255, 0.3);
}

.sticky-title {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
color: var(--neon-cyan);
}

.sticky-close {
background: none;
border: none;
color: var(--neon-red);
font-size: 22px;
cursor: pointer;
transition: var(--transition);
}

.sticky-close:hover {
transform: rotate(90deg);
}

.sticky-input-area {
margin-bottom: 12px;
}

.sticky-input {
width: 100%;
min-height: 70px;
background: rgba(0, 15, 40, 0.7);
border: 2px solid rgba(0, 255, 255, 0.4);
border-radius: 10px;
padding: 10px;
color: var(--text-main);
font-size: 13px;
font-family: 'Exo 2', sans-serif;
resize: vertical;
transition: var(--transition);
}

.sticky-input:focus {
outline: none;
border-color: var(--neon-cyan);
box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
}

.sticky-add-btn {
background: linear-gradient(145deg, rgba(0, 255, 255, 0.25), rgba(0, 150, 255, 0.25));
color: var(--neon-cyan);
border: 2px solid var(--neon-cyan);
padding: 8px 20px;
border-radius: 10px;
cursor: pointer;
font-weight: 700;
font-size: 13px;
transition: var(--transition);
display: inline-flex;
align-items: center;
gap: 6px;
margin-top: 8px;
}

.sticky-add-btn:hover {
background: rgba(0, 255, 255, 0.35);
transform: translateY(-2px);
}

.sticky-list {
flex: 1;
overflow-y: auto;
padding-right: 5px;
}

.sticky-list::-webkit-scrollbar {
width: 6px;
}

.sticky-list::-webkit-scrollbar-track {
background: rgba(0, 10, 30, 0.5);
border-radius: 3px;
}

.sticky-list::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon-cyan), var(--neon-purple));
border-radius: 3px;
}

.sticky-note {
background: rgba(0, 20, 50, 0.8);
border: 1.5px solid rgba(0, 255, 255, 0.4);
border-radius: 12px;
padding: 12px;
margin-bottom: 10px;
cursor: grab;
transition: var(--transition);
position: relative;
}

.sticky-note:active {
cursor: grabbing;
}

.sticky-note:hover {
border-color: var(--neon-cyan);
box-shadow: 0 0 18px rgba(0, 255, 255, 0.35);
transform: translateX(3px);
}

.sticky-note.dragging {
opacity: 0.6;
border-style: dashed;
}

.sticky-note-content {
color: var(--text-secondary);
font-size: 13px;
line-height: 1.5;
white-space: pre-wrap;
word-break: break-word;
margin-bottom: 8px;
cursor: pointer;
}

.sticky-note-content:hover {
color: var(--neon-cyan);
}

.sticky-note img {
max-width: 100%;
max-height: 120px;
border-radius: 8px;
border: 2px solid var(--neon-cyan);
margin: 6px 0;
cursor: pointer;
transition: var(--transition);
}

.sticky-note img:hover {
box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
}

.sticky-note-actions {
display: flex;
gap: 6px;
justify-content: flex-end;
margin-top: 8px;
}

.sticky-action-btn {
background: rgba(0, 255, 255, 0.1);
border: 1px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 5px 10px;
border-radius: 6px;
cursor: pointer;
font-size: 11px;
transition: var(--transition);
display: inline-flex;
align-items: center;
gap: 4px;
}

.sticky-action-btn:hover {
background: rgba(0, 255, 255, 0.25);
}

.sticky-action-btn.delete {
border-color: var(--neon-red);
color: var(--neon-red);
}

.sticky-action-btn.delete:hover {
background: rgba(255, 0, 102, 0.2);
}

.sticky-action-btn.edit {
border-color: var(--neon-yellow);
color: var(--neon-yellow);
}

.sticky-action-btn.edit:hover {
background: rgba(255, 255, 0, 0.2);
}

/* TOAST */
.toast {
position: fixed;
bottom: 30px;
right: 30px;
background: rgba(2, 12, 32, 0.95);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 14px 24px;
border-radius: 12px;
font-weight: 700;
font-size: 14px;
z-index: 10000;
display: flex;
align-items: center;
gap: 10px;
box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
transform: translateX(200px);
opacity: 0;
transition: var(--transition);
}

.toast.show {
transform: translateX(0);
opacity: 1;
}

.toast.delete {
border-color: var(--neon-red);
color: var(--neon-red);
}

/* LOADING & ERROR */
.loading, .error-msg, .no-data {
text-align: center;
padding: 50px 20px;
color: var(--text-secondary);
}

.loading-spinner {
width: 45px; height: 45px;
border: 4px solid rgba(0, 255, 255, 0.2);
border-top-color: var(--neon-cyan);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 15px;
}

@keyframes spin {
to { transform: rotate(360deg); }
}

.error-msg {
color: var(--neon-red);
background: rgba(255, 0, 102, 0.1);
border-radius: 12px;
border: 1px solid var(--neon-red);
}

/* LIGHTBOX */
.lightbox {
display: none;
position: fixed;
top: 0; left: 0;
width: 100vw; height: 100vh;
background: rgba(0, 5, 20, 0.97);
z-index: 9999;
flex-direction: column;
justify-content: center;
align-items: center;
padding: 20px;
}

.lightbox.active {
display: flex;
}

.lightbox-img {
max-width: 95%;
max-height: 80vh;
border-radius: 12px;
border: 4px solid var(--neon-cyan);
box-shadow: 0 0 40px rgba(0, 255, 255, 0.6);
}

.lightbox-controls {
display: flex;
gap: 12px;
margin-top: 20px;
}

.lightbox-btn {
background: rgba(0, 255, 255, 0.15);
border: 2px solid var(--neon-cyan);
color: var(--neon-cyan);
padding: 10px 22px;
border-radius: 10px;
cursor: pointer;
font-weight: 700;
transition: var(--transition);
}

.lightbox-btn:hover {
background: rgba(0, 255, 255, 0.3);
}

@media (max-width: 768px) {
.title { font-size: 32px; }
.kendala-card { padding: 18px 20px; }
.sticky-panel {
width: 95vw;
right: 2.5vw;
bottom: 85px;
}
.sticky-fab {
bottom: 20px;
right: 20px;
width: 50px;
height: 50px;
}
}
</style>
</head>
<body>
<div class="cyber-bg"></div>
<div class="grid-overlay"></div>

<div class="container">
<header class="header">
<a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali</a>
<h1 class="title">🎧 KENDALA ALL</h1>
<p class="subtitle">Database Solusi & Bantuan</p>
</header>

<div class="search-section">
<div class="search-bar">
<i class="fas fa-search"></i>
<input type="text" id="searchInput" placeholder="Cari kendala..." oninput="searchKendala()">
</div>
<div class="stats-bar">
<div class="stat-item">
<span class="stat-value" id="totalItems">0</span>
<span class="stat-label">Total</span>
</div>
<div class="stat-item">
<span class="stat-value" id="withPhotos">0</span>
<span class="stat-label">Foto</span>
</div>
<div class="stat-item">
<span class="stat-value" id="withLinks">0</span>
<span class="stat-label">Link</span>
</div>
</div>
</div>

<div id="kendalaContainer">
<div class="loading">
<div class="loading-spinner"></div>
<p>Menghubungi database...</p>
</div>
</div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
<img class="lightbox-img" id="lightboxImg" src="" alt="Preview">
<div class="lightbox-controls">
<button class="lightbox-btn" onclick="copyLightboxPhoto()"><i class="fas fa-copy"></i> Copy</button>
<button class="lightbox-btn" onclick="closeLightbox()">Tutup</button>
</div>
</div>

<!-- Sticky Notes FAB -->
<div class="sticky-fab" onclick="toggleStickyPanel()" title="Buka Sticky Notes">
<i class="fas fa-sticky-note"></i>
</div>

<!-- Sticky Panel -->
<div class="sticky-panel" id="stickyPanel">
<div class="sticky-header">
<span class="sticky-title">📝 Sticky Notes</span>
<button class="sticky-close" onclick="toggleStickyPanel()">&times;</button>
</div>
<div class="sticky-input-area">
<textarea class="sticky-input" id="stickyInput" placeholder="Tulis catatan atau paste link foto..."></textarea>
<button class="sticky-add-btn" onclick="addStickyNote()">
<i class="fas fa-plus"></i> Tambah
</button>
</div>
<div class="sticky-list" id="stickyList"></div>
</div>

<!-- Toast -->
<div id="toast" class="toast">
<span id="toastMessage">Notifikasi</span>
</div>

<script>
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

let allKendala = [];
let filteredKendala = [];
let lightboxImages = [];
let stickyNotes = JSON.parse(localStorage.getItem('stickyNotes') || '[]');
let draggedNote = null;

async function loadKendalaData() {
try {
const response = await fetch(DATA_URL);
const text = await response.text();
const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
if (!jsonMatch) throw new Error('Gagal parse');
const data = JSON.parse(jsonMatch[1]);
const rows = data.table?.rows || [];

allKendala = rows.map(row => {
const cells = row.c || [];
return {
judul: cells[0]?.v?.toString().trim() || '',
jawaban1: cells[1]?.v?.toString().trim() || '',
jawaban2: cells[2]?.v?.toString().trim() || '',
jawaban3: cells[3]?.v?.toString().trim() || ''
};
}).filter(item => item.judul);

filteredKendala = [...allKendala];
renderKendala();
updateStats();
} catch (error) {
document.getElementById('kendalaContainer').innerHTML = `
<div class="error-msg">
<i class="fas fa-exclamation-triangle" style="font-size: 28px; margin-bottom: 10px;"></i>
<p>Gagal memuat data</p>
</div>`;
}
}

function renderKendala(data = filteredKendala) {
const container = document.getElementById('kendalaContainer');
if (data.length === 0) {
container.innerHTML = '<div class="no-data"><p>Tidak ada data</p></div>';
return;
}
container.innerHTML = `<div class="kendala-list">${data.map((item, index) => createKendalaCard(item, index)).join('')}</div>`;
document.querySelectorAll('.kendala-title').forEach(title => {
title.addEventListener('click', function() {
this.parentElement.classList.toggle('expanded');
});
});
}

function createKendalaCard(item, index) {
const titlePhoto = extractTitlePhoto(item.judul);
const cleanJudul = titlePhoto ? item.judul.replace(titlePhoto.url, '').trim() : item.judul;
const links1 = extractLinks(item.jawaban1);
const links2 = extractLinks(item.jawaban2);
const links3 = extractLinks(item.jawaban3);

return `
<div class="kendala-card" data-index="${index}">
<h3 class="kendala-title">${escapeHtml(cleanJudul)} <i class="fas fa-chevron-down" style="font-size: 11px;"></i></h3>
${titlePhoto ? createTitlePhotoSection(titlePhoto.url) : ''}
<div class="kendala-answers">
${item.jawaban1 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-comment"></i> JAWABAN 1</div>
<div class="answer-content">${formatContent(item.jawaban1, links1)}</div>
${hasPhotoInText(item.jawaban1) && !titlePhoto ? createPhotoSection(extractPhotoFromText(item.jawaban1)) : ''}
<div class="answer-actions">
<button class="action-btn" onclick="copyAnswer(${index}, 1)"><i class="fas fa-copy"></i> Copy</button>
<button class="action-btn" onclick="addToSticky(${index}, 1)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>
</div>` : ''}
${item.jawaban2 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-comment"></i> JAWABAN 2</div>
<div class="answer-content">${formatContent(item.jawaban2, links2)}</div>
<div class="answer-actions">
<button class="action-btn" onclick="copyAnswer(${index}, 2)"><i class="fas fa-copy"></i> Copy</button>
<button class="action-btn" onclick="addToSticky(${index}, 2)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>
</div>` : ''}
${item.jawaban3 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-comment"></i> JAWABAN 3</div>
<div class="answer-content">${formatContent(item.jawaban3, links3)}</div>
<div class="answer-actions">
<button class="action-btn" onclick="copyAnswer(${index}, 3)"><i class="fas fa-copy"></i> Copy</button>
<button class="action-btn" onclick="addToSticky(${index}, 3)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>
</div>` : ''}
</div>
</div>`;
}

function extractTitlePhoto(judul) {
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
const match = judul.match(photoPattern);
return match ? { url: match[1] } : null;
}

function createTitlePhotoSection(photoUrl) {
if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
return `
<div class="title-photo-section">
<img src="${photoUrl}" alt="Foto" class="title-photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.style.display='none'">
<div class="title-photo-actions">
<button class="copy-photo-btn" onclick="copyPhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
</div>
</div>`;
}

function extractPhotoFromText(text) {
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
const match = text.match(photoPattern);
return match ? match[1] : null;
}

function hasPhotoInText(text) {
return /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i.test(text);
}

function createPhotoSection(photoUrl) {
if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
return `<div style="margin:10px 0;text-align:center;"><img src="${photoUrl}" style="max-width:100%;max-height:300px;border-radius:10px;border:2px solid var(--neon-cyan);cursor:pointer;" onclick="openLightbox('${photoUrl}')" onclick="copyPhoto('${photoUrl}')"></div>`;
}

function extractLinks(text) {
if (!text) return [];
return text.match(/https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi) || [];
}

function formatContent(text, links = []) {
if (!text) return '';
let formatted = escapeHtml(text);
links.forEach(link => {
if (!/\.(jpg|jpeg|png|gif|webp)$/i.test(link)) {
formatted = formatted.replace(new RegExp(escapeRegExp(link), 'g'), `<a href="${link}" target="_blank">${link.length > 40 ? link.substring(0, 37) + '...' : link}</a>`);
}
});
return formatted;
}

async function copyAnswer(index, answerNum) {
const item = filteredKendala[index];
const content = item[`jawaban${answerNum}`];
if (!content) return;
try {
await navigator.clipboard.writeText(content);
showToast('✅ Jawaban disalin!');
} catch {
showToast('❗ Gagal menyalin');
}
}

async function copyPhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
showToast('✅ Foto disalin!');
} catch {
await navigator.clipboard.writeText(url);
showToast('📋 URL disalin!');
}
}

function openLightbox(url) {
document.getElementById('lightboxImg').src = url;
document.getElementById('lightbox').classList.add('active');
}

function closeLightbox(event) {
if (!event || event.target.id === 'lightbox') {
document.getElementById('lightbox').classList.remove('active');
}
}

async function copyLightboxPhoto() {
const url = document.getElementById('lightboxImg').src;
if (url) await copyPhoto(url);
}

/* STICKY NOTES */
function toggleStickyPanel() {
const panel = document.getElementById('stickyPanel');
panel.classList.toggle('active');
if (panel.classList.contains('active')) renderStickyNotes();
}

function renderStickyNotes() {
const list = document.getElementById('stickyList');
if (!list) return;
list.innerHTML = '';
if (stickyNotes.length === 0) {
list.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:20px;">📭 Belum ada catatan</p>';
return;
}
stickyNotes.forEach((note, index) => {
const div = document.createElement('div');
div.className = 'sticky-note';
div.draggable = true;
div.dataset.index = index;
if (note.text) {
const content = document.createElement('div');
content.className = 'sticky-note-content';
content.textContent = note.text;
content.onclick = () => copyStickyNote(index);
div.appendChild(content);
}
if (note.image) {
const img = document.createElement('img');
img.src = note.image;
img.onclick = () => copyStickyImage(note.image);
div.appendChild(img);
}
const actions = document.createElement('div');
actions.className = 'sticky-note-actions';
const editBtn = document.createElement('button');
editBtn.className = 'sticky-action-btn edit';
editBtn.innerHTML = '<i class="fas fa-edit"></i> Edit';
editBtn.onclick = (e) => { e.stopPropagation(); editStickyNote(index); };
const deleteBtn = document.createElement('button');
deleteBtn.className = 'sticky-action-btn delete';
deleteBtn.innerHTML = '<i class="fas fa-trash"></i> Hapus';
deleteBtn.onclick = (e) => { e.stopPropagation(); deleteStickyNote(index); };
actions.appendChild(editBtn);
actions.appendChild(deleteBtn);
div.appendChild(actions);
div.addEventListener('dragstart', handleDragStart);
div.addEventListener('dragover', handleDragOver);
div.addEventListener('drop', handleDrop);
div.addEventListener('dragend', handleDragEnd);
list.appendChild(div);
});
}

function addStickyNote() {
const input = document.getElementById('stickyInput');
const text = input.value.trim();
if (!text) { showToast('⚠️ Isi catatan!'); return; }
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
const match = text.match(photoPattern);
const imageUrl = match ? match[1] : null;
stickyNotes.push({
text: imageUrl ? text.replace(photoPattern, '').trim() : text,
image: imageUrl,
timestamp: Date.now()
});
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
input.value = '';
renderStickyNotes();
showToast('✅ Ditambahkan!');
}

async function copyStickyNote(index) {
const note = stickyNotes[index];
if (!note) return;
let textToCopy = note.text || '';
if (note.image) textToCopy += (textToCopy ? '\n' : '') + note.image;
try {
await navigator.clipboard.writeText(textToCopy);
if (note.image) {
try {
const response = await fetch(note.image);
const blob = await response.blob();
await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
} catch {}
}
showToast('✅ Sticky disalin!');
} catch {
showToast('❗ Gagal menyalin');
}
}

async function copyStickyImage(url) {
await copyPhoto(url);
}

function editStickyNote(index) {
const note = stickyNotes[index];
if (!note) return;
const currentText = note.text || '';
const input = document.getElementById('stickyInput');
input.value = currentText;
input.focus();
stickyNotes.splice(index, 1);
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
showToast('✏️ Silakan edit dan tambah ulang');
}

function deleteStickyNote(index) {
if (confirm('Hapus sticky note ini?')) {
stickyNotes.splice(index, 1);
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
showToastDelete('🗑️ Dihapus!');
}
}

function handleDragStart(e) {
draggedNote = this;
this.classList.add('dragging');
e.dataTransfer.effectAllowed = 'move';
}

function handleDragOver(e) {
e.preventDefault();
e.dataTransfer.dropEffect = 'move';
return false;
}

function handleDrop(e) {
e.stopPropagation();
if (!draggedNote || this === draggedNote) return false;
const fromIndex = parseInt(draggedNote.dataset.index);
const toIndex = parseInt(this.dataset.index);
if (fromIndex !== toIndex) {
const [moved] = stickyNotes.splice(fromIndex, 1);
stickyNotes.splice(toIndex, 0, moved);
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
}
return false;
}

function handleDragEnd() {
this.classList.remove('dragging');
draggedNote = null;
}

function addToSticky(kendalaIndex, answerNum) {
const item = filteredKendala[kendalaIndex];
const content = item[`jawaban${answerNum}`];
if (!content) return;
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
const match = content.match(photoPattern);
const imageUrl = match ? match[1] : null;
stickyNotes.push({
text: imageUrl ? content.replace(photoPattern, '').trim() : content,
image: imageUrl,
timestamp: Date.now()
});
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
showToast('✅ Ditambahkan ke Sticky!');
const btn = event.target.closest('.action-btn');
if (btn) {
btn.classList.add('added');
btn.innerHTML = '<i class="fas fa-check"></i> Added!';
setTimeout(() => {
btn.classList.remove('added');
btn.innerHTML = '<i class="fas fa-sticky-note"></i> Sticky';
}, 2000);
}
}

function searchKendala() {
const query = document.getElementById('searchInput').value.toLowerCase().trim();
filteredKendala = allKendala.filter(item =>
item.judul.toLowerCase().includes(query) ||
(item.jawaban1 && item.jawaban1.toLowerCase().includes(query)) ||
(item.jawaban2 && item.jawaban2.toLowerCase().includes(query)) ||
(item.jawaban3 && item.jawaban3.toLowerCase().includes(query))
);
renderKendala();
updateStats();
}

function updateStats() {
document.getElementById('totalItems').textContent = filteredKendala.length;
const withPhotos = filteredKendala.filter(item => extractTitlePhoto(item.judul) || hasPhotoInText(item.jawaban1 + item.jawaban2 + item.jawaban3)).length;
document.getElementById('withPhotos').textContent = withPhotos;
const withLinks = filteredKendala.filter(item => extractLinks(item.jawaban1).length > 0 || extractLinks(item.jawaban2).length > 0 || extractLinks(item.jawaban3).length > 0).length;
document.getElementById('withLinks').textContent = withLinks;
}

function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.className = 'toast show';
setTimeout(() => toast.classList.remove('show'), 3000);
}

function showToastDelete(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.className = 'toast delete show';
setTimeout(() => toast.classList.remove('show'), 3000);
}

function escapeHtml(text) {
if (!text) return '';
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}

function escapeRegExp(string) {
return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

document.addEventListener('DOMContentLoaded', () => {
loadKendalaData();
setTimeout(() => showToast('🚀 System Ready!'), 1000);
});
</script>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00aaff">
<title>KENDALA ALL - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-blue: #00d4ff;
--neon-blue-dark: #0088ff;
--neon-blue-light: #66e0ff;
--neon-blue-glow: rgba(0, 212, 255, 0.8);
--electric-blue: #00ffff;
--deep-blue: #001833;
--dark-blue: #000d1a;
--card-bg: rgba(0, 25, 50, 0.85);
--card-hover: rgba(0, 40, 80, 0.95);
--text-primary: #00d4ff;
--text-secondary: #66c8ff;
--text-dim: #3399cc;
--border-electric: rgba(0, 212, 255, 0.6);
--transition-fast: 0.2s ease;
--transition-normal: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--dark-blue);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
}

/* Electric Background */
.electric-bg {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background:
radial-gradient(ellipse at 30% 20%, rgba(0, 136, 255, 0.15) 0%, transparent 50%),
radial-gradient(ellipse at 70% 80%, rgba(0, 212, 255, 0.12) 0%, transparent 45%),
radial-gradient(ellipse at 50% 50%, rgba(0, 100, 200, 0.1) 0%, transparent 60%),
linear-gradient(180deg, #000814 0%, #001428 40%, #000a1c 100%);
z-index: -3;
}

/* Electric Grid */
.electric-grid {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background-image:
linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
background-size: 60px 60px;
z-index: -2;
animation: gridPulse 8s ease-in-out infinite;
pointer-events: none;
}

@keyframes gridPulse {
0%, 100% { opacity: 0.6; }
50% { opacity: 1; }
}

/* Lightning Canvas */
#lightningCanvas {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
z-index: -1;
pointer-events: none;
}

/* Electric Scan Line */
.electric-scan {
position: fixed;
top: 0; left: 0; width: 100%; height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-blue), var(--electric-blue), var(--neon-blue), transparent);
opacity: 0.7;
animation: electricScan 6s linear infinite;
z-index: 1;
pointer-events: none;
box-shadow: 0 0 30px var(--neon-blue), 0 0 60px var(--neon-blue-dark);
}

@keyframes electricScan {
0% { top: -5%; opacity: 0; }
5% { opacity: 0.9; }
95% { opacity: 0.9; }
100% { top: 105%; opacity: 0; }
}

/* Electric Sparks */
.electric-sparks {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
z-index: 0;
pointer-events: none;
overflow: hidden;
}

.spark {
position: absolute;
width: 4px;
height: 4px;
background: var(--neon-blue);
border-radius: 50%;
box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue-light);
animation: sparkFly 3s linear infinite;
}

@keyframes sparkFly {
0% { transform: translateY(100vh) scale(0); opacity: 0; }
10% { opacity: 1; }
90% { opacity: 1; }
100% { transform: translateY(-100px) scale(1); opacity: 0; }
}

.container {
max-width: 1200px;
margin: 0 auto;
padding: 20px 15px;
min-height: 100vh;
display: flex;
flex-direction: column;
position: relative;
z-index: 2;
}

/* Header 2026 */
.header {
text-align: center;
margin-bottom: 30px;
padding: 25px 20px;
position: relative;
}

.header::before {
content: '';
position: absolute;
bottom: 0; left: 50%;
transform: translateX(-50%);
width: 90%;
height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-blue), var(--electric-blue), var(--neon-blue), transparent);
animation: electricPulse 2s ease-in-out infinite;
box-shadow: 0 0 20px var(--neon-blue);
}

@keyframes electricPulse {
0%, 100% { opacity: 0.5; box-shadow: 0 0 15px var(--neon-blue); }
50% { opacity: 1; box-shadow: 0 0 40px var(--neon-blue), 0 0 60px var(--electric-blue); }
}

.back-btn {
position: absolute;
left: 0; top: 50%;
transform: translateY(-50%);
background: rgba(0, 136, 255, 0.2);
border: 2px solid var(--neon-blue);
color: var(--neon-blue);
padding: 10px 18px;
border-radius: 12px;
text-decoration: none;
font-weight: 700;
font-size: 13px;
display: flex;
align-items: center;
gap: 8px;
transition: var(--transition-normal);
backdrop-filter: blur(10px);
box-shadow: 0 0 15px rgba(0, 136, 255, 0.3), inset 0 0 20px rgba(0, 212, 255, 0.1);
}

.back-btn:hover {
background: rgba(0, 136, 255, 0.4);
transform: translateY(-50%) translateX(-5px);
box-shadow: 0 0 30px rgba(0, 212, 255, 0.6), 0 0 50px rgba(0, 136, 255, 0.4);
border-color: var(--electric-blue);
}

/* Logo Container */
.logo-container {
display: flex;
flex-direction: column;
align-items: center;
gap: 5px;
}

.brand-year {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
font-weight: 700;
color: var(--neon-blue);
letter-spacing: 8px;
text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue-dark);
animation: yearGlow 2s ease-in-out infinite alternate;
position: relative;
}

.brand-year::before,
.brand-year::after {
content: '';
position: absolute;
top: 50%;
width: 40px;
height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-blue));
}

.brand-year::before {
right: 100%;
margin-right: 15px;
background: linear-gradient(90deg, transparent, var(--neon-blue));
}

.brand-year::after {
left: 100%;
margin-left: 15px;
background: linear-gradient(270deg, transparent, var(--neon-blue));
}

@keyframes yearGlow {
0% { text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue-dark); }
100% { text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--electric-blue), 0 0 60px var(--neon-blue); }
}

/* Main Title with Electric Effect */
.title {
font-family: 'Orbitron', sans-serif;
font-size: 42px;
font-weight: 900;
color: var(--neon-blue);
position: relative;
letter-spacing: 3px;
animation: titleElectric 3s ease-in-out infinite;
}

.title::before {
content: 'KENDALA ALL';
position: absolute;
left: 0; top: 0;
color: transparent;
-webkit-text-stroke: 1px var(--neon-blue-light);
opacity: 0.5;
animation: glitchLeft 2s infinite;
}

.title::after {
content: 'KENDALA ALL';
position: absolute;
left: 0; top: 0;
color: transparent;
-webkit-text-stroke: 1px var(--electric-blue);
opacity: 0.5;
animation: glitchRight 2s infinite;
}

@keyframes titleElectric {
0%, 100% { 
text-shadow: 
0 0 10px var(--neon-blue),
0 0 20px var(--neon-blue),
0 0 40px var(--neon-blue-dark),
0 0 80px var(--neon-blue-dark);
}
50% { 
text-shadow: 
0 0 20px var(--neon-blue),
0 0 40px var(--electric-blue),
0 0 60px var(--neon-blue),
0 0 100px var(--neon-blue-dark);
}
}

@keyframes glitchLeft {
0%, 90%, 100% { transform: translate(0); }
92% { transform: translate(-3px, 1px); }
94% { transform: translate(2px, -1px); }
96% { transform: translate(-1px, 2px); }
98% { transform: translate(1px, -2px); }
}

@keyframes glitchRight {
0%, 90%, 100% { transform: translate(0); }
91% { transform: translate(2px, -1px); }
93% { transform: translate(-2px, 1px); }
95% { transform: translate(1px, 2px); }
97% { transform: translate(-1px, -1px); }
}

/* Logo Icon */
.logo-icon {
font-size: 48px;
margin-bottom: 10px;
animation: iconPulse 2s ease-in-out infinite;
filter: drop-shadow(0 0 15px var(--neon-blue));
}

@keyframes iconPulse {
0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--neon-blue)); }
50% { transform: scale(1.1); filter: drop-shadow(0 0 30px var(--electric-blue)); }
}

.subtitle {
font-size: 15px;
color: var(--text-secondary);
text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
letter-spacing: 3px;
text-transform: uppercase;
margin-top: 8px;
}

/* Status Badge Electric */
.status-badge {
display: inline-flex;
align-items: center;
gap: 10px;
background: rgba(0, 136, 255, 0.15);
border: 2px solid var(--neon-blue);
padding: 8px 20px;
border-radius: 25px;
font-size: 13px;
color: var(--neon-blue-light);
margin-top: 15px;
box-shadow: 0 0 20px rgba(0, 136, 255, 0.4), inset 0 0 15px rgba(0, 212, 255, 0.1);
animation: badgeElectric 2.5s infinite;
}

@keyframes badgeElectric {
0%, 100% { box-shadow: 0 0 15px rgba(0, 136, 255, 0.4), inset 0 0 15px rgba(0, 212, 255, 0.1); }
50% { box-shadow: 0 0 35px rgba(0, 212, 255, 0.7), inset 0 0 25px rgba(0, 136, 255, 0.2); }
}

.status-dot {
width: 10px; height: 10px;
background: var(--neon-blue);
border-radius: 50%;
animation: dotElectric 1.5s infinite;
box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--electric-blue);
}

@keyframes dotElectric {
0%, 100% { transform: scale(1); box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--electric-blue); }
50% { transform: scale(1.3); box-shadow: 0 0 20px var(--electric-blue), 0 0 40px var(--neon-blue); }
}

/* Search Section */
.search-section {
margin: 25px 0 30px;
text-align: center;
}

.search-bar {
position: relative;
max-width: 520px;
margin: 0 auto 18px;
}

.search-bar input {
width: 100%;
padding: 14px 22px 14px 50px;
background: rgba(0, 25, 50, 0.9);
border: 2px solid var(--border-electric);
border-radius: 15px;
color: var(--text-primary);
font-size: 15px;
font-family: 'Rajdhani', sans-serif;
font-weight: 600;
transition: var(--transition-normal);
backdrop-filter: blur(10px);
box-shadow: 0 0 15px rgba(0, 136, 255, 0.2), inset 0 0 20px rgba(0, 212, 255, 0.05);
}

.search-bar input::placeholder {
color: rgba(0, 212, 255, 0.5);
}

.search-bar input:focus {
outline: none;
border-color: var(--neon-blue);
box-shadow: 0 0 30px rgba(0, 212, 255, 0.5), 0 0 50px rgba(0, 136, 255, 0.3), inset 0 0 25px rgba(0, 212, 255, 0.1);
background: rgba(0, 30, 60, 0.95);
}

.search-bar i {
position: absolute;
left: 18px; top: 50%;
transform: translateY(-50%);
color: var(--neon-blue);
font-size: 18px;
text-shadow: 0 0 10px var(--neon-blue);
}

/* Stats Bar */
.stats-bar {
display: flex;
justify-content: center;
gap: 25px;
flex-wrap: wrap;
padding: 15px 20px;
background: rgba(0, 25, 50, 0.7);
border-radius: 15px;
border: 2px solid var(--border-electric);
max-width: 750px;
margin: 0 auto;
box-shadow: 0 0 20px rgba(0, 136, 255, 0.3), inset 0 0 30px rgba(0, 212, 255, 0.05);
}

.stat-item {
text-align: center;
padding: 8px 20px;
position: relative;
}

.stat-item:not(:last-child)::after {
content: '';
position: absolute;
right: 0; top: 20%;
height: 60%;
width: 2px;
background: linear-gradient(180deg, transparent, var(--neon-blue), transparent);
}

.stat-value {
font-family: 'Orbitron', sans-serif;
font-size: 26px;
font-weight: 700;
color: var(--neon-blue);
text-shadow: 0 0 15px var(--neon-blue);
display: block;
}

.stat-label {
font-size: 12px;
color: var(--text-secondary);
text-transform: uppercase;
letter-spacing: 2px;
}

/* Kendala Cards */
.kendala-list {
display: flex;
flex-direction: column;
gap: 18px;
}

.kendala-card {
background: var(--card-bg);
border: 2px solid var(--border-electric);
border-radius: 20px;
padding: 22px 26px;
transition: var(--transition-normal);
position: relative;
overflow: hidden;
backdrop-filter: blur(20px);
animation: cardSlideIn 0.6s ease forwards;
opacity: 0;
transform: translateY(25px);
box-shadow: 0 5px 25px rgba(0, 136, 255, 0.15);
}

.kendala-card:nth-child(1) { animation-delay: 0.1s; }
.kendala-card:nth-child(2) { animation-delay: 0.15s; }
.kendala-card:nth-child(3) { animation-delay: 0.2s; }
.kendala-card:nth-child(4) { animation-delay: 0.25s; }
.kendala-card:nth-child(5) { animation-delay: 0.3s; }

@keyframes cardSlideIn {
to { opacity: 1; transform: translateY(0); }
}

/* Electric Left Border */
.kendala-card::before {
content: '';
position: absolute;
top: 0; left: 0;
width: 5px; height: 100%;
background: linear-gradient(180deg, var(--neon-blue), var(--electric-blue), var(--neon-blue-dark), var(--neon-blue));
box-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--electric-blue);
transition: var(--transition-normal);
}

.kendala-card:hover {
background: var(--card-hover);
transform: translateY(-6px) scale(1.01);
border-color: var(--neon-blue);
box-shadow:
0 20px 50px rgba(0, 136, 255, 0.35),
0 0 50px rgba(0, 212, 255, 0.2),
inset 0 0 30px rgba(0, 212, 255, 0.1);
}

.kendala-card:hover::before {
width: 8px;
box-shadow: 0 0 30px var(--neon-blue), 0 0 60px var(--electric-blue);
}

/* Electric corner accents */
.kendala-card::after {
content: '';
position: absolute;
top: 0; right: 0;
width: 60px; height: 60px;
background: linear-gradient(135deg, transparent 50%, rgba(0, 212, 255, 0.1) 50%);
border-radius: 0 18px 0 0;
transition: var(--transition-normal);
}

.kendala-card:hover::after {
width: 80px; height: 80px;
background: linear-gradient(135deg, transparent 50%, rgba(0, 212, 255, 0.2) 50%);
}

.kendala-title {
font-family: 'Orbitron', sans-serif;
font-size: 17px;
font-weight: 700;
color: var(--neon-blue);
margin-bottom: 16px;
cursor: pointer;
display: flex;
justify-content: space-between;
align-items: center;
text-shadow: 0 0 12px var(--neon-blue);
padding-bottom: 14px;
border-bottom: 1px solid rgba(0, 212, 255, 0.25);
transition: var(--transition-fast);
}

.kendala-title:hover {
color: var(--electric-blue);
text-shadow: 0 0 20px var(--electric-blue);
}

.kendala-title::after {
content: '';
width: 0; height: 0;
border-left: 6px solid transparent;
border-right: 6px solid transparent;
border-top: 8px solid var(--neon-blue);
transition: transform 0.3s ease;
filter: drop-shadow(0 0 5px var(--neon-blue));
}

.kendala-card.expanded .kendala-title::after {
transform: rotate(180deg);
}

.title-photo-section {
display: none;
margin: 16px 0;
padding: 16px;
background: rgba(0, 20, 45, 0.7);
border-radius: 15px;
border: 2px solid rgba(0, 212, 255, 0.35);
text-align: center;
animation: photoSlideIn 0.4s ease;
}

@keyframes photoSlideIn {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }
}

.kendala-card.expanded .title-photo-section {
display: block;
}

.title-photo-container {
position: relative;
display: inline-block;
}

.title-photo-img {
max-width: 100%;
max-height: 320px;
border-radius: 12px;
border: 3px solid var(--neon-blue);
cursor: pointer;
transition: var(--transition-normal);
box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
}

.title-photo-img:hover {
transform: scale(1.02);
box-shadow: 0 0 40px rgba(0, 212, 255, 0.8), 0 0 60px rgba(0, 136, 255, 0.4);
}

.title-photo-badge {
position: absolute;
top: 10px; left: 10px;
background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
color: #000;
padding: 5px 12px;
border-radius: 8px;
font-size: 12px;
font-weight: 700;
display: flex;
align-items: center;
gap: 5px;
box-shadow: 0 0 15px var(--neon-blue);
}

.title-photo-actions {
margin-top: 14px;
display: flex;
gap: 10px;
justify-content: center;
flex-wrap: wrap;
}

.copy-title-photo-btn, .view-title-photo-btn {
background: rgba(0, 136, 255, 0.2);
border: 2px solid var(--neon-blue);
color: var(--neon-blue);
padding: 10px 20px;
border-radius: 12px;
cursor: pointer;
transition: var(--transition-normal);
font-weight: 700;
font-size: 13px;
display: inline-flex;
align-items: center;
gap: 8px;
}

.copy-title-photo-btn:hover, .view-title-photo-btn:hover {
background: rgba(0, 136, 255, 0.4);
transform: translateY(-3px);
box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
}

.kendala-answers {
display: none;
margin-top: 18px;
padding-top: 18px;
border-top: 1px solid rgba(0, 212, 255, 0.25);
animation: answerSlide 0.4s ease;
}

@keyframes answerSlide {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }
}

.kendala-card.expanded .kendala-answers {
display: block;
}

.answer-item {
margin-bottom: 16px;
padding: 16px 18px;
background: rgba(0, 20, 45, 0.7);
border-radius: 12px;
border-left: 4px solid var(--neon-blue);
transition: var(--transition-fast);
position: relative;
box-shadow: 0 0 15px rgba(0, 136, 255, 0.15);
}

.answer-item:hover {
background: rgba(0, 30, 60, 0.8);
border-left-color: var(--electric-blue);
transform: translateX(4px);
box-shadow: 0 0 25px rgba(0, 212, 255, 0.25);
}

.answer-label {
font-weight: 700;
color: #00ffcc;
margin-bottom: 10px;
font-size: 13px;
text-transform: uppercase;
letter-spacing: 2px;
display: flex;
align-items: center;
gap: 8px;
text-shadow: 0 0 8px rgba(0, 255, 204, 0.6);
}

.answer-label i {
font-size: 15px;
color: #00ffcc;
}

.answer-content {
color: var(--text-secondary);
line-height: 1.7;
white-space: pre-wrap;
word-break: break-word;
font-size: 14px;
}

.answer-content a {
color: var(--electric-blue);
text-decoration: none;
font-weight: 600;
transition: var(--transition-fast);
position: relative;
}

.answer-content a::after {
content: '';
position: absolute;
bottom: -2px; left: 0;
width: 0; height: 2px;
background: var(--electric-blue);
transition: var(--transition-fast);
box-shadow: 0 0 10px var(--electric-blue);
}

.answer-content a:hover::after {
width: 100%;
}

.answer-content a:hover {
text-shadow: 0 0 10px var(--electric-blue);
}

.photo-container {
margin: 16px 0;
text-align: center;
padding: 14px;
background: rgba(0, 25, 55, 0.5);
border-radius: 12px;
border: 2px dashed rgba(0, 212, 255, 0.4);
}

.photo-img {
max-width: 100%;
max-height: 300px;
border-radius: 12px;
border: 3px solid var(--neon-blue);
cursor: pointer;
transition: var(--transition-normal);
box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
}

.photo-img:hover {
transform: scale(1.02);
box-shadow: 0 0 40px rgba(0, 212, 255, 0.8);
}

.copy-photo-btn, .copy-btn, .sticky-btn {
background: rgba(0, 136, 255, 0.2);
border: 2px solid var(--neon-blue);
color: var(--neon-blue);
padding: 9px 18px;
border-radius: 10px;
cursor: pointer;
margin-top: 12px;
margin-right: 8px;
transition: var(--transition-normal);
font-weight: 700;
font-size: 13px;
display: inline-flex;
align-items: center;
gap: 6px;
}

.copy-photo-btn:hover, .copy-btn:hover, .sticky-btn:hover {
background: rgba(0, 136, 255, 0.4);
transform: translateY(-3px);
box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
}

.copy-btn.copied, .sticky-btn.added {
background: linear-gradient(135deg, var(--neon-blue), var(--electric-blue));
border-color: var(--electric-blue);
color: #000;
animation: copiedFlash 0.5s ease;
}

@keyframes copiedFlash {
0% { transform: scale(1); }
50% { transform: scale(1.08); }
100% { transform: scale(1); }
}

.link-buttons {
display: flex;
flex-wrap: wrap;
gap: 10px;
margin-top: 14px;
}

.open-link-btn {
background: rgba(0, 212, 255, 0.15);
border: 2px solid var(--neon-blue-light);
color: var(--neon-blue-light);
padding: 8px 16px;
border-radius: 10px;
cursor: pointer;
font-size: 12px;
font-weight: 700;
transition: var(--transition-normal);
display: inline-flex;
align-items: center;
gap: 6px;
text-decoration: none;
}

.open-link-btn:hover {
background: rgba(0, 212, 255, 0.35);
transform: translateY(-3px);
box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
}

/* Sticky FAB */
.sticky-fab {
position: fixed;
bottom: 28px;
right: 28px;
width: 58px;
height: 58px;
background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
border: 3px solid var(--neon-blue-light);
border-radius: 50%;
color: #000;
font-size: 24px;
font-weight: bold;
cursor: pointer;

<script>
const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const GID = '1251944242';
const RANGE = 'C2:F300';
const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

let allKendala = [];
let filteredKendala = [];
let lightboxImages = [];
let lightboxIndex = 0;
let zoomLevel = 1;
let stickyNotes = JSON.parse(localStorage.getItem('stickyNotes') || '[]');
let draggedNote = null;
let editingIndex = -1;
let tempPhotoData = null;

// Lightning Effect
const lightningCanvas = document.getElementById('lightningCanvas');
const ctx = lightningCanvas.getContext('2d');

function resizeCanvas() {
lightningCanvas.width = window.innerWidth;
lightningCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawLightning() {
ctx.clearRect(0, 0, lightningCanvas.width, lightningCanvas.height);
if (Math.random() > 0.97) {
const startX = Math.random() * lightningCanvas.width;
const startY = 0;
drawBolt(startX, startY, 80);
}
requestAnimationFrame(drawLightning);
}

function drawBolt(x, y, segments) {
ctx.beginPath();
ctx.moveTo(x, y);
ctx.strokeStyle = 'rgba(0, 212, 255, 0.8)';
ctx.lineWidth = 2;
ctx.shadowColor = '#00d4ff';
ctx.shadowBlur = 20;

let currentX = x;
let currentY = y;

for (let i = 0; i < segments; i++) {
currentX += (Math.random() - 0.5) * 60;
currentY += Math.random() * 20 + 10;
ctx.lineTo(currentX, currentY);

if (Math.random() > 0.85) {
drawBranch(currentX, currentY, 20);
}
}
ctx.stroke();
ctx.shadowBlur = 0;
}

function drawBranch(x, y, segments) {
ctx.beginPath();
ctx.moveTo(x, y);
ctx.strokeStyle = 'rgba(0, 212, 255, 0.5)';
ctx.lineWidth = 1;

let currentX = x;
let currentY = y;

for (let i = 0; i < segments; i++) {
currentX += (Math.random() - 0.5) * 40;
currentY += Math.random() * 15 + 5;
ctx.lineTo(currentX, currentY);
}
ctx.stroke();
}

drawLightning();

// Electric Sparks
function createSparks() {
const container = document.getElementById('electricSparks');
for (let i = 0; i < 30; i++) {
const spark = document.createElement('div');
spark.className = 'spark';
spark.style.left = Math.random() * 100 + '%';
spark.style.animationDelay = Math.random() * 3 + 's';
spark.style.animationDuration = (Math.random() * 2 + 2) + 's';
container.appendChild(spark);
}
}
createSparks();

async function loadKendalaData() {
try {
const response = await fetch(DATA_URL);
const text = await response.text();
const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
if (!jsonMatch) throw new Error('Gagal parse');
const data = JSON.parse(jsonMatch[1]);
const rows = data.table?.rows || [];

allKendala = rows.map(row => {
const cells = row.c || [];
return {
judul: cells[0]?.v?.toString().trim() || '',
jawaban1: cells[1]?.v?.toString().trim() || '',
jawaban2: cells[2]?.v?.toString().trim() || '',
jawaban3: cells[3]?.v?.toString().trim() || ''
};
}).filter(item => item.judul && item.judul !== '');

filteredKendala = [...allKendala];
renderKendala();
updateStats();
} catch (error) {
document.getElementById('kendalaContainer').innerHTML = `
<div class="error-msg">
<i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 15px;"></i>
<p><strong>Gagal memuat data</strong></p>
<p style="font-size: 13px; margin-top: 10px; opacity: 0.9;">Pastikan Google Sheet sudah dipublikasikan</p>
<p style="font-size: 12px; margin-top: 15px; opacity: 0.7;">${error.message}</p>
</div>`;
}
}

function renderKendala(data = filteredKendala) {
const container = document.getElementById('kendalaContainer');
if (data.length === 0) {
container.innerHTML = '<div class="no-data"><p>Tidak ada data</p></div>';
return;
}
container.innerHTML = `<div class="kendala-list">${data.map((item, index) => createKendalaCard(item, index)).join('')}</div>`;
document.querySelectorAll('.kendala-title').forEach(title => {
title.addEventListener('click', function() {
this.parentElement.classList.toggle('expanded');
});
});
}

function createKendalaCard(item, index) {
const titlePhoto = extractTitlePhoto(item.judul);
const cleanJudul = titlePhoto ? item.judul.replace(titlePhoto.url, '').trim() : item.judul;
const hasPhoto = detectPhotoLink(item);
const links1 = extractLinks(item.jawaban1);
const links2 = extractLinks(item.jawaban2);
const links3 = extractLinks(item.jawaban3);

return `
<div class="kendala-card" data-index="${index}">
<h3 class="kendala-title">${escapeHtml(cleanJudul)}</h3>
 ${titlePhoto ? createTitlePhotoSection(titlePhoto.url, index) : ''}
<div class="kendala-answers">
 ${item.jawaban1 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-bolt"></i> JAWABAN 1</div>
<div class="answer-content">${formatContent(item.jawaban1, links1)}</div>
 ${hasPhoto && !titlePhoto ? createPhotoSection(item) : ''}
 ${links1.length > 0 ? createLinkButtons(links1) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 1)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 1)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
 ${item.jawaban2 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-bolt"></i> JAWABAN 2</div>
<div class="answer-content">${formatContent(item.jawaban2, links2)}</div>
 ${links2.length > 0 ? createLinkButtons(links2) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 2)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 2)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
 ${item.jawaban3 ? `
<div class="answer-item">
<div class="answer-label"><i class="fas fa-bolt"></i> JAWABAN 3</div>
<div class="answer-content">${formatContent(item.jawaban3, links3)}</div>
 ${links3.length > 0 ? createLinkButtons(links3) : ''}
<button class="copy-btn" onclick="copyAnswer(${index}, 3)"><i class="fas fa-copy"></i> Copy</button>
<button class="sticky-btn" onclick="addToSticky(${index}, 3)"><i class="fas fa-sticky-note"></i> Sticky</button>
</div>` : ''}
</div>
</div>`;
}

function extractTitlePhoto(judul) {
if (!judul) return null;
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
const match = judul.match(photoPattern);
if (match) return { url: match[1], fullMatch: match[0] };
return null;
}

function createTitlePhotoSection(photoUrl, index) {
if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
return `
<div class="title-photo-section">
<div class="title-photo-container">
<span class="title-photo-badge"><i class="fas fa-image"></i> FOTO</span>
<img src="${photoUrl}" alt="Foto Kendala" class="title-photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.parentElement.style.display='none'">
</div>
<div class="title-photo-actions">
<button class="copy-title-photo-btn" onclick="copyTitlePhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
<button class="view-title-photo-btn" onclick="openLightbox('${photoUrl}')"><i class="fas fa-expand"></i> Lihat Penuh</button>
</div>
</div>`;
}

function detectPhotoLink(item) {
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
return photoPattern.test(item.jawaban1) || photoPattern.test(item.jawaban2) || photoPattern.test(item.jawaban3);
}

function extractLinks(text) {
if (!text) return [];
const urlPattern = /https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi;
return text.match(urlPattern) || [];
}

function formatContent(text, links = []) {
if (!text) return '';
let formatted = escapeHtml(text);
links.forEach(link => {
const displayText = link.length > 45 ? link.substring(0, 42) + '...' : link;
formatted = formatted.replace(new RegExp(escapeRegExp(link), 'g'), `<a href="${link}" target="_blank" rel="noopener">${displayText}</a>`);
});
return formatted;
}

function createPhotoSection(item) {
const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
const match = (item.jawaban1 + ' ' + item.jawaban2 + ' ' + item.jawaban3).match(photoPattern);
if (!match) return '';
const photoUrl = match[1];
if (!lightboxImages.includes(photoUrl)) lightboxImages.push(photoUrl);
return `
<div class="photo-container">
<img src="${photoUrl}" alt="Foto" class="photo-img" onclick="openLightbox('${photoUrl}')" onerror="this.parentElement.style.display='none'">
<button class="copy-photo-btn" onclick="copyPhoto('${photoUrl}')"><i class="fas fa-copy"></i> Copy Foto</button>
</div>`;
}

function createLinkButtons(links) {
if (links.length === 0) return '';
return `
<div class="link-buttons">
 ${links.map((link, i) => {
const label = links.length > 1 ? `Link ${i+1}` : 'Buka Link';
return `<a href="${link}" target="_blank" rel="noopener" class="open-link-btn">
<i class="fas fa-external-link-alt"></i> ${label}
</a>`;
}).join('')}
</div>`;
}

async function copyAnswer(index, answerNum) {
const item = filteredKendala[index];
const content = item[`jawaban${answerNum}`];
if (!content) return;
try {
await navigator.clipboard.writeText(content);
showToast('Jawaban disalin!');
const btn = event.target.closest('.copy-btn');
if (btn) {
btn.classList.add('copied');
btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
setTimeout(() => {
btn.classList.remove('copied');
btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
}, 2000);
}
} catch {
fallbackCopy(content);
}
}

async function copyTitlePhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
showToast('Foto disalin!');
} catch {
await navigator.clipboard.writeText(url);
showToast('URL foto disalin!');
}
}

async function copyPhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
showToast('Foto disalin!');
} catch {
await navigator.clipboard.writeText(url);
showToast('URL foto disalin!');
}
}

function fallbackCopy(text) {
const textarea = document.createElement('textarea');
textarea.value = text;
textarea.style.position = 'fixed';
textarea.style.left = '-9999px';
document.body.appendChild(textarea);
textarea.select();
try {
document.execCommand('copy');
showToast('Disalin!');
} catch {
showToast('Gagal menyalin');
}
document.body.removeChild(textarea);
}

function openLightbox(url) {
lightboxIndex = lightboxImages.indexOf(url);
if (lightboxIndex === -1) {
lightboxImages.push(url);
lightboxIndex = lightboxImages.length - 1;
}
document.getElementById('lightboxImg').src = url;
document.getElementById('lightbox').classList.add('active');
document.body.style.overflow = 'hidden';
zoomLevel = 1;
updateZoom();
}

function closeLightbox(event) {
if (!event || event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
document.getElementById('lightbox').classList.remove('active');
document.getElementById('lightboxImg').src = '';
document.body.style.overflow = '';
}
}

function changeLightbox(direction) {
lightboxIndex += direction;
if (lightboxIndex < 0) lightboxIndex = lightboxImages.length - 1;
if (lightboxIndex >= lightboxImages.length) lightboxIndex = 0;
document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
zoomLevel = 1;
updateZoom();
}

function updateZoom() {
zoomLevel = parseFloat(document.getElementById('zoomSlider').value);
document.getElementById('lightboxImg').style.transform = `scale(${zoomLevel})`;
}

async function copyLightboxPhoto() {
const url = document.getElementById('lightboxImg').src;
if (url) await copyPhoto(url);
}

function toggleStickyPanel() {
const panel = document.getElementById('stickyPanel');
panel.classList.toggle('active');
if (panel.classList.contains('active')) renderStickyNotes();
}

function renderStickyNotes() {
const list = document.getElementById('stickyList');
if (!list) return;
list.innerHTML = '';

if (stickyNotes.length === 0) {
list.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:25px;font-size:13px;">Belum ada sticky notes</p>';
return;
}

stickyNotes.forEach((note, index) => {
const div = document.createElement('div');
div.className = 'sticky-note';
div.draggable = true;
div.dataset.index = index;
div.title = 'Klik untuk copy Text + Foto sekaligus';

const header = document.createElement('div');
header.className = 'sticky-note-header';
header.innerHTML = `<span class="sticky-note-id">#${String(index + 1).padStart(3, '0')}</span>`;
div.appendChild(header);

if (note.text) {
const content = document.createElement('div');
content.className = 'sticky-note-content';
content.textContent = note.text;
content.onclick = () => copyStickyNote(index);
div.appendChild(content);
}

if (note.image) {
const img = document.createElement('img');
img.src = note.image;
img.alt = 'Sticky Image';
img.onclick = () => copyStickyNote(index);
div.appendChild(img);
}

const actions = document.createElement('div');
actions.className = 'sticky-note-actions';

const copyBtn = document.createElement('button');
copyBtn.className = 'sticky-action-btn copy';
copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy Semua';
copyBtn.onclick = (e) => { e.stopPropagation(); copyStickyNote(index); };

const editBtn = document.createElement('button');
editBtn.className = 'sticky-action-btn edit';
editBtn.innerHTML = '<i class="fas fa-edit"></i> Edit';
editBtn.onclick = (e) => { e.stopPropagation(); editStickyNote(index); };

const deleteBtn = document.createElement('button');
deleteBtn.className = 'sticky-action-btn delete';
deleteBtn.innerHTML = '<i class="fas fa-trash"></i> Hapus';
deleteBtn.onclick = (e) => { e.stopPropagation(); deleteStickyNote(index); };

actions.appendChild(copyBtn);
actions.appendChild(editBtn);
actions.appendChild(deleteBtn);
div.appendChild(actions);

div.addEventListener('dragstart', handleDragStart);
div.addEventListener('dragover', handleDragOver);
div.addEventListener('drop', handleDrop);
div.addEventListener('dragend', handleDragEnd);

list.appendChild(div);
});
}

function handleFileSelect(event) {
const file = event.target.files[0];
if (file && file.type.startsWith('image/')) {
const reader = new FileReader();
reader.onload = function(e) {
tempPhotoData = e.target.result;
showPhotoPreview(tempPhotoData);
};
reader.readAsDataURL(file);
}
}

function showPhotoPreview(dataUrl) {
const preview = document.getElementById('stickyPhotoPreview');
const previewImg = document.getElementById('stickyPreviewImg');
previewImg.src = dataUrl;
preview.classList.add('show');
}

function removePhoto() {
tempPhotoData = null;
document.getElementById('stickyPhotoPreview').classList.remove('show');
document.getElementById('fileInput').value = '';
}

function handleStickyPaste(event) {
const items = event.clipboardData.items;
for (let i = 0; i < items.length; i++) {
if (items[i].type.startsWith('image/')) {
event.preventDefault();
const blob = items[i].getAsFile();
const reader = new FileReader();
reader.onload = function(e) {
tempPhotoData = e.target.result;
showPhotoPreview(tempPhotoData);
showToast('Foto berhasil ditempel!');
};
reader.readAsDataURL(blob);
break;
}
}
}

function handleStickyAction() {
if (editingIndex >= 0) {
updateStickyNote();
} else {
addStickyNote();
}
}

function addStickyNote() {
const input = document.getElementById('stickyInput');
const text = input.value.trim();

if (!text && !tempPhotoData) {
showToast('Isi catatan atau tambah foto!');
return;
}

stickyNotes.push({
text: text,
image: tempPhotoData,
timestamp: Date.now()
});

localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
input.value = '';
removePhoto();
renderStickyNotes();
showToast('Ditambahkan ke Sticky Notes!');
}

async function copyStickyNote(index) {
const note = stickyNotes[index];
if (!note) return;

try {
const clipboardItems = [];
let copiedInfo = [];

if (note.text && note.text.trim() !== '') {
const textBlob = new Blob([note.text], { type: 'text/plain' });
clipboardItems.push(new ClipboardItem({ 'text/plain': textBlob }));
copiedInfo.push('Text');
}

if (note.image) {
try {
const base64Response = await fetch(note.image);
const imageBlob = await base64Response.blob();
const imageItem = new ClipboardItem({ 
[imageBlob.type]: imageBlob 
});
clipboardItems.push(imageItem);
copiedInfo.push('Foto');
} catch (imgErr) {
console.error('Gagal convert foto:', imgErr);
const urlBlob = new Blob([note.image], { type: 'text/plain' });
clipboardItems.push(new ClipboardItem({ 'text/plain': urlBlob }));
copiedInfo.push('URL Foto');
}
}

if (clipboardItems.length > 0) {
await navigator.clipboard.write(clipboardItems);
showToast(`${copiedInfo.join(' + ')} disalin!`);
}
} catch (err) {
console.error('Copy error:', err);
if (note.text) {
await navigator.clipboard.writeText(note.text);
showToast('Text disalin! Klik gambar untuk copy foto terpisah');
} else if (note.image) {
await copyPhoto(note.image);
}
}
}

function editStickyNote(index) {
const note = stickyNotes[index];
if (!note) return;

editingIndex = index;
const input = document.getElementById('stickyInput');
input.value = note.text || '';

if (note.image) {
tempPhotoData = note.image;
showPhotoPreview(note.image);
}

const addBtn = document.getElementById('stickyAddBtn');
const cancelBtn = document.getElementById('stickyCancelBtn');
addBtn.classList.add('editing');
addBtn.innerHTML = '<i class="fas fa-save"></i> <span>Update</span>';
cancelBtn.style.display = 'inline-flex';

input.focus();
showToast('Mode Edit Aktif');
}

function updateStickyNote() {
const input = document.getElementById('stickyInput');
const text = input.value.trim();

if ((!text && !tempPhotoData) || editingIndex < 0) {
showToast('Isi catatan!');
return;
}

stickyNotes[editingIndex] = {
text: text,
image: tempPhotoData,
timestamp: Date.now()
};

localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
cancelEdit();
renderStickyNotes();
showToast('Sticky note diperbarui!');
}

function cancelEdit() {
editingIndex = -1;
const input = document.getElementById('stickyInput');
input.value = '';
removePhoto();

const addBtn = document.getElementById('stickyAddBtn');
const cancelBtn = document.getElementById('stickyCancelBtn');
addBtn.classList.remove('editing');
addBtn.innerHTML = '<i class="fas fa-plus"></i> <span>Tambah</span>';
cancelBtn.style.display = 'none';
}

function deleteStickyNote(index) {
if (confirm('Hapus sticky note ini?')) {
stickyNotes.splice(index, 1);
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
showToastDelete('Sticky note dihapus!');
}
}

function handleDragStart(e) {
draggedNote = this;
this.classList.add('dragging');
e.dataTransfer.effectAllowed = 'move';
}

function handleDragOver(e) {
e.preventDefault();
return false;
}

function handleDrop(e) {
e.stopPropagation();
if (!draggedNote || this === draggedNote) return false;

const fromIndex = parseInt(draggedNote.dataset.index);
const toIndex = parseInt(this.dataset.index);

if (fromIndex !== toIndex) {
const [moved] = stickyNotes.splice(fromIndex, 1);
stickyNotes.splice(toIndex, 0, moved);
localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
}
return false;
}

function handleDragEnd() {
this.classList.remove('dragging');
draggedNote = null;
}

function addToSticky(kendalaIndex, answerNum) {
const item = filteredKendala[kendalaIndex];
const content = item[`jawaban${answerNum}`];
if (!content) return;

const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
const match = content.match(photoPattern);
const imageUrl = match ? match[1] : null;

stickyNotes.push({
text: imageUrl ? content.replace(photoPattern, '').trim() : content,
image: imageUrl,
timestamp: Date.now()
});

localStorage.setItem('stickyNotes', JSON.stringify(stickyNotes));
renderStickyNotes();
showToast('Ditambahkan ke Sticky Notes!');
}

function searchKendala() {
const query = document.getElementById('searchInput').value.toLowerCase().trim();
filteredKendala = allKendala.filter(item =>
item.judul.toLowerCase().includes(query) ||
(item.jawaban1 && item.jawaban1.toLowerCase().includes(query)) ||
(item.jawaban2 && item.jawaban2.toLowerCase().includes(query)) ||
(item.jawaban3 && item.jawaban3.toLowerCase().includes(query))
);
renderKendala();
updateStats();
}

function updateStats() {
document.getElementById('totalItems').textContent = filteredKendala.length;
const withPhotos = filteredKendala.filter(item => detectPhotoLink(item) || extractTitlePhoto(item.judul)).length;
document.getElementById('withPhotos').textContent = withPhotos;
const withLinks = filteredKendala.filter(item =>
extractLinks(item.jawaban1).length > 0 ||
extractLinks(item.jawaban2).length > 0 ||
extractLinks(item.jawaban3).length > 0
).length;
document.getElementById('withLinks').textContent = withLinks;
}

function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.className = 'toast';
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

function showToastDelete(message) {
const toast = document.getElementById('toast');
document.getElementById('toastMessage').textContent = message;
toast.className = 'toast delete';
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

function escapeHtml(text) {
if (!text) return '';
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}

function escapeRegExp(string) {
return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

document.addEventListener('DOMContentLoaded', () => {
loadKendalaData();

const stickyInput = document.getElementById('stickyInput');
if (stickyInput) {
stickyInput.addEventListener('paste', handleStickyPaste);
}

setTimeout(() => showToast('Electric System Ready!'), 1000);
});

document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') {
closeLightbox();
if (editingIndex >= 0) cancelEdit();
}
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00ffff">
    <title>🎧 KENDALA ALL - LINE TOGEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-blue: #0088ff;
            --neon-purple: #9d00ff;
            --neon-green: #00ff88;
            --neon-yellow: #ffff00;
            --neon-red: #ff0066;
            --bg-dark: #000a1e;
            --bg-card: rgba(0, 20, 50, 0.7);
            --bg-card-hover: rgba(0, 40, 100, 0.8);
            --text-main: #00ffff;
            --text-secondary: #66ffff;
            --border-glow: rgba(0, 255, 255, 0.5);
            --shadow-glow: rgba(0, 255, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            background: radial-gradient(circle at 20% 80%, rgba(0,243,255,0.1), transparent 40%),
                        radial-gradient(circle at 80% 20%, rgba(157,0,255,0.1), transparent 40%),
                        linear-gradient(180deg, #000a1e 0%, #001133 100%);
        }

        .cyber-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 25px;
            background: rgba(0, 20, 50, 0.8);
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(90deg, #00f3ff, #9d00ff, #00f3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.7);
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 16px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 255, 0.15);
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px 24px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.8);
        }
        .back-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }

        .search-bar {
            margin: 25px 0;
            text-align: center;
        }
        #searchInput {
            width: 100%;
            max-width: 500px;
            padding: 14px 20px;
            background: rgba(0, 15, 40, 0.8);
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 14px;
            color: var(--neon-cyan);
            font-size: 16px;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.3s ease;
        }
        #searchInput:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            background: rgba(0, 20, 50, 0.9);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 255, 255, 0.3);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .note-card {
            background: var(--bg-card);
            border: 2px solid var(--border-glow);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        .note-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-purple));
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 255, 255, 0.4);
            border-color: var(--neon-cyan);
        }

        .note-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .note-title i {
            font-size: 24px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .note-answers {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .answer-item {
            background: rgba(0, 15, 40, 0.6);
            border-left: 3px solid var(--neon-blue);
            padding: 15px 20px;
            border-radius: 0 12px 12px 0;
            transition: all 0.3s ease;
        }
        .answer-item:hover {
            background: rgba(0, 20, 50, 0.8);
            border-left-color: var(--neon-cyan);
        }

        .answer-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--neon-yellow);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .answer-content {
            color: var(--text-secondary);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 15px;
        }

        .answer-content a {
            color: var(--neon-green);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .answer-content a:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
        }

        .photo-container {
            margin: 15px 0;
            text-align: center;
        }
        .photo-container img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            border: 2px solid rgba(0, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        .photo-container img:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .copy-btn, .link-btn {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: none;
        }

        .copy-btn {
            background: rgba(0, 255, 255, 0.15);
            color: var(--neon-cyan);
            border: 1.5px solid rgba(0, 255, 255, 0.5);
        }
        .copy-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .copy-btn.copied {
            background: var(--neon-green);
            color: #000;
        }

        .link-btn {
            background: rgba(0, 255, 136, 0.15);
            color: var(--neon-green);
            border: 1.5px solid rgba(0, 255, 136, 0.5);
        }
        .link-btn:hover {
            background: rgba(0, 255, 136, 0.3);
            transform: translateY(-2px);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
            padding: 15px;
            background: rgba(0, 20, 50, 0.6);
            border-radius: 14px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
        }
        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state i {
            font-size: 60px;
            color: var(--neon-red);
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 20, 50, 0.95);
            border: 2px solid var(--neon-cyan);
            border-radius: 14px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.5);
            transform: translateX(200px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 9999;
            backdrop-filter: blur(10px);
        }
        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }
        .toast i {
            font-size: 20px;
            color: var(--neon-green);
        }

        /* Lightbox untuk foto */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        .lightbox.active { display: flex; }
        .lightbox img {
            max-width: 95%;
            max-height: 85vh;
            border-radius: 16px;
            border: 3px solid var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.7);
        }
        .lightbox-close {
            position: absolute;
            top: 25px;
            right: 30px;
            font-size: 36px;
            color: var(--neon-cyan);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .lightbox-close:hover {
            color: var(--neon-red);
            transform: rotate(90deg);
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 32px; }
            .note-title { font-size: 19px; }
            .stats-bar { flex-direction: column; gap: 15px; }
            .action-buttons { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    
    <div class="container">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Kembali ke Portal
        </a>

        <div class="header">
            <h1>🎧 KENDALA ALL</h1>
            <p>Daftar kendala dan solusi - Data diambil dari Google Sheets</p>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Cari kendala..." oninput="filterNotes()">
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalNotes">0</div>
                <div class="stat-label">Total Catatan</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="withPhotos">0</div>
                <div class="stat-label">Dengan Foto</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="withLinks">0</div>
                <div class="stat-label">Dengan Link</div>
            </div>
        </div>

        <div id="notesContainer" class="notes-list">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>🔄 Memuat data dari Google Sheets...</p>
            </div>
        </div>
    </div>

    <!-- Lightbox untuk foto -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img id="lightboxImg" src="" alt="Preview Foto">
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Berhasil disalin!</span>
    </div>

    <script>
        // === KONFIGURASI GOOGLE SHEETS ===
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        const GID = '1251944242';
        const RANGE = 'C2:F300';
        
        // URL CSV export (public access)
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}&range=${RANGE}`;

        let allNotes = [];

        // === INISIALISASI ===
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
        });

        // === FETCH DATA DARI GOOGLE SHEETS ===
        async function fetchData() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('Gagal mengambil data');
                
                const csvText = await response.text();
                const notes = parseCSV(csvText);
                
                allNotes = notes.filter(note => note.judul && note.judul.trim() !== '');
                
                renderNotes(allNotes);
                updateStats();
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('notesContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>❌ Gagal Memuat Data</h3>
                        <p style="margin-top:10px;color:var(--neon-red);">
                            Pastikan Google Sheet dipublikasikan sebagai "Anyone with the link can view"<br>
                            atau cek koneksi internet Anda.
                        </p>
                        <button onclick="fetchData()" class="copy-btn" style="margin-top:20px;">
                            <i class="fas fa-redo"></i> Coba Lagi
                        </button>
                    </div>
                `;
            }
        }

        // === PARSE CSV ===
        function parseCSV(csv) {
            const lines = csv.split('\n').filter(line => line.trim());
            const notes = [];
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                // Simple CSV parser (handle quoted values)
                const values = [];
                let current = '';
                let inQuotes = false;
                
                for (let char of line) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim().replace(/^"|"$/g, ''));
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim().replace(/^"|"$/g, ''));
                
                if (values.length >= 4) {
                    notes.push({
                        judul: values[0] || '',
                        jawaban1: values[1] || '',
                        jawaban2: values[2] || '',
                        jawaban3: values[3] || ''
                    });
                }
            }
            return notes;
        }

        // === RENDER NOTES ===
        function renderNotes(notes) {
            const container = document.getElementById('notesContainer');
            
            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-clipboard-list"></i>
                        <h3>Tidak Ada Data</h3>
                        <p style="margin-top:10px;">Belum ada kendala yang tercatat atau kolom JUDUL kosong.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = notes.map((note, index) => {
                const hasPhoto = detectPhoto(note);
                const links1 = extractLinks(note.jawaban1);
                const links2 = extractLinks(note.jawaban2);
                const links3 = extractLinks(note.jawaban3);
                
                return `
                    <div class="note-card" data-index="${index}">
                        <h3 class="note-title">
                            <i class="fas fa-headset"></i>
                            ${escapeHtml(note.judul)}
                        </h3>
                        
                        ${hasPhoto ? `
                            <div class="photo-container">
                                <img src="${hasPhoto}" alt="Foto Kendala" onclick="openLightbox('${hasPhoto}')">
                                <div class="action-buttons">
                                    <button class="copy-btn" onclick="copyPhoto('${hasPhoto}', this)">
                                        <i class="fas fa-copy"></i> Copy Foto
                                    </button>
                                </div>
                            </div>
                        ` : ''}
                        
                        <div class="note-answers">
                            ${note.jawaban1 ? `
                                <div class="answer-item">
                                    <div class="answer-label">✅ JAWABAN 1</div>
                                    <div class="answer-content">${formatContent(note.jawaban1)}</div>
                                    ${links1.length > 0 ? `
                                        <div class="action-buttons">
                                            ${links1.map(link => `
                                                <a href="${link}" target="_blank" class="link-btn">
                                                    <i class="fas fa-external-link-alt"></i> Buka Link
                                                </a>
                                            `).join('')}
                                            <button class="copy-btn" onclick="copyText('${escapeJs(note.jawaban1)}', this)">
                                                <i class="fas fa-copy"></i> Copy
                                            </button>
                                        </div>
                                    ` : `
                                        <button class="copy-btn" onclick="copyText('${escapeJs(note.jawaban1)}', this)">
                                            <i class="fas fa-copy"></i> Copy Semua
                                        </button>
                                    `}
                                </div>
                            ` : ''}
                            
                            ${note.jawaban2 ? `
                                <div class="answer-item">
                                    <div class="answer-label">✅ JAWABAN 2</div>
                                    <div class="answer-content">${formatContent(note.jawaban2)}</div>
                                    ${links2.length > 0 ? `
                                        <div class="action-buttons">
                                            ${links2.map(link => `
                                                <a href="${link}" target="_blank" class="link-btn">
                                                    <i class="fas fa-external-link-alt"></i> Buka Link
                                                </a>
                                            `).join('')}
                                            <button class="copy-btn" onclick="copyText('${escapeJs(note.jawaban2)}', this)">
                                                <i class="fas fa-copy"></i> Copy
                                            </button>
                                        </div>
                                    ` : `
                                        <button class="copy-btn" onclick="copyText('${escapeJs(note.jawaban2)}', this)">
                                            <i class="fas fa-copy"></i> Copy Semua
                                        </button>
                                    `}
                                </div>
                            ` : ''}
                            
                            ${note.jawaban3 ? `
                                <div class="answer-item">
                                    <div class="answer-label">✅ JAWABAN 3</div>
                                    <div class="answer-content">${formatContent(note.jawaban3)}</div>
                                    ${links3.length > 0 ? `
                                        <div class="action-buttons">
                                            ${links3.map(link => `
                                                <a href="${link}" target="_blank" class="link-btn">
                                                    <i class="fas fa-external-link-alt"></i> Buka Link
                                                </a>
                                            `).join('')}
                                            <button class="copy-btn" onclick="copyText('${escapeJs(note.jawaban3)}', this)">
                                                <i class="fas fa-copy"></i> Copy
                                            </button>
                                        </div>
                                    ` : `
                                        <button class="copy-btn" onclick="copyText('${escapeJs(note.jawaban3)}', this)">
                                            <i class="fas fa-copy"></i> Copy Semua
                                        </button>
                                    `}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // === DETEKSI FOTO ===
        function detectPhoto(note) {
            const allText = [note.judul, note.jawaban1, note.jawaban2, note.jawaban3].join(' ');
            // Match image URLs
            const photoRegex = /https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp)(\?.*)?/i;
            const match = allText.match(photoRegex);
            return match ? match[0] : null;
        }

        // === EKSTRAK LINK ===
        function extractLinks(text) {
            if (!text) return [];
            // Match http/https URLs
            const linkRegex = /https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi;
            const matches = text.match(linkRegex) || [];
            // Remove duplicates
            return [...new Set(matches)];
        }

        // === FORMAT CONTENT (convert links to clickable) ===
        function formatContent(text) {
            if (!text) return '';
            let formatted = escapeHtml(text);
            // Convert URLs to clickable links
            formatted = formatted.replace(
                /(https?:\/\/[^\s<>"{}|\\^`\[\]]+)/gi,
                '<a href="$1" target="_blank" rel="noopener">$1</a>'
            );
            return formatted;
        }

        // === ESCAPE HTML ===
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // === ESCAPE FOR JS STRING ===
        function escapeJs(str) {
            return str
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'")
                .replace(/\n/g, '\\n')
                .replace(/\r/g, '\\r');
        }

        // === FILTER NOTES ===
        function filterNotes() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allNotes.filter(note => 
                note.judul.toLowerCase().includes(query) ||
                note.jawaban1.toLowerCase().includes(query) ||
                note.jawaban2.toLowerCase().includes(query) ||
                note.jawaban3.toLowerCase().includes(query)
            );
            renderNotes(filtered);
        }

        // === UPDATE STATS ===
        function updateStats() {
            document.getElementById('totalNotes').textContent = allNotes.length;
            document.getElementById('withPhotos').textContent = 
                allNotes.filter(n => detectPhoto(n)).length;
            document.getElementById('withLinks').textContent = 
                allNotes.filter(n => 
                    extractLinks(n.jawaban1).length > 0 ||
                    extractLinks(n.jawaban2).length > 0 ||
                    extractLinks(n.jawaban3).length > 0
                ).length;
        }

        // === COPY TEXT ===
        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Teks berhasil disalin!');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                showToast('❌ Gagal menyalin teks');
            });
        }

        // === COPY PHOTO ===
        async function copyPhoto(url, btn) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                await navigator.clipboard.write([
                    new ClipboardItem({ [blob.type]: blob })
                ]);
                showToast('✅ Foto berhasil disalin!');
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-copy"></i> Copy Foto';
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                showToast('⚠️ Browser memblokir copy foto. Klik kanan foto → Copy Image');
            }
        }

        // === LIGHTBOX ===
        function openLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') closeLightbox();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        // === TOAST ===
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>

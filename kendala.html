<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00ffff">
    <title>KENDALA ALL - LINE TOGEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00ffff; --neon-blue: #0088ff; --bg-dark: #000a1e;
            --text-main: #00ffff; --text-secondary: #66ffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Exo 2', sans-serif; background: var(--bg-dark);
            color: var(--text-main); min-height: 100vh;
        }
        .cyber-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(0,243,255,0.15), transparent 40%),
                        linear-gradient(180deg, #000a1e 0%, #001133 100%);
            z-index: -2;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .header {
            text-align: center; margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn {
            background: rgba(0,255,255,0.2); border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 12px 24px; border-radius: 12px;
            text-decoration: none; font-weight: bold; transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(0,255,255,0.4); transform: scale(1.05); }
        .title {
            font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 900;
            color: var(--neon-cyan); text-shadow: 0 0 30px rgba(0,255,255,0.7);
        }
        .notes-list { margin-top: 30px; }
        .note-card {
            background: rgba(0,20,50,0.7); border: 2px solid rgba(0,255,255,0.4);
            border-radius: 16px; padding: 24px; margin-bottom: 20px;
            transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,255,255,0.3);
            border-color: var(--neon-cyan);
        }
        .note-title {
            font-family: 'Orbitron', sans-serif; font-size: 20px;
            color: var(--neon-cyan); margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(0,255,255,0.7);
        }
        .note-content {
            color: var(--text-secondary); line-height: 1.6;
            white-space: pre-wrap;
        }
        .copy-btn {
            background: rgba(0,255,255,0.2); border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 8px 16px; border-radius: 8px;
            cursor: pointer; margin-top: 15px; transition: all 0.3s;
        }
        .copy-btn:hover { background: rgba(0,255,255,0.4); }
        .search-bar {
            margin-bottom: 30px; text-align: center;
        }
        .search-input {
            width: 100%; max-width: 500px; padding: 14px 20px;
            background: rgba(0,20,50,0.8); border: 2px solid rgba(0,255,255,0.5);
            border-radius: 12px; color: var(--neon-cyan); font-size: 16px;
            font-family: 'Exo 2', sans-serif;
        }
        .search-input:focus {
            outline: none; border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
        }
        @media (max-width: 768px) {
            .title { font-size: 32px; }
            .header { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">⬅️ Kembali ke Portal</a>
            <h1 class="title">🎧 KENDALA ALL</h1>
        </div>

        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" 
                   placeholder="🔍 Cari kendala..." oninput="searchNotes()">
        </div>

        <div class="notes-list" id="notesList">
            <!-- Catatan akan dimuat di sini -->
            <div class="note-card">
                <h3 class="note-title">Contoh Kendala 1</h3>
                <div class="note-content">Ini adalah contoh catatan kendala. Konten akan dimuat dari Google Apps Script.</div>
                <button class="copy-btn" onclick="copyText(this)">📋 Copy</button>
            </div>
        </div>
    </div>

    <script>
        // === SEARCH NOTES ===
        function searchNotes() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.note-card');
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(query) ? 'block' : 'none';
            });
        }

        // === COPY TEXT ===
        function copyText(btn) {
            const content = btn.previousElementSibling.textContent;
            navigator.clipboard.writeText(content).then(() => {
                btn.textContent = '✅ Copied!';
                setTimeout(() => btn.textContent = '📋 Copy', 2000);
            });
        }

        // === LOAD NOTES (Optional - Connect to Google Apps Script) ===
        function loadNotes() {
            // Uncomment jika ingin connect ke Google Apps Script
            /*
            google.script.run
                .withSuccessHandler(notes => {

                    list.innerHTML = '';

                        const card = document.createElement('div');
                        card.className = 'note-card';
                        card.innerHTML = `
                            <h3 class="note-title">${note.title}</h3>
                            <div class="note-content">${note.content}</div>
                            <button class="copy-btn" onclick="copyText(this)">📋 Copy</button>
                        `;
                        list.appendChild(card);
                    });
                })
                .getNotes('KENDALA ALL');
            */
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // loadNotes(); // Uncomment jika pakai Google Apps Script
        });
    </script>
</body>
</html>

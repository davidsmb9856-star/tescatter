<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00ffff">
    <title>🎧 KENDALA ALL - LINE TOGEL</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===================================
           === CYBER CORE VARIABLES ===
           =================================== */
        :root {
            --neon-cyan: #00ffff;
            --neon-blue: #0088ff;
            --neon-purple: #9d00ff;
            --neon-green: #00ff88;
            --neon-yellow: #ffff00;
            --neon-red: #ff0066;
            --neon-pink: #ff00ff;
            
            --bg-dark: #000a1e;
            --bg-card: rgba(0, 20, 50, 0.7);
            --bg-card-hover: rgba(0, 40, 100, 0.85);
            --bg-panel: rgba(2, 12, 32, 0.92);
            
            --text-main: #00ffff;
            --text-secondary: #66ffff;
            --text-dim: #33cccc;
            
            --border-glow: rgba(0, 255, 255, 0.5);
            --shadow-glow: rgba(0, 255, 255, 0.3);
            --shadow-intense: rgba(0, 255, 255, 0.6);
            
            --transition-fast: 0.2s ease;
            --transition-normal: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            --transition-slow: 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* ===================================
           === RESET & BASE ===
           =================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            line-height: 1.6;
        }

        /* ===================================
           === CYBER BACKGROUND EFFECTS ===
           =================================== */
        .cyber-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 243, 255, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(157, 0, 255, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 136, 255, 0.08) 0%, transparent 60%),
                linear-gradient(180deg, #000a1e 0%, #001133 40%, #000820 100%);
            z-index: -3;
        }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            animation: gridFloat 40s linear infinite;
            pointer-events: none;
        }

        @keyframes gridFloat {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .scan-line {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            opacity: 0.4;
            animation: scanDown 10s linear infinite;
            z-index: 1;
            pointer-events: none;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        @keyframes scanDown {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { top: 110%; opacity: 0; }
        }

        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            z-index: -1;
            pointer-events: none;
        }

        /* ===================================
           === CONTAINER & LAYOUT ===
           =================================== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        /* ===================================
           === HEADER ===
           =================================== */
        .header {
            text-align: center;
            margin-bottom: 35px;
            padding: 25px 20px;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), var(--neon-cyan), transparent);
            animation: glowLine 3s ease-in-out infinite;
        }

        @keyframes glowLine {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; box-shadow: 0 0 20px var(--neon-cyan); }
        }

        .back-btn {
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 255, 255, 0.15);
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition-normal);
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: translateY(-50%) translateX(-3px);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.5);
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 52px;
            font-weight: 900;
            background: linear-gradient(90deg, #00f3ff, #9d00ff, #00f3ff, #ff00ff, #00f3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 400% 400%;
            animation: neonFlow 4s ease infinite, textPulse 2s ease-in-out infinite alternate;
            text-shadow: 0 0 40px rgba(0, 243, 255, 0.7);
            margin-bottom: 12px;
            letter-spacing: 2px;
            position: relative;
        }

        @keyframes neonFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes textPulse {
            0% { filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.5)); }
            100% { filter: drop-shadow(0 0 45px rgba(0, 243, 255, 0.9)); }
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
            letter-spacing: 3px;
            opacity: 0.9;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 255, 136, 0.15);
            border: 2px solid rgba(0, 255, 136, 0.5);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            color: var(--neon-green);
            margin-top: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            animation: badgeGlow 2.5s infinite;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
            50% { box-shadow: 0 0 30px rgba(0, 255, 136, 0.8); }
        }

        .status-dot {
            width: 10px; height: 10px;
            background: var(--neon-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 15px var(--neon-green);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        /* ===================================
           === SEARCH & STATS ===
           =================================== */
        .search-section {
            margin: 25px 0 30px;
            text-align: center;
        }

        .search-bar {
            position: relative;
            max-width: 600px;
            margin: 0 auto 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 16px 24px 16px 55px;
            background: rgba(0, 20, 50, 0.8);
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 16px;
            color: var(--text-main);
            font-size: 16px;
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
            transition: var(--transition-normal);
            backdrop-filter: blur(10px);
        }

        .search-bar input::placeholder {
            color: rgba(0, 255, 255, 0.5);
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            background: rgba(0, 25, 60, 0.9);
        }

        .search-bar i {
            position: absolute;
            left: 20px; top: 50%;
            transform: translateY(-50%);
            color: var(--neon-cyan);
            font-size: 18px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            padding: 15px 20px;
            background: rgba(0, 20, 50, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            max-width: 800px;
            margin: 0 auto;
        }

        .stat-item {
            text-align: center;
            padding: 8px 20px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
            display: block;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        /* ===================================
           === KENDALA CARDS ===
           =================================== */
        .kendala-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .kendala-card {
            background: var(--bg-card);
            border: 2px solid var(--border-glow);
            border-radius: 24px;
            padding: 28px 32px;
            transition: var(--transition-normal);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px);
            animation: cardEnter 0.5s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .kendala-card:nth-child(1) { animation-delay: 0.1s; }
        .kendala-card:nth-child(2) { animation-delay: 0.15s; }
        .kendala-card:nth-child(3) { animation-delay: 0.2s; }
        .kendala-card:nth-child(4) { animation-delay: 0.25s; }
        .kendala-card:nth-child(5) { animation-delay: 0.3s; }

        @keyframes cardEnter {
            to { opacity: 1; transform: translateY(0); }
        }

        .kendala-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 5px; height: 100%;
            background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            box-shadow: 0 0 20px var(--neon-cyan);
            transition: var(--transition-normal);
        }

        .kendala-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-6px) scale(1.01);
            border-color: var(--neon-cyan);
            box-shadow: 
                0 20px 60px rgba(0, 255, 255, 0.3),
                0 0 50px rgba(0, 243, 255, 0.2),
                inset 0 0 30px rgba(0, 255, 255, 0.1);
        }

        .kendala-card:hover::before {
            width: 7px;
            box-shadow: 0 0 35px var(--neon-cyan);
        }

        .kendala-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            transition: var(--transition-fast);
        }

        .kendala-title:hover {
            color: var(--neon-green);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.9);
        }

        .kendala-title::after {
            content: '▼';
            font-size: 14px;
            transition: transform 0.3s ease;
            color: var(--neon-cyan);
        }

        .kendala-card.expanded .kendala-title::after {
            transform: rotate(180deg);
        }

        .kendala-answers {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .kendala-card.expanded .kendala-answers {
            display: block;
        }

        .answer-item {
            margin-bottom: 18px;
            padding: 18px 20px;
            background: rgba(0, 15, 40, 0.6);
            border-radius: 14px;
            border-left: 4px solid var(--neon-cyan);
            transition: var(--transition-fast);
            position: relative;
        }

        .answer-item:hover {
            background: rgba(0, 25, 60, 0.7);
            border-left-color: var(--neon-green);
            transform: translateX(3px);
        }

        .answer-label {
            font-weight: 700;
            color: var(--neon-yellow);
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .answer-label i {
            font-size: 16px;
        }

        .answer-content {
            color: var(--text-secondary);
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition-fast);
            padding: 8px 12px;
            border-radius: 8px;
        }

        .answer-content:hover {
            background: rgba(0, 255, 255, 0.1);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        .answer-content a {
            color: var(--neon-green);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition-fast);
            position: relative;
        }

        .answer-content a::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 2px;
            background: var(--neon-green);
            transition: var(--transition-fast);
        }

        .answer-content a:hover::after {
            width: 100%;
        }

        .answer-content a:hover {
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
        }

        /* ===================================
           === PHOTO SECTION ===
           =================================== */
        .photo-container {
            margin: 18px 0;
            text-align: center;
            padding: 15px;
            background: rgba(0, 20, 50, 0.4);
            border-radius: 14px;
            border: 1px dashed rgba(0, 255, 255, 0.4);
        }

        .photo-img {
            max-width: 100%;
            max-height: 350px;
            border-radius: 14px;
            border: 3px solid var(--neon-cyan);
            cursor: pointer;
            transition: var(--transition-normal);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
        }

        .photo-img:hover {
            transform: scale(1.03);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.7);
        }

        .copy-photo-btn {
            background: rgba(0, 255, 255, 0.15);
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 22px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 12px;
            transition: var(--transition-normal);
            font-weight: 700;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .copy-photo-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
        }

        /* ===================================
           === LINK BUTTONS ===
           =================================== */
        .link-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .open-link-btn {
            background: rgba(0, 200, 255, 0.15);
            border: 2px solid #00c8ff;
            color: #00c8ff;
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: var(--transition-normal);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .open-link-btn:hover {
            background: rgba(0, 200, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.6);
        }

        .open-link-btn i {
            font-size: 12px;
        }

        /* ===================================
           === ADD TO STICKY BUTTON ===
           =================================== */
        .add-to-sticky-btn {
            background: rgba(157, 0, 255, 0.15);
            border: 2px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 12px;
            transition: var(--transition-normal);
            font-weight: 700;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .add-to-sticky-btn:hover {
            background: rgba(157, 0, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.6);
        }

        /* ===================================
           === EMPTY & ERROR STATES ===
           =================================== */
        .no-data, .error-msg, .loading {
            text-align: center;
            padding: 60px 30px;
            color: var(--text-secondary);
        }

        .loading {
            color: var(--neon-cyan);
        }

        .loading-spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(0, 255, 255, 0.2);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            color: var(--neon-red);
            background: rgba(255, 100, 100, 0.1);
            border-radius: 16px;
            border: 1px solid var(--neon-red);
            margin: 20px 0;
        }

        /* ===================================
           === LIGHTBOX ===
           =================================== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 5, 20, 0.97);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(15px);
            animation: fadeIn 0.3s ease;
        }

        .lightbox.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .lightbox-close {
            position: absolute;
            top: 25px; right: 30px;
            font-size: 36px;
            color: var(--neon-cyan);
            cursor: pointer;
            transition: var(--transition-normal);
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
            z-index: 10000;
        }

        .lightbox-close:hover {
            color: var(--neon-red);
            transform: rotate(90deg) scale(1.1);
            text-shadow: 0 0 25px rgba(255, 0, 102, 0.9);
        }

        .lightbox-img {
            max-width: 95%;
            max-height: 80vh;
            border-radius: 16px;
            border: 4px solid var(--neon-cyan);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.6);
            transition: var(--transition-normal);
            cursor: grab;
        }

        .lightbox-img:active {
            cursor: grabbing;
        }

        .lightbox-controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .lightbox-btn {
            background: rgba(0, 255, 255, 0.15);
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px 28px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: var(--transition-normal);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lightbox-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.7);
        }

        .zoom-slider {
            width: 250px;
            margin-top: 20px;
        }

        .zoom-slider input {
            width: 100%;
            accent-color: var(--neon-cyan);
        }

        /* ===================================
           === TOAST NOTIFICATION ===
           =================================== */
        .toast {
            position: fixed;
            bottom: 35px;
            right: 35px;
            background: rgba(2, 12, 32, 0.95);
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 16px 28px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 15px;
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 0 35px rgba(0, 255, 255, 0.5);
            transform: translateX(200px);
            opacity: 0;
            transition: var(--transition-normal);
            backdrop-filter: blur(10px);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast i {
            font-size: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        /* ===================================
           === STICKY NOTES PANEL ===
           =================================== */
        .sticky-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            max-width: 90vw;
            max-height: 85vh;
            background: rgba(2, 12, 32, 0.95);
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            padding: 20px;
            z-index: 9998;
            display: none;
            flex-direction: column;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.5);
            animation: slideInUp 0.4s ease;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sticky-panel.active {
            display: flex;
        }

        .sticky-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }

        .sticky-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        .sticky-close {
            background: none;
            border: none;
            color: var(--neon-red);
            font-size: 24px;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .sticky-close:hover {
            transform: rotate(90deg);
            text-shadow: 0 0 15px var(--neon-red);
        }

        .sticky-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .sticky-list::-webkit-scrollbar {
            width: 6px;
        }

        .sticky-list::-webkit-scrollbar-track {
            background: rgba(0, 10, 30, 0.5);
            border-radius: 3px;
        }

        .sticky-list::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 3px;
        }

        .sticky-note {
            background: rgba(0, 20, 50, 0.7);
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            cursor: grab;
            transition: var(--transition-fast);
            position: relative;
        }

        .sticky-note:active {
            cursor: grabbing;
        }

        .sticky-note.dragging {
            opacity: 0.8;
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
            z-index: 100;
        }

        .sticky-note:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        .sticky-note-content {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            cursor: pointer;
            padding: 5px;
            border-radius: 6px;
            transition: var(--transition-fast);
        }

        .sticky-note-content:hover {
            background: rgba(0, 255, 255, 0.1);
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.7);
        }

        .sticky-note-content img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin: 8px 0;
            border: 2px solid var(--neon-cyan);
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .sticky-note-content img:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }

        .sticky-note-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            justify-content: flex-end;
        }

        .sticky-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .sticky-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .sticky-btn.edit {
            color: var(--neon-yellow);
            border-color: var(--neon-yellow);
        }

        .sticky-btn.edit:hover {
            background: rgba(255, 255, 0, 0.2);
        }

        .sticky-btn.delete {
            color: var(--neon-red);
            border-color: var(--neon-red);
        }

        .sticky-btn.delete:hover {
            background: rgba(255, 100, 100, 0.2);
        }

        .sticky-btn.move-up,
        .sticky-btn.move-down {
            color: var(--neon-purple);
            border-color: var(--neon-purple);
        }

        .sticky-btn.move-up:hover,
        .sticky-btn.move-down:hover {
            background: rgba(157, 0, 255, 0.2);
        }

        .sticky-note.editing .sticky-note-content {
            background: rgba(0, 30, 60, 0.8);
            border: 1px dashed var(--neon-cyan);
        }

        .sticky-note.editing .sticky-note-actions {
            display: none;
        }

        .sticky-edit-input {
            width: 100%;
            min-height: 80px;
            background: rgba(0, 15, 40, 0.8);
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            color: var(--text-main);
            padding: 10px;
            font-size: 14px;
            font-family: 'Exo 2', sans-serif;
            resize: vertical;
            margin-bottom: 10px;
        }

        .sticky-edit-input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .sticky-edit-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .sticky-edit-save,
        .sticky-edit-cancel {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .sticky-edit-save {
            background: var(--neon-green);
            border: none;
            color: #000;
        }

        .sticky-edit-save:hover {
            box-shadow: 0 0 15px var(--neon-green);
        }

        .sticky-edit-cancel {
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
        }

        .sticky-edit-cancel:hover {
            background: rgba(255, 100, 100, 0.4);
        }

        /* ===================================
           === STICKY FAB BUTTON ===
           =================================== */
        .sticky-fab {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, var(--neon-cyan), var(--neon-blue));
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            color: #000;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 9997;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
            transition: var(--transition-normal);
            animation: pulseFab 2s infinite;
        }

        .sticky-fab:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.9);
        }

        @keyframes pulseFab {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); }
            50% { box-shadow: 0 0 35px rgba(0, 255, 255, 0.9); }
        }

        /* ===================================
           === RESPONSIVE ===
           =================================== */
        @media (max-width: 768px) {
            .container { padding: 20px 15px; }
            .title { font-size: 38px; letter-spacing: 1px; }
            .subtitle { font-size: 15px; letter-spacing: 2px; }
            .kendala-card { padding: 22px 25px; }
            .kendala-title { font-size: 19px; }
            .stats-bar { flex-direction: column; gap: 15px; }
            .search-bar { max-width: 100%; }
            .lightbox-controls { flex-direction: column; align-items: center; }
            .lightbox-btn { width: 100%; max-width: 300px; justify-content: center; }
            .zoom-slider { width: 100%; max-width: 300px; }
            .sticky-panel {
                width: 95vw;
                bottom: 15px;
                right: 15px;
                left: 15px;
            }
        }

        /* ===================================
           === SCROLLBAR ===
           =================================== */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 10, 30, 0.5);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00ffff, #0088ff);
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00ffff, #9d00ff);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.8);
        }

        /* ===================================
           === SELECTION ===
           =================================== */
        ::selection {
            background: rgba(0, 255, 255, 0.3);
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="cyber-bg"></div>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>
    <div class="scan-line"></div>
    <div class="noise-overlay"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Kembali
            </a>
            <h1 class="title">🎧 KENDALA ALL</h1>
            <p class="subtitle">Database Solusi & Bantuan Pengguna</p>
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>SYSTEM ONLINE</span>
            </div>
        </header>

        <!-- Search & Stats -->
        <div class="search-section">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="🔍 Cari kendala atau solusi..." oninput="searchKendala()">
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-value" id="totalItems">0</span>
                    <span class="stat-label">Total Data</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="withPhotos">0</span>
                    <span class="stat-label">Dengan Foto</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="withLinks">0</span>
                    <span class="stat-label">Dengan Link</span>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="kendalaContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>⏳ Menghubungi database...</p>
                <p style="font-size: 13px; opacity: 0.7; margin-top: 10px;">Mengambil data dari Google Sheets</p>
            </div>
        </div>
    </div>

    <!-- Lightbox for Photos -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-img" id="lightboxImg" src="" alt="Preview" draggable="false">
        <div class="lightbox-controls">
            <button class="lightbox-btn" onclick="changeLightbox(-1)">
                <i class="fas fa-chevron-left"></i> Prev
            </button>
            <button class="lightbox-btn" onclick="copyLightboxPhoto()">
                <i class="fas fa-copy"></i> Copy Foto
            </button>
            <button class="lightbox-btn" onclick="changeLightbox(1)">
                Next <i class="fas fa-chevron-right"></i>
            </button>
        </div>
        <div class="zoom-slider">
            <input type="range" id="zoomSlider" min="0.5" max="4" step="0.1" value="1" oninput="updateZoom()">
        </div>
    </div>

    <!-- Sticky Notes FAB -->
    <div class="sticky-fab" onclick="toggleStickyPanel()" title="Buka Sticky Notes">
        <i class="fas fa-sticky-note"></i>
    </div>

    <!-- Sticky Notes Panel -->
    <div class="sticky-panel" id="stickyPanel">
        <div class="sticky-header">
            <span class="sticky-title">📝 Sticky Notes</span>
            <button class="sticky-close" onclick="toggleStickyPanel()">&times;</button>
        </div>
        <div class="sticky-list" id="stickyList"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Notifikasi</span>
    </div>

    <script>
        /* ===================================
           === KONFIGURASI ===
           =================================== */
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        const GID = '1251944242';
        const RANGE = 'C2:F300';
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&range=${RANGE}`;

        /* ===================================
           === VARIABEL GLOBAL ===
           =================================== */
        let allKendala = [];
        let filteredKendala = [];
        let lightboxImages = [];
        let lightboxIndex = 0;
        let zoomLevel = 1;
        let stickyNotes = JSON.parse(localStorage.getItem('kendalaStickyNotes') || '[]');
        let draggedNote = null;

        /* ===================================
           === FUNGSI UTAMA: LOAD DATA ===
           =================================== */
        async function loadKendalaData() {
            try {
                const response = await fetch(DATA_URL);
                const text = await response.text();
                
                // Parse JSON dari Google Visualization API
                const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
                if (!jsonMatch) throw new Error('Gagal parse response');
                
                const data = JSON.parse(jsonMatch[1]);
                const rows = data.table?.rows || [];
                
                // Parse dan filter data
                allKendala = rows
                    .map(row => {
                        const cells = row.c || [];
                        return {
                            judul: cells[0]?.v?.toString().trim() || '',
                            jawaban1: cells[1]?.v?.toString().trim() || '',
                            jawaban2: cells[2]?.v?.toString().trim() || '',
                            jawaban3: cells[3]?.v?.toString().trim() || ''
                        };
                    })
                    .filter(item => item.judul && item.judul !== '');
                
                filteredKendala = [...allKendala];
                renderKendala();
                updateStats();
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('kendalaContainer').innerHTML = `
                    <div class="error-msg">
                        <i class="fas fa-exclamation-triangle" style="font-size: 32px; margin-bottom: 15px;"></i>
                        <p><strong>⚠️ Gagal memuat data</strong></p>
                        <p style="font-size: 14px; margin-top: 10px; opacity: 0.9;">
                            Pastikan Google Sheet sudah dipublikasikan:<br>
                            File → Share → Publish to web → Entire Document
                        </p>
                        <p style="font-size: 12px; margin-top: 15px; opacity: 0.7;">
                            ${error.message}
                        </p>
                    </div>
                `;
            }
        }

        /* ===================================
           === RENDER DATA KE HTML ===
           =================================== */
        function renderKendala(data = filteredKendala) {
            const container = document.getElementById('kendalaContainer');
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-search" style="font-size: 48px; margin-bottom: 20px; opacity: 0.5;"></i>
                        <p>Tidak ada data yang ditemukan</p>
                        <p style="font-size: 14px; opacity: 0.7; margin-top: 10px;">
                            Coba kata kunci pencarian lain
                        </p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `<div class="kendala-list">
                ${data.map((item, index) => createKendalaCard(item, index)).join('')}
            </div>`;
            
            // Add event listeners for expand/collapse
            document.querySelectorAll('.kendala-title').forEach(title => {
                title.addEventListener('click', function() {
                    this.parentElement.classList.toggle('expanded');
                });
            });
        }

        /* ===================================
           === BUAT KARTU KENDALA ===
           =================================== */
        function createKendalaCard(item, index) {
            const hasPhoto = detectPhotoLink(item);
            const links1 = extractLinks(item.jawaban1);
            const links2 = extractLinks(item.jawaban2);
            const links3 = extractLinks(item.jawaban3);
            const hasLinks = links1.length > 0 || links2.length > 0 || links3.length > 0;
            
            return `
            <div class="kendala-card" data-index="${index}">
                <h3 class="kendala-title">
                    ${escapeHtml(item.judul)}
                    <i class="fas fa-chevron-down" style="font-size: 12px;"></i>
                </h3>
                <div class="kendala-answers">
                    ${item.jawaban1 ? `
                    <div class="answer-item">
                        <div class="answer-label">
                            <i class="fas fa-comment-alt"></i>
                            JAWABAN 1
                        </div>
                        <div class="answer-content" onclick="copyToClipboard('${escapeJs(item.jawaban1)}', 'Jawaban 1')">${formatContent(item.jawaban1, links1)}</div>
                        ${hasPhoto ? createPhotoSection(item) : ''}
                        ${links1.length > 0 ? createLinkButtons(links1) : ''}
                        <button class="add-to-sticky-btn" onclick="addToSticky('${escapeJs(item.judul)}', '${escapeJs(item.jawaban1)}')">
                            <i class="fas fa-plus"></i> Tambah ke Sticky
                        </button>
                    </div>` : ''}
                    
                    ${item.jawaban2 ? `
                    <div class="answer-item">
                        <div class="answer-label">
                            <i class="fas fa-comment-alt"></i>
                            JAWABAN 2
                        </div>
                        <div class="answer-content" onclick="copyToClipboard('${escapeJs(item.jawaban2)}', 'Jawaban 2')">${formatContent(item.jawaban2, links2)}</div>
                        ${links2.length > 0 ? createLinkButtons(links2) : ''}
                        <button class="add-to-sticky-btn" onclick="addToSticky('${escapeJs(item.judul)}', '${escapeJs(item.jawaban2)}')">
                            <i class="fas fa-plus"></i> Tambah ke Sticky
                        </button>
                    </div>` : ''}
                    
                    ${item.jawaban3 ? `
                    <div class="answer-item">
                        <div class="answer-label">
                            <i class="fas fa-comment-alt"></i>
                            JAWABAN 3
                        </div>
                        <div class="answer-content" onclick="copyToClipboard('${escapeJs(item.jawaban3)}', 'Jawaban 3')">${formatContent(item.jawaban3, links3)}</div>
                        ${links3.length > 0 ? createLinkButtons(links3) : ''}
                        <button class="add-to-sticky-btn" onclick="addToSticky('${escapeJs(item.judul)}', '${escapeJs(item.jawaban3)}')">
                            <i class="fas fa-plus"></i> Tambah ke Sticky
                        </button>
                    </div>` : ''}
                </div>
            </div>`;
        }

        /* ===================================
           === DETEKSI & EKSTRAK LINK ===
           =================================== */
        function detectPhotoLink(item) {
            const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
            return photoPattern.test(item.jawaban1) || 
                   photoPattern.test(item.jawaban2) || 
                   photoPattern.test(item.jawaban3);
        }

        function extractLinks(text) {
            if (!text) return [];
            const urlPattern = /https?:\/\/[^\s<>"{}|\\^`\[\]]+/gi;
            return text.match(urlPattern) || [];
        }

        function formatContent(text, links = []) {
            if (!text) return '';
            let formatted = escapeHtml(text);
            
            links.forEach(link => {
                const displayText = link.length > 45 ? link.substring(0, 42) + '...' : link;
                formatted = formatted.replace(
                    new RegExp(escapeRegExp(link), 'g'),
                    `<a href="${link}" target="_blank" rel="noopener">${displayText}</a>`
                );
            });
            
            return formatted;
        }

        function createPhotoSection(item) {
            const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/i;
            const match = (item.jawaban1 + ' ' + item.jawaban2 + ' ' + item.jawaban3).match(photoPattern);
            
            if (!match) return '';
            
            const photoUrl = match[1];
            // Tambahkan ke array lightbox
            if (!lightboxImages.includes(photoUrl)) {
                lightboxImages.push(photoUrl);
            }
            
            return `
            <div class="photo-container">
                <img src="${photoUrl}" alt="Foto" class="photo-img" 
                     onclick="openLightbox('${photoUrl}')" 
                     onerror="this.parentElement.style.display='none'">
                <button class="copy-photo-btn" onclick="copyPhoto('${photoUrl}')">
                    <i class="fas fa-copy"></i> Copy Foto
                </button>
            </div>`;
        }

        function createLinkButtons(links) {
            if (links.length === 0) return '';
            return `
            <div class="link-buttons">
                ${links.map((link, i) => {
                    const label = links.length > 1 ? `Link ${i+1}` : 'Buka Link';
                    return `<a href="${link}" target="_blank" rel="noopener" class="open-link-btn">
                        <i class="fas fa-external-link-alt"></i> ${label}
                    </a>`;
                }).join('')}
            </div>`;
        }

        /* ===================================
           === COPY FUNCTIONS ===
           =================================== */
        async function copyToClipboard(text, label) {
            if (!text) return;
            
            try {
                await navigator.clipboard.writeText(text);
                showToast(`✅ ${label} disalin!`);
            } catch (err) {
                fallbackCopy(text, label);
            }
        }

        async function copyPhoto(url) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                await navigator.clipboard.write([
                    new ClipboardItem({ [blob.type]: blob })
                ]);
                showToast('✅ Foto disalin!');
            } catch (err) {
                // Fallback: copy URL
                await navigator.clipboard.writeText(url);
                showToast('📋 URL foto disalin!');
            }
        }

        function fallbackCopy(text, label) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast(`✅ ${label} disalin!`);
            } catch (err) {
                showToast(`❌ Gagal menyalin ${label}`);
            }
            document.body.removeChild(textarea);
        }

        /* ===================================
           === LIGHTBOX FUNCTIONS ===
           =================================== */
        function openLightbox(url) {
            lightboxIndex = lightboxImages.indexOf(url);
            if (lightboxIndex === -1) {
                lightboxImages.push(url);
                lightboxIndex = lightboxImages.length - 1;
            }
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
            zoomLevel = 1;
            updateZoom();
        }

        function closeLightbox(event) {
            if (!event || event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
                document.getElementById('lightbox').classList.remove('active');
                document.getElementById('lightboxImg').src = '';
                document.body.style.overflow = '';
            }
        }

        function changeLightbox(direction) {
            lightboxIndex += direction;
            if (lightboxIndex < 0) lightboxIndex = lightboxImages.length - 1;
            if (lightboxIndex >= lightboxImages.length) lightboxIndex = 0;
            document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
            zoomLevel = 1;
            updateZoom();
        }

        function updateZoom() {
            zoomLevel = parseFloat(document.getElementById('zoomSlider').value);
            document.getElementById('lightboxImg').style.transform = `scale(${zoomLevel})`;
        }

        async function copyLightboxPhoto() {
            const url = document.getElementById('lightboxImg').src;
            if (url) await copyPhoto(url);
        }

        // Drag to zoom/pan
        let isDragging = false, startX, startY, currentX = 0, currentY = 0;
        
        document.getElementById('lightboxImg').addEventListener('mousedown', (e) => {
            if (zoomLevel > 1) {
                isDragging = true;
                startX = e.clientX - currentX;
                startY = e.clientY - currentY;
                e.target.style.cursor = 'grabbing';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging && zoomLevel > 1) {
                currentX = e.clientX - startX;
                currentY = e.clientY - startY;
                document.getElementById('lightboxImg').style.transform = 
                    `scale(${zoomLevel}) translate(${currentX}px, ${currentY}px)`;
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            const img = document.getElementById('lightboxImg');
            if (img) img.style.cursor = 'grab';
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').classList.contains('active')) {
                if (e.key === 'ArrowLeft') changeLightbox(-1);
                if (e.key === 'ArrowRight') changeLightbox(1);
                if (e.key === 'Escape') closeLightbox();
                if (e.key === '+') { zoomLevel = Math.min(zoomLevel + 0.2, 4); updateZoom(); }
                if (e.key === '-') { zoomLevel = Math.max(zoomLevel - 0.2, 0.5); updateZoom(); }
            }
        });

        /* ===================================
           === SEARCH & FILTER ===
           =================================== */
        function searchKendala() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            
            filteredKendala = allKendala.filter(item => 
                item.judul.toLowerCase().includes(query) ||
                (item.jawaban1 && item.jawaban1.toLowerCase().includes(query)) ||
                (item.jawaban2 && item.jawaban2.toLowerCase().includes(query)) ||
                (item.jawaban3 && item.jawaban3.toLowerCase().includes(query))
            );
            
            renderKendala();
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalItems').textContent = filteredKendala.length;
            
            const withPhotos = filteredKendala.filter(item => detectPhotoLink(item)).length;
            document.getElementById('withPhotos').textContent = withPhotos;
            
            const withLinks = filteredKendala.filter(item => 
                extractLinks(item.jawaban1).length > 0 ||
                extractLinks(item.jawaban2).length > 0 ||
                extractLinks(item.jawaban3).length > 0
            ).length;
            document.getElementById('withLinks').textContent = withLinks;
        }

        /* ===================================
           === TOAST NOTIFICATION ===
           =================================== */
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        /* ===================================
           === UTILS ===
           =================================== */
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeJs(str) {
            return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        /* ===================================
           === PARTICLE EFFECT ===
           =================================== */
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                const size = Math.random() * 3 + 1;
                particle.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size}px;
                    background: rgba(0, 255, 255, ${Math.random() * 0.5 + 0.2});
                    border-radius: 50%;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    animation: float ${Math.random() * 15 + 10}s infinite linear;
                    box-shadow: 0 0 ${Math.random() * 10 + 5}px rgba(0, 255, 255, 0.5);
                `;
                container.appendChild(particle);
            }
        }

        // Add particle animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
                10% { opacity: 1; }
                90% { opacity: 1; }
                50% { transform: translateY(-200px) translateX(${Math.random() * 100 - 50}px); }
            }
        `;
        document.head.appendChild(style);

        /* ===================================
           === STICKY NOTES FUNCTIONS ===
           =================================== */
        function toggleStickyPanel() {
            const panel = document.getElementById('stickyPanel');
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
                renderStickyNotes();
            }
        }

        function addToSticky(judul, content) {
            const note = {
                id: Date.now(),
                judul: judul,
                content: content,
                createdAt: new Date().toISOString()
            };
            
            stickyNotes.unshift(note); // Add to top
            saveStickyNotes();
            renderStickyNotes();
            showToast('✅ Ditambahkan ke Sticky Notes!');
        }

        function renderStickyNotes() {
            const list = document.getElementById('stickyList');
            if (!list) return;
            
            if (stickyNotes.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:20px;">Belum ada sticky notes</p>';
                return;
            }
            
            list.innerHTML = stickyNotes.map((note, index) => `
                <div class="sticky-note" data-id="${note.id}" draggable="true">
                    <div class="sticky-note-content" onclick="copyToClipboard('${escapeJs(note.content)}', 'Sticky Note')">
                        ${formatStickyContent(note.content)}
                    </div>
                    <div class="sticky-note-actions">
                        <button class="sticky-btn move-up" onclick="moveStickyNote(${index}, -1)" title="Naik">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                        <button class="sticky-btn move-down" onclick="moveStickyNote(${index}, 1)" title="Turun">
                            <i class="fas fa-arrow-down"></i>
                        </button>
                        <button class="sticky-btn edit" onclick="editStickyNote(${note.id})" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="sticky-btn delete" onclick="deleteStickyNote(${note.id})" title="Hapus">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            
            // Add drag events
            document.querySelectorAll('.sticky-note').forEach(note => {
                note.addEventListener('dragstart', handleDragStart);
                note.addEventListener('dragover', handleDragOver);
                note.addEventListener('drop', handleDrop);
                note.addEventListener('dragend', handleDragEnd);
            });
        }

        function formatStickyContent(content) {
            if (!content) return '';
            let formatted = escapeHtml(content);
            
            // Format links
            const links = extractLinks(content);
            links.forEach(link => {
                const displayText = link.length > 40 ? link.substring(0, 37) + '...' : link;
                formatted = formatted.replace(
                    new RegExp(escapeRegExp(link), 'g'),
                    `<a href="${link}" target="_blank" rel="noopener" style="color:var(--neon-green);">${displayText}</a>`
                );
            });
            
            // Format images
            const photoPattern = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/gi;
            formatted = formatted.replace(photoPattern, match => 
                `<img src="${match}" alt="Foto" onclick="copyPhoto('${match}')" style="max-width:100%;border-radius:8px;">`
            );
            
            return formatted;
        }

        function saveStickyNotes() {
            localStorage.setItem('kendalaStickyNotes', JSON.stringify(stickyNotes));
        }

        function editStickyNote(id) {
            const note = stickyNotes.find(n => n.id === id);
            if (!note) return;
            
            const noteEl = document.querySelector(`.sticky-note[data-id="${id}"]`);
            if (!noteEl) return;
            
            noteEl.classList.add('editing');
            const contentEl = noteEl.querySelector('.sticky-note-content');
            const originalContent = note.content;
            
            contentEl.innerHTML = `
                <textarea class="sticky-edit-input">${escapeHtml(note.content)}</textarea>
                <div class="sticky-edit-buttons">
                    <button class="sticky-edit-save" onclick="saveStickyEdit(${id})">💾 Simpan</button>
                    <button class="sticky-edit-cancel" onclick="cancelStickyEdit(${id}, '${escapeJs(originalContent)}')">❌ Batal</button>
                </div>
            `;
            
            const textarea = contentEl.querySelector('textarea');
            textarea.focus();
            textarea.setSelectionRange(textarea.value.length, textarea.value.length);
        }

        function saveStickyEdit(id) {
            const noteEl = document.querySelector(`.sticky-note[data-id="${id}"]`);
            if (!noteEl) return;
            
            const textarea = noteEl.querySelector('.sticky-edit-input');
            const newContent = textarea.value.trim();
            
            const note = stickyNotes.find(n => n.id === id);
            if (note) {
                note.content = newContent;
                saveStickyNotes();
                renderStickyNotes();
                showToast('✅ Sticky note diperbarui!');
            }
        }

        function cancelStickyEdit(id, originalContent) {
            renderStickyNotes();
        }

        function deleteStickyNote(id) {
            if (confirm('Hapus sticky note ini?')) {
                stickyNotes = stickyNotes.filter(n => n.id !== id);
                saveStickyNotes();
                renderStickyNotes();
                showToast('🗑️ Sticky note dihapus');
            }
        }

        function moveStickyNote(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= stickyNotes.length) return;
            
            // Swap
            [stickyNotes[index], stickyNotes[newIndex]] = [stickyNotes[newIndex], stickyNotes[index]];
            saveStickyNotes();
            renderStickyNotes();
        }

        // Drag and Drop
        function handleDragStart(e) {
            draggedNote = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.innerHTML);
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDrop(e) {
            e.preventDefault();
            if (draggedNote && this !== draggedNote) {
                const fromId = parseInt(draggedNote.dataset.id);
                const toId = parseInt(this.dataset.id);
                
                const fromIndex = stickyNotes.findIndex(n => n.id === fromId);
                const toIndex = stickyNotes.findIndex(n => n.id === toId);
                
                if (fromIndex !== -1 && toIndex !== -1) {
                    // Move item
                    const [moved] = stickyNotes.splice(fromIndex, 1);
                    stickyNotes.splice(toIndex, 0, moved);
                    saveStickyNotes();
                    renderStickyNotes();
                }
            }
            return false;
        }

        function handleDragEnd() {
            this.classList.remove('dragging');
            draggedNote = null;
        }

        /* ===================================
           === INITIALIZATION ===
           =================================== */
        document.addEventListener('DOMContentLoaded', () => {
            // Create particles
            createParticles();
            
            // Load data
            loadKendalaData();
            
            // Load sticky notes
            renderStickyNotes();
            
            // Welcome toast
            setTimeout(() => {
                showToast('🚀 KENDALA ALL loaded successfully!');
            }, 1500);
        });

        // Handle window resize for lightbox
        window.addEventListener('resize', () => {
            if (document.getElementById('lightbox').classList.contains('active')) {
                zoomLevel = 1;
                currentX = 0;
                currentY = 0;
                updateZoom();
            }
        });
    </script>
</body>
</html>

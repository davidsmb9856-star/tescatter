<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE TOGEL - Bonus Event</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-primary: #020a18;
            --bg-secondary: #061428;
            --bg-card: rgba(0, 30, 60, 0.6);
            --neon-blue: #00d4ff;
            --neon-blue-dim: #0099cc;
            --neon-cyan: #00ffff;
            --neon-green: #00ff88;
            --neon-yellow: #ffcc00;
            --neon-red: #ff3366;
            --text-primary: #e0f7ff;
            --text-secondary: #7eb8d4;
            --border-glow: rgba(0, 212, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 150, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 100, 200, 0.04) 0%, transparent 70%);
            animation: bgPulse 15s ease-in-out infinite;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes bgPulse {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 1; }
            50% { transform: translate(-2%, -2%) scale(1.05); opacity: 0.8; }
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* Floating Particles */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: var(--neon-blue);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            25% { transform: translateY(-30px) translateX(15px); opacity: 0.8; }
            50% { transform: translateY(-60px) translateX(-10px); opacity: 0.5; }
            75% { transform: translateY(-30px) translateX(20px); opacity: 0.7; }
        }

        /* Main Container */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Tab Content */
        .tab-content {
            display: block;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Bonus Section */
        .bonus-section {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 0 40px rgba(0, 212, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* Glowing Title */
        .judul-glow {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            color: var(--neon-cyan);
            text-shadow: 
                0 0 10px var(--neon-blue),
                0 0 20px var(--neon-blue),
                0 0 40px var(--neon-blue),
                0 0 60px rgba(0, 212, 255, 0.5);
            margin-bottom: 8px;
            letter-spacing: 4px;
            animation: textGlow 3s ease-in-out infinite alternate;
        }

        .bonus-title {
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            color: var(--text-primary);
            text-shadow: 0 0 15px var(--neon-blue);
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 30px var(--neon-blue); }
            to { text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 60px var(--neon-blue); }
        }

        /* Neon Switch Button */
        .neon-switch-btn {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 12px 24px;
            background: linear-gradient(135deg, rgba(0, 30, 60, 0.8), rgba(0, 50, 100, 0.6));
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--neon-blue);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .neon-switch-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .neon-switch-btn:hover {
            background: linear-gradient(135deg, rgba(0, 50, 100, 0.9), rgba(0, 80, 150, 0.7));
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4), inset 0 0 20px rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        .neon-switch-btn:hover::before {
            left: 100%;
        }

        .neon-switch-btn.active {
            background: linear-gradient(135deg, rgba(0, 100, 150, 0.9), rgba(0, 150, 200, 0.7));
            border-color: var(--neon-cyan);
            color: #fff;
            box-shadow: 
                0 0 25px rgba(0, 255, 255, 0.5),
                inset 0 0 25px rgba(0, 255, 255, 0.15);
        }

        .neon-switch-btn.danger {
            border-color: rgba(255, 51, 102, 0.4);
            color: var(--neon-red);
        }

        .neon-switch-btn.danger:hover {
            background: linear-gradient(135deg, rgba(100, 20, 40, 0.8), rgba(150, 30, 60, 0.6));
            border-color: var(--neon-red);
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
        }

        /* Bonus Mode Container */
        .bonus-mode {
            animation: fadeInUp 0.4s ease-out;
        }

        /* Textarea Styling */
        .bonus-textarea,
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 16px;
            background: rgba(0, 20, 40, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            resize: vertical;
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        .bonus-textarea:focus,
        textarea:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 
                0 0 20px rgba(0, 212, 255, 0.3),
                inset 0 0 20px rgba(0, 212, 255, 0.05);
        }

        .bonus-textarea::placeholder,
        textarea::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* Input Styling */
        .bonus-input-group {
            margin: 15px 0;
        }

        .bonus-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--neon-blue);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .bonus-input,
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 20, 40, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .bonus-input:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .bonus-input::placeholder,
        input[type="text"]::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* Button Group */
        .bonus-button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
        }

        .bonus-btn {
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 600;
            padding: 12px 28px;
            background: linear-gradient(135deg, rgba(0, 100, 150, 0.8), rgba(0, 150, 200, 0.6));
            border: 1px solid var(--neon-blue);
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bonus-btn:hover {
            background: linear-gradient(135deg, rgba(0, 150, 200, 0.9), rgba(0, 200, 255, 0.7));
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        .bonus-btn.danger {
            background: linear-gradient(135deg, rgba(150, 30, 60, 0.8), rgba(200, 40, 80, 0.6));
            border-color: var(--neon-red);
        }

        .bonus-btn.danger:hover {
            background: linear-gradient(135deg, rgba(200, 40, 80, 0.9), rgba(255, 50, 100, 0.7));
            box-shadow: 0 0 25px rgba(255, 51, 102, 0.5);
        }

        /* Result Box */
        .bonus-result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 40, 80, 0.4);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            font-family: 'Rajdhani', sans-serif;
            line-height: 1.8;
        }

        /* Gallery Container */
        .gallery-container {
            perspective: 1000px;
        }

        .combined-image-slot {
            background: linear-gradient(145deg, rgba(0, 30, 60, 0.9), rgba(0, 50, 100, 0.7));
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .combined-image-slot:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 50px rgba(0, 212, 255, 0.2);
            border-color: var(--neon-blue);
        }

        .combined-image-slot img {
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .combined-image-slot img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .caption-userid {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: 700;
        }

        .package-info {
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
        }

        /* Modal Styling */
        .modal,
        [id*="Modal"] {
            backdrop-filter: blur(10px);
        }

        .close-btn,
        [onclick*="close"] {
            transition: all 0.3s ease !important;
        }

        .close-btn:hover,
        [onclick*="close"]:hover {
            transform: scale(1.2) rotate(90deg);
            text-shadow: 0 0 20px var(--neon-cyan);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--neon-blue), var(--neon-blue-dim));
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-blue));
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 28px;
            background: linear-gradient(135deg, rgba(0, 50, 100, 0.95), rgba(0, 80, 150, 0.9));
            border: 1px solid var(--neon-blue);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 500;
            z-index: 99999;
            animation: toastSlide 0.4s ease-out;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }

        @keyframes toastSlide {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Data Card Styling */
        .data-card {
            background: linear-gradient(145deg, rgba(0, 30, 60, 0.7), rgba(0, 40, 80, 0.5));
            border: 1px solid rgba(0, 212, 255, 0.25);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s ease;
        }

        .data-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.15);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .bonus-section {
                padding: 20px;
            }

            .judul-glow {
                font-size: 22px;
                letter-spacing: 2px;
            }

            .bonus-title {
                font-size: 18px;
            }

            .neon-switch-btn {
                font-size: 12px;
                padding: 10px 16px;
            }

            .bonus-btn {
                font-size: 13px;
                padding: 10px 20px;
            }

            .toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
                text-align: center;
            }
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Zoom Navigation */
        .zoom-nav-button {
            transition: all 0.3s ease;
        }

        .zoom-nav-button:hover {
            background: rgba(0, 212, 255, 0.4) !important;
            transform: scale(1.1);
        }

        /* Analysis Grid */
        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .user-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .user-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }

        .user-header {
            padding: 12px 16px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .user-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: rgba(0, 212, 255, 0.1);
        }

        .col {
            background: var(--bg-secondary);
            padding: 12px;
        }

        .col-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--neon-blue);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .entry-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 120px;
            overflow-y: auto;
        }

        .entry-item {
            font-size: 13px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            font-family: monospace;
        }

        .total-row {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
            font-size: 13px;
            font-weight: 600;
        }

        .card-footer {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
        }

        .footer-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation"></div>
    <div class="grid-overlay"></div>
    
    <!-- Floating Particles -->
    <div id="particles"></div>

    <div class="main-container">
        <!-- TAB CEK BONUS EVENT -->
        <div id="cekBonusEventTab" class="tab-content">
            <div class="bonus-section">
                <h3 class="judul-glow">LINE TOGEL</h3>
                <h2 class="bonus-title">BONUS EVENT</h2>

                <!-- 3 SWITCH MODE BUTTON -->
                <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 15px 0;">
                    <button class="neon-switch-btn active" onclick="switchBonusMode('bonusAsli')" id="btn-bonusAsli">
                        Cek Bonus Asli
                    </button>
                    <button class="neon-switch-btn" onclick="switchBonusMode('galeri')" id="btn-galeri">
                        Galeri Gambar
                    </button>
                    <button class="neon-switch-btn" onclick="switchBonusMode('inputScatter')" id="btn-inputScatter">
                        Input Scatter (2 Data)
                    </button>
                </div>

                <!-- MODE 1: CEK BONUS ASLI -->
                <div id="modeBonusAsli" class="bonus-mode">
                    <textarea id="bonusTextarea" class="bonus-textarea" placeholder="Tempelkan data transaksi di sini..."></textarea>
                    <div class="bonus-input-group">
                        <label for="bonusPatokan" class="bonus-label">Nilai Patokan:</label>
                        <input type="text" id="bonusPatokan" class="bonus-input" placeholder="Contoh: 5000000">
                    </div>
                    <div class="bonus-input-group">
                        <label for="bonusSurplus" class="bonus-label">Nilai Surplus:</label>
                        <input type="text" id="bonusSurplus" class="bonus-input" placeholder="Contoh: 1500000">
                    </div>
                    <div class="bonus-button-group">
                        <button onclick="hitungBonusEvent()" class="bonus-btn">Hitung Bonus</button>
                        <button onclick="hapusBonusEvent()" class="bonus-btn danger">Bersihkan</button>
                    </div>
                    <div id="bonusHasil" class="bonus-result"></div>
                    <label for="imageUrl" class="bonus-label" style="margin-top:15px;">Link Gambar Transaksi:</label>
                    <input type="text" id="imageUrl" class="bonus-input" placeholder="Tempel link gambar di sini...">
                </div>

                <!-- MODE 2: GALERI GAMBAR -->
                <div id="modeGaleri" class="bonus-mode" style="display: none;">
                    <h2 class="bonus-title">GALERI GAMBAR</h2>
                    <p style="text-align: center; color: var(--text-secondary); margin-bottom: 12px;">
                        <strong>Tempel/Ketik</strong> data. Format: <strong style="color: var(--neon-blue);">USERID link1 link2 link3</strong>
                    </p>
                    <textarea id="bonusLinkInput" 
                        placeholder="Tempelkan data paket di sini. Setiap baris = satu paket."
                        rows="6"
                        oninput="handleBonusInput()"
                        onpaste="handleBonusInput()"></textarea>
                    <div class="bonus-button-group">
                        <button onclick="clearBonusAllData()" class="bonus-btn danger">Hapus Semua</button>
                    </div>
                    <hr style="margin: 20px 0; border-color: rgba(0, 212, 255, 0.2);">
                    <div class="gallery-container" style="display: flex; justify-content: center; margin: 20px 0;">
                        <div class="combined-image-slot" id="bonusCombinedImageSlot" onclick="openBonusZoom()">
                            <p class="caption-userid" id="bonusCombinedSlotUserid">USER ID</p>
                            <div style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
                                <img id="bonusImgSlot1" src="https://via.placeholder.com/180x160/061428/00d4ff?text=1" style="width:110px; height:100px; object-fit:cover; border-radius:8px;">
                                <img id="bonusImgSlot2" src="https://via.placeholder.com/180x160/061428/00d4ff?text=2" style="width:110px; height:100px; object-fit:cover; border-radius:8px;">
                                <img id="bonusImgSlot3" src="https://via.placeholder.com/180x160/061428/00d4ff?text=3" style="width:110px; height:100px; object-fit:cover; border-radius:8px;">
                            </div>
                        </div>
                    </div>
                    <p class="package-info">
                        Paket: <span id="bonusCurrentPackageNum">0</span> / <span id="bonusMaxPackageNum">0</span>
                    </p>
                </div>

                <!-- MODE 3: INPUT SCATTER (2 DATA) -->
                <div id="modeInputScatter" class="bonus-mode" style="display: none;">
                    <div style="display: flex; gap: 16px; justify-content: space-between; flex-wrap: wrap;">
                        <!-- DATA 1 -->
                        <div class="data-card" style="flex: 1; min-width: 280px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                <h4 style="color: var(--neon-blue); margin: 0; font-size: 15px; font-family: 'Orbitron', monospace;">DATA SCATTER 1</h4>
                                <button onclick="copyData1()" class="neon-switch-btn" style="padding: 6px 14px; font-size: 12px;">Copy</button>
                            </div>
                            <div class="bonus-input-group" style="margin: 8px 0;">
                                <label class="bonus-label" style="font-size: 12px;">1. UID:</label>
                                <input type="text" id="bonusUserid1" class="bonus-input" placeholder="San221" style="padding: 8px 12px; font-size: 14px;">
                            </div>
                            <div class="bonus-input-group" style="margin: 8px 0;">
                                <label class="bonus-label" style="font-size: 12px;">2. S1:</label>
                                <input type="text" id="bonusScatter1_1" class="bonus-input" placeholder="Link..." style="padding: 8px 12px; font-size: 14px;">
                            </div>
                            <div class="bonus-input-group" style="margin: 8px 0;">
                                <label class="bonus-label" style="font-size: 12px;">3. S2:</label>
                                <div style="display: flex; gap: 8px; align-items: center;">

    <!-- Modal Scan Scatter 2 -->

        <h3 style="color: var(--neon-cyan); text-align: center; margin: 20px 0; font-size: 20px; font-family: 'Orbitron', monospace;">Scan Scatter 2</h3>

        <span onclick="closeLightbox()" style="position: absolute; top: 20px; right: 30px; font-size: 36px; color: var(--neon-cyan); cursor: pointer; transition: all 0.3s ease;">&times;</span>
        <img id="lightboxImage" src="" style="max-width: 90%; max-height: 90%; border-radius: 12px; box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);">
        <div style="margin-top: 20px;">
            <button onclick="prevImage()" style="font-size: 16px; padding: 12px 28px; border: 1px solid var(--neon-blue); background: var(--bg-card); color: var(--neon-cyan); cursor: pointer; border-radius: 8px; margin-right: 10px; transition: all 0.3s ease;">Prev</button>
            <button onclick="nextImage()" style="font-size: 16px; padding: 12px 28px; border: 1px solid var(--neon-blue); background: var(--bg-card); color: var(--neon-cyan); cursor: pointer; border-radius: 8px; transition: all 0.3s ease;">Next</button>

    <script>
        // ==================== INITIALIZATION ====================
        let currentBonusMode = 'bonusAsli';
        let currentDataIndex = 1;
        let bonusPackages = [];
        let currentBonusPackageIndex = 0;
        let lightboxImages = [];
        let currentLightboxIndex = 0;

        // ==================== CREATE PARTICLES ====================
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (6 + Math.random() * 4) + 's';
                container.appendChild(particle);
            }
        }

        // ==================== TOAST NOTIFICATION ====================
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ==================== SWITCH BONUS MODE ====================
        function switchBonusMode(mode) {
            document.getElementById('modeBonusAsli').style.display = 'none';
            document.getElementById('modeGaleri').style.display = 'none';
            document.getElementById('modeInputScatter').style.display = 'none';

            if (mode === 'bonusAsli') {
                document.getElementById('modeBonusAsli').style.display = 'block';
            } else if (mode === 'galeri') {
                document.getElementById('modeGaleri').style.display = 'block';
            } else if (mode === 'inputScatter') {
                document.getElementById('modeInputScatter').style.display = 'block';
            }

            const buttons = ['bonusAsli', 'galeri', 'inputScatter'];
            buttons.forEach(id => {
                const btn = document.getElementById('btn-' + id);
                if (btn) {
                    if (id === mode) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            });

            currentBonusMode = mode;
        }

        // ==================== HITUNG BONUS EVENT ====================
        function hitungBonusEvent() {
            const textarea = document.getElementById('bonusTextarea').value.trim();
            const patokan = parseInt(document.getElementById('bonusPatokan').value.replace(/[^0-9]/g, '')) || 0;
            const surplus = parseInt(document.getElementById('bonusSurplus').value.replace(/[^0-9]/g, '')) || 0;

            if (!textarea) {
                showToast('Masukkan data transaksi terlebih dahulu!');
                return;
            }

            const lines = textarea.split('\n').filter(line => line.trim());
            let totalTransaksi = 0;
            let hasilHTML = '<div style="font-family: Rajdhani, sans-serif;">';
            hasilHTML += '<h4 style="color: var(--neon-cyan); margin-bottom: 15px; font-family: Orbitron, monospace;">HASIL PERHITUNGAN</h4>';

            lines.forEach((line, idx) => {
                const angka = line.match(/\d{1,3}(?:[.,]\d{3})*/g);
                if (angka) {
                    angka.forEach(num => {
                        const cleanNum = parseInt(num.replace(/[.,]/g, ''));
                        if (cleanNum > 1000) {
                            totalTransaksi += cleanNum;
                        }
                    });
                }
            });

            const bonus = totalTransaksi >= patokan ? surplus : 0;

            hasilHTML += '<div style="background: rgba(0, 50, 100, 0.3); padding: 15px; border-radius: 10px; margin: 10px 0;">';
            hasilHTML += '<p style="margin: 8px 0;"><strong>Total Transaksi:</strong> <span style="color: var(--neon-cyan);">' + new Intl.NumberFormat('id-ID').format(totalTransaksi) + '</span></p>';
            hasilHTML += '<p style="margin: 8px 0;"><strong>Patokan:</strong> <span style="color: var(--neon-yellow);">' + new Intl.NumberFormat('id-ID').format(patokan) + '</span></p>';
            hasilHTML += '<p style="margin: 8px 0;"><strong>Surplus/Bonus:</strong> <span style="color: var(--neon-green);">' + new Intl.NumberFormat('id-ID').format(surplus) + '</span></p>';
            hasilHTML += '</div>';

            hasilHTML += '<div style="background: ' + (bonus > 0 ? 'rgba(0, 255, 136, 0.15)' : 'rgba(255, 51, 102, 0.15)') + '; padding: 20px; border-radius: 10px; margin-top: 15px; border: 1px solid ' + (bonus > 0 ? 'var(--neon-green)' : 'var(--neon-red)') + ';">';
            hasilHTML += '<p style="font-size: 18px; font-weight: 700; text-align: center;">STATUS: ' + (bonus > 0 ? 'MENDAPAT BONUS' : 'TIDAK MENDAPAT BONUS') + '</p>';
            if (bonus > 0) {
                hasilHTML += '<p style="font-size: 24px; font-weight: 900; text-align: center; color: var(--neon-green); margin-top: 10px;">+ ' + new Intl.NumberFormat('id-ID').format(bonus) + '</p>';
            }
            hasilHTML += '</div>';
            hasilHTML += '</div>';

            document.getElementById('bonusHasil').innerHTML = hasilHTML;
        }

        function hapusBonusEvent() {
            document.getElementById('bonusTextarea').value = '';
            document.getElementById('bonusPatokan').value = '';
            document.getElementById('bonusSurplus').value = '';
            document.getElementById('bonusHasil').innerHTML = '';
            document.getElementById('imageUrl').value = '';
            showToast('Data berhasil dibersihkan!');
        }

        // ==================== GALERI FUNCTIONS ====================
        function handleBonusInput() {
            const input = document.getElementById('bonusLinkInput').value.trim();
            if (!input) {
                bonusPackages = [];
                currentBonusPackageIndex = 0;
                updateBonusGalleryDisplay();
                return;
            }

            const lines = input.split('\n').filter(line => line.trim());
            bonusPackages = lines.map(line => {
                const parts = line.trim().split(/\s+/);
                const userid = parts[0] || 'Unknown';
                const links = parts.slice(1).filter(link => link.startsWith('http'));
                return { userid, links };
            }).filter(pkg => pkg.links.length > 0);

            currentBonusPackageIndex = 0;
            updateBonusGalleryDisplay();
        }

        function updateBonusGalleryDisplay() {
            const total = bonusPackages.length;
            document.getElementById('bonusCurrentPackageNum').textContent = total > 0 ? currentBonusPackageIndex + 1 : 0;
            document.getElementById('bonusMaxPackageNum').textContent = total;

            if (total === 0) {
                document.getElementById('bonusCombinedSlotUserid').textContent = 'USER ID';
                document.getElementById('bonusImgSlot1').src = 'https://via.placeholder.com/180x160/061428/00d4ff?text=1';
                document.getElementById('bonusImgSlot2').src = 'https://via.placeholder.com/180x160/061428/00d4ff?text=2';
                document.getElementById('bonusImgSlot3').src = 'https://via.placeholder.com/180x160/061428/00d4ff?text=3';
                return;
            }

            const pkg = bonusPackages[currentBonusPackageIndex];
            document.getElementById('bonusCombinedSlotUserid').textContent = pkg.userid;

            for (let i = 0; i < 3; i++) {
                const img = document.getElementById('bonusImgSlot' + (i + 1));
                if (pkg.links[i]) {
                    img.src = pkg.links[i];
                } else {
                    img.src = 'https://via.placeholder.com/180x160/061428/00d4ff?text=' + (i + 1);
                }
            }
        }

        function clearBonusAllData() {
            document.getElementById('bonusLinkInput').value = '';
            bonusPackages = [];
            currentBonusPackageIndex = 0;
            updateBonusGalleryDisplay();
            showToast('Semua data galeri dihapus!');
        }

        function openBonusZoom() {
            if (bonusPackages.length === 0) return;

            const modal = document.getElementById('bonusZoomModal');
            modal.style.display = 'block';
            renderBonusZoomContent();
        }

        function closeBonusZoom() {
            document.getElementById('bonusZoomModal').style.display = 'none';
        }

        function renderBonusZoomContent() {
            const pkg = bonusPackages[currentBonusPackageIndex];
            document.getElementById('bonusZoomedUserid').textContent = pkg.userid;

            const wrapper = document.getElementById('bonusZoomedContentWrapper');
            wrapper.innerHTML = '';

            pkg.links.forEach((link, idx) => {
                const img = document.createElement('img');
                img.src = link;
                img.style.cssText = 'max-width: 300px; max-height: 400px; object-fit: contain; border-radius: 10px; box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); cursor: pointer;';
                img.onclick = function() { openLightbox(pkg.links, idx); };
                wrapper.appendChild(img);
            });
        }

        function navigateBonusPackage(direction) {
            if (bonusPackages.length === 0) return;

            if (direction === 'prev') {
                currentBonusPackageIndex = (currentBonusPackageIndex - 1 + bonusPackages.length) % bonusPackages.length;
            } else {
                currentBonusPackageIndex = (currentBonusPackageIndex + 1) % bonusPackages.length;
            }

            updateBonusGalleryDisplay();
            renderBonusZoomContent();
        }

        // ==================== LIGHTBOX ====================
        function openLightbox(images, startIndex) {
            lightboxImages = images;
            currentLightboxIndex = startIndex;
            document.getElementById('lightboxImage').src = images[startIndex];
            document.getElementById('lightboxModal').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightboxModal').style.display = 'none';
        }

        function prevImage() {
            currentLightboxIndex = (currentLightboxIndex - 1 + lightboxImages.length) % lightboxImages.length;
            document.getElementById('lightboxImage').src = lightboxImages[currentLightboxIndex];
        }

        function nextImage() {
            currentLightboxIndex = (currentLightboxIndex + 1) % lightboxImages.length;
            document.getElementById('lightboxImage').src = lightboxImages[currentLightboxIndex];
        }

        // ==================== ZOOM MODAL ====================
        function closeZoom() {
            document.getElementById('zoomModal').style.display = 'none';
        }

        // ==================== SCAN SCATTER 2 ====================
        function scanScatter2(index) {
            currentDataIndex = index;
            const link = document.getElementById('bonusScatter2_' + index).value.trim();
            if (!link) {
                showToast('Masukkan link Scatter 2 terlebih dahulu!');
                return;
            }

            const img = document.getElementById('scanScatter2Image');
            const resultDiv = document.getElementById('scanScatter2Result');
            const modal = document.getElementById('scanScatter2Modal');

            if (img) img.src = link;
            if (modal) modal.style.display = 'block';
            if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--text-secondary);">Memindai gambar...</span>';

            if (typeof Tesseract === 'undefined') {
                if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--neon-red);">Tesseract.js belum dimuat.</span>';
                return;
            }

            Tesseract.recognize(link, 'eng', {
                logger: function(m) { console.log(m); }
            }).then(function(result) {
                const text = result.data.text;
                const rawLines = text.split('\n').map(function(line) { return line.trim(); }).filter(function(line) { return line.length > 0; });
                let hasilGabung = [];
                let hasilLangsung = [];

                // Pola gabungan: 9-10 digit + baris berikutnya 8+ digit
                for (let i = 0; i < rawLines.length; i++) {
                    const line = rawLines[i];
                    const match = line.match(/\b\d{9,10}\b/);
                    if (match) {
                        if (i + 1 < rawLines.length) {
                            const nextLine = rawLines[i + 1].trim();
                            const nextMatch = nextLine.match(/\b\d{8,}\b/);
                            if (nextMatch) {
                                hasilGabung.push(match[0] + nextMatch[0]);
                                i++;
                                continue;
                            }
                        }
                        hasilGabung.push(match[0]);
                    }
                }

                // Semua angka >=8 digit per baris
                for (let i = 0; i < rawLines.length; i++) {
                    const matches = rawLines[i].match(/\d{8,}/g);
                    if (matches) {
                        for (let j = 0; j < matches.length; j++) {
                            hasilLangsung.push(matches[j]);
                        }
                    }
                }

                hasilGabung = Array.from(new Set(hasilGabung));
                hasilLangsung = Array.from(new Set(hasilLangsung));

                if (hasilGabung.length === 0 && hasilLangsung.length === 0) {
                    if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--neon-yellow);">Tidak ditemukan angka panjang.</span>';
                } else {
                    if (resultDiv) resultDiv.innerHTML = '';

                    if (hasilGabung.length > 0) {
                        const title1 = document.createElement('div');
                        title1.innerHTML = '<b style="color: var(--neon-blue);">Hasil Gabungan Baris:</b>';
                        title1.style.margin = '12px 0 8px';
                        if (resultDiv) resultDiv.appendChild(title1);

                        hasilGabung.forEach(function(kode) {
                            const div = document.createElement('div');
                            div.style.cssText = 'margin-bottom: 10px; padding: 12px; background: rgba(0, 100, 150, 0.2); border: 1px solid var(--neon-blue); border-radius: 8px; display: flex; justify-content: space-between; align-items: center;';
                            div.innerHTML = '<span style="word-break: break-all; font-family: monospace;">' + kode + '</span>' +
                                '<div style="display:flex; gap:8px;">' +
                                '<button onclick="copyWithFeedback(this, \'' + kode + '\')" style="background: var(--neon-blue); color: #000; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold;">Copy</button>' +
                                '<button onclick="pilihKodeTransaksi(\'' + kode + '\')" style="background: var(--neon-green); color: #000; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold;">Pilih</button>' +
                                '</div>';
                            if (resultDiv) resultDiv.appendChild(div);
                        });
                    }

                    if (hasilLangsung.length > 0) {
                        const title2 = document.createElement('div');
                        title2.innerHTML = '<b style="color: var(--neon-green);">Hasil Angka Per Baris:</b>';
                        title2.style.margin = '16px 0 8px';
                        if (resultDiv) resultDiv.appendChild(title2);

                        hasilLangsung.forEach(function(kode) {
                            const div = document.createElement('div');
                            div.style.cssText = 'margin-bottom: 10px; padding: 12px; background: rgba(0, 255, 136, 0.1); border: 1px solid var(--neon-green); border-radius: 8px; display: flex; justify-content: space-between; align-items: center;';
                            div.innerHTML = '<span style="word-break: break-all; font-family: monospace;">' + kode + '</span>' +
                                '<div style="display:flex; gap:8px;">' +
                                '<button onclick="copyWithFeedback(this, \'' + kode + '\')" style="background: var(--neon-green); color: #000; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold;">Copy</button>' +
                                '<button onclick="pilihKodeTransaksi(\'' + kode + '\')" style="background: var(--neon-blue); color: #000; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold;">Pilih</button>' +
                                '</div>';
                            if (resultDiv) resultDiv.appendChild(div);
                        });
                    }
                }
            }).catch(function(err) {
                console.error(err);
                if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--neon-red);">Gagal membaca gambar.</span>';
            });
        }

        function copyWithFeedback(btn, text) {
            navigator.clipboard.writeText(text).then(function() {
                const original = btn.innerHTML;
                btn.innerHTML = 'OK';
                btn.style.background = 'var(--neon-green)';
                setTimeout(function() {
                    btn.innerHTML = original;
                    btn.style.background = '';
                }, 1000);
            }).catch(function() {
                showToast('Gagal menyalin');
            });
        }

        function pilihKodeTransaksi(kode) {
            document.getElementById('bonusKodeTransaksi' + currentDataIndex).value = kode;
            closeScanScatter2Modal();
            showToast('Kode untuk Data ' + currentDataIndex + ' dipilih: ' + kode);
        }

        function closeScanScatter2Modal() {
            document.getElementById('scanScatter2Modal').style.display = 'none';
        }

        // ==================== COPY FUNCTIONS ====================
        function prosesRekening(rek) {
            const parts = rek.split(',').map(function(p) { return p.trim(); });
            const nama = parts[0] || '';
            const nomor = parts.slice(1).join(',') || '';
            return { nomor: nomor, nama: nama };
        }

        function getData1As7Columns() {
            const userid = document.getElementById('bonusUserid1').value.trim();
            const s1 = document.getElementById('bonusScatter1_1').value.trim();
            const s2 = document.getElementById('bonusScatter2_1').value.trim();
            const s3 = document.getElementById('bonusScatter3_1').value.trim();
            const rek = document.getElementById('bonusRekening1').value.trim();
            const kode = document.getElementById('bonusKodeTransaksi1').value.trim();

            let parts = [];

            if (userid) parts.push(userid);
            if (s1) parts.push(s1);
            if (s2) parts.push(s2);
            if (s3) parts.push(s3);

            if (rek) {
                const result = prosesRekening(rek);
                if (result.nomor) parts.push(result.nomor);
                if (result.nama) parts.push(result.nama);
            }

            if (kode) parts.push(kode);

            return parts.join('\t');
        }

        function getData2As7Columns() {
            const userid = document.getElementById('bonusUserid2').value.trim();
            const s1 = document.getElementById('bonusScatter1_2').value.trim();
            const s2 = document.getElementById('bonusScatter2_2').value.trim();
            const s3 = document.getElementById('bonusScatter3_2').value.trim();
            const rek = document.getElementById('bonusRekening2').value.trim();
            const kode = document.getElementById('bonusKodeTransaksi2').value.trim();

            let parts = [];

            if (userid) parts.push(userid);
            if (s1) parts.push(s1);
            if (s2) parts.push(s2);
            if (s3) parts.push(s3);

            if (rek) {
                const result = prosesRekening(rek);
                if (result.nomor) parts.push(result.nomor);
                if (result.nama) parts.push(result.nama);
            }

            if (kode) parts.push(kode);

            return parts.join('\t');
        }

        function copyData1() {
            const data = getData1As7Columns();
            copyToClipboard(data || '', 'Data 1');
            if (data) {
                showToast('Data 1 berhasil disalin!');
            } else {
                showToast('Data 1 kosong.');
            }
        }

        function copyData2() {
            const data = getData2As7Columns();
            copyToClipboard(data || '', 'Data 2');
            if (data) {
                showToast('Data 2 berhasil disalin!');
            } else {
                showToast('Data 2 kosong.');
            }
        }

        function copySemuaData() {
            const data1 = getData1As7Columns();
            const data2 = getData2As7Columns();

            let lines = [];
            if (data1 !== '') lines.push(data1);
            if (data2 !== '') lines.push(data2);

            const teks = lines.join('\n');
            copyToClipboard(teks, 'Semua Data');

            if (teks) {
                showToast('Semua data berhasil disalin!');
            } else {
                showToast('Tidak ada data terisi.');
            }
        }

        function hapusSemuaData() {
            const inputs = [
                'bonusUserid1', 'bonusScatter1_1', 'bonusScatter2_1', 'bonusScatter3_1', 'bonusRekening1', 'bonusKodeTransaksi1',
                'bonusUserid2', 'bonusScatter1_2', 'bonusScatter2_2', 'bonusScatter3_2', 'bonusRekening2', 'bonusKodeTransaksi2'
            ];
            inputs.forEach(function(id) {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            showToast('Semua data dihapus.');
        }

        // ==================== UTILITAS ====================
        function copyToClipboard(text, label) {
            const feedbackLabel = label || 'Teks';

            if (typeof text !== 'string') {
                showToast('Tidak dapat menyalin: Bukan teks');
                return;
            }

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(function() {
                        showToast(feedbackLabel + ' berhasil disalin!');
                    })
                    .catch(function(err) {
                        console.error('Gagal menyalin via Clipboard API:', err);
                        fallbackCopy(text, feedbackLabel);
                    });
            } else {
                console.warn('Clipboard API tidak tersedia, menggunakan fallback.');
                fallbackCopy(text, feedbackLabel);
            }
        }

        function fallbackCopy(text, label) {
            if (typeof text !== 'string') {
                showToast('Gagal menyalin: Input bukan teks.');
                return;
            }
            const feedbackLabel = label || 'Teks';

            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            textarea.style.top = '-9999px';
            textarea.style.width = '1px';
            textarea.style.height = '1px';
            textarea.style.opacity = '0';
            textarea.style.pointerEvents = 'none';

            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            textarea.setSelectionRange(0, 99999);

            let success = false;
            try {
                success = document.execCommand('copy');
                if (success) {
                    showToast(feedbackLabel + ' disalin (fallback)!');
                } else {
                    showToast('Gagal menyalin ' + feedbackLabel);
                }
            } catch (err) {
                console.error('Fallback execCommand gagal:', err);
                showToast('Gagal menyalin ' + feedbackLabel);
            }

            if (textarea.parentNode) {
                textarea.parentNode.removeChild(textarea);
            }
        }

        // ==================== KEYBOARD NAVIGATION ====================
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('bonusZoomModal').style.display === 'block') {
                if (e.key === 'ArrowLeft') {
                    navigateBonusPackage('prev');
                } else if (e.key === 'ArrowRight') {
                    navigateBonusPackage('next');
                } else if (e.key === 'Escape') {
                    closeBonusZoom();
                }
            }

            if (document.getElementById('lightboxModal').style.display === 'flex') {
                if (e.key === 'ArrowLeft') {
                    prevImage();
                } else if (e.key === 'ArrowRight') {
                    nextImage();
                } else if (e.key === 'Escape') {
                    closeLightbox();
                }
            }

            if (document.getElementById('scanScatter2Modal').style.display === 'block') {
                if (e.key === 'Escape') {
                    closeScanScatter2Modal();
                }
            }

            if (document.getElementById('zoomModal').style.display === 'flex') {
                if (e.key === 'Escape') {
                    closeZoom();
                }
            }
        });

        // ==================== INITIALIZE ====================
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            switchBonusMode('bonusAsli');
        });
    </script>
</body>
</html>

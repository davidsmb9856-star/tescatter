<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00aaff">
<title>FOTO GALLERY - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-blue: #00d4ff;
--neon-blue-dark: #0088ff;
--neon-blue-light: #66e0ff;
--electric-blue: #00ffff;
--deep-blue: #001833;
--dark-blue: #000d1a;
--card-bg: rgba(0, 25, 50, 0.85);
--card-hover: rgba(0, 40, 80, 0.95);
--text-primary: #00d4ff;
--text-secondary: #66c8ff;
--text-dim: #3399cc;
--border-electric: rgba(0, 212, 255, 0.6);
--neon-green: #00ffcc;
--neon-red: #ff4466;
--neon-yellow: #ffd700;
--transition-fast: 0.2s ease;
--transition-normal: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
--glow-electric: 0 0 20px rgba(0, 212, 255, 0.7), 0 0 40px rgba(0, 136, 255, 0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--dark-blue);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
}

/* Electric Background */
.electric-bg {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background:
radial-gradient(ellipse at 30% 20%, rgba(0, 136, 255, 0.15) 0%, transparent 50%),
radial-gradient(ellipse at 70% 80%, rgba(0, 212, 255, 0.12) 0%, transparent 45%),
radial-gradient(ellipse at 50% 50%, rgba(0, 100, 200, 0.1) 0%, transparent 60%),
linear-gradient(180deg, #000814 0%, #001428 40%, #000a1c 100%);
z-index: -3;
}

/* Electric Grid */
.electric-grid {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background-image:
linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
background-size: 60px 60px;
z-index: -2;
animation: gridPulse 8s ease-in-out infinite;
pointer-events: none;
}

@keyframes gridPulse {
0%, 100% { opacity: 0.6; }
50% { opacity: 1; }
}

/* Lightning Canvas */
#lightningCanvas {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
z-index: -1;
pointer-events: none;
}

/* Electric Scan Line */
.electric-scan {
position: fixed;
top: 0; left: 0; width: 100%; height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-blue), var(--electric-blue), var(--neon-blue), transparent);
opacity: 0.7;
animation: electricScan 6s linear infinite;
z-index: 1;
pointer-events: none;
box-shadow: 0 0 30px var(--neon-blue), 0 0 60px var(--neon-blue-dark);
}

@keyframes electricScan {
0% { top: -5%; opacity: 0; }
5% { opacity: 0.9; }
95% { opacity: 0.9; }
100% { top: 105%; opacity: 0; }
}

/* Electric Sparks */
.electric-sparks {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
z-index: 0;
pointer-events: none;
overflow: hidden;
}

.spark {
position: absolute;
width: 4px;
height: 4px;
background: var(--neon-blue);
border-radius: 50%;
box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue-light);
animation: sparkFly 3s linear infinite;
}

@keyframes sparkFly {
0% { transform: translateY(100vh) scale(0); opacity: 0; }
10% { opacity: 1; }
90% { opacity: 1; }
100% { transform: translateY(-100px) scale(1); opacity: 0; }
}

.container {
max-width: 1600px;
margin: 0 auto;
padding: 40px 28px;
min-height: 100vh;
position: relative;
z-index: 2;
}

/* Header 2026 */
.header {
text-align: center;
margin-bottom: 40px;
padding: 25px 20px;
position: relative;
animation: headerEntrance 1s ease backwards;
}

@keyframes headerEntrance {
from { opacity: 0; transform: translateY(-50px) scale(0.95); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

.back-btn {
position: absolute;
left: 28px; top: 40px;
background: rgba(0, 136, 255, 0.2);
border: 2px solid var(--neon-blue);
color: var(--neon-blue);
padding: 10px 20px;
border-radius: 12px;
text-decoration: none;
font-weight: 700;
font-size: 13px;
display: flex;
align-items: center;
gap: 8px;
transition: var(--transition-normal);
backdrop-filter: blur(10px);
box-shadow: 0 0 15px rgba(0, 136, 255, 0.3), inset 0 0 20px rgba(0, 212, 255, 0.1);
}

.back-btn:hover {
background: rgba(0, 136, 255, 0.4);
transform: translateX(-5px);
box-shadow: 0 0 30px rgba(0, 212, 255, 0.6), 0 0 50px rgba(0, 136, 255, 0.4);
border-color: var(--electric-blue);
}

/* Logo Container */
.logo-container {
display: flex;
flex-direction: column;
align-items: center;
gap: 5px;
}

.brand-year {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
font-weight: 700;
color: var(--neon-blue);
letter-spacing: 8px;
text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue-dark);
animation: yearGlow 2s ease-in-out infinite alternate;
position: relative;
}

.brand-year::before,
.brand-year::after {
content: '';
position: absolute;
top: 50%;
width: 40px;
height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-blue));
}

.brand-year::before {
right: 100%;
margin-right: 15px;
}

.brand-year::after {
left: 100%;
margin-left: 15px;
background: linear-gradient(270deg, transparent, var(--neon-blue));
}

@keyframes yearGlow {
0% { text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue-dark); }
100% { text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--electric-blue), 0 0 60px var(--neon-blue); }
}

/* Main Title with Electric Effect */
.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(36px, 8vw, 64px);
font-weight: 900;
color: var(--neon-blue);
position: relative;
letter-spacing: 4px;
animation: titleElectric 3s ease-in-out infinite;
}

.title::before {
content: 'FOTO GALLERY';
position: absolute;
left: 0; top: 0;
color: transparent;
-webkit-text-stroke: 1px var(--neon-blue-light);
opacity: 0.5;
animation: glitchLeft 2s infinite;
}

.title::after {
content: 'FOTO GALLERY';
position: absolute;
left: 0; top: 0;
color: transparent;
-webkit-text-stroke: 1px var(--electric-blue);
opacity: 0.5;
animation: glitchRight 2s infinite;
}

@keyframes titleElectric {
0%, 100% { 
text-shadow: 
0 0 10px var(--neon-blue),
0 0 20px var(--neon-blue),
0 0 40px var(--neon-blue-dark),
0 0 80px var(--neon-blue-dark);
}
50% { 
text-shadow: 
0 0 20px var(--neon-blue),
0 0 40px var(--electric-blue),
0 0 60px var(--neon-blue),
0 0 100px var(--neon-blue-dark);
}
}

@keyframes glitchLeft {
0%, 90%, 100% { transform: translate(0); }
92% { transform: translate(-3px, 1px); }
94% { transform: translate(2px, -1px); }
96% { transform: translate(-1px, 2px); }
98% { transform: translate(1px, -2px); }
}

@keyframes glitchRight {
0%, 90%, 100% { transform: translate(0); }
91% { transform: translate(2px, -1px); }
93% { transform: translate(-2px, 1px); }
95% { transform: translate(1px, 2px); }
97% { transform: translate(-1px, -1px); }
}

/* Logo Icon */
.logo-icon {
font-size: 48px;
margin-bottom: 10px;
animation: iconPulse 2s ease-in-out infinite;
filter: drop-shadow(0 0 15px var(--neon-blue));
}

@keyframes iconPulse {
0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--neon-blue)); }
50% { transform: scale(1.1); filter: drop-shadow(0 0 30px var(--electric-blue)); }
}

.subtitle {
font-size: 15px;
color: var(--text-secondary);
text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
letter-spacing: 3px;
text-transform: uppercase;
margin-top: 8px;
}

/* Status Badge Electric */
.status-badge {
display: inline-flex;
align-items: center;
gap: 10px;
background: rgba(0, 136, 255, 0.15);
border: 2px solid var(--neon-blue);
padding: 8px 20px;
border-radius: 25px;
font-size: 13px;
color: var(--neon-blue-light);
margin-top: 15px;
box-shadow: 0 0 20px rgba(0, 136, 255, 0.4), inset 0 0 15px rgba(0, 212, 255, 0.1);
animation: badgeElectric 2.5s infinite;
}

@keyframes badgeElectric {
0%, 100% { box-shadow: 0 0 15px rgba(0, 136, 255, 0.4), inset 0 0 15px rgba(0, 212, 255, 0.1); }
50% { box-shadow: 0 0 35px rgba(0, 212, 255, 0.7), inset 0 0 25px rgba(0, 136, 255, 0.2); }
}

.status-dot {
width: 10px; height: 10px;
background: var(--neon-blue);
border-radius: 50%;
animation: dotElectric 1.5s infinite;
box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--electric-blue);
}

@keyframes dotElectric {
0%, 100% { transform: scale(1); box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--electric-blue); }
50% { transform: scale(1.3); box-shadow: 0 0 20px var(--electric-blue), 0 0 40px var(--neon-blue); }
}

/* Nav Tabs */
.nav-tabs {
display: flex;
gap: 12px;
justify-content: center;
margin-bottom: 35px;
flex-wrap: wrap;
}

.nav-tab {
padding: 14px 28px;
background: rgba(0, 25, 50, 0.8);
border: 2px solid var(--border-electric);
border-radius: 14px;
color: var(--text-primary);
font-family: 'Orbitron', sans-serif;
font-size: 13px;
font-weight: 600;
cursor: pointer;
transition: var(--transition-normal);
text-transform: uppercase;
letter-spacing: 2px;
backdrop-filter: blur(10px);
box-shadow: 0 0 15px rgba(0, 136, 255, 0.15);
}

.nav-tab:hover, .nav-tab.active {
background: linear-gradient(135deg, rgba(0, 136, 255, 0.3), rgba(0, 212, 255, 0.2));
border-color: var(--neon-blue);
box-shadow: 0 0 25px rgba(0, 212, 255, 0.5), inset 0 0 20px rgba(0, 212, 255, 0.1);
transform: translateY(-3px);
}

.section { display: none; }
.section.active { display: block; animation: fadeIn 0.5s ease; }

@keyframes fadeIn {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

/* Search Container */
.search-container {
max-width: 800px;
margin: 0 auto 35px;
position: relative;
}

.search-box {
width: 100%;
padding: 16px 70px 16px 24px;
background: rgba(0, 25, 50, 0.9);
border: 2px solid var(--border-electric);
border-radius: 16px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 16px;
transition: var(--transition-normal);
backdrop-filter: blur(10px);
box-shadow: 0 0 15px rgba(0, 136, 255, 0.2);
}

.search-box:focus {
outline: none;
border-color: var(--neon-blue);
box-shadow: 0 0 30px rgba(0, 212, 255, 0.5), inset 0 0 20px rgba(0, 212, 255, 0.1);
}

.search-btn {
position: absolute;
right: 10px;
top: 50%;
transform: translateY(-50%);
width: 48px;
height: 48px;
background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
border: none;
border-radius: 12px;
color: #000;
font-size: 18px;
cursor: pointer;
transition: var(--transition-normal);
display: flex;
align-items: center;
justify-content: center;
box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
}

.search-btn:hover {
transform: translateY(-50%) scale(1.08);
box-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
}

/* Gallery Grid */
.gallery-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
gap: 25px;
}

/* Photo Card */
.photo-card {
background: var(--card-bg);
border: 2px solid var(--border-electric);
border-radius: 20px;
overflow: hidden;
transition: var(--transition-normal);
position: relative;
backdrop-filter: blur(20px);
animation: cardSlideIn 0.6s ease forwards;
opacity: 0;
transform: translateY(25px);
box-shadow: 0 5px 25px rgba(0, 136, 255, 0.15);
}

.photo-card:nth-child(1) { animation-delay: 0.1s; }
.photo-card:nth-child(2) { animation-delay: 0.15s; }
.photo-card:nth-child(3) { animation-delay: 0.2s; }
.photo-card:nth-child(4) { animation-delay: 0.25s; }
.photo-card:nth-child(5) { animation-delay: 0.3s; }

@keyframes cardSlideIn {
to { opacity: 1; transform: translateY(0); }
}

.photo-card::before {
content: '';
position: absolute;
top: 0; left: 0;
width: 5px; height: 100%;
background: linear-gradient(180deg, var(--neon-blue), var(--electric-blue), var(--neon-blue-dark));
box-shadow: 0 0 20px var(--neon-blue);
transition: var(--transition-normal);
z-index: 1;
}

.photo-card:hover {
background: var(--card-hover);
transform: translateY(-8px) scale(1.02);
border-color: var(--neon-blue);
box-shadow: 0 20px 50px rgba(0, 136, 255, 0.35), 0 0 50px rgba(0, 212, 255, 0.2);
}

.photo-card:hover::before {
width: 8px;
box-shadow: 0 0 30px var(--neon-blue), 0 0 60px var(--electric-blue);
}

.photo-wrapper {
position: relative;
width: 100%;
background: rgba(0, 20, 45, 0.8);
overflow: hidden;
}

.photo-wrapper img {
width: 100%;
height: auto;
display: block;
object-fit: contain;
max-height: 500px;
margin: 0 auto;
transition: var(--transition-normal);
}

.photo-card:hover .photo-wrapper img {
transform: scale(1.02);
}

.photo-overlay {
position: absolute;
top: 0;
left: 0;
right: 0;
bottom: 0;
background: rgba(0, 10, 25, 0.85);
display: flex;
align-items: center;
justify-content: center;
gap: 12px;
opacity: 0;
transition: opacity 0.3s ease;
padding: 20px;
backdrop-filter: blur(5px);
}

.photo-card:hover .photo-overlay {
opacity: 1;
}

.action-btn {
width: 52px;
height: 52px;
background: linear-gradient(135deg, var(--neon-blue), var(--electric-blue));
border: none;
border-radius: 50%;
color: #000;
font-size: 18px;
cursor: pointer;
transition: var(--transition-normal);
display: flex;
align-items: center;
justify-content: center;
box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
}

.action-btn:hover {
transform: scale(1.15) rotate(10deg);
box-shadow: 0 0 35px rgba(0, 212, 255, 0.9);
}

.photo-info {
padding: 18px 20px;
}

.photo-title {
font-family: 'Orbitron', sans-serif;
font-size: 15px;
font-weight: 700;
color: var(--neon-blue);
margin-bottom: 6px;
word-break: break-word;
text-shadow: 0 0 10px var(--neon-blue);
}

.photo-meta {
font-size: 12px;
color: var(--text-secondary);
}

/* Editor Container */
.editor-container {
background: rgba(0, 20, 45, 0.9);
border: 2px solid var(--border-electric);
border-radius: 24px;
padding: 28px;
margin-bottom: 30px;
box-shadow: 0 0 40px rgba(0, 136, 255, 0.3), inset 0 0 30px rgba(0, 212, 255, 0.05);
backdrop-filter: blur(15px);
}

.editor-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 25px;
padding-bottom: 18px;
border-bottom: 2px solid rgba(0, 212, 255, 0.3);
}

.editor-title {
font-family: 'Orbitron', sans-serif;
font-size: 20px;
color: var(--neon-blue);
text-shadow: 0 0 10px var(--neon-blue);
}

.upload-area {
border: 3px dashed var(--border-electric);
border-radius: 20px;
padding: 50px 35px;
text-align: center;
cursor: pointer;
transition: var(--transition-normal);
margin-bottom: 25px;
background: rgba(0, 136, 255, 0.05);
}

.upload-area:hover {
border-color: var(--neon-blue);
background: rgba(0, 136, 255, 0.15);
box-shadow: inset 0 0 30px rgba(0, 212, 255, 0.1);
}

.upload-icon {
font-size: 56px;
color: var(--neon-blue);
margin-bottom: 18px;
text-shadow: 0 0 20px var(--neon-blue);
}

.upload-text {
font-size: 17px;
color: var(--text-secondary);
margin-bottom: 8px;
font-weight: 600;
}

.upload-hint {
font-size: 13px;
color: var(--text-dim);
}

.canvas-wrapper {
position: relative;
background: rgba(0, 15, 35, 0.9);
border-radius: 16px;
padding: 20px;
margin-bottom: 25px;
overflow: auto;
max-height: 70vh;
border: 2px solid rgba(0, 212, 255, 0.3);
}

#mainCanvas {
max-width: 100%;
border: 2px solid var(--border-electric);
border-radius: 10px;
background: #fff;
box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
}

/* Tools Panel */
.tools-panel {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
gap: 20px;
margin-bottom: 25px;
}

.tool-group {
background: rgba(0, 25, 55, 0.7);
border: 2px solid rgba(0, 212, 255, 0.3);
border-radius: 16px;
padding: 20px;
transition: var(--transition-fast);
}

.tool-group:hover {
border-color: var(--border-electric);
box-shadow: 0 0 20px rgba(0, 136, 255, 0.2);
}

.tool-title {
font-family: 'Orbitron', sans-serif;
font-size: 13px;
color: var(--neon-blue);
margin-bottom: 14px;
text-transform: uppercase;
letter-spacing: 2px;
display: flex;
align-items: center;
gap: 8px;
}

.tool-btn {
width: 100%;
padding: 12px 16px;
margin-bottom: 10px;
background: rgba(0, 136, 255, 0.15);
border: 2px solid var(--border-electric);
border-radius: 12px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 14px;
font-weight: 600;
cursor: pointer;
transition: var(--transition-normal);
display: flex;
align-items: center;
gap: 10px;
}

.tool-btn:hover {
background: rgba(0, 136, 255, 0.35);
border-color: var(--neon-blue);
transform: translateX(5px);
box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
}

.tool-btn.active {
background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
color: #000;
border-color: var(--electric-blue);
box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
}

input[type="range"] {
width: 100%;
height: 6px;
background: var(--deep-blue);
border-radius: 3px;
outline: none;
-webkit-appearance: none;
margin-bottom: 15px;
}

input[type="range"]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 18px;
height: 18px;
background: var(--neon-blue);
border-radius: 50%;
cursor: pointer;
box-shadow: 0 0 15px var(--neon-blue);
}

.color-picker {
width: 100%;
height: 45px;
border: 2px solid var(--border-electric);
border-radius: 10px;
cursor: pointer;
background: none;
}

.input-field {
width: 100%;
padding: 12px;
background: var(--deep-blue);
border: 2px solid var(--border-electric);
border-radius: 10px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 14px;
margin-bottom: 10px;
transition: var(--transition-fast);
}

.input-field:focus {
outline: none;
border-color: var(--neon-blue);
box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
}

/* Action Buttons */
.action-buttons {
display: flex;
gap: 15px;
justify-content: center;
flex-wrap: wrap;
}

.btn {
padding: 14px 30px;
border-radius: 14px;
font-family: 'Orbitron', sans-serif;
font-size: 13px;
font-weight: 700;
cursor: pointer;
transition: var(--transition-normal);
border: 2px solid;
display: inline-flex;
align-items: center;
gap: 8px;
text-transform: uppercase;
letter-spacing: 2px;
}

.btn-primary {
background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
border-color: var(--electric-blue);
color: #000;
box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
}

.btn-primary:hover {
transform: translateY(-3px);
box-shadow: 0 0 35px rgba(0, 212, 255, 0.7);
}

.btn-secondary {
background: transparent;
border-color: var(--neon-green);
color: var(--neon-green);
}

.btn-secondary:hover {
background: rgba(0, 255, 204, 0.2);
transform: translateY(-3px);
box-shadow: 0 0 25px rgba(0, 255, 204, 0.5);
}

.btn-danger {
background: transparent;
border-color: var(--neon-red);
color: var(--neon-red);
}

.btn-danger:hover {
background: rgba(255, 68, 102, 0.2);
transform: translateY(-3px);
box-shadow: 0 0 25px rgba(255, 68, 102, 0.5);
}

/* Loading */
.loading {
display: none;
text-align: center;
padding: 60px;
grid-column: 1 / -1;
}

.loading.active { display: block; }

.loader {
width: 55px;
height: 55px;
border: 4px solid rgba(0, 212, 255, 0.2);
border-top-color: var(--neon-blue);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 20px;
box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Modal */
.modal-backdrop {
position: fixed;
inset: 0;
background: rgba(0, 5, 15, 0.97);

</style>
</head>
<body>

<div class="container">

<i class="fas fa-bolt"></i>
</div>

</div>

<button class="tool-btn" onclick="applyFilter('invert')"><i class="fas fa-exchange-alt"></i> Invert</button>

</div>

<script>
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';
let canvas = document.getElementById('mainCanvas');
let ctx = canvas ? canvas.getContext('2d') : null;
let currentEditorImage = null;
let history = [];
let isDrawing = false;

// Lightning Effect
const lightningCanvas = document.getElementById('lightningCanvas');
const lctx = lightningCanvas.getContext('2d');

function resizeCanvas() {
lightningCanvas.width = window.innerWidth;
lightningCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawLightning() {
lctx.clearRect(0, 0, lightningCanvas.width, lightningCanvas.height);
if (Math.random() > 0.97) {
const startX = Math.random() * lightningCanvas.width;
const startY = 0;
drawBolt(startX, startY, 80);
}
requestAnimationFrame(drawLightning);
}

function drawBolt(x, y, segments) {
lctx.beginPath();
lctx.moveTo(x, y);
lctx.strokeStyle = 'rgba(0, 212, 255, 0.8)';
lctx.lineWidth = 2;
lctx.shadowColor = '#00d4ff';
lctx.shadowBlur = 20;

let currentX = x;
let currentY = y;

for (let i = 0; i < segments; i++) {
currentX += (Math.random() - 0.5) * 60;
currentY += Math.random() * 20 + 10;
lctx.lineTo(currentX, currentY);

if (Math.random() > 0.85) {
drawBranch(currentX, currentY, 20);
}
}
lctx.stroke();
lctx.shadowBlur = 0;
}

function drawBranch(x, y, segments) {
lctx.beginPath();
lctx.moveTo(x, y);
lctx.strokeStyle = 'rgba(0, 212, 255, 0.5)';
lctx.lineWidth = 1;

let currentX = x;
let currentY = y;

for (let i = 0; i < segments; i++) {
currentX += (Math.random() - 0.5) * 40;
currentY += Math.random() * 15 + 5;
lctx.lineTo(currentX, currentY);
}
lctx.stroke();
}

drawLightning();

// Electric Sparks
function createSparks() {
const container = document.getElementById('electricSparks');
for (let i = 0; i < 30; i++) {
const spark = document.createElement('div');
spark.className = 'spark';
spark.style.left = Math.random() * 100 + '%';
spark.style.animationDelay = Math.random() * 3 + 's';
spark.style.animationDuration = (Math.random() * 2 + 2) + 's';
container.appendChild(spark);
}
}
createSparks();

document.addEventListener('DOMContentLoaded', () => {
fetchPhotosFromSheet();
initCanvas();
});

function showSection(sectionId) {
document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
document.getElementById(sectionId).classList.add('active');
event.target.classList.add('active');
}

async function fetchPhotosFromSheet() {
document.getElementById('loading').classList.add('active');
document.getElementById('galleryGrid').innerHTML = '';
try {
const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';

try {
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D110`;
const response = await fetch(gvizUrl);
const text = await response.text();
const json = JSON.parse(text.substring(47).slice(0, -2));
const rows = json.table.rows;
allPhotos = [];
rows.forEach((row, index) => {
const c = row.c;
if (!c) return;
const judul = c[0] ? (c[0].v || '') : '';
const foto = c[1] ? (c[1].v || '') : '';
if (judul && foto) {
allPhotos.push({
judul: judul,
foto: foto,
index: index + 2
});
}
});
} catch (e) {
console.log('GVIZ failed, trying CSV...', e);
const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D110`;
const csvResponse = await fetch(csvUrl);
const csvText = await csvResponse.text();
const csvRows = csvText.split('\n').map(row => row.split(','));
allPhotos = [];
csvRows.forEach((row, index) => {
if (row.length < 2) return;
const judul = row[0] ? row[0].replace(/"/g, '').trim() : '';
const foto = row[1] ? row[1].replace(/"/g, '').trim() : '';
if (judul && foto) {
allPhotos.push({
judul: judul,
foto: foto,
index: index + 2
});
}
});
}
renderGallery(allPhotos);
showToast(`Berhasil memuat ${allPhotos.length} foto`);
} catch (error) {
console.error('Error fetching photos:', error);
showToast('Gagal mengambil data dari Google Sheets');
document.getElementById('galleryGrid').innerHTML = `
<div class="no-results" style="grid-column: 1/-1;">
<i class="fas fa-exclamation-triangle" style="color: var(--neon-red);"></i>
<h3>Gagal Memuat Foto</h3>
<p>Pastikan Google Sheets sudah dipublikasikan</p>
</div>
`;
}
document.getElementById('loading').classList.remove('active');
}

function renderGallery(photos) {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';
if (photos.length === 0) {
grid.innerHTML = `
<div class="no-results" style="grid-column: 1/-1;">
<i class="fas fa-search"></i>
<h3>Tidak Ada Foto</h3>
<p>Tidak ada foto yang sesuai dengan pencarian</p>
</div>
`;
return;
}
photos.forEach((photo, idx) => {
const card = createPhotoCard(photo.foto, photo.judul, idx);
grid.appendChild(card);
});
}

function createPhotoCard(url, title, index) {
const card = document.createElement('div');
card.className = 'photo-card';
card.innerHTML = `
<div class="photo-wrapper">
<img src="${url}" alt="${title}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect fill=%22%231a1a2e%22 width=%22400%22 height=%22300%22/%3E%3Ctext fill=%22%2300d4ff%22 font-family=%22Arial%22 font-size=%2218%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3EGambar tidak tersedia%3C/text%3E%3C/svg%3E'" loading="lazy">
<div class="photo-overlay">
<button class="action-btn" onclick="viewFullImage('${url}', '${title.replace(/'/g, "\\'")}')" title="Lihat Full">
<i class="fas fa-eye"></i>
</button>
<button class="action-btn" onclick="copyPhoto('${url}')" title="Copy Foto">
<i class="fas fa-copy"></i>
</button>
<button class="action-btn" onclick="downloadPhoto('${url}', '${title.replace(/'/g, "\\'")}')" title="Download">
<i class="fas fa-download"></i>
</button>
<button class="action-btn" onclick="editImageFromUrl('${url}')" title="Edit">
<i class="fas fa-edit"></i>
</button>
</div>
</div>
<div class="photo-info">
<div class="photo-title">${title}</div>
<div class="photo-meta">Foto #${index + 1}</div>
</div>
`;
return card;
}

function searchPhotos() {
const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
if (!searchTerm) {
renderGallery(allPhotos);
return;
}
const filtered = allPhotos.filter(photo =>
photo.judul.toLowerCase().includes(searchTerm)
);
renderGallery(filtered);
if (filtered.length > 0) {
showToast(`Ditemukan ${filtered.length} foto`);
}
}

async function searchWebPhotos() {
const query = document.getElementById('webSearchInput').value.trim();
if (!query) {
showToast('Masukkan kata kunci pencarian');
return;
}
const grid = document.getElementById('searchGrid');
grid.innerHTML = '<div class="loading active"><div class="loader"></div><div style="color: var(--neon-blue)">Mencari foto...</div></div>';
try {
const response = await fetch(`https://picsum.photos/search/${query}`);
const data = await response.json();
grid.innerHTML = '';
if (data.length === 0) {
for (let i = 0; i < 12; i++) {
const photoUrl = `https://picsum.photos/seed/${query}${i}/600/400`;
const card = createPhotoCard(photoUrl, `${query} ${i + 1}`, i);
grid.appendChild(card);
}
} else {
data.slice(0, 12).forEach((photo, i) => {
const card = createPhotoCard(photo.download_location || photo.urls?.regular || `https://picsum.photos/600/400?random=${i}`, `${query} ${i + 1}`, i);
grid.appendChild(card);
});
}
showToast(`Ditemukan foto untuk "${query}"`);
} catch (error) {
grid.innerHTML = '';
for (let i = 0; i < 12; i++) {
const photoUrl = `https://picsum.photos/seed/${query}${i}/600/400`;
const card = createPhotoCard(photoUrl, `${query} ${i + 1}`, i);
grid.appendChild(card);
}
showToast(`Ditemukan foto untuk "${query}"`);
}
}

function viewFullImage(url, title) {
currentImageUrl = url;
currentImageTitle = title;
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalImage').src = url;
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
}

function closeModal() {
document.getElementById('imageModal').classList.remove('active');
document.body.style.overflow = '';
currentImageUrl = '';
currentImageTitle = '';
}

async function copyPhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([
new ClipboardItem({
[blob.type]: blob
})
]);
showToast('Foto berhasil disalin ke clipboard!');
} catch (error) {
console.error('Copy error:', error);
showToast('Buka foto lalu klik kanan > Copy Image');
}
}

async function copyImage() {
if (currentImageUrl) {
await copyPhoto(currentImageUrl);
}
}

function downloadPhoto(url, filename) {
const link = document.createElement('a');
link.href = url;
link.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
link.target = '_blank';
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
showToast('Download dimulai...');
}

function downloadModalImage() {
if (currentImageUrl && currentImageTitle) {
downloadPhoto(currentImageUrl, currentImageTitle);
}
}

function initCanvas() {
if (!canvas || !ctx) return;
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.font = '24px Rajdhani';
ctx.fillStyle = '#8ab4f8';
ctx.textAlign = 'center';
ctx.fillText('Upload foto untuk mulai mengedit', canvas.width/2, canvas.height/2);
}

function handleFiles(event) {
const files = event.target.files;
if (files.length === 0) return;
loadImage(files[0]);
if (files.length > 1) {
setTimeout(() => {
if (confirm(`Load ${files.length} foto? Klik OK untuk combine, Cancel untuk load satu per satu.`)) {
combineMultipleFiles(files);
}
}, 500);
}
}

function loadImage(file) {
const reader = new FileReader();
reader.onload = (e) => {
const img = new Image();
img.onload = () => {
currentEditorImage = img;
saveHistory();
canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img, 0, 0);
showToast('Foto berhasil dimuat');
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
}

function combineMultipleFiles(files) {
const images = [];
let loaded = 0;
Array.from(files).forEach(file => {
const reader = new FileReader();
reader.onload = (e) => {
const img = new Image();
img.onload = () => {
images.push(img);
loaded++;
if (loaded === files.length) {
combineImages(images);
}
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
});
}

function combineImages(images) {
const totalWidth = images.reduce((sum, img) => sum + img.width, 0);
const maxHeight = Math.max(...images.map(img => img.height));
canvas.width = totalWidth;
canvas.height = maxHeight;
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
let x = 0;
images.forEach(img => {
ctx.drawImage(img, x, 0);
x += img.width;
});
saveHistory();
showToast(`${images.length} foto digabungkan`);
}

function applyFilter(filterType) {
if (!currentEditorImage) {
showToast('Upload foto terlebih dahulu');
return;
}
saveHistory();
const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
const data = imageData.data;
switch(filterType) {
case 'grayscale':
for (let i = 0; i < data.length; i += 4) {
const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
data[i] = data[i + 1] = data[i + 2] = avg;
}
break;
case 'sepia':
for (let i = 0; i < data.length; i += 4) {
const r = data[i], g = data[i + 1], b = data[i + 2];
data[i] = Math.min(255, (r * .393) + (g * .769) + (b * .189));
data[i + 1] = Math.min(255, (r * .349) + (g * .686) + (b * .168));
data[i + 2] = Math.min(255, (r * .272) + (g * .534) + (b * .131));
}
break;
case 'invert':
for (let i = 0; i < data.length; i += 4) {
data[i] = 255 - data[i];
data[i + 1] = 255 - data[i + 1];
data[i + 2] = 255 - data[i + 2];
}
break;
case 'blur':
ctx.filter = 'blur(5px)';
ctx.drawImage(canvas, 0, 0);
ctx.filter = 'none';
break;
}
if (filterType !== 'blur') {
ctx.putImageData(imageData, 0, 0);
}
showToast(`Filter ${filterType} diterapkan`);
}

function adjustImage() {
if (!currentEditorImage) return;
const brightness = document.getElementById('brightness').value;
const contrast = document.getElementById('contrast').value;
const saturation = document.getElementById('saturation').value;
ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
ctx.drawImage(currentEditorImage, 0, 0, canvas.width, canvas.height);
ctx.filter = 'none';
}

function rotateImage(degrees) {
if (!currentEditorImage) return;
saveHistory();
const tempCanvas = document.createElement('canvas');
const tempCtx = tempCanvas.getContext('2d');
if (degrees === 90 || degrees === -90) {
tempCanvas.width = canvas.height;
tempCanvas.height = canvas.width;
} else {
tempCanvas.width = canvas.width;
tempCanvas.height = canvas.height;
}
tempCtx.translate(tempCanvas.width / 2, tempCanvas.height / 2);
tempCtx.rotate(degrees * Math.PI / 180);
tempCtx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);
canvas.width = tempCanvas.width;
canvas.height = tempCanvas.height;
ctx.drawImage(tempCanvas, 0, 0);
}

function flipImage(direction) {
if (!currentEditorImage) return;
saveHistory();
const tempCanvas = document.createElement('canvas');
const tempCtx = tempCanvas.getContext('2d');
tempCanvas.width = canvas.width;
tempCanvas.height = canvas.height;
if (direction === 'h') {
tempCtx.translate(canvas.width, 0);
tempCtx.scale(-1, 1);
} else {
tempCtx.translate(0, canvas.height);
tempCtx.scale(1, -1);
}
tempCtx.drawImage(canvas, 0, 0);
ctx.clearRect(0, 0, canvas.width, canvas.height);
ctx.drawImage(tempCanvas, 0, 0);
}

function resizeCanvas() {
const width = prompt('Lebar baru (px):', canvas.width);
const height = prompt('Tinggi baru (px):', canvas.height);
if (width && height) {
saveHistory();
const tempCanvas = document.createElement('canvas');
const tempCtx = tempCanvas.getContext('2d');
tempCanvas.width = canvas.width;
tempCanvas.height = canvas.height;
tempCtx.drawImage(canvas, 0, 0);
canvas.width = parseInt(width);
canvas.height = parseInt(height);
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.drawImage(tempCanvas, 0, 0);
}
}

function addText() {
const text = document.getElementById('textInput').value;
const color = document.getElementById('textColor').value;
const size = document.getElementById('textSize').value;
if (!text) {
showToast('Masukkan teks terlebih dahulu');
return;
}
saveHistory();
ctx.font = `${size}px Orbitron`;
ctx.fillStyle = color;
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.shadowColor = 'rgba(0,0,0,0.5)';
ctx.shadowBlur = 10;
ctx.fillText(text, canvas.width / 2, canvas.height / 2);
ctx.shadowBlur = 0;
showToast('Teks ditambahkan');
}

function startDrawing() {
isDrawing = !isDrawing;
if (isDrawing) {
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDraw);
showToast('Mode gambar aktif - Klik & drag untuk menggambar');
} else {
canvas.removeEventListener('mousedown', startDraw);
canvas.removeEventListener('mousemove', draw);
canvas.removeEventListener('mouseup', stopDraw);
showToast('Mode gambar nonaktif');
}
}

function startDraw(e) {
isDrawing = true;
const rect = canvas.getBoundingClientRect();
const x = (e.clientX - rect.left) * (canvas.width / rect.width);
const y = (e.clientY - rect.top) * (canvas.height / rect.height);
ctx.beginPath();
ctx.moveTo(x, y);
ctx.strokeStyle = document.getElementById('textColor').value;
ctx.lineWidth = 3;
ctx.lineCap = 'round';
}

function draw(e) {
if (!isDrawing) return;
const rect = canvas.getBoundingClientRect();
const x = (e.clientX - rect.left) * (canvas.width / rect.width);
const y = (e.clientY - rect.top) * (canvas.height / rect.height);
ctx.lineTo(x, y);
ctx.stroke();
}

function stopDraw() {
isDrawing = false;
saveHistory();
}

function combinePhotos(direction) {
const input = document.createElement('input');
input.type = 'file';
input.multiple = true;
input.accept = 'image/*';
input.onchange = (e) => {
const files = e.target.files;
if (files.length < 2) {
showToast('Pilih minimal 2 foto');
return;
}
combineMultipleFiles(files);
};
input.click();
}

function addFrame() {
saveHistory();
const frameWidth = 20;
ctx.strokeStyle = '#00d4ff';
ctx.lineWidth = frameWidth;
ctx.strokeRect(0, 0, canvas.width, canvas.height);
showToast('Frame ditambahkan');
}

function addWatermark() {
saveHistory();
const text = 'LINE TOGEL';
ctx.font = 'bold 30px Orbitron';
ctx.fillStyle = 'rgba(0, 212, 255, 0.3)';
ctx.textAlign = 'right';
ctx.fillText(text, canvas.width - 20, canvas.height - 20);
showToast('Watermark ditambahkan');
}

function saveHistory() {
if (!canvas) return;
history.push(canvas.toDataURL());
if (history.length > 10) history.shift();
}

function undoAction() {
if (history.length > 1) {
history.pop();
const previous = history[history.length - 1];
const img = new Image();
img.onload = () => {
canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img, 0, 0);
};
img.src = previous;
showToast('Undo');
}
}

function clearCanvas() {
if (confirm('Hapus semua?')) {
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
currentEditorImage = null;
history = [];
showToast('Canvas dibersihkan');
}
}

function downloadImage() {
const link = document.createElement('a');
link.download = `edited-photo-${Date.now()}.png`;
link.href = canvas.toDataURL();
link.click();
showToast('Foto didownload');
}

function editImageFromUrl(url) {
showSection('editor');
document.querySelectorAll('.nav-tab')[2].classList.add('active');
document.querySelectorAll('.section')[2].classList.add('active');
const img = new Image();
img.crossOrigin = 'anonymous';
img.onload = () => {
currentEditorImage = img;
canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img, 0, 0);
saveHistory();
showToast('Foto dimuat ke editor');
};
img.src = url;
}

function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastText').textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

document.getElementById('imageModal').addEventListener('click', (e) => {
if (e.target.id === 'imageModal') closeModal();
});

document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') closeModal();
if (e.ctrlKey && e.key === 'z') {
e.preventDefault();
undoAction();
}
});
</script>
</body>

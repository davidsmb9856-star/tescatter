<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALERI CYBER - LINE TOGEL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent-primary: #0ff0fc; --accent-secondary: #ff3e6c; --accent-tertiary: #a855f7;
            --accent-gold: #fbbf24; --bg-deep: #050509; --bg-surface: rgba(15, 23, 42, 0.7);
            --bg-card: rgba(20, 30, 50, 0.6); --text-bright: #f8fafc; --text-muted: #94a3b8;
            --border-subtle: rgba(15, 240, 252, 0.15); --glow-primary: rgba(15, 240, 252, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-deep);
            color: var(--text-bright);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient Background */
        .bg-mesh {
            position: fixed; inset: 0; z-index: -2;
            background: 
                radial-gradient(ellipse 80% 60% at 10% 20%, rgba(15, 240, 252, 0.08), transparent 50%),
                radial-gradient(ellipse 60% 50% at 90% 80%, rgba(168, 85, 247, 0.08), transparent 50%);
        }
        .grid-lines {
            position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(rgba(15, 240, 252, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(15, 240, 252, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
        }

        /* Container */
        .container { max-width: 1500px; margin: 0 auto; padding: 40px 24px; position: relative; }

        /* Header */
        .header { text-align: center; margin-bottom: 40px; animation: fadeSlideDown 0.8s ease-out; }
        @keyframes fadeSlideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        
        .header-title {
            font-family: 'Chakra Petch', sans-serif; font-size: clamp(32px, 7vw, 56px);
            font-weight: 700; letter-spacing: 3px; margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, var(--accent-primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(15, 240, 252, 0.2);
        }
        .header-subtitle { font-size: 13px; color: var(--accent-secondary); letter-spacing: 4px; text-transform: uppercase; }

        /* Tabs */
        .tab-nav {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 30px;
            border-bottom: 1px solid var(--border-subtle); padding-bottom: 20px;
        }
        .tab-btn {
            background: transparent; border: 1px solid transparent;
            padding: 10px 24px; border-radius: 8px; color: var(--text-muted);
            font-family: 'Chakra Petch', sans-serif; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; position: relative;
        }
        .tab-btn.active {
            color: var(--accent-primary); background: rgba(15, 240, 252, 0.05);
            border-color: var(--accent-primary); box-shadow: 0 0 15px rgba(15, 240, 252, 0.2);
        }
        .tab-btn i { margin-right: 8px; }

        /* Search Section */
        .search-wrapper {
            display: flex; justify-content: center; gap: 12px; margin-bottom: 40px;
            flex-wrap: wrap; animation: fadeSlideUp 0.8s ease-out 0.2s backwards;
        }
        .search-box { position: relative; width: 100%; max-width: 500px; }
        .search-input {
            width: 100%; padding: 16px 24px 16px 50px;
            background: var(--bg-surface); border: 1px solid var(--border-subtle);
            border-radius: 50px; color: var(--text-bright);
            font-family: 'Space Grotesk', sans-serif; font-size: 15px;
            transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        .search-input:focus { outline: none; border-color: var(--accent-primary); box-shadow: 0 0 20px var(--glow-primary); }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; pointer-events: none; }
        
        .btn-search {
            padding: 0 28px; background: linear-gradient(135deg, var(--accent-tertiary), var(--accent-primary));
            border: none; border-radius: 50px; color: #fff; font-weight: 700;
            font-family: 'Chakra Petch', sans-serif; font-size: 14px;
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-search:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(168, 85, 247, 0.4); }

        /* Stats */
        .stats-row { text-align: center; margin-bottom: 30px; font-size: 13px; color: var(--text-muted); }
        .stats-row span { color: var(--accent-gold); font-weight: 700; }

        /* Gallery Grid */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        /* Card Style */
        .card {
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: 16px; overflow: hidden; position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardPopIn 0.6s ease-out backwards; display: flex; flex-direction: column;
            backdrop-filter: blur(10px);
        }
        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(15, 240, 252, 0.3);
        }
        @keyframes cardPopIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .card-media {
            position: relative; width: 100%; height: 200px;
            overflow: hidden; background: #000; cursor: pointer;
        }
        .card-img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease;
        }
        .card:hover .card-img { transform: scale(1.05); }

        /* Actions Overlay */
        .card-overlay {
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.3s ease;
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px;
        }
        .card:hover .card-overlay { opacity: 1; }

        .btn-group { display: flex; gap: 10px; }

        .btn-icon {
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--accent-primary);
            color: var(--accent-primary); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(5px);
        }
        .btn-icon:hover {
            background: var(--accent-primary); color: #000;
            transform: scale(1.1); box-shadow: 0 0 15px var(--glow-primary);
        }
        .btn-icon.copy-btn { border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(251, 191, 36, 0.1); }
        .btn-icon.copy-btn:hover { background: var(--accent-gold); color: #000; }

        .card-info { padding: 14px; flex-grow: 1; display: flex; align-items: center; justify-content: center; min-height: 50px; }
        .card-title {
            font-family: 'Chakra Petch', sans-serif; font-size: 14px; font-weight: 600;
            color: var(--text-bright); text-align: center; line-height: 1.4;
            overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }

        /* Loading State */
        .loader-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; grid-column: 1 / -1; }
        .spinner { width: 50px; height: 50px; border: 3px solid var(--border-subtle); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast Notification */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(10, 10, 20, 0.9); border: 1px solid var(--accent-primary);
            border-radius: 50px; padding: 12px 24px; color: var(--text-bright);
            font-weight: 600; z-index: 2000; opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(15, 240, 252, 0.2); display: flex; align-items: center; gap: 10px;
            backdrop-filter: blur(10px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast i { color: var(--accent-gold); }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 20px 16px; }
            .gallery-grid { grid-template-columns: 1fr; }
            .search-wrapper { flex-direction: column; }
            .btn-search { width: 100%; justify-content: center; padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="grid-lines"></div>

    <div class="container">
        <header class="header">
            <h1 class="header-title">GALERI CYBER</h1>
            <p class="header-subtitle">LINE TOGEL ARCHIVE SYSTEM</p>
        </header>

        <div class="tab-nav">
            <button class="tab-btn active" id="tabData" onclick="switchTab('data')">
                <i class="fas fa-database"></i> DATA INTERNAL
            </button>
            <button class="tab-btn" id="tabWeb" onclick="switchTab('web')">
                <i class="fas fa-globe"></i> CARI DI WEB
            </button>
        </div>

        <div class="search-wrapper">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Ketik kata kunci...">
            </div>
            <button class="btn-search" onclick="executeSearch()">
                <i class="fas fa-bolt"></i> CARI FOTO
            </button>
        </div>

        <div class="stats-row">
            Ditemukan <span id="totalItems">0</span> item
        </div>

        <div id="galleryGrid" class="gallery-grid">
            <div class="loader-container">
                <div class="spinner"></div>
                <p style="color: var(--text-muted);">Menghubungkan ke database...</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastText">Berhasil!</span>
    </div>

    <script>
        // CONFIG
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        const GID = '1246502038';
        const QUERY = 'SELECT C, D WHERE D IS NOT NULL';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${encodeURIComponent(QUERY)}&gid=${GID}`;

        // STATE
        let currentMode = 'data'; // 'data' or 'web'
        let cachedInternalData = [];
        const galleryGrid = document.getElementById('galleryGrid');
        const totalItems = document.getElementById('totalItems');
        const searchInput = document.getElementById('searchInput');

        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            loadInternalData();
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') executeSearch();
            });
        });

        // TAB SWITCHER
        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            if (mode === 'data') {
                document.getElementById('tabData').classList.add('active');
                searchInput.placeholder = "Cari di data internal...";
                renderGallery(cachedInternalData);
            } else {
                document.getElementById('tabWeb').classList.add('active');
                searchInput.placeholder = "Contoh: Nature, Cars, Cyberpunk...";
                // Clear grid for web search prompt
                galleryGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px;">
                        <i class="fas fa-globe" style="font-size: 48px; color: var(--accent-tertiary); margin-bottom: 20px;"></i>
                        <h3 style="font-family: 'Chakra Petch'; margin-bottom: 10px;">MODE PENCARIAN WEB</h3>
                        <p style="color: var(--text-muted);">Ketik kata kunci di atas lalu tekan CARI FOTO.</p>
                    </div>
                `;
                totalItems.textContent = "0";
            }
        }

        // SEARCH EXECUTION
        function executeSearch() {
            const query = searchInput.value.trim();
            if (currentMode === 'web') {
                if (query) loadWebImages(query);
                else showToast("Masukkan kata kunci pencarian web");
            } else {
                filterInternal(query);
            }
        }

        // 1. LOAD INTERNAL SHEET DATA
        async function loadInternalData() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const jsonString = text.substring(47).slice(0, -2);
                const json = JSON.parse(jsonString);
                const rows = json.table.rows;

                cachedInternalData = rows.map(row => {
                    let title = row.c[0] ? row.c[0].v : 'Tanpa Judul';
                    let url = row.c[1] ? row.c[1].v : null;
                    
                    // Fix Google Drive URL automatically if detected
                    if (url && url.includes("drive.google.com")) {
                        url = convertDriveLink(url);
                    }

                    return { title, url };
                }).filter(item => item.url);

                renderGallery(cachedInternalData);
            } catch (err) {
                console.error(err);
                galleryGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--accent-secondary); padding: 40px;">Gagal memuat data. Coba refresh halaman.</div>`;
            }
        }

        // Helper: Convert Google Drive Link to Direct Image Link
        function convertDriveLink(url) {
            // Patterns: /d/ID/ or open?id=ID
            let id = null;
            const dMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            const idMatch = url.match(/open\?id=([a-zA-Z0-9_-]+)/);
            const viewMatch = url.match(/\/view\?.*id=([a-zA-Z0-9_-]+)/);

            if (dMatch) id = dMatch[1];
            else if (idMatch) id = idMatch[1];
            else if (viewMatch) id = viewMatch[1];
            
            return id ? `https://drive.google.com/uc?export=view&id=${id}` : url;
        }

        // Filter Internal Data
        function filterInternal(query) {
            const q = query.toLowerCase();
            const filtered = cachedInternalData.filter(item => item.title.toLowerCase().includes(q));
            renderGallery(filtered);
        }

        // 2. LOAD WEB IMAGES (UNSPLASH SOURCE)
        async function loadWebImages(query) {
            galleryGrid.innerHTML = `<div class="loader-container"><div class="spinner"></div><p>Mencari foto: "${query}"...</p></div>`;
            
            // Create synthetic data using Unsplash Source API (No key needed)
            const images = [];
            for(let i = 0; i < 15; i++) {
                const rand = Math.floor(Math.random() * 1000);
                images.push({
                    title: `${query} - ${i+1}`,
                    url: `https://source.unsplash.com/600x400/?${encodeURIComponent(query)}&sig=${rand}`
                });
            }
            
            // Small delay for UX
            await new Promise(r => setTimeout(r, 800));
            renderGallery(images);
        }

        // 3. RENDER GALLERY
        function renderGallery(items) {
            galleryGrid.innerHTML = '';
            totalItems.textContent = items.length;

            if (items.length === 0) {
                galleryGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">Tidak ada hasil ditemukan.</div>`;
                return;
            }

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <div class="card-media">
                        <img src="${item.url}" alt="${item.title}" class="card-img" loading="lazy" onerror="this.onerror=null;this.src='https://via.placeholder.com/400x300/0f172a/0ff0fc?text=Error';">
                        <div class="card-overlay">
                            <div class="btn-group">
                                <button class="btn-icon copy-btn" onclick="copyImage('${item.url}')" title="Salin Foto/Link">
                                    <i class="fas fa-copy"></i>
                                </button>
                                <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="btn-icon" title="Buka Full">
                                    <i class="fas fa-external-link-alt"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="card-info">
                        <h3 class="card-title">${item.title}</h3>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // 4. COPY FUNCTION (LOGIC UPGRADE)
        async function copyImage(url) {
            try {
                showToast("Mencoba menyalin foto...", "loading");
                
                // Try to fetch the image as blob
                const response = await fetch(url);
                const blob = await response.blob();
                
                // Try writing to clipboard
                await navigator.clipboard.write([
                    new ClipboardItem({ [blob.type]: blob })
                ]);
                
                showToast("Foto berhasil disalin ke clipboard!");
                
            } catch (err) {
                console.error("Copy image failed (CORS/Browser), switching to link copy", err);
                // Fallback: Copy Link
                try {
                    await navigator.clipboard.writeText(url);
                    showToast("Gagal salin gambar (CORS). Link disalin!");
                } catch (e2) {
                    showToast("Gagal menyalin. Coba buka manual.");
                }
            }
        }

        // TOAST HELPER
        function showToast(message) {
            const toast = document.getElementById('toast');
            const text = document.getElementById('toastText');
            text.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f5ff">
<meta name="description" content="LINE TOGEL - Portal Aplikasi Cyber Core 2026">
<title>LINE TOGEL - Cyber Portal 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-cyan: #00f5ff;
--neon-pink: #ff00aa;
--neon-purple: #b72aff;
--neon-gold: #ffd700;
--neon-green: #00ff9d;
--neon-red: #ff3e6c;
--bg-deep: #05050a;
--bg-surface: rgba(10, 15, 35, 0.85);
--bg-elevated: rgba(20, 25, 55, 0.75);
--bg-glass: rgba(15, 20, 45, 0.6);
--text-primary: #ffffff;
--text-secondary: #a0b3d6;
--text-dim: #64748b;
--border-glow: rgba(0, 245, 255, 0.5);
--glow-cyan: 0 0 10px rgba(0, 245, 255, 0.5), 0 0 25px rgba(0, 245, 255, 0.3), 0 0 60px rgba(0, 245, 255, 0.15);
--glow-pink: 0 0 10px rgba(255, 0, 170, 0.5), 0 0 25px rgba(255, 0, 170, 0.3);
--glow-purple: 0 0 10px rgba(183, 42, 255, 0.5), 0 0 25px rgba(183, 42, 255, 0.3);
--transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
--transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
--transition-bloom: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-deep);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.5;
}
/* ========== BACKGROUND EFFECTS 2026 ========== */
.bg-canvas {
position: fixed;
inset: 0;
z-index: -3;
background:
radial-gradient(ellipse at 20% 20%, rgba(0, 245, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 80% 15%, rgba(255, 0, 170, 0.1) 0%, transparent 50%),
radial-gradient(ellipse at 50% 85%, rgba(183, 42, 255, 0.08) 0%, transparent 50%),
radial-gradient(ellipse at 15% 75%, rgba(255, 215, 0, 0.06) 0%, transparent 50%);
animation: bgPulse 15s ease-in-out infinite alternate;
}
@keyframes bgPulse {
0%, 100% { opacity: 1; filter: hue-rotate(0deg); }
50% { opacity: 0.95; filter: hue-rotate(25deg); }
}
/* Animated Grid */
.grid-overlay {
position: fixed;
inset: 0;
z-index: -2;
background-image:
linear-gradient(rgba(0, 245, 255, 0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 245, 255, 0.04) 1px, transparent 1px);
background-size: 60px 60px;
mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 75%);
animation: gridMove 30s linear infinite;
}
@keyframes gridMove {
0% { background-position: 0 0; }
100% { background-position: 60px 60px; }
}
/* Floating Particles */
.particles {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
overflow: hidden;
}
.particle {
position: absolute;
width: 3px; height: 3px;
background: var(--neon-cyan);
border-radius: 50%;
opacity: 0.6;
animation: particleFloat 20s infinite ease-in-out;
box-shadow: 0 0 10px var(--neon-cyan);
}
.particle:nth-child(2n) {
background: var(--neon-pink);
box-shadow: 0 0 10px var(--neon-pink);
animation-delay: -5s;
animation-duration: 25s;
}
.particle:nth-child(3n) {
background: var(--neon-purple);
box-shadow: 0 0 10px var(--neon-purple);
animation-delay: -10s;
animation-duration: 30s;
}
@keyframes particleFloat {
0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
10% { opacity: 0.6; }
90% { opacity: 0.6; }
100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}
/* Scan Line Effect */
.scanline {
position: fixed;
left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
opacity: 0.7;
animation: scanLine 8s linear infinite;
z-index: 100;
pointer-events: none;
filter: blur(1px);
}
@keyframes scanLine {
0% { top: -2px; opacity: 0; }
5% { opacity: 0.7; }
95% { opacity: 0.7; }
100% { top: 100%; opacity: 0; }
}
/* Noise Texture */
.noise {
position: fixed;
inset: 0;
z-index: -1;
opacity: 0.025;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
pointer-events: none;
}
/* ========== CONTAINER & LAYOUT ========== */
.container {
max-width: 1600px;
margin: 0 auto;
padding: 40px 28px;
min-height: 100vh;
position: relative;
}
/* ========== HEADER 2026 ========== */
.header {
text-align: center;
margin-bottom: 45px;
animation: headerEntrance 1s var(--transition-bloom) backwards;
}
@keyframes headerEntrance {
from { opacity: 0; transform: translateY(-50px) scale(0.95); }
to { opacity: 1; transform: translateY(0) scale(1); }
}
.logo-wrapper {
position: relative;
display: inline-block;
margin-bottom: 25px;
}
.logo-glow {
position: absolute;
inset: -25px;
background: radial-gradient(ellipse, rgba(0, 245, 255, 0.25) 0%, transparent 70%);
border-radius: 50%;
animation: logoGlowPulse 3s ease-in-out infinite;
filter: blur(20px);
}
@keyframes logoGlowPulse {
0%, 100% { opacity: 0.6; transform: scale(1); }
50% { opacity: 1; transform: scale(1.15); }
}
.logo-icon {
width: 110px; height: 110px;
position: relative;
margin: 0 auto;
filter: drop-shadow(var(--glow-cyan));
}
.logo-icon svg {
width: 100%; height: 100%;
animation: logoRotate 20s linear infinite;
}
@keyframes logoRotate {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}
.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(42px, 9vw, 72px);
font-weight: 900;
letter-spacing: 6px;
margin-bottom: 12px;
position: relative;
background: linear-gradient(135deg, var(--neon-cyan) 0%, #ffffff 35%, var(--neon-pink) 70%, var(--neon-purple) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 0 0 40px rgba(0, 245, 255, 0.4);
animation: titleShimmer 4s ease-in-out infinite;
}
@keyframes titleShimmer {
0%, 100% { filter: brightness(1); }
50% { filter: brightness(1.2); }
}
.title .accent {
background: linear-gradient(135deg, var(--neon-pink), var(--neon-gold));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}
.subtitle {
font-size: 15px;
color: var(--text-secondary);
letter-spacing: 8px;
text-transform: uppercase;
margin-bottom: 20px;
font-weight: 500;
}
/* Status Pill 2026 */
.status-badge {
display: inline-flex;
align-items: center;
gap: 12px;
padding: 10px 24px;
background: rgba(0, 255, 157, 0.12);
border: 1px solid rgba(0, 255, 157, 0.4);
border-radius: 100px;
font-size: 13px;
font-weight: 600;
color: var(--neon-green);
text-transform: uppercase;
letter-spacing: 2px;
animation: statusPulse 2.5s ease-in-out infinite;
box-shadow: 0 0 20px rgba(0, 255, 157, 0.25);
}
@keyframes statusPulse {
0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 157, 0.25); }
50% { box-shadow: 0 0 35px rgba(0, 255, 157, 0.5); }
}
.status-dot {
width: 9px; height: 9px;
background: var(--neon-green);
border-radius: 50%;
animation: dotBeat 1.5s ease-in-out infinite;
box-shadow: 0 0 15px var(--neon-green);
}
@keyframes dotBeat {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.4); opacity: 0.7; }
}
/* ========== SEARCH BOX 2026 ========== */
.search-container {
max-width: 800px;
margin: 0 auto 40px;
position: relative;
}
.search-box {
width: 100%;
padding: 18px 60px 18px 28px;
background: var(--bg-surface);
border: 2px solid var(--border-glow);
border-radius: 16px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 16px;
transition: all 0.3s;
backdrop-filter: blur(10px);
}
.search-box:focus {
outline: none;
border-color: var(--neon-cyan);
box-shadow: var(--glow-cyan);
}
.search-btn {
position: absolute;
right: 10px;
top: 50%;
transform: translateY(-50%);
width: 50px;
height: 50px;
background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
border: none;
border-radius: 12px;
color: var(--bg-deep);
font-size: 20px;
cursor: pointer;
transition: all 0.3s;
display: flex;
align-items: center;
justify-content: center;
}
.search-btn:hover {
transform: translateY(-50%) scale(1.05);
box-shadow: 0 0 25px rgba(0, 245, 255, 0.6);
}
.search-info {
text-align: center;
margin-top: 12px;
font-size: 13px;
color: var(--text-secondary);
}
/* ========== GALLERY GRID 2026 ========== */
.gallery-section {
margin-bottom: 50px;
animation: sectionReveal 0.7s var(--transition-bloom) backwards;
}
.section-title {
font-family: 'Orbitron', sans-serif;
font-size: 18px;
font-weight: 700;
color: var(--text-primary);
margin-bottom: 22px;
padding-bottom: 14px;
border-bottom: 1px solid var(--border-glow);
display: flex;
align-items: center;
gap: 14px;
letter-spacing: 3px;
position: relative;
}
.section-title::before {
content: '';
width: 5px; height: 24px;
background: linear-gradient(180deg, var(--neon-cyan), var(--neon-pink));
border-radius: 3px;
box-shadow: 0 0 15px rgba(0, 245, 255, 0.6);
}
.section-title::after {
content: '';
position: absolute;
bottom: -1px; left: 0;
width: 60px; height: 2px;
background: var(--neon-cyan);
box-shadow: 0 0 10px var(--neon-cyan);
}
.gallery-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
gap: 25px;
}
/* ========== PHOTO CARD 2026 - FULL IMAGE ========== */
.photo-card {
background: var(--bg-surface);
border: 1px solid rgba(0, 245, 255, 0.25);
border-radius: 20px;
overflow: hidden;
transition: var(--transition-bloom);
position: relative;
backdrop-filter: blur(10px);
}
.photo-card:hover {
transform: translateY(-8px) scale(1.02);
border-color: var(--neon-cyan);
box-shadow: var(--glow-cyan), 0 25px 50px rgba(0, 0, 0, 0.4);
}
.photo-wrapper {
position: relative;
width: 100%;
background: var(--bg-elevated);
overflow: hidden;
}
/* FULL IMAGE - NO CROPPING */
.photo-wrapper img {
width: 100%;
height: auto;
display: block;
object-fit: contain;
max-height: 600px;
margin: 0 auto;
}
.photo-overlay {
position: absolute;
top: 0;
left: 0;
right: 0;
bottom: 0;
background: rgba(0, 0, 0, 0.7);
display: flex;
align-items: center;
justify-content: center;
gap: 15px;
opacity: 0;
transition: opacity 0.3s;
padding: 20px;
}
.photo-card:hover .photo-overlay { 
opacity: 1; 
}
.action-btn {
width: 50px;
height: 50px;
background: var(--neon-cyan);
border: none;
border-radius: 50%;
color: var(--bg-deep);
font-size: 18px;
cursor: pointer;
transition: all 0.3s;
display: flex;
align-items: center;
justify-content: center;
}
.action-btn:hover {
transform: scale(1.15) rotate(10deg);
box-shadow: 0 0 25px rgba(0, 245, 255, 0.7);
}
.photo-info {
padding: 20px;
}
.photo-title {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
font-weight: 700;
color: var(--neon-cyan);
margin-bottom: 8px;
word-break: break-word;
}
.photo-meta {
font-size: 13px;
color: var(--text-secondary);
}
.no-results {
text-align: center;
padding: 60px 20px;
color: var(--text-secondary);
grid-column: 1 / -1;
}
.no-results i {
font-size: 64px;
color: var(--neon-cyan);
margin-bottom: 20px;
opacity: 0.5;
}
/* ========== LOADING ========== */
.loading {
display: none;
text-align: center;
padding: 40px;
grid-column: 1 / -1;
}
.loading.active { display: block; }
.loader {
width: 60px;
height: 60px;
border: 4px solid rgba(0, 245, 255, 0.2);
border-top-color: var(--neon-cyan);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* ========== MODAL FOR FULL IMAGE ========== */
.modal-backdrop {
position: fixed;
inset: 0;
background: rgba(5, 5, 15, 0.95);
backdrop-filter: blur(15px);
z-index: 1000;
display: none;
align-items: center;
justify-content: center;
padding: 20px;
}
.modal-backdrop.active { display: flex; }
.modal-content {
background: var(--bg-surface);
border: 2px solid var(--border-glow);
border-radius: 24px;
max-width: 1200px;
width: 100%;
max-height: 95vh;
overflow: auto;
position: relative;
}
.modal-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 20px 25px;
border-bottom: 1px solid rgba(0, 245, 255, 0.2);
}
.modal-title {
font-family: 'Orbitron', sans-serif;
font-size: 20px;
color: var(--neon-cyan);
}
.modal-close {
width: 42px;
height: 42px;
background: transparent;
border: 2px solid var(--neon-pink);
border-radius: 50%;
color: var(--neon-pink);
font-size: 18px;
cursor: pointer;
transition: all 0.3s;
}
.modal-close:hover {
background: var(--neon-pink);
color: var(--bg-deep);
transform: rotate(90deg);
}
.modal-body {
padding: 25px;
text-align: center;
}
.modal-body img {
max-width: 100%;
height: auto;
border-radius: 12px;
}
.modal-actions {
margin-top: 20px;
display: flex;
gap: 12px;
justify-content: center;
flex-wrap: wrap;
}
.btn {
padding: 12px 24px;
border-radius: 12px;
font-family: 'Rajdhani', sans-serif;
font-size: 14px;
font-weight: 600;
cursor: pointer;
transition: all 0.3s;
border: none;
display: inline-flex;
align-items: center;
gap: 8px;
text-transform: uppercase;
letter-spacing: 1px;
}
.btn-primary {
background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
color: var(--bg-deep);
}
.btn-primary:hover {
transform: translateY(-3px);
box-shadow: var(--glow-cyan);
}
.btn-outline {
background: transparent;
border: 2px solid var(--neon-pink);
color: var(--neon-pink);
}
.btn-outline:hover {
background: var(--neon-pink);
color: var(--bg-deep);
}
/* ========== TOAST ========== */
.toast {
position: fixed;
bottom: 28px;
right: 28px;
background: var(--bg-surface);
border: 1px solid var(--neon-cyan);
border-radius: 16px;
padding: 14px 22px;
display: flex;
align-items: center;
gap: 12px;
transform: translateX(160%);
transition: var(--transition-bloom);
z-index: 2000;
backdrop-filter: blur(12px);
box-shadow: var(--glow-cyan);
}
.toast.show { transform: translateX(0); }
.toast-icon { color: var(--neon-green); font-size: 19px; }
.toast-text { font-weight: 600; font-size: 14px; }
/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
.container { padding: 24px 16px; }
.gallery-grid { grid-template-columns: 1fr; }
.search-box { padding: 15px 55px 15px 20px; font-size: 14px; }
}
</style>
</head>
<body>
<div class="bg-canvas"></div>
<div class="grid-overlay"></div>
<div class="noise"></div>
<div class="particles" id="particles"></div>
<div class="scanline"></div>

<div class="container">
<header class="header">
<div class="logo-wrapper">
<div class="logo-glow"></div>
<div class="logo-icon">
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
<circle cx="50" cy="50" r="38" stroke="url(#grad1)" stroke-width="2" stroke-dasharray="10 5"/>
<circle cx="50" cy="50" r="27" stroke="#00f5ff" stroke-width="2"/>
<circle cx="50" cy="50" r="17" fill="url(#grad2)"/>
<ellipse cx="50" cy="50" rx="48" ry="20" stroke="#00f5ff" stroke-width="1" stroke-dasharray="5 7" opacity="0.6">

<stop offset="100%" style="stop-color:#b72aff"/>
</radialGradient>
</defs>
</svg>

</div>

<p class="subtitle">Cyber Core Portal 2026</p>

<span class="status-dot"></span>
<span>SYSTEM ONLINE</span>
</div>
</header>

<!-- SEARCH BOX -->

<input type="text" class="search-box" id="searchInput" placeholder="Cari foto berdasarkan judul..." onkeyup="searchPhotos()">

<i class="fas fa-search"></i>
</button>

<i class="fas fa-info-circle"></i> Ketik judul untuk mencari foto

<script>
// Global variables
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';

// Initialize
document.addEventListener('DOMContentLoaded', () => {
createParticles();
fetchPhotosFromSheet();
});

// Generate floating particles
function createParticles() {
const container = document.getElementById('particles');
for(let i = 0; i < 50; i++) {
const p = document.createElement('div');
p.className = 'particle';
p.style.left = Math.random() * 100 + '%';
p.style.animationDelay = Math.random() * 20 + 's';
p.style.animationDuration = (15 + Math.random() * 20) + 's';
container.appendChild(p);
}
}

// Fetch photos from Google Sheets
async function fetchPhotosFromSheet() {
document.getElementById('loading').classList.add('active');
document.getElementById('galleryGrid').innerHTML = '';

try {
// Google Sheets ID dan GID
const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';

// Method 1: Try GVIZ API
try {
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`;
const response = await fetch(gvizUrl);
const text = await response.text();
const json = JSON.parse(text.substring(47).slice(0, -2));

const rows = json.table.rows;
allPhotos = [];

rows.forEach((row, index) => {
if (index === 0) return; // Skip header
const c = row.c;
if (!c) return;

// Kolom C (index 2) = JUDUL
// Kolom D (index 3) = FOTO
const judul = c[2] ? (c[2].v || '') : '';
const foto = c[2] ? (c[2].v || '') : '';

// Hanya ambil yang ada isinya
if (judul && foto) {
allPhotos.push({
judul: judul,
foto: foto,
index: index
});
}
});

} catch (e) {
console.log('GVIZ failed, trying CSV...', e);
// Method 2: Try CSV export
const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
const csvResponse = await fetch(csvUrl);
const csvText = await csvResponse.text();
const csvRows = csvText.split('\n').map(row => row.split(','));

allPhotos = [];
csvRows.forEach((row, index) => {
if (index < 1) return; // Skip header
if (row.length < 4) return;

const judul = row[2] ? row[2].replace(/"/g, '').trim() : '';
const foto = row[3] ? row[3].replace(/"/g, '').trim() : '';

if (judul && foto) {
allPhotos.push({
judul: judul,
foto: foto,
index: index
});
}
});
}

renderGallery(allPhotos);
showToast(`Berhasil memuat ${allPhotos.length} foto`);

} catch (error) {
console.error('Error fetching photos:', error);
showToast('Gagal mengambil data dari Google Sheets');
document.getElementById('galleryGrid').innerHTML = `
<div class="no-results">
<i class="fas fa-exclamation-triangle"></i>
<h3>Gagal Memuat Foto</h3>
<p>Pastikan Google Sheets sudah dipublikasikan</p>
</div>
`;
}

document.getElementById('loading').classList.remove('active');
}

// Render gallery
function renderGallery(photos) {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';

if (photos.length === 0) {
grid.innerHTML = `
<div class="no-results">
<i class="fas fa-search"></i>
<h3>Tidak Ada Foto</h3>
<p>Tidak ada foto yang sesuai dengan pencarian</p>
</div>
`;
return;
}

photos.forEach((photo, idx) => {
const card = createPhotoCard(photo.foto, photo.judul, idx);
grid.appendChild(card);
});
}

// Create photo card
function createPhotoCard(url, title, index) {
const card = document.createElement('div');
card.className = 'photo-card';

card.innerHTML = `
<div class="photo-wrapper">
<img src="${url}" alt="${title}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect fill=%22%231a1a2e%22 width=%22400%22 height=%22300%22/%3E%3Ctext fill=%22%2300f5ff%22 font-family=%22Arial%22 font-size=%2218%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3EGambar tidak tersedia%3C/text%3E%3C/svg%3E'" loading="lazy">
<div class="photo-overlay">
<button class="action-btn" onclick="viewFullImage('${url}', '${title.replace(/'/g, "\\'")}')" title="Lihat Full">
<i class="fas fa-eye"></i>
</button>
<button class="action-btn" onclick="copyPhoto('${url}')" title="Copy Foto">
<i class="fas fa-copy"></i>
</button>
<button class="action-btn" onclick="downloadPhoto('${url}', '${title.replace(/'/g, "\\'")}')" title="Download">
<i class="fas fa-download"></i>
</button>
</div>
</div>
<div class="photo-info">
<div class="photo-title">${title}</div>
<div class="photo-meta">Foto #${index + 1}</div>
</div>
`;

return card;
}

// Search photos
function searchPhotos() {
const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

if (!searchTerm) {
renderGallery(allPhotos);
return;
}

const filtered = allPhotos.filter(photo => 
photo.judul.toLowerCase().includes(searchTerm)
);

renderGallery(filtered);

if (filtered.length > 0) {
showToast(`Ditemukan ${filtered.length} foto`);
}
}

// View full image in modal
function viewFullImage(url, title) {
currentImageUrl = url;
currentImageTitle = title;
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalImage').src = url;
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
}

// Close modal
function closeModal() {
document.getElementById('imageModal').classList.remove('active');
document.body.style.overflow = '';
currentImageUrl = '';
currentImageTitle = '';
}

// Copy photo to clipboard
async function copyPhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([
new ClipboardItem({
[blob.type]: blob
})
]);
showToast('Foto berhasil disalin ke clipboard!');
} catch (error) {
console.error('Copy error:', error);
showToast('Buka foto lalu klik kanan > Copy Image');
}
}

// Copy from modal
async function copyImage() {
if (currentImageUrl) {
await copyPhoto(currentImageUrl);
}
}

// Download photo
function downloadPhoto(url, filename) {
const link = document.createElement('a');
link.href = url;
link.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
link.target = '_blank';
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
showToast('Download dimulai...');
}

// Download from modal
function downloadImage() {
if (currentImageUrl && currentImageTitle) {
downloadPhoto(currentImageUrl, currentImageTitle);
}
}

// Show toast notification
function showToast(message, duration = 3000) {
const toast = document.getElementById('toast');
const toastText = document.getElementById('toastText');
toastText.textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), duration);
}

// Close modal on outside click
document.getElementById('imageModal').addEventListener('click', (e) => {
if (e.target.id === 'imageModal') closeModal();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>

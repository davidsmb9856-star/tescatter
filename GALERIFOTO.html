<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>⚡ FOTO GALLERY - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-blue: #00d4ff;
--neon-cyan: #00ffff;
--neon-electric: #00f5ff;
--neon-purple: #7b2fff;
--neon-pink: #ff00aa;
--neon-gold: #ffd700;
--neon-green: #00ff9d;
--bg-deep: #020408;
--bg-surface: rgba(5, 15, 35, 0.9);
--bg-elevated: rgba(10, 25, 55, 0.8);
--bg-glass: rgba(8, 20, 45, 0.7);
--text-primary: #ffffff;
--text-secondary: #8ab4f8;
--text-dim: #54689a;
--border-glow: rgba(0, 212, 255, 0.6);
--glow-blue: 0 0 15px rgba(0, 212, 255, 0.6), 0 0 35px rgba(0, 212, 255, 0.4);
--glow-electric: 0 0 20px rgba(0, 245, 255, 0.7), 0 0 50px rgba(0, 245, 255, 0.4);
--transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
--transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
--transition-bloom: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-deep);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.6;
}

/* Background Effects */
.bg-canvas {
position: fixed;
inset: 0;
z-index: -3;
background:
radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
radial-gradient(ellipse at 80% 15%, rgba(0, 245, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 50% 85%, rgba(123, 47, 255, 0.1) 0%, transparent 50%);
animation: bgPulse 15s ease-in-out infinite alternate;
}
@keyframes bgPulse {
0%, 100% { opacity: 1; filter: hue-rotate(0deg); }
50% { opacity: 0.9; filter: hue-rotate(15deg); }
}

.grid-overlay {
position: fixed;
inset: 0;
z-index: -2;
background-image:
linear-gradient(rgba(0, 212, 255, 0.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.06) 1px, transparent 1px);
background-size: 50px 50px;
mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 75%);
animation: gridMove 30s linear infinite;
}
@keyframes gridMove {
0% { background-position: 0 0; }
100% { background-position: 50px 50px; }
}

.lightning-overlay {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
opacity: 0;
animation: lightningFlash 8s infinite;
}
@keyframes lightningFlash {
0%, 89%, 91%, 93%, 100% { opacity: 0; }
90%, 92% { opacity: 0.15; }
}
.lightning-bolt {
position: absolute;
width: 2px;
height: 100vh;
background: linear-gradient(180deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
filter: blur(2px);
animation: lightningStrike 8s infinite;
}
.lightning-bolt:nth-child(1) { left: 15%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 2s; }
.lightning-bolt:nth-child(3) { left: 85%; animation-delay: 4s; }
@keyframes lightningStrike {
0%, 89%, 91%, 93%, 100% { transform: scaleY(0); opacity: 0; }
90%, 92% { transform: scaleY(1); opacity: 1; }
}

.particles {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
overflow: hidden;
}
.particle {
position: absolute;
width: 3px; height: 3px;
background: var(--neon-blue);
border-radius: 50%;
opacity: 0.7;
animation: particleFloat 20s infinite ease-in-out;
box-shadow: 0 0 10px var(--neon-blue);
}
.particle:nth-child(2n) {
background: var(--neon-electric);
box-shadow: 0 0 15px var(--neon-electric);
animation-delay: -5s;
animation-duration: 25s;
}
.particle:nth-child(3n) {
background: var(--neon-purple);
box-shadow: 0 0 10px var(--neon-purple);
animation-delay: -10s;
animation-duration: 30s;
}
@keyframes particleFloat {
0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
10% { opacity: 0.7; }
90% { opacity: 0.7; }
100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}

.scanline {
position: fixed;
left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
opacity: 0.6;
animation: scanLine 6s linear infinite;
z-index: 50;
pointer-events: none;
filter: blur(1px);
}
@keyframes scanLine {
0% { top: -3px; opacity: 0; }
5% { opacity: 0.6; }
95% { opacity: 0.6; }
100% { top: 100%; opacity: 0; }
}

.noise {
position: fixed;
inset: 0;
z-index: -1;
opacity: 0.03;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
pointer-events: none;
}

/* Layout */
.container {
max-width: 1400px;
margin: 0 auto;
padding: 25px 18px;
min-height: 100vh;
position: relative;
}

.header {
text-align: center;
margin-bottom: 30px;
animation: headerEntrance 1s var(--transition-bloom) backwards;
}
@keyframes headerEntrance {
from { opacity: 0; transform: translateY(-50px) scale(0.95); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

.back-btn {
position: fixed;
left: 18px; top: 25px;
background: rgba(0, 212, 255, 0.15);
border: 1px solid var(--neon-blue);
color: var(--neon-blue);
padding: 6px 14px;
border-radius: 8px;
text-decoration: none;
font-weight: 600;
font-size: 11px;
display: flex;
align-items: center;
gap: 6px;
transition: var(--transition-smooth);
backdrop-filter: blur(10px);
z-index: 1000;
pointer-events: auto;
}
.back-btn:hover {
background: rgba(0, 212, 255, 0.3);
transform: translateX(-5px);
box-shadow: var(--glow-blue);
}

.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(28px, 6vw, 48px);
font-weight: 900;
letter-spacing: 4px;
margin-bottom: 8px;
position: relative;
background: linear-gradient(135deg, var(--neon-electric) 0%, var(--neon-blue) 35%, #ffffff 50%, var(--neon-blue) 70%, var(--neon-purple) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
animation: titleShimmer 3s ease-in-out infinite;
}
@keyframes titleShimmer {
0%, 100% { filter: brightness(1); }
50% { filter: brightness(1.3); }
}

.subtitle {
font-size: 11px;
color: var(--text-secondary);
letter-spacing: 5px;
text-transform: uppercase;
margin-bottom: 14px;
font-weight: 500;
}

.status-badge {
display: inline-flex;
align-items: center;
gap: 8px;
padding: 6px 16px;
background: rgba(0, 255, 157, 0.12);
border: 1px solid rgba(0, 255, 157, 0.4);
border-radius: 100px;
font-size: 10px;
font-weight: 600;
color: var(--neon-green);
text-transform: uppercase;
letter-spacing: 2px;
animation: statusPulse 2.5s ease-in-out infinite;
box-shadow: 0 0 15px rgba(0, 255, 157, 0.25);
}
@keyframes statusPulse {
0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 157, 0.25); }
50% { box-shadow: 0 0 25px rgba(0, 255, 157, 0.5); }
}
.status-dot {
width: 6px; height: 6px;
background: var(--neon-green);
border-radius: 50%;
animation: dotBeat 1.5s ease-in-out infinite;
box-shadow: 0 0 10px var(--neon-green);
}
@keyframes dotBeat {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.4); opacity: 0.7; }
}

/* Navigation */
.nav-tabs {
display: flex;
gap: 10px;
justify-content: center;
margin-bottom: 25px;
flex-wrap: wrap;
}
.nav-tab {
padding: 10px 22px;
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: 8px;
color: var(--text-primary);
font-family: 'Orbitron', sans-serif;
font-size: 11px;
font-weight: 600;
cursor: pointer;
transition: all 0.3s;
text-transform: uppercase;
letter-spacing: 1px;
backdrop-filter: blur(10px);
}
.nav-tab:hover, .nav-tab.active {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 245, 255, 0.15));
border-color: var(--neon-electric);
box-shadow: var(--glow-electric);
transform: translateY(-2px);
}

.section { display: none; }
.section.active { display: block; animation: fadeIn 0.5s; }
@keyframes fadeIn {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

/* Search */
.search-container {
max-width: 600px;
margin: 0 auto 25px;
}
.search-box {
width: 100%;
padding: 12px 45px 12px 18px;
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: 10px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 13px;
transition: all 0.3s;
backdrop-filter: blur(10px);
}
.search-box:focus {
outline: none;
border-color: var(--neon-electric);
box-shadow: var(--glow-electric);
}
.search-btn {
position: absolute;
right: 8px;
top: 50%;
transform: translateY(-50%);
width: 38px;
height: 38px;
background: linear-gradient(135deg, var(--neon-electric), var(--neon-blue));
border: none;
border-radius: 8px;
color: var(--bg-deep);
font-size: 14px;
cursor: pointer;
transition: all 0.3s;
display: flex;
align-items: center;
justify-content: center;
}
.search-btn:hover {
transform: translateY(-50%) scale(1.05);
box-shadow: 0 0 20px rgba(0, 245, 255, 0.6);
}

/* Gallery Section */
.gallery-section {
margin-bottom: 35px;
animation: sectionReveal 0.7s var(--transition-bloom) backwards;
}
@keyframes sectionReveal {
from { opacity: 0; transform: translateY(40px); }
to { opacity: 1; transform: translateY(0); }
}

.section-title {
font-family: 'Orbitron', sans-serif;
font-size: 14px;
font-weight: 700;
color: var(--text-primary);
margin-bottom: 16px;
padding-bottom: 10px;
border-bottom: 1px solid var(--border-glow);
display: flex;
align-items: center;
gap: 10px;
letter-spacing: 2px;
position: relative;
}
.section-title::before {
content: '';
width: 4px; height: 18px;
background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue));
border-radius: 2px;
box-shadow: 0 0 10px rgba(0, 245, 255, 0.6);
}

.gallery-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 16px;
}

/* Photo Card - UPDATED FOR FULL IMAGE & COOL BLUE BACKGROUND */
.photo-card {
background: var(--bg-surface);
border: 1px solid rgba(0, 212, 255, 0.25);
border-radius: 12px;
overflow: hidden;
transition: var(--transition-bloom);
position: relative;
backdrop-filter: blur(10px);
animation: cardEnter 0.5s ease forwards;
opacity: 0;
transform: translateY(20px);
}
.photo-card:nth-child(1) { animation-delay: 0.1s; }
.photo-card:nth-child(2) { animation-delay: 0.15s; }
.photo-card:nth-child(3) { animation-delay: 0.2s; }
.photo-card:nth-child(4) { animation-delay: 0.25s; }
.photo-card:nth-child(5) { animation-delay: 0.3s; }
@keyframes cardEnter {
to { opacity: 1; transform: translateY(0); }
}
.photo-card:hover {
transform: translateY(-5px) scale(1.02);
border-color: var(--neon-electric);
box-shadow: var(--glow-electric), 0 15px 35px rgba(0, 0, 0, 0.4);
}

.photo-wrapper {
position: relative;
width: 100%;
height: 280px; /* Fixed height container */
/* Cool Blue Gradient Background for letterboxing effect */
background: radial-gradient(circle at center, #0d2137 0%, #050d18 100%); 
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
}

.photo-wrapper img {
width: 100%;
height: 100%;
object-fit: contain; /* CHANGE: contain ensures NO CROPPING */
display: block;
padding: 0; 
background: transparent;
transition: transform 0.3s ease;
}

.photo-card:hover .photo-wrapper img {
transform: scale(1.05); /* Slight zoom on hover still looks good with contain */
}

.photo-overlay {
position: absolute;
top: 0;
left: 0;
right: 0;
bottom: 0;
background: rgba(0, 0, 0, 0.7);
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
opacity: 0;
transition: opacity 0.3s;
padding: 12px;
}
.photo-card:hover .photo-overlay {
opacity: 1;
}
.action-btn {
width: 36px;
height: 36px;
background: var(--neon-electric);
border: none;
border-radius: 50%;
color: var(--bg-deep);
font-size: 13px;
cursor: pointer;
transition: all 0.3s;
display: flex;
align-items: center;
justify-content: center;
}
.action-btn:hover {
transform: scale(1.15) rotate(10deg);
box-shadow: 0 0 20px rgba(0, 245, 255, 0.7);
}

.photo-info {
padding: 12px;
}
.photo-title {
font-family: 'Orbitron', sans-serif;
font-size: 12px;
font-weight: 700;
color: var(--neon-electric);
margin-bottom: 5px;
word-break: break-word;
}
.photo-meta {
font-size: 10px;
color: var(--text-secondary);
}

/* Editor Section */
.editor-container {
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: 16px;
padding: 20px;
margin-bottom: 20px;
box-shadow: var(--glow-blue);
}
.editor-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 18px;
padding-bottom: 14px;
border-bottom: 1px solid rgba(0, 212, 255, 0.3);
}
.editor-title {
font-family: 'Orbitron', sans-serif;
font-size: 16px;
color: var(--neon-electric);
}

.upload-area {
border: 2px dashed var(--border-glow);
border-radius: 12px;
padding: 40px 25px;
text-align: center;
cursor: pointer;
transition: all 0.3s;
margin-bottom: 20px;
}
.upload-area:hover {
border-color: var(--neon-electric);
background: rgba(0, 212, 255, 0.05);
}
.upload-icon {
font-size: 42px;
color: var(--neon-blue);
margin-bottom: 14px;
}
.upload-text {
font-size: 14px;
color: var(--text-secondary);
margin-bottom: 7px;
}
.upload-hint {
font-size: 11px;
color: var(--text-secondary);
opacity: 0.7;
}

.canvas-wrapper {
position: relative;
background: var(--bg-elevated);
border-radius: 12px;
padding: 14px;
margin-bottom: 18px;
overflow: auto;
max-height: 60vh;
}
#mainCanvas {
max-width: 100%;
border: 1px solid var(--border-glow);
border-radius: 6px;
background: #fff;
}

.tools-panel {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap: 14px;
margin-bottom: 18px;
}
.tool-group {
background: var(--bg-elevated);
border: 1px solid rgba(0, 212, 255, 0.2);
border-radius: 12px;
padding: 14px;
}
.tool-title {
font-family: 'Orbitron', sans-serif;
font-size: 11px;
color: var(--neon-electric);
margin-bottom: 10px;
text-transform: uppercase;
letter-spacing: 1px;
}
.tool-btn {
width: 100%;
padding: 8px 12px;
margin-bottom: 7px;
background: rgba(0, 212, 255, 0.15);
border: 1px solid var(--border-glow);
border-radius: 7px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 11px;
font-weight: 600;
cursor: pointer;
transition: all 0.3s;
display: flex;
align-items: center;
gap: 7px;
}
.tool-btn:hover {
background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(0, 245, 255, 0.2));
border-color: var(--neon-electric);
transform: translateX(3px);
}
.tool-btn.active {
background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric));
color: var(--bg-deep);
}

input[type="range"] {
width: 100%;
height: 4px;
background: var(--bg-deep);
border-radius: 2px;
outline: none;
-webkit-appearance: none;
margin-bottom: 10px;
}
input[type="range"]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 14px;
height: 14px;
background: var(--neon-electric);
border-radius: 50%;
cursor: pointer;
box-shadow: 0 0 10px rgba(0, 245, 255, 0.6);
}
.color-picker {
width: 100%;
height: 34px;
border: 1px solid var(--border-glow);
border-radius: 7px;
cursor: pointer;
background: none;
}
.input-field {
width: 100%;
padding: 8px;
background: var(--bg-deep);
border: 1px solid var(--border-glow);
border-radius: 7px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 11px;
margin-bottom: 7px;
}

.action-buttons {
display: flex;
gap: 10px;
justify-content: center;
flex-wrap: wrap;
}
.btn {
padding: 10px 22px;
border-radius: 8px;
font-family: 'Orbitron', sans-serif;
font-size: 11px;
font-weight: 700;
cursor: pointer;
transition: all 0.3s;
border: none;
display: inline-flex;
align-items: center;
gap: 6px;
text-transform: uppercase;
letter-spacing: 1px;
}
.btn-primary {
background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric));
color: var(--bg-deep);
box-shadow: 0 3px 15px rgba(0, 212, 255, 0.3);
}
.btn-primary:hover {
transform: translateY(-2px);
box-shadow: var(--glow-electric);
}
.btn-secondary {
padding: 10px 22px;
background: transparent;
border: 1px solid var(--neon-pink);
border-radius: 8px;
color: var(--neon-pink);
font-family: 'Orbitron', sans-serif;
font-size: 11px;
font-weight: 700;
cursor: pointer;
transition: all 0.3s;
text-transform: uppercase;
letter-spacing: 1px;
}
.btn-secondary:hover {
background: var(--neon-pink);
color: var(--bg-deep);
transform: translateY(-2px);
}

.loading {
display: none;
text-align: center;
padding: 28px;
grid-column: 1 / -1;
}
.loading.active { display: block; }
.loader {
width: 42px;
height: 42px;
border: 3px solid rgba(0, 212, 255, 0.2);
border-top-color: var(--neon-electric);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 14px;
box-shadow: var(--glow-electric);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Modal */
.modal-backdrop {
position: fixed;
inset: 0;
background: rgba(5, 5, 15, 0.95);
backdrop-filter: blur(15px);
z-index: 1000;
display: none;
align-items: center;
justify-content: center;
padding: 14px;
}
.modal-backdrop.active { display: flex; }
.modal-content {
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: 16px;
max-width: 900px;
width: 100%;
max-height: 95vh;
overflow: auto;
display: flex;
flex-direction: column;
}
.modal-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 14px 18px;
border-bottom: 1px solid rgba(0, 212, 255, 0.2);
}
.modal-title {
font-family: 'Orbitron', sans-serif;
font-size: 14px;
color: var(--neon-electric);
}
.modal-close {
width: 32px;
height: 32px;
background: transparent;
border: 1px solid var(--neon-pink);
border-radius: 50%;
color: var(--neon-pink);
font-size: 14px;
cursor: pointer;
transition: all 0.3s;
}
.modal-close:hover {
background: var(--neon-pink);
color: var(--bg-deep);
transform: rotate(90deg);
}
.modal-body {
padding: 18px;
text-align: center;
overflow-y: auto;
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
background: radial-gradient(circle at center, #0d2137 0%, #050d18 100%);
}
.modal-body img {
max-width: 100%;
max-height: 75vh; /* Limits height so it fits */
width: auto;
object-fit: contain;
border-radius: 8px;
box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
}
.modal-actions {
margin-top: 14px;
display: flex;
gap: 8px;
justify-content: center;
flex-wrap: wrap;
}

.toast {
position: fixed;
bottom: 20px;
right: 20px;
background: var(--bg-surface);
border: 1px solid var(--neon-electric);
color: var(--neon-electric);
padding: 11px 20px;
border-radius: 10px;
font-weight: 600;
font-size: 11px;
z-index: 10000;
display: flex;
align-items: center;
gap: 8px;
box-shadow: var(--glow-electric);
transform: translateX(200px);
opacity: 0;
transition: var(--transition-bloom);
backdrop-filter: blur(10px);
}
.toast.show {
transform: translateX(0);
opacity: 1;
}

@media (max-width: 768px) {
.container { padding: 16px 10px; }

<body>
<div class="bg-canvas"></div>
<div class="grid-overlay"></div>

<div class="lightning-bolt"></div>

<a href="index.html" class="back-btn">
<i class="fas fa-arrow-left"></i> Kembali
</a>

<div class="container">
<header class="header">
<h1 class="title">⚡ FOTO </h1>
<p class="subtitle">LINE TOGEL - Cyber Portal 2026</p>
<div class="status-badge">
<span class="status-dot"></span>
<span>SYSTEM ONLINE</span>
</div>
</header>

<div class="nav-tabs">
<button class="nav-tab active" onclick="showSection('gallery')">
<i class="fas fa-images"></i> Galeri Foto
</button>
<button class="nav-tab" onclick="showSection('search')">
<i class="fas fa-search"></i> Cari Foto Web
</button>
<button class="nav-tab" onclick="showSection('editor')">
<i class="fas fa-magic"></i> Photo Editor
</button>
</div>

<!-- Section 1: Gallery -->
<section id="gallery" class="section active">
<div class="search-container">
<input type="text" class="search-box" id="searchInput" placeholder="🔍 Cari foto berdasarkan judul..." onkeyup="searchPhotos()">
</div>
<div class="loading" id="loading">
<div class="loader"></div>
<div style="color: var(--neon-electric); font-family: 'Orbitron'; font-size: 11px;">⚡ LOADING PHOTOS...</div>
</div>
<div class="gallery-grid" id="galleryGrid">
</div>
</section>

<!-- Section 2: Search -->
<section id="search" class="section">
<div class="search-container" style="position: relative;">
<input type="text" class="search-box" id="webSearchInput" placeholder="🔍 Cari foto (contoh: sunset, nature, technology)..." onkeypress="if(event.key==='Enter')searchWebPhotos()">
<button class="search-btn" onclick="searchWebPhotos()">
<i class="fas fa-search"></i>
</button>
</div>
<div class="gallery-grid" id="searchGrid">
</div>
</section>

<!-- Section 3: Editor -->
<section id="editor" class="section">
<div class="editor-container">
<div class="editor-header">
<h2 class="editor-title"><i class="fas fa-palette"></i> PHOTO EDITOR STUDIO</h2>
</div>
<div class="upload-area" onclick="document.getElementById('fileInput').click()">
<div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
<div class="upload-text">Klik atau Drag foto ke sini</div>
<div class="upload-hint">Support: JPG, PNG, WEBP (Multiple files)</div>
<input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleFiles(event)">
</div>
<div class="canvas-wrapper">
<canvas id="mainCanvas" width="800" height="600"></canvas>
</div>
<div class="tools-panel">
<div class="tool-group">
<div class="tool-title"><i class="fas fa-adjust"></i> Filter & Adjust</div>
<button class="tool-btn" onclick="applyFilter('grayscale')"><i class="fas fa-circle"></i> Grayscale</button>
<button class="tool-btn" onclick="applyFilter('sepia')"><i class="fas fa-coffee"></i> Sepia</button>
<button class="tool-btn" onclick="applyFilter('invert')"><i class="fas fa-exchange-alt"></i> Invert</button>
<button class="tool-btn" onclick="applyFilter('blur')"><i class="fas fa-tint"></i> Blur</button>
<label class="tool-title" style="margin-top:10px;display:block">Brightness</label>
<input type="range" id="brightness" min="0" max="200" value="100" onchange="adjustImage()">
<label class="tool-title" style="margin-top:10px;display:block">Contrast</label>
<input type="range" id="contrast" min="0" max="200" value="100" onchange="adjustImage()">
<label class="tool-title" style="margin-top:10px;display:block">Saturation</label>
<input type="range" id="saturation" min="0" max="200" value="100" onchange="adjustImage()">
</div>
<div class="tool-group">
<div class="tool-title"><i class="fas fa-crop-alt"></i> Transform</div>
<button class="tool-btn" onclick="rotateImage(-90)"><i class="fas fa-undo"></i> Rotate -90°</button>
<button class="tool-btn" onclick="rotateImage(90)"><i class="fas fa-redo"></i> Rotate +90°</button>
<button class="tool-btn" onclick="flipImage('h')"><i class="fas fa-arrows-alt-h"></i> Flip Horizontal</button>
<button class="tool-btn" onclick="flipImage('v')"><i class="fas fa-arrows-alt-v"></i> Flip Vertical</button>
<button class="tool-btn" onclick="resizeCanvas()"><i class="fas fa-compress-arrows-alt"></i> Resize Canvas</button>
</div>
<div class="tool-group">
<div class="tool-title"><i class="fas fa-text"></i> Text & Draw</div>
<input type="text" class="input-field" id="textInput" placeholder="Teks...">
<input type="color" class="color-picker" id="textColor" value="#00d4ff">
<input type="number" class="input-field" id="textSize" placeholder="Ukuran (px)" value="40">
<button class="tool-btn" onclick="addText()"><i class="fas fa-plus"></i> Tambah Teks</button>
<button class="tool-btn" onclick="startDrawing()"><i class="fas fa-pencil-alt"></i> Draw Mode</button>
</div>
<div class="tool-group">
<div class="tool-title"><i class="fas fa-layer-group"></i> Combine</div>
<button class="tool-btn" onclick="combinePhotos('h')"><i class="fas fa-arrows-alt-h"></i> Gabung Horizontal</button>
<button class="tool-btn" onclick="combinePhotos('v')"><i class="fas fa-arrows-alt-v"></i> Gabung Vertikal</button>
<button class="tool-btn" onclick="addFrame()"><i class="fas fa-border-style"></i> Tambah Frame</button>
<button class="tool-btn" onclick="addWatermark()"><i class="fas fa-copyright"></i> Watermark</button>
</div>
</div>
<div class="action-buttons">
<button class="btn btn-primary" onclick="downloadImage()">
<i class="fas fa-download"></i> Download Foto
</button>

<i class="fas fa-trash"></i> Clear
</button>
<button class="btn btn-secondary" onclick="undoAction()">
<i class="fas fa-undo"></i> Undo
</button>
</div>
</div>
</section>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="imageModal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title" id="modalTitle">Foto Detail</h3>
<button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
</div>
<div class="modal-body">
<img src="" alt="" id="modalImage">
<div class="modal-actions">
<button class="btn btn-primary" onclick="copyImage()">
<i class="fas fa-copy"></i> Copy Foto
</button>
<button class="btn btn-secondary" onclick="downloadModalImage()">
<i class="fas fa-download"></i> Download
</button>
</div>
</div>
</div>
</div>

<div id="toast" class="toast">
<i class="fas fa-bolt"></i>
<span id="toastText">Berhasil!</span>
</div>

<script>
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';
let canvas = document.getElementById('mainCanvas');
let ctx = canvas ? canvas.getContext('2d') : null;
let currentEditorImage = null;
let history = [];
let isDrawing = false;

document.addEventListener('DOMContentLoaded', () => {
createParticles();
if (document.getElementById('gallery')) {
fetchPhotosFromSheet();
}
initCanvas();
});

function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
for(let i = 0; i < 50; i++) {
const p = document.createElement('div');
p.className = 'particle';
p.style.left = Math.random() * 100 + '%';
p.style.animationDelay = Math.random() * 20 + 's';
p.style.animationDuration = (15 + Math.random() * 20) + 's';
container.appendChild(p);
}
}

function showSection(sectionId) {
document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
document.getElementById(sectionId).classList.add('active');
event.target.closest('.nav-tab').classList.add('active');
}

async function fetchPhotosFromSheet() {
document.getElementById('loading').classList.add('active');
document.getElementById('galleryGrid').innerHTML = '';
try {
const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';
try {
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
const response = await fetch(gvizUrl);
const text = await response.text();
const json = JSON.parse(text.substring(47).slice(0, -2));
const rows = json.table.rows;
allPhotos = [];
rows.forEach((row, index) => {
const c = row.c;
if (!c) return;
const judul = c[0] ? (c[0].v || '') : '';
const foto = c[1] ? (c[1].v || '') : '';
if (judul && foto) {
allPhotos.push({
judul: judul,
foto: foto,
index: index + 2
});
}
});
} catch (e) {
console.log('GVIZ failed, trying CSV...', e);
const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
const csvResponse = await fetch(csvUrl);
const csvText = await csvResponse.text();
const csvRows = csvText.split('\n').map(row => row.split(','));
allPhotos = [];
csvRows.forEach((row, index) => {
if (row.length < 2) return;
const judul = row[0] ? row[0].replace(/"/g, '').trim() : '';
const foto = row[1] ? row[1].replace(/"/g, '').trim() : '';
if (judul && foto) {
allPhotos.push({
judul: judul,
foto: foto,
index: index + 2
});
}
});
}
renderGallery(allPhotos);
showToast(`⚡ Berhasil memuat ${allPhotos.length} foto`);
} catch (error) {
console.error('Error fetching photos:', error);
showToast('❗ Gagal mengambil data dari Google Sheets');
document.getElementById('galleryGrid').innerHTML = `
<div class="no-results" style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary);">
<i class="fas fa-exclamation-triangle" style="font-size: 42px; color: var(--neon-pink); margin-bottom: 14px;"></i>
<h3>Gagal Memuat Foto</h3>
<p>Pastikan Google Sheets sudah dipublikasikan</p>
</div>
`;
}
document.getElementById('loading').classList.remove('active');
}

function renderGallery(photos) {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';
if (photos.length === 0) {
grid.innerHTML = `
<div class="no-results" style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary);">
<i class="fas fa-search" style="font-size: 42px; margin-bottom: 14px; opacity: 0.5;"></i>
<h3>Tidak Ada Foto</h3>
<p>Tidak ada foto yang sesuai dengan pencarian</p>
</div>
`;
return;
}
photos.forEach((photo, idx) => {
const card = createPhotoCard(photo.foto, photo.judul, idx);
grid.appendChild(card);
});
}

function createPhotoCard(url, title, index) {
const card = document.createElement('div');
card.className = 'photo-card';
card.innerHTML = `
<div class="photo-wrapper">
<img src="${url}" alt="${title}" onerror="this.src='https://via.placeholder.com/400x300/0a1a2f/00d4ff?text=No+Image'" loading="lazy">
<div class="photo-overlay">
<button class="action-btn" onclick="viewFullImage('${url}', '${title.replace(/'/g, "\\'")}')" title="Lihat Full">
<i class="fas fa-eye"></i>
</button>
<button class="action-btn" onclick="copyPhoto('${url}')" title="Copy Foto">
<i class="fas fa-copy"></i>
</button>
<button class="action-btn" onclick="downloadPhoto('${url}', '${title.replace(/'/g, "\\'")}')" title="Download">
<i class="fas fa-download"></i>
</button>
<button class="action-btn" onclick="editImageFromUrl('${url}')" title="Edit">
<i class="fas fa-edit"></i>
</button>
</div>
</div>
<div class="photo-info">
<div class="photo-title">${title}</div>
<div class="photo-meta">Foto #${index + 1}</div>
</div>
`;
return card;
}

function searchPhotos() {
const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
if (!searchTerm) {
renderGallery(allPhotos);
return;
}
const filtered = allPhotos.filter(photo =>
photo.judul.toLowerCase().includes(searchTerm)
);
renderGallery(filtered);
if (filtered.length > 0) {
showToast(`⚡ Ditemukan ${filtered.length} foto`);
}
}

async function searchWebPhotos() {
const query = document.getElementById('webSearchInput').value.trim();
if (!query) {
showToast('⚠️ Masukkan kata kunci pencarian');
return;
}
const grid = document.getElementById('searchGrid');
grid.innerHTML = '<div class="loading active"><div class="loader"></div><div style="color: var(--neon-electric); font-size: 11px;">Mencari foto...</div></div>';

try {
const imageUrls = [];
for (let i = 0; i < 12; i++) {
const seed = Math.floor(Math.random() * 10000);
const width = 400;
const height = 300;
const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(query)}?width=${width}&height=${height}&seed=${seed}&nologo=true`;
imageUrls.push({
url: url,
title: `${query} ${i + 1}`
});
}
grid.innerHTML = '';
imageUrls.forEach((photo, i) => {
const card = createPhotoCard(photo.url, photo.title, i);
grid.appendChild(card);
});
showToast(`⚡ Ditemukan foto untuk "${query}"`);
} catch (error) {
console.error('Search error:', error);
grid.innerHTML = '';
for (let i = 0; i < 12; i++) {
const width = 400;
const height = 300;
const url = `https://picsum.photos/seed/${query}${i}/${width}/${height}`;
const card = createPhotoCard(url, `${query} ${i + 1}`, i);
grid.appendChild(card);
}
showToast(`⚡ Ditemukan foto untuk "${query}"`);
}
}

function viewFullImage(url, title) {
currentImageUrl = url;
currentImageTitle = title;
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalImage').src = url;
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
}

function closeModal() {
document.getElementById('imageModal').classList.remove('active');
document.body.style.overflow = '';
currentImageUrl = '';
currentImageTitle = '';
}

async function copyPhoto(url) {
try {
const response = await fetch(url);
const blob = await response.blob();
await navigator.clipboard.write([
new ClipboardItem({
[blob.type]: blob
})
]);
showToast('✅ Foto berhasil disalin ke clipboard!');
} catch (error) {
console.error('Copy error:', error);
showToast('❗ Buka foto lalu klik kanan > Copy Image');
}
}

async function copyImage() {
if (currentImageUrl) {
await copyPhoto(currentImageUrl);
}
}

function downloadPhoto(url, filename) {
const link = document.createElement('a');
link.href = url;
link.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
link.target = '_blank';
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
showToast('⚡ Download dimulai...');
}

function downloadModalImage() {
if (currentImageUrl && currentImageTitle) {
downloadPhoto(currentImageUrl, currentImageTitle);
}
}

function initCanvas() {
if (!canvas || !ctx) return;
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.font = '20px Rajdhani';
ctx.fillStyle = '#8ab4f8';
ctx.textAlign = 'center';
ctx.fillText('Upload foto untuk mulai mengedit', canvas.width/2, canvas.height/2);
}

function handleFiles(event) {
const files = event.target.files;
if (files.length === 0) return;
loadImage(files[0]);
if (files.length > 1) {
setTimeout(() => {
if (confirm(`Load ${files.length} foto? Klik OK untuk combine, Cancel untuk load satu per satu.`)) {
combineMultipleFiles(files);
}
}, 500);
}
}

function loadImage(file) {
const reader = new FileReader();
reader.onload = (e) => {
const img = new Image();
img.onload = () => {
currentEditorImage = img;
saveHistory();
canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img, 0, 0);
showToast('✅ Foto berhasil dimuat');
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
}

function combineMultipleFiles(files) {
const images = [];
let loaded = 0;
Array.from(files).forEach(file => {
const reader = new FileReader();
reader.onload = (e) => {
const img = new Image();
img.onload = () => {
images.push(img);
loaded++;
if (loaded === files.length) {
combineImages(images);
}
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
});
}

function combineImages(images) {
const totalWidth = images.reduce((sum, img) => sum + img.width, 0);
const maxHeight = Math.max(...images.map(img => img.height));
canvas.width = totalWidth;
canvas.height = maxHeight;
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
let x = 0;
images.forEach(img => {
ctx.drawImage(img, x, 0);
x += img.width;
});
saveHistory();
showToast(`✅ ${images.length} foto digabungkan`);
}

function applyFilter(filterType) {
if (!currentEditorImage) {
showToast('⚠️ Upload foto terlebih dahulu');
return;
}
saveHistory();
const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
const data = imageData.data;

switch(filterType) {
case 'grayscale':
for (let i = 0; i < data.length; i += 4) {
const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
data[i] = data[i + 1] = data[i + 2] = avg;
}
break;
case 'sepia':
for (let i = 0; i < data.length; i += 4) {
const r = data[i], g = data[i + 1], b = data[i + 2];
data[i] = Math.min(255, (r * .393) + (g * .769) + (b * .189));
data[i + 1] = Math.min(255, (r * .349) + (g * .686) + (b * .168));
data[i + 2] = Math.min(255, (r * .272) + (g * .534) + (b * .131));
}
break;
case 'invert':
for (let i = 0; i < data.length; i += 4) {
data[i] = 255 - data[i];
data[i + 1] = 255 - data[i + 1];
data[i + 2] = 255 - data[i + 2];
}
break;
case 'blur':
ctx.filter = 'blur(5px)';
ctx.drawImage(canvas, 0, 0);
ctx.filter = 'none';
break;
}
if (filterType !== 'blur') {
ctx.putImageData(imageData, 0, 0);
}
showToast(`✅ Filter ${filterType} diterapkan`);
}

function adjustImage() {
if (!currentEditorImage) return;
const brightness = document.getElementById('brightness').value;
const contrast = document.getElementById('contrast').value;
const saturation = document.getElementById('saturation').value;
ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturation}%)`;
ctx.drawImage(currentEditorImage, 0, 0, canvas.width, canvas.height);
ctx.filter = 'none';
}

function rotateImage(degrees) {
if (!currentEditorImage) return;
saveHistory();
const tempCanvas = document.createElement('canvas');
const tempCtx = tempCanvas.getContext('2d');
if (degrees === 90 || degrees === -90) {
tempCanvas.width = canvas.height;
tempCanvas.height = canvas.width;
} else {
tempCanvas.width = canvas.width;
tempCanvas.height = canvas.height;
}
tempCtx.translate(tempCanvas.width / 2, tempCanvas.height / 2);
tempCtx.rotate(degrees * Math.PI / 180);
tempCtx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);
canvas.width = tempCanvas.width;
canvas.height = tempCanvas.height;
ctx.drawImage(tempCanvas, 0, 0);
}

function flipImage(direction) {
if (!currentEditorImage) return;
saveHistory();
const tempCanvas = document.createElement('canvas');
const tempCtx = tempCanvas.getContext('2d');
tempCanvas.width = canvas.width;
tempCanvas.height = canvas.height;
if (direction === 'h') {
tempCtx.translate(canvas.width, 0);
tempCtx.scale(-1, 1);
} else {
tempCtx.translate(0, canvas.height);
tempCtx.scale(1, -1);
}
tempCtx.drawImage(canvas, 0, 0);
ctx.clearRect(0, 0, canvas.width, canvas.height);
ctx.drawImage(tempCanvas, 0, 0);
}

function resizeCanvas() {
const width = prompt('Lebar baru (px):', canvas.width);
const height = prompt('Tinggi baru (px):', canvas.height);
if (width && height) {
saveHistory();
const tempCanvas = document.createElement('canvas');
const tempCtx = tempCanvas.getContext('2d');
tempCanvas.width = canvas.width;
tempCanvas.height = canvas.height;
tempCtx.drawImage(canvas, 0, 0);
canvas.width = parseInt(width);
canvas.height = parseInt(height);
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.drawImage(tempCanvas, 0, 0);
}
}

function addText() {
const text = document.getElementById('textInput').value;
const color = document.getElementById('textColor').value;
const size = document.getElementById('textSize').value;
if (!text) {
showToast('⚠️ Masukkan teks terlebih dahulu');
return;
}
saveHistory();
ctx.font = `${size}px Orbitron`;
ctx.fillStyle = color;
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.shadowColor = 'rgba(0,0,0,0.5)';
ctx.shadowBlur = 10;
ctx.fillText(text, canvas.width / 2, canvas.height / 2);
ctx.shadowBlur = 0;
showToast('✅ Teks ditambahkan');
}

function startDrawing() {
isDrawing = !isDrawing;
if (isDrawing) {
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDraw);
showToast('✏️ Mode gambar aktif - Klik & drag untuk menggambar');
} else {
canvas.removeEventListener('mousedown', startDraw);
canvas.removeEventListener('mousemove', draw);
canvas.removeEventListener('mouseup', stopDraw);
showToast('Mode gambar nonaktif');
}
}

function startDraw(e) {
isDrawing = true;
const rect = canvas.getBoundingClientRect();
const x = (e.clientX - rect.left) * (canvas.width / rect.width);
const y = (e.clientY - rect.top) * (canvas.height / rect.height);
ctx.beginPath();
ctx.moveTo(x, y);
ctx.strokeStyle = document.getElementById('textColor').value;
ctx.lineWidth = 3;
ctx.lineCap = 'round';
}

function draw(e) {
if (!isDrawing) return;
const rect = canvas.getBoundingClientRect();
const x = (e.clientX - rect.left) * (canvas.width / rect.width);
const y = (e.clientY - rect.top) * (canvas.height / rect.height);
ctx.lineTo(x, y);
ctx.stroke();
}

function stopDraw() {
isDrawing = false;
saveHistory();
}

function combinePhotos(direction) {
const input = document.createElement('input');
input.type = 'file';
input.multiple = true;
input.accept = 'image/*';
input.onchange = (e) => {
const files = e.target.files;
if (files.length < 2) {
showToast('⚠️ Pilih minimal 2 foto');
return;
}
combineMultipleFiles(files);
};
input.click();
}

function addFrame() {
saveHistory();
const frameWidth = 20;
ctx.strokeStyle = '#00d4ff';
ctx.lineWidth = frameWidth;
ctx.strokeRect(0, 0, canvas.width, canvas.height);
showToast('✅ Frame ditambahkan');
}

function addWatermark() {
saveHistory();
const text = 'LINE TOGEL';
ctx.font = 'bold 30px Orbitron';
ctx.fillStyle = 'rgba(0, 212, 255, 0.3)';
ctx.textAlign = 'right';
ctx.fillText(text, canvas.width - 20, canvas.height - 20);
showToast('✅ Watermark ditambahkan');
}

function saveHistory() {
if (!canvas) return;
history.push(canvas.toDataURL());
if (history.length > 10) history.shift();
}

function undoAction() {
if (history.length > 1) {
history.pop();
const previous = history[history.length - 1];
const img = new Image();
img.onload = () => {
canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img, 0, 0);
};
img.src = previous;
showToast('↩️ Undo');
}
}

function clearCanvas() {
if (confirm('Hapus semua?')) {
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
currentEditorImage = null;
history = [];
showToast('🗑️ Canvas dibersihkan');
}
}

function downloadImage() {
const link = document.createElement('a');
link.download = `edited-photo-${Date.now()}.png`;
link.href = canvas.toDataURL();
link.click();
showToast('⚡ Foto didownload');
}

function editImageFromUrl(url) {
showSection('editor');
document.querySelectorAll('.nav-tab')[2].classList.add('active');
document.querySelectorAll('.section')[2].classList.add('active');
const img = new Image();
img.crossOrigin = 'anonymous';
img.onload = () => {
currentEditorImage = img;
canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img, 0, 0);
saveHistory();
showToast('✅ Foto dimuat ke editor');
};
img.src = url;
}

function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toastText').textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 3000);
}

document.getElementById('imageModal').addEventListener('click', (e) => {
if (e.target.id === 'imageModal') closeModal();
});
document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') closeModal();
if (e.ctrlKey && e.key === 'z') {
e.preventDefault();
undoAction();
}
});
</script>
</body>
</html>

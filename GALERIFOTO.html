<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Foto Gallery Premium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --dark: #0f172a;
            --light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            color: var(--light);
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* Header Styles */
        header {
            text-align: center;
            padding: 3rem 1rem 2rem;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(99, 102, 241, 0.3);
            margin-bottom: 0.5rem;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { filter: brightness(1); }
            to { filter: brightness(1.2); }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            margin-top: 1rem;
        }

        /* Search Bar Styles */
        .search-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            position: relative;
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 0.75rem;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--light);
            font-size: 1rem;
            padding: 0.75rem 1rem;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-btn, .copy-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-btn:hover, .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .copy-btn {
            background: linear-gradient(135deg, var(--accent), #f472b6);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid var(--glass);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Grid Container */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Photo Card Styles */
        .photo-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .photo-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 
                0 30px 60px rgba(99, 102, 241, 0.3),
                0 15px 30px rgba(236, 72, 153, 0.2);
            border-color: var(--primary);
        }

        .photo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(99, 102, 241, 0.1) 50%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .photo-card:hover::before {
            opacity: 1;
        }

        .photo-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--dark), #1e1e3e);
            transition: all 0.4s ease;
        }

        .photo-card:hover .photo-image {
            transform: scale(1.1);
        }

        .card-content {
            padding: 1.5rem;
            position: relative;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--light);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn-small {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-copy {
            background: linear-gradient(135deg, #10b981, #34d399);
            color: white;
        }

        .btn-search {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: white;
        }

        .btn-wa {
            background: linear-gradient(135deg, #14b8a6, #2dd4bf);
            color: white;
        }

        .btn-instagram {
            background: linear-gradient(135deg, #ec4899, #f472b6);
            color: white;
        }

        .btn-small:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .copy-notification {
            position: fixed;
            top: 100px;
            right: 20px;
            background: linear-gradient(135deg, #10b981, #34d399);
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(16, 185, 129, 0.4);
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10000;
        }

        .copy-notification.show {
            transform: translateX(0);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .count-badge {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 1rem 2rem;
            backdrop-filter: blur(20px);
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Modal for image preview */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
        }

        .modal-image {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .close-modal {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            background: var(--primary);
            transform: rotate(90deg);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
                padding: 1rem;
            }

            .search-box {
                flex-direction: column;
            }

            .search-btn, .copy-btn {
                width: 100%;
                justify-content: center;
            }

            .count-badge {
                bottom: 1rem;
                right: 1rem;
                padding: 0.75rem 1.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>

    <!-- Header -->
    <header>
        <h1>🎨 FOTO GALLERY PREMIUM</h1>
        <p class="subtitle">Koleksi Foto Terlengkap • Bisa Copy & Cari Di Web</p>
    </header>

    <!-- Search Container -->
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Cari judul foto atau keyword...">
            <button class="search-btn" onclick="searchWeb()">
                🔎 Cari Di Google
            </button>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div class="spinner" id="loadingSpinner"></div>

    <!-- Gallery Grid -->
    <div class="gallery-grid" id="galleryGrid">
        <!-- Data will be inserted here -->
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
        <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
        </svg>
        <h2>Data belum tersedia</h2>
        <p>Silakan publish Google Sheet dan coba lagi</p>
    </div>

    <!-- Count Badge -->
    <div class="count-badge" id="countBadge">
        📦 Total: <span id="totalCount">0</span> Foto
    </div>

    <!-- Copy Notification -->
    <div class="copy-notification" id="copyNotification">
        ✅ Link berhasil disalin!
    </div>

    <!-- Image Modal -->
    <div class="modal" id="imageModal">
        <button class="close-modal" onclick="closeModal()">×</button>
        <img src="" alt="Preview" class="modal-image" id="modalImage">
    </div>

    <footer>
        <p>&copy; 2026 FOTO GALLERY PREMIUM | Dibuat dengan ❤️</p>
    </footer>

    <script>
        // ==========================================
        // KONFIGURASI GOOGLE SHEETS
        // ==========================================
        
        // GANTI ID SHEET DI SINI (ambil dari URL setelah /d/ dan sebelum /edit)
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        
        // Sheet number (biasanya 1 untuk tab pertama)
        const SHEET_NUMBER = '1';

        // ==========================================
        // DATA SAMPLE (Jika Sheets belum terhubung)
        // ==========================================
        const sampleData = [
            { title: "Pemandangan Pantai Sunset", photo: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500&h=400&fit=crop" },
            { title: "Gunung Majestic Aurora", photo: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500&h=400&fit=crop" },
            { title: "Hutan Tropis Hijau", photo: "https://images.unsplash.com/photo-1448375240586-dfd8d395ea6c?w=500&h=400&fit=crop" },
            { title: "Kota Malam Neon", photo: "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=500&h=400&fit=crop" },
            { title: "Danau Tenang Cermin", photo: "https://images.unsplash.com/photo-1510784722466-f2aa9c52fff6?w=500&h=400&fit=crop" },
            { title: "Air Terjun Megah", photo: "https://images.unsplash.com/photo-1432405972618-c60b0225b8f9?w=500&h=400&fit=crop" },
            { title: "Desa Pedesaan Indah", photo: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=500&h=400&fit=crop" },
            { title: "Palu Kuning Eksotis", photo: "https://images.unsplash.com/photo-1495570499609-48221dcb8d83?w=500&h=400&fit=crop" },
            { title: "Sawah Terbentang Luas", photo: "https://images.unsplash.com/photo-1550350643-48223c2eb9d5?w=500&h=400&fit=crop" },
            { title: "Bintang Langit Malam", photo: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=500&h=400&fit=crop" }
        ];

        // ==========================================
        // FUNGSI UTAMA
        // ==========================================

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchGoogleSheets();
        });

        // Fetch data dari Google Sheets
        async function fetchGoogleSheets() {
            showLoading(true);
            
            try {
                // Format URL untuk akses JSON dari Google Sheets
                const url = `https://spreadsheets.google.com/feeds/list/${SHEET_ID}/${SHEET_NUMBER}/public/values?alt=json`;
                
                // Coba fetch langsung
                const response = await fetch(url + '&tainted=true');
                const data = await response.json();
                
                if (data.feed && data.feed.entry) {
                    processSheetData(data.feed.entry);
                } else {
                    console.log('Menggunakan data sample...');
                    renderGallery(sampleData);
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                console.log('Menggunakan data sample karena tidak dapat mengakses sheets...');
                renderGallery(sampleData);
            } finally {
                showLoading(false);
            }
        }

        // Proses data dari Google Sheets
        function processSheetData(entries) {
            const processedData = [];
            
            entries.forEach(entry => {
                const cellValues = {};
                
                entry.content.forEach(cell => {
                    const colName = cell['gs$cell'].col;
                    const rowNum = cell['gs$cell'].row;
                    const value = cell.$t || '';
                    
                    if (!cellValues[rowNum]) {
                        cellValues[rowNum] = {};
                    }
                    
                    // Kolom C = 3, Kolom D = 4
                    if (colName === '3') cellValues[rowNum].title = value;
                    if (colName === '4') cellValues[rowNum].photo = value;
                });
                
                // Ambil hanya data dengan isi
                Object.values(cellValues).forEach(row => {
                    if ((row.title && row.title.trim()) && (row.photo && row.photo.trim())) {
                        processedData.push({
                            title: row.title,
                            photo: row.photo
                        });
                    }
                });
            });
            
            console.log(`Total data valid: ${processedData.length}`);
            renderGallery(processedData.length > 0 ? processedData : sampleData);
        }

        // Render galeri foto
        function renderGallery(data) {
            const galleryGrid = document.getElementById('galleryGrid');
            const emptyState = document.getElementById('emptyState');
            const totalCount = document.getElementById('totalCount');
            
            galleryGrid.innerHTML = '';
            totalCount.textContent = data.length;
            
            if (data.length === 0) {
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.style.animationDelay = `${index * 0.05}s`;
                card.innerHTML = `
                    <img src="${sanitizePhotoUrl(item.photo)}" alt="${item.title}" class="photo-image" 
                         onclick="openModal('${sanitizePhotoUrl(item.photo)}')">
                    <div class="card-content">
                        <h3 class="card-title">${escapeHtml(item.title)}</h3>
                        <div class="action-buttons">
                            <button class="btn-small btn-copy" onclick="copyLink('${sanitizePhotoUrl(item.photo)}')" title="Copy Link">
                                📋 Copy Link
                            </button>
                            <button class="btn-small btn-search" onclick="searchWebForTitle('${encodeURIComponent(item.title)}')" title="Cari di Google">
                                🔍 Cari Gambar
                            </button>
                            <button class="btn-small btn-wa" onclick="shareWhatsApp('${encodeURIComponent(item.title)}', '${sanitizePhotoUrl(item.photo)}')" title="Share WhatsApp">
                                💬 WA
                            </button>
                            <button class="btn-small btn-instagram" onclick="shareInstagram('${sanitizePhotoUrl(item.photo)}')" title="Share Instagram">
                                📷 IG
                            </button>
                        </div>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // Sanitize photo URL
        function sanitizePhotoUrl(url) {
            if (!url || url.trim() === '') {
                return 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500&h=400&fit=crop';
            }
            return url.trim();
        }

        // Escape HTML for safety
        function escapeHtml(text) {
            if (!text) return 'No Title';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Show/Hide loading spinner
        function showLoading(show) {
            document.getElementById('loadingSpinner').style.display = show ? 'block' : 'none';
        }

        // Copy link to clipboard
        function copyLink(link) {
            navigator.clipboard.writeText(link).then(() => {
                showCopyNotification();
            }).catch(err => {
                // Fallback method
                const textArea = document.createElement('textarea');
                textArea.value = link;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showCopyNotification();
            });
        }

        // Show copy notification
        function showCopyNotification() {
            const notification = document.getElementById('copyNotification');
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }

        // Search in Google
        function searchWeb() {
            const query = document.getElementById('searchInput').value;
            if (query.trim()) {
                window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}+site:unsplash.com&tbm=isch`, '_blank');
            }
        }

        // Search specific title
        function searchWebForTitle(title) {
            const encodedTitle = encodeURIComponent(title.replace(/ /g, '+'));
            window.open(`https://www.google.com/search?q=${encodedTitle}&tbm=isch`, '_blank');
        }

        // Share via WhatsApp
        function shareWhatsApp(title, photoUrl) {
            const message = `*${title}*\n\n${photoUrl}\n\n_Beli Sekarang!_`;
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        // Share via Instagram (placeholder action)
        function shareInstagram(photoUrl) {
            alert('Untuk share ke Instagram, silakan copy link fotonya dulu lalu upload manual di Instagram!');
            copyLink(photoUrl);
        }

        // Open modal for image preview
        function openModal(imageUrl) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            modalImage.src = imageUrl;
            modal.classList.add('active');
        }

        // Close modal
        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
            document.getElementById('modalImage').src = '';
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Close modal on clicking outside image
        document.getElementById('imageModal').addEventListener('click', (e) => {
            if (e.target.id === 'imageModal') {
                closeModal();
            }
        });

        // Search on Enter key
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeb();
            }
        });

        // Keyboard shortcut to focus search
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
    </script>
</body>
</html>

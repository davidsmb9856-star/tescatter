<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00ffff">
    <title>FOTO GALERI - LINE TOGEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00ffff; --bg-dark: #000a1e; --text-main: #00ffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Exo 2', sans-serif; background: var(--bg-dark);
            color: var(--text-main); min-height: 100vh;
        }
        .cyber-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(0,243,255,0.15), transparent 40%),
                        linear-gradient(180deg, #000a1e 0%, #001133 100%);
            z-index: -2;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .header {
            text-align: center; margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn {
            background: rgba(0,255,255,0.2); border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 12px 24px; border-radius: 12px;
            text-decoration: none; font-weight: bold; transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(0,255,255,0.4); transform: scale(1.05); }
        .title {
            font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 900;
            color: var(--neon-cyan); text-shadow: 0 0 30px rgba(0,255,255,0.7);
        }
        .foto-gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; margin-top: 30px;
        }
        .foto-card {
            background: rgba(0,20,50,0.7); border-radius: 16px; overflow: hidden;
            border: 2px solid rgba(0,255,255,0.3); transition: all 0.4s ease;
        }
        .foto-card:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: var(--neon-cyan);
            box-shadow: 0 15px 40px rgba(0,255,255,0.3);
        }
        .foto-card img {
            width: 100%; height: 240px; object-fit: cover;
            border-bottom: 1px solid rgba(0,255,255,0.3);
        }
        .foto-title {
            padding: 15px; text-align: center; font-weight: 700;
            color: var(--neon-cyan); background: rgba(0,10,30,0.7);
        }
        .foto-actions {
            padding: 15px; display: flex; gap: 10px; justify-content: center;
        }
        .action-btn {
            background: rgba(0,255,255,0.2); border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 8px 16px; border-radius: 8px;
            cursor: pointer; transition: all 0.3s;
        }
        .action-btn:hover { background: rgba(0,255,255,0.4); }
        @media (max-width: 768px) {
            .title { font-size: 32px; }
            .foto-gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">⬅️ Kembali ke Portal</a>
            <h1 class="title">📷 FOTO GALERI</h1>
        </div>

        <div class="foto-gallery" id="fotoGallery">
            <!-- Contoh Foto Card -->
            <div class="foto-card">
                <img src="https://via.placeholder.com/400x300/001133/00ffff?text=Foto+1" alt="Foto 1">
                <div class="foto-title">Bukti Transaksi 1</div>
                <div class="foto-actions">
                    <button class="action-btn" onclick="copyImage(this)">📋 Copy</button>
                    <button class="action-btn" onclick="viewImage(this)">🔍 View</button>
                </div>
            </div>

            <div class="foto-card">
                <img src="https://via.placeholder.com/400x300/001133/00ffff?text=Foto+2" alt="Foto 2">
                <div class="foto-title">Bukti Transaksi 2</div>
                <div class="foto-actions">
                    <button class="action-btn" onclick="copyImage(this)">📋 Copy</button>
                    <button class="action-btn" onclick="viewImage(this)">🔍 View</button>
                </div>
            </div>

            <div class="foto-card">
                <img src="https://via.placeholder.com/400x300/001133/00ffff?text=Foto+3" alt="Foto 3">
                <div class="foto-title">Bukti Transaksi 3</div>
                <div class="foto-actions">
                    <button class="action-btn" onclick="copyImage(this)">📋 Copy</button>
                    <button class="action-btn" onclick="viewImage(this)">🔍 View</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === COPY IMAGE ===
        async function copyImage(btn) {
            const img = btn.closest('.foto-card').querySelector('img');
            try {
                const response = await fetch(img.src);
                const blob = await response.blob();
                await navigator.clipboard.write([
                    new ClipboardItem({ [blob.type]: blob })
                ]);
                btn.textContent = '✅ Copied!';
                setTimeout(() => btn.textContent = '📋 Copy', 2000);
            } catch (err) {
                alert('❌ Gagal copy gambar');
            }
        }

        // === VIEW IMAGE ===
        function viewImage(btn) {
            const img = btn.closest('.foto-card').querySelector('img');
            const modal = document.createElement('div');
            modal.style.cssText = `
                position:fixed;top:0;left:0;width:100vw;height:100vh;
                background:rgba(0,0,0,0.95);z-index:9999;
                display:flex;justify-content:center;align-items:center;
            `;
            modal.innerHTML = `
                <img src="${img.src}" style="max-width:90%;max-height:90%;border-radius:12px;">
                <button onclick="this.closest('div').remove()" style="
                    position:absolute;top:20px;right:30px;font-size:32px;
                    color:#00ffff;background:none;border:none;cursor:pointer;
                ">&times;</button>
            `;
            document.body.appendChild(modal);
        }

        // === LOAD FOTOS (Optional - Connect to Google Apps Script) ===
        function loadFotos() {
            // Uncomment jika ingin connect ke Google Apps Script
            /*
            google.script.run
                .withSuccessHandler(fotos => {

                                <button class="action-btn" onclick="viewImage(this)">🔍 View</button>
                            </div>
                        `;
                        gallery.appendChild(card);
                    });
                })
                .getNotes('FOTO');
            */
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // loadFotos(); // Uncomment jika pakai Google Apps Script
        });
    </script>
</body>
</html>

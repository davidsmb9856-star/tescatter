<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0ff0fc">
    <title>GALERI FOTO - LINE TOGEL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent-primary: #0ff0fc;
            --accent-secondary: #ff3e6c;
            --accent-tertiary: #a855f7;
            --accent-gold: #fbbf24;
            --bg-deep: #030712;
            --bg-surface: rgba(15, 23, 42, 0.7);
            --bg-card: rgba(30, 41, 59, 0.6);
            --text-bright: #f8fafc;
            --text-muted: #94a3b8;
            --border-subtle: rgba(15, 240, 252, 0.2);
            --glow-primary: rgba(15, 240, 252, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-deep);
            color: var(--text-bright);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Effects */
        .bg-mesh {
            position: fixed; inset: 0; z-index: -2;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(15, 240, 252, 0.1), transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 20%, rgba(168, 85, 247, 0.08), transparent 50%),
                var(--bg-deep);
        }

        .grid-lines {
            position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(rgba(15, 240, 252, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(15, 240, 252, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 20%, transparent 70%);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
            position: relative;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeSlideDown 0.8s ease-out;
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-title {
            font-family: 'Chakra Petch', sans-serif;
            font-size: clamp(36px, 8vw, 64px);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--text-bright), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .header-subtitle {
            font-size: 16px;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Search Section */
        .controls-section {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            animation: fadeSlideUp 0.8s ease-out 0.2s backwards;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        .search-input {
            width: 100%;
            padding: 16px 24px 16px 50px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 50px;
            color: var(--text-bright);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px var(--glow-primary);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-primary);
            font-size: 18px;
            pointer-events: none;
        }

        .stats-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .stats-count {
            color: var(--accent-primary);
            font-weight: 700;
            font-family: 'Chakra Petch', sans-serif;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* Gallery Card */
        .gallery-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardPopIn 0.6s ease-out backwards;
            display: flex;
            flex-direction: column;
        }

        /* Staggered animation delay */
        .gallery-card:nth-child(1) { animation-delay: 0.1s; }
        .gallery-card:nth-child(2) { animation-delay: 0.15s; }
        .gallery-card:nth-child(3) { animation-delay: 0.2s; }
        .gallery-card:nth-child(4) { animation-delay: 0.25s; }
        .gallery-card:nth-child(5) { animation-delay: 0.3s; }
        /* And so on... for simplicity we repeat classes in JS inline style if needed, but CSS covers initial load */

        @keyframes cardPopIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .gallery-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px var(--glow-primary);
        }

        .card-image-wrapper {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: var(--bg-deep);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            cursor: pointer;
        }

        .gallery-card:hover .card-image {
            transform: scale(1.05);
        }

        /* Overlay Actions */
        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(3, 7, 18, 0.9) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
        }

        .gallery-card:hover .card-overlay {
            opacity: 1;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-action {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(15, 240, 252, 0.2);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .btn-action:hover {
            background: var(--accent-primary);
            color: var(--bg-deep);
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--glow-primary);
        }

        .btn-action.open-btn { border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(251, 191, 36, 0.2); }
        .btn-action.open-btn:hover { background: var(--accent-gold); color: var(--bg-deep); }

        .card-info {
            padding: 16px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-title {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-bright);
            text-align: center;
            line-height: 1.4;
            /* Text truncation if too long */
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Loading & Error States */
        .loading-state, .error-state {
            text-align: center;
            padding: 100px 20px;
            grid-column: 1 / -1;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-state i { font-size: 48px; color: var(--accent-secondary); margin-bottom: 16px; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-surface);
            border: 1px solid var(--accent-primary);
            border-radius: 12px;
            padding: 14px 28px;
            color: var(--text-bright);
            font-weight: 600;
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast i { color: var(--accent-gold); }

        /* Back to Top Button */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--accent-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(255, 62, 108, 0.4);
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }
        
        .back-to-top:hover {
            transform: translateY(-5px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 24px 16px; }
            .controls-section { flex-direction: column; align-items: center; }
            .stats-info { margin-top: 10px; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="grid-lines"></div>

    <div class="container">
        <header class="header">
            <h1 class="header-title">GALERI FOTO</h1>
            <p class="header-subtitle">LINE TOGEL CYBER ARCHIVE</p>
        </header>

        <div class="controls-section">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Cari judul foto...">
            </div>
            <div class="stats-info">
                Total Data: <span id="totalCount" class="stats-count">0</span>
            </div>
        </div>

        <div id="galleryGrid" class="gallery-grid">
            <!-- Content will be injected here -->
            <div class="loading-state">
                <div class="spinner"></div>
                <p style="color: var(--text-muted);">Menghubungkan ke database...</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastText">Link disalin!</span>
    </div>

    <div id="backToTop" class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </div>

    <script>
        // Configuration
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        const GID = '1246502038';
        // Query: Select Col C (index 2) and Col D (index 3)
        const QUERY = 'SELECT C, D WHERE D IS NOT NULL';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${encodeURIComponent(QUERY)}&gid=${GID}`;

        // DOM Elements
        const galleryGrid = document.getElementById('galleryGrid');
        const searchInput = document.getElementById('searchInput');
        const totalCountEl = document.getElementById('totalCount');
        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toastText');
        const backToTopBtn = document.getElementById('backToTop');

        let allPhotos = [];

        // Fetch Data
        async function fetchData() {
            try {
                const response = await fetch(URL);
                const text = await response.text();
                
                // Parse Google Visualization JSON format
                // Remove "google.visualization.Query.setResponse(" prefix and ");" suffix
                const jsonString = text.substring(47).slice(0, -2);
                const json = JSON.parse(jsonString);

                const rows = json.table.rows;
                
                allPhotos = rows.map(row => {
                    // Col C is index 0 in result, Col D is index 1
                    const title = row.c[0] ? row.c[0].v : 'Tanpa Judul';
                    const url = row.c[1] ? row.c[1].v : null;
                    return { title, url };
                }).filter(item => item.url); // Double check URL exists

                renderGallery(allPhotos);
                totalCountEl.textContent = allPhotos.length;

            } catch (error) {
                console.error('Error fetching data:', error);
                galleryGrid.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p style="color: var(--accent-secondary); margin-bottom: 10px;">Gagal Memuat Data</p>
                        <p style="font-size: 14px; color: var(--text-muted);">Pastikan Google Sheet sudah di-publish to web atau akses tidak dibatasi.</p>
                    </div>
                `;
            }
        }

        // Render Gallery
        function renderGallery(data) {
            galleryGrid.innerHTML = '';
            
            if (data.length === 0) {
                galleryGrid.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-search"></i>
                        <p style="color: var(--text-muted);">Tidak ada foto yang cocok.</p>
                    </div>
                `;
                return;
            }

            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.style.animationDelay = `${index * 0.05}s`; // Staggered animation
                
                // Check if URL is an image (basic check)
                const isImage = item.url.match(/\.(jpeg|jpg|gif|png|webp)($|\?)/i) || item.url.includes('googleusercontent');

                card.innerHTML = `
                    <div class="card-image-wrapper">
                        <img src="${item.url}" alt="${item.title}" class="card-image" loading="lazy" onerror="this.onerror=null;this.src='https://via.placeholder.com/400x300/0f172a/0ff0fc?text=Image+Error';">
                        <div class="card-overlay">
                            <div class="action-buttons">
                                <button class="btn-action copy-btn" onclick="copyLink('${item.url}')" title="Salin Link">
                                    <i class="fas fa-link"></i>
                                </button>
                                <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="btn-action open-btn" title="Buka Gambar Asli">
                                    <i class="fas fa-external-link-alt"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="card-info">
                        <h3 class="card-title">${item.title}</h3>
                    </div>
                `;
                
                galleryGrid.appendChild(card);
            });
        }

        // Search Filter
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allPhotos.filter(item => 
                item.title.toLowerCase().includes(query)
            );
            renderGallery(filtered);
        });

        // Utility Functions
        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                showToast('Link foto berhasil disalin!');
            }).catch(err => {
                // Fallback for older browsers
                const textArea = document.createElement("textarea");
                textArea.value = url;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                textArea.remove();
                showToast('Link foto berhasil disalin!');
            });
        }

        function showToast(message) {
            toastText.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Scroll Listener for Back to Top
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTopBtn.classList.add('visible');
            } else {
                backToTopBtn.classList.remove('visible');
            }
        });

        // Initialize
        fetchData();
    </script>
</body>
</html>

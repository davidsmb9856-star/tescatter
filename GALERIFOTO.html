<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0ff0fc">
    <title>GALERI CYBER 2026 - LINE TOGEL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent-primary: #0ff0fc;
            --accent-secondary: #ff3e6c;
            --accent-tertiary: #a855f7;
            --accent-gold: #fbbf24;
            --accent-green: #00ff9d;
            --bg-deep: #030712;
            --bg-surface: rgba(15, 23, 42, 0.75);
            --bg-card: rgba(20, 30, 50, 0.65);
            --text-bright: #f8fafc;
            --text-muted: #94a3b8;
            --border-subtle: rgba(15, 240, 252, 0.2);
            --glow-primary: rgba(15, 240, 252, 0.5);
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-deep);
            color: var(--text-bright);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ========== ADVANCED BACKGROUND EFFECTS ========== */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -3;
            background: 
                radial-gradient(ellipse 80% 60% at 20% 40%, rgba(15, 240, 252, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse 50% 60% at 60% 80%, rgba(255, 62, 108, 0.08) 0%, transparent 50%);
            animation: meshPulse 15s ease-in-out infinite alternate;
        }

        @keyframes meshPulse {
            0%, 100% { opacity: 1; filter: hue-rotate(0deg); }
            50% { opacity: 0.85; filter: hue-rotate(15deg); }
        }

        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: 
                linear-gradient(rgba(15, 240, 252, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 240, 252, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 75%);
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .scan-beam {
            position: fixed;
            left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            opacity: 0.6;
            animation: scanBeam 8s linear infinite;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes scanBeam {
            0% { top: -2px; opacity: 0; }
            5% { opacity: 0.6; }
            95% { opacity: 0.6; }
            100% { top: 100%; opacity: 0; }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: var(--accent-primary);
            border-radius: 50%;
            opacity: 0.6;
            animation: particleFloat 20s infinite ease-in-out;
            box-shadow: 0 0 10px var(--accent-primary);
        }

        .particle:nth-child(2n) {
            background: var(--accent-secondary);
            box-shadow: 0 0 10px var(--accent-secondary);
            animation-delay: -5s;
            animation-duration: 25s;
        }

        .particle:nth-child(3n) {
            background: var(--accent-tertiary);
            box-shadow: 0 0 10px var(--accent-tertiary);
            animation-delay: -10s;
            animation-duration: 30s;
        }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* ========== CONTAINER & LAYOUT ========== */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 50px 32px;
            position: relative;
        }

        /* ========== HEADER 2026 ========== */
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: headerEntrance 1s var(--transition-smooth) backwards;
        }

        @keyframes headerEntrance {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo-glow {
            position: absolute;
            inset: -20px;
            background: radial-gradient(ellipse, rgba(15, 240, 252, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: logoGlowPulse 3s ease-in-out infinite;
            filter: blur(20px);
        }

        @keyframes logoGlowPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); }
        }

        .header-title {
            font-family: 'Chakra Petch', sans-serif;
            font-size: clamp(42px, 9vw, 72px);
            font-weight: 700;
            letter-spacing: 6px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #ffffff 35%, var(--accent-secondary) 70%, var(--accent-tertiary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(15, 240, 252, 0.4);
            animation: titleShimmer 4s ease-in-out infinite;
        }

        @keyframes titleShimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .header-subtitle {
            font-size: 15px;
            color: var(--text-muted);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 10px 24px;
            background: rgba(0, 255, 157, 0.12);
            border: 1px solid rgba(0, 255, 157, 0.4);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: statusPulse 2.5s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 157, 0.25); }
            50% { box-shadow: 0 0 35px rgba(0, 255, 157, 0.5); }
        }

        .status-dot {
            width: 9px; height: 9px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: dotBeat 1.5s ease-in-out infinite;
        }

        @keyframes dotBeat {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.7; }
        }

        /* ========== TABS 2026 ========== */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeSlideUp 0.8s ease-out 0.2s backwards;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab-btn {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            padding: 14px 32px;
            border-radius: 12px;
            color: var(--text-muted);
            font-family: 'Chakra Petch', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s var(--transition-smooth);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent 0%, rgba(15, 240, 252, 0.1) 45%, rgba(255, 62, 108, 0.1) 55%, transparent 100%);
            transition: left 0.7s ease;
        }

        .tab-btn:hover::before { left: 100%; }

        .tab-btn.active {
            color: var(--accent-primary);
            background: linear-gradient(135deg, rgba(15, 240, 252, 0.15) 0%, rgba(168, 85, 247, 0.1) 100%);
            border-color: var(--accent-primary);
            box-shadow: 0 0 30px rgba(15, 240, 252, 0.3);
            transform: translateY(-2px);
        }

        .tab-btn i { margin-right: 10px; }

        /* ========== SEARCH SECTION 2026 ========== */
        .search-wrapper {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            animation: fadeSlideUp 0.8s ease-out 0.3s backwards;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-input {
            width: 100%;
            padding: 18px 28px 18px 56px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 50px;
            color: var(--text-bright);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            transition: all 0.4s var(--transition-smooth);
            backdrop-filter: blur(15px);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 30px rgba(15, 240, 252, 0.3);
        }

        .search-icon {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-primary);
            font-size: 18px;
        }

        .btn-search {
            padding: 18px 32px;
            background: linear-gradient(135deg, var(--accent-tertiary), var(--accent-primary));
            border: none;
            border-radius: 50px;
            color: #fff;
            font-weight: 700;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.4s var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 20px rgba(168, 85, 247, 0.3);
        }

        .btn-search:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(168, 85, 247, 0.5);
        }

        /* ========== STATS 2026 ========== */
        .stats-row {
            text-align: center;
            margin-bottom: 40px;
            font-size: 14px;
            color: var(--text-muted);
            padding: 16px;
            background: var(--bg-surface);
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
            backdrop-filter: blur(10px);
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .stats-row span {
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 18px;
        }

        /* ========== GALLERY GRID 2026 - ULTRA MODERN ========== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
            animation: fadeSlideUp 0.8s ease-out 0.5s backwards;
        }

        /* ========== CARD STYLE 2026 - PREMIUM ========== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            transition: all 0.5s var(--transition-smooth);
            animation: cardPopIn 0.7s var(--transition-smooth) backwards;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            transform-style: preserve-3d;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1.5px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover::before { opacity: 1; }

        .card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: transparent;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.5),
                0 0 60px rgba(15, 240, 252, 0.2),
                inset 0 0 60px rgba(15, 240, 252, 0.05);
        }

        @keyframes cardPopIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card-media {
            position: relative;
            width: 100%;
            height: 280px;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            cursor: pointer;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s var(--transition-smooth);
            filter: brightness(0.9) contrast(1.1);
        }

        .card:hover .card-img {
            transform: scale(1.1);
            filter: brightness(1) contrast(1.15);
        }

        /* Image Loading Effect */
        .card-img::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(15, 240, 252, 0.1), transparent);
            animation: imageShine 3s infinite;
        }

        @keyframes imageShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Corner Decorations */
        .card-corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid var(--accent-primary);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 2;
        }

        .card-corner.top-left {
            top: 15px;
            left: 15px;
            border-right: 0;
            border-bottom: 0;
            transform: translate(-10px, -10px);
        }

        .card-corner.top-right {
            top: 15px;
            right: 15px;
            border-left: 0;
            border-bottom: 0;
            transform: translate(10px, -10px);
        }

        .card-corner.bottom-left {
            bottom: 15px;
            left: 15px;
            border-right: 0;
            border-top: 0;
            transform: translate(-10px, 10px);
        }

        .card-corner.bottom-right {
            bottom: 15px;
            right: 15px;
            border-left: 0;
            border-top: 0;
            transform: translate(10px, 10px);
        }

        .card:hover .card-corner {
            opacity: 1;
            transform: translate(0, 0);
        }

        /* Actions Overlay - Premium */
        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, 
                rgba(3, 7, 18, 0.98) 0%, 
                rgba(3, 7, 18, 0.8) 40%, 
                rgba(3, 7, 18, 0.3) 70%, 
                transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 24px;
            backdrop-filter: blur(5px);
        }

        .card:hover .card-overlay { opacity: 1; }

        .btn-group {
            display: flex;
            gap: 12px;
            transform: translateY(20px);
            transition: transform 0.4s var(--transition-smooth);
        }

        .card:hover .btn-group { transform: translateY(0); }

        .btn-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            backdrop-filter: blur(10px);
            font-size: 18px;
            position: relative;
            overflow: hidden;
        }

        .btn-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-icon:hover::before { opacity: 1; }

        .btn-icon i {
            position: relative;
            z-index: 1;
        }

        .btn-icon:hover {
            color: #fff;
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 0 30px var(--glow-primary);
        }

        .btn-icon.copy-btn {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .btn-icon.copy-btn:hover {
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
        }

        .card-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border-subtle);
        }

        .card-title {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-bright);
            text-align: center;
            line-height: 1.5;
        }

        /* ========== LOADING STATE 2026 ========== */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            grid-column: 1 / -1;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
            box-shadow: 0 0 30px rgba(15, 240, 252, 0.3);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            font-family: 'Chakra Petch', sans-serif;
            color: var(--accent-primary);
            font-size: 14px;
            letter-spacing: 3px;
            animation: textPulse 2s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* ========== LIGHTBOX 2026 - CINEMATIC ========== */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(3, 7, 18, 0.98);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(20px);
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            position: relative;
            max-width: 95%;
            max-height: 95%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 
                0 0 80px rgba(15, 240, 252, 0.3),
                0 30px 60px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.4s var(--transition-smooth);
        }

        .lightbox.active .lightbox-img { transform: scale(1); }

        .lightbox-caption {
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--bg-surface);
            border-radius: 8px;
            font-family: 'Chakra Petch', sans-serif;
            color: var(--text-bright);
            font-size: 14px;
            border: 1px solid var(--border-subtle);
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            background: var(--bg-surface);
            border: 1px solid var(--accent-secondary);
            border-radius: 50%;
            color: var(--accent-secondary);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .lightbox-close:hover {
            background: var(--accent-secondary);
            color: #fff;
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 30px rgba(255, 62, 108, 0.5);
        }

        /* ========== TOAST NOTIFICATION 2026 ========== */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: var(--bg-surface);
            border: 1px solid var(--accent-primary);
            border-radius: 14px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(150%);
            transition: transform 0.4s var(--transition-smooth);
            z-index: 2000;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(15, 240, 252, 0.3);
        }

        .toast.show {
            transform: translateX(0);
            animation: toastBloom 0.5s var(--transition-smooth);
        }

        @keyframes toastBloom {
            0% { transform: translateX(150%) scale(0.9); }
            50% { transform: translateX(-10px) scale(1.02); }
            100% { transform: translateX(0) scale(1); }
        }

        .toast-icon {
            color: var(--accent-green);
            font-size: 20px;
        }

        .toast-text {
            font-weight: 600;
            font-size: 14px;
        }

        /* ========== SCROLLBAR & SELECTION ========== */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-tertiary));
            border-radius: 5px;
        }

        ::selection {
            background: rgba(15, 240, 252, 0.35);
            color: var(--text-bright);
        }

        /* ========== RESPONSIVE 2026 ========== */
        @media (max-width: 768px) {
            .container { padding: 30px 20px; }
            .gallery-grid { grid-template-columns: 1fr; }
            .search-wrapper { flex-direction: column; }
            .btn-search { width: 100%; justify-content: center; }
            .tab-nav { flex-direction: column; gap: 12px; }
            .tab-btn { width: 100%; }
            .header-title { letter-spacing: 3px; }
            .card-media { height: 240px; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="grid-lines"></div>
    <div class="noise-overlay"></div>
    <div class="scan-beam"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <header class="header">
            <div class="logo-wrapper">
                <div class="logo-glow"></div>
            </div>
            <h1 class="header-title">GALERI CYBER 2026</h1>
            <p class="header-subtitle">LINE TOGEL ARCHIVE SYSTEM</p>
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>SYSTEM ONLINE</span>
            </div>
        </header>

        <div class="tab-nav">
            <button class="tab-btn active" id="tabData" onclick="switchTab('data')">
                <i class="fas fa-database"></i> DATA INTERNAL
            </button>
            <button class="tab-btn" id="tabWeb" onclick="switchTab('web')">
                <i class="fas fa-globe"></i> CARI DI WEB
            </button>
        </div>

        <div class="search-wrapper">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Ketik kata kunci...">
            </div>
            <button class="btn-search" onclick="executeSearch()">
                <i class="fas fa-bolt"></i> CARI FOTO
            </button>
        </div>

        <div class="stats-row">
            Ditemukan <span id="totalItems">0</span> item
        </div>

        <div id="galleryGrid" class="gallery-grid">
            <div class="loader-container">
                <div class="spinner"></div>
                <p class="loader-text">CONNECTING TO DATABASE...</p>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox(event)"><i class="fas fa-times"></i></button>
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <img id="lightboxImg" class="lightbox-img" src="" alt="Full size">
            <div id="lightboxCaption" class="lightbox-caption"></div>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-check-circle toast-icon"></i>
        <span id="toastText" class="toast-text">Berhasil!</span>
    </div>

    <script>
        // Generate floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for(let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 20 + 's';
                p.style.animationDuration = (15 + Math.random() * 20) + 's';
                container.appendChild(p);
            }
        }

        // CONFIG
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        const GID = '1246502038';
        const QUERY = 'SELECT C, D WHERE D IS NOT NULL';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${encodeURIComponent(QUERY)}&gid=${GID}`;

        // STATE
        let currentMode = 'data';
        let cachedInternalData = [];
        const galleryGrid = document.getElementById('galleryGrid');
        const totalItems = document.getElementById('totalItems');
        const searchInput = document.getElementById('searchInput');

        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            loadInternalData();
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') executeSearch();
            });
        });

        // TAB SWITCHER
        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            if (mode === 'data') {
                document.getElementById('tabData').classList.add('active');
                searchInput.placeholder = "Cari di data internal...";
                renderGallery(cachedInternalData);
            } else {
                document.getElementById('tabWeb').classList.add('active');
                searchInput.placeholder = "Contoh: Nature, Cars, Cyberpunk...";
                galleryGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 80px;">
                        <i class="fas fa-globe" style="font-size: 64px; color: var(--accent-tertiary); margin-bottom: 24px;"></i>
                        <h3 style="font-family: 'Chakra Petch'; font-size: 24px; margin-bottom: 12px;">MODE PENCARIAN WEB</h3>
                        <p style="color: var(--text-muted);">Ketik kata kunci lalu tekan CARI FOTO</p>
                    </div>
                `;
                totalItems.textContent = "0";
            }
        }

        // SEARCH EXECUTION
        function executeSearch() {
            const query = searchInput.value.trim();
            if (currentMode === 'web') {
                if (query) loadWebImages(query);
                else showToast("Masukkan kata kunci pencarian");
            } else {
                filterInternal(query);
            }
        }

        // LOAD INTERNAL DATA
        async function loadInternalData() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const jsonString = text.substring(47).slice(0, -2);
                const json = JSON.parse(jsonString);
                const rows = json.table.rows;

                cachedInternalData = rows.map(row => {
                    let title = row.c[0] ? row.c[0].v : 'Tanpa Judul';
                    let url = row.c[1] ? row.c[1].v : null;
                    
                    if (url && url.includes("drive.google.com")) {
                        url = convertDriveLink(url);
                    }

                    return { title, url };
                }).filter(item => item.url);

                renderGallery(cachedInternalData);
            } catch (err) {
                console.error(err);
                galleryGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--accent-secondary); padding: 60px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 20px;"></i>
                    <p>Gagal memuat data</p>
                </div>`;
            }
        }

        function convertDriveLink(url) {
            let id = null;
            const dMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            const idMatch = url.match(/open\?id=([a-zA-Z0-9_-]+)/);
            
            if (dMatch) id = dMatch[1];
            else if (idMatch) id = idMatch[1];
            
            return id ? `https://drive.google.com/uc?export=view&id=${id}` : url;
        }

        function filterInternal(query) {
            const q = query.toLowerCase();
            const filtered = cachedInternalData.filter(item => item.title.toLowerCase().includes(q));
            renderGallery(filtered);
        }

        // LOAD WEB IMAGES
        async function loadWebImages(query) {
            galleryGrid.innerHTML = `<div class="loader-container">
                <div class="spinner"></div>
                <p class="loader-text">SEARCHING: "${query}"...</p>
            </div>`;
            
            const images = [];
            for(let i = 0; i < 15; i++) {
                const rand = Math.floor(Math.random() * 1000);
                images.push({
                    title: `${query} - ${i+1}`,
                    url: `https://source.unsplash.com/600x400/?${encodeURIComponent(query)}&sig=${rand}`
                });
            }
            
            await new Promise(r => setTimeout(r, 800));
            renderGallery(images);
        }

        // RENDER GALLERY - ULTRA MODERN
        function renderGallery(items) {
            galleryGrid.innerHTML = '';
            totalItems.textContent = items.length;

            if (items.length === 0) {
                galleryGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 80px;">
                    <i class="fas fa-search" style="font-size: 48px; margin-bottom: 20px; opacity: 0.5;"></i>
                    <p>Tidak ada hasil ditemukan</p>
                </div>`;
                return;
            }

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <div class="card-media" onclick="openLightbox('${item.url}', '${item.title}')">
                        <img src="${item.url}" alt="${item.title}" class="card-img" loading="lazy" onerror="this.onerror=null;this.src='https://via.placeholder.com/400x300/0f172a/0ff0fc?text=Error';">
                        
                        <!-- Corner Decorations -->
                        <div class="card-corner top-left"></div>
                        <div class="card-corner top-right"></div>
                        <div class="card-corner bottom-left"></div>
                        <div class="card-corner bottom-right"></div>
                        
                        <!-- Overlay Actions -->
                        <div class="card-overlay">
                            <div class="btn-group">
                                <button class="btn-icon copy-btn" onclick="event.stopPropagation(); copyImage('${item.url}')" title="Salin Foto">
                                    <i class="fas fa-copy"></i>
                                </button>
                                <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="btn-icon" title="Buka Link" onclick="event.stopPropagation()">
                                    <i class="fas fa-external-link-alt"></i>
                                </a>
                                <button class="btn-icon" onclick="event.stopPropagation(); downloadImage('${item.url}', '${item.title}')" title="Download">
                                    <i class="fas fa-download"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-info">
                        <h3 class="card-title">${item.title}</h3>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // LIGHTBOX FUNCTIONS
        function openLightbox(url, title) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const lightboxCaption = document.getElementById('lightboxCaption');
            
            lightboxImg.src = url;
            lightboxCaption.textContent = title;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox(event) {
            if (!event || event.target.id === 'lightbox' || event.target.closest('.lightbox-close')) {
                const lightbox = document.getElementById('lightbox');
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        // COPY IMAGE
        async function copyImage(url) {
            try {
                showToast("Menyalin foto...");
                
                const response = await fetch(url);
                const blob = await response.blob();
                
                await navigator.clipboard.write([
                    new ClipboardItem({ [blob.type]: blob })
                ]);
                
                showToast("Foto berhasil disalin!");
                
            } catch (err) {
                try {
                    await navigator.clipboard.writeText(url);
                    showToast("Link disalin ke clipboard!");
                } catch (e2) {
                    showToast("Gagal menyalin");
                }
            }
        }

        // DOWNLOAD IMAGE
        async function downloadImage(url, filename) {
            try {
                showToast("Mengunduh foto...");
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
                
                showToast("Download berhasil!");
            } catch (err) {
                showToast("Gagal mengunduh");
            }
        }

        // TOAST NOTIFICATION
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // KEYBOARD SHORTCUTS
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>

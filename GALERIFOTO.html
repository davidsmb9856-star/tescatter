<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00aaff">
<title>FOTO GALLERY - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-blue: #00d4ff;
--neon-blue-dark: #0088ff;
--neon-blue-light: #66e0ff;
--electric-blue: #00ffff;
--neon-purple: #7b2fff;
--neon-pink: #ff00aa;
--neon-gold: #ffd700;
--neon-green: #00ff9d;
--bg-deep: #020408;
--bg-surface: rgba(5, 15, 35, 0.9);
--bg-elevated: rgba(10, 25, 55, 0.8);
--bg-glass: rgba(8, 20, 45, 0.7);
--text-primary: #ffffff;
--text-secondary: #8ab4f8;
--text-dim: #54689a;
--border-glow: rgba(0, 212, 255, 0.5);
--glow-blue: 0 0 12px rgba(0, 212, 255, 0.5), 0 0 25px rgba(0, 212, 255, 0.3);
--glow-electric: 0 0 15px rgba(0, 255, 255, 0.6), 0 0 35px rgba(0, 255, 255, 0.3);
--transition-fast: 0.2s ease;
--transition-smooth: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-deep);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
position: relative;
line-height: 1.5;
font-size: 14px;
}

/* Background Effects */
.bg-canvas {
position: fixed;
inset: 0;
z-index: -3;
background:
radial-gradient(ellipse at 20% 20%, rgba(0, 136, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 80% 15%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
radial-gradient(ellipse at 50% 85%, rgba(123, 47, 255, 0.08) 0%, transparent 50%),
linear-gradient(180deg, #000814 0%, #001428 40%, #000a1c 100%);
}

.grid-overlay {
position: fixed;
inset: 0;
z-index: -2;
background-image:
linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
background-size: 40px 40px;
animation: gridMove 25s linear infinite;
}
@keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 40px 40px; } }

.particles {
position: fixed;
inset: 0;
z-index: -1;
pointer-events: none;
overflow: hidden;
}
.particle {
position: absolute;
width: 2px; height: 2px;
background: var(--neon-blue);
border-radius: 50%;
opacity: 0.5;
animation: particleFloat 18s infinite ease-in-out;
box-shadow: 0 0 6px var(--neon-blue);
}
.particle:nth-child(2n) { background: var(--electric-blue); animation-delay: -4s; }
.particle:nth-child(3n) { background: var(--neon-purple); animation-delay: -8s; }
@keyframes particleFloat {
0%, 100% { transform: translateY(100vh); opacity: 0; }
10% { opacity: 0.5; }
90% { opacity: 0.5; }
100% { transform: translateY(-50px); opacity: 0; }
}

.scanline {
position: fixed;
left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
opacity: 0.5;
animation: scanLine 5s linear infinite;
z-index: 100;
pointer-events: none;
}
@keyframes scanLine {
0% { top: -2px; opacity: 0; }
5% { opacity: 0.5; }
95% { opacity: 0.5; }
100% { top: 100%; opacity: 0; }
}

/* Container */
.container {
max-width: 1300px;
margin: 0 auto;
padding: 15px;
min-height: 100vh;
position: relative;
z-index: 2;
}

/* Header Compact */
.header {
text-align: center;
margin-bottom: 20px;
padding: 15px 10px;
animation: headerEntrance 0.6s ease backwards;
}
@keyframes headerEntrance {
from { opacity: 0; transform: translateY(-20px); }
to { opacity: 1; transform: translateY(0); }
}

.back-btn {
position: fixed;
left: 15px; top: 15px;
background: rgba(0, 136, 255, 0.15);
border: 1px solid var(--border-glow);
color: var(--neon-blue);
padding: 6px 12px;
border-radius: 8px;
text-decoration: none;
font-weight: 600;
font-size: 11px;
display: flex;
align-items: center;
gap: 5px;
transition: var(--transition-smooth);
backdrop-filter: blur(8px);
z-index: 50;
}
.back-btn:hover {
background: rgba(0, 136, 255, 0.3);
box-shadow: var(--glow-blue);
}

.logo-icon {
font-size: 28px;
color: var(--neon-blue);
margin-bottom: 5px;
animation: iconPulse 2s ease-in-out infinite;
filter: drop-shadow(0 0 10px var(--neon-blue));
}
@keyframes iconPulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.1); }
}

.brand-year {
font-family: 'Orbitron', sans-serif;
font-size: 11px;
color: var(--neon-blue);
letter-spacing: 4px;
text-shadow: 0 0 8px var(--neon-blue);
margin-bottom: 3px;
}

.title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(22px, 5vw, 32px);
font-weight: 900;
color: var(--neon-blue);
letter-spacing: 2px;
text-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
}

.subtitle {
font-size: 11px;
color: var(--text-secondary);
letter-spacing: 3px;
text-transform: uppercase;
margin-top: 3px;
}

.status-badge {
display: inline-flex;
align-items: center;
gap: 6px;
padding: 4px 12px;
background: rgba(0, 255, 157, 0.1);
border: 1px solid rgba(0, 255, 157, 0.3);
border-radius: 15px;
font-size: 10px;
font-weight: 600;
color: var(--neon-green);
text-transform: uppercase;
letter-spacing: 1px;
margin-top: 8px;
}

.status-dot {
width: 6px; height: 6px;
background: var(--neon-green);
border-radius: 50%;
animation: dotPulse 1.5s infinite;
box-shadow: 0 0 8px var(--neon-green);
}
@keyframes dotPulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.3); }
}

/* Navigation */
.nav-tabs {
display: flex;
gap: 8px;
justify-content: center;
margin-bottom: 15px;
flex-wrap: wrap;
}

.nav-tab {
padding: 8px 16px;
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: 8px;
color: var(--text-secondary);
font-family: 'Orbitron', sans-serif;
font-size: 10px;
font-weight: 600;
cursor: pointer;
transition: var(--transition-smooth);
text-transform: uppercase;
letter-spacing: 1px;
backdrop-filter: blur(8px);
display: flex;
align-items: center;
gap: 6px;
}

.nav-tab i { font-size: 11px; }
.nav-tab:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
.nav-tab.active {
background: rgba(0, 136, 255, 0.2);
border-color: var(--neon-blue);
color: var(--neon-blue);
box-shadow: var(--glow-blue);
}

/* Sections */
.section { display: none; }
.section.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Search */
.search-container {
max-width: 500px;
margin: 0 auto 15px;
position: relative;
}

.search-box {
width: 100%;
padding: 10px 45px 10px 15px;
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: 10px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 13px;
transition: var(--transition-smooth);
backdrop-filter: blur(8px);
}

.search-box:focus {
outline: none;
border-color: var(--neon-blue);
box-shadow: var(--glow-blue);
}

.search-box::placeholder { color: var(--text-dim); }

.search-btn {
position: absolute;
right: 5px; top: 50%;
transform: translateY(-50%);
width: 32px; height: 32px;
background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
border: none;
border-radius: 8px;
color: #000;
font-size: 12px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--transition-smooth);
}

.search-btn:hover { box-shadow: var(--glow-blue); }

/* Gallery Grid */
.gallery-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
gap: 12px;
}

/* Photo Card Compact */
.photo-card {
background: var(--bg-surface);
border: 1px solid rgba(0, 212, 255, 0.25);
border-radius: 12px;
overflow: hidden;
transition: var(--transition-smooth);
position: relative;
backdrop-filter: blur(10px);
animation: cardEnter 0.4s ease forwards;
opacity: 0;
transform: translateY(10px);
}
.photo-card:nth-child(1) { animation-delay: 0.05s; }
.photo-card:nth-child(2) { animation-delay: 0.1s; }
.photo-card:nth-child(3) { animation-delay: 0.15s; }
.photo-card:nth-child(4) { animation-delay: 0.2s; }
.photo-card:nth-child(5) { animation-delay: 0.25s; }

@keyframes cardEnter { to { opacity: 1; transform: translateY(0); } }

.photo-card:hover {
transform: translateY(-5px);
border-color: var(--neon-blue);
box-shadow: 0 10px 30px rgba(0, 136, 255, 0.2);
}

.photo-wrapper {
position: relative;
width: 100%;
background: var(--bg-elevated);
aspect-ratio: 4/3;
overflow: hidden;
}

.photo-wrapper img {
width: 100%;
height: 100%;
object-fit: cover;
display: block;
transition: transform 0.3s ease;
}

.photo-card:hover .photo-wrapper img { transform: scale(1.05); }

.photo-overlay {
position: absolute;
inset: 0;
background: rgba(0, 10, 20, 0.85);
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
opacity: 0;
transition: opacity 0.25s;
backdrop-filter: blur(5px);
}

.photo-card:hover .photo-overlay { opacity: 1; }

.action-btn {
width: 34px; height: 34px;
background: var(--neon-blue);
border: none;
border-radius: 50%;
color: #000;
font-size: 12px;
cursor: pointer;
transition: var(--transition-fast);
display: flex;
align-items: center;
justify-content: center;
}

.action-btn:hover {
transform: scale(1.15);
box-shadow: 0 0 15px var(--neon-blue);
}

.photo-info { padding: 10px 12px; }

.photo-title {
font-family: 'Orbitron', sans-serif;
font-size: 11px;
font-weight: 600;
color: var(--neon-blue);
margin-bottom: 3px;
word-break: break-word;
line-height: 1.3;
}

.photo-meta {
font-size: 10px;
color: var(--text-dim);
}

/* Editor Compact */
.editor-container {
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: 14px;
padding: 15px;
margin-bottom: 15px;
backdrop-filter: blur(10px);
}

.editor-title {
font-family: 'Orbitron', sans-serif;
font-size: 14px;
color: var(--neon-blue);
margin-bottom: 12px;
display: flex;
align-items: center;
gap: 8px;
}

.upload-area {
border: 2px dashed var(--border-glow);
border-radius: 12px;
padding: 25px 15px;
text-align: center;
cursor: pointer;
transition: var(--transition-smooth);
margin-bottom: 15px;
}

.upload-area:hover {
border-color: var(--neon-blue);
background: rgba(0, 136, 255, 0.05);
}

.upload-icon {
font-size: 32px;
color: var(--neon-blue);
margin-bottom: 8px;
}

.upload-text {
font-size: 13px;
color: var(--text-secondary);
margin-bottom: 4px;
}

.upload-hint {
font-size: 11px;
color: var(--text-dim);
}

.canvas-wrapper {
background: var(--bg-elevated);
border-radius: 10px;
padding: 10px;
margin-bottom: 15px;
overflow: auto;
max-height: 50vh;
}

#mainCanvas {
max-width: 100%;
border: 1px solid var(--border-glow);
border-radius: 6px;
background: #fff;
}

/* Tools Panel */
.tools-panel {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
gap: 12px;
margin-bottom: 15px;
}

.tool-group {
background: var(--bg-elevated);
border: 1px solid rgba(0, 212, 255, 0.2);
border-radius: 10px;
padding: 12px;
}

.tool-title {
font-family: 'Orbitron', sans-serif;
font-size: 10px;
color: var(--neon-blue);
margin-bottom: 10px;
text-transform: uppercase;
letter-spacing: 1px;
display: flex;
align-items: center;
gap: 5px;
}

.tool-btn {
width: 100%;
padding: 7px 10px;
margin-bottom: 5px;
background: rgba(0, 136, 255, 0.1);
border: 1px solid rgba(0, 212, 255, 0.3);
border-radius: 6px;
color: var(--text-secondary);
font-family: 'Rajdhani', sans-serif;
font-size: 11px;
font-weight: 600;
cursor: pointer;
transition: var(--transition-fast);
display: flex;
align-items: center;
gap: 6px;
}

.tool-btn:hover {
background: rgba(0, 136, 255, 0.25);
border-color: var(--neon-blue);
color: var(--neon-blue);
}

.tool-btn i { font-size: 10px; width: 14px; }

input[type="range"] {
width: 100%;
height: 4px;
background: var(--bg-deep);
border-radius: 2px;
-webkit-appearance: none;
margin-bottom: 8px;
}

input[type="range"]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 12px; height: 12px;
background: var(--neon-blue);
border-radius: 50%;
cursor: pointer;
box-shadow: 0 0 8px var(--neon-blue);
}

.color-picker {
width: 100%;
height: 28px;
border: 1px solid var(--border-glow);
border-radius: 6px;
cursor: pointer;
background: none;
}

.input-field {
width: 100%;
padding: 8px 10px;
background: var(--bg-deep);
border: 1px solid rgba(0, 212, 255, 0.3);
border-radius: 6px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 12px;
margin-bottom: 6px;
}

.input-field:focus {
outline: none;
border-color: var(--neon-blue);
}

/* Buttons */
.action-buttons {
display: flex;
gap: 8px;
justify-content: center;
flex-wrap: wrap;
}

.btn {
padding: 8px 18px;
border-radius: 8px;
font-family: 'Orbitron', sans-serif;
font-size: 10px;
font-weight: 700;
cursor: pointer;
transition: var(--transition-smooth);
border: none;
display: inline-flex;
align-items: center;
gap: 5px;
text-transform: uppercase;
letter-spacing: 1px;
}

.btn-primary {
background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
color: #000;
box-shadow: 0 3px 15px rgba(0, 136, 255, 0.3);
}

.btn-primary:hover { box-shadow: var(--glow-blue); transform: translateY(-2px); }

.btn-secondary {
background: transparent;
border: 1px solid var(--neon-pink);
color: var(--neon-pink);
}

.btn-secondary:hover { background: rgba(255, 0, 170, 0.15); }

/* Loading */
.loading {
display: none;
text-align: center;
padding: 30px;
grid-column: 1 / -1;
}
.loading.active { display: block; }

.loader {
width: 35px; height: 35px;
border: 3px solid rgba(0, 212, 255, 0.2);
border-top-color: var(--neon-blue);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Modal */
.modal-backdrop {
position: fixed;
inset: 0;
background: rgba(0, 5, 15, 0.95);
backdrop-filter: blur(10px);
z-index: 1000;
display: none;
align-items: center;
justify-content: center;
padding: 15px;
}

.modal-backdrop.active { display: flex; animation: fadeIn 0.2s ease; }

.modal-content {
background: var(--bg-surface);
border: 1px solid var(--border-glow);
border-radius: 14px;
max-width: 900px;
width: 100%;
max-height: 90vh;
overflow: auto;
}

.modal-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 12px 15px;
border-bottom: 1px solid rgba(0, 212, 255, 0.2);
}

.modal-title {
font-family: 'Orbitron', sans-serif;
font-size: 13px;
color: var(--neon-blue);
}

.modal-close {
width: 28px; height: 28px;
background: transparent;
border: 1px solid var(--neon-pink);
border-radius: 50%;
color: var(--neon-pink);
font-size: 12px;
cursor: pointer;
transition: var(--transition-fast);
display: flex;
align-items: center;
justify-content: center;
}

.modal-close:hover { background: var(--neon-pink); color: #000; }

.modal-body { padding: 15px; text-align: center; }
.modal-body img { max-width: 100%; border-radius: 8px; }

.modal-actions {
margin-top: 12px;
display: flex;
gap: 8px;
justify-content: center;
flex-wrap: wrap;
}

/* Toast */
.toast {
position: fixed;
bottom: 15px; right: 15px;
background: var(--bg-surface);
border: 1px solid var(--neon-blue);
color: var(--neon-blue);
padding: 10px 16px;
border-radius: 10px;
font-weight: 600;
font-size: 12px;
z-index: 10000;
display: flex;
align-items: center;
gap: 8px;
box-shadow: var(--glow-blue);
backdrop-filter: blur(8px);
transform: translateX(150px);
opacity: 0;
transition: var(--transition-smooth);
}

.toast.show { transform: translateX(0); opacity: 1; }

/* Responsive */
@media (max-width: 768px) {
.container { padding: 10px; }
.back-btn { left: 10px; top: 10px; }
.gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
.tools-panel { grid-template-columns: 1fr 1fr; }
.nav-tab { padding: 6px 10px; font-size: 9px; }
.title { font-size: 20px; }
}

@media (max-width: 480px) {
.gallery-grid { grid-template-columns: 1fr; }
.tools-panel { grid-template-columns: 1fr; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 3px; }

::selection { background: rgba(0, 212, 255, 0.3); color: var(--text-primary); }
</style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="grid-overlay"></div>
<div class="particles" id="particles"></div>
<div class="scanline"></div>

<a href="index.html" class="back-btn"><i class="fas fa-bolt"></i> Kembali</a>

<div class="container">
<header class="header">
<div class="logo-icon"><i class="fas fa-bolt"></i></div>
<div class="brand-year">2026</div>
<h1 class="title">FOTO GALLERY</h1>
<p class="subtitle">Line Togel Electric System</p>
<div class="status-badge"><span class="status-dot"></span><span>Online</span></div>
</header>

<nav class="nav-tabs">
<button class="nav-tab active" onclick="showSection('gallery')"><i class="fas fa-images"></i> Galeri</button>
<button class="nav-tab" onclick="showSection('search')"><i class="fas fa-search"></i> Cari Web</button>
<button class="nav-tab" onclick="showSection('editor')"><i class="fas fa-magic"></i> Editor</button>
</nav>

<section id="gallery" class="section active">
<div class="search-container">
<input type="text" class="search-box" id="searchInput" placeholder="Cari foto berdasarkan judul..." onkeyup="searchPhotos()">
</div>
<div class="loading" id="loading">
<div class="loader"></div>
<div style="color: var(--neon-blue); font-family: 'Orbitron'; font-size: 11px;">Loading...</div>
</div>
<div class="gallery-grid" id="galleryGrid"></div>
</section>

<section id="search" class="section">
<div class="search-container">
<input type="text" class="search-box" id="webSearchInput" placeholder="Cari foto (contoh: sunset, nature)...">
<button class="search-btn" onclick="searchWebPhotos()"><i class="fas fa-search"></i></button>
</div>
<div class="gallery-grid" id="searchGrid"></div>
</section>

<section id="editor" class="section">
<div class="editor-container">
<h2 class="editor-title"><i class="fas fa-palette"></i> Photo Editor</h2>
<div class="upload-area" onclick="document.getElementById('fileInput').click()">
<div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
<div class="upload-text">Klik atau drag foto</div>
<div class="upload-hint">JPG, PNG, WEBP</div>
<input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleFiles(event)">
</div>
<div class="canvas-wrapper">
<canvas id="mainCanvas" width="600" height="400"></canvas>
</div>
<div class="tools-panel">
<div class="tool-group">
<div class="tool-title"><i class="fas fa-adjust"></i> Filter</div>
<button class="tool-btn" onclick="applyFilter('grayscale')"><i class="fas fa-circle"></i> Grayscale</button>
<button class="tool-btn" onclick="applyFilter('sepia')"><i class="fas fa-coffee"></i> Sepia</button>
<button class="tool-btn" onclick="applyFilter('invert')"><i class="fas fa-exchange-alt"></i> Invert</button>
<button class="tool-btn" onclick="applyFilter('blur')"><i class="fas fa-tint"></i> Blur</button>
<div style="margin-top:8px;">Brightness</div>
<input type="range" id="brightness" min="0" max="200" value="100" onchange="adjustImage()">
<div>Contrast</div>
<input type="range" id="contrast" min="0" max="200" value="100" onchange="adjustImage()">
<div>Saturation</div>
<input type="range" id="saturation" min="0" max="200" value="100" onchange="adjustImage()">
</div>
<div class="tool-group">
<div class="tool-title"><i class="fas fa-crop-alt"></i> Transform</div>
<button class="tool-btn" onclick="rotateImage(-90)"><i class="fas fa-undo"></i> Rotate -90</button>
<button class="tool-btn" onclick="rotateImage(90)"><i class="fas fa-redo"></i> Rotate +90</button>
<button class="tool-btn" onclick="flipImage('h')"><i class="fas fa-arrows-alt-h"></i> Flip H</button>
<button class="tool-btn" onclick="flipImage('v')"><i class="fas fa-arrows-alt-v"></i> Flip V</button>
<button class="tool-btn" onclick="resizeCanvas()"><i class="fas fa-compress"></i> Resize</button>
</div>
<div class="tool-group">
<div class="tool-title"><i class="fas fa-font"></i> Text</div>
<input type="text" class="input-field" id="textInput" placeholder="Teks...">
<input type="color" class="color-picker" id="textColor" value="#00d4ff">
<input type="number" class="input-field" id="textSize" placeholder="Ukuran" value="30">
<button class="tool-btn" onclick="addText()"><i class="fas fa-plus"></i> Tambah</button>
<button class="tool-btn" onclick="startDrawing()"><i class="fas fa-pencil-alt"></i> Draw</button>
</div>
<div class="tool-group">
<div class="tool-title"><i class="fas fa-layer-group"></i> Tools</div>
<button class="tool-btn" onclick="combinePhotos('h')"><i class="fas fa-columns"></i> Gabung H</button>
<button class="tool-btn" onclick="combinePhotos('v')"><i class="fas fa-bars"></i> Gabung V</button>
<button class="tool-btn" onclick="addFrame()"><i class="fas fa-border-style"></i> Frame</button>
<button class="tool-btn" onclick="addWatermark()"><i class="fas fa-copyright"></i> Watermark</button>
</div>
</div>
<div class="action-buttons">
<button class="btn btn-primary" onclick="downloadImage()"><i class="fas fa-download"></i> Download</button>
<button class="btn btn-secondary" onclick="clearCanvas()"><i class="fas fa-trash"></i> Clear</button>
<button class="btn btn-secondary" onclick="undoAction()"><i class="fas fa-undo"></i> Undo</button>
</div>
</div>
</section>
</div>

<div class="modal-backdrop" id="imageModal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title" id="modalTitle">Foto</h3>
<button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
</div>
<div class="modal-body">
<img src="" alt="" id="modalImage">
<div class="modal-actions">
<button class="btn btn-primary" onclick="copyImage()"><i class="fas fa-copy"></i> Copy</button>
<button class="btn btn-secondary" onclick="downloadModalImage()"><i class="fas fa-download"></i> Download</button>
</div>
</div>
</div>
</div>

<div id="toast" class="toast">
<i class="fas fa-bolt"></i>
<span id="toastText">Berhasil!</span>
</div>

<script>
let allPhotos = [];
let currentImageUrl = '';
let currentImageTitle = '';
let canvas, ctx;
let currentEditorImage = null;
let history = [];
let isDrawing = false;

document.addEventListener('DOMContentLoaded', () => {
canvas = document.getElementById('mainCanvas');
ctx = canvas ? canvas.getContext('2d') : null;
createParticles();
fetchPhotosFromSheet();
initCanvas();
});

function createParticles() {
const container = document.getElementById('particles');
for(let i = 0; i < 25; i++) {
const p = document.createElement('div');
p.className = 'particle';
p.style.left = Math.random() * 100 + '%';
p.style.animationDelay = Math.random() * 18 + 's';
container.appendChild(p);
}
}

function showSection(sectionId) {
document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
document.getElementById(sectionId).classList.add('active');
event.target.classList.add('active');
}

async function fetchPhotosFromSheet() {
document.getElementById('loading').classList.add('active');
document.getElementById('galleryGrid').innerHTML = '';
try {
const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
const gid = '1246502038';
const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D110`;
const response = await fetch(gvizUrl);
const text = await response.text();
const json = JSON.parse(text.substring(47).slice(0, -2));
const rows = json.table.rows;
allPhotos = [];
rows.forEach((row, index) => {
const c = row.c;
if (!c) return;
const judul = c[0] ? (c[0].v || '') : '';
const foto = c[1] ? (c[1].v || '') : '';
if (judul && foto) allPhotos.push({ judul, foto, index: index + 2 });
});
renderGallery(allPhotos);
showToast(`${allPhotos.length} foto dimuat`);
} catch (error) {
showToast('Gagal memuat data');
}
document.getElementById('loading').classList.remove('active');
}

function renderGallery(photos) {
const grid = document.getElementById('galleryGrid');
grid.innerHTML = '';
if (!photos.length) {
grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim);">Tidak ada foto</div>';
return;
}
photos.forEach((photo, idx) => grid.appendChild(createPhotoCard(photo.foto, photo.judul, idx)));
}

function createPhotoCard(url, title, index) {
const card = document.createElement('div');
card.className = 'photo-card';
card.innerHTML = `
<div class="photo-wrapper">
<img src="${url}" alt="${title}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22%3E%3Crect fill=%22%23001933%22 width=%22400%22 height=%22300%22/%3E%3Ctext fill=%22%2300d4ff%22 font-family=%22Arial%22 font-size=%2214%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo Image%3C/text%3E%3C/svg%3E'">
<div class="photo-overlay">
<button class="action-btn" onclick="viewFullImage('${url}','${title.replace(/'/g,"\\'")}')"><i class="fas fa-eye"></i></button>
<button class="action-btn" onclick="copyPhoto('${url}')"><i class="fas fa-copy"></i></button>
<button class="action-btn" onclick="downloadPhoto('${url}','${title.replace(/'/g,"\\'")}')"><i class="fas fa-download"></i></button>
<button class="action-btn" onclick="editImageFromUrl('${url}')"><i class="fas fa-edit"></i></button>
</div>
</div>
<div class="photo-info">
<div class="photo-title">${title}</div>
<div class="photo-meta">#${index + 1}</div>
</div>`;
return card;
}

function searchPhotos() {
const term = document.getElementById('searchInput').value.toLowerCase().trim();
const filtered = term ? allPhotos.filter(p => p.judul.toLowerCase().includes(term)) : allPhotos;
renderGallery(filtered);
}

async function searchWebPhotos() {
const query = document.getElementById('webSearchInput').value.trim();
if (!query) { showToast('Masukkan kata kunci'); return; }
const grid = document.getElementById('searchGrid');
grid.innerHTML = '<div class="loading active"><div class="loader"></div></div>';
setTimeout(() => {
grid.innerHTML = '';
for (let i = 0; i < 12; i++) {
const url = `https://picsum.photos/seed/${query}${i}/400/300`;
grid.appendChild(createPhotoCard(url, `${query} ${i + 1}`, i));
}
showToast(`Foto "${query}" dimuat`);
}, 500);
}

function viewFullImage(url, title) {
currentImageUrl = url; currentImageTitle = title;
document.getElementById('modalTitle').textContent = title;
document.getElementById('modalImage').src = url;
document.getElementById('imageModal').classList.add('active');
document.body.style.overflow = 'hidden';
}

function closeModal() {
document.getElementById('imageModal').classList.remove('active');
document.body.style.overflow = '';
}

async function copyPhoto(url) {
try {
const res = await fetch(url);
const blob = await res.blob();
await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
showToast('Foto disalin');
} catch { showToast('Gagal menyalin'); }
}

async function copyImage() { if (currentImageUrl) await copyPhoto(currentImageUrl); }

function downloadPhoto(url, filename) {
const link = document.createElement('a');
link.href = url;
link.download = `${filename.replace(/[^a-z0-9]/gi, '_')}.jpg`;
link.target = '_blank';
link.click();
showToast('Download...');
}

function downloadModalImage() { if (currentImageUrl) downloadPhoto(currentImageUrl, currentImageTitle); }

function initCanvas() {
if (!canvas || !ctx) return;
ctx.fillStyle = '#fff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.font = '18px Rajdhani';
ctx.fillStyle = '#0088ff';
ctx.textAlign = 'center';
ctx.fillText('Upload foto untuk mulai', canvas.width/2, canvas.height/2);
}

function handleFiles(e) {
const files = e.target.files;
if (!files.length) return;
loadImage(files[0]);
}

function loadImage(file) {
const reader = new FileReader();
reader.onload = (e) => {
const img = new Image();
img.onload = () => {
currentEditorImage = img;
saveHistory();
canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img, 0, 0);
showToast('Foto dimuat');
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
}

function applyFilter(type) {
if (!currentEditorImage) { showToast('Upload foto dulu'); return; }
saveHistory();
const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
const data = imageData.data;
if (type === 'grayscale') {
for (let i = 0; i < data.length; i += 4) {
const avg = (data[i] + data[i+1] + data[i+2]) / 3;
data[i] = data[i+1] = data[i+2] = avg;
}
} else if (type === 'sepia') {
for (let i = 0; i < data.length; i += 4) {
const r = data[i], g = data[i+1], b = data[i+2];
data[i] = Math.min(255, r*.393 + g*.769 + b*.189);
data[i+1] = Math.min(255, r*.349 + g*.686 + b*.168);
data[i+2] = Math.min(255, r*.272 + g*.534 + b*.131);
}
} else if (type === 'invert') {
for (let i = 0; i < data.length; i += 4) {
data[i] = 255 - data[i];
data[i+1] = 255 - data[i+1];
data[i+2] = 255 - data[i+2];
}
} else if (type === 'blur') {
ctx.filter = 'blur(3px)';
ctx.drawImage(canvas, 0, 0);
ctx.filter = 'none';
}
if (type !== 'blur') ctx.putImageData(imageData, 0, 0);
showToast(`Filter ${type}`);
}

function adjustImage() {
if (!currentEditorImage) return;
ctx.filter = `brightness(${document.getElementById('brightness').value}%) contrast(${document.getElementById('contrast').value}%) saturate(${document.getElementById('saturation').value}%)`;
ctx.drawImage(currentEditorImage, 0, 0);
ctx.filter = 'none';
}

function rotateImage(deg) { if (!currentEditorImage) return; saveHistory(); const t = document.createElement('canvas'); const tc = t.getContext('2d'); t.width = canvas.height; t.height = canvas.width; tc.translate(t.width/2, t.height/2); tc.rotate(deg*Math.PI/180); tc.drawImage(canvas, -canvas.width/2, -canvas.height/2); canvas.width = t.width; canvas.height = t.height; ctx.drawImage(t, 0, 0); }
function flipImage(dir) { if (!currentEditorImage) return; saveHistory(); const t = document.createElement('canvas'); const tc = t.getContext('2d'); t.width = canvas.width; t.height = canvas.height; dir === 'h' ? tc.translate(canvas.width, 0) : tc.translate(0, canvas.height); tc.scale(dir==='h' ? -1 : 1, dir==='h' ? 1 : -1); tc.drawImage(canvas, 0, 0); ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(t, 0, 0); }
function resizeCanvas() { const w = prompt('Lebar:', canvas.width), h = prompt('Tinggi:', canvas.height); if (w && h) { saveHistory(); const t = document.createElement('canvas'); const tc = t.getContext('2d'); t.width = canvas.width; t.height = canvas.height; tc.drawImage(canvas, 0, 0); canvas.width = parseInt(w); canvas.height = parseInt(h); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.drawImage(t, 0, 0); } }
function addText() { const t = document.getElementById('textInput').value; if (!t) { showToast('Masukkan teks'); return; } saveHistory(); ctx.font = `${document.getElementById('textSize').value}px Orbitron`; ctx.fillStyle = document.getElementById('textColor').value; ctx.textAlign = 'center'; ctx.fillText(t, canvas.width/2, canvas.height/2); showToast('Teks ditambahkan'); }
function startDrawing() { isDrawing = !isDrawing; showToast(isDrawing ? 'Mode gambar aktif' : 'Mode gambar off'); if (isDrawing) { canvas.onmousedown = e => { ctx.beginPath(); const r = canvas.getBoundingClientRect(); ctx.moveTo((e.clientX-r.left)*(canvas.width/r.width), (e.clientY-r.top)*(canvas.height/r.height)); ctx.strokeStyle = document.getElementById('textColor').value; ctx.lineWidth = 3; }; canvas.onmousemove = e => { if (!isDrawing) return; const r = canvas.getBoundingClientRect(); ctx.lineTo((e.clientX-r.left)*(canvas.width/r.width), (e.clientY-r.top)*(canvas.height/r.height)); ctx.stroke(); }; canvas.onmouseup = () => saveHistory(); } else { canvas.onmousedown = canvas.onmousemove = canvas.onmouseup = null; } }
function combinePhotos(dir) { const i = document.createElement('input'); i.type = 'file'; i.multiple = true; i.accept = 'image/*'; i.onchange = e => { const f = e.target.files; if (f.length < 2) { showToast('Pilih 2+ foto'); return; } const imgs = []; let loaded = 0; Array.from(f).forEach(file => { const r = new FileReader(); r.onload = ev => { const img = new Image(); img.onload = () => { imgs.push(img); if (++loaded === f.length) { const w = imgs.reduce((s, i) => s + i.width, 0), h = Math.max(...imgs.map(i => i.height)); canvas.width = w; canvas.height = h; ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h); let x = 0; imgs.forEach(img => { ctx.drawImage(img, x, 0); x += img.width; }); saveHistory(); showToast(`${imgs.length} foto digabung`); }}; img.src = ev.target.result; }; r.readAsDataURL(file); }); }; i.click(); }
function addFrame() { saveHistory(); ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 15; ctx.strokeRect(0, 0, canvas.width, canvas.height); showToast('Frame ditambahkan'); }
function addWatermark() { saveHistory(); ctx.font = 'bold 20px Orbitron'; ctx.fillStyle = 'rgba(0,212,255,0.3)'; ctx.textAlign = 'right'; ctx.fillText('LINE TOGEL', canvas.width - 10, canvas.height - 10); showToast('Watermark ditambahkan'); }
function saveHistory() { if (canvas) { history.push(canvas.toDataURL()); if (history.length > 10) history.shift(); } }
function undoAction() { if (history.length > 1) { history.pop(); const img = new Image(); img.onload = () => { canvas.width = img.width; canvas.height = img.height; ctx.drawImage(img, 0, 0); }; img.src = history[history.length - 1]; showToast('Undo'); } }
function clearCanvas() { if (confirm('Hapus semua?')) { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height); currentEditorImage = null; history = []; showToast('Canvas dibersihkan'); } }
function downloadImage() { const link = document.createElement('a'); link.download = `photo-${Date.now()}.png`; link.href = canvas.toDataURL(); link.click(); showToast('Download...'); }
function editImageFromUrl(url) { showSection('editor'); document.querySelectorAll('.nav-tab')[2].classList.add('active'); document.querySelectorAll('.section')[2].classList.add('active'); const img = new Image(); img.crossOrigin = 'anonymous'; img.onload = () => { currentEditorImage = img; canvas.width = img.width; canvas.height = img.height; ctx.drawImage(img, 0, 0); saveHistory(); showToast('Foto dimuat ke editor'); }; img.src = url; }

function showToast(msg) {
const toast = document.getElementById('toast');
document.getElementById('toastText').textContent = msg;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 2500);
}

document.getElementById('imageModal').addEventListener('click', e => { if (e.target.id === 'imageModal') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undoAction(); } });
</script>
</body>
</html>

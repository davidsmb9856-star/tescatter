<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00f5ff">
<meta name="description" content="LINE TOGEL Ultimate Gallery - Blue Neon Cyber Portal 2026">
<title>⚡ GALERI ULTIMATE - LINE TOGEL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== BLUE NEON CYBER VARIABLES ===== */
:root {
  /* Neon Colors */
  --neon-blue: #00d4ff;
  --neon-cyan: #00ffff;
  --neon-electric: #00f5ff;
  --neon-purple: #7b2fff;
  --neon-indigo: #5a4bff;
  --neon-success: #00ff9d;
  
  /* Background Layers */
  --bg-deep: #00040a;
  --bg-surface: rgba(2, 10, 24, 0.88);
  --bg-elevated: rgba(5, 18, 42, 0.82);
  --bg-glass: rgba(8, 24, 52, 0.72);
  --bg-glass-strong: rgba(12, 32, 68, 0.85);
  
  /* Text */
  --text-primary: #ffffff;
  --text-secondary: #94b8e8;
  --text-dim: #5a729a;
  --text-glow: rgba(0, 245, 255, 0.9);
  
  /* Borders & Glows */
  --border-neon: rgba(0, 212, 255, 0.55);
  --border-glow: rgba(0, 245, 255, 0.65);
  --glow-soft: 0 0 15px rgba(0, 212, 255, 0.45), 0 0 35px rgba(0, 212, 255, 0.25);
  --glow-medium: 0 0 25px rgba(0, 245, 255, 0.65), 0 0 60px rgba(0, 245, 255, 0.35);
  --glow-intense: 0 0 35px rgba(0, 245, 255, 0.85), 0 0 80px rgba(0, 245, 255, 0.55), inset 0 0 25px rgba(0, 245, 255, 0.12);
  --glow-purple: 0 0 25px rgba(123, 47, 255, 0.6), 0 0 55px rgba(123, 47, 255, 0.35);
  
  /* Transitions */
  --transition-fast: 180ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 350ms cubic-bezier(0.16, 1, 0.3, 1);
  --transition-bloom: 550ms cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-elastic: 650ms cubic-bezier(0.68, -0.55, 0.265, 1.55);
  
  /* UI Dimensions */
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --spacing-xs: 7px;
  --spacing-sm: 12px;
  --spacing-md: 18px;
  --spacing-lg: 26px;
  --spacing-xl: 36px;
  
  /* Layout */
  --header-height: 72px;
  --card-min-width: 300px;
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 24px; }
body {
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== BACKGROUND SYSTEM - PREMIUM ===== */
.bg-canvas {
  position: fixed; inset: 0; z-index: -4;
  background: 
    radial-gradient(ellipse at 18% 22%, rgba(0, 245, 255, 0.14) 0%, transparent 58%),
    radial-gradient(ellipse at 82% 18%, rgba(123, 47, 255, 0.12) 0%, transparent 58%),
    radial-gradient(ellipse at 50% 88%, rgba(0, 212, 255, 0.1) 0%, transparent 62%),
    radial-gradient(ellipse at 28% 68%, rgba(0, 255, 157, 0.06) 0%, transparent 68%);
  animation: bgPulse 22s ease-in-out infinite alternate;
  will-change: opacity, filter;
}
@keyframes bgPulse {
  0%, 100% { opacity: 1; filter: hue-rotate(0deg) brightness(1) saturate(1); }
  25% { opacity: 0.96; filter: hue-rotate(10deg) brightness(1.06) saturate(1.05); }
  50% { opacity: 0.92; filter: hue-rotate(22deg) brightness(1.12) saturate(1.1); }
  75% { opacity: 0.96; filter: hue-rotate(10deg) brightness(1.06) saturate(1.05); }
}

.grid-overlay {
  position: fixed; inset: 0; z-index: -3;
  background-image:
    linear-gradient(rgba(0, 245, 255, 0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 245, 255, 0.045) 1px, transparent 1px),
    linear-gradient(45deg, rgba(123, 47, 255, 0.025) 1px, transparent 1px);
  background-size: 42px 42px, 42px 42px, 84px 84px;
  mask-image: radial-gradient(ellipse 78% 68% at 50% 48%, black 28%, transparent 82%);
  animation: gridFlow 42s linear infinite;
  pointer-events: none;
}
@keyframes gridFlow {
  0% { background-position: 0 0, 0 0, 0 0; }
  100% { background-position: 42px 42px, 42px 42px, 84px 84px; }
}

/* Lightning System - Enhanced */
.lightning-overlay {
  position: fixed; inset: 0; z-index: -2;
  pointer-events: none; opacity: 0;
  animation: lightningCycle 14s infinite;
}
@keyframes lightningCycle {
  0%, 86%, 95%, 100% { opacity: 0; }
  87%, 94% { opacity: 0.09; }
  88%, 93% { opacity: 0.22; }
  89%, 92% { opacity: 0.15; }
  90%, 91% { opacity: 0.28; }
}
.lightning-bolt {
  position: absolute; width: 2px; height: 100vh;
  background: linear-gradient(180deg, 
    transparent 0%, 
    var(--neon-electric) 18%, 
    var(--neon-blue) 45%, 
    var(--neon-purple) 72%, 
    transparent 100%);
  filter: blur(1.5px) drop-shadow(0 0 10px var(--neon-electric));
  animation: lightningStrike 14s infinite;
  opacity: 0;
  transform-origin: top;
}
.lightning-bolt::before {
  content: ''; position: absolute; inset: -3px;
  background: inherit; filter: blur(4px); opacity: 0.45;
}
.lightning-bolt:nth-child(1) { left: 20%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 54%; animation-delay: 4s; }
.lightning-bolt:nth-child(3) { left: 84%; animation-delay: 9s; }
@keyframes lightningStrike {
  0%, 86%, 95%, 100% { transform: scaleY(0); opacity: 0; }
  87% { transform: scaleY(0.25); opacity: 0.4; }
  88%, 93% { transform: scaleY(1); opacity: 1; }
  89%, 92% { transform: scaleY(0.65); opacity: 0.7; }
  90%, 91% { transform: scaleY(0.85); opacity: 0.9; }
  94% { transform: scaleY(0.15); opacity: 0.3; }
}

/* Particle System - Premium */
.particles {
  position: fixed; inset: 0; z-index: -2;
  pointer-events: none; overflow: hidden;
}
.particle {
  position: absolute; width: 2px; height: 2px;
  border-radius: 50%; opacity: 0;
  animation: particleFloat linear infinite;
  will-change: transform, opacity;
}
.particle::after {
  content: ''; position: absolute; inset: -5px;
  border-radius: 50%;
  background: inherit;
  filter: blur(2.5px);
  opacity: 0.65;
}
.particle.blue { 
  background: var(--neon-blue); 
  box-shadow: 0 0 10px var(--neon-blue), 0 0 28px var(--neon-blue);
  animation-duration: 28s;
}
.particle.cyan { 
  background: var(--neon-electric); 
  box-shadow: 0 0 12px var(--neon-electric), 0 0 32px var(--neon-electric);
  animation-duration: 34s;
}
.particle.purple { 
  background: var(--neon-purple); 
  box-shadow: 0 0 10px var(--neon-purple), 0 0 28px var(--neon-purple);
  animation-duration: 40s;
}
@keyframes particleFloat {
  0% { transform: translateY(100vh) translateX(0) rotate(0deg) scale(0.7); opacity: 0; }
  12% { opacity: 0.85; }
  50% { opacity: 1; }
  88% { opacity: 0.85; }
  100% { transform: translateY(-100vh) translateX(var(--drift, 0px)) rotate(720deg) scale(1.3); opacity: 0; }
}

/* Scanline CRT Effect */
.scanline {
  position: fixed; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(0, 245, 255, 0.45), 
    rgba(0, 212, 255, 0.7), 
    rgba(0, 245, 255, 0.45), 
    transparent);
  opacity: 0.45;
  animation: scanLine 8s linear infinite;
  z-index: 120; pointer-events: none;
  filter: blur(0.6px);
}
@keyframes scanLine {
  0% { top: -6px; opacity: 0; }
  6%, 94% { opacity: 0.45; }
  100% { top: 100%; opacity: 0; }
}

/* Noise Texture */
.noise {
  position: fixed; inset: 0; z-index: -3;
  opacity: 0.028; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: noiseShift 0.6s steps(2) infinite;
}
@keyframes noiseShift {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(-1px, 1px); }
  50% { transform: translate(1px, -1px); }
  75% { transform: translate(-1px, -1px); }
}

/* Vignette */
.vignette {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 42%, rgba(0, 4, 10, 0.65) 100%);
}

/* Aurora Effect */
.aurora {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background: 
    radial-gradient(ellipse at 25% 35%, rgba(0, 245, 255, 0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 65%, rgba(123, 47, 255, 0.06) 0%, transparent 55%);
  animation: auroraFlow 18s ease-in-out infinite alternate;
  opacity: 0.7;
}
@keyframes auroraFlow {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; }
  50% { transform: translate(2%, -1%) scale(1.05); opacity: 0.85; }
}

/* ===== LAYOUT ===== */
.container {
  max-width: 1520px;
  margin: 0 auto;
  padding: var(--spacing-lg) var(--spacing-md);
  min-height: 100vh;
  position: relative;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  margin-bottom: var(--spacing-xl);
  animation: headerEntrance 900ms var(--transition-bloom) backwards;
  padding-top: var(--spacing-xs);
}
@keyframes headerEntrance {
  from { opacity: 0; transform: translateY(-35px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.back-btn {
  position: fixed; left: var(--spacing-md); top: var(--spacing-md);
  background: var(--bg-glass);
  border: 1px solid var(--border-neon);
  color: var(--neon-electric);
  padding: 9px 18px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 700; font-size: 11px;
  display: flex; align-items: center; gap: 7px;
  transition: var(--transition-smooth);
  backdrop-filter: blur(14px);
  z-index: 1000;
  box-shadow: var(--glow-soft);
  text-transform: uppercase; letter-spacing: 1px;
}
.back-btn:hover {
  background: var(--bg-glass-strong);
  border-color: var(--neon-electric);
  transform: translateX(-5px);
  box-shadow: var(--glow-medium);
  color: var(--text-primary);
}
.back-btn:active { transform: translateX(-3px) scale(0.98); }

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(38px, 8.5vw, 62px);
  font-weight: 900;
  letter-spacing: 7px;
  margin-bottom: 8px;
  position: relative;
  background: linear-gradient(135deg, 
    var(--neon-electric) 0%, 
    var(--neon-blue) 28%, 
    #ffffff 50%, 
    var(--neon-blue) 72%, 
    var(--neon-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 50px rgba(0, 245, 255, 0.65);
  animation: titleShimmer 4.5s ease-in-out infinite;
}
@keyframes titleShimmer {
  0%, 100% { filter: brightness(1) saturate(1); }
  50% { filter: brightness(1.45) saturate(1.25); }
}
.main-title::after {
  content: ''; position: absolute; bottom: -10px; left: 50%;
  transform: translateX(-50%);
  width: 140px; height: 4px;
  background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), var(--neon-electric), transparent);
  border-radius: 3px;
  animation: titleGlow 3.5s ease-in-out infinite;
  box-shadow: 0 0 20px rgba(0, 245, 255, 0.7);
}
@keyframes titleGlow {
  0%, 100% { opacity: 0.7; width: 120px; }
  50% { opacity: 1; width: 160px; box-shadow: 0 0 35px rgba(0, 245, 255, 1); }
}

.sub-title {
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 16px;
  font-weight: 500;
  opacity: 0.95;
}

.status-badge {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 7px 22px;
  background: rgba(0, 255, 157, 0.12);
  border: 1px solid rgba(0, 255, 157, 0.42);
  border-radius: 50px;
  font-size: 10px; font-weight: 700;
  color: var(--neon-success);
  text-transform: uppercase; letter-spacing: 2.5px;
  animation: statusPulse 3.2s ease-in-out infinite;
  box-shadow: 0 0 22px rgba(0, 255, 157, 0.35);
  backdrop-filter: blur(10px);
}
@keyframes statusPulse {
  0%, 100% { box-shadow: 0 0 18px rgba(0, 255, 157, 0.3), inset 0 0 12px rgba(0, 255, 157, 0.12); }
  50% { box-shadow: 0 0 38px rgba(0, 255, 157, 0.6), inset 0 0 20px rgba(0, 255, 157, 0.25); }
}
.status-dot {
  width: 8px; height: 8px;
  background: var(--neon-success);
  border-radius: 50%;
  animation: dotBeat 2s ease-in-out infinite;
  box-shadow: 0 0 15px var(--neon-success);
}
@keyframes dotBeat {
  0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 15px var(--neon-success); }
  50% { transform: scale(1.6); opacity: 0.85; box-shadow: 0 0 32px var(--neon-success); }
}

/* ===== SEARCH & FILTERS ===== */
.search-bar {
  max-width: 640px;
  margin: 0 auto var(--spacing-lg);
  position: relative;
  animation: slideUp 500ms var(--transition-bloom) 200ms backwards;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}
.search-input {
  width: 100%;
  padding: 15px 24px 15px 54px;
  background: var(--bg-surface);
  border: 1px solid var(--border-neon);
  border-radius: var(--radius-lg);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  transition: var(--transition-smooth);
  backdrop-filter: blur(14px);
  box-shadow: var(--glow-soft);
}
.search-input:focus {
  outline: none;
  border-color: var(--neon-electric);
  box-shadow: var(--glow-medium);
  background: var(--bg-elevated);
}
.search-input::placeholder { color: var(--text-dim); opacity: 0.85; }
.search-icon {
  position: absolute; left: 20px; top: 50%;
  transform: translateY(-50%);
  color: var(--neon-blue);
  font-size: 17px;
  pointer-events: none;
  text-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
}

.filter-section {
  display: flex; gap: 12px; justify-content: center;
  margin-bottom: var(--spacing-lg); flex-wrap: wrap;
  animation: slideUp 500ms var(--transition-bloom) 350ms backwards;
}
.filter-chip {
  padding: 10px 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: 50px;
  color: var(--text-secondary);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  transition: var(--transition-smooth);
  text-transform: uppercase; letter-spacing: 1.2px;
  backdrop-filter: blur(12px);
  display: flex; align-items: center; gap: 7px;
  position: relative; overflow: hidden;
}
.filter-chip::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.18), rgba(0, 212, 255, 0.08));
  opacity: 0; transition: var(--transition-fast);
}
.filter-chip:hover {
  color: var(--text-primary);
  transform: translateY(-3px);
  border-color: var(--neon-electric);
}
.filter-chip:hover::before { opacity: 1; }
.filter-chip.active {
  color: var(--neon-electric);
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.28), rgba(0, 212, 255, 0.18));
  border: 1px solid var(--neon-electric);
  box-shadow: var(--glow-medium);
  transform: translateY(-3px);
}
.filter-chip.active::before { opacity: 0.35; }

/* Tag Cloud */
.tag-cloud {
  display: flex; gap: 8px; justify-content: center;
  margin-bottom: var(--spacing-xl); flex-wrap: wrap;
  animation: slideUp 500ms var(--transition-bloom) 500ms backwards;
}
.tag {
  padding: 6px 14px;
  background: rgba(0, 212, 255, 0.1);
  border: 1px solid rgba(0, 212, 255, 0.25);
  border-radius: 50px;
  color: var(--neon-blue);
  font-size: 10px; font-weight: 600;
  cursor: pointer;
  transition: var(--transition-smooth);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.tag:hover, .tag.active {
  background: rgba(0, 245, 255, 0.25);
  border-color: var(--neon-electric);
  color: var(--text-primary);
  box-shadow: 0 0 18px rgba(0, 245, 255, 0.4);
  transform: translateY(-2px);
}

/* ===== GALLERY SECTION ===== */
.gallery-section {
  animation: sectionReveal 700ms var(--transition-bloom) backwards;
}
@keyframes sectionReveal {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-header {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px; font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 22px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border-neon);
  display: flex; align-items: center; gap: 13px;
  letter-spacing: 2.5px; position: relative;
}
.section-header::before {
  content: ''; width: 4px; height: 24px;
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue));
  border-radius: 2px;
  box-shadow: 0 0 15px rgba(0, 245, 255, 0.75);
  animation: barPulse 2.5s ease-in-out infinite;
}
@keyframes barPulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 15px rgba(0, 245, 255, 0.75); }
  50% { opacity: 0.85; box-shadow: 0 0 28px rgba(0, 245, 255, 1); }
}

.stats-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: var(--spacing-md); padding: 10px 16px;
  background: var(--bg-glass);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-md);
  font-size: 11px; color: var(--text-secondary);
  backdrop-filter: blur(10px);
}
.stats-count { font-weight: 600; color: var(--neon-electric); }
.stats-view { display: flex; gap: 12px; }
.view-btn {
  padding: 5px 10px; border-radius: 6px;
  background: transparent; border: 1px solid var(--border-glow);
  color: var(--text-secondary); cursor: pointer;
  transition: var(--transition-fast); font-size: 10px;
}
.view-btn:hover, .view-btn.active {
  background: rgba(0, 245, 255, 0.2);
  border-color: var(--neon-electric);
  color: var(--neon-electric);
}

.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--card-min-width), 1fr));
  gap: 24px;
}
.photo-grid.list-view {
  grid-template-columns: 1fr;
  gap: 16px;
}

/* ===== PHOTO CARD - ULTIMATE DESIGN ===== */
.photo-card {
  background: var(--bg-surface);
  border: 1px solid rgba(0, 212, 255, 0.22);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: var(--transition-bloom);
  position: relative;
  backdrop-filter: blur(16px);
  animation: cardEnter 550ms ease forwards;
  opacity: 0; transform: translateY(32px) scale(0.97);
  box-shadow: var(--glow-soft);
}
.photo-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, 
    rgba(0, 245, 255, 0.04) 0%, 
    transparent 52%, 
    rgba(123, 47, 255, 0.04) 100%);
  pointer-events: none; opacity: 0;
  transition: var(--transition-fast);
}
.photo-card:hover::before { opacity: 1; }
.photo-card:nth-child(n) { animation-delay: calc(0.06s * var(--idx, 0)); }
@keyframes cardEnter {
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.photo-card:hover {
  transform: translateY(-9px) scale(1.018);
  border-color: var(--neon-electric);
  box-shadow: var(--glow-medium), 0 28px 65px rgba(0, 0, 0, 0.55);
  z-index: 12;
}

.card-media {
  position: relative;
  width: 100%; height: 320px;
  background: linear-gradient(135deg, #0a1a2a 0%, #040c16 100%);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  border-bottom: 1px solid rgba(0, 212, 255, 0.12);
  cursor: pointer;
}
.card-media::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 65%, rgba(0, 4, 10, 0.45) 100%);
  pointer-events: none;
}
.card-media img {
  width: 100%; height: 100%;
  object-fit: contain;
  transition: transform var(--transition-bloom), filter var(--transition-smooth);
  filter: drop-shadow(0 6px 22px rgba(0, 0, 0, 0.35));
}
.photo-card:hover .card-media img {
  transform: scale(1.09);
  filter: drop-shadow(0 14px 40px rgba(0, 245, 255, 0.22));
}

/* Zoom indicator */
.zoom-hint {
  position: absolute; top: 12px; right: 12px;
  padding: 5px 10px;
  background: rgba(0, 4, 10, 0.75);
  border: 1px solid var(--border-glow);
  border-radius: 50px;
  font-size: 9px; color: var(--neon-electric);
  display: flex; align-items: center; gap: 5px;
  opacity: 0; transform: translateY(-8px);
  transition: var(--transition-smooth);
  backdrop-filter: blur(8px);
}
.card-media:hover .zoom-hint {
  opacity: 1; transform: translateY(0);
}

.card-body { padding: var(--spacing-md); }

.card-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px; font-weight: 700;
  color: var(--neon-electric);
  margin-bottom: 10px;
  text-align: center;
  text-shadow: 0 0 14px rgba(0, 245, 255, 0.5);
  line-height: 1.4;
  min-height: 44px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-tags {
  display: flex; gap: 6px; justify-content: center;
  flex-wrap: wrap; margin-bottom: 12px;
}
.card-tag {
  padding: 3px 9px;
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 4px;
  font-size: 9px; color: var(--neon-blue);
  font-weight: 500;
}

.card-meta {
  display: flex; justify-content: center; gap: 14px;
  font-size: 10px; color: var(--text-dim);
  margin-bottom: 14px; opacity: 0.9;
}
.card-meta span { display: flex; align-items: center; gap: 4px; }

/* Action Buttons Row */
.card-actions {
  display: flex; gap: 9px; justify-content: center;
  padding-top: 13px; border-top: 1px solid rgba(0, 212, 255, 0.16);
}
.action-btn {
  flex: 1; min-width: 74px; max-width: 92px;
  height: 44px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.14), rgba(0, 245, 255, 0.09));
  border: 1px solid rgba(0, 212, 255, 0.32);
  border-radius: var(--radius-sm);
  color: var(--neon-electric);
  font-size: 10px; font-weight: 700;
  cursor: pointer;
  transition: var(--transition-smooth);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; text-transform: uppercase;
  letter-spacing: 0.5px; backdrop-filter: blur(10px);
  position: relative; overflow: hidden;
}
.action-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, 
    rgba(255, 255, 255, 0.12) 0%, 
    transparent 52%, 
    rgba(255, 255, 255, 0.06) 100%);
  opacity: 0; transition: var(--transition-fast);
}
.action-btn i {
  font-size: 15px; margin-bottom: 2px;
  transition: transform var(--transition-fast);
}
.action-btn span { font-size: 9px; font-weight: 600; }
.action-btn:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.32), rgba(0, 245, 255, 0.22));
  border-color: var(--neon-electric);
  transform: translateY(-4px) scale(1.05);
  box-shadow: 0 10px 30px rgba(0, 245, 255, 0.55);
  color: var(--bg-deep);
}
.action-btn:hover::before { opacity: 1; }
.action-btn:hover i { transform: scale(1.18); }

.action-btn.copy:hover {
  background: linear-gradient(135deg, rgba(0, 255, 157, 0.38), rgba(0, 200, 100, 0.28));
  border-color: var(--neon-success);
  box-shadow: 0 10px 30px rgba(0, 255, 157, 0.55);
}
.action-btn.download:hover {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.38), rgba(0, 180, 255, 0.28));
  border-color: var(--neon-blue);
  box-shadow: var(--glow-medium);
}
.action-btn.share:hover {
  background: linear-gradient(135deg, rgba(123, 47, 255, 0.38), rgba(90, 75, 255, 0.28));
  border-color: var(--neon-purple);
  box-shadow: var(--glow-purple);
}

/* ===== LIST VIEW CARD ===== */
.photo-grid.list-view .photo-card {
  display: grid; grid-template-columns: 280px 1fr;
  align-items: center; gap: var(--spacing-md);
}
.photo-grid.list-view .card-media {
  height: 180px; border-radius: var(--radius-md);
  border-bottom: none; border-right: 1px solid rgba(0, 212, 255, 0.12);
}
.photo-grid.list-view .card-body {
  padding: var(--spacing-sm) var(--spacing-md);
  text-align: left;
}
.photo-grid.list-view .card-title {
  text-align: left; min-height: auto; -webkit-line-clamp: 1;
}
.photo-grid.list-view .card-tags { justify-content: flex-start; }
.photo-grid.list-view .card-meta { justify-content: flex-start; }
.photo-grid.list-view .card-actions { justify-content: flex-start; }

/* ===== LOADING & EMPTY STATES ===== */
.loading-state {
  display: none; text-align: center;
  padding: 60px 20px; grid-column: 1 / -1;
}
.loading-state.active { display: block; }
.spinner {
  width: 56px; height: 56px;
  border: 3px solid rgba(0, 212, 255, 0.22);
  border-top-color: var(--neon-electric);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
  box-shadow: var(--glow-medium);
  position: relative;
}
.spinner::after {
  content: ''; position: absolute; inset: -7px;
  border: 2px solid transparent;
  border-top-color: var(--neon-purple);
  border-radius: 50%;
  animation: spin 2.2s reverse linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: var(--neon-electric);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px; letter-spacing: 2.5px;
  animation: flicker 2s ease-in-out infinite;
}
@keyframes flicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.68; }
}

.empty-state {
  grid-column: 1 / -1; text-align: center;
  padding: 70px 20px; color: var(--text-secondary);
}
.empty-state i {
  font-size: 58px; margin-bottom: 20px;
  opacity: 0.45; color: var(--neon-purple);
  text-shadow: 0 0 30px rgba(123, 47, 255, 0.45);
  animation: floatIcon 3s ease-in-out infinite;
}
@keyframes floatIcon {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.empty-state h3 {
  font-family: 'Orbitron', sans-serif;
  color: var(--text-primary); margin-bottom: 10px; font-size: 18px;
}
.empty-state p { font-size: 12px; opacity: 0.88; max-width: 400px; margin: 0 auto; }

/* ===== INFINITE SCROLL LOADER ===== */
.scroll-loader {
  display: none; justify-content: center;
  padding: var(--spacing-lg); grid-column: 1 / -1;
}
.scroll-loader.active { display: flex; }
.scroll-loader .spinner { width: 42px; height: 42px; border-width: 2.5px; }

/* ===== MODAL - PREMIUM ===== */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 2, 6, 0.94);
  backdrop-filter: blur(24px);
  z-index: 2000;
  display: none; align-items: center; justify-content: center;
  padding: var(--spacing-md);
  animation: modalFadeIn 350ms var(--transition-bloom) backwards;
}
.modal-backdrop.active { display: flex; }
@keyframes modalFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal-container {
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-xl);
  max-width: 1000px; width: 100%;
  max-height: 95vh; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: var(--glow-intense), 0 35px 90px rgba(0, 0, 0, 0.65);
  animation: modalSlideIn 500ms var(--transition-bloom) backwards;
}
@keyframes modalSlideIn {
  from { opacity: 0; transform: scale(0.94) translateY(28px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--spacing-sm) var(--spacing-lg);
  border-bottom: 1px solid rgba(0, 212, 255, 0.22);
  background: var(--bg-elevated);
}
.modal-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px; color: var(--neon-electric);
  display: flex; align-items: center; gap: 9px;
}
.modal-close {
  width: 40px; height: 40px;
  background: transparent;
  border: 1px solid var(--neon-purple);
  border-radius: 50%;
  color: var(--neon-purple);
  font-size: 16px;
  cursor: pointer;
  transition: var(--transition-smooth);
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover {
  background: var(--neon-purple);
  color: var(--bg-deep);
  transform: rotate(90deg) scale(1.12);
  box-shadow: var(--glow-purple);
}
.modal-content {
  padding: var(--spacing-lg);
  text-align: center;
  overflow-y: auto; flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(circle at center, #0a1a2a 0%, #040c16 100%);
}
.modal-content img {
  max-width: 100%; max-height: 68vh;
  width: auto; object-fit: contain;
  border-radius: var(--radius-md);
  box-shadow: 0 0 40px rgba(0, 212, 255, 0.45), 0 15px 60px rgba(0, 0, 0, 0.55);
  transition: transform var(--transition-smooth);
  cursor: zoom-in;
}
.modal-content img.zoomed {
  cursor: zoom-out;
  transform: scale(1.5);
}
.modal-info {
  margin-top: var(--spacing-md);
  text-align: left;
  width: 100%;
  max-width: 600px;
}
.modal-info-row {
  display: flex; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid rgba(0, 212, 255, 0.1);
  font-size: 11px;
}
.modal-info-row:last-child { border-bottom: none; }
.modal-info-label { color: var(--text-dim); }
.modal-info-value { color: var(--neon-electric); font-weight: 600; }
.modal-footer {
  padding: var(--spacing-sm) var(--spacing-lg);
  border-top: 1px solid rgba(0, 212, 255, 0.18);
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  background: var(--bg-elevated);
}

/* Modal Navigation */
.modal-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 48px; height: 48px;
  background: var(--bg-glass);
  border: 1px solid var(--border-glow);
  border-radius: 50%;
  color: var(--neon-electric);
  font-size: 18px;
  cursor: pointer;
  transition: var(--transition-smooth);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(12px);
  z-index: 10;
}
.modal-nav:hover {
  background: var(--bg-glass-strong);
  border-color: var(--neon-electric);
  box-shadow: var(--glow-medium);
  transform: translateY(-50%) scale(1.1);
}
.modal-nav.prev { left: var(--spacing-lg); }
.modal-nav.next { right: var(--spacing-lg); }

/* ===== TOAST NOTIFICATION - COOL ===== */
.toast {
  position: fixed; bottom: 26px; right: 26px;
  background: var(--bg-glass-strong);
  border: 1px solid var(--neon-electric);
  color: var(--neon-electric);
  padding: 12px 22px;
  border-radius: var(--radius-md);
  font-weight: 600; font-size: 11px;
  z-index: 3000;
  display: flex; align-items: center; gap: 11px;
  box-shadow: var(--glow-medium);
  transform: translateX(200px);
  opacity: 0;
  transition: var(--transition-bloom);
  backdrop-filter: blur(16px);
  max-width: 360px;
}
.toast.show {
  transform: translateX(0);
  opacity: 1;
  animation: toastBloom 550ms var(--transition-bloom) forwards;
}
@keyframes toastBloom {
  0% { transform: translateX(200px) scale(0.88); opacity: 0; }
  50% { transform: translateX(-12px) scale(1.03); }
  100% { transform: translateX(0) scale(1); opacity: 1; }
}
.toast i {
  font-size: 16px;
  animation: iconPulse 2.4s ease-in-out infinite;
  text-shadow: 0 0 14px var(--neon-electric);
}
@keyframes iconPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.75; transform: scale(1.15); }
}

/* ===== PAGINATION ===== */
.pagination {
  display: flex; gap: 8px; justify-content: center;
  margin-top: var(--spacing-xl); padding: var(--spacing-md);
  animation: slideUp 500ms var(--transition-bloom) 650ms backwards;
}
.page-btn {
  width: 38px; height: 38px;
  background: var(--bg-surface);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  transition: var(--transition-smooth);
  display: flex; align-items: center; justify-content: center;
}
.page-btn:hover, .page-btn.active {
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.25), rgba(0, 212, 255, 0.18));
  border-color: var(--neon-electric);
  color: var(--neon-electric);
  box-shadow: var(--glow-soft);
  transform: translateY(-3px);
}
.page-btn:disabled {
  opacity: 0.4; cursor: not-allowed; transform: none;
}

/* ===== KEYBOARD HINT ===== */
.kb-hint {
  position: fixed; bottom: 26px; left: 26px;
  padding: 8px 14px;
  background: var(--bg-glass);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-sm);
  font-size: 10px; color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
  backdrop-filter: blur(10px);
  animation: hintPulse 4s ease-in-out infinite;
}
@keyframes hintPulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}
.kb-key {
  padding: 2px 7px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-glow);
  border-radius: 4px;
  color: var(--neon-electric);
  font-family: monospace;
  font-weight: 600;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track {
  background: var(--bg-deep);
  border-radius: 5px;
}
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue), var(--neon-purple));
  border-radius: 5px;
  border: 2px solid var(--bg-deep);
  box-shadow: 0 0 14px rgba(0, 245, 255, 0.55);
  transition: var(--transition-fast);
}
::-webkit-scrollbar-thumb:hover {
  box-shadow: 0 0 24px rgba(0, 245, 255, 0.85);
}

/* ===== SELECTION ===== */
::selection {
  background: rgba(0, 212, 255, 0.38);
  color: var(--text-primary);
  text-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  :root { --card-min-width: 280px; }
  .container { padding: var(--spacing-md) var(--spacing-sm); }
  .back-btn { left: var(--spacing-sm); top: var(--spacing-sm); padding: 8px 15px; font-size: 10px; }
  .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
  .card-media { height: 260px; }
  .card-title { font-size: 13px; min-height: 40px; }
  .action-btn { min-width: 68px; max-width: 84px; height: 42px; }
  .filter-section { gap: 9px; }
  .filter-chip { padding: 9px 17px; font-size: 10px; }
}

@media (max-width: 768px) {
  :root { --card-min-width: 100%; }
  .photo-grid { grid-template-columns: 1fr; }
  .photo-grid.list-view .photo-card {
    grid-template-columns: 1fr; grid-template-rows: auto auto;
  }
  .photo-grid.list-view .card-media {
    height: 240px; border-right: none; border-bottom: 1px solid rgba(0, 212, 255, 0.12);
  }
  .modal-nav { width: 42px; height: 42px; font-size: 16px; }
  .modal-nav.prev { left: 12px; }
  .modal-nav.next { right: 12px; }
  .kb-hint { display: none; }
  .toast { bottom: 18px; right: 18px; left: 18px; max-width: none; justify-content: center; }
}

@media (max-width: 480px) {
  .main-title { font-size: clamp(32px, 10vw, 48px); letter-spacing: 5px; }
  .sub-title { letter-spacing: 6px; font-size: 11px; }
  .section-header { font-size: 14px; }
  .card-media { height: 280px; }
  .card-actions { gap: 7px; }
  .action-btn { min-width: 62px; height: 40px; padding: 6px 4px; }
  .action-btn i { font-size: 14px; }
  .action-btn span { font-size: 8px; }
  .modal-footer { gap: 8px; }
  .pagination { gap: 6px; }
  .page-btn { width: 34px; height: 34px; font-size: 10px; }
}

/* ===== ACCESSIBILITY ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  html { scroll-behavior: auto; }
}

/* ===== PRINT ===== */
@media print {
  .bg-canvas, .grid-overlay, .particles, .lightning-overlay,
  .scanline, .noise, .vignette, .aurora, .back-btn,
  .search-bar, .filter-section, .tag-cloud, .stats-bar,
  .card-actions, .pagination, .toast, .kb-hint {
    display: none !important;
  }
  body { background: #fff; color: #000; }
  .photo-card { break-inside: avoid; border: 1px solid #ccc; box-shadow: none; }
  .card-media { height: 200px; }
}
</style>
</head>
<body>

<!-- Background System -->
<div class="bg-canvas"></div>
<div class="grid-overlay"></div>
<div class="noise"></div>
<div class="vignette"></div>
<div class="aurora"></div>
<div class="particles" id="particles"></div>
<div class="lightning-overlay">
  <div class="lightning-bolt"></div>
  <div class="lightning-bolt"></div>
  <div class="lightning-bolt"></div>
</div>
<div class="scanline"></div>

<!-- Back Button -->
<a href="index.html" class="back-btn" aria-label="Kembali ke halaman utama">
  <i class="fas fa-arrow-left"></i> Kembali
</a>

<div class="container">
  <!-- Header -->
  <header class="header">
    <h1 class="main-title">⚡ ULTIMATE GALERI</h1>
    <p class="sub-title">LINE TOGEL • Blue Neon Cyber 2026</p>
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </header>

  <!-- Search -->
  <div class="search-bar">
    <i class="fas fa-search search-icon"></i>
    <input type="search" class="search-input" id="searchInput" 
           placeholder="🔍 Cari foto, tag, atau judul..." 
           onkeyup="handleSearch()" aria-label="Cari galeri">
  </div>

  <!-- Filters -->
  <div class="filter-section">
    <button class="filter-chip active" onclick="applyFilter('all', this)">
      <i class="fas fa-th-large"></i> Semua
    </button>
    <button class="filter-chip" onclick="applyFilter('recent', this)">
      <i class="fas fa-clock"></i> Terbaru
    </button>
    <button class="filter-chip" onclick="applyFilter('popular', this)">
      <i class="fas fa-fire"></i> Populer
    </button>
    <button class="filter-chip" onclick="applyFilter('hd', this)">
      <i class="fas fa-star"></i> HD Quality
    </button>
  </div>

  <!-- Tags -->
  <div class="tag-cloud">
    <span class="tag" onclick="filterByTag('prediksi')">🔮 Prediksi</span>
    <span class="tag" onclick="filterByTag('result')">📊 Result</span>
    <span class="tag" onclick="filterByTag('event')">🎉 Event</span>
    <span class="tag" onclick="filterByTag('promo')">💎 Promo</span>
    <span class="tag" onclick="filterByTag('tutorial')">📚 Tutorial</span>
  </div>

  <!-- Gallery Section -->
  <section class="gallery-section">
    <div class="stats-bar">
      <span class="stats-count"><i class="fas fa-images"></i> <span id="photoCount">0</span> Foto</span>
      <div class="stats-view">
        <button class="view-btn active" onclick="setView('grid', this)" title="Grid View">
          <i class="fas fa-th"></i>
        </button>
        <button class="view-btn" onclick="setView('list', this)" title="List View">
          <i class="fas fa-list"></i>
        </button>
      </div>
    </div>

    <h2 class="section-header"><i class="fas fa-gem"></i> KOLEKSI PREMIUM</h2>
    
    <div class="loading-state" id="loading" aria-live="polite">
      <div class="spinner"></div>
      <div class="loading-text">⚡ MEMUAT GALERI NEON...</div>
    </div>
    
    <div class="photo-grid" id="galleryGrid" role="list"></div>
    
    <div class="scroll-loader" id="scrollLoader">
      <div class="spinner"></div>
    </div>
    
    <div class="pagination" id="pagination"></div>
  </section>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="imageModal" role="dialog" aria-modal="true">
  <button class="modal-nav prev" onclick="navigateModal(-1)" aria-label="Foto sebelumnya">
    <i class="fas fa-chevron-left"></i>
  </button>
  
  <div class="modal-container">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">
        <i class="fas fa-image"></i> <span>Detail Foto</span>
      </h3>
      <button class="modal-close" onclick="closeModal()" aria-label="Tutup modal">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-content">
      <img src="" alt="" id="modalImage" onclick="toggleZoom()">
      <div class="modal-info" id="modalInfo"></div>
    </div>
    <div class="modal-footer">
      <button class="action-btn copy" onclick="copyFromModal()" style="min-width:85px;max-width:105px">
        <i class="fas fa-copy"></i><span>Salin</span>
      </button>
      <button class="action-btn download" onclick="downloadFromModal()" style="min-width:85px;max-width:105px">
        <i class="fas fa-download"></i><span>Unduh</span>
      </button>
      <button class="action-btn share" onclick="sharePhoto()" style="min-width:85px;max-width:105px">
        <i class="fas fa-share-alt"></i><span>Bagikan</span>
      </button>
    </div>
  </div>
  
  <button class="modal-nav next" onclick="navigateModal(1)" aria-label="Foto berikutnya">
    <i class="fas fa-chevron-right"></i>
  </button>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="alert" aria-live="assertive">
  <i class="fas fa-bolt"></i>
  <span id="toastMsg">Ready!</span>
</div>

<!-- Keyboard Hint -->
<div class="kb-hint">
  <span class="kb-key">←</span>
  <span class="kb-key">→</span>
  <span>Navigasi</span>
  <span style="margin:0 8px">|</span>
  <span class="kb-key">Esc</span>
  <span>Tutup</span>
</div>

<script>
// ===== GLOBAL STATE =====
let allPhotos = [];
let displayedPhotos = [];
let currentPage = 1;
const itemsPerPage = 12;
let currentView = 'grid';
let currentModalIndex = 0;
let isZoomed = false;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  initParticles();
  loadGallery();
  setupKeyboardShortcuts();
  setupInfiniteScroll();
});

// ===== PARTICLE SYSTEM =====
function initParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  
  const types = ['blue', 'cyan', 'purple'];
  const count = 70;
  
  for(let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = `particle ${types[i % 3]}`;
    p.style.left = `${Math.random() * 100}%`;
    p.style.setProperty('--drift', `${(Math.random() - 0.5) * 120}px`);
    p.style.animationDelay = `${Math.random() * 40}s`;
    p.style.width = p.style.height = `${1.5 + Math.random() * 2}px`;
    container.appendChild(p);
  }
}

// ===== DATA LOADING =====
async function loadGallery() {
  const loading = document.getElementById('loading');
  const grid = document.getElementById('galleryGrid');
  
  loading.classList.add('active');
  
  try {
    const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
    const gid = '1246502038';
    
    // Try GVIZ API first
    try {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}&range=C2:D150`;
      const res = await fetch(url, { cache: 'no-store' });
      const txt = await res.text();
      const json = JSON.parse(txt.substring(47).slice(0, -2));
      
      allPhotos = json.table.rows
        .filter(row => row.c?.[0]?.v && row.c?.[1]?.v)
        .map((row, index) => ({
          title: row.c[0].v,
          url: row.c[1].v,
          id: index + 2,
          tags: getRandomTags(),
          views: Math.floor(Math.random() * 5000) + 100,
          date: new Date(Date.now() - Math.random() * 30 * 24 * 60 * 60 * 1000).toLocaleDateString('id-ID'),
          quality: Math.random() > 0.3 ? 'HD' : 'SD'
        }));
    } catch (e) {
      // Fallback to CSV
      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&range=C2:D150`;
      const csvText = await fetch(csvUrl).then(r => r.text());
      
      allPhotos = csvText.split('\n').slice(1).map((row, index) => {
        const [title, url] = row.split(',').map(c => c?.replace(/"/g, '').trim());
        return (title && url) ? {
          title, url, id: index + 2,
          tags: getRandomTags(),
          views: Math.floor(Math.random() * 5000) + 100,
          date: new Date().toLocaleDateString('id-ID'),
          quality: Math.random() > 0.3 ? 'HD' : 'SD'
        } : null;
      }).filter(Boolean);
    }
    
    displayedPhotos = [...allPhotos];
    document.getElementById('photoCount').textContent = allPhotos.length;
    renderPage(1);
    renderPagination();
    showToast(`⚡ ${allPhotos.length} foto dimuat`);
    
  } catch (error) {
    console.error('Load error:', error);
    showToast('❗ Gagal memuat galeri');
    grid.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-satellite-dish"></i>
        <h3>Koneksi Terputus</h3>
        <p>Periksa jaringan internet Anda atau coba refresh halaman</p>
      </div>
    `;
  }
  
  loading.classList.remove('active');
}

// Generate random tags for demo
function getRandomTags() {
  const tags = ['prediksi', 'result', 'event', 'promo', 'tutorial', 'jackpot', 'bonus', 'live'];
  const count = Math.floor(Math.random() * 3) + 1;
  const shuffled = [...tags].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, count);
}

// ===== RENDERING =====
function renderPage(page) {
  const grid = document.getElementById('galleryGrid');
  const start = (page - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pagePhotos = displayedPhotos.slice(start, end);
  
  if (pagePhotos.length === 0 && page === 1) {
    grid.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-search"></i>
        <h3>Tidak Ditemukan</h3>
        <p>Coba kata kunci lain atau hapus filter pencarian</p>
      </div>
    `;
    return;
  }
  
  if (page === 1) grid.innerHTML = '';
  
  pagePhotos.forEach((photo, idx) => {
    const card = createCard(photo, start + idx);
    card.style.setProperty('--idx', (start + idx) % 20);
    grid.appendChild(card);
  });
}

function createCard(photo, globalIndex) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.setAttribute('role', 'listitem');
  card.setAttribute('tabindex', '0');
  card.innerHTML = `
    <div class="card-media" onclick="openModal(${globalIndex})" onkeydown="if(event.key==='Enter')openModal(${globalIndex})">
      <img src="${photo.url}" alt="${photo.title}" 
           onerror="this.src='https://via.placeholder.com/400x300/0a1a2a/00f5ff?text=No+Image'"
           loading="lazy" decoding="async">
      <span class="zoom-hint"><i class="fas fa-search-plus"></i> Zoom</span>
    </div>
    <div class="card-body">
      <div class="card-title">${photo.title}</div>
      <div class="card-tags">
        ${photo.tags.map(t => `<span class="card-tag">#${t}</span>`).join('')}
        ${photo.quality === 'HD' ? '<span class="card-tag" style="border-color:var(--neon-success);color:var(--neon-success)">HD</span>' : ''}
      </div>
      <div class="card-meta">
        <span><i class="fas fa-eye"></i> ${photo.views.toLocaleString('id-ID')}</span>
        <span><i class="fas fa-calendar"></i> ${photo.date}</span>
      </div>
      <div class="card-actions">
        <button class="action-btn copy" onclick="copyPhoto('${photo.url}')" title="Salin ke clipboard">
          <i class="fas fa-copy"></i><span>Salin</span>
        </button>
        <button class="action-btn download" onclick="downloadPhoto('${photo.url}', '${photo.title}')" title="Download foto">
          <i class="fas fa-download"></i><span>Unduh</span>
        </button>
        <button class="action-btn share" onclick="sharePhoto('${photo.url}', '${photo.title}')" title="Bagikan">
          <i class="fas fa-share-alt"></i><span>Share</span>
        </button>
      </div>
    </div>
  `;
  return card;
}

// ===== FILTERING & SEARCH =====
function applyFilter(type, btn) {
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  switch(type) {
    case 'recent':
      displayedPhotos = [...allPhotos].sort((a,b) => new Date(b.date) - new Date(a.date));
      break;
    case 'popular':
      displayedPhotos = [...allPhotos].sort((a,b) => b.views - a.views);
      break;
    case 'hd':
      displayedPhotos = allPhotos.filter(p => p.quality === 'HD');
      break;
    default:
      displayedPhotos = [...allPhotos];
  }
  
  currentPage = 1;
  renderPage(1);
  renderPagination();
  showToast(`Menampilkan ${displayedPhotos.length} foto`);
}

function filterByTag(tag) {
  // Toggle active state
  document.querySelectorAll('.tag').forEach(t => {
    if(t.textContent.toLowerCase().includes(tag)) {
      t.classList.toggle('active');
    }
  });
  
  const activeTags = [...document.querySelectorAll('.tag.active')]
    .map(t => t.textContent.trim().replace('#','').toLowerCase());
  
  if(activeTags.length === 0) {
    displayedPhotos = [...allPhotos];
  } else {
    displayedPhotos = allPhotos.filter(p => 
      activeTags.some(t => p.tags.includes(t))
    );
  }
  
  currentPage = 1;
  renderPage(1);
  renderPagination();
  showToast(activeTags.length > 0 ? `Filter: ${activeTags.join(', ')}` : 'Semua foto');
}

function handleSearch() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  
  if(!term) {
    displayedPhotos = [...allPhotos];
  } else {
    displayedPhotos = allPhotos.filter(p => 
      p.title.toLowerCase().includes(term) ||
      p.tags.some(t => t.includes(term)) ||
      p.id.toString().includes(term)
    );
  }
  
  currentPage = 1;
  renderPage(1);
  renderPagination();
  
  if(displayedPhotos.length > 0) {
    showToast(`Ditemukan ${displayedPhotos.length} hasil`);
  }
}

// ===== VIEW TOGGLE =====
function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  const grid = document.getElementById('galleryGrid');
  grid.classList.toggle('list-view', view === 'list');
  
  // Re-render current page
  renderPage(currentPage);
  showToast(view === 'list' ? 'Tampilan list' : 'Tampilan grid');
}

// ===== PAGINATION =====
function renderPagination() {
  const pagination = document.getElementById('pagination');
  const totalPages = Math.ceil(displayedPhotos.length / itemsPerPage);
  
  if(totalPages <= 1) {
    pagination.innerHTML = '';
    return;
  }
  
  let html = '';
  
  // Prev button
  html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
    <i class="fas fa-chevron-left"></i>
  </button>`;
  
  // Page numbers
  const maxVisible = 5;
  let startPage = Math.max(1, currentPage - Math.floor(maxVisible/2));
  let endPage = Math.min(totalPages, startPage + maxVisible - 1);
  
  if(endPage - startPage < maxVisible - 1) {
    startPage = Math.max(1, endPage - maxVisible + 1);
  }
  
  if(startPage > 1) {
    html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
    if(startPage > 2) html += `<span style="color:var(--text-dim)">...</span>`;
  }
  
  for(let i = startPage; i <= endPage; i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
  }
  
  if(endPage < totalPages) {
    if(endPage < totalPages - 1) html += `<span style="color:var(--text-dim)">...</span>`;
    html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
  }
  
  // Next button
  html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
    <i class="fas fa-chevron-right"></i>
  </button>`;
  
  pagination.innerHTML = html;
}

function goToPage(page) {
  const totalPages = Math.ceil(displayedPhotos.length / itemsPerPage);
  if(page < 1 || page > totalPages) return;
  
  currentPage = page;
  renderPage(page);
  renderPagination();
  window.scrollTo({ top: document.querySelector('.gallery-section').offsetTop - 20, behavior: 'smooth' });
}

// ===== INFINITE SCROLL =====
function setupInfiniteScroll() {
  const loader = document.getElementById('scrollLoader');
  
  const observer = new IntersectionObserver((entries) => {
    if(entries[0].isIntersecting && displayedPhotos.length > itemsPerPage) {
      const totalPages = Math.ceil(displayedPhotos.length / itemsPerPage);
      if(currentPage < totalPages) {
        loader.classList.add('active');
        setTimeout(() => {
          currentPage++;
          renderPage(currentPage);
          renderPagination();
          loader.classList.remove('active');
        }, 600);
      }
    }
  }, { threshold: 0.1 });
  
  observer.observe(loader);
}

// ===== MODAL SYSTEM =====
function openModal(index) {
  currentModalIndex = index;
  const photo = displayedPhotos[index];
  
  document.getElementById('modalTitle').querySelector('span').textContent = photo.title;
  document.getElementById('modalImage').src = photo.url;
  document.getElementById('modalImage').alt = photo.title;
  
  // Info panel
  document.getElementById('modalInfo').innerHTML = `
    <div class="modal-info-row">
      <span class="modal-info-label">ID Foto</span>
      <span class="modal-info-value">#${photo.id}</span>
    </div>
    <div class="modal-info-row">
      <span class="modal-info-label">Dilihat</span>
      <span class="modal-info-value">${photo.views.toLocaleString('id-ID')} kali</span>
    </div>
    <div class="modal-info-row">
      <span class="modal-info-label">Tanggal</span>
      <span class="modal-info-value">${photo.date}</span>
    </div>
    <div class="modal-info-row">
      <span class="modal-info-label">Tags</span>
      <span class="modal-info-value">${photo.tags.map(t => '#'+t).join(' ')}</span>
    </div>
    <div class="modal-info-row">
      <span class="modal-info-label">Kualitas</span>
      <span class="modal-info-value" style="color:${photo.quality==='HD'?'var(--neon-success)':'var(--text-secondary)'}">${photo.quality}</span>
    </div>
  `;
  
  document.getElementById('imageModal').classList.add('active');
  document.body.style.overflow = 'hidden';
  isZoomed = false;
}

function closeModal() {
  document.getElementById('imageModal').classList.remove('active');
  document.body.style.overflow = '';
  isZoomed = false;
}

function toggleZoom() {
  const img = document.getElementById('modalImage');
  isZoomed = !isZoomed;
  img.classList.toggle('zoomed', isZoomed);
}

function navigateModal(direction) {
  const newIndex = currentModalIndex + direction;
  if(newIndex < 0 || newIndex >= displayedPhotos.length) return;
  
  currentModalIndex = newIndex;
  const photo = displayedPhotos[newIndex];
  
  // Smooth transition
  const img = document.getElementById('modalImage');
  img.style.opacity = '0';
  
  setTimeout(() => {
    document.getElementById('modalTitle').querySelector('span').textContent = photo.title;
    img.src = photo.url;
    img.alt = photo.title;
    img.style.opacity = '1';
    
    document.getElementById('modalInfo').innerHTML = `
      <div class="modal-info-row">
        <span class="modal-info-label">ID Foto</span>
        <span class="modal-info-value">#${photo.id}</span>
      </div>
      <div class="modal-info-row">
        <span class="modal-info-label">Dilihat</span>
        <span class="modal-info-value">${photo.views.toLocaleString('id-ID')} kali</span>
      </div>
      <div class="modal-info-row">
        <span class="modal-info-label">Tanggal</span>
        <span class="modal-info-value">${photo.date}</span>
      </div>
      <div class="modal-info-row">
        <span class="modal-info-label">Tags</span>
        <span class="modal-info-value">${photo.tags.map(t => '#'+t).join(' ')}</span>
      </div>
      <div class="modal-info-row">
        <span class="modal-info-label">Kualitas</span>
        <span class="modal-info-value" style="color:${photo.quality==='HD'?'var(--neon-success)':'var(--text-secondary)'}">${photo.quality}</span>
      </div>
    `;
  }, 150);
}

// ===== ACTIONS =====
async function copyPhoto(url) {
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    showToast('✅ Foto disalin ke clipboard!');
  } catch {
    showToast('❗ Klik kanan gambar > Copy Image');
  }
}

async function copyFromModal() {
  const photo = displayedPhotos[currentModalIndex];
  if(photo?.url) await copyPhoto(photo.url);
}

function downloadPhoto(url, filename) {
  const link = document.createElement('a');
  link.href = url;
  link.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${Date.now()}.jpg`;
  link.target = '_blank';
  link.rel = 'noopener';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('⚡ Download dimulai...');
}

function downloadFromModal() {
  const photo = displayedPhotos[currentModalIndex];
  if(photo?.url && photo?.title) {
    downloadPhoto(photo.url, photo.title);
  }
}

async function sharePhoto(url, title) {
  const photo = displayedPhotos[currentModalIndex];
  const shareUrl = photo?.url || url;
  const shareTitle = photo?.title || title || 'Foto LINE TOGEL';
  
  if(navigator.share) {
    try {
      await navigator.share({
        title: shareTitle,
        text: 'Lihat foto keren ini dari LINE TOGEL!',
        url: shareUrl
      });
      showToast('📤 Berhasil dibagikan!');
    } catch {
      copyPhoto(shareUrl);
    }
  } else {
    copyPhoto(shareUrl);
    showToast('📋 Link disalin (Web Share tidak didukung)');
  }
}

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3400);
}

// ===== KEYBOARD SHORTCUTS =====
function setupKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    // Modal navigation
    if(document.getElementById('imageModal').classList.contains('active')) {
      if(e.key === 'Escape') closeModal();
      if(e.key === 'ArrowLeft') navigateModal(-1);
      if(e.key === 'ArrowRight') navigateModal(1);
      if(e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleZoom(); }
      if(e.key === '+') toggleZoom();
      if(e.key === '-') { isZoomed = false; document.getElementById('modalImage').classList.remove('zoomed'); }
      return;
    }
    
    // Gallery navigation
    if(e.key === 'Escape') {
      document.getElementById('searchInput').blur();
    }
    if(e.ctrlKey && e.key === 'f') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  
  // Close modal on backdrop click
  document.getElementById('imageModal').addEventListener('click', (e) => {
    if(e.target.id === 'imageModal') closeModal();
  });
  
  // Prevent body scroll when modal open
  document.addEventListener('touchmove', (e) => {
    if(document.body.style.overflow === 'hidden') e.preventDefault();
  }, { passive: false });
}
</script>

</body>
</html>

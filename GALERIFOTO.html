    <script>
        // ============ GLOBAL VARIABLES ============
        let photos = [];
        let filteredPhotos = [];
        let currentPreview = null;
        
        // Editor State
        let canvas = null;
        let ctx = null;
        let canvasElements = [];
        let selectedElement = null;
        let currentTool = 'select';
        let isDragging = false;
        let isResizing = false;
        let dragOffset = { x: 0, y: 0 };
        let resizeHandle = null;
        let history = [];
        let historyIndex = -1;
        let isDrawing = false;
        let lastDrawPoint = null;
        let drawPath = [];
        
        // Filters state
        let currentFilters = {
            brightness: 100,
            contrast: 100,
            saturation: 100,
            hue: 0,
            sepia: 0,
            grayscale: 0
        };

        // Filter presets
        const filterPresets = [
            { name: 'Normal', filters: { brightness: 100, contrast: 100, saturation: 100, hue: 0, sepia: 0, grayscale: 0 }},
            { name: 'Vintage', filters: { brightness: 110, contrast: 90, saturation: 80, hue: 0, sepia: 30, grayscale: 0 }},
            { name: 'B&W', filters: { brightness: 100, contrast: 110, saturation: 0, hue: 0, sepia: 0, grayscale: 100 }},
            { name: 'Warm', filters: { brightness: 105, contrast: 100, saturation: 120, hue: 20, sepia: 10, grayscale: 0 }},
            { name: 'Cool', filters: { brightness: 100, contrast: 100, saturation: 110, hue: 200, sepia: 0, grayscale: 0 }},
            { name: 'Dramatic', filters: { brightness: 90, contrast: 150, saturation: 120, hue: 0, sepia: 0, grayscale: 0 }},
        ];

        // Stickers
        const stickers = ['★', '♥', '♦', '♠', '♣', '●', '■', '▲', '◆', '○', '□', '△', '☆', '♡', '♢', '☀', '☁', '☂', '⚡', '✿', '❀', '❁', '✦', '✧', '❖', '✶', '✷', '✸', '✹', '✺'];

        // ============ INITIALIZATION ============
        document.addEventListener('DOMContentLoaded', function() {
            initCanvas();
            loadGoogleSheetData();
            setupEventListeners();
            renderFilterPresets();
            renderStickers();
        });

        function initCanvas() {
            canvas = document.getElementById('mainCanvas');
            ctx = canvas.getContext('2d');
            clearCanvas();
            saveToHistory();
        }

        function clearCanvas() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // ============ GOOGLE SHEETS DATA LOADING ============
        async function loadGoogleSheetData() {
            const sheetId = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
            const gid = '1246502038';
            const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
            
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                parseCSVData(csvText);
                showToast('Data berhasil dimuat!');
            } catch (error) {
                console.error('Error loading data:', error);
                // Try alternative CORS proxy
                try {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(csvUrl)}`;
                    const response = await fetch(proxyUrl);
                    const csvText = await response.text();
                    parseCSVData(csvText);
                    showToast('Data berhasil dimuat!');
                } catch (e) {
                    console.error('Proxy also failed:', e);
                    document.getElementById('loadingState').innerHTML = `
                        <div class="text-center py-20">
                            <svg class="w-16 h-16 mx-auto mb-4" style="color: var(--neon-blue);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                            </svg>
                            <p style="color: var(--text-muted);">Gagal memuat data dari Google Sheets</p>
                            <button onclick="loadGoogleSheetData()" class="btn-neon mt-4 px-6 py-2 rounded-lg">Coba Lagi</button>
                        </div>
                    `;
                }
            }
        }

        function parseCSVData(csvText) {
            const lines = csvText.split('\n');
            photos = [];
            
            for (let i = 1; i < lines.length && i <= 110; i++) {
                const line = lines[i];
                if (!line.trim()) continue;
                
                // Parse CSV properly handling quoted fields
                const parsed = parseCSVLine(line);
                
                // Column C (index 2) = Title, Column D (index 3) = Image URL
                const title = parsed[2] ? parsed[2].trim() : '';
                const imageUrl = parsed[3] ? parsed[3].trim() : '';
                
                // Only add if both title and image URL exist
                if (title && imageUrl && isValidUrl(imageUrl)) {
                    photos.push({
                        id: i,
                        title: title,
                        url: imageUrl
                    });
                }
            }
            
            filteredPhotos = [...photos];
            renderPhotoGrid();
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('photoGrid').classList.remove('hidden');
            document.getElementById('totalCount').textContent = photos.length;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return string.startsWith('http') || string.startsWith('https');
            }
        }

        // ============ PHOTO GRID RENDERING ============
        function renderPhotoGrid() {
            const grid = document.getElementById('photoGrid');
            
            if (filteredPhotos.length === 0) {
                grid.classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }
            
            grid.classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            
            grid.innerHTML = filteredPhotos.map((photo, index) => `
                <div class="photo-card rounded-xl overflow-hidden cursor-pointer" 
                     onclick="openPreviewModal(${index})"
                     style="animation: fadeInUp 0.5s ease ${index * 0.05}s both;">
                    <div class="relative overflow-hidden">
                        <img src="${escapeHtml(photo.url)}" 
                             alt="${escapeHtml(photo.title)}" 
                             loading="lazy"
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22><rect fill=%22%23111d33%22 width=%22400%22 height=%22300%22/><text x=%22200%22 y=%22150%22 text-anchor=%22middle%22 fill=%22%236b8cae%22 font-size=%2216%22>Image not available</text></svg>'">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 hover:opacity-100 transition-opacity flex items-end p-3">
                            <span class="text-white text-sm font-medium truncate">${escapeHtml(photo.title)}</span>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-medium text-sm truncate" style="color: var(--text-primary);">${escapeHtml(photo.title)}</h3>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============ SEARCH FUNCTIONALITY ============
        function setupEventListeners() {
            const searchInput = document.getElementById('searchInput');
            let debounceTimer;
            
            searchInput.addEventListener('input', function(e) {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    filterPhotos(e.target.value);
                }, 300);
            });

            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    filterPhotos(e.target.value);
                }
            });

            // Canvas events
            canvas.addEventListener('mousedown', handleCanvasMouseDown);
            canvas.addEventListener('mousemove', handleCanvasMouseMove);
            canvas.addEventListener('mouseup', handleCanvasMouseUp);
            canvas.addEventListener('mouseleave', handleCanvasMouseUp);

            // Touch events for mobile
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd);

            // Canvas size change
            document.getElementById('canvasSizeSelect').addEventListener('change', function(e) {
                if (e.target.value === 'custom') {
                    const width = prompt('Width (px):', '1080');
                    const height = prompt('Height (px):', '1080');
                    if (width && height) {
                        resizeCanvas(parseInt(width), parseInt(height));
                    }
                } else {
                    const [w, h] = e.target.value.split('x').map(Number);
                    resizeCanvas(w, h);
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'z') {
                        e.preventDefault();
                        undoAction();
                    } else if (e.key === 'y') {
                        e.preventDefault();
                        redoAction();
                    } else if (e.key === 'c') {
                        e.preventDefault();
                        copyElement();
                    } else if (e.key === 'v') {
                        e.preventDefault();
                        pasteElement();
                    }
                } else if (e.key === 'Delete' || e.key === 'Backspace') {
                    if (selectedElement) {
                        deleteElement();
                    }
                }
            });
        }

        function filterPhotos(query) {
            const normalizedQuery = query.toLowerCase().trim();
            
            if (!normalizedQuery) {
                filteredPhotos = [...photos];
            } else {
                filteredPhotos = photos.filter(photo => 
                    photo.title.toLowerCase().includes(normalizedQuery)
                );
            }
            
            renderPhotoGrid();
        }

        // ============ WEB SEARCH ============
        function openWebSearchModal() {
            document.getElementById('webSearchModal').classList.remove('hidden');
            document.getElementById('webSearchQuery').value = document.getElementById('searchInput').value;
        }

        function closeWebSearchModal() {
            document.getElementById('webSearchModal').classList.add('hidden');
        }

        async function searchWebImages() {
            const query = document.getElementById('webSearchQuery').value.trim();
            if (!query) return;
            
            const resultsContainer = document.getElementById('webSearchResults');
            const loadingIndicator = document.getElementById('webSearchLoading');
            
            resultsContainer.innerHTML = '';
            loadingIndicator.classList.remove('hidden');
            
            // Using Unsplash Source for demo (free, no API key needed)
            const imageUrl = `https://source.unsplash.com/featured/?${encodeURIComponent(query)}`;
            
            // Generate placeholder results
            const mockResults = [];
            for (let i = 0; i < 12; i++) {
                mockResults.push({
                    id: i,
                    url: `https://source.unsplash.com/featured/400x300/?${encodeURIComponent(query)}&sig=${Date.now() + i}`,
                    title: `${query} image ${i + 1}`
                });
            }
            
            setTimeout(() => {
                loadingIndicator.classList.add('hidden');
                resultsContainer.innerHTML = mockResults.map((result, index) => `
                    <div class="photo-card rounded-xl overflow-hidden cursor-pointer" onclick="selectWebImage('${result.url}', '${escapeHtml(result.title)}')">
                        <img src="${result.url}" alt="${escapeHtml(result.title)}" loading="lazy" 
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22><rect fill=%22%23111d33%22 width=%22400%22 height=%22300%22/><text x=%22200%22 y=%22150%22 text-anchor=%22middle%22 fill=%22%236b8cae%22 font-size=%2216%22>Image not available</text></svg>'">
                        <div class="p-2">
                            <p class="text-xs truncate" style="color: var(--text-muted);">${escapeHtml(result.title)}</p>
                        </div>
                    </div>
                `).join('');
            }, 1000);
        }

        function selectWebImage(url, title) {
            currentPreview = { url, title };
            closeWebSearchModal();
            
            // Add to gallery
            photos.unshift({
                id: Date.now(),
                title: title,
                url: url
            });
            filteredPhotos = [...photos];
            renderPhotoGrid();
            document.getElementById('totalCount').textContent = photos.length;
            
            // Open preview
            openPreviewModal(0);
        }

        // ============ PREVIEW MODAL ============
        function openPreviewModal(index) {
            currentPreview = filteredPhotos[index];
            document.getElementById('previewImage').src = currentPreview.url;
            document.getElementById('previewTitle').textContent = currentPreview.title;
            document.getElementById('previewModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closePreviewModal() {
            document.getElementById('previewModal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        async function copyPhoto() {
            if (!currentPreview) return;
            
            try {
                const response = await fetch(currentPreview.url);
                const blob = await response.blob();
                
                await navigator.clipboard.write([
                    new ClipboardItem({ [blob.type]: blob })
                ]);
                
                showToast('Foto berhasil di-copy!');
            } catch (error) {
                console.error('Copy failed:', error);
                // Fallback: copy URL
                try {
                    await navigator.clipboard.writeText(currentPreview.url);
                    showToast('URL foto berhasil di-copy!');
                } catch (e) {
                    showToast('Gagal copy. Coba download saja.');
                }
            }
        }

        async function downloadPhoto() {
            if (!currentPreview) return;
            
            try {
                const response = await fetch(currentPreview.url);
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `${currentPreview.title}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showToast('Download dimulai!');
            } catch (error) {
                console.error('Download failed:', error);
                // Fallback: open in new tab
                window.open(currentPreview.url, '_blank');
            }
        }

        function addToEditor() {
            if (!currentPreview) return;
            
            closePreviewModal();
            openEditorModal();
            
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function() {
                addImageToCanvas(img, currentPreview.title);
            };
            img.onerror = function() {
                showToast('Gagal memuat gambar ke editor');
            };
            img.src = currentPreview.url;
        }

        // ============ EDITOR FUNCTIONS ============
        function openEditorModal() {
            document.getElementById('editorModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeEditorModal() {
            document.getElementById('editorModal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function selectTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tool === tool);
            });
            
            if (tool === 'draw') {
                canvas.style.cursor = 'crosshair';
            } else if (tool === 'eraser') {
                canvas.style.cursor = 'crosshair';
            } else if (tool === 'text') {
                canvas.style.cursor = 'text';
            } else {
                canvas.style.cursor = 'default';
            }
        }

        function switchEditorTab(tab) {
            document.querySelectorAll('.editor-tab').forEach(t => {
                t.classList.remove('active');
                t.style.borderBottom = 'none';
                t.style.color = 'var(--text-muted)';
            });
            
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            document.querySelector(`[data-tab="${tab}"]`).style.borderBottom = '2px solid var(--neon-blue)';
            document.querySelector(`[data-tab="${tab}"]`).style.color = 'var(--neon-blue)';
            
            document.getElementById('propertiesPanel').classList.toggle('hidden', tab !== 'properties');
            document.getElementById('layersPanel').classList.toggle('hidden', tab !== 'layers');
            document.getElementById('filtersPanel').classList.toggle('hidden', tab !== 'filters');
        }

        // ============ CANVAS ELEMENTS ============
        function addImageToCanvas(img, title) {
            const maxWidth = canvas.width * 0.8;
            const maxHeight = canvas.height * 0.8;
            let width = img.width;
            let height = img.height;
            
            if (width > maxWidth || height > maxHeight) {
                const ratio = Math.min(maxWidth / width, maxHeight / height);
                width *= ratio;
                height *= ratio;
            }
            
            const element = {
                id: Date.now(),
                type: 'image',
                img: img,
                title: title || 'Image',
                x: (canvas.width - width) / 2,
                y: (canvas.height - height) / 2,
                width: width,
                height: height,
                originalWidth: img.width,
                originalHeight: img.height,
                rotation: 0,
                opacity: 1,
                flipH: false,
                flipV: false,
                filters: { blur: 0, brightness: 100 }
            };
            
            canvasElements.push(element);
            selectedElement = element;
            redrawCanvas();
            updatePropertiesPanel();
            renderLayers();
            saveToHistory();
        }

        function addTextToCanvas(x, y) {
            const element = {
                id: Date.now(),
                type: 'text',
                text: 'Double click to edit',
                x: x || canvas.width / 2,
                y: y || canvas.height / 2,
                fontFamily: 'Arial',
                fontSize: 32,
                fontWeight: 'normal',
                color: '#000000',
                bgColor: 'transparent',
                opacity: 1
            };
            
            canvasElements.push(element);
            selectedElement = element;
            redrawCanvas();
            updatePropertiesPanel();
            renderLayers();
            saveToHistory();
        }

        function handleImageUpload(event) {
            const files = event.target.files;
            
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        addImageToCanvas(img, file.name);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
            
            event.target.value = '';
        }

        function redrawCanvas() {
            clearCanvas();
            
            canvasElements.forEach((el, index) => {
                ctx.save();
                ctx.globalAlpha = el.opacity || 1;
                
                if (el.type === 'image') {
                    const centerX = el.x + el.width / 2;
                    const centerY = el.y + el.height / 2;
                    
                    ctx.translate(centerX, centerY);
                    ctx.rotate((el.rotation || 0) * Math.PI / 180);
                    ctx.scale(el.flipH ? -1 : 1, el.flipV ? -1 : 1);
                    
                    // Apply filters
                    ctx.filter = `blur(${el.filters?.blur || 0}px) brightness(${el.filters?.brightness || 100}%)`;
                    
                    ctx.drawImage(el.img, -el.width / 2, -el.height / 2, el.width, el.height);
                    ctx.filter = 'none';
                    
                } else if (el.type === 'text') {
                    ctx.font = `${el.fontWeight} ${el.fontSize}px ${el.fontFamily}`;
                    ctx.fillStyle = el.color;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    if (el.bgColor && el.bgColor !== 'transparent') {
                        const metrics = ctx.measureText(el.text);
                        const padding = 10;
                        ctx.fillStyle = el.bgColor;
                        ctx.fillRect(
                            el.x - metrics.width / 2 - padding,
                            el.y - el.fontSize / 2 - padding,
                            metrics.width + padding * 2,
                            el.fontSize + padding * 2
                        );
                        ctx.fillStyle = el.color;
                    }
                    
                    ctx.fillText(el.text, el.x, el.y);
                    
                } else if (el.type === 'shape') {
                    ctx.fillStyle = el.color;
                    if (el.shape === 'rect') {
                        ctx.fillRect(el.x, el.y, el.width, el.height);
                    } else if (el.shape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(el.x + el.width / 2, el.y + el.height / 2, Math.min(el.width, el.height) / 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (el.type === 'drawing') {
                    if (el.points && el.points.length > 1) {
                        ctx.strokeStyle = el.color;
                        ctx.lineWidth = el.lineWidth || 2;
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        ctx.beginPath();
                        ctx.moveTo(el.points[0].x, el.points[0].y);
                        for (let i = 1; i < el.points.length; i++) {
                            ctx.lineTo(el.points[i].x, el.points[i].y);
                        }
                        ctx.stroke();
                    }
                }
                
                ctx.restore();
            });
            
            // Draw selection
            if (selectedElement) {
                ctx.save();
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                
                if (selectedElement.type === 'text') {
                    ctx.font = `${selectedElement.fontWeight} ${selectedElement.fontSize}px ${selectedElement.fontFamily}`;
                    const metrics = ctx.measureText(selectedElement.text);
                    const width = metrics.width + 20;
                    const height = selectedElement.fontSize + 20;
                    ctx.strokeRect(selectedElement.x - width / 2, selectedElement.y - height / 2, width, height);
                } else if (selectedElement.type === 'drawing') {
                    // Drawing selection handled by bounding box
                } else {
                    ctx.strokeRect(selectedElement.x, selectedElement.y, selectedElement.width, selectedElement.height);
                }
                
                ctx.restore();
            }
        }

        // ============ CANVAS INTERACTIONS ============
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        function findElementAt(x, y) {
            for (let i = canvasElements.length - 1; i >= 0; i--) {
                const el = canvasElements[i];
                if (el.type === 'text') {
                    ctx.font = `${el.fontWeight} ${el.fontSize}px ${el.fontFamily}`;
                    const metrics = ctx.measureText(el.text);
                    const width = metrics.width + 20;
                    const height = el.fontSize + 20;
                    if (x >= el.x - width / 2 && x <= el.x + width / 2 &&
                        y >= el.y - height / 2 && y <= el.y + height / 2) {
                        return el;
                    }
                } else if (el.type === 'drawing') {
                    // Check proximity to any point in the drawing
                    if (el.points) {
                        for (const point of el.points) {
                            if (Math.abs(x - point.x) < 20 && Math.abs(y - point.y) < 20) {
                                return el;
                            }
                        }
                    }
                } else {
                    if (x >= el.x && x <= el.x + el.width &&
                        y >= el.y && y <= el.y + el.height) {
                        return el;
                    }
                }
            }
            return null;
        }

        function handleCanvasMouseDown(e) {
            const coords = getCanvasCoords(e);
            
            if (currentTool === 'select') {
                const element = findElementAt(coords.x, coords.y);
                selectedElement = element;
                
                if (element) {
                    isDragging = true;
                    if (element.type === 'text') {
                        dragOffset.x = coords.x - element.x;
                        dragOffset.y = coords.y - element.y;
                    } else if (element.type === 'drawing') {
                        // Calculate bounding box center
                        if (element.points && element.points.length > 0) {
                            const bounds = getDrawingBounds(element);
                            dragOffset.x = coords.x - bounds.centerX;
                            dragOffset.y = coords.y - bounds.centerY;
                        }
                    } else {
                        dragOffset.x = coords.x - element.x;
                        dragOffset.y = coords.y - element.y;
                    }
                }
                
                updatePropertiesPanel();
                renderLayers();
                redrawCanvas();
                
            } else if (currentTool === 'text') {
                addTextToCanvas(coords.x, coords.y);
                selectTool('select');
                
            } else if (currentTool === 'draw') {
                isDrawing = true;
                drawPath = [{ x: coords.x, y: coords.y }];
                
            } else if (currentTool === 'eraser') {
                const element = findElementAt(coords.x, coords.y);
                if (element) {
                    canvasElements = canvasElements.filter(el => el.id !== element.id);
                    if (selectedElement === element) selectedElement = null;
                    redrawCanvas();
                    renderLayers();
                    saveToHistory();
                }
            } else if (currentTool === 'shape') {
                addShapeToCanvas(coords.x, coords.y);
                selectTool('select');
            }
        }

        function handleCanvasMouseMove(e) {
            const coords = getCanvasCoords(e);
            
            if (isDragging && selectedElement) {
                if (selectedElement.type === 'text') {
                    selectedElement.x = coords.x - dragOffset.x;
                    selectedElement.y = coords.y - dragOffset.y;
                } else if (selectedElement.type === 'drawing') {
                    const bounds = getDrawingBounds(selectedElement);
                    const dx = coords.x - dragOffset.x - bounds.centerX;
                    const dy = coords.y - dragOffset.y - bounds.centerY;
                    selectedElement.points.forEach(p => {
                        p.x += dx;
                        p.y += dy;
                    });
                } else {
                    selectedElement.x = coords.x - dragOffset.x;
                    selectedElement.y = coords.y - dragOffset.y;
                }
                redrawCanvas();
            }
            
            if (isDrawing) {
                drawPath.push({ x: coords.x, y: coords.y });
                
                // Draw in real-time
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.beginPath();
                if (drawPath.length > 1) {
                    ctx.moveTo(drawPath[drawPath.length - 2].x, drawPath[drawPath.length - 2].y);
                    ctx.lineTo(drawPath[drawPath.length - 1].x, drawPath[drawPath.length - 1].y);
                }
                ctx.stroke();
            }
        }

        function handleCanvasMouseUp(e) {
            if (isDragging) {
                isDragging = false;
                saveToHistory();
            }
            
            if (isDrawing && drawPath.length > 1) {
                isDrawing = false;
                
                const element = {
                    id: Date.now(),
                    type: 'drawing',
                    points: [...drawPath],
                    color: '#00d4ff',
                    lineWidth: 3,
                    opacity: 1
                };
                
                canvasElements.push(element);
                selectedElement = element;
                redrawCanvas();
                renderLayers();
                saveToHistory();
            }
            
            drawPath = [];
        }

        function getDrawingBounds(element) {
            if (!element.points || element.points.length === 0) return { minX: 0, maxX: 0, minY: 0, maxY: 0, centerX: 0, centerY: 0 };
            
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            element.points.forEach(p => {
                minX = Math.min(minX, p.x);
                maxX = Math.max(maxX, p.x);
                minY = Math.min(minY, p.y);
                maxY = Math.max(maxY, p.y);
            });
            
            return {
                minX, maxX, minY, maxY,
                centerX: (minX + maxX) / 2,
                centerY: (minY + maxY) / 2
            };
        }

        // Touch event handlers
        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            handleCanvasMouseDown({ clientX: touch.clientX, clientY: touch.clientY });
        }

        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            handleCanvasMouseMove({ clientX: touch.clientX, clientY: touch.clientY });
        }

        function handleTouchEnd(e) {
            handleCanvasMouseUp(e);
        }

        // ============ PROPERTIES PANEL ============
        function updatePropertiesPanel() {
            const noSelectionHint = document.getElementById('noSelectionHint');
            const textProperties = document.getElementById('textProperties');
            const imageProperties = document.getElementById('imageProperties');
            
            noSelectionHint.classList.toggle('hidden', selectedElement !== null);
            textProperties.classList.add('hidden');
            imageProperties.classList.add('hidden');
            
            if (!selectedElement) return;
            
            if (selectedElement.type === 'text') {
                textProperties.classList.remove('hidden');
                document.getElementById('textContent').value = selectedElement.text;
                document.getElementById('fontFamily').value = selectedElement.fontFamily;
                document.getElementById('fontSize').value = selectedElement.fontSize;
                document.getElementById('fontWeight').value = selectedElement.fontWeight;
                document.getElementById('textColor').value = selectedElement.color;
                document.getElementById('textBgColor').value = selectedElement.bgColor || 'transparent';
                document.getElementById('textOpacity').value = (selectedElement.opacity || 1) * 100;
                
            } else if (selectedElement.type === 'image') {
                imageProperties.classList.remove('hidden');
                document.getElementById('imageOpacity').value = (selectedElement.opacity || 1) * 100;
                document.getElementById('imageRotation').value = selectedElement.rotation || 0;
                document.getElementById('imageBlur').value = selectedElement.filters?.blur || 0;
                document.getElementById('imageBrightness').value = selectedElement.filters?.brightness || 100;
            }
        }

        function updateTextContent() {
            if (!selectedElement || selectedElement.type !== 'text') return;
            selectedElement.text = document.getElementById('textContent').value;
            redrawCanvas();
            renderLayers();
            saveToHistory();
        }

        function updateTextStyle() {
            if (!selectedElement || selectedElement.type !== 'text') return;
            selectedElement.fontFamily = document.getElementById('fontFamily').value;
            selectedElement.fontSize = parseInt(document.getElementById('fontSize').value);
            selectedElement.fontWeight = document.getElementById('fontWeight').value;
            selectedElement.color = document.getElementById('textColor').value;
            selectedElement.bgColor = document.getElementById('textBgColor').value;
            selectedElement.opacity = parseInt(document.getElementById('textOpacity').value) / 100;
            redrawCanvas();
            saveToHistory();
        }

        function updateImageStyle() {
            if (!selectedElement || selectedElement.type !== 'image') return;
            selectedElement.opacity = parseInt(document.getElementById('imageOpacity').value) / 100;
            selectedElement.rotation = parseInt(document.getElementById('imageRotation').value);
            selectedElement.filters = selectedElement.filters || {};
            selectedElement.filters.blur = parseInt(document.getElementById('imageBlur').value);
            selectedElement.filters.brightness = parseInt(document.getElementById('imageBrightness').value);
            redrawCanvas();
            saveToHistory();
        }

        function flipHorizontal() {
            if (!selectedElement || selectedElement.type !== 'image') return;
            selectedElement.flipH = !selectedElement.flipH;
            redrawCanvas();
            saveToHistory();
        }

        function flipVertical() {
            if (!selectedElement || selectedElement.type !== 'image') return;
            selectedElement.flipV = !selectedElement.flipV;
            redrawCanvas();
            saveToHistory();
        }

        function duplicateElement() {
            if (!selectedElement) return;
            
            const newElement = JSON.parse(JSON.stringify(selectedElement));
            newElement.id = Date.now();
            newElement.x += 20;
            newElement.y += 20;
            
            if (selectedElement.type === 'image' && selectedElement.img) {
                newElement.img = selectedElement.img;
            }
            
            canvasElements.push(newElement);
            selectedElement = newElement;
            redrawCanvas();
            renderLayers();
            updatePropertiesPanel();
            saveToHistory();
        }

        function deleteElement() {
            if (!selectedElement) return;
            canvasElements = canvasElements.filter(el => el.id !== selectedElement.id);
            selectedElement = null;
            redrawCanvas();
            renderLayers();
            updatePropertiesPanel();
            saveToHistory();
        }

        // ============ LAYERS ============
        function renderLayers() {
            const layersList = document.getElementById('layersList');
            
            layersList.innerHTML = canvasElements.slice().reverse().map((el, index) => `
                <div class="layer-item p-2 rounded-lg cursor-pointer flex items-center gap-3 ${selectedElement?.id === el.id ? 'active' : ''}"
                     onclick="selectLayer(${el.id})">
                    <div class="w-10 h-10 rounded flex items-center justify-center" style="background: rgba(0, 212, 255, 0.1);">
                        ${el.type === 'image' ? 
                            '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>' :
                            el.type === 'text' ?
                            '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>' :
                            el.type === 'drawing' ?
                            '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>' :
                            '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V5z"/></svg>'
                        }
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate">
                            ${el.type === 'text' ? el.text.substring(0, 15) + (el.text.length > 15 ? '...' : '') : 
                              el.title || el.type.charAt(0).toUpperCase() + el.type.slice(1)}
                        </p>
                        <p class="text-xs" style="color: var(--text-muted);">${el.type}</p>
                    </div>
                </div>
            `).join('');
        }

        function selectLayer(id) {
            selectedElement = canvasElements.find(el => el.id === id);
            renderLayers();
            updatePropertiesPanel();
            redrawCanvas();
        }

        function moveLayerUp() {
            if (!selectedElement) return;
            const index = canvasElements.findIndex(el => el.id === selectedElement.id);
            if (index < canvasElements.length - 1) {
                [canvasElements[index], canvasElements[index + 1]] = [canvasElements[index + 1], canvasElements[index]];
                renderLayers();
                redrawCanvas();
                saveToHistory();
            }
        }

        function moveLayerDown() {
            if (!selectedElement) return;
            const index = canvasElements.findIndex(el => el.id === selectedElement.id);
            if (index > 0) {
                [canvasElements[index], canvasElements[index - 1]] = [canvasElements[index - 1], canvasElements[index]];
                renderLayers();
                redrawCanvas();
                saveToHistory();
            }
        }

        // ============ FILTERS ============
        function renderFilterPresets() {
            const container = document.getElementById('filterPresets');
            container.innerHTML = filterPresets.map((preset, index) => `
                <button class="filter-preview flex flex-col items-center p-2" onclick="applyPreset(${index})">
                    <div class="w-12 h-12 rounded" style="background: linear-gradient(45deg, #00d4ff, #7b2dff); 
                        filter: ${getFilterString(preset.filters)};"></div>
                    <span class="text-xs mt-1">${preset.name}</span>
                </button>
            `).join('');
        }

        function getFilterString(filters) {
            return `brightness(${filters.brightness}%) contrast(${filters.contrast}%) saturate(${filters.saturation}%) hue-rotate(${filters.hue}deg) sepia(${filters.sepia}%) grayscale(${filters.grayscale}%)`;
        }

        function applyPreset(index) {
            const preset = filterPresets[index];
            document.getElementById('filterBrightness').value = preset.filters.brightness;
            document.getElementById('filterContrast').value = preset.filters.contrast;
            document.getElementById('filterSaturation').value = preset.filters.saturation;
            document.getElementById('filterHue').value = preset.filters.hue;
            document.getElementById('filterSepia').value = preset.filters.sepia;
            document.getElementById('filterGrayscale').value = preset.filters.grayscale;
            applyFilters();
        }

        function applyFilters() {
            currentFilters = {
                brightness: parseInt(document.getElementById('filterBrightness').value),
                contrast: parseInt(document.getElementById('filterContrast').value),
                saturation: parseInt(document.getElementById('filterSaturation').value),
                hue: parseInt(document.getElementById('filterHue').value),
                sepia: parseInt(document.getElementById('filterSepia').value),
                grayscale: parseInt(document.getElementById('filterGrayscale').value)
            };
            
            canvas.style.filter = getFilterString(currentFilters);
        }

        function resetFilters() {
            document.getElementById('filterBrightness').value = 100;
            document.getElementById('filterContrast').value = 100;
            document.getElementById('filterSaturation').value = 100;
            document.getElementById('filterHue').value = 0;
            document.getElementById('filterSepia').value = 0;
            document.getElementById('filterGrayscale').value = 0;
            applyFilters();
        }

        // ============ STICKERS ============
        function renderStickers() {
            const container = document.getElementById('stickerGrid');
            container.innerHTML = stickers.map(sticker => `
                <div class="sticker-item" onclick="addStickerToCanvas('${sticker}')">${sticker}</div>
            `).join('');
        }

        function addSticker() {
            document.getElementById('stickerModal').classList.remove('hidden');
        }

        function closeStickerModal() {
            document.getElementById('stickerModal').classList.add('hidden');
        }

        function addStickerToCanvas(sticker) {
            closeStickerModal();
            
            const element = {
                id: Date.now(),
                type: 'text',
                text: sticker,
                x: canvas.width / 2,
                y: canvas.height / 2,
                fontFamily: 'Arial',
                fontSize: 64,
                fontWeight: 'normal',
                color: '#00d4ff',
                bgColor: 'transparent',
                opacity: 1
            };
            
            canvasElements.push(element);
            selectedElement = element;
            redrawCanvas();
            renderLayers();
            updatePropertiesPanel();
            saveToHistory();
        }

        function addShapeToCanvas(x, y) {
            const shape = prompt('Enter shape (rect/circle):', 'rect');
            if (!shape) return;
            
            const element = {
                id: Date.now(),
                type: 'shape',
                shape: shape,
                x: x || canvas.width / 2 - 50,
                y: y || canvas.height / 2 - 50,
                width: 100,
                height: 100,
                color: '#00d4ff',
                opacity: 1
            };
            
            canvasElements.push(element);
            selectedElement = element;
            redrawCanvas();
            renderLayers();
            updatePropertiesPanel();
            saveToHistory();
        }

        // ============ HISTORY ============
        function saveToHistory() {
            history = history.slice(0, historyIndex + 1);
            history.push(JSON.stringify(canvasElements.map(el => {
                const copy = { ...el };
                if (copy.img) delete copy.img;
                return copy;
            })));
            historyIndex = history.length - 1;
            
            if (history.length > 50) {
                history.shift();
                historyIndex--;
            }
        }

        function undoAction() {
            if (historyIndex > 0) {
                historyIndex--;
                restoreFromHistory();
            }
        }

        function redoAction() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                restoreFromHistory();
            }
        }

        function restoreFromHistory() {
            const data = JSON.parse(history[historyIndex]);
            
            // Preserve image objects
            const imgMap = {};
            canvasElements.forEach(el => {
                if (el.type === 'image' && el.img) {
                    imgMap[el.id] = el.img;
                }
            });
            
            canvasElements = data.map(el => {
                if (el.type === 'image' && imgMap[el.id]) {
                    return { ...el, img: imgMap[el.id] };
                }
                return el;
            });
            
            selectedElement = null;
            redrawCanvas();
            renderLayers();
            updatePropertiesPanel();
        }

        // ============ CLIPBOARD ============
        let clipboard = null;

        function copyElement() {
            if (!selectedElement) return;
            clipboard = JSON.parse(JSON.stringify(selectedElement));
            showToast('Element copied!');
        }

        function pasteElement() {
            if (!clipboard) return;
            
            const newElement = { ...clipboard, id: Date.now(), x: clipboard.x + 20, y: clipboard.y + 20 };
            
            if (selectedElement?.type === 'image' && selectedElement.img) {
                newElement.img = selectedElement.img;
            }
            
            canvasElements.push(newElement);
            selectedElement = newElement;
            redrawCanvas();
            renderLayers();
            updatePropertiesPanel();
            saveToHistory();
            showToast('Element pasted!');
        }

        // ============ CANVAS RESIZE ============
        function resizeCanvas(width, height) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCanvas.getContext('2d').drawImage(canvas, 0, 0);
            
            canvas.width = width;
            canvas.height = height;
            
            redrawCanvas();
            saveToHistory();
            showToast(`Canvas resized to ${width}x${height}`);
        }

        // ============ EXPORT ============
        function exportCanvas() {
            // Create a temporary canvas for export
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width;
            exportCanvas.height = canvas.height;
            const exportCtx = exportCanvas.getContext('2d');
            
            // Draw background
            exportCtx.fillStyle = '#ffffff';
            exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
            
            // Apply global filters
            exportCtx.filter = getFilterString(currentFilters);
            
            // Draw all elements
            canvasElements.forEach(el => {
                exportCtx.save();
                exportCtx.globalAlpha = el.opacity || 1;
                
                if (el.type === 'image') {
                    const centerX = el.x + el.width / 2;
                    const centerY = el.y + el.height / 2;
                    
                    exportCtx.translate(centerX, centerY);
                    exportCtx.rotate((el.rotation || 0) * Math.PI / 180);
                    exportCtx.scale(el.flipH ? -1 : 1, el.flipV ? -1 : 1);
                    exportCtx.filter += ` blur(${el.filters?.blur || 0}px) brightness(${el.filters?.brightness || 100}%)`;
                    
                    exportCtx.drawImage(el.img, -el.width / 2, -el.height / 2, el.width, el.height);
                    
                } else if (el.type === 'text') {
                    exportCtx.font = `${el.fontWeight} ${el.fontSize}px ${el.fontFamily}`;
                    exportCtx.fillStyle = el.color;
                    exportCtx.textAlign = 'center';
                    exportCtx.textBaseline = 'middle';
                    
                    if (el.bgColor && el.bgColor !== 'transparent') {
                        const metrics = exportCtx.measureText(el.text);
                        const padding = 10;
                        exportCtx.fillStyle = el.bgColor;
                        exportCtx.fillRect(
                            el.x - metrics.width / 2 - padding,
                            el.y - el.fontSize / 2 - padding,
                            metrics.width + padding * 2,
                            el.fontSize + padding * 2
                        );
                        exportCtx.fillStyle = el.color;
                    }
                    
                    exportCtx.fillText(el.text, el.x, el.y);
                    
                } else if (el.type === 'shape') {
                    exportCtx.fillStyle = el.color;
                    if (el.shape === 'rect') {
                        exportCtx.fillRect(el.x, el.y, el.width, el.height);
                    } else if (el.shape === 'circle') {
                        exportCtx.beginPath();
                        exportCtx.arc(el.x + el.width / 2, el.y + el.height / 2, Math.min(el.width, el.height) / 2, 0, Math.PI * 2);
                        exportCtx.fill();
                    }
                } else if (el.type === 'drawing') {
                    if (el.points && el.points.length > 1) {
                        exportCtx.strokeStyle = el.color;
                        exportCtx.lineWidth = el.lineWidth || 2;
                        exportCtx.lineCap = 'round';
                        exportCtx.lineJoin = 'round';
                        exportCtx.beginPath();
                        exportCtx.moveTo(el.points[0].x, el.points[0].y);
                        for (let i = 1; i < el.points.length; i++) {
                            exportCtx.lineTo(el.points[i].x, el.points[i].y);
                        }
                        exportCtx.stroke();
                    }
                }
                
                exportCtx.restore();
            });
            
            // Download
            const link = document.createElement('a');
            link.download = `neon-design-${Date.now()}.png`;
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
            
            showToast('Design exported successfully!');
        }

        // ============ UTILITIES ============
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // ============ KEYBOARD SHORTCUTS FOR BUTTONS ============
        document.getElementById('webSearchBtn').addEventListener('click', openWebSearchModal);
        document.getElementById('openEditorBtn').addEventListener('click', openEditorModal);

        // Add animation keyframes dynamically
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00f5ff">
    <title>GALERI CYBER 2026 - LINE TOGEL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00f5ff;
            --neon-pink: #ff00aa;
            --neon-purple: #b72aff;
            --neon-gold: #ffd700;
            --neon-green: #00ff9d;
            --bg-deep: #030308;
            --bg-surface: rgba(10, 15, 35, 0.85);
            --bg-card: rgba(20, 25, 55, 0.6);
            --text-bright: #ffffff;
            --text-muted: #a0b3d6;
            --border-glow: rgba(0, 245, 255, 0.3);
            --glow-cyan: 0 0 20px rgba(0, 245, 255, 0.5), 0 0 40px rgba(0, 245, 255, 0.3);
            --glow-pink: 0 0 20px rgba(255, 0, 170, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-deep);
            color: var(--text-bright);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Advanced Background Effects */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -3;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 245, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 15%, rgba(255, 0, 170, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 85%, rgba(183, 42, 255, 0.08) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; filter: hue-rotate(0deg); }
            50% { opacity: 0.8; filter: hue-rotate(25deg); }
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 75%);
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--neon-cyan);
            border-radius: 50%;
            opacity: 0.6;
            animation: particleFloat 20s infinite ease-in-out;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .particle:nth-child(2n) {
            background: var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
            animation-delay: -5s;
            animation-duration: 25s;
        }

        .particle:nth-child(3n) {
            background: var(--neon-purple);
            box-shadow: 0 0 10px var(--neon-purple);
            animation-delay: -10s;
            animation-duration: 30s;
        }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .scanline {
            position: fixed;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            opacity: 0.7;
            animation: scanLine 8s linear infinite;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes scanLine {
            0% { top: -2px; opacity: 0; }
            5% { opacity: 0.7; }
            95% { opacity: 0.7; }
            100% { top: 100%; opacity: 0; }
        }

        /* Container */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 50px 30px;
            position: relative;
        }

        /* Header 2026 */
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: headerEntrance 1s ease-out;
        }

        @keyframes headerEntrance {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo-glow {
            position: absolute;
            inset: -20px;
            background: radial-gradient(ellipse, rgba(0, 245, 255, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: logoGlowPulse 3s ease-in-out infinite;
            filter: blur(20px);
        }

        @keyframes logoGlowPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); }
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(42px, 9vw, 72px);
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--neon-cyan) 0%, #ffffff 35%, var(--neon-pink) 70%, var(--neon-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 245, 255, 0.4);
            animation: titleShimmer 4s ease-in-out infinite;
        }

        @keyframes titleShimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .header-subtitle {
            font-size: 16px;
            color: var(--text-muted);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            background: rgba(0, 255, 157, 0.12);
            border: 1px solid rgba(0, 255, 157, 0.4);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: statusPulse 2.5s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 157, 0.25); }
            50% { box-shadow: 0 0 35px rgba(0, 255, 157, 0.5); }
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
            animation: dotBeat 1.5s ease-in-out infinite;
        }

        @keyframes dotBeat {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.7; }
        }

        /* Tabs 2026 */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--bg-surface);
            border: 1px solid var(--border-glow);
            padding: 14px 32px;
            border-radius: 12px;
            color: var(--text-muted);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(0, 245, 255, 0.2), transparent);
            transition: left 0.6s ease;
        }

        .tab-btn:hover::before {
            left: 100%;
        }

        .tab-btn.active {
            color: var(--neon-cyan);
            background: rgba(0, 245, 255, 0.15);
            border-color: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
            transform: translateY(-2px);
        }

        .tab-btn i {
            margin-right: 10px;
            font-size: 16px;
        }

        /* Search Section 2026 */
        .search-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            animation: fadeSlideUp 0.8s ease-out 0.2s backwards;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-input {
            width: 100%;
            padding: 18px 28px 18px 55px;
            background: var(--bg-surface);
            border: 1px solid var(--border-glow);
            border-radius: 50px;
            color: var(--text-bright);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.4s ease;
            backdrop-filter: blur(15px);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
            transform: translateY(-2px);
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-cyan);
            font-size: 18px;
            pointer-events: none;
        }

        .btn-search {
            padding: 18px 35px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            border: none;
            border-radius: 50px;
            color: #fff;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.4s;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(183, 42, 255, 0.4);
        }

        .btn-search:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(255, 0, 170, 0.6);
        }

        /* Stats 2026 */
        .stats-row {
            text-align: center;
            margin-bottom: 40px;
            font-size: 15px;
            color: var(--text-muted);
            padding: 15px 30px;
            background: var(--bg-surface);
            border-radius: 50px;
            display: inline-block;
            border: 1px solid var(--border-glow);
            backdrop-filter: blur(10px);
        }

        .stats-row span {
            color: var(--neon-gold);
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
        }

        /* Gallery Grid 2026 */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Card Style 2026 */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardPopIn 0.7s ease-out backwards;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--neon-cyan);
            box-shadow: var(--glow-cyan), 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        @keyframes cardPopIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card-media {
            position: relative;
            width: 100%;
            height: 240px;
            overflow: hidden;
            background: #000;
            cursor: pointer;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .card:hover .card-img {
            transform: scale(1.1);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 25px;
        }

        .card:hover .card-overlay {
            opacity: 1;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 18px;
        }

        .btn-icon:hover {
            background: var(--neon-cyan);
            color: var(--bg-deep);
            transform: scale(1.15) rotate(360deg);
            box-shadow: var(--glow-cyan);
        }

        .btn-icon.copy-btn {
            border-color: var(--neon-gold);
            color: var(--neon-gold);
            background: rgba(255, 215, 0, 0.1);
        }

        .btn-icon.copy-btn:hover {
            background: var(--neon-gold);
            color: var(--bg-deep);
        }

        .card-info {
            padding: 18px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            background: rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-bright);
            text-align: center;
            line-height: 1.5;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Loading State 2026 */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            grid-column: 1 / -1;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border-glow);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
            box-shadow: var(--glow-cyan);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            font-size: 14px;
            letter-spacing: 3px;
            animation: textPulse 2s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; text-shadow: 0 0 20px var(--neon-cyan); }
        }

        /* Toast Notification 2026 */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-surface);
            border: 2px solid var(--neon-cyan);
            border-radius: 50px;
            padding: 16px 32px;
            color: var(--text-bright);
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
            z-index: 2000;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--glow-cyan);
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(15px);
            letter-spacing: 1px;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast i {
            color: var(--neon-green);
            font-size: 20px;
            animation: iconPop 0.5s ease-out;
        }

        @keyframes iconPop {
            0% { transform: scale(0); }
            70% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-purple));
            border-radius: 5px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 30px 20px; }
            .gallery-grid { grid-template-columns: 1fr; }
            .search-wrapper { flex-direction: column; }
            .btn-search { width: 100%; justify-content: center; }
            .header-title { letter-spacing: 4px; }
        }
    </style>
</head>
<body>
    <div class="bg-canvas"></div>
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>
    <div class="scanline"></div>

    <div class="container">
        <header class="header">
            <div class="logo-wrapper">
                <div class="logo-glow"></div>
            </div>
            <h1 class="header-title">GALERI CYBER</h1>
            <p class="header-subtitle">LINE TOGEL ARCHIVE SYSTEM 2026</p>
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>SYSTEM ONLINE</span>
            </div>
        </header>

        <div class="tab-nav">
            <button class="tab-btn active" id="tabData" onclick="switchTab('data')">
                <i class="fas fa-database"></i> DATA INTERNAL
            </button>
            <button class="tab-btn" id="tabWeb" onclick="switchTab('web')">
                <i class="fas fa-globe"></i> CARI DI WEB
            </button>
        </div>

        <div class="search-wrapper">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Ketik kata kunci...">
            </div>
            <button class="btn-search" onclick="executeSearch()">
                <i class="fas fa-bolt"></i> CARI FOTO
            </button>
        </div>

        <div class="stats-row">
            <i class="fas fa-images" style="margin-right: 10px;"></i>
            Ditemukan <span id="totalItems">0</span> item
        </div>

        <div id="galleryGrid" class="gallery-grid">
            <div class="loader-container">
                <div class="spinner"></div>
                <p class="loader-text">INITIALIZING DATABASE...</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastText">Berhasil!</span>
    </div>

    <script>
        // Generate floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for(let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 20 + 's';
                p.style.animationDuration = (15 + Math.random() * 20) + 's';
                container.appendChild(p);
            }
        }

        // CONFIG
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        const GID = '1246502038';
        const QUERY = 'SELECT C, D WHERE D IS NOT NULL';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${encodeURIComponent(QUERY)}&gid=${GID}`;

        // STATE
        let currentMode = 'data';
        let cachedInternalData = [];
        const galleryGrid = document.getElementById('galleryGrid');
        const totalItems = document.getElementById('totalItems');
        const searchInput = document.getElementById('searchInput');

        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            loadInternalData();
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') executeSearch();
            });
            setTimeout(() => showToast('Welcome to GALERI CYBER 2026'), 2000);
        });

        // TAB SWITCHER
        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            if (mode === 'data') {
                document.getElementById('tabData').classList.add('active');
                searchInput.placeholder = "Cari di data internal...";
                renderGallery(cachedInternalData);
            } else {
                document.getElementById('tabWeb').classList.add('active');
                searchInput.placeholder = "Contoh: Nature, Cars, Cyberpunk...";
                galleryGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 80px;">
                        <i class="fas fa-globe" style="font-size: 64px; color: var(--neon-purple); margin-bottom: 25px; animation: float 3s ease-in-out infinite;"></i>
                        <h3 style="font-family: 'Orbitron'; font-size: 24px; margin-bottom: 15px; color: var(--neon-cyan);">WEB SEARCH MODE</h3>
                        <p style="color: var(--text-muted); font-size: 16px;">Ketik kata kunci di atas lalu tekan CARI FOTO.</p>
                    </div>
                `;
                totalItems.textContent = "0";
            }
        }

        // SEARCH EXECUTION
        function executeSearch() {
            const query = searchInput.value.trim();
            if (currentMode === 'web') {
                if (query) loadWebImages(query);
                else showToast("Masukkan kata kunci pencarian web");
            } else {
                filterInternal(query);
            }
        }

        // LOAD INTERNAL SHEET DATA
        async function loadInternalData() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const jsonString = text.substring(47).slice(0, -2);
                const json = JSON.parse(jsonString);
                const rows = json.table.rows;

                cachedInternalData = rows.map(row => {
                    let title = row.c[0] ? row.c[0].v : 'Tanpa Judul';
                    let url = row.c[1] ? row.c[1].v : null;
                    
                    if (url && url.includes("drive.google.com")) {
                        url = convertDriveLink(url);
                    }

                    return { title, url };
                }).filter(item => item.url);

                renderGallery(cachedInternalData);
            } catch (err) {
                console.error(err);
                galleryGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--neon-pink); padding: 60px; font-family: 'Orbitron';">
                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 20px;"></i>
                    <p>SYSTEM ERROR - DATABASE CONNECTION FAILED</p>
                </div>`;
            }
        }

        function convertDriveLink(url) {
            let id = null;
            const dMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            const idMatch = url.match(/open\?id=([a-zA-Z0-9_-]+)/);
            const viewMatch = url.match(/\/view\?.*id=([a-zA-Z0-9_-]+)/);

            if (dMatch) id = dMatch[1];
            else if (idMatch) id = idMatch[1];
            else if (viewMatch) id = viewMatch[1];
            
            return id ? `https://drive.google.com/uc?export=view&id=${id}` : url;
        }

        function filterInternal(query) {
            const q = query.toLowerCase();
            const filtered = cachedInternalData.filter(item => item.title.toLowerCase().includes(q));
            renderGallery(filtered);
        }

        // LOAD WEB IMAGES
        async function loadWebImages(query) {
            galleryGrid.innerHTML = `<div class="loader-container">
                <div class="spinner"></div>
                <p class="loader-text">SEARCHING: "${query}"...</p>
            </div>`;
            
            const images = [];
            for(let i = 0; i < 15; i++) {
                const rand = Math.floor(Math.random() * 1000);
                images.push({
                    title: `${query} - ${i+1}`,
                    url: `https://source.unsplash.com/600x400/?${encodeURIComponent(query)}&sig=${rand}`
                });
            }
            
            await new Promise(r => setTimeout(r, 800));
            renderGallery(images);
        }

        // RENDER GALLERY
        function renderGallery(items) {
            galleryGrid.innerHTML = '';
            totalItems.textContent = items.length;

            if (items.length === 0) {
                galleryGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 60px; font-family: 'Orbitron';">
                    <i class="fas fa-search" style="font-size: 48px; margin-bottom: 20px; opacity: 0.5;"></i>
                    <p>NO RESULTS FOUND</p>
                </div>`;
                return;
            }

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <div class="card-media">
                        <img src="${item.url}" alt="${item.title}" class="card-img" loading="lazy" onerror="this.onerror=null;this.src='https://via.placeholder.com/400x300/0a0f23/00f5ff?text=Image+Error';">
                        <div class="card-overlay">
                            <div class="btn-group">
                                <button class="btn-icon copy-btn" onclick="copyImage('${item.url}')" title="Salin Foto">
                                    <i class="fas fa-copy"></i>
                                </button>
                                <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="btn-icon" title="Buka Full Size">
                                    <i class="fas fa-external-link-alt"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="card-info">
                        <h3 class="card-title">${item.title}</h3>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // COPY FUNCTION
        async function copyImage(url) {
            try {
                showToast("Processing image...");
                
                const response = await fetch(url);
                const blob = await response.blob();
                
                await navigator.clipboard.write([
                    new ClipboardItem({ [blob.type]: blob })
                ]);
                
                showToast("Image copied to clipboard!");
                
            } catch (err) {
                console.error("Copy failed", err);
                try {
                    await navigator.clipboard.writeText(url);
                    showToast("Link copied instead!");
                } catch (e2) {
                    showToast("Copy failed. Try manual download.");
                }
            }
        }

        // TOAST HELPER
        function showToast(message) {
            const toast = document.getElementById('toast');
            const text = document.getElementById('toastText');
            text.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>

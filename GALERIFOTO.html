<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #0d1528;
            --bg-card: #111d33;
            --neon-blue: #00d4ff;
            --neon-blue-dim: #0099cc;
            --neon-purple: #7b2dff;
            --text-primary: #e8f4ff;
            --text-muted: #6b8cae;
            --border-glow: #00d4ff40;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-display {
            font-family: 'Orbitron', sans-serif;
        }

        /* Neon Background */
        .neon-bg {
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(123, 45, 255, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }

        /* Grid Pattern */
        .grid-pattern {
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Neon Glow Effects */
        .neon-glow {
            box-shadow: 
                0 0 5px var(--neon-blue),
                0 0 20px rgba(0, 212, 255, 0.3),
                inset 0 0 20px rgba(0, 212, 255, 0.05);
        }

        .neon-border {
            border: 1px solid var(--neon-blue);
            box-shadow: 
                0 0 10px rgba(0, 212, 255, 0.3),
                inset 0 0 10px rgba(0, 212, 255, 0.1);
        }

        .neon-text {
            text-shadow: 
                0 0 10px var(--neon-blue),
                0 0 20px rgba(0, 212, 255, 0.5),
                0 0 40px rgba(0, 212, 255, 0.3);
        }

        /* Buttons */
        .btn-neon {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2) 0%, rgba(0, 153, 204, 0.1) 100%);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            transition: all 0.3s ease;
        }

        .btn-neon:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.4) 0%, rgba(0, 153, 204, 0.2) 100%);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-neon:active {
            transform: translateY(0);
        }

        /* Photo Cards */
        .photo-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .photo-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.3),
                0 20px 40px rgba(0, 0, 0, 0.4);
            transform: translateY(-8px) scale(1.02);
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .photo-card:hover img {
            transform: scale(1.1);
        }

        /* Search Input */
        .search-input {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--border-glow);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* Modal */
        .modal-overlay {
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(10px);
        }

        /* Editor Canvas */
        .editor-canvas-container {
            background: 
                linear-gradient(45deg, #1a1a2e 25%, transparent 25%),
                linear-gradient(-45deg, #1a1a2e 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1a1a2e 75%),
                linear-gradient(-45deg, transparent 75%, #1a1a2e 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #0d0d1a;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-blue-dim);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-blue);
        }

        /* Animations */
        @keyframes pulse-neon {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes scan-line {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        .animate-pulse-neon {
            animation: pulse-neon 2s ease-in-out infinite;
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            animation: scan-line 8s linear infinite;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
        }

        /* Editor Styles */
        .layer-item {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .layer-item:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--border-glow);
        }

        .layer-item.active {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--neon-blue);
        }

        /* Tool Button */
        .tool-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid transparent;
            color: var(--text-muted);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .tool-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: var(--border-glow);
            color: var(--neon-blue);
        }

        .tool-btn.active {
            background: rgba(0, 212, 255, 0.3);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        /* Slider */
        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(0, 212, 255, 0.2);
            height: 4px;
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--neon-blue);
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* Color Picker */
        input[type="color"] {
            -webkit-appearance: none;
            width: 40px;
            height: 40px;
            border: 2px solid var(--border-glow);
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 2px;
        }

        input[type="color"]::-webkit-color-swatch {
            border-radius: 4px;
            border: none;
        }

        /* Loading Spinner */
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 212, 255, 0.1);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .editor-sidebar {
                position: fixed;
                left: -300px;
                top: 0;
                bottom: 0;
                z-index: 100;
                transition: left 0.3s ease;
            }

            .editor-sidebar.open {
                left: 0;
            }
        }

        /* Filter Preview */
        .filter-preview {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-preview:hover {
            border-color: var(--neon-blue);
        }

        .filter-preview.active {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        /* Sticker */
        .sticker-item {
            font-size: 28px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sticker-item:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: scale(1.1);
        }

        /* Reduce motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .scan-line {
                display: none;
            }
        }
    </style>
</head>
<body class="neon-bg grid-pattern">
    <!-- Scan Line Effect -->
    <div class="scan-line"></div>

    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-opacity-80" style="background: rgba(10, 10, 26, 0.9);">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between gap-4">
                <h1 class="font-display text-2xl md:text-3xl font-bold neon-text">
                    NEON GALLERY
                </h1>
                
                <div class="flex items-center gap-3 flex-1 max-w-xl">
                    <div class="relative flex-1">
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Cari foto di galeri atau web..."
                            class="search-input w-full px-4 py-3 pl-12 rounded-xl font-medium"
                        >
                        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-neon-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: var(--neon-blue);">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </div>
                    <button id="webSearchBtn" class="btn-neon px-4 py-3 rounded-xl font-semibold whitespace-nowrap">
                        Cari Web
                    </button>
                </div>

                <button id="openEditorBtn" class="btn-neon px-6 py-3 rounded-xl font-semibold flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                    <span class="hidden md:inline">Editor</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Stats -->
        <div class="flex items-center gap-6 mb-8 text-sm">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse-neon"></span>
                <span style="color: var(--text-muted);">Total Foto: <span id="totalCount" class="font-bold" style="color: var(--neon-blue);">0</span></span>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-400"></span>
                <span style="color: var(--text-muted);">Data Source: <span class="font-bold text-green-400">Google Sheets</span></span>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p style="color: var(--text-muted);">Memuat data dari Google Sheets...</p>
        </div>

        <!-- Photo Grid -->
        <div id="photoGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 hidden">
            <!-- Photos will be rendered here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <svg class="w-24 h-24 mx-auto mb-6" style="color: var(--text-muted);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <h3 class="text-xl font-semibold mb-2">Tidak ada foto ditemukan</h3>
            <p style="color: var(--text-muted);">Coba kata kunci lain atau cari di web</p>
        </div>
    </main>

    <!-- Photo Preview Modal -->
    <div id="previewModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-overlay absolute inset-0" onclick="closePreviewModal()"></div>
        <div class="relative z-10 flex items-center justify-center min-h-screen p-4">
            <div class="relative max-w-4xl w-full rounded-2xl overflow-hidden neon-border" style="background: var(--bg-card);">
                <button onclick="closePreviewModal()" class="absolute top-4 right-4 z-20 w-10 h-10 rounded-full flex items-center justify-center" style="background: rgba(0,0,0,0.5);">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
                
                <div class="p-4">
                    <img id="previewImage" src="" alt="" class="w-full max-h-[70vh] object-contain rounded-xl">
                </div>
                
                <div class="p-4 border-t" style="border-color: var(--border-glow);">
                    <h3 id="previewTitle" class="font-display text-lg mb-4 neon-text"></h3>
                    <div class="flex flex-wrap gap-3">
                        <button onclick="copyPhoto()" class="btn-neon px-4 py-2 rounded-lg flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                            </svg>
                            Copy Foto
                        </button>
                        <button onclick="downloadPhoto()" class="btn-neon px-4 py-2 rounded-lg flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                            </svg>
                            Download
                        </button>
                        <button onclick="addToEditor()" class="btn-neon px-4 py-2 rounded-lg flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                            </svg>
                            Tambah ke Editor
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Full Editor Modal -->
    <div id="editorModal" class="fixed inset-0 z-50 hidden">
        <div class="h-full flex flex-col" style="background: var(--bg-primary);">
            <!-- Editor Header -->
            <header class="flex items-center justify-between px-4 py-3 border-b" style="background: var(--bg-secondary); border-color: var(--border-glow);">
                <div class="flex items-center gap-4">
                    <button onclick="closeEditorModal()" class="tool-btn">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                    </button>
                    <h2 class="font-display text-xl neon-text">PHOTO EDITOR</h2>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2 px-3 py-2 rounded-lg" style="background: rgba(0, 212, 255, 0.1);">
                        <label class="text-sm" style="color: var(--text-muted);">Canvas:</label>
                        <select id="canvasSizeSelect" class="bg-transparent text-sm focus:outline-none" style="color: var(--neon-blue);">
                            <option value="1080x1080">1080 x 1080 (Square)</option>
                            <option value="1920x1080">1920 x 1080 (Landscape)</option>
                            <option value="1080x1920">1080 x 1920 (Portrait)</option>
                            <option value="1200x628">1200 x 628 (Facebook)</option>
                            <option value="1080x1350">1080 x 1350 (Instagram)</option>
                            <option value="custom">Custom</option>
                        </select>
                    </div>
                    
                    <button onclick="undoAction()" class="tool-btn" title="Undo">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                        </svg>
                    </button>
                    <button onclick="redoAction()" class="tool-btn" title="Redo">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6"/>
                        </svg>
                    </button>
                    
                    <button onclick="exportCanvas()" class="btn-neon px-4 py-2 rounded-lg font-semibold flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                        </svg>
                        Export
                    </button>
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden">
                <!-- Left Sidebar - Tools -->
                <aside class="w-16 flex flex-col items-center py-4 gap-2 border-r" style="background: var(--bg-secondary); border-color: var(--border-glow);">
                    <button class="tool-btn active" data-tool="select" onclick="selectTool('select')" title="Select">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="text" onclick="selectTool('text')" title="Text">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="shape" onclick="selectTool('shape')" title="Shapes">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V5z"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="draw" onclick="selectTool('draw')" title="Draw">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="eraser" onclick="selectTool('eraser')" title="Eraser">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    </button>
                    
                    <div class="w-8 h-px my-2" style="background: var(--border-glow);"></div>
                    
                    <button class="tool-btn" onclick="document.getElementById('imageUpload').click()" title="Upload Image">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                    </button>
                    <input type="file" id="imageUpload" accept="image/*" multiple hidden onchange="handleImageUpload(event)">
                    
                    <button class="tool-btn" onclick="addSticker()" title="Stickers">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </button>
                </aside>

                <!-- Canvas Area -->
                <div class="flex-1 flex items-center justify-center p-8 overflow-auto editor-canvas-container">
                    <div class="relative" id="canvasContainer">

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .dark .glass-effect {
            background: rgba(17, 24, 39, 0.7);
        }
        
        .image-card {
            transition: all 0.3s ease;
        }
        
        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        
        .image-container {
            position: relative;
            overflow: hidden;
        }
        
        .image-container img {
            transition: transform 0.3s ease;
        }
        
        .image-container:hover img {
            transform: scale(1.05);
        }
        
        .overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        
        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .copy-btn {
            transition: all 0.2s;
        }
        
        .copy-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 min-h-screen dark:from-gray-900 dark:via-gray-800 dark:to-gray-900">

    <!-- Header -->
    <header class="glass-effect sticky top-0 z-50 border-b border-white/20 dark:border-gray-700/30">
        <div class="container mx-auto px-4 py-4">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">
                        <i class="fas fa-images"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
                            Galeri Foto
                        </h1>
                        <p class="text-sm text-gray-600 dark:text-gray-400">Koleksi Foto Modern</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-3 w-full md:w-auto">
                    <button onclick="toggleDarkMode()" class="p-2 rounded-lg bg-white/50 dark:bg-gray-800/50 hover:bg-white dark:hover:bg-gray-700 transition">
                        <i class="fas fa-moon dark:hidden text-gray-700"></i>
                        <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Search Section -->
        <div class="max-w-2xl mx-auto mb-12">
            <div class="glass-effect rounded-2xl p-6 shadow-xl">
                <div class="flex flex-col gap-4">
                    <div class="relative">
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Cari foto dari Google Sheets..." 
                            class="search-input w-full px-6 py-4 rounded-xl border-2 border-transparent bg-white/80 dark:bg-gray-800/80 text-gray-800 dark:text-white placeholder-gray-400 focus:border-indigo-500 focus:outline-none transition"
                        >
                        <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    </div>
                    
                    <div class="flex gap-2">
                        <button 
                            onclick="searchWebImages()" 
                            class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-6 py-3 rounded-xl font-medium hover:shadow-lg hover:scale-[1.02] transition flex items-center justify-center gap-2"
                        >
                            <i class="fas fa-globe"></i>
                            Cari dari Web
                        </button>
                        <button 
                            onclick="loadFromSheet()" 
                            class="flex-1 bg-white dark:bg-gray-700 text-gray-700 dark:text-white px-6 py-3 rounded-xl font-medium hover:shadow-lg hover:scale-[1.02] transition flex items-center justify-center gap-2 border-2 border-gray-200 dark:border-gray-600"
                        >
                            <i class="fas fa-sync-alt"></i>
                            Refresh Data
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loading-spinner mb-4"></div>
            <p class="text-gray-600 dark:text-gray-400">Memuat foto...</p>
        </div>

        <!-- Images Grid -->
        <div id="imagesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Images will be loaded here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <div class="w-24 h-24 mx-auto mb-4 bg-gray-200 dark:bg-gray-700 rounded-full flex items-center justify-center">
                <i class="fas fa-image text-4xl text-gray-400"></i>
            </div>
            <h3 class="text-xl font-semibold text-gray-700 dark:text-gray-300 mb-2">Tidak ada foto ditemukan</h3>
            <p class="text-gray-500 dark:text-gray-400">Coba kata kunci pencarian lain</p>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div class="bg-gray-800 dark:bg-white text-white dark:text-gray-800 px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3">
            <i class="fas fa-check-circle text-green-400 dark:text-green-600"></i>
            <span id="toastMessage">Foto berhasil disalin!</span>
        </div>
    </div>

    <script>
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        const GID = '1246502038';
        let allImages = [];
        let currentImages = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadFromSheet();
            
            // Search input listener
            document.getElementById('searchInput').addEventListener('input', (e) => {
                filterImages(e.target.value);
            });
        });

        // Load data from Google Sheets
        async function loadFromSheet() {
            showLoading(true);
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;
                const response = await fetch(url);
                const text = await response.text();
                
                // Parse Google Sheets JSON response
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const rows = json.table.rows;
                
                allImages = [];
                
                rows.forEach((row, index) => {
                    if (index === 0) return; // Skip header
                    
                    const cells = row.c;
                    if (!cells) return;
                    
                    // Column C (index 2) = Title, Column D (index 3) = Image URL
                    const title = cells[2] ? cells[2].v : '';
                    const imageUrl = cells[3] ? cells[3].v : '';
                    
                    if (imageUrl && imageUrl.trim() !== '') {
                        allImages.push({
                            id: index,
                            title: title || 'Foto ' + index,
                            url: imageUrl,
                            source: 'sheet'
                        });
                    }
                });
                
                currentImages = [...allImages];
                displayImages(currentImages);
                
            } catch (error) {
                console.error('Error loading data:', error);
                showToast('Gagal memuat data dari Google Sheets', 'error');
            } finally {
                showLoading(false);
            }
        }

        // Search images from web (Unsplash API)
        async function searchWebImages() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showToast('Masukkan kata kunci pencarian', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                // Using Unsplash Source API for demo
                // In production, you should use Unsplash API with access key
                const searchTerms = query.split(' ').join(',');
                const webImages = [];
                
                // Generate multiple images based on search
                for (let i = 1; i <= 12; i++) {
                    webImages.push({
                        id: 'web-' + i,
                        title: query + ' ' + i,
                        url: `https://source.unsplash.com/800x600/?${searchTerms}&sig=${i}`,
                        source: 'web'
                    });
                }
                
                currentImages = webImages;
                displayImages(currentImages);
                showToast(`Ditemukan ${webImages.length} foto dari web`);
                
            } catch (error) {
                console.error('Error searching web:', error);
                showToast('Gagal mencari foto dari web', 'error');
            } finally {
                showLoading(false);
            }
        }

        // Filter images based on search
        function filterImages(query) {
            if (!query.trim()) {
                currentImages = [...allImages];
            } else {
                currentImages = allImages.filter(img => 
                    img.title.toLowerCase().includes(query.toLowerCase())
                );
            }
            displayImages(currentImages);
        }

        // Display images in grid
        function displayImages(images) {
            const grid = document.getElementById('imagesGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (images.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            grid.innerHTML = images.map((img, index) => `
                <div class="image-card glass-effect rounded-2xl overflow-hidden shadow-lg fade-in" style="animation-delay: ${index * 0.05}s">
                    <div class="image-container aspect-[4/3] bg-gray-200 dark:bg-gray-700">
                        <img 
                            src="${img.url}" 
                            alt="${img.title}"
                            class="w-full h-full object-cover"
                            onerror="this.src='https://via.placeholder.com/800x600?text=Foto+Tidak+Ditemukan'"
                            loading="lazy"
                        >
                        <div class="overlay absolute inset-0 opacity-0 hover:opacity-100 transition-opacity duration-300 flex items-end justify-between p-4">
                            <div class="text-white">
                                <p class="font-semibold">${img.title}</p>
                                <p class="text-sm opacity-80">${img.source === 'sheet' ? 'Dari Google Sheets' : 'Dari Web'}</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-4">
                        <h3 class="font-semibold text-gray-800 dark:text-white mb-3 line-clamp-1">${img.title}</h3>
                        
                        <div class="flex gap-2">
                            <button 
                                onclick="copyImage('${img.url}')"
                                class="copy-btn flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-4 py-2 rounded-lg font-medium hover:shadow-lg transition flex items-center justify-center gap-2"
                            >
                                <i class="fas fa-copy"></i>
                                Salin Foto
                            </button>
                            <a 
                                href="${img.url}" 
                                target="_blank"
                                class="px-4 py-2 rounded-lg font-medium bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-600 transition flex items-center justify-center"
                            >
                                <i class="fas fa-external-link-alt"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Copy image to clipboard
        async function copyImage(url) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                
                await navigator.clipboard.write([
                    new ClipboardItem({
                        [blob.type]: blob
                    })
                ]);
                
                showToast('Foto berhasil disalin ke clipboard!');
            } catch (error) {
                // Fallback: copy URL
                try {
                    await navigator.clipboard.writeText(url);
                    showToast('URL foto berhasil disalin!');
                } catch (e) {
                    showToast('Gagal menyalin foto', 'error');
                }
            }
        }

        // Show/hide loading
        function showLoading(show) {
            const loading = document.getElementById('loadingState');
            const grid = document.getElementById('imagesGrid');
            
            if (show) {
                loading.classList.remove('hidden');
                grid.classList.add('hidden');
            } else {
                loading.classList.add('hidden');
                grid.classList.remove('hidden');
            }
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            
            if (type === 'error') {
                toast.querySelector('i').className = 'fas fa-exclamation-circle text-red-400';
            } else {
                toast.querySelector('i').className = 'fas fa-check-circle text-green-400 dark:text-green-600';
            }
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Toggle dark mode
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }

        // Check for saved dark mode preference
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>

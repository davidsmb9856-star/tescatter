<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Foto - Google Sheets</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .bg-animation .circle:nth-child(1) { width: 400px; height: 400px; top: -100px; left: -100px; animation-delay: 0s; }
        .bg-animation .circle:nth-child(2) { width: 300px; height: 300px; top: 50%; right: -50px; animation-delay: 2s; }
        .bg-animation .circle:nth-child(3) { width: 250px; height: 250px; bottom: -50px; left: 30%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Header */
        .header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo i {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Search Box */
        .search-container {
            flex: 1;
            max-width: 600px;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 0.875rem 1.25rem;
            padding-left: 3rem;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .search-box::placeholder {
            color: var(--text-secondary);
        }

        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .search-btn {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4);
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .stat-item {
            text-align: right;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Section Title */
        .section-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title i {
            color: var(--primary);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px 10px 0 0;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab.active {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -0.5rem;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
        }

        .tab:hover:not(.active) {
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: var(--primary);
        }

        .card-image-container {
            position: relative;
            width: 100%;
            height: 280px;
            overflow: hidden;
            background: var(--bg-dark);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .card-image {
            transform: scale(1.05);
        }

        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.9), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            padding: 1.5rem;
        }

        .card:hover .card-overlay {
            opacity: 1;
        }

        .card-actions {
            display: flex;
            gap: 0.75rem;
            width: 100%;
        }

        .card-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-copy {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-copy:hover {
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        .btn-download {
            background: rgba(255,255,255,0.1);
            color: white;
            backdrop-filter: blur(10px);
        }

        .btn-download:hover {
            background: rgba(255,255,255,0.2);
        }

        .card-content {
            padding: 1.25rem;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .card-meta i {
            color: var(--primary);
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            gap: 1rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 1.125rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        .toast i {
            font-size: 1.25rem;
            color: var(--success);
        }

        .toast.error i {
            color: #ef4444;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 900px;
            width: 100%;
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        /* Web Search Results */
        .web-search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            max-height: 600px;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .web-image-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1;
        }

        .web-image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .web-image-card:hover img {
            transform: scale(1.1);
        }

        .web-image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .web-image-card:hover .web-image-overlay {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
            }

            .search-container {
                max-width: 100%;
                width: 100%;
            }

            .stats {
                width: 100%;
                justify-content: space-around;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 1rem;
            }

            .tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Filter Tags */
        .filter-tags {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-tag {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-tag:hover,
        .filter-tag.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Image Preview */
        .image-preview {
            max-height: 500px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-images"></i>
                <span>Gallery Foto</span>
            </div>
            
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-box" id="searchInput" placeholder="Cari foto berdasarkan judul...">
                <button class="search-btn" onclick="searchWeb()">
                    <i class="fas fa-globe"></i> Cari Web
                </button>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalImages">0</div>
                    <div class="stat-label">Total Foto</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('sheets')">
                <i class="fas fa-table"></i> Dari Google Sheets
            </button>
            <button class="tab" onclick="switchTab('web')">
                <i class="fas fa-globe"></i> Hasil Pencarian Web
            </button>
        </div>

        <!-- Filter Tags -->
        <div class="filter-tags" id="filterTags">
            <div class="filter-tag active" onclick="filterData('all')">Semua</div>
        </div>

        <!-- Google Sheets Content -->
        <div id="sheetsContent">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">Memuat data dari Google Sheets...</div>
            </div>
            <div class="grid" id="imageGrid"></div>
            <div class="empty-state" id="emptyState" style="display: none;">
                <i class="fas fa-inbox"></i>
                <h3>Tidak ada foto ditemukan</h3>
                <p>Coba ubah kata kunci pencarian Anda</p>
            </div>
        </div>

        <!-- Web Search Content -->
        <div id="webContent" style="display: none;">
            <div class="web-search-grid" id="webSearchGrid"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="imageModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Preview Foto</div>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <img src="" alt="" class="modal-image image-preview" id="modalImage">
                <div style="display: flex; gap: 1rem;">
                    <button class="card-btn btn-copy" onclick="copyModalImage()" style="flex: 1;">
                        <i class="fas fa-copy"></i> Salin Foto
                    </button>
                    <button class="card-btn btn-download" onclick="downloadModalImage()" style="flex: 1;">
                        <i class="fas fa-download"></i> Unduh
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Berhasil disalin!</span>
    </div>

    <script>
        // Global Variables
        let allData = [];
        let filteredData = [];
        let currentTab = 'sheets';
        let currentModalImage = '';

        // Google Sheets CSV URL
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/gviz/tq?tqx=out:csv&gid=1246502038';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            
            // Search input listener
            document.getElementById('searchInput').addEventListener('input', (e) => {
                filterImages(e.target.value);
            });

            // Enter key for web search
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && e.ctrlKey) {
                    searchWeb();
                }
            });
        });

        // Fetch Data from Google Sheets
        async function fetchData() {
            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                const data = parseCSV(csvText);
                
                allData = data.filter(row => row.judul && row.link && row.link.trim() !== '');
                filteredData = [...allData];
                
                updateFilterTags();
                renderImages(filteredData);
                updateStats();
                
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error('Error fetching data:', error);
                showToast('Gagal memuat data dari Google Sheets', 'error');
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Parse CSV
        function parseCSV(csv) {
            const lines = csv.split('\n');
            const result = [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const obj = {};
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                headers.forEach((header, index) => {
                    let value = currentline[index] ? currentline[index].trim() : '';
                    value = value.replace(/^"|"$/g, '');
                    obj[header.toLowerCase().replace(/\s+/g, '_')] = value;
                });
                
                result.push({
                    judul: obj.judul || '',
                    link: obj.link_gambar || ''
                });
            }
            
            return result;
        }

        // Render Images
        function renderImages(data) {
            const grid = document.getElementById('imageGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (data.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            grid.innerHTML = data.map((item, index) => `
                <div class="card" data-judul="${item.judul.toLowerCase()}">
                    <div class="card-image-container">
                        <img src="${item.link}" alt="${item.judul}" class="card-image" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300?text=Image+Not+Found'">
                        <div class="card-overlay">
                            <div class="card-actions">
                                <button class="card-btn btn-copy" onclick="copyImage('${item.link}', '${item.judul.replace(/'/g, "\\'")}')">
                                    <i class="fas fa-copy"></i> Salin
                                </button>
                                <button class="card-btn btn-download" onclick="downloadImage('${item.link}', '${item.judul}')">
                                    <i class="fas fa-download"></i> Unduh
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="card-title">${item.judul}</div>
                        <div class="card-meta">
                            <i class="fas fa-link"></i>
                            <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px;">${item.link}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Filter Images
        function filterImages(query) {
            const searchTerm = query.toLowerCase();
            filteredData = allData.filter(item => 
                item.judul.toLowerCase().includes(searchTerm)
            );
            renderImages(filteredData);
            updateStats();
        }

        // Filter by Tags
        function filterData(category) {
            // Update active tag
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (category === 'all') {
                filteredData = [...allData];
            } else {
                filteredData = allData.filter(item => 
                    item.judul.toLowerCase().includes(category.toLowerCase())
                );
            }
            
            renderImages(filteredData);
            updateStats();
        }

        // Update Filter Tags
        function updateFilterTags() {
            const tagsContainer = document.getElementById('filterTags');
            const categories = [...new Set(allData.map(item => {
                const words = item.judul.split(' ');
                return words.length > 1 ? words[0] : item.judul;
            }).filter((v, i, a) => a.indexOf(v) === i).slice(0, 10))];
            
            const tagsHtml = categories.map(cat => `
                <div class="filter-tag" onclick="filterData('${cat}')">${cat}</div>
            `).join('');
            
            tagsContainer.innerHTML = `<div class="filter-tag active" onclick="filterData('all')">Semua</div>` + tagsHtml;
        }

        // Search Web Images (using Unsplash API)
        async function searchWeb() {
            const query = document.getElementById('searchInput').value;
            if (!query) {
                showToast('Masukkan kata kunci pencarian', 'error');
                return;
            }
            
            switchTab('web');
            const grid = document.getElementById('webSearchGrid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">Mencari foto...</div></div>';
            
            try {
                // Using Unsplash Source (no API key needed for basic usage)
                const searchUrl = `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=20&client_id=Your_Client_ID`;
                
                // Fallback: Use Lorem Picsum or direct search
                const images = [];
                for (let i = 0; i < 20; i++) {
                    images.push({
                        id: i,
                        urls: {
                            regular: `https://picsum.photos/seed/${query}${i}/400/300`,
                            full: `https://picsum.photos/seed/${query}${i}/800/600`
                        },
                        description: `${query} ${i + 1}`
                    });
                }
                
                grid.innerHTML = images.map(img => `
                    <div class="web-image-card" onclick="copyWebImage('${img.urls.full}', '${img.description}')">
                        <img src="${img.urls.regular}" alt="${img.description}" loading="lazy">
                        <div class="web-image-overlay">
                            <button class="card-btn btn-copy" style="padding: 0.5rem; font-size: 0.875rem;">
                                <i class="fas fa-copy"></i> Salin
                            </button>
                        </div>
                    </div>
                `).join('');
                
                showToast(`Ditemukan ${images.length} foto`, 'success');
            } catch (error) {
                console.error('Error searching web:', error);
                showToast('Gagal mencari foto', 'error');
            }
        }

        // Switch Tab
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.tab').classList.add('active');
            
            if (tab === 'sheets') {
                document.getElementById('sheetsContent').style.display = 'block';
                document.getElementById('webContent').style.display = 'none';
            } else {
                document.getElementById('sheetsContent').style.display = 'none';
                document.getElementById('webContent').style.display = 'block';
            }
        }

        // Copy Image to Clipboard
        async function copyImage(url, title) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                
                // Create a clipboard item
                if (navigator.clipboard && navigator.clipboard.write) {
                    await navigator.clipboard.write([
                        new ClipboardItem({
                            [blob.type]: blob
                        })
                    ]);
                    showToast(`Foto "${title}" berhasil disalin!`, 'success');
                } else {
                    // Fallback: copy URL
                    await navigator.clipboard.writeText(url);
                    showToast('URL foto berhasil disalin!', 'success');
                }
            } catch (error) {
                console.error('Error copying image:', error);
                // Fallback: copy URL
                await navigator.clipboard.writeText(url);
                showToast('URL foto berhasil disalin!', 'success');
            }
        }

        // Copy Web Image
        async function copyWebImage(url, title) {
            await copyImage(url, title);
        }

        // Download Image
        async function downloadImage(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `${filename.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
                
                showToast('Foto berhasil diunduh!', 'success');
            } catch (error) {
                console.error('Error downloading image:', error);
                showToast('Gagal mengunduh foto', 'error');
            }
        }

        // Modal Functions
        function openModal(url, title) {
            currentModalImage = url;
            document.getElementById('modalImage').src = url;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('imageModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        async function copyModalImage() {
            await copyImage(currentModalImage, 'Foto');
        }

        async function downloadModalImage() {
            await downloadImage(currentModalImage, 'foto');
        }

        // Update Stats
        function updateStats() {
            document.getElementById('totalImages').textContent = filteredData.length;
        }

        // Toast Notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toast.className = 'toast ' + type;
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Close modal on outside click
        document.getElementById('imageModal').addEventListener('click', (e) => {
            if (e.target.id === 'imageModal') {
                closeModal();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>

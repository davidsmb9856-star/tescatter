<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0ff0fc">
    <title>GALERI CYBER - LINE TOGEL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent-primary: #0ff0fc;
            --accent-secondary: #ff3e6c;
            --accent-tertiary: #a855f7;
            --accent-gold: #fbbf24;
            --bg-deep: #050a14;
            --bg-surface: rgba(15, 23, 42, 0.6);
            --bg-card: rgba(21, 32, 54, 0.7);
            --text-bright: #f8fafc;
            --text-muted: #94a3b8;
            --border-subtle: rgba(15, 240, 252, 0.15);
            --glow-primary: rgba(15, 240, 252, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-deep);
            color: var(--text-bright);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Cyber Background Effects */
        .bg-cyber {
            position: fixed; inset: 0; z-index: -2;
            background: 
                radial-gradient(circle at 15% 50%, rgba(15, 240, 252, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.08), transparent 25%),
                linear-gradient(180deg, var(--bg-deep), #02040a);
        }
        
        .grid-overlay {
            position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(rgba(15, 240, 252, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(15, 240, 252, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Header */
        .main-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .header-title {
            font-family: 'Chakra Petch', sans-serif;
            font-size: clamp(40px, 10vw, 72px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--text-bright), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px var(--glow-primary);
            margin-bottom: 8px;
        }

        .header-sub {
            font-size: 14px;
            color: var(--accent-tertiary);
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Tabs Navigation */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-muted);
            padding: 12px 32px;
            border-radius: 30px;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .tab-btn.active {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            box-shadow: 0 0 15px var(--glow-primary);
        }

        .tab-btn:hover { border-color: var(--accent-primary); color: var(--text-bright); }
        .tab-btn.active::before { opacity: 0.1; }

        /* Search Section */
        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
            position: relative;
        }

        .search-box {
            display: flex;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 50px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .search-box:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px var(--glow-primary);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 24px;
            color: var(--text-bright);
            font-size: 15px;
            outline: none;
            font-family: 'Space Grotesk', sans-serif;
        }

        .search-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
            border: none;
            padding: 0 28px;
            color: var(--bg-deep);
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            filter: brightness(1.1);
            padding: 0 35px;
        }

        /* Gallery Grid - Masonry Style */
        .gallery-grid {
            column-count: 4;
            column-gap: 20px;
        }

        @media (max-width: 1200px) { .gallery-grid { column-count: 3; } }
        @media (max-width: 800px) { .gallery-grid { column-count: 2; } }
        @media (max-width: 500px) { .gallery-grid { column-count: 1; } }

        /* Gallery Card */
        .gallery-card {
            break-inside: avoid;
            margin-bottom: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4), 0 0 20px var(--glow-primary);
            border-color: var(--accent-primary);
        }

        .card-image {
            width: 100%;
            display: block;
            transition: transform 0.5s ease;
            background: #000;
        }

        .gallery-card:hover .card-image {
            transform: scale(1.05);
        }

        .card-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(5, 10, 20, 0.95), transparent);
            padding: 60px 16px 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .gallery-card:hover .card-overlay {
            opacity: 1;
        }

        .card-title {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 14px;
            color: var(--text-bright);
            margin-bottom: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .action-row {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            flex: 1;
            background: rgba(15, 240, 252, 0.15);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 8px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
        }

        .btn-action:hover {
            background: var(--accent-primary);
            color: var(--bg-deep);
            box-shadow: 0 0 15px var(--glow-primary);
        }

        .btn-action.open-btn {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: var(--text-bright);
        }
        .btn-action.open-btn:hover { background: white; color: black; }

        /* Status States */
        .loading-wrapper {
            text-align: center;
            padding: 100px 20px;
            grid-column: 1 / -1;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-text { color: var(--accent-secondary); margin-top: 20px; }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-surface);
            border: 1px solid var(--accent-primary);
            border-radius: 12px;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-bright);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 20px var(--glow-primary);
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast-icon { color: var(--accent-primary); font-size: 18px; }
        
        /* Back to Top */
        .back-to-top {
            position: fixed; bottom: 30px; right: 30px;
            width: 50px; height: 50px;
            background: var(--accent-secondary);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px; cursor: pointer;
            opacity: 0; visibility: hidden; transition: all 0.3s;
            z-index: 999; box-shadow: 0 0 20px rgba(255, 62, 108, 0.4);
        }
        .back-to-top.visible { opacity: 1; visibility: visible; }
        .back-to-top:hover { transform: translateY(-3px); }

    </style>
</head>
<body>
    <div class="bg-cyber"></div>
    <div class="grid-overlay"></div>

    <div class="container">
        <header class="main-header">
            <h1 class="header-title">GALERI FOTO</h1>
            <div class="header-sub">Cyber Archive System</div>
        </header>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('database')">
                <i class="fas fa-database"></i> Database
            </button>
            <button class="tab-btn" onclick="switchTab('web')">
                <i class="fas fa-globe"></i> Web Search
            </button>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Ketik judul atau kata kunci...">
                <button class="search-btn" onclick="handleSearch()">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <div id="galleryGrid" class="gallery-grid">
            <!-- Content Injected Here -->
            <div class="loading-wrapper">
                <div class="spinner"></div>
                <p>Memuat Database...</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-check-circle toast-icon"></i>
        <span id="toastText">Disalin!</span>
    </div>

    <div id="backToTop" class="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">
        <i class="fas fa-chevron-up"></i>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        const GID = '1246502038';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=SELECT%20C%2C%20D%20WHERE%20D%20IS%20NOT%20NULL&gid=${GID}`;
        
        let allData = [];
        let currentTab = 'database'; // 'database' or 'web'

        // --- DOM ELEMENTS ---
        const galleryGrid = document.getElementById('galleryGrid');
        const searchInput = document.getElementById('searchInput');
        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toastText');
        const backToTopBtn = document.getElementById('backToTop');

        // --- CORE FUNCTIONS ---

        // 1. Fetch Data from Google Sheet
        async function fetchDatabase() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const jsonString = text.substring(47).slice(0, -2);
                const json = JSON.parse(jsonString);
                
                allData = json.table.rows.map(row => ({
                    title: row.c[0] ? row.c[0].v : 'Untitled',
                    url: row.c[1] ? row.c[1].v : null
                })).filter(item => item.url);

                renderGallery(allData);
            } catch (e) {
                console.error(e);
                galleryGrid.innerHTML = `<div class="loading-wrapper"><p class="error-text">Gagal memuat data. Cek koneksi atau Sheet.</p></div>`;
            }
        }

        // 2. Render Gallery
        function renderGallery(items) {
            galleryGrid.innerHTML = '';
            if (items.length === 0) {
                galleryGrid.innerHTML = `<div class="loading-wrapper"><p>Tidak ada hasil ditemukan.</p></div>`;
                return;
            }

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'gallery-card';
                
                // Use Google Image Proxy for better loading on external links if needed, 
                // or just direct URL. Let's use direct.
                const imgSrc = item.url;
                const title = item.title;

                card.innerHTML = `
                    <img src="${imgSrc}" alt="${title}" class="card-image" loading="lazy" onerror="this.onerror=null;this.src='https://via.placeholder.com/400x300/0f172a/0ff0fc?text=Error';">
                    <div class="card-overlay">
                        <div class="card-title">${title}</div>
                        <div class="action-row">
                            <button class="btn-action" onclick="copyImage('${imgSrc}')" title="Salin Gambar">
                                <i class="fas fa-copy"></i> Copy
                            </button>
                            <a href="${imgSrc}" target="_blank" class="btn-action open-btn" title="Buka Asli">
                                <i class="fas fa-external-link-alt"></i>
                            </a>
                        </div>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // 3. Copy Image Function (The "Magic" Part)
        async function copyImage(url) {
            try {
                showToast('Mempersiapkan gambar...', 'info');
                
                // Fetch the image as blob
                const response = await fetch(url);
                const blob = await response.blob();
                
                // Write to clipboard
                await navigator.clipboard.write([
                    new ClipboardItem({ [blob.type]: blob })
                ]);
                
                showToast('Gambar berhasil disalin!', 'success');
            } catch (err) {
                console.error('Failed to copy image: ', err);
                // Fallback: Try copying URL or open
                try {
                    await navigator.clipboard.writeText(url);
                    showToast('Gagal copy gambar (CORS), Link disalin!', 'warning');
                } catch (e) {
                    showToast('Gagal menyalin (Browser tidak mendukung)', 'error');
                }
            }
        }

        // 4. Web Search Function (Simulated with Unsplash Source for free/demo usage)
        function handleSearch() {
            const query = searchInput.value.trim().toLowerCase();
            
            if (currentTab === 'database') {
                const filtered = allData.filter(item => item.title.toLowerCase().includes(query));
                renderGallery(filtered);
            } else {
                // Web Search Logic
                if (!query) {
                    loadRandomWebImages();
                    return;
                }
                
                galleryGrid.innerHTML = `<div class="loading-wrapper"><div class="spinner"></div><p>Mencari di web...</p></div>`;
                
                // Simulate search with Unsplash Source (Free, No API Key needed for basic display)
                // Note: Unsplash Source is deprecated but works for demo.
                // For production, use Unsplash API with Key.
                let images = [];
                const count = 12;
                for(let i=0; i<count; i++) {
                    images.push({
                        title: `${query} - Result ${i+1}`,
                        url: `https://source.unsplash.com/600x800/?${encodeURIComponent(query)}&sig=${Date.now() + i}`
                    });
                }
                renderGallery(images);
            }
        }

        // 5. Tab Switching
        function switchTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.tab-btn').classList.add('active');
            
            searchInput.value = ''; // Clear search
            
            if (tabName === 'database') {
                searchInput.placeholder = "Cari judul di database...";
                renderGallery(allData);
            } else {
                searchInput.placeholder = "Cari gambar di internet...";
                loadRandomWebImages();
            }
        }

        function loadRandomWebImages() {
            galleryGrid.innerHTML = `<div class="loading-wrapper"><div class="spinner"></div><p>Memuat gambar populer...</p></div>`;
            const keywords = ['nature', 'technology', 'city', 'abstract', 'neon'];
            const randomKeyword = keywords[Math.floor(Math.random() * keywords.length)];
            
            let images = [];
            for(let i=0; i<12; i++) {
                images.push({
                    title: `Inspiration ${i+1}`,
                    url: `https://source.unsplash.com/random/600x800/?${randomKeyword}&sig=${Date.now() + i}`
                });
            }
            renderGallery(images);
        }

        // 6. Utilities
        function showToast(message, type = 'success') {
            toastText.textContent = message;
            const icon = toast.querySelector('.toast-icon');
            
            if(type === 'success') {
                icon.className = 'fas fa-check-circle toast-icon';
                toast.style.borderColor = 'var(--accent-primary)';
            } else if(type === 'info') {
                icon.className = 'fas fa-info-circle toast-icon';
                toast.style.borderColor = 'var(--accent-tertiary)';
            } else {
                icon.className = 'fas fa-exclamation-triangle toast-icon';
                toast.style.borderColor = 'var(--accent-gold)';
            }

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Back to Top Listener
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) backToTopBtn.classList.add('visible');
            else backToTopBtn.classList.remove('visible');
        });

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', fetchDatabase);
        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') handleSearch();
            else if (currentTab === 'database' && searchInput.value === '') renderGallery(allData);
        });

    </script>
</body>
</html>

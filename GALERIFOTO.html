<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALERI FOTO - CYBER ARCHIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent-primary: #0ff0fc; --accent-secondary: #ff3e6c; --accent-tertiary: #a855f7;
            --accent-gold: #fbbf24; --bg-deep: #030712; --bg-surface: rgba(15, 23, 42, 0.6);
            --bg-card: rgba(30, 41, 59, 0.5); --text-bright: #f8fafc; --text-muted: #94a3b8;
            --border-subtle: rgba(15, 240, 252, 0.15); --glow-primary: rgba(15, 240, 252, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-deep);
            color: var(--text-bright);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Effects */
        .bg-mesh {
            position: fixed; inset: 0; z-index: -2;
            background: radial-gradient(ellipse 80% 50% at 20% 40%, rgba(15, 240, 252, 0.08), transparent 50%),
                        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(168, 85, 247, 0.06), transparent 50%);
        }
        .grid-lines {
            position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(rgba(15, 240, 252, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(15, 240, 252, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 20%, transparent 70%);
        }

        /* Layout */
        .container { max-width: 1500px; margin: 0 auto; padding: 40px 24px; position: relative; }

        /* Header */
        .header { text-align: center; margin-bottom: 50px; animation: fadeSlideDown 0.8s ease-out; }
        @keyframes fadeSlideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        
        .header-title {
            font-family: 'Chakra Petch', sans-serif; font-size: clamp(36px, 8vw, 64px);
            font-weight: 700; letter-spacing: 3px; margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent-primary), #fff, var(--accent-secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(15, 240, 252, 0.3);
        }
        .header-subtitle { font-size: 14px; color: var(--text-muted); letter-spacing: 4px; text-transform: uppercase; }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: transparent; border: 1px solid var(--border-subtle);
            padding: 12px 30px; border-radius: 8px; color: var(--text-muted);
            font-family: 'Chakra Petch', sans-serif; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; letter-spacing: 1px;
            position: relative; overflow: hidden;
        }
        .tab-btn::before {
            content: ''; position: absolute; inset: 0; background: linear-gradient(45deg, transparent, rgba(15, 240, 252, 0.1), transparent);
            transform: translateX(-100%); transition: transform 0.5s;
        }
        .tab-btn:hover::before { transform: translateX(100%); }
        .tab-btn.active {
            background: rgba(15, 240, 252, 0.1); color: var(--accent-primary);
            border-color: var(--accent-primary); box-shadow: 0 0 15px var(--glow-primary);
        }

        /* Search Section */
        .search-container {
            display: flex; justify-content: center; gap: 16px; margin-bottom: 40px;
            flex-wrap: wrap; animation: fadeSlideUp 0.8s ease-out 0.2s backwards;
        }
        .search-box {
            position: relative; width: 100%; max-width: 600px;
        }
        .search-input {
            width: 100%; padding: 18px 24px 18px 50px;
            background: var(--bg-surface); border: 1px solid var(--border-subtle);
            border-radius: 12px; color: var(--text-bright);
            font-family: 'Space Grotesk', sans-serif; font-size: 15px;
            transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        .search-input:focus {
            outline: none; border-color: var(--accent-primary);
            box-shadow: 0 0 20px var(--glow-primary);
        }
        .search-icon {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            color: var(--accent-primary); font-size: 18px; pointer-events: none;
        }
        .btn-search-action {
            padding: 0 24px; background: linear-gradient(135deg, var(--accent-tertiary), var(--accent-primary));
            border: none; border-radius: 12px; color: #000; font-weight: 700; font-family: 'Chakra Petch', sans-serif;
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-search-action:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(168, 85, 247, 0.4); }

        /* Gallery Grid */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        /* Gallery Card */
        .gallery-card {
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: 16px; overflow: hidden; position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardPopIn 0.6s ease-out backwards; display: flex; flex-direction: column;
        }
        .gallery-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px var(--glow-primary);
        }
        @keyframes cardPopIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .card-image-wrapper {
            position: relative; width: 100%; height: 220px;
            overflow: hidden; background: #000;
        }
        .card-image {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease; cursor: pointer;
        }
        .gallery-card:hover .card-image { transform: scale(1.05); }

        /* Actions Overlay */
        .card-actions {
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(3, 7, 18, 0.9) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.3s ease;
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px;
        }
        .gallery-card:hover .card-actions { opacity: 1; }

        .action-group { display: flex; gap: 12px; }

        .btn-action {
            width: 46px; height: 46px; border-radius: 50%;
            background: rgba(15, 240, 252, 0.15); border: 1px solid var(--accent-primary);
            color: var(--accent-primary); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(4px); font-size: 18px;
        }
        .btn-action:hover {
            background: var(--accent-primary); color: var(--bg-deep);
            transform: scale(1.1); box-shadow: 0 0 20px var(--glow-primary);
        }
        .btn-action.copy-photo { border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(251, 191, 36, 0.15); }
        .btn-action.copy-photo:hover { background: var(--accent-gold); color: var(--bg-deep); }

        .card-info { padding: 16px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-title {
            font-family: 'Chakra Petch', sans-serif; font-size: 15px; font-weight: 600;
            color: var(--text-bright); text-align: center; line-height: 1.4;
            overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }

        /* Stats & Count */
        .stats-bar {
            text-align: center; margin-bottom: 24px; color: var(--text-muted); font-size: 13px;
        }
        .stats-count { color: var(--accent-primary); font-weight: 700; }

        /* Loading State */
        .loading-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 100px 20px; grid-column: 1 / -1;
        }
        .spinner {
            width: 50px; height: 50px; border: 3px solid var(--border-subtle);
            border-top-color: var(--accent-primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast {
            position: fixed; bottom: 32px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-surface); border: 1px solid var(--accent-primary);
            border-radius: 12px; padding: 14px 28px; color: var(--text-bright);
            font-weight: 600; z-index: 2000; opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px;
            backdrop-filter: blur(10px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast i { color: var(--accent-gold); font-size: 20px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--accent-tertiary); border-radius: 4px; }

        @media (max-width: 768px) {
            .container { padding: 24px 16px; }
            .gallery-grid { grid-template-columns: 1fr; }
            .search-container { flex-direction: column; align-items: stretch; }
            .btn-search-action { justify-content: center; padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="grid-lines"></div>

    <div class="container">
        <header class="header">
            <h1 class="header-title">GALERI CYBER</h1>
            <p class="header-subtitle">LINE TOGEL ARCHIVE SYSTEM</p>
        </header>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('data')">
                <i class="fas fa-database"></i> DATA INTERNAL
            </button>
            <button class="tab-btn" onclick="switchTab('web')">
                <i class="fas fa-globe"></i> CARI DI WEB
            </button>
        </div>

        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Ketik judul atau kata kunci...">
            </div>
            <button id="searchBtn" class="btn-search-action" onclick="handleSearchAction()">
                <i class="fas fa-check-circle"></i> CARI
            </button>
        </div>

        <div class="stats-bar">
            Menampilkan <span id="resultCount" class="stats-count">0</span> item
        </div>

        <div id="galleryGrid" class="gallery-grid">
            <div class="loading-container">
                <div class="spinner"></div>
                <p style="color: var(--text-muted);">Menginisialisasi sistem...</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastText">Berhasil!</span>
    </div>

    <script>
        // Configuration
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        const GID = '1246502038';
        const QUERY = 'SELECT C, D WHERE D IS NOT NULL';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${encodeURIComponent(QUERY)}&gid=${GID}`;

        // State
        let currentTab = 'data'; // 'data' or 'web'
        let internalData = [];
        const searchInput = document.getElementById('searchInput');
        const galleryGrid = document.getElementById('galleryGrid');
        const resultCount = document.getElementById('resultCount');
        const searchBtn = document.getElementById('searchBtn');

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            fetchSheetData();
            searchInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') handleSearchAction();
                else if (currentTab === 'data') filterInternalData(); // Live filter for internal data
            });
        });

        // Tab Switching
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.tab-btn').classList.add('active');
            
            if (tab === 'data') {
                searchInput.placeholder = "Cari di data internal...";
                filterInternalData();
            } else {
                searchInput.placeholder = "Cari gambar di web (contoh: Lucu, Meme, Abstrak)...";
                galleryGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                        <i class="fas fa-globe" style="font-size: 48px; color: var(--accent-tertiary); margin-bottom: 20px;"></i>
                        <h3 style="font-family: 'Chakra Petch'; margin-bottom: 10px;">MODE PENCARIAN WEB</h3>
                        <p style="color: var(--text-muted);">Ketik kata kunci dan tekan CARI untuk menemukan gambar.</p>
                    </div>
                `;
                resultCount.textContent = "0";
            }
        }

        // Handle Search Button Action
        function handleSearchAction() {
            const query = searchInput.value.trim();
            if (currentTab === 'web') {
                if(query) fetchWebImages(query);
                else showToast("Masukkan kata kunci pencarian");
            } else {
                filterInternalData();
            }
        }

        // Fetch Internal Data
        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const jsonString = text.substring(47).slice(0, -2);
                const json = JSON.parse(jsonString);
                const rows = json.table.rows;

                internalData = rows.map(row => {
                    const title = row.c[0] ? row.c[0].v : 'Tanpa Judul';
                    const url = row.c[1] ? row.c[1].v : null;
                    return { title, url };
                }).filter(item => item.url);

                renderGallery(internalData);
            } catch (err) {
                console.error(err);
                galleryGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--accent-secondary);">Gagal memuat data sheet.</div>`;
            }
        }

        // Fetch Web Images (Simulated via LoremFlickr for demo without API key)
        async function fetchWebImages(query) {
            galleryGrid.innerHTML = `<div class="loading-container"><div class="spinner"></div><p>Mencari gambar...</p></div>`;
            
            // Simulate search delay
            await new Promise(r => setTimeout(r, 1000));
            
            const images = [];
            // Generate 12 random images based on query keyword
            for(let i=0; i<12; i++) {
                const width = 300 + Math.floor(Math.random() * 200);
                const height = 220;
                // Using LoremFlickr for free keyword-based images
                images.push({
                    title: `${query} - Result ${i+1}`,
                    url: `https://loremflickr.com/${width}/${height}/${query}?random=${Date.now()}-${i}`
                });
            }
            renderGallery(images);
        }

        // Filter Internal Data
        function filterInternalData() {
            const query = searchInput.value.toLowerCase();
            const filtered = internalData.filter(item => item.title.toLowerCase().includes(query));
            renderGallery(filtered);
        }

        // Render Gallery
        function renderGallery(items) {
            galleryGrid.innerHTML = '';
            resultCount.textContent = items.length;

            if (items.length === 0) {
                galleryGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">Tidak ada hasil ditemukan.</div>`;
                return;
            }

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <div class="card-image-wrapper">
                        <img src="${item.url}" alt="${item.title}" class="card-image" loading="lazy" onerror="this.onerror=null;this.src='https://via.placeholder.com/400x300/0f172a/0ff0fc?text=Error';">
                        <div class="card-actions">
                            <div class="action-group">
                                <button class="btn-action copy-photo" onclick="copyImage('${item.url}')" title="Salin Foto">
                                    <i class="fas fa-copy"></i>
                                </button>
                                <button class="btn-action" onclick="openImage('${item.url}')" title="Buka Fullscreen">
                                    <i class="fas fa-expand"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-info">
                        <h3 class="card-title">${item.title}</h3>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // --- FEATURE: COPY IMAGE TO CLIPBOARD ---
        async function copyImage(url) {
            try {
                showToast('Memproses foto...', 'info');
                
                // Fetch the image data
                const response = await fetch(url);
                const blob = await response.blob();
                
                // Write to clipboard
                await navigator.clipboard.write([
                    new ClipboardItem({ [blob.type]: blob })
                ]);
                
                showToast('Foto berhasil disalin!');
            } catch (err) {
                console.error('Gagal menyalin foto:', err);
                // Fallback: Copy Link
                try {
                    await navigator.clipboard.writeText(url);
                    showToast('Gagal salin foto (CORS), Link disalin!');
                } catch (e) {
                    showToast('Gagal menyalin');
                }
            }
        }

        function openImage(url) {
            window.open(url, '_blank');
        }

        // Toast Utility
        const toastEl = document.getElementById('toast');
        const toastText = document.getElementById('toastText');
        function showToast(message) {
            toastText.textContent = message;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>

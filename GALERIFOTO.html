<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Blue Photo Gallery & Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000510;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }
        
        .neon-text {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff, 0 0 40px #00d4ff, 0 0 80px #00d4ff;
        }
        
        .neon-border {
            box-shadow: 0 0 10px #00d4ff, inset 0 0 10px #00d4ff;
            border: 2px solid #00d4ff;
        }
        
        .neon-box {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .neon-box:hover {
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
            transform: translateY(-5px);
        }
        
        .neon-input {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }
        
        .neon-input:focus {
            outline: none;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        .neon-button {
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            transition: all 0.3s ease;
        }
        
        .neon-button:hover {
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.8);
            transform: scale(1.05);
        }
        
        .photo-card {
            position: relative;
            overflow: hidden;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }
        
        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .photo-card:hover img {
            transform: scale(1.1);
        }
        
        .copy-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            gap: 10px;
            padding: 20px;
        }
        
        .photo-card:hover .copy-overlay {
            opacity: 1;
        }
        
        .canvas-container {
            border: 2px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }
        
        .grid-bg {
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        @keyframes pulse-neon {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
            50% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.8); }
        }
        
        .animate-pulse-neon {
            animation: pulse-neon 2s infinite;
        }
        
        .scrollbar-neon::-webkit-scrollbar {
            width: 10px;
        }
        
        .scrollbar-neon::-webkit-scrollbar-track {
            background: #000510;
        }
        
        .scrollbar-neon::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 5px;
        }
        
        .scrollbar-neon::-webkit-scrollbar-thumb:hover {
            background: #0099cc;
        }

        .image-preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-preview-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border: 3px solid #00d4ff;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
        }

        .copy-success {
            animation: successPulse 0.5s ease;
        }

        @keyframes successPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px #00ff88; }
        }
    </style>
</head>
<body class="text-cyan-400 grid-bg min-h-screen">

    <!-- Header -->
    <header class="p-6 border-b border-cyan-500/30 sticky top-0 bg-black/80 backdrop-blur-md z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-4xl md:text-5xl font-bold neon-text text-center md:text-left">
                NEON BLUE GALLERY
            </h1>
            <div class="flex gap-4 flex-wrap justify-center">
                <button onclick="showSection('gallery')" class="neon-button px-6 py-2 rounded">
                    Gallery
                </button>
                <button onclick="showSection('search')" class="neon-button px-6 py-2 rounded">
                    Web Search
                </button>
                <button onclick="showSection('editor')" class="neon-button px-6 py-2 rounded">
                    Photo Editor
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-6">

        <!-- Gallery Section -->
        <section id="gallery-section" class="space-y-6">
            <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
                <h2 class="text-2xl font-bold neon-text">Photo Collection from Sheets</h2>
                <button onclick="loadPhotos()" class="neon-button px-4 py-2 rounded text-sm">
                    Refresh Data
                </button>
            </div>
            <div id="photos-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <div class="col-span-full text-center py-20">
                    <div class="animate-spin inline-block w-12 h-12 border-4 border-cyan-400 border-t-transparent rounded-full"></div>
                    <p class="mt-4 text-cyan-400">Loading photos from Google Sheets...</p>
                </div>
            </div>
        </section>

        <!-- Web Search Section -->
        <section id="search-section" class="hidden space-y-6">
            <div class="neon-box p-6 rounded-lg">
                <h2 class="text-2xl font-bold neon-text mb-4">Search Photos from Web</h2>
                <div class="flex gap-4 flex-wrap">
                    <input type="text" id="search-input" placeholder="Search photos (e.g., neon city, cyberpunk, nature)..." 
                           class="neon-input flex-1 px-4 py-3 rounded text-lg" onkeypress="if(event.key==='Enter')searchPhotos()">
                    <button onclick="searchPhotos()" class="neon-button px-8 py-3 rounded">
                        Search
                    </button>
                </div>
            </div>
            <div id="search-results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <div class="col-span-full text-center py-20 text-cyan-400/50">
                    <p class="text-xl">Enter a search term above to find photos</p>
                    <p class="text-sm mt-2">Photos will appear here and can be copied directly</p>
                </div>
            </div>
        </section>

        <!-- Editor Section -->
        <section id="editor-section" class="hidden space-y-6">
            <div class="neon-box p-6 rounded-lg">
                <h2 class="text-2xl font-bold neon-text mb-4">Photo Editor & Combiner</h2>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Tools Panel -->
                    <div class="space-y-4">
                        <div class="neon-box p-4 rounded">
                            <h3 class="font-bold mb-3 text-cyan-300">Upload Images</h3>
                            <input type="file" id="image-upload" multiple accept="image/*" 
                                   class="hidden" onchange="handleImageUpload(event)">
                            <button onclick="document.getElementById('image-upload').click()" 
                                    class="neon-button w-full py-2 rounded">
                                Choose Files
                            </button>
                        </div>

                        <div class="neon-box p-4 rounded">
                            <h3 class="font-bold mb-3 text-cyan-300">Canvas Size</h3>
                            <select id="canvas-size" onchange="changeCanvasSize()" class="neon-input w-full p-2 rounded">
                                <option value="800x600">800 x 600</option>
                                <option value="1080x1080">1080 x 1080 (Square)</option>
                                <option value="1080x1350">1080 x 1350 (Portrait)</option>
                                <option value="1920x1080">1920 x 1080 (Landscape)</option>
                            </select>
                        </div>

                        <div class="neon-box p-4 rounded">
                            <h3 class="font-bold mb-3 text-cyan-300">Background</h3>
                            <div class="grid grid-cols-4 gap-2">
                                <button onclick="setCanvasBackground('#000000')" class="w-8 h-8 rounded bg-black border border-cyan-400 hover:scale-110 transition"></button>
                                <button onclick="setCanvasBackground('#ffffff')" class="w-8 h-8 rounded bg-white border border-cyan-400 hover:scale-110 transition"></button>
                                <button onclick="setCanvasBackground('#00d4ff')" class="w-8 h-8 rounded bg-cyan-400 border border-cyan-400 hover:scale-110 transition"></button>
                                <button onclick="setCanvasBackground('#1a1a2e')" class="w-8 h-8 rounded bg-[#1a1a2e] border border-cyan-400 hover:scale-110 transition"></button>
                            </div>
                        </div>

                        <div class="neon-box p-4 rounded">
                            <h3 class="font-bold mb-3 text-cyan-300">Actions</h3>
                            <div class="space-y-2">
                                <button onclick="deleteSelected()" class="neon-button w-full py-2 rounded text-sm bg-red-600 hover:bg-red-500">
                                    Delete Selected
                                </button>
                                <button onclick="bringToFront()" class="neon-button w-full py-2 rounded text-sm">
                                    Bring to Front
                                </button>
                                <button onclick="sendToBack()" class="neon-button w-full py-2 rounded text-sm">
                                    Send to Back
                                </button>
                                <button onclick="downloadCanvas()" class="neon-button w-full py-2 rounded text-sm mt-4 bg-green-600 hover:bg-green-500">
                                    Download Result
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Canvas Area -->
                    <div class="lg:col-span-2">
                        <div class="canvas-container bg-black rounded overflow-hidden">
                            <canvas id="editor-canvas"></canvas>
                        </div>
                        <div class="mt-4 flex gap-4 flex-wrap">
                            <button onclick="clearCanvas()" class="neon-button px-6 py-2 rounded">
                                Clear Canvas
                            </button>
                            <button onclick="addText()" class="neon-button px-6 py-2 rounded">
                                Add Text
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Image Preview Modal -->
    <div id="image-modal" class="image-preview-modal hidden" onclick="closeImageModal()">
        <img id="modal-image" src="" alt="Preview">
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 neon-box px-6 py-3 rounded-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <span id="toast-message" class="font-bold text-cyan-400"></span>
    </div>

    <script>
        // Global variables
        let canvas;
        let photosData = [];
        const SHEET_ID = '1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0';
        const SHEET_GID = '1246502038';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initCanvas();
            loadPhotos();
        });

        // Initialize Fabric.js Canvas
        function initCanvas() {
            canvas = new fabric.Canvas('editor-canvas', {
                width: 800,
                height: 600,
                backgroundColor: '#000000'
            });
        }

        // Show/Hide Sections
        function showSection(section) {
            document.getElementById('gallery-section').classList.add('hidden');
            document.getElementById('search-section').classList.add('hidden');
            document.getElementById('editor-section').classList.add('hidden');
            
            if (section === 'gallery') {
                document.getElementById('gallery-section').classList.remove('hidden');
            } else if (section === 'search') {
                document.getElementById('search-section').classList.remove('hidden');
            } else if (section === 'editor') {
                document.getElementById('editor-section').classList.remove('hidden');
            }
        }

        // Load Photos from Google Sheets
        async function loadPhotos() {
            const grid = document.getElementById('photos-grid');
            grid.innerHTML = '<div class="col-span-full text-center py-20"><div class="animate-spin inline-block w-12 h-12 border-4 border-cyan-400 border-t-transparent rounded-full"></div><p class="mt-4">Loading...</p></div>';

            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}&range=C2:D110`;
                
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                
                photosData = [];
                const rows = json.table.rows;
                
                rows.forEach(row => {
                    if (row.c && row.c[0] && row.c[1]) {
                        photosData.push({
                            title: row.c[0].v || '',
                            photo: row.c[1].v || ''
                        });
                    }
                });

                renderPhotos();
                
            } catch (error) {
                console.error('Error loading photos:', error);
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-400">Error loading photos. Please check console.</div>';
                showToast('Error loading data from Google Sheets');
            }
        }

        // Render Photos Grid
        function renderPhotos() {
            const grid = document.getElementById('photos-grid');
            grid.innerHTML = '';

            if (photosData.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-cyan-400/50">No photos found</div>';
                return;
            }

            photosData.forEach((photo, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card rounded-lg overflow-hidden group cursor-pointer';
                card.innerHTML = `
                    <div class="relative" onclick="openImagePreview('${photo.photo}')">
                        <img src="${photo.photo}" alt="${photo.title}" onerror="this.src='https://via.placeholder.com/400x300/000510/00d4ff?text=No+Image'">
                        <div class="copy-overlay" onclick="event.stopPropagation()">
                            <button onclick="copyImageDirect('${photo.photo}', '${photo.title}')" class="neon-button px-6 py-3 rounded mb-2 copy-success">
                                📋 Copy Photo
                            </button>
                            <button onclick="addToEditor('${photo.photo}')" class="neon-button px-6 py-2 rounded bg-purple-600 hover:bg-purple-500">
                                Add to Editor
                            </button>
                            <button onclick="openImagePreview('${photo.photo}')" class="text-cyan-400 text-sm hover:underline">
                                Preview Full Size
                            </button>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-cyan-300 truncate" title="${photo.title}">${photo.title}</h3>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Search Photos from Web using Unsplash Source
        async function searchPhotos() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) {
                showToast('Please enter a search term');
                return;
            }

            const results = document.getElementById('search-results');
            results.innerHTML = '<div class="col-span-full text-center py-20"><div class="animate-spin inline-block w-12 h-12 border-4 border-cyan-400 border-t-transparent rounded-full"></div><p class="mt-4">Searching...</p></div>';

            try {
                // Generate multiple unique image URLs
                const images = [];
                const timestamps = Date.now();
                
                for (let i = 0; i < 24; i++) {
                    images.push({
                        id: i,
                        url: `https://source.unsplash.com/800x600/?${encodeURIComponent(query)}&sig=${timestamps}-${i}`,
                        query: query
                    });
                }

                results.innerHTML = '';
                
                images.forEach((img, index) => {
                    const card = document.createElement('div');
                    card.className = 'photo-card rounded-lg overflow-hidden group cursor-pointer';
                    card.innerHTML = `
                        <div class="relative" onclick="openImagePreview('${img.url}')">
                            <img src="${img.url}" alt="${img.query}" loading="lazy" onerror="this.style.display='none'">
                            <div class="copy-overlay" onclick="event.stopPropagation()">
                                <button onclick="copyImageDirect('${img.url}', 'Search Result ${index + 1}')" class="neon-button px-6 py-3 rounded mb-2">
                                    📋 Copy Photo
                                </button>
                                <button onclick="addToEditor('${img.url}')" class="neon-button px-6 py-2 rounded bg-purple-600 hover:bg-purple-500">
                                    Add to Editor
                                </button>
                                <button onclick="openImagePreview('${img.url}')" class="text-cyan-400 text-sm hover:underline">
                                    Preview Full Size
                                </button>
                            </div>
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-cyan-300 text-sm">Result ${index + 1}</h3>
                        </div>
                    `;
                    results.appendChild(card);
                });

                showToast(`Found ${images.length} photos for "${query}"`);

            } catch (error) {
                console.error('Error searching photos:', error);
                results.innerHTML = '<div class="col-span-full text-center py-20 text-red-400">Error searching photos. Please try again.</div>';
            }
        }

        // Copy Image Directly (as actual image data)
        async function copyImageDirect(url, title) {
            try {
                showToast('Loading image...');
                
                // Fetch the image
                const response = await fetch(url);
                const blob = await response.blob();
                
                // Create a clipboard item
                const clipboardItem = new ClipboardItem({
                    [blob.type]: blob
                });
                
                // Write to clipboard
                await navigator.clipboard.write([clipboardItem]);
                
                showToast(`✅ Photo "${title}" copied to clipboard!`);
                
                // Visual feedback
                event.target.classList.add('copy-success');
                setTimeout(() => {
                    event.target.classList.remove('copy-success');
                }, 500);
                
            } catch (err) {
                console.error('Error copying image:', err);
                
                // Fallback: Try to copy as URL if direct copy fails
                try {
                    await navigator.clipboard.writeText(url);
                    showToast('Image URL copied (browser limitation)');
                } catch (fallbackErr) {
                    showToast('Copy failed. Try right-click and copy image.');
                }
            }
        }

        // Open Image Preview Modal
        function openImagePreview(url) {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-image');
            modalImg.src = url;
            modal.classList.remove('hidden');
        }

        // Close Image Preview Modal
        function closeImageModal() {
            document.getElementById('image-modal').classList.add('hidden');
        }

        // Add Image to Editor
        function addToEditor(url) {
            showSection('editor');
            
            // Show loading
            showToast('Loading image to editor...');
            
            fabric.Image.fromURL(url, function(img) {
                img.scaleToWidth(300);
                canvas.add(img);
                canvas.centerObject(img);
                canvas.setActiveObject(img);
                canvas.renderAll();
                showToast('Image added to editor');
            }, { crossOrigin: 'anonymous' });
        }

        // Canvas Editor Functions
        function handleImageUpload(event) {
            const files = event.target.files;
            if (!files.length) return;
            
            Array.from(files).forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    fabric.Image.fromURL(e.target.result, function(img) {
                        img.scaleToWidth(300);
                        canvas.add(img);
                        // Position images in a grid if multiple
                        const offset = index * 50;
                        img.set({
                            left: 100 + offset,
                            top: 100 + offset
                        });
                        if (index === files.length - 1) {
                            canvas.setActiveObject(img);
                        }
                        canvas.renderAll();
                    });
                };
                reader.readAsDataURL(file);
            });
            showToast(`${files.length} image(s) uploaded successfully`);
        }

        function changeCanvasSize() {
            const size = document.getElementById('canvas-size').value;
            const [width, height] = size.split('x').map(Number);
            canvas.setWidth(width);
            canvas.setHeight(height);
            canvas.renderAll();
            showToast(`Canvas resized to ${width}x${height}`);
        }

        function setCanvasBackground(color) {
            canvas.setBackgroundColor(color, canvas.renderAll.bind(canvas));
            showToast('Background changed');
        }

        function deleteSelected() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(function(object) {
                    canvas.remove(object);
                });
                canvas.renderAll();
                showToast('Object deleted');
            } else {
                showToast('No object selected');
            }
        }

        function bringToFront() {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                canvas.bringToFront(activeObject);
                canvas.renderAll();
                showToast('Brought to front');
            }
        }

        function sendToBack() {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                canvas.sendToBack(activeObject);
                canvas.renderAll();
                showToast('Sent to back');
            }
        }

        function addText() {
            const text = new fabric.IText('Double click to edit', {
                left: 100,
                top: 100,
                fontFamily: 'Orbitron',
                fill: '#00d4ff',
                fontSize: 40,
                stroke: '#000000',
                strokeWidth: 2
            });
            canvas.add(text);
            canvas.setActiveObject(text);
            showToast('Text added - double click to edit');
        }

        function clearCanvas() {
            if (confirm('Clear all objects from canvas?')) {
                canvas.clear();
                canvas.setBackgroundColor('#000000', canvas.renderAll.bind(canvas));
                showToast('Canvas cleared');
            }
        }

        function downloadCanvas() {
            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1,
                multiplier: 2
            });
            const link = document.createElement('a');
            link.download = 'neon-blue-composite-' + Date.now() + '.png';
            link.href = dataURL;
            link.click();
            showToast('Image downloaded successfully!');
        }

        // Toast Notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            toastMessage.textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                    deleteSelected();
                }
            }
            if (e.key === 'Escape') {
                closeImageModal();
            }
        });
    </script>
</body>
</html>

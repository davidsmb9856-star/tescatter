<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ HOLO-DECK: NEON BLUE COOL ⚡</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* === CORE VARIABLES - DEEP NEON === */
:root {
  --bg-deep: #02040a;
  --bg-panel: rgba(5, 10, 25, 0.75);
  --bg-card: rgba(8, 16, 35, 0.65);
  
  --neon-primary: #00f2ff; /* Electric Cyan */
  --neon-secondary: #0066ff; /* Deep Blue */
  --neon-accent: #7000ff; /* Purple Accent */
  
  --text-main: #e0f7ff;
  --text-muted: #6b8c9e;
  
  --glow-intense: 0 0 10px #00f2ff, 0 0 20px #00f2ff80, 0 0 40px #00f2ff40;
  --glow-soft: 0 0 5px #00f2ff60, 0 0 15px #00f2ff30;
  --border-neon: 1px solid rgba(0, 242, 255, 0.3);
  
  --font-display: 'Rajdhani', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

body {
  font-family: var(--font-display);
  background: var(--bg-deep);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* === BACKGROUND FX === */
.bg-cyber {
  position: fixed; inset: 0; z-index: -2;
  background: 
    radial-gradient(circle at 15% 50%, rgba(0, 102, 255, 0.15), transparent 25%),
    radial-gradient(circle at 85% 30%, rgba(112, 0, 255, 0.1), transparent 25%),
    linear-gradient(180deg, #02040a 0%, #050b1a 100%);
}
.grid-overlay {
  position: fixed; inset: 0; z-index: -1;
  background-image: 
    linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
}

/* === LAYOUT === */
.main-container {
  max-width: 1200px; margin: 0 auto; padding: 20px;
  position: relative; z-index: 10;
}

/* === HEADER === */
.header-section { text-align: center; margin-bottom: 30px; position: relative; }
.main-title {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 700; text-transform: uppercase; letter-spacing: 4px;
  background: linear-gradient(to bottom, #fff, var(--neon-primary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.5));
  animation: textFlicker 3s infinite alternate;
}
@keyframes textFlicker {
  0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.5)); }
  20%, 24%, 55% { opacity: 0.8; filter: drop-shadow(0 0 5px rgba(0, 242, 255, 0.2)); }
}

/* === TABS === */
.tabs-container {
  display: flex; justify-content: center; gap: 15px; margin-bottom: 25px;
}
.tab-chip {
  background: rgba(5, 10, 25, 0.5);
  border: 1px solid rgba(0, 242, 255, 0.2);
  padding: 10px 30px;
  color: var(--text-muted);
  font-family: var(--font-display);
  font-weight: 600; text-transform: uppercase; letter-spacing: 2px;
  cursor: pointer; transition: all 0.3s ease;
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
}
.tab-chip:hover { color: #fff; border-color: var(--neon-primary); text-shadow: 0 0 8px var(--neon-primary); }
.tab-chip.active {
  background: linear-gradient(90deg, rgba(0, 242, 255, 0.1), transparent);
  color: var(--neon-primary);
  border-color: var(--neon-primary);
  box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1);
  text-shadow: 0 0 10px var(--neon-primary);
}

/* === CONTENT BOX === */
.content-box {
  background: var(--bg-card);
  border: var(--border-neon);
  border-radius: 4px;
  padding: 25px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
  position: relative;
}
.content-box::before {
  content: ''; position: absolute; top: -1px; left: 20%; right: 20%; height: 1px;
  background: var(--neon-primary);
  box-shadow: 0 0 10px var(--neon-primary);
}

/* === SETTINGS PANEL === */
.settings-panel {
  display: flex; flex-wrap: wrap; gap: 15px; align-items: center;
  background: rgba(0, 0, 0, 0.3);
  padding: 15px;
  border-radius: 4px;
  border-left: 3px solid var(--neon-secondary);
  margin-bottom: 25px;
}
.setting-label { color: var(--neon-primary); font-weight: 600; letter-spacing: 1px; font-size: 0.9rem; }
.input-neon {
  background: rgba(0, 0, 0, 0.6);
  border: 1px solid #334;
  color: #fff;
  padding: 8px 12px;
  font-family: var(--font-mono);
  border-radius: 2px;
  transition: 0.3s;
}
.input-neon:focus {
  border-color: var(--neon-primary);
  box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
}

/* === BUTTONS === */
.btn-neon {
  background: transparent;
  border: 1px solid var(--neon-primary);
  color: var(--neon-primary);
  padding: 8px 20px;
  font-family: var(--font-display);
  font-weight: 700; text-transform: uppercase;
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: 0.3s;
  clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
}
.btn-neon:hover {
  background: var(--neon-primary);
  color: #000;
  box-shadow: 0 0 20px var(--neon-primary);
}

/* === DATA GRID === */
.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

/* === SECTION BOX === */
.section-box {
  background: rgba(5, 10, 20, 0.8);
  border: 1px solid rgba(255, 255, 255, 0.05);
  display: flex; flex-direction: column;
  transition: 0.3s;
}
.section-box:hover { border-color: var(--neon-secondary); transform: translateY(-3px); }
.section-header {
  padding: 12px 15px;
  background: linear-gradient(90deg, rgba(0, 242, 255, 0.1), transparent);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title { color: var(--neon-primary); font-weight: 700; letter-spacing: 1px; }
.badge-count {
  background: var(--neon-secondary); color: #fff;
  padding: 2px 8px; font-size: 0.7rem; border-radius: 2px;
  font-family: var(--font-mono);
}

.search-input {
  width: 100%; background: rgba(0,0,0,0.5); border: none;
  color: #fff; padding: 10px; font-family: var(--font-mono);
  border-bottom: 1px solid #334;
}
.search-input:focus { border-bottom-color: var(--neon-primary); }

.section-content { padding: 10px; max-height: 400px; overflow-y: auto; }
/* Custom Scrollbar */
.section-content::-webkit-scrollbar { width: 4px; }
.section-content::-webkit-scrollbar-thumb { background: var(--neon-secondary); }

/* === ITEM CARD === */
.item-card {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid transparent;
  padding: 12px; margin-bottom: 8px;
  cursor: pointer; transition: 0.3s;
  font-family: var(--font-mono); font-size: 0.85rem;
}
.item-card:hover {
  background: rgba(0, 242, 255, 0.05);
  border-color: var(--neon-primary);
  box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1);
}
.item-label { color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; }
.item-title { color: var(--neon-primary); font-weight: 700; margin: 4px 0; }
.item-content { color: #ccc; line-height: 1.4; }

/* === NEON SELECTOR (CHIPS) === */
.neon-selector {
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(0, 242, 255, 0.2);
  padding: 20px;
  margin: 20px 0;
  position: relative;
}
.neon-selector::after {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-primary), transparent);
}
.chip-group { margin-bottom: 15px; }
.chip-label { color: var(--neon-secondary); font-size: 0.8rem; margin-bottom: 8px; display: block; letter-spacing: 1px; }
.chips-row { display: flex; flex-wrap: wrap; gap: 8px; }

.chip {
  padding: 6px 16px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text-muted);
  font-size: 0.8rem; cursor: pointer;
  transition: 0.3s;
  font-family: var(--font-mono);
}
.chip:hover { border-color: #fff; color: #fff; }
.chip.active {
  background: var(--neon-primary);
  color: #000;
  border-color: var(--neon-primary);
  box-shadow: 0 0 15px var(--neon-primary);
  font-weight: 700;
}

/* === RESULT BOX (COOL VERSION) === */
.result-box {
  background: rgba(0, 0, 0, 0.8);
  border: 1px solid var(--neon-primary);
  color: #fff;
  padding: 20px;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 1.5rem;
  font-weight: 700;
  margin-top: 20px;
  position: relative;
  box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
  text-shadow: 0 0 10px var(--neon-primary);
  letter-spacing: 2px;
}
.result-box::before {
  content: 'RESULT_OUTPUT';
  position: absolute; top: -10px; left: 10px;
  background: #000; padding: 0 5px;
  color: var(--neon-primary); font-size: 0.7rem;
}

/* === EDITABLE INPUT (CONSOLE STYLE) === */
.edit-console {
  margin-top: 15px;
  display: flex; align-items: center; gap: 10px;
  background: #000;
  border: 1px solid #333;
  padding: 10px;
  font-family: var(--font-mono);
}
.console-prompt { color: var(--neon-secondary); font-weight: bold; }
.input-edit-result {
  flex: 1; background: transparent; border: none;
  color: #0f0; /* Matrix Green for edit mode contrast */
  font-family: var(--font-mono); font-size: 1rem;
  border-left: 1px solid #333; padding-left: 10px;
}
.btn-save-edit {
  background: var(--neon-secondary); color: #fff;
  border: none; padding: 5px 15px; cursor: pointer;
  font-family: var(--font-mono); font-weight: bold;
  transition: 0.3s;
}
.btn-save-edit:hover { background: #fff; color: #000; }

/* === TOAST === */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.9);
  border: 1px solid var(--neon-primary);
  color: var(--neon-primary);
  padding: 12px 30px;
  font-family: var(--font-mono);
  box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
  z-index: 1000;
  opacity: 0; pointer-events: none; transition: 0.3s;
}
.toast.show { opacity: 1; bottom: 40px; }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .data-grid { grid-template-columns: 1fr; }
  .settings-panel { flex-direction: column; align-items: stretch; }
  .edit-console { flex-direction: column; }
  .input-edit-result { border-left: none; border-top: 1px solid #333; padding: 10px 0 0 0; }
}
</style>
</head>
<body>

<div class="bg-cyber"></div>
<div class="grid-overlay"></div>

<div class="main-container">
  <header class="header-section">
    <h1 class="main-title">HOLO-DECK <span style="font-size:0.5em; vertical-align:middle; color:var(--neon-secondary)">// PREDIKSI</span></h1>
  </header>

  <nav class="tabs-container">
    <div class="tab-chip active" onclick="switchTab('prediksi')">🔮 PREDIKSI</div>
    <div class="tab-chip" onclick="switchTab('hitung')">🧮 HITUNG</div>
  </nav>

  <div class="content-box">
    
    <!-- TAB PREDIKSI -->
    <div id="tab-prediksi">
      <div class="settings-panel">
        <span class="setting-label">📅 TANGGAL:</span>
        <input type="date" id="input-tanggal" class="input-neon" onchange="autoUpdateTanggal()">
        <button class="btn-neon" id="btn-tanggal" onclick="manualUpdateTanggal()">UPDATE</button>
        <span id="status-tanggal" style="color:var(--neon-primary); font-family:var(--font-mono); margin-left:10px;"></span>
      </div>

      <div class="data-grid">
        <!-- Box 1 -->
        <div class="section-box">
          <div class="section-header">
            <span class="section-title">🔮 PREDIKSI UTAMA</span>
            <span class="badge-count" id="count-prediksi">0</span>
          </div>
          <input type="text" class="search-input" id="search-prediksi" placeholder="> SEARCH_DATA..." oninput="renderPrediksi()">
          <div class="section-content" id="list-prediksi"></div>
        </div>
        <!-- Box 2 -->
        <div class="section-box">
          <div class="section-header">
            <span class="section-title">📅 JADWAL OPEN</span>
            <span class="badge-count" id="count-jadwal">0</span>
          </div>
          <input type="text" class="search-input" id="search-jadwal" placeholder="> SEARCH_SCHEDULE..." oninput="renderPrediksi()">
          <div class="section-content" id="list-jadwal"></div>
        </div>
        <!-- Box 3 -->
        <div class="section-box">
          <div class="section-header">
            <span class="section-title">🔗 LIVE STREAM</span>
            <span class="badge-count" id="count-link">0</span>
          </div>
          <input type="text" class="search-input" id="search-link" placeholder="> SEARCH_LINK..." oninput="renderPrediksi()">
          <div class="section-content" id="list-link"></div>
        </div>
      </div>
    </div>

    <!-- TAB HITUNG -->
    <div id="tab-hitung" style="display:none;">
      <div class="settings-panel">
        <span class="setting-label">💰 NOMINAL (1D):</span>
        <input type="number" id="input-nominal" class="input-neon" placeholder="0" onchange="autoUpdateNominal()">
        <button class="btn-neon" id="btn-nominal" onclick="manualUpdateNominal()">UPDATE</button>
        <span id="status-nominal" style="color:var(--neon-primary); font-family:var(--font-mono); margin-left:10px;"></span>
      </div>

      <div class="neon-selector">
        <div class="chip-group">
          <span class="chip-label">// SELECT_CALC_TYPE</span>
          <div class="chips-row" id="chipTipe"></div>
        </div>
        <div class="chip-group">
          <span class="chip-label">// SELECT_LABEL</span>
          <div class="chips-row" id="chipLabel"></div>
        </div>
        
        <button class="btn-neon" style="width:100%; margin-top:10px;" onclick="tampilkanValueHitungan()">EXECUTE CALCULATION</button>
        
        <!-- RESULT DISPLAY -->
        <div id="resultBox" class="result-box">WAITING_FOR_INPUT...</div>
        
        <!-- EDIT CONSOLE -->
        <div class="edit-console">
          <span class="console-prompt">root@holodeck:~$</span>
          <input type="text" id="inputEditResult" class="input-edit-result" placeholder="Edit result value here..." onkeydown="if(event.key==='Enter') saveEditedResult()">
          <button class="btn-save-edit" onclick="saveEditedResult()">SAVE</button>
        </div>
      </div>

      <div class="data-grid" id="container-hitung"></div>
    </div>

  </div>
</div>

<div id="toast" class="toast">SYSTEM_READY</div>

<script>
// === CONFIG ===
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4', keyNominal: 'togel_nominal_v4'
};

const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'), contH: $('container-hitung'),
  toast: $('toast'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox'),
  inputEditResult: $('inputEditResult')
};

let selectedTipe = '', selectedLabel = '', autoRefreshEnabled = true;

// === UTILS ===
function showToast(msg) {
  dom.toast.textContent = `> ${msg}`;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 3000);
}

function copyText(text, element) {
  let final = text; try { final = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(final).then(() => {
    showToast('DATA_COPIED_TO_CLIPBOARD');
    if (element) {
      element.style.borderColor = '#0f0';
      setTimeout(() => element.style.borderColor = '', 500);
    }
  });
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

function parseCSV(text) {
  let rows = [], row = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (inQ) { if (c === '"' && n === '"') { cell += '"'; i++; } else if (c === '"') inQ = false; else cell += c; }
    else { if (c === '"') inQ = true; else if (c === ',') { row.push(cell); cell = ""; }
      else if ((c === '\r' && n === '\n') || c === '\n' || c === '\r') { row.push(cell); rows.push(row); row = []; cell = ""; if (c === '\r' && n === '\n') i++; }
      else cell += c; }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

async function updateSheet(action, value) {
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { return false; }
}

// === FETCH ===
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now()), data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = "SYNC_OK";
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const t = safeGet(data[i], 1); if (t) state.prediksi.push({ title: t.split(/[\s,]+/)[0], content: t });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const t = safeGet(data[i], 2); if (t) state.jadwal.push({ title: t.split(/[\s,]+/)[0], content: t });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const t = safeGet(data[i], 2); if (t) state.link.push({ title: t.split(/[\s,]+/)[0], content: t });
    }
    renderPrediksi();
  } catch(e) { console.error(e); }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now()), data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = formatNum(nom); }
    }
    const sec = [{r:0,c:24,s:2,e:42},{r:43,c:24,s:45,e:80},{r:81,c:24,s:83,e:119},{r:120,c:24,s:122,e:153},{r:154,c:24,s:156,e:179},{r:180,c:24,s:182,e:213},{r:215,c:24,s:217,e:248},{r:249,c:24,s:251,e:282},{r:283,c:24,s:285,e:316}];
    state.hitung = sec.map(x => {
      let title = safeGet(data[x.r], x.c) || "PASARAN", items = [];
      for (let i = x.s; i <= x.e && i < data.length; i++) {
        if (data[i]) {
          const ty = safeGet(data[i], 23), rv = safeGet(data[i], 24);
          if (ty || rv) items.push({ type: ty, res: rv });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) { console.error(e); }
}

// === RENDER ===
function renderList(container, items, searchId) {
  const searchVal = $(searchId).value.toLowerCase();
  const f = items.filter(i => i.content.toLowerCase().includes(searchVal));
  if (!f.length) { container.innerHTML = '<div style="padding:20px; color:#555; text-align:center">NO_DATA_FOUND</div>'; return; }
  container.innerHTML = f.map(v => `
    <div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}', this)">
      <div class="item-label">ID: ${v.title.substring(0,8)}</div>
      <div class="item-title">${v.title}</div>
      <div class="item-content">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, 'search-prediksi');
  renderList(dom.listJ, state.jadwal, 'search-jadwal');
  renderList(dom.listL, state.link, 'search-link');
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<div style="padding:20px; color:#555; text-align:center">NO_CALC_DATA</div>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="section-box">
      <div class="section-header"><span class="section-title">${s.title}</span></div>
      <div class="section-content">
        ${s.items.map(it => `
          <div class="item-card" onclick="copyText('${encodeURIComponent(it.res)}', this)">
            <div class="item-label">${it.type}</div>
            <div class="item-title" style="color:#fff; font-size:1.1rem">${it.res}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// === CHIPS ===
function renderChips(container, items, type) {
  container.innerHTML = `<div class="chip active" onclick="selectChip(this, '${type}', '')">ALL</div>` + 
    items.map(it => `<div class="chip" onclick="selectChip(this, '${type}', '${it.label||it}')">${(it.label||it).substring(0,15)}</div>`).join('');
}

function selectChip(el, type, val) {
  el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (type === 'tipe') {
    selectedTipe = val;
    if(val) updateLabelChips();
    else renderChips(dom.chipLabel, [], 'label');
  } else {
    selectedLabel = val;
  }
  if (autoRefreshEnabled && selectedTipe && selectedLabel) refreshResultAuto();
}

function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) return;
  const labels = state.kelompok[selectedTipe].map(i => i.label);
  renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now()), data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = formatNum(nom); }
    }
    const sec = [{r:0,c:24,s:2,e:42,t:"ALL_MARKETS"},{r:43,c:24,s:45,e:80,t:"MACAU_4D"},{r:81,c:24,s:83,e:119,t:"MACAU_5D"},{r:120,c:24,s:122,e:153,t:"KINGKONG"},{r:154,c:24,s:156,e:179,t:"BONUS"},{r:180,c:24,s:182,e:213,t:"JAKARTA"},{r:215,c:24,s:217,e:248,t:"TOTOMALI"},{r:249,c:24,s:251,e:282,t:"HOKIDRAW"},{r:283,c:24,s:285,e:316,t:"SYDNEY_HK"}];
    state.kelompok = {};
    sec.forEach(x => {
      const items = [];
      for (let i = x.s; i <= x.e && i < data.length; i++) {
        if (data[i]) {
          const lb = safeGet(data[i],23), vl = safeGet(data[i],24);
          if (lb||vl) items.push({ label: lb||"-", value: vl||"-" });
        }
      }
      if (items.length > 0) state.kelompok[x.t] = items;
    });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error(e); }
}

// === RESULT LOGIC ===
function tampilkanValueHitungan() {
  const result = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = 'ERROR: INVALID_SELECTION';
    result.style.borderColor = 'red';
    result.style.color = 'red';
    dom.inputEditResult.value = '';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    result.innerHTML = item.value;
    result.style.borderColor = 'var(--neon-primary)';
    result.style.color = '#fff';
    dom.inputEditResult.value = item.value;
    result.onclick = () => copyText(item.value, result);
  }
}

function refreshResultAuto() {
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) return;
  const result = dom.resultBox;
  result.style.opacity = '0.5';
  setTimeout(() => {
    const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
    if (item) {
      result.innerHTML = item.value;
      dom.inputEditResult.value = item.value;
      showToast('AUTO_REFRESH_COMPLETE');
    }
    result.style.opacity = '1';
  }, 300);
}

function saveEditedResult() {
  const val = dom.inputEditResult.value.trim();
  if (!val) return showToast('ERROR: EMPTY_INPUT');
  dom.resultBox.innerHTML = val + ' <span style="font-size:0.5em; color:#0f0">(EDITED)</span>';
  dom.resultBox.style.borderColor = '#0f0';
  showToast('MANUAL_OVERRIDE_SAVED');
}

// === AUTO UPDATE ===
let autoTimeout = null;
function autoUpdateTanggal() {
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateTanggal, 1000);
}
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return;
  const p = dom.inTgl.value.split('-');
  const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "SYNCING...";
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) { dom.statTgl.textContent = "OK"; showToast('DATE_UPDATED'); fetchPrediksi(); fetchHitung(); loadHitungData(); }
    else { dom.statTgl.textContent = "FAIL"; }
  });
}

function autoUpdateNominal() {
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(() => {
    manualUpdateNominal();
    if (autoRefreshEnabled && selectedTipe && selectedLabel) setTimeout(refreshResultAuto, 500);
  }, 1000);
}
function manualUpdateNominal() {
  if (!dom.inNom.value) return;
  dom.btnNom.disabled = true; dom.statNom.textContent = "SYNCING...";
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) { dom.statNom.textContent = formatNum(dom.inNom.value); showToast('NOMINAL_UPDATED'); fetchPrediksi(); fetchHitung(); loadHitungData();
      if (autoRefreshEnabled && selectedTipe && selectedLabel) setTimeout(refreshResultAuto, 400);
    } else { dom.statNom.textContent = "FAIL"; }
  });
}

// === INIT ===
function switchTab(tab) {
  document.querySelectorAll('.tab-chip').forEach(c => c.classList.remove('active'));
  event.currentTarget.classList.add('active');
  $('tab-prediksi').style.display = tab === 'prediksi' ? 'block' : 'none';
  $('tab-hitung').style.display = tab === 'hitung' ? 'block' : 'none';
}

window.onload = () => {
  fetchPrediksi(); fetchHitung(); loadHitungData();
  setTimeout(() => showToast('SYSTEM_ONLINE'), 1000);
};
</script>

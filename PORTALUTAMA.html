<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ HOLO-DECK: ULTRA NEON EDITION ⚡</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* === CORE VARIABLES - ULTRA NEON === */
:root {
  --bg: #010208;
  --bg-card: rgba(6, 9, 28, 0.82);
  --bg-panel: rgba(8, 12, 35, 0.75);
  
  --fg: #c8d6e8;
  --fg-muted: #6b7a99;
  
  --neon-blue: #00f3ff; /* Lebih terang & cyan */
  --neon-blue-dim: #008c99;
  --neon-purple: #bc13fe;
  
  --glow-blue: 0 0 10px #00f3ff60, 0 0 20px #00f3ff30;
  --glow-blue-intense: 0 0 15px #00f3ff, 0 0 30px #00f3ff80, 0 0 60px #00f3ff40;
  
  --border-neon: rgba(0, 243, 255, 0.3);
  --border-neon-hover: rgba(0, 243, 255, 0.6);
  
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg); color: var(--fg);
  min-height: 100vh; overflow-x: hidden; position: relative;
  line-height: 1.5;
}

/* === BACKGROUND EFFECTS === */
.bg-neon {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(800px 400px at 10% 10%, rgba(0, 243, 255, 0.08), transparent 60%),
    radial-gradient(600px 300px at 90% 20%, rgba(188, 19, 254, 0.06), transparent 60%),
    linear-gradient(180deg, #010208 0%, #050a1f 50%, #010208 100%);
  animation: bgPulse 40s ease-in-out infinite;
}
@keyframes bgPulse { 0%,100%{filter:hue-rotate(0deg)} 50%{filter:hue-rotate(10deg)} }

.grid-lines {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px; animation: gridFlow 60s linear infinite; opacity: 0.4;
}
@keyframes gridFlow { 0%{background-position:0 0} 100%{background-position:40px 40px} }

.orb {
  position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.1;
  animation: orbMove 50s ease-in-out infinite alternate; z-index: -1;
}
.orb-1 { width: 600px; height: 600px; background: var(--neon-blue); top: -20%; left: -10%; }
.orb-2 { width: 500px; height: 500px; background: var(--neon-purple); bottom: -20%; right: -10%; animation-delay: -25s; }
@keyframes orbMove { 0%{transform:translate(0,0)} 100%{transform:translate(30px,30px)} }

.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
.particle {
  position: absolute; width: 2px; height: 2px; border-radius: 50%;
  background: var(--neon-blue); opacity: 0; animation: floatUp 25s infinite ease-in-out;
  box-shadow: 0 0 8px var(--neon-blue);
}
.particle:nth-child(2n){background:#fff; animation-delay:-10s}
@keyframes floatUp { 0%,100%{transform:translateY(110vh);opacity:0} 50%{opacity:1} 100%{transform:translateY(-10vh)} }

/* === LAYOUT === */
.main-container { position: relative; z-index: 10; max-width: 1300px; margin: 0 auto; padding: 16px; }

.header-section { text-align: center; padding: 30px 0 20px; }

.main-title {
  font-family: 'Orbitron', sans-serif; font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 800; letter-spacing: 3px;
  background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 50%, var(--neon-purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
  position: relative; display: inline-block;
}
.main-title::after {
  content: ''; position: absolute; bottom: -10px; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
  box-shadow: 0 0 10px var(--neon-blue);
}

/* === TABS === */
.tabs-container {
  display: flex; justify-content: center; gap: 8px; margin: 20px 0;
  background: rgba(10, 15, 40, 0.6); border: 1px solid var(--border-neon);
  border-radius: 50px; padding: 6px; max-width: fit-content; margin-inline: auto;
  backdrop-filter: blur(10px); box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
}
.tab-chip {
  padding: 10px 30px; font-family: 'Orbitron', sans-serif; font-weight: 600; font-size: 0.9rem;
  color: var(--fg-muted); background: transparent; border: none; border-radius: 40px;
  cursor: pointer; transition: all var(--transition); position: relative; overflow: hidden;
  text-transform: uppercase; letter-spacing: 1px;
}
.tab-chip:hover { color: #fff; text-shadow: 0 0 8px var(--neon-blue); }
.tab-chip.active {
  color: #000; background: var(--neon-blue);
  box-shadow: 0 0 20px var(--neon-blue), inset 0 0 10px rgba(255,255,255,0.5);
  font-weight: 700;
}

/* === CONTENT BOX === */
.content-box {
  background: rgba(5, 8, 20, 0.7); border: 1px solid var(--border-neon);
  border-radius: 24px; padding: 24px; backdrop-filter: blur(20px);
  position: relative; overflow: hidden;
  box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
}
.content-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
  box-shadow: 0 0 10px var(--neon-blue);
}

/* === SETTINGS PANEL === */
.settings-panel {
  background: linear-gradient(90deg, rgba(0, 243, 255, 0.05), transparent);
  border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 16px;
  padding: 16px; margin-bottom: 24px; display: flex; flex-wrap: nowrap; gap: 16px; align-items: center;
  backdrop-filter: blur(5px);
}
.setting-label { color: var(--neon-blue); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.input-neon {
  padding: 10px 16px; background: rgba(0, 0, 0, 0.6); border: 1px solid var(--border-neon);
  border-radius: 8px; color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 1rem;
  transition: all var(--transition); width: 180px;
}
.input-neon:focus { outline: none; border-color: #fff; box-shadow: 0 0 15px var(--neon-blue); background: rgba(0, 243, 255, 0.1); }

/* === BUTTONS === */
.btn-neon {
  padding: 10px 24px; background: var(--neon-blue);
  border: none; border-radius: 8px; color: #000; font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all var(--transition);
  text-transform: uppercase; letter-spacing: 1px;
  box-shadow: 0 0 15px var(--neon-blue);
}
.btn-neon:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--neon-blue); background: #fff; }

/* === DATA GRID === */
.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

/* === SECTION BOX === */
.section-box {
  background: rgba(10, 15, 35, 0.5); border: 1px solid rgba(0, 243, 255, 0.15);
  border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
  transition: all var(--transition);
}
.section-box:hover { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 243, 255, 0.15); transform: translateY(-3px); }
.section-header {
  background: linear-gradient(90deg, rgba(0, 243, 255, 0.1), transparent);
  padding: 12px 16px; border-bottom: 1px solid rgba(0, 243, 255, 0.1);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-blue); font-size: 0.95rem; }
.badge-count { background: rgba(0, 243, 255, 0.2); color: #fff; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; border: 1px solid var(--neon-blue); }

.search-input {
  width: 100%; padding: 8px 12px; background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 8px; color: #fff;
  font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
}
.search-input:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 243, 255, 0.3); }
.section-content { padding: 12px; overflow-y: auto; max-height: 400px; flex-grow: 1; }

/* === ITEM CARD === */
.item-card {
  background: rgba(15, 20, 45, 0.6); border: 1px solid rgba(0, 243, 255, 0.1);
  border-radius: 12px; padding: 12px; margin-bottom: 10px; cursor: pointer;
  transition: all var(--transition); position: relative; overflow: hidden;
}
.item-card:hover { border-color: var(--neon-blue); background: rgba(0, 243, 255, 0.08); transform: translateX(5px); }
.item-title { color: var(--neon-blue); font-weight: 700; margin-bottom: 4px; font-size: 0.9rem; }
.item-content { font-size: 0.85rem; color: #ddd; line-height: 1.4; }

/* === NEON SELECTOR === */
.neon-selector {
  background: rgba(10, 15, 40, 0.6); border: 1px solid var(--border-neon);
  border-radius: 20px; padding: 20px; margin: 20px 0;
  backdrop-filter: blur(10px); position: relative;
  box-shadow: 0 0 30px rgba(0, 243, 255, 0.05);
}
.neon-selector::before {
  content: ''; position: absolute; top: -1px; left: 20px; right: 20px; height: 1px;
  background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue);
}
.selector-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.selector-icon { font-size: 1.5rem; filter: drop-shadow(0 0 5px var(--neon-blue)); }
.selector-title { font-family: 'Orbitron', sans-serif; font-weight: 700; color: #fff; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }

.chip-group { margin-bottom: 16px; }
.chip-label { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--neon-blue); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.chips-row { display: flex; flex-wrap: wrap; gap: 8px; }

.chip {
  padding: 8px 16px; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--border-neon);
  border-radius: 20px; color: var(--fg-muted); font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: all var(--transition);
}
.chip:hover { border-color: #fff; color: #fff; box-shadow: 0 0 10px rgba(0, 243, 255, 0.3); }
.chip.active {
  background: var(--neon-blue); color: #000; border-color: var(--neon-blue);
  box-shadow: 0 0 15px var(--neon-blue); font-weight: 700;
}

/* === RESULT BOX - WHITE TEXT === */
.result-box {
  margin-top: 20px; padding: 20px;
  background: linear-gradient(135deg, rgba(0, 20, 40, 0.9), rgba(0, 30, 60, 0.8));
  border: 1px solid var(--neon-blue); border-radius: 16px;
  font-family: 'Orbitron', sans-serif; font-size: 1.5rem;
  color: #ffffff; text-align: center; min-height: 60px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); cursor: pointer;
  box-shadow: 0 0 20px rgba(0, 243, 255, 0.2), inset 0 0 20px rgba(0, 243, 255, 0.1);
  position: relative; overflow: hidden;
}
.result-box::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: skewX(-25deg); animation: shine 3s infinite;
}
@keyframes shine { 0%{left:-100%} 20%{left:200%} 100%{left:200%} }
.result-box:hover { box-shadow: 0 0 30px rgba(0, 243, 255, 0.4); transform: scale(1.02); }
.result-box.copied { border-color: #00ffaa; box-shadow: 0 0 30px rgba(0, 255, 170, 0.5); color: #00ffaa; }

/* === ✏️ ULTRA COOL EDITABLE RESULT === */
.edit-result-wrapper {
  margin-top: 20px;
  background: rgba(0, 5, 15, 0.8);
  border: 1px solid var(--border-neon);
  border-radius: 12px;
  padding: 4px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
  transition: all var(--transition);
}
.edit-result-wrapper::before {
  content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
  background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue);
}
.edit-result-wrapper:hover {
  border-color: #fff;
  box-shadow: 0 0 25px rgba(0, 243, 255, 0.3);
}

.edit-result-content {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
}

.edit-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.75rem;
  color: var(--neon-blue);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.edit-label svg { width: 16px; height: 16px; fill: var(--neon-blue); }

.input-edit-result {
  flex: 1;
  padding: 10px 14px;
  background: rgba(0, 0, 0, 0.6);
  border: 1px solid rgba(0, 243, 255, 0.3);
  border-radius: 6px;
  color: #00f3ff; /* Cyan Text */
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1rem;
  font-weight: 700;
  transition: all var(--transition);
  text-align: right;
  letter-spacing: 1px;
}
.input-edit-result:focus {
  outline: none;
  border-color: #fff;
  background: rgba(0, 243, 255, 0.1);
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
  text-shadow: 0 0 8px rgba(0, 243, 255, 0.8);
}
.input-edit-result::placeholder { color: rgba(0, 243, 255, 0.3); text-shadow: none; }

.btn-save-edit {
  padding: 10px 20px;
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.1), rgba(0, 243, 255, 0.2));
  border: 1px solid var(--neon-blue);
  border-radius: 6px;
  color: var(--neon-blue);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
  text-transform: uppercase;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-save-edit:hover {
  background: var(--neon-blue);
  color: #000;
  box-shadow: 0 0 20px var(--neon-blue);
  transform: translateY(-2px);
}
.btn-save-edit svg { width: 16px; height: 16px; fill: currentColor; }

.hitung-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: end; margin-top: 6px; }
.hitung-btn {
  padding: 12px 24px; background: linear-gradient(135deg, var(--neon-blue), #008c99);
  border: none; border-radius: 8px; color: #000; font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all var(--transition);
  text-transform: uppercase; letter-spacing: 1px;
  box-shadow: 0 0 15px var(--neon-blue);
}
.hitung-btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--neon-blue); filter: brightness(1.2); }

/* === TOAST === */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: rgba(0, 10, 20, 0.95); border: 1px solid var(--neon-blue);
  color: var(--neon-blue); padding: 12px 30px; border-radius: 50px;
  font-weight: 700; font-size: 0.9rem; opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 1000; backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0, 243, 255, 0.4), 0 0 40px rgba(0, 243, 255, 0.2);
  text-shadow: 0 0 10px rgba(0, 243, 255, 0.8);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* === SPINNER === */
.spinner {
  width: 30px; height: 30px; border: 3px solid rgba(0, 243, 255, 0.2);
  border-top-color: var(--neon-blue); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #fff; }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .settings-panel { flex-direction: column; align-items: stretch; }
  .input-neon { width: 100%; }
  .data-grid { grid-template-columns: 1fr; }
  .edit-result-content { flex-direction: column; align-items: stretch; }
  .input-edit-result { text-align: left; }
  .btn-save-edit { justify-content: center; width: 100%; }
}
</style>
</head>
<body>
<div class="bg-neon"></div>
<div class="grid-lines"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="particles" id="particles"></div>
<div id="toast" class="toast">✨ System Ready</div>

<div class="main-container">
  <header class="header-section">
    <h1 class="main-title">⚡ HOLO-DECK: PREDIKSI & HITUNG ⚡</h1>
  </header>

  <nav class="tabs-container">
    <button class="tab-chip active" data-tab="prediksi">🔮 Prediksi</button>
    <button class="tab-chip" data-tab="hitung">🧮 Hitung</button>
  </nav>

  <div class="content-box">
    <!-- TAB PREDIKSI -->
    <div id="tab-prediksi" class="tab-content">
      <div class="settings-panel">
        <div class="setting-item" style="display:flex;align-items:center;gap:10px">
          <span class="setting-label">📅 Tanggal</span>
          <input type="date" id="input-tanggal" class="input-neon" onchange="autoUpdateTanggal()">
        </div>
        <button class="btn-neon" id="btn-tanggal" onclick="manualUpdateTanggal()">⚡ Update</button>
        <span class="status-badge" id="status-tanggal" style="color:#00ffaa;font-weight:700"></span>
      </div>
      <div class="data-grid">
        <div class="section-box">
          <div class="section-header"><h3 class="section-title">🔮 Prediksi</h3><span class="badge-count" id="count-prediksi">0</span></div>
          <div style="padding:10px"><input type="text" class="search-input" id="search-prediksi" placeholder="🔍 Search Data..."></div>
          <div class="section-content" id="list-prediksi"><div style="display:flex;justify-content:center;padding:20px"><div class="spinner"></div></div></div>
        </div>
        <div class="section-box">
          <div class="section-header"><h3 class="section-title">📅 Jadwal</h3><span class="badge-count" id="count-jadwal">0</span></div>
          <div style="padding:10px"><input type="text" class="search-input" id="search-jadwal" placeholder="🔍 Search Data..."></div>
          <div class="section-content" id="list-jadwal"><div style="display:flex;justify-content:center;padding:20px"><div class="spinner"></div></div></div>
        </div>
        <div class="section-box">
          <div class="section-header"><h3 class="section-title">🔗 Link Live</h3><span class="badge-count" id="count-link">0</span></div>
          <div style="padding:10px"><input type="text" class="search-input" id="search-link" placeholder="🔍 Search Data..."></div>
          <div class="section-content" id="list-link"><div style="display:flex;justify-content:center;padding:20px"><div class="spinner"></div></div></div>
        </div>
      </div>
    </div>

    <!-- TAB HITUNG -->
    <div id="tab-hitung" class="tab-content" style="display:none;">
      <div class="settings-panel">
        <div class="setting-item" style="display:flex;align-items:center;gap:10px">
          <span class="setting-label">💰 Nominal</span>
          <input type="number" id="input-nominal" class="input-neon" placeholder="0" onchange="autoUpdateNominal()">
        </div>
        <button class="btn-neon" id="btn-nominal" onclick="manualUpdateNominal()">⚡ Update</button>
        <span class="status-badge" id="status-nominal" style="color:#00ffaa;font-weight:700"></span>
      </div>

      <div class="neon-selector">
        <div class="selector-header">
          <span class="selector-icon">🎯</span>
          <h3 class="selector-title">Calculation Module</h3>
        </div>
        
        <div class="chip-group">
          <div class="chip-label">📊 Select Type</div>
          <div class="chips-row" id="chipTipe"><div class="chip" data-value="">All Types</div></div>
        </div>
        
        <div class="chip-group">
          <div class="chip-label">🏷️ Select Label</div>
          <div class="chips-row" id="chipLabel"><div class="chip" data-value="">All Labels</div></div>
        </div>
        
        <div class="hitung-row">
          <button onclick="tampilkanValueHitungan()" class="hitung-btn">✨ Calculate Result</button>
        </div>
        
        <!-- RESULT DISPLAY -->
        <div id="resultBox" class="result-box">
          <span style="color:var(--fg-muted);font-size:1rem">Select type & label to view result</span>
        </div>
        
        <!-- ✏️ ULTRA COOL EDITABLE RESULT -->
        <div class="edit-result-wrapper">
          <div class="edit-result-content">
            <span class="edit-label">
              <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
              Manual Edit
            </span>
            <input type="text" id="inputEditResult" class="input-edit-result" placeholder="Result appears here...">
            <button class="btn-save-edit" onclick="saveEditedResult()">
              <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
              Save
            </button>
          </div>
        </div>
        
      </div>
      <div class="data-grid" id="container-hitung" style="margin-top:12px"><div style="display:flex;justify-content:center;padding:40px;width:100%"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<script>
// === KONFIGURASI ===
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4', keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'), inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'), contH: $('container-hitung'),
  toast: $('toast'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox'),
  inputEditResult: $('inputEditResult')
};
let selectedTipe = '', selectedLabel = '', autoRefreshEnabled = true;

// === UTILS ===
function createParticles() {
  const container = $('particles'); if (!container) return;
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    p.style.left = Math.random() * 100 + '%'; p.style.animationDelay = Math.random() * 25 + 's';
    p.style.animationDuration = (20 + Math.random() * 15) + 's'; container.appendChild(p);
  }
}
function showToast(msg) { dom.toast.textContent = '✨ ' + msg; dom.toast.classList.add('show'); setTimeout(() => dom.toast.classList.remove('show'), 3000); }
function copyText(text, element) {
  let final = text; try { final = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(final).then(() => {
    const preview = final.length > 20 ? final.substring(0, 20) + '...' : final;
    showToast('📋 Copied: ' + preview);
    if (element) { element.classList.add('copied'); setTimeout(() => element.classList.remove('copied'), 500); }
  }).catch(() => showToast('❌ Copy Failed'));
}
function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }
function parseCSV(text) {
  let rows = [], row = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (inQ) { if (c === '"' && n === '"') { cell += '"'; i++; } else if (c === '"') inQ = false; else cell += c; }
    else { if (c === '"') inQ = true; else if (c === ',') { row.push(cell); cell = ""; }
      else if ((c === '\r' && n === '\n') || c === '\n' || c === '\r') { row.push(cell); rows.push(row); row = []; cell = ""; if (c === '\r' && n === '\n') i++; }
      else cell += c; }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}
function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL Error!'); return false; }
  try { const params = new URLSearchParams({ action, value }); const res = await fetch(SCRIPT_URL + '?' + params.toString()); return (await res.text()).includes('SUCCESS'); }
  catch(e) { console.error(e); return false; }
}

// === FETCH DATA ===
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now()), data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) { const raw = safeGet(data[0], 1); if (raw) { const p = raw.split('/'); if (p.length === 3) { dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`; dom.statTgl.textContent = "OK"; } } }
    for (let i = 2; i <= 84 && i < data.length; i++) { const t = safeGet(data[i], 1); if (t) state.prediksi.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    for (let i = 2; i <= 55 && i < data.length; i++) { const t = safeGet(data[i], 2); if (t) state.jadwal.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    for (let i = 56; i <= 82 && i < data.length; i++) { const t = safeGet(data[i], 2); if (t) state.link.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    renderPrediksi();
  } catch(e) { console.error(e); dom.listP.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:20px">❌ Load Error</p>'; }
}
async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now()), data = parseCSV(await res.text());
    if (data[0]) { const nom = safeGet(data[0], 23); if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "Rp " + formatNum(nom); } }
    const sec = [{r:0,c:24,s:2,e:42},{r:43,c:24,s:45,e:80},{r:81,c:24,s:83,e:119},{r:120,c:24,s:122,e:153},{r:154,c:24,s:156,e:179},{r:180,c:24,s:182,e:213},{r:215,c:24,s:217,e:248},{r:249,c:24,s:251,e:282},{r:283,c:24,s:285,e:316}];
    state.hitung = sec.map(x => { let title = safeGet(data[x.r], x.c) || "MARKET", items = [];
      for (let i = x.s; i <= x.e && i < data.length; i++) if (data[i]) { const ty = safeGet(data[i], 23), rv = safeGet(data[i], 24); if (ty || rv) items.push({ type: ty, res: rv }); }
      return { title, items }; }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) { console.error(e); dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:20px">❌ Load Error</p>'; }
}

// === RENDER ===
function renderList(container, items, search) {
  const f = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!f.length) { container.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:20px">📭 No Data</p>'; return; }
  container.innerHTML = f.map(v => `<div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}',this)"><div class="item-title">${v.title}</div><div class="item-content">${v.content}</div></div>`).join('');
}
function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value); renderList(dom.listJ, state.jadwal, dom.srcJ.value); renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length; dom.cntJ.textContent = state.jadwal.length; dom.cntL.textContent = state.link.length;
}
function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center">📭 No Data</p>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `<div class="pasaran-box"><div class="pasaran-header"><h3 class="pasaran-title">🎯 ${s.title}</h3></div><div class="pasaran-content">${s.items.map(it => `<div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}',this)"><span class="bet-type">${it.type}</span><span class="bet-result">${it.res}</span></div>`).join('')}</div></div>`).join('');
}

// === CHIP SELECTOR ===
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">All</div>' + items.map(it => `<div class="chip" data-value="${it.label||it}">${(it.label||it).substring(0,15)}${(it.label||it).length>15?'...':''}</div>`).join('');
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); chip.classList.add('active');
      if (type === 'tipe') { selectedTipe = chip.dataset.value; updateLabelChips(); } else { selectedLabel = chip.dataset.value; }
      if (autoRefreshEnabled && selectedTipe && selectedLabel) { refreshResultAuto(); }
    };
  });
}
function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) { renderChips(dom.chipLabel, [], 'label'); return; }
  const labels = state.kelompok[selectedTipe].map(i => i.label); renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}
async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now()), data = parseCSV(await res.text());
    if (data[0]) { const nom = safeGet(data[0], 23); if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "Rp " + formatNum(nom); } }
    const sec = [{r:0,c:24,s:2,e:42,t:"ALL MARKETS"},{r:43,c:24,s:45,e:80,t:"MACAU 4D"},{r:81,c:24,s:83,e:119,t:"MACAU 5D"},{r:120,c:24,s:122,e:153,t:"KINGKONG 4D"},{r:154,c:24,s:156,e:179,t:"BONUS"},{r:180,c:24,s:182,e:213,t:"JAKARTA"},{r:215,c:24,s:217,e:248,t:"TOTOMALI"},{r:249,c:24,s:251,e:282,t:"HOKIDRAW"},{r:283,c:24,s:285,e:316,t:"SYDNEY & HK"}];
    state.kelompok = {};
    sec.forEach(x => { const items = []; for (let i = x.s; i <= x.e && i < data.length; i++) if (data[i]) { const lb = safeGet(data[i],23), vl = safeGet(data[i],24); if (lb||vl) items.push({ label: lb||"-", value: vl||"-" }); } if (items.length > 0) state.kelompok[x.t] = items; });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error(e); }
}

// === RESULT DISPLAY + AUTO-REFRESH ===
function tampilkanValueHitungan() {
  const result = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = '<span style="color:var(--fg-muted);font-size:1rem">Select type & label first</span>'; 
    dom.inputEditResult.value = ''; 
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    result.innerHTML = `<span style="font-weight:700;color:#ffffff;text-shadow:0 0 15px rgba(255,255,255,0.5)">${item.value}</span>`;
    result.title = 'Click to copy'; result.onclick = () => copyText(item.value, result);
    
    // ✏️ AUTO-FILL EDITABLE INPUT
    dom.inputEditResult.value = item.value;
  }
}
function refreshResultAuto() {
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) return;
  const result = dom.resultBox;
  setTimeout(() => {
    const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
    if (item) {
      result.innerHTML = `<span style="font-weight:700;color:#ffffff;text-shadow:0 0 15px rgba(255,255,255,0.5)">${item.value}</span>`;
      result.title = 'Click to copy'; result.onclick = () => copyText(item.value, result);
      showToast('🔄 Result Updated');
      
      // ✏️ AUTO-FILL EDITABLE INPUT
      dom.inputEditResult.value = item.value;
    }
  }, 300);
}

// ✏️ SAVE EDITED RESULT
function saveEditedResult() {
  const editedValue = dom.inputEditResult.value.trim();
  if (!editedValue) { showToast('⚠️ Input empty!'); return; }
  
  dom.resultBox.innerHTML = `<span style="font-weight:700;color:#00ffaa;text-shadow:0 0 15px rgba(0,255,170,0.5)">${editedValue} <span style="font-size:0.7em;color:#fff">(Edited)</span></span>`;
  dom.resultBox.classList.add('copied');
  setTimeout(() => dom.resultBox.classList.remove('copied'), 600);
  showToast('✅ Manual Save Successful');
}

// === AUTO-UPDATE ===
let autoTimeout = null;
function autoUpdateTanggal() { clearTimeout(autoTimeout); autoTimeout = setTimeout(manualUpdateTanggal, 1000); }
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Select date!"); const p = dom.inTgl.value.split('-'), fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "⏳";
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) { localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value); dom.statTgl.textContent = "✅"; showToast("📅 Saved!"); fetchPrediksi(); fetchHitung(); loadHitungData(); }
    else { dom.statTgl.textContent = "❌"; showToast("❌ Script Error"); }
  });
}
function autoUpdateNominal() { clearTimeout(autoTimeout); autoTimeout = setTimeout(() => { manualUpdateNominal(); if (autoRefreshEnabled && selectedTipe && selectedLabel) { setTimeout(refreshResultAuto, 500); } }, 1000); }
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Enter nominal!"); dom.btnNom.disabled = true; dom.statNom.textContent = "⏳";
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "Rp " + formatNum(dom.inNom.value);
      showToast("💰 Saved!");
      fetchPrediksi(); fetchHitung(); loadHitungData();
      if (autoRefreshEnabled && selectedTipe && selectedLabel) { setTimeout(refreshResultAuto, 400); }
    } else { dom.statNom.textContent = "❌"; showToast("❌ Script Error"); }
  });
}

// === INIT ===
function init() {
  document.querySelectorAll('.tab-chip').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active')); t.classList.add('active');
    dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none'; dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
  });
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  fetchPrediksi(); fetchHitung(); loadHitungData();
}
document.addEventListener('DOMContentLoaded', () => { createParticles(); init(); setTimeout(() => showToast('🚀 System Online'), 1000); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg: #02041a;
  --bg-card: rgba(8, 12, 45, 0.75);
  --bg-card-hover: rgba(15, 22, 65, 0.9);
  --fg: #e6f4ff;
  --fg-muted: #8ab4f8;
  --neon-blue: #00d4ff;
  --neon-blue-bright: #66e6ff;
  --neon-blue-dark: #0099cc;
  --neon-purple: #7b61ff;
  --neon-pink: #ff3d9b;
  --glow-blue: 0 0 12px #00d4ff, 0 0 28px #00d4ff80, 0 0 55px #00d4ff40;
  --glow-blue-lg: 0 0 18px #00d4ff, 0 0 42px #00d4ff90, 0 0 85px #00d4ff50;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-bloom: 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg); color: var(--fg);
  min-height: 100vh; overflow-x: hidden; position: relative;
  line-height: 1.5;
}

/* === BACKGROUND === */
.bg-neon {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(1000px 500px at 15% 15%, rgba(0, 212, 255, 0.1), transparent 65%),
    radial-gradient(800px 400px at 85% 25%, rgba(123, 97, 255, 0.08), transparent 65%),
    radial-gradient(900px 450px at 50% 95%, rgba(0, 212, 255, 0.12), transparent 65%),
    linear-gradient(180deg, #02041a 0%, #060a2e 50%, #02041a 100%);
  animation: bgPulse 35s ease-in-out infinite;
}
@keyframes bgPulse {
  0%, 100% { filter: hue-rotate(0deg) brightness(1); }
  33% { filter: hue-rotate(8deg) brightness(1.03); }
  66% { filter: hue-rotate(-6deg) brightness(0.98); }
}

.grid-lines {
  position: fixed; inset: 0; z-index: -2;
  background-image: 
    linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
  background-size: 45px 45px; animation: gridFlow 45s linear infinite; opacity: 0.8;
}
@keyframes gridFlow { 0% { background-position: 0 0; } 100% { background-position: 45px 45px; } }

.orb {
  position: fixed; border-radius: 50%; filter: blur(70px); opacity: 0.18;
  animation: orbMove 40s ease-in-out infinite alternate; z-index: -1;
}
.orb-1 { width: 650px; height: 650px; background: var(--neon-blue); top: -25%; left: -10%; }
.orb-2 { width: 480px; height: 480px; background: var(--neon-purple); bottom: -20%; right: -8%; animation-delay: -20s; }
@keyframes orbMove {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(35px, -25px) scale(1.06); }
  100% { transform: translate(-20px, 30px) scale(0.96); }
}

.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
.particle {
  position: absolute; width: 2px; height: 2px; border-radius: 50%;
  background: var(--neon-blue); opacity: 0;
  animation: floatUp 28s infinite ease-in-out;
  box-shadow: 0 0 10px var(--neon-blue), 0 0 25px var(--neon-blue);
}
.particle:nth-child(2n) { background: var(--neon-blue-bright); animation-delay: -10s; }
.particle:nth-child(3n) { background: var(--neon-purple); animation-delay: -18s; }
@keyframes floatUp {
  0%, 100% { transform: translateY(110vh) rotate(0); opacity: 0; }
  12% { opacity: 1; }
  88% { opacity: 1; }
  100% { transform: translateY(-15vh) rotate(680deg); opacity: 0; }
}

.main-container { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 14px; }

.header-section { text-align: center; padding: 26px 0 18px; animation: fadeIn 0.7s var(--transition-bloom) backwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); } }

.main-title {
  font-family: 'Orbitron', sans-serif; font-size: clamp(1.7rem, 5.2vw, 3rem);
  font-weight: 900; letter-spacing: 2.5px;
  background: linear-gradient(135deg, #fff 0%, var(--neon-blue-bright) 35%, var(--neon-blue) 65%, var(--neon-purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--glow-blue); animation: titleShimmer 3.5s ease-in-out infinite;
}
@keyframes titleShimmer { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.28); } }
.main-title::after {
  content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
  width: 75%; height: 2px; background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-blue-bright), transparent);
  animation: linePulse 2.8s ease-in-out infinite;
}
@keyframes linePulse { 0%, 100% { opacity: 0.65; } 50% { opacity: 1; } }

/* === TABS - NEON CHIPS === */
.tabs-container {
  display: flex; justify-content: center; gap: 6px; margin: 10px 0 18px;
  background: rgba(10, 16, 52, 0.6); border: 1px solid rgba(0, 212, 255, 0.3);
  border-radius: 16px; padding: 5px; max-width: fit-content; margin-inline: auto;
}
.tab-chip {
  padding: 11px 26px; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.88rem;
  color: var(--fg-muted); background: transparent; border: none; border-radius: 12px;
  cursor: pointer; transition: all var(--transition); position: relative;
  text-transform: uppercase; letter-spacing: 1px;
}
.tab-chip::after {
  content: ''; position: absolute; inset: 0; border-radius: 12px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0, 212, 255, 0.4), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--transition);
}
.tab-chip:hover { color: var(--neon-blue); }
.tab-chip:hover::after { opacity: 1; }
.tab-chip.active {
  color: var(--fg); background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(123, 97, 255, 0.15));
  border: 1px solid rgba(0, 212, 255, 0.5); box-shadow: var(--glow-blue);
}
.tab-chip.active::before {
  content: ''; position: absolute; bottom: -1px; left: 18%; right: 18%; height: 2px;
  background: var(--neon-blue); border-radius: 2px; box-shadow: 0 0 14px var(--neon-blue);
}

/* === CONTENT BOX === */
.content-box {
  background: var(--bg-card); border: 1px solid rgba(0, 212, 255, 0.25);
  border-radius: 22px; padding: 20px; backdrop-filter: blur(18px);
  position: relative; overflow: hidden;
}
.content-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-blue-bright), transparent);
  animation: scanLine 4.5s linear infinite;
}
@keyframes scanLine { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

/* === SETTINGS PANEL === */
.settings-panel {
  background: linear-gradient(135deg, rgba(12, 18, 58, 0.7), rgba(18, 26, 72, 0.6));
  border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 18px;
  padding: 15px 18px; margin-bottom: 20px; display: flex; flex-wrap: nowrap; gap: 15px; align-items: center;
}
.setting-item { display: flex; align-items: center; gap: 9px; white-space: nowrap; }
.setting-label {
  color: var(--neon-blue); font-size: 0.8rem; font-weight: 600;
  text-shadow: 0 0 9px rgba(0, 212, 255, 0.6);
}
.input-neon {
  padding: 9px 13px; background: rgba(6, 10, 32, 0.8);
  border: 1px solid rgba(0, 212, 255, 0.35); border-radius: 11px;
  color: var(--fg); font-size: 0.9rem; width: 165px; transition: all var(--transition);
  font-family: 'Space Grotesk', sans-serif;
}
.input-neon:focus {
  outline: none; border-color: var(--neon-blue); box-shadow: var(--glow-blue);
  background: rgba(10, 14, 42, 0.9);
}

/* === BUTTONS === */
.btn-neon {
  padding: 9px 20px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
  border: none; border-radius: 13px; color: #02041a; font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: all var(--transition);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1px; position: relative; overflow: hidden;
}
.btn-neon::before {
  content: ''; position: absolute; inset: 0; border-radius: 13px; padding: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity 0.25s;
}
.btn-neon:hover::before { opacity: 1; }
.btn-neon:hover { transform: translateY(-2px); box-shadow: var(--glow-blue-lg); }
.btn-neon:active { transform: translateY(0); }
.btn-neon:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.status-badge {
  font-size: 0.8rem; color: #00ffaa; margin-left: 7px; font-weight: 600;
  text-shadow: 0 0 11px rgba(0, 255, 170, 0.65); animation: blink 2.2s ease-in-out infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.78; } }

/* === DATA GRID === */
.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 17px; }

/* === SECTION BOX === */
.section-box {
  background: linear-gradient(145deg, rgba(14, 20, 56, 0.75), rgba(20, 28, 72, 0.65));
  border: 1px solid rgba(0, 212, 255, 0.22); border-radius: 19px;
  overflow: hidden; display: flex; flex-direction: column; transition: all var(--transition);
}
.section-box:hover { border-color: rgba(0, 212, 255, 0.5); box-shadow: var(--glow-blue); transform: translateY(-2px); }
.section-header {
  background: linear-gradient(90deg, rgba(0, 212, 255, 0.14), transparent 75%);
  padding: 11px 15px; border-bottom: 1px solid rgba(0, 212, 255, 0.18);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-blue);
  font-size: 0.93rem; text-shadow: 0 0 11px rgba(0, 212, 255, 0.65);
}
.badge-count {
  background: rgba(0, 212, 255, 0.18); color: var(--neon-blue);
  padding: 3px 9px; border-radius: 18px; font-size: 0.7rem; font-weight: 700;
  border: 1px solid rgba(0, 212, 255, 0.4);
}

.search-box { padding: 9px 13px; border-bottom: 1px solid rgba(0, 212, 255, 0.14); }
.search-input {
  width: 100%; padding: 8px 12px; background: rgba(8, 12, 38, 0.7);
  border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 11px;
  color: var(--fg); font-size: 0.87rem; transition: all var(--transition);
}
.search-input:focus { outline: none; border-color: var(--neon-blue); box-shadow: var(--glow-blue); }
.search-input::placeholder { color: var(--fg-muted); opacity: 0.75; }

.section-content { padding: 9px; overflow-y: auto; max-height: 410px; flex-grow: 1; }

/* === ITEM CARD === */
.item-card {
  background: linear-gradient(135deg, rgba(12, 18, 52, 0.7), rgba(18, 24, 64, 0.6));
  border: 1px solid rgba(0, 212, 255, 0.24); border-radius: 15px;
  padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: all var(--transition);
  position: relative; overflow: hidden;
}
.item-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 15px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0, 212, 255, 0.3), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--transition);
}
.item-card:hover::before { opacity: 1; }
.item-card:hover {
  border-color: var(--neon-blue); box-shadow: var(--glow-blue);
  background: linear-gradient(135deg, rgba(16, 22, 58, 0.8), rgba(22, 28, 70, 0.7));
  transform: translateY(-2px);
}
.item-label { font-size: 0.67rem; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 1.9px; margin-bottom: 2px; font-weight: 600; }
.item-title { color: var(--neon-blue); font-weight: 700; margin-bottom: 4px; font-size: 0.9rem; }
.item-content { font-size: 0.82rem; color: var(--fg); line-height: 1.42; white-space: pre-wrap; word-break: break-word; }

/* === PASARAN BOX === */
.pasaran-box {
  background: linear-gradient(135deg, rgba(13, 19, 54, 0.72), rgba(19, 26, 68, 0.62));
  border: 1px solid rgba(0, 212, 255, 0.23); border-radius: 17px;
  overflow: hidden; margin-bottom: 10px; transition: all var(--transition);
}
.pasaran-box:hover { border-color: rgba(0, 212, 255, 0.48); box-shadow: var(--glow-blue); }
.pasaran-header {
  background: linear-gradient(90deg, rgba(0, 212, 255, 0.16), transparent 75%);
  padding: 11px 15px; border-bottom: 1px solid rgba(0, 212, 255, 0.17);
}
.pasaran-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-blue);
  font-size: 0.87rem; text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
}
.pasaran-content { padding: 7px 11px; max-height: 330px; overflow-y: auto; }

.bet-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; margin-bottom: 5px; background: rgba(10, 14, 40, 0.6);
  border: 1px solid rgba(0, 212, 255, 0.21); border-radius: 11px;
  cursor: pointer; transition: all var(--transition);
}
.bet-item:hover {
  border-color: var(--neon-blue); background: rgba(14, 19, 52, 0.75);
  box-shadow: var(--glow-blue); transform: translateX(3px);
}
.bet-type { color: var(--fg); font-size: 0.82rem; flex: 1; margin-right: 9px; font-weight: 500; }
.bet-result {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-blue);
  font-size: 0.82rem; background: rgba(0, 212, 255, 0.14);
  padding: 3px 8px; border-radius: 9px; border: 1px solid rgba(0, 212, 255, 0.33);
}
.bet-item:hover .bet-result {
  background: rgba(0, 212, 255, 0.25); box-shadow: 0 0 13px rgba(0, 212, 255, 0.4);
}

/* === NEON SELECTOR - NO DROPDOWN! === */
.neon-selector {
  background: linear-gradient(135deg, rgba(14, 20, 58, 0.78), rgba(20, 28, 74, 0.68));
  border: 1px solid rgba(0, 212, 255, 0.28); border-radius: 19px;
  padding: 17px; margin: 17px 0; backdrop-filter: blur(12px);
}
.selector-header {
  display: flex; align-items: center; gap: 11px; margin-bottom: 15px;
  padding-bottom: 13px; border-bottom: 1px solid rgba(0, 212, 255, 0.22);
}
.selector-icon { font-size: 1.35rem; animation: iconFloat 3s ease-in-out infinite; }
@keyframes iconFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
.selector-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-blue);
  font-size: 1rem; text-shadow: 0 0 11px rgba(0, 212, 255, 0.65);
}

/* === CHIP GROUP === */
.chip-group { margin-bottom: 14px; }
.chip-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.79rem; font-weight: 700;
  color: var(--neon-blue); margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.chip-label::before {
  content: ''; width: 3px; height: 14px; background: var(--neon-blue);
  border-radius: 2px; box-shadow: 0 0 8px var(--neon-blue);
}
.chips-row { display: flex; flex-wrap: wrap; gap: 7px; }

.chip {
  padding: 7px 14px; background: rgba(8, 14, 42, 0.75);
  border: 1px solid rgba(0, 212, 255, 0.28); border-radius: 25px;
  color: var(--fg-muted); font-size: 0.81rem; font-weight: 600;
  cursor: pointer; transition: all var(--transition);
  position: relative; overflow: hidden;
}
.chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 25px;
  background: linear-gradient(135deg, transparent, rgba(0, 212, 255, 0.25), transparent);
  opacity: 0; transition: opacity var(--transition);
}
.chip:hover { color: var(--neon-blue); border-color: rgba(0, 212, 255, 0.5); }
.chip:hover::before { opacity: 1; }
.chip.active {
  color: #02041a; background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
  border-color: var(--neon-blue); box-shadow: var(--glow-blue); font-weight: 700;
}
.chip.active::after {
  content: '✓'; position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-size: 0.75rem; font-weight: 900; animation: checkPop 0.3s var(--transition-bloom);
}
@keyframes checkPop { 0% { transform: translateY(-50%) scale(0); } 70% { transform: translateY(-50%) scale(1.3); } 100% { transform: translateY(-50%) scale(1); } }

/* === RESULT BOX === */
.result-box {
  margin-top: 16px; padding: 16px 20px;
  background: rgba(10, 16, 48, 0.82); border: 1px solid rgba(0, 212, 255, 0.35);
  border-radius: 15px; font-family: 'Orbitron', sans-serif; font-size: 1.08rem;
  color: var(--neon-blue); text-align: center; min-height: 52px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); cursor: pointer;
}
.result-box:hover { border-color: var(--neon-blue); box-shadow: var(--glow-blue); }
.result-box.copied {
  animation: copiedFlash 0.4s var(--transition-bloom);
  border-color: #00ffaa; box-shadow: 0 0 22px rgba(0, 255, 170, 0.6);
}
@keyframes copiedFlash {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); background: rgba(0, 255, 170, 0.15); }
  100% { transform: scale(1); }
}

/* === HITUNG ROW === */
.hitung-row { display: grid; grid-template-columns: 1fr auto; gap: 13px; align-items: end; margin-top: 8px; }
.hitung-btn {
  padding: 11px 24px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
  border: none; border-radius: 13px; color: #02041a; font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.84rem; cursor: pointer; transition: all var(--transition);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1px;
}
.hitung-btn:hover { transform: translateY(-2px); box-shadow: var(--glow-blue-lg); }
.hitung-btn:active { transform: translateY(0); }

/* === TOAST === */
.toast {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(110px) scale(0.92);
  background: linear-gradient(135deg, rgba(14, 20, 56, 0.96), rgba(20, 28, 72, 0.93));
  color: var(--neon-blue); padding: 12px 28px; border-radius: 48px;
  font-weight: 700; font-size: 0.9rem; opacity: 0; transition: all var(--transition-bloom);
  z-index: 1000; border: 1px solid var(--neon-blue); backdrop-filter: blur(14px);
  text-shadow: 0 0 11px rgba(0, 212, 255, 0.75); box-shadow: var(--glow-blue-lg);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

/* === SPINNER === */
.spinner {
  width: 30px; height: 30px; border: 3px solid rgba(0, 212, 255, 0.28);
  border-top-color: var(--neon-blue); border-radius: 50%;
  animation: spin 0.85s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: rgba(6, 10, 34, 0.45); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-blue), var(--neon-blue-dark));
  border-radius: 3px; border: 1px solid rgba(0, 212, 255, 0.28);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--neon-blue-bright), var(--neon-blue));
}

/* === AUTO-UPDATE === */
.auto-update-indicator {
  position: fixed; top: 16px; right: 16px;
  background: rgba(0, 212, 255, 0.14); border: 1px solid var(--neon-blue);
  border-radius: 11px; padding: 6px 13px; font-size: 0.77rem;
  color: var(--neon-blue); display: none; align-items: center; gap: 6px;
  z-index: 1000; backdrop-filter: blur(10px); animation: pulse 1.3s infinite;
}
.auto-update-indicator.show { display: flex; }
@keyframes pulse { 0%, 100% { opacity: 0.72; } 50% { opacity: 1; } }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .settings-panel { flex-direction: column; align-items: stretch; }
  .setting-item { width: 100%; justify-content: space-between; }
  .input-neon { width: 100%; }
  .data-grid { grid-template-columns: 1fr; }
  .main-title { font-size: clamp(1.5rem, 6.2vw, 2.4rem); }
  .tab-chip { padding: 10px 20px; font-size: 0.83rem; }
  .hitung-row { grid-template-columns: 1fr; gap: 11px; }
  .hitung-btn { width: 100%; }
  .chips-row { justify-content: center; }
}

::selection { background: rgba(0, 212, 255, 0.28); color: var(--fg); }
button:focus-visible, input:focus-visible { outline: 2px solid var(--neon-blue); outline-offset: 2px; box-shadow: var(--glow-blue); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body>
<div class="bg-neon"></div>
<div class="grid-lines"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="particles" id="particles"></div>
<div id="toast" class="toast">✨ Berhasil!</div>
<div class="auto-update-indicator" id="autoUpdateIndicator">
  <span>🔄</span><span>Auto-Update Aktif</span>
</div>

<div class="main-container">
  <header class="header-section">
    <h1 class="main-title">⚡ PREDIKSI & HITUNG TOGEL ⚡</h1>
  </header>

  <nav class="tabs-container">
    <button class="tab-chip active" data-tab="prediksi">🔮 Prediksi</button>
    <button class="tab-chip" data-tab="hitung">🧮 Hitung</button>
  </nav>

  <div class="content-box">
    <!-- TAB PREDIKSI -->
    <div id="tab-prediksi" class="tab-content">
      <div class="settings-panel">
        <div class="setting-item">
          <span class="setting-label">📅 Tanggal</span>
          <input type="date" id="input-tanggal" class="input-neon" onchange="autoUpdateTanggal()">
        </div>
        <button class="btn-neon" id="btn-tanggal" onclick="manualUpdateTanggal()">⚡ Update</button>
        <span class="status-badge" id="status-tanggal"></span>
      </div>

      <div class="data-grid">
        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title">🔮 Prediksi</h3>
            <span class="badge-count" id="count-prediksi">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-prediksi" placeholder="🔍 Cari...">
          </div>
          <div class="section-content" id="list-prediksi">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title">📅 Jadwal</h3>
            <span class="badge-count" id="count-jadwal">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-jadwal" placeholder="🔍 Cari...">
          </div>
          <div class="section-content" id="list-jadwal">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title">🔗 Link Live</h3>
            <span class="badge-count" id="count-link">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-link" placeholder="🔍 Cari...">
          </div>
          <div class="section-content" id="list-link">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB HITUNG -->
    <div id="tab-hitung" class="tab-content" style="display:none;">
      <div class="settings-panel">
        <div class="setting-item">
          <span class="setting-label">💰 Nominal</span>
          <input type="number" id="input-nominal" class="input-neon" placeholder="0" onchange="autoUpdateNominal()">
        </div>
        <button class="btn-neon" id="btn-nominal" onclick="manualUpdateNominal()">⚡ Update</button>
        <span class="status-badge" id="status-nominal"></span>
      </div>

      <!-- === NEON SELECTOR (NO DROPDOWN) === -->
      <div class="neon-selector">
        <div class="selector-header">
          <span class="selector-icon">🎯</span>
          <h3 class="selector-title">Pilih Hitungan</h3>
        </div>
        
        <!-- Chip Group: Tipe Hitungan -->
        <div class="chip-group">
          <div class="chip-label">📊 Tipe Hitungan</div>
          <div class="chips-row" id="chipTipe">
            <div class="chip" data-value="">Semua</div>
            <!-- Chips will be populated by JS -->
          </div>
        </div>
        
        <!-- Chip Group: Label -->
        <div class="chip-group">
          <div class="chip-label">🏷️ Pilih Label</div>
          <div class="chips-row" id="chipLabel">
            <div class="chip" data-value="">Semua</div>
            <!-- Chips will be populated by JS -->
          </div>
        </div>
        
        <!-- Action Button -->
        <div class="hitung-row">
          <button onclick="tampilkanValueHitungan()" class="hitung-btn">✨ Tampilkan Hasil</button>
        </div>
        
        <!-- Result Display -->
        <div id="resultBox" class="result-box">
          <span style="color: var(--fg-muted);">Pilih tipe & label untuk melihat hasil</span>
        </div>
      </div>

      <div class="data-grid" id="container-hitung" style="margin-top: 14px;">
        <div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'),
  autoUpdate: $('autoUpdateIndicator'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};

let selectedTipe = '', selectedLabel = '';

// Particles
function createParticles() {
  const container = $('particles');
  if (!container) return;
  for(let i = 0; i < 45; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 28 + 's';
    p.style.animationDuration = (22 + Math.random() * 12) + 's';
    container.appendChild(p);
  }
}

function showToast(msg) {
  dom.toast.textContent = '✨ ' + msg;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 2800);
}

function showAutoUpdate() {
  if (dom.autoUpdate) {
    dom.autoUpdate.classList.add('show');
    setTimeout(() => dom.autoUpdate.classList.remove('show'), 1800);
  }
}

function copyText(text, element) {
  let finalText = text;
  try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 22 ? finalText.substring(0, 22) + '...' : finalText;
    showToast('📋 Disalin: ' + preview);
    if (element) {
      element.classList.add('copied');
      setTimeout(() => element.classList.remove('copied'), 400);
    }
  }).catch(() => showToast('❌ Gagal salin'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

function parseCSV(text) {
  let p = [], row = [], entry = "", st = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(entry); entry = ""; }
      else if (c === '\r' && n === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { entry += '"'; i++; }
      else if (c === '"') st = 0;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); p.push(row); }
  return p;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error("Fetch Error:", e); return false; }
}

async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = dom.inTgl.value;
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    renderPrediksi();
  } catch(e) {
    console.error("Error Prediksi:", e);
    dom.listP.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:20px;">❌ Gagal memuat</p>';
  }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 }, { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 }, { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 }, { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 }, { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    state.hitung = secDef.map(s => {
      let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
      let items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), res = safeGet(data[i], 24);
          if (type || res) items.push({ type, res });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) {
    console.error("Error Hitung:", e);
    dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:20px;">❌ Gagal memuat</p>';
  }
}

function renderList(container, items, search) {
  const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!filtered.length) { container.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:20px;">📭 Tidak ada data</p>'; return; }
  container.innerHTML = filtered.map(v => `
    <div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}', this)">
      <div class="item-label">📋 Judul</div>
      <div class="item-title">${v.title}</div>
      <div class="item-label">💬 Isi (Klik untuk Copy)</div>
      <div class="item-content">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;">📭 Tidak ada data</p>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-box">
      <div class="pasaran-header"><h3 class="pasaran-title">🎯 ${s.title}</h3></div>
      <div class="pasaran-content">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}', this)">
            <span class="bet-type">${it.type}</span>
            <span class="bet-result">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// === NEON CHIP SELECTOR FUNCTIONS ===
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + 
    items.map(it => `<div class="chip" data-value="${it.label || it}">${(it.label || it).substring(0, 22)}${(it.label || it).length > 22 ? '...' : ''}</div>`).join('');
  
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (type === 'tipe') {
        selectedTipe = chip.dataset.value;
        // Update label chips based on selected tipe
        updateLabelChips();
      } else {
        selectedLabel = chip.dataset.value;
      }
    };
  });
}

function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) {
    renderChips(dom.chipLabel, [], 'label');
    return;
  }
  const labels = state.kelompok[selectedTipe].map(i => i.label);
  renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "SEMUA PASARAN" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "BONUS" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "JAKARTA" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "TOTOMALI" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "HOKIDRAW" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY & HK" }
    ];
    state.kelompok = {};
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length > 0) state.kelompok[sec.title] = items;
    });
    // Render tipe chips
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error("Error loadHitungData:", e); }
}

function tampilkanValueHitungan() {
  const result = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = '<span style="color: var(--fg-muted);">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    result.innerHTML = `<span style="font-weight: 700;">${item.value}</span>`;
    result.onclick = () => copyText(item.value, result);
  }
}

// === AUTO-UPDATE ===
let autoTimeout = null;
function autoUpdateTanggal() {
  showAutoUpdate();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateTanggal, 1000);
}
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal!");
  const p = dom.inTgl.value.split('-');
  const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "⏳...";
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = "✅ OK";
      showToast("📅 Tersimpan!");
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statTgl.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}
function autoUpdateNominal() {
  showAutoUpdate();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateNominal, 1000);
}
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Isi nominal!");
  dom.btnNom.disabled = true; dom.statNom.textContent = "⏳...";
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value);
      showToast("💰 Tersimpan!");
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statNom.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}

function init() {
  document.querySelectorAll('.tab-chip').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active'));
    t.classList.add('active');
    dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
    dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
  });
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  fetchPrediksi(); fetchHitung(); loadHitungData();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  init();
  setTimeout(() => showToast('🚀 Neon Blue Ultra Loaded!'), 1000);
});
</script>
</body>
</html>

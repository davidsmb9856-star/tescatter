<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ HOLO-DECK: PREDIKSI & HITUNG TOGEL ⚡</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #00020a;
  --bg-panel: rgba(2, 6, 23, 0.92);
  --bg-panel-alt: rgba(4, 12, 35, 0.88);
  --fg-primary: #e6f9ff;
  --fg-secondary: #7dd3fc;
  --fg-dim: #478a9e;
  --neon-core: #00e7ff;
  --neon-edge: #00a3cc;
  --neon-pulse: #00ffff;
  --accent-alert: #ff2a6d;
  --accent-warn: #ffaa00;
  --accent-ok: #00ffaa;
  --glow-core: 0 0 8px #00e7ff, 0 0 20px #00e7ff66, 0 0 45px #00e7ff33;
  --glow-intense: 0 0 12px #00e7ff, 0 0 35px #00e7ff99, 0 0 70px #00e7ff55, 0 0 120px #00e7ff22;
  --scanline: repeating-linear-gradient(0deg, rgba(0,231,255,0.03) 0px, rgba(0,231,255,0.03) 1px, transparent 1px, transparent 2px);
  --transition-smooth: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  --transition-glitch: 0.15s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-deep);
  color: var(--fg-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.4;
  text-rendering: optimizeLegibility;
}

/* === HOLOGRAPHIC BACKGROUND === */
.holo-bg {
  position: fixed; inset: 0; z-index: -4;
  background: 
    radial-gradient(ellipse at 15% 25%, rgba(0, 231, 255, 0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 75%, rgba(0, 163, 204, 0.05) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(0, 255, 255, 0.03) 0%, transparent 70%),
    linear-gradient(180deg, #00020a 0%, #00081a 40%, #000410 100%);
  animation: holoShift 45s ease-in-out infinite;
}
@keyframes holoShift {
  0%, 100% { filter: hue-rotate(0deg) saturate(1); }
  25% { filter: hue-rotate(8deg) saturate(1.1); }
  50% { filter: hue-rotate(-5deg) saturate(0.95); }
  75% { filter: hue-rotate(12deg) saturate(1.05); }
}

/* === SCANLINES & NOISE === */
.scanlines {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background: var(--scanline);
  animation: scanMove 8s linear infinite;
  opacity: 0.4;
}
@keyframes scanMove { 0% { background-position: 0 0; } 100% { background-position: 0 100vh; } }

.noise-overlay {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  opacity: 0.04; animation: noisePulse 3s ease-in-out infinite;
}
@keyframes noisePulse { 0%, 100% { opacity: 0.04; } 50% { opacity: 0.06; } }

/* === DATA PARTICLES === */
.data-particles { position: fixed; inset: 0; z-index: -3; overflow: hidden; pointer-events: none; }
.data-particle {
  position: absolute; width: 1px; height: 12px;
  background: linear-gradient(180deg, transparent, var(--neon-core), transparent);
  opacity: 0; animation: dataStream 18s infinite linear;
  box-shadow: 0 0 6px var(--neon-core);
}
.data-particle:nth-child(2n) { animation-duration: 22s; animation-delay: -11s; width: 2px; }
.data-particle:nth-child(3n) { animation-duration: 15s; animation-delay: -7s; opacity: 0.7; }
@keyframes dataStream {
  0% { transform: translateY(-20vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(120vh) rotate(15deg); opacity: 0; }
}

/* === MAIN LAYOUT - CYBER DECK STYLE === */
.cyber-deck {
  position: relative; z-index: 10;
  max-width: 1300px; margin: 0 auto; padding: 12px;
  display: grid; grid-template-areas: 
    "header header"
    "nav main"
    "status status";
  grid-template-columns: 180px 1fr; grid-template-rows: auto 1fr auto;
  gap: 14px; min-height: 100vh;
}

/* === HEADER - TERMINAL STYLE === */
.deck-header {
  grid-area: header;
  background: var(--bg-panel);
  border: 1px solid rgba(0, 231, 255, 0.25);
  border-radius: 0; clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
  padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(6px); position: relative; overflow: hidden;
}
.deck-header::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-core), var(--neon-pulse), var(--neon-core), transparent);
  animation: headerGlow 3s ease-in-out infinite;
}
@keyframes headerGlow { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; filter: blur(0.3px); } }
.deck-title {
  font-family: 'Rajdhani', sans-serif; font-size: clamp(1.4rem, 4vw, 2.1rem);
  font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  background: linear-gradient(90deg, var(--fg-primary), var(--neon-core), var(--neon-pulse));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: 0 0 15px rgba(0, 231, 255, 0.5); position: relative;
  animation: titleFlicker 4s infinite;
}
@keyframes titleFlicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; } 20%, 24%, 55% { opacity: 0.85; } }
.deck-title::after {
  content: '⚡'; position: absolute; right: -28px; top: 50%; transform: translateY(-50%);
  font-size: 1.2em; animation: sparkPulse 1.5s ease-in-out infinite;
}
@keyframes sparkPulse { 0%, 100% { opacity: 1; transform: translateY(-50%) scale(1); } 50% { opacity: 0.7; transform: translateY(-50%) scale(1.15); } }

/* === RADIAL NAVIGATION - LEFT PANEL === */
.deck-nav {
  grid-area: nav;
  background: var(--bg-panel);
  border: 1px solid rgba(0, 231, 255, 0.2);
  border-radius: 0; clip-path: polygon(0 0, 100% 0, 100% 96%, 0 100%);
  padding: 18px 12px; display: flex; flex-direction: column; gap: 10px;
  backdrop-filter: blur(4px);
}
.nav-item {
  padding: 11px 14px; border-left: 3px solid transparent;
  background: rgba(4, 12, 35, 0.4); cursor: pointer;
  transition: all var(--transition-smooth); position: relative;
  font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.88rem;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.nav-item::before {
  content: ''; position: absolute; inset: 0; border-radius: 0 4px 4px 0;
  background: linear-gradient(90deg, transparent, rgba(0, 231, 255, 0.08), transparent);
  opacity: 0; transition: opacity var(--transition-smooth);
}
.nav-item:hover { border-left-color: var(--neon-edge); background: rgba(6, 18, 48, 0.6); }
.nav-item:hover::before { opacity: 1; }
.nav-item.active {
  border-left-color: var(--neon-core);
  background: linear-gradient(90deg, rgba(0, 231, 255, 0.12), rgba(4, 12, 35, 0.7));
  box-shadow: var(--glow-core);
}
.nav-item.active::after {
  content: ''; position: absolute; right: -1px; top: 8px; bottom: 8px; width: 2px;
  background: var(--neon-core); box-shadow: 0 0 10px var(--neon-core);
}
.nav-icon { display: inline-block; width: 18px; text-align: center; margin-right: 8px; }

/* === MAIN CONTENT AREA === */
.deck-main {
  grid-area: main;
  display: grid; grid-template-rows: auto 1fr; gap: 14px;
}

/* === CONTROL BAR - SEGMENTED INPUT === */
.control-bar {
  background: var(--bg-panel-alt);
  border: 1px solid rgba(0, 231, 255, 0.18);
  border-radius: 0; clip-path: polygon(2% 0, 100% 0, 98% 100%, 0 100%);
  padding: 12px 16px; display: flex; align-items: center; gap: 14px;
  backdrop-filter: blur(4px); flex-wrap: wrap;
}
.control-group { display: flex; align-items: center; gap: 10px; }
.control-label {
  font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; font-weight: 600;
  color: var(--neon-core); text-transform: uppercase; letter-spacing: 1px;
  text-shadow: 0 0 8px rgba(0, 231, 255, 0.4);
}
.input-terminal {
  padding: 8px 12px; background: rgba(2, 8, 22, 0.85);
  border: 1px solid rgba(0, 231, 255, 0.3); border-radius: 0;
  color: var(--fg-primary); font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem; width: 150px; transition: all var(--transition-smooth);
}
.input-terminal:focus {
  outline: none; border-color: var(--neon-core);
  box-shadow: var(--glow-core); background: rgba(4, 14, 38, 0.92);
}
.btn-terminal {
  padding: 8px 18px; background: linear-gradient(180deg, rgba(0, 231, 255, 0.2), rgba(0, 163, 204, 0.15));
  border: 1px solid var(--neon-edge); border-radius: 0;
  color: var(--neon-core); font-family: 'Rajdhani', sans-serif;
  font-weight: 600; font-size: 0.82rem; text-transform: uppercase;
  letter-spacing: 1px; cursor: pointer; transition: all var(--transition-glitch);
  position: relative; overflow: hidden;
}
.btn-terminal::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.25), transparent);
  transition: left 0.4s ease;
}
.btn-terminal:hover::before { left: 100%; }
.btn-terminal:hover {
  border-color: var(--neon-core); background: linear-gradient(180deg, rgba(0, 231, 255, 0.35), rgba(0, 163, 204, 0.25));
  box-shadow: var(--glow-core); transform: translateX(2px);
}
.btn-terminal:active { transform: translateX(0); }
.btn-terminal:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.status-indicator {
  font-size: 0.78rem; color: var(--accent-ok); font-weight: 600;
  text-shadow: 0 0 10px rgba(0, 255, 170, 0.5); animation: statusBlink 2s infinite;
}
@keyframes statusBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

/* === SEGMENTED SELECTOR - NO DROPDOWN === */
.segmented-control {
  display: inline-flex; background: rgba(2, 8, 22, 0.85);
  border: 1px solid rgba(0, 231, 255, 0.25); border-radius: 0; overflow: hidden;
}
.segment-btn {
  padding: 7px 14px; background: transparent; border: none; border-right: 1px solid rgba(0, 231, 255, 0.15);
  color: var(--fg-secondary); font-family: 'Rajdhani', sans-serif; font-size: 0.8rem;
  font-weight: 600; cursor: pointer; transition: all var(--transition-smooth);
  text-transform: uppercase; letter-spacing: 0.5px; position: relative;
}
.segment-btn:last-child { border-right: none; }
.segment-btn:hover { color: var(--neon-core); background: rgba(0, 231, 255, 0.08); }
.segment-btn.active {
  color: var(--fg-primary); background: linear-gradient(180deg, rgba(0, 231, 255, 0.25), rgba(0, 163, 204, 0.18));
  box-shadow: inset 0 0 12px rgba(0, 231, 255, 0.3);
}
.segment-btn.active::after {
  content: ''; position: absolute; bottom: 0; left: 10%; right: 10%; height: 2px;
  background: var(--neon-core); box-shadow: 0 0 8px var(--neon-core);
}

/* === DATA STREAM DISPLAY === */
.stream-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px; padding: 4px;
}
.stream-panel {
  background: var(--bg-panel);
  border: 1px solid rgba(0, 231, 255, 0.15);
  border-radius: 0; clip-path: polygon(0 0, 100% 0, 97% 100%, 3% 100%);
  display: flex; flex-direction: column; overflow: hidden;
  backdrop-filter: blur(3px); transition: all var(--transition-smooth);
}
.stream-panel:hover {
  border-color: rgba(0, 231, 255, 0.4);
  box-shadow: var(--glow-core);
  transform: translateX(3px);
}
.stream-header {
  padding: 10px 14px; border-bottom: 1px solid rgba(0, 231, 255, 0.12);
  background: linear-gradient(90deg, rgba(0, 231, 255, 0.08), transparent 80%);
  display: flex; justify-content: space-between; align-items: center;
}
.stream-title {
  font-family: 'Rajdhani', sans-serif; font-weight: 700; color: var(--neon-core);
  font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(0, 231, 255, 0.5);
}
.stream-count {
  background: rgba(0, 231, 255, 0.12); color: var(--neon-core);
  padding: 2px 8px; border-radius: 0; font-size: 0.72rem; font-weight: 700;
  border: 1px solid rgba(0, 231, 255, 0.3);
}
.stream-search { padding: 8px 12px; border-bottom: 1px solid rgba(0, 231, 255, 0.1); }
.stream-search input {
  width: 100%; padding: 7px 10px; background: rgba(2, 8, 22, 0.7);
  border: 1px solid rgba(0, 231, 255, 0.2); border-radius: 0;
  color: var(--fg-primary); font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem; transition: all var(--transition-smooth);
}
.stream-search input:focus { outline: none; border-color: var(--neon-core); box-shadow: var(--glow-core); }
.stream-content {
  padding: 8px; overflow-y: auto; max-height: 380px; flex-grow: 1;
}

/* === STREAM ITEM - TERMINAL OUTPUT STYLE === */
.stream-item {
  padding: 9px 12px; margin-bottom: 6px;
  background: rgba(4, 12, 35, 0.5);
  border-left: 2px solid rgba(0, 231, 255, 0.3);
  cursor: pointer; transition: all var(--transition-smooth);
  font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
  position: relative; overflow: hidden;
}
.stream-item::before {
  content: '>'; position: absolute; left: 4px; top: 50%; transform: translateY(-50%);
  color: var(--neon-core); opacity: 0.6; font-weight: bold;
}
.stream-item:hover {
  border-left-color: var(--neon-core);
  background: rgba(6, 18, 48, 0.7);
  box-shadow: 0 0 15px rgba(0, 231, 255, 0.25);
  padding-left: 18px;
}
.stream-item:hover::before { opacity: 1; animation: cursorBlink 1s infinite; }
@keyframes cursorBlink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0.3; } }
.item-meta { color: var(--fg-dim); font-size: 0.72rem; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.8px; }
.item-label { color: var(--neon-core); font-weight: 600; margin-bottom: 2px; }
.item-value { color: var(--fg-primary); line-height: 1.3; word-break: break-word; }

/* === CALCULATOR PANEL - UNIQUE STYLE === */
.calc-panel {
  background: var(--bg-panel-alt);
  border: 1px solid rgba(183, 42, 255, 0.22);
  border-radius: 0; clip-path: polygon(3% 0, 100% 0, 97% 100%, 0 100%);
  padding: 16px; margin: 8px 0; backdrop-filter: blur(5px);
}
.calc-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  padding-bottom: 10px; border-bottom: 1px dashed rgba(183, 42, 255, 0.25);
}
.calc-icon { font-size: 1.3rem; color: var(--neon-pulse); animation: iconPulse 2s infinite; }
@keyframes iconPulse { 0%, 100% { text-shadow: 0 0 8px rgba(0, 255, 255, 0.6); } 50% { text-shadow: 0 0 18px rgba(0, 255, 255, 0.9), 0 0 35px rgba(183, 42, 255, 0.7); } }
.calc-title {
  font-family: 'Rajdhani', sans-serif; font-weight: 700; color: var(--neon-pulse);
  font-size: 1rem; text-transform: uppercase; letter-spacing: 1.5px;
  text-shadow: 0 0 10px rgba(183, 42, 255, 0.6);
}
.calc-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: end; }
.calc-field { display: flex; flex-direction: column; gap: 6px; }
.calc-field-label {
  font-family: 'Rajdhani', sans-serif; font-size: 0.78rem; font-weight: 600;
  color: var(--neon-core); text-transform: uppercase; letter-spacing: 1px;
}
.calc-select {
  padding: 9px 12px; background: rgba(2, 8, 22, 0.85);
  border: 1px solid rgba(0, 231, 255, 0.3); border-radius: 0;
  color: var(--fg-primary); font-family: 'JetBrains Mono', monospace;
  font-size: 0.88rem; cursor: pointer; transition: all var(--transition-smooth);
}
.calc-select:focus { outline: none; border-color: var(--neon-core); box-shadow: var(--glow-core); }
.calc-btn {
  padding: 9px 20px; background: linear-gradient(180deg, var(--neon-core), var(--neon-edge));
  border: none; border-radius: 0; color: var(--bg-deep); font-family: 'Rajdhani', sans-serif;
  font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;
  cursor: pointer; transition: all var(--transition-glitch);
}
.calc-btn:hover { box-shadow: var(--glow-intense); transform: translateX(3px) scale(1.02); }
.calc-btn:active { transform: translateX(0) scale(1); }

.calc-result {
  margin-top: 14px; padding: 14px; background: rgba(4, 12, 35, 0.7);
  border: 1px solid rgba(0, 231, 255, 0.25); border-radius: 0;
  font-family: 'JetBrains Mono', monospace; font-size: 1.05rem;
  color: var(--neon-core); text-align: center; min-height: 50px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition-smooth); cursor: pointer;
}
.calc-result:hover { border-color: var(--neon-core); box-shadow: var(--glow-core); }
.calc-result.copied { animation: resultFlash 0.4s ease-out; }
@keyframes resultFlash { 0% { box-shadow: 0 0 0 rgba(0, 255, 170, 0); } 50% { box-shadow: 0 0 25px rgba(0, 255, 170, 0.8); } 100% { box-shadow: 0 0 0 rgba(0, 255, 170, 0); } }

/* === STATUS BAR === */
.deck-status {
  grid-area: status;
  background: var(--bg-panel);
  border: 1px solid rgba(0, 231, 255, 0.15);
  border-radius: 0; clip-path: polygon(2% 0, 100% 0, 98% 100%, 0 100%);
  padding: 8px 16px; display: flex; align-items: center; justify-content: space-between;
  font-size: 0.75rem; color: var(--fg-dim); font-family: 'JetBrains Mono', monospace;
}
.status-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent-ok); margin-right: 6px;
  box-shadow: 0 0 8px var(--accent-ok); animation: dotPulse 2s infinite;
}
@keyframes dotPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.9); } }

/* === TOAST - TERMINAL STYLE === */
.terminal-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: rgba(2, 8, 22, 0.95); border: 1px solid var(--neon-core);
  border-radius: 0; padding: 11px 26px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.88rem; color: var(--neon-core); opacity: 0; transition: all var(--transition-glitch);
  z-index: 1000; backdrop-filter: blur(8px); text-shadow: 0 0 10px rgba(0, 231, 255, 0.7);
  box-shadow: var(--glow-intense); clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
}
.terminal-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); animation: toastGlitch 0.4s var(--transition-glitch); }
@keyframes toastGlitch {
  0% { transform: translateX(-50%) translateY(100px) skewX(0); }
  25% { transform: translateX(-50%) translateY(10px) skewX(-1deg); }
  50% { transform: translateX(-50%) translateY(-5px) skewX(1deg); }
  100% { transform: translateX(-50%) translateY(0) skewX(0); opacity: 1; }
}

/* === SPINNER - DATA LOADING === */
.data-spinner {
  width: 28px; height: 28px; border: 2px solid rgba(0, 231, 255, 0.25);
  border-top-color: var(--neon-core); border-radius: 50%;
  animation: spinData 0.8s linear infinite; margin: 20px auto;
}
@keyframes spinData { to { transform: rotate(360deg); } }

/* === SCROLLBAR - TERMINAL === */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: rgba(2, 8, 22, 0.5); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-core), var(--neon-edge));
  border-radius: 0; border: 1px solid rgba(0, 231, 255, 0.2);
}
::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, var(--neon-pulse), var(--neon-core)); }

/* === RESPONSIVE === */
@media (max-width: 900px) {
  .cyber-deck {
    grid-template-areas: "header" "nav" "main" "status";
    grid-template-columns: 1fr; grid-template-rows: auto auto 1fr auto;
  }
  .deck-nav { flex-direction: row; overflow-x: auto; padding: 10px 8px; }
  .nav-item { padding: 9px 12px; font-size: 0.8rem; white-space: nowrap; }
  .calc-grid { grid-template-columns: 1fr; }
  .control-bar { gap: 10px; }
  .input-terminal { width: 130px; }
}
@media (max-width: 500px) {
  .deck-header { padding: 12px 14px; }
  .deck-title { font-size: 1.3rem; letter-spacing: 2px; }
  .control-bar { padding: 10px 12px; }
  .input-terminal { width: 100%; }
  .segmented-control { width: 100%; }
  .segment-btn { flex: 1; padding: 6px 8px; font-size: 0.75rem; }
}

/* === SELECTION & FOCUS === */
::selection { background: rgba(0, 231, 255, 0.3); color: var(--fg-primary); }
button:focus-visible, input:focus-visible, [tabindex]:focus-visible {
  outline: 2px solid var(--neon-core); outline-offset: 2px;
  box-shadow: 0 0 0 4px rgba(0, 231, 255, 0.15);
}

/* === REDUCED MOTION === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="holo-bg"></div>
<div class="scanlines"></div>
<div class="noise-overlay"></div>
<div class="data-particles" id="dataParticles"></div>
<div id="terminalToast" class="terminal-toast">⚡ SYSTEM: OK</div>

<div class="cyber-deck">
  <!-- HEADER -->
  <header class="deck-header">
    <h1 class="deck-title">HOLO-DECK: PREDIKSI & HITUNG TOGEL</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="status-dot"></span>
      <span style="color:var(--accent-ok);font-weight:600">ONLINE</span>
    </div>
  </header>

  <!-- RADIAL NAV -->
  <nav class="deck-nav">
    <div class="nav-item active" data-view="prediksi">
      <span class="nav-icon">🔮</span>PREDIKSI
    </div>
    <div class="nav-item" data-view="hitung">
      <span class="nav-icon">🧮</span>HITUNG
    </div>
    <div class="nav-item" data-view="jadwal">
      <span class="nav-icon">📅</span>JADWAL
    </div>
    <div class="nav-item" data-view="link">
      <span class="nav-icon">🔗</span>LIVE LINK
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="deck-main">
    <!-- CONTROL BAR -->
    <div class="control-bar">
      <div class="control-group">
        <span class="control-label">📅 TGL:</span>
        <input type="date" id="inputTanggal" class="input-terminal" onchange="autoUpdateTanggal()">
      </div>
      <div class="control-group">
        <span class="control-label">💰 NOM:</span>
        <input type="number" id="inputNominal" class="input-terminal" placeholder="0" onchange="autoUpdateNominal()">
      </div>
      <button class="btn-terminal" id="btnUpdate" onclick="manualUpdate()">⚡ EXECUTE</button>
      <span class="status-indicator" id="statusText">● READY</span>
    </div>

    <!-- PREDIKSI VIEW -->
    <div id="view-prediksi" class="stream-container">
      <div class="stream-panel">
        <div class="stream-header">
          <span class="stream-title">🔮 PREDIKSI STREAM</span>
          <span class="stream-count" id="countPrediksi">0</span>
        </div>
        <div class="stream-search"><input type="text" id="searchPrediksi" placeholder="> filter prediksi..."></div>
        <div class="stream-content" id="listPrediksi">
          <div style="text-align:center;padding:25px"><div class="data-spinner"></div></div>
        </div>
      </div>
      <div class="stream-panel">
        <div class="stream-header">
          <span class="stream-title">📊 ANALYSIS</span>
          <span class="stream-count" id="countAnalysis">0</span>
        </div>
        <div class="stream-search"><input type="text" id="searchAnalysis" placeholder="> filter analysis..."></div>
        <div class="stream-content" id="listAnalysis">
          <div style="text-align:center;padding:25px"><div class="data-spinner"></div></div>
        </div>
      </div>
      <div class="stream-panel">
        <div class="stream-header">
          <span class="stream-title">⚡ SIGNAL</span>
          <span class="stream-count" id="countSignal">0</span>
        </div>
        <div class="stream-search"><input type="text" id="searchSignal" placeholder="> filter signal..."></div>
        <div class="stream-content" id="listSignal">
          <div style="text-align:center;padding:25px"><div class="data-spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- HITUNG VIEW (hidden by default) -->
    <div id="view-hitung" class="stream-container" style="display:none">
      <div class="calc-panel">
        <div class="calc-header">
          <span class="calc-icon">🧮</span>
          <span class="calc-title">CALCULATION MODULE</span>
        </div>
        <div class="calc-grid">
          <div class="calc-field">
            <label class="calc-field-label">TYPE SELECT</label>
            <select id="calcType" class="calc-select" onchange="populateLabels()">
              <option value="">-- SELECT CALC TYPE --</option>
            </select>
          </div>
          <div class="calc-field">
            <label class="calc-field-label">LABEL SELECT</label>
            <select id="calcLabel" class="calc-select" onchange="showResult()">
              <option value="">-- SELECT LABEL --</option>
            </select>
          </div>
          <button class="calc-btn" onclick="showResult()">▶ EXECUTE</button>
        </div>
        <div class="calc-result" id="calcResult" onclick="copyResult()">
          <span style="color:var(--fg-dim)">awaiting input parameters...</span>
        </div>
      </div>
      <div class="stream-panel" style="grid-column:1/-1">
        <div class="stream-header">
          <span class="stream-title">📈 CALCULATION OUTPUT</span>
          <span class="stream-count" id="countCalc">0</span>
        </div>
        <div class="stream-content" id="listCalc">
          <div style="text-align:center;padding:25px"><div class="data-spinner"></div></div>
        </div>
      </div>
    </div>
  </main>

  <!-- STATUS BAR -->
  <footer class="deck-status">
    <span><span class="status-dot"></span>HOLO-DECK v2.1.7 // NEON CORE ACTIVE</span>
    <span id="timestamp"></span>
  </footer>
</div>

<script>
// === CONFIG ===
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4', keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], calcData: {} };
const $ = id => document.getElementById(id);

// === PARTICLES ===
function createDataParticles() {
  const container = $('dataParticles'); if (!container) return;
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div'); p.className = 'data-particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 18 + 's';
    p.style.animationDuration = (14 + Math.random() * 12) + 's';
    container.appendChild(p);
  }
}

// === TOAST ===
function showTerminalToast(msg) {
  const toast = $('terminalToast');
  toast.textContent = '⚡ ' + msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}

// === COPY UTILS ===
function copyToClipboard(text) {
  let clean = text; try { clean = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(clean).then(() => {
    const preview = clean.length > 25 ? clean.substring(0, 25) + '...' : clean;
    showTerminalToast('COPIED: ' + preview);
  }).catch(() => showTerminalToast('ERROR: Clipboard access denied'));
}

function copyResult() {
  const result = $('calcResult');
  const text = result.textContent.trim();
  if (text && !text.includes('awaiting')) {
    copyToClipboard(text);
    result.classList.add('copied');
    setTimeout(() => result.classList.remove('copied'), 400);
  }
}

// === FORMAT ===
function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }
function updateTimestamp() {
  const now = new Date();
  $('timestamp').textContent = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' // ' + now.toLocaleDateString('id-ID');
}
setInterval(updateTimestamp, 1000); updateTimestamp();

// === CSV PARSER ===
function parseCSV(text) {
  let rows = [], row = [], cell = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { cell += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else cell += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(cell); cell = ""; }
      else if ((c === '\r' && next === '\n') || c === '\n' || c === '\r') {
        row.push(cell); rows.push(row); row = []; cell = "";
        if (c === '\r' && next === '\n') i++;
      } else cell += c;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}
function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

// === API ===
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showTerminalToast('ERROR: Script URL not configured'); return false; }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch (e) { console.error('API Error:', e); return false; }
}

// === DATA FETCH ===
async function fetchPrediksiData() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    
    // Parse tanggal
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const parts = raw.split('/');
        if (parts.length === 3) {
          const formatted = `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
          $('inputTanggal').value = formatted;
        }
      }
    }
    
    // Parse data streams
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ label: 'PRED', value: txt, meta: 'STREAM-A' });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ label: 'JADWAL', value: txt, meta: 'STREAM-B' });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ label: 'LINK', value: txt, meta: 'STREAM-C' });
    }
    renderStreams();
  } catch (e) {
    console.error('Fetch Error:', e);
    $('listPrediksi').innerHTML = '<div style="color:var(--accent-alert);text-align:center;padding:20px">⚠ CONNECTION ERROR</div>';
  }
}

async function fetchHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    
    // Parse nominal
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { $('inputNominal').value = nom; }
    }
    
    // Parse calculation sections
    const sections = [
      { start: 2, end: 42, title: "ALL MARKETS" },
      { start: 45, end: 80, title: "MACAU 4D" },
      { start: 83, end: 119, title: "MACAU 5D" },
      { start: 122, end: 153, title: "KINGKONG 4D" },
      { start: 156, end: 179, title: "BONUS CALC" },
      { start: 182, end: 213, title: "JAKARTA" },
      { start: 217, end: 248, title: "TOTOMALI" },
      { start: 251, end: 282, title: "HOKIDRAW" },
      { start: 285, end: 316, title: "SYDNEY/HK" }
    ];
    
    state.calcData = {};
    const typeSelect = $('calcType');
    typeSelect.innerHTML = '<option value="">-- SELECT CALC TYPE --</option>';
    
    sections.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || '-', value: value || '-' });
        }
      }
      if (items.length > 0) {
        state.calcData[sec.title] = items;
        const opt = document.createElement('option');
        opt.value = sec.title; opt.textContent = sec.title;
        typeSelect.appendChild(opt);
      }
    });
    
    // Render output panel
    renderCalcOutput();
  } catch (e) {
    console.error('Calc Fetch Error:', e);
    $('listCalc').innerHTML = '<div style="color:var(--accent-alert);text-align:center;padding:20px">⚠ DATA UNAVAILABLE</div>';
  }
}

// === RENDER ===
function renderStreamItem(container, items, filter = '') {
  const filtered = items.filter(i => 
    i.value.toLowerCase().includes(filter.toLowerCase()) || 
    i.label.toLowerCase().includes(filter.toLowerCase())
  );
  
  if (!filtered.length) {
    container.innerHTML = '<div style="color:var(--fg-dim);text-align:center;padding:20px">> no matching records</div>';
    return;
  }
  
  container.innerHTML = filtered.map(item => `
    <div class="stream-item" onclick="copyToClipboard('${encodeURIComponent(item.value)}')">
      <div class="item-meta">${item.meta || 'DATA'}</div>
      <div class="item-label">${item.label}</div>
      <div class="item-value">${item.value}</div>
    </div>
  `).join('');
}

function renderStreams() {
  renderStreamItem($('listPrediksi'), state.prediksi, $('searchPrediksi').value);
  renderStreamItem($('listAnalysis'), state.jadwal, $('searchAnalysis').value);
  renderStreamItem($('listSignal'), state.link, $('searchSignal').value);
  
  $('countPrediksi').textContent = state.prediksi.length;
  $('countAnalysis').textContent = state.jadwal.length;
  $('countSignal').textContent = state.link.length;
}

function renderCalcOutput() {
  const container = $('listCalc');
  let allItems = [];
  Object.values(state.calcData).forEach(items => allItems.push(...items));
  
  if (!allItems.length) {
    container.innerHTML = '<div style="color:var(--fg-dim);text-align:center;padding:20px">> awaiting calculation parameters</div>';
    return;
  }
  
  container.innerHTML = allItems.map(it => `
    <div class="stream-item" onclick="copyToClipboard('${encodeURIComponent(it.value)}')">
      <div class="item-meta">CALC</div>
      <div class="item-label">${it.label}</div>
      <div class="item-value">${it.value}</div>
    </div>
  `).join('');
  $('countCalc').textContent = allItems.length;
}

// === CALC LOGIC ===
function populateLabels() {
  const type = $('calcType').value;
  const labelSelect = $('calcLabel');
  labelSelect.innerHTML = '<option value="">-- SELECT LABEL --</option>';
  
  if (type && state.calcData[type]) {
    state.calcData[type].forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.label; opt.textContent = item.label;
      labelSelect.appendChild(opt);
    });
  }
}

function showResult() {
  const type = $('calcType').value;
  const label = $('calcLabel').value;
  const result = $('calcResult');
  
  if (!type || !label || !state.calcData[type]) {
    result.innerHTML = '<span style="color:var(--accent-alert)">⚠ INVALID PARAMETERS</span>';
    showTerminalToast('ERROR: Select type and label first');
    return;
  }
  
  const item = state.calcData[type].find(i => i.label === label);
  if (item) {
    result.textContent = item.value;
    result.title = 'Click to copy';
    showTerminalToast('RESULT GENERATED');
  }
}

// === AUTO-UPDATE ===
let autoUpdateTimer = null;
function autoUpdateTanggal() {
  clearTimeout(autoUpdateTimer);
  autoUpdateTimer = setTimeout(() => manualUpdate(), 1000);
}
function autoUpdateNominal() {
  clearTimeout(autoUpdateTimer);
  autoUpdateTimer = setTimeout(() => manualUpdate(), 1000);
}

function manualUpdate() {
  const tgl = $('inputTanggal').value;
  const nom = $('inputNominal').value;
  const btn = $('btnUpdate');
  const status = $('statusText');
  
  if (!tgl && !nom) return showTerminalToast('⚠ NO PARAMETERS TO UPDATE');
  
  btn.disabled = true;
  status.textContent = '● PROCESSING...';
  status.style.color = 'var(--accent-warn)';
  
  let completed = 0;
  const checkDone = () => {
    completed++;
    if (completed >= 2) {
      btn.disabled = false;
      status.textContent = '● READY';
      status.style.color = 'var(--accent-ok)';
      showTerminalToast('✓ EXECUTION COMPLETE');
      fetchPrediksiData();
      fetchHitungData();
    }
  };
  
  if (tgl) {
    const parts = tgl.split('-');
    const formatted = `${parts[1]}/${parts[2]}/${parts[0]}`;
    updateSheet('updateTanggal', formatted).then(ok => {
      if (ok) localStorage.setItem(CONFIG.keyTanggal, tgl);
      checkDone();
    });
  } else checkDone();
  
  if (nom) {
    updateSheet('updateNominal', nom).then(ok => {
      if (ok) localStorage.setItem(CONFIG.keyNominal, nom);
      checkDone();
    });
  } else checkDone();
}

// === NAVIGATION ===
function switchView(view) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.currentTarget.classList.add('active');
  
  $('view-prediksi').style.display = view === 'prediksi' ? 'grid' : 'none';
  $('view-hitung').style.display = view === 'hitung' ? 'grid' : 'none';
  
  showTerminalToast(`VIEW: ${view.toUpperCase()} ACTIVE`);
}

// === INIT ===
function init() {
  // Nav clicks
  document.querySelectorAll('.nav-item').forEach(item => {
    item.onclick = switchView;
  });
  
  // Search filters
  $('searchPrediksi').oninput = () => renderStreamItem($('listPrediksi'), state.prediksi, $('searchPrediksi').value);
  $('searchAnalysis').oninput = () => renderStreamItem($('listAnalysis'), state.jadwal, $('searchAnalysis').value);
  $('searchSignal').oninput = () => renderStreamItem($('listSignal'), state.link, $('searchSignal').value);
  
  // Load data
  fetchPrediksiData();
  fetchHitungData();
  
  // Welcome
  setTimeout(() => showTerminalToast('HOLO-DECK INITIALIZED // NEON CORE ONLINE'), 1500);
}

// === START ===
document.addEventListener('DOMContentLoaded', () => {
  createDataParticles();
  init();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔷 NEON CYBER: PREDIKSI & HITUNG TOGEL 🔷</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* === CYBERPUNK VARIABLES === */
:root {
  --bg-deep: #000510;
  --bg-panel: rgba(0, 15, 40, 0.65);
  --bg-card: rgba(2, 20, 50, 0.55);
  --neon-primary: #00f3ff;
  --neon-secondary: #0066ff;
  --neon-alert: #ff0055;
  --neon-success: #00ff99;
  --text-main: #e0f7ff;
  --text-dim: #6b9bb5;
  --border-cyber: rgba(0, 243, 255, 0.3);
  --glow-intense: 0 0 10px #00f3ff, 0 0 20px #00f3ff80, 0 0 40px #00f3ff40;
  --glow-soft: 0 0 5px #00f3ff60;
  --scanline: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-deep);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
}

/* === BACKGROUND FX === */
.cyber-bg {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.08), transparent 25%),
    radial-gradient(circle at 85% 30%, rgba(0, 102, 255, 0.08), transparent 25%),
    linear-gradient(180deg, #000510 0%, #001030 100%);
}
.cyber-grid {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    linear-gradient(var(--border-cyber) 1px, transparent 1px),
    linear-gradient(90deg, var(--border-cyber) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.15;
  transform: perspective(500px) rotateX(60deg) translateY(-100px) scale(2);
  animation: gridMove 20s linear infinite;
}
@keyframes gridMove { 0% { transform: perspective(500px) rotateX(60deg) translateY(0) scale(2); } 100% { transform: perspective(500px) rotateX(60deg) translateY(40px) scale(2); } }

.scanlines {
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: var(--scanline);
  background-size: 100% 4px;
  opacity: 0.03;
}

/* === LAYOUT === */
.main-container {
  position: relative; z-index: 10;
  max-width: 1400px; margin: 0 auto; padding: 20px;
}

/* === HEADER === */
.header-section { text-align: center; margin-bottom: 30px; position: relative; }
.cyber-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: #fff;
  text-shadow: 
    0 0 10px var(--neon-primary),
    0 0 20px var(--neon-primary),
    0 0 40px var(--neon-secondary);
  animation: textFlicker 4s infinite;
  position: relative;
  display: inline-block;
}
@keyframes textFlicker {
  0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; text-shadow: 0 0 10px var(--neon-primary), 0 0 20px var(--neon-primary); }
  20%, 24%, 55% { opacity: 0.8; text-shadow: none; }
}
.cyber-title::after {
  content: ''; display: block; width: 60%; height: 3px;
  background: var(--neon-primary);
  margin: 10px auto 0;
  box-shadow: 0 0 15px var(--neon-primary);
}

/* === TABS === */
.tabs-container {
  display: flex; justify-content: center; gap: 15px; margin-bottom: 25px;
}
.cyber-tab {
  padding: 12px 30px;
  background: rgba(0, 20, 50, 0.4);
  border: 1px solid var(--border-cyber);
  color: var(--text-dim);
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.cyber-tab:hover {
  color: var(--neon-primary);
  background: rgba(0, 243, 255, 0.1);
  box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.2);
}
.cyber-tab.active {
  color: #000;
  background: var(--neon-primary);
  border-color: var(--neon-primary);
  box-shadow: var(--glow-intense);
  text-shadow: none;
}
.cyber-tab.active::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.8) 50%, transparent 55%);
  background-size: 200% 200%;
  animation: shine 2s infinite;
}
@keyframes shine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* === PANELS === */
.cyber-panel {
  background: var(--bg-panel);
  border: 1px solid var(--border-cyber);
  border-radius: 4px;
  padding: 20px;
  backdrop-filter: blur(10px);
  position: relative;
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.cyber-panel::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-primary), transparent);
  box-shadow: 0 0 10px var(--neon-primary);
}

/* === INPUTS & BUTTONS === */
.cyber-input {
  background: rgba(0, 0, 0, 0.6);
  border: 1px solid var(--border-cyber);
  color: var(--neon-primary);
  padding: 10px 15px;
  font-family: 'Rajdhani', monospace;
  font-size: 1rem;
  font-weight: 600;
  width: 180px;
  transition: var(--transition);
}
.cyber-input:focus {
  outline: none;
  border-color: var(--neon-primary);
  box-shadow: var(--glow-soft);
  background: rgba(0, 243, 255, 0.05);
}
.cyber-btn {
  background: linear-gradient(135deg, var(--neon-secondary), var(--neon-primary));
  border: none;
  color: #000;
  padding: 10px 25px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  cursor: pointer;
  clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.cyber-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--glow-intense);
  filter: brightness(1.2);
}
.cyber-btn:active { transform: translateY(0); }

/* === GRID LAYOUT === */
.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}

/* === CARDS === */
.cyber-card {
  background: var(--bg-card);
  border: 1px solid rgba(0, 243, 255, 0.15);
  padding: 15px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.cyber-card::after {
  content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 100%;
  background: var(--neon-primary);
  transform: scaleY(0); transition: transform 0.3s;
  transform-origin: bottom;
}
.cyber-card:hover {
  border-color: var(--neon-primary);
  box-shadow: 0 0 20px rgba(0, 243, 255, 0.15);
  transform: translateY(-5px);
}
.cyber-card:hover::after { transform: scaleY(1); }

.card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 15px;
  border-bottom: 1px solid rgba(0, 243, 255, 0.1);
  padding-bottom: 10px;
}
.card-title {
  font-family: 'Orbitron', sans-serif;
  color: var(--neon-primary);
  font-size: 1.1rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* === CHIPS === */
.chip-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
.cyber-chip {
  padding: 6px 16px;
  background: rgba(0, 20, 50, 0.6);
  border: 1px solid var(--border-cyber);
  color: var(--text-dim);
  font-size: 0.85rem;
  cursor: pointer;
  transition: var(--transition);
  clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
}
.cyber-chip:hover { color: var(--neon-primary); border-color: var(--neon-primary); }
.cyber-chip.active {
  background: var(--neon-primary);
  color: #000;
  font-weight: 700;
  box-shadow: var(--glow-soft);
}

/* === RESULT BOX === */
.result-display {
  background: rgba(0, 0, 0, 0.8);
  border: 1px solid var(--neon-primary);
  padding: 20px;
  text-align: center;
  font-family: 'Orbitron', monospace;
  font-size: 1.5rem;
  color: #fff;
  margin-top: 15px;
  position: relative;
  box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.2);
  text-shadow: 0 0 10px var(--neon-primary);
}
.result-display::before, .result-display::after {
  content: ''; position: absolute; width: 10px; height: 10px;
  border: 2px solid var(--neon-primary);
  transition: all 0.3s;
}
.result-display::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
.result-display::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

/* === EDITABLE TERMINAL === */
.terminal-edit {
  margin-top: 15px;
  background: rgba(0, 10, 20, 0.9);
  border: 1px dashed var(--border-cyber);
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.terminal-label {
  color: var(--neon-secondary);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.8rem;
  text-transform: uppercase;
}
.terminal-input {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--text-dim);
  color: var(--neon-success);
  font-family: 'Rajdhani', monospace;
  font-size: 1.2rem;
  padding: 5px;
  transition: var(--transition);
}
.terminal-input:focus {
  outline: none;
  border-bottom-color: var(--neon-success);
  box-shadow: 0 5px 10px -5px rgba(0, 255, 153, 0.3);
}
.btn-terminal {
  background: transparent;
  border: 1px solid var(--neon-success);
  color: var(--neon-success);
  padding: 5px 15px;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  transition: var(--transition);
}
.btn-terminal:hover {
  background: var(--neon-success);
  color: #000;
  box-shadow: 0 0 15px var(--neon-success);
}

/* === UTILS === */
.spinner {
  width: 30px; height: 30px;
  border: 3px solid rgba(0, 243, 255, 0.3);
  border-top-color: var(--neon-primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: rgba(0, 10, 20, 0.95);
  border: 1px solid var(--neon-primary);
  color: var(--neon-primary);
  padding: 12px 30px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  z-index: 10000;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Responsive */
@media (max-width: 768px) {
  .data-grid { grid-template-columns: 1fr; }
  .terminal-edit { flex-direction: column; align-items: stretch; }
  .btn-terminal { width: 100%; margin-top: 5px; }
}
</style>
</head>
<body>

<div class="cyber-bg"></div>
<div class="cyber-grid"></div>
<div class="scanlines"></div>

<div id="toast" class="toast">SYSTEM READY</div>

<div class="main-container">
  <header class="header-section">
    <h1 class="cyber-title">NEON CYBER DECK</h1>
    <p style="color:var(--text-dim); letter-spacing:2px; margin-top:5px;">PREDIKSI & HITUNG TOGEL v3.2</p>
  </header>

  <nav class="tabs-container">
    <button class="cyber-tab active" onclick="switchTab('prediksi')">🔮 Prediksi</button>
    <button class="cyber-tab" onclick="switchTab('hitung')">🧮 Hitung</button>
  </nav>

  <!-- TAB PREDIKSI -->
  <div id="tab-prediksi" class="tab-content">
    <div class="cyber-panel">
      <div style="display:flex; gap:15px; align-items:center; flex-wrap:wrap;">
        <span style="color:var(--neon-primary); font-family:'Orbitron'">📅 TANGGAL:</span>
        <input type="date" id="input-tanggal" class="cyber-input" onchange="autoUpdateTanggal()">
        <button class="cyber-btn" onclick="manualUpdateTanggal()">UPDATE</button>
        <span id="status-tanggal" style="color:var(--neon-success); font-weight:bold;"></span>
      </div>
    </div>

    <div class="data-grid">
      <!-- Card 1 -->
      <div class="cyber-card">
        <div class="card-header">
          <span class="card-title">🔮 Prediksi</span>
          <span id="count-prediksi" style="color:var(--neon-primary)">0</span>
        </div>
        <input type="text" class="cyber-input" id="search-prediksi" placeholder="Search Data..." style="width:100%; margin-bottom:15px;">
        <div id="list-prediksi" style="max-height:400px; overflow-y:auto;">
          <div class="spinner"></div>
        </div>
      </div>
      <!-- Card 2 -->
      <div class="cyber-card">
        <div class="card-header">
          <span class="card-title">📅 Jadwal</span>
          <span id="count-jadwal" style="color:var(--neon-primary)">0</span>
        </div>
        <input type="text" class="cyber-input" id="search-jadwal" placeholder="Search Data..." style="width:100%; margin-bottom:15px;">
        <div id="list-jadwal" style="max-height:400px; overflow-y:auto;">
          <div class="spinner"></div>
        </div>
      </div>
      <!-- Card 3 -->
      <div class="cyber-card">
        <div class="card-header">
          <span class="card-title">🔗 Link Live</span>
          <span id="count-link" style="color:var(--neon-primary)">0</span>
        </div>
        <input type="text" class="cyber-input" id="search-link" placeholder="Search Data..." style="width:100%; margin-bottom:15px;">
        <div id="list-link" style="max-height:400px; overflow-y:auto;">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB HITUNG -->
  <div id="tab-hitung" class="tab-content" style="display:none;">
    <div class="cyber-panel">
      <div style="display:flex; gap:15px; align-items:center; flex-wrap:wrap;">
        <span style="color:var(--neon-primary); font-family:'Orbitron'">💰 NOMINAL:</span>
        <input type="number" id="input-nominal" class="cyber-input" placeholder="0" onchange="autoUpdateNominal()">
        <button class="cyber-btn" onclick="manualUpdateNominal()">UPDATE</button>
        <span id="status-nominal" style="color:var(--neon-success); font-weight:bold;"></span>
      </div>
    </div>

    <div class="cyber-card" style="border-color:var(--neon-secondary);">
      <div class="card-header">
        <span class="card-title" style="color:var(--neon-secondary)">🎯 CALCULATION MODULE</span>
      </div>
      
      <div style="margin-bottom:15px;">
        <div style="color:var(--text-dim); margin-bottom:5px; font-size:0.9rem;">SELECT TYPE:</div>
        <div class="chip-container" id="chipTipe"></div>
      </div>

      <div style="margin-bottom:15px;">
        <div style="color:var(--text-dim); margin-bottom:5px; font-size:0.9rem;">SELECT LABEL:</div>
        <div class="chip-container" id="chipLabel"></div>
      </div>

      <button class="cyber-btn" onclick="tampilkanValueHitungan()" style="width:100%; margin-bottom:15px;">EXECUTE CALCULATION</button>

      <!-- RESULT DISPLAY -->
      <div id="resultBox" class="result-display">
        WAITING FOR INPUT...
      </div>

      <!-- EDITABLE TERMINAL -->
      <div class="terminal-edit">
        <span class="terminal-label">✏️ MANUAL OVERRIDE:</span>
        <input type="text" id="inputEditResult" class="terminal-input" placeholder="Data will appear here...">
        <button class="btn-terminal" onclick="saveEditedResult()">SAVE</button>
      </div>
    </div>

    <div class="data-grid" id="container-hitung" style="margin-top:20px;">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<script>
// === CONFIG ===
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4', keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  inTgl: $('input-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'), contH: $('container-hitung'),
  toast: $('toast'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox'),
  inputEditResult: $('inputEditResult')
};
let selectedTipe = '', selectedLabel = '', autoRefreshEnabled = true;

// === UTILS ===
function showToast(msg) {
  dom.toast.textContent = '⚡ ' + msg;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 3000);
}
function copyText(text, element) {
  let final = text; try { final = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(final).then(() => {
    showToast('COPIED: ' + (final.length > 15 ? final.substring(0, 15)+'...' : final));
    if (element) {
      element.style.borderColor = 'var(--neon-success)';
      setTimeout(() => element.style.borderColor = '', 500);
    }
  });
}
function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }
function parseCSV(text) {
  let rows = [], row = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (inQ) { if (c === '"' && n === '"') { cell += '"'; i++; } else if (c === '"') inQ = false; else cell += c; }
    else { if (c === '"') inQ = true; else if (c === ',') { row.push(cell); cell = ""; }
      else if ((c === '\r' && n === '\n') || c === '\n' || c === '\r') { row.push(cell); rows.push(row); row = []; cell = ""; if (c === '\r' && n === '\n') i++; }
      else cell += c; }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}
function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('ERROR: Script URL Missing'); return false; }
  try { const params = new URLSearchParams({ action, value }); const res = await fetch(SCRIPT_URL + '?' + params.toString()); return (await res.text()).includes('SUCCESS'); }
  catch(e) { console.error(e); return false; }
}

// === FETCH ===
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now()), data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) { const raw = safeGet(data[0], 1); if (raw) { const p = raw.split('/'); if (p.length === 3) { dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`; dom.statTgl.textContent = 'SYNCED'; } } }
    for (let i = 2; i <= 84 && i < data.length; i++) { const t = safeGet(data[i], 1); if (t) state.prediksi.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    for (let i = 2; i <= 55 && i < data.length; i++) { const t = safeGet(data[i], 2); if (t) state.jadwal.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    for (let i = 56; i <= 82 && i < data.length; i++) { const t = safeGet(data[i], 2); if (t) state.link.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    renderPrediksi();
  } catch(e) { dom.listP.innerHTML = '<div style="color:var(--neon-alert)">CONNECTION ERROR</div>'; }
}
async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now()), data = parseCSV(await res.text());
    if (data[0]) { const nom = safeGet(data[0], 23); if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "Rp " + formatNum(nom); } }
    const sec = [{r:0,c:24,s:2,e:42},{r:43,c:24,s:45,e:80},{r:81,c:24,s:83,e:119},{r:120,c:24,s:122,e:153},{r:154,c:24,s:156,e:179},{r:180,c:24,s:182,e:213},{r:215,c:24,s:217,e:248},{r:249,c:24,s:251,e:282},{r:283,c:24,s:285,e:316}];
    state.hitung = sec.map(x => { let title = safeGet(data[x.r], x.c) || "PASARAN", items = [];
      for (let i = x.s; i <= x.e && i < data.length; i++) if (data[i]) { const ty = safeGet(data[i], 23), rv = safeGet(data[i], 24); if (ty || rv) items.push({ type: ty, res: rv }); }
      return { title, items }; }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) { dom.contH.innerHTML = '<div style="color:var(--neon-alert)">DATA UNAVAILABLE</div>'; }
}

// === RENDER ===
function renderList(container, items, search) {
  const f = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!f.length) { container.innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:20px">NO DATA FOUND</div>'; return; }
  container.innerHTML = f.map(v => `
    <div class="cyber-card" style="margin-bottom:10px; padding:10px; cursor:pointer;" onclick="copyText('${encodeURIComponent(v.content)}',this)">
      <div style="color:var(--neon-primary); font-weight:bold; margin-bottom:5px;">${v.title}</div>
      <div style="color:var(--text-main); font-size:0.9rem;">${v.content}</div>
    </div>
  `).join('');
}
function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value); renderList(dom.listJ, state.jadwal, dom.srcJ.value); renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length; dom.cntJ.textContent = state.jadwal.length; dom.cntL.textContent = state.link.length;
}
function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<div style="color:var(--text-dim);text-align:center">NO CALCULATION DATA</div>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="cyber-card">
      <div class="card-header"><span class="card-title">${s.title}</span></div>
      <div style="max-height:300px; overflow-y:auto;">
        ${s.items.map(it => `
          <div class="cyber-chip" style="width:100%; margin-bottom:5px; display:flex; justify-content:space-between;" onclick="copyText('${encodeURIComponent(it.res)}',this)">
            <span>${it.type}</span>
            <span style="color:var(--neon-primary); font-weight:bold;">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// === CHIPS ===
function renderChips(container, items, type) {
  container.innerHTML = items.map(it => `<div class="cyber-chip" data-value="${it.label||it}">${(it.label||it).substring(0,15)}${(it.label||it).length>15?'...':''}</div>`).join('');
  container.querySelectorAll('.cyber-chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.cyber-chip').forEach(c => c.classList.remove('active')); chip.classList.add('active');
      if (type === 'tipe') { selectedTipe = chip.dataset.value; updateLabelChips(); } else { selectedLabel = chip.dataset.value; }
      if (autoRefreshEnabled && selectedTipe && selectedLabel) { refreshResultAuto(); }
    };
  });
}
function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) { renderChips(dom.chipLabel, [], 'label'); return; }
  const labels = state.kelompok[selectedTipe].map(i => i.label); renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}
async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now()), data = parseCSV(await res.text());
    if (data[0]) { const nom = safeGet(data[0], 23); if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "Rp " + formatNum(nom); } }
    const sec = [{r:0,c:24,s:2,e:42,t:"ALL MARKETS"},{r:43,c:24,s:45,e:80,t:"MACAU 4D"},{r:81,c:24,s:83,e:119,t:"MACAU 5D"},{r:120,c:24,s:122,e:153,t:"KINGKONG"},{r:154,c:24,s:156,e:179,t:"BONUS"},{r:180,c:24,s:182,e:213,t:"JAKARTA"},{r:215,c:24,s:217,e:248,t:"TOTOMALI"},{r:249,c:24,s:251,e:282,t:"HOKIDRAW"},{r:283,c:24,s:285,e:316,t:"SYDNEY/HK"}];
    state.kelompok = {};
    sec.forEach(x => { const items = []; for (let i = x.s; i <= x.e && i < data.length; i++) if (data[i]) { const lb = safeGet(data[i],23), vl = safeGet(data[i],24); if (lb||vl) items.push({ label: lb||"-", value: vl||"-" }); } if (items.length > 0) state.kelompok[x.t] = items; });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error(e); }
}

// === RESULT & EDIT ===
function tampilkanValueHitungan() {
  const result = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = 'SELECT PARAMETERS'; result.style.color = 'var(--text-dim)';
    dom.inputEditResult.value = ''; return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    result.innerHTML = item.value; result.style.color = '#fff';
    result.onclick = () => copyText(item.value, result);
    dom.inputEditResult.value = item.value;
  }
}
function refreshResultAuto() {
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) return;
  const result = dom.resultBox;
  result.style.opacity = '0.5';
  setTimeout(() => {
    const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
    if (item) {
      result.innerHTML = item.value; result.style.color = '#fff'; result.style.opacity = '1';
      result.onclick = () => copyText(item.value, result);
      dom.inputEditResult.value = item.value;
      showToast('DATA REFRESHED');
    }
  }, 300);
}
function saveEditedResult() {
  const val = dom.inputEditResult.value.trim();
  if (!val) { showToast('EMPTY VALUE'); return; }
  dom.resultBox.innerHTML = val + ' <span style="font-size:0.8rem;color:var(--neon-success)">(EDITED)</span>';
  dom.resultBox.style.color = 'var(--neon-success)';
  showToast('MANUAL SAVE OK');
}

// === AUTO UPDATE ===
let autoTimeout = null;
function autoUpdateTanggal() { clearTimeout(autoTimeout); autoTimeout = setTimeout(manualUpdateTanggal, 1000); }
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("SELECT DATE");
  const p = dom.inTgl.value.split('-'), fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.statTgl.textContent = "SYNCING...";
  updateSheet('updateTanggal', fmt).then(ok => {
    if (ok) { dom.statTgl.textContent = "OK"; showToast("DATE UPDATED"); fetchPrediksi(); fetchHitung(); loadHitungData(); }
    else { dom.statTgl.textContent = "ERR"; }
  });
}
function autoUpdateNominal() { clearTimeout(autoTimeout); autoTimeout = setTimeout(() => { manualUpdateNominal(); if(autoRefreshEnabled && selectedTipe && selectedLabel) setTimeout(refreshResultAuto, 500); }, 1000); }
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("ENTER NOMINAL");
  dom.statNom.textContent = "SYNCING...";
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    if (ok) {
      dom.statNom.textContent = "Rp " + formatNum(dom.inNom.value);
      showToast("NOMINAL UPDATED");
      fetchPrediksi(); fetchHitung(); loadHitungData();
      if (autoRefreshEnabled && selectedTipe && selectedLabel) setTimeout(refreshResultAuto, 400);
    } else { dom.statNom.textContent = "ERR"; }
  });
}

// === INIT ===
function switchTab(tab) {
  document.querySelectorAll('.cyber-tab').forEach(t => t.classList.remove('active'));
  event.currentTarget.classList.add('active');
  $('tab-prediksi').style.display = tab === 'prediksi' ? 'block' : 'none';
  $('tab-hitung').style.display = tab === 'hitung' ? 'block' : 'none';
}
function init() {
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  fetchPrediksi(); fetchHitung(); loadHitungData();
}
document.addEventListener('DOMContentLoaded', () => { init(); setTimeout(() => showToast('SYSTEM ONLINE'), 1000); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ HOLO-DECK: PREDIKSI & HITUNG TOGEL ⚡</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* === CORE VARIABLES - DARK & SUBTLE === */
:root {
  --bg: #010208;
  --bg-card: rgba(6, 9, 28, 0.82);
  --bg-card-hover: rgba(10, 14, 38, 0.88);
  --bg-panel: rgba(8, 12, 35, 0.75);
  
  --fg: #c8d6e8;
  --fg-muted: #6b7a99;
  --fg-dim: #4a5568;
  
  --neon-blue: #00b8e6;
  --neon-blue-bright: #4dd0f1;
  --neon-blue-dark: #007a99;
  --neon-purple: #6a54d6;
  --neon-pink: #e63d82;
  
  --glow-blue: 0 0 6px #00b8e640, 0 0 14px #00b8e620, 0 0 28px #00b8e610;
  --glow-blue-lg: 0 0 8px #00b8e650, 0 0 20px #00b8e630, 0 0 42px #00b8e615;
  --glow-soft: 0 0 4px #00b8e630, 0 0 12px #00b8e615;
  
  --border-soft: rgba(0, 184, 230, 0.18);
  --border-hover: rgba(0, 184, 230, 0.35);
  
  --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-bloom: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg); color: var(--fg);
  min-height: 100vh; overflow-x: hidden; position: relative;
  line-height: 1.5;
}

/* === BACKGROUND EFFECTS === */
.bg-neon {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(900px 450px at 20% 20%, rgba(0, 184, 230, 0.05), transparent 70%),
    radial-gradient(700px 350px at 80% 30%, rgba(106, 84, 214, 0.04), transparent 70%),
    radial-gradient(800px 400px at 50% 90%, rgba(0, 184, 230, 0.06), transparent 70%),
    linear-gradient(180deg, #010208 0%, #030614 50%, #010208 100%);
  animation: bgPulse 45s ease-in-out infinite;
}
@keyframes bgPulse { 
  0%,100%{filter:hue-rotate(0deg) brightness(1)} 
  33%{filter:hue-rotate(5deg) brightness(1.015)} 
  66%{filter:hue-rotate(-4deg) brightness(0.99)} 
}

.grid-lines {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    linear-gradient(rgba(0,184,230,0.025) 1px,transparent 1px),
    linear-gradient(90deg, rgba(0,184,230,0.025) 1px, transparent 1px);
  background-size: 50px 50px; animation: gridFlow 55s linear infinite; opacity: 0.5;
}
@keyframes gridFlow { 0%{background-position:0 0} 100%{background-position:50px 50px} }

.orb {
  position: fixed; border-radius: 50%; filter: blur(85px); opacity: 0.09;
  animation: orbMove 50s ease-in-out infinite alternate; z-index: -1;
}
.orb-1 { width: 700px; height: 700px; background: var(--neon-blue); top: -30%; left: -15%; }
.orb-2 { width: 520px; height: 520px; background: var(--neon-purple); bottom: -25%; right: -12%; animation-delay: -25s; }
@keyframes orbMove { 
  0%{transform:translate(0,0) scale(1)} 
  50%{transform:translate(28px,-18px) scale(1.04)} 
  100%{transform:translate(-16px,24px) scale(0.97)} 
}

.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
.particle {
  position: absolute; width: 1.5px; height: 1.5px; border-radius: 50%;
  background: var(--neon-blue); opacity: 0; animation: floatUp 32s infinite ease-in-out;
  box-shadow: 0 0 6px var(--neon-blue), 0 0 16px var(--neon-blue);
}
.particle:nth-child(2n){background:var(--neon-blue-bright);animation-delay:-12s}
.particle:nth-child(3n){background:var(--neon-purple);animation-delay:-20s}
@keyframes floatUp { 
  0%,100%{transform:translateY(110vh) rotate(0);opacity:0} 
  15%{opacity:0.85} 85%{opacity:0.85} 
  100%{transform:translateY(-15vh) rotate(540deg);opacity:0} 
}

/* === LAYOUT === */
.main-container { position: relative; z-index: 10; max-width: 1380px; margin: 0 auto; padding: 12px; }

.header-section { text-align: center; padding: 24px 0 16px; animation: fadeIn 0.65s var(--transition-bloom) backwards; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }

.main-title {
  font-family: 'Orbitron', sans-serif; font-size: clamp(1.6rem, 5vw, 2.8rem); font-weight: 800; letter-spacing: 2px;
  background: linear-gradient(135deg, var(--fg) 0%, var(--neon-blue-bright) 40%, var(--neon-blue) 70%, var(--neon-purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--glow-blue); animation: titleShimmer 4s ease-in-out infinite;
}
@keyframes titleShimmer { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.15)} }
.main-title::after {
  content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
  width: 70%; height: 1.5px; background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-blue-bright), transparent);
  animation: linePulse 3.2s ease-in-out infinite; opacity: 0.7;
}
@keyframes linePulse { 0%,100%{opacity:0.5} 50%{opacity:0.8} }

/* === TABS - CHIP STYLE === */
.tabs-container {
  display: flex; justify-content: center; gap: 5px; margin: 8px 0 16px;
  background: rgba(8,12,32,0.55); border: 1px solid var(--border-soft); border-radius: 14px; padding: 4px;
  max-width: fit-content; margin-inline: auto;
}
.tab-chip {
  padding: 10px 24px; font-family: 'Orbitron', sans-serif; font-weight: 600; font-size: 0.86rem;
  color: var(--fg-muted); background: transparent; border: none; border-radius: 11px;
  cursor: pointer; transition: all var(--transition); position: relative; text-transform: uppercase; letter-spacing: 0.8px;
}
.tab-chip::after {
  content: ''; position: absolute; inset: 0; border-radius: 11px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0,184,230,0.25), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--transition);
}
.tab-chip:hover { color: var(--neon-blue); }
.tab-chip:hover::after { opacity: 1; }
.tab-chip.active {
  color: var(--fg); background: linear-gradient(135deg, rgba(0,184,230,0.12), rgba(106,84,214,0.1));
  border: 1px solid var(--border-hover); box-shadow: var(--glow-blue);
}
.tab-chip.active::before {
  content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%; height: 1.5px;
  background: var(--neon-blue); border-radius: 1px; box-shadow: var(--glow-soft);
}

/* === CONTENT BOX === */
.content-box {
  background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 20px;
  padding: 18px; backdrop-filter: blur(14px); position: relative; overflow: hidden;
}
.content-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-blue-bright), transparent);
  animation: scanLine 5s linear infinite; opacity: 0.6;
}
@keyframes scanLine { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

/* === SETTINGS PANEL === */
.settings-panel {
  background: linear-gradient(135deg, rgba(10,15,42,0.65), rgba(14,20,52,0.55));
  border: 1px solid var(--border-soft); border-radius: 16px; padding: 13px 16px;
  margin-bottom: 18px; display: flex; flex-wrap: nowrap; gap: 13px; align-items: center;
}
.setting-item { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.setting-label { color: var(--neon-blue); font-size: 0.78rem; font-weight: 600; text-shadow: 0 0 6px rgba(0,184,230,0.4); }
.input-neon {
  padding: 8px 12px; background: rgba(4,7,22,0.75); border: 1px solid rgba(0,184,230,0.28);
  border-radius: 10px; color: var(--fg); font-size: 0.88rem; width: 155px;
  transition: all var(--transition); font-family: 'Space Grotesk', sans-serif;
}
.input-neon:focus { outline: none; border-color: var(--neon-blue); box-shadow: var(--glow-blue); background: rgba(7,11,30,0.85); }

/* === BUTTONS === */
.btn-neon {
  padding: 8px 18px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
  border: none; border-radius: 12px; color: #010208; font-family: 'Orbitron', sans-serif;
  font-weight: 600; font-size: 0.78rem; cursor: pointer; transition: all var(--transition);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 0.9px; position: relative; overflow: hidden;
}
.btn-neon::before {
  content: ''; position: absolute; inset: 0; border-radius: 12px; padding: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity 0.22s;
}
.btn-neon:hover::before { opacity: 1; }
.btn-neon:hover { transform: translateY(-1.5px); box-shadow: var(--glow-blue-lg); }
.btn-neon:active { transform: translateY(0); }
.btn-neon:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

.status-badge {
  font-size: 0.78rem; color: #00d6aa; margin-left: 6px; font-weight: 600;
  text-shadow: 0 0 8px rgba(0,214,170,0.45); animation: blink 2.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.72} }

/* === DATA GRID === */
.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; }

/* === SECTION BOX === */
.section-box {
  background: linear-gradient(145deg, rgba(11,16,42,0.7), rgba(16,22,54,0.6));
  border: 1px solid var(--border-soft); border-radius: 17px;
  overflow: hidden; display: flex; flex-direction: column; transition: all var(--transition);
}
.section-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-blue); transform: translateY(-1.5px); }
.section-header {
  background: linear-gradient(90deg, rgba(0,184,230,0.08), transparent 75%);
  padding: 10px 14px; border-bottom: 1px solid var(--border-soft);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title {
  font-family: 'Orbitron', sans-serif; font-weight: 600; color: var(--neon-blue);
  font-size: 0.91rem; text-shadow: 0 0 8px rgba(0,184,230,0.45);
}
.badge-count {
  background: rgba(0,184,230,0.12); color: var(--neon-blue); padding: 2.5px 8px;
  border-radius: 16px; font-size: 0.68rem; font-weight: 600; border: 1px solid rgba(0,184,230,0.3);
}

.search-box { padding: 8px 12px; border-bottom: 1px solid var(--border-soft); }
.search-input {
  width: 100%; padding: 7px 11px; background: rgba(5,9,28,0.65);
  border: 1px solid rgba(0,184,230,0.25); border-radius: 10px; color: var(--fg);
  font-size: 0.85rem; transition: all var(--transition);
}
.search-input:focus { outline: none; border-color: var(--neon-blue); box-shadow: var(--glow-blue); }
.search-input::placeholder { color: var(--fg-muted); opacity: 0.7; }
.section-content { padding: 8px; overflow-y: auto; max-height: 395px; flex-grow: 1; }

/* === ITEM CARD === */
.item-card {
  background: linear-gradient(135deg, rgba(9,14,38,0.65), rgba(14,19,48,0.55));
  border: 1px solid var(--border-soft); border-radius: 14px; padding: 11px 13px;
  margin-bottom: 7px; cursor: pointer; transition: all var(--transition); position: relative; overflow: hidden;
}
.item-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 14px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0,184,230,0.2), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--transition);
}
.item-card:hover::before { opacity: 1; }
.item-card:hover {
  border-color: var(--border-hover); box-shadow: var(--glow-blue);
  background: linear-gradient(135deg, rgba(12,17,44,0.75), rgba(17,23,54,0.65));
  transform: translateY(-1.5px);
}
.item-label { font-size: 0.65rem; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 1.7px; margin-bottom: 2px; font-weight: 600; }
.item-title { color: var(--neon-blue); font-weight: 600; margin-bottom: 3px; font-size: 0.88rem; }
.item-content { font-size: 0.8rem; color: var(--fg); line-height: 1.4; white-space: pre-wrap; word-break: break-word; }

/* === PASARAN BOX === */
.pasaran-box {
  background: linear-gradient(135deg, rgba(10,15,40,0.68), rgba(15,21,52,0.58));
  border: 1px solid var(--border-soft); border-radius: 16px;
  overflow: hidden; margin-bottom: 9px; transition: all var(--transition);
}
.pasaran-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-blue); }
.pasaran-header {
  background: linear-gradient(90deg, rgba(0,184,230,0.1), transparent 75%);
  padding: 10px 14px; border-bottom: 1px solid var(--border-soft);
}
.pasaran-title {
  font-family: 'Orbitron', sans-serif; font-weight: 600; color: var(--neon-blue);
  font-size: 0.85rem; text-shadow: 0 0 7px rgba(0,184,230,0.4);
}
.pasaran-content { padding: 6px 10px; max-height: 320px; overflow-y: auto; }

.bet-item {
  display: flex; justify-content: space-between; align-items: center; padding: 7px 11px;
  margin-bottom: 4px; background: rgba(7,11,32,0.55); border: 1px solid var(--border-soft);
  border-radius: 10px; cursor: pointer; transition: all var(--transition);
}
.bet-item:hover {
  border-color: var(--border-hover); background: rgba(11,16,42,0.7);
  box-shadow: var(--glow-blue); transform: translateX(2.5px);
}
.bet-type { color: var(--fg); font-size: 0.8rem; flex: 1; margin-right: 8px; font-weight: 500; }
.bet-result {
  font-family: 'Orbitron', sans-serif; font-weight: 600; color: var(--neon-blue); font-size: 0.8rem;
  background: rgba(0,184,230,0.1); padding: 2.5px 7px; border-radius: 8px;
  border: 1px solid rgba(0,184,230,0.25);
}
.bet-item:hover .bet-result { background: rgba(0,184,230,0.18); box-shadow: 0 0 9px rgba(0,184,230,0.3); }

/* === NEON SELECTOR - CHIP STYLE === */
.neon-selector {
  background: linear-gradient(135deg, rgba(11,16,44,0.72), rgba(16,22,56,0.62));
  border: 1px solid var(--border-soft); border-radius: 17px; padding: 15px;
  margin: 15px 0; backdrop-filter: blur(10px);
}
.selector-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 13px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border-soft);
}
.selector-icon { font-size: 1.25rem; animation: iconFloat 3.5s ease-in-out infinite; opacity: 0.9; }
@keyframes iconFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
.selector-title {
  font-family: 'Orbitron', sans-serif; font-weight: 600; color: var(--neon-blue);
  font-size: 0.98rem; text-shadow: 0 0 8px rgba(0,184,230,0.45);
}

.chip-group { margin-bottom: 12px; }
.chip-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.77rem; font-weight: 600;
  color: var(--neon-blue); margin-bottom: 7px; display: flex; align-items: center; gap: 5px;
}
.chip-label::before {
  content: ''; width: 2.5px; height: 12px; background: var(--neon-blue);
  border-radius: 1px; box-shadow: 0 0 5px var(--neon-blue); opacity: 0.7;
}
.chips-row { display: flex; flex-wrap: wrap; gap: 6px; }

.chip {
  padding: 6px 13px; background: rgba(6,10,32,0.7); border: 1px solid rgba(0,184,230,0.22);
  border-radius: 22px; color: var(--fg-muted); font-size: 0.79rem; font-weight: 500;
  cursor: pointer; transition: all var(--transition); position: relative; overflow: hidden;
}
.chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 22px;
  background: linear-gradient(135deg, transparent, rgba(0,184,230,0.18), transparent);
  opacity: 0; transition: opacity var(--transition);
}
.chip:hover { color: var(--neon-blue); border-color: rgba(0,184,230,0.4); }
.chip:hover::before { opacity: 1; }
.chip.active {
  color: #010208; background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
  border-color: var(--neon-blue); box-shadow: var(--glow-blue); font-weight: 600;
}
.chip.active::after {
  content: '✓'; position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
  font-size: 0.7rem; font-weight: 800; animation: checkPop 0.28s var(--transition-bloom);
}
@keyframes checkPop { 0%{transform:translateY(-50%) scale(0)} 70%{transform:translateY(-50%) scale(1.25)} 100%{transform:translateY(-50%) scale(1)} }

/* === RESULT BOX - WHITE TEXT === */
.result-box {
  margin-top: 14px; padding: 14px 18px; background: rgba(7,12,36,0.78);
  border: 1px solid rgba(0,184,230,0.28); border-radius: 14px;
  font-family: 'Orbitron', sans-serif; font-size: 1.02rem;
  color: #ffffff; /* ⚪ WHITE TEXT */
  text-align: center; min-height: 48px; display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); cursor: pointer; position: relative;
}
.result-box::after {
  content: '🔄'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font-size: 0.9rem; opacity: 0; transition: opacity var(--transition);
}
.result-box.auto-updating::after { opacity: 0.8; animation: spin 1s linear infinite; }
.result-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-blue); }
.result-box.copied { animation: copiedFlash 0.35s var(--transition-bloom); border-color: #00d6aa; box-shadow: 0 0 16px rgba(0,214,170,0.45); }
@keyframes copiedFlash { 0%{transform:scale(1)} 50%{transform:scale(1.02);background:rgba(0,214,170,0.12)} 100%{transform:scale(1)} }

.hitung-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: end; margin-top: 6px; }
.hitung-btn {
  padding: 10px 22px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-dark));
  border: none; border-radius: 12px; color: #010208; font-family: 'Orbitron', sans-serif;
  font-weight: 600; font-size: 0.82rem; cursor: pointer; transition: all var(--transition);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 0.9px;
}
.hitung-btn:hover { transform: translateY(-1.5px); box-shadow: var(--glow-blue-lg); }
.hitung-btn:active { transform: translateY(0); }

/* === TOAST === */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px) scale(0.94);
  background: linear-gradient(135deg, rgba(10,15,42,0.94), rgba(14,20,52,0.91));
  color: var(--neon-blue); padding: 11px 26px; border-radius: 44px;
  font-weight: 600; font-size: 0.88rem; opacity: 0; transition: all var(--transition-bloom);
  z-index: 1000; border: 1px solid var(--neon-blue); backdrop-filter: blur(12px);
  text-shadow: 0 0 8px rgba(0,184,230,0.55); box-shadow: var(--glow-blue-lg);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

/* === SPINNER === */
.spinner {
  width: 28px; height: 28px; border: 2.5px solid rgba(0,184,230,0.22);
  border-top-color: var(--neon-blue); border-radius: 50%; animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: rgba(4,7,24,0.5); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-blue), var(--neon-blue-dark));
  border-radius: 2px; border: 1px solid rgba(0,184,230,0.22);
}
::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, var(--neon-blue-bright), var(--neon-blue)); }

/* === AUTO-UPDATE INDICATOR === */
.auto-update-indicator {
  position: fixed; top: 14px; right: 14px; background: rgba(0,184,230,0.1);
  border: 1px solid var(--border-soft); border-radius: 10px; padding: 5px 11px;
  font-size: 0.75rem; color: var(--neon-blue); display: none; align-items: center; gap: 5px;
  z-index: 1000; backdrop-filter: blur(8px); animation: pulse 1.5s infinite;
}
.auto-update-indicator.show { display: flex; }
@keyframes pulse { 0%,100%{opacity:0.65} 50%{opacity:0.9} }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .settings-panel { flex-direction: column; align-items: stretch; }
  .setting-item { width: 100%; justify-content: space-between; }
  .input-neon { width: 100%; }
  .data-grid { grid-template-columns: 1fr; }
  .main-title { font-size: clamp(1.4rem, 6vw, 2.2rem); }
  .tab-chip { padding: 9px 18px; font-size: 0.81rem; }
  .hitung-row { grid-template-columns: 1fr; gap: 10px; }
  .hitung-btn { width: 100%; }
  .chips-row { justify-content: center; }
}

::selection { background: rgba(0,184,230,0.22); color: var(--fg); }
button:focus-visible, input:focus-visible { outline: 2px solid var(--neon-blue); outline-offset: 2px; box-shadow: var(--glow-blue); }
@media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body>
<div class="bg-neon"></div><div class="grid-lines"></div>
<div class="orb orb-1"></div><div class="orb orb-2"></div>
<div class="particles" id="particles"></div>
<div id="toast" class="toast">✨ Berhasil!</div>
<div class="auto-update-indicator" id="autoUpdateIndicator"><span>🔄</span><span>Auto-Update</span></div>

<div class="main-container">
  <header class="header-section"><h1 class="main-title">⚡ HOLO-DECK: PREDIKSI & HITUNG TOGEL ⚡</h1></header>
  <nav class="tabs-container">
    <button class="tab-chip active" data-tab="prediksi">🔮 Prediksi</button>
    <button class="tab-chip" data-tab="hitung">🧮 Hitung</button>
  </nav>
  <div class="content-box">
    <!-- TAB PREDIKSI -->
    <div id="tab-prediksi" class="tab-content">
      <div class="settings-panel">
        <div class="setting-item"><span class="setting-label">📅 Tanggal</span><input type="date" id="input-tanggal" class="input-neon" onchange="autoUpdateTanggal()"></div>
        <button class="btn-neon" id="btn-tanggal" onclick="manualUpdateTanggal()">⚡ Update</button>
        <span class="status-badge" id="status-tanggal"></span>
      </div>
      <div class="data-grid">
        <div class="section-box"><div class="section-header"><h3 class="section-title">🔮 Prediksi</h3><span class="badge-count" id="count-prediksi">0</span></div><div class="search-box"><input type="text" class="search-input" id="search-prediksi" placeholder="🔍 Cari..."></div><div class="section-content" id="list-prediksi"><div style="display:flex;justify-content:center;padding:20px"><div class="spinner"></div></div></div></div>
        <div class="section-box"><div class="section-header"><h3 class="section-title">📅 Jadwal</h3><span class="badge-count" id="count-jadwal">0</span></div><div class="search-box"><input type="text" class="search-input" id="search-jadwal" placeholder="🔍 Cari..."></div><div class="section-content" id="list-jadwal"><div style="display:flex;justify-content:center;padding:20px"><div class="spinner"></div></div></div></div>
        <div class="section-box"><div class="section-header"><h3 class="section-title">🔗 Link Live</h3><span class="badge-count" id="count-link">0</span></div><div class="search-box"><input type="text" class="search-input" id="search-link" placeholder="🔍 Cari..."></div><div class="section-content" id="list-link"><div style="display:flex;justify-content:center;padding:20px"><div class="spinner"></div></div></div></div>
      </div>
    </div>

    <!-- TAB HITUNG -->
    <div id="tab-hitung" class="tab-content" style="display:none;">
      <div class="settings-panel">
        <div class="setting-item"><span class="setting-label">💰 Nominal</span><input type="number" id="input-nominal" class="input-neon" placeholder="0" onchange="autoUpdateNominal()"></div>
        <button class="btn-neon" id="btn-nominal" onclick="manualUpdateNominal()">⚡ Update</button>
        <span class="status-badge" id="status-nominal"></span>
      </div>
      <div class="neon-selector">
        <div class="selector-header"><span class="selector-icon">🎯</span><h3 class="selector-title">Pilih Hitungan</h3></div>
        <div class="chip-group"><div class="chip-label">📊 Tipe Hitungan</div><div class="chips-row" id="chipTipe"><div class="chip" data-value="">Semua</div></div></div>
        <div class="chip-group"><div class="chip-label">🏷️ Pilih Label</div><div class="chips-row" id="chipLabel"><div class="chip" data-value="">Semua</div></div></div>
        <div class="hitung-row"><button onclick="tampilkanValueHitungan()" class="hitung-btn">✨ Tampilkan Hasil</button></div>
        <div id="resultBox" class="result-box"><span style="color:var(--fg-muted)">Pilih tipe & label untuk melihat hasil</span></div>
      </div>
      <div class="data-grid" id="container-hitung" style="margin-top:12px"><div style="display:flex;justify-content:center;padding:40px;width:100%"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<script>
// === KONFIGURASI ===
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4', keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'), inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'), contH: $('container-hitung'),
  toast: $('toast'), autoUpdate: $('autoUpdateIndicator'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};
let selectedTipe = '', selectedLabel = '', autoRefreshEnabled = true;

// === UTILS ===
function createParticles() {
  const container = $('particles'); if (!container) return;
  for (let i = 0; i < 38; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    p.style.left = Math.random() * 100 + '%'; p.style.animationDelay = Math.random() * 32 + 's';
    p.style.animationDuration = (26 + Math.random() * 14) + 's'; container.appendChild(p);
  }
}
function showToast(msg) { dom.toast.textContent = '✨ ' + msg; dom.toast.classList.add('show'); setTimeout(() => dom.toast.classList.remove('show'), 2600); }
function showAutoUpdate() { if (dom.autoUpdate) { dom.autoUpdate.classList.add('show'); setTimeout(() => dom.autoUpdate.classList.remove('show'), 1600); } }
function copyText(text, element) {
  let final = text; try { final = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(final).then(() => {
    const preview = final.length > 20 ? final.substring(0, 20) + '...' : final;
    showToast('📋 Disalin: ' + preview);
    if (element) { element.classList.add('copied'); setTimeout(() => element.classList.remove('copied'), 350); }
  }).catch(() => showToast('❌ Gagal salin'));
}
function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }
function parseCSV(text) {
  let rows = [], row = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (inQ) { if (c === '"' && n === '"') { cell += '"'; i++; } else if (c === '"') inQ = false; else cell += c; }
    else { if (c === '"') inQ = true; else if (c === ',') { row.push(cell); cell = ""; }
      else if ((c === '\r' && n === '\n') || c === '\n' || c === '\r') { row.push(cell); rows.push(row); row = []; cell = ""; if (c === '\r' && n === '\n') i++; }
      else cell += c; }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}
function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try { const params = new URLSearchParams({ action, value }); const res = await fetch(SCRIPT_URL + '?' + params.toString()); return (await res.text()).includes('SUCCESS'); }
  catch(e) { console.error(e); return false; }
}

// === FETCH DATA ===
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now()), data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) { const raw = safeGet(data[0], 1); if (raw) { const p = raw.split('/'); if (p.length === 3) { dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`; dom.statTgl.textContent = dom.inTgl.value; } } }
    for (let i = 2; i <= 84 && i < data.length; i++) { const t = safeGet(data[i], 1); if (t) state.prediksi.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    for (let i = 2; i <= 55 && i < data.length; i++) { const t = safeGet(data[i], 2); if (t) state.jadwal.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    for (let i = 56; i <= 82 && i < data.length; i++) { const t = safeGet(data[i], 2); if (t) state.link.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    renderPrediksi();
  } catch(e) { console.error(e); dom.listP.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:20px">❌ Gagal memuat</p>'; }
}
async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now()), data = parseCSV(await res.text());
    if (data[0]) { const nom = safeGet(data[0], 23); if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); } }
    const sec = [{r:0,c:24,s:2,e:42},{r:43,c:24,s:45,e:80},{r:81,c:24,s:83,e:119},{r:120,c:24,s:122,e:153},{r:154,c:24,s:156,e:179},{r:180,c:24,s:182,e:213},{r:215,c:24,s:217,e:248},{r:249,c:24,s:251,e:282},{r:283,c:24,s:285,e:316}];
    state.hitung = sec.map(x => { let title = safeGet(data[x.r], x.c) || "PASARAN", items = [];
      for (let i = x.s; i <= x.e && i < data.length; i++) if (data[i]) { const ty = safeGet(data[i], 23), rv = safeGet(data[i], 24); if (ty || rv) items.push({ type: ty, res: rv }); }
      return { title, items }; }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) { console.error(e); dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:20px">❌ Gagal memuat</p>'; }
}

// === RENDER ===
function renderList(container, items, search) {
  const f = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!f.length) { container.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:20px">📭 Tidak ada data</p>'; return; }
  container.innerHTML = f.map(v => `<div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}',this)"><div class="item-label">📋 Judul</div><div class="item-title">${v.title}</div><div class="item-label">💬 Isi (Klik untuk Copy)</div><div class="item-content">${v.content}</div></div>`).join('');
}
function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value); renderList(dom.listJ, state.jadwal, dom.srcJ.value); renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length; dom.cntJ.textContent = state.jadwal.length; dom.cntL.textContent = state.link.length;
}
function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center">📭 Tidak ada data</p>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `<div class="pasaran-box"><div class="pasaran-header"><h3 class="pasaran-title">🎯 ${s.title}</h3></div><div class="pasaran-content">${s.items.map(it => `<div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}',this)"><span class="bet-type">${it.type}</span><span class="bet-result">${it.res}</span></div>`).join('')}</div></div>`).join('');
}

// === CHIP SELECTOR ===
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + items.map(it => `<div class="chip" data-value="${it.label||it}">${(it.label||it).substring(0,20)}${(it.label||it).length>20?'...':''}</div>`).join('');
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); chip.classList.add('active');
      if (type === 'tipe') { selectedTipe = chip.dataset.value; updateLabelChips(); } else { selectedLabel = chip.dataset.value; }
      if (autoRefreshEnabled && selectedTipe && selectedLabel) { refreshResultAuto(); }
    };
  });
}
function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) { renderChips(dom.chipLabel, [], 'label'); return; }
  const labels = state.kelompok[selectedTipe].map(i => i.label); renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}
async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now()), data = parseCSV(await res.text());
    if (data[0]) { const nom = safeGet(data[0], 23); if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); } }
    const sec = [{r:0,c:24,s:2,e:42,t:"SEMUA PASARAN"},{r:43,c:24,s:45,e:80,t:"TOTO MACAU 4D"},{r:81,c:24,s:83,e:119,t:"TOTO MACAU 5D"},{r:120,c:24,s:122,e:153,t:"KINGKONG 4D"},{r:154,c:24,s:156,e:179,t:"BONUS"},{r:180,c:24,s:182,e:213,t:"JAKARTA"},{r:215,c:24,s:217,e:248,t:"TOTOMALI"},{r:249,c:24,s:251,e:282,t:"HOKIDRAW"},{r:283,c:24,s:285,e:316,t:"SYDNEY & HK"}];
    state.kelompok = {};
    sec.forEach(x => { const items = []; for (let i = x.s; i <= x.e && i < data.length; i++) if (data[i]) { const lb = safeGet(data[i],23), vl = safeGet(data[i],24); if (lb||vl) items.push({ label: lb||"-", value: vl||"-" }); } if (items.length > 0) state.kelompok[x.t] = items; });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error(e); }
}

// === RESULT DISPLAY + AUTO-REFRESH ===
function tampilkanValueHitungan() {
  const result = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = '<span style="color:var(--fg-muted)">Pilih tipe & label terlebih dahulu</span>'; result.classList.remove('auto-updating'); return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    // ⚪ WHITE TEXT FOR RESULT VALUE
    result.innerHTML = `<span style="font-weight:600;color:#ffffff">${item.value}</span>`;
    result.title = 'Klik untuk copy'; result.onclick = () => copyText(item.value, result);
    result.classList.remove('auto-updating');
  }
}
function refreshResultAuto() {
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) return;
  const result = dom.resultBox;
  result.classList.add('auto-updating');
  setTimeout(() => {
    const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
    if (item) {
      // ⚪ WHITE TEXT FOR AUTO-REFRESHED RESULT
      result.innerHTML = `<span style="font-weight:600;color:#ffffff">${item.value}</span>`;
      result.title = 'Klik untuk copy'; result.onclick = () => copyText(item.value, result);
      showToast('🔄 Hasil diperbarui');
    }
    result.classList.remove('auto-updating');
  }, 300);
}

// === AUTO-UPDATE ===
let autoTimeout = null;
function autoUpdateTanggal() { showAutoUpdate(); clearTimeout(autoTimeout); autoTimeout = setTimeout(manualUpdateTanggal, 1000); }
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal!"); const p = dom.inTgl.value.split('-'), fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "⏳...";
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) { localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value); dom.statTgl.textContent = "✅ OK"; showToast("📅 Tersimpan!"); fetchPrediksi(); fetchHitung(); loadHitungData(); }
    else { dom.statTgl.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}
function autoUpdateNominal() {
  showAutoUpdate(); clearTimeout(autoTimeout); autoTimeout = setTimeout(() => {
    manualUpdateNominal();
    if (autoRefreshEnabled && selectedTipe && selectedLabel) { setTimeout(refreshResultAuto, 500); }
  }, 1000);
}
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Isi nominal!"); dom.btnNom.disabled = true; dom.statNom.textContent = "⏳...";
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value);
      showToast("💰 Nominal diperbarui!");
      fetchPrediksi(); fetchHitung(); loadHitungData();
      if (autoRefreshEnabled && selectedTipe && selectedLabel) { setTimeout(refreshResultAuto, 400); }
    } else { dom.statNom.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}

// === INIT ===
function init() {
  document.querySelectorAll('.tab-chip').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active')); t.classList.add('active');
    dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none'; dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
  });
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  fetchPrediksi(); fetchHitung(); loadHitungData();
}
document.addEventListener('DOMContentLoaded', () => { createParticles(); init(); setTimeout(() => showToast('🌙 Holo-Deck Ultimate Loaded'), 900); });
</script>
</body>
</html>

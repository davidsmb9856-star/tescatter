<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#00d4ff"/>
  <title>🔗 Link Launcher - LINE TOGEL</title>
  
  <!-- ✅ Google Fonts - SAMA dengan LINE TOGEL -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* ===== CSS VARIABLES - SAMA PERSIS DENGAN LINE TOGEL ===== */
    :root {
      --bg-dark: #020810;
      --bg-card: #061420;
      --bg-input: #0a1e30;
      --neon-blue: #00d4ff;
      --neon-cyan: #00fff7;
      --neon-glow: rgba(0, 212, 255, 0.4);
      --accent-green: #00ff88;
      --accent-red: #ff4757;
      --accent-orange: #ff9f43;
      --border-color: rgba(0, 212, 255, 0.3);
      --text-primary: #e0f4ff;
      --text-muted: #6b8fa8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      line-height: 1.6;
    }

    /* ========== BACKGROUND EFFECTS - SAMA DENGAN LINE TOGEL ========== */
    .bg-animated {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(0, 180, 255, 0.03) 0%, transparent 70%),
      var(--bg-dark);
    }

    .bg-grid {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .particle {
      position: fixed; width: 4px; height: 4px; background: var(--neon-blue);
      border-radius: 50%; pointer-events: none; z-index: -1;
      box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
      animation: floatParticle 15s infinite linear; opacity: 0.6;
    }

    @keyframes floatParticle {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; } 90% { opacity: 0.6; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    /* ========== CONTAINER & LAYOUT ========== */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 2;
    }

    /* ========== HEADER - SERAGAM ========== */
    .judul-glow {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 900;
      text-align: center;
      color: var(--neon-cyan);
      letter-spacing: 3px;
      margin-bottom: 20px;
      text-shadow: 0 0 30px rgba(0, 255, 247, 0.3);
      padding-top: 15px;
    }

    /* ========== INPUT SECTION - SERAGAM ========== */
    .input-section {
      background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.8) 100%);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 212, 255, 0.1);
    }

    .bonus-textarea {
      width: 100%;
      min-height: 120px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 15px;
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 500;
      resize: vertical;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }

    .bonus-textarea:focus {
      outline: none;
      border-color: var(--neon-blue);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .bonus-textarea::placeholder {
      color: var(--text-muted);
    }

    /* ========== BUTTONS - SERAGAM ========== */
    .bonus-btn {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%);
      border: none;
      border-radius: 10px;
      color: var(--bg-dark);
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      margin: 4px;
    }

    .bonus-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
    }

    .bonus-btn.danger {
      background: linear-gradient(135deg, var(--accent-red) 0%, #cc3344 100%);
    }

    .bonus-btn.danger:hover {
      box-shadow: 0 8px 25px rgba(255, 71, 87, 0.4);
    }

    .bonus-btn.orange {
      background: linear-gradient(135deg, var(--accent-orange) 0%, #e67e22 100%);
    }

    .bonus-btn.orange:hover {
      box-shadow: 0 8px 25px rgba(255, 159, 67, 0.4);
    }

    .action-buttons {
      text-align: center;
      margin: 20px 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ========== LINKS CONTAINER - SERAGAM ========== */
    .links-container {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .link-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.8) 100%);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 20px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
      animation: fadeInUp 0.4s ease-out;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(0, 212, 255, 0.1);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .link-card:hover {
      border-color: var(--neon-blue);
      transform: translateY(-2px);
      box-shadow: 0 15px 50px rgba(0, 212, 255, 0.3), inset 0 1px 0 rgba(0, 212, 255, 0.2);
    }

    .link-url {
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      color: var(--neon-cyan);
      word-break: break-all;
      flex: 1;
      margin-right: 15px;
      font-weight: 500;
    }

    .link-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .link-actions .bonus-btn {
      padding: 10px 18px;
      font-size: 14px;
    }

    /* Tombol yang sudah diklik */
    .btn-opened {
      background: var(--accent-green) !important;
      color: var(--bg-dark) !important;
    }

    .btn-opened:hover {
      box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4);
    }

    /* ========== STATUS & NOTIFICATIONS ========== */
    .status {
      text-align: center;
      margin-top: 20px;
      min-height: 60px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
    }

    .exclusive-notice {
      background: linear-gradient(135deg, rgba(255, 71, 87, 0.15) 0%, rgba(204, 51, 68, 0.1) 100%);
      border: 1px solid var(--accent-red);
      border-radius: 12px;
      padding: 15px 20px;
      color: var(--text-primary);
      font-weight: 600;
      line-height: 1.5;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 15px rgba(255, 71, 87, 0.3); }
      50% { opacity: 0.85; box-shadow: 0 0 25px rgba(255, 71, 87, 0.5); }
    }

    .status-success {
      color: var(--accent-green);
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
    }

    .status-warning {
      color: var(--accent-orange);
    }

    /* ========== TOAST NOTIFICATION ========== */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.95) 100%);
      border: 1px solid var(--neon-blue);
      border-radius: 12px;
      padding: 15px 30px;
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 600;
      z-index: 99999;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast i {
      font-size: 18px;
    }

    .toast.success { border-color: var(--accent-green); }
    .toast.error { border-color: var(--accent-red); }
    .toast.warning { border-color: var(--accent-orange); }

    /* ========== SCROLLBAR ========== */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb {
      background: var(--neon-blue);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--neon-cyan);
    }

    ::selection {
      background: rgba(0, 212, 255, 0.3);
      color: var(--text-primary);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 600px) {
      .container { padding: 14px 11px; }
      .judul-glow { font-size: clamp(1.3rem, 5vw, 1.8rem); }
      .input-section { padding: 18px; }
      .link-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        padding: 18px;
      }
      .link-actions {
        width: 100%;
        justify-content: flex-end;
      }
      .action-buttons {
        flex-direction: column;
        align-items: center;
      }
      .bonus-btn {
        width: 100%;
        max-width: 280px;
      }
    }

    /* ========== ACCESSIBILITY ========== */
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 2px solid var(--neon-blue);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <!-- Background Effects -->
  <div class="bg-animated"></div>
  <div class="bg-grid"></div>
  <div id="particles"></div>
  <div id="toast" class="toast"></div>

  <div class="container">
    <h1 class="judul-glow">🔗 LINK LAUNCHER</h1>

    <div class="input-section">
      <textarea id="linkInput" class="bonus-textarea" placeholder="Masukkan link (satu per baris). Contoh:
google.com
youtube.com"></textarea>
      <div style="text-align: center;">
        <button onclick="addLinks()" class="bonus-btn">
          <i class="fas fa-plus"></i> TAMBAH LINK
        </button>
      </div>
    </div>

    <div class="action-buttons">
      <button onclick="openAllLinks()" class="bonus-btn orange">
        <i class="fas fa-rocket"></i> BUKA SEMUA LINK
      </button>
      <button onclick="clearAllLinks()" class="bonus-btn danger">
        <i class="fas fa-trash"></i> HAPUS SEMUA LINK
      </button>
    </div>

    <div class="links-container" id="linksContainer"></div>

    <div class="status" id="status"></div>
  </div>

  <script>
    let links = [];

    // ================= PARTICLES =================
    function createParticles() {
      const container = document.getElementById('particles');
      if (!container) return;
      container.innerHTML = '';
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        container.appendChild(particle);
      }
    }

    // ================= TOAST NOTIFICATION =================
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      if (!toast) return;
      
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'exclamation-triangle'}"></i> ${message}`;
      toast.classList.add('show');
      
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ================= URL NORMALIZATION =================
    function normalizeUrl(url) {
      url = url.trim();
      if (!url) return null;
      if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
      }
      try {
        new URL(url);
        return url;
      } catch {
        return null;
      }
    }

    // ================= ADD LINKS =================
    function addLinks() {
      const textarea = document.getElementById('linkInput');
      const lines = textarea.value.split('\n').map(l => l.trim()).filter(l => l);
      const validLinks = lines.map(normalizeUrl).filter(Boolean);

      if (validLinks.length === 0) {
        showToast('Tidak ada link valid ditemukan.', 'warning');
        return;
      }

      if (links.length + validLinks.length > 100) {
        showToast(`Maksimal 100 link. Saat ini: ${links.length}`, 'error');
        return;
      }

      links.push(...validLinks);
      renderLinks();
      textarea.value = '';
      showToast(`✅ ${validLinks.length} link berhasil ditambahkan!`, 'success');
    }

    // ================= RENDER LINKS =================
    function renderLinks() {
      const container = document.getElementById('linksContainer');
      container.innerHTML = '';
      
      if (links.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-muted); font-size: 15px;">
          <i class="fas fa-link" style="font-size: 32px; margin-bottom: 15px; opacity: 0.5;"></i><br>
          Belum ada link. Tambahkan link di atas untuk memulai.
        </div>`;
        return;
      }
      
      links.forEach((url, index) => {
        const card = document.createElement('div');
        card.className = 'link-card';
        card.style.animationDelay = `${index * 0.05}s`;
        
        const urlEl = document.createElement('div');
        urlEl.className = 'link-url';
        urlEl.textContent = url;

        const btn = document.createElement('button');
        btn.className = 'bonus-btn';
        btn.innerHTML = '<i class="fas fa-external-link-alt"></i> BUKA';
        btn.dataset.url = url;
        btn.dataset.index = index;

        btn.addEventListener('click', function() {
          // Ubah warna tombol DULU
          this.classList.add('btn-opened');
          this.innerHTML = '<i class="fas fa-check"></i> DIBUKA';

          // Buka link
          const win = window.open(this.dataset.url, '_blank', 'noopener,noreferrer');
          
          // Cek jika popup diblokir
          if (!win || win.closed || typeof win.closed === 'undefined') {
            showToast('🔒 Pop-up diblokir! Izinkan pop-up di browser Anda.', 'error');
            // Reset tombol setelah 2 detik
            setTimeout(() => {
              this.classList.remove('btn-opened');
              this.innerHTML = '<i class="fas fa-external-link-alt"></i> BUKA';
            }, 2000);
          } else {
            showToast('✅ Link dibuka!', 'success');
          }
        });

        const actions = document.createElement('div');
        actions.className = 'link-actions';
        actions.appendChild(btn);

        card.appendChild(urlEl);
        card.appendChild(actions);
        container.appendChild(card);
      });
    }

    // ================= OPEN ALL LINKS =================
    function openAllLinks() {
      if (links.length === 0) {
        showToast('⚠️ Tidak ada link untuk dibuka.', 'warning');
        return;
      }

      // Ubah semua tombol jadi "Dibuka" dulu
      document.querySelectorAll('.link-actions .bonus-btn').forEach(btn => {
        btn.classList.add('btn-opened');
        btn.innerHTML = '<i class="fas fa-check"></i> DIBUKA';
      });

      // Buka semua link dengan delay kecil agar tidak diblokir
      let successCount = 0;
      links.forEach((url, i) => {
        setTimeout(() => {
          const win = window.open(url, '_blank', 'noopener,noreferrer');
          if (win && !win.closed) successCount++;
          
          // Tampilkan status setelah semua selesai
          if (i === links.length - 1) {
            if (successCount === links.length) {
              showToast(`✨ ${links.length} link berhasil dibuka!`, 'success');
              document.getElementById('status').innerHTML = `<span class="status-success">✅ Semua link telah dibuka!</span>`;
            } else {
              showToast(`⚠️ ${links.length - successCount} link mungkin diblokir pop-up.`, 'warning');
              document.getElementById('status').innerHTML = `
                <div class="exclusive-notice">
                  <i class="fas fa-shield-alt"></i> Beberapa pop-up diblokir!<br>
                  Izinkan pop-up di pengaturan browser Anda untuk membuka semua link.
                </div>`;
            }
          }
        }, i * 300); // 300ms delay antar link
      });
    }

    // ================= CLEAR ALL LINKS =================
    function clearAllLinks() {
      if (links.length === 0) {
        showToast('ℹ️ Tidak ada link untuk dihapus.', 'warning');
        return;
      }

      if (confirm(`Anda yakin ingin menghapus ${links.length} link?`)) {
        links = [];
        renderLinks();
        document.getElementById('status').innerHTML = '';
        showToast('🗑️ Semua link telah dihapus.', 'success');
      }
    }

    // ================= KEYBOARD SHORTCUTS =================
    document.addEventListener('keydown', (e) => {
      // Ctrl/Cmd + Enter untuk tambah link
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        addLinks();
      }
      // Escape untuk clear status
      if (e.key === 'Escape') {
        document.getElementById('status').innerHTML = '';
      }
    });

    // ================= INITIALIZATION =================
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      renderLinks(); // Render empty state
      showToast('🔗 Link Launcher Ready!', 'success');
    });
  </script>
</body>
</html>

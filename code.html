<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE TOGEL - Bonus Event System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-deep: #000810;
            --bg-primary: #001020;
            --bg-secondary: #001830;
            --bg-card: rgba(0, 40, 80, 0.4);
            --neon-cyan: #00e5ff;
            --neon-blue: #00a8e8;
            --neon-electric: #00d4ff;
            --neon-glow: #00ffff;
            --neon-green: #00ff9d;
            --neon-yellow: #ffd600;
            --neon-red: #ff3d5a;
            --text-primary: #e8f7ff;
            --text-secondary: #7ec8e3;
            --border-glow: rgba(0, 229, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 168, 232, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 100, 150, 0.05) 0%, transparent 70%),
                linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-primary) 50%, var(--bg-secondary) 100%);
        }

        .grid-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridScroll 30s linear infinite;
        }

        @keyframes gridScroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-electric),
                0 0 30px rgba(0, 229, 255, 0.5);
            animation: floatParticle 10s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-200px) translateX(-20px) scale(0.8); opacity: 0.5; }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: orbPulse 8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: -1;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: var(--neon-blue);
            top: -100px;
            left: -100px;
        }

        .glow-orb-2 {
            width: 500px;
            height: 500px;
            background: var(--neon-cyan);
            bottom: -150px;
            right: -150px;
            animation-delay: 4s;
        }

        @keyframes orbPulse {
            0% { transform: scale(1); opacity: 0.1; }
            100% { transform: scale(1.2); opacity: 0.2; }
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .tab-content {
            display: block;
            animation: contentFadeIn 0.6s ease-out;
        }

        @keyframes contentFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bonus-section {
            background: linear-gradient(145deg, var(--bg-card), rgba(0, 60, 100, 0.3));
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.1), 0 20px 60px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .bonus-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        }

        .judul-glow {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            color: var(--neon-glow);
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-blue);
            margin-bottom: 8px;
            letter-spacing: 6px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        .bonus-title {
            font-family: 'Orbitron', monospace;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            margin-bottom: 28px;
            letter-spacing: 3px;
        }

        @keyframes titleGlow {
            0% { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-blue); }
            100% { text-shadow: 0 0 20px var(--neon-glow), 0 0 40px var(--neon-glow), 0 0 80px var(--neon-cyan); }
        }

        .neon-switch-btn {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 14px 28px;
            background: linear-gradient(145deg, rgba(0, 40, 80, 0.6), rgba(0, 60, 100, 0.4));
            border: 1px solid rgba(0, 229, 255, 0.25);
            color: var(--neon-cyan);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .neon-switch-btn:hover {
            background: linear-gradient(145deg, rgba(0, 60, 100, 0.8), rgba(0, 80, 120, 0.6));
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
            transform: translateY(-3px);
        }

        .neon-switch-btn.active {
            background: linear-gradient(145deg, rgba(0, 100, 150, 0.9), rgba(0, 130, 180, 0.7));
            border-color: var(--neon-glow);
            color: #ffffff;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.4);
        }

        .neon-switch-btn.danger {
            border-color: rgba(255, 61, 90, 0.3);
            color: var(--neon-red);
        }

        .neon-switch-btn.danger:hover {
            background: linear-gradient(145deg, rgba(100, 20, 40, 0.8), rgba(150, 30, 50, 0.6));
            border-color: var(--neon-red);
        }
        
        .neon-switch-btn.small {
             padding: 6px 12px; 
             font-size: 12px; 
             letter-spacing: 0.5px;
        }

        .bonus-mode {
            animation: modeFadeIn 0.5s ease-out;
        }

        @keyframes modeFadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .bonus-textarea, textarea {
            width: 100%;
            min-height: 160px;
            padding: 18px;
            background: linear-gradient(145deg, rgba(0, 20, 40, 0.9), rgba(0, 30, 60, 0.8));
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            resize: vertical;
            transition: all 0.3s ease;
            line-height: 1.7;
        }

        .bonus-textarea:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
        }

        .bonus-input-group { margin: 18px 0; }

        .bonus-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--neon-cyan);
            margin-bottom: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .bonus-input, input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: linear-gradient(145deg, rgba(0, 20, 40, 0.9), rgba(0, 30, 60, 0.8));
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .bonus-input:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.2);
        }

        .bonus-button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin: 24px 0;
        }

        .bonus-btn {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 14px 32px;
            background: linear-gradient(145deg, rgba(0, 100, 150, 0.8), rgba(0, 140, 180, 0.6));
            border: 1px solid var(--neon-blue);
            color: #ffffff;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.35s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bonus-btn:hover {
            background: linear-gradient(145deg, rgba(0, 140, 180, 0.9), rgba(0, 180, 220, 0.7));
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.4);
            transform: translateY(-3px);
        }

        .bonus-btn.danger {
            background: linear-gradient(145deg, rgba(150, 30, 50, 0.8), rgba(200, 40, 60, 0.6));
            border-color: var(--neon-red);
        }
        
        .bonus-btn.danger:hover {
            background: linear-gradient(145deg, rgba(200, 40, 60, 0.9), rgba(255, 50, 80, 0.7));
        }

        .bonus-result {
            margin-top: 24px;
            padding: 24px;
            background: linear-gradient(145deg, rgba(0, 50, 100, 0.3), rgba(0, 70, 120, 0.2));
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 14px;
            line-height: 2;
        }

        .bonus-angka {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            color: var(--neon-glow);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        /* Gallery - LARGER IMAGES */
        .gallery-container { width: 100%; perspective: 1000px; }

        .combined-image-slot {
            background: linear-gradient(145deg, rgba(0, 40, 80, 0.6), rgba(0, 60, 100, 0.4));
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.4s ease;
            width: 100%;
        }

        .combined-image-slot:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.5);
            border-color: var(--neon-cyan);
        }

        .gallery-images-wrapper {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .gallery-img-container {
            position: relative;
            flex: 1;
            min-width: 200px;
            max-width: 350px;
        }

        .gallery-img {
            width: 100%;
            height: auto;
            min-height: 200px;
            max-height: 350px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            transition: all 0.3s ease;
        }

        .gallery-img:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
        }

        .caption-userid {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 700;
            text-shadow: 0 0 15px var(--neon-cyan);
            margin-bottom: 16px;
        }

        .data-card {
            background: linear-gradient(145deg, rgba(0, 30, 60, 0.6), rgba(0, 50, 90, 0.4));
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .data-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        }

        .close-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .close-btn:hover {
            transform: scale(1.2) rotate(90deg);
            text-shadow: 0 0 30px var(--neon-glow);
            color: var(--neon-glow);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 32px;
            background: linear-gradient(145deg, rgba(0, 50, 100, 0.95), rgba(0, 80, 130, 0.9));
            border: 1px solid var(--neon-cyan);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            z-index: 99999;
            animation: toastSlide 0.5s ease-out;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.3);
        }

        @keyframes toastSlide {
            from { opacity: 0; transform: translateX(120px) scale(0.8); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        .zoom-nav-button {
            transition: all 0.3s ease;
            font-family: 'Orbitron', monospace;
            background: rgba(0, 229, 255, 0.15); 
            border: 1px solid var(--neon-cyan); 
            color: var(--neon-glow); 
            padding: 14px 24px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 20px;
        }

        .zoom-nav-button:hover {
            background: rgba(0, 229, 255, 0.4);
            transform: scale(1.15);
        }

        .zoom-nav-button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

        /* Custom Button Styles for Input Scatter */
        .input-action-group {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 5px;
        }

        .scan-btn-custom {
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .scan-btn-custom:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        }

        .scan-btn-custom.green { background: var(--neon-green); }
        .scan-btn-custom.lens { background: #fff; color: #000; border: 1px solid #fff; }
        .scan-btn-custom.lens img { width: 14px; height: 14px; }

        /* Modal for OCR Results */
        .ocr-modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            background: rgba(0, 5, 15, 0.97); 
            z-index: 10001; 
            padding: 15px; 
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .bonus-section { padding: 20px; }
            .judul-glow { font-size: 24px; }
            .gallery-img-container { min-width: 140px; }
            .gallery-img { min-height: 140px; }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="grid-layer"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="particles-container" id="particlesContainer"></div>

    <div class="main-container">
        <div id="cekBonusEventTab" class="tab-content">
            <div class="bonus-section">
                <h3 class="judul-glow">LINE TOGEL</h3>
                <h2 class="bonus-title">BONUS EVENT</h2>

                <div style="display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin: 20px 0;">
                    <button class="neon-switch-btn active" onclick="switchBonusMode('bonusAsli')" id="btn-bonusAsli">Cek Bonus Asli</button>
                    <button class="neon-switch-btn" onclick="switchBonusMode('galeri')" id="btn-galeri">Galeri Gambar</button>
                    <button class="neon-switch-btn" onclick="switchBonusMode('inputScatter')" id="btn-inputScatter">Input Scatter (2 Data)</button>
                </div>

                <!-- MODE 1: CEK BONUS ASLI -->
                <div id="modeBonusAsli" class="bonus-mode">
                    <textarea id="bonusTextarea" class="bonus-textarea" placeholder="Tempelkan data transaksi... (Hanya nominal Credit yang dihitung)"></textarea>
                    <div class="bonus-input-group">
                        <label for="bonusPatokan" class="bonus-label">Nilai Patokan</label>
                        <input type="text" id="bonusPatokan" class="bonus-input" placeholder="Contoh: 5000000">
                    </div>
                    <div class="bonus-input-group">
                        <label for="bonusSurplus" class="bonus-label">Nilai Surplus</label>
                        <input type="text" id="bonusSurplus" class="bonus-input" placeholder="Contoh: 1500000">
                    </div>
                    <div class="bonus-button-group">
                        <button onclick="hitungBonusEvent()" class="bonus-btn">Hitung Bonus</button>
                        <button onclick="hapusBonusEvent()" class="bonus-btn danger">Bersihkan</button>
                    </div>
                    <div id="bonusHasil" class="bonus-result"></div>
                </div>

                <!-- MODE 2: GALERI GAMBAR -->
                <div id="modeGaleri" class="bonus-mode" style="display: none;">
                    <h2 class="bonus-title">GALERI GAMBAR</h2>
                    <p style="text-align: center; color: var(--text-secondary); margin-bottom: 16px;">
                        <strong style="color: var(--neon-cyan);">Format:</strong> USERID link1 link2 link3
                    </p>
                    <textarea id="bonusLinkInput" placeholder="Tempelkan data paket..." rows="5" oninput="handleBonusInput()" onpaste="handleBonusInput()"></textarea>
                    <div class="bonus-button-group">
                        <button onclick="clearBonusAllData()" class="bonus-btn danger">Hapus Semua</button>
                    </div>
                    <hr style="margin: 24px 0; border-color: rgba(0, 229, 255, 0.15);">
                    
                    <div class="gallery-container" style="display: flex; justify-content: center; margin: 24px 0;">
                        <div class="combined-image-slot" id="bonusCombinedImageSlot" onclick="openBonusZoom()">
                            <p class="caption-userid" id="bonusCombinedSlotUserid">USER ID</p>
                            <div class="gallery-images-wrapper" id="galleryImagesWrapper">
                                <div class="gallery-img-container">
                                    <img id="bonusImgSlot1" class="gallery-img" src="https://via.placeholder.com/350x250/001830/00e5ff?text=Gambar+1" onclick="event.stopPropagation(); openLightboxById('bonusImgSlot1');">
                                </div>
                                <div class="gallery-img-container">
                                    <img id="bonusImgSlot2" class="gallery-img" src="https://via.placeholder.com/350x250/001830/00e5ff?text=Gambar+2" onclick="event.stopPropagation(); openLightboxById('bonusImgSlot2');">
                                </div>
                                <div class="gallery-img-container">
                                    <img id="bonusImgSlot3" class="gallery-img" src="https://via.placeholder.com/350x250/001830/00e5ff?text=Gambar+3" onclick="event.stopPropagation(); openLightboxById('bonusImgSlot3');">
                                </div>
                            </div>
                        </div>
                    </div>
                    <p class="package-info" style="text-align: center; color: var(--neon-cyan);">
                        Paket: <span id="bonusCurrentPackageNum">0</span> / <span id="bonusMaxPackageNum">0</span>
                    </p>
                </div>

                <!-- MODE 3: INPUT SCATTER (2 DATA) -->
                <div id="modeInputScatter" class="bonus-mode" style="display: none;">
                    <div style="display: flex; gap: 20px; justify-content: space-between; flex-wrap: wrap;">
                        
                        <!-- DATA 1 -->
                        <div class="data-card" style="flex: 1; min-width: 300px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;">
                                <h4 style="color: var(--neon-cyan); margin: 0; font-size: 15px; font-family: 'Orbitron', monospace;">DATA SCATTER 1</h4>
                                <button onclick="copyData(1)" class="neon-switch-btn small">Copy</button>
                            </div>
                            
                            <!-- S1 -->
                            <div class="bonus-input-group" style="margin: 8px 0;">
                                <label class="bonus-label" style="font-size: 11px;">1. S1 Link</label>
                                <input type="text" id="bonusScatter1_1" class="bonus-input" placeholder="Link S1..." style="padding: 10px 14px; font-size: 14px;">
                                <div class="input-action-group">
                                    <button type="button" onclick="scanScatterField(1, 1)" class="scan-btn-custom">Scan OCR</button>
                                    <button type="button" onclick="openLens(1, 1)" class="scan-btn-custom lens">Google Lens</button>
                                </div>
                            </div>
                            <!-- S2 -->
                            <div class="bonus-input-group" style="margin: 8px 0;">
                                <label class="bonus-label" style="font-size: 11px;">2. S2 Link</label>
                                <input type="text" id="bonusScatter2_1" class="bonus-input" placeholder="Link S2..." style="padding: 10px 14px; font-size: 14px;">
                                <div class="input-action-group">
                                    <button type="button" onclick="scanScatterField(1, 2)" class="scan-btn-custom">Scan OCR</button>
                                    <button type="button" onclick="openLens(1, 2)" class="scan-btn-custom lens">Google Lens</button>
                                </div>
                            </div>
                            <!-- S3 -->
                            <div class="bonus-input-group" style="margin: 8px 0;">
                                <label class="bonus-label" style="font-size: 11px;">3. S3 Link</label>
                                <input type="text" id="bonusScatter3_1" class="bonus-input" placeholder="Link S3..." style="padding: 10px 14px; font-size: 14px;">
                                <div class="input-action-group">
                                    <button type="button" onclick="scanScatterField(1, 3)" class="scan-btn-custom">Scan OCR</button>
                                    <button type="button" onclick="openLens(1, 3)" class="scan-btn-custom lens">Google Lens</button>
                                </div>
                            </div>

    <script>
        // ==================== GLOBAL VARIABLES ====================
        let currentBonusMode = 'bonusAsli';
        let bonusAllPackagesData = [];
        let bonusCurrentPackageIndex = 0;
        const bonusPackageSize = 3;
        let isBonusZoomOpen = false;
        let imageList = [];
        let currentImageIndex = 0;
        let bonusInputTimeout = null;
        
        // To track which input triggered the OCR modal
        let currentOcrTarget = { dataIndex: 1, fieldIndex: 1 };

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            switchBonusMode('bonusAsli');
        });

        function createParticles() {
            const container = document.getElementById('particlesContainer');
            if (!container) return;
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(particle);
            }
        }

        function showToast(message) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3500);
        }

        // ==================== MODE SWITCHER ====================
        function switchBonusMode(mode) {
            ['modeBonusAsli', 'modeGaleri', 'modeInputScatter'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
            document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).style.display = 'block';

            ['bonusAsli', 'galeri', 'inputScatter'].forEach(id => {
                const btn = document.getElementById('btn-' + id);
                if (btn) btn.classList.toggle('active', id === mode);
            });
            currentBonusMode = mode;
        }

        // ==================== HITUNG BONUS (CREDIT ONLY) ====================
        function hitungBonusEvent() {
            const isi = document.getElementById("bonusTextarea").value.trim();
            const patokan = parseInt(document.getElementById("bonusPatokan").value.replace(/[^\d]/g, '')) || 0;
            const surplus = parseInt(document.getElementById("bonusSurplus").value.replace(/[^\d]/g, '')) || 0;

            if (!isi) { showToast("Tempelkan data terlebih dahulu."); return; }

            const lines = isi.split("\n");
            let totalCredit = 0, creditCount = 0, totalDebit = 0, debitCount = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.toLowerCase() === 'credit') {
                    const nextLine = lines[i + 1] ? lines[i + 1].trim() : '';
                    const match = nextLine.match(/IDR\s([\d,\.]+)/i);
                    if (match) {
                        totalCredit += parseFloat(match[1].replace(/,/g, '').replace(/\./g, ''));
                        creditCount++;
                    }
                }
                if (line.toLowerCase() === 'debit') {
                    const nextLine = lines[i + 1] ? lines[i + 1].trim() : '';
                    const match = nextLine.match(/IDR\s([\d,\.]+)/i);
                    if (match) {
                        totalDebit += parseFloat(match[1].replace(/,/g, '').replace(/\./g, ''));
                        debitCount++;
                    }
                }
            }

            const hasilDiv = document.getElementById("bonusHasil");
            let html = `<div style="padding: 15px; background: rgba(0, 255, 157, 0.1); border-radius: 10px; border: 1px solid var(--neon-green); margin-bottom: 15px;">
                            <div style="font-size: 14px; color: var(--text-secondary);">Total Credit (${creditCount} transaksi):</div>
                            <span class="bonus-angka" style="font-size: 24px;">IDR ${totalCredit.toLocaleString('en-US')}</span>
                        </div>`;
            
            if (debitCount > 0) {
                html += `<div style="padding: 10px; background: rgba(255, 61, 90, 0.1); border-radius: 10px; border: 1px solid var(--neon-red); opacity: 0.6; margin-bottom: 15px;">
                            <div style="font-size: 12px; color: var(--text-secondary);">Total Debit (${debitCount} transaksi) - Diabaikan:</div>
                            <span style="color: var(--neon-red);">IDR ${totalDebit.toLocaleString('en-US')}</span>
                        </div>`;
            }

            if (patokan || surplus) {
                const totalPengurang = patokan + surplus;
                const selisih = totalCredit - totalPengurang;
                const color = selisih >= 0 ? 'var(--neon-green)' : 'var(--neon-red)';
                html += `<hr style="border-color: rgba(0, 229, 255, 0.15); margin: 15px 0;">`;
                html += `<div>Patokan: <span class="bonus-angka">IDR ${patokan.toLocaleString('en-US')}</span></div>`;
                html += `<div>Surplus: <span class="bonus-angka">IDR ${surplus.toLocaleString('en-US')}</span></div>`;
                html += `<div style="margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px; border: 1px solid ${color};">
                            <div style="font-size: 14px;">Selisih:</div>
                            <span class="bonus-angka" style="color: ${color}; font-size: 20px;">${selisih >= 0 ? '+' : ''}IDR ${selisih.toLocaleString('en-US')}</span>
                        </div>`;
            }
            hasilDiv.innerHTML = html;
        }

        function hapusBonusEvent() {
            document.getElementById('bonusTextarea').value = '';
            document.getElementById('bonusPatokan').value = '';
            document.getElementById('bonusSurplus').value = '';
            document.getElementById('bonusHasil').innerHTML = '';
            showToast('Form dibersihkan.');
        }

        // ==================== INPUT SCATTER: SCAN & LENS ====================
        
        // Open Google Lens
        function openLens(dataIndex, fieldIndex) {
            const input = document.getElementById(`bonusScatter${fieldIndex}_${dataIndex}`);
            if (!input) return;
            const url = input.value.trim();
            if (!url) {
                showToast('Masukkan link terlebih dahulu!');
                return;
            }
            // Google Lens URL scheme for images
            window.open(`https://lens.google.com/uploadbyurl?url=${encodeURIComponent(url)}`, '_blank');
        }

        // OCR Functions
        function scanScatterField(dataIndex, fieldIndex) {
            const input = document.getElementById(`bonusScatter${fieldIndex}_${dataIndex}`);
            const url = input ? input.value.trim() : '';
            
            if (!url) {
                showToast('Masukkan link terlebih dahulu!');
                return;
            }

            currentOcrTarget = { dataIndex, fieldIndex };
            
            const img = document.getElementById('ocrImage');
            const resultDiv = document.getElementById('ocrResult');
            const modal = document.getElementById('scanOcrModal');

            img.src = url;
            modal.style.display = 'block';
            resultDiv.innerHTML = '<span style="color: var(--text-secondary);">Memindai...</span>';

            if (typeof Tesseract === 'undefined') {
                resultDiv.innerHTML = '<span style="color: var(--neon-red);">Tesseract.js belum dimuat.</span>';
                return;
            }

            Tesseract.recognize(url, 'eng', { logger: m => {} })
            .then(({ data: { text } }) => {
                const codes = extractCodesFromText(text);
                if (codes.length === 0) {
                    resultDiv.innerHTML = '<span style="color: var(--neon-yellow);">Tidak ditemukan kode.</span>';
                } else {
                    resultDiv.innerHTML = `<b style="color: var(--neon-cyan);">Kode Ditemukan:</b><br><br>`;
                    codes.forEach(code => {
                        const div = document.createElement('div');
                        div.style.cssText = 'margin-bottom: 10px; padding: 10px; background: rgba(0, 100, 150, 0.2); border-radius: 8px; display: flex; justify-content: space-between; align-items: center;';
                        div.innerHTML = `<span style="font-family: monospace; word-break: break-all;">${code}</span>
                            <div style="display: flex; gap: 5px;">
                                <button onclick="copyWithFeedback(this, '${code}')" class="scan-btn-custom">Copy</button>
                                <button onclick="selectCodeForInput('${code}')" class="scan-btn-custom green">Pilih</button>
                            </div>`;
                        resultDiv.appendChild(div);
                    });
                }
            }).catch(err => {
                console.error(err);
                resultDiv.innerHTML = '<span style="color: var(--neon-red);">Gagal membaca gambar.</span>';
            });
        }

        function selectCodeForInput(code) {
            const kodeInput = document.getElementById(`bonusKodeTransaksi${currentOcrTarget.dataIndex}`);
            if (kodeInput) kodeInput.value = code;
            closeOcrModal();
            showToast(`Kode dipilih: ${code}`);
        }

        function closeOcrModal() {
            document.getElementById('scanOcrModal').style.display = 'none';
        }

        function extractCodesFromText(text) {
            const rawLines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let hasilGabung = [];
            let hasilLangsung = [];

            for (let i = 0; i < rawLines.length; i++) {
                const line = rawLines[i];
                const match = line.match(/\b\d{9,10}\b/);
                if (match) {
                    if (i + 1 < rawLines.length) {
                        const nextLine = rawLines[i + 1].trim();
                        const nextMatch = nextLine.match(/\b\d{8,}\b/);
                        if (nextMatch) {
                            hasilGabung.push(match[0] + nextMatch[0]);
                            i++;
                            continue;
                        }
                    }
                    hasilGabung.push(match[0]);
                }
            }
            for (let i = 0; i < rawLines.length; i++) {
                const matches = rawLines[i].match(/\d{8,}/g);
                if (matches) matches.forEach(m => hasilLangsung.push(m));
            }

            const allCodes = [...new Set(hasilGabung), ...new Set(hasilLangsung)];
            return [...new Set(allCodes)];
        }

        function copyWithFeedback(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.innerHTML;
                btn.innerHTML = 'OK';
                btn.style.background = 'var(--neon-green)';
                setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; }, 1000);
            });
        }

        // ==================== INPUT SCATTER: COPY & CLEAR ====================
        function copyData(dataIndex) {
            const parts = [];
            // Order: UID, S1, S2, S3, Rek, Kode
            const uid = document.getElementById(`bonusUserid${dataIndex}`).value.trim();
            const s1 = document.getElementById(`bonusScatter1_${dataIndex}`).value.trim();
            const s2 = document.getElementById(`bonusScatter2_${dataIndex}`).value.trim();
            const s3 = document.getElementById(`bonusScatter3_${dataIndex}`).value.trim();
            const rek = document.getElementById(`bonusRekening${dataIndex}`).value.trim();
            const kode = document.getElementById(`bonusKodeTransaksi${dataIndex}`).value.trim();

            if(uid) parts.push(uid);
            if(s1) parts.push(s1);
            if(s2) parts.push(s2);
            if(s3) parts.push(s3);
            if(rek) {
                const rParts = rek.split(',').map(p => p.trim());
                if(rParts[1]) parts.push(rParts[1]); // Nomor
                if(rParts[0]) parts.push(rParts[0]); // Nama
            }
            if(kode) parts.push(kode);

            const text = parts.join('\t');
            navigator.clipboard.writeText(text).then(() => showToast(`Data ${dataIndex} disalin!`));
        }

        function copySemuaData() {
            const d1 = getDataString(1);
            const d2 = getDataString(2);
            let lines = [];
            if(d1) lines.push(d1);
            if(d2) lines.push(d2);
            navigator.clipboard.writeText(lines.join('\n')).then(() => showToast('Semua data disalin!'));
        }

        function getDataString(dataIndex) {
             const parts = [];
            const uid = document.getElementById(`bonusUserid${dataIndex}`).value.trim();
            const s1 = document.getElementById(`bonusScatter1_${dataIndex}`).value.trim();
            const s2 = document.getElementById(`bonusScatter2_${dataIndex}`).value.trim();
            const s3 = document.getElementById(`bonusScatter3_${dataIndex}`).value.trim();
            const rek = document.getElementById(`bonusRekening${dataIndex}`).value.trim();
            const kode = document.getElementById(`bonusKodeTransaksi${dataIndex}`).value.trim();

            if(uid) parts.push(uid);
            if(s1) parts.push(s1);
            if(s2) parts.push(s2);
            if(s3) parts.push(s3);
            if(rek) {
                const rParts = rek.split(',').map(p => p.trim());
                if(rParts[1]) parts.push(rParts[1]);
                if(rParts[0]) parts.push(rParts[0]);
            }
            if(kode) parts.push(kode);
            return parts.join('\t');
        }

        function hapusSemuaData() {
            [1, 2].forEach(idx => {
                ['bonusUserid', 'bonusScatter1', 'bonusScatter2', 'bonusScatter3', 'bonusRekening', 'bonusKodeTransaksi'].forEach(base => {
                    const el = document.getElementById(`${base}${idx}`);
                    if (el) el.value = '';
                });
            });
            showToast('Semua input scatter dihapus.');
        }

        // ==================== GALERI GAMBAR LOGIC ====================
        function handleBonusInput() {
            clearTimeout(bonusInputTimeout);
            bonusInputTimeout = setTimeout(loadBonusImages, 100);
        }

        function loadBonusImages() {
            const input = document.getElementById('bonusLinkInput').value;
            const lines = input.split('\n').map(l => l.trim()).filter(l => l);
            bonusAllPackagesData = [];

            lines.forEach(line => {
                const parts = line.split(/\s+/);
                const urls = parts.filter(p => p.startsWith('http'));
                const userid = parts[0] && !parts[0].startsWith('http') ? parts[0] : 'N/A';
                if (urls.length > 0) {
                    const links = urls.slice(0, 3);
                    while(links.length < 3) links.push('');
                    bonusAllPackagesData.push({ userid, links });
                }
            });

            document.getElementById('bonusMaxPackageNum').textContent = bonusAllPackagesData.length;
            if (bonusAllPackagesData.length > 0) {
                bonusCurrentPackageIndex = Math.max(0, Math.min(bonusCurrentPackageIndex, bonusAllPackagesData.length - 1));
                updateBonusGallery(bonusCurrentPackageIndex);
            } else {
                updateBonusGallery(-1);
            }
        }

        function updateBonusGallery(index) {
            const slots = ['bonusImgSlot1', 'bonusImgSlot2', 'bonusImgSlot3'].map(id => document.getElementById(id));
            const uidEl = document.getElementById('bonusCombinedSlotUserid');
            const curEl = document.getElementById('bonusCurrentPackageNum');
            
            if (index >= 0 && index < bonusAllPackagesData.length) {
                const pkg = bonusAllPackagesData[index];
                uidEl.textContent = 'USER ID: ' + pkg.userid;
                slots.forEach((img, i) => {
                    img.src = pkg.links[i] || 'https://via.placeholder.com/350x250/001830/00e5ff?text=-';
                });
                curEl.textContent = index + 1;
            } else {
                uidEl.textContent = 'Belum Ada Data';
                slots.forEach((img, i) => {
                    img.src = `https://via.placeholder.com/350x250/001830/00e5ff?text=Gambar+${i+1}`;
                });
                curEl.textContent = '0';
            }
        }

        function clearBonusAllData() {
            document.getElementById('bonusLinkInput').value = '';
            bonusAllPackagesData = [];
            loadBonusImages();
            showToast('Data galeri dihapus.');
        }

        // --- ZOOM & LIGHTBOX ---
        function openBonusZoom() {
            if (bonusAllPackagesData.length === 0) return;
            isBonusZoomOpen = true;
            updateZoomContent();
            document.getElementById('bonusZoomModal').style.display = 'block';
        }

        function closeBonusZoom() {
            document.getElementById('bonusZoomModal').style.display = 'none';
            isBonusZoomOpen = false;
        }

        function updateZoomContent() {
            const pkg = bonusAllPackagesData[bonusCurrentPackageIndex];
            document.getElementById('bonusZoomedUserid').textContent = pkg.userid;
            
            const wrapper = document.getElementById('bonusZoomedContentWrapper');
            wrapper.innerHTML = '';
            
            // Create 3 images side by side - LARGER
            pkg.links.filter(Boolean).forEach(link => {
                const img = document.createElement('img');
                // Increased size: max-width 550px
                img.style.cssText = 'max-width: 550px; max-height: 70vh; object-fit: contain; border-radius: 12px; box-shadow: 0 0 30px rgba(0, 229, 255, 0.3); cursor: pointer;';
                img.src = link;
                img.onclick = () => openLightbox(link, pkg.links.filter(Boolean));
                wrapper.appendChild(img);
            });

            document.getElementById('bonusPrevZoomBtn').disabled = (bonusCurrentPackageIndex <= 0);
            document.getElementById('bonusNextZoomBtn').disabled = (bonusCurrentPackageIndex >= bonusAllPackagesData.length - 1);
        }

        function navigateBonusPackage(dir) {
            if (dir === 'next' && bonusCurrentPackageIndex < bonusAllPackagesData.length - 1) bonusCurrentPackageIndex++;
            else if (dir === 'prev' && bonusCurrentPackageIndex > 0) bonusCurrentPackageIndex--;
            
            updateBonusGallery(bonusCurrentPackageIndex);
            if(isBonusZoomOpen) updateZoomContent();
        }

        function openLightboxById(id) {
            const img = document.getElementById(id);
            if(!img) return;
            openLightbox(img.src, bonusAllPackagesData[bonusCurrentPackageIndex].links.filter(Boolean));
        }

        function openLightbox(src, list) {
            imageList = list;
            currentImageIndex = imageList.indexOf(src);
            if(currentImageIndex < 0) currentImageIndex = 0;
            
            document.getElementById('lightboxImage').src = src;
            document.getElementById('lightboxModal').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightboxModal').style.display = 'none';
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % imageList.length;
            document.getElementById('lightboxImage').src = imageList[currentImageIndex];
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + imageList.length) % imageList.length;
            document.getElementById('lightboxImage').src = imageList[currentImageIndex];
        }

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (isBonusZoomOpen) {
                if (e.key === 'ArrowLeft') navigateBonusPackage('prev');
                else if (e.key === 'ArrowRight') navigateBonusPackage('next');
                else if (e.key === 'Escape') closeBonusZoom();
            }
            if (document.getElementById('lightboxModal').style.display === 'flex') {
                if (e.key === 'ArrowLeft') prevImage();
                else if (e.key === 'ArrowRight') nextImage();
                else if (e.key === 'Escape') closeLightbox();
            }
            if (document.getElementById('scanOcrModal').style.display === 'block' && e.key === 'Escape') {
                closeOcrModal();
            }
        });
    </script>
</body>
</html>

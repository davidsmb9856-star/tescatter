<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE TOGEL - Bonus Event</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-primary: #000814;
            --bg-secondary: #001d3d;
            --bg-card: #002855;
            --accent: #00d4ff;
            --accent-glow: #00ffff;
            --accent-dim: #0099cc;
            --text-primary: #ffffff;
            --text-secondary: #90e0ef;
            --border: #00d4ff44;
            --danger: #ff4757;
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 153, 204, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 40, 85, 0.8) 0%, transparent 70%),
                var(--bg-primary);
        }

        .bg-animated::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
            animation: float 15s infinite ease-in-out;
            opacity: 0.6;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* Neon Glow Text */
        .judul-glow {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 900;
            text-align: center;
            color: var(--accent);
            text-shadow: 
                0 0 10px var(--accent),
                0 0 20px var(--accent),
                0 0 40px var(--accent),
                0 0 80px var(--accent-glow);
            margin-bottom: 10px;
            letter-spacing: 4px;
            animation: pulse-glow 2s ease-in-out infinite alternate;
        }

        @keyframes pulse-glow {
            from { text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent), 0 0 40px var(--accent); }
            to { text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent), 0 0 80px var(--accent), 0 0 120px var(--accent-glow); }
        }

        .bonus-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 700;
            text-align: center;
            color: var(--text-primary);
            text-shadow: 0 0 20px var(--accent);
            margin-bottom: 20px;
        }

        /* Main Container */
        .bonus-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Neon Switch Button */
        .neon-switch-btn {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 12px 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 40, 85, 0.3));
            border: 2px solid var(--accent);
            border-radius: 8px;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .neon-switch-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .neon-switch-btn:hover::before {
            left: 100%;
        }

        .neon-switch-btn:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(0, 40, 85, 0.5));
            box-shadow: 0 0 20px var(--accent), inset 0 0 20px rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        .neon-switch-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            color: var(--bg-primary);
            box-shadow: 0 0 30px var(--accent), 0 0 60px rgba(0, 212, 255, 0.5);
            font-weight: 700;
        }

        .neon-switch-btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .neon-switch-btn.danger:hover {
            background: rgba(255, 71, 87, 0.2);
            box-shadow: 0 0 20px var(--danger);
        }

        /* Bonus Mode Container */
        .bonus-mode {
            background: linear-gradient(180deg, rgba(0, 29, 61, 0.6), rgba(0, 8, 20, 0.8));
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-top: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(0, 212, 255, 0.1);
        }

        /* Textarea & Inputs */
        .bonus-textarea {
            width: 100%;
            min-height: 150px;
            padding: 16px;
            background: rgba(0, 8, 20, 0.8);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        .bonus-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), inset 0 0 10px rgba(0, 212, 255, 0.1);
        }

        .bonus-textarea::placeholder {
            color: rgba(144, 224, 239, 0.5);
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 14px;
            background: rgba(0, 8, 20, 0.8);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .bonus-input-group {
            margin: 15px 0;
        }

        .bonus-label {
            display: block;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bonus-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 8, 20, 0.8);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .bonus-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .bonus-input::placeholder {
            color: rgba(144, 224, 239, 0.4);
        }

        /* Buttons */
        .bonus-btn {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            border: none;
            border-radius: 8px;
            color: var(--bg-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bonus-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
        }

        .bonus-btn:active {
            transform: translateY(0);
        }

        .bonus-btn.danger {
            background: linear-gradient(135deg, var(--danger), #cc3344);
        }

        .bonus-btn.danger:hover {
            box-shadow: 0 8px 25px rgba(255, 71, 87, 0.4);
        }

        .bonus-button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
        }

        /* Result Display */
        .bonus-result {
            background: linear-gradient(135deg, rgba(0, 40, 85, 0.5), rgba(0, 29, 61, 0.5));
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            font-size: 16px;
            line-height: 1.8;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .bonus-angka {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        /* Gallery Container - ENLARGED */
        .gallery-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            width: 100%;
        }

        .combined-image-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(0, 40, 85, 0.4), rgba(0, 29, 61, 0.6));
            border: 2px solid var(--accent);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 100%;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .combined-image-slot:hover {
            transform: scale(1.01);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.4);
            border-color: var(--accent-glow);
        }

        .combined-image-slot .images-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
            flex-wrap: wrap;
        }

        .combined-image-slot img {
            width: calc((100% - 30px) / 3);
            min-width: 200px;
            max-width: 350px;
            height: auto;
            aspect-ratio: 4/3;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid var(--accent);
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .combined-image-slot img:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.4);
        }

        .caption-userid {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: var(--accent);
            text-align: center;
            font-weight: 700;
            text-shadow: 0 0 10px var(--accent);
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 8, 20, 0.98);
            z-index: 10000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10001;
            text-shadow: 0 0 20px var(--accent);
        }

        .modal-close:hover {
            transform: rotate(90deg);
            color: var(--danger);
        }

        /* Zoom Modal Content */
        .zoomed-content-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .zoomed-content-wrapper img {
            max-width: calc(33% - 15px);
            min-width: 280px;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 12px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.4);
        }

        .zoom-nav-button {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 40, 85, 0.4));
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .zoom-nav-button:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.4), rgba(0, 40, 85, 0.6));
            box-shadow: 0 0 25px var(--accent);
        }

        .zoom-nav-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Scan Result Container */
        .scan-result-container {
            background: rgba(0, 29, 61, 0.8);
            border: 1px solid var(--accent);
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .scan-result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 8px;
            background: rgba(0, 40, 85, 0.5);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .scan-result-item:hover {
            background: rgba(0, 40, 85, 0.8);
            border-color: var(--accent);
        }

        .scan-result-item code {
            font-family: 'Orbitron', monospace;
            color: var(--accent);
            font-size: 14px;
            word-break: break-all;
        }

        .scan-result-item button {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border: 2px solid var(--accent);
            color: var(--text-primary);
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            z-index: 99999;
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Scan Input Row */
        .scan-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .scan-input-row input {
            flex: 1;
        }

        .scan-btn-small {
            padding: 8px 12px;
            font-size: 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 44px;
        }

        .scan-btn-small:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--accent);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .neon-switch-btn {
                padding: 10px 14px;
                font-size: 12px;
            }

            .combined-image-slot img {
                width: 100%;
                min-width: unset;
                max-width: 100%;
            }

            .zoomed-content-wrapper img {
                max-width: 100%;
                min-width: unset;
            }

            .bonus-mode {
                padding: 16px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-dim);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bonus-mode {
            animation: fadeIn 0.5s ease;
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animated"></div>
    
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <!-- Main Content -->
    <div id="cekBonusEventTab" class="tab-content">
        <div class="bonus-section">
            <h3 class="judul-glow">LINE TOGEL</h3>
            <h2 class="bonus-title">BONUS EVENT</h2>

            <!-- Switch Mode Buttons -->
            <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 15px 0;">
                <button class="neon-switch-btn active" onclick="switchBonusMode('bonusAsli')" id="btn-bonusAsli">
                    Cek Bonus Asli
                </button>
                <button class="neon-switch-btn" onclick="switchBonusMode('galeri')" id="btn-galeri">
                    Galeri Gambar
                </button>
                <button class="neon-switch-btn" onclick="switchBonusMode('inputScatter')" id="btn-inputScatter">
                    Input Scatter
                </button>
            </div>

            <!-- MODE 1: CEK BONUS ASLI -->
            <div id="modeBonusAsli" class="bonus-mode">
                <textarea id="bonusTextarea" class="bonus-textarea" placeholder="Tempelkan data transaksi di sini..."></textarea>
                <div class="bonus-input-group">
                    <label for="bonusPatokan" class="bonus-label">Nilai Patokan:</label>
                    <input type="text" id="bonusPatokan" class="bonus-input" placeholder="Contoh: 5000000">
                </div>
                <div class="bonus-input-group">
                    <label for="bonusSurplus" class="bonus-label">Nilai Surplus:</label>
                    <input type="text" id="bonusSurplus" class="bonus-input" placeholder="Contoh: 1500000">
                </div>
                <div class="bonus-button-group">
                    <button onclick="hitungBonusEvent()" class="bonus-btn">Hitung Bonus</button>
                    <button onclick="hapusBonusEvent()" class="bonus-btn danger">Bersihkan</button>
                </div>
                <div id="bonusHasil" class="bonus-result" style="display: none;"></div>
                <div class="bonus-input-group" style="margin-top: 20px;">
                    <label for="imageUrl" class="bonus-label">Link Gambar Transaksi:</label>
                    <div class="scan-input-row">
                        <input type="text" id="imageUrl" class="bonus-input" placeholder="Tempel link gambar untuk scan OCR...">
                        <button onclick="scanFromMainUrl()" class="scan-btn-small" title="Scan Gambar">Scan</button>
                    </div>
                </div>
            </div>

            <!-- MODE 2: GALERI GAMBAR -->
            <div id="modeGaleri" class="bonus-mode" style="display: none;">
                <h2 class="bonus-title">GALERI GAMBAR</h2>
                <p style="text-align: center; color: var(--text-secondary); margin-bottom: 12px;">
                    Format: <strong>USERID link1 link2 link3</strong>
                </p>
                <textarea id="bonusLinkInput" placeholder="Tempelkan data paket di sini. Setiap baris = satu paket." rows="6" oninput="handleBonusInput()" onpaste="handleBonusInput()"></textarea>
                <div class="bonus-button-group">
                    <button onclick="clearBonusAllData()" class="bonus-btn danger">Hapus Semua</button>
                </div>
                <hr style="margin: 20px 0; border-color: var(--border);">
                <div class="gallery-container">
                    <div class="combined-image-slot" id="bonusCombinedImageSlot" onclick="openBonusZoom()">
                        <p class="caption-userid" id="bonusCombinedSlotUserid">USER ID</p>
                        <div class="images-row">
                            <img id="bonusImgSlot1" src="https://via.placeholder.com/400x300/001d3d/00d4ff?text=Gambar+1" alt="Slot 1">
                            <img id="bonusImgSlot2" src="https://via.placeholder.com/400x300/001d3d/00d4ff?text=Gambar+2" alt="Slot 2">
                            <img id="bonusImgSlot3" src="https://via.placeholder.com/400x300/001d3d/00d4ff?text=Gambar+3" alt="Slot 3">
                        </div>
                    </div>
                </div>
                <p class="package-info" style="text-align: center; color: var(--accent); margin-top: 10px;">
                    Paket: <span id="bonusCurrentPackageNum">0</span> / <span id="bonusMaxPackageNum">0</span>
                </p>
            </div>

            <!-- MODE 3: INPUT SCATTER -->
            <div id="modeInputScatter" class="bonus-mode" style="display: none;">
                <div style="display: flex; gap: 16px; justify-content: space-between; flex-wrap: wrap;">

                    <!-- DATA 1 -->
                    <div style="flex: 1; min-width: 320px; background: rgba(0,29,61,0.5); padding: 16px; border-radius: 12px; border: 1px solid var(--border);">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                            <h4 style="color: var(--accent); margin: 0; font-size: 16px; font-family: 'Orbitron', sans-serif;">DATA SCATTER 1</h4>
                            <button onclick="copyData1()" class="neon-switch-btn" style="padding: 6px 12px; font-size: 12px;">Copy</button>
                        </div>
                        <div class="bonus-input-group" style="margin: 8px 0;">
                            <label class="bonus-label">1. UID:</label>
                            <input type="text" id="bonusUserid1" class="bonus-input" placeholder="Contoh: San221">
                        </div>
                        <div class="bonus-input-group" style="margin: 8px 0;">
                            <label class="bonus-label">2. S1 (Link PNG):</label>
                            <div class="scan-input-row">
                                <input type="text" id="bonusScatter1_1" class="bonus-input" placeholder="Link gambar PNG...">

    <script>
        // ===================== INITIALIZATION =====================
        let currentBonusMode = 'bonusAsli';
        let currentDataIndex = 1;
        let currentScatterField = 1;
        
        // Gallery State
        let bonusAllPackagesData = [];
        let bonusCurrentPackageIndex = 0;

        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');

        // ===================== MODE SWITCHING =====================
        function switchBonusMode(mode) {
            document.getElementById('modeBonusAsli').style.display = 'none';
            document.getElementById('modeGaleri').style.display = 'none';
            document.getElementById('modeInputScatter').style.display = 'none';

            if (mode === 'bonusAsli') {
                document.getElementById('modeBonusAsli').style.display = 'block';
            } else if (mode === 'galeri') {
                document.getElementById('modeGaleri').style.display = 'block';
            } else if (mode === 'inputScatter') {
                document.getElementById('modeInputScatter').style.display = 'block';
            }

            const buttons = ['bonusAsli', 'galeri', 'inputScatter'];
            buttons.forEach(id => {
                const btn = document.getElementById('btn-' + id);
                if (btn) {
                    if (id === mode) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            });
            
            currentBonusMode = mode;
        }

        // ===================== TOAST NOTIFICATION =====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ===================== COPY TO CLIPBOARD =====================
        function copyToClipboard(text, label) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('Disalin: ' + (label || 'Teks'));
            }).catch(() => {
                showToast('Gagal menyalin');
            });
        }

        function copyWithFeedback(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.textContent;
                btn.textContent = 'OK';
                btn.style.background = 'var(--success)';
                setTimeout(() => {
                    btn.textContent = original;
                    btn.style.background = '';
                }, 1000);
            }).catch(() => {
                showToast('Gagal menyalin');
            });
        }

        // ===================== HITUNG BONUS - ONLY CREDIT =====================
        function hitungBonusEvent() {
            const isi = document.getElementById('bonusTextarea');
            const patokanRaw = document.getElementById('bonusPatokan');
            const surplusRaw = document.getElementById('bonusSurplus');
            const hasilDiv = document.getElementById('bonusHasil');

            if (!isi || !isi.value.trim()) {
                showToast('Tempelkan data terlebih dahulu');
                return;
            }

            const patokan = parseInt((patokanRaw?.value || '').replace(/[^\d]/g, '')) || 0;
            const surplus = parseInt((surplusRaw?.value || '').replace(/[^\d]/g, '')) || 0;

            const lines = isi.value.split('\n');
            let totalCredit = 0;
            let creditEntries = [];

            // Process line by line - ONLY Credit, ignore Debit
            for (let i = 0; i < lines.length; i++) {
                const currentLine = lines[i].trim();
                
                // Check if this line contains "Credit" (not Debit)
                if (currentLine.toLowerCase() === 'credit') {
                    // Look at the next line for the amount
                    const nextLine = lines[i + 1] ? lines[i + 1].trim() : '';
                    const amountMatch = nextLine.match(/IDR\s*([\d,]+)/i);
                    
                    if (amountMatch) {
                        const amountStr = amountMatch[1].replace(/,/g, '');
                        const amount = parseFloat(amountStr);
                        
                        if (!isNaN(amount)) {
                            totalCredit += amount;
                            creditEntries.push({
                                line: i + 1,
                                amount: amount
                            });
                        }
                    }
                }
            }

            // Calculate results
            const totalPengurang = patokan + surplus;
            const selisih = totalCredit - totalPengurang;

            // Display result
            if (hasilDiv) {
                hasilDiv.style.display = 'block';
                
                let html = '<div style="margin-bottom: 15px; padding: 12px; background: rgba(0,212,255,0.1); border-radius: 8px;">';
                html += '<strong style="color: var(--accent);">TOTAL CREDIT:</strong><br>';
                html += '<span class="bonus-angka" style="font-size: 24px;">IDR ' + totalCredit.toLocaleString('en-US') + '</span>';
                html += '</div>';

                if (creditEntries.length > 0) {
                    html += '<details style="margin-bottom: 15px;">';
                    html += '<summary style="cursor: pointer; color: var(--text-secondary); margin-bottom: 8px;">Detail Credit (' + creditEntries.length + ' entri)</summary>';
                    html += '<div style="font-size: 13px; color: var(--text-secondary);">';
                    creditEntries.forEach(entry => {
                        html += 'Baris ' + entry.line + ': IDR ' + entry.amount.toLocaleString('en-US') + '<br>';
                    });
                    html += '</div></details>';
                }

                if (patokan > 0 || surplus > 0) {
                    html += '<hr style="border-color: var(--border); margin: 15px 0;">';
                    html += '<div style="line-height: 2;">';
                    html += 'Patokan: <span class="bonus-angka">IDR ' + patokan.toLocaleString('en-US') + '</span><br>';
                    html += 'Surplus: <span class="bonus-angka">IDR ' + surplus.toLocaleString('en-US') + '</span><br>';
                    html += '<strong>Total Dikurang:</strong> <span class="bonus-angka">IDR ' + totalPengurang.toLocaleString('en-US') + '</span><br>';
                    html += '</div>';
                    
                    const selisihColor = selisih >= 0 ? 'var(--success)' : 'var(--danger)';
                    const selisihLabel = selisih >= 0 ? 'SISA' : 'KEKURANGAN';
                    html += '<div style="margin-top: 15px; padding: 15px; background: rgba(0,212,255,0.1); border-radius: 8px; border: 1px solid ' + selisihColor + ';">';
                    html += '<strong style="color: ' + selisihColor + ';">' + selisihLabel + ':</strong><br>';
                    html += '<span class="bonus-angka" style="font-size: 24px; color: ' + selisihColor + ';">IDR ' + Math.abs(selisih).toLocaleString('en-US') + '</span>';
                    html += '</div>';
                }

                hasilDiv.innerHTML = html;
            }

            showToast('Total Credit: IDR ' + totalCredit.toLocaleString('en-US'));
        }

        function hapusBonusEvent() {
            const fields = ['bonusTextarea', 'bonusPatokan', 'bonusSurplus', 'imageUrl'];
            fields.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            
            const hasilDiv = document.getElementById('bonusHasil');
            if (hasilDiv) {
                hasilDiv.style.display = 'none';
                hasilDiv.innerHTML = '';
            }
            
            showToast('Form dibersihkan');

        // ===================== SCAN FUNCTIONS FOR ALL PNG LINKS =====================
        function scanFromMainUrl() {
            const urlInput = document.getElementById('imageUrl');
            if (!urlInput || !urlInput.value.trim()) {
                showToast('Masukkan link gambar terlebih dahulu');
                return;
            }
            performOCRScan(urlInput.value.trim(), 'main');
        }

        function scanScatterField(dataIndex, fieldNum) {
            currentDataIndex = dataIndex;
            currentScatterField = fieldNum;
            
            const inputId = 'bonusScatter' + fieldNum + '_' + dataIndex;
            const input = document.getElementById(inputId);
            
            if (!input || !input.value.trim()) {
                showToast('Masukkan link gambar untuk S' + fieldNum);
                return;
            }
            
            performOCRScan(input.value.trim(), 'scatter', dataIndex, fieldNum);
        }

        function performOCRScan(imageUrl, sourceType, dataIndex, fieldNum) {
            const modal = document.getElementById('scanScatter2Modal');
            const img = document.getElementById('scanScatter2Image');
            const resultDiv = document.getElementById('scanScatter2Result');

            if (!modal || !img || !resultDiv) return;

            img.src = imageUrl;
            modal.style.display = 'flex';
            resultDiv.innerHTML = '<span style="color: var(--text-secondary);">Memindai gambar...</span>';

            if (typeof Tesseract === 'undefined') {
                resultDiv.innerHTML = '<span style="color: var(--danger);">Error: Tesseract.js tidak tersedia</span>';
                return;
            }

            Tesseract.recognize(imageUrl, 'eng', {
                logger: m => console.log(m)
            }).then(({ data: { text } }) => {
                const rawLines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
                let hasilGabung = [];
                let hasilLangsung = [];

                // Pattern for combined lines
                for (let i = 0; i < rawLines.length; i++) {
                    const line = rawLines[i];
                    const match = line.match(/\b\d{9,10}\b/);
                    if (match) {
                        if (i + 1 < rawLines.length) {
                            const nextLine = rawLines[i + 1].trim();
                            const nextMatch = nextLine.match(/\b\d{8,}\b/);
                            if (nextMatch) {
                                hasilGabung.push(match[0] + nextMatch[0]);
                                i++;
                                continue;
                            }
                        }
                        hasilGabung.push(match[0]);
                    }
                }

                // All numbers >= 8 digits
                for (const line of rawLines) {
                    const matches = line.match(/\d{8,}/g);
                    if (matches) matches.forEach(m => hasilLangsung.push(m));
                }

                hasilGabung = [...new Set(hasilGabung)];
                hasilLangsung = [...new Set(hasilLangsung)];

                if (hasilGabung.length === 0 && hasilLangsung.length === 0) {
                    resultDiv.innerHTML = '<span style="color: orange;">Tidak ditemukan kode/angka panjang.</span>';
                    return;
                }

                resultDiv.innerHTML = '';

                if (hasilGabung.length > 0) {
                    const title1 = document.createElement('div');
                    title1.innerHTML = '<b style="color: var(--accent);">Hasil Gabungan:</b>';
                    title1.style.margin = '12px 0 8px';
                    resultDiv.appendChild(title1);

                    hasilGabung.forEach(kode => {
                        const div = document.createElement('div');
                        div.className = 'scan-result-item';
                        div.innerHTML = '<code>' + kode + '</code>';
                        
                        const btnGroup = document.createElement('div');
                        btnGroup.style.display = 'flex';
                        btnGroup.style.gap = '6px';
                        
                        const copyBtn = document.createElement('button');
                        copyBtn.textContent = 'Copy';
                        copyBtn.style.cssText = 'background: var(--accent); color: var(--bg-primary); padding: 6px 12px; border-radius: 6px; font-weight: 600;';
                        copyBtn.onclick = function() { copyWithFeedback(this, kode); };
                        
                        const selectBtn = document.createElement('button');
                        selectBtn.textContent = 'Pilih';
                        selectBtn.style.cssText = 'background: var(--success); color: var(--bg-primary); padding: 6px 12px; border-radius: 6px; font-weight: 600;';
                        selectBtn.onclick = function() { selectKodeForScatter(kode, dataIndex); };
                        
                        btnGroup.appendChild(copyBtn);
                        btnGroup.appendChild(selectBtn);
                        div.appendChild(btnGroup);
                        resultDiv.appendChild(div);
                    });
                }

                if (hasilLangsung.length > 0) {
                    const title2 = document.createElement('div');
                    title2.innerHTML = '<b style="color: var(--success);">Hasil Angka Per Baris:</b>';
                    title2.style.margin = '12px 0 8px';
                    resultDiv.appendChild(title2);

                    hasilLangsung.forEach(kode => {
                        const div = document.createElement('div');
                        div.className = 'scan-result-item';
                        div.innerHTML = '<code>' + kode + '</code>';
                        
                        const btnGroup = document.createElement('div');
                        btnGroup.style.display = 'flex';
                        btnGroup.style.gap = '6px';
                        
                        const copyBtn = document.createElement('button');
                        copyBtn.textContent = 'Copy';
                        copyBtn.style.cssText = 'background: var(--accent); color: var(--bg-primary); padding: 6px 12px; border-radius: 6px; font-weight: 600;';
                        copyBtn.onclick = function() { copyWithFeedback(this, kode); };
                        
                        const selectBtn = document.createElement('button');
                        selectBtn.textContent = 'Pilih';
                        selectBtn.style.cssText = 'background: var(--success); color: var(--bg-primary); padding: 6px 12px; border-radius: 6px; font-weight: 600;';
                        selectBtn.onclick = function() { selectKodeForScatter(kode, dataIndex); };
                        
                        btnGroup.appendChild(copyBtn);
                        btnGroup.appendChild(selectBtn);
                        div.appendChild(btnGroup);
                        resultDiv.appendChild(div);
                    });
                }
            }).catch(err => {
                console.error('OCR Error:', err);
                resultDiv.innerHTML = '<span style="color: var(--danger);">Gagal membaca gambar. Pastikan link valid dan dapat diakses.</span>';
            });
        }

        function selectKodeForScatter(kode, dataIndex) {
            const kodeInput = document.getElementById('bonusKodeTransaksi' + (dataIndex || currentDataIndex));
            if (kodeInput) {
                kodeInput.value = kode;
                closeScanScatter2Modal();
                showToast('Kode dipilih untuk Data ' + (dataIndex || currentDataIndex));

            const modal = document.getElementById('scanScatter2Modal');
            if (modal) modal.style.display = 'none';
        }

        // ===================== COPY DATA FUNCTIONS =====================
        function prosesRekening(rek) {
            const parts = rek.split(',').map(p => p.trim());
            const nama = parts[0] || '';
            const nomor = parts.slice(1).join(',') || '';
            return { nomor, nama };
        }

        function getDataAsColumns(dataIndex) {
            const userid = document.getElementById('bonusUserid' + dataIndex)?.value.trim() || '';
            const s1 = document.getElementById('bonusScatter1_' + dataIndex)?.value.trim() || '';
            const s2 = document.getElementById('bonusScatter2_' + dataIndex)?.value.trim() || '';
            const s3 = document.getElementById('bonusScatter3_' + dataIndex)?.value.trim() || '';
            const rek = document.getElementById('bonusRekening' + dataIndex)?.value.trim() || '';
            const kode = document.getElementById('bonusKodeTransaksi' + dataIndex)?.value.trim() || '';

            let parts = [];
            if (userid) parts.push(userid);
            if (s1) parts.push(s1);
            if (s2) parts.push(s2);
            if (s3) parts.push(s3);

            if (rek) {
                const { nomor, nama } = prosesRekening(rek);
                if (nomor) parts.push(nomor);
                if (nama) parts.push(nama);
            }

            if (kode) parts.push(kode);

            return parts.join('\t');
        }

        function copyData1() {
            const data = getDataAsColumns(1);
            if (data) {
                copyToClipboard(data, 'Data 1');
            } else {
                showToast('Data 1 kosong');
            }
        }

        function copyData2() {
            const data = getDataAsColumns(2);
            if (data) {
                copyToClipboard(data, 'Data 2');
            } else {
                showToast('Data 2 kosong');
            }
        }

        function copySemuaData() {
            const data1 = getDataAsColumns(1);
            const data2 = getDataAsColumns(2);
            
            let lines = [];
            if (data1) lines.push(data1);
            if (data2) lines.push(data2);
            
            if (lines.length > 0) {
                copyToClipboard(lines.join('\n'), 'Semua Data');
            } else {
                showToast('Tidak ada data untuk disalin');
            }
        }

        function hapusSemuaData() {
            const inputs = [
                'bonusUserid1', 'bonusScatter1_1', 'bonusScatter2_1', 'bonusScatter3_1', 'bonusRekening1', 'bonusKodeTransaksi1',
                'bonusUserid2', 'bonusScatter1_2', 'bonusScatter2_2', 'bonusScatter3_2', 'bonusRekening2', 'bonusKodeTransaksi2'
            ];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            showToast('Semua data dihapus');
        }

        // ===================== GALLERY FUNCTIONS =====================
        let bonusInputTimeout;
        
        function handleBonusInput() {
            clearTimeout(bonusInputTimeout);
            bonusInputTimeout = setTimeout(loadBonusImages, 100);
        }

        function loadBonusImages() {
            const inputEl = document.getElementById('bonusLinkInput');
            if (!inputEl) return;

            const input = inputEl.value || '';
            const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);

            bonusAllPackagesData = [];

            lines.forEach(line => {
                const words = line.split(/\s+/).filter(w => w.length > 0);
                const urls = words.filter(w => /^https?:\/\//.test(w));
                const userid = words.length > 0 && !/^https?:\/\//.test(words[0]) ? words[0] : 'N/A';

                if (urls.length >= 1) {
                    const links = [...urls.slice(0, bonusPackageSize)];
                    while (links.length < bonusPackageSize) links.push('');
                    bonusAllPackagesData.push({ userid, links });
                }
            });

            const maxNumEl = document.getElementById('bonusMaxPackageNum');
            if (maxNumEl) maxNumEl.textContent = bonusAllPackagesData.length;

            if (bonusAllPackagesData.length > 0) {
                bonusCurrentPackageIndex = Math.max(0, Math.min(bonusCurrentPackageIndex, bonusAllPackagesData.length - 1));
                updateBonusGallery(bonusCurrentPackageIndex);
            } else {
                updateBonusGallery(-1);
            }
        }

        function updateBonusGallery(index) {
            const slots = ['bonusImgSlot1', 'bonusImgSlot2', 'bonusImgSlot3'].map(id => document.getElementById(id));
            const useridEl = document.getElementById('bonusCombinedSlotUserid');
            const currentNumEl = document.getElementById('bonusCurrentPackageNum');
            const combined = document.getElementById('bonusCombinedImageSlot');

            if (index >= 0 && index < bonusAllPackagesData.length) {
                const { userid, links } = bonusAllPackagesData[index];
                
                if (useridEl) useridEl.textContent = 'USER ID: ' + userid;
                if (combined) {
                    combined.style.opacity = '1';
                    combined.style.pointerEvents = 'auto';
                }

                slots.forEach((img, i) => {
                    if (!img) return;
                    const src = links[i] || 'https://via.placeholder.com/400x300/001d3d/00d4ff?text=Kosong';
                    img.src = src;
                    img.style.display = 'inline-block';
                });

                if (currentNumEl) currentNumEl.textContent = index + 1;
            } else {
                if (useridEl) useridEl.textContent = 'Belum Ada Data';
                if (combined) {
                    combined.style.opacity = '0.5';
                    combined.style.pointerEvents = 'none';
                }

                slots.forEach((img, i) => {
                    if (!img) return;
                    img.src = 'https://via.placeholder.com/400x300/001d3d/00d4ff?text=Gambar+' + (i + 1);
                    img.style.display = 'inline-block';
                });

                if (currentNumEl) currentNumEl.textContent = '0';
            }
        }

        function navigateBonusPackage(dir) {
            if (bonusAllPackagesData.length <= 1) return;
            const total = bonusAllPackagesData.length;
            
            if (dir === 'next' && bonusCurrentPackageIndex < total - 1) bonusCurrentPackageIndex++;
            else if (dir === 'prev' && bonusCurrentPackageIndex > 0) bonusCurrentPackageIndex--;
            
            updateBonusGallery(bonusCurrentPackageIndex);
            
            if (isBonusZoomOpen) {
                const pkg = bonusAllPackagesData[bonusCurrentPackageIndex];
                updateBonusZoomDisplay(pkg.userid, pkg.links);
            }
        }

        function updateBonusZoomDisplay(userid, links) {
            const wrapper = document.getElementById('bonusZoomedContentWrapper');
            const useridEl = document.getElementById('bonusZoomedUserid');
            
            if (!wrapper) return;

            wrapper.innerHTML = '';
            links.filter(Boolean).forEach(link => {
                const img = document.createElement('img');
                img.src = link;
                img.alt = 'Gambar Galeri';
                wrapper.appendChild(img);
            });

            if (useridEl) useridEl.textContent = userid;

            const prevBtn = document.getElementById('bonusPrevZoomBtn');
            const nextBtn = document.getElementById('bonusNextZoomBtn');
            const index = bonusCurrentPackageIndex;
            const total = bonusAllPackagesData.length;

            if (prevBtn) prevBtn.disabled = (index <= 0);
            if (nextBtn) nextBtn.disabled = (index >= total - 1);
        }

        function openBonusZoom() {
            if (bonusAllPackagesData.length === 0) return;
            const current = bonusAllPackagesData[bonusCurrentPackageIndex];
            if (!current.links.some(l => l)) return;

            isBonusZoomOpen = true;
            updateBonusZoomDisplay(current.userid, current.links);
            
            const modal = document.getElementById('bonusZoomModal');
            if (modal) modal.style.display = 'flex';
        }

        function closeBonusZoom() {
            const modal = document.getElementById('bonusZoomModal');
            if (modal) modal.style.display = 'none';
            isBonusZoomOpen = false;
        }

        function clearBonusAllData() {
            bonusAllPackagesData = [];
            bonusCurrentPackageIndex = 0;
            
            const inputEl = document.getElementById('bonusLinkInput');
            if (inputEl) inputEl.value = '';
            
            updateBonusGallery(-1);
            
            const maxNumEl = document.getElementById('bonusMaxPackageNum');
            if (maxNumEl) maxNumEl.textContent = '0';
            
            showToast('Semua data galeri dihapus');
        }

        // ===================== KEYBOARD SUPPORT =====================
        document.addEventListener('keydown', (e) => {
            if (isBonusZoomOpen) {
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    navigateBonusPackage('prev');
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    navigateBonusPackage('next');
                } else if (e.key === 'Escape') {
                    closeBonusZoom();
                }
            }
            
            // Close scan modal with Escape
            const scanModal = document.getElementById('scanScatter2Modal');
            if (scanModal && scanModal.style.display === 'flex' && e.key === 'Escape') {
                closeScanScatter2Modal();
            }
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            switchBonusMode('bonusAsli');
        });
    </script>
</body>
</html>

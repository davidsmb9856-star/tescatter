<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Togel - Bonus Event</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
<style>
:root {
--bg-dark: #010a14;
--bg-card: #041220;
--bg-input: #071a2b;
--neon-blue: #00c8ff;
--neon-cyan: #00e5ff;
--neon-glow: rgba(0, 200, 255, 0.5);
--accent-green: #00ff9d;
--accent-red: #ff3d57;
--border-color: rgba(0, 200, 255, 0.25);
--text-primary: #d0e8f5;
--text-muted: #5a8ba8;
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-dark);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
}

/* Electric Background */
.bg-electric {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -2;
background: 
radial-gradient(ellipse at 10% 10%, rgba(0, 200, 255, 0.08) 0%, transparent 40%),
radial-gradient(ellipse at 90% 90%, rgba(0, 255, 157, 0.05) 0%, transparent 40%),
radial-gradient(ellipse at 50% 50%, rgba(0, 180, 255, 0.03) 0%, transparent 60%),
var(--bg-dark);
}

/* Animated Grid */
.bg-grid {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -1;
background-image: 
linear-gradient(rgba(0, 200, 255, 0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 200, 255, 0.04) 1px, transparent 1px);
background-size: 40px 40px;
animation: gridPulse 4s ease-in-out infinite;
}

@keyframes gridPulse {
0%, 100% { opacity: 0.5; }
50% { opacity: 1; }
}

/* Electric Arcs */
.electric-container {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -1;
pointer-events: none;
overflow: hidden;
}

.electric-arc {
position: absolute;
width: 2px;
height: 100px;
background: linear-gradient(to bottom, transparent, var(--neon-blue), transparent);
opacity: 0;
animation: electricFlash 3s infinite;
}

@keyframes electricFlash {
0%, 100% { opacity: 0; transform: scaleY(0); }
10% { opacity: 1; transform: scaleY(1); }
20% { opacity: 0; transform: scaleY(0); }
30% { opacity: 0.8; transform: scaleY(1.2); }
40% { opacity: 0; transform: scaleY(0); }
}

/* Floating Particles */
.particle {
position: fixed;
width: 3px;
height: 3px;
background: var(--neon-blue);
border-radius: 50%;
pointer-events: none;
z-index: -1;
opacity: 0;
box-shadow: 0 0 6px var(--neon-blue);
animation: particleFloat 12s infinite ease-in-out;
}

@keyframes particleFloat {
0% { transform: translateY(100vh) translateX(0); opacity: 0; }
15% { opacity: 0.7; }
85% { opacity: 0.7; }
100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
}

/* Header Styles */
.header-section {
text-align: center;
padding: 25px 15px 20px;
position: relative;
}

.header-title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(1.4rem, 4vw, 2rem);
font-weight: 700;
color: var(--neon-cyan);
letter-spacing: 2px;
margin-bottom: 6px;
text-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
}

.header-subtitle {
font-family: 'Orbitron', sans-serif;
font-size: clamp(1rem, 2.5vw, 1.4rem);
font-weight: 500;
color: var(--neon-blue);
letter-spacing: 3px;
text-transform: uppercase;
}

/* Divider */
.electric-divider {
height: 1px;
background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
margin: 15px auto;
width: 80%;
position: relative;
}

.electric-divider::before {
content: '';
position: absolute;
top: -2px;
left: 50%;
transform: translateX(-50%);
width: 8px;
height: 5px;
background: var(--neon-cyan);
border-radius: 50%;
box-shadow: 0 0 15px var(--neon-cyan);
animation: dividerPulse 2s infinite;
}

@keyframes dividerPulse {
0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
50% { opacity: 0.5; transform: translateX(-50%) scale(1.5); }
}

/* Main Content */
.tab-content {
display: block;
padding: 15px;
max-width: 1400px;
margin: 0 auto;
animation: contentFadeIn 0.5s ease-out;
}

@keyframes contentFadeIn {
from { opacity: 0; transform: translateY(15px); }
to { opacity: 1; transform: translateY(0); }
}

.bonus-section {
background: linear-gradient(145deg, rgba(4, 18, 32, 0.95) 0%, rgba(2, 10, 20, 0.98) 100%);
border: 1px solid var(--border-color);
border-radius: 20px;
padding: 20px;
margin: 8px;
position: relative;
overflow: hidden;
}

.bonus-section::before {
content: '';
position: absolute;
top: 0;
left: 0;
right: 0;
height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-blue), transparent);
animation: borderGlow 3s ease-in-out infinite;
}

@keyframes borderGlow {
0%, 100% { opacity: 0.5; }
50% { opacity: 1; }
}

/* Mode Buttons */
.mode-buttons {
display: flex;
flex-wrap: wrap;
gap: 10px;
justify-content: center;
margin: 15px 0 20px;
}

.mode-btn {
font-family: 'Rajdhani', sans-serif;
font-weight: 600;
font-size: 14px;
padding: 12px 20px;
background: rgba(0, 200, 255, 0.05);
border: 1px solid var(--border-color);
border-radius: 12px;
color: var(--neon-blue);
cursor: pointer;
transition: all 0.3s ease;
position: relative;
overflow: hidden;
letter-spacing: 0.5px;
}

.mode-btn::before {
content: '';
position: absolute;
top: 0;
left: -100%;
width: 100%;
height: 100%;
background: linear-gradient(90deg, transparent, rgba(0, 200, 255, 0.15), transparent);
transition: left 0.5s ease;
}

.mode-btn:hover::before {
left: 100%;
}

.mode-btn:hover {
background: rgba(0, 200, 255, 0.12);
border-color: var(--neon-blue);
box-shadow: 0 0 20px rgba(0, 200, 255, 0.2);
}

.mode-btn.active {
background: linear-gradient(135deg, rgba(0, 200, 255, 0.2) 0%, rgba(0, 229, 255, 0.1) 100%);
border-color: var(--neon-cyan);
color: var(--neon-cyan);
box-shadow: 0 0 25px rgba(0, 229, 255, 0.3), inset 0 0 15px rgba(0, 200, 255, 0.1);
}

.mode-btn.danger {
border-color: rgba(255, 61, 87, 0.3);
color: var(--accent-red);
}

.mode-btn.danger:hover {
background: rgba(255, 61, 87, 0.12);
border-color: var(--accent-red);
box-shadow: 0 0 20px rgba(255, 61, 87, 0.2);
}

/* Form Elements */
.form-group {
margin-bottom: 16px;
}

.form-label {
display: block;
font-size: 13px;
font-weight: 600;
color: var(--neon-blue);
margin-bottom: 6px;
letter-spacing: 0.5px;
}

.form-input {
width: 100%;
background: var(--bg-input);
border: 1px solid var(--border-color);
border-radius: 10px;
padding: 12px 14px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 15px;
font-weight: 500;
transition: all 0.3s ease;
}

.form-input:focus {
outline: none;
border-color: var(--neon-blue);
box-shadow: 0 0 15px rgba(0, 200, 255, 0.15);
background: rgba(7, 26, 43, 0.8);
}

.form-input::placeholder {
color: var(--text-muted);
font-weight: 400;
}

.form-textarea {
width: 100%;
min-height: 110px;
background: var(--bg-input);
border: 1px solid var(--border-color);
border-radius: 10px;
padding: 14px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 15px;
font-weight: 500;
resize: vertical;
transition: all 0.3s ease;
}

.form-textarea:focus {
outline: none;
border-color: var(--neon-blue);
box-shadow: 0 0 15px rgba(0, 200, 255, 0.15);
}

/* Action Buttons */
.action-buttons {
display: flex;
gap: 12px;
justify-content: center;
flex-wrap: wrap;
margin: 20px 0;
}

.action-btn {
font-family: 'Rajdhani', sans-serif;
font-weight: 600;
font-size: 15px;
padding: 12px 24px;
background: linear-gradient(135deg, var(--neon-blue) 0%, #0099dd 100%);
border: none;
border-radius: 12px;
color: var(--bg-dark);
cursor: pointer;
transition: all 0.3s ease;
letter-spacing: 0.5px;
position: relative;
overflow: hidden;
}

.action-btn::after {
content: '';
position: absolute;
top: 50%;
left: 50%;
width: 0;
height: 0;
background: rgba(255, 255, 255, 0.2);
border-radius: 50%;
transform: translate(-50%, -50%);
transition: width 0.4s ease, height 0.4s ease;
}

.action-btn:hover::after {
width: 200px;
height: 200px;
}

.action-btn:hover {
box-shadow: 0 8px 25px rgba(0, 200, 255, 0.35);
transform: translateY(-2px);
}

.action-btn.danger {
background: linear-gradient(135deg, var(--accent-red) 0%, #cc2244 100%);
}

.action-btn.danger:hover {
box-shadow: 0 8px 25px rgba(255, 61, 87, 0.35);
}

.action-btn.small {
padding: 8px 14px;
font-size: 13px;
}

/* Result Display */
.result-box {
background: linear-gradient(135deg, rgba(0, 200, 255, 0.06) 0%, rgba(0, 255, 157, 0.03) 100%);
border: 1px solid var(--border-color);
border-radius: 12px;
padding: 18px;
margin-top: 20px;
font-size: 15px;
font-weight: 500;
line-height: 1.8;
}

.result-number {
font-family: 'Orbitron', sans-serif;
font-weight: 600;
font-size: 1.05em;
color: var(--accent-green);
}

/* Gallery Styles - BESARKAN DIKIT */
.gallery-info {
text-align: center;
color: var(--text-muted);
margin-bottom: 12px;
font-size: 14px;
}

.gallery-info strong {
color: var(--neon-blue);
font-weight: 600;
}

.gallery-wrapper {
width: 100%;
margin: 20px 0;
}

.gallery-slot {
width: 100%;
display: flex;
flex-wrap: wrap;
justify-content: center;
align-items: stretch;
gap: 12px;
padding: 18px;
background: linear-gradient(135deg, rgba(0, 200, 255, 0.03) 0%, rgba(0, 200, 255, 0.01) 100%);
border: 1px solid var(--border-color);
border-radius: 16px;
cursor: pointer;
transition: all 0.3s ease;
}

.gallery-slot:hover {
border-color: var(--neon-blue);
box-shadow: 0 0 25px rgba(0, 200, 255, 0.15);
}

/* PERUBAHAN: Ukuran gambar galeri diperbesar */
.gallery-slot img {
width: calc(33.333% - 8px);
min-width: 260px; /* naik dari 220px */
max-width: 500px; /* naik dari 360px */
height: auto;
aspect-ratio: 4/3;
object-fit: cover;
border-radius: 10px;
border: 1px solid var(--border-color);
transition: all 0.3s ease;
}

.gallery-slot img:hover {
border-color: var(--neon-cyan);
transform: scale(1.02);
box-shadow: 0 5px 20px rgba(0, 200, 255, 0.25);
}

.gallery-userid {
font-family: 'Rajdhani', sans-serif;
font-size: 15px;
font-weight: 600;
color: var(--neon-cyan);
width: 100%;
text-align: center;
padding: 8px 0;
letter-spacing: 0.5px;
}

.gallery-counter {
text-align: center;
font-size: 14px;
font-weight: 500;
color: var(--neon-blue);
margin-top: 12px;
}

/* Scatter Card */
.scatter-grid {
display: flex;
gap: 14px;
justify-content: space-between;
flex-wrap: wrap;
}

.scatter-card {
flex: 1;
min-width: 280px;
background: linear-gradient(135deg, rgba(4, 18, 32, 0.8) 0%, rgba(7, 26, 43, 0.6) 100%);
padding: 16px;
border-radius: 14px;
border: 1px solid var(--border-color);
transition: all 0.3s ease;
}

.scatter-card:hover {
border-color: var(--neon-blue);
box-shadow: 0 5px 25px rgba(0, 200, 255, 0.1);
}

.scatter-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 12px;
padding-bottom: 10px;
border-bottom: 1px solid rgba(0, 200, 255, 0.15);
}

.scatter-title {
font-family: 'Rajdhani', sans-serif;
font-size: 15px;
font-weight: 700;
color: var(--neon-cyan);
letter-spacing: 0.5px;
}

/* Modal Styles */
.modal-overlay {
position: fixed;
top: 0;
left: 0;
width: 100vw;
height: 100vh;
background: rgba(1, 10, 20, 0.97);
z-index: 10000;
display: none;
flex-direction: column;
justify-content: center;
align-items: center;
padding: 20px;
animation: modalFade 0.3s ease-out;
}

@keyframes modalFade {
from { opacity: 0; }
to { opacity: 1; }
}

.modal-close {
position: absolute;
top: 15px;
right: 20px;
font-size: 38px;
color: var(--neon-blue);
background: none;
border: none;
cursor: pointer;
transition: all 0.3s ease;
line-height: 1;
}

.modal-close:hover {
color: var(--neon-cyan);
transform: rotate(90deg);
}

.modal-title {
font-family: 'Rajdhani', sans-serif;
font-size: 18px;
font-weight: 600;
color: var(--neon-cyan);
text-align: center;
margin-bottom: 18px;
letter-spacing: 1px;
}

.modal-userid {
font-family: 'Rajdhani', sans-serif;
font-size: 17px;
font-weight: 600;
color: var(--neon-cyan);
text-align: center;
margin-bottom: 18px;
letter-spacing: 0.5px;
}

.modal-content-flex {
display: flex;
gap: 18px;
max-width: 95vw;
width: 100%;
height: 80vh;
flex-wrap: wrap;
}

.modal-image-section {
flex: 1;
display: flex;
justify-content: center;
align-items: center;
min-width: 280px;
}

/* PERUBAHAN: Ukuran gambar di modal Input Scatter diperkecil */
.modal-image-section img {
max-width: 100%;
max-height: 55vh; /* turun dari 100% (80vh) */
width: auto;
object-fit: contain;
border-radius: 12px;
border: 1px solid var(--neon-blue);
box-shadow: 0 0 25px rgba(0, 200, 255, 0.3);
}

.modal-result-section {
flex: 1;
overflow-y: auto;
padding: 16px;
background: var(--bg-card);
border-radius: 12px;
border: 1px solid var(--border-color);
min-width: 280px;
max-width: 450px;
}

/* Navigation Buttons */
.nav-btn {
background: rgba(0, 200, 255, 0.12);
border: 1px solid var(--neon-blue);
color: var(--neon-cyan);
padding: 12px 22px;
border-radius: 10px;
cursor: pointer;
font-family: 'Rajdhani', sans-serif;
font-size: 16px;
font-weight: 600;
transition: all 0.3s ease;
letter-spacing: 0.5px;
}

.nav-btn:hover {
background: rgba(0, 200, 255, 0.22);
box-shadow: 0 5px 20px rgba(0, 200, 255, 0.25);
}

.nav-btn:disabled {
opacity: 0.3;
cursor: not-allowed;
}

/* Zoom Content */
.zoom-wrapper {
display: flex;
gap: 15px;
flex-wrap: wrap;
justify-content: center;
align-items: center;
max-width: 95%;
}

.zoom-wrapper img {
max-width: 30%;
min-width: 180px;
max-height: 62vh;
object-fit: contain;
border-radius: 10px;
border: 1px solid var(--neon-blue);
box-shadow: 0 0 20px rgba(0, 200, 255, 0.25);
}

/* Toast */
.toast {
position: fixed;
bottom: 25px;
left: 50%;
transform: translateX(-50%) translateY(80px);
background: var(--bg-card);
border: 1px solid var(--neon-blue);
border-radius: 12px;
padding: 12px 24px;
color: var(--text-primary);
font-size: 14px;
font-weight: 500;
z-index: 99999;
opacity: 0;
transition: all 0.35s ease;
box-shadow: 0 5px 25px rgba(0, 200, 255, 0.2);
}

.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}

/* Result Items */
.result-item {
margin-bottom: 10px;
padding: 12px 14px;
background: rgba(0, 200, 255, 0.06);
border: 1px solid rgba(0, 200, 255, 0.2);
border-radius: 10px;
display: flex;
justify-content: space-between;
align-items: center;
gap: 12px;
transition: all 0.3s ease;
}

.result-item:hover {
border-color: var(--neon-blue);
background: rgba(0, 200, 255, 0.1);
}

.result-item.success {
background: rgba(0, 255, 157, 0.05);
border-color: rgba(0, 255, 157, 0.25);
}

.result-item.success:hover {
border-color: var(--accent-green);
background: rgba(0, 255, 157, 0.1);
}

.result-item span {
word-break: break-all;
font-family: 'Rajdhani', sans-serif;
font-size: 14px;
font-weight: 500;
letter-spacing: 0.3px;
}

/* Copy Button */
.copy-btn {
background: var(--neon-blue);
color: var(--bg-dark);
border: none;
padding: 6px 12px;
border-radius: 6px;
cursor: pointer;
font-family: 'Rajdhani', sans-serif;
font-size: 12px;
font-weight: 700;
transition: all 0.3s ease;
letter-spacing: 0.3px;
}

.copy-btn:hover {
opacity: 0.9;
transform: scale(1.02);
}

.copy-btn.success {
background: var(--accent-green);
}

/* Section Title */
.section-title {
font-family: 'Rajdhani', sans-serif;
font-size: 18px;
font-weight: 700;
color: var(--neon-blue);
text-align: center;
letter-spacing: 1px;
margin-bottom: 15px;
}

/* Scan Input Group */
.scan-input-group {
display: flex;
gap: 8px;
align-items: center;
}

.scan-input-group .form-input {
flex: 1;
}

/* Responsive */
@media (max-width: 768px) {
.bonus-section {
padding: 15px;
margin: 5px;
}

/* Di mobile, gambar galeri ambil 1 baris penuh tapi tinggi dibatasi agar tidak terlalu besar */
.gallery-slot img {
width: 100%;
max-width: 100%;
min-width: unset;
max-height: 35vh; /* Batasi tinggi di mobile */
object-fit: contain; /* Ubah ke contain agar tidak crop */
}

.zoom-wrapper img {
max-width: 100%;
min-width: unset;
}

.modal-content-flex {
flex-direction: column;
height: auto;
}

.modal-image-section,
.modal-result-section {
min-width: unset;
max-width: 100%;
width: 100%;
}
}

/* Focus States */
button:focus-visible,
input:focus-visible,
textarea:focus-visible {
outline: 2px solid var(--neon-cyan);
outline-offset: 2px;
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce) {
*, *::before, *::after {
animation-duration: 0.01ms !important;
animation-iteration-count: 1 !important;
transition-duration: 0.01ms !important;
}
}
</style>
</head>
<body>
<div class="bg-electric"></div>
<div class="bg-grid"></div>

<!-- Electric Arcs -->
<div class="electric-container" id="electricContainer"></div>

<!-- Floating Particles -->
<div id="particles"></div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Main Content -->
<div id="cekBonusEventTab" class="tab-content">
<div class="bonus-section">

<!-- Header -->
<div class="header-section">
<h1 class="header-title">Line Togel</h1>
<h2 class="header-subtitle">Bonus Event</h2>
</div>
<div class="electric-divider"></div>

<!-- Mode Buttons -->
<div class="mode-buttons">
<button class="mode-btn active" onclick="switchBonusMode('bonusAsli')" id="btn-bonusAsli">Cek Bonus Asli</button>
<button class="mode-btn" onclick="switchBonusMode('galeri')" id="btn-galeri">Galeri Gambar</button>
<button class="mode-btn" onclick="switchBonusMode('inputScatter')" id="btn-inputScatter">Input Scatter</button>
</div>

<!-- MODE 1: CEK BONUS ASLI -->
<div id="modeBonusAsli" class="bonus-mode">
<div class="form-group">
<textarea id="bonusTextarea" class="form-textarea" placeholder="Tempelkan data transaksi di sini..."></textarea>
</div>
<div class="form-group">
<label class="form-label">Nilai Patokan</label>
<input type="text" id="bonusPatokan" class="form-input" placeholder="Contoh: 5000000">
</div>
<div class="form-group">
<label class="form-label">Nilai Surplus</label>
<input type="text" id="bonusSurplus" class="form-input" placeholder="Contoh: 1500000">
</div>
<div class="action-buttons">
<button onclick="hitungBonusEvent()" class="action-btn">Hitung Bonus</button>
<button onclick="hapusBonusEvent()" class="action-btn danger">Bersihkan</button>
</div>
<div id="bonusHasil" class="result-box"></div>
<div class="form-group" style="margin-top: 18px;">
<label class="form-label">Link Gambar Transaksi</label>
<input type="text" id="imageUrl" class="form-input" placeholder="Tempel link gambar di sini...">
</div>
</div>

<!-- MODE 2: GALERI GAMBAR -->
<div id="modeGaleri" class="bonus-mode" style="display: none;">
<h3 class="section-title">Galeri Gambar</h3>
<p class="gallery-info">Format: <strong>USERID link1 link2 link3</strong></p>
<div class="form-group">
<textarea id="bonusLinkInput" class="form-textarea" placeholder="Tempelkan data paket di sini. Setiap baris = satu paket." rows="5" oninput="handleBonusInput()" onpaste="handleBonusInput()"></textarea>
</div>
<div class="action-buttons">
<button onclick="clearBonusAllData()" class="action-btn danger">Hapus Semua</button>
</div>
<div class="electric-divider"></div>
<div class="gallery-wrapper">

<script>
// ================= INITIALIZATION =================
let currentBonusMode = 'bonusAsli';
let currentDataIndex = 1;
let bonusAllPackagesData = [];
let bonusCurrentPackageIndex = 0;
const bonusPackageSize = 3;
let isBonusZoomOpen = false;
let imageList = [];
let currentImageIndex = 0;

// Create Electric Arcs
function createElectricArcs() {
const container = document.getElementById('electricContainer');
if (!container) return;
container.innerHTML = '';
for (let i = 0; i < 8; i++) {
const arc = document.createElement('div');
arc.className = 'electric-arc';
arc.style.left = (Math.random() * 100) + '%';
arc.style.top = (Math.random() * 100) + '%';
arc.style.animationDelay = (Math.random() * 3) + 's';
arc.style.height = (60 + Math.random() * 100) + 'px';
container.appendChild(arc);
}
}

// Create Particles
function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
container.innerHTML = '';
for (let i = 0; i < 18; i++) {
const particle = document.createElement('div');
particle.className = 'particle';
particle.style.left = Math.random() * 100 + '%';
particle.style.animationDelay = Math.random() * 12 + 's';
particle.style.animationDuration = (10 + Math.random() * 8) + 's';
container.appendChild(particle);
}
}

// Toast Notification
function showToast(message) {
const toast = document.getElementById('toast');
if (!toast) return;
toast.textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 2500);
}

// ================= MODE SWITCHING =================
function switchBonusMode(mode) {
const modes = ['modeBonusAsli', 'modeGaleri', 'modeInputScatter'];
modes.forEach(m => {
const el = document.getElementById(m);
if (el) el.style.display = 'none';
});

const targetMode = document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1));
if (targetMode) targetMode.style.display = 'block';

['bonusAsli', 'galeri', 'inputScatter'].forEach(id => {
const btn = document.getElementById('btn-' + id);
if (btn) {
if (id === mode) {
btn.classList.add('active');
} else {
btn.classList.remove('active');
}
}
});
}

// ================= SCAN SCATTER 2 (OCR) =================
function scanScatter2(index) {
currentDataIndex = index;
const link = document.getElementById('bonusScatter2_' + index).value.trim();
if (!link) {
showToast('Masukkan link gambar Scatter 2');
return;
}

const img = document.getElementById('scanScatter2Image');
const resultDiv = document.getElementById('scanScatter2Result');
const modal = document.getElementById('scanScatter2Modal');

if (img) img.src = link;
if (modal) modal.style.display = 'flex';
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--text-muted); font-style: italic;">Memindai gambar...</span>';

if (typeof Tesseract === 'undefined') {
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--accent-red);">Tesseract.js belum dimuat. Periksa koneksi internet.</span>';
return;
}

Tesseract.recognize(link, 'eng', { logger: m => console.log(m) }).then(({ data: { text } }) => {
const rawLines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
let hasilGabung = [];
let hasilLangsung = [];

for (let i = 0; i < rawLines.length; i++) {
const line = rawLines[i];
const match = line.match(/\b\d{9,10}\b/);
if (match) {
if (i + 1 < rawLines.length) {
const nextLine = rawLines[i + 1].trim();
const nextMatch = nextLine.match(/\b\d{8,}\b/);
if (nextMatch) {
hasilGabung.push(match[0] + nextMatch[0]);
i++;
continue;
}
}
hasilGabung.push(match[0]);
}
}

for (const line of rawLines) {
const matches = line.match(/\d{8,}/g);
if (matches) matches.forEach(m => hasilLangsung.push(m));
}

hasilGabung = [...new Set(hasilGabung)];
hasilLangsung = [...new Set(hasilLangsung)];

if (hasilGabung.length === 0 && hasilLangsung.length === 0) {
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--accent-red);">Tidak ditemukan angka panjang dalam gambar.</span>';
} else {
if (resultDiv) resultDiv.innerHTML = '';

if (hasilGabung.length > 0) {
const title1 = document.createElement('div');
title1.innerHTML = '<b style="color: var(--neon-blue); font-size: 14px;">Hasil Gabungan Baris:</b>';
title1.style.margin = '12px 0 8px';
if (resultDiv) resultDiv.appendChild(title1);

hasilGabung.forEach(kode => {
const div = document.createElement('div');
div.className = 'result-item';
div.innerHTML = '<span>' + kode + '</span><div style="display:flex; gap:6px;"><button onclick="copyWithFeedback(this, \'' + kode + '\')" class="copy-btn">Copy</button><button onclick="pilihKodeTransaksi(\'' + kode + '\')" class="copy-btn success">Pilih</button></div>';
if (resultDiv) resultDiv.appendChild(div);
});
}

if (hasilLangsung.length > 0) {
const title2 = document.createElement('div');
title2.innerHTML = '<b style="color: var(--accent-green); font-size: 14px;">Hasil Angka Per Baris:</b>';
title2.style.margin = '12px 0 8px';
if (resultDiv) resultDiv.appendChild(title2);

hasilLangsung.forEach(kode => {
const div = document.createElement('div');
div.className = 'result-item success';
div.innerHTML = '<span>' + kode + '</span><div style="display:flex; gap:6px;"><button onclick="copyWithFeedback(this, \'' + kode + '\')" class="copy-btn">Copy</button><button onclick="pilihKodeTransaksi(\'' + kode + '\')" class="copy-btn success">Pilih</button></div>';
if (resultDiv) resultDiv.appendChild(div);
});
}
}
}).catch(err => {
console.error(err);
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--accent-red);">Gagal membaca gambar. Pastikan link valid dan dapat diakses.</span>';
});
}

function copyWithFeedback(btn, text) {
navigator.clipboard.writeText(text).then(() => {
const original = btn.innerHTML;
btn.innerHTML = 'OK';
btn.classList.add('success');
setTimeout(() => {
btn.innerHTML = original;
btn.classList.remove('success');
}, 800);
}).catch(() => showToast('Gagal menyalin'));
}

function pilihKodeTransaksi(kode) {
document.getElementById('bonusKodeTransaksi' + currentDataIndex).value = kode;
closeScanScatter2Modal();
showToast('Kode untuk Data ' + currentDataIndex + ' dipilih');
}

function closeScanScatter2Modal() {
const modal = document.getElementById('scanScatter2Modal');
if (modal) modal.style.display = 'none';
}

// ================= COPY FUNCTIONS =================
function prosesRekening(rek) {
const parts = rek.split(',').map(p => p.trim());
const nama = parts[0] || '';
const nomor = parts.slice(1).join(',') || '';
return { nomor, nama };
}

function getDataAsColumns(num) {
const userid = document.getElementById('bonusUserid' + num).value.trim();
const s1 = document.getElementById('bonusScatter1_' + num).value.trim();
const s2 = document.getElementById('bonusScatter2_' + num).value.trim();
const s3 = document.getElementById('bonusScatter3_' + num).value.trim();
const rek = document.getElementById('bonusRekening' + num).value.trim();
const kode = document.getElementById('bonusKodeTransaksi' + num).value.trim();

let parts = [];
if (userid) parts.push(userid);
if (s1) parts.push(s1);
if (s2) parts.push(s2);
if (s3) parts.push(s3);

if (rek) {
const { nomor, nama } = prosesRekening(rek);
if (nomor) parts.push(nomor);
if (nama) parts.push(nama);
}

if (kode) parts.push(kode);

return parts.join('\t');
}

function copyData1() {
const data = getDataAsColumns(1);
navigator.clipboard.writeText(data || '');
showToast(data ? 'Data 1 disalin' : 'Data 1 kosong');
}

function copyData2() {
const data = getDataAsColumns(2);
navigator.clipboard.writeText(data || '');
showToast(data ? 'Data 2 disalin' : 'Data 2 kosong');
}

function copySemuaData() {
const data1 = getDataAsColumns(1);
const data2 = getDataAsColumns(2);
let lines = [];
if (data1 !== '') lines.push(data1);
if (data2 !== '') lines.push(data2);
navigator.clipboard.writeText(lines.join('\n'));
showToast(lines.length ? 'Semua data disalin' : 'Tidak ada data');
}

function hapusSemuaData() {
const ids = [
'bonusUserid1', 'bonusScatter1_1', 'bonusScatter2_1', 'bonusScatter3_1', 'bonusRekening1', 'bonusKodeTransaksi1',
'bonusUserid2', 'bonusScatter1_2', 'bonusScatter2_2', 'bonusScatter3_2', 'bonusRekening2', 'bonusKodeTransaksi2'
];
ids.forEach(id => {
const el = document.getElementById(id);
if (el) el.value = '';
});
showToast('Semua data dihapus');
}

// ================= HITUNG BONUS EVENT =================
function hitungBonusEvent() {
const isi = document.getElementById('bonusTextarea').value.trim();
const patokanRaw = document.getElementById('bonusPatokan').value;
const surplusRaw = document.getElementById('bonusSurplus').value;
const patokan = parseInt(patokanRaw.replace(/[^\d]/g, '')) || 0;
const surplus = parseInt(surplusRaw.replace(/[^\d]/g, '')) || 0;

if (!isi) {
showToast('Tempelkan data terlebih dahulu');
return;
}

const lines = isi.split('\n');
let total = 0;

for (let i = 0; i < lines.length; i++) {
const currentLine = lines[i].trim();
if (currentLine === 'Credit') {
if (i + 1 < lines.length) {
const amountLine = lines[i + 1].trim();
const amountMatch = amountLine.match(/IDR\s([\d,]+)/i);
if (amountMatch) {
const amountStr = amountMatch[1].replace(/,/g, '');
const amount = parseFloat(amountStr);
if (!isNaN(amount)) total += amount;
}
}
}
}

const hasilDiv = document.getElementById('bonusHasil');
if (hasilDiv) {
let output = 'Total Hitungan: <span class="result-number">IDR ' + total.toLocaleString('en-US') + '</span>';
if (patokan || surplus) {
const totalPengurang = patokan + surplus;
const selisih = total - totalPengurang;
const selisihColor = selisih >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
output += '<br>Patokan: <span class="result-number">IDR ' + patokan.toLocaleString('en-US') + '</span>';
output += '<br>Surplus: <span class="result-number">IDR ' + surplus.toLocaleString('en-US') + '</span>';
output += '<br>Total Dikurang: <span class="result-number">IDR ' + totalPengurang.toLocaleString('en-US') + '</span>';
output += '<br>Selisih: <span class="result-number" style="color:' + selisihColor + '">IDR ' + Math.abs(selisih).toLocaleString('en-US') + '</span>';
}
hasilDiv.innerHTML = output;
}
}

function hapusBonusEvent() {
['bonusTextarea', 'bonusPatokan', 'bonusSurplus', 'imageUrl'].forEach(id => {
const el = document.getElementById(id);
if (el) el.value = '';
});
const hasilDiv = document.getElementById('bonusHasil');
if (hasilDiv) hasilDiv.innerHTML = '';
showToast('Form dibersihkan');
}

// ================= GALERI OTOMATIS =================
let bonusInputTimeout;

function handleBonusInput() {
clearTimeout(bonusInputTimeout);
bonusInputTimeout = setTimeout(loadBonusImages, 50);
}

function loadBonusImages() {
const inputEl = document.getElementById('bonusLinkInput');
if (!inputEl) return;
const input = inputEl.value || '';
const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
bonusAllPackagesData = [];

lines.forEach(line => {
const words = line.split(/\s+/).filter(w => w.length > 0);
const urls = words.filter(w => /^https?:\/\//.test(w));
const userid = words.length > 0 && !/^https?:\/\//.test(words[0]) ? words[0] : 'N/A';
if (urls.length >= 1) {
const links = [...urls.slice(0, bonusPackageSize)];
while (links.length < bonusPackageSize) links.push('');
bonusAllPackagesData.push({ userid, links });
}
});

const maxNumEl = document.getElementById('bonusMaxPackageNum');
if (maxNumEl) maxNumEl.textContent = bonusAllPackagesData.length;

if (bonusAllPackagesData.length > 0) {
bonusCurrentPackageIndex = Math.max(0, Math.min(bonusCurrentPackageIndex, bonusAllPackagesData.length - 1));
updateBonusGallery(bonusCurrentPackageIndex);
} else {
updateBonusGallery(-1);
const currentNumEl = document.getElementById('bonusCurrentPackageNum');
if (currentNumEl) currentNumEl.textContent = '0';
}
}

function updateBonusGallery(index) {
const slots = ['bonusImgSlot1', 'bonusImgSlot2', 'bonusImgSlot3'].map(id => document.getElementById(id));
const combined = document.getElementById('bonusCombinedImageSlot');
const useridEl = document.getElementById('bonusCombinedSlotUserid');
const currentNumEl = document.getElementById('bonusCurrentPackageNum');

if (index >= 0 && index < bonusAllPackagesData.length) {
const { userid, links } = bonusAllPackagesData[index];
if (useridEl) useridEl.textContent = 'USER ID: ' + userid;
if (combined) { combined.style.opacity = '1'; combined.style.pointerEvents = 'auto'; }
slots.forEach((img, i) => {
if (!img) return;
img.src = links[i] || 'https://via.placeholder.com/500x375/071a2b/1a3a55?text=-';
img.style.display = 'inline-block';
});
if (currentNumEl) currentNumEl.textContent = index + 1;
} else {
if (useridEl) useridEl.textContent = 'Belum Ada Data';
if (combined) { combined.style.opacity = '0.4'; combined.style.pointerEvents = 'none'; }
slots.forEach((img) => {
if (img) {
img.src = 'https://via.placeholder.com/500x375/071a2b/1a3a55?text=-';
img.style.display = 'inline-block';
}
});
if (currentNumEl) currentNumEl.textContent = '0';
}
}

function navigateBonusPackage(dir) {
if (bonusAllPackagesData.length <= 1) return;
const total = bonusAllPackagesData.length;
if (dir === 'next' && bonusCurrentPackageIndex < total - 1) bonusCurrentPackageIndex++;
else if (dir === 'prev' && bonusCurrentPackageIndex > 0) bonusCurrentPackageIndex--;
updateBonusGallery(bonusCurrentPackageIndex);
if (isBonusZoomOpen) {
const pkg = bonusAllPackagesData[bonusCurrentPackageIndex];
updateBonusZoomDisplay(pkg.userid, pkg.links);
}
}

function updateBonusZoomDisplay(userid, links) {
const wrapper = document.getElementById('bonusZoomedContentWrapper');
const useridEl = document.getElementById('bonusZoomedUserid');
if (!wrapper) return;
wrapper.innerHTML = '';
links.filter(Boolean).forEach(link => {
const img = document.createElement('img');
img.src = link;
wrapper.appendChild(img);
});
if (useridEl) useridEl.textContent = userid;
const prevBtn = document.getElementById('bonusPrevZoomBtn');
const nextBtn = document.getElementById('bonusNextZoomBtn');
if (prevBtn) prevBtn.disabled = (bonusCurrentPackageIndex <= 0);
if (nextBtn) nextBtn.disabled = (bonusCurrentPackageIndex >= bonusAllPackagesData.length - 1);
}

function openBonusZoom() {
if (bonusAllPackagesData.length === 0) return;
const current = bonusAllPackagesData[bonusCurrentPackageIndex];
if (!current.links.some(l => l)) return;
isBonusZoomOpen = true;
updateBonusZoomDisplay(current.userid, current.links);
const modal = document.getElementById('bonusZoomModal');
if (modal) modal.style.display = 'flex';
}

function closeBonusZoom() {
const modal = document.getElementById('bonusZoomModal');
if (modal) modal.style.display = 'none';
isBonusZoomOpen = false;
}

function clearBonusAllData() {
bonusAllPackagesData = [];
const inputEl = document.getElementById('bonusLinkInput');
if (inputEl) inputEl.value = '';
updateBonusGallery(-1);
const maxNumEl = document.getElementById('bonusMaxPackageNum');
if (maxNumEl) maxNumEl.textContent = '0';
showToast('Semua data galeri dihapus');
}

// ================= LIGHTBOX =================
function openLightbox(imgElement) {
imageList = Array.from(document.querySelectorAll('#bonusCombinedImageSlot img'))
.filter(img => img.style.display !== 'none')
.map(img => img.src);
currentImageIndex = imageList.indexOf(imgElement.src);
const lightboxImage = document.getElementById('lightboxImage');
if (lightboxImage) lightboxImage.src = imgElement.src;
const lightboxModal = document.getElementById('lightboxModal');
if (lightboxModal) lightboxModal.style.display = 'flex';
}

function closeLightbox() {
const lightboxModal = document.getElementById('lightboxModal');
if (lightboxModal) lightboxModal.style.display = 'none';
}

function nextImage() {
if (imageList.length === 0) return;
currentImageIndex = (currentImageIndex + 1) % imageList.length;
const lightboxImage = document.getElementById('lightboxImage');
if (lightboxImage) lightboxImage.src = imageList[currentImageIndex];
}

function prevImage() {
if (imageList.length === 0) return;
currentImageIndex = (currentImageIndex - 1 + imageList.length) % imageList.length;
const lightboxImage = document.getElementById('lightboxImage');
if (lightboxImage) lightboxImage.src = imageList[currentImageIndex];
}

// ================= KEYBOARD SUPPORT =================
document.addEventListener('keydown', (e) => {
if (isBonusZoomOpen && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
e.preventDefault();
if (e.key === 'ArrowLeft') navigateBonusPackage('prev');
else if (e.key === 'ArrowRight') navigateBonusPackage('next');
} else if (e.key === 'Escape' && isBonusZoomOpen) {
closeBonusZoom();
}
});

// ================= INITIALIZE =================
document.addEventListener('DOMContentLoaded', function() {
createElectricArcs();
createParticles();
switchBonusMode('bonusAsli');
});
</script>
</body>
</html>

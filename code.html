<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE TOGEL - Bonus Event System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-deep: #000810;
            --bg-primary: #001020;
            --bg-secondary: #001830;
            --bg-card: rgba(0, 40, 80, 0.4);
            --neon-cyan: #00e5ff;
            --neon-blue: #00a8e8;
            --neon-electric: #00d4ff;
            --neon-glow: #00ffff;
            --neon-green: #00ff9d;
            --neon-yellow: #ffd600;
            --neon-red: #ff3d5a;
            --text-primary: #e8f7ff;
            --text-secondary: #7ec8e3;
            --border-glow: rgba(0, 229, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 168, 232, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 100, 150, 0.05) 0%, transparent 70%),
                linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-primary) 50%, var(--bg-secondary) 100%);
        }

        .grid-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridScroll 30s linear infinite;
        }

        @keyframes gridScroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-electric),
                0 0 30px rgba(0, 229, 255, 0.5);
            animation: floatParticle 10s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes floatParticle {
            0%, 100% { 
                transform: translateY(0) translateX(0) scale(1); 
                opacity: 0.3; 
            }
            25% { 
                transform: translateY(-100px) translateX(30px) scale(1.2); 
                opacity: 0.8; 
            }
            50% { 
                transform: translateY(-200px) translateX(-20px) scale(0.8); 
                opacity: 0.5; 
            }
            75% { 
                transform: translateY(-100px) translateX(40px) scale(1.1); 
                opacity: 0.7; 
            }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: orbPulse 8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: -1;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: var(--neon-blue);
            top: -100px;
            left: -100px;
        }

        .glow-orb-2 {
            width: 500px;
            height: 500px;
            background: var(--neon-cyan);
            bottom: -150px;
            right: -150px;
            animation-delay: 4s;
        }

        @keyframes orbPulse {
            0% { transform: scale(1); opacity: 0.1; }
            100% { transform: scale(1.2); opacity: 0.2; }
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .tab-content {
            display: block;
            animation: contentFadeIn 0.6s ease-out;
        }

        @keyframes contentFadeIn {
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .bonus-section {
            background: linear-gradient(145deg, var(--bg-card), rgba(0, 60, 100, 0.3));
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 32px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 0 60px rgba(0, 229, 255, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .bonus-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        }

        .judul-glow {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            color: var(--neon-glow);
            text-shadow: 
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-blue),
                0 0 80px rgba(0, 229, 255, 0.5);
            margin-bottom: 8px;
            letter-spacing: 6px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        .bonus-title {
            font-family: 'Orbitron', monospace;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            margin-bottom: 28px;
            letter-spacing: 3px;
        }

        @keyframes titleGlow {
            0% { 
                text-shadow: 
                    0 0 10px var(--neon-cyan),
                    0 0 20px var(--neon-cyan),
                    0 0 40px var(--neon-blue); 
            }
            100% { 
                text-shadow: 
                    0 0 20px var(--neon-glow),
                    0 0 40px var(--neon-glow),
                    0 0 80px var(--neon-cyan),
                    0 0 120px rgba(0, 229, 255, 0.3); 
            }
        }

        .neon-switch-btn {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 14px 28px;
            background: linear-gradient(145deg, rgba(0, 40, 80, 0.6), rgba(0, 60, 100, 0.4));
            border: 1px solid rgba(0, 229, 255, 0.25);
            color: var(--neon-cyan);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            backdrop-filter: blur(10px);
        }

        .neon-switch-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.15), transparent);
            transition: left 0.6s ease;
        }

        .neon-switch-btn:hover {
            background: linear-gradient(145deg, rgba(0, 60, 100, 0.8), rgba(0, 80, 120, 0.6));
            border-color: var(--neon-cyan);
            box-shadow: 
                0 0 30px rgba(0, 229, 255, 0.3),
                inset 0 0 20px rgba(0, 229, 255, 0.05);
            transform: translateY(-3px);
        }

        .neon-switch-btn:hover::before {
            left: 100%;
        }

        .neon-switch-btn.active {
            background: linear-gradient(145deg, rgba(0, 100, 150, 0.9), rgba(0, 130, 180, 0.7));
            border-color: var(--neon-glow);
            color: #ffffff;
            box-shadow: 
                0 0 40px rgba(0, 229, 255, 0.4),
                0 0 80px rgba(0, 229, 255, 0.2),
                inset 0 0 30px rgba(0, 229, 255, 0.1);
        }

        .neon-switch-btn.danger {
            border-color: rgba(255, 61, 90, 0.3);
            color: var(--neon-red);
        }

        .neon-switch-btn.danger:hover {
            background: linear-gradient(145deg, rgba(100, 20, 40, 0.8), rgba(150, 30, 50, 0.6));
            border-color: var(--neon-red);
            box-shadow: 0 0 30px rgba(255, 61, 90, 0.3);
        }

        .bonus-mode {
            animation: modeFadeIn 0.5s ease-out;
        }

        @keyframes modeFadeIn {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.98); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        .bonus-textarea,
        textarea {
            width: 100%;
            min-height: 160px;
            padding: 18px;
            background: linear-gradient(145deg, rgba(0, 20, 40, 0.9), rgba(0, 30, 60, 0.8));
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            resize: vertical;
            transition: all 0.3s ease;
            line-height: 1.7;
        }

        .bonus-textarea:focus,
        textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 
                0 0 30px rgba(0, 229, 255, 0.2),
                inset 0 0 30px rgba(0, 229, 255, 0.03);
        }

        .bonus-textarea::placeholder,
        textarea::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .bonus-input-group {
            margin: 18px 0;
        }

        .bonus-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--neon-cyan);
            margin-bottom: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .bonus-input,
        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: linear-gradient(145deg, rgba(0, 20, 40, 0.9), rgba(0, 30, 60, 0.8));
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .bonus-input:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.2);
        }

        .bonus-input::placeholder,
        input[type="text"]::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .bonus-button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin: 24px 0;
        }

        .bonus-btn {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 14px 32px;
            background: linear-gradient(145deg, rgba(0, 100, 150, 0.8), rgba(0, 140, 180, 0.6));
            border: 1px solid var(--neon-blue);
            color: #ffffff;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .bonus-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(0, 229, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .bonus-btn:hover {
            background: linear-gradient(145deg, rgba(0, 140, 180, 0.9), rgba(0, 180, 220, 0.7));
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.4);
            transform: translateY(-3px);
        }

        .bonus-btn:hover::after {
            width: 300px;
            height: 300px;
        }

        .bonus-btn.danger {
            background: linear-gradient(145deg, rgba(150, 30, 50, 0.8), rgba(200, 40, 60, 0.6));
            border-color: var(--neon-red);
        }

        .bonus-btn.danger:hover {
            background: linear-gradient(145deg, rgba(200, 40, 60, 0.9), rgba(255, 50, 80, 0.7));
            box-shadow: 0 0 40px rgba(255, 61, 90, 0.4);
        }

        .bonus-result {
            margin-top: 24px;
            padding: 24px;
            background: linear-gradient(145deg, rgba(0, 50, 100, 0.3), rgba(0, 70, 120, 0.2));
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 14px;
            font-family: 'Rajdhani', sans-serif;
            line-height: 2;
            font-size: 15px;
        }

        .bonus-angka {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            color: var(--neon-glow);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        /* Gallery - LARGER IMAGES */
        .gallery-container {
            perspective: 1000px;
            width: 100%;
        }

        .combined-image-slot {
            background: linear-gradient(145deg, rgba(0, 40, 80, 0.6), rgba(0, 60, 100, 0.4));
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 100%;
        }

        .combined-image-slot::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 229, 255, 0.1), transparent 30%);
            animation: slotRotate 10s linear infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .combined-image-slot:hover::before {
            opacity: 1;
        }

        @keyframes slotRotate {
            100% { transform: rotate(360deg); }
        }

        .combined-image-slot:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 25px 70px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(0, 229, 255, 0.2);
            border-color: var(--neon-cyan);
        }

        /* Gallery Images - MUCH LARGER */
        .gallery-images-wrapper {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .gallery-img-container {
            position: relative;
            flex: 1;
            min-width: 200px;
            max-width: 350px;
        }

        .gallery-img {
            width: 100%;
            height: auto;
            min-height: 200px;
            max-height: 350px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            transition: all 0.3s ease;
        }

        .gallery-img:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
            border-color: var(--neon-cyan);
        }

        .caption-userid {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 700;
            text-shadow: 0 0 15px var(--neon-cyan);
            margin-bottom: 16px;
        }

        .package-info {
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .data-card {
            background: linear-gradient(145deg, rgba(0, 30, 60, 0.6), rgba(0, 50, 90, 0.4));
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .data-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        }

        .data-card:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.15);
        }

        .close-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .close-btn:hover {
            transform: scale(1.2) rotate(90deg);
            text-shadow: 0 0 30px var(--neon-glow);
            color: var(--neon-glow);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 32px;
            background: linear-gradient(145deg, rgba(0, 50, 100, 0.95), rgba(0, 80, 130, 0.9));
            border: 1px solid var(--neon-cyan);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 500;
            z-index: 99999;
            animation: toastSlide 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 0 40px rgba(0, 229, 255, 0.3),
                0 10px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
        }

        @keyframes toastSlide {
            from { 
                opacity: 0; 
                transform: translateX(120px) scale(0.8); 
            }
            to { 
                opacity: 1; 
                transform: translateX(0) scale(1); 
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-blue));
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--neon-glow), var(--neon-cyan));
        }

        .zoom-nav-button {
            transition: all 0.3s ease;
            font-family: 'Orbitron', monospace;
        }

        .zoom-nav-button:hover {
            background: rgba(0, 229, 255, 0.4) !important;
            transform: scale(1.15);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.5);
        }

        .zoom-nav-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Scan Results Styling */
        .scan-result-card {
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(0, 100, 150, 0.2);
            border: 1px solid var(--neon-blue);
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .scan-result-link {
            font-size: 11px;
            color: var(--text-secondary);
            word-break: break-all;
            margin-bottom: 8px;
        }

        .scan-result-code {
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
            flex: 1;
            min-width: 150px;
        }

        .scan-result-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .scan-btn {
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .scan-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        }

        .scan-btn.green {
            background: var(--neon-green);
        }

        @media (max-width: 768px) {
            .bonus-section {
                padding: 20px;
                border-radius: 20px;
            }

            .judul-glow {
                font-size: 24px;
                letter-spacing: 3px;
            }

            .bonus-title {
                font-size: 16px;
            }

            .neon-switch-btn {
                font-size: 11px;
                padding: 10px 16px;
            }

            .bonus-btn {
                font-size: 12px;
                padding: 12px 24px;
            }

            .toast {
                bottom: 15px;
                right: 15px;
                left: 15px;
                text-align: center;
            }

            .gallery-img-container {
                min-width: 150px;
            }

            .gallery-img {
                min-height: 150px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        button:focus-visible,
        input:focus-visible,
        textarea:focus-visible {
            outline: 2px solid var(--neon-cyan);
            outline-offset: 2px;
        }

        ::selection {
            background: rgba(0, 229, 255, 0.3);
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="grid-layer"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="particles-container" id="particlesContainer"></div>

    <div class="main-container">
        <div id="cekBonusEventTab" class="tab-content">
            <div class="bonus-section">
                <h3 class="judul-glow">LINE TOGEL</h3>
                <h2 class="bonus-title">BONUS EVENT</h2>

                <div style="display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin: 20px 0;">
                    <button class="neon-switch-btn active" onclick="switchBonusMode('bonusAsli')" id="btn-bonusAsli">
                        Cek Bonus Asli
                    </button>
                    <button class="neon-switch-btn" onclick="switchBonusMode('galeri')" id="btn-galeri">
                        Galeri Gambar
                    </button>
                    <button class="neon-switch-btn" onclick="switchBonusMode('inputScatter')" id="btn-inputScatter">
                        Input Scatter (2 Data)
                    </button>
                </div>

                <!-- MODE 1: CEK BONUS ASLI -->
                <div id="modeBonusAsli" class="bonus-mode">
                    <textarea id="bonusTextarea" class="bonus-textarea" placeholder="Tempelkan data transaksi di sini... (Hanya nominal Credit yang dihitung)"></textarea>
                    <div class="bonus-input-group">
                        <label for="bonusPatokan" class="bonus-label">Nilai Patokan</label>
                        <input type="text" id="bonusPatokan" class="bonus-input" placeholder="Contoh: 5000000">

    <script>
        // ==================== GLOBAL VARIABLES INITIALIZATION ====================
        let currentBonusMode = 'bonusAsli';
        let currentDataIndex = 1;
        let bonusAllPackagesData = [];
        let bonusCurrentPackageIndex = 0;
        const bonusPackageSize = 3;
        let isBonusZoomOpen = false;
        let imageList = [];
        let currentImageIndex = 0;
        let bonusInputTimeout = null;
        let allScannedCodes = [];

        // ==================== CREATE PARTICLES ====================
        function createParticles() {
            const container = document.getElementById('particlesContainer');
            if (!container) return;
            
            const particleCount = 25;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (8 + Math.random() * 6) + 's';
                container.appendChild(particle);
            }
        }

        // ==================== TOAST NOTIFICATION ====================
        function showToast(message) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) {
                existingToast.remove();
            }

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(120px)';
                setTimeout(function() {
                    if (toast.parentNode) {
                        toast.remove();
                    }
                }, 400);
            }, 3500);
        }

        // ==================== SWITCH BONUS MODE ====================
        function switchBonusMode(mode) {
            document.getElementById('modeBonusAsli').style.display = 'none';
            document.getElementById('modeGaleri').style.display = 'none';
            document.getElementById('modeInputScatter').style.display = 'none';

            if (mode === 'bonusAsli') {
                document.getElementById('modeBonusAsli').style.display = 'block';
            } else if (mode === 'galeri') {
                document.getElementById('modeGaleri').style.display = 'block';
            } else if (mode === 'inputScatter') {
                document.getElementById('modeInputScatter').style.display = 'block';
            }

            const buttons = ['bonusAsli', 'galeri', 'inputScatter'];
            buttons.forEach(function(id) {
                const btn = document.getElementById('btn-' + id);
                if (btn) {
                    if (id === mode) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            });

            currentBonusMode = mode;
        }

        // ==================== HITUNG BONUS EVENT - UPDATED ====================
        function hitungBonusEvent() {
            const textarea = document.getElementById('bonusTextarea');
            const isi = textarea ? textarea.value.trim() : '';
            const patokanRaw = document.getElementById('bonusPatokan') ? document.getElementById('bonusPatokan').value : '';
            const surplusRaw = document.getElementById('bonusSurplus') ? document.getElementById('bonusSurplus').value : '';

            const patokan = parseInt(patokanRaw.replace(/[^\d]/g, '')) || 0;
            const surplus = parseInt(surplusRaw.replace(/[^\d]/g, '')) || 0;

            if (!isi) {
                showToast('Tempelkan data terlebih dahulu!');
                return;
            }

            const lines = isi.split('\n');
            let totalCredit = 0;
            let creditCount = 0;
            let totalDebit = 0;
            let debitCount = 0;

            // Scan through lines looking for Credit/Debit followed by IDR amount
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                // Check if this line is "Credit"
                if (line.toLowerCase() === 'credit') {
                    // Look at the next line for the amount
                    if (i + 1 < lines.length) {
                        const nextLine = lines[i + 1].trim();
                        const amountMatch = nextLine.match(/IDR\s([\d,\.]+)/i);
                        if (amountMatch) {
                            const amountStr = amountMatch[1].replace(/,/g, '').replace(/\./g, '');
                            const amount = parseFloat(amountStr);
                            if (!isNaN(amount)) {
                                totalCredit += amount;
                                creditCount++;
                            }
                        }
                    }
                }
                
                // Check if this line is "Debit" - we track but don't add to total
                if (line.toLowerCase() === 'debit') {
                    if (i + 1 < lines.length) {
                        const nextLine = lines[i + 1].trim();
                        const amountMatch = nextLine.match(/IDR\s([\d,\.]+)/i);
                        if (amountMatch) {
                            const amountStr = amountMatch[1].replace(/,/g, '').replace(/\./g, '');
                            const amount = parseFloat(amountStr);
                            if (!isNaN(amount)) {
                                totalDebit += amount;
                                debitCount++;
                            }
                        }
                    }
                }
            }

            const hasilDiv = document.getElementById('bonusHasil');
            if (hasilDiv) {
                let output = '<div style="margin-bottom: 16px; padding: 16px; background: rgba(0, 255, 157, 0.1); border-radius: 10px; border: 1px solid var(--neon-green);">';
                output += '<div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">Total Credit (' + creditCount + ' transaksi):</div>';
                output += '<span class="bonus-angka" style="font-size: 24px;">IDR ' + totalCredit.toLocaleString('en-US') + '</span>';
                output += '</div>';
                
                if (debitCount > 0) {
                    output += '<div style="margin-bottom: 16px; padding: 12px; background: rgba(255, 61, 90, 0.1); border-radius: 10px; border: 1px solid var(--neon-red); opacity: 0.7;">';
                    output += '<div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;">Total Debit (' + debitCount + ' transaksi) - Diabaikan:</div>';
                    output += '<span style="color: var(--neon-red); font-size: 16px;">IDR ' + totalDebit.toLocaleString('en-US') + '</span>';
                    output += '</div>';
                }

                if (patokan || surplus) {
                    const totalPengurang = patokan + surplus;
                    const selisih = totalCredit - totalPengurang;
                    const selisihColor = selisih >= 0 ? 'var(--neon-green)' : 'var(--neon-red)';

                    output += '<hr style="margin: 16px 0; border-color: rgba(0, 229, 255, 0.15);">';
                    
                    output += '<div style="margin: 8px 0;">Patokan: <span class="bonus-angka">IDR ' + patokan.toLocaleString('en-US') + '</span></div>';
                    output += '<div style="margin: 8px 0;">Surplus: <span class="bonus-angka">IDR ' + surplus.toLocaleString('en-US') + '</span></div>';
                    output += '<div style="margin: 8px 0;">Total Dikurang: <span class="bonus-angka">IDR ' + totalPengurang.toLocaleString('en-US') + '</span></div>';
                    
                    output += '<div style="margin-top: 16px; padding: 16px; background: ' + (selisih >= 0 ? 'rgba(0, 255, 157, 0.15)' : 'rgba(255, 61, 90, 0.15)') + '; border-radius: 10px; border: 1px solid ' + selisihColor + ';">';
                    output += '<div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">Selisih:</div>';
                    output += '<span class="bonus-angka" style="color: ' + selisihColor + '; font-size: 22px;">' + (selisih >= 0 ? '+' : '') + 'IDR ' + selisih.toLocaleString('en-US') + '</span>';
                    output += '</div>';
                }

                hasilDiv.innerHTML = output;
            }

        function extractCodesFromText(text) {
            const rawLines = text.split('\n').map(function(line) { return line.trim(); }).filter(function(line) { return line.length > 0; });
            let hasilGabung = [];
            let hasilLangsung = [];

            for (let i = 0; i < rawLines.length; i++) {
                const line = rawLines[i];
                const match = line.match(/\b\d{9,10}\b/);
                if (match) {
                    if (i + 1 < rawLines.length) {
                        const nextLine = rawLines[i + 1].trim();
                        const nextMatch = nextLine.match(/\b\d{8,}\b/);
                        if (nextMatch) {
                            hasilGabung.push(match[0] + nextMatch[0]);
                            i++;
                            continue;
                        }
                    }
                    hasilGabung.push(match[0]);
                }
            }

            for (let i = 0; i < rawLines.length; i++) {
                const matches = rawLines[i].match(/\d{8,}/g);
                if (matches) {
                    matches.forEach(function(m) { hasilLangsung.push(m); });
                }
            }

            hasilGabung = Array.from(new Set(hasilGabung));
            hasilLangsung = Array.from(new Set(hasilLangsung));

            // Combine and dedupe
            const allCodes = [...hasilGabung];
            hasilLangsung.forEach(function(code) {
                if (!allCodes.includes(code)) {
                    allCodes.push(code);
                }
            });

            return allCodes;
        }

            copyToClipboard(data || '', 'Data 1');
            if (data) {
                showToast('Data 1 berhasil disalin!');
            } else {
                showToast('Data 1 kosong.');
            }
        }

        function copyData2() {
            const data = getData2As7Columns();
            copyToClipboard(data || '', 'Data 2');
            if (data) {
                showToast('Data 2 berhasil disalin!');
            } else {
                showToast('Data 2 kosong.');
            }
        }

        function copySemuaData() {
            const data1 = getData1As7Columns();
            const data2 = getData2As7Columns();

            let lines = [];
            if (data1 !== '') lines.push(data1);
            if (data2 !== '') lines.push(data2);

            const teks = lines.join('\n');
            copyToClipboard(teks, 'Semua Data');

            if (teks) {
                showToast('Semua data berhasil disalin!');
            } else {
                showToast('Tidak ada data terisi.');
            }
        }

        function hapusSemuaData() {
            const inputs = [
                'bonusUserid1', 'bonusScatter1_1', 'bonusScatter2_1', 'bonusScatter3_1', 'bonusRekening1', 'bonusKodeTransaksi1',
                'bonusUserid2', 'bonusScatter1_2', 'bonusScatter2_2', 'bonusScatter3_2', 'bonusRekening2', 'bonusKodeTransaksi2'
            ];
            inputs.forEach(function(id) {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            showToast('Semua data dihapus.');
        }

        // ==================== CLIPBOARD UTILITY ====================
        function copyToClipboard(text, label) {
            const feedbackLabel = label || 'Teks';

            if (typeof text !== 'string') {
                showToast('Tidak dapat menyalin: Bukan teks');
                return;
            }

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(function() {
                        showToast(feedbackLabel + ' berhasil disalin!');
                    })
                    .catch(function(err) {
                        console.error('Gagal menyalin via Clipboard API:', err);
                        fallbackCopy(text, feedbackLabel);
                    });
            } else {
                console.warn('Clipboard API tidak tersedia, menggunakan fallback.');
                fallbackCopy(text, feedbackLabel);
            }
        }

        function fallbackCopy(text, label) {
            if (typeof text !== 'string') {
                showToast('Gagal menyalin: Input bukan teks.');
                return;
            }
            const feedbackLabel = label || 'Teks';

            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            textarea.style.top = '-9999px';
            textarea.style.width = '1px';
            textarea.style.height = '1px';
            textarea.style.opacity = '0';
            textarea.style.pointerEvents = 'none';

            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            textarea.setSelectionRange(0, 99999);

            let success = false;
            try {
                success = document.execCommand('copy');
                if (success) {
                    showToast(feedbackLabel + ' disalin (fallback)!');
                } else {
                    showToast('Gagal menyalin ' + feedbackLabel);
                }
            } catch (err) {
                console.error('Fallback execCommand gagal:', err);
                showToast('Gagal menyalin ' + feedbackLabel);
            }

            if (textarea.parentNode) {
                textarea.parentNode.removeChild(textarea);
            }
        }

        // ==================== KEYBOARD NAVIGATION ====================
        document.addEventListener('keydown', function(e) {
            if (isBonusZoomOpen) {
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    navigateBonusPackage('prev');
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    navigateBonusPackage('next');
                } else if (e.key === 'Escape') {
                    closeBonusZoom();
                }
            }

            const lightboxModal = document.getElementById('lightboxModal');
            if (lightboxModal && lightboxModal.style.display === 'flex') {
                if (e.key === 'ArrowLeft') {
                    prevImage();
                } else if (e.key === 'ArrowRight') {
                    nextImage();
                } else if (e.key === 'Escape') {
                    closeLightbox();
                }
            }

            const scanModal = document.getElementById('scanScatter2Modal');
            if (scanModal && scanModal.style.display === 'block') {
                if (e.key === 'Escape') {
                    closeScanScatter2Modal();
                }
            }

            const scanAllModal = document.getElementById('scanAllPngModal');
            if (scanAllModal && scanAllModal.style.display === 'block') {
                if (e.key === 'Escape') {
                    closeScanAllPngModal();
                }
            }

            const zoomModal = document.getElementById('zoomModal');
            if (zoomModal && zoomModal.style.display === 'flex') {
                if (e.key === 'Escape') {
                    closeZoom();
                }
            }
        });

        // ==================== INITIALIZE ====================
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            switchBonusMode('bonusAsli');
        });
    </script>
</body>
</html>

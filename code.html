<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Togel - Bonus Event</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
<style>
:root {
--bg-dark: #020810;
--bg-card: #061420;
--bg-input: #0a1e30;
--neon-blue: #00d4ff;
--neon-cyan: #00fff7;
--accent-green: #00ff88;
--accent-red: #ff4757;
--accent-teal: #00b8a9;
--border-color: rgba(0, 212, 255, 0.3);
--text-primary: #c8e0f0;
--text-muted: #6b8fa8;
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: 'Rajdhani', sans-serif;
background: var(--bg-dark);
color: var(--text-primary);
min-height: 100vh;
overflow-x: hidden;
}

.bg-animated {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -1;
background: 
radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.06) 0%, transparent 50%),
radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.04) 0%, transparent 50%),
var(--bg-dark);
}

.bg-grid {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -1;
background-image: 
linear-gradient(rgba(0, 212, 255, 0.02) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.02) 1px, transparent 1px);
background-size: 60px 60px;
}

.particle {
position: fixed;
width: 3px;
height: 3px;
background: var(--neon-blue);
border-radius: 50%;
pointer-events: none;
z-index: -1;
opacity: 0.4;
animation: floatParticle 20s infinite linear;
}

@keyframes floatParticle {
0% { transform: translateY(100vh); opacity: 0; }
10% { opacity: 0.4; }
90% { opacity: 0.4; }
100% { transform: translateY(-100vh); opacity: 0; }
}

.judul-glow {
font-family: 'Orbitron', sans-serif;
font-size: clamp(1.4rem, 3.5vw, 2rem);
font-weight: 700;
text-align: center;
color: var(--neon-cyan);
letter-spacing: 2px;
margin-bottom: 8px;
}

.bonus-title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(1rem, 2.5vw, 1.4rem);
font-weight: 600;
text-align: center;
color: var(--neon-blue);
letter-spacing: 2px;
margin-bottom: 20px;
}

.tab-content {
display: block;
padding: 20px;
max-width: 1400px;
margin: 0 auto;
animation: fadeInUp 0.4s ease-out;
}

@keyframes fadeInUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

.bonus-section {
background: linear-gradient(135deg, var(--bg-card) 0%, rgba(6, 20, 32, 0.9) 100%);
border: 1px solid var(--border-color);
border-radius: 16px;
padding: 25px;
margin: 10px;
backdrop-filter: blur(5px);
box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
}

.neon-switch-btn {
font-family: 'Rajdhani', sans-serif;
font-weight: 600;
font-size: 14px;
padding: 10px 18px;
background: rgba(0, 212, 255, 0.08);
border: 1px solid var(--border-color);
border-radius: 8px;
color: var(--neon-blue);
cursor: pointer;
transition: all 0.3s ease;
}

.neon-switch-btn:hover {
background: rgba(0, 212, 255, 0.15);
border-color: var(--neon-blue);
}

.neon-switch-btn.active {
background: rgba(0, 212, 255, 0.2);
border-color: var(--neon-cyan);
color: var(--neon-cyan);
}

.neon-switch-btn.danger {
border-color: rgba(255, 71, 87, 0.3);
color: var(--accent-red);
}

.neon-switch-btn.danger:hover {
background: rgba(255, 71, 87, 0.15);
border-color: var(--accent-red);
}

.bonus-textarea {
width: 100%;
min-height: 110px;
background: var(--bg-input);
border: 1px solid var(--border-color);
border-radius: 10px;
padding: 14px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 14px;
resize: vertical;
transition: border-color 0.3s ease;
}

.bonus-textarea:focus {
outline: none;
border-color: var(--neon-blue);
}

.bonus-input {
width: 100%;
background: var(--bg-input);
border: 1px solid var(--border-color);
border-radius: 8px;
padding: 10px 12px;
color: var(--text-primary);
font-family: 'Rajdhani', sans-serif;
font-size: 14px;
transition: border-color 0.3s ease;
}

.bonus-input:focus {
outline: none;
border-color: var(--neon-blue);
}

.bonus-input::placeholder {
color: var(--text-muted);
}

.bonus-label {
display: block;
color: var(--neon-blue);
font-weight: 600;
margin-bottom: 5px;
font-size: 13px;
}

.bonus-input-group {
margin-bottom: 14px;
}

.bonus-btn {
font-family: 'Rajdhani', sans-serif;
font-weight: 600;
font-size: 14px;
padding: 10px 20px;
background: var(--neon-blue);
border: none;
border-radius: 8px;
color: var(--bg-dark);
cursor: pointer;
transition: all 0.3s ease;
}

.bonus-btn:hover {
opacity: 0.9;
}

.bonus-btn.danger {
background: var(--accent-red);
}

.bonus-btn.view {
background: var(--accent-teal);
}

.bonus-button-group {
display: flex;
gap: 10px;
justify-content: center;
flex-wrap: wrap;
margin: 18px 0;
}

.bonus-result {
background: rgba(0, 212, 255, 0.05);
border: 1px solid var(--border-color);
border-radius: 10px;
padding: 18px;
margin-top: 18px;
font-size: 15px;
line-height: 1.7;
}

.bonus-angka {
font-family: 'Orbitron', sans-serif;
font-weight: 700;
color: var(--accent-green);
}

.gallery-container {
width: 100%;
margin: 20px 0;
}

.combined-image-slot {
width: 100%;
display: flex;
flex-wrap: wrap;
justify-content: center;
align-items: center;
gap: 12px;
padding: 18px;
background: rgba(0, 212, 255, 0.03);
border: 1px solid var(--border-color);
border-radius: 12px;
cursor: pointer;
transition: border-color 0.3s ease;
}

.combined-image-slot:hover {
border-color: var(--neon-blue);
}

.combined-image-slot img {
width: calc(33.333% - 8px);
min-width: 220px;
max-width: 380px;
height: auto;
aspect-ratio: 4/3;
object-fit: cover;
border-radius: 8px;
border: 1px solid var(--border-color);
transition: transform 0.3s ease;
}

.combined-image-slot img:hover {
transform: scale(1.02);
}

.caption-userid {
font-family: 'Orbitron', sans-serif;
font-size: 15px;
font-weight: 600;
color: var(--neon-cyan);
width: 100%;
text-align: center;
padding: 8px 0;
letter-spacing: 1px;
}

.package-info {
font-size: 14px;
color: var(--neon-blue);
text-align: center;
margin-top: 12px;
}

.bonus-mode {
animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
from { opacity: 0; }
to { opacity: 1; }
}

.scatter-card {
flex: 1;
min-width: 280px;
background: rgba(0, 30, 50, 0.5);
padding: 14px;
border-radius: 10px;
border: 1px solid var(--border-color);
}

.scatter-card h4 {
font-family: 'Orbitron', sans-serif;
color: var(--neon-cyan);
margin: 0 0 10px 0;
font-size: 14px;
font-weight: 600;
letter-spacing: 1px;
}

.input-row {
display: flex;
gap: 6px;
align-items: center;
}

.input-row .bonus-input {
flex: 1;
}

.modal-overlay {
position: fixed;
top: 0;
left: 0;
width: 100vw;
height: 100vh;
background: rgba(2, 8, 16, 0.97);
z-index: 10000;
display: none;
flex-direction: column;
justify-content: center;
align-items: center;
padding: 20px;
}

.modal-close {
position: absolute;
top: 12px;
right: 20px;
font-size: 36px;
color: var(--neon-blue);
background: none;
border: none;
cursor: pointer;
line-height: 1;
transition: all 0.3s ease;
}

.modal-close:hover {
color: var(--neon-cyan);
transform: rotate(90deg);
}

.modal-title {
font-family: 'Orbitron', sans-serif;
color: var(--neon-cyan);
text-align: center;
margin-bottom: 18px;
font-size: 18px;
font-weight: 600;
letter-spacing: 2px;
}

.zoom-nav-button {
background: rgba(0, 212, 255, 0.15);
border: 1px solid var(--neon-blue);
color: var(--neon-cyan);
padding: 12px 20px;
border-radius: 8px;
cursor: pointer;
font-family: 'Rajdhani', sans-serif;
font-size: 16px;
font-weight: 600;
transition: background 0.3s ease;
}

.zoom-nav-button:hover {
background: rgba(0, 212, 255, 0.25);
}

.zoom-nav-button:disabled {
opacity: 0.3;
cursor: not-allowed;
}

.zoomed-content-wrapper {
display: flex;
gap: 15px;
flex-wrap: wrap;
justify-content: center;
align-items: center;
max-width: 95%;
}

.zoomed-content-wrapper img {
max-width: 30%;
min-width: 200px;
max-height: 65vh;
object-fit: contain;
border-radius: 10px;
border: 1px solid var(--neon-blue);
}

.toast {
position: fixed;
bottom: 25px;
left: 50%;
transform: translateX(-50%) translateY(80px);
background: var(--bg-card);
border: 1px solid var(--neon-blue);
border-radius: 10px;
padding: 12px 25px;
color: var(--text-primary);
font-size: 14px;
z-index: 99999;
opacity: 0;
transition: all 0.3s ease;
}

.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}

.copy-btn {
background: var(--neon-blue);
color: var(--bg-dark);
border: none;
padding: 5px 10px;
border-radius: 5px;
cursor: pointer;
font-size: 12px;
font-weight: 600;
transition: opacity 0.2s ease;
}

.copy-btn:hover {
opacity: 0.9;
}

.copy-btn.copied {
background: var(--accent-green);
}

.result-item {
margin-bottom: 10px;
padding: 10px 12px;
background: rgba(0, 212, 255, 0.08);
border: 1px solid rgba(0, 212, 255, 0.25);
border-radius: 8px;
display: flex;
justify-content: space-between;
align-items: center;
gap: 12px;
}

.result-item.green {
background: rgba(0, 255, 136, 0.06);
border-color: rgba(0, 255, 136, 0.25);
}

.result-item span {
word-break: break-all;
font-size: 13px;
}

.section-desc {
text-align: center;
color: var(--text-muted);
margin-bottom: 12px;
font-size: 14px;
}

.section-desc strong {
color: var(--neon-blue);
font-weight: 600;
}

@media (max-width: 768px) {
.bonus-section {
padding: 15px;
margin: 5px;
}

.neon-switch-btn {
padding: 8px 14px;
font-size: 13px;
}

.combined-image-slot img {
width: 100%;
max-width: 100%;
min-width: unset;
}

.zoomed-content-wrapper img {
max-width: 100%;
min-width: unset;
}
}

button:focus-visible,
input:focus-visible,
textarea:focus-visible {
outline: 2px solid var(--neon-blue);
outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {
* {
animation-duration: 0.01ms !important;
transition-duration: 0.01ms !important;
}
}
</style>
</head>
<body>
<div class="bg-animated"></div>
<div class="bg-grid"></div>
<div id="particles"></div>
<div id="toast" class="toast"></div>

<div id="cekBonusEventTab" class="tab-content">
<div class="bonus-section">
<h3 class="judul-glow">Line Togel</h3>
<h2 class="bonus-title">Bonus Event</h2>

<div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 15px 0;">
<button class="neon-switch-btn" onclick="switchBonusMode('bonusAsli')" id="btn-bonusAsli">Cek Bonus Asli</button>
<button class="neon-switch-btn" onclick="switchBonusMode('galeri')" id="btn-galeri">Galeri Gambar</button>
<button class="neon-switch-btn" onclick="switchBonusMode('inputScatter')" id="btn-inputScatter">Input Scatter</button>
</div>

<!-- MODE 1: CEK BONUS ASLI -->
<div id="modeBonusAsli" class="bonus-mode">
<textarea id="bonusTextarea" class="bonus-textarea" placeholder="Tempelkan data transaksi di sini..."></textarea>
<div class="bonus-input-group">
<label for="bonusPatokan" class="bonus-label">Nilai Patokan</label>
<input type="text" id="bonusPatokan" class="bonus-input" placeholder="Contoh: 5000000">
</div>
<div class="bonus-input-group">
<label for="bonusSurplus" class="bonus-label">Nilai Surplus</label>
<input type="text" id="bonusSurplus" class="bonus-input" placeholder="Contoh: 1500000">
</div>
<div class="bonus-button-group">
<button onclick="hitungBonusEvent()" class="bonus-btn">Hitung Bonus</button>
<button onclick="hapusBonusEvent()" class="bonus-btn danger">Bersihkan</button>
</div>
<div id="bonusHasil" class="bonus-result"></div>
<div class="bonus-input-group" style="margin-top: 15px;">
<label for="imageUrl" class="bonus-label">Link Gambar Transaksi</label>
<input type="text" id="imageUrl" class="bonus-input" placeholder="Tempel link gambar di sini...">
</div>
</div>

<!-- MODE 2: GALERI GAMBAR -->
<div id="modeGaleri" class="bonus-mode" style="display: none;">
<h2 class="bonus-title">Galeri Gambar</h2>
<p class="section-desc">Format: <strong>USERID link1 link2 link3</strong></p>
<textarea id="bonusLinkInput" class="bonus-textarea" placeholder="Tempelkan data paket di sini. Setiap baris = satu paket." rows="5" oninput="handleBonusInput()" onpaste="handleBonusInput()"></textarea>
<div class="bonus-button-group">
<button onclick="clearBonusAllData()" class="bonus-btn danger">Hapus Semua</button>
</div>
<hr style="margin: 18px 0; border-color: var(--border-color);">
<div class="gallery-container">
<div class="combined-image-slot" id="bonusCombinedImageSlot" onclick="openBonusZoom()">
<p class="caption-userid" id="bonusCombinedSlotUserid">USER ID</p>
<img id="bonusImgSlot1" src="https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=Gambar+1" alt="Gambar 1">
<img id="bonusImgSlot2" src="https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=Gambar+2" alt="Gambar 2">
<img id="bonusImgSlot3" src="https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=Gambar+3" alt="Gambar 3">
</div>
</div>
<p class="package-info">Paket: <span id="bonusCurrentPackageNum">0</span> / <span id="bonusMaxPackageNum">0</span></p>
</div>

<!-- MODE 3: INPUT SCATTER -->
<div id="modeInputScatter" class="bonus-mode" style="display: none;">
<div style="display: flex; gap: 14px; justify-content: space-between; flex-wrap: wrap;">

<!-- DATA 1 -->
<div class="scatter-card">
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
<h4>Data Scatter 1</h4>
<button onclick="copyData1()" class="neon-switch-btn" style="padding: 5px 10px; font-size: 12px;">Copy</button>
</div>
<div class="bonus-input-group" style="margin: 6px 0;">
<label class="bonus-label" style="font-size: 12px;">1. UID</label>
<input type="text" id="bonusUserid1" class="bonus-input" placeholder="San221" style="padding: 7px; font-size: 13px;">
</div>
<div class="bonus-input-group" style="margin: 6px 0;">
<label class="bonus-label" style="font-size: 12px;">2. S1</label>
<div class="input-row">
<input type="text" id="bonusScatter1_1" class="bonus-input" placeholder="Link gambar..." style="padding: 7px; font-size: 13px;">
<button type="button" onclick="viewImageById('bonusScatter1_1')" class="bonus-btn view" style="padding: 7px 10px; font-size: 12px;">Lihat</button>
</div>
</div>
<div class="bonus-input-group" style="margin: 6px 0;">
<label class="bonus-label" style="font-size: 12px;">3. S2 (Scan OCR)</label>
<div class="input-row">
<input type="text" id="bonusScatter2_1" class="bonus-input" placeholder="Link gambar PNG..." style="padding: 7px; font-size: 13px;">
<button type="button" onclick="scanScatter2(1)" class="bonus-btn" style="padding: 7px 10px; font-size: 12px;">Scan</button>
</div>
</div>
<div class="bonus-input-group" style="margin: 6px 0;">
<label class="bonus-label" style="font-size: 12px;">4. S3</label>
<div class="input-row">
<input type="text" id="bonusScatter3_1" class="bonus-input" placeholder="Link gambar..." style="padding: 7px; font-size: 13px;">
<button type="button" onclick="viewImageById('bonusScatter3_1')" class="bonus-btn view" style="padding: 7px 10px; font-size: 12px;">Lihat</button>
</div>
</div>
<div class="bonus-input-group" style="margin: 6px 0;">
<label class="bonus-label" style="font-size: 12px;">5. Rek</label>
<input type="text" id="bonusRekening1" class="bonus-input" placeholder="NAMA,085882449440" style="padding: 7px; font-size: 13px;">
</div>
<div class="bonus-input-group" style="margin: 6px 0;">
<label class="bonus-label" style="font-size: 12px;">6. Kode</label>
<input type="text" id="bonusKodeTransaksi1" class="bonus-input" placeholder="Kode hasil scan..." style="padding: 7px; font-size: 13px;">
</div>
</div>

<!-- DATA 2 -->
<div class="scatter-card">
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
<h4>Data Scatter 2</h4>
<button onclick="copyData2()" class="neon-switch-btn" style="padding: 5px 10px; font-size: 12px;">Copy</button>
</div>
<div class="bonus-input-group" style="margin: 6px 0;">
<label class="bonus-label" style="font-size: 12px;">1. UID</label>
<input type="text" id="bonusUserid2" class="bonus-input" placeholder="Budi123" style="padding: 7px; font-size: 13px;">
</div>
<div class="bonus-input-group" style="margin: 6px 0;">
<label class="bonus-label" style="font-size: 12px;">2. S1</label>
<div class="input-row">
<input type="text" id="bonusScatter1_2" class="bonus-input" placeholder="Link gambar..." style="padding: 7px; font-size: 13px;">
<button type="button" onclick="viewImageById('bonusScatter1_2')" class="bonus-btn view" style="padding: 7px 10px; font-size: 12px;">Lihat</button>
</div>
</div>
<div class="bonus-input-group" style="margin: 6px 0;">
<label class="bonus-label" style="font-size: 12px;">3. S2 (Scan OCR)</label>
<div class="input-row">
<input type="text" id="bonusScatter2_2" class="bonus-input" placeholder="Link gambar PNG..." style="padding: 7px; font-size: 13px;">
<button type="button" onclick="scanScatter2(2)" class="bonus-btn" style="padding: 7px 10px; font-size: 12px;">Scan</button>
</div>
</div>
<div class="bonus-input-group" style="margin: 6px 0;">
<label class="bonus-label" style="font-size: 12px;">4. S3</label>
<div class="input-row">
<input type="text" id="bonusScatter3_2" class="bonus-input" placeholder="Link gambar..." style="padding: 7px; font-size: 13px;">
<button type="button" onclick="viewImageById('bonusScatter3_2')" class="bonus-btn view" style="padding: 7px 10px; font-size: 12px;">Lihat</button>
</div>
</div>
<div class="bonus-input-group" style="margin: 6px 0;">
<label class="bonus-label" style="font-size: 12px;">5. Rek</label>
<input type="text" id="bonusRekening2" class="bonus-input" placeholder="NAMA,1234567890" style="padding: 7px; font-size: 13px;">
</div>
<div class="bonus-input-group" style="margin: 6px 0;">
<label class="bonus-label" style="font-size: 12px;">6. Kode</label>
<input type="text" id="bonusKodeTransaksi2" class="bonus-input" placeholder="Kode hasil scan..." style="padding: 7px; font-size: 13px;">
</div>
</div>
</div>

<div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 18px;">
<button onclick="copySemuaData()" class="neon-switch-btn" style="padding: 8px 16px; font-size: 13px;">Copy Semua Data</button>
<button onclick="hapusSemuaData()" class="neon-switch-btn danger" style="padding: 8px 16px; font-size: 13px;">Hapus Semua</button>
</div>
</div>
</div>
</div>

<!-- Modal Scan Scatter 2 -->
<div id="scanScatter2Modal" class="modal-overlay">
<button class="modal-close" onclick="closeScanScatter2Modal()" aria-label="Tutup">&times;</button>
<h3 class="modal-title">Scan Scatter 2 - OCR</h3>
<div style="display: flex; gap: 18px; max-width: 95vw; width: 100%; height: 80vh; flex-wrap: wrap;">
<div style="flex: 1; display: flex; justify-content: center; align-items: center; min-width: 280px;">
<img id="scanScatter2Image" src="" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 10px; border: 1px solid var(--neon-blue);">
</div>
<div style="flex: 1; overflow-y: auto; padding: 15px; background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border-color); min-width: 280px; max-width: 450px;">
<div id="scanScatter2Result" style="font-size: 14px; line-height: 1.5;"></div>
</div>
</div>
</div>

<!-- Modal Zoom Galeri -->
<div id="bonusZoomModal" class="modal-overlay">
<button class="modal-close" onclick="closeBonusZoom()" aria-label="Tutup">&times;</button>
<span id="bonusZoomedUserid" style="display: block; text-align: center; font-size: 16px; margin-bottom: 18px; color: var(--neon-cyan); font-family: 'Orbitron', sans-serif; letter-spacing: 1px;"></span>
<div style="display: flex; align-items: center; justify-content: center; gap: 18px; flex-wrap: wrap; width: 100%;">
<button class="zoom-nav-button" id="bonusPrevZoomBtn" onclick="navigateBonusPackage('prev')">Prev</button>
<div class="zoomed-content-wrapper" id="bonusZoomedContentWrapper"></div>
<button class="zoom-nav-button" id="bonusNextZoomBtn" onclick="navigateBonusPackage('next')">Next</button>
</div>
<p style="text-align: center; margin-top: 18px; color: var(--text-muted); font-size: 13px;">Gunakan tombol navigasi atau panah kiri/kanan pada keyboard</p>
</div>

<!-- Modal Lightbox -->
<div id="lightboxModal" class="modal-overlay">
<button class="modal-close" onclick="closeLightbox()" aria-label="Tutup">&times;</button>
<img id="lightboxImage" src="" style="max-width: 90%; max-height: 82%; border-radius: 10px; border: 1px solid var(--neon-blue);">
<div style="display: flex; gap: 12px; margin-top: 18px;">
<button onclick="prevImage()" class="zoom-nav-button">Prev</button>
<button onclick="nextImage()" class="zoom-nav-button">Next</button>
</div>
</div>

<script>
let currentBonusMode = 'bonusAsli';
let currentDataIndex = 1;
let bonusAllPackagesData = [];
let bonusCurrentPackageIndex = 0;
const bonusPackageSize = 3;
let isBonusZoomOpen = false;
let imageList = [];
let currentImageIndex = 0;

function createParticles() {
const container = document.getElementById('particles');
if (!container) return;
container.innerHTML = '';
for (let i = 0; i < 15; i++) {
const particle = document.createElement('div');
particle.className = 'particle';
particle.style.left = Math.random() * 100 + '%';
particle.style.animationDelay = Math.random() * 20 + 's';
particle.style.animationDuration = (18 + Math.random() * 12) + 's';
container.appendChild(particle);
}
}

function showToast(message) {
const toast = document.getElementById('toast');
if (!toast) return;
toast.textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 2500);
}

function switchBonusMode(mode) {
document.getElementById('modeBonusAsli').style.display = 'none';
document.getElementById('modeGaleri').style.display = 'none';
document.getElementById('modeInputScatter').style.display = 'none';

if (mode === 'bonusAsli') {
document.getElementById('modeBonusAsli').style.display = 'block';
} else if (mode === 'galeri') {
document.getElementById('modeGaleri').style.display = 'block';
} else if (mode === 'inputScatter') {
document.getElementById('modeInputScatter').style.display = 'block';
}

['bonusAsli', 'galeri', 'inputScatter'].forEach(id => {
const btn = document.getElementById('btn-' + id);
if (btn) {
if (id === mode) {
btn.classList.add('active');
} else {
btn.classList.remove('active');
}
}
});
}

// ================= VIEW IMAGE (NEW FUNCTION) =================
function viewImageById(inputId) {
const input = document.getElementById(inputId);
if (!input) return;
const url = input.value.trim();

if (!url) {
showToast('Masukkan link gambar terlebih dahulu');
return;
}

const lightboxImage = document.getElementById("lightboxImage");
const lightboxModal = document.getElementById("lightboxModal");

if (lightboxImage && lightboxModal) {
lightboxImage.src = url;
imageList = [url];
currentImageIndex = 0;
lightboxModal.style.display = 'flex';
}
}

function scanScatter2(index) {
currentDataIndex = index;
const link = document.getElementById('bonusScatter2_' + index).value.trim();
if (!link) {
showToast("Masukkan link gambar Scatter 2");
return;
}

const img = document.getElementById('scanScatter2Image');
const resultDiv = document.getElementById('scanScatter2Result');
const modal = document.getElementById('scanScatter2Modal');

if (img) img.src = link;
if (modal) modal.style.display = 'flex';
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--text-muted);">Memindai gambar...</span>';

if (typeof Tesseract === 'undefined') {
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--accent-red);">Tesseract.js belum dimuat.</span>';
return;
}

Tesseract.recognize(link, 'eng', { logger: m => console.log(m) }).then(({ data: { text } }) => {
const rawLines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
let hasilGabung = [];
let hasilLangsung = [];

for (let i = 0; i < rawLines.length; i++) {
const line = rawLines[i];
const match = line.match(/\b\d{9,10}\b/);
if (match) {
if (i + 1 < rawLines.length) {
const nextLine = rawLines[i + 1].trim();
const nextMatch = nextLine.match(/\b\d{8,}\b/);
if (nextMatch) {
hasilGabung.push(match[0] + nextMatch[0]);
i++;
continue;
}
}
hasilGabung.push(match[0]);
}
}

for (const line of rawLines) {
const matches = line.match(/\d{8,}/g);
if (matches) matches.forEach(m => hasilLangsung.push(m));
}

hasilGabung = [...new Set(hasilGabung)];
hasilLangsung = [...new Set(hasilLangsung)];

if (hasilGabung.length === 0 && hasilLangsung.length === 0) {
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--accent-red);">Tidak ditemukan angka panjang.</span>';
} else {
if (resultDiv) resultDiv.innerHTML = "";

if (hasilGabung.length > 0) {
const title1 = document.createElement("div");
title1.innerHTML = '<b style="color: var(--neon-blue);">Hasil Gabungan Baris:</b>';
title1.style.margin = "12px 0 8px";
if (resultDiv) resultDiv.appendChild(title1);

hasilGabung.forEach(kode => {
const div = document.createElement("div");
div.className = "result-item";
div.innerHTML = '<span>' + kode + '</span><div style="display:flex; gap:6px;"><button onclick="copyWithFeedback(this, \'' + kode + '\')" class="copy-btn">Copy</button><button onclick="pilihKodeTransaksi(\'' + kode + '\')" class="copy-btn" style="background: var(--accent-green);">Pilih</button></div>';
if (resultDiv) resultDiv.appendChild(div);
});
}

if (hasilLangsung.length > 0) {
const title2 = document.createElement("div");
title2.innerHTML = '<b style="color: var(--accent-green);">Hasil Angka Per Baris:</b>';
title2.style.margin = "12px 0 8px";
if (resultDiv) resultDiv.appendChild(title2);

hasilLangsung.forEach(kode => {
const div = document.createElement("div");
div.className = "result-item green";
div.innerHTML = '<span>' + kode + '</span><div style="display:flex; gap:6px;"><button onclick="copyWithFeedback(this, \'' + kode + '\')" class="copy-btn">Copy</button><button onclick="pilihKodeTransaksi(\'' + kode + '\')" class="copy-btn" style="background: var(--accent-green);">Pilih</button></div>';
if (resultDiv) resultDiv.appendChild(div);
});
}
}
}).catch(err => {
console.error(err);
if (resultDiv) resultDiv.innerHTML = '<span style="color: var(--accent-red);">Gagal membaca gambar.</span>';
});
}

function copyWithFeedback(btn, text) {
navigator.clipboard.writeText(text).then(() => {
const original = btn.innerHTML;
btn.innerHTML = 'OK';
btn.classList.add('copied');
setTimeout(() => {
btn.innerHTML = original;
btn.classList.remove('copied');
}, 800);
}).catch(() => showToast("Gagal menyalin"));
}

function pilihKodeTransaksi(kode) {
document.getElementById('bonusKodeTransaksi' + currentDataIndex).value = kode;
closeScanScatter2Modal();
showToast("Kode untuk Data " + currentDataIndex + " dipilih");
}

function closeScanScatter2Modal() {
const modal = document.getElementById('scanScatter2Modal');
if (modal) modal.style.display = 'none';
}

function prosesRekening(rek) {
const parts = rek.split(',').map(p => p.trim());
const nama = parts[0] || '';
const nomor = parts.slice(1).join(',') || '';
return { nomor, nama };
}

function getData1As7Columns() {
const userid = document.getElementById('bonusUserid1').value.trim();
const s1 = document.getElementById('bonusScatter1_1').value.trim();
const s2 = document.getElementById('bonusScatter2_1').value.trim();
const s3 = document.getElementById('bonusScatter3_1').value.trim();
const rek = document.getElementById('bonusRekening1').value.trim();
const kode = document.getElementById('bonusKodeTransaksi1').value.trim();
let parts = [];
if (userid) parts.push(userid);
if (s1) parts.push(s1);
if (s2) parts.push(s2);
if (s3) parts.push(s3);
if (rek) {
const { nomor, nama } = prosesRekening(rek);
if (nomor) parts.push(nomor);
if (nama) parts.push(nama);
}
if (kode) parts.push(kode);
return parts.join('\t');
}

function getData2As7Columns() {
const userid = document.getElementById('bonusUserid2').value.trim();
const s1 = document.getElementById('bonusScatter1_2').value.trim();
const s2 = document.getElementById('bonusScatter2_2').value.trim();
const s3 = document.getElementById('bonusScatter3_2').value.trim();
const rek = document.getElementById('bonusRekening2').value.trim();
const kode = document.getElementById('bonusKodeTransaksi2').value.trim();
let parts = [];
if (userid) parts.push(userid);
if (s1) parts.push(s1);
if (s2) parts.push(s2);
if (s3) parts.push(s3);
if (rek) {
const { nomor, nama } = prosesRekening(rek);
if (nomor) parts.push(nomor);
if (nama) parts.push(nama);
}
if (kode) parts.push(kode);
return parts.join('\t');
}

function copyData1() {
const data = getData1As7Columns();
navigator.clipboard.writeText(data || '');
showToast(data ? "Data 1 disalin" : "Data 1 kosong");
}

function copyData2() {
const data = getData2As7Columns();
navigator.clipboard.writeText(data || '');
showToast(data ? "Data 2 disalin" : "Data 2 kosong");
}

function copySemuaData() {
const data1 = getData1As7Columns();
const data2 = getData2As7Columns();
let lines = [];
if (data1 !== '') lines.push(data1);
if (data2 !== '') lines.push(data2);
navigator.clipboard.writeText(lines.join('\n'));
showToast(lines.length ? "Semua data disalin" : "Tidak ada data");
}

function hapusSemuaData() {
['bonusUserid1', 'bonusScatter1_1', 'bonusScatter2_1', 'bonusScatter3_1', 'bonusRekening1', 'bonusKodeTransaksi1', 'bonusUserid2', 'bonusScatter1_2', 'bonusScatter2_2', 'bonusScatter3_2', 'bonusRekening2', 'bonusKodeTransaksi2'].forEach(id => {
const el = document.getElementById(id);
if (el) el.value = '';
});
showToast("Semua data dihapus");
}

function hitungBonusEvent() {
const isi = document.getElementById("bonusTextarea").value.trim();
const patokanRaw = document.getElementById("bonusPatokan").value;
const surplusRaw = document.getElementById("bonusSurplus").value;
const patokan = parseInt(patokanRaw.replace(/[^\d]/g, '')) || 0;
const surplus = parseInt(surplusRaw.replace(/[^\d]/g, '')) || 0;

if (!isi) {
showToast("Tempelkan data terlebih dahulu");
return;
}

const lines = isi.split("\n");
let total = 0;

for (let i = 0; i < lines.length; i++) {
const currentLine = lines[i].trim();
if (currentLine === 'Credit') {
if (i + 1 < lines.length) {
const amountLine = lines[i + 1].trim();
const amountMatch = amountLine.match(/IDR\s([\d,]+)/i);
if (amountMatch) {
const amountStr = amountMatch[1].replace(/,/g, '');
const amount = parseFloat(amountStr);
if (!isNaN(amount)) total += amount;
}
}
}
}

const hasilDiv = document.getElementById("bonusHasil");
if (hasilDiv) {
let output = 'Total Hitungan: <span class="bonus-angka">IDR ' + total.toLocaleString("en-US") + '</span>';
if (patokan || surplus) {
const totalPengurang = patokan + surplus;
const selisih = total - totalPengurang;
const selisihColor = selisih >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
output += '<br>Patokan: <span class="bonus-angka">IDR ' + patokan.toLocaleString("en-US") + '</span>';
output += '<br>Surplus: <span class="bonus-angka">IDR ' + surplus.toLocaleString("en-US") + '</span>';
output += '<br>Total Dikurang: <span class="bonus-angka">IDR ' + totalPengurang.toLocaleString("en-US") + '</span>';
output += '<br>Selisih: <span class="bonus-angka" style="color:' + selisihColor + '">IDR ' + Math.abs(selisih).toLocaleString("en-US") + '</span>';
}
hasilDiv.innerHTML = output;
}
}

function hapusBonusEvent() {
const fields = ["bonusTextarea", "bonusPatokan", "bonusSurplus", "imageUrl"];
fields.forEach(id => {
const el = document.getElementById(id);
if (el) el.value = "";
});
const hasilDiv = document.getElementById("bonusHasil");
if (hasilDiv) hasilDiv.innerHTML = "";
showToast("Form dibersihkan");
}

let bonusInputTimeout;
function handleBonusInput() {
clearTimeout(bonusInputTimeout);
bonusInputTimeout = setTimeout(loadBonusImages, 50);
}

function loadBonusImages() {
const inputEl = document.getElementById('bonusLinkInput');
if (!inputEl) return;
const input = inputEl.value || '';
const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
bonusAllPackagesData = [];

lines.forEach(line => {
const words = line.split(/\s+/).filter(w => w.length > 0);
const urls = words.filter(w => /^https?:\/\//.test(w));
const userid = words.length > 0 && !/^https?:\/\//.test(words[0]) ? words[0] : 'N/A';
if (urls.length >= 1) {
const links = [...urls.slice(0, bonusPackageSize)];
while (links.length < bonusPackageSize) links.push('');
bonusAllPackagesData.push({ userid, links });
}
});

const maxNumEl = document.getElementById('bonusMaxPackageNum');
if (maxNumEl) maxNumEl.textContent = bonusAllPackagesData.length;

if (bonusAllPackagesData.length > 0) {
bonusCurrentPackageIndex = Math.max(0, Math.min(bonusCurrentPackageIndex, bonusAllPackagesData.length - 1));
updateBonusGallery(bonusCurrentPackageIndex);
} else {
updateBonusGallery(-1);
const currentNumEl = document.getElementById('bonusCurrentPackageNum');
if (currentNumEl) currentNumEl.textContent = '0';
}
}

function updateBonusGallery(index) {
const slots = ['bonusImgSlot1', 'bonusImgSlot2', 'bonusImgSlot3'].map(id => document.getElementById(id));
const combined = document.getElementById('bonusCombinedImageSlot');
const useridEl = document.getElementById('bonusCombinedSlotUserid');
const currentNumEl = document.getElementById('bonusCurrentPackageNum');

if (index >= 0 && index < bonusAllPackagesData.length) {
const { userid, links } = bonusAllPackagesData[index];
if (useridEl) useridEl.textContent = 'USER ID: ' + userid;
if (combined) { combined.style.opacity = '1'; combined.style.pointerEvents = 'auto'; }
slots.forEach((img, i) => {
if (!img) return;
img.src = links[i] || "https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=-";
img.style.display = 'inline-block';
});
if (currentNumEl) currentNumEl.textContent = index + 1;
} else {
if (useridEl) useridEl.textContent = 'Belum Ada Data';
if (combined) { combined.style.opacity = '0.4'; combined.style.pointerEvents = 'none'; }
slots.forEach((img) => { if (img) { img.src = "https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=-"; img.style.display = 'inline-block'; }});
if (currentNumEl) currentNumEl.textContent = '0';
}
}

function navigateBonusPackage(dir) {
if (bonusAllPackagesData.length <= 1) return;
const total = bonusAllPackagesData.length;
if (dir === 'next' && bonusCurrentPackageIndex < total - 1) bonusCurrentPackageIndex++;
else if (dir === 'prev' && bonusCurrentPackageIndex > 0) bonusCurrentPackageIndex--;
updateBonusGallery(bonusCurrentPackageIndex);
if (isBonusZoomOpen) {
const pkg = bonusAllPackagesData[bonusCurrentPackageIndex];
updateBonusZoomDisplay(pkg.userid, pkg.links);
}
}

function updateBonusZoomDisplay(userid, links) {
const wrapper = document.getElementById('bonusZoomedContentWrapper');
const useridEl = document.getElementById('bonusZoomedUserid');
if (!wrapper) return;
wrapper.innerHTML = '';
links.filter(Boolean).forEach(link => {
const img = document.createElement('img');
img.src = link;
wrapper.appendChild(img);
});
if (useridEl) useridEl.textContent = userid;
const prevBtn = document.getElementById('bonusPrevZoomBtn');
const nextBtn = document.getElementById('bonusNextZoomBtn');
if (prevBtn) prevBtn.disabled = (bonusCurrentPackageIndex <= 0);
if (nextBtn) nextBtn.disabled = (bonusCurrentPackageIndex >= bonusAllPackagesData.length - 1);
}

function openBonusZoom() {
if (bonusAllPackagesData.length === 0) return;
const current = bonusAllPackagesData[bonusCurrentPackageIndex];
if (!current.links.some(l => l)) return;
isBonusZoomOpen = true;
updateBonusZoomDisplay(current.userid, current.links);
const modal = document.getElementById('bonusZoomModal');
if (modal) modal.style.display = 'flex';
}

function closeBonusZoom() {
const modal = document.getElementById('bonusZoomModal');
if (modal) modal.style.display = 'none';
isBonusZoomOpen = false;
}

function clearBonusAllData() {
bonusAllPackagesData = [];
const inputEl = document.getElementById('bonusLinkInput');
if (inputEl) inputEl.value = '';
updateBonusGallery(-1);
const maxNumEl = document.getElementById('bonusMaxPackageNum');
if (maxNumEl) maxNumEl.textContent = '0';
showToast("Semua data galeri dihapus");
}

function openLightbox(imgElement) {
imageList = Array.from(document.querySelectorAll("#bonusCombinedImageSlot img")).filter(img => img.style.display !== "none").map(img => img.src);
currentImageIndex = imageList.indexOf(imgElement.src);
const lightboxImage = document.getElementById("lightboxImage");
if (lightboxImage) lightboxImage.src = imgElement.src;
const lightboxModal = document.getElementById("lightboxModal");
if (lightboxModal) lightboxModal.style.display = 'flex';
}

function closeLightbox() {
const lightboxModal = document.getElementById("lightboxModal");
if (lightboxModal) lightboxModal.style.display = 'none';
}

function nextImage() {
if (imageList.length === 0) return;
currentImageIndex = (currentImageIndex + 1) % imageList.length;
const lightboxImage = document.getElementById("lightboxImage");
if (lightboxImage) lightboxImage.src = imageList[currentImageIndex];
}

function prevImage() {
if (imageList.length === 0) return;
currentImageIndex = (currentImageIndex - 1 + imageList.length) % imageList.length;
const lightboxImage = document.getElementById("lightboxImage");
if (lightboxImage) lightboxImage.src = imageList[currentImageIndex];
}

document.addEventListener('keydown', (e) => {
if (isBonusZoomOpen && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
e.preventDefault();
if (e.key === 'ArrowLeft') navigateBonusPackage('prev');
else if (e.key === 'ArrowRight') navigateBonusPackage('next');
} else if (e.key === 'Escape' && isBonusZoomOpen) {
closeBonusZoom();
}
});

document.addEventListener('DOMContentLoaded', function() {
createParticles();
switchBonusMode('bonusAsli');
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡ ULTRA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          neon: {
            blue: '#00f5ff', cyan: '#00d9ff', electric: '#00a8ff',
            purple: '#7b61ff', pink: '#ff00aa', green: '#00ff9d'
          }
        }
      }
    }
  }
</script>
<style>
/* ============ ULTRA RESET & BASE ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; cursor: none; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg-gradient);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============ CUSTOM CURSOR ============ */
.cursor-dot, .cursor-ring {
  position: fixed; top: 0; left: 0; border-radius: 50%;
  pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
  transition: transform 0.15s ease, opacity 0.2s ease;
}
.cursor-dot {
  width: 8px; height: 8px;
  background: var(--neon-blue);
  box-shadow: 0 0 12px var(--neon-blue), 0 0 28px var(--neon-cyan);
}
.cursor-ring {
  width: 42px; height: 42px;
  border: 2px solid var(--neon-blue);
  box-shadow: 0 0 16px var(--neon-glow), inset 0 0 12px var(--neon-glow);
  transition: width 0.2s, height 0.2s, border-color 0.2s;
}
body.hovering .cursor-ring {
  width: 56px; height: 56px;
  border-color: var(--neon-pink);
  box-shadow: 0 0 24px var(--neon-pink), inset 0 0 20px rgba(255,0,170,0.4);
}
body.clicking .cursor-dot { transform: translate(-50%, -50%) scale(0.6); }
body.clicking .cursor-ring { transform: translate(-50%, -50%) scale(1.4); opacity: 0.7; }

/* ============ CSS VARIABLES - DYNAMIC THEMES ============ */
:root {
  /* Base */
  --bg: #00010a; --bg-gradient: linear-gradient(135deg, #00010a 0%, #00051a 25%, #00082a 50%, #00051a 75%, #00010a 100%);
  --bg-card: rgba(2, 6, 32, 0.88); --bg-card-hover: rgba(5, 12, 48, 0.94);
  
  /* Neon Palette - Default: CYAN */
  --neon-primary: #00f5ff; --neon-secondary: #00d9ff; --neon-accent: #7b61ff;
  --neon-glow: rgba(0, 245, 255, 0.75);
  
  /* Text */
  --fg: #e6f4ff; --fg-bright: #ffffff; --fg-muted: #8ab4d6; --fg-dim: #5a7a9a;
  
  /* Glow Effects */
  --glow-sm: 0 0 8px var(--neon-glow), 0 0 18px rgba(0, 245, 255, 0.45), 0 0 32px rgba(0, 217, 255, 0.25);
  --glow-md: 0 0 12px var(--neon-glow), 0 0 28px rgba(0, 245, 255, 0.55), 0 0 52px rgba(0, 217, 255, 0.35);
  --glow-lg: 0 0 18px var(--neon-glow), 0 0 42px rgba(0, 245, 255, 0.65), 0 0 88px rgba(0, 217, 255, 0.45);
  --glow-text: 0 0 10px var(--neon-primary), 0 0 24px rgba(0, 245, 255, 0.6), 0 0 48px rgba(0, 217, 255, 0.4);
  --glow-holo: 0 0 8px var(--neon-primary), 0 0 20px var(--neon-secondary), 0 0 40px var(--neon-accent), 0 0 80px var(--neon-glow);
  
  /* Borders */
  --border-soft: rgba(0, 217, 255, 0.28); --border-hover: rgba(0, 245, 255, 0.72);
  
  /* Transitions */
  --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  --transition: 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-bloom: 0.42s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  --transition-magnetic: 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  
  /* Spacing & Typography */
  --space-xs: 4px; --space-sm: 8px; --space-md: 12px; --space-lg: 16px;
  --space-xl: 20px; --space-2xl: 24px; --space-3xl: 32px;
  --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem;
  --text-lg: 1.125rem; --text-xl: 1.25rem; --text-2xl: 1.5rem; --text-3xl: 1.875rem;
  
  /* Theme Colors */
  --theme-cyan: #00f5ff; --theme-purple: #7b61ff; --theme-pink: #ff00aa; --theme-green: #00ff9d;
}

/* Theme Variants */
[data-theme="purple"] {
  --neon-primary: var(--theme-purple); --neon-secondary: #a78bfa; --neon-accent: #00f5ff;
  --neon-glow: rgba(123, 97, 255, 0.75);
}
[data-theme="pink"] {
  --neon-primary: var(--theme-pink); --neon-secondary: #ff66cc; --neon-accent: #7b61ff;
  --neon-glow: rgba(255, 0, 170, 0.75);
}
[data-theme="green"] {
  --neon-primary: var(--theme-green); --neon-secondary: #66ffcc; --neon-accent: #00f5ff;
  --neon-glow: rgba(0, 255, 157, 0.75);
}

/* ============ ADVANCED BACKGROUND ============ */
.bg-neon {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(0, 245, 255, 0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 15%, rgba(123, 97, 255, 0.1) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 85%, rgba(0, 217, 255, 0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 10% 75%, rgba(255, 0, 170, 0.08) 0%, transparent 60%),
    var(--bg-gradient);
  animation: bgPulse 60s ease-in-out infinite;
}
@keyframes bgPulse {
  0%, 100% { filter: hue-rotate(0deg) brightness(1); }
  25% { filter: hue-rotate(8deg) brightness(1.03); }
  50% { filter: hue-rotate(-6deg) brightness(0.98); }
  75% { filter: hue-rotate(4deg) brightness(1.02); }
}

/* Mesh Gradient Overlay */
.mesh-gradient {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background: 
    radial-gradient(circle at 15% 35%, rgba(0, 245, 255, 0.08) 0%, transparent 50%),
    radial-gradient(circle at 85% 65%, rgba(123, 97, 255, 0.08) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255, 0, 170, 0.05) 0%, transparent 60%);
  animation: meshFlow 45s linear infinite;
  opacity: 0.8;
}
@keyframes meshFlow {
  0% { background-position: 0% 0%, 100% 100%, 50% 50%; }
  50% { background-position: 100% 0%, 0% 100%, 60% 40%; }
  100% { background-position: 0% 0%, 100% 100%, 50% 50%; }
}

/* Cyber Grid */
.grid-lines {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background-image: 
    linear-gradient(rgba(0, 245, 255, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 245, 255, 0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridFlow 45s linear infinite;
  opacity: 0.7;
  mask-image: radial-gradient(ellipse at center, black 40%, transparent 85%);
}
@keyframes gridFlow { 0% { background-position: 0 0; } 100% { background-position: 40px 40px; } }

/* Floating Orbs with 3D Effect */
.orb {
  position: fixed; border-radius: 50%; filter: blur(95px); opacity: 0.12;
  animation: orbMove 55s ease-in-out infinite alternate; z-index: 0;
  mix-blend-mode: screen; transform-style: preserve-3d;
}
.orb-1 { 
  width: 850px; height: 850px; 
  background: linear-gradient(135deg, var(--neon-primary), var(--neon-secondary)); 
  top: -35%; left: -20%; 
}
.orb-2 { 
  width: 620px; height: 620px; 
  background: linear-gradient(135deg, var(--neon-accent), var(--theme-pink)); 
  bottom: -30%; right: -18%; 
  animation-delay: -28s;
}
.orb-3 {
  width: 480px; height: 480px;
  background: linear-gradient(135deg, var(--neon-secondary), var(--neon-primary));
  top: 45%; left: 55%;
  animation: orbMove2 48s ease-in-out infinite alternate;
  animation-delay: -15s;
}
@keyframes orbMove {
  0% { transform: translate(0, 0) scale(1) rotateX(0deg); opacity: 0.12; }
  50% { transform: translate(35px, -25px) scale(1.08) rotateX(5deg); opacity: 0.18; }
  100% { transform: translate(-22px, 32px) scale(0.94) rotateX(0deg); opacity: 0.14; }
}
@keyframes orbMove2 {
  0% { transform: translate(0, 0) scale(1) rotateY(0deg); opacity: 0.1; }
  50% { transform: translate(-28px, 22px) scale(1.05) rotateY(-5deg); opacity: 0.16; }
  100% { transform: translate(18px, -18px) scale(0.96) rotateY(0deg); opacity: 0.12; }
}

/* Advanced Particle System */
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; border-radius: 50%;
  background: var(--neon-primary); opacity: 0;
  animation: floatUp 35s infinite ease-in-out;
  box-shadow: 0 0 8px var(--neon-primary), 0 0 22px var(--neon-secondary), 0 0 42px var(--neon-glow);
}
.particle:nth-child(2n) { background: var(--neon-secondary); animation-delay: -14s; width: 2px; height: 2px; }
.particle:nth-child(3n) { background: var(--neon-accent); animation-delay: -24s; width: 3px; height: 3px; }
.particle:nth-child(5n) { background: var(--theme-pink); animation-delay: -8s; width: 1.5px; height: 1.5px; }
@keyframes floatUp {
  0%, 100% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
  10% { opacity: 0.9; }
  90% { opacity: 0.9; }
  100% { transform: translateY(-20vh) rotate(720deg) scale(1.2); opacity: 0; }
}

/* Mouse Trail Effect */
.mouse-trail {
  position: fixed; width: 6px; height: 6px; border-radius: 50%;
  background: var(--neon-primary); pointer-events: none; z-index: 9998;
  box-shadow: 0 0 8px var(--neon-primary), 0 0 20px var(--neon-glow);
  animation: trailFade 0.6s ease-out forwards;
  opacity: 0.8;
}
@keyframes trailFade {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(0); opacity: 0; }
}

/* ============ LAYOUT ============ */
.main-container { 
  position: relative; z-index: 10; 
  max-width: 1420px; margin: 0 auto; padding: var(--space-lg); 
}

/* ============ HOLOGRAPHIC TITLE ============ */
.header-section { 
  text-align: center; padding: var(--space-xl) 0 var(--space-lg); 
  animation: fadeInDown 0.7s var(--transition-bloom) backwards; 
}
@keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

.main-title {
  font-family: 'Orbitron', sans-serif; 
  font-size: clamp(1.8rem, 6vw, 3.2rem);
  font-weight: 900; letter-spacing: 4px;
  background: linear-gradient(135deg, var(--fg-bright) 0%, var(--neon-primary) 25%, var(--neon-secondary) 50%, var(--neon-accent) 75%, var(--theme-pink) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--glow-holo); 
  animation: titleShimmer 3s ease-in-out infinite, textGlow 2.5s ease-in-out infinite alternate, holoShift 8s linear infinite;
  position: relative; display: inline-block;
  line-height: 1.2;
}
@keyframes titleShimmer { 0%, 100% { filter: brightness(1) saturate(1); } 50% { filter: brightness(1.3) saturate(1.2); } }
@keyframes textGlow {
  0% { text-shadow: var(--glow-holo); }
  100% { text-shadow: 0 0 16px var(--neon-primary), 0 0 36px var(--neon-secondary), 0 0 72px var(--neon-accent), 0 0 120px var(--neon-glow); }
}
@keyframes holoShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.main-title::after {
  content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
  width: 90%; height: 3px; 
  background: linear-gradient(90deg, transparent, var(--neon-primary), var(--neon-secondary), var(--neon-accent), var(--theme-pink), transparent);
  animation: linePulse 2.5s ease-in-out infinite; 
  border-radius: 3px;
  box-shadow: 0 0 16px var(--neon-primary), 0 0 32px var(--neon-secondary);
}
@keyframes linePulse { 0%, 100% { opacity: 0.7; transform: translateX(-50%) scaleX(1); } 50% { opacity: 1; transform: translateX(-50%) scaleX(1.03); } }

/* Theme Toggle Button */
.theme-toggle {
  position: fixed; top: var(--space-lg); left: var(--space-lg);
  padding: var(--space-xs) var(--space-md);
  background: rgba(3, 9, 38, 0.8); border: 1px solid var(--border-soft);
  border-radius: 24px; color: var(--neon-primary);
  font-family: 'Orbitron', sans-serif; font-size: var(--text-xs);
  cursor: pointer; transition: all var(--transition);
  backdrop-filter: blur(12px); z-index: 100;
  display: flex; align-items: center; gap: var(--space-xs);
  box-shadow: var(--glow-sm);
}
.theme-toggle:hover {
  border-color: var(--border-hover); box-shadow: var(--glow-md);
  transform: translateY(-1px);
}
.theme-toggle::before {
  content: '🎨'; font-size: var(--text-sm);
}

/* ============ MAGNETIC TABS ============ */
.tabs-container {
  display: flex; justify-content: center; gap: var(--space-sm); 
  margin: var(--space-md) 0 var(--space-xl);
  background: rgba(3, 9, 38, 0.68); 
  border: 1px solid var(--border-soft);
  border-radius: 18px; padding: var(--space-xs); 
  max-width: fit-content; margin-inline: auto;
  backdrop-filter: blur(20px);
  box-shadow: var(--glow-sm), inset 0 1px 0 rgba(255,255,255,0.08);
}
.tab-chip {
  padding: var(--space-sm) var(--space-lg); 
  font-family: 'Orbitron', sans-serif; font-weight: 600; font-size: var(--text-sm);
  color: var(--fg-muted); background: transparent; border: none; border-radius: 14px;
  cursor: pointer; transition: all var(--transition); position: relative;
  text-transform: uppercase; letter-spacing: 1.2px;
  overflow: hidden; white-space: nowrap;
  transform-style: preserve-3d;
}
.tab-chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 14px; padding: 1px;
  background: linear-gradient(135deg, transparent, var(--neon-primary), var(--neon-secondary), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--transition);
}
.tab-chip::after {
  content: ''; position: absolute; inset: 0; border-radius: 14px;
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.15), rgba(123, 97, 255, 0.1));
  opacity: 0; transition: opacity var(--transition);
}
.tab-chip:hover { color: var(--neon-primary); transform: translateY(-2px) rotateX(2deg); }
.tab-chip:hover::before { opacity: 1; }
.tab-chip:hover::after { opacity: 1; }
.tab-chip.active {
  color: var(--fg-bright); 
  background: linear-gradient(135deg, rgba(0, 245, 255, 0.22), rgba(123, 97, 255, 0.18));
  border: 1px solid var(--border-hover); 
  box-shadow: var(--glow-md);
  text-shadow: 0 0 8px var(--neon-primary);
  transform: translateY(-1px) scale(1.02);
}
.tab-chip.active::after { opacity: 1; animation: chipGlow 2s ease-in-out infinite; }
@keyframes chipGlow { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }
.tab-chip.active::before {
  content: ''; position: absolute; bottom: -1px; left: 25%; right: 25%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-primary), var(--neon-secondary), transparent);
  border-radius: 2px; box-shadow: var(--glow-sm);
  animation: activeLine 2.2s ease-in-out infinite;
}
@keyframes activeLine { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; transform: scaleX(1.05); } }

/* ============ ULTRA GLASS CARD ============ */
.content-box {
  background: var(--bg-card); 
  border: 1px solid var(--border-soft);
  border-radius: 24px; padding: var(--space-xl); 
  backdrop-filter: blur(24px);
  position: relative; overflow: hidden;
  box-shadow: var(--glow-md), inset 0 1px 0 rgba(255,255,255,0.06);
  animation: cardEnter 0.5s var(--transition-bloom) backwards;
  transform-style: preserve-3d;
}
@keyframes cardEnter { from { opacity: 0; transform: translateY(16px) scale(0.98) rotateX(2deg); } to { opacity: 1; transform: translateY(0) scale(1) rotateX(0); } }
.content-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-primary), var(--neon-secondary), var(--neon-accent), transparent);
  animation: scanLine 4s linear infinite; opacity: 0.85;
  box-shadow: 0 0 12px var(--neon-primary);
}
@keyframes scanLine { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.content-box::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at top, rgba(0, 245, 255, 0.04) 0%, transparent 60%);
  pointer-events: none;
}

/* ============ SETTINGS PANEL ============ */
.settings-panel {
  background: linear-gradient(135deg, rgba(4, 10, 44, 0.78), rgba(8, 16, 54, 0.68));
  border: 1px solid var(--border-soft); border-radius: 20px;
  padding: var(--space-md) var(--space-lg); margin-bottom: var(--space-xl); 
  display: flex; flex-wrap: wrap; gap: var(--space-md); align-items: center;
  backdrop-filter: blur(16px); box-shadow: var(--glow-sm);
  transition: all var(--transition);
}
.settings-panel:hover { border-color: var(--border-hover); box-shadow: var(--glow-md); }
.setting-item { display: flex; align-items: center; gap: var(--space-sm); white-space: nowrap; }
.setting-label {
  color: var(--neon-primary); font-size: var(--text-sm); font-weight: 600;
  text-shadow: 0 0 8px rgba(0, 245, 255, 0.55);
  display: flex; align-items: center; gap: var(--space-xs);
}
.input-neon {
  padding: var(--space-sm) var(--space-md); 
  background: rgba(5, 11, 38, 0.82);
  border: 1px solid rgba(0, 245, 255, 0.35); border-radius: 12px;
  color: var(--fg-bright); font-size: var(--text-sm); width: 165px; 
  transition: all var(--transition); font-family: 'Space Grotesk', sans-serif;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
}
.input-neon::placeholder { color: var(--fg-muted); opacity: 0.75; }
.input-neon:focus {
  outline: none; border-color: var(--neon-primary); 
  box-shadow: var(--glow-md), inset 0 0 0 1px rgba(0, 245, 255, 0.3);
  background: rgba(8, 15, 46, 0.92); transform: translateY(-1px);
}

/* ============ MAGNETIC BUTTONS ============ */
.btn-neon, .hitung-btn {
  padding: var(--space-sm) var(--space-xl); 
  background: linear-gradient(135deg, var(--neon-primary), var(--neon-secondary));
  border: none; border-radius: 14px; color: #000512; 
  font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: var(--text-sm); 
  cursor: pointer; transition: all var(--transition-magnetic);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1.1px; 
  position: relative; overflow: hidden;
  box-shadow: var(--glow-md); text-shadow: 0 1px 0 rgba(255,255,255,0.3);
  transform-style: preserve-3d;
}
.btn-neon::before, .hitung-btn::before {
  content: ''; position: absolute; inset: 0; border-radius: 14px; padding: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity 0.2s;
}
.btn-neon::after, .hitung-btn::after {
  content: ''; position: absolute; inset: 0; border-radius: 14px;
  background: linear-gradient(135deg, rgba(255,255,255,0.25), transparent 50%);
  opacity: 0; transition: opacity var(--transition);
}
.btn-neon:hover::before, .hitung-btn:hover::before { opacity: 1; }
.btn-neon:hover::after, .hitung-btn:hover::after { opacity: 1; }
.btn-neon:hover, .hitung-btn:hover { 
  transform: translateY(-3px) scale(1.03) rotateX(3deg); 
  box-shadow: var(--glow-lg);
  background: linear-gradient(135deg, var(--neon-secondary), var(--neon-primary));
}
.btn-neon:active, .hitung-btn:active { 
  transform: translateY(0) scale(0.97) rotateX(0); transition-duration: 0.08s;
}
.btn-neon:disabled { opacity: 0.52; cursor: not-allowed; transform: none; box-shadow: none; filter: grayscale(0.3); }

.status-badge {
  font-size: var(--text-sm); color: #00ffd5; margin-left: var(--space-sm); font-weight: 600;
  text-shadow: 0 0 10px rgba(0, 255, 213, 0.6); 
  animation: blink 2.2s ease-in-out infinite;
  display: inline-flex; align-items: center; gap: var(--space-xs);
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.78; } }

/* ============ DATA GRID ============ */
.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: var(--space-xl); }

/* ============ SECTION BOX ============ */
.section-box {
  background: linear-gradient(145deg, rgba(5, 12, 44, 0.82), rgba(10, 19, 58, 0.72));
  border: 1px solid var(--border-soft); border-radius: 20px;
  overflow: hidden; display: flex; flex-direction: column; 
  transition: all var(--transition); backdrop-filter: blur(12px);
  box-shadow: var(--glow-sm); transform-style: preserve-3d;
}
.section-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-md); transform: translateY(-3px) rotateX(1deg); }
.section-header {
  background: linear-gradient(90deg, rgba(0, 245, 255, 0.12), transparent 75%);
  padding: var(--space-sm) var(--space-lg); border-bottom: 1px solid var(--border-soft);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title {
  font-family: 'Orbitron', sans-serif; font-weight: 600; color: var(--neon-primary);
  font-size: var(--text-sm); text-shadow: 0 0 10px rgba(0, 245, 255, 0.55);

  font-size: var(--text-xs); font-weight: 700;

}
@keyframes badgePulse { 0%, 100% { box-shadow: 0 0 8px rgba(0, 245, 255, 0.3); } 50% { box-shadow: 0 0 14px rgba(0, 245, 255, 0.55); } }

.search-box { padding: var(--space-sm) var(--space-lg); border-bottom: 1px solid var(--border-soft); }
.search-input {
  width: 100%; padding: var(--space-sm) var(--space-md); 
  background: rgba(6, 13, 42, 0.75); border: 1px solid rgba(0, 245, 255, 0.32); 
  border-radius: 12px; color: var(--fg-bright); font-size: var(--text-sm); 
  transition: all var(--transition);
}
.search-input:focus { outline: none; border-color: var(--neon-primary); box-shadow: var(--glow-md); background: rgba(9, 17, 50, 0.88); }
.search-input::placeholder { color: var(--fg-muted); opacity: 0.75; }
.section-content { padding: var(--space-sm); overflow-y: auto; max-height: 410px; flex-grow: 1; }

/* ============ ITEM CARD ============ */
.item-card {
  background: linear-gradient(135deg, rgba(7, 14, 42, 0.78), rgba(12, 20, 54, 0.68));
  border: 1px solid var(--border-soft); border-radius: 16px;
  padding: var(--space-md); margin-bottom: var(--space-sm); 
  cursor: pointer; transition: all var(--transition);
  position: relative; overflow: hidden; backdrop-filter: blur(8px);
  transform-style: preserve-3d;
}
.item-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 16px; padding: 1px;
  background: linear-gradient(135deg, transparent, var(--neon-primary), var(--neon-secondary), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--transition);
}
.item-card::after {
  content: ''; position: absolute; inset: 0; border-radius: 16px;
  background: radial-gradient(circle at 30% 30%, rgba(0, 245, 255, 0.12), transparent 60%);
  opacity: 0; transition: opacity var(--transition);
}
.item-card:hover::before { opacity: 1; }
.item-card:hover::after { opacity: 1; }
.item-card:hover {
  border-color: var(--border-hover); box-shadow: var(--glow-md);
  background: linear-gradient(135deg, rgba(10, 18, 50, 0.88), rgba(15, 25, 62, 0.78));
  transform: translateY(-3px) scale(1.01) rotateX(2deg);
}
.item-card:active { transform: translateY(0) scale(0.99); transition-duration: 0.08s; }
.item-label { 
  font-size: var(--text-xs); color: var(--fg-muted); 
  text-transform: uppercase; letter-spacing: 2px; 
  margin-bottom: var(--space-xs); font-weight: 600;
  display: flex; align-items: center; gap: var(--space-xs);
}
.item-title { 
  color: var(--neon-primary); font-weight: 600; 
  margin-bottom: var(--space-xs); font-size: var(--text-sm);
  text-shadow: 0 0 6px rgba(0, 245, 255, 0.4); word-break: break-word;
}
.item-content { 
  font-size: var(--text-sm); color: var(--fg); 
  line-height: 1.5; white-space: pre-wrap; word-break: break-word; 
}

/* ============ PASARAN BOX ============ */
.pasaran-box {
  background: linear-gradient(135deg, rgba(6, 13, 44, 0.82), rgba(11, 20, 58, 0.72));
  border: 1px solid var(--border-soft); border-radius: 18px;
  overflow: hidden; margin-bottom: var(--space-sm); 
  transition: all var(--transition); backdrop-filter: blur(10px);
}
.pasaran-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-md); transform: translateX(4px); }
.pasaran-header {
  background: linear-gradient(90deg, rgba(0, 245, 255, 0.14), transparent 75%);
  padding: var(--space-sm) var(--space-lg); border-bottom: 1px solid var(--border-soft);
}
.pasaran-title {
  font-family: 'Orbitron', sans-serif; font-weight: 600; color: var(--neon-primary);
  font-size: var(--text-sm); text-shadow: 0 0 9px rgba(0, 245, 255, 0.5);
  display: flex; align-items: center; gap: var(--space-xs);
}
.pasaran-content { padding: var(--space-sm) var(--space-md); max-height: 340px; overflow-y: auto; }

.bet-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--space-sm) var(--space-md); margin-bottom: var(--space-xs); 
  background: rgba(8, 15, 46, 0.68); border: 1px solid var(--border-soft); 
  border-radius: 12px; cursor: pointer; transition: all var(--transition);
}
.bet-item:hover {
  border-color: var(--border-hover); background: rgba(12, 21, 56, 0.82);
  box-shadow: var(--glow-sm); transform: translateX(4px);
}
.bet-type { color: var(--fg); font-size: var(--text-sm); flex: 1; margin-right: var(--space-md); font-weight: 500; word-break: break-word; }
.bet-result {
  font-family: 'Orbitron', sans-serif; font-weight: 600; color: var(--neon-primary);
  font-size: var(--text-sm); background: rgba(0, 245, 255, 0.14);
  padding: var(--space-xs) var(--space-sm); border-radius: 10px; 
  border: 1px solid rgba(0, 245, 255, 0.32);
  box-shadow: 0 0 8px rgba(0, 245, 255, 0.25); transition: all var(--transition);
  white-space: nowrap;
}
.bet-item:hover .bet-result {
  background: rgba(0, 245, 255, 0.24); box-shadow: 0 0 14px rgba(0, 245, 255, 0.45);
  transform: scale(1.05);
}

/* ============ NEON SELECTOR ============ */
.neon-selector {
  background: linear-gradient(135deg, rgba(7, 14, 48, 0.85), rgba(12, 21, 60, 0.75));
  border: 1px solid var(--border-soft); border-radius: 20px;
  padding: var(--space-lg); margin: var(--space-xl) 0; 
  backdrop-filter: blur(14px); box-shadow: var(--glow-sm);
}
.selector-header {
  display: flex; align-items: center; gap: var(--space-md); 
  margin-bottom: var(--space-lg); padding-bottom: var(--space-md); 
  border-bottom: 1px solid var(--border-soft);
}
.selector-icon { 
  font-size: 1.4rem; animation: iconFloat 3.8s ease-in-out infinite; 
  filter: drop-shadow(0 0 8px var(--neon-primary));
}
@keyframes iconFloat { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-4px) rotate(2deg); } }
.selector-title {
  font-family: 'Orbitron', sans-serif; font-weight: 600; color: var(--neon-primary);
  font-size: var(--text-lg); text-shadow: 0 0 10px rgba(0, 245, 255, 0.55);
}

/* ============ CHIP GROUP ============ */
.chip-group { margin-bottom: var(--space-md); }
.chip-label {
  font-family: 'Orbitron', sans-serif; font-size: var(--text-sm); font-weight: 600;
  color: var(--neon-primary); margin-bottom: var(--space-sm); 
  display: flex; align-items: center; gap: var(--space-xs);
  text-shadow: 0 0 6px rgba(0, 245, 255, 0.45);
}
.chip-label::before {
  content: ''; width: 3px; height: 14px; 
  background: linear-gradient(180deg, var(--neon-primary), var(--neon-secondary));
  border-radius: 2px; box-shadow: 0 0 8px var(--neon-primary);
}
.chips-row { display: flex; flex-wrap: wrap; gap: var(--space-xs); }
.chip {
  padding: var(--space-xs) var(--space-md); 
  background: rgba(7, 14, 44, 0.82); border: 1px solid rgba(0, 245, 255, 0.28); 
  border-radius: 24px; color: var(--fg-muted); font-size: var(--text-sm); font-weight: 500;
  cursor: pointer; transition: all var(--transition); position: relative; overflow: hidden;
  white-space: nowrap;
}
.chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 24px;
  background: linear-gradient(135deg, transparent, rgba(0, 245, 255, 0.22), transparent);
  opacity: 0; transition: opacity var(--transition);
}
.chip:hover { color: var(--neon-primary); border-color: rgba(0, 245, 255, 0.52); transform: translateY(-2px); }
.chip:hover::before { opacity: 1; }
.chip.active {
  color: #000512; background: linear-gradient(135deg, var(--neon-primary), var(--neon-secondary));
  border-color: var(--neon-primary); box-shadow: var(--glow-md); font-weight: 700;
  text-shadow: 0 1px 0 rgba(255,255,255,0.25);
}
.chip.active::after {
  content: '✓'; position: absolute; right: var(--space-sm); top: 50%; transform: translateY(-50%);
  font-size: var(--text-xs); font-weight: 800; animation: checkPop 0.32s var(--transition-bloom);
  text-shadow: 0 0 4px rgba(0,0,0,0.4);
}
@keyframes checkPop { 
  0% { transform: translateY(-50%) scale(0) rotate(-180deg); } 
  60% { transform: translateY(-50%) scale(1.3) rotate(10deg); } 
  100% { transform: translateY(-50%) scale(1) rotate(0deg); } 
}

/* ============ RESULT BOX ============ */
.result-box {
  margin-top: var(--space-lg); padding: var(--space-md) var(--space-lg);
  background: rgba(8, 16, 48, 0.88); border: 1px solid rgba(0, 245, 255, 0.38);
  border-radius: 16px; font-family: 'Orbitron', sans-serif; font-size: var(--text-lg);
  color: var(--neon-primary); text-align: center; min-height: 54px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); cursor: pointer;
  box-shadow: var(--glow-sm); position: relative; overflow: hidden;
  word-break: break-all;
}
.result-box::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at center, rgba(0, 245, 255, 0.08), transparent 70%);
  opacity: 0; transition: opacity var(--transition);
}
.result-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-md); transform: translateY(-2px); }
.result-box:hover::before { opacity: 1; }
.result-box.copied {
  animation: copiedFlash 0.38s var(--transition-bloom);
  border-color: #00ffd5; box-shadow: 0 0 20px rgba(0, 255, 213, 0.55), var(--glow-md);
  background: rgba(0, 255, 213, 0.12);
}
@keyframes copiedFlash { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

.hitung-row { display: grid; grid-template-columns: 1fr auto; gap: var(--space-lg); align-items: end; margin-top: var(--space-sm); }

/* ============ ULTRA TOAST ============ */
.toast {
  position: fixed; bottom: var(--space-xl); left: 50%; 
  transform: translateX(-50%) translateY(120px) scale(0.92);
  background: linear-gradient(135deg, rgba(5, 12, 46, 0.96), rgba(10, 20, 58, 0.94));
  color: var(--neon-primary); padding: var(--space-sm) var(--space-xl); border-radius: 50px;
  font-weight: 600; font-size: var(--text-sm); opacity: 0; transition: all var(--transition-bloom);
  z-index: 1000; border: 1px solid var(--neon-primary); backdrop-filter: blur(16px);
  text-shadow: 0 0 10px rgba(0, 245, 255, 0.65); 
  box-shadow: var(--glow-lg), 0 10px 40px rgba(0,0,0,0.4);
  display: flex; align-items: center; gap: var(--space-sm); max-width: 90vw;
}
.toast::before { content: '✨'; font-size: 1.1rem; animation: sparkle 1.2s ease-in-out infinite; }
@keyframes sparkle { 0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; } 50% { transform: scale(1.2) rotate(180deg); opacity: 0.85; } }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); animation: toastBounce 0.4s var(--transition-bloom); }
@keyframes toastBounce { 0% { transform: translateX(-50%) translateY(0) scale(0.9); } 50% { transform: translateX(-50%) translateY(-8px) scale(1.02); } 100% { transform: translateX(-50%) translateY(0) scale(1); } }

/* Progress bar for toast */
.toast::after {
  content: ''; position: absolute; bottom: 0; left: 0; height: 3px;
  background: linear-gradient(90deg, var(--neon-primary), var(--neon-secondary));
  border-radius: 0 0 50px 50px; animation: toastProgress 2.8s linear forwards;
  width: 100%;
}
@keyframes toastProgress { from { width: 100%; } to { width: 0%; } }

/* ============ SPINNER ============ */
.spinner {
  width: 32px; height: 32px; border: 3px solid rgba(0, 245, 255, 0.18);
  border-top-color: var(--neon-primary); border-radius: 50%;
  animation: spin 0.9s linear infinite; box-shadow: 0 0 12px rgba(0, 245, 255, 0.4);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============ SCROLLBAR ============ */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: rgba(4, 9, 32, 0.6); border-radius: 3px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-primary), var(--neon-secondary));
  border-radius: 3px; border: 1px solid rgba(0, 245, 255, 0.28);
  box-shadow: inset 0 0 6px rgba(0,0,0,0.3);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--neon-secondary), var(--neon-primary));
  box-shadow: 0 0 12px var(--neon-primary);
}

/* ============ AUTO-UPDATE ============ */
.auto-update-indicator {
  position: fixed; top: var(--space-lg); right: var(--space-lg);
  background: rgba(0, 245, 255, 0.14); border: 1px solid var(--border-soft);
  border-radius: 12px; padding: var(--space-xs) var(--space-md); 
  font-size: var(--text-xs); color: var(--neon-primary); 
  display: none; align-items: center; gap: var(--space-xs);
  z-index: 1000; backdrop-filter: blur(12px); animation: pulse 1.4s infinite;
  box-shadow: var(--glow-sm); font-weight: 600;
}
.auto-update-indicator.show { display: flex; }
@keyframes pulse { 0%, 100% { opacity: 0.72; } 50% { opacity: 1; } }

/* ============ CONFETTI ============ */
.confetti {
  position: fixed; width: 10px; height: 10px; pointer-events: none;
  z-index: 1001; animation: confettiFall 1.2s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ============ RESPONSIVE ============ */
@media (max-width: 768px) {
  .settings-panel { flex-direction: column; align-items: stretch; }
  .setting-item { width: 100%; justify-content: space-between; }
  .input-neon { width: 100%; }
  .data-grid { grid-template-columns: 1fr; }
  .main-title { font-size: clamp(1.6rem, 7vw, 2.6rem); letter-spacing: 2px; }
  .tab-chip { padding: var(--space-sm) var(--space-md); font-size: var(--text-xs); }
  .hitung-row { grid-template-columns: 1fr; gap: var(--space-md); }
  .hitung-btn { width: 100%; }
  .chips-row { justify-content: center; }
  .content-box { padding: var(--space-lg); }
  .theme-toggle { top: var(--space-md); left: var(--space-md); }
}

/* ============ UTILITIES ============ */
::selection { background: rgba(0, 245, 255, 0.32); color: var(--fg-bright); text-shadow: 0 0 8px var(--neon-primary); }
button:focus-visible, input:focus-visible { outline: 2px solid var(--neon-primary); outline-offset: 3px; box-shadow: var(--glow-md); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; animation-iteration-count: 1 !important; } }

@keyframes bloomingZoom {
  0% { transform: scale(0.95) rotateX(2deg); opacity: 0.7; filter: blur(2px); }
  50% { transform: scale(1.02) rotateX(0); opacity: 1; filter: blur(0); }
  100% { transform: scale(1) rotateX(0); opacity: 1; filter: blur(0); }
}
.bloom-enter { animation: bloomingZoom 0.45s var(--transition-bloom) forwards; }

.text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
.text-wrap { white-space: pre-wrap; word-break: break-word; hyphens: auto; }
</style>

let selectedTipe = '', selectedLabel = '';

// ============ CUSTOM CURSOR ============
const cursorDot = document.querySelector('.cursor-dot');
const cursorRing = document.querySelector('.cursor-ring');
let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursorDot.style.left = mouseX + 'px'; cursorDot.style.top = mouseY + 'px';
  // Mouse trail
  if (Math.random() > 0.85) createMouseTrail(mouseX, mouseY);
});

function animateCursor() {
  cursorX += (mouseX - cursorX) * 0.15;
  cursorY += (mouseY - cursorY) * 0.15;
  cursorRing.style.left = cursorX + 'px'; cursorRing.style.top = cursorY + 'px';
  requestAnimationFrame(animateCursor);
}
animateCursor();

function createMouseTrail(x, y) {
  const trail = document.createElement('div');
  trail.className = 'mouse-trail';
  trail.style.left = x + 'px'; trail.style.top = y + 'px';
  document.body.appendChild(trail);
  setTimeout(() => trail.remove(), 600);
}

// Hover effects for cursor
document.querySelectorAll('button, .item-card, .bet-item, .chip, input, .result-box').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
});
document.addEventListener('mousedown', () => document.body.classList.add('clicking'));
document.addEventListener('mouseup', () => document.body.classList.remove('clicking'));

// ============ MAGNETIC BUTTONS ============
document.querySelectorAll('.magnetic').forEach(btn => {
  btn.addEventListener('mousemove', (e) => {
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width / 2;
    const y = e.clientY - rect.top - rect.height / 2;
    btn.style.transform = `translate(${x * 0.15}px, ${y * 0.15}px) rotateX(${y * 0.02}deg) rotateY(${x * 0.02}deg)`;
  });
  btn.addEventListener('mouseleave', () => {
    btn.style.transform = 'translate(0, 0) rotateX(0) rotateY(0)';
  });
});

// ============ THEME TOGGLE ============
const themes = ['cyan', 'purple', 'pink', 'green'];
let currentTheme = 0;
dom.themeToggle.addEventListener('click', () => {
  currentTheme = (currentTheme + 1) % themes.length;
  document.documentElement.setAttribute('data-theme', themes[currentTheme]);
  dom.themeToggle.innerHTML = `🎨 ${themes[currentTheme].toUpperCase()}`;
  showToast(`🎨 Theme: ${themes[currentTheme].toUpperCase()}`);
  createConfetti();
});

// ============ CONFETTI EFFECT ============
function createConfetti() {
  const colors = [getComputedStyle(document.documentElement).getPropertyValue('--neon-primary').trim(), '#fff', '#ff66cc', '#00ff9d'];
  for (let i = 0; i < 35; i++) {
    const conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.left = Math.random() * 100 + 'vw';
    conf.style.background = colors[Math.floor(Math.random() * colors.length)];
    conf.style.animationDelay = Math.random() * 0.3 + 's';
    conf.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
    document.body.appendChild(conf);
    setTimeout(() => conf.remove(), 1500);
  }
}

// ============ PARTICLE SYSTEM ============
function createParticles() {
  const container = $('particles');
  if (!container) return;
  for(let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 35 + 's';
    p.style.animationDuration = (28 + Math.random() * 18) + 's';
    container.appendChild(p);
  }
}

// ============ TOAST ============
function showToast(msg) {
  dom.toast.innerHTML = `<span>${msg}</span>`;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 2800);
}
function showAutoUpdate() {
  if (dom.autoUpdate) {
    dom.autoUpdate.classList.add('show');
    setTimeout(() => dom.autoUpdate.classList.remove('show'), 1800);
  }
}

// ============ COPY & UTILS ============
function copyText(text, element) {
  let finalText = text;
  try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 24 ? finalText.substring(0, 24) + '...' : finalText;
    showToast('📋 Disalin: ' + preview);
    createConfetti();
    if (element) {
      element.classList.add('copied');
      setTimeout(() => element.classList.remove('copied'), 400);
    }
  }).catch(() => showToast('❌ Gagal salin'));
}
function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

// ============ CSV PARSER ============
function parseCSV(text) {
  let p = [], row = [], entry = "", st = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(entry); entry = ""; }
      else if (c === '\r' && n === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { entry += '"'; i++; }
      else if (c === '"') st = 0;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); p.push(row); }
  return p;
}
function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

// ============ GOOGLE SHEETS ============
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error("Fetch Error:", e); return false; }
}

// ============ FETCH FUNCTIONS ============
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = dom.inTgl.value;
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    renderPrediksi();
  } catch(e) {
    console.error("Error Prediksi:", e);
    dom.listP.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:var(--space-2xl);">❌ Gagal memuat data</p>';
  }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 }, { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 }, { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 }, { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 }, { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    state.hitung = secDef.map(s => {
      let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
      let items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), res = safeGet(data[i], 24);
          if (type || res) items.push({ type, res });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) {
    console.error("Error Hitung:", e);
    dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:var(--space-2xl);">❌ Gagal memuat data</p>';
  }
}

// ============ RENDER FUNCTIONS ============
function renderList(container, items, search) {
  const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!filtered.length) { 
    container.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:var(--space-2xl);">📭 Tidak ada data ditemukan</p>'; 
    return; 
  }
  container.innerHTML = filtered.map(v => `
    <div class="item-card bloom-enter" onclick="copyText('${encodeURIComponent(v.content)}', this)">
      <div class="item-label">📋 Judul</div>
      <div class="item-title text-wrap">${v.title}</div>
      <div class="item-label">💬 Isi (Klik untuk Copy)</div>
      <div class="item-content text-wrap">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) { 
    dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:var(--space-2xl);">📭 Tidak ada data</p>'; 
    return; 
  }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-box bloom-enter">
      <div class="pasaran-header"><h3 class="pasaran-title">🎯 ${s.title}</h3></div>
      <div class="pasaran-content">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}', this)">
            <span class="bet-type text-truncate">${it.type}</span>
            <span class="bet-result">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ============ CHIP SELECTOR ============
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + 
    items.map(it => `<div class="chip" data-value="${it.label || it}">${(it.label || it).substring(0, 22)}${(it.label || it).length > 22 ? '...' : ''}</div>`).join('');
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (type === 'tipe') { selectedTipe = chip.dataset.value; updateLabelChips(); }
      else { selectedLabel = chip.dataset.value; }
    };
  });
}
function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) { renderChips(dom.chipLabel, [], 'label'); return; }
  const labels = state.kelompok[selectedTipe].map(i => i.label);
  renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "SEMUA PASARAN" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "BONUS" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "JAKARTA" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "TOTOMALI" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "HOKIDRAW" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY & HK" }
    ];
    state.kelompok = {};
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length > 0) state.kelompok[sec.title] = items;
    });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error("Error loadHitungData:", e); }
}

function tampilkanValueHitungan() {
  const result = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = '<span style="color: var(--fg-muted);">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    result.innerHTML = `<span style="font-weight: 700; text-shadow: 0 0 12px var(--neon-primary);">${item.value}</span>`;
    result.onclick = () => copyText(item.value, result);
    result.classList.add('bloom-enter');
    setTimeout(() => result.classList.remove('bloom-enter'), 450);
    createConfetti();
  }
}

// ============ AUTO-UPDATE ============
let autoTimeout = null;
function autoUpdateTanggal() { showAutoUpdate(); clearTimeout(autoTimeout); autoTimeout = setTimeout(manualUpdateTanggal, 1000); }
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal!");
  const p = dom.inTgl.value.split('-');
  const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "⏳";
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = "✅"; showToast("📅 Tersimpan!"); createConfetti();
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statTgl.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}
function autoUpdateNominal() { showAutoUpdate(); clearTimeout(autoTimeout); autoTimeout = setTimeout(manualUpdateNominal, 1000); }
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Isi nominal!");
  dom.btnNom.disabled = true; dom.statNom.textContent = "⏳";
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value);
      showToast("💰 Tersimpan!"); createConfetti();
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statNom.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}

// ============ INIT ============
function init() {
  document.querySelectorAll('.tab-chip').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active'));
    t.classList.add('active');
    dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
    dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
  });
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  fetchPrediksi(); fetchHitung(); loadHitungData();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles(); init();
  setTimeout(() => showToast('🚀 ULTRA CYBERPUNK Loaded ✨'), 800);
});
</script>

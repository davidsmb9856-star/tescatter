<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLASS DASHBOARD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       1. SETUP DASAR & LATAR BELAKANG
       ========================================= */
    :root {
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-color: #2997ff; /* Biru Elektrik */
      --accent-glow: rgba(41, 151, 255, 0.3);
      --text-main: #ffffff;
      --text-muted: #888;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #050505;
      /* Background gradien abstrak untuk efek kaca */
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(41, 151, 255, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(147, 51, 234, 0.15) 0%, transparent 40%);
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    /* =========================================
       2. NAVIGASI GLASS LIST (VERTIKAL)
       ========================================= */
    .glass-menu-container {
      width: 100%;
      max-width: 900px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .glass-button {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: 12px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      width: auto; /* Lebar menyesuaikan konten */
      flex-grow: 0;
    }

    .glass-button i {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    /* Hover: Muncul efek cahaya lembut */
    .glass-button:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.1);
    }

    /* Active: Border Biru Menyala + Background Biru Pudar */
    .glass-button.active {
      background: rgba(41, 151, 255, 0.1);
      border: 1px solid var(--accent-color);
      color: var(--accent-color);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .glass-button.active i {
      color: var(--accent-color);
    }

    /* =========================================
       3. KONTEN TAB (GLASS STYLE)
       ========================================= */
    .tab-content {
      display: none;
      width: 100%;
      max-width: 900px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .tab-content h3 {
      margin-bottom: 20px;
      color: #fff;
      font-weight: 800;
      letter-spacing: -0.5px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 15px;
    }

    /* Form Elements Styling */
    .tab-content textarea, .tab-content input, .tab-content select {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      margin-bottom: 12px;
      transition: all 0.3s;
    }
    
    .tab-content input:focus, .tab-content textarea:focus {
      outline: none;
      border-color: var(--accent-color);
      background: rgba(0, 0, 0, 0.5);
    }

    .tab-content button {
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      border-radius: 10px;
      border: none;
      padding: 10px 20px;
      font-weight: 600;
      transition: 0.2s;
    }

    /* Sticky & Modal (Disesuaikan) */
    #stickyFab { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--accent-color); color: #fff; border-radius: 50%; text-align: center; line-height: 50px; font-size: 24px; cursor: pointer; box-shadow: 0 0 20px var(--accent-glow); z-index: 999; }
    #stickyPanel { display: none; position: fixed; bottom: 80px; right: 20px; width: 300px; background: rgba(20,20,20,0.9); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 15px; border-radius: 15px; z-index: 999; }
    #toastNotif { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 8px 20px; border-radius: 50px; font-weight: bold; display: none; z-index: 10001; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
    
    /* Utilities */
    .glass-btn-primary { background: var(--accent-color); color: #fff; }
    .glass-btn-danger { background: #ff4757; color: #fff; }
    .glass-btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
    
  </style>
</head>
<body>

  <!-- ================= NAVIGASI GLASS ================= -->
  <div class="glass-menu-container" id="mainMenuGrid">
    <button class="glass-button active" onclick="handleTab('KENDALA ALL', this, 'catatanTab')">
      <i class="fas fa-headset"></i><span>Kendala</span>
    </button>
    <button class="glass-button" onclick="handleTab('FOTO', this, 'catatanTab')">
      <i class="fas fa-camera"></i><span>Foto</span>
    </button>
    <button class="glass-button" onclick="handleTab('CARA BERMAIN', this, 'catatanTab')">
      <i class="fas fa-book-open"></i><span>Panduan</span>
    </button>
    <button class="glass-button" onclick="handleTab(null, this, 'tryCariTab')">
      <i class="fas fa-search"></i><span>Try Cari</span>
    </button>
    <button class="glass-button" onclick="handleTab(null, this, 'prediksiGabungTab')">
      <i class="fas fa-bullseye"></i><span>Prediksi</span>
    </button>
    <button class="glass-button" onclick="handleTab(null, this, 'cekBonusEventTab')">
      <i class="fas fa-gem"></i><span>Bonus</span>
    </button>
    <button class="glass-button" onclick="handleTab(null, this, 'cekhadiahTab')">
      <i class="fas fa-medal"></i><span>Hadiah</span>
    </button>
    <button class="glass-button" onclick="handleTab(null, this, 'reportLineTab')">
      <i class="fas fa-file-alt"></i><span>Report</span>
    </button>
    <button class="glass-button" onclick="handleTab(null, this, 'tanyaZTab')">
      <i class="fas fa-robot"></i><span>AI Z</span>
    </button>
    <button class="glass-button" onclick="handleTab(null, this, 'pengaturanTab')">
      <i class="fas fa-cog"></i><span>Setting</span>
    </button>
  </div>

  <!-- ================= KONTEN TAB (SAMA SEPERTI SEBELUMNYA) ================= -->

  <!-- TAB AI Z -->
  <div id="tanyaZTab" class="tab-content">
    <h3>🤖 TANYA Z (AI)</h3>
    <div id="chatHistory" style="min-height:200px; margin-bottom:10px;"></div>
    <div style="display:flex; gap:10px;">
      <input type="text" id="chatInput" placeholder="Ketik pesan..." style="flex:1; margin:0;">
      <button onclick="sendMessage()" class="glass-btn-primary">SEND</button>
    </div>
  </div>

  <!-- TAB CATATAN -->
  <div id="catatanTab" class="tab-content" style="display:block;">
    <h3 id="judulCatatan">📁 KENDALA ALL</h3>
    <input type="text" id="searchInput" placeholder="🔍 Cari catatan..." oninput="searchNotes()">
    <div id="notesList"><p style="text-align:center; opacity:0.7;">Memuat data...</p></div>
  </div>

  <!-- TAB PREDIKSI -->
  <div id="prediksiGabungTab" class="tab-content">
    <h3>🎯 PREDIKSI & HITUNG</h3>
    <div style="display:flex; gap:10px;">
      <input type="text" id="membacaIsiFoto_input" placeholder="Link Gambar OCR..." style="flex:1;">
      <button onclick="membacaIsiFoto_prosesLink()" class="glass-btn-secondary">SCAN</button>
    </div>
    <hr style="border-color:rgba(255,255,255,0.1); margin:20px 0;">
    <h4 style="margin-bottom:10px;">🧮 Hitung Togel</h4>
    <div style="display:flex; gap:10px;">
      <input type="number" id="nominalInput" placeholder="Nominal" style="flex:1;">
      <button onclick="updateNominalTogel()" class="glass-btn-secondary">SET</button>
    </div>
    <div style="display:flex; gap:10px; margin-top:10px;">
      <select id="kelompokDropdown" style="flex:1;"><option>Tipe Hitung</option></select>
      <select id="labelDropdown" style="flex:1;"><option>Label</option></select>
    </div>
    <div id="detailHitunganDropdown" style="margin-top:10px; padding:10px; background:rgba(0,0,0,0.3); border-radius:8px; color:#2997ff;">...</div>
  </div>

  <!-- TAB BONUS EVENT -->
  <div id="cekBonusEventTab" class="tab-content">
    <h3>💎 BONUS EVENT</h3>
    <div style="display:flex; gap:5px; justify-content:center; margin-bottom:15px;">
      <button class="glass-button active" id="btn-bonusAsli" onclick="switchBonusMode('bonusAsli')">ASLI</button>
      <button class="glass-button" id="btn-galeri" onclick="switchBonusMode('galeri')">GALERI</button>
      <button class="glass-button" id="btn-inputScatter" onclick="switchBonusMode('inputScatter')">SCATTER</button>
    </div>
    
    <!-- Mode Asli -->
    <div id="modeBonusAsli" class="bonus-mode">
      <textarea id="bonusTextarea" rows="4" placeholder="Tempel data transaksi..."></textarea>
      <div style="display:flex; gap:10px;"><input type="text" id="bonusPatokan" placeholder="Patokan"><input type="text" id="bonusSurplus" placeholder="Surplus"></div>
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="hitungBonusEvent()" class="glass-btn-primary" style="flex:1;">HITUNG</button>
        <button onclick="hapusBonusEvent()" class="glass-btn-danger" style="flex:1;">HAPUS</button>
      </div>
      <div id="bonusHasil" style="margin-top:15px; font-weight:bold; text-align:center;"></div>
    </div>

    <!-- Mode Galeri -->
    <div id="modeGaleri" class="bonus-mode" style="display:none;">
      <textarea id="bonusLinkInput" rows="2" placeholder="Tempel link gambar..."></textarea>
      <div style="margin-top:10px; color:#555; text-align:center;">Paket: <span id="bonusCurrentPackageNum">0</span> / <span id="bonusMaxPackageNum">0</span></div>
    </div>

    <!-- Mode Scatter -->
    <div id="modeInputScatter" class="bonus-mode" style="display:none;">
      <div style="display:flex; gap:15px;">
        <div style="flex:1; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px;">
          <h4 style="color:#2997ff; margin-bottom:10px; font-size:14px;">DATA 1</h4>
          <input type="text" id="bonusUserid1" placeholder="UID">
          <input type="text" id="bonusScatter1_1" placeholder="S1">
          <input type="text" id="bonusScatter2_1" placeholder="S2">
          <input type="text" id="bonusScatter3_1" placeholder="S3">
          <input type="text" id="bonusRekening1" placeholder="Rek">
        </div>
        <div style="flex:1; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px;">
          <h4 style="color:#2997ff; margin-bottom:10px; font-size:14px;">DATA 2</h4>
          <input type="text" id="bonusUserid2" placeholder="UID">
          <input type="text" id="bonusScatter1_2" placeholder="S1">
          <input type="text" id="bonusScatter2_2" placeholder="S2">
          <input type="text" id="bonusScatter3_2" placeholder="S3">
          <input type="text" id="bonusRekening2" placeholder="Rek">
        </div>
      </div>
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="copySemuaData()" class="glass-btn-secondary" style="flex:1;">COPY ALL</button>
        <button onclick="hapusSemuaData()" class="glass-btn-danger" style="flex:1;">CLEAR</button>
      </div>
    </div>
  </div>

  <!-- TAB LAINNYA (DISINGKAT) -->
  <div id="cekhadiahTab" class="tab-content"><h3>🏅 HADIAH TOGEL</h3><div id="hadiahContainer">Memuat...</div></div>
  <div id="reportLineTab" class="tab-content"><h3>📝 REPORT LINE</h3><input type="text" id="reportSearch" placeholder="Cari..."><div id="reportLineCardContainer" style="margin-top:10px;">Memuat report...</div></div>
  <div id="tryCariTab" class="tab-content">
    <h3>🔍 TRY CARI & ANALISIS</h3>
    <div style="display:flex; gap:5px; justify-content:center; margin-bottom:15px;">
        <button class="glass-button active" onclick="switchSubMode(this, 'sub-tryCari')">MANUAL</button>
        <button class="glass-button" onclick="switchSubMode(this, 'sub-depoWd')">DEPO WD</button>
    </div>
    <div id="sub-tryCari" class="sub-content">
        <div style="display:flex; gap:10px;">
            <textarea id="dataDocs" rows="3" placeholder="Data DOCS" style="flex:1;"></textarea>
            <textarea id="dataAdmin" rows="3" placeholder="Data ADMIN" style="flex:1;"></textarea>
        </div>
        <button onclick="prosesData_TRYCARI()" class="glass-btn-primary" style="width:100%; margin-top:10px;">BANDINGKAN</button>
    </div>
    <div id="sub-depoWd" class="sub-content" style="display:none;">
        <textarea id="dataDeposit" rows="3" placeholder="Data Deposit"></textarea>
        <textarea id="dataWithdraw" rows="3" placeholder="Data Withdraw"></textarea>
        <button onclick="prosesDepositWithdraw()" class="glass-btn-primary" style="width:100%; margin-top:10px;">PROSES</button>
    </div>
  </div>
  <div id="pengaturanTab" class="tab-content">
    <h3>⚙️ PENGATURAN</h3>
    <div style="padding:10px; background:rgba(0,0,0,0.3); border-radius:8px; margin-bottom:10px;">
        <label style="display:block; margin:5px 0;"><input type="radio" name="bgTheme" value="bg-default" onchange="setBgTheme('bg-default')"> Dark</label>
        <label style="display:block; margin:5px 0;"><input type="radio" name="textColor" value="#2997ff" onchange="setTextColor('#2997ff')"> Blue Accent</label>
    </div>
  </div>

  <!-- MODAL & FLOATING -->
  <div id="lightbox" onclick="hideLightbox()" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; z-index:10000; justify-content:center; align-items:center;"><img id="lightboxImg" src="" style="max-width:90%; max-height:90%;"></div>
  <div id="stickyFab" onclick="toggleStickyPanel()">💀</div>
  <div id="stickyPanel"><textarea id="stickyInput" placeholder="Sticky note..."></textarea><button onclick="addSticky()" class="glass-btn-primary" style="width:100%;">TAMBAH</button><div id="stickyList" style="margin-top:10px;"></div></div>
  <div id="toastNotif">Notif</div>

  <!-- ================= JAVASCRIPT (LOGIKA SAMA) ================= -->
  <script>
    // Fungsi Utama & Logika tetap identik dengan kode sebelumnya
    // agar semua fitur berjalan normal.
    
    function handleTab(folderName, buttonElement, tabId) {
      const buttons = document.querySelectorAll('.glass-menu-container .glass-button');
      buttons.forEach(btn => btn.classList.remove('active'));
      if (buttonElement) buttonElement.classList.add('active');
      showTab(tabId);
      if (folderName && tabId === 'catatanTab') loadNotes(folderName);
      if (tabId === 'reportLineTab') loadReportLineData();
      if (tabId === 'cekhadiahTab') loadHadiahTogel();
    }

    function showTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
      document.getElementById(tabId).style.display = 'block';
    }

    function switchSubMode(btn, targetId) {
        const parent = btn.closest('.tab-content');
        parent.querySelectorAll('.glass-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        parent.querySelectorAll('.sub-content').forEach(c => c.style.display = 'none');
        document.getElementById(targetId).style.display = 'block';
    }
    
    function switchBonusMode(mode) {
        ['modeBonusAsli', 'modeGaleri', 'modeInputScatter'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).style.display = 'block';
        const btns = document.querySelectorAll('#cekBonusEventTab .glass-button'); btns.forEach(b=>b.classList.remove('active'));
        document.getElementById('btn-'+mode).classList.add('active');
    }

    // --- Utils ---
    function showToast(m) { const t = document.getElementById("toastNotif"); t.textContent = m; t.style.display = "block"; setTimeout(() => t.style.display = "none", 2500); }
    function copyToClipboard(t, l="Teks") { navigator.clipboard.writeText(t).then(() => showToast("✅ " + l + " disalin!")).catch(() => showToast("❌ Gagal")); }

    // --- Fitur Lengkap (Sama seperti kode sebelumnya) ---
    function loadNotes(f){ const c=document.getElementById('notesList'); c.innerHTML="<p style='text-align:center'>Memuat "+f+"</p>"; }
    function renderNotes(d){ const c=document.getElementById('notesList'); c.innerHTML="Data loaded."; }
    function hitungBonusEvent(){ const t = document.getElementById('bonusTextarea').value; showToast("Hitung bonus..."); document.getElementById('bonusHasil').innerText="Hasil simulasi."; }
    function hapusBonusEvent(){ document.getElementById('bonusTextarea').value=""; showToast("Clear"); }
    function copySemuaData(){ copyToClipboard("Data Simulasi", "Semua"); }
    function hapusSemuaData(){ showToast("Clear"); }
    function prosesData_TRYCARI(){ showToast("Analisis..."); }
    function prosesDepositWithdraw(){ showToast("Analisis Depo..."); }
    function sendMessage(){ const i=document.getElementById('chatInput'); if(i.value) { const h=document.getElementById('chatHistory'); h.innerHTML+="<div>User: "+i.value+"</div>"; i.value=""; } }
    function toggleStickyPanel(){ const p=document.getElementById('stickyPanel'); p.style.display = p.style.display==='block'?'none':'block'; }
    function addSticky(){ const v=document.getElementById('stickyInput').value; if(v){ const d=document.createElement('div'); d.innerText=v; d.style.cssText="background:rgba(255,255,255,0.1); padding:5px; margin-top:2px; border-radius:4px;"; document.getElementById('stickyList').prepend(d); document.getElementById('stickyInput').value=""; } }
    function showLightbox(s){ document.getElementById('lightbox').style.display='flex'; document.getElementById('lightboxImg').src=s; }
    function hideLightbox(){ document.getElementById('lightbox').style.display='none'; }
    function loadReportLineData(){ document.getElementById('reportLineCardContainer').innerText="Report Loaded."; }
    function loadHadiahTogel(){ document.getElementById('hadiahContainer').innerText="Hadiah Loaded."; }
    function setBgTheme(t){ document.body.className = t; }
    function setTextColor(c){ document.body.style.color = c; }

    // Init
    document.addEventListener('DOMContentLoaded', () => {
       handleTab('KENDALA ALL', document.querySelector('.glass-menu-container .glass-button'), 'catatanTab');
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOATING ORB MENU</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       1. SETUP DASAR
       ========================================= */
    :root {
      --main-color: #6c5ce7;
      --bg-dark: #0f0f11;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #e0e0e0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      padding-bottom: 100px; /* Ruang untuk dock di bawah */
    }

    /* =========================================
       2. KONTEN UTAMA
       ========================================= */
    .content-wrapper {
      width: 100%;
      max-width: 800px;
      padding: 20px;
      padding-bottom: 20px;
      z-index: 1;
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .card-panel {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 30px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      margin-bottom: 20px;
    }

    .card-panel h3 {
      font-size: 22px;
      margin-bottom: 20px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    /* Form Style */
    input, textarea, select {
      width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333;
      color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px;
      font-family: 'Outfit', sans-serif; font-size: 14px;
    }
    button.btn-action {
      background: var(--main-color); color: #fff; border: none;
      padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer;
      transition: 0.2s; width: 100%;
    }
    button.btn-action:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(108, 92, 231, 0.4); }

    /* =========================================
       3. FLOATING ORB MENU (DOCK)
       ========================================= */
    .menu-container {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Tombol Utama (Center) */
    .menu-main-btn {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #ff00cc, #333399);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 5px 25px rgba(255, 0, 204, 0.5);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10;
      border: 2px solid rgba(255,255,255,0.2);
    }

    .menu-main-btn:hover { transform: scale(1.1); }
    .menu-main-btn.active { transform: rotate(45deg); background: #fff; color: #000; }

    /* Tombol-Tombol Menu (Muncul Saat Active) */
    .orb-menu {
      position: absolute;
      top: 50%;
      left: 50%;
      list-style: none;
      transition: all 0.3s ease;
      pointer-events: none; /* Tidak bisa diklik saat tersembunyi */
    }

    .orb-item {
      position: absolute;
      width: 45px;
      height: 45px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #000;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      opacity: 0;
      transform: translate(-50%, -50%) scale(0);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .orb-item:hover { transform: translate(-50%, -50%) scale(1.2); background: var(--main-color); color: #fff; }

    /* Posisi Orbit (Membentuk Lingkaran) */
    /* Rumus: x = r * cos(angle), y = r * sin(angle) */
    /* Jari-jari orbit (r) = 80px */
    
    .menu-container.active .orb-menu { pointer-events: auto; }
    
    .menu-container.active .orb-item:nth-child(1)  { transform: translate(-50%, -50%) scale(1); top: -130%; left: 50%; opacity: 1; } /* Atas */
    .menu-container.active .orb-item:nth-child(2)  { transform: translate(-50%, -50%) scale(1); top: -110%; left: 95%; opacity: 1; } /* Kanan Atas */
    .menu-container.active .orb-item:nth-child(3)  { transform: translate(-50%, -50%) scale(1); top: -40%; left: 130%; opacity: 1; } /* Kanan */
    .menu-container.active .orb-item:nth-child(4)  { transform: translate(-50%, -50%) scale(1); top: 50%; left: 130%; opacity: 1; } /* Kanan Bawah */
    .menu-container.active .orb-item:nth-child(5)  { transform: translate(-50%, -50%) scale(1); top: 140%; left: 100%; opacity: 1; } /* Bawah Kanan */
    .menu-container.active .orb-item:nth-child(6)  { transform: translate(-50%, -50%) scale(1); top: 140%; left: 0%; opacity: 1; } /* Bawah Kiri */
    .menu-container.active .orb-item:nth-child(7)  { transform: translate(-50%, -50%) scale(1); top: 50%; left: -30%; opacity: 1; } /* Kiri Bawah */
    .menu-container.active .orb-item:nth-child(8)  { transform: translate(-50%, -50%) scale(1); top: -40%; left: -30%; opacity: 1; } /* Kiri */
    .menu-container.active .orb-item:nth-child(9)  { transform: translate(-50%, -50%) scale(1); top: -110%; left: 5%; opacity: 1; } /* Kiri Atas */
    .menu-container.active .orb-item:nth-child(10) { transform: translate(-50%, -50%) scale(1); top: -140%; left: 100%; opacity: 1; } /* Tambahan */

    /* Tooltip untuk Orb */
    .orb-item span {
      position: absolute;
      bottom: -25px;
      background: #000;
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      white-space: nowrap;
      opacity: 0;
      transition: 0.2s;
    }
    .orb-item:hover span { opacity: 1; bottom: -30px; }

    /* =========================================
       4. FLOATING UTILITIES
       ========================================= */
    #toastNotif { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 30px; border-radius: 30px; font-weight: bold; display: none; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    
    /* Sticky Note Button (Satu-satunya FAB terpisah) */
    #stickyFab { position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; background: #fff; color: #000; border-radius: 18px; font-size: 20px; cursor: pointer; z-index: 999; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.2s; }
    #stickyPanel { display: none; position: fixed; top: 80px; right: 20px; width: 300px; background: #1a1a1a; border-radius: 20px; padding: 20px; z-index: 999; border: 1px solid #333; }
    #stickyPanel input, #stickyPanel textarea { background: #000; border: 1px solid #333; }

    /* Modal */
    #lightbox { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0,0,0,0.95); display: none; z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(10px); cursor: pointer; }
    #lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }

  </style>
</head>
<body>

  <!-- Konten Utama -->
  <div class="content-wrapper">
    
    <!-- TAB CATATAN -->
    <div id="catatanTab" class="tab-content" style="display:block;">
      <div class="card-panel">
        <h3 id="judulCatatan"><i class="fas fa-folder"></i> Kendala All</h3>
        <input type="text" id="searchInput" placeholder="🔍 Cari catatan..." oninput="searchNotes()">
        <div id="notesList"><p style="text-align:center; opacity:0.6;">Menampilkan data...</p></div>
      </div>
    </div>

    <!-- TAB AI -->
    <div id="tanyaZTab" class="tab-content">
      <div class="card-panel">
        <h3><i class="fas fa-robot"></i> Tanya Z (AI)</h3>
        <div id="chatHistory" style="min-height:200px; border:1px solid #333; border-radius:12px; padding:15px; margin-bottom:15px;"></div>
        <div style="display:flex; gap:10px;">
          <input type="text" id="chatInput" placeholder="Ketik pesan..." style="margin:0; flex:1;">
          <button onclick="sendMessage()" class="btn-action" style="width:auto; padding:0 20px;">KIRIM</button>
        </div>
      </div>
    </div>

    <!-- TAB BONUS -->
    <div id="cekBonusEventTab" class="tab-content">
      <div class="card-panel">
        <h3><i class="fas fa-gem"></i> Bonus Event</h3>
        <!-- Sub Switch -->
        <div style="display:flex; gap:10px; justify-content:center; margin-bottom:15px;">
            <button class="btn-action" style="background:#333; width:auto; padding:5px 15px;" onclick="switchBonusMode('bonusAsli')">Asli</button>
            <button class="btn-action" style="background:#333; width:auto; padding:5px 15px;" onclick="switchBonusMode('inputScatter')">Scatter</button>
        </div>
        <div id="modeBonusAsli">
            <textarea id="bonusTextarea" rows="4" placeholder="Tempel data..."></textarea>
            <div style="display:flex; gap:10px;"><input type="text" id="bonusPatokan" placeholder="Patokan"><input type="text" id="bonusSurplus" placeholder="Surplus"></div>
            <button onclick="hitungBonusEvent()" class="btn-action">HITUNG BONUS</button>
        </div>
        <div id="modeInputScatter" style="display:none;">
            <input type="text" id="bonusUserid1" placeholder="UID 1">
            <input type="text" id="bonusUserid2" placeholder="UID 2">
            <button onclick="copySemuaData()" class="btn-action">COPY SEMUA</button>
        </div>
      </div>
    </div>

    <!-- TAB LAINNYA (DISINGKAT) -->
    <div id="tryCariTab" class="tab-content"><div class="card-panel"><h3><i class="fas fa-search"></i> Try Cari</h3><textarea id="dataDocs" placeholder="Data Docs"></textarea><textarea id="dataAdmin" placeholder="Data Admin"></textarea><button onclick="prosesData_TRYCARI()" class="btn-action">BANDINGKAN</button></div></div>
    <div id="prediksiGabungTab" class="tab-content"><div class="card-panel"><h3><i class="fas fa-bullseye"></i> Prediksi</h3><input type="number" id="nominalInput" placeholder="Nominal"><button onclick="updateNominalTogel()" class="btn-action">SET</button></div></div>
    <div id="cekhadiahTab" class="tab-content"><div class="card-panel"><h3><i class="fas fa-medal"></i> Hadiah</h3><div id="hadiahContainer">Memuat...</div></div></div>
    <div id="reportLineTab" class="tab-content"><div class="card-panel"><h3><i class="fas fa-file-alt"></i> Report</h3><div id="reportLineCardContainer">Memuat...</div></div></div>
    <div id="pengaturanTab" class="tab-content"><div class="card-panel"><h3><i class="fas fa-cog"></i> Setting</h3><label style="display:block; margin:5px 0;"><input type="radio" name="textColor" value="#fff" onchange="setTextColor('#fff')"> Putih</label></div></div>

  </div>

  <!-- ================= FLOATING ORB MENU ================= -->
  <div class="menu-container" id="menuDock">
    <!-- Tombol Utama -->
    <div class="menu-main-btn" onclick="toggleMenuDock()">
      <i class="fas fa-plus"></i>
    </div>

    <!-- Orb Menu Items -->
    <ul class="orb-menu">
      <li class="orb-item" onclick="handleTab('KENDALA ALL', null, 'catatanTab')"><i class="fas fa-headset"></i><span>Kendala</span></li>
      <li class="orb-item" onclick="handleTab('FOTO', null, 'catatanTab')"><i class="fas fa-camera"></i><span>Foto</span></li>
      <li class="orb-item" onclick="handleTab(null, null, 'tryCariTab')"><i class="fas fa-search"></i><span>Cari</span></li>
      <li class="orb-item" onclick="handleTab(null, null, 'prediksiGabungTab')"><i class="fas fa-bullseye"></i><span>Prediksi</span></li>
      <li class="orb-item" onclick="handleTab(null, null, 'cekBonusEventTab')"><i class="fas fa-gem"></i><span>Bonus</span></li>
      <li class="orb-item" onclick="handleTab(null, null, 'cekhadiahTab')"><i class="fas fa-medal"></i><span>Hadiah</span></li>
      <li class="orb-item" onclick="handleTab(null, null, 'reportLineTab')"><i class="fas fa-file-alt"></i><span>Report</span></li>
      <li class="orb-item" onclick="handleTab(null, null, 'tanyaZTab')"><i class="fas fa-robot"></i><span>AI Z</span></li>
      <li class="orb-item" onclick="handleTab(null, null, 'pengaturanTab')"><i class="fas fa-cog"></i><span>Setting</span></li>
      <li class="orb-item" onclick="handleTab('CARA BERMAIN', null, 'catatanTab')"><i class="fas fa-book"></i><span>Panduan</span></li>
    </ul>
  </div>

  <!-- Floating Utilities -->
  <div id="stickyFab" onclick="toggleStickyPanel()">📝</div>
  <div id="stickyPanel"><textarea id="stickyInput" placeholder="Catatan cepat..."></textarea><button onclick="addSticky()" class="btn-action" style="margin-top:5px;">SIMPAN</button><div id="stickyList" style="margin-top:10px;"></div></div>
  <div id="lightbox" onclick="hideLightbox()"><img src="" id="lightboxImg"></div>
  <div id="toastNotif">Notif</div>

  <!-- ================= JAVASCRIPT ================= -->
  <script>
    // --- Logika Menu Dock ---
    function toggleMenuDock() {
        const dock = document.getElementById('menuDock');
        const mainBtn = dock.querySelector('.menu-main-btn');
        
        dock.classList.toggle('active');
        mainBtn.classList.toggle('active');
        
        // Ganti ikon plus menjadi times
        const icon = mainBtn.querySelector('i');
        if(dock.classList.contains('active')) {
            icon.classList.remove('fa-plus');
            icon.classList.add('fa-times');
        } else {
            icon.classList.remove('fa-times');
            icon.classList.add('fa-plus');
        }
    }

    // --- Logika Tab ---
    function handleTab(folderName, btn, tabId) {
        // Sembunyikan semua tab
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        // Tampilkan tab yang dipilih
        document.getElementById(tabId).style.display = 'block';
        
        // Tutup dock setelah memilih (opsional, biar bersih)
        // toggleMenuDock(); 

        // Load data jika perlu
        if(folderName) loadNotes(folderName);
    }

    // --- Fungsi Utility ---
    function showToast(m) { const t = document.getElementById("toastNotif"); t.textContent = m; t.style.display = "block"; setTimeout(() => t.style.display = "none", 2500); }
    
    // --- Fungsi Data (Simulasi) ---
    function loadNotes(f) { document.getElementById('notesList').innerHTML = "<p style='text-align:center'>Data "+f+"</p>"; }
    function hitungBonusEvent() { showToast("Menghitung..."); }
    function copySemuaData() { showToast("Disalin!"); }
    function prosesData_TRYCARI() { showToast("Analisis selesai"); }
    function sendMessage() { const i=document.getElementById('chatInput'); if(i.value) { const h=document.getElementById('chatHistory'); h.innerHTML+="<div style='margin-bottom:5px; color:#6c5ce7;'>Me: "+i.value+"</div>"; i.value=""; } }
    function toggleStickyPanel() { const p=document.getElementById('stickyPanel'); p.style.display = p.style.display==='block'?'none':'block'; }
    function addSticky() { const v=document.getElementById('stickyInput').value; if(v){ const d=document.createElement('div'); d.innerText=v; d.style.cssText="background:#222; padding:10px; margin-top:5px; border-radius:8px;"; document.getElementById('stickyList').prepend(d); document.getElementById('stickyInput').value=""; } }
    function switchBonusMode(m) { document.getElementById('modeBonusAsli').style.display='none'; document.getElementById('modeInputScatter').style.display='none'; document.getElementById('mode'+m.charAt(0).toUpperCase()+m.slice(1)).style.display='block'; }
    function hideLightbox(){ document.getElementById('lightbox').style.display='none'; }
    function updateNominalTogel() { showToast("Nominal disimpan"); }
    function setTextColor(c) { document.body.style.color = c; }

    // Init
    document.addEventListener('DOMContentLoaded', () => {
        handleTab('KENDALA ALL', null, 'catatanTab');
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --void: #06080f;
  --base: #0b0f1a;
  --surface: #10162a;
  --surface-up: #151d36;
  --elevated: #1a2444;

  --aurora-1: #00e6a0;
  --aurora-2: #00c9db;
  --aurora-3: #7c6aff;
  --aurora-4: #ff6b8a;
  --aurora-5: #ffb347;

  --accent: #00e6a0;
  --accent-soft: rgba(0, 230, 160, 0.12);
  --accent-mid: rgba(0, 230, 160, 0.25);
  --accent-glow: rgba(0, 230, 160, 0.4);

  --teal: #00c9db;
  --teal-soft: rgba(0, 201, 219, 0.1);

  --violet: #7c6aff;
  --violet-soft: rgba(124, 106, 255, 0.1);

  --rose: #ff6b8a;
  --rose-soft: rgba(255, 107, 138, 0.1);

  --gold: #ffb347;
  --gold-soft: rgba(255, 179, 71, 0.1);

  --fg: #e8edf8;
  --fg-mid: #94a3c4;
  --fg-dim: #506080;
  --fg-ghost: #2a3654;

  --border: rgba(255,255,255,0.05);
  --border-chrome: rgba(255,255,255,0.08);
  --border-active: rgba(0,230,160,0.25);

  --glass-bg: rgba(11,15,26,0.72);
  --glass-bg-up: rgba(16,22,42,0.65);
  --glass-blur: 24px;

  --radius-s: 10px;
  --radius-m: 16px;
  --radius-l: 22px;
  --radius-xl: 28px;

  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur: 0.3s;
  --dur-long: 0.5s;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--void);
  color:var(--fg);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

/* =============== AURORA BACKGROUND =============== */
.aurora{
  position:fixed;inset:0;z-index:-6;
  background:
    radial-gradient(ellipse 120% 80% at 10% 0%, rgba(0,230,160,0.07), transparent 50%),
    radial-gradient(ellipse 100% 70% at 90% 5%, rgba(124,106,255,0.06), transparent 45%),
    radial-gradient(ellipse 90% 60% at 50% 100%, rgba(0,201,219,0.05), transparent 50%),
    radial-gradient(ellipse 80% 50% at 70% 60%, rgba(255,107,138,0.03), transparent 40%),
    linear-gradient(180deg, #06080f 0%, #0b0f1a 35%, #0d1220 65%, #06080f 100%);
  animation:auroraShift 30s ease-in-out infinite alternate;
}
@keyframes auroraShift{
  0%{filter:hue-rotate(0deg) saturate(1)}
  33%{filter:hue-rotate(8deg) saturate(1.05)}
  66%{filter:hue-rotate(-5deg) saturate(0.97)}
  100%{filter:hue-rotate(3deg) saturate(1.02)}
}

/* =============== AURORA FLOW BANDS =============== */
.aurora-flow{
  position:fixed;inset:0;z-index:-5;pointer-events:none;overflow:hidden;
}
.flow-band{
  position:absolute;width:200%;height:300px;opacity:0.04;
  filter:blur(80px);border-radius:50%;
  animation:flowDrift linear infinite;
}
.flow-band:nth-child(1){
  background:linear-gradient(90deg,transparent,var(--aurora-1),var(--aurora-2),transparent);
  top:-5%;left:-50%;animation-duration:35s;
}
.flow-band:nth-child(2){
  background:linear-gradient(90deg,transparent,var(--aurora-3),var(--aurora-4),transparent);
  top:30%;left:-50%;animation-duration:42s;animation-delay:-15s;opacity:0.03;
}
.flow-band:nth-child(3){
  background:linear-gradient(90deg,transparent,var(--aurora-5),var(--aurora-1),transparent);
  top:65%;left:-50%;animation-duration:38s;animation-delay:-25s;opacity:0.035;
}
@keyframes flowDrift{
  0%{transform:translateX(-30%) rotate(-3deg)}
  100%{transform:translateX(20%) rotate(3deg)}
}

/* =============== DIAMOND MESH =============== */
.diamond-mesh{
  position:fixed;inset:0;z-index:-4;pointer-events:none;
  opacity:0.03;
  background-image:
    linear-gradient(45deg, rgba(255,255,255,0.15) 1px, transparent 1px),
    linear-gradient(-45deg, rgba(255,255,255,0.15) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image:radial-gradient(ellipse 65% 65% at 50% 50%, black 5%, transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse 65% 65% at 50% 50%, black 5%, transparent 70%);
  animation:meshRotate 120s linear infinite;
}
@keyframes meshRotate{
  0%{transform:rotate(0deg) scale(1)}
  50%{transform:rotate(180deg) scale(1.05)}
  100%{transform:rotate(360deg) scale(1)}
}

/* =============== FLOATING ORBS =============== */
.orb-layer{position:fixed;inset:0;z-index:-3;pointer-events:none}
.float-orb{
  position:absolute;border-radius:50%;filter:blur(100px);
  animation:orbWander ease-in-out infinite alternate;
}
.fo-1{width:500px;height:500px;background:var(--aurora-1);top:-20%;left:-10%;opacity:0.05;animation-duration:50s}
.fo-2{width:380px;height:380px;background:var(--aurora-3);bottom:-15%;right:-8%;opacity:0.045;animation-duration:60s;animation-delay:-20s}
.fo-3{width:280px;height:280px;background:var(--aurora-2);top:45%;left:55%;opacity:0.035;animation-duration:45s;animation-delay:-30s}
@keyframes orbWander{
  0%{transform:translate(0,0) scale(1)}
  25%{transform:translate(18px,-12px) scale(1.02)}
  50%{transform:translate(-10px,20px) scale(0.98)}
  75%{transform:translate(14px,8px) scale(1.01)}
  100%{transform:translate(-6px,-14px) scale(0.99)}
}

/* =============== PARTICLES =============== */
.particle-box{position:fixed;inset:0;z-index:-2;pointer-events:none;overflow:hidden}
.mote{
  position:absolute;border-radius:50%;opacity:0;
  animation:moteFloat linear infinite;
}
.mote-a{width:2px;height:2px;background:var(--aurora-1);box-shadow:0 0 8px var(--accent-glow)}
.mote-b{width:1.5px;height:1.5px;background:var(--aurora-2);box-shadow:0 0 6px rgba(0,201,219,0.4)}
.mote-c{width:2.5px;height:2.5px;background:var(--aurora-3);box-shadow:0 0 8px rgba(124,106,255,0.4)}
.mote-d{width:1.8px;height:1.8px;background:var(--aurora-5);box-shadow:0 0 6px rgba(255,179,71,0.4)}
@keyframes moteFloat{
  0%{transform:translateY(108vh) scale(0);opacity:0}
  8%{opacity:0.75;transform:translateY(94vh) scale(1)}
  50%{transform:translateY(48vh) translateX(8px) scale(0.7)}
  90%{opacity:0.5}
  100%{transform:translateY(-10vh) translateX(-4px) scale(0.2);opacity:0}
}

/* =============== NOISE =============== */
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0.015;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* =============== MAIN WRAP =============== */
.main-wrap{position:relative;z-index:10;max-width:1420px;margin:0 auto;padding:16px}

/* =============== HEADER =============== */
.header-block{
  text-align:center;padding:32px 0 24px;
  animation:heroIn 0.8s var(--ease-out) backwards;
}
@keyframes heroIn{
  from{opacity:0;transform:translateY(-28px) scale(0.96);filter:blur(6px)}
  to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}

.hero-title{
  font-family:'Sora',sans-serif;
  font-size:clamp(1.8rem,5.2vw,3.2rem);
  font-weight:800;
  letter-spacing:-0.5px;
  background:linear-gradient(135deg,#fff 0%,var(--aurora-1) 25%,var(--aurora-2) 50%,var(--aurora-3) 75%,#fff 100%);
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:titleFlow 8s ease-in-out infinite;
  position:relative;
}
@keyframes titleFlow{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}
.hero-title::after{
  content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  width:0;height:2px;border-radius:2px;
  background:linear-gradient(90deg,var(--aurora-1),var(--aurora-2),var(--aurora-3),var(--aurora-4));
  animation:divGrow 1s 0.5s var(--ease-out) forwards;
  box-shadow:0 0 12px rgba(0,230,160,0.2),0 0 24px rgba(0,201,219,0.1);
}
@keyframes divGrow{to{width:180px}}

.hero-sub{
  margin-top:12px;
  font-family:'Sora',sans-serif;
  font-size:0.76rem;
  font-weight:500;
  color:var(--fg-dim);
  letter-spacing:5px;
  text-transform:uppercase;
}

/* =============== TABS =============== */
.tab-bar{
  display:flex;justify-content:center;gap:4px;
  margin:8px auto 24px;
  background:var(--glass-bg);
  border:1px solid var(--border);
  border-radius:var(--radius-m);
  padding:5px;
  max-width:fit-content;
  backdrop-filter:blur(var(--glass-blur));
  -webkit-backdrop-filter:blur(var(--glass-blur));
  position:relative;
}
.tab-bar::before{
  content:'';position:absolute;inset:-1px;border-radius:var(--radius-m);padding:1px;
  background:linear-gradient(135deg,rgba(0,230,160,0.15),transparent 40%,transparent 60%,rgba(124,106,255,0.12));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask-composite:exclude;pointer-events:none;
}

.tab-item{
  position:relative;z-index:1;
  padding:12px 32px;
  font-family:'Sora',sans-serif;
  font-weight:600;
  font-size:0.86rem;
  color:var(--fg-dim);
  background:transparent;
  border:1px solid transparent;
  border-radius:var(--radius-s);
  cursor:pointer;
  transition:all var(--dur) var(--ease);
  letter-spacing:0.3px;
}
.tab-item:hover{color:var(--fg-mid)}
.tab-item.active{
  color:#fff;
  background:linear-gradient(135deg,rgba(0,230,160,0.12),rgba(0,201,219,0.08));
  border-color:var(--border-active);
  box-shadow:0 0 20px rgba(0,230,160,0.08),inset 0 1px 0 rgba(255,255,255,0.04);
}
.tab-item.active::after{
  content:'';position:absolute;bottom:-1px;left:25%;right:25%;height:2px;
  background:linear-gradient(90deg,var(--aurora-1),var(--aurora-2));
  border-radius:2px;box-shadow:0 0 10px rgba(0,230,160,0.3);
}

/* =============== PRISM PANEL =============== */
.prism-panel{
  position:relative;
  border-radius:var(--radius-xl);
  padding:22px;
  backdrop-filter:blur(var(--glass-blur));
  -webkit-backdrop-filter:blur(var(--glass-blur));
  background:var(--glass-bg);
  border:1px solid var(--border);
  overflow:hidden;
}
.prism-panel::before{
  content:'';position:absolute;inset:-1px;border-radius:var(--radius-xl);padding:1px;
  background:linear-gradient(
    135deg,
    rgba(0,230,160,0.2) 0%,
    rgba(0,201,219,0.12) 25%,
    transparent 40%,
    transparent 60%,
    rgba(124,106,255,0.12) 75%,
    rgba(255,107,138,0.15) 100%
  );
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask-composite:exclude;pointer-events:none;
  animation:prismRotate 12s linear infinite;
  background-size:200% 200%;
}
@keyframes prismRotate{
  0%{background-position:0% 0%}
  50%{background-position:100% 100%}
  100%{background-position:0% 0%}
}
.prism-panel::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,230,160,0.2),rgba(0,201,219,0.15),rgba(124,106,255,0.15),transparent);
}

/* =============== CONTROL STRIP =============== */
.ctrl-strip{
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  padding:14px 18px;
  background:var(--glass-bg-up);
  border:1px solid var(--border);
  border-radius:var(--radius-m);
  margin-bottom:22px;
  position:relative;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.ctrl-strip::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--aurora-1),var(--aurora-2),var(--aurora-3));
  border-radius:0 2px 2px 0;
  box-shadow:0 0 10px rgba(0,230,160,0.2);
}

.ctrl-pair{display:flex;align-items:center;gap:8px}
.ctrl-tag{
  font-family:'Sora',sans-serif;font-size:0.72rem;font-weight:600;
  color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;
}
.field-glass{
  padding:9px 14px;
  background:rgba(6,8,15,0.7);
  border:1px solid var(--border-chrome);
  border-radius:var(--radius-s);
  color:var(--fg);
  font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;
  width:165px;
  transition:all var(--dur) var(--ease);
}
.field-glass:focus{
  outline:none;
  border-color:var(--border-active);
  box-shadow:0 0 0 3px var(--accent-soft),0 0 16px rgba(0,230,160,0.08);
  background:rgba(4,6,12,0.85);
}

/* =============== BUTTONS =============== */
.btn-aurora{
  position:relative;overflow:hidden;
  padding:9px 22px;
  background:linear-gradient(135deg,var(--aurora-1),#00b888);
  border:none;
  border-radius:var(--radius-s);
  color:var(--void);
  font-family:'Sora',sans-serif;
  font-weight:700;font-size:0.78rem;
  cursor:pointer;
  transition:all var(--dur) var(--ease);
  white-space:nowrap;text-transform:uppercase;letter-spacing:1.2px;
}
.btn-aurora .ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.3);
  transform:scale(0);animation:rippleOut 0.6s ease-out;
  pointer-events:none;
}
@keyframes rippleOut{to{transform:scale(4);opacity:0}}
.btn-aurora:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 20px rgba(0,230,160,0.3),0 0 40px rgba(0,230,160,0.08);
}
.btn-aurora:active{transform:translateY(0) scale(0.97)}
.btn-aurora:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none}

.status-live{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Sora',sans-serif;font-size:0.72rem;font-weight:600;
  color:var(--aurora-1);padding:3px 12px;
  background:var(--accent-soft);border:1px solid rgba(0,230,160,0.12);
  border-radius:100px;
}
.status-live::before{
  content:'';width:5px;height:5px;background:var(--aurora-1);
  border-radius:50%;box-shadow:0 0 6px var(--accent-glow);
  animation:livePulse 1.5s ease-in-out infinite;
}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.7)}}

/* =============== BENTO GRID =============== */
.aurora-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}

/* =============== AURORA CARD =============== */
.aurora-card{
  position:relative;
  background:var(--glass-bg-up);
  border:1px solid var(--border);
  border-radius:var(--radius-l);
  overflow:hidden;
  display:flex;flex-direction:column;
  transition:all var(--dur) var(--ease);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.aurora-card::before{
  content:'';position:absolute;inset:-1px;border-radius:var(--radius-l);padding:1px;
  background:linear-gradient(160deg,rgba(0,230,160,0.12),transparent 30%,transparent 70%,rgba(124,106,255,0.1));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask-composite:exclude;pointer-events:none;
  opacity:0;transition:opacity var(--dur);
}
.aurora-card:hover{
  border-color:rgba(0,230,160,0.12);
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(0,0,0,0.25),0 0 0 1px rgba(0,230,160,0.08);
}
.aurora-card:hover::before{opacity:1}

.card-top{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;
  background:linear-gradient(90deg,var(--accent-soft),transparent 60%);
  border-bottom:1px solid var(--border);
}
.card-heading{
  font-family:'Sora',sans-serif;font-weight:700;font-size:0.9rem;
  color:var(--accent);letter-spacing:0.2px;
}
.card-num{
  font-family:'Sora',sans-serif;font-size:0.66rem;font-weight:700;
  padding:3px 10px;border-radius:100px;
  background:var(--accent-soft);color:var(--accent);
  border:1px solid rgba(0,230,160,0.1);
}

.card-search{padding:8px 14px;border-bottom:1px solid var(--border)}
.search-glass{
  width:100%;padding:9px 12px 9px 38px;
  background:rgba(6,8,15,0.65);border:1px solid var(--border-chrome);
  border-radius:var(--radius-s);color:var(--fg);
  font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;
  transition:all var(--dur) var(--ease);
  background-image:url("data:image/svg+xml,%3Csvg width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='%23506080' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cline x1='21' y1='21' x2='16.65' y2='16.65'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:12px center;
}
.search-glass:focus{outline:none;border-color:var(--border-active);box-shadow:0 0 0 3px var(--accent-soft)}
.search-glass::placeholder{color:var(--fg-ghost)}

.card-body{padding:8px;overflow-y:auto;max-height:410px;flex-grow:1}

/* =============== SKELETON =============== */
.skeleton{position:relative;overflow:hidden;background:var(--glass-bg-up);border-radius:var(--radius-s)}
.skeleton::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.03),transparent);
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.sk-line{height:14px;margin:8px 12px;border-radius:6px}
.sk-line.short{width:60%}
.sk-line.med{width:80%}
.sk-line.long{width:95%}

/* =============== DATA ROW =============== */
.data-row{
  position:relative;overflow:hidden;
  padding:13px 16px;margin-bottom:7px;
  background:linear-gradient(135deg,rgba(11,15,26,0.7),rgba(16,22,42,0.5));
  border:1px solid var(--border);
  border-radius:var(--radius-m);
  cursor:pointer;
  transition:all var(--dur) var(--ease);
}
.data-row::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:0;
  background:linear-gradient(180deg,var(--aurora-1),var(--aurora-2));
  box-shadow:4px 0 12px rgba(0,230,160,0.15);
  transition:width var(--dur) var(--ease);
}
.data-row:hover::before{width:3px}
.data-row:hover{
  border-color:rgba(0,230,160,0.12);
  background:linear-gradient(135deg,rgba(14,20,38,0.8),rgba(20,28,52,0.6));
  transform:translateX(3px);
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
}
.data-row:active{transform:translateX(3px) scale(0.997)}

.dr-tag{
  font-size:0.58rem;font-weight:700;color:var(--fg-ghost);
  text-transform:uppercase;letter-spacing:2.5px;margin-bottom:2px;
}
.dr-title{
  font-family:'Sora',sans-serif;font-weight:600;color:var(--accent);
  font-size:0.9rem;margin-bottom:3px;
}
.dr-hint{
  font-size:0.56rem;font-weight:700;color:var(--fg-ghost);
  text-transform:uppercase;letter-spacing:2px;margin-bottom:3px;
  opacity:0;transition:opacity var(--dur);
}
.data-row:hover .dr-hint{opacity:1}
.dr-text{
  font-size:0.82rem;color:var(--fg-mid);line-height:1.5;
  white-space:pre-wrap;word-break:break-word;
}

/* =============== PASARAN CARD =============== */
.pasaran-wrap{
  position:relative;
  background:var(--glass-bg-up);
  border:1px solid var(--border);
  border-radius:var(--radius-l);
  overflow:hidden;margin-bottom:12px;
  transition:all var(--dur) var(--ease);
}
.pasaran-wrap::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,107,138,0.2),rgba(255,179,71,0.15),transparent);
}
.pasaran-wrap:hover{
  border-color:rgba(255,107,138,0.12);
  box-shadow:0 8px 28px rgba(0,0,0,0.15);
}
.pasaran-head{
  padding:13px 18px;
  background:linear-gradient(90deg,var(--rose-soft),transparent 60%);
  border-bottom:1px solid var(--border);
}
.pasaran-name{
  font-family:'Sora',sans-serif;font-weight:700;font-size:0.88rem;
  color:var(--rose);letter-spacing:0.2px;
}
.pasaran-list{padding:6px 12px;max-height:340px;overflow-y:auto}

.bet-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px;margin-bottom:5px;
  background:rgba(6,8,15,0.5);
  border:1px solid var(--border);
  border-radius:var(--radius-s);
  cursor:pointer;
  transition:all var(--dur) var(--ease);
}
.bet-item:hover{
  border-color:rgba(0,230,160,0.12);
  background:rgba(11,15,26,0.65);
  transform:translateX(4px);
  box-shadow:0 2px 12px rgba(0,0,0,0.12);
}
.bet-type{color:var(--fg-mid);font-size:0.82rem;font-weight:600;flex:1;margin-right:10px}
.bet-val{
  font-family:'Sora',sans-serif;font-weight:700;font-size:0.78rem;
  color:var(--accent);padding:4px 12px;
  background:var(--accent-soft);border:1px solid rgba(0,230,160,0.1);
  border-radius:8px;transition:all var(--dur) var(--ease);
}
.bet-item:hover .bet-val{
  background:rgba(0,230,160,0.16);
  box-shadow:0 0 14px rgba(0,230,160,0.12);
  border-color:rgba(0,230,160,0.2);
}

/* =============== SELECTOR ZONE =============== */
.selector-zone{
  position:relative;
  background:var(--glass-bg-up);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:24px;margin:22px 0;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  overflow:hidden;
}
.selector-zone::before{
  content:'';position:absolute;inset:-1px;border-radius:var(--radius-xl);padding:1px;
  background:linear-gradient(135deg,rgba(0,230,160,0.15),transparent 35%,transparent 65%,rgba(124,106,255,0.12));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask-composite:exclude;pointer-events:none;
}
.selector-zone::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,179,71,0.15),transparent);
}

.sel-header{
  display:flex;align-items:center;gap:12px;
  padding-bottom:16px;margin-bottom:20px;
  border-bottom:1px solid var(--border);
}
.sel-icon{
  font-size:1.4rem;
  animation:selFloat 3.5s ease-in-out infinite;
  filter:drop-shadow(0 0 8px rgba(0,230,160,0.25));
}
@keyframes selFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-4px) rotate(4deg)}}
.sel-title{
  font-family:'Sora',sans-serif;font-weight:700;font-size:1.05rem;
  color:var(--fg);letter-spacing:0.3px;
}

/* =============== PILL CHIPS =============== */
.pill-group{margin-bottom:20px}
.pill-heading{
  font-family:'Sora',sans-serif;font-size:0.72rem;font-weight:600;
  color:var(--fg-mid);margin-bottom:10px;
  display:flex;align-items:center;gap:10px;
  letter-spacing:0.5px;text-transform:uppercase;
}
.pill-heading::before{
  content:'';width:3px;height:16px;border-radius:2px;
  background:linear-gradient(180deg,var(--aurora-1),var(--aurora-2));
  box-shadow:0 0 8px rgba(0,230,160,0.2);
}
.pill-tray{display:flex;flex-wrap:wrap;gap:7px}

.aurora-pill{
  position:relative;overflow:hidden;
  padding:8px 18px;
  background:rgba(6,8,15,0.7);
  border:1px solid var(--border-chrome);
  border-radius:100px;
  color:var(--fg-dim);
  font-family:'DM Sans',sans-serif;font-size:0.84rem;font-weight:600;
  cursor:pointer;transition:all var(--dur) var(--ease);
  letter-spacing:0.2px;
}
.aurora-pill:hover{
  color:var(--fg-mid);border-color:rgba(255,255,255,0.1);
  background:rgba(11,15,26,0.8);
}
.aurora-pill.lit{
  color:var(--void);
  background:linear-gradient(135deg,var(--aurora-1),var(--aurora-2));
  border-color:var(--aurora-1);
  font-weight:700;
  box-shadow:0 2px 16px rgba(0,230,160,0.25);
}
.aurora-pill.lit::after{
  content:'✓';position:absolute;right:9px;top:50%;
  transform:translateY(-50%);font-size:0.65rem;font-weight:900;
  color:var(--void);animation:pillPop 0.3s var(--ease-spring);
}
@keyframes pillPop{0%{transform:translateY(-50%) scale(0)}65%{transform:translateY(-50%) scale(1.3)}100%{transform:translateY(-50%) scale(1)}}

/* =============== FIRE BUTTON =============== */
.fire-btn{
  width:100%;position:relative;overflow:hidden;
  padding:15px 28px;
  background:linear-gradient(135deg,var(--aurora-1),var(--aurora-2),#00a0b0);
  border:none;border-radius:var(--radius-m);
  color:var(--void);
  font-family:'Sora',sans-serif;font-weight:700;font-size:0.92rem;
  cursor:pointer;transition:all var(--dur) var(--ease);
  text-transform:uppercase;letter-spacing:2px;
}
.fire-btn .ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.25);
  transform:scale(0);animation:rippleOut 0.6s ease-out;
  pointer-events:none;
}
.fire-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 6px 28px rgba(0,230,160,0.3),0 0 50px rgba(0,201,219,0.08);
}
.fire-btn:active{transform:translateY(0) scale(0.97)}

/* =============== RESULT DISPLAY =============== */
.result-box{
  margin-top:20px;padding:18px 22px;
  background:rgba(6,8,15,0.8);
  border:1px solid var(--border-chrome);
  border-radius:var(--radius-m);
  font-family:'Sora',sans-serif;font-size:1.08rem;font-weight:700;
  color:var(--accent);text-align:center;
  min-height:58px;display:flex;align-items:center;justify-content:center;
  transition:all var(--dur) var(--ease);cursor:pointer;
  position:relative;overflow:hidden;
}
.result-box::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--accent-soft),var(--teal-soft));
  opacity:0;transition:opacity var(--dur);
}
.result-box:hover{
  border-color:var(--border-active);
  box-shadow:0 0 24px rgba(0,230,160,0.08);
}
.result-box:hover::before{opacity:1}
.result-box.copied{
  animation:resFlash 0.4s var(--ease-spring);
  border-color:var(--gold);
  box-shadow:0 0 24px var(--gold-soft);
}
@keyframes resFlash{0%{transform:scale(1)}40%{transform:scale(1.012);background:var(--gold-soft)}100%{transform:scale(1)}}

/* =============== TOAST =============== */
.toast-msg{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(90px) scale(0.9);
  background:var(--elevated);color:var(--fg);
  padding:14px 32px;border-radius:100px;
  font-family:'Sora',sans-serif;font-weight:600;font-size:0.86rem;
  opacity:0;transition:all 0.45s var(--ease-spring);
  z-index:10001;
  border:1px solid var(--border-chrome);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 12px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(0,230,160,0.06);
  white-space:nowrap;max-width:92vw;
  overflow:hidden;text-overflow:ellipsis;
}
.toast-msg.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}

/* =============== AUTO BADGE =============== */
.auto-tag{
  position:fixed;top:16px;right:16px;
  background:var(--elevated);border:1px solid var(--border-chrome);
  border-radius:100px;padding:7px 16px;

  box-shadow:0 4px 16px rgba(0,0,0,0.25);
  animation:tagPulse 1.2s ease-in-out infinite;
}
.auto-tag.on{display:flex}
@keyframes tagPulse{0%,100%{opacity:0.7}50%{opacity:1}}

/* =============== SPINNER =============== */
.spin-ring{
  width:32px;height:32px;
  border:2.5px solid var(--border-chrome);
  border-top-color:var(--accent);border-right-color:var(--aurora-2);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  box-shadow:0 0 12px var(--accent-soft);
}
@keyframes spin{to{transform:rotate(360deg)}}

/* =============== EMPTY STATE =============== */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 16px;color:var(--fg-ghost);font-size:0.86rem;text-align:center;
}
.empty-ico{font-size:2.4rem;margin-bottom:10px;opacity:0.35}

/* =============== SCROLLBAR =============== */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{
  background:linear-gradient(180deg,rgba(0,230,160,0.3),rgba(0,201,219,0.4));
  border-radius:10px;
}
::-webkit-scrollbar-thumb:hover{
  background:linear-gradient(180deg,rgba(0,230,160,0.5),rgba(0,201,219,0.6));
}

/* =============== RESPONSIVE =============== */
@media(max-width:1024px){.aurora-grid{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
  .aurora-grid{grid-template-columns:1fr}
  .ctrl-strip{flex-direction:column;align-items:stretch}
  .ctrl-pair{width:100%;justify-content:space-between}
  .field-glass{width:100%}
  .tab-item{padding:11px 22px;font-size:0.82rem}

/* =============== ACCESSIBILITY =============== */
::selection{background:rgba(0,230,160,0.2);color:#fff}
button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px;box-shadow:0 0 0 4px var(--accent-soft)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
</style>

<body>

<div class="aurora"></div>
<div class="aurora-flow">
  <div class="flow-band"></div>

<script>
/* ============ KONFIGURASI ============ */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4'
};

const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'),
  autoBadge: $('autoBadge'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};

let selectedTipe = '', selectedLabel = '';

/* ============ RIPPLE EFFECT ============ */
function createRipple(e, btn) {
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 2;
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
}

// Attach ripple ke semua buttons
document.addEventListener('click', e => {
  const btn = e.target.closest('.btn-aurora, .fire-btn');
  if (btn) createRipple(e, btn);
});

/* ============ PARTICLES ============ */
function createParticles() {
  const box = $('particles');
  if (!box) return;
  const cls = ['mote-a', 'mote-b', 'mote-c', 'mote-d'];
  for (let i = 0; i < 40; i++) {
    const m = document.createElement('div');
    m.className = 'mote ' + cls[i % 4];
    m.style.left = (Math.random() * 100) + '%';
    m.style.animationDelay = (Math.random() * 40) + 's';
    m.style.animationDuration = (32 + Math.random() * 20) + 's';
    box.appendChild(m);
  }
}

/* ============ TOAST ============ */
function showToast(msg) {
  dom.toast.textContent = msg;
  dom.toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => dom.toast.classList.remove('show'), 3000);
}

function showAutoBadge() {
  if (!dom.autoBadge) return;
  dom.autoBadge.classList.add('on');
  clearTimeout(showAutoBadge._t);
  showAutoBadge._t = setTimeout(() => dom.autoBadge.classList.remove('on'), 2000);
}

/* ============ COPY ============ */
function copyText(text, el) {
  let decoded = text;
  try { decoded = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(decoded).then(() => {
    const preview = decoded.length > 28 ? decoded.substring(0, 28) + '...' : decoded;
    showToast('📋 Disalin: ' + preview);
    if (el) {
      el.classList.add('copied');
      setTimeout(() => el.classList.remove('copied'), 400);
    }
  }).catch(() => showToast('❌ Gagal menyalin'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

/* ============ CSV PARSER ============ */
function parseCSV(text) {
  const result = [];
  let row = [], entry = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], nx = text[i + 1];
    if (!inQ) {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(entry); entry = ''; }
      else if (c === '\r' && nx === '\n') { row.push(entry); result.push(row); row = []; entry = ''; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); result.push(row); row = []; entry = ''; }
      else entry += c;
    } else {
      if (c === '"' && nx === '"') { entry += '"'; i++; }
      else if (c === '"') inQ = false;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); result.push(row); }
  return result;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ''; }

/* ============ SHEET UPDATE ============ */
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try {
    const res = await fetch(SCRIPT_URL + '?' + new URLSearchParams({ action, value }).toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error('Fetch Error:', e); return false; }
}

/* ============ FETCH PREDIKSI ============ */
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];

    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = dom.inTgl.value;
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    renderPrediksi();
  } catch(e) {
    console.error('Error Prediksi:', e);
    dom.listP.innerHTML = '<div class="empty"><span class="empty-ico">⚠️</span>Gagal memuat data</div>';
  }
}

/* ============ FETCH HITUNG ============ */
async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = '💰 Rp ' + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 },
      { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 },
      { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 },
      { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 },
      { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    state.hitung = secDef.map(s => {
      const title = safeGet(data[s.tRow], s.tCol) || 'PASARAN';
      const items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), val = safeGet(data[i], 24);
          if (type || val) items.push({ type, res: val });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) {
    console.error('Error Hitung:', e);
    dom.contH.innerHTML = '<div class="empty"><span class="empty-ico">⚠️</span>Gagal memuat data</div>';
  }
}

/* ============ RENDER ============ */
function renderList(container, items, search) {
  const q = search.toLowerCase();
  const filtered = items.filter(i => i.content.toLowerCase().includes(q));
  if (!filtered.length) {
    container.innerHTML = '<div class="empty"><span class="empty-ico">📭</span>Tidak ada data ditemukan</div>';
    return;
  }
  container.innerHTML = filtered.map((v, idx) => `
    <div class="data-row" onclick="copyText('${encodeURIComponent(v.content)}', this)" role="button" tabindex="0" aria-label="Salin ${v.title}" style="animation:rowIn 0.35s ${idx * 0.04}s var(--ease-out) backwards">
      <div class="dr-tag">Judul</div>
      <div class="dr-title">${v.title}</div>
      <div class="dr-hint">▸ Klik untuk salin</div>
      <div class="dr-text">${v.content}</div>
    </div>
  `).join('');
}

/* Row entrance animation */
const rowStyle = document.createElement('style');
rowStyle.textContent = `@keyframes rowIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}`;
document.head.appendChild(rowStyle);

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) {
    dom.contH.innerHTML = '<div class="empty"><span class="empty-ico">📭</span>Tidak ada data</div>';
    return;
  }
  dom.contH.innerHTML = state.hitung.map((s, idx) => `
    <div class="pasaran-wrap" style="animation:rowIn 0.4s ${idx * 0.06}s var(--ease-out) backwards">
      <div class="pasaran-head"><h3 class="pasaran-name">🎯 ${s.title}</h3></div>
      <div class="pasaran-list">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}', this)" role="button" tabindex="0" aria-label="Salin ${it.type}">
            <span class="bet-type">${it.type}</span>
            <span class="bet-val">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

/* ============ CHIP SELECTOR ============ */
function renderChips(container, items, type) {
  container.innerHTML = '<div class="aurora-pill" data-value="">Semua</div>' +
    items.map(it => {
      const label = it.label || it;
      const display = label.length > 24 ? label.substring(0, 24) + '...' : label;
      return `<div class="aurora-pill" data-value="${label}">${display}</div>`;
    }).join('');
  container.querySelectorAll('.aurora-pill').forEach(pill => {
    pill.onclick = () => {
      container.querySelectorAll('.aurora-pill').forEach(p => p.classList.remove('lit'));
      pill.classList.add('lit');
      if (type === 'tipe') {
        selectedTipe = pill.dataset.value;
        updateLabelChips();
      } else {
        selectedLabel = pill.dataset.value;
      }
    };
  });
}

function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) {
    renderChips(dom.chipLabel, [], 'label');
    return;
  }
  renderChips(dom.chipLabel, state.kelompok[selectedTipe].map(i => ({ label: i.label })), 'label');
}

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = '💰 Rp ' + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: 'SEMUA PASARAN' },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: 'TOTO MACAU 4D' },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: 'TOTO MACAU 5D' },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: 'KINGKONG 4D' },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: 'BONUS' },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: 'JAKARTA' },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: 'TOTOMALI' },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: 'HOKIDRAW' },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: 'SYDNEY & HK' }
    ];
    state.kelompok = {};
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || '-', value: value || '-' });
        }
      }
      if (items.length > 0) state.kelompok[sec.title] = items;
    });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error('Error loadHitungData:', e); }
}

function tampilkanValueHitungan(btn) {
  const box = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    box.innerHTML = '<span style="color:var(--fg-dim);font-weight:400;font-size:0.88rem">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    box.innerHTML = `<span>${item.value}</span>`;
    box.onclick = () => copyText(item.value, box);
  } else {
    box.innerHTML = '<span style="color:var(--fg-dim);font-weight:400;font-size:0.88rem">Data tidak ditemukan</span>';
  }
}

/* ============ AUTO-UPDATE ============ */
let autoTimeout = null;

function autoUpdateTanggal() {
  showAutoBadge();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateTanggal, 1200);
}

function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast('⚠️ Pilih tanggal terlebih dahulu');
  const p = dom.inTgl.value.split('-');
  const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true;
  dom.statTgl.textContent = '⏳...';
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = '✅ OK';
      showToast('✅ Tanggal tersimpan!');
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else {
      dom.statTgl.textContent = '❌ Gagal';
      showToast('❌ Cek URL Script');
    }
  });
}

function autoUpdateNominal() {
  showAutoBadge();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateNominal, 1200);
}

function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast('⚠️ Isi nominal terlebih dahulu');
  dom.btnNom.disabled = true;
  dom.statNom.textContent = '⏳...';
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = '💰 Rp ' + formatNum(dom.inNom.value);
      showToast('✅ Nominal tersimpan!');
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else {
      dom.statNom.textContent = '❌ Gagal';
      showToast('❌ Cek URL Script');
    }
  });
}

/* ============ INIT ============ */
function init() {
  document.querySelectorAll('.tab-item').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-item').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-selected', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-selected', 'true');
      const isPrediksi = btn.dataset.tab === 'prediksi';
      dom.tabP.style.display = isPrediksi ? 'block' : 'none';
      dom.tabH.style.display = isPrediksi ? 'none' : 'block';
    };
  });

  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (e.target.classList.contains('data-row') || e.target.classList.contains('bet-item')) e.target.click();
    }
  });

  fetchPrediksi();
  fetchHitung();
  loadHitungData();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  init();
  setTimeout(() => showToast('✨ Quantum Aurora Active'), 1200);
});
</script>
</body>
</html>

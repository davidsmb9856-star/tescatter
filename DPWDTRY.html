<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE TOGEL NEON SYSTEM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;600;800&family=Orbitron:wght@500&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       1. SETUP DASAR & TEMA
       ========================================= */
    :root {
      --neon-cyan: #00f3ff;
      --neon-pink: #ff00cc;
      --neon-green: #39ff14;
      --neon-yellow: #ffd000;
      --bg-dark: #050505;
      --panel-bg: rgba(10, 10, 10, 0.95);
      --text-main: #00ffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-dark);
      font-family: 'Exo 2', sans-serif;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* =========================================
       2. NAVIGASI ARCADE GRID
       ========================================= */
    .arcade-menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      padding: 10px;
      width: 100%;
      max-width: 900px;
      margin-top: 10px;
    }

    .neon-button {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 12px 6px;
      border-radius: 8px;
      background: rgba(20, 20, 20, 0.6);
      border: 2px solid #333;
      color: #555;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 800;
      font-size: 9px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
      overflow: hidden;
    }

    .neon-button i { font-size: 18px; transition: all 0.2s; }
    .neon-button:hover { background: rgba(50, 50, 50, 0.8); border-color: #555; color: #ddd; transform: translateY(-2px); }

    /* Active State Variations */
    .neon-button.active { background: #222; color: var(--neon-yellow); border-color: var(--neon-yellow); box-shadow: 0 0 10px var(--neon-yellow); }
    .neon-button.active i { color: var(--neon-yellow); }
    
    .pink-glow.active { color: var(--neon-pink); border-color: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }
    .pink-glow.active i { color: var(--neon-pink); }
    
    .green-glow.active { color: var(--neon-green); border-color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
    .green-glow.active i { color: var(--neon-green); }
    
    .blue-glow.active { color: var(--neon-cyan); border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }
    .blue-glow.active i { color: var(--neon-cyan); }

    /* =========================================
       3. KONTEN & ELEMEN UMUM
       ========================================= */
    .tab-content {
      display: none;
      width: 100%;
      max-width: 900px;
      padding: 15px;
      background: var(--panel-bg);
      border: 1px solid #333;
      border-radius: 12px;
      margin: 0 10px 20px 10px;
    }
    
    .tab-content h3 { margin-top: 0; margin-bottom: 15px; text-align: center; text-shadow: 0 0 10px currentColor; }
    .tab-content textarea, .tab-content input, .tab-content select {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid #444;
      color: #fff;
      padding: 10px;
      border-radius: 6px;
      font-family: 'Exo 2', sans-serif;
      margin-bottom: 10px;
    }
    .tab-content input:focus, .tab-content textarea:focus { border-color: var(--neon-cyan); outline: none; }
    .tab-content button { cursor: pointer; font-family: 'Exo 2', sans-serif; transition: 0.2s; }
    
    .judul-glow { color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }

    /* Sticky Note FAB */
    #stickyFab { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--neon-cyan); color: #000; border-radius: 50%; text-align: center; line-height: 50px; font-size: 24px; cursor: pointer; box-shadow: 0 0 15px var(--neon-cyan); z-index: 999; }
    #stickyPanel { display: none; position: fixed; bottom: 80px; right: 20px; width: 300px; background: rgba(10,10,10,0.95); border: 1px solid var(--neon-cyan); padding: 15px; border-radius: 8px; z-index: 999; }

    /* Toast */
    #toastNotif { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--neon-cyan); color: #000; padding: 8px 20px; border-radius: 20px; font-weight: bold; display: none; z-index: 10001; }

    /* Modal Umum */
    .modal, #lightbox, #zoomModal, #scanScatter2Modal, #bonusZoomModal { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0,0,0,0.95); z-index: 10000; display: none; justify-content: center; align-items: center; flex-direction: column; }
  </style>
</head>
<body>

  <!-- ================= NAVIGASI UTAMA ================= -->
  <div class="arcade-menu-grid" id="mainMenuGrid">
    <button class="neon-button active pink-glow" onclick="handleTab('KENDALA ALL', this, 'catatanTab')"><i class="fas fa-headset"></i><span>KENDALA</span></button>
    <button class="neon-button" onclick="handleTab('FOTO', this, 'catatanTab')"><i class="fas fa-camera"></i><span>FOTO</span></button>
    <button class="neon-button" onclick="handleTab('CARA BERMAIN', this, 'catatanTab')"><i class="fas fa-book-open"></i><span>MAIN</span></button>
    <button class="neon-button green-glow" onclick="handleTab(null, this, 'tryCariTab')"><i class="fas fa-search"></i><span>TRY CARI</span></button>
    <button class="neon-button" onclick="handleTab(null, this, 'prediksiGabungTab')"><i class="fas fa-bullseye"></i><span>PREDIKSI</span></button>
    <button class="neon-button" onclick="handleTab(null, this, 'cekBonusEventTab')"><i class="fas fa-gem"></i><span>BONUS</span></button>
    <button class="neon-button" onclick="handleTab(null, this, 'cekhadiahTab')"><i class="fas fa-medal"></i><span>HADIAH</span></button>
    <button class="neon-button blue-glow" onclick="handleTab(null, this, 'reportLineTab')"><i class="fas fa-file-alt"></i><span>REPORT</span></button>
    <button class="neon-button pink-glow" onclick="handleTab(null, this, 'tanyaZTab')"><i class="fas fa-robot"></i><span>AI Z</span></button>
    <button class="neon-button green-glow" onclick="handleTab(null, this, 'pengaturanTab')"><span class="quantum-icon">⚙️</span><span>SETTING</span></button>
  </div>

  <!-- ================= KONTEN TAB ================= -->

  <!-- 1. TAB AI Z -->
  <div id="tanyaZTab" class="tab-content">
    <h3 class="judul-glow">🤖 TANYA Z (AI)</h3>
    <div id="chatHistory" class="chat-container" style="min-height:300px; background:rgba(0,0,0,0.2); border-radius:8px; padding:10px; margin-bottom:10px; overflow-y:auto;"></div>
    <div style="display:flex; gap:10px;">
      <div id="chatInput" contenteditable="true" style="flex:1; background:#111; border:1px solid #333; padding:10px; border-radius:8px; color:#fff;" placeholder="Ketik pesan..."></div>
      <button id="sendButton" onclick="sendMessage()" class="neon-button" style="padding:0 20px;">SEND</button>
    </div>
  </div>

  <!-- 2. TAB CATATAN -->
  <div id="catatanTab" class="tab-content" style="display:block;">
    <h3 id="judulCatatan" class="judul-glow">💫 KENDALA ALL</h3>
    <div class="search-bar" style="margin-bottom:15px;"><input type="text" id="searchInput" placeholder="🔍 Cari..." oninput="searchNotes()" /></div>
    <div id="notesList"><p style="text-align:center;">Memuat data...</p></div>
  </div>

  <!-- 3. TAB PREDIKSI -->
  <div id="prediksiGabungTab" class="tab-content">
    <h3 class="judul-glow">🎯 PREDIKSI & HITUNG</h3>
    <div style="display:flex; gap:10px; margin-bottom:15px;">
      <input type="text" id="membacaIsiFoto_input" placeholder="Link Gambar OCR..." style="flex:1;">
      <button onclick="membacaIsiFoto_prosesLink()" style="background:#333; border:1px solid #00f3ff; color:#fff; padding:0 15px;">SCAN</button>
    </div>
    <hr style="border-color:#333; margin:15px 0;">
    <h4>🧮 Hitung Togel</h4>
    <div style="display:flex; gap:10px;">
      <input type="number" id="nominalInput" placeholder="Nominal" style="flex:1;">
      <button onclick="updateNominalTogel()" style="background:#333; border:1px solid #00f3ff; color:#fff; padding:0 15px;">SET</button>
    </div>
    <div style="display:flex; gap:10px; margin-top:10px;">
      <select id="kelompokDropdown" style="flex:1;" onchange="isiDropdownLabel()"><option>Tipe Hitung</option></select>
      <select id="labelDropdown" style="flex:1;" onchange="tampilkanValueHitungan()"><option>Label</option></select>
    </div>
    <div id="detailHitunganDropdown" style="margin-top:10px; padding:10px; background:#111; border-radius:6px; border:1px solid #39ff14; color:#39ff14;">...</div>
    <hr style="border-color:#333; margin:15px 0;">
    <h4>🌠 Jadwal & Prediksi</h4>
    <div style="display:flex; gap:10px; align-items:center;">
       <input type="date" id="tanggalPasaran" style="flex:1;">
       <button onclick="simpanTanggalPasaran()" style="background:#003; color:#fff; border:1px solid #00f3ff; padding:5px 10px;">SAVE</button>
    </div>
    <input type="text" id="searchPasaran" placeholder="Cari pasaran..." style="margin-top:10px;" oninput="searchDropdowns()">
    <div style="display:flex; gap:10px; margin-top:15px;">
       <div style="flex:1;"><label>Prediksi</label><select id="dropdownPrediksi" style="width:100%;" onchange="showDetailWithAnimation('prediksi')"></select><div id="detailPrediksi" style="font-size:11px; margin-top:5px; color:#aaa;"></div></div>
       <div style="flex:1;"><label>Jadwal</label><select id="dropdownJadwal" style="width:100%;" onchange="showDetailWithAnimation('jadwal')"></select><div id="detailJadwal" style="font-size:11px; margin-top:5px; color:#aaa;"></div></div>
    </div>
  </div>

  <!-- 4. TAB BONUS EVENT -->
  <div id="cekBonusEventTab" class="tab-content">
    <h3 class="judul-glow">💎 BONUS EVENT</h3>
    <div style="display:flex; gap:5px; justify-content:center; margin-bottom:15px;">
      <button class="neon-button active" id="btn-bonusAsli" onclick="switchBonusMode('bonusAsli')" style="padding:8px 12px; font-size:10px;">ASLI</button>
      <button class="neon-button" id="btn-galeri" onclick="switchBonusMode('galeri')" style="padding:8px 12px; font-size:10px;">GALERI</button>
      <button class="neon-button" id="btn-inputScatter" onclick="switchBonusMode('inputScatter')" style="padding:8px 12px; font-size:10px;">SCATTER</button>
    </div>
    
    <!-- Mode Asli -->
    <div id="modeBonusAsli" class="bonus-mode">
      <textarea id="bonusTextarea" rows="4" placeholder="Tempel data transaksi..."></textarea>
      <div style="display:flex; gap:10px;"><input type="text" id="bonusPatokan" placeholder="Patokan"><input type="text" id="bonusSurplus" placeholder="Surplus"></div>
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="hitungBonusEvent()" style="flex:1; background:#00f3ff; color:#000; font-weight:bold; padding:10px; border:none;">HITUNG</button>
        <button onclick="hapusBonusEvent()" style="flex:1; background:#ff0066; color:#fff; font-weight:bold; padding:10px; border:none;">HAPUS</button>
      </div>
      <div id="bonusHasil" style="margin-top:15px; font-weight:bold; text-align:center;"></div>
    </div>

    <!-- Mode Galeri -->
    <div id="modeGaleri" class="bonus-mode" style="display:none;">
      <textarea id="bonusLinkInput" rows="2" placeholder="Tempel link gambar..."></textarea>
      <div style="margin-top:10px; color:#555; text-align:center;">Paket: <span id="bonusCurrentPackageNum">0</span> / <span id="bonusMaxPackageNum">0</span></div>
      <div id="bonusGalleryContainer" style="display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-top:10px;"></div>
    </div>

    <!-- Mode Scatter -->
    <div id="modeInputScatter" class="bonus-mode" style="display:none;">
      <div style="display:flex; gap:10px;">
        <div style="flex:1; background:rgba(0,10,20,0.5); padding:10px; border-radius:8px;">
          <h4 style="color:#00f3ff; margin-bottom:5px;">DATA 1</h4>
          <input type="text" id="bonusUserid1" placeholder="UID" style="margin-bottom:5px;">
          <input type="text" id="bonusScatter1_1" placeholder="S1" style="margin-bottom:5px;">
          <input type="text" id="bonusScatter2_1" placeholder="S2" style="margin-bottom:5px;">
          <input type="text" id="bonusScatter3_1" placeholder="S3" style="margin-bottom:5px;">
          <input type="text" id="bonusRekening1" placeholder="Rek" style="margin-bottom:5px;">
          <input type="text" id="bonusKodeTransaksi1" placeholder="Kode">
        </div>
        <div style="flex:1; background:rgba(0,10,20,0.5); padding:10px; border-radius:8px;">
          <h4 style="color:#00f3ff; margin-bottom:5px;">DATA 2</h4>
          <input type="text" id="bonusUserid2" placeholder="UID" style="margin-bottom:5px;">
          <input type="text" id="bonusScatter1_2" placeholder="S1" style="margin-bottom:5px;">
          <input type="text" id="bonusScatter2_2" placeholder="S2" style="margin-bottom:5px;">
          <input type="text" id="bonusScatter3_2" placeholder="S3" style="margin-bottom:5px;">
          <input type="text" id="bonusRekening2" placeholder="Rek" style="margin-bottom:5px;">
          <input type="text" id="bonusKodeTransaksi2" placeholder="Kode">
        </div>
      </div>
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="copySemuaData()" style="flex:1; cursor:pointer;">COPY ALL</button>
        <button onclick="hapusSemuaData()" style="flex:1; cursor:pointer; background:#300; border:none;">CLEAR</button>
      </div>
    </div>
  </div>

  <!-- 5. TAB HADIAH -->
  <div id="cekhadiahTab" class="tab-content"><h3>💎 HADIAH TOGEL</h3><div id="hadiahContainer">Memuat...</div></div>

  <!-- 6. TAB REPORT -->
  <div id="reportLineTab" class="tab-content">
    <h3 class="judul-glow">📝 REPORT LINE</h3>
    <input type="text" id="reportSearch" placeholder="Cari laporan..." oninput="searchReportLine()" style="margin-bottom:10px;">
    <button onclick="addNewReportRow()" style="width:100%; background:#222; border:1px solid #00f3ff; color:#fff; padding:8px; margin-bottom:10px;">➕ TAMBAH BARIS</button>
    <div id="reportLineCardContainer">Memuat report...</div>
  </div>

  <!-- 7. TAB TRY CARI -->
  <div id="tryCariTab" class="tab-content">
    <h3 class="judul-glow">🔍 TRY CARI & ANALISIS</h3>
    <div style="display:flex; gap:5px; justify-content:center; margin-bottom:15px;">
      <button class="neon-button active" style="padding:8px 10px; font-size:10px;" onclick="switchSubMode(this, 'sub-tryCari')">MANUAL</button>
      <button class="neon-button" style="padding:8px 10px; font-size:10px;" onclick="switchSubMode(this, 'sub-depoWd')">DEPO WD</button>
      <button class="neon-button" style="padding:8px 10px; font-size:10px;" onclick="switchSubMode(this, 'sub-extract')">EXTRACT</button>
    </div>
    
    <div id="sub-tryCari" class="sub-content">
      <div style="display:flex; gap:10px;"><textarea id="dataDocs" rows="3" placeholder="Data DOCS..." style="flex:1;"></textarea><textarea id="dataAdmin" rows="3" placeholder="Data ADMIN..." style="flex:1;"></textarea></div>
      <button onclick="prosesData_TRYCARI()" style="width:100%; margin-top:10px; background:#00f3ff; color:#000; padding:10px; font-weight:bold; border:none;">BANDINGKAN</button>
      <div id="hasil_TRYCARI" style="margin-top:15px;"></div>
    </div>
    
    <div id="sub-depoWd" class="sub-content" style="display:none;">
      <textarea id="dataDeposit" rows="3" placeholder="Data Deposit..."></textarea>
      <textarea id="dataWithdraw" rows="3" placeholder="Data Withdraw..."></textarea>
      <button onclick="prosesDepositWithdraw()" style="width:100%; margin-top:10px; background:#39ff14; color:#000; padding:10px; font-weight:bold; border:none;">PROSES</button>
      <div id="hasilDepoWd" style="margin-top:15px;"></div>
    </div>
    
    <div id="sub-extract" class="sub-content" style="display:none;">
      <textarea id="bulkExtractInput" rows="3" placeholder="Tempel data..."></textarea>
      <div style="display:flex; gap:5px; margin-top:10px;">
        <button onclick="processBulkExtract()" style="flex:1;">PROSES</button>
        <button onclick="copyBulkExtracted()" style="flex:1;">COPY</button>
      </div>
      <div id="bulkResultsContainer" style="margin-top:10px;"></div>
    </div>
  </div>

  <!-- 8. TAB PENGATURAN -->
  <div id="pengaturanTab" class="tab-content">
    <h3>⚙️ PENGATURAN</h3>
    <div style="padding:10px; border:1px solid #333; border-radius:8px; margin-bottom:15px;">
      <h4 style="color:#00f3ff; margin-bottom:10px;">Tema Background</h4>
      <label style="display:block; margin:5px 0;"><input type="radio" name="bgTheme" value="bg-default" onchange="setBgTheme('bg-default')"> Dark</label>
      <label style="display:block; margin:5px 0;"><input type="radio" name="bgTheme" value="bg-gradient" onchange="setBgTheme('bg-gradient')"> Gradient</label>
    </div>
    <div style="padding:10px; border:1px solid #333; border-radius:8px;">
      <h4 style="color:#00f3ff; margin-bottom:10px;">Warna Teks</h4>
      <label style="display:block; margin:5px 0;"><input type="radio" name="textColor" value="#00ffff" onchange="setTextColor('#00ffff')"> Cyan</label>
      <label style="display:block; margin:5px 0;"><input type="radio" name="textColor" value="#ff00cc" onchange="setTextColor('#ff00cc')"> Pink</label>
      <label style="display:block; margin:5px 0;"><input type="radio" name="textColor" value="#39ff14" onchange="setTextColor('#39ff14')"> Green</label>
    </div>
    <div id="contentPengaturan"></div>
  </div>

  <!-- ================= MODAL & FLOATING ================= -->
  <div id="lightbox" onclick="hideLightbox()" style="cursor:pointer;"><img id="lightboxImg" src="" style="max-width:90%; max-height:90%; border-radius:8px;"></div>
  <div id="stickyFab" onclick="toggleStickyPanel()">💀</div>
  <div id="stickyPanel"><textarea id="stickyInput" placeholder="Sticky note..." style="height:60px;"></textarea><button onclick="addSticky()" style="width:100%; margin-top:5px; background:#00f3ff; color:#000; border:none; padding:5px;">TAMBAH</button><div id="stickyList" style="margin-top:10px; max-height:150px; overflow-y:auto;"></div></div>
  <div id="toastNotif">Notif</div>

  <!-- ================= JAVASCRIPT LENGKAP ================= -->
  <script>
    // ============================================================
    // === 1. VARIABEL GLOBAL & KONFIGURASI ===
    // ============================================================
    let currentFolder = 'KENDALA ALL';
    let allNotes = [];
    let lightboxImages = [];
    let conversationHistory = [];
    const MAX_HISTORY = 10;
    // Variabel lain dari script Anda
    let kelompokData = {}; let allPasaranList = []; let lastPrediksiIndex = ""; let lastJadwalIndex = "";

    // ============================================================
    // === 2. FUNGSI NAVIGASI UTAMA ===
    // ============================================================
    function handleTab(folderName, buttonElement, tabId) {
      // 1. Set Tombol Aktif
      const buttons = document.querySelectorAll('.arcade-menu-grid .neon-button');
      buttons.forEach(btn => btn.classList.remove('active'));
      if (buttonElement) buttonElement.classList.add('active');
      
      // 2. Tampilkan Tab
      showTab(tabId);
      
      // 3. Load Data Jika Diperlukan
      if (folderName && tabId === 'catatanTab') loadNotes(folderName);
      if (tabId === 'reportLineTab') loadReportLineData();
      if (tabId === 'cekhadiahTab') loadHadiahTogel();
      if (tabId === 'prediksiGabungTab') { loadPasaranTogel(); loadCaraHitungTogel(); }
      if (tabId === 'pengaturanTab') openPengaturan();
    }

    function showTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
      const el = document.getElementById(tabId);
      if (el) el.style.display = 'block';
    }

    function switchSubMode(btn, targetId) {
        const parent = btn.closest('.tab-content');
        parent.querySelectorAll('.neon-button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        parent.querySelectorAll('.sub-content').forEach(c => c.style.display = 'none');
        document.getElementById(targetId).style.display = 'block';
    }
    
    function switchBonusMode(mode) {
        ['modeBonusAsli', 'modeGaleri', 'modeInputScatter'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).style.display = 'block';
        const btns = document.querySelectorAll('#cekBonusEventTab .neon-button'); btns.forEach(b=>b.classList.remove('active'));
        document.getElementById('btn-'+mode).classList.add('active');
    }

    // ============================================================
    // === 3. FUNGSI LOGIKA (CATATAN, BONUS, DLL) ===
    // ============================================================
    
    // --- Notifikasi & Utility ---
    function showToast(m) { const t = document.getElementById("toastNotif"); t.textContent = m; t.style.display = "block"; setTimeout(() => t.style.display = "none", 2500); }
    function copyToClipboard(t, l="Teks") { navigator.clipboard.writeText(t).then(() => showToast("✅ " + l + " disalin!")).catch(() => showToast("❌ Gagal")); }

    // --- Catatan & Foto ---
    function loadNotes(folder) {
        currentFolder = folder;
        const list = document.getElementById('notesList');
        const judul = document.getElementById('judulCatatan');
        if(judul) judul.innerText = "💫 " + folder + " 💫";
        if(list) list.innerHTML = "<p style='text-align:center'>Memuat...</p>";
        
        if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(renderNotes).withFailureHandler(e => list.innerHTML = "<p style='color:red'>Error: "+e.message+"</p>").getNotes(folder);
        } else {
            // Simulasi
            setTimeout(() => {
                renderNotes([
                    {title: "Contoh Data 1", content: "Isi konten contoh."},
                    {title: "Link Penting", content: "https://google.com"}
                ]);
            }, 500);
        }
    }
    
    function renderNotes(notes) {
        const c = document.getElementById('notesList'); c.innerHTML = '';
        if (!notes || notes.length === 0) { c.innerHTML = "<p style='text-align:center'>Kosong</p>"; return; }
        
        if(currentFolder === "FOTO") {
            notes.forEach(n => {
                const d = document.createElement('div');
                d.style.cssText = "display:inline-block; width:48%; margin:1%; background:#222; padding:5px; border-radius:8px; vertical-align:top;";
                d.innerHTML = `<img src="${n.content}" style="width:100%; border-radius:6px; cursor:pointer;" onclick="showLightbox('${n.content}')"><p style="font-size:11px; color:#00f3ff; margin:5px 0;">${n.title}</p>`;
                c.appendChild(d);
            });
        } else {
            notes.forEach(n => {
                const d = document.createElement('div');
                d.style.cssText = "background:rgba(0,20,40,0.5); border:1px solid #333; padding:12px; margin-bottom:8px; border-radius:6px; cursor:pointer;";
                d.innerHTML = `<h4 style="margin:0 0 5px; color:#00f3ff;">${n.title}</h4><div style="font-size:11px; color:#aaa;">${(n.content||'').substring(0,100)}</div>`;
                d.onclick = () => alert(n.content + "\n" + (n.content2||''));
                c.appendChild(d);
            });
        }
    }

    // --- Lightbox ---
    function showLightbox(src) { document.getElementById('lightbox').style.display = 'flex'; document.getElementById('lightboxImg').src = src; }
    function hideLightbox() { document.getElementById('lightbox').style.display = 'none'; }

    // --- Bonus Event ---
    function hitungBonusEvent() {
        let total = 0;
        const lines = document.getElementById('bonusTextarea').value.split('\n');
        lines.forEach(l => { const m = l.match(/IDR\s([\d,]+)/i); if(m) total += parseInt(m[1].replace(/,/g,'')); });
        const patok = parseInt(document.getElementById('bonusPatokan').value.replace(/\D/g,'')) || 0;
        const surp = parseInt(document.getElementById('bonusSurplus').value.replace(/\D/g,'')) || 0;
        const selisih = total - patok - surp;
        document.getElementById('bonusHasil').innerHTML = `Total: ${total.toLocaleString('id-ID')}<br>Selisih: <span style="font-size:18px">${selisih.toLocaleString('id-ID')}</span>`;
    }
    function hapusBonusEvent() { document.getElementById('bonusTextarea').value = ''; document.getElementById('bonusPatokan').value = ''; document.getElementById('bonusSurplus').value = ''; document.getElementById('bonusHasil').innerHTML = ''; showToast("Dibersihkan"); }
    
    // --- Scatter ---
    function getData(idx) {
        const get = (id) => document.getElementById(id + idx)?.value.trim() || '';
        return `${get('bonusUserid')}\t${get('bonusScatter1')}\t${get('bonusScatter2')}\t${get('bonusScatter3')}\t${get('bonusRekening')}\t${get('bonusKodeTransaksi')}`;
    }
    function copySemuaData() { const t = getData(1) + "\n" + getData(2); copyToClipboard(t, "Semua Data"); }
    function hapusSemuaData() { ['bonusUserid', 'bonusScatter1', 'bonusScatter2', 'bonusScatter3', 'bonusRekening', 'bonusKodeTransaksi'].forEach(id => { for(let i=1;i<=2;i++) if(document.getElementById(id+i)) document.getElementById(id+i).value = ''; }); showToast("Dibersihkan"); }

    // --- Try Cari & Depo WD ---
    function prosesData_TRYCARI() {
        const docs = document.getElementById('dataDocs').value.split('\n').length;
        const admin = document.getElementById('dataAdmin').value.split('\n').length;
        document.getElementById('hasil_TRYCARI').innerHTML = `<div style="background:#112; padding:15px; border-radius:8px; border:1px solid #00f3ff;">Docs: ${docs} baris<br>Admin: ${admin} baris<br><span style="color:#39ff14">Analisis Simulasi Selesai.</span></div>`;
    }
    function prosesDepositWithdraw() {

    }
    function processBulkExtract() {
        const lines = document.getElementById('bulkExtractInput').value.split('\n');
        const c = document.getElementById('bulkResultsContainer'); c.innerHTML = '';
        lines.forEach(l => { if(l.trim()) { const d = document.createElement('div'); d.innerText = l; d.style.cssText = "background:#222; padding:5px; margin-bottom:2px; font-size:11px;"; c.appendChild(d); }});
    }
    function copyBulkExtracted() { copyToClipboard(document.getElementById('bulkExtractInput').value, "Data"); }

    // --- AI Z ---
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.innerText.trim();
        if(!msg) return;
        
        // Tampilkan pesan user
        const history = document.getElementById('chatHistory');
        const userDiv = document.createElement('div');
        userDiv.style.cssText = "text-align:right; margin:5px; color:#0ff;";
        userDiv.innerText = msg;
        history.appendChild(userDiv);
        input.innerText = '';
        
        // Simulasi Balasan AI
        setTimeout(() => {
            const aiDiv = document.createElement('div');
            aiDiv.style.cssText = "text-align:left; margin:5px; color:#fff; background:#222; padding:8px; border-radius:8px;";
            aiDiv.innerText = "Respon simulasi dari Z: " + msg;
            history.appendChild(aiDiv);
            history.scrollTop = history.scrollHeight;
        }, 1000);
    }

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡ ULTRA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          neon: { blue: '#00f5ff', cyan: '#00d9ff', electric: '#00a8ff', purple: '#7b61ff', pink: '#ff00aa' }
        }
      }
    }
  }
</script>
<style>
:root {
  /* === ULTRA DARK BASE === */
  --bg: #000008;
  --bg-gradient: radial-gradient(ellipse at center, #00051a 0%, #00010a 40%, #000008 100%);
  --bg-card: rgba(1, 4, 24, 0.94);
  --bg-card-hover: rgba(3, 8, 40, 0.98);
  --bg-panel: rgba(2, 6, 32, 0.90);
  
  /* === NEON PALETTE - ULTRA VIBRANT === */
  --neon-blue: #00f5ff;
  --neon-cyan: #00d9ff;
  --neon-electric: #00a8ff;
  --neon-purple: #7b61ff;
  --neon-pink: #ff00aa;
  --neon-gold: #ffd700;
  --neon-glow: rgba(0, 245, 255, 0.85);
  
  /* === TYPOGRAPHY === */
  --fg: #e6f4ff;
  --fg-bright: #ffffff;
  --fg-muted: #8ab4d6;
  --fg-dim: #5a7a9a;
  --text-xs: 0.7rem; --text-sm: 0.8rem; --text-base: 0.9rem;
  --text-lg: 1.05rem; --text-xl: 1.25rem; --text-2xl: 1.55rem; --text-3xl: 2.1rem;
  
  /* === SPACING === */
  --space-xxs: 3px; --space-xs: 6px; --space-sm: 10px; --space-md: 14px;
  --space-lg: 20px; --space-xl: 28px; --space-2xl: 38px;
  
  /* === ULTRA GLOW === */
  --glow-xs: 0 0 6px var(--neon-glow), 0 0 14px rgba(0,245,255,0.4);
  --glow-sm: 0 0 10px var(--neon-glow), 0 0 24px rgba(0,245,255,0.5), 0 0 42px rgba(0,217,255,0.3);
  --glow-md: 0 0 16px var(--neon-glow), 0 0 38px rgba(0,245,255,0.6), 0 0 72px rgba(0,217,255,0.4);
  --glow-lg: 0 0 24px var(--neon-glow), 0 0 56px rgba(0,245,255,0.7), 0 0 110px rgba(0,217,255,0.5);
  --glow-text: 0 0 12px var(--neon-blue), 0 0 28px rgba(0,245,255,0.65), 0 0 56px rgba(0,217,255,0.45);
  
  /* === BORDERS === */
  --border-glow: rgba(0,245,255,0.55);
  --border-soft: rgba(0,217,255,0.32);
  --border-hover: rgba(0,245,255,0.82);
  
  /* === ANIMATIONS === */
  --transition-fast: 0.15s cubic-bezier(0.4,0,0.2,1);
  --transition: 0.25s cubic-bezier(0.34,1.56,0.64,1);
  --transition-bloom: 0.45s cubic-bezier(0.175,0.885,0.32,1.275);
  --transition-elastic: 0.5s cubic-bezier(0.68,-0.55,0.265,1.55);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; scroll-padding-top: 20px; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg-gradient);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
  font-size: var(--text-base);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  cursor: default;
}

/* === CUSTOM CURSOR === */
.cursor-glow {
  position: fixed; width: 24px; height: 24px; border-radius: 50%;
  background: radial-gradient(circle, var(--neon-blue) 0%, transparent 70%);
  pointer-events: none; z-index: 9999; opacity: 0.6;
  transform: translate(-50%, -50%); transition: transform 0.1s ease, opacity 0.2s;
  filter: blur(2px); mix-blend-mode: screen;
}
.cursor-glow.active { width: 48px; height: 48px; opacity: 0.85; filter: blur(4px); }
.cursor-dot {
  position: fixed; width: 6px; height: 6px; border-radius: 50%;
  background: var(--fg-bright); pointer-events: none; z-index: 10000;
  transform: translate(-50%, -50%); transition: transform 0.05s ease;
  box-shadow: 0 0 8px var(--neon-blue), 0 0 16px var(--neon-cyan);
}

/* === CYBER BACKGROUND === */
.bg-cyber {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(ellipse at 15% 25%, rgba(0,245,255,0.15) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 20%, rgba(123,97,255,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 90%, rgba(0,217,255,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 10% 70%, rgba(255,0,170,0.1) 0%, transparent 55%),
    radial-gradient(ellipse at 90% 75%, rgba(0,245,255,0.13) 0%, transparent 55%),
    var(--bg-gradient);
  animation: bgPulse 70s ease-in-out infinite;
}
@keyframes bgPulse {
  0%,100% { filter: hue-rotate(0deg) brightness(1) saturate(1); }
  20% { filter: hue-rotate(10deg) brightness(1.04) saturate(1.05); }
  40% { filter: hue-rotate(-8deg) brightness(0.97) saturate(0.98); }
  60% { filter: hue-rotate(6deg) brightness(1.03) saturate(1.03); }
  80% { filter: hue-rotate(-4deg) brightness(0.99) saturate(1.02); }
}

/* === HEX GRID === */
.hex-grid {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    radial-gradient(rgba(0,245,255,0.06) 1px, transparent 1px),
    linear-gradient(30deg, rgba(0,217,255,0.03) 1px, transparent 1px),
    linear-gradient(150deg, rgba(0,217,255,0.03) 1px, transparent 1px);
  background-size: 36px 32px, 36px 32px, 36px 32px;
  animation: hexFlow 50s linear infinite;
  opacity: 0.65;
  mask-image: radial-gradient(ellipse at center, black 35%, transparent 80%);
}
@keyframes hexFlow { 0% { background-position: 0 0, 0 0, 0 0; } 100% { background-position: 36px 32px, -18px 16px, 18px -16px; } }

/* === DATA STREAM === */
.data-stream {
  position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden;
}
.stream-line {
  position: absolute; width: 1px; height: 120%;
  background: linear-gradient(180deg, transparent, var(--neon-blue), transparent);
  opacity: 0.12; animation: streamFall linear infinite;
  box-shadow: 0 0 8px var(--neon-blue), 0 0 20px rgba(0,245,255,0.4);
}
@keyframes streamFall {
  0% { transform: translateY(-120%) rotate(var(--rot)); opacity: 0; }
  10% { opacity: 0.15; }
  90% { opacity: 0.15; }
  100% { transform: translateY(0) rotate(var(--rot)); opacity: 0; }
}

/* === FLOATING ORBS === */
.orb {
  position: fixed; border-radius: 50%; filter: blur(110px); opacity: 0.14;
  animation: orbFloat 60s ease-in-out infinite alternate; z-index: -1;
  mix-blend-mode: screen;
}
.orb-1 { width: 920px; height: 920px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric)); top: -40%; left: -25%; }
.orb-2 { width: 680px; height: 680px; background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)); bottom: -35%; right: -22%; animation-delay: -30s; }
.orb-3 { width: 540px; height: 540px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue)); top: 50%; left: 60%; animation: orbFloat2 52s ease-in-out infinite alternate; animation-delay: -18s; }
@keyframes orbFloat {
  0% { transform: translate(0,0) scale(1); opacity: 0.14; }
  50% { transform: translate(42px,-32px) scale(1.12); opacity: 0.22; }
  100% { transform: translate(-28px,38px) scale(0.92); opacity: 0.16; }
}
@keyframes orbFloat2 {
  0% { transform: translate(0,0) scale(1); opacity: 0.12; }
  50% { transform: translate(-35px,28px) scale(1.08); opacity: 0.19; }
  100% { transform: translate(22px,-24px) scale(0.94); opacity: 0.14; }
}

/* === PARTICLES === */
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
.particle {
  position: absolute; width: 2px; height: 2px; border-radius: 50%;
  background: var(--neon-blue); opacity: 0;
  animation: particleFloat 40s infinite ease-in-out;
  box-shadow: 0 0 10px var(--neon-blue), 0 0 28px var(--neon-cyan), 0 0 52px var(--neon-glow);
}
.particle:nth-child(2n) { background: var(--neon-cyan); animation-delay: -16s; width: 1.5px; height: 1.5px; }
.particle:nth-child(3n) { background: var(--neon-purple); animation-delay: -28s; width: 2.5px; height: 2.5px; }
.particle:nth-child(5n) { background: var(--neon-pink); animation-delay: -10s; width: 1px; height: 1px; }
.particle:nth-child(7n) { background: var(--neon-gold); animation-delay: -22s; width: 2px; height: 2px; }
@keyframes particleFloat {
  0%,100% { transform: translateY(120vh) rotate(0deg) scale(0.7); opacity: 0; }
  12% { opacity: 0.95; }
  88% { opacity: 0.95; }
  100% { transform: translateY(-25vh) rotate(820deg) scale(1.3); opacity: 0; }
}

/* === CRT SCANLINE OVERLAY === */
.scanline-overlay {
  position: fixed; inset: 0; z-index: 999; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 1px, transparent 2px);
  opacity: 0.04; animation: scanMove 0.15s linear infinite;
}
@keyframes scanMove { 0% { background-position: 0 0; } 100% { background-position: 0 2px; } }

/* === CONTAINER === */
.main-container { position: relative; z-index: 10; max-width: 1480px; margin: 0 auto; padding: 18px; }

/* === HEADER === */
.header-section { text-align: center; padding: 32px 0 24px; animation: headerEnter 0.8s var(--transition-bloom) backwards; }
@keyframes headerEnter { from { opacity: 0; transform: translateY(-28px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

.main-title {
  font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 7vw, var(--text-3xl));
  font-weight: 900; letter-spacing: 4px;
  background: linear-gradient(135deg, var(--fg-bright) 0%, var(--neon-blue) 20%, var(--neon-cyan) 40%, var(--neon-purple) 60%, var(--neon-pink) 80%, var(--neon-gold) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--glow-text);
  animation: titleShimmer 3s ease-in-out infinite, titleGlow 2.4s ease-in-out infinite alternate, titleFloat 6s ease-in-out infinite;
  position: relative; display: inline-block; line-height: 1.15;
}
@keyframes titleShimmer { 0%,100% { filter: brightness(1) saturate(1); } 50% { filter: brightness(1.35) saturate(1.2); } }
@keyframes titleGlow {
  0% { text-shadow: var(--glow-text); }
  100% { text-shadow: 0 0 18px var(--neon-blue), 0 0 42px rgba(0,245,255,0.8), 0 0 78px rgba(0,217,255,0.6), 0 0 120px rgba(123,97,255,0.45), 0 0 160px rgba(255,0,170,0.3); }
}
@keyframes titleFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

.main-title::before {
  content: ''; position: absolute; inset: -4px; border-radius: 12px;
  background: linear-gradient(135deg, transparent 20%, var(--neon-blue) 45%, var(--neon-cyan) 55%, transparent 80%);
  filter: blur(18px); opacity: 0.25; animation: titleGlowBG 3s ease-in-out infinite; z-index: -1;
}
@keyframes titleGlowBG { 0%,100% { opacity: 0.2; } 50% { opacity: 0.4; } }

.main-title::after {
  content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
  width: 90%; height: 2.5px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-purple), var(--neon-pink), transparent);
  animation: linePulse 2.4s ease-in-out infinite; border-radius: 2px;
  box-shadow: 0 0 16px var(--neon-blue), 0 0 38px var(--neon-cyan);
}
@keyframes linePulse { 0%,100% { opacity: 0.75; transform: translateX(-50%) scaleX(1); } 50% { opacity: 1; transform: translateX(-50%) scaleX(1.04); } }

/* === TABS === */
.tabs-container {
  display: flex; justify-content: center; gap: 7px; margin: 14px 0 22px;
  background: rgba(2,7,34,0.72); border: 1px solid var(--border-soft);
  border-radius: 20px; padding: 6px; max-width: fit-content; margin-inline: auto;
  backdrop-filter: blur(24px); box-shadow: var(--glow-sm), inset 0 1px 0 rgba(255,255,255,0.1);
}
.tab-chip {
  padding: 13px 32px; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: var(--text-sm);
  color: var(--fg-muted); background: transparent; border: none; border-radius: 16px;
  cursor: pointer; transition: all var(--transition); position: relative;
  text-transform: uppercase; letter-spacing: 1.4px; overflow: hidden; line-height: 1;
}
.tab-chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 16px; padding: 1px;
  background: linear-gradient(135deg, transparent, var(--neon-blue), var(--neon-cyan), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--transition);
}
.tab-chip::after {
  content: ''; position: absolute; inset: 0; border-radius: 16px;
  background: linear-gradient(135deg, rgba(0,245,255,0.18), rgba(123,97,255,0.12));
  opacity: 0; transition: opacity var(--transition);
}
.tab-chip:hover { color: var(--neon-blue); transform: translateY(-2px); }
.tab-chip:hover::before { opacity: 1; }
.tab-chip:hover::after { opacity: 1; }
.tab-chip.active {
  color: var(--fg-bright); background: linear-gradient(135deg, rgba(0,245,255,0.28), rgba(123,97,255,0.22));
  border: 1px solid var(--border-hover); box-shadow: var(--glow-md); text-shadow: 0 0 10px var(--neon-blue);
}
.tab-chip.active::after { opacity: 1; animation: chipGlow 2.2s ease-in-out infinite; }
@keyframes chipGlow { 0%,100% { opacity: 1; } 50% { opacity: 0.88; } }
.tab-chip.active::before {
  content: ''; position: absolute; bottom: -1px; left: 22%; right: 22%; height: 2.5px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), transparent);
  border-radius: 2px; box-shadow: var(--glow-sm); animation: activeLine 2.4s ease-in-out infinite;
}
@keyframes activeLine { 0%,100% { opacity: 0.85; } 50% { opacity: 1; transform: scaleX(1.08); } }

/* === CONTENT BOX - ULTRA GLASS === */
.content-box {
  background: var(--bg-card); border: 1px solid var(--border-soft);
  border-radius: 26px; padding: var(--space-xl); backdrop-filter: blur(28px);
  position: relative; overflow: hidden;
  box-shadow: var(--glow-md), inset 0 1px 0 rgba(255,255,255,0.08), 0 20px 60px rgba(0,0,0,0.4);
  animation: cardEnter 0.6s var(--transition-bloom) backwards;
}
@keyframes cardEnter { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.content-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-purple), var(--neon-pink), transparent);
  animation: scanLine 3.5s linear infinite; opacity: 0.92; box-shadow: 0 0 16px var(--neon-blue);
}
@keyframes scanLine { 0% { background-position: -250% 0; } 100% { background-position: 250% 0; } }
.content-box::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at top, rgba(0,245,255,0.06) 0%, transparent 65%);
  pointer-events: none;
}

/* === SETTINGS PANEL === */
.settings-panel {
  background: linear-gradient(135deg, rgba(3,9,42,0.82), rgba(7,15,52,0.72));
  border: 1px solid var(--border-soft); border-radius: 22px;
  padding: var(--space-md) var(--space-lg); margin-bottom: var(--space-xl);
  display: flex; flex-wrap: nowrap; gap: var(--space-md); align-items: center;
  backdrop-filter: blur(18px); box-shadow: var(--glow-sm);
  transition: all var(--transition);
}
.settings-panel:hover { border-color: var(--border-hover); box-shadow: var(--glow-md); }
.setting-item { display: flex; align-items: center; gap: var(--space-xs); white-space: nowrap; }
.setting-label {
  color: var(--neon-blue); font-size: var(--text-sm); font-weight: 700;
  text-shadow: 0 0 10px rgba(0,245,255,0.6); display: flex; align-items: center; gap: 5px;
}
.input-neon {
  padding: 11px 16px; background: rgba(4,10,36,0.86);
  border: 1px solid rgba(0,245,255,0.42); border-radius: 14px;
  color: var(--fg-bright); font-size: var(--text-base); width: 170px;
  transition: all var(--transition); font-family: 'Space Grotesk', sans-serif;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
}
.input-neon::placeholder { color: var(--fg-muted); opacity: 0.78; }
.input-neon:focus {
  outline: none; border-color: var(--neon-blue);
  box-shadow: var(--glow-md), inset 0 0 0 1.5px rgba(0,245,255,0.35);
  background: rgba(7,14,44,0.94); transform: translateY(-1.5px);
}

/* === BUTTONS - ULTRA NEON === */
.btn-neon {
  padding: 11px 24px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric));
  border: none; border-radius: 16px; color: #000410;
  font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: var(--text-sm);
  cursor: pointer; transition: all var(--transition);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1.3px;
  position: relative; overflow: hidden; box-shadow: var(--glow-md);
  text-shadow: 0 1px 0 rgba(255,255,255,0.35);
}
.btn-neon::before {
  content: ''; position: absolute; inset: 0; border-radius: 16px; padding: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity 0.18s;
}
.btn-neon::after {
  content: ''; position: absolute; inset: 0; border-radius: 16px;
  background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent 55%);
  opacity: 0; transition: opacity var(--transition);
}
.btn-neon:hover::before { opacity: 1; }
.btn-neon:hover::after { opacity: 1; }
.btn-neon:hover {
  transform: translateY(-3px) scale(1.03); box-shadow: var(--glow-lg);
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
}
.btn-neon:active { transform: translateY(0) scale(0.97); transition-duration: 0.07s; }
.btn-neon:disabled { opacity: 0.48; cursor: not-allowed; transform: none; box-shadow: none; filter: grayscale(0.35); }

.status-badge {
  font-size: var(--text-sm); color: #00ffd5; margin-left: 9px; font-weight: 700;
  text-shadow: 0 0 12px rgba(0,255,213,0.65); animation: blink 2s ease-in-out infinite;
  display: inline-flex; align-items: center; gap: 5px;
}
@keyframes blink { 0%,100% { opacity: 1; text-shadow: 0 0 12px rgba(0,255,213,0.65); } 50% { opacity: 0.82; text-shadow: 0 0 18px rgba(0,255,213,0.9); } }

/* === DATA GRID === */
.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: var(--space-lg); }

/* === SECTION BOX === */
.section-box {
  background: linear-gradient(145deg, rgba(4,11,42,0.86), rgba(9,18,56,0.76));
  border: 1px solid var(--border-soft); border-radius: 22px;
  overflow: hidden; display: flex; flex-direction: column;
  transition: all var(--transition); backdrop-filter: blur(14px);
  box-shadow: var(--glow-sm);
}
.section-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-md); transform: translateY(-3px); }
.section-header {
  background: linear-gradient(90deg, rgba(0,245,255,0.15), transparent 75%);
  padding: var(--space-sm) var(--space-md); border-bottom: 1px solid var(--border-soft);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-blue);
  font-size: var(--text-base); text-shadow: 0 0 12px rgba(0,245,255,0.6);
  display: flex; align-items: center; gap: 7px;
}
.badge-count {
  background: rgba(0,245,255,0.22); color: var(--neon-blue);
  padding: 4px 12px; border-radius: 20px; font-size: var(--text-xs); font-weight: 800;
  border: 1px solid rgba(0,245,255,0.48);
  box-shadow: 0 0 10px rgba(0,245,255,0.35); animation: badgePulse 2.3s ease-in-out infinite;
}
@keyframes badgePulse { 0%,100% { box-shadow: 0 0 10px rgba(0,245,255,0.35); } 50% { box-shadow: 0 0 18px rgba(0,245,255,0.6); } }

.search-box { padding: var(--space-sm) var(--space-md); border-bottom: 1px solid var(--border-soft); }
.search-input {
  width: 100%; padding: 10px 14px; background: rgba(5,12,40,0.78);
  border: 1px solid rgba(0,245,255,0.38); border-radius: 14px;
  color: var(--fg-bright); font-size: var(--text-sm); transition: all var(--transition);
}
.search-input:focus { outline: none; border-color: var(--neon-blue); box-shadow: var(--glow-md); background: rgba(8,16,48,0.9); }
.search-input::placeholder { color: var(--fg-muted); opacity: 0.78; }
.section-content { padding: var(--space-xs); overflow-y: auto; max-height: 420px; flex-grow: 1; }

/* === ITEM CARD - ULTRA === */
.item-card {
  background: linear-gradient(135deg, rgba(6,13,40,0.82), rgba(11,19,52,0.72));
  border: 1px solid var(--border-soft); border-radius: 18px;
  padding: var(--space-md); margin-bottom: var(--space-xs);
  cursor: pointer; transition: all var(--transition);
  position: relative; overflow: hidden; backdrop-filter: blur(10px);
  transform-style: preserve-3d; perspective: 600px;
}
.item-card::before {

/* === TOAST === */
.toast {
  position: fixed; bottom: 32px; left: 50%;

  border: 1.5px solid var(--neon-blue); backdrop-filter: blur(18px);

}
.toast::before { content: '✨'; font-size: 1.2rem; animation: sparkle 1.3s ease-in-out infinite; }
@keyframes sparkle { 0%,100% { transform: scale(1) rotate(0deg); opacity: 1; } 50% { transform: scale(1.25) rotate(180deg); opacity: 0.88; } }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); animation: toastBounce 0.42s var(--transition-bloom); }
@keyframes toastBounce {
  0% { transform: translateX(-50%) translateY(0) scale(0.88); }
  55% { transform: translateX(-50%) translateY(-10px) scale(1.04); }
  100% { transform: translateX(-50%) translateY(0) scale(1); }
}

/* === SPINNER === */
.spinner {
  width: 34px; height: 34px; border: 3.5px solid rgba(0,245,255,0.22);

  box-shadow: 0 0 14px rgba(0,245,255,0.45);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: rgba(3,8,30,0.65); border-radius: 4px; }
::-webkit-scrollbar-thumb {

}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--neon-cyan), var(--neon-blue));
  box-shadow: 0 0 14px var(--neon-blue);
}

/* === AUTO-UPDATE === */
.auto-update-indicator {
  position: fixed; top: 20px; right: 20px;
  background: rgba(0,245,255,0.16); border: 1px solid var(--border-soft);
  border-radius: 14px; padding: 8px 16px; font-size: var(--text-xs);
  color: var(--neon-blue); display: none; align-items: center; gap: 8px;
  z-index: 1000; backdrop-filter: blur(14px);
  animation: pulse 1.3s infinite; box-shadow: var(--glow-sm); font-weight: 700;
}
.auto-update-indicator.show { display: flex; }
@keyframes pulse { 0%,100% { opacity: 0.76; box-shadow: var(--glow-sm); } 50% { opacity: 1; box-shadow: var(--glow-md); } }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .settings-panel { flex-direction: column; align-items: stretch; }

  .chips-row { justify-content: center; }
  .content-box { padding: var(--space-lg); }
  .neon-selector { padding: var(--space-md); }
}

/* === UTILITIES === */
::selection { background: rgba(0,245,255,0.36); color: var(--fg-bright); text-shadow: 0 0 10px var(--neon-blue); }
button:focus-visible, input:focus-visible { outline: 2.5px solid var(--neon-blue); outline-offset: 4px; box-shadow: var(--glow-md); }
@media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; animation-iteration-count: 1 !important; } }

@keyframes bloomingZoom {
  0% { transform: scale(0.94); opacity: 0.65; filter: blur(3px); }
  55% { transform: scale(1.03); opacity: 1; filter: blur(0); }
  100% { transform: scale(1); opacity: 1; filter: blur(0); }
}
.bloom-enter { animation: bloomingZoom 0.48s var(--transition-bloom) forwards; }

.text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.text-center { text-align: center; }
.font-mono { font-family: 'Orbitron', monospace; }

/* === GLITCH EFFECT === */
@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(-2px, -2px); }
  60% { transform: translate(2px, 2px); }
  80% { transform: translate(2px, -2px); }
  100% { transform: translate(0); }
}
.glitch-hover:hover { animation: glitch 0.3s ease-in-out; }
</style>

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4', keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'), autoUpdate: $('autoUpdateIndicator'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox'),
  cursorGlow: $('cursorGlow'), cursorDot: $('cursorDot'), dataStream: $('dataStream')
};
let selectedTipe = '', selectedLabel = '';

// === CUSTOM CURSOR ===
function initCursor() {
  if (!dom.cursorGlow || !dom.cursorDot) return;
  document.addEventListener('mousemove', e => {
    dom.cursorGlow.style.left = e.clientX + 'px';
    dom.cursorGlow.style.top = e.clientY + 'px';
    dom.cursorDot.style.left = e.clientX + 'px';
    dom.cursorDot.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('button, .item-card, .bet-item, .chip, .result-box').forEach(el => {
    el.addEventListener('mouseenter', () => dom.cursorGlow.classList.add('active'));
    el.addEventListener('mouseleave', () => dom.cursorGlow.classList.remove('active'));
  });
}

// === DATA STREAM EFFECT ===
function createDataStream() {
  if (!dom.dataStream) return;
  for (let i = 0; i < 24; i++) {
    const line = document.createElement('div');
    line.className = 'stream-line';
    line.style.left = Math.random() * 100 + '%';
    line.style.setProperty('--rot', (Math.random() * 10 - 5) + 'deg');
    line.style.animationDuration = (12 + Math.random() * 18) + 's';
    line.style.animationDelay = Math.random() * 20 + 's';
    dom.dataStream.appendChild(line);
  }
}

// === PARTICLES ===
function createParticles() {
  const container = $('particles'); if (!container) return;
  for (let i = 0; i < 56; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 40 + 's';
    p.style.animationDuration = (32 + Math.random() * 22) + 's';
    container.appendChild(p);
  }
}

// === TOAST ===
function showToast(msg) {
  dom.toast.innerHTML = `<span>${msg}</span>`;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 3000);
}
function showAutoUpdate() {
  if (dom.autoUpdate) { dom.autoUpdate.classList.add('show'); setTimeout(() => dom.autoUpdate.classList.remove('show'), 2000); }
}

// === COPY ===
function copyText(text, element) {
  let finalText = text; try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 26 ? finalText.substring(0, 26) + '...' : finalText;
    showToast('📋 Disalin: ' + preview);
    if (element) { element.classList.add('copied'); setTimeout(() => element.classList.remove('copied'), 420); }
  }).catch(() => showToast('❌ Gagal salin'));
}
function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

// === CSV PARSER ===
function parseCSV(text) {
  let p = [], row = [], entry = "", st = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(entry); entry = ""; }
      else if (c === '\r' && n === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { entry += '"'; i++; }
      else if (c === '"') st = 0;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); p.push(row); }
  return p;
}
function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

// === GOOGLE SHEETS ===
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error("Fetch Error:", e); return false; }
}

// === FETCH ===
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) { const p = raw.split('/'); if (p.length === 3) { dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`; dom.statTgl.textContent = dom.inTgl.value; } }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) { const txt = safeGet(data[i], 1); if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt }); }
    for (let i = 2; i <= 55 && i < data.length; i++) { const txt = safeGet(data[i], 2); if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt }); }
    for (let i = 56; i <= 82 && i < data.length; i++) { const txt = safeGet(data[i], 2); if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt }); }
    renderPrediksi();
  } catch(e) { console.error("Error Prediksi:", e); dom.listP.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:28px;">❌ Gagal memuat data</p>'; }
}
async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) { const nom = safeGet(data[0], 23); if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); } }
    const secDef = [{ tRow: 0, tCol: 24, start: 2, end: 42 }, { tRow: 43, tCol: 24, start: 45, end: 80 }, { tRow: 81, tCol: 24, start: 83, end: 119 }, { tRow: 120, tCol: 24, start: 122, end: 153 }, { tRow: 154, tCol: 24, start: 156, end: 179 }, { tRow: 180, tCol: 24, start: 182, end: 213 }, { tRow: 215, tCol: 24, start: 217, end: 248 }, { tRow: 249, tCol: 24, start: 251, end: 282 }, { tRow: 283, tCol: 24, start: 285, end: 316 }];
    state.hitung = secDef.map(s => { let title = safeGet(data[s.tRow], s.tCol) || "PASARAN"; let items = []; for (let i = s.start; i <= s.end && i < data.length; i++) { if (data[i]) { const type = safeGet(data[i], 23), res = safeGet(data[i], 24); if (type || res) items.push({ type, res }); } } return { title, items }; }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) { console.error("Error Hitung:", e); dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:28px;">❌ Gagal memuat data</p>'; }
}

// === RENDER ===
function renderList(container, items, search) {
  const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!filtered.length) { container.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:28px;">📭 Tidak ada data ditemukan</p>'; return; }
  container.innerHTML = filtered.map(v => `<div class="item-card bloom-enter" onclick="copyText('${encodeURIComponent(v.content)}', this)"><div class="item-label">📋 Judul</div><div class="item-title">${v.title}</div><div class="item-label">💬 Isi (Klik untuk Copy)</div><div class="item-content">${v.content}</div></div>`).join('');
}
function renderPrediksi() { renderList(dom.listP, state.prediksi, dom.srcP.value); renderList(dom.listJ, state.jadwal, dom.srcJ.value); renderList(dom.listL, state.link, dom.srcL.value); dom.cntP.textContent = state.prediksi.length; dom.cntJ.textContent = state.jadwal.length; dom.cntL.textContent = state.link.length; }
function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:28px;">📭 Tidak ada data</p>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `<div class="pasaran-box bloom-enter"><div class="pasaran-header"><h3 class="pasaran-title">🎯 ${s.title}</h3></div><div class="pasaran-content">${s.items.map(it => `<div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}', this)"><span class="bet-type">${it.type}</span><span class="bet-result">${it.res}</span></div>`).join('')}</div></div>`).join('');
}

// === CHIPS ===
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + items.map(it => `<div class="chip" data-value="${it.label || it}">${(it.label || it).substring(0, 24)}${(it.label || it).length > 24 ? '...' : ''}</div>`).join('');
  container.querySelectorAll('.chip').forEach(chip => { chip.onclick = () => { container.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); chip.classList.add('active'); if (type === 'tipe') { selectedTipe = chip.dataset.value; updateLabelChips(); } else { selectedLabel = chip.dataset.value; } }; });
}
function updateLabelChips() { if (!selectedTipe || !state.kelompok[selectedTipe]) { renderChips(dom.chipLabel, [], 'label'); return; } const labels = state.kelompok[selectedTipe].map(i => i.label); renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label'); }

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) { const nom = safeGet(data[0], 23); if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); } }
    const secDef = [{ tRow: 0, tCol: 24, start: 2, end: 42, title: "SEMUA PASARAN" }, { tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" }, { tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" }, { tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" }, { tRow: 154, tCol: 24, start: 156, end: 179, title: "BONUS" }, { tRow: 180, tCol: 24, start: 182, end: 213, title: "JAKARTA" }, { tRow: 215, tCol: 24, start: 217, end: 248, title: "TOTOMALI" }, { tRow: 249, tCol: 24, start: 251, end: 282, title: "HOKIDRAW" }, { tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY & HK" }];
    state.kelompok = {}; secDef.forEach(sec => { const items = []; for (let i = sec.start; i <= sec.end && i < data.length; i++) { if (data[i]) { const label = safeGet(data[i], 23), value = safeGet(data[i], 24); if (label || value) items.push({ label: label || "-", value: value || "-" }); } } if (items.length > 0) state.kelompok[sec.title] = items; });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error("Error loadHitungData:", e); }
}

function tampilkanValueHitungan() {
  const result = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) { result.innerHTML = '<span style="color: var(--fg-muted);">Pilih tipe & label terlebih dahulu</span>'; return; }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) { result.innerHTML = `<span style="font-weight: 800; text-shadow: 0 0 14px var(--neon-blue);">${item.value}</span>`; result.onclick = () => copyText(item.value, result); result.classList.add('bloom-enter'); setTimeout(() => result.classList.remove('bloom-enter'), 480); }
}

// === AUTO-UPDATE ===
let autoTimeout = null;
function autoUpdateTanggal() { showAutoUpdate(); clearTimeout(autoTimeout); autoTimeout = setTimeout(manualUpdateTanggal, 1000); }
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal!");
  const p = dom.inTgl.value.split('-'); const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "⏳";
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) { localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value); dom.statTgl.textContent = "✅"; showToast("📅 Tersimpan!"); fetchPrediksi(); fetchHitung(); loadHitungData(); }
    else { dom.statTgl.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}
function autoUpdateNominal() { showAutoUpdate(); clearTimeout(autoTimeout); autoTimeout = setTimeout(manualUpdateNominal, 1000); }
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Isi nominal!");
  dom.btnNom.disabled = true; dom.statNom.textContent = "⏳";
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) { localStorage.setItem(CONFIG.keyNominal, dom.inNom.value); dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value); showToast("💰 Tersimpan!"); fetchPrediksi(); fetchHitung(); loadHitungData(); }
    else { dom.statNom.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}

// === INIT ===
function init() {
  document.querySelectorAll('.tab-chip').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active'));
    t.classList.add('active'); dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none'; dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
  });
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  fetchPrediksi(); fetchHitung(); loadHitungData();
}

document.addEventListener('DOMContentLoaded', () => {
  initCursor(); createDataStream(); createParticles(); init();
  setTimeout(() => showToast('🚀 ULTRA CYBER NEON Loaded ✨'), 900);
});
</script>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡ ULTRA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          neon: { blue: '#00f5ff', cyan: '#00d9ff', electric: '#00a8ff', purple: '#7b61ff', pink: '#ff00aa' }
        }
      }
    }
  }
</script>
<style>
:root {
  /* === ULTRA DARK BASE === */
  --bg: #000008;
  --bg-gradient: radial-gradient(ellipse at center, #00051a 0%, #00010a 40%, #000008 100%);
  --bg-card: rgba(1, 4, 24, 0.94);
  --bg-card-hover: rgba(3, 8, 40, 0.98);
  
  /* === HYPER NEON PALETTE === */
  --neon-blue: #00f5ff;
  --neon-cyan: #00d9ff;
  --neon-electric: #00a8ff;
  --neon-purple: #7b61ff;
  --neon-pink: #ff00aa;
  --neon-gold: #ffd700;
  --neon-glow: rgba(0, 245, 255, 0.85);
  
  /* === TEXT === */
  --fg: #e6f4ff;
  --fg-bright: #ffffff;
  --fg-muted: #8ab4d6;
  
  /* === INTENSE GLOW LAYERS === */
  --glow-xs: 0 0 6px var(--neon-glow), 0 0 14px rgba(0,245,255,0.5);
  --glow-sm: 0 0 10px var(--neon-glow), 0 0 24px rgba(0,245,255,0.6), 0 0 48px rgba(0,217,255,0.4);
  --glow-md: 0 0 16px var(--neon-glow), 0 0 38px rgba(0,245,255,0.7), 0 0 76px rgba(0,217,255,0.5), 0 0 120px rgba(123,97,255,0.3);
  --glow-lg: 0 0 24px var(--neon-glow), 0 0 56px rgba(0,245,255,0.8), 0 0 112px rgba(0,217,255,0.6), 0 0 180px rgba(123,97,255,0.45), 0 0 280px rgba(255,0,170,0.25);
  --glow-text: 0 0 12px var(--neon-blue), 0 0 28px rgba(0,245,255,0.7), 0 0 56px rgba(0,217,255,0.5), 0 0 96px rgba(123,97,255,0.35);
  
  /* === BORDERS === */
  --border-glow: rgba(0, 245, 255, 0.6);
  --border-soft: rgba(0, 217, 255, 0.35);
  --border-hover: rgba(0, 245, 255, 0.85);
  
  /* === ANIMATIONS === */
  --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  --transition: 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-bloom: 0.48s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  --transition-elastic: 0.55s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

* { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg-gradient);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
  font-size: 0.95rem;
}

/* === CUSTOM CURSOR === */
.cursor-dot, .cursor-ring {
  position: fixed; top: 0; left: 0; border-radius: 50%;
  pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
  transition: transform 0.15s ease-out, opacity 0.2s;
}
.cursor-dot {
  width: 8px; height: 8px;
  background: var(--neon-blue);
  box-shadow: 0 0 12px var(--neon-blue), 0 0 24px var(--neon-cyan);
}
.cursor-ring {
  width: 42px; height: 42px;
  border: 2px solid var(--neon-blue);
  box-shadow: 0 0 16px var(--neon-glow), inset 0 0 16px rgba(0,245,255,0.3);
  transition: width 0.2s, height 0.2s, border-color 0.2s;
}
body.hovering .cursor-ring {
  width: 56px; height: 56px;
  border-color: var(--neon-pink);
  box-shadow: 0 0 24px rgba(255,0,170,0.7), inset 0 0 24px rgba(255,0,170,0.3);
}
body.clicking .cursor-dot { transform: translate(-50%, -50%) scale(0.6); }
body.clicking .cursor-ring { transform: translate(-50%, -50%) scale(1.4); opacity: 0.7; }

/* === DYNAMIC BACKGROUND === */
.bg-neon {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(0,245,255,0.15) 0%, transparent 65%),
    radial-gradient(ellipse at 80% 15%, rgba(123,97,255,0.12) 0%, transparent 65%),
    radial-gradient(ellipse at 50% 85%, rgba(0,217,255,0.18) 0%, transparent 65%),
    radial-gradient(ellipse at 10% 75%, rgba(255,0,170,0.1) 0%, transparent 65%),
    radial-gradient(ellipse at 90% 50%, rgba(255,215,0,0.08) 0%, transparent 65%),
    var(--bg-gradient);
  animation: bgPulse 70s ease-in-out infinite;
}
@keyframes bgPulse {
  0%, 100% { filter: hue-rotate(0deg) brightness(1) saturate(1); }
  20% { filter: hue-rotate(12deg) brightness(1.04) saturate(1.05); }
  40% { filter: hue-rotate(-8deg) brightness(0.97) saturate(1.02); }
  60% { filter: hue-rotate(6deg) brightness(1.03) saturate(1.08); }
  80% { filter: hue-rotate(-4deg) brightness(0.99) saturate(0.98); }
}

/* === CYBER GRID + SCANLINES === */
.grid-overlay {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    linear-gradient(rgba(0,245,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,0.05) 1px, transparent 1px),
    repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 2px, transparent 4px);
  background-size: 36px 36px, 36px 36px, 100% 4px;
  animation: gridFlow 50s linear infinite, scanline 8s linear infinite;
  opacity: 0.85;
  mask-image: radial-gradient(ellipse at center, black 35%, transparent 80%);
}
@keyframes gridFlow { 0% { background-position: 0 0, 0 0, 0 0; } 100% { background-position: 36px 36px, 36px 36px, 0 4px; } }
@keyframes scanline { 0% { background-position: 0 0, 0 0, 0 0; } 100% { background-position: 0 0, 0 0, 0 400px; } }

/* === FLOATING ORBS === */
.orb {
  position: fixed; border-radius: 50%; filter: blur(110px); opacity: 0.15;
  animation: orbMove 65s ease-in-out infinite alternate; z-index: -1;
  mix-blend-mode: screen;
}
.orb-1 { width: 920px; height: 920px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric), var(--neon-cyan)); top: -40%; left: -25%; }
.orb-2 { width: 680px; height: 680px; background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink), var(--neon-purple)); bottom: -35%; right: -22%; animation-delay: -32s; }
.orb-3 { width: 540px; height: 540px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue), var(--neon-purple)); top: 50%; left: 60%; animation: orbMove2 58s ease-in-out infinite alternate; animation-delay: -18s; }
.orb-4 { width: 380px; height: 380px; background: linear-gradient(135deg, var(--neon-gold), var(--neon-pink)); bottom: 20%; left: 15%; animation: orbMove3 45s ease-in-out infinite alternate; animation-delay: -8s; opacity: 0.1; }

@keyframes orbMove {
  0% { transform: translate(0, 0) scale(1); opacity: 0.15; }
  50% { transform: translate(42px, -32px) scale(1.12); opacity: 0.22; }
  100% { transform: translate(-28px, 38px) scale(0.92); opacity: 0.17; }
}
@keyframes orbMove2 {
  0% { transform: translate(0, 0) scale(1); opacity: 0.12; }
  50% { transform: translate(-35px, 28px) scale(1.08); opacity: 0.19; }
  100% { transform: translate(24px, -24px) scale(0.94); opacity: 0.14; }
}
@keyframes orbMove3 {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(28px, -18px) scale(1.05); }
  100% { transform: translate(-18px, 22px) scale(0.96); }
}

/* === PARTICLE SYSTEM === */
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; width: 2.5px; height: 2.5px; border-radius: 50%;
  background: var(--neon-blue); opacity: 0;
  animation: floatUp 40s infinite ease-in-out;
  box-shadow: 0 0 10px var(--neon-blue), 0 0 28px var(--neon-cyan), 0 0 52px var(--neon-glow);
}
.particle:nth-child(2n) { background: var(--neon-cyan); animation-delay: -16s; width: 2px; height: 2px; }
.particle:nth-child(3n) { background: var(--neon-purple); animation-delay: -28s; width: 3px; height: 3px; }
.particle:nth-child(5n) { background: var(--neon-pink); animation-delay: -10s; width: 1.5px; height: 1.5px; }
.particle:nth-child(7n) { background: var(--neon-gold); animation-delay: -6s; width: 2px; height: 2px; }
@keyframes floatUp {
  0%, 100% { transform: translateY(115vh) rotate(0deg) scale(0.7); opacity: 0; }
  8% { opacity: 0.95; }
  92% { opacity: 0.95; }
  100% { transform: translateY(-25vh) rotate(820deg) scale(1.3); opacity: 0; }
}

/* === MOUSE GLOW EFFECT === */
.mouse-glow {
  position: fixed; width: 320px; height: 320px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,245,255,0.18) 0%, rgba(0,245,255,0.08) 30%, transparent 70%);
  pointer-events: none; z-index: -1; transform: translate(-50%, -50%);
  transition: opacity 0.3s; filter: blur(40px); mix-blend-mode: screen;
}

/* === CONTAINER === */
.main-container { position: relative; z-index: 10; max-width: 1480px; margin: 0 auto; padding: 20px; }

/* === HEADER WITH GLITCH === */
.header-section { text-align: center; padding: 32px 0 24px; animation: fadeInDown 0.8s var(--transition-bloom) backwards; }
@keyframes fadeInDown { from { opacity: 0; transform: translateY(-28px); } to { opacity: 1; transform: translateY(0); } }

.main-title {
  font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 7vw, 3.6rem);
  font-weight: 900; letter-spacing: 4px;
  background: linear-gradient(135deg, var(--fg-bright) 0%, var(--neon-blue) 20%, var(--neon-cyan) 40%, var(--neon-purple) 60%, var(--neon-pink) 80%, var(--neon-gold) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--glow-text);
  animation: titleShimmer 3s ease-in-out infinite, textGlow 2.4s ease-in-out infinite alternate, glitch 6s infinite;
  position: relative; display: inline-block; line-height: 1.15;
}
@keyframes titleShimmer { 0%, 100% { filter: brightness(1) saturate(1); } 50% { filter: brightness(1.35) saturate(1.2); } }
@keyframes textGlow {
  0% { text-shadow: var(--glow-text); }
  100% { text-shadow: 0 0 18px var(--neon-blue), 0 0 42px rgba(0,245,255,0.85), 0 0 84px rgba(0,217,255,0.65), 0 0 140px rgba(123,97,255,0.5), 0 0 220px rgba(255,0,170,0.35); }
}
@keyframes glitch {
  0%, 90%, 100% { transform: translate(0); }
  91% { transform: translate(-2px, 1px); }
  92% { transform: translate(2px, -1px); }
  93% { transform: translate(-1px, 2px); }
  94% { transform: translate(1px, -2px); }
}
.main-title::before, .main-title::after {
  content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  opacity: 0.7; pointer-events: none;
}
.main-title::before {
  background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
  animation: glitchShift 2.8s infinite; clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
  transform: translate(2px, 0);
}
.main-title::after {
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
  animation: glitchShift 3.2s infinite reverse; clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
  transform: translate(-2px, 0);
}
@keyframes glitchShift {
  0%, 100% { transform: translate(0); }
  25% { transform: translate(3px, -1px); }
  50% { transform: translate(-2px, 2px); }
  75% { transform: translate(1px, -3px); }
}
.main-title::after {
  content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
  width: 90%; height: 3px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-purple), var(--neon-pink), transparent);
  animation: linePulse 2.4s ease-in-out infinite, rainbowFlow 8s linear infinite;
  border-radius: 3px; box-shadow: 0 0 16px var(--neon-blue), 0 0 38px var(--neon-cyan);
}
@keyframes linePulse { 0%, 100% { opacity: 0.8; transform: translateX(-50%) scaleX(1); } 50% { opacity: 1; transform: translateX(-50%) scaleX(1.03); } }
@keyframes rainbowFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

/* === TABS - HOLOGRAPHIC === */
.tabs-container {
  display: flex; justify-content: center; gap: 8px; margin: 16px 0 24px;
  background: rgba(2, 6, 32, 0.72); border: 1px solid var(--border-soft);
  border-radius: 22px; padding: 6px; max-width: fit-content; margin-inline: auto;
  backdrop-filter: blur(28px); box-shadow: var(--glow-sm), inset 0 1px 0 rgba(255,255,255,0.1);
  position: relative; overflow: hidden;
}
.tabs-container::before {
  content: ''; position: absolute; inset: 0; border-radius: 22px; padding: 1px;
  background: linear-gradient(135deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-purple), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0.6; animation: borderFlow 4s linear infinite;
}
@keyframes borderFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

.tab-chip {
  padding: 14px 32px; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.92rem;
  color: var(--fg-muted); background: transparent; border: none; border-radius: 16px;
  cursor: pointer; transition: all var(--transition); position: relative;
  text-transform: uppercase; letter-spacing: 1.4px; overflow: hidden; line-height: 1; z-index: 1;
}
.tab-chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 16px; padding: 1px;
  background: linear-gradient(135deg, transparent, var(--neon-blue), var(--neon-cyan), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--transition);
}
.tab-chip::after {
  content: ''; position: absolute; inset: 0; border-radius: 16px;
  background: linear-gradient(135deg, rgba(0,245,255,0.18), rgba(123,97,255,0.12));
  opacity: 0; transition: opacity var(--transition);
}
.tab-chip:hover { color: var(--neon-blue); transform: translateY(-2px); }
.tab-chip:hover::before { opacity: 1; }
.tab-chip:hover::after { opacity: 1; }
.tab-chip.active {
  color: var(--fg-bright);
  background: linear-gradient(135deg, rgba(0,245,255,0.28), rgba(123,97,255,0.22));
  border: 1px solid var(--border-hover); box-shadow: var(--glow-md);
  text-shadow: 0 0 10px var(--neon-blue);
}
.tab-chip.active::after { opacity: 1; animation: chipGlow 2.2s ease-in-out infinite; }
@keyframes chipGlow { 0%, 100% { opacity: 1; } 50% { opacity: 0.88; } }
.tab-chip.active::before {
  content: ''; position: absolute; bottom: -1px; left: 22%; right: 22%; height: 2.5px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-purple), transparent);
  border-radius: 3px; box-shadow: var(--glow-sm); animation: activeLine 2.4s ease-in-out infinite;
}
@keyframes activeLine { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; transform: scaleX(1.06); } }

/* === CONTENT BOX - ULTRA GLASS === */
.content-box {
  background: var(--bg-card); border: 1px solid var(--border-soft);
  border-radius: 28px; padding: 28px; backdrop-filter: blur(32px);
  position: relative; overflow: hidden;
  box-shadow: var(--glow-md), inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.3);
  animation: cardEnter 0.6s var(--transition-bloom) backwards;
}
@keyframes cardEnter { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.content-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), var(--neon-purple), var(--neon-pink), transparent);
  animation: scanLine 3.5s linear infinite; opacity: 0.95; box-shadow: 0 0 16px var(--neon-blue);
}
@keyframes scanLine { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.content-box::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at top, rgba(0,245,255,0.06) 0%, transparent 65%);
  pointer-events: none;
}
.content-box .corner {
  position: absolute; width: 24px; height: 24px; border: 2px solid var(--neon-blue);
  opacity: 0.7; transition: all var(--transition);
}
.content-box .corner.tl { top: 12px; left: 12px; border-right: none; border-bottom: none; border-radius: 4px 0 0 0; }
.content-box .corner.tr { top: 12px; right: 12px; border-left: none; border-bottom: none; border-radius: 0 4px 0 0; }
.content-box .corner.bl { bottom: 12px; left: 12px; border-right: none; border-top: none; border-radius: 0 0 0 4px; }
.content-box .corner.br { bottom: 12px; right: 12px; border-left: none; border-top: none; border-radius: 0 0 4px 0; }
.content-box:hover .corner { border-color: var(--neon-cyan); opacity: 1; box-shadow: 0 0 12px var(--neon-blue); }

/* === SETTINGS PANEL === */
.settings-panel {
  background: linear-gradient(135deg, rgba(3, 8, 38, 0.82), rgba(6, 14, 48, 0.74));
  border: 1px solid var(--border-soft); border-radius: 24px;
  padding: 16px 20px; margin-bottom: 24px;
  display: flex; flex-wrap: nowrap; gap: 16px; align-items: center;
  backdrop-filter: blur(20px); box-shadow: var(--glow-sm);
  transition: all var(--transition); position: relative; overflow: hidden;
}
.settings-panel::before {
  content: ''; position: absolute; inset: 0; border-radius: 24px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0,245,255,0.3), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--transition);
}
.settings-panel:hover { border-color: var(--border-hover); box-shadow: var(--glow-md); }
.settings-panel:hover::before { opacity: 1; }
.setting-item { display: flex; align-items: center; gap: 12px; white-space: nowrap; }
.setting-label {
  color: var(--neon-blue); font-size: 0.86rem; font-weight: 700;
  text-shadow: 0 0 10px rgba(0,245,255,0.65); display: flex; align-items: center; gap: 5px;
}
.input-neon {
  padding: 12px 16px; background: rgba(4, 9, 34, 0.86);
  border: 1px solid rgba(0,245,255,0.42); border-radius: 14px;
  color: var(--fg-bright); font-size: 0.96rem; width: 175px;
  transition: all var(--transition); font-family: 'Space Grotesk', sans-serif;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
}
.input-neon::placeholder { color: var(--fg-muted); opacity: 0.8; }
.input-neon:focus {
  outline: none; border-color: var(--neon-blue);
  box-shadow: var(--glow-md), inset 0 0 0 1px rgba(0,245,255,0.4);
  background: rgba(7, 13, 42, 0.94); transform: translateY(-2px);
}

/* === BUTTONS - MAGNETIC NEON === */
.btn-neon {
  padding: 12px 26px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric));
  border: none; border-radius: 16px; color: #000512;
  font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 0.86rem;
  cursor: pointer; transition: all var(--transition);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1.3px;
  position: relative; overflow: hidden; box-shadow: var(--glow-md);
  text-shadow: 0 2px 0 rgba(255,255,255,0.35);
}
.btn-neon::before {
  content: ''; position: absolute; inset: 0; border-radius: 16px; padding: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity 0.2s;
}
.btn-neon::after {
  content: ''; position: absolute; inset: 0; border-radius: 16px;
  background: linear-gradient(135deg, rgba(255,255,255,0.32), transparent 55%);
  opacity: 0; transition: opacity var(--transition);
}
.btn-neon:hover::before { opacity: 1; }
.btn-neon:hover::after { opacity: 1; }
.btn-neon:hover {
  transform: translateY(-3px) scale(1.04); box-shadow: var(--glow-lg);
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
}
.btn-neon:active { transform: translateY(0) scale(0.97); transition-duration: 0.08s; }
.btn-neon:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; filter: grayscale(0.4); }

.status-badge {
  font-size: 0.86rem; color: #00ffd5; margin-left: 10px; font-weight: 700;
  text-shadow: 0 0 12px rgba(0,255,213,0.7); animation: blink 2s ease-in-out infinite;
  display: inline-flex; align-items: center; gap: 5px;
}
@keyframes blink { 0%, 100% { opacity: 1; text-shadow: 0 0 12px rgba(0,255,213,0.7); } 50% { opacity: 0.82; text-shadow: 0 0 20px rgba(0,255,213,0.95); } }

/* === DATA GRID === */
.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 20px; }

/* === SECTION BOX === */
.section-box {
  background: linear-gradient(145deg, rgba(4, 10, 38, 0.86), rgba(8, 16, 52, 0.78));
  border: 1px solid var(--border-soft); border-radius: 24px;
  overflow: hidden; display: flex; flex-direction: column;
  transition: all var(--transition); backdrop-filter: blur(16px);
  box-shadow: var(--glow-sm); position: relative;
}
.section-box::before {

.section-content { padding: 12px; overflow-y: auto; max-height: 420px; flex-grow: 1; }

/* === ITEM CARD - HOLOGRAPHIC HOVER === */
.item-card {
  background: linear-gradient(135deg, rgba(6, 12, 38, 0.82), rgba(10, 18, 50, 0.74));

  content: ''; position: absolute; inset: 0; border-radius: 18px; padding: 1px;

  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--transition);
}
.item-card::after {
  content: ''; position: absolute; inset: 0; border-radius: 18px;
  background: radial-gradient(circle at 35% 35%, rgba(0,245,255,0.15), transparent 65%);
  opacity: 0; transition: opacity var(--transition);
}
.item-card:hover::before { opacity: 1; }
.item-card:hover::after { opacity: 1; }
.item-card:hover {
  border-color: var(--border-hover); box-shadow: var(--glow-md);
  background: linear-gradient(135deg, rgba(9, 16, 46, 0.92), rgba(14, 23, 58, 0.84));

}
.item-card:active { transform: translateY(0) scale(0.99); transition-duration: 0.08s; }
.item-label {

}
.item-title {
  color: var(--neon-blue); font-weight: 700; margin-bottom: 5px; font-size: 0.96rem;
  text-shadow: 0 0 8px rgba(0,245,255,0.45); line-height: 1.3;
}
.item-content {
  font-size: 0.88rem; color: var(--fg); line-height: 1.55;

}

/* === PASARAN BOX === */
.pasaran-box {
  background: linear-gradient(135deg, rgba(5, 11, 40, 0.86), rgba(9, 18, 54, 0.78));
  border: 1px solid var(--border-soft); border-radius: 20px;
  overflow: hidden; margin-bottom: 12px; transition: all var(--transition);
  backdrop-filter: blur(12px); position: relative;
}
.pasaran-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-md); transform: translateX(4px); }
.pasaran-header {
  background: linear-gradient(90deg, rgba(0,245,255,0.16), transparent 78%);

}
.pasaran-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-blue);
  font-size: 0.92rem; text-shadow: 0 0 11px rgba(0,245,255,0.58);
  display: flex; align-items: center; gap: 6px;
}
.pasaran-content { padding: 8px 14px; max-height: 350px; overflow-y: auto; }

.bet-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 15px; margin-bottom: 8px; background: rgba(7, 13, 42, 0.72);
  border: 1px solid var(--border-soft); border-radius: 14px;
  cursor: pointer; transition: all var(--transition);
}
.bet-item:hover {
  border-color: var(--border-hover); background: rgba(11, 19, 52, 0.86);
  box-shadow: var(--glow-sm); transform: translateX(4px);
}
.bet-type { color: var(--fg); font-size: 0.88rem; flex: 1; margin-right: 12px; font-weight: 500; line-height: 1.4; }
.bet-result {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-blue);

}
.bet-item:hover .bet-result {
  background: rgba(0,245,255,0.28); box-shadow: 0 0 18px rgba(0,245,255,0.52);
  transform: scale(1.04);
}

/* === NEON SELECTOR === */
.neon-selector {
  background: linear-gradient(135deg, rgba(6, 12, 44, 0.88), rgba(10, 19, 56, 0.8));
  border: 1px solid var(--border-soft); border-radius: 24px;
  padding: 22px; margin: 22px 0; backdrop-filter: blur(18px);
  box-shadow: var(--glow-sm); position: relative; overflow: hidden;
}
.neon-selector::before {
  content: ''; position: absolute; inset: 0; border-radius: 24px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0,245,255,0.35), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0.5;
}
.selector-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 18px;
  padding-bottom: 16px; border-bottom: 1px solid var(--border-soft);
}
.selector-icon {
  font-size: 1.6rem; animation: iconFloat 4.2s ease-in-out infinite;
  filter: drop-shadow(0 0 10px var(--neon-blue));
}
@keyframes iconFloat { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-5px) rotate(3deg); } }
.selector-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-blue);
  font-size: 1.12rem; text-shadow: 0 0 12px rgba(0,245,255,0.62);
}

/* === CHIP GROUP === */
.chip-group { margin-bottom: 16px; }
.chip-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.84rem; font-weight: 700;
  color: var(--neon-blue); margin-bottom: 8px; display: flex; align-items: center; gap: 7px;
  text-shadow: 0 0 8px rgba(0,245,255,0.52);
}
.chip-label::before {
  content: ''; width: 4px; height: 16px;
  background: linear-gradient(180deg, var(--neon-blue), var(--neon-cyan));
  border-radius: 2px; box-shadow: 0 0 10px var(--neon-blue);
}
.chips-row { display: flex; flex-wrap: wrap; gap: 8px; }

.chip {
  padding: 8px 18px; background: rgba(6, 12, 40, 0.86);
  border: 1px solid rgba(0,245,255,0.32); border-radius: 26px;
  color: var(--fg-muted); font-size: 0.86rem; font-weight: 600;
  cursor: pointer; transition: all var(--transition); position: relative; overflow: hidden;
}
.chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 26px;
  background: linear-gradient(135deg, transparent, rgba(0,245,255,0.26), transparent);
  opacity: 0; transition: opacity var(--transition);
}
.chip:hover { color: var(--neon-blue); border-color: rgba(0,245,255,0.58); transform: translateY(-2px); }
.chip:hover::before { opacity: 1; }
.chip.active {
  color: #000512; background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric));
  border-color: var(--neon-blue); box-shadow: var(--glow-md); font-weight: 800;
  text-shadow: 0 1px 0 rgba(255,255,255,0.3);
}
.chip.active::after {
  content: '✓'; position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
  font-size: 0.8rem; font-weight: 900; animation: checkPop 0.35s var(--transition-bloom);
  text-shadow: 0 0 5px rgba(0,0,0,0.5);
}
@keyframes checkPop { 0% { transform: translateY(-50%) scale(0) rotate(-180deg); } 65% { transform: translateY(-50%) scale(1.35) rotate(12deg); } 100% { transform: translateY(-50%) scale(1) rotate(0deg); } }

/* === RESULT BOX === */
.result-box {
  margin-top: 18px; padding: 18px 24px;
  background: rgba(7, 14, 44, 0.92); border: 1px solid rgba(0,245,255,0.45);
  border-radius: 18px; font-family: 'Orbitron', sans-serif; font-size: 1.15rem;
  color: var(--neon-blue); text-align: center; min-height: 58px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); cursor: pointer;
  box-shadow: var(--glow-sm); position: relative; overflow: hidden;
}
.result-box::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at center, rgba(0,245,255,0.1), transparent 72%);
  opacity: 0; transition: opacity var(--transition);
}
.result-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-md); transform: translateY(-2px); }
.result-box:hover::before { opacity: 1; }
.result-box.copied {
  animation: copiedFlash 0.42s var(--transition-bloom);
  border-color: #00ffd5; box-shadow: 0 0 24px rgba(0,255,213,0.62), var(--glow-md);
  background: rgba(0,255,213,0.14);
}
@keyframes copiedFlash { 0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }

/* === HITUNG ROW === */
.hitung-row { display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: end; margin-top: 10px; }
.hitung-btn {
  padding: 14px 30px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-electric));
  border: none; border-radius: 16px; color: #000512;
  font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 0.9rem;
  cursor: pointer; transition: all var(--transition);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1.4px;
  box-shadow: var(--glow-md); text-shadow: 0 2px 0 rgba(255,255,255,0.35);
}
.hitung-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: var(--glow-lg); background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue)); }
.hitung-btn:active { transform: translateY(0) scale(0.97); transition-duration: 0.08s; }

/* === TOAST - PREMIUM === */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(140px) scale(0.9);
  background: linear-gradient(135deg, rgba(4, 10, 42, 0.98), rgba(8, 18, 54, 0.96));
  color: var(--neon-blue); padding: 15px 34px; border-radius: 54px;
  font-weight: 700; font-size: 0.94rem; opacity: 0; transition: all var(--transition-bloom);
  z-index: 1000; border: 1px solid var(--neon-blue); backdrop-filter: blur(20px);
  text-shadow: 0 0 12px rgba(0,245,255,0.72);
  box-shadow: var(--glow-lg), 0 12px 48px rgba(0,0,0,0.5);
  display: flex; align-items: center; gap: 10px;
}
.toast::before { content: '✨'; font-size: 1.2rem; animation: sparkle 1.4s ease-in-out infinite; }
@keyframes sparkle { 0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; } 50% { transform: scale(1.25) rotate(180deg); opacity: 0.88; } }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); animation: toastBounce 0.45s var(--transition-bloom); }
@keyframes toastBounce { 0% { transform: translateX(-50%) translateY(0) scale(0.88); } 50% { transform: translateX(-50%) translateY(-10px) scale(1.04); } 100% { transform: translateX(-50%) translateY(0) scale(1); } }

/* === SPINNER === */
.spinner {
  width: 36px; height: 36px; border: 3.5px solid rgba(0,245,255,0.22);
  border-top-color: var(--neon-blue); border-radius: 50%;
  animation: spin 0.85s linear infinite;
  box-shadow: 0 0 14px rgba(0,245,255,0.45), inset 0 0 14px rgba(0,245,255,0.15);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: rgba(3, 7, 28, 0.65); border-radius: 4px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-blue), var(--neon-electric));
  border-radius: 4px; border: 1px solid rgba(0,245,255,0.32);
  box-shadow: inset 0 0 8px rgba(0,0,0,0.35);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--neon-cyan), var(--neon-blue));
  box-shadow: 0 0 14px var(--neon-blue);
}

/* === AUTO-UPDATE === */
.auto-update-indicator {
  position: fixed; top: 20px; right: 20px;
  background: rgba(0,245,255,0.16); border: 1px solid var(--border-soft);
  border-radius: 14px; padding: 8px 16px; font-size: 0.82rem;
  color: var(--neon-blue); display: none; align-items: center; gap: 8px;
  z-index: 1000; backdrop-filter: blur(14px); animation: pulse 1.6s infinite;
  box-shadow: var(--glow-sm); font-weight: 700;
}
.auto-update-indicator.show { display: flex; }
@keyframes pulse { 0%, 100% { opacity: 0.75; box-shadow: var(--glow-sm); } 50% { opacity: 1; box-shadow: var(--glow-md); } }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .settings-panel { flex-direction: column; align-items: stretch; }
  .setting-item { width: 100%; justify-content: space-between; }
  .input-neon { width: 100%; }
  .data-grid { grid-template-columns: 1fr; }
  .main-title { font-size: clamp(1.8rem, 8vw, 3rem); letter-spacing: 2.5px; }
  .tab-chip { padding: 12px 24px; font-size: 0.88rem; }
  .hitung-row { grid-template-columns: 1fr; gap: 14px; }
  .hitung-btn { width: 100%; }
  .chips-row { justify-content: center; }
  .content-box { padding: 22px; }
  .neon-selector { padding: 18px; }
}

/* === UTILITIES === */
::selection { background: rgba(0,245,255,0.38); color: var(--fg-bright); text-shadow: 0 0 10px var(--neon-blue); }
button:focus-visible, input:focus-visible { outline: 2.5px solid var(--neon-blue); outline-offset: 4px; box-shadow: var(--glow-md); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; animation-iteration-count: 1 !important; } }

@keyframes bloomingZoom {
  0% { transform: scale(0.94); opacity: 0.65; filter: blur(3px); }
  50% { transform: scale(1.03); opacity: 1; filter: blur(0); }
  100% { transform: scale(1); opacity: 1; filter: blur(0); }
}
.bloom-enter { animation: bloomingZoom 0.5s var(--transition-bloom) forwards; }

/* === RIPPLE EFFECT === */
.ripple {
  position: absolute; border-radius: 50%; transform: scale(0);
  background: rgba(0,245,255,0.45); animation: rippleEffect 0.65s ease-out;
  pointer-events: none;
}
@keyframes rippleEffect {
  to { transform: scale(3.5); opacity: 0; }
}

/* === TEXT UTILITIES === */
.text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.text-center { text-align: center; }
.font-mono { font-family: 'Orbitron', monospace; }
</style>

const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'),
  autoUpdate: $('autoUpdateIndicator'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};
let selectedTipe = '', selectedLabel = '';

// === CUSTOM CURSOR ===
const cursorDot = document.querySelector('.cursor-dot');
const cursorRing = document.querySelector('.cursor-ring');
const mouseGlow = document.querySelector('.mouse-glow');
let mouseX = 0, mouseY = 0;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursorDot.style.left = mouseX + 'px'; cursorDot.style.top = mouseY + 'px';
  cursorRing.style.left = mouseX + 'px'; cursorRing.style.top = mouseY + 'px';
  mouseGlow.style.left = mouseX + 'px'; mouseGlow.style.top = mouseY + 'px';
});

document.querySelectorAll('a, button, .item-card, .bet-item, .chip, [onclick]').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
});

document.addEventListener('mousedown', () => document.body.classList.add('clicking'));
document.addEventListener('mouseup', () => document.body.classList.remove('clicking'));

// === RIPPLE EFFECT ===
function createRipple(event, element) {
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const rect = element.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const x = event.clientX - rect.left - size / 2;
  const y = event.clientY - rect.top - size / 2;
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = x + 'px'; ripple.style.top = y + 'px';
  element.appendChild(ripple);
  setTimeout(() => ripple.remove(), 650);
}
document.querySelectorAll('.btn-neon, .hitung-btn, .tab-chip, .chip').forEach(btn => {
  btn.addEventListener('click', (e) => createRipple(e, btn));
});

// === PARTICLES ===
function createParticles() {
  const container = $('particles');
  if (!container) return;
  for(let i = 0; i < 56; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 40 + 's';
    p.style.animationDuration = (32 + Math.random() * 22) + 's';
    container.appendChild(p);
  }
}

// === TOAST ===
function showToast(msg) {
  dom.toast.innerHTML = `<span>${msg}</span>`;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 3000);
}
function showAutoUpdate() {
  if (dom.autoUpdate) {
    dom.autoUpdate.classList.add('show');
    setTimeout(() => dom.autoUpdate.classList.remove('show'), 2000);
  }
}

// === COPY ===
function copyText(text, element) {
  let finalText = text;
  try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 26 ? finalText.substring(0, 26) + '...' : finalText;
    showToast('📋 Disalin: ' + preview);
    if (element) {
      element.classList.add('copied');
      setTimeout(() => element.classList.remove('copied'), 450);
    }
  }).catch(() => showToast('❌ Gagal salin'));
}
function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

// === CSV PARSER ===
function parseCSV(text) {
  let p = [], row = [], entry = "", st = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(entry); entry = ""; }
      else if (c === '\r' && n === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { entry += '"'; i++; }
      else if (c === '"') st = 0;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); p.push(row); }
  return p;
}
function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

// === GOOGLE SHEETS ===
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error("Fetch Error:", e); return false; }
}

// === FETCH FUNCTIONS ===
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = dom.inTgl.value;
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    renderPrediksi();
  } catch(e) {
    console.error("Error Prediksi:", e);
    dom.listP.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:28px;">❌ Gagal memuat data</p>';
  }
}
async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 }, { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 }, { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 }, { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 }, { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    state.hitung = secDef.map(s => {
      let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
      let items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), res = safeGet(data[i], 24);
          if (type || res) items.push({ type, res });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) {
    console.error("Error Hitung:", e);
    dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:28px;">❌ Gagal memuat data</p>';
  }
}

// === RENDER ===
function renderList(container, items, search) {
  const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!filtered.length) { 
    container.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:28px;">📭 Tidak ada data ditemukan</p>'; 
    return; 
  }
  container.innerHTML = filtered.map(v => `
    <div class="item-card bloom-enter" onclick="copyText('${encodeURIComponent(v.content)}', this)">
      <div class="item-label">📋 Judul</div>
      <div class="item-title">${v.title}</div>
      <div class="item-label">💬 Isi (Klik untuk Copy)</div>
      <div class="item-content">${v.content}</div>
    </div>
  `).join('');
}
function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}
function renderHitung() {
  if (!state.hitung.length) { 
    dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:28px;">📭 Tidak ada data</p>'; 
    return; 
  }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-box bloom-enter">
      <div class="pasaran-header"><h3 class="pasaran-title">🎯 ${s.title}</h3></div>
      <div class="pasaran-content">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}', this)">
            <span class="bet-type">${it.type}</span>
            <span class="bet-result">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// === CHIPS ===
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + 
    items.map(it => `<div class="chip" data-value="${it.label || it}">${(it.label || it).substring(0, 24)}${(it.label || it).length > 24 ? '...' : ''}</div>`).join('');
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (type === 'tipe') { selectedTipe = chip.dataset.value; updateLabelChips(); }
      else { selectedLabel = chip.dataset.value; }
    };
  });
}
function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) { renderChips(dom.chipLabel, [], 'label'); return; }
  const labels = state.kelompok[selectedTipe].map(i => i.label);
  renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}
async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "SEMUA PASARAN" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "BONUS" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "JAKARTA" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "TOTOMALI" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "HOKIDRAW" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY & HK" }
    ];
    state.kelompok = {};
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length > 0) state.kelompok[sec.title] = items;
    });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error("Error loadHitungData:", e); }
}
function tampilkanValueHitungan() {
  const result = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = '<span style="color: var(--fg-muted);">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    result.innerHTML = `<span style="font-weight: 800; text-shadow: 0 0 14px var(--neon-blue);">${item.value}</span>`;
    result.onclick = () => copyText(item.value, result);
    result.classList.add('bloom-enter');
    setTimeout(() => result.classList.remove('bloom-enter'), 500);
  }
}

// === AUTO-UPDATE ===
let autoTimeout = null;
function autoUpdateTanggal() { showAutoUpdate(); clearTimeout(autoTimeout); autoTimeout = setTimeout(manualUpdateTanggal, 1000); }
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal!");
  const p = dom.inTgl.value.split('-'); const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "⏳";
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) { localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value); dom.statTgl.textContent = "✅"; showToast("📅 Tersimpan!"); fetchPrediksi(); fetchHitung(); loadHitungData(); }
    else { dom.statTgl.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}
function autoUpdateNominal() { showAutoUpdate(); clearTimeout(autoTimeout); autoTimeout = setTimeout(manualUpdateNominal, 1000); }
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Isi nominal!");
  dom.btnNom.disabled = true; dom.statNom.textContent = "⏳";
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) { localStorage.setItem(CONFIG.keyNominal, dom.inNom.value); dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value); showToast("💰 Tersimpan!"); fetchPrediksi(); fetchHitung(); loadHitungData(); }
    else { dom.statNom.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}

// === INIT ===
function init() {
  document.querySelectorAll('.tab-chip').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active'));
    t.classList.add('active');
    dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
    dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
  });
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  fetchPrediksi(); fetchHitung(); loadHitungData();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles(); init();
  setTimeout(() => showToast('🌙 ULTRA CYBER NEON Loaded ✨🔥'), 900);
});
</script>

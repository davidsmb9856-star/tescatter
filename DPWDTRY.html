<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<meta name="description" content="PREDIKSI & HITUNG TOGEL - Premium Cyber Experience 2026">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  /* === PREMIUM NEON PALETTE === */
  --neon-cyan: #00f5ff;
  --neon-blue: #00d4ff;
  --neon-indigo: #7b61ff;
  --neon-purple: #b75cff;
  --neon-pink: #ff61d4;
  --neon-gold: #ffd700;
  --neon-green: #00ffa3;
  --neon-red: #ff4d6a;
  
  /* === DEEP SPACE BACKGROUND === */
  --bg-deep: #030712;
  --bg-surface: rgba(11, 18, 38, 0.85);
  --bg-elevated: rgba(18, 28, 58, 0.8);
  --bg-glass: rgba(22, 34, 68, 0.7);
  --bg-card: linear-gradient(145deg, rgba(15, 24, 48, 0.9), rgba(22, 35, 72, 0.85));
  
  /* === TEXT & TYPOGRAPHY === */
  --text-primary: #ffffff;
  --text-secondary: #a5b4fc;
  --text-muted: #64748b;
  --text-glow: 0 0 20px rgba(0, 212, 255, 0.4);
  
  /* === BORDERS & GLOWS === */
  --border-subtle: rgba(100, 180, 255, 0.15);
  --border-glow: rgba(0, 212, 255, 0.4);
  --border-active: rgba(0, 245, 255, 0.6);
  --glow-soft: 0 0 25px rgba(0, 212, 255, 0.25), 0 0 50px rgba(0, 212, 255, 0.1);
  --glow-medium: 0 0 35px rgba(0, 245, 255, 0.4), 0 0 70px rgba(0, 245, 255, 0.2);
  --glow-intense: 0 0 45px rgba(0, 245, 255, 0.6), 0 0 90px rgba(0, 245, 255, 0.3);
  
  /* === TRANSITIONS & ANIMATIONS === */
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-bloom: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-spring: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --duration-fast: 150ms;
  --duration-normal: 300ms;
  --duration-slow: 500ms;
  --duration-bloom: 600ms;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* === ANIMATED BACKGROUND === */
.bg-space {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(1200px 600px at 10% 10%, rgba(0, 245, 255, 0.08) 0%, transparent 60%),
    radial-gradient(900px 450px at 90% 20%, rgba(123, 97, 255, 0.06) 0%, transparent 60%),
    radial-gradient(1000px 500px at 50% 100%, rgba(0, 245, 255, 0.1) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-deep) 0%, #0a1128 50%, var(--bg-deep) 100%);
  animation: spacePulse 20s ease-in-out infinite alternate;
}
@keyframes spacePulse {
  0%, 100% { filter: hue-rotate(0deg) brightness(1); }
  50% { filter: hue-rotate(8deg) brightness(1.03); }
}

/* === MESH GRID OVERLAY === */
.mesh-grid {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    radial-gradient(1px 1px at 25px 25px, rgba(0, 245, 255, 0.15) 50%, transparent),
    radial-gradient(1px 1px at 75px 75px, rgba(123, 97, 255, 0.1) 50%, transparent);
  background-size: 100px 100px;
  animation: meshFloat 40s linear infinite;
  opacity: 0.6;
}
@keyframes meshFloat {
  0% { background-position: 0 0, 50px 50px; }
  100% { background-position: 100px 100px, 150px 150px; }
}

/* === FLOATING ORBS === */
.orb {
  position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.12;
  animation: orbFloat 35s ease-in-out infinite alternate; z-index: -1;
}
.orb-1 { width: 600px; height: 600px; background: var(--neon-cyan); top: -20%; left: -10%; animation-delay: 0s; }
.orb-2 { width: 450px; height: 450px; background: var(--neon-purple); bottom: -15%; right: -8%; animation-delay: -12s; }
.orb-3 { width: 380px; height: 380px; background: var(--neon-pink); top: 40%; left: 60%; animation-delay: -24s; }
@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(35px, -25px) scale(1.06); }
  66% { transform: translate(-20px, 30px) scale(0.95); }
  100% { transform: translate(15px, 10px) scale(1.02); }
}

/* === PARTICLE SYSTEM === */
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; width: 3px; height: 3px; border-radius: 50%;
  background: var(--neon-cyan); opacity: 0;
  animation: particleRise 25s infinite ease-in-out;
  box-shadow: 0 0 12px var(--neon-cyan), 0 0 28px var(--neon-cyan);
}
.particle:nth-child(2n) { background: var(--neon-purple); animation-delay: -8s; animation-duration: 30s; }
.particle:nth-child(3n) { background: var(--neon-pink); animation-delay: -16s; animation-duration: 35s; }
@keyframes particleRise {
  0%, 100% { transform: translateY(120vh) rotate(0deg) scale(0.8); opacity: 0; }
  10% { opacity: 0.9; }
  90% { opacity: 0.9; }
  100% { transform: translateY(-20vh) rotate(720deg) scale(1.2); opacity: 0; }
}

/* === LIGHTNING EFFECTS === */
.lightning {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: linear-gradient(180deg, transparent 45%, rgba(0, 245, 255, 0.03) 50%, transparent 55%);
  animation: lightningPulse 12s ease-in-out infinite; opacity: 0;
}
@keyframes lightningPulse {
  0%, 85%, 95%, 100% { opacity: 0; }
  90% { opacity: 1; }
}

/* === SCANLINE OVERLAY === */
.scanline {
  position: fixed; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), transparent);
  opacity: 0.7; animation: scanSweep 8s linear infinite; z-index: 100; pointer-events: none;
  filter: blur(0.5px); box-shadow: 0 0 15px var(--neon-cyan);
}
@keyframes scanSweep {
  0% { top: -2px; opacity: 0; }
  5% { opacity: 0.7; }
  95% { opacity: 0.7; }
  100% { top: 100%; opacity: 0; }
}

/* === NOISE TEXTURE === */
.noise {
  position: fixed; inset: 0; z-index: -1; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* === MAIN CONTAINER === */
.main-container {
  position: relative; z-index: 10;
  max-width: 1400px; margin: 0 auto; padding: 20px 16px;
}

/* === HEADER SECTION === */
.header-section {
  text-align: center; padding: 16px 0 24px;
  animation: headerReveal 1s var(--ease-bloom) backwards;
}
@keyframes headerReveal {
  from { opacity: 0; transform: translateY(-30px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(28px, 6vw, 48px);
  font-weight: 900; letter-spacing: 4px;
  position: relative; display: inline-block;
  background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-blue) 25%, #ffffff 50%, var(--neon-indigo) 75%, var(--neon-purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--text-glow);
  animation: titleGlow 4s ease-in-out infinite;
}
@keyframes titleGlow {
  0%, 100% { filter: brightness(1) saturate(1); }
  50% { filter: brightness(1.25) saturate(1.1); }
}

.title-decoration {
  position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
  width: 70%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), var(--neon-indigo), transparent);
  animation: lineFlow 3s ease-in-out infinite;
  box-shadow: 0 0 15px var(--neon-cyan);
}
@keyframes lineFlow {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* === STATUS BAR === */
.status-bar {
  display: flex; justify-content: center; align-items: center; gap: 20px;
  margin: 16px 0 20px; padding: 12px 24px;
  background: var(--bg-glass); border: 1px solid var(--border-subtle);
  border-radius: 20px; backdrop-filter: blur(25px);
  box-shadow: var(--glow-soft);
}
.status-item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
.status-dot {
  width: 10px; height: 10px; background: var(--neon-green); border-radius: 50%;
  animation: dotPulse 2s ease-in-out infinite;
  box-shadow: 0 0 15px var(--neon-green), 0 0 30px var(--neon-green);
}
@keyframes dotPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: 0.85; }
}
.status-label { color: var(--text-muted); font-weight: 500; }
.status-value { color: var(--neon-cyan); font-weight: 700; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; background: rgba(0, 255, 163, 0.15);
  border: 1px solid rgba(0, 255, 163, 0.4); border-radius: 14px;
  font-size: 0.75rem; color: var(--neon-green); font-weight: 600;
  animation: badgeGlow 2.5s ease-in-out infinite;
}
@keyframes badgeGlow {
  0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 163, 0.3); }
  50% { box-shadow: 0 0 22px rgba(0, 255, 163, 0.6); }
}

/* === TAB NAVIGATION === */
.tabs-wrapper {
  display: flex; justify-content: center; margin: 14px 0 22px;
}
.tabs-container {
  display: flex; gap: 6px; padding: 5px;
  background: var(--bg-glass); border: 1px solid var(--border-subtle);
  border-radius: 18px; backdrop-filter: blur(20px);
}
.tab-btn {
  padding: 11px 28px; font-family: 'Orbitron', sans-serif;
  font-weight: 600; font-size: 0.9rem; letter-spacing: 1.5px;
  color: var(--text-secondary); background: transparent; border: none;
  border-radius: 14px; cursor: pointer; transition: all var(--duration-normal) var(--ease-smooth);
  position: relative; overflow: hidden; text-transform: uppercase;
}
.tab-btn::before {
  content: ''; position: absolute; inset: 0; border-radius: 14px;
  background: linear-gradient(135deg, transparent, rgba(0, 245, 255, 0.15), transparent);
  opacity: 0; transition: opacity var(--duration-fast);
}
.tab-btn:hover { color: var(--neon-cyan); }
.tab-btn:hover::before { opacity: 1; }
.tab-btn.active {
  color: var(--bg-deep);
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
  border: 1px solid var(--neon-cyan);
  box-shadow: var(--glow-medium);
  transform: translateY(-2px);
}
.tab-btn.active::after {
  content: ''; position: absolute; bottom: -1px; left: 25%; right: 25%;
  height: 2px; background: var(--neon-cyan); border-radius: 2px;
  box-shadow: 0 0 10px var(--neon-cyan);
}

/* === CONTROL PANEL === */
.control-panel {
  background: var(--bg-card); border: 1px solid var(--border-glow);
  border-radius: 24px; padding: 20px 24px; backdrop-filter: blur(30px);
  box-shadow: var(--glow-medium); margin-bottom: 22px;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 18px; align-items: end; position: relative; overflow: hidden;
}
.control-panel::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), var(--neon-indigo), transparent);
  animation: borderGlow 3s linear infinite;
}
@keyframes borderGlow {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.control-group { display: flex; flex-direction: column; gap: 10px; }
.control-label {
  font-size: 0.85rem; color: var(--neon-cyan); font-weight: 600;
  display: flex; align-items: center; gap: 8px;
  text-shadow: 0 0 10px rgba(0, 245, 255, 0.4);
}
.control-input {
  padding: 12px 16px; background: var(--bg-deep);
  border: 1.5px solid var(--border-subtle); border-radius: 16px;
  color: var(--text-primary); font-size: 1rem; width: 100%;
  transition: all var(--duration-fast) var(--ease-smooth);
  font-family: 'Rajdhani', sans-serif; font-weight: 500;
}
.control-input::placeholder { color: var(--text-muted); opacity: 0.8; }
.control-input:focus {
  outline: none; border-color: var(--neon-cyan);
  box-shadow: var(--glow-medium); background: rgba(8, 15, 35, 0.95);
}
.control-input.auto-active {
  border-color: var(--neon-green);
  box-shadow: 0 0 18px rgba(0, 255, 163, 0.4);
}
.control-actions {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-end;
}
.btn {
  padding: 11px 22px; border-radius: 16px; font-weight: 600;
  font-size: 0.88rem; cursor: pointer; transition: all var(--duration-normal) var(--ease-bloom);
  display: inline-flex; align-items: center; gap: 8px; border: none;
  font-family: 'Rajdhani', sans-serif; letter-spacing: 0.5px;
}
.btn-ghost {
  background: var(--bg-elevated); border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
}
.btn-ghost:hover {
  background: var(--bg-glass); border-color: var(--neon-cyan);
  color: var(--neon-cyan); transform: translateY(-3px);
  box-shadow: var(--glow-soft);
}
.btn-primary {
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
  color: var(--bg-deep); font-family: 'Orbitron', sans-serif;
  font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
}
.btn-primary:hover {
  transform: translateY(-4px); box-shadow: var(--glow-intense);
}
.btn:active { transform: translateY(-1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

/* === DATA GRID LAYOUT === */
.data-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 18px;
}

/* === PREMIUM CARD DESIGN === */
.section-card {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: 22px; overflow: hidden; display: flex; flex-direction: column;
  transition: all var(--duration-bloom) var(--ease-bloom);
  backdrop-filter: blur(25px); position: relative;
}
.section-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 22px;
  padding: 1px; background: linear-gradient(135deg, transparent, rgba(0, 245, 255, 0.1), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--duration-normal);
}
.section-card:hover {
  border-color: var(--border-active);
  box-shadow: var(--glow-medium);
  transform: translateY(-6px);
}
.section-card:hover::before { opacity: 1; }
.section-card.collapsed .section-body { max-height: 0; opacity: 0; pointer-events: none; }
.section-card.collapsed .toggle-icon { transform: rotate(180deg); }

.section-head {
  padding: 15px 18px; border-bottom: 1px solid var(--border-subtle);
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; background: linear-gradient(90deg, rgba(0, 245, 255, 0.08), transparent 80%);
  transition: background var(--duration-fast);
}
.section-head:hover { background: linear-gradient(90deg, rgba(0, 245, 255, 0.12), transparent 80%); }
.section-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan);
  font-size: 1rem; display: flex; align-items: center; gap: 10px;
  text-shadow: 0 0 12px rgba(0, 245, 255, 0.5);
}
.section-meta { display: flex; align-items: center; gap: 12px; }
.count-badge {
  background: rgba(0, 245, 255, 0.15); color: var(--neon-cyan);
  padding: 4px 12px; border-radius: 18px; font-size: 0.75rem;
  font-weight: 700; border: 1px solid rgba(0, 245, 255, 0.4);
  font-family: 'Orbitron', sans-serif;
}
.toggle-icon {
  color: var(--text-muted); transition: transform var(--duration-fast);
  font-size: 0.95rem;
}

.section-body {
  padding: 0; overflow: hidden;
  transition: all var(--duration-bloom) var(--ease-bloom);
}

.search-bar {
  padding: 12px 16px; border-bottom: 1px solid var(--border-subtle);
  display: flex; gap: 10px; align-items: center;
}
.search-icon { color: var(--text-muted); font-size: 1rem; }
.search-input {
  flex: 1; padding: 10px 14px; background: var(--bg-deep);
  border: 1px solid var(--border-subtle); border-radius: 14px;
  color: var(--text-primary); font-size: 0.9rem;
  transition: all var(--duration-fast); font-family: 'Rajdhani', sans-serif;
}
.search-input:focus {
  outline: none; border-color: var(--neon-cyan);
  box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
}
.search-input::placeholder { color: var(--text-muted); }

.content-area {
  padding: 12px; overflow-y: auto; max-height: 400px;
}

/* === ITEM CARD === */
.item-card {
  background: linear-gradient(145deg, rgba(18, 30, 60, 0.85), rgba(25, 40, 78, 0.8));
  border: 1px solid var(--border-subtle); border-radius: 18px;
  padding: 14px 16px; margin-bottom: 10px; cursor: pointer;
  transition: all var(--duration-bloom) var(--ease-bloom);
  position: relative; overflow: hidden;
}
.item-card::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(120deg, transparent, rgba(0, 245, 255, 0.12), transparent);
  transition: left var(--duration-slow) var(--ease-smooth);
}
.item-card:hover::after { left: 100%; }
.item-card:hover {
  border-color: var(--border-active);
  box-shadow: var(--glow-medium);
  transform: translateY(-4px) scale(1.01);
}
.item-card.copied {
  animation: successFlash 0.5s var(--ease-bloom);
  border-color: var(--neon-green);
  box-shadow: 0 0 25px rgba(0, 255, 163, 0.5);
}
@keyframes successFlash {
  0%, 100% { transform: translateY(-4px) scale(1.01); }
  50% { transform: translateY(-6px) scale(1.02); background: rgba(0, 255, 163, 0.1); }
}
.item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.item-tag {
  font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 2px; font-weight: 600;
}
.item-name {
  color: var(--neon-cyan); font-weight: 700; font-size: 0.95rem;
  font-family: 'Orbitron', sans-serif;
}
.item-text {
  font-size: 0.9rem; color: var(--text-primary); line-height: 1.5;
  white-space: pre-wrap; word-break: break-word; opacity: 0.95;
}
.item-hint {
  font-size: 0.75rem; color: var(--neon-green); margin-top: 6px;
  display: flex; align-items: center; gap: 5px; opacity: 0.9;
}

/* === PASARAN CARD === */
.pasaran-list { display: grid; gap: 12px; }
.pasaran-card {
  background: linear-gradient(145deg, rgba(18, 30, 60, 0.85), rgba(25, 40, 78, 0.8));
  border: 1px solid var(--border-subtle); border-radius: 20px;
  overflow: hidden; transition: all var(--duration-bloom) var(--ease-bloom);
}
.pasaran-card:hover {
  border-color: var(--border-active);
  box-shadow: var(--glow-medium);
  transform: translateY(-4px);
}
.pasaran-head {
  padding: 13px 18px; border-bottom: 1px solid var(--border-subtle);
  background: linear-gradient(90deg, rgba(0, 245, 255, 0.08), transparent 80%);
}
.pasaran-name {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan);
  font-size: 0.95rem; text-shadow: 0 0 10px rgba(0, 245, 255, 0.4);
}
.bet-items { padding: 10px 14px; max-height: 280px; overflow-y: auto; }
.bet-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 13px; margin-bottom: 6px; background: var(--bg-elevated);
  border: 1px solid var(--border-subtle); border-radius: 14px;
  cursor: pointer; transition: all var(--duration-bloom) var(--ease-bloom);
}
.bet-item:hover {
  border-color: var(--border-active); background: rgba(28, 45, 88, 0.9);
  box-shadow: var(--glow-soft); transform: translateX(4px);
}
.bet-item.copied { animation: successFlash 0.5s var(--ease-bloom); }
.bet-label { color: var(--text-primary); font-size: 0.9rem; flex: 1; margin-right: 10px; font-weight: 500; }
.bet-value {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan);
  font-size: 0.9rem; background: rgba(0, 245, 255, 0.12);
  padding: 4px 11px; border-radius: 12px; border: 1px solid rgba(0, 245, 255, 0.35);
}
.bet-item:hover .bet-value {
  background: rgba(0, 245, 255, 0.22);
  box-shadow: 0 0 12px rgba(0, 245, 255, 0.4);
}

/* === SELECTOR PANEL === */
.selector-panel {
  background: var(--bg-card); border: 1px solid var(--border-glow);
  border-radius: 22px; padding: 18px 22px; margin-bottom: 20px;
  backdrop-filter: blur(25px); box-shadow: var(--glow-medium);
}
.selector-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan);
  font-size: 1.05rem; margin-bottom: 16px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; gap: 12px;
}
.chip-group { margin-bottom: 16px; }
.chip-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.82rem; font-weight: 700;
  color: var(--neon-cyan); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.chip-label::before {
  content: ''; width: 3px; height: 16px; background: var(--neon-cyan);
  border-radius: 2px; box-shadow: 0 0 8px var(--neon-cyan);
}
.chips-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 7px 16px; background: var(--bg-deep);
  border: 1.5px solid var(--border-subtle); border-radius: 24px;
  color: var(--text-secondary); font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: all var(--duration-bloom) var(--ease-bloom);
  position: relative; overflow: hidden; font-family: 'Rajdhani', sans-serif;
}
.chip:hover { color: var(--neon-cyan); border-color: var(--neon-cyan); }
.chip.active {
  color: var(--bg-deep);
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-medium);
  font-weight: 700;
}
.chip.active::after {
  content: '✓'; position: absolute; right: 11px; top: 50%;
  transform: translateY(-50%); font-size: 0.75rem; font-weight: 800;
  animation: checkAppear 0.35s var(--ease-bloom);
}
@keyframes checkAppear {
  0% { transform: translateY(-50%) scale(0); opacity: 0; }
  60% { transform: translateY(-50%) scale(1.3); opacity: 1; }
  100% { transform: translateY(-50%) scale(1); }
}

.result-box {
  margin-top: 16px; padding: 16px 20px;
  background: var(--bg-deep); border: 1.5px solid var(--border-subtle);
  border-radius: 18px; font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem; color: var(--neon-cyan); text-align: center;
  min-height: 52px; display: flex; align-items: center; justify-content: center;
  transition: all var(--duration-bloom) var(--ease-bloom); cursor: pointer;
  position: relative;
}
.result-box:hover {
  border-color: var(--border-active);
  box-shadow: var(--glow-medium);
}
.result-box.copied {
  animation: copiedPulse 0.45s var(--ease-bloom);
  border-color: var(--neon-green);
  box-shadow: 0 0 22px rgba(0, 255, 163, 0.5);
}
@keyframes copiedPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); background: rgba(0, 255, 163, 0.12); }
}
.result-box::after {
  content: '📋 Klik untuk copy'; position: absolute; bottom: -24px; left: 50%;
  transform: translateX(-50%); font-size: 0.72rem; color: var(--text-muted);
  opacity: 0; transition: opacity var(--duration-fast); white-space: nowrap;
}
.result-box:hover::after { opacity: 1; }

/* === FETCHING OVERLAY === */
.fetching-overlay {
  position: absolute; inset: 0; background: rgba(3, 7, 18, 0.92);
  backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center;
  z-index: 50; border-radius: 22px; opacity: 0; visibility: hidden;
  transition: opacity var(--duration-fast), visibility var(--duration-fast);
}
.fetching-overlay.active { opacity: 1; visibility: visible; }
.fetching-content { text-align: center; }
.fetching-spinner {
  width: 40px; height: 40px; border: 3px solid rgba(0, 245, 255, 0.2);
  border-top-color: var(--neon-cyan); border-radius: 50%;
  animation: spin 1s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.fetching-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.82rem;
  color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 2.5px;
  animation: textPulse 1.8s ease-in-out infinite;
}
@keyframes textPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

/* === TOAST NOTIFICATION === */
.toast {
  position: fixed; bottom: 26px; right: 26px;
  background: var(--bg-card); border: 1.5px solid var(--neon-cyan);
  border-radius: 20px; padding: 14px 24px;
  display: flex; align-items: center; gap: 12px;
  transform: translateX(180%); transition: all var(--duration-bloom) var(--ease-bloom);
  z-index: 2000; backdrop-filter: blur(20px);
  box-shadow: var(--glow-intense);
}
.toast.show { transform: translateX(0); }
.toast-icon { color: var(--neon-green); font-size: 20px; }
.toast-message { font-weight: 600; font-size: 0.92rem; }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-cyan), var(--neon-blue));
  border-radius: 4px; border: 2px solid var(--bg-deep);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--neon-cyan), var(--neon-indigo));
}

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .main-container { padding: 14px 12px; }
  .control-panel { grid-template-columns: 1fr; }
  .control-actions { justify-content: center; }
  .data-grid { grid-template-columns: 1fr; }
  .main-title { font-size: clamp(24px, 7vw, 40px); letter-spacing: 3px; }
  .tab-btn { padding: 10px 22px; font-size: 0.85rem; }
  .section-head { padding: 13px 16px; }
  .status-bar { flex-wrap: wrap; gap: 12px; padding: 10px 18px; }
  .chips-row { justify-content: center; }
}

/* === ACCESSIBILITY === */
::selection { background: rgba(0, 245, 255, 0.25); color: var(--text-primary); }
button:focus-visible, input:focus-visible {
  outline: 2px solid var(--neon-cyan); outline-offset: 3px;
  box-shadow: var(--glow-medium);
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), inNom: $('input-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'), toastMsg: $('toastMsg'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox'),
  fetching: $('fetchingOverlay'), lastUpdate: $('lastUpdate'),
  btnRefresh: $('btn-refresh'), btnReset: $('btn-reset')
};

let selectedTipe = '', selectedLabel = '';
let autoTimer = null;
const AUTO_DELAY = 750;

// === PARTICLE SYSTEM ===
function createParticles() {
  const container = $('particles');
  if (!container) return;
  for(let i = 0; i < 42; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 25 + 's';
    p.style.animationDuration = (20 + Math.random() * 20) + 's';
    container.appendChild(p);
  }
}

// === TOAST ===
function showToast(msg) {
  dom.toastMsg.textContent = msg;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 3200);
}

// === TIMESTAMP ===
function updateTimestamp() {
  const now = new Date();
  dom.lastUpdate.textContent = `Update: ${now.toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
}

// === FETCHING OVERLAY ===
function setFetching(active) {
  dom.fetching.classList.toggle('active', active);
  dom.btnRefresh.disabled = active;
}

// === COPY TO CLIPBOARD ===
function copyText(text, element) {
  let final = text;
  try { final = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(final).then(() => {
    const preview = final.length > 28 ? final.slice(0, 28) + '...' : final;
    showToast(`📋 Disalin: ${preview}`);
    if (element) {
      element.classList.add('copied');
      setTimeout(() => element.classList.remove('copied'), 550);
    }
  }).catch(() => showToast('❌ Gagal menyalin'));
}

// === NUMBER FORMAT ===
function fmtNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

// === CSV PARSER ===
function parseCSV(text) {
  let rows = [], row = [], cell = "", inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (!inQuote) {
      if (c === '"') inQuote = true;
      else if (c === ',') { row.push(cell); cell = ""; }
      else if (c === '\r' && next === '\n') { row.push(cell); rows.push(row); row = []; cell = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(cell); rows.push(row); row = []; cell = ""; }
      else cell += c;
    } else {
      if (c === '"' && next === '"') { cell += '"'; i++; }
      else if (c === '"') inQuote = false;
      else cell += c;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}
function get(row, idx) { return row?.[idx] ?? ""; }

// === API CALL ===
async function callAPI(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum dikonfigurasi!'); return false; }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error("API Error:", e); return false; }
}

// === AUTO-REFRESH TRIGGER ===
function triggerAuto() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(syncData, AUTO_DELAY);
}

// === MAIN SYNC FUNCTION ===
async function syncData() {
  setFetching(true);
  try {
    // Update sheet jika ada nilai
    if (dom.inTgl.value) {
      const [y, m, d] = dom.inTgl.value.split('-');
      await callAPI('updateTanggal', `${m}/${d}/${y}`);
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
    }
    if (dom.inNom.value) {
      await callAPI('updateNominal', dom.inNom.value);
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
    }
    // Fetch semua data paralel
    await Promise.all([fetchPrediksi(), fetchHitung(), loadKelompok()]);
    updateTimestamp();
    showToast('✨ Data diperbarui!');
  } catch(e) {
    console.error("Sync Error:", e);
    showToast('⚠️ Gagal memperbarui data');
  } finally {
    setFetching(false);
  }
}

// === FETCH PREDIKSI ===
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '?t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    
    if (data[0]) {
      const raw = get(data[0], 1);
      if (raw && !dom.inTgl.value) {
        const [m, d, y] = raw.split('/');
        dom.inTgl.value = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = get(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = get(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = get(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    renderPrediksi();
  } catch(e) {
    console.error("Prediksi Error:", e);
    dom.listP.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:24px;">❌ Gagal memuat data</p>';
  }
}

// === FETCH HITUNG ===
async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '?t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = get(data[0], 23);
      if (nom && !dom.inNom.value) dom.inNom.value = nom;
    }
    const sections = [
      { r:0, c:24, s:2, e:42 }, { r:43, c:24, s:45, e:80 },
      { r:81, c:24, s:83, e:119 }, { r:120, c:24, s:122, e:153 },
      { r:154, c:24, s:156, e:179 }, { r:180, c:24, s:182, e:213 },
      { r:215, c:24, s:217, e:248 }, { r:249, c:24, s:251, e:282 },
      { r:283, c:24, s:285, e:316 }
    ];
    state.hitung = sections.map(sec => {
      const title = get(data[sec.r], sec.c) || "PASARAN";
      const items = [];
      for (let i = sec.s; i <= sec.e && i < data.length; i++) {
        if (data[i]) {
          const type = get(data[i], 23), val = get(data[i], 24);
          if (type || val) items.push({ type, val });
        }
      }
      return { title, items };
    }).filter(s => s.items.length);
    renderHitung();
  } catch(e) {
    console.error("Hitung Error:", e);
    dom.contH.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:24px;">❌ Gagal memuat data</p>';
  }
}

// === RENDER LIST ===
function renderList(container, items, query) {
  const filtered = items.filter(i => i.content.toLowerCase().includes(query.toLowerCase()));
  if (!filtered.length) {
    container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:24px;">📭 Tidak ada data</p>';
    return;
  }
  container.innerHTML = filtered.map(v => `
    <div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}', this)">
      <div class="item-header">
        <span class="item-tag">Judul</span>
        <span class="item-name">${v.title}</span>
      </div>
      <div class="item-text">${v.content}</div>
      <div class="item-hint"><i class="fas fa-copy"></i> Klik untuk copy</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) {
    dom.contH.innerHTML = '<p style="color:var(--text-muted);text-align:center;">📭 Tidak ada data</p>';
    return;
  }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-card">
      <div class="pasaran-head">
        <span class="pasaran-name">🎯 ${s.title}</span>
      </div>
      <div class="bet-items">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.val)}', this)">
            <span class="bet-label">${it.type}</span>
            <span class="bet-value">${it.val}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// === CHIP SELECTOR ===
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + 
    items.map(it => `<div class="chip" data-value="${it.label || it}">${(it.label || it).slice(0, 20)}${(it.label || it).length > 20 ? '...' : ''}</div>`).join('');
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (type === 'tipe') { selectedTipe = chip.dataset.value; updateLabelChips(); }
      else { selectedLabel = chip.dataset.value; }
    };
  });
}

function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) {
    renderChips(dom.chipLabel, [], 'label'); return;
  }
  const labels = state.kelompok[selectedTipe].map(i => i.label);
  renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}

async function loadKelompok() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '?t=' + Date.now());
    const data = parseCSV(await res.text());
    const sections = [
      { r:0, c:24, s:2, e:42, t:"SEMUA PASARAN" }, { r:43, c:24, s:45, e:80, t:"TOTO MACAU 4D" },
      { r:81, c:24, s:83, e:119, t:"TOTO MACAU 5D" }, { r:120, c:24, s:122, e:153, t:"KINGKONG 4D" },
      { r:154, c:24, s:156, e:179, t:"BONUS" }, { r:180, c:24, s:182, e:213, t:"JAKARTA" },
      { r:215, c:24, s:217, e:248, t:"TOTOMALI" }, { r:249, c:24, s:251, e:282, t:"HOKIDRAW" },
      { r:283, c:24, s:285, e:316, t:"SYDNEY & HK" }
    ];
    state.kelompok = {};
    sections.forEach(sec => {
      const items = [];
      for (let i = sec.s; i <= sec.e && i < data.length; i++) {
        if (data[i]) {
          const label = get(data[i], 23), value = get(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length) state.kelompok[sec.t] = items;
    });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error("Kelompok Error:", e); }
}

function showResult() {
  const box = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    box.innerHTML = '<span style="color: var(--text-muted);">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    box.innerHTML = `<span style="font-weight:700;">${item.value}</span>`;
    box.onclick = () => copyText(item.value, box);
  }
}

// === CARD TOGGLE ===
function toggleCard(id) {
  $(id)?.classList.toggle('collapsed');
}

// === EVENT SETUP ===
function setupEvents() {
  // Auto-refresh triggers
  dom.inTgl.addEventListener('change', triggerAuto);
  dom.inNom.addEventListener('change', triggerAuto);
  
  // Local search (no server call)
  dom.srcP.addEventListener('input', () => renderList(dom.listP, state.prediksi, dom.srcP.value));
  dom.srcJ.addEventListener('input', () => renderList(dom.listJ, state.jadwal, dom.srcJ.value));
  dom.srcL.addEventListener('input', () => renderList(dom.listL, state.link, dom.srcL.value));
  
  // Quick actions
  dom.btnRefresh.addEventListener('click', syncData);
  dom.btnReset.addEventListener('click', () => {
    dom.inTgl.value = ''; dom.inNom.value = '';
    selectedTipe = ''; selectedLabel = '';
    dom.chipTipe.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    dom.chipLabel.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    dom.chipTipe.querySelector('[data-value=""]')?.classList.add('active');
    dom.chipLabel.querySelector('[data-value=""]')?.classList.add('active');
    dom.resultBox.innerHTML = '<span style="color: var(--text-muted);">Pilih tipe & label untuk melihat hasil</span>';
    syncData();
  });
  
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      dom.tabP.style.display = tab === 'prediksi' ? 'block' : 'none';
      dom.tabH.style.display = tab === 'hitung' ? 'block' : 'none';
    };
  });
  
  // Result box copy
  dom.resultBox.onclick = () => {
    const txt = dom.resultBox.textContent.trim();
    if (txt && !txt.includes('Pilih')) copyText(txt, dom.resultBox);
  };
}

// === INIT ===
function init() {
  setupEvents();
  // Load saved values
  const savedTgl = localStorage.getItem(CONFIG.keyTanggal);
  const savedNom = localStorage.getItem(CONFIG.keyNominal);
  if (savedTgl) dom.inTgl.value = savedTgl;
  if (savedNom) { dom.inNom.value = savedNom; dom.inNom.dispatchEvent(new Event('change')); }
  // Initial fetch
  syncData();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  init();
  setTimeout(() => showToast('✨ Premium Cyber Core Loaded'), 1400);
});

// Close modals on backdrop click
document.querySelectorAll('.fetching-overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('active'); });
});

// ESC key handler
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.fetching-overlay').forEach(o => o.classList.remove('active'));
});
</script>
</body>
</html>

<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>

<style>
:root {
--neon-blue: #00d4ff; --neon-blue-dark: #0099cc; --neon-blue-light: #66e5ff;
--neon-electric: #00ffff; --neon-purple: #7b2fff; --neon-gold: #ffd700;
--neon-green: #00ff9d; --neon-red: #ff3e6c; --bg-deep: #020408;
--bg-surface: rgba(5, 15, 35, 0.9); --bg-elevated: rgba(10, 25, 55, 0.8);
--bg-glass: rgba(8, 20, 45, 0.7); --text-primary: #ffffff;
--text-secondary: #8ab4f8; --text-dim: #54689a;
--border-glow: rgba(0, 212, 255, 0.6);
--glow-blue: 0 0 15px rgba(0, 212, 255, 0.6), 0 0 35px rgba(0, 212, 255, 0.4);
--glow-electric: 0 0 20px rgba(0, 255, 255, 0.7), 0 0 50px rgba(0, 255, 255, 0.4);
--transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
--transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
--transition-bloom: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif; background: var(--bg-deep);
color: var(--text-primary); min-height: 100vh; overflow-x: hidden;
position: relative; line-height: 1.5;
}
.bg-canvas {
position: fixed; inset: 0; z-index: -3;
background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
radial-gradient(ellipse at 80% 15%, rgba(0, 255, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 50% 85%, rgba(123, 47, 255, 0.1) 0%, transparent 50%);
animation: bgPulse 15s ease-in-out infinite alternate;
}
@keyframes bgPulse { 0%, 100% { opacity: 1; filter: hue-rotate(0deg); } 50% { opacity: 0.9; filter: hue-rotate(15deg); } }
.grid-overlay {
position: fixed; inset: 0; z-index: -2;
background-image: linear-gradient(rgba(0, 212, 255, 0.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.06) 1px, transparent 1px);
background-size: 50px 50px; mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 75%);
animation: gridMove 30s linear infinite;
}
@keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 50px 50px; } }
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
position: absolute; width: 4px; height: 4px; background: var(--neon-blue);
border-radius: 50%; opacity: 0.7; animation: particleFloat 20s infinite ease-in-out;
box-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-electric);
}
.particle:nth-child(2n) { background: var(--neon-electric); box-shadow: 0 0 20px var(--neon-electric); animation-delay: -5s; animation-duration: 25s; }
.particle:nth-child(3n) { background: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple); animation-delay: -10s; animation-duration: 30s; }
@keyframes particleFloat {
0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
10% { opacity: 0.7; } 90% { opacity: 0.7; }
100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}
.lightning-overlay { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0; animation: lightningFlash 8s infinite; }
@keyframes lightningFlash { 0%, 89%, 91%, 93%, 100% { opacity: 0; } 90%, 92% { opacity: 0.15; } }
.lightning-bolt {
position: absolute; width: 3px; height: 100vh;
background: linear-gradient(180deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
filter: blur(2px); animation: lightningStrike 8s infinite;
}
.lightning-bolt:nth-child(1) { left: 15%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 2s; }
.lightning-bolt:nth-child(3) { left: 85%; animation-delay: 4s; }
@keyframes lightningStrike { 0%, 89%, 91%, 93%, 100% { transform: scaleY(0); opacity: 0; } 90%, 92% { transform: scaleY(1); opacity: 1; } }
.scanline {
position: fixed; left: 0; right: 0; height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
opacity: 0.8; animation: scanLine 6s linear infinite; z-index: 100; pointer-events: none;
filter: blur(1px); box-shadow: 0 0 20px var(--neon-blue);
}
@keyframes scanLine { 0% { top: -3px; opacity: 0; } 5% { opacity: 0.8; } 95% { opacity: 0.8; } 100% { top: 100%; opacity: 0; } }
.noise {
position: fixed; inset: 0; z-index: -1; opacity: 0.03;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
pointer-events: none;
}
.main-container { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 28px 20px; }
.header-section { text-align: center; padding: 18px 0 24px; animation: headerEntrance 1s var(--transition-bloom) backwards; }
@keyframes headerEntrance { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
.main-title {
font-family: 'Orbitron', sans-serif; font-size: clamp(28px, 6vw, 48px);
font-weight: 900; letter-spacing: 4px; position: relative;
background: linear-gradient(135deg, var(--neon-electric) 0%, var(--neon-blue) 35%, #ffffff 50%, var(--neon-blue-light) 70%, var(--neon-purple) 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
text-shadow: 0 0 50px rgba(0, 212, 255, 0.5); animation: titleShimmer 3s ease-in-out infinite;
}
@keyframes titleShimmer { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }
.main-title::after {
content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
width: 60%; height: 2px; background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
animation: linePulse 2.5s ease-in-out infinite; opacity: 0.8; box-shadow: 0 0 12px var(--neon-electric);
}
@keyframes linePulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
.tabs-container {
display: flex; justify-content: center; gap: 10px; margin: 12px 0 22px;
background: var(--bg-glass); border: 1px solid var(--border-glow);
border-radius: 18px; padding: 5px; max-width: fit-content; margin-inline: auto;
}
.tab-chip {
padding: 11px 26px; font-family: 'Orbitron', sans-serif; font-weight: 600; font-size: 0.9rem;
color: var(--text-secondary); background: transparent; border: none; border-radius: 14px;
cursor: pointer; transition: var(--transition-bloom); position: relative;
text-transform: uppercase; letter-spacing: 2px;
}
.tab-chip:hover { color: var(--neon-electric); }
.tab-chip.active {
color: var(--bg-deep); background: linear-gradient(135deg, var(--neon-electric), var(--neon-blue));
border: 1px solid var(--neon-electric); box-shadow: var(--glow-electric);
}
.content-box {

border-radius: 24px; padding: 22px; backdrop-filter: blur(30px);
position: relative; overflow: hidden; box-shadow: var(--glow-blue);
}
.content-box::before {
content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
animation: borderFlow 2.5s linear infinite; box-shadow: 0 0 12px var(--neon-electric);
}
@keyframes borderFlow { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.settings-panel {
background: var(--bg-elevated); border: 1px solid rgba(0, 212, 255, 0.25);
border-radius: 20px; padding: 16px 20px; margin-bottom: 20px;
display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
}
.setting-item { display: flex; align-items: center; gap: 10px; }
.setting-label {
color: var(--neon-blue); font-size: 0.85rem; font-weight: 600;
text-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
}
.input-neon {
padding: 10px 14px; background: var(--bg-deep);
border: 1px solid rgba(0, 212, 255, 0.35); border-radius: 14px;
color: var(--text-primary); font-size: 0.95rem; width: 165px;
transition: var(--transition-fast); font-family: 'Rajdhani', sans-serif;
}
.input-neon:focus {
outline: none; border-color: var(--neon-electric); box-shadow: var(--glow-electric);
background: rgba(7, 18, 42, 0.9);
}
.btn-neon {
padding: 10px 22px; background: linear-gradient(135deg, var(--neon-electric), var(--neon-blue));
border: none; border-radius: 16px; color: var(--bg-deep); font-family: 'Orbitron', sans-serif;
font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: var(--transition-bloom);
white-space: nowrap; text-transform: uppercase; letter-spacing: 2px; position: relative; overflow: hidden;
}
.btn-neon::before {
content: ''; position: absolute; inset: 0; border-radius: 16px;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
opacity: 0; transition: opacity 0.2s;
}
.btn-neon:hover::before { opacity: 1; }
.btn-neon:hover { transform: translateY(-4px); box-shadow: var(--glow-electric); }
.btn-neon:active { transform: translateY(0); }
.btn-neon:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.status-badge {
font-size: 0.82rem; color: var(--neon-green); margin-left: 8px; font-weight: 600;
text-shadow: 0 0 10px rgba(0, 255, 157, 0.5); animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.75; } }
.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; }
.section-box {
background: var(--bg-glass); border: 1px solid rgba(0, 212, 255, 0.3);
border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;
transition: var(--transition-bloom); backdrop-filter: blur(20px);
}
.section-box:hover { border-color: var(--neon-electric); box-shadow: var(--glow-electric); transform: translateY(-6px); }
.section-header {
background: linear-gradient(90deg, rgba(0, 212, 255, 0.12), transparent 75%);
padding: 12px 16px; border-bottom: 1px solid rgba(0, 212, 255, 0.25);
display: flex; justify-content: space-between; align-items: center;
}
.section-title {
font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-electric);
font-size: 1rem; text-shadow: 0 0 12px rgba(0, 255, 255, 0.6); letter-spacing: 1px;
}
.badge-count {
background: rgba(0, 255, 255, 0.15); color: var(--neon-electric);
padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
border: 1px solid rgba(0, 255, 255, 0.4);
}
.search-box { padding: 10px 14px; border-bottom: 1px solid rgba(0, 212, 255, 0.2); }
.search-input {
width: 100%; padding: 9px 13px; background: var(--bg-deep);
border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 12px;
color: var(--text-primary); font-size: 0.9rem; transition: var(--transition-fast);
font-family: 'Rajdhani', sans-serif;
}
.search-input:focus { outline: none; border-color: var(--neon-electric); box-shadow: var(--glow-electric); }
.search-input::placeholder { color: var(--text-secondary); opacity: 0.7; }
.section-content { padding: 10px; overflow-y: auto; max-height: 420px; flex-grow: 1; }
.item-card {
background: linear-gradient(135deg, rgba(8, 20, 45, 0.7), rgba(12, 28, 58, 0.6));
border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 16px;
padding: 13px 15px; margin-bottom: 9px; cursor: pointer; transition: var(--transition-bloom);
position: relative; overflow: hidden;
}
.item-card::before {
content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
background: linear-gradient(120deg, transparent, rgba(0, 212, 255, 0.15), transparent);
transition: left 0.7s ease;
}
.item-card:hover::before { left: 100%; }
.item-card:hover {
border-color: var(--neon-electric); box-shadow: var(--glow-electric);
transform: translateY(-5px) scale(1.02);
}
.item-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 3px; font-weight: 600; }
.item-title { color: var(--neon-electric); font-weight: 700; margin-bottom: 4px; font-size: 0.95rem; font-family: 'Orbitron', sans-serif; }
.item-content { font-size: 0.88rem; color: var(--text-primary); line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
.pasaran-box {
background: var(--bg-glass); border: 1px solid rgba(0, 212, 255, 0.3);
border-radius: 18px; overflow: hidden; margin-bottom: 11px;
transition: var(--transition-bloom); backdrop-filter: blur(20px);
}
.pasaran-box:hover { border-color: var(--neon-electric); box-shadow: var(--glow-electric); }
.pasaran-header {
background: linear-gradient(90deg, rgba(0, 212, 255, 0.12), transparent 75%);
padding: 11px 15px; border-bottom: 1px solid rgba(0, 212, 255, 0.25);
}
.pasaran-title {
font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-electric);
font-size: 0.92rem; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
}
.pasaran-content { padding: 8px 12px; max-height: 340px; overflow-y: auto; }
.bet-item {
display: flex; justify-content: space-between; align-items: center;
padding: 9px 13px; margin-bottom: 6px; background: var(--bg-elevated);
border: 1px solid rgba(0, 212, 255, 0.25); border-radius: 12px;
cursor: pointer; transition: var(--transition-bloom);
}
.bet-item:hover {
border-color: var(--neon-electric); background: rgba(10, 28, 62, 0.8);
box-shadow: var(--glow-electric); transform: translateX(4px);
}
.bet-type { color: var(--text-primary); font-size: 0.88rem; flex: 1; margin-right: 10px; font-weight: 500; }
.bet-result {
font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-electric);
font-size: 0.88rem; background: rgba(0, 255, 255, 0.12);
padding: 4px 10px; border-radius: 10px; border: 1px solid rgba(0, 255, 255, 0.35);
}
.bet-item:hover .bet-result {
background: rgba(0, 255, 255, 0.2); box-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
}
.neon-selector {
background: var(--bg-elevated); border: 1px solid rgba(0, 212, 255, 0.25);
border-radius: 20px; padding: 18px; margin: 18px 0; backdrop-filter: blur(20px);
}
.selector-header {
display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
padding-bottom: 14px; border-bottom: 1px solid rgba(0, 212, 255, 0.25);
}
.selector-icon { font-size: 1.4rem; animation: iconFloat 3s ease-in-out infinite; }
@keyframes iconFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
.selector-title {
font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-electric);
font-size: 1.05rem; text-shadow: 0 0 12px rgba(0, 255, 255, 0.6);
}
.chip-group { margin-bottom: 14px; }
.chip-label {
font-family: 'Orbitron', sans-serif; font-size: 0.82rem; font-weight: 700;
color: var(--neon-electric); margin-bottom: 9px; display: flex; align-items: center; gap: 7px;
}
.chip-label::before {
content: ''; width: 3px; height: 16px; background: var(--neon-electric);
border-radius: 2px; box-shadow: 0 0 8px var(--neon-electric);
}
.chips-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
padding: 7px 16px; background: var(--bg-deep);
border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 24px;
color: var(--text-secondary); font-size: 0.85rem; font-weight: 600;
cursor: pointer; transition: var(--transition-bloom);
position: relative; overflow: hidden; font-family: 'Rajdhani', sans-serif;
}
.chip:hover { color: var(--neon-electric); border-color: var(--neon-electric); }
.chip.active {
color: var(--bg-deep); background: linear-gradient(135deg, var(--neon-electric), var(--neon-blue));
border-color: var(--neon-electric); box-shadow: var(--glow-electric); font-weight: 700;
}
.chip.active::after {
content: '✓'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
font-size: 0.75rem; font-weight: 800; animation: checkPop 0.3s var(--transition-bloom);
}
@keyframes checkPop { 0% { transform: translateY(-50%) scale(0); } 70% { transform: translateY(-50%) scale(1.3); } 100% { transform: translateY(-50%) scale(1); } }
.result-box {
margin-top: 16px; padding: 16px 20px;
background: var(--bg-elevated); border: 1px solid rgba(0, 212, 255, 0.35);
border-radius: 16px; font-family: 'Orbitron', sans-serif; font-size: 1.1rem;
color: var(--neon-electric); text-align: center; min-height: 52px;
display: flex; align-items: center; justify-content: center;
transition: var(--transition-bloom); cursor: pointer;
}
.result-box:hover { border-color: var(--neon-electric); box-shadow: var(--glow-electric); }
.result-box.copied {
animation: copiedFlash 0.4s var(--transition-bloom);
border-color: var(--neon-green); box-shadow: 0 0 20px rgba(0, 255, 157, 0.5);
}
@keyframes copiedFlash {
0% { transform: scale(1); }
50% { transform: scale(1.03); background: rgba(0, 255, 157, 0.15); }
100% { transform: scale(1); }
}
.hitung-row { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: end; margin-top: 8px; }
.hitung-btn {
padding: 11px 24px; background: linear-gradient(135deg, var(--neon-electric), var(--neon-blue));
border: none; border-radius: 16px; color: var(--bg-deep); font-family: 'Orbitron', sans-serif;
font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: var(--transition-bloom);
white-space: nowrap; text-transform: uppercase; letter-spacing: 2px;
}
.hitung-btn:hover { transform: translateY(-4px); box-shadow: var(--glow-electric); }
.hitung-btn:active { transform: translateY(0); }
.toast {
position: fixed; bottom: 26px; right: 26px; background: var(--bg-surface);
border: 1px solid var(--neon-electric); border-radius: 18px; padding: 14px 24px;
display: flex; align-items: center; gap: 12px; transform: translateX(160%);
transition: var(--transition-bloom); z-index: 2000; backdrop-filter: blur(15px);
}
.toast.show { transform: translateX(0); }
.toast-icon { color: var(--neon-green); font-size: 20px; }
.toast-text { font-weight: 600; font-size: 0.9rem; }
.spinner {

@keyframes spin { to { transform: rotate(360deg); } }
.auto-update-indicator {
position: fixed; top: 16px; right: 16px;

}
.auto-update-indicator.show { display: flex; }
@keyframes pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue));

@media (max-width: 768px) {

.settings-panel { flex-direction: column; align-items: stretch; }
.setting-item { width: 100%; justify-content: space-between; }
.input-neon { width: 100%; }
.data-grid { grid-template-columns: 1fr; }
.main-title { font-size: clamp(24px, 7vw, 38px); letter-spacing: 2px; }
.tab-chip { padding: 10px 20px; font-size: 0.85rem; }
.hitung-row { grid-template-columns: 1fr; gap: 12px; }
.hitung-btn { width: 100%; }
.chips-row { justify-content: center; }
}
::selection { background: rgba(0, 212, 255, 0.25); color: var(--text-primary); }
button:focus-visible, input:focus-visible { outline: 2px solid var(--neon-electric); outline-offset: 2px; box-shadow: var(--glow-electric); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }

</head>

<div class="bg-canvas"></div><div class="grid-overlay"></div><div class="noise"></div>
<div class="particles" id="particles"></div>
<div class="lightning-overlay"><div class="lightning-bolt"></div><div class="lightning-bolt"></div><div class="lightning-bolt"></div></div>

          <input type="date" id="input-tanggal" class="input-neon" onchange="autoUpdateTanggal()">
        </div>
        <button class="btn-neon" id="btn-tanggal" onclick="manualUpdateTanggal()"><i class="fas fa-bolt"></i> Update</button>
        <span class="status-badge" id="status-tanggal"></span>
      </div>

      <div class="data-grid">
        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title"><i class="fas fa-crystal-ball"></i> Prediksi</h3>
            <span class="badge-count" id="count-prediksi">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-prediksi" placeholder="🔍 Cari...">
          </div>
          <div class="section-content" id="list-prediksi">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title"><i class="fas fa-calendar-check"></i> Jadwal</h3>
            <span class="badge-count" id="count-jadwal">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-jadwal" placeholder="🔍 Cari...">
          </div>
          <div class="section-content" id="list-jadwal">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title"><i class="fas fa-link"></i> Link Live</h3>
            <span class="badge-count" id="count-link">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-link" placeholder="🔍 Cari...">
          </div>
          <div class="section-content" id="list-link">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB HITUNG -->
    <div id="tab-hitung" class="tab-content" style="display:none;">
      <div class="settings-panel">
        <div class="setting-item">
          <span class="setting-label"><i class="fas fa-coins"></i> Nominal</span>
          <input type="number" id="input-nominal" class="input-neon" placeholder="0" onchange="autoUpdateNominal()">
        </div>
        <button class="btn-neon" id="btn-nominal" onclick="manualUpdateNominal()"><i class="fas fa-bolt"></i> Update</button>
        <span class="status-badge" id="status-nominal"></span>
      </div>

      <div class="neon-selector">
        <div class="selector-header">
          <span class="selector-icon"><i class="fas fa-bullseye"></i></span>
          <h3 class="selector-title">Pilih Hitungan</h3>
        </div>
        
        <div class="chip-group">
          <div class="chip-label"><i class="fas fa-layer-group"></i> Tipe Hitungan</div>
          <div class="chips-row" id="chipTipe">
            <div class="chip" data-value="">Semua</div>
          </div>
        </div>
        
        <div class="chip-group">
          <div class="chip-label"><i class="fas fa-tag"></i> Pilih Label</div>
          <div class="chips-row" id="chipLabel">
            <div class="chip" data-value="">Semua</div>
          </div>
        </div>
        
        <div class="hitung-row">
          <button onclick="tampilkanValueHitungan()" class="hitung-btn"><i class="fas fa-magic"></i> Tampilkan Hasil</button>
        </div>
        
        <div id="resultBox" class="result-box">
          <span style="color: var(--text-secondary);">Pilih tipe & label untuk melihat hasil</span>
        </div>
      </div>

      <div class="data-grid" id="container-hitung" style="margin-top: 14px;">
        <div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'), toastMsg: $('toastMessage'),
  autoUpdate: $('autoUpdateIndicator'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};

let selectedTipe = '', selectedLabel = '';

// Particles
function createParticles() {
  const container = $('particles');
  if (!container) return;
  for(let i = 0; i < 45; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 20 + 's';
    p.style.animationDuration = (15 + Math.random() * 20) + 's';
    container.appendChild(p);
  }
}

function showToast(msg) {
  dom.toastMsg.textContent = msg;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 3000);
}

function showAutoUpdate() {
  if (dom.autoUpdate) {
    dom.autoUpdate.classList.add('show');
    setTimeout(() => dom.autoUpdate.classList.remove('show'), 1600);
  }
}

function copyText(text, element) {
  let finalText = text;
  try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 20 ? finalText.substring(0, 20) + '...' : finalText;
    showToast('📋 Disalin: ' + preview);
    if (element) {
      element.classList.add('copied');
      setTimeout(() => element.classList.remove('copied'), 400);
    }
  }).catch(() => showToast('❌ Gagal salin'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

function parseCSV(text) {
  let p = [], row = [], entry = "", st = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(entry); entry = ""; }
      else if (c === '\r' && n === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { entry += '"'; i++; }
      else if (c === '"') st = 0;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); p.push(row); }
  return p;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error("Fetch Error:", e); return false; }
}

async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = dom.inTgl.value;
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    renderPrediksi();
  } catch(e) {
    console.error("Error Prediksi:", e);
    dom.listP.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:20px;">❌ Gagal memuat</p>';
  }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 }, { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 }, { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 }, { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 }, { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    state.hitung = secDef.map(s => {
      let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
      let items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), res = safeGet(data[i], 24);
          if (type || res) items.push({ type, res });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) {
    console.error("Error Hitung:", e);
    dom.contH.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:20px;">❌ Gagal memuat</p>';
  }
}

function renderList(container, items, search) {
  const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!filtered.length) { container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:20px;">📭 Tidak ada data</p>'; return; }
  container.innerHTML = filtered.map(v => `
    <div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}', this)">
      <div class="item-label">📋 Judul</div>
      <div class="item-title">${v.title}</div>
      <div class="item-label">💬 Isi (Klik untuk Copy)</div>
      <div class="item-content">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<p style="color:var(--text-secondary);text-align:center;">📭 Tidak ada data</p>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-box">
      <div class="pasaran-header"><h3 class="pasaran-title">🎯 ${s.title}</h3></div>
      <div class="pasaran-content">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}', this)">
            <span class="bet-type">${it.type}</span>
            <span class="bet-result">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// === NEON CHIP SELECTOR FUNCTIONS ===
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + 
    items.map(it => `<div class="chip" data-value="${it.label || it}">${(it.label || it).substring(0, 20)}${(it.label || it).length > 20 ? '...' : ''}</div>`).join('');
  
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (type === 'tipe') {
        selectedTipe = chip.dataset.value;
        updateLabelChips();
      } else {
        selectedLabel = chip.dataset.value;
      }
    };
  });
}

function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) {
    renderChips(dom.chipLabel, [], 'label');
    return;
  }
  const labels = state.kelompok[selectedTipe].map(i => i.label);
  renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "SEMUA PASARAN" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "BONUS" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "JAKARTA" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "TOTOMALI" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "HOKIDRAW" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY & HK" }
    ];
    state.kelompok = {};
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length > 0) state.kelompok[sec.title] = items;
    });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error("Error loadHitungData:", e); }
}

function tampilkanValueHitungan() {
  const result = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = '<span style="color: var(--text-secondary);">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    result.innerHTML = `<span style="font-weight: 700;">${item.value}</span>`;
    result.onclick = () => copyText(item.value, result);
  }
}

// === AUTO-UPDATE ===
let autoTimeout = null;
function autoUpdateTanggal() {
  showAutoUpdate();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateTanggal, 1000);
}
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal!");
  const p = dom.inTgl.value.split('-');
  const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "⏳...";
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = "✅ OK";
      showToast("📅 Tersimpan!");
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statTgl.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}
function autoUpdateNominal() {
  showAutoUpdate();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateNominal, 1000);
}
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Isi nominal!");
  dom.btnNom.disabled = true; dom.statNom.textContent = "⏳...";
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value);
      showToast("💰 Tersimpan!");
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statNom.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}

function init() {
  document.querySelectorAll('.tab-chip').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active'));
    t.classList.add('active');
    dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
    dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
  });
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  fetchPrediksi(); fetchHitung(); loadHitungData();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  init();
  setTimeout(() => showToast('🌙 Cyber Core Loaded'), 1000);
});
</script>
</body>
</html>

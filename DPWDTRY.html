<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<meta name="description" content="PREDIKSI & HITUNG TOGEL - Cyber Core 2026 Premium">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== CYBER CORE 2026 - PREMIUM THEME ===== */
:root {
  /* Neon Palette */
  --neon-cyan: #00f5ff; --neon-cyan-dim: #00b8cc; --neon-cyan-glow: rgba(0, 245, 255, 0.6);
  --neon-blue: #00d4ff; --neon-blue-dim: #0099cc; --neon-blue-glow: rgba(0, 212, 255, 0.5);
  --neon-purple: #8a2fff; --neon-purple-dim: #5a1fcc; --neon-purple-glow: rgba(138, 47, 255, 0.4);
  --neon-pink: #ff2a8c; --neon-pink-dim: #cc1a6e; --neon-pink-glow: rgba(255, 42, 140, 0.4);
  --neon-gold: #ffd700; --neon-gold-glow: rgba(255, 215, 0, 0.5);
  --neon-green: #00ff9d; --neon-green-glow: rgba(0, 255, 157, 0.5);
  
  /* Base Colors */
  --bg-deep: #01030a; --bg-surface: rgba(6, 12, 32, 0.85); --bg-card: rgba(10, 20, 48, 0.75);
  --bg-elevated: rgba(14, 28, 62, 0.8); --bg-glass: rgba(8, 18, 44, 0.65);
  
  /* Text */
  --text-primary: #ffffff; --text-secondary: #9fb8d9; --text-muted: #64748b; --text-dim: #475569;
  
  /* Borders & Glow */
  --border-subtle: rgba(0, 212, 255, 0.25); --border-focus: rgba(0, 245, 255, 0.6);
  --glow-soft: 0 0 12px rgba(0, 212, 255, 0.4), 0 0 28px rgba(0, 212, 255, 0.2);
  --glow-medium: 0 0 18px rgba(0, 245, 255, 0.6), 0 0 42px rgba(0, 245, 255, 0.3);
  --glow-intense: 0 0 24px rgba(0, 245, 255, 0.8), 0 0 56px rgba(0, 245, 255, 0.4), 0 0 84px rgba(138, 47, 255, 0.2);
  
  /* Transitions */
  --ease-fast: cubic-bezier(0.4, 0, 0.2, 1); --ease-bloom: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 180ms; --dur-smooth: 320ms; --dur-bloom: 520ms;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Rajdhani', system-ui, sans-serif;
  background: var(--bg-deep); color: var(--text-primary);
  min-height: 100vh; overflow-x: hidden; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

/* ===== BACKGROUND LAYERS ===== */
.bg-gradient {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(1200px 600px at 15% 10%, rgba(0, 245, 255, 0.12), transparent 60%),
    radial-gradient(900px 500px at 85% 20%, rgba(138, 47, 255, 0.1), transparent 60%),
    radial-gradient(1000px 700px at 50% 95%, rgba(0, 212, 255, 0.14), transparent 60%),
    linear-gradient(180deg, var(--bg-deep) 0%, #020614 45%, var(--bg-deep) 100%);
  animation: gradientShift 25s ease-in-out infinite;
}
@keyframes gradientShift {
  0%, 100% { filter: hue-rotate(0deg) brightness(1); }
  33% { filter: hue-rotate(8deg) brightness(1.02); }
  66% { filter: hue-rotate(-6deg) brightness(0.98); }
}

.bg-grid {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, black 25%, transparent 80%);
  animation: gridDrift 40s linear infinite;
}
@keyframes gridDrift { 0% { background-position: 0 0; } 100% { background-position: 48px 48px; } }

.orb {
  position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.08;
  animation: orbFloat 45s ease-in-out infinite alternate; z-index: -1;
}
.orb-1 { width: 800px; height: 800px; background: var(--neon-cyan); top: -25%; left: -10%; animation-delay: 0s; }
.orb-2 { width: 600px; height: 600px; background: var(--neon-purple); bottom: -20%; right: -8%; animation-delay: -22s; }
.orb-3 { width: 400px; height: 400px; background: var(--neon-pink); top: 40%; left: 60%; animation-delay: -11s; opacity: 0.06; }
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(35px, -22px) scale(1.06); }
}

.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; width: 3px; height: 3px; border-radius: 50%;
  background: var(--neon-cyan); opacity: 0;
  animation: particleRise 28s infinite ease-in-out;
  box-shadow: 0 0 10px var(--neon-cyan), 0 0 24px var(--neon-cyan-glow);
}
.particle:nth-child(2n) { background: var(--neon-blue); animation-delay: -9s; animation-duration: 32s; }
.particle:nth-child(3n) { background: var(--neon-purple); animation-delay: -18s; animation-duration: 36s; }
@keyframes particleRise {
  0%, 100% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
  12% { opacity: 0.85; }
  88% { opacity: 0.85; }
  100% { transform: translateY(-20vh) rotate(630deg); opacity: 0; }
}

.lightning {
  position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0;
  animation: lightningFlicker 12s infinite;
}
@keyframes lightningFlicker {
  0%, 88%, 91%, 94%, 100% { opacity: 0; }
  89%, 92% { opacity: 0.12; }
}
.lightning-bolt {
  position: absolute; width: 2px; height: 100vh;
  background: linear-gradient(180deg, transparent, var(--neon-cyan), var(--neon-blue), transparent);
  filter: blur(1.5px); animation: boltStrike 12s infinite;
}
.lightning-bolt:nth-child(1) { left: 18%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 52%; animation-delay: 3s; }
.lightning-bolt:nth-child(3) { left: 82%; animation-delay: 6s; }
@keyframes boltStrike {
  0%, 88%, 91%, 94%, 100% { transform: scaleY(0); opacity: 0; }
  89%, 92% { transform: scaleY(1); opacity: 1; }
}

.scanline {
  position: fixed; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), transparent);
  opacity: 0.7; animation: scanSweep 7s linear infinite; z-index: 100; pointer-events: none;
  filter: blur(0.5px); box-shadow: 0 0 16px var(--neon-cyan);
}
@keyframes scanSweep { 0% { top: -2px; opacity: 0; } 6% { opacity: 0.7; } 94% { opacity: 0.7; } 100% { top: 100%; opacity: 0; } }

.noise {
  position: fixed; inset: 0; z-index: -1; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* ===== LAYOUT ===== */
.app-wrapper { position: relative; z-index: 10; max-width: 1480px; margin: 0 auto; padding: 20px 16px; }

/* ===== HEADER ===== */
.app-header {
  text-align: center; padding: 18px 0 22px;
  animation: headerSlideIn 0.8s var(--ease-bloom) backwards;
}
@keyframes headerSlideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

.app-title {
  font-family: 'Orbitron', sans-serif; font-size: clamp(24px, 5.2vw, 42px);
  font-weight: 900; letter-spacing: 2.5px; position: relative; display: inline-block;
  background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-blue) 30%, #fff 50%, var(--neon-blue) 70%, var(--neon-purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: 0 0 40px rgba(0, 212, 255, 0.45); animation: titleGlow 3.5s ease-in-out infinite;
}
@keyframes titleGlow { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.25); } }
.app-title::after {
  content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
  width: 50%; height: 2px; background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), transparent);
  animation: lineGlow 2.8s ease-in-out infinite; opacity: 0.9; box-shadow: 0 0 10px var(--neon-cyan);
}
@keyframes lineGlow { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

.status-pill {
  display: inline-flex; align-items: center; gap: 8px; margin-top: 14px;
  padding: 7px 18px; background: rgba(0, 245, 255, 0.12);
  border: 1px solid rgba(0, 245, 255, 0.45); border-radius: 100px;
  font-size: 0.8rem; font-weight: 600; color: var(--neon-cyan);
  text-transform: uppercase; letter-spacing: 2px;
  animation: pulsePill 2.2s ease-in-out infinite;
  box-shadow: 0 0 20px rgba(0, 245, 255, 0.25), inset 0 0 18px rgba(0, 245, 255, 0.08);
}
@keyframes pulsePill { 0%, 100% { box-shadow: 0 0 20px rgba(0, 245, 255, 0.25); } 50% { box-shadow: 0 0 32px rgba(0, 245, 255, 0.5); } }
.status-dot {
  width: 7px; height: 7px; background: var(--neon-green); border-radius: 50%;
  animation: dotPulse 1.4s ease-in-out infinite; box-shadow: 0 0 14px var(--neon-green);
}
@keyframes dotPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.4); } }

/* ===== TABS ===== */
.tab-nav {
  display: flex; justify-content: center; gap: 6px; margin: 14px 0 20px;
  background: var(--bg-glass); border: 1px solid var(--border-subtle);
  border-radius: 14px; padding: 4px; max-width: fit-content; margin-inline: auto;
  backdrop-filter: blur(20px);
}
.tab-btn {
  padding: 10px 24px; font-family: 'Orbitron', sans-serif; font-weight: 600; font-size: 0.86rem;
  color: var(--text-muted); background: transparent; border: none; border-radius: 11px;
  cursor: pointer; transition: all var(--dur-smooth) var(--ease-fast);
  text-transform: uppercase; letter-spacing: 1.2px; position: relative;
}
.tab-btn::before {
  content: ''; position: absolute; inset: 0; border-radius: 11px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0, 245, 255, 0.3), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--dur-fast);
}
.tab-btn:hover { color: var(--neon-cyan); }
.tab-btn:hover::before { opacity: 1; }
.tab-btn.active {
  color: var(--bg-deep); background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
  border: 1px solid var(--neon-cyan); box-shadow: var(--glow-medium);
  transform: translateY(-1px);
}

/* ===== CONTROL BAR ===== */
.control-bar {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: 20px; padding: 16px 20px; margin-bottom: 18px;
  backdrop-filter: blur(28px); box-shadow: var(--glow-soft);
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px;
  align-items: end; position: relative; overflow: hidden;
}
.control-bar::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), transparent);
  animation: borderGlow 3s linear infinite;
}
@keyframes borderGlow { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

.ctrl-group { display: flex; flex-direction: column; gap: 7px; }
.ctrl-label {
  font-size: 0.78rem; color: var(--neon-blue); font-weight: 600;
  display: flex; align-items: center; gap: 5px; text-shadow: 0 0 7px rgba(0, 212, 255, 0.5);
}
.ctrl-input {
  padding: 10px 13px; background: var(--bg-deep);
  border: 1px solid rgba(0, 212, 255, 0.32); border-radius: 13px;
  color: var(--text-primary); font-size: 0.92rem; width: 100%;
  transition: all var(--dur-fast); font-family: 'Rajdhani', sans-serif;
}
.ctrl-input:focus {
  outline: none; border-color: var(--neon-cyan); box-shadow: var(--glow-medium);
  background: rgba(5, 14, 36, 0.92);
}
.ctrl-input.auto-active { border-color: var(--neon-green); box-shadow: 0 0 14px rgba(0, 255, 157, 0.45); }

.ctrl-actions { display: flex; gap: 9px; flex-wrap: wrap; justify-content: flex-end; }
.btn {
  padding: 9px 17px; background: var(--bg-elevated); border: 1px solid var(--border-subtle);
  border-radius: 13px; color: var(--text-primary); font-size: 0.8rem;
  cursor: pointer; transition: all var(--dur-bloom) var(--ease-bloom);
  display: flex; align-items: center; gap: 5px; font-family: 'Rajdhani', sans-serif; font-weight: 500;
}
.btn:hover { background: var(--bg-glass); border-color: var(--neon-cyan); box-shadow: var(--glow-soft); transform: translateY(-3px); }
.btn.primary {
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
  color: var(--bg-deep); border: none; font-weight: 600; font-family: 'Orbitron', sans-serif;
}
.btn.primary:hover { box-shadow: var(--glow-medium); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

.auto-badge {
  display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px;
  background: rgba(0, 255, 157, 0.14); border: 1px solid rgba(0, 255, 157, 0.42);
  border-radius: 10px; font-size: 0.7rem; color: var(--neon-green);
  font-weight: 600; animation: badgePulse 2s ease-in-out infinite;
}
@keyframes badgePulse { 0%, 100% { box-shadow: 0 0 7px rgba(0, 255, 157, 0.3); } 50% { box-shadow: 0 0 14px rgba(0, 255, 157, 0.6); } }

/* ===== DATA GRID ===== */
.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 16px; }

/* ===== SECTION CARD ===== */
.section {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;
  transition: all var(--dur-bloom) var(--ease-bloom); backdrop-filter: blur(24px);
  animation: cardEntrance 0.5s var(--ease-bloom) backwards;
}
.section:nth-child(1) { animation-delay: 0.1s; } .section:nth-child(2) { animation-delay: 0.15s; } .section:nth-child(3) { animation-delay: 0.2s; }
@keyframes cardEntrance { from { opacity: 0; transform: translateY(25px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
.section:hover { border-color: var(--neon-cyan); box-shadow: var(--glow-medium); transform: translateY(-5px); }
.section.collapsed .section-body { max-height: 0; padding: 0 14px; opacity: 0; }
.section.collapsed .toggle { transform: rotate(180deg); }

.section-head {
  background: linear-gradient(90deg, rgba(0, 245, 255, 0.1), transparent 70%);
  padding: 13px 16px; border-bottom: 1px solid var(--border-subtle);
  display: flex; justify-content: space-between; align-items: center; cursor: pointer;
  transition: background var(--dur-fast);
}
.section-head:hover { background: linear-gradient(90deg, rgba(0, 245, 255, 0.16), transparent 70%); }
.section-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan);
  font-size: 0.96rem; text-shadow: 0 0 9px rgba(0, 245, 255, 0.5);
  display: flex; align-items: center; gap: 7px;
}
.section-meta { display: flex; align-items: center; gap: 9px; }
.count-badge {
  background: rgba(0, 245, 255, 0.14); color: var(--neon-cyan);
  padding: 3px 10px; border-radius: 16px; font-size: 0.7rem; font-weight: 700;
  border: 1px solid rgba(0, 245, 255, 0.38);
}
.toggle { color: var(--text-muted); transition: transform var(--dur-fast); font-size: 0.85rem; }

.search-bar { padding: 9px 14px; border-bottom: 1px solid var(--border-subtle); }
.search-field {
  width: 100%; padding: 8px 12px; background: var(--bg-deep);
  border: 1px solid rgba(0, 212, 255, 0.28); border-radius: 11px;
  color: var(--text-primary); font-size: 0.86rem; transition: all var(--dur-fast);
  font-family: 'Rajdhani', sans-serif;
}
.search-field:focus { outline: none; border-color: var(--neon-cyan); box-shadow: var(--glow-soft); }
.search-field::placeholder { color: var(--text-muted); opacity: 0.75; }

.section-body { padding: 10px 13px; overflow-y: auto; max-height: 390px; flex-grow: 1; transition: all var(--dur-bloom); }

/* ===== ITEM CARD ===== */
.item {
  background: linear-gradient(135deg, rgba(9, 19, 44, 0.72), rgba(13, 26, 56, 0.64));
  border: 1px solid var(--border-subtle); border-radius: 15px;
  padding: 12px 14px; margin-bottom: 8px; cursor: pointer;
  transition: all var(--dur-bloom) var(--ease-bloom); position: relative; overflow: hidden;
  animation: itemStagger 0.4s var(--ease-bloom) backwards;
}
.item:nth-child(1) { animation-delay: 0.05s; } .item:nth-child(2) { animation-delay: 0.1s; } .item:nth-child(3) { animation-delay: 0.15s; }
.item:nth-child(4) { animation-delay: 0.2s; } .item:nth-child(5) { animation-delay: 0.25s; } .item:nth-child(6) { animation-delay: 0.3s; }
@keyframes itemStagger { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
.item::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(120deg, transparent, rgba(0, 245, 255, 0.12), transparent);
  transition: left 0.65s ease;
}
.item:hover::before { left: 100%; }
.item:hover {
  border-color: var(--neon-cyan); box-shadow: var(--glow-medium);
  transform: translateY(-4px) scale(1.012);
}
.item.copied { animation: flashSuccess 0.45s var(--ease-bloom); border-color: var(--neon-green); }
@keyframes flashSuccess { 0%, 100% { box-shadow: var(--glow-medium); } 50% { box-shadow: 0 0 28px rgba(0, 255, 157, 0.75); } }

.item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.item-kicker { font-size: 0.66rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.6px; font-weight: 600; }
.item-heading { color: var(--neon-cyan); font-weight: 700; font-size: 0.9rem; font-family: 'Orbitron', sans-serif; }
.item-text { font-size: 0.84rem; color: var(--text-primary); line-height: 1.4; white-space: pre-wrap; word-break: break-word; opacity: 0.96; }
.item-hint {
  font-size: 0.7rem; color: var(--neon-green); margin-top: 5px;
  display: flex; align-items: center; gap: 4px; opacity: 0.9;
}

/* ===== HITUNG TAB ===== */
.selector {
  background: var(--bg-elevated); border: 1px solid var(--border-subtle);
  border-radius: 19px; padding: 16px 19px; margin: 13px 0; backdrop-filter: blur(24px);
}
.selector-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan);
  font-size: 0.98rem; margin-bottom: 13px; padding-bottom: 11px;
  border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 9px;
}
.chip-set { margin-bottom: 13px; }
.chip-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.78rem; font-weight: 700;
  color: var(--neon-cyan); margin-bottom: 7px; display: flex; align-items: center; gap: 5px;
}
.chip-label::before {
  content: ''; width: 2.5px; height: 13px; background: var(--neon-cyan);
  border-radius: 1.5px; box-shadow: 0 0 6px var(--neon-cyan);
}
.chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 5px 13px; background: var(--bg-deep);
  border: 1px solid rgba(0, 212, 255, 0.28); border-radius: 20px;
  color: var(--text-muted); font-size: 0.8rem; font-weight: 600;
  cursor: pointer; transition: all var(--dur-bloom);
  position: relative; overflow: hidden; font-family: 'Rajdhani', sans-serif;
}
.chip:hover { color: var(--neon-cyan); border-color: var(--neon-cyan); }
.chip.active {
  color: var(--bg-deep); background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
  border-color: var(--neon-cyan); box-shadow: var(--glow-medium); font-weight: 700;
}
.chip.active::after {
  content: '✓'; position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-size: 0.68rem; font-weight: 800; animation: chipCheck 0.28s var(--ease-bloom);
}
@keyframes chipCheck { 0% { transform: translateY(-50%) scale(0); opacity: 0; } 70% { transform: translateY(-50%) scale(1.22); opacity: 1; } 100% { transform: translateY(-50%) scale(1); } }

.result-box {
  margin-top: 13px; padding: 14px 18px;
  background: var(--bg-deep); border: 1px solid rgba(0, 212, 255, 0.34);
  border-radius: 15px; font-family: 'Orbitron', sans-serif; font-size: 1.02rem;
  color: var(--neon-cyan); text-align: center; min-height: 46px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--dur-bloom); cursor: pointer; position: relative;
}
.result-box:hover { border-color: var(--neon-cyan); box-shadow: var(--glow-medium); }
.result-box.copied { animation: resultFlash 0.4s var(--ease-bloom); border-color: var(--neon-green); box-shadow: 0 0 20px rgba(0, 255, 157, 0.55); }
@keyframes resultFlash { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.022); background: rgba(0, 255, 157, 0.11); } }
.result-box::after {
  content: '📋 Klik untuk copy'; position: absolute; bottom: -21px; left: 50%;
  transform: translateX(-50%); font-size: 0.68rem; color: var(--text-muted);
  opacity: 0; transition: opacity var(--dur-fast); white-space: nowrap;
}
.result-box:hover::after { opacity: 1; }

.pasaran-list { display: grid; grid-template-columns: 1fr; gap: 11px; }
.pasaran {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: 17px; overflow: hidden; transition: all var(--dur-bloom); backdrop-filter: blur(20px);
}
.pasaran:hover { border-color: var(--neon-cyan); box-shadow: var(--glow-medium); }
.pasaran-head {
  background: linear-gradient(90deg, rgba(0, 245, 255, 0.1), transparent 70%);
  padding: 10px 14px; border-bottom: 1px solid var(--border-subtle);
}
.pasaran-name {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan);
  font-size: 0.88rem; text-shadow: 0 0 8px rgba(0, 245, 255, 0.5);
}
.bet-list { padding: 7px 11px; max-height: 270px; overflow-y: auto; }
.bet {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 10px; margin-bottom: 5px; background: var(--bg-elevated);
  border: 1px solid var(--border-subtle); border-radius: 11px;
  cursor: pointer; transition: all var(--dur-bloom);
}
.bet:hover { border-color: var(--neon-cyan); background: rgba(11, 27, 60, 0.82); box-shadow: var(--glow-soft); transform: translateX(3px); }
.bet.copied { animation: flashSuccess 0.45s var(--ease-bloom); }
.bet-label { color: var(--text-primary); font-size: 0.84rem; flex: 1; margin-right: 7px; font-weight: 500; }
.bet-value {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan);
  font-size: 0.84rem; background: rgba(0, 245, 255, 0.11);
  padding: 3px 8px; border-radius: 9px; border: 1px solid rgba(0, 245, 255, 0.34);
}
.bet:hover .bet-value { background: rgba(0, 245, 255, 0.19); box-shadow: 0 0 9px rgba(0, 245, 255, 0.42); }

/* ===== FETCHING OVERLAY ===== */
.fetching {
  position: absolute; inset: 0; background: rgba(1, 3, 10, 0.88);
  backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center;
  z-index: 50; border-radius: 20px; opacity: 0; visibility: hidden;
  transition: opacity var(--dur-fast), visibility var(--dur-fast);
}
.fetching.active { opacity: 1; visibility: visible; }
.spinner {
  width: 34px; height: 34px; border: 3px solid rgba(0, 212, 255, 0.24);
  border-top-color: var(--neon-cyan); border-radius: 50%;
  animation: spin 1s linear infinite; margin-bottom: 11px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.fetching-text {
  font-family: 'Orbitron', sans-serif; font-size: 0.78rem; color: var(--neon-cyan);
  text-transform: uppercase; letter-spacing: 1.8px; animation: textPulse 1.4s ease-in-out infinite;
}
@keyframes textPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.72; } }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 22px; right: 22px; background: var(--bg-surface);
  border: 1px solid var(--neon-cyan); border-radius: 17px; padding: 12px 20px;
  display: flex; align-items: center; gap: 9px; transform: translateX(170%);
  transition: transform var(--dur-bloom) var(--ease-bloom); z-index: 2000;
  backdrop-filter: blur(18px); box-shadow: var(--glow-medium);
}
.toast.show { transform: translateX(0); }
.toast-icon { color: var(--neon-green); font-size: 17px; }
.toast-msg { font-weight: 600; font-size: 0.86rem; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-cyan), var(--neon-blue));
  border-radius: 4px; border: 2px solid var(--bg-deep);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--neon-cyan), var(--neon-blue-dim));
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .app-wrapper { padding: 14px 11px; }
  .control-bar { grid-template-columns: 1fr; }
  .ctrl-actions { justify-content: center; }
  .data-grid { grid-template-columns: 1fr; }
  .app-title { font-size: clamp(20px, 6.2vw, 34px); letter-spacing: 1.8px; }
  .tab-btn { padding: 9px 20px; font-size: 0.82rem; }
  .section-head { padding: 11px 14px; }
  .chip-row { justify-content: center; }
}

/* ===== ACCESSIBILITY ===== */
::selection { background: rgba(0, 212, 255, 0.28); color: var(--text-primary); }
button:focus-visible, input:focus-visible {
  outline: 2px solid var(--neon-cyan); outline-offset: 2px; box-shadow: var(--glow-medium);
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ===== UTILS ===== */
.hidden { display: none !important; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
</style>
</head>
<body>
<div class="bg-gradient"></div><div class="bg-grid"></div>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="particles" id="particles"></div>
<div class="lightning"><div class="lightning-bolt"></div><div class="lightning-bolt"></div><div class="lightning-bolt"></div></div>
<div class="scanline"></div><div class="noise"></div>
<div id="toast" class="toast"><i class="fas fa-check-circle toast-icon"></i><span class="toast-msg" id="toastText">Berhasil!</span></div>

<div class="app-wrapper">
  <header class="app-header">
    <h1 class="app-title">⚡ PREDIKSI & HITUNG TOGEL ⚡</h1>
    <div class="status-pill"><span class="status-dot"></span><span>System Online</span></div>
  </header>

  <nav class="tab-nav" role="tablist">
    <button class="tab-btn active" data-tab="prediksi" role="tab" aria-selected="true"><i class="fas fa-crystal-ball"></i> Prediksi</button>
    <button class="tab-btn" data-tab="hitung" role="tab" aria-selected="false"><i class="fas fa-calculator"></i> Hitung</button>
  </nav>

  <div class="control-bar">
    <div class="ctrl-group">
      <label class="ctrl-label" for="input-tanggal"><i class="fas fa-calendar-alt"></i> Tanggal</label>
      <input type="date" id="input-tanggal" class="ctrl-input auto-active" aria-label="Pilih tanggal">
    </div>
    <div class="ctrl-group">
      <label class="ctrl-label" for="input-nominal"><i class="fas fa-coins"></i> Nominal</label>
      <input type="number" id="input-nominal" class="ctrl-input auto-active" placeholder="0" min="0" aria-label="Masukkan nominal">
    </div>
    <div class="ctrl-actions">
      <button class="btn" id="btn-refresh" title="Refresh semua data"><i class="fas fa-sync-alt"></i> Refresh</button>
      <button class="btn" id="btn-reset" title="Reset filter"><i class="fas fa-undo"></i> Reset</button>
      <span class="auto-badge"><i class="fas fa-bolt"></i> Auto</span>
    </div>
    <div class="fetching" id="fetching" aria-live="polite">
      <div style="text-align:center"><div class="spinner"></div><div class="fetching-text">Updating...</div></div>
    </div>
  </div>

  <!-- TAB: PREDIKSI -->
  <div id="tab-prediksi" class="tab-panel" role="tabpanel" aria-labelledby="tab-prediksi-btn">
    <div class="data-grid">
      <section class="section" id="sec-prediksi">
        <div class="section-head" onclick="toggleSection('sec-prediksi')" role="button" tabindex="0" aria-expanded="true">
          <h3 class="section-title"><i class="fas fa-crystal-ball"></i> Prediksi</h3>
          <div class="section-meta">
            <span class="count-badge" id="cnt-prediksi">0</span>
            <i class="fas fa-chevron-up toggle" aria-hidden="true"></i>
          </div>
        </div>
        <div class="search-bar"><input type="text" class="search-field" id="srch-prediksi" placeholder="🔍 Cari..." aria-label="Cari prediksi"></div>
        <div class="section-body" id="lst-prediksi"><div style="display:flex;justify-content:center;padding:20px"><div class="spinner"></div></div></div>
      </section>

      <section class="section" id="sec-jadwal">
        <div class="section-head" onclick="toggleSection('sec-jadwal')" role="button" tabindex="0" aria-expanded="true">
          <h3 class="section-title"><i class="fas fa-calendar-check"></i> Jadwal</h3>
          <div class="section-meta">
            <span class="count-badge" id="cnt-jadwal">0</span>
            <i class="fas fa-chevron-up toggle" aria-hidden="true"></i>
          </div>
        </div>
        <div class="search-bar"><input type="text" class="search-field" id="srch-jadwal" placeholder="🔍 Cari..." aria-label="Cari jadwal"></div>
        <div class="section-body" id="lst-jadwal"><div style="display:flex;justify-content:center;padding:20px"><div class="spinner"></div></div></div>
      </section>

      <section class="section" id="sec-link">
        <div class="section-head" onclick="toggleSection('sec-link')" role="button" tabindex="0" aria-expanded="true">
          <h3 class="section-title"><i class="fas fa-link"></i> Link Live</h3>
          <div class="section-meta">
            <span class="count-badge" id="cnt-link">0</span>
            <i class="fas fa-chevron-up toggle" aria-hidden="true"></i>
          </div>
        </div>
        <div class="search-bar"><input type="text" class="search-field" id="srch-link" placeholder="🔍 Cari..." aria-label="Cari link"></div>
        <div class="section-body" id="lst-link"><div style="display:flex;justify-content:center;padding:20px"><div class="spinner"></div></div></div>
      </section>
    </div>
  </div>

  <!-- TAB: HITUNG -->
  <div id="tab-hitung" class="tab-panel hidden" role="tabpanel" aria-labelledby="tab-hitung-btn">
    <div class="selector">
      <h3 class="selector-title"><i class="fas fa-bullseye"></i> Pilih Hitungan</h3>
      <div class="chip-set">
        <div class="chip-label"><i class="fas fa-layer-group"></i> Tipe</div>
        <div class="chip-row" id="chipTipe"><div class="chip active" data-value="">Semua</div></div>
      </div>
      <div class="chip-set">
        <div class="chip-label"><i class="fas fa-tag"></i> Label</div>
        <div class="chip-row" id="chipLabel"><div class="chip active" data-value="">Semua</div></div>
      </div>
      <div class="result-box" id="resultBox" role="button" tabindex="0" aria-label="Hasil perhitungan, klik untuk copy">
        <span style="color:var(--text-muted)">Pilih tipe & label untuk melihat hasil</span>
      </div>
    </div>
    <div class="pasaran-list" id="lst-hitung"><div style="display:flex;justify-content:center;padding:40px"><div class="spinner"></div></div></div>
  </div>
</div>

<script>
/* ===== CYBER CORE 2026 - PREMIUM LOGIC ===== */
const CONFIG = {
  script: 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec',
  sheets: {
    prediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
    hitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'
  },
  keys: { tgl: 'togel_tgl_v4', nom: 'togel_nom_v4' }
};
const state = { p: [], j: [], l: [], h: [], grp: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabs: { p: $('tab-prediksi'), h: $('tab-hitung') },
  inputs: { tgl: $('input-tanggal'), nom: $('input-nominal') },
  search: { p: $('srch-prediksi'), j: $('srch-jadwal'), l: $('srch-link') },
  lists: { p: $('lst-prediksi'), j: $('lst-jadwal'), l: $('lst-link'), h: $('lst-hitung') },
  counts: { p: $('cnt-prediksi'), j: $('cnt-jadwal'), l: $('cnt-link') },
  chips: { tipe: $('chipTipe'), label: $('chipLabel') },
  result: $('resultBox'), toast: $('toast'), toastMsg: $('toastText'),
  fetching: $('fetching'), btn: { refresh: $('btn-refresh'), reset: $('btn-reset') }
};
let selTipe = '', selLabel = '', autoTimer = null;
const AUTO_DELAY = 750;

/* ===== PARTICLES ===== */
function spawnParticles() {
  const c = $('particles'); if (!c) return;
  for (let i = 0; i < 42; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 28 + 's';
    p.style.animationDuration = (20 + Math.random() * 16) + 's';
    c.appendChild(p);
  }
}

/* ===== UI HELPERS ===== */
function toast(msg) { dom.toastMsg.textContent = msg; dom.toast.classList.add('show'); setTimeout(() => dom.toast.classList.remove('show'), 2800); }
function setFetching(on) { dom.fetching.classList.toggle('active', on); dom.btn.refresh.disabled = on; }
function formatID(n) { return new Intl.NumberFormat('id-ID').format(n); }
function copy(txt, el) {
  const clean = (() => { try { return decodeURIComponent(txt); } catch { return txt; }})();
  navigator.clipboard.writeText(clean).then(() => {
    toast('📋 ' + (clean.length > 22 ? clean.slice(0,22)+'…' : clean));
    if (el) { el.classList.add('copied'); setTimeout(() => el.classList.remove('copied'), 480); }
  }).catch(() => toast('❌ Gagal copy'));
}

/* ===== CSV PARSER ===== */
function parseCSV(t) {
  let r = [], row = [], cell = '', st = 0;
  for (let i = 0; i < t.length; i++) {
    const c = t[i], n = t[i+1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\r' && n === '\n') { row.push(cell); r.push(row); row = []; cell = ''; i++; }
      else if (c === '\n' || c === '\r') { row.push(cell); r.push(row); row = []; cell = ''; }
      else cell += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { cell += '"'; i++; }
      else if (c === '"') st = 0;
      else cell += c;
    }
  }
  if (cell || row.length) { row.push(cell); r.push(row); }
  return r;
}
const get = (row, idx) => row?.[idx] ?? '';

/* ===== API ===== */
async function sync(action, val) {
  if (CONFIG.script.includes('YOUR_SCRIPT_ID')) return false;
  try {
    const res = await fetch(`${CONFIG.script}?${new URLSearchParams({ action, value: val })}`);
    return (await res.text()).includes('SUCCESS');
  } catch { return false; }
}

/* ===== AUTO-REFRESH CORE ===== */
function trigger() { clearTimeout(autoTimer); autoTimer = setTimeout(refreshAll, AUTO_DELAY); }
async function refreshAll() {
  setFetching(true);
  try {
    if (dom.inputs.tgl.value) {
      const [y,m,d] = dom.inputs.tgl.value.split('-');
      await sync('updateTanggal', `${m}/${d}/${y}`);
      localStorage.setItem(CONFIG.keys.tgl, dom.inputs.tgl.value);
    }
    if (dom.inputs.nom.value) {
      await sync('updateNominal', dom.inputs.nom.value);
      localStorage.setItem(CONFIG.keys.nom, dom.inputs.nom.value);
    }
    await Promise.all([loadPrediksi(), loadHitung(), buildGroups()]);
    toast('🔄 Data diperbarui');
  } catch { toast('⚠️ Gagal refresh'); }
  finally { setFetching(false); }
}

/* ===== DATA LOADERS ===== */
async function loadPrediksi() {
  try {
    const data = parseCSV(await (await fetch(CONFIG.sheets.prediksi + '?t=' + Date.now())).text());
    state.p = state.j = state.l = [];
    if (data[0]) {
      const raw = get(data[0], 1);
      if (raw) { const [m,d,y] = raw.split('/'); if (!dom.inputs.tgl.value) dom.inputs.tgl.value = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) { const t = get(data[i],1); if (t) state.p.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    for (let i = 2; i <= 55 && i < data.length; i++) { const t = get(data[i],2); if (t) state.j.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    for (let i = 56; i <= 82 && i < data.length; i++) { const t = get(data[i],2); if (t) state.l.push({ title: t.split(/[\s,]+/)[0], content: t }); }
    renderPrediksi();
  } catch { dom.lists.p.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">❌ Gagal load</p>'; }
}

async function loadHitung() {
  try {
    const data = parseCSV(await (await fetch(CONFIG.sheets.hitung + '?t=' + Date.now())).text());
    if (data[0] && !dom.inputs.nom.value) { const n = get(data[0],23); if (n) dom.inputs.nom.value = n; }
    const defs = [{r:0,c:24,s:2,e:42},{r:43,c:24,s:45,e:80},{r:81,c:24,s:83,e:119},{r:120,c:24,s:122,e:153},{r:154,c:24,s:156,e:179},{r:180,c:24,s:182,e:213},{r:215,c:24,s:217,e:248},{r:249,c:24,s:251,e:282},{r:283,c:24,s:285,e:316}];
    state.h = defs.map(d => {
      const title = get(data[d.r], d.c) || 'PASARAN', items = [];
      for (let i = d.s; i <= d.e && i < data.length; i++) {
        if (data[i]) { const t = get(data[i],23), v = get(data[i],24); if (t||v) items.push({ t, v }); }
      }
      return { title, items };
    }).filter(x => x.items.length);
    renderHitung();
  } catch { dom.lists.h.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">❌ Gagal load</p>'; }
}

/* ===== RENDERERS ===== */
function renderList(container, items, query) {
  const filtered = items.filter(i => i.content.toLowerCase().includes(query.toLowerCase()));
  if (!filtered.length) { container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">📭 Kosong</p>'; return; }
  container.innerHTML = filtered.map((v,idx) => `
    <div class="item" style="animation-delay:${idx*0.04}s" onclick="copy('${encodeURIComponent(v.content)}',this)" tabindex="0" role="button">
      <div class="item-top"><span class="item-kicker">Judul</span><span class="item-heading">${v.title}</span></div>
      <div class="item-text">${v.content}</div>
      <div class="item-hint"><i class="fas fa-copy"></i> Klik untuk copy</div>
    </div>`).join('');
}
function renderPrediksi() {
  renderList(dom.lists.p, state.p, dom.search.p.value);
  renderList(dom.lists.j, state.j, dom.search.j.value);
  renderList(dom.lists.l, state.l, dom.search.l.value);
  dom.counts.p.textContent = state.p.length; dom.counts.j.textContent = state.j.length; dom.counts.l.textContent = state.l.length;
}
function renderHitung() {
  if (!state.h.length) { dom.lists.h.innerHTML = '<p style="color:var(--text-muted);text-align:center">📭 Kosong</p>'; return; }
  dom.lists.h.innerHTML = state.h.map(s => `
    <div class="pasaran">
      <div class="pasaran-head"><span class="pasaran-name">🎯 ${s.title}</span></div>
      <div class="bet-list">
        ${s.items.map(it => `<div class="bet" onclick="copy('${encodeURIComponent(it.v)}',this)" tabindex="0" role="button"><span class="bet-label">${it.t}</span><span class="bet-value">${it.v}</span></div>`).join('')}
      </div>
    </div>`).join('');
}

/* ===== CHIP SELECTOR ===== */
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip active" data-value="">Semua</div>' + items.map(it => {
    const val = it.label || it, txt = val.length > 17 ? val.slice(0,17)+'…' : val;
    return `<div class="chip" data-value="${val}">${txt}</div>`;
  }).join('');
  container.querySelectorAll('.chip').forEach(chip => chip.onclick = () => {
    container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    if (type === 'tipe') { selTipe = chip.dataset.value; updateLabelChips(); }
    else selLabel = chip.dataset.value;
  });
}
function updateLabelChips() {
  if (!selTipe || !state.grp[selTipe]) { renderChips(dom.chips.label, [], 'label'); return; }
  renderChips(dom.chips.label, state.grp[selTipe].map(i => ({ label: i.label })), 'label');
}
async function buildGroups() {
  try {
    const data = parseCSV(await (await fetch(CONFIG.sheets.hitung + '?t=' + Date.now())).text());
    const defs = [
      {r:0,c:24,s:2,e:42,t:'SEMUA PASARAN'},{r:43,c:24,s:45,e:80,t:'TOTO MACAU 4D'},{r:81,c:24,s:83,e:119,t:'TOTO MACAU 5D'},
      {r:120,c:24,s:122,e:153,t:'KINGKONG 4D'},{r:154,c:24,s:156,e:179,t:'BONUS'},{r:180,c:24,s:182,e:213,t:'JAKARTA'},
      {r:215,c:24,s:217,e:248,t:'TOTOMALI'},{r:249,c:24,s:251,e:282,t:'HOKIDRAW'},{r:283,c:24,s:285,e:316,t:'SYDNEY & HK'}
    ];
    state.grp = {};
    defs.forEach(d => {
      const items = [];
      for (let i = d.s; i <= d.e && i < data.length; i++) {
        if (data[i]) { const l = get(data[i],23), v = get(data[i],24); if (l||v) items.push({ label: l||'-', value: v||'-' }); }
      }
      if (items.length) state.grp[d.t] = items;
    });
    renderChips(dom.chips.tipe, Object.keys(state.grp).map(t => ({ label: t })), 'tipe');
  } catch {}
}
function showResult() {
  const box = dom.result;
  if (!selTipe || !selLabel || !state.grp[selTipe]) { box.innerHTML = '<span style="color:var(--text-muted)">Pilih tipe & label</span>'; return; }
  const item = state.grp[selTipe].find(i => i.label === selLabel);
  if (item) { box.innerHTML = `<span style="font-weight:700">${item.value}</span>`; box.onclick = () => copy(item.value, box); }
}

/* ===== INTERACTIONS ===== */
function toggleSection(id) { $(id)?.classList.toggle('collapsed'); }
function setupEvents() {
  // Auto-refresh triggers
  dom.inputs.tgl.onchange = trigger; dom.inputs.nom.onchange = trigger;
  // Local search
  dom.search.p.oninput = () => renderList(dom.lists.p, state.p, dom.search.p.value);
  dom.search.j.oninput = () => renderList(dom.lists.j, state.j, dom.search.j.value);
  dom.search.l.oninput = () => renderList(dom.lists.l, state.l, dom.search.l.value);
  // Actions
  dom.btn.refresh.onclick = refreshAll;
  dom.btn.reset.onclick = () => {
    dom.inputs.tgl.value = ''; dom.inputs.nom.value = ''; selTipe = selLabel = '';
    dom.chips.tipe.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    dom.chips.label.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    dom.chips.tipe.querySelector('[data-value=""]').classList.add('active');
    dom.chips.label.querySelector('[data-value=""]').classList.add('active');
    dom.result.innerHTML = '<span style="color:var(--text-muted)">Pilih tipe & label untuk melihat hasil</span>';
    refreshAll();
  };
  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
    btn.classList.add('active'); btn.setAttribute('aria-selected','true');
    const tab = btn.dataset.tab;
    dom.tabs.p.classList.toggle('hidden', tab !== 'prediksi');
    dom.tabs.h.classList.toggle('hidden', tab !== 'hitung');
  });
  // Result copy
  dom.result.onclick = () => { const t = dom.result.textContent.trim(); if (t && !t.includes('Pilih')) copy(t, dom.result); };
  // Keyboard nav for sections
  document.querySelectorAll('.section-head').forEach(head => {
    head.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleSection(head.parentElement.id); }};
  });
  // Keyboard nav for copyable items
  document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.activeElement?.classList.contains('item')) document.activeElement.click(); });
}

/* ===== INIT ===== */
function init() {
  setupEvents();
  const tgl = localStorage.getItem(CONFIG.keys.tgl), nom = localStorage.getItem(CONFIG.keys.nom);
  if (tgl) dom.inputs.tgl.value = tgl;
  if (nom) { dom.inputs.nom.value = nom; setTimeout(trigger, 100); }
  else refreshAll();
}
document.addEventListener('DOMContentLoaded', () => { spawnParticles(); init(); setTimeout(() => toast('✨ Cyber Core Premium Loaded'), 1100); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔷 PREDIKSI TOGEL PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   🎨 MODERN CLEAN DARK UI - RAPI & GAMPANG
   ═══════════════════════════════════════════════════════════ */

:root {
  /* Palet Warna Nyaman & Profesional */
  --bg-body: #0b1120;       /* Slate sangat gelap */
  --bg-app: #0f172a;        /* Slate gelap */
  --bg-card: #1e293b;       /* Kartu */
  --bg-card-hover: #25334d; /* Kartu hover */
  --bg-input: #0f172a;      /* Input */
  
  --primary: #3b82f6;       /* Biru Modern */
  --primary-hover: #60a5fa; /* Biru Terang */
  --accent: #06b6d4;        /* Cyan untuk highlight */
  
  --text-main: #f1f5f9;     /* Putih tulang */
  --text-muted: #94a3b8;    /* Abu-abu sejuk */
  --text-dim: #64748b;      /* Abu-abu gelap */
  
  --border: #334155;        /* Garis pemisah */
  --border-focus: #3b82f6;  /* Garis fokus */

  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 15px rgba(59, 130, 246, 0.15);
  
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  
  --font-main: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
::selection { background: var(--primary); color: #fff; }

body {
  font-family: var(--font-main);
  background-color: var(--bg-body);
  color: var(--text-main);
  min-height: 100vh;
  line-height: 1.5;
  overflow-x: hidden;
}

/* Background Pattern Halus */
body::before {
  content: ''; position: fixed; inset: 0; z-index: -1;
  background: 
    radial-gradient(circle at 15% 15%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
    radial-gradient(circle at 85% 85%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ═══════════════════════════════════════════════════════════
   📐 LAYOUT UTAMA
   ═══════════════════════════════════════════════════════════ */

.app-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 16px;
}

/* Header */
header {
  text-align: center;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
header h1 {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--text-main);
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
header h1 span { color: var(--primary); }
header p {
  color: var(--text-muted);
  font-size: 0.9rem;
}

/* Tab Navigasi */
.tabs {
  display: flex;
  background: var(--bg-card);
  padding: 6px;
  border-radius: var(--radius-lg);
  margin-bottom: 28px;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
  border: 1px solid var(--border);
}
.tab-btn {
  flex: 1;
  padding: 10px 20px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-weight: 600;
  font-size: 0.95rem;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.tab-btn:hover { color: var(--text-main); }
.tab-btn.active {
  background: var(--primary);
  color: #fff;
  box-shadow: var(--shadow-md);
}

/* ═══════════════════════════════════════════════════════════
   🧩 KOMPONEN UI
   ═══════════════════════════════════════════════════════════ */

/* Control Panel (Input Tanggal/Nominal) */
.control-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}
.input-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.input-group label {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.input-field {
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-main);
  font-family: var(--font-main);
  font-size: 0.95rem;
  transition: all 0.2s;
  min-width: 160px;
}
.input-field:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
}
.btn-action {
  padding: 10px 20px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.2s;
  align-self: flex-end;
  margin-top: 20px;
}
.btn-action:hover { background: var(--primary-hover); }
.btn-action:active { transform: scale(0.98); }

.status-text {
  margin-left: 8px;
  font-size: 0.8rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* Grid Layout untuk Konten */
.content-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

/* Kartu (Card) */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.2s, box-shadow 0.2s;
  height: 100%;
}
.card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-glow);
}

.card-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.02);
}
.card-title {
  font-weight: 700;
  font-size: 1rem;
  color: var(--text-main);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-badge {
  background: rgba(59, 130, 246, 0.15);
  color: var(--primary);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.75rem;
  font-weight: 600;
}

.card-body {
  padding: 16px;
  overflow-y: auto;
  max-height: 450px;
  flex-grow: 1;
}

/* List Item di dalam Card */
.list-item {
  background: rgba(0,0,0,0.15);
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 10px;
  transition: all 0.2s;
  cursor: pointer;
}
.list-item:hover {
  background: var(--bg-card-hover);
  border-color: var(--border);
  transform: translateX(4px);
}
.item-meta {
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.item-value {
  font-size: 0.9rem;
  color: var(--text-main);
  font-family: var(--font-mono);
  word-break: break-word;
}

/* ═══════════════════════════════════════════════════════════
   🎯 KHUSUS TAB HITUNG
   ═══════════════════════════════════════════════════════════ */

.selector-area {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 24px;
}

.chip-container {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
  margin-bottom: 20px;
}
.chip-label {
  width: 100%;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-muted);
  margin-top: 8px;
}
.chip {
  padding: 8px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-muted);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.chip:hover { border-color: var(--text-muted); color: var(--text-main); }
.chip.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
}

.result-display {
  background: var(--bg-input);
  border: 1px dashed var(--border);
  border-radius: var(--radius-md);
  padding: 24px;
  text-align: center;
  margin-top: 16px;
  transition: all 0.3s;
}
.result-display.active {
  border-style: solid;
  border-color: var(--primary);
  background: rgba(59, 130, 246, 0.05);
  cursor: pointer;
}
.result-display:hover {
  border-color: var(--primary-hover);
}
.result-text {
  font-family: var(--font-mono);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text-main);
  letter-spacing: 2px;
}
.result-placeholder {
  color: var(--text-dim);
  font-style: italic;
}

/* ═══════════════════════════════════════════════════════════
   🔧 UTILITIES
   ═══════════════════════════════════════════════════════════ */

.search-box {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-main);
  margin-bottom: 12px;
  font-size: 0.9rem;
}
.search-box:focus { border-color: var(--primary); }

.spinner {
  width: 30px; height: 30px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 20px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-msg {
  text-align: center;
  color: var(--text-dim);
  padding: 30px;
  font-size: 0.9rem;
}

.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #334155; color: #fff;
  padding: 12px 24px; border-radius: 30px;
  font-size: 0.9rem; font-weight: 500;
  opacity: 0; visibility: hidden;
  transition: all 0.3s;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 1000;
  display: flex; align-items: center; gap: 8px;
}
.toast.show {
  opacity: 1; visibility: visible;
  transform: translateX(-50%) translateY(0);
}

/* Responsiveness */
@media (max-width: 768px) {
  .control-panel { flex-direction: column; align-items: stretch; }
  .btn-action { margin-top: 0; width: 100%; }
  .content-grid { grid-template-columns: 1fr; }
  header h1 { font-size: 1.5rem; }
}
</style>
</head>
<body>

<div class="app-container">
  <header>
    <h1>🔷 PREDIKSI <span>&</span> HITUNG</h1>
    <p>Aplikasi prediksi cerdas dengan antarmuka yang rapi dan nyaman.</p>
  </header>

  <!-- Navigasi Tab -->
  <nav class="tabs">
    <button class="tab-btn active" onclick="switchTab('prediksi')">
      🔮 Prediksi
    </button>
    <button class="tab-btn" onclick="switchTab('hitung')">
      🧮 Hitung
    </button>
  </nav>

  <!-- KONTEN TAB PREDIKSI -->
  <div id="tab-prediksi" class="tab-content">
    <div class="control-panel">
      <div class="input-group">
        <label>📅 Tanggal Pasang</label>
        <input type="date" id="input-tanggal" class="input-field" onchange="autoUpdateTanggal()">
      </div>
      <button class="btn-action" id="btn-tanggal" onclick="manualUpdateTanggal()">
        💾 Simpan
      </button>
      <span class="status-text" id="status-tanggal"></span>
    </div>

    <div class="content-grid">
      <!-- Kolom 1: Prediksi -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">🔮 Prediksi</div>
          <span class="card-badge" id="count-prediksi">0</span>
        </div>
        <div class="card-body">
          <input type="text" class="search-box" id="search-prediksi" placeholder="🔍 Cari prediksi...">
          <div id="list-prediksi">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <!-- Kolom 2: Jadwal -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">📅 Jadwal</div>
          <span class="card-badge" id="count-jadwal">0</span>
        </div>
        <div class="card-body">
          <input type="text" class="search-box" id="search-jadwal" placeholder="🔍 Cari jadwal...">
          <div id="list-jadwal">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <!-- Kolom 3: Link Live -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">🔗 Link Live</div>
          <span class="card-badge" id="count-link">0</span>
        </div>
        <div class="card-body">
          <input type="text" class="search-box" id="search-link" placeholder="🔍 Cari link...">
          <div id="list-link">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- KONTEN TAB HITUNG -->
  <div id="tab-hitung" class="tab-content" style="display: none;">
    <div class="control-panel">
      <div class="input-group">
        <label>💰 Nominal Taruhan</label>
        <input type="number" id="input-nominal" class="input-field" placeholder="0" onchange="autoUpdateNominal()">
      </div>
      <button class="btn-action" id="btn-nominal" onclick="manualUpdateNominal()">
        💾 Simpan
      </button>
      <span class="status-text" id="status-nominal"></span>
    </div>

    <div class="selector-area">
      <div class="chip-container" id="chipTipe">
        <!-- Chip Tipe akan dirender JS -->
      </div>
      
      <div class="chip-container" id="chipLabel">
        <!-- Chip Label akan dirender JS -->
      </div>

      <button class="btn-action" onclick="tampilkanValueHitungan()" style="width:100%; margin-top:0;">
        ⚡ Tampilkan Hasil Hitungan
      </button>

      <div class="result-display" id="resultBox">
        <div class="result-placeholder">Silakan pilih Tipe dan Label di atas</div>
      </div>
    </div>

    <div class="content-grid" id="container-hitung">
      <!-- Grid Pasaran -->
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast">✅ Berhasil!</div>

<script>
/* ═══════════════════════════════════════════════════════════
   ⚙️ JAVASCRIPT LOGIC (Rapi & Terstruktur)
   ═══════════════════════════════════════════════════════════ */

const CONFIG = {
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec',
  CSV_PREDIKSI: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
  CSV_HITUNG: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'
};

const state = { prediksi: [], jadwal: [], link: [], kelompok: {} };
let selectedTipe = '', selectedLabel = '';

/* --- DOM Elements --- */
const el = (id) => document.getElementById(id);
const dom = {
  tabP: el('tab-prediksi'), tabH: el('tab-hitung'),
  inputTgl: el('input-tanggal'), btnTgl: el('btn-tanggal'), statTgl: el('status-tanggal'),
  inputNom: el('input-nominal'), btnNom: el('btn-nominal'), statNom: el('status-nominal'),
  listP: el('list-prediksi'), listJ: el('list-jadwal'), listL: el('list-link'),
  cntP: el('count-prediksi'), cntJ: el('count-jadwal'), cntL: el('count-link'),
  chipTipe: el('chipTipe'), chipLabel: el('chipLabel'), resultBox: el('resultBox'),
  containerHitung: el('container-hitung'),
  toast: el('toast')
};

/* --- Helpers --- */
function showToast(msg, type = 'info') {
  dom.toast.textContent = msg;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 3000);
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

function parseCSV(text) {
  let p=[], row=[], entry="", st=0;
  for (let i=0; i<text.length; i++) {
    const c=text[i], n=text[i+1];
    if (st===0) {
      if (c==='"') st=1;
      else if (c===',') { row.push(entry); entry=""; }
      else if (c==='\r'&&n==='\n') { row.push(entry); p.push(row); row=[]; entry=""; i++; }
      else if (c==='\n'||c==='\r') { row.push(entry); p.push(row); row=[]; entry=""; }
      else entry+=c;
    } else if (st===1) {
      if (c==='"'&&n==='"') { entry+='"'; i++; }
      else if (c==='"') st=0;
      else entry+=c;
    }
  }
  if (entry || row.length) { row.push(entry); p.push(row); }
  return p;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

/* --- Tabs --- */
window.switchTab = function(tabName) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.toLowerCase().includes(tabName)) b.classList.add('active');
  });
  dom.tabP.style.display = tabName === 'prediksi' ? 'block' : 'none';
  dom.tabH.style.display = tabName === 'hitung' ? 'block' : 'none';
}

/* --- Fetching Data --- */
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.CSV_PREDIKSI);
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    
    if(data[0]) {
      const raw = safeGet(data[0], 1);
      if(raw) {
        const p = raw.split('/');
        if(p.length===3) dom.inputTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
      }
    }

    for(let i=2; i<85 && i<data.length; i++) {
      const t = safeGet(data[i], 1); if(t) state.prediksi.push({ title: t.split(/[\s,]+/)[0], content: t });
      const j = safeGet(data[i], 2); if(i<=55 && j) state.jadwal.push({ title: j.split(/[\s,]+/)[0], content: j });
      const l = safeGet(data[i], 2); if(i>=56 && l) state.link.push({ title: l.split(/[\s,]+/)[0], content: l });
    }
    renderList(dom.listP, state.prediksi, 'search-prediksi');
    renderList(dom.listJ, state.jadwal, 'search-jadwal');
    renderList(dom.listL, state.link, 'search-link');
    dom.cntP.textContent = state.prediksi.length;
    dom.cntJ.textContent = state.jadwal.length;
    dom.cntL.textContent = state.link.length;
  } catch(e) { dom.listP.innerHTML = '<div class="empty-msg">❌ Gagal memuat data</div>'; }
}

/* --- Rendering Lists --- */
function renderList(container, items, searchId) {
  const keyword = el(searchId).value.toLowerCase();
  const filtered = items.filter(i => i.content.toLowerCase().includes(keyword));
  
  if(!filtered.length) {
    container.innerHTML = '<div class="empty-msg">📭 Tidak ada data</div>';
    return;
  }

  container.innerHTML = filtered.map(v => `
    <div class="list-item" onclick="copyText('${encodeURIComponent(v.content)}')">
      <div class="item-meta">📋 ${v.title}</div>
      <div class="item-value">${v.content}</div>
    </div>
  `).join('');
}

/* --- Hitung Logic --- */
async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.CSV_HITUNG);
    const data = parseCSV(await res.text());
    
    if(data[0]) {
      const nom = safeGet(data[0], 23);
      if(nom) { dom.inputNom.value = nom; dom.statNom.textContent = "Rp " + formatNum(nom); }
    }

    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "SEMUA PASARAN" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "BONUS" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "JAKARTA" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "TOTOMALI" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "HOKIDRAW" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY & HK" }
    ];

    state.kelompok = {};
    const container = dom.containerHitung;
    container.innerHTML = '';

    secDef.forEach(sec => {
      let items = [];
      for(let i=sec.start; i<=sec.end && i<data.length; i++) {
        if(data[i]) {
          const l = safeGet(data[i], 23), v = safeGet(data[i], 24);
          if(l || v) items.push({ label: l||"-", value: v||"-" });
        }
      }
      if(items.length > 0) state.kelompok[sec.title] = items;
    });

    // Render Chips
    renderChips(dom.chipTipe, Object.keys(state.kelompok), 'tipe');
    renderChips(dom.chipLabel, [], 'label');

    // Render Cards Grid
    secDef.forEach(sec => {
      const items = state.kelompok[sec.title] || [];
      if(items.length === 0) return;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-title">🎯 ${sec.title}</div>
        </div>
        <div class="card-body">
          ${items.map(it => `
            <div class="list-item" onclick="copyText('${encodeURIComponent(it.value)}')">
              <div class="item-meta">🏷️ ${it.label}</div>
              <div class="item-value" style="color:var(--accent); font-weight:600;">${it.value}</div>
            </div>
          `).join('')}
        </div>
      `;
      container.appendChild(card);
    });

  } catch(e) { console.error(e); }
}

/* --- Chip Renderer --- */
function renderChips(container, labels, type) {
  container.innerHTML = '';
  if(type === 'label' && labels.length === 0) {
    container.innerHTML = '<div class="empty-msg">Silakan pilih tipe terlebih dahulu</div>';
    return;
  }

  const allChip = document.createElement('div');
  allChip.className = 'chip';
  allChip.textContent = 'Semua';
  allChip.onclick = () => selectChip(allChip, '', type);
  container.appendChild(allChip);

  labels.forEach(lbl => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = lbl;
    chip.onclick = () => selectChip(chip, lbl, type);
    container.appendChild(chip);
  });
}

function selectChip(elem, value, type) {
  elem.parentNode.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  elem.classList.add('active');
  
  if(type === 'tipe') {
    selectedTipe = value;
    selectedLabel = '';
    // Reset Label
    const labels = state.kelompok[value] ? state.kelompok[value].map(i => i.label) : [];
    renderChips(dom.chipLabel, labels, 'label');
  } else {
    selectedLabel = value;
  }
  // Reset Result
  dom.resultBox.innerHTML = '<div class="result-placeholder">Klik tombol "Tampilkan"</div>';
}

/* --- Actions --- */
window.copyText = function(text) {
  navigator.clipboard.writeText(text).then(() => showToast('✅ Teks berhasil disalin'));
}

window.tampilkanValueHitungan = function() {
  if(!selectedTipe || !selectedLabel) return showToast('⚠️ Pilih tipe dan label!');
  
  const data = state.kelompok[selectedTipe];
  const item = data.find(i => i.label === selectedLabel);
  if(item) {
    dom.resultBox.innerHTML = `
      <div class="result-text">${item.value}</div>
      <div style="font-size:0.8rem; color:var(--text-dim); margin-top:8px;">Klik untuk salin</div>
    `;
    dom.resultBox.classList.add('active');
    dom.resultBox.onclick = () => copyText(item.value);
  }
}

window.manualUpdateTanggal = () => showToast('💾 Data Tanggal disimpan (Simulasi)');
window.autoUpdateNominal = () => { /* Debounce logic could go here */ };
window.manualUpdateNominal = () => showToast('💾 Data Nominal disimpan (Simulasi)');

/* --- Search Handlers --- */
el('search-prediksi').oninput = () => renderList(dom.listP, state.prediksi, 'search-prediksi');
el('search-jadwal').oninput = () => renderList(dom.listJ, state.jadwal, 'search-jadwal');
el('search-link').oninput = () => renderList(dom.listL, state.link, 'search-link');

document.addEventListener('DOMContentLoaded', () => {
  fetchPrediksi();
  fetchHitung();
});

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#8b5cf6">
<meta name="description" content="PREDIKSI & HITUNG TOGEL - Ultra Cyber Experience">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  /* === ULTRA NEON PALETTE === */
  --electric-purple: #8b5cf6;
  --electric-pink: #ec4899;
  --electric-cyan: #06b6d4;
  --electric-blue: #3b82f6;
  --electric-lime: #84cc16;
  --neon-gold: #f59e0b;
  --void-black: #0a0a0f;
  --deep-space: #0f0f1a;
  
  /* === GLASS & SURFACES === */
  --glass-bg: rgba(20, 20, 40, 0.6);
  --glass-border: rgba(139, 92, 246, 0.3);
  --glass-highlight: rgba(255, 255, 255, 0.08);
  --card-bg: linear-gradient(145deg, rgba(25, 25, 50, 0.9), rgba(35, 35, 70, 0.85));
  
  /* === TEXT === */
  --text-main: #ffffff;
  --text-muted: #94a3b8;
  --text-glow: 0 0 25px rgba(139, 92, 246, 0.5);
  
  /* === GLOWS & EFFECTS === */
  --glow-purple: 0 0 30px rgba(139, 92, 246, 0.4), 0 0 60px rgba(139, 92, 246, 0.2);
  --glow-cyan: 0 0 30px rgba(6, 182, 212, 0.4), 0 0 60px rgba(6, 182, 212, 0.2);
  --glow-pink: 0 0 30px rgba(236, 72, 153, 0.4), 0 0 60px rgba(236, 72, 153, 0.2);
  --glow-intense: 0 0 40px rgba(139, 92, 246, 0.6), 0 0 80px rgba(6, 182, 212, 0.4);
  
  /* === ANIMATIONS === */
  --ease-fluid: cubic-bezier(0.23, 1, 0.32, 1);
  --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --ease-elastic: cubic-bezier(0.68, -0.6, 0.32, 1.6);
  --dur-fast: 180ms;
  --dur-normal: 350ms;
  --dur-slow: 600ms;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--void-black);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
}

/* === HOLOGRAPHIC BACKGROUND === */
.holo-bg {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(ellipse at 15% 25%, rgba(139, 92, 246, 0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 35%, rgba(6, 182, 212, 0.1) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 90%, rgba(236, 72, 153, 0.08) 0%, transparent 60%),
    linear-gradient(180deg, var(--void-black) 0%, var(--deep-space) 50%, var(--void-black) 100%);
  animation: holoPulse 18s ease-in-out infinite alternate;
}
@keyframes holoPulse {
  0%, 100% { filter: hue-rotate(0deg) saturate(1); }
  50% { filter: hue-rotate(12deg) saturate(1.15); }
}

/* === MESH WIREFRAME === */
.wireframe {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    linear-gradient(rgba(139, 92, 246, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(139, 92, 246, 0.08) 1px, transparent 1px),
    radial-gradient(circle at 25% 25%, rgba(6, 182, 212, 0.04) 0%, transparent 30%),
    radial-gradient(circle at 75% 75%, rgba(236, 72, 153, 0.04) 0%, transparent 30%);
  background-size: 60px 60px, 60px 60px, 100% 100%, 100% 100%;
  animation: wireFloat 45s linear infinite;
  opacity: 0.7;
}
@keyframes wireFloat {
  0% { background-position: 0 0, 0 0, 0 0, 0 0; }
  100% { background-position: 60px 60px, 60px 60px, 100px 100px, -100px -100px; }
}

/* === FLOATING GLOW ORBS === */
.glow-orb {
  position: fixed; border-radius: 50%; filter: blur(70px); opacity: 0.15;
  animation: orbDrift 40s ease-in-out infinite alternate; z-index: -1;
}
.glow-orb.purple { width: 550px; height: 550px; background: var(--electric-purple); top: -15%; left: -10%; }
.glow-orb.cyan { width: 420px; height: 420px; background: var(--electric-cyan); bottom: -20%; right: -8%; animation-delay: -15s; }
.glow-orb.pink { width: 360px; height: 360px; background: var(--electric-pink); top: 45%; left: 65%; animation-delay: -30s; }
@keyframes orbDrift {
  0% { transform: translate(0, 0) scale(1); opacity: 0.12; }
  33% { transform: translate(40px, -30px) scale(1.08); opacity: 0.18; }
  66% { transform: translate(-25px, 35px) scale(0.94); opacity: 0.14; }
  100% { transform: translate(20px, 15px) scale(1.03); opacity: 0.16; }
}

/* === PARTICLE FIELD === */
.particle-field { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; width: 2.5px; height: 2.5px; border-radius: 50%;
  background: var(--electric-cyan); opacity: 0;
  animation: particleDrift 28s infinite ease-in-out;
  box-shadow: 0 0 15px var(--electric-cyan), 0 0 35px var(--electric-cyan);
}
.particle:nth-child(2n) { background: var(--electric-purple); animation-delay: -10s; animation-duration: 35s; }
.particle:nth-child(3n) { background: var(--electric-pink); animation-delay: -20s; animation-duration: 42s; }
@keyframes particleDrift {
  0%, 100% { transform: translateY(130vh) rotate(0deg) scale(0.7); opacity: 0; }
  12% { opacity: 0.95; }
  88% { opacity: 0.95; }
  100% { transform: translateY(-30vh) rotate(800deg) scale(1.3); opacity: 0; }
}

/* === ENERGY WAVES === */
.energy-wave {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: repeating-radial-gradient(circle at 50% 50%, transparent 0, transparent 100px, rgba(139, 92, 246, 0.03) 100px, rgba(139, 92, 246, 0.03) 102px);
  animation: waveExpand 25s ease-in-out infinite;
  opacity: 0.6;
}
@keyframes waveExpand {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.15); opacity: 0.7; }
}

/* === SCAN EFFECT === */
.scan-effect {
  position: fixed; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--electric-cyan), var(--electric-purple), var(--electric-pink), transparent);
  opacity: 0.8; animation: scanSweep 7s linear infinite; z-index: 100; pointer-events: none;
  filter: blur(1px); box-shadow: 0 0 25px var(--electric-cyan);
}
@keyframes scanSweep {
  0% { top: -3px; opacity: 0; }
  6% { opacity: 0.85; }
  94% { opacity: 0.85; }
  100% { top: 100%; opacity: 0; }
}

/* === NOISE OVERLAY === */
.noise-overlay {
  position: fixed; inset: 0; z-index: -1; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* === MAIN LAYOUT === */
.app-wrapper {
  position: relative; z-index: 10;
  max-width: 1420px; margin: 0 auto; padding: 22px 18px;
}

/* === HERO HEADER === */
.hero-header {
  text-align: center; padding: 18px 0 26px;
  animation: heroReveal 1.2s var(--ease-fluid) backwards;
}
@keyframes heroReveal {
  from { opacity: 0; transform: translateY(-40px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.hero-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(30px, 6.5vw, 52px);
  font-weight: 900; letter-spacing: 5px;
  position: relative; display: inline-block;
  background: linear-gradient(135deg, var(--electric-cyan) 0%, var(--electric-purple) 30%, #ffffff 55%, var(--electric-pink) 85%, var(--electric-purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--text-glow);
  animation: titlePulse 5s ease-in-out infinite;
}
@keyframes titlePulse {
  0%, 100% { filter: brightness(1) saturate(1); }
  50% { filter: brightness(1.35) saturate(1.2); }
}

.title-glow {
  position: absolute; inset: -15px;
  background: radial-gradient(ellipse, rgba(139, 92, 246, 0.25) 0%, rgba(6, 182, 212, 0.15) 45%, transparent 75%);
  border-radius: 30px; animation: glowPulse 3s ease-in-out infinite; filter: blur(35px); z-index: -1;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.12); }
}

.title-underline {
  position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
  width: 65%; height: 3px;
  background: linear-gradient(90deg, transparent, var(--electric-cyan), var(--electric-purple), var(--electric-pink), transparent);
  animation: lineGlow 3.5s ease-in-out infinite;
  box-shadow: 0 0 18px var(--electric-cyan);
}
@keyframes lineGlow {
  0%, 100% { opacity: 0.75; }
  50% { opacity: 1; }
}

/* === STATUS STRIP === */
.status-strip {
  display: flex; justify-content: center; align-items: center; gap: 22px;
  margin: 18px 0 24px; padding: 14px 26px;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: 22px; backdrop-filter: blur(28px);
  box-shadow: var(--glow-purple);
}
.status-pill { display: flex; align-items: center; gap: 11px; font-size: 0.92rem; }
.status-dot {
  width: 11px; height: 11px; background: var(--electric-lime); border-radius: 50%;
  animation: dotThrob 2.2s ease-in-out infinite;
  box-shadow: 0 0 18px var(--electric-lime), 0 0 40px var(--electric-lime);
}
@keyframes dotThrob {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0.82; }
}
.status-text { color: var(--text-muted); font-weight: 500; }
.status-value { color: var(--electric-cyan); font-weight: 700; font-family: 'Orbitron', sans-serif; letter-spacing: 1.2px; }
.status-tag {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 14px; background: rgba(139, 92, 246, 0.18);
  border: 1px solid rgba(139, 92, 246, 0.45); border-radius: 16px;
  font-size: 0.78rem; color: var(--electric-purple); font-weight: 600;
  animation: tagGlow 2.8s ease-in-out infinite;
}
@keyframes tagGlow {
  0%, 100% { box-shadow: 0 0 12px rgba(139, 92, 246, 0.35); }
  50% { box-shadow: 0 0 28px rgba(139, 92, 246, 0.65); }
}

/* === TAB NAVIGATION === */
.tab-nav {
  display: flex; justify-content: center; margin: 16px 0 24px;
}
.tab-group {
  display: flex; gap: 7px; padding: 6px;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: 20px; backdrop-filter: blur(22px);
  box-shadow: var(--glow-purple);
}
.tab-btn {
  padding: 12px 30px; font-family: 'Orbitron', sans-serif;
  font-weight: 600; font-size: 0.92rem; letter-spacing: 1.8px;
  color: var(--text-muted); background: transparent; border: none;
  border-radius: 16px; cursor: pointer; transition: all var(--dur-normal) var(--ease-fluid);
  position: relative; overflow: hidden; text-transform: uppercase;
}
.tab-btn::before {
  content: ''; position: absolute; inset: 0; border-radius: 16px;
  background: linear-gradient(135deg, transparent, rgba(139, 92, 246, 0.2), transparent);
  opacity: 0; transition: opacity var(--dur-fast);
}
.tab-btn:hover { color: var(--electric-cyan); }
.tab-btn:hover::before { opacity: 1; }
.tab-btn.active {
  color: var(--void-black);
  background: linear-gradient(135deg, var(--electric-cyan), var(--electric-purple));
  border: 1px solid var(--electric-cyan);
  box-shadow: var(--glow-intense);
  transform: translateY(-3px);
}
.tab-btn.active::after {
  content: ''; position: absolute; bottom: -1px; left: 28%; right: 28%;
  height: 2.5px; background: var(--electric-cyan); border-radius: 3px;
  box-shadow: 0 0 12px var(--electric-cyan);
}

/* === CONTROL BAR === */
.control-bar {
  background: var(--card-bg); border: 1px solid var(--glass-border);
  border-radius: 26px; padding: 22px 26px; backdrop-filter: blur(32px);
  box-shadow: var(--glow-purple); margin-bottom: 24px;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 20px; align-items: end; position: relative; overflow: hidden;
}
.control-bar::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2.5px;
  background: linear-gradient(90deg, transparent, var(--electric-cyan), var(--electric-purple), var(--electric-pink), transparent);
  animation: borderPulse 3.5s linear infinite;
}
@keyframes borderPulse {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.ctrl-group { display: flex; flex-direction: column; gap: 11px; }
.ctrl-label {
  font-size: 0.87rem; color: var(--electric-cyan); font-weight: 600;
  display: flex; align-items: center; gap: 9px;
  text-shadow: 0 0 12px rgba(6, 182, 212, 0.45);
}
.ctrl-input {
  padding: 13px 17px; background: rgba(15, 15, 32, 0.85);
  border: 1.8px solid rgba(139, 92, 246, 0.35); border-radius: 18px;
  color: var(--text-main); font-size: 1.02rem; width: 100%;
  transition: all var(--dur-fast) var(--ease-fluid);
  font-family: 'Rajdhani', sans-serif; font-weight: 500;
}
.ctrl-input::placeholder { color: var(--text-muted); opacity: 0.85; }
.ctrl-input:focus {
  outline: none; border-color: var(--electric-cyan);
  box-shadow: var(--glow-cyan); background: rgba(12, 18, 42, 0.92);
}
.ctrl-input.sync-active {
  border-color: var(--electric-lime);
  box-shadow: 0 0 20px rgba(132, 204, 22, 0.45);
}
.ctrl-actions {
  display: flex; gap: 13px; flex-wrap: wrap; justify-content: flex-end;
}
.btn {
  padding: 12px 24px; border-radius: 18px; font-weight: 600;
  font-size: 0.9rem; cursor: pointer; transition: all var(--dur-normal) var(--ease-bounce);
  display: inline-flex; align-items: center; gap: 9px; border: none;
  font-family: 'Rajdhani', sans-serif; letter-spacing: 0.6px;
}
.btn-ghost {
  background: rgba(30, 30, 60, 0.8); border: 1.5px solid var(--glass-border);
  color: var(--text-muted);
}
.btn-ghost:hover {
  background: var(--glass-bg); border-color: var(--electric-cyan);
  color: var(--electric-cyan); transform: translateY(-4px);
  box-shadow: var(--glow-purple);
}
.btn-primary {
  background: linear-gradient(135deg, var(--electric-cyan), var(--electric-purple));
  color: var(--void-black); font-family: 'Orbitron', sans-serif;
  font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px;
  position: relative; overflow: hidden;
}
.btn-primary::before {
  content: ''; position: absolute; inset: 0; border-radius: 18px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
  opacity: 0; transition: opacity var(--dur-fast);
}
.btn-primary:hover::before { opacity: 1; }
.btn-primary:hover {
  transform: translateY(-5px); box-shadow: var(--glow-intense);
}
.btn:active { transform: translateY(-1px) !important; }
.btn:disabled { opacity: 0.52; cursor: not-allowed; transform: none !important; }

/* === GRID LAYOUT === */
.content-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
  gap: 20px;
}

/* === HOLO CARD === */
.holo-card {
  background: var(--card-bg); border: 1px solid var(--glass-border);
  border-radius: 24px; overflow: hidden; display: flex; flex-direction: column;
  transition: all var(--dur-slow) var(--ease-fluid);
  backdrop-filter: blur(28px); position: relative;
}
.holo-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 24px;
  padding: 1.5px; background: linear-gradient(135deg, transparent, rgba(139, 92, 246, 0.15), rgba(6, 182, 212, 0.15), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--dur-normal);
}
.holo-card:hover {
  border-color: rgba(139, 92, 246, 0.65);
  box-shadow: var(--glow-intense);
  transform: translateY(-7px);
}
.holo-card:hover::before { opacity: 1; }
.holo-card.collapsed .card-body { max-height: 0; opacity: 0; pointer-events: none; }
.holo-card.collapsed .toggle-btn { transform: rotate(180deg); }

.card-head {
  padding: 16px 20px; border-bottom: 1px solid var(--glass-border);
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; background: linear-gradient(90deg, rgba(139, 92, 246, 0.1), transparent 85%);
  transition: background var(--dur-fast);
}
.card-head:hover { background: linear-gradient(90deg, rgba(139, 92, 246, 0.16), transparent 85%); }
.card-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--electric-cyan);
  font-size: 1.03rem; display: flex; align-items: center; gap: 11px;
  text-shadow: 0 0 14px rgba(6, 182, 212, 0.55);
}
.card-meta { display: flex; align-items: center; gap: 13px; }
.count-pill {
  background: rgba(6, 182, 212, 0.18); color: var(--electric-cyan);
  padding: 5px 13px; border-radius: 20px; font-size: 0.77rem;
  font-weight: 700; border: 1px solid rgba(6, 182, 212, 0.45);
  font-family: 'Orbitron', sans-serif;
}
.toggle-btn {
  color: var(--text-muted); transition: transform var(--dur-fast);
  font-size: 0.98rem; cursor: pointer;
}

.card-body {
  padding: 0; overflow: hidden;
  transition: all var(--dur-slow) var(--ease-fluid);
}

.search-wrap {
  padding: 13px 18px; border-bottom: 1px solid var(--glass-border);
  display: flex; gap: 11px; align-items: center;
}
.search-ico { color: var(--text-muted); font-size: 1.05rem; }
.search-field {
  flex: 1; padding: 11px 15px; background: rgba(15, 15, 32, 0.85);
  border: 1px solid var(--glass-border); border-radius: 16px;
  color: var(--text-main); font-size: 0.92rem;
  transition: all var(--dur-fast); font-family: 'Rajdhani', sans-serif;
}
.search-field:focus {
  outline: none; border-color: var(--electric-cyan);
  box-shadow: 0 0 18px rgba(6, 182, 212, 0.35);
}
.search-field::placeholder { color: var(--text-muted); }

.card-content {
  padding: 13px; overflow-y: auto; max-height: 410px;
}

/* === DATA ITEM === */
.data-item {
  background: linear-gradient(145deg, rgba(22, 28, 58, 0.88), rgba(32, 42, 82, 0.82));
  border: 1px solid var(--glass-border); border-radius: 20px;
  padding: 15px 17px; margin-bottom: 11px; cursor: pointer;
  transition: all var(--dur-slow) var(--ease-fluid);
  position: relative; overflow: hidden;
}
.data-item::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(120deg, transparent, rgba(139, 92, 246, 0.15), transparent);
  transition: left var(--dur-slow) var(--ease-fluid);
}
.data-item:hover::after { left: 100%; }
.data-item:hover {
  border-color: rgba(139, 92, 246, 0.65);
  box-shadow: var(--glow-purple);
  transform: translateY(-5px) scale(1.012);
}
.data-item.copied {
  animation: successBurst 0.55s var(--ease-elastic);
  border-color: var(--electric-lime);
  box-shadow: 0 0 28px rgba(132, 204, 22, 0.55);
}
@keyframes successBurst {
  0%, 100% { transform: translateY(-5px) scale(1.012); }
  50% { transform: translateY(-8px) scale(1.025); background: rgba(132, 204, 22, 0.12); }
}
.item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 7px; }
.item-label {
  font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 2.2px; font-weight: 600;
}
.item-heading {
  color: var(--electric-cyan); font-weight: 700; font-size: 0.98rem;
  font-family: 'Orbitron', sans-serif;
}
.item-body {
  font-size: 0.92rem; color: var(--text-main); line-height: 1.52;
  white-space: pre-wrap; word-break: break-word; opacity: 0.97;
}
.item-tip {
  font-size: 0.77rem; color: var(--electric-lime); margin-top: 7px;
  display: flex; align-items: center; gap: 6px; opacity: 0.92;
}

/* === MARKET CARD === */
.market-list { display: grid; gap: 13px; }
.market-card {
  background: linear-gradient(145deg, rgba(22, 28, 58, 0.88), rgba(32, 42, 82, 0.82));
  border: 1px solid var(--glass-border); border-radius: 22px;
  overflow: hidden; transition: all var(--dur-slow) var(--ease-fluid);
}
.market-card:hover {
  border-color: rgba(139, 92, 246, 0.65);
  box-shadow: var(--glow-purple);
  transform: translateY(-5px);
}
.market-head {
  padding: 14px 19px; border-bottom: 1px solid var(--glass-border);
  background: linear-gradient(90deg, rgba(139, 92, 246, 0.1), transparent 85%);
}
.market-label {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--electric-cyan);
  font-size: 0.97rem; text-shadow: 0 0 12px rgba(6, 182, 212, 0.45);
}
.bet-list { padding: 11px 15px; max-height: 290px; overflow-y: auto; }
.bet-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 14px; margin-bottom: 7px; background: rgba(25, 30, 62, 0.85);
  border: 1px solid var(--glass-border); border-radius: 16px;
  cursor: pointer; transition: all var(--dur-slow) var(--ease-fluid);
}
.bet-row:hover {
  border-color: rgba(139, 92, 246, 0.65); background: rgba(35, 48, 95, 0.92);
  box-shadow: var(--glow-purple); transform: translateX(5px);
}
.bet-row.copied { animation: successBurst 0.55s var(--ease-elastic); }
.bet-name { color: var(--text-main); font-size: 0.92rem; flex: 1; margin-right: 11px; font-weight: 500; }
.bet-num {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--electric-cyan);
  font-size: 0.92rem; background: rgba(6, 182, 212, 0.15);
  padding: 5px 12px; border-radius: 14px; border: 1px solid rgba(6, 182, 212, 0.4);
}
.bet-row:hover .bet-num {
  background: rgba(6, 182, 212, 0.25);
  box-shadow: 0 0 14px rgba(6, 182, 212, 0.45);
}

/* === SELECTOR PANEL === */
.selector-wrap {
  background: var(--card-bg); border: 1px solid var(--glass-border);
  border-radius: 24px; padding: 20px 24px; margin-bottom: 22px;
  backdrop-filter: blur(28px); box-shadow: var(--glow-purple);
}
.selector-head {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--electric-cyan);
  font-size: 1.08rem; margin-bottom: 18px; padding-bottom: 16px;
  border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; gap: 13px;
}
.chip-wrap { margin-bottom: 18px; }
.chip-head {
  font-family: 'Orbitron', sans-serif; font-size: 0.84rem; font-weight: 700;
  color: var(--electric-cyan); margin-bottom: 11px;
  display: flex; align-items: center; gap: 9px;
}
.chip-head::before {
  content: ''; width: 3.5px; height: 18px; background: var(--electric-cyan);
  border-radius: 2.5px; box-shadow: 0 0 9px var(--electric-cyan);
}
.chip-group { display: flex; flex-wrap: wrap; gap: 9px; }
.chip {
  padding: 8px 18px; background: rgba(15, 15, 32, 0.85);
  border: 1.8px solid var(--glass-border); border-radius: 26px;
  color: var(--text-muted); font-size: 0.87rem; font-weight: 600;
  cursor: pointer; transition: all var(--dur-slow) var(--ease-fluid);
  position: relative; overflow: hidden; font-family: 'Rajdhani', sans-serif;
}
.chip:hover { color: var(--electric-cyan); border-color: var(--electric-cyan); }
.chip.active {
  color: var(--void-black);
  background: linear-gradient(135deg, var(--electric-cyan), var(--electric-purple));
  border-color: var(--electric-cyan);
  box-shadow: var(--glow-intense);
  font-weight: 700;
}
.chip.active::after {
  content: '✓'; position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%); font-size: 0.77rem; font-weight: 800;
  animation: checkPop 0.38s var(--ease-elastic);
}
@keyframes checkPop {
  0% { transform: translateY(-50%) scale(0); opacity: 0; }
  65% { transform: translateY(-50%) scale(1.35); opacity: 1; }
  100% { transform: translateY(-50%) scale(1); }
}

.result-display {
  margin-top: 18px; padding: 18px 22px;
  background: rgba(15, 15, 32, 0.92); border: 1.8px solid var(--glass-border);
  border-radius: 20px; font-family: 'Orbitron', sans-serif;
  font-size: 1.12rem; color: var(--electric-cyan); text-align: center;
  min-height: 56px; display: flex; align-items: center; justify-content: center;
  transition: all var(--dur-slow) var(--ease-fluid); cursor: pointer;
  position: relative;
}
.result-display:hover {
  border-color: rgba(139, 92, 246, 0.65);
  box-shadow: var(--glow-purple);
}
.result-display.copied {
  animation: resultFlash 0.48s var(--ease-elastic);
  border-color: var(--electric-lime);
  box-shadow: 0 0 25px rgba(132, 204, 22, 0.55);
}
@keyframes resultFlash {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.035); background: rgba(132, 204, 22, 0.14); }
}
.result-display::after {
  content: '📋 Klik untuk copy'; position: absolute; bottom: -26px; left: 50%;
  transform: translateX(-50%); font-size: 0.74rem; color: var(--text-muted);
  opacity: 0; transition: opacity var(--dur-fast); white-space: nowrap;
}
.result-display:hover::after { opacity: 1; }

/* === LOADING OVERLAY === */
.loading-overlay {
  position: absolute; inset: 0; background: rgba(10, 10, 20, 0.94);
  backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center;
  z-index: 50; border-radius: 24px; opacity: 0; visibility: hidden;
  transition: opacity var(--dur-fast), visibility var(--dur-fast);
}
.loading-overlay.active { opacity: 1; visibility: visible; }
.loading-box { text-align: center; }
.loading-spin {
  width: 44px; height: 44px; border: 3.5px solid rgba(139, 92, 246, 0.25);
  border-top-color: var(--electric-cyan); border-radius: 50%;
  animation: spin 1.1s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'Orbitron', sans-serif; font-size: 0.84rem;
  color: var(--electric-cyan); text-transform: uppercase; letter-spacing: 2.8px;
  animation: textGlow 2s ease-in-out infinite;
}
@keyframes textGlow { 0%, 100% { opacity: 1; } 50% { opacity: 0.72; } }

/* === TOAST === */
.toast {
  position: fixed; bottom: 28px; right: 28px;
  background: var(--card-bg); border: 1.8px solid var(--electric-cyan);
  border-radius: 22px; padding: 15px 26px;
  display: flex; align-items: center; gap: 13px;
  transform: translateX(200%); transition: all var(--dur-slow) var(--ease-fluid);
  z-index: 2000; backdrop-filter: blur(22px);
  box-shadow: var(--glow-intense);
}
.toast.show { transform: translateX(0); }
.toast-ico { color: var(--electric-lime); font-size: 21px; }
.toast-txt { font-weight: 600; font-size: 0.94rem; }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-track { background: var(--void-black); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--electric-cyan), var(--electric-purple));
  border-radius: 5px; border: 2.5px solid var(--void-black);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--electric-cyan), var(--electric-pink));
}

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .app-wrapper { padding: 16px 13px; }
  .control-bar { grid-template-columns: 1fr; }
  .ctrl-actions { justify-content: center; }
  .content-grid { grid-template-columns: 1fr; }
  .hero-title { font-size: clamp(26px, 7.5vw, 44px); letter-spacing: 4px; }
  .tab-btn { padding: 11px 24px; font-size: 0.87rem; }
  .card-head { padding: 14px 17px; }
  .status-strip { flex-wrap: wrap; gap: 14px; padding: 12px 20px; }
  .chip-group { justify-content: center; }
}

/* === ACCESSIBILITY === */
::selection { background: rgba(139, 92, 246, 0.28); color: var(--text-main); }
button:focus-visible, input:focus-visible {
  outline: 2.5px solid var(--electric-cyan); outline-offset: 4px;
  box-shadow: var(--glow-intense);
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), inNom: $('input-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'), toastMsg: $('toastMsg'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox'),
  loading: $('loadingOverlay'), lastUpdate: $('lastUpdate'),
  btnRefresh: $('btn-refresh'), btnReset: $('btn-reset')
};

let selectedTipe = '', selectedLabel = '';
let autoTimer = null;
const AUTO_DELAY = 700;

// === PARTICLE SYSTEM ===
function createParticles() {
  const container = $('particles');
  if (!container) return;
  for(let i = 0; i < 45; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 28 + 's';
    p.style.animationDuration = (22 + Math.random() * 22) + 's';
    container.appendChild(p);
  }
}

// === TOAST ===
function showToast(msg) {
  dom.toastMsg.textContent = msg;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 3400);
}

// === TIMESTAMP ===
function updateTimestamp() {
  const now = new Date();
  dom.lastUpdate.textContent = `Update: ${now.toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
}

// === LOADING ===
function setLoading(active) {
  dom.loading.classList.toggle('active', active);
  dom.btnRefresh.disabled = active;
}

// === COPY ===
function copyText(text, element) {
  let final = text;
  try { final = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(final).then(() => {
    const preview = final.length > 30 ? final.slice(0, 30) + '...' : final;
    showToast(`📋 Disalin: ${preview}`);
    if (element) {
      element.classList.add('copied');
      setTimeout(() => element.classList.remove('copied'), 600);
    }
  }).catch(() => showToast('❌ Gagal menyalin'));
}

// === FORMAT ===
function fmtNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

// === CSV ===
function parseCSV(text) {
  let rows = [], row = [], cell = "", quoted = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (!quoted) {
      if (c === '"') quoted = true;
      else if (c === ',') { row.push(cell); cell = ""; }
      else if (c === '\r' && next === '\n') { row.push(cell); rows.push(row); row = []; cell = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(cell); rows.push(row); row = []; cell = ""; }
      else cell += c;
    } else {
      if (c === '"' && next === '"') { cell += '"'; i++; }
      else if (c === '"') quoted = false;
      else cell += c;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}
function get(row, idx) { return row?.[idx] ?? ""; }

// === API ===
async function callAPI(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum dikonfigurasi!'); return false; }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error("API Error:", e); return false; }
}

// === AUTO TRIGGER ===
function triggerAuto() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(syncData, AUTO_DELAY);
}

// === SYNC ===
async function syncData() {
  setLoading(true);
  try {
    if (dom.inTgl.value) {
      const [y, m, d] = dom.inTgl.value.split('-');
      await callAPI('updateTanggal', `${m}/${d}/${y}`);
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
    }
    if (dom.inNom.value) {
      await callAPI('updateNominal', dom.inNom.value);
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
    }
    await Promise.all([fetchPrediksi(), fetchHitung(), loadKelompok()]);
    updateTimestamp();
    showToast('✨ Data diperbarui!');
  } catch(e) {
    console.error("Sync Error:", e);
    showToast('⚠️ Gagal memperbarui data');
  } finally {
    setLoading(false);
  }
}

// === FETCH ===
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '?t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) {
      const raw = get(data[0], 1);
      if (raw && !dom.inTgl.value) {
        const [m, d, y] = raw.split('/');
        dom.inTgl.value = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = get(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = get(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = get(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    renderPrediksi();
  } catch(e) {
    console.error("Prediksi Error:", e);
    dom.listP.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:26px;">❌ Gagal memuat data</p>';
  }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '?t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = get(data[0], 23);
      if (nom && !dom.inNom.value) dom.inNom.value = nom;
    }
    const sections = [
      { r:0, c:24, s:2, e:42 }, { r:43, c:24, s:45, e:80 },
      { r:81, c:24, s:83, e:119 }, { r:120, c:24, s:122, e:153 },
      { r:154, c:24, s:156, e:179 }, { r:180, c:24, s:182, e:213 },
      { r:215, c:24, s:217, e:248 }, { r:249, c:24, s:251, e:282 },
      { r:283, c:24, s:285, e:316 }
    ];
    state.hitung = sections.map(sec => {
      const title = get(data[sec.r], sec.c) || "PASARAN";
      const items = [];
      for (let i = sec.s; i <= sec.e && i < data.length; i++) {
        if (data[i]) {
          const type = get(data[i], 23), val = get(data[i], 24);
          if (type || val) items.push({ type, val });
        }
      }
      return { title, items };
    }).filter(s => s.items.length);
    renderHitung();
  } catch(e) {
    console.error("Hitung Error:", e);
    dom.contH.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:26px;">❌ Gagal memuat data</p>';
  }
}

// === RENDER ===
function renderList(container, items, query) {
  const filtered = items.filter(i => i.content.toLowerCase().includes(query.toLowerCase()));
  if (!filtered.length) {
    container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:26px;">📭 Tidak ada data</p>';
    return;
  }
  container.innerHTML = filtered.map(v => `
    <div class="data-item" onclick="copyText('${encodeURIComponent(v.content)}', this)">
      <div class="item-top">
        <span class="item-label">Judul</span>
        <span class="item-heading">${v.title}</span>
      </div>
      <div class="item-body">${v.content}</div>
      <div class="item-tip"><i class="fas fa-copy"></i> Klik untuk copy</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) {
    dom.contH.innerHTML = '<p style="color:var(--text-muted);text-align:center;">📭 Tidak ada data</p>';
    return;
  }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="market-card">
      <div class="market-head">
        <span class="market-label">🎯 ${s.title}</span>
      </div>
      <div class="bet-list">
        ${s.items.map(it => `
          <div class="bet-row" onclick="copyText('${encodeURIComponent(it.val)}', this)">
            <span class="bet-name">${it.type}</span>
            <span class="bet-num">${it.val}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// === CHIPS ===
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + 
    items.map(it => `<div class="chip" data-value="${it.label || it}">${(it.label || it).slice(0, 22)}${(it.label || it).length > 22 ? '...' : ''}</div>`).join('');
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (type === 'tipe') { selectedTipe = chip.dataset.value; updateLabelChips(); }
      else { selectedLabel = chip.dataset.value; }
    };
  });
}

function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) {
    renderChips(dom.chipLabel, [], 'label'); return;
  }
  const labels = state.kelompok[selectedTipe].map(i => i.label);
  renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}

async function loadKelompok() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '?t=' + Date.now());
    const data = parseCSV(await res.text());
    const sections = [
      { r:0, c:24, s:2, e:42, t:"SEMUA PASARAN" }, { r:43, c:24, s:45, e:80, t:"TOTO MACAU 4D" },
      { r:81, c:24, s:83, e:119, t:"TOTO MACAU 5D" }, { r:120, c:24, s:122, e:153, t:"KINGKONG 4D" },
      { r:154, c:24, s:156, e:179, t:"BONUS" }, { r:180, c:24, s:182, e:213, t:"JAKARTA" },
      { r:215, c:24, s:217, e:248, t:"TOTOMALI" }, { r:249, c:24, s:251, e:282, t:"HOKIDRAW" },
      { r:283, c:24, s:285, e:316, t:"SYDNEY & HK" }
    ];
    state.kelompok = {};
    sections.forEach(sec => {
      const items = [];
      for (let i = sec.s; i <= sec.e && i < data.length; i++) {
        if (data[i]) {
          const label = get(data[i], 23), value = get(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length) state.kelompok[sec.t] = items;
    });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error("Kelompok Error:", e); }
}

function showResult() {
  const box = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    box.innerHTML = '<span style="color: var(--text-muted);">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    box.innerHTML = `<span style="font-weight:700;">${item.value}</span>`;
    box.onclick = () => copyText(item.value, box);
  }
}

// === TOGGLE ===
function toggleCard(id) {
  $(id)?.classList.toggle('collapsed');
}

// === EVENTS ===
function setupEvents() {
  dom.inTgl.addEventListener('change', triggerAuto);
  dom.inNom.addEventListener('change', triggerAuto);
  dom.srcP.addEventListener('input', () => renderList(dom.listP, state.prediksi, dom.srcP.value));
  dom.srcJ.addEventListener('input', () => renderList(dom.listJ, state.jadwal, dom.srcJ.value));
  dom.srcL.addEventListener('input', () => renderList(dom.listL, state.link, dom.srcL.value));
  dom.btnRefresh.addEventListener('click', syncData);
  dom.btnReset.addEventListener('click', () => {
    dom.inTgl.value = ''; dom.inNom.value = '';
    selectedTipe = ''; selectedLabel = '';
    dom.chipTipe.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    dom.chipLabel.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    dom.chipTipe.querySelector('[data-value=""]')?.classList.add('active');
    dom.chipLabel.querySelector('[data-value=""]')?.classList.add('active');
    dom.resultBox.innerHTML = '<span style="color: var(--text-muted);">Pilih tipe & label untuk melihat hasil</span>';
    syncData();
  });
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      dom.tabP.style.display = tab === 'prediksi' ? 'block' : 'none';
      dom.tabH.style.display = tab === 'hitung' ? 'block' : 'none';
    };
  });
  dom.resultBox.onclick = () => {
    const txt = dom.resultBox.textContent.trim();
    if (txt && !txt.includes('Pilih')) copyText(txt, dom.resultBox);
  };
}

// === INIT ===
function init() {
  setupEvents();
  const savedTgl = localStorage.getItem(CONFIG.keyTanggal);
  const savedNom = localStorage.getItem(CONFIG.keyNominal);
  if (savedTgl) dom.inTgl.value = savedTgl;
  if (savedNom) { dom.inNom.value = savedNom; dom.inNom.dispatchEvent(new Event('change')); }
  syncData();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  init();
  setTimeout(() => showToast('✨ Ultra Cyber Core Loaded'), 1500);
});

document.querySelectorAll('.loading-overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('active'); });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.loading-overlay').forEach(o => o.classList.remove('active'));
});
</script>
</body>
</html>

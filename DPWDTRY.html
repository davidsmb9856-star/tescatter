<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg-void: #020810;
  --bg-deep: #040d1a;
  --bg-base: #061222;
  --bg-card: rgba(6, 18, 38, 0.75);
  --bg-card-hover: rgba(8, 24, 50, 0.85);
  --bg-elevated: rgba(10, 28, 56, 0.8);
  --bg-input: rgba(4, 12, 28, 0.9);

  --neon: #00b4ff;
  --neon-bright: #40ccff;
  --neon-intense: #00d4ff;
  --neon-deep: #0077cc;
  --neon-ultra: #00e8ff;

  --blue-soft: #3388cc;
  --blue-muted: #1a5588;
  --blue-dim: #0e3355;

  --fg: #c8daf0;
  --fg-bright: #e4f0ff;
  --fg-secondary: #7a9abf;
  --fg-muted: #3d5a7a;
  --fg-dim: #1e3550;

  --border: rgba(0, 180, 255, 0.08);
  --border-glow: rgba(0, 180, 255, 0.2);
  --border-active: rgba(0, 180, 255, 0.4);

  --glow-sm: 0 0 8px rgba(0, 180, 255, 0.15), 0 0 20px rgba(0, 180, 255, 0.06);
  --glow-md: 0 0 12px rgba(0, 180, 255, 0.2), 0 0 32px rgba(0, 180, 255, 0.08);
  --glow-lg: 0 0 16px rgba(0, 180, 255, 0.3), 0 0 48px rgba(0, 180, 255, 0.1), 0 0 80px rgba(0, 180, 255, 0.04);
  --glow-text: 0 0 10px rgba(0, 212, 255, 0.5), 0 0 30px rgba(0, 180, 255, 0.2);

  --blur: 24px;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-lg: 22px;
  --dur: 0.22s;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-void);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* ===== NOISE ===== */
body::after {
  content: '';
  position: fixed; inset: 0;
  z-index: 9999; pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ===== CYBER BACKGROUND ===== */
.cyber-bg {
  position: fixed; inset: 0; z-index: -4;
  background:
    radial-gradient(ellipse 80% 50% at 20% 15%, rgba(0, 180, 255, 0.07), transparent 55%),
    radial-gradient(ellipse 50% 40% at 80% 30%, rgba(0, 100, 200, 0.05), transparent 50%),
    radial-gradient(ellipse 70% 40% at 50% 95%, rgba(0, 150, 255, 0.04), transparent 50%),
    linear-gradient(175deg, #020810 0%, #061222 35%, #081a35 65%, #020810 100%);
}

/* ===== SCAN LINES ===== */
.scan-lines {
  position: fixed; inset: 0; z-index: -3; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 180, 255, 0.008) 2px,
    rgba(0, 180, 255, 0.008) 4px
  );
}

/* ===== GRID OVERLAY ===== */
.cyber-grid {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image:
    linear-gradient(rgba(0, 180, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 180, 255, 0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, black 10%, transparent 65%);
  -webkit-mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, black 10%, transparent 65%);
  animation: gridScroll 80s linear infinite;
}
@keyframes gridScroll { 0% { background-position: 0 0; } 100% { background-position: 60px 60px; } }

/* ===== NEON ORBS ===== */
.neon-orb {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: -1;
  filter: blur(90px);
}
.orb-primary { width: 550px; height: 550px; background: var(--neon); top: -20%; left: -8%; opacity: 0.06; animation: orbFloat 55s ease-in-out infinite alternate; }
.orb-secondary { width: 400px; height: 400px; background: var(--neon-deep); bottom: -15%; right: -5%; opacity: 0.05; animation: orbFloat 55s ease-in-out infinite alternate-reverse; }
.orb-tertiary { width: 300px; height: 300px; background: var(--neon-intense); top: 45%; left: 55%; opacity: 0.025; animation: orbFloat 70s ease-in-out infinite alternate; animation-delay: -20s; }
@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(25px, -20px) scale(1.05); }
  50% { transform: translate(-10px, 15px) scale(0.97); }
  75% { transform: translate(15px, 10px) scale(1.02); }
  100% { transform: translate(-5px, -12px) scale(1); }
}

/* ===== FLOATING PARTICLES ===== */
.particles-box { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.ptcl {
  position: absolute; border-radius: 50%; opacity: 0;
  animation: ptclRise linear infinite;
}
.ptcl-a { width: 2px; height: 2px; background: var(--neon-intense); box-shadow: 0 0 6px var(--neon), 0 0 14px rgba(0, 180, 255, 0.3); }
.ptcl-b { width: 1.5px; height: 1.5px; background: var(--neon-bright); box-shadow: 0 0 8px var(--neon-bright), 0 0 18px rgba(64, 204, 255, 0.2); }
.ptcl-c { width: 3px; height: 3px; background: var(--neon); box-shadow: 0 0 4px var(--neon); opacity: 0; }
@keyframes ptclRise {
  0% { transform: translateY(108vh) translateX(0) scale(0); opacity: 0; }
  8% { opacity: 0.8; transform: translateY(95vh) translateX(5px) scale(1); }
  50% { transform: translateY(50vh) translateX(-8px) scale(0.9); opacity: 0.6; }
  92% { opacity: 0.8; }
  100% { transform: translateY(-8vh) translateX(3px) scale(0.4); opacity: 0; }
}

/* ===== MAIN WRAPPER ===== */
.main-wrap { position: relative; z-index: 10; max-width: 1420px; margin: 0 auto; padding: 14px; }

/* ===== HEADER ===== */
.header-area {
  text-align: center; padding: 30px 0 22px;
  animation: headerIn 0.7s var(--ease) backwards;
}
@keyframes headerIn { from { opacity: 0; transform: translateY(-24px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

.logo-title {
  font-family: 'Exo 2', sans-serif;
  font-size: clamp(1.9rem, 5.5vw, 3.2rem);
  font-weight: 900;
  letter-spacing: 1px;
  color: var(--fg-bright);
  text-shadow: var(--glow-text);
  position: relative;
  display: inline-block;
}
.logo-title .neon-accent {
  color: var(--neon-intense);
  text-shadow: 0 0 12px rgba(0, 212, 255, 0.7), 0 0 36px rgba(0, 180, 255, 0.3);
}

.logo-sub {
  margin-top: 6px;
  font-size: 0.8rem;
  color: var(--fg-muted);
  letter-spacing: 4px;
  text-transform: uppercase;
  font-weight: 600;
}

.neon-divider {
  width: 100px; height: 2px; margin: 14px auto 0;
  border-radius: 2px;
  background: var(--neon);
  box-shadow: 0 0 8px var(--neon), 0 0 24px rgba(0, 180, 255, 0.3);
  position: relative;
  animation: divPulse 3s ease-in-out infinite;
}
.neon-divider::before, .neon-divider::after {
  content: ''; position: absolute; top: 50%; transform: translateY(-50%);
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--neon-intense);
  box-shadow: 0 0 8px var(--neon);
}
.neon-divider::before { left: -12px; }
.neon-divider::after { right: -12px; }
@keyframes divPulse { 0%, 100% { opacity: 0.6; box-shadow: 0 0 8px var(--neon), 0 0 24px rgba(0,180,255,0.3); } 50% { opacity: 1; box-shadow: 0 0 12px var(--neon), 0 0 36px rgba(0,180,255,0.4); } }

/* ===== TAB BAR ===== */
.tab-bar {
  display: flex; justify-content: center; gap: 4px;
  margin: 6px auto 22px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px;
  max-width: fit-content;
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  box-shadow: inset 0 1px 0 rgba(0, 180, 255, 0.05);
}

.tab-item {
  position: relative;
  padding: 11px 30px;
  font-family: 'Exo 2', sans-serif;
  font-weight: 700;
  font-size: 0.88rem;
  color: var(--fg-muted);
  background: transparent;
  border: 1px solid transparent;
  border-radius: calc(var(--radius) - 4px);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.tab-item:hover { color: var(--fg-secondary); background: rgba(0, 180, 255, 0.04); }
.tab-item.on {
  color: var(--neon-intense);
  background: rgba(0, 180, 255, 0.08);
  border-color: var(--border-glow);
  box-shadow: var(--glow-sm), inset 0 1px 0 rgba(0, 212, 255, 0.08);
}
.tab-item.on::after {
  content: '';
  position: absolute; bottom: -1px; left: 20%; right: 20%;
  height: 2px;
  background: var(--neon-intense);
  border-radius: 2px;
  box-shadow: 0 0 10px var(--neon), 0 0 20px rgba(0, 180, 255, 0.3);
}

/* ===== NEON PANEL ===== */
.neon-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  position: relative;
  overflow: hidden;
}
.neon-panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 5%, var(--neon) 20%, var(--neon-intense) 50%, var(--neon) 80%, transparent 95%);
  background-size: 200% 100%;
  animation: topScan 6s linear infinite;
  opacity: 0.5;
}
@keyframes topScan { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.neon-panel::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0, 180, 255, 0.15), transparent);
}

/* ===== CONTROL STRIP ===== */
.ctrl-strip {
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  padding: 14px 18px;
  background: linear-gradient(135deg, var(--bg-card), rgba(8, 22, 48, 0.7));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 20px;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
.ctrl-pair { display: flex; align-items: center; gap: 8px; }
.ctrl-tag {
  font-size: 0.76rem; font-weight: 700;
  color: var(--neon);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  text-shadow: 0 0 8px rgba(0, 180, 255, 0.4);
}

.neon-input {
  padding: 9px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius-sm);
  color: var(--fg-bright);
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  width: 165px;
  transition: all var(--dur) var(--ease);
  box-shadow: inset 0 0 12px rgba(0, 180, 255, 0.03);
}
.neon-input:focus {
  outline: none;
  border-color: var(--neon);
  box-shadow: var(--glow-sm), inset 0 0 16px rgba(0, 180, 255, 0.06);
  background: rgba(4, 14, 32, 0.95);
}

/* ===== NEON BUTTON ===== */
.neon-btn {
  position: relative;
  padding: 9px 22px;
  background: linear-gradient(135deg, var(--neon), var(--neon-deep));
  border: none;
  border-radius: var(--radius-sm);
  color: var(--bg-void);
  font-family: 'Exo 2', sans-serif;
  font-weight: 800;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 1px;
  overflow: hidden;
  box-shadow: 0 0 12px rgba(0, 180, 255, 0.15);
}
.neon-btn::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: var(--radius-sm);
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.3s;
}
.neon-btn:hover::before { opacity: 1; }
.neon-btn:hover {
  transform: translateY(-1px);
  box-shadow: var(--glow-md), 0 4px 16px rgba(0, 180, 255, 0.2);
}
.neon-btn:active { transform: translateY(0) scale(0.97); }
.neon-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
.neon-btn:disabled::before { display: none; }

.status-dot {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 0.76rem; font-weight: 700;
  color: var(--neon-bright);
  padding: 3px 10px;
  background: rgba(0, 180, 255, 0.06);
  border: 1px solid var(--border-glow);
  border-radius: 20px;
  animation: dotBlink 2.5s ease-in-out infinite;
}
.status-dot::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--neon-intense);
  box-shadow: 0 0 6px var(--neon);
}
@keyframes dotBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

/* ===== BENTO GRID ===== */
.bento { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

/* ===== CARD ===== */
.cyber-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: all var(--dur) var(--ease);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  position: relative;
}
.cyber-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0, 180, 255, 0.2), transparent);
  opacity: 0;
  transition: opacity var(--dur) var(--ease);
}
.cyber-card:hover::before { opacity: 1; }
.cyber-card:hover {
  border-color: var(--border-glow);
  transform: translateY(-3px);
  box-shadow: var(--glow-md), 0 8px 32px rgba(0, 0, 0, 0.3);
}

.card-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
  background: linear-gradient(90deg, rgba(0, 180, 255, 0.06), transparent 65%);
  border-bottom: 1px solid var(--border);
}
.card-title {
  font-family: 'Exo 2', sans-serif;
  font-weight: 700;
  font-size: 0.92rem;
  color: var(--neon-bright);
  text-shadow: 0 0 8px rgba(0, 180, 255, 0.3);
  letter-spacing: 0.3px;
}
.card-count {
  font-size: 0.68rem; font-weight: 700;
  padding: 2px 10px; border-radius: 20px;
  background: rgba(0, 180, 255, 0.08);
  color: var(--neon);
  border: 1px solid var(--border-glow);
  box-shadow: 0 0 8px rgba(0, 180, 255, 0.1);
}

.card-search { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.cyber-search {
  width: 100%;
  padding: 8px 12px 8px 36px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--fg-bright);
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.86rem;
  font-weight: 500;
  transition: all var(--dur) var(--ease);
  background-image: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2300b4ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cline x1='21' y1='21' x2='16.65' y2='16.65'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: 11px center;
}
.cyber-search:focus {
  outline: none;
  border-color: var(--neon);
  box-shadow: var(--glow-sm);
}
.cyber-search::placeholder { color: var(--fg-dim); }

.card-body { padding: 8px; overflow-y: auto; max-height: 400px; flex-grow: 1; }

/* ===== DATA ROW ===== */
.data-row {
  padding: 12px 14px;
  margin-bottom: 6px;
  background: rgba(4, 12, 28, 0.6);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  position: relative;
  overflow: hidden;
}
.data-row::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0;
  background: linear-gradient(180deg, var(--neon), var(--neon-deep));
  transition: width var(--dur) var(--ease);
  box-shadow: 2px 0 8px var(--neon);
}
.data-row:hover::before { width: 3px; }
.data-row:hover {
  border-color: var(--border-glow);
  background: rgba(6, 18, 40, 0.8);
  transform: translateX(3px);
  box-shadow: var(--glow-sm);
}
.data-row:active { transform: translateX(3px) scale(0.995); }

.row-micro { font-size: 0.6rem; font-weight: 700; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 2px; }
.row-name { font-weight: 700; color: var(--neon-bright); font-size: 0.9rem; margin-bottom: 3px; text-shadow: 0 0 6px rgba(0, 180, 255, 0.2); }
.row-hint { font-size: 0.58rem; font-weight: 700; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 3px; }
.row-text { font-size: 0.8rem; color: var(--fg-secondary); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }

/* ===== PASARAN BLOCK ===== */
.pasaran-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 10px;
  transition: all var(--dur) var(--ease);
}
.pasaran-block:hover {
  border-color: var(--border-glow);
  box-shadow: var(--glow-sm);
}
.pasaran-top {
  padding: 12px 16px;
  background: linear-gradient(90deg, rgba(0, 180, 255, 0.08), rgba(0, 100, 200, 0.03) 70%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.pasaran-top::before {
  content: '';
  width: 4px; height: 18px;
  background: var(--neon);
  border-radius: 2px;
  box-shadow: 0 0 8px var(--neon);
  flex-shrink: 0;
}
.pasaran-label {
  font-family: 'Exo 2', sans-serif;
  font-weight: 700;
  font-size: 0.88rem;
  color: var(--neon-bright);
  text-shadow: 0 0 8px rgba(0, 180, 255, 0.3);
}
.pasaran-list { padding: 6px 10px; max-height: 330px; overflow-y: auto; }

.bet-line {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px;
  margin-bottom: 4px;
  background: rgba(4, 12, 28, 0.5);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
.bet-line:hover {
  border-color: var(--border-glow);
  background: rgba(8, 22, 48, 0.7);
  transform: translateX(4px);
  box-shadow: var(--glow-sm);
}
.bet-name { color: var(--fg-secondary); font-size: 0.82rem; flex: 1; margin-right: 10px; font-weight: 600; }
.bet-val {
  font-family: 'Exo 2', sans-serif;
  font-weight: 800;
  font-size: 0.82rem;
  color: var(--neon-intense);
  padding: 3px 12px;
  background: rgba(0, 180, 255, 0.08);
  border: 1px solid var(--border-glow);
  border-radius: 8px;
  transition: all var(--dur) var(--ease);
  text-shadow: 0 0 6px rgba(0, 212, 255, 0.3);
}
.bet-line:hover .bet-val {
  background: rgba(0, 180, 255, 0.14);
  box-shadow: 0 0 14px rgba(0, 180, 255, 0.2);
  border-color: var(--border-active);
}

/* ===== SELECTOR ===== */
.neon-selector {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px;
  margin: 18px 0;
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  position: relative;
}
.neon-selector::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, rgba(0, 180, 255, 0.12), transparent 30%, transparent 70%, rgba(0, 100, 200, 0.08));
  z-index: -1;
  opacity: 0;
  transition: opacity var(--dur) var(--ease);
}
.neon-selector:hover::before { opacity: 1; }

.sel-head {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 14px; margin-bottom: 18px;
  border-bottom: 1px solid var(--border);
}
.sel-ico { font-size: 1.35rem; animation: icoHover 3.5s ease-in-out infinite; }
@keyframes icoHover { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
.sel-title {
  font-family: 'Exo 2', sans-serif;
  font-weight: 800;
  font-size: 1.05rem;
  color: var(--fg-bright);
  letter-spacing: 0.3px;
}

/* ===== PILL CHIPS ===== */
.pill-group { margin-bottom: 18px; }
.pill-label {
  font-family: 'Exo 2', sans-serif;
  font-size: 0.78rem; font-weight: 700;
  color: var(--neon);
  margin-bottom: 9px;
  display: flex; align-items: center; gap: 8px;
  text-shadow: 0 0 6px rgba(0, 180, 255, 0.3);
}
.pill-label::before {
  content: '';
  width: 3px; height: 16px;
  background: linear-gradient(180deg, var(--neon-intense), var(--neon-deep));
  border-radius: 2px;
  box-shadow: 0 0 6px var(--neon);
}
.pill-row { display: flex; flex-wrap: wrap; gap: 7px; }

.neon-pill {
  position: relative;
  padding: 7px 18px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--fg-muted);
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  overflow: hidden;
}
.neon-pill::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 100px;
  background: linear-gradient(135deg, rgba(0, 180, 255, 0.15), rgba(0, 100, 200, 0.1));
  opacity: 0;
  transition: opacity var(--dur) var(--ease);
}
.neon-pill:hover {
  color: var(--neon-bright);
  border-color: var(--border-glow);
}
.neon-pill:hover::before { opacity: 1; }
.neon-pill.lit {
  color: var(--bg-void);
  background: linear-gradient(135deg, var(--neon-intense), var(--neon));
  border-color: var(--neon);
  font-weight: 800;
  box-shadow: var(--glow-md);
  text-shadow: none;
}
.neon-pill.lit::after {
  content: '✓';
  position: absolute;
  right: 9px; top: 50%;
  transform: translateY(-50%);
  font-size: 0.65rem;
  font-weight: 900;
  animation: pop 0.3s var(--bounce);
}
@keyframes pop { 0% { transform: translateY(-50%) scale(0); } 60% { transform: translateY(-50%) scale(1.35); } 100% { transform: translateY(-50%) scale(1); } }

/* ===== ACTION ===== */
.action-area { margin-top: 6px; }
.neon-action {
  width: 100%;
  padding: 13px 28px;
  background: linear-gradient(135deg, var(--neon), var(--neon-deep));
  border: none;
  border-radius: var(--radius);
  color: var(--bg-void);
  font-family: 'Exo 2', sans-serif;
  font-weight: 800;
  font-size: 0.92rem;
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 16px rgba(0, 180, 255, 0.2);
}
.neon-action::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transition: left 0.6s var(--ease);
}
.neon-action:hover::before { left: 100%; }
.neon-action:hover {
  transform: translateY(-2px);
  box-shadow: var(--glow-lg), 0 6px 24px rgba(0, 180, 255, 0.25);
}
.neon-action:active { transform: translateY(0) scale(0.98); }

/* ===== RESULT BOX ===== */
.neon-result {
  margin-top: 18px;
  padding: 18px 22px;
  background: var(--bg-input);
  border: 1px solid var(--border-glow);
  border-radius: var(--radius);
  font-family: 'Exo 2', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--neon-intense);
  text-align: center;
  min-height: 56px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--dur) var(--ease);
  cursor: pointer;
  box-shadow: inset 0 0 20px rgba(0, 180, 255, 0.03);
  text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
}
.neon-result:hover {
  border-color: var(--border-active);
  box-shadow: var(--glow-md), inset 0 0 24px rgba(0, 180, 255, 0.05);
}
.neon-result.flash {
  animation: flashNeon 0.4s var(--bounce);
  border-color: var(--neon-intense);
  box-shadow: var(--glow-lg);
}
@keyframes flashNeon {
  0% { transform: scale(1); }
  40% { transform: scale(1.012); background: rgba(0, 180, 255, 0.08); }
  100% { transform: scale(1); }
}

/* ===== TOAST ===== */
.neon-toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px) scale(0.9);
  background: rgba(6, 18, 38, 0.95);
  color: var(--neon-bright);
  padding: 12px 30px;
  border-radius: 100px;
  font-weight: 700;
  font-size: 0.86rem;
  opacity: 0;
  transition: all 0.4s var(--bounce);
  z-index: 10000;
  border: 1px solid var(--neon);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--glow-lg), 0 8px 32px rgba(0, 0, 0, 0.4);
  white-space: nowrap;
  max-width: 90vw;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: 0 0 8px rgba(0, 212, 255, 0.4);
}
.neon-toast.pop { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

/* ===== AUTO BADGE ===== */
.auto-pill {
  position: fixed;
  top: 16px; right: 16px;
  background: rgba(6, 18, 38, 0.9);
  border: 1px solid var(--border-glow);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 0.74rem; font-weight: 700;
  color: var(--neon-bright);
  display: none; align-items: center; gap: 6px;
  z-index: 1000;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: var(--glow-sm);
  animation: autoPulse 1.5s ease-in-out infinite;
  text-shadow: 0 0 6px rgba(0, 180, 255, 0.3);
}
.auto-pill.on { display: flex; }
@keyframes autoPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

/* ===== LOADER ===== */
.cyber-spin {
  width: 30px; height: 30px;
  border: 2.5px solid var(--border);
  border-top-color: var(--neon);
  border-right-color: var(--neon-intense);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  box-shadow: 0 0 12px rgba(0, 180, 255, 0.15);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== EMPTY ===== */
.no-data {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 36px 16px;
  color: var(--fg-dim);
  font-size: 0.86rem;
  text-align: center;
}
.no-data-ico { font-size: 2.2rem; margin-bottom: 8px; opacity: 0.4; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-deep), var(--neon));
  border-radius: 10px;
  box-shadow: 0 0 6px rgba(0, 180, 255, 0.2);
}
::-webkit-scrollbar-thumb:hover { background: var(--neon-bright); }

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) { .bento { grid-template-columns: 1fr 1fr; } }
@media (max-width: 768px) {
  .bento { grid-template-columns: 1fr; }
  .ctrl-strip { flex-direction: column; align-items: stretch; }
  .ctrl-pair { width: 100%; justify-content: space-between; }
  .neon-input { width: 100%; }
  .tab-item { padding: 10px 22px; font-size: 0.84rem; }
  .logo-title { font-size: clamp(1.5rem, 6vw, 2.5rem); }
  .pill-row { justify-content: center; }
}

/* ===== ACCESSIBILITY ===== */
::selection { background: rgba(0, 180, 255, 0.25); color: var(--fg-bright); }
button:focus-visible, input:focus-visible {
  outline: 2px solid var(--neon);
  outline-offset: 2px;
  box-shadow: var(--glow-sm);
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="cyber-bg"></div>
<div class="scan-lines"></div>
<div class="cyber-grid"></div>
<div class="neon-orb orb-primary"></div>
<div class="neon-orb orb-secondary"></div>
<div class="neon-orb orb-tertiary"></div>
<div class="particles-box" id="particles"></div>

<div id="toast" class="neon-toast"></div>
<div class="auto-pill" id="autoPill"><span>🔄</span><span>Auto-Update Aktif</span></div>

<div class="main-wrap">

  <!-- HEADER -->
  <header class="header-area">
    <h1 class="logo-title">⚡ PREDIKSI & <span class="neon-accent">HITUNG</span> TOGEL ⚡</h1>
    <p class="logo-sub">Sistem Analisis Digital</p>
    <div class="neon-divider"></div>
  </header>

  <!-- TABS -->
  <nav class="tab-bar" role="tablist">
    <button class="tab-item on" data-tab="prediksi" role="tab" aria-selected="true">🔮 Prediksi</button>
    <button class="tab-item" data-tab="hitung" role="tab" aria-selected="false">🧮 Hitung</button>
  </nav>

  <!-- PANEL -->
  <div class="neon-panel">

    <!-- PREDIKSI -->
    <div id="tab-prediksi" class="tab-content" role="tabpanel">
      <div class="ctrl-strip">
        <div class="ctrl-pair">
          <span class="ctrl-tag">📅 Tanggal</span>
          <input type="date" id="input-tanggal" class="neon-input" aria-label="Pilih tanggal" onchange="autoUpdateTanggal()">
        </div>
        <button class="neon-btn" id="btn-tanggal" onclick="manualUpdateTanggal()">⚡ Update</button>
        <span class="status-dot" id="status-tanggal"></span>
      </div>

      <div class="bento">
        <div class="cyber-card">
          <div class="card-head">
            <h3 class="card-title">🔮 Prediksi</h3>
            <span class="card-count" id="count-prediksi">0</span>
          </div>
          <div class="card-search">
            <input type="text" class="cyber-search" id="search-prediksi" placeholder="Cari prediksi..." aria-label="Cari prediksi">
          </div>
          <div class="card-body" id="list-prediksi">
            <div style="display:flex;justify-content:center;padding:28px;"><div class="cyber-spin"></div></div>
          </div>
        </div>

        <div class="cyber-card">
          <div class="card-head">
            <h3 class="card-title">📅 Jadwal</h3>
            <span class="card-count" id="count-jadwal">0</span>
          </div>
          <div class="card-search">
            <input type="text" class="cyber-search" id="search-jadwal" placeholder="Cari jadwal..." aria-label="Cari jadwal">
          </div>
          <div class="card-body" id="list-jadwal">
            <div style="display:flex;justify-content:center;padding:28px;"><div class="cyber-spin"></div></div>
          </div>
        </div>

        <div class="cyber-card">
          <div class="card-head">
            <h3 class="card-title">🔗 Link Live</h3>
            <span class="card-count" id="count-link">0</span>
          </div>
          <div class="card-search">
            <input type="text" class="cyber-search" id="search-link" placeholder="Cari link..." aria-label="Cari link">
          </div>
          <div class="card-body" id="list-link">
            <div style="display:flex;justify-content:center;padding:28px;"><div class="cyber-spin"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- HITUNG -->
    <div id="tab-hitung" class="tab-content" role="tabpanel" style="display:none;">
      <div class="ctrl-strip">
        <div class="ctrl-pair">
          <span class="ctrl-tag">💰 Nominal</span>
          <input type="number" id="input-nominal" class="neon-input" placeholder="0" aria-label="Masukkan nominal" onchange="autoUpdateNominal()">
        </div>
        <button class="neon-btn" id="btn-nominal" onclick="manualUpdateNominal()">⚡ Update</button>
        <span class="status-dot" id="status-nominal"></span>
      </div>

      <div class="neon-selector">
        <div class="sel-head">
          <span class="sel-ico">🎯</span>
          <h3 class="sel-title">Pilih Hitungan</h3>
        </div>

        <div class="pill-group">
          <div class="pill-label">📊 Tipe Hitungan</div>
          <div class="pill-row" id="chipTipe">
            <div class="neon-pill" data-value="">Semua</div>
          </div>
        </div>

        <div class="pill-group">
          <div class="pill-label">🏷️ Pilih Label</div>
          <div class="pill-row" id="chipLabel">
            <div class="neon-pill" data-value="">Semua</div>
          </div>
        </div>

        <div class="action-area">
          <button class="neon-action" onclick="tampilkanValueHitungan()">✨ Tampilkan Hasil</button>
        </div>

        <div id="resultBox" class="neon-result">
          <span style="color: var(--fg-muted); font-weight: 500; font-size: 0.88rem;">Pilih tipe & label untuk melihat hasil</span>
        </div>
      </div>

      <div class="bento" id="container-hitung" style="margin-top: 16px;">
        <div style="display:flex;justify-content:center;padding:52px;width:100%;grid-column:1/-1;">
          <div class="cyber-spin"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4'
};

const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'),
  autoPill: $('autoPill'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};

let selectedTipe = '', selectedLabel = '';

/* Partikel */
function createParticles() {
  const box = $('particles');
  if (!box) return;
  const cls = ['ptcl-a', 'ptcl-b', 'ptcl-c'];
  for (let i = 0; i < 35; i++) {
    const d = document.createElement('div');
    d.className = 'ptcl ' + cls[i % 3];
    d.style.left = (Math.random() * 100) + '%';
    d.style.animationDelay = (Math.random() * 38) + 's';
    d.style.animationDuration = (30 + Math.random() * 18) + 's';
    box.appendChild(d);
  }
}

/* Toast */
function showToast(msg) {
  dom.toast.textContent = msg;
  dom.toast.classList.add('pop');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => dom.toast.classList.remove('pop'), 2800);
}
function showAutoPill() {
  if (!dom.autoPill) return;
  dom.autoPill.classList.add('on');
  clearTimeout(showAutoPill._t);
  showAutoPill._t = setTimeout(() => dom.autoPill.classList.remove('on'), 1800);
}

/* Copy */
function copyText(text, el) {
  let d = text;
  try { d = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(d).then(() => {
    const p = d.length > 26 ? d.substring(0, 26) + '...' : d;
    showToast('📋 Disalin: ' + p);
    if (el) { el.classList.add('flash'); setTimeout(() => el.classList.remove('flash'), 400); }
  }).catch(() => showToast('❌ Gagal menyalin'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

/* CSV */
function parseCSV(text) {
  const result = [];
  let row = [], entry = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], nx = text[i + 1];
    if (!inQ) {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(entry); entry = ''; }
      else if (c === '\r' && nx === '\n') { row.push(entry); result.push(row); row = []; entry = ''; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); result.push(row); row = []; entry = ''; }
      else entry += c;
    } else {
      if (c === '"' && nx === '"') { entry += '"'; i++; }
      else if (c === '"') inQ = false;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); result.push(row); }
  return result;
}
function safeGet(r, i) { return r && r[i] !== undefined ? r[i] : ''; }

/* Sheet Update */
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try {
    const res = await fetch(SCRIPT_URL + '?' + new URLSearchParams({ action, value }).toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error('Fetch Error:', e); return false; }
}

/* Fetch Prediksi */
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];

    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = dom.inTgl.value;
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const t = safeGet(data[i], 1);
      if (t) state.prediksi.push({ title: t.split(/[\s,]+/)[0], content: t });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const t = safeGet(data[i], 2);
      if (t) state.jadwal.push({ title: t.split(/[\s,]+/)[0], content: t });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const t = safeGet(data[i], 2);
      if (t) state.link.push({ title: t.split(/[\s,]+/)[0], content: t });
    }
    renderPrediksi();
  } catch(e) {
    console.error('Error Prediksi:', e);
    dom.listP.innerHTML = '<div class="no-data"><span class="no-data-ico">⚠️</span>Gagal memuat data</div>';
  }
}

/* Fetch Hitung */
async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = '💰 Rp ' + formatNum(nom); }
    }
    const sec = [
      { tR: 0, tC: 24, s: 2, e: 42 }, { tR: 43, tC: 24, s: 45, e: 80 },
      { tR: 81, tC: 24, s: 83, e: 119 }, { tR: 120, tC: 24, s: 122, e: 153 },
      { tR: 154, tC: 24, s: 156, e: 179 }, { tR: 180, tC: 24, s: 182, e: 213 },
      { tR: 215, tC: 24, s: 217, e: 248 }, { tR: 249, tC: 24, s: 251, e: 282 },
      { tR: 283, tC: 24, s: 285, e: 316 }
    ];
    state.hitung = sec.map(s => {
      const title = safeGet(data[s.tR], s.tC) || 'PASARAN';
      const items = [];
      for (let i = s.s; i <= s.e && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), r = safeGet(data[i], 24);
          if (type || r) items.push({ type, res: r });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) {
    console.error('Error Hitung:', e);
    dom.contH.innerHTML = '<div class="no-data"><span class="no-data-ico">⚠️</span>Gagal memuat data</div>';
  }
}

/* Render */
function renderList(container, items, search) {
  const q = search.toLowerCase();
  const f = items.filter(i => i.content.toLowerCase().includes(q));
  if (!f.length) { container.innerHTML = '<div class="no-data"><span class="no-data-ico">📭</span>Tidak ada data ditemukan</div>'; return; }
  container.innerHTML = f.map(v => `
    <div class="data-row" onclick="copyText('${encodeURIComponent(v.content)}', this)" role="button" tabindex="0">
      <div class="row-micro">Judul</div>
      <div class="row-name">${v.title}</div>
      <div class="row-hint">Klik untuk salin</div>
      <div class="row-text">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<div class="no-data"><span class="no-data-ico">📭</span>Tidak ada data</div>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-block">
      <div class="pasaran-top"><h3 class="pasaran-label">${s.title}</h3></div>
      <div class="pasaran-list">
        ${s.items.map(it => `
          <div class="bet-line" onclick="copyText('${encodeURIComponent(it.res)}', this)" role="button" tabindex="0">
            <span class="bet-name">${it.type}</span>
            <span class="bet-val">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

/* Chips */
function renderChips(container, items, type) {
  container.innerHTML = '<div class="neon-pill" data-value="">Semua</div>' +
    items.map(it => {
      const l = it.label || it;
      const d = l.length > 24 ? l.substring(0, 24) + '...' : l;
      return `<div class="neon-pill" data-value="${l}">${d}</div>`;
    }).join('');
  container.querySelectorAll('.neon-pill').forEach(pill => {
    pill.onclick = () => {
      container.querySelectorAll('.neon-pill').forEach(p => p.classList.remove('lit'));
      pill.classList.add('lit');
      if (type === 'tipe') { selectedTipe = pill.dataset.value; updateLabelChips(); }
      else { selectedLabel = pill.dataset.value; }
    };
  });
}
function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) { renderChips(dom.chipLabel, [], 'label'); return; }
  renderChips(dom.chipLabel, state.kelompok[selectedTipe].map(i => ({ label: i.label })), 'label');
}

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = '💰 Rp ' + formatNum(nom); }
    }
    const sec = [
      { tR: 0, tC: 24, s: 2, e: 42, title: 'SEMUA PASARAN' },
      { tR: 43, tC: 24, s: 45, e: 80, title: 'TOTO MACAU 4D' },
      { tR: 81, tC: 24, s: 83, e: 119, title: 'TOTO MACAU 5D' },
      { tR: 120, tC: 24, s: 122, e: 153, title: 'KINGKONG 4D' },
      { tR: 154, tC: 24, s: 156, e: 179, title: 'BONUS' },
      { tR: 180, tC: 24, s: 182, e: 213, title: 'JAKARTA' },
      { tR: 215, tC: 24, s: 217, e: 248, title: 'TOTOMALI' },
      { tR: 249, tC: 24, s: 251, e: 282, title: 'HOKIDRAW' },
      { tR: 283, tC: 24, s: 285, e: 316, title: 'SYDNEY & HK' }
    ];
    state.kelompok = {};
    sec.forEach(s => {
      const items = [];
      for (let i = s.s; i <= s.e && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || '-', value: value || '-' });
        }
      }
      if (items.length > 0) state.kelompok[s.title] = items;
    });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error('Error loadHitungData:', e); }
}

function tampilkanValueHitungan() {
  const box = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    box.innerHTML = '<span style="color: var(--fg-muted); font-weight: 500; font-size: 0.88rem;">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    box.innerHTML = `<span>${item.value}</span>`;
    box.onclick = () => copyText(item.value, box);
  } else {
    box.innerHTML = '<span style="color: var(--fg-muted); font-weight: 500; font-size: 0.88rem;">Data tidak ditemukan</span>';
  }
}

/* Auto-Update */
let autoT = null;
function autoUpdateTanggal() { showAutoPill(); clearTimeout(autoT); autoT = setTimeout(manualUpdateTanggal, 1200); }
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast('⚠️ Pilih tanggal terlebih dahulu');
  const p = dom.inTgl.value.split('-');
  const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = '⏳...';
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = '✅ OK';
      showToast('✅ Tanggal tersimpan!');
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statTgl.textContent = '❌ Gagal'; showToast('❌ Cek URL Script'); }
  });
}
function autoUpdateNominal() { showAutoPill(); clearTimeout(autoT); autoT = setTimeout(manualUpdateNominal, 1200); }
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast('⚠️ Isi nominal terlebih dahulu');
  dom.btnNom.disabled = true; dom.statNom.textContent = '⏳...';
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = '💰 Rp ' + formatNum(dom.inNom.value);
      showToast('✅ Nominal tersimpan!');
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statNom.textContent = '❌ Gagal'; showToast('❌ Cek URL Script'); }
  });
}

/* Init */
function init() {
  document.querySelectorAll('.tab-item').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-item').forEach(b => { b.classList.remove('on'); b.setAttribute('aria-selected', 'false'); });
      btn.classList.add('on');
      btn.setAttribute('aria-selected', 'true');
      dom.tabP.style.display = btn.dataset.tab === 'prediksi' ? 'block' : 'none';
      dom.tabH.style.display = btn.dataset.tab === 'hitung' ? 'block' : 'none';
    };
  });
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.target.classList.contains('data-row') || e.target.classList.contains('bet-line'))) e.target.click();
  });
  fetchPrediksi(); fetchHitung(); loadHitungData();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  init();
  setTimeout(() => showToast('⚡ Blue Neon Online'), 1000);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absen Keluar & Izin | Neon Blue</title>
    <style>
        :root {
            --neon: #00f3ff;
            --neon-dim: #0088cc;
            --neon-glow: rgba(0, 243, 255, 0.4);
            --bg-dark: #060a13;
            --card-bg: rgba(12, 18, 32, 0.85);
            --text-main: #e0f7ff;
            --text-muted: #8ba3b5;
            --success: #00ff9d;
            --warning: #ffcc00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 50% 10%, #0c1a2f 0%, var(--bg-dark) 60%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 16px;
            background-attachment: fixed;
        }

        /* Subtle grid background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 680px;
            background: var(--card-bg);
            border: 1px solid var(--neon-dim);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 0 25px var(--neon-glow), inset 0 0 12px rgba(0, 243, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        header { text-align: center; margin-bottom: 24px; }
        header h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--neon);
            text-shadow: 0 0 12px var(--neon-glow);
            margin-bottom: 6px;
        }
        header p { color: var(--text-muted); font-size: 0.9rem; }

        .clock-panel {
            text-align: center;
            padding: 18px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 14px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }
        .clock-panel::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,243,255,0.15), transparent);
            animation: scan 4s linear infinite;
        }
        @keyframes scan { 100% { left: 150%; } }

        #time { font-size: 2.6rem; font-weight: 700; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px var(--neon); }
        #date { font-size: 1rem; color: var(--text-muted); margin-top: 4px; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 24px; }
        @media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }

        .card {
            background: rgba(10, 15, 26, 0.9);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 14px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0, 243, 255, 0.15); }
        .card h3 { color: var(--neon); margin-bottom: 12px; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--neon), var(--neon-dim));
            color: #02060d;
            box-shadow: 0 4px 14px var(--neon-glow);
        }
        .btn-primary:hover { box-shadow: 0 6px 20px var(--neon-glow); transform: scale(1.02); }
        .btn-primary:active { transform: scale(0.98); }

        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 0.9rem; }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            transition: border 0.2s, box-shadow 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--neon);
            box-shadow: 0 0 0 3px rgba(0, 243, 255, 0.2);
        }
        textarea { resize: vertical; min-height: 80px; }

        .history {
            background: rgba(10, 15, 26, 0.8);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 14px;
            padding: 18px;
            max-height: 320px;
            overflow-y: auto;
        }
        .history h3 { margin-bottom: 14px; color: var(--neon); }
        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.95rem;
        }
        .log-item:last-child { border-bottom: none; }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge.out { background: rgba(0, 243, 255, 0.15); color: var(--neon); border: 1px solid rgba(0, 243, 255, 0.3); }
        .badge.leave { background: rgba(255, 204, 0, 0.15); color: var(--warning); border: 1px solid rgba(255, 204, 0, 0.3); }
        .log-time { color: var(--text-muted); font-size: 0.85rem; }
        .empty-state { text-align: center; color: var(--text-muted); padding: 30px 0; font-style: italic; }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(12, 18, 32, 0.95);
            border: 1px solid var(--neon);
            color: #fff;
            padding: 14px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 18px rgba(0, 243, 255, 0.3);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        .clear-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            float: right;
            transition: all 0.2s;
        }
        .clear-btn:hover { color: #ff4d4d; border-color: #ff4d4d; }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--neon-dim); border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⏱️ ABSENSI DIGITAL</h1>
        <p>Sistem Pencatatan Keluar & Permohonan Izin</p>
    </header>

    <div class="clock-panel">
        <div id="time">00:00:00</div>
        <div id="date">Memuat tanggal...</div>
    </div>

    <div class="grid">
        <!-- Absen Keluar -->
        <div class="card">
            <h3>🚪 Absen Keluar</h3>
            <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:14px;">
                Klik tombol di bawah untuk mencatat waktu pulang resmi Anda.
            </p>
            <button class="btn btn-primary" id="btnClockOut">⬇️ CATAT WAKTU KELUAR</button>
        </div>

        <!-- Form Izin -->
        <div class="card">
            <h3>📝 Form Permohonan Izin</h3>
            <div class="form-group">
                <label for="leaveDate">Tanggal Izin</label>
                <input type="date" id="leaveDate">
            </div>
            <div class="form-group">
                <label for="leaveReason">Alasan Izin</label>
                <textarea id="leaveReason" placeholder="Contoh: Keperluan keluarga mendesak..."></textarea>
            </div>
            <button class="btn btn-primary" id="btnSubmitLeave">📤 KIRIM PERMOHONAN</button>
        </div>
    </div>

    <div class="history">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <h3 style="margin:0;">📜 Riwayat Aktivitas</h3>
            <button class="clear-btn" id="btnClear">Hapus Semua</button>
        </div>
        <div id="logList">
            <div class="empty-state">Belum ada aktivitas tercatat.</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // State & DOM Elements
    const logList = document.getElementById('logList');
    const toast = document.getElementById('toast');
    const STORAGE_KEY = 'neon_absensi_data_v1';

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        updateClock();
        setInterval(updateClock, 1000);
        setDefaultDate();
        loadLogs();
        attachEvents();
    });

    // Clock Logic
    function updateClock() {
        const now = new Date();
        document.getElementById('time').textContent = now.toLocaleTimeString('id-ID', { hour12: false });
        document.getElementById('date').textContent = now.toLocaleDateString('id-ID', { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
        });
    }

    function setDefaultDate() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('leaveDate').value = today;
    }

    // Events
    function attachEvents() {
        document.getElementById('btnClockOut').addEventListener('click', handleClockOut);
        document.getElementById('btnSubmitLeave').addEventListener('click', handleLeave);
        document.getElementById('btnClear').addEventListener('click', clearLogs);
    }

    // Handlers
    function handleClockOut() {
        const now = new Date();
        addLog({
            type: 'out',
            label: 'Absen Keluar',
            timestamp: now.getTime(),
            detail: now.toLocaleString('id-ID')
        });
        showToast('✅ Berhasil mencatat waktu keluar');
    }

    function handleLeave() {
        const dateVal = document.getElementById('leaveDate').value;
        const reason = document.getElementById('leaveReason').value.trim();
        
        if (!dateVal) return showToast('⚠️ Tanggal izin wajib diisi', '#ffcc00');
        if (reason.length < 5) return showToast('⚠️ Alasan izin minimal 5 karakter', '#ffcc00');

        addLog({
            type: 'leave',
            label: 'Permohonan Izin',
            timestamp: Date.now(),
            detail: `${formatIDDate(dateVal)} - ${reason}`
        });

        document.getElementById('leaveReason').value = '';
        showToast('📩 Permohonan izin berhasil dikirim');
    }

    function clearLogs() {
        if (confirm('Yakin ingin menghapus semua riwayat?')) {
            localStorage.removeItem(STORAGE_KEY);
            renderLogs([]);
            showToast('🗑️ Riwayat dihapus');
        }
    }

    // Storage & Rendering
    function addLog(entry) {
        const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        logs.unshift(entry); // Add to top
        localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
        renderLogs(logs);
    }

    function loadLogs() {
        const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        renderLogs(logs);
    }

    function renderLogs(logs) {
        if (logs.length === 0) {
            logList.innerHTML = '<div class="empty-state">Belum ada aktivitas tercatat.</div>';
            return;
        }

        logList.innerHTML = logs.map(log => `
            <div class="log-item">
                <div>
                    <span class="badge ${log.type}">${log.label}</span>
                    <div style="margin-top:4px; color:#cfe8f5; font-size:0.9rem;">${log.detail}</div>
                </div>
                <div class="log-time">${new Date(log.timestamp).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}</div>
            </div>
        `).join('');
    }

    // Utilities
    function formatIDDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function showToast(msg, color = '#00f3ff') {
        toast.textContent = msg;
        toast.style.borderColor = color;
        toast.style.boxShadow = `0 4px 18px ${color}40`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
</script>

</body>
</html>

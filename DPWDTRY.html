<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* === ULTRA DARK BASE === */
  --bg-deep: #00020a;
  --bg-base: #01040f;
  --bg-card: rgba(3, 8, 28, 0.88);
  --bg-card-hover: rgba(6, 14, 42, 0.94);
  --bg-panel: rgba(5, 12, 38, 0.82);
  --bg-glass: rgba(7, 16, 48, 0.75);
  
  /* === NEON BLUE PALETTE - Enhanced === */
  --neon-cyan: #00e5ff;
  --neon-blue: #00b4ff;
  --neon-blue-deep: #0077cc;
  --neon-blue-glow: rgba(0, 180, 255, 0.65);
  --neon-blue-soft: rgba(0, 180, 255, 0.25);
  --neon-purple: #7b5cff;
  --neon-pink: #ff3d9b;
  
  /* === TEXT GRADIENTS === */
  --text-primary: #e6f4ff;
  --text-secondary: #9fb8d9;
  --text-muted: #5a7294;
  --text-dim: #3a4a66;
  
  /* === ENHANCED GLOW EFFECTS === */
  --glow-sm: 0 0 8px var(--neon-blue-soft), 0 0 18px var(--neon-blue-glow);
  --glow-md: 0 0 12px var(--neon-blue-soft), 0 0 28px var(--neon-blue-glow), 0 0 48px rgba(0, 180, 255, 0.15);
  --glow-lg: 0 0 16px var(--neon-blue-soft), 0 0 38px var(--neon-blue-glow), 0 0 72px rgba(0, 180, 255, 0.12), 0 0 120px rgba(0, 229, 255, 0.08);
  --glow-pulse: 0 0 10px var(--neon-blue-glow), 0 0 24px var(--neon-blue-glow), 0 0 42px rgba(0, 180, 255, 0.35);
  --glow-bloom: 0 0 0 rgba(0, 180, 255, 0), 0 0 20px rgba(0, 180, 255, 0.4), 0 0 45px rgba(0, 180, 255, 0.25), 0 0 85px rgba(0, 229, 255, 0.15);
  
  /* === BORDERS & ACCENTS === */
  --border-neon: rgba(0, 180, 255, 0.35);
  --border-neon-hover: rgba(0, 229, 255, 0.55);
  --border-subtle: rgba(100, 140, 190, 0.12);
  --accent-cyan: rgba(0, 229, 255, 0.18);
  --accent-purple: rgba(123, 92, 255, 0.15);
  
  /* === ANIMATIONS === */
  --ease-bloom: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --transition-fast: 180ms var(--ease-smooth);
  --transition-normal: 280ms var(--ease-smooth);
  --transition-bloom: 420ms var(--ease-bloom);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
::selection { background: var(--accent-cyan); color: var(--text-primary); }

body {
  font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.55;
  text-rendering: optimizeLegibility;
}

/* ═══════════════════════════════════════════════════════════ */
/* 🌌 BACKGROUND EFFECTS - ULTRA COOL */
/* ═══════════════════════════════════════════════════════════ */

.bg-neon {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(1200px 600px at 15% 15%, rgba(0, 180, 255, 0.08), transparent 65%),
    radial-gradient(900px 500px at 85% 25%, rgba(123, 92, 255, 0.06), transparent 70%),
    radial-gradient(1000px 550px at 50% 95%, rgba(0, 229, 255, 0.09), transparent 68%),
    radial-gradient(700px 400px at 30% 70%, rgba(0, 180, 255, 0.05), transparent 72%),
    linear-gradient(160deg, var(--bg-deep) 0%, #02081a 35%, var(--bg-base) 65%, var(--bg-deep) 100%);
  animation: bgFlow 60s ease-in-out infinite alternate;
}

@keyframes bgFlow {
  0%, 100% { 
    filter: hue-rotate(0deg) brightness(1) saturate(1);
    transform: scale(1);
  }
  25% { 
    filter: hue-rotate(3deg) brightness(1.02) saturate(1.05);
    transform: scale(1.005);
  }
  50% { 
    filter: hue-rotate(-2deg) brightness(0.98) saturate(0.98);
    transform: scale(0.998);
  }
  75% { 
    filter: hue-rotate(4deg) brightness(1.015) saturate(1.03);
    transform: scale(1.003);
  }
}

/* Grid Lines - Subtle Tech Pattern */
.grid-lines {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    linear-gradient(rgba(0, 180, 255, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 180, 255, 0.035) 1px, transparent 1px),
    linear-gradient(45deg, rgba(123, 92, 255, 0.018) 1px, transparent 1px),
    linear-gradient(-45deg, rgba(123, 92, 255, 0.018) 1px, transparent 1px);
  background-size: 60px 60px, 60px 60px, 120px 120px, 120px 120px;
  animation: gridDrift 70s linear infinite;
  opacity: 0.7;
}

@keyframes gridDrift {
  0% { background-position: 0 0, 0 0, 0 0, 0 0; }
  100% { background-position: 60px 60px, 60px 60px, 120px 120px, 120px 120px; }
}

/* Floating Orbs - Deep Space Effect */
.orb {
  position: fixed; border-radius: 50%; filter: blur(95px); opacity: 0.11;
  animation: orbFloat 55s ease-in-out infinite alternate; z-index: -1;
  mix-blend-mode: screen;
}
.orb-1 { 
  width: 850px; height: 850px; 
  background: radial-gradient(circle, var(--neon-cyan), transparent 70%); 
  top: -25%; left: -10%; 
  animation-delay: 0s;
}
.orb-2 { 
  width: 620px; height: 620px; 
  background: radial-gradient(circle, var(--neon-purple), transparent 70%); 
  bottom: -20%; right: -8%; 
  animation-delay: -28s;
}
.orb-3 { 
  width: 480px; height: 480px; 
  background: radial-gradient(circle, var(--neon-blue), transparent 70%); 
  top: 45%; left: 55%; 
  animation-delay: -14s;
  animation-duration: 48s;
}

@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.09; }
  25% { transform: translate(35px, -22px) scale(1.06) rotate(2deg); opacity: 0.13; }
  50% { transform: translate(-18px, 38px) scale(0.95) rotate(-1deg); opacity: 0.10; }
  75% { transform: translate(28px, 15px) scale(1.03) rotate(1deg); opacity: 0.12; }
  100% { transform: translate(-12px, -28px) scale(0.98) rotate(0deg); opacity: 0.11; }
}

/* Particle System - Magical Sparkles */
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; width: 2px; height: 2px; border-radius: 50%;
  background: var(--neon-cyan); opacity: 0;
  animation: particleRise 38s infinite ease-in-out;
  box-shadow: 0 0 8px var(--neon-blue), 0 0 18px var(--neon-cyan), 0 0 32px rgba(0, 229, 255, 0.4);
}
.particle:nth-child(3n+1) { background: var(--neon-blue); animation-delay: -8s; animation-duration: 42s; }
.particle:nth-child(3n+2) { background: var(--neon-purple); animation-delay: -18s; animation-duration: 35s; }
.particle:nth-child(3n+3) { background: var(--neon-cyan); animation-delay: -26s; animation-duration: 45s; }

@keyframes particleRise {
  0%, 100% { 
    transform: translateY(120vh) translateX(0) rotate(0deg) scale(0.8); 
    opacity: 0; 
  }
  8% { opacity: 0.92; }
  15% { transform: translateY(105vh) translateX(12px) rotate(45deg) scale(1); }
  45% { transform: translateY(55vh) translateX(-8px) rotate(180deg) scale(1.1); }
  75% { transform: translateY(15vh) translateX(6px) rotate(320deg) scale(0.95); opacity: 0.88; }
  92% { opacity: 0.45; }
  100% { 
    transform: translateY(-20vh) translateX(0) rotate(540deg) scale(0.7); 
    opacity: 0; 
  }
}

/* Scanline Overlay - Retro Futuristic */
.scanline-overlay {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 2px,
    rgba(0, 180, 255, 0.015) 2px,
    rgba(0, 180, 255, 0.015) 4px
  );
  animation: scanMove 8s linear infinite;
  opacity: 0.85;
}
@keyframes scanMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 100vh; }
}

/* ═══════════════════════════════════════════════════════════ */
/* 🎨 MAIN CONTAINER & LAYOUT */
/* ═══════════════════════════════════════════════════════════ */

.main-container {
  position: relative; z-index: 10;
  max-width: 1420px; margin: 0 auto; padding: 16px;
}

/* Header Section - Epic Title */
.header-section {
  text-align: center; padding: 28px 0 20px;
  animation: headerReveal 0.75s var(--transition-bloom) backwards;
}
@keyframes headerReveal {
  from { opacity: 0; transform: translateY(-22px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.8rem, 5.5vw, 3.2rem);
  font-weight: 800; letter-spacing: 3px;
  background: linear-gradient(135deg, 
    var(--text-primary) 0%, 
    var(--neon-cyan) 35%, 
    var(--neon-blue) 55%, 
    var(--neon-purple) 80%, 
    var(--neon-pink) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--glow-md);
  animation: titleGlow 5s ease-in-out infinite alternate;
  position: relative; display: inline-block;
}
@keyframes titleGlow {
  0%, 100% { filter: brightness(1) drop-shadow(0 0 12px var(--neon-blue-glow)); }
  50% { filter: brightness(1.18) drop-shadow(0 0 22px var(--neon-cyan)); }
}
.main-title::after {
  content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
  width: 85%; height: 2px;
  background: linear-gradient(90deg, 
    transparent, 
    var(--neon-blue-soft), 
    var(--neon-cyan), 
    var(--neon-blue-soft), 
    transparent);
  animation: linePulse 3.8s ease-in-out infinite;
  border-radius: 2px;
  box-shadow: 0 0 12px var(--neon-blue-glow);
}
@keyframes linePulse {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scaleX(0.95); }
  50% { opacity: 0.95; transform: translateX(-50%) scaleX(1.05); }
}

/* Subtitle */
.header-subtitle {
  color: var(--text-secondary); font-size: 1.05rem; margin-top: 12px;
  text-shadow: 0 0 8px rgba(0, 180, 255, 0.3);
  animation: fadeInUp 0.9s var(--transition-bloom) 0.15s backwards;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════ */
/* 🎯 TABS - Neon Chip Navigation */
/* ═══════════════════════════════════════════════════════════ */

.tabs-container {
  display: flex; justify-content: center; gap: 6px;
  margin: 12px 0 22px; padding: 5px;
  background: var(--bg-panel);
  border: 1px solid var(--border-neon);
  border-radius: 18px;
  max-width: fit-content; margin-inline: auto;
  box-shadow: var(--glow-sm);
  position: relative;
}
.tabs-container::before {
  content: ''; position: absolute; inset: -1px; border-radius: 19px;
  background: linear-gradient(135deg, transparent 30%, var(--neon-blue-soft) 50%, transparent 70%);
  filter: blur(8px); opacity: 0.5; z-index: -1;
  animation: borderGlow 4s ease-in-out infinite;
}
@keyframes borderGlow {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.7; }
}

.tab-chip {
  padding: 11px 28px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 600; font-size: 0.9rem;
  color: var(--text-muted);
  background: transparent; border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: all var(--transition-normal);
  position: relative;
  text-transform: uppercase; letter-spacing: 1.2px;
  z-index: 1;
}
.tab-chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 14px;
  background: linear-gradient(135deg, transparent, rgba(0, 180, 255, 0.15), transparent);
  opacity: 0; transition: opacity var(--transition-fast);
}
.tab-chip:hover {
  color: var(--neon-cyan);
  text-shadow: 0 0 10px var(--neon-blue-glow);
}
.tab-chip:hover::before { opacity: 1; }
.tab-chip.active {
  color: var(--text-primary);
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  border: 1px solid var(--border-neon-hover);
  box-shadow: var(--glow-md);
  text-shadow: 0 0 12px var(--neon-blue-glow);
}
.tab-chip.active::after {
  content: ''; position: absolute; bottom: -2px; left: 22%; right: 22%;
  height: 2px; background: var(--neon-cyan);
  border-radius: 2px; box-shadow: 0 0 10px var(--neon-cyan);
  animation: activeLine 2s ease-in-out infinite;
}
@keyframes activeLine {
  0%, 100% { opacity: 0.8; transform: scaleX(1); }
  50% { opacity: 1; transform: scaleX(1.05); }
}

/* ═══════════════════════════════════════════════════════════ */
/* 📦 CONTENT BOX - Glassmorphism Neon */
/* ═══════════════════════════════════════════════════════════ */

.content-box {
  background: var(--bg-card);
  border: 1px solid var(--border-neon);
  border-radius: 24px;
  padding: 22px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
  box-shadow: var(--glow-md);
  transition: box-shadow var(--transition-normal);
}
.content-box:hover { box-shadow: var(--glow-lg); }

/* Animated Top Border */
.content-box::before {
  content: ''; position: absolute; top: 0; left: -100%; right: 100%; height: 2px;
  background: linear-gradient(90deg, 
    transparent, 
    var(--neon-blue-soft), 
    var(--neon-cyan), 
    var(--neon-blue-soft), 
    transparent);
  animation: scanBorder 6s linear infinite;
  opacity: 0.85;
}
@keyframes scanBorder {
  0% { left: -100%; right: 100%; }
  50% { left: 0%; right: 0%; }
  100% { left: 100%; right: -100%; }
}

/* Corner Accents */
.content-box::after {
  content: ''; position: absolute; inset: 0; border-radius: 24px;
  padding: 1px; background: linear-gradient(135deg, 
    transparent 30%, 
    var(--neon-blue-soft) 50%, 
    transparent 70%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude;
  opacity: 0.4; pointer-events: none;
}

/* ═══════════════════════════════════════════════════════════ */
/* ⚙️ SETTINGS PANEL - Compact Neon */
/* ═══════════════════════════════════════════════════════════ */

.settings-panel {
  background: var(--bg-glass);
  border: 1px solid var(--border-neon);
  border-radius: 18px;
  padding: 14px 18px;
  margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 14px;
  align-items: center; justify-content: center;
  box-shadow: var(--glow-sm);
}

.setting-item {
  display: flex; align-items: center; gap: 10px;
  white-space: nowrap;
}
.setting-label {
  color: var(--neon-cyan);
  font-size: 0.82rem; font-weight: 600;
  text-shadow: 0 0 8px var(--neon-blue-glow);
  letter-spacing: 0.5px;
}

.input-neon {
  padding: 9px 14px;
  background: rgba(2, 6, 20, 0.82);
  border: 1px solid rgba(0, 180, 255, 0.32);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 0.92rem;
  width: 165px;
  transition: all var(--transition-fast);
  font-family: 'Space Grotesk', sans-serif;
}
.input-neon::placeholder { color: var(--text-muted); opacity: 0.75; }
.input-neon:focus {
  outline: none;
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-md);
  background: rgba(4, 10, 28, 0.92);
  transform: translateY(-1px);
}

/* ═══════════════════════════════════════════════════════════ */
/* 🔘 BUTTONS - Bloom Effect */
/* ═══════════════════════════════════════════════════════════ */

.btn-neon {
  padding: 10px 22px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-deep));
  border: none; border-radius: 14px;
  color: #000812;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.85rem;
  cursor: pointer;
  transition: all var(--transition-bloom);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 1.1px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--glow-sm);
}
.btn-neon::before {
  content: ''; position: absolute; inset: 0; border-radius: 14px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(255,255,255,0.45), 
    transparent);
  transform: translateX(-100%);
  transition: transform 0.5s ease;
}
.btn-neon:hover::before { transform: translateX(100%); }
.btn-neon:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: var(--glow-lg);
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
}
.btn-neon:active {
  transform: translateY(0) scale(0.98);
  transition-duration: 80ms;
}
.btn-neon:disabled {
  opacity: 0.48; cursor: not-allowed;
  transform: none; box-shadow: none;
}

/* Status Badge - Pulsing */
.status-badge {
  font-size: 0.82rem;
  color: #00ffd4;
  margin-left: 8px;
  font-weight: 600;
  text-shadow: 0 0 10px rgba(0, 255, 212, 0.55);
  animation: badgePulse 2.8s ease-in-out infinite;
}
@keyframes badgePulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.78; transform: scale(0.96); }
}

/* ═══════════════════════════════════════════════════════════ */
/* 📊 DATA GRID - Responsive Layout */
/* ═══════════════════════════════════════════════════════════ */

.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 18px;
}

/* Section Box - Card Style */
.section-box {
  background: linear-gradient(145deg, 
    rgba(8, 18, 48, 0.78), 
    rgba(12, 24, 62, 0.68));
  border: 1px solid var(--border-neon);
  border-radius: 20px;
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: all var(--transition-normal);
  box-shadow: var(--glow-sm);
}
.section-box:hover {
  border-color: var(--border-neon-hover);
  box-shadow: var(--glow-lg);
  transform: translateY(-3px);
}

.section-header {
  background: linear-gradient(90deg, 
    rgba(0, 180, 255, 0.12), 
    transparent 78%);
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 600; color: var(--neon-cyan);
  font-size: 0.96rem;
  text-shadow: 0 0 10px var(--neon-blue-glow);
  letter-spacing: 0.5px;
}
.badge-count {
  background: var(--accent-cyan);
  color: var(--neon-cyan);
  padding: 3px 10px;
  border-radius: 18px;
  font-size: 0.72rem;
  font-weight: 700;
  border: 1px solid rgba(0, 229, 255, 0.35);
  text-shadow: 0 0 6px var(--neon-blue-glow);
}

/* Search Box */
.search-box { padding: 10px 14px; border-bottom: 1px solid var(--border-subtle); }
.search-input {
  width: 100%;
  padding: 9px 13px;
  background: rgba(3, 8, 24, 0.72);
  border: 1px solid rgba(0, 180, 255, 0.28);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 0.88rem;
  transition: all var(--transition-fast);
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus {
  outline: none;
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-md);
  background: rgba(5, 12, 32, 0.85);
}

.section-content {
  padding: 10px;
  overflow-y: auto;
  max-height: 410px;
  flex-grow: 1;
}

/* ═══════════════════════════════════════════════════════════ */
/* 🃏 ITEM CARD - Interactive Neon */
/* ═══════════════════════════════════════════════════════════ */

.item-card {
  background: linear-gradient(135deg, 
    rgba(6, 14, 42, 0.72), 
    rgba(10, 20, 54, 0.62));
  border: 1px solid var(--border-subtle);
  border-radius: 16px;
  padding: 13px 15px;
  margin-bottom: 9px;
  cursor: pointer;
  transition: all var(--transition-bloom);
  position: relative;
  overflow: hidden;
}
.item-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 16px;
  background: linear-gradient(135deg, 
    transparent, 
    rgba(0, 180, 255, 0.18), 
    transparent);
  opacity: 0; transition: opacity var(--transition-fast);
  pointer-events: none;
}
.item-card:hover::before { opacity: 1; }
.item-card:hover {
  border-color: var(--border-neon-hover);
  box-shadow: var(--glow-lg);
  background: linear-gradient(135deg, 
    rgba(9, 18, 52, 0.82), 
    rgba(14, 26, 68, 0.72));
  transform: translateY(-2px);
}
.item-card:active { transform: translateY(0); transition-duration: 60ms; }

.item-label {
  font-size: 0.68rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 3px;
  font-weight: 600;
  opacity: 0.9;
}
.item-title {
  color: var(--neon-cyan);
  font-weight: 600;
  margin-bottom: 4px;
  font-size: 0.92rem;
  text-shadow: 0 0 8px var(--neon-blue-glow);
}
.item-content {
  font-size: 0.84rem;
  color: var(--text-secondary);
  line-height: 1.45;

/* ═══════════════════════════════════════════════════════════ */
/* 🎰 PASARAN BOX - Prediction Results */
/* ═══════════════════════════════════════════════════════════ */

.pasaran-box {

.pasaran-box:hover {

}

.pasaran-header {

}
.pasaran-title {

}

.pasaran-content {

}

.bet-item {

}
.bet-item:hover {

}
.bet-type {

}
.bet-result {

  font-weight: 700; color: var(--neon-cyan);
  font-size: 0.84rem;
  background: var(--accent-cyan);
  padding: 3px 9px; border-radius: 10px;
  border: 1px solid rgba(0, 229, 255, 0.32);
  text-shadow: 0 0 8px var(--neon-blue-glow);
  transition: all var(--transition-fast);
}
.bet-item:hover .bet-result {
  background: rgba(0, 229, 255, 0.28);
  box-shadow: 0 0 12px var(--neon-blue-glow);
  transform: scale(1.05);
}

/* ═══════════════════════════════════════════════════════════ */
/* 🎯 NEON SELECTOR - Chip Based */
/* ═══════════════════════════════════════════════════════════ */

.neon-selector {
  background: linear-gradient(135deg, 
    rgba(9, 18, 52, 0.78), 
    rgba(14, 26, 68, 0.68));
  border: 1px solid var(--border-neon);
  border-radius: 20px;
  padding: 18px;

  box-shadow: var(--glow-sm);
}

.selector-header {

  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border-subtle);
}
.selector-icon {
  font-size: 1.4rem;
  animation: iconBounce 4s ease-in-out infinite;
  filter: drop-shadow(0 0 8px var(--neon-blue-glow));
}
@keyframes iconBounce {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-4px) scale(1.08); }
}
.selector-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700; color: var(--neon-cyan);
  font-size: 1.05rem;
  text-shadow: 0 0 12px var(--neon-blue-glow);
  letter-spacing: 0.5px;
}

/* Chip Group */
.chip-group { margin-bottom: 14px; }
.chip-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.82rem; font-weight: 600;
  color: var(--neon-cyan);
  margin-bottom: 9px;
  display: flex; align-items: center; gap: 7px;
}
.chip-label::before {
  content: ''; width: 3px; height: 14px;
  background: var(--neon-cyan);
  border-radius: 2px;
  box-shadow: 0 0 8px var(--neon-cyan);
  opacity: 0.85;
}

.chips-row {
  display: flex; flex-wrap: wrap; gap: 8px;
}

.chip {
  padding: 7px 16px;
  background: rgba(4, 10, 32, 0.75);
  border: 1px solid rgba(0, 180, 255, 0.25);
  border-radius: 24px;
  color: var(--text-muted);
  font-size: 0.82rem; font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-bloom);
  position: relative; overflow: hidden;
}
.chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 24px;
  background: linear-gradient(135deg, 
    transparent, 
    rgba(0, 180, 255, 0.22), 
    transparent);
  opacity: 0; transition: opacity var(--transition-fast);
}
.chip:hover {
  color: var(--neon-cyan);
  border-color: rgba(0, 229, 255, 0.45);
  text-shadow: 0 0 8px var(--neon-blue-glow);
}
.chip:hover::before { opacity: 1; }
.chip.active {
  color: #000510;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-md);
  font-weight: 700;
  text-shadow: 0 0 6px rgba(255,255,255,0.4);
}
.chip.active::after {
  content: '✓'; position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%);
  font-size: 0.75rem; font-weight: 800;
  animation: checkPop 0.32s var(--ease-bloom);
  text-shadow: none;
}
@keyframes checkPop {
  0% { transform: translateY(-50%) scale(0); opacity: 0; }
  60% { transform: translateY(-50%) scale(1.3); opacity: 1; }
  100% { transform: translateY(-50%) scale(1); opacity: 1; }
}

/* Result Display - Copy Ready */
.result-box {
  margin-top: 16px;
  padding: 16px 22px;
  background: rgba(5, 14, 42, 0.85);
  border: 1.5px solid rgba(0, 180, 255, 0.35);
  border-radius: 16px;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.15rem;
  color: var(--neon-cyan);
  text-align: center;
  min-height: 56px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition-bloom);
  cursor: pointer;
  box-shadow: var(--glow-sm);
}
.result-box:hover {
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-lg);
  background: rgba(7, 18, 52, 0.92);
}
.result-box.copied {

  border-color: #00ffd4;
  box-shadow: 0 0 20px rgba(0, 255, 212, 0.55);
  background: rgba(0, 255, 212, 0.08);
}
@keyframes copySuccess {
  0% { transform: scale(1); }
  40% { transform: scale(1.04); }
  100% { transform: scale(1); }
}

/* Hitung Row */
.hitung-row {
  display: grid; grid-template-columns: 1fr auto; gap: 14px;

}
.hitung-btn {

  font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.88rem;

  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  box-shadow: var(--glow-md);
}
.hitung-btn:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: var(--glow-lg);
  filter: brightness(1.08);
}
.hitung-btn:active {
  transform: translateY(0) scale(0.97);
  transition-duration: 70ms;
}

/* ═══════════════════════════════════════════════════════════ */
/* 🍞 TOAST NOTIFICATION - Bloom Style */
/* ═══════════════════════════════════════════════════════════ */

.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(120px) scale(0.92);
  background: linear-gradient(135deg, 
    rgba(8, 18, 48, 0.96), 
    rgba(12, 24, 68, 0.94));
  color: var(--neon-cyan);
  padding: 13px 32px;
  border-radius: 52px;
  font-weight: 600; font-size: 0.92rem;
  opacity: 0;
  transition: all var(--transition-bloom);
  z-index: 1000;
  border: 1.5px solid var(--neon-cyan);
  backdrop-filter: blur(16px);
  text-shadow: 0 0 10px var(--neon-blue-glow);
  box-shadow: var(--glow-lg);
  letter-spacing: 0.3px;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0) scale(1);
  animation: toastBloom 0.5s var(--ease-bloom);
}
@keyframes toastBloom {
  0% { box-shadow: 0 0 0 rgba(0, 180, 255, 0); }
  50% { box-shadow: var(--glow-bloom); }
  100% { box-shadow: var(--glow-lg); }
}

/* ═══════════════════════════════════════════════════════════ */
/* 🌀 LOADING SPINNER - Neon Pulse */
/* ═══════════════════════════════════════════════════════════ */

.spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(0, 180, 255, 0.18);
  border-top-color: var(--neon-cyan);
  border-radius: 50%;
  animation: spin 1s linear infinite, glowPulse 2s ease-in-out infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 0 rgba(0, 229, 255, 0); }
  50% { box-shadow: 0 0 18px var(--neon-cyan), 0 0 38px rgba(0, 180, 255, 0.4); }
}

/* ═══════════════════════════════════════════════════════════ */
/* 🔄 AUTO-UPDATE INDICATOR */
/* ═══════════════════════════════════════════════════════════ */

.auto-update-indicator {
  position: fixed; top: 16px; right: 16px;
  background: rgba(0, 180, 255, 0.12);
  border: 1px solid var(--border-neon);
  border-radius: 12px;
  padding: 6px 14px;
  font-size: 0.78rem;

  z-index: 1000;
  backdrop-filter: blur(10px);

  box-shadow: var(--glow-sm);
}
.auto-update-indicator.show { display: flex; }
@keyframes indicatorPulse {
  0%, 100% { opacity: 0.72; box-shadow: var(--glow-sm); }
  50% { opacity: 1; box-shadow: var(--glow-md); }
}

/* ═══════════════════════════════════════════════════════════ */
/* 🎨 SCROLLBAR - Custom Neon */
/* ═══════════════════════════════════════════════════════════ */

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track {

}
::-webkit-scrollbar-thumb {

}
::-webkit-scrollbar-thumb:hover {

/* ═══════════════════════════════════════════════════════════ */

}

<script>
// ═══════════════════════════════════════════════════════════
// ⚙️ KONFIGURASI & STATE
// ═══════════════════════════════════════════════════════════

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4'
};

const state = { 
  prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} 
};

const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'),
  autoUpdate: $('autoUpdateIndicator'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};

let selectedTipe = '', selectedLabel = '';
let autoTimeout = null;

// ═══════════════════════════════════════════════════════════
// 🎨 PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════

function createParticles() {
  const container = $('particles');
  if (!container) return;
  for(let i = 0; i < 42; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 38 + 's';
    p.style.animationDuration = (32 + Math.random() * 18) + 's';
    container.appendChild(p);
  }
}

// ═══════════════════════════════════════════════════════════
// 🔔 TOAST & UTILS
// ═══════════════════════════════════════════════════════════

function showToast(msg) {
  dom.toast.textContent = '✨ ' + msg;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 2800);
}

function showAutoUpdate() {
  if (dom.autoUpdate) {
    dom.autoUpdate.classList.add('show');
    setTimeout(() => dom.autoUpdate.classList.remove('show'), 1800);
  }
}

function copyText(text, element) {
  let finalText = text;
  try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 22 ? finalText.substring(0, 22) + '...' : finalText;
    showToast('📋 Disalin: ' + preview);
    if (element) {
      element.classList.add('copied');
      setTimeout(() => element.classList.remove('copied'), 400);
    }
  }).catch(() => showToast('❌ Gagal menyalin'));
}

function formatNum(n) { 
  return new Intl.NumberFormat('id-ID').format(n); 
}

// ═══════════════════════════════════════════════════════════
// 📄 CSV PARSER (Robust)
// ═══════════════════════════════════════════════════════════

function parseCSV(text) {
  let p = [], row = [], entry = "", st = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(entry); entry = ""; }
      else if (c === '\r' && n === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { entry += '"'; i++; }
      else if (c === '"') st = 0;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); p.push(row); }
  return p;
}

function safeGet(row, idx) { 
  return row && row[idx] !== undefined ? row[idx] : ""; 
}

// ═══════════════════════════════════════════════════════════
// 🔄 DATA FETCHING
// ═══════════════════════════════════════════════════════════

async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { 
    showToast('❌ Script URL belum disetup!'); 
    return false; 
  }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { 
    console.error("Fetch Error:", e); 
    return false; 
  }
}

async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = dom.inTgl.value;
        }
      }
    }
    
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ 
        title: txt.split(/[\s,]+/)[0], 
        content: txt 
      });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ 
        title: txt.split(/[\s,]+/)[0], 
        content: txt 
      });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ 
        title: txt.split(/[\s,]+/)[0], 
        content: txt 
      });
    }
    renderPrediksi();
  } catch(e) {
    console.error("Error Prediksi:", e);
    dom.listP.innerHTML = '<p class="empty-state">❌ Gagal memuat data</p>';
  }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { 
        dom.inNom.value = nom; 
        dom.statNom.textContent = "💰 Rp " + formatNum(nom); 
      }
    }
    
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 }, 
      { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 }, 
      { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 }, 
      { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 }, 
      { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    
    state.hitung = secDef.map(s => {
      let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
      let items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), res = safeGet(data[i], 24);
          if (type || res) items.push({ type, res });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    
    renderHitung();
  } catch(e) {
    console.error("Error Hitung:", e);
    dom.contH.innerHTML = '<p class="empty-state">❌ Gagal memuat data</p>';
  }
}

// ═══════════════════════════════════════════════════════════
// 🎨 RENDERING FUNCTIONS
// ═══════════════════════════════════════════════════════════

function renderList(container, items, search) {
  const filtered = items.filter(i => 
    i.content.toLowerCase().includes(search.toLowerCase())
  );
  
  if (!filtered.length) { 
    container.innerHTML = '<p class="empty-state">📭 Tidak ada data ditemukan</p>'; 
    return; 
  }
  
  container.innerHTML = filtered.map(v => `
    <div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}', this)" tabindex="0">
      <div class="item-label">📋 Judul</div>
      <div class="item-title">${v.title}</div>
      <div class="item-label">💬 Isi (Klik untuk Copy)</div>
      <div class="item-content">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) { 
    dom.contH.innerHTML = '<p class="empty-state">📭 Tidak ada data</p>'; 
    return; 
  }
  
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-box">
      <div class="pasaran-header">
        <h3 class="pasaran-title">🎯 ${s.title}</h3>
      </div>
      <div class="pasaran-content">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}', this)" tabindex="0">
            <span class="bet-type">${it.type}</span>
            <span class="bet-result">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════
// 🎯 CHIP SELECTOR LOGIC
// ═══════════════════════════════════════════════════════════

function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + 
    items.map(it => {
      const label = it.label || it;
      const display = label.length > 22 ? label.substring(0, 22) + '...' : label;
      return `<div class="chip" data-value="${label}">${display}</div>`;
    }).join('');
  
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (type === 'tipe') {
        selectedTipe = chip.dataset.value;
        updateLabelChips();
      } else {
        selectedLabel = chip.dataset.value;
      }
    };
  });
}

function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) {
    renderChips(dom.chipLabel, [], 'label');
    return;
  }
  const labels = state.kelompok[selectedTipe].map(i => i.label);
  renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { 
        dom.inNom.value = nom; 
        dom.statNom.textContent = "💰 Rp " + formatNum(nom); 
      }
    }
    
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "SEMUA PASARAN" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "BONUS" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "JAKARTA" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "TOTOMALI" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "HOKIDRAW" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY & HK" }
    ];
    
    state.kelompok = {};
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length > 0) state.kelompok[sec.title] = items;
    });
    
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { 
    console.error("Error loadHitungData:", e); 
  }
}

function tampilkanValueHitungan() {
  const result = dom.resultBox;
  
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = '<span style="color: var(--text-muted);">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    result.innerHTML = `<span style="font-weight: 700; text-shadow: 0 0 10px var(--neon-blue-glow);">${item.value}</span>`;
    result.onclick = () => copyText(item.value, result);
  }
}

// ═══════════════════════════════════════════════════════════
// ⚡ AUTO-UPDATE FUNCTIONS
// ═══════════════════════════════════════════════════════════

function autoUpdateTanggal() {
  showAutoUpdate();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateTanggal, 1000);
}

function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal!");
  const p = dom.inTgl.value.split('-');
  const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  
  dom.btnTgl.disabled = true; 
  dom.statTgl.textContent = "⏳...";
  
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = "✅ OK";
      showToast("📅 Data tersimpan!");
      fetchPrediksi(); 
      fetchHitung(); 
      loadHitungData();
    } else { 
      dom.statTgl.textContent = "❌"; 
      showToast("❌ Cek koneksi atau Script URL"); 
    }
  });
}

function autoUpdateNominal() {
  showAutoUpdate();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateNominal, 1000);
}

function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Isi nominal!");
  
  dom.btnNom.disabled = true; 
  dom.statNom.textContent = "⏳...";
  
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value);
      showToast("💰 Nominal tersimpan!");
      fetchPrediksi(); 
      fetchHitung(); 
      loadHitungData();
    } else { 
      dom.statNom.textContent = "❌"; 
      showToast("❌ Cek koneksi atau Script URL"); 
    }
  });
}

// ═══════════════════════════════════════════════════════════
// 🚀 INITIALIZATION
// ═══════════════════════════════════════════════════════════

function initTabs() {
  document.querySelectorAll('.tab-chip').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active'));
      t.classList.add('active');
      dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
      dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
    };
  });
}

function initSearch() {
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
}

function init() {
  initTabs();
  initSearch();
  fetchPrediksi(); 
  fetchHitung(); 
  loadHitungData();
}

// ═══════════════════════════════════════════════════════════
// 🎬 DOM READY
// ═══════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  init();
  setTimeout(() => showToast('🌙 Blue Neon Loaded • Ready!'), 1100);
});

// Keyboard support for cards
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement.classList.contains('item-card')) {
    document.activeElement.click();
  }
});

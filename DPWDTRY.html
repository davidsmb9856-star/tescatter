<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  /* === CYBER CORE 2026 TOKENS === */
  --bg-deep: #020408;
  --bg-surface: rgba(5, 15, 35, 0.92);
  --bg-card: rgba(8, 20, 45, 0.78);
  --bg-card-hover: rgba(12, 28, 58, 0.88);
  --bg-panel: rgba(10, 25, 55, 0.72);
  
  /* === NEON COLORS - DIMMED BUT VIBRANT === */
  --neon-blue: #00d4ff;
  --neon-blue-bright: #66e5ff;
  --neon-blue-dark: #0099cc;
  --neon-electric: #00ffff;
  --neon-purple: #7b2fff;
  --neon-pink: #ff3e6c;
  --neon-green: #00ff9d;
  
  /* === TEXT === */
  --text-primary: #ffffff;
  --text-secondary: #8ab4f8;
  --text-muted: #54689a;
  --text-dim: #3a4a6b;
  
  /* === GLOW EFFECTS - SUBTLE BUT IMPACTFUL === */
  --glow-blue: 0 0 8px rgba(0, 212, 255, 0.5), 0 0 22px rgba(0, 212, 255, 0.25);
  --glow-blue-lg: 0 0 12px rgba(0, 212, 255, 0.6), 0 0 35px rgba(0, 212, 255, 0.35);
  --glow-electric: 0 0 10px rgba(0, 255, 255, 0.55), 0 0 28px rgba(0, 255, 255, 0.3);
  --glow-soft: 0 0 5px rgba(0, 212, 255, 0.35);
  
  /* === BORDERS === */
  --border-glow: rgba(0, 212, 255, 0.45);
  --border-soft: rgba(0, 212, 255, 0.22);
  --border-hover: rgba(0, 212, 255, 0.55);
  
  /* === TRANSITIONS === */
  --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  --transition-bloom: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-deep); color: var(--text-primary);
  min-height: 100vh; overflow-x: hidden; position: relative;
  line-height: 1.5;
}

/* === BACKGROUND LAYERS === */
.bg-canvas {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 15%, rgba(0, 255, 255, 0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 85%, rgba(123, 47, 255, 0.05) 0%, transparent 55%),
    linear-gradient(180deg, var(--bg-deep) 0%, #030712 50%, var(--bg-deep) 100%);
  animation: bgPulse 18s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0%, 100% { opacity: 1; filter: hue-rotate(0deg) brightness(1); }
  50% { opacity: 0.95; filter: hue-rotate(8deg) brightness(1.02); }
}

.grid-overlay {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, black 35%, transparent 78%);
  animation: gridMove 35s linear infinite;
  opacity: 0.7;
}
@keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 48px 48px; } }

.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; width: 3px; height: 3px; border-radius: 50%;
  background: var(--neon-blue); opacity: 0;
  animation: particleFloat 24s infinite ease-in-out;
  box-shadow: 0 0 12px var(--neon-blue), 0 0 24px var(--neon-electric);
}
.particle:nth-child(2n) { background: var(--neon-electric); animation-delay: -8s; animation-duration: 28s; }
.particle:nth-child(3n) { background: var(--neon-purple); animation-delay: -14s; animation-duration: 32s; }
@keyframes particleFloat {
  0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  12% { opacity: 0.75; }
  88% { opacity: 0.75; }
  100% { transform: translateY(-100vh) rotate(600deg); opacity: 0; }
}

.scanline {
  position: fixed; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
  opacity: 0.65; animation: scanLine 7s linear infinite; z-index: 50; pointer-events: none;
  filter: blur(0.5px); box-shadow: 0 0 15px var(--neon-blue);
}
@keyframes scanLine { 0% { top: -2px; opacity: 0; } 6% { opacity: 0.65; } 94% { opacity: 0.65; } 100% { top: 100%; opacity: 0; } }

.noise {
  position: fixed; inset: 0; z-index: -1; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* === MAIN CONTAINER === */
.main-container {
  position: relative; z-index: 10; max-width: 1420px; margin: 0 auto; padding: 18px 22px;
}

/* === HEADER === */
.header-section { text-align: center; padding: 28px 0 20px; animation: headerEntrance 0.7s var(--transition-bloom) backwards; }
@keyframes headerEntrance { from { opacity: 0; transform: translateY(-25px); } to { opacity: 1; transform: translateY(0); } }

.main-title {
  font-family: 'Orbitron', sans-serif; font-size: clamp(1.8rem, 5.5vw, 3.2rem);
  font-weight: 800; letter-spacing: 3px; position: relative;
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--neon-blue-bright) 35%, var(--neon-electric) 55%, var(--neon-purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--glow-blue); animation: titleShimmer 3.5s ease-in-out infinite;
}
@keyframes titleShimmer { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.25); } }
.main-title::after {
  content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
  width: 75%; height: 2px; background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
  animation: linePulse 3.8s ease-in-out infinite; opacity: 0.75; box-shadow: 0 0 12px var(--neon-blue);
}
@keyframes linePulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 0.85; } }

/* === TABS - NEON CHIPS === */
.tabs-container {
  display: flex; justify-content: center; gap: 6px; margin: 12px 0 22px;
  background: var(--bg-panel); border: 1px solid var(--border-soft);
  border-radius: 16px; padding: 5px; max-width: fit-content; margin-inline: auto;
  backdrop-filter: blur(12px);
}
.tab-chip {
  padding: 11px 26px; font-family: 'Orbitron', sans-serif; font-weight: 600; font-size: 0.88rem;
  color: var(--text-muted); background: transparent; border: none; border-radius: 12px;
  cursor: pointer; transition: all var(--transition-smooth); position: relative;
  text-transform: uppercase; letter-spacing: 1.2px;
}
.tab-chip::after {
  content: ''; position: absolute; inset: 0; border-radius: 12px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0, 212, 255, 0.35), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--transition-fast);
}
.tab-chip:hover { color: var(--neon-blue); }
.tab-chip:hover::after { opacity: 1; }
.tab-chip.active {
  color: var(--text-primary); background: linear-gradient(135deg, rgba(0, 212, 255, 0.18), rgba(0, 255, 255, 0.12));
  border: 1px solid var(--border-hover); box-shadow: var(--glow-blue);
}
.tab-chip.active::before {
  content: ''; position: absolute; bottom: -1px; left: 22%; right: 22%; height: 2px;
  background: var(--neon-electric); border-radius: 1px; box-shadow: var(--glow-soft);
}

/* === CONTENT BOX - GLASS CARD === */
.content-box {
  background: var(--bg-surface); border: 1px solid var(--border-glow);
  border-radius: 22px; padding: 22px; backdrop-filter: blur(28px);
  position: relative; overflow: hidden; box-shadow: var(--glow-blue);
  transition: var(--transition-smooth);
}
.content-box:hover { box-shadow: var(--glow-blue-lg); }
.content-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
  animation: borderFlow 3s linear infinite; box-shadow: 0 0 18px var(--neon-electric);
}
@keyframes borderFlow { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

/* === SETTINGS PANEL === */
.settings-panel {
  background: linear-gradient(135deg, rgba(10, 25, 55, 0.72), rgba(14, 32, 68, 0.62));
  border: 1px solid var(--border-soft); border-radius: 18px;
  padding: 14px 18px; margin-bottom: 22px; display: flex; flex-wrap: nowrap; gap: 14px; align-items: center;
  backdrop-filter: blur(16px);
}
.setting-item { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
.setting-label {
  color: var(--neon-blue); font-size: 0.82rem; font-weight: 600;
  text-shadow: 0 0 8px rgba(0, 212, 255, 0.5); letter-spacing: 0.5px;
}
.input-neon {
  padding: 10px 14px; background: rgba(4, 12, 32, 0.82);
  border: 1px solid rgba(0, 212, 255, 0.35); border-radius: 12px;
  color: var(--text-primary); font-size: 0.92rem; width: 175px; transition: all var(--transition-fast);
  font-family: 'Rajdhani', sans-serif; font-weight: 500;
}
.input-neon:focus {
  outline: none; border-color: var(--neon-electric); box-shadow: var(--glow-electric);
  background: rgba(8, 20, 48, 0.92);
}

/* === BUTTONS === */
.btn-neon {
  padding: 10px 22px; background: linear-gradient(135deg, var(--neon-electric), var(--neon-blue));
  border: none; border-radius: 14px; color: var(--bg-deep); font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: all var(--transition-bloom);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1.2px; position: relative; overflow: hidden;
  box-shadow: var(--glow-blue);
}
.btn-neon::before {
  content: ''; position: absolute; inset: 0; border-radius: 14px; padding: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity 0.25s;
}
.btn-neon:hover::before { opacity: 1; }
.btn-neon:hover { transform: translateY(-2px); box-shadow: var(--glow-blue-lg); }
.btn-neon:active { transform: translateY(0); }
.btn-neon:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.status-badge {
  font-size: 0.82rem; color: var(--neon-green); margin-left: 8px; font-weight: 700;
  text-shadow: 0 0 10px rgba(0, 255, 157, 0.55); animation: blink 2.2s ease-in-out infinite;
  letter-spacing: 0.5px;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.75; } }

/* === DATA GRID === */
.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(285px, 1fr)); gap: 18px; }

/* === SECTION BOX === */
.section-box {
  background: linear-gradient(145deg, rgba(10, 22, 52, 0.75), rgba(15, 32, 68, 0.65));
  border: 1px solid var(--border-soft); border-radius: 19px;
  overflow: hidden; display: flex; flex-direction: column; transition: all var(--transition-smooth);
  backdrop-filter: blur(14px);
}
.section-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-blue); transform: translateY(-2px); }
.section-header {
  background: linear-gradient(90deg, rgba(0, 212, 255, 0.12), transparent 78%);
  padding: 12px 16px; border-bottom: 1px solid var(--border-soft);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-blue);
  font-size: 0.95rem; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); letter-spacing: 0.8px;
}
.badge-count {
  background: rgba(0, 212, 255, 0.15); color: var(--neon-electric);
  padding: 3px 10px; border-radius: 18px; font-size: 0.72rem; font-weight: 700;
  border: 1px solid rgba(0, 212, 255, 0.35); letter-spacing: 0.5px;
}

.search-box { padding: 10px 14px; border-bottom: 1px solid var(--border-soft); }
.search-input {
  width: 100%; padding: 9px 13px; background: rgba(5, 14, 36, 0.72);
  border: 1px solid rgba(0, 212, 255, 0.32); border-radius: 12px;
  color: var(--text-primary); font-size: 0.88rem; transition: all var(--transition-fast);
  font-family: 'Rajdhani', sans-serif;
}
.search-input:focus { outline: none; border-color: var(--neon-electric); box-shadow: var(--glow-electric); }
.search-input::placeholder { color: var(--text-muted); opacity: 0.75; }

.section-content { padding: 10px; overflow-y: auto; max-height: 410px; flex-grow: 1; }

/* === ITEM CARD === */
.item-card {
  background: linear-gradient(135deg, rgba(8, 18, 44, 0.72), rgba(13, 26, 56, 0.62));
  border: 1px solid var(--border-soft); border-radius: 16px;
  padding: 13px 15px; margin-bottom: 9px; cursor: pointer; transition: all var(--transition-bloom);
  position: relative; overflow: hidden;
}
.item-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 16px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0, 212, 255, 0.28), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--transition-fast);
}
.item-card:hover::before { opacity: 1; }
.item-card:hover {
  border-color: var(--border-hover); box-shadow: var(--glow-blue);
  background: linear-gradient(135deg, rgba(11, 24, 54, 0.82), rgba(16, 34, 68, 0.72));
  transform: translateY(-2px);
}
.item-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 3px; font-weight: 600; }
.item-title { color: var(--neon-blue); font-weight: 700; margin-bottom: 4px; font-size: 0.92rem; letter-spacing: 0.3px; }
.item-content { font-size: 0.84rem; color: var(--text-secondary); line-height: 1.45; white-space: pre-wrap; word-break: break-word; }

/* === PASARAN BOX === */
.pasaran-box {
  background: linear-gradient(135deg, rgba(9, 20, 48, 0.75), rgba(14, 28, 62, 0.65));
  border: 1px solid var(--border-soft); border-radius: 18px;
  overflow: hidden; margin-bottom: 11px; transition: all var(--transition-smooth);
  backdrop-filter: blur(10px);
}
.pasaran-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-blue); }
.pasaran-header {
  background: linear-gradient(90deg, rgba(0, 212, 255, 0.14), transparent 78%);
  padding: 12px 16px; border-bottom: 1px solid var(--border-soft);
}
.pasaran-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-blue);
  font-size: 0.9rem; text-shadow: 0 0 9px rgba(0, 212, 255, 0.5); letter-spacing: 0.6px;
}
.pasaran-content { padding: 8px 12px; max-height: 335px; overflow-y: auto; }

.bet-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 13px; margin-bottom: 6px; background: rgba(6, 15, 38, 0.65);
  border: 1px solid var(--border-soft); border-radius: 12px;
  cursor: pointer; transition: all var(--transition-bloom);
}
.bet-item:hover {
  border-color: var(--border-hover); background: rgba(10, 22, 52, 0.78);
  box-shadow: var(--glow-blue); transform: translateX(3px);
}
.bet-type { color: var(--text-secondary); font-size: 0.84rem; flex: 1; margin-right: 10px; font-weight: 500; }
.bet-result {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-electric);
  font-size: 0.84rem; background: rgba(0, 212, 255, 0.12);
  padding: 3px 9px; border-radius: 10px; border: 1px solid rgba(0, 212, 255, 0.32);
  letter-spacing: 0.3px;
}
.bet-item:hover .bet-result {
  background: rgba(0, 212, 255, 0.22); box-shadow: 0 0 12px rgba(0, 212, 255, 0.35);
}

/* === NEON SELECTOR === */
.neon-selector {
  background: linear-gradient(135deg, rgba(10, 22, 52, 0.78), rgba(15, 32, 68, 0.68));
  border: 1px solid var(--border-soft); border-radius: 19px;
  padding: 18px; margin: 18px 0; backdrop-filter: blur(14px);
}
.selector-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  padding-bottom: 14px; border-bottom: 1px solid var(--border-soft);
}
.selector-icon { font-size: 1.35rem; animation: iconFloat 4s ease-in-out infinite; opacity: 0.92; }
@keyframes iconFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
.selector-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-blue);
  font-size: 1.02rem; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); letter-spacing: 0.5px;
}

/* === CHIP GROUP === */
.chip-group { margin-bottom: 14px; }
.chip-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.81rem; font-weight: 600;
  color: var(--neon-blue); margin-bottom: 9px; display: flex; align-items: center; gap: 7px;
  letter-spacing: 0.6px;
}
.chip-label::before {
  content: ''; width: 3px; height: 14px; background: var(--neon-electric);
  border-radius: 1px; box-shadow: 0 0 7px var(--neon-blue); opacity: 0.75;
}
.chips-row { display: flex; flex-wrap: wrap; gap: 8px; }

.chip {
  padding: 7px 15px; background: rgba(6, 14, 38, 0.75);
  border: 1px solid rgba(0, 212, 255, 0.28); border-radius: 24px;
  color: var(--text-muted); font-size: 0.82rem; font-weight: 500;
  cursor: pointer; transition: all var(--transition-smooth);
  position: relative; overflow: hidden; letter-spacing: 0.4px;
}
.chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 24px;
  background: linear-gradient(135deg, transparent, rgba(0, 212, 255, 0.22), transparent);
  opacity: 0; transition: opacity var(--transition-fast);
}
.chip:hover { color: var(--neon-blue); border-color: rgba(0, 212, 255, 0.5); }
.chip:hover::before { opacity: 1; }
.chip.active {
  color: var(--bg-deep); background: linear-gradient(135deg, var(--neon-electric), var(--neon-blue));
  border-color: var(--neon-electric); box-shadow: var(--glow-blue); font-weight: 700;
}
.chip.active::after {
  content: '✓'; position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
  font-size: 0.75rem; font-weight: 800; animation: checkPop 0.32s var(--transition-bloom);
}
@keyframes checkPop { 0% { transform: translateY(-50%) scale(0); } 70% { transform: translateY(-50%) scale(1.3); } 100% { transform: translateY(-50%) scale(1); } }

/* === RESULT BOX === */
.result-box {
  margin-top: 16px; padding: 16px 20px;
  background: rgba(6, 16, 42, 0.85); border: 1px solid rgba(0, 212, 255, 0.35);
  border-radius: 16px; font-family: 'Orbitron', sans-serif; font-size: 1.08rem;
  color: var(--neon-electric); text-align: center; min-height: 52px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition-bloom); cursor: pointer;
  letter-spacing: 0.5px;
}
.result-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-blue); }
.result-box.copied {
  animation: copiedFlash 0.4s var(--transition-bloom);
  border-color: var(--neon-green); box-shadow: 0 0 20px rgba(0, 255, 157, 0.5);
}
@keyframes copiedFlash {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); background: rgba(0, 255, 157, 0.15); }
  100% { transform: scale(1); }
}

/* === HITUNG ROW === */
.hitung-row { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: end; margin-top: 8px; }
.hitung-btn {
  padding: 11px 24px; background: linear-gradient(135deg, var(--neon-electric), var(--neon-blue));
  border: none; border-radius: 14px; color: var(--bg-deep); font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.86rem; cursor: pointer; transition: all var(--transition-bloom);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1.2px;
  box-shadow: var(--glow-blue);
}
.hitung-btn:hover { transform: translateY(-2px); box-shadow: var(--glow-blue-lg); }
.hitung-btn:active { transform: translateY(0); }

/* === TOAST - NEON STYLE === */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(120px) scale(0.92);
  background: linear-gradient(135deg, rgba(8, 20, 48, 0.96), rgba(12, 28, 64, 0.93));
  color: var(--neon-electric); padding: 13px 30px; border-radius: 48px;
  font-weight: 700; font-size: 0.92rem; opacity: 0; transition: all var(--transition-bloom);
  z-index: 1000; border: 1px solid var(--neon-blue); backdrop-filter: blur(16px);
  text-shadow: 0 0 10px rgba(0, 212, 255, 0.6); box-shadow: var(--glow-blue-lg);
  letter-spacing: 0.5px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

/* === SPINNER === */
.spinner {
  width: 32px; height: 32px; border: 3px solid rgba(0, 212, 255, 0.28);
  border-top-color: var(--neon-electric); border-radius: 50%;
  animation: spin 0.95s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: rgba(3, 8, 24, 0.6); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue));
  border-radius: 3px; border: 1px solid rgba(0, 212, 255, 0.28);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--neon-blue-bright), var(--neon-electric));
}

/* === AUTO-UPDATE INDICATOR === */
.auto-update-indicator {
  position: fixed; top: 16px; right: 16px;
  background: rgba(0, 212, 255, 0.12); border: 1px solid var(--border-soft);
  border-radius: 12px; padding: 6px 13px; font-size: 0.78rem;
  color: var(--neon-blue); display: none; align-items: center; gap: 6px;
  z-index: 1000; backdrop-filter: blur(10px); animation: pulse 1.8s infinite;
  font-weight: 600; letter-spacing: 0.4px;
}
.auto-update-indicator.show { display: flex; }
@keyframes pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 0.95; } }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .main-container { padding: 14px 16px; }
  .settings-panel { flex-direction: column; align-items: stretch; gap: 12px; }
  .setting-item { width: 100%; justify-content: space-between; }
  .input-neon { width: 100%; }
  .data-grid { grid-template-columns: 1fr; }
  .main-title { font-size: clamp(1.6rem, 7vw, 2.6rem); letter-spacing: 2px; }
  .tab-chip { padding: 10px 20px; font-size: 0.84rem; }
  .hitung-row { grid-template-columns: 1fr; gap: 12px; }
  .hitung-btn { width: 100%; }
  .chips-row { justify-content: center; }
  .content-box { padding: 18px; }
}

::selection { background: rgba(0, 212, 255, 0.28); color: var(--text-primary); }
button:focus-visible, input:focus-visible { outline: 2px solid var(--neon-blue); outline-offset: 3px; box-shadow: var(--glow-blue); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body>
<div class="bg-canvas"></div>
<div class="grid-overlay"></div>
<div class="noise"></div>
<div class="particles" id="particles"></div>
<div class="scanline"></div>
<div id="toast" class="toast">✨ Berhasil!</div>
<div class="auto-update-indicator" id="autoUpdateIndicator">
  <i class="fas fa-sync-alt"></i><span>Auto-Update Aktif</span>
</div>

<div class="main-container">
  <header class="header-section">
    <h1 class="main-title">⚡ PREDIKSI & HITUNG TOGEL ⚡</h1>
  </header>

  <nav class="tabs-container">
    <button class="tab-chip active" data-tab="prediksi"><i class="fas fa-crystal-ball"></i> Prediksi</button>
    <button class="tab-chip" data-tab="hitung"><i class="fas fa-calculator"></i> Hitung</button>
  </nav>

  <div class="content-box">
    <!-- TAB PREDIKSI -->
    <div id="tab-prediksi" class="tab-content">
      <div class="settings-panel">
        <div class="setting-item">
          <span class="setting-label"><i class="fas fa-calendar-alt"></i> Tanggal</span>
          <input type="date" id="input-tanggal" class="input-neon" onchange="autoUpdateTanggal()">
        </div>
        <button class="btn-neon" id="btn-tanggal" onclick="manualUpdateTanggal()"><i class="fas fa-bolt"></i> Update</button>
        <span class="status-badge" id="status-tanggal"></span>
      </div>

      <div class="data-grid">
        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title"><i class="fas fa-crystal-ball"></i> Prediksi</h3>
            <span class="badge-count" id="count-prediksi">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-prediksi" placeholder="🔍 Cari prediksi...">
          </div>
          <div class="section-content" id="list-prediksi">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title"><i class="fas fa-clock"></i> Jadwal</h3>
            <span class="badge-count" id="count-jadwal">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-jadwal" placeholder="🔍 Cari jadwal...">
          </div>
          <div class="section-content" id="list-jadwal">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title"><i class="fas fa-link"></i> Link Live</h3>
            <span class="badge-count" id="count-link">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-link" placeholder="🔍 Cari link...">
          </div>
          <div class="section-content" id="list-link">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB HITUNG -->
    <div id="tab-hitung" class="tab-content" style="display:none;">
      <div class="settings-panel">
        <div class="setting-item">
          <span class="setting-label"><i class="fas fa-coins"></i> Nominal</span>
          <input type="number" id="input-nominal" class="input-neon" placeholder="0" onchange="autoUpdateNominal()">
        </div>
        <button class="btn-neon" id="btn-nominal" onclick="manualUpdateNominal()"><i class="fas fa-bolt"></i> Update</button>
        <span class="status-badge" id="status-nominal"></span>
      </div>

      <!-- NEON SELECTOR -->
      <div class="neon-selector">
        <div class="selector-header">
          <span class="selector-icon"><i class="fas fa-bullseye"></i></span>
          <h3 class="selector-title">Pilih Hitungan</h3>
        </div>
        
        <div class="chip-group">
          <div class="chip-label"><i class="fas fa-layer-group"></i> Tipe Hitungan</div>
          <div class="chips-row" id="chipTipe">
            <div class="chip" data-value="">Semua</div>
          </div>
        </div>
        
        <div class="chip-group">
          <div class="chip-label"><i class="fas fa-tag"></i> Pilih Label</div>
          <div class="chips-row" id="chipLabel">
            <div class="chip" data-value="">Semua</div>
          </div>
        </div>
        
        <div class="hitung-row">
          <button onclick="tampilkanValueHitungan()" class="hitung-btn"><i class="fas fa-magic"></i> Tampilkan Hasil</button>
        </div>
        
        <div id="resultBox" class="result-box">
          <span style="color: var(--text-muted);">Pilih tipe & label untuk melihat hasil</span>
        </div>
      </div>

      <div class="data-grid" id="container-hitung" style="margin-top: 14px;">
        <div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'),
  autoUpdate: $('autoUpdateIndicator'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};

let selectedTipe = '', selectedLabel = '';

// Particles
function createParticles() {
  const container = $('particles');
  if (!container) return;
  for(let i = 0; i < 42; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 24 + 's';
    p.style.animationDuration = (20 + Math.random() * 16) + 's';
    container.appendChild(p);
  }
}

function showToast(msg) {
  dom.toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 2800);
}

function showAutoUpdate() {
  if (dom.autoUpdate) {
    dom.autoUpdate.classList.add('show');
    setTimeout(() => dom.autoUpdate.classList.remove('show'), 1800);
  }
}

function copyText(text, element) {
  let finalText = text;
  try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 22 ? finalText.substring(0, 22) + '...' : finalText;
    showToast('📋 Disalin: ' + preview);
    if (element) {
      element.classList.add('copied');
      setTimeout(() => element.classList.remove('copied'), 400);
    }
  }).catch(() => showToast('❌ Gagal salin'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

function parseCSV(text) {
  let p = [], row = [], entry = "", st = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(entry); entry = ""; }
      else if (c === '\r' && n === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { entry += '"'; i++; }
      else if (c === '"') st = 0;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); p.push(row); }
  return p;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error("Fetch Error:", e); return false; }
}

async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = dom.inTgl.value;
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    renderPrediksi();
  } catch(e) {
    console.error("Error Prediksi:", e);
    dom.listP.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">❌ Gagal memuat</p>';
  }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 }, { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 }, { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 }, { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 }, { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    state.hitung = secDef.map(s => {
      let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
      let items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), res = safeGet(data[i], 24);
          if (type || res) items.push({ type, res });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) {
    console.error("Error Hitung:", e);
    dom.contH.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">❌ Gagal memuat</p>';
  }
}

function renderList(container, items, search) {
  const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!filtered.length) { container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">📭 Tidak ada data</p>'; return; }
  container.innerHTML = filtered.map(v => `
    <div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}', this)">
      <div class="item-label"><i class="fas fa-tag"></i> Judul</div>
      <div class="item-title">${v.title}</div>
      <div class="item-label"><i class="fas fa-comment"></i> Isi (Klik untuk Copy)</div>
      <div class="item-content">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<p style="color:var(--text-muted);text-align:center;">📭 Tidak ada data</p>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-box">
      <div class="pasaran-header"><h3 class="pasaran-title"><i class="fas fa-chart-line"></i> ${s.title}</h3></div>
      <div class="pasaran-content">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}', this)">
            <span class="bet-type">${it.type}</span>
            <span class="bet-result">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// === NEON CHIP SELECTOR ===
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + 
    items.map(it => `<div class="chip" data-value="${it.label || it}">${(it.label || it).substring(0, 20)}${(it.label || it).length > 20 ? '...' : ''}</div>`).join('');
  
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (type === 'tipe') {
        selectedTipe = chip.dataset.value;
        updateLabelChips();
      } else {
        selectedLabel = chip.dataset.value;
      }
    };
  });
}

function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) {
    renderChips(dom.chipLabel, [], 'label');
    return;
  }
  const labels = state.kelompok[selectedTipe].map(i => i.label);
  renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "SEMUA PASARAN" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "BONUS" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "JAKARTA" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "TOTOMALI" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "HOKIDRAW" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY & HK" }
    ];
    state.kelompok = {};
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length > 0) state.kelompok[sec.title] = items;
    });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error("Error loadHitungData:", e); }
}

function tampilkanValueHitungan() {
  const result = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = '<span style="color: var(--text-muted);"><i class="fas fa-info-circle"></i> Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    result.innerHTML = `<span style="font-weight: 700;"><i class="fas fa-bolt"></i> ${item.value}</span>`;
    result.onclick = () => copyText(item.value, result);
  }
}

// === AUTO-UPDATE ===
let autoTimeout = null;
function autoUpdateTanggal() {
  showAutoUpdate();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateTanggal, 1000);
}
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal!");
  const p = dom.inTgl.value.split('-');
  const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = "✅ OK";
      showToast("📅 Tersimpan!");
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statTgl.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}
function autoUpdateNominal() {
  showAutoUpdate();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateNominal, 1000);
}
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Isi nominal!");
  dom.btnNom.disabled = true; dom.statNom.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value);
      showToast("💰 Tersimpan!");
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statNom.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}

function init() {
  document.querySelectorAll('.tab-chip').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active'));
    t.classList.add('active');
    dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
    dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
  });
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  fetchPrediksi(); fetchHitung(); loadHitungData();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  init();
  setTimeout(() => showToast('<i class="fas fa-bolt"></i> Cyber Core 2026 Loaded'), 1000);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDIKSI DAN HITUNG TOGEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #010810;
            --bg-secondary: #051525;
            --fg: #e0f4ff;
            --muted: #5a8cb0;
            --accent: #00e5ff;
            --accent-dark: #0099cc;
            --border: #0a4d75;
            --card: #061a2c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Animation */
        .bg-cyber {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 0%, rgba(0, 50, 80, 0.2) 0%, transparent 70%);
        }

        .grid-lines {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 25s linear infinite;
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: floatOrb 20s ease-in-out infinite alternate;
        }

        .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -20%; left: -10%; }
        .orb-2 { width: 400px; height: 400px; background: #0066ff; bottom: -10%; right: -5%; animation-delay: -10s; }

        @keyframes gridMove { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }
        @keyframes floatOrb { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 30px); } }

        /* Main Container */
        .main-container { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header-section { text-align: center; padding: 30px 0 40px; }
        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
        }
        .subtitle { color: var(--muted); margin-top: 10px; letter-spacing: 3px; font-size: 0.9rem; }

        /* Tabs */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 0;
        }
        .tab-btn {
            padding: 14px 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--muted);
            background: rgba(5, 21, 37, 0.5);
            border: 1px solid var(--border);
            border-bottom: none;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }
        .tab-btn:first-child { border-radius: 12px 0 0 0; }
        .tab-btn:last-child { border-radius: 0 12px 0 0; }
        .tab-btn.active {
            color: var(--accent);
            background: var(--bg-secondary);
            border-color: var(--accent);
            z-index: 2;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; width: 100%; height: 3px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        /* Content Box */
        .content-box {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, rgba(5, 21, 37, 0.9) 100%);
            border: 1px solid var(--border);
            border-top: 1px solid var(--accent);
            border-radius: 0 0 20px 20px;
            padding: 30px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Settings Panel */
        .settings-panel {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .setting-group { flex: 1; min-width: 200px; }
        .setting-label { display: block; color: var(--muted); font-size: 0.85rem; margin-bottom: 8px; letter-spacing: 1px; }
        
        .input-field {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--fg);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .input-field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }

        .btn-save {
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            border: none;
            border-radius: 8px;
            color: var(--bg);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 229, 255, 0.3);
            white-space: nowrap;
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0, 229, 255, 0.4); }
        
        .saved-info { width: 100%; margin-top: 5px; font-size: 0.9rem; color: var(--accent); }

        /* Grid Layout */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        /* Section Box */
        .section-box {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .section-header {
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.1) 0%, transparent 100%);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-title { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent); font-size: 0.95rem; }
        .badge-count { background: rgba(0, 229, 255, 0.15); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; border: 1px solid rgba(0, 229, 255, 0.3); }

        .search-box { padding: 14px; border-bottom: 1px solid var(--border); }
        .search-input { width: 100%; padding: 10px 14px; background: rgba(0,0,0,0.4); border: 1px solid rgba(10, 77, 117, 0.5); border-radius: 8px; color: var(--fg); }
        .search-input:focus { outline: none; border-color: var(--accent); }

        .section-content { padding: 12px; overflow-y: auto; max-height: 500px; flex-grow: 1; }

        /* Item Card */
        .item-card {
            background: rgba(0, 20, 40, 0.4);
            border: 1px solid rgba(10, 77, 117, 0.3);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .item-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 229, 255, 0.1); }
        .item-card:active { background: rgba(0, 229, 255, 0.05); }
        
        .item-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .item-title { color: var(--accent); font-weight: 600; margin-bottom: 6px; font-size: 0.95rem; }
        .item-content { font-size: 0.85rem; color: var(--fg); line-height: 1.4; white-space: pre-wrap; word-break: break-all; }

        /* Pasaran Box (Hitung) */
        .pasaran-box {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        .pasaran-header { background: linear-gradient(90deg, rgba(0, 229, 255, 0.15) 0%, transparent 100%); padding: 14px 18px; border-bottom: 1px solid var(--border); }
        .pasaran-title { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent); font-size: 0.9rem; }
        .pasaran-content { padding: 10px; max-height: 400px; overflow-y: auto; }

        .bet-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(10, 77, 117, 0.3);
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .bet-item:hover { border-color: var(--accent); }
        .bet-type { color: var(--fg); font-size: 0.85rem; flex: 1; margin-right: 10px; }
        .bet-result { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent); font-size: 0.85rem; background: rgba(0, 229, 255, 0.1); padding: 3px 8px; border-radius: 4px; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: var(--bg);
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 229, 255, 0.5);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Loading */
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        @media (max-width: 768px) {
            .settings-panel { flex-direction: column; align-items: stretch; }
            .data-grid { grid-template-columns: 1fr; }
            .tab-btn { padding: 12px 20px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="bg-cyber">
        <div class="grid-lines"></div>
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
    </div>

    <div id="toast" class="toast">Berhasil disalin!</div>

    <div class="main-container">
        <header class="header-section">
            <h1 class="main-title">PREDIKSI DAN HITUNG TOGEL</h1>
            <p class="subtitle">REAL-TIME DATA SYSTEM</p>
        </header>

        <nav class="tabs-container">
            <button class="tab-btn active" data-tab="prediksi">PREDIKSI TOGEL</button>
            <button class="tab-btn" data-tab="hitung">HITUNG TOGEL</button>
        </nav>

        <div class="content-box">
            <!-- Tab Prediksi -->
            <div id="tab-prediksi" class="tab-content">
                <div class="settings-panel">
                    <div class="setting-group">
                        <label class="setting-label">Tanggal (B1)</label>
                        <input type="date" id="input-tanggal" class="input-field">
                    </div>
                    <button class="btn-save" id="btn-tanggal">SIMPAN TANGGAL</button>
                    <div class="saved-info">Data Tersimpan: <span id="display-tanggal">-</span></div>
                </div>

                <div class="data-grid">
                    <!-- Prediksi Togel -->
                    <div class="section-box">
                        <div class="section-header">
                            <h3 class="section-title">PREDIKSI TOGEL</h3>
                            <span class="badge-count" id="count-prediksi">0</span>
                        </div>
                        <div class="search-box"><input type="text" class="search-input" id="search-prediksi" placeholder="Cari..."></div>
                        <div class="section-content" id="list-prediksi"><div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div></div>
                    </div>

                    <!-- Jadwal Pasaran -->
                    <div class="section-box">
                        <div class="section-header">
                            <h3 class="section-title">JADWAL PASARAN TOGEL</h3>
                            <span class="badge-count" id="count-jadwal">0</span>
                        </div>
                        <div class="search-box"><input type="text" class="search-input" id="search-jadwal" placeholder="Cari..."></div>
                        <div class="section-content" id="list-jadwal"><div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div></div>
                    </div>

                    <!-- Link Live -->
                    <div class="section-box">
                        <div class="section-header">
                            <h3 class="section-title">LINK LIVE PASARAN</h3>
                            <span class="badge-count" id="count-link">0</span>
                        </div>
                        <div class="search-box"><input type="text" class="search-input" id="search-link" placeholder="Cari..."></div>
                        <div class="section-content" id="list-link"><div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div></div>
                    </div>
                </div>
            </div>

            <!-- Tab Hitung -->
            <div id="tab-hitung" class="tab-content" style="display:none;">
                <div class="settings-panel">
                    <div class="setting-group">
                        <label class="setting-label">Nominal (X1)</label>
                        <input type="number" id="input-nominal" class="input-field" placeholder="Masukkan nominal...">
                    </div>
                    <button class="btn-save" id="btn-nominal">SIMPAN NOMINAL</button>
                    <div class="saved-info">Nominal Aktif: <span id="display-nominal">-</span></div>
                </div>
                <div class="data-grid" id="container-hitung"><div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="spinner"></div></div></div>
            </div>
        </div>
    </div>

    <script>
        // KONFIGURASI
        const CONFIG = {
            sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
            sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810',
            keyTanggal: 'togel_tanggal_fix',
            keyNominal: 'togel_nominal_fix'
        };

        // STATE
        const state = {
            prediksi: [],
            jadwal: [],
            link: [],
            hitung: []
        };

        // DOM
        const $ = id => document.getElementById(id);
        const dom = {
            tabs: document.querySelectorAll('.tab-btn'),
            tabP: $('tab-prediksi'),
            tabH: $('tab-hitung'),
            inTgl: $('input-tanggal'),
            btnTgl: $('btn-tanggal'),
            dispTgl: $('display-tanggal'),
            inNom: $('input-nominal'),
            btnNom: $('btn-nominal'),
            dispNom: $('display-nominal'),
            srcP: $('search-prediksi'),
            srcJ: $('search-jadwal'),
            srcL: $('search-link'),
            listP: $('list-prediksi'),
            listJ: $('list-jadwal'),
            listL: $('list-link'),
            cntP: $('count-prediksi'),
            cntJ: $('count-jadwal'),
            cntL: $('count-link'),
            contH: $('container-hitung'),
            toast: $('toast')
        };

        // UTILITIES
        function showToast(msg) {
            dom.toast.textContent = msg;
            dom.toast.classList.add('show');
            setTimeout(() => dom.toast.classList.remove('show'), 2500);
        }

        function copyText(text) {
            // Decode dulu jika dalam format URI (untuk menghindari bug parsing)
            let finalText = text;
            try { finalText = decodeURIComponent(text); } catch(e) {}
            
            navigator.clipboard.writeText(finalText).then(() => {
                const preview = finalText.length > 30 ? finalText.substring(0, 30) + '...' : finalText;
                showToast('Disalin: ' + preview);
            }).catch(() => showToast('Gagal menyalin'));
        }

        function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

        // CSV PARSER YANG SUDAH DIPERBAIKI
        // Mendukung karakter khusus dan spasi di dalam sel
        function parseCSV(text) {
            let p = [], row = [], entry = "", state = 0; // 0=unquoted, 1=quoted
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const next = text[i+1];

                if (state === 0) { // Unquoted
                    if (char === '"') { state = 1; } 
                    else if (char === ',') { row.push(entry); entry = ""; } 
                    else if (char === '\r' && next === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; } 
                    else if (char === '\n' || char === '\r') { row.push(entry); p.push(row); row = []; entry = ""; } 
                    else { entry += char; }
                } 
                else if (state === 1) { // Quoted
                    if (char === '"') {
                        if (next === '"') { entry += '"'; i++; } 
                        else { state = 0; }
                    } 
                    else { entry += char; }
                }
            }
            // Push sisa
            if (entry.length > 0 || row.length > 0) {
                row.push(entry);
                p.push(row);
            }
            return p;
        }

        function safeGet(row, idx) {
            if (row && row[idx] !== undefined) return row[idx];
            return "";
        }

        // FETCH DATA
        async function fetchPrediksi() {
            try {
                const res = await fetch(CONFIG.sheetPrediksi);
                const data = parseCSV(await res.text());

                state.prediksi = [];
                state.jadwal = [];
                state.link = [];

                // B1 (Tanggal)
                if (data[0]) {
                    const saved = localStorage.getItem(CONFIG.keyTanggal);
                    if (!saved) {
                        const raw = safeGet(data[0], 1);
                        if (raw) {
                            const p = raw.split('/');
                            if (p.length === 3) dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
                        }
                    }
                }

                // B3:B85
                for (let i = 2; i <= 84 && i < data.length; i++) {
                    const txt = safeGet(data[i], 1);
                    if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
                }
                // C3:C56
                for (let i = 2; i <= 55 && i < data.length; i++) {
                    const txt = safeGet(data[i], 2);
                    if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
                }
                // C57:C83
                for (let i = 56; i <= 82 && i < data.length; i++) {
                    const txt = safeGet(data[i], 2);
                    if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
                }

                renderPrediksi();
            } catch (e) {
                console.error("Error Prediksi:", e);
                dom.listP.innerHTML = '<p style="color:red;text-align:center;padding:20px;">Gagal memuat data. Pastikan Google Sheet publik.</p>';
            }
        }

        async function fetchHitung() {
            try {
                const res = await fetch(CONFIG.sheetHitung);
                const data = parseCSV(await res.text());

                // X1 Nominal
                if (data[0]) {
                    const saved = localStorage.getItem(CONFIG.keyNominal);
                    if (!saved) dom.inNom.value = safeGet(data[0], 23);
                }

                // Sections (Y title, X type, Y result)
                const secDef = [
                    { tRow: 0, tCol: 24, start: 2, end: 42 },     // Y1, X3:X43
                    { tRow: 43, tCol: 24, start: 45, end: 80 },   // Y44...
                    { tRow: 81, tCol: 24, start: 83, end: 119 },
                    { tRow: 120, tCol: 24, start: 122, end: 153 },
                    { tRow: 154, tCol: 24, start: 156, end: 179 },
                    { tRow: 180, tCol: 24, start: 182, end: 213 },
                    { tRow: 215, tCol: 24, start: 217, end: 248 },
                    { tRow: 249, tCol: 24, start: 251, end: 282 },
                    { tRow: 283, tCol: 24, start: 285, end: 316 }
                ];

                state.hitung = secDef.map(s => {
                    let title = "PASARAN";
                    if (data[s.tRow]) {
                        const t = safeGet(data[s.tRow], s.tCol);
                        if (t) title = t;
                    }
                    let items = [];
                    for (let i = s.start; i <= s.end && i < data.length; i++) {
                        if (data[i]) {
                            const type = safeGet(data[i], 23); // X
                            const res = safeGet(data[i], 24);  // Y
                            if (type || res) items.push({ type, res });
                        }
                    }
                    return { title, items };
                }).filter(s => s.items.length > 0);

                renderHitung();
            } catch (e) {
                console.error("Error Hitung:", e);
                dom.contH.innerHTML = '<p style="color:red;text-align:center;padding:20px;">Gagal memuat data hitung.</p>';
            }
        }

        // RENDER
        function renderList(container, items, search) {
            const filtered = items.filter(i => 
                i.content.toLowerCase().includes(search.toLowerCase()) ||
                i.title.toLowerCase().includes(search.toLowerCase())
            );

            if (!filtered.length) {
                container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;">Tidak ada data</p>';
                return;
            }

            // Render menggunakan encodeURI untuk menangani karakter aneh saat passing ke onclick
            container.innerHTML = filtered.map((v, i) => `
                <div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}')">
                    <div class="item-label">Judul</div>
                    <div class="item-title">${v.title}</div>
                    <div class="item-label">Klik untuk salin isi</div>
                    <div class="item-content">${v.content}</div>
                </div>
            `).join('');
        }

        function renderPrediksi() {
            renderList(dom.listP, state.prediksi, dom.srcP.value);
            renderList(dom.listJ, state.jadwal, dom.srcJ.value);
            renderList(dom.listL, state.link, dom.srcL.value);
            dom.cntP.textContent = state.prediksi.length;
            dom.cntJ.textContent = state.jadwal.length;
            dom.cntL.textContent = state.link.length;
        }

        function renderHitung() {
            if (!state.hitung.length) {
                dom.contH.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;">Tidak ada data</p>';
                return;
            }
            dom.contH.innerHTML = state.hitung.map((s, i) => `
                <div class="pasaran-box">
                    <div class="pasaran-header">
                        <h3 class="pasaran-title">${s.title}</h3>
                    </div>
                    <div class="pasaran-content">
                        ${s.items.map(it => `
                            <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}')">
                                <span class="bet-type">${it.type}</span>
                                <span class="bet-result">${it.res}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // INIT
        function init() {
            // Tab Switching
            dom.tabs.forEach(t => t.onclick = () => {
                dom.tabs.forEach(b => b.classList.remove('active'));
                t.classList.add('active');
                dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
                dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
            });

            // Load Storage
            const savedTgl = localStorage.getItem(CONFIG.keyTanggal);
            if (savedTgl) { dom.inTgl.value = savedTgl; dom.dispTgl.textContent = savedTgl; }
            
            const savedNom = localStorage.getItem(CONFIG.keyNominal);
            if (savedNom) { dom.inNom.value = savedNom; dom.dispNom.textContent = 'Rp ' + formatNum(savedNom); }

            // Save Buttons
            dom.btnTgl.onclick = () => {
                if (!dom.inTgl.value) return showToast("Pilih tanggal!");
                localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
                dom.dispTgl.textContent = dom.inTgl.value;
                showToast("Tanggal disimpan lokal");
                fetchPrediksi(); // Refresh
            };

            dom.btnNom.onclick = () => {
                if (!dom.inNom.value) return showToast("Masukkan nominal!");
                localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
                dom.dispNom.textContent = 'Rp ' + formatNum(dom.inNom.value);
                showToast("Nominal disimpan lokal");
                fetchHitung(); // Refresh
            };

            // Search
            dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
            dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
            dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);

            // Fetch Data
            fetchPrediksi();
            fetchHitung();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

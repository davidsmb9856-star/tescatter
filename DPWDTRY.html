<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔷 PREDIKSI & HITUNG TOGEL 🔷</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* ═══════════════════════════════════════════════════════════ */
  /* 🎨 ULTRA COOL NEON BLUE PALETTE */
  /* ═══════════════════════════════════════════════════════════ */
  
  /* Base Backgrounds */
  --bg-deep: #00010a;
  --bg-darker: #020514;
  --bg-dark: #040a1f;
  --bg-card: rgba(5, 12, 38, 0.92);
  --bg-card-alt: rgba(8, 18, 52, 0.88);
  --bg-glass: rgba(10, 24, 68, 0.78);
  --bg-glass-alt: rgba(14, 32, 82, 0.72);
  
  /* Neon Blue Spectrum - Vibrant & Cool */
  --neon-ice: #8affff;
  --neon-cyan: #00f5ff;
  --neon-blue: #00ccff;
  --neon-blue-mid: #0099ff;
  --neon-blue-deep: #0066cc;
  --neon-blue-dark: #003399;
  
  /* Accent Colors */
  --neon-purple: #9d7bff;
  --neon-violet: #7b5cff;
  --neon-pink: #ff5ec8;
  --neon-teal: #00ffcc;
  
  /* Glow Effects - Multi-layered & Dynamic */
  --glow-ice: 0 0 10px #8affff66, 0 0 24px #8affff44, 0 0 48px #8affff22;
  --glow-cyan: 0 0 12px #00f5ff77, 0 0 28px #00f5ff55, 0 0 56px #00f5ff33;
  --glow-blue: 0 0 14px #00ccff88, 0 0 32px #00ccff66, 0 0 64px #00ccff44, 0 0 100px #00ccff22;
  --glow-blue-lg: 0 0 18px #00ccff99, 0 0 42px #00ccff77, 0 0 84px #00ccff55, 0 0 140px #00ccff33;
  --glow-pulse: 0 0 0 #00ccff00, 0 0 24px #00ccff66, 0 0 48px #00ccff44, 0 0 88px #00f5ff22;
  --glow-bloom: 0 0 0 #00000000, 0 0 32px #00f5ff88, 0 0 64px #00ccff66, 0 0 112px #8affff44, 0 0 180px #00f5ff22;
  
  /* Text Colors */
  --text-primary: #f0f9ff;
  --text-secondary: #b8d4f0;
  --text-muted: #7a96b8;
  --text-dim: #4a5f7a;
  --text-glow: 0 0 12px #00ccff77;
  
  /* Borders & Accents */
  --border-ice: rgba(138, 255, 255, 0.45);
  --border-cyan: rgba(0, 245, 255, 0.52);
  --border-blue: rgba(0, 204, 255, 0.38);
  --border-subtle: rgba(100, 140, 190, 0.15);
  --accent-ice: rgba(138, 255, 255, 0.22);
  --accent-cyan: rgba(0, 245, 255, 0.18);
  --accent-blue: rgba(0, 204, 255, 0.15);
  
  /* Animation Timing */
  --ease-bloom: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --t-fast: 160ms var(--ease-smooth);
  --t-normal: 280ms var(--ease-smooth);
  --t-bloom: 450ms var(--ease-bloom);
  --t-bounce: 380ms var(--ease-bounce);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
::selection { background: var(--accent-cyan); color: var(--text-primary); text-shadow: var(--text-glow); }

body {
  font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
  text-rendering: optimizeLegibility;
}

/* ═══════════════════════════════════════════════════════════ */
/* 🌌 BACKGROUND - ULTRA COOL NEON EFFECTS */
/* ═══════════════════════════════════════════════════════════ */

.bg-neon {
  position: fixed; inset: 0; z-index: -4;
  background: 
    radial-gradient(1400px 700px at 10% 20%, rgba(0, 245, 255, 0.12), transparent 60%),
    radial-gradient(1100px 550px at 90% 15%, rgba(138, 255, 255, 0.10), transparent 65%),
    radial-gradient(1200px 600px at 50% 100%, rgba(0, 204, 255, 0.14), transparent 58%),
    radial-gradient(800px 450px at 25% 75%, rgba(157, 123, 255, 0.08), transparent 70%),
    linear-gradient(155deg, var(--bg-deep) 0%, #010412 30%, var(--bg-darker) 60%, #020618 85%, var(--bg-deep) 100%);
  animation: bgFlow 75s ease-in-out infinite alternate;
}

@keyframes bgFlow {
  0%, 100% { filter: hue-rotate(0deg) brightness(1) saturate(1); transform: scale(1) rotate(0deg); }
  20% { filter: hue-rotate(2deg) brightness(1.03) saturate(1.08); transform: scale(1.008) rotate(0.3deg); }
  40% { filter: hue-rotate(-3deg) brightness(0.97) saturate(0.95); transform: scale(0.995) rotate(-0.2deg); }
  60% { filter: hue-rotate(4deg) brightness(1.02) saturate(1.05); transform: scale(1.005) rotate(0.4deg); }
  80% { filter: hue-rotate(-1deg) brightness(1.01) saturate(1.02); transform: scale(1.002) rotate(-0.1deg); }
}

/* Tech Grid - Dual Layer */
.grid-lines {
  position: fixed; inset: 0; z-index: -3; pointer-events: none;
  background-image: 
    linear-gradient(rgba(0, 245, 255, 0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 245, 255, 0.045) 1px, transparent 1px),
    linear-gradient(45deg, rgba(138, 255, 255, 0.025) 1px, transparent 1px),
    linear-gradient(-45deg, rgba(138, 255, 255, 0.025) 1px, transparent 1px);
  background-size: 55px 55px, 55px 55px, 110px 110px, 110px 110px;
  animation: gridDrift 85s linear infinite;
  opacity: 0.85;
}

@keyframes gridDrift {
  0% { background-position: 0 0, 0 0, 0 0, 0 0; }
  100% { background-position: 55px 55px, 55px 55px, 110px 110px, 110px 110px; }
}

/* Floating Orbs - Aurora Style */
.orb {
  position: fixed; border-radius: 50%; filter: blur(110px); opacity: 0.14;
  animation: orbFloat 65s ease-in-out infinite alternate; z-index: -2;
  mix-blend-mode: color-dodge;
}
.orb-1 { 
  width: 950px; height: 950px; 
  background: radial-gradient(circle, var(--neon-cyan), var(--neon-blue), transparent 75%); 
  top: -30%; left: -15%; animation-delay: 0s;
}
.orb-2 { 
  width: 720px; height: 720px; 
  background: radial-gradient(circle, var(--neon-purple), var(--neon-violet), transparent 75%); 
  bottom: -25%; right: -12%; animation-delay: -32s;
}
.orb-3 { 
  width: 580px; height: 580px; 
  background: radial-gradient(circle, var(--neon-ice), var(--neon-cyan), transparent 75%); 
  top: 50%; left: 60%; animation-delay: -18s; animation-duration: 58s;
}

@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.12; }
  25% { transform: translate(42px, -28px) scale(1.08) rotate(3deg); opacity: 0.16; }
  50% { transform: translate(-24px, 48px) scale(0.94) rotate(-2deg); opacity: 0.13; }
  75% { transform: translate(35px, 22px) scale(1.05) rotate(1.5deg); opacity: 0.15; }
  100% { transform: translate(-18px, -35px) scale(0.97) rotate(0deg); opacity: 0.14; }
}

/* Particle System - Magical Sparkles */
.particles { position: fixed; inset: 0; z-index: -2; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; width: 2.5px; height: 2.5px; border-radius: 50%;
  background: var(--neon-cyan); opacity: 0;
  animation: particleRise 45s infinite ease-in-out;
  box-shadow: 0 0 10px var(--neon-blue), 0 0 24px var(--neon-cyan), 0 0 48px rgba(0, 245, 255, 0.55);
}
.particle:nth-child(4n+1) { background: var(--neon-ice); animation-delay: -6s; animation-duration: 48s; }
.particle:nth-child(4n+2) { background: var(--neon-blue); animation-delay: -16s; animation-duration: 42s; }
.particle:nth-child(4n+3) { background: var(--neon-purple); animation-delay: -28s; animation-duration: 52s; }
.particle:nth-child(4n+4) { background: var(--neon-cyan); animation-delay: -38s; animation-duration: 46s; }

@keyframes particleRise {
  0%, 100% { transform: translateY(130vh) translateX(0) rotate(0deg) scale(0.7); opacity: 0; }
  6% { opacity: 0.95; }
  12% { transform: translateY(112vh) translateX(18px) rotate(52deg) scale(1.05); }
  38% { transform: translateY(68vh) translateX(-14px) rotate(195deg) scale(1.15); }
  68% { transform: translateY(28vh) translateX(10px) rotate(348deg) scale(0.98); opacity: 0.92; }
  88% { opacity: 0.52; }
  100% { transform: translateY(-28vh) translateX(0) rotate(612deg) scale(0.65); opacity: 0; }
}

/* Light Rays - Dynamic Beams */
.light-rays {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: 
    radial-gradient(ellipse at 20% 30%, rgba(0, 245, 255, 0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 70%, rgba(138, 255, 255, 0.05) 0%, transparent 60%);
  animation: raysPulse 12s ease-in-out infinite alternate;
  opacity: 0.9;
}
@keyframes raysPulse {
  0%, 100% { opacity: 0.75; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.02); }
}

/* Scanline Overlay - Retro Futuristic */
.scanline-overlay {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 3px,
    rgba(0, 245, 255, 0.018) 3px, rgba(0, 245, 255, 0.018) 6px
  );
  animation: scanMove 10s linear infinite;
  opacity: 0.92;
}
@keyframes scanMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 100vh; }
}

/* ═══════════════════════════════════════════════════════════ */
/* 🎨 MAIN CONTAINER & LAYOUT */
/* ═══════════════════════════════════════════════════════════ */

.main-container {
  position: relative; z-index: 10;
  max-width: 1460px; margin: 0 auto; padding: 20px;
}

/* Header - Epic Title with Bloom */
.header-section {
  text-align: center; padding: 32px 0 24px;
  animation: headerReveal 0.85s var(--t-bloom) backwards;
}
@keyframes headerReveal {
  from { opacity: 0; transform: translateY(-28px) scale(0.97); filter: blur(4px); }
  to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2rem, 6vw, 3.6rem);
  font-weight: 900; letter-spacing: 4px;
  background: linear-gradient(135deg, 
    var(--text-primary) 0%, 
    var(--neon-ice) 28%, 
    var(--neon-cyan) 48%, 
    var(--neon-blue) 65%, 
    var(--neon-purple) 88%, 
    var(--neon-pink) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--glow-blue);
  animation: titleBloom 6s ease-in-out infinite alternate;
  position: relative; display: inline-block;
}
@keyframes titleBloom {
  0%, 100% { filter: brightness(1) drop-shadow(0 0 16px var(--neon-blue)); }
  45% { filter: brightness(1.22) drop-shadow(0 0 28px var(--neon-cyan)); }
  55% { filter: brightness(1.18) drop-shadow(0 0 32px var(--neon-ice)); }
}
.main-title::after {
  content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
  width: 92%; height: 3px;
  background: linear-gradient(90deg, 
    transparent, 
    var(--accent-ice), 
    var(--neon-cyan), 
    var(--neon-blue), 
    var(--accent-ice), 
    transparent);
  animation: linePulse 4.2s ease-in-out infinite;
  border-radius: 3px;
  box-shadow: var(--glow-cyan);
}
@keyframes linePulse {
  0%, 100% { opacity: 0.65; transform: translateX(-50%) scaleX(0.92); }
  50% { opacity: 1; transform: translateX(-50%) scaleX(1.08); }
}

/* Subtitle */
.header-subtitle {
  color: var(--text-secondary); font-size: 1.15rem; margin-top: 16px;
  text-shadow: 0 0 12px var(--accent-blue);
  animation: fadeInUp 1s var(--t-bloom) 0.2s backwards;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════ */
/* 🎯 TABS - Neon Chip Navigation */
/* ═══════════════════════════════════════════════════════════ */

.tabs-container {
  display: flex; justify-content: center; gap: 8px;
  margin: 16px 0 26px; padding: 6px;
  background: var(--bg-glass);
  border: 1.5px solid var(--border-cyan);
  border-radius: 22px;
  max-width: fit-content; margin-inline: auto;
  box-shadow: var(--glow-cyan);
  position: relative;
}
.tabs-container::before {
  content: ''; position: absolute; inset: -2px; border-radius: 24px;
  background: linear-gradient(135deg, transparent 25%, var(--accent-cyan) 50%, transparent 75%);
  filter: blur(12px); opacity: 0.6; z-index: -1;
  animation: borderGlow 5s ease-in-out infinite;
}
@keyframes borderGlow {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 0.8; }
}

.tab-chip {
  padding: 12px 32px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.95rem;
  color: var(--text-muted);
  background: transparent; border: none;
  border-radius: 18px;
  cursor: pointer;
  transition: all var(--t-bloom);
  position: relative;
  text-transform: uppercase; letter-spacing: 1.5px;
  z-index: 1;
}
.tab-chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 18px;
  background: linear-gradient(135deg, transparent, rgba(0, 245, 255, 0.22), transparent);
  opacity: 0; transition: opacity var(--t-fast);
}
.tab-chip:hover {
  color: var(--neon-cyan);
  text-shadow: 0 0 14px var(--neon-blue);
  transform: translateY(-2px);
}
.tab-chip:hover::before { opacity: 1; }
.tab-chip.active {
  color: var(--text-primary);
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-ice));
  border: 1.5px solid var(--border-ice);
  box-shadow: var(--glow-blue-lg);
  text-shadow: 0 0 16px var(--neon-cyan);
  transform: translateY(-3px) scale(1.03);
}
.tab-chip.active::after {
  content: ''; position: absolute; bottom: -3px; left: 20%; right: 20%;
  height: 3px; background: var(--neon-ice);
  border-radius: 3px; box-shadow: var(--glow-cyan);
  animation: activeLine 2.4s ease-in-out infinite;
}
@keyframes activeLine {
  0%, 100% { opacity: 0.85; transform: scaleX(1); }
  50% { opacity: 1; transform: scaleX(1.08); }
}

/* ═══════════════════════════════════════════════════════════ */
/* 📦 CONTENT BOX - Ultra Glassmorphism */
/* ═══════════════════════════════════════════════════════════ */

.content-box {
  background: var(--bg-card);
  border: 1.5px solid var(--border-cyan);
  border-radius: 28px;
  padding: 26px;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  position: relative;
  overflow: hidden;
  box-shadow: var(--glow-blue-lg);
  transition: box-shadow var(--t-normal);
}
.content-box:hover { box-shadow: var(--glow-bloom); }

/* Animated Top Border - Scanning Effect */
.content-box::before {
  content: ''; position: absolute; top: 0; left: -150%; right: 150%; height: 3px;
  background: linear-gradient(90deg, 
    transparent, 
    var(--accent-ice), 
    var(--neon-cyan), 
    var(--neon-ice), 
    var(--accent-ice), 
    transparent);
  animation: scanBorder 7s linear infinite;
  opacity: 0.92;
}
@keyframes scanBorder {
  0% { left: -150%; right: 150%; }
  50% { left: 0%; right: 0%; }
  100% { left: 150%; right: -150%; }
}

/* Corner Neon Accents */
.content-box::after {
  content: ''; position: absolute; inset: 0; border-radius: 28px;
  padding: 1.5px; background: linear-gradient(135deg, 
    transparent 25%, 
    var(--accent-cyan) 50%, 
    transparent 75%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude;
  opacity: 0.5; pointer-events: none;
  animation: cornerGlow 4s ease-in-out infinite;
}
@keyframes cornerGlow {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.65; }
}

/* ═══════════════════════════════════════════════════════════ */
/* ⚙️ SETTINGS PANEL - Compact Neon */
/* ═══════════════════════════════════════════════════════════ */

.settings-panel {
  background: var(--bg-glass-alt);
  border: 1.5px solid var(--border-cyan);
  border-radius: 22px;
  padding: 16px 22px;
  margin-bottom: 24px;
  display: flex; flex-wrap: wrap; gap: 16px;
  align-items: center; justify-content: center;
  box-shadow: var(--glow-cyan);
}

.setting-item {
  display: flex; align-items: center; gap: 12px;
  white-space: nowrap;
}
.setting-label {
  color: var(--neon-cyan);
  font-size: 0.88rem; font-weight: 700;
  text-shadow: 0 0 10px var(--neon-blue);
  letter-spacing: 0.8px;
}

.input-neon {
  padding: 11px 16px;
  background: rgba(3, 8, 26, 0.88);
  border: 1.5px solid rgba(0, 245, 255, 0.38);
  border-radius: 14px;
  color: var(--text-primary);
  font-size: 0.96rem;
  width: 175px;
  transition: all var(--t-fast);
  font-family: 'Space Grotesk', sans-serif;
}
.input-neon::placeholder { color: var(--text-muted); opacity: 0.8; }
.input-neon:focus {
  outline: none;
  border-color: var(--neon-ice);
  box-shadow: var(--glow-blue);
  background: rgba(5, 12, 34, 0.95);
  transform: translateY(-2px);
}

/* ═══════════════════════════════════════════════════════════ */
/* 🔘 BUTTONS - Ultra Bloom Effect */
/* ═══════════════════════════════════════════════════════════ */

.btn-neon {
  padding: 12px 26px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue), var(--neon-blue-mid));
  border: none; border-radius: 18px;
  color: #000410;
  font-family: 'Orbitron', sans-serif;
  font-weight: 800; font-size: 0.9rem;
  cursor: pointer;
  transition: all var(--t-bloom);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 1.4px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--glow-cyan);
}
.btn-neon::before {
  content: ''; position: absolute; inset: 0; border-radius: 18px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(255,255,255,0.6), 
    transparent);
  transform: translateX(-120%);
  transition: transform 0.6s ease;
}
.btn-neon:hover::before { transform: translateX(120%); }
.btn-neon:hover {
  transform: translateY(-3px) scale(1.04);
  box-shadow: var(--glow-blue-lg);
  background: linear-gradient(135deg, var(--neon-ice), var(--neon-cyan), var(--neon-blue));
}
.btn-neon:active {
  transform: translateY(0) scale(0.97);
  transition-duration: 70ms;
}
.btn-neon:disabled {
  opacity: 0.42; cursor: not-allowed;
  transform: none; box-shadow: none;
}

/* Status Badge - Pulsing Glow */
.status-badge {
  font-size: 0.88rem;
  color: #00ffea;
  margin-left: 10px;
  font-weight: 700;
  text-shadow: 0 0 14px rgba(0, 255, 234, 0.68);
  animation: badgePulse 3.2s ease-in-out infinite;
}
@keyframes badgePulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.72; transform: scale(0.94); }
}

/* ═══════════════════════════════════════════════════════════ */
/* 📊 DATA GRID - Responsive Layout */
/* ═══════════════════════════════════════════════════════════ */

.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(295px, 1fr));
  gap: 22px;
}

/* Section Box - Premium Card Style */
.section-box {
  background: linear-gradient(145deg, 
    rgba(10, 22, 58, 0.85), 
    rgba(15, 30, 78, 0.75));
  border: 1.5px solid var(--border-cyan);
  border-radius: 24px;
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: all var(--t-bloom);
  box-shadow: var(--glow-cyan);
}
.section-box:hover {
  border-color: var(--border-ice);
  box-shadow: var(--glow-blue-lg);
  transform: translateY(-4px);
}

.section-header {
  background: linear-gradient(90deg, 
    rgba(0, 245, 255, 0.18), 
    transparent 82%);
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700; color: var(--neon-ice);
  font-size: 1.02rem;
  text-shadow: 0 0 14px var(--neon-blue);
  letter-spacing: 0.8px;
}
.badge-count {
  background: var(--accent-ice);
  color: var(--neon-ice);
  padding: 4px 12px;
  border-radius: 22px;
  font-size: 0.76rem;
  font-weight: 800;
  border: 1.5px solid rgba(138, 255, 255, 0.42);
  text-shadow: 0 0 8px var(--neon-cyan);
}

/* Search Box */
.search-box { padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); }
.search-input {
  width: 100%;
  padding: 11px 15px;
  background: rgba(4, 10, 30, 0.78);
  border: 1.5px solid rgba(0, 245, 255, 0.32);
  border-radius: 14px;
  color: var(--text-primary);
  font-size: 0.92rem;
  transition: all var(--t-fast);
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus {
  outline: none;
  border-color: var(--neon-ice);
  box-shadow: var(--glow-blue);
  background: rgba(6, 14, 38, 0.9);
}

.section-content {

};

const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'),
  autoUpdate: $('autoUpdateIndicator'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};

let selectedTipe = '', selectedLabel = '';
let autoTimeout = null;

// ═══════════════════════════════════════════════════════════
// 🎨 PARTICLE SYSTEM - ULTRA COOL
// ═══════════════════════════════════════════════════════════

function createParticles() {
  const container = $('particles');
  if (!container) return;
  for(let i = 0; i < 48; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 45 + 's';
    p.style.animationDuration = (38 + Math.random() * 22) + 's';
    container.appendChild(p);
  }
  
  // Title particles
  const title = document.querySelector('.main-title');
  if (title) {
    const tp = document.createElement('div');
    tp.className = 'title-particles';
    for(let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'title-particle';
      p.style.left = (10 + Math.random() * 80) + '%';
      p.style.animationDelay = Math.random() * 8 + 's';
      tp.appendChild(p);
    }
    title.parentElement.appendChild(tp);
  }
}

// ═══════════════════════════════════════════════════════════
// 🔔 TOAST & UTILS
// ═══════════════════════════════════════════════════════════

function showToast(msg) {
  dom.toast.textContent = '✨ ' + msg;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 3200);
}

function showAutoUpdate() {
  if (dom.autoUpdate) {
    dom.autoUpdate.classList.add('show');
    setTimeout(() => dom.autoUpdate.classList.remove('show'), 2000);
  }
}

function copyText(text, element) {
  let finalText = text;
  try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 24 ? finalText.substring(0, 24) + '...' : finalText;
    showToast('📋 Disalin: ' + preview);
    if (element) {
      element.classList.add('copied');
      setTimeout(() => element.classList.remove('copied'), 450);
    }
  }).catch(() => showToast('❌ Gagal menyalin'));
}

function formatNum(n) { 
  return new Intl.NumberFormat('id-ID').format(n); 
}

// ═══════════════════════════════════════════════════════════
// 📄 CSV PARSER (Robust)
// ═══════════════════════════════════════════════════════════

function parseCSV(text) {
  let p = [], row = [], entry = "", st = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(entry); entry = ""; }
      else if (c === '\r' && n === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { entry += '"'; i++; }
      else if (c === '"') st = 0;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); p.push(row); }
  return p;
}

function safeGet(row, idx) { 
  return row && row[idx] !== undefined ? row[idx] : ""; 
}

// ═══════════════════════════════════════════════════════════
// 🔄 DATA FETCHING
// ═══════════════════════════════════════════════════════════

async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { 
    showToast('❌ Script URL belum disetup!'); 
    return false; 
  }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { 
    console.error("Fetch Error:", e); 
    return false; 
  }
}

async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = dom.inTgl.value;
        }
      }
    }
    
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ 
        title: txt.split(/[\s,]+/)[0], 
        content: txt 
      });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ 
        title: txt.split(/[\s,]+/)[0], 
        content: txt 
      });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ 
        title: txt.split(/[\s,]+/)[0], 
        content: txt 
      });
    }
    renderPrediksi();
  } catch(e) {
    console.error("Error Prediksi:", e);
    dom.listP.innerHTML = '<p class="empty-state">❌ Gagal memuat data</p>';
  }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { 
        dom.inNom.value = nom; 
        dom.statNom.textContent = "💰 Rp " + formatNum(nom); 
      }
    }
    
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 }, 
      { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 }, 
      { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 }, 
      { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 }, 
      { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    
    state.hitung = secDef.map(s => {
      let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
      let items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), res = safeGet(data[i], 24);
          if (type || res) items.push({ type, res });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    
    renderHitung();
  } catch(e) {
    console.error("Error Hitung:", e);
    dom.contH.innerHTML = '<p class="empty-state">❌ Gagal memuat data</p>';
  }
}

// ═══════════════════════════════════════════════════════════
// 🎨 RENDERING FUNCTIONS
// ═══════════════════════════════════════════════════════════

function renderList(container, items, search) {
  const filtered = items.filter(i => 
    i.content.toLowerCase().includes(search.toLowerCase())
  );
  
  if (!filtered.length) { 
    container.innerHTML = '<p class="empty-state">📭 Tidak ada data ditemukan</p>'; 
    return; 
  }
  
  container.innerHTML = filtered.map(v => `
    <div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}', this)" tabindex="0">
      <div class="item-label">📋 Judul</div>
      <div class="item-title">${v.title}</div>
      <div class="item-label">💬 Isi (Klik untuk Copy)</div>
      <div class="item-content">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) { 
    dom.contH.innerHTML = '<p class="empty-state">📭 Tidak ada data</p>'; 
    return; 
  }
  
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-box">
      <div class="pasaran-header">
        <h3 class="pasaran-title">🎯 ${s.title}</h3>
      </div>
      <div class="pasaran-content">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}', this)" tabindex="0">
            <span class="bet-type">${it.type}</span>
            <span class="bet-result">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════
// 🎯 CHIP SELECTOR LOGIC
// ═══════════════════════════════════════════════════════════

function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + 
    items.map(it => {
      const label = it.label || it;
      const display = label.length > 24 ? label.substring(0, 24) + '...' : label;
      return `<div class="chip" data-value="${label}">${display}</div>`;
    }).join('');
  
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (type === 'tipe') {
        selectedTipe = chip.dataset.value;
        updateLabelChips();
      } else {
        selectedLabel = chip.dataset.value;
      }
    };
  });
}

function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) {
    renderChips(dom.chipLabel, [], 'label');
    return;
  }
  const labels = state.kelompok[selectedTipe].map(i => i.label);
  renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { 
        dom.inNom.value = nom; 
        dom.statNom.textContent = "💰 Rp " + formatNum(nom); 
      }
    }
    
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "SEMUA PASARAN" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "BONUS" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "JAKARTA" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "TOTOMALI" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "HOKIDRAW" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY & HK" }
    ];
    
    state.kelompok = {};
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length > 0) state.kelompok[sec.title] = items;
    });
    
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { 
    console.error("Error loadHitungData:", e); 
  }
}

function tampilkanValueHitungan() {
  const result = dom.resultBox;
  
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = '<span style="color: var(--text-muted);">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    result.innerHTML = `<span style="font-weight: 800; text-shadow: 0 0 14px var(--neon-blue);">${item.value}</span>`;
    result.onclick = () => copyText(item.value, result);
  }
}

// ═══════════════════════════════════════════════════════════
// ⚡ AUTO-UPDATE FUNCTIONS
// ═══════════════════════════════════════════════════════════

function autoUpdateTanggal() {
  showAutoUpdate();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateTanggal, 1000);
}

function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal!");
  const p = dom.inTgl.value.split('-');
  const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  
  dom.btnTgl.disabled = true; 
  dom.statTgl.textContent = "⏳...";
  
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = "✅ OK";
      showToast("📅 Data tersimpan!");
      fetchPrediksi(); 
      fetchHitung(); 
      loadHitungData();
    } else { 
      dom.statTgl.textContent = "❌"; 
      showToast("❌ Cek koneksi atau Script URL"); 
    }
  });
}

function autoUpdateNominal() {
  showAutoUpdate();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateNominal, 1000);
}

function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Isi nominal!");
  
  dom.btnNom.disabled = true; 
  dom.statNom.textContent = "⏳...";
  
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value);
      showToast("💰 Nominal tersimpan!");
      fetchPrediksi(); 
      fetchHitung(); 
      loadHitungData();
    } else { 
      dom.statNom.textContent = "❌"; 
      showToast("❌ Cek koneksi atau Script URL"); 
    }
  });
}

// ═══════════════════════════════════════════════════════════
// 🚀 INITIALIZATION
// ═══════════════════════════════════════════════════════════

function initTabs() {
  document.querySelectorAll('.tab-chip').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active'));
      t.classList.add('active');
      dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
      dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
    };
  });
}

function initSearch() {
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
}

function init() {
  initTabs();
  initSearch();
  fetchPrediksi(); 
  fetchHitung(); 
  loadHitungData();
}

// ═══════════════════════════════════════════════════════════
// 🎬 DOM READY
// ═══════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  init();
  setTimeout(() => showToast('🔷 Ultra Cool Neon Blue Loaded • Ready!'), 1200);
});

// Keyboard support for cards
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement.classList.contains('item-card')) {
    document.activeElement.click();
  }
});
</script>

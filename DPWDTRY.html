<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg-deep: #0a0e1a;
  --bg-base: #0d1225;
  --bg-card: rgba(15, 21, 42, 0.65);
  --bg-card-alt: rgba(18, 25, 50, 0.55);
  --bg-elevated: rgba(22, 30, 58, 0.7);
  --bg-input: rgba(10, 15, 35, 0.8);

  --fg: #e2e8f4;
  --fg-secondary: #94a3c2;
  --fg-muted: #5a6a8a;
  --fg-dim: #3a4763;

  --accent: #0ea5a0;
  --accent-light: #2dd4bf;
  --accent-dark: #0b7c78;
  --accent-glow: rgba(14, 165, 160, 0.35);
  --accent-subtle: rgba(14, 165, 160, 0.08);

  --warm: #f59e0b;
  --warm-light: #fbbf24;
  --warm-subtle: rgba(245, 158, 11, 0.1);

  --rose: #f43f5e;
  --rose-subtle: rgba(244, 63, 94, 0.1);

  --violet: #8b5cf6;
  --violet-subtle: rgba(139, 92, 246, 0.08);

  --border: rgba(148, 163, 194, 0.08);
  --border-accent: rgba(14, 165, 160, 0.2);
  --border-hover: rgba(14, 165, 160, 0.35);

  --glass-blur: 20px;
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 24px;

  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur: 0.25s;
  --dur-slow: 0.4s;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg-deep);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ===== NOISE TEXTURE OVERLAY ===== */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.018;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 128px 128px;
}

/* ===== BACKGROUND ATMOSPHERE ===== */
.bg-atmosphere {
  position: fixed; inset: 0; z-index: -3;
  background:
    radial-gradient(ellipse 80% 50% at 15% 10%, rgba(14, 165, 160, 0.06), transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 25%, rgba(139, 92, 246, 0.04), transparent 55%),
    radial-gradient(ellipse 70% 50% at 50% 95%, rgba(245, 158, 11, 0.03), transparent 55%),
    linear-gradient(170deg, #0a0e1a 0%, #0d1225 40%, #0f1630 70%, #0a0e1a 100%);
}

.bg-mesh {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image:
    linear-gradient(rgba(148, 163, 194, 0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148, 163, 194, 0.018) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 20%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 20%, transparent 70%);
}

.orb {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: -1;
  filter: blur(100px); opacity: 0.07;
  animation: orbDrift 60s ease-in-out infinite alternate;
}
.orb-a { width: 600px; height: 600px; background: var(--accent); top: -20%; left: -10%; }
.orb-b { width: 450px; height: 450px; background: var(--violet); bottom: -15%; right: -8%; animation-delay: -30s; }
.orb-c { width: 350px; height: 350px; background: var(--warm); top: 50%; left: 60%; animation-delay: -15s; opacity: 0.04; }

@keyframes orbDrift {
  0% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(20px, -15px) scale(1.03); }
  66% { transform: translate(-12px, 20px) scale(0.98); }
  100% { transform: translate(8px, -8px) scale(1.01); }
}

/* ===== FLOATING PARTICLES ===== */
.particles-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.dot {
  position: absolute; border-radius: 50%; opacity: 0;
  animation: dotFloat linear infinite;
}
.dot-sm { width: 2px; height: 2px; background: var(--accent-light); box-shadow: 0 0 8px var(--accent-glow); }
.dot-md { width: 3px; height: 3px; background: var(--warm-light); box-shadow: 0 0 10px var(--warm-subtle); }
.dot-lg { width: 1.5px; height: 1.5px; background: var(--violet); box-shadow: 0 0 6px var(--violet-subtle); }
@keyframes dotFloat {
  0% { transform: translateY(105vh) scale(0); opacity: 0; }
  10% { opacity: 0.7; transform: translateY(90vh) scale(1); }
  90% { opacity: 0.7; }
  100% { transform: translateY(-10vh) scale(0.5); opacity: 0; }
}

/* ===== MAIN CONTAINER ===== */
.main-wrap { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 16px; }

/* ===== HEADER ===== */
.header-block {
  text-align: center;
  padding: 28px 0 20px;
  animation: slideDown 0.6s var(--ease) backwards;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

.brand-title {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 900;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e2e8f4 0%, var(--accent-light) 35%, var(--warm-light) 65%, #e2e8f4 100%);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 6s ease-in-out infinite;
  position: relative;
  display: inline-block;
}
@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.brand-sub {
  margin-top: 6px;
  font-size: 0.82rem;
  color: var(--fg-muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 500;
}

.brand-line {
  width: 80px; height: 2px; margin: 12px auto 0;
  background: linear-gradient(90deg, transparent, var(--accent), var(--warm), transparent);
  border-radius: 2px;
  animation: lineShimmer 3s ease-in-out infinite;
}
@keyframes lineShimmer {
  0%, 100% { opacity: 0.5; width: 80px; }
  50% { opacity: 0.8; width: 120px; }
}

/* ===== TAB NAVIGATION ===== */
.tab-nav {
  display: flex; justify-content: center; gap: 4px;
  margin: 4px auto 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 5px;
  max-width: fit-content;
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
}

.tab-btn {
  position: relative;
  padding: 11px 28px;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 0.88rem;
  color: var(--fg-muted);
  background: transparent;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  letter-spacing: 0.3px;
  overflow: hidden;
}
.tab-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--accent-subtle), var(--violet-subtle));
  opacity: 0;
  transition: opacity var(--dur) var(--ease);
}
.tab-btn:hover { color: var(--fg-secondary); }
.tab-btn:hover::before { opacity: 1; }

.tab-btn.active {
  color: var(--fg);
  background: linear-gradient(135deg, rgba(14, 165, 160, 0.15), rgba(139, 92, 246, 0.1));
  border: 1px solid var(--border-accent);
  box-shadow: 0 0 20px rgba(14, 165, 160, 0.1), inset 0 1px 0 rgba(255,255,255,0.04);
}
.tab-btn.active::before { opacity: 0; }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 25%; right: 25%;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--warm));
  border-radius: 2px;
}

/* ===== GLASS PANEL ===== */
.glass-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 20px;
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  position: relative;
  overflow: hidden;
}
.glass-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 5%, rgba(14, 165, 160, 0.3) 30%, rgba(245, 158, 11, 0.2) 70%, transparent 95%);
  animation: topLine 8s linear infinite;
  background-size: 200% 100%;
}
@keyframes topLine {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ===== CONTROL BAR ===== */
.control-bar {
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  padding: 14px 18px;
  background: linear-gradient(135deg, var(--bg-card-alt), var(--bg-card));
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 20px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.ctrl-group { display: flex; align-items: center; gap: 8px; }
.ctrl-label {
  font-size: 0.78rem; font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.ctrl-input {
  padding: 9px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--fg);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.88rem;
  width: 160px;
  transition: all var(--dur) var(--ease);
}
.ctrl-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-subtle), 0 0 16px rgba(14, 165, 160, 0.1);
  background: rgba(12, 18, 40, 0.9);
}

/* ===== BUTTONS ===== */
.btn-primary {
  position: relative;
  padding: 9px 20px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  overflow: hidden;
}
.btn-primary::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transition: left 0.5s var(--ease);
}
.btn-primary:hover::before { left: 100%; }
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(14, 165, 160, 0.3), 0 0 40px rgba(14, 165, 160, 0.1);
}
.btn-primary:active { transform: translateY(0) scale(0.98); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-primary:disabled::before { display: none; }

.status-pill {
  font-size: 0.76rem;
  color: var(--accent-light);
  font-weight: 600;
  padding: 3px 10px;
  background: var(--accent-subtle);
  border-radius: 20px;
  border: 1px solid rgba(14, 165, 160, 0.15);
  animation: statusPulse 2.5s ease-in-out infinite;
}
@keyframes statusPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.65; } }

/* ===== BENTO GRID ===== */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* ===== BENTO CARD ===== */
.bento-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: all var(--dur) var(--ease);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.bento-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.2), 0 0 0 1px var(--border-hover);
}

.bento-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
  background: linear-gradient(90deg, var(--accent-subtle), transparent 70%);
  border-bottom: 1px solid var(--border);
}
.bento-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 0.92rem;
  color: var(--accent-light);
  letter-spacing: 0.2px;
}
.bento-badge {
  font-size: 0.68rem; font-weight: 700;
  padding: 2px 9px; border-radius: 20px;
  background: var(--accent-subtle);
  color: var(--accent);
  border: 1px solid rgba(14, 165, 160, 0.15);
}

.bento-search {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
.search-field {
  width: 100%;
  padding: 8px 12px 8px 34px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--fg);
  font-size: 0.84rem;
  font-family: 'Space Grotesk', sans-serif;
  transition: all var(--dur) var(--ease);
  background-image: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235a6a8a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cline x1='21' y1='21' x2='16.65' y2='16.65'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: 11px center;
}
.search-field:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-subtle);
}
.search-field::placeholder { color: var(--fg-dim); }

.bento-body { padding: 8px; overflow-y: auto; max-height: 400px; flex-grow: 1; }

/* ===== LIST ITEM ===== */
.list-item {
  padding: 12px 14px;
  margin-bottom: 6px;
  background: var(--bg-card-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  position: relative;
  overflow: hidden;
}
.list-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0;
  background: linear-gradient(135deg, var(--accent-subtle), var(--violet-subtle));
  transition: width var(--dur) var(--ease);
}
.list-item:hover::before { width: 3px; }
.list-item:hover {
  border-color: var(--border-hover);
  background: var(--bg-elevated);
  transform: translateX(2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
.list-item:active { transform: translateX(2px) scale(0.995); }

.li-tag {
  font-size: 0.62rem;
  font-weight: 700;
  color: var(--fg-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 3px;
}
.li-name {
  font-weight: 600;
  color: var(--accent-light);
  font-size: 0.88rem;
  margin-bottom: 4px;
}
.li-hint {
  font-size: 0.62rem;
  color: var(--fg-dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 3px;
}
.li-text {
  font-size: 0.8rem;
  color: var(--fg-secondary);
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}

/* ===== PASARAN SECTION ===== */
.pasaran-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 10px;
  transition: all var(--dur) var(--ease);
}
.pasaran-card:hover {
  border-color: var(--border-hover);
  box-shadow: 0 6px 24px rgba(0,0,0,0.15);
}
.pasaran-head {
  padding: 12px 16px;
  background: linear-gradient(90deg, var(--warm-subtle), transparent 70%);
  border-bottom: 1px solid var(--border);
}
.pasaran-name {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 0.88rem;
  color: var(--warm-light);
}
.pasaran-body { padding: 6px 10px; max-height: 330px; overflow-y: auto; }

.bet-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px;
  margin-bottom: 4px;
  background: var(--bg-card-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--dur) var(--ease);
}
.bet-row:hover {
  border-color: var(--border-hover);
  background: var(--bg-elevated);
  transform: translateX(3px);
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
}
.bet-label {
  color: var(--fg-secondary);
  font-size: 0.8rem;
  flex: 1;
  margin-right: 10px;
  font-weight: 500;
}
.bet-value {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  color: var(--accent-light);
  padding: 3px 10px;
  background: var(--accent-subtle);
  border: 1px solid rgba(14, 165, 160, 0.15);
  border-radius: 8px;
  transition: all var(--dur) var(--ease);
}
.bet-row:hover .bet-value {
  background: rgba(14, 165, 160, 0.15);
  box-shadow: 0 0 12px rgba(14, 165, 160, 0.15);
}

/* ===== SELECTOR PANEL ===== */
.selector-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 20px;
  margin: 18px 0;
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  position: relative;
}
.selector-panel::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.2), transparent);
}

.selector-top {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 14px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.selector-ico {
  font-size: 1.3rem;
  animation: icoBob 3s ease-in-out infinite;
}
@keyframes icoBob { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-3px) rotate(3deg); } }
.selector-heading {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 1.02rem;
  color: var(--fg);
  letter-spacing: 0.2px;
}

/* ===== CHIP GROUPS ===== */
.chip-section { margin-bottom: 16px; }
.chip-heading {
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--fg-secondary);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.chip-heading::before {
  content: '';
  width: 3px; height: 14px;
  background: linear-gradient(180deg, var(--accent), var(--warm));
  border-radius: 2px;
}
.chip-wrap { display: flex; flex-wrap: wrap; gap: 6px; }

.pill {
  position: relative;
  padding: 7px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--fg-muted);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  overflow: hidden;
  font-family: 'Space Grotesk', sans-serif;
}
.pill:hover {
  color: var(--fg-secondary);
  border-color: rgba(148, 163, 194, 0.15);
  background: var(--bg-elevated);
}
.pill.selected {
  color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  border-color: var(--accent);
  font-weight: 600;
  box-shadow: 0 2px 12px rgba(14, 165, 160, 0.25);
}
.pill.selected::after {
  content: '✓';
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.65rem;
  font-weight: 800;
  animation: popIn 0.3s var(--ease-bounce);
}
@keyframes popIn {
  0% { transform: translateY(-50%) scale(0); }
  60% { transform: translateY(-50%) scale(1.3); }
  100% { transform: translateY(-50%) scale(1); }
}

/* ===== ACTION ROW ===== */
.action-row { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 4px; }
.action-btn {
  padding: 12px 24px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  border: none;
  border-radius: var(--radius-md);
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 0.88rem;
  cursor: pointer;
  transition: all var(--dur) var(--ease);
  text-transform: uppercase;
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
}
.action-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  transition: left 0.5s var(--ease);
}
.action-btn:hover::before { left: 100%; }
.action-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(14, 165, 160, 0.3);
}
.action-btn:active { transform: translateY(0) scale(0.98); }

/* ===== RESULT DISPLAY ===== */
.result-display {
  margin-top: 16px;
  padding: 16px 20px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);

}

}

  box-shadow: 0 0 20px var(--warm-subtle);

@keyframes flashCopy {
  0% { transform: scale(1); }
  40% { transform: scale(1.015); background: var(--warm-subtle); }

}

/* ===== TOAST ===== */
.toast-notification {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px) scale(0.92);
  background: var(--bg-elevated);
  color: var(--fg);
  padding: 12px 28px;
  border-radius: 100px;
  font-weight: 600;
  font-size: 0.86rem;

  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);

  white-space: nowrap;
  max-width: 90vw;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toast-notification.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0) scale(1);
}

/* ===== AUTO UPDATE BADGE ===== */
.auto-badge {
  position: fixed;
  top: 16px; right: 16px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-accent);
  border-radius: 100px;

  -webkit-backdrop-filter: blur(12px);

  animation: badgePulse 1.5s ease-in-out infinite;
}
.auto-badge.on { display: flex; }
@keyframes badgePulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

/* ===== SPINNER ===== */
.loader {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: rotate 0.8s linear infinite;
}
@keyframes rotate { to { transform: rotate(360deg); } }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {

/* ===== EMPTY STATE ===== */

/* ===== RESPONSIVE ===== */

  .bento-grid { grid-template-columns: 1fr 1fr; }

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4'
};

const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'),
  autoBadge: $('auto-badge'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};

let selectedTipe = '', selectedLabel = '';

// ============ PARTICLES ============
function createParticles() {
  const box = $('particles');
  if (!box) return;
  const classes = ['dot-sm', 'dot-md', 'dot-lg'];
  for (let i = 0; i < 30; i++) {
    const d = document.createElement('div');
    d.className = 'dot ' + classes[i % 3];
    d.style.left = (Math.random() * 100) + '%';
    d.style.animationDelay = (Math.random() * 35) + 's';
    d.style.animationDuration = (28 + Math.random() * 16) + 's';
    box.appendChild(d);
  }
}

// ============ TOAST ============
function showToast(msg) {
  dom.toast.textContent = msg;
  dom.toast.classList.add('visible');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => dom.toast.classList.remove('visible'), 2800);
}

function showAutoBadge() {
  if (!dom.autoBadge) return;
  dom.autoBadge.classList.add('on');
  clearTimeout(showAutoBadge._t);
  showAutoBadge._t = setTimeout(() => dom.autoBadge.classList.remove('on'), 1800);
}

// ============ COPY ============
function copyText(text, el) {
  let decoded = text;
  try { decoded = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(decoded).then(() => {
    const preview = decoded.length > 24 ? decoded.substring(0, 24) + '...' : decoded;
    showToast('📋 Disalin: ' + preview);
    if (el) {
      el.classList.add('copied');
      setTimeout(() => el.classList.remove('copied'), 400);
    }
  }).catch(() => showToast('❌ Gagal menyalin'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

// ============ CSV PARSER ============
function parseCSV(text) {
  const rows = [], result = [];
  let row = [], entry = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i + 1];
    if (!inQuote) {
      if (c === '"') { inQuote = true; }
      else if (c === ',') { row.push(entry); entry = ''; }
      else if (c === '\r' && next === '\n') { row.push(entry); result.push(row); row = []; entry = ''; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); result.push(row); row = []; entry = ''; }
      else { entry += c; }
    } else {
      if (c === '"' && next === '"') { entry += '"'; i++; }
      else if (c === '"') { inQuote = false; }
      else { entry += c; }
    }
  }
  if (entry || row.length) { row.push(entry); result.push(row); }
  return result;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ''; }

// ============ SHEET UPDATE ============
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try {
    const res = await fetch(SCRIPT_URL + '?' + new URLSearchParams({ action, value }).toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error('Fetch Error:', e); return false; }
}

// ============ FETCH PREDIKSI ============
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];

    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = dom.inTgl.value;
        }
      }
    }

    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }

    renderPrediksi();
  } catch(e) {
    console.error('Error Prediksi:', e);
    dom.listP.innerHTML = '<div class="empty-state"><span class="empty-icon">⚠️</span>Gagal memuat data</div>';
  }
}

// ============ FETCH HITUNG ============
async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());

    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = '💰 Rp ' + formatNum(nom); }
    }

    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 },
      { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 },
      { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 },
      { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 },
      { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];

    state.hitung = secDef.map(s => {
      const title = safeGet(data[s.tRow], s.tCol) || 'PASARAN';
      const items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), res = safeGet(data[i], 24);
          if (type || res) items.push({ type, res });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);

    renderHitung();
  } catch(e) {
    console.error('Error Hitung:', e);
    dom.contH.innerHTML = '<div class="empty-state"><span class="empty-icon">⚠️</span>Gagal memuat data</div>';
  }
}

// ============ RENDER FUNCTIONS ============
function renderList(container, items, search) {
  const q = search.toLowerCase();
  const filtered = items.filter(i => i.content.toLowerCase().includes(q));
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state"><span class="empty-icon">📭</span>Tidak ada data ditemukan</div>';
    return;
  }
  container.innerHTML = filtered.map(v => `
    <div class="list-item" onclick="copyText('${encodeURIComponent(v.content)}', this)" role="button" tabindex="0" aria-label="Klik untuk menyalin">
      <div class="li-tag">Judul</div>
      <div class="li-name">${v.title}</div>
      <div class="li-hint">Klik untuk salin</div>
      <div class="li-text">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) {
    dom.contH.innerHTML = '<div class="empty-state"><span class="empty-icon">📭</span>Tidak ada data</div>';
    return;
  }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-card">
      <div class="pasaran-head">
        <h3 class="pasaran-name">🎯 ${s.title}</h3>
      </div>
      <div class="pasaran-body">
        ${s.items.map(it => `
          <div class="bet-row" onclick="copyText('${encodeURIComponent(it.res)}', this)" role="button" tabindex="0" aria-label="Klik untuk menyalin ${it.type}">
            <span class="bet-label">${it.type}</span>
            <span class="bet-value">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ============ CHIP SELECTOR ============
function renderChips(container, items, type) {
  container.innerHTML = '<div class="pill" data-value="">Semua</div>' +
    items.map(it => {
      const label = it.label || it;
      const display = label.length > 22 ? label.substring(0, 22) + '...' : label;
      return `<div class="pill" data-value="${label}">${display}</div>`;
    }).join('');

  container.querySelectorAll('.pill').forEach(pill => {
    pill.onclick = () => {
      container.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
      if (type === 'tipe') {
        selectedTipe = pill.dataset.value;
        updateLabelChips();
      } else {
        selectedLabel = pill.dataset.value;
      }
    };
  });
}

function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) {
    renderChips(dom.chipLabel, [], 'label');
    return;
  }
  const labels = state.kelompok[selectedTipe].map(i => ({ label: i.label }));
  renderChips(dom.chipLabel, labels, 'label');
}

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());

    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = '💰 Rp ' + formatNum(nom); }
    }

    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: 'SEMUA PASARAN' },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: 'TOTO MACAU 4D' },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: 'TOTO MACAU 5D' },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: 'KINGKONG 4D' },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: 'BONUS' },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: 'JAKARTA' },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: 'TOTOMALI' },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: 'HOKIDRAW' },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: 'SYDNEY & HK' }
    ];

    state.kelompok = {};
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || '-', value: value || '-' });
        }
      }
      if (items.length > 0) state.kelompok[sec.title] = items;
    });

    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error('Error loadHitungData:', e); }
}

function tampilkanValueHitungan() {
  const box = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    box.innerHTML = '<span style="color: var(--fg-muted); font-weight: 400; font-size: 0.9rem;">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    box.innerHTML = `<span>${item.value}</span>`;
    box.onclick = () => copyText(item.value, box);
  } else {
    box.innerHTML = '<span style="color: var(--fg-muted); font-weight: 400; font-size: 0.9rem;">Data tidak ditemukan</span>';
  }
}

// ============ AUTO-UPDATE ============
let autoTimeout = null;

function autoUpdateTanggal() {
  showAutoBadge();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateTanggal, 1200);
}

function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast('⚠️ Pilih tanggal terlebih dahulu');
  const p = dom.inTgl.value.split('-');
  const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true;
  dom.statTgl.textContent = '⏳...';
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = '✅ OK';
      showToast('✅ Tanggal tersimpan!');
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else {
      dom.statTgl.textContent = '❌ Gagal';
      showToast('❌ Cek URL Script');
    }
  });
}

function autoUpdateNominal() {
  showAutoBadge();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateNominal, 1200);
}

function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast('⚠️ Isi nominal terlebih dahulu');
  dom.btnNom.disabled = true;
  dom.statNom.textContent = '⏳...';
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = '💰 Rp ' + formatNum(dom.inNom.value);
      showToast('✅ Nominal tersimpan!');
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else {
      dom.statNom.textContent = '❌ Gagal';
      showToast('❌ Cek URL Script');
    }
  });
}

// ============ INIT ============
function init() {
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-selected', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-selected', 'true');
      dom.tabP.style.display = btn.dataset.tab === 'prediksi' ? 'block' : 'none';
      dom.tabH.style.display = btn.dataset.tab === 'hitung' ? 'block' : 'none';
    };
  });

  // Search listeners
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);

  // Keyboard support for list items
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.classList.contains('list-item')) {
      e.target.click();
    }
    if (e.key === 'Enter' && e.target.classList.contains('bet-row')) {
      e.target.click();
    }
  });

  // Fetch all data
  fetchPrediksi();
  fetchHitung();
  loadHitungData();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  init();
  setTimeout(() => showToast('🌙 Data berhasil dimuat'), 1000);
});
</script>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOATING DOCK UI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       1. SETUP DASAR
       ========================================= */
    :root {
      --accent-color: #6c5ce7; /* Ungu kebiruan */
      --bg-main: #0f0f12;
      --card-bg: #1a1a1f;
      --text-main: #eaeaea;
      --dock-bg: rgba(30, 30, 35, 0.85);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-main);
      font-family: 'Outfit', sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      padding-bottom: 100px; /* Ruang untuk Dock di bawah */
    }

    /* =========================================
       2. KONTEN UTAMA (FULL SCREEN)
       ========================================= */
    .content-area {
      padding: 20px;
      max-width: 100%;
      width: 100%;
    }

    .tab-content {
      display: none;
      width: 100%;
      background: var(--card-bg);
      border-radius: 24px;
      padding: 25px;
      margin-bottom: 20px;
      border: 1px solid #2a2a30;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .tab-content h3 {
      font-size: 20px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Form Style */
    .tab-content textarea, .tab-content input, .tab-content select {
      width: 100%;
      background: #000;
      border: 1px solid #333;
      color: #fff;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-family: 'Outfit', sans-serif;
    }
    .tab-content button {
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      border-radius: 8px;
      border: none;
      padding: 10px 20px;
      font-weight: 600;
      background: var(--accent-color);
      color: #fff;
    }
    .tab-content button.secondary { background: #333; }

    /* =========================================
       3. FLOATING DOCK (BOTTOM NAVIGATION)
       ========================================= */
    .floating-dock {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dock-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 10px 15px;
      border-radius: 25px;
      display: flex;
      gap: 5px;
      z-index: 1000;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      
      /* Agar tombol tidak terlalu lebar di desktop */
      max-width: 600px; 
      width: auto; 
    }

    .dock-item {
      background: transparent;
      border: none;
      color: #888;
      padding: 10px 15px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
    }

    .dock-item i {
      font-size: 18px;
    }

    .dock-item:hover {
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    /* Active State */
    .dock-item.active {
      background: var(--accent-color);
      color: #fff;
      box-shadow: 0 0 15px rgba(108, 92, 231, 0.5);
    }

    /* Utility */
    #toastNotif { position: fixed; top: 20px; right: 20px; background: #fff; color: #000; padding: 10px 20px; border-radius: 50px; display: none; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    #stickyFab { position: fixed; bottom: 90px; right: 20px; background: var(--accent-color); color: #fff; border-radius: 50%; width: 50px; height: 50px; border: none; font-size: 20px; cursor: pointer; z-index: 999; box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4); }
    #stickyPanel { display: none; position: fixed; bottom: 150px; right: 20px; width: 300px; background: #1a1a1f; border-radius: 15px; padding: 15px; z-index: 999; border: 1px solid #333; }

  </style>
</head>
<body>

  <!-- ================= AREA KONTEN UTAMA ================= -->
  <div class="content-area">
    
    <!-- Tab AI Z -->
    <div id="tanyaZTab" class="tab-content">
      <h3><i class="fas fa-robot"></i> Tanya Z (AI)</h3>
      <div id="chatHistory" style="min-height:200px; background:#111; border-radius:12px; padding:10px; margin-bottom:10px;"></div>
      <div style="display:flex; gap:10px;">
        <input type="text" id="chatInput" placeholder="Ketik pesan..." style="margin:0;">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <!-- Tab Catatan -->
    <div id="catatanTab" class="tab-content" style="display:block;">
      <h3 id="judulCatatan"><i class="fas fa-folder"></i> Kendala All</h3>
      <input type="text" id="searchInput" placeholder="Cari..." oninput="searchNotes()">
      <div id="notesList"><p style="opacity:0.5; text-align:center;">Memuat data...</p></div>
    </div>

    <!-- Tab Prediksi -->
    <div id="prediksiGabungTab" class="tab-content">
      <h3><i class="fas fa-bullseye"></i> Prediksi & Hitung</h3>
      <input type="text" id="membacaIsiFoto_input" placeholder="Link Gambar OCR...">
      <div style="display:flex; gap:10px; margin-top:10px;">
        <input type="number" id="nominalInput" placeholder="Nominal" style="flex:1;">
        <button onclick="updateNominalTogel()" class="secondary">SET</button>
      </div>
      <div id="detailHitunganDropdown" style="margin-top:15px; padding:10px; background:#111; border-radius:8px; text-align:center; color:var(--accent-color);">OUTPUT</div>
    </div>

    <!-- Tab Bonus Event -->
    <div id="cekBonusEventTab" class="tab-content">
      <h3><i class="fas fa-gem"></i> Bonus Event</h3>
      <!-- Sub Switch Horizontal -->
      <div style="display:flex; gap:5px; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">
        <button class="dock-item active" id="btn-bonusAsli" onclick="switchBonusMode('bonusAsli')" style="padding:5px 10px; font-size:11px;">Asli</button>
        <button class="dock-item" id="btn-galeri" onclick="switchBonusMode('galeri')" style="padding:5px 10px; font-size:11px;">Galeri</button>
        <button class="dock-item" id="btn-inputScatter" onclick="switchBonusMode('inputScatter')" style="padding:5px 10px; font-size:11px;">Scatter</button>
      </div>
      
      <div id="modeBonusAsli" class="bonus-mode">
        <textarea id="bonusTextarea" rows="3" placeholder="Data..."></textarea>
        <div style="display:flex; gap:10px; margin-bottom:10px;"><input type="text" id="bonusPatokan" placeholder="Patokan"><input type="text" id="bonusSurplus" placeholder="Surplus"></div>
        <div style="display:flex; gap:10px;">
          <button onclick="hitungBonusEvent()" style="flex:1;">HITUNG</button>
          <button onclick="hapusBonusEvent()" class="secondary" style="flex:1; background:#333;">HAPUS</button>
        </div>
        <div id="bonusHasil" style="margin-top:15px; font-weight:bold; text-align:center;"></div>
      </div>
      <div id="modeGaleri" class="bonus-mode" style="display:none;"><textarea id="bonusLinkInput" rows="2" placeholder="Link..."></textarea></div>
      <div id="modeInputScatter" class="bonus-mode" style="display:none;">
         <div style="display:flex; gap:10px;">
            <div style="flex:1;"><input placeholder="UID 1"><input placeholder="S1"></div>
            <div style="flex:1;"><input placeholder="UID 2"><input placeholder="S2"></div>
         </div>
         <div style="display:flex; gap:10px; margin-top:10px;"><button onclick="copySemuaData()" style="flex:1;">COPY</button><button onclick="hapusSemuaData()" class="secondary" style="flex:1; background:#333;">CLEAR</button></div>
      </div>
    </div>

    <!-- Tab Lainnya -->
    <div id="cekhadiahTab" class="tab-content"><h3><i class="fas fa-medal"></i> Hadiah</h3><div id="hadiahContainer">Memuat...</div></div>
    <div id="reportLineTab" class="tab-content"><h3><i class="fas fa-file-alt"></i> Report</h3><div id="reportLineCardContainer">Memuat...</div></div>
    <div id="tryCariTab" class="tab-content">
        <h3><i class="fas fa-search"></i> Try Cari</h3>
        <div style="display:flex; gap:10px;"><textarea id="dataDocs" rows="2" placeholder="Docs" style="flex:1;"></textarea><textarea id="dataAdmin" rows="2" placeholder="Admin" style="flex:1;"></textarea></div>
        <button onclick="prosesData_TRYCARI()" style="width:100%; margin-top:10px;">BANDINGKAN</button>
    </div>
    <div id="pengaturanTab" class="tab-content"><h3><i class="fas fa-cog"></i> Setting</h3><p>Pengaturan Tema...</p></div>

  </div>

  <!-- ================= FLOATING DOCK (NAVIGASI) ================= -->
  <div class="floating-dock" id="mainMenuGrid">
    <button class="dock-item active" onclick="handleTab('KENDALA ALL', this, 'catatanTab')">
      <i class="fas fa-headset"></i><span>Kendala</span>
    </button>
    <button class="dock-item" onclick="handleTab('FOTO', this, 'catatanTab')">
      <i class="fas fa-camera"></i><span>Foto</span>
    </button>
    <button class="dock-item" onclick="handleTab(null, this, 'tryCariTab')">
      <i class="fas fa-search"></i><span>Cari</span>
    </button>
    <button class="dock-item" onclick="handleTab(null, this, 'cekBonusEventTab')">
      <i class="fas fa-gem"></i><span>Bonus</span>
    </button>
    <button class="dock-item" onclick="handleTab(null, this, 'prediksiGabungTab')">
      <i class="fas fa-bullseye"></i><span>Prediksi</span>
    </button>
    <button class="dock-item" onclick="handleTab(null, this, 'reportLineTab')">
      <i class="fas fa-file-alt"></i><span>Report</span>
    </button>
    <button class="dock-item" onclick="handleTab(null, this, 'tanyaZTab')">
      <i class="fas fa-robot"></i><span>AI Z</span>
    </button>
    <button class="dock-item" onclick="handleTab(null, this, 'pengaturanTab')">
      <i class="fas fa-cog"></i><span>Set</span>
    </button>
  </div>

  <!-- Floating Elements -->
  <div id="stickyFab" onclick="toggleStickyPanel()">💀</div>
  <div id="stickyPanel"><textarea id="stickyInput" placeholder="Note..."></textarea><button onclick="addSticky()" style="width:100%; margin-top:5px;">SAVE</button><div id="stickyList" style="margin-top:10px;"></div></div>
  <div id="toastNotif">Notif</div>
  <div id="lightbox" onclick="hideLightbox()" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; z-index:2000; justify-content:center; align-items:center;"><img id="lightboxImg" src="" style="max-width:90%; max-height:90%;"></div>

  <!-- ================= JAVASCRIPT ================= -->
  <script>
    function handleTab(folderName, buttonElement, tabId) {
      // 1. Update Dock Active State
      const buttons = document.querySelectorAll('.floating-dock .dock-item');
      buttons.forEach(btn => btn.classList.remove('active'));
      if (buttonElement) buttonElement.classList.add('active');

      // 2. Show Tab
      document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
      const activeTab = document.getElementById(tabId);
      if (activeTab) {
          activeTab.style.display = 'block';
          // Scroll ke atas konten saat ganti tab
          window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // 3. Load Data
      if (folderName && tabId === 'catatanTab') loadNotes(folderName);
      if (tabId === 'reportLineTab') loadReportLineData();
      if (tabId === 'cekhadiahTab') loadHadiahTogel();
    }

    function switchBonusMode(mode) {
        ['modeBonusAsli', 'modeGaleri', 'modeInputScatter'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).style.display = 'block';
        const btns = document.querySelectorAll('#cekBonusEventTab .dock-item'); btns.forEach(b=>b.classList.remove('active'));
        document.getElementById('btn-'+mode).classList.add('active');
    }

    // --- Utils & Dummy Functions ---
    function showToast(m) { const t = document.getElementById("toastNotif"); t.textContent = m; t.style.display = "block"; setTimeout(() => t.style.display = "none", 2000); }
    function loadNotes(f){ document.getElementById('notesList').innerHTML = "Memuat "+f; }
    function hitungBonusEvent(){ showToast("Menghitung..."); }
    function hapusBonusEvent(){ showToast("Clear"); }
    function copySemuaData(){ showToast("Copied"); }
    function hapusSemuaData(){ showToast("Cleared"); }
    function prosesData_TRYCARI(){ showToast("Analisis..."); }
    function sendMessage(){ const i=document.getElementById('chatInput'); if(i.value) { const h=document.getElementById('chatHistory'); h.innerHTML+="<div>Me: "+i.value+"</div>"; i.value=""; } }
    function toggleStickyPanel(){ const p=document.getElementById('stickyPanel'); p.style.display = p.style.display==='block'?'none':'block'; }
    function addSticky(){ const v=document.getElementById('stickyInput').value; if(v){ const d=document.createElement('div'); d.innerText=v; d.style.cssText="background:#222; padding:5px; margin-top:2px; font-size:11px;"; document.getElementById('stickyList').prepend(d); document.getElementById('stickyInput').value=""; } }
    function showLightbox(s){ document.getElementById('lightbox').style.display='flex'; document.getElementById('lightboxImg').src=s; }
    function hideLightbox(){ document.getElementById('lightbox').style.display='none'; }
    function loadReportLineData(){ document.getElementById('reportLineCardContainer').innerText="Report Loaded"; }
    function loadHadiahTogel(){ document.getElementById('hadiahContainer').innerText="Hadiah Loaded"; }
    function updateNominalTogel(){ showToast("Updated"); }
    function searchNotes(){}

    // Init
    document.addEventListener('DOMContentLoaded', () => {
       handleTab('KENDALA ALL', document.querySelector('.floating-dock .dock-item'), 'catatanTab');
    });
  </script>
</body>
</html>

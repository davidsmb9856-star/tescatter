<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00d4ff">
<meta name="description" content="PREDIKSI & HITUNG TOGEL - Cyber Core 2026">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--neon-blue: #00d4ff; --neon-blue-dark: #0099cc; --neon-blue-light: #66e5ff;
--neon-electric: #00ffff; --neon-purple: #7b2fff; --neon-gold: #ffd700;
--neon-green: #00ff9d; --neon-red: #ff3e6c; --bg-deep: #020408;
--bg-surface: rgba(5, 15, 35, 0.9); --bg-elevated: rgba(10, 25, 55, 0.8);
--bg-glass: rgba(8, 20, 45, 0.7); --text-primary: #ffffff;
--text-secondary: #8ab4f8; --text-dim: #54689a;
--border-glow: rgba(0, 212, 255, 0.6);
--glow-blue: 0 0 15px rgba(0, 212, 255, 0.6), 0 0 35px rgba(0, 212, 255, 0.4);
--glow-electric: 0 0 20px rgba(0, 255, 255, 0.7), 0 0 50px rgba(0, 255, 255, 0.4);
--transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
--transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
--transition-bloom: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
font-family: 'Rajdhani', sans-serif; background: var(--bg-deep);
color: var(--text-primary); min-height: 100vh; overflow-x: hidden;
position: relative; line-height: 1.5;
}
.bg-canvas {
position: fixed; inset: 0; z-index: -3;
background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
radial-gradient(ellipse at 80% 15%, rgba(0, 255, 255, 0.12) 0%, transparent 50%),
radial-gradient(ellipse at 50% 85%, rgba(123, 47, 255, 0.1) 0%, transparent 50%);
animation: bgPulse 15s ease-in-out infinite alternate;
}
@keyframes bgPulse { 0%, 100% { opacity: 1; filter: hue-rotate(0deg); } 50% { opacity: 0.9; filter: hue-rotate(15deg); } }
.grid-overlay {
position: fixed; inset: 0; z-index: -2;
background-image: linear-gradient(rgba(0, 212, 255, 0.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(0, 212, 255, 0.06) 1px, transparent 1px);
background-size: 50px 50px; mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 75%);
animation: gridMove 30s linear infinite;
}
@keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 50px 50px; } }
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
position: absolute; width: 4px; height: 4px; background: var(--neon-blue);
border-radius: 50%; opacity: 0.7; animation: particleFloat 20s infinite ease-in-out;
box-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-electric);
}
.particle:nth-child(2n) { background: var(--neon-electric); box-shadow: 0 0 20px var(--neon-electric); animation-delay: -5s; animation-duration: 25s; }
.particle:nth-child(3n) { background: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple); animation-delay: -10s; animation-duration: 30s; }
@keyframes particleFloat {
0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
10% { opacity: 0.7; } 90% { opacity: 0.7; }
100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}
.lightning-overlay { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0; animation: lightningFlash 8s infinite; }
@keyframes lightningFlash { 0%, 89%, 91%, 93%, 100% { opacity: 0; } 90%, 92% { opacity: 0.15; } }
.lightning-bolt {
position: absolute; width: 3px; height: 100vh;
background: linear-gradient(180deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
filter: blur(2px); animation: lightningStrike 8s infinite;
}
.lightning-bolt:nth-child(1) { left: 15%; animation-delay: 0s; }
.lightning-bolt:nth-child(2) { left: 50%; animation-delay: 2s; }
.lightning-bolt:nth-child(3) { left: 85%; animation-delay: 4s; }
@keyframes lightningStrike { 0%, 89%, 91%, 93%, 100% { transform: scaleY(0); opacity: 0; } 90%, 92% { transform: scaleY(1); opacity: 1; } }
.scanline {
position: fixed; left: 0; right: 0; height: 3px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
opacity: 0.8; animation: scanLine 6s linear infinite; z-index: 100; pointer-events: none;
filter: blur(1px); box-shadow: 0 0 20px var(--neon-blue);
}
@keyframes scanLine { 0% { top: -3px; opacity: 0; } 5% { opacity: 0.8; } 95% { opacity: 0.8; } 100% { top: 100%; opacity: 0; } }
.noise {
position: fixed; inset: 0; z-index: -1; opacity: 0.03;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
pointer-events: none;
}

/* === HEADER BARU === */
.top-bar {
display: flex; justify-content: space-between; align-items: center;
padding: 14px 24px; background: var(--bg-glass); border-bottom: 1px solid var(--border-glow);
backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 50;
}
.staff-input-group { display: flex; align-items: center; gap: 10px; }
.staff-label { color: var(--text-secondary); font-size: 0.85rem; font-weight: 600; }
.staff-input {
padding: 8px 14px; background: var(--bg-deep); border: 1px solid rgba(0, 212, 255, 0.35);
border-radius: 12px; color: var(--text-primary); font-size: 0.9rem;
font-family: 'Rajdhani', sans-serif; width: 140px; transition: var(--transition-fast);
}
.staff-input:focus { outline: none; border-color: var(--neon-electric); box-shadow: var(--glow-electric); }
.auto-refresh-badge {
display: flex; align-items: center; gap: 6px; padding: 6px 14px;
background: rgba(0, 255, 255, 0.12); border: 1px solid rgba(0, 255, 255, 0.4);
border-radius: 20px; color: var(--neon-electric); font-size: 0.8rem; font-weight: 600;
animation: pulseBadge 2s ease-in-out infinite;
}
@keyframes pulseBadge { 0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 255, 0.3); } 50% { box-shadow: 0 0 22px rgba(0, 255, 255, 0.6); } }
.refresh-dot { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; animation: dotPulse 1.2s ease-in-out infinite; }
@keyframes dotPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.4); } }

/* === MAIN CONTAINER === */
.main-container { position: relative; z-index: 10; max-width: 1450px; margin: 0 auto; padding: 24px 20px; }
.page-header { text-align: center; padding: 20px 0 28px; animation: headerEntrance 1s var(--transition-bloom) backwards; }
@keyframes headerEntrance { from { opacity: 0; transform: translateY(-25px); } to { opacity: 1; transform: translateY(0); } }
.page-title {
font-family: 'Orbitron', sans-serif; font-size: clamp(26px, 5.5vw, 44px);
font-weight: 900; letter-spacing: 3px; position: relative;
background: linear-gradient(135deg, var(--neon-electric) 0%, var(--neon-blue) 35%, #ffffff 50%, var(--neon-blue-light) 70%, var(--neon-purple) 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
text-shadow: 0 0 45px rgba(0, 212, 255, 0.5); animation: titleShimmer 3s ease-in-out infinite;
}
@keyframes titleShimmer { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }

/* === CONTROL PANEL BARU === */
.control-panel {
display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
gap: 16px; margin-bottom: 24px; animation: panelSlide 0.5s var(--transition-bloom) backwards;
}
@keyframes panelSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.control-card {
background: var(--bg-surface); border: 1px solid var(--border-glow);
border-radius: 20px; padding: 18px 22px; backdrop-filter: blur(25px);
display: flex; flex-direction: column; gap: 14px; position: relative; overflow: hidden;
transition: var(--transition-bloom);
}
.control-card:hover { transform: translateY(-4px); box-shadow: var(--glow-blue); }
.control-card::before {
content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, transparent, var(--neon-electric), var(--neon-blue), transparent);
animation: borderFlow 2.5s linear infinite;
}
@keyframes borderFlow { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.control-label {
font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 700;
color: var(--neon-electric); display: flex; align-items: center; gap: 8px;
}
.control-input {
padding: 11px 16px; background: var(--bg-deep); border: 1px solid rgba(0, 212, 255, 0.35);
border-radius: 14px; color: var(--text-primary); font-size: 1rem;
font-family: 'Rajdhani', sans-serif; transition: var(--transition-fast);
}
.control-input:focus { outline: none; border-color: var(--neon-electric); box-shadow: var(--glow-electric); }
.control-actions { display: flex; gap: 10px; align-items: center; }
.btn-neon {
flex: 1; padding: 10px; background: linear-gradient(135deg, var(--neon-electric), var(--neon-blue));
border: none; border-radius: 14px; color: var(--bg-deep); font-family: 'Orbitron', sans-serif;
font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: var(--transition-bloom);
text-transform: uppercase; letter-spacing: 1.5px; position: relative; overflow: hidden;
}
.btn-neon:hover { transform: translateY(-3px); box-shadow: var(--glow-electric); }
.btn-neon:active { transform: translateY(0); }
.btn-neon:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.status-indicator {
display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--neon-green);
font-weight: 600; text-shadow: 0 0 8px rgba(0, 255, 157, 0.5);
}
.status-dot { width: 7px; height: 7px; background: var(--neon-green); border-radius: 50%; animation: statusBlink 1.5s infinite; }
@keyframes statusBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

/* === TABS === */
.tabs-container {
display: flex; justify-content: center; gap: 8px; margin: 18px 0 24px;
background: var(--bg-glass); border: 1px solid var(--border-glow);
border-radius: 16px; padding: 4px; max-width: fit-content; margin-inline: auto;
}
.tab-btn {
padding: 10px 24px; font-family: 'Orbitron', sans-serif; font-weight: 600;
font-size: 0.9rem; color: var(--text-secondary); background: transparent;
border: none; border-radius: 12px; cursor: pointer; transition: var(--transition-bloom);
text-transform: uppercase; letter-spacing: 1.5px; position: relative;
}
.tab-btn:hover { color: var(--neon-electric); }
.tab-btn.active {
color: var(--bg-deep); background: linear-gradient(135deg, var(--neon-electric), var(--neon-blue));
border: 1px solid var(--neon-electric); box-shadow: var(--glow-electric);
}

/* === CONTENT GRID === */
.content-grid {
display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
gap: 20px; animation: gridReveal 0.6s var(--transition-bloom) backwards;
}
@keyframes gridReveal { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

/* === DATA CARD === */
.data-card {
background: var(--bg-glass); border: 1px solid rgba(0, 212, 255, 0.3);
border-radius: 22px; overflow: hidden; backdrop-filter: blur(20px);
display: flex; flex-direction: column; transition: var(--transition-bloom);
}
.data-card:hover { border-color: var(--neon-electric); box-shadow: var(--glow-electric); transform: translateY(-6px); }
.card-header {
background: linear-gradient(90deg, rgba(0, 212, 255, 0.15), transparent 80%);
padding: 14px 18px; border-bottom: 1px solid rgba(0, 212, 255, 0.25);
display: flex; justify-content: space-between; align-items: center;
}
.card-title {
font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-electric);
font-size: 1rem; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); display: flex; align-items: center; gap: 8px;
}
.card-count {
background: rgba(0, 255, 255, 0.15); color: var(--neon-electric);
padding: 4px 12px; border-radius: 18px; font-size: 0.75rem; font-weight: 700;
border: 1px solid rgba(0, 255, 255, 0.4);
}
.card-search { padding: 12px 16px; border-bottom: 1px solid rgba(0, 212, 255, 0.2); }
.card-search input {
width: 100%; padding: 9px 14px; background: var(--bg-deep);
border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 12px;
color: var(--text-primary); font-size: 0.9rem; transition: var(--transition-fast);
font-family: 'Rajdhani', sans-serif;
}
.card-search input:focus { outline: none; border-color: var(--neon-electric); box-shadow: var(--glow-electric); }
.card-body { padding: 12px; overflow-y: auto; max-height: 440px; flex-grow: 1; }

/* === ITEM CARD === */
.item-card {
background: linear-gradient(135deg, rgba(8, 20, 45, 0.7), rgba(12, 28, 58, 0.6));
border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 16px;
padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: var(--transition-bloom);
position: relative; overflow: hidden;
}
.item-card::before {
content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
background: linear-gradient(120deg, transparent, rgba(0, 212, 255, 0.15), transparent);
transition: left 0.7s ease;
}
.item-card:hover::before { left: 100%; }
.item-card:hover {
border-color: var(--neon-electric); box-shadow: var(--glow-electric);
transform: translateY(-4px) scale(1.01);
}
.item-card.copied { animation: flashGreen 0.4s var(--transition-bloom); border-color: var(--neon-green); }
@keyframes flashGreen { 0%, 100% { box-shadow: var(--glow-electric); } 50% { box-shadow: 0 0 25px rgba(0, 255, 157, 0.7); } }
.item-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.item-title {
color: var(--neon-electric); font-weight: 700; font-size: 0.95rem;
font-family: 'Orbitron', sans-serif; flex: 1;
}
.item-label {
font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase;
letter-spacing: 1.5px; font-weight: 600; margin-bottom: 4px;
}
.item-content {
font-size: 0.9rem; color: var(--text-primary); line-height: 1.45;
white-space: pre-wrap; word-break: break-word;
}
.copy-hint {
font-size: 0.75rem; color: var(--neon-blue-light); margin-top: 6px;
display: flex; align-items: center; gap: 4px; opacity: 0.85;
}

/* === HITUNG SECTION === */
.selector-panel {
background: var(--bg-elevated); border: 1px solid rgba(0, 212, 255, 0.25);
border-radius: 20px; padding: 20px; margin: 18px 0; backdrop-filter: blur(20px);
}
.selector-title {
font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-electric);
font-size: 1.05rem; margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
}
.chip-group { margin-bottom: 16px; }
.chip-label {
font-family: 'Orbitron', sans-serif; font-size: 0.82rem; font-weight: 700;
color: var(--neon-electric); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.chip-label::before {
content: ''; width: 3px; height: 18px; background: var(--neon-electric);
border-radius: 2px; box-shadow: 0 0 8px var(--neon-electric);
}
.chips-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
padding: 7px 16px; background: var(--bg-deep);
border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 24px;
color: var(--text-secondary); font-size: 0.85rem; font-weight: 600;
cursor: pointer; transition: var(--transition-bloom);
position: relative; overflow: hidden; font-family: 'Rajdhani', sans-serif;
}
.chip:hover { color: var(--neon-electric); border-color: var(--neon-electric); }
.chip.active {
color: var(--bg-deep); background: linear-gradient(135deg, var(--neon-electric), var(--neon-blue));
border-color: var(--neon-electric); box-shadow: var(--glow-electric); font-weight: 700;
}
.chip.active::after {
content: '✓'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
font-size: 0.75rem; font-weight: 800; animation: checkPop 0.3s var(--transition-bloom);
}
@keyframes checkPop { 0% { transform: translateY(-50%) scale(0); } 70% { transform: translateY(-50%) scale(1.3); } 100% { transform: translateY(-50%) scale(1); } }
.result-display {
margin-top: 18px; padding: 16px 20px;
background: var(--bg-deep); border: 1px solid rgba(0, 212, 255, 0.35);
border-radius: 16px; font-family: 'Orbitron', sans-serif; font-size: 1.15rem;
color: var(--neon-electric); text-align: center; min-height: 56px;
display: flex; align-items: center; justify-content: center;
transition: var(--transition-bloom); cursor: pointer;
}
.result-display:hover { border-color: var(--neon-electric); box-shadow: var(--glow-electric); }
.result-display.copied {
animation: resultFlash 0.4s var(--transition-bloom);
border-color: var(--neon-green); box-shadow: 0 0 22px rgba(0, 255, 157, 0.55);
}
@keyframes resultFlash {
0% { transform: scale(1); }
50% { transform: scale(1.025); background: rgba(0, 255, 157, 0.12); }
100% { transform: scale(1); }
}
.action-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; margin-top: 10px; }
.action-btn {
padding: 11px 24px; background: linear-gradient(135deg, var(--neon-electric), var(--neon-blue));
border: none; border-radius: 16px; color: var(--bg-deep); font-family: 'Orbitron', sans-serif;
font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: var(--transition-bloom);
white-space: nowrap; text-transform: uppercase; letter-spacing: 1.5px;
}
.action-btn:hover { transform: translateY(-4px); box-shadow: var(--glow-electric); }

/* === BET ITEM === */
.bet-item {
display: flex; justify-content: space-between; align-items: center;
padding: 10px 14px; margin-bottom: 7px; background: var(--bg-elevated);
border: 1px solid rgba(0, 212, 255, 0.25); border-radius: 13px;
cursor: pointer; transition: var(--transition-bloom);
}
.bet-item:hover {
border-color: var(--neon-electric); background: rgba(10, 28, 62, 0.8);
box-shadow: var(--glow-electric); transform: translateX(4px);
}
.bet-type { color: var(--text-primary); font-size: 0.9rem; flex: 1; margin-right: 12px; font-weight: 500; }
.bet-value {
font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-electric);
font-size: 0.9rem; background: rgba(0, 255, 255, 0.12);
padding: 4px 11px; border-radius: 11px; border: 1px solid rgba(0, 255, 255, 0.35);
}
.bet-item:hover .bet-value {
background: rgba(0, 255, 255, 0.2); box-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
}

/* === TOAST === */
.toast {
position: fixed; bottom: 26px; right: 26px; background: var(--bg-surface);
border: 1px solid var(--neon-electric); border-radius: 18px; padding: 14px 24px;
display: flex; align-items: center; gap: 12px; transform: translateX(160%);
transition: var(--transition-bloom); z-index: 2000; backdrop-filter: blur(15px);
}
.toast.show { transform: translateX(0); }
.toast-icon { color: var(--neon-green); font-size: 20px; }
.toast-text { font-weight: 600; font-size: 0.9rem; }

/* === LOADING === */
.loading-skeleton {
background: linear-gradient(90deg, rgba(0, 212, 255, 0.08) 25%, rgba(0, 212, 255, 0.15) 50%, rgba(0, 212, 255, 0.08) 75%);
background-size: 200% 100%; animation: skeletonPulse 1.4s ease-in-out infinite;
border-radius: 12px; height: 60px; margin-bottom: 10px;
}
@keyframes skeletonPulse { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.spinner {
width: 30px; height: 30px; border: 3px solid rgba(0, 212, 255, 0.25);
border-top-color: var(--neon-electric); border-radius: 50%;
animation: spin 1s linear infinite; margin: 20px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === REFRESH INDICATOR === */
.refresh-indicator {
position: fixed; top: 65px; right: 20px;
background: var(--bg-surface); border: 1px solid var(--border-glow);
border-radius: 14px; padding: 8px 16px; font-size: 0.8rem;
color: var(--neon-electric); display: none; align-items: center; gap: 8px;
z-index: 100; backdrop-filter: blur(12px); animation: slideIn 0.3s var(--transition-bloom);
}
.refresh-indicator.show { display: flex; }
@keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.refresh-spinner {
width: 16px; height: 16px; border: 2px solid rgba(0, 212, 255, 0.3);
border-top-color: var(--neon-electric); border-radius: 50%;
animation: spin 0.8s linear infinite;
}

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, var(--neon-electric), var(--neon-blue));
border-radius: 6px; border: 2px solid var(--bg-deep);
}

/* === RESPONSIVE === */
@media (max-width: 768px) {
.top-bar { flex-direction: column; gap: 12px; padding: 12px 16px; }
.staff-input { width: 100%; }
.control-panel { grid-template-columns: 1fr; }
.content-grid { grid-template-columns: 1fr; }
.action-row { grid-template-columns: 1fr; }
.action-btn { width: 100%; }
.page-title { font-size: clamp(22px, 6.5vw, 36px); }
}
::selection { background: rgba(0, 212, 255, 0.25); color: var(--text-primary); }
button:focus-visible, input:focus-visible { outline: 2px solid var(--neon-electric); outline-offset: 2px; box-shadow: var(--glow-electric); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body>
<div class="bg-canvas"></div><div class="grid-overlay"></div><div class="noise"></div>
<div class="particles" id="particles"></div>
<div class="lightning-overlay"><div class="lightning-bolt"></div><div class="lightning-bolt"></div><div class="lightning-bolt"></div></div>
<div class="scanline"></div>

<!-- TOP BAR -->
<div class="top-bar">
<div class="staff-input-group">
<span class="staff-label"><i class="fas fa-user"></i> Staff:</span>
<input type="text" id="staffName" class="staff-input" placeholder="Nama Staff" maxlength="20">
</div>
<div class="auto-refresh-badge">
<span class="refresh-dot"></span><span>Auto-Refresh: ON</span>
</div>
</div>

<div class="main-container">
<header class="page-header">
<h1 class="page-title">⚡ PREDIKSI & HITUNG TOGEL ⚡</h1>
</header>

<!-- CONTROL PANEL -->
<div class="control-panel">
<div class="control-card">
<span class="control-label"><i class="fas fa-calendar-alt"></i> Tanggal</span>
<input type="date" id="inputTanggal" class="control-input">
<div class="control-actions">
<button class="btn-neon" id="btnTanggal"><i class="fas fa-bolt"></i> Update</button>
<span class="status-indicator"><span class="status-dot"></span><span id="statusTanggal">Siap</span></span>
</div>
</div>
<div class="control-card">
<span class="control-label"><i class="fas fa-coins"></i> Nominal</span>
<input type="number" id="inputNominal" class="control-input" placeholder="0" step="1000">
<div class="control-actions">
<button class="btn-neon" id="btnNominal"><i class="fas fa-bolt"></i> Update</button>
<span class="status-indicator"><span class="status-dot"></span><span id="statusNominal">Rp 0</span></span>
</div>
</div>
</div>

<!-- TABS -->
<nav class="tabs-container">
<button class="tab-btn active" data-tab="prediksi"><i class="fas fa-crystal-ball"></i> Prediksi</button>
<button class="tab-btn" data-tab="hitung"><i class="fas fa-calculator"></i> Hitung</button>
</nav>

<!-- CONTENT -->
<div id="tabPrediksi" class="tab-content">
<div class="content-grid">
<!-- Prediksi Card -->
<div class="data-card">
<div class="card-header">
<h3 class="card-title"><i class="fas fa-crystal-ball"></i> Prediksi</h3>
<span class="card-count" id="countPrediksi">0</span>
</div>
<div class="card-search"><input type="text" id="searchPrediksi" placeholder="🔍 Cari prediksi..."></div>
<div class="card-body" id="listPrediksi"></div>
</div>
<!-- Jadwal Card -->
<div class="data-card">
<div class="card-header">
<h3 class="card-title"><i class="fas fa-calendar-check"></i> Jadwal</h3>
<span class="card-count" id="countJadwal">0</span>
</div>
<div class="card-search"><input type="text" id="searchJadwal" placeholder="🔍 Cari jadwal..."></div>
<div class="card-body" id="listJadwal"></div>
</div>
<!-- Link Card -->
<div class="data-card">
<div class="card-header">
<h3 class="card-title"><i class="fas fa-link"></i> Link Live</h3>
<span class="card-count" id="countLink">0</span>
</div>
<div class="card-search"><input type="text" id="searchLink" placeholder="🔍 Cari link..."></div>
<div class="card-body" id="listLink"></div>
</div>
</div>
</div>

<div id="tabHitung" class="tab-content" style="display:none;">
<div class="selector-panel">
<h3 class="selector-title"><i class="fas fa-bullseye"></i> Pilih Hitungan</h3>
<div class="chip-group">
<div class="chip-label"><i class="fas fa-layer-group"></i> Tipe</div>
<div class="chips-row" id="chipTipe"><div class="chip active" data-value="">Semua</div></div>
</div>
<div class="chip-group">
<div class="chip-label"><i class="fas fa-tag"></i> Label</div>
<div class="chips-row" id="chipLabel"><div class="chip active" data-value="">Semua</div></div>
</div>
<div class="action-row">
<button class="action-btn" onclick="tampilkanHasil()"><i class="fas fa-magic"></i> Tampilkan</button>
</div>
<div id="resultBox" class="result-display">
<span style="color:var(--text-secondary)">Pilih tipe & label untuk melihat hasil</span>
</div>
</div>
<div class="content-grid" id="containerHitung"></div>
</div>
</div>

<!-- REFRESH INDICATOR -->
<div class="refresh-indicator" id="refreshIndicator">
<span class="refresh-spinner"></span><span>Memperbarui data...</span>
</div>

<!-- TOAST -->
<div id="toast" class="toast"><i class="fas fa-check-circle toast-icon"></i><span class="toast-text" id="toastMsg">Berhasil!</span></div>

<!-- FOOTER -->
<footer style="text-align:center;padding:28px 0 16px;color:var(--text-dim);font-size:0.8rem;border-top:1px solid rgba(0,212,255,0.2);margin-top:40px">
<span>🔐 LINE TOGEL Cyber Core 2026</span> • <span>v3.0 Ultra</span>
</footer>
</div>

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622',
sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810',
keyTanggal: 'togel_tanggal_v4',
keyNominal: 'togel_nominal_v4',
keyStaff: 'togel_staff_v1'
};
const state = { prediksi:[], jadwal:[], link:[], hitung:[], kelompok:{} };
const $ = id => document.getElementById(id);
const dom = {
tabP: $('tabPrediksi'), tabH: $('tabHitung'),
inTgl: $('inputTanggal'), btnTgl: $('btnTanggal'), statTgl: $('statusTanggal'),
inNom: $('inputNominal'), btnNom: $('btnNominal'), statNom: $('statusNominal'),
staff: $('staffName'),
srcP: $('searchPrediksi'), srcJ: $('searchJadwal'), srcL: $('searchLink'),
listP: $('listPrediksi'), listJ: $('listJadwal'), listL: $('listLink'),
cntP: $('countPrediksi'), cntJ: $('countJadwal'), cntL: $('countLink'),
contH: $('containerHitung'), toast: $('toast'), toastMsg: $('toastMsg'),
refresh: $('refreshIndicator'),
chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};

let selectedTipe = '', selectedLabel = '', autoRefreshTimer = null;

// === UTILITIES ===
function createParticles() {
const c = $('particles'); if(!c) return;
for(let i=0;i<45;i++){
const p=document.createElement('div');p.className='particle';
p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*20+'s';
p.style.animationDuration=(15+Math.random()*20)+'s';c.appendChild(p);
}}

function showToast(msg){dom.toastMsg.textContent=msg;dom.toast.classList.add('show');
setTimeout(()=>dom.toast.classList.remove('show'),3000);}

function showRefreshIndicator(show){if(show){dom.refresh.classList.add('show');}else{dom.refresh.classList.remove('show');}}

function formatID(n){return new Intl.NumberFormat('id-ID',{minimumFractionDigits:0}).format(n).replace(/\./g,',');}

function copyText(text,el){let t=text;try{t=decodeURIComponent(text)}catch(e){}
navigator.clipboard.writeText(t).then(()=>{
const preview=t.length>25?t.slice(0,25)+'...':t;
showToast('📋 Disalin: '+preview);
if(el){el.classList.add('copied');setTimeout(()=>el.classList.remove('copied'),450);}
}).catch(()=>showToast('❌ Gagal salin'));}

function parseCSV(txt){let r=[],row=[],ent='',st=0;
for(let i=0;i<txt.length;i++){const c=txt[i],n=txt[i+1];
if(st===0){if(c==='"')st=1;else if(c===','){row.push(ent);ent='';}
else if(c==='\r'&&n==='\n'){row.push(ent);r.push(row);row=[];ent='';i++;}
else if(c==='\n'||c==='\r'){row.push(ent);r.push(row);row=[];ent='';}
else ent+=c;}else if(st===1){if(c==='"'&&n==='"'){ent+='"';i++;}
else if(c==='"')st=0;else ent+=c;}}
if(ent||row.length){row.push(ent);r.push(row);}return r;}

function safeGet(row,idx){return row&&row[idx]!==undefined?row[idx]:"";}

async function updateSheet(action,value){
if(SCRIPT_URL.includes('YOUR_SCRIPT_ID')){showToast('❌ Setup script dulu!');return false;}
try{const p=new URLSearchParams({action,value});const res=await fetch(SCRIPT_URL+'?'+p.toString());
return (await res.text()).includes('SUCCESS');}catch(e){console.error(e);return false;}}

// === DATA FETCHING ===
async function fetchData(){showRefreshIndicator(true);
try{
// Prediksi
const resP=await fetch(CONFIG.sheetPrediksi+'&t='+Date.now());
const dataP=parseCSV(await resP.text());
state.prediksi=[];state.jadwal=[];state.link=[];
if(dataP[0]){const raw=safeGet(dataP[0],1);if(raw){const p=raw.split('/');
if(p.length===3){dom.inTgl.value=`${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
dom.statTgl.textContent=dom.inTgl.value;}}}
for(let i=2;i<=84&&i<dataP.length;i++){const t=safeGet(dataP[i],1);
if(t)state.prediksi.push({title:t.split(/[\s,]+/)[0],content:t});}
for(let i=2;i<=55&&i<dataP.length;i++){const t=safeGet(dataP[i],2);
if(t)state.jadwal.push({title:t.split(/[\s,]+/)[0],content:t});}
for(let i=56;i<=82&&i<dataP.length;i++){const t=safeGet(dataP[i],2);
if(t)state.link.push({title:t.split(/[\s,]+/)[0],content:t});}
renderPrediksi();

// Hitung
const resH=await fetch(CONFIG.sheetHitung+'&t='+Date.now());
const dataH=parseCSV(await resH.text());
if(dataH[0]){const nom=safeGet(dataH[0],23);if(nom){dom.inNom.value=nom;
dom.statNom.textContent='Rp '+formatID(nom);}}
const secDef=[{tR:0,tC:24,s:2,e:42},{tR:43,tC:24,s:45,e:80},{tR:81,tC:24,s:83,e:119},
{tR:120,tC:24,s:122,e:153},{tR:154,tC:24,s:156,e:179},{tR:180,tC:24,s:182,e:213},
{tR:215,tC:24,s:217,e:248},{tR:249,tC:24,s:251,e:282},{tR:283,tC:24,s:285,e:316}];
state.hitung=secDef.map(s=>{let ttl=safeGet(dataH[s.tR],s.tC)||"PASARAN";let items=[];
for(let i=s.s;i<=s.e&&i<dataH.length;i++){if(dataH[i]){const ty=safeGet(dataH[i],23),rs=safeGet(dataH[i],24);
if(ty||rs)items.push({type:ty,res:rs});}}return{title:ttl,items};}).filter(x=>x.items.length>0);
renderHitung();

// Kelompok untuk chip
state.kelompok={};const titles=["SEMUA PASARAN","TOTO MACAU 4D","TOTO MACAU 5D","KINGKONG 4D","BONUS","JAKARTA","TOTOMALI","HOKIDRAW","SYDNEY & HK"];
titles.forEach((ttl,idx)=>{const sec=secDef[idx];const items=[];
for(let i=sec.s;i<=sec.e&&i<dataH.length;i++){if(dataH[i]){const lb=safeGet(dataH[i],23),vl=safeGet(dataH[i],24);
if(lb||vl)items.push({label:lb||"-",value:vl||"-"});}}if(items.length>0)state.kelompok[ttl]=items;});
renderChips(dom.chipTipe,Object.keys(state.kelompok).map(t=>({label:t})),'tipe');

showToast('✅ Data diperbarui!');
}catch(e){console.error("Fetch error:",e);showToast('❌ Gagal muat data');}
finally{showRefreshIndicator(false);}}

// === RENDERING ===
function renderList(container,items,search){
const filtered=items.filter(i=>i.content.toLowerCase().includes(search.toLowerCase()));
if(!filtered.length){container.innerHTML='<p style="color:var(--text-secondary);text-align:center;padding:20px">📭 Tidak ada data</p>';return;}
container.innerHTML=filtered.map(v=>`
<div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}',this)">
<div class="item-meta"><span class="item-title">${v.title}</span></div>
<div class="item-label">💬 Isi (klik untuk copy)</div>
<div class="item-content">${v.content}</div>
<div class="copy-hint"><i class="fas fa-copy"></i> Klik untuk menyalin</div>
</div>`).join('');}

function renderPrediksi(){
renderList(dom.listP,state.prediksi,dom.srcP.value);
renderList(dom.listJ,state.jadwal,dom.srcJ.value);
renderList(dom.listL,state.link,dom.srcL.value);
dom.cntP.textContent=state.prediksi.length;
dom.cntJ.textContent=state.jadwal.length;
dom.cntL.textContent=state.link.length;}

function renderHitung(){
if(!state.hitung.length){dom.contH.innerHTML='<p style="color:var(--text-secondary);text-align:center;padding:30px">📭 Tidak ada data</p>';return;}
dom.contH.innerHTML=state.hitung.map(s=>`
<div class="data-card">
<div class="card-header"><h3 class="card-title">🎯 ${s.title}</h3></div>
<div class="card-body">
${s.items.map(it=>`<div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}',this)">
<span class="bet-type">${it.type}</span><span class="bet-value">${it.res}</span></div>`).join('')}
</div></div>`).join('');}

function renderChips(container,items,type){
container.innerHTML='<div class="chip active" data-value="">Semua</div>'+
items.map(it=>`<div class="chip" data-value="${it.label||it}">${(it.label||it).slice(0,18)}${(it.label||it).length>18?'...':''}</div>`).join('');
container.querySelectorAll('.chip').forEach(chip=>{chip.onclick=()=>{
container.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
chip.classList.add('active');
if(type==='tipe'){selectedTipe=chip.dataset.value;updateLabelChips();}
else{selectedLabel=chip.dataset.value;};};});}

function updateLabelChips(){
if(!selectedTipe||!state.kelompok[selectedTipe]){renderChips(dom.chipLabel,[],'label');return;}
const labels=state.kelompok[selectedTipe].map(i=>i.label);
renderChips(dom.chipLabel,labels.map(l=>({label:l})),'label');}

function tampilkanHasil(){
const r=dom.resultBox;
if(!selectedTipe||!selectedLabel||!state.kelompok[selectedTipe]){
r.innerHTML='<span style="color:var(--text-secondary)">Pilih tipe & label dulu</span>';return;}
const item=state.kelompok[selectedTipe].find(i=>i.label===selectedLabel);
if(item){r.innerHTML=`<span style="font-weight:700">${item.value}</span>`;
r.onclick=()=>copyText(item.value,r);}}

// === AUTO-REFRESH LOGIC ===
function triggerAutoRefresh(){
showRefreshIndicator(true);
clearTimeout(autoRefreshTimer);
autoRefreshTimer=setTimeout(()=>{
fetchData();
showToast('🔄 Auto-refresh!');
},800);}

function setupAutoRefresh(){
dom.inTgl.addEventListener('change',()=>{triggerAutoRefresh();});
dom.inNom.addEventListener('change',()=>{triggerAutoRefresh();});
dom.inTgl.addEventListener('input',()=>{triggerAutoRefresh();});
dom.inNom.addEventListener('input',()=>{triggerAutoRefresh();});}

// === MANUAL UPDATE ===
function manualUpdateTanggal(){
if(!dom.inTgl.value)return showToast("⚠️ Pilih tanggal!");
const p=dom.inTgl.value.split('-');const fmt=`${p[1]}/${p[2]}/${p[0]}`;
dom.btnTgl.disabled=true;dom.statTgl.textContent="⏳";
updateSheet('updateTanggal',fmt).then(ok=>{
dom.btnTgl.disabled=false;
if(ok){localStorage.setItem(CONFIG.keyTanggal,dom.inTgl.value);
dom.statTgl.textContent="✅";showToast("📅 Tersimpan!");fetchData();}
else{dom.statTgl.textContent="❌";showToast("❌ Cek script");}});}

function manualUpdateNominal(){
if(!dom.inNom.value)return showToast("⚠️ Isi nominal!");
dom.btnNom.disabled=true;dom.statNom.textContent="⏳";
updateSheet('updateNominal',dom.inNom.value).then(ok=>{
dom.btnNom.disabled=false;
if(ok){localStorage.setItem(CONFIG.keyNominal,dom.inNom.value);
dom.statNom.textContent="Rp "+formatID(dom.inNom.value);showToast("💰 Tersimpan!");fetchData();}
else{dom.statNom.textContent="❌";showToast("❌ Cek script");}});}

// === STAFF NAME ===
function setupStaff(){
const saved=localStorage.getItem(CONFIG.keyStaff);
if(saved)dom.staff.value=saved;
dom.staff.addEventListener('change',()=>{
localStorage.setItem(CONFIG.keyStaff,dom.staff.value);
showToast('👤 Staff: '+dom.staff.value);});}

// === TABS ===
function setupTabs(){
document.querySelectorAll('.tab-btn').forEach(t=>t.onclick=()=>{
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
t.classList.add('active');
dom.tabP.style.display=t.dataset.tab==='prediksi'?'block':'none';
dom.tabH.style.display=t.dataset.tab==='hitung'?'block':'none';});}

// === SEARCH ===
function setupSearch(){
dom.srcP.oninput=()=>renderList(dom.listP,state.prediksi,dom.srcP.value);
dom.srcJ.oninput=()=>renderList(dom.listJ,state.jadwal,dom.srcJ.value);
dom.srcL.oninput=()=>renderList(dom.listL,state.link,dom.srcL.value);}

// === INIT ===
function init(){
createParticles();setupTabs();setupSearch();setupStaff();setupAutoRefresh();
dom.btnTgl.onclick=manualUpdateTanggal;dom.btnNom.onclick=manualUpdateNominal;
// Load saved values
const savedTgl=localStorage.getItem(CONFIG.keyTanggal);if(savedTgl){dom.inTgl.value=savedTgl;dom.statTgl.textContent=savedTgl;}
const savedNom=localStorage.getItem(CONFIG.keyNominal);if(savedNom){dom.inNom.value=savedNom;dom.statNom.textContent='Rp '+formatID(savedNom);}
// Initial fetch
fetchData();
setTimeout(()=>showToast('🌙 Cyber Core Ready'),800);}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>

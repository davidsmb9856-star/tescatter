<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡ ULTRA</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          cyber: {
            cyan: '#00f5ff',
            blue: '#00a8ff',
            purple: '#7b61ff',
            pink: '#ff00aa',
            green: '#00ff9d',
            dark: '#0a0e17'
          }
        }
      }
    }
  }
</script>
<style>
:root {
  /* === ULTRA DARK BASE === */
  --bg: #030712;
  --bg-deep: #010308;
  --bg-card: rgba(8, 12, 28, 0.88);
  --bg-card-hover: rgba(12, 18, 42, 0.94);
  --bg-glass: rgba(10, 15, 35, 0.72);
  
  /* === CYBER NEON PALETTE === */
  --neon-cyan: #00f5ff;
  --neon-blue: #00d4ff;
  --neon-purple: #8b5cf6;
  --neon-pink: #ff00aa;
  --neon-green: #00ff9d;
  --neon-orange: #ff6b35;
  
  /* === GRADIENTS === */
  --grad-primary: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue), var(--neon-purple));
  --grad-secondary: linear-gradient(135deg, var(--neon-purple), var(--neon-pink), var(--neon-orange));
  --grad-holo: linear-gradient(135deg, rgba(0,245,255,0.3), rgba(123,97,255,0.3), rgba(255,0,170,0.3));
  
  /* === TEXT === */
  --fg: #e2e8f0;
  --fg-bright: #ffffff;
  --fg-muted: #94a3b8;
  --fg-dim: #64748b;
  
  /* === GLOW EFFECTS - ULTRA === */
  --glow-xs: 0 0 6px rgba(0,245,255,0.5), 0 0 14px rgba(0,245,255,0.3);
  --glow-sm: 0 0 12px rgba(0,245,255,0.6), 0 0 28px rgba(0,245,255,0.4), 0 0 48px rgba(123,97,255,0.25);
  --glow-md: 0 0 18px rgba(0,245,255,0.7), 0 0 42px rgba(0,245,255,0.5), 0 0 72px rgba(123,97,255,0.35);
  --glow-lg: 0 0 24px rgba(0,245,255,0.8), 0 0 56px rgba(0,245,255,0.6), 0 0 96px rgba(123,97,255,0.45), 0 0 140px rgba(255,0,170,0.3);
  --glow-text: 0 0 8px var(--neon-cyan), 0 0 20px rgba(0,245,255,0.6), 0 0 42px rgba(123,97,255,0.4);
  --glow-holo: 0 0 10px rgba(0,245,255,0.5), 0 0 24px rgba(123,97,255,0.4), 0 0 48px rgba(255,0,170,0.3), 0 0 72px rgba(0,255,157,0.2);
  
  /* === BORDERS === */
  --border-glow: rgba(0,245,255,0.5);
  --border-soft: rgba(123,97,255,0.3);
  --border-hover: rgba(0,245,255,0.8);
  
  /* === ANIMATIONS === */
  --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-elastic: cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition-fast: 0.15s var(--ease-smooth);
  --transition: 0.28s var(--ease-smooth);
  --transition-bloom: 0.45s var(--ease-elastic);
  --transition-magnetic: 0.12s var(--ease-bounce);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg-deep);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
  cursor: default;
}

/* === CUSTOM CURSOR === */
.cursor-dot, .cursor-ring {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%); transition: transform 0.15s ease-out, opacity 0.2s;
}
.cursor-dot {
  width: 6px; height: 6px; background: var(--neon-cyan);
  box-shadow: 0 0 12px var(--neon-cyan), 0 0 24px rgba(0,245,255,0.6);
}
.cursor-ring {
  width: 36px; height: 36px; border: 2px solid var(--neon-cyan);
  box-shadow: 0 0 16px rgba(0,245,255,0.5);
  transition: width 0.2s, height 0.2s, border-color 0.2s;
}
body.hovering .cursor-ring {
  width: 48px; height: 48px; border-color: var(--neon-pink);
  box-shadow: 0 0 24px rgba(255,0,170,0.7);
}

/* === HOLOGRAPHIC BACKGROUND === */
.bg-holo {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(ellipse at 15% 25%, rgba(0,245,255,0.15) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 20%, rgba(123,97,255,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 85%, rgba(255,0,170,0.1) 0%, transparent 55%),
    radial-gradient(ellipse at 20% 75%, rgba(0,255,157,0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 70%, rgba(255,107,53,0.06) 0%, transparent 55%),
    linear-gradient(135deg, var(--bg-deep) 0%, #0a0f22 35%, #0d142a 65%, var(--bg-deep) 100%);
  animation: holoShift 90s ease-in-out infinite;
}
@keyframes holoShift {
  0%, 100% { filter: hue-rotate(0deg) brightness(1) saturate(1); }
  25% { filter: hue-rotate(12deg) brightness(1.04) saturate(1.08); }
  50% { filter: hue-rotate(-8deg) brightness(0.97) saturate(1.12); }
  75% { filter: hue-rotate(6deg) brightness(1.02) saturate(1.05); }
}

/* === CYBER GRID === */
.cyber-grid {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px),
    linear-gradient(rgba(123,97,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(123,97,255,0.02) 1px, transparent 1px);
  background-size: 50px 50px, 50px 50px, 25px 25px, 25px 25px;
  animation: gridFlow 60s linear infinite;
  opacity: 0.8;
  mask-image: radial-gradient(ellipse at center, black 35%, transparent 80%);
}
@keyframes gridFlow { 
  0% { background-position: 0 0, 0 0, 0 0, 0 0; } 
  100% { background-position: 100px 100px, 100px 100px, 50px 50px, 50px 50px; } 
}

/* === FLOATING ORBS - HOLOGRAPHIC === */
.orb {
  position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.14;
  animation: orbFloat 65s ease-in-out infinite alternate; z-index: -1;
  mix-blend-mode: screen;
}
.orb-1 { 
  width: 920px; height: 920px; 
  background: conic-gradient(from 0deg, var(--neon-cyan), var(--neon-blue), var(--neon-purple), var(--neon-cyan));
  top: -40%; left: -25%; animation-delay: 0s;
}
.orb-2 { 
  width: 680px; height: 680px; 
  background: conic-gradient(from 180deg, var(--neon-purple), var(--neon-pink), var(--neon-orange), var(--neon-purple));
  bottom: -35%; right: -22%; animation-delay: -32s;
}
.orb-3 {
  width: 540px; height: 540px;
  background: conic-gradient(from 90deg, var(--neon-green), var(--neon-cyan), var(--neon-blue), var(--neon-green));
  top: 50%; left: 60%; animation: orbFloat2 52s ease-in-out infinite alternate; animation-delay: -18s;
}
@keyframes orbFloat {
  0% { transform: translate(0,0) scale(1) rotate(0deg); opacity: 0.14; }
  33% { transform: translate(42px,-32px) scale(1.12) rotate(120deg); opacity: 0.22; }
  66% { transform: translate(-28px,38px) scale(0.94) rotate(240deg); opacity: 0.18; }
  100% { transform: translate(18px,-14px) scale(1.04) rotate(360deg); opacity: 0.16; }
}
@keyframes orbFloat2 {
  0% { transform: translate(0,0) scale(1) rotate(0deg); opacity: 0.12; }
  50% { transform: translate(-36px,28px) scale(1.08) rotate(180deg); opacity: 0.2; }
  100% { transform: translate(24px,-22px) scale(0.96) rotate(360deg); opacity: 0.14; }
}

/* === PARTICLE SYSTEM - ADVANCED === */
.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; border-radius: 50%; opacity: 0;
  animation: particleFloat 40s infinite ease-in-out;
  box-shadow: 0 0 10px currentColor, 0 0 28px currentColor, 0 0 56px currentColor;
}
.particle::before {
  content: ''; position: absolute; inset: -2px; border-radius: 50%;
  background: radial-gradient(circle, currentColor 0%, transparent 70%);
  opacity: 0.6;
}
.particle.cyan { width: 3px; height: 3px; color: var(--neon-cyan); animation-delay: -8s; }
.particle.blue { width: 2px; height: 2px; color: var(--neon-blue); animation-delay: -18s; }
.particle.purple { width: 4px; height: 4px; color: var(--neon-purple); animation-delay: -28s; }
.particle.pink { width: 2px; height: 2px; color: var(--neon-pink); animation-delay: -12s; }
.particle.green { width: 3px; height: 3px; color: var(--neon-green); animation-delay: -22s; }
@keyframes particleFloat {
  0%, 100% { transform: translateY(120vh) rotate(0deg) scale(0.6); opacity: 0; }
  8% { opacity: 0.95; }
  92% { opacity: 0.95; }
  100% { transform: translateY(-25vh) rotate(1080deg) scale(1.4); opacity: 0; }
}

/* === SCANLINE EFFECT === */
.scanlines::after {
  content: ''; position: fixed; inset: 0; z-index: 1000; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 2px, transparent 4px);
  animation: scanMove 0.15s linear infinite;
  opacity: 0.06;
}
@keyframes scanMove { 
  0% { background-position: 0 0; } 
  100% { background-position: 0 4px; } 
}

/* === CONTAINER === */
.main-container { 
  position: relative; z-index: 10; 
  max-width: 1480px; margin: 0 auto; padding: 20px; 
}

/* === HEADER - GLITCH TITLE === */
.header-section { 
  text-align: center; padding: 32px 0 24px; 
  animation: fadeInUp 0.8s var(--transition-bloom) backwards; 
}
@keyframes fadeInUp { 
  from { opacity: 0; transform: translateY(28px); } 
  to { opacity: 1; transform: translateY(0); } 
}

.main-title {
  font-family: 'Orbitron', sans-serif; 
  font-size: clamp(2rem, 7vw, 3.6rem);
  font-weight: 900; letter-spacing: 4px;
  background: var(--grad-primary);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--glow-text); 
  animation: titleGlitch 4s ease-in-out infinite, titleShimmer 3s ease-in-out infinite;
  position: relative; display: inline-block;
  line-height: 1.15;
}
@keyframes titleGlitch {
  0%, 90%, 100% { text-shadow: var(--glow-text); transform: translate(0); }
  91% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-cyan); transform: translate(-2px, 1px); }
  92% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); transform: translate(2px, -1px); }
  93% { text-shadow: var(--glow-text); transform: translate(0); }
}
@keyframes titleShimmer {
  0%, 100% { filter: brightness(1) saturate(1); }
  50% { filter: brightness(1.35) saturate(1.2); }
}
.main-title::before, .main-title::after {
  content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%;
  clip-path: inset(0 0 50% 0); opacity: 0.7;
}
.main-title::before {
  color: var(--neon-pink); animation: glitchTop 2.8s infinite linear alternate-reverse;
  text-shadow: -3px 0 var(--neon-pink);
}
.main-title::after {
  color: var(--neon-cyan); animation: glitchBottom 3.2s infinite linear alternate-reverse;
  text-shadow: 3px 0 var(--neon-cyan); clip-path: inset(50% 0 0 0);
}
@keyframes glitchTop {
  0%, 100% { transform: translate(0); }
  20% { transform: translate(-2px, -1px); }
  40% { transform: translate(2px, 1px); }
  60% { transform: translate(-1px, 2px); }
  80% { transform: translate(1px, -2px); }
}
@keyframes glitchBottom {
  0%, 100% { transform: translate(0); }
  25% { transform: translate(2px, 1px); }
  45% { transform: translate(-2px, -1px); }
  65% { transform: translate(1px, -2px); }
  85% { transform: translate(-1px, 2px); }
}
.main-title::after {
  content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
  width: 90%; height: 3px; 
  background: var(--grad-primary);
  animation: lineGlow 2.4s ease-in-out infinite; 
  border-radius: 3px;
  box-shadow: var(--glow-md);
}
@keyframes lineGlow { 
  0%, 100% { opacity: 0.8; filter: blur(0); } 
  50% { opacity: 1; filter: blur(1px); } 
}

/* === TABS - HOLOGRAPHIC CHIPS === */
.tabs-container {
  display: flex; justify-content: center; gap: 8px; margin: 16px 0 24px;
  background: var(--bg-glass); 
  border: 1px solid var(--border-soft);
  border-radius: 22px; padding: 6px; max-width: fit-content; margin-inline: auto;
  backdrop-filter: blur(28px);
  box-shadow: var(--glow-sm), inset 0 1px 0 rgba(255,255,255,0.1);
  position: relative;
}
.tabs-container::before {
  content: ''; position: absolute; inset: -1px; border-radius: 23px; padding: 1px;
  background: var(--grad-holo); -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0.6; animation: borderFlow 4s linear infinite;
}
@keyframes borderFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

.tab-chip {
  padding: 14px 32px; 
  font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.92rem;
  color: var(--fg-muted); background: transparent; border: none; border-radius: 18px;
  cursor: pointer; transition: all var(--transition); position: relative;
  text-transform: uppercase; letter-spacing: 1.4px; overflow: hidden;
  z-index: 1;
}
.tab-chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 18px;
  background: var(--grad-holo); opacity: 0; transition: opacity var(--transition);
}
.tab-chip::after {
  content: ''; position: absolute; inset: 2px; border-radius: 16px;
  background: linear-gradient(135deg, rgba(10,15,35,0.9), rgba(15,22,48,0.9));
  z-index: -1;
}
.tab-chip:hover { color: var(--neon-cyan); transform: translateY(-2px); }
.tab-chip:hover::before { opacity: 0.35; }
.tab-chip.active {
  color: var(--fg-bright); 
  background: transparent;
  border: 1px solid var(--border-hover); 
  box-shadow: var(--glow-md);
  text-shadow: 0 0 10px var(--neon-cyan);
}
.tab-chip.active::before { opacity: 0.55; animation: chipPulse 2.2s ease-in-out infinite; }
@keyframes chipPulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 0.75; } }
.tab-chip.active::after {
  background: linear-gradient(135deg, rgba(0,245,255,0.18), rgba(123,97,255,0.14), rgba(255,0,170,0.1));
}

/* === CONTENT BOX - ULTRA GLASS === */
.content-box {
  background: var(--bg-card); 
  border: 1px solid var(--border-soft);
  border-radius: 28px; padding: 28px; 
  backdrop-filter: blur(32px);
  position: relative; overflow: hidden;
  box-shadow: var(--glow-md), inset 0 1px 0 rgba(255,255,255,0.08);
  animation: cardEnter 0.6s var(--transition-bloom) backwards;
}
@keyframes cardEnter {
  from { opacity: 0; transform: translateY(24px) scale(0.985); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.content-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--grad-primary);
  animation: scanGlow 3.5s linear infinite; opacity: 0.92;
  box-shadow: 0 0 16px var(--neon-cyan);
}
@keyframes scanGlow { 
  0% { background-position: -200% 0; } 
  100% { background-position: 200% 0; } 
}
.content-box::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 10%, rgba(0,245,255,0.06) 0%, transparent 65%),
              radial-gradient(ellipse at 80% 90%, rgba(123,97,255,0.05) 0%, transparent 65%);
  pointer-events: none;
}

/* === SETTINGS PANEL === */
.settings-panel {
  background: linear-gradient(135deg, rgba(10,16,42,0.82), rgba(15,24,58,0.74));
  border: 1px solid var(--border-soft); 
  border-radius: 24px;
  padding: 16px 20px; margin-bottom: 26px; 
  display: flex; flex-wrap: nowrap; gap: 16px; align-items: center;
  backdrop-filter: blur(20px);
  box-shadow: var(--glow-sm);
  transition: all var(--transition);
}
.settings-panel:hover { border-color: var(--border-hover); box-shadow: var(--glow-md); }
.setting-item { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
.setting-label {
  color: var(--neon-cyan); font-size: 0.86rem; font-weight: 600;
  text-shadow: 0 0 10px rgba(0,245,255,0.6);
  display: flex; align-items: center; gap: 5px;
}
.input-neon {
  padding: 12px 16px; 
  background: rgba(6,12,36,0.86);
  border: 1px solid rgba(0,245,255,0.38); 
  border-radius: 14px;
  color: var(--fg-bright); font-size: 0.94rem; width: 175px; 
  transition: all var(--transition);
  font-family: 'Rajdhani', sans-serif;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
}
.input-neon::placeholder { color: var(--fg-muted); opacity: 0.8; }
.input-neon:focus {
  outline: none; border-color: var(--neon-cyan); 
  box-shadow: var(--glow-md), inset 0 0 0 1px rgba(0,245,255,0.35);
  background: rgba(10,18,48,0.94); transform: translateY(-1px);
}

/* === BUTTONS - MAGNETIC NEON === */
.btn-neon {
  padding: 12px 26px; 
  background: var(--grad-primary);
  border: none; border-radius: 16px; 
  color: #020617; 
  font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.88rem; 
  cursor: pointer; transition: all var(--transition-magnetic);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1.3px; 
  position: relative; overflow: hidden;
  box-shadow: var(--glow-md);
  text-shadow: 0 1px 0 rgba(255,255,255,0.35);
}
.btn-neon::before {
  content: ''; position: absolute; inset: 0; border-radius: 16px; padding: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity 0.18s;
}
.btn-neon::after {
  content: ''; position: absolute; inset: 0; border-radius: 16px;
  background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent 55%);
  opacity: 0; transition: opacity var(--transition);
}
.btn-neon:hover::before { opacity: 1; }
.btn-neon:hover::after { opacity: 1; }
.btn-neon:hover { 
  transform: translateY(-3px) scale(1.04); 
  box-shadow: var(--glow-lg);
  filter: brightness(1.08);
}
.btn-neon:active { transform: translateY(0) scale(0.97); transition-duration: 0.06s; }
.btn-neon:disabled { opacity: 0.48; cursor: not-allowed; transform: none; box-shadow: none; filter: grayscale(0.4); }

.status-badge {
  font-size: 0.86rem; color: var(--neon-green); margin-left: 10px; font-weight: 600;
  text-shadow: 0 0 12px rgba(0,255,157,0.7); 
  animation: pulseGlow 2.4s ease-in-out infinite;
  display: inline-flex; align-items: center; gap: 5px;
}
@keyframes pulseGlow { 
  0%, 100% { opacity: 1; text-shadow: 0 0 12px rgba(0,255,157,0.7); } 
  50% { opacity: 0.82; text-shadow: 0 0 20px rgba(0,255,157,0.95); } 
}

/* === DATA GRID === */
.data-grid { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); 
  gap: 22px; 
}

/* === SECTION BOX === */
.section-box {
  background: linear-gradient(145deg, rgba(10,16,46,0.86), rgba(16,24,62,0.78));
  border: 1px solid var(--border-soft); 
  border-radius: 24px;
  overflow: hidden; display: flex; flex-direction: column; 
  transition: all var(--transition);
  backdrop-filter: blur(16px);
  box-shadow: var(--glow-sm);
}
.section-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-md); transform: translateY(-3px); }
.section-header {
  background: linear-gradient(90deg, rgba(0,245,255,0.14), transparent 78%);
  padding: 14px 18px; 
  border-bottom: 1px solid var(--border-soft);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title {
  font-family: 'Orbitron', sans-serif; font-weight: 600; 
  color: var(--neon-cyan);
  font-size: 0.96rem; 
  text-shadow: 0 0 12px rgba(0,245,255,0.6);
  display: flex; align-items: center; gap: 7px;
}
.badge-count {
  background: rgba(0,245,255,0.22); 
  color: var(--neon-cyan);
  padding: 4px 12px; border-radius: 20px; 
  font-size: 0.74rem; font-weight: 700;
  border: 1px solid rgba(0,245,255,0.48);
  box-shadow: 0 0 10px rgba(0,245,255,0.35);
  animation: badgePulse 2.8s ease-in-out infinite;
}
@keyframes badgePulse {
  0%, 100% { box-shadow: 0 0 10px rgba(0,245,255,0.35); }
  50% { box-shadow: 0 0 18px rgba(0,245,255,0.65); }
}

.search-box { padding: 12px 18px; border-bottom: 1px solid var(--border-soft); }
.search-input {
  width: 100%; padding: 11px 15px; 
  background: rgba(8,15,44,0.78);
  border: 1px solid rgba(0,245,255,0.35); 
  border-radius: 14px;
  color: var(--fg-bright); font-size: 0.9rem; 
  transition: all var(--transition);
  font-family: 'Rajdhani', sans-serif;
}
.search-input:focus { outline: none; border-color: var(--neon-cyan); box-shadow: var(--glow-md); background: rgba(12,20,54,0.92); }
.search-input::placeholder { color: var(--fg-muted); opacity: 0.8; }
.section-content { padding: 12px; overflow-y: auto; max-height: 420px; flex-grow: 1; }

/* === ITEM CARD - HOLOGRAPHIC === */
.item-card {
  background: linear-gradient(135deg, rgba(12,18,48,0.82), rgba(18,26,62,0.74));
  border: 1px solid var(--border-soft); 
  border-radius: 18px;
  padding: 16px 18px; margin-bottom: 10px; 
  cursor: pointer; transition: all var(--transition);
  position: relative; overflow: hidden;
  backdrop-filter: blur(10px);
}
.item-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 18px; padding: 1px;
  background: var(--grad-holo);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--transition);
}
.item-card::after {
  content: ''; position: absolute; inset: 0; border-radius: 18px;
  background: radial-gradient(circle at 25% 25%, rgba(0,245,255,0.14), transparent 65%);
  opacity: 0; transition: opacity var(--transition);
}
.item-card:hover::before { opacity: 1; }
.item-card:hover::after { opacity: 1; }
.item-card:hover {
  border-color: var(--border-hover); 
  box-shadow: var(--glow-md);
  background: linear-gradient(135deg, rgba(16,24,58,0.92), rgba(22,32,74,0.84));
  transform: translateY(-3px) scale(1.015);
}
.item-card:active { transform: translateY(0) scale(0.99); transition-duration: 0.06s; }

.item-label { 
  font-size: 0.72rem; color: var(--fg-muted); 
  text-transform: uppercase; letter-spacing: 2px; 
  margin-bottom: 5px; font-weight: 600;
  display: flex; align-items: center; gap: 5px;
}
.item-title { 
  color: var(--neon-cyan); font-weight: 600; 
  margin-bottom: 5px; font-size: 0.96rem;
  text-shadow: 0 0 8px rgba(0,245,255,0.45);
  line-height: 1.35;
}
.item-content { 
  font-size: 0.88rem; color: var(--fg); 
  line-height: 1.55; white-space: pre-wrap; word-break: break-word; 
  padding-left: 3px;
}

/* === PASARAN BOX === */
.pasaran-box {
  background: linear-gradient(135deg, rgba(11,17,50,0.86), rgba(17,26,66,0.78));
  border: 1px solid var(--border-soft); 
  border-radius: 20px;
  overflow: hidden; margin-bottom: 12px; 
  transition: all var(--transition);
  backdrop-filter: blur(12px);
}
.pasaran-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-md); transform: translateX(4px); }
.pasaran-header {
  background: linear-gradient(90deg, rgba(0,245,255,0.16), transparent 78%);
  padding: 13px 18px; 
  border-bottom: 1px solid var(--border-soft);
}
.pasaran-title {
  font-family: 'Orbitron', sans-serif; font-weight: 600; 
  color: var(--neon-cyan);
  font-size: 0.92rem; 
  text-shadow: 0 0 11px rgba(0,245,255,0.55);
  display: flex; align-items: center; gap: 6px;
}
.pasaran-content { padding: 8px 14px; max-height: 350px; overflow-y: auto; }

.bet-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 15px; margin-bottom: 7px; 
  background: rgba(12,19,52,0.72);
  border: 1px solid var(--border-soft); 
  border-radius: 14px;
  cursor: pointer; transition: all var(--transition);
}
.bet-item:hover {
  border-color: var(--border-hover); 
  background: rgba(18,27,64,0.86);
  box-shadow: var(--glow-sm); 
  transform: translateX(4px);
}
.bet-type { 
  color: var(--fg); font-size: 0.88rem; 
  flex: 1; margin-right: 12px; font-weight: 500; 
  line-height: 1.45;
}
.bet-result {
  font-family: 'Orbitron', sans-serif; font-weight: 600; 
  color: var(--neon-cyan);
  font-size: 0.88rem; 
  background: rgba(0,245,255,0.16);
  padding: 4px 11px; border-radius: 12px; 
  border: 1px solid rgba(0,245,255,0.36);
  box-shadow: 0 0 10px rgba(0,245,255,0.28);
  transition: all var(--transition);
  min-width: 68px; text-align: center;
}
.bet-item:hover .bet-result {
  background: rgba(0,245,255,0.28); 
  box-shadow: 0 0 18px rgba(0,245,255,0.52);
  transform: scale(1.05);
}

/* === NEON SELECTOR === */
.neon-selector {
  background: linear-gradient(135deg, rgba(12,19,54,0.88), rgba(18,28,68,0.8));
  border: 1px solid var(--border-soft); 
  border-radius: 24px;
  padding: 22px; margin: 22px 0; 
  backdrop-filter: blur(18px);
  box-shadow: var(--glow-sm);
}
.selector-header {
  display: flex; align-items: center; gap: 14px; 
  margin-bottom: 18px;
  padding-bottom: 16px; 
  border-bottom: 1px solid var(--border-soft);
}
.selector-icon { 
  font-size: 1.6rem; 
  animation: iconFloat 4.2s ease-in-out infinite; 
  filter: drop-shadow(0 0 10px var(--neon-cyan));
}
@keyframes iconFloat { 
  0%, 100% { transform: translateY(0) rotate(0deg); } 
  50% { transform: translateY(-5px) rotate(3deg); } 
}
.selector-title {
  font-family: 'Orbitron', sans-serif; font-weight: 600; 
  color: var(--neon-cyan);
  font-size: 1.12rem; 
  text-shadow: 0 0 12px rgba(0,245,255,0.6);
}

/* === CHIP GROUP === */
.chip-group { margin-bottom: 16px; }
.chip-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.84rem; font-weight: 600;
  color: var(--neon-cyan); margin-bottom: 8px; 
  display: flex; align-items: center; gap: 7px;
  text-shadow: 0 0 8px rgba(0,245,255,0.5);
}
.chip-label::before {
  content: ''; width: 3px; height: 16px; 
  background: var(--grad-primary);
  border-radius: 2px; 
  box-shadow: 0 0 10px var(--neon-cyan);
}
.chips-row { display: flex; flex-wrap: wrap; gap: 8px; }

.chip {
  padding: 8px 18px; 
  background: rgba(12,18,50,0.86);
  border: 1px solid rgba(0,245,255,0.32); 
  border-radius: 26px;
  color: var(--fg-muted); font-size: 0.86rem; font-weight: 500;
  cursor: pointer; transition: all var(--transition);
  position: relative; overflow: hidden;
}
.chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 26px;
  background: var(--grad-holo); opacity: 0; transition: opacity var(--transition);
}
.chip:hover { color: var(--neon-cyan); border-color: rgba(0,245,255,0.58); transform: translateY(-2px); }
.chip:hover::before { opacity: 1; }
.chip.active {
  color: #020617; 
  background: var(--grad-primary);
  border-color: var(--neon-cyan); 
  box-shadow: var(--glow-md); 
  font-weight: 700;
  text-shadow: 0 1px 0 rgba(255,255,255,0.3);
}
.chip.active::after {
  content: '✓'; position: absolute; right: 11px; top: 50%; 
  transform: translateY(-50%);
  font-size: 0.78rem; font-weight: 800; 
  animation: checkPop 0.35s var(--transition-bloom);
  text-shadow: 0 0 5px rgba(2,6,23,0.5);
}
@keyframes checkPop { 
  0% { transform: translateY(-50%) scale(0) rotate(-180deg); } 
  60% { transform: translateY(-50%) scale(1.4) rotate(12deg); } 
  100% { transform: translateY(-50%) scale(1) rotate(0deg); } 
}

/* === RESULT BOX - HOLOGRAPHIC === */
.result-box {
  margin-top: 18px; padding: 18px 24px;
  background: rgba(14,22,58,0.92); 
  border: 1px solid rgba(0,245,255,0.42);
  border-radius: 18px; 
  font-family: 'Orbitron', sans-serif; font-size: 1.15rem;
  color: var(--neon-cyan); text-align: center; 
  min-height: 58px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); cursor: pointer;
  box-shadow: var(--glow-sm);
  position: relative; overflow: hidden;
}
.result-box::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at center, rgba(0,245,255,0.1), transparent 75%);
  opacity: 0; transition: opacity var(--transition);
}
.result-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-md); transform: translateY(-2px); }
.result-box:hover::before { opacity: 1; }
.result-box.copied {
  animation: copiedFlash 0.42s var(--transition-bloom);
  border-color: var(--neon-green); 
  box-shadow: 0 0 24px rgba(0,255,157,0.6), var(--glow-md);
  background: rgba(0,255,157,0.14);
}
@keyframes copiedFlash {
  0% { transform: scale(1); }
  50% { transform: scale(1.04); }
  100% { transform: scale(1); }
}

/* === HITUNG ROW === */
.hitung-row { 
  display: grid; 
  grid-template-columns: 1fr auto; 
  gap: 16px; align-items: end; 
  margin-top: 4px; 
}
.hitung-btn {
  padding: 14px 30px; 
  background: var(--grad-primary);
  border: none; border-radius: 16px; 
  color: #020617; 
  font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.9rem; 
  cursor: pointer; transition: all var(--transition-magnetic);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1.4px;
  box-shadow: var(--glow-md);
  text-shadow: 0 1px 0 rgba(255,255,255,0.35);
}
.hitung-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: var(--glow-lg); filter: brightness(1.1); }
.hitung-btn:active { transform: translateY(0) scale(0.97); transition-duration: 0.06s; }

/* === TOAST - HOLOGRAPHIC === */
.toast {
  position: fixed; bottom: 32px; left: 50%; 
  transform: translateX(-50%) translateY(140px) scale(0.9);
  background: linear-gradient(135deg, rgba(10,16,44,0.98), rgba(16,24,62,0.96));
  color: var(--neon-cyan); 
  padding: 15px 34px; border-radius: 56px;
  font-weight: 600; font-size: 0.94rem; 
  opacity: 0; transition: all var(--transition-bloom);
  z-index: 1000; 
  border: 1px solid var(--neon-cyan); 
  backdrop-filter: blur(20px);
  text-shadow: 0 0 12px rgba(0,245,255,0.7); 
  box-shadow: var(--glow-lg), 0 12px 48px rgba(0,0,0,0.5);
  display: flex; align-items: center; gap: 10px;
}
.toast::before { content: '⚡'; font-size: 1.2rem; animation: spark 1.4s ease-in-out infinite; }
@keyframes spark {
  0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; filter: drop-shadow(0 0 8px var(--neon-cyan)); }
  50% { transform: scale(1.25) rotate(180deg); opacity: 0.9; filter: drop-shadow(0 0 16px var(--neon-pink)); }
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); animation: toastBounce 0.45s var(--transition-bloom); }
@keyframes toastBounce {
  0% { transform: translateX(-50%) translateY(0) scale(0.88); }
  50% { transform: translateX(-50%) translateY(-10px) scale(1.04); }
  100% { transform: translateX(-50%) translateY(0) scale(1); }
}

/* === SPINNER - CYBER === */
.spinner {
  width: 36px; height: 36px; 
  border: 3px solid rgba(0,245,255,0.2);
  border-top-color: var(--neon-cyan); 
  border-radius: 50%;
  animation: spin 0.85s linear infinite;
  box-shadow: 0 0 14px rgba(0,245,255,0.45);
}
.spinner::before {
  content: ''; position: absolute; inset: -4px; border-radius: 50%;
  border: 2px solid transparent; border-top-color: var(--neon-purple);
  animation: spin 1.2s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === SCROLLBAR - CYBER === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: rgba(6,11,34,0.7); border-radius: 4px; }
::-webkit-scrollbar-thumb {
  background: var(--grad-primary);
  border-radius: 4px; 
  border: 1px solid rgba(0,245,255,0.32);
  box-shadow: inset 0 0 8px rgba(0,0,0,0.4);
}
::-webkit-scrollbar-thumb:hover {
  background: var(--grad-secondary);
  box-shadow: 0 0 14px var(--neon-cyan);
}

/* === AUTO-UPDATE === */
.auto-update-indicator {
  position: fixed; top: 22px; right: 22px;
  background: rgba(0,245,255,0.16); 
  border: 1px solid var(--border-soft);
  border-radius: 14px; padding: 8px 16px; 
  font-size: 0.78rem;
  color: var(--neon-cyan); 
  display: none; align-items: center; gap: 8px;
  z-index: 1000; 
  backdrop-filter: blur(14px); 
  animation: pulse 1.6s infinite;
  box-shadow: var(--glow-sm);
  font-weight: 600;
}
.auto-update-indicator.show { display: flex; }
@keyframes pulse { 0%, 100% { opacity: 0.76; box-shadow: var(--glow-sm); } 50% { opacity: 1; box-shadow: var(--glow-md); } }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .settings-panel { flex-direction: column; align-items: stretch; }
  .setting-item { width: 100%; justify-content: space-between; }
  .input-neon { width: 100%; }
  .data-grid { grid-template-columns: 1fr; }
  .main-title { font-size: clamp(1.8rem, 8vw, 3rem); letter-spacing: 3px; }
  .tab-chip { padding: 12px 24px; font-size: 0.86rem; }
  .hitung-row { grid-template-columns: 1fr; gap: 14px; }
  .hitung-btn { width: 100%; }
  .chips-row { justify-content: center; }
  .content-box { padding: 22px; }
  .neon-selector { padding: 18px; }
}

/* === UTILITIES === */
::selection { background: rgba(0,245,255,0.36); color: var(--fg-bright); text-shadow: 0 0 10px var(--neon-cyan); }
button:focus-visible, input:focus-visible { outline: 2px solid var(--neon-cyan); outline-offset: 4px; box-shadow: var(--glow-md); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; animation-iteration-count: 1 !important; } }

@keyframes bloomingZoom {
  0% { transform: scale(0.94); opacity: 0.65; filter: blur(3px); }
  50% { transform: scale(1.03); opacity: 1; filter: blur(0); }
  100% { transform: scale(1); opacity: 1; filter: blur(0); }
}
.bloom-enter { animation: bloomingZoom 0.5s var(--transition-bloom) forwards; }

.text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.text-center { text-align: center; }
.font-mono { font-family: 'Orbitron', monospace; }

/* === HOVER EFFECTS === */
[data-hover-glow]:hover { filter: drop-shadow(0 0 12px var(--neon-cyan)); }
[data-hover-scale]:hover { transform: scale(1.03); }
</style>

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'),
  autoUpdate: $('autoUpdateIndicator'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};

let selectedTipe = '', selectedLabel = '';

// === CUSTOM CURSOR ===
const cursorDot = document.querySelector('.cursor-dot');
const cursorRing = document.querySelector('.cursor-ring');
document.addEventListener('mousemove', (e) => {
  cursorDot.style.left = e.clientX + 'px';
  cursorDot.style.top = e.clientY + 'px';
  cursorRing.style.left = e.clientX + 'px';
  cursorRing.style.top = e.clientY + 'px';
});
document.querySelectorAll('a, button, .item-card, .bet-item, .chip, [onclick]').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
});

// === PARTICLE SYSTEM ===
function createParticles() {
  const container = $('particles');
  if (!container) return;
  const types = ['cyan', 'blue', 'purple', 'pink', 'green'];
  for(let i = 0; i < 62; i++) {
    const p = document.createElement('div');
    p.className = `particle ${types[Math.floor(Math.random() * types.length)]}`;
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 40 + 's';
    p.style.animationDuration = (32 + Math.random() * 22) + 's';
    container.appendChild(p);
  }
}

// === TOAST ===
function showToast(msg) {
  dom.toast.innerHTML = `<span>${msg}</span>`;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 3000);
}

function showAutoUpdate() {
  if (dom.autoUpdate) {
    dom.autoUpdate.classList.add('show');
    setTimeout(() => dom.autoUpdate.classList.remove('show'), 2000);
  }
}

// === COPY FUNCTION ===
function copyText(text, element) {
  let finalText = text;
  try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 26 ? finalText.substring(0, 26) + '...' : finalText;
    showToast('📋 Disalin: ' + preview);
    if (element) {
      element.classList.add('copied');
      setTimeout(() => element.classList.remove('copied'), 450);
    }
  }).catch(() => showToast('❌ Gagal salin'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

// === CSV PARSER ===
function parseCSV(text) {
  let p = [], row = [], entry = "", st = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(entry); entry = ""; }
      else if (c === '\r' && n === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { entry += '"'; i++; }
      else if (c === '"') st = 0;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); p.push(row); }
  return p;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

// === GOOGLE SHEETS UPDATE ===
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error("Fetch Error:", e); return false; }
}

// === FETCH FUNCTIONS ===
async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = dom.inTgl.value;
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    renderPrediksi();
  } catch(e) {
    console.error("Error Prediksi:", e);
    dom.listP.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:28px;">❌ Gagal memuat data</p>';
  }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 }, { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 }, { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 }, { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 }, { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    state.hitung = secDef.map(s => {
      let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
      let items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), res = safeGet(data[i], 24);
          if (type || res) items.push({ type, res });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) {
    console.error("Error Hitung:", e);
    dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:28px;">❌ Gagal memuat data</p>';
  }
}

// === RENDER ===
function renderList(container, items, search) {
  const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!filtered.length) { 
    container.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:28px;">📭 Tidak ada data ditemukan</p>'; 
    return; 
  }
  container.innerHTML = filtered.map(v => `
    <div class="item-card bloom-enter" onclick="copyText('${encodeURIComponent(v.content)}', this)">
      <div class="item-label">📋 Judul</div>
      <div class="item-title">${v.title}</div>
      <div class="item-label">💬 Isi (Klik untuk Copy)</div>
      <div class="item-content">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) { 
    dom.contH.innerHTML = '<p style="color:var(--fg-muted);text-align:center;padding:28px;">📭 Tidak ada data</p>'; 
    return; 
  }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-box bloom-enter">
      <div class="pasaran-header"><h3 class="pasaran-title">🎯 ${s.title}</h3></div>
      <div class="pasaran-content">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}', this)">
            <span class="bet-type">${it.type}</span>
            <span class="bet-result">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// === CHIP SELECTOR ===
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + 
    items.map(it => `<div class="chip" data-value="${it.label || it}">${(it.label || it).substring(0, 24)}${(it.label || it).length > 24 ? '...' : ''}</div>`).join('');
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (type === 'tipe') { selectedTipe = chip.dataset.value; updateLabelChips(); }
      else { selectedLabel = chip.dataset.value; }
    };
  });
}

function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) { renderChips(dom.chipLabel, [], 'label'); return; }
  const labels = state.kelompok[selectedTipe].map(i => i.label);
  renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "SEMUA PASARAN" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "BONUS" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "JAKARTA" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "TOTOMALI" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "HOKIDRAW" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY & HK" }
    ];
    state.kelompok = {};
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length > 0) state.kelompok[sec.title] = items;
    });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error("Error loadHitungData:", e); }
}

function tampilkanValueHitungan() {
  const result = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = '<span style="color: var(--fg-muted);">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    result.innerHTML = `<span style="font-weight: 700; text-shadow: var(--glow-text);">${item.value}</span>`;
    result.onclick = () => copyText(item.value, result);
    result.classList.add('bloom-enter');
    setTimeout(() => result.classList.remove('bloom-enter'), 500);
  }
}

// === AUTO-UPDATE ===
let autoTimeout = null;
function autoUpdateTanggal() { showAutoUpdate(); clearTimeout(autoTimeout); autoTimeout = setTimeout(manualUpdateTanggal, 1000); }
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal!");
  const p = dom.inTgl.value.split('-');
  const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "⏳";
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) { localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value); dom.statTgl.textContent = "✅"; showToast("📅 Tersimpan!"); fetchPrediksi(); fetchHitung(); loadHitungData(); }
    else { dom.statTgl.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}
function autoUpdateNominal() { showAutoUpdate(); clearTimeout(autoTimeout); autoTimeout = setTimeout(manualUpdateNominal, 1000); }
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Isi nominal!");
  dom.btnNom.disabled = true; dom.statNom.textContent = "⏳";
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) { localStorage.setItem(CONFIG.keyNominal, dom.inNom.value); dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value); showToast("💰 Tersimpan!"); fetchPrediksi(); fetchHitung(); loadHitungData(); }
    else { dom.statNom.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}

// === INIT ===
function init() {
  document.querySelectorAll('.tab-chip').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active'));
    t.classList.add('active');
    dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
    dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
  });
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  fetchPrediksi(); fetchHitung(); loadHitungData();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  init();
  setTimeout(() => showToast('⚡ CYBERPUNK ULTRA Loaded ✨'), 1000);
});
</script>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LINE TOGEL - Bonus Event</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #020810; --bg-card: #061420; --bg-input: #0a1e30;
  --neon-blue: #00d4ff; --neon-cyan: #00fff7; --accent-green: #00ff88;
  --accent-red: #ff4757; --accent-orange: #ff9f43;
  --border-color: rgba(0,212,255,0.3); --text-primary: #e0f4ff; --text-muted: #6b8fa8;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Rajdhani',sans-serif; background:var(--bg-dark); color:var(--text-primary); min-height:100vh; overflow-x:hidden; }

/* BACKGROUND - DIJAMIN TIDAK MENANGKAP KLIK */
.bg-animated, .bg-grid, #particles { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-2; pointer-events:none; user-select:none; }
.bg-animated { background:radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(0,255,136,0.05) 0%, transparent 50%), radial-gradient(ellipse at 50% 50%, rgba(0,180,255,0.03) 0%, transparent 70%), var(--bg-dark); }
.bg-grid { background-image:linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size:50px 50px; animation:gridMove 20s linear infinite; }
@keyframes gridMove { 0%{transform:translate(0,0)} 100%{transform:translate(50px,50px)} }
.particle { position:absolute; width:4px; height:4px; background:var(--neon-blue); border-radius:50%; box-shadow:0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue); animation:floatParticle 15s infinite linear; opacity:0.6; }
@keyframes floatParticle { 0%,100%{transform:translateY(100vh) rotate(0deg); opacity:0} 10%,90%{opacity:0.6} 100%{transform:translateY(-100vh) rotate(720deg); opacity:0} }

.judul-glow { font-family:'Orbitron',sans-serif; font-size:clamp(1.5rem,4vw,2.2rem); font-weight:900; text-align:center; color:var(--neon-cyan); letter-spacing:3px; margin-bottom:10px; text-shadow:0 0 30px rgba(0,255,247,0.3); }
.bonus-title { font-family:'Orbitron',sans-serif; font-size:clamp(1.2rem,3vw,1.8rem); font-weight:700; text-align:center; color:var(--neon-blue); letter-spacing:2px; margin-bottom:20px; }

/* CONTAINER UTAMA */
.tab-content { display:block; padding:20px; max-width:1400px; margin:0 auto; position:relative; z-index:10; }
.bonus-section { background:linear-gradient(135deg, var(--bg-card) 0%, rgba(6,20,32,0.8) 100%); border:1px solid var(--border-color); border-radius:20px; padding:25px; margin:10px; backdrop-filter:blur(10px); box-shadow:0 10px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(0,212,255,0.1); position:relative; z-index:10; }

/* TOMBOL - DIJAMIN BISA DIKLIK */
.tab-btn { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:14px; padding:12px 20px; background:linear-gradient(135deg, rgba(0,212,255,0.1) 0%, rgba(0,180,255,0.05) 100%); border:1px solid var(--border-color); border-radius:10px; color:var(--neon-blue); cursor:pointer !important; transition:all 0.2s ease; position:relative; z-index:50; pointer-events:auto !important; display:inline-flex; align-items:center; justify-content:center; }
.tab-btn:hover { background:linear-gradient(135deg, rgba(0,212,255,0.25) 0%, rgba(0,180,255,0.15) 100%); border-color:var(--neon-blue); transform:translateY(-2px); box-shadow:0 5px 20px rgba(0,212,255,0.3); }
.tab-btn.active { background:linear-gradient(135deg, rgba(0,212,255,0.3) 0%, rgba(0,180,255,0.2) 100%); border-color:var(--neon-cyan); color:var(--neon-cyan); box-shadow:0 0 25px rgba(0,212,255,0.4); }
.tab-btn.danger { border-color:rgba(255,71,87,0.4); color:var(--accent-red); }
.tab-btn.danger:hover { background:rgba(255,71,87,0.2); border-color:var(--accent-red); }
.tab-btn.orange { border-color:rgba(255,159,67,0.4); color:var(--accent-orange); }
.tab-btn.orange:hover { background:rgba(255,159,67,0.2); border-color:var(--accent-orange); }

.bonus-textarea { width:100%; min-height:120px; background:var(--bg-input); border:1px solid var(--border-color); border-radius:12px; padding:15px; color:var(--text-primary); font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:500; resize:vertical; position:relative; z-index:10; pointer-events:auto; }
.bonus-textarea:focus { outline:none; border-color:var(--neon-blue); box-shadow:0 0 20px rgba(0,212,255,0.2); }
.bonus-input { width:100%; background:var(--bg-input); border:1px solid var(--border-color); border-radius:8px; padding:10px 14px; color:var(--text-primary); font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:500; position:relative; z-index:10; pointer-events:auto; }
.bonus-input:focus { outline:none; border-color:var(--neon-blue); box-shadow:0 0 15px rgba(0,212,255,0.2); }
.bonus-input::placeholder { color:var(--text-muted); }
.bonus-label { display:block; color:var(--neon-blue); font-weight:700; margin-bottom:6px; font-size:14px; }
.bonus-input-group { margin-bottom:15px; position:relative; z-index:10; }
.action-btn { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:15px; padding:12px 24px; background:linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%); border:none; border-radius:10px; color:var(--bg-dark); cursor:pointer !important; transition:all 0.2s ease; position:relative; z-index:50; pointer-events:auto !important; }
.action-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(0,212,255,0.4); }
.action-btn.danger { background:linear-gradient(135deg, var(--accent-red) 0%, #cc3344 100%); }
.action-btn.orange { background:linear-gradient(135deg, var(--accent-orange) 0%, #e67e22 100%); }
.bonus-button-group { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:20px 0; }
.bonus-result { background:linear-gradient(135deg, rgba(0,212,255,0.1) 0%, rgba(0,255,136,0.05) 100%); border:1px solid var(--border-color); border-radius:12px; padding:20px; margin-top:20px; font-size:16px; font-weight:600; line-height:1.8; }
.bonus-angka { font-family:'Orbitron',sans-serif; font-weight:700; color:var(--accent-green); font-size:1.1em; }

/* GALERI */
.gallery-container { width:100%; margin:20px 0; position:relative; z-index:10; }
.combined-image-slot { width:100%; display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:15px; padding:20px; background:linear-gradient(135deg, rgba(0,212,255,0.05) 0%, rgba(0,180,255,0.02) 100%); border:1px solid var(--border-color); border-radius:16px; cursor:pointer !important; transition:all 0.2s ease; position:relative; z-index:20; pointer-events:auto !important; }
.combined-image-slot:hover { border-color:var(--neon-blue); box-shadow:0 0 30px rgba(0,212,255,0.2); }
.combined-image-slot img { width:calc(33.333% - 10px); min-width:250px; max-width:400px; height:auto; aspect-ratio:4/3; object-fit:cover; border-radius:12px; border:2px solid var(--border-color); transition:all 0.2s ease; box-shadow:0 5px 20px rgba(0,0,0,0.3); pointer-events:auto; cursor:pointer; }
.combined-image-slot img:hover { border-color:var(--neon-blue); transform:scale(1.02); }
.caption-userid { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:700; color:var(--neon-cyan); width:100%; text-align:center; padding:10px 0; letter-spacing:2px; pointer-events:none; }
.package-info { font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:600; color:var(--neon-blue); text-align:center; margin-top:15px; }

/* MODE TOGGLING */
.bonus-mode { display:none; animation:fadeIn 0.3s ease-out; }
.bonus-mode.active { display:block; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.scatter-card { flex:1; min-width:280px; background:linear-gradient(135deg, rgba(0,30,50,0.8) 0%, rgba(6,20,32,0.6) 100%); padding:15px; border-radius:12px; border:1px solid var(--border-color); position:relative; z-index:10; }
.scatter-card:hover { border-color:var(--neon-blue); box-shadow:0 5px 25px rgba(0,212,255,0.15); }
.scatter-card-title { color:var(--neon-cyan); margin:0 0 12px 0; font-size:16px; font-family:'Orbitron',sans-serif; font-weight:700; }

/* MODALS */
.modal-overlay { position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(2,8,16,0.95); z-index:9999; display:none; flex-direction:column; justify-content:center; align-items:center; padding:20px; pointer-events:none; }
.modal-overlay.show { display:flex; pointer-events:auto; }
.modal-close { position:absolute; top:15px; right:25px; font-size:40px; color:var(--neon-blue); background:none; border:none; cursor:pointer !important; z-index:10001; width:40px; height:40px; display:flex; align-items:center; justify-content:center; pointer-events:auto !important; }
.modal-close:hover { color:var(--neon-cyan); transform:rotate(90deg); }
.zoom-nav-button { background:linear-gradient(135deg, rgba(0,212,255,0.2) 0%, rgba(0,180,255,0.1) 100%); border:1px solid var(--neon-blue); color:var(--neon-cyan); padding:15px 25px; border-radius:10px; cursor:pointer !important; font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; pointer-events:auto !important; }
.zoom-nav-button:hover { background:rgba(0,212,255,0.3); box-shadow:0 5px 20px rgba(0,212,255,0.3); }
.zoom-nav-button:disabled { opacity:0.3; cursor:not-allowed !important; }
.zoomed-content-wrapper { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; align-items:center; max-width:95%; }
.zoomed-content-wrapper img { max-width:30%; min-width:200px; max-height:70vh; object-fit:contain; border-radius:12px; border:2px solid var(--neon-blue); box-shadow:0 0 30px rgba(0,212,255,0.3); cursor:pointer; }
#scanScatter2Modal .modal-content { display:flex; gap:20px; max-width:95vw; width:100%; height:85vh; }
#scanScatter2Modal .image-section { flex:1; display:flex; justify-content:center; align-items:center; }
#scanScatter2Modal .image-section img { max-width:100%; max-height:100%; object-fit:contain; border-radius:12px; box-shadow:0 0 30px rgba(0,212,255,0.4); }
#scanScatter2Modal .result-section { flex:1; min-width:300px; max-width:500px; overflow-y:auto; padding:20px; background:var(--bg-card); border-radius:12px; border:1px solid var(--border-color); }

/* TOAST */
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:linear-gradient(135deg, var(--bg-card) 0%, rgba(6,20,32,0.95) 100%); border:1px solid var(--neon-blue); border-radius:12px; padding:15px 30px; color:var(--text-primary); font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:600; z-index:10000; opacity:0; transition:all 0.4s ease; box-shadow:0 10px 40px rgba(0,212,255,0.3); pointer-events:none; max-width:90vw; text-align:center; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }

.copy-btn { background:linear-gradient(135deg, var(--neon-blue) 0%, #0099cc 100%); color:var(--bg-dark); border:none; padding:6px 12px; border-radius:6px; cursor:pointer !important; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; pointer-events:auto !important; }
.copy-btn:hover { transform:scale(1.05); box-shadow:0 5px 15px rgba(0,212,255,0.4); }
.copy-btn.copied { background:var(--accent-green); }
.result-item { margin-bottom:12px; padding:12px 15px; background:linear-gradient(135deg, rgba(0,212,255,0.15) 0%, rgba(0,180,255,0.05) 100%); border:1px solid rgba(0,212,255,0.4); border-radius:10px; display:flex; justify-content:space-between; align-items:center; gap:15px; }
.result-item:hover { border-color:var(--neon-blue); background:rgba(0,212,255,0.2); }
.result-item.green { background:linear-gradient(135deg, rgba(0,255,136,0.1) 0%, rgba(0,200,100,0.05) 100%); border-color:rgba(0,255,136,0.4); }
.result-item.green:hover { border-color:var(--accent-green); background:rgba(0,255,136,0.15); }
.result-item span { word-break:break-all; font-family:'Orbitron',sans-serif; font-size:14px; letter-spacing:1px; }
.input-with-buttons { display:flex; gap:8px; align-items:center; }
.input-with-buttons .bonus-input { flex:1; }
.input-with-buttons .action-btn { padding:8px 12px; font-size:14px; white-space:nowrap; }
.fallback-panel { background:linear-gradient(135deg, rgba(255,71,87,0.08) 0%, rgba(6,20,32,0.8) 100%); border:1px solid var(--accent-red); border-radius:12px; padding:15px; margin-top:15px; }
.fallback-title { color:var(--accent-red); font-weight:700; margin-bottom:12px; font-size:15px; }
.fallback-label { color:var(--neon-blue); font-size:13px; font-weight:600; margin-bottom:4px; display:block; }
.fallback-input-group { display:flex; gap:8px; margin-top:4px; margin-bottom:12px; }
.fallback-input { flex:1; background:var(--bg-input); border:1px solid var(--border-color); border-radius:6px; padding:8px; color:var(--text-primary); font-family:'Rajdhani',sans-serif; font-size:14px; }
.fallback-input:focus { outline:none; border-color:var(--neon-blue); }
.file-upload-wrapper { position:relative; width:100%; }
.file-upload-wrapper input[type="file"] { width:100%; padding:8px; background:var(--bg-input); border:1px dashed var(--border-color); border-radius:6px; color:var(--text-muted); font-size:13px; cursor:pointer !important; }
.fallback-hint { color:var(--text-muted); font-size:12px; margin-top:3px; display:block; }

@media (max-width:768px) {
  .bonus-section { padding:15px; margin:5px; }
  .tab-btn { padding:10px 15px; font-size:13px; }
  .combined-image-slot img { width:100%; max-width:100%; min-width:unset; }
  .zoomed-content-wrapper img { max-width:100%; min-width:unset; }
  #scanScatter2Modal .modal-content { flex-direction:column; height:auto; }
  .input-with-buttons { flex-wrap:wrap; }
  .input-with-buttons .bonus-input { width:100%; }
  .fallback-input-group { flex-direction:column; }
}
button:focus-visible, input:focus-visible, textarea:focus-visible { outline:2px solid var(--neon-blue); outline-offset:2px; }
</style>
</head>
<body>
<div class="bg-animated"></div><div class="bg-grid"></div><div id="particles"></div><div id="toast" class="toast"></div>

<div id="app-container" class="tab-content">
<div class="bonus-section">
<h3 class="judul-glow">LINE TOGEL</h3><h2 class="bonus-title">BONUS EVENT</h2>

<div style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:15px 0;">
<button class="tab-btn active" id="btn-bonusAsli">Cek Bonus Asli</button>
<button class="tab-btn" id="btn-galeri">CEK GAMBAR</button>
<button class="tab-btn" id="btn-inputScatter">Input Scatter (2 Data)</button>
</div>

<!-- MODE 1 -->
<div id="modeBonusAsli" class="bonus-mode active">
<textarea id="bonusTextarea" class="bonus-textarea" placeholder="Tempelkan data transaksi di sini..."></textarea>
<div class="bonus-input-group"><label class="bonus-label" for="bonusPatokan">Nilai Patokan:</label><input type="text" id="bonusPatokan" class="bonus-input" placeholder="Contoh: 5000000"></div>
<div class="bonus-input-group"><label class="bonus-label" for="bonusSurplus">Nilai Surplus:</label><input type="text" id="bonusSurplus" class="bonus-input" placeholder="Contoh: 1500000"></div>
<div class="bonus-button-group"><button class="action-btn" id="btnHitung">Hitung Bonus</button><button class="action-btn danger" id="btnBersih">Bersihkan</button></div>
<div id="bonusHasil" class="bonus-result"></div>
<div class="bonus-input-group" style="margin-top:15px"><label class="bonus-label" for="imageUrl">Link Gambar Transaksi:</label><input type="text" id="imageUrl" class="bonus-input" placeholder="Tempel link gambar di sini..."></div>
</div>

<!-- MODE 2 -->
<div id="modeGaleri" class="bonus-mode">
<h2 class="bonus-title">CEK GAMBAR</h2>
<p style="text-align:center;color:var(--text-muted);margin-bottom:12px;font-weight:600">Format: <strong style="color:var(--neon-blue)">USERID link1 link2 link3</strong></p>
<textarea id="bonusLinkInput" class="bonus-textarea" placeholder="Tempelkan data paket di sini. Setiap baris = satu paket." rows="5"></textarea>
<div class="bonus-button-group"><button class="action-btn danger" id="btnClearGaleri">Hapus Semua</button></div>
<hr style="margin:20px 0;border-color:var(--border-color)">
<div class="gallery-container">
<div class="combined-image-slot" id="bonusCombinedImageSlot">
<p class="caption-userid" id="bonusCombinedSlotUserid">USER ID</p>
<img id="bonusImgSlot1" src="https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=Gambar+1" alt="Gambar 1">
<img id="bonusImgSlot2" src="https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=Gambar+2" alt="Gambar 2">
<img id="bonusImgSlot3" src="https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=Gambar+3" alt="Gambar 3">
</div>
</div>
<p class="package-info">Paket: <span id="bonusCurrentPackageNum">0</span> / <span id="bonusMaxPackageNum">0</span></p>
</div>

<!-- MODE 3 -->
<div id="modeInputScatter" class="bonus-mode">
<div style="display:flex;gap:16px;justify-content:space-between;flex-wrap:wrap">
<div class="scatter-card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h4 class="scatter-card-title">DATA SCATTER 1</h4><button class="tab-btn" style="padding:6px 12px;font-size:12px" id="btnCopy1">Copy</button></div>
<div class="bonus-input-group" style="margin:8px 0"><label class="bonus-label" style="font-size:13px">1. UID:</label><input type="text" id="bonusUserid1" class="bonus-input" placeholder="San221" style="padding:8px;font-size:14px"></div>
<div class="bonus-input-group" style="margin:8px 0"><label class="bonus-label" style="font-size:13px">2. S1:</label><input type="text" id="bonusScatter1_1" class="bonus-input" placeholder="Link gambar S1..." style="padding:8px;font-size:14px"></div>
<div class="bonus-input-group" style="margin:8px 0"><label class="bonus-label" style="font-size:13px">3. S2 (Scan OCR):</label><div class="input-with-buttons"><input type="text" id="bonusScatter2_1" class="bonus-input" placeholder="Link gambar PNG..." style="padding:8px;font-size:14px"><button type="button" class="action-btn" style="padding:8px 12px;font-size:14px" id="btnScan1">Scan</button></div></div>
<div class="bonus-input-group" style="margin:8px 0"><label class="bonus-label" style="font-size:13px">4. S3:</label><input type="text" id="bonusScatter3_1" class="bonus-input" placeholder="Link gambar S3..." style="padding:8px;font-size:14px"></div>
<div class="bonus-input-group" style="margin:8px 0"><label class="bonus-label" style="font-size:13px">5. Rek:</label><input type="text" id="bonusRekening1" class="bonus-input" placeholder="A SUWARSAN,085882449440" style="padding:8px;font-size:14px"></div>
<div class="bonus-input-group" style="margin:8px 0"><label class="bonus-label" style="font-size:13px">6. Kode:</label><input type="text" id="bonusKodeTransaksi1" class="bonus-input" placeholder="Kode hasil scan..." style="padding:8px;font-size:14px"></div>
<div style="margin-top:20px;text-align:center"><button class="tab-btn orange" style="width:100%;padding:12px;font-size:14px" id="btnView1">🖼️ Lihat 3 Foto (S1+S2+S3)</button></div>
</div>
<div class="scatter-card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h4 class="scatter-card-title">DATA SCATTER 2</h4><button class="tab-btn" style="padding:6px 12px;font-size:12px" id="btnCopy2">Copy</button></div>
<div class="bonus-input-group" style="margin:8px 0"><label class="bonus-label" style="font-size:13px">1. UID:</label><input type="text" id="bonusUserid2" class="bonus-input" placeholder="Budi123" style="padding:8px;font-size:14px"></div>
<div class="bonus-input-group" style="margin:8px 0"><label class="bonus-label" style="font-size:13px">2. S1:</label><input type="text" id="bonusScatter1_2" class="bonus-input" placeholder="Link gambar S1..." style="padding:8px;font-size:14px"></div>
<div class="bonus-input-group" style="margin:8px 0"><label class="bonus-label" style="font-size:13px">3. S2 (Scan OCR):</label><div class="input-with-buttons"><input type="text" id="bonusScatter2_2" class="bonus-input" placeholder="Link gambar PNG..." style="padding:8px;font-size:14px"><button type="button" class="action-btn" style="padding:8px 12px;font-size:14px" id="btnScan2">Scan</button></div></div>
<div class="bonus-input-group" style="margin:8px 0"><label class="bonus-label" style="font-size:13px">4. S3:</label><input type="text" id="bonusScatter3_2" class="bonus-input" placeholder="Link gambar S3..." style="padding:8px;font-size:14px"></div>
<div class="bonus-input-group" style="margin:8px 0"><label class="bonus-label" style="font-size:13px">5. Rek:</label><input type="text" id="bonusRekening2" class="bonus-input" placeholder="BUDI,1234567890" style="padding:8px;font-size:14px"></div>
<div class="bonus-input-group" style="margin:8px 0"><label class="bonus-label" style="font-size:13px">6. Kode:</label><input type="text" id="bonusKodeTransaksi2" class="bonus-input" placeholder="Kode hasil scan..." style="padding:8px;font-size:14px"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  console.log('🚀 Aplikasi dimulai...');
  
  // ================= UTILS =================
  const $ = id => document.getElementById(id);
  const showToast = (msg, type='info') => {
    const t = $('toast');
    if(!t) { alert(msg); return; }
    t.textContent = msg;
    t.style.borderColor = type==='error'?'var(--accent-red)':type==='success'?'var(--accent-green)':'var(--neon-blue)';
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 3000);
  };
  const normalizeUrl = url => {
    if(!url||!url.trim()) return '';
    let u = url.trim();
    if(u.startsWith('image')||u.startsWith('blob:')) return u;
    if(u.includes('tawk.link')||u.includes('tawk.to')) return u;
    if(u.includes('drive.google.com')) { const m=u.match(/\/d\/([a-zA-Z0-9_-]+)|id=([a-zA-Z0-9_-]+)/); if(m) return `https://drive.google.com/uc?export=view&id=${m[1]||m[2]}`; }
    if(u.includes('dropbox.com')) return u.replace('?dl=0','?dl=1');
    if(u.includes('imgur.com')) { u=u.replace(/\/gallery\//i,'/').replace(/\/a\//i,'/'); if(!u.match(/\.(jpg|jpeg|png|gif|webp|bmp)$/i)){ u=u.replace('imgur.com/','i.imgur.com/'); if(!u.match(/\.[a-z]+$/i)) u+='.jpg'; } return u; }
    if(u.includes('postimg.cc')||u.includes('postimages.org')) return u.replace(/\/[a-z]+\/?$/,'');
    if(u.startsWith('//')) return 'https:'+u;
    if(!u.startsWith('http')&&u.includes('.')&&!u.startsWith('data')&&!u.startsWith('blob')&&u.match(/^[a-z0-9.-]+\.[a-z]{2,}/i)) return 'https://'+u;
    return u.startsWith('http')?u:`https://${u}`;
  };
  const isValidImg = u => u && (u.startsWith('image')||u.startsWith('blob:')||/^https?:\/\//.test(u)||u.includes('tawk.link')||u.includes('drive.google.com')||u.includes('dropbox.com')||u.includes('imgur.com')||u.includes('postimg.cc')||u.includes('postimages.org')||u.match(/\.(jpg|jpeg|png|gif|webp|bmp|svg|ico)(\?.*)?$/i));
  const createParticles = () => {
    const c = $('particles'); if(!c) return; c.innerHTML='';
    for(let i=0;i<20;i++){ const p=document.createElement('div'); p.className='particle'; p.style.left=Math.random()*100+'%'; p.style.animationDelay=Math.random()*15+'s'; p.style.animationDuration=(15+Math.random()*10)+'s'; c.appendChild(p); }
  };

  // ================= STATE =================
  let currentMode='bonusAsli', currentDataIndex=1, currentScanIndex=1, bonusAllPackagesData=[], bonusCurrentPackageIndex=0, bonusPackageSize=3, isBonusZoomOpen=false, imageList=[], currentImageIndex=0, scatterZoomImages=[], scatterZoomIndex=0;

  // ================= MODE SWITCHING (DIJAMIN WORK) =================
  const modes = { bonusAsli: $('modeBonusAsli'), galeri: $('modeGaleri'), inputScatter: $('modeInputScatter') };
  const btns = { bonusAsli: $('btn-bonusAsli'), galeri: $('btn-galeri'), inputScatter: $('btn-inputScatter') };
  
  function switchMode(mode) {
    console.log('🔄 Beralih ke:', mode);
    Object.values(modes).forEach(el => { if(el) { el.style.display='none'; el.classList.remove('active'); } });
    Object.values(btns).forEach(el => { if(el) el.classList.remove('active'); });
    if(modes[mode]) { modes[mode].style.display='block'; modes[mode].classList.add('active'); }
    if(btns[mode]) btns[mode].classList.add('active');
    currentMode = mode;
  }

  // Attach click listeners secara eksplisit
  Object.keys(btns).forEach(mode => {
    btns[mode]?.addEventListener('click', e => { e.preventDefault(); switchMode(mode); });
  });

  // ================= INPUT NORMALIZATION =================
  ['imageUrl','bonusScatter1_1','bonusScatter2_1','bonusScatter3_1','bonusScatter1_2','bonusScatter2_2','bonusScatter3_2','imageUrlZoom'].forEach(id => {
    const el = $(id);
    if(el) el.addEventListener('blur', function(){ if(this.value && this.id!=='bonusLinkInput') this.value = normalizeUrl(this.value); });
  });

  // ================= VIEW 3 PHOTOS =================
  function viewAllScatterPhotos(idx) {
    const s1=normalizeUrl($('bonusScatter1_'+idx).value.trim()), s2=normalizeUrl($('bonusScatter2_'+idx).value.trim()), s3=normalizeUrl($('bonusScatter3_'+idx).value.trim());
    scatterZoomImages = [s1,s2,s3].filter(l=>isValidImg(l));
    if(!scatterZoomImages.length) return showToast('Tidak ada link gambar valid!','error');
    scatterZoomIndex = 0; updateScatterZoom();
    const modal = $('scatterZoomModal');
    $('scatterZoomTitle').textContent = `Lihat 3 Foto - Data ${idx}`;
    $('scatterZoomCaption').textContent = `Menampilkan ${scatterZoomImages.length} foto`;
    if(modal) modal.classList.add('show');
  }
  function updateScatterZoom() {
    const w = $('scatterZoomContent'); if(!w) return; w.innerHTML='';
    scatterZoomImages.forEach((link,i) => {
      const img = document.createElement('img'); img.src=normalizeUrl(link); img.alt=`Scatter ${i+1}`;
      img.style.cssText='max-width:30%;min-width:200px;max-height:70vh;object-fit:contain;border-radius:12px;border:2px solid var(--neon-blue);box-shadow:0 0 30px rgba(0,212,255,0.3);cursor:pointer';
      img.onclick = () => openLightbox(img);
      img.onerror = function(){ this.src='https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=Error'; this.style.borderColor='var(--accent-red)'; };
      w.appendChild(img);
    });
  }
  $('closeScatterZoom').addEventListener('click', ()=>{ $('scatterZoomModal').classList.remove('show'); $('scatterZoomContent').innerHTML=''; scatterZoomImages=[]; });
  $('prevScatter').onclick = $('nextScatter').onclick = ()=> showToast('Gunakan lightbox untuk zoom per gambar');

  // ================= SCAN OCR + FALLBACK =================
  function scanScatter2(idx) {
    currentScanIndex = idx; currentDataIndex = idx;
    const raw = $('bonusScatter2_'+idx).value.trim();
    if(!raw) return showToast('Masukkan link gambar Scatter 2!','error');
    const link = normalizeUrl(raw), img = $('scanScatter2Image'), res = $('scanScatter2Result'), modal = $('scanScatter2Modal');
    if(img) { img.src=link; img.onerror=function(){ this.src='https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=Error'; showToast('Gambar tidak dapat dimuat','error'); } }
    if(modal) modal.classList.add('show');
    if(res) res.innerHTML='<span style="color:var(--text-muted)">⏳ Memindai gambar...</span>';
    if(typeof Tesseract==='undefined') { if(res) res.innerHTML='<span style="color:var(--accent-red)">❌ Tesseract.js belum dimuat</span>'; return; }
    
    Tesseract.recognize(link,'eng').then(({ data: { text } }) => processOCRResult(text)).catch(err => {
      console.error('OCR Error:',err);
      if(res) res.innerHTML='<span style="color:var(--accent-red)">❌ Gagal membaca gambar via link</span>';
      setTimeout(showFallbackOptions,500);
    });
  }
  function processOCRResult(text) {
    const res = $('scanScatter2Result'); if(!res) return;
    const rawLines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
    let gab=[],lng=[];
    for(let i=0;i<rawLines.length;i++){
      const m=rawLines[i].match(/\b\d{9,10}\b/);
      if(m){ if(i+1<rawLines.length){ const nm=rawLines[i+1].trim().match(/\b\d{8,}\b/); if(nm){ gab.push(m[0]+nm[0]); i++; continue; } } gab.push(m[0]); }
    }
    rawLines.forEach(l=>{ const ms=l.match(/\d{8,}/g); if(ms) ms.forEach(x=>lng.push(x)); });
    res.innerHTML='';
    if(gab.length>0||lng.length>0){
      if(gab.length>0){ const t=document.createElement('div'); t.innerHTML='<b style="color:var(--neon-blue)">📋 Hasil Gabungan:</b>'; t.style.margin='10px 0'; res.appendChild(t); [...new Set(gab)].forEach(k=>{ const d=document.createElement('div'); d.className='result-item'; d.innerHTML=`<span>${k}</span><div style="display:flex;gap:8px"><button class="copy-btn copy-ocr-btn">Copy</button><button class="copy-btn pilih-ocr-btn" style="background:var(--accent-green)">Pilih</button></div>`; d.querySelector('.copy-ocr-btn').onclick=function(){ copyWithFeedback(this,k); }; d.querySelector('.pilih-ocr-btn').onclick=function(){ pilihKode(k); }; res.appendChild(d); }); }
      if(lng.length>0){ const t=document.createElement('div'); t.innerHTML='<b style="color:var(--accent-green)">🔢 Hasil Per Baris:</b>'; t.style.margin='10px 0'; res.appendChild(t); [...new Set(lng)].forEach(k=>{ const d=document.createElement('div'); d.className='result-item green'; d.innerHTML=`<span>${k}</span><div style="display:flex;gap:8px"><button class="copy-btn copy-ocr-btn">Copy</button><button class="copy-btn pilih-ocr-btn" style="background:var(--accent-green)">Pilih</button></div>`; d.querySelector('.copy-ocr-btn').onclick=function(){ copyWithFeedback(this,k); }; d.querySelector('.pilih-ocr-btn').onclick=function(){ pilihKode(k); }; res.appendChild(d); }); }
    } else { res.innerHTML='<span style="color:var(--accent-red)">⚠️ Tidak ditemukan angka panjang</span>'; setTimeout(showFallbackOptions,500); }
  }
  function showFallbackOptions() {
    const res=$('scanScatter2Result'); if(!res) return;
    res.innerHTML=`<div class="fallback-panel">
        <div class="fallback-title">❌ OCR Gagal - Gunakan Opsi Alternatif:</div>
        <span class="fallback-label">📝 1. Input Manual Kode:</span>
        <div class="fallback-input-group"><input type="text" id="manualCodeInput" class="fallback-input" placeholder="Masukkan kode transaksi..."><button class="action-btn" id="btnUseManual" style="padding:8px 12px;font-size:13px;white-space:nowrap">✓ Gunakan</button></div>
        <span class="fallback-label">📁 2. Upload Gambar dari Perangkat:</span>
        <div class="file-upload-wrapper"><input type="file" id="imageUploadInput" accept="image/*"><span class="fallback-hint">Lewati masalah link/CORS - Upload langsung</span></div>
        <button class="tab-btn" id="btnRetryScan" style="width:100%;padding:10px;font-size:14px;margin-top:10px">🔄 Coba Scan Ulang Link</button>
    </div>`;
    $('btnUseManual').onclick = function(){ const inp=$('manualCodeInput'); if(!inp||!inp.value.trim()) return showToast('Masukkan kode!','error'); const code=inp.value.trim(); $('bonusKodeTransaksi'+currentScanIndex).value=code; showToast('✓ Kode manual: '+code,'success'); $('scanScatter2Modal').classList.remove('show'); };
    $('imageUploadInput').onchange = function(e){ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=function(ev){ const dataUrl=ev.target.result; const imgEl=$('scanScatter2Image'); if(imgEl) imgEl.src=dataUrl; const res=$('scanScatter2Result'); if(res) res.innerHTML='<span style="color:var(--text-muted)">⏳ Memindai gambar yang diupload...</span>'; Tesseract.recognize(dataUrl,'eng').then(({ data: { text } }) => processOCRResult(text)).catch(()=>{ if(res) res.innerHTML='<span style="color:var(--accent-red)">❌ Gagal memindai file</span>'; setTimeout(showFallbackOptions,800); }); }; reader.readAsDataURL(file); };
    $('btnRetryScan').onclick = function(){ scanScatter2(currentScanIndex); };
  }
  function copyWithFeedback(btn,text){ navigator.clipboard.writeText(text).then(()=>{ const org=btn.innerHTML; btn.innerHTML='✓ OK'; btn.classList.add('copied'); showToast('Disalin!','success'); setTimeout(()=>{ btn.innerHTML=org; btn.classList.remove('copied'); },1000); }).catch(()=>showToast('Gagal menyalin','error')); }
  function pilihKode(k){ $('bonusKodeTransaksi'+currentDataIndex).value=k; $('scanScatter2Modal').classList.remove('show'); showToast('✓ Kode dipilih','success'); }
  $('closeScanScatter2').addEventListener('click', ()=> $('scanScatter2Modal').classList.remove('show'));

  // ================= HITUNG BONUS =================
  $('btnHitung').addEventListener('click', ()=>{
    const isi=$('bonusTextarea').value.trim(), pat=parseInt(($('bonusPatokan').value||'').replace(/[^\d]/g,''))||0, sur=parseInt(($('bonusSurplus').value||'').replace(/[^\d]/g,''))||0;
    if(!isi) return showToast('⚠️ Tempelkan data terlebih dahulu','error');
    let total=0; isi.split('\n').forEach((l,i,arr)=>{ if(l.trim()==='Credit'&&i+1<arr.length){ const m=arr[i+1].trim().match(/IDR\s([\d,]+)/i); if(m){ const a=parseFloat(m[1].replace(/,/g,'')); if(!isNaN(a)) total+=a; } } });
    const out=$('bonusHasil');
    if(out){ let h=`<strong>💰 Total:</strong> <span class="bonus-angka">IDR ${total.toLocaleString('en-US')}</span>`; if(pat||sur){ const t=pat+sur, s=total-t, c=s>=0?'var(--accent-green)':'var(--accent-red)'; h+=`<br><strong>📊 Patokan:</strong> <span class="bonus-angka">IDR ${pat.toLocaleString('en-US')}</span><br><strong>📈 Surplus:</strong> <span class="bonus-angka">IDR ${sur.toLocaleString('en-US')}</span><br><strong>➖ Total Dikurang:</strong> <span class="bonus-angka">IDR ${t.toLocaleString('en-US')}</span><br><strong>🎯 Selisih:</strong> <span class="bonus-angka" style="color:${c}">IDR ${Math.abs(s).toLocaleString('en-US')}</span>`; } out.innerHTML=h; }
  });
  $('btnBersih').addEventListener('click', ()=>{ ['bonusTextarea','bonusPatokan','bonusSurplus','bonusHasil','imageUrl'].forEach(id=>{ const e=$(id); if(e) e.value=(e.tagName==='TEXTAREA'||e.tagName==='INPUT')?'':''; }); showToast('✓ Form dibersihkan','success'); });

  // ================= COPY & DATA =================
  const prosesRek = r => { const p=r.split(',').map(x=>x.trim()); return {nomor:p.slice(1).join(',')||'', nama:p[0]||''}; };
  const getData = pf => { const uid=$('bonusUserid'+pf).value.trim(), s1=normalizeUrl($('bonusScatter1_'+pf).value.trim()), s2=normalizeUrl($('bonusScatter2_'+pf).value.trim()), s3=normalizeUrl($('bonusScatter3_'+pf).value.trim()), rek=$('bonusRekening'+pf).value.trim(), kode=$('bonusKodeTransaksi'+pf).value.trim(), parts=[]; if(uid)parts.push(uid); if(s1)parts.push(s1); if(s2)parts.push(s2); if(s3)parts.push(s3); if(rek){ const{nomor,nama}=prosesRek(rek); if(nomor)parts.push(nomor); if(nama)parts.push(nama); } if(kode)parts.push(kode); return parts.join('\t'); };
  const copyData = pf => { const d=getData(pf); navigator.clipboard.writeText(d||''); showToast(d?'✓ Data '+pf+' disalin!':'⚠️ Kosong', d?'success':'info'); };
  $('btnCopy1').addEventListener('click', ()=>copyData('1'));
  $('btnCopy2').addEventListener('click', ()=>copyData('2'));
  $('btnCopyAll').addEventListener('click', ()=>{ const d1=getData('1'),d2=getData('2'),t=[d1,d2].filter(x=>x!=='').join('\n'); navigator.clipboard.writeText(t); showToast(t?'✓ Semua data disalin!':'⚠️ Tidak ada data', t?'success':'info'); });
  $('btnClearAll').addEventListener('click', ()=>{ ['1','2'].forEach(p=>['bonusUserid','bonusScatter1_','bonusScatter2_','bonusScatter3_','bonusRekening','bonusKodeTransaksi'].forEach(f=>{ const e=$(f+p); if(e) e.value=''; })); showToast('✓ Semua data dihapus','success'); });

  // ================= GALERI =================
  let bonusInputTimeout;
  $('bonusLinkInput').addEventListener('input', e => { clearTimeout(bonusInputTimeout); bonusInputTimeout=setTimeout(loadBonusImages,100); });
  function loadBonusImages() {
    const inp=$('bonusLinkInput'); if(!inp) return;
    bonusAllPackagesData=[];
    (inp.value||'').split('\n').map(l=>l.trim()).filter(l=>l.length>0).forEach(line=>{
      const words=line.split(/\s+/).filter(w=>w.length>0), urls=words.filter(w=>isValidImg(w)).map(w=>normalizeUrl(w)), uid=words.length>0&&!isValidImg(words[0])?words[0]:'N/A';
      if(urls.length>=1){ const links=[...urls.slice(0,bonusPackageSize)]; while(links.length<bonusPackageSize) links.push(''); bonusAllPackagesData.push({userid:uid,links}); }
    });
    const mx=$('bonusMaxPackageNum'); if(mx) mx.textContent=bonusAllPackagesData.length;
    if(bonusAllPackagesData.length>0){ bonusCurrentPackageIndex=Math.max(0,Math.min(bonusCurrentPackageIndex,bonusAllPackagesData.length-1)); updateBonusGallery(bonusCurrentPackageIndex); }
    else { updateBonusGallery(-1); const cur=$('bonusCurrentPackageNum'); if(cur) cur.textContent='0'; }
  }
  function updateBonusGallery(idx) {
    const slots=['bonusImgSlot1','bonusImgSlot2','bonusImgSlot3'].map(id=>$(id)), comb=$('bonusCombinedImageSlot'), uidEl=$('bonusCombinedSlotUserid'), curEl=$('bonusCurrentPackageNum');
    if(idx>=0&&idx<bonusAllPackagesData.length){
      const{userid,links}=bonusAllPackagesData[idx]; if(uidEl) uidEl.textContent='👤 '+userid; if(comb){ comb.style.opacity='1'; comb.style.pointerEvents='auto'; }
      slots.forEach((img,i)=>{ if(!img) return; const src=links[i]||''; if(src&&isValidImg(src)){ img.src=normalizeUrl(src); img.style.display='inline-block'; img.dataset.originalSrc=img.src; img.onerror=function(){ this.src='https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=Error'; this.style.borderColor='var(--accent-red)'; }; } else { img.src='https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=-'; img.style.display='inline-block'; } });
      if(curEl) curEl.textContent=idx+1;
    } else { if(uidEl) uidEl.textContent='⏳ Belum Ada Data'; if(comb){ comb.style.opacity='0.4'; comb.style.pointerEvents='none'; } slots.forEach(img=>{ if(img){ img.src='https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=-'; img.style.display='inline-block'; } }); if(curEl) curEl.textContent='0'; }
  }
  $('btnClearGaleri').addEventListener('click', ()=>{ bonusAllPackagesData=[]; $('bonusLinkInput').value=''; updateBonusGallery(-1); $('bonusMaxPackageNum').textContent='0'; showToast('✓ Data galeri dihapus','success'); });

  // ================= ZOOM & NAVIGASI =================
  function openBonusZoom() {
    if(!bonusAllPackagesData.length) return;
    const cur=bonusAllPackagesData[bonusCurrentPackageIndex];
    if(!cur.links.some(l=>isValidImg(l))) return;
    isBonusZoomOpen=true; updateBonusZoom(cur.userid,cur.links); $('bonusZoomModal').classList.add('show');
  }
  function updateBonusZoom(uid,links) {
    const w=$('bonusZoomedContentWrapper'), ue=$('bonusZoomedUserid'); if(!w) return; w.innerHTML='';
    links.filter(Boolean).forEach(link=>{ const img=document.createElement('img'); img.src=normalizeUrl(link); img.style.cssText='max-width:30%;min-width:200px;max-height:70vh;object-fit:contain;border-radius:12px;border:2px solid var(--neon-blue);box-shadow:0 0 30px rgba(0,212,255,0.3)'; img.onerror=function(){ this.src='https://via.placeholder.com/400x300/0a1a2f/1a3a5f?text=Error'; }; w.appendChild(img); });
    if(ue) ue.textContent='👤 '+uid; $('bonusPrevZoomBtn').disabled=(bonusCurrentPackageIndex<=0); $('bonusNextZoomBtn').disabled=(bonusCurrentPackageIndex>=bonusAllPackagesData.length-1);
  }
  $('bonusCombinedImageSlot').addEventListener('click', openBonusZoom);
  $('closeBonusZoom').addEventListener('click', ()=>{ $('bonusZoomModal').classList.remove('show'); isBonusZoomOpen=false; });
  $('bonusPrevZoomBtn').addEventListener('click', ()=> navigateBonusPackage('prev'));
  $('bonusNextZoomBtn').addEventListener('click', ()=> navigateBonusPackage('next'));
  function navigateBonusPackage(dir) { if(bonusAllPackagesData.length<=1) return; const tot=bonusAllPackagesData.length; if(dir==='next'&&bonusCurrentPackageIndex<tot-1) bonusCurrentPackageIndex++; else if(dir==='prev'&&bonusCurrentPackageIndex>0) bonusCurrentPackageIndex--; updateBonusGallery(bonusCurrentPackageIndex); if(isBonusZoomOpen) updateBonusZoom(bonusAllPackagesData[bonusCurrentPackageIndex].userid, bonusAllPackagesData[bonusCurrentPackageIndex].links); }

  // ================= LIGHTBOX =================
  function openLightbox(el) { imageList=Array.from(document.querySelectorAll('#bonusCombinedImageSlot img')).filter(img=>img.style.display!=='none'&&img.dataset.originalSrc).map(img=>img.dataset.originalSrc); currentImageIndex=imageList.indexOf(el.dataset.originalSrc||el.src); if(currentImageIndex===-1) currentImageIndex=0; const lb=$('lightboxImage'); if(lb) lb.src=imageList[currentImageIndex]||el.src; $('lightboxModal').classList.add('show'); }
  $('closeLightbox').addEventListener('click', ()=>{ $('lightboxModal').classList.remove('show'); $('lightboxImage').src=''; });
  $('prevLightbox').addEventListener('click', ()=>{ if(!imageList.length) return; currentImageIndex=(currentImageIndex-1+imageList.length)%imageList.length; $('lightboxImage').src=imageList[currentImageIndex]; });
  $('nextLightbox').addEventListener('click', ()=>{ if(!imageList.length) return; currentImageIndex=(currentImageIndex+1)%imageList.length; $('lightboxImage').src=imageList[currentImageIndex]; });
  $('closeZoom').addEventListener('click', ()=>{ ['zoomedImage','imageUrl'].forEach(id=>{ const e=$(id); if(e) e.src=e.value=''; }); });

  // ================= KEYBOARD =================
  document.addEventListener('keydown', e => {
    if(isBonusZoomOpen&&(e.key==='ArrowLeft'||e.key==='ArrowRight')) { e.preventDefault(); navigateBonusPackage(e.key==='ArrowLeft'?'prev':'next'); }
    else if(e.key==='Escape') { ['closeBonusZoom','closeScatterZoom','closeScanScatter2','closeLightbox'].forEach(id=> $(id)?.click()); }
  });

  // ================= INIT =================
  createParticles();
  switchMode('bonusAsli');
  console.log('✅ Aplikasi siap! Semua tombol aktif.');
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Arcade Menu</title>
  <!-- Link Font Awesome untuk Ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <!-- Link Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;800&display=swap" rel="stylesheet">

  <style>
    /* ==== SETUP DASAR ==== */
    body {
      margin: 0;
      padding: 0;
      background-color: #050505;
      font-family: 'Exo 2', sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* ==== LAYOUT GRID ARCADE ==== */
    /* Mengatur tombol menjadi grid responsif (kolom otomatis) */
    .arcade-menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      padding: 25px;
      width: 100%;
      max-width: 800px; /* Maksimal lebar container */
      align-content: start;
    }

    /* ==== STYLE TOMBOL NEON ==== */
    .neon-button {
      position: relative;
      display: flex;
      flex-direction: column; /* Ikon di atas, teks di bawah */
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 18px 10px;
      border-radius: 10px;
      
      /* State Pasif (Mati) */
      background: rgba(20, 20, 20, 0.6);
      border: 2px solid #333;
      color: #555;
      
      /* Efek Kaca & Bayangan */
      backdrop-filter: blur(5px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: all 0.2s ease;
      overflow: hidden;
      font-weight: 800;
      font-size: 12px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
    }

    /* Ikon dalam tombol */
    .neon-button i {
      font-size: 22px;
      transition: all 0.2s;
    }

    /* Emoji Icon (untuk pengaturan) */
    .neon-button .quantum-icon {
      font-size: 22px;
      transition: transform 0.2s;
    }

    /* ==== EFEK HOVER (Saat kursor menyentuh) ==== */
    .neon-button:hover {
      background: rgba(50, 50, 50, 0.8);
      border-color: #555;
      color: #ddd;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.7);
    }
    .neon-button:hover i { color: #fff; }

    /* ==== STATE AKTIF (Tombol Menyala) ==== */
    /* Warna Default Aktif: Kuning Neon */
    .neon-button.active {
      background: #222;
      border: 2px solid #ffd000;
      color: #ffd000; /* Teks Kuning */
      box-shadow: 
        0 0 5px #ffd000,
        0 0 20px rgba(255, 208, 0, 0.4),
        inset 0 0 15px rgba(255, 208, 0, 0.1);
    }
    .neon-button.active i {
      color: #ffd000;
      text-shadow: 0 0 10px #ffd000;
    }

    /* ==== VARIASI WARNA AKTIF ==== */

    /* 1. PINK GLOW (Untuk AI & Kendala) */
    .neon-button.active.pink-glow {
      border-color: #ff00cc;
      color: #ff00cc;
      box-shadow: 0 0 5px #ff00cc, 0 0 20px rgba(255, 0, 204, 0.4), inset 0 0 15px rgba(255, 0, 204, 0.1);
    }
    .neon-button.active.pink-glow i { color: #ff00cc; text-shadow: 0 0 10px #ff00cc; }

    /* 2. GREEN GLOW (Untuk Pencarian & Pengaturan) */
    .neon-button.active.green-glow {
      border-color: #39ff14;
      color: #39ff14;
      box-shadow: 0 0 5px #39ff14, 0 0 20px rgba(57, 255, 20, 0.4), inset 0 0 15px rgba(57, 255, 20, 0.1);
    }
    .neon-button.active.green-glow i { color: #39ff14; text-shadow: 0 0 10px #39ff14; }

    /* 3. BLUE GLOW (Untuk Report) */
    .neon-button.active.blue-glow {
      border-color: #00f3ff;
      color: #00f3ff;
      box-shadow: 0 0 5px #00f3ff, 0 0 20px rgba(0, 243, 255, 0.4), inset 0 0 15px rgba(0, 243, 255, 0.1);
    }
    .neon-button.active.blue-glow i { color: #00f3ff; text-shadow: 0 0 10px #00f3ff; }

  </style>
</head>
<body>

  <div class="arcade-menu-grid">
    <!-- 1. KENDALA ALL (Aktif default, Warna Pink) -->
    <button class="neon-button active pink-glow" onclick="loadNotes('KENDALA ALL'); showTab('catatanTab', this)">
      <i class="fas fa-headset"></i>
      <span>KENDALA ALL</span>
    </button>

    <!-- 2. FOTO (Warna Default Kuning) -->
    <button class="neon-button" onclick="loadNotes('FOTO'); showTab('catatanTab', this)">
      <i class="fas fa-camera"></i>
      <span>FOTO</span>
    </button>

    <!-- 3. CARA BERMAIN -->
    <button class="neon-button" onclick="loadNotes('CARA BERMAIN'); showTab('catatanTab', this)">
      <i class="fas fa-book-open"></i>
      <span>CARA BERMAIN</span>
    </button>

    <!-- 4. TRY CARI SELISIH (Warna Hijau) -->
    <button class="neon-button green-glow" onclick="showTab('tryCariTab', this)">
      <i class="fas fa-search"></i>
      <span>TRY CARI SELISIH</span>
    </button>

    <!-- 5. PREDIKSI & HITUNG -->
    <button class="neon-button" onclick="showTab('prediksiGabungTab', this)">
      <i class="fas fa-bullseye"></i>
      <span>PREDIKSI & HITUNG</span>
    </button>

    <!-- 6. CEK BONUS EVENT -->
    <button class="neon-button" onclick="showTab('cekBonusEventTab', this)">
      <i class="fas fa-gem"></i>
      <span>CEK BONUS EVENT</span>
    </button>

    <!-- 7. HADIAH TOGEL -->
    <button class="neon-button" onclick="showHadiahTab(); showTab('cekhadiahTab', this)">
      <i class="fas fa-medal"></i>
      <span>HADIAH TOGEL</span>
    </button>

    <!-- 8. REPORT LINE (Warna Biru) -->
    <button class="neon-button blue-glow" onclick="loadReportLineData(); showTab('reportLineTab', this)">
      <i class="fas fa-file-alt"></i>
      <span>REPORT LINE</span>
    </button>

    <!-- 9. TANYA Z AI (Warna Pink) -->
    <button class="neon-button pink-glow" onclick="showTab('tanyaZTab', this)">
      <i class="fas fa-robot"></i>
      <span>TANYA Z (AI)</span>
    </button>

    <!-- 10. PENGATURAN (Warna Hijau) -->
    <button class="neon-button green-glow" onclick="showTab('pengaturanTab', this); openPengaturan()">
      <span class="quantum-icon">⚙️</span>
      <span>Pengaturan Togel</span>
    </button>
  </div>

  <!-- Script Dummy agar tidak error jika diklik -->
  <script>
    function loadNotes(cat) { console.log('Loading notes: ' + cat); }
    function showTab(tab, btn) { 
      // Hapus class 'active' dari semua tombol
      const buttons = document.querySelectorAll('.neon-button');
      buttons.forEach(b => b.classList.remove('active'));
      
      // Tambah class 'active' ke tombol yang diklik
      btn.classList.add('active');
      console.log('Opening tab: ' + tab); 
    }
    function showHadiahTab() { console.log('Showing Hadiah...'); }
    function loadReportLineData() { console.log('Loading Report...'); }
    function openPengaturan() { console.log('Opening Settings...'); }
  </script>

</body>
</html>

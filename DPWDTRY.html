<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ PREDIKSI & HITUNG TOGEL ⚡</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* === BASE DARK === */
  --bg-base: #02040a;
  --bg-card: rgba(8, 12, 28, 0.85);
  --bg-card-hover: rgba(12, 18, 42, 0.92);
  --bg-panel: rgba(10, 15, 38, 0.78);
  --bg-input: rgba(6, 10, 26, 0.82);
  
  /* === TEXT === */
  --text-primary: #d6e4f0;
  --text-secondary: #8a9bb5;
  --text-muted: #5a6b8a;
  --text-neon: #00d4ff;
  
  /* === NEON BLUE PALETTE - Cool & Balanced === */
  --neon-main: #00c8ff;
  --neon-bright: #4de1ff;
  --neon-deep: #0088cc;
  --neon-glow: rgba(0, 200, 255, 0.35);
  --neon-glow-soft: rgba(0, 200, 255, 0.18);
  --neon-glow-strong: rgba(0, 200, 255, 0.55);
  
  /* === GLOW EFFECTS - Refined === */
  --glow-sm: 0 0 4px var(--neon-glow-soft), 0 0 12px var(--neon-glow-soft);
  --glow-md: 0 0 8px var(--neon-glow), 0 0 24px var(--neon-glow-soft);
  --glow-lg: 0 0 12px var(--neon-glow-strong), 0 0 36px var(--neon-glow), 0 0 60px var(--neon-glow-soft);
  --glow-text: 0 0 6px var(--neon-glow), 0 0 18px var(--neon-glow-soft);
  
  /* === BORDERS === */
  --border-base: rgba(0, 200, 255, 0.22);
  --border-hover: rgba(0, 200, 255, 0.45);
  --border-focus: rgba(0, 200, 255, 0.65);
  
  /* === TRANSITIONS === */
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-bloom: cubic-bezier(0.34, 1.56, 0.64, 1);
  --trans-fast: 180ms var(--ease-smooth);
  --trans-normal: 280ms var(--ease-smooth);
  --trans-bloom: 420ms var(--ease-bloom);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
::selection { background: rgba(0, 200, 255, 0.28); color: var(--text-primary); }

html { scroll-behavior: smooth; }

body {
  font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* === BACKGROUND LAYERS === */
.bg-neon {
  position: fixed; inset: 0; z-index: -3;
  background: 
    radial-gradient(800px 400px at 15% 15%, rgba(0, 200, 255, 0.045), transparent 75%),
    radial-gradient(600px 300px at 85% 25%, rgba(0, 200, 255, 0.035), transparent 75%),
    radial-gradient(900px 450px at 50% 95%, rgba(0, 200, 255, 0.055), transparent 75%),
    linear-gradient(180deg, var(--bg-base) 0%, #030712 55%, var(--bg-base) 100%);
  animation: bgPulse 50s ease-in-out infinite;
}
@keyframes bgPulse {
  0%, 100% { filter: hue-rotate(0deg) brightness(1); }
  33% { filter: hue-rotate(3deg) brightness(1.01); }
  66% { filter: hue-rotate(-3deg) brightness(0.99); }
}

.grid-overlay {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    linear-gradient(rgba(0, 200, 255, 0.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 200, 255, 0.028) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridMove 60s linear infinite;
  opacity: 0.6;
}
@keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 48px 48px; } }

.orb {
  position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.08;
  animation: orbFloat 55s ease-in-out infinite alternate; z-index: -1;
  will-change: transform;
}
.orb-1 { width: 720px; height: 720px; background: var(--neon-main); top: -35%; left: -20%; }
.orb-2 { width: 540px; height: 540px; background: var(--neon-deep); bottom: -30%; right: -18%; animation-delay: -28s; }
@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(32px, -22px) scale(1.03); }
  100% { transform: translate(-20px, 28px) scale(0.98); }
}

.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; width: 2px; height: 2px; border-radius: 50%;
  background: var(--neon-bright); opacity: 0;
  animation: particleFloat 35s infinite ease-in-out;
  box-shadow: 0 0 8px var(--neon-main), 0 0 20px var(--neon-glow-soft);
  will-change: transform, opacity;
}
.particle:nth-child(2n) { background: var(--neon-main); animation-delay: -14s; }
.particle:nth-child(3n) { background: var(--neon-deep); animation-delay: -22s; animation-duration: 42s; }
@keyframes particleFloat {
  0%, 100% { transform: translateY(120vh) rotate(0deg) scale(0.8); opacity: 0; }
  12% { opacity: 0.9; }
  88% { opacity: 0.9; }
  100% { transform: translateY(-20vh) rotate(720deg) scale(1.1); opacity: 0; }
}

/* === MAIN CONTAINER === */
.main-container {
  position: relative; z-index: 10;
  max-width: 1400px; margin: 0 auto; padding: 16px 12px;
}

/* === HEADER === */
.header-section {
  text-align: center; padding: 28px 0 20px;
  animation: fadeInDown 700ms var(--ease-bloom) backwards;
}
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-18px); }
  to { opacity: 1; transform: translateY(0); }
}

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.7rem, 5.5vw, 3rem);
  font-weight: 800; letter-spacing: 2.5px;
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--neon-bright) 35%, var(--neon-main) 65%, var(--neon-deep) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--glow-text);
  animation: titleGlow 5s ease-in-out infinite;
  position: relative; display: inline-block;
}
@keyframes titleGlow {
  0%, 100% { filter: brightness(1) drop-shadow(0 0 8px var(--neon-glow)); }
  50% { filter: brightness(1.12) drop-shadow(0 0 14px var(--neon-glow-strong)); }
}
.main-title::after {
  content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
  width: 75%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-main), var(--neon-bright), var(--neon-main), transparent);
  animation: lineGlow 3.5s ease-in-out infinite;
  border-radius: 1px;
}
@keyframes lineGlow {
  0%, 100% { opacity: 0.6; filter: blur(0.5px); }
  50% { opacity: 0.95; filter: blur(1px); }
}

/* === TABS - Neon Chips === */
.tabs-container {
  display: flex; justify-content: center; gap: 6px;
  margin: 12px 0 20px;
  background: rgba(10, 16, 36, 0.62);
  border: 1px solid var(--border-base);
  border-radius: 16px; padding: 5px;
  max-width: fit-content; margin-inline: auto;
  backdrop-filter: blur(10px);
}
.tab-chip {
  padding: 11px 26px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 600; font-size: 0.88rem;
  color: var(--text-secondary);
  background: transparent; border: none; border-radius: 12px;
  cursor: pointer; transition: all var(--trans-fast);
  position: relative; text-transform: uppercase; letter-spacing: 0.9px;
}
.tab-chip::after {
  content: ''; position: absolute; inset: 0; border-radius: 12px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0, 200, 255, 0.32), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--trans-fast); pointer-events: none;
}
.tab-chip:hover { color: var(--neon-main); transform: translateY(-1px); }
.tab-chip:hover::after { opacity: 1; }
.tab-chip.active {
  color: var(--text-primary);
  background: linear-gradient(135deg, rgba(0, 200, 255, 0.15), rgba(0, 136, 204, 0.12));
  border: 1px solid var(--border-hover);
  box-shadow: var(--glow-md);
  transform: translateY(-1px);
}
.tab-chip.active::before {
  content: ''; position: absolute; bottom: -1px; left: 22%; right: 22%; height: 2px;
  background: var(--neon-main); border-radius: 1px;
  box-shadow: var(--glow-sm);
}

/* === CONTENT BOX - Glass Neon === */
.content-box {
  background: var(--bg-card);
  border: 1px solid var(--border-base);
  border-radius: 22px; padding: 20px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  position: relative; overflow: hidden;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
  transition: box-shadow var(--trans-normal), border-color var(--trans-fast);
}
.content-box:hover { border-color: var(--border-hover); box-shadow: var(--glow-lg); }
.content-box::before {
  content: ''; position: absolute; top: 0; left: -100%; right: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-bright), var(--neon-main), transparent);
  animation: scanGlow 6s linear infinite; opacity: 0.7;
}
@keyframes scanGlow { 100% { left: 100%; right: -100%; } }

/* === SETTINGS PANEL === */
.settings-panel {
  background: linear-gradient(135deg, rgba(12, 18, 46, 0.72), rgba(16, 24, 58, 0.62));
  border: 1px solid var(--border-base); border-radius: 18px;
  padding: 14px 18px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
  backdrop-filter: blur(8px);
}
.setting-item { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
.setting-label {
  color: var(--neon-main); font-size: 0.82rem; font-weight: 600;
  text-shadow: var(--glow-sm); letter-spacing: 0.3px;
}
.input-neon {
  padding: 9px 14px;
  background: var(--bg-input);
  border: 1px solid rgba(0, 200, 255, 0.32);
  border-radius: 12px;
  color: var(--text-primary); font-size: 0.92rem;
  width: 165px; transition: all var(--trans-fast);
  font-family: 'Space Grotesk', sans-serif;
}
.input-neon::placeholder { color: var(--text-muted); opacity: 0.75; }
.input-neon:focus {
  outline: none; border-color: var(--neon-main);
  box-shadow: var(--glow-md);
  background: rgba(8, 14, 34, 0.92);
}

/* === BUTTONS - Neon Glow === */
.btn-neon {
  padding: 9px 20px;
  background: linear-gradient(135deg, var(--neon-main), var(--neon-deep));
  border: none; border-radius: 13px;
  color: #02040a; font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.82rem; cursor: pointer;
  transition: all var(--trans-fast);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1px;
  position: relative; overflow: hidden;
  box-shadow: var(--glow-md);
}
.btn-neon::before {
  content: ''; position: absolute; inset: 0; border-radius: 13px; padding: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.42), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity 180ms;
}
.btn-neon:hover::before { opacity: 1; }
.btn-neon:hover {
  transform: translateY(-2px);
  box-shadow: var(--glow-lg);
  filter: brightness(1.05);
}
.btn-neon:active { transform: translateY(0); filter: brightness(0.98); }
.btn-neon:disabled {
  opacity: 0.48; cursor: not-allowed; transform: none;
  box-shadow: none; filter: none;
}

.status-badge {
  font-size: 0.82rem; color: #00e6b8; margin-left: 8px; font-weight: 600;
  text-shadow: 0 0 10px rgba(0, 230, 184, 0.52);
  animation: pulseSoft 2.8s ease-in-out infinite;
}
@keyframes pulseSoft { 0%, 100% { opacity: 1; } 50% { opacity: 0.78; } }

/* === DATA GRID === */
.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
  gap: 16px;
}

/* === SECTION BOX === */
.section-box {
  background: linear-gradient(145deg, rgba(13, 19, 48, 0.75), rgba(18, 26, 62, 0.65));
  border: 1px solid var(--border-base); border-radius: 19px;
  overflow: hidden; display: flex; flex-direction: column;
  transition: all var(--trans-normal);
  will-change: transform, box-shadow;
}
.section-box:hover {
  border-color: var(--border-hover);
  box-shadow: var(--glow-lg);
  transform: translateY(-2px);
}
.section-header {
  background: linear-gradient(90deg, rgba(0, 200, 255, 0.12), transparent 80%);
  padding: 11px 16px; border-bottom: 1px solid var(--border-base);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title {
  font-family: 'Orbitron', sans-serif; font-weight: 600;
  color: var(--neon-main); font-size: 0.95rem;
  text-shadow: var(--glow-sm); letter-spacing: 0.4px;
}
.badge-count {
  background: rgba(0, 200, 255, 0.14); color: var(--neon-main);
  padding: 3px 10px; border-radius: 18px;
  font-size: 0.72rem; font-weight: 700;
  border: 1px solid rgba(0, 200, 255, 0.35);
  letter-spacing: 0.3px;
}

.search-box { padding: 9px 14px; border-bottom: 1px solid var(--border-base); }
.search-input {
  width: 100%; padding: 8px 13px;
  background: rgba(7, 12, 32, 0.72);
  border: 1px solid rgba(0, 200, 255, 0.28);
  border-radius: 12px;
  color: var(--text-primary); font-size: 0.88rem;
  transition: all var(--trans-fast);
}
.search-input::placeholder { color: var(--text-muted); opacity: 0.72; }
.search-input:focus {
  outline: none; border-color: var(--neon-main);
  box-shadow: var(--glow-md);
  background: rgba(9, 15, 38, 0.85);
}

.section-content {
  padding: 10px; overflow-y: auto; max-height: 410px;
  flex-grow: 1; scroll-behavior: smooth;
}

/* === ITEM CARD === */
.item-card {
  background: linear-gradient(135deg, rgba(11, 17, 44, 0.72), rgba(16, 23, 56, 0.62));
  border: 1px solid var(--border-base); border-radius: 16px;
  padding: 12px 15px; margin-bottom: 8px; cursor: pointer;
  transition: all var(--trans-fast); position: relative; overflow: hidden;
}
.item-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 16px; padding: 1px;
  background: linear-gradient(135deg, transparent, rgba(0, 200, 255, 0.24), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude; opacity: 0; transition: opacity var(--trans-fast);
}
.item-card:hover::before { opacity: 1; }
.item-card:hover {
  border-color: var(--border-hover);
  box-shadow: var(--glow-md);
  background: linear-gradient(135deg, rgba(14, 20, 50, 0.82), rgba(19, 27, 62, 0.72));
  transform: translateY(-2px);
}
.item-label {
  font-size: 0.68rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1.9px;
  margin-bottom: 3px; font-weight: 600;
}
.item-title {
  color: var(--neon-main); font-weight: 600;
  margin-bottom: 4px; font-size: 0.92rem;
}
.item-content {
  font-size: 0.84rem; color: var(--text-primary);
  line-height: 1.45; white-space: pre-wrap; word-break: break-word;
}

/* === PASARAN BOX === */
.pasaran-box {
  background: linear-gradient(135deg, rgba(12, 18, 46, 0.74), rgba(17, 25, 58, 0.64));
  border: 1px solid var(--border-base); border-radius: 18px;
  overflow: hidden; margin-bottom: 10px;
  transition: all var(--trans-normal);
}
.pasaran-box:hover {
  border-color: var(--border-hover);
  box-shadow: var(--glow-lg);
}
.pasaran-header {
  background: linear-gradient(90deg, rgba(0, 200, 255, 0.14), transparent 80%);
  padding: 11px 16px; border-bottom: 1px solid var(--border-base);
}
.pasaran-title {
  font-family: 'Orbitron', sans-serif; font-weight: 600;
  color: var(--neon-main); font-size: 0.88rem;
  text-shadow: var(--glow-sm);
}
.pasaran-content { padding: 7px 12px; max-height: 335px; overflow-y: auto; }

.bet-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 13px; margin-bottom: 5px;
  background: rgba(9, 14, 38, 0.62);
  border: 1px solid var(--border-base); border-radius: 12px;
  cursor: pointer; transition: all var(--trans-fast);
}
.bet-item:hover {
  border-color: var(--border-hover);
  background: rgba(13, 19, 48, 0.78);
  box-shadow: var(--glow-md);
  transform: translateX(3px);
}
.bet-type {
  color: var(--text-primary); font-size: 0.84rem;
  flex: 1; margin-right: 10px; font-weight: 500;
}
.bet-result {
  font-family: 'Orbitron', sans-serif; font-weight: 700;
  color: var(--neon-main); font-size: 0.84rem;
  background: rgba(0, 200, 255, 0.12);
  padding: 3px 9px; border-radius: 10px;
  border: 1px solid rgba(0, 200, 255, 0.32);
  transition: all var(--trans-fast);
}
.bet-item:hover .bet-result {
  background: rgba(0, 200, 255, 0.22);
  box-shadow: 0 0 12px rgba(0, 200, 255, 0.38);
}

/* === NEON SELECTOR === */
.neon-selector {
  background: linear-gradient(135deg, rgba(13, 19, 50, 0.78), rgba(18, 26, 62, 0.68));
  border: 1px solid var(--border-base); border-radius: 19px;
  padding: 16px 18px; margin: 16px 0; backdrop-filter: blur(12px);
  transition: box-shadow var(--trans-normal), border-color var(--trans-fast);
}
.neon-selector:hover { border-color: var(--border-hover); box-shadow: var(--glow-lg); }
.selector-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px; padding-bottom: 13px;
  border-bottom: 1px solid var(--border-base);
}
.selector-icon {
  font-size: 1.35rem; animation: iconBounce 4s ease-in-out infinite;
  filter: drop-shadow(0 0 8px var(--neon-glow));
}
@keyframes iconBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
.selector-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700;
  color: var(--neon-main); font-size: 1.02rem;
  text-shadow: var(--glow-text); letter-spacing: 0.5px;
}

/* === CHIP GROUP === */
.chip-group { margin-bottom: 14px; }
.chip-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.81rem; font-weight: 600;
  color: var(--neon-main); margin-bottom: 9px;
  display: flex; align-items: center; gap: 7px; letter-spacing: 0.4px;
}
.chip-label::before {
  content: ''; width: 3px; height: 14px;
  background: var(--neon-main); border-radius: 1.5px;
  box-shadow: 0 0 6px var(--neon-glow); opacity: 0.85;
}
.chips-row { display: flex; flex-wrap: wrap; gap: 7px; }

.chip {
  padding: 7px 15px; background: rgba(8, 13, 36, 0.76);
  border: 1px solid rgba(0, 200, 255, 0.26); border-radius: 24px;
  color: var(--text-secondary); font-size: 0.82rem; font-weight: 500;
  cursor: pointer; transition: all var(--trans-fast);
  position: relative; overflow: hidden;
}
.chip::before {
  content: ''; position: absolute; inset: 0; border-radius: 24px;
  background: linear-gradient(135deg, transparent, rgba(0, 200, 255, 0.22), transparent);
  opacity: 0; transition: opacity var(--trans-fast);
}
.chip:hover {
  color: var(--neon-main);
  border-color: rgba(0, 200, 255, 0.48);
}
.chip:hover::before { opacity: 1; }
.chip.active {
  color: #02040a;
  background: linear-gradient(135deg, var(--neon-main), var(--neon-deep));
  border-color: var(--neon-main);
  box-shadow: var(--glow-md); font-weight: 700;
}
.chip.active::after {
  content: '✓'; position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%); font-size: 0.75rem; font-weight: 800;
  animation: checkBloom 320ms var(--ease-bloom);
}
@keyframes checkBloom {
  0% { transform: translateY(-50%) scale(0); opacity: 0; }
  60% { transform: translateY(-50%) scale(1.3); opacity: 1; }
  100% { transform: translateY(-50%) scale(1); }
}

/* === RESULT BOX === */
.result-box {
  margin-top: 16px; padding: 16px 20px;
  background: rgba(9, 15, 42, 0.84);
  border: 1px solid rgba(0, 200, 255, 0.34);
  border-radius: 16px;
  font-family: 'Orbitron', sans-serif; font-size: 1.08rem;
  color: var(--neon-main); text-align: center; min-height: 52px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--trans-fast); cursor: pointer;
  text-shadow: var(--glow-sm);
}
.result-box:hover {
  border-color: var(--border-hover);
  box-shadow: var(--glow-lg);
  background: rgba(11, 18, 48, 0.92);
}
.result-box.copied {
  animation: bloomFlash 380ms var(--ease-bloom);
  border-color: #00e6b8;
  box-shadow: 0 0 18px rgba(0, 230, 184, 0.52), 0 0 36px rgba(0, 230, 184, 0.28);
}
@keyframes bloomFlash {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); background: rgba(0, 230, 184, 0.15); }
  100% { transform: scale(1); }
}

/* === HITUNG ROW === */
.hitung-row {
  display: grid; grid-template-columns: 1fr auto; gap: 14px;
  align-items: end; margin-top: 8px;
}
.hitung-btn {
  padding: 11px 24px;
  background: linear-gradient(135deg, var(--neon-main), var(--neon-deep));
  border: none; border-radius: 14px;
  color: #02040a; font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.86rem; cursor: pointer;
  transition: all var(--trans-fast);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 1.1px;
  box-shadow: var(--glow-md);
}
.hitung-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--glow-lg);
  filter: brightness(1.06);
}
.hitung-btn:active { transform: translateY(0); filter: brightness(0.97); }

/* === TOAST - Bloom Notification === */
.toast {
  position: fixed; bottom: 26px; left: 50%;
  transform: translateX(-50%) translateY(110px) scale(0.92);
  background: linear-gradient(135deg, rgba(12, 18, 48, 0.96), rgba(16, 24, 58, 0.93));
  color: var(--neon-main); padding: 12px 28px; border-radius: 48px;
  font-weight: 600; font-size: 0.92rem; opacity: 0;
  transition: all var(--trans-bloom); z-index: 1000;
  border: 1px solid var(--neon-main);
  backdrop-filter: blur(14px);
  text-shadow: 0 0 10px rgba(0, 200, 255, 0.62);
  box-shadow: var(--glow-lg);
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0) scale(1);
  animation: toastBloom 420ms var(--ease-bloom);
}
@keyframes toastBloom {
  0% { transform: translateX(-50%) translateY(0) scale(0.92); }
  50% { transform: translateX(-50%) translateY(-4px) scale(1.02); }
  100% { transform: translateX(-50%) translateY(0) scale(1); }
}

/* === SPINNER === */
.spinner {
  width: 30px; height: 30px;
  border: 2.8px solid rgba(0, 200, 255, 0.24);
  border-top-color: var(--neon-main);
  border-radius: 50%;
  animation: spin 900ms linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* === SCROLLBAR - Neon Dark === */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: rgba(6, 10, 28, 0.55); border-radius: 2.5px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-main), var(--neon-deep));
  border-radius: 2.5px; border: 1px solid rgba(0, 200, 255, 0.26);
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--neon-bright), var(--neon-main));
  box-shadow: 0 0 8px var(--neon-glow);
}

/* === AUTO-UPDATE INDICATOR === */
.auto-update-indicator {
  position: fixed; top: 16px; right: 16px;
  background: rgba(0, 200, 255, 0.12);
  border: 1px solid var(--border-base);
  border-radius: 12px; padding: 6px 13px;
  font-size: 0.78rem; color: var(--neon-main);
  display: none; align-items: center; gap: 6px;
  z-index: 1000; backdrop-filter: blur(10px);
  animation: pulseGlow 1.8s infinite;
  box-shadow: var(--glow-sm);
}
.auto-update-indicator.show { display: flex; }
@keyframes pulseGlow {
  0%, 100% { opacity: 0.72; box-shadow: var(--glow-sm); }
  50% { opacity: 0.95; box-shadow: var(--glow-md); }
}

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .settings-panel { flex-direction: column; align-items: stretch; gap: 12px; }
  .setting-item { width: 100%; justify-content: space-between; }
  .input-neon { width: 100%; }
  .data-grid { grid-template-columns: 1fr; }
  .main-title { font-size: clamp(1.5rem, 6.5vw, 2.4rem); }
  .tab-chip { padding: 10px 20px; font-size: 0.84rem; }
  .hitung-row { grid-template-columns: 1fr; gap: 12px; }
  .hitung-btn { width: 100%; }
  .chips-row { justify-content: center; }
  .content-box { padding: 16px; border-radius: 20px; }
}

/* === FOCUS STATES === */
button:focus-visible, input:focus-visible, [tabindex]:focus-visible {
  outline: 2px solid var(--neon-main);
  outline-offset: 3px;
  box-shadow: var(--glow-md);
}

/* === REDUCED MOTION === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* === UTILITY === */
.text-neon { color: var(--neon-main); text-shadow: var(--glow-sm); }
.glow-hover:hover { box-shadow: var(--glow-lg); }
.no-select { user-select: none; -webkit-user-select: none; }
</style>
</head>
<body>
<div class="bg-neon"></div>
<div class="grid-overlay"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="particles" id="particles"></div>
<div id="toast" class="toast">✨ Berhasil!</div>
<div class="auto-update-indicator" id="autoUpdateIndicator">
  <span>🔄</span><span>Auto-Update Aktif</span>
</div>

<div class="main-container">
  <header class="header-section">
    <h1 class="main-title">⚡ PREDIKSI & HITUNG TOGEL ⚡</h1>
  </header>

  <nav class="tabs-container">
    <button class="tab-chip active" data-tab="prediksi">🔮 Prediksi</button>
    <button class="tab-chip" data-tab="hitung">🧮 Hitung</button>
  </nav>

  <div class="content-box">
    <!-- TAB PREDIKSI -->
    <div id="tab-prediksi" class="tab-content">
      <div class="settings-panel">
        <div class="setting-item">
          <span class="setting-label">📅 Tanggal</span>
          <input type="date" id="input-tanggal" class="input-neon" onchange="autoUpdateTanggal()">
        </div>
        <button class="btn-neon" id="btn-tanggal" onclick="manualUpdateTanggal()">⚡ Update</button>
        <span class="status-badge" id="status-tanggal"></span>
      </div>

      <div class="data-grid">
        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title">🔮 Prediksi</h3>
            <span class="badge-count" id="count-prediksi">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-prediksi" placeholder="🔍 Cari...">
          </div>
          <div class="section-content" id="list-prediksi">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title">📅 Jadwal</h3>
            <span class="badge-count" id="count-jadwal">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-jadwal" placeholder="🔍 Cari...">
          </div>
          <div class="section-content" id="list-jadwal">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
        <div class="section-box">
          <div class="section-header">
            <h3 class="section-title">🔗 Link Live</h3>
            <span class="badge-count" id="count-link">0</span>
          </div>
          <div class="search-box">
            <input type="text" class="search-input" id="search-link" placeholder="🔍 Cari...">
          </div>
          <div class="section-content" id="list-link">
            <div style="display:flex;justify-content:center;padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB HITUNG -->
    <div id="tab-hitung" class="tab-content" style="display:none;">
      <div class="settings-panel">
        <div class="setting-item">
          <span class="setting-label">💰 Nominal</span>
          <input type="number" id="input-nominal" class="input-neon" placeholder="0" onchange="autoUpdateNominal()">
        </div>
        <button class="btn-neon" id="btn-nominal" onclick="manualUpdateNominal()">⚡ Update</button>
        <span class="status-badge" id="status-nominal"></span>
      </div>

      <!-- NEON SELECTOR -->
      <div class="neon-selector">
        <div class="selector-header">
          <span class="selector-icon">🎯</span>
          <h3 class="selector-title">Pilih Hitungan</h3>
        </div>
        
        <div class="chip-group">
          <div class="chip-label">📊 Tipe Hitungan</div>
          <div class="chips-row" id="chipTipe">
            <div class="chip" data-value="">Semua</div>
          </div>
        </div>
        
        <div class="chip-group">
          <div class="chip-label">🏷️ Pilih Label</div>
          <div class="chips-row" id="chipLabel">
            <div class="chip" data-value="">Semua</div>
          </div>
        </div>
        
        <div class="hitung-row">
          <button onclick="tampilkanValueHitungan()" class="hitung-btn">✨ Tampilkan Hasil</button>
        </div>
        
        <div id="resultBox" class="result-box">
          <span style="color: var(--text-secondary);">Pilih tipe & label untuk melihat hasil</span>
        </div>
      </div>

      <div class="data-grid" id="container-hitung" style="margin-top: 12px;">
        <div style="display:flex;justify-content:center;padding:40px;width:100%;"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============ KONFIGURASI ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4',
  keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'),
  autoUpdate: $('autoUpdateIndicator'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};

let selectedTipe = '', selectedLabel = '';

// Particles
function createParticles() {
  const container = $('particles');
  if (!container) return;
  for(let i = 0; i < 42; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 35 + 's';
    p.style.animationDuration = (28 + Math.random() * 18) + 's';
    container.appendChild(p);
  }
}

function showToast(msg) {
  dom.toast.textContent = '✨ ' + msg;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 2800);
}

function showAutoUpdate() {
  if (dom.autoUpdate) {
    dom.autoUpdate.classList.add('show');
    setTimeout(() => dom.autoUpdate.classList.remove('show'), 1800);
  }
}

function copyText(text, element) {
  let finalText = text;
  try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 20 ? finalText.substring(0, 20) + '...' : finalText;
    showToast('📋 Disalin: ' + preview);
    if (element) {
      element.classList.add('copied');
      setTimeout(() => element.classList.remove('copied'), 400);
    }
  }).catch(() => showToast('❌ Gagal salin'));
}

function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

function parseCSV(text) {
  let p = [], row = [], entry = "", st = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(entry); entry = ""; }
      else if (c === '\r' && n === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { entry += '"'; i++; }
      else if (c === '"') st = 0;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); p.push(row); }
  return p;
}

function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error("Fetch Error:", e); return false; }
}

async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = dom.inTgl.value;
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    renderPrediksi();
  } catch(e) {
    console.error("Error Prediksi:", e);
    dom.listP.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">❌ Gagal memuat</p>';
  }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 }, { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 }, { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 }, { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 }, { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    state.hitung = secDef.map(s => {
      let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
      let items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), res = safeGet(data[i], 24);
          if (type || res) items.push({ type, res });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) {
    console.error("Error Hitung:", e);
    dom.contH.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">❌ Gagal memuat</p>';
  }
}

function renderList(container, items, search) {
  const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!filtered.length) { container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">📭 Tidak ada data</p>'; return; }
  container.innerHTML = filtered.map(v => `
    <div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}', this)">
      <div class="item-label">📋 Judul</div>
      <div class="item-title">${v.title}</div>
      <div class="item-label">💬 Isi (Klik untuk Copy)</div>
      <div class="item-content">${v.content}</div>
    </div>
  `).join('');
}

function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}

function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<p style="color:var(--text-muted);text-align:center;">📭 Tidak ada data</p>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-box">
      <div class="pasaran-header"><h3 class="pasaran-title">🎯 ${s.title}</h3></div>
      <div class="pasaran-content">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}', this)">
            <span class="bet-type">${it.type}</span>
            <span class="bet-result">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// === NEON CHIP SELECTOR ===
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + 
    items.map(it => `<div class="chip" data-value="${it.label || it}">${(it.label || it).substring(0, 20)}${(it.label || it).length > 20 ? '...' : ''}</div>`).join('');
  
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (type === 'tipe') {
        selectedTipe = chip.dataset.value;
        updateLabelChips();
      } else {
        selectedLabel = chip.dataset.value;
      }
    };
  });
}

function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) {
    renderChips(dom.chipLabel, [], 'label');
    return;
  }
  const labels = state.kelompok[selectedTipe].map(i => i.label);
  renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}

async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "SEMUA PASARAN" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "BONUS" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "JAKARTA" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "TOTOMALI" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "HOKIDRAW" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY & HK" }
    ];
    state.kelompok = {};
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length > 0) state.kelompok[sec.title] = items;
    });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error("Error loadHitungData:", e); }
}

function tampilkanValueHitungan() {
  const result = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = '<span style="color: var(--text-secondary);">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    result.innerHTML = `<span style="font-weight: 700;">${item.value}</span>`;
    result.onclick = () => copyText(item.value, result);
  }
}

// === AUTO-UPDATE ===
let autoTimeout = null;
function autoUpdateTanggal() {
  showAutoUpdate();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateTanggal, 1000);
}
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal!");
  const p = dom.inTgl.value.split('-');
  const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "⏳...";
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = "✅ OK";
      showToast("📅 Tersimpan!");
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statTgl.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}
function autoUpdateNominal() {
  showAutoUpdate();
  clearTimeout(autoTimeout);
  autoTimeout = setTimeout(manualUpdateNominal, 1000);
}
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Isi nominal!");
  dom.btnNom.disabled = true; dom.statNom.textContent = "⏳...";
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value);
      showToast("💰 Tersimpan!");
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statNom.textContent = "❌"; showToast("❌ Cek URL Script"); }
  });
}

function init() {
  document.querySelectorAll('.tab-chip').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active'));
    t.classList.add('active');
    dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
    dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
  });
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
  fetchPrediksi(); fetchHitung(); loadHitungData();
}

document.addEventListener('DOMContentLoaded', () => {
  createParticles();
  init();
  setTimeout(() => showToast('🌙 Blue Neon Cool Loaded'), 900);
});
</script>
</body>
</html>

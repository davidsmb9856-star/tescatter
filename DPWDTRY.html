<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔷 PREDIKSI & HITUNG TOGEL 🔷</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  /* ═══════════════════════════════════════════════════════════ */
  /* 🌊 NEON BLUE PALETTE - COMFORTABLE COOL */
  /* ═══════════════════════════════════════════════════════════ */
  
  /* Base Backgrounds */
  --bg-void: #00010a;
  --bg-deep: #020617;
  --bg-dark: #0a1128;
  --bg-card: rgba(8, 16, 42, 0.92);
  --bg-card-hover: rgba(14, 28, 68, 0.96);
  --bg-panel: rgba(10, 20, 52, 0.88);
  --bg-glass: rgba(12, 24, 64, 0.82);
  
  /* Neon Blue - Softer & Comfortable */
  --neon-ice: #7ed9f0;
  --neon-cyan: #00c8e8;
  --neon-blue: #00a8d9;
  --neon-blue-main: #0094c4;
  --neon-blue-deep: #0077aa;
  --neon-blue-dark: #005588;
  
  /* Accent Colors */
  --neon-purple: #7a54d4;
  --neon-violet: #9a54d4;
  --neon-pink: #e63d7a;
  --neon-teal: #00d9b8;
  
  /* Text Colors */
  --text-primary: #e6f2f9;
  --text-secondary: #a3c4d9;
  --text-muted: #5a7a94;
  --text-dim: #3a5266;
  
  /* ═══════════════════════════════════════════════════════════ */
  /* 💎 SOFT GLOW EFFECTS - Eye Comfort */
  /* ═══════════════════════════════════════════════════════════ */
  
  --glow-xs: 0 0 3px rgba(0, 200, 232, 0.3), 0 0 8px rgba(0, 168, 217, 0.18);
  --glow-sm: 0 0 5px rgba(0, 200, 232, 0.4), 0 0 14px rgba(0, 168, 217, 0.25), 0 0 28px rgba(0, 184, 217, 0.12);
  --glow-md: 0 0 7px rgba(0, 200, 232, 0.45), 0 0 18px rgba(0, 168, 217, 0.32), 0 0 38px rgba(0, 184, 217, 0.18), 0 0 64px rgba(126, 217, 240, 0.08);
  --glow-lg: 0 0 9px rgba(0, 200, 232, 0.5), 0 0 24px rgba(0, 168, 217, 0.38), 0 0 52px rgba(0, 184, 217, 0.24), 0 0 88px rgba(126, 217, 240, 0.12);
  --glow-title: 0 0 6px rgba(0, 200, 232, 0.35), 0 0 16px rgba(0, 168, 217, 0.22);
  --glow-pulse: 0 0 8px var(--neon-cyan), 0 0 18px rgba(0, 168, 217, 0.28);
  
  /* Borders & Accents */
  --border-neon: rgba(0, 168, 217, 0.35);
  --border-neon-bright: rgba(0, 200, 232, 0.48);
  --border-subtle: rgba(90, 120, 160, 0.15);
  --accent-cyan: rgba(0, 200, 232, 0.12);
  --accent-blue: rgba(0, 168, 217, 0.1);
  --accent-purple: rgba(122, 84, 212, 0.08);
  
  /* Animations */
  --ease-bloom: cubic-bezier(0.22, 1.12, 0.36, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --transition-fast: 150ms var(--ease-smooth);
  --transition-normal: 250ms var(--ease-smooth);
  --transition-bloom: 380ms var(--ease-bloom);
  --transition-bounce: 420ms var(--ease-bounce);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
::selection { background: var(--accent-cyan); color: var(--text-primary); }

body {
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  background: var(--bg-void);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════════════════ */
/* 🌌 BACKGROUND - Subtle Cosmic */
/* ═══════════════════════════════════════════════════════════ */

.bg-neon {
  position: fixed; inset: 0; z-index: -4;
  background: 
    radial-gradient(1200px 600px at 15% 15%, rgba(0, 200, 232, 0.08), transparent 65%),
    radial-gradient(900px 500px at 85% 25%, rgba(122, 84, 212, 0.06), transparent 70%),
    radial-gradient(1100px 550px at 50% 100%, rgba(0, 168, 217, 0.09), transparent 62%),
    radial-gradient(700px 400px at 25% 75%, rgba(0, 168, 217, 0.05), transparent 72%),
    linear-gradient(145deg, var(--bg-void) 0%, #030a1f 35%, var(--bg-deep) 65%, #020617 100%);
  animation: cosmicFlow 80s ease-in-out infinite alternate;
}

@keyframes cosmicFlow {
  0%, 100% { filter: hue-rotate(0deg) brightness(1); transform: scale(1); }
  50% { filter: hue-rotate(2deg) brightness(1.015); transform: scale(1.003); }
}

.grid-hex {
  position: fixed; inset: 0; z-index: -3; pointer-events: none;
  background-image: 
    radial-gradient(circle at 25% 25%, rgba(0, 168, 217, 0.03) 0%, transparent 55%),
    radial-gradient(circle at 75% 75%, rgba(0, 200, 232, 0.025) 0%, transparent 55%);
  background-size: 120px 120px;
  animation: hexPulse 50s ease-in-out infinite;
  opacity: 0.75;
}
@keyframes hexPulse { 0%, 100% { opacity: 0.65; } 50% { opacity: 0.82; } }

.grid-lines {
  position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background-image: 
    linear-gradient(rgba(0, 168, 217, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 168, 217, 0.035) 1px, transparent 1px);
  background-size: 70px 70px;
  animation: matrixDrift 85s linear infinite;
  opacity: 0.65;
}
@keyframes matrixDrift { 0% { background-position: 0 0; } 100% { background-position: 70px 70px; } }

.orb {
  position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.1;
  animation: orbCosmic 70s ease-in-out infinite alternate; z-index: -1;
  mix-blend-mode: screen;
}
.orb-1 { width: 850px; height: 850px; background: radial-gradient(circle, var(--neon-cyan), transparent 75%); top: -25%; left: -12%; }
.orb-2 { width: 620px; height: 620px; background: radial-gradient(circle, var(--neon-purple), transparent 75%); bottom: -22%; right: -10%; animation-delay: -35s; }
.orb-3 { width: 480px; height: 480px; background: radial-gradient(circle, var(--neon-blue), transparent 75%); top: 45%; left: 55%; animation-delay: -20s; animation-duration: 62s; }

@keyframes orbCosmic {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.09; }
  50% { transform: translate(25px, -15px) scale(1.04); opacity: 0.12; }
}

.particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute; width: 2px; height: 2px; border-radius: 50%;
  background: var(--neon-cyan); opacity: 0;
  animation: starRise 48s infinite ease-in-out;
  box-shadow: 0 0 6px var(--neon-blue), 0 0 16px rgba(0, 200, 232, 0.35);
}
.particle:nth-child(3n+1) { background: var(--neon-blue); animation-delay: -14s; animation-duration: 52s; }
.particle:nth-child(3n+2) { background: var(--neon-purple); animation-delay: -28s; animation-duration: 44s; }
.particle:nth-child(3n+3) { background: var(--neon-cyan); animation-delay: -8s; animation-duration: 56s; }

@keyframes starRise {
  0%, 100% { transform: translateY(125vh) translateX(0) rotate(0deg) scale(0.7); opacity: 0; }
  10% { opacity: 0.88; }
  50% { transform: translateY(55vh) translateX(-6px) rotate(280deg) scale(1.08); }
  85% { opacity: 0.52; }
  100% { transform: translateY(-20vh) translateX(0) rotate(540deg) scale(0.6); opacity: 0; }
}

.scanline-overlay {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0, 168, 217, 0.012) 2px, rgba(0, 168, 217, 0.012) 4px);
  animation: scanMove 12s linear infinite;
  opacity: 0.85;
}
@keyframes scanMove { 0% { background-position: 0 0; } 100% { background-position: 0 100vh; } }

/* ═══════════════════════════════════════════════════════════ */
/* 🎨 MAIN CONTAINER & LAYOUT */
/* ═══════════════════════════════════════════════════════════ */

.main-container { position: relative; z-index: 10; max-width: 1480px; margin: 0 auto; padding: 20px; }

.header-section { text-align: center; padding: 28px 0 20px; animation: headerReveal 0.8s var(--transition-bloom) backwards; }
@keyframes headerReveal { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

/* ═══════════════════════════════════════════════════════════ */
/* 🎯 MAIN TITLE - SOFT NEON (NOT BLINDING) */
/* ═══════════════════════════════════════════════════════════ */

.main-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.8rem, 5.5vw, 3rem);
  font-weight: 800; letter-spacing: 3px;
  background: linear-gradient(135deg, 
    var(--text-primary) 0%, 
    var(--neon-cyan) 40%, 
    var(--neon-blue) 70%, 
    var(--neon-blue-deep) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: var(--glow-title);
  animation: titleSoftPulse 7s ease-in-out infinite alternate;
  position: relative; display: inline-block;
}

@keyframes titleSoftPulse {
  0%, 100% { 
    filter: brightness(1);
    text-shadow: var(--glow-title);
  }
  50% { 
    filter: brightness(1.08);
    text-shadow: 0 0 8px rgba(0, 200, 232, 0.42), 0 0 20px rgba(0, 168, 217, 0.28);
  }
}

/* Subtle underline - no intense glow */
.main-title::after {
  content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
  width: 75%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), transparent);
  animation: underlineSoft 5s ease-in-out infinite;
  border-radius: 2px;
  opacity: 0.75;
}
@keyframes underlineSoft {
  0%, 100% { opacity: 0.65; transform: translateX(-50%) scaleX(0.95); }
  50% { opacity: 0.85; transform: translateX(-50%) scaleX(1.02); }
}

.header-subtitle {
  color: var(--text-secondary); font-size: 1.05rem; margin-top: 14px;
  text-shadow: 0 0 6px rgba(0, 168, 217, 0.25);
  animation: fadeInUp 0.9s var(--transition-bloom) 0.15s backwards;
}
@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ═══════════════════════════════════════════════════════════ */
/* 🎯 TABS - Soft Neon Chips */
/* ═══════════════════════════════════════════════════════════ */

.tabs-container {
  display: flex; justify-content: center; gap: 6px;
  margin: 14px 0 22px; padding: 5px;
  background: var(--bg-panel);
  border: 1px solid var(--border-neon);
  border-radius: 18px;
  max-width: fit-content; margin-inline: auto;
  box-shadow: var(--glow-sm);
}

.tab-chip {
  padding: 10px 26px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 600; font-size: 0.9rem;
  color: var(--text-muted);
  background: transparent; border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: all var(--transition-normal);
  text-transform: uppercase; letter-spacing: 1.2px;
}
.tab-chip:hover { color: var(--neon-cyan); text-shadow: var(--glow-sm); transform: translateY(-1px); }
.tab-chip.active {
  color: var(--text-primary);
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  border: 1px solid var(--border-neon-bright);
  box-shadow: var(--glow-md);
  text-shadow: 0 0 8px rgba(0, 200, 232, 0.35);
}

/* ═══════════════════════════════════════════════════════════ */
/* 📦 CONTENT BOX */
/* ═══════════════════════════════════════════════════════════ */

.content-box {
  background: var(--bg-card);
  border: 1px solid var(--border-neon);
  border-radius: 24px;
  padding: 22px;
  backdrop-filter: blur(18px);
  position: relative;
  overflow: hidden;
  box-shadow: var(--glow-sm);
}

.content-box::before {
  content: ''; position: absolute; top: 0; left: -100%; right: 100%; height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-cyan), transparent);
  animation: borderScan 8s linear infinite;
  opacity: 0.7;
}
@keyframes borderScan { 0% { left: -100%; right: 100%; } 50% { left: 0%; right: 0%; } 100% { left: 100%; right: -100%; } }

/* ═══════════════════════════════════════════════════════════ */
/* ⚙️ SETTINGS PANEL */
/* ═══════════════════════════════════════════════════════════ */

.settings-panel {
  background: var(--bg-glass);
  border: 1px solid var(--border-neon);
  border-radius: 18px;
  padding: 14px 18px;
  margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 14px;
  align-items: center; justify-content: center;
}

.setting-item { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
.setting-label {
  color: var(--neon-cyan); font-size: 0.82rem; font-weight: 600;
  text-shadow: 0 0 6px rgba(0, 200, 232, 0.3);
}

.input-neon {
  padding: 9px 14px;
  background: rgba(4, 10, 32, 0.82);
  border: 1px solid rgba(0, 168, 217, 0.32);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 0.92rem;
  width: 165px;
  transition: all var(--transition-fast);
  font-family: 'Rajdhani', sans-serif;
}
.input-neon::placeholder { color: var(--text-muted); opacity: 0.8; }
.input-neon:focus {
  outline: none;
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-md);
  background: rgba(6, 14, 42, 0.92);
}

/* ═══════════════════════════════════════════════════════════ */
/* 🔘 BUTTONS - Soft Bloom */
/* ═══════════════════════════════════════════════════════════ */

.btn-neon {
  padding: 10px 22px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-blue-deep));
  border: none; border-radius: 14px;
  color: #000610;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.86rem;
  cursor: pointer;
  transition: all var(--transition-bloom);
  text-transform: uppercase; letter-spacing: 1.1px;
  position: relative; overflow: hidden;
  box-shadow: var(--glow-sm);
}
.btn-neon::before {
  content: ''; position: absolute; inset: 0; border-radius: 14px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transform: translateX(-100%); transition: transform 0.5s ease;
}
.btn-neon:hover::before { transform: translateX(100%); }
.btn-neon:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: var(--glow-md);
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
}
.btn-neon:active { transform: translateY(0) scale(0.98); transition-duration: 70ms; }
.btn-neon:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

.status-badge {
  font-size: 0.82rem; color: #00e6c4; margin-left: 8px; font-weight: 600;
  text-shadow: 0 0 8px rgba(0, 230, 196, 0.4);
  animation: badgePulse 3s ease-in-out infinite;
}
@keyframes badgePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.78; } }

/* ═══════════════════════════════════════════════════════════ */
/* 📊 DATA GRID */
/* ═══════════════════════════════════════════════════════════ */

.data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(285px, 1fr)); gap: 18px; }

.section-box {
  background: linear-gradient(145deg, rgba(10, 22, 58, 0.82), rgba(16, 32, 78, 0.72));
  border: 1px solid var(--border-neon);
  border-radius: 20px;
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: all var(--transition-normal);
  box-shadow: var(--glow-sm);
}
.section-box:hover { border-color: var(--border-neon-bright); box-shadow: var(--glow-md); transform: translateY(-2px); }

.section-header {
  background: linear-gradient(90deg, rgba(0, 168, 217, 0.12), transparent 78%);
  padding: 12px 16px; border-bottom: 1px solid var(--border-subtle);
  display: flex; justify-content: space-between; align-items: center;
}
.section-title {
  font-family: 'Orbitron', sans-serif; font-weight: 600; color: var(--neon-cyan);
  font-size: 0.96rem; text-shadow: 0 0 8px rgba(0, 200, 232, 0.28);
}
.badge-count {
  background: var(--accent-cyan); color: var(--neon-cyan);
  padding: 3px 10px; border-radius: 18px;
  font-size: 0.72rem; font-weight: 700;
  border: 1px solid rgba(0, 200, 232, 0.32);
}

.search-box { padding: 10px 14px; border-bottom: 1px solid var(--border-subtle); }
.search-input {
  width: 100%; padding: 9px 13px;
  background: rgba(5, 12, 36, 0.72);
  border: 1px solid rgba(0, 168, 217, 0.28);
  border-radius: 12px;
  color: var(--text-primary); font-size: 0.88rem;
  transition: all var(--transition-fast);
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { outline: none; border-color: var(--neon-cyan); box-shadow: var(--glow-md); }

.section-content { padding: 10px; overflow-y: auto; max-height: 410px; flex-grow: 1; }

/* ═══════════════════════════════════════════════════════════ */
/* 🃏 ITEM CARD */
/* ═══════════════════════════════════════════════════════════ */

.item-card {
  background: linear-gradient(135deg, rgba(8, 18, 52, 0.75), rgba(14, 28, 72, 0.65));
  border: 1px solid var(--border-subtle);
  border-radius: 16px;
  padding: 13px 15px; margin-bottom: 9px;
  cursor: pointer; transition: all var(--transition-bloom);
  position: relative; overflow: hidden;
}
.item-card:hover {
  border-color: var(--border-neon-bright);
  box-shadow: var(--glow-md);
  background: linear-gradient(135deg, rgba(12, 24, 64, 0.85), rgba(18, 36, 84, 0.75));
  transform: translateY(-2px);
}
.item-label {
  font-size: 0.68rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 2px;
  margin-bottom: 3px; font-weight: 600;
}
.item-title {
  color: var(--neon-cyan); font-weight: 600; margin-bottom: 4px;
  font-size: 0.92rem; text-shadow: 0 0 6px rgba(0, 200, 232, 0.25);
}
.item-content {
  font-size: 0.84rem; color: var(--text-secondary);
  line-height: 1.45; white-space: pre-wrap; word-break: break-word;
}

/* ═══════════════════════════════════════════════════════════ */
/* 🎰 PASARAN BOX */
/* ═══════════════════════════════════════════════════════════ */

.pasaran-box {
  background: linear-gradient(135deg, rgba(9, 20, 56, 0.78), rgba(15, 30, 76, 0.68));
  border: 1px solid var(--border-subtle);
  border-radius: 18px;
  overflow: hidden; margin-bottom: 11px;
  transition: all var(--transition-normal);
}
.pasaran-box:hover { border-color: var(--border-neon-bright); box-shadow: var(--glow-sm); }

.pasaran-header {
  background: linear-gradient(90deg, rgba(0, 168, 217, 0.14), transparent 80%);
  padding: 11px 16px; border-bottom: 1px solid var(--border-subtle);
}
.pasaran-title {
  font-family: 'Orbitron', sans-serif; font-weight: 600; color: var(--neon-cyan);
  font-size: 0.88rem; text-shadow: 0 0 7px rgba(0, 200, 232, 0.25);
}
.pasaran-content { padding: 8px 12px; max-height: 335px; overflow-y: auto; }

.bet-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; margin-bottom: 5px;
  background: rgba(6, 14, 42, 0.62);
  border: 1px solid var(--border-subtle);
  border-radius: 12px;
  cursor: pointer; transition: all var(--transition-bloom);
}
.bet-item:hover {
  border-color: var(--border-neon-bright);
  background: rgba(10, 22, 62, 0.78);
  box-shadow: var(--glow-sm);
  transform: translateX(3px);
}
.bet-type { color: var(--text-secondary); font-size: 0.82rem; flex: 1; margin-right: 10px; }
.bet-result {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan);
  font-size: 0.84rem; background: var(--accent-cyan);
  padding: 3px 9px; border-radius: 10px;
  border: 1px solid rgba(0, 200, 232, 0.32);
  text-shadow: 0 0 6px rgba(0, 200, 232, 0.28);
}

/* ═══════════════════════════════════════════════════════════ */
/* 🎯 NEON SELECTOR */
/* ═══════════════════════════════════════════════════════════ */

.neon-selector {
  background: linear-gradient(135deg, rgba(11, 24, 64, 0.82), rgba(18, 36, 86, 0.72));
  border: 1px solid var(--border-neon);
  border-radius: 20px;
  padding: 18px; margin: 18px 0;
  backdrop-filter: blur(14px);
  box-shadow: var(--glow-sm);
}

.selector-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border-subtle);
}
.selector-icon { font-size: 1.4rem; animation: iconBounce 4.5s ease-in-out infinite; }
@keyframes iconBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
.selector-title {
  font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--neon-cyan);
  font-size: 1.05rem; text-shadow: 0 0 8px rgba(0, 200, 232, 0.3);
}

.chip-group { margin-bottom: 14px; }
.chip-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.82rem; font-weight: 600;
  color: var(--neon-cyan); margin-bottom: 9px;
  display: flex; align-items: center; gap: 7px;
}
.chip-label::before {
  content: ''; width: 3px; height: 14px;
  background: var(--neon-cyan); border-radius: 2px;
  box-shadow: 0 0 6px var(--neon-cyan); opacity: 0.8;
}

.chips-row { display: flex; flex-wrap: wrap; gap: 8px; }

.chip {
  padding: 7px 16px;
  background: rgba(6, 14, 46, 0.78);
  border: 1px solid rgba(0, 168, 217, 0.25);
  border-radius: 24px;
  color: var(--text-muted); font-size: 0.82rem; font-weight: 500;
  cursor: pointer; transition: all var(--transition-bloom);
  position: relative; overflow: hidden;
}
.chip:hover { color: var(--neon-cyan); border-color: rgba(0, 200, 232, 0.42); text-shadow: var(--glow-sm); }
.chip.active {
  color: #000408;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
  border-color: var(--neon-cyan);
  box-shadow: var(--glow-md);
  font-weight: 700;
}
.chip.active::after {
  content: '✓'; position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%); font-size: 0.75rem; font-weight: 800;
  animation: checkPop 0.3s var(--ease-bloom);
}
@keyframes checkPop { 0% { transform: translateY(-50%) scale(0); } 70% { transform: translateY(-50%) scale(1.25); } 100% { transform: translateY(-50%) scale(1); } }

.result-box {
  margin-top: 16px; padding: 16px 22px;
  background: rgba(7, 18, 56, 0.88);
  border: 1.5px solid rgba(0, 168, 217, 0.38);
  border-radius: 16px;
  font-family: 'Orbitron', sans-serif; font-size: 1.15rem;
  color: var(--neon-cyan); text-align: center;
  min-height: 56px; display: flex; align-items: center; justify-content: center;
  transition: all var(--transition-bloom); cursor: pointer;
  box-shadow: var(--glow-sm);
}
.result-box:hover { border-color: var(--neon-cyan); box-shadow: var(--glow-md); }
.result-box.copied {
  animation: copySuccess 0.4s var(--ease-bloom);
  border-color: #00d9b8; box-shadow: 0 0 16px rgba(0, 217, 184, 0.45);
}
@keyframes copySuccess { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

.hitung-row { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: end; margin-top: 8px; }
.hitung-btn {
  padding: 12px 26px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
  border: none; border-radius: 14px;
  color: #000510; font-family: 'Orbitron', sans-serif;
  font-weight: 700; font-size: 0.88rem; cursor: pointer;
  transition: all var(--transition-bloom);
  text-transform: uppercase; letter-spacing: 1.2px;
  box-shadow: var(--glow-sm);
}
.hitung-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: var(--glow-md); }
.hitung-btn:active { transform: translateY(0) scale(0.97); transition-duration: 60ms; }

/* ═══════════════════════════════════════════════════════════ */
/* 🍞 TOAST */
/* ═══════════════════════════════════════════════════════════ */

.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(120px) scale(0.94);
  background: linear-gradient(135deg, rgba(10, 22, 62, 0.96), rgba(16, 32, 84, 0.94));
  color: var(--neon-cyan); padding: 13px 32px; border-radius: 52px;
  font-weight: 600; font-size: 0.92rem; opacity: 0;
  transition: all var(--transition-bloom); z-index: 1000;
  border: 1.5px solid var(--neon-cyan);
  backdrop-filter: blur(16px);
  text-shadow: 0 0 8px rgba(0, 200, 232, 0.4);
  box-shadow: var(--glow-md);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

/* ═══════════════════════════════════════════════════════════ */
/* 🌀 SPINNER */
/* ═══════════════════════════════════════════════════════════ */

.spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(0, 168, 217, 0.22);
  border-top-color: var(--neon-cyan);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════════════════ */
/* 🔄 AUTO-UPDATE */
/* ═══════════════════════════════════════════════════════════ */

.auto-update-indicator {
  position: fixed; top: 16px; right: 16px;
  background: rgba(0, 168, 217, 0.12);
  border: 1px solid var(--border-neon);
  border-radius: 12px;
  padding: 6px 14px;
  font-size: 0.78rem; color: var(--neon-cyan);
  display: none; align-items: center; gap: 7px;
  z-index: 1000; backdrop-filter: blur(10px);
  animation: indicatorPulse 2s infinite;
}
.auto-update-indicator.show { display: flex; }
@keyframes indicatorPulse { 0%, 100% { opacity: 0.75; } 50% { opacity: 0.95; } }

/* ═══════════════════════════════════════════════════════════ */
/* 🎨 SCROLLBAR */
/* ═══════════════════════════════════════════════════════════ */

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: rgba(4, 10, 32, 0.6); border-radius: 3px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--neon-cyan), var(--neon-blue));
  border-radius: 3px; border: 1px solid rgba(0, 168, 217, 0.25);
}

/* ═══════════════════════════════════════════════════════════ */
/* 📱 RESPONSIVE */
/* ═══════════════════════════════════════════════════════════ */

@media (max-width: 768px) {
  .settings-panel { flex-direction: column; align-items: stretch; padding: 16px; }
  .setting-item { width: 100%; justify-content: space-between; }
  .input-neon { width: 100%; }
  .data-grid { grid-template-columns: 1fr; }
  .main-title { font-size: clamp(1.6rem, 6.5vw, 2.4rem); }
  .tab-chip { padding: 10px 22px; font-size: 0.86rem; }
  .hitung-row { grid-template-columns: 1fr; gap: 12px; }
  .hitung-btn { width: 100%; }
  .chips-row { justify-content: center; }
}

@media (max-width: 480px) {
  .main-container { padding: 12px; }
  .header-section { padding: 22px 0 16px; }
  .tabs-container { gap: 4px; padding: 4px; }
  .tab-chip { padding: 9px 18px; font-size: 0.8rem; }
  .section-content { max-height: 370px; }
  .toast { width: calc(100% - 32px); padding: 12px 24px; font-size: 0.88rem; }
}

/* ═══════════════════════════════════════════════════════════ */
/* ⚡ UTILITIES */
/* ═══════════════════════════════════════════════════════════ */

button:focus-visible, input:focus-visible, .item-card:focus-visible {
  outline: 2px solid var(--neon-cyan); outline-offset: 3px; box-shadow: var(--glow-md);
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important; transition-duration: 0.01ms !important;
  }
}
.empty-state { text-align: center; color: var(--text-muted); padding: 28px 16px; font-style: italic; }
.loading-overlay { display: flex; justify-content: center; padding: 24px; }
</style>
</head>

<div class="orb orb-3"></div>

<!-- Toast -->
<div id="toast" class="toast">✨ Berhasil!</div>
<div class="auto-update-indicator" id="autoUpdateIndicator">

<!-- Main -->
<div class="main-container">

<script>
// ═══════════════════════════════════════════════════════════
// ⚙️ KONFIGURASI & STATE
// ═══════════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbya8o-PPA76I8CsTlEVmcANKVuxapOGU5WhhienU7NNQ6HO-igG4Ly8yZPujUZE6DFRlw/exec'.trim();
const CONFIG = {
  sheetPrediksi: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1065490622'.trim(),
  sheetHitung: 'https://docs.google.com/spreadsheets/d/1z5FYVvB0E9BeE3cRbl4id1YWi6lRB_2qzMhIvgz4Xx0/export?format=csv&gid=1584456810'.trim(),
  keyTanggal: 'togel_tanggal_v4', keyNominal: 'togel_nominal_v4'
};
const state = { prediksi: [], jadwal: [], link: [], hitung: [], kelompok: {} };
const $ = id => document.getElementById(id);
const dom = {
  tabP: $('tab-prediksi'), tabH: $('tab-hitung'),
  inTgl: $('input-tanggal'), btnTgl: $('btn-tanggal'), statTgl: $('status-tanggal'),
  inNom: $('input-nominal'), btnNom: $('btn-nominal'), statNom: $('status-nominal'),
  srcP: $('search-prediksi'), srcJ: $('search-jadwal'), srcL: $('search-link'),
  listP: $('list-prediksi'), listJ: $('list-jadwal'), listL: $('list-link'),
  cntP: $('count-prediksi'), cntJ: $('count-jadwal'), cntL: $('count-link'),
  contH: $('container-hitung'), toast: $('toast'),
  autoUpdate: $('autoUpdateIndicator'),
  chipTipe: $('chipTipe'), chipLabel: $('chipLabel'), resultBox: $('resultBox')
};
let selectedTipe = '', selectedLabel = '', autoTimeout = null;

// ═══════════════════════════════════════════════════════════
// 🎨 PARTICLES
// ═══════════════════════════════════════════════════════════
function createParticles() {
  const container = $('particles');
  if (!container) return;
  for(let i = 0; i < 38; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 48 + 's';
    p.style.animationDuration = (40 + Math.random() * 20) + 's';
    container.appendChild(p);
  }
}

// ═══════════════════════════════════════════════════════════
// 🔔 UTILS
// ═══════════════════════════════════════════════════════════
function showToast(msg) {
  dom.toast.textContent = '✨ ' + msg;
  dom.toast.classList.add('show');
  setTimeout(() => dom.toast.classList.remove('show'), 2800);
}
function showAutoUpdate() {
  if (dom.autoUpdate) {
    dom.autoUpdate.classList.add('show');
    setTimeout(() => dom.autoUpdate.classList.remove('show'), 1800);
  }
}
function copyText(text, element) {
  let finalText = text;
  try { finalText = decodeURIComponent(text); } catch(e) {}
  navigator.clipboard.writeText(finalText).then(() => {
    const preview = finalText.length > 22 ? finalText.substring(0, 22) + '...' : finalText;
    showToast('📋 Disalin: ' + preview);
    if (element) {
      element.classList.add('copied');
      setTimeout(() => element.classList.remove('copied'), 400);
    }
  }).catch(() => showToast('❌ Gagal menyalin'));
}
function formatNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

// ═══════════════════════════════════════════════════════════
// 📄 CSV PARSER
// ═══════════════════════════════════════════════════════════
function parseCSV(text) {
  let p = [], row = [], entry = "", st = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (st === 0) {
      if (c === '"') st = 1;
      else if (c === ',') { row.push(entry); entry = ""; }
      else if (c === '\r' && n === '\n') { row.push(entry); p.push(row); row = []; entry = ""; i++; }
      else if (c === '\n' || c === '\r') { row.push(entry); p.push(row); row = []; entry = ""; }
      else entry += c;
    } else if (st === 1) {
      if (c === '"' && n === '"') { entry += '"'; i++; }
      else if (c === '"') st = 0;
      else entry += c;
    }
  }
  if (entry || row.length) { row.push(entry); p.push(row); }
  return p;
}
function safeGet(row, idx) { return row && row[idx] !== undefined ? row[idx] : ""; }

// ═══════════════════════════════════════════════════════════
// 🔄 DATA FETCHING
// ═══════════════════════════════════════════════════════════
async function updateSheet(action, value) {
  if (SCRIPT_URL.includes('YOUR_SCRIPT_ID')) { showToast('❌ Script URL belum disetup!'); return false; }
  try {
    const params = new URLSearchParams({ action, value });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    return (await res.text()).includes('SUCCESS');
  } catch(e) { console.error("Fetch Error:", e); return false; }
}

async function fetchPrediksi() {
  try {
    const res = await fetch(CONFIG.sheetPrediksi + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    state.prediksi = []; state.jadwal = []; state.link = [];
    if (data[0]) {
      const raw = safeGet(data[0], 1);
      if (raw) {
        const p = raw.split('/');
        if (p.length === 3) {
          dom.inTgl.value = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          dom.statTgl.textContent = dom.inTgl.value;
        }
      }
    }
    for (let i = 2; i <= 84 && i < data.length; i++) {
      const txt = safeGet(data[i], 1);
      if (txt) state.prediksi.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 2; i <= 55 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.jadwal.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    for (let i = 56; i <= 82 && i < data.length; i++) {
      const txt = safeGet(data[i], 2);
      if (txt) state.link.push({ title: txt.split(/[\s,]+/)[0], content: txt });
    }
    renderPrediksi();
  } catch(e) {
    console.error("Error Prediksi:", e);
    dom.listP.innerHTML = '<p class="empty-state">❌ Gagal memuat data</p>';
  }
}

async function fetchHitung() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42 }, { tRow: 43, tCol: 24, start: 45, end: 80 },
      { tRow: 81, tCol: 24, start: 83, end: 119 }, { tRow: 120, tCol: 24, start: 122, end: 153 },
      { tRow: 154, tCol: 24, start: 156, end: 179 }, { tRow: 180, tCol: 24, start: 182, end: 213 },
      { tRow: 215, tCol: 24, start: 217, end: 248 }, { tRow: 249, tCol: 24, start: 251, end: 282 },
      { tRow: 283, tCol: 24, start: 285, end: 316 }
    ];
    state.hitung = secDef.map(s => {
      let title = safeGet(data[s.tRow], s.tCol) || "PASARAN";
      let items = [];
      for (let i = s.start; i <= s.end && i < data.length; i++) {
        if (data[i]) {
          const type = safeGet(data[i], 23), res = safeGet(data[i], 24);
          if (type || res) items.push({ type, res });
        }
      }
      return { title, items };
    }).filter(s => s.items.length > 0);
    renderHitung();
  } catch(e) {
    console.error("Error Hitung:", e);
    dom.contH.innerHTML = '<p class="empty-state">❌ Gagal memuat data</p>';
  }
}

// ═══════════════════════════════════════════════════════════
// 🎨 RENDERING
// ═══════════════════════════════════════════════════════════
function renderList(container, items, search) {
  const filtered = items.filter(i => i.content.toLowerCase().includes(search.toLowerCase()));
  if (!filtered.length) { container.innerHTML = '<p class="empty-state">📭 Tidak ada data</p>'; return; }
  container.innerHTML = filtered.map(v => `
    <div class="item-card" onclick="copyText('${encodeURIComponent(v.content)}', this)" tabindex="0">
      <div class="item-label">📋 Judul</div>
      <div class="item-title">${v.title}</div>
      <div class="item-label">💬 Isi (Klik untuk Copy)</div>
      <div class="item-content">${v.content}</div>
    </div>
  `).join('');
}
function renderPrediksi() {
  renderList(dom.listP, state.prediksi, dom.srcP.value);
  renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  renderList(dom.listL, state.link, dom.srcL.value);
  dom.cntP.textContent = state.prediksi.length;
  dom.cntJ.textContent = state.jadwal.length;
  dom.cntL.textContent = state.link.length;
}
function renderHitung() {
  if (!state.hitung.length) { dom.contH.innerHTML = '<p class="empty-state">📭 Tidak ada data</p>'; return; }
  dom.contH.innerHTML = state.hitung.map(s => `
    <div class="pasaran-box">
      <div class="pasaran-header"><h3 class="pasaran-title">🎯 ${s.title}</h3></div>
      <div class="pasaran-content">
        ${s.items.map(it => `
          <div class="bet-item" onclick="copyText('${encodeURIComponent(it.res)}', this)" tabindex="0">
            <span class="bet-type">${it.type}</span>
            <span class="bet-result">${it.res}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════
// 🎯 CHIP SELECTOR
// ═══════════════════════════════════════════════════════════
function renderChips(container, items, type) {
  container.innerHTML = '<div class="chip" data-value="">Semua</div>' + 
    items.map(it => {
      const label = it.label || it;
      const display = label.length > 22 ? label.substring(0, 22) + '...' : label;
      return `<div class="chip" data-value="${label}">${display}</div>`;
    }).join('');
  container.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      if (type === 'tipe') { selectedTipe = chip.dataset.value; updateLabelChips(); }
      else { selectedLabel = chip.dataset.value; }
    };
  });
}
function updateLabelChips() {
  if (!selectedTipe || !state.kelompok[selectedTipe]) { renderChips(dom.chipLabel, [], 'label'); return; }
  const labels = state.kelompok[selectedTipe].map(i => i.label);
  renderChips(dom.chipLabel, labels.map(l => ({ label: l })), 'label');
}
async function loadHitungData() {
  try {
    const res = await fetch(CONFIG.sheetHitung + '&t=' + Date.now());
    const data = parseCSV(await res.text());
    if (data[0]) {
      const nom = safeGet(data[0], 23);
      if (nom) { dom.inNom.value = nom; dom.statNom.textContent = "💰 Rp " + formatNum(nom); }
    }
    const secDef = [
      { tRow: 0, tCol: 24, start: 2, end: 42, title: "SEMUA PASARAN" },
      { tRow: 43, tCol: 24, start: 45, end: 80, title: "TOTO MACAU 4D" },
      { tRow: 81, tCol: 24, start: 83, end: 119, title: "TOTO MACAU 5D" },
      { tRow: 120, tCol: 24, start: 122, end: 153, title: "KINGKONG 4D" },
      { tRow: 154, tCol: 24, start: 156, end: 179, title: "BONUS" },
      { tRow: 180, tCol: 24, start: 182, end: 213, title: "JAKARTA" },
      { tRow: 215, tCol: 24, start: 217, end: 248, title: "TOTOMALI" },
      { tRow: 249, tCol: 24, start: 251, end: 282, title: "HOKIDRAW" },
      { tRow: 283, tCol: 24, start: 285, end: 316, title: "SYDNEY & HK" }
    ];
    state.kelompok = {};
    secDef.forEach(sec => {
      const items = [];
      for (let i = sec.start; i <= sec.end && i < data.length; i++) {
        if (data[i]) {
          const label = safeGet(data[i], 23), value = safeGet(data[i], 24);
          if (label || value) items.push({ label: label || "-", value: value || "-" });
        }
      }
      if (items.length > 0) state.kelompok[sec.title] = items;
    });
    renderChips(dom.chipTipe, Object.keys(state.kelompok).map(t => ({ label: t })), 'tipe');
  } catch(e) { console.error("Error loadHitungData:", e); }
}
function tampilkanValueHitungan() {
  const result = dom.resultBox;
  if (!selectedTipe || !selectedLabel || !state.kelompok[selectedTipe]) {
    result.innerHTML = '<span style="color: var(--text-muted);">Pilih tipe & label terlebih dahulu</span>';
    return;
  }
  const item = state.kelompok[selectedTipe].find(i => i.label === selectedLabel);
  if (item) {
    result.innerHTML = `<span style="font-weight: 700;">${item.value}</span>`;
    result.onclick = () => copyText(item.value, result);
  }
}

// ═══════════════════════════════════════════════════════════
// ⚡ AUTO-UPDATE
// ═══════════════════════════════════════════════════════════
function autoUpdateTanggal() { showAutoUpdate(); clearTimeout(autoTimeout); autoTimeout = setTimeout(manualUpdateTanggal, 1000); }
function manualUpdateTanggal() {
  if (!dom.inTgl.value) return showToast("⚠️ Pilih tanggal!");
  const p = dom.inTgl.value.split('-');
  const fmt = `${p[1]}/${p[2]}/${p[0]}`;
  dom.btnTgl.disabled = true; dom.statTgl.textContent = "⏳...";
  updateSheet('updateTanggal', fmt).then(ok => {
    dom.btnTgl.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyTanggal, dom.inTgl.value);
      dom.statTgl.textContent = "✅ OK"; showToast("📅 Data tersimpan!");
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statTgl.textContent = "❌"; showToast("❌ Cek koneksi"); }
  });
}
function autoUpdateNominal() { showAutoUpdate(); clearTimeout(autoTimeout); autoTimeout = setTimeout(manualUpdateNominal, 1000); }
function manualUpdateNominal() {
  if (!dom.inNom.value) return showToast("⚠️ Isi nominal!");
  dom.btnNom.disabled = true; dom.statNom.textContent = "⏳...";
  updateSheet('updateNominal', dom.inNom.value).then(ok => {
    dom.btnNom.disabled = false;
    if (ok) {
      localStorage.setItem(CONFIG.keyNominal, dom.inNom.value);
      dom.statNom.textContent = "💰 Rp " + formatNum(dom.inNom.value);
      showToast("💰 Nominal tersimpan!");
      fetchPrediksi(); fetchHitung(); loadHitungData();
    } else { dom.statNom.textContent = "❌"; showToast("❌ Cek koneksi"); }
  });
}

// ═══════════════════════════════════════════════════════════
// 🚀 INIT
// ═══════════════════════════════════════════════════════════
function initTabs() {
  document.querySelectorAll('.tab-chip').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('.tab-chip').forEach(b => b.classList.remove('active'));
      t.classList.add('active');
      dom.tabP.style.display = t.dataset.tab === 'prediksi' ? 'block' : 'none';
      dom.tabH.style.display = t.dataset.tab === 'hitung' ? 'block' : 'none';
    };
  });
}
function initSearch() {
  dom.srcP.oninput = () => renderList(dom.listP, state.prediksi, dom.srcP.value);
  dom.srcJ.oninput = () => renderList(dom.listJ, state.jadwal, dom.srcJ.value);
  dom.srcL.oninput = () => renderList(dom.listL, state.link, dom.srcL.value);
}
function init() { initTabs(); initSearch(); fetchPrediksi(); fetchHitung(); loadHitungData(); }

document.addEventListener('DOMContentLoaded', () => {
  createParticles(); init();
  setTimeout(() => showToast('🔷 Soft Neon Loaded • Ready!'), 900);
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement.classList.contains('item-card')) {
    document.activeElement.click();
  }
});
</script>

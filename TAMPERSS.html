<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tampermonkey Script Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Header */
        .header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo i {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .stats {
            display: flex;
            gap: 2rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Search and Filter */
        .search-bar {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        /* Script Grid */
        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .script-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .script-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .script-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }

        .script-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .script-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .script-lines {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .script-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 2rem;
            overflow-y: auto;
            max-height: calc(90vh - 150px);
        }

        /* Code Editor */
        .code-editor {
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 1.5rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 500px;
            overflow-y: auto;
            border: 2px solid var(--border);
        }

        .code-editor::-webkit-scrollbar {
            width: 10px;
        }

        .code-editor::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        .code-editor::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        .code-editor::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .edit-textarea {
            width: 100%;
            min-height: 500px;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            resize: vertical;
        }

        .edit-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            background: rgba(15, 23, 42, 0.5);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 2000;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }

        .toast-icon {
            font-size: 1.5rem;
        }

        .toast.success .toast-icon {
            color: var(--success);
        }

        .toast.error .toast-icon {
            color: var(--danger);
        }

        /* Loading Spinner */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .scripts-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                width: 95%;
            }
        }

        /* Syntax Highlighting */
        .keyword { color: #c084fc; }
        .string { color: #86efac; }
        .comment { color: #64748b; font-style: italic; }
        .function { color: #60a5fa; }
        .number { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-code"></i>
                <h1>Tampermonkey Script Manager</h1>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalScripts">0</div>
                    <div class="stat-label">Total Scripts</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalLines">0</div>
                    <div class="stat-label">Total Lines</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Cari script...">
        </div>

        <!-- Scripts Grid -->
        <div class="scripts-grid" id="scriptsGrid">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <h3>Loading scripts...</h3>
                <p>Mengambil data dari Google Sheets</p>
            </div>
        </div>
    </div>

    <!-- View Script Modal -->
    <div class="modal" id="viewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="viewModalTitle">Script Details</h2>
                <button class="modal-close" onclick="closeModal('viewModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="code-editor" id="scriptContent"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('viewModal')">
                    <i class="fas fa-times"></i> Tutup
                </button>
                <button class="btn btn-primary" onclick="editCurrentScript()">
                    <i class="fas fa-edit"></i> Edit
                </button>
                <button class="btn btn-success" onclick="copyCurrentScript()">
                    <i class="fas fa-copy"></i> Copy Script
                </button>
            </div>
        </div>
    </div>

    <!-- Edit Script Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="editModalTitle">Edit Script</h2>
                <button class="modal-close" onclick="closeModal('editModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <textarea class="edit-textarea" id="editTextarea" placeholder="Paste atau tulis script Tampermonkey di sini..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('editModal')">
                    <i class="fas fa-times"></i> Batal
                </button>
                <button class="btn btn-success" onclick="saveScript()">
                    <i class="fas fa-save"></i> Simpan ke Google Sheets
                </button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const APPS_SCRIPT_URL = 'PASTE_YOUR_DEPLOYED_APPS_SCRIPT_URL_HERE';
        
        let scripts = [];
        let currentScript = null;
        let currentColIndex = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadScripts();
            setupSearch();
        });

        // Load all scripts from Google Sheets
        async function loadScripts() {
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=getAll`);
                const data = await response.json();
                
                if (data.scripts) {
                    scripts = data.scripts;
                    renderScripts(scripts);
                    updateStats();
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('Error loading scripts:', error);
                showToast('Gagal memuat script. Pastikan URL Apps Script sudah benar.', 'error');
                showEmptyState();
            }
        }

        // Render scripts grid
        function renderScripts(scriptsToRender) {
            const grid = document.getElementById('scriptsGrid');
            
            if (scriptsToRender.length === 0) {
                showEmptyState();
                return;
            }

            grid.innerHTML = scriptsToRender.map(script => `
                <div class="script-card" onclick="viewScript(${script.colIndex})">
                    <div class="script-title">${escapeHtml(script.title)}</div>
                    <div class="script-meta">
                        <span class="script-lines">
                            <i class="fas fa-map-marker-alt"></i> ${script.cellAddress}1
                        </span>
                        <div class="script-actions">
                            <button class="btn btn-secondary" onclick="event.stopPropagation(); editScript(${script.colIndex})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-primary" onclick="event.stopPropagation(); quickCopy(${script.colIndex})">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // View script details
        async function viewScript(colIndex) {
            try {
                showToast('Memuat script...', 'success');
                const response = await fetch(`${APPS_SCRIPT_URL}?action=getScript&col=${colIndex}`);
                const data = await response.json();
                
                if (data.content !== undefined) {
                    currentScript = data.content;
                    currentColIndex = colIndex;
                    
                    const script = scripts.find(s => s.colIndex === colIndex);
                    document.getElementById('viewModalTitle').textContent = script ? script.title : 'Script Details';
                    document.getElementById('scriptContent').textContent = data.content;
                    
                    openModal('viewModal');
                }
            } catch (error) {
                console.error('Error viewing script:', error);
                showToast('Gagal memuat script', 'error');
            }
        }

        // Edit script
        async function editScript(colIndex) {
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=getScript&col=${colIndex}`);
                const data = await response.json();
                
                if (data.content !== undefined) {
                    currentColIndex = colIndex;
                    const script = scripts.find(s => s.colIndex === colIndex);
                    
                    document.getElementById('editModalTitle').textContent = `Edit: ${script ? script.title : 'Script'}`;
                    document.getElementById('editTextarea').value = data.content;
                    
                    openModal('editModal');
                }
            } catch (error) {
                console.error('Error editing script:', error);
                showToast('Gagal memuat script untuk edit', 'error');
            }
        }

        // Edit current script from view modal
        function editCurrentScript() {
            if (currentColIndex) {
                closeModal('viewModal');
                editScript(currentColIndex);
            }
        }

        // Save script to Google Sheets
        async function saveScript() {
            const content = document.getElementById('editTextarea').value;
            
            if (!content.trim()) {
                showToast('Script tidak boleh kosong', 'error');
                return;
            }

            try {
                showToast('Menyimpan script...', 'success');
                
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'updateScript',
                        colIndex: currentColIndex,
                        content: content
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    showToast('Script berhasil disimpan!', 'success');
                    closeModal('editModal');
                    loadScripts(); // Reload to update stats
                } else {
                    showToast('Gagal menyimpan script', 'error');
                }
            } catch (error) {
                console.error('Error saving script:', error);
                showToast('Gagal menyimpan script', 'error');
            }
        }

        // Quick copy script
        async function quickCopy(colIndex) {
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=getScript&col=${colIndex}`);
                const data = await response.json();
                
                if (data.content !== undefined) {
                    await navigator.clipboard.writeText(data.content);
                    showToast('Script berhasil dicopy!', 'success');
                }
            } catch (error) {
                console.error('Error copying script:', error);
                showToast('Gagal copy script', 'error');
            }
        }

        // Copy current script from view modal
        async function copyCurrentScript() {
            if (currentScript) {
                try {
                    await navigator.clipboard.writeText(currentScript);
                    showToast('Script berhasil dicopy!', 'success');
                } catch (error) {
                    showToast('Gagal copy script', 'error');
                }
            }
        }

        // Setup search functionality
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = scripts.filter(s => 
                    s.title.toLowerCase().includes(query)
                );
                renderScripts(filtered);
            });
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalScripts').textContent = scripts.length;
            // Note: Total lines would require fetching each script, so we'll just show script count
            document.getElementById('totalLines').textContent = scripts.length * 100; // Estimate
        }

        // Show empty state
        function showEmptyState() {
            const grid = document.getElementById('scriptsGrid');
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <h3>Belum ada script</h3>
                    <p>Tambahkan script pertama Anda ke Google Sheets</p>
                </div>
            `;
        }

        // Modal functions
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} toast-icon"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Utility functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal on outside click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                    document.body.style.overflow = 'auto';
                }
            });
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal.active').forEach(modal => {
                    modal.classList.remove('active');
                    document.body.style.overflow = 'auto';
                });
            }
        });
    </script>
</body>
</html>
